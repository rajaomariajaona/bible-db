        text: 23:17
      metadata:
        usfm: PRO.23.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne porte pas envie aux hommes méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne désire pas être avec eux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car leur cœur médite la ruine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:7
      metadata:
        usfm: PSA.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et leurs lèvres parlent d’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C’est par la sagesse qu’une maison s’élève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par l’intelligence qu’elle s’affermit;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est par la science que les chambres se remplissent
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tous les biens précieux et agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:22
      metadata:
        usfm: PRO.21.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un homme sage est plein de force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui a de la science affermit sa vigueur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:14
      metadata:
        usfm: PRO.11.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:22
      metadata:
        usfm: PRO.15.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:18
      metadata:
        usfm: PRO.20.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car tu feras la guerre avec prudence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le salut est dans le grand nombre des conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:6
      metadata:
        usfm: PRO.14.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La sagesse est trop élevée pour l’insensé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’ouvrira pas la bouche à la porte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui médite de faire le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’appelle un homme plein de malice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La pensée de la folie n’est que péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le moqueur est en abomination parmi les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si tu faiblis au jour de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta force n’est que détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 82:4
      metadata:
        usfm: PSA.82.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Délivre ceux qu’on traîne à la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qu’on va égorger, sauve-les!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si tu dis: Ah! Nous ne savions pas!…'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui pèse les cœurs ne le voit-il pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui veille sur ton âme ne le connaît-il pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:11
      metadata:
        usfm: JOB.34.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:13
      metadata:
        usfm: PSA.62.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:19
      metadata:
        usfm: JER.32.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:6
      metadata:
        usfm: ROM.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 22:12
      metadata:
        usfm: REV.22.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ne rendra-t-il pas à chacun selon ses œuvres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mon fils, mange du miel, car il est bon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un rayon de miel sera doux à ton palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 19:11
      metadata:
        usfm: PSA.19.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 119:103
      metadata:
        usfm: PSA.119.103
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De même, connais la sagesse pour ton âme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Si tu la trouves, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 23:18
      metadata:
        usfm: PRO.23.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il est un avenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton espérance ne sera pas anéantie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne tends pas méchamment des embûches à la demeure du juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne dévaste pas le lieu où il repose;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 5:19
      metadata:
        usfm: JOB.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:20
      metadata:
        usfm: PSA.34.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sept fois le juste tombe, et il se relève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:2
      metadata:
        usfm: AMO.5.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:14
      metadata:
        usfm: AMO.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les méchants sont précipités dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:29
      metadata:
        usfm: JOB.31.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:5
      metadata:
        usfm: PRO.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne te réjouis pas de la chute de ton ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ton cœur ne soit pas dans l’allégresse quand il chancelle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: De peur que l’Éternel ne le voie, que cela ne lui déplaise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il ne détourne de lui sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:1
      metadata:
        usfm: PSA.37.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 73:3
      metadata:
        usfm: PSA.73.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:31
      metadata:
        usfm: PRO.3.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:17
      metadata:
        usfm: PRO.23.17
    - type: text
      text: . v. 1.
    marker-yv: yv-n
  - type: text
    text: Ne t’irrite pas à cause de ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne porte pas envie aux méchants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car il n’y a point d’avenir pour celui qui fait le mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 18:5
      metadata:
        usfm: JOB.18.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JOB.18.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:9
      metadata:
        usfm: PRO.13.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:20
      metadata:
        usfm: PRO.20.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La lampe des méchants s’éteint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mon fils, crains l’Éternel et le roi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te mêle pas avec les hommes remuants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car soudain leur ruine surgira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui connaît les châtiments des uns et des autres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici encore ce qui vient des sages:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:3
      metadata:
        usfm: EXO.23.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: EXO.23.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:15
      metadata:
        usfm: LEV.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:17
      metadata:
        usfm: DEU.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:19
      metadata:
        usfm: DEU.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:5
      metadata:
        usfm: PRO.18.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:21
      metadata:
        usfm: PRO.28.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:24
      metadata:
        usfm: JHN.7.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:1
      metadata:
        usfm: JAS.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’est pas bon, dans les jugements, d’avoir égard aux personnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:15
      metadata:
        usfm: PRO.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:23
      metadata:
        usfm: ISA.5.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui dit au méchant: Tu es juste!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les peuples le maudissent, les nations le maudissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais ceux qui le châtient s’en trouvent bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le bonheur vient sur eux comme une bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il baise les lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui répond des paroles justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Soigne tes affaires au-dehors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mets ton champ en état,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis tu bâtiras ta maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ne témoigne pas à la légère contre ton prochain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voudrais-tu tromper par tes lèvres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: ROM.12.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne dis pas: Je lui ferai comme il m’a fait,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je rendrai à chacun selon ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: J’ai passé près du champ d’un paresseux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et près de la vigne d’un homme dépourvu de sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Et voici, les épines y croissaient partout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ronces en couvraient la face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le mur de pierres était écroulé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: J’ai regardé attentivement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’ai tiré instruction de ce que j’ai vu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:10
      metadata:
        usfm: PRO.6.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: PRO.6.11
    - type: text
      text: .
