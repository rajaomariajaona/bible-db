document_id: PRO.24,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:1. Pr 3:31; 23:17.
  - type: text
    content: Ne porte pas envie aux hommes méchants,
  - type: text
    content: Et ne désire pas être avec eux;
  '10':
  - type: text
    content: Si tu faiblis au jour de la détresse,
  - type: text
    content: Ta force n’est que détresse.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 82:4.
  - type: text
    content: Délivre ceux qu’on traîne à la mort,
  - type: text
    content: Ceux qu’on va égorger, sauve-les!
  '12':
  - type: text
    content: 'Si tu dis: Ah! Nous ne savions pas!…'
  - type: text
    content: Celui qui pèse les cœurs ne le voit-il pas?
  - type: text
    content: Celui qui veille sur ton âme ne le connaît-il pas?
  - type: note
    content: Job 34:11. Ps 62:13. Jé 32:19. Ro 2:6. Ap 22:12.
  - type: text
    content: Et ne rendra-t-il pas à chacun selon ses œuvres?
  '13':
  - type: text
    content: Mon fils, mange du miel, car il est bon;
  - type: text
    content: Un rayon de miel sera doux à ton palais.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 19:11; 119:103.
  - type: text
    content: De même, connais la sagesse pour ton âme;
  - type: text
    content: 'Si tu la trouves, '
  - type: note
    content: Pr 23:18.
  - type: text
    content: il est un avenir,
  - type: text
    content: Et ton espérance ne sera pas anéantie.
  '15':
  - type: text
    content: Ne tends pas méchamment des embûches à la demeure du juste,
  - type: text
    content: Et ne dévaste pas le lieu où il repose;
  '16':
  - type: text
    content: 'Car '
  - type: note
    content: Job 5:19. Ps 34:20.
  - type: text
    content: sept fois le juste tombe, et il se relève,
  - type: text
    content: 'Mais '
  - type: note
    content: Am 5:2; 8:14.
  - type: text
    content: les méchants sont précipités dans le malheur.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Job 31:29. Pr 17:5.
  - type: text
    content: Ne te réjouis pas de la chute de ton ennemi,
  - type: text
    content: Et que ton cœur ne soit pas dans l’allégresse quand il chancelle,
  '18':
  - type: text
    content: De peur que l’Éternel ne le voie, que cela ne lui déplaise,
  - type: text
    content: Et qu’il ne détourne de lui sa colère.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:1; 73:3. Pr 3:31; 23:17. v. 1.
  - type: text
    content: Ne t’irrite pas à cause de ceux qui font le mal,
  - type: text
    content: Ne porte pas envie aux méchants;
  '2':
  - type: text
    content: Car leur cœur médite la ruine,
  - type: note
    content: Ps 10:7.
  - type: text
    content: Et leurs lèvres parlent d’iniquité.
  '20':
  - type: text
    content: Car il n’y a point d’avenir pour celui qui fait le mal,
  - type: note
    content: Job 18:5, 6. Pr 13:9; 20:20.
  - type: text
    content: La lampe des méchants s’éteint.
  '21':
  - type: text
    content: Mon fils, crains l’Éternel et le roi;
  - type: text
    content: Ne te mêle pas avec les hommes remuants;
  '22':
  - type: text
    content: Car soudain leur ruine surgira,
  - type: text
    content: Et qui connaît les châtiments des uns et des autres?
  '23':
  - type: text
    content: 'Voici encore ce qui vient des sages:'
  - type: note
    content: Ex 23:3, 6. Lé 19:15. De 1:17; 16:19. Pr 18:5; 28:21. Jn 7:24. Ja 2:1.
  - type: text
    content: Il n’est pas bon, dans les jugements, d’avoir égard aux personnes.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:15. És 5:23.
  - type: text
    content: 'Celui qui dit au méchant: Tu es juste!'
  - type: text
    content: Les peuples le maudissent, les nations le maudissent.
  '25':
  - type: text
    content: Mais ceux qui le châtient s’en trouvent bien,
  - type: text
    content: Et le bonheur vient sur eux comme une bénédiction.
  '26':
  - type: text
    content: Il baise les lèvres,
  - type: text
    content: Celui qui répond des paroles justes.
  '27':
  - type: text
    content: Soigne tes affaires au-dehors,
  - type: text
    content: Mets ton champ en état,
  - type: text
    content: Puis tu bâtiras ta maison.
  '28':
  - type: text
    content: Ne témoigne pas à la légère contre ton prochain;
  - type: text
    content: Voudrais-tu tromper par tes lèvres?
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ro 12:17, 19.
  - type: text
    content: 'Ne dis pas: Je lui ferai comme il m’a fait,'
  - type: text
    content: Je rendrai à chacun selon ses œuvres.
  '3':
  - type: text
    content: C’est par la sagesse qu’une maison s’élève,
  - type: text
    content: Et par l’intelligence qu’elle s’affermit;
  '30':
  - type: text
    content: J’ai passé près du champ d’un paresseux,
  - type: text
    content: Et près de la vigne d’un homme dépourvu de sens.
  '31':
  - type: text
    content: Et voici, les épines y croissaient partout,
  - type: text
    content: Les ronces en couvraient la face,
  - type: text
    content: Et le mur de pierres était écroulé.
  '32':
  - type: text
    content: J’ai regardé attentivement,
  - type: text
    content: Et j’ai tiré instruction de ce que j’ai vu.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:10, 11.
  - type: text
    content: Un peu de sommeil, un peu d’assoupissement,
  - type: text
    content: Un peu croiser les mains pour dormir!…
  '34':
  - type: text
    content: Et la pauvreté te surprendra, comme un rôdeur,
  - type: text
    content: Et la disette, comme un homme en armes.
  '4':
  - type: text
    content: C’est par la science que les chambres se remplissent
  - type: text
    content: De tous les biens précieux et agréables.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 21:22.
  - type: text
    content: Un homme sage est plein de force,
  - type: text
    content: Et celui qui a de la science affermit sa vigueur;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:14; 15:22; 20:18.
  - type: text
    content: Car tu feras la guerre avec prudence,
  - type: text
    content: Et le salut est dans le grand nombre des conseillers.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:6.
  - type: text
    content: La sagesse est trop élevée pour l’insensé;
  - type: text
    content: Il n’ouvrira pas la bouche à la porte.
  '8':
  - type: text
    content: Celui qui médite de faire le mal
  - type: text
    content: S’appelle un homme plein de malice.
  '9':
  - type: text
    content: La pensée de la folie n’est que péché,
  - type: text
    content: Et le moqueur est en abomination parmi les hommes.
