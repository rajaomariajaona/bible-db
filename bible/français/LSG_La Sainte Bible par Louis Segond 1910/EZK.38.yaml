document_id: EZK.38,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Gog
  - type: heading
    content: 'V. 1-23: cf. (Éz 39. És 24:21-23.) Ap 20:7-10. Za 2:8.'
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: En ce jour-là, des pensées s’élèveront dans ton cœur,
  - type: text
    content: Et tu formeras de mauvais desseins.
  '11':
  - type: text
    content: 'Tu diras: Je monterai contre un pays ouvert,'
  - type: text
    content: Je fondrai sur des hommes tranquilles,
  - type: text
    content: En sécurité dans leurs demeures,
  - type: text
    content: Tous dans des habitations sans murailles,
  - type: text
    content: Et n’ayant ni verrous ni portes;
  '12':
  - type: text
    content: J’irai faire du butin et me livrer au pillage,
  - type: text
    content: Porter la main sur des ruines maintenant habitées,
  - type: text
    content: Sur un peuple recueilli du milieu des nations,
  - type: text
    content: Ayant des troupeaux et des propriétés,
  - type: text
    content: Et occupant les lieux élevés du pays.
  '13':
  - type: text
    content: Séba et Dedan, les marchands de Tarsis,
  - type: text
    content: 'Et tous leurs lionceaux, te diront:'
  - type: text
    content: Viens-tu pour faire du butin?
  - type: text
    content: Est-ce pour piller que tu as rassemblé ta multitude,
  - type: text
    content: Pour emporter de l’argent et de l’or,
  - type: text
    content: Pour prendre des troupeaux et des biens,
  - type: text
    content: Pour faire un grand butin?
  '14':
  - type: text
    content: 'C’est pourquoi prophétise, fils de l’homme, et dis à Gog:'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Oui, le jour où mon peuple d’Israël vivra en sécurité,
  - type: text
    content: Tu le sauras.
  '15':
  - type: text
    content: Alors tu partiras de ton pays, des extrémités du septentrion,
  - type: text
    content: Toi et de nombreux peuples avec toi,
  - type: text
    content: Tous montés sur des chevaux,
  - type: text
    content: Une grande multitude, une armée puissante.
  '16':
  - type: text
    content: Tu t’avanceras contre mon peuple d’Israël,
  - type: text
    content: Comme une nuée qui va couvrir le pays.
  - type: text
    content: Dans la suite des jours, je te ferai marcher contre mon pays,
  - type: text
    content: Afin que les nations me connaissent,
  - type: text
    content: Quand je serai sanctifié par toi sous leurs yeux, ô Gog!
  '17':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Est-ce toi de qui j’ai parlé jadis
  - type: text
    content: Par mes serviteurs les prophètes d’Israël,
  - type: text
    content: Qui ont prophétisé alors, pendant des années,
  - type: text
    content: Que je t’amènerais contre eux?
  '18':
  - type: text
    content: En ce jour-là, le jour où Gog marchera contre la terre d’Israël,
  - type: text
    content: Dit le Seigneur, l’Éternel,
  - type: text
    content: La fureur me montera dans les narines.
  '19':
  - type: text
    content: 'Je le déclare, dans ma '
  - type: note
    content: Éz 36:5, 6.
  - type: text
    content: jalousie et dans le feu de ma colère,
  - type: text
    content: En ce jour-là, il y aura un grand tumulte
  - type: text
    content: Dans le pays d’Israël.
  '2':
  - type: text
    content: 'Fils de l’homme, tourne ta face vers '
  - type: note
    content: Ap 20:8.
  - type: text
    content: Gog, au pays de Magog,
  - type: text
    content: Vers le prince de Rosch, de Méschec et de Tubal,
  - type: text
    content: Et prophétise contre lui!
  '20':
  - type: text
    content: Les poissons de la mer et les oiseaux du ciel trembleront devant moi,
  - type: text
    content: Et les bêtes des champs et tous les reptiles qui rampent sur la terre,
  - type: text
    content: Et tous les hommes qui sont à la surface de la terre;
  - type: text
    content: Les montagnes seront renversées,
  - type: text
    content: Les parois des rochers s’écrouleront,
  - type: text
    content: Et toutes les murailles tomberont par terre.
  '21':
  - type: text
    content: J’appellerai l’épée contre lui sur toutes mes montagnes,
  - type: text
    content: Dit le Seigneur, l’Éternel;
  - type: text
    content: L’épée de chacun se tournera contre son frère.
  '22':
  - type: text
    content: J’exercerai mes jugements contre lui par la peste et par le sang,
  - type: text
    content: Par une pluie violente et par des pierres de grêle;
  - type: text
    content: Je ferai pleuvoir le feu et le soufre sur lui et sur ses troupes,
  - type: text
    content: Et sur les peuples nombreux qui seront avec lui.
  '23':
  - type: text
    content: Je manifesterai ma grandeur et ma sainteté,
  - type: text
    content: Je me ferai connaître aux yeux de la multitude des nations,
  - type: text
    content: Et elles sauront que je suis l’Éternel.
  '3':
  - type: text
    content: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à toi, Gog,
  - type: text
    content: Prince de Rosch, de Méschec et de Tubal!
  '4':
  - type: text
    content: 'Je t’entraînerai, et je mettrai une '
  - type: note
    content: Éz 29:4; 39:2.
  - type: text
    content: boucle à tes mâchoires;
  - type: text
    content: Je te ferai sortir, toi et toute ton armée,
  - type: text
    content: Chevaux et cavaliers,
  - type: text
    content: Tous vêtus magnifiquement,
  - type: text
    content: Troupe nombreuse portant le grand et le petit bouclier,
  - type: text
    content: Tous maniant l’épée;
  '5':
  - type: text
    content: Et avec eux ceux de Perse, d’Éthiopie et de Puth,
  - type: text
    content: Tous portant le bouclier et le casque;
  '6':
  - type: text
    content: Gomer et toutes ses troupes,
  - type: text
    content: La maison de Togarma,
  - type: text
    content: A l’extrémité du septentrion,
  - type: text
    content: Et toutes ses troupes,
  - type: text
    content: Peuples nombreux qui sont avec toi.
  '7':
  - type: text
    content: Prépare-toi, tiens-toi prêt,
  - type: text
    content: Toi, et toute ta multitude assemblée autour de toi!
  - type: text
    content: Sois leur chef!
  '8':
  - type: text
    content: Après bien des jours, tu seras à leur tête;
  - type: text
    content: Dans la suite des années, tu marcheras contre le pays
  - type: text
    content: Dont les habitants, échappés à l’épée,
  - type: text
    content: Auront été rassemblés d’entre plusieurs peuples
  - type: text
    content: Sur les montagnes d’Israël longtemps désertes;
  - type: text
    content: Retirés du milieu des peuples,
  - type: text
    content: Ils seront tous en sécurité dans leurs demeures.
  '9':
  - type: text
    content: Tu monteras, tu t’avanceras comme une tempête,
  - type: text
    content: 'Tu seras comme une '
  - type: note
    content: Éz 30:18.
  - type: text
    content: nuée qui va couvrir le pays,
  - type: text
    content: Toi et toutes tes troupes, et les nombreux peuples avec toi.
