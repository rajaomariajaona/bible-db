document_id: EZK.38,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Gog
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-23: cf. (Éz 39. És 24:21-23.) Ap 20:7-10. Za 2:8.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, des pensées s’élèveront dans ton cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu formeras de mauvais desseins.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu diras: Je monterai contre un pays ouvert,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fondrai sur des hommes tranquilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En sécurité dans leurs demeures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous dans des habitations sans murailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’ayant ni verrous ni portes;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: J’irai faire du butin et me livrer au pillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Porter la main sur des ruines maintenant habitées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur un peuple recueilli du milieu des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ayant des troupeaux et des propriétés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et occupant les lieux élevés du pays.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Séba et Dedan, les marchands de Tarsis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tous leurs lionceaux, te diront:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens-tu pour faire du butin?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce pour piller que tu as rassemblé ta multitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour emporter de l’argent et de l’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour prendre des troupeaux et des biens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire un grand butin?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'C’est pourquoi prophétise, fils de l’homme, et dis à Gog:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le jour où mon peuple d’Israël vivra en sécurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu le sauras.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors tu partiras de ton pays, des extrémités du septentrion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi et de nombreux peuples avec toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous montés sur des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une grande multitude, une armée puissante.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu t’avanceras contre mon peuple d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une nuée qui va couvrir le pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la suite des jours, je te ferai marcher contre mon pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que les nations me connaissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je serai sanctifié par toi sous leurs yeux, ô Gog!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce toi de qui j’ai parlé jadis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par mes serviteurs les prophètes d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ont prophétisé alors, pendant des années,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je t’amènerais contre eux?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En ce jour-là, le jour où Gog marchera contre la terre d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fureur me montera dans les narines.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je le déclare, dans ma '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 36:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: jalousie et dans le feu de ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, il y aura un grand tumulte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le pays d’Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fils de l’homme, tourne ta face vers '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 20:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Gog, au pays de Magog,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers le prince de Rosch, de Méschec et de Tubal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et prophétise contre lui!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les poissons de la mer et les oiseaux du ciel trembleront devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les bêtes des champs et tous les reptiles qui rampent sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous les hommes qui sont à la surface de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les montagnes seront renversées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les parois des rochers s’écrouleront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les murailles tomberont par terre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: J’appellerai l’épée contre lui sur toutes mes montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée de chacun se tournera contre son frère.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: J’exercerai mes jugements contre lui par la peste et par le sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par une pluie violente et par des pierres de grêle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai pleuvoir le feu et le soufre sur lui et sur ses troupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur les peuples nombreux qui seront avec lui.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Je manifesterai ma grandeur et ma sainteté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me ferai connaître aux yeux de la multitude des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elles sauront que je suis l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à toi, Gog,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prince de Rosch, de Méschec et de Tubal!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je t’entraînerai, et je mettrai une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 29:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: boucle à tes mâchoires;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te ferai sortir, toi et toute ton armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chevaux et cavaliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous vêtus magnifiquement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Troupe nombreuse portant le grand et le petit bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous maniant l’épée;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Et avec eux ceux de Perse, d’Éthiopie et de Puth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous portant le bouclier et le casque;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Gomer et toutes ses troupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La maison de Togarma,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’extrémité du septentrion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes ses troupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peuples nombreux qui sont avec toi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Prépare-toi, tiens-toi prêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, et toute ta multitude assemblée autour de toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois leur chef!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Après bien des jours, tu seras à leur tête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la suite des années, tu marcheras contre le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont les habitants, échappés à l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auront été rassemblés d’entre plusieurs peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les montagnes d’Israël longtemps désertes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Retirés du milieu des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront tous en sécurité dans leurs demeures.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu monteras, tu t’avanceras comme une tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu seras comme une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 30:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: nuée qui va couvrir le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi et toutes tes troupes, et les nombreux peuples avec toi.
