      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’espère en l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 40:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon âme espère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’attends sa promesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
