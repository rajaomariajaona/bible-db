      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mon âme compte sur le Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus que les gardes ne comptent sur le matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les gardes ne comptent sur le matin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Israël, mets ton espoir en l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la miséricorde est auprès de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la rédemption est auprès de lui en abondance.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C’est lui qui rachètera Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toutes ses iniquités.
