      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique des degrés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du fond de l’abîme je t’invoque, ô Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Seigneur, écoute ma voix!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes oreilles soient attentives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la voix de mes supplications!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 143:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si tu gardais le souvenir des iniquités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, Seigneur, qui pourrait subsister?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 24:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le pardon se trouve auprès de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’on te craigne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
