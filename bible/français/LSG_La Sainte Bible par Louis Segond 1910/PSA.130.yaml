document_id: PSA.130,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 69; 143. (La 3:22-32. Mi 7:7, 18-20.) És 30:18.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Du fond de l’abîme je t’invoque, ô Éternel!
  '2':
  - type: text
    content: Seigneur, écoute ma voix!
  - type: text
    content: Que tes oreilles soient attentives
  - type: text
    content: A la voix de mes supplications!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 143:2.
  - type: text
    content: Si tu gardais le souvenir des iniquités,
  - type: text
    content: Éternel, Seigneur, qui pourrait subsister?
  '4':
  - type: text
    content: 'Mais '
  - type: note
    content: 2 S 24:14.
  - type: text
    content: le pardon se trouve auprès de toi,
  - type: text
    content: Afin qu’on te craigne.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 27:14. Ha 2:3.
  - type: text
    content: 'J’espère en l’Éternel, '
  - type: note
    content: Ps 40:2.
  - type: text
    content: mon âme espère,
  - type: text
    content: Et j’attends sa promesse.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 5:4; 119:147; 123:1, 2.
  - type: text
    content: Mon âme compte sur le Seigneur,
  - type: text
    content: Plus que les gardes ne comptent sur le matin,
  - type: text
    content: Que les gardes ne comptent sur le matin.
  '7':
  - type: text
    content: Israël, mets ton espoir en l’Éternel!
  - type: text
    content: Car la miséricorde est auprès de l’Éternel,
  - type: text
    content: Et la rédemption est auprès de lui en abondance.
  '8':
  - type: text
    content: C’est lui qui rachètera Israël
  - type: text
    content: De toutes ses iniquités.
