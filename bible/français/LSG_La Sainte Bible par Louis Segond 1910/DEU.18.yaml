document_id: DEU.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les droits des sacrificateurs et des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. No 18. La 3:24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les sacrificateurs, les Lévites, la tribu entière de Lévi, n’auront ni part ni héritage avec Israël; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:20
      metadata:
        usfm: NUM.18.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:9
      metadata:
        usfm: DEU.10.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:13
      metadata:
        usfm: 1CO.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils se nourriront des sacrifices consumés par le feu en l’honneur de l’Éternel et de l’héritage de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils n’auront point d’héritage au milieu de leurs frères: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'No 18:20, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:9
      metadata:
        usfm: DEU.10.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 44:28
      metadata:
        usfm: EZK.44.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel sera leur héritage, comme il le leur a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici quel sera le droit des sacrificateurs sur le peuple, sur ceux qui offriront un sacrifice, un bœuf ou un agneau: on donnera au sacrificateur l’épaule, les mâchoires et l’estomac. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu lui donneras les prémices de ton blé, de ton moût et de ton huile, et les prémices de la toison de tes brebis; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'car c’est lui que l’Éternel, ton Dieu, a choisi entre toutes les tribus, pour qu’il fasse le service au nom de l’Éternel, lui et ses fils, à toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque le Lévite quittera l’une de tes portes, le lieu quelconque où il demeure en Israël, pour se rendre, selon la plénitude de son désir, au lieu que choisira l’Éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et qu’il fera le service au nom de l’Éternel, ton Dieu, comme tous ses frères les Lévites qui se tiennent là devant l’Éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: il recevra pour sa nourriture une portion égale à la leur, et jouira, en outre, des revenus de la vente de son patrimoine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La divination et la magie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-14: cf. Lé 20:1-6, 27. (2 R 17:15, 17. 2 Ch 33:6.) Ép 5:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque tu seras entré dans le pays que l’Éternel, ton Dieu, te donne, tu n’apprendras point à imiter les abominations de ces nations-là. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Qu’on ne trouve chez toi personne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:21
      metadata:
        usfm: LEV.18.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui fasse passer son fils ou sa fille par le feu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:27
      metadata:
        usfm: LEV.20.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 28:7
      metadata:
        usfm: 1SA.28.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:19
      metadata:
        usfm: ISA.8.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'personne qui exerce le métier de devin, d’astrologue, d’augure, de magicien, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'd’enchanteur, personne qui consulte ceux qui évoquent les esprits ou disent la bonne aventure, personne qui interroge les morts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car quiconque fait ces choses est en abomination à l’Éternel; et c’est à cause de ces abominations que l’Éternel, ton Dieu, va chasser ces nations devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu seras entièrement à l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Car ces nations que tu chasseras écoutent les astrologues et les devins; mais à toi, l’Éternel, ton Dieu, ne le permet pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prophètes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-22: cf. (Ac 3:22-26. Hé 3:1-14.) (Jé 28. De 13:1-5.) (Jn 4:29; 9:17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:46
      metadata:
        usfm: JHN.1.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:22
      metadata:
        usfm: ACT.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:37
      metadata:
        usfm: ACT.7.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel, ton Dieu, te suscitera du milieu de toi, d’entre tes frères, un prophète comme moi: vous l’écouterez! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il répondra ainsi à la demande que tu fis à l’Éternel, ton Dieu, à Horeb, le jour de l’assemblée, quand tu disais: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:19
      metadata:
        usfm: EXO.20.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:25
      metadata:
        usfm: DEU.5.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:19
      metadata:
        usfm: HEB.12.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que je n’entende plus la voix de l’Éternel, mon Dieu, et que je ne voie plus ce grand feu, afin de ne pas mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Éternel me dit: Ce qu’ils ont dit est bien. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je leur susciterai du milieu de leurs frères un prophète comme toi, je mettrai mes paroles dans sa bouche, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:25
      metadata:
        usfm: JHN.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et il leur dira tout ce que je lui commanderai. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et si quelqu’un n’écoute pas mes paroles qu’il dira en mon nom, c’est moi qui lui en demanderai compte. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:5
      metadata:
        usfm: DEU.13.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:14
      metadata:
        usfm: JER.14.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le prophète qui aura l’audace de dire en mon nom une parole que je ne lui aurai point commandé de dire, ou qui parlera au nom d’autres dieux, ce prophète-là sera puni de mort. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Peut-être diras-tu dans ton cœur: Comment connaîtrons-nous la parole que l’Éternel n’aura point dite? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand ce que dira le prophète n’aura pas lieu et n’arrivera pas, ce sera une parole que l’Éternel n’aura point dite. C’est par audace que le prophète l’aura dite: n’aie pas peur de lui.'
