document_id: DEU.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les droits des sacrificateurs et des Lévites
  - type: heading
    content: 'V. 1-8: cf. No 18. La 3:24.'
  - type: text
    content: 'Les sacrificateurs, les Lévites, la tribu entière de Lévi, n’auront ni part ni héritage avec Israël; '
  - type: note
    content: No 18:20. De 10:9. 1 Co 9:13.
  - type: text
    content: 'ils se nourriront des sacrifices consumés par le feu en l’honneur de l’Éternel et de l’héritage de l’Éternel. '
  '10':
  - type: text
    content: 'Qu’on ne trouve chez toi personne '
  - type: note
    content: Lé 18:21.
  - type: text
    content: 'qui fasse passer son fils ou sa fille par le feu, '
  - type: note
    content: Lé 20:27. 1 S 28:7. És 8:19.
  - type: text
    content: 'personne qui exerce le métier de devin, d’astrologue, d’augure, de magicien, '
  '11':
  - type: text
    content: 'd’enchanteur, personne qui consulte ceux qui évoquent les esprits ou disent la bonne aventure, personne qui interroge les morts. '
  '12':
  - type: text
    content: 'Car quiconque fait ces choses est en abomination à l’Éternel; et c’est à cause de ces abominations que l’Éternel, ton Dieu, va chasser ces nations devant toi. '
  '13':
  - type: text
    content: 'Tu seras entièrement à l’Éternel, ton Dieu. '
  '14':
  - type: text
    content: Car ces nations que tu chasseras écoutent les astrologues et les devins; mais à toi, l’Éternel, ton Dieu, ne le permet pas.
  - type: heading
    content: Les prophètes
  - type: heading
    content: 'V. 15-22: cf. (Ac 3:22-26. Hé 3:1-14.) (Jé 28. De 13:1-5.) (Jn 4:29; 9:17.)'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Jn 1:46. Ac 3:22; 7:37.
  - type: text
    content: 'L’Éternel, ton Dieu, te suscitera du milieu de toi, d’entre tes frères, un prophète comme moi: vous l’écouterez! '
  '16':
  - type: text
    content: 'Il répondra ainsi à la demande que tu fis à l’Éternel, ton Dieu, à Horeb, le jour de l’assemblée, quand tu disais: '
  - type: note
    content: Ex 20:19. De 5:25. Hé 12:19.
  - type: text
    content: 'Que je n’entende plus la voix de l’Éternel, mon Dieu, et que je ne voie plus ce grand feu, afin de ne pas mourir. '
  '17':
  - type: text
    content: 'L’Éternel me dit: Ce qu’ils ont dit est bien. '
  '18':
  - type: text
    content: 'Je leur susciterai du milieu de leurs frères un prophète comme toi, je mettrai mes paroles dans sa bouche, '
  - type: note
    content: Jn 4:25.
  - type: text
    content: 'et il leur dira tout ce que je lui commanderai. '
  '19':
  - type: text
    content: 'Et si quelqu’un n’écoute pas mes paroles qu’il dira en mon nom, c’est moi qui lui en demanderai compte. '
  '2':
  - type: text
    content: 'Ils n’auront point d’héritage au milieu de leurs frères: '
  - type: note
    content: No 18:20, etc. De 10:9. Éz 44:28.
  - type: text
    content: 'l’Éternel sera leur héritage, comme il le leur a dit. '
  '20':
  - type: text
    content: 'Mais '
  - type: note
    content: De 13:5. Jé 14:14.
  - type: text
    content: 'le prophète qui aura l’audace de dire en mon nom une parole que je ne lui aurai point commandé de dire, ou qui parlera au nom d’autres dieux, ce prophète-là sera puni de mort. '
  '21':
  - type: text
    content: 'Peut-être diras-tu dans ton cœur: Comment connaîtrons-nous la parole que l’Éternel n’aura point dite? '
  '22':
  - type: text
    content: 'Quand ce que dira le prophète n’aura pas lieu et n’arrivera pas, ce sera une parole que l’Éternel n’aura point dite. C’est par audace que le prophète l’aura dite: n’aie pas peur de lui.'
  '3':
  - type: text
    content: 'Voici quel sera le droit des sacrificateurs sur le peuple, sur ceux qui offriront un sacrifice, un bœuf ou un agneau: on donnera au sacrificateur l’épaule, les mâchoires et l’estomac. '
  '4':
  - type: text
    content: 'Tu lui donneras les prémices de ton blé, de ton moût et de ton huile, et les prémices de la toison de tes brebis; '
  '5':
  - type: text
    content: 'car c’est lui que l’Éternel, ton Dieu, a choisi entre toutes les tribus, pour qu’il fasse le service au nom de l’Éternel, lui et ses fils, à toujours. '
  '6':
  - type: text
    content: 'Lorsque le Lévite quittera l’une de tes portes, le lieu quelconque où il demeure en Israël, pour se rendre, selon la plénitude de son désir, au lieu que choisira l’Éternel, '
  '7':
  - type: text
    content: 'et qu’il fera le service au nom de l’Éternel, ton Dieu, comme tous ses frères les Lévites qui se tiennent là devant l’Éternel, '
  '8':
  - type: text
    content: il recevra pour sa nourriture une portion égale à la leur, et jouira, en outre, des revenus de la vente de son patrimoine.
  - type: heading
    content: La divination et la magie
  - type: heading
    content: 'V. 9-14: cf. Lé 20:1-6, 27. (2 R 17:15, 17. 2 Ch 33:6.) Ép 5:11.'
  '9':
  - type: text
    content: 'Lorsque tu seras entré dans le pays que l’Éternel, ton Dieu, te donne, tu n’apprendras point à imiter les abominations de ces nations-là. '
