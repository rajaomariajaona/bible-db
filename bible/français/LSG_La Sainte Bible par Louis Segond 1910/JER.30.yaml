document_id: JER.30,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour de la captivité et le rétablissement d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (Mi 4:10. És 14:1-5. Éz 34:11-15, 23-31.) És 49:8, etc. La 3:31-33.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 46:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon serviteur Jacob, ne crains pas, dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’effraie pas, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je te délivrerai de la terre lointaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je délivrerai ta postérité du pays où elle est captive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob reviendra, il jouira du repos et de la tranquillité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y aura personne pour le troubler.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis avec toi, dit l’Éternel, pour te délivrer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’anéantirai toutes les nations parmi lesquelles je t’ai dispersé,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais toi, je ne t’anéantirai pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te châtierai avec '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 27:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: équité, Je ne puis pas te laisser impuni.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-22: cf. (Jé 10:18-25; 32:26-44; 31:1-14.) (Hé 12:11. 1 Pi 2:6.) Ps 102:14-23.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ta blessure est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: grave,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta plaie est douloureuse.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul ne défend ta cause, pour bander ta plaie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as ni remède, ni moyen de guérison.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous ceux qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 22:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: t’aimaient t’oublient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun ne prend souci de toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je t’ai frappée comme frappe un ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai châtiée avec violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la multitude de tes iniquités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du grand nombre de tes péchés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi te '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 13:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: plaindre de ta blessure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la douleur que cause ton mal?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est à cause de la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: multitude de tes iniquités,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du grand nombre de tes péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je t’ai fait souffrir ces choses.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cependant, tous ceux qui te dévorent seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dévorés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous tes ennemis, tous, iront en captivité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te dépouillent seront dépouillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’abandonnerai au pillage tous ceux qui te pillent.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je te guérirai, je panserai tes plaies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils t’appellent la repoussée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cette Sion dont nul ne prend souci.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je ramène les captifs des tentes de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai compassion de ses demeures;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ville sera rebâtie sur ses ruines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le palais sera rétabli comme il était.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du milieu d’eux s’élèveront des actions de grâces
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et des cris de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: réjouissance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les multiplierai, et ils ne diminueront pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les honorerai, et ils ne seront pas méprisés.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel, le Dieu d’Israël: Écris dans un livre toutes les paroles que je t’ai dites. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses fils seront comme autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son assemblée subsistera devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je châtierai tous ses oppresseurs.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son chef sera tiré de son sein,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son dominateur sortira du milieu de lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le ferai approcher, et il viendra vers moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car qui oserait de lui-même s’approcher de moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous serez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je serai votre Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-24: cf. Jé 23:19, 20. (És 55:10, 11.)'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la tempête de l’Éternel, la fureur éclate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’orage se précipite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fond sur la tête des méchants.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colère ardente de l’Éternel ne se calmera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il ait accompli, exécuté les desseins de son cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous le comprendrez dans la suite des temps.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, les jours viennent, dit l’Éternel, où je ramènerai les captifs de mon peuple d’Israël et de Juda, dit l’Éternel; je les ramènerai dans le pays que j’ai donné à leurs pères, et ils le posséderont. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont ici les paroles que l’Éternel a prononcées sur Israël et sur Juda.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous entendons des cris d’effroi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’épouvante, ce n’est pas la paix.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Informez-vous, et regardez si un mâle enfante!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi vois-je tous les hommes les mains sur leurs reins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une femme en travail?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi tous les visages sont-ils devenus pâles?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Malheur! Car ce jour est grand;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y en a point eu de semblable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un temps d’angoisse pour Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il en sera délivré.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, dit l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je briserai son joug de dessus ton cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je romprai tes liens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des étrangers ne t’assujettiront plus.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils serviront l’Éternel, leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: David, leur roi, que je leur susciterai.
