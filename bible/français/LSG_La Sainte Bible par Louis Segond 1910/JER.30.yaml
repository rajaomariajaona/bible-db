document_id: JER.30,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour de la captivité et le rétablissement d’Israël
  - type: heading
    content: 'V. 1-11: cf. (Mi 4:10. És 14:1-5. Éz 34:11-15, 23-31.) És 49:8, etc. La 3:31-33.'
  - type: text
    content: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots: '
  '10':
  - type: text
    content: 'Et toi, '
  - type: note
    content: És 41:13; 34:5; 44:1. Jé 46:28.
  - type: text
    content: mon serviteur Jacob, ne crains pas, dit l’Éternel;
  - type: text
    content: Ne t’effraie pas, Israël!
  - type: text
    content: Car je te délivrerai de la terre lointaine,
  - type: text
    content: Je délivrerai ta postérité du pays où elle est captive;
  - type: text
    content: Jacob reviendra, il jouira du repos et de la tranquillité,
  - type: text
    content: Et il n’y aura personne pour le troubler.
  '11':
  - type: text
    content: Car je suis avec toi, dit l’Éternel, pour te délivrer;
  - type: text
    content: J’anéantirai toutes les nations parmi lesquelles je t’ai dispersé,
  - type: note
    content: Jé 4:27; 5:10, 18; 46:28.
  - type: text
    content: Mais toi, je ne t’anéantirai pas;
  - type: text
    content: 'Je te châtierai avec '
  - type: note
    content: És 27:8. Jé 10:24.
  - type: text
    content: équité, Je ne puis pas te laisser impuni.
  - type: heading
    content: 'V. 12-22: cf. (Jé 10:18-25; 32:26-44; 31:1-14.) (Hé 12:11. 1 Pi 2:6.) Ps 102:14-23.'
  '12':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: 'Ta blessure est '
  - type: note
    content: Jé 10:19; 15:18.
  - type: text
    content: grave,
  - type: text
    content: Ta plaie est douloureuse.
  '13':
  - type: text
    content: Nul ne défend ta cause, pour bander ta plaie;
  - type: text
    content: Tu n’as ni remède, ni moyen de guérison.
  '14':
  - type: text
    content: 'Tous ceux qui '
  - type: note
    content: Jé 22:20.
  - type: text
    content: t’aimaient t’oublient,
  - type: text
    content: Aucun ne prend souci de toi;
  - type: text
    content: Car je t’ai frappée comme frappe un ennemi,
  - type: text
    content: Je t’ai châtiée avec violence,
  - type: text
    content: A cause de la multitude de tes iniquités,
  - type: text
    content: Du grand nombre de tes péchés.
  '15':
  - type: text
    content: 'Pourquoi te '
  - type: note
    content: Jé 13:17.
  - type: text
    content: plaindre de ta blessure,
  - type: text
    content: De la douleur que cause ton mal?
  - type: text
    content: 'C’est à cause de la '
  - type: note
    content: Jé 5:6.
  - type: text
    content: multitude de tes iniquités,
  - type: text
    content: Du grand nombre de tes péchés,
  - type: text
    content: Que je t’ai fait souffrir ces choses.
  '16':
  - type: text
    content: 'Cependant, tous ceux qui te dévorent seront '
  - type: note
    content: Ex 23:22. És 41:11. Jé 10:25.
  - type: text
    content: dévorés,
  - type: text
    content: Et tous tes ennemis, tous, iront en captivité;
  - type: text
    content: Ceux qui te dépouillent seront dépouillés,
  - type: text
    content: Et j’abandonnerai au pillage tous ceux qui te pillent.
  '17':
  - type: text
    content: Mais je te guérirai, je panserai tes plaies,
  - type: text
    content: Dit l’Éternel.
  - type: text
    content: Car ils t’appellent la repoussée,
  - type: text
    content: Cette Sion dont nul ne prend souci.
  '18':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Voici, je ramène les captifs des tentes de Jacob,
  - type: text
    content: J’ai compassion de ses demeures;
  - type: text
    content: La ville sera rebâtie sur ses ruines,
  - type: text
    content: Le palais sera rétabli comme il était.
  '19':
  - type: text
    content: Du milieu d’eux s’élèveront des actions de grâces
  - type: text
    content: 'Et des cris de '
  - type: note
    content: Jé 31:4.
  - type: text
    content: réjouissance;
  - type: text
    content: Je les multiplierai, et ils ne diminueront pas;
  - type: text
    content: Je les honorerai, et ils ne seront pas méprisés.
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel, le Dieu d’Israël: Écris dans un livre toutes les paroles que je t’ai dites. '
  '20':
  - type: text
    content: Ses fils seront comme autrefois,
  - type: text
    content: Son assemblée subsistera devant moi,
  - type: text
    content: Et je châtierai tous ses oppresseurs.
  '21':
  - type: text
    content: Son chef sera tiré de son sein,
  - type: text
    content: Son dominateur sortira du milieu de lui;
  - type: text
    content: Je le ferai approcher, et il viendra vers moi;
  - type: text
    content: Car qui oserait de lui-même s’approcher de moi?
  - type: text
    content: Dit l’Éternel.
  '22':
  - type: text
    content: 'Vous serez '
  - type: note
    content: Jé 24:7; 31:1, 33; 32:28.
  - type: text
    content: mon peuple,
  - type: text
    content: Et je serai votre Dieu.
  - type: heading
    content: 'V. 23-24: cf. Jé 23:19, 20. (És 55:10, 11.)'
  '23':
  - type: text
    content: 'Voici, '
  - type: note
    content: Jé 23:19; 25:32.
  - type: text
    content: la tempête de l’Éternel, la fureur éclate,
  - type: text
    content: L’orage se précipite,
  - type: text
    content: Il fond sur la tête des méchants.
  '24':
  - type: text
    content: La colère ardente de l’Éternel ne se calmera pas,
  - type: text
    content: Jusqu’à ce qu’il ait accompli, exécuté les desseins de son cœur.
  - type: text
    content: Vous le comprendrez dans la suite des temps.
  '3':
  - type: text
    content: 'Voici, les jours viennent, dit l’Éternel, où je ramènerai les captifs de mon peuple d’Israël et de Juda, dit l’Éternel; je les ramènerai dans le pays que j’ai donné à leurs pères, et ils le posséderont. '
  '4':
  - type: text
    content: Ce sont ici les paroles que l’Éternel a prononcées sur Israël et sur Juda.
  '5':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Nous entendons des cris d’effroi;
  - type: text
    content: C’est l’épouvante, ce n’est pas la paix.
  '6':
  - type: text
    content: Informez-vous, et regardez si un mâle enfante!
  - type: text
    content: Pourquoi vois-je tous les hommes les mains sur leurs reins,
  - type: text
    content: 'Comme '
  - type: note
    content: Jé 4:31; 6:24.
  - type: text
    content: une femme en travail?
  - type: text
    content: Pourquoi tous les visages sont-ils devenus pâles?
  '7':
  - type: text
    content: ' '
  - type: note
    content: Joë 2:11. So 1:15.
  - type: text
    content: Malheur! Car ce jour est grand;
  - type: text
    content: Il n’y en a point eu de semblable.
  - type: text
    content: C’est un temps d’angoisse pour Jacob;
  - type: text
    content: Mais il en sera délivré.
  '8':
  - type: text
    content: En ce jour-là, dit l’Éternel des armées,
  - type: text
    content: Je briserai son joug de dessus ton cou,
  - type: text
    content: Je romprai tes liens,
  - type: text
    content: Et des étrangers ne t’assujettiront plus.
  '9':
  - type: text
    content: Ils serviront l’Éternel, leur Dieu,
  - type: text
    content: 'Et '
  - type: note
    content: Éz 34:23, 24; 37:24. Os 3:5.
  - type: text
    content: David, leur roi, que je leur susciterai.
