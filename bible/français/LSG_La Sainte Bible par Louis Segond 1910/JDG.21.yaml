document_id: JDG.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rétablissement de la tribu de Benjamin
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-25: cf. (Jg 11:30, etc. 1 S 14:24, etc.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les hommes d’Israël avaient juré à Mitspa, en disant: Aucun de nous ne donnera sa fille pour femme à un Benjamite. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors l’assemblée envoya contre eux douze mille soldats, en leur donnant cet ordre: Allez, et frappez du tranchant de l’épée les habitants de Jabès en Galaad, avec les femmes et les enfants. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Voici ce que vous ferez: vous dévouerez par interdit '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 31:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tout mâle et toute femme qui a connu la couche d’un homme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils trouvèrent parmi les habitants de Jabès en Galaad quatre cents jeunes filles vierges qui n’avaient point connu d’homme en couchant avec lui, et ils les amenèrent dans le camp à Silo, qui est au pays de Canaan. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Toute l’assemblée envoya des messagers pour parler aux fils de Benjamin qui étaient au '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 20:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rocher de Rimmon, et pour leur annoncer la paix. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En ce temps-là, les Benjamites revinrent, et on leur donna les femmes à qui l’on avait laissé la vie parmi les femmes de Jabès en Galaad. Mais il n’y en avait pas assez pour eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le peuple éprouvait du repentir au sujet de Benjamin, car l’Éternel avait fait une brèche dans les tribus d’Israël. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les anciens de l’assemblée dirent: Que ferons-nous pour procurer des femmes à ceux qui restent, puisque les femmes de Benjamin ont été détruites? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et ils dirent: Que les réchappés de Benjamin conservent leur héritage, afin qu’une tribu ne soit pas effacée d’Israël. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais nous ne pouvons pas leur donner de nos filles pour femmes, car les enfants d’Israël ont juré, en disant: Maudit soit celui qui donnera une femme à un Benjamite! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Et ils dirent: Voici, il y a chaque année une fête de l’Éternel à Silo, qui est au nord de Béthel, à l’orient de la route qui monte de Béthel, à Sichem, et au midi de Lebona. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le peuple vint à Béthel, et il y resta devant Dieu jusqu’au soir. Ils élevèrent la voix, ils versèrent d’abondantes larmes, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Puis ils donnèrent cet ordre aux fils de Benjamin: Allez, et placez-vous en embuscade dans les vignes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Vous regarderez, et voici, lorsque les filles de Silo sortiront pour danser, vous sortirez des vignes, vous enlèverez chacun une des filles de Silo pour en faire votre femme, et vous vous en irez dans le pays de Benjamin. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Si leurs pères ou leurs frères viennent se plaindre auprès de nous, nous leur dirons: Accordez-les-nous, car nous n’avons pas pris une femme pour chacun dans la guerre. Ce n’est pas vous qui les leur avez données; en ce cas, vous seriez coupables. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ainsi firent les fils de Benjamin; ils prirent des femmes selon leur nombre parmi les danseuses qu’ils enlevèrent, puis ils partirent et retournèrent dans leur héritage; ils rebâtirent les villes, et y habitèrent. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Et dans le même temps les enfants d’Israël s’en allèrent de là chacun dans sa tribu et dans sa famille, ils retournèrent chacun dans son héritage. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 17:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: En ce temps-là, il n’y avait point de roi en Israël. Chacun faisait ce qui lui semblait bon.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et ils dirent: O Éternel, Dieu d’Israël, pourquoi est-il arrivé en Israël qu’il manque aujourd’hui une tribu d’Israël? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le lendemain, le peuple se leva de bon matin; ils bâtirent là un autel, et ils offrirent des holocaustes et des sacrifices d’actions de grâces. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les enfants d’Israël dirent: Quel est celui d’entre toutes les tribus d’Israël qui n’est pas monté à l’assemblée devant l’Éternel? Car on avait fait un serment solennel contre quiconque ne monterait pas vers l’Éternel à Mitspa, on avait dit: Il sera puni de mort. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les enfants d’Israël éprouvaient du repentir au sujet de Benjamin, leur frère, et ils disaient: Aujourd’hui une tribu a été retranchée d’Israël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Que ferons-nous pour procurer des femmes à ceux qui ont survécu, puisque nous avons juré par l’Éternel de ne pas leur donner de nos filles pour femmes? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils dirent donc: Y a-t-il quelqu’un d’entre les tribus d’Israël qui ne soit pas monté vers l’Éternel à Mitspa? Et voici, personne de Jabès en Galaad n’était venu au camp, à l’assemblée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'On fit le dénombrement du peuple, et il n’y avait là aucun des habitants de Jabès en Galaad. '
