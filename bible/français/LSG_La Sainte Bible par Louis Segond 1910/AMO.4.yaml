document_id: AMO.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre les femmes riches
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Am 3:9, etc. Mi 2:1-5; 3:1-4.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Écoutez cette parole, génisses de Basan qui êtes sur la montagne de Samarie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui opprimez les misérables, qui écrasez les indigents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui dites à vos maris: Apportez, et buvons!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le Seigneur, l’Éternel, l’a juré par sa sainteté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, les jours viendront pour vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où l’on vous enlèvera avec des crochets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et votre postérité avec des hameçons;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous sortirez par les brèches, chacune devant soi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous serez jetées dans la forteresse, dit l’Éternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Impénitence d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-13: cf. (És 1:11-15. Os 7:10-16. Jé 5:3.) Pr 29:1. Mi 6:9.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Allez à Béthel, et péchez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Allez à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:12
      metadata:
        usfm: HOS.12.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Guilgal, et péchez davantage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Offrez vos sacrifices chaque matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vos dîmes tous les trois jours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 2:1
      metadata:
        usfm: LEV.2.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: LEV.2.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:13
      metadata:
        usfm: LEV.7.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Faites vos sacrifices d’actions de grâces avec du levain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proclamez, publiez vos offrandes volontaires!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est là ce que vous aimez, enfants d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et moi, je vous ai envoyé la famine dans toutes vos villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le manque de pain dans toutes vos demeures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et moi, je vous ai refusé la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsqu’il y avait encore trois mois jusqu’à la moisson;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai fait pleuvoir sur une ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je n’ai pas fait pleuvoir sur une autre ville;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un champ a reçu la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un autre qui ne l’a pas reçue s’est desséché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Deux, trois villes sont allées vers une autre pour boire de l’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elles n’ont point apaisé leur soif.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je vous ai frappés par la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:22
      metadata:
        usfm: DEU.28.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rouille et par la nielle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos nombreux jardins, vos vignes, vos figuiers et vos oliviers
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ont été dévorés par les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 1:4
      metadata:
        usfm: JOL.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:25
      metadata:
        usfm: JOL.2.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sauterelles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J’ai envoyé parmi vous la peste, comme en Égypte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai tué vos jeunes gens par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et laissé prendre vos chevaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai fait monter à vos narines l’infection de votre camp.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je vous ai bouleversés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19:24
      metadata:
        usfm: GEN.19.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sodome et Gomorrhe, que Dieu détruisit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous avez été comme un tison arraché de l’incendie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est pourquoi je te traiterai de la même manière, Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et puisque je te traiterai de la même manière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prépare-toi à la rencontre de ton Dieu, ô Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car voici celui qui a formé les montagnes et créé le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Na 1:3
      metadata:
        usfm: NAM.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui fait connaître à l’homme ses pensées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui change l’aurore en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui marche sur les hauteurs de la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son nom est l’Éternel, le Dieu des armées.
