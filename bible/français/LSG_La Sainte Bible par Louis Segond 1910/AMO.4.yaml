document_id: AMO.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les femmes riches
  - type: heading
    content: 'V. 1-3: cf. Am 3:9, etc. Mi 2:1-5; 3:1-4.'
  - type: text
    content: Écoutez cette parole, génisses de Basan qui êtes sur la montagne de Samarie,
  - type: text
    content: Vous qui opprimez les misérables, qui écrasez les indigents,
  - type: text
    content: 'Et qui dites à vos maris: Apportez, et buvons!'
  '10':
  - type: text
    content: J’ai envoyé parmi vous la peste, comme en Égypte;
  - type: text
    content: J’ai tué vos jeunes gens par l’épée,
  - type: text
    content: Et laissé prendre vos chevaux;
  - type: text
    content: J’ai fait monter à vos narines l’infection de votre camp.
  - type: text
    content: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
  '11':
  - type: text
    content: Je vous ai bouleversés,
  - type: text
    content: 'Comme '
  - type: note
    content: Ge 19:24.
  - type: text
    content: Sodome et Gomorrhe, que Dieu détruisit;
  - type: text
    content: Et vous avez été comme un tison arraché de l’incendie.
  - type: text
    content: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel…
  '12':
  - type: text
    content: C’est pourquoi je te traiterai de la même manière, Israël;
  - type: text
    content: Et puisque je te traiterai de la même manière,
  - type: text
    content: Prépare-toi à la rencontre de ton Dieu, ô Israël!
  '13':
  - type: text
    content: 'Car voici celui qui a formé les montagnes et créé le '
  - type: note
    content: Na 1:3.
  - type: text
    content: vent,
  - type: text
    content: Et qui fait connaître à l’homme ses pensées,
  - type: text
    content: Celui qui change l’aurore en ténèbres,
  - type: text
    content: 'Et qui marche sur les hauteurs de la terre:'
  - type: text
    content: Son nom est l’Éternel, le Dieu des armées.
  '2':
  - type: text
    content: 'Le Seigneur, l’Éternel, l’a juré par sa sainteté:'
  - type: text
    content: Voici, les jours viendront pour vous
  - type: text
    content: Où l’on vous enlèvera avec des crochets,
  - type: text
    content: Et votre postérité avec des hameçons;
  '3':
  - type: text
    content: Vous sortirez par les brèches, chacune devant soi,
  - type: text
    content: Et vous serez jetées dans la forteresse, dit l’Éternel.
  - type: heading
    content: Impénitence d’Israël
  - type: heading
    content: 'V. 4-13: cf. (És 1:11-15. Os 7:10-16. Jé 5:3.) Pr 29:1. Mi 6:9.'
  '4':
  - type: text
    content: Allez à Béthel, et péchez!
  - type: text
    content: 'Allez à '
  - type: note
    content: Os 12:12.
  - type: text
    content: Guilgal, et péchez davantage!
  - type: text
    content: Offrez vos sacrifices chaque matin,
  - type: text
    content: Et vos dîmes tous les trois jours!
  '5':
  - type: text
    content: ' '
  - type: note
    content: Lé 2:1, 15; 7:13.
  - type: text
    content: Faites vos sacrifices d’actions de grâces avec du levain!
  - type: text
    content: Proclamez, publiez vos offrandes volontaires!
  - type: text
    content: Car c’est là ce que vous aimez, enfants d’Israël,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '6':
  - type: text
    content: Et moi, je vous ai envoyé la famine dans toutes vos villes,
  - type: text
    content: Le manque de pain dans toutes vos demeures.
  - type: text
    content: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
  '7':
  - type: text
    content: Et moi, je vous ai refusé la pluie,
  - type: text
    content: Lorsqu’il y avait encore trois mois jusqu’à la moisson;
  - type: text
    content: J’ai fait pleuvoir sur une ville,
  - type: text
    content: Et je n’ai pas fait pleuvoir sur une autre ville;
  - type: text
    content: Un champ a reçu la pluie,
  - type: text
    content: Et un autre qui ne l’a pas reçue s’est desséché.
  '8':
  - type: text
    content: Deux, trois villes sont allées vers une autre pour boire de l’eau,
  - type: text
    content: Et elles n’ont point apaisé leur soif.
  - type: text
    content: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
  '9':
  - type: text
    content: 'Je vous ai frappés par la '
  - type: note
    content: De 28:22.
  - type: text
    content: rouille et par la nielle;
  - type: text
    content: Vos nombreux jardins, vos vignes, vos figuiers et vos oliviers
  - type: text
    content: 'Ont été dévorés par les '
  - type: note
    content: Joë 1:4; 2:25.
  - type: text
    content: sauterelles.
  - type: text
    content: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
