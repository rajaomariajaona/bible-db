document_id: 2CH.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: HISTOIRE DU ROYAUME DE JUDA, DEPUIS LE SCHISME JUSQU’À LA CAPTIVITÉ
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Ch. 10 à 36. (Jé 25:4-11.)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Division du royaume: Roboam roi de Juda, Jéroboam roi d’Israël'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-19: cf. 1 R 12:1-19. És 30:1.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 R 12:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'Roboam se rendit à Sichem, car tout Israël était venu à Sichem pour le faire roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et voici ce que lui dirent les jeunes gens qui avaient grandi avec lui: Tu parleras ainsi à ce peuple qui t’a tenu ce langage: Ton père a rendu notre joug pesant, et toi, allège-le-nous! Tu leur parleras ainsi: Mon petit doigt est plus gros que les reins de mon père. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Maintenant, mon père vous a chargés d’un joug pesant, et moi je vous le rendrai plus pesant; mon père vous a châtiés avec des fouets, et moi je vous châtierai avec des scorpions. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jéroboam et tout le peuple vinrent à Roboam le troisième jour, suivant ce qu’avait dit le roi: Revenez vers moi dans trois jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi leur répondit durement. Le roi Roboam laissa le conseil des vieillards, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et leur parla ainsi d’après le conseil des jeunes gens: Mon père a rendu votre joug pesant, et moi je le rendrai plus pesant; mon père vous a châtiés avec des fouets, et moi je vous châtierai avec des scorpions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ainsi le roi n’écouta point le peuple; car cela fut dirigé par Dieu, en vue de l’accomplissement de la parole '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que l’Éternel avait dite par Achija de Silo à Jéroboam, fils de Nebath. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lorsque tout Israël vit que le roi ne l’écoutait pas, le peuple répondit au roi: Quelle part avons-nous avec David? Nous n’avons point d’héritage avec le fils d’Isaï! A tes tentes, Israël! Maintenant, pourvois à ta maison, David! Et tout Israël s’en alla dans ses tentes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les enfants d’Israël qui habitaient les villes de Juda furent les seuls sur qui régna Roboam. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors le roi Roboam envoya Hadoram, qui était préposé aux impôts. Mais Hadoram fut lapidé par les enfants d’Israël, et il mourut. Et le roi Roboam se hâta de monter sur un char, pour s’enfuir à Jérusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: C’est ainsi qu’Israël s’est détaché de la maison de David jusqu’à ce jour.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Lorsque Jéroboam, fils de Nebath, eut des nouvelles, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il était en Égypte, où il s’était enfui loin du roi Salomon, et il revint d’Égypte. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On l’envoya appeler. Alors Jéroboam et tout Israël vinrent vers Roboam et lui parlèrent ainsi: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ton père a rendu notre joug dur; maintenant allège cette rude servitude et le joug pesant que nous a imposé ton père. Et nous te servirons. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il leur dit: Revenez vers moi dans trois jours. Et le peuple s’en alla. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le roi Roboam consulta les vieillards qui avaient été auprès de Salomon, son père, pendant sa vie, et il dit: Que conseillez-vous de répondre à ce peuple? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et voici ce qu’ils lui dirent: Si tu es bon envers ce peuple, si tu les reçois favorablement, et si tu leur parles avec bienveillance, ils seront pour toujours tes serviteurs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Roboam laissa le conseil que lui donnaient les vieillards, et il consulta les jeunes gens qui avaient grandi avec lui et qui l’entouraient. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il leur dit: Que conseillez-vous de répondre à ce peuple qui me tient ce langage: Allège le joug que nous a imposé ton père? '
