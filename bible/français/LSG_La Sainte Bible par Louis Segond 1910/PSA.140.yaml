document_id: PSA.140
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 10; 64; 58; 59; 141 à 143.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Éternel, délivre-moi des hommes méchants!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préserve-moi des hommes violents,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qui méditent de mauvais desseins dans leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sont toujours prêts à faire la guerre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils aiguisent leur langue comme un serpent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 58:5
      metadata:
        usfm: PSA.58.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:13
      metadata:
        usfm: ROM.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils ont sous leurs lèvres un venin d’aspic. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Éternel, garantis-moi des mains du méchant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préserve-moi des hommes violents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui méditent de me faire tomber!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Des orgueilleux me tendent un piège et des filets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils placent des rets le long du chemin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 18:22
      metadata:
        usfm: JER.18.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils me dressent des embûches. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je dis à l’Éternel: Tu es mon Dieu!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, prête l’oreille à la voix de mes supplications!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Éternel, Seigneur, force de mon salut!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu couvres ma tête au jour du combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Éternel, n’accomplis pas les désirs du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ne laisse pas réussir ses projets, de peur qu’il ne s’en glorifie! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que sur la tête de ceux qui m’environnent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retombe l’iniquité de leurs lèvres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que des charbons ardents soient jetés sur eux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il les précipite dans le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans des abîmes, d’où ils ne se relèvent plus!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’homme dont la langue est fausse ne s’affermit pas sur la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’homme violent, le malheur l’entraîne à sa perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je sais que l’Éternel fait droit au misérable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Justice aux indigents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oui, les justes célébreront ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes droits habiteront devant ta face.
