document_id: PSA.140,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 10; 64; 58; 59; 141 à 143.
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Que sur la tête de ceux qui m’environnent
  - type: text
    content: Retombe l’iniquité de leurs lèvres!
  '11':
  - type: text
    content: Que des charbons ardents soient jetés sur eux!
  - type: text
    content: Qu’il les précipite dans le feu,
  - type: text
    content: Dans des abîmes, d’où ils ne se relèvent plus!
  '12':
  - type: text
    content: L’homme dont la langue est fausse ne s’affermit pas sur la terre;
  - type: text
    content: Et l’homme violent, le malheur l’entraîne à sa perte.
  '13':
  - type: text
    content: Je sais que l’Éternel fait droit au misérable,
  - type: text
    content: Justice aux indigents.
  '14':
  - type: text
    content: Oui, les justes célébreront ton nom,
  - type: text
    content: Les hommes droits habiteront devant ta face.
  '2':
  - type: text
    content: Éternel, délivre-moi des hommes méchants!
  - type: text
    content: Préserve-moi des hommes violents,
  '3':
  - type: text
    content: Qui méditent de mauvais desseins dans leur cœur,
  - type: text
    content: Et sont toujours prêts à faire la guerre!
  '4':
  - type: text
    content: Ils aiguisent leur langue comme un serpent,
  - type: note
    content: Ps 58:5. Ro 3:13.
  - type: text
    content: 'Ils ont sous leurs lèvres un venin d’aspic. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Éternel, garantis-moi des mains du méchant!
  - type: text
    content: Préserve-moi des hommes violents,
  - type: text
    content: Qui méditent de me faire tomber!
  '6':
  - type: text
    content: Des orgueilleux me tendent un piège et des filets,
  - type: text
    content: Ils placent des rets le long du chemin,
  - type: note
    content: Jé 18:22.
  - type: text
    content: 'Ils me dressent des embûches. '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: 'Je dis à l’Éternel: Tu es mon Dieu!'
  - type: text
    content: Éternel, prête l’oreille à la voix de mes supplications!
  '8':
  - type: text
    content: Éternel, Seigneur, force de mon salut!
  - type: text
    content: Tu couvres ma tête au jour du combat.
  '9':
  - type: text
    content: Éternel, n’accomplis pas les désirs du méchant,
  - type: text
    content: 'Ne laisse pas réussir ses projets, de peur qu’il ne s’en glorifie! '
  - type: text
    content: — Pause.
