document_id: 1KI.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La femme de Jéroboam et le prophète Achija
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. (1 R 11:28-39; 12:26-33.) 1 R 15:25-30. Jos 23:15. Ps 78:58, 59.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Dans ce temps-là, Abija, fils de Jéroboam, devint malade. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voilà pourquoi je vais faire venir le malheur sur la maison de Jéroboam; j’exterminerai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 25:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 9:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quiconque appartient à Jéroboam, celui qui est esclave et celui qui est libre en Israël, et je balaierai la maison de Jéroboam comme on balaie les ordures, jusqu’à ce qu’elle ait disparu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Celui de la maison de Jéroboam qui mourra dans la ville sera mangé par les chiens, et celui qui mourra dans les champs sera mangé par les oiseaux du ciel. Car l’Éternel a parlé. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et toi, lève-toi, va dans ta maison. Dès que tes pieds entreront dans la ville, l’enfant mourra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tout Israël le pleurera, et on l’enterrera; car il est le seul de la maison de Jéroboam qui sera mis dans un sépulcre, parce qu’il est le seul de la maison de Jéroboam en qui se soit trouvé quelque chose de bon devant l’Éternel, le Dieu d’Israël. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15:28
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel établira sur Israël un roi qui exterminera la maison de Jéroboam ce jour-là. Et n’est-ce pas déjà ce qui arrive? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L’Éternel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'frappera Israël, et il en sera de lui comme du roseau qui est agité dans les eaux; il arrachera Israël de ce bon pays qu’il avait donné à leurs pères, et il les dispersera de l’autre côté du fleuve, parce qu’ils se sont fait des idoles, irritant l’Éternel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il livrera Israël à cause des péchés que Jéroboam a commis et qu’il a fait commettre à Israël. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La femme de Jéroboam se leva, et partit. Elle arriva à Thirtsa; et, comme elle atteignait le seuil de la maison, l’enfant mourut. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On l’enterra, et tout Israël le pleura, selon la parole que l’Éternel avait dite par son serviteur Achija, le prophète.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Jéroboam
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-20: cf. 2 Ch 13:2-20. Ec 8:13.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le reste des actions de Jéroboam, comment il fit la guerre et comment il régna, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et Jéroboam dit à sa femme: Lève-toi, je te prie, et déguise-toi pour qu’on ne sache pas que tu es la femme de Jéroboam, et va à Silo. Voici, là est Achija, le prophète; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 11:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est lui qui m’a dit que je serais roi de ce peuple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Jéroboam régna vingt-deux ans, puis il se coucha avec ses pères. Et Nadab, son fils, régna à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le royaume de Juda sous Roboam. — Idolâtrie. — Invasion de Schischak, roi d’Égypte. — Mort de Roboam
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-31: cf. 2 Ch 12. Jé 2:19.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 12:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Roboam, fils de Salomon, régna sur Juda. Il avait quarante et un ans lorsqu’il devint roi, et il régna dix-sept ans à Jérusalem, la ville que l’Éternel avait choisie sur toutes les tribus d’Israël pour y mettre son nom. Sa mère s’appelait Naama, l’Ammonite. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Juda fit ce qui est mal aux yeux de l’Éternel; et, par les péchés qu’ils commirent, ils excitèrent sa jalousie plus que ne l’avaient jamais fait leurs pères. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils se bâtirent, eux aussi, des hauts lieux avec des statues et des idoles sur toute colline élevée et sous tout arbre vert. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il y eut même des prostitués dans le pays. Ils imitèrent toutes les abominations des nations que l’Éternel avait chassées devant les enfants d’Israël. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'La cinquième année du règne de Roboam, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 12:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Schischak, roi d’Égypte, monta contre Jérusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il prit les trésors de la maison de l’Éternel et les trésors de la maison du roi, il prit tout. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il prit tous les boucliers d’or que Salomon avait faits. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le roi Roboam fit à leur place des boucliers d’airain, et il les remit aux soins des chefs des coureurs, qui gardaient l’entrée de la maison du roi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Toutes les fois que le roi allait à la maison de l’Éternel, les coureurs les portaient; puis ils les rapportaient dans la chambre des coureurs. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le reste des actions de Roboam, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Prends avec toi dix pains, des gâteaux et un vase de miel, et entre chez lui; il te dira ce qui arrivera à l’enfant. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il y eut toujours guerre entre Roboam et Jéroboam. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Roboam se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David. Sa mère s’appelait Naama, l’Ammonite. Et Abijam, son fils, régna à sa place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La femme de Jéroboam fit ainsi; elle se leva, alla à Silo, et entra dans la maison d’Achija. Achija ne pouvait plus voir, car il avait les yeux fixes par suite de la vieillesse. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Éternel avait dit à Achija: La femme de Jéroboam va venir te consulter au sujet de son fils, parce qu’il est malade. Tu lui parleras de telle et de telle manière. Quand elle arrivera, elle se donnera pour une autre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Lorsque Achija entendit le bruit de ses pas, au moment où elle franchissait la porte, il dit: Entre, femme de Jéroboam; pourquoi veux-tu te donner pour une autre? Je suis chargé de t’annoncer des choses dures. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Va, dis à Jéroboam: Ainsi parle l’Éternel, le Dieu d’Israël: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 12:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je t’ai élevé du milieu du peuple, je t’ai établi chef de mon peuple d’Israël, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'j’ai arraché le royaume de la maison de David et je te l’ai donné. Et tu n’as pas été comme mon serviteur David, qui a observé mes commandements et qui a marché après moi de tout son cœur, ne faisant que ce qui est droit à mes yeux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tu as agi plus mal que tous ceux qui ont été avant toi, tu es allé te faire d’autres dieux, et des images de fonte pour m’irriter, et tu m’as rejeté derrière ton dos! '
