document_id: JOS.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: PARTAGE DU PAYS DE CANAAN
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Ch. 13 à 24. (Mi 4:4)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Partage du pays à l’orient du Jourdain
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (Jg 3:1-5; 1:27-36.) (Hé 5:12; 6:11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué était vieux, avancé en âge. L’Éternel lui dit alors: Tu es devenu vieux, tu es avancé en âge, et le pays qui te reste à soumettre est très grand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toutes les villes de Sihon, roi des Amoréens, qui régnait à Hesbon, jusqu’à la frontière des enfants d’Ammon; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Galaad, le territoire des Gueschuriens et des Maacathiens, toute la montagne d’Hermon, et tout Basan, jusqu’à Salca; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tout le royaume d’Og en Basan, qui régnait à Aschtaroth et à Édréï, et qui était le seul reste des Rephaïm. Moïse battit ces rois, et les chassa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les enfants d’Israël ne chassèrent point les Gueschuriens et les Maacathiens, qui ont habité au milieu d’Israël jusqu’à ce jour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La tribu de Lévi fut la seule à laquelle Moïse ne donna point d’héritage; les sacrifices consumés par le feu devant l’Éternel, le Dieu d’Israël, tel fut son héritage, comme il le lui avait dit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse avait donné à la tribu des fils de Ruben une part selon leurs familles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils eurent pour territoire, à partir d’Aroër sur les bords du torrent d’Arnon, et de la ville qui est au milieu de la vallée, toute la plaine près de Médeba, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hesbon et toutes ses villes dans la plaine, Dibon, Bamoth-Baal, Beth-Baal-Meon, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jahats, Kedémoth, Méphaath, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kirjathaïm, Sibma, Tséreth-Haschachar sur la montagne de la vallée, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le pays qui reste: tous les districts des Philistins et tout le territoire des Gueschuriens, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth-Peor, les coteaux du Pisga, Beth-Jeschimoth, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toutes les villes de la plaine, et tout le royaume de Sihon, roi des Amoréens, qui régnait à Hesbon: Moïse l’avait battu, lui et les princes de Madian, Évi, Rékem, Tsur, Hur et Réba, princes qui relevaient de Sihon et qui habitaient dans le pays. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi ceux que tuèrent les enfants d’Israël, ils avaient aussi fait périr avec l’épée le devin '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 31:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Balaam, fils de Beor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Jourdain servait de limite au territoire des fils de Ruben. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 34:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voilà l’héritage des fils de Ruben selon leurs familles; les villes et leurs villages. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse avait donné à la tribu de Gad, aux fils de Gad, une part selon leurs familles. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils eurent pour territoire Jaezer, toutes les villes de Galaad, la moitié du pays des enfants d’Ammon jusqu’à Aroër vis-à-vis de Rabba, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'depuis Hesbon jusqu’à Ramath-Mitspé et Bethonim, depuis Mahanaïm jusqu’à la frontière de Debir, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et, dans la vallée, Beth-Haram, Beth-Nimra, Succoth et Tsaphon, reste du royaume de Sihon, roi de Hesbon, ayant le Jourdain pour limite jusqu’à l’extrémité de la mer de Kinnéreth de l’autre côté du Jourdain, à l’orient. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà l’héritage des fils de Gad selon leurs familles; les villes et leurs villages. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse avait donné à la demi-tribu de Manassé, aux fils de Manassé, une part selon leurs familles. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'depuis le Schichor qui coule devant l’Égypte jusqu’à la frontière d’Ékron au nord, contrée qui doit être tenue pour cananéenne, et qui est occupée par les cinq princes des Philistins, celui de Gaza, celui d’Asdod, celui d’Askalon, celui de Gath et celui d’Ékron, et par les Avviens; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils eurent pour territoire, à partir de Mahanaïm, tout Basan, tout le royaume d’Og, roi de Basan, et tous les bourgs de Jaïr en Basan, soixante villes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La moitié de Galaad, Aschtaroth et Édréï, villes du royaume d’Og en Basan, échurent aux fils de Makir, fils de Manassé, à la moitié des fils de Makir, selon leurs familles. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telles sont les parts que fit Moïse, lorsqu’il était dans les plaines de Moab, de l’autre côté du Jourdain, vis-à-vis de Jéricho, à l’orient. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse ne donna point d’héritage à la tribu de Lévi; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 18:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Éternel, le Dieu d’Israël, tel fut son héritage, comme il le lui avait dit.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à partir du midi, tout le pays des Cananéens, et Meara qui est aux Sidoniens, jusqu’à Aphek, jusqu’à la frontière des Amoréens; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le pays des Guibliens, et tout le Liban vers le soleil levant, depuis Baal-Gad au pied de la montagne d’Hermon jusqu’à l’entrée de Hamath; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tous les habitants de la montagne, depuis le Liban jusqu’à Misrephoth-Maïm, tous les Sidoniens. Je les chasserai devant les enfants d’Israël. Donne seulement ce pays en héritage par le sort à Israël, comme je te l’ai prescrit; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et divise maintenant ce pays par portions entre les neuf tribus et la demi-tribu de Manassé.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-33: cf. No 32. De 3:8-17.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Rubénites et les Gadites, avec l’autre moitié de la tribu de Manassé, ont reçu leur héritage, que Moïse leur a donné de l’autre côté du Jourdain, à l’orient, comme le leur a donné Moïse, serviteur de l’Éternel: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'depuis Aroër sur les bords du torrent de l’Arnon, et depuis la ville qui est au milieu de la vallée, toute la plaine de Médeba, jusqu’à Dibon; '
