document_id: REV.9
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Ex 10:12-15. Joë 2:1-11.) Ap 16:10, 11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le cinquième ange sonna de la trompette. Et je vis une étoile qui était tombée du ciel sur la terre. La clef du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:31
      metadata:
        usfm: LUK.8.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 17:8
      metadata:
        usfm: REV.17.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'puits de l’abîme lui fut donnée, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et elle ouvrit le puits de l’abîme. Et il monta du puits une fumée, comme la fumée d’une grande fournaise; et le soleil et l’air furent obscurcis par la fumée du puits. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De la fumée sortirent des sauterelles, qui se répandirent sur la terre; et il leur fut donné un pouvoir comme le pouvoir qu’ont les scorpions de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il leur fut dit de ne point '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 6:6
      metadata:
        usfm: REV.6.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'faire de mal à l’herbe de la terre, ni à aucune verdure, ni à aucun arbre, mais seulement aux hommes qui n’avaient pas le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 9:4
      metadata:
        usfm: EZK.9.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 7:3
      metadata:
        usfm: REV.7.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sceau de Dieu sur le front. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur fut donné, non de les tuer, mais de les tourmenter pendant cinq mois; et le tourment qu’elles causaient était comme le tourment que cause le scorpion, quand il pique un homme. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 2:19
      metadata:
        usfm: ISA.2.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 8:3
      metadata:
        usfm: JER.8.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 10:8
      metadata:
        usfm: HOS.10.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:30
      metadata:
        usfm: LUK.23.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 6:16
      metadata:
        usfm: REV.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, les hommes chercheront la mort, et ils ne la trouveront pas; ils désireront mourir, et la mort fuira loin d’eux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 10:4
      metadata:
        usfm: EXO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ces sauterelles ressemblaient à des chevaux préparés pour le combat; il y avait sur leurs têtes comme des couronnes semblables à de l’or, et leurs visages étaient comme des visages d’hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elles avaient des cheveux comme des cheveux de femmes, et leurs dents étaient comme des dents de lions. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elles avaient des cuirasses comme des cuirasses de fer, et le bruit de leurs ailes était comme un bruit de chars à plusieurs chevaux qui courent au combat. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elles avaient des queues semblables à des scorpions et des aiguillons, et c’est dans leurs queues qu’était le pouvoir de faire du mal aux hommes pendant cinq mois. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elles avaient sur elles comme roi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 9:1
      metadata:
        usfm: REV.9.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’ange de l’abîme, nommé en hébreu Abaddon, et en grec Apollyon. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 8:13
      metadata:
        usfm: REV.8.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le premier malheur est passé. Voici il vient encore deux malheurs après cela.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-21: cf. És 5:26-30. Am 4:6-12. Ap 16:12-16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le sixième ange sonna de la trompette. Et j’entendis une voix venant des quatre cornes de l’autel d’or qui est devant Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et disant au sixième ange qui avait la trompette: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 7:1
      metadata:
        usfm: REV.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Délie les quatre anges qui sont liés sur le grand fleuve d’Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et les quatre anges qui étaient prêts pour l’heure, le jour, le mois et l’année, furent déliés afin qu’ils tuassent le tiers des hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le nombre des cavaliers de l’armée était de deux myriades de myriades: j’en entendis le nombre. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et ainsi je vis les chevaux dans la vision, et ceux qui les montaient, ayant des cuirasses couleur de feu, d’hyacinthe, et de soufre. Les têtes des chevaux étaient comme des têtes de lions; et de leurs bouches il sortait du feu, de la fumée, et du soufre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le tiers des hommes fut tué par ces trois fléaux, par le feu, par la fumée, et par le soufre, qui sortaient de leurs bouches. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car le pouvoir des chevaux était dans leurs bouches et dans leurs queues; leurs queues étaient semblables à des serpents ayant des têtes, et c’est avec elles qu’ils faisaient du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les autres hommes qui ne furent pas tués par ces fléaux ne se repentirent pas des œuvres de leurs mains, de manière à ne point adorer les démons, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 115:4
      metadata:
        usfm: PSA.115.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: PSA.115.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.115.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: PSA.115.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 135:15
      metadata:
        usfm: PSA.135.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et les idoles d’or, d’argent, d’airain, de pierre et de bois, qui ne peuvent ni voir, ni entendre, ni marcher; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: et ils ne se repentirent pas de leurs meurtres, ni de leurs enchantements, ni de leur impudicité ni de leurs vols.
