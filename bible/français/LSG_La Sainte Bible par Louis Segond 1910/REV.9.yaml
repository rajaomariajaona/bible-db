document_id: REV.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. (Ex 10:12-15. Joë 2:1-11.) Ap 16:10, 11.'
  - type: text
    content: 'Le cinquième ange sonna de la trompette. Et je vis une étoile qui était tombée du ciel sur la terre. La clef du '
  - type: note
    content: Lu 8:31. Ap 17:8.
  - type: text
    content: 'puits de l’abîme lui fut donnée, '
  '10':
  - type: text
    content: 'Elles avaient des queues semblables à des scorpions et des aiguillons, et c’est dans leurs queues qu’était le pouvoir de faire du mal aux hommes pendant cinq mois. '
  '11':
  - type: text
    content: 'Elles avaient sur elles comme roi '
  - type: note
    content: Ap 9:1.
  - type: text
    content: 'l’ange de l’abîme, nommé en hébreu Abaddon, et en grec Apollyon. '
  '12':
  - type: note
    content: Ap 8:13.
  - type: text
    content: Le premier malheur est passé. Voici il vient encore deux malheurs après cela.
  - type: heading
    content: 'V. 13-21: cf. És 5:26-30. Am 4:6-12. Ap 16:12-16.'
  '13':
  - type: text
    content: 'Le sixième ange sonna de la trompette. Et j’entendis une voix venant des quatre cornes de l’autel d’or qui est devant Dieu, '
  '14':
  - type: text
    content: 'et disant au sixième ange qui avait la trompette: '
  - type: note
    content: Ap 7:1.
  - type: text
    content: 'Délie les quatre anges qui sont liés sur le grand fleuve d’Euphrate. '
  '15':
  - type: text
    content: 'Et les quatre anges qui étaient prêts pour l’heure, le jour, le mois et l’année, furent déliés afin qu’ils tuassent le tiers des hommes. '
  '16':
  - type: text
    content: 'Le nombre des cavaliers de l’armée était de deux myriades de myriades: j’en entendis le nombre. '
  '17':
  - type: text
    content: 'Et ainsi je vis les chevaux dans la vision, et ceux qui les montaient, ayant des cuirasses couleur de feu, d’hyacinthe, et de soufre. Les têtes des chevaux étaient comme des têtes de lions; et de leurs bouches il sortait du feu, de la fumée, et du soufre. '
  '18':
  - type: text
    content: 'Le tiers des hommes fut tué par ces trois fléaux, par le feu, par la fumée, et par le soufre, qui sortaient de leurs bouches. '
  '19':
  - type: text
    content: 'Car le pouvoir des chevaux était dans leurs bouches et dans leurs queues; leurs queues étaient semblables à des serpents ayant des têtes, et c’est avec elles qu’ils faisaient du mal. '
  '2':
  - type: text
    content: 'et elle ouvrit le puits de l’abîme. Et il monta du puits une fumée, comme la fumée d’une grande fournaise; et le soleil et l’air furent obscurcis par la fumée du puits. '
  '20':
  - type: text
    content: 'Les autres hommes qui ne furent pas tués par ces fléaux ne se repentirent pas des œuvres de leurs mains, de manière à ne point adorer les démons, '
  - type: note
    content: Ps 115:4, 5, 6, 7; 135:15.
  - type: text
    content: 'et les idoles d’or, d’argent, d’airain, de pierre et de bois, qui ne peuvent ni voir, ni entendre, ni marcher; '
  '21':
  - type: text
    content: et ils ne se repentirent pas de leurs meurtres, ni de leurs enchantements, ni de leur impudicité ni de leurs vols.
  '3':
  - type: text
    content: 'De la fumée sortirent des sauterelles, qui se répandirent sur la terre; et il leur fut donné un pouvoir comme le pouvoir qu’ont les scorpions de la terre. '
  '4':
  - type: text
    content: 'Il leur fut dit de ne point '
  - type: note
    content: Ap 6:6.
  - type: text
    content: 'faire de mal à l’herbe de la terre, ni à aucune verdure, ni à aucun arbre, mais seulement aux hommes qui n’avaient pas le '
  - type: note
    content: Éz 9:4. Ap 7:3.
  - type: text
    content: 'sceau de Dieu sur le front. '
  '5':
  - type: text
    content: 'Il leur fut donné, non de les tuer, mais de les tourmenter pendant cinq mois; et le tourment qu’elles causaient était comme le tourment que cause le scorpion, quand il pique un homme. '
  '6':
  - type: note
    content: És 2:19. Jé 8:3. Os 10:8. Lu 23:30. Ap 6:16.
  - type: text
    content: 'En ces jours-là, les hommes chercheront la mort, et ils ne la trouveront pas; ils désireront mourir, et la mort fuira loin d’eux. '
  '7':
  - type: note
    content: Ex 10:4.
  - type: text
    content: 'Ces sauterelles ressemblaient à des chevaux préparés pour le combat; il y avait sur leurs têtes comme des couronnes semblables à de l’or, et leurs visages étaient comme des visages d’hommes. '
  '8':
  - type: text
    content: 'Elles avaient des cheveux comme des cheveux de femmes, et leurs dents étaient comme des dents de lions. '
  '9':
  - type: text
    content: 'Elles avaient des cuirasses comme des cuirasses de fer, et le bruit de leurs ailes était comme un bruit de chars à plusieurs chevaux qui courent au combat. '
