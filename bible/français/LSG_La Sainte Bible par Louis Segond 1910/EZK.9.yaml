document_id: EZK.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Châtiment infligé à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Ap 7:2-8; 9:4.) 2 Ch 36:14-17. (Mal 3:16-18; 4:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis il cria d’une voix forte à mes oreilles: Approchez, vous qui devez châtier la ville, chacun son instrument de destruction à la main! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et voici, six hommes arrivèrent par le chemin de la porte supérieure du côté du septentrion, chacun son instrument de destruction à la main. Il y avait au milieu d’eux un homme vêtu de lin, et portant une écritoire à la ceinture. Ils vinrent se placer près de l’autel d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La gloire du Dieu d’Israël s’éleva du chérubin sur lequel elle était, et se dirigea vers le seuil de la maison; et il appela l’homme vêtu de lin, et portant une écritoire à la ceinture. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel lui dit: Passe au milieu de la ville, au milieu de Jérusalem, et fais une marque sur le front des hommes qui soupirent et qui gémissent à cause de toutes les abominations qui s’y commettent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et, à mes oreilles, il dit aux autres: Passez après lui dans la ville, et frappez; que votre œil soit sans pitié, et n’ayez point de miséricorde! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tuez, détruisez les vieillards, les jeunes hommes, les vierges, les enfants et les femmes; mais n’approchez pas de quiconque aura sur lui la marque; et commencez par mon sanctuaire! Ils commencèrent par les anciens qui étaient devant la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il leur dit: Souillez la maison, et remplissez de morts les parvis!… Sortez!… Ils sortirent, et ils frappèrent dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comme ils frappaient, et que je restais encore, je tombai sur ma face, et je m’écriai: Ah! Seigneur Éternel, détruiras-tu tout ce qui reste d’Israël, en répandant ta fureur sur Jérusalem? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il me répondit: L’iniquité de la maison d’Israël et de Juda est grande, excessive; le pays est rempli de meurtres, la ville est pleine d’injustice, car ils disent: L’Éternel a abandonné le pays, l’Éternel ne voit rien. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moi aussi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 5:11
      metadata:
        usfm: EZK.5.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:4
      metadata:
        usfm: EZK.7.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:18
      metadata:
        usfm: EZK.8.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je serai sans pitié, et je n’aurai point de miséricorde; je ferai retomber leurs œuvres sur leur tête. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et voici, l’homme vêtu de lin, et portant une écritoire à la ceinture, rendit cette réponse: J’ai fait ce que tu m’as ordonné.'
