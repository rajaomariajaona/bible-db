document_id: ISA.50,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches de l’Éternel à son peuple
  - type: heading
    content: 'V. 1-3: cf. (És 59:1-4. Jé 3:6-8.) Jé 32:17-23.'
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Où est la lettre de divorce par laquelle j’ai répudié votre mère?
  - type: text
    content: Ou bien, auquel de mes créanciers vous ai-je vendus?
  - type: text
    content: Voici, c’est à cause de vos iniquités que vous avez été vendus,
  - type: text
    content: Et c’est à cause de vos péchés que votre mère a été répudiée.
  '10':
  - type: text
    content: Quiconque parmi vous craint l’Éternel,
  - type: text
    content: Qu’il écoute la voix de son serviteur!
  - type: text
    content: Quiconque marche dans l’obscurité et manque de lumière,
  - type: text
    content: Qu’il se confie dans le nom de l’Éternel,
  - type: text
    content: Et qu’il s’appuie sur son Dieu!
  '11':
  - type: text
    content: Voici, vous tous qui allumez un feu,
  - type: text
    content: Et qui êtes armés de torches,
  - type: text
    content: Allez au milieu de votre feu et de vos torches enflammées!
  - type: text
    content: C’est par ma main que ces choses vous arriveront;
  - type: text
    content: Vous vous coucherez dans la douleur.
  '2':
  - type: text
    content: 'Je suis venu: pourquoi n’y avait-il personne?'
  - type: text
    content: 'J’ai appelé: pourquoi personne n’a-t-il répondu?'
  - type: note
    content: No 11:23. És 59:1.
  - type: text
    content: Ma main est-elle trop courte pour racheter?
  - type: text
    content: N’ai-je pas assez de force pour délivrer?
  - type: text
    content: Par ma menace, je dessèche la mer,
  - type: text
    content: Je réduis les fleuves en désert;
  - type: text
    content: Leurs poissons se corrompent, faute d’eau,
  - type: text
    content: Et ils périssent de soif.
  '3':
  - type: text
    content: Je revêts les cieux d’obscurité,
  - type: text
    content: Et je fais d’un sac leur couverture.
  - type: heading
    content: Le serviteur de l’Éternel outragé et secouru
  - type: heading
    content: 'V. 4-11: cf. (Ps 40:7-14. Lu 18:31-33. Ph 2:5-11. Hé 5:7-10.) La 3:19-33.'
  '4':
  - type: text
    content: Le Seigneur, l’Éternel, m’a donné une langue exercée,
  - type: text
    content: Pour que je sache soutenir par la parole celui qui est abattu;
  - type: text
    content: Il éveille, chaque matin, il éveille mon oreille,
  - type: text
    content: Pour que j’écoute comme écoutent des disciples.
  '5':
  - type: text
    content: Le Seigneur, l’Éternel, m’a ouvert l’oreille,
  - type: note
    content: Jn 14:31. Ph 2:8. Hé 10:5, etc.
  - type: text
    content: Et je n’ai point résisté,
  - type: text
    content: Je ne me suis point retiré en arrière.
  '6':
  - type: text
    content: J’ai livré mon dos à ceux qui me frappaient,
  - type: text
    content: Et mes joues à ceux qui m’arrachaient la barbe;
  - type: text
    content: Je n’ai pas dérobé mon visage
  - type: text
    content: Aux ignominies et aux crachats.
  '7':
  - type: text
    content: Mais le Seigneur, l’Éternel, m’a secouru;
  - type: text
    content: C’est pourquoi je n’ai point été déshonoré,
  - type: text
    content: C’est pourquoi j’ai rendu mon visage semblable à un caillou,
  - type: text
    content: Sachant que je ne serais point confondu.
  '8':
  - type: text
    content: 'Celui '
  - type: note
    content: Ro 8:32, 33.
  - type: text
    content: 'qui me justifie est proche:'
  - type: text
    content: Qui disputera contre moi?
  - type: text
    content: Comparaissons ensemble!
  - type: text
    content: Qui est mon adversaire?
  - type: text
    content: Qu’il s’avance vers moi!
  '9':
  - type: text
    content: 'Voici, le Seigneur, l’Éternel, me secourra:'
  - type: text
    content: Qui me condamnera?
  - type: text
    content: Voici, ils tomberont tous en lambeaux comme un vêtement,
  - type: text
    content: La teigne les dévorera.
