document_id: ISA.50,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches de l’Éternel à son peuple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. (És 59:1-4. Jé 3:6-8.) Jé 32:17-23.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est la lettre de divorce par laquelle j’ai répudié votre mère?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou bien, auquel de mes créanciers vous ai-je vendus?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, c’est à cause de vos iniquités que vous avez été vendus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est à cause de vos péchés que votre mère a été répudiée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quiconque parmi vous craint l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il écoute la voix de son serviteur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiconque marche dans l’obscurité et manque de lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il se confie dans le nom de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il s’appuie sur son Dieu!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Voici, vous tous qui allumez un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui êtes armés de torches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allez au milieu de votre feu et de vos torches enflammées!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par ma main que ces choses vous arriveront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous vous coucherez dans la douleur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je suis venu: pourquoi n’y avait-il personne?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai appelé: pourquoi personne n’a-t-il répondu?'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ma main est-elle trop courte pour racheter?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ai-je pas assez de force pour délivrer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ma menace, je dessèche la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je réduis les fleuves en désert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs poissons se corrompent, faute d’eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils périssent de soif.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je revêts les cieux d’obscurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je fais d’un sac leur couverture.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le serviteur de l’Éternel outragé et secouru
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-11: cf. (Ps 40:7-14. Lu 18:31-33. Ph 2:5-11. Hé 5:7-10.) La 3:19-33.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le Seigneur, l’Éternel, m’a donné une langue exercée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que je sache soutenir par la parole celui qui est abattu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il éveille, chaque matin, il éveille mon oreille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que j’écoute comme écoutent des disciples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le Seigneur, l’Éternel, m’a ouvert l’oreille,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:8
      - type: text
        text: . Hé 10:5, etc.
      marker-yv: yv-n
    - type: text
      text: Et je n’ai point résisté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne me suis point retiré en arrière.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’ai livré mon dos à ceux qui me frappaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes joues à ceux qui m’arrachaient la barbe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’ai pas dérobé mon visage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux ignominies et aux crachats.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Mais le Seigneur, l’Éternel, m’a secouru;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je n’ai point été déshonoré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi j’ai rendu mon visage semblable à un caillou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sachant que je ne serais point confondu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Celui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:32
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui me justifie est proche:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui disputera contre moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comparaissons ensemble!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est mon adversaire?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il s’avance vers moi!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voici, le Seigneur, l’Éternel, me secourra:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me condamnera?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, ils tomberont tous en lambeaux comme un vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La teigne les dévorera.
