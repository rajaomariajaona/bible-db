document_id: ECC.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. (Lu 16:19-26. Mt 16:26, 27.) 1 Jn 2:15-17.'
  - type: text
    content: 'J’ai dit en mon cœur: Allons! Je t’éprouverai par la joie, '
  - type: note
    content: Lu 12:19.
  - type: text
    content: 'et tu goûteras le bonheur. Et voici, c’est encore là une vanité. '
  '10':
  - type: text
    content: 'Tout ce que mes yeux avaient désiré, je ne les en ai point privés; je n’ai refusé à mon cœur aucune joie; car mon cœur prenait plaisir à tout mon travail, et c’est la part qui m’en est revenue. '
  '11':
  - type: text
    content: Puis, j’ai considéré tous les ouvrages que mes mains avaient faits, et la peine que j’avais prise à les exécuter; et voici, tout est vanité et poursuite du vent, et il n’y a aucun avantage à tirer de ce qu’on fait sous le soleil.
  - type: heading
    content: 'V. 12-26: cf. (Ec 8:1, 5, 6; 9:1-9.) Ps 49:7, etc.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ec 1:17; 7:23.
  - type: text
    content: 'Alors j’ai tourné mes regards vers la sagesse, et vers la sottise et la folie. Car que fera l’homme qui succédera au roi? Ce qu’on a déjà fait. '
  '13':
  - type: text
    content: 'Et j’ai vu que la sagesse a de l’avantage sur la folie, comme la lumière a de l’avantage sur les ténèbres; '
  '14':
  - type: text
    content: 'le sage a ses yeux à la tête, et l’insensé marche dans les ténèbres. Mais j’ai reconnu aussi qu’ils ont l’un et l’autre un même sort. '
  '15':
  - type: text
    content: 'Et j’ai dit en mon cœur: J’aurai le même sort que l’insensé; pourquoi donc ai-je été plus sage? Et j’ai dit en mon cœur que c’est encore là une vanité. '
  '16':
  - type: text
    content: 'Car la mémoire du sage n’est pas plus éternelle que celle de l’insensé, puisque déjà les jours qui suivent, tout est oublié. Eh quoi! Le sage meurt aussi bien que l’insensé! '
  '17':
  - type: text
    content: 'Et j’ai haï la vie, car ce qui se fait sous le soleil m’a déplu, car tout est vanité et poursuite du vent. '
  '18':
  - type: text
    content: 'J’ai haï tout le travail que j’ai fait sous le soleil, et dont je dois laisser la jouissance à l’homme qui me succédera. '
  '19':
  - type: text
    content: 'Et qui sait s’il sera sage ou insensé? Cependant il sera maître de tout mon travail, de tout le fruit de ma sagesse sous le soleil. C’est encore là une vanité. '
  '2':
  - type: text
    content: 'J’ai dit du rire: Insensé! Et de la joie: A quoi sert-elle? '
  '20':
  - type: text
    content: 'Et j’en suis venu à livrer mon cœur au désespoir, à cause de tout le travail que j’ai fait sous le soleil. '
  '21':
  - type: text
    content: 'Car tel homme a travaillé avec sagesse et science et avec succès, et il laisse le produit de son travail à un homme qui ne s’en est point occupé. C’est encore là une vanité et un grand mal. '
  '22':
  - type: note
    content: Ec 1:3; 3:9.
  - type: text
    content: 'Que revient-il, en effet, à l’homme de tout son travail et de la préoccupation de son cœur, objet de ses fatigues sous le soleil? '
  '23':
  - type: text
    content: 'Tous ses jours ne sont que douleur, et son partage n’est que chagrin; même la nuit son cœur ne repose pas. C’est encore là une vanité. '
  '24':
  - type: note
    content: Ec 3:12, 22; 5:18; 8:15.
  - type: text
    content: 'Il n’y a de bonheur pour l’homme qu’à manger et à boire, et à faire jouir son âme du bien-être, au milieu de son travail; mais j’ai vu que cela aussi vient de la main de Dieu. '
  '25':
  - type: text
    content: 'Qui, en effet, peut manger et jouir, si ce n’est moi? '
  '26':
  - type: text
    content: 'Car il donne à l’homme qui lui est agréable la sagesse, la science et la joie; mais il donne au pécheur le soin de recueillir et d’amasser, '
  - type: note
    content: Job 27:16, 17. Pr 28:8. Ec 3:13.
  - type: text
    content: afin de donner à celui qui est agréable à Dieu. C’est encore là une vanité et la poursuite du vent.
  '3':
  - type: text
    content: 'Je résolus en mon cœur de livrer ma chair au vin, tandis que mon cœur me conduirait avec sagesse, et de m’attacher à la folie jusqu’à ce que je visse ce qu’il est bon pour les fils de l’homme de faire sous les cieux pendant le nombre des jours de leur vie. '
  '4':
  - type: text
    content: 'J’exécutai de grands ouvrages: je me bâtis des maisons; je me plantai des vignes; '
  '5':
  - type: text
    content: 'je me fis des jardins et des vergers, et j’y plantai des arbres à fruit de toute espèce; '
  '6':
  - type: text
    content: 'je me créai des étangs, pour arroser la forêt où croissaient les arbres. '
  '7':
  - type: text
    content: 'J’achetai des serviteurs et des servantes, et j’eus leurs enfants nés dans la maison; je possédai des troupeaux de bœufs et de brebis, plus que tous ceux qui étaient avant moi dans Jérusalem. '
  '8':
  - type: text
    content: 'Je m’amassai de l’argent et de l’or, et les richesses des rois et des provinces. Je me procurai des chanteurs et des chanteuses, et les délices des fils de l’homme, des femmes en grand nombre. '
  '9':
  - type: text
    content: 'Je devins grand, plus grand que tous ceux qui étaient avant moi dans Jérusalem. Et même ma sagesse demeura avec moi. '
