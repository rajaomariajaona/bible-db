document_id: ECC.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Lu 16:19-26. Mt 16:26, 27.) 1 Jn 2:15-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J’ai dit en mon cœur: Allons! Je t’éprouverai par la joie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:19
      metadata:
        usfm: LUK.12.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et tu goûteras le bonheur. Et voici, c’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J’ai dit du rire: Insensé! Et de la joie: A quoi sert-elle? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je résolus en mon cœur de livrer ma chair au vin, tandis que mon cœur me conduirait avec sagesse, et de m’attacher à la folie jusqu’à ce que je visse ce qu’il est bon pour les fils de l’homme de faire sous les cieux pendant le nombre des jours de leur vie. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’exécutai de grands ouvrages: je me bâtis des maisons; je me plantai des vignes; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'je me fis des jardins et des vergers, et j’y plantai des arbres à fruit de toute espèce; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'je me créai des étangs, pour arroser la forêt où croissaient les arbres. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’achetai des serviteurs et des servantes, et j’eus leurs enfants nés dans la maison; je possédai des troupeaux de bœufs et de brebis, plus que tous ceux qui étaient avant moi dans Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je m’amassai de l’argent et de l’or, et les richesses des rois et des provinces. Je me procurai des chanteurs et des chanteuses, et les délices des fils de l’homme, des femmes en grand nombre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je devins grand, plus grand que tous ceux qui étaient avant moi dans Jérusalem. Et même ma sagesse demeura avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout ce que mes yeux avaient désiré, je ne les en ai point privés; je n’ai refusé à mon cœur aucune joie; car mon cœur prenait plaisir à tout mon travail, et c’est la part qui m’en est revenue. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis, j’ai considéré tous les ouvrages que mes mains avaient faits, et la peine que j’avais prise à les exécuter; et voici, tout est vanité et poursuite du vent, et il n’y a aucun avantage à tirer de ce qu’on fait sous le soleil.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-26: cf. (Ec 8:1, 5, 6; 9:1-9.) Ps 49:7, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 1:17
      metadata:
        usfm: ECC.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:23
      metadata:
        usfm: ECC.7.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors j’ai tourné mes regards vers la sagesse, et vers la sottise et la folie. Car que fera l’homme qui succédera au roi? Ce qu’on a déjà fait. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et j’ai vu que la sagesse a de l’avantage sur la folie, comme la lumière a de l’avantage sur les ténèbres; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le sage a ses yeux à la tête, et l’insensé marche dans les ténèbres. Mais j’ai reconnu aussi qu’ils ont l’un et l’autre un même sort. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et j’ai dit en mon cœur: J’aurai le même sort que l’insensé; pourquoi donc ai-je été plus sage? Et j’ai dit en mon cœur que c’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car la mémoire du sage n’est pas plus éternelle que celle de l’insensé, puisque déjà les jours qui suivent, tout est oublié. Eh quoi! Le sage meurt aussi bien que l’insensé! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et j’ai haï la vie, car ce qui se fait sous le soleil m’a déplu, car tout est vanité et poursuite du vent. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J’ai haï tout le travail que j’ai fait sous le soleil, et dont je dois laisser la jouissance à l’homme qui me succédera. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et qui sait s’il sera sage ou insensé? Cependant il sera maître de tout mon travail, de tout le fruit de ma sagesse sous le soleil. C’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et j’en suis venu à livrer mon cœur au désespoir, à cause de tout le travail que j’ai fait sous le soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car tel homme a travaillé avec sagesse et science et avec succès, et il laisse le produit de son travail à un homme qui ne s’en est point occupé. C’est encore là une vanité et un grand mal. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 1:3
      metadata:
        usfm: ECC.1.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: ECC.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que revient-il, en effet, à l’homme de tout son travail et de la préoccupation de son cœur, objet de ses fatigues sous le soleil? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tous ses jours ne sont que douleur, et son partage n’est que chagrin; même la nuit son cœur ne repose pas. C’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 3:12
      metadata:
        usfm: ECC.3.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ECC.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:18
      metadata:
        usfm: ECC.5.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:15
      metadata:
        usfm: ECC.8.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il n’y a de bonheur pour l’homme qu’à manger et à boire, et à faire jouir son âme du bien-être, au milieu de son travail; mais j’ai vu que cela aussi vient de la main de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Qui, en effet, peut manger et jouir, si ce n’est moi? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Car il donne à l’homme qui lui est agréable la sagesse, la science et la joie; mais il donne au pécheur le soin de recueillir et d’amasser, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 27:16
      metadata:
        usfm: JOB.27.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: JOB.27.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:8
      metadata:
        usfm: PRO.28.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 3:13
      metadata:
        usfm: ECC.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: afin de donner à celui qui est agréable à Dieu. C’est encore là une vanité et la poursuite du vent.
