document_id: PSA.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 24; 26. Ps 9:17; 92:16.
  - type: text
    content: Complainte de David. Chantée à l’Éternel, au sujet de Cusch, Benjamite.
  '10':
  - type: text
    content: Mets un terme à la malice des méchants,
  - type: text
    content: Et affermis le juste,
  - type: text
    content: 'Toi qui sondes '
  - type: note
    content: 1 Ch 28:9. Jé 11:20; 17:10; 20:12. Ap 2:23.
  - type: text
    content: les cœurs et les reins,
  - type: text
    content: Dieu juste!
  '11':
  - type: text
    content: Mon bouclier est en Dieu,
  - type: text
    content: Qui sauve ceux dont le cœur est droit.
  '12':
  - type: text
    content: Dieu est un juste juge,
  - type: text
    content: Dieu s’irrite en tout temps.
  '13':
  - type: text
    content: Si le méchant ne se convertit pas, il aiguise son glaive,
  - type: text
    content: Il bande son arc, et il vise;
  '14':
  - type: text
    content: Il dirige sur lui des traits meurtriers,
  - type: text
    content: Il rend ses flèches brûlantes.
  '15':
  - type: text
    content: 'Voici, '
  - type: note
    content: Job 15:35. És 59:4.
  - type: text
    content: le méchant prépare le mal,
  - type: text
    content: Il conçoit l’iniquité, et il enfante le néant.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Job 4:8. Ps 9:16; 10:2. Pr 5:22; 26:27. Ec 10:8.
  - type: text
    content: Il ouvre une fosse, il la creuse,
  - type: text
    content: Et il tombe dans la fosse qu’il a faite.
  '17':
  - type: text
    content: Son iniquité retombe sur sa tête,
  - type: text
    content: Et sa violence redescend sur son front.
  '18':
  - type: text
    content: Je louerai l’Éternel à cause de sa justice,
  - type: text
    content: Je chanterai le nom de l’Éternel, du Très-Haut.
  '2':
  - type: text
    content: Éternel, mon Dieu! Je cherche en toi mon refuge;
  - type: text
    content: Sauve-moi de tous mes persécuteurs, et délivre-moi,
  '3':
  - type: text
    content: Afin qu’ils ne me déchirent pas, comme un lion
  - type: text
    content: Qui dévore sans que personne vienne au secours.
  '4':
  - type: text
    content: Éternel, mon Dieu! Si j’ai fait cela,
  - type: text
    content: S’il y a de l’iniquité dans mes mains,
  '5':
  - type: text
    content: Si j’ai rendu le mal à celui qui était paisible envers moi,
  - type: text
    content: Si j’ai dépouillé celui qui m’opprimait sans cause,
  '6':
  - type: text
    content: Que l’ennemi me poursuive et m’atteigne,
  - type: text
    content: Qu’il foule à terre ma vie,
  - type: text
    content: 'Et qu’il couche ma gloire dans la poussière! '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: Lève-toi, ô Éternel! Dans ta colère,
  - type: text
    content: Lève-toi contre la fureur de mes adversaires,
  - type: text
    content: Réveille-toi pour me secourir, ordonne un jugement!
  '8':
  - type: text
    content: Que l’assemblée des peuples t’environne!
  - type: text
    content: Monte au-dessus d’elle vers les lieux élevés!
  '9':
  - type: text
    content: 'L’Éternel juge les peuples:'
  - type: text
    content: Rends-moi justice, ô Éternel!
  - type: text
    content: Selon mon droit et selon mon innocence!
