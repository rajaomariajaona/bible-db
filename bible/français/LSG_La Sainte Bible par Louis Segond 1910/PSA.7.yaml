document_id: PSA.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 24; 26. Ps 9:17; 92:16.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Complainte de David. Chantée à l’Éternel, au sujet de Cusch, Benjamite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Éternel, mon Dieu! Je cherche en toi mon refuge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve-moi de tous mes persécuteurs, et délivre-moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Afin qu’ils ne me déchirent pas, comme un lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui dévore sans que personne vienne au secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Éternel, mon Dieu! Si j’ai fait cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il y a de l’iniquité dans mes mains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si j’ai rendu le mal à celui qui était paisible envers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j’ai dépouillé celui qui m’opprimait sans cause,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que l’ennemi me poursuive et m’atteigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il foule à terre ma vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qu’il couche ma gloire dans la poussière! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lève-toi, ô Éternel! Dans ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi contre la fureur de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi pour me secourir, ordonne un jugement!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que l’assemblée des peuples t’environne!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Monte au-dessus d’elle vers les lieux élevés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel juge les peuples:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rends-moi justice, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Selon mon droit et selon mon innocence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mets un terme à la malice des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et affermis le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Toi qui sondes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:12
      metadata:
        usfm: JER.20.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:23
      metadata:
        usfm: REV.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les cœurs et les reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu juste!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon bouclier est en Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui sauve ceux dont le cœur est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu est un juste juge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu s’irrite en tout temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si le méchant ne se convertit pas, il aiguise son glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bande son arc, et il vise;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il dirige sur lui des traits meurtriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rend ses flèches brûlantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:35
      metadata:
        usfm: JOB.15.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:4
      metadata:
        usfm: ISA.59.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le méchant prépare le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il conçoit l’iniquité, et il enfante le néant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 4:8
      metadata:
        usfm: JOB.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 9:16
      metadata:
        usfm: PSA.9.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:2
      metadata:
        usfm: PSA.10.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:22
      metadata:
        usfm: PRO.5.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:27
      metadata:
        usfm: PRO.26.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 10:8
      metadata:
        usfm: ECC.10.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il ouvre une fosse, il la creuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il tombe dans la fosse qu’il a faite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Son iniquité retombe sur sa tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa violence redescend sur son front.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je louerai l’Éternel à cause de sa justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai le nom de l’Éternel, du Très-Haut.
