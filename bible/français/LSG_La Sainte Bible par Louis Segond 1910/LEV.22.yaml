document_id: LEV.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Cas où il est défendu de manger des victimes consacrées. Choix des victimes pour les sacrifices
  - type: heading
    content: 'V. 1-9: cf. Lé 7:19-21. (1 Co 11:28-30.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Aucun étranger ne mangera des choses saintes; celui qui demeure chez un sacrificateur et le mercenaire ne mangeront point des choses saintes. '
  '11':
  - type: text
    content: 'Mais un esclave acheté par le sacrificateur à prix d’argent pourra en manger, de même que celui qui est né dans sa maison; ils mangeront de sa nourriture. '
  '12':
  - type: text
    content: 'La fille d’un sacrificateur, mariée à un étranger, ne mangera point des choses saintes offertes par élévation. '
  '13':
  - type: text
    content: 'Mais la fille d’un sacrificateur qui sera veuve ou répudiée, sans avoir d’enfants, et qui retournera dans la maison de son père '
  - type: note
    content: Lé 10:14.
  - type: text
    content: 'comme dans sa jeunesse, pourra manger de la nourriture de son père. Aucun étranger n’en mangera. '
  '14':
  - type: text
    content: 'Si un homme mange involontairement d’une chose sainte, il donnera au sacrificateur la valeur de la chose sainte, en y ajoutant un cinquième. '
  '15':
  - type: text
    content: 'Les sacrificateurs ne profaneront point les choses saintes qui sont présentées par les enfants d’Israël, et qu’ils ont offertes par élévation à l’Éternel; '
  '16':
  - type: text
    content: 'ils les chargeraient ainsi du péché dont ils se rendraient coupables en mangeant les choses saintes: car je suis l’Éternel, qui les sanctifie.'
  - type: heading
    content: 'V. 17-25: cf. De 17:1. Mal 1:8, 13, 14. 2 S 24:24.'
  '17':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '18':
  - type: text
    content: 'Parle à Aaron et à ses fils, et à tous les enfants d’Israël, et tu leur diras: Tout homme de la maison d’Israël ou des étrangers en Israël, qui offrira un holocauste à l’Éternel, soit pour l’accomplissement d’un vœu, soit comme offrande volontaire, '
  '19':
  - type: text
    content: 'prendra un mâle sans défaut parmi les bœufs, les agneaux ou les chèvres, afin que sa victime soit agréée. '
  '2':
  - type: text
    content: 'Parle à Aaron et à ses fils, afin qu’ils s’abstiennent des choses saintes qui me sont consacrées par les enfants d’Israël, et qu’ils ne profanent point mon saint nom. Je suis l’Éternel. '
  '20':
  - type: text
    content: 'Vous n’en offrirez aucune qui ait un défaut, car elle ne serait pas agréée. '
  '21':
  - type: note
    content: De 15:21; 17:1.
  - type: text
    content: 'Si un homme offre à l’Éternel du gros ou du menu bétail en sacrifice d’actions de grâces, soit pour l’accomplissement d’un vœu, soit comme offrande volontaire, la victime sera sans défaut, afin qu’elle soit agréée; il n’y aura en elle aucun défaut. '
  '22':
  - type: text
    content: 'Vous n’en offrirez point qui soit aveugle, estropiée, ou mutilée, qui ait des ulcères, la gale ou une dartre; vous n’en ferez point sur l’autel un sacrifice consumé par le feu devant l’Éternel. '
  '23':
  - type: text
    content: 'Tu pourras sacrifier comme offrande volontaire un bœuf ou un agneau ayant un membre trop long ou trop court, mais il ne sera point agréé pour l’accomplissement d’un vœu. '
  '24':
  - type: text
    content: 'Vous n’offrirez point à l’Éternel un animal dont les testicules ont été froissés, écrasés, arrachés ou coupés; vous ne l’offrirez point en sacrifice dans votre pays. '
  '25':
  - type: text
    content: 'Vous n’accepterez de l’étranger aucune de ces victimes, pour l’offrir comme aliment de votre Dieu; car elles sont mutilées, elles ont des défauts: elles ne seraient point agréées.'
  - type: heading
    content: 'V. 26-33: cf. Ex 22:30. Lé 7:15-18.'
  '26':
  - type: text
    content: 'L’Éternel dit à Moïse: '
  '27':
  - type: text
    content: 'Un bœuf, un agneau ou une chèvre, quand il naîtra, restera sept jours avec sa mère; dès le huitième jour et les suivants, il sera agréé pour être offert à l’Éternel en sacrifice consumé par le feu. '
  '28':
  - type: text
    content: 'Bœuf ou agneau, vous n’égorgerez pas un animal et son petit le même jour. '
  '29':
  - type: text
    content: 'Quand vous offrirez à l’Éternel un sacrifice d’actions de grâces, vous ferez en sorte qu’il soit agréé. '
  '3':
  - type: text
    content: 'Dis-leur: Tout homme parmi vos descendants et de votre race, qui s’approchera des choses saintes que consacrent à l’Éternel les enfants d’Israël, et qui aura sur lui quelque impureté, cet homme-là sera retranché de devant moi. Je suis l’Éternel. '
  '30':
  - type: note
    content: Lé 7:15.
  - type: text
    content: 'La victime sera mangée le jour même; vous n’en laisserez rien jusqu’au matin. Je suis l’Éternel. '
  '31':
  - type: text
    content: 'Vous observerez mes commandements, et vous les mettrez en pratique. Je suis l’Éternel. '
  '32':
  - type: text
    content: 'Vous ne profanerez point mon saint nom, afin que je sois sanctifié au milieu des enfants d’Israël. Je suis l’Éternel, qui vous sanctifie, '
  '33':
  - type: text
    content: et qui vous ai fait sortir du pays d’Égypte pour être votre Dieu. Je suis l’Éternel.
  '4':
  - type: text
    content: 'Tout homme de la race d’Aaron, qui aura la lèpre ou une gonorrhée, ne mangera point des choses saintes jusqu’à ce qu’il soit pur. Il en sera de même pour celui qui touchera une personne souillée par le contact d’un cadavre, '
  - type: note
    content: Lé 15:2.
  - type: text
    content: 'pour celui qui aura une pollution, '
  '5':
  - type: text
    content: 'pour celui qui touchera un reptile et en aura été souillé, ou un homme atteint d’une impureté quelconque et en aura été souillé. '
  '6':
  - type: text
    content: 'Celui qui touchera ces choses sera impur jusqu’au soir; il ne mangera pas des choses saintes, mais il lavera son corps dans l’eau; '
  '7':
  - type: text
    content: 'après le coucher du soleil, il sera pur, et il mangera ensuite des choses saintes, car c’est sa nourriture. '
  '8':
  - type: note
    content: Ex 22:31. Lé 17:15. Éz 44:31.
  - type: text
    content: 'Il ne mangera point d’une bête morte ou déchirée, afin de ne pas se souiller par elle. Je suis l’Éternel. '
  '9':
  - type: text
    content: Ils observeront mes commandements, de peur qu’ils ne portent la peine de leur péché et qu’ils ne meurent, pour avoir profané les choses saintes. Je suis l’Éternel, qui les sanctifie.
  - type: heading
    content: 'V. 10-16: cf. No 18:8-19. Mt 7:6.'
