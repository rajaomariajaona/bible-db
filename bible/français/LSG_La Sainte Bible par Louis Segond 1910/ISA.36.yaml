document_id: ISA.36,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Sanchérib marche contre Jérusalem; son armée détruite
  - type: heading
    content: 'V. 1-22: cf. 2 R 18:13-37. 2 Ch 32:1-16. És 10:1-16. Ps 94:3-5, 7.'
  - type: text
    content: 'La quatorzième année du roi Ézéchias, Sanchérib, roi d’Assyrie, monta contre toutes les villes fortes de Juda et s’en empara. '
  '10':
  - type: text
    content: 'D’ailleurs, est-ce sans la volonté de l’Éternel que je suis monté contre ce pays pour le détruire? L’Éternel m’a dit: Monte contre ce pays, et détruis-le. '
  '11':
  - type: text
    content: 'Éliakim, Schebna et Joach dirent à Rabschaké: Parle à tes serviteurs en araméen, car nous le comprenons; et ne nous parle pas en langue judaïque aux oreilles du peuple qui est sur la muraille. '
  '12':
  - type: text
    content: 'Rabschaké répondit: Est-ce à ton maître et à toi que mon maître m’a envoyé dire ces paroles? N’est-ce pas à ces hommes assis sur la muraille pour manger leurs excréments et pour boire leur urine avec vous? '
  '13':
  - type: text
    content: 'Puis Rabschaké s’avança et cria de toute sa force en langue judaïque: Écoutez les paroles du grand roi, du roi d’Assyrie! '
  '14':
  - type: text
    content: 'Ainsi parle le roi: Qu’Ézéchias ne vous abuse point, car il ne pourra vous délivrer. '
  '15':
  - type: text
    content: 'Qu’Ézéchias ne vous amène point à vous confier en l’Éternel, en disant: L’Éternel nous délivrera, cette ville ne sera pas livrée entre les mains du roi d’Assyrie. '
  '16':
  - type: text
    content: 'N’écoutez point Ézéchias; car ainsi parle le roi d’Assyrie: Faites la paix avec moi, rendez-vous à moi, et chacun de vous mangera de sa vigne et de son figuier, et chacun boira de l’eau de sa citerne, '
  '17':
  - type: text
    content: 'jusqu’à ce que je vienne, et que je vous emmène dans un pays comme le vôtre, dans un pays de blé et de vin, un pays de pain et de vignes. '
  '18':
  - type: text
    content: 'Qu’Ézéchias ne vous séduise point, en disant: L’Éternel nous délivrera. Les dieux des nations ont-ils délivré chacun son pays de la main du roi d’Assyrie? '
  '19':
  - type: text
    content: 'Où sont les dieux de Hamath et d’Arpad? Où sont les dieux de Sepharvaïm? Ont-ils délivré Samarie de ma main? '
  '2':
  - type: text
    content: 'Et le roi d’Assyrie envoya de Lakis à Jérusalem, vers le roi Ézéchias, Rabschaké avec une puissante armée. Rabschaké s’arrêta à l’aqueduc de l’étang supérieur, sur le chemin du champ du foulon. '
  '20':
  - type: text
    content: 'Parmi tous les dieux de ces pays, quels sont ceux qui ont délivré leur pays de ma main, pour que l’Éternel délivre Jérusalem de ma main? '
  '21':
  - type: text
    content: 'Mais ils se turent, et ne lui répondirent pas un mot; car le roi avait donné cet ordre: Vous ne lui répondrez pas. '
  '22':
  - type: text
    content: Et Éliakim, fils de Hilkija, chef de la maison du roi, Schebna, le secrétaire, et Joach, fils d’Asaph, l’archiviste, vinrent auprès d’Ézéchias, les vêtements déchirés, et lui rapportèrent les paroles de Rabschaké.
  '3':
  - type: text
    content: 'Alors Éliakim, fils de Hilkija, chef de la maison du roi, se rendit auprès de lui, avec Schebna, le secrétaire, et Joach, fils d’Asaph, l’archiviste. '
  '4':
  - type: text
    content: 'Rabschaké leur dit: Dites à Ézéchias: Ainsi parle le grand roi, le roi d’Assyrie: Quelle est cette confiance, sur laquelle tu t’appuies? '
  '5':
  - type: text
    content: 'Je te le dis, ce ne sont que des paroles en l’air: il faut pour la guerre de la prudence et de la force. En qui donc as-tu placé ta confiance, pour t’être révolté contre moi? '
  '6':
  - type: text
    content: 'Voici, tu l’as placée dans l’Égypte, tu as pris pour soutien '
  - type: note
    content: Éz 29:6, 7.
  - type: text
    content: 'ce roseau cassé, qui pénètre et perce la main de quiconque s’appuie dessus: tel est Pharaon, roi d’Égypte, pour tous ceux qui se confient en lui. '
  '7':
  - type: text
    content: 'Peut-être me diras-tu: C’est en l’Éternel, notre Dieu, que nous nous confions. Mais n’est-ce pas lui dont Ézéchias a fait disparaître les hauts lieux et les autels, en disant à Juda et à Jérusalem: Vous vous prosternerez devant cet autel? '
  '8':
  - type: text
    content: 'Maintenant, fais une convention avec mon maître, le roi d’Assyrie, et je te donnerai deux mille chevaux, si tu peux fournir des cavaliers pour les monter. '
  '9':
  - type: text
    content: 'Comment repousserais-tu un seul chef d’entre les moindres serviteurs de mon maître? Tu mets ta confiance dans l’Égypte pour les chars et pour les cavaliers. '
