    marker: p
    children:
    - type: text
      text: 'Il offrit: un plat d’argent du poids de cent trente sicles, un bassin d’argent de soixante-dix sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l’huile, pour l’offrande; '
  '14':
