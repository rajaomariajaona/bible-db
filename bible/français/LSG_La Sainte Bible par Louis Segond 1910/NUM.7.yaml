document_id: NUM.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Offrandes des chefs des tribus pour la dédicace du tabernacle
  - type: heading
    content: 'V. 1-9: cf. No 4:4-33. 1 Ch 29:6.'
  - type: text
    content: 'Lorsque Moïse eut achevé de dresser '
  - type: note
    content: Ex 40:18.
  - type: text
    content: 'le tabernacle, il l’oignit et le sanctifia avec tous ses ustensiles, de même que l’autel avec tous ses ustensiles; il les oignit et les sanctifia. '
  '10':
  - type: text
    content: 'Les princes présentèrent leur offrande pour la dédicace de l’autel, le jour où on l’oignit; les princes présentèrent leur offrande devant l’autel. '
  '11':
  - type: text
    content: 'L’Éternel dit à Moïse: Les princes viendront un à un, et à des jours différents, présenter leur offrande pour la dédicace de l’autel. '
  '12':
  - type: text
    content: 'Celui qui présenta son offrande le premier jour fut Nachschon, fils d’Amminadab, de la tribu de Juda. '
  '13':
  - type: text
    content: 'Il offrit: un plat d’argent du poids de cent trente sicles, un bassin d’argent de soixante-dix sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l’huile, pour l’offrande; '
  '14':
  - type: text
    content: 'une coupe d’or de dix sicles, pleine de parfum; '
  '15':
  - type: text
    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '16':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '17':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande de Nachschon, fils d’Amminadab. '
  '18':
  - type: text
    content: 'Le second jour, Nethaneel, fils de Tsuar, prince d’Issacar, présenta son offrande. '
  '19':
  - type: text
    content: 'Il offrit: un plat d’argent du poids de cent trente sicles, un bassin d’argent de soixante-dix sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l’huile, pour l’offrande; '
  '2':
  - type: text
    content: 'Alors les princes d’Israël, chefs des maisons de leurs pères, présentèrent leur offrande: c’étaient les princes des tribus, ceux qui avaient présidé au dénombrement. '
  '20':
  - type: text
    content: 'une coupe d’or de dix sicles, pleine de parfum; '
  '21':
  - type: text
    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '22':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '23':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande de Nethaneel, fils de Tsuar. '
  '24':
  - type: text
    content: 'Le troisième jour, le prince des fils de Zabulon, Éliab, fils de Hélon, '
  '25':
