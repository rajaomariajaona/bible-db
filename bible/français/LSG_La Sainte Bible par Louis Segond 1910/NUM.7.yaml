  '47':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande d’Éliasaph, fils de Déuel. '
  '48':
  - type: text
    content: 'Le septième jour, le prince des fils d’Éphraïm, Élischama, fils d’Ammihud, '
  '49':
  - type: text
    content: 'offrit: un plat d’argent du poids de cent trente sicles, un bassin d’argent de soixante-dix sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l’huile, pour l’offrande; '
  '5':
  - type: text
    content: 'Prends d’eux ces choses, afin de les employer pour le service de la tente d’assignation; tu les donneras aux Lévites, à chacun selon ses fonctions. '
  '50':
  - type: text
    content: 'une coupe d’or de dix sicles, pleine de parfum; '
  '51':
  - type: text
    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '52':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '53':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande d’Élischama, fils d’Ammihud. '
  '54':
  - type: text
    content: 'Le huitième jour, le prince des fils de Manassé, Gamliel, fils de Pedahtsur, '
  '55':
  - type: text
    content: 'offrit: un plat d’argent du poids de cent trente sicles, un bassin d’argent de soixante-dix sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l’huile, pour l’offrande; '
  '56':
  - type: text
    content: 'une coupe d’or de dix sicles, pleine de parfum; '
  '57':
  - type: text
    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '58':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '59':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande de Gamliel, fils de Pedahtsur. '
  '6':
  - type: text
    content: 'Moïse prit les chars et les bœufs, et il les remit aux Lévites. '
  '60':
  - type: text
    content: 'Le neuvième jour, le prince des fils de Benjamin, Abidan, fils de Guideoni, '
  '61':
