  '39':
  - type: text
    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '4':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '40':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '41':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande de Schelumiel, fils de Tsurischaddaï. '
  '42':
  - type: text
    content: 'Le sixième jour, le prince des fils de Gad, Éliasaph, fils de Déuel, '
  '43':
