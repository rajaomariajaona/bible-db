    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '76':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '77':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande de Paguiel, fils d’Ocran. '
  '78':
  - type: text
    content: 'Le douzième jour, le prince des fils de Nephthali, Ahira, fils d’Énan, '
  '79':
  - type: text
    content: 'offrit: un plat d’argent du poids de cent trente sicles, un bassin d’argent de soixante-dix sicles selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l’huile, pour l’offrande; '
  '8':
  - type: text
    content: 'il donna quatre chars et huit bœufs aux fils de Merari, selon leurs fonctions, sous la conduite d’Ithamar, fils du sacrificateur Aaron. '
  '80':
  - type: text
    content: 'une coupe d’or de dix sicles, pleine de parfum; '
  '81':
  - type: text
    content: 'un jeune taureau, un bélier, un agneau d’un an, pour l’holocauste; '
  '82':
  - type: text
    content: 'un bouc, pour le sacrifice d’expiation; '
  '83':
  - type: text
    content: 'et, pour le sacrifice d’actions de grâces, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d’un an. Telle fut l’offrande d’Ahira, fils d’Énan. '
  '84':
  - type: text
    content: 'Tels furent les dons des princes d’Israël pour la dédicace de l’autel, le jour où on l’oignit. Douze plats d’argent, douze bassins d’argent, douze coupes d’or; '
  '85':
  - type: text
    content: 'chaque plat d’argent pesait cent trente sicles, et chaque bassin soixante-dix, ce qui fit pour l’argent de ces ustensiles un total de deux mille quatre cents sicles, selon le sicle du sanctuaire; '
  '86':
  - type: text
    content: 'les douze coupes d’or pleines de parfum, à dix sicles la coupe, selon le sicle du sanctuaire, firent pour l’or des coupes un total de cent vingt sicles. '
  '87':
  - type: text
    content: 'Total des animaux pour l’holocauste: douze taureaux, douze béliers, douze agneaux d’un an, avec les offrandes ordinaires. Douze boucs, pour le sacrifice d’expiation. '
  '88':
  - type: text
    content: 'Total des animaux pour le sacrifice d’actions de grâces: vingt-quatre bœufs, soixante béliers, soixante boucs, soixante agneaux d’un an. Tels furent les dons pour la dédicace de l’autel, après qu’on l’eut oint. '
  '89':
  - type: text
    content: Lorsque Moïse entrait dans la tente d’assignation pour parler avec l’Éternel, il entendait la voix qui lui parlait du haut du propitiatoire placé sur l’arche du témoignage, entre les deux chérubins. Et il parlait avec l’Éternel.
  '9':
  - type: text
    content: Mais il n’en donna point aux fils de Kehath, parce que, selon leurs fonctions, ils devaient porter les choses saintes sur les épaules.
  - type: heading
    content: 'V. 10-89: cf. 2 Ch 7:4-9. Esd 6:16, 17. 2 Co 9:7, 8.'
