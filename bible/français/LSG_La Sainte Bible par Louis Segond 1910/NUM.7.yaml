  '3':
  - type: text
    content: 'Ils amenèrent leur offrande devant l’Éternel: six chars en forme de litières et douze bœufs, soit un char pour deux princes et un bœuf pour chaque prince; et ils les offrirent devant le tabernacle. '
  '30':
  - type: text
    content: 'Le quatrième jour, le prince des fils de Ruben, Élitsur, fils de Schedéur, '
  '31':
