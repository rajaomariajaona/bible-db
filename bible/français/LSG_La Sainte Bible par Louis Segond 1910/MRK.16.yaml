segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection et ascension de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Mt 28:1-8. Lu 24:1-8. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:23-32). 1 Co 15:1-28. Ac 26:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:1
      metadata:
        usfm: MAT.28.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:1
      metadata:
        usfm: LUK.24.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:1
      metadata:
        usfm: JHN.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le sabbat fut passé, Marie de Magdala, Marie, mère de Jacques, et Salomé, achetèrent des aromates, afin d’aller embaumer Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le premier jour de la semaine, elles se rendirent au sépulcre, de grand matin, comme le soleil venait de se lever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elles disaient entre elles: Qui nous roulera la pierre loin de l’entrée du sépulcre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et, levant les yeux, elles aperçurent que la pierre, qui était très grande, avait été roulée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:2
      metadata:
        usfm: MAT.28.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:12
      metadata:
        usfm: JHN.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elles entrèrent dans le sépulcre, virent un jeune homme assis à droite vêtu d’une robe blanche, et elles furent épouvantées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:5
      metadata:
        usfm: MAT.28.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:5
      metadata:
        usfm: LUK.24.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous épouvantez pas; vous cherchez Jésus de Nazareth, qui a été crucifié; il est ressuscité, il n’est point ici; voici le lieu où on l’avait mis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais allez dire à ses disciples et à Pierre qu’il vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:3
      metadata:
        usfm: ACT.1.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:31
      metadata:
        usfm: ACT.13.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:5
      metadata:
        usfm: 1CO.15.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'précède en Galilée: c’est là que vous le verrez, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:32
      metadata:
        usfm: MAT.26.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:10
      metadata:
        usfm: MAT.28.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:28
      metadata:
        usfm: MRK.14.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme il vous l’a dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:8
      metadata:
        usfm: MAT.28.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:9
      metadata:
        usfm: LUK.24.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:18
      metadata:
        usfm: JHN.20.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Elles sortirent du sépulcre et s’enfuirent. La peur et le trouble les avaient saisies; et elles ne dirent rien à personne, à cause de leur effroi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-14: cf. (Mt 28:8-10. Lu 24:9-45. Jn 20:11-23).'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus, étant ressuscité le matin du premier jour de la semaine, apparut '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:14
      metadata:
        usfm: JHN.20.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: JHN.20.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’abord à Marie de Magdala, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:2
      metadata:
        usfm: LUK.8.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de laquelle il avait chassé sept démons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle alla en porter la nouvelle à ceux qui avaient été avec lui, et qui s’affligeaient et pleuraient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand ils entendirent qu’il vivait, et qu’elle l’avait vu, ils ne le crurent point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:13
      metadata:
        usfm: LUK.24.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après cela, il apparut, sous une autre forme, à deux d’entre eux qui étaient en chemin pour aller à la campagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils revinrent l’annoncer aux autres, qui ne les crurent pas non plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:36
      metadata:
        usfm: LUK.24.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:19
      metadata:
        usfm: JHN.20.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:5
      metadata:
        usfm: 1CO.15.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Enfin, il apparut aux onze, pendant qu’ils étaient à table; et il leur reprocha leur incrédulité et la dureté de leur cœur, parce qu’ils n’avaient pas cru ceux qui l’avaient vu ressuscité.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-20: cf. (Mt 28:16-20. Lu 24:46-49, 50-53. Ac 1:1-12.) Jn 21:1-24. 1 Co 15:6, 7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:19
      metadata:
        usfm: MAT.28.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:16
      metadata:
        usfm: JHN.15.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez par tout le monde, et prêchez la bonne nouvelle à toute la création.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui croira et qui sera baptisé sera sauvé,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:18
      metadata:
        usfm: JHN.3.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:48
      metadata:
        usfm: JHN.12.48
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais celui qui ne croira pas sera condamné.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici les miracles qui accompagneront ceux qui auront cru:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:17
      metadata:
        usfm: LUK.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:16
      metadata:
        usfm: ACT.5.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:7
      metadata:
        usfm: ACT.8.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:18
      metadata:
        usfm: ACT.16.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:12
      metadata:
        usfm: ACT.19.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: en mon nom, ils chasseront les démons;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:4
      metadata:
        usfm: ACT.2.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:46
      metadata:
        usfm: ACT.10.46
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:6
      metadata:
        usfm: ACT.19.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ils parleront de nouvelles langues;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:19
      metadata:
        usfm: LUK.10.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:5
      metadata:
        usfm: ACT.28.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ils saisiront des serpents; s’ils boivent quelque breuvage mortel, il ne leur fera point de mal;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:8
      metadata:
        usfm: ACT.28.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ils imposeront les mains aux malades, et les malades, seront guéris.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le Seigneur, après leur avoir parlé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:50
      metadata:
        usfm: LUK.24.50
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '51'
      metadata:
        usfm: LUK.24.51
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:9
      metadata:
        usfm: ACT.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fut enlevé au ciel, et il s’assit à la droite de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:2
      metadata:
        usfm: ACT.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 3:16
      metadata:
        usfm: 1TI.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 's’en allèrent prêcher partout. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:3
      metadata:
        usfm: ACT.14.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:4
      metadata:
        usfm: HEB.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le Seigneur travaillait avec eux, et confirmait la parole par les miracles qui l’accompagnaient.
