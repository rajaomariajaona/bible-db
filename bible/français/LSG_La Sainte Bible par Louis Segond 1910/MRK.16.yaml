document_id: MRK.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection et ascension de Jésus-Christ
  - type: heading
    content: 'V. 1-8: cf. (Mt 28:1-8. Lu 24:1-8. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:23-32). 1 Co 15:1-28. Ac 26:8.'
  - type: text
    content: ' '
  - type: note
    content: Mt 28:1. Lu 24:1. Jn 20:1.
  - type: text
    content: 'Lorsque le sabbat fut passé, Marie de Magdala, Marie, mère de Jacques, et Salomé, achetèrent des aromates, afin d’aller embaumer Jésus. '
  '10':
  - type: text
    content: 'Elle alla en porter la nouvelle à ceux qui avaient été avec lui, et qui s’affligeaient et pleuraient. '
  '11':
  - type: text
    content: 'Quand ils entendirent qu’il vivait, et qu’elle l’avait vu, ils ne le crurent point. '
  '12':
  - type: note
    content: Lu 24:13.
  - type: text
    content: 'Après cela, il apparut, sous une autre forme, à deux d’entre eux qui étaient en chemin pour aller à la campagne. '
  '13':
  - type: text
    content: 'Ils revinrent l’annoncer aux autres, qui ne les crurent pas non plus. '
  '14':
  - type: note
    content: Lu 24:36. Jn 20:19. 1 Co 15:5.
  - type: text
    content: Enfin, il apparut aux onze, pendant qu’ils étaient à table; et il leur reprocha leur incrédulité et la dureté de leur cœur, parce qu’ils n’avaient pas cru ceux qui l’avaient vu ressuscité.
  - type: heading
    content: 'V. 15-20: cf. (Mt 28:16-20. Lu 24:46-49, 50-53. Ac 1:1-12.) Jn 21:1-24. 1 Co 15:6, 7.'
  '15':
  - type: text
    content: 'Puis il leur dit: '
  - type: note
    content: Mt 28:19. Jn 15:16.
  - type: text
    content: Allez par tout le monde, et prêchez la bonne nouvelle à toute la création.
  '16':
  - type: text
    content: ' '
  - type: text
    content: Celui qui croira et qui sera baptisé sera sauvé,
  - type: text
    content: ' '
  - type: note
    content: Jn 3:18; 12:48.
  - type: text
    content: mais celui qui ne croira pas sera condamné.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Voici les miracles qui accompagneront ceux qui auront cru:'
  - type: text
    content: ' '
  - type: note
    content: Lu 10:17. Ac 5:16; 8:7; 16:18; 19:12.
  - type: text
    content: en mon nom, ils chasseront les démons;
  - type: text
    content: ' '
  - type: note
    content: Ac 2:4; 10:46; 19:6.
  - type: text
    content: ils parleront de nouvelles langues;
  - type: text
    content: ' '
  '18':
  - type: note
    content: Lu 10:19. Ac 28:5.
  - type: text
    content: ils saisiront des serpents; s’ils boivent quelque breuvage mortel, il ne leur fera point de mal;
  - type: text
    content: ' '
  - type: note
    content: Ac 28:8.
  - type: text
    content: ils imposeront les mains aux malades, et les malades, seront guéris.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Le Seigneur, après leur avoir parlé, '
  - type: note
    content: Lu 24:50, 51. Ac 1:9.
  - type: text
    content: 'fut enlevé au ciel, et il s’assit à la droite de Dieu. '
  '2':
  - type: text
    content: 'Le premier jour de la semaine, elles se rendirent au sépulcre, de grand matin, comme le soleil venait de se lever. '
  '20':
  - type: text
    content: 'Et ils '
  - type: note
    content: Ac 1:2. 1 Ti 3:16.
  - type: text
    content: 's’en allèrent prêcher partout. '
  - type: note
    content: Ac 14:3. Hé 2:4.
  - type: text
    content: Le Seigneur travaillait avec eux, et confirmait la parole par les miracles qui l’accompagnaient.
  '3':
  - type: text
    content: 'Elles disaient entre elles: Qui nous roulera la pierre loin de l’entrée du sépulcre? '
  '4':
  - type: text
    content: 'Et, levant les yeux, elles aperçurent que la pierre, qui était très grande, avait été roulée. '
  '5':
  - type: note
    content: Mt 28:2. Jn 20:12.
  - type: text
    content: 'Elles entrèrent dans le sépulcre, virent un jeune homme assis à droite vêtu d’une robe blanche, et elles furent épouvantées. '
  '6':
  - type: text
    content: 'Il leur dit: '
  - type: note
    content: Mt 28:5. Lu 24:5.
  - type: text
    content: 'Ne vous épouvantez pas; vous cherchez Jésus de Nazareth, qui a été crucifié; il est ressuscité, il n’est point ici; voici le lieu où on l’avait mis. '
  '7':
  - type: text
    content: 'Mais allez dire à ses disciples et à Pierre qu’il vous '
  - type: note
    content: Ac 1:3; 13:31. 1 Co 15:5.
  - type: text
    content: 'précède en Galilée: c’est là que vous le verrez, '
  - type: note
    content: Mt 26:32; 28:10. Mc 14:28.
  - type: text
    content: 'comme il vous l’a dit. '
  '8':
  - type: note
    content: Mt 28:8. Lu 24:9. Jn 20:18.
  - type: text
    content: Elles sortirent du sépulcre et s’enfuirent. La peur et le trouble les avaient saisies; et elles ne dirent rien à personne, à cause de leur effroi.
  - type: heading
    content: 'V. 9-14: cf. (Mt 28:8-10. Lu 24:9-45. Jn 20:11-23).'
  '9':
  - type: text
    content: 'Jésus, étant ressuscité le matin du premier jour de la semaine, apparut '
  - type: note
    content: Jn 20:14, 16.
  - type: text
    content: 'd’abord à Marie de Magdala, '
  - type: note
    content: Lu 8:2.
  - type: text
    content: 'de laquelle il avait chassé sept démons. '
