document_id: PRO.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-19: cf. Pr 2; 3:1-26.'
  - type: text
    content: Écoutez, mes fils, l’instruction d’un père,
  - type: text
    content: Et soyez attentifs, pour connaître la sagesse;
  '10':
  - type: text
    content: Écoute, mon fils, et reçois mes paroles;
  - type: text
    content: Et les années de ta vie se multiplieront.
  '11':
  - type: text
    content: Je te montre la voie de la sagesse,
  - type: text
    content: Je te conduis dans les sentiers de la droiture.
  '12':
  - type: text
    content: Si tu marches, ton pas ne sera point gêné;
  - type: text
    content: 'Et si tu cours, '
  - type: note
    content: Ps 91:11.
  - type: text
    content: tu ne chancelleras point.
  '13':
  - type: text
    content: Retiens l’instruction, ne t’en dessaisis pas;
  - type: text
    content: Garde-la, car elle est ta vie.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 1:1. Pr 1:10, 15.
  - type: text
    content: N’entre pas dans le sentier des méchants,
  - type: text
    content: Et ne marche pas dans la voie des hommes mauvais.
  '15':
  - type: text
    content: Évite-la, n’y passe point;
  - type: text
    content: Détourne-t’en, et passe outre.
  '16':
  - type: text
    content: Car ils ne dormiraient pas s’ils n’avaient fait le mal,
  - type: text
    content: Le sommeil leur serait ravi s’ils n’avaient fait tomber personne;
  '17':
  - type: text
    content: Car c’est le pain de la méchanceté qu’ils mangent,
  - type: text
    content: C’est le vin de la violence qu’ils boivent.
  '18':
  - type: text
    content: Le sentier des justes est comme la lumière resplendissante,
  - type: text
    content: Dont l’éclat va croissant jusqu’au milieu du jour.
  '19':
  - type: text
    content: La voie des méchants est comme les ténèbres;
  - type: text
    content: Ils n’aperçoivent pas ce qui les fera tomber.
  - type: heading
    content: 'V. 20-27: cf. (Mc 7:21-23. Ps 51:12.) (Ps 141:3, 4; 34:12-15.)'
  '2':
  - type: text
    content: 'Car je vous donne de bons conseils:'
  - type: text
    content: Ne rejetez pas mon enseignement.
  '20':
  - type: text
    content: Mon fils, sois attentif à mes paroles,
  - type: text
    content: Prête l’oreille à mes discours.
  '21':
  - type: text
    content: Qu’ils ne s’éloignent pas de tes yeux;
  - type: text
    content: Garde-les dans le fond de ton cœur;
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 4:13.
  - type: text
    content: Car c’est la vie pour ceux qui les trouvent,
  - type: text
    content: C’est la santé pour tout leur corps.
  '23':
  - type: text
    content: Garde ton cœur plus que toute autre chose,
  - type: text
    content: Car de lui viennent les sources de la vie.
  '24':
  - type: text
    content: Écarte de ta bouche la fausseté,
  - type: text
    content: Éloigne de tes lèvres les détours.
  '25':
  - type: text
    content: Que tes yeux regardent en face,
  - type: text
    content: Et que tes paupières se dirigent devant toi.
  '26':
  - type: text
    content: Considère le chemin par où tu passes,
  - type: text
    content: Et que toutes tes voies soient bien réglées;
  '27':
  - type: text
    content: ' '
  - type: note
    content: De 5:32; 28:14.
  - type: text
    content: N’incline ni à droite ni à gauche,
  - type: text
    content: Et détourne ton pied du mal.
  '3':
  - type: text
    content: J’étais un fils pour mon père,
  - type: text
    content: 'Un fils '
  - type: note
    content: 1 Ch 29:1.
  - type: text
    content: tendre et unique auprès de ma mère.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 1 Ch 28:9.
  - type: text
    content: 'Il m’instruisait alors, et il me disait:'
  - type: text
    content: Que ton cœur retienne mes paroles;
  - type: text
    content: Observe mes préceptes, et tu vivras.
  '5':
  - type: text
    content: Acquiers la sagesse, acquiers l’intelligence;
  - type: text
    content: N’oublie pas les paroles de ma bouche, et ne t’en détourne pas.
  '6':
  - type: text
    content: Ne l’abandonne pas, et elle te gardera;
  - type: text
    content: Aime-la, et elle te protégera.
  '7':
  - type: text
    content: 'Voici le commencement de la sagesse:'
  - type: note
    content: Pr 23:23.
  - type: text
    content: Acquiers la sagesse,
  - type: text
    content: Et avec tout ce que tu possèdes acquiers l’intelligence.
  '8':
  - type: text
    content: Exalte-la, et elle t’élèvera;
  - type: text
    content: Elle fera ta gloire, si tu l’embrasses;
  '9':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:19.
  - type: text
    content: Elle mettra sur ta tête une couronne de grâce,
  - type: text
    content: Elle t’ornera d’un magnifique diadème.
