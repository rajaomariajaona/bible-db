document_id: PRO.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. Pr 2; 3:1-26.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Écoutez, mes fils, l’instruction d’un père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et soyez attentifs, pour connaître la sagesse;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car je vous donne de bons conseils:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne rejetez pas mon enseignement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’étais un fils pour mon père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Un fils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 29:1
      metadata:
        usfm: 1CH.29.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tendre et unique auprès de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il m’instruisait alors, et il me disait:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ton cœur retienne mes paroles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observe mes préceptes, et tu vivras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Acquiers la sagesse, acquiers l’intelligence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’oublie pas les paroles de ma bouche, et ne t’en détourne pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne l’abandonne pas, et elle te gardera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aime-la, et elle te protégera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici le commencement de la sagesse:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 23:23
      metadata:
        usfm: PRO.23.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Acquiers la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et avec tout ce que tu possèdes acquiers l’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Exalte-la, et elle t’élèvera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle fera ta gloire, si tu l’embrasses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:19
      metadata:
        usfm: PRO.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Elle mettra sur ta tête une couronne de grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle t’ornera d’un magnifique diadème.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Écoute, mon fils, et reçois mes paroles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les années de ta vie se multiplieront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je te montre la voie de la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te conduis dans les sentiers de la droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tu marches, ton pas ne sera point gêné;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et si tu cours, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 91:11
      metadata:
        usfm: PSA.91.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu ne chancelleras point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Retiens l’instruction, ne t’en dessaisis pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde-la, car elle est ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 1:1
      metadata:
        usfm: PSA.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:10
      metadata:
        usfm: PRO.1.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: PRO.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’entre pas dans le sentier des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne marche pas dans la voie des hommes mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Évite-la, n’y passe point;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Détourne-t’en, et passe outre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car ils ne dormiraient pas s’ils n’avaient fait le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sommeil leur serait ravi s’ils n’avaient fait tomber personne;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car c’est le pain de la méchanceté qu’ils mangent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le vin de la violence qu’ils boivent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le sentier des justes est comme la lumière resplendissante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont l’éclat va croissant jusqu’au milieu du jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La voie des méchants est comme les ténèbres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’aperçoivent pas ce qui les fera tomber.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-27: cf. (Mc 7:21-23. Ps 51:12.) (Ps 141:3, 4; 34:12-15.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mon fils, sois attentif à mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à mes discours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Qu’ils ne s’éloignent pas de tes yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde-les dans le fond de ton cœur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 4:13
      metadata:
        usfm: PRO.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car c’est la vie pour ceux qui les trouvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est la santé pour tout leur corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Garde ton cœur plus que toute autre chose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car de lui viennent les sources de la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Écarte de ta bouche la fausseté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éloigne de tes lèvres les détours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que tes yeux regardent en face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tes paupières se dirigent devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Considère le chemin par où tu passes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que toutes tes voies soient bien réglées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:32
      metadata:
        usfm: DEU.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:14
      metadata:
        usfm: DEU.28.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’incline ni à droite ni à gauche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et détourne ton pied du mal.
