document_id: 2TI.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 1 Ti 1:1, 2.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ, par la volonté de Dieu, pour annoncer la promesse de la vie qui est en Jésus-Christ, '
  '10':
  - type: note
    content: Ro 16:25. Ép 1:9; 3:9. Col 1:26. Tit 1:2. 1 Pi 1:20.
  - type: text
    content: 'et qui a été manifestée maintenant par l’apparition de notre Sauveur Jésus-Christ, '
  - type: note
    content: És 25:8. Hé 2:14.
  - type: text
    content: 'qui a détruit la mort et a mis en évidence la vie et l’immortalité par l’Évangile. '
  '11':
  - type: note
    content: Ac 9:15; 13:2; 22:21. Ga 1:15; 2:8. Ép 3:8. 1 Ti 2:7.
  - type: text
    content: 'C’est pour cet Évangile que j’ai été établi prédicateur et apôtre, chargé d’instruire les païens. '
  '12':
  - type: text
    content: 'Et c’est à cause de cela que je souffre ces choses; mais j’en ai point honte, car je sais en qui j’ai cru, et je suis persuadé qu’il a la puissance de garder mon dépôt jusqu’à ce jour-là. '
  '13':
  - type: note
    content: 2 Ti 3:14.
  - type: text
    content: 'Retiens dans la foi et dans la charité qui est en Jésus-Christ le modèle des saines paroles que tu as reçues de moi. '
  '14':
  - type: text
    content: Garde le bon dépôt, par le Saint-Esprit qui habite en nous.
  - type: heading
    content: 'V. 15-18: cf. Mt 25:34-40.'
  '15':
  - type: text
    content: 'Tu sais '
  - type: note
    content: Ac 19:10.
  - type: text
    content: 'que tous ceux qui sont en Asie m’ont abandonné, entre autres Phygelle et Hermogène. '
  '16':
  - type: text
    content: 'Que le Seigneur répande sa miséricorde sur la maison '
  - type: note
    content: 2 Ti 4:19.
  - type: text
    content: 'd’Onésiphore, car il m’a souvent consolé, et il n’a pas eu honte de mes chaînes; '
  '17':
  - type: text
    content: 'au contraire, lorsqu’il est venu à Rome, il m’a cherché avec beaucoup d’empressement, et il m’a trouvé. '
  '18':
  - type: text
    content: Que le Seigneur lui donne d’obtenir miséricorde auprès du Seigneur en ce jour-là. Tu sais mieux que personne combien de services il m’a rendus à Éphèse.
  '2':
  - type: text
    content: 'à Timothée, mon enfant bien-aimé: '
  - type: note
    content: Ga 1:3. 1 Ti 1:2. 1 Pi 1:2.
  - type: text
    content: que la grâce, la miséricorde et la paix te soient données de la part de Dieu le Père et de Jésus-Christ notre Seigneur!
  - type: heading
    content: Affection de Paul pour Timothée. Exhortation à la fermeté dans la foi et à la constance dans les travaux du ministère
  - type: heading
    content: 'V. 3-14: cf. (Ac 16:1-3. 2 Ti 3:15.) (1 Ti 4:14. 2 Ti 2:1-12.) (Ép 1:3-7; 2:8, 9. 2 Th 2:13-15.)'
  '3':
  - type: text
    content: 'Je rends grâces à Dieu, '
  - type: note
    content: Ac 22:3. Ro 1:9.
  - type: text
    content: 'que mes ancêtres ont servi, et que je sers avec une conscience pure, '
  - type: note
    content: 1 Th 1:2; 3:10.
  - type: text
    content: 'de ce que nuit et jour je me souviens continuellement de toi dans mes prières, '
  '4':
  - type: text
    content: 'me rappelant tes larmes, et désirant te voir afin d’être rempli de joie, '
  '5':
  - type: text
    content: 'gardant le souvenir de la foi sincère qui est en toi, qui habita d’abord dans ton aïeule Loïs et dans ta mère Eunice, et qui, j’en suis persuadé, habite aussi en toi. '
  '6':
  - type: text
    content: 'C’est pourquoi je t’exhorte à ranimer le don de Dieu '
  - type: note
    content: Ac 6:6; 8:17; 13:3; 19:6. 1 Ti 4:14; 5:22.
  - type: text
    content: 'que tu as reçu par l’imposition de mes mains. '
  '7':
  - type: note
    content: Ro 8:15.
  - type: text
    content: 'Car ce n’est pas un esprit de timidité que Dieu nous a donné, mais un esprit de force, d’amour et de sagesse. '
  '8':
  - type: note
    content: Ro 1:16.
  - type: text
    content: 'N’aie donc point honte du témoignage à rendre à notre Seigneur, ni de moi '
  - type: note
    content: Ac 21:33. Ép 3:1; 4:1. Col 4:18. Phm v. 1, 9, 13.
  - type: text
    content: 'son prisonnier. Mais souffre avec moi pour l’Évangile, par la puissance de Dieu '
  '9':
  - type: text
    content: 'qui nous a '
  - type: note
    content: Ép 1:3. Tit 3:4, 5, 6.
  - type: text
    content: 'sauvés, et nous a adressé une sainte vocation, non à cause de nos œuvres, mais selon son propre dessein, et selon la grâce qui nous a été donnée en Jésus-Christ avant les temps éternels, '
