    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle sur Ninive. Livre de la prophétie de Nahum, d’Elkosch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel est un Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:5
      metadata:
        usfm: EXO.20.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: jaloux, il se venge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel se venge, il est plein de fureur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel se venge de ses adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il garde rancune à ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Éternel est lent à la colère, il est grand par sa force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne laisse pas impuni.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel marche dans la tempête, dans le tourbillon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nuées sont la poussière de ses pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il menace la mer et la dessèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait tarir tous les fleuves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Basan et le Carmel languissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fleur du Liban se flétrit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:18
      metadata:
        usfm: EXO.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:8
      metadata:
        usfm: PSA.18.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:5
      metadata:
        usfm: PSA.29.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.29.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 68:8
      metadata:
        usfm: PSA.68.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 97:4
      metadata:
        usfm: PSA.97.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: PSA.97.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 114:4
      metadata:
        usfm: PSA.114.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les montagnes s’ébranlent devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les collines se fondent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre se soulève devant sa face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le monde et tous ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui résistera devant sa fureur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui tiendra contre son ardente colère?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa fureur se répand comme le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les rochers se brisent devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Éternel est bon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 3:16
      metadata:
        usfm: JOL.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il est un refuge au jour de la détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il connaît ceux qui se confient en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais avec des flots qui déborderont
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il détruira la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il poursuivra ses ennemis jusque dans les ténèbres.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-14: cf. És 10:5, etc.; 36; 37.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que méditez-vous contre l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui détruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La détresse ne paraîtra pas deux fois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car entrelacés comme des épines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme ivres de leur vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront consumés
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la paille sèche, entièrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De toi est sorti
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui méditait le mal contre l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui avait de méchants desseins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi parle l’Éternel: Quoique intacts et nombreux,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront moissonnés et disparaîtront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux t’humilier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour ne plus avoir à t’humilier…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je briserai maintenant son joug de dessus toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je romprai tes liens…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici ce qu’a ordonné sur toi l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n’auras plus de descendants qui portent ton nom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’enlèverai de la maison de ton dieu les images taillées ou en fonte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je préparerai ton sépulcre, car tu es trop léger.
