document_id: NAM.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. (De 32:35, 39-43. Ex 34:6, 7.) Ps 97:1-9.'
  - type: text
    content: Oracle sur Ninive. Livre de la prophétie de Nahum, d’Elkosch.
  '10':
  - type: text
    content: Car entrelacés comme des épines,
  - type: text
    content: Et comme ivres de leur vin,
  - type: text
    content: Ils seront consumés
  - type: text
    content: Comme la paille sèche, entièrement.
  '11':
  - type: text
    content: De toi est sorti
  - type: text
    content: Celui qui méditait le mal contre l’Éternel,
  - type: text
    content: Celui qui avait de méchants desseins.
  '12':
  - type: text
    content: 'Ainsi parle l’Éternel: Quoique intacts et nombreux,'
  - type: text
    content: Ils seront moissonnés et disparaîtront.
  - type: text
    content: Je veux t’humilier,
  - type: text
    content: Pour ne plus avoir à t’humilier…
  '13':
  - type: text
    content: Je briserai maintenant son joug de dessus toi,
  - type: text
    content: Et je romprai tes liens…
  '14':
  - type: text
    content: 'Voici ce qu’a ordonné sur toi l’Éternel:'
  - type: text
    content: Tu n’auras plus de descendants qui portent ton nom;
  - type: text
    content: J’enlèverai de la maison de ton dieu les images taillées ou en fonte;
  - type: text
    content: Je préparerai ton sépulcre, car tu es trop léger.
  '2':
  - type: text
    content: 'L’Éternel est un Dieu '
  - type: note
    content: Ex 20:5.
  - type: text
    content: jaloux, il se venge;
  - type: text
    content: L’Éternel se venge, il est plein de fureur;
  - type: text
    content: L’Éternel se venge de ses adversaires,
  - type: text
    content: Il garde rancune à ses ennemis.
  '3':
  - type: text
    content: L’Éternel est lent à la colère, il est grand par sa force;
  - type: text
    content: Il ne laisse pas impuni.
  - type: text
    content: L’Éternel marche dans la tempête, dans le tourbillon;
  - type: text
    content: Les nuées sont la poussière de ses pieds.
  '4':
  - type: text
    content: Il menace la mer et la dessèche,
  - type: text
    content: Il fait tarir tous les fleuves;
  - type: text
    content: Le Basan et le Carmel languissent,
  - type: text
    content: La fleur du Liban se flétrit.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ex 19:18. Ps 18:8; 29:5, 6; 68:8; 97:4, 5; 114:4.
  - type: text
    content: Les montagnes s’ébranlent devant lui,
  - type: text
    content: Et les collines se fondent;
  - type: text
    content: La terre se soulève devant sa face,
  - type: text
    content: Le monde et tous ses habitants.
  '6':
  - type: text
    content: Qui résistera devant sa fureur?
  - type: text
    content: Qui tiendra contre son ardente colère?
  - type: text
    content: Sa fureur se répand comme le feu,
  - type: text
    content: Et les rochers se brisent devant lui.
  '7':
  - type: text
    content: L’Éternel est bon,
  - type: note
    content: Joë 3:16.
  - type: text
    content: Il est un refuge au jour de la détresse;
  - type: text
    content: Il connaît ceux qui se confient en lui.
  '8':
  - type: text
    content: Mais avec des flots qui déborderont
  - type: text
    content: Il détruira la ville,
  - type: text
    content: Et il poursuivra ses ennemis jusque dans les ténèbres.
  - type: heading
    content: 'V. 9-14: cf. És 10:5, etc.; 36; 37.'
  '9':
  - type: text
    content: Que méditez-vous contre l’Éternel?
  - type: text
    content: C’est lui qui détruit.
  - type: text
    content: La détresse ne paraîtra pas deux fois.
