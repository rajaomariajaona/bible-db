document_id: NAM.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (De 32:35, 39-43. Ex 34:6, 7.) Ps 97:1-9.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oracle sur Ninive. Livre de la prophétie de Nahum, d’Elkosch.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car entrelacés comme des épines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comme ivres de leur vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront consumés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la paille sèche, entièrement.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toi est sorti
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui méditait le mal contre l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui avait de méchants desseins.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel: Quoique intacts et nombreux,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront moissonnés et disparaîtront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux t’humilier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ne plus avoir à t’humilier…
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je briserai maintenant son joug de dessus toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je romprai tes liens…
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce qu’a ordonné sur toi l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’auras plus de descendants qui portent ton nom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’enlèverai de la maison de ton dieu les images taillées ou en fonte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je préparerai ton sépulcre, car tu es trop léger.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel est un Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: jaloux, il se venge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel se venge, il est plein de fureur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel se venge de ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il garde rancune à ses ennemis.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est lent à la colère, il est grand par sa force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne laisse pas impuni.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel marche dans la tempête, dans le tourbillon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nuées sont la poussière de ses pieds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il menace la mer et la dessèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait tarir tous les fleuves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Basan et le Carmel languissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fleur du Liban se flétrit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 68:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 97:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 114:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les montagnes s’ébranlent devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les collines se fondent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre se soulève devant sa face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le monde et tous ses habitants.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui résistera devant sa fureur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui tiendra contre son ardente colère?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa fureur se répand comme le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les rochers se brisent devant lui.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est bon,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il est un refuge au jour de la détresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il connaît ceux qui se confient en lui.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais avec des flots qui déborderont
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il détruira la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il poursuivra ses ennemis jusque dans les ténèbres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-14: cf. És 10:5, etc.; 36; 37.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que méditez-vous contre l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui détruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La détresse ne paraîtra pas deux fois.
