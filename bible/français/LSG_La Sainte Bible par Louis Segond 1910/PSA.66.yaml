document_id: PSA.66,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 113; 114; 124.) Ps 116. 2 Ch 32:20-23. Esd 8:21-23, 31-35.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Cantique. Psaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez vers Dieu des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, habitants de la terre!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu nous as éprouvés, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu nous as fait passer au creuset comme l’argent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu nous as amenés dans le filet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as mis sur nos reins un pesant fardeau,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait monter des hommes sur nos têtes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons passé par le feu et par l’eau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu nous en as tirés pour nous donner l’abondance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’irai dans ta maison avec des holocaustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’accomplirai mes vœux envers toi:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour eux mes lèvres se sont ouvertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma bouche les a prononcés dans ma détresse.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’offrirai des brebis grasses en holocauste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec la graisse des béliers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je sacrifierai des brebis avec des boucs. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, écoutez, vous tous qui craignez Dieu, et je raconterai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu’il a fait à mon âme.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai crié à lui de ma bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la louange a été sur ma langue.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si j’avais conçu l’iniquité dans mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur ne m’aurait pas exaucé.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Dieu m’a exaucé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a été attentif à la voix de ma prière.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez la gloire de son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célébrez sa gloire par vos louanges!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’a pas rejeté ma prière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui ne m’a pas retiré sa bonté!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites à Dieu: Que tes œuvres sont redoutables!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la grandeur de ta force, tes ennemis te flattent.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute la terre se prosterne devant toi et chante en ton honneur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle chante ton nom. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez et contemplez les œuvres de Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est redoutable quand il agit sur les fils de l’homme.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex 14:21, etc.
      marker-yv: yv-n
    - type: text
      text: Il changea la mer en une terre sèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On traversa '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jos 3:14, etc.
      marker-yv: yv-n
    - type: text
      text: 'le fleuve à pied:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors nous nous réjouîmes en lui.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il domine éternellement par sa puissance,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 16:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ses yeux observent les nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que les rebelles ne s’élèvent pas! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peuples, bénissez notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites retentir sa louange!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a conservé la vie à notre âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’a pas permis que notre pied chancelât.
