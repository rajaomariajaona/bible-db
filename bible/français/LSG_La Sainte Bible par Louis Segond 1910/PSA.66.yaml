document_id: PSA.66,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 113; 114; 124.) Ps 116. 2 Ch 32:20-23. Esd 8:21-23, 31-35.
  - type: text
    content: Au chef des chantres. Cantique. Psaume.
  - type: text
    content: Poussez vers Dieu des cris de joie,
  - type: text
    content: Vous tous, habitants de la terre!
  '10':
  - type: text
    content: Car tu nous as éprouvés, ô Dieu!
  - type: text
    content: Tu nous as fait passer au creuset comme l’argent.
  '11':
  - type: text
    content: Tu nous as amenés dans le filet,
  - type: text
    content: Tu as mis sur nos reins un pesant fardeau,
  '12':
  - type: text
    content: Tu as fait monter des hommes sur nos têtes;
  - type: text
    content: Nous avons passé par le feu et par l’eau.
  - type: text
    content: Mais tu nous en as tirés pour nous donner l’abondance.
  '13':
  - type: text
    content: J’irai dans ta maison avec des holocaustes,
  - type: text
    content: 'J’accomplirai mes vœux envers toi:'
  '14':
  - type: text
    content: Pour eux mes lèvres se sont ouvertes,
  - type: text
    content: Et ma bouche les a prononcés dans ma détresse.
  '15':
  - type: text
    content: Je t’offrirai des brebis grasses en holocauste,
  - type: text
    content: Avec la graisse des béliers;
  - type: text
    content: 'Je sacrifierai des brebis avec des boucs. '
  - type: text
    content: — Pause.
  '16':
  - type: text
    content: Venez, écoutez, vous tous qui craignez Dieu, et je raconterai
  - type: text
    content: Ce qu’il a fait à mon âme.
  '17':
  - type: text
    content: J’ai crié à lui de ma bouche,
  - type: text
    content: Et la louange a été sur ma langue.
  '18':
  - type: text
    content: Si j’avais conçu l’iniquité dans mon cœur,
  - type: text
    content: Le Seigneur ne m’aurait pas exaucé.
  '19':
  - type: text
    content: Mais Dieu m’a exaucé,
  - type: text
    content: Il a été attentif à la voix de ma prière.
  '2':
  - type: text
    content: Chantez la gloire de son nom,
  - type: text
    content: Célébrez sa gloire par vos louanges!
  '20':
  - type: text
    content: Béni soit Dieu,
  - type: text
    content: Qui n’a pas rejeté ma prière,
  - type: text
    content: Et qui ne m’a pas retiré sa bonté!
  '3':
  - type: text
    content: 'Dites à Dieu: Que tes œuvres sont redoutables!'
  - type: text
    content: A cause de la grandeur de ta force, tes ennemis te flattent.
  '4':
  - type: text
    content: Toute la terre se prosterne devant toi et chante en ton honneur;
  - type: text
    content: 'Elle chante ton nom. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Venez et contemplez les œuvres de Dieu!
  - type: text
    content: Il est redoutable quand il agit sur les fils de l’homme.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:21, etc.
  - type: text
    content: Il changea la mer en une terre sèche,
  - type: text
    content: 'On traversa '
  - type: note
    content: Jos 3:14, etc.
  - type: text
    content: 'le fleuve à pied:'
  - type: text
    content: Alors nous nous réjouîmes en lui.
  '7':
  - type: text
    content: Il domine éternellement par sa puissance,
  - type: note
    content: 2 Ch 16:9. Job 28:24. Ps 33:13.
  - type: text
    content: 'Ses yeux observent les nations:'
  - type: text
    content: 'Que les rebelles ne s’élèvent pas! '
  - type: text
    content: — Pause.
  '8':
  - type: text
    content: Peuples, bénissez notre Dieu,
  - type: text
    content: Faites retentir sa louange!
  '9':
  - type: text
    content: Il a conservé la vie à notre âme,
  - type: text
    content: Et il n’a pas permis que notre pied chancelât.
