document_id: PSA.110,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Mt 22:41-46. Ac 2:33-36.) Hé 7. Ps 2:6-12.
  - type: text
    content: De David. Psaume.
  - type: text
    content: 'Parole de l’Éternel à mon Seigneur:'
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: Jusqu’à ce que je fasse de tes ennemis ton marchepied.
  '2':
  - type: text
    content: 'L’Éternel étendra de Sion le sceptre de ta puissance:'
  - type: text
    content: Domine au milieu de tes ennemis!
  '3':
  - type: text
    content: Ton peuple est plein d’ardeur, quand tu rassembles ton armée;
  - type: text
    content: Avec des ornements sacrés, du sein de l’aurore
  - type: text
    content: Ta jeunesse vient à toi comme une rosée.
  '4':
  - type: text
    content: 'L’Éternel l’a juré, et il ne s’en repentira point:'
  - type: text
    content: 'Tu es sacrificateur '
  - type: note
    content: Hé 5:6; 6:20; 7:17.
  - type: text
    content: pour toujours,
  - type: text
    content: A la manière de Melchisédek.
  '5':
  - type: text
    content: Le Seigneur, à ta droite,
  - type: text
    content: Brise des rois au jour de sa colère.
  '6':
  - type: text
    content: 'Il exerce la justice parmi les nations: '
  - type: note
    content: Ap 14:14, etc.; 16:14, etc.; 20:8, etc.
  - type: text
    content: tout est plein de cadavres;
  - type: text
    content: Il brise des têtes sur toute l’étendue du pays.
  '7':
  - type: text
    content: 'Il boit au torrent pendant la marche:'
  - type: text
    content: C’est pourquoi il relève la tête.
