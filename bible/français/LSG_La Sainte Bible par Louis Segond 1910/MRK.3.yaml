document_id: MRK.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’homme à la main sèche
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Mt 12:9-14. Lu 6:6-11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus entra de nouveau dans la synagogue. Il s’y trouvait un homme qui avait la main sèche. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, comme il guérissait beaucoup de gens, tous ceux qui avaient des maladies se jetaient sur lui pour le toucher. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les esprits impurs, quand ils le voyaient, se prosternaient devant lui, et s’écriaient: Tu es le Fils de Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il leur recommandait très sévèrement de ne pas le faire connaître.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Choix des douze apôtres
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-19: cf. Lu 6:12-19. (Mt 10:1-15. Ac 1:13.)'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il monta ensuite sur la montagne; il appela ceux qu’il voulut, et ils vinrent auprès de lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en établit douze, pour les avoir avec lui, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et pour les envoyer prêcher avec le pouvoir de chasser les démons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les douze qu’il établit: Simon, qu’il nomma Pierre; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacques, fils de Zébédée, et Jean, frère de Jacques, auxquels il donna le nom de Boanergès, qui signifie fils du tonnerre; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'André; Philippe; Barthélemy; Matthieu; Thomas; Jacques, fils d’Alphée; Thaddée; Simon le Cananite; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et Judas Iscariot, celui qui livra Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attaque des scribes et réponse de Jésus. Le péché contre le Saint-Esprit
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-30: cf. (Mt 12:22-37. Lu 11:14-23.)'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils observaient Jésus, pour voir s’il le guérirait le jour du sabbat: c’était afin de pouvoir l’accuser. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se rendirent à la maison, et la foule s’assembla de nouveau, en sorte '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’ils ne pouvaient pas même prendre leur repas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les parents de Jésus, ayant appris ce qui se passait, vinrent pour se saisir de lui; car ils disaient: Il est hors de sens. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les scribes, qui étaient descendus de Jérusalem, dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:48
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il est possédé de Béelzébul; c’est par le prince des démons qu’il chasse les démons. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus les appela, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'leur dit sous forme de paraboles: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comment Satan peut-il chasser Satan?
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si un royaume est divisé contre lui-même, ce royaume ne peut subsister;
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et si une maison est divisée contre elle-même, cette maison ne peut subsister.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc Satan se révolte contre lui-même, il est divisé, et il ne peut subsister, mais c’en est fait de lui.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Personne ne peut entrer dans la maison d’un homme fort et piller ses biens,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sans avoir auparavant lié cet homme fort; alors il pillera sa maison.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: tous les péchés seront pardonnés aux fils des hommes, et les blasphèmes qu’ils auront proférés;
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'mais quiconque blasphémera contre le Saint-Esprit n’obtiendra jamais de pardon: il est coupable d’un péché éternel.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus dit à l’homme qui avait la main sèche: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lève-toi, là au milieu.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus parla ainsi parce qu’ils disaient: Il est possédé d’un esprit impur.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mère et les frères de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-35: cf. (Mt 12:46-50. Lu 8:19-21.)'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Survinrent sa mère et ses frères, qui, se tenant dehors, l’envoyèrent appeler. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule était assise autour de lui, et on lui dit: Voici, ta mère et tes frères sont dehors et te demandent. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui est ma mère, et qui sont mes frères?
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, jetant les regards sur ceux qui étaient assis tout autour de lui: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voici,
    - type: text
      text: ' dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ma mère et mes frères.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, quiconque fait la volonté de Dieu, celui-là est mon frère, ma sœur, et ma mère.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est-il permis, le jour du sabbat, de faire du bien ou de faire du mal, de sauver une personne ou de la tuer?
    - type: text
      text: ' Mais ils gardèrent le silence. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, promenant ses regards sur eux avec indignation, et en même temps affligé de l’endurcissement de leur cœur, il dit à l’homme: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Étends ta main.
    - type: text
      text: ' Il l’étendit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 13:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et sa main fut guérie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:53
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les pharisiens sortirent, et aussitôt ils se consultèrent avec les hérodiens sur les moyens de le faire périr.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-12: cf. Mt 12:15-21. És 42:1-4.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus se retira vers la mer avec ses disciples. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Une grande multitude le suivit de la Galilée; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et de la Judée, et de Jérusalem, et de l’Idumée, et d’au-delà du Jourdain, et des environs de Tyr et de Sidon, une grande multitude, apprenant tout ce qu’il faisait, vint à lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il chargea ses disciples de tenir toujours à sa disposition une petite barque, afin de ne pas être pressé par la foule. '
