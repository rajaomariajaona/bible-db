document_id: MRK.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’homme à la main sèche
  - type: heading
    content: 'V. 1-6: cf. (Mt 12:9-14. Lu 6:6-11.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 12:9. Lu 6:6.
  - type: text
    content: 'Jésus entra de nouveau dans la synagogue. Il s’y trouvait un homme qui avait la main sèche. '
  '10':
  - type: text
    content: 'Car, comme il guérissait beaucoup de gens, tous ceux qui avaient des maladies se jetaient sur lui pour le toucher. '
  '11':
  - type: text
    content: 'Les esprits impurs, quand ils le voyaient, se prosternaient devant lui, et s’écriaient: Tu es le Fils de Dieu. '
  '12':
  - type: text
    content: Mais il leur recommandait très sévèrement de ne pas le faire connaître.
  - type: heading
    content: Choix des douze apôtres
  - type: heading
    content: 'V. 13-19: cf. Lu 6:12-19. (Mt 10:1-15. Ac 1:13.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:1. Mc 6:7. Lu 6:13; 9:1.
  - type: text
    content: 'Il monta ensuite sur la montagne; il appela ceux qu’il voulut, et ils vinrent auprès de lui. '
  '14':
  - type: text
    content: 'Il en établit douze, pour les avoir avec lui, '
  '15':
  - type: text
    content: 'et pour les envoyer prêcher avec le pouvoir de chasser les démons. '
  '16':
  - type: text
    content: 'Voici les douze qu’il établit: Simon, qu’il nomma Pierre; '
  '17':
  - type: text
    content: 'Jacques, fils de Zébédée, et Jean, frère de Jacques, auxquels il donna le nom de Boanergès, qui signifie fils du tonnerre; '
  '18':
  - type: text
    content: 'André; Philippe; Barthélemy; Matthieu; Thomas; Jacques, fils d’Alphée; Thaddée; Simon le Cananite; '
  '19':
  - type: text
    content: et Judas Iscariot, celui qui livra Jésus.
  - type: heading
    content: Attaque des scribes et réponse de Jésus. Le péché contre le Saint-Esprit
  - type: heading
    content: 'V. 20-30: cf. (Mt 12:22-37. Lu 11:14-23.)'
  '2':
  - type: text
    content: 'Ils observaient Jésus, pour voir s’il le guérirait le jour du sabbat: c’était afin de pouvoir l’accuser. '
  '20':
  - type: text
    content: 'Ils se rendirent à la maison, et la foule s’assembla de nouveau, en sorte '
  - type: note
    content: Mc 6:31.
  - type: text
    content: 'qu’ils ne pouvaient pas même prendre leur repas. '
  '21':
  - type: text
    content: 'Les parents de Jésus, ayant appris ce qui se passait, vinrent pour se saisir de lui; car ils disaient: Il est hors de sens. '
  '22':
  - type: text
    content: 'Et les scribes, qui étaient descendus de Jérusalem, dirent: '
  - type: note
    content: Mt 9:34; 12:24. Lu 11:15. Jn 8:48.
  - type: text
    content: 'Il est possédé de Béelzébul; c’est par le prince des démons qu’il chasse les démons. '
  '23':
  - type: text
    content: 'Jésus les appela, et '
  - type: note
    content: Mt 12:25.
  - type: text
    content: 'leur dit sous forme de paraboles: '
  - type: text
    content: Comment Satan peut-il chasser Satan?
  '24':
  - type: text
    content: ' '
  - type: text
    content: Si un royaume est divisé contre lui-même, ce royaume ne peut subsister;
  - type: text
    content: ' '
  '25':
  - type: text
    content: et si une maison est divisée contre elle-même, cette maison ne peut subsister.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si donc Satan se révolte contre lui-même, il est divisé, et il ne peut subsister, mais c’en est fait de lui.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mt 12:29.
  - type: text
    content: Personne ne peut entrer dans la maison d’un homme fort et piller ses biens,
  - type: text
    content: ' '
  - type: note
    content: Col 2:15.
  - type: text
    content: sans avoir auparavant lié cet homme fort; alors il pillera sa maison.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: 1 S 2:25. Mt 12:31. Lu 12:10. 1 Jn 5:16.
  - type: text
    content: tous les péchés seront pardonnés aux fils des hommes, et les blasphèmes qu’ils auront proférés;
  - type: text
    content: ' '
  '29':
  - type: note
    content: 1 Jn 5:16.
  - type: text
    content: 'mais quiconque blasphémera contre le Saint-Esprit n’obtiendra jamais de pardon: il est coupable d’un péché éternel.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Et Jésus dit à l’homme qui avait la main sèche: '
  - type: text
    content: Lève-toi, là au milieu.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Jésus parla ainsi parce qu’ils disaient: Il est possédé d’un esprit impur.'
  - type: heading
    content: La mère et les frères de Jésus
  - type: heading
    content: 'V. 31-35: cf. (Mt 12:46-50. Lu 8:19-21.)'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:46. Lu 8:19.
  - type: text
    content: 'Survinrent sa mère et ses frères, qui, se tenant dehors, l’envoyèrent appeler. '
  '32':
  - type: text
    content: 'La foule était assise autour de lui, et on lui dit: Voici, ta mère et tes frères sont dehors et te demandent. '
  '33':
  - type: text
    content: 'Et il répondit: '
  - type: text
    content: Qui est ma mère, et qui sont mes frères?
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Puis, jetant les regards sur ceux qui étaient assis tout autour de lui: '
  - type: text
    content: Voici,
  - type: text
    content: ' dit-il, '
  - type: text
    content: ma mère et mes frères.
  '35':
  - type: text
    content: ' '
  - type: note
    content: Jn 15:14. 2 Co 5:16, 17.
  - type: text
    content: Car, quiconque fait la volonté de Dieu, celui-là est mon frère, ma sœur, et ma mère.
  '4':
  - type: text
    content: 'Puis il leur dit: '
  - type: text
    content: Est-il permis, le jour du sabbat, de faire du bien ou de faire du mal, de sauver une personne ou de la tuer?
  - type: text
    content: ' Mais ils gardèrent le silence. '
  '5':
  - type: text
    content: 'Alors, promenant ses regards sur eux avec indignation, et en même temps affligé de l’endurcissement de leur cœur, il dit à l’homme: '
  - type: text
    content: Étends ta main.
  - type: text
    content: ' Il l’étendit, '
  - type: note
    content: 1 R 13:6.
  - type: text
    content: 'et sa main fut guérie. '
  '6':
  - type: note
    content: Mt 12:14. Jn 10:39; 11:53.
  - type: text
    content: Les pharisiens sortirent, et aussitôt ils se consultèrent avec les hérodiens sur les moyens de le faire périr.
  - type: heading
    content: 'V. 7-12: cf. Mt 12:15-21. És 42:1-4.'
  '7':
  - type: text
    content: 'Jésus se retira vers la mer avec ses disciples. '
  - type: note
    content: Mt 4:25. Lu 6:17.
  - type: text
    content: 'Une grande multitude le suivit de la Galilée; '
  '8':
  - type: text
    content: 'et de la Judée, et de Jérusalem, et de l’Idumée, et d’au-delà du Jourdain, et des environs de Tyr et de Sidon, une grande multitude, apprenant tout ce qu’il faisait, vint à lui. '
  '9':
  - type: text
    content: 'Il chargea ses disciples de tenir toujours à sa disposition une petite barque, afin de ne pas être pressé par la foule. '
