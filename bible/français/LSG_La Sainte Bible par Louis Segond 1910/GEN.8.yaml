document_id: GEN.8
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Ps 104:5-9. És 54:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu se souvint de Noé, de tous les animaux et de tout le bétail qui étaient avec lui dans l’arche; et Dieu fit passer un vent sur la terre, et les eaux s’apaisèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les sources de l’abîme et les écluses des cieux furent fermées, et la pluie ne tomba plus du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les eaux se retirèrent de dessus la terre, s’en allant et s’éloignant, et les eaux diminuèrent au bout de cent cinquante jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le septième mois, le dix-septième jour du mois, l’arche s’arrêta sur les montagnes d’Ararat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les eaux allèrent en diminuant jusqu’au dixième mois. Le dixième mois, le premier jour du mois, apparurent les sommets des montagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Au bout de quarante jours, Noé ouvrit la fenêtre qu’il avait faite à l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il lâcha le corbeau, qui sortit, partant et revenant, jusqu’à ce que les eaux eussent séché sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il lâcha aussi la colombe, pour voir si les eaux avaient diminué à la surface de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais la colombe ne trouva aucun lieu pour poser la plante de son pied, et elle revint à lui dans l’arche, car il y avait des eaux à la surface de toute la terre. Il avança la main, la prit, et la fit rentrer auprès de lui dans l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il attendit encore sept autres jours, et il lâcha de nouveau la colombe hors de l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La colombe revint à lui sur le soir; et voici, une feuille d’olivier arrachée était dans son bec. Noé connut ainsi que les eaux avaient diminué sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il attendit encore sept autres jours; et il lâcha la colombe. Mais elle ne revint plus à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’an six cent un, le premier mois, le premier jour du mois, les eaux avaient séché sur la terre. Noé ôta la couverture de l’arche: il regarda, et voici, la surface de la terre avait séché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le second mois, le vingt-septième jour du mois, la terre fut sèche.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-22: cf. Ge 9:8-17. És 54:9, 10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Dieu parla à Noé, en disant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sors de l’arche, toi et ta femme, tes fils et les femmes de tes fils avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fais sortir avec toi tous les animaux de toute chair qui sont avec toi, tant les oiseaux que le bétail et tous les reptiles qui rampent sur la terre: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:22
      metadata:
        usfm: GEN.1.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: GEN.1.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: GEN.9.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’ils se répandent sur la terre, qu’ils soient féconds et multiplient sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et Noé sortit, avec ses fils, sa femme, et les femmes de ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tous les animaux, tous les reptiles, tous les oiseaux, tout ce qui se meut sur la terre, selon leurs espèces, sortirent de l’arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Noé bâtit un autel à l’Éternel; il prit de toutes les bêtes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11
      metadata:
        usfm: LEV.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pures et de tous les oiseaux purs, et il offrit des holocaustes sur l’autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel sentit une odeur agréable, et l’Éternel dit en son cœur: Je ne maudirai plus la terre, à cause de l’homme, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 6:5
      metadata:
        usfm: GEN.6.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:15
      metadata:
        usfm: PRO.22.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:19
      metadata:
        usfm: MAT.15.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce que les pensées du cœur de l’homme sont mauvaises dès sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:15
      metadata:
        usfm: PRO.22.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'jeunesse; et je ne frapperai plus tout ce qui est vivant, comme je l’ai fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 33:20
      metadata:
        usfm: JER.33.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: JER.33.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tant que la terre subsistera, les semailles et la moisson, le froid et la chaleur, l’été et l’hiver, le jour et la nuit ne cesseront point.
