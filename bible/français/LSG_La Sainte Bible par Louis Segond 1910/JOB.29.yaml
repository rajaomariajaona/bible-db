document_id: JOB.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Monologue de Job: son ancienne prospérité, ses souffrances actuelles, son innocence'
  - type: heading
    content: 'V. 1-25: cf. (Ps 1:1-3; 112; 128.) Job 31:16-21, 31, 32. És 58:10-12.'
  - type: text
    content: 'Job prit de nouveau la parole sous forme sentencieuse et dit:'
  '10':
  - type: text
    content: La voix des chefs se taisait,
  - type: text
    content: Et leur langue s’attachait à leur palais.
  '11':
  - type: text
    content: L’oreille qui m’entendait me disait heureux,
  - type: text
    content: L’œil qui me voyait me rendait témoignage;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 72:12. Pr 21:13.
  - type: text
    content: Car je sauvais le pauvre qui implorait du secours,
  - type: text
    content: Et l’orphelin qui manquait d’appui.
  '13':
  - type: text
    content: La bénédiction du malheureux venait sur moi;
  - type: text
    content: Je remplissais de joie le cœur de la veuve.
  '14':
  - type: text
    content: ' '
  - type: note
    content: És 59:17. Ép 6:14, etc. 1 Th 5:8.
  - type: text
    content: Je me revêtais de la justice et je lui servais de vêtement,
  - type: text
    content: J’avais ma droiture pour manteau et pour turban.
  '15':
  - type: text
    content: J’étais l’œil de l’aveugle
  - type: text
    content: Et le pied du boiteux.
  '16':
  - type: text
    content: J’étais le père des misérables,
  - type: text
    content: J’examinais la cause de l’inconnu;
  '17':
  - type: text
    content: Je brisais la mâchoire de l’injuste,
  - type: text
    content: Et j’arrachais de ses dents la proie.
  '18':
  - type: text
    content: 'Alors je disais: Je mourrai dans mon nid,'
  - type: text
    content: Mes jours seront abondants comme le sable;
  '19':
  - type: text
    content: L’eau pénétrera dans mes racines,
  - type: text
    content: La rosée passera la nuit sur mes branches;
  '2':
  - type: text
    content: Oh! Que ne puis-je être comme aux mois du passé,
  - type: text
    content: Comme aux jours où Dieu me gardait,
  '20':
  - type: text
    content: Ma gloire reverdira sans cesse,
  - type: text
    content: Et mon arc rajeunira dans ma main.
  '21':
  - type: text
    content: On m’écoutait et l’on restait dans l’attente,
  - type: text
    content: On gardait le silence devant mes conseils.
  '22':
  - type: text
    content: Après mes discours, nul ne répliquait,
  - type: text
    content: Et ma parole était pour tous une bienfaisante rosée;
  '23':
  - type: text
    content: Ils comptaient sur moi comme sur la pluie,
  - type: text
    content: Ils ouvraient la bouche comme pour une pluie du printemps.
  '24':
  - type: text
    content: Je leur souriais quand ils perdaient courage,
  - type: text
    content: Et l’on ne pouvait chasser la sérénité de mon front.
  '25':
  - type: text
    content: J’aimais à aller vers eux, et je m’asseyais à leur tête;
  - type: text
    content: J’étais comme un roi au milieu d’une troupe,
  - type: text
    content: Comme un consolateur auprès des affligés.
  '3':
  - type: text
    content: Quand sa lampe brillait sur ma tête,
  - type: text
    content: Et que sa lumière me guidait dans les ténèbres!
  '4':
  - type: text
    content: Que ne suis-je comme aux jours de ma vigueur,
  - type: text
    content: Où Dieu veillait en ami sur ma tente,
  '5':
  - type: text
    content: Quand le Tout-Puissant était encore avec moi,
  - type: text
    content: Et que mes enfants m’entouraient;
  '6':
  - type: text
    content: Quand mes pieds se baignaient dans la crème
  - type: text
    content: Et que le rocher répandait près de moi des ruisseaux d’huile!
  '7':
  - type: text
    content: Si je sortais pour aller à la porte de la ville,
  - type: text
    content: Et si je me faisais préparer un siège dans la place,
  '8':
  - type: text
    content: Les jeunes gens se retiraient à mon approche,
  - type: text
    content: Les vieillards se levaient et se tenaient debout.
  '9':
  - type: text
    content: Les princes arrêtaient leurs discours,
  - type: text
    content: Et mettaient la main sur leur bouche;
