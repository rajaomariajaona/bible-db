document_id: JOB.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Monologue de Job: son ancienne prospérité, ses souffrances actuelles, son innocence'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-25: cf. (Ps 1:1-3; 112; 128.) Job 31:16-21, 31, 32. És 58:10-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit de nouveau la parole sous forme sentencieuse et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oh! Que ne puis-je être comme aux mois du passé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme aux jours où Dieu me gardait,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand sa lampe brillait sur ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que sa lumière me guidait dans les ténèbres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que ne suis-je comme aux jours de ma vigueur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où Dieu veillait en ami sur ma tente,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quand le Tout-Puissant était encore avec moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que mes enfants m’entouraient;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quand mes pieds se baignaient dans la crème
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le rocher répandait près de moi des ruisseaux d’huile!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si je sortais pour aller à la porte de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si je me faisais préparer un siège dans la place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les jeunes gens se retiraient à mon approche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les vieillards se levaient et se tenaient debout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les princes arrêtaient leurs discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mettaient la main sur leur bouche;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La voix des chefs se taisait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur langue s’attachait à leur palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’oreille qui m’entendait me disait heureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’œil qui me voyait me rendait témoignage;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 72:12
      metadata:
        usfm: PSA.72.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:13
      metadata:
        usfm: PRO.21.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car je sauvais le pauvre qui implorait du secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’orphelin qui manquait d’appui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La bénédiction du malheureux venait sur moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je remplissais de joie le cœur de la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:17
      metadata:
        usfm: ISA.59.17
    - type: text
      text: '. Ép 6:14, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:8
      metadata:
        usfm: 1TH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je me revêtais de la justice et je lui servais de vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’avais ma droiture pour manteau et pour turban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J’étais l’œil de l’aveugle
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le pied du boiteux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’étais le père des misérables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’examinais la cause de l’inconnu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je brisais la mâchoire de l’injuste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’arrachais de ses dents la proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors je disais: Je mourrai dans mon nid,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes jours seront abondants comme le sable;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’eau pénétrera dans mes racines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La rosée passera la nuit sur mes branches;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ma gloire reverdira sans cesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon arc rajeunira dans ma main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On m’écoutait et l’on restait dans l’attente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On gardait le silence devant mes conseils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Après mes discours, nul ne répliquait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma parole était pour tous une bienfaisante rosée;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils comptaient sur moi comme sur la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ouvraient la bouche comme pour une pluie du printemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je leur souriais quand ils perdaient courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on ne pouvait chasser la sérénité de mon front.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: J’aimais à aller vers eux, et je m’asseyais à leur tête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’étais comme un roi au milieu d’une troupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un consolateur auprès des affligés.
