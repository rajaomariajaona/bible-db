  - type: text
    text: Cantique des degrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ma détresse, c’est à l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je crie, et il m’exauce.
- type: usfm
  marker: q1
  children:
  - type: usfm
