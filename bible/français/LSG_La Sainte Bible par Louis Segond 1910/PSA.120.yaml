document_id: PSA.120,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Esd 4. Ps 12.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique des degrés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ma détresse, c’est à l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je crie, et il m’exauce.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Éternel, délivre mon âme de la lèvre mensongère,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 24:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De la langue trompeuse!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que te donne, que te rapporte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une langue trompeuse?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les traits aigus du guerrier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec les charbons ardents du genêt.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Malheureux que je suis de séjourner à Méschec,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’habiter parmi les tentes de Kédar!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Assez longtemps mon âme a demeuré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Auprès de ceux qui haïssent la paix.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je suis pour la paix; mais dès que je parle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont pour la guerre.
