  - type: text
    text: Les traits aigus du guerrier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec les charbons ardents du genêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Malheureux que je suis de séjourner à Méschec,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’habiter parmi les tentes de Kédar!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Assez longtemps mon âme a demeuré
- type: usfm
  marker: q1
  children:
  - type: text
    text: Auprès de ceux qui haïssent la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je suis pour la paix; mais dès que je parle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont pour la guerre.
