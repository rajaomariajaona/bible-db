document_id: PSA.10
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 12; 36; 64; 94; 140.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pourquoi, ô Éternel! Te tiens-tu éloigné?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi te caches-tu au temps de la détresse?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le méchant dans son orgueil poursuit les malheureux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:16
      metadata:
        usfm: PSA.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:16
      metadata:
        usfm: PSA.9.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:22
      metadata:
        usfm: PRO.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils sont victimes des trames qu’il a conçues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car le méchant se glorifie de sa convoitise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le ravisseur outrage, méprise l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le méchant dit avec arrogance: Il ne punit pas!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 14:1
      metadata:
        usfm: PSA.14.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 53:2
      metadata:
        usfm: PSA.53.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’y a point de Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà toutes ses pensées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ses voies réussissent en tout temps;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes jugements sont trop élevés pour l’atteindre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il souffle contre tous ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit en son cœur: Je ne chancelle pas,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis pour toujours à l’abri du malheur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:14
      metadata:
        usfm: ROM.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sa bouche est pleine de malédictions, de tromperies et de fraudes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a sous sa langue de la malice et de l’iniquité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il se tient en embuscade près des villages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il assassine l’innocent dans des lieux écartés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses yeux épient le malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il est aux aguets dans sa retraite, comme le lion dans sa tanière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est aux aguets pour surprendre le malheureux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il le surprend et l’attire dans son filet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il se courbe, il se baisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les misérables tombent dans ses griffes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 94:7
      metadata:
        usfm: PSA.94.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit en son cœur: Dieu oublie!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il cache sa face, il ne regarde jamais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lève-toi, Éternel! Ô Dieu, lève ta main!
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’oublie pas les malheureux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi le méchant méprise-t-il Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pourquoi dit-il en son cœur: Tu ne punis pas?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu regardes cependant, car tu vois la peine et la souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour prendre en main leur cause;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est à toi que s’abandonne le malheureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi qui viens en aide à l’orphelin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Brise le bras du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Punis ses iniquités, et qu’il disparaisse à tes yeux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 29:10
      metadata:
        usfm: PSA.29.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 145:13
      metadata:
        usfm: PSA.145.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 146:10
      metadata:
        usfm: PSA.146.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:10
      metadata:
        usfm: JER.10.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 5:19
      metadata:
        usfm: LAM.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:3
      metadata:
        usfm: DAN.4.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:27
      metadata:
        usfm: DAN.6.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:17
      metadata:
        usfm: 1TI.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel est roi à toujours et à perpétuité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nations sont exterminées de son pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu entends les vœux de ceux qui souffrent, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu affermis leur cœur; tu prêtes l’oreille
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pour rendre justice à l’orphelin et à l’opprimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que l’homme tiré de la terre cesse d’inspirer l’effroi.
