document_id: PSA.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 12; 36; 64; 94; 140.
  - type: text
    content: Pourquoi, ô Éternel! Te tiens-tu éloigné?
  - type: text
    content: Pourquoi te caches-tu au temps de la détresse?
  '10':
  - type: text
    content: Il se courbe, il se baisse,
  - type: text
    content: Et les misérables tombent dans ses griffes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 94:7.
  - type: text
    content: 'Il dit en son cœur: Dieu oublie!'
  - type: text
    content: Il cache sa face, il ne regarde jamais!
  '12':
  - type: text
    content: Lève-toi, Éternel! Ô Dieu, lève ta main!
  - type: text
    content: N’oublie pas les malheureux!
  '13':
  - type: text
    content: Pourquoi le méchant méprise-t-il Dieu?
  - type: text
    content: 'Pourquoi dit-il en son cœur: Tu ne punis pas?'
  '14':
  - type: text
    content: Tu regardes cependant, car tu vois la peine et la souffrance,
  - type: text
    content: Pour prendre en main leur cause;
  - type: text
    content: C’est à toi que s’abandonne le malheureux,
  - type: text
    content: C’est toi qui viens en aide à l’orphelin.
  '15':
  - type: text
    content: Brise le bras du méchant,
  - type: text
    content: Punis ses iniquités, et qu’il disparaisse à tes yeux!
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ps 29:10; 145:13; 146:10. Jé 10:10. La 5:19. Da 4:3; 6:27. 1 Ti 1:17.
  - type: text
    content: L’Éternel est roi à toujours et à perpétuité;
  - type: text
    content: Les nations sont exterminées de son pays.
  '17':
  - type: text
    content: Tu entends les vœux de ceux qui souffrent, ô Éternel!
  - type: text
    content: Tu affermis leur cœur; tu prêtes l’oreille
  '18':
  - type: text
    content: Pour rendre justice à l’orphelin et à l’opprimé,
  - type: text
    content: Afin que l’homme tiré de la terre cesse d’inspirer l’effroi.
  '2':
  - type: text
    content: Le méchant dans son orgueil poursuit les malheureux,
  - type: note
    content: Ps 7:16; 9:16. Pr 5:22.
  - type: text
    content: Ils sont victimes des trames qu’il a conçues.
  '3':
  - type: text
    content: Car le méchant se glorifie de sa convoitise,
  - type: text
    content: Et le ravisseur outrage, méprise l’Éternel.
  '4':
  - type: text
    content: 'Le méchant dit avec arrogance: Il ne punit pas!'
  - type: note
    content: Ps 14:1; 53:2.
  - type: text
    content: Il n’y a point de Dieu!
  - type: text
    content: Voilà toutes ses pensées.
  '5':
  - type: text
    content: Ses voies réussissent en tout temps;
  - type: text
    content: Tes jugements sont trop élevés pour l’atteindre,
  - type: text
    content: Il souffle contre tous ses adversaires.
  '6':
  - type: text
    content: 'Il dit en son cœur: Je ne chancelle pas,'
  - type: text
    content: Je suis pour toujours à l’abri du malheur!
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ro 3:14.
  - type: text
    content: Sa bouche est pleine de malédictions, de tromperies et de fraudes;
  - type: text
    content: Il y a sous sa langue de la malice et de l’iniquité.
  '8':
  - type: text
    content: Il se tient en embuscade près des villages,
  - type: text
    content: Il assassine l’innocent dans des lieux écartés;
  - type: text
    content: Ses yeux épient le malheureux.
  '9':
  - type: text
    content: Il est aux aguets dans sa retraite, comme le lion dans sa tanière,
  - type: text
    content: Il est aux aguets pour surprendre le malheureux;
  - type: text
    content: Il le surprend et l’attire dans son filet.
