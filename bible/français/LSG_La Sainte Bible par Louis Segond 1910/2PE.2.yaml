document_id: 2PE.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les faux docteurs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ac 20:29, 30. Jud v. 3-7. Ap 2:14, 15.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a eu parmi le peuple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 13:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 14:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:16-21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de faux prophètes, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il y aura de même parmi vous de faux docteurs, qui introduiront des sectes pernicieuses, et qui, reniant le maître qui les a rachetés, attireront sur eux une ruine soudaine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ceux surtout qui vont après la chair dans un désir d’impureté et qui méprisent l’autorité. Audacieux et arrogants, ils ne craignent pas d’injurier les gloires,
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-22: cf. (Jud v. 8-19. 2 Ti 3:1-9, 13.) Mt 12:43-45.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tandis que les anges, supérieurs en force et en puissance, ne portent pas contre elles de jugement injurieux devant le Seigneur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 12:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais eux, semblables à des brutes qui s’abandonnent à leurs penchants naturels et qui sont nées pour être prises et détruites, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jud v. 10.
      marker-yv: yv-n
    - type: text
      text: 'ils parlent d’une manière injurieuse de ce qu’ils ignorent, et ils périront par leur propre corruption, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'recevant ainsi le salaire de leur iniquité. Ils trouvent leurs délices à se livrer au plaisir en plein jour; hommes tarés et souillés, ils se délectent dans leurs tromperies, en faisant bonne chère avec vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont les yeux pleins d’adultère et insatiables de péché; ils amorcent les âmes mal affermies; ils ont le cœur exercé à la cupidité; ce sont des enfants de malédiction. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir quitté le droit chemin, ils se sont égarés '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 22:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: . Jud v. 11.
      marker-yv: yv-n
    - type: text
      text: 'en suivant la voie de Balaam, fils de Bosor, qui aima le salaire de l’iniquité, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais qui fut repris pour sa transgression: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 22:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une ânesse muette, faisant entendre une voix d’homme, arrêta la démence du prophète. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jud v. 12.
      marker-yv: yv-n
    - type: text
      text: 'Ces gens-là sont des fontaines sans eau, des nuées que chasse un tourbillon: l’obscurité des ténèbres leur est réservée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avec des discours enflés de vanité, ils amorcent par les convoitises de la chair, par les dissolutions, ceux qui viennent à peine d’échapper aux hommes qui vivent dans l’égarement; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils leur promettent la liberté, quand ils sont eux-mêmes esclaves de la corruption, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car chacun est esclave de ce qui a triomphé de lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs les suivront dans leurs dissolutions, et la voie de la vérité sera calomniée à cause d’eux. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'En effet, si, après s’être retirés des souillures du monde, par la connaissance du Seigneur et Sauveur Jésus-Christ, ils s’y engagent de nouveau et sont vaincus, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'leur dernière condition est pire que la première. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car mieux valait pour eux n’avoir pas connu la voie de la justice, que de se détourner, après l’avoir connue, du saint commandement qui leur avait été donné. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur est arrivé ce que dit un proverbe vrai: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le chien est retourné à ce qu’il avait vomi, et la truie lavée s’est vautrée dans le bourbier.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par cupidité, ils trafiqueront de vous au moyen de paroles trompeuses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jud v. 4.
      marker-yv: yv-n
    - type: text
      text: 'eux que menace depuis longtemps la condamnation, et dont la ruine ne sommeille point. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, si Dieu n’a pas épargné '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Jud v. 6. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 20:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les anges qui ont péché, mais s’il les a précipités dans les abîmes de ténèbres et les réserve pour le jugement; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il n’a pas épargné l’ancien monde, mais s’il a sauvé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 7:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Noé, lui huitième, ce prédicateur de la justice, lorsqu’il fit venir le déluge sur un monde d’impies; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il a condamné à la destruction et réduit en cendres les villes de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 29:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 16:49
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 11:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 4:11
      - type: text
        text: . Jud v. 7.
      marker-yv: yv-n
    - type: text
      text: 'Sodome et de Gomorrhe, les donnant comme exemple aux impies à venir, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et s’il a délivré le juste Lot, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'profondément attristé de la conduite de ces hommes sans frein dans leur dissolution '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(car ce juste, qui habitait au milieu d’eux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 119:158
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tourmentait journellement son âme juste à cause de ce qu’il voyait et entendait de leurs œuvres criminelles); '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le Seigneur sait délivrer de l’épreuve les hommes pieux, et réserver les injustes pour être punis au jour du jugement, '
