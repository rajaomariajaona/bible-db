document_id: 2PE.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les faux docteurs
  - type: heading
    content: 'V. 1-10: cf. Ac 20:29, 30. Jud v. 3-7. Ap 2:14, 15.'
  - type: text
    content: 'Il y a eu parmi le peuple '
  - type: note
    content: De 13:1. Jé 14:14; 23:16-21.
  - type: text
    content: 'de faux prophètes, et '
  - type: note
    content: Mt 24:11. Ac 20:29. 1 Ti 4:1. 2 Ti 3:1.
  - type: text
    content: 'il y aura de même parmi vous de faux docteurs, qui introduiront des sectes pernicieuses, et qui, reniant le maître qui les a rachetés, attireront sur eux une ruine soudaine. '
  '10':
  - type: text
    content: ceux surtout qui vont après la chair dans un désir d’impureté et qui méprisent l’autorité. Audacieux et arrogants, ils ne craignent pas d’injurier les gloires,
  - type: heading
    content: 'V. 11-22: cf. (Jud v. 8-19. 2 Ti 3:1-9, 13.) Mt 12:43-45.'
  '11':
  - type: text
    content: 'tandis que les anges, supérieurs en force et en puissance, ne portent pas contre elles de jugement injurieux devant le Seigneur. '
  '12':
  - type: note
    content: Jé 12:3.
  - type: text
    content: 'Mais eux, semblables à des brutes qui s’abandonnent à leurs penchants naturels et qui sont nées pour être prises et détruites, '
  - type: note
    content: Jud v. 10.
  - type: text
    content: 'ils parlent d’une manière injurieuse de ce qu’ils ignorent, et ils périront par leur propre corruption, '
  '13':
  - type: text
    content: 'recevant ainsi le salaire de leur iniquité. Ils trouvent leurs délices à se livrer au plaisir en plein jour; hommes tarés et souillés, ils se délectent dans leurs tromperies, en faisant bonne chère avec vous. '
  '14':
  - type: text
    content: 'Ils ont les yeux pleins d’adultère et insatiables de péché; ils amorcent les âmes mal affermies; ils ont le cœur exercé à la cupidité; ce sont des enfants de malédiction. '
  '15':
  - type: text
    content: 'Après avoir quitté le droit chemin, ils se sont égarés '
  - type: note
    content: No 22:7, 21. Jud v. 11.
  - type: text
    content: 'en suivant la voie de Balaam, fils de Bosor, qui aima le salaire de l’iniquité, '
  '16':
  - type: text
    content: 'mais qui fut repris pour sa transgression: '
  - type: note
    content: No 22:21.
  - type: text
    content: 'une ânesse muette, faisant entendre une voix d’homme, arrêta la démence du prophète. '
  '17':
  - type: note
    content: Jud v. 12.
  - type: text
    content: 'Ces gens-là sont des fontaines sans eau, des nuées que chasse un tourbillon: l’obscurité des ténèbres leur est réservée. '
  '18':
  - type: text
    content: 'Avec des discours enflés de vanité, ils amorcent par les convoitises de la chair, par les dissolutions, ceux qui viennent à peine d’échapper aux hommes qui vivent dans l’égarement; '
  '19':
  - type: text
    content: 'ils leur promettent la liberté, quand ils sont eux-mêmes esclaves de la corruption, '
  - type: note
    content: Jn 8:34. Ro 6:16.
  - type: text
    content: 'car chacun est esclave de ce qui a triomphé de lui. '
  '2':
  - type: text
    content: 'Plusieurs les suivront dans leurs dissolutions, et la voie de la vérité sera calomniée à cause d’eux. '
  '20':
  - type: note
    content: Hé 6:4; 10:26.
  - type: text
    content: 'En effet, si, après s’être retirés des souillures du monde, par la connaissance du Seigneur et Sauveur Jésus-Christ, ils s’y engagent de nouveau et sont vaincus, '
  - type: note
    content: Mt 12:45.
  - type: text
    content: 'leur dernière condition est pire que la première. '
  '21':
  - type: text
    content: 'Car mieux valait pour eux n’avoir pas connu la voie de la justice, que de se détourner, après l’avoir connue, du saint commandement qui leur avait été donné. '
  '22':
  - type: text
    content: 'Il leur est arrivé ce que dit un proverbe vrai: '
  - type: note
    content: Pr 26:11.
  - type: text
    content: Le chien est retourné à ce qu’il avait vomi, et la truie lavée s’est vautrée dans le bourbier.
  '3':
  - type: text
    content: 'Par cupidité, ils trafiqueront de vous au moyen de paroles trompeuses, '
  - type: note
    content: Jud v. 4.
  - type: text
    content: 'eux que menace depuis longtemps la condamnation, et dont la ruine ne sommeille point. '
  '4':
  - type: text
    content: 'Car, si Dieu n’a pas épargné '
  - type: note
    content: Jud v. 6. Ap 20:3.
  - type: text
    content: 'les anges qui ont péché, mais s’il les a précipités dans les abîmes de ténèbres et les réserve pour le jugement; '
  '5':
  - type: text
    content: 's’il n’a pas épargné l’ancien monde, mais s’il a sauvé '
  - type: note
    content: Ge 7:23. 1 Pi 3:19.
  - type: text
    content: 'Noé, lui huitième, ce prédicateur de la justice, lorsqu’il fit venir le déluge sur un monde d’impies; '
  '6':
  - type: text
    content: 's’il a condamné à la destruction et réduit en cendres les villes de '
  - type: note
    content: Ge 19:24. De 29:23. És 13:19. Jé 50:23. Éz 16:49. Os 11:8. Am 4:11. Jud v. 7.
  - type: text
    content: 'Sodome et de Gomorrhe, les donnant comme exemple aux impies à venir, '
  '7':
  - type: text
    content: 'et s’il a délivré le juste Lot, '
  - type: note
    content: Ge 19:7, 8.
  - type: text
    content: 'profondément attristé de la conduite de ces hommes sans frein dans leur dissolution '
  '8':
  - type: text
    content: '(car ce juste, qui habitait au milieu d’eux, '
  - type: note
    content: Ps 119:158.
  - type: text
    content: 'tourmentait journellement son âme juste à cause de ce qu’il voyait et entendait de leurs œuvres criminelles); '
  '9':
  - type: note
    content: 1 Co 10:13.
  - type: text
    content: 'le Seigneur sait délivrer de l’épreuve les hommes pieux, et réserver les injustes pour être punis au jour du jugement, '
