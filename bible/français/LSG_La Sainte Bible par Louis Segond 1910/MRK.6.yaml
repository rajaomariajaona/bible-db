document_id: MRK.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus à Nazareth. Incrédulité des habitants
  - type: heading
    content: 'V. 1-6: cf. (Mt 13:54-58.) Lu 4:16-30. Ro 10:21.'
  - type: text
    content: ' '
  - type: note
    content: Mt 13:53. Lu 4:16.
  - type: text
    content: 'Jésus partit de là, et se rendit dans sa patrie. Ses disciples le suivirent. '
  '10':
  - type: text
    content: 'Puis il leur dit: '
  - type: text
    content: Dans quelque maison que vous entriez, restez-y jusqu’à ce que vous partiez de ce lieu.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:14. Lu 9:5.
  - type: text
    content: Et, s’il y a quelque part des gens qui ne vous reçoivent ni ne vous écoutent, retirez-vous de là, et
  - type: text
    content: ' '
  - type: note
    content: Ac 13:51; 18:6.
  - type: text
    content: secouez la poussière de vos pieds, afin que cela leur serve de témoignage.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Ils partirent, et ils prêchèrent la repentance. '
  '13':
  - type: text
    content: 'Ils chassaient beaucoup de démons, '
  - type: note
    content: Ja 5:14.
  - type: text
    content: et ils oignaient d’huile beaucoup de malades et les guérissaient.
  - type: heading
    content: Mort de Jean-Baptiste
  - type: heading
    content: 'V. 14-29: cf. (Mt 14:1-12.) Lu 9:7-9; 3:19, 20.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:1. Lu 9:7.
  - type: text
    content: 'Le roi Hérode entendit parler de Jésus, dont le nom était devenu célèbre, et il dit: Jean-Baptiste est ressuscité des morts, et c’est pour cela qu’il se fait par lui des miracles. '
  '15':
  - type: text
    content: 'D’autres disaient: C’est Élie. Et d’autres disaient: C’est un prophète comme l’un des prophètes. '
  '16':
  - type: text
    content: 'Mais Hérode, en apprenant cela, disait: Ce Jean que j’ai fait décapiter, c’est lui qui est ressuscité. '
  '17':
  - type: note
    content: Mt 14:3. Lu 3:19; 9:9.
  - type: text
    content: 'Car Hérode lui-même avait fait arrêter Jean, et l’avait fait lier en prison, à cause d’Hérodias, femme de Philippe, son frère, parce qu’il l’avait épousée, '
  '18':
  - type: text
    content: 'et que Jean lui disait: '
  - type: note
    content: Lé 8:16; 20:21.
  - type: text
    content: 'Il ne t’est pas permis d’avoir la femme de ton frère. '
  '19':
  - type: text
    content: 'Hérodias était irritée contre Jean, et voulait le faire mourir. '
  '2':
  - type: text
    content: 'Quand le sabbat fut venu, il se mit à enseigner dans la synagogue. Beaucoup de gens qui l’entendirent étaient étonnés et disaient: D’où lui viennent ces choses? Quelle est cette sagesse qui lui a été donnée, et comment de tels miracles se font-ils par ses mains? '
  '20':
  - type: text
    content: 'Mais elle ne le pouvait; car Hérode craignait Jean, le connaissant pour un homme '
  - type: note
    content: Mt 14:5; 21:26.
  - type: text
    content: 'juste et saint; il le protégeait, et, après l’avoir entendu, il était souvent perplexe, et l’écoutait avec plaisir. '
  '21':
  - type: text
    content: 'Cependant, un jour propice arriva, lorsque Hérode, à '
  - type: note
    content: Ge 40:20. Mt 14:6.
  - type: text
    content: 'l’anniversaire de sa naissance, donna un festin à ses grands, aux chefs militaires et aux principaux de la Galilée. '
  '22':
  - type: text
    content: 'La fille d’Hérodias entra dans la salle; elle dansa, et plut à Hérode et à ses convives. Le roi dit à la jeune fille: Demande-moi ce que tu voudras, et je te le donnerai. '
  '23':
  - type: note
    content: Jg 11:30.
  - type: text
    content: 'Il ajouta avec serment: Ce que tu me demanderas, je te le donnerai, fût-ce la moitié de mon royaume. '
  '24':
  - type: text
    content: 'Étant sortie, elle dit à sa mère: Que demanderai-je? Et sa mère répondit: La tête de Jean-Baptiste. '
  '25':
  - type: text
    content: 'Elle s’empressa de rentrer aussitôt vers le roi, et lui fit cette demande: Je veux que tu me donnes à l’instant, sur un plat, la tête de Jean-Baptiste. '
  '26':
  - type: text
    content: 'Le roi fut attristé; mais, à cause de ses serments et des convives, il ne voulut pas lui faire un refus. '
  '27':
  - type: note
    content: Mt 14:10.
  - type: text
    content: 'Il envoya sur-le-champ un garde, avec ordre d’apporter la tête de Jean-Baptiste. '
  '28':
  - type: text
    content: 'Le garde alla décapiter Jean dans la prison, et apporta la tête sur un plat. Il la donna à la jeune fille, et la jeune fille la donna à sa mère. '
  '29':
  - type: text
    content: Les disciples de Jean, ayant appris cela, vinrent prendre son corps, et le mirent dans un sépulcre.
  - type: heading
    content: Multiplication des pains
  - type: heading
    content: 'V. 30-44: cf. (Mt 14:13-21. Lu 9:10-17. Jn 6:1-14.) Mc 8:1-9.'
  '3':
  - type: note
    content: Jn 6:42.
  - type: text
    content: 'N’est-ce pas le charpentier, le fils de Marie, le frère de Jacques, de Joses, de Jude et de Simon? Et ses sœurs ne sont-elles pas ici parmi nous? Et il était pour eux une occasion de chute. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Lu 9:10.
  - type: text
    content: 'Les apôtres, s’étant rassemblés auprès de Jésus, lui racontèrent tout ce qu’ils avaient fait et tout ce qu’ils avaient enseigné. '
  '31':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Venez à l’écart dans un lieu désert, et reposez-vous un peu.
  - type: text
    content: ' Car il y avait beaucoup d’allants et de venants, '
  - type: note
    content: Mc 3:20.
  - type: text
    content: 'et ils n’avaient même pas le temps de manger. '
  '32':
  - type: note
    content: Mt 14:13. Lu 9:10. Jn 6:1.
  - type: text
    content: 'Ils partirent donc dans une barque, pour aller à l’écart dans un lieu désert. '
  '33':
  - type: text
    content: 'Beaucoup de gens les virent s’en aller et les reconnurent, et de toutes les villes on accourut à pied et on les devança au lieu où ils se rendaient. '
  '34':
  - type: text
    content: 'Quand il sortit de la barque, '
  - type: note
    content: Mt 9:36; 14:14.
  - type: text
    content: 'Jésus vit une grande foule, et fut ému de compassion pour eux, '
  - type: note
    content: Jé 23:1. Éz 34:2.
  - type: text
    content: 'parce qu’ils étaient comme des brebis qui n’ont point de berger; '
  - type: note
    content: Lu 9:11.
  - type: text
    content: 'et il se mit à leur enseigner beaucoup de choses. '
  '35':
  - type: note
    content: Mt 14:15. Lu 9:12. Jn 6:5.
  - type: text
    content: 'Comme l’heure était déjà avancée, ses disciples s’approchèrent de lui, et dirent: Ce lieu est désert, et l’heure est déjà avancée; '
  '36':
  - type: text
    content: 'renvoie-les, afin qu’ils aillent dans les campagnes et dans les villages des environs, pour s’acheter de quoi manger. '
  '37':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Donnez-leur vous-mêmes à manger.
  - type: text
    content: ' Mais ils lui dirent: Irions-nous acheter des pains pour deux cents deniers, et leur donnerions-nous à manger? '
  '38':
  - type: text
    content: 'Et il leur dit: '
  - type: text
    content: Combien avez-vous de pains? Allez voir.
  - type: text
    content: ' '
  - type: note
    content: Mt 14:17. Lu 9:13. Jn 6:9.
  - type: text
    content: 'Ils s’en assurèrent, et répondirent: Cinq, et deux poissons. '
  '39':
  - type: text
    content: 'Alors il leur commanda de les faire tous asseoir par groupes sur l’herbe verte, '
  '4':
  - type: text
    content: 'Mais Jésus leur dit: '
  - type: note
    content: Mt 13:57. Lu 4:24. Jn 4:44.
  - type: text
    content: Un prophète n’est méprisé que dans sa patrie, parmi ses parents, et dans sa maison.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'et ils s’assirent par rangées de cent et de cinquante. '
  '41':
  - type: text
    content: 'Il prit les cinq pains et les deux poissons et, '
  - type: note
    content: Jn 17:1.
  - type: text
    content: 'levant les yeux vers le ciel, '
  - type: note
    content: 1 S 9:13.
  - type: text
    content: 'il rendit grâces. Puis, il rompit les pains, et les donna aux disciples, afin qu’ils les distribuassent à la foule. Il partagea aussi les deux poissons entre tous. '
  '42':
  - type: text
    content: 'Tous mangèrent et furent rassasiés, '
  '43':
  - type: text
    content: 'et l’on emporta douze paniers pleins de morceaux de pain et de ce qui restait des poissons. '
  '44':
  - type: text
    content: Ceux qui avaient mangé les pains étaient cinq mille hommes.
  - type: heading
    content: Jésus marche sur les eaux
  - type: heading
    content: 'V. 45-52: cf. (Mt 14:22-33. Jn 6:15-21.)'
  '45':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:22. Jn 6:17.
  - type: text
    content: 'Aussitôt après, il obligea ses disciples à monter dans la barque et à passer avant lui de l’autre côté, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  '46':
  - type: note
    content: Mt 14:23. Lu 6:12.
  - type: text
    content: 'Quand il l’eut renvoyée, il s’en alla sur la montagne, pour prier. '
  '47':
  - type: note
    content: Mt 14:23. Jn 6:16.
  - type: text
    content: 'Le soir étant venu, la barque était au milieu de la mer, et Jésus était seul à terre. '
  '48':
  - type: text
    content: 'Il vit qu’ils avaient beaucoup de peine à ramer; car le vent leur était contraire. A la quatrième veille de la nuit environ, il alla vers eux, marchant sur la mer, et il voulait les dépasser. '
  '49':
  - type: text
    content: 'Quand ils le virent marcher sur la mer, ils crurent que c’était un fantôme, et ils poussèrent des cris; '
  '5':
  - type: note
    content: Mt 13:58.
  - type: text
    content: 'Il ne put faire là aucun miracle, si ce n’est qu’il imposa les mains à quelques malades et les guérit. '
  '50':
  - type: text
    content: 'car ils le voyaient tous, et ils étaient troublés. Aussitôt Jésus leur parla, et leur dit: '
  - type: text
    content: Rassurez-vous, c’est moi, n’ayez pas peur!
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Puis il monta vers eux dans la barque, et le vent cessa. Ils furent en eux-mêmes tout stupéfaits et remplis d’étonnement; '
  '52':
  - type: text
    content: car ils n’avaient pas compris le miracle des pains, parce que leur cœur était endurci.
  - type: heading
    content: Guérisons à Génésareth
  - type: heading
    content: 'V. 53-56: cf. Mt 14:34-36. Jn 6:22, etc.'
  '53':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:34.
  - type: text
    content: 'Après avoir traversé la mer, ils vinrent dans le pays de Génésareth, et ils abordèrent. '
  '54':
  - type: text
    content: 'Quand ils furent sortis de la barque, les gens, ayant aussitôt reconnu Jésus, '
  '55':
  - type: text
    content: 'parcoururent tous les environs, et l’on se mit à apporter les malades sur des lits, partout où l’on apprenait qu’il était. '
  '56':
  - type: text
    content: En quelque lieu qu’il arrivât, dans les villages, dans les villes ou dans les campagnes, on mettait les malades sur les places publiques, et on le priait de leur permettre seulement de toucher le bord de son vêtement. Et tous ceux qui le touchaient étaient guéris.
  '6':
  - type: text
    content: Et il s’étonnait de leur incrédulité.
  - type: heading
    content: Mission des douze apôtres
  - type: heading
    content: 'V. 7-13: cf. (Mt 10; 11:1. Lu 9:1-6.) Lu 10:1-20.'
  - type: note
    content: Mt 9:35. Lu 13:22.
  - type: text
    content: 'Jésus parcourait les villages d’alentour, en enseignant. '
  '7':
  - type: note
    content: Mt 10:1. Lu 6:13; 9:1.
  - type: text
    content: 'Alors il appela les douze, et il commença à les envoyer deux à deux, en leur donnant pouvoir sur les esprits impurs. '
  '8':
  - type: text
    content: 'Il leur prescrivit de ne rien prendre pour le voyage, si ce n’est un bâton; de n’avoir ni pain, ni sac, ni monnaie dans la ceinture; '
  '9':
  - type: note
    content: Ac 12:8.
  - type: text
    content: 'de chausser des sandales, et de ne pas revêtir deux tuniques. '
