      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt après, il obligea ses disciples à monter dans la barque et à passer avant lui de l’autre côté, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
