      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après avoir traversé la mer, ils vinrent dans le pays de Génésareth, et ils abordèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Quand ils furent sortis de la barque, les gens, ayant aussitôt reconnu Jésus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'parcoururent tous les environs, et l’on se mit à apporter les malades sur des lits, partout où l’on apprenait qu’il était. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: En quelque lieu qu’il arrivât, dans les villages, dans les villes ou dans les campagnes, on mettait les malades sur les places publiques, et on le priait de leur permettre seulement de toucher le bord de son vêtement. Et tous ceux qui le touchaient étaient guéris.
