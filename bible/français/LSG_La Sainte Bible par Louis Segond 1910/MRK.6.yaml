    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand il l’eut renvoyée, il s’en alla sur la montagne, pour prier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:23
      metadata:
        usfm: MAT.14.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
