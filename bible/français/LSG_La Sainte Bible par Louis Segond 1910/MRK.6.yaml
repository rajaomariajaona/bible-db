      - type: text
        text: Jn 6:16
      metadata:
        usfm: JHN.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le soir étant venu, la barque était au milieu de la mer, et Jésus était seul à terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Il vit qu’ils avaient beaucoup de peine à ramer; car le vent leur était contraire. A la quatrième veille de la nuit environ, il alla vers eux, marchant sur la mer, et il voulait les dépasser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Quand ils le virent marcher sur la mer, ils crurent que c’était un fantôme, et ils poussèrent des cris; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'car ils le voyaient tous, et ils étaient troublés. Aussitôt Jésus leur parla, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rassurez-vous, c’est moi, n’ayez pas peur!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Puis il monta vers eux dans la barque, et le vent cessa. Ils furent en eux-mêmes tout stupéfaits et remplis d’étonnement; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: car ils n’avaient pas compris le miracle des pains, parce que leur cœur était endurci.
