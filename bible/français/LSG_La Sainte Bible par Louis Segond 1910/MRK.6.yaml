document_id: MRK.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Nazareth. Incrédulité des habitants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (Mt 13:54-58.) Lu 4:16-30. Ro 10:21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:53
      metadata:
        usfm: MAT.13.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:16
      metadata:
        usfm: LUK.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus partit de là, et se rendit dans sa patrie. Ses disciples le suivirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand le sabbat fut venu, il se mit à enseigner dans la synagogue. Beaucoup de gens qui l’entendirent étaient étonnés et disaient: D’où lui viennent ces choses? Quelle est cette sagesse qui lui a été donnée, et comment de tels miracles se font-ils par ses mains? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:42
      metadata:
        usfm: JHN.6.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’est-ce pas le charpentier, le fils de Marie, le frère de Jacques, de Joses, de Jude et de Simon? Et ses sœurs ne sont-elles pas ici parmi nous? Et il était pour eux une occasion de chute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais Jésus leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:57
      metadata:
        usfm: MAT.13.57
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:24
      metadata:
        usfm: LUK.4.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:44
      metadata:
        usfm: JHN.4.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un prophète n’est méprisé que dans sa patrie, parmi ses parents, et dans sa maison.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:58
      metadata:
        usfm: MAT.13.58
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ne put faire là aucun miracle, si ce n’est qu’il imposa les mains à quelques malades et les guérit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et il s’étonnait de leur incrédulité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mission des douze apôtres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-13: cf. (Mt 10; 11:1. Lu 9:1-6.) Lu 10:1-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:35
      metadata:
        usfm: MAT.9.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:22
      metadata:
        usfm: LUK.13.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus parcourait les villages d’alentour, en enseignant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:1
      metadata:
        usfm: MAT.10.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:13
      metadata:
        usfm: LUK.6.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: LUK.9.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors il appela les douze, et il commença à les envoyer deux à deux, en leur donnant pouvoir sur les esprits impurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il leur prescrivit de ne rien prendre pour le voyage, si ce n’est un bâton; de n’avoir ni pain, ni sac, ni monnaie dans la ceinture; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:8
      metadata:
        usfm: ACT.12.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de chausser des sandales, et de ne pas revêtir deux tuniques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dans quelque maison que vous entriez, restez-y jusqu’à ce que vous partiez de ce lieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:14
      metadata:
        usfm: MAT.10.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:5
      metadata:
        usfm: LUK.9.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et, s’il y a quelque part des gens qui ne vous reçoivent ni ne vous écoutent, retirez-vous de là, et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:51
      metadata:
        usfm: ACT.13.51
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:6
      metadata:
        usfm: ACT.18.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: secouez la poussière de vos pieds, afin que cela leur serve de témoignage.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils partirent, et ils prêchèrent la repentance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils chassaient beaucoup de démons, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 5:14
      metadata:
        usfm: JAS.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et ils oignaient d’huile beaucoup de malades et les guérissaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-29: cf. (Mt 14:1-12.) Lu 9:7-9; 3:19, 20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:1
      metadata:
        usfm: MAT.14.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:7
      metadata:
        usfm: LUK.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi Hérode entendit parler de Jésus, dont le nom était devenu célèbre, et il dit: Jean-Baptiste est ressuscité des morts, et c’est pour cela qu’il se fait par lui des miracles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'D’autres disaient: C’est Élie. Et d’autres disaient: C’est un prophète comme l’un des prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais Hérode, en apprenant cela, disait: Ce Jean que j’ai fait décapiter, c’est lui qui est ressuscité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:3
      metadata:
        usfm: MAT.14.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:19
      metadata:
        usfm: LUK.3.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:9
      metadata:
        usfm: LUK.9.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car Hérode lui-même avait fait arrêter Jean, et l’avait fait lier en prison, à cause d’Hérodias, femme de Philippe, son frère, parce qu’il l’avait épousée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et que Jean lui disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 8:16
      metadata:
        usfm: LEV.8.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:21
      metadata:
        usfm: LEV.20.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ne t’est pas permis d’avoir la femme de ton frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hérodias était irritée contre Jean, et voulait le faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais elle ne le pouvait; car Hérode craignait Jean, le connaissant pour un homme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:5
      metadata:
        usfm: MAT.14.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:26
      metadata:
        usfm: MAT.21.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'juste et saint; il le protégeait, et, après l’avoir entendu, il était souvent perplexe, et l’écoutait avec plaisir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant, un jour propice arriva, lorsque Hérode, à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 40:20
      metadata:
        usfm: GEN.40.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:6
      metadata:
        usfm: MAT.14.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’anniversaire de sa naissance, donna un festin à ses grands, aux chefs militaires et aux principaux de la Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La fille d’Hérodias entra dans la salle; elle dansa, et plut à Hérode et à ses convives. Le roi dit à la jeune fille: Demande-moi ce que tu voudras, et je te le donnerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:30
      metadata:
        usfm: JDG.11.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ajouta avec serment: Ce que tu me demanderas, je te le donnerai, fût-ce la moitié de mon royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Étant sortie, elle dit à sa mère: Que demanderai-je? Et sa mère répondit: La tête de Jean-Baptiste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elle s’empressa de rentrer aussitôt vers le roi, et lui fit cette demande: Je veux que tu me donnes à l’instant, sur un plat, la tête de Jean-Baptiste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi fut attristé; mais, à cause de ses serments et des convives, il ne voulut pas lui faire un refus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:10
      metadata:
        usfm: MAT.14.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il envoya sur-le-champ un garde, avec ordre d’apporter la tête de Jean-Baptiste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le garde alla décapiter Jean dans la prison, et apporta la tête sur un plat. Il la donna à la jeune fille, et la jeune fille la donna à sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les disciples de Jean, ayant appris cela, vinrent prendre son corps, et le mirent dans un sépulcre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Multiplication des pains
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-44: cf. (Mt 14:13-21. Lu 9:10-17. Jn 6:1-14.) Mc 8:1-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:10
      metadata:
        usfm: LUK.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les apôtres, s’étant rassemblés auprès de Jésus, lui racontèrent tout ce qu’ils avaient fait et tout ce qu’ils avaient enseigné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Venez à l’écart dans un lieu désert, et reposez-vous un peu.
  - type: text
    text: ' Car il y avait beaucoup d’allants et de venants, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:20
      metadata:
        usfm: MRK.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ils n’avaient même pas le temps de manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:13
      metadata:
        usfm: MAT.14.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:10
      metadata:
        usfm: LUK.9.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:1
      metadata:
        usfm: JHN.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils partirent donc dans une barque, pour aller à l’écart dans un lieu désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Beaucoup de gens les virent s’en aller et les reconnurent, et de toutes les villes on accourut à pied et on les devança au lieu où ils se rendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quand il sortit de la barque, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:36
      metadata:
        usfm: MAT.9.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:14
      metadata:
        usfm: MAT.14.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus vit une grande foule, et fut ému de compassion pour eux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:1
      metadata:
        usfm: JER.23.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:2
      metadata:
        usfm: EZK.34.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce qu’ils étaient comme des brebis qui n’ont point de berger; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:11
      metadata:
        usfm: LUK.9.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et il se mit à leur enseigner beaucoup de choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:15
      metadata:
        usfm: MAT.14.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:12
      metadata:
        usfm: LUK.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:5
      metadata:
        usfm: JHN.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme l’heure était déjà avancée, ses disciples s’approchèrent de lui, et dirent: Ce lieu est désert, et l’heure est déjà avancée; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'renvoie-les, afin qu’ils aillent dans les campagnes et dans les villages des environs, pour s’acheter de quoi manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Donnez-leur vous-mêmes à manger.
  - type: text
    text: ' Mais ils lui dirent: Irions-nous acheter des pains pour deux cents deniers, et leur donnerions-nous à manger? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Et il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Combien avez-vous de pains? Allez voir.
  - type: text
