    marker-yv: yv-n
  - type: text
    text: 'Ils s’en assurèrent, et répondirent: Cinq, et deux poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Alors il leur commanda de les faire tous asseoir par groupes sur l’herbe verte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'et ils s’assirent par rangées de cent et de cinquante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il prit les cinq pains et les deux poissons et, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:1
      metadata:
        usfm: JHN.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'levant les yeux vers le ciel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 9:13
      metadata:
        usfm: 1SA.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il rendit grâces. Puis, il rompit les pains, et les donna aux disciples, afin qu’ils les distribuassent à la foule. Il partagea aussi les deux poissons entre tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tous mangèrent et furent rassasiés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'et l’on emporta douze paniers pleins de morceaux de pain et de ce qui restait des poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ceux qui avaient mangé les pains étaient cinq mille hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur les eaux
  marker-yv: yv-h
- type: usfm
