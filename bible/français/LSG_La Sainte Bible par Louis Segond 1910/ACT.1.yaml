document_id: ACT.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Introduction. Ascension de Jésus-Christ. Retour des apôtres à Jérusalem
  - type: heading
    content: 'V. 1-11: cf. Lu 1:1-4; 24:33-51. (Mt 28:18-20. Mc 16:15-19.) Ép 4:8-10.'
  - type: text
    content: 'Théophile, j’ai parlé, dans mon premier livre, de tout ce que Jésus a commencé de faire et d’enseigner dès le commencement '
  '10':
  - type: text
    content: 'Et comme ils avaient les regards fixés vers le ciel pendant qu’il s’en allait, voici, deux hommes '
  - type: note
    content: Mt 28:3.
  - type: text
    content: 'vêtus de blanc leur apparurent, '
  '11':
  - type: text
    content: 'et dirent: Hommes Galiléens, pourquoi vous arrêtez-vous à regarder au ciel? Ce Jésus, qui a été enlevé au ciel du milieu de vous, '
  - type: note
    content: Da 7:13. Mt 24:30. Mc 13:26. Lu 21:27. 1 Th 1:10. 2 Th 1:10. Ap 1:7.
  - type: text
    content: reviendra de la même manière que vous l’avez vu allant au ciel.
  - type: heading
    content: 'V. 12-14: cf. Lu 24:49-53. Ps 133. Mt 18:19, 20.'
  '12':
  - type: text
    content: 'Alors ils retournèrent à Jérusalem, de la montagne appelée des oliviers, qui est près de Jérusalem, à la distance d’un chemin de sabbat. '
  '13':
  - type: text
    content: 'Quand ils furent arrivés, ils montèrent dans la chambre haute où ils se tenaient d’ordinaire; c’étaient Pierre, Jean, Jacques, André, Philippe, Thomas, Barthélemy, Matthieu, Jacques, fils d’Alphée, Simon le Zélote, et Jude, fils de Jacques. '
  '14':
  - type: text
    content: 'Tous d’un commun accord persévéraient dans la prière, avec les femmes, et Marie, mère de Jésus, et avec '
  - type: note
    content: Mt 13:55.
  - type: text
    content: les frères de Jésus.
  - type: heading
    content: Matthias élu apôtre en remplacement de Judas
  - type: heading
    content: 'V. 15-26: cf. (Jn 12:4-6. Mt 26:14-16, 46-50; 27:3-10.) Pr 16:33.'
  '15':
  - type: text
    content: 'En ces jours-là, Pierre se leva au milieu des frères, le nombre des personnes réunies étant d’environ cent vingt. Et il dit: '
  '16':
  - type: text
    content: 'Hommes frères, il fallait que s’accomplît '
  - type: note
    content: Ps 41:10. Mt 26:23. Jn 13:18.
  - type: text
    content: 'ce que le Saint-Esprit, dans l’Écriture, a annoncé d’avance, par la bouche de David, au sujet de Judas, '
  - type: note
    content: Mt 26:47. Mc 14:43. Jn 18:3.
  - type: text
    content: 'qui a été le guide de ceux qui ont saisi Jésus. '
  '17':
  - type: note
    content: Mt 10:4. Mc 3:19. Lu 6:16.
  - type: text
    content: 'Il était compté parmi nous, et il avait part au même ministère. '
  '18':
  - type: text
    content: 'Cet homme, ayant acquis un champ avec le salaire du crime, '
  - type: note
    content: 2 S 17:23. Mt 27:5.
  - type: text
    content: 'est tombé, s’est rompu par le milieu du corps, et toutes ses entrailles se sont répandues. '
  '19':
  - type: text
    content: 'La chose a été si connue de tous les habitants de Jérusalem que ce champ a été '
  - type: note
    content: Mt 27:8.
  - type: text
    content: 'appelé dans leur langue Hakeldama, c’est-à-dire, champ du sang. '
  '2':
  - type: note
    content: Mc 16:19. Lu 9:51. 1 Ti 3:16.
  - type: text
    content: 'jusqu’au jour où il fut enlevé au ciel, après avoir donné '
  - type: note
    content: Jn 20:21.
  - type: text
    content: 'ses ordres, par le Saint-Esprit, aux apôtres qu’il avait choisis. '
  '20':
  - type: text
    content: 'Or, il est écrit dans le livre des Psaumes:'
  - type: note
    content: Ps 69:26.
  - type: text
    content: Que sa demeure devienne déserte,
  - type: text
    content: Et que personne ne l’habite!
  - type: text
    content: 'Et:'
  - type: note
    content: Ps 109:8.
  - type: text
    content: Qu’un autre prenne sa charge!
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ac 6:3.
  - type: text
    content: 'Il faut donc que, parmi ceux qui nous ont accompagnés tout le temps que le Seigneur Jésus a vécu avec nous, '
  '22':
  - type: text
    content: 'depuis le baptême de Jean jusqu’au jour où il a été '
  - type: note
    content: Ac 1:9.
  - type: text
    content: 'enlevé du milieu de nous, il y en ait un qui nous soit associé comme témoin de sa résurrection. '
  '23':
  - type: note
    content: Ac 6:6.
  - type: text
    content: 'Ils en présentèrent deux: Joseph appelé Barsabbas, surnommé Justus, et Matthias. '
  '24':
  - type: text
    content: 'Puis ils firent cette prière: Seigneur, '
  - type: note
    content: 1 S 16:17. 1 Ch 28:9; 29:17. Ps 7:10. Jé 11:20; 17:10; 20:12. Ac 15:8. Ap 2:23.
  - type: text
    content: 'toi qui connais les cœurs de tous, désigne lequel de ces deux tu as choisi, '
  '25':
  - type: text
    content: 'afin qu’il ait part à ce ministère et à cet apostolat, que Judas a abandonné pour aller en son lieu. '
  '26':
  - type: text
    content: Ils tirèrent au sort, et le sort tomba sur Matthias, qui fut associé aux onze apôtres.
  '3':
  - type: note
    content: Mc 16:14. Jn 20:19; 21:1. 1 Co 15:5.
  - type: text
    content: 'Après qu’il eut souffert, il leur apparut vivant, et leur en donna plusieurs preuves, se montrant à eux pendant quarante jours, et parlant des choses qui concernent le royaume de Dieu. '
  '4':
  - type: note
    content: Lu 24:18, 49.
  - type: text
    content: 'Comme il se trouvait avec eux, il leur recommanda de ne pas s’éloigner de Jérusalem, mais '
  - type: text
    content: d’attendre ce que le Père avait promis,
  - type: text
    content: ' '
  - type: note
    content: Jn 14:26; 15:26; 16:7.
  - type: text
    content: ce que je vous ai annoncé, leur dit-il;
  '5':
  - type: text
    content: ' '
  - type: note
    content: Mt 3:11. Mc 1:8. Lu 3:16. Jn 1:26. Ac 11:16; 19:4.
  - type: text
    content: car Jean a baptisé d’eau,
  - type: text
    content: ' '
  - type: note
    content: És 44:3. Joë 2:28. Ac 2:4; 11:15.
  - type: text
    content: mais vous, dans peu de jours, vous serez baptisés du Saint-Esprit.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Alors les apôtres réunis lui demandèrent: '
  - type: note
    content: Mt 24:3.
  - type: text
    content: 'Seigneur, est-ce en ce temps que tu rétabliras le royaume d’Israël? '
  '7':
  - type: text
    content: 'Il leur répondit: '
  - type: note
    content: Mt 24:36.
  - type: text
    content: Ce n’est pas à vous de connaître les temps ou les moments que le Père a fixés de sa propre autorité.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ac 2:4.
  - type: text
    content: Mais vous recevrez une puissance, le Saint-Esprit survenant sur vous,
  - type: text
    content: ' '
  - type: note
    content: És 2:3. Lu 24:48. Jn 15:27. Ac 2:32.
  - type: text
    content: et vous serez mes témoins à Jérusalem, dans toute la Judée, dans la Samarie, et jusqu’aux extrémités de la terre.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Mc 16:19. Lu 24:51.
  - type: text
    content: 'Après avoir dit cela, il fut élevé pendant qu’ils le regardaient, et une nuée le déroba à leurs yeux. '
