document_id: 1SA.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites demandent un roi
  - type: heading
    content: 'V. 1-22: cf. Ps 82. De 17:14-20. (1 S 10:17-25. Os 13:10, 11.) És 33:22.'
  - type: text
    content: 'Lorsque Samuel devint vieux, il établit ses fils juges sur Israël. '
  '10':
  - type: text
    content: 'Samuel rapporta toutes les paroles de l’Éternel au peuple qui lui demandait un roi. '
  '11':
  - type: text
    content: 'Il dit: Voici quel sera le droit du roi qui régnera sur vous. Il prendra vos fils, et il les mettra sur ses chars et parmi ses cavaliers, afin qu’ils courent devant son char; '
  '12':
  - type: text
    content: 'il s’en fera des chefs de mille et des chefs de cinquante, et il les emploiera à labourer ses terres, à récolter ses moissons, à fabriquer ses armes de guerre et l’attirail de ses chars. '
  '13':
  - type: text
    content: 'Il prendra vos filles, pour en faire des parfumeuses, des cuisinières et des boulangères. '
  '14':
  - type: text
    content: 'Il prendra la meilleure partie de vos champs, de vos vignes et de vos oliviers, et la donnera à ses serviteurs. '
  '15':
  - type: text
    content: 'Il prendra la dîme du produit de vos semences et de vos vignes, et la donnera à ses serviteurs. '
  '16':
  - type: text
    content: 'Il prendra vos serviteurs et vos servantes, vos meilleurs bœufs et vos ânes, et s’en servira pour ses travaux. '
  '17':
  - type: text
    content: 'Il prendra la dîme de vos troupeaux, et vous-mêmes serez ses esclaves. '
  '18':
  - type: text
    content: 'Et alors vous crierez contre votre roi que vous vous serez choisi, mais l’Éternel ne vous exaucera point. '
  '19':
  - type: text
    content: 'Le peuple refusa d’écouter la voix de Samuel. Non! Dirent-ils, mais il y aura un roi sur nous, '
  '2':
  - type: text
    content: 'Son fils premier-né se nommait Joël, et le second Abija; ils étaient juges à Beer-Schéba. '
  '20':
  - type: text
    content: 'et nous aussi nous serons comme toutes les nations; notre roi nous jugera il marchera à notre tête et conduira nos guerres. '
  '21':
  - type: text
    content: 'Samuel, après avoir entendu toutes les paroles du peuple, les redit aux oreilles de l’Éternel. '
  '22':
  - type: text
    content: 'Et l’Éternel dit à Samuel: Écoute leur voix, et établis un roi sur eux. Et Samuel dit aux hommes d’Israël: Allez-vous-en chacun dans sa ville.'
  '3':
  - type: text
    content: 'Les fils de Samuel ne marchèrent point sur ses traces; ils se livraient à la '
  - type: note
    content: Ex 18:21. De 16:19.
  - type: text
    content: 'cupidité, recevaient des présents, et violaient la justice. '
  '4':
  - type: text
    content: 'Tous les anciens d’Israël s’assemblèrent, et vinrent auprès de Samuel à Rama. '
  '5':
  - type: text
    content: 'Ils lui dirent: Voici, tu es vieux, et tes fils ne marchent point sur tes traces; maintenant, '
  - type: note
    content: Os 13:10. Ac 16:19.
  - type: text
    content: 'établis sur nous un roi pour nous juger, comme il y en a chez toutes les nations. '
  '6':
  - type: note
    content: 1 S 12:17.
  - type: text
    content: 'Samuel vit avec déplaisir qu’ils disaient: Donne-nous un roi pour nous juger. Et Samuel pria l’Éternel. '
  '7':
  - type: text
    content: 'L’Éternel dit à Samuel: Écoute la voix du peuple dans tout ce qu’il te dira; car ce n’est pas toi qu’ils rejettent, c’est moi qu’ils rejettent, afin que je ne règne plus sur eux. '
  '8':
  - type: text
    content: 'Ils agissent à ton égard comme ils ont toujours agi depuis que je les ai fait monter d’Égypte jusqu’à ce jour; ils m’ont abandonné, pour servir d’autres dieux. '
  '9':
  - type: text
    content: 'Écoute donc leur voix; mais donne-leur des avertissements, et fais-leur connaître le droit du roi qui régnera sur eux. '
