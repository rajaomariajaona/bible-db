document_id: PSA.81,93
type_code: fra
verses:
  '1':
  - type: heading
    content: De 16:1-3. Ps 95; 85:9. És 55:3.
  - type: text
    content: Au chef des chantres. Sur la guitthith. D’Asaph.
  '10':
  - type: text
    content: Qu’il n’y ait au milieu de toi point de dieu étranger!
  - type: text
    content: Ne te prosterne pas devant des dieux étrangers!
  '11':
  - type: text
    content: Je suis l’Éternel, ton Dieu, qui t’ai fait monter du pays d’Égypte;
  - type: text
    content: Ouvre ta bouche, et je la remplirai.
  '12':
  - type: text
    content: Mais mon peuple n’a point écouté ma voix,
  - type: text
    content: Israël ne m’a point obéi.
  '13':
  - type: text
    content: Alors je les ai livrés aux penchants de leur cœur,
  - type: text
    content: Et ils ont suivi leurs propres conseils.
  '14':
  - type: text
    content: Oh! Si mon peuple m’écoutait,
  - type: text
    content: Si Israël marchait dans mes voies!
  '15':
  - type: text
    content: En un instant je confondrais leurs ennemis,
  - type: text
    content: Je tournerais ma main contre leurs adversaires;
  '16':
  - type: text
    content: Ceux qui haïssent l’Éternel le flatteraient,
  - type: text
    content: Et le bonheur d’Israël durerait toujours;
  '17':
  - type: text
    content: Je le nourrirais du meilleur froment,
  - type: text
    content: Et je le rassasierais du miel du rocher.
  '2':
  - type: text
    content: Chantez avec allégresse à Dieu, notre force!
  - type: text
    content: Poussez des cris de joie vers le Dieu de Jacob!
  '3':
  - type: text
    content: Entonnez des cantiques, faites résonner le tambourin,
  - type: text
    content: La harpe mélodieuse et le luth!
  '4':
  - type: text
    content: Sonnez de la trompette à la nouvelle lune,
  - type: text
    content: A la pleine lune, au jour de notre fête!
  '5':
  - type: text
    content: Car c’est une loi pour Israël,
  - type: text
    content: Une ordonnance du Dieu de Jacob.
  '6':
  - type: text
    content: Il en fit un statut pour Joseph,
  - type: text
    content: Quand il marcha contre le pays d’Égypte…
  - type: text
    content: 'J’entends une voix qui m’est inconnue:'
  '7':
  - type: text
    content: J’ai déchargé son épaule du fardeau,
  - type: text
    content: Et ses mains ont lâché la corbeille.
  '8':
  - type: text
    content: Tu as crié dans la détresse, et je t’ai délivré;
  - type: text
    content: Je t’ai répondu dans la retraite du tonnerre;
  - type: text
    content: 'Je t’ai éprouvé près des eaux de Meriba. '
  - type: text
    content: — Pause.
  '9':
  - type: text
    content: Écoute, mon peuple! Et je t’avertirai;
  - type: text
    content: Israël, puisses-tu m’écouter!
