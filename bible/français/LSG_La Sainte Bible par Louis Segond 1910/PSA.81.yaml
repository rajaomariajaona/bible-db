document_id: PSA.81
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: De 16:1-3. Ps 95; 85:9. És 55:3.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Sur la guitthith. D’Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez avec allégresse à Dieu, notre force!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie vers le Dieu de Jacob!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Entonnez des cantiques, faites résonner le tambourin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La harpe mélodieuse et le luth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sonnez de la trompette à la nouvelle lune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la pleine lune, au jour de notre fête!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car c’est une loi pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une ordonnance du Dieu de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il en fit un statut pour Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il marcha contre le pays d’Égypte…
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’entends une voix qui m’est inconnue:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ai déchargé son épaule du fardeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses mains ont lâché la corbeille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu as crié dans la détresse, et je t’ai délivré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai répondu dans la retraite du tonnerre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je t’ai éprouvé près des eaux de Meriba. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Écoute, mon peuple! Et je t’avertirai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, puisses-tu m’écouter!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qu’il n’y ait au milieu de toi point de dieu étranger!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te prosterne pas devant des dieux étrangers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je suis l’Éternel, ton Dieu, qui t’ai fait monter du pays d’Égypte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ouvre ta bouche, et je la remplirai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais mon peuple n’a point écouté ma voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël ne m’a point obéi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors je les ai livrés aux penchants de leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont suivi leurs propres conseils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Oh! Si mon peuple m’écoutait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si Israël marchait dans mes voies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: En un instant je confondrais leurs ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je tournerais ma main contre leurs adversaires;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ceux qui haïssent l’Éternel le flatteraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le bonheur d’Israël durerait toujours;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je le nourrirais du meilleur froment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je le rassasierais du miel du rocher.
