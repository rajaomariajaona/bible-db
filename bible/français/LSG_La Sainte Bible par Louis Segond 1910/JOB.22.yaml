document_id: JOB.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Troisième discours d’Éliphaz à Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Job 4:7-11; 32:3.) (Job 29:11-17; 31:13-23.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Éliphaz de Théman prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Un homme peut-il être utile à Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non; le sage n’est utile qu’à lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si tu es juste, est-ce à l’avantage du Tout-Puissant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu es intègre dans tes voies, qu’y gagne-t-il?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Est-ce par crainte de toi qu’il te châtie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’il entre en jugement avec toi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ta méchanceté n’est-elle pas grande?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes iniquités ne sont-elles pas infinies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:26
      metadata:
        usfm: EXO.22.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: EXO.22.27
    - type: text
      text: . De 24:6, 10, etc.
    marker-yv: yv-n
  - type: text
    text: Tu enlevais sans motif des gages à tes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu privais de leurs vêtements ceux qui étaient nus;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu ne donnais point d’eau à l’homme altéré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu refusais du pain à l’homme affamé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le pays était au plus fort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le puissant s’y établissait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu renvoyais les veuves à vide;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les bras des orphelins étaient brisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est pour cela que tu es entouré de pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la terreur t’a saisi tout à coup.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ne vois-tu donc pas ces ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces eaux débordées qui t’envahissent?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-20: cf. Ge 6:1-13; 7:10, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu n’est-il pas en haut dans les cieux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde le sommet des étoiles, comme il est élevé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et tu dis: Qu’est-ce que Dieu sait?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-il juger à travers l’obscurité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les nuées l’enveloppent, et il ne voit rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne parcourt que la voûte des cieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Eh quoi! Tu voudrais prendre l’ancienne route
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ont suivie les hommes d’iniquité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils ont été emportés avant le temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont eu la durée d’un torrent qui s’écoule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:14
      metadata:
        usfm: JOB.21.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils disaient à Dieu: Retire-toi de nous;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que peut faire pour nous le Tout-Puissant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dieu cependant avait rempli de biens leurs maisons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:16
      metadata:
        usfm: JOB.21.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Loin de moi le conseil des méchants!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:42
      metadata:
        usfm: PSA.107.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les justes, témoins de leur chute, se réjouiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’innocent se moquera d’eux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voilà nos adversaires anéantis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà leurs richesses dévorées par le feu!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-30: cf. Job 8:5-7; 11:13-19.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Attache-toi donc à Dieu, et tu auras la paix;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu jouiras ainsi du bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Reçois de sa bouche l’instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mets dans ton cœur ses paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu seras rétabli, si tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 8:5
      metadata:
        usfm: JOB.8.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JOB.8.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: reviens au Tout-Puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu éloignes l’iniquité de ta tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jette l’or dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’or d’Ophir parmi les cailloux des torrents;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Et le Tout-Puissant sera ton or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton argent, ta richesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors tu feras du Tout-Puissant tes délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu élèveras vers Dieu ta face;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tu le prieras, et il t’exaucera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu accompliras tes vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A tes résolutions répondra le succès;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur tes sentiers brillera la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Vienne l’humiliation, tu prieras pour ton relèvement:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 29:23
      metadata:
        usfm: PRO.29.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: secourt celui dont le regard est abattu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il délivrera même le coupable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui devra son salut à la pureté de tes mains.
