document_id: JOB.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Troisième discours d’Éliphaz à Job
  - type: heading
    content: 'V. 1-11: cf. (Job 4:7-11; 32:3.) (Job 29:11-17; 31:13-23.)'
  - type: text
    content: 'Éliphaz de Théman prit la parole et dit:'
  '10':
  - type: text
    content: C’est pour cela que tu es entouré de pièges,
  - type: text
    content: Et que la terreur t’a saisi tout à coup.
  '11':
  - type: text
    content: Ne vois-tu donc pas ces ténèbres,
  - type: text
    content: Ces eaux débordées qui t’envahissent?
  - type: heading
    content: 'V. 12-20: cf. Ge 6:1-13; 7:10, etc.'
  '12':
  - type: text
    content: Dieu n’est-il pas en haut dans les cieux?
  - type: text
    content: Regarde le sommet des étoiles, comme il est élevé!
  '13':
  - type: text
    content: 'Et tu dis: Qu’est-ce que Dieu sait?'
  - type: text
    content: Peut-il juger à travers l’obscurité?
  '14':
  - type: text
    content: Les nuées l’enveloppent, et il ne voit rien;
  - type: text
    content: Il ne parcourt que la voûte des cieux.
  '15':
  - type: text
    content: Eh quoi! Tu voudrais prendre l’ancienne route
  - type: text
    content: Qu’ont suivie les hommes d’iniquité?
  '16':
  - type: text
    content: Ils ont été emportés avant le temps,
  - type: text
    content: Ils ont eu la durée d’un torrent qui s’écoule.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Job 21:14.
  - type: text
    content: 'Ils disaient à Dieu: Retire-toi de nous;'
  - type: text
    content: Que peut faire pour nous le Tout-Puissant?
  '18':
  - type: text
    content: Dieu cependant avait rempli de biens leurs maisons.
  - type: note
    content: Job 21:16.
  - type: text
    content: Loin de moi le conseil des méchants!
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:42.
  - type: text
    content: Les justes, témoins de leur chute, se réjouiront,
  - type: text
    content: 'Et l’innocent se moquera d’eux:'
  '2':
  - type: text
    content: Un homme peut-il être utile à Dieu?
  - type: text
    content: Non; le sage n’est utile qu’à lui-même.
  '20':
  - type: text
    content: Voilà nos adversaires anéantis!
  - type: text
    content: Voilà leurs richesses dévorées par le feu!
  - type: heading
    content: 'V. 21-30: cf. Job 8:5-7; 11:13-19.'
  '21':
  - type: text
    content: Attache-toi donc à Dieu, et tu auras la paix;
  - type: text
    content: Tu jouiras ainsi du bonheur.
  '22':
  - type: text
    content: Reçois de sa bouche l’instruction,
  - type: text
    content: Et mets dans ton cœur ses paroles.
  '23':
  - type: text
    content: 'Tu seras rétabli, si tu '
  - type: note
    content: Job 8:5, 6.
  - type: text
    content: reviens au Tout-Puissant,
  - type: text
    content: Si tu éloignes l’iniquité de ta tente.
  '24':
  - type: text
    content: Jette l’or dans la poussière,
  - type: text
    content: L’or d’Ophir parmi les cailloux des torrents;
  '25':
  - type: text
    content: Et le Tout-Puissant sera ton or,
  - type: text
    content: Ton argent, ta richesse.
  '26':
  - type: text
    content: Alors tu feras du Tout-Puissant tes délices,
  - type: text
    content: Tu élèveras vers Dieu ta face;
  '27':
  - type: text
    content: Tu le prieras, et il t’exaucera,
  - type: text
    content: Et tu accompliras tes vœux.
  '28':
  - type: text
    content: A tes résolutions répondra le succès;
  - type: text
    content: Sur tes sentiers brillera la lumière.
  '29':
  - type: text
    content: 'Vienne l’humiliation, tu prieras pour ton relèvement:'
  - type: text
    content: 'Dieu '
  - type: note
    content: Pr 29:23.
  - type: text
    content: secourt celui dont le regard est abattu.
  '3':
  - type: text
    content: Si tu es juste, est-ce à l’avantage du Tout-Puissant?
  - type: text
    content: Si tu es intègre dans tes voies, qu’y gagne-t-il?
  '30':
  - type: text
    content: Il délivrera même le coupable,
  - type: text
    content: Qui devra son salut à la pureté de tes mains.
  '4':
  - type: text
    content: Est-ce par crainte de toi qu’il te châtie,
  - type: text
    content: Qu’il entre en jugement avec toi?
  '5':
  - type: text
    content: Ta méchanceté n’est-elle pas grande?
  - type: text
    content: Tes iniquités ne sont-elles pas infinies?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ex 22:26, 27. De 24:6, 10, etc.
  - type: text
    content: Tu enlevais sans motif des gages à tes frères,
  - type: text
    content: Tu privais de leurs vêtements ceux qui étaient nus;
  '7':
  - type: text
    content: Tu ne donnais point d’eau à l’homme altéré,
  - type: text
    content: Tu refusais du pain à l’homme affamé.
  '8':
  - type: text
    content: Le pays était au plus fort,
  - type: text
    content: Et le puissant s’y établissait.
  '9':
  - type: text
    content: Tu renvoyais les veuves à vide;
  - type: text
    content: Les bras des orphelins étaient brisés.
