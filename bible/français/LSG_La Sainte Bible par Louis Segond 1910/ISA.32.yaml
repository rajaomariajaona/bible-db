document_id: ISA.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. 2 R 18:1-8. Jé 23:5, 6. 2 Pi 3:13.'
  - type: text
    content: 'Alors '
  - type: note
    content: Ps 45:7. Za 9:9.
  - type: text
    content: le roi régnera selon la justice,
  - type: text
    content: Et les princes gouverneront avec droiture.
  '10':
  - type: text
    content: Dans un an et quelques jours,
  - type: text
    content: Vous tremblerez, indolentes;
  - type: text
    content: Car c’en est fait de la vendange,
  - type: text
    content: La récolte n’arrivera pas.
  '11':
  - type: text
    content: Soyez dans l’effroi, insouciantes!
  - type: text
    content: Tremblez, indolentes!
  - type: text
    content: Déshabillez-vous, mettez-vous à nu
  - type: text
    content: Et ceignez vos reins!
  '12':
  - type: text
    content: On se frappe le sein,
  - type: text
    content: Au souvenir de la beauté des champs
  - type: text
    content: Et de la fécondité des vignes.
  '13':
  - type: text
    content: Sur la terre de mon peuple
  - type: text
    content: Croissent les épines et les ronces,
  - type: text
    content: Même dans toutes les maisons de plaisance
  - type: text
    content: De la cité joyeuse.
  '14':
  - type: text
    content: Le palais est abandonné,
  - type: text
    content: La ville bruyante est délaissée;
  - type: text
    content: La colline et la tour serviront à jamais de cavernes;
  - type: text
    content: Les ânes sauvages y joueront, les troupeaux y paîtront,
  '15':
  - type: text
    content: 'Jusqu’à ce que '
  - type: note
    content: Joë 2:28. Jn 7:37, 38. Ac 2:17, 18.
  - type: text
    content: l’esprit soit répandu d’en haut sur nous,
  - type: text
    content: 'Et que le '
  - type: note
    content: És 29:17.
  - type: text
    content: désert se change en verger,
  - type: text
    content: Et que le verger soit considéré comme une forêt.
  - type: heading
    content: Angoisse et délivrance de Sion
  - type: heading
    content: 'V. 16-20: cf. Éz 34:25-30; 36:24-30.'
  '16':
  - type: text
    content: Alors la droiture habitera dans le désert,
  - type: text
    content: Et la justice aura sa demeure dans le verger.
  '17':
  - type: text
    content: L’œuvre de la justice sera la paix,
  - type: text
    content: Et le fruit de la justice le repos et la sécurité pour toujours.
  '18':
  - type: text
    content: 'Mon peuple demeurera '
  - type: note
    content: Jé 33:16.
  - type: text
    content: dans le séjour de la paix,
  - type: text
    content: Dans des habitations sûres,
  - type: text
    content: Dans des asiles tranquilles.
  '19':
  - type: text
    content: Mais la forêt sera précipitée sous la grêle,
  - type: text
    content: Et la ville profondément abaissée.
  '2':
  - type: text
    content: Chacun sera comme un abri contre le vent,
  - type: text
    content: Et un refuge contre la tempête,
  - type: text
    content: Comme des courants d’eau dans un lieu desséché,
  - type: text
    content: Comme l’ombre d’un grand rocher dans une terre altérée.
  '20':
  - type: text
    content: Heureux vous qui partout semez le long des eaux,
  - type: text
    content: Et qui laissez sans entraves le pied du bœuf et de l’âne!
  '3':
  - type: text
    content: ' '
  - type: note
    content: És 29:18; 30:21.
  - type: text
    content: Les yeux de ceux qui voient ne seront plus bouchés,
  - type: text
    content: Et les oreilles de ceux qui entendent seront attentives.
  '4':
  - type: text
    content: Le cœur des hommes légers sera intelligent pour comprendre,
  - type: text
    content: Et la langue de ceux qui balbutient parlera vite et nettement.
  '5':
  - type: text
    content: On ne donnera plus à l’insensé le nom de noble,
  - type: text
    content: Ni au fourbe celui de magnanime.
  '6':
  - type: text
    content: Car l’insensé profère des folies,
  - type: text
    content: Et son cœur s’adonne au mal,
  - type: text
    content: Pour commettre l’impiété,
  - type: text
    content: Et dire des faussetés contre l’Éternel,
  - type: text
    content: Pour laisser à vide l’âme de celui qui a faim,
  - type: text
    content: Et enlever le breuvage de celui qui a soif.
  '7':
  - type: text
    content: Les armes du fourbe sont pernicieuses;
  - type: text
    content: Il forme de coupables desseins,
  - type: text
    content: Pour perdre les malheureux par des paroles mensongères,
  - type: text
    content: Même quand la cause du pauvre est juste.
  '8':
  - type: text
    content: Mais celui qui est noble forme de nobles desseins,
  - type: text
    content: Et il persévère dans ses nobles desseins.
  - type: heading
    content: Contre les femmes insouciantes
  - type: heading
    content: 'V. 9-15: cf. És 3:16, etc.; 24:1-13; 10:12-27.'
  '9':
  - type: text
    content: Femmes insouciantes,
  - type: text
    content: Levez-vous, écoutez ma voix!
  - type: text
    content: Filles indolentes,
  - type: text
    content: Prêtez l’oreille à ma parole!
