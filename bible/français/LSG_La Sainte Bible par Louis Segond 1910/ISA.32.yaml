document_id: ISA.32,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. 2 R 18:1-8. Jé 23:5, 6. 2 Pi 3:13.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 45:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 9:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le roi régnera selon la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les princes gouverneront avec droiture.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un an et quelques jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tremblerez, indolentes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’en est fait de la vendange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La récolte n’arrivera pas.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez dans l’effroi, insouciantes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremblez, indolentes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déshabillez-vous, mettez-vous à nu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceignez vos reins!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On se frappe le sein,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au souvenir de la beauté des champs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de la fécondité des vignes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la terre de mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Croissent les épines et les ronces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même dans toutes les maisons de plaisance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la cité joyeuse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le palais est abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ville bruyante est délaissée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colline et la tour serviront à jamais de cavernes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ânes sauvages y joueront, les troupeaux y paîtront,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jusqu’à ce que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’esprit soit répandu d’en haut sur nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et que le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: désert se change en verger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que le verger soit considéré comme une forêt.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Angoisse et délivrance de Sion
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. Éz 34:25-30; 36:24-30.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors la droiture habitera dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la justice aura sa demeure dans le verger.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’œuvre de la justice sera la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le fruit de la justice le repos et la sécurité pour toujours.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon peuple demeurera '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 33:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans le séjour de la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans des habitations sûres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans des asiles tranquilles.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la forêt sera précipitée sous la grêle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la ville profondément abaissée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun sera comme un abri contre le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un refuge contre la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des courants d’eau dans un lieu desséché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’ombre d’un grand rocher dans une terre altérée.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux vous qui partout semez le long des eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui laissez sans entraves le pied du bœuf et de l’âne!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les yeux de ceux qui voient ne seront plus bouchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les oreilles de ceux qui entendent seront attentives.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur des hommes légers sera intelligent pour comprendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la langue de ceux qui balbutient parlera vite et nettement.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne donnera plus à l’insensé le nom de noble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni au fourbe celui de magnanime.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’insensé profère des folies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son cœur s’adonne au mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour commettre l’impiété,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dire des faussetés contre l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour laisser à vide l’âme de celui qui a faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et enlever le breuvage de celui qui a soif.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les armes du fourbe sont pernicieuses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il forme de coupables desseins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour perdre les malheureux par des paroles mensongères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même quand la cause du pauvre est juste.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui est noble forme de nobles desseins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il persévère dans ses nobles desseins.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les femmes insouciantes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-15: cf. És 3:16, etc.; 24:1-13; 10:12-27.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Femmes insouciantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous, écoutez ma voix!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filles indolentes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l’oreille à ma parole!
