document_id: JER.46,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre l’Égypte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (2 Ch 35:20. 2 R 23:29-35; 24:7.) És 8:9, 10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l’Éternel qui fut adressée à Jérémie, le prophète, sur les nations. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ce jour est au Seigneur, à l’Éternel des armées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un jour de vengeance, où il se venge de ses ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée dévore, elle se rassasie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle s’enivre de leur sang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il y a des victimes du Seigneur, de l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au pays du septentrion, sur les rives de l’Euphrate.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Monte en '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Galaad, prends du baume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vierge, fille de l’Égypte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En vain tu multiplies les remèdes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a point de guérison pour toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les nations apprennent ta honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes cris remplissent la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les guerriers chancellent l’un sur l’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tombent tous ensemble.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-28: cf. Jé 43:8-13. Éz 29 à 32.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: La parole qui fut adressée par l’Éternel à Jérémie, le prophète, sur l’arrivée de Nebucadnetsar, roi de Babylone, qui voulait frapper le pays d’Égypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Annoncez-le en Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publiez-le à Migdol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publiez-le à Noph et à Tachpanès!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites: Lève-toi, prépare-toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’épée dévore autour de toi!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pourquoi tes vaillants hommes sont-ils emportés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne tiennent pas ferme, car l’Éternel les renverse.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il en fait chanceler un grand nombre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils tombent l’un sur l’autre, et ils disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons, retournons vers notre peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans notre pays natal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loin du glaive destructeur!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Là, on s’écrie: Pharaon, roi d’Égypte,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est qu’un bruit; il a laissé passer le moment.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je suis vivant! Dit le roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont l’Éternel des armées est le nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le Thabor parmi les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le Carmel qui s’avance dans la mer, il viendra.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Fais ton bagage pour la captivité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habitante, fille de l’Egypte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Noph deviendra un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle sera ravagée, elle n’aura plus d’habitants.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sur l’Égypte. Sur l’armée de Pharaon Neco, roi d’Égypte, qui était près du fleuve de l’Euphrate, à Carkemisch, et qui fut battue par Nebucadnetsar, roi de Babylone, la quatrième année de Jojakim, fils de Josias, roi de Juda.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: L’Égypte est une très belle génisse…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le destructeur vient du septentrion, il arrive…
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ses mercenaires aussi sont au milieu d’elle comme des veaux engraissés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et eux aussi, ils tournent le dos, ils fuient tous sans résister.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le jour de leur malheur fond sur eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le temps de leur châtiment.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Sa voix se fait entendre comme celle du serpent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils s’avancent avec une armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils marchent contre elle avec des haches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pareils à des bûcherons.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils abattent sa forêt, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien qu’elle soit impénétrable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont plus nombreux que les sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne pourrait les compter.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: La fille de l’Égypte est confuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est livrée entre les mains du peuple du septentrion.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L’Éternel des armées, le Dieu d’Israël, dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vais châtier Amon de No,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pharaon, l’Égypte, ses dieux et ses rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pharaon et ceux qui se confient en lui.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je les livrerai entre les mains de ceux qui en veulent à leur vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entre les mains de Nebucadnetsar, roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et entre les mains de ses serviteurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et après cela, l’Égypte sera habitée comme aux jours d’autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: toi, mon serviteur Jacob, ne crains pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’effraie pas, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je te délivrerai de la terre lointaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je délivrerai ta postérité du pays où elle est captive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob reviendra, il jouira du repos et de la tranquillité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y aura personne pour le troubler.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Toi, mon serviteur Jacob, ne crains pas! Dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis avec toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’anéantirai toutes les nations parmi lesquelles je t’ai dispersé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, je ne t’anéantirai pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te châtierai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: avec équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne puis pas te laisser impuni.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Préparez le petit et le grand bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et marchez au combat!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Attelez les chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montez, cavaliers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Paraissez avec vos casques,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Polissez vos lances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revêtez la cuirasse!…
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que vois-je? Ils ont peur, ils reculent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs vaillants hommes sont battus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fuient sans se retourner…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épouvante est de toutes parts, dit l’Éternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Que le plus léger ne trouve aucun salut dans la fuite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le plus vaillant n’échappe pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au septentrion, sur les rives de l’Euphrate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils chancellent, ils tombent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Qui est celui qui s’avance comme le Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont les eaux sont agitées comme les torrents?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C’est l’Égypte. Elle s’avance comme le Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses eaux sont agitées comme les torrents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle dit: Je monterai, je couvrirai la terre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je détruirai les villes et leurs habitants.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Montez, chevaux! Précipitez-vous, chars!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils se montrent, les vaillants hommes,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 66:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ceux d’Éthiopie et de Puth qui portent le bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux de Lud qui manient et tendent l’arc!
