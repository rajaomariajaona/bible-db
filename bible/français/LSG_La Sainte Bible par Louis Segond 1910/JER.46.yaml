document_id: JER.46,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre l’Égypte
  - type: heading
    content: 'V. 1-12: cf. (2 Ch 35:20. 2 R 23:29-35; 24:7.) És 8:9, 10.'
  - type: text
    content: 'La parole de l’Éternel qui fut adressée à Jérémie, le prophète, sur les nations. '
  '10':
  - type: text
    content: Ce jour est au Seigneur, à l’Éternel des armées;
  - type: text
    content: C’est un jour de vengeance, où il se venge de ses ennemis.
  - type: text
    content: L’épée dévore, elle se rassasie,
  - type: text
    content: Elle s’enivre de leur sang.
  - type: text
    content: Car il y a des victimes du Seigneur, de l’Éternel des armées,
  - type: text
    content: Au pays du septentrion, sur les rives de l’Euphrate.
  '11':
  - type: text
    content: 'Monte en '
  - type: note
    content: Jé 8:22.
  - type: text
    content: Galaad, prends du baume,
  - type: text
    content: Vierge, fille de l’Égypte!
  - type: text
    content: En vain tu multiplies les remèdes,
  - type: text
    content: Il n’y a point de guérison pour toi.
  '12':
  - type: text
    content: Les nations apprennent ta honte,
  - type: text
    content: Et tes cris remplissent la terre,
  - type: text
    content: Car les guerriers chancellent l’un sur l’autre,
  - type: text
    content: Ils tombent tous ensemble.
  - type: heading
    content: 'V. 13-28: cf. Jé 43:8-13. Éz 29 à 32.'
  '13':
  - type: text
    content: La parole qui fut adressée par l’Éternel à Jérémie, le prophète, sur l’arrivée de Nebucadnetsar, roi de Babylone, qui voulait frapper le pays d’Égypte.
  '14':
  - type: text
    content: Annoncez-le en Égypte,
  - type: text
    content: Publiez-le à Migdol,
  - type: text
    content: Publiez-le à Noph et à Tachpanès!
  - type: text
    content: 'Dites: Lève-toi, prépare-toi,'
  - type: text
    content: Car l’épée dévore autour de toi!
  '15':
  - type: text
    content: Pourquoi tes vaillants hommes sont-ils emportés?
  - type: text
    content: Ils ne tiennent pas ferme, car l’Éternel les renverse.
  '16':
  - type: text
    content: Il en fait chanceler un grand nombre;
  - type: text
    content: 'Ils tombent l’un sur l’autre, et ils disent:'
  - type: text
    content: Allons, retournons vers notre peuple,
  - type: text
    content: Dans notre pays natal,
  - type: text
    content: Loin du glaive destructeur!
  '17':
  - type: text
    content: 'Là, on s’écrie: Pharaon, roi d’Égypte,'
  - type: text
    content: Ce n’est qu’un bruit; il a laissé passer le moment.
  '18':
  - type: text
    content: Je suis vivant! Dit le roi,
  - type: text
    content: Dont l’Éternel des armées est le nom,
  - type: text
    content: Comme le Thabor parmi les montagnes,
  - type: text
    content: Comme le Carmel qui s’avance dans la mer, il viendra.
  '19':
  - type: text
    content: Fais ton bagage pour la captivité,
  - type: text
    content: Habitante, fille de l’Egypte!
  - type: text
    content: Car Noph deviendra un désert,
  - type: text
    content: Elle sera ravagée, elle n’aura plus d’habitants.
  '2':
  - type: text
    content: Sur l’Égypte. Sur l’armée de Pharaon Neco, roi d’Égypte, qui était près du fleuve de l’Euphrate, à Carkemisch, et qui fut battue par Nebucadnetsar, roi de Babylone, la quatrième année de Jojakim, fils de Josias, roi de Juda.
  '20':
  - type: text
    content: L’Égypte est une très belle génisse…
  - type: text
    content: Le destructeur vient du septentrion, il arrive…
  '21':
  - type: text
    content: Ses mercenaires aussi sont au milieu d’elle comme des veaux engraissés.
  - type: text
    content: Et eux aussi, ils tournent le dos, ils fuient tous sans résister.
  - type: text
    content: Car le jour de leur malheur fond sur eux,
  - type: text
    content: Le temps de leur châtiment.
  '22':
  - type: text
    content: Sa voix se fait entendre comme celle du serpent;
  - type: text
    content: Car ils s’avancent avec une armée,
  - type: text
    content: Ils marchent contre elle avec des haches,
  - type: text
    content: Pareils à des bûcherons.
  '23':
  - type: text
    content: Ils abattent sa forêt, dit l’Éternel,
  - type: text
    content: Bien qu’elle soit impénétrable;
  - type: text
    content: Car ils sont plus nombreux que les sauterelles,
  - type: text
    content: On ne pourrait les compter.
  '24':
  - type: text
    content: La fille de l’Égypte est confuse,
  - type: text
    content: Elle est livrée entre les mains du peuple du septentrion.
  '25':
  - type: text
    content: 'L’Éternel des armées, le Dieu d’Israël, dit:'
  - type: text
    content: Voici, je vais châtier Amon de No,
  - type: text
    content: Pharaon, l’Égypte, ses dieux et ses rois,
  - type: text
    content: Pharaon et ceux qui se confient en lui.
  '26':
  - type: text
    content: Je les livrerai entre les mains de ceux qui en veulent à leur vie,
  - type: text
    content: Entre les mains de Nebucadnetsar, roi de Babylone,
  - type: text
    content: Et entre les mains de ses serviteurs;
  - type: text
    content: Et après cela, l’Égypte sera habitée comme aux jours d’autrefois,
  - type: text
    content: Dit l’Éternel.
  '27':
  - type: text
    content: 'Et '
  - type: note
    content: És 41:13; 43:5; 44:1. Jé 30:10.
  - type: text
    content: toi, mon serviteur Jacob, ne crains pas;
  - type: text
    content: Ne t’effraie pas, Israël!
  - type: text
    content: Car je te délivrerai de la terre lointaine,
  - type: text
    content: Je délivrerai ta postérité du pays où elle est captive;
  - type: text
    content: Jacob reviendra, il jouira du repos et de la tranquillité,
  - type: text
    content: Et il n’y aura personne pour le troubler.
  '28':
  - type: text
    content: Toi, mon serviteur Jacob, ne crains pas! Dit l’Éternel;
  - type: text
    content: Car je suis avec toi.
  - type: text
    content: J’anéantirai toutes les nations parmi lesquelles je t’ai dispersé,
  - type: text
    content: Mais toi, je ne t’anéantirai pas;
  - type: text
    content: 'Je te châtierai '
  - type: note
    content: Jé 10:24; 30:11.
  - type: text
    content: avec équité,
  - type: text
    content: Je ne puis pas te laisser impuni.
  '3':
  - type: text
    content: Préparez le petit et le grand bouclier,
  - type: text
    content: Et marchez au combat!
  '4':
  - type: text
    content: Attelez les chevaux,
  - type: text
    content: Montez, cavaliers!
  - type: text
    content: Paraissez avec vos casques,
  - type: note
    content: Jé 51:11.
  - type: text
    content: Polissez vos lances,
  - type: text
    content: Revêtez la cuirasse!…
  '5':
  - type: text
    content: Que vois-je? Ils ont peur, ils reculent;
  - type: text
    content: Leurs vaillants hommes sont battus;
  - type: text
    content: Ils fuient sans se retourner…
  - type: text
    content: L’épouvante est de toutes parts, dit l’Éternel.
  '6':
  - type: text
    content: Que le plus léger ne trouve aucun salut dans la fuite,
  - type: text
    content: Que le plus vaillant n’échappe pas!
  - type: text
    content: Au septentrion, sur les rives de l’Euphrate,
  - type: text
    content: Ils chancellent, ils tombent.
  '7':
  - type: text
    content: Qui est celui qui s’avance comme le Nil,
  - type: text
    content: Et dont les eaux sont agitées comme les torrents?
  '8':
  - type: text
    content: C’est l’Égypte. Elle s’avance comme le Nil,
  - type: text
    content: Et ses eaux sont agitées comme les torrents.
  - type: text
    content: 'Elle dit: Je monterai, je couvrirai la terre,'
  - type: text
    content: Je détruirai les villes et leurs habitants.
  '9':
  - type: text
    content: Montez, chevaux! Précipitez-vous, chars!
  - type: text
    content: Qu’ils se montrent, les vaillants hommes,
  - type: note
    content: És 66:19.
  - type: text
    content: Ceux d’Éthiopie et de Puth qui portent le bouclier,
  - type: text
    content: Et ceux de Lud qui manient et tendent l’arc!
