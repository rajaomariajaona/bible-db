document_id: ECC.5,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Ne te presse pas d’ouvrir la bouche, et que ton cœur ne se hâte pas d’exprimer une parole devant Dieu; car Dieu est au ciel, et toi sur la terre: que tes paroles soient donc peu nombreuses. '
  '10':
  - type: text
    content: 'Quand le bien abonde, ceux qui le mangent abondent; et quel avantage en revient-il à son possesseur, sinon qu’il le voit de ses yeux? '
  '11':
  - type: text
    content: 'Le sommeil du travailleur est doux, qu’il ait peu ou beaucoup à manger; mais le rassasiement du riche ne le laisse pas dormir. '
  '12':
  - type: text
    content: 'Il est un mal grave que j’ai vu sous le soleil: des richesses conservées, pour son malheur, par celui qui les possède. '
  '13':
  - type: text
    content: 'Ces richesses se perdent par quelque événement fâcheux; il a engendré un fils, et il ne reste rien entre ses mains. '
  '14':
  - type: text
    content: 'Comme il est sorti du ventre de sa mère, il s’en retourne nu ainsi qu’il était venu, et '
  - type: note
    content: Ps 49:18.
  - type: text
    content: 'pour son travail n’emporte rien qu’il puisse prendre dans sa main. '
  '15':
  - type: text
    content: 'C’est encore là un mal grave. Il s’en va comme il était venu; et quel avantage lui revient-il d’avoir travaillé pour du vent? '
  '16':
  - type: text
    content: 'De plus, toute sa vie il mange dans les ténèbres, et il a beaucoup de chagrin, de maux et d’irritation. '
  '17':
  - type: text
    content: 'Voici ce que j’ai vu: '
  - type: note
    content: Ec 2:24; 3:12, 22; 9:7; 11:9.
  - type: text
    content: 'c’est pour l’homme une chose bonne et belle de manger et de boire, et de jouir du bien-être au milieu de tout le travail qu’il fait sous le soleil, pendant le nombre des jours de vie que Dieu lui a donnés; '
  - type: note
    content: Ec 2:10.
  - type: text
    content: 'car c’est là sa part. '
  '18':
  - type: text
    content: 'Mais, si Dieu a donné à un homme des richesses et des biens, s’il l’a rendu maître d’en manger, d’en prendre sa part, et de se réjouir au milieu de son travail, c’est là un don de Dieu. '
  '19':
  - type: text
    content: Car il ne se souviendra pas beaucoup des jours de sa vie, parce que Dieu répand la joie dans son cœur.
  '2':
  - type: text
    content: 'Car, si les songes naissent de la multitude des occupations, la voix de l’insensé se fait entendre dans la multitude des paroles. '
  '3':
  - type: note
    content: No 30:2. De 23:21.
  - type: text
    content: 'Lorsque tu as fait un vœu à Dieu, ne tarde pas à l’accomplir, car il n’aime pas les insensés: accomplis le vœu que tu as fait. '
  '4':
  - type: note
    content: De 23:21, 22.
  - type: text
    content: 'Mieux vaut pour toi ne point faire de vœu, que d’en faire un et de ne pas l’accomplir. '
  '5':
  - type: text
    content: 'Ne permets pas à ta bouche de faire pécher ta chair, et ne dis pas en présence de l’envoyé que c’est une inadvertance. Pourquoi Dieu s’irriterait-il de tes paroles, et détruirait-il l’ouvrage de tes mains? '
  '6':
  - type: note
    content: Pr 10:19.
  - type: text
    content: Car, s’il y a des vanités dans la multitude des songes, il y en a aussi dans beaucoup de paroles; c’est pourquoi, crains Dieu.
  - type: heading
    content: 'V. 7-19: cf. És 3:13-15. (1 Ti 6:6-10. Ec 2:21-26.)'
  '7':
  - type: text
    content: 'Si tu vois dans une province le pauvre opprimé et la violation du droit et de la justice, ne t’en étonne point; car un homme élevé est placé sous la surveillance d’un autre plus élevé, et au-dessus d’eux il en est de plus élevés encore. '
  '8':
  - type: text
    content: 'Un avantage pour le pays à tous égards, c’est un roi honoré du pays. '
  '9':
  - type: text
    content: 'Celui qui aime l’argent n’est pas rassasié par l’argent, et celui qui aime les richesses n’en profite pas. C’est encore là une vanité. '
