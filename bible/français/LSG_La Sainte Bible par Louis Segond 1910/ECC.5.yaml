document_id: ECC.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ne te presse pas d’ouvrir la bouche, et que ton cœur ne se hâte pas d’exprimer une parole devant Dieu; car Dieu est au ciel, et toi sur la terre: que tes paroles soient donc peu nombreuses. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car, si les songes naissent de la multitude des occupations, la voix de l’insensé se fait entendre dans la multitude des paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 30:2
      metadata:
        usfm: NUM.30.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:21
      metadata:
        usfm: DEU.23.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tu as fait un vœu à Dieu, ne tarde pas à l’accomplir, car il n’aime pas les insensés: accomplis le vœu que tu as fait. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:21
      metadata:
        usfm: DEU.23.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: DEU.23.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mieux vaut pour toi ne point faire de vœu, que d’en faire un et de ne pas l’accomplir. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne permets pas à ta bouche de faire pécher ta chair, et ne dis pas en présence de l’envoyé que c’est une inadvertance. Pourquoi Dieu s’irriterait-il de tes paroles, et détruirait-il l’ouvrage de tes mains? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:19
      metadata:
        usfm: PRO.10.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car, s’il y a des vanités dans la multitude des songes, il y en a aussi dans beaucoup de paroles; c’est pourquoi, crains Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-19: cf. És 3:13-15. (1 Ti 6:6-10. Ec 2:21-26.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si tu vois dans une province le pauvre opprimé et la violation du droit et de la justice, ne t’en étonne point; car un homme élevé est placé sous la surveillance d’un autre plus élevé, et au-dessus d’eux il en est de plus élevés encore. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un avantage pour le pays à tous égards, c’est un roi honoré du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Celui qui aime l’argent n’est pas rassasié par l’argent, et celui qui aime les richesses n’en profite pas. C’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quand le bien abonde, ceux qui le mangent abondent; et quel avantage en revient-il à son possesseur, sinon qu’il le voit de ses yeux? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le sommeil du travailleur est doux, qu’il ait peu ou beaucoup à manger; mais le rassasiement du riche ne le laisse pas dormir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il est un mal grave que j’ai vu sous le soleil: des richesses conservées, pour son malheur, par celui qui les possède. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ces richesses se perdent par quelque événement fâcheux; il a engendré un fils, et il ne reste rien entre ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme il est sorti du ventre de sa mère, il s’en retourne nu ainsi qu’il était venu, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 49:18
      metadata:
        usfm: PSA.49.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour son travail n’emporte rien qu’il puisse prendre dans sa main. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C’est encore là un mal grave. Il s’en va comme il était venu; et quel avantage lui revient-il d’avoir travaillé pour du vent? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'De plus, toute sa vie il mange dans les ténèbres, et il a beaucoup de chagrin, de maux et d’irritation. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que j’ai vu: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:24
      metadata:
        usfm: ECC.2.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: ECC.3.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ECC.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:7
      metadata:
        usfm: ECC.9.7
    - type: text
      text: ; 11:9.
    marker-yv: yv-n
  - type: text
    text: 'c’est pour l’homme une chose bonne et belle de manger et de boire, et de jouir du bien-être au milieu de tout le travail qu’il fait sous le soleil, pendant le nombre des jours de vie que Dieu lui a donnés; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:10
      metadata:
        usfm: ECC.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car c’est là sa part. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais, si Dieu a donné à un homme des richesses et des biens, s’il l’a rendu maître d’en manger, d’en prendre sa part, et de se réjouir au milieu de son travail, c’est là un don de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car il ne se souviendra pas beaucoup des jours de sa vie, parce que Dieu répand la joie dans son cœur.
