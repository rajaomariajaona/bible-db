document_id: JHN.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier miracle de Jésus aux noces de Cana
  - type: heading
    content: 'V. 1-12: cf. (Mt 22:2. Ap 19:9.) (Jn 5:36. Ac 10:38.) Mt 9:15.'
  - type: text
    content: 'Trois jours après, il y eut des noces à Cana en Galilée. La mère de Jésus était là, '
  '10':
  - type: text
    content: 'et lui dit: Tout homme sert d’abord le bon vin, puis le moins bon après qu’on s’est enivré; toi, tu as gardé le bon vin jusqu’à présent. '
  '11':
  - type: text
    content: 'Tel fut, à Cana en Galilée, le premier des miracles que fit Jésus. Il manifesta sa gloire, et ses disciples crurent en lui. '
  '12':
  - type: text
    content: Après cela, il descendit à Capernaüm, avec sa mère, ses frères et ses disciples, et ils n’y demeurèrent que peu de jours.
  - type: heading
    content: Jésus à Jérusalem. Les vendeurs chassés du temple
  - type: heading
    content: 'V. 13-22: cf. Mc 11:15-18, 27-33; 14:57, 58; 15:29. Mt 12:38-40.'
  '13':
  - type: text
    content: 'La Pâque des Juifs était proche, et Jésus monta à Jérusalem. '
  '14':
  - type: note
    content: Mt 21:12. Mc 11:15. Lu 19:45.
  - type: text
    content: 'Il trouva dans le temple les vendeurs de bœufs, de brebis et de pigeons, et les changeurs assis. '
  '15':
  - type: text
    content: 'Ayant fait un fouet avec des cordes, il les chassa tous du temple, ainsi que les brebis et les bœufs; il dispersa la monnaie des changeurs, et renversa les tables; '
  '16':
  - type: text
    content: 'et il dit aux vendeurs de pigeons: '
  - type: text
    content: Otez cela d’ici, ne faites pas de la maison de mon Père une maison de trafic.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Ses disciples se souvinrent qu’il est écrit:'
  - type: note
    content: Ps 69:10.
  - type: text
    content: Le zèle de ta maison me dévore.
  - type: heading
    content: Le temple relevé en trois jours
  '18':
  - type: text
    content: 'Les Juifs, prenant la parole, lui dirent: '
  - type: note
    content: Mt 12:38; 16:1. Mc 8:11. Lu 11:29. Jn 6:30.
  - type: text
    content: 'Quel miracle nous montres-tu, pour agir de la sorte? '
  '19':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: Mt 26:61; 27:40. Mc 14:58; 15:29.
  - type: text
    content: Détruisez ce temple, et en trois jours je le relèverai.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'et Jésus fut aussi invité aux noces avec ses disciples. '
  '20':
  - type: text
    content: 'Les Juifs dirent: Il a fallu quarante-six ans pour bâtir ce temple, et toi, en trois jours tu le relèveras! '
  '21':
  - type: text
    content: 'Mais il parlait du temple de son corps. '
  '22':
  - type: text
    content: 'C’est pourquoi, lorsqu’il fut ressuscité des morts, '
  - type: note
    content: Lu 24:8.
  - type: text
    content: ses disciples se souvinrent qu’il avait dit cela, et ils crurent à l’Écriture et à la parole que Jésus avait dite.
  - type: heading
    content: Ce que pense Jésus de ceux qui croient en son nom
  - type: heading
    content: 'V. 23-25: cf. Jé 17:9, 10. Hé 4:12, 13. Ap 2:23.'
  '23':
  - type: text
    content: 'Pendant que Jésus était à Jérusalem, à la fête de Pâque, plusieurs crurent en son nom, voyant les miracles qu’il faisait. '
  '24':
  - type: text
    content: 'Mais Jésus ne se fiait point à eux, parce qu’il les connaissait tous, '
  '25':
  - type: text
    content: 'et parce qu’il n’avait pas besoin qu’on lui rendît témoignage d’aucun homme; '
  - type: note
    content: 1 S 16:7. 1 Ch 28:9. Ps 7:10; 103:14. Jé 11:20; 17:10; 20:12. Jn 6:64.
  - type: text
    content: car il savait lui-même ce qui était dans l’homme.
  '3':
  - type: text
    content: 'Le vin ayant manqué, la mère de Jésus lui dit: Ils n’ont plus de vin. '
  '4':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Femme, qu’y a-t-il entre moi et toi? Mon heure n’est pas encore venue.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Sa mère dit aux serviteurs: Faites ce qu’il vous dira. '
  '6':
  - type: text
    content: 'Or, il y avait là six vases de pierre, '
  - type: note
    content: Mc 7:3.
  - type: text
    content: 'destinés aux purifications des Juifs, et contenant chacun deux ou trois mesures. '
  '7':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Remplissez d’eau ces vases.
  - type: text
    content: ' Et ils les remplirent jusqu’au bord.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: Puisez maintenant,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: et portez-en à l’ordonnateur du repas.
  - type: text
    content: ' Et ils en portèrent. '
  '9':
  - type: text
    content: 'Quand l’ordonnateur du repas eut goûté l’eau changée en vin, ne sachant d’où venait ce vin, tandis que les serviteurs, qui avaient puisé l’eau, le savaient bien, il appela l’époux, '
