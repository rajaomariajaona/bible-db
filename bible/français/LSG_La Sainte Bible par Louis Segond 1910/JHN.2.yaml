document_id: JHN.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Premier miracle de Jésus aux noces de Cana
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Mt 22:2. Ap 19:9.) (Jn 5:36. Ac 10:38.) Mt 9:15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Trois jours après, il y eut des noces à Cana en Galilée. La mère de Jésus était là, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et Jésus fut aussi invité aux noces avec ses disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le vin ayant manqué, la mère de Jésus lui dit: Ils n’ont plus de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Femme, qu’y a-t-il entre moi et toi? Mon heure n’est pas encore venue.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sa mère dit aux serviteurs: Faites ce qu’il vous dira. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, il y avait là six vases de pierre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 7:3
      metadata:
        usfm: MRK.7.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'destinés aux purifications des Juifs, et contenant chacun deux ou trois mesures. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Remplissez d’eau ces vases.
  - type: text
    text: ' Et ils les remplirent jusqu’au bord.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Puisez maintenant,
  - type: text
    text: ' leur dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et portez-en à l’ordonnateur du repas.
  - type: text
    text: ' Et ils en portèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand l’ordonnateur du repas eut goûté l’eau changée en vin, ne sachant d’où venait ce vin, tandis que les serviteurs, qui avaient puisé l’eau, le savaient bien, il appela l’époux, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et lui dit: Tout homme sert d’abord le bon vin, puis le moins bon après qu’on s’est enivré; toi, tu as gardé le bon vin jusqu’à présent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tel fut, à Cana en Galilée, le premier des miracles que fit Jésus. Il manifesta sa gloire, et ses disciples crurent en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Après cela, il descendit à Capernaüm, avec sa mère, ses frères et ses disciples, et ils n’y demeurèrent que peu de jours.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Jérusalem. Les vendeurs chassés du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-22: cf. Mc 11:15-18, 27-33; 14:57, 58; 15:29. Mt 12:38-40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La Pâque des Juifs était proche, et Jésus monta à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:12
      metadata:
        usfm: MAT.21.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:15
      metadata:
        usfm: MRK.11.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:45
      metadata:
        usfm: LUK.19.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il trouva dans le temple les vendeurs de bœufs, de brebis et de pigeons, et les changeurs assis. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ayant fait un fouet avec des cordes, il les chassa tous du temple, ainsi que les brebis et les bœufs; il dispersa la monnaie des changeurs, et renversa les tables; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et il dit aux vendeurs de pigeons: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Otez cela d’ici, ne faites pas de la maison de mon Père une maison de trafic.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ses disciples se souvinrent qu’il est écrit:'
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 69:10
      metadata:
        usfm: PSA.69.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le zèle de ta maison me dévore.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le temple relevé en trois jours
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Juifs, prenant la parole, lui dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:38
      metadata:
        usfm: MAT.12.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:1
      metadata:
        usfm: MAT.16.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:11
      metadata:
        usfm: MRK.8.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:29
      metadata:
        usfm: LUK.11.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:30
      metadata:
        usfm: JHN.6.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quel miracle nous montres-tu, pour agir de la sorte? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:61
      metadata:
        usfm: MAT.26.61
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:40
      metadata:
        usfm: MAT.27.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:58
      metadata:
        usfm: MRK.14.58
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:29
      metadata:
        usfm: MRK.15.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Détruisez ce temple, et en trois jours je le relèverai.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les Juifs dirent: Il a fallu quarante-six ans pour bâtir ce temple, et toi, en trois jours tu le relèveras! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais il parlait du temple de son corps. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’est pourquoi, lorsqu’il fut ressuscité des morts, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:8
      metadata:
        usfm: LUK.24.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ses disciples se souvinrent qu’il avait dit cela, et ils crurent à l’Écriture et à la parole que Jésus avait dite.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ce que pense Jésus de ceux qui croient en son nom
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-25: cf. Jé 17:9, 10. Hé 4:12, 13. Ap 2:23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pendant que Jésus était à Jérusalem, à la fête de Pâque, plusieurs crurent en son nom, voyant les miracles qu’il faisait. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Jésus ne se fiait point à eux, parce qu’il les connaissait tous, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et parce qu’il n’avait pas besoin qu’on lui rendît témoignage d’aucun homme; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:7
      metadata:
        usfm: 1SA.16.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:10
      metadata:
        usfm: PSA.7.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 103:14
      metadata:
        usfm: PSA.103.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 11:20
      metadata:
        usfm: JER.11.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:10
      metadata:
        usfm: JER.17.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:12
      metadata:
        usfm: JER.20.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:64
      metadata:
        usfm: JHN.6.64
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car il savait lui-même ce qui était dans l’homme.
