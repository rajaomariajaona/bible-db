document_id: LEV.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordonnances relatives aux sacrificateurs
  - type: heading
    content: 'V. 1-9: cf. Éz 44:20-25. És 52:11. Mal 3:3.'
  - type: text
    content: 'L’Éternel dit à Moïse: Parle aux sacrificateurs, fils d’Aaron, et tu leur diras: Un sacrificateur ne se rendra point impur parmi son peuple pour un mort, '
  '10':
  - type: text
    content: 'Le sacrificateur qui a la supériorité sur ses frères, sur la tête duquel a été répandue l’huile d’onction, et qui a été consacré et revêtu des vêtements sacrés, ne découvrira point sa tête et ne déchirera point ses vêtements. '
  '11':
  - type: text
    content: 'Il n’ira vers aucun mort, il ne se rendra point impur, ni pour son père, ni pour sa mère. '
  '12':
  - type: text
    content: 'Il ne sortira point du sanctuaire, et ne profanera point le sanctuaire de son Dieu; car l’huile d’onction de son Dieu est une couronne sur lui. Je suis l’Éternel. '
  '13':
  - type: text
    content: 'Il prendra pour femme une vierge. '
  '14':
  - type: text
    content: 'Il ne prendra ni une veuve, ni une femme répudiée, ni une femme déshonorée ou prostituée; mais il prendra pour femme une vierge parmi son peuple. '
  '15':
  - type: text
    content: Il ne déshonorera point sa postérité parmi son peuple; car je suis l’Éternel, qui le sanctifie.
  - type: heading
    content: 'V. 16-24: cf. (De 23:1. Éz 44:10-16.) Lé 22:22-25.'
  '16':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '17':
  - type: text
    content: 'Parle à Aaron, et dis: Tout homme de ta race et parmi tes descendants, qui aura un défaut corporel, ne s’approchera point pour offrir l’aliment de son Dieu. '
  '18':
  - type: text
    content: 'Tout homme qui aura un défaut corporel ne pourra s’approcher: un homme aveugle, boiteux, ayant le nez camus ou un membre allongé; '
  '19':
  - type: text
    content: 'un homme ayant une fracture au pied ou à la main; '
  '2':
  - type: text
    content: 'excepté pour ses plus proches parents, pour sa mère, pour son père, pour son fils, pour son frère, '
  '20':
  - type: text
    content: 'un homme bossu ou grêle, ayant une tache à l’œil, la gale, une dartre, ou les testicules écrasés. '
  '21':
  - type: text
    content: 'Tout homme de la race du sacrificateur Aaron, qui aura un défaut corporel, ne s’approchera point pour offrir à l’Éternel les sacrifices consumés par le feu; il a un défaut corporel: il ne s’approchera point pour offrir l’aliment de son Dieu. '
  '22':
  - type: text
    content: 'Il pourra manger l’aliment de son Dieu, des choses très saintes et des choses saintes. '
  '23':
  - type: text
    content: 'Mais il n’ira point vers le voile, et il ne s’approchera point de l’autel, car il a un défaut corporel; il ne profanera point mes sanctuaires, car je suis l’Éternel, qui les sanctifie. '
  '24':
  - type: text
    content: C’est ainsi que parla Moïse à Aaron et à ses fils, et à tous les enfants d’Israël.
  '3':
  - type: text
    content: 'et aussi pour sa sœur encore vierge, qui le touche de près lorsqu’elle n’est pas mariée. '
  '4':
  - type: text
    content: 'Chef parmi son peuple, il ne se rendra point impur en se profanant. '
  '5':
  - type: text
    content: 'Les sacrificateurs ne se feront point de place chauve sur la tête, ils ne raseront point les coins de leur barbe, et ils ne feront point d’incisions dans leur chair. '
  '6':
  - type: text
    content: 'Ils seront saints pour leur Dieu, et ils ne profaneront pas le nom de leur Dieu; car ils offrent à l’Éternel les sacrifices consumés par le feu, l’aliment de leur Dieu: ils seront saints. '
  '7':
  - type: text
    content: 'Ils ne prendront point une femme prostituée ou déshonorée, ils ne prendront point une femme répudiée par son mari, car ils sont saints pour leur Dieu. '
  '8':
  - type: text
    content: 'Tu regarderas un sacrificateur comme saint, car il offre l’aliment de ton Dieu; il sera saint pour toi, car je suis saint, moi, l’Éternel, qui vous sanctifie. '
  '9':
  - type: text
    content: 'Si la fille d’un sacrificateur se déshonore en se prostituant, elle déshonore son père: elle sera brûlée au feu.'
  - type: heading
    content: 'V. 10-15: cf. No 6:5-8. Hé 7:26. (Ps 51:9, 21.)'
