document_id: LEV.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordonnances relatives aux sacrificateurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Éz 44:20-25. És 52:11. Mal 3:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Moïse: Parle aux sacrificateurs, fils d’Aaron, et tu leur diras: Un sacrificateur ne se rendra point impur parmi son peuple pour un mort, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'excepté pour ses plus proches parents, pour sa mère, pour son père, pour son fils, pour son frère, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et aussi pour sa sœur encore vierge, qui le touche de près lorsqu’elle n’est pas mariée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Chef parmi son peuple, il ne se rendra point impur en se profanant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les sacrificateurs ne se feront point de place chauve sur la tête, ils ne raseront point les coins de leur barbe, et ils ne feront point d’incisions dans leur chair. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils seront saints pour leur Dieu, et ils ne profaneront pas le nom de leur Dieu; car ils offrent à l’Éternel les sacrifices consumés par le feu, l’aliment de leur Dieu: ils seront saints. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils ne prendront point une femme prostituée ou déshonorée, ils ne prendront point une femme répudiée par son mari, car ils sont saints pour leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu regarderas un sacrificateur comme saint, car il offre l’aliment de ton Dieu; il sera saint pour toi, car je suis saint, moi, l’Éternel, qui vous sanctifie. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si la fille d’un sacrificateur se déshonore en se prostituant, elle déshonore son père: elle sera brûlée au feu.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-15: cf. No 6:5-8. Hé 7:26. (Ps 51:9, 21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le sacrificateur qui a la supériorité sur ses frères, sur la tête duquel a été répandue l’huile d’onction, et qui a été consacré et revêtu des vêtements sacrés, ne découvrira point sa tête et ne déchirera point ses vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il n’ira vers aucun mort, il ne se rendra point impur, ni pour son père, ni pour sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il ne sortira point du sanctuaire, et ne profanera point le sanctuaire de son Dieu; car l’huile d’onction de son Dieu est une couronne sur lui. Je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il prendra pour femme une vierge. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il ne prendra ni une veuve, ni une femme répudiée, ni une femme déshonorée ou prostituée; mais il prendra pour femme une vierge parmi son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il ne déshonorera point sa postérité parmi son peuple; car je suis l’Éternel, qui le sanctifie.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-24: cf. (De 23:1. Éz 44:10-16.) Lé 22:22-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Parle à Aaron, et dis: Tout homme de ta race et parmi tes descendants, qui aura un défaut corporel, ne s’approchera point pour offrir l’aliment de son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout homme qui aura un défaut corporel ne pourra s’approcher: un homme aveugle, boiteux, ayant le nez camus ou un membre allongé; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'un homme ayant une fracture au pied ou à la main; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'un homme bossu ou grêle, ayant une tache à l’œil, la gale, une dartre, ou les testicules écrasés. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tout homme de la race du sacrificateur Aaron, qui aura un défaut corporel, ne s’approchera point pour offrir à l’Éternel les sacrifices consumés par le feu; il a un défaut corporel: il ne s’approchera point pour offrir l’aliment de son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il pourra manger l’aliment de son Dieu, des choses très saintes et des choses saintes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais il n’ira point vers le voile, et il ne s’approchera point de l’autel, car il a un défaut corporel; il ne profanera point mes sanctuaires, car je suis l’Éternel, qui les sanctifie. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C’est ainsi que parla Moïse à Aaron et à ses fils, et à tous les enfants d’Israël.
