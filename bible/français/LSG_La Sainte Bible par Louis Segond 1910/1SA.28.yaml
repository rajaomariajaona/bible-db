document_id: 1SA.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Guerre avec les Philistins. — David dans l’armée des Philistins. — Saül consultant une magicienne à En-Dor
  - type: heading
    content: 'V. 1-25: cf. (1 S 27:12; 29.) (Lé 19:31; 20:6, 27. És 8:19, 20.) 1 Ch 10:1-6, 13, 14.'
  - type: text
    content: 'En ce temps-là, les Philistins rassemblèrent leurs troupes et formèrent une armée, pour faire la guerre à Israël. Akisch dit à David: Tu sais que tu viendras avec moi à l’armée, toi et tes gens. '
  '10':
  - type: text
    content: 'Saül lui jura par l’Éternel, en disant: L’Éternel est vivant! Il ne t’arrivera point de mal pour cela. '
  '11':
  - type: text
    content: 'La femme dit: Qui veux-tu que je te fasse monter? Et il répondit: Fais moi monter Samuel. '
  '12':
  - type: text
    content: 'Lorsque la femme vit Samuel, elle poussa un grand cri, et elle dit à Saül: Pourquoi m’as-tu trompée! Tu es Saül? '
  '13':
  - type: text
    content: 'Le roi lui dit: Ne crains rien; mais que vois-tu? La femme dit à Saül: je vois un dieu qui monte de la terre. '
  '14':
  - type: text
    content: 'Il lui dit: Quelle figure a-t-il? Et elle répondit: C’est un vieillard qui monte et il est enveloppé d’un manteau. Saül comprit que c’était Samuel, et il s’inclina le visage contre terre et se prosterna. '
  '15':
  - type: text
    content: 'Samuel dit à Saül: Pourquoi m’as-tu troublé, en me faisant monter? Saül répondit: Je suis dans une grande détresse: les Philistins me font la guerre, et Dieu s’est retiré de moi; il ne m’a répondu ni par les prophètes ni par des songes. Et je t’ai appelé pour que tu me fasses connaître ce que je dois faire. '
  '16':
  - type: text
    content: 'Samuel dit: Pourquoi donc me consultes-tu, puisque l’Éternel s’est retiré de toi et qu’il est devenu ton ennemi? '
  '17':
  - type: text
    content: 'L’Éternel te traite comme je te l’avais annoncé de sa part; l’Éternel a déchiré la royauté d’entre tes mains, et l’a donnée à un autre, à David. '
  '18':
  - type: text
    content: 'Tu n’as point obéi à la voix de l’Éternel, et tu n’as point fait sentir à Amalek l’ardeur de sa colère: voilà pourquoi l’Éternel te traite aujourd’hui de cette manière. '
  '19':
  - type: text
    content: 'Et même l’Éternel livrera Israël avec toi entre les mains des Philistins. Demain, toi et tes fils, vous serez avec moi, et l’Éternel livrera le camp d’Israël entre les mains des Philistins. '
  '2':
  - type: text
    content: 'David répondit à Akisch: Tu verras bien ce que ton serviteur fera. Et Akisch dit à David: Aussi je te donnerai pour toujours la garde de ma personne. '
  '20':
  - type: text
    content: 'Aussitôt Saül tomba à terre de toute sa hauteur, et les paroles de Samuel le remplirent d’effroi; de plus, il manquait de force, car il n’avait pris aucune nourriture de tout le jour et de toute la nuit. '
  '21':
  - type: text
    content: 'La femme vint auprès de Saül, et, le voyant très effrayé, elle lui dit: Voici, ta servante a écouté ta voix; j’ai exposé ma vie, en obéissant aux paroles que tu m’as dites. '
  '22':
  - type: text
    content: 'Écoute maintenant, toi aussi, la voix de ta servante, et laisse-moi t’offrir un morceau de pain, afin que tu manges pour avoir la force de te mettre en route. '
  '23':
  - type: text
    content: 'Mais il refusa, et dit: Je ne mangerai point. Ses serviteurs et la femme aussi le pressèrent, et il se rendit à leurs instances. Il se leva de terre, et s’assit sur le lit. '
  '24':
  - type: text
    content: 'La femme avait chez elle un veau gras, qu’elle se hâta de tuer; et elle prit de la farine, la pétrit, et en cuisit des pains sans levain. '
  '25':
  - type: text
    content: Elle les mit devant Saül et devant ses serviteurs. Et ils mangèrent. Puis, s’étant levés, ils partirent la nuit même.
  '3':
  - type: note
    content: 1 S 25:1.
  - type: text
    content: 'Samuel était mort; tout Israël l’avait pleuré, et on l’avait enterré à Rama, dans sa ville. Saül avait ôté du pays ceux qui évoquaient les morts et ceux qui prédisaient l’avenir. '
  '4':
  - type: text
    content: 'Les Philistins se rassemblèrent, et vinrent camper à Sunem; Saül rassembla tout Israël, et ils campèrent à Guilboa. '
  '5':
  - type: text
    content: 'A la vue du camp des Philistins, Saül fut saisi de crainte, et un violent tremblement s’empara de son cœur. '
  '6':
  - type: text
    content: 'Saül consulta l’Éternel; et l’Éternel ne lui répondit point, ni par des songes, ni par l’urim, ni par les prophètes. '
  '7':
  - type: text
    content: 'Et Saül dit à ses serviteurs: Cherchez-moi une femme qui évoque les morts, et j’irai la consulter. Ses serviteurs lui dirent: Voici, à En-Dor il y a une femme qui évoque les morts. '
  '8':
  - type: text
    content: 'Alors Saül se déguisa et prit d’autres vêtements, et il partit avec deux hommes. Ils arrivèrent de nuit chez la femme. Saül lui dit: Prédis-moi l’avenir en évoquant un mort, et fais-moi monter celui que je te dirai. '
  '9':
  - type: text
    content: 'La femme lui répondit: Voici, tu sais ce que Saül a fait, comment il a retranché du pays ceux qui évoquent les morts et ceux qui prédisent l’avenir; pourquoi donc tends-tu un piège à ma vie pour me faire mourir? '
