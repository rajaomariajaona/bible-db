document_id: 1CH.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendants de Ruben, de Gad et de Manassé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. (Ge 49:3, 4, 8-10; 48:5, 6.) No 26:5, 6. Jos 13:15-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fils de Ruben, premier-né d’Israël. Car il était le premier-né; mais, parce qu’il souilla la couche de son père, son droit d’aînesse fut donné aux fils de Joseph, fils d’Israël; toutefois Joseph ne dut pas être enregistré dans les généalogies comme premier-né. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Juda fut, à la vérité, puissant parmi ses frères, et de lui est issu un prince; mais le droit d’aînesse est à Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fils de Ruben, premier-né d’Israël: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:9
      metadata:
        usfm: GEN.46.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:13
      metadata:
        usfm: EXO.6.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:5
      metadata:
        usfm: NUM.26.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hénoc, Pallu, Hetsron et Carmi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fils de Joël: Schemaeja, son fils; Gog, son fils; Schimeï, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Michée, son fils; Reaja, son fils; Baal, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Beéra, son fils, que Tilgath-Pilnéser, roi d’Assyrie, emmena captif: il était prince des Rubénites. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Frères de Beéra, d’après leurs familles, tels qu’ils sont enregistrés dans les généalogies selon leurs générations: le premier, Jeïel; Zacharie; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Béla, fils d’Azaz, fils de Schéma, fils de Joël. Béla habitait à Aroër, et jusqu’à Nebo et à Baal-Meon; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'à l’orient, il habitait jusqu’à l’entrée du désert depuis le fleuve de l’Euphrate, car leurs troupeaux étaient nombreux dans le pays de Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Du temps de Saül, ils firent la guerre aux Hagaréniens, qui tombèrent entre leurs mains; et ils habitèrent dans leurs tentes, sur tout le côté oriental de Galaad.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-26: cf. (No 26:15-17, 29-34. Jos 13:24-31.) 2 Ch 14:8-14. Hé 10:32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les fils de Gad habitaient vis-à-vis d’eux, dans '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 13:24
      metadata:
        usfm: JOS.13.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le pays de Basan, jusqu’à Salca. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joël, le premier, Schapham, le second, Jaenaï, et Schaphath, en Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Leurs frères, d’après les maisons de leurs pères: Micaël, Meschullam, Schéba, Joraï, Jaecan, Zia et Éber, sept. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici les fils d’Abichaïl, fils de Huri, fils de Jaroach, fils de Galaad, fils de Micaël, fils de Jeschischaï, fils de Jachdo, fils de Buz; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Achi, fils d’Abdiel, fils de Guni, était chef des maisons de leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils habitaient en Galaad, en Basan, et dans les villes de leur ressort, et dans toutes les banlieues de Saron jusqu’à leurs extrémités. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils furent tous enregistrés dans les généalogies, du temps de Jotham, roi de Juda, et du temps de Jéroboam, roi d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les fils de Ruben, les Gadites et la demi-tribu de Manassé avaient de vaillants hommes, portant le bouclier et l’épée, tirant de l’arc, et exercés à la guerre, au nombre de quarante-quatre mille sept cent soixante, en état d’aller à l’armée. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils firent la guerre aux Hagaréniens, à Jethur, à Naphisch et à Nodab. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils reçurent du secours contre eux, et les Hagaréniens et tous ceux qui étaient avec eux furent livrés entre leurs mains. Car, pendant le combat, ils avaient crié à Dieu, qui les exauça, parce qu’ils s’étaient confiés en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils prirent leurs troupeaux, cinquante mille chameaux, deux cent cinquante mille brebis, deux mille ânes, et cent mille personnes; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'car il y eut beaucoup de morts, parce que le combat venait de Dieu. Et ils s’établirent à leur place jusqu’au temps où ils furent emmenés captifs. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les fils de la demi-tribu de Manassé habitaient dans le pays, depuis Basan jusqu’à Baal-Hermon et à Senir, et à la montagne d’Hermon; ils étaient nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voici les chefs des maisons de leurs pères: Épher, Jischeï, Éliel, Azriel, Jérémie, Hodavia et Jachdiel, vaillants hommes, gens de renom, chefs des maisons de leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais ils péchèrent contre le Dieu de leurs pères, et ils se prostituèrent après les dieux des peuples du pays, que Dieu avait détruits devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le Dieu d’Israël excita l’esprit de Pul, roi d’Assyrie, et l’esprit de Tilgath-Pilnéser, roi d’Assyrie, et Tilgath-Pilnéser emmena captifs les Rubénites, les Gadites et la demi-tribu de Manassé, et il les conduisit à Chalach, à Chabor, à Hara, et au fleuve de Gozan, où ils sont demeurés jusqu’à ce jour.
