document_id: HAG.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le temps est venu de rebâtir le temple
  - type: text
    content: ' '
  - type: note
    content: 'La deuxième année…  : août 520 av. J.-C. ; cf. 2.1,10,20 ; Za 1.1+. –  Darius , roi de Perse, Esd 4.5 ; 6.1ss. –  le premier jour  : cf. Nb 28.11-15 ; 1S 20.5 ; Es 1.13 ; 66.23 ; Am 8.5. –  Zorobabel (membre de la famille royale selon 1Ch 3.17-19 ; cf. Mt 1.12) / Josué v. 12,14 ; 2.2 ; cf. Za 3.1n  ; 4.6-10,14n  ; Esd 2.2 ; 3.1s,8 ; 5.2 ; Né 12.1. –  gouverneur v. 14 ; 2.2,21 ; cf. 1R 10.15n. – Voir prêtre. –  Aggée  : ce nom (hébreu Haggaï  ; cf. Gn 46.16 ; Nb 26.15) est dérivé du mot habituellement traduit par fête ou pèlerinage  ; peut-être ce nom a-t-il été donné au prophète par ce qu''il était né un jour de fête ; cf. Esd 5.1 ; 6.14.'
  - type: text
    content: 'La deuxième année du roi Darius, le premier jour du sixième mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Zorobabel, fils de Shéaltiel, gouverneur de Juda, et à Josué, fils de Yehotsadaq, le grand prêtre, par l''intermédiaire d''Aggée, le prophète :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 26.19s ; Dt 28.22s ; 1R 17.1 ; Es 5.6 ; Jr 12.4 ; 14.2-9 ; Os 4.3 ; Am 4.6s ; voir aussi Gn 3.17s ; Jr 4.23-28.
  - type: text
    content: C'est pourquoi, au-dessus de vous, le ciel a retenu la rosée,
  - type: text
    content: et la terre a retenu ses produits.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'sécheresse v. 9n-10+. –  vin  : autre traduction vin nouveau  ; cf. Gn 27.28n. –  la terre  : litt. le sol , cf. Gn 2.5n. –  tout le produit du travail  : litt. toute la fatigue des mains  ; cf. Gn 31.42n.'
  - type: text
    content: J'ai appelé la sécheresse sur le pays, sur les montagnes,
  - type: text
    content: sur le blé, sur le vin, sur l'huile,
  - type: text
    content: sur ce que produit la terre,
  - type: text
    content: sur les humains et sur les bêtes,
  - type: text
    content: et sur tout le produit du travail.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Shaltiel  : cf. v. 1 (autre orthographe en hébreu) ; de même en 2.2. –  le reste du peuple  : on peut comprendre ceux qui étaient revenus d''exil ; cf. Esd 1.4 ; 9.8,14 ; Za 8.6,11 ; voir aussi Es 1.9+. –  écoutèrent ou entendirent ; obéirent . –  d''après les paroles  : autre traduction et les paroles… –  selon la mission…  : d''après certains mss hébreux et grecs on pourrait comprendre selon la mission par laquelle le Seigneur l''avait envoyé vers eux . – Voir crainte.'
  - type: text
    content: 'Zorobabel, fils de Shaltiel, Josué, fils de Yehotsadaq, le grand prêtre, et tout le reste du peuple écoutèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, d''après les paroles d''Aggée, le prophète, selon la mission que lui avait donnée le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu ; et le peuple fut saisi de crainte devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'messager  : le mot correspondant est habituellement traduit par ange. –  Je suis avec vous 2.4 ; Jg 6.12 ; 2S 7.3 ; Es 41.10 ; cf. Mt 1.23 ; 28.20.'
  - type: text
    content: 'Aggée, messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dit au peuple, comme un message du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je suis avec vous – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: éveilla l'esprit Esd 1.1n,5.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' éveilla l''esprit de Zorobabel, fils de Shaltiel, gouverneur de Juda, l''esprit de Josué, fils de Yehotsadaq, le grand prêtre, et l''esprit de tout le reste du peuple. Ils vinrent se mettre à l''œuvre dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, leur Dieu. '
  '15':
  - type: note
    content: Cf. v. 1 ; 2.1 ; certains rattachent l'indication du jour et du mois à la prophétie de 2.15-19, et celle de l'année au chapitre 2 (la deuxième année du roi Darius, le vingt et unième jour…).
  - type: text
    content: – C'était le vingt-quatrième jour du sixième mois, la deuxième année du roi Darius.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Le temps n''est pas venu  : d''après des versions anciennes ; autre traduction d''après l''hébreu ce n''est pas le moment de venir (pour le culte) ; la première tentative de reconstruction (Esd 3.1-9) avait été interrompue (4.4s).'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Ce peuple dit : Le temps n''est pas venu, le temps où la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' doit être rebâtie.'
  '3':
  - type: text
    content: 'Alors, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur parvint par l''intermédiaire d''Aggée, le prophète :'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2S 7.2. –  maisons lambrissées  : cf. v. 8 ; 1R 6.9 ; 7.3,7 ; Jr 22.14. –  cette maison  : le temple.'
  - type: text
    content: Est-ce le temps pour vous
  - type: text
    content: d'habiter vos maisons lambrissées,
  - type: text
    content: quand cette maison est en ruine ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Réfléchissez à votre situation  : litt. mettez votre cœur sur vos voies , de même au v. 7 ; l''expression traduite ici par réfléchir sera rendue par faire attention en 2.15,18.'
  - type: text
    content: 'Maintenant, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Réfléchissez à votre situation.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.16s ; Za 8.10 ; voir aussi Dt 28.38 ; Jr 12.13 ; Os 4.10 ; Mi 6.14s.
  - type: text
    content: Vous avez beaucoup semé,
  - type: text
    content: mais cela rapporte peu ;
  - type: text
    content: vous mangez, mais vous n'êtes pas rassasiés ;
  - type: text
    content: vous buvez, mais vous n'êtes pas ivres ;
  - type: text
    content: vous êtes vêtus, mais vous n'avez pas chaud ;
  - type: text
    content: le salarié reçoit son salaire dans une bourse trouée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 5n.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Réfléchissez à votre situation.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la montagne  : ou bien le mont du Temple, ou bien les collines voisines où l''on trouverait du bois de construction. –  je la glorifierai  : autre lecture je me glorifierai.'
  - type: text
    content: Montez dans la montagne,
  - type: text
    content: 'apportez du bois et bâtissez la Maison :'
  - type: text
    content: je l'agréerai et je la glorifierai,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'à la maison  : il faut sans doute comprendre chez vous plutôt que dans le temple . –  j''ai soufflé dessus  : cf. Os 13.3 ; Ps 1.4 ; 35.5. –  en ruine  : le mot hébreu fait assonance avec sécheresse au v. 11. –  s''affaire  : litt. court.'
  - type: text
    content: On attendait beaucoup,
  - type: text
    content: et il y a eu peu ;
  - type: text
    content: vous l'avez rapporté à la maison,
  - type: text
    content: mais j'ai soufflé dessus.
  - type: text
    content: Pourquoi ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: A cause de ma maison, qui est en ruine,
  - type: text
    content: tandis que chacun de vous s'affaire pour sa propre maison.
