document_id: ZEC.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les grandes puissances sont abattues
  - type: text
    content: ' '
  - type: note
    content: Liban / cèdres Es 2.13+ ; 10.33s ; Ez 17.3 ; 27.5s ; 31.3ss ; Ps 29.5.
  - type: text
    content: Liban, ouvre tes portes,
  - type: text
    content: et qu'un feu dévore tes cèdres !
  '10':
  - type: note
    content: 'Douceur v. 7n. –  rompre l''alliance…  : cf. Es 54.10 ; 61.8 ; Jr 11.10 ; 31.32 ; 33.21 ; Os 2.20 ; voir aussi Jr 2.3.'
  - type: text
    content: 'Je pris mon bâton « Douceur » et je le brisai, pour rompre l''alliance que j''avais conclue avec tous les peuples. '
  '11':
  - type: note
    content: 'les marchands  : litt. les marchands de petit bétail, en modifiant le texte hébreu traditionnel comme au v. 7n  ; autre texte et les plus pauvres du petit bétail.'
  - type: text
    content: 'Elle fut rompue ce jour-là ; ainsi les marchands qui m''observaient surent que c''était la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'trente pièces (mot sous-entendu dans le texte, de même dans la suite ; le verbe traduit par pesèrent est celui qui a donné le mot sicle, en hébreu shékél) d''argent  : cf. Mt 20.2 ; voir aussi Ex 21.32 ; Mt 26.15.'
  - type: text
    content: 'Je leur dis : Si bon vous semble, donnez-moi mon salaire ; sinon, ne le faites pas. Ils pesèrent pour mon salaire trente pièces d''argent. '
  '13':
  - type: note
    content: Verse-le ou jette-le  ; le verbe hébreu (également traduit plus loin par je les jetai) peut avoir les deux sens. –  trésorier et potier traduisent un seul mot hébreu, habituellement rendu par potier. Dans ce contexte, il pourrait désigner le fondeur de métaux ou l'orfèvre du trésor du temple (un verbe apparenté est traduit par mouler en 1R 7.15 ; voir aussi 2R 12.11n) ; LXX creuset, Tg, Syr trésor  ; cf. Mt 27.5-10.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Verse-le au trésorier (au « potier »), ce prix magnifique auquel ils m''ont apprécié ! Je pris les trente pièces d''argent et je les jetai au « potier », dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: 'Union v. 7n. –  Juda / Israël  : cf. 9.10n  ; Jr 3.18 ; Ez 37.15-28 ; Os 2.2 ; certains voient ici une référence au schisme politique qui a suivi le règne de Salomon (cf. v. 10n), d''autres une annonce du schisme samaritain.'
  - type: text
    content: Puis je brisai mon second bâton, « Union », pour rompre la fraternité entre Juda et Israël.
  '15':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Prends maintenant l''équipement d''un berger stupide ! '
  '16':
  - type: note
    content: 'Cf. Ez 34.2-4. –  qui ne s''occupera pas…  : autre traduction possible qui n''interviendra pas en faveur des bêtes qui sont sur le point de disparaître. –  celle qui s''égare  : le terme hébreu correspondant pourrait aussi signifier le garçon, d''où la traduction traditionnelle la plus jeune. –  celle qui est debout  : autres traductions celle qui est bien portante  ; ou au contraire celle qui est épuisée. –  il leur arrachera les sabots  : autre traduction il fendra leurs sabots.'
  - type: text
    content: Car moi, je suscite dans le pays un berger qui ne s'occupera pas des bêtes qui disparaissent ; il n'ira pas à la recherche de celle qui s'égare, il ne guérira pas celle qui est blessée, il ne pourvoira pas aux besoins de celle qui est debout ; mais il dévorera la viande de celle qui est grasse et il leur arrachera les sabots.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'faux berger  : litt. berger de néant , ce dernier terme étant souvent appliqué aux idoles ou aux faux dieux (Es 2.8n) ; certains modifient le texte hébreu traditionnel pour lire berger stupide , comme au v. 15 (termes ressemblants) ; cf. Jn 10.12s. –  l''épée  : d''autres comprennent la sécheresse  ; autre terme pour se dessèche  : cf. 1R 13.4. –  que son œil droit s''affaiblisse  : cf. Gn 27.1 ; Dt 34.7 ; 1S 3.2.'
  - type: text
    content: Quel malheur pour le faux berger
  - type: text
    content: qui abandonne les bêtes !
  - type: text
    content: Que l'épée s'abatte sur son bras
  - type: text
    content: et sur son œil droit !
  - type: text
    content: Que son bras se dessèche,
  - type: text
    content: que son œil droit s'affaiblisse !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'les arbres magnifiques  : litt. les magnifiques ou les puissants . –  chênes du Bashân Es 2.13+ ; cf. Ez 39.18 ; Am 4.1.'
  - type: text
    content: Hurle, cyprès, car le cèdre est tombé,
  - type: text
    content: les arbres magnifiques sont ravagés !
  - type: text
    content: Hurlez, chênes du Bashân,
  - type: text
    content: car la forêt inaccessible est abattue !
  '3':
  - type: text
    content: ' '
  - type: note
    content: hurlements des bergers Jr 25.34. –  jeunes lions / Jourdain Jr 49.19 ; sur les fourrés (le terme hébreu signifie aussi l'orgueil , cf. Za 9.6 ; 10.11) du Jourdain , voir aussi Jr 12.5n.
  - type: text
    content: On entend les hurlements des bergers,
  - type: text
    content: car leur magnificence est ravagée ;
  - type: text
    content: on entend les rugissements des jeunes lions,
  - type: text
    content: car les fourrés du Jourdain sont ravagés.
  - type: heading
    content: Le bon berger et le berger stupide
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les bêtes  : litt. le petit bétail , moutons et chèvres, de même dans la suite ; voir Ez 34.2n-22 ; cf. Jn 21.15-17. –  de boucherie  : litt. de tuerie , de même au v. 7 ; cf. Jr 12.3 ; Ps 44.12s,23 ; Rm 8.36.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu : Fais paître les bêtes de boucherie ! '
  '5':
  - type: note
    content: Ez 34.3. –  impunément ou sans être tenus pour coupables ; sans avoir à faire réparation  ; cf. Jr 50.7. –  je suis riche Os 12.9 ; Ap 3.17.
  - type: text
    content: 'Ceux qui les achètent les tuent impunément ; chacun de ceux qui les vendent dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car je suis riche ! Et aucun de leurs bergers ne cherche à les épargner. '
  '6':
  - type: note
    content: 'du pays ou de la terre. –  livre Gn 9.2n. –  les uns aux autres  : une légère modification de la vocalisation traditionnelle du texte hébreu permettrait de lire à leur berger  ; cf. 14.13+. –  je ne délivrerai personne  : litt. je ne délivrerai pas de leur main.'
  - type: text
    content: 'Non, je n''épargnerai plus les habitants du pays – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: . Je livre les humains les uns aux autres, et chacun à son roi ; ils saccageront le pays, et je ne délivrerai personne.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4 ; Ez 34.15. –  pour les marchands  : litt. pour les marchands de petit bétail , en modifiant le texte hébreu traditionnel d''après LXX, qui a lu ici et au v. 11 (pour) le(s) Cananéen(s)  ; le texte hébreu traditionnel divise le mot Cananéen (= marchand  ; cf. v. 5 ; 14.21n  ; Os 12.8n) en deux mots [ c''est pourquoi  ? assurément  ? les pauvres ], d''où la traduction traditionnelle assurément les plus pauvres (ou les plus malheureuses ) des bêtes  ; cf. v. 11n. –  Douceur ou beauté, charme, grâce , au sens d''attrait (cf. les termes apparentés en Gn 49.15 agréable  ; Ps 27.4 ; 90.17 ; Ct 7.7) ; il faut peut-être voir ici (cf. v. 10) une alliance divine en vertu de laquelle Israël bénéficiait de la faveur des autres nations, c.-à-d. était en paix avec elles ; cf. Os 2.20. –  Union (v. 14) : le terme hébreu, au pluriel, est très proche du mot pour liens.'
  - type: text
    content: 'Alors je fis paître les bêtes de boucherie pour les marchands. Je pris deux bâtons : j''appelai l''un « Douceur », et j''appelai l''autre « Union ». Puis je fis paître les bêtes. '
  '8':
  - type: note
    content: 'les trois bergers  : il s''agit peut-être d''une allusion historique (à trois grands prêtres qui nous seraient inconnus, ou peut-être à Saül, David et Salomon, les trois rois de l''Israël uni ; cf. v. 14) ; certains pensent, d''une façon plus générale, à trois formes d''autorité (p. ex. religieuse, civile et militaire). –  un seul mois  : litt. une seule lune  ; Os 5.7 ; cf. Jb 3.6n. –  les moutons finirent par me faire perdre patience  : litt. mon être s''était raccourci envers eux (ou à cause d''eux) ; cf. v. 9 ; Nb 21.4n  ; certains pensent que eux pourrait aussi désigner les trois bergers. –  ils (ou elles) me prirent  : litt. leur être (cf. Gn 1.20n) me prit.'
  - type: text
    content: 'Je fis disparaître les trois bergers en un seul mois ; les moutons finirent par me faire perdre patience et, de leur côté, ils me prirent en dégoût. '
  '9':
  - type: note
    content: 'Cf. Jr 15.2 ; 43.11 ; Ap 13.10. –  vous désigne ici les bêtes. –  les unes les autres  : litt. chacune la chair de sa compagne  ; cf. Es 9.20 ; Jr 19.9.'
  - type: text
    content: 'Alors je dis : Je ne vous ferai plus paître ! Que celle qui doit mourir meure, que celle qui doit disparaître disparaisse, et que celles qui restent se dévorent les unes les autres ! '
