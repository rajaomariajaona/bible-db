      marker-yv: yv-n
    - type: text
      text: Car moi, je suscite dans le pays un berger qui ne s'occupera pas des bêtes qui disparaissent ; il n'ira pas à la recherche de celle qui s'égare, il ne guérira pas celle qui est blessée, il ne pourvoira pas aux besoins de celle qui est debout ; mais il dévorera la viande de celle qui est grasse et il leur arrachera les sabots.
