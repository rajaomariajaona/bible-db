document_id: NAM.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Le nom même de Nahum, « le Consolé » (ou, selon les différentes nuances possibles de la racine hébraïque correspondante, celui qui est apaisé, satisfait ou vengé), pourrait servir de clef d''interprétation pour le livret prophétique qu''il désigne. En annonçant d''une manière particulièrement vigoureuse la destruction totale de Ninive, celui-ci apporte en effet à ses lecteurs '
  - type: text
    content: espérance
  - type: text
    content: ' et '
  - type: text
    content: consolation
  - type: text
    content: ', tout comme le célèbre passage d''Esaïe 40. La rareté du nom Nahum dans la Bible (cf. les deux formes très proches en Né 7.7 ; Lc 3.25) n''oblige pourtant pas à y voir un surnom : on le rencontre déjà un siècle auparavant dans les ostraca d''Arad et de Lakish.'
  - type: text
    content: 'Par ailleurs, une hypothèse concernant le village d''origine du prophète pourrait éclairer le contexte historique de son message. Selon celle-ci, '
  - type: text
    content: Elqosh
  - type: text
    content: ' serait en effet à situer dans la plaine philistine, à une dizaine de kilomètres seulement au nord de la célèbre forteresse de Lakish.'
  - type: text
    content: Un visionnaire, témoin d'une époque tourmentée
  - type: text
    content: 'L''auteur a dû être un bon connaisseur du dossier '
  - type: text
    content: assyrien
  - type: text
    content: . Les incessants démêlés des suzerains ninivites avec les principautés philistines dans la seconde moitié du VIII
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C., et plus récemment l''horrible siège de Lakish (≈ 700), dont on connaît tous les détails (voir illustrations p.${prlakish} et {rclakish}), sont vraisemblablement présents dans la mémoire collective de son milieu d''origine.'
  - type: text
    content: Sa prophétie se situe entre 663, date de la prise de Thèbes par Assourbanipal I
  - type: text
    content: er
  - type: text
    content: ' (Thèbes est désignée sous le nom de No-Amôn en Na 3.8), et juillet 612, date de la chute de Ninive telle qu''elle est rapportée par la '
  - type: text
    content: Chronique de Babylone,
  - type: text
    content: ' un document en cunéiforme découvert et publié en 1923 (voir l''encadré ci-dessous). Ce texte nous apprend comment Nabopolassar, le roi d''Akkad (Babylone), au terme d''une campagne de quatre années (616-612 av. J.-C.), se trouve à la tête d''une '
  - type: text
    content: coalitio
  - type: text
    content: n comptant, outre ses propres troupes, celles des Mèdes du roi Cyaxare, ainsi que les « hordes mannéennes » qui s'y étaient ralliées. On y voit aussi que, dès 614, les forteresses de Tarbishou et d'Assour (les « verrous » de Na 3.13 ?) sont prises, ce qui laisse la capitale en mauvaise posture.
  - type: text
    content: Esprit de résistance et attente de la délivrance
  - type: text
    content: 'Comment le voyant voit-il ? Comment Dieu l''inspire-t-il ? Ces questions surgissent lorsque les faits coïncident d''aussi près avec l''annonce qui en est donnée. Ce sont, en général, des hommes '
  - type: text
    content: attentifs
  - type: text
    content: ' à l''actualité et '
  - type: text
    content: informés
  - type: text
    content: ' des intentions du pouvoir qui prononcent les grandes prophéties politiques. Le prophète est souvent un personnage qui s''érige contre l''opinion publique ou contre le prince, parce que l''intelligence des événements qui lui est inspirée par Dieu l''oblige à tenir un autre langage.'
  - type: text
    content: 'Une « révolte de Manassé » (cf. 2Ch 33.15-17) aurait-elle poussé les esprits à plus de hardiesse et d''indépendance ? La « réforme de Josias » (2R 22–23), en tout cas, a fortement pesé dans ce sens. On sait déjà que le mal ne triomphera pas toujours. Lorsque commencent à être connus les premiers soubresauts avant-coureurs d''un '
  - type: text
    content: changement des équilibres
  - type: text
    content: ' en Mésopotamie, l''inspiré voit, par avance, comment une armée de chars longtemps victorieuse finira par être écrasée par une force coalisée supérieure, et comment s''effondreront toutes les gloires et tous les maléfices de la puissance honnie.'
  - type: text
    content: La puissance évocatrice du style
  - type: text
    content: 'En une suite de tableaux qui comptent parmi les meilleurs morceaux littéraires de la Bible, Nahum évoque les péripéties de la '
  - type: text
    content: chute de Ninive
  - type: text
    content: ' comme un véritable reportage. Les lions, emblèmes de la puissante cité, de sa domination cruelle et de sa rapacité politique, sont passés au fil de l''épée (2.12-14) ; les uniformes cramoisis et les boucliers rouges des troupes d''élite, l''étincelle des fers qui se heurtent, l''éclat des armes, le fracas des roues des chars et l''agilité — comme l''éclair — de leurs mouvements forcent l''imagination (2.4s ; 3.1-3). Le « déboulonnage » de la statue d''Ishtar, la déesse guerrière, et le désarroi de ses hiérodules, est un trait classique par lequel la défaite idéologique est signifiée : les faux dieux sont anéantis. Et avec eux la « prostitution » de l''idolâtrie et de la magie utilisées comme modes d''asservissement des peuples conquis (3.4-6). C''est enfin, proclamée dans la dernière partie du livre (3.7-19), la revanche des horreurs que l''Assyrie a fait subir aux autres. En 701, Sennachérib avait pris quarante-six villes fortes à Juda : c''est maintenant le tour de ses successeurs de subir le même sort.'
  - type: text
    content: L'évangile de Nahum
  - type: text
    content: 'La bonne nouvelle dispensée par Nahum est celle du rétablissement de la '
  - type: text
    content: justice
  - type: text
    content: ' et de la '
  - type: text
    content: paix
  - type: text
    content: ' lié à la défaite de l''ennemi héréditaire. Elle est dite une fois en clair, de façon positive (2.1ss, repris par Rm 10.15, voir aussi Es 52.7), puis une seconde fois sous la forme d''une lamentation ironique sur Ninive (3.18s).'
  - type: text
    content: 'Dans sa fonction théologique permanente, ce message est à entendre de la même manière que la résurrection de Jésus-Christ. Il y a paix, espérance et avenir, parce que la '
  - type: text
    content: victoire décisive
  - type: text
    content: ' sur l''ennemi a été remportée, même si le croyant n''en perçoit pas encore tous les effets. Ce livre enseigne à être attentif aux signes des temps, que Jésus appelle à discerner (Mt 16.3).'
