document_id: NAM.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le nom même de Nahum, « le Consolé » (ou, selon les différentes nuances possibles de la racine hébraïque correspondante, celui qui est apaisé, satisfait ou vengé), pourrait servir de clef d''interprétation pour le livret prophétique qu''il désigne. En annonçant d''une manière particulièrement vigoureuse la destruction totale de Ninive, celui-ci apporte en effet à ses lecteurs '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: espérance
    - type: text
      text: ' et '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: consolation
    - type: text
      text: ', tout comme le célèbre passage d''Esaïe 40. La rareté du nom Nahum dans la Bible (cf. les deux formes très proches en Né 7.7 ; Lc 3.25) n''oblige pourtant pas à y voir un surnom : on le rencontre déjà un siècle auparavant dans les ostraca d''Arad et de Lakish.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Par ailleurs, une hypothèse concernant le village d''origine du prophète pourrait éclairer le contexte historique de son message. Selon celle-ci, '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Elqosh
    - type: text
      text: ' serait en effet à situer dans la plaine philistine, à une dizaine de kilomètres seulement au nord de la célèbre forteresse de Lakish.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un visionnaire, témoin d'une époque tourmentée
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''auteur a dû être un bon connaisseur du dossier '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: assyrien
    - type: text
      text: . Les incessants démêlés des suzerains ninivites avec les principautés philistines dans la seconde moitié du VIII
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle av. J.-C., et plus récemment l''horrible siège de Lakish (≈ 700), dont on connaît tous les détails (voir illustrations p.${prlakish} et {rclakish}), sont vraisemblablement présents dans la mémoire collective de son milieu d''origine.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Sa prophétie se situe entre 663, date de la prise de Thèbes par Assourbanipal I
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' (Thèbes est désignée sous le nom de No-Amôn en Na 3.8), et juillet 612, date de la chute de Ninive telle qu''elle est rapportée par la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Chronique de Babylone,
    - type: text
      text: ' un document en cunéiforme découvert et publié en 1923 (voir l''encadré ci-dessous). Ce texte nous apprend comment Nabopolassar, le roi d''Akkad (Babylone), au terme d''une campagne de quatre années (616-612 av. J.-C.), se trouve à la tête d''une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: coalitio
    - type: text
      text: n comptant, outre ses propres troupes, celles des Mèdes du roi Cyaxare, ainsi que les « hordes mannéennes » qui s'y étaient ralliées. On y voit aussi que, dès 614, les forteresses de Tarbishou et d'Assour (les « verrous » de Na 3.13 ?) sont prises, ce qui laisse la capitale en mauvaise posture.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Esprit de résistance et attente de la délivrance
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Comment le voyant voit-il ? Comment Dieu l''inspire-t-il ? Ces questions surgissent lorsque les faits coïncident d''aussi près avec l''annonce qui en est donnée. Ce sont, en général, des hommes '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: attentifs
    - type: text
      text: ' à l''actualité et '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: informés
    - type: text
      text: ' des intentions du pouvoir qui prononcent les grandes prophéties politiques. Le prophète est souvent un personnage qui s''érige contre l''opinion publique ou contre le prince, parce que l''intelligence des événements qui lui est inspirée par Dieu l''oblige à tenir un autre langage.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Une « révolte de Manassé » (cf. 2Ch 33.15-17) aurait-elle poussé les esprits à plus de hardiesse et d''indépendance ? La « réforme de Josias » (2R 22–23), en tout cas, a fortement pesé dans ce sens. On sait déjà que le mal ne triomphera pas toujours. Lorsque commencent à être connus les premiers soubresauts avant-coureurs d''un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: changement des équilibres
    - type: text
      text: ' en Mésopotamie, l''inspiré voit, par avance, comment une armée de chars longtemps victorieuse finira par être écrasée par une force coalisée supérieure, et comment s''effondreront toutes les gloires et tous les maléfices de la puissance honnie.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: La puissance évocatrice du style
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En une suite de tableaux qui comptent parmi les meilleurs morceaux littéraires de la Bible, Nahum évoque les péripéties de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: chute de Ninive
    - type: text
      text: ' comme un véritable reportage. Les lions, emblèmes de la puissante cité, de sa domination cruelle et de sa rapacité politique, sont passés au fil de l''épée (2.12-14) ; les uniformes cramoisis et les boucliers rouges des troupes d''élite, l''étincelle des fers qui se heurtent, l''éclat des armes, le fracas des roues des chars et l''agilité — comme l''éclair — de leurs mouvements forcent l''imagination (2.4s ; 3.1-3). Le « déboulonnage » de la statue d''Ishtar, la déesse guerrière, et le désarroi de ses hiérodules, est un trait classique par lequel la défaite idéologique est signifiée : les faux dieux sont anéantis. Et avec eux la « prostitution » de l''idolâtrie et de la magie utilisées comme modes d''asservissement des peuples conquis (3.4-6). C''est enfin, proclamée dans la dernière partie du livre (3.7-19), la revanche des horreurs que l''Assyrie a fait subir aux autres. En 701, Sennachérib avait pris quarante-six villes fortes à Juda : c''est maintenant le tour de ses successeurs de subir le même sort.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'évangile de Nahum
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La bonne nouvelle dispensée par Nahum est celle du rétablissement de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: justice
    - type: text
      text: ' et de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: paix
    - type: text
      text: ' lié à la défaite de l''ennemi héréditaire. Elle est dite une fois en clair, de façon positive (2.1ss, repris par Rm 10.15, voir aussi Es 52.7), puis une seconde fois sous la forme d''une lamentation ironique sur Ninive (3.18s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans sa fonction théologique permanente, ce message est à entendre de la même manière que la résurrection de Jésus-Christ. Il y a paix, espérance et avenir, parce que la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: victoire décisive
    - type: text
      text: ' sur l''ennemi a été remportée, même si le croyant n''en perçoit pas encore tous les effets. Ce livre enseigne à être attentif aux signes des temps, que Jésus appelle à discerner (Mt 16.3).'
