  '84':
  - type: text
    content: ' '
  - type: note
    content: Litt. telle (fut) la dédicace de l'autel… de la part des princes…  ; cf. v. 3,5n,10n,88n.
  - type: text
    content: 'Telles furent les offrandes des princes d''Israël pour la dédicace de l''autel, le jour de son onction. Douze plats d''argent, douze calices d''argent, douze coupes d''or ; '
  '85':
  - type: note
    content: '2 400 sicles  : près de 24 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: 'chaque plat d''argent pesait 130 sicles, chaque calice 70 sicles, ce qui fit pour l''argent de ces ustensiles un total de 2 400 sicles, selon le sicle du sanctuaire ; '
  '86':
  - type: note
    content: '120 sicles  : environ 1,2 kg.'
  - type: text
    content: 'les douze coupes d''or pleines d''encens, à 10 sicles la coupe, selon le sicle du sanctuaire, firent un total de 120 sicles pour l''or des coupes. '
  '87':
  - type: note
    content: 'des animaux  : litt. du gros bétail (= taureaux), de même au v. 88 (= bœufs). –  leur offrande végétale  : cf. 15.4ss.'
  - type: text
    content: 'Total des animaux pour l''holocauste : douze taureaux, douze béliers, douze agneaux d''un an, avec leur offrande végétale. Douze boucs en sacrifice pour le péché. '
  '88':
  - type: note
    content: 'Cf. v. 10n. –  Telles furent…  : litt. telle (fut) la dédicace de l''autel, cf. v. 5n,84n.'
  - type: text
    content: 'Total des animaux pour le sacrifice de paix : vingt-quatre bœufs, soixante béliers, soixante boucs, soixante agneaux d''un an. Telles furent les offrandes pour la dédicace de l''autel, après son onction.'
  '89':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.4ss ; Ex 25.22 ; 30.6 ; 33.7ss ; 40.34s. –  avec Dieu  : litt. avec lui . –  la voix qui lui parlait  : Vg la voix de celui qui lui parlait  ; LXX la voix du Seigneur qui lui parlait . –  d''au-dessus de l''expiatoire Ex 25.17n,20-22. –  keroubim  : voir Gn 3.24n  ; Ex 25.18n. –  il lui parlait  : on peut comprendre Moïse parlait au Seigneur ou le Seigneur parlait à Moïse.'
  - type: text
    content: Lorsque Moïse entrait dans la tente de la Rencontre pour parler avec Dieu, il entendait la voix qui lui parlait d'au-dessus de l'expiatoire placé sur le coffre du Témoignage, d'entre les deux keroubim. Et il lui parlait.
  '9':
  - type: note
    content: 'Qehath 3.19,27ss ; 4.2-4. –  sacrées  : voir saint. –  sur les épaules  : cf. Jos 3.15 ; 1S 6.7ss ; 2S 6.3ss,13 ; 15.24 ; 1R 8.3s.'
  - type: text
    content: 'Mais il n''en donna pas aux fils de Qehath : ceux-ci, chargés du service des choses sacrées, devaient les porter sur les épaules.'
  - type: heading
    content: Les présents pour l'inauguration de l'autel
