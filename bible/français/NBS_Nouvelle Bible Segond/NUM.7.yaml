    marker-yv: yv-n
  - type: text
    text: 'Le jour où Moïse eut achevé de monter la Demeure, il lui conféra l''onction et la consacra, ainsi que tous ses ustensiles ; il fit de même pour l''autel et pour tous ses ustensiles : il leur conféra l''onction et les consacra. '
