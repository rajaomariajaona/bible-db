    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 84+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leur présent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qorbân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. Lv 1.2'
      - type: usfm
        marker: ord
        children:
