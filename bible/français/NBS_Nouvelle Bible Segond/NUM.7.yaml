    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'princes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.5-16,44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur offrande
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte, de même aux v. 10,18 etc. ; cf. Lv 1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors les princes d''Israël, les chefs de famille, présentèrent leur offrande : c''étaient les princes des tribus, ceux qui avaient présidé au recensement. '
