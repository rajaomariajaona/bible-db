        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Merari '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(3.20,33ss) était chargé des fardeaux les plus lourds 4.29-33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sous la direction d''Itamar… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.28'
