    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guershôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.18,21-26 ; 4.21ss.
    marker-yv: yv-n
  - type: text
    text: 'Il donna deux chariots et quatre bœufs aux fils de Guershôn, en fonction de leur service ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
