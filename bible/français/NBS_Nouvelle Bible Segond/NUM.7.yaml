        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',33.'
    marker-yv: yv-n
  - type: text
    text: 'il donna quatre chariots et huit bœufs aux fils de Merari, en fonction de leur service sous la direction d''Itamar, fils d''Aaron, le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
