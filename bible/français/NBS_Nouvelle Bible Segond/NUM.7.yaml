      marker: ft
      children:
      - type: text
        text: '3.19,27ss ; 4.2-4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sacrées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur les épaules
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 3.15 ; 1S 6.7ss ; 2S 6.3ss,13 ; 15.24 ; 1R 8.3s.'
    marker-yv: yv-n
  - type: text
    text: 'Mais il n''en donna pas aux fils de Qehath : ceux-ci, chargés du service des choses sacrées, devaient les porter sur les épaules.'
