document_id: NUM.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les chars offerts pour le sanctuaire
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 30.26ss ; 40.17-33 ; Lv 8–9 ; 1R 8.3s ; Esd 3.3ss ; 6.16ss. –  Le jour où…  : cf. 1.1 ; Ex 40.2,17 ; Lv 8.35 ; 9.1. –  la Demeure 1.50+. –  il lui conféra l''onction v. 10,84,88 ; Ex 40.9ss ; Lv 8.10ss,30 ; Dn 9.24 ; cf. Gn 28.18. –  l''autel  : cf. v. 10ss ; Ez 43.13-27.'
  - type: text
    content: 'Le jour où Moïse eut achevé de monter la Demeure, il lui conféra l''onction et la consacra, ainsi que tous ses ustensiles ; il fit de même pour l''autel et pour tous ses ustensiles : il leur conféra l''onction et les consacra. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 9 ; Ez 43.18-26. –  présentèrent et offrirent traduisent le même verbe hébreu, apparenté au mot rendu par présent  ; de même dans la suite ; cf. Lv 1.2n. –  la dédicace (hébreu hanoukka ) : c''est toujours le nom donné par les juifs à la célébration de la dernière en date des dédicaces du temple, celle de l''époque des Maccabées (IIe s. av. J.-C.) ; ce terme (également v. 11,84,88) ne se retrouve qu''en Ps 30.1 ; Né 12.27 ; 2Ch 7.9 ; voir aussi Jn 10.22n.'
  - type: text
    content: 'Les princes présentèrent une offrande pour la dédicace de l''autel, le jour de son onction ; les princes offrirent leur présent devant l''autel. '
  '11':
  - type: note
    content: 'un par jour  : cf. Ez 43.25 ; voir aussi 1R 8.65n  ; 2Ch 7.8ss.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Les princes viendront, à raison d''un par jour, offrir leur présent pour la dédicace de l''autel.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Sur les noms des personnages et l’ordre des tribus, voir les chap. 1 et 2 et les notes. –  de la tribu  : LXX a lu prince de la tribu  ; 1.7.'
  - type: text
    content: 'Celui qui offrit son présent le premier jour fut Nahshôn, fils d''Amminadab, de la tribu de Juda. '
  '13':
  - type: note
    content: 'Cf. Ex 25.29. –  130 sicles  : environ 1,3 kg, ici l''unité (sicles) est sous-entendue dans le texte (de même, pour les plats et les coupes, dans la suite). –  70 sicles  : environ 700 g ; voir mesures, poids et monnaies. –  sicle du sanctuaire 3.47+.'
  - type: text
    content: 'Son présent : un plat d''argent du poids de 130 sicles, un calice d''argent de 70 sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l''huile, pour l''offrande végétale ; '
  '14':
  - type: note
    content: '10 sicles  : environ 100 g.'
  - type: text
    content: 'une coupe d''or de 10 sicles, pleine d''encens ; '
  '15':
  - type: note
    content: 'un taureau  : cf. Ex 29.1n. –  d''un an ou de l''année. –  holocauste Lv 1.3n  ; cf. 23.18 ; Ez 43.23s ; 1Ch 29.21 ; 2Ch 29.21,32.'
  - type: text
    content: 'un taureau, un bélier, un agneau d''un an, pour l''holocauste ; '
  '16':
  - type: note
    content: 'bouc  : autre mot au v. 17. –  en sacrifice…  : cf. Lv 9.2n. –  péché Lv 4.1+,23 ; cf. Nb 15.24 ; 28.15.'
  - type: text
    content: 'un bouc, en sacrifice pour le péché ; '
  '17':
  - type: note
    content: paix Lv 3.1n,6 ; 9.4.
  - type: text
    content: et, pour le sacrifice de paix, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d'un an. Tel fut le présent de Nahshôn, fils d'Amminadab.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'prince…  : Syr prince de la tribu d''Issacar.'
  - type: text
    content: 'Le deuxième jour, Netanéel, fils de Tsouar, prince d''Issacar, présenta son offrande. '
  '19':
  - type: note
    content: Cf. v. 13n,14n.
  - type: text
    content: 'Il offrit son présent : un plat d''argent du poids de 130 sicles, un calice d''argent de 70 sicles, selon le sicle du sanctuaire, tous deux pleins de fleur de farine pétrie à l''huile, pour l''offrande végétale ; '
  '2':
  - type: note
    content: 'princes 1.5-16,44. –  leur offrande  : sous-entendu dans le texte, de même aux v. 10,18 etc. ; cf. Lv 1.2n.'
  - type: text
    content: 'Alors les princes d''Israël, les chefs de famille, présentèrent leur offrande : c''étaient les princes des tribus, ceux qui avaient présidé au recensement. '
  '20':
  - type: text
    content: 'une coupe d''or de 10 sicles, pleine d''encens ; '
  '21':
  - type: text
    content: 'un taureau, un bélier, un agneau d''un an, pour l''holocauste ; '
  '22':
  - type: text
    content: 'un bouc, en sacrifice pour le péché ; '
  '23':
  - type: text
    content: et, pour le sacrifice de paix, deux bœufs, cinq béliers, cinq boucs, cinq agneaux d'un an. Tel fut le présent de Netanéel, fils de Tsouar.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Zabulon 1.9 ; 2.7.
  - type: text
    content: 'Le troisième jour, ce fut le prince des fils de Zabulon, Eliab, fils de Hélôn. '
