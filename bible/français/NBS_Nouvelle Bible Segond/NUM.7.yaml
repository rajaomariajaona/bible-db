    marker-yv: yv-n
  - type: text
    text: 'Prends ces offrandes de leur part, afin de les employer pour le service de la tente de la Rencontre ; tu les donneras aux lévites, à chacun en fonction de son service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse prit les chariots et les bœufs, et il les remit aux lévites. '
  - type: usfm
    marker: vlbl
