  '5':
  - type: note
    content: 'Cf. chap. 4 ; 10.17. –  ces offrandes  : sous-entendu dans le texte. –  de leur part  : cf. 3.9n. –  afin de les employer pour le service  : la même expression hébraïque a souvent été traduite par accomplir le service  ; cf. 3.7n  ; 18.6. –  lévites 8.6+.'
  - type: text
    content: 'Prends ces offrandes de leur part, afin de les employer pour le service de la tente de la Rencontre ; tu les donneras aux lévites, à chacun en fonction de son service. '
