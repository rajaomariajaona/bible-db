  '3':
  - type: note
    content: 'Cf. v. 84+. –  leur présent (hébreu qorbân) : cf. Lv 1.2n. –  chariots en forme de litières  : traduction incertaine ; d''après des versions anciennes, on a aussi compris chariots couverts ou tombereaux.'
  - type: text
    content: 'Ils amenèrent leur présent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : six chariots en forme de litières et douze bœufs, soit un chariot pour deux princes et un bœuf pour chacun ; ils les présentèrent devant la Demeure.'
