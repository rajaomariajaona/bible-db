    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; d''après des versions anciennes, on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chariots couverts '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tombereaux.
    marker-yv: yv-n
  - type: text
    text: 'Ils amenèrent leur présent devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : six chariots en forme de litières et douze bœufs, soit un chariot pour deux princes et un bœuf pour chacun ; ils les présentèrent devant la Demeure.'
