      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui avait ordonné de dire à tout le peuple, les prêtres, les prophètes et tout le peuple se saisirent de lui en disant : Tu mourras ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6+. –  '
      - type: usfm
        marker: fq
