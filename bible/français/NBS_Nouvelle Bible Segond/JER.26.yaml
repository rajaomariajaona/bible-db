      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shemayahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qiriath-Yéarim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qiriath-Baal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', près de Jérusalem Jos 9.17 ; 15.60 ; 18.14 ; 1S 6.21.'
      marker-yv: yv-n
    - type: text
      text: 'Il y eut aussi un homme qui faisait le prophète au nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Urie, fils de Shemaya, de Qiriath-Yéarim. Il parla en prophète contre cette ville et contre ce pays par des paroles tout à fait semblables à celles de Jérémie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Joïaqim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1 ; 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss. Sur l'ensemble du récit, cf. 1.17 ; voir aussi Mt 2.13 ; 21.36 ; Lc 13.31-33 ; 22.2/ / ; Hé 11.37.
      marker-yv: yv-n
    - type: text
      text: 'Le roi Joïaqim, tous ses vaillants hommes et tous ses princes entendirent ses paroles, et le roi chercha à le faire mettre à mort. L''ayant appris, Urie eut peur, et il s''enfuit pour se rendre en Egypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elnathan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 36.12,25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Akbor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 22.12,14.
      marker-yv: yv-n
    - type: text
      text: 'Le roi Joïaqim envoya des hommes en Egypte – Elnathan, fils d''Akbor, et des hommes avec lui, en Egypte. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 22.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les tombes des gens du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être une fosse commune ; il s''agit en tout cas d''une sépulture déshonorante ; cf. 22.18s.'
      marker-yv: yv-n
    - type: text
      text: Ils firent sortir Urie d'Egypte et l'amenèrent au roi Joïaqim, qui le tua d'un coup d'épée et jeta son cadavre sur les tombes des gens du peuple.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
