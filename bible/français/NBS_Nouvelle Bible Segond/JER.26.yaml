  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui avait ordonné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après des versions anciennes ; texte hébreu traditionnel '
      - type: usfm
        marker: fqa
