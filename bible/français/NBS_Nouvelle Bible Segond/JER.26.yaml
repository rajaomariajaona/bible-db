      text: ', en disant : « Cette maison sera comme Silo, cette ville sera réduite en ruines, elle n''aura plus d''habitants ! » Tout le peuple se rassembla autour de Jérémie dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
