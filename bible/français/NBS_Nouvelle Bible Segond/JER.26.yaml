      marker-yv: yv-n
    - type: text
      text: 'pour écouter les paroles de mes serviteurs, les prophètes, que je vous envoie, que je vous ai envoyés, inlassablement, et que vous n''avez pas écoutés, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
