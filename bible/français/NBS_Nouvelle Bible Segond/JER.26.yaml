document_id: JER.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie menacé de mort
  - type: text
    content: ' '
  - type: note
    content: 'Au commencement (comme en Gn 1.1n) du règne  : l''expression désigne probablement l''année d''accession ; cf. 27.1 ; 28.1 ; 49.34. –  Joïaqim 1.3n. –  parvint 1.2n  ; certaines versions anciennes ajoutent à Jérémie.'
  - type: text
    content: 'Au commencement du règne de Joïaqim, fils de Josias, roi de Juda, cette parole parvint de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '10':
  - type: note
    content: ils montèrent… 21.13n  ; 22.1+. –  la porte Neuve de la maison du Seigneur (le terme correspondant à de la maison est omis dans certains mss) ; cf. 36.10 ; c'est peut-être celle dont la construction est mentionnée en 2R 15.35 ; voir aussi Jr 20.2n. Sur le jugement à la porte, voir aussi 39.3 ; Dt 16.18n.
  - type: text
    content: 'Lorsque les princes de Juda l''apprirent, ils montèrent de la maison du roi à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et s''assirent à l''entrée de la porte Neuve de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'Cf. 38.4 ; Mt 26.66/ /. –  Cet homme…  : litt. jugement de mort pour cet homme, de même au v. 16. –  vous l''avez entendu  : litt. vous l''avez entendu de vos oreilles.'
  - type: text
    content: 'Alors les prêtres et les prophètes parlèrent ainsi aux princes et à tout le peuple : Cet homme mérite la peine de mort, car il a parlé en prophète contre cette ville, comme vous l''avez entendu. '
  '12':
  - type: note
    content: 'à tous les princes  : LXX aux princes. –  le Seigneur qui m''a envoyé v. 15 ; 1.7. –  tout ce que vous avez entendu  : litt. toutes les paroles que vous avez entendues.'
  - type: text
    content: 'Jérémie dit à tous les princes et à tout le peuple : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui m''a envoyé annoncer en prophète à cette maison et à cette ville tout ce que vous avez entendu. '
  '13':
  - type: note
    content: 'réformez 7.3n. –  écoutez le Seigneur  : litt. la voix de YHWH  ; cf. 3.25n. –  le Seigneur renoncera… v. 3n  ; 18.8+.'
  - type: text
    content: 'Maintenant, réformez vos voies et vos agissements ; écoutez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' renoncera au mal qu''il a décrété contre vous. '
  '14':
  - type: note
    content: Jos 9.25n.
  - type: text
    content: 'Quant à moi, je suis entre vos mains ; faites-moi ce qui vous plaira et ce qui vous conviendra. '
  '15':
  - type: note
    content: 'sang innocent 7.6+. –  vraiment envoyé 28.9. –  vous dire  : litt. dire à vos oreilles.'
  - type: text
    content: 'Seulement sachez bien que, si vous me mettez à mort, vous vous chargez du sang innocent, vous, cette ville et ses habitants ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a vraiment envoyé vers vous pour vous dire toutes ces paroles.'
  '16':
  - type: text
    content: 'Les princes et tout le peuple dirent aux prêtres et aux prophètes : Cet homme ne mérite pas la peine de mort, car c''est au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, qu''il nous a parlé. '
  '17':
  - type: note
    content: 'dirent  : litt. se levèrent et dirent.'
  - type: text
    content: 'Et quelques-uns des anciens du pays dirent à toute l''assemblée du peuple : '
  '18':
  - type: note
    content: 'Michée de Morésheth Mi 1.1. –  Ezéchias 2R 18.1ss. –  Sion sera labourée… 9.10+ ; Mi 3.12n. –  de la Maison, c.-à-d. du temple. –  hauteur  : le terme est également traduit par haut lieu. –  broussailles ou forêt  ; cf. 21.14 ; Ez 34.25.'
  - type: text
    content: 'Michée de Morésheth parlait en prophète aux jours d''Ezéchias, roi de Juda, et il disait à tout le peuple de Juda :'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Sion sera labourée comme un champ,
  - type: text
    content: Jérusalem deviendra un monceau de pierres,
  - type: text
    content: et la montagne de la Maison deviendra une hauteur couverte de broussailles.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'mis à mort  : tournure analogue à celle du v. 8n. –  craint 5.22. –  cherché à apaiser  : litt. adouci la face de  ; cf. Ex 32.11+. –  le Seigneur a renoncé v. 3,13+. –  nous nous ferions…  : cf. 44.7 ; Ac 5.39.'
  - type: text
    content: 'Ezéchias, roi de Juda, et tout Juda l''ont-ils mis à mort ? N''a-t-il pas craint le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? N''a-t-il pas cherché à apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a renoncé au mal qu''il avait décrété contre eux. Et nous, nous nous ferions un si grand mal à nous-mêmes ?'
  - type: heading
    content: Joïaqim fait exécuter le prophète Urie
  '2':
  - type: text
    content: ' '
  - type: note
    content: '7.2+. –  n''en retranche pas un mot  : cf. Ap 22.19.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tiens-toi dans la cour de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dis à ceux qui, de toutes les villes de Juda, viennent se prosterner dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' toutes les paroles que je t''ordonne de leur dire ; n''en retranche pas un mot. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'faisait le prophète et parla en prophète traduisent deux formes du même verbe ; cf. 2.8n. –  Urie  : hébreu Ouriyahou . –  Shemaya  : hébreu Shemayahou . –  Qiriath-Yéarim ou Qiriath-Baal , près de Jérusalem Jos 9.17 ; 15.60 ; 18.14 ; 1S 6.21.'
  - type: text
    content: 'Il y eut aussi un homme qui faisait le prophète au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Urie, fils de Shemaya, de Qiriath-Yéarim. Il parla en prophète contre cette ville et contre ce pays par des paroles tout à fait semblables à celles de Jérémie. '
  '21':
  - type: note
    content: Joïaqim v. 1 ; 1.3n  ; 22.13nss. Sur l'ensemble du récit, cf. 1.17 ; voir aussi Mt 2.13 ; 21.36 ; Lc 13.31-33 ; 22.2/ / ; Hé 11.37.
  - type: text
    content: 'Le roi Joïaqim, tous ses vaillants hommes et tous ses princes entendirent ses paroles, et le roi chercha à le faire mettre à mort. L''ayant appris, Urie eut peur, et il s''enfuit pour se rendre en Egypte. '
  '22':
  - type: note
    content: 'Elnathan  : cf. 36.12,25. –  Akbor 2R 22.12,14.'
  - type: text
    content: 'Le roi Joïaqim envoya des hommes en Egypte – Elnathan, fils d''Akbor, et des hommes avec lui, en Egypte. '
  '23':
  - type: note
    content: 'Cf. 22.17. –  les tombes des gens du peuple  : peut-être une fosse commune ; il s''agit en tout cas d''une sépulture déshonorante ; cf. 22.18s.'
  - type: text
    content: Ils firent sortir Urie d'Egypte et l'amenèrent au roi Joïaqim, qui le tua d'un coup d'épée et jeta son cadavre sur les tombes des gens du peuple.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Ahiqam…  : litt. la main d''Ahiqam, fils de Shaphân (cf. 29.3 ; 36.10-13 ; 39.14 ; 40.5ss ; 2R 22.8-14) … fut avec Jérémie.'
  - type: text
    content: Cependant Ahiqam, fils de Shaphân, protégea Jérémie et empêcha qu'il soit livré au peuple pour être mis à mort.
  '3':
  - type: note
    content: 'V. 13,19 ; 18.8+,11+. –  Peut-être  : cf. 36.3 ; Ex 32.20 ; Am 5.15 ; So 2.3 ; Lc 20.13. –  je renoncerai…  : autre traduction je regretterai le mal… –  agissements mauvais 4.4n.'
  - type: text
    content: 'Peut-être écouteront-ils et reviendront-ils, chacun de sa voie mauvaise ; alors je renoncerai au mal que je pensais leur faire à cause de leurs agissements mauvais. '
  '4':
  - type: note
    content: Cf. Dt 28.15. – Voir loi.
  - type: text
    content: 'Tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Si vous ne m''écoutez pas pour suivre ma loi que j''ai mise devant vous, '
  '5':
  - type: note
    content: 7.13n,25s.
  - type: text
    content: 'pour écouter les paroles de mes serviteurs, les prophètes, que je vous envoie, que je vous ai envoyés, inlassablement, et que vous n''avez pas écoutés, '
  '6':
  - type: note
    content: comme Silo v. 9 ; 7.12n,14 ; cf. Lc 21.6,20-22. –  malédiction 24.9+ ; voir bénédiction.
  - type: text
    content: alors je traiterai cette maison comme Silo et je ferai de cette ville un objet de malédiction pour toutes les nations de la terre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: prêtres / prophètes 2.8+.
  - type: text
    content: 'Les prêtres, les prophètes et tout le peuple entendirent Jérémie prononcer ces paroles dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: lui avait ordonné, d'après des versions anciennes ; texte hébreu traditionnel avait ordonné. –  Tu mourras, comme en Gn 2.17n  ; cf. v. 19n.
  - type: text
    content: 'Et comme Jérémie achevait de dire tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné de dire à tout le peuple, les prêtres, les prophètes et tout le peuple se saisirent de lui en disant : Tu mourras ! '
  '9':
  - type: note
    content: 'V. 6+. –  se rassembla  : le verbe évoque habituellement l’assemblée cultuelle (cf. v. 17 ; 31.8 ; 44.15 ; 50.9).'
  - type: text
    content: 'Pourquoi parles-tu en prophète au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : « Cette maison sera comme Silo, cette ville sera réduite en ruines, elle n''aura plus d''habitants ! » Tout le peuple se rassembla autour de Jérémie dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
