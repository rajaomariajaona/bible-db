      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la main d''Ahiqam, fils de Shaphân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 29.3 ; 36.10-13 ; 39.14 ; 40.5ss ; 2R 22.8-14) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: … fut avec Jérémie.
      marker-yv: yv-n
    - type: text
      text: Cependant Ahiqam, fils de Shaphân, protégea Jérémie et empêcha qu'il soit livré au peuple pour être mis à mort.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 13,19 ; 18.8+,11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Peut-être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 36.3 ; Ex 32.20 ; Am 5.15 ; So 2.3 ; Lc 20.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je renoncerai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je regretterai le mal… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'agissements mauvais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Peut-être écouteront-ils et reviendront-ils, chacun de sa voie mauvaise ; alors je renoncerai au mal que je pensais leur faire à cause de leurs agissements mauvais. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 28.15. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu leur diras : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Si vous ne m''écoutez pas pour suivre ma loi que j''ai mise devant vous, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.5 '
      - type: usfm
        marker: ft
