document_id: HOS.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mise à l'épreuve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me dit : Va encore…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'me dit : Va, aime encore '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'me dit encore : Va…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; selon la traduction, on peut comprendre ou bien qu''Osée achète une autre femme, ou bien qu''il rachète la même femme (interprétation majoritaire). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'compagnon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 3.1,20 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aimant le mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui suppose une autre vocalisation des mêmes consonnes en hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adultère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autres dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dieux étrangers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Ex 20.3 ; Dt 6.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et ils aiment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'autres dieux qui aiment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les gâteaux de raisin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jouaient un rôle dans le culte cananéen ; cf. 2S 6.19 ; Es 16.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ct 2.5 ; 1Ch 16.3 ; voir aussi Jr 7.17-18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 44.16-19.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me dit : Va encore, aime une femme aimée d''un compagnon, une femme adultère ; aime-la comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) aime les Israélites ! Eux, ils se tournent vers d''autres dieux et ils aiment les gâteaux de raisin ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sicles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''unité de monnaie ou de poids (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ) est sous-entendue dans le texte (Dt 22.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; cf. Ex 21.32 ; Lv 27.4 ; Dt 22.28s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 210 l ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un létek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 115 l.'
      marker-yv: yv-n
    - type: text
      text: 'Je l''achetai pour quinze sicles d''argent, un homer d''orge et un létek d''orge ; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2Tm 2.13.
      marker-yv: yv-n
    - type: text
      text: 'et je lui dis : Reste longtemps à moi, ne te prostitue pas, ne sois à aucun homme, et je ferai de même envers toi.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'longtemps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pendant bien des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 2Ch 15.3 ; de même au v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pierre levée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.1s ; Gn 28.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mi 5.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'éphod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'teraphim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jg 8.27 ; 17.5 ; 18.14,17 ; 1S 23.9s ; 30.7s.
      marker-yv: yv-n
    - type: text
      text: 'Car les Israélites resteront longtemps sans roi, sans prince, sans sacrifice, sans pierre levée, sans éphod et sans teraphim. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.10s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.2 ; Jr 30.9 ; Ez 37.24s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa bonté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bien ; bonheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2.10s,23s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la suite des temps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 2.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Après cela, les Israélites reviendront ; ils chercheront le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', leur Dieu, et David, leur roi ; effrayés, ils s''approcheront du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et de sa bonté, dans la suite des temps.'
