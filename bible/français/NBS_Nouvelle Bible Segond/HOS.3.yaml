document_id: HOS.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mise à l'épreuve
  - type: text
    content: ' '
  - type: note
    content: 'me dit : Va encore…  : autres traductions me dit : Va, aime encore ou me dit encore : Va…  ; selon la traduction, on peut comprendre ou bien qu''Osée achète une autre femme, ou bien qu''il rachète la même femme (interprétation majoritaire). –  compagnon Jr 3.1,20 ; LXX aimant le mal , ce qui suppose une autre vocalisation des mêmes consonnes en hébreu. –  adultère 2.4. –  autres dieux ou dieux étrangers , Ex 20.3 ; Dt 6.14+. –  et ils aiment  : autre traduction d''autres dieux qui aiment . –  les gâteaux de raisin jouaient un rôle dans le culte cananéen ; cf. 2S 6.19 ; Es 16.7n  ; Ct 2.5 ; 1Ch 16.3 ; voir aussi Jr 7.17-18n  ; 44.16-19.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Va encore, aime une femme aimée d''un compagnon, une femme adultère ; aime-la comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) aime les Israélites ! Eux, ils se tournent vers d''autres dieux et ils aiment les gâteaux de raisin ! '
  '2':
  - type: note
    content: 'sicles  : l''unité de monnaie ou de poids (voir mesures) est sous-entendue dans le texte (Dt 22.19n) ; cf. Ex 21.32 ; Lv 27.4 ; Dt 22.28s. –  un homer  : environ 210 l ; un létek  : environ 115 l.'
  - type: text
    content: 'Je l''achetai pour quinze sicles d''argent, un homer d''orge et un létek d''orge ; '
  '3':
  - type: note
    content: Cf. 2Tm 2.13.
  - type: text
    content: 'et je lui dis : Reste longtemps à moi, ne te prostitue pas, ne sois à aucun homme, et je ferai de même envers toi.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'longtemps ou pendant bien des jours , comme en 2Ch 15.3 ; de même au v. 3. –  pierre levée  : cf. 10.1s ; Gn 28.18n  ; Mi 5.12+. –  éphod / teraphim Jg 8.27 ; 17.5 ; 18.14,17 ; 1S 23.9s ; 30.7s.'
  - type: text
    content: 'Car les Israélites resteront longtemps sans roi, sans prince, sans sacrifice, sans pierre levée, sans éphod et sans teraphim. '
  '5':
  - type: note
    content: '11.10s. –  David  : cf. 2.2 ; Jr 30.9 ; Ez 37.24s. –  sa bonté  : le mot correspondant est aussi traduit par bien ; bonheur (cf. 2.10s,23s). –  dans la suite des temps Es 2.2n.'
  - type: text
    content: 'Après cela, les Israélites reviendront ; ils chercheront le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, et David, leur roi ; effrayés, ils s''approcheront du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de sa bonté, dans la suite des temps.'
