document_id: PSA.84,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Chant des pèlerins arrivant à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: guittith 8.1n  ; 81.1. –  fils de Coré 42.1n.
  - type: text
    content: Du chef de chœur. Sur la guittith. Des fils de Coré. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Toi qui…  : autre traduction possible  : ô Dieu, vois celui qui est notre bouclier (= notre roi = l''homme qui a reçu ton onction  ; voir 2.2n  ; 132.10) ; cf. v. 12 ; 47.10 ; 89.19 ; voir aussi 28.8s ; 61.7s ; 63.12 ; 1S 2.10.'
  - type: text
    content: Toi qui es notre bouclier, ô Dieu, vois !
  - type: text
    content: Regarde le visage de l'homme qui a reçu ton onction !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'les cours de ton temple  : litt. tes cours  ; cf. v. 3n. –  ailleurs  : sous-entendu dans le texte. –  j''ai choisi  : certains modifient ici le texte hébreu traditionnel pour lire Mieux vaut un jour… que mille chez moi, me tenir… plutôt que résider…  ; cf. 63.4 ; voir aussi Ac 3.2.'
  - type: text
    content: Mieux vaut en effet un jour dans les cours de ton temple que mille ailleurs ;
  - type: text
    content: j'ai choisi de me tenir sur le seuil de la maison de mon Dieu,
  - type: text
    content: plutôt que de résider sous les tentes de la méchanceté.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'bouclier  : cf. v. 10 ; 3.4+. – Voir grâce et gloire.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu est un soleil et un bouclier,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donne la grâce et la gloire,'
  - type: text
    content: il ne refuse aucun bien
  - type: text
    content: à ceux qui suivent la voie de l'intégrité.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 1.1+ ; 2.12 ; 4.6+ ; 145.5 ; Es 30.18 ; Jr 17.7 ; Pr 16.20.
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: heureux l'homme qui met sa confiance en toi !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.2 ; Nb 24.5. –  chéries  : cf. 48.3 ; 76.2s ; 87.2 ; 122.1ss. –  tes demeures 43.3+.'
  - type: text
    content: Comme elles sont chéries, tes demeures,
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: '42.3. –  Je m''épuise 69.4n  ; 119.81s. –  les cours…  : litt. les cours de YHWH , de même au v. 11 ; cf. 65.5+. –  mon cœur et ma chair  : cf. 63.2n  ; 1S 2.1. –  le Dieu (hébreu ’El , Gn 21.33n) vivant  : certains modifient très légèrement le texte hébreu traditionnel pour lire le Dieu de ma vie  ; cf. 36.9 ; 42.3,9.'
  - type: text
    content: 'Je m''épuise à force de languir après les cours du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mon cœur et ma chair crient vers le Dieu vivant.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'un gîte  : le mot hébreu est habituellement traduit par maison  ; cf. Mt 8.20. –  tes autels ou, selon un ms, près de tes autels. –  mon roi et mon Dieu 5.3+.'
  - type: text
    content: Même le passereau trouve un gîte,
  - type: text
    content: 'et l''hirondelle un nid où elle dépose ses petits :'
  - type: text
    content: 'tes autels, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: mon roi et mon Dieu !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 15.1ss ; 23.6n  ; 24.3ss ; 27.5 ; 65.5 ; 101.7 ; 122.1 ; 135.2 ; 140.14 ; Ap 21.3. –  encore  : LXX pour toujours.'
  - type: text
    content: Heureux ceux qui habitent ta maison !
  - type: text
    content: 'Ils te loueront encore. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ont…  : litt. des routes (même terme en Es 40.3) dans leur cœur  ; LXX a traduit des montées , terme qui désigne habituellement le pèlerinage vers Jérusalem (120.1n) ; certains modifient le texte hébreu traditionnel pour lire la confiance au cœur.'
  - type: text
    content: Heureux les hommes dont la force est en toi !
  - type: text
    content: Ils ont dans leur cœur des routes toutes tracées.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  la vallée du Baka (le même mot est traduit par mûrier en 2S 5.23ns, désignant en tout cas un arbre poussant sur terrain sec) est sans doute proche de Jérusalem. Son nom rappelle le verbe habituellement traduit par pleurer , d''où la leçon de quelques mss hébreux et de versions anciennes  : vallée de larmes, vallée des pleurs. –  une oasis  : litt. une source ou un lieu de sources  ; cf. 107.33 ; Es 35.6ss ; 41.18ss ; 43.19 ; 48.21. –  la pluie d''automne  : la première après la saison sèche (cf. Jl 2.23 ; Za 14.16ss) ; des versions anciennes ont compris l''instructeur ou le maître (homonyme apparenté à tora, loi, enseignant ).'
  - type: text
    content: Lorsqu'ils traversent la vallée du Baka,
  - type: text
    content: ils en font une oasis,
  - type: text
    content: et la pluie d'automne la couvre aussi de bénédictions.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Leur vigueur…  : litt. ils vont de force en force  ; certains modifient la vocalisation traditionnelle pour lire de rempart en rempart  ; cf. Es 40.31 ; voir aussi Jr 9.2. –  ils paraîtront…  : traduction incertaine ; on pourrait aussi comprendre avec LXX le Dieu des dieux (leur) apparaîtra à Sion  ; cf. 42.3n  ; voir aussi Ex 23.15n  ; Es 1.12 ; Jr 7.10 ; Mi 6.6.'
  - type: text
    content: Leur vigueur ne cesse de croître,
  - type: text
    content: ils paraîtront devant Dieu à Sion.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 5.2s ; 39.13 ; 54.4 ; 65.3 ; 143.1 ; 1R 8.28.
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu des Armées, entends ma prière !'
  - type: text
    content: 'Prête l''oreille, Dieu de Jacob ! '
  - type: text
    content: Pause.
