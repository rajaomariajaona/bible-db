document_id: NUM.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La date de la célébration de la Pâque
  - type: text
    content: ' '
  - type: note
    content: 'premier mois…  : cf. 1.1.'
  - type: text
    content: 'Dans le désert du Sinaï, le premier mois de la deuxième année à compter de leur sortie d''Egypte, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'dans toutes vos générations  : autre traduction pour toutes vos générations, de même en 10.8 ; 15.14s,21,23 ; 18.23 ; 35.29 ; cf. Gn 17.7n.'
  - type: text
    content: 'Dis aux Israélites : Si un homme parmi vous, dans toutes vos générations, est impur à cause d''un mort ou est en voyage au loin, il célébrera la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'deuxième mois 2Ch 30.2,15. –  on  : litt. ils. –  on la mangera… Ex 12.8,11n.'
  - type: text
    content: 'C''est le quatorzième jour du deuxième mois qu''on la célébrera, à la tombée du soir ; on la mangera avec des pains sans levain et des herbes amères. '
  '12':
  - type: note
    content: Ex 12.10,43ss,46 ; Lv 7.15 ; Jn 19.36.
  - type: text
    content: 'On n''en laissera rien jusqu''au matin et on n''en brisera aucun os. On la célébrera selon tout ce qui est prescrit au sujet de la Pâque. '
  '13':
  - type: note
    content: 'Cf. v. 10 ; Ex 12.14. –  en voyage  : cf. Dt 12.21. –  retranché… Ex 30.33n  ; 31.14 ; Lv 7.20n. –  présent v. 7n. –  sera chargé… 18.1+. – Voir péché.'
  - type: text
    content: 'Si un homme pur qui n''est pas en voyage s''abstient de célébrer la Pâque, il sera retranché de son peuple, parce qu''il n''a pas offert le présent du '
  - type: text
    content: Seigneur
  - type: text
    content: ' au temps fixé ; cet homme-là sera chargé de son péché. '
  '14':
  - type: note
    content: immigré / autochtone Ex 12.43-48n,49 ; cf. Lv 24.16.
  - type: text
    content: 'Si un immigré qui séjourne avec vous célèbre la Pâque du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il se conformera à ce qui est prescrit et ordonné au sujet de la Pâque. Il y aura une même prescription parmi vous, pour l''immigré comme pour l''autochtone.'
  - type: heading
    content: La nuée couvre la Demeure
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Le jour… ou, selon une version ancienne, depuis le jour… 7.1n  ; Ex 40.32. –  la nuée  : cf. 11.25 ; 14.14 ; Ex 13.21s ; 14.24ss ; 19.16 ; 24.15ss ; 33.10,20 ; 40.34ss ; Lv 16.2 ; Dt 4.11 ; 1R 8.10s ; Ps 105.39 ; voir aussi Es 63.11ss ; Lc 1.35 ; 1Co 10.1s. –  la Demeure (1.50+) , la tente (11.26 ; 14.10 ; 17.7) du Témoignage  : cf. 1.50ss ; 17.22s ; 18.2 ; 2Ch 24.6 ; voir aussi Ex 40.2.'
  - type: text
    content: 'Le jour où la Demeure fut montée, la nuée couvrit la Demeure, la tente du Témoignage ; du soir au matin, elle eut sur la Demeure l''aspect d''un feu. '
  '16':
  - type: note
    content: 'la couvrait  : plusieurs versions anciennes précisent le jour.'
  - type: text
    content: 'Il en fut constamment ainsi : la nuée la couvrait ; la nuit, elle avait l''aspect d''un feu. '
  '17':
  - type: note
    content: '10.11 ; cf. 2.3ss. –  s''arrêtait  : litt. demeurait, de même dans la suite ; verbe apparenté au terme traduit par Demeure aux v. 15,18ss ; 1.50+ ; 10.12n  ; Ex 25.9n.'
  - type: text
    content: 'Chaque fois que la nuée s''élevait au-dessus de la tente, les Israélites partaient ; au lieu où la nuée s''arrêtait, les Israélites campaient. '
  '18':
  - type: note
    content: 'l''ordre  : litt. la bouche, de même aux v. 20,23 ; cf. Ac 16.6ss. –  s''arrêtait…  : litt. demeurait sur la Demeure, v. 17n.'
  - type: text
    content: 'Les Israélites partaient sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et campaient sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils campaient aussi longtemps que la nuée s''arrêtait sur la Demeure. '
  '19':
  - type: note
    content: 'assuraient le service…  : autre traduction observaient le commandement du Seigneur, même possibilité au v. 23n  ; cf. 1.53n  ; 3.7n,38 ; 18.3,5 ; voir Lv 8.35n.'
  - type: text
    content: 'Quand la nuée restait longtemps sur la Demeure, les Israélites assuraient le service du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et ne partaient pas. '
  '2':
  - type: note
    content: 'Que…  : litt. et que. –  célèbrent (litt. fassent, de même dans la suite) la Pâque  : cf. 28.16ss ; Ex 12.2ss ; Lv 23.5ss ; Ez 45.21ss ; Esd 6.19ss ; 2Ch 30 ; 35 ; voir aussi Ex 34.25 ; Dt 16.1ss ; Jos 5.10ss ; voir calendrier et fêtes. –  au temps fixé  : le même terme est traduit ailleurs par rencontre festive 16.2n  ; Gn 1.14n.'
  - type: text
    content: 'Que les Israélites célèbrent la Pâque au temps fixé. '
  '20':
  - type: text
    content: 'Si la nuée ne restait que quelques jours sur la Demeure, ils campaient sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et partaient sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'Si la nuée s''élevait…  : LXX a lu ils partaient, de jour ou de nuit et présente un texte plus court et plus simple jusqu''à la fin du chapitre.'
  - type: text
    content: 'Si la nuée ne restait que du soir au matin, si la nuée s''élevait le matin, ils partaient. Si la nuée s''élevait après un jour et une nuit, ils partaient. '
  '22':
  - type: note
    content: 's''arrêtait v. 17n. –  ou une année  : litt. des jours, expression qui signifie parfois une année complète (cf. Lv 25.29 ; 1S 27.7) ; on peut aussi comprendre, plus généralement, ou plus longtemps.'
  - type: text
    content: 'Si la nuée s''arrêtait sur la Demeure deux jours, un mois, ou une année, les Israélites campaient ; ils ne partaient pas ; quand elle s''élevait, ils partaient. '
  '23':
  - type: note
    content: 'sur l''ordre…  : litt. sur la bouche de YHWH. –  ils assuraient le service ou ils observaient le commandement, cf. v. 19n  ; voir aussi Lv 8.35n. –  sur l''ordre que le Seigneur donnait (ou avait donné) …  : litt. sur la bouche de YHWH dans (ou par) la main de Moïse.'
  - type: text
    content: 'Ils campaient sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et ils partaient sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils assuraient le service du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donnait par l''intermédiaire de Moïse.'
  '3':
  - type: note
    content: 'Vous la célébrerez v. 2n  ; quelques mss hébreux et des versions anciennes ont lu ils la célébreront. –  à la tombée du soir  : cf. 28.4 ; voir Ex 12.6n  ; Lv 23.5. –  les prescriptions…  : cf. Ex 12.43ss ; voir loi.'
  - type: text
    content: Vous la célébrerez au temps fixé, le quatorzième jour de ce mois, à la tombée du soir ; vous la célébrerez selon toutes les prescriptions et toutes les règles qui s'y rapportent.
  '4':
  - type: text
    content: 'Moïse parla aux Israélites, pour qu''ils célèbrent la Pâque. '
  '5':
  - type: note
    content: 1.54+ ; Ex 12.28.
  - type: text
    content: 'Ils célébrèrent la Pâque le quatorzième jour du premier mois, à la tombée du soir, dans le désert du Sinaï ; les Israélites firent exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse. '
  '6':
  - type: note
    content: 'Il y eut…  : cf. 15.32ss ; 27.1ss ; 36.1ss ; Lv 24.10ss ; voir 2Ch 30.1ss (cf. 1R 12.32s). –  impurs  : voir pur. –  d''un mort 5.2nss ; 19.11ss ; Lv 21.1 ; cf. Lv 7.20s.'
  - type: text
    content: 'Il y eut des hommes qui, se trouvant impurs à cause d''un mort, ne pouvaient pas célébrer la Pâque ce jour-là. Ils se présentèrent le jour même devant Moïse et Aaron ; '
  '7':
  - type: note
    content: 'lui dirent (à Moïse) : LXX, Syr, Vg leur dirent. –  le présent du Seigneur v. 13 ; Lv 1.2n  ; c''est le seul texte où la Pâque est présentée comme une offrande.'
  - type: text
    content: 'ils lui dirent : Nous sommes impurs à cause d''un mort ; pourquoi serions-nous empêchés d''offrir au temps fixé le présent du '
  - type: text
    content: Seigneur
  - type: text
    content: ' au milieu des Israélites ? '
  '8':
  - type: note
    content: 'Tenez-vous là, debout  : cf. 7.89 ; 2R 22.13.'
  - type: text
    content: 'Moïse leur dit : Tenez-vous là, debout, le temps que j''entende ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonne à votre sujet. '
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
