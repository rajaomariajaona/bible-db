document_id: NUM.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La date de la célébration de la Pâque
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: premier mois…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.1.'
      marker-yv: yv-n
    - type: text
      text: 'Dans le désert du Sinaï, le premier mois de la deuxième année à compter de leur sortie d''Egypte, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans toutes vos '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour toutes vos générations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 10.8 ; 15.14s,21,23 ; 18.23 ; 35.29 ; cf. Gn 17.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dis aux Israélites : Si un homme parmi vous, dans toutes vos générations, est impur à cause d''un mort ou est en voyage au loin, il célébrera la Pâque pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deuxième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Ch 30.2,15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on la mangera… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 12.8,11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est le quatorzième jour du deuxième mois qu''on la célébrera, à la tombée du soir ; on la mangera avec des pains sans levain et des herbes amères. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 12.10,43ss,46 ; Lv 7.15 ; Jn 19.36.
      marker-yv: yv-n
    - type: text
      text: 'On n''en laissera rien jusqu''au matin et on n''en brisera aucun os. On la célébrera selon tout ce qui est prescrit au sujet de la Pâque. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 10 ; Ex 12.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en voyage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 12.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'retranché… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 30.33
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 31.14 ; Lv 7.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'présent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sera chargé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.1+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme pur qui n''est pas en voyage s''abstient de célébrer la Pâque, il sera retranché de son peuple, parce qu''il n''a pas offert le présent du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' au temps fixé ; cet homme-là sera chargé de son péché. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'immigré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autochtone '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 12.43-48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',49 ; cf. Lv 24.16.'
      marker-yv: yv-n
    - type: text
      text: 'Si un immigré qui séjourne avec vous célèbre la Pâque du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il se conformera à ce qui est prescrit et ordonné au sujet de la Pâque. Il y aura une même prescription parmi vous, pour l''immigré comme pour l''autochtone.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La nuée couvre la Demeure
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le jour… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon une version ancienne, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'depuis le jour… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 40.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la nuée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.25 ; 14.14 ; Ex 13.21s ; 14.24ss ; 19.16 ; 24.15ss ; 33.10,20 ; 40.34ss ; Lv 16.2 ; Dt 4.11 ; 1R 8.10s ; Ps 105.39 ; voir aussi Es 63.11ss ; Lc 1.35 ; 1Co 10.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la Demeure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.50+)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ', la tente '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(11.26 ; 14.10 ; 17.7) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Témoignage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.50ss ; 17.22s ; 18.2 ; 2Ch 24.6 ; voir aussi Ex 40.2.'
      marker-yv: yv-n
    - type: text
      text: 'Le jour où la Demeure fut montée, la nuée couvrit la Demeure, la tente du Témoignage ; du soir au matin, elle eut sur la Demeure l''aspect d''un feu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la couvrait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs versions anciennes précisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le jour.
      marker-yv: yv-n
    - type: text
      text: 'Il en fut constamment ainsi : la nuée la couvrait ; la nuit, elle avait l''aspect d''un feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.11 ; cf. 2.3ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'arrêtait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: demeurait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; verbe apparenté au terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Demeure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 15,18ss ; 1.50+ ; 10.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 25.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Chaque fois que la nuée s''élevait au-dessus de la tente, les Israélites partaient ; au lieu où la nuée s''arrêtait, les Israélites campaient. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 20,23 ; cf. Ac 16.6ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'arrêtait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: demeurait sur la Demeure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites partaient sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et campaient sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; ils campaient aussi longtemps que la nuée s''arrêtait sur la Demeure. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assuraient le service…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'observaient le commandement du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité au v. 23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 1.53'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',38 ; 18.3,5 ; voir Lv 8.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand la nuée restait longtemps sur la Demeure, les Israélites assuraient le service du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et ne partaient pas. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et que
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'célèbrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fassent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Pâque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 28.16ss ; Ex 12.2ss ; Lv 23.5ss ; Ez 45.21ss ; Esd 6.19ss ; 2Ch 30 ; 35 ; voir aussi Ex 34.25 ; Dt 16.1ss ; Jos 5.10ss ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au temps fixé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rencontre festive '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Que les Israélites célèbrent la Pâque au temps fixé. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la nuée ne restait que quelques jours sur la Demeure, ils campaient sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et partaient sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si la nuée s'élevait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils partaient, de jour ou de nuit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et présente un texte plus court et plus simple jusqu'à la fin du chapitre.
      marker-yv: yv-n
    - type: text
      text: 'Si la nuée ne restait que du soir au matin, si la nuée s''élevait le matin, ils partaient. Si la nuée s''élevait après un jour et une nuit, ils partaient. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''arrêtait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ou une année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression qui signifie parfois une année complète (cf. Lv 25.29 ; 1S 27.7) ; on peut aussi comprendre, plus généralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ou plus longtemps.
      marker-yv: yv-n
    - type: text
      text: 'Si la nuée s''arrêtait sur la Demeure deux jours, un mois, ou une année, les Israélites campaient ; ils ne partaient pas ; quand elle s''élevait, ils partaient. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur l'ordre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la bouche de YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils assuraient le service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils observaient le commandement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Lv 8.35'
        - type: usfm
          marker: ord
          children:
          - type: text
