  - type: text
    text: La vigne livrée au feu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vigne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.6-8 ; 19.10,14 ; cf. Es 5.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sarment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot correspondant est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rameau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 8.17 ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que tout le bois de ramure de tous les arbres de la forêt.
    marker-yv: yv-n
  - type: text
    text: 'Humain, le bois de la vigne, qu''a-t-il de plus que tout autre bois ? Qu''en est-il du sarment qui est parmi les arbres de la forêt ? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une cheville '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un piquet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Es 22.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '-25.'
    marker-yv: yv-n
  - type: text
    text: 'En prend-on du bois pour l''utiliser à un ouvrage ? En tire-t-on une cheville pour y suspendre un objet quelconque ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On le met au feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 15.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les deux bouts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 9.13s ; voir aussi 7.4 ; Am 4.11 ; Za 3.2 ; allusion probable aux diverses amputations subies par Israël (chute du royaume du Nord, 2R 17 ; premier exil des Judéens, Ez 1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'On le met au feu, qui le dévore ; le feu en dévore les deux bouts, et le milieu brûle : pourra-t-il servir à quoi que ce soit ? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Lc 23.31.
    marker-yv: yv-n
  - type: text
    text: Ainsi, lorsqu'il était entier, on n'en faisait aucun ouvrage ; combien moins, lorsque le feu l'a dévoré et qu'il est brûlé, pourra-t-on en faire quoi que ce soit !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eh bien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la même formule est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à cause de cela '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(p. ex. 14.4,6 ; 16.35,37) ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est pourquoi.
    marker-yv: yv-n
  - type: text
    text: 'Eh bien ! ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Comme le bois de la vigne parmi les arbres de la forêt, comme ce bois que je livre au feu pour qu''il le dévore, ainsi je livrerai les habitants de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je me retournerai… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils sont sortis du feu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''image s''applique à ceux qu''a épargnés le premier exil ; cf. 11.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',15 ; 33.24.'
    marker-yv: yv-n
  - type: text
    text: 'Je me retournerai contre eux ; ils sont sortis du feu, mais le feu les dévorera. Ainsi vous saurez que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), quand je me tournerai contre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lieu dévasté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.14 ; 14.15s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sacrilèges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.13+.
    marker-yv: yv-n
  - type: text
    text: 'Je ferai du pays un lieu dévasté, parce qu''ils ont commis des sacrilèges – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: .
