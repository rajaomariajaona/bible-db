document_id: EZK.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vigne livrée au feu
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vigne 17.6-8 ; 19.10,14 ; cf. Es 5.1+. –  sarment  : le mot correspondant est rendu par rameau en 8.17 ; autre traduction que tout le bois de ramure de tous les arbres de la forêt.'
  - type: text
    content: 'Humain, le bois de la vigne, qu''a-t-il de plus que tout autre bois ? Qu''en est-il du sarment qui est parmi les arbres de la forêt ? '
  '3':
  - type: note
    content: une cheville ou un piquet  ; cf. Es 22.23n-25.
  - type: text
    content: 'En prend-on du bois pour l''utiliser à un ouvrage ? En tire-t-on une cheville pour y suspendre un objet quelconque ? '
  '4':
  - type: note
    content: 'On le met au feu  : cf. Jn 15.6. –  les deux bouts  : cf. Es 9.13s ; voir aussi 7.4 ; Am 4.11 ; Za 3.2 ; allusion probable aux diverses amputations subies par Israël (chute du royaume du Nord, 2R 17 ; premier exil des Judéens, Ez 1.2n).'
  - type: text
    content: 'On le met au feu, qui le dévore ; le feu en dévore les deux bouts, et le milieu brûle : pourra-t-il servir à quoi que ce soit ? '
  '5':
  - type: note
    content: Cf. Lc 23.31.
  - type: text
    content: Ainsi, lorsqu'il était entier, on n'en faisait aucun ouvrage ; combien moins, lorsque le feu l'a dévoré et qu'il est brûlé, pourra-t-on en faire quoi que ce soit !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Eh bien  : la même formule est habituellement traduite par à cause de cela (p. ex. 14.4,6 ; 16.35,37) ou c''est pourquoi.'
  - type: text
    content: 'Eh bien ! ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Comme le bois de la vigne parmi les arbres de la forêt, comme ce bois que je livre au feu pour qu''il le dévore, ainsi je livrerai les habitants de Jérusalem. '
  '7':
  - type: note
    content: 'Je me retournerai… 14.8n. –  ils sont sortis du feu…  : l''image s''applique à ceux qu''a épargnés le premier exil ; cf. 11.3n,15 ; 33.24.'
  - type: text
    content: 'Je me retournerai contre eux ; ils sont sortis du feu, mais le feu les dévorera. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je me tournerai contre eux. '
  '8':
  - type: note
    content: lieu dévasté 6.14 ; 14.15s. –  sacrilèges 14.13+.
  - type: text
    content: 'Je ferai du pays un lieu dévasté, parce qu''ils ont commis des sacrilèges – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
