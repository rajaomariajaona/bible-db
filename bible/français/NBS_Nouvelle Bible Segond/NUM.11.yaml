document_id: NUM.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites à Tabééra
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 16 ; Dt 9.22 ; Jn 6.41ss. –  se plaignait  : litt. fut comme des gens qui se plaignent  ; le terme évoque parfois des lamentations rituelles (Ez 8.14) ; cf. Lm 3.39 ; voir aussi Ex 15.24. Au lieu de se plaignait amèrement… , on pourrait comprendre le peuple se plaignait, et cela déplut au Seigneur  ; cf. v. 10. –  en présence  : litt. aux oreilles , de même au v. 18. –  un feu (autre traduction le feu ) du Seigneur  : cf. v. 3 ; Ex 9.23 ; 19.18 ; Lv 10.2 ; 1R 18.38 ; 2R 1.10,12 ; Ps 78.21. –  l''extrémité du camp  : cf. Ex 33.7.'
  - type: text
    content: 'Le peuple se plaignait amèrement en présence du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''entendit, il se mit en colère ; un feu du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''alluma parmi eux et dévora l''extrémité du camp. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'chacun…  : litt. dans ses clans (c.-à-d. dans les divers quartiers du camp) , chacun à l''entrée de sa tente . –  cela déplut à Moïse  : litt. mauvais aux yeux de Moïse , cf. v. 1.'
  - type: text
    content: 'Moïse entendit le peuple qui pleurait, chacun dans son clan, à l''entrée de sa tente. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit dans une grande colère, et cela déplut à Moïse. '
  '11':
  - type: note
    content: Cf. Ex 32.11ss,31s ; 33.12ss ; 1R 19.4 ; Jr 20.7ss. –  la charge ou le fardeau, cf. v. 17 ; Jr 23.33ss.
  - type: text
    content: 'Moïse dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Pourquoi me fais-tu du mal, à moi, ton serviteur ? Pourquoi n''ai-je pas trouvé grâce à tes yeux, que tu aies mis sur moi la charge de tout ce peuple ? '
  '12':
  - type: note
    content: 'sur ton sein Rt 4.16 ; cf. Gn 16.5n. –  la nourrice ou le tuteur  ; le terme hébreu correspondant désigne peut-être, plus particulièrement, celui ou celle qui s''occupe d''un bébé sans l''allaiter (nourrice sèche) ; même terme en 2R 10.1,5 (précepteurs) ; Es 49.23 (nourriciers) ; termes apparentés en 2S 4.4 ; Es 60.4 (portées sur la hanche) ; Pr 8.30n  ; Rt 4.16 ; Est 2.7 (tuteur) ; cf. Dt 1.31 ; Os 11.3. –  la terre  : cf. Gn 2.5n  ; 4.10n. –  que tu as promise par serment…  : cf. Gn 12.7 ; 13.15 ; 26.3 ; 28.13.'
  - type: text
    content: 'Est-ce moi qui ai conçu tout ce peuple ? Est-ce moi qui l''ai engendré, pour que tu me dises : « Porte-le sur ton sein, comme la nourrice porte le nourrisson, jusqu''à la terre que tu as promise par serment à ses pères ! » '
  '13':
  - type: text
    content: 'Où prendrai-je de la viande pour en donner à tout ce peuple ? Car ils pleurent auprès de moi, en disant : « Donne-nous de la viande à manger ! » '
  '14':
  - type: note
    content: 'il est trop lourd  : autre traduction c''est trop lourd, cf. Ex 18.18,22 ; Dt 1.9 ; 1R 3.9.'
  - type: text
    content: 'Je ne peux pas, à moi seul, porter tout ce peuple : il est trop lourd pour moi. '
  '15':
  - type: note
    content: 'Cf. Ex 32.32 ; 1R 19.4. –  si j''ai trouvé grâce à tes yeux  : cf. Gn 18.3n. –  que je n''aie plus à voir…  : cf. 21.16 ; 44.34. –  le malheur…  : le texte hébreu traditionnel porte mon malheur ou mon mal  ; mais d''après une tradition juive le texte original aurait porté ton mal, et les scribes l''auraient modifié par déférence pour Dieu.'
  - type: text
    content: Puisque c'est ainsi que tu me traites, tue-moi donc, je t'en prie, si j'ai trouvé grâce à tes yeux, et que je n'aie plus à voir le malheur que tu m'infliges !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'soixante-dix des anciens  : sur les anciens , cf. v. 24s ; Ex 18.13ss ; 24.1ss ; Dt 1.9ss ; voir aussi Ex 3.18 ; 4.29 ; 17.5 ; 24.1s,9ss ; Lv 9.1 ; Nb 16.25 ; Dt 19.12 ; 21.3ss,18ss ; 22.15ss ; 25.7s ; Jos 7.6 ; 8.10 ; 9.11 ; Jg 8.14 ; 1S 30.26ss ; 2S 3.17 ; 5.3 ; 2R 23.1 ; Ez 8.1 ; 14.1 ; 20.1ss ; Esd 10.8,14 ; sur le nombre soixante-dix , voir Ex 1.5 ; Jg 1.7 ; 1S 6.19 ; Lc 10.1n. –  secrétaires ou scribes  : cf. Ex 5.6n  ; Dt 1.15n. –  tente de la Rencontre 1.1 ; 7.89 ; cf. 8.24ss ; Ex 33.7ss.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Rassemble-moi soixante-dix des anciens d''Israël, de ceux que tu connais comme anciens et secrétaires du peuple ; amène-les à la tente de la Rencontre ; qu''ils se tiennent là, debout, avec toi. '
  '17':
  - type: note
    content: 'souffle ou esprit v. 29 ; le même mot est traduit par vent au v. 31. –  sur toi  : Vg en toi, de même au v. 25 ; cf. 2R 2.9. –  la charge v. 11n  ; cf. Ex 18.22.'
  - type: text
    content: 'Je descendrai, et là je te parlerai ; je retirerai un peu du souffle qui est sur toi et je le mettrai sur eux, pour qu''ils portent avec toi la charge du peuple et que tu ne la portes plus tout seul. '
  '18':
  - type: note
    content: 'Consacrez-vous  : cf. Ex 19.10ss,22 ; Jos 3.5 ; voir aussi 1Co 11.27-32. –  de la viande v. 4. –  pleuré en présence (litt. aux oreilles) du Seigneur  : cf. v. 1n.'
  - type: text
    content: 'Au peuple, tu diras : Consacrez-vous pour demain, et vous mangerez de la viande, puisque vous avez pleuré en présence du '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : « Qui nous donnera de la viande à manger ? Nous étions si bien en Egypte ! » Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donnera de la viande, et vous en mangerez. '
  '19':
  - type: text
    content: 'Vous en mangerez, non pas un jour, ni deux jours, ni cinq jours, ni dix jours, ni vingt jours, '
  '2':
  - type: text
    content: 'Le peuple cria vers Moïse. Moïse pria le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le feu s''apaisa. '
  '20':
  - type: note
    content: 'un mois  : litt. jusqu''à un mois de jours, cf. Ex 16.12. –  rejeté  : autre traduction méprisé.'
  - type: text
    content: 'mais un mois entier, jusqu''à ce qu''elle vous sorte par les narines et que vous l''ayez en dégoût, puisque vous avez rejeté le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui est parmi vous et que vous avez pleuré devant lui en disant : « Pourquoi donc sommes-nous sortis d''Egypte ? »'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'qui m''entoure  : litt. au sein duquel je suis . –  six cent mille  : cf. 1.46+ ; Ex 12.37.'
  - type: text
    content: 'Moïse dit : Le peuple qui m''entoure forme une infanterie de six cent mille hommes, et toi, tu as dit : « Je leur donnerai de la viande, et ils en mangeront un mois entier ! » '
  '22':
  - type: note
    content: Cf. 2R 4.43 ; Mt 14.17/ / ; 15.33/ /.
  - type: text
    content: 'Egorgera-t-on pour eux du petit bétail et du gros bétail, pour qu''ils en aient assez ? Rassemblera-t-on pour eux tous les poissons de la mer, pour qu''ils en aient assez ? '
  '23':
  - type: note
    content: 'Le bras du Seigneur serait-il trop court  : autre traduction la main… trop courte Es 50.2 ; 59.1.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit à Moïse : Le bras du '
  - type: text
    content: Seigneur
  - type: text
    content: ' serait-il trop court ? Tu verras maintenant si ce que je t''ai dit arrive ou non.'
  - type: heading
    content: Dieu communique son souffle aux soixante-dix anciens
  '24':
  - type: text
    content: ' '
  - type: note
    content: V. 16s.
  - type: text
    content: 'Moïse sortit dire au peuple les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il rassembla soixante-dix des anciens du peuple et les plaça, debout, autour de la tente. '
  '25':
  - type: note
    content: 'la nuée  : cf. 9.15+ ; 12.5 ; Ex 33.9 ; 34.5. –  souffle  : voir esprit. –  faire les prophètes  : le verbe hébreu correspondant, traditionnellement rendu par prophétiser, n''évoque sans doute pas ici un simple discours, mais un comportement insolite, une sorte de transe ou d''extase ; cf. v. 29+ ; 24.2s ; 1S 10.5-13 ; 18.10 ; 19.20-24 ; 1R 22.8nss ; 2R 2.9ss ; Jl 3.1 ; Ac 2.3. –  ils ne continuèrent pas  : autre traduction ils ne recommencèrent pas.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' descendit dans la nuée et lui parla ; il retira un peu du souffle qui était sur lui et le mit sur les soixante-dix anciens. Dès que le souffle se posa sur eux, ils se mirent à faire les prophètes ; mais ils ne continuèrent pas.'
  '26':
  - type: text
    content: 'Deux hommes, l''un nommé Eldad, l''autre Médad, étaient restés dans le camp ; le souffle se posa sur eux – ils étaient parmi les inscrits, mais ils n''étaient pas sortis vers la tente. Ils se mirent à faire les prophètes dans le camp. '
  '27':
  - type: note
    content: 'Un jeune homme  : litt. le jeune homme ou (autre sens possible du même mot) le serviteur.'
  - type: text
    content: 'Un jeune homme courut dire à Moïse : Eldad et Médad font les prophètes dans le camp ! '
  '28':
  - type: note
    content: 'Josué Ex 17.9+ ; Jos 1.1. –  empêche-les  : cf. Mc 9.38/ / ; 1Th 5.19.'
  - type: text
    content: 'Josué, fils de Noun, qui était auxiliaire de Moïse depuis sa jeunesse, s''écria : Moïse, mon seigneur, empêche-les ! '
  '29':
  - type: note
    content: 'Cf. v. 16s,25 ; Ex 19.6 ; Es 44.3 ; Jr 24.7 ; 31.33 ; Ez 11.19 ; 36.26s ; 39.29 ; Jl 3.1 ; Né 9.20 ; Ac 2.16ss ; 1Co 12.4ss ; 14.5 ; Ga 4.6 ; Ep 4.3s. –  jaloux  : le terme hébreu correspondant évoque la passion jalouse, dans un sens positif ou négatif ; cf. 5.14ss ; 25.11ss ; Ex 20.5n.'
  - type: text
    content: 'Moïse lui répondit : Tu es jaloux pour moi ? Ah ! si tout le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était composé de prophètes, si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mettait son souffle sur eux ! '
  '3':
  - type: note
    content: 'On appela  : litt. il appela (peut-être Moïse). –  s''était allumé  : hébreu ba‘ar, apparenté à Tabééra, nom qui est pris ici dans le sens d’« Incendie »  ; toutefois ce nom pourrait aussi signifier pâturage, car le verbe correspondant a également le sens de manger, brouter (Ex 22.4n) : cf. Dt 9.22s.'
  - type: text
    content: 'On appela ce lieu du nom de Tabééra (« Incendie »), parce que le feu du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''était allumé parmi eux.'
  - type: heading
    content: Le peuple réclame de la viande
  '30':
  - type: text
    content: Sur quoi Moïse se retira dans le camp, lui et les anciens d'Israël.
  - type: heading
    content: 'Qibroth-Taava : les cailles'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'un vent v. 17n,23 ; cf. Ex 10.13,19 ; 14.21 ; Ps 104.4. –  des cailles  : comme d''autres oiseaux migrateurs, elles arrivent souvent épuisées dans le désert après un voyage au-dessus de la mer  ; Ex 16.4n,6ss,13n  ; Ps 78.26ss ; 105.40n  ; cf. Sagesse 19.11s : « Ils virent une toute nouvelle génération d''oiseaux lorsque, poussés par le désir, ils réclamèrent des mets délicats et que, pour leur réconfort, des cailles montèrent de la mer. » –  une journée de marche  : autre traduction environ une journée de marche . –  deux coudées  : autre traduction environ deux coudées , c.-à-d. près d''un mètre ; voir mesures.'
  - type: text
    content: 'Il se leva un vent, venu du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui amena des cailles de la mer et les rabattit sur le camp et autour du camp, jusqu''à une journée de marche d''un côté et une journée de marche de l''autre côté. Il y en avait deux coudées au-dessus de la terre. '
  '32':
  - type: note
    content: 'chacun en ramassa…  : litt. celui qui en avait le moins en ramassa dix homers, soit environ 4 m3  ; cf. Ex 16.18. –  Ils les étendirent pour les faire sécher, afin de les conserver.'
  - type: text
    content: 'Pendant tout ce jour-là, toute la nuit et toute la journée du lendemain, le peuple ramassa les cailles ; chacun en ramassa au moins dix homers. Ils les étendirent autour du camp. '
  '33':
  - type: note
    content: 'un très grand fléau  : litt. un très grand coup, cf. 14.37 ; 17.11 ; Lv 26.21 ; Dt 28.59,61 ; 29.21 ; 1S 4.8,10 ; Ap 16.21 ; voir Ps 78.30s.'
  - type: text
    content: 'Comme la viande était encore entre leurs dents, avant qu''ils l''aient mâchée, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre le peuple ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa le peuple d''un très grand fléau. '
  '34':
  - type: note
    content: Qibroth-Taava est compris ici au sens de Tombeaux du désir (même mot au v. 4 et en Ps 78.30ns) ; cf. Nb 33.16s ; Dt 9.22.
  - type: text
    content: On appela ce lieu du nom de Qibroth-Taava (« Tombeaux du désir »), parce qu'on y ensevelit le peuple rempli de désir.
  - type: heading
    content: Miriam frappée de la « lèpre »
  '35':
  - type: text
    content: ' '
  - type: note
    content: Hatséroth signifie enclos (au pluriel) ; cette localité est inconnue ; 12.16 ; 33.17s ; Dt 1.1.
  - type: text
    content: De Qibroth-Taava le peuple partit pour Hatséroth ; il s'arrêta à Hatséroth.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 10.6. –  ramassis  : le terme hébreu correspondant, probablement péjoratif, n''apparaît qu''ici ; voir Ex 12.38n. –  au sein d''Israël  : litt. en son sein . –  désir ou convoitise , cf. v. 34n. –  les Israélites eux-mêmes  : autre traduction en outre, les Israélites… –  recommencèrent à pleurer  : cf. v. 1 ; Ex 16.2s ; LXX et Vg ont lu s''assirent et se lamentèrent  ; d''autres comprennent se mirent à pleurer à haute voix , cf. v. 18 ; 14.1 ; Jg 20.26n  ; Ps 137.1 ; Jb 2.12s ; Lm 2.10 ; Né 1.4. –  Qui nous donnera  : autre traduction ah ! si nous avions . –  de la viande  : cf. v. 18,21s ; Ex 16.3,8,12.'
  - type: text
    content: 'Le ramassis de gens qui se trouvait au sein d''Israël fut rempli de désir, et les Israélites eux-mêmes recommencèrent à pleurer ; ils disaient : Qui nous donnera de la viande à manger ? '
  '5':
  - type: note
    content: V. 18,20 ; 14.2ss ; 16.12ss ; 20.2ss ; 21.5 ; Ex 14.11 ; 16.3 ; 17.1ss.
  - type: text
    content: 'Nous nous souvenons des poissons que nous mangions pour rien en Egypte, des concombres, des melons, des poireaux, des oignons et de l''ail ! '
  '6':
  - type: note
    content: 'notre gosier…  : autre traduction nous sommes desséchés  ; cf. 21.5 ; voir Gn 1.20n.'
  - type: text
    content: 'Maintenant, notre gosier est desséché : plus rien ! Nos yeux ne voient que de la manne.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'la manne Ex 16.4n,13ss,31n  ; Dt 8.3 ; Ps 78.24s ; 105.40 ; Né 9.20. –  ressemblait à  : litt. (était) comme  ; LXX traduit au présent est comme . – Le bdellium est la gomme résineuse, jaunâtre, d''un arbre du Proche-Orient, cf. Gn 2.12n.'
  - type: text
    content: 'Or la manne ressemblait à de la graine de coriandre ; elle avait l''apparence du bdellium. '
  '8':
  - type: note
    content: 'au moulin  : le terme hébreu désigne le petit moulin à main, qui consistait en deux meules dont la plus petite tournait sur l''autre ; même terme en Ex 11.5 ; Dt 24.6n  ; Es 47.2 ; Jr 25.10.'
  - type: text
    content: 'Le peuple se dispersait pour la recueillir ; on la broyait au moulin ou on la pilait dans un mortier ; on la faisait cuire dans une marmite ou on en faisait des galettes. Elle avait le goût d''un biscuit à l''huile. '
  '9':
  - type: note
    content: rosée Ex 16.13.
  - type: text
    content: Quand la rosée descendait sur le camp, la nuit, la manne y descendait aussi.
