  - type: text
    text: 'Le peuple se dispersait pour la recueillir ; on la broyait au moulin ou on la pilait dans un mortier ; on la faisait cuire dans une marmite ou on en faisait des galettes. Elle avait le goût d''un biscuit à l''huile. '
