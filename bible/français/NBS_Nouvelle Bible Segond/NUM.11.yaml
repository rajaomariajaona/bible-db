  - type: text
    text: 'Le ramassis de gens qui se trouvait au sein d''Israël fut rempli de désir, et les Israélites eux-mêmes recommencèrent à pleurer ; ils disaient : Qui nous donnera de la viande à manger ? '
  - type: usfm
