      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Josué '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 17.9+ ; Jos 1.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: empêche-les
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 9.38/ / ; 1Th 5.19.'
    marker-yv: yv-n
  - type: text
    text: 'Josué, fils de Noun, qui était auxiliaire de Moïse depuis sa jeunesse, s''écria : Moïse, mon seigneur, empêche-les ! '
  - type: usfm
    marker: v
    metadata:
