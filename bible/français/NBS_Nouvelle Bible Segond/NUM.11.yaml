    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 16s,25 ; Ex 19.6 ; Es 44.3 ; Jr 24.7 ; 31.33 ; Ez 11.19 ; 36.26s ; 39.29 ; Jl 3.1 ; Né 9.20 ; Ac 2.16ss ; 1Co 12.4ss ; 14.5 ; Ga 4.6 ; Ep 4.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jaloux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu correspondant évoque '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la passion jalouse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dans un sens positif ou négatif ; cf. 5.14ss ; 25.11ss ; Ex 20.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse lui répondit : Tu es jaloux pour moi ? Ah ! si tout le peuple du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' était composé de prophètes, si le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' mettait son souffle sur eux ! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Sur quoi Moïse se retira dans le camp, lui et les anciens d'Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Qibroth-Taava : les cailles'
