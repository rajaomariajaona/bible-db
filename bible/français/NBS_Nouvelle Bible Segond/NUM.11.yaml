          text: n
      - type: text
        text: '  ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.11s : « Ils virent une toute nouvelle génération d''oiseaux lorsque, poussés par le désir, ils réclamèrent des mets délicats et que, pour leur réconfort, des cailles montèrent de la mer. » –  '
    - type: usfm
      marker: fq
      children:
