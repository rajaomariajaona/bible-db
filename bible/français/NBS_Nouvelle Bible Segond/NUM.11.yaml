        text: la nuée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.15+ ; 12.5 ; Ex 33.9 ; 34.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: souffle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'faire les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu correspondant, traditionnellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prophétiser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', n''évoque sans doute pas ici un simple discours, mais un comportement insolite, une sorte de transe ou d''extase ; cf. v. 29+ ; 24.2s ; 1S 10.5-13 ; 18.10 ; 19.20-24 ; 1R 22.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss ; 2R 2.9ss ; Jl 3.1 ; Ac 2.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils ne continuèrent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils ne recommencèrent pas.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' descendit dans la nuée et lui parla ; il retira un peu du souffle qui était sur lui et le mit sur les soixante-dix anciens. Dès que le souffle se posa sur eux, ils se mirent à faire les prophètes ; mais ils ne continuèrent pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Deux hommes, l''un nommé Eldad, l''autre Médad, étaient restés dans le camp ; le souffle se posa sur eux – ils étaient parmi les inscrits, mais ils n''étaient pas sortis vers la tente. Ils se mirent à faire les prophètes dans le camp. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un jeune homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le jeune homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou (autre sens possible du même mot) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le serviteur.
    marker-yv: yv-n
  - type: text
    text: 'Un jeune homme courut dire à Moïse : Eldad et Médad font les prophètes dans le camp ! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
