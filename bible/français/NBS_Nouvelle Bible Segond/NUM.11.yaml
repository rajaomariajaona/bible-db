    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils les étendirent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pour les faire sécher, afin de les conserver.
    marker-yv: yv-n
  - type: text
    text: 'Pendant tout ce jour-là, toute la nuit et toute la journée du lendemain, le peuple ramassa les cailles ; chacun en ramassa au moins dix homers. Ils les étendirent autour du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un très grand fléau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un très grand coup
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 14.37 ; 17.11 ; Lv 26.21 ; Dt 28.59,61 ; 29.21 ; 1S 4.8,10 ; Ap 16.21 ; voir Ps 78.30s.'
    marker-yv: yv-n
  - type: text
    text: 'Comme la viande était encore entre leurs dents, avant qu''ils l''aient mâchée, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se mit en colère contre le peuple ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' frappa le peuple d''un très grand fléau. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qibroth-Taava '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est compris ici au sens de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tombeaux du désir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même mot au v. 4 et en Ps 78.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s) ; cf. Nb 33.16s ; Dt 9.22.
    marker-yv: yv-n
  - type: text
    text: On appela ce lieu du nom de Qibroth-Taava (« Tombeaux du désir »), parce qu'on y ensevelit le peuple rempli de désir.
