      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chacun en ramassa…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui en avait le moins en ramassa dix homers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit environ 4 m'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '3'
      - type: text
