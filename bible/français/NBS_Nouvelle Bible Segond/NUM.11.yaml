      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il se leva un vent, venu du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui amena des cailles de la mer et les rabattit sur le camp et autour du camp, jusqu''à une journée de marche d''un côté et une journée de marche de l''autre côté. Il y en avait deux coudées au-dessus de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
