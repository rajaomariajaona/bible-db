        text: une journée de marche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: environ une journée de marche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
