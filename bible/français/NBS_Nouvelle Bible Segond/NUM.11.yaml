        text: des cailles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : comme d''autres oiseaux migrateurs, elles arrivent souvent épuisées dans le désert après un voyage au-dessus de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mer
    - type: usfm
