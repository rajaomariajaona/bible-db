  - type: text
    text: 'Ordre donné par Jérémie, le prophète, à Seraya, fils de Nériya, fils de Mahséya, lorsqu''il se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année du règne de celui-ci – Seraya était grand intendant. '
