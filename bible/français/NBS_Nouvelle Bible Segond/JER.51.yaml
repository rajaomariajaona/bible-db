document_id: JER.51,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: J'éveille 6.22+ ; 25.32. –  Leb-Qamaï , traditionnellement interprété le cœur de mes adversaires , est un cryptogramme de Chaldéens selon le procédé utilisé en 25.26n  ; LXX Chaldée . –  un vent ou un souffle, un esprit , même mot en hébreu ; cf. 4.11 ; voir aussi 25.32.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: J'éveille contre Babylone
  - type: text
    content: et contre les habitants de Leb-Qamaï
  - type: text
    content: un vent destructeur.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fait apparaître  : litt. fait sortir  ; cf. Ps 37.6. –  notre justice  : litt. nos justices , pluriel souvent traduit par ce qui est fait pour la justice (Jg 5.11n  ; 1S 12.7 ; Es 33.15n  ; Ez 3.20+ ; Mi 6.5 ; Ps 103.6n  ; Dn 9.16,18) ; LXX sa justice  ; cf. 23.6+. –  venez, racontons…  : cf. 50.2,28 ; Ps 9.15 ; 73.28.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait apparaître notre justice ;'
  - type: text
    content: venez, racontons dans Sion
  - type: text
    content: 'l''œuvre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'flèches 50.14+. –  remplissez les carquois  : autre traduction préparez les boucliers (même terme en 2S 8.7n) ; cf. 46.3. –  a éveillé…  : cf. v. 1n  ; 6.22+ ; Esd 1.1n  ; 1Ch 5.26 ; 2Ch 21.16. –  des rois  : LXX du roi , de même au v. 28. – La Médie (25.25 ; Gn 10.2n) avait contribué à la chute de l''Assyrie en 612 av. J.-C. ; cf. v. 27n  ; Es 13.17n-19. –  vengeance 50.15+.'
  - type: text
    content: Aiguisez les flèches,
  - type: text
    content: remplissez les carquois !
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a éveillé l''esprit des rois de Médie,'
  - type: text
    content: parce qu'il a pris la décision de détruire Babylone ;
  - type: text
    content: 'car c''est la vengeance du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: la vengeance de son temple.
  '12':
  - type: text
    content: ' '
  - type: note
    content: bannière v. 27+. –  ce que le Seigneur a décidé… v. 11 ; cf. 50.45+.
  - type: text
    content: Dressez une bannière contre les murailles de Babylone !
  - type: text
    content: Renforcez la garde,
  - type: text
    content: postez des sentinelles,
  - type: text
    content: placez des embuscades !
  - type: text
    content: 'Car ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a décidé, il le fait'
  - type: text
    content: – ce qu'il a décrété contre les habitants de Babylone.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'près des grandes eaux v. 36 ; Ap 17.1,15. –  à la mesure de ton avidité  : litt. la coudée (voir mesures) de ta portion (ou de ton gain ), ce dernier terme étant apparenté au verbe traduit par enrouler ou trancher (un ouvrage tissé sur un métier) en Es 38.12n  ; comme dans ce dernier texte, certains voient en filigrane ici l''image de la durée de la vie mesurée par Dieu ; cf. Mt 6.27 ; Lc 12.20s ; Jc 5.1-5.'
  - type: text
    content: Toi qui demeures près des grandes eaux
  - type: text
    content: et qui as d'immenses trésors,
  - type: text
    content: ta fin est venue, à la mesure de ton avidité !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'par lui-même  : litt. par son être ou par sa vie  ; cf. 22.5+ ; Gn 1.20n. –  cris de vendange  : il s''agit ici de cris de guerre ; cf. 48.33n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées l''a juré par lui-même :'
  - type: text
    content: Oui, je te remplirai d'hommes comme si c'étaient des criquets,
  - type: text
    content: et ils pousseront contre toi des cris de vendange.
  - type: heading
    content: Le créateur du monde et les idoles
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.12-16 et notes.
  - type: text
    content: Il fait la terre par sa puissance,
  - type: text
    content: il met en place le monde par sa sagesse,
  - type: text
    content: il a déployé le ciel par son intelligence.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'les eaux s''amassent  : litt. multitude (ou tumulte ) d''eaux  ; cf. v. 42. –  des extrémités  : litt. de l''extrémité.'
  - type: text
    content: Lorsqu'il fait entendre sa voix,
  - type: text
    content: les eaux s'amassent dans le ciel ;
  - type: text
    content: il fait monter les nuages des extrémités de la terre,
  - type: text
    content: il produit les éclairs pour la pluie,
  - type: text
    content: il fait sortir le vent de ses réserves.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'souffle  : voir esprit.'
  - type: text
    content: Ils sont tous trop abrutis pour savoir ;
  - type: text
    content: tout orfèvre est honteux de sa statue ;
  - type: text
    content: car ses idoles ne sont que mensonge,
  - type: text
    content: il n'y a pas de souffle en elles.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'au temps où…  : cf. 6.15n.'
  - type: text
    content: Elles ne sont que futilité,
  - type: text
    content: œuvre ridicule ;
  - type: text
    content: elles disparaîtront
  - type: text
    content: au temps où ils rendront des comptes.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'notamment la tribu  : litt. lui et la tribu  ; ou, d''après plusieurs mss et 10.16n, Israël est la tribu…'
  - type: text
    content: Celui qui est la part de Jacob n'est pas comme elles ;
  - type: text
    content: car c'est lui qui façonne tout,
  - type: text
    content: notamment la tribu qui constitue son patrimoine.
  - type: text
    content: 'Son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: La fin de Babylone
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'des étrangers  : plusieurs versions anciennes ont compris des vanneurs  ; le terme fait assonance avec le verbe traduit par disséminer (ou vanner , cf. v. 11 ; 4.11n  ; 15.7n  ; 49.32+).'
  - type: text
    content: J'envoie contre Babylone des étrangers qui la dissémineront,
  - type: text
    content: qui videront son pays ;
  - type: text
    content: car ils fondront sur elle de toutes parts
  - type: text
    content: au jour du malheur.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'une masse d''armes  : litt. une masse (terme dérivé du verbe traduit plus loin par mettre en pièces  ; cf. 22.28n) , des armes (le terme a aussi le sens très général d’ objets ) de guerre  ; cf. 50.23 ; des termes voisins de celui qui est rendu ici par masse sont traduits par massue en Pr 25.18n et par massacre en Ez 9.2n.'
  - type: text
    content: Tu as été pour moi une masse d'armes.
  - type: text
    content: Avec toi j'ai mis en pièces des nations,
  - type: text
    content: avec toi j'ai détruit des royaumes,
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. 50.37n  ; Na 2.4.
  - type: text
    content: avec toi j'ai mis en pièces le cheval et son cavalier ;
  - type: text
    content: avec toi j'ai mis en pièces le char et celui qui le monte,
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 13.18 ; Lm 2.21 ; 2Ch 36.17. –  jeune fille  : litt. vierge.'
  - type: text
    content: avec toi j'ai mis en pièces l'homme et la femme,
  - type: text
    content: avec toi j'ai mis en pièces le vieillard et l'enfant ;
  - type: text
    content: avec toi j'ai mis en pièces le jeune homme et la jeune fille ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: les gouverneurs et les magistrats v. 28.
  - type: text
    content: avec toi j'ai mis en pièces le berger et son troupeau ;
  - type: text
    content: avec toi j'ai mis en pièces le laboureur et son attelage ;
  - type: text
    content: avec toi j'ai mis en pièces les gouverneurs et les magistrats.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 50.29+.
  - type: text
    content: Je paierai de retour Babylone
  - type: text
    content: et tous les habitants de la Chaldée
  - type: text
    content: pour tout le mal qu'ils ont fait à Sion sous vos yeux
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''oppose… 50.31+. –  mont de la Destruction ou du Destructeur  ; LXX détruite  ; cf. 2R 23.13n. –  qui détruisais…  : cf. Ap 11.18. –  J''étendrai… 6.12+. –  montagne embrasée ou brûlée (le même terme décrit la cuisson des briques au feu en Gn 11.3n) ; cf. Ap 8.7s ; 18.9.'
  - type: text
    content: Je m'oppose à toi, mont de la Destruction,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: toi qui détruisais toute la terre !
  - type: text
    content: J'étendrai la main sur toi,
  - type: text
    content: je te roulerai du haut des rochers
  - type: text
    content: et je ferai de toi une montagne embrasée.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 28.16.
  - type: text
    content: On ne tirera de toi ni pierres d'angle,
  - type: text
    content: ni pierres de fondation ;
  - type: text
    content: car tu seras dévastée pour toujours
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Dressez une bannière… v. 12 ; 4.5s. –  Consacrez 6.4n. –  les royaumes (du nord), 50.3+,9+ : ceux qui sont cités ici sont les anciens alliés de l''Assyrie qui, aux côtés des Mèdes (v. 11n,28), s''étaient retournés contre elle lors de l''effondrement de son empire : Ararat ou l''Arménie  ; cf. Gn 8.4n  ; Minni ou les Mannéens , dans le nord-ouest de l''Iran actuel ; Ashkenaz ou les Scythes, Gn 10.3n. –  des officiers  : transcription en hébreu d''un terme akkadien, proprement scribe sur tablette  ; autre traduction recruteurs  ; le même terme revient en Na 3.17n. –  comme des criquets  : cf. 46.23.'
  - type: text
    content: Dressez une bannière dans le pays !
  - type: text
    content: Sonnez de la trompe parmi les nations !
  - type: text
    content: Consacrez contre elle des nations,
  - type: text
    content: appelez contre elle les royaumes
  - type: text
    content: d'Ararat, de Minni et d'Ashkenaz !
  - type: text
    content: Nommez contre elle des officiers !
  - type: text
    content: Faites avancer les chevaux comme des criquets qui se hérissent !
  '28':
  - type: text
    content: ' '
  - type: note
    content: rois de Médie v. 11n. –  gouverneurs / magistrats v. 23.
  - type: text
    content: Consacrez contre elle des nations,
  - type: text
    content: avec les rois de Médie,
  - type: text
    content: ses gouverneurs et tous ses magistrats
  - type: text
    content: et tout le pays qu'ils dirigent !
  '29':
  - type: text
    content: ' '
  - type: note
    content: La terre a tremblé 50.46+. –  le plan , d'après certains mss hébreux et des versions anciennes ; autre lecture traditionnelle les plans v. 11 ; 50.45+. –  lieu dévasté 9.10 ; 50.3+.
  - type: text
    content: La terre a tremblé, elle s'est ébranlée
  - type: text
    content: 'lorsque le plan du '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre Babylone s''est réalisé,'
  - type: text
    content: réduisant le pays de Babylone en un lieu dévasté, sans habitants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Que l''on tende l''arc…  : texte obscur et traduction conjecturale ; d''après des versions anciennes, on a aussi compris  : que l''archer ne bande pas son arc, qu''il ne se dresse pas dans sa cuirasse  ; cf. 50.14+. –  N''épargnez… 13.14+. –  anathème 50.21+.'
  - type: text
    content: Que l'on tende l'arc contre celui qui tend son arc,
  - type: text
    content: contre celui qui fait le fier dans sa cuirasse !
  - type: text
    content: N'épargnez aucun de ses jeunes gens !
  - type: text
    content: Frappez toute son armée d'anathème !
  '30':
  - type: text
    content: ' '
  - type: note
    content: 50.37+. –  brisé ses verrous Es 45.2 ; Ps 107.16.
  - type: text
    content: Les guerriers de Babylone ont cessé de combattre,
  - type: text
    content: ils sont restés dans les forteresses ;
  - type: text
    content: leur vaillance est oubliée,
  - type: text
    content: ils sont devenus des femmes.
  - type: text
    content: On a mis le feu à ses demeures,
  - type: text
    content: on a brisé ses verrous.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'courrier (litt. coureur  ; cf. Est 3.13,15 ; 2Ch 30.6n) / messager  : cf. Jb 1.14-19. –  sa ville est prise 50.2+. –  d''une extrémité à l''autre 50.26n.'
  - type: text
    content: Un courrier court à la rencontre d'un autre courrier,
  - type: text
    content: un messager à la rencontre d'un autre messager,
  - type: text
    content: pour annoncer au roi de Babylone
  - type: text
    content: que sa ville est prise d'une extrémité à l'autre,
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'passages (ou gués ) / marais (ou roseaux  : le même mot est traduit par étangs en Ex 7.19) correspondent au réseau de canaux et de lacs artificiels qui entourait et protégeait Babylone.'
  - type: text
    content: que les passages sont occupés,
  - type: text
    content: les marais embrasés par le feu
  - type: text
    content: et les hommes de guerre saisis d'épouvante.
  - type: heading
    content: Dieu se charge de venger son peuple
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Babylone la belle  : litt. la fille de Babylone 50.42n. –  au temps où on la foule  : cf. Es 21.10 ; ici il s''agit peut-être, non pas de battre le blé, mais de préparer l''aire de battage en la foulant pour l''aplanir avant le temps de la moisson  ; cf. Os 6.11 ; Jl 4.13 ; Mt 3.12/ / ; Ap 14.15.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël :'
  - type: text
    content: Babylone la belle est comme une aire au temps où on la foule ;
  - type: text
    content: encore un peu,
  - type: text
    content: et le temps de la moisson sera venu pour elle.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'm''a dévorée…  : autre lecture traditionnelle nous a dévorés , et ainsi de suite ; cf. 50.7+. –  aspirée ou vidée , traduction incertaine ; ce sens du verbe n''apparaît qu''ici, mais un homonyme ( ?) est habituellement traduit par frapper de panique Ex 14.24 ; 23.27 etc. –  dragon  : même terme en Gn 1.21n ( monstre marin ) ; Ex 7.9 ( reptile ) ; Dt 32.33 ; Es 27.1n  ; Jb 7.12. –  engloutie v. 44n. –  il m''a bannie  : autre lecture traditionnelle il m''a nettoyée (cf. Es 4.4 ; Ez 40.38 ; 2Ch 4.6).'
  - type: text
    content: Nabuchodonosor, roi de Babylone,
  - type: text
    content: m'a dévorée, m'a aspirée ;
  - type: text
    content: il a fait de moi un récipient vide ;
  - type: text
    content: tel le dragon, il m'a engloutie,
  - type: text
    content: il a rempli sa panse de ce que j'avais de précieux ;
  - type: text
    content: il m'a bannie.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'la violence qui m''a été faite  : litt. ma violence et ma chair  ; LXX mes violences et mes dévastations (c.-à-d. celles que j''ai subies) ; cf. 6.7 ; 20.8. –  habitante 21.13n. –  mon sang  : cf. Lv 20.9,11-13,27 ; 2S 3.29 ; 16.8 ; 1R 2.32,33,37 ; Mt 27.25.'
  - type: text
    content: Que la violence qui m'a été faite soit sur Babylone !
  - type: text
    content: dit l'habitante de Sion.
  - type: text
    content: Que mon sang soit sur les habitants de la Chaldée !
  - type: text
    content: dit Jérusalem.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Je défendrai ta cause 50.34. –  je te vengerai 50.15+ ; cf. 11.20+. –  la mer de Babylone  : litt. sa mer (à elle) v. 13 ; 50.38 ; cf. 51.42 ; Es 19.5 ; 44.27 ; Ap 16.12. –  sa source  : cf. 2.13+ ; Os 13.15.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je défendrai ta cause,
  - type: text
    content: je te vengerai !
  - type: text
    content: Je mettrai à sec la mer de Babylone,
  - type: text
    content: et j'assécherai sa source.
  '37':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.10+ ; 50.3+ ; Es 25.2. –  sifflement 18.16n  ; 19.8 ; 50.13.
  - type: text
    content: Babylone sera un tas de pierres,
  - type: text
    content: un repaire de chacals,
  - type: text
    content: un lieu dévasté, un objet de sifflement d'horreur ;
  - type: text
    content: il n'y aura plus d'habitants.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Ils rugissent  : il s''agit sans doute des habitants de Babylone, 2.15+ ; Ps 104.21.'
  - type: text
    content: Ils rugissent ensemble comme de jeunes lions,
  - type: text
    content: ils grondent comme les petits d'une lionne.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'échauffés Os 7.7. –  je les enivrerai v. 7,57 ; 13.13+ ; 25.15+ss ; 48.26. –  qu''ils soient gais  : des versions anciennes ont compris qu''ils défaillent , c.-à-d. qu''ils tombent ivres morts. –  qu''ils ne se réveillent plus  : cf. v. 64 ; 25.27 ; cf. Na 3.18 ; Ps 76.6.'
  - type: text
    content: Quand ils seront échauffés,
  - type: text
    content: je préparerai leurs banquets
  - type: text
    content: et je les enivrerai,
  - type: text
    content: pour qu'ils soient gais,
  - type: text
    content: qu'ils s'endorment d'un sommeil éternel,
  - type: text
    content: et qu'ils ne se réveillent plus
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'blessés à mort ou victimes , cf. v. 47,49,52 ; 25.33n  ; voir Ez 21.19n. –  dans les rues de Babylone  : litt. dans ses rues (à elle) ; cf. 50.30.'
  - type: text
    content: Qu'ils tombent blessés à mort au pays des Chaldéens,
  - type: text
    content: transpercés dans les rues de Babylone.
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'comme des jeunes béliers  : cf. 11.19 ; Es 34.6n  ; 53.7. –  à l''abattoir 48.15+.'
  - type: text
    content: Je les ferai descendre comme des jeunes béliers à l'abattoir,
  - type: text
    content: comme des béliers et des boucs.
  - type: heading
    content: Lamentation sur Babylone
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Comment ! cf. Lm 1.1n. –  Shéshak ou Babel, 25.26n. –  La louange…  : cf. 48.2,17 ; Es 13.19.'
  - type: text
    content: Comment ! Shéshak est prise !
  - type: text
    content: La louange de toute la terre est enlevée !
  - type: text
    content: Comment ! Babylone est dévastée parmi les nations !
  '42':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 13,36 ; 46.7+ ; voir aussi Es 17.12 ; Na 2.7 ; Ps 65.8. –  de la multitude ou du tumulte  ; cf. v. 16n.
  - type: text
    content: La mer a envahi Babylone,
  - type: text
    content: elle l'a couverte de la multitude de ses flots.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 37 ; 2.6 ; 50.12,40 ; Es 6.11 ; Ez 33.28.
  - type: text
    content: Ses villes sont dévastées ;
  - type: text
    content: c'est un pays desséché, une plaine aride ;
  - type: text
    content: c'est un pays où personne n'habite,
  - type: text
    content: où ne passe aucun être humain.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte joue sur l''assonance de Bel (50.2n) et de Babylone (hébreu Babel ). –  ce qu''il a englouti v. 34 ; cf. Esd 1.7 ; cf. Daniel grec 14, où la non-divinité de Bel est démasquée par son incapacité d''absorber de la nourriture, et où le dragon qui lui est associé meurt de ce que Daniel lui a fait avaler. –  les nations  : cf. Es 2.2-5. –  La muraille (v. 58 ; 50.15) …  : le texte correspondant, jusqu''à la première partie du v. 49, est omis par LXX.'
  - type: text
    content: Je ferai rendre des comptes à Bel dans Babylone,
  - type: text
    content: j'arracherai de sa bouche ce qu'il a englouti,
  - type: text
    content: et les nations n'afflueront plus vers lui.
  - type: text
    content: La muraille même de Babylone est tombée !
  '45':
  - type: text
    content: ' '
  - type: note
    content: V. 6,9 ; 50.8+ ; Ap 18.4. –  colère ardente 4.8+.
  - type: text
    content: Sortez du milieu d'elle, mon peuple,
  - type: text
    content: et que chacun sauve sa vie,
  - type: text
    content: 'loin de la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 24.6. –  chef contre chef  : autre traduction un chef après l''autre (30.21n).'
  - type: text
    content: de peur que votre cœur ne mollisse et que vous ne preniez peur à cause des rumeurs qu'on entendra dans le pays. Car cette année, ce sera une rumeur, et l'année suivante une autre rumeur ; violence dans le pays, chef contre chef !
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. V. 52. –  statues 50.2,38. –  les victimes  : litt. ses transpercés  ; v. 4+ ; cf. 49.26.'
  - type: text
    content: C'est pourquoi les jours viennent
  - type: text
    content: où je ferai rendre des comptes aux statues de Babylone,
  - type: text
    content: et tout son pays aura honte ;
  - type: text
    content: toutes les victimes tomberont au milieu d'elle.
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 44.23 ; Ap 18.20. –  du nord 50.3+. –  ceux qui ravagent tout  : litt. les ravageurs , de même au v. 56 (au singulier) ; autre traduction les pillards (Ab 5n).'
  - type: text
    content: Sur Babylone retentiront les cris de joie du ciel et de la terre,
  - type: text
    content: et de tout ce qui s'y trouve ;
  - type: text
    content: car, du nord, ceux qui ravagent tout viendront sur elle
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '49':
  - type: text
    content: ' '
  - type: note
    content: Traduction incertaine ; quelques-uns pensent qu'une erreur de scribe a fait disparaître une lettre et qu'il faut lire Babylone doit tomber pour les victimes (v. 4+) d'Israël (c.-à-d., sans doute, les victimes israélites ) ; cf. v. 24,35. –  de toute la terre ou de tout le pays  ; cf. Ap 18.24.
  - type: text
    content: Babylone aussi doit tomber, ô victimes d'Israël,
  - type: text
    content: comme par Babylone sont tombées les victimes de toute la terre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ne sont pas veufs  : cf. 2.2+ ; Es 54.4-8. Parce que le verbe et son complément sont au singulier (litt. n''est pas veuf de son Dieu ), certains pensent que les mots et Juda étaient absents du texte original. –  bien que leur pays…  : cette phrase pourrait être rattachée aux v. précédents et se référer à Babylone ; il faudrait alors traduire car leur pays… –  rempli de torts cf. 2.3n. –  Saint d''Israël 50.29+.'
  - type: text
    content: Car Israël et Juda ne sont pas veufs de leur Dieu,
  - type: text
    content: 'du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: bien que leur pays soit rempli de torts
  - type: text
    content: envers le Saint d'Israël.
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'échappé à l''épée 44.28. –  souvenez-vous…  : autres traductions évoquez le nom du Seigneur  ; invoquez le Seigneur  ; cf. Za 10.9 ; Ps 42.7n. –  vous vienne au cœur  : comme en 3.16n  ; cf. Ps 137.5.'
  - type: text
    content: Allez, vous qui avez échappé à l'épée, ne vous arrêtez pas !
  - type: text
    content: 'De loin souvenez-vous du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et que Jérusalem vous vienne au cœur !
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'les outrages 6.10n. –  les sanctuaires  : cf. 17.12 ; Lv 21.23n  ; Es 63.18 ; Ps 74.3 ; 79.1 ; Lm 1.10.'
  - type: text
    content: Nous avions honte
  - type: text
    content: quand nous entendions les outrages ;
  - type: text
    content: la confusion couvrait nos visages,
  - type: text
    content: quand des étrangers sont venus
  - type: text
    content: 'dans les sanctuaires de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '52':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 47+. –  les victimes (v. 4+) soupireront Jb 24.12.
  - type: text
    content: C'est pourquoi les jours viennent
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: où je ferai rendre des comptes à ses statues ;
  - type: text
    content: et dans tout son pays les victimes soupireront.
  '53':
  - type: text
    content: ' '
  - type: note
    content: Cf. 49.16 ; Es 14.13 ; Jb 20.6s.
  - type: text
    content: Quand Babylone s'élèverait jusqu'au ciel,
  - type: text
    content: quand elle rendrait inaccessibles ses hautes forteresses,
  - type: text
    content: on viendra la ravager de ma part
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: …
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'Des cris se font entendre  : litt. bruit (mot traduit par voix dans la suite) d''un cri . –  fracas 50.22+.'
  - type: text
    content: Des cris se font entendre de Babylone,
  - type: text
    content: et un grand fracas du pays des Chaldéens.
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'la grande voix ou le grand bruit . –  ses flots…  : cf. 6.23 ; 50.42 ; Es 17.12. –  leur mugissement  : litt. le mugissement de leur voix (ou de leur bruit ).'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ravage Babylone,'
  - type: text
    content: il en fait taire la grande voix ;
  - type: text
    content: ses flots grondent comme de grandes eaux
  - type: text
    content: qui font retentir leur mugissement.
  '56':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui ravage tout v. 48n. –  un Dieu qui règle ses comptes  : litt. un Dieu (hébreu ’El , cf. Gn 21.33n) de rétributions  ; cf. 16.18n  ; 50.29+ ; Es 59.18 ; 66.6.'
  - type: text
    content: Oui, celui qui ravage tout vient contre elle, contre Babylone ;
  - type: text
    content: ses guerriers sont pris,
  - type: text
    content: leurs arcs sont brisés.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un Dieu qui règle ses comptes,'
  - type: text
    content: il paie de retour.
  '57':
  - type: text
    content: ' '
  - type: note
    content: V. 39+. –  déclaration du roi… 46.18+.
  - type: text
    content: 'J''enivrerai ses princes et ses sages, ses gouverneurs, ses magistrats et ses guerriers ; ils s''endormiront d''un sommeil éternel et ne se réveilleront plus – déclaration du roi, dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '58':
  - type: note
    content: 'murailles v. 44 ; 50.15. –  les peuples se fatiguent pour rien… Ha 2.13 ; cf. Siracide 14.19 : « Toute œuvre corruptible disparaît, et celui qui l''a produite s''en va avec elle. » –  et ils s''épuisent  : cf. v. 64n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Les épaisses murailles de Babylone
  - type: text
    content: seront complètement démantelées,
  - type: text
    content: ses hautes portes seront détruites par le feu ;
  - type: text
    content: les peuples se fatiguent pour rien,
  - type: text
    content: les nations pour du feu – et ils s'épuisent.
  - type: heading
    content: Le livre jeté dans l'Euphrate
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.1+ss. –  Seraya, fils de Nériya…  : à ne pas confondre avec celui de 40.8 ; il s''agit ici du frère de Baruch, cf. 32.12+. –  avec Sédécias  : LXX de la part de Sédécias 1.3n. –  la quatrième année… ≈ 594 av. J.-C., soit plus de cinquante ans avant la prise de Babylone par Cyrus le Grand (539) ; cf. 28.1. –  grand intendant  : litt. prince (ou chef ) du repos , peut-être au sens d''intendant militaire ; LXX chef du don , ce qui pourrait signifier responsable du tribut (versé par Juda à Babylone) ; Vg a traduit chef de la prophétie (d''après l''interprétation rabbinique du terme correspondant à repos , au sens d''inspiration prophétique – mais cette interprétation n''a guère de rapport avec le présent contexte).'
  - type: text
    content: 'Ordre donné par Jérémie, le prophète, à Seraya, fils de Nériya, fils de Mahséya, lorsqu''il se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année du règne de celui-ci – Seraya était grand intendant. '
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Fuyez v. 45 ; 50.8+. –  dans sa faute  : cf. Gn 19.15nss ; Ap 18.4. –  vengeance 50.15+. –  la payer de retour… 16.18n  ; 50.29+.'
  - type: text
    content: Fuyez de Babylone ! Que chacun sauve sa vie !
  - type: text
    content: Ne soyez pas réduits au silence dans sa faute !
  - type: text
    content: 'Car c''est un temps de vengeance pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il va la payer de retour comme elle le mérite !
  '60':
  - type: note
    content: 30.2+.
  - type: text
    content: 'Jérémie écrivit dans un livre tout le malheur qui devait arriver à Babylone, toutes ces paroles qui sont écrites sur Babylone. '
  '61':
  - type: note
    content: 'tu veilleras  : litt. tu verras.'
  - type: text
    content: 'Jérémie dit à Seraya : Lorsque tu arriveras à Babylone, tu veilleras à lire toutes ces paroles '
  '62':
  - type: note
    content: qu'il soit dévasté, d'après des versions anciennes ; l'hébreu a ici le pluriel qu'ils soient dévastés  ; cf. v. 26 ; 25.12 ; 50.3+.
  - type: text
    content: 'et tu diras : «  '
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est toi-même qui as parlé sur ce lieu pour qu''il soit retranché et qu''il ne soit plus habité par les humains ni par les bêtes, mais qu''il soit dévasté pour toujours. » '
  '63':
  - type: note
    content: Cf. 13.4s ; Ap 18.21.
  - type: text
    content: 'Quand tu auras achevé la lecture de ce livre, tu y attacheras une pierre et tu le jetteras au milieu de l''Euphrate, '
  '64':
  - type: note
    content: 'elle ne se relèvera pas 50.32. –  Et ils s''épuisent  : le terme correspondant est identique au dernier mot du v. 58 ; la phrase là prennent fin (litt. jusqu''ici, 48.47n) les paroles de Jérémie est probablement à comprendre comme une note éditoriale indiquant qu''un état antérieur du livre prenait fin au v. 58 ; toute la fin du v. est omise par LXX.'
  - type: text
    content: 'puis tu diras : « Ainsi Babylone sera submergée, elle ne se relèvera pas du malheur que j''amènerai sur elle. »'
  - type: text
    content: '— « Et ils s''épuisent » : là prennent fin les paroles de Jérémie.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 39 ; 25.15+ss ; Ps 75.9 ; Ap 14.8 ; 17.2,4 ; 18.3.
  - type: text
    content: 'Babylone était dans la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' une coupe d''or,'
  - type: text
    content: qui enivrait toute la terre ;
  - type: text
    content: les nations ont bu de son vin ;
  - type: text
    content: c'est pourquoi les nations ont perdu la tête.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Babylone est tombée Es 21.9 ; Ap 18.2,9. –  baume 8.22n.
  - type: text
    content: Tout à coup Babylone est tombée, elle est brisée !
  - type: text
    content: 'Hurlez sur elle, prenez du baume pour sa plaie :'
  - type: text
    content: peut-être guérira-t-elle.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'elle n''a pas guéri  : cf. 15.18+ ; 46.11. –  chacun dans son pays 50.16+. –  son jugement  : on peut comprendre ou bien son cas , c.-à-d. la somme des charges qui pèsent contre elle, ou bien son châtiment  ; cf. Ap 18.5. –  s''élève jusqu''aux nues  : cf. Ps 36.6 ; 57.11 ; 108.5 ; voir aussi Jon 1.2.'
  - type: text
    content: Nous avons voulu guérir Babylone,
  - type: text
    content: mais elle n'a pas guéri.
  - type: text
    content: Abandonnons-la
  - type: text
    content: et allons-nous-en chacun dans son pays ;
  - type: text
    content: car son jugement atteint jusqu'au ciel
  - type: text
    content: et s'élève jusqu'aux nues.
