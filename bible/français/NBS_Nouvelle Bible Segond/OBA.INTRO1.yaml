document_id: OBA.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Abdias est le livre le plus court de l''Ancien Testament. C''est un message prophétique de jugement contre '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Edom
    - type: text
      text: ', un des petits peuples voisins de Juda, au sud-est.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On peut y reconnaître trois parties :'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '1) l''annonce du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: châtiment
    - type: text
      text: ' d''Edom (= Esaü, v. 1-9) ;'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '2) l''indication des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: causes
    - type: text
      text: ' de ce châtiment (v. 10-16), à savoir l''attitude d''Edom à l''égard d''Israël (= Jacob) ;'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '3) l''annonce du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: rétablissement
    - type: text
      text: ' et de la reconquête territoriale d''Israël (v. 17-21).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette disposition diffère de la structure classique accusation / châtiment. Elle place au centre un morceau poétique qui joue sur les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: répétitions
    - type: text
      text: ', en particulier celle du terme '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jour
    - type: text
      text: ' (v. 11-14). Une correspondance apparaît ainsi entre le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jour de Jacob
    - type: text
      text: ' et le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jour du Seigneur
    - type: text
      text: ' (YHWH) qui viendra rétablir la justice (v. 15s). Israël a déjà été jugé, le tour des nations arrive (v. 16).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Aucune indication ne nous est donnée sur la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: personne
    - type: text
      text: ' du prophète qui a reçu cette vision, ni, formellement, sur l'''
    - type: usfm
      marker: bd
      children:
      - type: text
        text: époque
    - type: text
      text: ' où le texte a été écrit.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Abdias et l'histoire
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans le livre d''Abdias, comme dans d''autres textes de l''Ancien Testament, '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Edom
    - type: text
      text: ' et '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Esaü
    - type: text
      text: ' sont des appellations synonymes (voir Gn 25.30). En Genèse 36.9,43, la généalogie d''Esaü fait de celui-ci l''ancêtre des Edomites. Le cycle de Jacob qui précède (Gn 25–35) raconte les conflits et les difficiles négociations entre Esaü et son frère jumeau Jacob, qui recevra le nom d''Israël, autour de leurs territoires respectifs et de la bénédiction divine.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Dans l'histoire biblique qui fait suite aux récits des origines, l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: hostilité
    - type: text
      text: ' entre les descendants des deux frères apparaît dès avant l''installation en Canaan (Nb 20.20). Elle se développe lorsque David soumet les Edomites (2S 8.13ss), ce qui provoque chez eux un désir de revanche (1R 11.14-22 ; 2R 8.20-22 ; 14.7, etc.).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre d''Abdias renvoie à une période cruelle de l''histoire d''Israël. Deux environnements historiques pourraient servir de cadre à la prophétie : le premier sous le règne de Joram, au IX'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle av. J.-C. ; le second, que préfèrent la plupart des spécialistes modernes, lorsque le royaume de Juda a été définitivement brisé par les Babyloniens, au VI'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle. Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: jour
    - type: text
      text: ' des v. 10 à 14 serait dans le premier cas celui de la razzia arabo-philistine rapportée en 2Ch 21.8-20, et dans le second celui de la prise de Jérusalem en 587/6 av. J.-C. (2R 25). Dans cette dernière situation, les Edomites ont participé à la destruction et au pillage de la ville. D''après Ezéchiel, ils en ont également profité pour occuper des territoires du sud de la Judée (Ez 35.10). Edom est accusé d''avoir trahi la fraternité en adoptant à l''égard de Juda la même attitude que celle des étrangers (v. 10s).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Abdias et les prophéties contre Edom
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le message de jugement contre les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: nations
    - type: text
      text: ' est un élément important de la prédication des prophètes. Dans plusieurs textes prophétiques Edom est un des ennemis types d''Israël (voir p. ex. Jl 4.19). On trouve des réquisitoires contre Edom en Amos 1.11s ; 9.12 ; Malachie 1.1-5 ; Jérémie 49.7-22 ; Ezéchiel 25.12-14 ; 35.1-15. Les v. 7 à 16 de Jérémie 49 présentent des correspondances fortes avec Abdias 1-5.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En Abdias, la ruine d''Edom est décrite comme un complet '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: renversement de situation
    - type: text
      text: '. Il y a un jeu d''oppositions : à la hauteur, à l''orgueil, à la réputation de sagesse (v. 3s,8) fait suite le plus total abaissement ; celui qui a trahi (v. 10-12) se voit lui-même trahi (v. 7) ; celui qui a pillé le peuple frère (v. 13s) est à son tour pillé et reconquis (v. 5s,18ss). Là où la fraternité n''est pas vécue s''applique le principe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: il te sera fait comme tu as fait
    - type: text
      text: ' (v. 15).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Abdias et la vie entre frères
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Comme d''autres textes bibliques, Abdias aborde le difficile problème de la vie entre frères et entre peuples. Il montre que la violence appelle la violence et l''agression la revanche. Est-ce à dire qu''il laisse uniquement ouverte la possibilité de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: vengeance
    - type: text
      text: ' et du retour à l''expansion nationaliste du frère meurtri ? La phrase finale de la vision prophétique, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: le règne appartiendra au Seigneur
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: (YHWH),
    - type: text
      text: ' souligne que le dernier mot n''est pas à un pouvoir humain.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La parole propre du livre d''Abdias réside dans sa force provocatrice. En creux, il dit que seul le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: pardon
    - type: text
      text: ' peut briser le cycle infernal de l''inimitié et de la violence. Le livre de Jonas (qui suit Abdias dans l''ordre canonique) nous apprendra que le pardon mis en œuvre par Dieu est aussi offert aux peuples ennemis d''Israël.'
