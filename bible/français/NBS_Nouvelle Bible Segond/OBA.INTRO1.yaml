document_id: OBA.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Abdias est le livre le plus court de l''Ancien Testament. C''est un message prophétique de jugement contre '
  - type: text
    content: Edom
  - type: text
    content: ', un des petits peuples voisins de Juda, au sud-est.'
  - type: text
    content: 'On peut y reconnaître trois parties :'
  - type: text
    content: '1) l''annonce du '
  - type: text
    content: châtiment
  - type: text
    content: ' d''Edom (= Esaü, v. 1-9) ;'
  - type: text
    content: '2) l''indication des '
  - type: text
    content: causes
  - type: text
    content: ' de ce châtiment (v. 10-16), à savoir l''attitude d''Edom à l''égard d''Israël (= Jacob) ;'
  - type: text
    content: '3) l''annonce du '
  - type: text
    content: rétablissement
  - type: text
    content: ' et de la reconquête territoriale d''Israël (v. 17-21).'
  - type: text
    content: 'Cette disposition diffère de la structure classique accusation / châtiment. Elle place au centre un morceau poétique qui joue sur les '
  - type: text
    content: répétitions
  - type: text
    content: ', en particulier celle du terme '
  - type: text
    content: jour
  - type: text
    content: ' (v. 11-14). Une correspondance apparaît ainsi entre le '
  - type: text
    content: jour de Jacob
  - type: text
    content: ' et le '
  - type: text
    content: jour du Seigneur
  - type: text
    content: ' (YHWH) qui viendra rétablir la justice (v. 15s). Israël a déjà été jugé, le tour des nations arrive (v. 16).'
  - type: text
    content: 'Aucune indication ne nous est donnée sur la '
  - type: text
    content: personne
  - type: text
    content: ' du prophète qui a reçu cette vision, ni, formellement, sur l'''
  - type: text
    content: époque
  - type: text
    content: ' où le texte a été écrit.'
  - type: text
    content: Abdias et l'histoire
  - type: text
    content: 'Dans le livre d''Abdias, comme dans d''autres textes de l''Ancien Testament, '
  - type: text
    content: Edom
  - type: text
    content: ' et '
  - type: text
    content: Esaü
  - type: text
    content: ' sont des appellations synonymes (voir Gn 25.30). En Genèse 36.9,43, la généalogie d''Esaü fait de celui-ci l''ancêtre des Edomites. Le cycle de Jacob qui précède (Gn 25–35) raconte les conflits et les difficiles négociations entre Esaü et son frère jumeau Jacob, qui recevra le nom d''Israël, autour de leurs territoires respectifs et de la bénédiction divine.'
  - type: text
    content: Dans l'histoire biblique qui fait suite aux récits des origines, l'
  - type: text
    content: hostilité
  - type: text
    content: ' entre les descendants des deux frères apparaît dès avant l''installation en Canaan (Nb 20.20). Elle se développe lorsque David soumet les Edomites (2S 8.13ss), ce qui provoque chez eux un désir de revanche (1R 11.14-22 ; 2R 8.20-22 ; 14.7, etc.).'
  - type: text
    content: 'Le livre d''Abdias renvoie à une période cruelle de l''histoire d''Israël. Deux environnements historiques pourraient servir de cadre à la prophétie : le premier sous le règne de Joram, au IX'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C. ; le second, que préfèrent la plupart des spécialistes modernes, lorsque le royaume de Juda a été définitivement brisé par les Babyloniens, au VI'
  - type: text
    content: e
  - type: text
    content: ' siècle. Le '
  - type: text
    content: jour
  - type: text
    content: ' des v. 10 à 14 serait dans le premier cas celui de la razzia arabo-philistine rapportée en 2Ch 21.8-20, et dans le second celui de la prise de Jérusalem en 587/6 av. J.-C. (2R 25). Dans cette dernière situation, les Edomites ont participé à la destruction et au pillage de la ville. D''après Ezéchiel, ils en ont également profité pour occuper des territoires du sud de la Judée (Ez 35.10). Edom est accusé d''avoir trahi la fraternité en adoptant à l''égard de Juda la même attitude que celle des étrangers (v. 10s).'
  - type: text
    content: Abdias et les prophéties contre Edom
  - type: text
    content: 'Le message de jugement contre les '
  - type: text
    content: nations
  - type: text
    content: ' est un élément important de la prédication des prophètes. Dans plusieurs textes prophétiques Edom est un des ennemis types d''Israël (voir p. ex. Jl 4.19). On trouve des réquisitoires contre Edom en Amos 1.11s ; 9.12 ; Malachie 1.1-5 ; Jérémie 49.7-22 ; Ezéchiel 25.12-14 ; 35.1-15. Les v. 7 à 16 de Jérémie 49 présentent des correspondances fortes avec Abdias 1-5.'
  - type: text
    content: 'En Abdias, la ruine d''Edom est décrite comme un complet '
  - type: text
    content: renversement de situation
  - type: text
    content: '. Il y a un jeu d''oppositions : à la hauteur, à l''orgueil, à la réputation de sagesse (v. 3s,8) fait suite le plus total abaissement ; celui qui a trahi (v. 10-12) se voit lui-même trahi (v. 7) ; celui qui a pillé le peuple frère (v. 13s) est à son tour pillé et reconquis (v. 5s,18ss). Là où la fraternité n''est pas vécue s''applique le principe '
  - type: text
    content: il te sera fait comme tu as fait
  - type: text
    content: ' (v. 15).'
  - type: text
    content: Abdias et la vie entre frères
  - type: text
    content: 'Comme d''autres textes bibliques, Abdias aborde le difficile problème de la vie entre frères et entre peuples. Il montre que la violence appelle la violence et l''agression la revanche. Est-ce à dire qu''il laisse uniquement ouverte la possibilité de la '
  - type: text
    content: vengeance
  - type: text
    content: ' et du retour à l''expansion nationaliste du frère meurtri ? La phrase finale de la vision prophétique, '
  - type: text
    content: le règne appartiendra au Seigneur
  - type: text
    content: ' '
  - type: text
    content: (YHWH),
  - type: text
    content: ' souligne que le dernier mot n''est pas à un pouvoir humain.'
  - type: text
    content: 'La parole propre du livre d''Abdias réside dans sa force provocatrice. En creux, il dit que seul le '
  - type: text
    content: pardon
  - type: text
    content: ' peut briser le cycle infernal de l''inimitié et de la violence. Le livre de Jonas (qui suit Abdias dans l''ordre canonique) nous apprendra que le pardon mis en œuvre par Dieu est aussi offert aux peuples ennemis d''Israël.'
