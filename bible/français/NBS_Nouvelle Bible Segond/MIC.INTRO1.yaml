document_id: MIC.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le cadre historique
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Deux grandes figures prophétiques dominent le paysage judéen de la seconde moitié du VIII
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle av. J.-C. : Esaïe et Michée. Fait relativement nouveau en ce qui concerne les prophètes, les messages de ces deux hommes furent couchés par '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: écrit
    - type: text
      text: ', ce qui nous vaut de suivre de très près l''action de l''inspiration divine en Israël.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Si Esaïe nous avait introduits dans la cour royale de Jérusalem, nous faisant assister aux prises de décision de plusieurs monarques, Michée, pour sa part, défend le point de vue du terroir. Avec lui on apprend comment les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ruraux
    - type: text
      text: ' vivent leur époque et comment ils ressentent les choix faits à Jérusalem par les princes qui les gouvernent — on notera toutefois que la critique épargne la personne du roi (chap. 3).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le prophète Michée est originaire de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Morésheth
    - type: text
      text: ', une bourgade de Juda située dans le Bas-Pays, non loin des cinq villes de la confédération philistine, qui vont faire les frais des premiers coups de boutoir des conquérants venus du nord-est.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La période couverte par les trois règnes cités dans le verset titre (1.1) coïncide en effet avec le développement de l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: expansionnisme assyrien
    - type: text
      text: ' inauguré par Tiglath-Piléser III, qui s''avança dans la plaine côtière jusqu''à l''Egypte vers 735. Cette action se poursuit avec l''annexion de la Samarie par ses successeurs Salmanasar V et Sargon II. Enfin, le règne d''Ezéchias de Juda verra quarante-six villes de Juda investies par Sennachérib (2R 18.13). Douze d''entre elles sont mentionnées par Michée (chap. 1). Mais Jérusalem, responsable après Samarie de tous les maux, demeurera miraculeusement indemne.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Nous ne savons pas grand-chose sur la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: personne
    - type: text
      text: ' de Michée. Son style démontre qu''il n''est pas un simple paysan. On a supposé qu''il a été en charge d''un certain pouvoir judiciaire, en tant qu'''
    - type: usfm
      marker: it
      children:
      - type: text
        text: ancien*
    - type: text
      text: ' de Juda. Mais rien ne vaut l''opinion que l''on peut se faire en abordant les textes.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Michée et Esaïe
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: similitudes
    - type: text
      text: ' avec l''œuvre d''Esaïe sont parfois frappantes. Ainsi le célèbre fragment sur la conversion des nations (Mi 4.1'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: '-'
    - type: text
      text: '5) se retrouve substantiellement en Esaïe 2.2-5 ; ainsi l''image très forte du prophète allant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: déchaussé et nu
    - type: text
      text: ' est commune à Michée 1.8 et Esaïe 20.3. Par ailleurs, les prophéties initiales de l''un et l''autre livre (Mi 1.2 et Es 1.2) expriment à peu près dans les mêmes termes l''annonce de l''intervention imminente de Dieu. La théologie des deux ouvrages se recoupe aussi sur de grands thèmes tels que le rôle futur de la monarchie « de David » (voir par exemple Mi 5.1-4 et Es 9.5s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Il serait toutefois exagéré de faire de Michée un épigone d''Esaïe. Si Michée s''intéresse à David, ce n''est pas au glorieux monarque de Jérusalem qu''il fait référence, mais à ce campagnard de Beth-Léhem qui sut faire l''unité des douze tribus autour de sa couronne. L''intention est la même ; les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: accents
    - type: text
      text: ' restent différents. Les deux recueils prophétiques sont complémentaires dans leur diversité.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le réquisitoire
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tandis qu''Esaïe s''attache à dénoncer les causes politiques du désastre national, Michée s''en prend aux '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: désordres sociaux
    - type: text
      text: . Le règne de l'injustice ne peut bénéficier de la bienveillance de Dieu. C'est pourquoi le message de Michée est si fourni en invectives contre les riches qui accaparent les terres (2.1-5) — les ruraux en ont fait la douloureuse expérience —, qui recourent à la fraude et à la violence (6.9-12), et dont la voracité est sans limites (3.1-4 ; 7.2-6) ; il s'en prend aussi à la complaisance et à la vénalité des prêtres et des prophètes attitrés du temple (3.5-11).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: verdict
    - type: text
      text: ' est prononcé en Michée 3.12 : à son tour, Jérusalem sera dévastée, car son crime vaut celui de Samarie (qui est tombée en 722/1). Ce verdict sera cité ultérieurement par Jérémie (Jr 26.18) qui date cette déclaration prophétique des jours du roi Ezéchias.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'enfant merveilleux et le dernier reste des fidèles
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''espérance pourtant n''est pas éteinte. Un jour il va falloir reconstruire. Tel est le sujet du chapitre 5 (si proche d''Esaïe 7–11) qui annonce le retour de la justice et de la paix avec la naissance prochaine d''un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: enfant merveilleux
    - type: text
      text: '. Ce dernier sera, à l''évidence, de lignée royale. Le prophète l''annonce en usant de l''expression originale et quelque peu énigmatique '
    - type: usfm
      marker: it
      children:
      - type: text
        text: celui qui dominera sur Israël
    - type: text
      text: ' (5.1). Au demeurant un '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reste
    - type: text
      text: ' subsistera (voir Es 7.3n). Michée le décrit tour à tour comme un '
    - type: usfm
      marker: it
      children:
      - type: text
        text: troupeau
    - type: text
      text: ', un '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lion
    - type: text
      text: ' et un '
    - type: usfm
      marker: it
      children:
      - type: text
        text: patrimoine
    - type: text
      text: ' (2.12s ; 5.6s ; 7.18ss).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le culte véritable
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Avec le thème du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: procès
    - type: text
      text: ' (6.1-8), Michée atteint aux sommets du pathétique. Plus que tous les autres prophètes du VIII'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle (Os 2.2 ; Am 3.9s ; Es 1.2-20), notre auteur développe la plainte exprimée par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur (YHWH)
    - type: text
      text: ' devant le tribunal de l''univers (symbolisé par les collines et les montagnes de 6.2). Il rappelle ses hauts faits libérateurs aux temps héroïques de l''Exode et de la traversée du désert, mettant ainsi en évidence l''ingratitude du peuple qui s''est tourné vers l''idolâtrie (5.12, mais déjà en 1.7).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En réponse à cette interpellation, le peuple se livre à un examen de conscience au sujet du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: vrai culte
    - type: text
      text: '. Cette démarche débouche sur un admirable résumé de l''enseignement des grands prophètes. Rejetant les fastes de l''holocauste et l''horreur sublime des sacrifices d''enfants, Michée donne ici pour l''éternité la charte du vrai culte. Avec des accents déjà annonciateurs du message évangélique de Jésus, la prophétie récuse les sacrifices, si nombreux ou coûteux soient-ils (6.6s). Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' attend l'''
    - type: usfm
      marker: it
      children:
      - type: text
        text: équité
    - type: text
      text: ', la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fidélité
    - type: text
      text: ' et la modestie de ceux qui marchent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: avec lui
    - type: text
      text: ' (Mi 6.8). L''actualité de cette parole n''a jamais faibli.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le psaume de l'espérance
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les trois dernières pièces du recueil expriment la prière confiante du croyant (7.7-20). Car malgré tous les constats de faillite dressés au fil de ses pages, le livre s''achève sur la vision d''une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: réhabilitation
    - type: text
      text: ' de la nation pécheresse (7.9s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le thème de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: réunification
    - type: text
      text: ' des deux royaumes domine le deuxième fragment (7.11-17). On y découvre la stupeur des nations puissantes, l''Assyrie et ses alliés, devant la reconquête du Carmel, du Bashân et du Galaad, des contrées du Nord perdues dès 733.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le dernier couplet, qui constitue l''envoi, est une petite profession de foi au Dieu du nouvel exode, qui par-dessus tout fait '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: grâce
    - type: text
      text: ' et engloutit le péché au fond de la mer (7.19) comme jadis furent engloutis les Egyptiens.'
  - type: usfm
    marker: iot
    children:
    - type: text
      text: L'organisation des textes
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Telle qu''elle se présente à nous, la prophétie de Michée est organisée en trois grands ensembles à l''intérieur desquels se retrouvent chaque fois des oracles de malheur (a) suivis d''appels à l''espérance (b). Cette structure est classique. On peut en dégager le plan suivant :'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: I.
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '(a) Le procès du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur (YHWH)
    - type: text
      text: ' contre Samarie et Jérusalem ; contre les riches ; contre les menteurs'
    - type: usfm
      marker: ior
      children:
      - type: text
        text: (1.2–2.11)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '(b) Le rassemblement du reste d''Israël sous la houlette du berger divin '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: (2.12-13)
  - type: usfm
    marker: io1
    children:
    - type: text
      text: II.
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '(a) Critique des classes dirigeantes '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: (3.1-12)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '(b) Ultimes perspectives '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: (4.1–5.14)
  - type: usfm
    marker: io1
    children:
    - type: text
      text: III.
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '(a) Nouveau procès du peuple ; condamnation de la ville infidèle ; lamentation '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: (6.1–7.6)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '(b) Liturgie de l''espérance '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: (7.8-20)
