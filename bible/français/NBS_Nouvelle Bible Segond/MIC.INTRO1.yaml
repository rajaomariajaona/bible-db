document_id: MIC.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Le cadre historique
  - type: text
    content: Deux grandes figures prophétiques dominent le paysage judéen de la seconde moitié du VIII
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C. : Esaïe et Michée. Fait relativement nouveau en ce qui concerne les prophètes, les messages de ces deux hommes furent couchés par '
  - type: text
    content: écrit
  - type: text
    content: ', ce qui nous vaut de suivre de très près l''action de l''inspiration divine en Israël.'
  - type: text
    content: 'Si Esaïe nous avait introduits dans la cour royale de Jérusalem, nous faisant assister aux prises de décision de plusieurs monarques, Michée, pour sa part, défend le point de vue du terroir. Avec lui on apprend comment les '
  - type: text
    content: ruraux
  - type: text
    content: ' vivent leur époque et comment ils ressentent les choix faits à Jérusalem par les princes qui les gouvernent — on notera toutefois que la critique épargne la personne du roi (chap. 3).'
  - type: text
    content: 'Le prophète Michée est originaire de '
  - type: text
    content: Morésheth
  - type: text
    content: ', une bourgade de Juda située dans le Bas-Pays, non loin des cinq villes de la confédération philistine, qui vont faire les frais des premiers coups de boutoir des conquérants venus du nord-est.'
  - type: text
    content: La période couverte par les trois règnes cités dans le verset titre (1.1) coïncide en effet avec le développement de l'
  - type: text
    content: expansionnisme assyrien
  - type: text
    content: ' inauguré par Tiglath-Piléser III, qui s''avança dans la plaine côtière jusqu''à l''Egypte vers 735. Cette action se poursuit avec l''annexion de la Samarie par ses successeurs Salmanasar V et Sargon II. Enfin, le règne d''Ezéchias de Juda verra quarante-six villes de Juda investies par Sennachérib (2R 18.13). Douze d''entre elles sont mentionnées par Michée (chap. 1). Mais Jérusalem, responsable après Samarie de tous les maux, demeurera miraculeusement indemne.'
  - type: text
    content: 'Nous ne savons pas grand-chose sur la '
  - type: text
    content: personne
  - type: text
    content: ' de Michée. Son style démontre qu''il n''est pas un simple paysan. On a supposé qu''il a été en charge d''un certain pouvoir judiciaire, en tant qu'''
  - type: text
    content: ancien*
  - type: text
    content: ' de Juda. Mais rien ne vaut l''opinion que l''on peut se faire en abordant les textes.'
  - type: text
    content: Michée et Esaïe
  - type: text
    content: 'Les '
  - type: text
    content: similitudes
  - type: text
    content: ' avec l''œuvre d''Esaïe sont parfois frappantes. Ainsi le célèbre fragment sur la conversion des nations (Mi 4.1'
  - type: text
    content: '-'
  - type: text
    content: '5) se retrouve substantiellement en Esaïe 2.2-5 ; ainsi l''image très forte du prophète allant '
  - type: text
    content: déchaussé et nu
  - type: text
    content: ' est commune à Michée 1.8 et Esaïe 20.3. Par ailleurs, les prophéties initiales de l''un et l''autre livre (Mi 1.2 et Es 1.2) expriment à peu près dans les mêmes termes l''annonce de l''intervention imminente de Dieu. La théologie des deux ouvrages se recoupe aussi sur de grands thèmes tels que le rôle futur de la monarchie « de David » (voir par exemple Mi 5.1-4 et Es 9.5s).'
  - type: text
    content: 'Il serait toutefois exagéré de faire de Michée un épigone d''Esaïe. Si Michée s''intéresse à David, ce n''est pas au glorieux monarque de Jérusalem qu''il fait référence, mais à ce campagnard de Beth-Léhem qui sut faire l''unité des douze tribus autour de sa couronne. L''intention est la même ; les '
  - type: text
    content: accents
  - type: text
    content: ' restent différents. Les deux recueils prophétiques sont complémentaires dans leur diversité.'
  - type: text
    content: Le réquisitoire
  - type: text
    content: 'Tandis qu''Esaïe s''attache à dénoncer les causes politiques du désastre national, Michée s''en prend aux '
  - type: text
    content: désordres sociaux
  - type: text
    content: . Le règne de l'injustice ne peut bénéficier de la bienveillance de Dieu. C'est pourquoi le message de Michée est si fourni en invectives contre les riches qui accaparent les terres (2.1-5) — les ruraux en ont fait la douloureuse expérience —, qui recourent à la fraude et à la violence (6.9-12), et dont la voracité est sans limites (3.1-4 ; 7.2-6) ; il s'en prend aussi à la complaisance et à la vénalité des prêtres et des prophètes attitrés du temple (3.5-11).
  - type: text
    content: 'Le '
  - type: text
    content: verdict
  - type: text
    content: ' est prononcé en Michée 3.12 : à son tour, Jérusalem sera dévastée, car son crime vaut celui de Samarie (qui est tombée en 722/1). Ce verdict sera cité ultérieurement par Jérémie (Jr 26.18) qui date cette déclaration prophétique des jours du roi Ezéchias.'
  - type: text
    content: L'enfant merveilleux et le dernier reste des fidèles
  - type: text
    content: 'L''espérance pourtant n''est pas éteinte. Un jour il va falloir reconstruire. Tel est le sujet du chapitre 5 (si proche d''Esaïe 7–11) qui annonce le retour de la justice et de la paix avec la naissance prochaine d''un '
  - type: text
    content: enfant merveilleux
  - type: text
    content: '. Ce dernier sera, à l''évidence, de lignée royale. Le prophète l''annonce en usant de l''expression originale et quelque peu énigmatique '
  - type: text
    content: celui qui dominera sur Israël
  - type: text
    content: ' (5.1). Au demeurant un '
  - type: text
    content: reste
  - type: text
    content: ' subsistera (voir Es 7.3n). Michée le décrit tour à tour comme un '
  - type: text
    content: troupeau
  - type: text
    content: ', un '
  - type: text
    content: lion
  - type: text
    content: ' et un '
  - type: text
    content: patrimoine
  - type: text
    content: ' (2.12s ; 5.6s ; 7.18ss).'
  - type: text
    content: Le culte véritable
  - type: text
    content: 'Avec le thème du '
  - type: text
    content: procès
  - type: text
    content: ' (6.1-8), Michée atteint aux sommets du pathétique. Plus que tous les autres prophètes du VIII'
  - type: text
    content: e
  - type: text
    content: ' siècle (Os 2.2 ; Am 3.9s ; Es 1.2-20), notre auteur développe la plainte exprimée par le '
  - type: text
    content: Seigneur (YHWH)
  - type: text
    content: ' devant le tribunal de l''univers (symbolisé par les collines et les montagnes de 6.2). Il rappelle ses hauts faits libérateurs aux temps héroïques de l''Exode et de la traversée du désert, mettant ainsi en évidence l''ingratitude du peuple qui s''est tourné vers l''idolâtrie (5.12, mais déjà en 1.7).'
  - type: text
    content: 'En réponse à cette interpellation, le peuple se livre à un examen de conscience au sujet du '
  - type: text
    content: vrai culte
  - type: text
    content: '. Cette démarche débouche sur un admirable résumé de l''enseignement des grands prophètes. Rejetant les fastes de l''holocauste et l''horreur sublime des sacrifices d''enfants, Michée donne ici pour l''éternité la charte du vrai culte. Avec des accents déjà annonciateurs du message évangélique de Jésus, la prophétie récuse les sacrifices, si nombreux ou coûteux soient-ils (6.6s). Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' attend l'''
  - type: text
    content: équité
  - type: text
    content: ', la '
  - type: text
    content: fidélité
  - type: text
    content: ' et la modestie de ceux qui marchent '
  - type: text
    content: avec lui
  - type: text
    content: ' (Mi 6.8). L''actualité de cette parole n''a jamais faibli.'
  - type: text
    content: Le psaume de l'espérance
  - type: text
    content: 'Les trois dernières pièces du recueil expriment la prière confiante du croyant (7.7-20). Car malgré tous les constats de faillite dressés au fil de ses pages, le livre s''achève sur la vision d''une '
  - type: text
    content: réhabilitation
  - type: text
    content: ' de la nation pécheresse (7.9s).'
  - type: text
    content: 'Le thème de la '
  - type: text
    content: réunification
  - type: text
    content: ' des deux royaumes domine le deuxième fragment (7.11-17). On y découvre la stupeur des nations puissantes, l''Assyrie et ses alliés, devant la reconquête du Carmel, du Bashân et du Galaad, des contrées du Nord perdues dès 733.'
  - type: text
    content: 'Le dernier couplet, qui constitue l''envoi, est une petite profession de foi au Dieu du nouvel exode, qui par-dessus tout fait '
  - type: text
    content: grâce
  - type: text
    content: ' et engloutit le péché au fond de la mer (7.19) comme jadis furent engloutis les Egyptiens.'
  - type: text
    content: L'organisation des textes
  - type: text
    content: 'Telle qu''elle se présente à nous, la prophétie de Michée est organisée en trois grands ensembles à l''intérieur desquels se retrouvent chaque fois des oracles de malheur (a) suivis d''appels à l''espérance (b). Cette structure est classique. On peut en dégager le plan suivant :'
  - type: text
    content: I.
  - type: text
    content: '(a) Le procès du '
  - type: text
    content: Seigneur (YHWH)
  - type: text
    content: ' contre Samarie et Jérusalem ; contre les riches ; contre les menteurs'
  - type: text
    content: (1.2–2.11)
  - type: text
    content: '(b) Le rassemblement du reste d''Israël sous la houlette du berger divin '
  - type: text
    content: (2.12-13)
  - type: text
    content: II.
  - type: text
    content: '(a) Critique des classes dirigeantes '
  - type: text
    content: (3.1-12)
  - type: text
    content: '(b) Ultimes perspectives '
  - type: text
    content: (4.1–5.14)
  - type: text
    content: III.
  - type: text
    content: '(a) Nouveau procès du peuple ; condamnation de la ville infidèle ; lamentation '
  - type: text
    content: (6.1–7.6)
  - type: text
    content: '(b) Liturgie de l''espérance '
  - type: text
    content: (7.8-20)
