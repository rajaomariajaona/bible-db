      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2Th 1.7-10 ; voir aussi Es 1.25 ; Jr 6.29s ; Ml 3.2s,19 ; 1P 1.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''il '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le jour) '
