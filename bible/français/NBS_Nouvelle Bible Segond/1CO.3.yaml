        text: 'coopérer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Rm 8.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le champ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 13.3-9/ /,38. –  '
    - type: usfm
      marker: fq
      children:
