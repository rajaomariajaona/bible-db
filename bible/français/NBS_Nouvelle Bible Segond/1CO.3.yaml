    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 14s ; même terme 9.17s. Sur le sens de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: salaire
    - type: usfm
      marker: ft
      children:
      - type: text
