    marker-yv: yv-n
  - type: text
    text: 'Qu''est-ce donc qu''Apollos ? Qu''est-ce que Paul ? Des serviteurs, par l''entremise desquels vous êtes venus à la foi, selon ce que le Seigneur a accordé à chacun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jr 1.10 ; Rm 9.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Apollos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ac 18.4,11,24ss.
    marker-yv: yv-n
  - type: text
    text: 'Moi, j''ai planté, Apollos a arrosé, mais c''est Dieu qui faisait croître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
