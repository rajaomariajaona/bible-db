        text: qui importe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui est quelque chose
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.2 ; 10.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ga 2.6.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi, ce n''est pas celui qui plante qui importe, ni celui qui arrose, mais Dieu, qui fait croître. '
  - type: usfm
