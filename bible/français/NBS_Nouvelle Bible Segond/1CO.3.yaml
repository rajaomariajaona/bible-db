  - type: text
    text: 'l''œuvre de chacun deviendra manifeste, car le jour la mettra en évidence ; en effet, c''est dans le feu qu''il se révélera, et l''épreuve du feu montrera ce que vaut l''œuvre de chacun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
