      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1.10s ; Rm 13.13 ; Jc 3.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ne vous comportez-vous pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne marchez-vous pas selon l'humain ?
    marker-yv: yv-n
  - type: text
    text: 'parce que vous êtes encore charnels. En effet, pour autant qu''il y a parmi vous des passions jalouses et des disputes, n''êtes-vous pas charnels ? Ne vous comportez-vous pas d''une manière tout humaine ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.12+.
    marker-yv: yv-n
  - type: text
    text: 'Quand l''un dit : « Moi, j''appartiens à Paul ! » et un autre : « Moi, à Apollos ! », êtes-vous autre chose que des humains ?'
- type: usfm
  marker: s1
  children:
  - type: text
