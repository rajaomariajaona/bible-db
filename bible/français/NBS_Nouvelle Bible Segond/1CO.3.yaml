    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 10.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la supporter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; cf. Hé 5.12-14 ; voir aussi 1P 2.2.'
    marker-yv: yv-n
  - type: text
    text: 'Je vous ai donné du lait ; non pas de la nourriture solide, car vous n''auriez pas pu la supporter ; d''ailleurs, maintenant même vous ne le pourriez pas, '
  - type: usfm
    marker: vlbl
