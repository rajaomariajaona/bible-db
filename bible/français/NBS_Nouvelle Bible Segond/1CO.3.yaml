      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''édifice '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 16s) : un verbe apparenté est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'construire '
    - type: usfm
      marker: ft
      children:
