    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 4.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d., selon toute vraisemblance, '
    - type: usfm
      marker: fqa
      children:
