    marker-yv: yv-n
  - type: text
    text: 'Selon la grâce de Dieu qui m''a été accordée, comme un sage maître d''œuvre, j''ai posé les fondations, et quelqu''un d''autre construit dessus. Mais que chacun prenne garde à la façon dont il construit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''autre fondation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'autres fondations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ep 2.20 ; voir aussi 1P 2.4-6.'
    marker-yv: yv-n
  - type: text
    text: 'Personne, en effet, ne peut poser d''autre fondation que celle qui est en place, à savoir Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2Tm 2.20 ; Ap 21.14,18s.
    marker-yv: yv-n
  - type: text
    text: 'Que l''on construise sur ces fondations avec de l''or, de l''argent, des pierres précieuses, du bois, du foin ou du chaume, '
