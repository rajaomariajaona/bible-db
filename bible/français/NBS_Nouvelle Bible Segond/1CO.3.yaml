document_id: 1CO.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Des chrétiens encore tout petits
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.6,13-16. –  spirituels  : voir esprit. –  charnels  : l''adjectif grec ainsi traduit est légèrement différent de celui qui apparaît au v. 3 ; les deux termes sont toutefois employés ici de façon manifestement équivalente ; cf. Rm 7.14n. –  tout-petits ou petits enfants  ; cf. 13.11 ; 14.20 ; cf. 1Th 2.7.'
  - type: text
    content: 'Quant à moi, mes frères, ce n''est pas comme à des êtres spirituels que j''ai pu vous parler, mais comme à des êtres charnels, comme à des tout-petits dans le Christ. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Selon la grâce… 15.10 ; Rm 1.5+ ; 12.3+. –  maître d''œuvre  : le terme grec correspondant, qui n''apparaît qu''ici dans le N.T., a donné notre mot « architecte ». –  fondations Rm 15.20 ; cf. Hé 6.1. –  construit ou édifie  : cf. v. 9n  ; Jr 1.10.'
  - type: text
    content: 'Selon la grâce de Dieu qui m''a été accordée, comme un sage maître d''œuvre, j''ai posé les fondations, et quelqu''un d''autre construit dessus. Mais que chacun prenne garde à la façon dont il construit. '
  '11':
  - type: note
    content: d'autre fondation ou d'autres fondations  ; cf. Ep 2.20 ; voir aussi 1P 2.4-6.
  - type: text
    content: 'Personne, en effet, ne peut poser d''autre fondation que celle qui est en place, à savoir Jésus-Christ. '
  '12':
  - type: note
    content: Cf. 2Tm 2.20 ; Ap 21.14,18s.
  - type: text
    content: 'Que l''on construise sur ces fondations avec de l''or, de l''argent, des pierres précieuses, du bois, du foin ou du chaume, '
  '13':
  - type: note
    content: 'Cf. 4.5. –  le jour  : c.-à-d., selon toute vraisemblance, le jour du jugement  ; cf. 1.8+ ; 4.3n. –  feu  : cf. 2Th 1.7-10 ; voir aussi Es 1.25 ; Jr 6.29s ; Ml 3.2s,19 ; 1P 1.17. –  qu''il (le jour) se révélera  : autre traduction qu''elle (l''œuvre de chacun) se révélera. –  l''épreuve du feu…  : litt. le feu discernera ou jugera, examinera, éprouvera  ; même verbe 11.28 ; 16.3n  ; termes apparentés en 9.27 (disqualifié) ; 11.19 (ceux qui résistent à l''épreuve) ; voir Rm 1.28n  ; 2Co 2.9n. –  ce que vaut  : autre traduction de quelle nature est.'
  - type: text
    content: 'l''œuvre de chacun deviendra manifeste, car le jour la mettra en évidence ; en effet, c''est dans le feu qu''il se révélera, et l''épreuve du feu montrera ce que vaut l''œuvre de chacun. '
  '14':
  - type: note
    content: 'il recevra un salaire  : autre traduction il en sera récompensé, cf. v. 8n.'
  - type: text
    content: 'Si l''œuvre que quelqu''un a construite demeure, il recevra un salaire. '
  '15':
  - type: note
    content: 'sauvé  : cf. 1.18+ ; 5.5 ; Mc 8.36/ /. –  du feu Am 4.11 ; Za 3.2 ; Jd 23.'
  - type: text
    content: Si l'œuvre de quelqu'un est brûlée, il en subira la perte ; lui, certes, il sera sauvé, mais comme au travers du feu.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le sanctuaire  : autre traduction un sanctuaire  ; 6.19 ; 2Co 6.16 ; cf. Ex 15.17 ; la communauté de Qumrân (ou, peut-être, le Conseil qui la préside) semble également, dans certains passages, se décrire comme un temple (p. ex. Règle de la Communauté 8.5,8s ; 9.5s ; voir 1P 2.4n). –  l''Esprit… Rm 8.9 ; 1Th 4.8 ; cf. Ez 36.27.'
  - type: text
    content: 'Ne savez-vous pas que vous êtes le sanctuaire de Dieu, et que l''Esprit de Dieu habite en vous ? '
  '17':
  - type: note
    content: 'détruit ou ruine  ; le même verbe est traduit par pourrir en 15.33 ; un terme apparenté est rendu par périssable en 9.25+ ; cf. 2Co 10.8 ; 13.10 ; Ap 11.18n  ; ailleurs le même verbe est traduit par ruiner (2Co 7.2 ; Ap 19.2), pervertir (2Co 11.3), périr (Ep 4.22), pourrir (2P 2.12 ; Jd 10). –  saint ou sacré, Ep 2.21 ; cf. Ps 65.5 ; 79.1. –  c''est là ce que, vous, vous êtes  : on peut comprendre aussi bien ce sanctuaire, c''est vous-mêmes que vous aussi, vous êtes saints.'
  - type: text
    content: Si quelqu'un détruit le sanctuaire de Dieu, Dieu le détruira ; car le sanctuaire de Dieu est saint – c'est là ce que, vous, vous êtes.
  - type: heading
    content: Tout vous appartient, mais vous, vous appartenez au Christ
  '18':
  - type: text
    content: ' '
  - type: note
    content: 1.20-25 ; 2.6 ; 4.10 ; cf. 2Co 5.13.
  - type: text
    content: 'Que personne ne se trompe lui-même : si quelqu''un parmi vous se considère comme sage selon ce monde, qu''il devienne fou pour devenir sage. '
  '19':
  - type: note
    content: Jb 5.12s.
  - type: text
    content: 'En effet, la sagesse de ce monde est folie devant Dieu. Car il est écrit : '
  - type: text
    content: Il prend les sages à leur propre ruse
  - type: text
    content: '. '
  '2':
  - type: note
    content: 'donné  : litt. donné à boire. –  nourriture solide  : le même terme est traduit par aliment(s) en 6.13 ; 8.8,13 ; nourriture en 10.3. –  la supporter  : sous-entendu dans le texte ; cf. Hé 5.12-14 ; voir aussi 1P 2.2.'
  - type: text
    content: 'Je vous ai donné du lait ; non pas de la nourriture solide, car vous n''auriez pas pu la supporter ; d''ailleurs, maintenant même vous ne le pourriez pas, '
  '20':
  - type: note
    content: Ps 94.11.
  - type: text
    content: 'Et encore : '
  - type: text
    content: Le Seigneur connaît les raisonnements des
  - type: text
    content: ' sages, '
  - type: text
    content: il sait qu'ils sont futiles
  - type: text
    content: '. '
  '21':
  - type: note
    content: '1.29+. –  des hommes  : autre traduction des humains (cf. 1.25 ; 2.5,11). –  tout vous appartient…  : cf. 1.12n.'
  - type: text
    content: 'Que personne ne mette donc sa fierté dans des hommes ; car tout vous appartient, '
  '22':
  - type: note
    content: 'Paul / Apollos / Céphas 1.12+. –  le monde… Rm 8.38. –  le présent / l''avenir  : autre traduction les choses présentes / les choses à venir.'
  - type: text
    content: 'soit Paul, soit Apollos, soit Céphas, soit le monde, soit la vie, soit la mort, soit le présent, soit l''avenir. Tout vous appartient ; '
  '23':
  - type: note
    content: vous appartenez au Christ Rm 14.8 ; Ga 3.29 ; cf. Mc 9.41. –  le Christ appartient à Dieu 11.3 ; 15.28 ; Lc 3.38.
  - type: text
    content: mais vous, vous appartenez au Christ, et le Christ appartient à Dieu.
  '3':
  - type: note
    content: 'V. 1n  ; 1.10s ; Rm 13.13 ; Jc 3.14s. –  Ne vous comportez-vous pas…  : litt. ne marchez-vous pas selon l''humain ?'
  - type: text
    content: 'parce que vous êtes encore charnels. En effet, pour autant qu''il y a parmi vous des passions jalouses et des disputes, n''êtes-vous pas charnels ? Ne vous comportez-vous pas d''une manière tout humaine ? '
  '4':
  - type: note
    content: 1.12+.
  - type: text
    content: 'Quand l''un dit : « Moi, j''appartiens à Paul ! » et un autre : « Moi, à Apollos ! », êtes-vous autre chose que des humains ?'
  - type: heading
    content: Serviteurs de Dieu
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 12.4ss ; 15.11. –  Des serviteurs ou des ministres (12.5n) ; cf. 4.1 ; 2Co 3.6 ; 4.5 ; 11.27.
  - type: text
    content: 'Qu''est-ce donc qu''Apollos ? Qu''est-ce que Paul ? Des serviteurs, par l''entremise desquels vous êtes venus à la foi, selon ce que le Seigneur a accordé à chacun. '
  '6':
  - type: note
    content: Cf. Jr 1.10 ; Rm 9.16. –  Moi / Apollos Ac 18.4,11,24ss.
  - type: text
    content: 'Moi, j''ai planté, Apollos a arrosé, mais c''est Dieu qui faisait croître. '
  '7':
  - type: note
    content: 'qui importe  : litt. qui est quelque chose  ; cf. 8.2 ; 10.19n  ; Ga 2.6.'
  - type: text
    content: 'Ainsi, ce n''est pas celui qui plante qui importe, ni celui qui arrose, mais Dieu, qui fait croître. '
  '8':
  - type: note
    content: 'son propre salaire  : autre traduction sa propre récompense  ; cf. v. 14s ; même terme 9.17s. Sur le sens de salaire, cf. Mt 20.8 ; Lc 10.7 ; Jn 4.36 ; Ac 1.18 ; Rm 4.4 ; 1Tm 5.18 ; Jc 5.4 ; 2P 2.13,15 ; Jd 11. Sur le sens de récompense, cf. Mt 5.12+.'
  - type: text
    content: 'Celui qui plante et celui qui arrose ne sont qu''un, mais chacun recevra son propre salaire selon son propre travail. '
  '9':
  - type: note
    content: 'des collaborateurs  : terme apparenté au mot traduit par œuvre (ou travail) v. 13ss ; autre traduction nous sommes ensemble ouvriers de Dieu  ; cf. v. 23 ; même terme Ph 2.25 ; voir aussi Mc 16.20 ; Jn 6.28 ; 2Co 1.24n  ; 6.1 ; 1Th 3.2n  ; 3Jn 8n  ; le verbe correspondant est traduit par coopérer en Rm 8.28. –  le champ  : cf. Mt 13.3-9/ /,38. –  la construction ou l''édifice (cf. v. 16s) : un verbe apparenté est traduit par construire (sur, dessus) dans la suite ; autre verbe apparenté en 8.1n  ; cf. 14.3ss ; Ep 2.20s.'
  - type: text
    content: Car nous sommes des collaborateurs de Dieu. Vous êtes le champ de Dieu, la construction de Dieu.
