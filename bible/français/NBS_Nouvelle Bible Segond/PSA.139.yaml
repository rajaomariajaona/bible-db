document_id: PSA.139,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Seigneur, tu me connais parfaitement
  - type: text
    content: ' '
  - type: note
    content: 'tu m''as examiné à fond  : le verbe hébreu correspondant (aussi au v. 23) est traduit par découvrir en 44.22 ; cf. Jb 5.27n. –  tu me connais  : autre traduction tu sais  ; cf. v. 23 ; 7.9s ; 17.3ss ; 26.1ss ; 44.21s ; Jr 12.3 ; 17.9s ; voir aussi 1S 2.3 ; 1R 8.39 ; Rm 8.27 ; Hé 4.13 ; Siracide 17.19s : « Toutes leurs actions sont devant lui comme le soleil, ses regards observent continuellement leurs voies. Leurs injustices ne lui échappent pas, tous leurs péchés sont devant le Seigneur. » 23.19s : « Il (l''adultère) ignore que les yeux du Seigneur sont infiniment plus lumineux que le soleil, qu''ils observent toutes les démarches des hommes et pénètrent les plus secrets recoins. Avant d''être créées, toutes choses lui étaient connues, et il en va de même après leur achèvement. »'
  - type: text
    content: Du chef de chœur. De David. Psaume.
  - type: text
    content: Seigneur
  - type: text
    content: ', tu m''as examiné à fond, tu me connais ;'
  '10':
  - type: text
    content: là aussi ta main me conduira,
  - type: text
    content: ta main droite me saisira.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 12.22 ; 17.12 ; 24.13ss ; 34.21s ; 1Co 4.5. –  me submergeront  : litt. m''écraseront  ; d''après le témoignage de plusieurs versions anciennes, certains modifient le texte hébreu traditionnel pour lire me cacheront.'
  - type: text
    content: 'Si je dis : Au moins les ténèbres me submergeront,'
  - type: text
    content: la nuit devient lumière autour de moi ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Dn 2.22.
  - type: text
    content: même les ténèbres ne sont pas ténébreuses pour toi,
  - type: text
    content: la nuit s'illumine comme le jour,
  - type: text
    content: et les ténèbres comme la lumière.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 33.14s ; 94.9ss. –  produit  : cf. 78.54n  ; Gn 4.1n. –  les profondeurs de mon être  : litt. mes reins  ; cf. 7.10 ; 16.7n  ; 26.2 ; Jr 11.20 ; 17.10 ; 20.12. –  qui m''as tenu caché ou qui m''as ourdi  ; cf. v. 17 ; 71.6 ; 119.73 ; voir aussi Jb 10.8-12 ; Ec 11.5+.'
  - type: text
    content: C'est toi qui as produit les profondeurs de mon être,
  - type: text
    content: qui m'as tenu caché dans le ventre de ma mère.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'merveilleuse  : traduction approximative ; le texte hébreu semble comporter les deux nuances redoutable et étonnante (le terme traduit par étonnantes dans la suite fait assonance) ; on pourrait aussi comprendre j''ai été distingué de façon impressionnante  ; d''autres modifient le texte hébreu traditionnel pour lire tu as fait des choses redoutables  ; cf. 104.1 ; 111.2ss ; Ap 15.3.'
  - type: text
    content: Je te célèbre, car j'ai été fait de façon merveilleuse.
  - type: text
    content: Tes œuvres sont étonnantes,
  - type: text
    content: je le sais bien.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Mon corps  : litt. mon ossature ou ma force . –  dans les profondeurs de la terre  : cf. 90.2n  ; Gn 2.7 ; Jb 1.21.'
  - type: text
    content: Mon corps ne t'était pas caché
  - type: text
    content: lorsque j'ai été fait en secret,
  - type: text
    content: tissé dans les profondeurs de la terre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'une masse informe  : selon la tradition juive, le terme hébreu correspondant ( golem ) désigne ici l''embryon ; certains, d''après Syr, modifient cependant le texte hébreu traditionnel (interversion de deux consonnes) pour lire tes yeux voyaient tous mes actes, ils étaient tous inscrits sur ton livre  ; cf. 56.9 ; 69.29 ; Ex 32.32s ; Es 4.3 ; Dn 12.1 ; Ap 20.12. –  qui furent façonnés  : cf. Jb 14.5. –  avant…  : traduction incertaine ; cf. Es 41.22s ; 42.9 ; Jr 1.5 ; Ec 6.10.'
  - type: text
    content: Quand je n'étais qu'une masse informe, tes yeux me voyaient ;
  - type: text
    content: et sur ton livre étaient tous inscrits
  - type: text
    content: les jours qui furent façonnés,
  - type: text
    content: avant qu'aucun d'eux n'existe.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'V. 6+ ; 73.16 ; 92.6 ; Es 55.8 ; Jb 42.3. –  Dieu  : hébreu ’El , de même au v. 23 ; cf. Gn 21.33n. –  impénétrables  : le terme hébreu, qui signifie souvent précieux , peut aussi avoir le sens de difficile (cf. Dn 2.11, araméen). –  somme  : le mot hébreu correspondant signifie habituellement tête  ; certains comprennent leurs principes sont élevés.'
  - type: text
    content: Que tes pensées, ô Dieu, me semblent impénétrables !
  - type: text
    content: Que la somme en est grande !
  '18':
  - type: text
    content: ' '
  - type: note
    content: '40.6. –  grains de sable Gn 22.17 ; 32.13 ; 41.49 ; Jos 11.4 ; Jg 7.12 ; Os 2.1. –  Je m''éveille  : certains modifient légèrement le texte hébreu traditionnel pour lire si j''en avais fini, je serais encore avec toi  ; cf. 73.23.'
  - type: text
    content: Si je les compte,
  - type: text
    content: elles sont plus nombreuses que les grains de sable…
  - type: text
    content: Je m'éveille, et je suis encore avec toi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'méchant  : voir justice. –  Hommes sanguinaires 26.9n. –  écartez-vous 6.9+ ; 119.115.'
  - type: text
    content: O Dieu, si seulement tu faisais mourir le méchant !
  - type: text
    content: Hommes sanguinaires, écartez-vous de moi !
  '2':
  - type: text
    content: ' '
  - type: note
    content: quand je m'assieds… 2R 19.27 ; cf. Lm 3.63. –  de loin 11.4s ; 14.2 ; 33.13ss ; 102.20 ; 138.6 ; Jr 23.23s. –  ma pensée ou mes désirs, mes intentions  ; cf. 94.11 ; Am 4.13 ; 1Ch 28.9.
  - type: text
    content: toi, tu sais quand je m'assieds et quand je me lève,
  - type: text
    content: tu comprends de loin ma pensée ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'selon leur astuce ou en vue de leurs intrigues  ; cf. 10.4n. –  ils t''invoquent…  : texte obscur, litt. ils (se ?) lèvent pour l''illusion  ; la traduction, conjecturale, s''inspire d''Ex 20.7 ; on pourrait aussi comprendre ils se rebellent contre toi.'
  - type: text
    content: Ils parlent de toi selon leur astuce,
  - type: text
    content: ils t'invoquent pour tromper, eux, tes adversaires !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'pour ceux qui se dressent contre toi  : certains modifient le texte hébreu traditionnel pour lire ceux qui t''ont en dégoût (les deux formes sont graphiquement très proches) ; cf. 119.158 ; Ap 2.6.'
  - type: text
    content: Seigneur
  - type: text
    content: ', comment ne détesterais-je pas ceux qui te détestent,'
  - type: text
    content: comment n'aurais-je pas du dégoût pour ceux qui se dressent contre toi ?
  '22':
  - type: text
    content: Je les déteste totalement ;
  - type: text
    content: ils sont pour moi des ennemis.
  '23':
  - type: text
    content: ' '
  - type: note
    content: V. 1n  ; 7.10n  ; 26.2 ; Jr 6.27 ; Jb 23.10 ; 31.6. – Voir cœur.
  - type: text
    content: Examine-moi à fond, ô Dieu, et connais mon cœur !
  - type: text
    content: Sonde-moi, et connais mes préoccupations !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'une voie mauvaise  : litt. une voie de peine  ; le mot hébreu correspondant est souvent employé pour désigner par mépris les idoles, de sorte que l''expression pourrait signifier l''idolâtrie. –  conduis-moi 5.9+. –  la voie de toujours ou la voie d''autrefois, l''antique chemin  ; cf. 24.7s ; Jr 6.16n  ; 18.15 ; voir aussi Dt 32.17 ; on a aussi compris la voie de l''éternité.'
  - type: text
    content: Regarde si je suis sur une voie mauvaise,
  - type: text
    content: et conduis-moi sur la voie de toujours !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tu sais  : autres traductions tu montres ; tu exposes ; tu mesures  ; le même verbe a le sens de disséminer en 44.12 ; 106.27 ; cf. Jb 13.27 ; 31.4.'
  - type: text
    content: tu sais quand je marche et quand je me couche,
  - type: text
    content: et tu pénètres toutes mes voies.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 12.36.
  - type: text
    content: Car la parole n'est pas sur ma langue
  - type: text
    content: 'que déjà, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu la connais entièrement.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 17.28. –  Par-derrière et par-devant  : des versions anciennes ont rattaché ces mots au v. 4, en les interprétant dans un sens temporel  : (une parole) ancienne ou nouvelle. –  tu m''assièges  : cf. Dt 20.12,19 etc. ; autres traductions tu me cernes ; tu me serres (cf. Dt 14.25)  ; tu me façonnes (cf. Ex 32.4).'
  - type: text
    content: Par-derrière et par-devant, tu m'assièges
  - type: text
    content: et tu mets ta main sur moi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 17s ; Jb 11.6ss ; Rm 11.33.
  - type: text
    content: Cette connaissance étonnante me dépasse,
  - type: text
    content: elle est trop élevée pour que je puisse la saisir.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 29.15 ; Jr 23.24 ; Jon 1.3ss. –  pour échapper à ton souffle / pour t''échapper  : litt. loin de ton souffle (ou ton esprit ) / loin de ta face.'
  - type: text
    content: Où pourrais-je aller pour échapper à ton souffle,
  - type: text
    content: où pourrais-je fuir pour t'échapper ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Am 9.1ss ; cf. 2.14s ; 5.19s ; voir aussi Dt 30.4,12ss. –  au ciel  : cf. Gn 5.24 ; 2R 2.1ss. –  au séjour des morts  : cf. Jb 17.13ss ; 26.6.'
  - type: text
    content: Si je monte au ciel, tu y es ;
  - type: text
    content: si je me couche au séjour des morts, tu es encore là.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 55.7. –  au-delà de la mer  : cf. Jon 1.3.'
  - type: text
    content: Si je prends les ailes de l'aurore
  - type: text
    content: pour aller demeurer au-delà de la mer,
