      children:
      - type: text
        text: '17.19s : « Toutes leurs actions sont devant lui comme le soleil, ses regards observent continuellement leurs voies. Leurs injustices ne lui échappent pas, tous leurs péchés sont devant le Seigneur. » 23.19s : « Il (l''adultère) ignore que les yeux du Seigneur sont infiniment plus lumineux que le soleil, qu''ils observent toutes les démarches des hommes et pénètrent les plus secrets recoins. Avant d''être créées, toutes choses lui étaient connues, et il en va de même après leur achèvement. »'
    marker-yv: yv-n
  - type: text
    text: Du chef de chœur. De David. Psaume.
