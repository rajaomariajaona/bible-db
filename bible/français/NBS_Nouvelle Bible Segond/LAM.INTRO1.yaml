type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Les cinq poèmes qui composent le livre des Lamentations ont pour thème la '
  - type: text
    content: chute de Jérusalem
  - type: text
    content: ' en 587/6 av. J.-C., vue du côté des vaincus. Sous les coups de l''armée de Nabuchodonosor, le temple a été détruit ; une partie de la population a été exilée à Babylone, et Juda a cessé d''être un royaume indépendant. Le recueil s''enracine ainsi en un point précis d''une histoire particulière, lieu d''autant plus sensible que le malheur frappait de plein fouet ce que les Judéens considéraient depuis longtemps comme l''objet de l''élection et de la protection divines : le temple de Jérusalem et la dynastie royale de David. Cependant il atteint à l''universel par sa description de la souffrance humaine et la méditation sur son sens.'
  - type: text
    content: Les plus désespérés
  - type: text
    content: sont les chants les plus beaux,
  - type: text
    content: Et j'en sais d'immortels
  - type: text
    content: qui sont de purs sanglots,
  - type: text
    content: écrivait Alfred de Musset. Pour n'être pas désespérées (au contraire, et c'est essentiel !), les Lamentations ne sont pas moins parmi les plus beaux chants du monde.
  - type: text
    content: La poésie, travail de deuil
  - type: text
    content: 'L''émotion contenue s''approfondit et se communique. Le poète douloureux des Lamentations a plié ses sentiments, malgré leur violence, à la discipline d''une '
  - type: text
    content: forme
  - type: text
    content: ' étonnamment contraignante. D''où leur réussite artistique et la tension spirituelle qui s''en dégage.'
  - type: text
    content: 'Les quatre premiers poèmes (chapitres 1–4) appartiennent à un genre stéréotypé : celui de la '
  - type: text
    content: complainte
  - type: text
    content: ', élégie ou lamentation funèbre — ce qui correspond au titre habituel de l''ouvrage. Les pleureuses, lors des cérémonies de deuil, chantaient les mérites du disparu et l''immensité de la perte ; souvent elles lançaient en hébreu un '
  - type: text
    content: '`eik(a) !'
  - type: text
    content: ' ('
  - type: text
    content: Comment !
  - type: text
    content: ') exprimant à la fois stupeur et affliction. Ainsi se lamente David à la mort de Saül et de Jonathan : '
  - type: text
    content: Comment ! Des héros sont tombés !
  - type: text
    content: ' (2S 1.19). C''est ce que font ici le chapitre 1, où Jérusalem apparaît sous les traits d''une veuve effondrée, le chapitre 2, qui décrit les détails de la catastrophe comme autant de châtiments divins, et le chapitre 4, sur la douleur du peuple affamé.'
  - type: text
    content: 'Le '
  - type: text
    content: rythme
  - type: text
    content: ' de la lamentation ('
  - type: text
    content: qina
  - type: text
    content: ' en hébreu) se caractérise par sa dissymétrie, le second stique du vers comportant moins de syllabes accentuées que le premier. Boiteux, en quelque sorte, avec une chute du ton, il est bien fait pour exprimer la tristesse, la détresse intériorisée. Les quatre premiers chapitres s''y soumettent presque tout au long.'
  - type: text
    content: 'Ce n''est pas tout. Ils sont aussi '
  - type: text
    content: alphabétiques
  - type: text
    content: '. Les 22 versets commencent chacun par une lettre différente, reconstituant l''alphabet hébreu de 22 lettres — '
  - type: text
    content: '`eika'
  - type: text
    content: ' fournit ainsi la première ('
  - type: text
    content: '`aleph'
  - type: text
    content: '). Le chapitre 3, sans '
  - type: text
    content: '`eika,'
  - type: text
    content: ' où la complainte se fait plus individuelle, est triplement alphabétique : les trois premiers versets commencent par '
  - type: text
    content: '`aleph,'
  - type: text
    content: ' les trois suivants par '
  - type: text
    content: beth,
  - type: text
    content: ' etc. Le chapitre 5, prière instante ('
  - type: text
    content: ramène-nous !
  - type: text
    content: '), n''est pas une '
  - type: text
    content: qina
  - type: text
    content: ' et n''est pas alphabétique, mais il contient lui aussi 22 versets (22 distiques), ce qui fait un total de 7 x 22 pour le livre entier : ce chiffre a probablement valeur symbolique.'
  - type: text
    content: 'Une '
  - type: text
    content: symétrie
  - type: text
    content: ' calculée apparaît. On l''a parfois repérée à l''intérieur d''un chapitre (p. ex., les deuxième et avant-dernier versets du chapitre 1 se correspondent), mais surtout dans le livre globalement considéré : les poèmes 1 et 5 résument le désastre, les poèmes 2 et 4 le détaillent, et le chapitre 3, triple et central, montre l''homme de Dieu reprenant espoir et se remémorant '
  - type: text
    content: que la fidélité du Seigneur n'est pas épuisée, que sa compassion n'est pas à son terme
  - type: text
    content: ' (3.22).'
  - type: text
    content: A ce point, la thérapie par l'œuvre d'art est dépassée ; le travail du poète se fait exercice spirituel.
  - type: text
    content: Recherche en paternité
  - type: text
    content: '«  '
  - type: text
    content: Le poète
  - type: text
    content: '  » ? Pourquoi ne pas dire '
  - type: text
    content: Jérémie
  - type: text
    content: ', selon la coutume ? La version grecque de l''Ancien Testament (LXX*), suivie par la Vulgate latine (Vg*), attribue les Lamentations à Jérémie et les joint à son livre. Dans la Bible hébraïque, les poèmes sont séparés du livre prophétique et constituent, parmi les Ecrits, l''un des cinq Rouleaux ('
  - type: text
    content: Megilloth
  - type: text
    content: ') ; on le lit en effet au cours d''une des cinq solennités annuelles, le 9 du mois d''Ab, où l''on commémore à la fois la destruction du premier temple par le roi de Babylone (587 av. J.-C.) et celle du second temple par Titus (70 apr. J.-C.). Pourtant la tradition juive voit en Jérémie l''auteur, ainsi que l''attestent les targums (Tg* : traductions et paraphrases en araméen pour la lecture dans les synagogues), le '
  - type: text
    content: Talmud*
  - type: text
    content: ' et l''historien Flavius Josèphe*.'
  - type: text
    content: 'Plusieurs aujourd''hui rejettent cette attribution. Pour eux, l''auteur, témoin oculaire du malheur de Jérusalem (comme Jérémie), est resté '
  - type: text
    content: anonyme
  - type: text
    content: '. Jérémie n''aurait pas été, plaident-ils, l''homme d''une poésie aussi apprêtée. Surtout, on l''imagine mal, lui qui avait dénoncé l''illusion de l''alliance égyptienne (Jr 37.5ss), avouer avoir attendu en vain le secours de ce côté (Lm 4.17) ; lui qui savait la faiblesse du falot Sédécias et le sort qui l''attendait (Jr 24.8), l''appeler '
  - type: text
    content: celui qui était notre vie, l'homme qui avait reçu l'onction du Seigneur avait conféré l'onction
  - type: text
    content: ' (Lm 4.20) ; lui qui avait proclamé le principe de la responsabilité individuelle (Jr 31.29-30), revenir au schéma de la culpabilité collective (Lm 5.7). Quelqu''un est allé jusqu''à parler de Lamentations « contre Jérémie ».'
  - type: text
    content: 'D''autres rétorquent que le prophète a bien composé, dans les règles, une complainte sur la mort de Josias (2Ch 35.25). Au chapitre 4 des Lamentations, estiment-ils, Jérémie ne parlerait pas en son nom propre, mais au nom de la nation ; une fois le malheur advenu comme il l''avait prédit, il éviterait de se désolidariser de ses concitoyens. En Jérémie 31, l''insistance sur la responsabilité individuelle est liée à la promesse de la nouvelle alliance ; cela n''exclut pas la dimension collective du châtiment de 587/6. Jérémie fait bel et bien de l''apostasie des pères la cause de ce châtiment (Jr 16.11), en y ajoutant aussitôt le péché de sa propre génération (Jr 16.12) ; le poète des Lamentations fait de même (5.16). Positivement, il y a des '
  - type: text
    content: ressemblances
  - type: text
    content: ' nombreuses et frappantes de style et de phraséologie entre les Lamentations et Jérémie. On peut remarquer, par exemple, la proximité de 1.2, '
  - type: text
    content: de tous ceux qui l'aimaient, personne ne la console,
  - type: text
    content: ' avec Jr 30.14 ; de 1.16 et 2.11, les larmes intarissables, avec Jr 9.9,17 ; de 4.21,'
  - type: text
    content: à toi aussi on passera la coupe
  - type: text
    content: ' (de la condamnation), avec Jr 49.12, visant également Edom. Le poème central du chapitre 3 est tout proche des « confessions » de Jérémie (voir l''introduction à Jérémie, p.${Xconfssjr}), et les versets 53ss pourraient même évoquer un épisode particulier de sa biographie (Jérémie dans la citerne, cf. Jr 38).'
  - type: text
    content: Le Dieu de l'espérance
  - type: text
    content: Le message du livre se découvre d'abord dans l'
  - type: text
    content: attitude
  - type: text
    content: ' et la '
  - type: text
    content: démarche
  - type: text
    content: ' mêmes du poète. Sous le choc de la catastrophe, qui a frappé toutes les catégories de la population et provoqué des scènes insoutenables (4.10), celui-ci ne se laisse pas engloutir par sa souffrance ; il ne reste pas prostré, anéanti de stupeur ; il ne se dissout pas dans l''apitoiement sur soi. Il assume, il discerne, il prie.'
  - type: text
    content: 'Il assume les '
  - type: text
    content: responsabilités
  - type: text
    content: ' de son peuple et appelle ses compatriotes à faire de même. Il discerne dans la ruine la punition des crimes : la nation de Juda est châtiée parce qu''elle a failli à sa vocation de nation sainte et de peuple élu. Elle a bafoué la sainteté du Dieu dont elle porte le nom. Le malheur est le fruit de la révolte, de la désobéissance, de l''incrédulité, du péché. Il faut avoir le courage de le reconnaître (3.39'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: Justement, si cette vérité est reconnue, le châtiment mérité recèle une ultime grâce, une grâce de recommencement ou de renouvellement. On peut et on doit y entendre un appel divin à la confession et à la conversion (3.40), qui fait rebondir l'
  - type: text
    content: espérance
  - type: text
    content: .
  - type: text
    content: 'Cette espérance trouve son fondement dans la nature même de '
  - type: text
    content: Dieu
  - type: text
    content: ', fondement que la pire des catastrophes ne peut ébranler. Dieu est extraordinairement présent dans le livre des Lamentations, 49 fois nommé ('
  - type: text
    content: YHWH
  - type: text
    content: ' lu '
  - type: text
    content: le Seigneur,
  - type: text
    content: ' 32 fois ; '
  - type: text
    content: le Seigneur,
  - type: text
    content: ' 14 ; '
  - type: text
    content: le Très-Haut,
  - type: text
    content: ' 2 ; '
  - type: text
    content: Dieu [El],
  - type: text
    content: ' 1). Sa souveraineté s''affirme avec force (3.37s), en même temps que sa justice : c''est pourquoi l''oppression de l''ennemi s''interprète comme la main de Dieu pesant sur son peuple pour exécuter ses jugements. Mais sa compassion et sa fidélité n''en sont pas moins certaines, ainsi que son désir de consoler les humains meurtris par leur faute (3.22ss). Si le Seigneur doit parfois faire figure d''adversaire implacable à cause du péché de son peuple, '
  - type: text
    content: car ce n'est pas volontiers qu'il afflige les humains et qu'il leur cause du chagrin
  - type: text
    content: ' (3.33, texte capital sur la relation de Dieu au mal), son dessein reste de faire grâce. Même le changement radical et authentique qu''il exige vient de lui ; c''est lui qui en prend l''initiative dans le cœur des siens : '
  - type: text
    content: Ramène-nous à toi, Seigneur, et nous reviendrons
  - type: text
    content: ' (5.21).'
  - type: text
    content: En vérité, que Jérémie soit ou non l'auteur des Lamentations, ces poèmes de courage, de lucidité et de foi ne sont pas des « jérémiades » !
