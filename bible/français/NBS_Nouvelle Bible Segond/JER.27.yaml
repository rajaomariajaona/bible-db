- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la soumission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 28.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; ce v. est omis par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '  ; à la place de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joïaqim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', certains mss hébreux et les versions syriaque et arabe portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 3,12 ; 1.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Au commencement du règne de Joïaqim, fils de Josias, roi de Juda, cette parole parvint à Jérémie de la part du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 13.1+ ; Es 20.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: barres de joug
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot qui apparaît ici, et qui sera simplement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'barre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 28.10,12s, peut s''appliquer à une pièce de bois utilisée par des humains, en particulier des esclaves, pour porter de lourdes charges ; le mot qui désigne habituellement le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'joug '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de l'animal figure en 2.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 5.5 ; 27.8,11s ; 28.2,4,11,14 ; 30.8 ; les deux termes sont associés en Lv 26.13 ; celui qui est traduit ici par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'barre (de joug) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'joug '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Es 58.6,9 ; Ez 30.18 ; 34.27 ; un terme très proche est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brancard '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Nb 4.10,12, par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'perche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Nb 13.23 et par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'joug '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Na 1.13.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi m''a parlé le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Fais-toi des liens et des barres de joug et mets-les sur ton cou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu en enverras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu les enverras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu enverras des messagers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Edom…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit des nations liguées avec Juda contre Babylone ; cf. 25.21+,22+.'
    marker-yv: yv-n
  - type: text
    text: 'Tu en enverras au roi d''Edom, au roi de Moab, au roi des Ammonites, au roi de Tyr et au roi de Sidon, par l''intermédiaire des messagers qui sont venus à Jérusalem auprès de Sédécias, roi de Juda ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et à qui tu donneras mes ordres pour leurs maîtres, en disant : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Voici ce que vous direz à vos maîtres : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 10.12 ; 21.5+ ; 32.17,21 ; 51.15 ; Es 45.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: me convient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est droit à mes yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dn 4.14 ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à qui il me convient de la donner.
    marker-yv: yv-n
  - type: text
    text: 'C''est moi qui ai fait la terre, les humains et les bêtes qui sont sur la terre par ma grande puissance, par mon bras étendu, et je donne la terre à qui me convient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.9+ ; 28.14 ; cf. Dn 2.38+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'ai livré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'donner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 5, de même au v. 8 ; cf. v. 11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 9.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour qu'ils lui soient soumis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on aurait aussi pu traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour qu'ils le servent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même aux versets suivants.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, moi, j''ai livré tous ces pays à Nabuchodonosor, roi de Babylone, mon serviteur ; je lui ai même livré les animaux sauvages, pour qu''ils lui soient soumis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Absent de LXX. – Cf. 25.11 ; Ha 2.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''à ce que… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.14,26.
    marker-yv: yv-n
  - type: text
    text: 'Toutes les nations lui seront soumises, à lui, à son fils et à son petit-fils, jusqu''à ce que le temps de son pays vienne aussi et que des nations puissantes et de grands rois le soumettent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 13 ; 21.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ferai rendre des comptes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 15.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'famine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.12+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'totalement détruite par sa main '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, d''après certaines versions anciennes, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'livrée dans sa main '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à ce que je la lui aie livrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. 24.10.
    marker-yv: yv-n
  - type: text
    text: 'Si une nation, si un royaume ne se soumet pas à Nabuchodonosor, roi de Babylone, et ne livre pas son cou au joug du roi de Babylone, je ferai rendre des comptes à cette nation par l''épée, par la famine et par la peste – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – jusqu''à ce que je l''aie totalement détruite par sa main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 14 ; 23.16+,17 ; Ez 13.2-23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos propres rêves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vos rêveurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vos faiseurs de rêves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 23.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chercheurs de présages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 19.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 2.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quant à vous, n''écoutez pas vos prophètes, vos devins, vos propres rêves, vos chercheurs de présages, vos sorciers, eux qui vous disent : « Vous ne serez pas soumis au roi de Babylone ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 15 ; cf. 13.25+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de votre terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de dessus votre sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 11 ; Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car c''est le mensonge qu''ils vous annoncent en prophètes, afin de vous éloigner de votre terre, pour que je vous bannisse et que vous disparaissiez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: placera son cou…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se soumettra volontairement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se soumettra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cultive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ces deux verbes traduisent deux sens distincts du même verbe hébreu (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: servir le roi / servir la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sa terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : cf. 42.12.'
    marker-yv: yv-n
  - type: text
    text: 'Mais à la nation qui placera son cou sous le joug du roi de Babylone et qui se soumettra à lui, j''accorderai le repos sur sa terre, – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – pour qu''elle la cultive et qu''elle s''y installe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.3ss ; 32.1ss ; 37.6ss ; cf. 38.17 ; 40.9.
    marker-yv: yv-n
  - type: text
    text: 'C''est exactement ce que j''ai dit à Sédécias, roi de Juda : Placez votre cou sous le joug du roi de Babylone, soumettez-vous à lui et à son peuple, et vous vivrez ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 8 ; ce v. est omis par LXX.
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi devriez-vous mourir, toi et ton peuple, par l''épée, par la famine et par la peste, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''a dit à la nation qui ne se soumettra pas au roi de Babylone ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 9s.
    marker-yv: yv-n
  - type: text
    text: 'N''écoutez pas les paroles des prophètes qui vous disent : « Vous n''aurez pas à vous soumettre au roi de Babylone ! » Car c''est le mensonge qu''ils vous annoncent en prophètes ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''ils parlent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parlent en prophètes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent un même verbe hébreu, également rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: annoncer en prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10,14,16 ; voir 2.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je ne les ai pas envoyés – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – et c''est pour mentir qu''ils parlent en mon nom, afin que je vous bannisse et que vous disparaissiez, vous et les prophètes qui vous parlent en prophètes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 9 ; cf. 28.3s ; 2R 24.13-16.
    marker-yv: yv-n
  - type: text
    text: 'J''ai dit aux prêtres et à tout ce peuple : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : N''écoutez pas les paroles de vos prophètes qui vous annoncent : « Les objets de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' seront rapportés de Babylone, bientôt maintenant ! », car c''est le mensonge qu''ils vous annoncent en prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une ruine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.10+ ; ce v. est omis par LXX.
    marker-yv: yv-n
  - type: text
    text: 'Ne les écoutez pas, soumettez-vous au roi de Babylone, et vous vivrez. Pourquoi cette ville deviendrait-elle une ruine ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils intercèdent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.16+ ; 15.1.'
    marker-yv: yv-n
  - type: text
    text: 'S''ils sont prophètes et si la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est avec eux, qu''ils intercèdent donc auprès du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées pour que les objets qui sont restés dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dans la maison du roi de Juda et dans Jérusalem, ne s''en aillent pas à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 7.15-40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voici ce que dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la formule correspondante (aussi v. 21) est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi parle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (p. ex. v. 16).
    marker-yv: yv-n
  - type: text
    text: 'Car voici ce que dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées au sujet des colonnes, de la Mer, des bases, et des autres objets qui sont restés dans cette ville, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jékonia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . Sur l'ensemble, cf. 28.3s ; 52.17ss ; 2R 25.13-15.
    marker-yv: yv-n
  - type: text
    text: 'qui n''ont pas été pris par Nabuchodonosor, roi de Babylone, lorsqu''il exila de Jérusalem à Babylone Jékonia, fils de Joïaqim, roi de Juda, et tous les notables de Juda et de Jérusalem ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce v. est omis par LXX.
    marker-yv: yv-n
  - type: text
    text: 'voici ce que dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël, contre les objets qui sont restés dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dans la maison du roi de Juda et dans Jérusalem : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''interviendrai pour eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je les ferai monter… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 23.3+ ; Esd 1.7-11 ; 7.19.
    marker-yv: yv-n
  - type: text
    text: 'Ils seront emportés à Babylone et ils y resteront jusqu''au jour où j''interviendrai pour eux, – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – où je les ferai monter et revenir en ce lieu.'
