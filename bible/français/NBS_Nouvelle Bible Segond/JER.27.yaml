document_id: JER.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à la soumission
  - type: text
    content: ' '
  - type: note
    content: 26.1n  ; cf. 28.1n  ; ce v. est omis par LXX  ; à la place de Joïaqim , certains mss hébreux et les versions syriaque et arabe portent Sédécias (cf. v. 3,12 ; 1.3n).
  - type: text
    content: 'Au commencement du règne de Joïaqim, fils de Josias, roi de Juda, cette parole parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '10':
  - type: note
    content: 'V. 15 ; cf. 13.25+. –  de votre terre  : litt. de dessus votre sol  ; cf. v. 11 ; Gn 2.5n.'
  - type: text
    content: 'Car c''est le mensonge qu''ils vous annoncent en prophètes, afin de vous éloigner de votre terre, pour que je vous bannisse et que vous disparaissiez. '
  '11':
  - type: note
    content: 'placera son cou…  : c.-à-d. se soumettra volontairement, de même au v. 12. –  se soumettra / cultive  : ces deux verbes traduisent deux sens distincts du même verbe hébreu (litt. servir le roi / servir la terre  ; cf. v. 6n). –  sa terre (litt. son sol, cf. v. 10n) : cf. 42.12.'
  - type: text
    content: 'Mais à la nation qui placera son cou sous le joug du roi de Babylone et qui se soumettra à lui, j''accorderai le repos sur sa terre, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – pour qu''elle la cultive et qu''elle s''y installe.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: à Sédécias 21.3ss ; 32.1ss ; 37.6ss ; cf. 38.17 ; 40.9.
  - type: text
    content: 'C''est exactement ce que j''ai dit à Sédécias, roi de Juda : Placez votre cou sous le joug du roi de Babylone, soumettez-vous à lui et à son peuple, et vous vivrez ! '
  '13':
  - type: note
    content: V. 8 ; ce v. est omis par LXX.
  - type: text
    content: 'Pourquoi devriez-vous mourir, toi et ton peuple, par l''épée, par la famine et par la peste, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit à la nation qui ne se soumettra pas au roi de Babylone ? '
  '14':
  - type: note
    content: V. 9s.
  - type: text
    content: 'N''écoutez pas les paroles des prophètes qui vous disent : « Vous n''aurez pas à vous soumettre au roi de Babylone ! » Car c''est le mensonge qu''ils vous annoncent en prophètes ! '
  '15':
  - type: note
    content: 14.14+. –  qu'ils parlent et parlent en prophètes traduisent un même verbe hébreu, également rendu par annoncer en prophètes  ; cf. v. 10,14,16 ; voir 2.8n.
  - type: text
    content: 'Je ne les ai pas envoyés – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et c''est pour mentir qu''ils parlent en mon nom, afin que je vous bannisse et que vous disparaissiez, vous et les prophètes qui vous parlent en prophètes.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 9 ; cf. 28.3s ; 2R 24.13-16.
  - type: text
    content: 'J''ai dit aux prêtres et à tout ce peuple : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : N''écoutez pas les paroles de vos prophètes qui vous annoncent : « Les objets de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' seront rapportés de Babylone, bientôt maintenant ! », car c''est le mensonge qu''ils vous annoncent en prophètes. '
  '17':
  - type: note
    content: une ruine 9.10+ ; ce v. est omis par LXX.
  - type: text
    content: 'Ne les écoutez pas, soumettez-vous au roi de Babylone, et vous vivrez. Pourquoi cette ville deviendrait-elle une ruine ? '
  '18':
  - type: note
    content: 'qu''ils intercèdent  : cf. 7.16+ ; 15.1.'
  - type: text
    content: 'S''ils sont prophètes et si la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec eux, qu''ils intercèdent donc auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées pour que les objets qui sont restés dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la maison du roi de Juda et dans Jérusalem, ne s''en aillent pas à Babylone. '
  '19':
  - type: note
    content: 'Cf. 1R 7.15-40. –  voici ce que dit  : la formule correspondante (aussi v. 21) est habituellement traduite par ainsi parle (p. ex. v. 16).'
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées au sujet des colonnes, de la Mer, des bases, et des autres objets qui sont restés dans cette ville, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.1+ ; Es 20.3. –  barres de joug  : le mot qui apparaît ici, et qui sera simplement traduit par barre en 28.10,12s, peut s''appliquer à une pièce de bois utilisée par des humains, en particulier des esclaves, pour porter de lourdes charges ; le mot qui désigne habituellement le joug de l''animal figure en 2.20n  ; 5.5 ; 27.8,11s ; 28.2,4,11,14 ; 30.8 ; les deux termes sont associés en Lv 26.13 ; celui qui est traduit ici par barre (de joug) est rendu par joug en Es 58.6,9 ; Ez 30.18 ; 34.27 ; un terme très proche est traduit par brancard en Nb 4.10,12, par perche en Nb 13.23 et par joug en Na 1.13.'
  - type: text
    content: 'Ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Fais-toi des liens et des barres de joug et mets-les sur ton cou. '
  '20':
  - type: note
    content: Jékonia 22.24n. Sur l'ensemble, cf. 28.3s ; 52.17ss ; 2R 25.13-15.
  - type: text
    content: 'qui n''ont pas été pris par Nabuchodonosor, roi de Babylone, lorsqu''il exila de Jérusalem à Babylone Jékonia, fils de Joïaqim, roi de Juda, et tous les notables de Juda et de Jérusalem ; '
  '21':
  - type: note
    content: Ce v. est omis par LXX.
  - type: text
    content: 'voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël, contre les objets qui sont restés dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la maison du roi de Juda et dans Jérusalem : '
  '22':
  - type: note
    content: j'interviendrai pour eux 6.15n. –  je les ferai monter… cf. 23.3+ ; Esd 1.7-11 ; 7.19.
  - type: text
    content: 'Ils seront emportés à Babylone et ils y resteront jusqu''au jour où j''interviendrai pour eux, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où je les ferai monter et revenir en ce lieu.'
  '3':
  - type: note
    content: 'Tu en enverras  : litt. tu les enverras  ; certains modifient le texte hébreu traditionnel pour lire tu enverras des messagers. –  Edom…  : il s''agit des nations liguées avec Juda contre Babylone ; cf. 25.21+,22+.'
  - type: text
    content: 'Tu en enverras au roi d''Edom, au roi de Moab, au roi des Ammonites, au roi de Tyr et au roi de Sidon, par l''intermédiaire des messagers qui sont venus à Jérusalem auprès de Sédécias, roi de Juda ; '
  '4':
  - type: text
    content: 'et à qui tu donneras mes ordres pour leurs maîtres, en disant : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Voici ce que vous direz à vos maîtres : '
  '5':
  - type: note
    content: 'Cf. 10.12 ; 21.5+ ; 32.17,21 ; 51.15 ; Es 45.12. –  la terre ou le pays. –  me convient  : litt. est droit à mes yeux  ; cf. Dn 4.14 ; on pourrait aussi comprendre à qui il me convient de la donner.'
  - type: text
    content: 'C''est moi qui ai fait la terre, les humains et les bêtes qui sont sur la terre par ma grande puissance, par mon bras étendu, et je donne la terre à qui me convient. '
  '6':
  - type: note
    content: '25.9+ ; 28.14 ; cf. Dn 2.38+. –  j''ai livré  : le même verbe est traduit par donner au v. 5, de même au v. 8 ; cf. v. 11n  ; Gn 9.2n. –  pour qu''ils lui soient soumis  : on aurait aussi pu traduire pour qu''ils le servent, de même aux versets suivants.'
  - type: text
    content: 'Maintenant, moi, j''ai livré tous ces pays à Nabuchodonosor, roi de Babylone, mon serviteur ; je lui ai même livré les animaux sauvages, pour qu''ils lui soient soumis. '
  '7':
  - type: note
    content: Absent de LXX. – Cf. 25.11 ; Ha 2.5. –  jusqu'à ce que… 25.14,26.
  - type: text
    content: 'Toutes les nations lui seront soumises, à lui, à son fils et à son petit-fils, jusqu''à ce que le temps de son pays vienne aussi et que des nations puissantes et de grands rois le soumettent. '
  '8':
  - type: note
    content: 'V. 13 ; 21.9. –  ferai rendre des comptes…  : cf. 6.15n  ; 15.3n. –  épée / famine / peste 14.12+. –  totalement détruite par sa main ou, d''après certaines versions anciennes, livrée dans sa main (c.-à-d. jusqu''à ce que je la lui aie livrée) ; cf. 24.10.'
  - type: text
    content: 'Si une nation, si un royaume ne se soumet pas à Nabuchodonosor, roi de Babylone, et ne livre pas son cou au joug du roi de Babylone, je ferai rendre des comptes à cette nation par l''épée, par la famine et par la peste – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – jusqu''à ce que je l''aie totalement détruite par sa main. '
  '9':
  - type: note
    content: 'V. 14 ; 23.16+,17 ; Ez 13.2-23. –  vos propres rêves  : des versions anciennes ont lu vos rêveurs ou vos faiseurs de rêves  ; cf. 23.28. –  chercheurs de présages Lv 19.26n  ; Es 2.6n.'
  - type: text
    content: 'Quant à vous, n''écoutez pas vos prophètes, vos devins, vos propres rêves, vos chercheurs de présages, vos sorciers, eux qui vous disent : « Vous ne serez pas soumis au roi de Babylone ! » '
