        text: ) ; verbe apparenté en 19.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 23.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 3.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
