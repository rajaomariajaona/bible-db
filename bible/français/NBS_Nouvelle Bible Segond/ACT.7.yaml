    marker-yv: yv-n
  - type: text
    text: 'Etienne répondit : Mes frères, mes pères, écoutez ! Le Dieu glorieux est apparu à Abraham, notre père, lorsqu''il était en Mésopotamie, avant qu''il habite Harrân, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gn 12.1.
    marker-yv: yv-n
  - type: text
    text: 'et il lui a dit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sors de ton pays et de ta famille, et va dans le pays que je te montrerai
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 11.32
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.5.'
    marker-yv: yv-n
  - type: text
    text: 'Il est alors sorti du pays des Chaldéens et il a habité Harrân. De là, après la mort de son père, Dieu l''a fait passer dans ce pays que vous habitez maintenant ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'héritage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: patrimoine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas même de quoi poser un pied
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 2.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la possession… '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.7 ; 13.15 ; 17.8 ; 24.7 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '48.4'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas d''enfant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 16.1 ; Rm 4.18-22.
    marker-yv: yv-n
  - type: text
    text: 'il ne lui a donné aucun héritage dans ce pays, pas même de quoi poser un pied, mais il a promis de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lui en donner la possession, ainsi qu'à sa descendance après lui
  - type: text
    text: '  – alors qu''il n''avait pas d''enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gn 15.13s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 2.22 ; 12.40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sa descendance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sera exilée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: immigrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 29 ; terme apparenté en 13.17 ; cf. Ep 2.19 ; Hé 11.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1P 1.17 ; 2.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu a parlé ainsi : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sa descendance sera exilée dans un pays étranger ; on la réduira en esclavage et on la maltraitera pendant quatre cents ans
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans ce lieu-ci
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 48s ; 6.13s+ ; Ex 3.12.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mais la nation dont ils auront été les esclaves, c'est moi qui la jugerai,
  - type: text
    text: ' dit Dieu ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: après cela, ils sortiront
  - type: text
    text: ' et me rendront un culte dans ce lieu-ci. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu lui a donné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il lui a donné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
      - type: text
        text: ' de la '
      - type: usfm
        marker: w
        children:
