          text: circoncision
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 17.10-14 ; 21.4 ; 25.26 ; 29.31–30.24 ; 35.16-18 ; 1Ch 1.34. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abraham a engendré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a engendré.
    marker-yv: yv-n
  - type: text
    text: Puis Dieu lui a donné l'alliance de la circoncision ; ainsi Abraham a engendré Isaac et l'a circoncis le huitième jour ; Isaac a fait de même pour Jacob, et Jacob pour les douze patriarches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 37.11,28 ; 45.4 ; Ps 105.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour qu'on l'emmène
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu était avec lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 39.2s,21,23.
    marker-yv: yv-n
  - type: text
    text: 'Les patriarches, jaloux de Joseph, l''ont vendu pour qu''on l''emmène en Egypte. Mais Dieu était avec lui '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'a délivré de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'a arraché à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même verbe v. 34 ; 12.11 ; 23.27 ; 26.17 ; Mt 5.29 ; Ga 1.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détresses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : v. 11 ; 11.19+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant le pharaon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 41.1-46. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui l'a nommé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui l''a institué dirigeant sur l''Egypte et sur toute sa maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 41.43 ; 45.8 ; Ps 105.21.
    marker-yv: yv-n
  - type: text
    text: 'et il l''a délivré de toutes ses détresses ; il lui a accordé grâce et sagesse devant le pharaon, le roi d''Egypte, qui l''a nommé dirigeant de l''Egypte et de toute sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'famine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 41.54-57 ; 42.5 ; Ps 37.19.
    marker-yv: yv-n
  - type: text
    text: 'Or une famine est survenue dans toute l''Egypte et en Canaan. La détresse était grande, et nos pères ne trouvaient pas de quoi se nourrir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 42.1s.
    marker-yv: yv-n
  - type: text
    text: 'Jacob a appris qu''il y avait du blé en Egypte et il y a envoyé nos pères une première fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 45.1-4,16.
    marker-yv: yv-n
  - type: text
    text: 'La seconde fois, Joseph s''est fait reconnaître de ses frères, et l''origine de Joseph est devenue manifeste pour le pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 45.9-11,18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'soixante-quinze personnes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), selon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' en Gn 46.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 1.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Dt 10.22.'
    marker-yv: yv-n
  - type: text
    text: 'Puis Joseph a envoyé chercher Jacob, son père, et toute la famille, composée de soixante-quinze personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 46.3-6 ; 49.33 ; Ex 1.6 ; Dt 26.5.
    marker-yv: yv-n
  - type: text
    text: 'Jacob est descendu en Egypte, et il est mort, ainsi que nos pères ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Hamor, à Sichem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Hamor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ?) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Sichem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ce v. organise de façon originale divers éléments issus de l'A.T. (cf. Gn 23.16ss ; 33.18s ; 49.29s ; 50.7-13 ; Jos 13.32 ; 24.32).
    marker-yv: yv-n
  - type: text
    text: ils ont été transportés à Sichem et mis dans le tombeau qu'Abraham avait acheté, à prix d'argent, aux fils de Hamor, à Sichem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 47.27 ; Ex 1.7,20 ; Ps 105.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'était engagé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
