document_id: ACT.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le discours d'Etienne
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.16-41. –  grand prêtre  : cf. Lc 3.2n. –  En est-il bien ainsi ? 17.11 ; 24.9.'
  - type: text
    content: 'Le grand prêtre dit alors : En est-il bien ainsi ?'
  '10':
  - type: note
    content: 'l''a délivré de  : autre traduction l''a arraché à, même verbe v. 34 ; 12.11 ; 23.27 ; 26.17 ; Mt 5.29 ; Ga 1.4. –  détresses  : v. 11 ; 11.19+. – Voir grâce. –  devant le pharaon Gn 41.1-46. –  qui l''a nommé…  : litt. qui l''a institué dirigeant sur l''Egypte et sur toute sa maison Gn 41.43 ; 45.8 ; Ps 105.21.'
  - type: text
    content: 'et il l''a délivré de toutes ses détresses ; il lui a accordé grâce et sagesse devant le pharaon, le roi d''Egypte, qui l''a nommé dirigeant de l''Egypte et de toute sa maison. '
  '11':
  - type: note
    content: famine Gn 41.54-57 ; 42.5 ; Ps 37.19.
  - type: text
    content: 'Or une famine est survenue dans toute l''Egypte et en Canaan. La détresse était grande, et nos pères ne trouvaient pas de quoi se nourrir. '
  '12':
  - type: note
    content: Gn 42.1s.
  - type: text
    content: 'Jacob a appris qu''il y avait du blé en Egypte et il y a envoyé nos pères une première fois. '
  '13':
  - type: note
    content: Gn 45.1-4,16.
  - type: text
    content: 'La seconde fois, Joseph s''est fait reconnaître de ses frères, et l''origine de Joseph est devenue manifeste pour le pharaon. '
  '14':
  - type: note
    content: Gn 45.9-11,18s. –  soixante-quinze personnes (2.41n), selon LXX en Gn 46.27n  ; Ex 1.5n  ; cf. Dt 10.22.
  - type: text
    content: 'Puis Joseph a envoyé chercher Jacob, son père, et toute la famille, composée de soixante-quinze personnes. '
  '15':
  - type: note
    content: Gn 46.3-6 ; 49.33 ; Ex 1.6 ; Dt 26.5.
  - type: text
    content: 'Jacob est descendu en Egypte, et il est mort, ainsi que nos pères ; '
  '16':
  - type: note
    content: 'de Hamor, à Sichem  : certains mss portent de Hamor, (fils  ?) de Sichem. Ce v. organise de façon originale divers éléments issus de l''A.T. (cf. Gn 23.16ss ; 33.18s ; 49.29s ; 50.7-13 ; Jos 13.32 ; 24.32).'
  - type: text
    content: ils ont été transportés à Sichem et mis dans le tombeau qu'Abraham avait acheté, à prix d'argent, aux fils de Hamor, à Sichem.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 47.27 ; Ex 1.7,20 ; Ps 105.24. –  s''était engagé  : le même verbe, qui évoque habituellement une prise de parole publique, est traduit en 24.14 par reconnaître (traditionnellement confesser ) ; verbe apparenté en 19.18n  ; voir aussi 23.8n  ; Mt 3.6n  ; 10.32n  ; 14.7 ; certains mss portent la promesse que Dieu avait jurée.'
  - type: text
    content: 'Comme le temps approchait où devait s''accomplir la promesse par laquelle Dieu s''était engagé envers Abraham, le peuple s''est accru et multiplié en Egypte, '
  '18':
  - type: note
    content: 'Ex 1.8. –  se lève  : le même verbe est traduit par susciter au v. 37. –  sur l''Egypte  : les termes correspondants sont absents de certains mss.'
  - type: text
    content: 'jusqu''à ce que '
  - type: text
    content: se lève sur l'Egypte un autre roi qui n'avait pas connu Joseph
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'Ex 1.9-11,17s,22. –  peuple  : litt. lignée, famille, race (cf. 4.6) ; le même terme est traduit par origine au v. 13. –  abandonner ou exposer. –  que ceux-ci ne restent pas en vie  : litt. pour ne pas préserver leur vie  ; sur le verbe correspondant, voir Lc 17.33n.'
  - type: text
    content: Ce roi s'est joué de notre peuple ; il a maltraité nos pères, il leur a fait abandonner leurs nouveau-nés pour que ceux-ci ne restent pas en vie.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Mes frères, mes pères  : litt. Hommes (1.16n) , frères et pères 22.1. –  glorieux  : litt. de la gloire  ; cf. Ps 29.3. –  avant qu''il habite Harrân  : cf. Gn 11.31ss ; 15.7 ; Né 9.7.'
  - type: text
    content: 'Etienne répondit : Mes frères, mes pères, écoutez ! Le Dieu glorieux est apparu à Abraham, notre père, lorsqu''il était en Mésopotamie, avant qu''il habite Harrân, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 2.2 ; Hé 11.23. –  beau aux yeux de Dieu  : autre traduction divinement beau . –  élevé  : autre traduction nourri  ; même verbe v. 21 ; 22.3.'
  - type: text
    content: 'En ce temps-là est né Moïse, qui était beau aux yeux de Dieu. Il a été élevé trois mois dans la maison de son père ; '
  '21':
  - type: note
    content: Ex 2.3,5,10.
  - type: text
    content: 'et quand il a été abandonné, la fille du pharaon l''a recueilli et l''a élevé comme son fils. '
  '22':
  - type: note
    content: 'élevé  : même verbe en 22.3. –  sagesse des Egyptiens  : cf. Ex 7.11s,22 ; 1R 5.10 ; Es 19.11 ; 2Tm 3.8n. –  puissant dans ses paroles…  : cf. Ex 4.10 ; Lc 24.19 ; Siracide 45.3 : « Par ses paroles (celles de Moïse) il précipita les prodiges. »'
  - type: text
    content: Moïse a été élevé dans toute la sagesse des Egyptiens, et il était puissant dans ses paroles et dans ses œuvres.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'quarante ans  : cf. v. 30 ; Ex 7.7 ; Dt 34.7. –  la pensée lui est venue  : litt. lui est montée au cœur , cf. 1Co 2.9. –  visiter ses frères Ex 2.11. –  Israélites Lc 1.16n.'
  - type: text
    content: 'Lorsqu''il a eu quarante ans révolus, la pensée lui est venue de visiter ses frères, les Israélites. '
  '24':
  - type: note
    content: Ex 2.12.
  - type: text
    content: 'Il en a vu un qu''on maltraitait ; il a pris sa défense et il a fait justice à l''opprimé en frappant l''Egyptien. '
  '25':
  - type: note
    content: 'leur donnait  : autre traduction allait leur donner. –  le salut  : cf. v. 37 ; 4.12. –  par son entremise  : litt. par sa main.'
  - type: text
    content: '– Ses frères comprendraient, pensait-il, que Dieu leur donnait le salut par son entremise ; mais ils ne l''ont pas compris. – '
  '26':
  - type: note
    content: Ex 2.13.
  - type: text
    content: 'Le jour suivant, il leur est apparu alors qu''ils se battaient ; il a essayé de les réconcilier, de leur faire faire la paix, en disant : Vous êtes frères ! Pourquoi vous maltraitez-vous l''un l''autre ? '
  '27':
  - type: note
    content: V. 35,39 ; Ex 2.14  ; cf. Lc 12.14. –  son prochain ou son compagnon.
  - type: text
    content: 'Mais celui qui maltraitait son prochain l''a repoussé en disant : '
  - type: text
    content: Qui t'a fait chef et juge sur nous ?
  - type: text
    content: ' '
  '28':
  - type: text
    content: Veux-tu me supprimer, toi, de la même manière que tu as supprimé l'Egyptien hier ?
  - type: text
    content: ' '
  '29':
  - type: note
    content: Ex 2.15,22 ; 18.3s. –  s'exiler v. 6n.
  - type: text
    content: A cette parole, Moïse s'est enfui pour s'exiler au pays de Madiân, où il a engendré deux fils.
  '3':
  - type: note
    content: Gn 12.1.
  - type: text
    content: 'et il lui a dit : '
  - type: text
    content: Sors de ton pays et de ta famille, et va dans le pays que je te montrerai
  - type: text
    content: '. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ex 3.1-4. –  dans la flamme… ou dans le feu flamboyant d'un buisson  ; expression comparable en 2Th 1.8 ; Hé 1.7 ; Ap 1.14 ; 2.18 ; 19.12.
  - type: text
    content: 'Quarante ans plus tard, un ange lui est apparu au désert du mont Sinaï, dans la flamme d''un buisson en feu. '
  '31':
  - type: text
    content: 'En le voyant, Moïse s''est étonné de cette vision, et comme il s''approchait pour regarder, la voix du Seigneur advint : '
  '32':
  - type: note
    content: Ex 3.6,13,15s.
  - type: text
    content: C'est moi, le Dieu de tes pères, le Dieu d'Abraham, d'Isaac et de Jacob !
  - type: text
    content: ' Moïse, tout tremblant, n''osait pas regarder. '
  '33':
  - type: note
    content: Ex 3.5. –  une terre sacrée ou sainte.
  - type: text
    content: 'Le Seigneur lui dit : '
  - type: text
    content: Retire tes sandales de tes pieds, car le lieu où tu te tiens est une terre sacrée
  - type: text
    content: '. '
  '34':
  - type: note
    content: Ex 3.7-10. –  ses soupirs ou ses gémissements.
  - type: text
    content: 'J''ai bien vu le malheur de mon peuple qui est en Egypte, j''ai entendu ses soupirs : je suis descendu pour le délivrer. Maintenant viens : je t''enverrai en Egypte'
  - type: text
    content: .
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'V. 27+. –  renié  : cf. 3.13ns. –  comme chef et comme rédempteur (ou libérateur ) : cf. 5.31 ; Ps 19.15 ; 78.35 ; Lc 1.68 ; 2.38 ; 24.21. –  avec l''aide de  : litt. avec la main de . –  dans le buisson Dt 33.16.'
  - type: text
    content: 'Ce Moïse qu''ils avaient renié en disant : '
  - type: text
    content: « Qui t'a fait chef et juge ? »,
  - type: text
    content: ' c''est lui que Dieu a envoyé comme chef et comme rédempteur, avec l''aide de l''ange qui lui était apparu dans le buisson. '
  '36':
  - type: note
    content: 'prodiges / signes 2.19+,22 ; Ex 7.3 ; Ps 105.27. –  à la mer Rouge Ex 14.21 ; 15.4. –  pendant quarante ans Nb 14.33s ; cf. Assomption de Moïse 3.11s : « N''est-ce pas ce qu''alors Moïse nous annonçait en prophétie, lui qui, ayant eu beaucoup à souffrir en Egypte, à la mer Rouge et au désert pendant quarante ans, prenait solennellement à témoin le ciel et la terre contre nous, afin que nous ne transgressions pas Ses commandements. »'
  - type: text
    content: 'C''est lui qui les a fait sortir en produisant des prodiges et des signes en Egypte, à la mer Rouge et au désert, pendant quarante ans. '
  '37':
  - type: note
    content: '3.22 ; Dt 18.15. –  Israélites Lc 1.16n. –  suscitera  : le verbe signifie aussi (se) lever, (se) relever, également au sens de résurrection.'
  - type: text
    content: 'C''est ce Moïse qui a dit aux Israélites : '
  - type: text
    content: Dieu suscitera pour vous, d'entre vos frères, un prophète comme moi
  - type: text
    content: '. '
  '38':
  - type: note
    content: 'assemblée  : le même mot est habituellement transcrit Eglise  ; cf. 5.11n  ; Ex 19.1–20.17 ; Dt 4.10 ; 9.10 ; 10.4 ; 18.16. –  avec… et avec  : certains comprennent entre l''ange… et nos pères  ; cf. v. 53 ; Dt 33.2n  ; Ga 3.19s ; Hé 2.2. –  des paroles  : le terme grec correspondant est dérivé de l''un des deux mots habituellement traduits par parole (celui de Jn 1.1n p. ex.) ; il s''applique souvent aux oracles d''une divinité ; on le retrouve seulement en Rm 3.2, Hé 5.12 et 1P 4.11. –  vivantes 5.20 ; Dt 32.47 ; Lc 10.26-28 ; Rm 10.5 ; Ga 3.12. –  pour nous les donner  : certains mss portent pour vous les donner.'
  - type: text
    content: 'C''est lui qui, dans l''assemblée au désert, était avec l''ange qui lui parlait sur le mont Sinaï et avec nos pères ; il a reçu des paroles vivantes pour nous les donner. '
  '39':
  - type: note
    content: 'ils sont retournés en Egypte  : autre traduction ils se sont tournés vers l''Egypte  ; cf. Nb 14.3 ; Ez 20.8,13.'
  - type: text
    content: 'Nos pères n''ont pas voulu lui obéir, mais ils l''ont repoussé ; dans leur cœur, ils sont retournés en Egypte, '
  '4':
  - type: note
    content: Gn 11.32n  ; 12.5.
  - type: text
    content: 'Il est alors sorti du pays des Chaldéens et il a habité Harrân. De là, après la mort de son père, Dieu l''a fait passer dans ce pays que vous habitez maintenant ; '
  '40':
  - type: note
    content: 'Ex 32.1,23. –  Aaron  : voir prêtre.'
  - type: text
    content: 'en disant à Aaron : '
  - type: text
    content: Fais-nous des dieux qui aillent devant nous ; car ce Moïse qui nous a fait sortir d'Egypte, nous ne savons pas ce qui est advenu de lui
  - type: text
    content: '. '
  '41':
  - type: note
    content: un taurillon ou un veau, Ex 32.4nss ; voir sacrifice. –  œuvres de leurs mains Dt 4.28 ; Jr 1.16 ; Ps 115.4.
  - type: text
    content: 'En ces jours-là, ils se sont fabriqué un taurillon ; ils ont apporté un sacrifice à l''idole et ils ont fait la fête avec les œuvres de leurs mains. '
  '42':
  - type: note
    content: 's''est détourné d''eux  : autre traduction en retour, Dieu les a livrés…, cf. Rm 1.24+. –  culte de l''armée du ciel ou des astres, cf. Dt 4.19 ; 17.3 ; Jr 7.18 ; 8.2 ; 19.13. –  Est-ce à moi… Am 5.25-27, cité d''après LXX. –  au désert  : cf. Ez 20.13-20.'
  - type: text
    content: 'Alors Dieu s''est détourné d''eux et les a livrés au culte de l''armée du ciel, ainsi qu''il est écrit dans le livre des prophètes :'
  - type: text
    content: Est-ce à moi que vous avez offert des victimes et des sacrifices
  - type: text
    content: pendant quarante ans au désert, maison d'Israël ?
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Voir Am 5.26n. –  la tente  : cf. v. 44ss ; même terme 15.16. –  Moloch  : cf. Lv 18.21n. –  de votre dieu ou du dieu , selon certains mss. –  Raiphân ou Rompha, Réphân, Remphân, Répha , selon les mss. –  figures ou images  ; le mot grec est celui qui a donné notre mot type  ; il est traduit au v. 44 par modèle  ; cf. 23.25n  ; Rm 5.14n  ; Hé 8.5n. –  vous prosterner devant elles ou les adorer  ; cf. 10.25n.'
  - type: text
    content: Vous avez porté la tente de Moloch
  - type: text
    content: et l'étoile de votre dieu Raiphân,
  - type: text
    content: ces figures que vous avez faites
  - type: text
    content: ' pour vous prosterner devant elles !'
  - type: text
    content: Aussi je vous exilerai au-delà
  - type: text
    content: ' de Babylone.'
  '44':
  - type: text
    content: ' '
  - type: note
    content: la tente du Témoignage qui tenait lieu de temple dans le désert, Ex 25.9n  ; 27.21+ ; Nb 1.50. –  d'après le modèle… v. 43n  ; Ex 25.9,40 ; Hé 8.5n.
  - type: text
    content: 'Nos pères avaient au désert la tente du Témoignage, ainsi que celui qui parlait à Moïse avait ordonné de la faire, d''après le modèle qu''il avait vu. '
  '45':
  - type: note
    content: 'Josué (même nom que Jésus en grec) Jos 3.3-17 ; 18.1 ; 23.9 ; 24.18. –  la possession  : c.-à-d. le pays  ; autre traduction quand ils ont pris possession (du pays) des nations  ; même terme v. 5 ; voir non-Juifs.'
  - type: text
    content: 'Après l''avoir reçue, nos pères l''ont introduite, avec Josué, dans la possession des nations que Dieu a chassées devant eux. Elle y est restée jusqu''aux jours de David, '
  '46':
  - type: note
    content: 'une demeure  : le terme grec est dérivé du mot traduit par tente aux v. 43ns ; il apparaît aussi en 2P 1.13s. –  pour la maison…  : certains mss portent pour le Dieu de Jacob, cf. Ps 132.5 ; voir aussi 2S 7.1-16 ; 1R 8.17s ; 1Ch 17.1-14 ; 2Ch 6.7s.'
  - type: text
    content: 'qui a trouvé grâce aux yeux de Dieu et qui a demandé de trouver une demeure pour la maison de Jacob. '
  '47':
  - type: note
    content: 1R 6.1s,14 ; 8.19s ; 1Ch 22.6 ; 2Ch 3.1 ; 5.1 ; 6.9s.
  - type: text
    content: 'Mais c''est Salomon qui lui a construit une maison. '
  '48':
  - type: note
    content: 'ce qui est fabriqué par des mains humaines  : cf. 17.24,29 ; 19.26 ; Mc 14.58 ; Hé 9.11,24 ; voir Es 16.12n (même terme pour sanctuaire dans LXX).'
  - type: text
    content: 'Cependant le Très-Haut n''habite pas dans ce qui est fabriqué par des mains humaines, comme dit le prophète :'
  '49':
  - type: text
    content: ' '
  - type: note
    content: Es 66.1s  ; cf. 1R 8.27 ; Mt 5.34s.
  - type: text
    content: Le ciel est mon trône,
  - type: text
    content: et la terre mon marchepied.
  - type: text
    content: Quelle maison me construirez-vous, dit le Seigneur,
  - type: text
    content: quel sera le lieu de mon repos ?
  '5':
  - type: note
    content: 'héritage ou patrimoine. –  pas même de quoi poser un pied  : cf. Dt 2.5. –  la possession… Gn 12.7 ; 13.15 ; 17.8 ; 24.7 ; 48.4. –  pas d''enfant Gn 16.1 ; Rm 4.18-22.'
  - type: text
    content: 'il ne lui a donné aucun héritage dans ce pays, pas même de quoi poser un pied, mais il a promis de '
  - type: text
    content: lui en donner la possession, ainsi qu'à sa descendance après lui
  - type: text
    content: '  – alors qu''il n''avait pas d''enfant. '
  '50':
  - type: text
    content: 'N''est-ce pas '
  - type: text
    content: ma main qui a fait tout cela ?
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'rétifs…  : litt. au cou raide (Ex 32.9n  ; 33.3,5 etc.) , incirconcis de cœur (Lv 26.41 ; Jr 9.25) et d''oreilles (Jr 6.10) : cf. Dt 10.16. –  vous vous opposez ou vous résistez  : cf. Es 63.10 ; voir aussi Nb 27.14 ; Né 9.30. – Voir Esprit.'
  - type: text
    content: 'Hommes rétifs, incirconcis de cœur et d''oreilles, vous vous opposez toujours à l''Esprit saint, vous comme vos pères ! '
  '52':
  - type: note
    content: prophètes 1R 19.10,14 ; Né 9.26 ; 2Ch 36.16 ; Mt 5.12+ ; 23.31-35 ; 1Th 2.15s. –  la venue du Juste 3.14+. –  assassiné 2.23+ ; cf. Jn 7.19.
  - type: text
    content: 'Lequel des prophètes vos pères n''ont-ils pas persécuté ? Ils ont tué ceux qui annonçaient d''avance la venue du Juste que vous, maintenant, vous avez livré et assassiné, '
  '53':
  - type: note
    content: 'Voir loi. –  communiquée par des anges  : litt. pour (ou sur) ordres d''anges, expression qui signifie sans doute Dieu ayant donné des ordres à ses anges pour qu''ils la communiquent  ; cf. v. 38 ; la tradition juive postérieure à l''A.T. a insisté sur le rôle joué par les anges dans le don de la loi ; cf. Ga 3.19 ; Hé 2.2. –  observée  : autre traduction gardée  ; cf. 15.10.'
  - type: text
    content: vous qui avez reçu la loi communiquée par des anges et qui ne l'avez pas observée !
  - type: heading
    content: La mort d'Etienne
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'Ce qu''ils entendaient…  : litt. en entendant cela, ils étaient exaspérés dans leurs cœurs 5.33. –  grinçaient des dents Ps 35.16 ; 37.12 ; 112.10 ; Jb 16.9.'
  - type: text
    content: 'Ce qu''ils entendaient les exaspérait ; ils grinçaient des dents contre lui. '
  '55':
  - type: note
    content: 'rempli d''Esprit saint  : cf. 2.4+ ; 6.3,5. –  fixa le ciel et vit…  : cf. Es 6.1 ; Ps 63.3 ; Jn 12.41 ; 4 Maccabées 6.5s : « Eleazar…, comme s''il n''était tourmenté qu''en rêve, n''en faisait aucun cas. Mais le vieil homme fixait ses regards vers le ciel tandis que le fouet lui lacérait les chairs… » Martyre d''Isaïe 5.6s : « Alors qu''on commençait à le scier… Isaïe était dans la contemplation du Seigneur : il avait les yeux ouverts, mais il ne les voyait pas (ses bourreaux). » – Voir gloire. –  à la droite de Dieu  : cf. Mt 26.64+/ / ; 1P 3.22.'
  - type: text
    content: 'Mais Etienne, rempli d''Esprit saint, fixa le ciel et vit la gloire de Dieu et Jésus debout à la droite de Dieu. '
  '56':
  - type: note
    content: 'les cieux ouverts 10.11 ; Mt 3.16/ / ; Jn 1.51 ; Ap 19.11. –  le Fils de l''homme…  : cf. Dn 7.13 ; Lc 22.69. –  debout  : cf. Ps 3.8+ ; Assomption de Moïse 10.3 : « Car de son Trône royal se lèvera le Céleste, et il sortira de sa Demeure sainte, enflammé de colère en faveur de ses fils. »'
  - type: text
    content: 'Il dit : Je vois les cieux ouverts et le Fils de l''homme debout à la droite de Dieu ! '
  '57':
  - type: note
    content: 'Texte occidental possible, d''après une reconstitution  : Mais le peuple, ayant entendu cela, poussa de grands cris, et tous se précipitèrent sur lui  ; cf. 19.29 ; Jb 16.10. –  Ils poussèrent…  : litt. ils crièrent d''une grande voix  ; cf. v. 60n.'
  - type: text
    content: 'Ils poussèrent alors de grands cris, en se bouchant les oreilles ; tous ensemble ils se précipitèrent sur lui, '
  '58':
  - type: note
    content: 'hors de la ville  : cf. 14.19 ; Lc 4.29 ; Hé 13.12s ; voir aussi Lv 24.14 ; Nb 15.35s ; Dt 17.5-7 ; 2Ch 24.21. –  Saul 8.1ss ; 22.20.'
  - type: text
    content: 'le chassèrent hors de la ville et le lapidèrent. Les témoins avaient déposé leurs vêtements aux pieds d''un jeune homme appelé Saul. '
  '59':
  - type: note
    content: 'Cf. Lc 23.46 ; voir aussi Ps 31.6. –  reçois  : autre traduction accueille.'
  - type: text
    content: 'Tandis qu''ils le lapidaient, Etienne priait en disant : Seigneur Jésus, reçois mon esprit ! '
  '6':
  - type: note
    content: 'Gn 15.13s  ; cf. Ex 2.22 ; 12.40. –  Sa descendance  : cf. 3.25n. –  sera exilée ou immigrée, de même v. 29 ; terme apparenté en 13.17 ; cf. Ep 2.19 ; Hé 11.9n  ; 1P 1.17 ; 2.11n.'
  - type: text
    content: 'Dieu a parlé ainsi : '
  - type: text
    content: Sa descendance sera exilée dans un pays étranger ; on la réduira en esclavage et on la maltraitera pendant quatre cents ans
  - type: text
    content: '. '
  '60':
  - type: note
    content: 'à genoux 20.36. –  cria (litt. cria d''une grande voix, de même 16.28) Mc 15.34,37/ /. –  ne les charge pas…  : cf. Lc 23.34. – Voir péché. –  dans la mort  : sous-entendu dans le texte (euphémisme) ; cf. 13.36 ; Dn 12.2 ; Mt 9.24 ; 27.52 ; Jn 11.11 ; 1Co 7.39 ; 11.30 ; 15.6,18,20,51 ; 1Th 4.13 ; 2P 3.4.'
  - type: text
    content: 'Puis il se mit à genoux et cria : Seigneur, ne les charge pas de ce péché ! Et, après avoir dit cela, il s''endormit dans la mort.'
  '7':
  - type: note
    content: 'dans ce lieu-ci  : cf. v. 48s ; 6.13s+ ; Ex 3.12.'
  - type: text
    content: Mais la nation dont ils auront été les esclaves, c'est moi qui la jugerai,
  - type: text
    content: ' dit Dieu ; '
  - type: text
    content: après cela, ils sortiront
  - type: text
    content: ' et me rendront un culte dans ce lieu-ci. '
  '8':
  - type: note
    content: 'Dieu lui a donné  : litt. il lui a donné. –  l''alliance de la circoncision… Gn 17.10-14 ; 21.4 ; 25.26 ; 29.31–30.24 ; 35.16-18 ; 1Ch 1.34. –  Abraham a engendré  : litt. il a engendré.'
  - type: text
    content: Puis Dieu lui a donné l'alliance de la circoncision ; ainsi Abraham a engendré Isaac et l'a circoncis le huitième jour ; Isaac a fait de même pour Jacob, et Jacob pour les douze patriarches.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 37.11,28 ; 45.4 ; Ps 105.17. –  pour qu''on l''emmène  : sous-entendu dans le texte. –  Dieu était avec lui Gn 39.2s,21,23.'
  - type: text
    content: 'Les patriarches, jaloux de Joseph, l''ont vendu pour qu''on l''emmène en Egypte. Mais Dieu était avec lui '
