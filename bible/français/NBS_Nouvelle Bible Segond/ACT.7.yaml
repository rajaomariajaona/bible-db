    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'reconnaître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(traditionnellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: confesser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
