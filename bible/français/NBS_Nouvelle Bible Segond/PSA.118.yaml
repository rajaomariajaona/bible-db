document_id: PSA.118,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Je vivrai pour raconter les œuvres du Seigneur
  - type: text
    content: ' '
  - type: note
    content: V. 29 ; 106.1+ ; 136.1ss.
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il est bon,'
  - type: text
    content: car sa fidélité est pour toujours !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.1s ; 27.3 ; 43.1. –  m''entouraient ou me cernaient, m''encerclaient , 17.9ss ; 22.13,17 ; 109.3. –  au nom… 20.8 ; 1S 17.45. –  je les taille en pièces  : traduction incertaine ; on pourrait aussi comprendre avec LXX je les mets en fuite  ; à d''autres formes, le verbe hébreu employé ici signifie circoncire  ; dans ce passage aussi il a parfois été interprété dans ce sens.'
  - type: text
    content: 'Toutes les nations m''entouraient :'
  - type: text
    content: 'au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', je les taille en pièces.'
  '11':
  - type: text
    content: 'Elles m''entouraient, elles étaient tout autour de moi :'
  - type: text
    content: 'au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', je les taille en pièces.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'comme des abeilles Dt 1.44. –  elles s''éteignent  : traduction incertaine ; d''après LXX, certains modifient le texte hébreu traditionnel pour lire elles brûlaient comme un feu d''épines  ; Es 33.12.'
  - type: text
    content: 'Elles m''entouraient comme des abeilles :'
  - type: text
    content: elles s'éteignent comme un feu d'épines ;
  - type: text
    content: 'au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', je les taille en pièces.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Tu (Dieu ? l''ennemi ?) me poussais  : versions anciennes on me poussait  ; cf. 36.13 ; 62.4.'
  - type: text
    content: Tu me poussais fort pour me faire tomber ;
  - type: text
    content: 'mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a secouru.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur (Yah)  : cf. v. 5,17,18,19 ; 68.5n  ; Ex 15.2n. –  ma puissance ou mon chant (même mot, ou homonyme, pour mélodie en 81.3 ; 98.5 ; voir Ex 15.2n  ; Es 12.2n).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) est ma force et ma puissance ;'
  - type: text
    content: il a été pour moi le salut.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 's''élèvent  : sous-entendu dans le texte. – Voir justice. –  La main droite 17.7+ ; 98.1 ; 138.7 ; Ex 15.6 ; cf. Lc 1.51 ; Ac 2.33.'
  - type: text
    content: 'Des cris de joie et de salut s''élèvent dans les tentes des justes :'
  - type: text
    content: 'La main droite du '
  - type: text
    content: Seigneur
  - type: text
    content: ' déploie sa force !'
  '16':
  - type: text
    content: 'La main droite du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est élevée !'
  - type: text
    content: 'La main droite du '
  - type: text
    content: Seigneur
  - type: text
    content: ' déploie sa force !'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 9.2+ ; Jr 51.10.
  - type: text
    content: Je ne mourrai pas, je vivrai
  - type: text
    content: 'et je raconterai les œuvres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah).'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.2 ; 38.2 ; 66.10ss ; 107.12 ; 119.67,71 ; Jr 10.24 ; 30.11 ; 31.18 ; Pr 3.11s ; 2Co 6.9.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) m''a corrigé,'
  - type: text
    content: mais il ne m'a pas livré à la mort.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les portes de la justice  : il s''agit probablement des portes du temple  ; beaucoup pensent en effet que ce psaume était chanté lors d''une procession ; cf. v. 27n  ; 24.7ss ; 42.5 ; Es 26.2 ; Jr 31.23.'
  - type: text
    content: 'Ouvrez-moi les portes de la justice :'
  - type: text
    content: 'par elles j''entrerai, je célébrerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah).'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''Israël dise  : cf. 115.9nss ; 135.19s ; voir aussi 35.28 ; 40.17 ; 66.3 ; 107.2.'
  - type: text
    content: 'Qu''Israël dise :'
  - type: text
    content: Car sa fidélité est pour toujours !
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 15.1ss ; 24.3ss ; 33.1 ; Ap 22.14 ; voir aussi Jn 10.9.
  - type: text
    content: 'Voici la porte du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: c'est par elle qu'entrent les justes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'V. 14. –  tu m''as répondu  : certains modifient très légèrement la lecture traditionnelle pour comprendre tu m''as humilié  ; cf. 66.19 ; 116.1s.'
  - type: text
    content: Je te célébrerai, parce que tu m'as répondu,
  - type: text
    content: parce que tu as été pour moi le salut.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'rejetée  : autre traduction méprisée . –  la principale, celle de l''angle  : litt. la tête de l''angle , expression qui peut désigner aussi bien une pierre angulaire de fondation que la clef de voûte ; cf. Es 28.16 ; voir aussi Jg 20.2n  ; Za 4.7n  ; 6.4n  ; Mc 12.10s/  ; 8.31 ; Ac 4.11 ; 1P 2.7.'
  - type: text
    content: La pierre que les bâtisseurs ont rejetée
  - type: text
    content: est devenue la principale, celle de l'angle.
  '23':
  - type: text
    content: 'C''est du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que cela est venu :'
  - type: text
    content: c'est une chose étonnante à nos yeux.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. 75.3 ; Es 49.8 ; Né 8.9s ; Ap 19.7.
  - type: text
    content: 'Voici le jour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait :'
  - type: text
    content: qu'il soit notre allégresse et notre joie !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'accorde le salut  : litt. sauve, de grâce (ou je t''en prie, nous t''en prions ) : hébreu hoshia‘-na’ , qui sera transcrit en grec hosanna ( Mc 11.9/ ) ; cf. 12.2 ; 20.10 ; 28.9 ; 60.7 ; 108.7 ; Jr 31.7. –  la victoire  : autres traductions la réussite ; la prospérité.'
  - type: text
    content: 'S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', accorde le salut !'
  - type: text
    content: 'S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', accorde la victoire !'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit…  : autres traductions béni soit, au nom du Seigneur, celui qui vient (c.-à-d. qui entre dans le temple ) ; bienvenue au nom du Seigneur  ; cf. Mt 11.3n/ / ; 21.9/ / ; 23.39 ; Lc 13.35 ; Jn 12.13. –  Depuis la maison du Seigneur, nous vous bénissons (autre traduction nous vous avons bénis ) : cf. 20.3 ; 24.5 ; 129.8 ; 134.3 ; voir Nb 6.23 ; Dt 21.5.'
  - type: text
    content: 'Béni soit celui qui vient au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Depuis la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous vous bénissons.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur (YHWH) est Dieu (hébreu ’El , de même au v. 28n  ; cf. Gn 21.33n) : cf. Dt 4.35 ; Jos 24.17 ; 1R 18.39. –  il nous éclaire 18.29 ; 27.1 ; 67.2 ; Nb 6.25 ; Es 60.1 ; 1Jn 2.8. –  Attachez des branchages…  : traduction incertaine, litt. attachez la fête  ; on pourrait aussi comprendre attachez (la victime de) la fête avec des liens  ; ou encore liez (= formez bien) le cortège de la fête (v. 19n). –  cornes de l''autel  : cf. 26.6 ; Ex 27.2n  ; Lv 4.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est Dieu, il nous éclaire.'
  - type: text
    content: Attachez des branchages au cortège de fête,
  - type: text
    content: jusqu'aux cornes de l'autel !
  '28':
  - type: text
    content: ' '
  - type: note
    content: V. 14+ ; 99.5 ; 107.32 ; Es 25.1 ; 1Ch 29.13 ; Lc 1.46. –  Dieu traduit successivement les termes hébreux ’Elohim (Gn 1.1n) et ’El (Gn 21.33n).
  - type: text
    content: Tu es mon Dieu, et je te célébrerai ;
  - type: text
    content: mon Dieu, je t'exalterai.
  '29':
  - type: text
    content: ' '
  - type: note
    content: V. 1+.
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il est bon,'
  - type: text
    content: car sa fidélité est pour toujours !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 115.10+.
  - type: text
    content: 'Que la maison d''Aaron dise :'
  - type: text
    content: Car sa fidélité est pour toujours !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 115.11n  ; cf. Lc 1.50.
  - type: text
    content: 'Que ceux qui craignent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' disent :'
  - type: text
    content: Car sa fidélité est pour toujours !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Du sein de la détresse 18.7 ; 120.1 ; cf. 3.5+. –  le Seigneur (Yah)  : cf. v. 14+ ; 68.5n  ; Ex 15.2n. –  au large 4.2 ; 18.20 ; cf. 31.9 ; 66.12 ; Gn 26.22.'
  - type: text
    content: 'Du sein de la détresse j''ai invoqué le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) :'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) m''a répondu, il m''a mis au large.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 56.5n,12 ; Es 50.7 ; 51.12 ; Jr 1.19 ; Rm 8.31 ; Hé 13.6. –  je n'ai pas peur 3.7 ; 23.4 ; 27.3 ; cf. Es 12.2 ; 41.10ss ; 43.1 ; 44.2 ; Jr 1.8 ; So 3.16 ; Lm 3.57 ; voir crainte.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est pour moi, je n''ai pas peur :'
  - type: text
    content: que peuvent me faire des humains ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: '54.6n,9n  ; 92.12. –  mes ennemis  : litt. ceux qui me détestent.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est mon secours :'
  - type: text
    content: mes ennemis me seront offerts en spectacle.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 60.13 ; 62.9ss ; Jr 17.5ss. –  trouver un abri 7.2+.
  - type: text
    content: 'Mieux vaut trouver un abri dans le '
  - type: text
    content: Seigneur
  - type: text
    content: que de mettre sa confiance dans les humains ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 146.3 ; Es 31.1ss.
  - type: text
    content: 'mieux vaut trouver un abri dans le '
  - type: text
    content: Seigneur
  - type: text
    content: que de mettre sa confiance dans les nobles.
