    - type: text
      text: ' dit alors à Moïse : Dis à Aaron : Brandis ton bâton et frappe la poussière de la terre. Dans toute l''Egypte elle se changera en moustiques. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étendit la main, brandit son bâton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celle-ci se changea en moustiques…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il y eut des moustiques sur toutes les bêtes.
      marker-yv: yv-n
    - type: text
      text: 'Ils firent ainsi. Aaron étendit la main, brandit son bâton et frappa la poussière de la terre ; celle-ci se changea en moustiques qui s''abattirent sur les humains et sur les bêtes. Dans toute l''Egypte, toute la poussière de la terre se changea en moustiques. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les mages recoururent à leurs pratiques occultes pour produire des moustiques, mais ils n''y parvinrent pas. Il y avait des moustiques sur les humains et sur les bêtes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'doigt de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'un dieu, des dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 3.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; d''après des parallèles égyptiens, l''expression pourrait s''appliquer au bâton ; voir aussi Lc 11.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''entêta… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors les mages dirent au pharaon : C''est le doigt de Dieu ! Mais le pharaon s''entêta ; il ne les écouta pas, comme l''avait dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Quatrième fléau : les mouches venimeuses'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Lève-toi de bon matin et va te poster devant le pharaon, lorsqu''il sortira pour aller près de l''eau ; tu lui diras : « Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) : Laisse partir mon peuple, pour qu''il me serve. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'laisses… partir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'envoie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux formes du même verbe hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mouches venimeuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: taons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mouches à chiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le terme hébreu vient d''une racine qui peut évoquer un grouillement indistinct ; il est difficile de savoir exactement ce qu''il désigne. Certains le rendent par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bêtes féroces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Cf. Ps 78.45 ; 105.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Egypte.
      marker-yv: yv-n
    - type: text
      text: 'Si tu ne laisses pas partir mon peuple, j''envoie les mouches venimeuses contre toi, contre les gens de ta cour, contre ton peuple et contre tes maisons ; les maisons des Egyptiens seront remplies de mouches venimeuses, ainsi que la terre sur laquelle ils se trouvent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je traiterai différemment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ferai une distinction pour ; je mettrai à part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.4,26 ; 10.23 ; 11.7 ; 33.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Goshen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 45.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que tu saches… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au milieu du pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais, en ce jour-là, je traiterai différemment le pays de Goshen, où se tient mon peuple ; là il n''y aura pas de mouches venimeuses, afin que tu saches que, moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), je suis au milieu du pays. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: démarcation libératrice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une libération '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Ps 111.9 ; 130.7 ; cf. Es 50.2). Plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une distinction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 18) et certains modifient le texte hébreu traditionnel en conséquence.
      marker-yv: yv-n
    - type: text
      text: Je mettrai une démarcation libératrice entre mon peuple et ton peuple. Ce signe sera pour demain. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans ce v. le mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grenouilles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et les verbes dont il est le sujet sont au singulier (collectif) en hébreu.
      marker-yv: yv-n
    - type: text
      text: 'Aaron étendit sa main sur les eaux de l''Egypte : les grenouilles montèrent et couvrirent l''Egypte. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il vint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Syr, Tg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fit venir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fut ravagé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pervertir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'anéantir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Gn 6.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s,13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', où le terme traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: terre.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit ainsi. Il vint une masse de mouches venimeuses dans la maison du pharaon, dans la maison des gens de sa cour et dans toute l''Egypte ; le pays fut ravagé par les mouches venimeuses.'
