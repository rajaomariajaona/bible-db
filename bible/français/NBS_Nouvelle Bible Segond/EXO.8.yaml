document_id: EXO.8,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Dis à Aaron v. 12 ; 7.19. –  Etends ta main et brandis ton bâton  : litt. étends ta main avec ton bâton  ; cf. v. 12s ; 9.22s ; 10.12s ; Jos 8.18s. –  bras du Nil 7.19n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit alors à Moïse : Dis à Aaron : Etends ta main et brandis ton bâton sur les rivières, sur les bras du Nil et sur les étangs : fais monter les grenouilles sur l''Egypte. '
  '10':
  - type: note
    content: 'en tas  : litt. des tas et des tas, autre traduction homer par homer (mesure de capacité d''environ 210 l).'
  - type: text
    content: On les amoncela en tas, et une puanteur se répandit dans le pays.
  '11':
  - type: text
    content: ' '
  - type: note
    content: resta obtus 7.14+. –  ne les écouta pas 7.13+.
  - type: text
    content: 'Mais le pharaon, voyant qu''il y avait du répit, resta obtus ; il ne les écouta pas, comme l''avait dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: 'Troisième fléau : les moustiques'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Dis à Aaron v. 1. –  elle se changera  : autre traduction il y aura . –  moustiques  : la traduction du mot correspondant n''est pas certaine : LXX parle de vers et Syr de poux . Cf. Ps 105.31 ; Sagesse 19.10 : « La terre, remplaçant la génération animale, produisit des moustiques. »'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit alors à Moïse : Dis à Aaron : Brandis ton bâton et frappe la poussière de la terre. Dans toute l''Egypte elle se changera en moustiques. '
  '13':
  - type: note
    content: 'étendit la main, brandit son bâton  : cf. v. 1n. –  celle-ci se changea en moustiques…  : autre traduction il y eut des moustiques sur toutes les bêtes.'
  - type: text
    content: 'Ils firent ainsi. Aaron étendit la main, brandit son bâton et frappa la poussière de la terre ; celle-ci se changea en moustiques qui s''abattirent sur les humains et sur les bêtes. Dans toute l''Egypte, toute la poussière de la terre se changea en moustiques. '
  '14':
  - type: text
    content: 'Les mages recoururent à leurs pratiques occultes pour produire des moustiques, mais ils n''y parvinrent pas. Il y avait des moustiques sur les humains et sur les bêtes. '
  '15':
  - type: note
    content: doigt de Dieu ou d'un dieu, des dieux, cf. Gn 3.5n  ; d'après des parallèles égyptiens, l'expression pourrait s'appliquer au bâton ; voir aussi Lc 11.20. –  s'entêta… 4.21n.
  - type: text
    content: 'Alors les mages dirent au pharaon : C''est le doigt de Dieu ! Mais le pharaon s''entêta ; il ne les écouta pas, comme l''avait dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: 'Quatrième fléau : les mouches venimeuses'
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Lève-toi de bon matin et va te poster devant le pharaon, lorsqu''il sortira pour aller près de l''eau ; tu lui diras : « Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) : Laisse partir mon peuple, pour qu''il me serve. '
  '17':
  - type: note
    content: 'laisses… partir et envoie traduisent deux formes du même verbe hébreu. –  mouches venimeuses  : autre traduction taons  ; LXX mouches à chiens. Le terme hébreu vient d''une racine qui peut évoquer un grouillement indistinct ; il est difficile de savoir exactement ce qu''il désigne. Certains le rendent par bêtes féroces. Cf. Ps 78.45 ; 105.31. –  des Egyptiens  : autre traduction de l''Egypte.'
  - type: text
    content: 'Si tu ne laisses pas partir mon peuple, j''envoie les mouches venimeuses contre toi, contre les gens de ta cour, contre ton peuple et contre tes maisons ; les maisons des Egyptiens seront remplies de mouches venimeuses, ainsi que la terre sur laquelle ils se trouvent. '
  '18':
  - type: note
    content: 'je traiterai différemment  : autres traductions je ferai une distinction pour ; je mettrai à part  : cf. 9.4,26 ; 10.23 ; 11.7 ; 33.16. –  Goshen Gn 45.10n. –  que tu saches… 7.17+. –  YHWH  : voir noms divins. –  au milieu du pays ou dans le pays  ; cf. 3.20n.'
  - type: text
    content: 'Mais, en ce jour-là, je traiterai différemment le pays de Goshen, où se tient mon peuple ; là il n''y aura pas de mouches venimeuses, afin que tu saches que, moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je suis au milieu du pays. '
  '19':
  - type: note
    content: 'démarcation libératrice  : litt. une libération (Ps 111.9 ; 130.7 ; cf. Es 50.2). Plusieurs versions anciennes ont lu une distinction (cf. v. 18) et certains modifient le texte hébreu traditionnel en conséquence.'
  - type: text
    content: Je mettrai une démarcation libératrice entre mon peuple et ton peuple. Ce signe sera pour demain. »
  '2':
  - type: note
    content: Dans ce v. le mot traduit par grenouilles et les verbes dont il est le sujet sont au singulier (collectif) en hébreu.
  - type: text
    content: 'Aaron étendit sa main sur les eaux de l''Egypte : les grenouilles montèrent et couvrirent l''Egypte. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Il vint  : Syr, Tg il fit venir . –  fut ravagé  : le même verbe est traduit par pervertir et anéantir en Gn 6.11ns,13n, où le terme traduit ici par pays est rendu par terre.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit ainsi. Il vint une masse de mouches venimeuses dans la maison du pharaon, dans la maison des gens de sa cour et dans toute l''Egypte ; le pays fut ravagé par les mouches venimeuses.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Voir sacrifices . –  dans le pays , c.-à-d. en Egypte : Moïse refuse les solutions de compromis proposées par le pharaon (cf. v. 24 ; 10.8,11,24).'
  - type: text
    content: 'Le pharaon appela Moïse et Aaron et leur dit : Allez offrir des sacrifices à votre Dieu dans le pays. '
  '22':
  - type: note
    content: 'abomination  : peut-être parce que les victimes auraient été des animaux sacrés en Egypte ; cf. Gn 43.32n  ; 46.34n. –  sous les yeux des Egyptiens  : litt. sous leurs yeux.'
  - type: text
    content: 'Moïse répondit : Il ne conviendrait pas d''agir ainsi ; car nous offririons au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, des sacrifices qui sont une abomination pour l''Egypte ; si nous offrions sous les yeux des Egyptiens des sacrifices qui sont une abomination pour l''Egypte, ne nous lapideraient-ils pas ? '
  '23':
  - type: note
    content: 3.18+.
  - type: text
    content: 'Nous ferons trois journées de marche dans le désert et nous offrirons des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, selon ce qu''il nous dira. '
  '24':
  - type: note
    content: V. 21+.
  - type: text
    content: 'Le pharaon dit : Moi, je vais vous laisser partir au désert pour offrir des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu ; seulement, quand vous irez, ne vous éloignez pas trop. Intercédez pour moi ! '
  '25':
  - type: text
    content: 'Moïse répondit : Dès que je serai sorti de chez toi, j''intercéderai auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Demain, les mouches venimeuses s''éloigneront du pharaon, des gens de sa cour et de son peuple. Seulement, que le pharaon ne recoure pas de nouveau à la tromperie : qu''il ne refuse pas de laisser le peuple partir pour offrir des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '26':
  - type: note
    content: intercéda v. 4+.
  - type: text
    content: 'Moïse sortit de chez le pharaon et il intercéda auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agit selon la parole de Moïse : les mouches venimeuses s''éloignèrent du pharaon, des gens de sa cour, et de son peuple. Il n''en resta pas une seule.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 7.14+.
  - type: text
    content: 'Mais le pharaon, cette fois encore, resta obtus : il ne laissa pas partir le peuple.'
  '3':
  - type: text
    content: Mais les mages en firent autant par leurs pratiques occultes. Ils firent monter les grenouilles sur l'Egypte.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Intercédez v. 5,24ss ; 9.28 ; 10.17s ; cf. Gn 25.21 ; le même verbe est traduit par supplier en Jg 13.8 ; Jb 22.27 ; 33.26.
  - type: text
    content: 'Le pharaon appela Moïse et Aaron et leur dit : Intercédez auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), pour qu''il éloigne les grenouilles de moi et de mon peuple ; je laisserai partir ce peuple pour qu''il offre des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '5':
  - type: note
    content: A toi l'honneur ! autre traduction vante-toi à mes dépens, cf. Jg 7.2 ; Es 10.15 ; il s'agit peut-être ici d'une formule de politesse. LXX fixe (une échéance) pour moi, c.-à-d. indique-moi quand je devrai intercéder.
  - type: text
    content: 'Moïse dit au pharaon : A toi l''honneur ! Pour quand intercéderai-je en ta faveur, en faveur des gens de ta cour et de ton peuple, afin qu''il fasse disparaître les grenouilles de chez toi et de tes maisons, de sorte qu''il n''en reste que dans le Nil ? '
  '6':
  - type: note
    content: 'Moïse dit  : litt. il dit. –  Il en sera ainsi  : litt. comme ta parole. –  nul n''est semblable Es 45.5s,18-22.'
  - type: text
    content: 'Il répondit : Pour demain. Moïse dit : Il en sera ainsi, pour que tu saches que nul n''est semblable au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu. '
  '7':
  - type: text
    content: Les grenouilles s'éloigneront de toi, de tes maisons, des gens de ta cour et de ton peuple ; il n'en restera que dans le Nil.
  '8':
  - type: text
    content: 'Moïse et Aaron sortirent de chez le pharaon. Moïse cria vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet des grenouilles qu''il avait infligées au pharaon. '
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agit selon la parole de Moïse : les grenouilles moururent dans les maisons, dans les cours et dans les champs. '
