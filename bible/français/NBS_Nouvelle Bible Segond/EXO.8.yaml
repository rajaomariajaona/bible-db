        children:
        - type: text
          text: ', c.-à-d. en Egypte : Moïse refuse les solutions de compromis proposées par le pharaon (cf. v. 24 ; 10.8,11,24).'
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon appela Moïse et Aaron et leur dit : Allez offrir des sacrifices à votre Dieu dans le pays. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abomination
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être parce que les victimes auraient été des animaux sacrés en Egypte ; cf. Gn 43.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 46.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous les yeux des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous leurs yeux.
      marker-yv: yv-n
    - type: text
      text: 'Moïse répondit : Il ne conviendrait pas d''agir ainsi ; car nous offririons au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, des sacrifices qui sont une abomination pour l''Egypte ; si nous offrions sous les yeux des Egyptiens des sacrifices qui sont une abomination pour l''Egypte, ne nous lapideraient-ils pas ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.18+.
      marker-yv: yv-n
    - type: text
      text: 'Nous ferons trois journées de marche dans le désert et nous offrirons des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, selon ce qu''il nous dira. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 21+.
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon dit : Moi, je vais vous laisser partir au désert pour offrir des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu ; seulement, quand vous irez, ne vous éloignez pas trop. Intercédez pour moi ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse répondit : Dès que je serai sorti de chez toi, j''intercéderai auprès du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). Demain, les mouches venimeuses s''éloigneront du pharaon, des gens de sa cour et de son peuple. Seulement, que le pharaon ne recoure pas de nouveau à la tromperie : qu''il ne refuse pas de laisser le peuple partir pour offrir des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'intercéda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 4+.
      marker-yv: yv-n
    - type: text
      text: 'Moïse sortit de chez le pharaon et il intercéda auprès du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' agit selon la parole de Moïse : les mouches venimeuses s''éloignèrent du pharaon, des gens de sa cour, et de son peuple. Il n''en resta pas une seule.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.14+.
      marker-yv: yv-n
    - type: text
      text: 'Mais le pharaon, cette fois encore, resta obtus : il ne laissa pas partir le peuple.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mais les mages en firent autant par leurs pratiques occultes. Ils firent monter les grenouilles sur l'Egypte.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Intercédez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 5,24ss ; 9.28 ; 10.17s ; cf. Gn 25.21 ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'supplier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Jg 13.8 ; Jb 22.27 ; 33.26.
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon appela Moïse et Aaron et leur dit : Intercédez auprès du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), pour qu''il éloigne les grenouilles de moi et de mon peuple ; je laisserai partir ce peuple pour qu''il offre des sacrifices au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'A toi l''honneur ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction '
      - type: usfm
        marker: fqa
