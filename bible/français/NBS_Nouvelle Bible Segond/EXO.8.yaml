      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jg 7.2 ; Es 10.15 ; il s''agit peut-être ici d''une formule de politesse. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fixe (une échéance) pour moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: indique-moi quand je devrai intercéder.
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit au pharaon : A toi l''honneur ! Pour quand intercéderai-je en ta faveur, en faveur des gens de ta cour et de ton peuple, afin qu''il fasse disparaître les grenouilles de chez toi et de tes maisons, de sorte qu''il n''en reste que dans le Nil ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il en sera ainsi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme ta parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nul n''est semblable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 45.5s,18-22.
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Pour demain. Moïse dit : Il en sera ainsi, pour que tu saches que nul n''est semblable au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), notre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les grenouilles s'éloigneront de toi, de tes maisons, des gens de ta cour et de ton peuple ; il n'en restera que dans le Nil.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moïse et Aaron sortirent de chez le pharaon. Moïse cria vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' au sujet des grenouilles qu''il avait infligées au pharaon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' agit selon la parole de Moïse : les grenouilles moururent dans les maisons, dans les cours et dans les champs. '
