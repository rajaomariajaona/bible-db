document_id: PSA.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un malade qui reconnaît ses fautes
  - type: text
    content: ' '
  - type: note
    content: 'En évocation  : de même 70.1 ; cf. Am 6.10 ; 1Ch 16.4 ; 1Co 11.24 ; LXX précise lors du sabbat (cf. Lv 24.7s) ; Tg rapproche le terme de l''évocation associée à l''offrande de l''encens (Lv 2.2,9,16 ; 5.12 ; 6.8 ; cf. Nb 5.18 ; Es 66.3).'
  - type: text
    content: Psaume. De David. En évocation.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.2 ; 79.11 ; Ex 2.24 ; 6.5.
  - type: text
    content: Seigneur, tout mon désir est devant toi,
  - type: text
    content: et mon soupir ne t'est pas caché.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Mon cœur…  : cf. 40.13n. –  la lumière de mes yeux  : cf. 6.8 ; 13.4 ; 31.10n.'
  - type: text
    content: Mon cœur est agité, ma force m'abandonne,
  - type: text
    content: la lumière de mes propres yeux n'est plus avec moi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 31.12+ ; Lm 1.2 ; Mt 27.55 ; Lc 23.49. –  mes plaies ou mon fléau, mon malheur  ; cf. 39.11 ; Lv 13.2n.
  - type: text
    content: Mes amis et mes compagnons se tiennent loin de mes plaies,
  - type: text
    content: et mes proches se tiennent à l'écart.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.3ss ; 35.7,20,25 ; 41.7 ; 109.3 ; Lm 3.62. –  qui en veulent à ma vie 35.4n. –  murmurent 1.2n. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Ceux qui en veulent à ma vie tendent leurs pièges ;
  - type: text
    content: ceux qui cherchent mon malheur parlent perfidement
  - type: text
    content: et murmurent sans cesse des tromperies.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 39.2s,10 ; Es 53.7 ; 1P 2.23.
  - type: text
    content: Et moi, comme un sourd, je n'entends pas ;
  - type: text
    content: comme un muet, je n'ouvre pas la bouche.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'réplique  : cf. Pr 1.23n.'
  - type: text
    content: Je suis comme un homme qui n'entend pas,
  - type: text
    content: et dans la bouche duquel il n'y a pas de réplique.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'C''est toi… 31.25+ ; cf. 130.5. –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n.'
  - type: text
    content: 'C''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que j''attends,'
  - type: text
    content: c'est toi qui répondras, Seigneur, mon Dieu !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 13.5+. –  quand je vacille sur mes jambes 94.18.
  - type: text
    content: 'Car je dis : Qu''ils ne se réjouissent pas à mon sujet'
  - type: text
    content: et ne s'élèvent pas contre moi, quand je vacille sur mes jambes !
  '18':
  - type: text
    content: Car je suis près de chanceler,
  - type: text
    content: et ma douleur est constamment devant moi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 32.5+.
  - type: text
    content: Car j'avoue ma faute,
  - type: text
    content: je suis dans l'anxiété à cause de mon péché.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.2n  ; le terme traduit ici par colère est différent de celui qui apparaît en 6.2.
  - type: text
    content: Seigneur
  - type: text
    content: ', ne me châtie pas dans ta colère,'
  - type: text
    content: ne me corrige pas dans ta fureur !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 3.2+ ; 69.5. –  à tort 35.19+.
  - type: text
    content: Mes ennemis sont pleins de vie, de force ;
  - type: text
    content: ceux qui me détestent à tort sont nombreux,
  '21':
  - type: text
    content: ' '
  - type: note
    content: le mal pour le bien 35.12+. –  s'opposent à moi ou m'accusent  ; c'est du verbe hébreu correspondant que vient le nom de Satan  ; cf. 71.13n  ; Za 3.1n  ; Jb 1.6n.
  - type: text
    content: et ceux qui me rendent le mal pour le bien
  - type: text
    content: s'opposent à moi, parce que je recherche le bien.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.2,12,20 ; 27.9 ; 35.22 ; 71.12,18 ; 119.8.
  - type: text
    content: 'Ne m''abandonne pas, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Mon Dieu, ne t'éloigne pas de moi !
  '23':
  - type: text
    content: ' '
  - type: note
    content: Viens vite… 22.20+ ; 40.14.
  - type: text
    content: Viens vite à mon secours,
  - type: text
    content: Seigneur, mon salut !
  '3':
  - type: text
    content: ' '
  - type: note
    content: tes flèches 91.5 ; Dt 32.23 ; Jb 6.4 ; 16.13 ; Lm 3.13. –  ta main 32.4+.
  - type: text
    content: Car tes flèches se sont abattues sur moi,
  - type: text
    content: ta main s'est abattue sur moi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8 ; Es 1.5s. –  ta fureur  : autre terme qu''au v. 2 (synonymes). – Voir péché.'
  - type: text
    content: Il n'y a rien d'intact dans ma chair à cause de ta fureur,
  - type: text
    content: pas de paix dans mes os à cause de mon péché.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 40.13 ; 69.2,5s ; 124.4 ; Lm 1.14 ; Esd 9.6.
  - type: text
    content: Car mes fautes s'élèvent au-dessus de ma tête ;
  - type: text
    content: comme un pesant fardeau, elles sont trop pesantes pour moi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sont… purulentes  : litt. puent et pourrissent  ; cf. Lv 26.39 ; Ez 4.17.'
  - type: text
    content: Mes meurtrissures sont puantes et purulentes
  - type: text
    content: à cause de mon imbécillité.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'je déambule, l''air sombre  : autre traduction je m''assombris  ; cf. 35.14n  ; 42.10 ; Jb 30.28n.'
  - type: text
    content: Je suis courbé, accablé à l'extrême ;
  - type: text
    content: sans cesse je déambule, l'air sombre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: mes reins Es 21.3. –  rien d'intact v. 4+.
  - type: text
    content: Car mes reins sont pleins d'une brûlure,
  - type: text
    content: et il n'y a rien d'intact dans ma chair.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 102.4-6. –  grondement ou gémissement  ; cf. Ez 24.23n  ; Pr 5.11n.
  - type: text
    content: Je suis sans force, complètement écrasé ;
  - type: text
    content: je rugis du grondement de mon cœur.
