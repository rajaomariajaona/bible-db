document_id: ZEC.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Siège et délivrance de Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Sentence  : cf. 9.1+. –  qui déploie le ciel… Es 40.22 ; 42.5n  ; 44.24 ; 45.12 ; 51.13,16 ; Jb 26.7. –  le souffle (ou l''esprit ) de l''homme  : cf. Gn 2.7n (autre terme) ; Ez 37.8-10 ; Ps 104.29s ; Jb 10.12 ; 27.3 ; 34.14 ; Ec 12.7 ; Dn 7.15 ; 1Co 2.11+.'
  - type: text
    content: Sentence.
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur Israël.'
  - type: text
    content: 'Déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui déploie le ciel et fonde la terre,'
  - type: text
    content: 'et qui a façonné le souffle de l''homme au dedans de lui :'
  '10':
  - type: note
    content: 'je répandrai… un souffle (ou un esprit) : cf. Es 44.3 ; Ez 36.25-27 ; 39.29 ; Jl 3.1s. –  de grâce  : cf. Hé 10.29. –  ils tourneront les regards  : cf. Es 8.22 ; 22.11 ; Ps 34.6. –  vers moi…  : certains mss portent vers celui qu''ils ont transpercé  ; on comprend parfois le texte hébreu traditionnel comme suit  : ils tourneront les regards vers moi au sujet de celui qu''ils ont transpercé  ; cf. 11.13 ; Es 53.4ss ; Ez 36.19-23 (où un autre verbe, rendu par profaner, peut aussi signifier transpercer) ; Jn 19.37 ; Ap 1.7. –  Ils se lamenteront… Es 22.12 ; Jl 1.8 ; 2.12. –  un fils unique (le terme pour fils est sous-entendu dans le texte) Jr 6.26 ; Am 8.10 ; voir aussi Ex 12.30.'
  - type: text
    content: 'Alors je répandrai sur la maison de David et sur les habitants de Jérusalem un souffle de grâce et de supplication, et ils tourneront les regards vers moi – celui qu''ils ont transpercé. Ils se lamenteront sur lui comme on se lamente sur un fils unique, ils pleureront amèrement sur lui, aussi amèrement que sur un premier-né. '
  '11':
  - type: note
    content: 'Hadad-Rimmôn  : allusion possible au culte du dieu de l''orage et de la végétation (= Baal), appelé Hadad en Phénicie et Rimmôn par les Hébreux (2R 5.18 ; sur ce deuxième nom, voir aussi Jg 20.45-47 ; 21.2,13) ; ce culte comportait des rites de deuil pour la mort du dieu pendant la saison sèche (cf. Jg 11.40n  ; Ez 8.14n  ; Os 6.2ns). –  Meguiddo (ici orthographié Meguiddôn  ; cf. Ap 16.16), plaine fertile qui était peut-être un centre important du culte de Hadad-Rimmôn ; c''est là qu''était mort le roi Josias (2R 23.29). Certains pensent que le texte portait à l''origine Migrôn (lieu proche de Guibéa, 1S 14.2).'
  - type: text
    content: 'En ce jour-là, il y aura de grandes lamentations à Jérusalem, comme les lamentations de Hadad-Rimmôn dans la vallée de Meguiddo. '
  '12':
  - type: note
    content: 'Cf. Mt 24.30. –  chaque clan à part  : la liste qui suit semble procéder du général au particulier : de la maison de David (la dynastie royale ou plus largement la classe dirigeante de Jérusalem, v. 7) à celle de Nathan qui en faisait partie (2S 5.14 ; 1Ch 3.5 ; Lc 3.31), comme de la maison de Lévi (l''ensemble de la classe sacerdotale, v. 13) à la famille lévitique de Shiméi (Ex 6.17 ; Nb 3.17-21 ; 1Ch 6.2) ; certains voient toutefois dans la maison de Nathan une référence aux prophètes (2S 7.2ss) et dans celle de Shiméi une évocation des ennemis de la dynastie davidique (2S 16.5-8). –  les femmes à part  : cf. Né 12.43 ; Lc 23.27.'
  - type: text
    content: 'Le pays se lamentera, chaque clan à part : le clan de la maison de David à part, et les femmes à part ; le clan de la maison de Nathan à part, et les femmes à part ; '
  '13':
  - type: text
    content: 'le clan de la maison de Lévi à part, et les femmes à part ; le clan de Shiméi à part, et les femmes à part ; '
  '14':
  - type: text
    content: tous les autres clans, chaque clan à part, et les femmes à part.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'une coupe  : le terme est aussi traduit par bassin (Ex 12.22+) ; cf. Es 51.17,22 ; Jr 25.15s ; Ha 2.16. –  Il en sera même ainsi…  : texte obscur ; autres traductions Juda lui-même devra participer au siège de Jérusalem , ou encore  : c''est aussi contre Juda que sera le siège de Jérusalem  ; cf. 14.14n.'
  - type: text
    content: 'Je fais de Jérusalem une coupe d''étourdissement pour tous les peuples d''alentour. Il en sera même ainsi pour Juda, pendant le siège de Jérusalem. '
  '3':
  - type: note
    content: 'En ce jour-là  : cf. v. 3,6,8,9,11 ; 13.1,2,4 ; 14.1,6 ; Es 12.1+. –  une pierre à soulever  : l''image est peut-être celle d''un jeu par lequel on éprouvait sa force ; cf. Es 8.14s ; 28.16 ; Siracide 6.21 : « Comme une pierre, elle (la Sagesse) est un poids qui teste sa force (celle de l''ignorant), il ne tardera pas à la rejeter. » LXX a traduit fouler et fouleront, cf. Lc 21.24 ; Ap 11.2. –  toutes les nations… v. 9 ; 14.2 ; Mi 4.11.'
  - type: text
    content: 'En ce jour-là, je ferai de Jérusalem une pierre à soulever pour tous les peuples ; tous ceux qui voudront la soulever se feront très mal ; et toutes les nations de la terre se rassembleront contre elle. '
  '4':
  - type: note
    content: 'chevaux… 9.9-11 ; cf. 2R 6.8-23. –  délire / cécité Dt 28.28. –  ceux qui les montent  : autre traduction les conducteurs de chars. –  j''aurai les yeux ouverts… 1R 8.29.'
  - type: text
    content: 'En ce jour-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – je frapperai de folie tous les chevaux et de délire ceux qui les montent ; mais j''aurai les yeux ouverts sur la maison de Juda, et je frapperai de cécité tous les chevaux des peuples. '
  '5':
  - type: note
    content: 'Les chefs de Juda se diront  : litt. les chefs de Juda diront en leur cœur. –  Juda / Jérusalem  : cf. v. 7+. –  notre force  : litt. force pour moi  ; certains modifient le texte hébreu traditionnel pour lire la force des habitants de Jérusalem est dans le Seigneur … ou le cœur des habitants de Jérusalem s''est endurci contre le Seigneur …'
  - type: text
    content: 'Les chefs de Juda se diront : Les habitants de Jérusalem sont notre force, par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, leur Dieu. '
  '6':
  - type: note
    content: 'Cf. Es 10.17 ; Ab 18. –  restera  : autre traduction habitera. –  à Jérusalem  : LXX et certains mss omettent cette précision.'
  - type: text
    content: En ce jour-là, je ferai des chefs de Juda comme un foyer ardent dans un tas de bois, comme une torche enflammée dans des gerbes ; ils dévoreront à droite et à gauche tous les peuples d'alentour, et Jérusalem restera encore à sa place, à Jérusalem.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'les tentes  : sans doute les villages non fortifiés de Juda , par opposition à la ville forte de Jérusalem (cf. v. 11 ; 13.1).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sauvera d''abord les tentes de Juda, afin que la splendeur de la maison de David, la splendeur de l''habitant de Jérusalem, ne s''élève pas au-dessus de Juda. '
  '8':
  - type: note
    content: 'le Seigneur protégera 9.15. –  sera comme Dieu… cf. Ex 13.21 ; 14.19 ; 1S 29.9 ; 2S 14.17,20. –  le messager (ou l''ange) du Seigneur  : cf. 1.9+.'
  - type: text
    content: 'En ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' protégera les habitants de Jérusalem ; s''il y en a un qui trébuche parmi eux, il sera en ce jour-là comme David ; et la maison de David sera comme Dieu, comme le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' devant eux.'
  - type: heading
    content: Deuil dans tout le pays
  '9':
  - type: text
    content: ' '
  - type: note
    content: je m'appliquerai (ou je chercherai ) à détruire… v. 2-3+.
  - type: text
    content: 'En ce jour-là, je m''appliquerai à détruire toutes les nations qui viendront contre Jérusalem. '
