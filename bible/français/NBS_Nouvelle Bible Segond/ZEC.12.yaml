          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      marker-yv: yv-n
    - type: text
      text: 'Les chefs de Juda se diront : Les habitants de Jérusalem sont notre force, par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, leur Dieu. '
