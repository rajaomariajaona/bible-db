        - type: text
          text: '12.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je répandrai… un souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
