      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bassin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Ex 12.22+) ; cf. Es 51.17,22 ; Jr 25.15s ; Ha 2.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il en sera même ainsi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte obscur ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juda lui-même devra participer au siège de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est aussi contre Juda que sera le siège de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 14.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je fais de Jérusalem une coupe d''étourdissement pour tous les peuples d''alentour. Il en sera même ainsi pour Juda, pendant le siège de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En ce jour-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3,6,8,9,11 ; 13.1,2,4 ; 14.1,6 ; Es 12.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une pierre à soulever
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''image est peut-être celle d''un jeu par lequel on éprouvait sa force ; cf. Es 8.14s ; 28.16 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.21 : « Comme une pierre, elle (la Sagesse) est un poids qui teste sa force (celle de l''ignorant), il ne tardera pas à la rejeter. » '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fouler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fouleront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Lc 21.24 ; Ap 11.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toutes les nations… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9 ; 14.2 ; Mi 4.11.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là, je ferai de Jérusalem une pierre à soulever pour tous les peuples ; tous ceux qui voudront la soulever se feront très mal ; et toutes les nations de la terre se rassembleront contre elle. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chevaux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.9-11 ; cf. 2R 6.8-23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'délire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cécité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 28.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui les montent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les conducteurs de chars
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''aurai les yeux ouverts… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 8.29.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – je frapperai de folie tous les chevaux et de délire ceux qui les montent ; mais j''aurai les yeux ouverts sur la maison de Juda, et je frapperai de cécité tous les chevaux des peuples. '
  '5':
  - type: usfm
