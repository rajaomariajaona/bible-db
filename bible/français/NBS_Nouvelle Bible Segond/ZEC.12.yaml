          text: vers moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers celui qu'ils ont transpercé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on comprend parfois le texte hébreu traditionnel comme suit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils tourneront les regards vers moi au sujet de celui qu'ils ont transpercé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 11.13 ; Es 53.4ss ; Ez 36.19-23 (où un autre verbe, rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: profaner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: transpercer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jn 19.37 ; Ap 1.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils se lamenteront… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 22.12 ; Jl 1.8 ; 2.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un fils unique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le terme pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est sous-entendu dans le texte) Jr 6.26 ; Am 8.10 ; voir aussi Ex 12.30.
      marker-yv: yv-n
    - type: text
      text: 'Alors je répandrai sur la maison de David et sur les habitants de Jérusalem un souffle de grâce et de supplication, et ils tourneront les regards vers moi – celui qu''ils ont transpercé. Ils se lamenteront sur lui comme on se lamente sur un fils unique, ils pleureront amèrement sur lui, aussi amèrement que sur un premier-né. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hadad-Rimmôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : allusion possible au culte du dieu de l''orage et de la végétation (= '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baal
        - type: text
          text: '), appelé Hadad en Phénicie et Rimmôn par les Hébreux (2R 5.18 ; sur ce deuxième nom, voir aussi Jg 20.45-47 ; 21.2,13) ; ce culte comportait des rites de deuil pour la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du dieu pendant la saison sèche (cf. Jg 11.40
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 8.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Os 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Meguiddo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ici orthographié '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Meguiddôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ap 16.16), plaine fertile qui était peut-être un centre important du culte de Hadad-Rimmôn ; c''est là qu''était mort le roi Josias (2R 23.29). Certains pensent que le texte portait à l''origine '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Migrôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (lieu proche de Guibéa, 1S 14.2).
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là, il y aura de grandes lamentations à Jérusalem, comme les lamentations de Hadad-Rimmôn dans la vallée de Meguiddo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 24.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chaque clan à part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la liste qui suit semble procéder du général au particulier : de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la maison de David '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la dynastie royale ou plus largement la classe dirigeante de Jérusalem, v. 7) à celle de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nathan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui en faisait partie (2S 5.14 ; 1Ch 3.5 ; Lc 3.31), comme de la maison de Lévi (l''ensemble de la classe sacerdotale, v. 13) à la famille lévitique de Shiméi (Ex 6.17 ; Nb 3.17-21 ; 1Ch 6.2) ; certains voient toutefois dans la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison de Nathan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'une référence aux prophètes (2S 7.2ss) et dans celle de Shiméi une évocation des ennemis de la dynastie davidique (2S 16.5-8). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les femmes à part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 12.43 ; Lc 23.27.'
      marker-yv: yv-n
    - type: text
      text: 'Le pays se lamentera, chaque clan à part : le clan de la maison de David à part, et les femmes à part ; le clan de la maison de Nathan à part, et les femmes à part ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
