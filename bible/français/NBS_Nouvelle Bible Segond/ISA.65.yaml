    - type: text
      text: mes serviteurs pousseront des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cœur content,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous, vous crierez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la douleur de votre cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous hurlerez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'esprit brisé.
  '15':
  - type: usfm
    marker: q1
