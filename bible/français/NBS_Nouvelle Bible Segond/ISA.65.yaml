        children:
        - type: text
          text: 'j''ai appelé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '50.2+ ; Pr 1.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui me déplaisait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui (est) mauvais à mes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
