          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'amen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''il en soit ainsi ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Nb 5.22 ; Dt 27.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss etc.). Il dérive d''une racine évoquant la fermeté et la fiabilité ; certains modifient la vocalisation traditionnelle pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Dieu fidèle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre mot de la même racine) ; cf. 2Co 1.20 ; Ap 3.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'détresses passées… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ap 21.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cachées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 16.17.'
      marker-yv: yv-n
    - type: text
      text: Quiconque se bénira dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se bénira par le Dieu de l'Amen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quiconque prêtera serment dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêtera serment par le Dieu de l'Amen ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les détresses passées seront oubliées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles seront cachées à mes regards.
