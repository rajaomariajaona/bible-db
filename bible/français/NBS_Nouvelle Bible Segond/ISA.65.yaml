      marker-yv: yv-n
    - type: text
      text: 'Vous laisserez votre nom comme une malédiction à ceux que j''ai choisis :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '« Qu''ainsi le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ' te fasse mourir ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ses serviteurs, il les appellera d'un autre nom.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
