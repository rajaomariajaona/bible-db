document_id: ISA.65,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple rebelle et les serviteurs de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Rm 10.20. –  qui n''invoquait pas mon nom  : cette traduction, qui suit plusieurs versions anciennes, suppose une modification de la vocalisation traditionnelle du texte hébreu traditionnel qui porte (litt.) qui n''était pas appelé de mon nom (ou par mon nom ) ; cf. 43.7 ; 64.6.'
  - type: text
    content: Je me suis laissé rechercher
  - type: text
    content: par ceux qui ne demandaient rien,
  - type: text
    content: je me suis laissé trouver
  - type: text
    content: par ceux qui ne me cherchaient pas ;
  - type: text
    content: 'j''ai dit : Je suis là, je suis là !'
  - type: text
    content: à une nation qui n'invoquait pas mon nom.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'La plaine côtière 33.9n. –  vallée d''Akor  : au nord-ouest de la mer Morte, près de Jéricho ; cf. Jos 7.24-26 ; 15.7 ; Os 2.17n.'
  - type: text
    content: La plaine côtière sera le domaine du petit bétail,
  - type: text
    content: et la vallée d'Akor, l'endroit où se couche le gros bétail
  - type: text
    content: – pour mon peuple qui m'a cherché.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Gad  : Chance ou Bonheur (cf. Gn 30.11n), ici nom d''une divinité familière à qui l''on offrait des aliments sur une table ; cf. Jos 11.17n. –  une coupe  : litt. un mélange , probablement de vin, de miel et d''épices ; même mot en Pr 23.30 ( vins parfumés ), apparenté à celui qui est traduit par préparation en Es 5.22n, ici il s''applique à une libation rituelle ; cf. 57.6. –  Meni  : Partage ou Destin  ; cf. Dn 5.25s.'
  - type: text
    content: 'Mais vous qui abandonnez le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui oubliez ma montagne sacrée,
  - type: text
    content: qui dressez une table pour Gad
  - type: text
    content: et remplissez une coupe pour Meni,
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'je vous destine  : le verbe hébreu rappelle le nom de Meni au v. 11. –  j''ai appelé… 50.2+ ; Pr 1.24. –  ce qui me déplaisait  : litt. ce qui (est) mauvais à mes yeux  ; cf. 66.4 ; 1R 11.6n. –  vous avez choisi…  : cf. 56.4+.'
  - type: text
    content: je vous destine à l'épée,
  - type: text
    content: et vous fléchirez tous le genou pour être égorgés ;
  - type: text
    content: car j'ai appelé,
  - type: text
    content: et vous n'avez pas répondu ;
  - type: text
    content: j'ai parlé,
  - type: text
    content: et vous n'avez pas écouté ;
  - type: text
    content: mais vous avez fait ce qui me déplaisait
  - type: text
    content: et vous avez choisi ce à quoi je ne prends aucun plaisir.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 28.47s.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Mes serviteurs mangeront,
  - type: text
    content: mais vous, vous aurez faim ;
  - type: text
    content: mes serviteurs boiront,
  - type: text
    content: mais vous, vous aurez soif ;
  - type: text
    content: mes serviteurs se réjouiront,
  - type: text
    content: mais vous, vous serez honteux ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le cœur content  : litt. du bien (ou bonheur ) du cœur. –  vous crierez… Mt 25.34,41. – Voir esprit.'
  - type: text
    content: mes serviteurs pousseront des cris de joie,
  - type: text
    content: le cœur content,
  - type: text
    content: mais vous, vous crierez
  - type: text
    content: dans la douleur de votre cœur
  - type: text
    content: et vous hurlerez,
  - type: text
    content: l'esprit brisé.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''ainsi…  : litt. que le Seigneur Dieu te fasse mourir , sous-entendu comme un tel  : le sort de ceux que l''oracle condamne sera tel que leur nom servira d''exemple dans les formules de malédiction (litt. serment ). Cf. Jr 29.22 ; Ps 102.9n. –  ses serviteurs…  : LXX à mes serviteurs un autre nom (voir v. 16) sera donné  ; cf. 62.2.'
  - type: text
    content: 'Vous laisserez votre nom comme une malédiction à ceux que j''ai choisis :'
  - type: text
    content: '« Qu''ainsi le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' te fasse mourir ! »'
  - type: text
    content: Mais ses serviteurs, il les appellera d'un autre nom.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'se bénira  : cf. Gn 12.3n  ; 22.18. –  Dieu de l''Amen  : le mot hébreu amen signifie qu''il en soit ainsi ! (Nb 5.22 ; Dt 27.15nss etc.). Il dérive d''une racine évoquant la fermeté et la fiabilité ; certains modifient la vocalisation traditionnelle pour lire le Dieu fidèle (autre mot de la même racine) ; cf. 2Co 1.20 ; Ap 3.14. –  détresses passées… Ap 21.4. –  cachées  : cf. Jr 16.17.'
  - type: text
    content: Quiconque se bénira dans le pays
  - type: text
    content: se bénira par le Dieu de l'Amen,
  - type: text
    content: et quiconque prêtera serment dans le pays
  - type: text
    content: prêtera serment par le Dieu de l'Amen ;
  - type: text
    content: car les détresses passées seront oubliées,
  - type: text
    content: elles seront cachées à mes regards.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ciel nouveau / terre nouvelle 51.6,16 ; 66.22 ; 2Co 5.17 ; 2P 3.13  ; Ap 21.1. –  il ne viendra (litt. ne montera ) plus au cœur , c.-à-d. à la pensée  ; cf. 43.18s ; Jr 3.16 (même expression).
  - type: text
    content: Car je crée un ciel nouveau
  - type: text
    content: et une terre nouvelle ;
  - type: text
    content: on ne se souviendra plus du passé,
  - type: text
    content: il ne viendra plus au cœur.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 62.5.
  - type: text
    content: Egayez-vous plutôt
  - type: text
    content: et soyez pour toujours dans l'allégresse
  - type: text
    content: à cause de ce que je crée ;
  - type: text
    content: car je crée Jérusalem pour l'allégresse
  - type: text
    content: et son peuple pour la gaieté.
  '19':
  - type: text
    content: ' '
  - type: note
    content: pleurs / cris Ap 21.4.
  - type: text
    content: Je ferai de Jérusalem mon allégresse
  - type: text
    content: et de mon peuple ma gaieté ;
  - type: text
    content: on n'y entendra plus
  - type: text
    content: de pleurs ni de cris.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 10.21. –  sans cesse  : litt. tout le jour . –  mauvaise  : litt. pas bonne  ; cf. Ps 36.5+.'
  - type: text
    content: J'ai tendu mes mains sans cesse vers un peuple rétif
  - type: text
    content: qui suit une voie mauvaise
  - type: text
    content: au gré de ses pensées,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'de nourrisson vivant…  : litt. de nourrisson de jours. –  le pécheur…  : litt. le pécheur à cent ans sera maudit. L''idée semble être la suivante : vivre cent ans ne sera rien ; la mort d''un centenaire sera considérée comme une mort précoce, signe de malédiction, par opposition à la longévité des justes (cf. Gn 25.8). Au lieu de pécheur , on peut traduire  : celui qui n''atteindra pas cent ans…  ; cf. Za 8.4.'
  - type: text
    content: Il n'y aura plus là
  - type: text
    content: de nourrisson vivant quelques jours seulement,
  - type: text
    content: ni de vieillard qui n'accomplisse pas ses jours ;
  - type: text
    content: car le plus jeune mourra à cent ans,
  - type: text
    content: le pécheur qui mourra à cent ans sera considéré comme maudit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 62.8s ; cf. Lv 26.16 ; Dt 28.30-33,38-44 ; Jr 29.5 ; 31.5 ; Ez 37.26 ; Am 5.11 ; 9.14 ; Mi 6.14s ; So 1.13.
  - type: text
    content: Ils bâtiront des maisons
  - type: text
    content: et les habiteront ;
  - type: text
    content: ils planteront des vergers
  - type: text
    content: et en mangeront le fruit.
  '22':
  - type: text
    content: Ils ne bâtiront pas des maisons
  - type: text
    content: pour qu'un autre les habite,
  - type: text
    content: ils ne planteront pas
  - type: text
    content: pour qu'un autre mange ;
  - type: text
    content: car les jours de mon peuple seront comme les jours des arbres,
  - type: text
    content: et ceux que j'ai choisis jouiront de l'œuvre de leurs mains.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ne se fatigueront pas pour rien  : cf. 49.4 ; Jr 51.58. –  descendance des bénis 61.9.'
  - type: text
    content: Ils ne se fatigueront pas pour rien
  - type: text
    content: et n'auront pas des enfants pour l'épouvante.
  - type: text
    content: 'Car ils formeront la descendance des bénis du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et leur progéniture sera avec eux.
  '24':
  - type: text
    content: ' '
  - type: note
    content: V. 12. –  entendus ou exaucés.
  - type: text
    content: Avant qu'ils m'invoquent,
  - type: text
    content: moi, je répondrai ;
  - type: text
    content: ils parleront encore
  - type: text
    content: que moi, je les aurai déjà entendus.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '11.7-9. –  serpent / poussière Gn 3.14. –  nourriture  : le mot est aussi traduit par pain.'
  - type: text
    content: Le loup et l'agneau auront un même pâturage,
  - type: text
    content: le lion, comme le bœuf, mangera de la paille,
  - type: text
    content: et le serpent aura la poussière pour nourriture.
  - type: text
    content: Il ne se fera aucun mal, il n'y aura aucune destruction
  - type: text
    content: dans toute ma montagne sacrée,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'me contrarie Dt 32.21 ; Os 12.15. –  jardins 1.29+ ; 66.17. –  briques  : il s''agissait sans doute de petites plaques où l''on faisait brûler de l''encens pour les idoles ; cf. Jr 19.13 ; 32.29.'
  - type: text
    content: vers un peuple qui constamment me contrarie en face,
  - type: text
    content: sacrifiant dans les jardins
  - type: text
    content: et offrant de l'encens sur les briques ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'au milieu des tombeaux  : sans doute pour communiquer avec les morts ; cf. 8.19 ; Lv 19.31 ; Dt 18.11 ; voir aussi Mc 5.2s. –  les cavernes  : d''après LXX  ; le mot hébreu signifie probablement lieux secrets (propres à l''occultisme). –  porc 66.3,17 ; Lv 11.7 ; Dt 14.8 ; cf. Mc 5.11-16. –  des mets  : traduction incertaine ; les témoins du texte hésitent sur le mot qu''il faut lire ici. –  impropres Lv 7.18n.'
  - type: text
    content: qui habite au milieu des tombeaux
  - type: text
    content: et passe la nuit dans les cavernes,
  - type: text
    content: qui mange de la viande de porc
  - type: text
    content: et qui a dans ses récipients des mets impropres ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ecarte-toi  : litt. approche-toi (synonyme dans la suite) de toi . –  je te consacrerais (on est consacré au contact d''une chose sacrée ; voir saint) : cf. 66.17 ; Ez 44.19 ; 46.20. –  une fumée dans mes narines , c.-à-d. un sujet d''irritation  ; cf. Dt 32.22 ; Jr 17.4 ; Ps 18.9.'
  - type: text
    content: 'qui dit : Ecarte-toi,'
  - type: text
    content: ne t'approche pas de moi,
  - type: text
    content: car je te consacrerais…
  - type: text
    content: Tout cela, c'est une fumée dans mes narines,
  - type: text
    content: un feu qui brûle sans cesse.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'inscrit  : cf. Jr 17.1. –  je ne me tairai pas 42.14+. –  je réglerai… mes comptes  : le même verbe a aussi été traduit par l''expression faire payer  ; cf. Jr 32.18. –  directement  : litt. sur leur sein , expression désignant au sens propre le pli du vêtement où l''on serrait ses biens ; cf. Pr 21.14 ; Rt 3.15 ; Lc 6.38 ; au sens figuré, voir Jr 32.18 ; Ps 79.12.'
  - type: text
    content: 'C''est inscrit devant moi :'
  - type: text
    content: je ne me tairai pas, mais, à coup sûr,
  - type: text
    content: je réglerai directement mes comptes avec eux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vos fautes / celles de vos pères Lv 26.39s ; Jr 3.25. –  montagnes / collines  : cf. 2.2,14 ; 57.6 ; Dt 12.2 ; Jr 2.20 ; 3.2,6 ; Ez 6.13 ; 20.28 ; Os 4.13. –  outragé  : autre traduction déshonoré . –  pour le passé  : certains modifient le texte hébreu traditionnel pour lire sur leur tête , qui serait une expression parallèle à sur leur sein traduite ici par directement (v. 6n). D''autres, à la suite de LXX, proposent de supprimer cette expression. –  je réglerai…  : texte hébreu incertain, litt. sur (leur sein), qui invite à une reprise de la fin du v. 6.'
  - type: text
    content: A la fois pour vos fautes
  - type: text
    content: 'et pour celles de vos pères, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: eux qui ont offert de l'encens sur les montagnes
  - type: text
    content: et qui m'ont outragé sur les collines ;
  - type: text
    content: je mesurerai leur rétribution pour le passé,
  - type: text
    content: je réglerai directement mes comptes avec eux.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'du jus  : le terme est habituellement traduit par vin , cf. Gn 27.28n. –  grappe  : c''est le thème du reste (1.8-9+) appliqué à l''image de la vigne (5.1-7). –  Ne la détruis pas  : cf. Ps 57.1n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Quand il se trouve du jus dans une grappe,
  - type: text
    content: 'on dit : Ne la détruis pas,'
  - type: text
    content: car il y a là une bénédiction !
  - type: text
    content: J'agirai de même, à cause de mes serviteurs,
  - type: text
    content: afin de ne pas tout détruire.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'en prendront possession  : de la terre, ou du pays ? Cf. 57.13 ; 60.21.'
  - type: text
    content: Je ferai sortir de Jacob une descendance
  - type: text
    content: et de Juda le possesseur de mes montagnes ;
  - type: text
    content: ceux que j'ai choisis en prendront possession,
  - type: text
    content: et mes serviteurs y demeureront.
