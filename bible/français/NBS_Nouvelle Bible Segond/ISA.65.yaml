          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une coupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un mélange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', probablement de vin, de miel et d''épices ; même mot en Pr 23.30 ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vins parfumés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), apparenté à celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'préparation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Es 5.22
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', ici il s''applique à une libation rituelle ; cf. 57.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Meni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Partage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Destin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Dn 5.25s.
      marker-yv: yv-n
    - type: text
      text: 'Mais vous qui abandonnez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui oubliez ma montagne sacrée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui dressez une table pour Gad
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et remplissez une coupe pour Meni,
  '12':
  - type: usfm
