        children:
        - type: text
          text: '65.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 28.47s.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes serviteurs mangeront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous, vous aurez faim ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes serviteurs boiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous, vous aurez soif ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes serviteurs se réjouiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous, vous serez honteux ;
