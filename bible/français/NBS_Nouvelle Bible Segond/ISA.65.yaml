      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses serviteurs…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à mes serviteurs un autre nom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir v. 16) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sera donné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
