        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous avez choisi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 56.4+.'
      marker-yv: yv-n
    - type: text
      text: je vous destine à l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous fléchirez tous le genou pour être égorgés ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'ai appelé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous n'avez pas répondu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai parlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous n'avez pas écouté ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous avez fait ce qui me déplaisait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous avez choisi ce à quoi je ne prends aucun plaisir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
