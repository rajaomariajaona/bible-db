      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu rappelle le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Meni '
      - type: usfm
        marker: ft
        children:
