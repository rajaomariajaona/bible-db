document_id: ISA.65,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le peuple rebelle et les serviteurs de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rm 10.20. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui n''invoquait pas mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette traduction, qui suit plusieurs versions anciennes, suppose une modification de la vocalisation traditionnelle du texte hébreu traditionnel qui porte (litt.) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui n''était pas appelé de mon nom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par mon nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 43.7 ; 64.6.
      marker-yv: yv-n
    - type: text
      text: Je me suis laissé rechercher
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par ceux qui ne demandaient rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis laissé trouver
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par ceux qui ne me cherchaient pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'j''ai dit : Je suis là, je suis là !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à une nation qui n'invoquait pas mon nom.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
