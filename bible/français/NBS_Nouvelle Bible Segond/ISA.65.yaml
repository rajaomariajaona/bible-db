    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La plaine côtière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vallée d'Akor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : au nord-ouest de la mer Morte, près de Jéricho ; cf. Jos 7.24-26 ; 15.7 ; Os 2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: La plaine côtière sera le domaine du petit bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la vallée d'Akor, l'endroit où se couche le gros bétail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – pour mon peuple qui m'a cherché.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
