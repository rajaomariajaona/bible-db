      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.35-44/ /.
      marker-yv: yv-n
    - type: text
      text: 'lorsque j''ai rompu les cinq pains pour les cinq mille, combien de paniers pleins de morceaux vous avez emportés ? – Douze, lui répondent-ils. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.41+.
      marker-yv: yv-n
    - type: text
      text: 'Je suis ému par cette foule : voilà déjà trois jours qu''ils restent auprès de moi et qu''ils n''ont rien à manger. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 1-9/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lui répondent-ils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon certains mss, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: répondent-ils.
      marker-yv: yv-n
    - type: text
      text: 'Et quand j''ai rompu les sept pour les quatre mille, combien de corbeilles pleines de morceaux avez-vous emportées ? – Sept, lui répondent-ils. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 6.52.
      marker-yv: yv-n
    - type: text
      text: 'Et il leur disait : Vous ne comprenez pas encore ?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit un aveugle
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
