      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 5.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il soupira profondément en son esprit et dit : Pourquoi cette génération demande-t-elle un signe ? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen,
    - type: text
      text: ' je vous le dis, il ne sera pas donné de signe à cette génération. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il les quitta et reprit le bateau pour regagner l'autre rive.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le levain des pharisiens et d'Hérode
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 16.5-12
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
