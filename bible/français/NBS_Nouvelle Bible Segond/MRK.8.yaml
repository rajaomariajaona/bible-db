      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avez-vous le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' endurci ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.5'
