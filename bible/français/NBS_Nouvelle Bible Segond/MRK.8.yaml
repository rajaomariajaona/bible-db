      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.52+ ; Lc 12.1.'
      marker-yv: yv-n
    - type: text
      text: 'Ils avaient oublié de prendre des pains. Ils n''avaient qu''un seul pain avec eux dans le bateau. '
  '15':
