        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Aussitôt il monta dans le bateau avec ses disciples et se rendit dans la région de Dalmanoutha.
  - type: usfm
