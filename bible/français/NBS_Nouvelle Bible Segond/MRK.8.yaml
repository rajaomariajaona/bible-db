      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le toucher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.41+.
      marker-yv: yv-n
    - type: text
      text: 'Ils arrivent à Bethsaïda ; on lui amène un aveugle, et on le supplie de le toucher de la main. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 18,27-30 ; 7.32-37 ; 10.46-52 ; voir aussi Jn 9.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vois-tu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce sont des dérivés du verbe grec correspondant qui sont traduits dans la suite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ouvrir les yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 24), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rouvrir grand les yeux, voir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: distinctement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 25).'
      marker-yv: yv-n
    - type: text
      text: 'Il prit l''aveugle par la main et le conduisit hors du village ; puis il lui cracha sur les yeux et lui imposa les mains, en lui demandant : Vois-tu quelque chose ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ouvrait les yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'levait les yeux, retrouva la vue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il ouvrait les yeux et disait : Je vois des gens ; je les vois comme des arbres, mais ils marchent. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quand l''aveugle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rouvrit grand les yeux
      - type: usfm
        marker: ft
