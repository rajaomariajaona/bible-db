          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il s''en rendit compte et leur dit : Pourquoi raisonnez-vous en vous disant que vous n''avez pas de pains ? Vous ne comprenez pas encore ? Vous ne saisissez pas ? Etes-vous donc obtus ?'
  '18':
