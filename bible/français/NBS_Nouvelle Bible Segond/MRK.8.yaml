document_id: MRK.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'En pays non juif : Jésus nourrit quatre mille personnes'
  - type: heading
    content: Mt 15.32-39  ; cf. Mc 6.30-44/ /
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.32-44/ /. –  rien à manger  : litt. pas de quoi manger , de même v. 2.'
  - type: text
    content: 'En ces jours-là, comme il y avait encore une grande foule qui n''avait rien à manger, il appelle ses disciples et leur dit : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Dalmanoutha  : nom à consonance araméenne ; cette localité est inconnue par ailleurs (cf. Mt 15.39n).'
  - type: text
    content: Aussitôt il monta dans le bateau avec ses disciples et se rendit dans la région de Dalmanoutha.
  - type: heading
    content: Il n'y aura pas de signe du ciel
  - type: heading
    content: Mt 6.1-14  ; 12.38-39  ; Lc 11.16,29
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'pharisiens 2–3 ; 7.1-13. –  survinrent  : litt. sortirent . –  débattre  : c''est un verbe apparenté qui est traduit par demandèrent (litt. chercher ). –  pour le mettre à l''épreuve 1.13+ ; 10.2 ; 12.13ss. –  un signe  : cf. Dt 18.20ss ; Es 7.10-14 ; Mt 12.38n  ; 16.1+ ; Jn 6.30 ; 1Co 1.22.'
  - type: text
    content: 'Les pharisiens survinrent, commencèrent à débattre avec lui et, pour le mettre à l''épreuve, ils lui demandèrent un signe venant du ciel. '
  '12':
  - type: note
    content: 'Il soupira 7.34 ; voir aussi Rm 8.22nss ; 2Co 5.2,4. –  en son esprit  : cf. 2.8n. –  cette génération  : cf. 9.19 ; 13.30 ; Nb 14 ; Dt 32.5 ; Ps 95.10 ; Mt 11.16/ / ; 12.39+ss/ / ; 16.4/ / ; Lc 17.25 ; Ac 2.40 ; Ph 2.15 ; Hé 3.10. –  Amen Mt 5.18n.'
  - type: text
    content: 'Il soupira profondément en son esprit et dit : Pourquoi cette génération demande-t-elle un signe ? '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il ne sera pas donné de signe à cette génération. '
  '13':
  - type: text
    content: Puis il les quitta et reprit le bateau pour regagner l'autre rive.
  - type: heading
    content: Le levain des pharisiens et d'Hérode
  - type: heading
    content: Mt 16.5-12
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'pains  : cf. 6.52+ ; Lc 12.1.'
  - type: text
    content: 'Ils avaient oublié de prendre des pains. Ils n''avaient qu''un seul pain avec eux dans le bateau. '
  '15':
  - type: note
    content: 'Ouvrez l''œil et gardez-vous…, c.-à-d. prenez bien garde (au levain…)  ; les deux verbes grecs correspondants ont aussi, séparément, le sens de voir, regarder  ; cf. Lc 12.1 ; voir aussi 1Co 5.6ss ; Ga 5.9. –  pharisiens (8.11+) / Hérode (6.14nss) : cf. 3.6n.'
  - type: text
    content: 'Lui leur faisait cette recommandation : Ouvrez l''œil et gardez-vous du levain des pharisiens et du levain d''Hérode. '
  '16':
  - type: note
    content: 'parce qu''ils n''avaient pas de pains  : autre traduction en se disant qu''ils n''avaient pas de pains  ; ou, selon certains mss, (se) disant : C''est que nous n''avons pas de pains  ; cf. Mt 16.7n  ; Jn 4.31-33.'
  - type: text
    content: 'Ils raisonnaient entre eux, parce qu''ils n''avaient pas de pains. '
  '17':
  - type: note
    content: 'en vous disant  : autre traduction parce que, cf. v. 16n. –  Vous ne comprenez… 4.13+. –  Etes-vous donc obtus  : litt. avez-vous le cœur endurci ? 3.5n.'
  - type: text
    content: 'Il s''en rendit compte et leur dit : Pourquoi raisonnez-vous en vous disant que vous n''avez pas de pains ? Vous ne comprenez pas encore ? Vous ne saisissez pas ? Etes-vous donc obtus ?'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.12 ; Jr 5.21  ; Ez 12.2 ; Mt 13.13 ; Ac 28.26s.
  - type: text
    content: Vous avez des yeux, et vous ne voyez pas ?
  - type: text
    content: Vous avez des oreilles, et vous n'entendez pas ?
  - type: text
    content: 'Ne vous rappelez-vous pas, '
  '19':
  - type: note
    content: 6.35-44/ /.
  - type: text
    content: 'lorsque j''ai rompu les cinq pains pour les cinq mille, combien de paniers pleins de morceaux vous avez emportés ? – Douze, lui répondent-ils. '
  '2':
  - type: note
    content: 1.41+.
  - type: text
    content: 'Je suis ému par cette foule : voilà déjà trois jours qu''ils restent auprès de moi et qu''ils n''ont rien à manger. '
  '20':
  - type: note
    content: V. 1-9/ /. –  lui répondent-ils ou, selon certains mss, répondent-ils.
  - type: text
    content: 'Et quand j''ai rompu les sept pour les quatre mille, combien de corbeilles pleines de morceaux avez-vous emportées ? – Sept, lui répondent-ils. '
  '21':
  - type: note
    content: Cf. 6.52.
  - type: text
    content: 'Et il leur disait : Vous ne comprenez pas encore ?'
  - type: heading
    content: Jésus guérit un aveugle
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Bethsaïda 6.45n. –  le toucher de la main  : litt. le toucher 1.41+.'
  - type: text
    content: 'Ils arrivent à Bethsaïda ; on lui amène un aveugle, et on le supplie de le toucher de la main. '
  '23':
  - type: note
    content: 'Cf. v. 18,27-30 ; 7.32-37 ; 10.46-52 ; voir aussi Jn 9.6. –  Vois-tu  : ce sont des dérivés du verbe grec correspondant qui sont traduits dans la suite par ouvrir les yeux (v. 24), rouvrir grand les yeux, voir (distinctement, v. 25).'
  - type: text
    content: 'Il prit l''aveugle par la main et le conduisit hors du village ; puis il lui cracha sur les yeux et lui imposa les mains, en lui demandant : Vois-tu quelque chose ? '
  '24':
  - type: note
    content: 'ouvrait les yeux  : autres traductions levait les yeux, retrouva la vue (v. 23n).'
  - type: text
    content: 'Il ouvrait les yeux et disait : Je vois des gens ; je les vois comme des arbres, mais ils marchent. '
  '25':
  - type: note
    content: 'quand l''aveugle (litt. il) rouvrit grand les yeux  : autres traductions quand il regarda fixement ; il vit tout à fait clair.'
  - type: text
    content: 'Il lui remit les mains sur les yeux ; quand l''aveugle rouvrit grand les yeux, il était rétabli et voyait tout distinctement. '
  '26':
  - type: note
    content: Certains mss ajoutent et ne dis rien à personne.
  - type: text
    content: 'Alors il le renvoya chez lui, en disant : Ne rentre même pas au village.'
  - type: heading
    content: Pierre déclare que Jésus est le Christ
  - type: heading
    content: Mt 16.13-20  ; Lc 9.18-21  ; cf. Jn 6.67-71
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'villages (cf. v. 26) de Césarée Mt 16.13n. –  de Philippe  : cf. 6.17n. –  Au dire des gens…  : litt. qui les gens me disent-ils être ? Cf. v. 29n,33. Evangile selon Thomas 13 : « Jésus a dit à ses disciples : “Faites une comparaison, et dites-moi à qui je ressemble.” Simon Pierre lui dit : “Tu es semblable à un ange juste.” Matthieu lui dit : “Tu es semblable à un philosophe intelligent.” Thomas lui dit : “Maître, ma bouche est tout à fait incapable de dire à qui tu es semblable.” » (Pour la suite, voir Jn 4.14n.)'
  - type: text
    content: 'Jésus sortit avec ses disciples vers les villages de Césarée de Philippe. En chemin, il se mit à demander à ses disciples : Au dire des gens, qui suis-je ? '
  '28':
  - type: note
    content: 'Cf. 6.14s/ /. –  Pour les uns  : sous-entendu dans le texte ; cf. Lc 9.19n. –  Jean le Baptiseur 1.4n. – Voir aussi prophètes.'
  - type: text
    content: 'Ils lui dirent : Pour les uns, Jean le Baptiseur ; pour d''autres, Elie ; pour d''autres encore, l''un des prophètes. '
  '29':
  - type: note
    content: 'pour vous…  : litt. qui me dites-vous être ? –  le Christ ou le Messie, 1.1n  ; cf. 14.61s.'
  - type: text
    content: 'Lui leur demandait : Et pour vous, qui suis-je ? Pierre lui dit : Toi, tu es le Christ. '
  '3':
  - type: note
    content: 'venus de loin  : cf. Jos 9.6,9 ; Es 60.4 ; Mt 12.42.'
  - type: text
    content: 'Si je les renvoie chez eux à jeun, ils vont défaillir en chemin, car quelques-uns d''entre eux sont venus de loin. '
  '30':
  - type: note
    content: 'rabroua  : cf. v. 32s ; voir 1.25n  ; 9.9.'
  - type: text
    content: Il les rabroua, pour qu'ils ne disent rien à personne à son sujet.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: Mt 16.21-23  ; Lc 9.22
  '31':
  - type: text
    content: ' '
  - type: note
    content: '9.12,31 ; 10.32ss,45 ; Mt 17.12,22 ; 20.18s ; Lc 9.22+ ; 24.7 ; Ac 17.3. –  Fils de l''homme 2.10+. –  rejeté  : cf. 12.10. –  anciens / grands prêtres (Mt 2.4n) / scribes  : c''est la composition du grand sanhédrin (selon la transcription usuelle du terme hébreu qui, dans le Talmud , transcrit lui-même le mot grec sunedrion employé dans les évangiles, et qui signifie tout simplement conseil ), instance suprême des Juifs pour les affaires civiles et religieuses (voir « Le grand sanhédrin de Jérusalem ») Mc 11.27 ; 14.43,53 ; 15.1 ; Mt 16.21 ; 27.41 ; Lc 9.22 ; 20.1 ; 22.66. –  qu''il se relève ou soit relevé , c.-à-d. qu''il ressuscite , cf. 9.9s. –  trois jours après 10.34 ; cf. Mt 16.21 ; 1Co 15.4.'
  - type: text
    content: 'Il commença alors à leur apprendre qu''il fallait que le Fils de l''homme souffre beaucoup, qu''il soit rejeté par les anciens, les grands prêtres et les scribes, qu''il soit tué et qu''il se relève trois jours après. '
  '32':
  - type: note
    content: 'Il disait cela  : autre traduction il disait la Parole, comme en 2.2+ ; cf. 1.45n. –  ouvertement  : cf. Jn 7.4n  ; 10.24 ; Ac 2.29n. –  le rabrouer  : cf. v. 30 ; 1.25n.'
  - type: text
    content: 'Il disait cela ouvertement. Alors Pierre le prit à part et se mit à le rabrouer. '
  '33':
  - type: note
    content: 'Va-t''en derrière moi  : la formule traduite par derrière moi se retrouve au v. 34n  ; cf. 1.17n  ; Mt 16.23n. –  Satan  : cf. 1.13+ ; le terme pourrait être compris ici, d''après son origine hébraïque, dans son sens plus général d’adversaire  ; cf. 1R 11.14n  ; Mt 4.10. Voir démon, diable, Satan. –  Tu ne penses pas… Mt 16.23n. –  les humains  : autres traductions les hommes ; les gens  ; cf. v. 27n  ; Es 55.8s ; 1Co 2.14.'
  - type: text
    content: 'Mais lui se retourna, regarda ses disciples et rabroua Pierre : Va-t''en derrière moi, Satan ! lui dit-il. Tu ne penses pas comme Dieu, mais comme les humains.'
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: Mt 16.24-28  ; Lc 9.23-27
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'me suivre  : litt. suivre derrière moi , cf. v. 33n. –  qu''il se renie lui-même  : même verbe 14.30s,72 ; cf. Mt 10.38 ; 16.24n  ; Lc 14.27. –  croix  : cf. Mt 27.32n.'
  - type: text
    content: 'Puis il appela la foule avec ses disciples et leur dit : Si quelqu''un veut me suivre, qu''il se renie lui-même, qu''il se charge de sa croix et qu''il me suive. '
  '35':
  - type: note
    content: 'quiconque voudra…  : autre traduction quiconque voudra se sauver se perdra  ; même possibilité dans la suite (v. 36s) ; le terme traduit ici par vie est rendu par âme en 12.30 ; cf. 3.4n  ; 10.45n  ; 14.34n  ; voir Mt 10.28n,39+ ; expressions comparables dans LXX Gn 19.17 ; 1S 19.11 ; Jr 48.6. –  à cause de moi et de la bonne nouvelle  : certains mss ont seulement à cause de la bonne nouvelle (1.1n,14s) ; cf. 10.29.'
  - type: text
    content: 'Car quiconque voudra sauver sa vie la perdra, mais quiconque perdra sa vie à cause de moi et de la bonne nouvelle la sauvera. '
  '36':
  - type: note
    content: s'il perd sa vie ou s'il se perd lui-même  ; voir Mt 16.26n  ; Lc 12.13-21.
  - type: text
    content: 'Et à quoi sert-il à un être humain de gagner le monde entier, s''il perd sa vie ? '
  '37':
  - type: note
    content: 'de sa vie ou de lui-même  : cf. Ps 49.7-9.'
  - type: text
    content: 'Que donnerait un être humain en échange de sa vie ? '
  '38':
  - type: note
    content: 'quiconque aura honte de moi…  : cf. Mt 10.33 ; 25.12 ; Lc 12.9 ; Rm 1.16 ; 2Tm 1.12. –  cette génération… v. 12+ ; voir aussi pécheresse. –  Fils de l''homme 2.10+ ; Mt 8.20n. –  la gloire de son Père Jn 1.14 ; 8.54 ; 17.5 ; Ac 7.2,55 ; 2Th 1.7. –  avec les saints anges 13.27.'
  - type: text
    content: En effet, quiconque aura honte de moi et de mes paroles au milieu de cette génération adultère et pécheresse, le Fils de l'homme aussi aura honte de lui quand il viendra dans la gloire de son Père, avec les saints anges.
  '4':
  - type: note
    content: 'Cf. Jn 4.11. –  du pain pour les rassasier  : litt. de quoi les rassasier de pains.'
  - type: text
    content: 'Ses disciples lui répondirent : Où pourrait-on trouver du pain pour les rassasier ici, dans un lieu désert ? '
  '5':
  - type: text
    content: 'Il leur demanda : Combien de pains avez-vous ? – Sept, dirent-ils. '
  '6':
  - type: note
    content: 'Cf. 6.41+ ; 14.22+. –  rendu grâce  : même expression en 14.23 ; Lc 22.19s ; 1Co 11.23ss.'
  - type: text
    content: 'Alors il enjoint à la foule de s''installer par terre. Après avoir pris les sept pains et rendu grâce, il les rompit et se mit à les donner à ses disciples pour qu''ils les distribuent ; ils les distribuèrent à la foule. '
  '7':
  - type: note
    content: 'Après avoir prononcé la bénédiction sur eux (sur les poissons) : litt. après les avoir bénis  ; cf. 6.41n  ; de même Lc 9.16.'
  - type: text
    content: 'Ils avaient encore quelques petits poissons. Après avoir prononcé la bénédiction sur eux, il dit de les distribuer également. '
  '8':
  - type: text
    content: 'Ils mangèrent et furent rassasiés, et on emporta sept corbeilles de morceaux qui restaient '
  '9':
  - type: text
    content: – ils étaient environ quatre mille. Ensuite il les renvoya.
