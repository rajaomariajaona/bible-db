      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ouvrez l'œil et gardez-vous…
      - type: usfm
        marker: ft
        children:
