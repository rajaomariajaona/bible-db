      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en se disant qu'ils n'avaient pas de pains
      - type: usfm
        marker: ft
        children:
        - type: text
