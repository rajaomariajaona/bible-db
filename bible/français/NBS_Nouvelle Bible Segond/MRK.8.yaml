      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; les deux verbes grecs correspondants ont aussi, séparément, le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voir, regarder
      - type: usfm
        marker: ft
        children:
        - type: text
