      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 18.20ss ; Es 7.10-14 ; Mt 12.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.1+ ; Jn 6.30 ; 1Co 1.22.'
      marker-yv: yv-n
    - type: text
      text: 'Les pharisiens survinrent, commencèrent à débattre avec lui et, pour le mettre à l''épreuve, ils lui demandèrent un signe venant du ciel. '
