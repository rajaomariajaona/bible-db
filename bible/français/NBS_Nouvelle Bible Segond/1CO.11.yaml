document_id: 1CO.11,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 4.16 ; cf. Ga 4.12 ; Ep 5.1 ; Ph 3.17 ; 4.9 ; 1Th 1.6 ; 2.14 ; 2Th 3.7,9 ; Hé 6.12 ; 13.7.
  - type: text
    content: Imitez-moi, comme moi-même j'imite le Christ.
  - type: heading
    content: L'homme et la femme devant le Seigneur
  '10':
  - type: note
    content: 'Autre traduction si la femme doit avoir…, c''est à cause… –  une marque d''autorité  : litt. une autorité ou un pouvoir  ; le terme ainsi traduit s''applique en général à une autorité exercée plutôt que subie ; il peut aussi être rendu par droit (8.9n  ; 9.4-6 etc.), possession (7.37n  ; cf. Mc 1.22n  ; Jn 10.17s) ; on pourrait également comprendre un signe de son droit (de parler en prophétesse ou de prier, v. 3). –  à cause des anges  : cf. 6.3 ; Gn 6.2 ; Dt 23.15 ; Ps 138.1n  ; Ep 3.10 ; Testament de Ruben 5.1-6 : « Parce qu''elles (les femmes) n''ont pas d''autorité ou de pouvoir sur l''homme, elles usent d''artifices dans leurs attitudes… Fuyez donc la luxure, mes enfants, et interdisez à vos femmes et à vos filles de parer leur tête et leur visage pour tromper l''esprit… C''est ainsi qu''elles séduisirent les Veilleurs (= les anges) qui existaient avant le déluge. » Règlement de la Guerre (Qumrân) 7.5s (cf. Dt 23.10ss) : « Nul homme qui ne sera en état de pureté à cause de son flux au jour du combat ne descendra avec eux ; car les anges de sainteté accompagneront leurs armées. »'
  - type: text
    content: 'C''est pourquoi la femme doit avoir sur la tête une marque d''autorité, à cause des anges. '
  '11':
  - type: note
    content: Cf. 7.4s ; Ga 3.28.
  - type: text
    content: 'Toutefois, dans le Seigneur, la femme n''est pas sans l''homme, ni l''homme sans la femme. '
  '12':
  - type: note
    content: Cf. v. 8.
  - type: text
    content: En effet, tout comme la femme a été tirée de l'homme, de même l'homme naît par la femme ; et tout vient de Dieu.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Jugez-en  : cf. 10.15. –  par vous-mêmes  : autre traduction entre vous.'
  - type: text
    content: 'Jugez-en par vous-mêmes : convient-il qu''une femme prie Dieu sans être couverte d''un voile ? '
  '14':
  - type: text
    content: 'La nature elle-même ne vous enseigne-t-elle pas qu''il est déshonorant pour l''homme de porter des cheveux longs, '
  '15':
  - type: note
    content: 'Car déjà…  : litt. car la chevelure lui (ce pronom est absent de certains mss) a été donnée en guise d''habit.'
  - type: text
    content: 'alors que pour la femme c''est une gloire ? Car déjà sa chevelure l''habille. '
  '16':
  - type: note
    content: 'se plaît à contester  : autre traduction se considère comme contestataire (expression analogue en 3.18 ; 14.37). –  Eglises de Dieu  : cf. 1.2 ; 14.33 ; 16.19 ; 1Th 2.14 ; 2Th 1.4.'
  - type: text
    content: Mais si quelqu'un se plaît à contester, nous n'avons pas une telle habitude, et les Eglises de Dieu non plus.
  - type: heading
    content: Le repas du Seigneur
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2+. –  injonction  : cf. 7.10.'
  - type: text
    content: 'Si je ne vous félicite pas en formulant cette injonction, c''est que vous vous réunissez, non pas pour le meilleur, mais pour le pire. '
  '18':
  - type: note
    content: 'j''apprends  : cf. 1.11 ; 5.1 ; 16.17. –  lorsque vous vous réunissez 14.26. –  en Eglise ou en assemblée. –  divisions 1.10n-12 ; 3.3.'
  - type: text
    content: 'D''abord, j''apprends que lorsque vous vous réunissez en Eglise, il y a parmi vous des divisions – et je le crois en partie. '
  '19':
  - type: note
    content: 'Il faut…  : cf. 15.25,53. –  des dissensions  : autre traduction des partis (Ac 5.17n  ; 24.5+) ; le terme grec correspondant a donné notre mot hérésie(s) (2P 2.1n) ; cf. Ga 5.20 ; Tt 3.10. –  résistent à l''épreuve  : autre traduction sont dignes d''approbation  ; un verbe apparenté est traduit par s''examiner au v. 28 ; cf. 3.13n  ; même terme en Rm 16.10 (qui a fait ses preuves) ; voir aussi Dt 13.4 ; Mt 18.7 ; 1Jn 2.19.'
  - type: text
    content: 'Il faut bien qu''il y ait aussi des dissensions entre vous, pour que ceux d''entre vous qui résistent à l''épreuve puissent se manifester. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous félicite  : autre traduction je vous loue  ; même verbe v. 17,22 ; Lc 16.8 ; Rm 15.11n. –  retenant… 15.2. –  traditions et transmises rendent un substantif et un verbe apparentés ; cf. v. 23 ; 15.3 ; 2Th 2.15 ; 2P 2.21 ; Jd 3 ; cf. Mt 11.27n  ; Mc 7.13n  ; Ga 1.14 ; Col 2.8 ; voir aussi Rm 6.17n  ; 2Th 3.6.'
  - type: text
    content: Je vous félicite de ce que vous vous souvenez de moi à tous égards, en retenant les traditions telles que je vous les ai transmises.
  '20':
  - type: note
    content: 'prendre part au dîner  : litt. manger le dîner  ; le terme grec désigne le repas du soir. –  du Seigneur  : le texte grec emploie un adjectif qu''on pourrait traduire par seigneurial ou dominical, qui n''apparaît qu''ici et en Ap 1.10n.'
  - type: text
    content: 'Donc, lorsque vous vous réunissez, ce n''est pas pour prendre part au dîner du Seigneur ; '
  '21':
  - type: note
    content: 'se hâte de prendre  : autre traduction prend pour soi, cf. v. 33 ; l''expression son propre dîner est sans doute à comprendre par opposition au dîner du Seigneur (v. 20).'
  - type: text
    content: 'car au moment de manger, chacun se hâte de prendre son propre dîner, de sorte que l''un a faim tandis que l''autre est ivre. '
  '22':
  - type: note
    content: 'en faisant honte…  : cf. Jc 2.5s. –  féliciter v. 2+.'
  - type: text
    content: N'avez-vous pas des maisons pour manger et boire ? Ou bien méprisez-vous l'Eglise de Dieu en faisant honte à ceux qui n'ont rien ? Que dois-je vous dire ? Dois-je vous féliciter ? Sur ce point, je ne vous félicite pas.
  - type: heading
    content: Mt 26.26-28  ; Mc 14.22-24  ; Lc 22.19-20
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai reçu du Seigneur 7.10+ ; 15.3 ; cf. Ga 1.11s. –  où il allait être livré  : litt. où il était livré . –  prit du pain… Mt 26.26-28/ /.'
  - type: text
    content: 'Car moi, j''ai reçu du Seigneur ce que je vous ai transmis : le Seigneur Jésus, dans la nuit où il allait être livré, prit du pain ; '
  '24':
  - type: note
    content: 'avoir rendu grâce  : cf. Mt 26.27n. –  qui est pour vous  : quelques mss portent qui est rompu (ou brisé, ou encore donné) pour vous  ; cf. Lc 22.19. –  en mémoire de  : cf. Lv 24.7 ; Ps 38.1 ; 70.1.'
  - type: text
    content: 'après avoir rendu grâce, il le rompit et dit : « C''est mon corps, qui est pour vous ; faites ceci en mémoire de moi. » '
  '25':
  - type: note
    content: 'l''alliance nouvelle  : cf. Jr 31.31 ; 2Co 3.6 ; cf. Hé 7.22+. –  en mon sang  : cf. Ex 24.6-8 ; Za 9.11.'
  - type: text
    content: 'Il fit de même avec la coupe, après le dîner, en disant : « Cette coupe est l''alliance nouvelle en mon sang ; faites ceci en mémoire de moi, toutes les fois que vous en boirez. » '
  '26':
  - type: note
    content: jusqu'à ce qu'il vienne 16.22n  ; Mt 26.29 ; Ap 22.20+.
  - type: text
    content: Car toutes les fois que vous mangez ce pain et que vous buvez cette coupe, c'est la mort du Seigneur que vous annoncez, jusqu'à ce qu'il vienne.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Hé 6.6+ ; 10.29. –  indignement  : cette remarque vise de toute évidence les problèmes évoqués v. 20ss. –  coupable envers  : cf. Jc 2.10.'
  - type: text
    content: 'C''est pourquoi celui qui mange le pain ou boit la coupe du Seigneur indignement sera coupable envers le corps et le sang du Seigneur. '
  '28':
  - type: note
    content: s'examine ou se mette à l'épreuve  ; cf. v. 19n  ; 3.13n  ; Rm 1.28n  ; 2Co 13.5n  ; voir aussi Mt 26.22ss.
  - type: text
    content: 'Que chacun s''examine plutôt lui-même, et qu''ainsi il mange du pain et boive de la coupe ; '
  '29':
  - type: note
    content: 'discerner  : cf. v. 31n. –  le corps  : quelques mss précisent le corps du Seigneur  ; cf. v. 31n  ; 10.16s ; voir aussi Col 1.18n  ; 2.17n.'
  - type: text
    content: 'car celui qui mange et boit sans discerner le corps mange et boit un jugement contre lui-même. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Je veux… Col 2.1 ; cf. Rm 1.13+. –  la tête  : autre traduction le chef (au sens de commandant, conducteur , peut-être aussi protecteur ) ; en grec le terme correspondant peut également évoquer l''origine (p. ex. la source d''un fleuve ; cf. v. 8s). Dans la suite du passage Paul joue sans doute sur plusieurs acceptions possibles du même mot grec. –  homme / Christ  : cf. Ep 4.15. –  femme / homme Ep 5.23 ; cf. Gn 3.16. –  Dieu / Christ 3.23 ; 15.27s.'
  - type: text
    content: 'Je veux cependant que vous le sachiez : la tête de tout homme, c''est le Christ ; la tête de la femme, c''est l''homme ; et la tête du Christ, c''est Dieu. '
  '30':
  - type: note
    content: 'infirmes Mt 14.14n. –  se sont endormis dans la mort  : litt. se sont endormis, 7.39n  ; 15.6+ ; 1Th 4.13 ; 5.10 ; cf. Mt 9.24+.'
  - type: text
    content: 'C''est pour cela qu''il y a parmi vous beaucoup de malades et d''infirmes, et qu''un assez grand nombre se sont endormis dans la mort. '
  '31':
  - type: note
    content: 'Si nous nous jugions  : autre traduction si nous nous discernions  ; le verbe grec, qui apparaît aussi au v. 29 (cf. 12.10), est dérivé de celui qui est traduit par juger dans la suite (nous ne serions pas jugés) ; cf. v. 28 ; voir aussi Rm 14.22s.'
  - type: text
    content: 'Si nous nous jugions nous-mêmes, nous ne serions pas jugés. '
  '32':
  - type: note
    content: Cf. 1P 4.17. –  nous corrige Hé 12.5-10. –  afin que nous ne soyons pas condamnés, autre dérivé du verbe correspondant à juger (v. 31n) ; cf. 5.5.
  - type: text
    content: Mais par ses jugements le Seigneur nous corrige, afin que nous ne soyons pas condamnés avec le monde.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 21n.
  - type: text
    content: 'Ainsi, mes frères, lorsque vous vous réunissez pour le repas, attendez-vous les uns les autres. '
  '34':
  - type: note
    content: 'je les réglerai…  : cf. 7.1+,17+. –  quand je viendrai 4.19+.'
  - type: text
    content: Si quelqu'un a faim, qu'il mange chez lui, afin que vous ne vous réunissiez pas pour votre propre jugement.
  - type: text
    content: Quant aux autres questions, je les réglerai quand je viendrai.
  '4':
  - type: note
    content: 'parle en prophète 14.1+. –  la tête couverte  : autre traduction avec un voile qui pend de sa tête  ; le texte pourrait s''opposer à la coutume juive consistant à se couvrir la tête pour prier, mais il n''est pas certain que cette coutume ait déjà été en vigueur au Ier s. apr. J.-C. ; cf. 2Co 3.18. –  fait honte à sa tête  : expression ambiguë ; on peut comprendre ou bien déshonore celui qui est sa tête (ou son chef, cf. v. 3n), ou bien déshonore sa propre tête, c.-à-d. se déshonore lui-même (cf. v. 3-7, 13-15).'
  - type: text
    content: 'Tout homme qui prie ou qui parle en prophète la tête couverte fait honte à sa tête. '
  '5':
  - type: note
    content: Voir v. 4n  ; cf. 14.33-36.
  - type: text
    content: 'Mais toute femme qui prie ou qui parle en prophétesse la tête non couverte d''un voile fait honte à sa tête : c''est comme si elle était rasée. '
  '6':
  - type: note
    content: Cf. Gn 24.65.
  - type: text
    content: 'Si une femme ne se couvre pas d''un voile, qu''elle se coupe aussi les cheveux ! Et s''il est choquant qu''une femme ait les cheveux coupés ou rasés, qu''elle se couvre d''un voile ! '
  '7':
  - type: note
    content: Cf. Gn 1.26ns ; 5.1 ; 9.6 ; cf. 2Co 4.4+ ; Jc 3.9. – Voir gloire.
  - type: text
    content: 'Un homme ne doit pas se couvrir la tête d''un voile, puisqu''il est l''image et la gloire de Dieu ; la femme, elle, est la gloire de l''homme. '
  '8':
  - type: note
    content: Gn 2.21s ; 1Tm 2.13.
  - type: text
    content: 'En effet, ce n''est pas l''homme qui a été tiré de la femme, mais la femme de l''homme ; '
  '9':
  - type: note
    content: Gn 2.18.
  - type: text
    content: 'et ce n''est pas l''homme qui a été créé à cause de la femme, mais la femme à cause de l''homme. '
