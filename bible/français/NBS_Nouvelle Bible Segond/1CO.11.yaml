        - type: text
          text: son chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), ou bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: déshonore sa propre tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se déshonore lui-même '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 3-7, 13-15).
      marker-yv: yv-n
    - type: text
      text: 'Tout homme qui prie ou qui parle en prophète la tête couverte fait honte à sa tête. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 14.33-36.'
      marker-yv: yv-n
    - type: text
      text: 'Mais toute femme qui prie ou qui parle en prophétesse la tête non couverte d''un voile fait honte à sa tête : c''est comme si elle était rasée. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 24.65.
      marker-yv: yv-n
    - type: text
      text: 'Si une femme ne se couvre pas d''un voile, qu''elle se coupe aussi les cheveux ! Et s''il est choquant qu''une femme ait les cheveux coupés ou rasés, qu''elle se couvre d''un voile ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 1.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; 5.1 ; 9.6 ; cf. 2Co 4.4+ ; Jc 3.9. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Un homme ne doit pas se couvrir la tête d''un voile, puisqu''il est l''image et la gloire de Dieu ; la femme, elle, est la gloire de l''homme. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 2.21s ; 1Tm 2.13.
      marker-yv: yv-n
    - type: text
      text: 'En effet, ce n''est pas l''homme qui a été tiré de la femme, mais la femme de l''homme ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 2.18.
      marker-yv: yv-n
    - type: text
      text: 'et ce n''est pas l''homme qui a été créé à cause de la femme, mais la femme à cause de l''homme. '
