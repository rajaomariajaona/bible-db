document_id: 1CO.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.16 ; cf. Ga 4.12 ; Ep 5.1 ; Ph 3.17 ; 4.9 ; 1Th 1.6 ; 2.14 ; 2Th 3.7,9 ; Hé 6.12 ; 13.7.
      marker-yv: yv-n
    - type: text
      text: Imitez-moi, comme moi-même j'imite le Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'homme et la femme devant le Seigneur
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si la femme doit avoir…, c''est à cause… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une marque d'autorité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une autorité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un pouvoir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme ainsi traduit s''applique en général à une autorité exercée plutôt que subie ; il peut aussi être rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (8.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.4-6 etc.), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'possession '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (7.37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Mc 1.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jn 10.17s) ; on pourrait également comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un signe de son droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de parler en prophétesse ou de prier, v. 3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à cause des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.3 ; Gn 6.2 ; Dt 23.15 ; Ps 138.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ep 3.10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Ruben '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1-6 : « Parce qu''elles (les femmes) n''ont pas d''autorité ou de pouvoir sur l''homme, elles usent d''artifices dans leurs attitudes… Fuyez donc la luxure, mes enfants, et interdisez à vos femmes et à vos filles de parer leur tête et leur visage pour tromper l''esprit… C''est ainsi qu''elles séduisirent les Veilleurs (= les anges) qui existaient avant le déluge. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règlement de la Guerre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 7.5s (cf. Dt 23.10ss) : « Nul homme qui ne sera en état de pureté à cause de son flux au jour du combat ne descendra avec eux ; car les anges de sainteté accompagneront leurs armées. »'
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi la femme doit avoir sur la tête une marque d''autorité, à cause des anges. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 7.4s ; Ga 3.28.
      marker-yv: yv-n
    - type: text
      text: 'Toutefois, dans le Seigneur, la femme n''est pas sans l''homme, ni l''homme sans la femme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 8.
      marker-yv: yv-n
    - type: text
      text: En effet, tout comme la femme a été tirée de l'homme, de même l'homme naît par la femme ; et tout vient de Dieu.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jugez-en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par vous-mêmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entre vous.
      marker-yv: yv-n
    - type: text
      text: 'Jugez-en par vous-mêmes : convient-il qu''une femme prie Dieu sans être couverte d''un voile ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'La nature elle-même ne vous enseigne-t-elle pas qu''il est déshonorant pour l''homme de porter des cheveux longs, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Car déjà…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car la chevelure lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ce pronom est absent de certains mss) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a été donnée en guise d'habit.
      marker-yv: yv-n
    - type: text
      text: 'alors que pour la femme c''est une gloire ? Car déjà sa chevelure l''habille. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se plaît à contester
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se considère comme contestataire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(expression analogue en 3.18 ; 14.37). –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglises
        - type: text
          text: ' de Dieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.2 ; 14.33 ; 16.19 ; 1Th 2.14 ; 2Th 1.4.'
      marker-yv: yv-n
    - type: text
      text: Mais si quelqu'un se plaît à contester, nous n'avons pas une telle habitude, et les Eglises de Dieu non plus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le repas du Seigneur
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: injonction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.10.'
      marker-yv: yv-n
    - type: text
      text: 'Si je ne vous félicite pas en formulant cette injonction, c''est que vous vous réunissez, non pas pour le meilleur, mais pour le pire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'apprends
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.11 ; 5.1 ; 16.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lorsque vous vous réunissez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglise
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'divisions '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: -12 ; 3.3.
      marker-yv: yv-n
    - type: text
      text: 'D''abord, j''apprends que lorsque vous vous réunissez en Eglise, il y a parmi vous des divisions – et je le crois en partie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il faut…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.25,53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des dissensions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des partis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Ac 5.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.5+) ; le terme grec correspondant a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hérésie(s) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2P 2.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; cf. Ga 5.20 ; Tt 3.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: résistent à l'épreuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sont dignes d'approbation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; un verbe apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''examiner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 28 ; cf. 3.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; même terme en Rm 16.10 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui a fait ses preuves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; voir aussi Dt 13.4 ; Mt 18.7 ; 1Jn 2.19.
      marker-yv: yv-n
    - type: text
      text: 'Il faut bien qu''il y ait aussi des dissensions entre vous, pour que ceux d''entre vous qui résistent à l''épreuve puissent se manifester. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je vous félicite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je vous loue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même verbe v. 17,22 ; Lc 16.8 ; Rm 15.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'retenant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'traditions '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'transmises '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rendent un substantif et un verbe apparentés ; cf. v. 23 ; 15.3 ; 2Th 2.15 ; 2P 2.21 ; Jd 3 ; cf. Mt 11.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mc 7.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ga 1.14 ; Col 2.8 ; voir aussi Rm 6.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Th 3.6.'
      marker-yv: yv-n
    - type: text
      text: Je vous félicite de ce que vous vous souvenez de moi à tous égards, en retenant les traditions telles que je vous les ai transmises.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prendre part au dîner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: manger le dîner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme grec désigne le repas du soir. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte grec emploie un adjectif qu''on pourrait traduire par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seigneurial '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dominical
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui n''apparaît qu''ici et en Ap 1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Donc, lorsque vous vous réunissez, ce n''est pas pour prendre part au dîner du Seigneur ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se hâte de prendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prend pour soi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 33 ; l''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son propre dîner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est sans doute à comprendre par opposition au '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dîner du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 20).
      marker-yv: yv-n
    - type: text
      text: 'car au moment de manger, chacun se hâte de prendre son propre dîner, de sorte que l''un a faim tandis que l''autre est ivre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en faisant honte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jc 2.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'féliciter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2+.
