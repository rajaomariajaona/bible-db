document_id: PSA.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance en Dieu dans l'adversité
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'les yeux  : litt. l''œil  ; autre traduction le visage  ; cf. 6.8n. –  la gorge et le ventre  : on a aussi compris l''âme et le corps  ; cf. 6.4n.'
  - type: text
    content: 'Fais-moi grâce, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car je suis dans la détresse ;'
  - type: text
    content: j'ai les yeux, la gorge et le ventre rongés par la contrariété.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '102.4 ; Jr 20.18. –  vacille  : litt. trébuche  ; cf. Lm 1.14 ; Né 4.4. –  à cause de ma faute  : autres traductions par ma faute ; dans ma faute  ; certaines versions anciennes ont lu à cause de ma misère ou de mon affliction. Voir péché. –  mes os… 6.3+.'
  - type: text
    content: Ma vie s'épuise dans le chagrin,
  - type: text
    content: mes années dans les soupirs ;
  - type: text
    content: ma force vacille à cause de ma faute,
  - type: text
    content: mes os sont rongés.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; cf. 38.12 ; 41.10 ; 44.14 ; 69.9 ; 80.7 ; 88.9,19 ; Jb 19.13-19 ; Lc 23.49. –  je suis le déshonneur suprême  : autre traduction je suis couvert d''outrages par mes voisins  ; certains modifient le texte hébreu traditionnel pour lire je suis un déshonneur et un objet de discorde (cf. 80.7 ; autres possibilités un sujet d''effroi, de crainte, de hochements de tête ) pour mes voisins.'
  - type: text
    content: A cause de tous mes adversaires,
  - type: text
    content: je suis le déshonneur suprême de mes voisins,
  - type: text
    content: la frayeur de ceux qui me connaissent ;
  - type: text
    content: ceux qui me voient dehors s'enfuient loin de moi.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 22.28.
  - type: text
    content: Je suis oublié des cœurs, comme un mort,
  - type: text
    content: je suis comme un objet perdu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'effroi de tous côtés  : hébreu magor-missaviv , comme en Jr 6.25+ ; 20.3n,10 ; cf. Ps 22.17. –  ils intriguent…  : cf. 37.7,12 ; 64.3 ; 83.4 ; Mt 26.3-4/ /.'
  - type: text
    content: J'ai entendu les mauvais propos de beaucoup,
  - type: text
    content: – effroi de tous côtés ! –
  - type: text
    content: 'quand ils se liguent ensemble contre moi :'
  - type: text
    content: ils intriguent pour m'ôter la vie.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.2 ; 16.1s. –  mon Dieu 22.11+.
  - type: text
    content: 'Moi, j''ai mis ma confiance en toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'J''ai dit : Tu es mon Dieu !'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Mes temps  : peut-être au sens de ma destinée. –  délivre-moi de la main… 7.2+. –  persécuteurs ou poursuivants , 7.2n.'
  - type: text
    content: Mes temps sont dans ta main ;
  - type: text
    content: délivre-moi de la main de mes ennemis et de mes persécuteurs !
  '17':
  - type: text
    content: ' '
  - type: note
    content: Fais briller ta face 4.7+ ; 67.2 ; 80.4,8,20 ; 119.135 ; Nb 6.25 ; Ec 8.1. –  sauve-moi 6.5+.
  - type: text
    content: Fais briller ta face sur moi, ton serviteur,
  - type: text
    content: sauve-moi par ta fidélité !
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 2+. –  Que les méchants… 63.10 ; voir justice. – Voir séjour des morts.
  - type: text
    content: Seigneur
  - type: text
    content: ', que je n''aie pas honte quand je t''invoque !'
  - type: text
    content: Que les méchants aient honte,
  - type: text
    content: qu'ils descendent en silence au séjour des morts !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'insolence  : même terme en 75.6 ; 94.4 ; 1S 2.3.'
  - type: text
    content: Qu'elles deviennent muettes, les lèvres menteuses,
  - type: text
    content: qui parlent avec insolence contre le juste,
  - type: text
    content: avec orgueil et mépris !
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 71.1-3. –  je trouve un abri 7.2+. –  honte 22.6+ ; 25.2,20.
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est en toi que je trouve un abri.'
  - type: text
    content: Que jamais je n'aie honte !
  - type: text
    content: Par ta justice, donne-moi d'échapper !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'que tu tiens en réserve  : le verbe correspondant est traduit par préserver au v. 21 ; cf. Tt 3.4. –  qui te craignent 15.4+.'
  - type: text
    content: Oh ! combien est grande ta bonté,
  - type: text
    content: que tu tiens en réserve pour ceux qui te craignent,
  - type: text
    content: que tu exerces envers ceux qui trouvent en toi un abri,
  - type: text
    content: en face des humains !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Tu les caches… 27.5n. –  des intrigues  : traduction incertaine, le mot hébreu correspondant n''apparaît qu''ici ; il pourrait désigner des pratiques magiques ; certains modifient le texte hébreu traditionnel pour lire des calomnies. –  dans une hutte  : cf. 27.5n. –  des langues qui les accusent  : litt. de la dispute des langues  ; cf. 5.10+ ; 12.3-5.'
  - type: text
    content: Tu les caches au secret de ta face, loin des intrigues des hommes,
  - type: text
    content: dans une hutte tu les préserves des langues qui les accusent.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit le Seigneur 28.6+ ; cf. 4.4 ; 17.7 ; 66.20. –  dans la (litt. une ) ville forte  : certains modifient le texte hébreu traditionnel pour lire au temps de la détresse.'
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car il a montré envers moi une fidélité étonnante
  - type: text
    content: dans la ville forte.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'je disais…  : cf. 116.11 ; Jon 2.5. –  Je suis chassé  : autres traductions je suis supprimé ; j''ai disparu . –  mes supplications 28.2n. –  je t''ai appelé au secours  : cf. 3.5+.'
  - type: text
    content: 'Et moi, je disais, dans ma précipitation :'
  - type: text
    content: Je suis chassé loin de tes yeux !
  - type: text
    content: Mais tu as entendu mes supplications,
  - type: text
    content: quand je t'ai appelé au secours.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'garde les hommes sûrs (ou dignes de confiance , 12.2) : LXX recherche la vérité. –  paie de retour  : cf. 94.2 ; Dt 32.41.'
  - type: text
    content: 'Aimez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous tous, ses fidèles !'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' garde les hommes sûrs,'
  - type: text
    content: mais il paie de retour celui qui agit avec orgueil.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Soyez forts 27.14+ ; LXX a traduit par le verbe qui figure en 1Co 16.13 ( comportez-vous en hommes ). –  que votre cœur soit courageux (litt. ferme ou fort ) : en mauvaise part, des expressions analogues peuvent évoquer l''entêtement (cf. Dt 2.30+). –  qui attendez le Seigneur 33.18 ; 37.7 ; 38.16 ; 42.6,12 ; 43.5 ; 69.7 ; 119.43 ; 145.15 ; 147.11 ; cf. 25.3+.'
  - type: text
    content: Soyez forts, que votre cœur soit courageux,
  - type: text
    content: 'vous tous qui attendez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Tends (ou incline ) vers moi… 17.6 ; cf. 5.2+. –  délivre-moi vite 69.18 ; 70.2,6 ; 79.8 ; 102.3 ; 141.1 ; 143.7. –  un rocher fortifié… 18.3+ ; 27.1+. –  une place forte  : litt. une maison forteresse  ; cf. v. 4 (autre terme hébreu au v. 5).'
  - type: text
    content: Tends vers moi ton oreille,
  - type: text
    content: délivre-moi vite !
  - type: text
    content: Sois pour moi un rocher fortifié, une place forte,
  - type: text
    content: pour que je sois sauvé !
  '4':
  - type: text
    content: ' '
  - type: note
    content: à cause de ton nom… 23.3+.
  - type: text
    content: Car tu es mon roc, ma forteresse ;
  - type: text
    content: à cause de ton nom tu me conduiras, tu me dirigeras.
  '5':
  - type: text
    content: ' '
  - type: note
    content: sortir du filet 25.15+. –  forteresse 1S 22.4n  ; 23.14 ; 2S 5.17.
  - type: text
    content: Tu me feras sortir du filet qu'on a tendu pour moi ;
  - type: text
    content: car tu es ma forteresse.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Je te confie mon souffle (ou mon esprit ) : litt. je remets mon souffle en ta main (LXX tes mains ) Lc 23.46  ; Ac 7.59 ; 1P 4.19. –  tu m''as libéré Dt 7.8n. –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  loyauté  : autre traduction vérité.'
  - type: text
    content: Je te confie mon souffle ;
  - type: text
    content: 'tu m''as libéré, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu de loyauté !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je déteste  : des versions anciennes ont lu tu détestes. –  qui s''attachent à  : litt. qui gardent ou qui observent . –  des futilités illusoires  : l''expression peut désigner des idoles ou des pratiques religieuses ; cf. 4.3 ; Dt 32.21 ; Jr 8.19n  ; Jon 2.9. –  j''ai mis ma confiance… 4.6+.'
  - type: text
    content: Je déteste ceux qui s'attachent à des futilités illusoires ;
  - type: text
    content: 'moi, j''ai mis ma confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'tu vois / tu connais 1.6 ; 37.18 ; 119.153. –  tu connais…  : autre traduction tu prends soin de moi dans mes détresses  ; cf. 25.17ss ; Na 1.7.'
  - type: text
    content: Mon allégresse, ma joie, je les trouve en ta fidélité ;
  - type: text
    content: car tu vois mon affliction,
  - type: text
    content: tu connais mes détresses,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'livré  : cf. 78.48,50,62 ; Dt 23.16n. –  tu m''installes…  : litt. tu places mes pieds au large  ; cf. 4.2n  ; 18.20.'
  - type: text
    content: et tu ne m'as pas livré à l'ennemi ;
  - type: text
    content: tu m'installes au large.
