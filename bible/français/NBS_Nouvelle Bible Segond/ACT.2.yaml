      marker: fq
      children:
      - type: text
        text: 'stupéfaits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 12 ; 3.10 ; 8.9ss ; 9.21 ; 10.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
