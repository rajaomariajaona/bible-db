    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme peut s''entendre d''un séjour temporaire ou permanent ; cf. v. 14 ; 1.19+.'
    marker-yv: yv-n
  - type: text
    text: 'Or des Juifs pieux de toutes les nations qui sont sous le ciel habitaient Jérusalem. '
  - type: usfm
    marker: v
