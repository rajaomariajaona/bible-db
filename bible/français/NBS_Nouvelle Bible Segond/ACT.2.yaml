    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : transcription du mot signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cinquantième (jour) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 1.3 ; 20.16), nom grec de l''antique fête des Semaines ou des Moissons (Ex 23.16 ; Lv 23.9-21 ; Nb 28.26-30 ; Dt 16.9-12) : elle est devenue pour le judaïsme la fête du don de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' de Moïse au Sinaï (cf. Ex 19.1 ; 2Ch 15.10ss) ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous ensemble
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd''un commun accord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(1.14+). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en un même lieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque arriva le jour de la Pentecôte, ils étaient tous ensemble en un même lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 4.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1P 1.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coup de vent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec est apparenté à celui qui désigne '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
      - type: text
        text: ' (v. 4) ; il a aussi le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souffle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 17.25 et dans la traduction grecque (
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ') de Gn 2.7 ; 7.22 ; Pr 1.23 ; cf. Jn 3.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout à coup, il vint du ciel un bruit comme celui d''un violent coup de vent, qui remplit toute la maison où ils étaient assis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Des langues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même mot qu''au v. 4 ; cf. Es 5.24 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Hénoch
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '71.5 : « Il a enlevé mon esprit… au plus haut des cieux. Et là j''ai vu, dans cette lumière, un édifice fait de blocs de glace et au milieu des blocs, des langues de feu vivant. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lc 3.16/ / ; cf. Dt 4.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se séparaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe sera traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'partager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 45 ; cf. Lc 22.17.
    marker-yv: yv-n
  - type: text
    text: 'Des langues leur apparurent, qui semblaient de feu et qui se séparaient les unes des autres ; il s''en posa sur chacun d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'remplis d''Esprit '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.8,31 ; 6.3,5 ; 7.55 ; 9.17 ; 11.24 ; 13.9,52 ; cf. 2.13 ; Nb 11.25-29 ; 1S 10.5s ; 1R 22.10 ; Lc 4.1 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '48.12 : « Lorsque Elie eut été caché dans le tourbillon, Elisée fut rempli de son esprit. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en d'autres langues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ici il s''agit de langues étrangères effectivement parlées par d''autres peuples (même terme v. 11), ce qui n''est pas forcément le cas du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parler en langues '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoqué dans d''autres textes (et ici, peut-être, par le texte occidental, d''après une reconstitution) ; cf. 10.46 ; 19.6 ; Mc 16.17 ; 1Co 12–14 ; voir aussi Gn 11.1-9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: énoncer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant, qui a donné notre mot « apophtegme », ne revient, dans le N.T., qu''au v. 14 et en 26.25 ; ailleurs il peut évoquer les oracles d''une divinité.'
    marker-yv: yv-n
  - type: text
    text: Ils furent tous remplis d'Esprit saint et se mirent à parler en d'autres langues, selon ce que l'Esprit leur donnait d'énoncer.
