document_id: ACT.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: À JÉRUSALEM
  - type: heading
    content: La venue de l'Esprit saint
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''ensemble de cette scène inaugurale, voir Lc 4.16-30 et l''introduction. –  Lorsque arriva le jour  : même expression grecque en Lc 9.51. –  Pentecôte  : transcription du mot signifiant cinquantième (jour) (cf. 1.3 ; 20.16), nom grec de l''antique fête des Semaines ou des Moissons (Ex 23.16 ; Lv 23.9-21 ; Nb 28.26-30 ; Dt 16.9-12) : elle est devenue pour le judaïsme la fête du don de la loi de Moïse au Sinaï (cf. Ex 19.1 ; 2Ch 15.10ss) ; voir calendrier et fêtes. –  tous ensemble  : certains mss portent d''un commun accord (1.14+). –  en un même lieu 1.15n.'
  - type: text
    content: 'Lorsque arriva le jour de la Pentecôte, ils étaient tous ensemble en un même lieu. '
  '10':
  - type: note
    content: 'd''Egypte  : cf. 18.24n. –  Libye cyrénaïque  : litt. la région de Libye voisine de Cyrène 13.1n. –  citoyens romains ou résidents romains (dispersés dans l''Empire) : cf. 1.8n  ; 16.21n.'
  - type: text
    content: 'de Phrygie, de Pamphylie, d''Egypte, de Libye cyrénaïque, citoyens romains, '
  '11':
  - type: note
    content: 'prosélytes  : il s''agit ici d''hommes convertis au judaïsme et circoncis ; cf. 6.5 ; 13.43n  ; Mt 23.15. –  Crétois et Arabes est peut-être à comprendre ici en un sens général, Occidentaux et Orientaux. –  dans notre langue 2.4n  ; cf. 10.46. –  œuvres grandioses  : un terme apparenté est traduit par prestige en 19.27 ; par grandeur en Lc 9.43 ; 2P 1.16.'
  - type: text
    content: 'Juifs et prosélytes, Crétois et Arabes, nous les entendons dire dans notre langue les œuvres grandioses de Dieu ! '
  '12':
  - type: note
    content: perplexes 5.24+.
  - type: text
    content: 'Tous étaient stupéfaits et perplexes ; ils se disaient les uns aux autres : Qu''est-ce que cela veut dire ? '
  '13':
  - type: note
    content: 'Cf. 17.32 ; 1Co 14.23 ; voir aussi Jb 32.18s ; Ep 5.18. –  vin doux ou vin nouveau  : il s''agit normalement du vin dont la fermentation n''est pas achevée.'
  - type: text
    content: 'Mais d''autres se moquaient en disant : Ils sont pleins de vin doux !'
  - type: heading
    content: Pierre s'adresse à la foule
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.13-26 ; 4.10-12 ; 5.30-32 ; 10.36-43 ; 13.17-41 ; 14.15-17 ; 17.22-31. –  avec les Onze…  : texte occidental  : avec les dix apôtres, éleva le premier la voix (cf. 1.15-26) ; Mt 28.16+. –  Hommes de Judée  : autre traduction  : Juifs , comme au v. 5 ; cf. v. 22. –  qui habitez 1.19+ ; 2.5n. –  prêtez l''oreille…  : litt. que ceci soit connu de vous et prêtez l''oreille à mes paroles  ; cf. 4.10 ; 13.38 ; 28.28 ; voir aussi Gn 4.23 ; Jb 32.10s.'
  - type: text
    content: 'Alors Pierre, debout avec les Onze, éleva la voix et énonça ce qui suit à leur adresse : Hommes de Judée et vous tous qui habitez Jérusalem, prêtez l''oreille à mes paroles ! Sachez-le : '
  '15':
  - type: note
    content: 'pas ivres  : cf. 26.25. –  la troisième heure  : entre 8 h et 9 h du matin environ.'
  - type: text
    content: 'ces gens ne sont pas ivres comme vous le supposez, car ce n''est que la troisième heure du jour. '
  '16':
  - type: note
    content: Jl 3.1-5, cité d'après LXX.
  - type: text
    content: 'Mais c''est ce qui a été dit par l''entremise du prophète Joël :'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dans les derniers jours ou, selon d''autres témoins du texte, après cela  ; cf. Gn 49.1n  ; Es 2.2. –  je répandrai 2.33 ; 10.45 ; Rm 5.5 ; Tt 3.5s. –  sur tous  : litt. sur toute chair . –  vos filles parleront (ou agiront ) en prophètes  : cf. 21.9ss ; voir aussi 1Co 11.5.'
  - type: text
    content: Dans les derniers jours, dit Dieu,
  - type: text
    content: je répandrai de mon Esprit sur tous ;
  - type: text
    content: vos fils et vos filles parleront en prophètes,
  - type: text
    content: vos jeunes gens auront des visions
  - type: text
    content: et vos vieillards auront des rêves
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sur mes esclaves, hommes et femmes  : autre traduction même sur mes serviteurs et mes servantes  ; cf. 4.29n  ; 16.17n  ; 20.19n  ; voir Lc 1.38n. –  et ils parleront en prophètes  : cf. 11.27s ; 13.1s ; 15.32 ; 19.6 ; 21.9-14 ; 1Co 14.1+ ; voir aussi Nb 11.29.'
  - type: text
    content: Oui, sur mes esclaves, hommes et femmes, en ces jours-là,
  - type: text
    content: je répandrai de mon Esprit,
  - type: text
    content: ' et ils parleront en prophètes.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Je donnerai  : autre traduction je mettrai  ; cf. 14.3 ; Mc 13.22n. –  prodiges / signes 2.22,43 ; 4.30 ; 5.12 ; 6.8 ; 7.36 ; 14.3 ; 15.12 ; 2Co 12.12+ ; cf. Ex 7.3 ; Dt 4.34 ; 6.22. – Voir sang.'
  - type: text
    content: Je donnerai des prodiges
  - type: text
    content: ' en haut '
  - type: text
    content: dans le ciel
  - type: text
    content: et
  - type: text
    content: ' des signes en bas '
  - type: text
    content: sur la terre,
  - type: text
    content: du sang, du feu et une vapeur de fumée ;
  '2':
  - type: note
    content: 'Cf. 4.31. –  du ciel 1P 1.12. –  coup de vent  : le terme grec est apparenté à celui qui désigne l''Esprit (v. 4) ; il a aussi le sens de souffle ou d’esprit en 17.25 et dans la traduction grecque (LXX) de Gn 2.7 ; 7.22 ; Pr 1.23 ; cf. Jn 3.8. –  la maison  : cf. 1.13n.'
  - type: text
    content: 'Tout à coup, il vint du ciel un bruit comme celui d''un violent coup de vent, qui remplit toute la maison où ils étaient assis. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le soleil…  : cf. Ap 6.12. –  le jour du Seigneur  : cf. 1Co 1.8+ ; voir aussi Am 5.18-20. –  et magnifique  : les termes grecs correspondants sont absents de certains mss.'
  - type: text
    content: le soleil se changera en ténèbres
  - type: text
    content: et la lune en sang,
  - type: text
    content: avant que vienne le jour du Seigneur, ce jour grand et magnifique
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'invoquera le nom…  : cf. 3.16+ ; 9.14 ; 22.16 ; Rm 10.13 ; 1Co 1.2+. –  sera sauvé v. 47 ; 4.12.'
  - type: text
    content: Alors quiconque invoquera le nom du Seigneur sera sauvé
  - type: text
    content: .
  '22':
  - type: text
    content: ' '
  - type: note
    content: Hommes d'Israël ou Israélites , cf. v. 14n  ; 3.12 ; 5.35 ; 13.16 ; 21.28. –  le Nazoréen 3.6 ; 4.10 ; 6.14 ; 22.8 ; 24.5 ; 26.9 ; Mt 2.23n  ; Lc 18.37 ; Jn 18.5,7 ; 19.19. –  que Dieu a accrédité… ou, plus littéralement, que Dieu vous a montré  ; le même verbe est traduit par prouver 25.7, exhiber 1Co 4.9. –  les miracles Lc 10.13n. –  les prodiges et les signes v. 19+ ; cf. 10.38 ; Lc 24.19 ; Jn 5.36+ ; Hé 2.4.
  - type: text
    content: 'Hommes d''Israël, écoutez ces paroles ! Jésus le Nazoréen, cet homme que Dieu a accrédité auprès de vous par les miracles, les prodiges et les signes qu''il a produits par son entremise au milieu de vous, comme vous le savez vous-mêmes, '
  '23':
  - type: note
    content: 'cet homme  : litt. celui-ci. –  les décisions arrêtées ou la décision arrêtée (le même verbe est traduit par instituer en 10.42 ; décider en 11.29 ; déterminer en 17.26 ; désigné en 17.31 ; on le trouve également en Lc 22.22 ; Rm 1.4n  ; Hé 4.7n) : cf. Ac 4.28ss (verbe apparenté au v. 28) ; 13.36 ; 20.27 ; voir aussi 3.18,21 ; 5.38s ; 21.14 ; 22.14. –  dans la prescience  : litt. et la prescience 1P 1.2n. –  vous l''avez supprimé 3.15 ; 4.10 ; 5.30 ; 10.39 ; 13.28. –  en le faisant crucifier…  : litt. en le clouant par la main de sans-loi, en l''occurrence des non-Juifs.'
  - type: text
    content: 'cet homme, livré selon les décisions arrêtées dans la prescience de Dieu, vous l''avez supprimé en le faisant crucifier par des sans-loi. '
  '24':
  - type: note
    content: 'relevé ou ressuscité  ; un terme apparenté est traduit par résurrection (litt. relèvement) au v. 31 ; 1.22 ; 4.2,33 ; 17.18,32 ; 23.6,8 ; 24.15,21 ; 26.23n  ; autre verbe 3.15n  ; cf. 2.32 ; 3.26n  ; 10.41 ; 13.33s ; 17.3,31 ; Lc 24.5s. –  en le délivrant…  : litt. en déliant les douleurs  : le terme grec s''applique habituellement aux douleurs de l''accouchement (c''est par ce mot que LXX a traduit le mot hébreu qui signifie liens en Ps 18.5nss/ / ; 116.3) ; cf. Mt 24.8n/ /.'
  - type: text
    content: 'Dieu l''a relevé en le délivrant des douleurs de la mort, parce qu''il n''était pas possible qu''il soit retenu par elle. '
  '25':
  - type: note
    content: 'dit de lui  : cf. Ep 5.32n. –  Je voyais  : autre traduction d''avance je voyais  ; le même verbe grec qui, en Ps 16.8-11 (cité ici d''après LXX), signifie simplement voir devant soi, revient au v. 31 avec le sens de voir d''avance.'
  - type: text
    content: 'Car David a dit de lui :'
  - type: text
    content: Je voyais constamment le Seigneur devant moi,
  - type: text
    content: parce qu'il est à ma droite afin que je ne sois pas ébranlé
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'est transportée d''allégresse  : terme apparenté au v. 46 ; le même verbe est traduit par se réjouir en 16.34 ; cf. Lc 1.47+. –  reposera ou habitera , même verbe Mt 13.32/ / ; cf. 8.20n.'
  - type: text
    content: Voilà pourquoi mon cœur est en fête
  - type: text
    content: et ma langue est transportée d'allégresse ;
  - type: text
    content: ma chair même reposera dans l'espérance ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'tu ne m''abandonneras pas  : autre traduction tu n''abandonneras pas mon âme , cf. Mt 10.28n. – Voir séjour des morts . –  ton Saint (cf. 3.14, autre terme ; sur le mot qui apparaît ici et en 13.34s, voir Lc 1.75+ ; Ep 4.24n) voir la décomposition ou la pourriture (terme traditionnellement rendu par corruption ), formule propre à LXX ; voir Ps 16.10n  ; termes apparentés pour périr, périssable en 1Co 9.25+.'
  - type: text
    content: car tu ne m'abandonneras pas au séjour des morts,
  - type: text
    content: tu ne laisseras pas ton Saint voir la décomposition
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'par ta présence  : litt. avec ta face , Ps 16.11n  ; 21.7n.'
  - type: text
    content: Tu m'as fait connaître les chemins de la vie,
  - type: text
    content: tu me rempliras de bonheur par ta présence
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: Mes frères 1.16n. –  avec assurance ou ouvertement  ; même terme, caractéristique de la proclamation apostolique, en 4.13,29,31 ; 28.31 (et, dans le texte occidental reconstitué, 9.20 ; 14.19 ; 16.4) ; verbe correspondant en 9.27s ; 13.46 ; 14.3 ; 18.26 ; 19.8 ; 26.26 ; voir aussi Jn 7.4n  ; 2Co 3.12+ ; Hé 3.6+ ; 1Jn 2.28+. –  David… 13.36 ; 1R 2.10.
  - type: text
    content: 'Mes frères, qu''il me soit permis de vous dire ceci avec assurance, au sujet du patriarche David : il est mort, il a été enseveli et son tombeau est encore aujourd''hui parmi nous. '
  '3':
  - type: note
    content: 'Des langues  : même mot qu''au v. 4 ; cf. Es 5.24 ; 1 Hénoch 71.5 : « Il a enlevé mon esprit… au plus haut des cieux. Et là j''ai vu, dans cette lumière, un édifice fait de blocs de glace et au milieu des blocs, des langues de feu vivant. » –  de feu Lc 3.16/ / ; cf. Dt 4.12. –  se séparaient  : le même verbe sera traduit par partager au v. 45 ; cf. Lc 22.17.'
  - type: text
    content: 'Des langues leur apparurent, qui semblaient de feu et qui se séparaient les unes des autres ; il s''en posa sur chacun d''eux. '
  '30':
  - type: note
    content: 'un de ses descendants  : litt. du fruit de ses reins  ; cf. 2S 7.12s ; Ps 89.4s ; 132.11 ; voir aussi Hé 7.5n. Texte occidental reconstitué que Dieu lui avait juré par serment de (res)susciter selon la chair (voir 3.26n) le Christ du fruit de son cœur et de le faire asseoir…'
  - type: text
    content: 'Comme il était prophète et qu''il savait que Dieu lui avait juré par serment de faire asseoir un de ses descendants sur son trône, '
  '31':
  - type: note
    content: V. 25n,27+.
  - type: text
    content: 'il a vu d''avance la résurrection du Christ et il en a parlé, en disant qu''il n''a pas été abandonné au séjour des morts et que sa chair n''a pas vu la décomposition. '
  '32':
  - type: note
    content: Dieu l'a relevé v. 24+. –  témoins 1.22+.
  - type: text
    content: 'Ce Jésus, Dieu l''a relevé ; nous en sommes tous témoins. '
  '33':
  - type: note
    content: 'Elevé Ph 2.9. –  par la droite  : ou à la droite, l''expression grecque pouvant avoir les deux sens, de même en 5.31 ; Ps 17.7+ ; 118.16. –  l''Esprit saint qui avait été promis  : litt. la promesse de l''Esprit saint 1.4n. –  il a répandu… v. 17+.'
  - type: text
    content: 'Elevé par la droite de Dieu, il a reçu du Père l''Esprit saint qui avait été promis et il a répandu ce que vous voyez et entendez. '
  '34':
  - type: note
    content: Ps 110.1  ; Lc 20.42s/ /.
  - type: text
    content: 'Ce n''est pas David, en effet, qui est monté aux cieux, mais il dit lui-même :'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur : Assieds-toi à ma droite,'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''à ce que je fasse…  : autre traduction que je fasse… –  ton marchepied  : litt. le marchepied de tes pieds  ; cf. 1Co 15.25.'
  - type: text
    content: jusqu'à ce que je fasse de tes ennemis ton marchepied
  - type: text
    content: .
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.30s. –  bien  : litt. avec certitude , cf. Lc 1.2. –  Seigneur et Christ  : cf. 9.22 ; 17.3 ; 18.5,28 ; voir aussi 11.17 ; 28.31 ; Rm 10.9 ; 1Co 12.3 ; Ph 2.11 ; voir aussi onction. –  que vous avez crucifié 4.10 ; cf. 2.23+.'
  - type: text
    content: 'Que toute la maison d''Israël le sache donc bien : Dieu l''a fait Seigneur et Christ, ce Jésus que vous avez crucifié !'
  - type: heading
    content: Les trois mille premiers convertis
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'transpercé  : même verbe dans la traduction grecque de Ps 109.16 ( au cœur brisé ). –  aux autres apôtres  : certains mss portent seulement aux apôtres . –  Frères (litt. hommes, frères , 1.16n), que devons-nous faire ? cf. 16.30 ; 22.10 ; Lc 3.10 ; 10.25.'
  - type: text
    content: 'Après avoir entendu cela, ils eurent le cœur transpercé, et ils dirent à Pierre et aux autres apôtres : Frères, que devons-nous faire ?'
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Changez radicalement  : autres traductions repentez-vous, convertissez-vous 3.19 ; 5.31 ; 8.22n  ; 11.18 ; 13.24 ; 17.30 ; 19.4 ; 20.21 ; 26.20 ; cf. Mt 3.2n/ /. –  reçoive le baptême (litt. soit baptisé ) au nom de Jésus-Christ 8.16n  ; 10.48 ; 19.5 ; 22.16 ; cf. 3.16+ ; 26.18 ; Mc 16.16. –  pour le pardon de ses (litt. vos ) péchés 5.31 ; 10.43 ; 13.38 ; Mt 26.28 ; Mc 1.4/ / ; Lc 24.47 ; Col 1.14. –  vous recevrez le don de l''Esprit saint cf. 1.5+ ; 5.32 ; 8.15ss ; 10.45ss ; 11.17 ; 15.8 ; 19.2-7 ; Rm 5.5 ; 1Th 4.8.'
  - type: text
    content: 'Pierre leur dit : Changez radicalement ; que chacun de vous reçoive le baptême au nom de Jésus-Christ pour le pardon de ses péchés, et vous recevrez le don de l''Esprit saint. '
  '39':
  - type: note
    content: 'la promesse 1.4n. –  pour vous  : cf. v. 22s ; 3.26 ; 13.46. –  au loin  : cf. 22.21 ; Es 57.19. –  les appellera  : cf. Jl 3.5.'
  - type: text
    content: 'Car la promesse est pour vous, pour vos enfants et pour tous ceux qui sont au loin, en aussi grand nombre que le Seigneur, notre Dieu, les appellera. '
  '4':
  - type: note
    content: 'remplis d''Esprit saint  : cf. 4.8,31 ; 6.3,5 ; 7.55 ; 9.17 ; 11.24 ; 13.9,52 ; cf. 2.13 ; Nb 11.25-29 ; 1S 10.5s ; 1R 22.10 ; Lc 4.1 ; Siracide 48.12 : « Lorsque Elie eut été caché dans le tourbillon, Elisée fut rempli de son esprit. » –  en d''autres langues  : ici il s''agit de langues étrangères effectivement parlées par d''autres peuples (même terme v. 11), ce qui n''est pas forcément le cas du parler en langues évoqué dans d''autres textes (et ici, peut-être, par le texte occidental, d''après une reconstitution) ; cf. 10.46 ; 19.6 ; Mc 16.17 ; 1Co 12–14 ; voir aussi Gn 11.1-9. –  énoncer  : le verbe correspondant, qui a donné notre mot « apophtegme », ne revient, dans le N.T., qu''au v. 14 et en 26.25 ; ailleurs il peut évoquer les oracles d''une divinité.'
  - type: text
    content: Ils furent tous remplis d'Esprit saint et se mirent à parler en d'autres langues, selon ce que l'Esprit leur donnait d'énoncer.
  '40':
  - type: note
    content: 'il rendait témoignage  : autres traductions il les avertissait solennellement, il les adjurait, il attestait  ; cf. 8.25 ; 10.42 ; 18.5 ; 20.21ss ; 23.11 ; 28.23 ; Lc 16.28n  ; 1Tm 5.21n. –  encourageait ou exhortait  ; le même verbe, dans d''autres contextes, signifie aussi consoler  ; cf. 4.36n  ; 9.31n  ; 11.23+. –  génération perverse  : cf. Dt 32.5 ; Ps 78.8 ; Ph 2.15 ; cf. Mt 12.39+/ / ; Ga 1.4.'
  - type: text
    content: 'Et, par beaucoup d''autres paroles, il rendait témoignage et les encourageait, en disant : Sauvez-vous de cette génération perverse. '
  '41':
  - type: note
    content: 'reçurent le baptême 8.12,16,36 ; 9.18 ; 16.15,33 ; 18.8 ; 19.5 ; Mt 28.19. –  trois mille  : cf. 4.4 ; 21.20 ; Lc 12.1n. –  personnes  : autre traduction âmes, de même 7.14n  ; 27.37n  ; sur le terme grec correspondant, cf. Mt 10.28n. –  furent ajoutées…  : cf. v. 47 ; 4.4 ; 5.14 ; 6.1,7 ; 9.31 ; 11.21,24 ; 12.24 ; 14.1 ; 16.5 ; 19.20.'
  - type: text
    content: Ceux qui accueillirent sa parole reçurent le baptême ; en ce jour-là, environ trois mille personnes furent ajoutées.
  - type: heading
    content: La première communauté chrétienne
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.32-35 ; 5.12-15. –  l''enseignement des apôtres 4.2,18 ; 5.21,25,28,42. –  la communion…  : le terme grec ainsi traduit a souvent un sens concret de participation, solidarité, mise en commun  ; cf. v. 44 ; 4.32ss ; Rm 15.26ns ; 2Co 8.4n. –  au partage… ou, plus littéralement, à la fraction du pain , c.-à-d. à l''acte consistant à rompre le pain pour le partager ; allusion probable à la célébration du Repas du Seigneur, v. 46 ; 20.7,11 ; 27.35 ; Mt 14.19n  ; Lc 24.30,35 ; cf. 22.14ss/ /. –  prières 1.14+.'
  - type: text
    content: 'Ils étaient assidus à l''enseignement des apôtres, à la communion fraternelle, au partage du pain et aux prières. '
  '43':
  - type: note
    content: 'crainte 5.5,11 ; 19.17 ; Lc 1.12+ ; cf. Hymnes (Qumrân) 4.26 : « Tu mettras leur crainte (celle de l''assemblée des saints) sur ton peuple. » –  de chacun  : autre traduction de toute âme, cf. Mt 10.28n. –  prodiges / signes v. 19+.'
  - type: text
    content: 'La crainte s''emparait de chacun, et beaucoup de prodiges et de signes se produisaient par l''entremise des apôtres. '
  '44':
  - type: note
    content: 'V. 42+. –  les croyants  : litt. ceux qui croyaient ou, selon certains mss, ceux qui étaient devenus croyants  ; cf. 4.32 ; 18.27 ; 19.18 ; 21.20 ; 1Th 1.7 ; 2.10 etc.'
  - type: text
    content: 'Tous les croyants étaient ensemble et avaient tout en commun. '
  '45':
  - type: note
    content: Ils vendaient leurs biens… 4.34-37 ; 5.1-11 ; Lc 8.3 ; 12.33 ; texte occidental tous ceux qui avaient des biens et des possessions les vendaient et en partageaient chaque jour (cf. v. 46) le produit… –  selon les besoins 4.35 ; cf. 11.29.
  - type: text
    content: 'Ils vendaient leurs biens et leurs possessions, et ils en partageaient le produit entre tous, selon les besoins de chacun. '
  '46':
  - type: note
    content: 'Le principal témoin du texte occidental offre ici un texte incertain  : tous fréquentaient assidûment le temple et se réunissaient [dans les maisons ?] en un même lieu pour rompre le pain… –  au temple 3.1 ; 5.12,20s,42 ; cf. Lc 2.49 ; 19.45-48 ; 24.53. –  d''un commun accord 1.14+. –  prenaient leur nourriture (autre traduction possible  : partageaient leurs repas  ; cf. 27.33s) avec allégresse…  : cf. Ec 9.7. – Voir cœur.'
  - type: text
    content: 'Chaque jour, ils étaient assidus au temple, d''un commun accord, ils rompaient le pain dans les maisons et ils prenaient leur nourriture avec allégresse et simplicité de cœur ; '
  '47':
  - type: note
    content: 'louaient Dieu 3.8s ; cf. 10.46 ; 11.18 ; 13.48 ; 21.20 ; Lc 18.43 ; 19.37. –  avaient la faveur…  : litt. ayant grâce auprès de tout le peuple  ; certains comprennent  : la grâce les introduisait auprès de tout le peuple, cf. 4.33+ ; 5.13. –  le Seigneur ajoutait v. 41+. –  à la communauté  : même expression en 1.15n  ; 2.1 (en un même lieu) ; le texte occidental porte ici à l''Eglise (5.11n) et rattache l''autre formule au début du chapitre 3, où elle signifierait  : ensemble, Pierre et Jean… –  ceux qu''il sauvait  : litt. ceux qui étaient en train d''être sauvés  ; la même forme verbale est traduite par la formule être sur la voie du salut 1Co 1.18n.'
  - type: text
    content: ils louaient Dieu et avaient la faveur de tout le peuple. Et le Seigneur ajoutait chaque jour à la communauté ceux qu'il sauvait.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'des Juifs pieux (litt. des Juifs, des hommes [1.16n] pieux , cf. v. 14n) 8.22 ; 22.12 ; Lc 2.25 ; la phrase se présente sous des formes assez diverses selon les mss ; l''un d''eux omet le mot correspondant à Juifs , de sorte qu''on peut lire  : des hommes pieux de toutes les nations…  ; cf. Dt 2.25 ; voir non-Juifs. –  habitaient Jérusalem  : le terme peut s''entendre d''un séjour temporaire ou permanent ; cf. v. 14 ; 1.19+.'
  - type: text
    content: 'Or des Juifs pieux de toutes les nations qui sont sous le ciel habitaient Jérusalem. '
  '6':
  - type: note
    content: 'dans sa propre langue  : le terme grec ainsi traduit, ici et au v. 8 (un autre qu''aux v. 3s) a donné notre mot dialecte  ; cf. Es 66.15,18.'
  - type: text
    content: 'Au bruit qui se produisit, la multitude accourut et fut bouleversée, parce que chacun les entendait parler dans sa propre langue. '
  '7':
  - type: note
    content: stupéfaits v. 12 ; 3.10 ; 8.9ss ; 9.21 ; 10.10n,45 ; 12.16 ; voir Mc 2.12n. –  Galiléens 1.11+.
  - type: text
    content: 'Etonnés, stupéfaits, ils disaient : Ces gens qui parlent ne sont-ils pas tous Galiléens ? '
  '8':
  - type: note
    content: 'maternelle  : litt. dans laquelle nous sommes nés.'
  - type: text
    content: 'Comment se fait-il que chacun de nous les entende dans sa langue maternelle ? '
  '9':
  - type: note
    content: 'Cf. 1P 1.1 ; les nations (douze sans compter la Judée) sont énumérées globalement d''est en ouest. –  Parthes, Mèdes, Elamites  : anciens peuples d''une région correspondant en partie à l''actuel Iran. –  Cappadoce / Pont (18.2n) / Asie (16.6n) : provinces d''Asie Mineure.'
  - type: text
    content: 'Parthes, Mèdes, Elamites, habitants de Mésopotamie, de Judée, de Cappadoce, du Pont, d''Asie, '
