    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans sa propre langue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec ainsi traduit, ici et au v. 8 (un autre qu''aux v. 3s) a donné notre mot '
    - type: usfm
