    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur l''ensemble de cette scène inaugurale, voir Lc 4.16-30 et l''introduction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lorsque arriva le jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même expression grecque en Lc 9.51. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
