  - type: text
    text: 'C''est selon la foi que tous ceux-là sont morts, sans avoir obtenu les choses promises ; cependant ils les ont vues et saluées de loin, en reconnaissant publiquement qu''ils étaient étrangers et résidents temporaires sur la terre. '
