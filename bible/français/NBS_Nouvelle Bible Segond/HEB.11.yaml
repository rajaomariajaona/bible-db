document_id: HEB.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La foi des anciens
  - type: text
    content: ' '
  - type: note
    content: foi 10.39. –  la réalité (cf. 1.3n) ; autres traductions la réalisation, l'assurance, la garantie, le titre de possession, le fondement . –  attestation ou démonstration , voire conviction . –  qu'on ne voit pas v. 3,7,27 ; cf. Rm 8.24s ; 1Co 13.12 ; 2Co 4.18 ; 5.7.
  - type: text
    content: Or la foi, c'est la réalité de ce qu'on espère, l'attestation de choses qu'on ne voit pas.
  '10':
  - type: note
    content: 'la cité v. 16 ; 12.22 ; 13.14. –  solides fondations  : cf. 6.1 ; 12.27s ; voir aussi Es 28.16 ; 54.11 ; Ps 48.9 ; 87.1,5 ; Ap 21.2,10-27.'
  - type: text
    content: 'Car il attendait la cité qui a de solides fondations, celle dont Dieu est l''architecte et le constructeur. '
  '11':
  - type: note
    content: 'Cf. Gn 17.19 ; 18.11-14 ; 21.2 ; Rm 4.19s. –  Sara elle-même  : texte incertain ; l''expression grecque traduite par avoir une descendance décrit habituellement le rôle de l''homme dans la procréation ; certains pensent qu''il faudrait plutôt lire  : c''est pour cela qu''avec Sara, qui était stérile, et malgré son âge avancé, il (Abraham) fut rendu capable d''avoir une descendance. –  malgré sa stérilité (ou qui était stérile) : le terme correspondant est absent de certains mss. –  et son âge avancé  : autre traduction et bien qu''elle (ou il) eût passé l''âge (d''avoir des enfants). –  digne de confiance 10.23n.'
  - type: text
    content: 'C''est par la foi aussi que Sara elle-même, malgré sa stérilité et son âge avancé, fut rendue capable d''avoir une descendance, parce qu''elle tint pour digne de confiance celui qui avait fait la promesse. '
  '12':
  - type: note
    content: 'd''un seul (le mot correspondant à homme est sous-entendu dans le texte) : cf. Es 51.1s. –  des descendants  : sous-entendu dans le texte. –  aussi nombreux… Gn 15.5 ; 22.17 ; Ex 32.13 ; Dt 1.10.'
  - type: text
    content: C'est pourquoi d'un seul homme – et d'un homme déjà atteint par la mort – sont nés des descendants aussi nombreux que les étoiles du ciel et que le sable qui est au bord de la mer, qu'on ne peut compter.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'obtenu 10.36. –  les choses promises  : litt. les promesses 6.12n. –  vues  : cf. Jn 8.56. –  reconnaissant publiquement ou confessant 3.1n. –  résidents temporaires  : autres traductions immigrants, pèlerins, voyageurs  ; cf. Gn 23.4 ; Ps 39.13 ; 1Ch 29.15 ; Ep 2.19 ; 1P 1.1 ; 2.11.'
  - type: text
    content: 'C''est selon la foi que tous ceux-là sont morts, sans avoir obtenu les choses promises ; cependant ils les ont vues et saluées de loin, en reconnaissant publiquement qu''ils étaient étrangers et résidents temporaires sur la terre. '
  '14':
  - type: note
    content: Cf. 13.14.
  - type: text
    content: 'En effet, ceux qui parlent ainsi montrent clairement qu''ils cherchent une patrie. '
  '15':
  - type: note
    content: 'S''ils avaient eu la nostalgie  : litt. et s''ils s''étaient souvenus. –  le temps ou l''occasion.'
  - type: text
    content: 'S''ils avaient eu la nostalgie de celle qu''ils avaient quittée, ils auraient eu le temps d''y retourner. '
  '16':
  - type: note
    content: 'en fait  : litt. maintenant. –  supérieure  : litt. meilleure 1.4n. –  pas honte 2.11. –  leur Dieu Ex 3.6 ; Mt 22.32/ /. –  cité v. 10+.'
  - type: text
    content: Mais en fait ils aspirent à une patrie supérieure, c'est-à-dire céleste. C'est pourquoi Dieu n'a pas honte d'être appelé leur Dieu ; car il leur a préparé une cité.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 22.1-18 ; Jc 2.21. –  fils unique  : cf. Jn 3.16+.'
  - type: text
    content: 'C''est par la foi qu''Abraham, mis à l''épreuve, a offert Isaac. C''est son fils unique qu''il offrait, lui qui avait accueilli les promesses '
  '18':
  - type: note
    content: 'C''est par Isaac…  : litt. en Isaac il te sera appelé une descendance Gn 21.12  ; ici il faut sans doute simplement comprendre c''est par Isaac qu''une descendance te sera assurée (nuance différente en Rm 9.7, d''après le contexte).'
  - type: text
    content: 'et à qui il avait été dit :'
  - type: text
    content: C'est par Isaac que tu auras ce qui sera appelé ta descendance
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 4.17. –  Il estimait  : le verbe grec est traduit par compter en Rm 4.3ss. –  de réveiller un mort  : litt. de réveiller (ou de relever , Ac 3.15n) même d''entre les morts  ; c''est un terme d''une autre famille qui est traduit par résurrection au v. 35+. –  C''est pourquoi…  : autres traductions de sorte que c''est aussi en parabole (9.9n) qu''il lui fut rendu ; c''est de là (d''entre les morts) qu''il le reçut, aussi en parabole  ; le même verbe est traduit par obtenir au v. 39 ; 10.36.'
  - type: text
    content: 'Il estimait que Dieu avait même le pouvoir de réveiller un mort. C''est pourquoi son fils lui fut rendu : il y a là une parabole. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: par elle ou en elle . –  un bon témoignage , ou simplement un témoignage v. 4s,39 ; voir 2.6n.
  - type: text
    content: C'est par elle que les anciens ont reçu un bon témoignage.
  '20':
  - type: note
    content: Cf. 12.16s ; Gn 27.27-29,38-40. – Voir bénédiction.
  - type: text
    content: 'C''est par la foi qu''Isaac bénit Jacob et Esaü en vue de l''avenir. '
  '21':
  - type: note
    content: 'Gn 47.31n  ; 48.15s ; voir aussi Gn 49. –  prosterna  : voir culte.'
  - type: text
    content: C'est par la foi que Jacob, au moment de mourir, bénit chacun des fils de Joseph, et qu’
  - type: text
    content: il se prosterna en s'appuyant sur l'extrémité de son bâton
  - type: text
    content: '. '
  '22':
  - type: note
    content: Gn 50.24s ; Ex 13.19. –  exode Lc 9.31n  ; 2P 1.15n. –  Israélites Lc 1.16n.
  - type: text
    content: C'est par la foi que Joseph, mourant, fit mention de l'exode des Israélites et donna des ordres au sujet de ses ossements.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ex 1.22 ; 2.2s ; Ac 7.20n.
  - type: text
    content: 'C''est par la foi que Moïse, à sa naissance, fut caché pendant trois mois par ses parents : ils avaient vu que l''enfant était beau, et ils ne craignirent pas l''édit du roi.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 2.11 ; Ac 7.23. –  renonça ou refusa  : sur le verbe correspondant, le plus souvent traduit par nier ou renier , cf. Mt 10.33n  ; Lc 8.45n  ; Tt 2.12.'
  - type: text
    content: 'C''est par la foi que, devenu grand, Moïse renonça à être appelé fils de la fille du pharaon, '
  '25':
  - type: note
    content: Voir péché.
  - type: text
    content: 'préférant être maltraité avec le peuple de Dieu que d''avoir la jouissance éphémère du péché. '
  '26':
  - type: note
    content: l'humiliation (10.33n) du Christ 13.13 ; cf. Ps 89.51s ; 69.10 ; Ac 7.35.
  - type: text
    content: Il tenait en effet l'humiliation du Christ pour une richesse plus grande que les trésors de l'Egypte ; car il regardait plus loin, vers la récompense.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ex 2.15. –  comme quelqu'un qui voit (autre traduction comme s'il voyait ) celui qui est invisible v. 1+ ; cf. Nb 12.8 ; 1Tm 1.17+.
  - type: text
    content: 'C''est par la foi qu''il quitta l''Egypte, sans craindre la fureur du roi ; car il tint ferme comme quelqu''un qui voit celui qui est invisible. '
  '28':
  - type: note
    content: 'la Pâque (voir calendrier et fêtes) / l''aspersion du sang Ex 12.12s,22s. –  le destructeur 1Co 10.10. –  aux premiers-nés des Israélites  : litt. à leurs premiers-nés, cf. 1.6 ; 12.23.'
  - type: text
    content: 'C''est par la foi qu''il fit la Pâque et l''aspersion du sang, pour que le destructeur ne touche pas aux premiers-nés des Israélites. '
  '29':
  - type: note
    content: Ex 14.22,27.
  - type: text
    content: C'est par la foi qu'ils traversèrent la mer Rouge comme une terre sèche, tandis que les Egyptiens qui tentèrent d'en faire autant furent engloutis.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'les mondes 1.2n. –  par une parole de Dieu 1.3 ; cf. Gn 1.3+. –  ce qui est manifeste  : le terme grec correspondant a donné notre mot phénomène.'
  - type: text
    content: 'Par la foi, nous comprenons que les mondes ont été formés par une parole de Dieu, de sorte que ce qu''on voit ne provient pas de ce qui est manifeste. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Jos 6.14ss,20.
  - type: text
    content: 'C''est par la foi que les murailles de Jéricho tombèrent, après qu''on en eut fait le tour pendant sept jours. '
  '31':
  - type: note
    content: 'Jos 2 ; 6.17,22-25 ; Mt 1.5 ; Jc 2.25. –  réfractaires  : la même expression est traduite par ceux qui avaient refusé d''obéir en 3.18 ; cf. 2.13.'
  - type: text
    content: C'est par la foi que Rahab la prostituée ne fut pas perdue avec les réfractaires, parce qu'elle avait accueilli pacifiquement les espions.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Le temps me manquerait  : cf. 13.22. –  Gédéon Jg 6–7. –  Barak Jg 4.6-16. –  Samson Jg 14–16. –  Jephté Jg 11–12. –  David 1S 16.10ss ; 17.23-51. –  Samuel 1S 1–7. –  et les prophètes  : cf. 1S 3.20 ; 7.15 ; Ac 3.24.'
  - type: text
    content: 'Que dirais-je encore ? Le temps me manquerait, en effet, pour passer en revue Gédéon, Barak, Samson, Jephté, David, Samuel et les prophètes, '
  '33':
  - type: note
    content: 'vainquirent  : cf. Jg 4.15s ; 7.22-25 ; 11.33 ; 2S 8.1-14. –  justice  : cf. 2S 8.15. –  la réalisation de promesses  : litt. des promesses, 6.12n,15n  ; cf. 2S 7. –  lions  : cf. Jg 14.5s ; 1S 17.34-37 ; Dn 6.23.'
  - type: text
    content: 'eux qui, par la foi, vainquirent des royaumes, exercèrent la justice, obtinrent la réalisation de promesses, fermèrent la gueule des lions, '
  '34':
  - type: note
    content: 'feu  : cf. Dn 3.23ss. –  échappèrent… 1R 19.10. –  furent rendus puissants…  : cf. Jg 16.28 ; d''autres comprennent furent guéris de leur maladie. –  vaillants 1S 17 ; Ps 45. –  étrangères v. 9n.'
  - type: text
    content: éteignirent la puissance du feu, échappèrent au tranchant de l'épée, furent rendus puissants par-delà leur faiblesse, se montrèrent vaillants à la guerre et mirent en fuite des armées étrangères.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'résurrection  : cf. v. 19n  ; voir aussi 6.2 ; 7.11n  ; 1R 17.17-24 ; 2R 4.18-37. –  Mais d''autres (autre terme qu''au v. 36) …  : après le rappel des exploits accomplis par la foi vient celui des souffrances endurées en vertu de la même foi. –  furent torturés ou se laissèrent torturer  ; allusion possible à 2 Maccabées 6.18–7.42, qui rapporte les supplices terribles subis par plusieurs Juifs, y compris une femme et ses sept fils, pour avoir refusé de transgresser la loi de Moïse ou de paraître le faire. –  rédemption ou délivrance 9.12n. –  une résurrection supérieure ou meilleure  : cf. 1.4n  ; autre traduction un bien supérieur, la résurrection  ; dans le récit précité, l''un des martyrs dit au roi : « Tu nous exclus de la vie présente, mais le roi du monde, parce que nous serons morts pour ses lois, nous ressuscitera pour une vie éternelle. »'
  - type: text
    content: 'Des femmes retrouvèrent leurs morts par une résurrection. Mais d''autres furent torturés et n''acceptèrent pas de rédemption, afin d''accéder à une résurrection supérieure. '
  '36':
  - type: note
    content: Jr 20 ; 37–38 ; 2Ch 36.16.
  - type: text
    content: 'D''autres subirent l''épreuve des moqueries et du fouet, ainsi que les liens et la prison. '
  '37':
  - type: note
    content: 'lapidés 2Ch 24.21 ; Mt 23.37 ; certains mss ajoutent ici tentés ou mis à l''épreuve (2.18n), mots que quelques-uns comprennent comme se référant au supplice du feu (v. 34) ou à une autre forme de torture (v. 35). –  sciés  : d''après le Talmud et le livre dit Martyre d''Isaïe, tel aurait été le sort du prophète Esaïe, sur l''ordre du roi Manassé (cf. 2R 21.16). –  épée 1R 19.10 ; Jr 26.23. –  ils menèrent… 13.3 ; cf. 1R 2.26 ; 19.3ss ; 2R 2.8,13s. –  opprimés  : autre traduction dans la détresse  ; cf. 2Co 1.4n.'
  - type: text
    content: 'Ils furent lapidés, sciés, tués par l''épée ; ils menèrent une vie errante, vêtus de peaux de moutons et de peaux de chèvres, manquant de tout, opprimés, maltraités, '
  '38':
  - type: note
    content: Jg 6.2 ; 1S 13.6s ; 1R 18.4 ; 19.4.
  - type: text
    content: – eux dont le monde n'était pas digne ! – errant dans les déserts, les montagnes, les cavernes et les antres de la terre.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'un bon témoignage v. 2n. –  ce qui avait été promis  : litt. la promesse 10.36 ; cf. 6.12n  ; 11.13,33.'
  - type: text
    content: 'Et tous ceux-là, qui avaient reçu par leur foi un bon témoignage, n''ont pas obtenu ce qui avait été promis. '
  '4':
  - type: note
    content: 'Abel / Caïn Gn 4.1-16 ; Mt 23.35 ; 1Jn 3.12 ; 1 Hénoch 22.7 : « Abel accuse pour cela jusqu''à ce que la race (de Caïn) disparaisse de la face de la terre et de la race humaine. » –  le témoignage… v. 2+. –  à ses offrandes Gn 4.4 ; voir sacrifice. –  parle encore 12.24 ; Gn 4.10.'
  - type: text
    content: 'C''est par la foi qu''Abel offrit à Dieu un sacrifice de plus grande valeur que celui de Caïn ; par elle, il lui fut rendu le témoignage qu''il était juste, Dieu lui-même rendant témoignage à ses offrandes ; par elle, quoique mort, il parle encore. '
  '40':
  - type: note
    content: supérieur ou meilleur 1.4n. –  accomplissement 2.10n  ; 12.23.
  - type: text
    content: Dieu, en effet, avait en vue quelque chose de supérieur pour nous, afin qu'ils ne soient pas portés à leur accomplissement sans nous.
  '5':
  - type: note
    content: 'Cf. Jd 14. –  transporté ou transféré, déplacé  ; le terme grec correspondant signifie aussi bien changer (7.12 ; Jd 4) que transporter (Ac 7.16) ; cf. Gn 5.24 ; Sagesse 4.10 : « Devenu agréable à Dieu, il (le juste) a été aimé, et, comme il vivait parmi les pécheurs, il a été emporté ailleurs. » Siracide 44.16 : « Hénok plut au Seigneur et fut transféré ; c''est un exemple de conversion pour les générations. » Voir aussi Ps 18.17 ; 49.16 ; 73.24. –  avant d''être transporté  : litt. avant son transport  ; le substantif correspondant est traduit par changement en 7.12 et par mis à l''écart en 12.27n.'
  - type: text
    content: 'C''est par la foi qu''Hénoch fut transporté, de sorte qu''il ne vit pas la mort ; on ne le trouva plus, parce que Dieu l''avait transporté. En effet, avant d''être transporté, il avait reçu le témoignage qu''il plaisait à Dieu. '
  '6':
  - type: note
    content: 'lui plaire v. 5. –  qui s''approche 4.16+ ; cf. 7.25. –  que celui-ci est  : cf. Ex 3.14 ; Rm 4.17. –  qu''il récompense  : litt. qu''il devient rémunérateur (pour ceux qui le recherchent)  ; cf. 10.35 ; cf. Sagesse 10.17 : « Elle (la Sagesse) remit aux saints le salaire de leurs durs travaux. »'
  - type: text
    content: 'Or, sans la foi, il est impossible de lui plaire, car celui qui s''approche de Dieu doit croire que celui-ci est et qu''il récompense ceux qui le recherchent. '
  '7':
  - type: note
    content: 'Noé Gn 6.5–10.32. –  divinement averti 8.5+. –  ce qu''on ne voyait pas v. 1. –  animé par sa piété  : autre traduction saisi de crainte  ; cf. 5.7n. –  bâtit  : même verbe en 3.3s ; 9.2,6 (installer) ; 1P 3.20. –  sa maison ou sa famille  ; cf. Gn 7.1. –  condamna le monde  : cf. v. 38 ; Mt 12.27 ; 19.28. –  justice Ez 14.14,20 ; 2P 2.5. –  qui répond à la foi  : litt. qui (est) selon la foi  ; cf. v. 13 ; Rm 3.22 ; 4.13.'
  - type: text
    content: C'est par la foi que Noé, divinement averti de ce qu'on ne voyait pas encore et animé par sa piété, bâtit une arche pour le salut de sa maison ; c'est par elle qu'il condamna le monde et devint héritier de la justice qui répond à la foi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Abraham Gn 12.1-4. –  recevoir en héritage Gn 15.7.
  - type: text
    content: 'C''est par la foi qu''Abraham obéit à un appel en partant vers un lieu qu''il allait recevoir en héritage : il partit sans savoir où il allait. '
  '9':
  - type: note
    content: 'Cf. Gn 12.8 ; 13.12 ; 23.4 ; 26.3 ; 35.12,27 ; Ac 7.6n. –  s''exiler  : autre traduction séjourner  ; même verbe en Lc 24.18, termes apparentés en 1P 1.17 ; 2.11. –  la terre promise  : litt. la terre de la promesse, cf. 6.12n. –  étranger v. 34 ; 9.25n. –  avec Isaac  : autre traduction ainsi qu''Isaac.'
  - type: text
    content: 'C''est par la foi qu''il vint s''exiler sur la terre promise comme dans un pays étranger, habitant sous des tentes avec Isaac et Jacob, héritiers avec lui de la même promesse. '
