    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jd 14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'transporté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: transféré, déplacé
    - type: usfm
      marker: ft
      children:
