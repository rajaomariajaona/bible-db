    - type: usfm
      marker: fq
      children:
      - type: text
        text: avant d'être transporté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avant son transport
    - type: usfm
      marker: ft
      children:
      - type: text
