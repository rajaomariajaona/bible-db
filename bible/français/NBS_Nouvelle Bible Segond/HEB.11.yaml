      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'C''est par la foi qu''Hénoch fut transporté, de sorte qu''il ne vit pas la mort ; on ne le trouva plus, parce que Dieu l''avait transporté. En effet, avant d''être transporté, il avait reçu le témoignage qu''il plaisait à Dieu. '
