        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.10 : « Devenu agréable à Dieu, il (le juste) a été aimé, et, comme il vivait parmi les pécheurs, il a été emporté ailleurs. » '
    - type: usfm
      marker: fqa
