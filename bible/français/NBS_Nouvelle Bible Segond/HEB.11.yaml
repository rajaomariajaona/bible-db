  - type: text
    text: C'est par la foi que Noé, divinement averti de ce qu'on ne voyait pas encore et animé par sa piété, bâtit une arche pour le salut de sa maison ; c'est par elle qu'il condamna le monde et devint héritier de la justice qui répond à la foi.
