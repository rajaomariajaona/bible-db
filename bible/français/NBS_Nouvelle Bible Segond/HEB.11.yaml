      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.7 : « Abel accuse pour cela jusqu''à ce que la race (de Caïn) disparaisse de la face de la terre et de la race humaine. » –  '
    - type: usfm
