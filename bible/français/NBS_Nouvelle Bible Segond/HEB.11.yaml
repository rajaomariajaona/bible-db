    marker-yv: yv-n
  - type: text
    text: 'C''est par la foi qu''Abel offrit à Dieu un sacrifice de plus grande valeur que celui de Caïn ; par elle, il lui fut rendu le témoignage qu''il était juste, Dieu lui-même rendant témoignage à ses offrandes ; par elle, quoique mort, il parle encore. '
