      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Os 2.10 ; Ps 127.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: établir
      - type: usfm
        marker: ft
        children:
        - type: text
