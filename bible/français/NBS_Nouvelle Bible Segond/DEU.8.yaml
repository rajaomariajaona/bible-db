      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), ton Dieu, si tu suis d''autres dieux, si tu les sers et si tu te prosternes devant eux, je vous en avertis aujourd''hui : vous disparaîtrez. '
