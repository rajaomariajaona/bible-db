document_id: DEU.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur a éduqué Israël au désert
  - type: text
    content: ' '
  - type: note
    content: Tout le commandement 5.31+. –  que j'institue pour toi 4.2n. –  vous veillerez… 5.1n. –  afin que vous viviez 4.1+. –  a promis par serment 1.8+.
  - type: text
    content: 'Tout le commandement que j''institue pour toi aujourd''hui, vous veillerez à le mettre en pratique, afin que vous viviez, que vous vous multipliiez et que vous entriez en possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a promis par serment à vos pères. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.11+. – Voir bénédiction .
  - type: text
    content: 'Lorsque tu mangeras et que tu seras rassasié, tu béniras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, pour le bon pays qu''il t''a donné. '
  '11':
  - type: note
    content: oublier 4.9+. –  institue 4.2n.
  - type: text
    content: 'Garde-toi d''oublier le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, de ne pas observer ses commandements, ses règles et ses prescriptions, tels que je les institue pour toi aujourd''hui. '
  '12':
  - type: note
    content: Am 3.15 ; 5.11 ; Ag 1.4.
  - type: text
    content: 'Lorsque tu mangeras et que tu seras rassasié, lorsque tu bâtiras et habiteras de belles maisons, '
  '13':
  - type: text
    content: 'lorsque ton gros bétail et ton petit bétail se multiplieront, que l''argent et l''or se multiplieront pour toi et que tout ce qui t''appartient se multipliera, '
  '14':
  - type: note
    content: 'prends garde  : sous-entendu dans le texte. –  que ton cœur ne s''élève  : c.-à-d. que tu ne deviennes orgueilleux  ; cf. 17.20 ; Os 13.6 ; Ps 131.1. –  que tu n''oublies v. 11. –  qui te fait sortir  : autre traduction qui t''a fait sortir. –  maison des esclaves 5.6+.'
  - type: text
    content: 'prends garde, de peur que ton cœur ne s''élève et que tu n''oublies le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui te fait sortir de l''Egypte, de la maison des esclaves. '
  '15':
  - type: note
    content: 'serpents brûlants Nb 21.6n-9. –  il a fait jaillir Ex 17.1-7 ; Nb 20.1-13 ; Ps 78.15. –  granit  : traduction incertaine ; autre possibilité silex  ; il s''agit en tout cas d''une roche dure ; cf. 32.13 ; Es 50.7 ; Ps 114.8 ; Jb 28.9.'
  - type: text
    content: 'Il t''a fait marcher dans ce désert grand et redoutable, pays des serpents brûlants, des scorpions et de la soif, où il n''y a pas d''eau ; il a fait jaillir pour toi de l''eau du rocher de granit, '
  '16':
  - type: note
    content: V. 2-3+.
  - type: text
    content: 'il t''a fait manger dans le désert la manne que tes pères ne connaissaient pas, afin de t''affliger et de te mettre à l''épreuve, pour te faire du bien par la suite. '
  '17':
  - type: note
    content: 'Cf. Es 10.13. –  tu te dirais  : litt. tu dis (ou tu as dit) en ton cœur  ; certains, s''inspirant de LXX, traduisent garde-toi de dire en ton cœur. –  richesses  : cf. Es 8.4n.'
  - type: text
    content: 'Et tu te dirais : « C''est par ma force et la vigueur de ma main que j''ai acquis toutes ces richesses ! » '
  '18':
  - type: note
    content: 'c''est lui qui te donne Os 2.10 ; Ps 127.1s. –  établir  : litt. faire tenir (debout) ou dresser  ; cf. Gn 6.18n  ; autres traductions confirmer, réaliser  ; cf. Lv 26.9 ; Dt 9.5 ; Jr 11.5. – Voir alliance. –  voilà pourquoi… 2.30n.'
  - type: text
    content: 'Tu te souviendras du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, car c''est lui qui te donne de la force pour acquérir ces richesses, afin d''établir son alliance, celle qu''il a jurée à tes pères – voilà pourquoi il en est ainsi en ce jour. '
  '19':
  - type: note
    content: 'Seigneur (YHWH)  : voir noms divins. –  tu suis 6.14n  ; cf. 5.7 ; 7.4+. –  vous disparaîtrez 4.26+.'
  - type: text
    content: 'Si jamais tu oublies le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, si tu suis d''autres dieux, si tu les sers et si tu te prosternes devant eux, je vous en avertis aujourd''hui : vous disparaîtrez. '
  '2':
  - type: note
    content: 'Tu te souviendras 5.15+. –  quarante années… Nb 14.33 ; Ps 95.9s ; Ac 7.36. –  affliger  : autres traductions humilier, opprimer  ; cf. v. 3,16 ; 16.3 ; 26.6s ; Ex 1.11s ; 3.7,17 ; 4.31 ; 22.21s ; Nb 24.24 ; 2S 7.10. –  mettre à l''épreuve v. 16 ; 4.34+ ; 13.4 ; 33.8n  ; Gn 22.1 ; Ex 15.25 ; 16.4 ; 17.7n  ; Jg 2.22 ; 3.1,4 ; Ps 26.2 ; 2Ch 32.31 ; cf. Hé 11.17. –  pour savoir  : certains comprennent pour que tu connaisses. –  pour voir  : sous-entendu dans le texte.'
  - type: text
    content: 'Tu te souviendras de tout le chemin que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a fait parcourir pendant ces quarante années dans le désert, afin de t''affliger et de te mettre à l''épreuve, pour savoir ce qu''il y avait dans ton cœur, pour voir si tu observerais ou non ses commandements. '
  '20':
  - type: note
    content: 4.30+ ; 28.15,45,51,62s.
  - type: text
    content: 'Vous disparaîtrez comme les nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait disparaître devant vous, parce que vous n''aurez pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu.'
  '3':
  - type: note
    content: 'la manne Ex 16.1-35. –  l''homme ne vit pas… Mt 4.4/ /. –  ce qui sort de la bouche  : c.-à-d. la parole ou les ordres (1.26n), cf. 23.24 ; Nb 30.3,13 ; Jr 17.16 ; Ps 89.35.'
  - type: text
    content: 'Il t''a donc affligé, il t''a fait souffrir de la faim et il t''a nourri de la manne que tu ne connaissais pas et que tes pères n''avaient pas connue, afin de t''apprendre que l''homme ne vit pas de pain seulement, mais que l''homme vit de tout ce qui sort de la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '4':
  - type: note
    content: '29.4 ; Né 9.21. –  tes pieds  : litt. ton pied.'
  - type: text
    content: 'Ton manteau ne s''est pas usé sur toi et tes pieds n''ont pas enflé pendant ces quarante années. '
  '5':
  - type: note
    content: 'Sache donc bien  : litt. et tu sauras avec ton cœur. –  t''instruit ou te corrige 4.36n  ; le verbe correspondant est apparenté au mot traduit par instruction (ou correction) en Pr 1.2n  ; cf. Pr 3.11 ; Hé 12.5-11.'
  - type: text
    content: 'Sache donc bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''instruit comme un homme instruit son fils. '
  '6':
  - type: note
    content: en suivant ses voies 10.12 ; 11.22 ; 19.9 ; 26.17 ; 28.9 ; 30.16 ; Jos 22.5 ; Jg 2.22 ; 1R 2.3 ; 8.58 ; autre traduction pour suivre ses voies et pour le craindre. –  le craignant 4.10+.
  - type: text
    content: 'Tu observeras les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en suivant ses voies et en le craignant.'
  - type: heading
    content: Les tentations dans le pays promis
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'bon pays 1.25+ ; cf. 11.10-12 ; Ex 3.8. –  abîmes  : le terme désigne ici, en particulier, les eaux souterraines qui alimentent les sources  ; voir Gn 1.2n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te fait entrer dans un bon pays, un pays de cours d''eau, de sources et d''abîmes qui jaillissent dans les vallées et dans les montagnes ; '
  '8':
  - type: note
    content: Cf. Nb 20.5.
  - type: text
    content: 'un pays de froment, d''orge, de vignes, de figuiers et de grenadiers ; un pays d''huile d''olive et de miel ; '
  '9':
  - type: note
    content: 'tu mangeras  : litt. tu mangeras du pain. –  fer  : cf. 3.11 ; 1S 13.20 ; 17.7. –  cuivre  : le même mot hébreu est traduit ailleurs par bronze  ; il désigne alors un alliage de cuivre et d''étain (et parfois d''autres métaux) très courant dans l''Antiquité.'
  - type: text
    content: un pays où tu mangeras sans avoir à te rationner, où tu ne manqueras de rien ; un pays où les pierres sont du fer, et où tu extrairas le cuivre des montagnes.
