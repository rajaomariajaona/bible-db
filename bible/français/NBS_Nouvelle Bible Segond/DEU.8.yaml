      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 17.20 ; Os 13.6 ; Ps 131.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que tu n''oublies '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui te fait sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui t'a fait sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison des esclaves '
      - type: usfm
        marker: ft
        children:
        - type: text
