        children:
        - type: text
          text: prends garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que ton '
        - type: usfm
          marker: w
