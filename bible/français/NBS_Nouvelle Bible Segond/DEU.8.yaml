      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; autre possibilité '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: silex
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit en tout cas d''une roche dure ; cf. 32.13 ; Es 50.7 ; Ps 114.8 ; Jb 28.9.'
      marker-yv: yv-n
    - type: text
      text: 'Il t''a fait marcher dans ce désert grand et redoutable, pays des serpents brûlants, des scorpions et de la soif, où il n''y a pas d''eau ; il a fait jaillir pour toi de l''eau du rocher de granit, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 2-3+.
      marker-yv: yv-n
    - type: text
      text: 'il t''a fait manger dans le désert la manne que tes pères ne connaissaient pas, afin de t''affliger et de te mettre à l''épreuve, pour te faire du bien par la suite. '
