        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'afin que vous viviez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a promis par serment '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.8+.
      marker-yv: yv-n
    - type: text
      text: 'Tout le commandement que j''institue pour toi aujourd''hui, vous veillerez à le mettre en pratique, afin que vous viviez, que vous vous multipliiez et que vous entriez en possession du pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a promis par serment à vos pères. '
  '10':
  - type: usfm
