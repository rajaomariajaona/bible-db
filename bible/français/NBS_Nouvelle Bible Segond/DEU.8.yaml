        - type: text
          text: ', traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: garde-toi de dire en ton cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: richesses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 8.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et tu te dirais : « C''est par ma force et la vigueur de ma main que j''ai acquis toutes ces richesses ! » '
