      marker-yv: yv-n
    - type: text
      text: 'prends garde, de peur que ton cœur ne s''élève et que tu n''oublies le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, qui te fait sortir de l''Egypte, de la maison des esclaves. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
