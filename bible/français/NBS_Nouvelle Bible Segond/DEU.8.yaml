      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''a fait parcourir pendant ces quarante années dans le désert, afin de t''affliger et de te mettre à l''épreuve, pour savoir ce qu''il y avait dans ton cœur, pour voir si tu observerais ou non ses commandements. '
