      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'oublier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'institue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Garde-toi d''oublier le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, de ne pas observer ses commandements, ses règles et ses prescriptions, tels que je les institue pour toi aujourd''hui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Am 3.15 ; 5.11 ; Ag 1.4.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu mangeras et que tu seras rassasié, lorsque tu bâtiras et habiteras de belles maisons, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'lorsque ton gros bétail et ton petit bétail se multiplieront, que l''argent et l''or se multiplieront pour toi et que tout ce qui t''appartient se multipliera, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
