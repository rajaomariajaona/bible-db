        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voilà pourquoi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu te souviendras du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, car c''est lui qui te donne de la force pour acquérir ces richesses, afin d''établir son alliance, celle qu''il a jurée à tes pères – voilà pourquoi il en est ainsi en ce jour. '
