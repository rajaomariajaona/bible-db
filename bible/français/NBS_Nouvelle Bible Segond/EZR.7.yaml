document_id: EZR.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Esdras le scribe
  - type: text
    content: ' '
  - type: note
    content: 'Après  : les événements racontés à partir du chap. 7 ont eu lieu bien après ceux des chapitres précédents, mais ils sont difficiles à dater. –  Artaxerxès (6.14n) peut être Artaxerxès Ier (4.7n), Artaxerxès II (404-358 av. J.-C.) ou Artaxerxès III (358-338) ; voir aussi v. 7n  ; cf. Né 8. –  survint  : sous-entendu dans le texte. –  Esdras  : aide ou soutien (sans doute dans le même sens que Azaria , « [celui que] YHWH soutient ») ; même nom en Né 12.1,13,33. –  fils de…  : cf. 2.2n  ; 1Ch 5.29-41.'
  - type: text
    content: 'Après cela, sous le règne d''Artaxerxès, roi de Perse, survint Esdras, fils de Seraya, fils d''Azaria, fils de Hilqiya, '
  '10':
  - type: note
    content: 'appliqué son cœur  : cf. 2Ch 12.14 ; 19.3 ; 30.19 ; en Siracide 38.34–39.1 le scribe est « celui qui s''applique à réfléchir sur la loi du Très-Haut, qui étudie la sagesse de tous les anciens et consacre ses loisirs aux prophéties ». –  étudier  : litt. chercher, cf. 6.21 ; Ps 119.45,155 ; 1Ch 28.8n  ; voir aussi Jn 5.39 ; 7.52n  ; 1P 1.11. –  pour la mettre en pratique…  : cf. 1Ch 22.13 ; autre traduction possible pour enseigner efficacement en Israël les prescriptions (cf. v. 11) et les règles (litt. prescription et règle  ; le dernier terme peut aussi être traduit par droit ou coutume) ; cf. Ex 15.25 ; Jos 24.25 ; 1S 30.25.'
  - type: text
    content: 'Car Esdras avait appliqué son cœur à étudier la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour la mettre en pratique et pour apprendre à Israël les prescriptions et les règles.'
  - type: heading
    content: Les tâches confiées à Esdras par Artaxerxès
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'copie 4.11+. –  texte 4.7,18n. –  prêtre-scribe  : cf. v. 1-6 ; même expression Né 8.9 ; 12.26. Le mot traduit par scribe a aussi été compris au sens de spécialiste, interprète  ; cf. v. 12,21. –  des commandements…  : litt. des paroles des commandements du Seigneur et de ses prescriptions pour Israël.'
  - type: text
    content: 'Voici la copie du texte que le roi Artaxerxès donna à Esdras, le prêtre-scribe, scribe des commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de ses prescriptions pour Israël :'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Les v. 12-26 sont en araméen. –  roi des rois , titre des empereurs perses ; cf. Ez 26.7 ; Dn 2.37. –  scribe… v. 6n  ; certains voient ici un titre officiel, Secrétaire de la loi du Dieu du ciel (cf. 1.2n), suivi du mot pour accompli, achevé , dont le sens dans ce contexte est incertain ; 3 Esdras 8.9 insère une salutation ( Paix , comme en 5.7 ?) ; voir aussi 4.11n.
  - type: text
    content: « Artaxerxès, le roi des rois, à Esdras, prêtre et scribe de la loi du Dieu du ciel, etc.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Voici l'ordre… 6.8n. –  qui sont disposés ou qui s'offrent volontairement pour partir  ; cf. v. 15s ; 1.6 ; 2.68 ; 3.5 ; Né 11.2 ; 1Ch 29.5ss.
  - type: text
    content: 'Voici l''ordre que je donne : tous ceux du peuple d''Israël, de ses prêtres et de ses lévites qui se trouvent dans mon royaume et qui sont disposés à partir pour Jérusalem, qu''ils y aillent avec toi !'
  - type: text
    content: ' '
  '14':
  - type: note
    content: 'sept conseillers  : cf. Est 1.14. –  Juda / Jérusalem 9.9+. –  entre tes mains  : cf. v. 25n.'
  - type: text
    content: Tu es donc envoyé par le roi et ses sept conseillers pour inspecter Juda et Jérusalem, d'après la loi de ton Dieu, qui est entre tes mains,
  - type: text
    content: ' '
  '15':
  - type: note
    content: 6.9s ; 8.25ss ; cf. 1.4.
  - type: text
    content: et pour porter l'argent et l'or que le roi et ses conseillers ont volontairement offerts au Dieu d'Israël dont la demeure est à Jérusalem,
  - type: text
    content: ' '
  '16':
  - type: text
    content: tout l'argent et l'or que tu trouveras dans toute la province de Babylone et les dons volontaires faits par le peuple et les prêtres pour la maison de leur Dieu à Jérusalem.
  - type: text
    content: ' '
  '17':
  - type: note
    content: 'tu auras soin 5.8n. –  leurs offrandes végétales (9.4n  ; Lv 2.1n) et leurs libations  : cf. Nb 15.1ss.'
  - type: text
    content: En conséquence, tu auras soin d'acheter avec cet argent des taureaux, des béliers, des agneaux, avec leurs offrandes végétales et leurs libations, et tu les offriras sur l'autel de la maison de votre Dieu à Jérusalem.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Ce que vous jugerez bon de faire, toi et tes frères, avec le reste de l'argent et de l'or, vous le ferez selon la volonté de votre Dieu.
  - type: text
    content: ' '
  '19':
  - type: note
    content: objets 1.7ss ; 8.25-28.
  - type: text
    content: Dépose devant le Dieu de Jérusalem les objets qui te sont remis pour le service de la maison de ton Dieu.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Tsadoq Né 11.11 ; 1Ch 5.34,38 ; cf. 6.35ss.
  - type: text
    content: 'fils de Shalloum, fils de Tsadoq, fils d''Ahitoub, '
  '20':
  - type: note
    content: 'Tu tireras  : litt. tu donneras. –  maison des trésors  : cf. 5.17n.'
  - type: text
    content: Tu tireras de la maison des trésors du roi ce qu'il faudra pour les autres dépenses que tu auras à faire concernant la maison de ton Dieu.
  - type: text
    content: ' '
  '21':
  - type: note
    content: 'trésoriers 1.8 ; Dn 3.2s. –  Transeuphratène  : cf. 4.10n. –  exactement 6.8+.'
  - type: text
    content: Moi, le roi Artaxerxès, je donne l'ordre à tous les trésoriers de Transeuphratène de livrer exactement à Esdras, prêtre et scribe de la loi du Dieu du ciel, tout ce qu'il vous demandera,
  - type: text
    content: ' '
  '22':
  - type: note
    content: '100 talents  : près de 3,5 tonnes ; 100 kors (cf. 1R 5.2n) et 100 baths, environ 21 000 l et 2 100 l respectivement (voir mesures). –  huile 6.9n. –  à discrétion  : litt. qui n''est pas écrit.'
  - type: text
    content: jusqu'à 100 talents d'argent, 100 kors de froment, 100 baths de vin, 100 baths d'huile, et du sel à discrétion.
  - type: text
    content: ' '
  '23':
  - type: note
    content: 'la Colère  : cf. Nb 1.53 ; 18.5 ; Jos 22.20 ; 2R 3.27.'
  - type: text
    content: Que tout ce qui est ordonné par le Dieu du ciel se fasse avec exactitude pour la maison du Dieu du ciel, afin que la Colère ne s'abatte pas sur le royaume du roi et de ses fils.
  - type: text
    content: ' '
  '24':
  - type: note
    content: 'tribut… 4.13n. –  Netinim v. 7+. –  serviteurs…  : peut-être l''équivalent des serviteurs de Salomon (2.55+) ; même terme Dn 3.12ss ; 6.21 ; 7.14,27.'
  - type: text
    content: Ainsi nous vous faisons savoir qu'il ne peut être levé ni tribut, ni impôt, ni taxe sur aucun des prêtres, des lévites, des chantres, des portiers, des Netinim et des serviteurs de cette maison de Dieu.
  - type: text
    content: ' '
  '25':
  - type: note
    content: 'entre tes mains, litt. dans ta main, comme au v. 14n  ; ici la sagesse semble être un autre nom de la loi (voir aussi Né 8.1ss). –  des juges…  : cf. Ex 18.21s ; Dt 16.18 ; 1Ch 26.29ss. –  fais-les connaître, d''après 3 Esdras 8.23 et Syr  ; araméen vous les ferez connaître. –  ceux qui ne les connaissent pas  : cf. chap. 10.'
  - type: text
    content: Et toi, Esdras, selon la sagesse de Dieu, qui est entre tes mains, nomme des juges et des magistrats qui rendent la justice pour tout le peuple de Transeuphratène, pour tous ceux qui connaissent les lois de ton Dieu ; et fais-les connaître à ceux qui ne les connaissent pas.
  - type: text
    content: ' '
  '26':
  - type: note
    content: 'mort  : cf. Lv 20.2ss ; Dt 13.6ss ; 22.22. –  bannissement ou exclusion, traduction incertaine ; le mot semble apparenté à un terme perse qui désigne un châtiment corporel, et il a aussi pu garder ce sens en araméen.'
  - type: text
    content: Quiconque n'observera pas exactement la loi de ton Dieu et la loi du roi sera condamné soit à la mort, soit au bannissement, soit à une amende et à la prison. »
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'A partir d''ici le texte est à nouveau en hébreu (v. 12n) ; il est aussi écrit à la première personne jusqu''au chapitre 9 (cf. 10.1). –  Béni… 1Ch 29.10 ; cf. Né 3.36+. –  Dieu de nos pères 8.28 ; 10.11 ; 1Ch 29.18 ; 2Ch 20.6. –  qui a ainsi disposé le cœur du roi  : cf. 1.1s ; Né 2.12 ; 7.5 ; 1R 10.24. –  donner de la splendeur  : cf. Es 60.7,9,13,21.'
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de nos pères, qui a ainsi disposé le cœur du roi à donner de la splendeur à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à Jérusalem, '
  '28':
  - type: note
    content: 'qui m''a accordé de la faveur 9.9 ; Gn 39.21n  ; voir aussi Est 2.9n. –  puissants  : le terme évoque habituellement la vaillance du guerrier. –  la main… v. 6+.'
  - type: text
    content: 'et qui m''a accordé de la faveur devant le roi, ses conseillers et tous ses princes puissants ! Rendu fort par la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, qui était sur moi, j''ai rassemblé les chefs d''Israël, pour qu''ils montent avec moi.'
  '3':
  - type: text
    content: 'fils d''Amaria, fils d''Azaria, fils de Merayoth, '
  '4':
  - type: text
    content: 'fils de Zerahia, fils d''Ouzzi, fils de Bouqqi, '
  '5':
  - type: note
    content: 'prêtre en chef  : même expression en 2R 25.18 ; 1Ch 27.5 ; 2Ch 19.11 ; 24.11 ; 31.10.'
  - type: text
    content: 'fils d''Abishoua, fils de Phinéas, fils d''Eléazar, fils d''Aaron, le prêtre en chef. '
  '6':
  - type: note
    content: 'un scribe versé… v. 10n,12,14,21 ; voir Ps 45.2n. –  loi de Moïse Né 8.1. –  la main du Seigneur …  : cf. v. 9,28 ; 8.18,22,31 ; Né 2.8,18 ; voir aussi Ps 80.18. –  tout ce qu''il demandait  : cf. 1S 1.17 ; Est 5.3,6ss ; 7.2s ; 9.12.'
  - type: text
    content: 'Cet Esdras monta de Babylone ; c''était un scribe versé dans la loi de Moïse, celle que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, avait donnée. Comme la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, était sur lui, le roi lui accorda tout ce qu''il demandait. '
  '7':
  - type: note
    content: 'Cf. v. 24 ; 2.36ss ; Né 10.29. –  Netinim 2.43n. –  la septième année  : selon l’Artaxerxès en question, ce peut être 458 av. J.-C. (Artaxerxès Ier), 398 (Artaxerxès II) ou 352 (Artaxerxès III) ; certains, sans appui textuel, modifient le texte hébreu traditionnel pour lire la trente-septième année (d''Artaxerxès Ier, soit 428 av. J.-C.).'
  - type: text
    content: 'Certains des Israélites, des prêtres et des lévites, des chantres, des portiers et des Netinim montèrent aussi à Jérusalem, la septième année du roi Artaxerxès. '
  '8':
  - type: note
    content: 'Esdras arriva  : litt. il arriva  ; LXX ils arrivèrent. –  cinquième mois  : juillet-août ; cf. 10.9n.'
  - type: text
    content: 'Esdras arriva à Jérusalem au cinquième mois de la septième année du roi ; '
  '9':
  - type: note
    content: 'il avait fixé, d''après LXX ; la vocalisation traditionnelle du texte hébreu est obscure. –  le départ  : litt. la montée, cf. 2.1. –  premier mois  : mars-avril ; cf. 8.31. –  la bonne main…  : cf. v. 6+.'
  - type: text
    content: 'il avait fixé le départ de Babylone le premier jour du premier mois, et il arriva à Jérusalem le premier jour du cinquième mois, la bonne main de son Dieu étant sur lui. '
