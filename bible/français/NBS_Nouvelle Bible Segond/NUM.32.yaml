document_id: NUM.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Trois tribus s'installent à l'est du Jourdain
  - type: text
    content: ' '
  - type: note
    content: 'fils de Ruben / fils de Gad  : remarquer l''ordre inverse aux v. 2ss ; Gn 49.4 ; Dt 33.6,20s ; Jos 13.15ss ; Jg 5.15s. Smr ajoute et la demi-tribu de Manassé , de même, systématiquement, dans la suite (cf. v. 33). –  grands troupeaux…  : cf. Dt 3.18ss ; voir aussi Gn 13.5s ; 2Ch 32.29. –  Yazer (21.32n) au sud et Galaad (v. 6,29n,39n) au nord, sans doute de part et d''autre du Yabboq en Transjordanie (cf. 21.24n). –  propices à l''élevage  : litt. un lieu de troupeaux , de même au v. 4.'
  - type: text
    content: 'Les fils de Ruben et les fils de Gad avaient de grands troupeaux, des troupeaux considérables. Ils virent que le pays de Yazer et le Galaad étaient propices à l''élevage. '
  '10':
  - type: note
    content: 14.20ss ; Dt 1.34.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère en ce jour-là ; il a juré : '
  '11':
  - type: note
    content: 'montés d''Egypte Gn 12.10n. –  promise par serment 14.16+. –  rempli leurs obligations…  : cf. 14.24n.'
  - type: text
    content: '« Les hommes qui sont montés d''Egypte, depuis l''âge de vingt ans et au-dessus, ne verront jamais la terre que j''ai promise par serment à Abraham, à Isaac et à Jacob, car ils n''ont pas rempli leurs obligations envers moi '
  '12':
  - type: note
    content: Qenizzite Jos 14.6,14 ; à rapprocher de Qenaz (Gn 36.11,15 ; cf. 15.19 ; Jg 1.13 ; 1Ch 4.15) ; cf. 13.6+ ; LXX interprète le séparé.
  - type: text
    content: '– excepté Caleb, fils de Yephounné, le Qenizzite, et Josué, fils de Noun, qui ont rempli leurs obligations envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. » '
  '13':
  - type: note
    content: dans le désert pendant quarante ans 14.33+s ; Dt 2.7 ; 8.2 ; 29.4 ; Am 2.10. – Voir génération. –  ce qui déplaisait 22.34n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère contre Israël ; il les a fait errer dans le désert pendant quarante ans, jusqu''à la disparition de toute la génération qui avait fait ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: 'vous vous levez à la place de  : cf. 1R 8.20n.'
  - type: text
    content: 'Et vous, vous vous levez à la place de vos pères, comme des rejetons de pécheurs, pour rendre la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' encore plus ardente contre Israël ! '
  '15':
  - type: note
    content: 'il prolongera…  : litt. il ajoutera (c.-à-d. il continuera ou il recommencera) encore à le faire reposer au désert  ; Syr porte la deuxième personne (vous faire reposer…).'
  - type: text
    content: En effet, si vous cessez de le suivre, il prolongera encore le séjour d'Israël au désert, et vous aurez causé la perte de tout ce peuple !
  '16':
  - type: text
    content: ' '
  - type: note
    content: enclos / villes v. 24,36.
  - type: text
    content: 'Ils s''approchèrent de lui et dirent : Nous bâtirons ici des enclos pour notre petit bétail et des villes pour nos familles ; '
  '17':
  - type: note
    content: 'nous prendrons aussitôt les armes (v. 20ss) ou, d''après LXX, nous nous mettrons en ordre de bataille  ; voir Ex 13.18n. –  dans leur lieu  : autre traduction chez eux. –  familles v. 16,24,26 ; Gn 34.29n  ; Jg 18.21n.'
  - type: text
    content: 'puis nous prendrons aussitôt les armes à la tête des Israélites, jusqu''à ce que nous les ayons amenés dans leur lieu ; nos familles habiteront dans les villes fortes, à cause des habitants du pays. '
  '18':
  - type: text
    content: 'Nous ne rentrerons pas chez nous tant que les Israélites n''auront pas reçu chacun son patrimoine ; '
  '19':
  - type: note
    content: 'en Transjordanie  : en hébreu l''expression correspondante est presque identique à la formule rendue par au-delà du Jourdain (litt. de l''autre côté du Jourdain et au-delà  ; voir aussi 22.1n). La première fois il s''agit d''une indication relative au sujet qui parle, désignant la région de Canaan, située à l''ouest du Jourdain, du point de vue des Gadites et des Rubénites qui sont en Transjordanie et qui doivent y habiter. La deuxième fois, selon son sens le plus courant, elle désigne la Transjordanie elle-même, c.-à-d. la région à l''est du Jourdain ; cf. v. 32 ; Dt 3.20n  ; Jos 12.1.'
  - type: text
    content: 'nous n''aurons pas de part à leur patrimoine au-delà du Jourdain, puisque nous aurons notre patrimoine en Transjordanie, à l''est. '
  '2':
  - type: text
    content: 'Alors les fils de Gad et les fils de Ruben vinrent dire à Moïse, à Eléazar, le prêtre, et aux princes de la communauté : '
  '20':
  - type: note
    content: Cf. v. 17ss,27-32 ; 10.35+.
  - type: text
    content: 'Moïse leur dit : Si vous faites cela, si vous prenez les armes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour le combat, '
  '21':
  - type: note
    content: 'si vous prenez tous…  : autre traduction si tous ceux d''entre vous qui ont pris les armes passent le Jourdain…  ; cf. v. 27,29.'
  - type: text
    content: 'si vous prenez tous les armes pour passer le Jourdain devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', jusqu''à ce qu''il ait dépossédé ses ennemis devant lui, '
  '22':
  - type: text
    content: 'si vous revenez seulement après que le pays aura été soumis devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous serez alors quittes envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et envers Israël, et ce pays-ci sera votre propriété devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'votre péché vous retrouvera  : c.-à-d. vous en serez châtiés, vous aurez à en rendre compte  ; cf. Gn 4.7 ; Dt 28.45.'
  - type: text
    content: 'Mais si vous n''agissez pas ainsi, vous aurez péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; sachez alors que votre péché vous retrouvera. '
  '24':
  - type: note
    content: 'sorti de votre bouche  : cf. 30.3.'
  - type: text
    content: Bâtissez donc des villes pour vos familles et des enclos pour votre petit bétail, et faites ce qui est sorti de votre bouche.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Nous sommes…  : litt. tes serviteurs feront comme mon seigneur ordonne  ; cf. v. 31 ; 36.2.'
  - type: text
    content: 'Les fils de Gad et les fils de Ruben dirent à Moïse : Nous sommes tes serviteurs, mon seigneur ; nous ferons ce que tu ordonnes. '
  '26':
  - type: note
    content: 'V. 17. –  Nos femmes…  : cf. Gn 34.29n. –  Galaad  : cf. v. 1n,29n,39n.'
  - type: text
    content: 'Nos femmes et toutes nos familles, nos troupeaux et toutes nos bêtes resteront dans les villes du Galaad ; '
  '27':
  - type: text
    content: 'nous tous, nous prendrons les armes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour le combat, comme tu l''as dit.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Josué 27.12ss ; cf. Jos 1.12ss. –  chefs de famille  : cf. 31.26.'
  - type: text
    content: 'Moïse donna des ordres à leur sujet à Eléazar, le prêtre, à Josué, fils de Noun, et aux chefs de famille des tribus des Israélites. '
  '29':
  - type: note
    content: 'passent le Jourdain…  : cf. v. 17,21s,26s ; Dt 3.8ss. – Le mot Galaad est ici à prendre dans son sens large, comme désignant l''ensemble de la Transjordanie (v. 19n  ; cf. v. 1,40).'
  - type: text
    content: 'Moïse leur dit : Si les fils de Gad et les fils de Ruben passent le Jourdain avec vous, s''ils prennent tous les armes pour le combat devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et que le pays soit soumis devant vous, vous leur donnerez le Galaad comme propriété. '
  '3':
  - type: note
    content: 'Ataroth…  : ces localités se situent entre le Yabboq et l''Arnon ; cf. v. 34-38 ; plusieurs d''entre elles (Ataroth, Dibôn [21.30n], situées dans la partie sud, près de la frontière de Moab, ainsi que Nebo [près du mont Nebo 21.20n] et Baal-Méôn, un peu plus au nord à l''est de la mer Morte), sont mentionnées sur la stèle de Mésha  ; cf. v. 34n  ; 21.29n  ; 2R 3.4 ; cette région fait partie du royaume de Salomon selon 1R 4.19. –  Nimra ou Beth-Nimra (v. 36 ; Jos 13.27), à la hauteur de Jéricho. –  Heshbôn (21.25n) et Eléalé, un peu plus au nord-est. –  Sebam  : LXX Sibma, comme au v. 38 ; Jos 13.19, entre le Nebo et Heshbôn. –  Béôn  : sans doute une déformation de Baal-Méôn, au sud du mont Nebo ; cf. v. 38 ; Jos 13.17.'
  - type: text
    content: 'Ataroth, Dibôn, Yazer, Nimra, Heshbôn, Eléalé, Sebam, Nebo et Béôn, '
  '30':
  - type: note
    content: 's''ils ne prennent pas les armes…  : litt. s''ils ne passent pas armés avec vous. –  en Canaan, c.-à-d. à l''ouest du Jourdain, sur une terre moins propice à l''élevage (cf. v. 1,4).'
  - type: text
    content: Mais s'ils ne prennent pas les armes pour passer avec vous, ils auront leur propriété au milieu de vous en Canaan.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 25 ; Ex 19.8.
  - type: text
    content: 'Les fils de Gad et les fils de Ruben répondirent : Ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a dit, nous le ferons. '
  '32':
  - type: note
    content: 'Nous prendrons…  : litt. nous passerons armés devant YHWH en Canaan v. 17 ; Jos 4.12s. –  Transjordanie  : voir v. 19n  ; 34.15.'
  - type: text
    content: 'Nous prendrons les armes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour passer en Canaan ; mais nous aurons notre propriété, notre patrimoine, en Transjordanie.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Gad / fils de Ruben / demi-tribu de Manassé (cf. v. 1n,29,39ss) : Dt 3.12-17 ; 29.6-8 ; Jos 12.6. –  Sihôn / Og 21.21ss,33ss ; Dt 2.24ss ; 3.1-7 ; Jos 12.1-6 ; 13.8-32.'
  - type: text
    content: Moïse donna aux fils de Gad, aux fils de Ruben et à la demi-tribu de Manassé, fils de Joseph, le royaume de Sihôn, roi des Amorites, et le royaume d'Og, roi du Bashân, le pays avec ses villes, avec les territoires des villes du pays, tout autour.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jos 13.15-28 où les Rubénites héritent de plusieurs villes ici reconstruites par les Gadites. –  bâtirent  : autre traduction rebâtirent (même possibilité dans la suite). –  Aroër , au sud-est de Dibôn, près de la frontière de Moab, autre localité mentionnée sur la stèle de Mésha (v. 3n), ainsi que Qiriataïm (v. 37).'
  - type: text
    content: 'Les fils de Gad bâtirent Dibôn, Ataroth, Aroër, '
  '35':
  - type: note
    content: Yogboha, au nord-ouest d'Amman (= Rabba d'Ammon) v. 42n.
  - type: text
    content: 'Atroth-Shophân, Yazer, Yogboha, '
  '36':
  - type: note
    content: 'Beth-Harân ou Beth-Haram, cf. Jos 13.27, sans doute au nord-ouest du Nebo comme Beth-Nimra (v. 3n). –  des villes fortes…  : cf. v. 16,24.'
  - type: text
    content: Beth-Nimra et Beth-Harân, des villes fortes, avec des enclos pour le petit bétail.
  '37':
  - type: text
    content: ' '
  - type: note
    content: Toutes ces localités sont proches de Heshbôn , cf. v. 3 ; 21.25. –  Qiriataïm , au sud-ouest de Medba (21.30n), à 10 km de l'Arnon (v. 34n).
  - type: text
    content: 'Les fils de Ruben bâtirent Heshbôn, Eléalé et Qiriataïm, '
  '38':
  - type: note
    content: 'Baal-Méôn v. 3n  ; Ez 25.9. –  dont les noms furent changés, sans doute parce qu''ils évoquaient des divinités étrangères (Nebo et Baal). –  des noms  : LXX et Syr ont lu leurs noms  ; cf. v. 42 ; Jg 18.29.'
  - type: text
    content: Nebo et Baal-Méôn, dont les noms furent changés, et Sibma ; ils donnèrent des noms aux villes qu'ils bâtirent.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Makir  : cf. 26.29+ ; Gn 50.23n  ; Dt 3.15 ; Jos 13.31 ; 17.1 ; Jg 5.14n. –  Galaad  : il s''agit ici du nord de la Transjordanie, au nord du Yabboq ; cf. Dt 3.13ss ; Jos 17.1,5s. –  et s''en emparèrent , d''après Smr ; le texte hébreu traditionnel porte (litt.) et il s''en empara  ; LXX a lu tout le v. au singulier, avec pour sujet le fils de Makir , cf. 26.29 ; Jos 13.31.'
  - type: text
    content: 'Les fils de Makir, fils de Manassé, allèrent au Galaad et s''en emparèrent ; ils dépossédèrent les Amorites qui s''y trouvaient. '
  '4':
  - type: note
    content: 'tout ce pays que le Seigneur a mis à mal (litt. frappé) : cf. 21.21ss ; 31 ; Dt 2.24–3.17 ; Jos 1.12ss ; 13.8ss ; 1Ch 5. –  élevage / troupeaux v. 1n. –  nous avons  : litt. tes serviteurs ont.'
  - type: text
    content: 'tout ce pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a mis à mal devant la communauté d''Israël, est un pays propice à l''élevage ; or nous avons des troupeaux. '
  '40':
  - type: note
    content: Cf. v. 33.
  - type: text
    content: 'Moïse donna le Galaad à Makir, fils de Manassé, et il s''y installa. '
  '41':
  - type: note
    content: 'Yaïr  : cf. 1Ch 2.22. – Les douars (hébreu hawwoth) sont des lieux de campement nomades ; les Douars de Yaïr étaient sans doute à l''origine de tels camps, au sud-est du lac de Tibériade ; Dt 3.14+ ; Jos 13.30 ; 1R 4.13 ; cf. Jg 10.3-5.'
  - type: text
    content: 'Yaïr, fils de Manassé, alla prendre leurs douars et les appela Douars de Yaïr. '
  '42':
  - type: note
    content: 'Nobah, près de Yogboha (v. 35), tout au nord de la Transjordanie ; cf. Jg 8.11. –  Qenath  : cf. 1Ch 2.23. –  les localités qui en dépendaient  : litt. ses filles  ; cf. 21.25.'
  - type: text
    content: Nobah alla prendre Qenath avec les localités qui en dépendaient et l'appela Nobah, de son propre nom.
  '5':
  - type: note
    content: Voir grâce.
  - type: text
    content: 'Ils dirent : Si nous avons trouvé grâce à tes yeux, donne-nous ce pays comme propriété ; ne nous fais pas passer le Jourdain.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vous resteriez ici  : autre traduction vous vous installeriez ici.'
  - type: text
    content: 'Moïse dit aux fils de Gad et aux fils de Ruben : Vos frères iraient à la guerre, et vous, vous resteriez ici ! '
  '7':
  - type: note
    content: 'décourager  : litt. empêcher ou contrarier le cœur, de même au v. 9 ; le même verbe est traduit par désapprouver en 30.6nss, par contrecarrer en Ps 33.10, refuser en Ps 141.5 ; cf. Nb 13.32s.'
  - type: text
    content: 'Pourquoi voulez-vous décourager les Israélites de passer dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur donne ? '
  '8':
  - type: note
    content: 'Cf. 13—14 ; Dt 1.22ss ; Jos 14.6ss. –  Qadesh-Barnéa  : cf. 13.26n  ; Dt 1.19. –  examiner  : litt. voir.'
  - type: text
    content: 'C''est là ce qu''ont fait vos pères quand je les ai envoyés de Qadesh-Barnéa pour examiner le pays. '
  '9':
  - type: note
    content: 13.23ss ; Dt 1.24,28.
  - type: text
    content: 'Ils sont montés jusqu''à l''oued Eshkol et, après avoir examiné le pays, ils ont découragé les Israélites pour qu''ils n''entrent pas dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur donnait. '
