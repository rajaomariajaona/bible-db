        text: 13.23ss ; Dt 1.24,28.
    marker-yv: yv-n
  - type: text
    text: 'Ils sont montés jusqu''à l''oued Eshkol et, après avoir examiné le pays, ils ont découragé les Israélites pour qu''ils n''entrent pas dans le pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
