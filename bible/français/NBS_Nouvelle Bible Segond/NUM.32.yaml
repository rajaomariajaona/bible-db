  - type: text
    text: '« Les hommes qui sont montés d''Egypte, depuis l''âge de vingt ans et au-dessus, ne verront jamais la terre que j''ai promise par serment à Abraham, à Isaac et à Jacob, car ils n''ont pas rempli leurs obligations envers moi '
  - type: usfm
    marker: vlbl
