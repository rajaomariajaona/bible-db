document_id: MIC.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Beth-Léhem, ville du roi sauveur
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.8,14n. –  Beth-Léhem ( Maison du Pain  ; transcription traditionnelle Bethléem ), la localité dont David était originaire ; cf. 1S 16 ; 2S 5.2 ; 7.8 ; Mt 2.6  ; Jn 7.42. –  Ephrata  : cf. Gn 35.16n,19 ; 48.7 ; Rt 1.1s ; 4.11 ; 1S 17.12 ; Ps 132.6 ; 1Ch 2.19,50s ; LXX a lu la maison d''Ephrata . –  petite…  : autre traduction trop petite pour être comptée parmi… Le mot traduit par phratries signifie aussi mille, millier , et s''applique souvent aux unités militaires (Nb 1.16n etc.) ; certains pensent qu''il s''appliquait aux clans capables de fournir au moins un millier de combattants, mais il pourrait s''agir d''unités inférieures ; cf. Nb 31.5n  ; Dt 33.17 ; Jos 22.14 ; Jg 5.8n  ; 6.15n  ; 1S 10.19 ; 23.23 ; voir aussi Es 60.22 ; 1Co 1.27. –  sortira pour moi… Jr 30.21 ; cf. Es 11.1 ; voir aussi Jr 23.5 ; Ez 34.24 ; 37.22ss ; Za 3.8 ; 6.12. –  qui dominera sur  : autre traduction qui gouvernera . –  origine  : le terme hébreu ainsi traduit (dérivé du verbe traduit par sortira ) peut évoquer le lever d''un astre (mot très proche en Ps 19.7 ; 75.7 ; cf. 89.37). –  aux jours d''autrefois ou de toujours  ; le terme hébreu (c''est le même qui figure dans l''expression pour toujours en 4.7 ; 2S 7.16), qui dérive d''une racine signifiant être caché, secret , désigne une durée dont la fin ou (ici) le commencement semblent si lointains qu''ils échappent à toute représentation (cf. depuis la nuit des temps ) ; cf. Es 63.9 ; Am 9.11 ; Ml 3.4.'
  - type: text
    content: Quant à toi, Beth-Léhem Ephrata,
  - type: text
    content: toi qui es petite parmi les phratries de Juda,
  - type: text
    content: de toi sortira pour moi
  - type: text
    content: celui qui dominera sur Israël ;
  - type: text
    content: son origine remonte au temps jadis,
  - type: text
    content: aux jours d'autrefois.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'villes / forteresses  : cf. v. 13n  ; 4.10 ; Gn 4.17 ; Es 2.15 ; Os 8.14 ; voir aussi 1R 4.13 ; 9.17ss ; 15.22s ; 2Ch 11.5ss.'
  - type: text
    content: je retrancherai les villes de ton pays
  - type: text
    content: et je raserai toutes tes forteresses ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: sortilèges / chercher des présages Ex 22.17 ; Lv 19.26n  ; Dt 18.10,14 ; 2R 9.22 ; 21.6 ; Es 2.6n  ; 3.1-3 ; 57.3 ; Jr 27.9.
  - type: text
    content: je retrancherai de ta main les sortilèges
  - type: text
    content: et tu n'auras plus personne pour chercher des présages ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'statues Ex 20.4 ; 1R 12.28 ; Za 13.2. –  pierres levées  : cf. Gn 28.17ss ; 35.14s ; Ex 23.24 ; 34.13 ; Lv 26.1 ; Dt 7.5 ; 12.3 ; 16.22 ; Jos 4.1ss ; 2R 18.4 ; 23.14 ; Os 3.4 ; 10.2. –  l''œuvre de tes mains  : cf. Dt 4.28 ; Es 2.8 ; 17.8 ; 37.19 ; Jr 25.6s,14 ; 32.30 ; Os 14.4 ; Ap 9.20 ; voir aussi Es 44.9ss.'
  - type: text
    content: je retrancherai de ton sein tes statues et tes pierres levées,
  - type: text
    content: et tu ne te prosterneras plus devant l'œuvre de tes mains ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: poteaux cultuels Ex 34.13 ; Dt 7.5 ; 12.3 ; 16.21 ; Jg 3.7n  ; 1R 15.13 ; 18.19 ; 2R 18.4 ; 21.7 ; 23.4,6,15. –  tes villes v. 10+ ; d'après le contexte, certains ont compris tes dieux, tes pierres sacrificielles (le mot ne serait alors qu'un homonyme de villes ) ; d'autres modifient le texte hébreu traditionnel pour lire tes Baals.
  - type: text
    content: je déracinerai de ton sein tes poteaux cultuels (tes ashéras)
  - type: text
    content: et je détruirai tes villes.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 63.4ss ; Jr 46.10 ; 51.36 ; Ez 24.8 ; 25.14 ; Jl 4.21 ; Za 14.17s.
  - type: text
    content: J'exercerai ma vengeance avec colère, avec fureur, sur les nations
  - type: text
    content: qui n'ont pas écouté.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'il les livrera  : cf. 6.16 ; 1R 14.16 ; 2R 21.14 ; Es 42.24 ; Ps 44.12. –  celle qui doit accoucher  : cf. 4.9+s ; Es 7.14 ; 54.1-10 ; 66.7ss ; voir aussi Lc 1.26ss. –  le reste  : cf. 2.12+.'
  - type: text
    content: C'est pourquoi il les livrera
  - type: text
    content: jusqu'au temps où celle qui doit accoucher accouchera ;
  - type: text
    content: et le reste de ses frères
  - type: text
    content: reviendra auprès des Israélites.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 49.5 ; 52.13 ; 61.5. –  les fera paître v. 5n  ; 2S 5.2 ; 7.7 ; Ez 34.23ss ; 37.24 ; Ps 78.70ss ; cf. 23.1 ; 72.3s ; Mt 2.6 ; Jn 10.1ss. –  la majesté (litt. l''orgueil ou la fierté  ; cf. Es 24.14n  ; Ps 47.5n) du nom… Es 30.27. –  ils s''installeront ou ils habiteront  ; cf. 4.4 ; Lv 25.18s ; 26.5 ; Jg 18.7 ; 1R 5.5 ; Es 47.8 ; Jr 32.37 ; 49.31 ; Ez 28.26 ; 34.25 ; So 2.15 ; Za 14.11 ; Ps 4.9 ; Pr 3.29. –  il est dès maintenant  : autre traduction il sera alors . – Voir gloire. –  jusqu''aux extrémités de la terre Ps 2.8 ; 72.8 ; Za 9.10.'
  - type: text
    content: Il se dressera et les fera paître
  - type: text
    content: 'avec la force du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'avec la majesté du nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu ;'
  - type: text
    content: et ils s'installeront,
  - type: text
    content: car il est dès maintenant glorifié
  - type: text
    content: jusqu'aux extrémités de la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'la paix  : cf. 4.4 ; Es 9.5s ; 11.9 ; Ps 72.7 ; Ep 2.14. –  nos palais  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire notre territoire  ; cf. Os 8.14 ; Am 1.4. –  sept / huit  : les chiffres en progression indiquent généralement l''abondance ; l''idée semble être ici qu''il y aura toujours assez de défenseurs pour faire face à l''envahisseur (cf. Os 6.2 ; Am 1.3+). –  du peuple  : litt. des hommes (hébreu ’adam ).'
  - type: text
    content: C'est lui qui sera la paix !
  - type: text
    content: Lorsque l'Assyrien viendra dans notre pays
  - type: text
    content: et qu'il pénétrera dans nos palais,
  - type: text
    content: nous dresserons contre lui sept bergers,
  - type: text
    content: huit princes du peuple.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ils feront paître  : c.-à-d. ils gouverneront  ; cf. v. 3, voir aussi Jr 23.4 ; Ps 2.9. –  Assyrie et Assyrien traduisent le même mot hébreu ’Ashour , également associé à Nemrod en Gn 10.8ss ; 1Ch 1.10. –  avec le glaive ou avec le poignard , en modifiant le texte hébreu traditionnel ( dans ses entrées  ?) d''après un ms grec.'
  - type: text
    content: Ils feront paître l'Assyrie avec l'épée,
  - type: text
    content: et le pays de Nemrod avec le glaive.
  - type: text
    content: Il nous délivrera ainsi de l'Assyrien,
  - type: text
    content: lorsqu'il viendra dans notre pays
  - type: text
    content: et qu'il pénétrera sur notre territoire.
  - type: heading
    content: Le reste d'Israël parmi les nations
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de Jacob 2.12+ ; Es 10.21 ; cf. Gn 12.2s. –  rosée / ondées  : cf. Gn 27.28,39 ; Dt 32.2 ; 33.13 ; 1R 17.1 ; Jr 3.3 ; 14.22 ; Os 14.6 ; Ps 65.10s ; 72.6 ; Jb 29.19 ; voir aussi Pr 19.12. –  rien de l''homme…  : cf. Nb 11.9 ; Jg 6.37,40 ; 2S 17.12 ; Jb 38.28 ; voir aussi Os 14.4.'
  - type: text
    content: Le reste de Jacob sera,
  - type: text
    content: au sein de la multitude des peuples,
  - type: text
    content: 'comme une rosée qui vient du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: comme des ondées sur l'herbe,
  - type: text
    content: qui n'espèrent rien de l'homme,
  - type: text
    content: qui n'attendent rien des humains.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 14. –  lion  : cf. Gn 49.9 ; Nb 23.24 ; 24.9 ; Es 5.29 ; 31.4 ; Os 5.14n  ; Am 1.2 ; 3.4 ; Pr 19.12. –  personne ne délivre Os 2.12+.'
  - type: text
    content: Le reste de Jacob sera parmi les nations,
  - type: text
    content: au sein de la multitude des peuples,
  - type: text
    content: comme un lion parmi les bêtes de la forêt,
  - type: text
    content: 'comme un jeune lion parmi les troupeaux de petit bétail :'
  - type: text
    content: lorsqu'il passe, il piétine et déchiquette,
  - type: text
    content: et personne ne délivre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Que ta main s''élève  : cf. Ex 14.8n  ; Nb 33.3 ; Dt 32.27 ; Ps 89.14 ; voir aussi Es 26.11. –  au-dessus de tes adversaires Es 1.24. –  retranchés  : cf. v. 9ss ; Lv 7.20n.'
  - type: text
    content: Que ta main s'élève au-dessus de tes adversaires,
  - type: text
    content: que tous tes ennemis soient retranchés !
  - type: heading
    content: Le Seigneur retranchera tous les faux appuis
  '9':
  - type: text
    content: ' '
  - type: note
    content: chevaux / chars Dt 17.16 ; 1R 10.26ss ; Es 2.6ss ; 30.15s ; 31.1,3 ; Os 1.7 ; 10.13n  ; 14.4 ; Ag 2.22 ; Za 9.10 ; 10.5 ; Ps 20.8 ; 33.17 ; 147.10.
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: je retrancherai de ton sein tes chevaux
  - type: text
    content: et je causerai la perte de tes chars ;
