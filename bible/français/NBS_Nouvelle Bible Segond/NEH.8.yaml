document_id: NEH.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Esdras organise une lecture publique de la loi
  - type: text
    content: ' '
  - type: note
    content: 'comme un seul homme Nb 14.15 ; Jg 6.16 ; 20.1,8,11 ; 1S 11.7. –  devant la porte des Eaux , c.-à-d. à l''extérieur du temple, au sud-est v. 3,6 ; 3.26n. –  Esdras  : cf. Esd 7–10 ; ce chapitre a également un parallèle dans 3 Esdras  ; de nombreux commentateurs pensent qu''il venait primitivement après le chapitre 7, 8 ou 10 du livre d''Esdras. –  scribe  : cf. v. 4,9,13 ; 12.26,36. –  le livre de la loi  : cf. Esd 7.6,14,25n  ; 10.3+.'
  - type: text
    content: 'Alors tout le peuple se rassembla comme un seul homme sur la place qui est devant la porte des Eaux. Ils dirent à Esdras, le scribe, d''apporter le livre de la loi de Moïse, la loi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait instituée pour Israël. '
  '10':
  - type: note
    content: 'Esdras leur dit  : litt. il leur dit. –  viandes grasses  : cf. Es 25.6. –  envoyez des parts… Est 9.19,22 ; cf. Dt 16.11,14 ; 26.12 ; 1S 9.13 ; 2S 6.19. –  la joie du Seigneur (hébreu YHWH, voir nom) …  : cf. Esd 9.8s ; 1Ch 16.27 ; voir aussi Lv 23.40 ; Dt 12.7,12,18 ; 14.26 ; 16.11,14 ; 2Ch 29.36 ; 30.25.'
  - type: text
    content: 'Esdras leur dit : Allez, mangez des viandes grasses, buvez des liqueurs douces et envoyez des parts à ceux qui n''ont rien de prêt, car ce jour est sacré pour notre Seigneur ; ne vous affligez pas, car la joie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est votre force. '
  '11':
  - type: text
    content: 'Les lévites calmaient tout le peuple en disant : Taisez-vous, car ce jour est sacré, ne vous affligez pas ! '
  '12':
  - type: text
    content: Tout le peuple s'en alla pour manger et boire, pour envoyer des parts et pour se livrer à de grandes réjouissances. Car ils avaient compris les paroles qu'on leur avait expliquées.
  - type: heading
    content: Célébration de la fête des Huttes
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pour être attentifs  : autres traductions pour approfondir, pour étudier, pour discerner.'
  - type: text
    content: 'Le deuxième jour, les chefs de famille de tout le peuple, les prêtres et les lévites se rassemblèrent auprès d''Esdras, le scribe, pour être attentifs aux paroles de la loi. '
  '14':
  - type: note
    content: 'Ils trouvèrent écrit dans la loi  : cf. 9.3 ; 13.1. –  huttes  : hébreu soukkoth  ; cf. Lv 23.34-43 ; voir Ex 23.16 ; Dt 16.13ss ; 31.10ss ; voir aussi calendrier et fêtes.'
  - type: text
    content: 'Ils trouvèrent écrit dans la loi, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait instituée par l''intermédiaire de Moïse, que les Israélites devaient habiter dans des huttes pendant la fête du septième mois, '
  '15':
  - type: note
    content: 'diffuser… cette proclamation Esd 1.1n  ; voir aussi Ex 36.6. –  Sortez…  : dans LXX cet ordre est introduit par et Esdras dit. –  dans la montagne  : cf. Ag 1.8. –  feuillage  : cf. Lv 23.40. –  comme il est écrit Esd 3.4 ; 2Ch 30.5,18.'
  - type: text
    content: 'et qu''ils devaient faire entendre et diffuser dans toutes leurs villes et à Jérusalem cette proclamation : Sortez dans la montagne et rapportez du feuillage d''olivier, du feuillage d''olivier sauvage, du feuillage de myrte, du feuillage de palmier et du feuillage d''arbres touffus, pour faire des huttes, comme il est écrit. '
  '16':
  - type: note
    content: 'en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. –  porte d''Ephraïm  : peut-être au nord-ouest de la ville 12.39 ; 2R 14.13 ; 2Ch 25.23.'
  - type: text
    content: 'Alors le peuple sortit et en rapporta. Ils se firent des huttes, chacun sur son toit en terrasse, dans leurs cours, dans les cours de la maison de Dieu, sur la place de la porte des Eaux et sur la place de la porte d''Ephraïm. '
  '17':
  - type: note
    content: 'revenus de la captivité Esd 8.35. –  Depuis le temps de Josué  : cf. Esd 3.2 ; voir aussi Dt 31.7s ; 2R 23.22 ; 2Ch 30.26 ; 35.18.'
  - type: text
    content: Toute l'assemblée de ceux qui étaient revenus de la captivité fit des huttes ; ils habitèrent dans ces huttes. Depuis le temps de Josué, fils de Noun, jusqu'à ce jour, les Israélites n'avaient rien fait de pareil, et il y eut de très grandes réjouissances.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 31.11. –  On lut  : autre traduction il lut (certains mss de LXX précisent Esdras lut ). –  jour après jour Esd 6.9 ; 2Ch 30.21. –  sept jours Lv 23.34,41. –  assemblée solennelle Lv 23.36n  ; Nb 29.35 ; Dt 16.8n  ; 2Ch 7.9. –  selon la règle ou selon la coutume (le mot est aussi traduit par droit ) ; cf. Lv 5.10 ; 9.16 ; Nb 15.24 ; 29.18,21,24.'
  - type: text
    content: On lut dans le livre de la loi de Dieu, jour après jour, depuis le premier jour jusqu'au dernier. On célébra la fête pendant sept jours, et il y eut une assemblée solennelle le huitième jour, selon la règle.
  '2':
  - type: note
    content: tous ceux qui pouvaient comprendre…, c.-à-d. les enfants à partir d'un certain âge Dt 31.11ss. –  le premier jour… Lv 23.23ss ; Nb 29.1ss ; cette fête est devenue dans le judaïsme celle du nouvel an ; voir calendrier et fêtes.
  - type: text
    content: Esdras, le prêtre, apporta la loi devant toute l'assemblée – les hommes, les femmes et tous ceux qui pouvaient comprendre ce qu'ils entendaient. C'était le premier jour du septième mois.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 8nss. –  Tout le peuple était attentif…  : litt. les oreilles de tout le peuple étaient (tournées) vers le livre de la loi.'
  - type: text
    content: 'Il lut dans le livre depuis le matin jusqu''au milieu du jour, devant la place qui est en face de la porte des Eaux, en présence des hommes, des femmes et de tous ceux qui comprenaient. Tout le peuple était attentif à la lecture du livre de la loi. '
  '4':
  - type: note
    content: 'La cérémonie décrite dans les v. suivants s''apparente déjà plus à la liturgie de la synagogue (lecture et explication de l''Ecriture) qu''au culte traditionnel du temple (sacrifices). –  estrade  : cf. 9.4 ; 2R 11.14 ; 23.3. –  Hashoum, Hashbaddana et Meshoullam sont omis par un ms de LXX.'
  - type: text
    content: 'Esdras, le scribe, était placé sur une estrade de bois, dressée à cette occasion. Auprès de lui, à sa droite, se tenaient Mattitia, Shéma, Anaya, Urie, Hilqiya et Maaséya, et à sa gauche, Pedaya, Mishaël, Malkiya, Hashoum, Hashbaddana, Zacharie et Meshoullam. '
  '5':
  - type: note
    content: ouvrit, c.-à-d. déroula (il s'agit d'un rouleau, cf. Lc 4.17).
  - type: text
    content: 'Esdras ouvrit le livre à la vue de tout le peuple, car il se trouvait plus haut que tout le peuple ; et lorsqu''il l''eut ouvert, tout le peuple se tint debout. '
  '6':
  - type: note
    content: 'Voir bénédiction. –  le grand Dieu 1.5 ; 9.32 ; Dt 10.17 ; Jr 32.18 ; Dn 9.4 ; Esd 5.8. –  en levant les mains  : cette précision est omise par deux mss de LXX ; cf. Ps 28.2 ; 134.2 ; 141.2 ; Esd 9.5. –  Qu''il en soit ainsi 5.13+ ; Dt 27.15n. –  s''inclinèrent… Ex 34.8 ; Nb 22.31 ; 1S 24.9 ; 28.14. –  face  : litt. le nez  ; cf. 2Ch 20.18.'
  - type: text
    content: 'Esdras bénit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le grand Dieu, et tout le peuple répondit, en levant les mains : Qu''il en soit ainsi ! Qu''il en soit ainsi ! Ils s''inclinèrent et se prosternèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', face contre terre. '
  '7':
  - type: note
    content: 'Yamîn… lévites  : portion de texte omise par LXX ; au lieu de et les lévites, Vg a compris (qui étaient) lévites  ; cf. v. 9 ; 2Ch 35.3.'
  - type: text
    content: 'Josué, Bani, Shérébia, Yamîn, Aqqoub, Shabtaï, Hodiya, Maaséya, Qelita, Azaria, Yozabad, Hanân, Pelaya et les lévites faisaient comprendre la loi au peuple, et le peuple restait debout. '
  '8':
  - type: note
    content: 'distinctement  : voir Esd 4.18n  ; d''autres formes du même verbe sont traduites par prendre une décision en Lv 24.12 ; Nb 15.34 ; pour le présent verset on a aussi compris en interprétant ou en traduisant (une tradition juive voit dans ce texte l''origine des targums, traductions libres et interprétatives des textes bibliques en araméen, langue plus populaire [cf. Né 13.24]), ou encore en expliquant section par section (c''est un terme apparenté qui désigne aujourd''hui les portions de l''Ecriture à lire chaque jour dans le rituel juif). –  dans le livre de la loi  : d''après quelques mss hébreux et des versions anciennes ; autre texte hébreu, traditionnel  : dans le livre, dans la loi.'
  - type: text
    content: Ils lisaient distinctement dans le livre de la loi de Dieu et ils en donnaient le sens pour faire comprendre ce qu'ils avaient lu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Son Excellence 7.65,69 ; 10.2 ; 12.26 ; Esd 2.63n  ; ce titre est omis par LXX. –  prêtre-scribe  : cf. 12.26 ; Esd 7.11n. –  dirent  : le verbe est au singulier en hébreu, comme au v. 10. –  Ce jour v. 2. –  sacré  : voir saint. –  votre Dieu  : LXX notre Dieu. –  deuil 1.4 ; 9.2n  ; Nb 14.39 ; Dn 10.2. –  le peuple pleurait…  : cf. Lv 26 ; Dt 27–28 ; 2R 22.11,19.'
  - type: text
    content: 'Son Excellence Néhémie, Esdras, le prêtre-scribe, et les lévites qui instruisaient le peuple dirent à tout le peuple : Ce jour est sacré pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ; ne soyez pas dans le deuil et dans les pleurs ! Car tout le peuple pleurait en entendant les paroles de la loi. '
