      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Est 9.19,22 ; cf. Dt 16.11,14 ; 26.12 ; 1S 9.13 ; 2S 6.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la joie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Esd 9.8s ; 1Ch 16.27 ; voir aussi Lv 23.40 ; Dt 12.7,12,18 ; 14.26 ; 16.11,14 ; 2Ch 29.36 ; 30.25.'
      marker-yv: yv-n
    - type: text
      text: 'Esdras leur dit : Allez, mangez des viandes grasses, buvez des liqueurs douces et envoyez des parts à ceux qui n''ont rien de prêt, car ce jour est sacré pour notre Seigneur ; ne vous affligez pas, car la joie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est votre force. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les lévites calmaient tout le peuple en disant : Taisez-vous, car ce jour est sacré, ne vous affligez pas ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le peuple s'en alla pour manger et boire, pour envoyer des parts et pour se livrer à de grandes réjouissances. Car ils avaient compris les paroles qu'on leur avait expliquées.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Célébration de la fête des Huttes
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour être attentifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour approfondir, pour étudier, pour discerner.
      marker-yv: yv-n
    - type: text
      text: 'Le deuxième jour, les chefs de famille de tout le peuple, les prêtres et les lévites se rassemblèrent auprès d''Esdras, le scribe, pour être attentifs aux paroles de la loi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils trouvèrent écrit dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.3 ; 13.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: huttes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soukkoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lv 23.34-43 ; voir Ex 23.16 ; Dt 16.13ss ; 31.10ss ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes.'
      marker-yv: yv-n
    - type: text
      text: 'Ils trouvèrent écrit dans la loi, que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait instituée par l''intermédiaire de Moïse, que les Israélites devaient habiter dans des huttes pendant la fête du septième mois, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'diffuser… cette proclamation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esd 1.1
        - type: usfm
