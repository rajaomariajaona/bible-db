        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.3+.'
      marker-yv: yv-n
    - type: text
      text: 'Alors tout le peuple se rassembla comme un seul homme sur la place qui est devant la porte des Eaux. Ils dirent à Esdras, le scribe, d''apporter le livre de la loi de Moïse, la loi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait instituée pour Israël. '
