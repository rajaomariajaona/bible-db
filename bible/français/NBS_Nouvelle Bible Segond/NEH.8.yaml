      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ag 1.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: feuillage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 23.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme il est écrit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esd 3.4 ; 2Ch 30.5,18.
      marker-yv: yv-n
    - type: text
      text: 'et qu''ils devaient faire entendre et diffuser dans toutes leurs villes et à Jérusalem cette proclamation : Sortez dans la montagne et rapportez du feuillage d''olivier, du feuillage d''olivier sauvage, du feuillage de myrte, du feuillage de palmier et du feuillage d''arbres touffus, pour faire des huttes, comme il est écrit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en terrasse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte, cf. Dt 22.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porte d'Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être au nord-ouest de la ville 12.39 ; 2R 14.13 ; 2Ch 25.23.'
      marker-yv: yv-n
    - type: text
      text: 'Alors le peuple sortit et en rapporta. Ils se firent des huttes, chacun sur son toit en terrasse, dans leurs cours, dans les cours de la maison de Dieu, sur la place de la porte des Eaux et sur la place de la porte d''Ephraïm. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'revenus de la captivité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Esd 8.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Depuis le temps de Josué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Esd 3.2 ; voir aussi Dt 31.7s ; 2R 23.22 ; 2Ch 30.26 ; 35.18.'
      marker-yv: yv-n
    - type: text
      text: Toute l'assemblée de ceux qui étaient revenus de la captivité fit des huttes ; ils habitèrent dans ces huttes. Depuis le temps de Josué, fils de Noun, jusqu'à ce jour, les Israélites n'avaient rien fait de pareil, et il y eut de très grandes réjouissances.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 31.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On lut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il lut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(certains mss de LXX précisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Esdras lut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jour après jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Esd 6.9 ; 2Ch 30.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 23.34,41. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'assemblée solennelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 23.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 29.35 ; Dt 16.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Ch 7.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon la règle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'selon la coutume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le mot est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: droit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. Lv 5.10 ; 9.16 ; Nb 15.24 ; 29.18,21,24.
      marker-yv: yv-n
    - type: text
      text: On lut dans le livre de la loi de Dieu, jour après jour, depuis le premier jour jusqu'au dernier. On célébra la fête pendant sept jours, et il y eut une assemblée solennelle le huitième jour, selon la règle.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous ceux qui pouvaient comprendre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. les enfants à partir d''un certain âge Dt 31.11ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le premier jour… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 23.23ss ; Nb 29.1ss ; cette fête est devenue dans le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: judaïsme
        - type: text
          text: ' celle du nouvel an ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes.'
      marker-yv: yv-n
    - type: text
      text: Esdras, le prêtre, apporta la loi devant toute l'assemblée – les hommes, les femmes et tous ceux qui pouvaient comprendre ce qu'ils entendaient. C'était le premier jour du septième mois.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout le peuple était attentif…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les oreilles de tout le peuple étaient (tournées) vers le livre de la loi.
      marker-yv: yv-n
    - type: text
      text: 'Il lut dans le livre depuis le matin jusqu''au milieu du jour, devant la place qui est en face de la porte des Eaux, en présence des hommes, des femmes et de tous ceux qui comprenaient. Tout le peuple était attentif à la lecture du livre de la loi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La cérémonie décrite dans les v. suivants s''apparente déjà plus à la liturgie de la synagogue (lecture et explication de l''Ecriture) qu''au culte traditionnel du temple (sacrifices). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: estrade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.4 ; 2R 11.14 ; 23.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hashoum, Hashbaddana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Meshoullam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont omis par un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Esdras, le scribe, était placé sur une estrade de bois, dressée à cette occasion. Auprès de lui, à sa droite, se tenaient Mattitia, Shéma, Anaya, Urie, Hilqiya et Maaséya, et à sa gauche, Pedaya, Mishaël, Malkiya, Hashoum, Hashbaddana, Zacharie et Meshoullam. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ouvrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. déroula (il s''agit d''un rouleau, cf. Lc 4.17).'
      marker-yv: yv-n
    - type: text
      text: 'Esdras ouvrit le livre à la vue de tout le peuple, car il se trouvait plus haut que tout le peuple ; et lorsqu''il l''eut ouvert, tout le peuple se tint debout. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le grand Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5 ; 9.32 ; Dt 10.17 ; Jr 32.18 ; Dn 9.4 ; Esd 5.8. –  '
      - type: usfm
