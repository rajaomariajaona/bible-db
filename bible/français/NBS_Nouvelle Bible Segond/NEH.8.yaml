          - type: text
            text: LXX
        - type: text
          text: ' cet ordre est introduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et Esdras dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
