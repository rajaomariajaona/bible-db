    marker-yv: yv-n
  - type: text
    text: 'Le roi Xerxès dit à la reine Esther : Qui est-il, et où est-il celui dont le cœur est rempli de tels desseins ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''adversaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 4.
    marker-yv: yv-n
  - type: text
    text: 'Esther répondit : L''adversaire, l''ennemi, c''est Haman, ce mauvais ! Alors Haman fut rempli d''effroi en face du roi et de la reine. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
