    marker-yv: yv-n
  - type: text
    text: 'En ce deuxième jour également, pendant le banquet, le roi dit à Esther : Quelle est ta demande, reine Esther ? Elle te sera accordée ! Quelle est ta requête ? Jusqu''à la moitié du royaume, elle sera exaucée ! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour ma demande '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ma demande
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 5.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 2.10,20 ; 8.6 ; sur le terme hébreu correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ma propre vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qu''on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: moi-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La reine Esther répondit : Si j''ai trouvé grâce à tes yeux, ô roi, et si tel est ton bon plaisir, ô roi, qu''on m''accorde ma propre vie pour ma demande, et mon peuple pour ma requête ! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vendus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme esclaves et comme servantes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme esclaves, hommes et femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 12.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''adversaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 6 ; 3.10+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne vaut pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(comme en 5.13) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''adversaire ne saurait compenser le dommage causé au roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 3.9) ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''adversaire ne vaut pas qu''on dérange le roi ; cette oppression-là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si encore nous avions été vendus…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne vaudrait pas qu'on dérange le roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ou encore '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'adversaire ne mesure pas le dommage causé au roi.
    marker-yv: yv-n
  - type: text
    text: 'Car nous avons été vendus, moi et mon peuple : on veut nous détruire, nous tuer, nous faire disparaître ! Si encore nous avions été vendus comme esclaves et comme servantes, je n''aurais rien dit ; mais l''adversaire ne vaut pas le dommage causé au roi.'
