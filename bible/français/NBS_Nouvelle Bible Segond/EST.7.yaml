    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en fureur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.12+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le banquet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le jardin du palais '
    - type: usfm
