document_id: EST.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Disgrâce et mort de Haman
  - type: text
    content: ' '
  - type: note
    content: 5.8.
  - type: text
    content: 'Le roi et Haman arrivèrent pour prendre part au banquet de la reine Esther. '
  '10':
  - type: note
    content: Cf. Pr 5.22 ; 11.8 ; 26.27 ; 28.10 ; Ec 10.8 ; Mt 7.2.
  - type: text
    content: On pendit Haman à la potence qu'il avait préparée pour Mardochée. Alors la fureur du roi s'apaisa.
  '2':
  - type: note
    content: 5.3+,6n.
  - type: text
    content: 'En ce deuxième jour également, pendant le banquet, le roi dit à Esther : Quelle est ta demande, reine Esther ? Elle te sera accordée ! Quelle est ta requête ? Jusqu''à la moitié du royaume, elle sera exaucée ! '
  '3':
  - type: note
    content: Voir grâce. –  pour ma demande ou à ma demande  ; cf. 5.7n  ; voir aussi 2.10,20 ; 8.6 ; sur le terme hébreu correspondant à ma propre vie, qu'on pourrait aussi traduire moi-même, cf. Gn 1.20n.
  - type: text
    content: 'La reine Esther répondit : Si j''ai trouvé grâce à tes yeux, ô roi, et si tel est ton bon plaisir, ô roi, qu''on m''accorde ma propre vie pour ma demande, et mon peuple pour ma requête ! '
  '4':
  - type: note
    content: 'vendus 3.13. –  comme esclaves et comme servantes  : autre traduction comme esclaves, hommes et femmes  ; cf. Gn 12.16n. –  l''adversaire (v. 6 ; 3.10+) ne vaut pas (comme en 5.13) …  : traduction incertaine ; on a aussi compris l''adversaire ne saurait compenser le dommage causé au roi (cf. 3.9) ; l''adversaire ne vaut pas qu''on dérange le roi ; cette oppression-là (Si encore nous avions été vendus…) ne vaudrait pas qu''on dérange le roi  ; ou encore l''adversaire ne mesure pas le dommage causé au roi.'
  - type: text
    content: 'Car nous avons été vendus, moi et mon peuple : on veut nous détruire, nous tuer, nous faire disparaître ! Si encore nous avions été vendus comme esclaves et comme servantes, je n''aurais rien dit ; mais l''adversaire ne vaut pas le dommage causé au roi.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'celui dont…  : litt. celui que son cœur a rempli pour agir ainsi.'
  - type: text
    content: 'Le roi Xerxès dit à la reine Esther : Qui est-il, et où est-il celui dont le cœur est rempli de tels desseins ? '
  '6':
  - type: note
    content: L'adversaire v. 4.
  - type: text
    content: 'Esther répondit : L''adversaire, l''ennemi, c''est Haman, ce mauvais ! Alors Haman fut rempli d''effroi en face du roi et de la reine. '
  '7':
  - type: note
    content: 'en fureur 1.12+. –  le banquet 5.6n. –  le jardin du palais 1.5n. –  pour avoir la vie sauve  : litt. pour sa vie. –  le roi avait résolu son malheur  : cf. Pr 20.2,8,26.'
  - type: text
    content: 'Le roi, en fureur, quitta le banquet et sortit dans le jardin du palais. Haman restait là, implorant la reine Esther pour avoir la vie sauve, car il avait bien vu que le roi avait résolu son malheur. '
  '8':
  - type: note
    content: 'la salle  : litt. la maison. –  s''affalait  : litt. tombait (cf. 6.13n), sans doute ici pour lui embrasser les pieds en signe de supplication (cf. 2R 4.27). –  on voila le visage  : cf. 6.12+.'
  - type: text
    content: 'Le roi revenait du jardin du palais à la salle du banquet au moment où Haman s''affalait sur le divan où se trouvait Esther. Le roi s''écria : Et en plus, on fait violence à la reine en ma présence, dans cette maison ! Cette parole à peine sortie de la bouche du roi, on voila le visage de Haman. '
  '9':
  - type: note
    content: 'Harbona 1.10 ; cf. 6.14. –  potence 2.23+ ; 5.14 ; 8.7. –  chez lui  : litt. dans la maison de Haman.'
  - type: text
    content: 'Alors, devant le roi, Harbona, l''un des eunuques, dit : Il y a justement la potence que Haman a dressée chez lui pour Mardochée, qui a parlé pour le bien du roi ; elle est haute de cinquante coudées ! Le roi dit : Qu''on l''y pende ! '
