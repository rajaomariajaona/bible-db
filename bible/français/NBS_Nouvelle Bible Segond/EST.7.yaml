      children:
      - type: text
        text: le roi avait résolu son malheur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Pr 20.2,8,26.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi, en fureur, quitta le banquet et sortit dans le jardin du palais. Haman restait là, implorant la reine Esther pour avoir la vie sauve, car il avait bien vu que le roi avait résolu son malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la salle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'affalait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tombait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 6.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), sans doute ici pour lui embrasser les pieds en signe de supplication (cf. 2R 4.27). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on voila le visage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.12+.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi revenait du jardin du palais à la salle du banquet au moment où Haman s''affalait sur le divan où se trouvait Esther. Le roi s''écria : Et en plus, on fait violence à la reine en ma présence, dans cette maison ! Cette parole à peine sortie de la bouche du roi, on voila le visage de Haman. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Harbona '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.10 ; cf. 6.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'potence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.23+ ; 5.14 ; 8.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la maison de Haman.
    marker-yv: yv-n
  - type: text
    text: 'Alors, devant le roi, Harbona, l''un des eunuques, dit : Il y a justement la potence que Haman a dressée chez lui pour Mardochée, qui a parlé pour le bien du roi ; elle est haute de cinquante coudées ! Le roi dit : Qu''on l''y pende ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Pr 5.22 ; 11.8 ; 26.27 ; 28.10 ; Ec 10.8 ; Mt 7.2.
    marker-yv: yv-n
  - type: text
    text: On pendit Haman à la potence qu'il avait préparée pour Mardochée. Alors la fureur du roi s'apaisa.
