  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les chapitres 8 et 9 se rapportent à la collecte des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Eglises
      - type: text
        text: ' non juives en faveur des chrétiens de Jérusalem (= les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'saints '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du v. 4+) Rm 15.25-26+ ; 1Co 16.1-5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' de Dieu qui s''est manifestée dans les Eglises'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la grâce que Dieu a accordée aux Eglises
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 9.14. – La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Macédoine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), modèle de générosité pour Corinthe 9.1-5 ; 11.7-9 ; Ph 4.10-18.
    marker-yv: yv-n
  - type: text
    text: 'Nous vous faisons connaître, frères, la grâce de Dieu qui s''est manifestée dans les Eglises de Macédoine. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bien qu'ils aient été…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en grande épreuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; terme apparenté v. 8,22) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de détresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; cf. 1Th 1.6 ; 2.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: débordante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec correspondant est apparenté au verbe traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fait abonder
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1.5 ; 7.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: générosité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'simplicité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.11,13 ; Mt 6.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 12.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jc 1.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Bien qu''ils aient été très éprouvés par leur détresse, leur joie débordante et leur profonde pauvreté ont fait abonder la richesse de leur générosité : '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 9.7+.
    marker-yv: yv-n
  - type: text
    text: 'selon leurs possibilités, je l''atteste, et même au-delà de leurs possibilités, de leur plein gré, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la grâce de prendre part…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la grâce et la communion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(au sens concret de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: solidarité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de ce '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ministère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'service '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: )…, cf. 9.13 ; Rm 15.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Co 16.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Hé 13.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',20 ; 9.1.'
    marker-yv: yv-n
  - type: text
    text: 'ils nous ont demandé avec beaucoup d''insistance la grâce de prendre part à ce ministère de solidarité en faveur des saints. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''était plus que nous n''avions espéré : ils se sont donnés eux-mêmes, d''abord au Seigneur, puis à nous, par la volonté de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'encouragé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: exhorté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.13+ ; cf. 8.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à achever
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Rm 15.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cette œuvre de grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cette grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 7,19 ; cf. v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: C'est pourquoi nous avons encouragé Tite à achever chez vous cette œuvre de grâce, comme il l'avait commencée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 1.5 ; cf. Col 2.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: outre l'amour que nous vous portons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss portent, au contraire, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: votre amour pour nous.
    marker-yv: yv-n
  - type: text
    text: 'De même que vous avez tout en abondance, foi, parole, connaissance, empressement de toute sorte, outre l''amour que nous vous portons, abondez aussi dans cette œuvre de grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 7.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'éprouver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2+.
    marker-yv: yv-n
  - type: text
    text: 'Ce n''est pas un ordre que je vous donne ; je dis cela pour éprouver, par l''empressement des autres, la sincérité de votre amour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 6.10 ; Mt 8.20 ; Ph 2.6-8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à cause de vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : quelques mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cause de nous.
    marker-yv: yv-n
  - type: text
    text: 'Car vous connaissez la grâce de notre Seigneur Jésus-Christ : lui qui était riche, il s''est fait pauvre à cause de vous, pour que, vous, par sa pauvreté, vous deveniez riches. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un avis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 7.25,40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dès l''année dernière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: non seulement à faire…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: non seulement à faire, mais encore à vouloir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même dans la suite, cf. Ph 2.13+.'
    marker-yv: yv-n
  - type: text
    text: 'C''est un avis que je donne là-dessus : c''est votre avantage, à vous qui, dès l''année dernière, avez été les premiers non seulement à faire cette collecte, mais encore à la vouloir. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la réalisation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'achever
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au début du v. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon les moyens que vous avez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(procédant) de l''avoir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 12). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'ardeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les bonnes dispositions ; la bonne volonté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 12,19 ; 9.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de votre vouloir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du vouloir.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant donc, achevez de la faire, pour que la réalisation corresponde, selon les moyens que vous avez, à l''ardeur de votre vouloir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'agréée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bien accueillie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Rm 15.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qu'on a
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 12.44/ /.'
    marker-yv: yv-n
  - type: text
    text: 'En effet, quand l''ardeur existe, elle n''est pas agréée en fonction de ce qu''on n''a pas, mais en fonction de ce qu''on a. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la détresse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la gêne ; la privation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.5.'
    marker-yv: yv-n
  - type: text
    text: 'Car il ne s''agit pas de vous exposer à la détresse pour le soulagement des autres, mais de suivre une règle d''égalité : '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la circonstance présente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans le temps présent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Rm 3.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: suppléera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ici le verbe est sous-entendu dans le texte ; cf. 9.12 ; 1Co 16.17 ; Ph 2.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Col 1.24 ; voir aussi Ac 2.45. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur manque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 11.28s ; Rm 15.26 ; Ga 2.10.'
    marker-yv: yv-n
  - type: text
    text: 'dans la circonstance présente, votre abondance suppléera à ce qui leur manque, pour que leur abondance aussi supplée à ce qui vous manque ; de sorte qu''il y aura égalité, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.15'
      - type: usfm
        marker: ord
