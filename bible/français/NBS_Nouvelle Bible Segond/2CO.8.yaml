document_id: 2CO.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Encouragements à mener à bien la collecte
  - type: text
    content: ' '
  - type: note
    content: 'Les chapitres 8 et 9 se rapportent à la collecte des Eglises non juives en faveur des chrétiens de Jérusalem (= les saints du v. 4+) Rm 15.25-26+ ; 1Co 16.1-5. –  la grâce de Dieu qui s''est manifestée dans les Eglises  : autre traduction la grâce que Dieu a accordée aux Eglises  ; cf. 9.14. – La Macédoine (1.16n), modèle de générosité pour Corinthe 9.1-5 ; 11.7-9 ; Ph 4.10-18.'
  - type: text
    content: 'Nous vous faisons connaître, frères, la grâce de Dieu qui s''est manifestée dans les Eglises de Macédoine. '
  '10':
  - type: note
    content: 'un avis 1Co 7.25,40. –  dès l''année dernière 9.2. –  non seulement à faire…  : litt. non seulement à faire, mais encore à vouloir  ; de même dans la suite, cf. Ph 2.13+.'
  - type: text
    content: 'C''est un avis que je donne là-dessus : c''est votre avantage, à vous qui, dès l''année dernière, avez été les premiers non seulement à faire cette collecte, mais encore à la vouloir. '
  '11':
  - type: note
    content: 'la réalisation  : litt. l''achever, comme au début du v. –  selon les moyens que vous avez  : litt. (procédant) de l''avoir (cf. v. 12). –  l''ardeur  : autres traductions les bonnes dispositions ; la bonne volonté v. 12,19 ; 9.2. –  de votre vouloir  : litt. du vouloir.'
  - type: text
    content: 'Maintenant donc, achevez de la faire, pour que la réalisation corresponde, selon les moyens que vous avez, à l''ardeur de votre vouloir. '
  '12':
  - type: note
    content: 'agréée ou bien accueillie, cf. Rm 15.31. –  ce qu''on a  : cf. Mc 12.44/ /.'
  - type: text
    content: 'En effet, quand l''ardeur existe, elle n''est pas agréée en fonction de ce qu''on n''a pas, mais en fonction de ce qu''on a. '
  '13':
  - type: note
    content: 'la détresse  : autres traductions la gêne ; la privation  ; cf. 1.4n  ; 7.5.'
  - type: text
    content: 'Car il ne s''agit pas de vous exposer à la détresse pour le soulagement des autres, mais de suivre une règle d''égalité : '
  '14':
  - type: note
    content: 'dans la circonstance présente  : litt. dans le temps présent, cf. Rm 3.26n. –  suppléera  : ici le verbe est sous-entendu dans le texte ; cf. 9.12 ; 1Co 16.17 ; Ph 2.30n  ; Col 1.24 ; voir aussi Ac 2.45. –  leur manque  : cf. Ac 11.28s ; Rm 15.26 ; Ga 2.10.'
  - type: text
    content: 'dans la circonstance présente, votre abondance suppléera à ce qui leur manque, pour que leur abondance aussi supplée à ce qui vous manque ; de sorte qu''il y aura égalité, '
  '15':
  - type: note
    content: 4.15n  ; Ex 16.18.
  - type: text
    content: 'ainsi qu''il est écrit : '
  - type: text
    content: Celui qui avait beaucoup n'avait rien de trop, et celui qui avait peu ne manquait de rien
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Grâce soit rendue… Rm 7.25+. –  il a mis  : certains mss portent il met . –  cœur Lc 1.66n. –  Tite v. 6 ; 2.13+.'
  - type: text
    content: 'Grâce soit rendue à Dieu de ce qu''il a mis dans le cœur de Tite le même empressement pour vous. '
  '17':
  - type: note
    content: V. 6s.
  - type: text
    content: 'Car il a accueilli notre encouragement avec plus d''empressement que jamais ; c''est de son plein gré qu''il part pour aller chez vous. '
  '18':
  - type: note
    content: 'le frère…  : cf. v. 22n  ; 12.18 ; voir aussi Ac 20.4. –  à cause de…  : litt. dans la bonne nouvelle.'
  - type: text
    content: 'Nous envoyons avec lui le frère dont la louange, à cause de ce qu''il a fait pour la bonne nouvelle, est répandue dans toutes les Eglises ; '
  '19':
  - type: note
    content: 'désigné (cf. Ac 14.23n) par les Eglises  : cf. Ac 6.6 ; 1Co 16.3. –  cette œuvre de grâce v. 6n. –  qui a été confiée…  : cf. v. 4 ; 3.3n. – Voir gloire. –  du Seigneur lui-même  : certains mss portent simplement du Seigneur. –  en témoignage de  : sous-entendu dans le texte. –  ardeur v. 11+.'
  - type: text
    content: 'bien plus, il a été désigné par les Eglises pour être notre compagnon de voyage dans cette œuvre de grâce, qui a été confiée à notre ministère pour la gloire du Seigneur lui-même et en témoignage de notre ardeur. '
  '2':
  - type: note
    content: 'Bien qu''ils aient été…  : litt. en grande épreuve (2.9n  ; terme apparenté v. 8,22) de détresse (1.4n) ; cf. 1Th 1.6 ; 2.14s. –  débordante  : le terme grec correspondant est apparenté au verbe traduit par fait abonder  ; cf. 1.5 ; 7.4. –  générosité  : le même mot est traduit par simplicité en 1.12n  ; 9.11,13 ; Mt 6.22n  ; Rm 12.8n  ; Jc 1.5n.'
  - type: text
    content: 'Bien qu''ils aient été très éprouvés par leur détresse, leur joie débordante et leur profonde pauvreté ont fait abonder la richesse de leur générosité : '
  '20':
  - type: note
    content: V. 4+.
  - type: text
    content: 'Nous ne voulons pas qu''on nous prenne en défaut au sujet de cette abondante collecte confiée à notre ministère ; '
  '21':
  - type: note
    content: Cf. Pr 3.4 ; Rm 12.17.
  - type: text
    content: 'car nous nous préoccupons de ce qui est bien, non seulement aux yeux du Seigneur, mais aussi aux yeux des humains. '
  '22':
  - type: note
    content: 'notre frère  : sans doute un autre que le frère anonyme du v. 18+ ; cf. v. 23. –  éprouvé v. 2+.'
  - type: text
    content: 'Nous envoyons avec eux notre frère, dont nous avons éprouvé l''empressement bien souvent, en bien des occasions, et qui en montre plus encore cette fois à cause de sa grande confiance en vous. '
  '23':
  - type: note
    content: 'Tite v. 17 ; 2.13+. –  compagnon  : terme apparenté au mot habituellement traduit par communion ou solidarité, v. 4n. –  apôtres ou envoyés, cf. Rm 1.1n  ; 16.7 ; Ph 2.25n.'
  - type: text
    content: 'Ainsi, pour ce qui est de Tite, il est mon compagnon et mon collaborateur auprès de vous ; quant à nos frères, ils sont les apôtres des Eglises, la gloire du Christ. '
  '24':
  - type: note
    content: fiers de vous 1.14+ ; cf. 9.3.
  - type: text
    content: Donnez donc, à la face des Eglises, la preuve de votre amour ; prouvez-leur que nous avions raison de nous montrer fiers de vous devant eux.
  '3':
  - type: note
    content: Cf. 9.7+.
  - type: text
    content: 'selon leurs possibilités, je l''atteste, et même au-delà de leurs possibilités, de leur plein gré, '
  '4':
  - type: note
    content: 'la grâce de prendre part…  : litt. la grâce et la communion (au sens concret de solidarité) de ce ministère (ou service 3.3n  ; 5.18n)…, cf. 9.13 ; Rm 15.26n  ; 1Co 16.3n  ; Hé 13.16n. –  des saints v. 1n,20 ; 9.1.'
  - type: text
    content: 'ils nous ont demandé avec beaucoup d''insistance la grâce de prendre part à ce ministère de solidarité en faveur des saints. '
  '5':
  - type: text
    content: 'C''était plus que nous n''avions espéré : ils se sont donnés eux-mêmes, d''abord au Seigneur, puis à nous, par la volonté de Dieu. '
  '6':
  - type: note
    content: 'encouragé (ou exhorté) Tite 2.13+ ; cf. 8.17. –  à achever  : cf. Rm 15.28n. –  cette œuvre de grâce  : litt. cette grâce, de même v. 7,19 ; cf. v. 4n.'
  - type: text
    content: C'est pourquoi nous avons encouragé Tite à achever chez vous cette œuvre de grâce, comme il l'avait commencée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '1Co 1.5 ; cf. Col 2.10. –  outre l''amour que nous vous portons  : certains mss portent, au contraire, votre amour pour nous.'
  - type: text
    content: 'De même que vous avez tout en abondance, foi, parole, connaissance, empressement de toute sorte, outre l''amour que nous vous portons, abondez aussi dans cette œuvre de grâce. '
  '8':
  - type: note
    content: 1Co 7.6. –  éprouver v. 2+.
  - type: text
    content: 'Ce n''est pas un ordre que je vous donne ; je dis cela pour éprouver, par l''empressement des autres, la sincérité de votre amour. '
  '9':
  - type: note
    content: 'Cf. 6.10 ; Mt 8.20 ; Ph 2.6-8. –  à cause de vous  : quelques mss portent à cause de nous.'
  - type: text
    content: 'Car vous connaissez la grâce de notre Seigneur Jésus-Christ : lui qui était riche, il s''est fait pauvre à cause de vous, pour que, vous, par sa pauvreté, vous deveniez riches. '
