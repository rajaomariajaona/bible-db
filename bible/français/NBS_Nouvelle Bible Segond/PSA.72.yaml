document_id: PSA.72,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour que Dieu bénisse le roi
  - type: text
    content: ' '
  - type: note
    content: 'De (3.1n) Salomon 127.1 ; LXX a ici compris pour Salomon (cf. v. 1,20) ; voir aussi 1R 3.12-28 ; 4.20 ; 10.1-22 ; Pr 29.14 ; 1Ch 22.9. –  au roi  : cf. Ps 20 ; 21 ; 28.8s ; 61.7ss ; 84.10 ; 89 ; 132. –  jugements  : le mot hébreu correspondant est souvent traduit par droit  ; cf. 36.7 ; 89.15 ; Es 11.1ss ; 32.1ss ; Jr 23.5ss ; Za 9.9.'
  - type: text
    content: De Salomon.
  - type: text
    content: O Dieu, donne au roi tes jugements,
  - type: text
    content: au fils du roi ta justice !
  '10':
  - type: text
    content: ' '
  - type: note
    content: Tarsis Gn 10.4 ; Es 2.16n  ; 60.9 ; 66.19 ; Jon 1.3n. –  îles Gn 10.5n  ; Es 11.11+. –  Saba (1R 10.1ss ; Es 60.6n) et Seba (Es 43.3n) sont des peuples d'Arabie et d'Afrique (Gn 10.7). –  offrandes / présents , peut-être aussi au sens de tribut  ; cf. 45.13 ; 68.30 ; Lv 1.2n  ; 1R 5.1 ; Mt 2.11 ; Ap 21.26 ; voir Jg 3.15n.
  - type: text
    content: Les rois de Tarsis et des îles apporteront des offrandes,
  - type: text
    content: les rois de Saba et de Seba offriront des présents.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 22.28 ; Sagesse 8.14 : « Je (Salomon) gouvernerai les peuples, les nations me seront soumises. » –  lui seront soumises ou le serviront.'
  - type: text
    content: Tous les rois se prosterneront devant lui,
  - type: text
    content: toutes les nations lui seront soumises.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'V. 4+ ; Jb 5.15 ; 29.12 ; 36.6. –  appelle à l''aide  : le verbe hébreu est habituellement traduit par appeler au secours (cf. 18.7,42). C''est une autre racine hébraïque qui est ici rendue par secours.'
  - type: text
    content: Car il délivrera le déshérité qui appelle à l'aide
  - type: text
    content: et le pauvre qui n'a aucun secours.
  '13':
  - type: text
    content: Il aura pitié du faible et du déshérité,
  - type: text
    content: il sauvera la vie des déshérités ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'il les rédimera ou il assurera leur rédemption  ; autre traduction il les délivrera  ; 19.15+. –  de l''oppression  : le terme hébreu ainsi traduit est aussi rendu, ailleurs, par violence. –  leur sang aura du prix  : cf. 116.15 ; 1S 26.21 ; 2R 1.13s ; certains comprennent ici il ne manquera pas de venger leur sang.'
  - type: text
    content: il les rédimera de l'oppression et de la violence,
  - type: text
    content: et leur sang aura du prix à ses yeux.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''il vive…  : cf. v. 5 ; autre traduction on vivra et on lui donnera…  ; une tradition juive a compris qu''il s''agissait du pauvre délivré par la justice royale ; cf. 1S 10.24 ; 1R 1.25,34,39 ; 2R 11.12 ; 2Ch 23.11. –  l''or de Saba v. 10n  ; 1R 10.1-22 ; cf. Mt 2.11.'
  - type: text
    content: Qu'il vive, et qu'on lui donne de l'or de Saba !
  - type: text
    content: Qu'on prie pour lui sans cesse, qu'on le bénisse constamment !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'abondance  : traduction conjecturale, d''après l''araméen ; certains modifient le texte hébreu traditionnel pour lire de plus en plus de blé  ; l''ensemble du v. est difficile. –  pays et terre traduisent un même mot en hébreu. –  frémira  : le verbe correspondant est habituellement traduit par trembler (18.8 ; 46.4 etc.) ; certains pensent qu''on aurait ici affaire à un homonyme évoquant l''idée d''abondance. –  de la ville…  : passage obscur ; certains modifient le texte hébreu traditionnel pour lire ses épis (ou ses gerbes ) s''épanouiront (ou se multiplieront ) comme l''herbe…'
  - type: text
    content: Il y aura abondance de blé dans le pays,
  - type: text
    content: au sommet des montagnes son fruit frémira comme le Liban,
  - type: text
    content: et de la ville les hommes s'épanouiront comme l'herbe de la terre.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Son nom subsistera  : LXX que son nom soit béni  ; cf. 113.2. –  aussi longtemps que le soleil  : litt. devant le soleil  ; cf. v. 5n. –  se perpétuera  : litt. croîtra  ; autre lecture traditionnelle de l''hébreu il propagera son nom. –  on se bénira  : LXX toutes les tribus de la terre se béniront  ; cf. Gn 12.3n  ; 22.18 ; 28.14 ; voir aussi Lc 1.48.'
  - type: text
    content: Son nom subsistera toujours ;
  - type: text
    content: aussi longtemps que le soleil, son nom se perpétuera.
  - type: text
    content: Par lui on se bénira,
  - type: text
    content: toutes les nations le déclareront heureux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Voir 41.14n  ; Dt 10.21. –  Béni 28.6+. –  des choses étonnantes 136.4.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, le Dieu d''Israël,'
  - type: text
    content: qui, lui seul, fait des choses étonnantes !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Que toute la terre soit…  : autre traduction toute la terre est…  ; Nb 14.21 ; Es 6.3 ; Ha 3.3. – Voir gloire. –  Qu''il en soit ainsi ! Qu''il en soit ainsi ! ou Amen ! Amen ! cf. 41.14+ ; Dt 27.15n.'
  - type: text
    content: Béni soit pour toujours son nom glorieux !
  - type: text
    content: Que toute la terre soit remplie de sa gloire !
  - type: text
    content: Qu'il en soit ainsi ! Qu'il en soit ainsi !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'jugera ou gouvernera  ; cf. 9.9n  ; 122.5 ; 135.14 ; Jg 2.16n  ; 2S 8.15 ; 1R 3.9,16ss ; Ap 19.11. –  tes pauvres 9.13n. –  l''équité  : autre traduction le droit.'
  - type: text
    content: Il jugera ton peuple avec justice
  - type: text
    content: et tes pauvres selon l'équité.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1n  ; 3.1n.
  - type: text
    content: Fin des prières de David, fils de Jessé.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'paix ou prospérité  ; cf. v. 7,16 ; 1R 4.20. –  avec la justice  : selon certains mss de LXX, cette expression est rattachée au v. 4 ; selon d''autres la préposition ( avec ) manque, de sorte que la phrase signifie les collines (porteront) la justice.'
  - type: text
    content: Les montagnes porteront la paix pour le peuple,
  - type: text
    content: et les collines – avec la justice.
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 12s ; Es 11.4 ; Jr 22.15s ; Pr 29.14. –  pauvres / déshérité 12.6+. –  il écrasera l'oppresseur 60.14 ; 108.14.
  - type: text
    content: Il fera droit aux pauvres du peuple,
  - type: text
    content: il sauvera les fils du déshérité
  - type: text
    content: et il écrasera l'oppresseur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'On te craindra  : LXX il subsistera  ; cf. 1R 3.28. –  tant que…  : litt. avec le soleil et devant la lune  ; cf. v. 17 ; 89.37s.'
  - type: text
    content: On te craindra tant que subsistera le soleil,
  - type: text
    content: tant que paraîtra la lune, de génération en génération.
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 8n  ; cf. 2S 23.4 ; Es 32.2 ; Os 6.3.
  - type: text
    content: Il descendra comme une pluie qui tombe sur un terrain fauché,
  - type: text
    content: comme des ondées qui arrosent la terre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le juste  : plusieurs mss hébreux et des versions anciennes ont lu la justice  ; Es 9.7 ; 32.17 ; 45.8. –  la paix (v. 3n) abondera 37.11 ; voir aussi Es 54.13.'
  - type: text
    content: En ses jours, le juste fleurira,
  - type: text
    content: et la paix abondera jusqu'à ce qu'il n'y ait plus de lune.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Il dominera  : le terme hébreu fait assonance avec il descendra (v. 6) ; cf. Ps 2. –  d''une mer à l''autre  : sans doute de la mer Morte à la Méditerranée, le Fleuve , sans autre précision, désignant habituellement l''Euphrate ; cf. 80.12 ; 89.26 ; Gn 15.18 ; Ex 23.31 ; Jos 1.4 ; 1R 5.1,4 ; Za 9.10.'
  - type: text
    content: Il dominera d'une mer à l'autre,
  - type: text
    content: et du Fleuve aux extrémités de la terre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: les habitants du désert Es 13.21n  ; LXX les Ethiopiens (c.-à-d. les Nubiens) ; Syr les îles (v. 10) ; certains modifient le texte hébreu traditionnel pour lire ses ennemis. –  lécheront la poussière Es 49.23 ; Mi 7.17.
  - type: text
    content: Devant lui, les habitants du désert fléchiront le genou,
  - type: text
    content: et ses ennemis lécheront la poussière.
