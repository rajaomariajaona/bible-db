document_id: ZEP.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Parole…  : cf. Jr 1.2 ; Os 1.1 ; Jl 1.1 ; Mi 1.1 ; voir Ez 13n. –  Sophonie , hébreu Tsephanya, YHWH cache ou tient en réserve , nom assez courant (cf. Jr 21.1 ; 52.24 ; Za 6.10,14 ; 1Ch 6.21). –  fils de  : cf. 1S 9.1 ; Jr 36.14 ; Rt 4.18ss. –  Koushi signifie le Nubien (Gn 2.13n) ; cf. Jr 36.14 ; voir aussi So 2.12n  ; 3.10. –  Ezéchias  : il ne s''agit pas forcément (ni même probablement) du roi (2R 18–20). –  Josias ≈ 640-609 av. J.-C. (cf. 1.8 ; 2R 22.1ss ; Jr 1.2).'
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Sophonie, fils de Koushi, fils de Guedalia, fils d''Amaria, fils d''Ezéchias, aux jours de Josias, fils d''Amôn, roi de Juda :'
  - type: heading
    content: Dieu va intervenir contre la terre entière
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'cris / hurlements Jr 25.36 ; cf. Ex 11.6 ; 12.30 ; 1S 4.14 ; Es 15.8 ; Za 11.3. –  porte des Poissons  : probablement au nord-ouest du temple ; cf. Né 3.3. –  la Ville Neuve (litt. la deuxième ), quartier occidental de Jérusalem, voir 2R 22.14n. –  fracas ou désastre  ; cf. Jr 4.6n.'
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: des cris retentiront depuis la porte des Poissons,
  - type: text
    content: des hurlements de la Ville Neuve
  - type: text
    content: et un grand fracas des collines.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Hurlez…  : autre traduction ils hurlent, les habitants… –  Maktesh  : le même mot désigne un rocher creux en Jg 15.19, un mortier en Pr 27.22 ; il s''agit peut-être ici de la dépression entre le palais et la Ville Neuve, c.-à-d. le haut de la vallée du Tyropéon. –  peuple de Canaan , peut-être au sens de peuple de marchands  ; cf. Gn 9.18n  ; Es 23.8n  ; Ez 16.29n  ; 17.4n  ; Os 12.8n  ; Za 14.21n  ; Pr 31.24n  ; Jb 40.30n. –  est perdu  : autre traduction est réduit au silence  ; cf. Jr 47.5. –  chargés d''argent  : autre traduction qui pèsent l''argent , il s''agit de commerçants ou de banquiers.'
  - type: text
    content: Hurlez, habitants du Maktesh !
  - type: text
    content: Car tout le peuple de Canaan est perdu,
  - type: text
    content: tous les hommes chargés d'argent sont retranchés.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Am 9.3. –  avec des lampes  : cf. v. 15ss ; Am 5.18 ; Lc 15.8. –  qui croupissent  : litt. qui se figent , le verbe hébreu correspondant est traduit par se durcir en Ex 15.8 (idée d''inertie) ; pour l''image de la lie , sur laquelle on laissait reposer le vin dans l''espoir qu''il se bonifie, cf. Jr 48.11s ; voir aussi Es 25.6n  ; Ps 75.9. –  Le Seigneur ne fait ni bien ni mal  : cf. Jr 10.5 ; voir aussi Es 5.19 ; Jr 5.12 ; Am 9.10 ; Ml 3.14s ; Ps 10.4,11 ; 14.1 ; 73.11 ; 94.7 ; par contraste, Es 45.7 ; Lm 3.38.'
  - type: text
    content: En ce temps-là,
  - type: text
    content: je fouillerai Jérusalem avec des lampes,
  - type: text
    content: et je ferai rendre des comptes aux hommes
  - type: text
    content: qui croupissent sur leur lie,
  - type: text
    content: 'et qui se disent :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne fait ni bien ni mal.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'saccagés 2R 21.14 ; Es 42.22,24 ; Jr 30.16 ; Ha 2.7. –  ils bâtissent…  : cf. Dt 28.30,39 ; Am 5.11 ; Mi 6.15 ; voir aussi Es 65.21.'
  - type: text
    content: Leurs biens seront saccagés,
  - type: text
    content: et leurs maisons seront dévastées ;
  - type: text
    content: ils bâtissent des maisons,
  - type: text
    content: mais ils ne les habiteront pas ;
  - type: text
    content: ils plantent des vignes,
  - type: text
    content: mais ils n'en boiront pas le vin.
  - type: heading
    content: Le jour du Seigneur
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 7 ; Jl 1.15+ ; 2.1. –  grand Jl 3.4 ; Ml 3.23. –  très vite Ha 2.3. –  pousse des cris amers  : même verbe en Es 42.13 ; cf. Es 13.6s ; Jr 30.5ss.'
  - type: text
    content: 'Il est proche, le grand jour du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il est proche, il arrive très vite ;
  - type: text
    content: 'au bruit du jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: le guerrier pousse des cris amers.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 13.9 ; 22.5 ; Ez 34.12 ; Jl 2.2 ; Am 5.18ss ; Jb 15.23s ; 21.30 ; Rm 2.5 ; Ap 6.17. –  tourmente / ravage  : cf. Jb 30.3n.'
  - type: text
    content: Ce jour est un jour de colère,
  - type: text
    content: un jour de détresse et de désarroi,
  - type: text
    content: un jour de tourmente et de ravage,
  - type: text
    content: un jour de ténèbres et d'obscurité,
  - type: text
    content: un jour de nuée et d'obscurité épaisse,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'trompe / acclamations Jl 2.1 ; cf. Jr 4.19 ; 49.2+ ; Am 1.14 ; 2.2. –  les villes fortes… Es 2.15 ; cf. Nb 13.28 ; Dt 1.28 ; 3.5 ; 9.1 ; Es 25.2 ; 27.10 ; 36.1 ; Ez 36.35 ; Os 8.14. –  tours d''angle  : litt. angles  ; il s''agit sans doute des tours placées aux angles des murailles. Même terme en 3.6 ; 2Ch 26.15 ; voir aussi Jg 20.2n.'
  - type: text
    content: un jour où sonne la trompe, un jour d'acclamations guerrières
  - type: text
    content: contre les villes fortes
  - type: text
    content: et contre les hautes tours d'angle.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 2.9ss ; 24.17s. –  Je mettrai… dans la détresse ou, plus concrètement, j''enserrerai ; je cernerai ; j''assiégerai , même verbe en Dt 28.52 ; 1R 8.37. –  comme des aveugles Dt 28.28s ; cf. Gn 19.11 ; 2R 6.18ss ; Es 59.10 ; Jb 12.25 ; Lm 4.14. –  péché contre le Seigneur Dt 1.41 ; 1S 7.6 ; 2S 12.13 ; 2R 17.7 ; Jr 3.25 ; 8.14 ; 16.10 ; 40.3 ; 44.23. –  leur chair  : terme rare, qui rappelle le mot pour pain ; nourriture  ; le mot arabe correspondant signifie viande  ; d''autres traduisent leur sève  ; cf. Es 5.25 ; Jr 9.21 ; 11.19 ; Ps 79.2s. –  des ordures  : même terme en 1R 14.10 ; un terme proche est traduit par idoles en Lv 26.30n.'
  - type: text
    content: 'Je mettrai les humains dans la détresse :'
  - type: text
    content: ils marcheront comme des aveugles,
  - type: text
    content: 'parce qu''ils ont péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: leur sang sera répandu comme de la poussière,
  - type: text
    content: et leur chair comme des ordures.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ni leur argent… Ez 7.19 ; Pr 11.4. –  le feu de sa passion jalouse (litt. de sa jalousie  ; cf. Na 1.2n) So 3.8 ; cf. Dt 4.24 ; 32.22 ; Ez 36.5 ; 38.19 ; Hé 10.27 ; 12.29. –  toute la terre ou tout le pays  ; cf. v. 2s ; Es 10.23 ; 28.22. –  extermination  : cf. 3.19n  ; Jr 5.18 ; 46.28 ; Ez 11.13 ; 20.17. –  quelle épouvante ! autres traductions et elle sera soudaine ; ce sera un bouleversement.'
  - type: text
    content: Ni leur argent ni leur or ne pourront les délivrer
  - type: text
    content: 'au jour de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: par le feu de sa passion jalouse
  - type: text
    content: toute la terre sera dévorée,
  - type: text
    content: quand il accomplira l'extermination – quelle épouvante ! –
  - type: text
    content: de tous les habitants de la terre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je faucherai  : le texte hébreu traditionnel emploie deux verbes qui font assonance et qui évoquent l''idée de récolte (le verbe correspondant est traduit par réunir en 3.8, par recueillir en 3.18) et celle d''extermination (aussi v. 3) ; cf. Jg 18.25n. –  ce qui est sur la terre Gn 2.5nss ; 6.7 ; 7.23 ; Ex 32.12 ; Dt 6.15 ; 1S 20.15 ; 1R 9.7 ; 13.34 ; Am 9.6.'
  - type: text
    content: Je faucherai tout ce qui est sur la terre,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'les humains et les bêtes… Jr 7.20 ; Ez 38.20 ; Os 4.3 ; cf. Gn 1.26ss ; 9.2 ; Ha 3.17 ; Ps 8.9 ; voir aussi 104.29s. –  les causes de chute…  : sens incertain, d''après LXX (cf. Jr 6.21 ; Mt 13.41). On a aussi compris ce qui fait trébucher les méchants (cf. Rm 1.23) ; ou bien, avec une modification du texte hébreu traditionnel, je ferai trébucher les méchants  ; cf. Es 31.3 ; 40.30 ; Jr 46.6,16 ; voir justice. –  de la terre  : litt. de dessus le sol , cf. Gn 2.5n.'
  - type: text
    content: je faucherai les humains et les bêtes,
  - type: text
    content: je faucherai les oiseaux du ciel et les poissons de la mer,
  - type: text
    content: les causes de chute avec les méchants,
  - type: text
    content: et je retrancherai les humains de la terre
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Dieu va intervenir contre Juda et Jérusalem
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'J''étendrai ma main 2.13 ; Ex 3.20 ; Es 5.25+ ; Jr 6.12 ; 15.6 ; 51.25 ; Ez 6.14. –  je retrancherai… le nom Za 13.2+. –  ce lieu  : il s''agit peut-être du temple de Jérusalem. –  ce qui reste du Baal  : cf. 2R 18.3s ; 23.4ss ; Es 14.22 ; LXX les noms du Baal . –  desservants  : le terme hébreu correspondant désigne exclusivement dans la Bible les prêtres des dieux étrangers ; ici le texte porte, litt. des desservants avec les prêtres  ; cf. 2R 23.5n  ; Os 10.5n.'
  - type: text
    content: J'étendrai ma main sur Juda
  - type: text
    content: et sur tous les habitants de Jérusalem ;
  - type: text
    content: je retrancherai de ce lieu ce qui reste du Baal,
  - type: text
    content: le nom des desservants – les prêtres,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 21.3ss,21s ; voir aussi Ex 20.5. –  en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. Sur ce culte des astres ( l''armée du ciel ), voir 2R 23.12 ; Jr 19.13 ; 32.39 ; 48.36 ; voir aussi Dt 4.19 ; 17.3 ; 2R 17.16 ; Jr 7.18 ; 8.2 ; 44.17ss ; Ez 8.10 ; Am 5.26. –  Milkom  : hébreu malkam (= leur roi ) ; en modifiant légèrement la vocalisation des consonnes du texte hébreu écrit on lit Milkom , nom du dieu des Ammonites (1R 11.5,7,33 ; 2R 23.13) ; de fait la majeure partie des versions anciennes ont compris le texte comme se référant à une divinité ; cf. Es 57.9n.'
  - type: text
    content: ceux qui se prosternent sur les toits en terrasse devant l'armée du ciel,
  - type: text
    content: 'ceux qui se prosternent en se liant par serment au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH)'
  - type: text
    content: tout en prêtant serment par Milkom.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 1.4 ; 9.12 ; 59.13. –  cherchent 2.3 ; Ps 9.11+. –  consultent  : cf. 1R 22.5,7ns ; Ez 20.3+ ; Am 5.4.'
  - type: text
    content: 'Ceux qui se dérobent au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'ceux qui ne cherchent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui ne le consultent pas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Silence Jg 3.19 ; Am 6.10 ; Ha 2.20 ; Za 2.17 ; Né 8.11 ; Ap 8.1. –  le jour du Seigneur … v. 14ss ; 3.16ss ; Jl 1.15+. –  le sacrifice  : cf. Es 63.1ss ; Jr 46.10 ; Ez 39.17s ; Ap 19.17s ; sur l''image, qui suggère à la fois carnage et festin, cf. 1S 9.12s ; 16.3ss ; 20.29. –  consacré ou sanctifié  ; cf. Ex 19.10s ; 1Ch 15.12 ; voir saint. –  ceux qu''il a convoqués ou ses invités  ; sur l''ambiguïté de la formule, cf. Gn 22.7 ; Jr 12.3.'
  - type: text
    content: 'Silence devant le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  !'
  - type: text
    content: 'Car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche :'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a préparé le sacrifice,'
  - type: text
    content: il a consacré ceux qu'il a convoqués.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'je ferai rendre des comptes  : cf. v. 9,12 ; 2.7 ; 3.7 ; voir Jr 6.15n. –  aux fils du roi LXX à la maison du roi , c.-à-d. la famille royale (comparer v. 1 et 2R 22.1). –  vêtements étrangers , associés au culte et au mode de vie des étrangers.'
  - type: text
    content: 'Or, au jour du sacrifice du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je ferai rendre des comptes aux princes et aux fils du roi,
  - type: text
    content: à tous ceux qui portent des vêtements étrangers.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'saute par-dessus le seuil  : il s''agit peut-être d''un rite particulier (cf. 1S 5.4s) ; cependant on pourrait aussi comprendre monte sur l''estrade , auquel cas il pourrait être question de l''estrade sur laquelle était placé le trône du roi ou l''image du dieu (cf. 1R 10.18ss). –  de violence… Am 3.10n  ; Mi 6.12.'
  - type: text
    content: En ce jour-là, je ferai rendre des comptes à quiconque saute par-dessus le seuil,
  - type: text
    content: à ceux qui remplissent de violence et de tromperie la maison de leur Seigneur.
