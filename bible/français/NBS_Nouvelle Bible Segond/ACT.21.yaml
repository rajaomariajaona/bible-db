document_id: ACT.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul se rend à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'nous 16.10n. –  arrachés  : cf. Lc 22.41n. –  Cos / Rhodes  : îles de la mer Egée, entre l''Asie Mineure et la Crète. –  Patara  : port de la côte méridionale de l''Asie Mineure ; le texte occidental ajoute une autre escale à Myra ou Myre (27.5), autre port plus à l''est.'
  - type: text
    content: 'Après nous être arrachés à eux, nous avons fait voile droit sur Cos, puis, le lendemain, sur Rhodes et, de là, sur Patara. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'plusieurs jours  : autre traduction bien des jours . –  prophète… Agabos  : cf. 11.28.'
  - type: text
    content: 'Comme nous demeurions là depuis plusieurs jours, un prophète nommé Agabos est descendu de Judée. '
  '11':
  - type: note
    content: 'il a pris la ceinture…  : cf. Es 20.2 ; Jr 13.1+ss ; voir aussi Jn 21.18. –  ce que dit l''Esprit saint  : cf. 8.29+ ; 20.23+. – Voir Juifs. –  le lieront  : cf. 21.33 ; Mc 15.1. –  le livrer aux non-Juifs 28.17 ; cf. Mc 10.33 ; Lc 18.32 ; 24.7.'
  - type: text
    content: 'Venant vers nous, il a pris la ceinture de Paul et s''est lié les pieds et les mains, puis il a dit : Voici ce que dit l''Esprit saint : L''homme à qui cette ceinture appartient, les Juifs le lieront ainsi à Jérusalem pour le livrer aux non-Juifs. '
  '12':
  - type: note
    content: V. 4.
  - type: text
    content: 'Après avoir entendu cela, nous et ceux de l''endroit, nous l''avons supplié de ne pas monter à Jérusalem. '
  '13':
  - type: note
    content: 'Qu''avez-vous…  : cf. Mt 16.22s. – Voir cœur. –  je suis prêt… 20.24 ; cf. Rm 15.30s. –  à être lié  : autre traduction à être arrêté. –  pour le nom… 5.41+.'
  - type: text
    content: 'Alors Paul a répondu : Qu''avez-vous à pleurer et à me briser le cœur ? Moi, je suis prêt, non seulement à être lié, mais encore à mourir à Jérusalem pour le nom du Seigneur Jésus ! '
  '14':
  - type: note
    content: 'nous n''avons plus insisté…  : litt. nous nous sommes calmés (même verbe en 11.18), après avoir dit…  ; cf. Lc 22.42/ /.'
  - type: text
    content: 'Comme il ne se laissait pas persuader, nous n''avons plus insisté et nous avons dit : Que la volonté du Seigneur se fasse !'
  - type: heading
    content: A Jérusalem, Paul rend visite à Jacques
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.22n  ; Lc 9.51/ /.
  - type: text
    content: 'Après ces jours-là, nous avons fait nos préparatifs et nous sommes montés à Jérusalem. '
  '16':
  - type: note
    content: Le texte occidental situe la demeure de Mnason dans un certain village, c.-à-d. entre Césarée (v. 8) et Jérusalem (v. 17) ; cf. 23.32. –  disciple 6.1+.
  - type: text
    content: 'Quelques disciples sont aussi venus avec nous de Césarée pour nous conduire là où nous devions loger, chez un certain Mnason, de Chypre, qui était disciple depuis longtemps. '
  '17':
  - type: note
    content: Cf. v. 22. –  les frères 1.15+.
  - type: text
    content: A notre arrivée à Jérusalem, les frères nous ont accueillis avec joie.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 15.2. –  Jacques 12.17+. –  anciens 11.30+.
  - type: text
    content: 'Le lendemain, Paul s''est rendu avec nous chez Jacques ; tous les anciens étaient venus aussi. '
  '19':
  - type: note
    content: Cf. 15.3s,12.
  - type: text
    content: Il les a salués et s'est mis à raconter en détail ce que Dieu avait fait, par son ministère, parmi les non-Juifs.
  '2':
  - type: note
    content: 'Phénicie 11.19+. –  gagné le large  : verbe habituellement traduit par faire voile.'
  - type: text
    content: 'Ayant trouvé un bateau qui faisait la traversée vers la Phénicie, nous avons embarqué et nous avons gagné le large. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'glorifiaient Dieu  : cf. 11.18. –  dizaines de milliers  : cf. 2.41+ ; 4.4 ; 6.7. –  passion jalouse pour la loi  : cf. 11.2 ; 15.1,5,21 ; 22.3 ; Rm 10.2n  ; Ga 5.1.'
  - type: text
    content: 'Après l''avoir entendu, ils glorifiaient Dieu. Cependant ils lui ont dit : Tu vois, frère, combien de dizaines de milliers de Juifs sont devenus croyants ; tous ont une passion jalouse pour la loi. '
  '21':
  - type: note
    content: 'Cf. v. 28+ ; 6.11-14 ; voir aussi 24.13s ; 25.8 ; Rm 2.25-29 ; 3.21-26 ; 10.4 ; 15.31 ; Ga 3.21-25. –  par ton enseignement…  : litt. tu enseignes à tous les Juifs… l''abandon (le terme grec correspondant a donné notre mot apostasie) de Moïse  ; cf. 15.38+ ; 2Th 2.3n  ; 1Tm 4.1n. –  les nations ou les non-Juifs 10.45n. –  ne plus circoncire  : cf. 16.3 ; Ga 2.3. –  ne plus suivre les coutumes 28.17.'
  - type: text
    content: 'Or on leur a fait croire que, par ton enseignement, tu incites tous les Juifs qui sont parmi les nations à se détourner de Moïse, en leur disant de ne plus circoncire les enfants et de ne plus suivre les coutumes. '
  '22':
  - type: note
    content: 'Ils vont sûrement…  : plusieurs mss occidentaux portent ici  : la multitude se rassemblera sûrement, car on va apprendre…  ; cf. v. 17.'
  - type: text
    content: 'Que faire ? Ils vont sûrement apprendre que tu es venu. '
  '23':
  - type: note
    content: 'un vœu  : cf. 18.18 ; Nb 6.1-21 ; 30.2-16.'
  - type: text
    content: 'Fais donc ce que nous te disons. Il y a parmi nous quatre hommes qui ont fait un vœu ; '
  '24':
  - type: note
    content: 'purifie-toi avec eux  : cf. Jn 11.55. –  charge-toi de la dépense  : c''était, selon Flavius Josèphe, l''une des œuvres considérées comme méritoires par le judaïsme du Ier s. apr. J.-C. –  tu te conduis en pratiquant de la loi  : autre traduction tu observes (litt. tu gardes, même verbe au v. 25) fidèlement la loi.'
  - type: text
    content: 'prends-les, purifie-toi avec eux et charge-toi de la dépense, pour qu''ils se rasent la tête. Alors tous sauront qu''il n''y a rien de vrai dans ce qu''on leur a fait croire sur ton compte, mais que, toi aussi, tu te conduis en pratiquant de la loi. '
  '25':
  - type: note
    content: 'nous avons…  : texte occidental ils (c.-à-d. les Juifs devenus chrétiens) n''ont rien à dire contre toi, car nous avons jugé bon de leur prescrire (aux chrétiens non juifs) de ne rien pratiquer de semblable, mais qu''ils se gardent…  : cf. 15.19-20n,28s. – Voir sang.'
  - type: text
    content: Quant aux non-Juifs qui sont devenus croyants, nous, nous avons jugé bon de leur prescrire qu'ils se gardent des viandes sacrifiées aux idoles, du sang, des animaux étouffés et de l'inconduite sexuelle.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 23+ ; 16.3 ; 1Co 9.20. – Voir temple . –  quand…  : litt. l''accomplissement des jours de la purification jusqu''à ce que l''offrande soit apportée pour chacun d''eux  ; cf. v. 27 ; 24.17 ; Nb 6.9s ; 19.12. –  offrande  : voir sacrifices.'
  - type: text
    content: Le lendemain, Paul prit ces hommes, se purifia avec eux et entra dans le temple pour annoncer quand les jours de leur purification seraient achevés et quand l'offrande serait présentée pour chacun d'eux.
  - type: heading
    content: Paul est arrêté dans le temple
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Juifs d''Asie  : cf. 16.6n  ; 24.19. –  mirent la main sur lui  : cf. 4.3n.'
  - type: text
    content: 'Vers la fin des sept jours, les Juifs d''Asie, qui l''avaient vu dans le temple, soulevèrent toute la foule et mirent la main sur lui, '
  '28':
  - type: note
    content: 'Hommes d''Israël 2.22n. –  contre le peuple 28.17. –  contre la loi 18.13+ ; cf. 21.21. –  contre ce lieu  : cf. 6.13+. –  dans le temple  : c.-à-d., non pas dans la cour des non-Juifs, mais dans la partie délimitée par le soreg, une balustrade qu''aucun non-Juif ne devait franchir sous peine de mort (voir illustration) ; cf. 24.6 ; Ez 40.5 ; 44.7 ; Ep 2.14+. –  souillé ou profané, cf. 10.15n  ; voir pur, impur et saint.'
  - type: text
    content: 'en criant : Hommes d''Israël, à l''aide ! C''est l''homme qui enseigne à tous et partout contre le peuple, contre la loi et contre ce lieu ! Il a même introduit des Grecs dans le temple et souillé ce lieu sacré ! '
  '29':
  - type: note
    content: Trophime l'Ephésien 20.4+.
  - type: text
    content: 'Car auparavant ils avaient vu Trophime l''Ephésien avec lui dans la ville, et ils pensaient que Paul l''avait introduit dans le temple. '
  '3':
  - type: note
    content: Syrie 20.3+. –  Tyr v. 7.
  - type: text
    content: 'Arrivés en vue de Chypre, nous l''avons laissée à gauche et nous avons navigué vers la Syrie, pour débarquer à Tyr où le bateau devait décharger sa cargaison. '
  '30':
  - type: note
    content: 'La ville entière…  : cf. Mt 21.10. –  Ils se saisirent… 26.21. –  hors du temple  : cf. v. 28n  ; 2Ch 24.20-22 ; Mt 23.35.'
  - type: text
    content: La ville entière fut en effervescence, et le peuple accourut de toutes parts. Ils se saisirent de Paul et le traînèrent hors du temple, dont les portes furent aussitôt fermées.
  '31':
  - type: text
    content: ' '
  - type: note
    content: '23.27. –  tribun militaire  : le terme grec, traduit dans la suite par tribun , signifie étymologiquement chef de mille (hommes) . Il désigne ici le commandant d''une cohorte (10.1 ; Mc 15.16n), c.-à-d. d''une unité d''environ 600 soldats habituellement ; ailleurs le même terme peut s''appliquer d''une façon plus générale à des chefs militaires de haut rang, ainsi Mc 6.21 ; Ap 6.15 ; 19.18 ; voir aussi Jn 18.12n. – A la fin du v. un témoin du texte occidental ajoute (conclusion du rapport au tribun militaire ?) vois donc qu''ils ne fassent pas d''émeute.'
  - type: text
    content: 'Comme ils cherchaient à le tuer, la rumeur parvint au tribun militaire de la cohorte que la confusion régnait dans tout Jérusalem. '
  '32':
  - type: note
    content: 'centurions 10.1+. –  descendit (de la forteresse, v. 34n). –  en courant  : le texte grec précise vers eux.'
  - type: text
    content: 'Celui-ci prit immédiatement des soldats et des centurions et descendit en courant. A la vue du tribun et des soldats, ils cessèrent de frapper Paul. '
  '33':
  - type: note
    content: le lier v. 11,13n  ; 20.23+. –  deux chaînes 12.6.
  - type: text
    content: 'Alors le tribun s''approcha, se saisit de lui et donna l''ordre de le lier de deux chaînes, puis il demanda qui il était et ce qu''il avait fait. '
  '34':
  - type: note
    content: 'Cf. 19.32. –  rien savoir de certain  : cf. 22.30 ; 23.28 ; 25.26. –  de l''agitation  : autre traduction du vacarme. –  le mener…  : cf. 22.24 ; 23.10. –  dans la forteresse Antonia, construite par Hérode le Grand à l''angle nord-ouest de l''enceinte du temple ; c''est là que la garnison romaine était casernée ; cf. 23.32.'
  - type: text
    content: 'Dans la foule, les uns criaient une chose, les autres une autre ; ne pouvant rien savoir de certain à cause de l''agitation, il ordonna de le mener dans la forteresse. '
  '35':
  - type: note
    content: 'Lorsque Paul…  : litt. lorsqu''il…'
  - type: text
    content: 'Lorsque Paul fut sur les marches, les soldats durent le porter à cause de la violence de la foule ; '
  '36':
  - type: note
    content: 'A mort  : litt. enlève-le, c.-à-d. exécute-le  ; même verbe 8.33n  ; 22.22n  ; Lc 23.18 ; Jn 19.15n.'
  - type: text
    content: 'car la multitude du peuple le suivait en criant : A mort !'
  - type: heading
    content: Paul présente sa défense
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Tu sais…  : autre traduction tu connais le grec ?'
  - type: text
    content: 'Au moment où on allait le faire entrer dans la forteresse, Paul dit au tribun militaire : M''est-il permis de te dire quelque chose ? Il répondit : Tu sais parler le grec ? '
  '38':
  - type: note
    content: 'cet Egyptien…  : allusion au meneur d''une révolte juive relatée par Flavius Josèphe. –  une troupe…  : litt. les quatre mille sicaires (du latin sica, qui signifie poignard). Flavius Josèphe appelle sicaires le parti fondé en 6 apr. J.-C. par Judas le Galiléen (cf. 5.36s), parti qui combattra Rome jusqu''à la fin de la guerre juive de 66-73 ; voir aussi Mt 10.4n et zélotes.'
  - type: text
    content: 'Tu n''es donc pas, toi, cet Egyptien qui dernièrement a suscité une révolte et emmené au désert une troupe de quatre mille partisans armés ? '
  '39':
  - type: note
    content: je suis un Juif Ph 3.5. –  Tarse (9.11n) de Cilicie 6.9 ; 22.3 ; 23.34. Le texte occidental omet la précision un citoyen d'une ville qui n'est pas sans renom, formulation qui rappelle un vers d'Euripide (Ve s. av. J.-C.).
  - type: text
    content: 'Paul répondit : Moi, je suis un Juif de Tarse de Cilicie, un citoyen d''une ville qui n''est pas sans renom. Permets-moi, je te prie, de parler au peuple. '
  '4':
  - type: note
    content: 'disciples 6.1+ ; cf. 11.19s ; Lc 6.17/ /. –  sept jours 20.6+. –  Poussés par l''Esprit  : litt. par l''Esprit 8.29+ ; 11.28 ; cf. 20.22s ; 21.12.'
  - type: text
    content: 'Ayant trouvé les disciples, nous avons demeuré là sept jours. Poussés par l''Esprit, ils disaient à Paul de ne pas monter à Jérusalem. '
  '40':
  - type: note
    content: 'signe de la main 12.17+. –  en langue hébraïque  : outre l''hébreu, cette expression peut aussi désigner l''araméen, la langue populaire des Juifs au Ier s. (à côté du grec, également très utilisé y compris en Judée) ; cf. 22.2 ; 26.14.'
  - type: text
    content: 'Le tribun le lui permit. Paul, debout sur les marches, fit au peuple un signe de la main. Il se fit un grand silence. Alors il s''adressa à eux en langue hébraïque :'
  '5':
  - type: note
    content: 'de notre escale  : sous-entendu dans le texte. –  accompagnés  : cf. 15.3n. –  à genoux… 20.36.'
  - type: text
    content: 'Mais quand le temps de notre escale est arrivé à son terme, nous sommes partis ; accompagnés de tous, avec femmes et enfants, nous sommes sortis de la ville et nous nous sommes mis à genoux sur le rivage pour prier. '
  '6':
  - type: note
    content: 'après avoir pris congé  : litt. après avoir pris congé les uns des autres  ; le verbe grec est dérivé de celui qui est traduit par saluer au v. 7.'
  - type: text
    content: Puis, après avoir pris congé, nous sommes montés sur le bateau ; eux, ils sont retournés chez eux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'achevant  : autre traduction continuant . –  Ptolémaïs  : nom grec d''Akko (Jg 1.31) ou Saint-Jean d''Acre.'
  - type: text
    content: 'Quant à nous, achevant notre navigation, nous sommes allés de Tyr à Ptolémaïs où nous avons salué les frères, demeurant un jour chez eux. '
  '8':
  - type: note
    content: 'Césarée 8.40n. –  Philippe 6.5+. –  l''annonciateur de la bonne nouvelle  : le terme correspondant a donné notre mot évangéliste  ; cf. 8.4,40 ; il revient en Ep 4.11 ; 2Tm 4.5n. –  nous avons demeuré chez lui  : d''après une reconstitution, cette précision aurait été absente du texte occidental.'
  - type: text
    content: 'Partis le lendemain, nous sommes arrivés à Césarée. Nous sommes allés dans la maison de Philippe, l''annonciateur de la bonne nouvelle, qui était l''un des Sept, et nous avons demeuré chez lui. '
  '9':
  - type: note
    content: Cf. 2.17 ; 11.27+ ; 1Co 11.5 ; 14.33-35 ; 1Tm 2.11s.
  - type: text
    content: Il avait quatre filles vierges qui parlaient en prophétesses.
