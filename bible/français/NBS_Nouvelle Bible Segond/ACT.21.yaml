      - type: text
        text: 'Cos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rhodes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : îles de la mer Egée, entre l''Asie Mineure et la Crète. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Patara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : port de la côte méridionale de l''Asie Mineure ; le texte occidental ajoute une autre escale à Myra ou Myre (27.5), autre port plus à l''est.'
    marker-yv: yv-n
  - type: text
    text: 'Après nous être arrachés à eux, nous avons fait voile droit sur Cos, puis, le lendemain, sur Rhodes et, de là, sur Patara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Phénicie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gagné le large
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : verbe habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faire voile.
    marker-yv: yv-n
  - type: text
    text: 'Ayant trouvé un bateau qui faisait la traversée vers la Phénicie, nous avons embarqué et nous avons gagné le large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Syrie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tyr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7.
    marker-yv: yv-n
  - type: text
    text: 'Arrivés en vue de Chypre, nous l''avons laissée à gauche et nous avons navigué vers la Syrie, pour débarquer à Tyr où le bateau devait décharger sa cargaison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'disciples '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.1+ ; cf. 11.19s ; Lc 6.17/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sept jours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Poussés par l'Esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par l''Esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.29+ ; 11.28 ; cf. 20.22s ; 21.12.
    marker-yv: yv-n
  - type: text
    text: 'Ayant trouvé les disciples, nous avons demeuré là sept jours. Poussés par l''Esprit, ils disaient à Paul de ne pas monter à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de notre escale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: accompagnés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à genoux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 20.36.
    marker-yv: yv-n
  - type: text
    text: 'Mais quand le temps de notre escale est arrivé à son terme, nous sommes partis ; accompagnés de tous, avec femmes et enfants, nous sommes sortis de la ville et nous nous sommes mis à genoux sur le rivage pour prier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: après avoir pris congé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: après avoir pris congé les uns des autres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe grec est dérivé de celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'saluer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 7.
    marker-yv: yv-n
  - type: text
    text: Puis, après avoir pris congé, nous sommes montés sur le bateau ; eux, ils sont retournés chez eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: achevant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: continuant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ptolémaïs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : nom grec d''Akko (Jg 1.31) ou Saint-Jean d''Acre.'
    marker-yv: yv-n
  - type: text
    text: 'Quant à nous, achevant notre navigation, nous sommes allés de Tyr à Ptolémaïs où nous avons salué les frères, demeurant un jour chez eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Césarée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.40'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Philippe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'annonciateur de la bonne nouvelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: évangéliste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.4,40 ; il revient en Ep 4.11 ; 2Tm 4.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous avons demeuré chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après une reconstitution, cette précision aurait été absente du texte occidental.'
    marker-yv: yv-n
  - type: text
    text: 'Partis le lendemain, nous sommes arrivés à Césarée. Nous sommes allés dans la maison de Philippe, l''annonciateur de la bonne nouvelle, qui était l''un des Sept, et nous avons demeuré chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2.17 ; 11.27+ ; 1Co 11.5 ; 14.33-35 ; 1Tm 2.11s.
    marker-yv: yv-n
  - type: text
    text: Il avait quatre filles vierges qui parlaient en prophétesses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plusieurs jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bien des jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: … Agabos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 11.28.'
    marker-yv: yv-n
  - type: text
    text: 'Comme nous demeurions là depuis plusieurs jours, un prophète nommé Agabos est descendu de Judée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il a pris la ceinture…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 20.2 ; Jr 13.1+ss ; voir aussi Jn 21.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce que dit '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
      - type: text
        text: ' '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.29+ ; 20.23+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le lieront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 21.33 ; Mc 15.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le livrer aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 28.17 ; cf. Mc 10.33 ; Lc 18.32 ; 24.7.
    marker-yv: yv-n
  - type: text
    text: 'Venant vers nous, il a pris la ceinture de Paul et s''est lié les pieds et les mains, puis il a dit : Voici ce que dit l''Esprit saint : L''homme à qui cette ceinture appartient, les Juifs le lieront ainsi à Jérusalem pour le livrer aux non-Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 4.
    marker-yv: yv-n
  - type: text
    text: 'Après avoir entendu cela, nous et ceux de l''endroit, nous l''avons supplié de ne pas monter à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qu'avez-vous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 16.22s. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je suis prêt… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.24 ; cf. Rm 15.30s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à être lié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à être arrêté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.41+.
    marker-yv: yv-n
  - type: text
    text: 'Alors Paul a répondu : Qu''avez-vous à pleurer et à me briser le cœur ? Moi, je suis prêt, non seulement à être lié, mais encore à mourir à Jérusalem pour le nom du Seigneur Jésus ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous n'avons plus insisté…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nous nous sommes calmés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe en 11.18), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: après avoir dit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lc 22.42/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Comme il ne se laissait pas persuader, nous n''avons plus insisté et nous avons dit : Que la volonté du Seigneur se fasse !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Jérusalem, Paul rend visite à Jacques
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 18.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 9.51/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Après ces jours-là, nous avons fait nos préparatifs et nous sommes montés à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte occidental situe la demeure de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mnason '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans un certain village
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. entre '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Césarée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 8) et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jérusalem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 17) ; cf. 23.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'disciple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.1+.
    marker-yv: yv-n
  - type: text
    text: 'Quelques disciples sont aussi venus avec nous de Césarée pour nous conduire là où nous devions loger, chez un certain Mnason, de Chypre, qui était disciple depuis longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les frères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.15+.
    marker-yv: yv-n
  - type: text
    text: A notre arrivée à Jérusalem, les frères nous ont accueillis avec joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
