      - type: text
        text: ') : montagne non identifiée. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yabnéel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
