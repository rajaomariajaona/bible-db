        text: ') : ville du Bas-Pays, à 25 km à l''ouest de Jérusalem ; cf. 21.16 ; 1S 6.9-20 ; 1R 4.9 ; 2R 14.11-13 ; 1Ch 6.44 ; 2Ch 25.21-23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Timna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à 4 km au sud d''Aïn-Shams (= Eïn-Shémesh) ; cf. Jg 14.1-6.'
    marker-yv: yv-n
  - type: text
    text: 'De Baala la frontière tournait à l''ouest vers le mont de Séir, passait sur le flanc du mont des Forêts au nord (c''est-à-dire Kesalôn), descendait à Beth-Shémesh et passait par Timna. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
