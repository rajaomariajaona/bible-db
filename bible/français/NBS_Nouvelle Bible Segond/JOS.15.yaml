      - type: text
        text: Jamnia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), au sud de Jaffa. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la Méditerranée.'
    marker-yv: yv-n
  - type: text
    text: 'La frontière aboutissait sur le flanc d''Eqrôn, au nord ; puis la frontière s''incurvait vers Shikkerôn, passait par le mont de la Baala et aboutissait à Yabnéel ; puis la frontière débouchait sur la mer. '
  - type: usfm
