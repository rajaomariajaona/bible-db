document_id: JOS.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire attribué à Juda
  - type: text
    content: ' '
  - type: note
    content: 'lot 14.2n. –  désert de Tsîn ( Epine ) : entre la mer Morte et la mer Rouge, cf. Nb 13.21 ; 20.1 ; 33.36 ; 34.3s ; Dt 32.51.'
  - type: text
    content: 'Le lot pour la tribu des fils de Juda, clan par clan, s''étendait vers la frontière d''Edom, au désert de Tsîn, au midi, à l''extrême sud. '
  '10':
  - type: note
    content: 'Séir  : à distinguer de Séir, en Edom. Localisation incertaine. –  sur le flanc v. 8n. –  mont des Forêts (hébreu Ye‘arim) : sans doute à l''ouest de Qiriath-Yéarim (9.17n). –  Kesalôn  : actuellement Kesla, à 18 km à l''ouest de Jérusalem. –  Beth-Shémesh (Maison du Soleil) : ville du Bas-Pays, à 25 km à l''ouest de Jérusalem ; cf. 21.16 ; 1S 6.9-20 ; 1R 4.9 ; 2R 14.11-13 ; 1Ch 6.44 ; 2Ch 25.21-23. –  Timna  : à 4 km au sud d''Aïn-Shams (= Eïn-Shémesh) ; cf. Jg 14.1-6.'
  - type: text
    content: 'De Baala la frontière tournait à l''ouest vers le mont de Séir, passait sur le flanc du mont des Forêts au nord (c''est-à-dire Kesalôn), descendait à Beth-Shémesh et passait par Timna. '
  '11':
  - type: note
    content: 'sur le flanc v. 8n. –  Eqrôn 13.3n. –  Shikkerôn  : localisation incertaine ; peut-être à 12 km au sud-ouest de Ramleh. –  la Baala (la Dame) : montagne non identifiée. –  Yabnéel (El [Dieu] a bâti), à identifier à Yabné (2Ch 26.6), connue plus tard sous le nom grec Iamnia (ou Jamnia), au sud de Jaffa. –  la mer  : la Méditerranée.'
  - type: text
    content: 'La frontière aboutissait sur le flanc d''Eqrôn, au nord ; puis la frontière s''incurvait vers Shikkerôn, passait par le mont de la Baala et aboutissait à Yabnéel ; puis la frontière débouchait sur la mer. '
  '12':
  - type: note
    content: 'ouest  : litt. de la mer. –  la grande mer 1.4n.'
  - type: text
    content: La frontière ouest était la grande mer (son rivage). Telles furent de tous côtés les frontières des fils de Juda, clan par clan.
  - type: heading
    content: Jg 1.10-15
  '13':
  - type: text
    content: ' '
  - type: note
    content: '14.14s. –  conformément à l''ordre…  : litt. à la bouche de YHWH pour Josué  ; voir noms divins.'
  - type: text
    content: 'On donna à Caleb, fils de Yephounné, une part au milieu des fils de Juda, conformément à l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné à Josué : Qiriath-Arba (c''est-à-dire Hébron) – Arba était le père d''Anaq. '
  '14':
  - type: note
    content: 'Anaqites  : litt. fils de l''Anaq / enfants de l''Anaq.'
  - type: text
    content: 'Caleb en déposséda les trois Anaqites : Shéshaï, Ahimân et Talmaï, les Anaqites. '
  '15':
  - type: text
    content: 'De là il attaqua les habitants de Debir : l''ancien nom de Debir était Qiriath-Sépher. '
  '16':
  - type: text
    content: 'Caleb dit : Je donnerai ma fille Aksa pour femme à celui qui battra Qiriath-Sépher et la prendra. '
  '17':
  - type: note
    content: 'Otniel  : le premier des Juges, d''après Jg 3.7-11. Il est Qenizzite (= fils de Qenaz) comme Caleb, cf. 14.6n.'
  - type: text
    content: 'Otniel, fils de Qenaz, frère de Caleb, la prit ; Caleb lui donna pour femme sa fille Aksa. '
  '18':
  - type: note
    content: 'elle l''incita…  : LXX elle tint conseil avec lui en disant : Je vais demander un champ à mon père ; elle cria de son âne…  ; cf. Jg 1.14n.'
  - type: text
    content: 'A son arrivée, elle l''incita à demander un champ à son père. Elle sauta de son âne, et Caleb lui dit : Qu''est-ce que tu as ? '
  '19':
  - type: note
    content: 'une faveur  : litt. une bénédiction, cf. Jg 1.15n. –  sud  : hébreu néguev, qui est aussi le nom du désert au sud du pays d''Israël. –  réservoirs ou étangs, fontaines, sources…  : au sud-ouest d''Hébron.'
  - type: text
    content: 'Elle répondit : Accorde-moi une faveur, car tu m''as donné une terre du sud ; donne-moi aussi des réservoirs d''eau. Alors il lui donna les réservoirs d''en haut et les réservoirs d''en bas.'
  '2':
  - type: note
    content: 'la langue  : peut-être une presqu''île qui s''avance dans la mer du Sel (mer Morte, cf. 3.16+) sur la côte sud-est. A distinguer de la langue du v. 5 qui est au nord, à l''embouchure du Jourdain. –  qui fait face au Néguev  : autre traduction qui donne sur le sud  ; cf. Ez 8.3.'
  - type: text
    content: 'Leur frontière sud partait de l''extrémité de la mer du Sel, de la langue qui fait face au Néguev. '
  '20':
  - type: text
    content: 'Voilà le patrimoine de la tribu des fils de Juda, clan par clan. '
  '21':
  - type: note
    content: 'Les villes…  : beaucoup de villes et localités des chap. 15 à 19 sont difficiles à situer. –  du territoire  : sous-entendu dans le texte.'
  - type: text
    content: 'Les villes situées à l''extrémité du territoire des fils de Juda, vers la frontière d''Edom, dans le Néguev, étaient Qabtséel, Eder, Yagour, '
  '22':
  - type: text
    content: 'Kina, Dimona, Adada, '
  '23':
  - type: note
    content: Qédesh, en Juda, est peut-être à identifier à Qadesh-Barnéa. –  Hatsor, Yitnân ou, selon différents mss de versions anciennes, Hatsor-Yitnân ou Hatsar-Yitnân (cf. v. 27s ; voir aussi v. 32n).
  - type: text
    content: 'Qédesh, Hatsor, Yitnân ; '
  '24':
  - type: text
    content: 'Ziph, Télem, Béaloth, '
  '25':
  - type: text
    content: 'Hatsor-Hadatta, Qerioth-Hetsrôn (c''est-à-dire Hatsor) ; '
  '26':
  - type: text
    content: 'Amam, Shema, Molada, '
  '27':
  - type: text
    content: 'Hatsar-Gadda, Heshmôn, Beth-Péleth, '
  '28':
  - type: note
    content: 'Bersabée  : seule cette ville est bien connue ; c''est la capitale du Néguev.'
  - type: text
    content: 'Hatsar-Shoual, Bersabée, Biziotia ; '
  '29':
  - type: text
    content: 'Baala, Iyim, Atsem, '
  '3':
  - type: note
    content: 'la montée d''Aqrabbim (des Scorpions) se trouve au sud-ouest de la mer Morte, cf. Nb 34.4n. –  Hetsrôn (Enclos  ; cf. le Hatsar-Addar de Nb 34.4) ; peut-être à 10 km au nord de Qadesh-Barnéa. –  Qarqaa  : localité inconnue.'
  - type: text
    content: 'Elle aboutissait au sud de la montée d''Aqrabbim, passait par Tsîn et montait au sud de Qadesh-Barnéa ; de là elle passait par Hetsrôn, montait vers Addar et tournait à Qarqaa ; '
  '30':
  - type: text
    content: 'Eltolad, Kesil, Horma, '
  '31':
  - type: text
    content: 'Tsiqlag, Madmanna, Sansanna, '
  '32':
  - type: note
    content: 'Aïn et Rimmôn, selon le texte hébreu traditionnel ; Eïn-Rimmôn, selon LXX, Vg, Syr (cf. 19.7n  ; Né 11.29 ; 1Ch 4.32n). –  vingt-neuf  : la liste du texte hébreu traditionnel contient 36 noms (un peu moins si l''on regroupe certains termes, comme ici Aïn et Rimmôn  ; voir aussi v. 23n) ; certaines villes mentionnées ici sont attribuées à Siméon au chap. 19. –  les villages…  : litt. leurs villages, de même dans la suite (cf. 13.23,28).'
  - type: text
    content: 'Lebaoth, Shilhim, Aïn et Rimmôn. Total des villes : vingt-neuf, et les villages qui en dépendent.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Bas-Pays  : hébreu shephéla.'
  - type: text
    content: 'Dans le Bas-Pays : Eshtaol, Tsoréa, Ashna, '
  '34':
  - type: text
    content: 'Zanoah, Eïn-Gannim, Tappouah, Eïnam ; '
  '35':
  - type: text
    content: 'Yarmouth, Adoullam, Soko, Azéqa, '
  '36':
  - type: text
    content: 'Shaaraïm, Aditaïm, Guedéra et Guedérotaïm : quatorze villes, et les villages qui en dépendent. '
  '37':
  - type: text
    content: 'Tsenân, Hadasha, Migdal-Gad, '
  '38':
  - type: text
    content: 'Diléân, Mitspé, Yoqtéel ; '
  '39':
  - type: text
    content: 'Lakish, Botsqath, Eglôn, '
  '4':
  - type: note
    content: 'Atsmôn (Forte) : on l''a identifiée à une oasis à l''ouest de Qadesh-Barnéa. –  oued d''Egypte v. 47 ; Nb 34.4-5n  ; 1R 8.65n  ; 2R 24.7 ; Es 27.12 ; 2Ch 7.8. –  la mer  : la Méditerranée. –  telle sera…  : cf. Nb 34.3.'
  - type: text
    content: 'elle passait ensuite par Atsmôn et aboutissait à l''oued d''Egypte ; la frontière débouchait sur la mer – telle sera votre frontière au sud. '
  '40':
  - type: text
    content: 'Kabbôn, Lahmas, Kitlish, '
  '41':
  - type: text
    content: 'Guedéroth, Beth-Dagôn, Naama et Maqqéda : seize villes, et les villages qui en dépendent.'
  '42':
  - type: text
    content: 'Libna, Eter, Ashân, '
  '43':
  - type: note
    content: 'Netsib  : probablement à 12 km au nord-ouest d''Hébron. Les villes des v. 43s se trouvent entre Jérusalem et Hébron.'
  - type: text
    content: 'Yiphtah, Ashna, Netsib, '
  '44':
  - type: text
    content: 'Qéila, Akzib et Marésha : neuf villes, et les villages qui en dépendent. '
  '45':
  - type: note
    content: 'Eqrôn 13.3n. Les villes des v. 45-47 se trouvent en Philistie. –  les localités…  : litt. leurs filles (de même dans la suite) et ses villages (cf. v. 32n).'
  - type: text
    content: 'Eqrôn, les localités et les villages qui en dépendent ; '
  '46':
  - type: text
    content: 'depuis Eqrôn et à l''ouest, toutes les villes près d''Ashdod et les villages qui en dépendent ; '
  '47':
  - type: note
    content: 'oued d''Egypte  : cf. v. 4n. –  la grande mer  : autre lecture traditionnelle la mer de la frontière (même mot que celui qui est traduit par rivage) ; cf. 1.4n.'
  - type: text
    content: Ashdod, les localités et les villages qui en dépendent ; Gaza, les localités et les villages qui en dépendent, jusqu'à l'oued d'Egypte, à la grande mer (son rivage).
  '48':
  - type: text
    content: 'Dans la montagne : Shamir, Yattir, Soko, '
  '49':
  - type: text
    content: 'Danna, Qiriath-Sanna (c''est-à-dire Debir), '
  '5':
  - type: note
    content: 'l''embouchure  : litt. l''extrémité.'
  - type: text
    content: 'A l''est, la frontière était la mer du Sel, jusqu''à l''embouchure du Jourdain. Du côté nord, la frontière partait de la langue de mer qui est à l''embouchure du Jourdain. '
  '50':
  - type: text
    content: 'Anab, Eshtemo, Anim, '
  '51':
  - type: text
    content: 'Goshen, Holôn et Guilo : onze villes, et les villages qui en dépendent. '
  '52':
  - type: text
    content: 'Arab, Douma, Eshéân, '
  '53':
  - type: text
    content: 'Yanoum, Beth-Tappouah, Aphéqa, '
  '54':
  - type: text
    content: 'Houmeta, Qiriath-Arba (c''est-à-dire Hébron) et Tsior : neuf villes, et les villages qui en dépendent.'
  '55':
  - type: text
    content: 'Maôn, Carmel, Ziph, Youtta, '
  '56':
  - type: text
    content: 'Jizréel, Yoqdéam, Zanoah ; '
  '57':
  - type: note
    content: 'Caïn  : même nom qu''en Gn 4.1n, apparenté aux Caïnites ou Qénites.'
  - type: text
    content: 'Caïn, Guibéa et Timna ; dix villes, et les villages qui en dépendent. '
  '58':
  - type: note
    content: Beth-Tsour Né 3.16n.
  - type: text
    content: 'Halhoul, Beth-Tsour, Guedor, '
  '59':
  - type: note
    content: 'et les villages…  : LXX introduit ici une série de villages, dont Bethléem (ou Beth-Léhem).'
  - type: text
    content: 'Maarath, Beth-Anoth et Elteqôn : six villes, et les villages qui en dépendent. '
  '6':
  - type: note
    content: 'Beth-Hogla (Maison de la Perdrix) 18.19,21 ; on la situe à environ 7 km au sud-est de Jéricho. –  Beth-Araba  : au sud du Guilgal, près de Jéricho. –  la pierre de Bohân 18.17 ; probablement à 9 km au sud de l''actuelle Jéricho.'
  - type: text
    content: 'Puis la frontière montait vers Beth-Hogla et passait au nord de Beth-Araba ; puis la frontière s''élevait jusqu''à la pierre de Bohân, fils de Ruben ; '
  '60':
  - type: text
    content: 'Qiriath-Baal (c''est-à-dire Qiriath-Yéarim) et Rabba : deux villes, et les villages qui en dépendent.'
  '61':
  - type: text
    content: 'Dans le désert : Beth-Araba, Middîn, Sekaka, '
  '62':
  - type: note
    content: 'Ir-Mélah  : Ville du Sel. –  Eïn-Guédi 1S 24.1s ; Ez 47.10 ; Ct 1.14 ; 2Ch 20.2.'
  - type: text
    content: 'Nibshân, Ir-Mélah et Eïn-Guédi : six villes, et les villages qui en dépendent. '
  '63':
  - type: note
    content: 'Jérusalem  : la ville sera conquise par David vers l''an 1000 av. J.-C. Même après la conquête de Jérusalem, les Jébusites (3.10n) vécurent côte à côte avec les Israélites. –  jusqu''à ce jour 4.9n.'
  - type: text
    content: Les fils de Juda ne purent pas déposséder les Jébusites qui habitaient Jérusalem ; les Jébusites habitent à Jérusalem avec les fils de Juda jusqu'à ce jour.
  '7':
  - type: note
    content: 'Debir  : à distinguer du Debir de 10.38ns ; localisation incertaine. Cf. 15.49. –  la vallée d''Akor 7.24n. –  Guilgal  : appelée Gueliloth en 18.17 (même racine verbale hébraïque galal, qui signifie rouler), à distinguer du Guilgal près de Jéricho ; cf. 4.19n. –  la montée d''Adoummim (montée des Rouges, aujourd''hui montée du Sang) : à environ 20 km de Jérusalem, au sud de l''oued qui descend jusqu''à Jéricho. –  Eïn-Shémesh (Source du soleil) : peut-être à 4 km de Jérusalem, sur la route de Jéricho. –  Eïn-Roguel (Source du foulon) : au sud-est de Jérusalem, à la jonction des vallées de Hinnom (v. 8) et du Cédron.'
  - type: text
    content: 'puis la frontière montait à Debir, par la vallée d''Akor, et se dirigeait vers le nord, du côté du Guilgal, qui est en face de la montée d''Adoummim, au sud de l''oued ; puis la frontière passait près des eaux d''Eïn-Shémesh et débouchait sur Eïn-Roguel. '
  '8':
  - type: note
    content: 'la vallée du Fils de Hinnom  : hébreu gé ben Hinnom, dont on a fait géhenne (Mt 5.22n,29s ; 10.28 ; 18.9 ; 23.15,33 ; Mc 9.44,46s ; Lc 12.5 ; Jc 3.6), célèbre par les sacrifices « au Molek » qui y étaient pratiqués (Lv 18.21n  ; cf. 2R 23.10 ; Jr 7.31s ; 19.2,6 ; 32.35). La vallée entourait l''ancienne Jérusalem par l''ouest et le sud et rejoignait celle du Cédron à l''est. –  sur le flanc  : litt. à l''épaule, de même aux v. 10s. La colline méridionale de Jérusalem ou Jébus (3.10n  ; Jg 19.10s), sur laquelle le temple de Salomon sera bâti, formait une sorte de promontoire. –  la vallée des Rephaïtes (c.-à-d. des Géants ou des Ombres, cf. Es 14.9n) : au sud-ouest de Jérusalem (cf. 12.4n).'
  - type: text
    content: 'La frontière montait de là par la vallée du Fils de Hinnom, sur le flanc sud de Jébus (c''est-à-dire Jérusalem) ; puis la frontière s''élevait jusqu''au sommet de la montagne qui est devant la vallée de Hinnom, à l''ouest, et à l''extrémité de la vallée des Rephaïtes, au nord. '
  '9':
  - type: note
    content: 'Nephtoah  : probablement à environ 5 km au nord-ouest de Jérusalem. – Le mont Ephrôn n''est pas identifié, mais on connaît une ville de ce nom en 2Ch 13.19n. –  Qiriath-Yéarim  : cf. 9.17n.'
  - type: text
    content: 'Du sommet de la montagne la frontière s''incurvait vers la source des eaux de Nephtoah, continuait vers les villes du mont Ephrôn ; puis la frontière s''incurvait à Baala (c''est-à-dire Qiriath-Yéarim). '
