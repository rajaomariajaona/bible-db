  - type: text
    text: 'On donna à Caleb, fils de Yephounné, une part au milieu des fils de Juda, conformément à l''ordre que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait donné à Josué : Qiriath-Arba (c''est-à-dire Hébron) – Arba était le père d''Anaq. '
