document_id: EZK.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu fait d'Ezéchiel un guetteur
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Esd 9.6. –  c'est à cause d'eux… 4.17n  ; 24.23.
  - type: text
    content: 'Toi, humain, dis à la maison d''Israël : Vous dites : « Nos transgressions et nos péchés sont sur nous, et c''est à cause d''eux que nous pourrissons ; comment pourrions-nous vivre ? » '
  '11':
  - type: note
    content: Par ma vie 5.11n. –  ce que je désire… 18.23+. –  Revenez… ou détournez-vous…  ; cf. 18.32 ; Jr 35.15 ; Za 1.4.
  - type: text
    content: 'Dis-leur : Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – ce que je désire, ce n''est pas que le méchant meure, c''est qu''il revienne de sa voie méchante et qu''il vive ! Revenez, revenez de vos voies mauvaises. Pourquoi devriez-vous mourir, maison d''Israël ?'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.24-27. –  aux gens… v. 2n. –  le jour où il…  : litt. au jour de sa transgression / de son péché  ; cf. v. 18. –  par sa justice  : litt. par elle.'
  - type: text
    content: 'Toi, humain, dis aux gens de ton peuple : La justice du juste ne le sauvera pas le jour où il commettra une transgression ; la méchanceté du méchant ne le fera pas trébucher le jour où il reviendra de sa méchanceté ; quant au juste, il ne pourra pas vivre par sa justice le jour où il péchera. '
  '13':
  - type: note
    content: 3.20+ ; 18.24. –  se fie à sa justice ou met sa confiance dans sa justice  ; cf. Lc 18.9.
  - type: text
    content: 'Lorsque je dis du juste : « Il vivra », s''il se fie à sa justice et agit injustement, on ne se souviendra plus de tout ce qu''il a fait pour la justice ; parce qu''il a agi injustement, il mourra. '
  '14':
  - type: note
    content: '3.18. –  l''équité (ou le droit) et la justice  : cf. 18.5.'
  - type: text
    content: 'Lorsque je dis au méchant : « Tu mourras », s''il revient de son péché et agit selon l''équité et la justice, '
  '15':
  - type: note
    content: 'gage 18.7+. –  suit… vie  : litt. marche dans les prescriptions de la vie  ; cf. 18.9+,21s ; 20.11+ ; voir aussi Dt 32.47.'
  - type: text
    content: 'si le méchant rend le gage, restitue l''objet de ses spoliations, suit les prescriptions qui donnent la vie, sans agir injustement, il vivra, il ne mourra pas. '
  '16':
  - type: text
    content: On ne se souviendra, contre lui, d'aucun des péchés qu'il a commis ; il a agi selon l'équité et la justice, il vivra.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 18.25-29. –  Les gens… v. 2n.
  - type: text
    content: 'Les gens de ton peuple disent : « La voie du Seigneur n''est pas au point. » C''est leur voie qui n''est pas au point. '
  '18':
  - type: note
    content: V. 12s.
  - type: text
    content: 'Si le juste revient de sa justice et agit injustement, il en mourra. '
  '19':
  - type: note
    content: 'à cause de cela  : litt. à cause d''elles (équité et justice) ; 18.5,21.'
  - type: text
    content: 'Si le méchant revient de sa méchanceté et agit selon l''équité et la justice, il vivra à cause de cela. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'aux gens  : litt. aux fils , de même aux v. 12,17,30 ; 3.11 ; 37.18. –  l''épée 11.8+. –  guetteur 3.17+.'
  - type: text
    content: 'Humain, parle aux gens de ton peuple ! Tu leur diras : Lorsque je fais venir l''épée contre un pays, et que le peuple du pays prend dans ses rangs un homme et le fait guetteur, '
  '20':
  - type: note
    content: V. 17+ ; 18.30.
  - type: text
    content: 'Vous dites : La voie du Seigneur n''est pas au point ! Je vous jugerai, chacun selon ses voies, maison d''Israël !'
  - type: heading
    content: Israël sera dévasté
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'la douzième année  : 586/5 av. J.-C. ; quelques mss portent la onzième année (587/6) ; cf. 1.2n  ; 26.1n  ; 2R 25.2-9 ; Jr 39.1-9 ; 52.5-7. –  le rescapé 24.25ss. –  prise  : litt. frappée.'
  - type: text
    content: 'C''est la douzième année, le cinquième jour du dixième mois de notre exil qu''arriva vers moi le rescapé de Jérusalem qui me dit : « La ville a été prise ! » '
  '22':
  - type: note
    content: 'La main… sur moi 1.3+. –  lorsque celui-ci…  : litt. il ouvrit ma bouche jusqu''à ce qu''il arrive vers (ou sur) moi le matin. –  plus muet 3.24-26+ ; cf. 24.27.'
  - type: text
    content: 'La main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait été sur moi le soir avant l''arrivée du rescapé ; lorsque celui-ci arriva auprès de moi le matin, il m''avait ouvert la bouche. Ma bouche s''était ouverte : je n''étais plus muet.'
  '23':
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui habitent ces ruines 2R 25.12. –  Abraham… Gn 12.1-7 ; Dt 26.5 ; cf. Es 51.2 ; Mt 3.9/ /. –  en possession  : cf. v. 26 ; 11.15+.'
  - type: text
    content: 'Humain, ceux qui habitent ces ruines sur la terre d''Israël disent : « Abraham était seul, et il a pris possession du pays ; nous, nous sommes une multitude, et le pays nous a été donné en possession ! » '
  '25':
  - type: note
    content: 'Vous mangez…  : LXX omet la suite jusqu''au début du v. 27. –  au-dessus du sang  : cf. Lv 19.26n  ; 1S 14.32n. –  posséderiez  : le verbe correspondant est souvent traduit par prendre possession de. Cf. 22.3s.'
  - type: text
    content: 'A cause de cela, dis-leur : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Vous mangez au-dessus du sang, vous levez les yeux vers vos idoles, vous répandez du sang. Et vous posséderiez le pays ! '
  '26':
  - type: note
    content: 'votre épée  : cf. Jr 41. –  vous commettez  : la forme verbale suppose un sujet féminin ; peut-être la proposition vise-t-elle en particulier les femmes, par opposition à ce qui suit, à moins qu''elle ne vise le peuple en général comme en 16.50. –  des abominations  : autre traduction une abomination. –  souille  : cf. 18.6+. –  vous posséderiez v. 24+.'
  - type: text
    content: 'Vous vous appuyez sur votre épée, vous commettez des abominations, chacun de vous souille la femme de son prochain. Et vous posséderiez le pays ! '
  '27':
  - type: note
    content: 'à coup sûr 5.11n. –  en rase campagne  : litt. à la (sur)face de la campagne (ou des champs) ; cf. 5.12+ ; 14.15-21 ; 39.4s. –  endroits escarpés ou forteresses, même terme 19.9 ; cf. 1S 22.4n.'
  - type: text
    content: 'Voici ce que tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Par ma vie, à coup sûr, ceux qui sont parmi les ruines tomberont par l''épée, celui qui est en rase campagne, je le donnerai à manger aux animaux, et ceux qui sont dans les endroits escarpés et dans les grottes mourront par la peste. '
  '28':
  - type: note
    content: dévasté 6.14+.
  - type: text
    content: 'Je ferai du pays un lieu complètement dévasté ; sa force orgueilleuse prendra fin, les montagnes d''Israël seront dévastées, personne n''y passera. '
  '29':
  - type: note
    content: 5.13+.
  - type: text
    content: 'Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je ferai du pays un lieu complètement dévasté, à cause de toutes les abominations qu''ils ont commises.'
  '3':
  - type: note
    content: 'sonne de la trompe  : cf. 7.14+ ; Am 3.6s.'
  - type: text
    content: 'si cet homme voit venir l''épée contre le pays, sonne de la trompe et avertit le peuple, '
  '30':
  - type: text
    content: ' '
  - type: note
    content: les gens de ton peuple v. 2n.
  - type: text
    content: 'Quant à toi, humain, les gens de ton peuple parlent de toi le long des murs et aux portes des maisons ; ils se disent l''un à l''autre, chacun à son frère : « Venez écouter, je vous prie, quelle est la parole qui provient du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » '
  '31':
  - type: note
    content: 'en foule  : litt. comme le flux d''un peuple. –  des paroles aimables  : le terme correspondant est apparenté à celui qui est traduit par passion (23.5 etc.), de même au v. 32. LXX le mensonge  ; cf. Es 29.13. –  l''avidité…  : litt. leur cœur va après (ou derrière) leur avidité (ou leur spoliation), comme en 22.12s,27.'
  - type: text
    content: 'Ils se rendent en foule auprès de toi, et mon peuple s''assied devant toi. Ils écoutent tes paroles, mais ils ne les mettent pas en pratique, car ils agissent avec des paroles aimables à la bouche, alors que l''avidité mène leur cœur. '
  '32':
  - type: note
    content: 'aimable chanson ou chanson d''amour  ; cf. v. 31n. –  ils ne les mettent pas en pratique  : cf. Mt 7.24-26 ; Lc 8.21 ; Jc 1.22-25.'
  - type: text
    content: 'Te voilà pour eux comme une aimable chanson : musique agréable, belle mélodie. Ils écoutent tes paroles, mais ils ne les mettent pas en pratique. '
  '33':
  - type: note
    content: Cf. 2.5 ; Dt 18.21s ; Es 55.10s ; Jr 28.9 ; Jn 13.19. – Voir prophète.
  - type: text
    content: Quand ces choses arriveront – et elles arrivent ! – ils sauront qu'il y avait un prophète au milieu d'eux.
  '4':
  - type: note
    content: 'son sang sera sur sa tête  : cf. 3.18s ; 9.10n  ; 16.7 ; 18.13 ; Ac 18.6.'
  - type: text
    content: 'et si celui qui entend le son de la trompe ne se laisse pas avertir, et que l''épée vienne l''enlever, son sang sera sur sa tête. '
  '5':
  - type: note
    content: sauvera sa vie ou se sauvera  ; cf. Gn 1.20n.
  - type: text
    content: 'Il a entendu le son de la trompe, et il ne s''est pas laissé avertir : son sang sera sur lui. Celui qui se laisse avertir sauvera sa vie. '
  '6':
  - type: note
    content: 'quelqu''un  : autre traduction une vie  ; cf. Gn 1.20n. –  dans sa faute… v. 8 ; 3.18n. Voir péché.'
  - type: text
    content: Si le guetteur voit venir l'épée et ne sonne pas de la trompe, si le peuple n'est pas averti, et que l'épée vienne enlever quelqu'un, celui-ci sera enlevé dans sa faute ; mais son sang, je le réclamerai au guetteur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 3.17+.
  - type: text
    content: 'Toi, humain, je te nomme guetteur pour la maison d''Israël. Tu écouteras la parole de ma bouche et tu les avertiras de ma part. '
  '8':
  - type: text
    content: 'Quand je dirai au méchant : « Méchant, tu mourras ! », si tu ne parles pas pour avertir le méchant au sujet de sa voie, ce méchant mourra dans sa faute ; mais son sang, je te le réclamerai. '
  '9':
  - type: text
    content: Mais si, toi, tu avertis le méchant au sujet de sa voie, et qu'il ne revienne pas de sa voie, il mourra dans sa faute, et toi, tu sauveras ta vie.
  - type: heading
    content: Le méchant qui revient à Dieu aura la vie sauve
