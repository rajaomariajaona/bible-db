  - type: text
    text: 'Ils se rendent en foule auprès de toi, et mon peuple s''assied devant toi. Ils écoutent tes paroles, mais ils ne les mettent pas en pratique, car ils agissent avec des paroles aimables à la bouche, alors que l''avidité mène leur cœur. '
