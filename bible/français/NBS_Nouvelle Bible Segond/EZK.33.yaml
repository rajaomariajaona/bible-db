document_id: EZK.33
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu fait d'Ezéchiel un guetteur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même aux v. 12,17,30 ; 3.11 ; 37.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.8+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'guetteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.17+.
    marker-yv: yv-n
  - type: text
    text: 'Humain, parle aux gens de ton peuple ! Tu leur diras : Lorsque je fais venir l''épée contre un pays, et que le peuple du pays prend dans ses rangs un homme et le fait guetteur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sonne de la trompe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.14+ ; Am 3.6s.'
    marker-yv: yv-n
  - type: text
    text: 'si cet homme voit venir l''épée contre le pays, sonne de la trompe et avertit le peuple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' sera sur sa tête'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.18s ; 9.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 16.7 ; 18.13 ; Ac 18.6.'
    marker-yv: yv-n
  - type: text
    text: 'et si celui qui entend le son de la trompe ne se laisse pas avertir, et que l''épée vienne l''enlever, son sang sera sur sa tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sauvera sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se sauvera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il a entendu le son de la trompe, et il ne s''est pas laissé avertir : son sang sera sur lui. Celui qui se laisse avertir sauvera sa vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quelqu'un
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans sa faute… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8 ; 3.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Si le guetteur voit venir l'épée et ne sonne pas de la trompe, si le peuple n'est pas averti, et que l'épée vienne enlever quelqu'un, celui-ci sera enlevé dans sa faute ; mais son sang, je le réclamerai au guetteur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.17+.
    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, je te nomme guetteur pour la maison d''Israël. Tu écouteras la parole de ma bouche et tu les avertiras de ma part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand je dirai au méchant : « Méchant, tu mourras ! », si tu ne parles pas pour avertir le méchant au sujet de sa voie, ce méchant mourra dans sa faute ; mais son sang, je te le réclamerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais si, toi, tu avertis le méchant au sujet de sa voie, et qu'il ne revienne pas de sa voie, il mourra dans sa faute, et toi, tu sauveras ta vie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le méchant qui revient à Dieu aura la vie sauve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Esd 9.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'c''est à cause d''eux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 24.23.'
    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, dis à la maison d''Israël : Vous dites : « Nos transgressions et nos péchés sont sur nous, et c''est à cause d''eux que nous pourrissons ; comment pourrions-nous vivre ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par ma vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce que je désire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Revenez… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: détournez-vous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 18.32 ; Jr 35.15 ; Za 1.4.'
    marker-yv: yv-n
  - type: text
    text: 'Dis-leur : Par ma vie, – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  – ce que je désire, ce n''est pas que le méchant meure, c''est qu''il revienne de sa voie méchante et qu''il vive ! Revenez, revenez de vos voies mauvaises. Pourquoi devriez-vous mourir, maison d''Israël ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 18.24-27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux gens… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le jour où il…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au jour de sa transgression / de son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. v. 18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par elle.
    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, dis aux gens de ton peuple : La justice du juste ne le sauvera pas le jour où il commettra une transgression ; la méchanceté du méchant ne le fera pas trébucher le jour où il reviendra de sa méchanceté ; quant au juste, il ne pourra pas vivre par sa justice le jour où il péchera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.20+ ; 18.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se fie à sa justice '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: met sa confiance dans sa justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lc 18.9.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque je dis du juste : « Il vivra », s''il se fie à sa justice et agit injustement, on ne se souviendra plus de tout ce qu''il a fait pour la justice ; parce qu''il a agi injustement, il mourra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''équité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et la justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.5.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque je dis au méchant : « Tu mourras », s''il revient de son péché et agit selon l''équité et la justice, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: suit… vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marche dans les prescriptions de la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 18.9+,21s ; 20.11+ ; voir aussi Dt 32.47.'
    marker-yv: yv-n
  - type: text
    text: 'si le méchant rend le gage, restitue l''objet de ses spoliations, suit les prescriptions qui donnent la vie, sans agir injustement, il vivra, il ne mourra pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: On ne se souviendra, contre lui, d'aucun des péchés qu'il a commis ; il a agi selon l'équité et la justice, il vivra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.25-29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les gens… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les gens de ton peuple disent : « La voie du Seigneur n''est pas au point. » C''est leur voie qui n''est pas au point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 12s.
    marker-yv: yv-n
  - type: text
    text: 'Si le juste revient de sa justice et agit injustement, il en mourra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à cause de cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à cause d''elles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'équité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; 18.5,21.
    marker-yv: yv-n
  - type: text
    text: 'Si le méchant revient de sa méchanceté et agit selon l''équité et la justice, il vivra à cause de cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 17+ ; 18.30.
    marker-yv: yv-n
  - type: text
    text: 'Vous dites : La voie du Seigneur n''est pas au point ! Je vous jugerai, chacun selon ses voies, maison d''Israël !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël sera dévasté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la douzième année
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : 586/5 av. J.-C. ; quelques mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la onzième année '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (587/6) ; cf. 1.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 26.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 25.2-9 ; Jr 39.1-9 ; 52.5-7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le rescapé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.25ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappée.
    marker-yv: yv-n
  - type: text
    text: 'C''est la douzième année, le cinquième jour du dixième mois de notre exil qu''arriva vers moi le rescapé de Jérusalem qui me dit : « La ville a été prise ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La main… sur moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.3+. –  '
    - type: usfm
      marker: fq
      children:
