  - type: text
    text: 'Quant à toi, humain, les gens de ton peuple parlent de toi le long des murs et aux portes des maisons ; ils se disent l''un à l''autre, chacun à son frère : « Venez écouter, je vous prie, quelle est la parole qui provient du '
