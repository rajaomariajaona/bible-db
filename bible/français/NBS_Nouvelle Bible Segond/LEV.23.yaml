    - type: text
      text: 'Ce jour même, vous proclamerez une convocation ; il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile. C''est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d''habitation. '
