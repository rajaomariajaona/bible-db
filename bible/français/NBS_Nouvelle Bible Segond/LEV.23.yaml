    - type: text
      text: Vous ne mangerez ni pain, ni grain rôti, ni blé nouveau jusqu'au jour même où vous apporterez le présent de votre Dieu. C'est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d'habitation.
  - type: usfm
