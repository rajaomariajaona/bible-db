document_id: LEV.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Calendrier des fêtes d'Israël
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'Quand vous serez entrés 14.34+. – Voir prêtre. –  prémices  : même mot hébreu qu''en 2.12n  ; cf. Ex 23.19 ; 34.26 ; Dt 26.1-11.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Quand vous serez entrés dans le pays que je vous donne et que vous y ferez la moisson, vous apporterez au prêtre une gerbe, les prémices de votre moisson. '
  '11':
  - type: note
    content: 'Il dédiera… 7.30n. –  le lendemain du sabbat  : soit le lendemain du sabbat hebdomadaire (c.-à-d. le dimanche) de la semaine des pains sans levain, soit le lendemain de la Pâque elle-même ; LXX le lendemain du premier (jour).'
  - type: text
    content: 'Il dédiera rituellement la gerbe devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour que vous soyez agréés ; le prêtre la dédiera rituellement le lendemain du sabbat. '
  '12':
  - type: note
    content: holocauste 1.3n  ; voir sacrifices.
  - type: text
    content: 'Le jour où vous dédierez rituellement la gerbe, vous offrirez en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un agneau d''un an sans défaut, '
  '13':
  - type: note
    content: deux dixièmes d'épha (voir mesures), soit un peu plus de 4 l. –  un quart de hîn, un peu moins d'un litre.
  - type: text
    content: 'avec son offrande végétale, de deux dixièmes de fleur de farine pétrie à l''huile, en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme une odeur agréable, et sa libation d''un quart de hîn de vin. '
  '14':
  - type: note
    content: 'Cf. 19.23-25. –  prescription  : voir loi. – Voir générations.'
  - type: text
    content: Vous ne mangerez ni pain, ni grain rôti, ni blé nouveau jusqu'au jour même où vous apporterez le présent de votre Dieu. C'est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d'habitation.
  - type: heading
    content: La fête des Semaines
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'semaines  : litt. sabbats.'
  - type: text
    content: 'Depuis le lendemain du sabbat, depuis le jour où vous apporterez la gerbe qu''on dédie rituellement, vous compterez sept semaines entières. '
  '16':
  - type: note
    content: 'cinquante jours  : c''est de ce nombre (en traduction grecque pentêkonta) que la fête a reçu son nom de Pentecôte (Ac 2.1). Si la période correspondante était comptée à partir du lendemain du sabbat hebdomadaire (v. 11n), la fête (aussi appelée fête de la Moisson, Ex 23.16, ou fête des Semaines, Ex 34.22) tombait également un dimanche.'
  - type: text
    content: 'Vous compterez cinquante jours, jusqu''au lendemain du septième sabbat ; vous présenterez alors au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une offrande végétale nouvelle. '
  '17':
  - type: note
    content: 'deux dixièmes v. 13n. –  levés 2.11+. –  premiers pains  : l''expression correspondante (aussi au v. 20) est traduite ailleurs par premiers fruits  ; cf. 2.14n.'
  - type: text
    content: 'De vos lieux d''habitation vous apporterez deux pains, pour les dédier rituellement ; ils seront de deux dixièmes de fleur de farine, levés et cuits : ce sont les premiers pains pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '18':
  - type: note
    content: Cf. Nb 15.1-11.
  - type: text
    content: 'En plus de ces pains, vous présenterez en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ' sept agneaux d''un an sans défaut, un taureau et deux béliers, avec leur offrande végétale et leur libation en offrande consumée par le feu, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: Voir sacrifice.
  - type: text
    content: 'Vous offrirez un bouc en sacrifice pour le péché, et deux agneaux d''un an en sacrifice de paix. '
  '2':
  - type: note
    content: 'rencontres festives  : le mot hébreu correspondant est parfois traduit simplement par rencontre (p. ex. dans tente de la Rencontre) ; il désigne aussi le temps fixé pour la fête (v. 4 ; cf. Gn 1.14n  ; Ex 13.10n), de sorte qu''on pourrait aussi traduire fêtes saisonnières, fêtes régulières. Sur les fêtes, voir aussi Ex 23.14-19 ; 34.18-23 ; Nb 28–29 ; Dt 16.1-17 ; voir aussi calendrier et fêtes.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Les rencontres festives du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celles que vous convoquerez, sont des convocations sacrées. Voici quelles sont mes rencontres festives.'
  - type: heading
    content: Le sabbat
  '20':
  - type: note
    content: 'ils seront consacrés…  : litt. ils seront sacré pour YHWH pour le prêtre.'
  - type: text
    content: 'Le prêtre les dédiera rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en plus des premiers pains qu''on dédie rituellement et des deux agneaux ; ils seront consacrés au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et seront pour le prêtre. '
  '21':
  - type: note
    content: 'vous proclamerez  : autre traduction vous convoquerez  ; certains, d''après Syr, modifient le texte hébreu traditionnel pour lire plus simplement vous proclamerez une convocation sacrée  ; voir saint.'
  - type: text
    content: 'Ce jour même, vous proclamerez une convocation ; il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile. C''est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d''habitation. '
  '22':
  - type: note
    content: '19.9+. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Quand vous ferez la moisson de votre pays, tu ne moissonneras pas ton champ jusqu''au bord, et tu ne ramasseras pas ce qui reste à glaner. Tu abandonneras cela au pauvre et à l''immigré. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  - type: heading
    content: Le premier jour du septième mois
  '23':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '24':
  - type: note
    content: 'Voir sabbat. –  d''évocation et d''acclamation  : litt. une évocation (ou un rappel, un souvenir) d''acclamation (même terme en 25.9n  ; Ps 27.6+ ; cf. Nb 29.1n) ; cette fête est devenue celle du nouvel an juif, le Rosh-ha-Shana (septembre-octobre). –  sacrée  : voir saint.'
  - type: text
    content: 'Dis aux Israélites : Le premier jour du septième mois, il y aura pour vous repos sabbatique d''évocation et d''acclamation, convocation sacrée. '
  '25':
  - type: note
    content: 'offrandes  : voir sacrifices.'
  - type: text
    content: 'Vous ne ferez aucun travail servile, et vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' des offrandes consumées par le feu.'
  - type: heading
    content: Le jour de l'Expiation
  '26':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '27':
  - type: note
    content: 'Voir chap. 16. –  jour de l''Expiation  : on a aussi traduit jour des expiations, mais le pluriel de l''hébreu (yom ha-kippourim) est plus vraisemblablement à interpréter comme un pluriel d''abstraction (comme en Ex 29.36 ; 30.10 ; Nb 5.8 ; 29.11n) ou d''intensité (on pourrait aussi traduire jour de la grande expiation) ; cf. 16.6n. –  sacrée  : voir saint. –  vous vous priverez 16.29n. –  offrandes  : voir sacrifices.'
  - type: text
    content: 'Le dixième jour de ce septième mois, il y aura le jour de l''Expiation. Il y aura pour vous convocation sacrée : vous vous priverez et vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' des offrandes consumées par le feu. '
  '28':
  - type: text
    content: 'Vous ne ferez aucun travail ce jour même, car c''est le jour de l''Expiation, le jour où l''expiation doit être faite sur vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
  '29':
  - type: note
    content: 'ne se privera pas  : litt. ne s''humiliera pas, cf. 16.29n. –  retranché… 7.20n.'
  - type: text
    content: 'Quiconque ne se privera pas ce jour même sera retranché de son peuple. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'repos sabbatique 16.31n  ; le même mot revient aux v. 24,32,39. Sur le sabbat , cf. Ex 20.8-11 ; 23.12 ; 31.13ss ; Dt 5.12-15. –  Vous ne ferez aucun travail  : cf. v. 7s,21,25,28,30s,35s. –  dans tous vos lieux d''habitation 3.17+.'
  - type: text
    content: 'Pendant six jours on travaillera ; mais le septième jour, il y aura sabbat, repos sabbatique, convocation sacrée. Vous ne ferez aucun travail : c''est un sabbat pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans tous vos lieux d''habitation.'
  '30':
  - type: note
    content: 'je le ferai disparaître…  : autre traduction je le ferai périr au sein de son peuple.'
  - type: text
    content: 'Quiconque travaillera ce jour même, je le ferai disparaître du sein de son peuple. '
  '31':
  - type: text
    content: 'Vous ne ferez aucun travail. C''est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d''habitation. '
  '32':
  - type: note
    content: Voir sabbat.
  - type: text
    content: Ce sera pour vous un sabbat, un repos sabbatique, et vous vous priverez ; le neuvième jour du mois, au soir, vous ferez votre sabbat, d'un soir à l'autre.
  - type: heading
    content: La fête des Huttes
  '33':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '34':
  - type: note
    content: Sur la fête des Huttes (en hébreu soukkoth  ; cette fête est également appelée fête de la Récolte en Ex 23.16 ; 34.22, cf. Ps 27.5 ; 76.3), voir aussi v. 39-43 ; Za 14.16-19 ; Esd 3.4 ; Né 8.14-18 ; Jn 7.2 ; voir aussi calendrier et fêtes.
  - type: text
    content: 'Dis aux Israélites : Le quinzième jour du septième mois, il y aura la fête des Huttes pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – pendant sept jours. '
  '35':
  - type: note
    content: 'sacrée  : voir saint.'
  - type: text
    content: 'Le premier jour, il y aura convocation sacrée : vous ne ferez aucun travail servile. '
  '36':
  - type: note
    content: 'des offrandes…  : voir Nb 29.12-39 ; voir sacrifices. –  assemblée solennelle  : autre traduction cérémonie de clôture  ; même terme en Nb 29.35 ; Dt 16.8n  ; Es 1.13 ; Jl 1.14 ; Am 5.21 ; Né 8.18 ; 2Ch 7.9 ; cf. Jn 7.37.'
  - type: text
    content: 'Pendant sept jours, vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' des offrandes consumées par le feu. Le huitième jour, il y aura pour vous convocation sacrée ; vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' des offrandes consumées par le feu ; c''est une assemblée solennelle : vous ne ferez aucun travail servile.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'selon l''ordre de chaque jour  : litt. la chose (ou la parole ) du jour en son jour  ; même expression hébraïque en Ex 5.13,19 ; 16.4 ; 1R 8.59 ; 2R 25.30 ; Dn 1.5 ; 1Ch 16.37+.'
  - type: text
    content: 'Telles sont les rencontres festives du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que vous convoquerez, les convocations sacrées, pour présenter au '
  - type: text
    content: Seigneur
  - type: text
    content: ' des offrandes consumées par le feu, des holocaustes, des offrandes végétales, des sacrifices et des libations, selon l''ordre de chaque jour '
  '38':
  - type: note
    content: 'les sabbats  : cf. Nb 28.9s. –  vœux / offrandes volontaires 7.16+.'
  - type: text
    content: '– outre les sabbats du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vos dons, vos vœux, toutes les offrandes volontaires que vous donnerez au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '39':
  - type: text
    content: 'Le quinzième jour du septième mois, quand vous récolterez les produits du pays, vous célébrerez la fête du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – pendant sept jours : le premier jour il y aura un repos sabbatique, le huitième jour il y aura un repos sabbatique. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 2n.
  - type: text
    content: 'Voici les rencontres festives du '
  - type: text
    content: Seigneur
  - type: text
    content: ', les convocations sacrées, que vous convoquerez au temps fixé.'
  - type: heading
    content: La Pâque et la fête des Pains sans levain
  '40':
  - type: note
    content: 'Les termes traduits par beaux et touffus ont été traditionnellement compris comme désignant des espèces particulières, le cédratier et le myrte ; cf. Né 8.15 ; voir aussi Jn 12.13 ; Ap 7.9. –  saules des oueds  : le mot traduit ici par oueds est rendu en 11.9s par cours d''eau  ; cf. Gn 26.17n  ; Es 15.7 ; Jb 40.22 ; comparer avec Ps 137.2.'
  - type: text
    content: 'Le premier jour, vous prendrez du fruit de beaux arbres, des branches de palmiers, des rameaux d''arbres touffus et de saules des oueds ; et vous vous réjouirez devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, pendant sept jours. '
  '41':
  - type: note
    content: 'prescription  : voir loi.'
  - type: text
    content: 'Vous célébrerez chaque année cette fête pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant sept jours. C''est une prescription perpétuelle, pour toutes vos générations. Vous la célébrerez le septième mois. '
  '42':
  - type: text
    content: 'Vous habiterez pendant sept jours dans des huttes ; tous les autochtones en Israël habiteront dans des huttes, '
  '43':
  - type: note
    content: 'toutes vos générations  : litt. vos générations. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'afin que toutes vos générations sachent que j''ai fait habiter les Israélites dans des huttes quand je les ai fait sortir d''Egypte. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '44':
  - type: text
    content: ' '
  - type: note
    content: V. 2n.
  - type: text
    content: 'C''est ainsi que Moïse parla des rencontres festives du '
  - type: text
    content: Seigneur
  - type: text
    content: ' aux Israélites.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'premier mois  : mars-avril (voir Ex 12.2n). –  à la tombée du soir Ex 12.6n. – Sur la Pâque , voir Ex 12.'
  - type: text
    content: 'Le quatorzième jour du premier mois, à la tombée du soir, il y aura la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: Ex 12.15+.
  - type: text
    content: 'Le quinzième jour de ce mois, il y aura la fête des Pains sans levain pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Pendant sept jours, vous mangerez des pains sans levain. '
  '7':
  - type: note
    content: 'sacrée  : voir saint. –  aucun travail servile  : il s''agit ici d''un chômage partiel où seuls les travaux pénibles sont interrompus, à la différence du repos total exigé pour le sabbat (v. 3) ou le jour de l''Expiation (v. 28-31) ; cf. Ex 12.16.'
  - type: text
    content: 'Le premier jour, il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile. '
  '8':
  - type: note
    content: 'offrandes  : voir sacrifices. –  consumées par le feu 1.9n. –  aucun travail servile v. 7n  ; cf. Lc 23.56.'
  - type: text
    content: 'Vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ', pendant sept jours, des offrandes consumées par le feu. Le septième jour, il y aura convocation sacrée : vous ne ferez aucun travail servile.'
  - type: heading
    content: La fête de la première gerbe
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
