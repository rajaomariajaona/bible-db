document_id: PSA.60,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu répond à son peuple vaincu
  - type: text
    content: ' '
  - type: note
    content: « Le lis (45.1n) du témoignage » ou « Le lis est le témoignage » , indication probable d'une mélodie connue, de même en 80.1 ; cf. 56.1n.
  - type: text
    content: 'Du chef de chœur. Sur « Le lis du témoignage ». Hymne. De David. Pour instruire. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 24.18 ; Es 11.13s ; Am 9.12 ; So 2.4ss ; Za 9.7. –  Moab , au sud-est de Juda, de l''autre côté de la mer Morte (le bassin  ?). –  Edom , au sud-sud-est de Juda. –  je jette ma sandale  : acte par lequel on revendique un droit de propriété ; cf. Dt 25.9s ; Rt 4.7. – Le pays des Philistins , à l''ouest de Juda sur le littoral méditerranéen. –  guerrières est (vraisemblablement) sous-entendu dans le texte, cf. 41.12 ; Jos 6.5 ; Syr a lu contre le pays des Philistins je lance des acclamations (guerrières) , comme en Ps 108.10 ; certains comprennent ici brise-toi contre moi.'
  - type: text
    content: Moab est le bassin où je me lave ;
  - type: text
    content: sur Edom je jette ma sandale.
  - type: text
    content: Pays des Philistins, lance des acclamations guerrières contre moi !
  '11':
  - type: text
    content: ' '
  - type: note
    content: dans la ville forte 31.22n.
  - type: text
    content: Qui me mènera dans la ville forte ?
  - type: text
    content: Qui me conduira jusqu'en Edom ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 3 ; 44.10n.
  - type: text
    content: N'est-ce pas toi, ô Dieu, qui nous avais repoussés ?
  - type: text
    content: N'est-ce pas toi, ô Dieu, qui ne partais plus en campagne avec nos armées ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: '56.5+ ; 118.8s,13 ; cf. 2Ch 14.10. –  délivre-nous de l''adversaire  : autre traduction possible libère-nous de la détresse. –  Le salut…  : autre traduction les victoires des humains sont illusoires  ; cf. 146.3.'
  - type: text
    content: Viens à notre secours, délivre-nous de l'adversaire !
  - type: text
    content: Le salut des humains est illusoire.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.30 ; 44.6-9 ; 118.15s ; voir aussi Rm 16.20 ; Hé 11.33. –  nous déploierons nos forces Nb 24.18.
  - type: text
    content: Avec Dieu, nous déploierons nos forces ;
  - type: text
    content: c'est lui qui écrasera nos adversaires.
  '2':
  - type: note
    content: 'aux Araméens…  : litt. l''Aram des deux fleuves et l''Aram de Tsoba  ; cf. 2S 8.3-13 ; 10.6-19 ; 1Ch 18–19 ; voir aussi 2R 14.7 ; 2Ch 25.11.'
  - type: text
    content: Lorsqu'il fit la guerre aux Araméens de Mésopotamie et aux Araméens de Tsoba, et que Joab revint et battit dans la vallée du Sel douze mille Edomites.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '44.10+ ; 74.1 ; 89.39. –  tu nous as battus en brèche  : autres traductions tu as causé des pertes parmi nous ; tu nous as fait voler en éclats  ; Jg 21.15 ; 2S 5.20. –  rétablis-nous  : autres traductions ramène-nous ; reviens à nous.'
  - type: text
    content: O Dieu, tu nous as repoussés, tu nous as battus en brèche,
  - type: text
    content: tu t'es mis en colère ; rétablis-nous !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Tu as fait trembler la terre Ag 2.6 ; cf. Am 1.1 ; 8.8 ; Za 14.5. –  elle vacille Es 24.20 ; 54.10.
  - type: text
    content: 'Tu as fait trembler la terre, tu l''as déchirée :'
  - type: text
    content: répare ses cassures, car elle vacille !
  '5':
  - type: text
    content: ' '
  - type: note
    content: un vin d'étourdissement 75.9 ; Es 51.17+ ; Jr 25.15,27.
  - type: text
    content: Tu as fait voir de dures épreuves à ton peuple,
  - type: text
    content: tu nous as fait boire un vin d'étourdissement.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui te craignent 15.4+. –  une bannière…  : autre traduction un signal pour fuir (les deux termes hébreux sont apparentés) devant l''archer (le même mot signifie vérité en araméen) ; cf. Jr 4.6.'
  - type: text
    content: Tu as donné à ceux qui te craignent une bannière
  - type: text
    content: 'en faveur de la vérité. '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 108.7-14. –  sauve par ta main droite 17.7n. –  réponds-nous  : autre lecture traditionnelle réponds-moi.'
  - type: text
    content: Afin que tes bien-aimés soient délivrés,
  - type: text
    content: sauve par ta main droite, et réponds-nous !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 33.17s ; 2R 17.24 ; Jr 49.1. –  dans son sanctuaire  : autre traduction dans sa sainteté  ; cf. 20.3. –  Je triompherai  : autre traduction possible j''exulte. –  Sichem , ancienne capitale israélite au centre du pays (Dt 12.5n). –  Soukkoth , en Transjordanie (cf. v. 9).'
  - type: text
    content: 'Dieu a parlé dans son sanctuaire : Je triompherai !'
  - type: text
    content: Je partagerai Sichem, je mesurerai la vallée de Soukkoth.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Galaad et le territoire oriental de Manassé sont en Transjordanie. – Le territoire occidental de Manassé et celui d’ Ephraïm constituent la région centrale du pays, autour de Sichem. –  mon casque  : litt. la forteresse de ma tête. –  Juda (au sud) , mon bâton de commandement  : cf. 2.9+ (autre terme) ; Gn 49.10n.'
  - type: text
    content: A moi Galaad, à moi Manassé !
  - type: text
    content: Ephraïm est mon casque ;
  - type: text
    content: Juda, mon bâton de commandement.
