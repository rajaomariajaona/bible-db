    - type: text
      text: Quel malheur pour toi qui ravages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui n'as pas été ravagé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui trahis et qui n'a pas été trahi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu auras fini de ravager, tu seras ravagé ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu auras achevé de trahir, on te trahira.
