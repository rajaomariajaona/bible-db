document_id: ISA.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Quel malheur pour toi qui ravages !
  - type: text
    content: ' '
  - type: note
    content: Cf. 21.2 ; voir aussi 16.4 ; 24.16 ; Jr 30.16 ; Ha 2.8. Ces paroles s'adressent de toute évidence à l'Assyrie 10.24-27 ; 30.31s.
  - type: text
    content: Quel malheur pour toi qui ravages
  - type: text
    content: et qui n'as pas été ravagé,
  - type: text
    content: qui trahis et qui n'a pas été trahi !
  - type: text
    content: Quand tu auras fini de ravager, tu seras ravagé ;
  - type: text
    content: quand tu auras achevé de trahir, on te trahira.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 2.19+ ; Ps 12.6.
  - type: text
    content: Maintenant je me lèverai,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: maintenant je me dresserai,
  - type: text
    content: maintenant je serai élevé.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Vous avez conçu… 26.18+ ; 59.4 ; Ps 7.15. –  feu 1.31 ; 9.17-20 ; 10.16.
  - type: text
    content: Vous avez conçu du foin,
  - type: text
    content: vous mettez au monde de la paille ;
  - type: text
    content: votre souffle,
  - type: text
    content: c'est un feu qui vous dévorera.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 10.16s.
  - type: text
    content: Les peuples seront des fours à chaux,
  - type: text
    content: des épines coupées
  - type: text
    content: qui brûlent dans le feu.
  '13':
  - type: text
    content: ' '
  - type: note
    content: loin 49.1. –  proche 57.19.
  - type: text
    content: Vous qui êtes loin, écoutez ce que j'ai fait !
  - type: text
    content: Et vous qui êtes proches, éprouvez ma puissance !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'frisson  : cf. Ex 15.15 ; Ps 2.11+. –  impies 9.16+. –  Qui de nous…  : autre traduction qui, pour nous, pourra séjourner…  : cf. Ps 15 ; 24.3-6 ; voir aussi Ez 18.5-9 ; Ps 34.13-15 ; 118.19s. –  séjourner  : le verbe correspondant est apparenté au substantif habituellement traduit par immigré , cf. Ex 12.48n. –  feu dévorant 30.27+ ; cf. 4.5 ; 31.9. –  inextinguibles  : litt. perpétuels.'
  - type: text
    content: Les pécheurs sont effrayés dans Sion,
  - type: text
    content: 'un frisson saisit les impies :'
  - type: text
    content: Qui de nous pourra séjourner
  - type: text
    content: auprès d'un feu dévorant ?
  - type: text
    content: Qui de nous pourra séjourner
  - type: text
    content: auprès de brasiers inextinguibles ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'avec justice ou dans ce qui est fait pour la justice , le terme hébreu est au pluriel comme en 45.24 ; 64.5 ; Ez 3.20+ ; Mi 6.5 ; Ps 103.6n  ; Dn 9.16,18 (de même pour droiture ). –  pot-de-vin 1.23+ ; Ex 23.8+ ; Ps 15.5. –  propos sanguinaires  : litt. sangs , cf. 1.15n. –  ne pas voir (autre traduction ne pas prendre plaisir à voir , cf. Ab 12n  ; Ps 22.18n) ce qui est mauvais  : cf. 1.10-16.'
  - type: text
    content: Celui qui marche avec justice
  - type: text
    content: et qui parle avec droiture,
  - type: text
    content: qui rejette le gain de l'extorsion,
  - type: text
    content: qui secoue les mains pour ne pas recevoir de pot-de-vin,
  - type: text
    content: qui ferme l'oreille pour ne pas entendre des propos sanguinaires
  - type: text
    content: et qui se bande les yeux pour ne pas voir ce qui est mauvais,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'dans les hauteurs  : cf. Ab 3. –  des rocs… ou sa citadelle sera sur des rochers fortifiés. –  pain / eau 32.6.'
  - type: text
    content: celui-là demeurera dans les hauteurs ;
  - type: text
    content: des rocs fortifiés seront sa citadelle ;
  - type: text
    content: le pain lui sera donné,
  - type: text
    content: et l'eau lui sera assurée.
  - type: heading
    content: Jérusalem délivrée
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'roi / beauté Ez 28.12 ; Ps 45.3. –  pays / étendue  : cf. 26.15.'
  - type: text
    content: Tes yeux verront le roi dans sa beauté,
  - type: text
    content: ils contempleront le pays dans toute son étendue.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Tu songeras…  : litt. ton cœur murmurera (ou méditera ) la terreur , cf. Jos 1.8n. –  secrétaire…  : le mot hébreu correspondant est aussi traduit par scribe  ; il est apparenté au verbe traduit ici par inspectait , litt. comptait. Il s''agit ici des fonctionnaires de l''occupant assyrien (cf. 10.24-27 ; 37.1-6), ou de ceux de la défense judéenne (cf. 22.8-11 ; 36.12 ; 2Ch 32.1-7).'
  - type: text
    content: 'Tu songeras à tes terreurs :'
  - type: text
    content: Où est le secrétaire, où est le percepteur ?
  - type: text
    content: Où est celui qui inspectait les tours ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'arrogant ou enragé , sens incertain. –  au langage impénétrable  : litt. profonds de lèvre (loin) d''entendre , c.-à-d. trop obscur pour être compris  ; cf. 28.10s ; Ez 3.5s. –  balbutiante  : la racine hébraïque correspondante peut aussi évoquer la moquerie, cf. 37.22.'
  - type: text
    content: Tu ne verras plus le peuple arrogant,
  - type: text
    content: le peuple au langage impénétrable,
  - type: text
    content: à la langue balbutiante qu'on ne comprend pas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Nous mettons en toi notre espérance 30.18+. –  leur force  : litt. leur bras. Certaines versions anciennes portent notre bras , mais les changements de personne sont fréquents dans la poésie hébraïque (cf. v. 6). Cf. 12.2s ; 26.1 ; Ps 46.2. –  au temps de la détresse Ps 77.3+.'
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-nous grâce !'
  - type: text
    content: Nous mettons en toi notre espérance.
  - type: text
    content: Sois leur force chaque matin
  - type: text
    content: et aussi notre salut au temps de la détresse !
  '20':
  - type: text
    content: ' '
  - type: note
    content: domaine tranquille 32.18n  ; Ps 46.6. –  tente 54.2 ; Jr 10.20 ; ici, allusion probable à la Demeure , le sanctuaire du désert (cf. Ex 26 ; Nb 1.51 ; 10.17 ; 2S 6–7) ; le mot traduit par rencontres festives rappelle aussi la tente de la Rencontre (Ex 27.21n  ; 29.4ss ; cf. Gn 1.14n  ; Ps 48 ; 122).
  - type: text
    content: Regarde Sion, la cité de nos rencontres festives !
  - type: text
    content: Tes yeux verront Jérusalem, domaine tranquille,
  - type: text
    content: tente qui ne sera plus démontée,
  - type: text
    content: dont les piquets ne seront jamais enlevés
  - type: text
    content: et dont les cordages ne seront pas détachés.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur est magnifique 12.6. –  Il nous tient lieu de  : litt. (c''est) un lieu de  ; cf. 12.3 ; Ez 47.1-12 ; Ps 46.5-12. –  fleuves / rivières  : les mots hébreux ainsi traduits désignent habituellement l''Euphrate (Assyrie) et le Nil (Egypte). –  vastes 22.18n. –  bateaux / navire  : probablement ceux des puissances étrangères (cf. Nb 24.24).'
  - type: text
    content: 'C''est là, vraiment, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est magnifique pour nous :'
  - type: text
    content: Il nous tient lieu de fleuves,
  - type: text
    content: de vastes rivières,
  - type: text
    content: où ne pénètrent pas les bateaux à rames,
  - type: text
    content: et que ne traverse aucun navire magnifique.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'juge 2.4 ; Ps 50.6. –  commandant  : autre traduction législateur (autre forme du verbe traduit par promulguer en 10.1) ; cf. Jg 5.9n,14n. –  roi 6.5 ; Ps 93.1. –  nous sauve ou nous sauvera v. 2 ; 12.2 ; 25.9.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est notre juge,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est notre commandant,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est notre roi :'
  - type: text
    content: c'est lui qui nous sauve.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'mât 30.17. –  voiles  : le même mot hébreu est traduit par bannière en 5.26n. –  butin v. 4. –  boiteux 35.6 ; cf. 2S 5.6.'
  - type: text
    content: Tes cordages sont relâchés ;
  - type: text
    content: ils ne maintiennent plus la solidité du mât
  - type: text
    content: et ne tendent plus les voiles.
  - type: text
    content: Alors on partage un immense butin ;
  - type: text
    content: les boiteux même prennent part au pillage ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'malade / faute 38.17 ; Ps 32.1-4 ; 103.3. –  là  : litt. en elle , probablement à Jérusalem . –  pardonnée  : autres traductions enlevée ; prise en charge , cf. Mi 7.17s ; Ps 32.1n.'
  - type: text
    content: 'aucun de ceux qui demeurent là ne dit : Je suis malade !'
  - type: text
    content: Le peuple qui habite là
  - type: text
    content: voit sa faute pardonnée.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 10 ; 17.13 ; Nb 10.35 ; Ps 68.2. –  En entendant le tumulte  : litt. au bruit du tumulte ou de la multitude  ; cf. 13.4n.'
  - type: text
    content: En entendant le tumulte,
  - type: text
    content: les peuples fuient ;
  - type: text
    content: quand tu te lèves,
  - type: text
    content: les nations se dispersent.
  '4':
  - type: text
    content: ' '
  - type: note
    content: butin v. 24 ; 9.2.
  - type: text
    content: On ramasse votre butin
  - type: text
    content: comme ramasse le criquet ;
  - type: text
    content: on s'y rue
  - type: text
    content: comme une ruée de sauterelles.
  '5':
  - type: text
    content: ' '
  - type: note
    content: élevé v. 16 ; 2.11,17 ; 57.15. –  équité / justice 1.27 ; 32.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est élevé,'
  - type: text
    content: car il demeure en haut ;
  - type: text
    content: il remplit Sion
  - type: text
    content: d'équité et de justice.
  '6':
  - type: text
    content: ' '
  - type: note
    content: En découpant différemment les phrases, on pourrait lire Il (le Seigneur) sera la sûreté (le mot hébreu est parfois traduit par probité, fidélité, constance , cf. 7.9n  ; 22.23n) de tes jours (litt. de tes temps ) , richesse de salut ; sagesse, connaissance et crainte du Seigneur (11.2s ; Ps 111.10 ; Pr 2.4), c'est là son trésor (le possessif renvoie à un sujet masculin, le peuple ou le Seigneur  ; sur le changement de personne, cf. v. 2n).
  - type: text
    content: Tes jours seront en sûreté ;
  - type: text
    content: la sagesse et la connaissance sont une richesse qui sauve ;
  - type: text
    content: 'la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: c'est là son trésor.
  - type: heading
    content: L'intervention du Seigneur
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'héros  : sens incertain ; en s''appuyant sur une variante présente dans certains mss on pourrait lire les gens d''Ariel (cf. 29.1s,7). Des versions anciennes et un ms de Qumrân ont lu je leur apparaîtrai. Reste la possibilité d''y voir le nom propre d''un conquérant et de traduire  : Voici Erélam : on crie…'
  - type: text
    content: Des héros poussent des cris au dehors ;
  - type: text
    content: les messagers de paix pleurent amèrement.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les routes restent désertes ou sont dévastées 13.9 ; cf. 34.10 ; Jg 5.6. –  rompu l''alliance 24.5 ; peut-être ici un traité politique. –  les villes  : un ms de Qumrân porte les témoins.'
  - type: text
    content: 'Les routes restent désertes :'
  - type: text
    content: plus de passants sur le sentier.
  - type: text
    content: Il a rompu l'alliance,
  - type: text
    content: il méprise les villes,
  - type: text
    content: il n'a de respect pour personne.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Le pays est en deuil 24.4. –  il dépérit  : autre traduction il est déshonoré , cf. 54.4 ; même verbe en 16.8 ; 19.8 ; 24.4,7. –  Liban 2.13 (avec le Bashân , en Transjordanie, cf. Ez 39.18 ; Am 4.1 ; Ps 22.13 ; 68.16) ; 10.34 ; 14.8 ; 29.17n ( Carmel = verger , Na 1.4) ; 37.24 : 60.13 : montagnes boisées aux temps bibliques. –  rougit  : de honte, cf. 24.23+. –  plaine côtière  : hébreu sharôn , nom de la plaine fertile le long de la Méditerranée, au sud du Carmel (35.2 ; 65.10 ; Jos 12.18n  ; Ct 2.1 ; 1Ch 27.29 ; voir aussi 5.16n). –  plaine aride  : hébreu ‘arava , nom qui désigne souvent la région désertique qui s''étend de la mer Morte au golfe d''Aqaba (cf. 35.1,6ns ; Dt 1.1n  ; Jos 8.14n). –  leur feuillage  : sous-entendu dans le texte.'
  - type: text
    content: Le pays est en deuil, il dépérit ;
  - type: text
    content: le Liban rougit et se flétrit ;
  - type: text
    content: la plaine côtière est comme une plaine aride ;
  - type: text
    content: Bashân et Carmel secouent leur feuillage.
