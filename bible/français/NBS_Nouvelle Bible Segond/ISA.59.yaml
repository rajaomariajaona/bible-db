document_id: ISA.59,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fautes qui vous séparent du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'le bras (ou la main ) … trop court (e) 50.2+. –  dure  : litt. lourde  ; cf. 58.3 ; Za 7.11.'
  - type: text
    content: 'Non, le bras du '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est pas trop court pour sauver,'
  - type: text
    content: son oreille n'est pas trop dure pour entendre.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'aveugles Dt 28.29 ; So 1.17 ; cf. Jr 13.16. –  l''abondance  : traduction incertaine, obtenue par rapprochement du mot hébreu avec la racine qui signifie gras, prospère.'
  - type: text
    content: Nous tâtonnons comme des aveugles le long d'un mur,
  - type: text
    content: nous tâtonnons comme des gens sans yeux ;
  - type: text
    content: nous trébuchons à midi comme au crépuscule,
  - type: text
    content: au milieu de l'abondance nous sommes comme les morts.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'gémissons  : le même verbe est traduit par murmurer au v. 3, par méditer au v. 13 ; cf. 38.14+. –  nous espérions… Jr 8.15.'
  - type: text
    content: Nous grognons tous comme des ours,
  - type: text
    content: nous gémissons comme des colombes ;
  - type: text
    content: nous espérions l'équité, mais rien !
  - type: text
    content: – le salut, mais il est loin de nous !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'transgressions  : le même mot hébreu est traduit par révolte au v. 20. –  nos péchés témoignent contre nous Jr 14.7. –  nous connaissons nos fautes Ps 51.5.'
  - type: text
    content: Car nos transgressions sont nombreuses devant toi,
  - type: text
    content: et nos péchés témoignent contre nous ;
  - type: text
    content: nos transgressions sont avec nous,
  - type: text
    content: 'et nous connaissons nos fautes :'
  '13':
  - type: text
    content: ' '
  - type: note
    content: révoltes 48.8+. –  trahisons ou reniements, mensonges, dissimulations  ; cf. 30.9 ; Jos 24.27 ; Jr 5.12 ; 7.9. –  subversion 1.5n. – Voir cœur.
  - type: text
    content: 'révoltes et trahisons envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: reculs loin de notre Dieu ;
  - type: text
    content: paroles de violence et de subversion,
  - type: text
    content: paroles mensongères conçues et méditées dans le cœur,
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 55.10-12. –  loyauté ou vérité , de même au v. 15.
  - type: text
    content: de sorte que l'équité recule,
  - type: text
    content: que la justice se tient éloignée ;
  - type: text
    content: la loyauté trébuche sur la place publique,
  - type: text
    content: la droiture ne peut accéder.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 's''éloigne du mal  : cf. Jb 1.1,8,17. –  est une proie  : autres traductions se fait piller ; se fait dépouiller . –  qu''il n''y a plus d''équité…  : litt. (c''est) mauvais à ses yeux car (ou quand ) il n''y a pas d''équité (ou de droit ).'
  - type: text
    content: La loyauté a disparu,
  - type: text
    content: et celui qui s'éloigne du mal est une proie.
  - type: heading
    content: Un rédempteur vient pour Sion
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voit qu''il n''y a plus d''équité,'
  - type: text
    content: et cela lui déplaît.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'pas un seul homme 41.28+. –  n''intervient  : autre traduction n''intercède , cf. 53.12n. –  son bras 40.10+ ; cf. 63.5. –  lui assure la victoire  : litt. sauve pour lui , expression analogue Ps 98.1.'
  - type: text
    content: Il voit qu'il n'y a pas un seul homme ;
  - type: text
    content: il est atterré, parce que personne n'intervient.
  - type: text
    content: Alors son bras lui assure la victoire,
  - type: text
    content: sa justice lui sert d'appui.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Ep 6.11-17 ; 1Th 5.8. –  justice / salut 45.8+. –  il met  : sous-entendu dans le texte. –  comme d''une tunique  : les mots correspondants sont absents de certaines versions anciennes ; cf. 61.10. –  passion jalouse 9.6n  ; 63.15.'
  - type: text
    content: Il se revêt de la justice comme d'une cuirasse,
  - type: text
    content: il met sur sa tête le casque du salut ;
  - type: text
    content: comme d'une tunique il se revêt de vêtements de vengeance,
  - type: text
    content: il s'enveloppe de passion jalouse comme d'un manteau.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Il paiera  : même formule en 66.6 ; cf. 3.11 ; 35.4 ; voir aussi 40.10+. –  îles 11.11+ ; 41.1.'
  - type: text
    content: 'Il paiera de retour chacun comme il le mérite :'
  - type: text
    content: la fureur à ses adversaires,
  - type: text
    content: à ses ennemis ce qu'ils méritent ;
  - type: text
    content: il paiera de retour les îles comme elles le méritent.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'On craindra  : de nombreux mss portent ici on verra (les deux formes sont très proches en hébreu) ; cf. 30.27 ; 33.3 ; Ps 102.16. –  depuis le couchant… 24.14s ; 45.6 ; Ml 1.11 ; Mt 8.11. –  quand l''adversaire viendra…  : traduction incertaine ; autre possibilité  : car il vient comme un fleuve resserré, poussé par le souffle du Seigneur (cf. 30.28).'
  - type: text
    content: 'On craindra le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis le couchant'
  - type: text
    content: et sa gloire depuis le levant ;
  - type: text
    content: quand l'adversaire viendra comme un fleuve,
  - type: text
    content: 'le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' le mettra en fuite.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vos fautes  : cf. 50.1 ; Jr 5.25 ; voir péché. –  le détournent…  : litt. vous ont caché la face, (l''empêchant) d''entendre (ou d''écouter ) 54.8+.'
  - type: text
    content: Ce sont vos fautes qui vous séparent de votre Dieu,
  - type: text
    content: ce sont vos péchés qui le détournent de vous, qui l'empêchent de vous entendre.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 11.26s. –  rédempteur 41.14n. –  pour les gens…  : litt. pour ceux qui reviennent de la révolte (ou de la transgression ) en Jacob  ; LXX et il écartera les impiétés de Jacob.'
  - type: text
    content: Un rédempteur vient pour Sion,
  - type: text
    content: pour les gens de Jacob qui reviennent de leur révolte
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'mon souffle ou mon Esprit 11.2+ ; 42.1 ; 61.1 ; cf. 2S 23.2. –  mes paroles 51.16. –  descendance  : cf. 8.18.'
  - type: text
    content: 'Quant à moi, telle est mon alliance avec eux, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : mon souffle, qui est sur toi, et mes paroles, que j''ai mises dans ta bouche, ne seront pas retirés de ta bouche, ni de la bouche de ta descendance, ni de la bouche de la descendance de ta descendance, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dès maintenant et pour toujours.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sang 1.15 ; Lm 4.14. –  fautes  : litt. faute . –  lèvres… Jb 27.4. –  profèrent le mensonge Jr 9.4 ; 14.4s ; 29.23 ; Mi 6.12 ; Za 13.3.'
  - type: text
    content: Car vos mains sont souillées de sang,
  - type: text
    content: vos doigts de fautes ;
  - type: text
    content: vos lèvres profèrent le mensonge,
  - type: text
    content: votre langue murmure l'injustice.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Voir justice. –  conçoit l''oppression…  : cf. Jb 15.35 ; Ps 7.15 ; Jc 1.15. –  le mal ou la malfaisance  ; cf. v. 6s.'
  - type: text
    content: Personne ne porte plainte avec justice,
  - type: text
    content: personne n'entre en jugement avec probité ;
  - type: text
    content: on met sa confiance dans le chaos,
  - type: text
    content: et on tient des discours d'illusion ;
  - type: text
    content: on conçoit l'oppression,
  - type: text
    content: et on met au monde le mal.
  '5':
  - type: text
    content: ' '
  - type: note
    content: aspic 11.8 ; 14.29 ; Jr 8.17 ; Pr 23.32 ; cf. Ps 58.5s ; Mt 3.7/ /. –  toiles d'araignée Jb 8.14.
  - type: text
    content: Ils font éclore des œufs d'aspic
  - type: text
    content: et tissent des toiles d'araignée.
  - type: text
    content: Celui qui mange de leurs œufs en meurt ;
  - type: text
    content: et, si l'on en brise un,
  - type: text
    content: il en éclot un cobra.
  '6':
  - type: text
    content: Leurs toiles ne suffisent pas à faire un vêtement,
  - type: text
    content: ils ne peuvent se couvrir de leurs œuvres ;
  - type: text
    content: leurs œuvres sont des œuvres malfaisantes,
  - type: text
    content: des actes de violence sont dans leurs mains.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Leurs pieds… sang Pr 1.16 ; Rm 3.15-17. –  ravage / désastre 51.19+.
  - type: text
    content: Leurs pieds courent au mal,
  - type: text
    content: ils ont hâte de répandre du sang innocent ;
  - type: text
    content: leurs pensées sont malfaisantes,
  - type: text
    content: ravage et désastre sont sur leurs routes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: chemin de la paix Lc 1.79. –  sentiers tortueux Pr 2.15 ; 10.9. –  pas la paix 48.22+.
  - type: text
    content: Ils ne connaissent pas le chemin de la paix,
  - type: text
    content: il n'y a pas d'équité sur leurs traces ;
  - type: text
    content: 'ils se font des sentiers tortueux :'
  - type: text
    content: quiconque y marche ne connaît pas la paix.
  - type: heading
    content: Le peuple de Dieu reconnaît ses fautes
  '9':
  - type: text
    content: ' '
  - type: note
    content: équité (autre traduction droit ) / justice 56.1+ ; ce sont ici des dons de Dieu, comme le salut ou la paix . –  lumière / ténèbres Am 5.18-20 ; Jb 30.26.
  - type: text
    content: C'est pourquoi l'équité reste loin de nous,
  - type: text
    content: la justice ne nous atteint pas ;
  - type: text
    content: nous espérions la lumière,
  - type: text
    content: et ce sont les ténèbres
  - type: text
    content: – la clarté,
  - type: text
    content: et nous marchons dans l'obscurité.
