document_id: EST.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Triomphe final de Mardochée
  - type: text
    content: ' '
  - type: note
    content: 'frappa d''un impôt  : le terme correspondant désigne la corvée en 1R 4.6n  ; il semble avoir pris ici le sens d’ impôt.'
  - type: text
    content: 'Le roi Xerxès frappa d''un impôt le pays et les îles de la mer. '
  '2':
  - type: note
    content: 'sa puissance (9.29n) / sa vaillance  : certains pensent que les possessifs renvoient à Mardochée plutôt qu''à Xerxès (v. 1). –  le détail  : autre traduction possible le décret  ; cf. 3.1 ; 6.8ss ; 8.2,15. –  chroniques… 2.23+ ; cf. 9.32+. –  Médie / Perse 1.3n.'
  - type: text
    content: 'Tout le récit de sa puissance et de sa vaillance, ainsi que le détail de l''élévation de Mardochée par le roi, tout cela est écrit dans le livre des chroniques des rois de Médie et de Perse. '
  '3':
  - type: note
    content: 'occupait le second rang  : litt. (était) le second  ; cf. Gn 41.40 ; 1S 23.17 ; 2Ch 28.7. –  parlait pour la paix (ou la prospérité, le bien-être) de tous les siens (litt. de toute sa descendance, cf. 9.31) ; on peut aussi comprendre annonçait la paix pour tous les siens ; œuvrait pour le bonheur (ou la sécurité) de tous les siens  ; même expression, dans un sens différent, en Ps 28.3 (tenir un discours de paix) ; cf. 85.9 ; 122.6-9 ; Né 2.10.'
  - type: text
    content: Car le Juif Mardochée occupait le second rang après le roi Xerxès ; c'était le grand homme des Juifs, qui avait la faveur de la multitude de ses frères ; il cherchait le bien de son peuple et parlait pour la paix de tous les siens.
