    marker-yv: yv-n
  - type: text
    text: Car le Juif Mardochée occupait le second rang après le roi Xerxès ; c'était le grand homme des Juifs, qui avait la faveur de la multitude de ses frères ; il cherchait le bien de son peuple et parlait pour la paix de tous les siens.
