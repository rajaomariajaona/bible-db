  - type: text
    text: 'Le pharaon appela Joseph du nom de Tsaphnath-Panéah. Il lui donna pour femme Aséneth, fille de Poti-Phéra, prêtre d''On. Alors Joseph put circuler en Egypte. '
  - type: usfm
