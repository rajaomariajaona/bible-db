  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Joseph avait trente ans lorsqu'il se présenta devant le pharaon, le roi d'Egypte ; il se retira de devant le pharaon et parcourut toute l'Egypte.
