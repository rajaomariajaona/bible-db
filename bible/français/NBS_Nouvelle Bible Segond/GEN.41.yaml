document_id: GEN.41,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rêves du pharaon
  - type: text
    content: ' '
  - type: note
    content: 'rêve 37.5+. –  Nil  : autre traduction fleuve  ; autre mot hébreu qu''en 31.21n  ; 36.37n.'
  - type: text
    content: 'Au bout de deux ans, le pharaon fit un rêve : il se tenait près du Nil. '
  '10':
  - type: note
    content: 'nous, ses serviteurs  : autre traduction les gens de sa cour  ; cf. v. 12 ; 20.8n. –  il nous avait fait mettre aux arrêts… 40.2ss.'
  - type: text
    content: 'Le pharaon était en colère contre nous, ses serviteurs ; il nous avait fait mettre aux arrêts dans la maison du chef des gardes, moi et le grand panetier. '
  '11':
  - type: note
    content: 40.5.
  - type: text
    content: 'Au cours d''une même nuit, moi et lui, nous avons fait chacun un rêve ayant son interprétation propre. '
  '12':
  - type: note
    content: 39.1,14. –  serviteur ou esclave.
  - type: text
    content: 'Il y avait là avec nous un jeune Hébreu, serviteur du chef des gardes. Nous lui avons raconté nos rêves et il nous les a interprétés ; à chacun il a interprété son rêve. '
  '13':
  - type: note
    content: 'il m''a rétabli…  : le sujet n''est pas précisé ; il pourrait s''agir du pharaon ou de Joseph, dont l''interprétation serait considérée comme cause des événements.'
  - type: text
    content: 'Tout est arrivé exactement selon l''interprétation qu''il nous avait donnée : il m''a rétabli dans ma charge et il a fait pendre l''autre.'
  - type: heading
    content: Joseph interprète les rêves du pharaon
  '14':
  - type: text
    content: ' '
  - type: note
    content: cachot 40.15n. – 1S 2.8 ; Ps 105.20s ; Pr 16.13 ; Dn 2.25 ; Ac 7.10.
  - type: text
    content: 'Alors le pharaon fit appeler Joseph. On le fit sortir du cachot en toute hâte. Il se rasa, changea de vêtements et se rendit auprès du pharaon. '
  '15':
  - type: text
    content: 'Le pharaon dit à Joseph : J''ai fait un rêve. Personne ne sait l''interpréter, mais j''ai appris qu''il te suffit d''entendre un rêve pour l''interpréter. '
  '16':
  - type: note
    content: 'Ce n''est pas moi…  : Smr, LXX sans Dieu (ou sans les dieux) il n''y aura pas de réponse… –  qui donnera…  : litt. qui répondra la paix (ou le bien-être, la prospérité) de Pharaon  ; autre traduction qui répondra pour la paix du pharaon. Cf. 40.8+.'
  - type: text
    content: 'Joseph répondit au pharaon : Ce n''est pas moi ! C''est Dieu qui donnera une réponse favorable au pharaon !'
  '17':
  - type: text
    content: 'Le pharaon dit alors à Joseph : Dans mon rêve, je me tenais au bord du Nil. '
  '18':
  - type: text
    content: 'Sept vaches grasses et de belle apparence sont montées du Nil et se sont mises à paître dans les marécages. '
  '19':
  - type: text
    content: 'Puis sept autres vaches sont montées derrière elles, maigres, d''apparence fort vilaine, efflanquées : je n''en ai jamais vu d''aussi vilaines dans toute l''Egypte. '
  '2':
  - type: note
    content: 'belles et grasses  : litt. belles d''aspect (expression fréquente, p. ex. 12.11) et grasses de chair. –  montèrent du Nil  : ce sont les crues du Nil qui faisaient la prospérité de l''Egypte. La déesse Hathor était représentée comme une vache sortant des fourrés du Nil pour répandre la fertilité sur les terres. –  dans les marécages  : autre traduction dans les roseaux  ; le même terme est traduit par papyrus ( ?) en Jb 8.11.'
  - type: text
    content: 'Sept vaches belles et grasses montèrent du Nil et se mirent à paître dans les marécages. '
  '20':
  - type: text
    content: 'Les vaches efflanquées et vilaines ont mangé les sept premières vaches, celles qui étaient grasses. '
  '21':
  - type: note
    content: vilaines v. 2ss.
  - type: text
    content: 'Celles-ci sont entrées dans leur panse, sans qu''on puisse savoir qu''elles y étaient entrées : elles étaient aussi vilaines qu''auparavant. Là-dessus, je me suis réveillé. '
  '22':
  - type: note
    content: Plusieurs versions anciennes semblent avoir lu, au début du v., puis je me suis rendormi.
  - type: text
    content: 'J''ai encore vu ceci en rêve : sept épis montaient sur une même tige, pleins et beaux. '
  '23':
  - type: text
    content: 'Puis sept épis racornis, maigres, brûlés par le vent d''est, ont poussé derrière eux. '
  '24':
  - type: text
    content: Les épis maigres ont englouti les sept beaux épis. Je l'ai dit aux mages, mais personne n'a su me l'expliquer.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Es 43.9,12 ; 44.7 ; Am 3.7 ; Dn 2.28 ; Mc 13.23.
  - type: text
    content: 'Joseph dit au pharaon : Le rêve du pharaon ne fait qu''un ; Dieu indique au pharaon ce qu''il va faire. '
  '26':
  - type: text
    content: 'Les sept belles vaches sont sept années, les sept beaux épis sont sept années : c''est le même rêve. '
  '27':
  - type: note
    content: 'vides  : certaines versions anciennes ont lu maigres. –  sept années de famine  : cf. 2R 8.1.'
  - type: text
    content: 'Les sept vaches efflanquées et vilaines qui montaient derrière les premières sont sept années ; et les sept épis vides, brûlés par le vent d''est, seront sept années de famine. '
  '28':
  - type: text
    content: 'Ainsi, comme je viens de le dire au pharaon, Dieu a montré au pharaon ce qu''il va faire. '
  '29':
  - type: note
    content: Le texte exploite peut-être l'assonance entre le chiffre hébreu correspondant à sept (Shéva‘) et le mot traduit par abondance (sava‘) ici et dans les v. suivants (voir aussi v. 47n).
  - type: text
    content: 'Sept années de grande abondance arrivent pour toute l''Egypte. '
  '3':
  - type: note
    content: 'vilaines et maigres  : litt. mauvaises d''aspect et maigres de chair.'
  - type: text
    content: 'Puis sept autres vaches, vilaines et maigres, montèrent du Nil derrière elles et se tinrent à leurs côtés, au bord du Nil. '
  '30':
  - type: text
    content: 'Sept années de famine les suivront, et on oubliera en Egypte toute cette abondance : la famine réduira le pays à rien. '
  '31':
  - type: text
    content: 'On ne verra plus aucune trace de l''abondance dans le pays, tant la famine qui la suivra sera sévère. '
  '32':
  - type: note
    content: 'Es 46.10. –  va se hâter  : litt. se hâte.'
  - type: text
    content: 'Si le rêve s''est répété au pharaon, par deux fois, c''est que la chose est arrêtée de la part de Dieu et que Dieu va se hâter de la faire. '
  '33':
  - type: note
    content: 'trouve  : litt. voie. –  intelligent / sage  : cf. v. 38 ; Ex 31.1-3 ; 35.30s ; Dt 1.13 ; 1R 3.12 ; 7.13s ; Es 11.2 ; Ac 6.3.'
  - type: text
    content: 'Maintenant, que le pharaon trouve un homme intelligent et sage, et qu''il le nomme intendant de l''Egypte. '
  '34':
  - type: note
    content: 'Cf. v. 48 ; 47.24. –  nomme des inspecteurs  : en hébreu, le verbe et son complément sont apparentés (cf. 40.4n). –  cinquième  : les Egyptiens utilisaient un système décimal, contrairement au système sexagésimal en vigueur en Asie, d''où peut-être la fréquence du chiffre cinq dans le récit (43.34 ; 45.6,11 ; 47.2,24,26 ; cf. Lv 26.8 ; 1S 17.40 ; 2R 7.13 ; Es 19.18). –  des récoltes  : sous-entendu dans le texte ; on pourrait aussi traduire un cinquième de l''Egypte. Cf. 47.13-26.'
  - type: text
    content: 'Que le pharaon agisse et qu''il nomme des inspecteurs dans le pays, pour prélever un cinquième des récoltes de l''Egypte pendant les sept années d''abondance. '
  '35':
  - type: note
    content: 'l''autorité  : litt. la main.'
  - type: text
    content: 'Qu''ils rassemblent tous les vivres de ces bonnes années qui arrivent ; qu''ils fassent, sous l''autorité du pharaon, des réserves de blé et de vivres dans les villes, et qu''ils en aient la garde. '
  '36':
  - type: note
    content: 'décimé  : litt. retranché.'
  - type: text
    content: Ces vivres seront en dépôt pour le pays, en vue des sept années de famine qu'il y aura en Egypte, afin que le pays ne soit pas décimé par la famine.
  - type: heading
    content: Joseph devient ministre du pharaon
  '37':
  - type: text
    content: 'Cette parole plut au pharaon et à tous les gens de sa cour ; '
  '38':
  - type: note
    content: 'le souffle (ou l''Esprit) de Dieu (ou des dieux, 1.1n) : cf. Ex 31.3 ; 1S 10.6 ; 11.6 ; 16.13 ; Dn 4.5s,15 ; 5.11-14.'
  - type: text
    content: 'le pharaon dit aux gens de sa cour : Pourrions-nous trouver un autre homme comme celui-ci, qui a en lui le souffle de Dieu ? '
  '39':
  - type: text
    content: 'Le pharaon dit à Joseph : Puisque Dieu t''a fait connaître tout cela, il n''y a personne qui soit aussi intelligent et aussi sage que toi. '
  '4':
  - type: text
    content: 'Les vaches vilaines et maigres mangèrent les sept vaches belles et grasses. Là-dessus, le pharaon se réveilla. '
  '40':
  - type: note
    content: 'Cf. Pr 22.29. –  seras intendant de ou auras autorité sur  : cf. Es 22.15n  ; 36.3. –  dépendra de tes ordres  : litt. et tout mon peuple embrassera sur ta bouche, ce qui peut aussi signifier  : t''honorera, te sera reconnaissant, ou bien  : se pourvoira par ta bouche, c.-à-d. par tes ordres.'
  - type: text
    content: 'C''est toi qui seras intendant de ma maison, et tout mon peuple dépendra de tes ordres. C''est seulement par le trône que je serai plus grand que toi. '
  '41':
  - type: note
    content: 39.4.
  - type: text
    content: 'Le pharaon dit à Joseph : Regarde, je te nomme intendant de toute l''Egypte. '
  '42':
  - type: note
    content: 'bague à cachet  : Joseph pourra sceller ses décisions du sceau pharaonique. Cf. Est 3.10 ; 8.2,15 ; Dn 5.7,29.'
  - type: text
    content: 'Le pharaon retira de son doigt la bague à cachet et la mit au doigt de Joseph ; il le fit revêtir d''habits de fin lin et lui mit un collier d''or au cou. '
  '43':
  - type: note
    content: 'Cf. Est 5.6-11. –  le second de ses chars  : litt. le second char qui (était) à lui  ; expression analogue en 2Ch 35.24. –  Abrek est sans doute un mot égyptien (peut-être  : Attention !). Il ressemble au mot hébreu bérék, qui signifie genou, d''où la traduction fréquente  : à genoux ! On l''a également rapproché d''un mot sémitique qui signifie intendant (cf. Jr 46.15n).'
  - type: text
    content: 'Il le fit monter sur le second de ses chars ; on criait devant lui : '
  - type: text
    content: Abrek !
  - type: text
    content: ' C''est ainsi que le pharaon le nomma intendant de toute l''Egypte. '
  '44':
  - type: text
    content: 'Le pharaon dit encore à Joseph : Je suis le pharaon ! Sans ta permission personne ne lèvera la main ni le pied dans toute l''Egypte. '
  '45':
  - type: note
    content: 'Tsaphnath-Panéah  : ce nom égyptien dont on ignore la signification exacte (salut du monde, soutien de la vie, chef des scribes  ?) est souvent interprété d''après l''hébreu  : il découvre les choses cachées. –  Aséneth ([Appartenant] à [la déesse] Neith  ; voir aussi v. 50 ; 46.20) est la fille du prêtre du sanctuaire d''Héliopolis (= On, cf. Ex 1.11n), à 10 km au nord du Caire. Le nom de Poti-Phéra rappelle celui de Potiphar (37.36 ; 39.1). –  put circuler en Egypte  : traduction incertaine, litt. sortit sur l''Egypte  ; on pourrait aussi comprendre commença à prendre autorité sur l''Egypte  ; cf. v. 46.'
  - type: text
    content: 'Le pharaon appela Joseph du nom de Tsaphnath-Panéah. Il lui donna pour femme Aséneth, fille de Poti-Phéra, prêtre d''On. Alors Joseph put circuler en Egypte. '
  '46':
  - type: text
    content: Joseph avait trente ans lorsqu'il se présenta devant le pharaon, le roi d'Egypte ; il se retira de devant le pharaon et parcourut toute l'Egypte.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'le pays travailla  : on pourrait aussi traduire la terre produisit  ; litt. la terre fit l''abondance (comme aux v. 29ss) par poignées.'
  - type: text
    content: 'Pendant les sept années d''abondance, le pays travailla à plein. '
  '48':
  - type: text
    content: 'Joseph rassembla tous les vivres de ces sept années en Egypte ; il plaça les vivres dans les villes, à l''intérieur de chaque ville les vivres de la campagne environnante. '
  '49':
  - type: note
    content: 'parce que c''était impossible  : litt. parce qu''il n''y a(vait) pas de compte (ou de nombre).'
  - type: text
    content: Joseph amassa du blé comme le sable de la mer ; la quantité en était si considérable qu'on cessa de compter, parce que c'était impossible.
  '5':
  - type: text
    content: 'Il se rendormit et fit un deuxième rêve : sept épis montaient sur une même tige, gras et beaux. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'V. 45 ; voir 48.5. –  la première année de famine  : litt. l''année de la famine.'
  - type: text
    content: 'Avant la première année de famine, deux fils naquirent de Joseph, ceux que lui donna Aséneth, fille de Poti-Phéra, prêtre d''On. '
  '51':
  - type: note
    content: 'Le nom de Manassé (hébreu Menashé) est rapproché de l''expression m''a fait oublier (hébreu nashani), que certains traduisent m''a crédité de  ; même verbe en Es 44.21 ; Jb 11.6 ; 39.17n  ; Lm 3.17. –  dit-il  : sous-entendu dans le texte, de même au v. 52. –  la maison de mon père  : autre traduction ma famille.'
  - type: text
    content: 'Joseph appela le premier-né du nom de Manassé (« Oubli ») – car, dit-il, Dieu m''a fait oublier toute ma peine et toute la maison de mon père. '
  '52':
  - type: note
    content: Le nom d’Ephraïm est rapproché de l'expression m'a rendu fécond (hébreu hiphrani) ; voir Os 9.16n. –  mon affliction ou mon humiliation, mon oppression (cf. 15.13n).
  - type: text
    content: Il appela le second du nom d'Ephraïm (« Fécondité ») – car, dit-il, Dieu m'a rendu fécond au pays de mon affliction.
  '53':
  - type: text
    content: 'Les sept années d''abondance qu''il y avait eu en Egypte s''achevèrent, '
  '54':
  - type: note
    content: 'du pain  : cf. 37.25n.'
  - type: text
    content: 'et les sept années de famine commencèrent à arriver, comme Joseph l''avait dit. Il y avait la famine dans tous les pays ; mais dans toute l''Egypte, il y avait du pain. '
  '55':
  - type: note
    content: 'Cf. Jn 2.5. –  toute l''Egypte  : autre traduction tous les Egyptiens.'
  - type: text
    content: 'Quand toute l''Egypte aussi fut affamée, le peuple cria vers le pharaon pour avoir du pain. Le pharaon dit à toute l''Egypte : Allez voir Joseph et faites ce qu''il vous dira. '
  '56':
  - type: note
    content: 'vendit du grain  : le même verbe est rendu par acheter du grain au v. 57. –  à l''Egypte  : autre traduction aux Egyptiens. – Cf. 47.13-26.'
  - type: text
    content: 'La famine sévissait dans tout le pays. Joseph ouvrit toutes les réserves et vendit du grain à l''Egypte. La famine était forte en Egypte. '
  '57':
  - type: note
    content: acheter v. 56n. –  toute la terre ou tous les pays. Le même mot hébreu peut être rendu soit par terre soit par pays (v. 47n  ; 13.6n). Cf. Ps 105.16 ; Ac 7.11.
  - type: text
    content: De toute la terre on venait en Egypte pour acheter du grain auprès de Joseph ; car la famine était forte sur toute la terre.
  '6':
  - type: note
    content: Le vent d'est est celui qui apporte la sécheresse en Israël.
  - type: text
    content: 'Puis sept épis maigres et brûlés par le vent d''est poussèrent derrière eux. '
  '7':
  - type: text
    content: 'Les épis maigres engloutirent les sept épis gras et pleins. Là-dessus, le pharaon se réveilla : c''était un rêve.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'était troublé  : litt. avait l''esprit (le même terme est traduit par souffle au v. 38) troublé , cf. Dn 2.1. –  mages / sages Ex 7.11,22 ; Dn 2.2,27 ; 5.7. –  ses rêves  : litt. son rêve  ; cf. v. 25s.'
  - type: text
    content: 'Au matin, le pharaon était troublé ; il fit appeler tous les mages et tous les sages de l''Egypte et il leur raconta ses rêves, mais personne ne put les lui interpréter. '
  '9':
  - type: note
    content: 'grand échanson 40.1-14. –  mes péchés  : autre traduction mes manquements, cf. 40.1n.'
  - type: text
    content: 'Alors le grand échanson dit au pharaon : Je vais évoquer aujourd''hui le souvenir de mes péchés. '
