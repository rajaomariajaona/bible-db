        text: ) ici et dans les v. suivants (voir aussi v. 47
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Sept années de grande abondance arrivent pour toute l''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Sept années de famine les suivront, et on oubliera en Egypte toute cette abondance : la famine réduira le pays à rien. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'On ne verra plus aucune trace de l''abondance dans le pays, tant la famine qui la suivra sera sévère. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 46.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: va se hâter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se hâte.
    marker-yv: yv-n
  - type: text
    text: 'Si le rêve s''est répété au pharaon, par deux fois, c''est que la chose est arrêtée de la part de Dieu et que Dieu va se hâter de la faire. '
  - type: usfm
    marker: v
