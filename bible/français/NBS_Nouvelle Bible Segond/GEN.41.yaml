        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 38 ; Ex 31.1-3 ; 35.30s ; Dt 1.13 ; 1R 3.12 ; 7.13s ; Es 11.2 ; Ac 6.3.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, que le pharaon trouve un homme intelligent et sage, et qu''il le nomme intendant de l''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 48 ; 47.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nomme des inspecteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : en hébreu, le verbe et son complément sont apparentés (cf. 40.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cinquième
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les Egyptiens utilisaient un système décimal, contrairement au système sexagésimal en vigueur en Asie, d''où peut-être la fréquence du chiffre cinq dans le récit (43.34 ; 45.6,11 ; 47.2,24,26 ; cf. Lv 26.8 ; 1S 17.40 ; 2R 7.13 ; Es 19.18). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des récoltes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un cinquième de l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 47.13-26.
    marker-yv: yv-n
  - type: text
    text: 'Que le pharaon agisse et qu''il nomme des inspecteurs dans le pays, pour prélever un cinquième des récoltes de l''Egypte pendant les sept années d''abondance. '
  - type: usfm
    marker: v
    metadata:
