document_id: GEN.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rêves du pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rêve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '37.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fleuve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; autre mot hébreu qu'en 31.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 36.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Au bout de deux ans, le pharaon fit un rêve : il se tenait près du Nil. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: belles et grasses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'belles d''aspect '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(expression fréquente, p. ex. 12.11) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et grasses de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: montèrent du Nil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce sont les crues du Nil qui faisaient la prospérité de l''Egypte. La déesse Hathor était représentée comme une vache sortant des fourrés du Nil pour répandre la fertilité sur les terres. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans les marécages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans les roseaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'papyrus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ( ?) en Jb 8.11.
    marker-yv: yv-n
  - type: text
    text: 'Sept vaches belles et grasses montèrent du Nil et se mirent à paître dans les marécages. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vilaines et maigres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mauvaises d'aspect et maigres de chair.
    marker-yv: yv-n
  - type: text
    text: 'Puis sept autres vaches, vilaines et maigres, montèrent du Nil derrière elles et se tinrent à leurs côtés, au bord du Nil. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les vaches vilaines et maigres mangèrent les sept vaches belles et grasses. Là-dessus, le pharaon se réveilla. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il se rendormit et fit un deuxième rêve : sept épis montaient sur une même tige, gras et beaux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vent d''est '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est celui qui apporte la sécheresse en Israël.
    marker-yv: yv-n
  - type: text
    text: 'Puis sept épis maigres et brûlés par le vent d''est poussèrent derrière eux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les épis maigres engloutirent les sept épis gras et pleins. Là-dessus, le pharaon se réveilla : c''était un rêve.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: était troublé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avait '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'esprit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souffle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 38) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: troublé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Dn 2.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 7.11,22 ; Dn 2.2,27 ; 5.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses rêves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son rêve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 25s.
    marker-yv: yv-n
  - type: text
    text: 'Au matin, le pharaon était troublé ; il fit appeler tous les mages et tous les sages de l''Egypte et il leur raconta ses rêves, mais personne ne put les lui interpréter. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grand échanson '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '40.1-14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes péchés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mes manquements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 40.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors le grand échanson dit au pharaon : Je vais évoquer aujourd''hui le souvenir de mes péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous, ses serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les gens de sa cour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 12 ; 20.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il nous avait fait mettre aux arrêts… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 40.2ss.
    marker-yv: yv-n
  - type: text
    text: 'Le pharaon était en colère contre nous, ses serviteurs ; il nous avait fait mettre aux arrêts dans la maison du chef des gardes, moi et le grand panetier. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 40.5.
    marker-yv: yv-n
  - type: text
    text: 'Au cours d''une même nuit, moi et lui, nous avons fait chacun un rêve ayant son interprétation propre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '39.1,14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: esclave.
    marker-yv: yv-n
  - type: text
    text: 'Il y avait là avec nous un jeune Hébreu, serviteur du chef des gardes. Nous lui avons raconté nos rêves et il nous les a interprétés ; à chacun il a interprété son rêve. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il m'a rétabli…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le sujet n''est pas précisé ; il pourrait s''agir du pharaon ou de Joseph, dont l''interprétation serait considérée comme cause des événements.'
    marker-yv: yv-n
  - type: text
    text: 'Tout est arrivé exactement selon l''interprétation qu''il nous avait donnée : il m''a rétabli dans ma charge et il a fait pendre l''autre.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph interprète les rêves du pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cachot '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '40.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – 1S 2.8 ; Ps 105.20s ; Pr 16.13 ; Dn 2.25 ; Ac 7.10.
    marker-yv: yv-n
  - type: text
    text: 'Alors le pharaon fit appeler Joseph. On le fit sortir du cachot en toute hâte. Il se rasa, changea de vêtements et se rendit auprès du pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le pharaon dit à Joseph : J''ai fait un rêve. Personne ne sait l''interpréter, mais j''ai appris qu''il te suffit d''entendre un rêve pour l''interpréter. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ce n'est pas moi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Smr, LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sans Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans les dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il n''y aura pas de réponse… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui donnera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui répondra la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le bien-être, la prospérité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Pharaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui répondra pour la paix du pharaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 40.8+.
    marker-yv: yv-n
  - type: text
    text: 'Joseph répondit au pharaon : Ce n''est pas moi ! C''est Dieu qui donnera une réponse favorable au pharaon !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le pharaon dit alors à Joseph : Dans mon rêve, je me tenais au bord du Nil. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Sept vaches grasses et de belle apparence sont montées du Nil et se sont mises à paître dans les marécages. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis sept autres vaches sont montées derrière elles, maigres, d''apparence fort vilaine, efflanquées : je n''en ai jamais vu d''aussi vilaines dans toute l''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les vaches efflanquées et vilaines ont mangé les sept premières vaches, celles qui étaient grasses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vilaines '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2ss.
    marker-yv: yv-n
  - type: text
    text: 'Celles-ci sont entrées dans leur panse, sans qu''on puisse savoir qu''elles y étaient entrées : elles étaient aussi vilaines qu''auparavant. Là-dessus, je me suis réveillé. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs versions anciennes semblent avoir lu, au début du v., '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: puis je me suis rendormi.
    marker-yv: yv-n
  - type: text
    text: 'J''ai encore vu ceci en rêve : sept épis montaient sur une même tige, pleins et beaux. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Puis sept épis racornis, maigres, brûlés par le vent d''est, ont poussé derrière eux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les épis maigres ont englouti les sept beaux épis. Je l'ai dit aux mages, mais personne n'a su me l'expliquer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 43.9,12 ; 44.7 ; Am 3.7 ; Dn 2.28 ; Mc 13.23.
    marker-yv: yv-n
  - type: text
    text: 'Joseph dit au pharaon : Le rêve du pharaon ne fait qu''un ; Dieu indique au pharaon ce qu''il va faire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les sept belles vaches sont sept années, les sept beaux épis sont sept années : c''est le même rêve. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vides
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certaines versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maigres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept années de famine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 8.1.'
    marker-yv: yv-n
  - type: text
    text: 'Les sept vaches efflanquées et vilaines qui montaient derrière les premières sont sept années ; et les sept épis vides, brûlés par le vent d''est, seront sept années de famine. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ainsi, comme je viens de le dire au pharaon, Dieu a montré au pharaon ce qu''il va faire. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte exploite peut-être l''assonance entre le chiffre hébreu correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sept '
    - type: usfm
      marker: ft
      children:
