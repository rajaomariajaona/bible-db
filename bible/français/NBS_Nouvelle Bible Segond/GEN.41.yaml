      marker: fr
      children:
      - type: text
        text: '41.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'autorité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la main.
    marker-yv: yv-n
  - type: text
    text: 'Qu''ils rassemblent tous les vivres de ces bonnes années qui arrivent ; qu''ils fassent, sous l''autorité du pharaon, des réserves de blé et de vivres dans les villes, et qu''ils en aient la garde. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: décimé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: retranché.
    marker-yv: yv-n
  - type: text
    text: Ces vivres seront en dépôt pour le pays, en vue des sept années de famine qu'il y aura en Egypte, afin que le pays ne soit pas décimé par la famine.
