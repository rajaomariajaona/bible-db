  - type: text
    text: Celui-ci revint se faire soigner à Jizréel des blessures qu'on lui avait infligées à Rama, lorsqu'il combattait Hazaël, roi d'Aram. Azaria, fils de Joram, roi de Juda, descendit pour voir Joram, fils d'Achab, à Jizréel, parce qu'il allait très mal.
