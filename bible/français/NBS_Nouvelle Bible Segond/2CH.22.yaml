  - type: text
    text: 'Mais Yehoshabéath, fille du roi, prit Joas, fils d''Achazia, et l''enleva d''entre les fils du roi qui étaient mis à mort : elle le mit avec sa nourrice dans la chambre des lits. Ainsi Yehoshabéath, fille du roi Joram, femme de Joïada, le prêtre – c''était la sœur d''Achazia – le mit à l''abri d''Athalie, qui ne le mit pas à mort. '
