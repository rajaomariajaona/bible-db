document_id: 2CH.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Achazia
  - type: heading
    content: 2R 8.25-29
  - type: text
    content: ' '
  - type: note
    content: 'Achazia  : appelé aussi Joachaz (21.17) ; les deux noms ont la même signification  : YHWH fortifie . –  la troupe armée  : cf. 21.16s. –  les Arabes  : cf. 17.11n.'
  - type: text
    content: 'A sa place, les habitants de Jérusalem investirent de la royauté Achazia, son plus jeune fils, car la troupe armée venue au camp avec les Arabes avait tué tous les plus âgés. Ainsi Achazia, fils de Joram, roi de Juda, devint roi. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Athalie  : fille d''Achab et de Jézabel, voir v. 2. –  fit disparaître  : litt. se leva et détruisit , d''après LXX  ; le texte hébreu traditionnel porte se leva et parla avec (selon certains, la forme du verbe correspondant à et parla pourrait aussi signifier détruisit , mais cela est peu probable) ; quelques mss s''accordent avec 2R 11.1 ( fit disparaître ). –  de la maison de Juda  : absent de 2R 11.1.'
  - type: text
    content: 'Athalie, mère d''Achazia, vit que son fils était mort. Elle fit disparaître toute la descendance royale de la maison de Juda. '
  '11':
  - type: note
    content: 'Joas  : Yo''ash ou Yeho''ash, ce qui pourrait signifier YHWH donne. Joas sera roi de Juda (23.11) ; un roi d''Israël porte le même nom (2R 13.10). –  femme de Joïada, le prêtre  : précision absente de 2R 11.2.'
  - type: text
    content: 'Mais Yehoshabéath, fille du roi, prit Joas, fils d''Achazia, et l''enleva d''entre les fils du roi qui étaient mis à mort : elle le mit avec sa nourrice dans la chambre des lits. Ainsi Yehoshabéath, fille du roi Joram, femme de Joïada, le prêtre – c''était la sœur d''Achazia – le mit à l''abri d''Athalie, qui ne le mit pas à mort. '
  '12':
  - type: note
    content: 'avec eux  : cf. 2R 11.3n (avec elle).'
  - type: text
    content: Il resta six ans caché avec eux dans la maison de Dieu, tandis qu'Athalie régnait sur le pays.
  '2':
  - type: note
    content: 'quarante-deux ans  : 2R 8.26 vingt-deux ans  ; des versions anciennes portent soit seize ans, soit vingt ans, soit vingt-deux ans  ; voir aussi 2Ch 21.5,20. –  Athalie, fille d''Omri (d''Achab, selon certains mss de LXX) : Athalie est fille d''Achab et petite-fille d''Omri, mais le terme fille peut venir du fait qu’Omri est le fondateur de la dynastie, cf. 1R 16.21-29.'
  - type: text
    content: 'Achazia avait quarante-deux ans lorsqu''il devint roi ; il régna un an à Jérusalem. Le nom de sa mère était Athalie, fille d''Omri. '
  '3':
  - type: note
    content: 'Il suivit lui aussi…  : cf. 21.6. –  par ses conseils…  : litt. le conseillait pour agir en méchant  ; voir justice.'
  - type: text
    content: 'Il suivit lui aussi les voies de la maison d''Achab, car sa mère, par ses conseils, le portait à agir en méchant. '
  '4':
  - type: note
    content: ce qui déplaisait au Seigneur 1R 11.6n.
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme la maison d''Achab, où il eut, après la mort de son père, des conseillers pour sa perte. '
  '5':
  - type: note
    content: 'Cf. 18.2nss/ /. –  les Araméens  : la plupart des mss présentent ici une forme inhabituelle du terme ; LXX a lu les archers.'
  - type: text
    content: 'C''est sur leur conseil qu''il alla avec Joram, fils d''Achab, roi d''Israël, à la guerre contre Hazaël, roi d''Aram, à Ramoth de Galaad ; là, les Araméens blessèrent Joram. '
  '6':
  - type: note
    content: 'se faire soigner… des blessures  : litt. se faire soigner… car des blessures  ; quelques mss hébreux et des versions anciennes portent le même texte que 2R 8.29. –  qu''on lui avait infligées  : LXX que les Syriens (= Araméens) lui avaient infligées. –  Rama (Hauteur) est le singulier de Ramoth, cf. v. 5. –  Azaria (hébreu ‘Azaryahou) : quelques mss hébreux, ainsi que LXX, Syr et Vg portent Achazia, cf. 2R 8.29. –  Jizréel  : les rois d''Israël ont souvent résidé à Jizréel, cf. 1R 18.45 ; 21.1. –  parce qu''il allait très mal 2R 8.29n.'
  - type: text
    content: Celui-ci revint se faire soigner à Jizréel des blessures qu'on lui avait infligées à Rama, lorsqu'il combattait Hazaël, roi d'Aram. Azaria, fils de Joram, roi de Juda, descendit pour voir Joram, fils d'Achab, à Jizréel, parce qu'il allait très mal.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 9.21. –  Du fait de Dieu  : litt. par Dieu ou (venant) de Dieu . –  Jéhu… à qui le Seigneur avait conféré l''onction…  : cf. 2R 9.6-9. 2R 9–10 raconte longuement l''histoire de Jéhu, alors que les Chroniques (comme ailleurs) ne retiennent que ce qui intéresse directement le royaume de Juda.'
  - type: text
    content: 'Du fait de Dieu, c''est pour sa ruine qu''Achazia se rendit auprès de Joram. Lorsqu''il fut arrivé, il sortit avec Joram pour aller auprès de Jéhu, fils de Nimshi, à qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait conféré l''onction pour qu''il retranche la maison d''Achab. '
  '8':
  - type: note
    content: 'était en conflit avec  : autre traduction exécutait ses jugements sur  ; la forme verbale correspondante est traduite par être ou entrer en jugement en 1S 12.7 ; Jl 4.2+ ; Ps 37.33. –  les princes de Juda  : absent de 2R 9.21. –  les fils des frères d''Achazia  : LXX porte les frères d''Achazia  ; cf. 21.16s ; 2R 10.11-14. Il se peut que le terme correspondant à frères soit employé dans ce verset dans un sens plus large, pour désigner les cousins ou les membres de la famille royale.'
  - type: text
    content: 'Comme Jéhu était en conflit avec la maison d''Achab, il trouva les princes de Juda et les fils des frères d''Achazia, qui étaient au service d''Achazia, et il les tua. '
  '9':
  - type: note
    content: 'Cf. 2R 9.27ss. –  Samarie  : 18.2n. –  fils de Josaphat, c.-à-d. le petit-fils de Josaphat. La mention de Josaphat dans ce contexte est propre aux Chroniques. –  de tout son cœur 1R 8.23+.'
  - type: text
    content: 'Il rechercha Achazia, et on le saisit à Samarie où il s''était caché. On l''amena auprès de Jéhu et on le mit à mort. Puis on l''ensevelit, car on disait : C''est le fils de Josaphat, qui cherchait le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tout son cœur. Il ne resta personne de la maison d''Achazia qui fût en état de régner.'
  - type: heading
    content: Athalie s'empare du pouvoir
  - type: heading
    content: 2R 11.1-3
