  - type: text
    text: 'A sa place, les habitants de Jérusalem investirent de la royauté Achazia, son plus jeune fils, car la troupe armée venue au camp avec les Arabes avait tué tous les plus âgés. Ainsi Achazia, fils de Joram, roi de Juda, devint roi. '
