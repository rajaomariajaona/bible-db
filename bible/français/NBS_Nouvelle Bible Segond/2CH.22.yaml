  - type: text
    text: 'C''est sur leur conseil qu''il alla avec Joram, fils d''Achab, roi d''Israël, à la guerre contre Hazaël, roi d''Aram, à Ramoth de Galaad ; là, les Araméens blessèrent Joram. '
