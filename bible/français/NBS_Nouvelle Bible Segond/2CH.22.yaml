    marker-yv: yv-n
  - type: text
    text: 'Du fait de Dieu, c''est pour sa ruine qu''Achazia se rendit auprès de Joram. Lorsqu''il fut arrivé, il sortit avec Joram pour aller auprès de Jéhu, fils de Nimshi, à qui le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait conféré l''onction pour qu''il retranche la maison d''Achab. '
  - type: usfm
    marker: v
