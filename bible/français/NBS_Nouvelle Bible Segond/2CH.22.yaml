  - type: text
    text: 'Il rechercha Achazia, et on le saisit à Samarie où il s''était caché. On l''amena auprès de Jéhu et on le mit à mort. Puis on l''ensevelit, car on disait : C''est le fils de Josaphat, qui cherchait le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' de tout son cœur. Il ne resta personne de la maison d''Achazia qui fût en état de régner.'
