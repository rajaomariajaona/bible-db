document_id: EST.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre d''Esther réunit en quelques pages tous les ingrédients d''un récit captivant : intrigue à rebondissements, caractères bien campés, intensité dramatique, renversements de situations. La tension est d''autant plus vive que, dans les péripéties vécues par les deux héros Esther et Mardochée, c''est '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: le sort de tout un peuple
    - type: text
      text: ' qui se joue. Ce livre n''a jamais perdu de son actualité pour le judaïsme. Aujourd''hui encore, la fête annuelle de '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pourim
    - type: text
      text: ' (= les '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sorts,
    - type: text
      text: ' voir 3.7'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ) rappelle la délivrance obtenue par la reine Esther. Après le drame de la Shoah, ce récit éveille même des résonances plus profondes que jamais.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le cadre de l'action
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le décor est planté : la cour de Perse, sous le règne d''un roi nommé en hébreu '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahashwérosh
    - type: text
      text: ' (transcription usuelle Assuérus). Celui-ci correspond de toute évidence, par le nom, par le caractère et par l''étendue de son empire, à celui que l''histoire antique connaît sous le nom de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Xerxès Ier
    - type: text
      text: ' (486-465) — Xerxès et '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ahashwérosh
    - type: text
      text: ' sont en fait deux déformations différentes du même original perse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hashayarsha
    - type: text
      text: . C'est sans doute le même souverain qui est mentionné en Esdras 4.6 (voir aussi Dn 9.1
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ). Si le nom Mardochée a été retrouvé sur un document de cette époque, l'existence des personnages importants du récit n'a pu être confirmée par des informations extérieures ; l'identification d'Esther ou de Vashti avec la reine Amestris dont parle l'historien grec Hérodote est impossible pour la première, peu probable pour la seconde.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Suse
    - type: text
      text: ', ancienne capitale d''Elam, choisie comme ville de résidence royale par Darius I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ', le père de Xerxès, s''élevait sur une vaste terrasse aux murs cyclopéens soutenant trois ensembles : la ville, la forteresse et le palais royal. Le mot traduit par '
    - type: usfm
      marker: it
      children:
      - type: text
        text: citadelle
    - type: text
      text: ' tout au long du livre d''Esther (Est 1.2'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: '  ; Né 1.1 ; Dn 8.2) désigne probablement l''acropole fortifiée où se dressait le palais royal. Des fouilles entreprises au XIX'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle ont permis de retrouver des objets et des éléments de l''architecture de ce palais.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Dans l'histoire biblique, les événements racontés s'insèrent entre l'époque du premier retour à Jérusalem conduit par Zorobabel et Josué (Esd 1–6, à l'exception de 4.6-23) sous le règne de Cyrus (538-530) et celle de Néhémie, qui a exercé son activité sous le règne du successeur direct de Xerxès, Artaxerxès I
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' (465-424). Ces deux périodes, marquées par la reconstruction du temple et des murailles de Jérusalem, font apparaître la domination perse comme plutôt '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: favorable aux Juifs
    - type: text
      text: . Les livres d'Esdras et de Néhémie évoquent pourtant de sérieuses menaces (Esd 4 ; Né 3.33–4.17) ; en outre, le roi Xerxès a laissé dans l'histoire extra-biblique le souvenir de la dure répression d'une révolte à Babylone et, plus généralement, celui d'un personnage peu équilibré et violent. On comprend que sous le règne d'un tel monarque nul ne pouvait se sentir en parfaite sécurité et que la faveur imprudemment accordée à un intrigant sans scrupules ait pu faire courir aux Juifs les plus graves dangers.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Des banquets où tout se décide
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le lecteur n''aura pas besoin de plan pour suivre un récit dont les événements s''enchaînent naturellement. Qui s''intéresse à la structure du texte découvrira tout un réseau de similitudes et de symétries, complexe et fascinant (voir « Les récits doubles dans les histoires de Joseph et d''Esther », p.${Xdbjosest} ; « Daniel, Joseph et Esther : quelques similitudes narratives », p.${Xdnjosest}). Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: banquets
    - type: text
      text: ' donnent une trame au récit ; tout commence (1.3,5,9) et tout finit par un banquet (8.17 ; 9.17-22), tout semble aussi s''y décider : la disgrâce de la reine Vashti, le sort des Juifs, la disgrâce de Haman. Grands fastes des banquets royaux (1.3 ; 2.18), soupers intimes offerts par la reine au roi et à son grand vizir (5.4,8), réjouissances d''un peuple qui échappe à la « solution finale » (8.17 ; 9.17) : le mot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: banquet
    - type: text
      text: ', en recouvrant des réalités si différentes, invite à établir entre elles des correspondances. Par un jeu subtil, jeûne et banquet sont aussi opposés. Alors que Haman, fier du mauvais coup qu''il prépare, s''installe pour boire avec le roi (3.15), les Juifs de l''empire jeûnent et se lamentent (4.3) ; Esther aussi jeûne avec ses servantes (4.16) avant d''affronter le roi et Haman… au cours d''un banquet.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Mais ce qui peut aussi se jouer derrière l''opposition entre Haman, descendant d''Agag, et Mardochée, descendant de Qish, c''est la liquidation de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: faute de Saül
    - type: text
      text: ' (cf. 1S 15). La victoire de Haman serait alors la revanche d''Agag ; celle de Mardochée rachèterait la faute de Saül, qui a pesé sur toute la royauté jusqu''à l''exil.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un peuple à part
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Omniprésence des banquets, absence surprenante du nom de Dieu et de toute référence explicite à la religion ou au statut particulier du peuple élu. Certains rabbins en ont été troublés au point d''hésiter à inclure le livre d''Esther dans le canon. En fait l''auteur, en s''effaçant derrière son récit et en adoptant apparemment le point de vue d''un observateur neutre, sans conviction religieuse particulière, s''est ménagé la possibilité de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: suggérer
    - type: text
      text: ' ce qu''il taisait. Car même en temps d''exil, alors qu''Israël ne paraît plus être qu''un peuple parmi les autres, il est encore providentiellement protégé. Procédant par touches discrètes, l''auteur recueille de la bouche de Haman, l''ennemi des Juifs, cette reconnaissance paradoxale du statut particulier d''Israël qui est un des thèmes favoris de l''antisémitisme : c''est '
    - type: usfm
      marker: it
      children:
      - type: text
        text: un peuple à part…
    - type: text
      text: ' (3.8). Mardochée évoque un mystérieux secours qui surgira '
    - type: usfm
      marker: it
      children:
      - type: text
        text: d'un autre côté
    - type: text
      text: ' (4.14) si Esther refuse de risquer sa vie pour le salut de son peuple. Des lèvres de la femme même de Haman tombe cette sentence : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: S'il est juif, ce Mardochée devant qui tu as commencé de déchoir, tu ne tiendras pas devant lui. Ta déchéance sera totale
    - type: text
      text: ' (6.13). Et au final, il apparaît que la maîtrise de l''histoire n''appartient pas aux sorts et aux dieux babyloniens Mardouk et Ishtar, adoptés par les Perses, mais au Dieu — pourtant non mentionné — des Juifs Mardochée et Esther, qui a peut-être fait Esther reine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pour une occasion comme celle-ci
    - type: text
      text: ' (4.14).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Au seuil d''un temps qui est pour les traditions juive et chrétienne celui du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: silence prophétique
    - type: text
      text: ', le livre d''Esther introduit le lecteur au mystère d''Israël : le Dieu qui garde le silence assure cependant la survie du peuple juif, même dans une situation de '
    - type: usfm
      marker: it
      children:
      - type: text
        text: diaspora
    - type: text
      text: ' qui est ainsi, discrètement, justifiée. Mystère du silence de Dieu pour le juif qui attend toujours le Messie, mystère de la persistance d''Israël pour le chrétien que l''apôtre Paul appelle, pour cela même, à une saine humilité.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'univers impitoyable dans lequel se joue le drame pose le problème douloureux de la résolution des conflits dans notre monde. La manière dont les Juifs, sous la direction de Mardochée mais dans les conditions définies par Xerxès, triomphent de leurs ennemis, appelle, plus que le jugement sommaire d'observateurs qui n'ont pas à lutter pour leur survie, une réflexion honnête sur les conditions réelles d'existence et de sécurité de certains peuples dans ce monde, notamment en situation d'immigration, et sur le caractère peut-être irréductible de certains conflits.
