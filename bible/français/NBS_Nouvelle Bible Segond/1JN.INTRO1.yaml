document_id: 1JN.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Qui ? A qui ? Pourquoi ? Le lecteur moderne qui aborde les trois épîtres logées, dans nos Bibles, entre la Seconde de Pierre et Jude ne peut que '
  - type: text
    content: deviner
  - type: text
    content: ' la réponse à ces questions.'
  - type: text
    content: Un auteur inconnu ?
  - type: text
    content: 'Une seule personne semble être derrière les trois écrits : sa trace, sa marque, se reconnaît. Dans le deuxième et le troisième, l''auteur s''intitule '
  - type: text
    content: l'ancien
  - type: text
    content: ' (2Jn 1 ; 3Jn 1). La parenté de style, de termes et de thèmes avec le quatrième évangile est si frappante (voir l''encadré ci-dessous) qu''on suppose volontiers une origine commune. A tout le moins, on admettra que les trois épîtres émanent d''une '
  - type: text
    content: « école johannique »
  - type: text
    content: ' où fructifiait le message de l''apôtre.'
  - type: text
    content: 'La deuxième et la troisième épître de Jean sont typiquement des '
  - type: text
    content: lettres
  - type: text
    content: ', à la mode du temps. La première épître, tout en gardant beaucoup de chaleur personnelle, ressemble davantage à un sermon, à une homélie familière et pressante mise par écrit. On a pu parler d''une « encyclique » ou d''un « traité ». Elle pourrait être postérieure de quelques années au quatrième évangile, répliquant peut-être à l''abus qu''on avait fait de certaines de ses formules.'
  - type: text
    content: 'L''auteur de la première épître parle au nom des '
  - type: text
    content: témoins oculaires
  - type: text
    content: ' – notion qu''il approfondit. Il insiste sur la '
  - type: text
    content: parole
  - type: text
    content: ' qu''il apporte, celle-là même '
  - type: text
    content: qui était dès le commencement
  - type: text
    content: ' (1Jn 1.1-4 ; cf. Jn 1.1ss,14). Il a grand souci du '
  - type: text
    content: vrai
  - type: text
    content: ' (cf. 1Jn 5.20). Ce souci transparaît notamment dans l''opposition de '
  - type: text
    content: l'Esprit de la vérité
  - type: text
    content: ' et de '
  - type: text
    content: l'esprit de l'égarement
  - type: text
    content: ', qui rappelle les écrits de Qumrân* et les '
  - type: text
    content: Testaments* des Douze patriarches
  - type: text
    content: ' (voir 1Jn 4.6'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: Des fauteurs de troubles
  - type: text
    content: 'L''Ancien écrit à des Eglises troublées dans leurs certitudes : il veut chasser toute ombre de leur '
  - type: text
    content: communion
  - type: text
    content: ' (1Jn 1.3s), raffermir les fondements de leur '
  - type: text
    content: assurance
  - type: text
    content: ' (2.28+), les prémunir contre une déstabilisation diabolique en rappelant les critères du christianisme authentique : '
  - type: text
    content: A ceci
  - type: text
    content: ' ou '
  - type: text
    content: cela nous savons
  - type: text
    content: ' ou '
  - type: text
    content: connaissons…
  - type: text
    content: ' (2.3,5 ; 3.19,24 ; 4.6,13 ; 5.2). La simplicité massive du style, lent, uniforme, sans ornement, est au service de cette intention. L''Ancien martèle les '
  - type: text
    content: antithèses
  - type: text
    content: ', il exclut toute conciliation trop habile, toute atténuation trop facile du conflit entre la lumière et les ténèbres, tout renversement de la vérité du Christ en mensonge des antichrists.'
  - type: text
    content: 'Car les deux premières lettres désignent les coupables : des '
  - type: text
    content: prophètes de mensonge
  - type: text
    content: ' (1Jn 4.1), appelés aussi '
  - type: text
    content: imposteurs
  - type: text
    content: ' et '
  - type: text
    content: antichrists
  - type: text
    content: ' (2Jn 7 ; 1Jn 4.2s), d''autant plus dangereux qu''ils sont issus des Eglises (1Jn 2.18s) et tentent d''en corrompre les membres. On essaie de deviner les traits de leur propagande à partir de la réfutation johannique : les antichrists refuseraient d''identifier Jésus au Christ (1Jn 2.22 ; 4.2s ; 5.10 ; 2Jn 7,9) ; ils nieraient le péché (1Jn 1.8 ; 3.7s) ; ils ne pratiqueraient pas l''amour fraternel (1Jn 2.9ss ; 3.14s ; 4.20ss).'
  - type: text
    content: On estime généralement que les agitateurs dénoncés appartiennent à un vaste mouvement religieux et philosophique, multiforme et mélangé, qui, à partir du II
  - type: text
    content: e
  - type: text
    content: ' siècle, prendra corps dans le '
  - type: text
    content: gnosticisme
  - type: text
    content: . Ce mouvement, accordé à l'esprit du temps, a failli entraîner toute l'Eglise. Les deux premières épîtres de Jean ne viseraient pas les systèmes compliqués qui vont s'élaborer plus tard, mais des esquisses encore rudimentaires. Au II
  - type: text
    content: e
  - type: text
    content: ' siècle, Irénée de Lyon atteste que Jean voulait combattre la gnose de '
  - type: text
    content: Cérinthe
  - type: text
    content: ' (voir l''encadré ci-dessus), ce qui pourrait éclairer plusieurs passages. Cette cible, d''ailleurs, n''en exclut pas d''autres, car l''erreur foisonne habituellement de tous côtés, et la vérité a besoin de son double tranchant !'
  - type: text
    content: 'Il est important de noter que l''Ancien ne polémique pas directement avec les maîtres de mensonge. Les deux premières lettres sont adressées à toute la communauté – et pas seulement aux responsables – puisque l''affirmation centrale est la suivante : '
  - type: text
    content: tous
  - type: text
    content: ' les chrétiens, par ce qu''ils savent déjà, ont les moyens de résister aux antichrists (1Jn 2.20). Il suffit de '
  - type: text
    content: demeurer dans la vérité
  - type: text
    content: ' apprise '
  - type: text
    content: dès le commencement
  - type: text
    content: ' (1Jn 1.1+). Si la gnose est une connaissance '
  - type: text
    content: ésotérique
  - type: text
    content: ' réservée à une élite de « spirituels », l''épître en coupe ainsi le nerf : '
  - type: text
    content: Vous n'avez pas besoin que quelqu'un vous instruise !
  - type: text
    content: ' (1Jn 2.27). En ce sens, les épîtres johanniques ne sont pas des manuels « contre les hérésies » comme il en a fleuri au cours de l''histoire de l''Eglise. Elles ne fournissent ni méthode apologétique ni raisonnements spéculatifs. Elles rappellent l''enseignement apostolique sur Jésus-Christ (1Jn 2.1s ; 4.7-16 ; 5.5-8) et le principe, fort simple, du discernement (1Jn 4.1-4). Mais l''auteur ne se borne pas à répéter ce que les lecteurs savent déjà. Il met l''accent sur les liens entre fidélité à l''enseignement originel et comportement éthique : '
  - type: text
    content: Quiconque croit que Jésus est le Christ est né de Dieu, et quiconque aime celui qui fait naître aime aussi celui qui est né de lui
  - type: text
    content: ' (1Jn 5.1). L''intégration de l''éthique et de la doctrine relative au Christ est le message saisissant des épîtres de Jean.'
  - type: text
    content: 'L''Ancien donne lui-même l''exemple de cette intégration, de la '
  - type: text
    content: pratique
  - type: text
    content: ' de la '
  - type: text
    content: vérité
  - type: text
    content: ' (1Jn 1.6). Si son intention est évidemment '
  - type: text
    content: doctrinale
  - type: text
    content: ' ('
  - type: text
    content: quiconque… ne demeure pas dans l'enseignement du Christ n'a pas Dieu
  - type: text
    content: ', 2Jn 9), elle est aussi '
  - type: text
    content: pastorale
  - type: text
    content: '. On admirera sa délicatesse à cet égard : il rassure ses lecteurs, il montre quelle confiance ils peuvent avoir en face des prétendus maîtres ; il s''inclut dans le '
  - type: text
    content: nous
  - type: text
    content: ' quand ses paroles pourraient passer pour des reproches (1Jn 1.6-10). Il multiplie les termes affectueux : '
  - type: text
    content: bien-aimés, mes enfants ;
  - type: text
    content: ' ce dernier mot était venu sur les lèvres de Jésus, à l''adresse de ses disciples, juste avant qu''il aille jusqu''au bout de son amour pour eux (Jn 13.33).'
  - type: text
    content: Un inventaire des thèmes
  - type: text
    content: La première épître
  - type: text
    content: ' s''ouvre sur un '
  - type: text
    content: prologue
  - type: text
    content: ' solennel, dont plusieurs thèmes font écho à celui du quatrième évangile, mais sont différemment traités, avec une insistance plus grande sur le caractère tangible, palpable, de la venue en chair : '
  - type: text
    content: la Parole, la vie, le commencement, le Père et le Fils
  - type: text
    content: '. Il n''est pas facile, ensuite, de dégager un plan du discours. L''ordre semble relever plus de l''association d''idées et de l''usage de mots crochets (p. ex. '
  - type: text
    content: l'Esprit
  - type: text
    content: ' et '
  - type: text
    content: les esprits
  - type: text
    content: ', de 3.24 à 4.1) que d''une répartition logique de la matière. L''Ancien avance comme un fleuve serpente, tout en sachant où il va : irrésistible en sa sérénité. Ses méandres le font revenir plusieurs fois dans les mêmes parages : la mission du Christ et le péché (2.2 ; 3.5,8 ; 4.10) ; le conflit avec le monde, au sens de règne de la convoitise et du mensonge, et non au sens d''univers matériel (2.15ss ; 3.13 ; 4.4s ; 5.4s), etc.'
  - type: text
    content: 'On a proposé de distinguer plusieurs '
  - type: text
    content: cycles
  - type: text
    content: ' suivant la prépondérance de certains thèmes. '
  - type: text
    content: De 1.5 à 2.29
  - type: text
    content: ', avec la proclamation '
  - type: text
    content: Dieu est lumière
  - type: text
    content: ', les conditions de la '
  - type: text
    content: communion avec Dieu
  - type: text
    content: ' sont mises en relief : rupture avec le péché, respect des commandements et, surtout, du '
  - type: text
    content: commandement ancien
  - type: text
    content: ' et '
  - type: text
    content: nouveau
  - type: text
    content: ' à la fois (2.7s), attachement à la foi transmise. '
  - type: text
    content: A partir de 3.1
  - type: text
    content: ', la pensée de la '
  - type: text
    content: filiation divine
  - type: text
    content: ' domine, impliquant à nouveau la rupture avec le péché, l''amour fraternel concrètement manifesté, la résistance à l''esprit de l''erreur en conformité avec la norme apostolique. Si on discerne un autre cycle '
  - type: text
    content: à partir de 4.7
  - type: text
    content: ', on peut dire que l''exhortation remonte '
  - type: text
    content: à la source
  - type: text
    content: '. Elle remonte à la source de l''amour – '
  - type: text
    content: Dieu est amour
  - type: text
    content: ' – et à la source de la foi, le témoignage du '
  - type: text
    content: vrai Dieu.
  - type: text
    content: ' Ce témoignage divin met en avant la réalité du Christ, '
  - type: text
    content: l'eau et le sang,
  - type: text
    content: ' avec '
  - type: text
    content: l'Esprit.
  - type: text
    content: ' C''est l''Esprit qui en traduit la vérité en vie éternelle (5.6-8).'
  - type: text
    content: La deuxième épître
  - type: text
    content: ' use, pour son destinataire, d''une expression quelque peu mystérieuse : elle est adressée '
  - type: text
    content: à la Dame choisie.
  - type: text
    content: ' Cette expression semble désigner non pas une femme, mais une Eglise. Jean, en utilisant le féminin de '
  - type: text
    content: kurios,
  - type: text
    content: ' « Seigneur », filerait ici la métaphore de l''Eglise épouse du Christ qu''on trouve ailleurs dans l''Ecriture (p. ex. Ep 5). Comme la troisième lettre, elle traite de problèmes relatifs à l''hospitalité chrétienne, mais dans la perspective de la discipline doctrinale : qu''aucune Eglise n''accueille officiellement ni ne laisse enseigner les missionnaires du mensonge.'
  - type: text
    content: La troisième épître
  - type: text
    content: ', elle, ne paraît pas aussi directement engagée dans la lutte contre l''hérésie christologique. Elle évoque un problème de comportement, de prétention personnelle et de lutte pour le pouvoir. La tentative de Diotrèphe a sans doute aussi sa signification historique : au moment où s''efface la génération des apôtres, avec ses formes initiales de gouvernement de l''Eglise, la tendance se dessine qui aboutira, un peu plus tard, à l''épiscopat monarchique.'
  - type: text
    content: Dans leur pointe spécifique, les épîtres johanniques ont aujourd'hui une pertinence aiguë. L'analogie de situation entre la fin du I
  - type: text
    content: er
  - type: text
    content: ' siècle et notre époque est frappante : brassage de courants religieux plus ou moins exotiques, tandis qu''une civilisation vieillie doute d''elle-même ; soif de spiritualités obscures où le prestige de la connaissance rivalise avec le succès des superstitions ; incertitude de nombreux croyants quant aux fondements mêmes de leur foi ; carence de l''amour fraternel concret, tandis que la chaîne des convoitises asservit les individus à eux-mêmes. Mais aussi témoignage rendu à la vérité, dans l''action et la confession, par de modernes Gaïos et Démétrios, auxquels pareillement '
  - type: text
    content: la vérité elle-même
  - type: text
    content: ' rend témoignage (3Jn 12). L''intégration de l''éthique et de la doctrine relative au Christ demeure, pour l''Eglise, une affaire de vie ou de mort.'
