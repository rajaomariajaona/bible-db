document_id: JOB.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (suite) : il veut une confrontation avec Dieu'
  - type: text
    content: Tout cela, mon œil l'a vu.
  - type: text
    content: Mon oreille l'a entendu et compris.
  '10':
  - type: text
    content: ' '
  - type: note
    content: si vous êtes partiaux ou si vous faites du favoritisme , cf. v. 8n  ; Dt 10.17.
  - type: text
    content: A coup sûr, il vous fera des reproches,
  - type: text
    content: si vous êtes partiaux en secret.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 3.6+ ; Jr 10.10 ; Ps 119.120. –  effroi  : voir crainte.'
  - type: text
    content: Sa majesté ne vous remplira-t-elle pas d'effroi ?
  - type: text
    content: Sa frayeur ne s'abattra-t-elle pas sur vous ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Vos protections  : litt. vos dos (même terme dans l''expression dos de bouclier en 15.26). On pourrait aussi comprendre  : vos réponses sont des réponses d''argile  ; cf. 17.10.'
  - type: text
    content: Ce que vous rappelez, ce sont des maximes de cendre.
  - type: text
    content: Vos protections ne sont que des protections d'argile.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Moi, je parlerai v. 3 ; 7.11+. –  quoi qu''il puisse m''arriver  : litt. passe sur moi quoi (que ce soit).'
  - type: text
    content: Taisez-vous, laissez-moi !
  - type: text
    content: Moi, je parlerai,
  - type: text
    content: quoi qu'il puisse m'arriver.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi…  : autre traduction aussi je vais saisir… –  risquerais-je ma vie  : litt. mettrais-je ma vie dans ma main  ; l''expression parallèle saisirais-je ma chair… a sans doute un sens analogue. Cf. Jg 12.3n  ; 1S 19.5n  ; 28.21n.'
  - type: text
    content: Pourquoi saisirais-je ma chair entre les dents,
  - type: text
    content: pourquoi risquerais-je ma vie ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''il me tue…  : autre lecture traditionnelle de l''hébreu  : même s''il me tue, je l''attendrai ou j''espérerai en lui (cf. 14.19 ; 17.15s ; 19.10 ; 1Ch 29.15). En hébreu, la négation et l''expression correspondant à en lui se ressemblent beaucoup (cf. 6.21n).'
  - type: text
    content: Qu'il me tue ! Je n'attends rien ;
  - type: text
    content: mais devant lui je veux défendre mes voies.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cela même…  : autre traduction lui-même serait mon salut , cf. Ps 24.5+ ; 25.5 ; Ph 1.19n. –  un impie n''oserait jamais…  : cf. Gn 3.8,10.'
  - type: text
    content: Cela même peut m'être salutaire,
  - type: text
    content: car un impie n'oserait jamais paraître en sa présence.
  '17':
  - type: text
    content: 'Ecoutez, écoutez mon propos :'
  - type: text
    content: que mon explication parvienne à vos oreilles.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '9.3+. –  qui ai raison  : litt. qui suis juste  ; cf. 9.29n  ; 27.5-6+ ; Es 50.8.'
  - type: text
    content: Qu'on me laisse exposer mon droit ;
  - type: text
    content: je sais que c'est moi qui ai raison.
  '19':
  - type: text
    content: ' '
  - type: note
    content: m'accuser ou me faire un procès , Es 1.18 ; 50.8 ; Mi 6.1s.
  - type: text
    content: Qui voudrait m'accuser ?
  - type: text
    content: Dès maintenant, je me tairais et j'expirerais.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 12.3n.
  - type: text
    content: Ce que vous savez, je le sais, moi aussi,
  - type: text
    content: je ne vous suis pas inférieur.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Seulement…  : litt. seulement deux choses ne fais pas avec moi . –  je ne me cacherai pas  : cf. Gn 4.14 ; Jr 16.17.'
  - type: text
    content: Seulement, concède-moi deux choses,
  - type: text
    content: 'et je ne me cacherai pas :'
  '21':
  - type: text
    content: ' '
  - type: note
    content: ta main 19.21+. –  ne me remplisse plus d'effroi 9.34n  ; cf. 33.7.
  - type: text
    content: éloigne ta main de moi,
  - type: text
    content: et que ta terreur ne me remplisse plus d'effroi ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 19.7 ; 30.20 ; 31.35. –  tu me répliqueras ou tu me répondras  ; l'hébreu emploie deux verbes synonymes.
  - type: text
    content: puis appelle, et je répondrai ;
  - type: text
    content: ou bien je parlerai, et tu me répliqueras.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 6.24+. – Voir péché.
  - type: text
    content: Quel est le nombre de mes fautes et de mes péchés ?
  - type: text
    content: Fais-moi connaître ma transgression et mon péché.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'te détournes-tu  : litt. caches-tu ta face  ; cf. Ps 13.2+ ; 44.25 ; 88.15 ; voir aussi Nb 6.25 ; Ps 4.7 ; Dn 9.17.'
  - type: text
    content: Pourquoi te détournes-tu
  - type: text
    content: et me considères-tu comme ton ennemi ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 1.4 ; 83.14 ; voir aussi Lv 26.36 ; 1S 24.15.
  - type: text
    content: Veux-tu faire trembler une feuille emportée par le vent ?
  - type: text
    content: Veux-tu poursuivre une paille desséchée ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'tu me fais payer  : litt. tu me fais entrer en possession  ; autre traduction tu me fais répondre des fautes… –  fautes de ma jeunesse Ps 25.7 ; cf. Ec 11.9.'
  - type: text
    content: Car tu écris contre moi des choses amères,
  - type: text
    content: tu me fais payer les fautes de ma jeunesse.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'mes mouvements  : litt. mes sentiers . –  tu traces une limite…  : litt. tu graves toi-même aux racines de mes pieds . On pourrait aussi comprendre tu relèves les empreintes de mes pieds.'
  - type: text
    content: Tu mets mes pieds dans les entraves,
  - type: text
    content: tu surveilles tous mes mouvements,
  - type: text
    content: tu traces une limite à mes pas.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Et l''homme…  : litt. et lui, il tombe en pourriture…  ; ce v. anticipe peut-être sur le développement du chap. 14 ; cf. Es 50.9 ; Ps 39.12 ; 102.27.'
  - type: text
    content: Et l'homme tombe en pourriture,
  - type: text
    content: comme un vêtement dévoré par les mites.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je vais parler v. 13 ; 7.11+. –  Puissant 5.17n. –  défendre  : terme apparenté au v. 6n.'
  - type: text
    content: Seulement moi, je vais parler au Puissant,
  - type: text
    content: je veux défendre ma cause devant Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: vous m'enduisez ou vous me couvrez , comme d'un enduit superficiel (le verbe correspondant est rendu par blanchir en 14.17n  ; voir Ps 119.69n) ; cf. Ez 13.10-16 ; 22.28. –  néant Lv 19.4n  ; Es 2.8n.
  - type: text
    content: Car vous, vous m'enduisez de mensonges,
  - type: text
    content: vous êtes tous des médecins de néant.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 17.10. –  si vous vous étiez tus ! autre traduction si seulement vous vous taisiez ! –  sagesse Pr 17.28.
  - type: text
    content: Ah ! si vous vous étiez tus !
  - type: text
    content: Ç'aurait été pour vous la sagesse.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'défense  : cf. v. 3 ; le mot hébreu est habituellement traduit par réprimande ou avertissement (Pr 1.23n).'
  - type: text
    content: Ecoutez, je vous prie, ma défense ;
  - type: text
    content: soyez attentifs au plaidoyer de mes lèvres.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 42.7.
  - type: text
    content: Parlerez-vous injustement en faveur de Dieu,
  - type: text
    content: et, pour lui, direz-vous ce qui est faux ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: Serez-vous partiaux ou le favoriserez-vous , litt. relèverez-vous sa face (cf. Gn 4.7n), de même au v. 10. Cf. 32.21ns ; 34.19n  ; 42.8n.
  - type: text
    content: Serez-vous partiaux à son avantage,
  - type: text
    content: si vous défendez la cause de Dieu ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'examine… 5.27n. –  le tromperez-vous…  : cf. Ml 3.8 ; Ps 78.36 ; Ac 5.3s ; Ga 6.7.'
  - type: text
    content: Serait-il bon qu'il vous examine à fond ?
  - type: text
    content: Ou bien le tromperez-vous comme on trompe un homme ?
