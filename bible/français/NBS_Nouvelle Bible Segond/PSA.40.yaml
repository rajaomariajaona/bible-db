document_id: PSA.40,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Que tous sachent ce que tu as fait pour moi
  - type: text
    content: Du chef de chœur. De David. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la bonne nouvelle  : cf. 68.12 ; 96.2 ; Es 40.9n  ; 52.7 ; Na 2.1. – Voir justice. –  dans l''assemblée nombreuse 22.26+.'
  - type: text
    content: J'annonce la bonne nouvelle de la justice dans l'assemblée nombreuse ;
  - type: text
    content: regarde, je ne ferme pas mes lèvres,
  - type: text
    content: Seigneur
  - type: text
    content: ', tu le sais !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 78.4. –  fidélité / loyauté 25.10+.
  - type: text
    content: Je ne couvre pas ta justice au fond de mon cœur,
  - type: text
    content: je parle de ta constance et de ton salut,
  - type: text
    content: je ne cache pas ta fidélité et ta loyauté
  - type: text
    content: à l'assemblée nombreuse.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 25.21+.
  - type: text
    content: 'Toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu ne me refuseras pas ta compassion ;'
  - type: text
    content: ta fidélité et ta loyauté me garderont constamment.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '38.5+. –  mon courage  : litt. mon cœur  ; cf. 38.11.'
  - type: text
    content: Car des maux sans nombre m'ont enserré ;
  - type: text
    content: mes fautes me poursuivent,
  - type: text
    content: et je ne peux en supporter la vue ;
  - type: text
    content: elles sont plus nombreuses que les cheveux de ma tête,
  - type: text
    content: et mon courage m'abandonne.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Sur la fin de ce psaume, voir 70.2-6. –  viens vite… 22.20+.
  - type: text
    content: 'Veuille me délivrer, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Seigneur
  - type: text
    content: ', viens vite à mon secours !'
  '15':
  - type: text
    content: ' '
  - type: note
    content: '35.4+,26. –  désirent  : cf. v. 7n,9 ; 70.3.'
  - type: text
    content: Que tous ensemble ils aient honte et rougissent,
  - type: text
    content: ceux qui en veulent à ma vie, ceux qui veulent me supprimer !
  - type: text
    content: Qu'ils reculent et soient confus,
  - type: text
    content: ceux qui désirent mon malheur !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 35.21,25 ; cf. Ez 25.3 ; 26.2 ; 36.2.
  - type: text
    content: Qu'ils soient atterrés par leur honte,
  - type: text
    content: 'ceux qui me disent : « Ah ! ah ! »'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '35.27. –  qui te cherchent 9.11+. –  disent…  : cf. 107.2 ; 118.2-4.'
  - type: text
    content: Que tous ceux qui te cherchent
  - type: text
    content: trouvent en toi leur gaieté et leur joie !
  - type: text
    content: Que ceux qui aiment ton salut
  - type: text
    content: 'disent constamment : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'pauvre et déshérité 12.6+ ; cf. 69.30 ; 86.1 ; 88.16 ; voir aussi Es 14.32. –  pense à moi  : autres traductions a de l''estime pour moi, fait des plans pour moi  ; cf. v. 6 ; le même verbe est traduit par tenir compte de en 144.3. –  mon libérateur 18.3n  ; 144.2.'
  - type: text
    content: Moi, je suis pauvre et déshérité ;
  - type: text
    content: mais le Seigneur pense à moi.
  - type: text
    content: 'Tu es mon secours et mon libérateur :'
  - type: text
    content: mon Dieu, ne tarde pas !
  '2':
  - type: text
    content: 'J''ai espéré le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il s'est incliné vers moi, il a entendu mes appels au secours.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.5ss,17 ; 69.3,15. –  de destruction  : traduction incertaine ; on a aussi compris horrible, terrifiant. –  fange  : ce synonyme du terme traduit par boue revient en 69.3. –  il a affermi mes pas  : autre traduction il m''a fait tenir debout.'
  - type: text
    content: Il m'a fait remonter du gouffre de destruction,
  - type: text
    content: de la boue, de la fange ;
  - type: text
    content: il a placé mes pieds sur le roc,
  - type: text
    content: il a affermi mes pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: un chant nouveau 33.3+. –  verront / seront saisis de crainte (ou auront peur  ; les deux verbes font assonance en hébreu) 52.8 ; 64.9s ; Es 41.5. –  confiance 4.6+.
  - type: text
    content: Il a mis dans ma bouche un chant nouveau,
  - type: text
    content: une louange à notre Dieu ;
  - type: text
    content: beaucoup le verront, ils seront saisis de crainte,
  - type: text
    content: 'et ils mettront leur confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux… 1.1+ ; 34.9 ; Jr 17.7. –  qui fait du Seigneur sa confiance  : autre traduction qui met sa confiance dans le Seigneur . –  qui ne se tourne pas… 101.3. –  les gens arrogants  : le terme hébreu est apparenté au nom Rahav (87.4n  ; 89.11n  ; Es 30.7n  ; 51.9n  ; Jb 9.13n).'
  - type: text
    content: 'Heureux l''homme qui fait du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sa confiance,'
  - type: text
    content: qui ne se tourne pas vers les gens arrogants
  - type: text
    content: et les partisans du mensonge !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'rien n''est comparable 35.10+. –  trop nombreuses  : cf. 71.15 ; 92.6 ; 104.24 ; 106.2 ; 139.17s ; Es 55.9 ; Jn 21.25. –  comptées  : autre traduction racontées  ; cf. 9.2+.'
  - type: text
    content: 'Tu as fait beaucoup de choses étonnantes, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu,'
  - type: text
    content: 'dans les plans que tu avais pour nous :'
  - type: text
    content: rien n'est comparable à toi ;
  - type: text
    content: je voudrais dire ces choses, les proclamer
  - type: text
    content: – elles sont trop nombreuses pour être comptées.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur. –  Tu n'as pas pris plaisir ou tu n'as pas désiré  ; cf. v. 9,15 ; Nb 14.3n. –  au sacrifice ni à l'offrande 50.8-15 ; 51.18-21 ; 69.31s ; Es 1.11 ; Jr 6.20 ; Os 6.6 ; Am 5.22 ; Ep 5.2. –  tu m'as ouvert les oreilles (pour comprendre ou pour obéir) ; cf. 1S 15.22 ; Es 50.4s ; Ez 12.2 ; Pr 20.12 ; Mt 11.15/ /. LXX a lu tu m'as formé un corps  ; cf. Hé 10.5-7,9.
  - type: text
    content: 'Tu n''as pas pris plaisir au sacrifice ni à l''offrande :'
  - type: text
    content: tu m'as ouvert les oreilles ;
  - type: text
    content: tu n'as demandé ni holocauste ni sacrifice pour le péché.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'avec le livre-rouleau…  : cf. Ez 2.9n  ; autre traduction possible dans le livre-rouleau c''est écrit à mon sujet  ; certains pensent qu''il s''agissait à l''origine d''un témoignage de reconnaissance (v. 2-4) écrit et présenté au temple (cf. 16.1n) ; on pourrait encore rattacher la phrase au v. 9 et lire dans le livre-rouleau il m''est prescrit (9) de faire ta volonté  ; cf. 2R 22.13 ; Jn 5.39.'
  - type: text
    content: 'Alors j''ai dit : Je viens'
  - type: text
    content: avec le livre-rouleau écrit pour moi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'désire ou prends plaisir à  ; même verbe aux v. 7,15. –  ta loi  : autre traduction ton enseignement . –  au fond de mes entrailles  : cf. 22.15 ; 37.31 ; Dt 6.6 ; 30.14 ; Jr 31.31-34 ; Ez 36.26ss.'
  - type: text
    content: Je désire faire ta volonté, mon Dieu,
  - type: text
    content: et ta loi est au fond de mes entrailles.
