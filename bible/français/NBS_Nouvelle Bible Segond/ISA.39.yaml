document_id: ISA.39,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchias reçoit les émissaires de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 20.12-19
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Babylone
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à l''époque en révolte contre les Assyriens. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: présent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 8.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rétablissement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu est très proche du nom d''Ezéchias, qui apparaît dans le texte parallèle (2R 20.12) et signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH fortifie.
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, Merodak-Baladân, fils de Baladân, roi de Babylone, envoya une lettre et un présent à Ezéchias, parce qu''il avait appris sa maladie et son rétablissement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il montra aux envoyés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il leur montra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 9.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parfums '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 133.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ec 7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias s''en réjouit ; il montra aux envoyés ses dépôts, l''argent et l''or, les essences odoriférantes et les parfums, tout son arsenal et tout ce qui se trouvait dans ses trésors : il n''y eut rien qu''Ezéchias ne leur fît voir dans sa maison et dans tous ses domaines.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.20 ; 30.1,7 ; 31.1-3 (alliances politiques avec les étrangers). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaïe… vint '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: D'où venaient-ils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte hébreu précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même tournure traduite précédemment par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vint… trouver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et plus loin par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: venus… pour me voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Esaïe, le prophète, vint ensuite trouver le roi Ezéchias et lui dit : Qu''ont dit ces hommes-là ? D''où venaient-ils ? Ezéchias répondit : Ils sont venus d''un pays lointain, de Babylone, pour me voir. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Esaïe dit encore
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il dit. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trésors '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.7 ; 3.16-24.
      marker-yv: yv-n
    - type: text
      text: 'Esaïe dit encore : Qu''ont-ils vu dans ta maison ? Ezéchias répondit : Ils ont vu tout ce qui est dans ma maison : il n''y a rien dans mes trésors que je ne leur aie fait voir. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Esaïe dit à Ezéchias : Ecoute la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 24.13 ; Jr 20.5 ; 27.21s.
      marker-yv: yv-n
    - type: text
      text: 'Les jours viennent où l''on emportera à Babylone tout ce qui est dans ta maison, tout ce que tes pères ont amassé jusqu''à ce jour ; il n''en restera rien, dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sens de descendants : allusion aux deux exils de 597 et 587/6 av. J.-C. (2R 24.12,14-16 ; 25.7,11,22 ; Jr 52.28-30). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: palais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'temple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 6.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, et ils seront eunuques dans le palais du roi de Babylone. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sécurité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: loyauté.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias répondit à Esaïe : La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', que tu as prononcée, est bonne ; car, ajouta-t-il, il y aura paix et sécurité pendant ma vie.'
