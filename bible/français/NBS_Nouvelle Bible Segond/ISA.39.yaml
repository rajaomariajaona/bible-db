document_id: ISA.39,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias reçoit les émissaires de Babylone
  - type: heading
    content: 2R 20.12-19
  - type: text
    content: ' '
  - type: note
    content: 'Babylone , à l''époque en révolte contre les Assyriens. –  présent  : cf. 2S 8.9s. –  rétablissement  : le terme hébreu est très proche du nom d''Ezéchias, qui apparaît dans le texte parallèle (2R 20.12) et signifie YHWH fortifie.'
  - type: text
    content: 'En ce temps-là, Merodak-Baladân, fils de Baladân, roi de Babylone, envoya une lettre et un présent à Ezéchias, parce qu''il avait appris sa maladie et son rétablissement. '
  '2':
  - type: note
    content: 'il montra aux envoyés  : litt. il leur montra  ; cf. Jr 9.23. –  parfums Ps 133.2n  ; Ec 7.1n.'
  - type: text
    content: 'Ezéchias s''en réjouit ; il montra aux envoyés ses dépôts, l''argent et l''or, les essences odoriférantes et les parfums, tout son arsenal et tout ce qui se trouvait dans ses trésors : il n''y eut rien qu''Ezéchias ne leur fît voir dans sa maison et dans tous ses domaines.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: '10.20 ; 30.1,7 ; 31.1-3 (alliances politiques avec les étrangers). –  Esaïe… vint 7.3. –  D''où venaient-ils  : le texte hébreu précise vers toi (même tournure traduite précédemment par vint… trouver et plus loin par venus… pour me voir ).'
  - type: text
    content: 'Esaïe, le prophète, vint ensuite trouver le roi Ezéchias et lui dit : Qu''ont dit ces hommes-là ? D''où venaient-ils ? Ezéchias répondit : Ils sont venus d''un pays lointain, de Babylone, pour me voir. '
  '4':
  - type: note
    content: 'Esaïe dit encore  : litt. il dit. –  trésors 2.7 ; 3.16-24.'
  - type: text
    content: 'Esaïe dit encore : Qu''ont-ils vu dans ta maison ? Ezéchias répondit : Ils ont vu tout ce qui est dans ma maison : il n''y a rien dans mes trésors que je ne leur aie fait voir. '
  '5':
  - type: text
    content: 'Alors Esaïe dit à Ezéchias : Ecoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ! '
  '6':
  - type: note
    content: 2R 24.13 ; Jr 20.5 ; 27.21s.
  - type: text
    content: 'Les jours viennent où l''on emportera à Babylone tout ce qui est dans ta maison, tout ce que tes pères ont amassé jusqu''à ce jour ; il n''en restera rien, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'tes fils  : au sens de descendants : allusion aux deux exils de 597 et 587/6 av. J.-C. (2R 24.12,14-16 ; 25.7,11,22 ; Jr 52.28-30). –  palais  : le même mot est traduit par temple en 6.1n.'
  - type: text
    content: 'On prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, et ils seront eunuques dans le palais du roi de Babylone. '
  '8':
  - type: note
    content: 'sécurité  : le mot hébreu a aussi le sens de loyauté.'
  - type: text
    content: 'Ezéchias répondit à Esaïe : La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', que tu as prononcée, est bonne ; car, ajouta-t-il, il y aura paix et sécurité pendant ma vie.'
