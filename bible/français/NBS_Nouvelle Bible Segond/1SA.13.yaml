  - type: text
    text: 'Les Philistins se rassemblèrent pour combattre Israël. Ils avaient trente mille chars, six mille attelages et des troupes nombreuses comme le sable qui est au bord de la mer. Ils dressèrent leur camp à Mikmas, à l''est de Beth-Aven. '
