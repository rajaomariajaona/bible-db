      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; il s''agit de ceux qui '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ont suivi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Saül.
    marker-yv: yv-n
  - type: text
    text: 'Il y eut aussi des Hébreux qui passèrent le Jourdain pour aller au pays de Gad et de Galaad. Saül était encore au Guilgal, et tous ceux qui se trouvaient derrière lui tremblaient. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: temps fixé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 11 ; 9.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.8.'
    marker-yv: yv-n
  - type: text
    text: Il attendit sept jours, jusqu'au temps fixé par Samuel. Mais Samuel n'arrivait pas au Guilgal, et le peuple se dispersait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Par ces '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: ', Saül voulait probablement attirer les faveurs de Dieu avant le combat ; cf. 7.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: holocauste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lv 1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sacrifices de paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lv 3.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Saül dit : Apportez-moi l''holocauste et les sacrifices de paix. Il offrit l''holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le saluer.
    marker-yv: yv-n
  - type: text
    text: 'Comme il achevait d''offrir l''holocauste, Samuel arriva ; Saül sortit à sa rencontre pour le bénir. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''as-tu fait ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. Gn 4.10 ; Jos 7.19.
    marker-yv: yv-n
  - type: text
    text: 'Samuel dit : Qu''as-tu fait ? Saül répondit : Lorsque j''ai vu que le peuple se dispersait, que tu n''arrivais pas au temps fixé, et que les Philistins étaient rassemblés à Mikmas, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je n''ai pas apaisé le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je n''ai pas demandé au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' de nous être favorable'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je n'ai pas adouci le visage de YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 32.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je me suis fait violence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je me suis enhardi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou encore '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'j''ai pris sur moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (d'offrir l'holocauste). Cette tâche cultuelle était réservée au prêtre Samuel.
    marker-yv: yv-n
  - type: text
    text: 'je me suis dit : Les Philistins vont descendre contre moi au Guilgal, et je n''ai pas apaisé le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Alors je me suis fait violence et j''ai offert l''holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu as agi stupidement…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.22s ; voir aussi 26.21 ; Gn 31.28 ; 2S 24.10 ; 2Ch 16.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: t'avait donné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avait institué pour toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' aurait affermi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'alors même que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' avait affermi.'
    marker-yv: yv-n
  - type: text
    text: 'Samuel dit à Saül : Tu as agi stupidement ; tu n''as pas observé le commandement que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, t''avait donné. Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' aurait affermi pour toujours ton règne sur Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ta royauté ne tiendra pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'est cherché un homme…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : annonce anticipée du choix de David (chap. 16). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'selon son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.35 ; 2S 7.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'institué '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
