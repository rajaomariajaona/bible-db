        - type: text
          text: n
      - type: text
        text: '. Selon certains, le texte hébreu pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il avait déjà régné deux ans sur Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; dans cette perspective, les deux ans de règne pourraient s'étendre jusqu'au moment de l'onction secrète de David (16.13), événement qui sanctionne le rejet de Saül.
