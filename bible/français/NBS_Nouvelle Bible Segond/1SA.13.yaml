    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'le temps écoulé entre l''onction discrète de Saül (10.1) et sa désignation publique (10.24) n''est guère satisfaisant ; on pense plutôt à l''emploi d''une formule cadre figurant fréquemment au début des récits de règne (cf. 2S 2.10 ; 5.4 ; et de nombreuses fois dans les livres des Rois), mais que l''auteur aurait laissée ici incomplète, faute de renseignements précis. Quant à la durée du règne de Saül (ici '
    - type: usfm
