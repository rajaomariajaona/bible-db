document_id: 1SA.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Révolte contre les Philistins ; faute de Saül
  - type: text
    content: ' '
  - type: note
    content: Ce v. est absent de certains mss de LXX  ; d'autres mss de LXX donnent à Saül l'âge de trente ans  ; Syr vingt-et-un ans  ; le texte hébreu, dans son état actuel, est difficilement compréhensible ; ou bien le chiffre manque, ou bien il faut comprendre Saül avait un an lorsqu'il devint roi . Voir dans la mention d’ un an le temps écoulé entre l'onction discrète de Saül (10.1) et sa désignation publique (10.24) n'est guère satisfaisant ; on pense plutôt à l'emploi d'une formule cadre figurant fréquemment au début des récits de règne (cf. 2S 2.10 ; 5.4 ; et de nombreuses fois dans les livres des Rois), mais que l'auteur aurait laissée ici incomplète, faute de renseignements précis. Quant à la durée du règne de Saül (ici deux ans ), elle serait de vingt ou quarante ans d'après Josèphe ou Ac 13.21n. Selon certains, le texte hébreu pourrait signifier il avait déjà régné deux ans sur Israël  ; dans cette perspective, les deux ans de règne pourraient s'étendre jusqu'au moment de l'onction secrète de David (16.13), événement qui sanctionne le rejet de Saül.
  - type: text
    content: Saül avait… ans lorsqu'il devint roi ; il régna deux ans sur Israël.
  '10':
  - type: note
    content: 'le bénir  : autre traduction le saluer.'
  - type: text
    content: 'Comme il achevait d''offrir l''holocauste, Samuel arriva ; Saül sortit à sa rencontre pour le bénir. '
  '11':
  - type: note
    content: Qu'as-tu fait ? cf. Gn 4.10 ; Jos 7.19.
  - type: text
    content: 'Samuel dit : Qu''as-tu fait ? Saül répondit : Lorsque j''ai vu que le peuple se dispersait, que tu n''arrivais pas au temps fixé, et que les Philistins étaient rassemblés à Mikmas, '
  '12':
  - type: note
    content: je n'ai pas apaisé le Seigneur ou je n'ai pas demandé au Seigneur de nous être favorable, litt. je n'ai pas adouci le visage de YHWH  ; cf. Ex 32.11+. –  je me suis fait violence ou je me suis enhardi, ou encore j'ai pris sur moi (d'offrir l'holocauste). Cette tâche cultuelle était réservée au prêtre Samuel.
  - type: text
    content: 'je me suis dit : Les Philistins vont descendre contre moi au Guilgal, et je n''ai pas apaisé le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Alors je me suis fait violence et j''ai offert l''holocauste. '
  '13':
  - type: note
    content: 'Tu as agi stupidement…  : cf. 15.22s ; voir aussi 26.21 ; Gn 31.28 ; 2S 24.10 ; 2Ch 16.9. –  t''avait donné  : autre traduction avait institué pour toi  ; cf. Dt 4.2n. –  Le Seigneur aurait affermi ou alors même que le Seigneur avait affermi.'
  - type: text
    content: 'Samuel dit à Saül : Tu as agi stupidement ; tu n''as pas observé le commandement que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''avait donné. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aurait affermi pour toujours ton règne sur Israël ! '
  '14':
  - type: note
    content: 'ta royauté ne tiendra pas  : cf. 15.28. –  s''est cherché un homme…  : annonce anticipée du choix de David (chap. 16). –  selon son cœur 2.35 ; 2S 7.21. –  institué et ordonné traduisent le même verbe hébreu ; cf. v. 13. –  chef  : cf. 9.16n. –  observé  : autre traduction gardé.'
  - type: text
    content: 'Maintenant ta royauté ne tiendra pas. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est cherché un homme selon son cœur, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a institué chef sur son peuple, parce que tu n''as pas observé ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''avait ordonné. '
  '15':
  - type: note
    content: 'LXX présente pour ce v. un texte plus long  : Puis Samuel monta du Guilgal pour aller de son côté. Le reste du peuple monta derrière Saül, à la rencontre des hommes de guerre ; lorsqu''ils arrivèrent du Guilgal à Guibéa de Benjamin, Saül… – Au lieu de Guibéa, LXX parle de Guéba. –  passa en revue  : cf. 11.8. –  six cents hommes  : cf. v. 2 ; 14.2.'
  - type: text
    content: 'Puis Samuel monta du Guilgal à Guibéa de Benjamin. Saül passa en revue les troupes qui se trouvaient avec lui : il y avait environ six cents hommes. '
  '16':
  - type: note
    content: 'Guéba  : cf. v. 3 ; certains pensent qu''il vaudrait mieux lire ici Guibéa (les deux noms hébreux ont une orthographe très proche).'
  - type: text
    content: 'Saül, Jonathan, son fils, et ceux qui se trouvaient avec eux avaient pris position à Guéba de Benjamin ; les Philistins avaient dressé leur camp à Mikmas. '
  '17':
  - type: note
    content: 'Les troupes de destruction…  : litt. le destructeur (singulier collectif) sortit du camp des Philistins en trois têtes  ; cf. 11.11n. –  le chemin d''Ophra ou la direction d''Ophra  ; de même au v. 18. –  Ophra  : localité de Benjamin, au nord de Mikmas ; cf. Jos 18.23. –  pays de Shoual  : ce nom n''apparaît pas ailleurs dans la Bible.'
  - type: text
    content: 'Les troupes de destruction sortirent du camp des Philistins en trois bandes : une bande prit le chemin d''Ophra, vers le pays de Shoual ; '
  '18':
  - type: note
    content: 'Beth-Horôn  : à l''ouest de Mikmas ; cf. Jos 10.10. –  la frontière  : LXX semble avoir lu la hauteur  ; de fait une hauteur boisée, colline ou montagne, pouvait facilement constituer une limite naturelle entre les territoires de deux tribus. –  vallée de Tseboïm (des Hyènes) : probablement au sud-est de Mikmas ; cf. Né 11.34.'
  - type: text
    content: une autre bande prit le chemin de Beth-Horôn ; la dernière prit le chemin de la frontière qui domine la vallée de Tseboïm, du côté du désert.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'pas de forgeron  : cf. 2R 24.14, où l''on voit que divers types d''artisans sont emmenés en exil. –  ni épée ni lance  : cf. Jg 5.8.'
  - type: text
    content: 'On ne trouvait pas de forgeron dans tout Israël ; car les Philistins avaient dit : Que les Hébreux ne fabriquent ni épée ni lance ! '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'trois mille hommes  : ces hommes seront les soldats constituant l''armée de Saül ; cf. 24.3 ; 26.2 ; Jos 7.3s ; Jg 15.11. –  Mikmas  : localité située à 12 km au nord-est de Jérusalem. –  la montagne  : c.-à-d. la région montagneuse où se trouve Beth-El (cf. 7.16n  ; 10.3n). –  Jonathan est un fils de Saül, cf. v. 16 ; son nom signifie YHWH a donné . –  Guibéa  : cf. 10.5n. –  chacun à sa tente  : cf. 4.10n.'
  - type: text
    content: 'Saül se choisit trois mille hommes d''Israël : deux mille étaient avec lui à Mikmas et dans la montagne de Beth-El, et mille étaient avec Jonathan à Guibéa de Benjamin. Il renvoya le reste du peuple, chacun à sa tente. '
  '20':
  - type: note
    content: La plupart des termes techniques hébreux figurant dans les v. 20s désignent des instruments agricoles, mais leur sens précis est loin d'être assuré. Les versions anciennes présentent des variantes significatives. Les termes hébreux correspondant à pioche et bêche sont presque identiques.
  - type: text
    content: 'Chaque homme en Israël descendait donc chez les Philistins pour aiguiser sa pioche, son soc de charrue, sa hache et sa bêche ; '
  '21':
  - type: note
    content: 'Interprétation probable d''un texte obscur ; d''autres comprennent quand le tranchant des bêches… était émoussé. –  un pim  : les deux tiers d''un sicle (sous-entendu dans le texte) d''argent (environ 7 g, voir mesures, poids et monnaies). –  aiguillons  : bâtons munis d''une pointe métallique, servant à conduire le bétail.'
  - type: text
    content: 'le prix était d''un pim pour les bêches et pour les socs de charrue, d''un tiers de sicle pour affûter les haches et redresser les aiguillons. '
  '22':
  - type: note
    content: 'Au jour du combat  : LXX précise de Mikmas  ; cf. v. 23 ; 14.31.'
  - type: text
    content: 'Au jour du combat, il n''y avait pas d''épée ni de lance pour tous ceux qui étaient avec Saül et Jonathan ; il n''y en avait que pour Saül et Jonathan, son fils. '
  '23':
  - type: note
    content: 'vint s''établir ou prit position  : litt. sortit vers, terme technique du langage militaire ; cf. 8.20n.'
  - type: text
    content: Un poste de Philistins vint s'établir au passage de Mikmas.
  '3':
  - type: note
    content: 'battit la garnison ou tua le préfet, ou encore abattit la stèle (de même au v. 4) ; cf. 10.5n. –  Guéba  : localité benjaminite, située à 9 km au nord-est de Jérusalem ; cf. Jos 18.24. LXX Guibéa. –  sonner de la trompe  : cf. Jg 3.27+. –  Que les Hébreux entendent ! c.-à-d. il faut que les Hébreux le sachent  ; LXX a compris il faut que les esclaves se révoltent. Le mot Hébreux n''est peut-être pas ici un simple équivalent d’Israélites  ; il pourrait s''appliquer à l''ensemble des populations placées sous la domination des Philistins.'
  - type: text
    content: 'Jonathan battit la garnison des Philistins qui était à Guéba, et les Philistins l''apprirent. Saül fit sonner de la trompe dans tout le pays, en disant : Que les Hébreux entendent ! '
  '4':
  - type: note
    content: 'Saül a battu  : Saül, en tant que roi, est considéré comme l''auteur de l''exploit accompli par son fils Jonathan (v. 3). –  odieux  : litt. puant  ; cf. 27.12 ; Gn 34.30n  ; Ex 5.21 ; 2S 10.6 ; 16.21. –  Le peuple  : le mot hébreu ainsi traduit habituellement peut aussi désigner un regroupement spécifique de gens nombreux, ici celui des soldats de l''armée d''Israël ; voir plusieurs emplois analogues dans la suite du chapitre, où le même terme est aussi traduit par troupe(s), hommes, etc. –  se mobilisa Jg 7.23n. –  derrière Saül  : cf. v. 7. –  au Guilgal  : cf. 7.16n  ; 10.8+ ; ce sanctuaire rappelle le passage du Jourdain à l''époque de la conquête du pays (cf. Jos 4.19-22).'
  - type: text
    content: 'Tout Israël entendit que l''on disait : Saül a battu la garnison des Philistins, et Israël s''est rendu odieux aux Philistins. Le peuple se mobilisa derrière Saül au Guilgal. '
  '5':
  - type: note
    content: 'trente mille chars  : certains mss de LXX et Syr disent trois mille chars. –  attelages ou équipages. –  des troupes  : litt. un peuple  ; cf. v. 4n  ; Jg 5.14 ; 7.2+,7 ; 9.29+ ; 11.20. –  comme le sable…  : expression quasi proverbiale ; cf. Jg 7.12n. –  dressèrent leur camp ou campèrent  ; cf. v. 16. –  Mikmas  : cf. v. 2. –  Beth-Aven  : cf. Jos 7.2.'
  - type: text
    content: 'Les Philistins se rassemblèrent pour combattre Israël. Ils avaient trente mille chars, six mille attelages et des troupes nombreuses comme le sable qui est au bord de la mer. Ils dressèrent leur camp à Mikmas, à l''est de Beth-Aven. '
  '6':
  - type: note
    content: 'Les hommes d''Israël  : litt. l''homme (singulier à valeur collective, c.-à-d. les hommes) d''Israël  ; de même en 14.22,24 ; 17.2,19,24s ; 2S 15.13 ; 16.15,18 ; 17.14,24 ; 19.42ss ; 20.2 ; 23.9 ; cf. Dt 27.14n  ; Jos 9.6n. –  en détresse  : cf. Jg 10.9. –  dans les grottes…  : cf. Jg 6.2 ; Jb 30.6. –  les trous  : le mot hébreu correspondant a aussi été rendu parfois par ajoncs  ; cf. 2R 14.9 ; Es 34.13 ; Os 9.6 ; 2Ch 33.11n.'
  - type: text
    content: 'Les hommes d''Israël se virent en détresse, car le peuple était serré de près. Ils se cachèrent dans les grottes, dans les trous, dans les rochers, dans les caves et dans les citernes. '
  '7':
  - type: note
    content: 'des Hébreux qui passèrent  : le texte hébreu joue sur une allitération, du fait que le nom Hébreux est de la même racine que le verbe passer  ; LXX a reproduit cette allitération en traduisant les passants passèrent. –  au pays de Gad et de Galaad  : région de Transjordanie comprise entre la mer Morte et le lac de Galilée (= de Gennésareth). –  tous ceux…  : litt. tout le peuple tremblait derrière lui, cf. v. 4n  ; il s''agit de ceux qui ont suivi Saül.'
  - type: text
    content: 'Il y eut aussi des Hébreux qui passèrent le Jourdain pour aller au pays de Gad et de Galaad. Saül était encore au Guilgal, et tous ceux qui se trouvaient derrière lui tremblaient. '
  '8':
  - type: note
    content: 'temps fixé  : cf. v. 11 ; 9.24n  ; 10.8.'
  - type: text
    content: Il attendit sept jours, jusqu'au temps fixé par Samuel. Mais Samuel n'arrivait pas au Guilgal, et le peuple se dispersait.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Par ces sacrifices, Saül voulait probablement attirer les faveurs de Dieu avant le combat ; cf. 7.9. –  holocauste  : cf. Lv 1. –  sacrifices de paix  : cf. Lv 3.'
  - type: text
    content: 'Alors Saül dit : Apportez-moi l''holocauste et les sacrifices de paix. Il offrit l''holocauste. '
