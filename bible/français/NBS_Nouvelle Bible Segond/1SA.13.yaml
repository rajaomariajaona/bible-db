      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: observé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gardé.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant ta royauté ne tiendra pas. Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' s''est cherché un homme selon son cœur, et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''a institué chef sur son peuple, parce que tu n''as pas observé ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t''avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: LXX présente pour ce v. un texte plus long
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Puis Samuel monta du Guilgal pour aller de son côté. Le reste du peuple monta derrière Saül, à la rencontre des hommes de guerre ; lorsqu''ils arrivèrent du Guilgal à Guibéa de Benjamin, Saül… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '– Au lieu de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guibéa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', LXX parle de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Guéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: passa en revue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: six cents hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2 ; 14.2.'
    marker-yv: yv-n
  - type: text
    text: 'Puis Samuel monta du Guilgal à Guibéa de Benjamin. Saül passa en revue les troupes qui se trouvaient avec lui : il y avait environ six cents hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3 ; certains pensent qu''il vaudrait mieux lire ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Guibéa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (les deux noms hébreux ont une orthographe très proche).
    marker-yv: yv-n
  - type: text
    text: 'Saül, Jonathan, son fils, et ceux qui se trouvaient avec eux avaient pris position à Guéba de Benjamin ; les Philistins avaient dressé leur camp à Mikmas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les troupes de destruction…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le destructeur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(singulier collectif) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortit du camp des Philistins en trois têtes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 11.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le chemin d''Ophra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la direction d'Ophra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ophra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localité de Benjamin, au nord de Mikmas ; cf. Jos 18.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pays de Shoual
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce nom n''apparaît pas ailleurs dans la Bible.'
    marker-yv: yv-n
  - type: text
    text: 'Les troupes de destruction sortirent du camp des Philistins en trois bandes : une bande prit le chemin d''Ophra, vers le pays de Shoual ; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Beth-Horôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à l''ouest de Mikmas ; cf. Jos 10.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la frontière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX semble avoir lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la hauteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de fait une hauteur boisée, colline ou montagne, pouvait facilement constituer une limite naturelle entre les territoires de deux tribus. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vallée de Tseboïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Hyènes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : probablement au sud-est de Mikmas ; cf. Né 11.34.'
    marker-yv: yv-n
  - type: text
    text: une autre bande prit le chemin de Beth-Horôn ; la dernière prit le chemin de la frontière qui domine la vallée de Tseboïm, du côté du désert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas de forgeron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2R 24.14, où l''on voit que divers types d''artisans sont emmenés en exil. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ni épée ni lance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jg 5.8.'
    marker-yv: yv-n
  - type: text
    text: 'On ne trouvait pas de forgeron dans tout Israël ; car les Philistins avaient dit : Que les Hébreux ne fabriquent ni épée ni lance ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La plupart des termes techniques hébreux figurant dans les v. 20s désignent des instruments agricoles, mais leur sens précis est loin d''être assuré. Les versions anciennes présentent des variantes significatives. Les termes hébreux correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pioche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bêche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont presque identiques.
    marker-yv: yv-n
  - type: text
    text: 'Chaque homme en Israël descendait donc chez les Philistins pour aiguiser sa pioche, son soc de charrue, sa hache et sa bêche ; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Interprétation probable d''un texte obscur ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand le tranchant des bêches… était émoussé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un pim
    - type: usfm
      marker: ft
