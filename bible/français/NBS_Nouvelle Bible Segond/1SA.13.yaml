  - type: text
    text: 'Saül se choisit trois mille hommes d''Israël : deux mille étaient avec lui à Mikmas et dans la montagne de Beth-El, et mille étaient avec Jonathan à Guibéa de Benjamin. Il renvoya le reste du peuple, chacun à sa tente. '
