          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez.
      marker-yv: yv-n
    - type: text
      text: 'Vous avez vu leurs horreurs, leurs idoles : c''est du bois, de la pierre, de l''argent et de l''or qu''elles ont avec elles. '
