      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''il n''y ait pas… '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hé 12.15. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: absinthe
      - type: usfm
        marker: ft
        children:
        - type: text
