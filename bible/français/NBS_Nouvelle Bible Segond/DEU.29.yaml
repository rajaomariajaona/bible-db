        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' traduit ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: amertume et fiel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en Lm 3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
