      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'alliance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adjuration '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce n''est pas avec vous seuls que je conclus cette alliance, cette adjuration, '
