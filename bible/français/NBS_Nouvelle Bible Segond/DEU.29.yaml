      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lc 12.19.'
      marker-yv: yv-n
    - type: text
      text: 'Que personne, après avoir entendu les paroles de cette adjuration, ne se bénisse lui-même en se disant : « Tout ira bien pour moi, quand même je suivrais l''obstination de mon cœur, en ajoutant l''ivresse à la soif ! » '
