      marker-yv: yv-n
    - type: text
      text: 'Moïse convoqua tout Israël ; il leur dit : Vous avez vu tout ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a fait sous vos yeux, en Egypte, au pharaon, à tous les gens de sa cour et à tout son pays, '
