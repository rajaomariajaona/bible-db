document_id: DEU.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ce que Dieu a fait pour Israël
  - type: text
    content: ' '
  - type: note
    content: tout Israël 1.1+. –  Vous avez vu 1.31+.
  - type: text
    content: 'Moïse convoqua tout Israël ; il leur dit : Vous avez vu tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait sous vos yeux, en Egypte, au pharaon, à tous les gens de sa cour et à tout son pays, '
  '10':
  - type: note
    content: 'vos femmes…  : ou, selon l''ordre des mots en hébreu toutes vos familles (ou vos enfants), vos femmes…  ; cf. Gn 34.29n. –  immigrés 1.16n. –  tes camps  : certains mss hébreux et des versions anciennes portent ton camp ou votre camp  ; cf. 23.15. –  bûcheron / puiseur d''eau  : cf. Jos 9.21,23,27.'
  - type: text
    content: 'vos femmes, toutes vos familles et les immigrés qui sont dans tes camps, depuis ton bûcheron jusqu''à ton puiseur d''eau, '
  '11':
  - type: note
    content: 'passer dans l''alliance  : cf. Gn 15.10,17. –  son adjuration  : autre traduction sa malédiction (même terme aux v. 19s ; de même aux v. 13,18 ; voir aussi 30.7). Il s''agit de la malédiction conditionnelle énoncée par la loi, qui s''accomplira en cas d''infidélité, comme en cas de parjure ou de trahison à la suite d''un serment (cf. Gn 24.41n  ; Lv 5.1n  ; Nb 5.21nss ; Jr 29.18n  ; Ps 59.13 ; Jb 31.30 ; Dn 9.11 ; Né 10.30). –  conclut  : litt. tranche, comme en Gn 15.18n.'
  - type: text
    content: 'pour passer dans l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et dans son adjuration, alliance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, conclut aujourd''hui avec toi, '
  '12':
  - type: note
    content: 'faire aujourd''hui de toi son peuple  : litt. te dresser aujourd''hui pour lui comme peuple  ; 7.6+.'
  - type: text
    content: 'afin de faire aujourd''hui de toi son peuple et d''être lui-même ton Dieu, comme il te l''a dit, et comme il l''a juré à tes pères, Abraham, Isaac et Jacob. '
  '13':
  - type: note
    content: alliance / adjuration v. 11n.
  - type: text
    content: 'Ce n''est pas avec vous seuls que je conclus cette alliance, cette adjuration, '
  '14':
  - type: note
    content: Cf. Jn 17.20.
  - type: text
    content: 'mais c''est avec ceux qui sont ici parmi nous, présents aujourd''hui devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, et avec ceux qui ne sont pas ici parmi nous aujourd''hui.'
  '15':
  - type: text
    content: 'Vous savez vous-mêmes comment nous avons habité en Egypte et comment nous sommes passés parmi les nations où vous êtes passés. '
  '16':
  - type: note
    content: '4.28+. –  leurs horreurs (Lv 11.10n), leurs idoles  : autre traduction leurs horreurs et leurs idoles. –  avec  : autre traduction chez.'
  - type: text
    content: 'Vous avez vu leurs horreurs, leurs idoles : c''est du bois, de la pierre, de l''argent et de l''or qu''elles ont avec elles. '
  '17':
  - type: note
    content: 'dont le cœur se détourne 30.17. –  aller servir…  : cf. 6.14+. –  Qu''il n''y ait pas… Hé 12.15. –  poison / absinthe  : cf. Am 5.7 ; 6.12 ; Ac 8.23 (LXX traduit ici amertume et fiel, de même en Lm 3.15n) ; Ap 8.11n.'
  - type: text
    content: 'Qu''il n''y ait donc parmi vous ni homme, ni femme, ni clan, ni tribu, dont le cœur se détourne aujourd''hui du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, pour aller servir les dieux de ces nations-là. Qu''il n''y ait pas parmi vous de racine qui produise du poison et de l''absinthe. '
  '18':
  - type: note
    content: 'ne se bénisse lui-même  : litt. ne se bénisse en son cœur. –  Tout ira bien  : litt. il y aura la paix, cf. Jr 23.17. –  quand même je suivrais (litt. marcherais dans) : autre traduction parce que je suis. –  en ajoutant l''ivresse à la soif  : texte obscur ; autres traductions en sorte que le (terrain ?) arrosé disparaisse avec le desséché ; puisque l''abreuvé fait disparaître le desséché  ; cf. Lc 12.19.'
  - type: text
    content: 'Que personne, après avoir entendu les paroles de cette adjuration, ne se bénisse lui-même en se disant : « Tout ira bien pour moi, quand même je suivrais l''obstination de mon cœur, en ajoutant l''ivresse à la soif ! » '
  '19':
  - type: note
    content: 'passion jalouse 4.24+. –  malédiction (v. 20) : le même mot est traduit par adjuration aux v. 11n,13,18. –  écrite dans ce livre 28.15-68 ; Ap 22.18. –  se fixerait sur lui  : autre traduction s''apprêterait à bondir sur lui  ; le même verbe est traduit par (être) couché en 22.6, être tapi en Gn 4.7n. Ici LXX porte s''attachera à lui, comme en 28.60. –  effacerait son nom 9.14+ ; cf. Ap 3.5.'
  - type: text
    content: '– le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne voudrait pas lui pardonner. Car alors la colère et la passion jalouse du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fumeraient contre cet homme, toute la malédiction écrite dans ce livre se fixerait sur lui, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' effacerait son nom de dessous le ciel. '
  '2':
  - type: note
    content: 4.34+.
  - type: text
    content: 'les grandes épreuves que tes yeux ont vues, ces signes et ces grands prodiges. '
  '20':
  - type: note
    content: 'Cf. 28.61. –  le séparerait  : cf. 4.41n. –  écrite dans ce livre de la loi  : cf. 17.18 ; 27.3,8 ; 28.58 ; 30.10 ; 31.9,24.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le séparerait, pour le malheur, de toutes les tribus d''Israël, selon toutes les malédictions de l''alliance écrite dans ce livre de la loi.'
  - type: heading
    content: Le Seigneur réalisera ses menaces
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Les générations  : litt. la génération . –  d''un pays lointain ou d''une terre lointaine . –  fléaux / maladies 28.59ss.'
  - type: text
    content: 'Les générations à venir, vos fils qui se lèveront après vous et l''étranger qui viendra d''un pays lointain, à la vue des fléaux de ce pays et des maladies dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''aura frappé, diront : '
  '22':
  - type: note
    content: à Sodome, à Gomorrhe Gn 19.24-29 ; Es 13.19 ; Jr 50.40 ; Am 4.11. –  Adma / Tseboïm Gn 14.8n  ; voir Os 11.8n. –  détruites Gn 19.21n.
  - type: text
    content: 'Le pays n''est que soufre, sel et feu. On ne peut rien y semer, rien n''y germe, aucune plante n''y pousse, comme à Sodome, à Gomorrhe, à Adma et à Tseboïm, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a détruites dans sa colère et sa fureur. '
  '23':
  - type: text
    content: 'Toutes les nations diront : Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a-t-il ainsi traité ce pays ? Pourquoi cette grande colère, cette colère ardente ? '
  '24':
  - type: note
    content: abandonné (cf. 28.20 ; 31.16) l'alliance 1R 19.10,14 ; Jr 22.9. –  Dieu de leurs pères 1.11+.
  - type: text
    content: 'Et on répondra : C''est parce qu''ils ont abandonné l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères, celle qu''il avait conclue avec eux lorsqu''il les avait fait sortir d''Egypte ; '
  '25':
  - type: note
    content: 'ils sont allés servir… v. 17. –  qu''ils ne connaissaient pas 11.28+. –  pas donnés en partage  : cf. 4.19 ; 32.8n.'
  - type: text
    content: 'ils sont allés servir d''autres dieux et se prosterner devant eux, des dieux qu''ils ne connaissaient pas et qu''il ne leur avait pas donnés en partage. '
  '26':
  - type: note
    content: 'malédiction  : autre mot qu''aux v. 19s (voir adjuration v. 11n) ; même terme en 11.26,28s ; 23.6 ; 27.13 ; 28.15,45 ; 30.1,19. Voir bénédiction, malédiction.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est mis en colère contre ce pays, et il a fait venir sur lui toute la malédiction écrite dans ce livre. '
  '27':
  - type: note
    content: 'déracinés  : sur l''emploi de ce terme au sujet de la dispersion d''Israël, cf. 1R 14.15 ; Jr 12.14 ; voir aussi Dt 4.27+. –  colère… 9.18 ; 31.17+. –  voilà pourquoi… 2.30n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a déracinés de leur terre avec colère, avec fureur, avec une grande irritation, et il les a jetés dans un autre pays – voilà pourquoi il en est ainsi en ce jour.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 28.1-28+. –  à nous et à nos fils  : dans les mss hébreux chacune des lettres qui forment l''expression correspondante est surmontée d''un point. –  toutes les paroles… 17.19+.'
  - type: text
    content: 'Les choses cachées appartiennent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ; les choses révélées nous appartiennent, à nous et à nos fils, pour toujours, afin que nous mettions en pratique toutes les paroles de cette loi.'
  '3':
  - type: note
    content: Cf. Mt 13.11/ / ; 16.17 ; Lc 24.31 ; Ac 16.14 ; Rm 11.8. Voir cœur.
  - type: text
    content: 'Mais jusqu''à ce jour, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne vous a pas donné un cœur pour connaître, des yeux pour voir, des oreilles pour entendre. '
  '4':
  - type: note
    content: 'Je vous ai conduits…  : cf. 11.14+. –  quarante années 8.2+. –  vos / tes 1.8n. –  vos vêtements… 8.4+.'
  - type: text
    content: 'Je vous ai conduits pendant quarante années dans le désert ; vos vêtements ne se sont pas usés sur vous, tes sandales ne se sont pas usées à tes pieds ; '
  '5':
  - type: note
    content: 'Ex 16–17. –  boisson alcoolisée 14.26 ; Lv 10.9n. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'vous n''avez pas mangé de pain et vous n''avez bu ni vin ni boisson alcoolisée, afin que vous sachiez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 1.4+.
  - type: text
    content: 'Vous êtes arrivés en ce lieu ; Sihôn, roi de Heshbôn, et Og, roi du Bashân, sont sortis à notre rencontre pour le combat, et nous les avons battus. '
  '7':
  - type: note
    content: 3.12-17.
  - type: text
    content: 'Nous avons pris leur pays et nous l''avons donné comme patrimoine aux Rubénites, aux Gadites et à la demi-tribu des Manassites. '
  '8':
  - type: note
    content: Vous observerez ou vous garderez 4.6n. –  réussir 28.29n.
  - type: text
    content: Vous observerez donc les paroles de cette alliance et vous les mettrez en pratique, afin de réussir dans tout ce que vous ferez.
  - type: heading
    content: Prendre au sérieux l'alliance avec Dieu
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'aujourd''hui 1.10+. –  devant le Seigneur  : cf. 4.10. –  vos chefs… 1.15n. –  secrétaires  : voir scribe.'
  - type: text
    content: 'Vous vous tenez aujourd''hui devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous tous, vos chefs, vos tribus, vos anciens, vos secrétaires, tous les hommes d''Israël, '
