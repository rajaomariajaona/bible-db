    - type: text
      text: ' fumeraient contre cet homme, toute la malédiction écrite dans ce livre se fixerait sur lui, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' effacerait son nom de dessous le ciel. '
