      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 7.6+.'
      marker-yv: yv-n
    - type: text
      text: 'afin de faire aujourd''hui de toi son peuple et d''être lui-même ton Dieu, comme il te l''a dit, et comme il l''a juré à tes pères, Abraham, Isaac et Jacob. '
  '13':
  - type: usfm
