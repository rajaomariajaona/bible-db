    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), notre Dieu, pour aller servir les dieux de ces nations-là. Qu''il n''y ait pas parmi vous de racine qui produise du poison et de l''absinthe. '
