  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Vous savez vous-mêmes comment nous avons habité en Egypte et comment nous sommes passés parmi les nations où vous êtes passés. '
