      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme aux v. 19s ; de même aux v. 13,18 ; voir aussi 30.7). Il s'agit de la malédiction conditionnelle énoncée par la loi, qui s'accomplira en cas d'infidélité, comme en cas de parjure ou de trahison à la suite d'un serment (cf. Gn 24.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 5.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss ; Jr 29.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 59.13 ; Jb 31.30 ; Dn 9.11 ; Né 10.30). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: conclut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
