  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par erreur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par mégarde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' rituelle distingue ainsi les fautes commises accidentellement, seules concernées par le sacrifice pour le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ', des transgressions délibérées (cf. v. 13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',22,27 ; 5.15,18 ; 22.14 ; Nb 15.27ss ; 35.11,15 ; Ps 119.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ec 5.5 ; voir aussi Ez 45.20). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qu'interdit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (concernant des choses) qui ne se font pas, et qu'il fait une seule d'entre elles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agit de commandements de forme négative, c.-à-d. d''interdictions ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu ne feras pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; de même aux v. 13,22.
    marker-yv: yv-n
  - type: text
    text: 'Dis aux Israélites : Lorsque quelqu''un pèche par erreur en commettant ce qu''interdit l''un des commandements du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' ayant reçu '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le grand prêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 6.15 ; cf. 8.12 ; Ex 29.7 ; le terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ayant reçu l''onction '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a donné le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: messie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; il s''applique ailleurs aux rois, cf. 1S 2.10 ; 10.1 ; 16.12s ; cf. Dn 9.25s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mettant ainsi le peuple en tort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; le grand prêtre représente le peuple tout entier devant Dieu, de sorte que sa faute rejaillit sur toute la communauté. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en sacrifice pour le péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le même terme hébreu peut désigner le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'péché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: et le sacrifice (ou le rite) qui lui correspond.
    marker-yv: yv-n
  - type: text
    text: 'Si c''est le prêtre ayant reçu l''onction qui pèche, mettant ainsi le peuple en tort, il présentera au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', pour le péché qu''il a commis, un taureau sans défaut en sacrifice pour le péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'posera la main… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il amènera le taureau à l''entrée de la tente de la Rencontre, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; il posera la main sur la tête du taureau, et il immolera le taureau devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre qui a reçu l''onction prendra du sang du taureau et l''apportera dans la tente de la Rencontre ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il en fera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'devant le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' il aspergera sept fois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 17 ; 14.16 ; 16.14,19 etc.) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la face '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. le côté visible) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du voile du sanctuaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ex 26.31-35. Le verbe correspondant ici à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire l''aspersion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (à distinguer de celui de 1.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) apparaît également au v. 17 et en 5.9 ; 6.20 ; 8.11,30 ; 14.7,16,27,51 ; 16.14s,19 ; Ex 29.21 ; Nb 8.7 ; 19.4,18ss ; Es 52.15.
    marker-yv: yv-n
  - type: text
    text: 'il trempera son doigt dans le sang et il en fera sept fois l''aspersion devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en face du voile du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cornes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 27.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autel de l''encens aromatique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 30.1-10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout le reste du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout le sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même aux v. 18,30,34 ; cf. v. 25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre mettra du sang sur les cornes de l''autel de l''encens aromatique qui est devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dans la tente de la Rencontre ; il répandra tout le reste du sang du taureau sur le socle de l''autel des holocaustes qui est à l''entrée de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: taureau…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: taureau du péché.
    marker-yv: yv-n
  - type: text
    text: 'Il prélèvera toute la graisse du taureau du sacrifice pour le péché, la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'comme on les prélève du taureau dans le sacrifice de paix ; le prêtre les fera fumer sur l''autel des holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais la peau du taureau, toute sa chair, avec sa tête, ses pattes, ses entrailles et ses excréments, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.4 ; Hé 13.11-13. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. accessible à tous (par opposition à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: très sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), mais réservé à cet usage ; cf. Ez 43.21.
    marker-yv: yv-n
  - type: text
    text: le taureau entier, il l'emportera hors du camp, dans un lieu pur, là où on jette les cendres grasses, et il le brûlera sur un feu de bois ; c'est sur le tas de cendres grasses que cela sera brûlé.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pour le péché de toute la communauté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fait une erreur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe hébreu est très proche par sa forme et équivalent par son sens de l''expression traduite '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par erreur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; même forme en Nb 15.22 ; Ez 45.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans que l'assemblée s'en aperçoive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et la chose est cachée aux yeux de l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; tournure analogue en 5.2ss ; même verbe pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fermer les yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 20.4 ; Nb 5.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commandements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si c''est toute la communauté d''Israël qui a fait une erreur, sans que l''assemblée s''en aperçoive, en commettant ce qu''interdit l''un des commandements du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', se mettant ainsi en tort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsqu''on s''apercevra du péché qu''elle a commis, l''assemblée présentera un taureau en sacrifice pour le péché ; on l''amènera devant la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'anciens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'représentent la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'communauté. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on immolera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il immolera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le sujet sous-entendu est peut-être le grand prêtre (cf. 1.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Les anciens de la communauté poseront les mains sur la tête du taureau, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et on immolera le taureau devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: onction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre qui a reçu l''onction apportera du sang du taureau dans la tente de la Rencontre ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le prêtre trempera son doigt dans le sang et il en fera sept fois l''aspersion devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en face du voile. '
  - type: usfm
    marker: vlbl
