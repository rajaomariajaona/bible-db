document_id: LEV.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices pour obtenir le pardon
  - type: heading
    content: Pour le péché du grand prêtre
  - type: text
    content: ' '
  - type: note
    content: Sur le sacrifice pour le péché (4.1–5.13), voir aussi 6.17-23 ; 16.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: 'comme on les prélève du taureau dans le sacrifice de paix ; le prêtre les fera fumer sur l''autel des holocaustes. '
  '11':
  - type: text
    content: 'Mais la peau du taureau, toute sa chair, avec sa tête, ses pattes, ses entrailles et ses excréments, '
  '12':
  - type: note
    content: '6.4 ; Hé 13.11-13. –  pur  : c.-à-d. accessible à tous (par opposition à sacré ou très sacré), mais réservé à cet usage ; cf. Ez 43.21.'
  - type: text
    content: le taureau entier, il l'emportera hors du camp, dans un lieu pur, là où on jette les cendres grasses, et il le brûlera sur un feu de bois ; c'est sur le tas de cendres grasses que cela sera brûlé.
  - type: heading
    content: Pour le péché de toute la communauté
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'fait une erreur  : le verbe hébreu est très proche par sa forme et équivalent par son sens de l''expression traduite par erreur au v. 2n  ; même forme en Nb 15.22 ; Ez 45.20. –  sans que l''assemblée s''en aperçoive  : litt. et la chose est cachée aux yeux de l''assemblée  ; tournure analogue en 5.2ss ; même verbe pour fermer les yeux en 20.4 ; Nb 5.13. –  commandements  : voir loi.'
  - type: text
    content: 'Si c''est toute la communauté d''Israël qui a fait une erreur, sans que l''assemblée s''en aperçoive, en commettant ce qu''interdit l''un des commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', se mettant ainsi en tort, '
  '14':
  - type: note
    content: Voir péché.
  - type: text
    content: 'lorsqu''on s''apercevra du péché qu''elle a commis, l''assemblée présentera un taureau en sacrifice pour le péché ; on l''amènera devant la tente de la Rencontre. '
  '15':
  - type: note
    content: 'Les anciens représentent la communauté. –  on immolera  : litt. il immolera  ; le sujet sous-entendu est peut-être le grand prêtre (cf. 1.5n).'
  - type: text
    content: 'Les anciens de la communauté poseront les mains sur la tête du taureau, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et on immolera le taureau devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: Voir onction et sang.
  - type: text
    content: 'Le prêtre qui a reçu l''onction apportera du sang du taureau dans la tente de la Rencontre ; '
  '17':
  - type: text
    content: 'le prêtre trempera son doigt dans le sang et il en fera sept fois l''aspersion devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en face du voile. '
  '18':
  - type: text
    content: 'Il mettra du sang sur les cornes de l''autel qui est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la tente de la Rencontre ; il répandra tout le reste du sang sur le socle de l''autel des holocaustes qui est à l''entrée de la tente de la Rencontre. '
  '19':
  - type: text
    content: 'Il prélèvera toute sa graisse et la fera fumer sur l''autel. '
  '2':
  - type: note
    content: 'par erreur ou par mégarde  : la loi rituelle distingue ainsi les fautes commises accidentellement, seules concernées par le sacrifice pour le péché, des transgressions délibérées (cf. v. 13n,22,27 ; 5.15,18 ; 22.14 ; Nb 15.27ss ; 35.11,15 ; Ps 119.10n  ; Ec 5.5 ; voir aussi Ez 45.20). –  ce qu''interdit…  : litt. (concernant des choses) qui ne se font pas, et qu''il fait une seule d''entre elles  ; il s''agit de commandements de forme négative, c.-à-d. d''interdictions (tu ne feras pas) ; de même aux v. 13,22.'
  - type: text
    content: 'Dis aux Israélites : Lorsque quelqu''un pèche par erreur en commettant ce qu''interdit l''un des commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '20':
  - type: note
    content: 'C''est ainsi…  : autre traduction alors le prêtre fera sur eux le rite d''expiation (1.4+) ; de même aux v. 26,31,35 ; 5.6,10,13,16,26. – Voir sacrifices et péché.'
  - type: text
    content: 'Il fera pour ce taureau comme pour le taureau du sacrifice pour le péché ; il fera de même. C''est ainsi que le prêtre fera sur eux l''expiation, et il leur sera pardonné. '
  '21':
  - type: text
    content: Il emportera le taureau hors du camp et le brûlera comme il a brûlé le premier taureau. C'est un sacrifice pour le péché de l'assemblée.
  - type: heading
    content: Pour le péché d'un prince
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'un prince  : sur le terme correspondant, voir Gn 25.16 ; Nb 7.2 ; 13.2 ; 25.18 ; Ez 45.7ss ; Esd 1.8. –  commandements  : voir loi.'
  - type: text
    content: 'Lorsqu''un prince pèche en commettant par erreur ce qu''interdit l''un des commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, se mettant ainsi en tort, '
  '23':
  - type: text
    content: 's''il s''aperçoit du péché qu''il a commis, il apportera en présent un bouc, un mâle sans défaut. '
  '24':
  - type: note
    content: Voir sacrifices.
  - type: text
    content: 'Il posera la main sur la tête du bouc, et il l''immolera dans le lieu où on immole l''holocauste, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. C''est un sacrifice pour le péché. '
  '25':
  - type: note
    content: 'le reste du sang  : litt. son sang  ; cf. v. 7n.'
  - type: text
    content: 'Avec son doigt, le prêtre prendra du sang du sacrifice pour le péché ; il en mettra sur les cornes de l''autel des holocaustes et répandra le reste du sang sur le socle de l''autel des holocaustes. '
  '26':
  - type: note
    content: Voir expiation.
  - type: text
    content: Il fera fumer toute sa graisse sur l'autel, comme la graisse du sacrifice de paix. Le prêtre fera sur lui l'expiation de son péché, et il lui sera pardonné.
  - type: heading
    content: Pour le péché d'un particulier
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'du peuple du pays  : cf. 20.2n,4 ; 2R 11.14 ; Dn 9.6. – Voir péché. –  commandements  : voir loi.'
  - type: text
    content: 'Si c''est quelqu''un du peuple du pays qui a péché par erreur en commettant ce qu''interdit l''un des commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', se mettant ainsi en tort, '
  '28':
  - type: text
    content: 's''il s''aperçoit du péché qu''il a commis, il apportera en présent une chèvre, une femelle sans défaut, pour le péché qu''il a commis. '
  '29':
  - type: note
    content: 'la tête du sacrifice…  : c.-à-d. la tête de l''animal offert en sacrifice…  ; cf. v. 33. –  le lieu de l''holocauste  : c.-à-d. le lieu où l''on égorge l''animal offert en holocauste, cf. v. 24.'
  - type: text
    content: 'Il posera la main sur la tête du sacrifice pour le péché, et il l''immolera dans le lieu de l''holocauste. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le prêtre ayant reçu l''onction  : c.-à-d. le grand prêtre , 6.15 ; cf. 8.12 ; Ex 29.7 ; le terme traduit par ayant reçu l''onction a donné le mot messie  ; il s''applique ailleurs aux rois, cf. 1S 2.10 ; 10.1 ; 16.12s ; cf. Dn 9.25s. –  mettant ainsi le peuple en tort 5.6n  ; le grand prêtre représente le peuple tout entier devant Dieu, de sorte que sa faute rejaillit sur toute la communauté. –  en sacrifice pour le péché  : autre traduction pour le péché . Le même terme hébreu peut désigner le péché et le sacrifice (ou le rite) qui lui correspond.'
  - type: text
    content: 'Si c''est le prêtre ayant reçu l''onction qui pèche, mettant ainsi le peuple en tort, il présentera au '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour le péché qu''il a commis, un taureau sans défaut en sacrifice pour le péché. '
  '30':
  - type: note
    content: Voir prêtre et sang.
  - type: text
    content: 'Avec son doigt, le prêtre prendra du sang du sacrifice pour le péché ; il en mettra sur les cornes de l''autel des holocaustes et répandra tout le reste du sang sur le socle de l''autel. '
  '31':
  - type: note
    content: odeur agréable 1.9n. – Voir expiation.
  - type: text
    content: 'Il détachera toute la graisse, comme on détache la graisse du sacrifice de paix, et il la fera fumer sur l''autel ; ce sera une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: . Le prêtre fera sur lui l'expiation, et il lui sera pardonné.
  '32':
  - type: text
    content: 'S''il apporte un mouton en présent comme sacrifice pour le péché, il apportera une femelle sans défaut. '
  '33':
  - type: text
    content: 'Il posera la main sur la tête du sacrifice pour le péché, et il l''immolera en sacrifice pour le péché dans le lieu où on immole l''holocauste. '
  '34':
  - type: text
    content: 'Avec son doigt, le prêtre prendra du sang du sacrifice pour le péché ; il en mettra sur les cornes de l''autel des holocaustes et répandra tout le reste du sang sur le socle de l''autel. '
  '35':
  - type: text
    content: 'Il détachera toute la graisse, comme on détache la graisse du mouton dans le sacrifice de paix, et il la fera fumer sur l''autel, par-dessus les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: . Le prêtre fera sur lui l'expiation du péché qu'il a commis, et il lui sera pardonné.
  '4':
  - type: note
    content: posera la main… 1.4n.
  - type: text
    content: 'Il amènera le taureau à l''entrée de la tente de la Rencontre, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il posera la main sur la tête du taureau, et il immolera le taureau devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Le prêtre qui a reçu l''onction prendra du sang du taureau et l''apportera dans la tente de la Rencontre ; '
  '6':
  - type: note
    content: 'il en fera…  : autre traduction devant le Seigneur il aspergera sept fois (cf. v. 17 ; 14.16 ; 16.14,19 etc.) la face (c.-à-d. le côté visible) du voile du sanctuaire, cf. Ex 26.31-35. Le verbe correspondant ici à faire l''aspersion (à distinguer de celui de 1.5n) apparaît également au v. 17 et en 5.9 ; 6.20 ; 8.11,30 ; 14.7,16,27,51 ; 16.14s,19 ; Ex 29.21 ; Nb 8.7 ; 19.4,18ss ; Es 52.15.'
  - type: text
    content: 'il trempera son doigt dans le sang et il en fera sept fois l''aspersion devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en face du voile du sanctuaire. '
  '7':
  - type: note
    content: 'cornes Ex 27.2n. –  autel de l''encens aromatique Ex 30.1-10. –  tout le reste du sang  : litt. tout le sang, de même aux v. 18,30,34 ; cf. v. 25n.'
  - type: text
    content: 'Le prêtre mettra du sang sur les cornes de l''autel de l''encens aromatique qui est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la tente de la Rencontre ; il répandra tout le reste du sang du taureau sur le socle de l''autel des holocaustes qui est à l''entrée de la tente de la Rencontre. '
  '8':
  - type: note
    content: 'taureau…  : litt. taureau du péché.'
  - type: text
    content: 'Il prélèvera toute la graisse du taureau du sacrifice pour le péché, la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
  '9':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons, '
