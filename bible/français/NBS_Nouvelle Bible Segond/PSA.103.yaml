document_id: PSA.103,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénis le Seigneur  !
  - type: text
    content: ' '
  - type: note
    content: 'Que je bénisse… (ou mon âme, bénis… 6.4n  ; 42.6+ ; 146.1) v. 2,22 ; 104.1,35 ; 145.2,21. –  tout en moi  : cf. Dt 6.5.'
  - type: text
    content: De David.
  - type: text
    content: 'Que je bénisse le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: que tout en moi bénisse son nom sacré !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ez 20.44 ; Jb 33.27 ; Esd 9.13 ; Rm 5.8. – Voir péché. –  rend  : le terme peut aussi bien signifier traiter (quelqu''un de telle ou telle manière) que récompenser ou rendre la pareille  ; cf. 28.4+.'
  - type: text
    content: il ne nous traite pas selon nos péchés,
  - type: text
    content: il ne nous rend pas selon nos fautes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'forte  : le terme hébreu fait assonance avec celui qui est traduit par élevé. –  au-dessus de  : autre traduction en faveur de , cf. v. 17 ; certains comprennent forte au-delà de ce qu''imaginent ceux qui le craignent (15.4+) ; cf. 36.6 ; 117.2 ; Es 55.9.'
  - type: text
    content: Autant le ciel est élevé au-dessus de la terre,
  - type: text
    content: autant sa fidélité est forte au-dessus de ceux qui le craignent ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 38.17 ; 44.22 ; Jr 50.20 ; Mi 7.19.
  - type: text
    content: autant l'orient est éloigné de l'occident,
  - type: text
    content: autant il éloigne de nous nos transgressions.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 89.27s ; Dt 1.31 ; 2S 7.14 ; Es 1.2 ; 49.15 ; 63.15s ; 64.7s ; Jr 3.4,19 ; 31.20 ; Os 11.1s ; Ml 3.17.
  - type: text
    content: Comme un père a compassion de ses fils,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a compassion de ceux qui le craignent.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: de quoi nous sommes formés ou façonnés  ; Gn 2.7n  ; Jb 10.9 ; certains traduisent il connaît nos penchants ou nos dispositions  ; cf. Gn 6.5 ; 8.21 ; Dt 31.21 ; Es 26.3 ; 1Ch 29.18. –  poussière 78.39 ; 90.3 ; 104.29 ; 146.4 ; Gn 3.19 ; 18.27.
  - type: text
    content: Car lui, il sait de quoi nous sommes formés,
  - type: text
    content: il se souvient que nous sommes poussière.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 102.12+ ; Es 40.6s ; Jb 14.2.
  - type: text
    content: L'homme ! Ses jours sont comme l'herbe,
  - type: text
    content: il fleurit comme la fleur des champs.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '90.5s. –  elle / la  : les pronoms peuvent se rapporter aussi bien à l''homme qu''à la fleur. –  le lieu qu''elle habitait  : litt. son lieu  ; cf. 37.10,36 ; Jb 7.10n  ; 8.18.'
  - type: text
    content: Lorsqu'un vent passe sur elle, elle n'est plus,
  - type: text
    content: et le lieu qu'elle habitait ne la reconnaît plus.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '25.6 ; 100.5+ ; cf. Ex 20.6 ; Es 40.8 ; 51.8 ; Lc 1.50. –  en faveur de  : autre traduction au-dessus de , cf. v. 11.'
  - type: text
    content: 'Mais la fidélité du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est depuis toujours et pour toujours en faveur de ceux qui le craignent,'
  - type: text
    content: et sa justice pour les fils de leurs fils,
  '18':
  - type: text
    content: ' '
  - type: note
    content: Gn 17.9 ; Ex 19.5 ; Dt 33.9. – Voir alliance.
  - type: text
    content: pour ceux qui gardent son alliance
  - type: text
    content: et se souviennent de ses directives, afin de les suivre.
  '19':
  - type: text
    content: ' '
  - type: note
    content: son trône dans le ciel 11.4+ ; 29.10 ; Es 66.1 ; Ap 4.2. –  son règne 22.29 ; 93.1+ ; Dn 3.33.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a installé son trône dans le ciel,'
  - type: text
    content: et son règne domine sur tout.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'n''oublie… Dt 4.9+. –  aucun de ses bienfaits  : autre traduction rien de ce qu''il mérite  ; cf. 28.4+ ; 2Ch 32.25.'
  - type: text
    content: 'Que je bénisse le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: que je n'oublie aucun de ses bienfaits !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'ses messagers (ou ses anges ) : cf. 97.7 ; voir aussi Lc 2.13 ; 2P 2.11 ; Ap 5.11. –  puissants ou vaillants  ; le terme hébreu est aussi traduit par (vaillant) guerrier ou héros (19.6 ; 33.16 ; 45.4 ; 89.20 ; 120.4 ; Jg 6.12+). –  qui exécutez sa parole 148.8 ; cf. Lc 1.19. –  en écoutant sa parole  : autre traduction en obéissant à sa parole  ; cette portion de texte est absente de Syr.'
  - type: text
    content: 'Bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous, ses messagers,'
  - type: text
    content: qui êtes puissants en force et qui exécutez sa parole,
  - type: text
    content: en écoutant sa parole !
  '21':
  - type: text
    content: ' '
  - type: note
    content: '148.2. –  qui êtes à son service  : autre traduction vous, ses auxiliaires  ; même terme en 104.4 ; voir aussi Gn 39.4n  ; Ex 24.13n.'
  - type: text
    content: 'Bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous toutes, ses armées,'
  - type: text
    content: qui êtes à son service et qui faites sa volonté !
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 96.9ss ; 98.4ss ; 145.10. –  Que je bénisse… v. 1n.
  - type: text
    content: 'Bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous toutes, ses œuvres,'
  - type: text
    content: dans tous les lieux sur lesquels il domine !
  - type: text
    content: 'Que je bénisse le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'qui pardonne 78.38 ; 130.8 ; Ex 34.9 ; Mc 2.5ss/ /. –  guérit 30.3 ; Jr 3.22. –  maladies  : cf. Dt 29.21 ; Jr 16.4 ; 2Ch 21.19.'
  - type: text
    content: – C'est lui qui pardonne toutes tes fautes,
  - type: text
    content: qui guérit toutes tes maladies,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 86.13 ; 107.20 ; Es 38.17 ; Jon 2.7 ; Jb 33.18. –  qui reprend ou qui délivre  ; le verbe hébreu correspondant est aussi traduit par assurer la rédemption de, rédimer  ; cf. 19.15+. –  qui te couronne ou qui t'entoure  ; cf. 5.13n  ; 8.6 ; 21.4.
  - type: text
    content: qui reprend ta vie à la fosse,
  - type: text
    content: qui te couronne de fidélité et de compassion,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ta vieillesse  : traduction incertaine, d''après Tg  ; le mot hébreu correspondant signifie habituellement beauté, ornement  ; LXX ton désir  ; certains modifient le texte hébreu traditionnel pour lire toute ta vie , comme dans l''expression tant que je vivrai (104.33 ; 146.2). –  qui te fait rajeunir…  : litt. ta jeunesse se renouvelle comme un aigle  ; cf. 92.15 ; Es 40.31n.'
  - type: text
    content: qui rassasie de biens ta vieillesse,
  - type: text
    content: qui te fait rajeunir comme l'aigle.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'justice  : le terme hébreu correspondant est au pluriel ; on pourrait aussi traduire le Seigneur est victorieux  ; cf. 11.7 ; Jg 5.11n  ; 1S 12.7 ; Es 33.15n  ; Ez 3.20+ ; Mi 6.5n  ; Dn 9.16,18. –  il défend le droit de…  : autre traduction il rend justice à…  ; cf. 146.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agit pour la justice,'
  - type: text
    content: il défend le droit de tous les opprimés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il a fait connaître  : cf. Am 3.7. –  ses voies 18.31 ; Ex 33.13ss ; Dt 32.4 ; Es 55.8s ; 58.2. –  aux Israélites  : cf. 78.11 ; 111.6 ; Rm 3.1s.'
  - type: text
    content: Il a fait connaître ses voies à Moïse,
  - type: text
    content: ses hauts faits aux Israélites.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 86.15 ; 145.8 ; Ex 34.6 ; Jl 2.13 ; Né 9.17 ; Jc 5.11.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est compatissant et clément,'
  - type: text
    content: patient et grand par la fidélité ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: Es 57.16 ; Jr 3.5,12 ; Mi 7.18.
  - type: text
    content: il n'accuse pas sans cesse,
  - type: text
    content: il ne garde pas rancune pour toujours ;
