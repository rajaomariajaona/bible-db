document_id: JOB.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'L''argument d''Elihou : Dieu avertit l''homme'
  - type: text
    content: ' '
  - type: note
    content: écoute v. 31 ; 21.2.
  - type: text
    content: Maintenant, Job, écoute mes propos, je te prie ;
  - type: text
    content: prête l'oreille à toutes mes paroles !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Il invente  : litt. il trouve (c.-à-d. Dieu) ; cf. 9.20,29 ; 19.11.'
  - type: text
    content: Il invente contre moi des griefs,
  - type: text
    content: il me considère comme son ennemi ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'mouvements  : litt. sentiers . Voir 7.18+.'
  - type: text
    content: il met mes pieds dans des entraves,
  - type: text
    content: il surveille tous mes mouvements. »
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'tu n''as pas raison  : litt. tu n''es pas juste . Cf. 13.18n  ; 27.5n.'
  - type: text
    content: – Je te répondrai qu'en cela tu n'as pas raison,
  - type: text
    content: car Dieu est plus grand qu'un homme.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'cherches-tu querelle 9.3n. –  à toutes les paroles  : litt. à toutes ses paroles  ; certains modifient le texte hébreu traditionnel pour lire à toutes tes paroles . D''autres pensent qu''il s''agit des paroles de l’ homme mentionné au v. 12. D''autres encore comprennent on ne peut répondre à toutes ses paroles (celles de Dieu) ; il (Dieu) ne rend pas compte de tous ses actes (ou il ne rend compte d''aucun de ses actes ) ; il (Dieu) ne répond pas par (ou malgré ) toutes ses paroles . Cf. 23.13s ; 34.29.'
  - type: text
    content: Pourquoi lui cherches-tu querelle ?
  - type: text
    content: Parce qu'il ne répond pas à toutes les paroles ?
  '14':
  - type: text
    content: Dieu parle cependant, tantôt d'une manière,
  - type: text
    content: tantôt d'une autre, et l'on n'y fait pas attention.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 4.13+.
  - type: text
    content: Dans un rêve, dans une vision nocturne,
  - type: text
    content: quand une torpeur tombe sur les hommes,
  - type: text
    content: quand ils sont endormis sur leur lit.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'il informe…  : litt. il découvre l''oreille des hommes  ; cf. 36.10,15. –  et met le sceau…  : certains modifient la vocalisation traditionnelle du texte hébreu pour lire il les terrifie par leur châtiment . Le mot hébreu correspondant à instruction ou correction n''a pas ici sa forme habituelle ; il pourrait signifier lien . Cf. 12.18n. LXX et il les effraie par des apparitions effrayantes.'
  - type: text
    content: Alors il informe les hommes
  - type: text
    content: et met le sceau à leur instruction,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 36.7-11. –  de ses œuvres , avec une légère modification du texte hébreu traditionnel ; litt. (de l’)œuvre  ; LXX de l''iniquité . –  de préserver de l''orgueil l''homme fort  : litt. il couvre l''orgueil loin de l''homme ( l''homme vaillant, le héros , comme en 38.3), c.-à-d. il cache l''orgueil à l''homme.'
  - type: text
    content: afin d'éloigner l'être humain de ses œuvres
  - type: text
    content: et de préserver de l'orgueil l'homme fort,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'le protéger / qu''il ne périsse pas  : autre traduction protéger son âme / que sa vie ne passe pas  ; même emploi des termes traditionnellement traduits par âme et vie aux v. 28,30 ; sur le premier de ces termes, voir Gn 1.20n. –  le javelot (36.12 ; cf. 6.4+) : même terme en Jl 2.8 ( projectile ) ; Né 4.11 ( arme  ; une lance, selon le v. 15) ; 2Ch 23.10 ; 32.5 ; on pourrait aussi comprendre le canal (cf. Né 3.15n) qui mène au séjour des morts.'
  - type: text
    content: afin de le protéger de la fosse,
  - type: text
    content: pour qu'il ne périsse pas par le javelot.
  '19':
  - type: text
    content: ' '
  - type: note
    content: douleur 5.18+. –  os 30.17.
  - type: text
    content: Par la douleur aussi l'homme reçoit un avertissement sur son lit,
  - type: text
    content: quand une lutte continue vient agiter ses os.
  '2':
  - type: text
    content: J'ouvre la bouche ;
  - type: text
    content: ma langue parle dans mon palais.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Litt. alors sa vie répugne au pain et son gosier (ou sa vie , autre terme qu'au premier vers, voir Gn 1.20n) à la nourriture de désir . Cf. Ps 107.18.
  - type: text
    content: Alors il prend en dégoût le pain,
  - type: text
    content: les aliments les plus désirables.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 16.8+ ; 19.20 ; cf. Ps 22.18.
  - type: text
    content: Sa chair se consume et disparaît au regard ;
  - type: text
    content: ses os, qu'on ne voyait pas, sont mis à nu ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'il s''approche…  : litt. son être (ou sa vie , cf. Gn 1.20n) s''approche de la fosse, sa vie de ceux qui donnent la mort (LXX du séjour des morts ) ; la formule du texte hébreu traditionnel a été interprétée comme une allusion à des puissances actives du séjour des morts, ou aux anges destructeurs ; cf. 2S 24.16 ; 2R 19.35 ; Ps 78.49s ; certains la modifient pour lire des morts ou des eaux de la mort (9.31 ; 2S 22.5).'
  - type: text
    content: il s'approche de la fosse,
  - type: text
    content: de ceux qui donnent la mort.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'un messager ou un ange  ; certains croient que par ces mots Elihou définit indirectement son propre rôle ; voir cependant Dn 9.21-23 ; Za 1.12 ; Ap 8.3s ; Tobit 12.12 : « C''est moi (l''ange Raphaël) qui ai présenté le mémorial de votre prière en présence de la gloire du Seigneur. » –  interprète (16.20n  ; Gn 42.23 ; Es 43.27) ou porte-parole (2Ch 32.31) ; ici on a parfois compris intercesseur . Voir aussi Jb 9.33 ; 16.19 ; 19.25 ; Jn 14.16n. –  son devoir  : litt. sa droiture (cf. v. 3,27 ; 6.25 ; Dt 9.5).'
  - type: text
    content: Mais s'il se trouve pour lui un messager, un interprète,
  - type: text
    content: un seul entre mille,
  - type: text
    content: qui dise à l'être humain son devoir,
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'il lui fera grâce  : le sujet peut être Dieu ou le messager. –  rançon  : le terme est apparenté au vocabulaire de l''expiation  ; cf. 36.18n  ; Ex 21.30n  ; Nb 35.31ns ; Ps 49.7ss ; Mc 10.45 ; 1Tm 2.6.'
  - type: text
    content: 'alors il lui fera grâce et dira :'
  - type: text
    content: « Délivre-le, qu'il ne descende pas dans la fosse !
  - type: text
    content: J'ai trouvé une rançon ! »
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. 29.18-20. –  son adolescence 20.11n.
  - type: text
    content: Alors sa chair retrouve la fraîcheur de la jeunesse,
  - type: text
    content: il revient aux jours de son adolescence.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Il supplie 22.27+. –  qui lui accorde sa faveur  : autre traduction qui l''agrée . –  il paraît en sa présence  : litt. il voit sa face  ; cf. 19.27+. –  avec des acclamations  : cf. Ps 27.6+. –  Dieu rend…  : litt. il rend…'
  - type: text
    content: Il supplie Dieu, qui lui accorde sa faveur,
  - type: text
    content: il paraît en sa présence avec des acclamations.
  - type: text
    content: Dieu rend à l'homme sa justice.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Voir péché. –  je n''ai pas été traité…  : litt. (cela) n''a pas été pareil pour moi  ; cf. Ps 103.10 ; Rm 6.23.'
  - type: text
    content: 'Il chante devant les hommes, il dit :'
  - type: text
    content: « J'ai péché, j'ai rendu tortueux ce qui était droit,
  - type: text
    content: et je n'ai pas été traité comme je le méritais.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Autre traduction Dieu a libéré mon âme quand elle allait passer dans la fosse, et ma vie voit la lumière , v. 18n  ; autre lecture traditionnelle Dieu a libéré son âme… sa vie…
  - type: text
    content: 'Dieu m''a libéré alors que j''allais périr dans la fosse :'
  - type: text
    content: je vois de nouveau la lumière ! »
  '29':
  - type: text
    content: Voilà tout ce que Dieu fait,
  - type: text
    content: deux fois, trois fois, avec un homme.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Voir cœur.
  - type: text
    content: C'est la droiture de mon cœur qu'exprimeront mes discours,
  - type: text
    content: c'est une connaissance pure que proposeront mes lèvres.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Es 38.17 ; Ps 40.3 ; 103.4. –  Pour le détourner  : autre traduction pour faire revenir sa vie ou son être , v. 18n.'
  - type: text
    content: Pour le détourner de la fosse,
  - type: text
    content: pour que l'éclaire la lumière des vivants.
  '31':
  - type: text
    content: ' '
  - type: note
    content: V. 1.
  - type: text
    content: Sois attentif, Job, écoute-moi !
  - type: text
    content: Tais-toi, c'est moi qui parlerai !
  '32':
  - type: text
    content: ' '
  - type: note
    content: V. 5.
  - type: text
    content: Si tu as quelque propos à formuler, réponds-moi !
  - type: text
    content: Parle, car je voudrais te rendre justice.
  '33':
  - type: text
    content: ' '
  - type: note
    content: sagesse 28.12+.
  - type: text
    content: Sinon, écoute-moi !
  - type: text
    content: Tais-toi, et je t'enseignerai la sagesse !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Le souffle ou l'Esprit , 32.8+ ; 34.14 ; cf. 27.3 ; Ps 33.6 ; 104.30. –  du Puissant 5.17n.
  - type: text
    content: Le souffle de Dieu m'a fait,
  - type: text
    content: l'haleine du Puissant me fait vivre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'V. 32. –  tiens-toi  : autre traduction tiens-toi debout.'
  - type: text
    content: Si tu le peux, réponds-moi,
  - type: text
    content: prépare-toi, tiens-toi devant moi !
  '6':
  - type: text
    content: ' '
  - type: note
    content: argile 10.9+.
  - type: text
    content: Devant Dieu, je suis comme toi ;
  - type: text
    content: moi aussi, j'ai été tiré de l'argile ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 9.34n  ; cf. 13.21.
  - type: text
    content: ainsi la terreur que j'inspire ne te remplira pas d'effroi,
  - type: text
    content: et mon autorité ne saurait t'accabler.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'en ma présence  : litt. à mes oreilles . –  tes propos  : litt. le son (le même mot hébreu est souvent traduit par voix ) de tes propos.'
  - type: text
    content: Mais tu as parlé en ma présence
  - type: text
    content: '– j''ai entendu tes propos :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 11.4+. –  je n'ai pas commis de transgression 34.6.
  - type: text
    content: « Je suis sans reproche, je n'ai pas commis de transgression,
  - type: text
    content: je suis net, il n'y a pas de faute en moi.
