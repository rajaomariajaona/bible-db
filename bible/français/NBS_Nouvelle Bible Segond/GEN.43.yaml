document_id: GEN.43,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Benjamin part en Egypte avec ses frères
  - type: text
    content: ' '
  - type: note
    content: 41.57.
  - type: text
    content: 'La famine était sévère dans le pays. '
  '10':
  - type: note
    content: 'nous aurions déjà eu…  : on pourrait aussi comprendre nous serions déjà de retour pour la seconde fois (c.-à-d. du deuxième voyage en Egypte).'
  - type: text
    content: D'ailleurs, si nous n'avions pas tardé, nous aurions déjà eu deux fois le temps d'être de retour.
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 25 ; 37.25n  ; Pr 18.16 ; 17.8. – Le mot traduit ici par spécialités pourrait signifier chant ou psaume (l'expression désignerait alors ce qu'on chante ou ce qu'on célèbre, c.-à-d. ce qui fait la renommée du pays) ou plus probablement puissance (il s'agirait alors des ressources qui font la puissance du pays). Cf. Ex 15.2n.
  - type: text
    content: 'Israël, leur père, leur dit : Puisqu''il en est ainsi, faites donc ceci : prenez dans vos récipients des spécialités du pays et apportez-les en présent à cet homme – un peu de baume, un peu de miel, des aromates, du ladanum, des pistaches et des amandes. '
  '12':
  - type: note
    content: 'le double…  : on pourrait aussi comprendre une seconde fois la même somme d''argent  ; cf. v. 22 ; 42.25,28,35.'
  - type: text
    content: 'Prenez avec vous le double de la somme d''argent nécessaire ; rapportez l''argent qu''on avait remis à l''ouverture de vos besaces ; c''était peut-être par inadvertance. '
  '13':
  - type: note
    content: 'retournez  : litt. levez-vous et retournez.'
  - type: text
    content: 'Prenez votre frère et retournez vers cet homme. '
  '14':
  - type: note
    content: 'le Dieu-Puissant  : hébreu ’El-Shaddaï (17.1n). –  vous accorde…  : litt. vous donne compassion devant l''homme  ; cf. 1R 8.50 ; Né 1.11. –  votre frère, c.-à-d. Siméon, v. 23 ; 42.24. –  perdre mes enfants 42.36.'
  - type: text
    content: Que le Dieu-Puissant vous accorde la compassion de cet homme, et qu'il laisse revenir avec vous votre frère et Benjamin ! Quant à moi, si je dois perdre mes enfants, je les perdrai !
  - type: heading
    content: Joseph donne un banquet pour ses frères
  '15':
  - type: text
    content: ' '
  - type: note
    content: descendirent 12.10n.
  - type: text
    content: 'Ils prirent le présent ; ils prirent avec eux le double de la somme d''argent nécessaire, ainsi que Benjamin. Ils descendirent en Egypte et se présentèrent devant Joseph. '
  '16':
  - type: note
    content: 'l''intendant de sa maison  : litt. (celui) qui (était) sur sa maison (cf. 39.4ss), de même dans la suite. –  tue…  : litt. tue et prépare. –  mangeront avec moi  : comparer d''une part les repas d''alliance (31.54) et d''autre part les repas de la famille royale : 1S 20.24-34 ; 2S 13.23-29.'
  - type: text
    content: 'Quand Joseph vit Benjamin avec eux, il dit à l''intendant de sa maison : Emmène ces hommes à la maison, tue les bêtes et prépare-les ; car ces hommes mangeront avec moi à midi. '
  '17':
  - type: text
    content: 'L''homme fit ce que Joseph avait dit ; il les emmena chez Joseph. '
  '18':
  - type: note
    content: 'se précipiter…  : litt. se rouler sur nous (cf. 2S 20.12) et tomber sur nous. – Les ânes étaient considérés comme des montures de choix.'
  - type: text
    content: 'Lorsqu''on les emmena chez Joseph, ils eurent peur ; ils dirent : S''ils nous emmènent, c''est à cause de l''argent qui a été remis la première fois dans nos besaces ; ils vont se précipiter, se jeter sur nous, et nous prendre comme esclaves, avec nos ânes ! '
  '19':
  - type: text
    content: 'Ils s''approchèrent de l''intendant de la maison de Joseph pour lui parler, à l''entrée de la maison. '
  '2':
  - type: text
    content: 'Quand ils eurent achevé le grain qu''ils avaient apporté d''Egypte, leur père leur dit : Retournez nous acheter un peu de vivres. '
  '20':
  - type: note
    content: 'Pardon… mais  : litt. en moi, par moi ou contre moi  ; il s''agit peut-être d''une formule de serment écourtée (cf. 22.16). Certains, d''après l''araméen, traduisent  : au secours ! (litt. violence !). On pourrait l''interpréter comme une sorte d''interpellation polie en forme de malédiction conditionnelle contre soi-même (malheur à moi, si ma parole n''est pas opportune) ; cf. 1S 1.26n  ; 1R 3.17n  ; voir aussi Ex 4.10+ et bénédiction.'
  - type: text
    content: 'Ils dirent : Pardon, mon seigneur, mais nous sommes déjà descendus une première fois pour acheter des vivres. '
  '21':
  - type: note
    content: 42.27s,35.
  - type: text
    content: 'Puis, lorsque nous sommes arrivés au campement et que nous avons ouvert nos besaces, chacun a retrouvé son argent à l''ouverture de sa besace, exactement le poids de notre argent. Nous le rapportons avec nous. '
  '22':
  - type: note
    content: V. 12.
  - type: text
    content: Nous avons apporté avec nous de l'argent en plus pour acheter des vivres. Nous ne savons pas qui avait remis notre argent dans nos besaces.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Soyez tranquilles  : litt. paix pour vous . –  Dieu de votre père 31.53. –  Siméon v. 14+.'
  - type: text
    content: 'Il répondit : Soyez tranquilles, n''ayez pas peur ! C''est votre Dieu, le Dieu de votre père, qui a mis un trésor dans vos besaces. Votre argent m''est bien parvenu. Et il fit sortir Siméon vers eux.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: lavèrent les pieds 18.4ns.
  - type: text
    content: 'L''homme les fit entrer chez Joseph ; il leur donna de l''eau, et ils se lavèrent les pieds ; il donna aussi du fourrage à leurs ânes. '
  '25':
  - type: note
    content: V. 11.
  - type: text
    content: 'Ils préparèrent leur présent, en attendant que Joseph vienne à midi ; car ils avaient appris qu''ils allaient manger là. '
  '26':
  - type: note
    content: 42.6+.
  - type: text
    content: 'Quand Joseph arriva chez lui, ils lui offrirent le présent qu''ils avaient apporté, et ils se prosternèrent jusqu''à terre devant lui. '
  '27':
  - type: note
    content: 'comment ils allaient  : litt. pour (la) paix. –  Votre vieux père… va-t-il bien  : litt. paix à votre père… ? Cf. 29.6n.'
  - type: text
    content: 'Il leur demanda comment ils allaient : Votre vieux père, dont vous avez parlé, va-t-il bien ? Est-il encore en vie ? '
  '28':
  - type: note
    content: 42.6+.
  - type: text
    content: 'Ils répondirent : Ton serviteur, notre père, va bien ; il est encore en vie. Ils s''inclinèrent et se prosternèrent. '
  '29':
  - type: note
    content: 'Benjamin 42.38n. –  fasse grâce  : cf. Nb 6.25.'
  - type: text
    content: 'Il leva les yeux ; et, voyant Benjamin, son frère, le fils de sa mère, il dit : Est-ce là votre petit frère, celui dont vous m''avez parlé ? Il ajouta : Que Dieu te fasse grâce, mon fils ! '
  '3':
  - type: note
    content: 'V. 5 ; 42.15-20 ; 44.23. –  Vous ne paraîtrez pas en ma présence  : litt. vous ne verrez pas ma face, 32.21n  ; voir aussi 31.2n.'
  - type: text
    content: 'Juda lui répondit : Cet homme nous a avertis : « Vous ne paraîtrez pas en ma présence si votre frère n''est pas avec vous. » '
  '30':
  - type: note
    content: '42.24+. –  il était ému  : litt. sa compassion (ou ses entrailles  ; même terme au v. 14) s''étai(en)t échauffée(s)  ; cf. 1R 3.26n  ; même verbe en Os 11.8, avec un autre complément traduit par pitié. –  il sortit dans une autre pièce  : autre traduction il entra dans sa chambre.'
  - type: text
    content: 'Joseph coupa court, car il était ému de voir son frère, et il avait envie de pleurer ; il sortit dans une autre pièce et se mit à pleurer. '
  '31':
  - type: text
    content: 'Après s''être lavé le visage, il ressortit et, faisant des efforts pour se contenir, il dit : Servez le repas. '
  '32':
  - type: note
    content: 'c''est une abomination pour l''Egypte (autre traduction pour les Egyptiens) : le mot traduit par abomination désigne en général les pratiques interdites par la loi rituelle (Lv 18.22-27 ; Dt 7.25 ; Ez 5.9-11 ; voir pur, impur). Ici, il s''agit apparemment de ce qui serait sacrilège au regard des lois religieuses de l''Egypte, cf. 39.6 ; 46.34 ; Ex 8.22n. Voir aussi Gn 43.25n.'
  - type: text
    content: 'On le servit, lui à part, ses frères à part, et les Egyptiens qui mangeaient avec lui encore à part, car les Egyptiens ne pouvaient pas manger avec les Hébreux ; c''est une abomination pour l''Egypte. '
  '33':
  - type: note
    content: 'le plus jeune  : autre traduction le cadet  ; cf. 25.23. –  ils se regardaient… Es 13.8.'
  - type: text
    content: 'Les frères de Joseph s''assirent devant lui, le premier-né selon son droit d''aînesse, et le plus jeune selon son jeune âge ; ils se regardaient les uns les autres avec stupeur. '
  '34':
  - type: note
    content: '41.34n  ; 45.22 ; 48.22 ; cf. 1S 1.5 ; 9.22-24 ; Pr 23.1-3. –  jusqu''à l''ivresse  : autre traduction et s''enivrèrent, cf. 9.21.'
  - type: text
    content: Joseph leur fit porter des portions de ce qui était devant lui ; la portion de Benjamin faisait bien cinq fois leurs portions à eux tous. Ils burent avec lui jusqu'à l'ivresse.
  '4':
  - type: note
    content: 'laisser partir  : autre traduction envoyer, de même au v. 5 (cf. 37.13s ; 42.4).'
  - type: text
    content: 'Si donc tu veux bien laisser partir notre frère avec nous, nous descendrons t''acheter des vivres. '
  '5':
  - type: note
    content: V. 3.
  - type: text
    content: 'Mais si tu ne veux pas le laisser partir, nous ne descendrons pas, car cet homme nous a dit : « Vous ne paraîtrez pas en ma présence, à moins que votre frère ne soit avec vous. » '
  '6':
  - type: text
    content: 'Israël dit alors : Pourquoi avez-vous mal agi à mon égard, en disant à cet homme que vous aviez encore un frère ? '
  '7':
  - type: note
    content: 'origines 11.28n. –  Amenez  : litt. faites descendre.'
  - type: text
    content: 'Ils répondirent : C''est lui qui nous a interrogés sur nous-mêmes et sur nos origines, en disant : « Votre père est-il encore en vie ? Avez-vous un autre frère ? » Nous avons répondu à ses questions. Pouvions-nous savoir qu''il dirait : « Amenez votre frère ! »'
  '8':
  - type: text
    content: ' '
  - type: note
    content: '42.2. –  toutes nos familles  : autre traduction et nos enfants  ; cf. 34.29n.'
  - type: text
    content: 'Juda dit à Israël, son père : Laisse partir le garçon avec moi ; nous irons, et nous resterons en vie ; ainsi nous ne mourrons pas, nous, toi et toutes nos familles. '
  '9':
  - type: note
    content: '42.37+. –  c''est à moi…  : litt. tu le rechercheras de ma main. –  si je ne te le rends pas  : litt. si je ne le place pas devant ta face  ; la même formule est traduite par présenter en 47.2. –  je serai…  : litt. j''aurai péché envers toi tous les jours (même formule en 44.32).'
  - type: text
    content: 'C''est moi qui me porte garant de lui ; c''est à moi que tu le réclameras. Si je ne te le ramène pas, si je ne te le rends pas, je serai toujours coupable d''un péché envers toi. '
