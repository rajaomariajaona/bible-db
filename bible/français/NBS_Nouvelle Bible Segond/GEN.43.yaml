document_id: GEN.43,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Benjamin part en Egypte avec ses frères
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 41.57.
      marker-yv: yv-n
    - type: text
      text: 'La famine était sévère dans le pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous aurions déjà eu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nous serions déjà de retour pour la seconde fois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (c.-à-d. du deuxième voyage en Egypte).
      marker-yv: yv-n
    - type: text
      text: D'ailleurs, si nous n'avions pas tardé, nous aurions déjà eu deux fois le temps d'être de retour.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 25 ; 37.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Pr 18.16 ; 17.8. – Le mot traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'spécialités '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'psaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(l''expression désignerait alors ce qu''on chante ou ce qu''on célèbre, c.-à-d. ce qui fait la renommée du pays) ou plus probablement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'puissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (il s'agirait alors des ressources qui font la puissance du pays). Cf. Ex 15.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Israël, leur père, leur dit : Puisqu''il en est ainsi, faites donc ceci : prenez dans vos récipients des spécialités du pays et apportez-les en présent à cet homme – un peu de baume, un peu de miel, des aromates, du ladanum, des pistaches et des amandes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le double…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une seconde fois la même somme d'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 22 ; 42.25,28,35.'
      marker-yv: yv-n
    - type: text
      text: 'Prenez avec vous le double de la somme d''argent nécessaire ; rapportez l''argent qu''on avait remis à l''ouverture de vos besaces ; c''était peut-être par inadvertance. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: retournez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: levez-vous et retournez.
      marker-yv: yv-n
    - type: text
      text: 'Prenez votre frère et retournez vers cet homme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Dieu-Puissant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’El-Shaddaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (17.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous accorde…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous donne compassion devant l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 8.50 ; Né 1.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: votre frère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. Siméon, v. 23 ; 42.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'perdre mes enfants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.36.
      marker-yv: yv-n
    - type: text
      text: Que le Dieu-Puissant vous accorde la compassion de cet homme, et qu'il laisse revenir avec vous votre frère et Benjamin ! Quant à moi, si je dois perdre mes enfants, je les perdrai !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph donne un banquet pour ses frères
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'descendirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils prirent le présent ; ils prirent avec eux le double de la somme d''argent nécessaire, ainsi que Benjamin. Ils descendirent en Egypte et se présentèrent devant Joseph. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'intendant de sa maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '(celui) qui (était) sur sa maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 39.4ss), de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tue…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tue et prépare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mangeront avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comparer d''une part les repas d''alliance (31.54) et d''autre part les repas de la famille royale : 1S 20.24-34 ; 2S 13.23-29.'
      marker-yv: yv-n
    - type: text
      text: 'Quand Joseph vit Benjamin avec eux, il dit à l''intendant de sa maison : Emmène ces hommes à la maison, tue les bêtes et prépare-les ; car ces hommes mangeront avec moi à midi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''homme fit ce que Joseph avait dit ; il les emmena chez Joseph. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se précipiter…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se rouler sur nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2S 20.12) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et tomber sur nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ânes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient considérés comme des montures de choix.
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''on les emmena chez Joseph, ils eurent peur ; ils dirent : S''ils nous emmènent, c''est à cause de l''argent qui a été remis la première fois dans nos besaces ; ils vont se précipiter, se jeter sur nous, et nous prendre comme esclaves, avec nos ânes ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s''approchèrent de l''intendant de la maison de Joseph pour lui parler, à l''entrée de la maison. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils eurent achevé le grain qu''ils avaient apporté d''Egypte, leur père leur dit : Retournez nous acheter un peu de vivres. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pardon… mais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en moi, par moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit peut-être d''une formule de serment écourtée (cf. 22.16). Certains, d''après l''araméen, traduisent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au secours ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: violence !
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). On pourrait l'interpréter comme une sorte d'interpellation polie en forme de malédiction conditionnelle contre soi-même (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: malheur à moi, si ma parole n'est pas opportune
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 1S 1.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 3.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ex 4.10+ et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent : Pardon, mon seigneur, mais nous sommes déjà descendus une première fois pour acheter des vivres. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.27s,35.
      marker-yv: yv-n
    - type: text
      text: 'Puis, lorsque nous sommes arrivés au campement et que nous avons ouvert nos besaces, chacun a retrouvé son argent à l''ouverture de sa besace, exactement le poids de notre argent. Nous le rapportons avec nous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 12.
      marker-yv: yv-n
    - type: text
      text: Nous avons apporté avec nous de l'argent en plus pour acheter des vivres. Nous ne savons pas qui avait remis notre argent dans nos besaces.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Soyez tranquilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' pour vous'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu de votre père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Siméon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 14+.
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Soyez tranquilles, n''ayez pas peur ! C''est votre Dieu, le Dieu de votre père, qui a mis un trésor dans vos besaces. Votre argent m''est bien parvenu. Et il fit sortir Siméon vers eux.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lavèrent les pieds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'L''homme les fit entrer chez Joseph ; il leur donna de l''eau, et ils se lavèrent les pieds ; il donna aussi du fourrage à leurs ânes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 11.
      marker-yv: yv-n
    - type: text
      text: 'Ils préparèrent leur présent, en attendant que Joseph vienne à midi ; car ils avaient appris qu''ils allaient manger là. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.6+.
      marker-yv: yv-n
    - type: text
      text: 'Quand Joseph arriva chez lui, ils lui offrirent le présent qu''ils avaient apporté, et ils se prosternèrent jusqu''à terre devant lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comment ils allaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour (la) '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Votre vieux père… va-t-il bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'paix à votre père… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 29.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il leur demanda comment ils allaient : Votre vieux père, dont vous avez parlé, va-t-il bien ? Est-il encore en vie ? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.6+.
      marker-yv: yv-n
    - type: text
      text: 'Ils répondirent : Ton serviteur, notre père, va bien ; il est encore en vie. Ils s''inclinèrent et se prosternèrent. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Benjamin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fasse '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 6.25.'
      marker-yv: yv-n
    - type: text
      text: 'Il leva les yeux ; et, voyant Benjamin, son frère, le fils de sa mère, il dit : Est-ce là votre petit frère, celui dont vous m''avez parlé ? Il ajouta : Que Dieu te fasse grâce, mon fils ! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 5 ; 42.15-20 ; 44.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous ne paraîtrez pas en ma présence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous ne verrez pas ma face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 32.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 31.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Juda lui répondit : Cet homme nous a avertis : « Vous ne paraîtrez pas en ma présence si votre frère n''est pas avec vous. » '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il était ému
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa compassion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses entrailles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même terme au v. 14) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'étai(en)t échauffée(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 3.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; même verbe en Os 11.8, avec un autre complément traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pitié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il sortit dans une autre pièce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il entra dans sa chambre.
      marker-yv: yv-n
    - type: text
      text: 'Joseph coupa court, car il était ému de voir son frère, et il avait envie de pleurer ; il sortit dans une autre pièce et se mit à pleurer. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après s''être lavé le visage, il ressortit et, faisant des efforts pour se contenir, il dit : Servez le repas. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'c''est une abomination pour l''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : le mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abomination '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne en général les pratiques interdites par la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' rituelle (Lv 18.22-27 ; Dt 7.25 ; Ez 5.9-11 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur). Ici, il s''agit apparemment de ce qui serait sacrilège au regard des lois religieuses de l''Egypte, cf. 39.6 ; 46.34 ; Ex 8.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . Voir aussi Gn 43.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On le servit, lui à part, ses frères à part, et les Egyptiens qui mangeaient avec lui encore à part, car les Egyptiens ne pouvaient pas manger avec les Hébreux ; c''est une abomination pour l''Egypte. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le plus jeune
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cadet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 25.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils se regardaient… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 13.8.
      marker-yv: yv-n
    - type: text
      text: 'Les frères de Joseph s''assirent devant lui, le premier-né selon son droit d''aînesse, et le plus jeune selon son jeune âge ; ils se regardaient les uns les autres avec stupeur. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '41.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 45.22 ; 48.22 ; cf. 1S 1.5 ; 9.22-24 ; Pr 23.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à l'ivresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et s'enivrèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 9.21.'
      marker-yv: yv-n
    - type: text
      text: Joseph leur fit porter des portions de ce qui était devant lui ; la portion de Benjamin faisait bien cinq fois leurs portions à eux tous. Ils burent avec lui jusqu'à l'ivresse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: laisser partir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: envoyer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 5 (cf. 37.13s ; 42.4).'
      marker-yv: yv-n
    - type: text
      text: 'Si donc tu veux bien laisser partir notre frère avec nous, nous descendrons t''acheter des vivres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 3.
      marker-yv: yv-n
    - type: text
      text: 'Mais si tu ne veux pas le laisser partir, nous ne descendrons pas, car cet homme nous a dit : « Vous ne paraîtrez pas en ma présence, à moins que votre frère ne soit avec vous. » '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël dit alors : Pourquoi avez-vous mal agi à mon égard, en disant à cet homme que vous aviez encore un frère ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'origines '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amenez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faites descendre.
      marker-yv: yv-n
    - type: text
      text: 'Ils répondirent : C''est lui qui nous a interrogés sur nous-mêmes et sur nos origines, en disant : « Votre père est-il encore en vie ? Avez-vous un autre frère ? » Nous avons répondu à ses questions. Pouvions-nous savoir qu''il dirait : « Amenez votre frère ! »'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes nos familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et nos enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 34.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Juda dit à Israël, son père : Laisse partir le garçon avec moi ; nous irons, et nous resterons en vie ; ainsi nous ne mourrons pas, nous, toi et toutes nos familles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.37+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est à moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu le rechercheras de ma main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si je ne te le rends pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si je ne le place pas devant ta face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la même formule est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'présenter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 47.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je serai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''aurai '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' envers toi tous les jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même formule en 44.32).
      marker-yv: yv-n
    - type: text
      text: 'C''est moi qui me porte garant de lui ; c''est à moi que tu le réclameras. Si je ne te le ramène pas, si je ne te le rends pas, je serai toujours coupable d''un péché envers toi. '
