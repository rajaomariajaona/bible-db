document_id: NUM.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier recensement des Israélites
  - type: text
    content: ' '
  - type: note
    content: 'Dans le désert  : cf. 9.1 ; 10.11s ; les mots correspondants constituent le titre traditionnel du livre dans la Bible hébraïque (cf. Gn 1.1n  ; Ex 1.1n  ; Lv 1.1n  ; Dt 1.1n). –  tente de la Rencontre 16.2n  ; 17.19 ; Ex 25.22 ; 29.42s ; 30.6,36 ; 33.7ss ; Lv 1.1. –  le premier jour du deuxième mois…  : cf. Ex 19.1 ; 40.17.'
  - type: text
    content: 'Dans le désert du Sinaï, dans la tente de la Rencontre, le premier jour du deuxième mois, la deuxième année à compter de leur sortie d''Egypte, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: 'pour les fils de Joseph, pour Ephraïm : Elishama, fils d''Ammihoud ; pour Manassé : Gamliel, fils de Pedahtsour ;'
  '11':
  - type: text
    content: 'pour Benjamin : Abidân, fils de Guidéoni ;'
  '12':
  - type: text
    content: 'pour Dan : Ahiézer, fils d''Ammishaddaï ;'
  '13':
  - type: text
    content: 'pour Aser : Paguiel, fils d''Okrân ;'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Déouel  : cf. 7.42,47 ; 10.20 ; LXX et Syr ont lu Réouel comme en 2.14n  ; Ex 2.18 (les lettres pour « d » et « r » se confondent facilement en hébreu).'
  - type: text
    content: 'pour Gad : Eliasaph, fils de Déouel ;'
  '15':
  - type: text
    content: 'pour Nephtali : Ahira, fils d''Eïnân.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui furent convoqués (litt. appelés  ; autre traduction délégués ) : cf. 16.2 ; 26.9 ; avec une autre lecture traditionnelle on pourrait aussi comprendre ceux qui convoquaient la communauté , cf. Ez 23.23n. –  de leurs tribus  : litt. des tribus de leurs pères  ; de même au v. 47 ; cf. 13.2 ; 26.55 ; 33.54 ; 36.4,7,8. –  des phratries ou des contingents , litt. des milliers  : nom donné à des unités militaires, qui ne correspond pas forcément à leur effectif réel (v. 21n) ; cf. 10.4 ; Ex 12.37n  ; 18.25 ; Jg 6.15n  ; 7.3 ; Mi 5.1n.'
  - type: text
    content: 'Tels sont ceux qui furent convoqués dans la communauté, les princes de leurs tribus, les chefs des phratries d''Israël. '
  '17':
  - type: text
    content: 'Moïse et Aaron prirent ces hommes, qui avaient été désignés par leur nom, '
  '18':
  - type: note
    content: 'du deuxième mois  : LXX ajoute de la deuxième année (v. 1). –  Ils firent enregistrer leur généalogie  : autre traduction ils établirent leur parenté  ; ou, d''après un ms de LXX, ils recensèrent (le peuple).'
  - type: text
    content: 'et ils rassemblèrent toute la communauté, le premier jour du deuxième mois. Ils firent enregistrer leur généalogie, clan par clan, famille par famille, en comptant tête par tête les noms depuis l''âge de vingt ans et au-dessus. '
  '19':
  - type: note
    content: 26.64.
  - type: text
    content: 'Moïse les recensa dans le désert du Sinaï, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait ordonné.'
  '2':
  - type: note
    content: 'Faites le dénombrement  : litt. (re-)levez la tête (le même mot est traduit par chef dans la suite ; il peut aussi avoir le sens de somme) ; Syr porte le singulier (fais le dénombrement) ; chap. 1–4 ; 26.2ss ; Ex 30.11ss ; 1Ch 27.16ss ; 2Ch 25.5 ; cf. 2S 24 ; Lc 2.1ss. –  clan par clan, famille par famille (litt. pour la maison de leurs pères) : cf. v. 4,44n  ; Jos 7.16s ; 1S 10.20s. –  tête  : litt. crâne.'
  - type: text
    content: 'Faites le dénombrement de toute la communauté des Israélites, clan par clan, famille par famille, en comptant tête par tête les noms de tous les mâles. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.1ss ; 26.5ss ; Ex 30.12 ; 38.25ss ; 1S 11.8 ; 2S 24.1ss ; 1Ch 12.24ss ; 21.1ss ; 2Ch 14.7 ; 17.14ss ; voir aussi Esd 2 ; Ap 7.4ss. –  généalogie Gn 2.4n.
  - type: text
    content: 'En ce qui concerne la généalogie des fils de Ruben, premier-né d''Israël, – clan par clan, famille par famille, en comptant tête par tête les noms de tous les mâles, depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '21':
  - type: note
    content: '46 500  : certains comprennent quarante six phratries (ou «  milliers  », v. 16n), soit 500 hommes, de même dans la suite ; en calculant de la sorte on arriverait à un total de 5 500 hommes pour l''ensemble des tribus ; cf. 2.10ss.'
  - type: text
    content: – ceux qui furent recensés dans la tribu de Ruben étaient 46 500.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui furent recensés  : expression omise ici par des versions anciennes.'
  - type: text
    content: 'Pour la généalogie des fils de Siméon, clan par clan, famille par famille, ceux qui furent recensés, en comptant tête par tête les noms de tous les mâles depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '23':
  - type: text
    content: ceux qui furent recensés dans la tribu de Siméon étaient 59 300.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX Gad vient après Benjamin (v. 36s) ; cf. 2.14 ; 26.15. –  en comptant…  : LXX précise en comptant tête par tête les noms de tous les mâles comme aux v. 20,22, de même dans la suite.'
  - type: text
    content: 'Pour la généalogie des fils de Gad, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '25':
  - type: text
    content: ceux qui furent recensés dans la tribu de Gad étaient 45 650.
  '26':
  - type: text
    content: 'Pour la généalogie des fils de Juda, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '27':
  - type: text
    content: ceux qui furent recensés dans la tribu de Juda étaient 74 600.
  '28':
  - type: text
    content: 'Pour la généalogie des fils d''Issacar, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '29':
  - type: text
    content: ceux qui furent recensés dans la tribu d'Issacar étaient 54 400.
  '3':
  - type: note
    content: 'Toi et Aaron v. 17,44. –  vous recenserez ou vous passerez en revue, le verbe hébreu correspondant peut aussi avoir les sens de visiter, inspecter, intervenir (pour ou contre), s''occuper de, établir (à un poste de responsabilité)  ; voir v. 50n  ; Jr 6.15n  ; cf. Jg 7.2ss ; 1S 11.8ss ; 13.15ss ; 2S 18.1s ; 1R 20.27 ; Es 13.4. –  tous ceux…  : litt. quiconque sort pour l''armée, de même aux v. 20ss ; cf. 4.3n  ; 1S 4.1. –  armée par armée  : autre traduction selon leurs armées.'
  - type: text
    content: 'Toi et Aaron, vous recenserez tous ceux qui sont aptes à porter les armes en Israël, armée par armée, depuis l''âge de vingt ans et au-dessus. '
  '30':
  - type: text
    content: 'Pour la généalogie des fils de Zabulon, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '31':
  - type: text
    content: ceux qui furent recensés dans la tribu de Zabulon étaient 57 400.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Joseph , père d’ Ephraïm et de Manassé (v. 34) ; cf. Gn 48.4ss ; 1Ch 5.2.
  - type: text
    content: 'Pour la généalogie des fils de Joseph, fils d''Ephraïm, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '33':
  - type: text
    content: ceux qui furent recensés dans la tribu d'Ephraïm étaient 40 500.
  '34':
  - type: text
    content: 'Pour la généalogie des fils de Manassé, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '35':
  - type: note
    content: '32 200  : un ms de LXX lit 32 300.'
  - type: text
    content: ceux qui furent recensés dans la tribu de Manassé étaient 32 200.
  '36':
  - type: text
    content: 'Pour la généalogie des fils de Benjamin, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '37':
  - type: text
    content: ceux qui furent recensés dans la tribu de Benjamin étaient 35 400.
  '38':
  - type: text
    content: 'Pour la généalogie des fils de Dan, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '39':
  - type: text
    content: ceux qui furent recensés dans la tribu de Dan étaient 62 700.
  '4':
  - type: note
    content: 'un homme par tribu…  : cf. v. 44n  ; Ex 6.14n  ; voir aussi Ex 18.21ss ; Dt 1.15.'
  - type: text
    content: 'Il y aura avec vous un homme par tribu, le chef de sa famille. '
  '40':
  - type: text
    content: 'Pour la généalogie des fils d''Aser, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '41':
  - type: text
    content: ceux qui furent recensés dans la tribu d'Aser étaient 41 500.
  '42':
  - type: text
    content: 'Quant à la généalogie des fils de Nephtali, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '43':
  - type: text
    content: ceux qui furent recensés dans la tribu de Nephtali étaient 53 400.
  '44':
  - type: text
    content: ' '
  - type: note
    content: V. 1ss,16ss ; ici le terme familles (v. 2n) semble être pris au sens de tribu, mais peut-être le texte portait-il à l'origine une formule plus longue comme celle du v. 4 ; cf. 17.17 ; 18.1.
  - type: text
    content: 'Tels sont ceux qui furent recensés par Moïse, Aaron et les douze hommes, les princes d''Israël ; il y avait un homme pour chacune de leurs familles. '
  '45':
  - type: text
    content: 'Tous ceux qui furent recensés parmi les Israélites, famille par famille, depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes en Israël, '
  '46':
  - type: note
    content: '603 550  : cf. 2.32 ; 11.21 ; 26.51 ; Ex 12.37s. Cela supposerait une population totale de l''ordre de deux millions de personnes (à moins qu''on interprète différemment le mot correspondant au chiffre mille, cf. v. 16n,21n). Selon certains, le chiffre 603 550 serait à rapprocher de l''expression somme de tous les fils d''Israël, dont il est la valeur numérique en hébreu (chaque lettre correspondant à un chiffre).'
  - type: text
    content: tous ceux qui furent recensés étaient 603 550.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Les lévites  : voir 2.33 ; 3–4 ; 26.57ss ; 2S 24.9 ; 1Ch 12. –  leur tribu v. 16n.'
  - type: text
    content: Les lévites, selon leur tribu, ne furent pas recensés au milieu d'eux.
  - type: heading
    content: Le rôle particulier de la tribu de Lévi
  '48':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '49':
  - type: text
    content: 'La tribu de Lévi, tu ne la recenseras pas ; tu n''en feras pas le relevé au milieu des Israélites. '
  '5':
  - type: note
    content: Cf. v. 20ss ; 2.3ss ; 7.12ss ; 10.14ss ; Gn 35.23-26 ; Ex 1.2ss.
  - type: text
    content: Voici les noms des hommes qui se tiendront avec vous.
  - type: text
    content: 'Pour Ruben : Elitsour, fils de Shedéour ;'
  '50':
  - type: note
    content: '2.17 ; Ex 25–27 ; 36–38 ; cf. Jg 17.1 ; 18.30. –  affecte  : autre forme du verbe traduit précédemment par recenser  ; cf. v. 3n  ; 3.7s ; 16.9 ; 18.3s ; 1Ch 23.27ss. –  lévites 8.6+. –  la demeure du Témoignage v. 53 ; 10.11 ; 17.19 ; Ex 38.21 ; cf. v. 1 ; Ex 25.9n,16,22 ; Nb 9.15+. –  tout ce qui lui appartient  : litt. tout ce qui est à lui  ; LXX a lu tout ce qui est en lui, c.-à-d. tout ce qui s''y trouve. –  ils y officieront  : cf. 3.6n  ; Ex 24.13n  ; 28.35,43 etc. –  camperont autour v. 53 ; 2.17.'
  - type: text
    content: 'Toi, affecte les lévites à la demeure du Témoignage, à tous ses ustensiles et à tout ce qui lui appartient. Ils porteront la Demeure et tous ses ustensiles, ils y officieront et ils camperont autour de la Demeure. '
  '51':
  - type: note
    content: '4.4ss. –  partira / s''arrêtera (litt. campera) : sur les indications de la nuée, cf. 9.15ss ; Ex 40.36ss. –  le profane  : litt. l''étranger, c.-à-d., en l''occurrence, le non-lévite. Le terme hébreu désigne généralement l''étranger sur le plan culturel (Jr 2.25n), et parfois aussi l''étranger sur le plan rituel ; cf. Ex 29.33n  ; Lv 22.10,12s ; voir aussi Nb 3.4n (feu profane). –  qui approchera  : le verbe hébreu correspondant est souvent traduit par (se) présenter dans le contexte du service sacrificiel ; cf. 3.4,6 etc. ; Lv 1.2n. –  mis à mort 3.10,38 ; 18.7,22 ; cf. 17.5 ; Ex 19.12.'
  - type: text
    content: 'Quand la Demeure partira, les lévites la démonteront ; quand la Demeure s''arrêtera, les lévites la monteront ; le profane qui approchera sera mis à mort. '
  '52':
  - type: note
    content: Une bannière regroupe trois tribus (2.2ss) ; peut-être le nom désigne-t-il moins la bannière proprement dite (un autre terme hébreu désigne l’enseigne en 2.2) que l'unité militaire correspondante.
  - type: text
    content: 'Les Israélites camperont chacun dans son camp, chacun près de sa bannière, armée par armée. '
  '53':
  - type: note
    content: 'V. 50 ; cf. 17.13. –  la Colère, c.-à-d. la colère divine ou le châtiment  ; LXX le péché  ; cf. v. 51 ; 8.19 ; 16.22 ; 17.11n,28 ; 18.3ss ; Lv 10.1ss,6 ; Jos 9.20 ; 22.18,20 ; 2R 3.27 ; Es 34.2n  ; Os 10.7n  ; Ps 106.32 ; Est 1.18 ; Esd 7.23 ; 1Ch 27.24 ; 2Ch 19.2n. –  assureront le service  : même expression en 3.7nss,28ss ; 4.27ss ; 8.26 ; 9.19,23 ; 17.25n  ; 18.3ss ; 31.30,47 ; voir Lv 8.35n.'
  - type: text
    content: 'Les lévites, eux, camperont autour de la demeure du Témoignage, afin que la Colère ne s''abatte pas sur la communauté des Israélites ; les lévites assureront le service de la demeure du Témoignage. '
  '54':
  - type: note
    content: 'firent exactement…  : cf. 2.34 ; 3.51 ; Ex 12.28 ; Lv 23.34.'
  - type: text
    content: 'Les Israélites firent exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse. Ainsi firent-ils.'
  '6':
  - type: text
    content: 'pour Siméon : Sheloumiel, fils de Tsourishaddaï ;'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Nahshôn  : cf. 2.3 ; 7.12 ; 10.14 ; Ex 6.23 ; Rt 4.18ss ; Mt 1.4 ; Lc 3.32.'
  - type: text
    content: 'pour Juda : Nahshôn, fils d''Amminadab ;'
  '8':
  - type: text
    content: 'pour Issacar : Netanéel, fils de Tsouar ;'
  '9':
  - type: text
    content: 'pour Zabulon : Eliab, fils de Hélôn ;'
