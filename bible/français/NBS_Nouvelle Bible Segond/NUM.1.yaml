        - type: text
          text: ' : cf. Ex 19.1 ; 40.17.'
      marker-yv: yv-n
    - type: text
      text: 'Dans le désert du Sinaï, dans la tente de la Rencontre, le premier jour du deuxième mois, la deuxième année à compter de leur sortie d''Egypte, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
