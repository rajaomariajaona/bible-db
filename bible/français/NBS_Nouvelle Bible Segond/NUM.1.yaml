      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'clan par clan, famille par famille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour la maison de leurs pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. v. 4,44'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 7.16s ; 1S 10.20s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: crâne.
      marker-yv: yv-n
    - type: text
      text: 'Faites le dénombrement de toute la communauté des Israélites, clan par clan, famille par famille, en comptant tête par tête les noms de tous les mâles. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.1ss ; 26.5ss ; Ex 30.12 ; 38.25ss ; 1S 11.8 ; 2S 24.1ss ; 1Ch 12.24ss ; 21.1ss ; 2Ch 14.7 ; 17.14ss ; voir aussi Esd 2 ; Ap 7.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'généalogie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce qui concerne la généalogie des fils de Ruben, premier-né d''Israël, – clan par clan, famille par famille, en comptant tête par tête les noms de tous les mâles, depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 46 500
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quarante six phratries '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou «  '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: milliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  », v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: )
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', soit 500 hommes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; en calculant de la sorte on arriverait à un total de 5 500 hommes pour l''ensemble des tribus ; cf. 2.10ss.'
      marker-yv: yv-n
    - type: text
      text: – ceux qui furent recensés dans la tribu de Ruben étaient 46 500.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui furent recensés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : expression omise ici par des versions anciennes.'
      marker-yv: yv-n
    - type: text
      text: 'Pour la généalogie des fils de Siméon, clan par clan, famille par famille, ceux qui furent recensés, en comptant tête par tête les noms de tous les mâles depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ceux qui furent recensés dans la tribu de Siméon étaient 59 300.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans LXX '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vient après '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Benjamin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 36s) ; cf. 2.14 ; 26.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en comptant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en comptant tête par tête les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' de tous les mâles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme aux v. 20,22, de même dans la suite.
      marker-yv: yv-n
    - type: text
      text: 'Pour la généalogie des fils de Gad, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ceux qui furent recensés dans la tribu de Gad étaient 45 650.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Pour la généalogie des fils de Juda, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ceux qui furent recensés dans la tribu de Juda étaient 74 600.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Pour la généalogie des fils d''Issacar, clan par clan, famille par famille, en comptant les noms depuis l''âge de vingt ans et au-dessus, tous ceux qui étaient aptes à porter les armes, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ceux qui furent recensés dans la tribu d'Issacar étaient 54 400.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
