          text: des contingents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des milliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom donné à des unités militaires, qui ne correspond pas forcément à leur effectif réel (v. 21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; cf. 10.4 ; Ex 12.37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.25 ; Jg 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.3 ; Mi 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tels sont ceux qui furent convoqués dans la communauté, les princes de leurs tribus, les chefs des phratries d''Israël. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moïse et Aaron prirent ces hommes, qui avaient été désignés par leur nom, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du deuxième mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la deuxième année '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 1). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils firent enregistrer leur généalogie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils établirent leur parenté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ou, d''après un ms de LXX, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils recensèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (le peuple).
      marker-yv: yv-n
    - type: text
      text: 'et ils rassemblèrent toute la communauté, le premier jour du deuxième mois. Ils firent enregistrer leur généalogie, clan par clan, famille par famille, en comptant tête par tête les noms depuis l''âge de vingt ans et au-dessus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.64.
      marker-yv: yv-n
    - type: text
      text: 'Moïse les recensa dans le désert du Sinaï, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le lui avait ordonné.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Faites le dénombrement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '(re-)levez la tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chef '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans la suite ; il peut aussi avoir le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: somme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' porte le singulier ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais le dénombrement
      - type: usfm
        marker: ft
        children:
        - type: text
