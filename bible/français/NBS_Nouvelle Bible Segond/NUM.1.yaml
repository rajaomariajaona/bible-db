      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des tribus de leurs pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; de même au v. 47 ; cf. 13.2 ; 26.55 ; 33.54 ; 36.4,7,8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des phratries '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
