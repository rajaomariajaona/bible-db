document_id: LUK.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Encore une guérison le jour du sabbat
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.6-11/ /. – Voir sabbat . –  manger  : litt. manger du pain , cf. v. 15 ; cf. Gn 37.25n  ; 2S 9.7,10 ; 12.20 ; 2R 4.8 ; Ec 9.7. –  chez l''un des chefs…  : litt. dans la maison de l''un des chefs… –  pharisiens 5.17+ ; cf. 7.36 ; 11.37. –  l''observaient 6.7 ; 11.53s ; 20.20.'
  - type: text
    content: Un jour de sabbat, il était venu manger chez l'un des chefs des pharisiens, et ceux-ci l'observaient.
  '10':
  - type: note
    content: 'Cf. Siracide 3.18 : « Plus tu es grand, plus il faut t''humilier, et devant le Seigneur tu trouveras grâce. »'
  - type: text
    content: 'Mais, lorsque tu es invité, va te mettre à la dernière place, afin qu''au moment où viendra celui qui t''a invité, il te dise : « Mon ami, monte plus haut ! » Alors ce sera pour toi un honneur devant tous ceux qui seront à table avec toi. '
  '11':
  - type: note
    content: 18.14 ; cf. 1.48,52 ; 16.15 ; Ez 17.24 ; 21.31 ; Mt 23.12 ; 2Co 11.7 ; Ph 2.8s ; Jc 4.10.
  - type: text
    content: En effet, quiconque s'élève sera abaissé, et celui qui s'abaisse sera élevé.
  - type: heading
    content: Inviter les pauvres
  '12':
  - type: text
    content: ' '
  - type: note
    content: déjeuner 11.37ns.
  - type: text
    content: 'Il disait aussi à celui qui l''avait invité : Lorsque tu donnes un déjeuner ou un dîner, ne convie pas tes amis, ni tes frères, ni les gens de ta parenté, ni des voisins riches, de peur qu''ils ne te rendent ton invitation et qu''ainsi tu sois payé de retour. '
  '13':
  - type: note
    content: 'des pauvres… v. 21 ; cf. Dt 14.28s ; 16.11ss ; 26.11ss ; Tobit 2.2 : « On m''apporta la table, on m''apporta quantité de plats fins, et je dis alors à mon fils Tobias : “Va, mon enfant, tâche de trouver parmi nos frères déportés à Ninive quelque pauvre qui se souvienne du Seigneur de tout son cœur, amène-le pour partager mon repas.” » Comparer avec Lv 21.17ss ; 2S 5.8 ; la Règle annexe de la Communauté (Qumrân) 2.5s exclut « toute (personne) frappée dans sa chair, paralysée des pieds ou des mains, boiteuse ou aveugle ou sourde ou muette… » de la communauté, et donc des repas communautaires (décrits en 2.17ss).'
  - type: text
    content: 'Mais lorsque tu donnes un banquet, invite des pauvres, des estropiés, des infirmes, des aveugles. '
  '14':
  - type: note
    content: 'Heureux (6.20+) …  : autre traduction Tu seras heureux qu''ils n''aient pas…  ; cf. 6.32ss ; Mt 6.1ss. –  la résurrection des justes  : cf. 20.35 ; Ac 17.32 ; 23.6 ; 24.15 ; voir aussi Dn 12.2s ; Jn 5.29.'
  - type: text
    content: Heureux seras-tu, parce qu'ils n'ont pas de quoi te payer de retour ! En effet, tu seras payé de retour à la résurrection des justes.
  - type: heading
    content: La parabole du grand repas
  - type: heading
    content: Mt 22.1-14
  '15':
  - type: text
    content: ' '
  - type: note
    content: Heureux… v. 14+ ; Ap 19.9. –  mangera (litt. mangera du pain , v. 1n) dans le royaume… 13.29+.
  - type: text
    content: 'Après avoir entendu cela, un de ceux qui étaient à table lui dit : Heureux celui qui mangera dans le royaume de Dieu !'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme…  : cf. 10.30. Le Talmud racontera plus tard une histoire analogue à propos d''un collecteur des taxes dont l''invitation avait été déclinée par les notables de sa ville. Cf. Evangile selon Thomas 64 : « Jésus a dit : “Un homme avait des invités ; lorsqu''il eut préparé le dîner, il envoya son serviteur pour les convier au repas. Il s''en alla chez le premier et lui dit : ‘Mon maître t''invite.’ Celui-ci répondit : ‘J''ai de l''argent à réclamer auprès de certains marchands ; ils vont venir chez moi ce soir ; je dois y aller et leur donner des instructions. Je m''excuse pour le dîner.’ (…) un autre (…) : ‘Je viens d''acheter une maison, et on me demande pour toute la journée ; je ne serai pas libre.’ (…) un autre (…) : ‘Mon ami va se marier et c''est moi qui ferai le dîner. Je ne pourrai pas venir…’ (…) un autre (…) : ‘Je viens d''acheter un domaine, et je m''en vais recevoir les redevances. Je ne pourrai pas venir…’ (…) Le maître dit à son serviteur : ‘Va-t''en par les routes, et ceux que tu rencontreras, amène-les à dîner.’ Les acheteurs et les marchands n''entreront pas dans les lieux de mon Père.” »'
  - type: text
    content: 'Il lui répondit : Un homme donna un grand dîner et invita beaucoup de gens. '
  '17':
  - type: note
    content: 'il envoya…  : cf. Est 5.8 ; 6.14. –  déjà  : autres traductions enfin ; maintenant  ; certains mss portent tout est déjà prêt  ; cf. Mt 22.4.'
  - type: text
    content: 'A l''heure du dîner, il envoya son esclave dire aux invités : « Venez, c''est déjà prêt. » '
  '18':
  - type: text
    content: 'Mais tous, comme un seul homme, se mirent à s''excuser. Le premier lui dit : « J''ai acheté un champ et je suis contraint d''aller le voir ; je t''en prie, tiens-moi pour excusé ! » '
  '19':
  - type: note
    content: 'les examiner  : autre traduction les essayer (c.-à-d. les mettre au travail pour voir ce qu''ils valent) ; le même verbe est traduit par apprécier en 12.56 ; voir aussi Rm 1.28n.'
  - type: text
    content: 'Un autre dit : « J''ai acheté cinq paires de bœufs, et je vais les examiner ; je t''en prie, tiens-moi pour excusé ! » '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Un hydropique  : litt. un certain homme qui était hydropique.'
  - type: text
    content: 'Un hydropique était devant lui. '
  '20':
  - type: note
    content: 'Je viens de me marier  : litt. j''ai épousé une femme  ; cf. v. 26 ; Dt 20.7 ; 24.5 ; 1Co 7.33.'
  - type: text
    content: 'Un autre dit : « Je viens de me marier : je ne peux pas venir ! » '
  '21':
  - type: note
    content: 'son maître ou son seigneur. –  en colère  : cf. Mt 18.34. –  Va  : litt. sors, de même v. 23. –  les grandes rues  : cf. 10.10 ; Ap 11.8 ; 21.21. –  les pauvres… v. 13n  ; 6.20.'
  - type: text
    content: 'L''esclave, de retour, rapporta tout cela à son maître. Alors le maître de maison, en colère, dit à son esclave : « Va vite dans les grandes rues de la ville, comme dans les petites, et amène ici les pauvres, les estropiés, les aveugles et les infirmes. » '
  '22':
  - type: text
    content: 'L''esclave dit : « Maître, ce que tu as ordonné a été fait, et il y a encore de la place ! » '
  '23':
  - type: note
    content: 'par les chemins…  : c.-à-d. en-dehors de la ville. –  contrains…  : c.-à-d. insiste jusqu''à ce qu''ils entrent  ; cf. 16.16 ; voir aussi 24.29 ; Gn 19.3 ; Mc 6.45/ / ; Ac 16.15.'
  - type: text
    content: 'Le maître dit alors à l''esclave : « Va par les chemins et le long des haies, contrains les gens à entrer, afin que ma maison soit remplie. '
  '24':
  - type: note
    content: 'je vous le dis  : cf. 11.8+. –  ces hommes…  : cf. 13.28s. – Cf. Le Pasteur d''Hermas, Sim. IX,14,2 : « S''ils ne font pas pénitence, d''autres entreront et eux seront définitivement rejetés. »'
  - type: text
    content: Car, je vous le dis, aucun de ces hommes qui avaient été invités ne goûtera mon dîner. »
  - type: heading
    content: Renoncer à tout pour suivre Jésus
  - type: heading
    content: Mt 10.37-38
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'faisaient route avec  : cf. 7.11 ; voir aussi 24.15. –  se retourna 7.44 ; 9.55 ; 22.61 ; 23.28.'
  - type: text
    content: 'De grandes foules faisaient route avec lui. Il se retourna et leur dit :'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.29s/ /. Evangile selon Thomas 55 : « Jésus a dit : “Quiconque ne hait pas son père ou sa mère ne pourra pas devenir mon disciple. Et quiconque ne hait pas ses frères et sœurs et ne porte pas sa croix comme moi ne sera pas digne de moi.” » 101 : « Jésus a dit : “Celui qui ne haïra pas son père et sa mère comme moi, ne pourra pas devenir mon disciple. Et celui qui n''aimera pas son père et sa mère comme moi, ne pourra pas devenir mon disciple.” » –  déteste  : sur le verbe correspondant (habituellement interprété, dans ce contexte, au sens d’ aimer moins ), cf. 6.22,27 ; 16.13 ; Gn 29.31ss ; Dt 21.15ss ; Es 60.15 ; Ml 1.3 ; Mt 5.43n  ; comparer avec 10.37. –  père / mère 2.33 ; 8.51 ; 18.20 ; cf. Dt 33.9 ; 1R 19.19ss. –  femme (précision propre à Lc, cf. v. 20 ; 18.29 ; voir aussi 1Co 7.1ss,25ss) / enfants  : cf. Ac 21.5. –  frères / sœurs 18.29 ; cf. Mc 3.32. –  sa propre vie (mot traditionnellement rendu par âme , cf. 1.46n  ; 6.9) : autre traduction lui-même  ; cf. 9.23s ; 17.33 ; Jn 12.25 ; cf. Poimandrès 4.6 : « Si tu ne détestes pas d''abord ton corps, mon enfant, tu ne pourras t''aimer toi-même. » –  il ne peut être mon disciple v. 27,33.'
  - type: text
    content: 'Si quelqu''un vient à moi et ne déteste pas son père, sa mère, sa femme, ses enfants, ses frères, ses sœurs et même sa propre vie, il ne peut être mon disciple. '
  '27':
  - type: note
    content: 'Ce v. est omis dans quelques mss. –  ne porte pas sa croix 9.23/ / ; cf. Jn 19.17 ; voir aussi Ga 6.14. –  à ma suite  : litt. derrière moi, 9.23n  ; cf. 5.11+.'
  - type: text
    content: Et quiconque ne porte pas sa croix pour venir à ma suite ne peut être mon disciple.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'construire une tour  : cf. Mc 12.1 ; voir aussi Gn 11.3ss. –  s''assied…  : cf. v. 31 ; 16.6 ; on trouve de nombreuses exhortations comparables dans la littérature grecque.'
  - type: text
    content: 'En effet, lequel d''entre vous, s''il veut construire une tour, ne s''assied pas d''abord pour calculer la dépense et voir s''il a de quoi la terminer, '
  '29':
  - type: text
    content: 'de peur qu''après avoir posé les fondations, il ne soit pas capable d''achever, et que tous ceux qui le verront ne se moquent et ne disent : '
  '3':
  - type: note
    content: spécialistes de la loi 7.30+. –  Est-il permis… 6.7,9/ / ; 13.14,16.
  - type: text
    content: 'Jésus demanda aux spécialistes de la loi et aux pharisiens : Est-il permis ou non d''opérer une guérison pendant le sabbat ? '
  '30':
  - type: text
    content: '« Cet homme a commencé à construire, et il n''a pas été capable d''achever. » '
  '31':
  - type: note
    content: 'Cf. 1 Maccabées 4.28s : « Il (Lysias) rassembla soixante mille hommes d''élite et cinq mille cavaliers pour combattre les Juifs… Judas se porta à leur rencontre avec dix mille hommes » (mais les Juifs obtiennent la victoire en réponse à la prière de Judas). –  se demander  : autres traductions prendre conseil (pour savoir) ; décider (même verbe en Jn 11.53 ; 12.10 ; Ac 27.39 ; 2Co 1.17).'
  - type: text
    content: 'Ou bien quel roi, s''il part en guerre contre un autre roi, ne s''assied pas d''abord pour se demander s''il peut, avec dix mille hommes, affronter celui qui vient au-devant de lui avec vingt mille ? '
  '32':
  - type: note
    content: 'une ambassade  : cf. 19.14. –  les conditions de paix  : la même expression est traduite par comment trouver la paix en 19.42 ; expression très proche en 2S 8.10n (LXX) ; 11.7n  ; Ps 122.6n etc.'
  - type: text
    content: 'Sinon, tandis que l''autre est encore loin, il lui envoie une ambassade pour demander les conditions de paix. '
  '33':
  - type: note
    content: ne renonce pas ou ne dit pas adieu, cf. 9.61ns ; voir aussi 5.11,28 ; 12.33 ; 18.22.
  - type: text
    content: Ainsi donc, quiconque d'entre vous ne renonce pas à tous ses biens ne peut être mon disciple.
  - type: heading
    content: Si le sel devient fade
  - type: heading
    content: Mt 5.13  ; Mc 9.50
  '34':
  - type: text
    content: ' '
  - type: note
    content: Mt 5.13n.
  - type: text
    content: 'Le sel est une bonne chose ; mais si le sel devient fade, avec quoi l''assaisonnera-t-on ? '
  '35':
  - type: note
    content: bon… pour… 9.62n. –  Celui qui a des oreilles… 8.8+.
  - type: text
    content: Il n'est bon ni pour la terre, ni pour le fumier ; on le jette dehors. Celui qui a des oreilles pour entendre, qu'il entende !
  '4':
  - type: note
    content: 'guérit  : cf. 4.40 ; 6.18 ; 9.42.'
  - type: text
    content: 'Ils gardèrent le silence. Alors il prit le malade, le guérit et le renvoya. '
  '5':
  - type: note
    content: '13.15 ; Mt 12.11 ; cf. Dt 22.4. –  son fils  : certains mss portent son âne ou son mouton.'
  - type: text
    content: 'Puis il leur dit : Lequel de vous, si son fils ou son bœuf tombe dans un puits, ne l''en retirera pas aussitôt, le jour du sabbat ? '
  '6':
  - type: note
    content: 20.26 ; cf. Ac 11.18 ; 15.12 ; 22.2.
  - type: text
    content: Et ils ne furent pas capables de répondre à cela.
  - type: heading
    content: Choisir la dernière place
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'parabole 5.36+. –  invités  : dans d''autres contextes, le même mot peut être traduit par appelés . –  premières places 11.43 ; 20.46/ /.'
  - type: text
    content: 'Il adressa une parabole aux invités parce qu''il remarquait comment ceux-ci choisissaient les premières places ; il leur disait : '
  '8':
  - type: note
    content: 'Cf. Pr 25.6s ; Mt 20.28n  ; on retrouve des conseils analogues dans la littérature juive postérieure. –  des noces 12.36n. –  t''installer  : litt. t''étendre 7.36n  ; 9.14ns ; 24.30.'
  - type: text
    content: 'Lorsque tu es invité par quelqu''un à des noces, ne va pas t''installer à la première place, de peur qu''une personne plus considérée que toi n''ait été invitée, '
  '9':
  - type: text
    content: 'et que celui qui vous a invités l''un et l''autre ne vienne te dire : « Cède-lui la place. » Tu aurais alors la honte d''aller t''installer à la dernière place. '
