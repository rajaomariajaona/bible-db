        - type: text
          text: un certain homme qui était hydropique.
      marker-yv: yv-n
    - type: text
      text: 'Un hydropique était devant lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
