      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.18 : « Plus tu es grand, plus il faut t''humilier, et devant le Seigneur tu trouveras grâce. »'
      marker-yv: yv-n
    - type: text
      text: 'Mais, lorsque tu es invité, va te mettre à la dernière place, afin qu''au moment où viendra celui qui t''a invité, il te dise : « Mon ami, monte plus haut ! » Alors ce sera pour toi un honneur devant tous ceux qui seront à table avec toi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 18.14 ; cf. 1.48,52 ; 16.15 ; Ez 17.24 ; 21.31 ; Mt 23.12 ; 2Co 11.7 ; Ph 2.8s ; Jc 4.10.
      marker-yv: yv-n
    - type: text
      text: En effet, quiconque s'élève sera abaissé, et celui qui s'abaisse sera élevé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inviter les pauvres
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déjeuner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'Il disait aussi à celui qui l''avait invité : Lorsque tu donnes un déjeuner ou un dîner, ne convie pas tes amis, ni tes frères, ni les gens de ta parenté, ni des voisins riches, de peur qu''ils ne te rendent ton invitation et qu''ainsi tu sois payé de retour. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des pauvres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 21 ; cf. Dt 14.28s ; 16.11ss ; 26.11ss ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.2 : « On m''apporta la table, on m''apporta quantité de plats fins, et je dis alors à mon fils Tobias : “Va, mon enfant, tâche de trouver parmi nos frères déportés à Ninive quelque pauvre qui se souvienne du Seigneur de tout son cœur, amène-le pour partager mon repas.” » Comparer avec Lv 21.17ss ; 2S 5.8 ; la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règle annexe de la Communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ) 2.5s exclut « toute (personne) frappée dans sa chair, paralysée des pieds ou des mains, boiteuse ou aveugle ou sourde ou muette… » de la communauté, et donc des repas communautaires (décrits en 2.17ss).
      marker-yv: yv-n
    - type: text
      text: 'Mais lorsque tu donnes un banquet, invite des pauvres, des estropiés, des infirmes, des aveugles. '
