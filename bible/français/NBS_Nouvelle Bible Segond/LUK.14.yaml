          text: '  : cf. Est 5.8 ; 6.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déjà
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enfin ; maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout est déjà prêt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 22.4.'
      marker-yv: yv-n
    - type: text
      text: 'A l''heure du dîner, il envoya son esclave dire aux invités : « Venez, c''est déjà prêt. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais tous, comme un seul homme, se mirent à s''excuser. Le premier lui dit : « J''ai acheté un champ et je suis contraint d''aller le voir ; je t''en prie, tiens-moi pour excusé ! » '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les examiner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les essayer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les mettre au travail pour voir ce qu'ils valent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'apprécier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 12.56 ; voir aussi Rm 1.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Un autre dit : « J''ai acheté cinq paires de bœufs, et je vais les examiner ; je t''en prie, tiens-moi pour excusé ! » '
  '2':
