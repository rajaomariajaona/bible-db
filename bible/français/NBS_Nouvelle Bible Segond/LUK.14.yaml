        - type: text
          text: les grandes rues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.10 ; Ap 11.8 ; 21.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les pauvres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.20.'
      marker-yv: yv-n
    - type: text
      text: 'L''esclave, de retour, rapporta tout cela à son maître. Alors le maître de maison, en colère, dit à son esclave : « Va vite dans les grandes rues de la ville, comme dans les petites, et amène ici les pauvres, les estropiés, les aveugles et les infirmes. » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''esclave dit : « Maître, ce que tu as ordonné a été fait, et il y a encore de la place ! » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par les chemins…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. en-dehors de la ville. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contrains…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: insiste jusqu'à ce qu'ils entrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 16.16 ; voir aussi 24.29 ; Gn 19.3 ; Mc 6.45/ / ; Ac 16.15.'
      marker-yv: yv-n
    - type: text
      text: 'Le maître dit alors à l''esclave : « Va par les chemins et le long des haies, contrains les gens à entrer, afin que ma maison soit remplie. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
