      marker-yv: yv-n
    - type: text
      text: 'Après avoir entendu cela, un de ceux qui étaient à table lui dit : Heureux celui qui mangera dans le royaume de Dieu !'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
