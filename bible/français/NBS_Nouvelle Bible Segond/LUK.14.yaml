      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 6.32ss ; Mt 6.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: résurrection
        - type: text
          text: ' des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.35 ; Ac 17.32 ; 23.6 ; 24.15 ; voir aussi Dn 12.2s ; Jn 5.29.'
      marker-yv: yv-n
    - type: text
      text: Heureux seras-tu, parce qu'ils n'ont pas de quoi te payer de retour ! En effet, tu seras payé de retour à la résurrection des justes.
  - type: usfm
