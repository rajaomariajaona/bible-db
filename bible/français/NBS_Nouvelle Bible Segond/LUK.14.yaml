        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Un homme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.30. Le '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Talmud
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'racontera plus tard une histoire analogue à propos d''un collecteur des taxes dont l''invitation avait été déclinée par les notables de sa ville. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Thomas
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '64 : « Jésus a dit : “Un homme avait des invités ; lorsqu''il eut préparé le dîner, il envoya son serviteur pour les convier au repas. Il s''en alla chez le premier et lui dit : ‘Mon maître t''invite.’ Celui-ci répondit : ‘J''ai de l''argent à réclamer auprès de certains marchands ; ils vont venir chez moi ce soir ; je dois y aller et leur donner des instructions. Je m''excuse pour le dîner.’ (…) un autre (…) : ‘Je viens d''acheter une maison, et on me demande pour toute la journée ; je ne serai pas libre.’ (…) un autre (…) : ‘Mon ami va se marier et c''est moi qui ferai le dîner. Je ne pourrai pas venir…’ (…) un autre (…) : ‘Je viens d''acheter un domaine, et je m''en vais recevoir les redevances. Je ne pourrai pas venir…’ (…) Le maître dit à son serviteur : ‘Va-t''en par les routes, et ceux que tu rencontreras, amène-les à dîner.’ Les acheteurs et les marchands n''entreront pas dans les lieux de mon Père.” »'
      marker-yv: yv-n
    - type: text
      text: 'Il lui répondit : Un homme donna un grand dîner et invita beaucoup de gens. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
