document_id: PSA.111,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le commencement de la sagesse, c'est la crainte du Seigneur
  - type: text
    content: ' '
  - type: note
    content: Ce psaume et le suivant sont alphabétiques (9.1n  ; 25.1n), à raison d'une lettre de l'alphabet par vers, sans compter le Louez le Seigneur (Yah) initial (cf. 104.35n). –  de tout mon cœur 86.12 ; 138.1 ; Dt 6.4 ; Ep 5.19. –  conseil secret 25.14n. –  dans la communauté 22.23-26+ ; 148.1 ; cf. 1.5 ; 112.2.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Je célébrerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tout mon cœur,'
  - type: text
    content: dans le conseil secret des gens droits comme dans la communauté.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'sagesse / crainte Es 33.6 ; Jb 28.28 ; Pr 1.7 ; 9.10. –  bon sens Pr 3.4. –  qui s''en inspirent  : litt. qui les font ou qui les pratiquent  ; cf. v. 7ss ; plusieurs versions anciennes ont lu qui la pratiquent.'
  - type: text
    content: 'Le commencement de la sagesse, c''est la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ils ont du bon sens, tous ceux qui s'en inspirent.
  - type: text
    content: Sa louange subsiste à jamais.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les œuvres… 92.6+ ; 139.14 ; Ap 15.3. –  recherchées  : sens incertain ; on pourrait aussi comprendre scrutées, appréciées. –  qui y prennent plaisir 1.2 ; 112.1+.'
  - type: text
    content: 'Les œuvres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont grandes,'
  - type: text
    content: recherchées par tous ceux qui y prennent plaisir.
  '3':
  - type: text
    content: ' '
  - type: note
    content: éclat / magnificence 96.6 ; 104.1. –  sa justice… 112.3,9 ; Es 51.6.
  - type: text
    content: Son action est éclat et magnificence,
  - type: text
    content: et sa justice subsiste à jamais.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Il a fixé (ou rappelé ) le souvenir de  : autre traduction il s''est fait un nom par  ; cf. v. 5 ; 6.6n  ; 78.3ss ; 105.5 ; Ex 3.15n  ; 12.14 ; voir aussi Lc 22.19. –  clément… 86.15 ; 103.8 ; Ex 34.6 ; Jc 5.11 ; cf. 112.4n.'
  - type: text
    content: 'Il a fixé le souvenir de ses actes étonnants :'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est clément et compatissant.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'de quoi manger  : litt. une proie , ce que certains comprennent au sens de butin  ; cf. 34.10 ; 78.25 ; Ex 16 ; Nb 11 ; même terme en Ml 3.10 ; Jb 24.5 ; Pr 31.15. –  ceux qui le craignent 15.4+. –  il se souvient…  : cf. v. 9 ; 105.8+ ; 106.45.'
  - type: text
    content: Il a donné de quoi manger à ceux qui le craignent,
  - type: text
    content: il se souvient pour toujours de son alliance.
  '6':
  - type: text
    content: ' '
  - type: note
    content: la puissance de ses œuvres Jr 27.5. –  le patrimoine des nations 2.8 ; 44.3 ; Dt 4.38.
  - type: text
    content: Il a révélé à son peuple la puissance de ses œuvres,
  - type: text
    content: en lui livrant le patrimoine des nations.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'loyauté  : autre traduction vérité , de même au v. 8. –  ses directives 19.8ss ; 93.5, Ap 15.3.'
  - type: text
    content: Les œuvres de ses mains sont loyauté et équité ;
  - type: text
    content: toutes ses directives sont sûres,
  '8':
  - type: text
    content: ' '
  - type: note
    content: pour toujours… 148.6 ; Es 40.8 ; Mt 5.18. –  inébranlables ou fermes  ; cf. 112.8. –  faites ou exécutées, accomplies.
  - type: text
    content: pour toujours, à jamais inébranlables,
  - type: text
    content: faites avec loyauté et droiture.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Il a envoyé… Lc 1.68. –  institué (ou ordonné  ; cf. Jos 7.11+) pour toujours son alliance v. 5+ ; cf. 105.10. –  son nom est sacré et redoutable  : autre traduction son nom est «Saint  » et « Redoutable »  ; 99.3 ; Dt 28.58 ; Lc 1.49.'
  - type: text
    content: Il a envoyé la libération à son peuple,
  - type: text
    content: 'il a institué pour toujours son alliance :'
  - type: text
    content: son nom est sacré et redoutable.
