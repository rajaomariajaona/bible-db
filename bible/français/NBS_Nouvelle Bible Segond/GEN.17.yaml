document_id: GEN.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram devient Abraham
  - type: text
    content: ' '
  - type: note
    content: 'quatre-vingt-dix-neuf ans 21.5. –  apparut  : litt. se fit voir ou se laissa voir (cf. 18.1-2n), tournure caractéristique des récits de théophanies (manifestations divines) dont Dieu garde l''initiative ; cf. 22.1ss,8n,14n. –  le Dieu-Puissant  : hébreu ’El-Shaddaï (cf. 21.33n). Le sens du nom divin Shaddaï est discuté, et plusieurs étymologies en ont été suggérées ( Montagnard, Champêtre, Nourricier, Destructeur etc.) ; LXX traduit ici ton Dieu , mais parfois Dieu tout-puissant . Cf. 28.3 ; 35.11 ; 43.14 ; 48.3 ; 49.25n  ; Ex 6.3 ; Nb 24.4,16 ; Es 13.6n  ; Ez 1.24n  ; 10.5 ; Ps 68.15 ; 91.1 ; Jb 5.17n  ; Rt 1.20s ; Ap 1.8n. –  Marche 5.22+. –  devant moi ou en ma présence , litt. devant ma face  ; cf. 24.40 ; 48.15 ; 1S 12.2s ; 1R 2.4 ; 8.23,25 ; 2R 20.3 ; Ps 116.9. –  intègre 6.9+.'
  - type: text
    content: 'Alors qu''Abram avait quatre-vingt-dix-neuf ans, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à Abram et lui dit : Je suis le Dieu-Puissant. Marche devant moi et sois intègre. '
  '10':
  - type: note
    content: 'circoncis  : de nombreux peuples pratiquent la circoncision, souvent comme un rite d''habilitation au mariage (cf. 34.24ss ; Ex 4.24ss). En Israël ce rite est mis en relation avec l''entrée dans l’alliance  ; ainsi elle est indispensable pour participer à la Pâque (cf. Ex 12.44,48 ; Jos 5.2-10) ; voir aussi Dt 30.6 ; Jr 4.2 ; Ac 7.8 ; Rm 4.11s ; Col 2.11s.'
  - type: text
    content: 'Voici mon alliance, telle que vous la garderez entre moi et vous – toi et ta descendance après toi : tout mâle parmi vous sera circoncis. '
  '11':
  - type: note
    content: 'Vous vous ferez circoncire…  : litt. vous circoncirez la chair de votre prépuce, même formule aux v. 14,23-25 (pour circoncire, se faire circoncire, être circoncis). –  signe / alliance 9.12n.'
  - type: text
    content: 'Vous vous ferez circoncire dans votre chair ; ce sera un signe d''alliance entre moi et vous. '
  '12':
  - type: note
    content: 'huit jours  : cf. Lv 12.3 ; Lc 2.21. –  acheté… Ex 12.44.'
  - type: text
    content: 'A l''âge de huit jours, tout mâle parmi vous, dans toutes vos générations, sera circoncis, qu''il soit né dans la maison ou qu''il ait été acheté à prix d''argent à un étranger, à quelqu''un qui n''est pas de ta descendance. '
  '13':
  - type: note
    content: perpétuelle v. 7+.
  - type: text
    content: 'On devra circoncire celui qui est né dans ta maison et celui qui a été acheté avec ton argent ; mon alliance dans votre chair sera une alliance perpétuelle. '
  '14':
  - type: note
    content: 'qui ne sera pas circoncis ou qui ne se sera pas fait circoncire (v. 11n). –  sera retranché  : l''expression évoque une exclusion de la communauté civile ou religieuse, souvent (mais peut-être pas toujours) associée à la peine de mort ; cf. Ex 31.14+ ; Lv 7.20n. –  de son peuple ou des siens  ; le texte emploie le pluriel du mot habituellement traduit par peuple  ; cf. 25.8n.'
  - type: text
    content: 'Le mâle incirconcis, celui qui ne sera pas circoncis, celui-là sera retranché de son peuple : il a rompu mon alliance. '
  '15':
  - type: note
    content: Saraï et Sara sont deux formes du mot qui signifie princesse (11.29n). On a parfois interprété la première comme signifiant ma princesse, mais cette interprétation est peu probable.
  - type: text
    content: 'Dieu dit encore à Abraham : Quant à Saraï, ta femme, tu ne l''appelleras plus du nom de Saraï : son nom sera Sara. '
  '16':
  - type: note
    content: '18.9-15 ; 21.1-7. – Voir bénédiction. –  les rois de plusieurs peuples  : litt. des rois de peuples.'
  - type: text
    content: 'Je la bénirai : d''elle aussi je te donnerai un fils ; je la bénirai, et elle deviendra des nations ; les rois de plusieurs peuples sortiront d''elle. '
  '17':
  - type: note
    content: 'face contre terre v. 3n. –  il rit  : hébreu yitshak, mot identique au nom Isaac (v. 19 ; 18.12 ; 21.3-6,9n  ; 26.8n  ; cf. Jn 8.56). –  en se disant  : litt. et dit en son cœur.'
  - type: text
    content: 'Abraham tomba face contre terre ; il rit en se disant : Naîtrait-il un enfant d''un homme de cent ans ? Sara aurait-elle un enfant à quatre-vingt-dix ans ? '
  '18':
  - type: note
    content: 21.11.
  - type: text
    content: 'Abraham dit donc à Dieu : Oh ! qu''Ismaël vive devant toi ! '
  '19':
  - type: note
    content: Ce n'est pas cela ! le terme correspondant peut être interprété comme une négation (c.-à-d. il ne s'agit pas de ce fils-là) ; cf. 1R 1.43 (non !) ; mais il peut aussi avoir d'autres nuances (vraiment, Gn 42.21 ; hélas, 2S 14.5 ; 2R 4.14 ; mais, 2Ch 1.4 etc.). –  perpétuelle v. 7+.
  - type: text
    content: 'Mais Dieu dit : Ce n''est pas cela ! C''est Sara, ta femme, qui va te donner un fils ; tu l''appelleras du nom d''Isaac. J''établirai mon alliance avec lui comme une alliance perpétuelle, pour sa descendance après lui. '
  '2':
  - type: note
    content: 'Je mets  : autre traduction je donne. –  alliance 6.18+ ; Ex 2.24 ; 6.4 ; Lv 26.42. –  multiplierai 13.16+.'
  - type: text
    content: 'Je mets mon alliance entre moi et toi : je te multiplierai à l''extrême. '
  '20':
  - type: note
    content: Ismaël / entendu 16.11n  ; 21.17. –  douze 25.12-16. Cf. les douze fils de Nahor (22.21-24) et de Jacob (35.22-26).
  - type: text
    content: 'Pour ce qui est d''Ismaël, je t''ai entendu : je le bénirai, je le rendrai fécond et je le multiplierai à l''extrême ; il engendrera douze princes, et je ferai de lui une grande nation. '
  '21':
  - type: note
    content: 'établirai v. 7n. –  à cette époque-ci  : cf. 18.10 ; le terme hébreu correspondant ici à époque est traduit par temps fixé en 18.14 ; 21.2 ; cf. 1.14n (rencontres festives).'
  - type: text
    content: 'Mais mon alliance, je l''établirai avec Isaac, celui que Sara te donnera l''année prochaine, à cette époque-ci. '
  '22':
  - type: note
    content: 35.13.
  - type: text
    content: Lorsqu'il eut achevé de lui parler, Dieu s'éleva au-dessus d'Abraham.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'circoncit v. 11n. –  ce jour même  : cf. Jos 5.2-9.'
  - type: text
    content: 'Abraham prit Ismaël, son fils, tous ceux qui étaient nés dans sa maison et tous ceux qu''il avait achetés avec son argent, tous les mâles parmi les gens de la maison d''Abraham ; il les circoncit ce jour même, comme Dieu le lui avait dit. '
  '24':
  - type: note
    content: 16.16.
  - type: text
    content: 'Abraham avait quatre-vingt-dix-neuf ans lorsqu''il fut circoncis. '
  '25':
  - type: text
    content: 'Ismaël, son fils, avait treize ans lorsqu''il fut circoncis. '
  '26':
  - type: text
    content: 'Ce jour même, Abraham fut circoncis, ainsi qu''Ismaël, son fils. '
  '27':
  - type: text
    content: De même, tous les hommes de sa maison, nés dans sa maison ou achetés à prix d'argent à des étrangers, furent circoncis avec lui.
  '3':
  - type: note
    content: 'face contre terre  : litt. sur sa face, de même au v. 17.'
  - type: text
    content: 'Abram tomba face contre terre ; Dieu lui dit : '
  '4':
  - type: text
    content: 'Pour ma part, voici mon alliance avec toi : tu deviendras le père d''une multitude de nations. '
  '5':
  - type: note
    content: Rm 4.17. Abram signifie père élevé  ; la forme Abraham est ici rapprochée de l'hébreu ’ab-hamôn (père d'une multitude) ; cf. Né 9.7. Sur Abraham hors du Pentateuque, voir Es 51.2 ; Ez 33.24 ; Ps 47.10 ; 105.42 ; Né 9.7 ; 2Ch 20.7 ; Abraham / Israël (Jacob) Es 29.22 ; 41.8 ; 63.16 ; Mi 7.20 ; Ps 47.5,10 ; 105.6 ; Abraham / Isaac / Israël (Jacob) Jos 24.2-4 ; 1R 18.36 ; 2R 13.23 ; Jr 33.26 ; Ps 105.6-10 ; 1Ch 1.27-34 ; 16.16s ; 29.18 ; 2Ch 30.6.
  - type: text
    content: 'On ne t''appellera plus du nom d''Abram : ton nom sera Abraham, car j''ai fait de toi le père d''une multitude de nations. '
  '6':
  - type: note
    content: 35.11. –  rois Mt 1.1,6-11.
  - type: text
    content: 'Je te rendrai extrêmement fécond, je ferai de toi des nations, et des rois sortiront de toi. '
  '7':
  - type: note
    content: 'J''établis ou j''établirai, cf. v. 19,21 ; voir 6.18n  ; cf. Lc 1.72s ; Rm 9.4. –  ta descendance Ga 3.16. –  dans (ou pour) toutes ses générations  : litt. pour leurs générations, de même dans la suite ; l''expression est particulièrement fréquente dans Ex (12.14+), Lv (3.17+) et Nb (9.10+). –  perpétuelle v. 13,19 ; cf. Ps 105.8-10 ; Es 24.5.'
  - type: text
    content: 'J''établis mon alliance entre moi et toi – toi et ta descendance après toi, dans toutes ses générations – comme une alliance perpétuelle, pour être ton Dieu et celui de ta descendance après toi. '
  '8':
  - type: note
    content: 'le pays où tu séjournes en immigré  : litt. le pays de ton immigration (ou de ton séjour d''immigré) ; cf. Gn 28.4 ; 36.7 ; Ex 6.4 ; 12.48n  ; Ez 20.38 ; voir aussi 12.7+ ; 48.4.'
  - type: text
    content: Je te donnerai, à toi et à ta descendance après toi, comme propriété perpétuelle, le pays où tu séjournes en immigré – tout Canaan – et je serai leur Dieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'tu garderas  : autre traduction tu observeras.'
  - type: text
    content: 'Dieu dit à Abraham : Toi, tu garderas mon alliance, toi et ta descendance après toi, dans toutes ses générations. '
