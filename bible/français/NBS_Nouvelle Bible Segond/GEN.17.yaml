    text: 'Mais Dieu dit : Ce n''est pas cela ! C''est Sara, ta femme, qui va te donner un fils ; tu l''appelleras du nom d''Isaac. J''établirai mon alliance avec lui comme une alliance perpétuelle, pour sa descendance après lui. '
