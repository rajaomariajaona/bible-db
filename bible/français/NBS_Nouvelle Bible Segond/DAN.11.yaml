  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mariage de Bérénice, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la fille du roi du sud '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ptolémée II, avec '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le roi du nord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Antiochos II (vers 250 av. J.-C.). –  '
    - type: usfm
      marker: fq
