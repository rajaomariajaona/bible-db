    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; aussi au v. 25) a ailleurs le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'provoquer '
    - type: usfm
      marker: ft
      children:
      - type: text
