      marker: fqa
      children:
      - type: text
        text: 'multitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aux v. 33s,39,44). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'déferlera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: inondera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 22,40 ; 9.26 ; Es 8.8 ; Jr 47.2 ; Na 1.8. Antiochos III, en marche vers l'Egypte, conquiert la Judée (220 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: 'Ses fils se mettront en campagne et rassembleront des troupes, une grande multitude ; alors il s''avancera, déferlera, submergera, puis reviendra ; il mènera la campagne jusqu''à sa forteresse. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'exaspérera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.7. – Victoire sanglante de Ptolémée IV sur Antiochos III à Raphia (217 av. J.-C.).'
    marker-yv: yv-n
  - type: text
    text: 'Le roi du sud s''exaspérera, il partira en guerre contre le roi du nord qui lèvera une grande multitude, mais cette multitude lui sera livrée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
