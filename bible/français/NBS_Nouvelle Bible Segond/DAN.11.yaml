    marker-yv: yv-n
  - type: text
    text: 'Au temps de la fin, le roi du sud se heurtera contre lui. Et le roi du nord fondra sur lui comme une tempête, avec chars et attelages, et de nombreux bateaux ; il s''avancera dans tous les pays, déferlera et submergera. '
