document_id: DAN.11,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Darius 6.1n  ; 9.1n  ; les versions grecques ont ici Cyrus  ; cf. Es 41.2,25 ; 45.13 ; Esd 1.1-5.
  - type: text
    content: 'Et moi, la première année de Darius, le Mède, j''étais auprès de lui pour lui prêter main-forte et le soutenir. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ses fils  : Séleucos III (226-223 av. J.-C.) et Antiochos III (223-187 av. J.-C.). –  se mettront en campagne  : le verbe hébreu (traduit plus loin par mènera la campagne  ; aussi au v. 25) a ailleurs le sens de provoquer (Dt 2.5+ ; Pr 15.18+) ou de s''emporter (Pr 28.4n). –  des troupes, une grande multitude  : litt. une multitude (le même terme est traduit ainsi jusqu''au v. 13 ; cf. 10.6n) de troupes nombreuses (le même terme est traduit par multitude aux v. 33s,39,44). –  déferlera ou inondera  ; cf. v. 22,40 ; 9.26 ; Es 8.8 ; Jr 47.2 ; Na 1.8. Antiochos III, en marche vers l''Egypte, conquiert la Judée (220 av. J.-C.).'
  - type: text
    content: 'Ses fils se mettront en campagne et rassembleront des troupes, une grande multitude ; alors il s''avancera, déferlera, submergera, puis reviendra ; il mènera la campagne jusqu''à sa forteresse. '
  '11':
  - type: note
    content: 's''exaspérera  : cf. 8.7. – Victoire sanglante de Ptolémée IV sur Antiochos III à Raphia (217 av. J.-C.).'
  - type: text
    content: 'Le roi du sud s''exaspérera, il partira en guerre contre le roi du nord qui lèvera une grande multitude, mais cette multitude lui sera livrée. '
  '12':
  - type: note
    content: 'emportée  : cf. 2.35 ; Es 40.24 ; 41.16. –  le cœur du roi  : litt. son cœur  ; cf. Ez 28.2ss. –  il ne triomphera pas  : Ptolémée IV ne saura pas exploiter sa victoire.'
  - type: text
    content: 'Cette multitude sera emportée, et le cœur du roi s''élèvera ; il fera tomber des dizaines de milliers, mais il ne triomphera pas. '
  '13':
  - type: note
    content: Antiochos III repart en guerre contre Ptolémée V (204 av. J.-C.).
  - type: text
    content: 'Car le roi du nord reviendra et rassemblera une multitude plus nombreuse que la première ; au bout de quelque temps, de quelques années, il s''avancera avec une grande armée et de grandes richesses. '
  '14':
  - type: note
    content: Des Juifs se rebellèrent contre la domination égyptienne en prenant parti pour Antiochos III. –  se dressera et réaliser (autre traduction confirmer, litt. faire tenir debout) traduisent deux formes du même verbe hébreu.
  - type: text
    content: 'En ce temps-là, une multitude se dressera contre le roi du sud, et des hommes violents parmi ton peuple se soulèveront pour réaliser la vision, mais ils trébucheront. '
  '15':
  - type: note
    content: 'La prise de la ville fortifiée de Sidon par Antiochos III (198 av. J.-C.) assure aux Séleucides la domination sur l''ensemble du pays des Juifs (v. 16). –  Les troupes  : litt. les bras, de même aux v. 22,31.'
  - type: text
    content: 'Le roi du nord s''avancera, élèvera un remblai et prendra une ville fortifiée. Les troupes du sud et l''élite de son peuple ne résisteront pas, elles manqueront de force pour résister. '
  '16':
  - type: note
    content: 'fera ce qu''il voudra v. 3+. –  le plus beau des pays  : litt. le pays de la beauté, de même au v. 41 ; cf. v. 20,45n  ; 8.9n. –  en exterminant ce qu''il pourra  : litt. et l''extermination (sera) dans sa main.'
  - type: text
    content: 'Celui qui s''avancera contre lui fera ce qu''il voudra, et personne ne lui résistera ; il s''arrêtera dans le plus beau des pays en exterminant ce qu''il pourra. '
  '17':
  - type: note
    content: 'sa fille comme femme  : litt. la fille des femmes. Antiochos III marie sa fille Cléopâtre à Ptolémée V en vue d''annexer l''Egypte. –  pour sa perte…  : autre traduction mais elle sera perdue, elle ne tiendra pas et elle ne sera pas à lui (le genre féminin a aussi en hébreu la valeur du neutre). Cléopâtre prendra parti pour son mari contre son père et fera appel aux Romains contre la Syrie (cf. v. 6 ; 2.43n).'
  - type: text
    content: 'Il se proposera d''arriver avec la puissance de tout son royaume et d''établir la concorde avec lui ; il lui donnera sa fille comme femme, pour sa perte, mais cela n''aura pas lieu et ne lui réussira pas. '
  '18':
  - type: note
    content: 'du côté des îles (voir Gn 10.5n) : expédition d''Antiochos III contre les régions côtières d''Asie Mineure, de Syrie et d''Israël, qui étaient jusque-là sous domination égyptienne. –  un chef…  : traduction incertaine, litt. un capitaine (Jg 11.6+, ou un magistrat  ; cf. Mi 3.1n) fera cesser son outrage / déshonneur (même terme 9.16 ; 12.2) pour lui sans qu''il fasse revenir pour lui son outrage / déshonneur  ; il est probablement question de la défaite infligée par Scipion à Antiochos III, en 190 av. J.-C., à Magnésie.'
  - type: text
    content: 'Il tournera ses vues du côté des îles et il en prendra une multitude ; mais un chef mettra fin à ses outrages sans qu''il puisse à son tour l''outrager. '
  '19':
  - type: note
    content: Antiochos III meurt de façon peu glorieuse en 187 av. J.-C., lors du pillage d'un temple. –  on ne le trouvera plus Ps 37.10 ; Jb 20.7s.
  - type: text
    content: 'Puis il retournera ensuite vers les forteresses de son pays ; il trébuchera, il tombera, et on ne le trouvera plus. '
  '2':
  - type: note
    content: 'Trois rois  : peut-être Cyrus, Cambyse et Darius Ier  ; le quatrième serait alors Xerxès (cf. Est 1.1) ; mais peut-être s''agit-il simplement des quatre rois perses mentionnés dans l''A.T. : Cyrus, Darius, Xerxès, Artaxerxès. –  richesses 2.39. –  il mettra tout en œuvre…  : traduction incertaine ; litt. il éveillera tout (v. 25n), avec le royaume de Grèce (cf. 8.21+) ; allusion probable aux guerres médiques.'
  - type: text
    content: Maintenant, je t'annonce la vérité.
  - type: heading
    content: La guerre entre les rois du sud et du nord
  - type: text
    content: 'Trois rois se dresseront encore pour la Perse, puis le quatrième amassera plus de richesses que tous les autres ; lorsqu''il sera devenu fort grâce à ses richesses, il mettra tout en œuvre contre le royaume de Grèce. '
  '20':
  - type: note
    content: 'Celui qui le remplacera, Séleucos IV (187-175 av. J.-C.), enverra un tyran ou un oppresseur, un exacteur (cf. Ex 3.7n  ; Za 9.8), son ministre Héliodore, piller le temple de Jérusalem, dans la plus belle partie du royaume (cf. v. 16 ; 2 Maccabées 3.7-40). –  il sera brisé…  : Séleucos IV mourra empoisonné par Héliodore.'
  - type: text
    content: Celui qui le remplacera fera venir un tyran dans la plus belle partie du royaume, mais en quelques jours il sera brisé, et ce ne sera ni par la colère ni par la guerre.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme méprisable  : cf. 7.8 ; 8.9. –  par des intrigues ou par des détours , même terme au v. 34 ; cf. 8.23. Antiochos IV Epiphane (175-164 av. J.-C.), persécuteur des Juifs, s''empare du trône qui aurait dû revenir à Démétrios, le fils de Séleucos IV (cf. 7.24n).'
  - type: text
    content: 'Un homme méprisable se dressera à sa place, sans être investi de la dignité royale ; il arrivera au milieu de la tranquillité et s''emparera du royaume par des intrigues. '
  '22':
  - type: note
    content: 'Les troupes (v. 15n) qui déferleront (v. 10n) : il s''agit peut-être des forces résistantes d''Héliodore. –  le chef de l''alliance  : sans doute le grand prêtre Onias III, destitué en 174 av. J.-C. et tué en 170 av. J.-C. ; cf. 9.26n.'
  - type: text
    content: 'Les troupes qui déferleront seront emportées devant lui par un déferlement et brisées, de même que le chef de l''alliance. '
  '23':
  - type: note
    content: Allusion probable aux menées d'Antiochos à Jérusalem avec la collaboration de Juifs renégats (2 Maccabées 4).
  - type: text
    content: 'Après qu''on se sera joint à lui, il usera de tromperie ; il montera et deviendra puissant avec peu de monde. '
  '24':
  - type: note
    content: Ce verset décrit les préparatifs de la guerre contre l'Egypte.
  - type: text
    content: 'En toute tranquillité il s''avancera dans les lieux les plus fertiles de la province ; il fera ce que n''avaient pas fait ses pères, ni les pères de ses pères ; il distribuera butin, biens et richesses, il fera des plans contre les forteresses, et cela jusqu''à un certain temps. '
  '25':
  - type: note
    content: 'il emploiera  : litt. il éveillera  ; cf. v. 2n. –  son ardeur  : litt. son cœur. –  contre le roi du sud, Ptolémée VI, qu''Antiochos IV attaque (170 av. J.-C.) et qui sera victime de complots au sein de sa propre armée.'
  - type: text
    content: 'A la tête d''une grande armée, il emploiera sa force et son ardeur contre le roi du sud. Et le roi du sud se mettra en campagne pour faire la guerre à une grande et très puissante armée ; mais il ne résistera pas, car on fera des plans contre lui. '
  '26':
  - type: note
    content: 'causeront sa perte  : litt. le briseront. Ptolémée VI, trahi par les siens, est fait prisonnier lors de la prise de Péluse.'
  - type: text
    content: 'Ceux qui mangent des mets de sa table causeront sa perte, son armée sera débordée, et les morts tomberont en grand nombre. '
  '27':
  - type: note
    content: 'à la même table… mensonges  : Ptolémée VI, bien traité par Antiochos IV, doit signer une paix humiliante qui laisse le champ libre aux Séleucides. –  la fin… 8.19n.'
  - type: text
    content: Quant aux deux rois, leur cœur cherchera à nuire, et à la même table ils diront des mensonges. Mais cela ne réussira pas, car la fin arrivera au temps fixé.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Au retour d'Egypte (169 av. J.-C.), Antiochos pille le temple de Jérusalem et lance une première vague de persécutions ( 1 Maccabées 1.20-24 ; 2 Maccabées 5.15-21). –  alliance sacrée ou sainte , Lc 1.72.
  - type: text
    content: Il retournera dans son pays avec de grandes richesses ; son cœur sera contre l'alliance sacrée, il agira, puis il retournera dans son pays.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Seconde campagne d'Antiochos IV contre l'Egypte (168 av. J.-C.).
  - type: text
    content: 'Au temps fixé, il viendra de nouveau contre le sud ; mais cette dernière fois les choses ne se passeront pas comme la première fois. '
  '3':
  - type: note
    content: 'un roi vaillant  : Alexandre le Grand, voir 2.40 ; 8.5,7,21. –  fera ce qu''il voudra v. 16,36.'
  - type: text
    content: 'Mais un roi vaillant se dressera, dominera avec une grande puissance et fera ce qu''il voudra. '
  '30':
  - type: note
    content: 'Chypre  : en hébreu Kittim, l''île de Chypre et, par extension, les îles et les pays méditerranéens (cf. Gn 10.4n  ; Nb 24.24 ; Ez 27.6). Une flotte romaine conduite par Popilius Lænas contraint Antiochos à évacuer l''Egypte et Chypre. –  furieux…  : Antiochos met en place une politique de persécution du judaïsme qui favorise les renégats. Au lieu de il s''entendra à nouveau, on pourrait comprendre il reviendra et s''entendra…'
  - type: text
    content: 'Des navires de Chypre s''avanceront contre lui ; découragé, il rebroussera chemin. Puis, furieux, il agira contre l''alliance sacrée, et il s''entendra à nouveau avec ceux qui auront abandonné l''alliance sacrée. '
  '31':
  - type: note
    content: 'Des troupes (v. 15n) se dresseront…  : cf. 2 Maccabées 5.23s : « Nourrissant à l''égard des Juifs une hostilité foncière, le roi (Antiochos) envoya le Mysarque Apollonius à la tête d''une armée de vingt-deux mille hommes avec ordre d''égorger tous ceux qui étaient dans la force de l''âge… (Il) attendit jusqu''au saint jour du sabbat où, profitant du chômage des Juifs, il commanda à ses subordonnés une prise d''armes. » –  sacrifice constant 8.11n. –  horreur dévastatrice ou l''abomination de la désolation  ; cf. 9.27n  ; voir aussi 12.11 ; Mt 24.15/ /.'
  - type: text
    content: 'Des troupes se dresseront sur son ordre ; elles profaneront le sanctuaire, la forteresse, elles supprimeront le sacrifice constant et établiront l''horreur dévastatrice. '
  '32':
  - type: note
    content: 'Il fera…  : litt. il fera profaner (autre verbe qu''au v. 31 ; cf. Es 24.5n), par des (choses) enjôleuses (ou des flatteries, des paroles complaisantes  ; le terme hébreu ressemble à celui qui est traduit par intrigues aux v. 21,34 ; cf. Ps 5.10n  ; Pr 2.16n), ceux qui traitent l''alliance comme des méchants. –  sera fort et agira  : autre traduction agira avec fermeté  ; allusion probable à la révolte du prêtre Mattathias, père de Judas Maccabée ; cf. 1 Maccabées 2.15ss : « Les envoyés du roi, chargés d''imposer l''apostasie, vinrent à Modîn pour les sacrifices. Beaucoup d''Israélites vinrent à eux, mais Mattathias et ses fils restèrent tous ensemble à part. Les envoyés du roi (… lui dirent : Si tu sacrifies) tu seras, toi et tes fils, parmi les amis du roi, vous serez honorés de dons en argent et en or et de nombreux cadeaux. Mattathias répondit… : … moi, mes fils et mes frères, nous marcherons dans l''alliance de nos pères. »'
  - type: text
    content: 'Il fera apostasier, par des paroles enjôleuses, les profanateurs de l''alliance. Mais le peuple de ceux qui connaissent leur Dieu sera fort et agira ; '
  '33':
  - type: note
    content: 'ceux qui… auront du discernement  : autre traduction ceux qui donneront du discernement au peuple  ; cf. v. 35 ; 1.4n  ; 12.3,10n. –  la multitude v. 39 ; 9.27n  ; cf. Es 53.11s.'
  - type: text
    content: 'et ceux qui, parmi le peuple, auront du discernement communiqueront l''intelligence à la multitude. Il en est qui trébucheront pour un temps à cause de l''épée, des flammes, de la captivité et du pillage. '
  '34':
  - type: note
    content: 'un peu secourus  : il faut peut-être voir ici une allusion aux premiers succès militaires de Judas Maccabée (2 Maccabées 8.1-7).'
  - type: text
    content: 'Dans le temps où ils trébucheront, ils seront un peu secourus, et une multitude se joindra à eux par des intrigues. '
  '35':
  - type: note
    content: 'ceux qui… discernement v. 33n. –  épurés… 12.10 ; cf. 2 Maccabées 6.12,16 : « Ces persécutions ont eu lieu, non pas pour la ruine, mais pour l''éducation de notre race… en le formant par l''adversité, il (Dieu) n''abandonne pas son peuple. » Voir pur. –  temps de la fin v. 40 ; 12.4,9. –  pour le temps fixé v. 27.'
  - type: text
    content: Quelques-uns parmi ceux qui auront du discernement trébucheront, afin qu'ils soient épurés, purifiés et blanchis, jusqu'au temps de la fin, car celle-ci est pour le temps fixé.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'fera ce qu''il voudra v. 3+. – Voir gloire. –  au-dessus de tous les dieux (hébreu ’el , de même dans la suite du v. ; cf. Gn 21.33n) : le surnom d''Epiphane, porté par Antiochos IV, signifie (dieu) manifesté  ; cf. 2Th 2.4. –  inouïes 8.24n. –  le Dieu des dieux 2.47 ; cf. 7.8,11,25 ; Jd 16 ; Ap 13.6.'
  - type: text
    content: 'Le roi fera ce qu''il voudra ; il s''élèvera, il se glorifiera au-dessus de tous les dieux et il dira des choses inouïes contre le Dieu des dieux ; il réussira jusqu''à ce que la fureur arrive à son terme, car ce qui est décidé se fera. '
  '37':
  - type: note
    content: 'dieux de ses pères  : Antiochos IV abandonna le culte des dieux syriens. –  le Bien-Aimé des femmes  : il s''agit probablement d''Adonis-Tammouz (cf. Ez 8.14n).'
  - type: text
    content: 'Il n''aura d''attention ni pour les dieux de ses pères, ni pour le Bien-Aimé des femmes ; il n''aura d''attention pour aucun dieu, car il se glorifiera au-dessus de tous. '
  '38':
  - type: note
    content: 'le dieu des forteresses  : Antiochos IV adorait Zeus Olympien.'
  - type: text
    content: 'Toutefois il glorifiera, à la place, le dieu des forteresses ; ce dieu que ne connaissaient pas ses pères, il le glorifiera avec de l''or, de l''argent, des pierres précieuses et des objets de valeur. '
  '39':
  - type: note
    content: 'dieu étranger Dt 32.12. –  ceux qui le reconnaîtront  : il faut probablement comprendre ceux qui reconnaîtront son dieu  ; mais le sens est incertain. –  il leur distribuera…  : autre traduction possible il répartira le territoire à prix d''argent.'
  - type: text
    content: C'est avec un dieu étranger qu'il agira contre les lieux fortifiés ; il comblera de gloire ceux qui le reconnaîtront, il les fera dominer sur la multitude, il leur distribuera des terres pour récompense.
  '4':
  - type: note
    content: 'se brisera…  : cf. 2.41-43. Alexandre étant mort sans descendants, son empire est divisé, 8.8n,22. –  et ne sera pas aussi puissant…  : litt. il ne domine(ra) pas comme il a dominé, cf. v. 3,5.'
  - type: text
    content: Et lorsqu'il se sera dressé, son royaume se brisera et sera divisé aux quatre vents du ciel ; il n'appartiendra pas à ses descendants et ne sera pas aussi puissant qu'il était, car son royaume sera déraciné et il passera à d'autres qu'à eux.
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'temps de la fin v. 35+. –  attelages ou équipages (de chars). –  tous les pays  : litt. les pays , de même au v. 42. –  déferlera… v. 10+.'
  - type: text
    content: 'Au temps de la fin, le roi du sud se heurtera contre lui. Et le roi du nord fondra sur lui comme une tempête, avec chars et attelages, et de nombreux bateaux ; il s''avancera dans tous les pays, déferlera et submergera. '
  '41':
  - type: note
    content: 'le plus beau des pays 8.9n. –  beaucoup trébucheront Mt 24.10 ; Lc 2.34. –  Edom / Moab / Ammonites  : ennemis héréditaires d''Israël.'
  - type: text
    content: 'Il s''avancera dans le plus beau des pays ; beaucoup trébucheront, mais Edom, Moab et les principaux des Ammonites lui échapperont. '
  '42':
  - type: text
    content: 'Il étendra sa main sur tous les pays, et l''Egypte n''échappera pas. '
  '43':
  - type: note
    content: Les Libyens et les Koushites (cf. Gn 2.13n  ; 10.6 ; Na 3.9n) se dégagent du joug égyptien pour aller litt. sur ses pas.
  - type: text
    content: 'Il se rendra maître des trésors d''or et d''argent, de tous les objets de valeur de l''Egypte. Les Libyens et les Koushites marcheront sur ses traces. '
  '44':
  - type: note
    content: 'de l''est et du nord  : Antiochos IV a connu des troubles sur les frontières parthe et arménienne. –  frapper d''anathème  : cf. Dt 2.34n  ; voir aussi 2R 19.11 ; Es 37.11 ; 2Ch 20.23 ; 30.14.'
  - type: text
    content: 'Des nouvelles de l''est et du nord viendront l''épouvanter, et il partira avec une grande fureur pour détruire, pour frapper d''anathème une multitude. '
  '45':
  - type: note
    content: 'entre les mers  : entre la Méditerranée et la mer Morte. –  la plus belle des montagnes… (litt. la montagne de la beauté de la sainteté), c.-à-d. Jérusalem (cf. v. 16n  ; 9.16,20). –  sans que personne…  : cf. 8.25.'
  - type: text
    content: Il dressera les tentes de son palais entre les mers, vers la plus belle des montagnes, la montagne sacrée. Puis il arrivera à sa fin, sans que personne ne vienne à son secours.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Le roi du sud  : Ptolémée Ier Sôter (305-283 av. J.-C.), fondateur de la dynastie des Lagides en Egypte (au sud du pays de la Judée). –  un de ses princes  : Séleucos Ier Nikator, d''abord officier de Ptolémée puis (305-280 av. J.-C.) fondateur de la dynastie des Séleucides en Syrie, au nord. –  sera puissante  : autre traduction sera plus puissante que la domination de celui-là (le roi du sud).'
  - type: text
    content: Le roi du sud deviendra fort. Mais un de ses princes sera plus fort que lui et dominera ; sa domination sera puissante.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Mariage de Bérénice, la fille du roi du sud Ptolémée II, avec le roi du nord Antiochos II (vers 250 av. J.-C.). –  son bras  : certains modifient légèrement le texte hébreu pour lire (sa) descendance. –  son père  : litt. celui qui l''a enfantée  ; certains modifient la vocalisation traditionnelle pour lire celui qu''elle a enfanté. – Bérénice, son fils et son mari ( son soutien  ?) moururent empoisonnés par la première femme d''Antiochos ; cf. 2.43n.'
  - type: text
    content: Au bout de quelques années ils deviendront alliés, et la fille du roi du sud viendra vers le roi du nord pour établir la concorde. Mais elle ne conservera pas la force du bras, et lui ne tiendra pas, ni son bras ; elle sera livrée avec ceux qui l'auront amenée, avec son père et avec celui qui aura été son soutien en ce temps-là.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Un rejeton de ses racines (à elle) : Ptolémée III, frère de Bérénice ; il entreprend une campagne de représailles contre le roi du nord et s''empare de la première de ses forteresses , Séleucie ou Antioche, la capitale (246 av. J.-C.). –  il en disposera à son gré  : litt. il fera (ou agira ) contre eux.'
  - type: text
    content: 'Un rejeton de ses racines se dressera à sa place ; il viendra vers l''armée, il entrera dans la forteresse du roi du nord, il en disposera à son gré et deviendra fort. '
  '8':
  - type: note
    content: 'objets de valeur Jr 25.34 ; Os 13.15. –  roi du nord  : Séleucos II (246-226 av. J.-C.) reconquiert le territoire perdu par son père Antiochos II.'
  - type: text
    content: 'Il emportera même comme butin en Egypte leurs dieux, leurs statues de métal fondu et leurs objets de valeur en argent et en or. Puis il restera quelques années loin du roi du nord. '
  '9':
  - type: note
    content: 'celui-ci reviendra…  : sans doute une campagne sans succès de Séleucos II contre l''Egypte, qui n''a pas laissé d''autre trace dans l''histoire.'
  - type: text
    content: Et celui-ci reviendra dans le royaume du roi du sud, qui retournera vers sa terre.
