  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Séleucos III (226-223 av. J.-C.) et Antiochos III (223-187 av. J.-C.). –  '
    - type: usfm
