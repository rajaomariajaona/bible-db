    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe hébreu (traduit plus loin par '
    - type: usfm
      marker: fq
      children:
