    marker-yv: yv-n
  - type: text
    text: C'est avec un dieu étranger qu'il agira contre les lieux fortifiés ; il comblera de gloire ceux qui le reconnaîtront, il les fera dominer sur la multitude, il leur distribuera des terres pour récompense.
