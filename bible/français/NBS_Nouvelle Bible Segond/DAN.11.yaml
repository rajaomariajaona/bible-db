    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ez 28.2ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne triomphera pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Ptolémée IV ne saura pas exploiter sa victoire.'
    marker-yv: yv-n
  - type: text
    text: 'Cette multitude sera emportée, et le cœur du roi s''élèvera ; il fera tomber des dizaines de milliers, mais il ne triomphera pas. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Antiochos III repart en guerre contre Ptolémée V (204 av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: 'Car le roi du nord reviendra et rassemblera une multitude plus nombreuse que la première ; au bout de quelque temps, de quelques années, il s''avancera avec une grande armée et de grandes richesses. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Des Juifs se rebellèrent contre la domination égyptienne en prenant parti pour Antiochos III. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se dressera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réaliser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: confirmer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faire tenir debout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) traduisent deux formes du même verbe hébreu.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, une multitude se dressera contre le roi du sud, et des hommes violents parmi ton peuple se soulèveront pour réaliser la vision, mais ils trébucheront. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La prise de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ville fortifiée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de Sidon par Antiochos III (198 av. J.-C.) assure aux Séleucides la domination sur l''ensemble du pays des Juifs (v. 16). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les troupes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les bras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même aux v. 22,31.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi du nord s''avancera, élèvera un remblai et prendra une ville fortifiée. Les troupes du sud et l''élite de son peuple ne résisteront pas, elles manqueront de force pour résister. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fera ce qu''il voudra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le plus beau des pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays de la beauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 41 ; cf. v. 20,45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en exterminant ce qu'il pourra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et l'extermination (sera) dans sa main.
    marker-yv: yv-n
  - type: text
    text: 'Celui qui s''avancera contre lui fera ce qu''il voudra, et personne ne lui résistera ; il s''arrêtera dans le plus beau des pays en exterminant ce qu''il pourra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa fille comme femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la fille des femmes. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Antiochos III marie sa fille Cléopâtre à Ptolémée V en vue d''annexer l''Egypte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour sa perte…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mais elle sera perdue, elle ne tiendra pas et elle ne sera pas à lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le genre féminin a aussi en hébreu la valeur du neutre). Cléopâtre prendra parti pour son mari contre son père et fera appel aux Romains contre la Syrie (cf. v. 6 ; 2.43
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Il se proposera d''arriver avec la puissance de tout son royaume et d''établir la concorde avec lui ; il lui donnera sa fille comme femme, pour sa perte, mais cela n''aura pas lieu et ne lui réussira pas. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du côté des îles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Gn 10.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : expédition d''Antiochos III contre les régions côtières d''Asie Mineure, de Syrie et d''Israël, qui étaient jusque-là sous domination égyptienne. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un chef…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un capitaine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Jg 11.6+, ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un magistrat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mi 3.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fera cesser son outrage / déshonneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même terme 9.16 ; 12.2) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour lui sans qu'il fasse revenir pour lui son outrage / déshonneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il est probablement question de la défaite infligée par Scipion à Antiochos III, en 190 av. J.-C., à Magnésie.'
    marker-yv: yv-n
  - type: text
    text: 'Il tournera ses vues du côté des îles et il en prendra une multitude ; mais un chef mettra fin à ses outrages sans qu''il puisse à son tour l''outrager. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Antiochos III meurt de façon peu glorieuse en 187 av. J.-C., lors du pillage d''un temple. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on ne le trouvera plus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 37.10 ; Jb 20.7s.
    marker-yv: yv-n
  - type: text
    text: 'Puis il retournera ensuite vers les forteresses de son pays ; il trébuchera, il tombera, et on ne le trouvera plus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Celui qui le remplacera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Séleucos IV (187-175 av. J.-C.), enverra '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un tyran '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un oppresseur, un exacteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Ex 3.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Za 9.8), son ministre Héliodore, piller le temple de Jérusalem, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la plus belle partie du royaume '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 16 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.7-40). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il sera brisé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Séleucos IV mourra empoisonné par Héliodore.'
    marker-yv: yv-n
  - type: text
    text: Celui qui le remplacera fera venir un tyran dans la plus belle partie du royaume, mais en quelques jours il sera brisé, et ce ne sera ni par la colère ni par la guerre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un homme méprisable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 7.8 ; 8.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par des intrigues '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par des détours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même terme au v. 34 ; cf. 8.23. Antiochos IV Epiphane (175-164 av. J.-C.), persécuteur des Juifs, s''empare du trône qui aurait dû revenir à Démétrios, le fils de Séleucos IV (cf. 7.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Un homme méprisable se dressera à sa place, sans être investi de la dignité royale ; il arrivera au milieu de la tranquillité et s''emparera du royaume par des intrigues. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les troupes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui déferleront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : il s''agit peut-être des forces résistantes d''Héliodore. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le chef de l'alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sans doute le grand prêtre Onias III, destitué en 174 av. J.-C. et tué en 170 av. J.-C. ; cf. 9.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les troupes qui déferleront seront emportées devant lui par un déferlement et brisées, de même que le chef de l''alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Allusion probable aux menées d'Antiochos à Jérusalem avec la collaboration de Juifs renégats (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 Maccabées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4).
    marker-yv: yv-n
  - type: text
    text: 'Après qu''on se sera joint à lui, il usera de tromperie ; il montera et deviendra puissant avec peu de monde. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset décrit les préparatifs de la guerre contre l'Egypte.
    marker-yv: yv-n
  - type: text
    text: 'En toute tranquillité il s''avancera dans les lieux les plus fertiles de la province ; il fera ce que n''avaient pas fait ses pères, ni les pères de ses pères ; il distribuera butin, biens et richesses, il fera des plans contre les forteresses, et cela jusqu''à un certain temps. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il emploiera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il éveillera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son ardeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: contre le roi du sud
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Ptolémée VI, qu''Antiochos IV attaque (170 av. J.-C.) et qui sera victime de complots au sein de sa propre armée.'
    marker-yv: yv-n
  - type: text
    text: 'A la tête d''une grande armée, il emploiera sa force et son ardeur contre le roi du sud. Et le roi du sud se mettra en campagne pour faire la guerre à une grande et très puissante armée ; mais il ne résistera pas, car on fera des plans contre lui. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: causeront sa perte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le briseront. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ptolémée VI, trahi par les siens, est fait prisonnier lors de la prise de Péluse.
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui mangent des mets de sa table causeront sa perte, son armée sera débordée, et les morts tomberont en grand nombre. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à la même table… mensonges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Ptolémée VI, bien traité par Antiochos IV, doit signer une paix humiliante qui laisse le champ libre aux Séleucides. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la fin… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.19'
      - type: usfm
        marker: ord
        children:
        - type: text
