    marker-yv: yv-n
  - type: text
    text: 'Toutefois il glorifiera, à la place, le dieu des forteresses ; ce dieu que ne connaissaient pas ses pères, il le glorifiera avec de l''or, de l''argent, des pierres précieuses et des objets de valeur. '
