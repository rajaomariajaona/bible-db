    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains modifient légèrement le texte hébreu pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(sa) descendance. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui l'a enfantée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; certains modifient la vocalisation traditionnelle pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui qu''elle a enfanté. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: – Bérénice, son fils et son mari (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son soutien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ?) moururent empoisonnés par la première femme d'Antiochos ; cf. 2.43
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Au bout de quelques années ils deviendront alliés, et la fille du roi du sud viendra vers le roi du nord pour établir la concorde. Mais elle ne conservera pas la force du bras, et lui ne tiendra pas, ni son bras ; elle sera livrée avec ceux qui l'auront amenée, avec son père et avec celui qui aura été son soutien en ce temps-là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un rejeton de ses racines '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(à elle) : Ptolémée III, frère de Bérénice ; il entreprend une campagne de représailles contre le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'roi du nord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et s''empare de la première de ses '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: forteresses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Séleucie ou Antioche, la capitale (246 av. J.-C.). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il en disposera à son gré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il fera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: agira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre eux.
    marker-yv: yv-n
  - type: text
    text: 'Un rejeton de ses racines se dressera à sa place ; il viendra vers l''armée, il entrera dans la forteresse du roi du nord, il en disposera à son gré et deviendra fort. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'objets de valeur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jr 25.34 ; Os 13.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: roi du nord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Séleucos II (246-226 av. J.-C.) reconquiert le territoire perdu par son père Antiochos II.'
    marker-yv: yv-n
  - type: text
    text: 'Il emportera même comme butin en Egypte leurs dieux, leurs statues de métal fondu et leurs objets de valeur en argent et en or. Puis il restera quelques années loin du roi du nord. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui-ci reviendra…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sans doute une campagne sans succès de Séleucos II contre l''Egypte, qui n''a pas laissé d''autre trace dans l''histoire.'
    marker-yv: yv-n
  - type: text
    text: Et celui-ci reviendra dans le royaume du roi du sud, qui retournera vers sa terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
