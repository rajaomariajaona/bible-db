      - type: text
        text: '11.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Trois rois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être Cyrus, Cambyse et Darius I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: '  ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le quatrième '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'serait alors Xerxès (cf. Est 1.1) ; mais peut-être s''agit-il simplement des quatre rois perses mentionnés dans l''A.T. : Cyrus, Darius, Xerxès, Artaxerxès. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'richesses '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.39. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il mettra tout en œuvre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il éveillera tout '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 25
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: )
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', avec le royaume de Grèce '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 8.21+) ; allusion probable aux guerres médiques.
    marker-yv: yv-n
  - type: text
    text: Maintenant, je t'annonce la vérité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La guerre entre les rois du sud et du nord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Trois rois se dresseront encore pour la Perse, puis le quatrième amassera plus de richesses que tous les autres ; lorsqu''il sera devenu fort grâce à ses richesses, il mettra tout en œuvre contre le royaume de Grèce. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un roi vaillant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Alexandre le Grand, voir 2.40 ; 8.5,7,21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fera ce qu''il voudra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 16,36.
    marker-yv: yv-n
  - type: text
    text: 'Mais un roi vaillant se dressera, dominera avec une grande puissance et fera ce qu''il voudra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se brisera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.41-43. Alexandre étant mort sans '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: descendants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', son empire est '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: divisé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 8.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et ne sera pas aussi puissant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne domine(ra) pas comme il a dominé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 3,5.'
    marker-yv: yv-n
  - type: text
    text: Et lorsqu'il se sera dressé, son royaume se brisera et sera divisé aux quatre vents du ciel ; il n'appartiendra pas à ses descendants et ne sera pas aussi puissant qu'il était, car son royaume sera déraciné et il passera à d'autres qu'à eux.
- type: usfm
  marker: p
