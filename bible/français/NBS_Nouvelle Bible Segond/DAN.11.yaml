    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le roi du sud
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Ptolémée I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' Sôter (305-283 av. J.-C.), fondateur de la dynastie des Lagides en Egypte (au '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sud '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du pays de la Judée). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un de ses princes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Séleucos I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' Nikator, d''abord officier de Ptolémée puis (305-280 av. J.-C.) fondateur de la dynastie des Séleucides en Syrie, au nord. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sera puissante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sera plus puissante que la domination de celui-là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le roi du sud).
    marker-yv: yv-n
  - type: text
    text: Le roi du sud deviendra fort. Mais un de ses princes sera plus fort que lui et dominera ; sa domination sera puissante.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
