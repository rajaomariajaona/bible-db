    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''emporter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Pr 28.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des troupes, une grande multitude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une multitude '
    - type: usfm
