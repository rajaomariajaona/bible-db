      - type: text
        text: '2.15ss : « Les envoyés du roi, chargés d''imposer l''apostasie, vinrent à Modîn pour les sacrifices. Beaucoup d''Israélites vinrent à eux, mais Mattathias et ses fils restèrent tous ensemble à part. Les envoyés du roi (… lui dirent : Si tu sacrifies) tu seras, toi et tes fils, parmi les amis du roi, vous serez honorés de dons en argent et en or et de nombreux cadeaux. Mattathias répondit… : … moi, mes fils et mes frères, nous marcherons dans l''alliance de nos pères. »'
    marker-yv: yv-n
  - type: text
