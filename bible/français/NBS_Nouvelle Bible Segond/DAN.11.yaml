  - type: text
    text: 'Le roi fera ce qu''il voudra ; il s''élèvera, il se glorifiera au-dessus de tous les dieux et il dira des choses inouïes contre le Dieu des dieux ; il réussira jusqu''à ce que la fureur arrive à son terme, car ce qui est décidé se fera. '
