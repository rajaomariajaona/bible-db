document_id: PSA.110,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Roi et prêtre
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur (hébreu YHWH ) : LXX du Seigneur  ; cf. v. 5 ; voir Mc 12.36/  ; 14.62/ / ; 16.19 ; Ac 2.34ss ; Hé 1.13  ; 8.1 ; 10.12s ; 12.2 ; voir aussi Hé 1.3. –  mon seigneur  : cf. 1S 22.12 ; 26.17,19 ; 1R 1.13. –  Assieds-toi à ma droite  : cf. 2.6 ; 16.11 ; 45.7,10 ; 80.18 ; 1S 4.4 ; 1R 2.19 ; Es 6.1ss ; Jr 3.16s ; 30.21 ; Dn 7.13 ; 1Ch 28.5 ; 29.23 ; 2Ch 9.8 ; Rm 8.34 ; Ep 1.20 ; Col 3.1 ; 1P 3.22 ; dans de nombreux textes et images du Proche-Orient ancien le roi est représenté assis à la droite d''une divinité. –  ennemis / marchepied (99.5+) : cf. 89.11 ; Jos 10.24 ; Es 51.23 ; 1Co 15.25.'
  - type: text
    content: De David. Psaume.
  - type: text
    content: 'Déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) à mon seigneur :'
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: jusqu'à ce que je fasse de tes ennemis ton marchepied !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tendra ou enverra , d''où l''autre traduction  : que le Seigneur envoie  ; cf. 72.1ss. –  de Sion 14.7 ; 20.3 ; 128.5 ; Es 2.3. –  sceptre / puissance 2.9+ ; 45.7. –  domine 72.8 ; Nb 24.19. –  au milieu de tes ennemis  : cf. 2.1ss ; 48.5ss ; 83.3ss.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tendra de Sion le sceptre de ta puissance :'
  - type: text
    content: domine au milieu de tes ennemis !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction conjecturale, obtenue en modifiant la lecture traditionnelle du texte hébreu, obscur. –  A toi le principat  : le texte hébreu traditionnel porte, litt. ton peuple, des (dons ?) volontaires  ; LXX la noblesse (= les nobles ?) est avec toi  ; sur le terme pour noble ( principat  ?), qui évoque aussi la générosité, cf. 83.12 ; 107.40 ; 113.8 ; 118.9 ; 146.3 ; 1S 2.8 ; Es 13.2 ; 32.5,8 ; voir aussi Jg 5.2. –  au jour…  : autres traductions au jour où tu rassembles ton armée, au jour où tu montres ta force. –  dans l''éclat de la sainteté  : traduction incertaine (cf. 29.2n, formule légèrement différente) ; de nombreux mss hébreux et plusieurs versions anciennes portent sur les montagnes saintes  ; cf. 72.3. –  du sein de l''aurore  : autre traduction du sein maternel, dès avant l''aurore  ; cf. Es 14.12 ; 49.1s,5 ; 58.8 ; voir aussi Nb 24.17 ; Lc 1.78. –  comme la rosée…  : modification du texte hébreu traditionnel, qui pourrait être lu à toi la rosée de tes enfantés (ou, peut-être, de ta jeunesse  ; même terme en Ec 11.9s) ; notre traduction suit de nombreux mss hébreux et des versions anciennes ; autre possibilité sors comme la rosée de la jeunesse  ; cf. 2.7 ; 72.6s ; Es 26.19.'
  - type: text
    content: A toi le principat,
  - type: text
    content: au jour de ta puissance ;
  - type: text
    content: dans l'éclat de la sainteté,
  - type: text
    content: du sein de l'aurore,
  - type: text
    content: comme la rosée je t'ai donné le jour.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'juré 89.4,36 ; 95.11 ; 132.11 ; Hé 7.21. –  ne le regrettera pas ou ne changera pas d''avis  ; cf. Nb 23.19+ ; Rm 11.29n. –  prêtre  : cf. 1S 13.9 ; 2S 6.13s,17s ; 24.17 ; 1R 8.14,56 ; Jr 30.21 ; Ez 44.3 ; 45.16s,22ss ; 46.2ss ; Za 6.13 ; voir aussi Jn 12.34. –  à la manière (autre traduction à cause  ; LXX selon l''ordre ) de Malki-Tsédeq Gn 14.18ss ; cf. 2S 5 ; Hé 5.6 ss ; 6.20 ; 7. 1ss, 17,21.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a juré, il ne le regrettera pas :'
  - type: text
    content: Tu es prêtre pour toujours,
  - type: text
    content: à la manière de Malki-Tsédeq.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur est à ta droite  : cf. v. 1n  ; 109.31+. –  écrase (ou a écrasé ) des rois 2.2 ; 46.7ss ; 48.5. –  jour de sa colère 2.5 ; 21.10 ; 76.8 ; Es 13.9,13 ; 63.6 ; Na 1.6 ; Rm 2.5.'
  - type: text
    content: Le Seigneur est à ta droite,
  - type: text
    content: il écrase des rois au jour de sa colère.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction incertaine jusqu''à la fin ; cf. 18.38ss ; 21.9s ; 45.4ss ; 144.1ss. –  jugement / nations 7.9. –  tout est  : sous-entendu dans le texte hébreu. –  cadavres Es 5.25 ; 34.3,6ss ; Jr 9.21 ; Ez 6.13 ; 32.5s ; 35.8. –  le chef ou la tête  ; cf. 68.22 où le verbe rendu ici et au v. 5 par écraser est traduit par fracasser. –  d''un vaste pays ou sur de grands espaces.'
  - type: text
    content: 'Il exerce le jugement parmi les nations : tout est plein de cadavres ;'
  - type: text
    content: il écrase le chef d'un vaste pays.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'au torrent (ou à l''oued , cf. 83.10 ; Gn 26.17n  ; Jb 6.15n  ; voir 2Ch 32.4n) : beaucoup voient ici une allusion au sacre solennel du roi à la source de Guihôn, qui alimentait l''oued Cédron ; cf. 46.5 ; 1R 1.33-40.'
  - type: text
    content: 'En chemin il boit au torrent :'
  - type: text
    content: c'est pourquoi il relève la tête.
