document_id: ROM.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie selon l'Esprit de Dieu
  - type: text
    content: ' '
  - type: note
    content: aucune condamnation v. 31-39 ; 5.16 ; cf. Jn 3.18 ; 5.24. – Après en Jésus-Christ , certains mss ajoutent qui marchent (c.-à-d. qui vivent ), non selon la chair, mais selon l'Esprit (cf. v. 4).
  - type: text
    content: 'Il n''y a donc maintenant aucune condamnation pour ceux qui sont en Jésus-Christ. '
  '10':
  - type: note
    content: 'le Christ est en vous Jn 17.23 ; 2Co 13.5 ; Ga 2.20 ; Col 1.27. –  le corps… est mort 7.24+ ; voir aussi 6.6 ; 7.8. –  l''Esprit est vie  : cf. v. 2+ ; 1P 4.6.'
  - type: text
    content: 'Or si le Christ est en vous, le corps, il est vrai, est mort à cause du péché, mais l''Esprit est vie à cause de la justice. '
  '11':
  - type: note
    content: réveillé ou relevé, 4.24n  ; 1Co 6.14+ ; 15.45+ ; 2Co 4.14. –  le Christ ou, selon certains mss, Jésus-Christ (litt. le Christ Jésus). –  fera aussi vivre Jn 5.21+. –  par son Esprit… v. 9+.
  - type: text
    content: Et si l'Esprit de celui qui a réveillé Jésus d'entre les morts habite en vous, celui qui a réveillé le Christ d'entre les morts fera aussi vivre vos corps mortels par son Esprit qui habite en vous.
  '12':
  - type: text
    content: ' '
  - type: note
    content: V. 5s+. –  débiteurs 1.14+.
  - type: text
    content: 'Ainsi donc, mes frères, nous sommes bien débiteurs, mais non pas envers la chair – pas pour vivre selon la chair. '
  '13':
  - type: note
    content: 6.6+. –  agissements ou pratiques  ; un verbe apparenté est traduit par pratiquer en 1.32ss ; 7.15,19 ; 13.4 ; le même terme est traduit par fonction en 12.4 ; cf. Col 3.9.
  - type: text
    content: 'En effet, si vous vivez selon la chair, vous allez mourir ; mais si par l''Esprit vous faites mourir les agissements du corps, vous vivrez. '
  '14':
  - type: note
    content: conduits par l'Esprit Ga 5.18. –  fils de Dieu Ga 3.26 ; 4.7 ; cf. Dt 14.1.
  - type: text
    content: 'Car tous ceux qui sont conduits par l''Esprit de Dieu sont fils de Dieu. '
  '15':
  - type: note
    content: 'esclavage ou servitude, cf. v. 21 ; Lc 15.17ss ; Ga 4.7. –  crainte  : cf. Mt 8.26/ / ; Jn 14.27 ; 2Tm 1.7 ; 1Jn 4.18. –  adoption filiale  : terme juridique, dérivé du mot traduit par fils  ; il désigne l''acte d''adoption et le statut de fils à part entière qui en résulte ; cf. v. 23 ; 9.4 ; Ga 4.5 ; Ep 1.5. –  Abba ! terme araméen pour Père, ici transcrit puis traduit en grec. A l''origine c''était le mot employé dans l''intimité familiale par le fils, mais son usage s''était considérablement généralisé à l''époque du N.T. Cependant le mot Abba ne semble pas avoir été utilisé pour s''adresser à Dieu dans le judaïsme (voir Mc 14.36 ; Ga 4.6 ; cf. Mt 11.25 ; Lc 11.2 ; 22.42 ; Jn 17.1).'
  - type: text
    content: 'En effet, vous n''avez pas reçu un esprit d''esclavage, qui ramène à la crainte, mais vous avez reçu un Esprit d''adoption filiale, par lequel nous crions : '
  - type: text
    content: Abba !
  - type: text
    content: '  – Père ! '
  '16':
  - type: note
    content: 'rend témoignage à  : autre traduction atteste avec (cf. Jn 8.17s) ; voir 1Jn 5.10 ; cf. Rm 9.1. –  enfants de Dieu  : cf. v. 19,23 ; Lc 20.36 ; Jn 1.12 ; 1Jn 3.2.'
  - type: text
    content: 'L''Esprit lui-même rend témoignage à notre esprit que nous sommes enfants de Dieu. '
  '17':
  - type: note
    content: 'héritiers Ga 3.26,29 ; 4.7 ; Ap 21.7 ; cf. Dt 4.21 ; Mt 19.29 ; 25.34. –  cohéritiers du Christ  : cf. Mc 12.7 ; Hé 1.2. –  s''il est vrai v. 9. –  nous souffrons avec lui  : cf. 6.8+ ; 2Tm 2.3,11s ; 1P 4.13 ; 5.1. – Voir gloire.'
  - type: text
    content: 'Or si nous sommes enfants, nous sommes aussi héritiers : héritiers de Dieu, et cohéritiers du Christ, s''il est vrai que nous souffrons avec lui pour être aussi glorifiés avec lui.'
  - type: heading
    content: La gloire à venir
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'J''estime 4.3n. –  les souffrances… la gloire (3.23+) : cf. Mc 13.5ss/ / ; Lc 22.28-30 ; 24.26 ; 2Co 4.10s,17 ; cf. 2 Baruch 15.8 : « Ce monde est pour eux (les justes) un combat et un labeur avec bien des tracas, mais le monde qui vient est une couronne avec beaucoup de gloire. » –  révélée en nous ou pour nous 1.17+.'
  - type: text
    content: 'J''estime en effet qu''il n''y a pas de commune mesure entre les souffrances du temps présent et la gloire qui va être révélée en nous. '
  '19':
  - type: note
    content: 'la création…  : litt. l''impatience (ou l''ardent désir, même terme en Ph 1.20) de la création (cf. 2Co 5.17 ; Col 1.23n) attend (même verbe v. 23,25 ; 1Co 1.7 ; Ga 5.5 ; Ph 3.20 ; Hé 9.28 ; 1P 3.20) ; cf. 4 Esdras 7.75 : « … jusqu''à ce que viennent ces temps dans lesquels tu commenceras à renouveler la création ». –  révélation v. 18. – Voir fils.'
  - type: text
    content: 'Car la création attend avec impatience la révélation des fils de Dieu. '
  '2':
  - type: note
    content: 'la loi (cf. 3.27 ; Jc 1.25) de l''Esprit de la vie (cf. 1Co 15.45) : cf. Jr 31.33 ; Ez 36.27 ; 37.14. –  t''a libéré  : certains mss portent m''a libéré  ; cf. 7.23s ; Jn 8.32-36 ; 2Co 3.17. –  de la loi du péché…  : cf. Ga 5.18.'
  - type: text
    content: En effet, la loi de l'Esprit de la vie en Jésus-Christ t'a libéré de la loi du péché et de la mort.
  '20':
  - type: note
    content: 'soumise à la futilité  : cf. 1.21n  ; Gn 3.17-19 ; Ec 1.2+. –  celui qui l''y a soumise  : il s''agit vraisemblablement de Dieu, cf. 11.32. Mais certains voient là une allusion à Adam. –  avec une espérance  : la même formule a été traduite par espérant en 4.18 ; Ac 2.26 ; voir 2P 3.12s.'
  - type: text
    content: 'En effet, la création a été soumise à la futilité – non pas de son propre gré, mais à cause de celui qui l''y a soumise – avec une espérance : '
  '21':
  - type: note
    content: 'du périssable ou de la vie périssable, 1.23+, terme à peu près équivalent à la futilité (v. 20). –  glorieuse  : litt. de la gloire (cf. v. 18). –  enfants de Dieu v. 16+. – Cf. Col 1.18-20.'
  - type: text
    content: 'cette même création sera libérée de l''esclavage du périssable pour avoir part à la liberté glorieuse des enfants de Dieu. '
  '22':
  - type: note
    content: 'soupire ou gémit  ; termes apparentés aux v. 23,26 ; un autre mot de la même famille désigne l’angoisse au v. 35 et en 2.9 ; cf. 2Co 5.2,4 ; voir aussi Mc 7.34 ; 8.12 ; Hé 13.17 ; Jc 5.9n  ; 4 Esdras 10.9 : « Interroge la terre et elle te dira que c''est à elle qu''il appartient de pleurer la perte de tant d''êtres sortis d''elle. » –  douleurs de l''accouchement  : cf. Es 13.8+ ; 66.6-8 ; Jr 13.21 ; Mt 24.8n  ; Jn 16.21 ; Ap 12.2.'
  - type: text
    content: 'Or nous savons que, jusqu''à ce jour, la création tout entière soupire et souffre les douleurs de l''accouchement. '
  '23':
  - type: note
    content: 'prémices 11.16 ; 16.5 ; 1Co 15.20,23 ; 16.15 ; 2Th 2.13 ; Jc 1.18 ; Ap 14.4 ; le terme grec peut évoquer les prémices ou premiers fruits offerts à la divinité (cf. Ex 23.19 ; 25.2ss ; 36.6 ; Lv 19.23ss ; Nb 15.18ss ; Dt 12.6,11,17 ; 18.4 ; 26.2ss), mais il peut aussi avoir un sens plus général (cf. son emploi dans LXX en Dt 33.21 ; Ps 78.51 ; 105.36). –  de l''Esprit  : autre traduction c''est-à-dire l''Esprit  ; cf. 2Co 1.22+ ; 5.5. –  adoption filiale v. 15n. –  rédemption 3.24n. –  de notre corps  : cf. 7.24+ ; Ph 3.20s ; voir aussi 1Co 15.53s ; 2Co 5.2-5.'
  - type: text
    content: 'Bien plus, nous aussi, qui avons les prémices de l''Esprit, nous aussi nous soupirons en nous-mêmes, en attendant l''adoption filiale, la rédemption de notre corps. '
  '24':
  - type: note
    content: dans l'espérance v. 20 ; 4.18ss. –  ce qu'on voit 2Co 4.18 ; 5.6s ; Hé 11.1.
  - type: text
    content: 'Car c''est dans l''espérance que nous avons été sauvés. Or l''espérance qu''on voit n''est plus une espérance : ce qu''on voit, peut-on l''espérer encore ? '
  '25':
  - type: note
    content: Ga 5.5. –  persévérance 2.7n.
  - type: text
    content: Mais si nous espérons ce que nous ne voyons pas, nous l'attendons avec persévérance.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Esprit (cf. v. 14-16 ; 1Co 2.10-14) / prières 1Co 14.15 ; Ep 6.18 ; Jd 20 ; Ap 22.17 ; cf. Jc 4.3,5. –  intercède  : un verbe apparenté est traduit de la même manière aux v. 27,34+. –  soupirs v. 22+s. –  inexprimables  : cf. 2Co 12.4 ; Es 8.11.'
  - type: text
    content: 'De même aussi l''Esprit vient au secours de notre faiblesse, car nous ne savons pas ce qu''il convient de demander dans nos prières. Mais l''Esprit lui-même intercède par des soupirs inexprimables ; '
  '27':
  - type: note
    content: 'sonde les cœurs Ap 2.23 ; cf. Ps 139.1 ; 1Co 4.5. –  sait à quoi tend  : litt. connaît la tendance, la pensée, l''aspiration de l''Esprit, cf. v. 5n-7. –  saints 1.7n.'
  - type: text
    content: 'et celui qui sonde les cœurs sait à quoi tend l''Esprit : c''est selon Dieu qu''il intercède en faveur des saints.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'tout coopère  : autre traduction possible  : il (l''Esprit) fait coopérer tout (ou coopère en tout ) pour le bien…  ; ou, d''après certains mss  : Dieu fait coopérer tout… ; Dieu coopère en tout, pour le bien, avec ceux qui aiment Dieu . –  ceux qui aiment Dieu 1Co 2.9 ; 8.3 ; Jc 1.12 ; 2.5. –  son projet  : terme apparenté en 1.13n  ; 3.25n  ; même terme en 9.11 ; cf. Ep 1.11n  ; 3.11 ; 2Tm 1.9.'
  - type: text
    content: 'Nous savons, du reste, que tout coopère pour le bien de ceux qui aiment Dieu, de ceux qui sont appelés selon son projet. '
  '29':
  - type: note
    content: 'connus d''avance 11.2 ; terme apparenté en 1P 1.2n  ; cf. Gn 18.19n  ; Jr 1.5n  ; Jn 10.27. –  destinés d''avance Ac 2.23n  ; 1Co 2.7 ; Ep 1.5+. –  être configurés  ; un verbe apparenté est traduit par transfigurer en 12.2 ; 2Co 3.18n  ; cf. Mc 9.2n  ; Ph 3.10,21 ; voir aussi 1Co 15.49 ; 1Jn 3.2. –  l''image de son Fils  : cf. Gn 1.26s ; Col 1.15.'
  - type: text
    content: 'Car ceux qu''il a connus d''avance, il les a aussi destinés d''avance à être configurés à l''image de son Fils, pour qu''il soit le premier-né d''une multitude de frères. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'impossible à la loi Ac 13.38s ; 15.10. –  sans force  : cf. 5.6n  ; Hé 7.18. –  son propre Fils v. 32 ; Ga 4.4. –  une condition semblable…  : litt. une ressemblance (ou similitude ) de chair de péché  ; le terme grec correspondant à ressemblance peut évoquer une identité partielle ou totale ; il apparaît également en 1.23 ( représentant ) ; 5.14 ; 6.5 ; Ph 2.7 ( semblable ) ; voir aussi Hé 2.14-18 ; 4.15. –  en rapport avec le péché  : autre traduction pour le péché  ; certains comprennent en sacrifice pour le péché  ; cf. Lv 4 ; Es 53.10 ; 2Co 5.21n  ; Ga 3.13 ; formules comparables en Hé 5.3 ; 10.6ss ; 1P 3.18 ; 1Jn 2.2 ; 4.10. –  condamné le péché dans la chair  : cf. Col 1.22.'
  - type: text
    content: 'Car – chose impossible à la loi, parce que la chair la rendait sans force – Dieu, en envoyant son propre Fils dans une condition semblable à la chair du péché, en rapport avec le péché, a condamné le péché dans la chair, '
  '30':
  - type: note
    content: Cf. 1Co 6.11 ; 2Co 3.18 ; Ep 1.11-14 ; 2Th 2.13s. – Voir justice.
  - type: text
    content: Et ceux qu'il a destinés d'avance, il les a aussi appelés ; ceux qu'il a appelés, il les a aussi justifiés ; et ceux qu'il a justifiés, il les a aussi glorifiés.
  - type: heading
    content: L'amour de Dieu victorieux
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ps 118.6 ; 2Ch 32.7 ; Mt 1.23+ ; cf. Ap 12.10+.
  - type: text
    content: 'Que dirons-nous donc à ce sujet ? Si Dieu est pour nous, qui sera contre nous ? '
  '32':
  - type: note
    content: 'qui n''a pas épargné… v. 3 ; 5.6-11 ; cf. Gn 22.16. – Voir Fils. –  livré… 4.25+. –  ne nous donnera-t-il pas… par grâce  : autre traduction, moins probable  : ne nous fera-t-il pas grâce de tout (cf. les différents emplois du même verbe en Lc 7.21n,42s ; Ac 3.14 ; 25.11n  ; 27.24 ; 1Co 2.12 ; 2Co 2.7,10 ; 12.13 ; Ga 3.18 ; Ep 4.32 ; Ph 1.29 ; 2.9 ; Col 2.13 ; 3.13 ; Phm 22) ; voir aussi Hé 7.25.'
  - type: text
    content: 'Lui qui n''a pas épargné son propre Fils, mais qui l''a livré pour nous tous, comment ne nous donnera-t-il pas aussi tout avec lui, par grâce ? '
  '33':
  - type: note
    content: 'ceux que Dieu a choisis (traduction traditionnelle les élus de Dieu), cf. 16.13 ; voir aussi 9.11 ; 11.5,7,28 ; 1Co 1.27s. –  C''est Dieu qui justifie  : certains comprennent, comme une question répondant par l''absurde à la question précédente  : Dieu, celui qui justifie ? de même au v. 34  : Jésus-Christ, celui qui est mort ? Cf. Es 50.8s.'
  - type: text
    content: 'Qui accusera ceux que Dieu a choisis ? C''est Dieu qui justifie ! '
  '34':
  - type: note
    content: 'Qui condamnera ? cf. Jb 34.29 ; Ep 1.20 ; 1P 3.13. –  Jésus-Christ  : certains mss portent seulement (le) Christ. –  réveillé (v. 11) / à la droite Ep 1.20 ; cf. Ps 110.1 ; Col 3.1. –  intercède v. 26n  ; Hé 7.25 ; 9.24 ; cf. 1Jn 2.1.'
  - type: text
    content: 'Qui condamnera ? C''est Jésus-Christ qui est mort ! Bien plus, il s''est réveillé, il est à la droite de Dieu, et il intercède pour nous ! '
  '35':
  - type: note
    content: Qui nous séparera v. 38,39. –  amour du Christ 2Co 5.14. –  détresse… 5.3+ ; cf. 2Co 11.26s ; 12.10.
  - type: text
    content: 'Qui nous séparera de l''amour du Christ ? La détresse, l''angoisse, la persécution, la faim, le dénuement, le péril, ou l''épée ? '
  '36':
  - type: note
    content: 'Ps 44.23  ; cf. Za 11.4 ; Mt 10.16 ; 1Co 4.9 ; 15.30s ; 2Co 4.10s. –  constamment  : litt. tout le jour, de même en 10.2.'
  - type: text
    content: 'Ainsi qu''il est écrit :'
  - type: text
    content: A cause de toi, on nous met à mort constamment.
  - type: text
    content: On nous considère comme des moutons qu'on égorge
  - type: text
    content: .
  '37':
  - type: text
    content: ' '
  - type: note
    content: Jn 16.33+ ; 1Co 15.57 ; Ap 12.11 ; cf. Ph 4.13.
  - type: text
    content: 'Mais dans toutes ces choses, nous sommes plus que vainqueurs par celui qui nous a aimés. '
  '38':
  - type: note
    content: je suis persuadé 14.14 ; 15.14. –  mort / vie… 1Co 3.22. – Voir anges. –  principats / puissances Ep 1.21+.
  - type: text
    content: 'Car je suis persuadé que ni mort, ni vie, ni anges, ni principats, ni présent, ni avenir, ni puissances, '
  '39':
  - type: note
    content: 'ni hauteur (cf. 2Co 10.5), ni profondeur (cf. 1Co 2.10) : cf. Ep 3.18. –  création ou créature, même terme v. 19ss. –  nous séparer v. 35 ; cf. Jn 10.28-30. –  l''amour de Dieu en Jésus-Christ  : cf. Jn 17.26.'
  - type: text
    content: ni hauteur, ni profondeur, ni aucune autre création ne pourra nous séparer de l'amour de Dieu en Jésus-Christ, notre Seigneur.
  '4':
  - type: note
    content: 'la justice requise…  : autres traductions la pleine justice, le juste décret, la juste ordonnance de la loi  ; cf. 5.18n. –  soit accomplie 3.31+. –  qui marchons… Ga 5.16,18,25.'
  - type: text
    content: 'pour que la justice requise par la loi soit accomplie en nous qui marchons, non selon la chair, mais selon l''Esprit. '
  '5':
  - type: note
    content: 'qui sont sous l''emprise de  : litt. qui sont (verbe sous-entendu en grec la seconde fois) selon  ; cf. v. 13 ; Jn 3.6 ; autre traduction ceux qui vivent selon la chair / l''Esprit. –  s''accordent aux tendances de  : litt. pensent les choses de, expression qui peut signifier sont d''accord avec  ; un terme apparenté est traduit par tendre à aux v. 6s,27 ; autre traduction se rangent du côté de la chair / de l''Esprit  ; voir aussi 12.3n.'
  - type: text
    content: 'En effet, ceux qui sont sous l''emprise de la chair s''accordent aux tendances de la chair, tandis que ceux qui sont sous l''emprise de l''Esprit s''accordent aux tendances de l''Esprit. '
  '6':
  - type: note
    content: Litt. la pensée de la chair, c'est la mort ; la pensée de l'Esprit, c'est la vie et la paix  ; cf. v. 6n,27 ; 6.21s ; 7.5 ; Ga 6.8.
  - type: text
    content: 'Or la chair tend à la mort ; l''Esprit, lui, tend à la vie et à la paix. '
  '7':
  - type: note
    content: 'ennemie 5.10+ ; Jc 4.4. –  incapable  : cf. Jn 8.43+ ; 1Co 2.14.'
  - type: text
    content: 'Car la chair tend à s''ériger en ennemie de Dieu, parce qu''elle ne se soumet pas à la loi de Dieu : elle en est même incapable. '
  '8':
  - type: note
    content: 'sous l''empire de  : litt. dans, de même au v. 9 (7.5n,14). – Cf. 1Jn 2.15s.'
  - type: text
    content: Ceux qui sont sous l'empire de la chair ne peuvent plaire à Dieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 's''il est vrai que (v. 17 ; 3.30) l''Esprit de Dieu habite en vous 1Co 3.16 ; 2Tm 1.14 ; 1Jn 3.24. –  ne lui appartient pas  : cf. 14.8 ; 1Co 1.12n  ; 3.23 ; 15.23 ; Ga 5.24.'
  - type: text
    content: 'Quant à vous, vous n''êtes pas sous l''empire de la chair, mais sous celui de l''Esprit, s''il est vrai que l''Esprit de Dieu habite en vous. Et si quelqu''un n''a pas l''Esprit du Christ, il ne lui appartient pas. '
