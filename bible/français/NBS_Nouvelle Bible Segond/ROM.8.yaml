      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Christ est en vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 17.23 ; 2Co 13.5 ; Ga 2.20 ; Col 1.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le corps… est mort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.24+ ; voir aussi 6.6 ; 7.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Esprit est vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2+ ; 1P 4.6.'
    marker-yv: yv-n
  - type: text
    text: 'Or si le Christ est en vous, le corps, il est vrai, est mort à cause du péché, mais l''Esprit est vie à cause de la justice. '
