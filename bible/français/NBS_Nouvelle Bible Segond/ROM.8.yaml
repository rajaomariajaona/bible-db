  - type: text
    text: 'Quant à vous, vous n''êtes pas sous l''empire de la chair, mais sous celui de l''Esprit, s''il est vrai que l''Esprit de Dieu habite en vous. Et si quelqu''un n''a pas l''Esprit du Christ, il ne lui appartient pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
