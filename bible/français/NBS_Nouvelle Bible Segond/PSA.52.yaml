document_id: PSA.52,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Face à celui qui se fie à ses richesses
  - type: text
    content: ' '
  - type: note
    content: Poème 32.1n.
  - type: text
    content: 'Du chef de chœur. Poème. De David. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'comme un olivier  : cf. 1.3 ; 92.13s ; Jr 11.16 ; Os 14.7. –  dans la maison de Dieu 23.6+. –  confiance 4.6+ ; 9.11.'
  - type: text
    content: Et moi, comme un olivier verdoyant dans la maison de Dieu,
  - type: text
    content: j'ai mis ma confiance dans la fidélité de Dieu pour toujours, à jamais.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '13.6 ; 30.13+. –  tu as agi 22.32 ; Es 38.15 ; cf. 1R 8.32. –  parce que tu es bon  : autre traduction parce qu''il est bon  ; cf. 25.8+. –  à l''égard de  : on pourrait aussi rattacher la fin du v. à la proposition principale  : je te célébrerai… je veux espérer… en présence de tes fidèles  ; cf. 22.23,26+.'
  - type: text
    content: Je te célébrerai toujours, car tu as agi.
  - type: text
    content: Je veux espérer en ton nom, parce que tu es bon
  - type: text
    content: à l'égard de tes fidèles.
  '2':
  - type: note
    content: Cf. 1S 21.7s ; 22.9-19.
  - type: text
    content: 'Lorsque Doëg l''Edomite vint dire à Saül : David s''est rendu chez Ahimélek.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.1 ; 50.16ss ; Es 22.15ss. –  du mal  : autre traduction du malheur . –  triste  : sous-entendu dans le texte ; le terme hébreu correspondant à héros est aussi traduit par guerrier ou vaillant homme . –  La fidélité de Dieu (hébreu ’El , de même au v. 7, cf. Gn 21.33n) : cette expression ne figure pas dans LXX  ; d''après Syr, certains modifient le second vers pour lire du mal que tu fais sans cesse (litt. tout le jour ) au fidèle.'
  - type: text
    content: Pourquoi es-tu fier du mal, triste héros ?
  - type: text
    content: La fidélité de Dieu ne cesse pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.10+ ; 50.19 ; Mi 6.12 ; Jb 27.4. –  comme un rasoir  : cf. 55.22 ; 57.5 ; 64.4 ; 140.4 ; Jr 9.2,7. –  trompeur que tu es ou toi qui pratiques la tromperie.'
  - type: text
    content: Ta langue n'invente que la ruine,
  - type: text
    content: comme un rasoir affilé, trompeur que tu es !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Tu préfères ce qui est mauvais…  : cf. 45.8 ; Es 5.20 ; Jr 4.22. –  mensonge…  : cf. 101.7. –  parole juste Pr 12.17 ; 16.13.'
  - type: text
    content: Tu préfères ce qui est mauvais à ce qui est bon,
  - type: text
    content: 'le mensonge à la parole juste. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 120.3. –  mordantes ou destructrices , litt. d'engloutissement.
  - type: text
    content: Tu aimes toutes les paroles mordantes,
  - type: text
    content: langue trompeuse !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 't''arrachera de ta tente Jb 18.14 ; cf. Ez 26.4. –  te déracinera  : cf. Pr 2.22. –  terre des vivants 27.13.'
  - type: text
    content: Aussi Dieu te démolira pour toujours,
  - type: text
    content: il te terrassera et t'arrachera de ta tente ;
  - type: text
    content: 'il te déracinera de la terre des vivants. '
  - type: text
    content: Pause.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'verront / seront saisis de crainte 40.4n. –  riront  : cf. 2.4+ ; 58.11 ; 64.10s ; 69.33 ; voir aussi Pr 25.17.'
  - type: text
    content: Les justes le verront, ils seront saisis de crainte
  - type: text
    content: 'et ils riront de lui :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 14.10ss. –  l''homme ou le vaillant homme , terme apparenté à héros au v. 3. –  protecteur  : litt. forteresse  ; cf. 27.1+ ; 43.2n. –  mettait sa confiance… 49.7+ ; Pr 11.28.'
  - type: text
    content: Voilà l'homme qui ne prenait pas Dieu pour protecteur,
  - type: text
    content: mais qui mettait sa confiance en ses grandes richesses
  - type: text
    content: et se protégeait par la ruine qu'il causait !
