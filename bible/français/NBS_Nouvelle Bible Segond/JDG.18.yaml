    - type: text
      text: 'Les cinq hommes partirent et ils arrivèrent à Laïsh. Ils virent que le peuple qui s''y trouvait habitait en toute sécurité, à la manière des Sidoniens, tranquille et confiant ; il n''y avait dans le pays ni voisin gênant ni occupant oppresseur ; ils étaient éloignés des Sidoniens et n''avaient de relation avec personne. '
