document_id: JDG.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Danites changent de territoire
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'En ces jours-là… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.6+. – Sur la migration des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Danites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de la région située à l'ouest de Benjamin vers le Nord, cf. 1.34 ; 5.17 ; 13.2,25 ; Gn 49.17 ; Dt 33.22 ; Jos 19.40-48 ; voir aussi Ap 7.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne lui était échu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'était tombé pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jos 13.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir Nb 33.54 ; 34.2.'
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, il n''y avait pas de roi en Israël ; en ce temps-là aussi, la tribu des Danites se cherchait un patrimoine pour s''installer, car jusqu''à ce jour-là aucun patrimoine ne lui était échu au milieu des tribus d''Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: confiant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui vit en sécurité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vaste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: large de tous côtés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 34.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Né 7.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu vous l''a livré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.28+ ; Jos 2.24.
      marker-yv: yv-n
    - type: text
      text: Quand vous y entrerez, vous arriverez chez un peuple confiant. Le pays est vaste, et Dieu vous l'a livré ; c'est un lieu où rien ne manque de tout ce qu'il y a sur la terre.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Six cents hommes du clan de Dan partirent alors de Tsoréa et d''Eshtaol, leurs armes à la ceinture. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qiriath-Yéarim, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ville des Forêts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à une quinzaine de kilomètres à l''ouest de Jérusalem ; cf. 1S 6.21 ; 7.1 ; 2S 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mahané-Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: camp de Dan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 13.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: juste derrière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'ouest de.
      marker-yv: yv-n
    - type: text
      text: 'Ils montèrent et dressèrent leur camp à Qiriath-Yéarim, en Juda ; c''est pourquoi, jusqu''à ce jour, on appelle Mahané-Dan ce lieu qui est juste derrière Qiriath-Yéarim. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 2+.
      marker-yv: yv-n
    - type: text
      text: 'De là ils passèrent dans la région montagneuse d''Ephraïm et arrivèrent à la maison de Michée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les cinq hommes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2-6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un éphod… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.3-5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 8.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A vous maintenant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 25.17.'
      marker-yv: yv-n
    - type: text
      text: 'Alors les cinq hommes qui étaient allés explorer le pays de Laïsh dirent à leurs frères : Savez-vous qu''il y a dans ces maisons-là un éphod, des teraphim, une statue et une idole de métal fondu ? A vous maintenant de savoir ce que vous avez à faire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comment il allait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour la paix.
      marker-yv: yv-n
    - type: text
      text: 'Ils firent un détour par là, arrivèrent à la maison du jeune lévite – la maison de Michée – et lui demandèrent comment il allait. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s''agit peut-être de la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de la ville.
      marker-yv: yv-n
    - type: text
      text: 'Les six cents hommes d''entre les fils de Dan se tenaient debout à l''entrée de la porte, leurs armes à la ceinture. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les cinq hommes qui étaient allés explorer le pays montèrent et entrèrent ; ils prirent la statue, l''éphod, les teraphim et l''idole de métal fondu, pendant que le prêtre se tenait debout à l''entrée de la porte avec les six cents hommes, leurs armes à la ceinture. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il semble que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', retenu par les hommes de la troupe, ne se soit aperçu du larcin que trop tard. Mais le détail de la narration est passablement obscur.'
      marker-yv: yv-n
    - type: text
      text: 'Ils étaient entrés dans la maison de Michée et avaient pris la statue, l''éphod, les teraphim et l''idole de métal fondu quand le prêtre leur dit : Que faites-vous là ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mets ta main sur ta bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jb 21.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un père et un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tribu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'clan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils lui répondirent : Tais-toi, mets ta main sur ta bouche et viens avec nous ; sois pour nous un père et un prêtre. Vaut-il mieux que tu sois prêtre pour la maison d''un seul homme, ou que tu sois prêtre pour une tribu – un clan – en Israël ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur clan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce terme qui désigne habituellement une subdivision de la tribu souligne probablement la faible importance de la tribu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à l'époque ; cf. v. 11,19 ; 13.2 ; 20.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 46.23 ; voir par contraste Nb 1.39 ; 26.42s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsoréa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eshtaol '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.2,25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour explorer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 14 ; Nb 13–14 ; Dt 1.22-25 ; Jos 2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils arrivèrent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 13-15 ; 17.8.'
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Dan envoyèrent de leur clan cinq hommes, des hommes vaillants de chez eux, de Tsoréa et d''Eshtaol, pour explorer le pays et pour l''examiner. Ils leur dirent : Allez examiner le pays. Ils arrivèrent, dans la région montagneuse d''Ephraïm, à la maison de Michée où ils passèrent la nuit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' content '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.25.
      marker-yv: yv-n
    - type: text
      text: Le cœur content, le prêtre prit l'éphod, les teraphim et la statue et vint au sein du peuple.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 33.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; mais le terme désigne plutôt, d'une façon plus générale, les non-combattants, vieillards, femmes et enfants, qu'il faut protéger ; cf. 21.10 ; Gn 34.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 15.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les biens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme correspondant est apparenté à celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'richesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Gn 31.1, et par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gloire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Es 10.3 ; 61.6.
      marker-yv: yv-n
    - type: text
      text: 'Ils repartirent, en plaçant devant eux les familles, le bétail et les biens. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se jetèrent à la poursuite des
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'attachèrent aux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'poursuivre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 20.45 ; cf. Gn 31.23ss.
      marker-yv: yv-n
    - type: text
      text: 'Comme ils étaient déjà loin de la maison de Michée, les gens qui habitaient les maisons voisines de celle de Michée s''appelèrent les uns les autres et se jetèrent à la poursuite des fils de Dan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'crier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduit ici deux verbes hébreux synonymes ; le second est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '(s’)appeler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 22 ; certains traduisent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pourquoi ameutes-tu les gens ?
      marker-yv: yv-n
    - type: text
      text: 'Ils crièrent après les fils de Dan, qui se retournèrent et dirent à Michée : Qu''est-ce que tu as à crier ainsi ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mes dieux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon dieu que j'avais fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 17.5'
