document_id: JDG.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Danites changent de territoire
  - type: text
    content: ' '
  - type: note
    content: 'En ces jours-là… 17.6+. – Sur la migration des Danites de la région située à l''ouest de Benjamin vers le Nord, cf. 1.34 ; 5.17 ; 13.2,25 ; Gn 49.17 ; Dt 33.22 ; Jos 19.40-48 ; voir aussi Ap 7.6n. –  ne lui était échu  : litt. n''était tombé pour lui , cf. Jos 13.6n  ; voir Nb 33.54 ; 34.2.'
  - type: text
    content: 'En ces jours-là, il n''y avait pas de roi en Israël ; en ce temps-là aussi, la tribu des Danites se cherchait un patrimoine pour s''installer, car jusqu''à ce jour-là aucun patrimoine ne lui était échu au milieu des tribus d''Israël. '
  '10':
  - type: note
    content: 'V. 7. –  confiant  : autre traduction qui vit en sécurité  ; cf. v. 7n,27. –  vaste  : litt. large de tous côtés, cf. Gn 34.21n  ; Né 7.4n. –  Dieu vous l''a livré 3.28+ ; Jos 2.24.'
  - type: text
    content: Quand vous y entrerez, vous arriverez chez un peuple confiant. Le pays est vaste, et Dieu vous l'a livré ; c'est un lieu où rien ne manque de tout ce qu'il y a sur la terre.
  '11':
  - type: text
    content: 'Six cents hommes du clan de Dan partirent alors de Tsoréa et d''Eshtaol, leurs armes à la ceinture. '
  '12':
  - type: note
    content: 'Qiriath-Yéarim, Ville des Forêts, à une quinzaine de kilomètres à l''ouest de Jérusalem ; cf. 1S 6.21 ; 7.1 ; 2S 6.2n. –  Mahané-Dan ou camp de Dan, cf. 13.25+. –  juste derrière  : autre traduction à l''ouest de.'
  - type: text
    content: 'Ils montèrent et dressèrent leur camp à Qiriath-Yéarim, en Juda ; c''est pourquoi, jusqu''à ce jour, on appelle Mahané-Dan ce lieu qui est juste derrière Qiriath-Yéarim. '
  '13':
  - type: note
    content: V. 2+.
  - type: text
    content: 'De là ils passèrent dans la région montagneuse d''Ephraïm et arrivèrent à la maison de Michée. '
  '14':
  - type: note
    content: 'les cinq hommes… v. 2-6. –  un éphod… 17.3-5n  ; cf. 8.27n. –  A vous maintenant…  : cf. 1S 25.17.'
  - type: text
    content: 'Alors les cinq hommes qui étaient allés explorer le pays de Laïsh dirent à leurs frères : Savez-vous qu''il y a dans ces maisons-là un éphod, des teraphim, une statue et une idole de métal fondu ? A vous maintenant de savoir ce que vous avez à faire. '
  '15':
  - type: note
    content: 'comment il allait  : litt. pour la paix.'
  - type: text
    content: 'Ils firent un détour par là, arrivèrent à la maison du jeune lévite – la maison de Michée – et lui demandèrent comment il allait. '
  '16':
  - type: note
    content: Il s'agit peut-être de la porte de la ville.
  - type: text
    content: 'Les six cents hommes d''entre les fils de Dan se tenaient debout à l''entrée de la porte, leurs armes à la ceinture. '
  '17':
  - type: text
    content: 'Les cinq hommes qui étaient allés explorer le pays montèrent et entrèrent ; ils prirent la statue, l''éphod, les teraphim et l''idole de métal fondu, pendant que le prêtre se tenait debout à l''entrée de la porte avec les six cents hommes, leurs armes à la ceinture. '
  '18':
  - type: note
    content: Il semble que le prêtre, retenu par les hommes de la troupe, ne se soit aperçu du larcin que trop tard. Mais le détail de la narration est passablement obscur.
  - type: text
    content: 'Ils étaient entrés dans la maison de Michée et avaient pris la statue, l''éphod, les teraphim et l''idole de métal fondu quand le prêtre leur dit : Que faites-vous là ? '
  '19':
  - type: note
    content: 'mets ta main sur ta bouche  : cf. Jb 21.5+. –  un père et un prêtre 17.10n. –  tribu / clan v. 2n.'
  - type: text
    content: 'Ils lui répondirent : Tais-toi, mets ta main sur ta bouche et viens avec nous ; sois pour nous un père et un prêtre. Vaut-il mieux que tu sois prêtre pour la maison d''un seul homme, ou que tu sois prêtre pour une tribu – un clan – en Israël ? '
  '2':
  - type: note
    content: 'Voir fils. –  leur clan  : ce terme qui désigne habituellement une subdivision de la tribu souligne probablement la faible importance de la tribu de Dan à l''époque ; cf. v. 11,19 ; 13.2 ; 20.12n  ; Gn 46.23 ; voir par contraste Nb 1.39 ; 26.42s. –  Tsoréa / Eshtaol 13.2,25+. –  pour explorer  : cf. v. 14 ; Nb 13–14 ; Dt 1.22-25 ; Jos 2. –  Ils arrivèrent…  : cf. v. 13-15 ; 17.8.'
  - type: text
    content: 'Les fils de Dan envoyèrent de leur clan cinq hommes, des hommes vaillants de chez eux, de Tsoréa et d''Eshtaol, pour explorer le pays et pour l''examiner. Ils leur dirent : Allez examiner le pays. Ils arrivèrent, dans la région montagneuse d''Ephraïm, à la maison de Michée où ils passèrent la nuit. '
  '20':
  - type: note
    content: cœur content 16.25.
  - type: text
    content: Le cœur content, le prêtre prit l'éphod, les teraphim et la statue et vint au sein du peuple.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 33.2. –  les familles  : autre traduction les enfants  ; mais le terme désigne plutôt, d''une façon plus générale, les non-combattants, vieillards, femmes et enfants, qu''il faut protéger ; cf. 21.10 ; Gn 34.29n  ; 2S 15.22. –  les biens  : le terme correspondant est apparenté à celui qui est traduit par richesse en Gn 31.1, et par gloire en Es 10.3 ; 61.6.'
  - type: text
    content: 'Ils repartirent, en plaçant devant eux les familles, le bétail et les biens. '
  '22':
  - type: note
    content: 'se jetèrent à la poursuite des  : litt. s''attachèrent aux  ; le même verbe est traduit par poursuivre en 20.45 ; cf. Gn 31.23ss.'
  - type: text
    content: 'Comme ils étaient déjà loin de la maison de Michée, les gens qui habitaient les maisons voisines de celle de Michée s''appelèrent les uns les autres et se jetèrent à la poursuite des fils de Dan. '
  '23':
  - type: note
    content: 'crier traduit ici deux verbes hébreux synonymes ; le second est traduit par (s’)appeler au v. 22 ; certains traduisent  : pourquoi ameutes-tu les gens ?'
  - type: text
    content: 'Ils crièrent après les fils de Dan, qui se retournèrent et dirent à Michée : Qu''est-ce que tu as à crier ainsi ? '
  '24':
  - type: note
    content: Mes dieux… ou mon dieu que j'avais fait, cf. 17.5n  ; Gn 31.30.
  - type: text
    content: 'Il répondit : Mes dieux, ceux que j''avais faits, vous les avez pris avec le prêtre et vous êtes partis : que me reste-t-il ? Comment donc pouvez-vous me dire : « Qu''est-ce que tu as ? » '
  '25':
  - type: note
    content: 'exaspérés  : litt. amers d''âme (Gn 1.20n) ; cf. 2S 17.8n  ; Ha 1.6n. –  tu auras causé ta perte  : litt. tu recueilleras (ou tu réuniras, dans la mort, ou encore tu anéantiras) ta vie et la vie de ta maison (le mot correspondant à vie est celui qui correspond à âme dans la note précédente, cf. Gn 1.20n).'
  - type: text
    content: 'Les fils de Dan lui dirent : Ne nous rebats pas les oreilles, sinon des hommes exaspérés vont vous attaquer, et tu auras causé ta perte et celle de ta maison. '
  '26':
  - type: note
    content: 'chez lui  : litt. dans sa maison.'
  - type: text
    content: Et les fils de Dan continuèrent leur route. Michée, voyant qu'ils étaient plus forts que lui, s'en retourna chez lui.
  - type: heading
    content: La ville de Dan et son sanctuaire
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ce qu''avait fait Michée  : cf. v. 24. –  son prêtre  : litt. le prêtre qui était (ou qui avait été ) à lui.'
  - type: text
    content: 'Ils prirent ainsi ce qu''avait fait Michée et emmenèrent son prêtre. Ils attaquèrent Laïsh, un peuple tranquille et confiant ; ils les passèrent au fil de l''épée et mirent le feu à la ville. '
  '28':
  - type: note
    content: 'V. 7n. –  Beth-Rehob  : cf. Nb 13.21.'
  - type: text
    content: 'Personne ne la délivra, car elle était éloignée de Sidon et n''avait de relation avec personne : elle était dans la vallée qui s''étend vers Beth-Rehob. Puis ils rebâtirent la ville et s''y installèrent. '
  '29':
  - type: note
    content: 'Dan, leur père… Gn 30.5s. –  mais le nom…  : cf. Gn 28.19. –  Laïsh v. 7 ; Jos 19.47.'
  - type: text
    content: 'Ils appelèrent la ville du nom de Dan, d''après le nom de Dan, leur père, qui était né d''Israël – mais le nom de la ville avait d''abord été Laïsh. '
  '3':
  - type: note
    content: 'la voix  : certains comprennent le dialecte, ou encore l''intonation caractéristique d''un prêtre en train d''officier. –  Qu''est-ce qui t''y retient ? litt. qu’(y a-t-il) pour toi ici ? Autre traduction qu''as-tu à y faire ?'
  - type: text
    content: 'Comme ils étaient près de la maison de Michée, ils reconnurent la voix du jeune lévite, firent un détour et lui demandèrent : Qui t''a amené ici ? Que fais-tu dans ce lieu ? Qu''est-ce qui t''y retient ? '
  '30':
  - type: note
    content: 'Jonathan signifie YHWH a donné  ; voir nom. –  Guershom, fils de Manassé  : une particularité du texte hébreu traditionnel permet de lire aussi bien Menashé (= Manassé, cf. 2R 21) que Moshé (= Moïse) ; cf. 17.7n  ; Ex 2.22n  ; 18.3 ; 1Ch 23.15. –  l''exil  : litt. l''exil (ou la mise à nu) du pays  ; cf. 2R 15.29.'
  - type: text
    content: 'Les fils de Dan dressèrent pour eux la statue ; Jonathan, fils de Guershom, fils de Manassé, lui et ses fils, furent prêtres pour la tribu des Danites jusqu''au jour de l''exil. '
  '31':
  - type: note
    content: 'elle resta là  : sous-entendu dans le texte. –  à Silo  : cf. 21.12,19ss ; Jos 18.1 ; 1S 4.11 ; 1R 11.29 ; Jr 7.12 ; 26.6,9.'
  - type: text
    content: Ils mirent en place pour eux la statue que Michée avait faite – elle resta là tout le temps que la maison de Dieu fut à Silo.
  '4':
  - type: note
    content: 17.10-12.
  - type: text
    content: 'Il leur répondit : Michée a fait pour moi telle et telle chose ; il m''a offert un salaire, et je suis devenu son prêtre. '
  '5':
  - type: note
    content: 'Interroge Dieu  : cf. 1.1+ ; 17.5n  ; Nb 27.21 ; Dt 33.8 ; voir aussi 1S 23.9-12. –  voyage… aboutira  : cf. Gn 24.21,40,42,56.'
  - type: text
    content: 'Ils lui dirent : Interroge Dieu, je te prie, afin que nous sachions si le voyage que nous entreprenons aboutira. '
  '6':
  - type: note
    content: 'Allez en paix Ex 4.18 ; 1S 1.17 ; Lc 7.50 ; 8.48 ; Ac 16.36 ; Jc 2.16. –  le voyage…  : litt. devant YHWH est votre voie dans laquelle vous allez.'
  - type: text
    content: 'Le prêtre leur répondit : Allez en paix ; le voyage que vous allez entreprendre est dans les vues du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Laïsh (= Léshem en Jos 19.47) signifie lion (cf. Dt 33.22, autre terme) ; c''est une localité située dans la région des sources du Jourdain et géographiquement isolée des peuples voisins. –  en toute sécurité et confiant traduisent des termes hébreux apparentés ; cf. v. 10,27 ; 9.26 ( faire confiance ) ; 20.36 ( compter sur ). –  à la manière (ou selon la coutume , litt. la règle , 13.12n) des Sidoniens , Phéniciens du littoral qui étaient surtout connus pour leurs activités agricoles et commerciales. –  il n''y avait… ni voisin gênant ni occupant oppresseur  : texte obscur et traduction conjecturale ; on a aussi compris il n''y avait… personne qui parlât avec autorité ou qui exerçât un pouvoir ; il n''y avait… personne qui fît des reproches à celui qui exerçait le pouvoir ; celui qui exerçait le pouvoir… n''insultait personne (ou n''était pas un sujet de honte ) ; beaucoup modifient le texte hébreu traditionnel pour lire, p. ex., il ne manquait rien dans le pays (cf. v. 10) , il y avait là de grandes richesses . –  n''avaient de relation avec personne  : LXX n''avaient pas de relation avec la Syrie , ce qui correspondrait à une très légère variante graphique en hébreu ( ’Aram au lieu de ’adam, homme ).'
  - type: text
    content: 'Les cinq hommes partirent et ils arrivèrent à Laïsh. Ils virent que le peuple qui s''y trouvait habitait en toute sécurité, à la manière des Sidoniens, tranquille et confiant ; il n''y avait dans le pays ni voisin gênant ni occupant oppresseur ; ils étaient éloignés des Sidoniens et n''avaient de relation avec personne. '
  '8':
  - type: note
    content: V. 2+ ; cf. Nb 13.25ss.
  - type: text
    content: 'Ils revinrent auprès de leurs frères, à Tsoréa et à Eshtaol ; leurs frères leur demandèrent : Qu''en dites-vous ? '
  '9':
  - type: note
    content: 'Cf. Nb 14.7-9. –  Attaquons-les  : litt. lève-toi et montons sur (ou contre) eux. –  Vous hésitez ? autres traductions vous resteriez sans rien faire ? Vous restez sans rien dire ? (cf. 1R 22.3).'
  - type: text
    content: 'Attaquons-les, répondirent-ils. Nous avons vu le pays, il est très bon. Vous hésitez ? Ne soyez pas paresseux. Mettez-vous en marche pour aller prendre possession du pays ! '
