        - type: text
          text: elle est amère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa vie est amère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Rt 1.20.'
      marker-yv: yv-n
    - type: text
      text: 'Dès qu''elle fut arrivée auprès de l''homme de Dieu dans la montagne, elle lui saisit les pieds. Guéhazi s''approcha pour la repousser, mais l''homme de Dieu dit : Laisse-la, car elle est amère ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me l''a caché, il ne m''en a pas informé. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors elle dit : T''ai-je demandé un fils, mon seigneur ? N''ai-je pas dit : Ne me trompe pas !'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si tu rencontres…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénis
        - type: text
          text: ' pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: te bénit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
