        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les pieds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les jambes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la repousser
      - type: usfm
