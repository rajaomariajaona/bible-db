      - type: usfm
        marker: fq
        children:
        - type: text
          text: garçon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot peut aussi désigner un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jeune homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Jusqu''au v. 18, il était décrit comme un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enfant.
      marker-yv: yv-n
    - type: text
      text: 'Elisée dit à Guéhazi : Passe une ceinture à tes reins, prends mon bâton et va. Si tu rencontres quelqu''un, ne le bénis pas ; et si quelqu''un te bénit, ne lui réponds pas. Tu mettras mon bâton sur le visage du garçon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la rue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dehors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne te contente pas d'un petit nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne fais pas peu.
      marker-yv: yv-n
    - type: text
      text: 'Il dit alors : Sors dans la rue, demande à tous tes voisins des récipients, des récipients vides ; ne te contente pas d''un petit nombre ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La mère du garçon dit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et par ta propre vie, je ne te quitterai pas ! Alors il se leva et la suivit. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les avait devancés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''avait devancé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devancée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon les mss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni voix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 18.29.'
      marker-yv: yv-n
    - type: text
      text: 'Guéhazi les avait devancés et il avait mis le bâton sur le visage du garçon ; mais il n''y eut ni voix ni signe d''attention. Il revint à la rencontre d''Elisée et le mit au courant en disant : Le garçon ne s''est pas réveillé.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elisée rend la vie à l'enfant
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lc 7.12-16.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Elisée entra dans la maison, le garçon était mort, couché sur son lit. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entra et ferma la porte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4 ; Mt 6.6 ; Ac 9.40.'
      marker-yv: yv-n
    - type: text
      text: 'Elisée entra et ferma la porte sur eux deux pour prier le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il resta courbé sur lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se courba sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe correspondant n''apparaît qu''ici (et au v. 35) et en 1R 18.42, où Elie se courbe vers la terre jusqu''à l''apparition du nuage annonçant la fin de la sécheresse.'
      marker-yv: yv-n
    - type: text
      text: 'Il monta et se coucha sur l''enfant ; il mit sa bouche sur sa bouche, ses yeux sur ses yeux, ses mains sur ses mains. Il resta courbé sur lui, et la chair de l''enfant se réchauffa. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et se courba sur l''enfant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' présente un texte plus court'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et se courba sur le garçon jusqu'à sept fois et le garçon ouvrit les yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: éternua
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''est un signe de vie, Jb 41.9 ; cf. 13.21 où le simple contact avec le corps d''Elisée occasionne une résurrection.'
      marker-yv: yv-n
    - type: text
      text: 'Elisée revint dans la maison et se mit à marcher de long en large ; puis il remonta et se courba sur l''enfant ; alors le garçon éternua sept fois et ouvrit les yeux. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Hé 11.35.
      marker-yv: yv-n
    - type: text
      text: 'Elisée appela Guéhazi et lui dit : Appelle cette Shounamite. Guéhazi l''appela, et elle vint vers Elisée qui dit : Prends ton fils. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Elle vint et tomba à ses pieds, prosternée jusqu'à terre ; puis elle prit son fils et sortit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La soupe immangeable
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guilgal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' des prophètes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une soupe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un ragoût
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; le mot hébreu désigne un plat cuisiné mal identifié ; cf. Gn 25.29 ; Ag 2.12.
      marker-yv: yv-n
    - type: text
      text: 'Elisée revint au Guilgal. Or il y avait une famine dans le pays. Alors que les prophètes étaient assis devant lui, il dit à son serviteur : Prépare la grande marmite et fais cuire une soupe pour les prophètes. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des légumes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des herbes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une vigne sauvage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une vigne de champ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression qui pourrait désigner un plant de coloquintes, dont les feuilles ressemblent effectivement à celles de la vigne et dont les fruits fort attrayants sont extrêmement toxiques. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on ne savait pas ce que c'était
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne savaient pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; en s''appuyant sur certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ', on peut aussi lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il ne le '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= le légume) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: connaissait pas.
      marker-yv: yv-n
    - type: text
      text: 'L''un d''eux sortit dans la campagne pour ramasser des légumes ; il trouva une vigne sauvage et il y ramassa des coloquintes sauvages, plein son vêtement. Quand il rentra, il les coupa en morceaux dans la marmite de soupe, car on ne savait pas ce que c''était. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'huile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Quand tu seras rentrée, tu fermeras la porte sur toi et sur tes fils ; tu verseras l''huile dans tous ces récipients et tu mettras de côté ceux qui seront pleins. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'On servit à manger à ces hommes ; mais dès qu''ils eurent mangé de la soupe, ils s''écrièrent : Il y a la mort dans la marmite, homme de Dieu ! Ils ne pouvaient pas en manger. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Elisée dit : Prenez de la farine. Il en jeta dans la marmite et dit : Sers ces gens et qu''ils mangent. Et il n''y avait plus rien de mauvais dans la marmite.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La multiplication des pains
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Baal-Shalisha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 9.4 ; ville de la région montagneuse d''Ephraïm parfois identifiée avec les sites modernes de Khirbet Serisia ou de Kafr Tilt. –  '
      - type: usfm
        marker: fq
