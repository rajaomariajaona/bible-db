document_id: 2KI.4,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elisée secourt une veuve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 17.7-16. A la différence du miracle d''Elie, qui se situait en Phénicie dans un contexte de famine généralisée, le miracle d''Elisée répond à un malheur individuel en Israël. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La femme d''un des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une femme d''entre les femmes des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' des prophètes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; un ms hébreu et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une femme d'entre les fils des prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui impliquerait la présence de femmes au sein de la confrérie des prophètes (cf. 2.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: esclaves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot est traduit plus haut par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ex 21.7.
      marker-yv: yv-n
    - type: text
      text: 'La femme d''un des prophètes cria vers Elisée : Mon mari, ton serviteur, est mort, et tu sais qu''il craignait le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; or le créancier est venu pour prendre mes deux enfants et en faire ses esclaves. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chambre… à l''étage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jg 3.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un porte-lampes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: menora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui désigne aujourd''hui le chandelier traditionnel à plusieurs branches, s''applique dans la Bible au porte-lampes de la « demeure » du désert (Ex 25.31+ ; 30.27 ; 31.8 etc.) ou du temple de Salomon (1R 7.49). La présence d''un tel objet dans la chambre d''Elisée pourrait signifier que, pour la Shounamite, cette pièce sera un véritable sanctuaire.'
      marker-yv: yv-n
    - type: text
      text: Je t'en prie, faisons une petite chambre en dur à l'étage, et mettons-y pour lui un lit, une table, un siège et un porte-lampes. Quand il viendra chez nous, il pourra s'y retirer.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le jour où Elisée revint, il se retira dans la chambre à l''étage et s''y coucha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : devant Elisée, même si ce dernier ne s''adresse à la Shounamite que par l''intermédiaire de Guéhazi.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit à Guéhazi, son serviteur : Appelle cette Shounamite. Guéhazi l''appela, et elle se présenta devant lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu as fait beaucoup…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as tremblé pour nous de tout ce tremblement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu t''es donné beaucoup de mal pour nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Gn 42.28 ; Ex 19.16 ; 1S 28.5 ; Es 10.29). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'habite au milieu de mon peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on a interprété cette réponse, qui semble décliner l''offre, soit comme une expression de modestie (qui suis-je pour qu''on sollicite le roi à mon sujet ?), soit comme une expression de contentement (j''ai tout ce qu''il me faut).'
      marker-yv: yv-n
    - type: text
      text: 'Elisée dit à Guéhazi : Dis-lui, je te prie : Tu as fait beaucoup de choses pour nous ; que peut-on faire pour toi ? Faut-il parler pour toi au roi ou au chef de l''armée ? Elle répondit : J''habite au milieu de mon peuple. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son mari est vieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en 8.1-6, la Shounamite est peut-être veuve. Cf. Gn 18.12.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit alors : Que faire pour elle ? Guéhazi répondit : Hélas, elle n''a pas de fils, et son mari est vieux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la porte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans l'entrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 5.9 ; 1R 14.6.'
      marker-yv: yv-n
    - type: text
      text: 'Elisée dit : Appelle-la. Guéhazi l''appela ; elle se présenta à la porte. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A cette époque-ci, l'année prochaine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à ce moment '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cette fête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon le temps vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la même expression est traduite au v. 17 par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la même époque, l'année suivante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 17.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.10. Ce récit présente plusieurs analogies avec celui de la Genèse (hospitalité offerte par un couple sans enfant et dont le mari est âgé). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: homme de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression absente d''un ms hébreu et de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elisée lui dit : A cette époque-ci, l''année prochaine, tu auras un fils dans tes bras. Elle dit alors : Non, mon seigneur, homme de Dieu ! Ne me mens pas, à moi, ta servante !'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Cette femme fut enceinte ; elle mit au monde un fils à la même époque, l'année suivante, comme Elisée le lui avait dit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort du fils de la Shounamite
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 17.17-24.
      marker-yv: yv-n
    - type: text
      text: 'L''enfant grandit. Un jour qu''il était sorti vers son père, auprès des moissonneurs, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'il dit à son père : Ma tête ! ma tête ! Le père dit à son serviteur : Porte-le à sa mère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un flacon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant n''apparaît qu''ici ; certains modifient le texte hébreu traditionnel pour lire le mot qui désigne en 1S 10.1 la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fiole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'servant à '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'huile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de parfum
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; comparer avec 1R 17.10-16.'
      marker-yv: yv-n
    - type: text
      text: 'Elisée lui dit : Que puis-je faire pour toi ? Dis-moi ce que tu as à la maison. Elle répondit : Moi, ta servante, je n''ai rien d''autre à la maison qu''un flacon d''huile. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: resta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la plupart des mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fut couché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut-être en fonction du début du v. 21.'
      marker-yv: yv-n
    - type: text
      text: 'Il l''emporta et l''amena à sa mère ; l''enfant resta sur les genoux de sa mère jusqu''à midi, puis il mourut. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le lit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : elle qui se tenait jusqu''ici à l''entrée de la chambre n''hésite pas à coucher son enfant mort sur le lit du prophète, accomplissant elle-même le geste du prophète Elie envers le fils de la veuve de Sarepta (1R 17.19).'
      marker-yv: yv-n
    - type: text
      text: 'Elle monta, le coucha sur le lit de l''homme de Dieu, ferma la porte sur lui et sortit. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Elle appela son mari et lui dit : Envoie-moi, je te prie, un des serviteurs et une des ânesses ; je cours trouver l''homme de Dieu et je reviens. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nouvelle lune… '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 66.23 ; Ez 46.1 ; Am 8.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout va bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Le mari est tenu en dehors de l'action ; dès le début (v. 8), la femme est au centre du récit.
      marker-yv: yv-n
    - type: text
      text: 'Il dit : Pourquoi vas-tu le voir aujourd''hui ? Ce n''est ni nouvelle lune ni sabbat. Elle répondit : Tout va bien. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Conduis-la
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe en 9.20.'
      marker-yv: yv-n
    - type: text
      text: 'Puis elle fit seller l''ânesse et dit à son serviteur : Conduis-la et marche ; ne m''arrête pas en route sans que je te le dise.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'homme de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à la deuxième occurrence, la plupart des mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Elisée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même au v. 27.
      marker-yv: yv-n
    - type: text
      text: 'Elle partit donc trouver l''homme de Dieu au mont Carmel. Quand l''homme de Dieu l''aperçut de loin, il dit à Guéhazi, son serviteur : C''est cette Shounamite ! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout va bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'shalom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: revient à quatre reprises dans ce v. (cf. v. 23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). La Shounamite ne veut s'adresser à personne d'autre qu'au prophète (cf. v. 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, cours à sa rencontre, je te prie, et dis-lui : Vas-tu bien ? Ton mari va-t-il bien ? L''enfant va-t-il bien ? Elle répondit : Tout va bien. '
  '27':
  - type: usfm
    marker: p
