document_id: 2KI.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elisée secourt une veuve
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 17.7-16. A la différence du miracle d''Elie, qui se situait en Phénicie dans un contexte de famine généralisée, le miracle d''Elisée répond à un malheur individuel en Israël. –  La femme d''un des prophètes  : litt. une femme d''entre les femmes des fils des prophètes  ; un ms hébreu et LXX portent une femme d''entre les fils des prophètes , ce qui impliquerait la présence de femmes au sein de la confrérie des prophètes (cf. 2.3n). – Voir crainte. –  esclaves  : le même mot est traduit plus haut par serviteur  ; cf. Ex 21.7.'
  - type: text
    content: 'La femme d''un des prophètes cria vers Elisée : Mon mari, ton serviteur, est mort, et tu sais qu''il craignait le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; or le créancier est venu pour prendre mes deux enfants et en faire ses esclaves. '
  '10':
  - type: note
    content: 'chambre… à l''étage Jg 3.20n. –  un porte-lampes  : le mot hébreu menora, qui désigne aujourd''hui le chandelier traditionnel à plusieurs branches, s''applique dans la Bible au porte-lampes de la « demeure » du désert (Ex 25.31+ ; 30.27 ; 31.8 etc.) ou du temple de Salomon (1R 7.49). La présence d''un tel objet dans la chambre d''Elisée pourrait signifier que, pour la Shounamite, cette pièce sera un véritable sanctuaire.'
  - type: text
    content: Je t'en prie, faisons une petite chambre en dur à l'étage, et mettons-y pour lui un lit, une table, un siège et un porte-lampes. Quand il viendra chez nous, il pourra s'y retirer.
  '11':
  - type: text
    content: 'Le jour où Elisée revint, il se retira dans la chambre à l''étage et s''y coucha. '
  '12':
  - type: note
    content: 'devant lui  : devant Elisée, même si ce dernier ne s''adresse à la Shounamite que par l''intermédiaire de Guéhazi.'
  - type: text
    content: 'Il dit à Guéhazi, son serviteur : Appelle cette Shounamite. Guéhazi l''appela, et elle se présenta devant lui. '
  '13':
  - type: note
    content: 'Tu as fait beaucoup…  : litt. tu as tremblé pour nous de tout ce tremblement, c.-à-d. tu t''es donné beaucoup de mal pour nous (cf. Gn 42.28 ; Ex 19.16 ; 1S 28.5 ; Es 10.29). –  J''habite au milieu de mon peuple  : on a interprété cette réponse, qui semble décliner l''offre, soit comme une expression de modestie (qui suis-je pour qu''on sollicite le roi à mon sujet ?), soit comme une expression de contentement (j''ai tout ce qu''il me faut).'
  - type: text
    content: 'Elisée dit à Guéhazi : Dis-lui, je te prie : Tu as fait beaucoup de choses pour nous ; que peut-on faire pour toi ? Faut-il parler pour toi au roi ou au chef de l''armée ? Elle répondit : J''habite au milieu de mon peuple. '
  '14':
  - type: note
    content: 'son mari est vieux  : en 8.1-6, la Shounamite est peut-être veuve. Cf. Gn 18.12.'
  - type: text
    content: 'Il dit alors : Que faire pour elle ? Guéhazi répondit : Hélas, elle n''a pas de fils, et son mari est vieux. '
  '15':
  - type: note
    content: à la porte ou dans l'entrée  ; cf. 5.9 ; 1R 14.6.
  - type: text
    content: 'Elisée dit : Appelle-la. Guéhazi l''appela ; elle se présenta à la porte. '
  '16':
  - type: note
    content: 'A cette époque-ci, l''année prochaine  : litt. à ce moment (ou à cette fête) selon le temps vivant  ; la même expression est traduite au v. 17 par à la même époque, l''année suivante  ; cf. Gn 17.21n  ; 18.10. Ce récit présente plusieurs analogies avec celui de la Genèse (hospitalité offerte par un couple sans enfant et dont le mari est âgé). –  homme de Dieu  : expression absente d''un ms hébreu et de LXX.'
  - type: text
    content: 'Elisée lui dit : A cette époque-ci, l''année prochaine, tu auras un fils dans tes bras. Elle dit alors : Non, mon seigneur, homme de Dieu ! Ne me mens pas, à moi, ta servante !'
  '17':
  - type: text
    content: Cette femme fut enceinte ; elle mit au monde un fils à la même époque, l'année suivante, comme Elisée le lui avait dit.
  - type: heading
    content: Mort du fils de la Shounamite
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1R 17.17-24.
  - type: text
    content: 'L''enfant grandit. Un jour qu''il était sorti vers son père, auprès des moissonneurs, '
  '19':
  - type: text
    content: 'il dit à son père : Ma tête ! ma tête ! Le père dit à son serviteur : Porte-le à sa mère. '
  '2':
  - type: note
    content: 'un flacon  : le terme correspondant n''apparaît qu''ici ; certains modifient le texte hébreu traditionnel pour lire le mot qui désigne en 1S 10.1 la fiole servant à l''onction. –  d''huile  : autre traduction de parfum  ; comparer avec 1R 17.10-16.'
  - type: text
    content: 'Elisée lui dit : Que puis-je faire pour toi ? Dis-moi ce que tu as à la maison. Elle répondit : Moi, ta servante, je n''ai rien d''autre à la maison qu''un flacon d''huile. '
  '20':
  - type: note
    content: 'resta  : la plupart des mss de LXX ont lu fut couché, peut-être en fonction du début du v. 21.'
  - type: text
    content: 'Il l''emporta et l''amena à sa mère ; l''enfant resta sur les genoux de sa mère jusqu''à midi, puis il mourut. '
  '21':
  - type: note
    content: 'sur le lit…  : elle qui se tenait jusqu''ici à l''entrée de la chambre n''hésite pas à coucher son enfant mort sur le lit du prophète, accomplissant elle-même le geste du prophète Elie envers le fils de la veuve de Sarepta (1R 17.19).'
  - type: text
    content: 'Elle monta, le coucha sur le lit de l''homme de Dieu, ferma la porte sur lui et sortit. '
  '22':
  - type: text
    content: 'Elle appela son mari et lui dit : Envoie-moi, je te prie, un des serviteurs et une des ânesses ; je cours trouver l''homme de Dieu et je reviens. '
  '23':
  - type: note
    content: 'nouvelle lune… sabbat Es 66.23 ; Ez 46.1 ; Am 8.5. –  Tout va bien  : hébreu shalom, litt. paix. Le mari est tenu en dehors de l''action ; dès le début (v. 8), la femme est au centre du récit.'
  - type: text
    content: 'Il dit : Pourquoi vas-tu le voir aujourd''hui ? Ce n''est ni nouvelle lune ni sabbat. Elle répondit : Tout va bien. '
  '24':
  - type: note
    content: 'Conduis-la  : même verbe en 9.20.'
  - type: text
    content: 'Puis elle fit seller l''ânesse et dit à son serviteur : Conduis-la et marche ; ne m''arrête pas en route sans que je te le dise.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme de Dieu  : à la deuxième occurrence, la plupart des mss de LXX portent Elisée  ; de même au v. 27.'
  - type: text
    content: 'Elle partit donc trouver l''homme de Dieu au mont Carmel. Quand l''homme de Dieu l''aperçut de loin, il dit à Guéhazi, son serviteur : C''est cette Shounamite ! '
  '26':
  - type: note
    content: 'Tout va bien  : le mot hébreu shalom revient à quatre reprises dans ce v. (cf. v. 23n). La Shounamite ne veut s''adresser à personne d''autre qu''au prophète (cf. v. 12n).'
  - type: text
    content: 'Maintenant, cours à sa rencontre, je te prie, et dis-lui : Vas-tu bien ? Ton mari va-t-il bien ? L''enfant va-t-il bien ? Elle répondit : Tout va bien. '
  '27':
  - type: note
    content: 'homme de Dieu  : cf. v. 25n. –  les pieds  : autre traduction les jambes. –  pour la repousser  : cf. Mc 10.13. –  elle est amère  : litt. son âme ou sa vie est amère  ; cf. Rt 1.20.'
  - type: text
    content: 'Dès qu''elle fut arrivée auprès de l''homme de Dieu dans la montagne, elle lui saisit les pieds. Guéhazi s''approcha pour la repousser, mais l''homme de Dieu dit : Laisse-la, car elle est amère ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me l''a caché, il ne m''en a pas informé. '
  '28':
  - type: text
    content: 'Alors elle dit : T''ai-je demandé un fils, mon seigneur ? N''ai-je pas dit : Ne me trompe pas !'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Si tu rencontres…  : cf. v. 24. –  ne le bénis pas / te bénit  : autre traduction ne le salue pas / te salue  ; cf. Lc 10.4. –  garçon  : le mot peut aussi désigner un jeune homme ou un serviteur . Jusqu''au v. 18, il était décrit comme un enfant.'
  - type: text
    content: 'Elisée dit à Guéhazi : Passe une ceinture à tes reins, prends mon bâton et va. Si tu rencontres quelqu''un, ne le bénis pas ; et si quelqu''un te bénit, ne lui réponds pas. Tu mettras mon bâton sur le visage du garçon. '
  '3':
  - type: note
    content: 'dans la rue ou dehors. –  ne te contente pas d''un petit nombre  : litt. ne fais pas peu.'
  - type: text
    content: 'Il dit alors : Sors dans la rue, demande à tous tes voisins des récipients, des récipients vides ; ne te contente pas d''un petit nombre ! '
  '30':
  - type: note
    content: 'Par la vie du Seigneur …  : cf. 2.2n.'
  - type: text
    content: 'La mère du garçon dit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta propre vie, je ne te quitterai pas ! Alors il se leva et la suivit. '
  '31':
  - type: note
    content: 'les avait devancés  : LXX l''avait devancé ou devancée, selon les mss. –  ni voix  : cf. 1R 18.29.'
  - type: text
    content: 'Guéhazi les avait devancés et il avait mis le bâton sur le visage du garçon ; mais il n''y eut ni voix ni signe d''attention. Il revint à la rencontre d''Elisée et le mit au courant en disant : Le garçon ne s''est pas réveillé.'
  - type: heading
    content: Elisée rend la vie à l'enfant
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 7.12-16.
  - type: text
    content: 'Lorsque Elisée entra dans la maison, le garçon était mort, couché sur son lit. '
  '33':
  - type: note
    content: 'entra et ferma la porte…  : cf. v. 4 ; Mt 6.6 ; Ac 9.40.'
  - type: text
    content: 'Elisée entra et ferma la porte sur eux deux pour prier le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '34':
  - type: note
    content: Il resta courbé sur lui ou il se courba sur lui  ; le verbe correspondant n'apparaît qu'ici (et au v. 35) et en 1R 18.42, où Elie se courbe vers la terre jusqu'à l'apparition du nuage annonçant la fin de la sécheresse.
  - type: text
    content: 'Il monta et se coucha sur l''enfant ; il mit sa bouche sur sa bouche, ses yeux sur ses yeux, ses mains sur ses mains. Il resta courbé sur lui, et la chair de l''enfant se réchauffa. '
  '35':
  - type: note
    content: 'et se courba sur l''enfant (litt. sur lui) …  : LXX présente un texte plus court  : et se courba sur le garçon jusqu''à sept fois et le garçon ouvrit les yeux. –  éternua  : c''est un signe de vie, Jb 41.9 ; cf. 13.21 où le simple contact avec le corps d''Elisée occasionne une résurrection.'
  - type: text
    content: 'Elisée revint dans la maison et se mit à marcher de long en large ; puis il remonta et se courba sur l''enfant ; alors le garçon éternua sept fois et ouvrit les yeux. '
  '36':
  - type: note
    content: Cf. Hé 11.35.
  - type: text
    content: 'Elisée appela Guéhazi et lui dit : Appelle cette Shounamite. Guéhazi l''appela, et elle vint vers Elisée qui dit : Prends ton fils. '
  '37':
  - type: text
    content: Elle vint et tomba à ses pieds, prosternée jusqu'à terre ; puis elle prit son fils et sortit.
  - type: heading
    content: La soupe immangeable
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Guilgal  : cf. 2.1. –  les prophètes  : litt. les fils des prophètes , cf. 2.3n. –  une soupe ou un ragoût  ; le mot hébreu désigne un plat cuisiné mal identifié ; cf. Gn 25.29 ; Ag 2.12.'
  - type: text
    content: 'Elisée revint au Guilgal. Or il y avait une famine dans le pays. Alors que les prophètes étaient assis devant lui, il dit à son serviteur : Prépare la grande marmite et fais cuire une soupe pour les prophètes. '
  '39':
  - type: note
    content: 'des légumes ou des herbes. –  une vigne sauvage  : litt. une vigne de champ, expression qui pourrait désigner un plant de coloquintes, dont les feuilles ressemblent effectivement à celles de la vigne et dont les fruits fort attrayants sont extrêmement toxiques. –  on ne savait pas ce que c''était  : litt. ils ne savaient pas  ; en s''appuyant sur certains mss de LXX, Syr et Vg, on peut aussi lire il ne le (= le légume) connaissait pas.'
  - type: text
    content: 'L''un d''eux sortit dans la campagne pour ramasser des légumes ; il trouva une vigne sauvage et il y ramassa des coloquintes sauvages, plein son vêtement. Quand il rentra, il les coupa en morceaux dans la marmite de soupe, car on ne savait pas ce que c''était. '
  '4':
  - type: note
    content: 'l''huile  : sous-entendu dans le texte.'
  - type: text
    content: 'Quand tu seras rentrée, tu fermeras la porte sur toi et sur tes fils ; tu verseras l''huile dans tous ces récipients et tu mettras de côté ceux qui seront pleins. '
  '40':
  - type: text
    content: 'On servit à manger à ces hommes ; mais dès qu''ils eurent mangé de la soupe, ils s''écrièrent : Il y a la mort dans la marmite, homme de Dieu ! Ils ne pouvaient pas en manger. '
  '41':
  - type: text
    content: 'Elisée dit : Prenez de la farine. Il en jeta dans la marmite et dit : Sers ces gens et qu''ils mangent. Et il n''y avait plus rien de mauvais dans la marmite.'
  - type: heading
    content: La multiplication des pains
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Baal-Shalisha  : cf. 1S 9.4 ; ville de la région montagneuse d''Ephraïm parfois identifiée avec les sites modernes de Khirbet Serisia ou de Kafr Tilt. –  du pain de la première moisson  : c''est habituellement une offrande, cf. Ex 23.19n  ; Lv 23.17-21 ; Nb 18.13 ; Dt 18.4. –  du blé nouveau dans son sac  : traduction incertaine ; selon certains, l''expression correspondante, dont l''un des termes n''apparaît qu''ici, pourrait désigner une variété de fruits ; LXX des gâteaux de raisins . –  à ces gens  : litt. au peuple , de même au v. 43. – Voir aussi Mt 14.16-20 ; Jn 6.9-13.'
  - type: text
    content: 'Un homme arriva de Baal-Shalisha. Il apportait du pain de la première moisson à l''homme de Dieu, vingt pains d''orge, et du blé nouveau dans son sac. Elisée dit : Donne-le à ces gens, et qu''ils mangent. '
  '43':
  - type: note
    content: 'Jn 6.9. –  Son auxiliaire  : cf. 6.15 ; 1R 1.4n  ; Jos 1.1. –  On mangera…  : cf. Mc 6.35-44/ /.'
  - type: text
    content: 'Son auxiliaire répondit : Comment pourrais-je en donner à cent personnes ? Mais Elisée dit : Donne à ces gens, et qu''ils mangent ; car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : On mangera et on en aura de reste. '
  '44':
  - type: note
    content: 'Il mit alors… devant eux  : absent de LXX. –  les pains  : sous-entendu dans le texte. –  et en eurent de reste  : comme dans le premier récit du chap., celui-ci se termine en soulignant la surabondance de ce que Dieu donne ; cf. Lc 9.17.'
  - type: text
    content: 'Il mit alors les pains devant eux ; ils mangèrent et en eurent de reste, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: note
    content: 'les récipients  : sous-entendu dans le texte.'
  - type: text
    content: 'Alors elle le quitta. Elle ferma la porte sur elle et sur ses fils ; ils lui passaient les récipients, et elle versait. '
  '6':
  - type: text
    content: 'Lorsque les récipients furent pleins, elle dit à son fils : Passe-moi encore un récipient. Mais il lui répondit : Il n''y a plus de récipient. Alors l''huile s''arrêta. '
  '7':
  - type: note
    content: 'paie ta dette  : autre lecture traditionnelle rembourse ton créancier. –  ce qui restera  : cf. Mt 14.20/ /.'
  - type: text
    content: 'Elle vint raconter tout cela à l''homme de Dieu ; celui-ci dit : Va vendre l''huile et paie ta dette ; tu vivras, toi et tes fils, de ce qui restera.'
  - type: heading
    content: Elisée et la Shounamite
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Shounem  : dans la vallée de Jizréel. –  une femme de haut rang  : litt. une grande dame . –  qui le pressa d''accepter à manger  : litt. qui l''obligea à manger du pain , cf. Gn 3.19n  ; 37.25n.'
  - type: text
    content: 'Un jour Elisée passait par Shounem. Il y avait là une femme de haut rang, qui le pressa d''accepter à manger. Dès lors, toutes les fois qu''il passait, il se retirait chez elle pour manger. '
  '9':
  - type: note
    content: un saint homme de Dieu ou l'homme de Dieu est saint c.-à-d. consacré, ce qui rendait peut-être nécessaire qu'il puisse disposer de sa propre chambre. Cf. 1R 17.24.
  - type: text
    content: 'Elle dit à son mari : Je sais que cet homme qui passe constamment chez nous est un saint homme de Dieu. '
