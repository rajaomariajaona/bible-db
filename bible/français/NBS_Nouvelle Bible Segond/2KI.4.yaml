          text: ', de même au v. 43. – Voir aussi Mt 14.16-20 ; Jn 6.9-13.'
      marker-yv: yv-n
    - type: text
      text: 'Un homme arriva de Baal-Shalisha. Il apportait du pain de la première moisson à l''homme de Dieu, vingt pains d''orge, et du blé nouveau dans son sac. Elisée dit : Donne-le à ces gens, et qu''ils mangent. '
  '43':
