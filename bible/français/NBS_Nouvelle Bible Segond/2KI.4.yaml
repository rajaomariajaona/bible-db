    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Lorsque les récipients furent pleins, elle dit à son fils : Passe-moi encore un récipient. Mais il lui répondit : Il n''y a plus de récipient. Alors l''huile s''arrêta. '
  '7':
