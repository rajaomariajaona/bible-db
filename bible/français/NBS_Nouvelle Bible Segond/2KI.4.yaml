          - type: text
            text: n
        - type: text
          text: '  ; Jos 1.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On mangera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mc 6.35-44/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Son auxiliaire répondit : Comment pourrais-je en donner à cent personnes ? Mais Elisée dit : Donne à ces gens, et qu''ils mangent ; car ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : On mangera et on en aura de reste. '
