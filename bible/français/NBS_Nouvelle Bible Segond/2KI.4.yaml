        children:
        - type: text
          text: '  : cf. Mt 14.20/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Elle vint raconter tout cela à l''homme de Dieu ; celui-ci dit : Va vendre l''huile et paie ta dette ; tu vivras, toi et tes fils, de ce qui restera.'
  - type: usfm
