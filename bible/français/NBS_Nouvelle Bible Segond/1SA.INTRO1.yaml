document_id: 1SA.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les deux livres de Samuel sont à considérer comme '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: un seul ouvrage.
  - type: text
    text: ' Leur division répond avant tout à des préoccupations pratiques : la commodité de la lecture exigeait que la longueur des rouleaux ne fût pas excessive. On a donc procédé à un découpage simple, le premier livre s''étendant jusqu''à la mort de Saül, le second étant entièrement consacré au règne de David.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Dans leur traduction grecque, qui remonte selon toute vraisemblance au II
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle av. J.-C. (voir LXX*), les livres de Samuel sont en outre associés à ceux des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Rois
  - type: text
    text: ' qui leur font suite et avec lesquels ils constituent les quatre livres des Règnes.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Suivant la classification hébraïque, les livres de Samuel appartiennent aux «  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Premiers Prophètes
  - type: text
    text: '  ». Cette appellation est bien préférable à celle, plus traditionnelle dans les Bibles françaises et héritée de la traduction grecque, de « livres historiques » (voir l''introduction à l''Ancien Testament, p.${Xintat}). On se méprendrait en effet à considérer ces textes comme de simples annales de la monarchie israélite et de ses origines.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les deux livres de Samuel, et le second de manière encore plus évidente que le premier, veulent montrer l''action de Dieu dans l''histoire. Leur intention première est '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: théologique
  - type: text
    text: . Mais pour autant ils ne ressortissent pas aux genres mythologique ou légendaire. Ils rapportent les faits historiques avec le souci de la précision, au point de ne pas toujours flatter le portrait des principaux acteurs du drame. Grands personnages comme obscurs comparses y sont peints avec vérité, dans leur dimension tout humaine.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''ensemble de l''œuvre doit son '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: nom
  - type: text
    text: ' à Samuel'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: ','
  - type: text
    text: ' le premier des trois grands personnages (les deux autres étant Saül et David) dont le destin organise la composition littéraire — encore que Samuel n''en soit ni l''auteur, ni le sujet principal (cf. 1Ch 29.29).'
- type: usfm
  marker: is1
  children:
  - type: text
    text: 1 SAMUEL
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La part réservée à Samuel lui-même n''en reste pas moins considérable, puisque huit chapitres lui sont consacrés (2–3 ; 7–9 ; 11 ; 25 ; 28). Samuel est en effet un personnage hors du commun. Issu, comme le juge Samson, d''une naissance miraculeuse, il est lui aussi un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nazir
  - type: text
    text: ', mis à part dès sa jeunesse pour le service de Dieu (comparer Jg 13.3-7 ; 16.17 avec 1S 1.11-20). A l''instar d''Eli, le prêtre-juge de Silo, il sera serviteur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) : en sa qualité de prêtre il portera l''éphod et veillera sur le coffre sacré. Ce sera en outre le dernier des grands juges (cf. 1S 2.18 ; 3.1 ; 7.15). A ces qualifications sont encore ajoutées celle de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: voyant
  - type: text
    text: ' (9.9ss,19) ou de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophète
  - type: text
    text: ', c''est-à-dire de porte-parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (3.1,20).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le récit de la naissance de Samuel, comme pour souligner sa future compétition avec le roi Saül (en hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shaoul,
  - type: text
    text: ' le « demandé »), explique le nom de Samuel par la même étymologie : il sera toute sa vie '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shaoul
  - type: text
    text: ' (= '
  - type: usfm
    marker: it
    children:
    - type: text
      text: demandé,
  - type: text
    text: ' ou « requis ») pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (1.27-28'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre montrera par la suite comment les projets humains diffèrent des dispositions de Dieu : le brillant Samuel ne sera ni le roi attendu, ni davantage le prêtre fidèle qui assurera la succession d''Eli (2.35). Mais il reste pour l''histoire celui par qui sont faits les rois.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: La crise ouverte et l'appel à la monarchie
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le désir d''instaurer la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: royauté
  - type: text
    text: ' en Israël et l''exaucement de ce désir ne laissent pas de surprendre. Selon les récits bibliques, en effet, jusque-là Israël n''avait jamais été dirigé que par des chefs charismatiques, de grands inspirés agissant pour une période longue ou courte sous l''impulsion du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Souffle
  - type: text
    text: ' ou Esprit* divin.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''épisode cruel de la tentative monarchique d''Abimélek et la vigoureuse satire dont elle fit l''objet de la part de son jeune frère Jotam (Jg 8–9) appartiennent à la génération précédente. Le premier livre de Samuel a parfois des accents de la même tonalité, '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: antiroyalistes
  - type: text
    text: ' ou du moins critiques envers la monarchie (1S 8 ; 10.17-25 ; 12). Comment expliquer cependant le changement de régime ? L''histoire biblique va mettre en avant le péril philistin, que ne saura écarter ni le gouvernement d''une prêtrise corrompue, ni le coffre sacré pris comme fétiche.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: 'Une famille sacerdotale décadente : les Elides'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La dignité de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prêtrise
  - type: text
    text: ', notion très haute en Israël, est tristement discréditée par les agissements des successeurs désignés du vieux prêtre Eli. En effet, les deux fils de ce dernier sont des irresponsables indignes de leur charge. Pour autant qu''il n''appartient pas aux humains de corriger un désordre parmi les prêtres, c''est le jugement de Dieu qui s''exercera directement contre eux (2.25).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La sentence sera en effet prononcée par un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: homme de Dieu
  - type: text
    text: ' (2.27). Celui-ci annoncera des disparitions prématurées dans la descendance d''Eli, à commencer par celle des deux fils coupables (2.34). L''horrible massacre de Nob s''y profile déjà, où tous les descendants d''Eli, sauf un, périront (chap. 21). Seul '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Abiathar
  - type: text
    text: ', le fidèle compagnon de David, survivra. Mais Abiathar sera finalement destitué par Salomon (1R 2.26s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La place sera désormais libre pour le chapelain de Salomon, '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Tsadoq
  - type: text
    text: ' (1R 1.32,38 ; cf. Sadok en Mt 1.14). Lui et les siens — les sadocides, auxquels se rattachaient encore, par l''idéologie sinon par la généalogie, les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sadducéens
  - type: text
    text: ' du Nouveau Testament — auront la haute main sur le sanctuaire de Jérusalem pendant 400 ans. Tsadoq est celui dont Dieu disait : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Je susciterai pour moi un prêtre sûr ; il agira selon mon cœur et selon mon âme… il marchera toujours devant l'homme qui aura reçu mon onction
  - type: text
    text: ' (1S 2.35).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: 'Le coffre sacré : une aide ou un piège ?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''inflation de la spiritualité se trahit dans le fétichisme du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: coffre sacré
  - type: text
    text: ' (l’« arche de l''alliance »). Les traditions rapportées en 1S 4–6 donnent une description très pédagogique de ce qu''il advient de la « religion » quand le rite l''emporte sur la foi vivante. Israël défait s''estime abandonné par YHWH, son Seigneur. Aussi, pour contraindre le Dieu d''Israël à rallier quand même le parti de son peuple en lui octroyant la victoire militaire, on le va quérir, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: manu militari
  - type: text
    text: ', dans son sanctuaire de Silo (4.3s). On s''empare donc du coffre de l''alliance, le trône symbolique du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Seigneur (YHWH) des Armées qui est assis sur les keroubim
  - type: text
    text: ' (4.4), pour le conduire à pied d''œuvre, sur le champ de bataille, comme on déposerait un chat devant une souris. Mais l''ironie mordante du chroniqueur ne fait que commencer. Car les Philistins entrent dans le jeu de cette mauvaise théologie et considèrent la capture du coffre sacré comme un objectif tactique : ils parviennent à s''emparer du Coffre. Israël est consterné : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: La gloire est exilée
  - type: text
    text: ' (4.21). C''est alors l''épisode drolatique de la querelle d''influence entre l''idole de Dagôn ou Dagân, le dieu cananéen adopté par les Philistins (5.5'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ), et le coffre sacré du Dieu des Hébreux, qui se montre tout de même le plus fort. Au bout du compte, le Coffre restitué va occuper une position d'attente, en zone neutre, avant que les nouvelles institutions, celles de David, ne viennent l'établir dans son lieu et dans son honneur, à Jérusalem (6.1–7.1).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les Philistins, aiguillon de l'union fédérative
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Un facteur déclenchant, donc, est désigné pour l''institution de la monarchie en Israël : le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: péril philistin
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: L'histoire biblique avait pu laisser entendre que, dans les débuts, une certaine coexistence pacifique s'était établie entre les habitants du pays, les Amorites ou Cananéens (cf. Gn 9.18n ; 10.16
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ') et les Israélites (Jg 1.27-35). Les Philistins ne peuvent cependant être assimilés aux Cananéens, puisqu''ils appartiennent aux «  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: peuples de la mer
  - type: text
    text: '  ». Ainsi dénomme-t-on dans les archives égyptiennes ces ethnies nord-balkaniques et chypriotes qui, poussées par les mouvements de population en Europe centrale, déferlent sur la côte orientale de la Méditerranée, depuis l''Egypte jusqu''à la Syrie, vers le milieu du XIII'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle av. J.-C. Parmi ces peuples, les Philistins de la Bible ; c''est d''ailleurs de leur nom que dérive celui de Palestine. La notice de Josué 13.3 signale simplement leur présence, ainsi que leur organisation typique en cinq principautés, à l''instar de bien des cités-Etats de l''époque. Le premier livre de Samuel indique à deux reprises leur degré d''avancement technologique, en soulignant qu''ils en sont déjà à l''âge du fer, tandis qu''Israël en est encore à celui du bronze (1S 13.19-22 ; 17.7 ; cf. Jg 1.19).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Nul doute qu''en dépit de l''optimisme hâtif de 1 Samuel 7.13, la déroute des Philistins après l''assemblée du Mitspa n''aura été qu''une péripétie. Car le péril philistin devient alors si pressant que la sécurité des frontières requiert un dispositif de défense nouveau, celui qu''apportera l''institution de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: royauté
  - type: text
    text: . Celle-ci deviendra le gage, aux côtés d'un ministère prophétique correctement assumé (et Samuel n'y faillira pas), d'une nouvelle et plus grande proximité de Dieu. Le gouvernement du Seigneur (YHWH) deviendra ainsi plus visible puisque le roi sera celui qu'il a lui-même consacré par l'onction.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'C''est ainsi qu''au lendemain de son onction royale sur '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tout Israël,
  - type: text
    text: ' et grâce à la consultation de '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: YHWH
  - type: text
    text: ' qui lui accordera une révélation particulière, '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: David
  - type: text
    text: ' réussira à écarter pour longtemps le péril philistin (2S 5.3,17-25).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: 'Le premier roi : Saül de Guibéa'
- type: usfm
  marker: ip
  children:
  - type: text
    text: L'histoire politique avance rarement par mutations brusques. On observe généralement des signes avant-coureurs, puis des résistances et seulement en fin de compte le triomphe de la tendance la plus forte. Ainsi se présentent les chapitres 8 à 12 de 1 Samuel.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Récriminations contre la vénalité des fils de Samuel, indignes d''être juges (tout comme les fils d''Eli, au chapitre 2, étaient indignes d''être prêtres) ; demande d''un véritable roi ; dépit de Samuel. La réaction du prêtre-juge '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Samuel
  - type: text
    text: ' se manifeste avec la description du droit du roi (chap. 8), sa propre demande de quitus (12.1-5) et la doctrine toute neuve en Israël de la royauté de droit divin (12.6s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''avènement du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shaoul
  - type: text
    text: ', le prince « demandé », est rapporté dans un genre littéraire beaucoup plus frais, avec le beau fragment que certains appellent le « conte des ânesses ». L''accent y est mis sur la force du souffle divin qui revêt invinciblement '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Saül
  - type: text
    text: ', ce jeune homme de bonne famille, bien nourri (9.1s), bien élevé (9.7), neveu d''un propriétaire aisé (les ânes étaient à cette époque des montures de choix), que tout désignait pour porter le diadème (chap. 9–10).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Yabesh
  - type: text
    text: ' de Galaad (chap. 11) commence la chanson de geste sur Saül, le roi chevaleresque. Ce n''est pas un hasard si la fin de sa biographie voit réapparaître les mêmes Yabeshites venus décrocher leur sauveur cloué sur la muraille d''une ville égypto-philistine pour lui donner, chez eux, une sépulture digne de l''homme qui avait reçu l''onction du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (31.8-13 ; 2S 1.14).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le déclin de Saül…
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Saül n''est pas un personnage de second ordre. Le caractère '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: tragique
  - type: text
    text: ', et à bien des égards énigmatique, de son destin, ne doit pas faire oublier qu''humainement, sans lui, David n''était rien. Son règne a tourné court parce qu''il ne s''est pas toujours montré à la hauteur de la situation : par deux fois c''est son fils Jonathan qui lui a sauvé la mise (1S 13.1s ; 14.13-15). Lorsque, dans une sorte de terreur sacrée, Saül se hasarde à prendre des dispositions d''ordre religieux qui ne sont pas de son ressort (13.12 ; 14.24,38-44), il commet l''erreur de sa vie : il perd à la fois le soutien de Samuel et celui de Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Toutefois, le récit laisse aussi entrevoir les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: aspects positifs
  - type: text
    text: ' de son action pacificatrice : après Ammon (chap. 11), ce sont Moab, Edom, Amalec, et bien sûr les Philistins qui sont tenus en respect (14.47).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais la petite cour de Guibéa, où les postes de gouvernement sont distribués dans la famille, n''est pas appelée à durer, même si les pages sur '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Jonathan
  - type: text
    text: ' font regretter qu''il n''ait pas pu prendre la succession de son père après que celui-ci eut sombré dans la démence.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: … et l'ascension de David
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Une brève notice, en 14.52, annonce l''entrée de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: David
  - type: text
    text: ' dans le cercle familial : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tout homme vaillant et fort que Saül remarquait, il se l'adjoignait
  - type: text
    text: . C'est ce qui advient à David après sa victoire sur Goliath (17.55-58).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dès cet instant, un malaise s''insinue dans le récit, car le lecteur sait ce que Saül ignore et ignorera toujours : l''élection de David, dévoilée par l''épisode de son '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: onction secrète
  - type: text
    text: ' à Beth-Léhem. Mais entre le choix de Dieu que Samuel est presque seul à connaître (1S 16.2,7,12) et la gloire des intronisations futures, à Hébron puis à Jérusalem, bien des péripéties vont encore opposer les deux rois, celui que le peuple avait « demandé » ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shaoul = Saül
  - type: text
    text: ') et celui qui lui est octroyé '
  - type: usfm
    marker: it
    children:
    - type: text
      text: selon le cœur de Dieu
  - type: text
    text: ' (13.14).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les années du mûrissement
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Certaines images romantiques du « jeune enfant à la fronde » collent mal à la réalité des récits concernant la corégence secrète de David. Un laps de temps considérable a dû s''écouler entre l''onction de Beth-Léhem et l''apparition du jeune champion sur le champ de bataille d''Ephès-Dammim (16 ; 17). Dès le sommaire de 1 Samuel 18.5, David apparaît comme un valeureux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: chef de guerre
  - type: text
    text: . De fait, sa « royauté » est plébiscitée par le chant des femmes (18.7 ; 23.8), ce qui déclenche chez Saül une jalousie mortelle. Jusqu'à sa mort, Saül gaspillera ses forces à imaginer divers moyens d'éliminer David. Mais ce dernier n'est pas seulement le Bien-Aimé (c'est le sens de son nom !) des foules, il est d'abord celui de Dieu. Aussi bien toutes les intrigues de palais et tous les raids militaires à son encontre sont-ils voués à l'échec.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'De son côté, David va mettre à profit toutes ces années de dissidence pour se conquérir un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: royaume
  - type: text
    text: '. Il a dû simuler la folie pour s''introduire à la cour philistine du roi de Gath (chap. 21). Là, il va se constituer un commando de près d''un millier d''hommes avec lequel, à la manière d''un Robin des Bois, il se livrera à diverses opérations de redresseur de torts. En distribuant également le butin à tous, il se rend populaire (30.26ss). Rien d''étonnant, dès lors, au ralliement de tout Israël à sa couronne (2S 5). Car l''influence de David est plus étendue que celle du roi en place. Saül, en effet, n''a jamais exercé son autorité que sur quatre tribus : Benjamin (la sienne), Ephraïm, Gad et Manassé.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Si le désastre de Guilboa, avec la mort de Saül et de ses trois fils (1S 31), était inexorable (cf. 28.7ss), il est aussi l''occasion de réaffirmer la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: dignité royale
  - type: text
    text: ' de Saül. David n''a-t-il pas toujours reconnu en lui l''authentique « messie » du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur (YHWH),
  - type: text
    text: ' celui que Dieu lui-même avait consacré par l''onction (24.7 ; 26.16 ; 2S 1.14) ?'
- type: usfm
  marker: is1
  children:
  - type: text
    text: 2 SAMUEL
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le deuxième livre de Samuel poursuit la narration avec l''annonce de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mort de Saül
  - type: text
    text: ' et toutes ses conséquences. Bien loin de se réjouir de la disparition d''un rival devenu un véritable ennemi, David entonne une ode funèbre qui compte parmi les morceaux les plus poignants de la littérature de tous les temps (2S 1.19-27). Cet épisode vient clore une série d''incidents où était en cause le caractère sacré du roi revêtu de l''onction divine.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A Eïn-Guédi, comme déjà dans le désert de Ziph, David avait refusé de porter la main sur la personne royale. Maintenant, quand un pilleur de cadavres vient se vanter d''avoir tué Saül, David le fait immédiatement châtier. Cette loyauté envers Saül va se prolonger dans le comportement de David à l''égard des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: descendants
  - type: text
    text: ' du roi défunt. Lorsque le fils de Saül, Ish-Bosheth, ou son petit-fils Mephi-Bosheth, seront en danger, David manifestera le même respect pour l''ancienne maison royale, fût-elle tombée en disgrâce.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Sept ans d'incertitudes
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après le désastre de Guilboa, la situation du pays était redevenue précaire. Toute l''œuvre de Saül se trouvait compromise par un fort risque d''éclatement de la petite fédération des tribus du Nord. A ce moment-là, deux hommes ont le réflexe prompt. C''est d''abord '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Abner
  - type: text
    text: ', cousin de Saül et général en chef de son armée, qui, sans perdre un instant, installe sur le trône un fils de Saül au curieux nom d''Ish-Bosheth (voir 2S 2.8'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ) et en déplace les quartiers en Transjordanie, au lieu-dit Les Deux Camps (Mahanaïm), sur le Yabboq.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais c''est aussi '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Akish
  - type: text
    text: ', le prince philistin de Gath, qui joue David (son allié, cf. 1S 27) contre la maison de Saül. Et voici David qui s''établit à Hébron, la cité des patriarches, également connue comme ville de refuge attribuée aux lévites et chef-lieu du clan de Caleb. Aussitôt les chefs de tout Juda viennent l''oindre comme roi (2S 2.2). Ce sera la deuxième onction de David, après le sacre privé de Beth-Léhem (1S 16.7). Cette onction sera d''ailleurs suivie d''une troisième, cette fois sur toutes les tribus d''Israël, en conclusion d''un processus d''unification mis en place par Abner. Cet homme fort de la cour d''Ish-Bosheth s''apprête en effet à trahir son petit roi falot dans l''intérêt supérieur de David et du peuple tout entier (2S 3). Car la guerre civile sévit entre les partisans des deux princes ; et le charisme, tellement manifeste chez David, fait complètement défaut à l''autre. Au demeurant, tant Abner qu''Ish-Bosheth vont connaître une fin brutale, sans que David y soit pour rien.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'De secrète qu''elle était à Beth-Léhem (1S 16), l''élection de David est maintenant devenue '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: manifeste
  - type: text
    text: .
- type: usfm
  marker: is2
  children:
  - type: text
    text: Jérusalem, Ville de David
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pendant tout ce temps-là, l''antique cité cananéenne de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Jébus
  - type: text
    text: ' était demeurée une enclave autonome à l''intérieur du territoire occupé par les clans de Juda (tout près de Benjamin) jusqu''à la conclusion, voulue par Dieu, de cette alliance unitaire qui désigne David comme souverain légitime de Juda et d''Israël.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Dès lors, il devenait évident que la capitale ne pouvait demeurer à Hébron, trop judéenne et trop au sud. Un audacieux coup de force va permettre à David de se rendre maître de Jébus-Jérusalem (2S 5.6
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '). Il sera l''œuvre de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Joab
  - type: text
    text: ', un cousin de David, qui commande l''armée.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ambitieux et résolu, Joab se porte volontaire pour exécuter le plan imaginé par David. Il s''introduit par surprise à l''intérieur de la forteresse de Jébus, sans doute en passant par le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tsinnor
  - type: text
    text: ' (2S 5.6-8 ; 1Ch 11.6 ; voir « Le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tsinnor
  - type: text
    text: '  », p.${Xtsinnor}).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le coffre sacré à Jérusalem
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La section qui s''étend de 2 Samuel 5.23 à 7.22 met successivement le lecteur en présence de trois '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: modes de communication
  - type: text
    text: ' avec YHWH. Un crescendo s''établit en effet depuis la consultation de l''éphod (5.23) jusqu''à la construction de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', c''est-à-dire le temple* (7.2), en passant par l''étape intermédiaire de l''installation du coffre de l''alliance sous un simple dais de toile (6.17).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre de Samuel fourmille d'allusions au rituel de l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: éphod
  - type: text
    text: '. Cette consultation, fort longue, consistait sans doute en une sorte de tirage au sort. Un certain nombre de jetons appelés '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ourim
  - type: text
    text: ' et '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toummim
  - type: text
    text: ' (voir Ex 28.30'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ), peut-être marqués de la première et de la dernière lettre de l'alphabet hébreu, étaient tirés de façon à donner une réponse positive, négative ou nulle (voir 1S 14.18
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ' ainsi que le v. 37 où le silence de Dieu répond à la faute de Saül ; cf. 1S 10.22 ; 21.10 ; 23.9-12 ; 30.8 et 2S 2.1 ; 5.23 ; 16.23).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On recourait volontiers à l''éphod lorsqu''il était difficile d''accéder au trône symbolique de Dieu : le coffre aux keroubim. Mais David lui préfère la présence du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Coffre
  - type: text
    text: '. Il organise tout un cérémonial liturgique et, à la tête de 30 000 hommes, ramène le Coffre de Qiriath-Yéarim, où il était relégué, à Jérusalem. L''affaire ne s''est pas déroulée sans incident (2S 6.6-9). Finalement, après trois mois d''attente, c''est à Jérusalem l''intronisation du roi véritable : non point David, mais YHWH lui-même. Les accents du psaume 24 peuvent donner une idée de la signification d''un tel événement.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le chapitre 6 fait écho à l''instruction du Deutéronome (12.1-19) sur le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: lieu
  - type: text
    text: ' choisi par Dieu pour l''établissement de sa demeure. Il prélude à l''installation définitive du temple voulu par David et construit par Salomon sur l''aire d''Aravna.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Où donc se trouvait l'aire de cet Aravna (le roi déchu de Jébus ? cf. 2S 24.23
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ') à qui David achète l''emplacement du futur autel du temple ? Très probablement au sommet de la colline où brille aujourd''hui le Dôme du Rocher. Jérusalem, en effet, recouvrira rapidement les deux sites : la Ville de David et l''emplacement du temple de Salomon, que les Chroniques n''hésitent pas à appeler mont Moriya (2Ch 3.1 ; voir Gn 22.2). Désormais, Jérusalem est la capitale spirituelle autant que politique. Elle est prête pour son destin de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: centre théologique
  - type: text
    text: ' du monde.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: 'Le Dieu qui construit la Maison : 2 Samuel 7'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A l''époque de David, aussi bien en Egypte qu''en Assyrie, l''idéologie royale associait la construction d''un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: temple
  - type: text
    text: ' à la fondation d''une dynastie. On est en droit de supposer que la conversation entre David et Nathan, le prophète de cour, se situait tout d''abord dans cette même perspective.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais dans la nuit Nathan a une vision. De la part de Dieu il reçoit un message destiné à David comme aux générations futures : Dieu se refuse à se laisser honorer, fût-ce par la construction d''un palais de cèdre, pour satisfaire la gloriole d''un jeune roi encore mal assuré dans son empire. Le temple ne peut être la chose d''une tribu (v. 7) ; Dieu s''en réserve l''initiative. Mais que David se rassure : la faveur dans laquelle le Seigneur l''a toujours tenu lui vaudra l''assurance de se trouver à la tête d''une dynastie vraiment stable. C''est elle – sa '
  - type: usfm
    marker: it
    children:
    - type: text
      text: maison
  - type: text
    text: ' – qui sera affermie pour toujours (v. 16). Le chapitre joue sans cesse sur le double sens du mot '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: maison
  - type: text
    text: ', qui n''y revient pas moins de quinze fois.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La figure idéale de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Salomon
  - type: text
    text: ' est nettement perceptible au v. 13. Il sera le descendant pacifique du trop sanglant David (cf. 1R 5.15 ; 1Ch 22.8/ / ; 28.3). C''est donc à Salomon qu''échoira l''honneur d''être le grand bâtisseur du symbole permanent de la présence de Dieu parmi son peuple. A plus long terme, les messianismes juif et chrétien s''enracineront dans ce message prophétique. Les généalogies de Jésus (Mt 1 et Lc 3) témoigneront encore, vers la fin du I'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: er
  - type: text
    text: ' siècle de notre ère, de l''importance attachée à l''appartenance de Jésus à la lignée de David (cf. Rm 1.3). Dans les évangiles, du reste, Jésus ne récuse pas le titre de « Fils de David », même s''il en discute la signification (Mc 10.47s/ / ; 12.35ss/ /).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: 'Scandale à la cour : l''affaire Bethsabée'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Jusqu''ici, l''histoire de David est marquée par une étonnante série de succès. Ouvertement, ou de manière sous-entendue, ceux-ci sont à mettre au compte de son élection : il est le roi choisi et aimé de Dieu. Que va-t-il maintenant advenir du nouveau prince de Juda et d''Israël, roi de Jérusalem, gardien du coffre sacré et fondateur de la dynastie messianique ? Dans le relâchement de la prospérité, livré à lui-même, David va sombrer dans le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: crime
  - type: text
    text: ' le plus vulgaire : un adultère accompagné d''un meurtre. Cette page ne se raconte pas ; il faut la lire. L''art du conteur y atteint à plusieurs reprises une douloureuse finesse qui témoigne aussi bien de sa sympathie pour David que de sa consternation (2S 11–12).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Mais c''est aussi, comme toujours dans la littérature prophétique, une page de théologie. La parabole judiciaire énoncée par Nathan met complètement hors de cause la jeune femme. Elle était l''unique brebis du pauvre, dont le riche, par foucade ou par bravade, s''est emparé sans réfléchir. On perçoit ensuite, dans l''étrange comportement de David à la mort de l''enfant de l''adultère, les linéaments d''une théologie du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: pardon
  - type: text
    text: ', humainement insoupçonnée. Ce pardon fera rentrer David et Bethsabée en légitimité : le jeune Salomon, leur fils puîné, est dès lors habilité à devenir un jour l''héritier de la couronne. Son second nom, Yedidia, revêt la même signification que celui de David, ce qui est un fort indice de sa destinée future (12.24-25'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les cheveux d'Absalom
- type: usfm
  marker: ip
  children:
  - type: text
    text: On aurait tort de reporter sur les dynasties orientales du premier millénaire av. J.-C. les habitudes de pensée que nous avons pu contracter, par exemple, en étudiant les rois de France. Ainsi le principe de primogéniture n'y est pas déterminant. C'est l'action de la mère, c'est la préférence du roi régnant, c'est la faveur divine qui déterminent les successions au trône. Cela laisse le champ libre aux plus ténébreuses intrigues de cour. L'histoire d'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Absalom
  - type: text
    text: ' en fait partie (chap. 13-18).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comment David a-t-il été réduit à cette extrémité : fuir Jérusalem, pleurer sur cette ville qu''il contemple depuis le mont des Oliviers (2S 15.30) ? C''est ce que le lecteur aurait peine à comprendre s''il ne se souvenait de la terrible prophétie proférée par Nathan après le meurtre d''Urie (2S 12.10-12). David usé, David désabusé, David trahi, est ici la victime apparente d''un complot ourdi par l''ambition d''une famille sacerdotale, celle d’'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Abiathar
  - type: text
    text: '. C''est elle qui tire les ficelles à la cour et favorise les menées démagogiques d''un adonis : Absalom, le troisième fils de David.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Soignant son apparence physique, prêtant l''oreille aux mécontents, promettant à ses supporters de prochaines distributions de bénéfices, Absalom pratique la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: démagogie
  - type: text
    text: ' avec un art consommé (2S 15.2ss).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A vues humaines, David est perdu. Mais l''historiographie prophétique ne rapporte ces faits que pour mieux assener la leçon de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: royauté divine
  - type: text
    text: '  : Dieu est avec David, qui survivra donc à toutes les embûches. Et le fils félon mourra d''une manière ignominieuse, pris par ses trop longs cheveux dans la ramure d''un grand arbre en la forêt transjordanienne d''Ephraïm (2S 18.6-15 ; cf. 17.21,24).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les successeurs de David ne seront pas tous à sa hauteur : l''établissement sur la terre de la monarchie divine essuiera encore bien des revers. Pourtant le règne de David et la prophétie de Nathan resteront pour toujours le noyau d''une espérance dont la portée finira par dépasser les perspectives de la royauté nationale.'
