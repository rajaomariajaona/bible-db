document_id: JHN.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus nourrit cinq mille hommes
  - type: heading
    content: Mt 14.13-21  ; Mc 6.30-44  ; Lc 9.10-17
  - type: text
    content: ' '
  - type: note
    content: 'Mt 14.13-21/ / ; 15.32-39/ /. –  sur l''autre rive  : la même expression est traduite de l''autre côté en 1.28n. –  la mer ou lac de Galilée…  : litt. la mer de Galilée de Tibériade  ; certains mss portent sur l''autre rive de la mer de Galilée, dans la région de Tibériade  ; cf. 21.1 ; Mt 4.13n.'
  - type: text
    content: 'Après cela, Jésus s''en alla sur l''autre rive de la mer de Galilée, la mer de Tibériade. '
  '10':
  - type: text
    content: 'Jésus dit : Faites installer ces gens. – Il y avait beaucoup d''herbe en ce lieu. – Ils s''installèrent donc, au nombre d''environ cinq mille hommes. '
  '11':
  - type: note
    content: 21.9-13 ; Lc 22.19. – Voir grâce.
  - type: text
    content: 'Jésus prit les pains, rendit grâce et les distribua à ceux qui étaient là ; il fit de même pour les poissons, autant qu''ils en voulurent. '
  '12':
  - type: note
    content: 'Ramassez ou recueillez, rassemblez  ; même verbe 4.36 ; 11.52. –  que rien ne se perde  : cf. v. 27,39+.'
  - type: text
    content: 'Lorsqu''ils furent rassasiés, il dit à ses disciples : Ramassez les morceaux qui restent, pour que rien ne se perde. '
  '13':
  - type: note
    content: 'douze  : cf. v. 67+.'
  - type: text
    content: Ils les ramassèrent donc ; ils remplirent douze paniers avec les morceaux des cinq pains d'orge qui restaient à ceux qui avaient mangé.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 2.11+,23. –  le Prophète 1.21+. –  qui vient dans le monde 1.9+.
  - type: text
    content: 'A la vue du signe qu''il avait produit, les gens disaient : C''est vraiment lui, le Prophète qui vient dans le monde.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'sachant 2.24. –  s''emparer de lui ou l''enlever , cf. 10.12,28n. –  roi  : cf. 1.49 ; 12.13 ; 18.33-39 ; 19.3,12,19. –  se retira  : certains mss portent s''enfuit  ; cf. v. 3+ ; Mt 14.13/ / ; Mc 1.35.'
  - type: text
    content: Jésus, sachant qu'ils allaient venir s'emparer de lui pour le faire roi, se retira de nouveau sur la montagne, seul.
  - type: heading
    content: Jésus marche sur la mer
  - type: heading
    content: Mt 14.22-33  ; Mc 6.45-52
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mt 14.22-32/ /.
  - type: text
    content: 'Le soir venu, ses disciples descendirent jusqu''à la mer. '
  '17':
  - type: note
    content: '2.12+. –  étaient déjà là  : certains mss portent les avaient surpris (ou saisis, cf. 1.5n). –  venu à eux  : cf. 14.3n,18.'
  - type: text
    content: 'Ils montèrent dans un bateau pour se rendre à Capharnaüm, sur l''autre rive de la mer. Les ténèbres étaient déjà là, et Jésus n''était pas encore venu à eux. '
  '18':
  - type: note
    content: Mt 8.24/ /.
  - type: text
    content: 'Un vent violent soufflait et la mer se soulevait. '
  '19':
  - type: note
    content: 'vingt-cinq ou trente stades  : environ cinq km, ce qui semble situer la scène au milieu du lac ; voir mesures. –  qui marche sur la mer  : cf. 21.1n  ; Es 43.16 ; Ps 77.20 ; Jb 9.8.'
  - type: text
    content: 'Après avoir ramé environ vingt-cinq ou trente stades, ils aperçoivent Jésus qui marche sur la mer et s''approche du bateau ; ils eurent peur. '
  '2':
  - type: note
    content: 2.11+,23.
  - type: text
    content: 'Une grande foule le suivait, parce qu''elle voyait les signes qu''il produisait sur les malades. '
  '20':
  - type: note
    content: 'C''est moi  : voir 4.26n  ; Mt 14.27/ /. –  n''ayez pas peur  : Mt 17.7 ; 28.10 ; Mc 5.36/ / ; Lc 5.10 ; voir crainte.'
  - type: text
    content: 'Mais il leur dit : C''est moi, n''ayez pas peur ! '
  '21':
  - type: note
    content: Cf. Ps 107.30.
  - type: text
    content: Ils voulaient donc le prendre dans le bateau ; aussitôt le bateau toucha la terre, là où ils allaient.
  - type: heading
    content: Le pain du ciel
  - type: heading
    content: Cf. Mt 14.34-36  ; Mc 6.53-56
  '22':
  - type: text
    content: ' '
  - type: note
    content: barque 21.8 ; Mc 3.9n.
  - type: text
    content: 'Le lendemain, la foule qui était restée sur l''autre rive de la mer vit qu''il n''y avait eu là qu''une seule barque et que Jésus n''était pas monté en bateau avec ses disciples, mais que ses disciples étaient partis seuls. '
  '23':
  - type: note
    content: 'V. 11+. –  barques ou bateaux (v. 22n), selon les mss. –  rendu grâce  : cf. Mt 26.27n.'
  - type: text
    content: 'Cependant d''autres barques vinrent de Tibériade, près du lieu où ils avaient mangé le pain, après que le Seigneur eut rendu grâce. '
  '24':
  - type: note
    content: 'Capharnaüm 2.12+ ; cf. 6.17. –  à la recherche de Jésus  : cf. Mc 1.37.'
  - type: text
    content: 'Quand la foule vit que ni Jésus, ni ses disciples n''étaient là, les gens montèrent eux-mêmes dans ces barques et vinrent à Capharnaüm, à la recherche de Jésus. '
  '25':
  - type: text
    content: 'Ils le trouvèrent sur l''autre rive de la mer et lui dirent : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' quand es-tu arrivé ici ?'
  '26':
  - type: text
    content: ' '
  - type: note
    content: V. 11s.
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, vous me cherchez, non parce que vous avez vu des signes, mais parce que vous avez mangé des pains et que vous avez été rassasiés. '
  '27':
  - type: note
    content: 'Œuvrez ou travaillez  : cf. v. 28ss ; 9.4 ; voir aussi 2Jn 8. –  qui se perd ou qui périt, cf. v. 12,39+. –  la nourriture qui demeure pour la vie éternelle 4.14+,32-34 ; Es 55.2. –  le Fils de l''homme 1.51+. –  vous donnera v. 32-50. –  a marqué de son sceau  : cf. 3.33n  ; 2Co 1.22 ; Ep 1.13 ; 4.30 ; Ap 7.3s.'
  - type: text
    content: 'Œuvrez, non pas en vue de la nourriture qui se perd, mais en vue de la nourriture qui demeure pour la vie éternelle, celle que le Fils de l''homme vous donnera ; car c''est lui que le Père – Dieu – a marqué de son sceau. '
  '28':
  - type: note
    content: 'accomplir les œuvres  : litt. œuvrer les œuvres (le verbe et son complément sont apparentés) ; cf. v. 27n  ; cf. 9.4.'
  - type: text
    content: 'Ils lui dirent : Que devons-nous faire pour accomplir les œuvres de Dieu ? '
  '29':
  - type: note
    content: V. 27+ ; cf. 4.34 ; 1Jn 3.23 ; cf. Ep 2.8ss.
  - type: text
    content: 'Jésus leur répondit : L''œuvre de Dieu, c''est que vous mettiez votre foi en celui qu''il a lui-même envoyé.'
  '3':
  - type: note
    content: V. 15 ; Mt 5.1+.
  - type: text
    content: 'Jésus monta sur la montagne ; là, il s''assit avec ses disciples. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'signe  : voir 2.11+,18,23n  ; Mt 16.1-4/ /. –  que nous voyions v. 36+. –  que nous te croyions ou que nous ayons foi en toi , v. 29 ; 1.7n. –  Quelle œuvre fais-tu ? Le verbe correspondant à cette expression est traduit par œuvrer v. 27ns.'
  - type: text
    content: 'Ils lui dirent alors : Quel signe produis-tu donc, toi, pour que nous voyions et que nous te croyions ? Quelle œuvre fais-tu ? '
  '31':
  - type: note
    content: 'Nos pères v. 49. –  la manne Ex 16.15 ; Nb 11.7-9 ; 21.5 ; Dt 8.3. –  Il leur donna… Ps 78.24  ; 105.40 ; Né 9.15 ; cf. Sagesse 16.20 : « Tu as distribué à ton peuple une nourriture d''anges, tu lui as procuré du ciel, sans effort de sa part, un pain tout préparé. »'
  - type: text
    content: 'Nos pères ont mangé la manne dans le désert, selon ce qui est écrit : '
  - type: text
    content: Il leur donna à manger du pain venu du ciel
  - type: text
    content: '. '
  '32':
  - type: note
    content: Amen, amen 1.51n  ; Mt 5.18n. –  Moïse 1.17+. –  le pain du ciel ou venu du ciel, comme au v. 31 ; cf. v. 41,51.
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, ce n''est pas Moïse qui vous a donné le pain du ciel, c''est mon Père qui vous donne le vrai pain du ciel ; '
  '33':
  - type: text
    content: 'car le pain de Dieu, c''est celui qui descend du ciel pour donner la vie au monde. '
  '34':
  - type: note
    content: Cf. 4.15 ; Mt 6.11/ /.
  - type: text
    content: 'Ils lui dirent : Seigneur, donne-nous toujours ce pain-là. '
  '35':
  - type: note
    content: 'C''est moi qui suis…  : cf. 4.26n  ; voir aussi 8.12 ; 10.7,9 ; 11.25 ; 14.6 ; 15.1. –  le pain de la vie v. 48,51,58. –  jamais faim / jamais soif  : cf. 4.14n (ici le terme signifie simplement jamais) ; Es 49.10 ; 55.1-3 ; Pr 9.1-6 ; Mt 5.6+/ / ; Siracide 24.21 : « Ceux qui me mangent (la Sagesse) auront encore faim, et ceux qui me boivent auront encore soif » (autrement dit, la Sagesse renouvelle le désir de la Sagesse, idée voisine quoique exprimée dans des termes apparemment opposés).'
  - type: text
    content: 'Jésus leur dit : C''est moi qui suis le pain de la vie. Celui qui vient à moi n''aura jamais faim, et celui qui met sa foi en moi n''aura jamais soif.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'V. 30,64 ; 15.24 ; 20.29 ; cf. 9.41 ; Mt 13.13. –  Vous m''avez vu  : certains mss portent vous avez vu.'
  - type: text
    content: 'Mais je vous l''ai dit : Vous m''avez vu, et vous ne croyez pas. '
  '37':
  - type: note
    content: 'ce que le Père me donne v. 29,39 ; 10.29 ; 17.2,6-9,12,24 ; 18.9 ; cf. Ac 16.14. –  viendra à moi v. 44,65 ; cf. Mt 11.28. –  je ne le chasserai jamais  : autre traduction je ne le chasserai pas  ; cf. 9.34 ; 12.31+ ; verbe apparenté en 1Jn 4.18n.'
  - type: text
    content: 'Tout ce que le Père me donne viendra à moi ; et celui qui vient à moi, je ne le chasserai jamais dehors ; '
  '38':
  - type: note
    content: 4.34+ ; 5.30.
  - type: text
    content: 'car je suis descendu du ciel pour faire, non pas ma volonté, mais la volonté de celui qui m''a envoyé. '
  '39':
  - type: note
    content: 'que je ne perde rien  : cf. v. 12+ ; 3.16+ ; 10.28s ; 17.12 ; 18.9 ; voir aussi Mt 18.14. –  que je le relève (ou que je le ressuscite) au dernier jour v. 40,44,54 ; cf. 5.28-29n  ; 11.24 ; 12.48.'
  - type: text
    content: 'Or, la volonté de celui qui m''a envoyé, c''est que je ne perde rien de tout ce qu''il m''a donné, mais que je le relève au dernier jour. '
  '4':
  - type: note
    content: 'Pâque, la fête des Juifs  : 2.13+ ; cf. 5.1n  ; Lc 22.1/ / ; voir calendrier et fêtes.'
  - type: text
    content: Or la Pâque, la fête des Juifs, était proche.
  '40':
  - type: note
    content: 'voit  : même verbe 12.45. –  vie éternelle 3.15+.'
  - type: text
    content: La volonté de mon Père, en effet, c'est que quiconque voit le Fils et met sa foi en lui ait la vie éternelle ; et moi, je le relèverai au dernier jour.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Les Juifs  : cf. 1.19n. –  maugréaient (v. 43,61) ou murmuraient (même verbe 7.32, terme apparenté en 7.12) ; cf. Ex 16.2-8 ; voir aussi Mt 20.11 ; Lc 5.30 ; Ac 6.1 ; 1Co 10.10 ; Ph 2.14 ; 1P 4.9 ; Jd 16. –  le pain descendu du ciel v. 32+.'
  - type: text
    content: 'Les Juifs maugréaient à son sujet, parce qu''il avait dit : C''est moi qui suis le pain descendu du ciel. '
  '42':
  - type: note
    content: Cf. 7.17,27,41s ; Lc 3.23+ ; Mt 13.55/ /. –  Comment peut-il dire maintenant ou, selon certains mss, comment peut-il donc dire… (litt. dit-il).
  - type: text
    content: 'Ils disaient : N''est-ce pas Jésus, le fils de Joseph, dont nous, nous connaissons le père et la mère ? Comment peut-il dire maintenant : « Je suis descendu du ciel ! »'
  '43':
  - type: text
    content: ' '
  - type: note
    content: V. 41n.
  - type: text
    content: 'Jésus leur répondit : Ne maugréez pas entre vous. '
  '44':
  - type: note
    content: Cf. 6.37+,39+ ; 12.32 ; cf. 14.6.
  - type: text
    content: 'Personne ne peut venir à moi si le Père qui m''a envoyé ne l''attire ; et moi, je le relèverai au dernier jour. '
  '45':
  - type: note
    content: Es 54.13  ; Jr 31.33s ; 1Th 4.9 ; 1Jn 2.27. –  écrit dans les Prophètes Mt 5.17n  ; Lc 18.31+.
  - type: text
    content: 'Il est écrit dans les Prophètes : Ils seront '
  - type: text
    content: tous instruits de Dieu
  - type: text
    content: '. Quiconque a entendu le Père et reçu son enseignement vient à moi. '
  '46':
  - type: note
    content: '1.18+ ; cf. 7.29 ; 9.16,33 ; 17.7. –  qui est issu  : litt. qui est.'
  - type: text
    content: Non pas que quelqu'un ait vu le Père, sinon celui qui est issu de Dieu ; lui a vu le Père.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui croit  : certains mss portent celui qui met sa foi en moi , cf. 3.15n.'
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, celui qui croit a la vie éternelle. '
  '48':
  - type: note
    content: V. 35+.
  - type: text
    content: 'C''est moi qui suis le pain de la vie. '
  '49':
  - type: note
    content: Vos pères v. 31,58 ; cf. 7.22n. –  ils sont morts v. 58 ; Nb 14.23 ; Dt 1.35 ; 1Co 10.3,5.
  - type: text
    content: 'Vos pères ont mangé la manne dans le désert, et ils sont morts. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Philippe 1.43+. –  Où achèterons-nous  : cf. 4.8.'
  - type: text
    content: 'Jésus leva les yeux et vit qu''une grande foule venait à lui ; il dit à Philippe : Où achèterons-nous des pains pour que ces gens aient à manger ? '
  '50':
  - type: note
    content: 'V. 32+. –  pour que…  : litt. pour que quelqu''un en mange et ne meure pas.'
  - type: text
    content: 'Le pain que voici, c''est celui qui descend du ciel, pour que celui qui en mange ne meure pas. '
  '51':
  - type: note
    content: 'V. 35+,58. –  de ce pain  : certains mss portent de mon pain. –  ma chair 1.14+ ; cf. Mt 26.26ss/ / ; Hé 10.5-10. Certains mss portent ma chair que je donnerai pour la vie du monde.'
  - type: text
    content: C'est moi qui suis le pain vivant descendu du ciel. Si quelqu'un mange de ce pain, il vivra pour toujours ; et le pain que, moi, je donnerai, c'est ma chair, pour la vie du monde.
  '52':
  - type: text
    content: 'Les Juifs se querellaient entre eux ; ils disaient : Comment celui-ci peut-il nous donner sa chair à manger ?'
  '53':
  - type: text
    content: ' '
  - type: note
    content: 'Fils de l''homme 1.51+. –  buvez  : cf. 4.14. –  son sang  : comparer avec Lv 17.10ss. –  vie en vous 5.26+. – Cf. Epître d''Ignace d''Antioche aux Romains 7.3 : « Je ne me plais plus à une nourriture de corruption ni aux plaisirs de cette vie ; c''est le pain de Dieu que je veux, qui est la chair de Jésus-Christ, de la race de David, et pour boisson je veux son sang, qui est l''amour incorruptible. »'
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, si vous ne mangez pas la chair du Fils de l''homme et si vous ne buvez pas son sang, vous n''avez pas de vie en vous. '
  '54':
  - type: note
    content: 'qui mange  : le verbe grec qui apparaît ici (également v. 56-58 et en 13.18 ; voir aussi en Mt 24.38 son unique autre emploi dans le N.T.) est différent de celui qui est utilisé au v. 53 ; il signifiait à l''origine mâcher et se disait surtout des animaux ; dans le grec du N.T. son usage est plus large, mais il garde sans doute un aspect plus concret que le verbe habituellement traduit par manger. –  a la vie éternelle  : cf. 3.15+ ; 5.24. –  je le relèverai… v. 39+.'
  - type: text
    content: 'Celui qui mange ma chair et qui boit mon sang a la vie éternelle, et moi, je le relèverai au dernier jour. '
  '55':
  - type: note
    content: 'vraie nourriture / vraie boisson  : autre traduction la vraie nourriture / la vraie boisson  ; certains mss portent est vraiment une nourriture / est vraiment une boisson.'
  - type: text
    content: 'Car ma chair est vraie nourriture, et mon sang est vraie boisson. '
  '56':
  - type: note
    content: demeure en moi, comme moi en lui 14.20 ; 15.4-7 ; 17.23 ; 1Jn 3.6,24.
  - type: text
    content: 'Celui qui mange ma chair et boit mon sang demeure en moi, comme moi en lui. '
  '57':
  - type: note
    content: Cf. 5.26.
  - type: text
    content: 'Comme le Père, qui est vivant, m''a envoyé, et comme moi, je vis par le Père, ainsi celui qui me mange vivra par moi. '
  '58':
  - type: note
    content: 'les pères  : certains mss portent vos pères  ; cf. v. 49.'
  - type: text
    content: 'Voici le pain descendu du ciel. Il n''est pas comme celui qu''ont mangé les pères : ils sont morts. Celui qui mange ce pain vivra pour toujours.'
  '59':
  - type: text
    content: ' '
  - type: note
    content: 2.12+.
  - type: text
    content: Voilà ce qu'il dit alors qu'il enseignait dans la synagogue, à Capharnaüm.
  - type: heading
    content: Des paroles de vie éternelle
  '6':
  - type: note
    content: 'pour le mettre à l''épreuve  : cf. 8.6 ; Mt 4.1n. –  il savait  : cf. v. 61,64+ ; 1.48 ; 2.25 ; 4.17-19,29,44 ; 16.30 ; 21.17.'
  - type: text
    content: 'Il disait cela pour le mettre à l''épreuve, car il savait, lui, ce qu''il allait faire. '
  '60':
  - type: text
    content: ' '
  - type: note
    content: l'entendre ou l'écouter  ; cf. 5.44 ; 8.23+ ; Mc 4.33.
  - type: text
    content: 'Après l''avoir entendu, beaucoup de ses disciples dirent : Cette parole est dure ; qui peut l''entendre ? '
  '61':
  - type: note
    content: 'sachant  : litt. sachant en lui-même. –  maugréaient v. 41n. –  cause de chute 16.1 ; Mt 11.6n.'
  - type: text
    content: 'Jésus, sachant que ses disciples maugréaient à ce sujet, leur dit : Est-ce là pour vous une cause de chute ? '
  '62':
  - type: note
    content: 1.15 ; 3.13+ ; 12.32 ; 17.5,24 ; cf. Ac 1.9-11. –  Fils de l'homme Mt 8.20n.
  - type: text
    content: 'Et si vous voyiez le Fils de l''homme monter où il était auparavant ? '
  '63':
  - type: note
    content: 'C''est l''Esprit qui fait vivre  : cf. 1.4,13 ; 3.5s ; 5.21+ ; 1Co 15.45 ; 2Co 3.6 ; Ga 6.8 ; 1P 3.18. –  chair / Esprit 3.6+. –  Les paroles… v. 68 ; cf. 3.34 ; 5.24 ; 15.3. – Cf. Odes de Salomon 8.8s : « Ecoutez le Verbe (ou la parole) de vérité, recueillez la connaissance du Très-Haut. Votre chair ne connaîtra rien que je vous dise, ni votre vêtement rien que je vous montre. »'
  - type: text
    content: 'C''est l''Esprit qui fait vivre. La chair ne sert de rien. Les paroles que, moi, je vous ai dites sont Esprit et sont vie. '
  '64':
  - type: note
    content: ne croient pas v. 36 ; cf. 5.38 ; 8.45 ; 10.26. –  Jésus savait 2.23-25 ; 18.4. –  qui le livrerait v. 71 ; 12.4 ; 13.11 ; 18.2,5 ; 21.20.
  - type: text
    content: 'Mais il en est parmi vous quelques-uns qui ne croient pas. Car Jésus savait depuis le commencement qui étaient ceux qui ne croyaient pas et qui était celui qui le livrerait. '
  '65':
  - type: note
    content: personne ne peut… v. 37+,44 ; cf. 14.6. –  donné par le Père 3.27+.
  - type: text
    content: 'Et il disait : C''est pourquoi je vous ai dit que personne ne peut venir à moi, si cela ne lui est donné par le Père.'
  '66':
  - type: text
    content: ' '
  - type: note
    content: 's''en retournèrent  : litt. s''en allèrent en arrière  ; la même formule est traduite par reculer en 18.6 ; cf. Lc 9.62.'
  - type: text
    content: Dès lors, beaucoup de ses disciples s'en retournèrent ; ils ne marchaient plus avec lui.
  - type: heading
    content: Cf. Mt 16.13-20  ; Mc 8.27-30  ; Lc 9.18-21
  '67':
  - type: text
    content: ' '
  - type: note
    content: aux Douze v. 70s ; 20.24. Cf. Mt 10.1ss/ /.
  - type: text
    content: 'Jésus dit donc aux Douze : Et vous, voulez-vous aussi vous en aller ? '
  '68':
  - type: note
    content: à qui irions-nous ? Lc 22.28 ; 2Tm 1.15. –  paroles de vie éternelle v. 63 ; Ac 5.20 ; cf. Dt 8.3. Par rapport à la confession de Pierre en Mt 16.16/ /, Jn insiste sur l'enseignement et la révélation apportés par Jésus.
  - type: text
    content: 'Simon Pierre lui répondit : Seigneur, à qui irions-nous ? Tu as des paroles de vie éternelle. '
  '69':
  - type: note
    content: 'nous sommes convaincus…  : litt. nous avons cru et nous avons connu (une fois pour toutes ; le temps du verbe indique habituellement le résultat permanent d''une action passée) ; autre traduction nous avons acquis la conviction et la connaissance  ; cf. 11.27n  ; 1Jn 2.3n  ; 4.16n. –  le Saint de Dieu Mc 1.24+/ / ; Ac 3.14 ; certains mss font précéder ce titre de celui de Christ (voir onction).'
  - type: text
    content: 'Nous, nous sommes convaincus, nous savons que c''est toi qui es le Saint de Dieu. '
  '7':
  - type: note
    content: 'Cf. Mc 6.37. –  deniers  : voir mesures, poids et monnaies.'
  - type: text
    content: 'Philippe lui répondit : Deux cents deniers de pains ne suffiraient pas pour que chacun en reçoive un peu. '
  '70':
  - type: note
    content: qui vous ai choisis 13.18 ; 15.16,19 ; cf. Dt 7.6-8 ; Es 41.8 ; 43.20 ; 44.2 ; 45.4 ; 65.9,15,22 ; Am 3.2 ; 7.15 ; Lc 6.13 ; Ep 1.4. –  un diable ou un adversaire, un accusateur, un calomniateur, selon les divers sens du mot grec ; cf. 8.44 ; 13.2 ; Lc 22.3 ; voir démon.
  - type: text
    content: 'Jésus leur répondit : N''est-ce pas moi qui vous ai choisis, vous, les Douze ? Pourtant l''un de vous est un diable ! '
  '71':
  - type: note
    content: 'V. 64+ ; Mt 26.14/ /. –  fils  : le terme correspondant est sous-entendu dans le texte ; voir aussi 13.2n,26 ; sur le nom Iscariote, voir Mt 10.4n.'
  - type: text
    content: Il parlait de Judas, fils de Simon Iscariote ; car c'était lui qui allait le livrer, lui, l'un des Douze !
  '8':
  - type: note
    content: 1.40+.
  - type: text
    content: 'Un de ses disciples, André, frère de Simon Pierre, lui dit : '
  '9':
  - type: note
    content: Cf. 2R 4.42-44.
  - type: text
    content: 'Il y a ici un jeune garçon qui a cinq pains d''orge et deux poissons ; mais qu''est-ce que cela pour tant de gens ? '
