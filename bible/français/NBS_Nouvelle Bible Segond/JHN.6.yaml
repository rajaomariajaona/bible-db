    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 14.13-21  ; Mc 6.30-44  ; Lc 9.10-17
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 14.13-21/ / ; 15.32-39/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur l'autre rive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la même expression est traduite '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de l''autre côté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lac '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Galilée…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la mer de Galilée de Tibériade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur l'autre rive de la mer de Galilée, dans la région de Tibériade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 21.1 ; Mt 4.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Après cela, Jésus s''en alla sur l''autre rive de la mer de Galilée, la mer de Tibériade. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus dit : Faites installer ces gens. – Il y avait beaucoup d''herbe en ce lieu. – Ils s''installèrent donc, au nombre d''environ cinq mille hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.9-13 ; Lc 22.19. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus prit les pains, rendit grâce et les distribua à ceux qui étaient là ; il fit de même pour les poissons, autant qu''ils en voulurent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramassez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: recueillez, rassemblez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe 4.36 ; 11.52. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que rien ne se perde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 27,39+.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''ils furent rassasiés, il dit à ses disciples : Ramassez les morceaux qui restent, pour que rien ne se perde. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: douze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 67+.'
      marker-yv: yv-n
    - type: text
      text: Ils les ramassèrent donc ; ils remplirent douze paniers avec les morceaux des cinq pains d'orge qui restaient à ceux qui avaient mangé.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.11+,23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui vient dans le monde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.9+.
      marker-yv: yv-n
    - type: text
      text: 'A la vue du signe qu''il avait produit, les gens disaient : C''est vraiment lui, le Prophète qui vient dans le monde.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sachant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''emparer de lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'enlever
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 10.12,28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.49 ; 12.13 ; 18.33-39 ; 19.3,12,19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se retira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'enfuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 3+ ; Mt 14.13/ / ; Mc 1.35.
      marker-yv: yv-n
    - type: text
      text: Jésus, sachant qu'ils allaient venir s'emparer de lui pour le faire roi, se retira de nouveau sur la montagne, seul.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus marche sur la mer
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 14.22-33  ; Mc 6.45-52
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 14.22-32/ /.
      marker-yv: yv-n
    - type: text
      text: 'Le soir venu, ses disciples descendirent jusqu''à la mer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étaient déjà là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les avaient surpris '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: saisis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: venu à eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',18.'
      marker-yv: yv-n
    - type: text
      text: 'Ils montèrent dans un bateau pour se rendre à Capharnaüm, sur l''autre rive de la mer. Les ténèbres étaient déjà là, et Jésus n''était pas encore venu à eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 8.24/ /.
      marker-yv: yv-n
    - type: text
      text: 'Un vent violent soufflait et la mer se soulevait. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vingt-cinq ou trente stades
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ cinq km, ce qui semble situer la scène au milieu du lac ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui marche sur la mer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 43.16 ; Ps 77.20 ; Jb 9.8.'
      marker-yv: yv-n
    - type: text
      text: 'Après avoir ramé environ vingt-cinq ou trente stades, ils aperçoivent Jésus qui marche sur la mer et s''approche du bateau ; ils eurent peur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.11+,23.
      marker-yv: yv-n
    - type: text
      text: 'Une grande foule le suivait, parce qu''elle voyait les signes qu''il produisait sur les malades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 4.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 14.27/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'ayez pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Mt 17.7 ; 28.10 ; Mc 5.36/ / ; Lc 5.10 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais il leur dit : C''est moi, n''ayez pas peur ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ps 107.30.
      marker-yv: yv-n
    - type: text
      text: Ils voulaient donc le prendre dans le bateau ; aussitôt le bateau toucha la terre, là où ils allaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pain du ciel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Cf. Mt 14.34-36  ; Mc 6.53-56
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'barque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.8 ; Mc 3.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le lendemain, la foule qui était restée sur l''autre rive de la mer vit qu''il n''y avait eu là qu''une seule barque et que Jésus n''était pas monté en bateau avec ses disciples, mais que ses disciples étaient partis seuls. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'barques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bateaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 22
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), selon les mss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rendu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 26.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Cependant d''autres barques vinrent de Tibériade, près du lieu où ils avaient mangé le pain, après que le Seigneur eut rendu grâce. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Capharnaüm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.12+ ; cf. 6.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la recherche de Jésus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mc 1.37.'
      marker-yv: yv-n
    - type: text
      text: 'Quand la foule vit que ni Jésus, ni ses disciples n''étaient là, les gens montèrent eux-mêmes dans ces barques et vinrent à Capharnaüm, à la recherche de Jésus. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils le trouvèrent sur l''autre rive de la mer et lui dirent : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rabbi,
    - type: text
      text: ' quand es-tu arrivé ici ?'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 11s.
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur répondit : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen, amen,
    - type: text
      text: ' je vous le dis, vous me cherchez, non parce que vous avez vu des signes, mais parce que vous avez mangé des pains et que vous avez été rassasiés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Œuvrez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: travaillez
      - type: usfm
        marker: ft
        children:
        - type: text
