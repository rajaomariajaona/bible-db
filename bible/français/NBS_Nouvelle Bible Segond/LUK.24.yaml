      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'L''un d''eux, nommé Cléopas, lui répondit : Es-tu le seul qui, tout en séjournant à Jérusalem, ne sache pas ce qui s''y est produit ces jours-ci ? '
  - type: usfm
    marker: v
