        text: Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.68'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.38 ; 19.11 ; Es 41.14 ; 43.14 ; 44.22ss ; voir aussi Ac 1.6 ; Hé 9.12 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.11 : « Toutes les nations sauront qu''il y a quelqu''un qui rachète et sauve Israël. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'troisième jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13+ ; cf. 2.46 ; 9.22.
    marker-yv: yv-n
  - type: text
    text: 'Nous espérions que ce serait lui qui apporterait la rédemption à Israël, mais avec tout cela, c''est aujourd''hui le troisième jour depuis que ces événements se sont produits. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
