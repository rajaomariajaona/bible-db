        text: '24.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.41 ; Mc 16.14 ; Jn 20.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que vous êtes stupides…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ô stupides et lents de '
      - type: usfm
        marker: w
        children:
