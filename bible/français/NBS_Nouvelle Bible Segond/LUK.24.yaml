  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils s'arrêtèrent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss poursuivent la question'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
