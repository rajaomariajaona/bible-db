      marker: fr
      children:
      - type: text
        text: '24.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ce qui concerne Jésus…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
