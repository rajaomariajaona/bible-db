    marker-yv: yv-n
  - type: text
    text: '– Quoi ? leur dit-il. Ils lui répondirent : Ce qui concerne Jésus le Nazaréen, qui était un prophète puissant en œuvre et en parole devant Dieu et devant tout le peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nos grands '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et nos chefs'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 23.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: livré…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.71 ; 23.24ss.'
    marker-yv: yv-n
  - type: text
    text: 'comment nos grands prêtres et nos chefs l''ont livré pour qu''il soit condamné à mort et l''ont crucifié. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nous espérions '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jr 14.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui apporterait la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: rédemption
      - type: text
        text: ' à '
