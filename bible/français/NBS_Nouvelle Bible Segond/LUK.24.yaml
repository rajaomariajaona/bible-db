      marker: fr
      children:
      - type: text
        text: '24.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 4s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vision
    - type: usfm
      marker: ft
      children:
