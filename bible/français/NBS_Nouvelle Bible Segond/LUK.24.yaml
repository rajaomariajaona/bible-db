  - type: text
    text: La résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 28.1-8  ; Mc 16.1-8  ; Jn 20.1-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
