document_id: LUK.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La résurrection de Jésus
  - type: heading
    content: Mt 28.1-8  ; Mc 16.1-8  ; Jn 20.1-13
  - type: text
    content: ' '
  - type: note
    content: Cf. 23.55. –  Le premier jour de la semaine , c.-à-d. le dimanche ; Mc 16.2n  ; Ac 20.7 ; 1Co 16.2. –  les aromates… 23.56n.
  - type: text
    content: 'Le premier jour de la semaine, elles vinrent au tombeau de grand matin, en apportant les aromates qu''elles avaient préparés. '
  '10':
  - type: note
    content: 'Marie-Madeleine 8.2. –  Jeanne 8.3. –  Marie de Jacques  : il faut probablement comprendre Marie, mère de Jacques  ; mais l''expression pourrait aussi désigner la sœur ou l''épouse ; cf. Mc 6.3 ; 15.40 ; 16.1. –  et les autres…  : cf. 23.49,55 ; la phrase pourrait aussi être coupée avant ces mots ; il faudrait lire ensuite  : et les autres, avec elles, le dirent aussi aux apôtres  ; comparer avec Mc 16.8.'
  - type: text
    content: 'C''étaient Marie-Madeleine, Jeanne, Marie de Jacques et les autres, avec elles ; elles le dirent aux apôtres ; '
  '11':
  - type: note
    content: 'Cf. v. 25,41 ; Gn 45.26 ; Mc 16.11,16 ; Ac 28.24. –  ils ne crurent pas les femmes  : litt. ils ne les crurent pas (le pronom ne peut renvoyer qu''aux femmes).'
  - type: text
    content: 'mais ces paroles leur parurent une niaiserie et ils ne crurent pas les femmes. '
  '12':
  - type: note
    content: 'Ce v. est absent dans un ms et plusieurs témoins occidentaux (voir introductions au N.T. et aux Actes des Apôtres) ; cf. Jn 20.3ss. –  En se baissant  : autre traduction en regardant attentivement  ; le même verbe est traduit par plonger ses regards en 1P 1.12. –  les bandelettes  : traduction incertaine ; on pourrait aussi traduire plus vaguement les linges  ; cf. 23.53 ; de même Jn 19.40 ; 20.5. –  s''en alla…  : cf. Jn 20.10. –  ce qui était arrivé  : cf. 2.15 ; 8.34ss ; Ac 4.21 ; 13.12.'
  - type: text
    content: Pierre cependant se leva et courut au tombeau. En se baissant il ne vit que les bandelettes qui étaient à terre ; puis il s'en alla chez lui, s'étonnant de ce qui était arrivé.
  - type: heading
    content: Sur le chemin d'Emmaüs
  - type: heading
    content: Mc 16.12-13
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ce même jour v. 1 ; cf. v. 21,33. –  deux d''entre eux  : cf. v. 9 ; Mc 16.12s. – La localisation d’ Emmaüs est incertaine ; plusieurs sites ont été proposés, en général au nord-ouest de Jérusalem , à diverses distances. –  soixante stades  : environ 11 km ; certains mss portent cent soixante stades (près de 30 km) ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Or, ce même jour, deux d''entre eux se rendaient à un village du nom d''Emmaüs, à soixante stades de Jérusalem, '
  '14':
  - type: note
    content: V. 9,22.
  - type: text
    content: 'et ils s''entretenaient de tout ce qui s''était passé. '
  '15':
  - type: note
    content: Cf. Mc 16.12 ; voir aussi Mt 18.20.
  - type: text
    content: 'Pendant qu''ils s''entretenaient et débattaient, Jésus lui-même s''approcha et fit route avec eux. '
  '16':
  - type: note
    content: Cf. v. 31,37ss ; Jn 20.14ss ; 21.4ss ; voir aussi Lc 9.45 ; 18.34 ; voir Gn 19.11 ; 2R 6.18.
  - type: text
    content: 'Mais leurs yeux étaient empêchés de le reconnaître. '
  '17':
  - type: note
    content: 'Ils s''arrêtèrent…  : certains mss poursuivent la question  : et pourquoi avez-vous l''air sombre ?  ; cf. Mt 6.16.'
  - type: text
    content: 'Il leur dit : Quels sont ces propos que vous échangez en marchant ? Ils s''arrêtèrent, l''air sombre. '
  '18':
  - type: note
    content: 'Cléopas  : cf. Jn 19.25 ( ?). –  séjournant  : le verbe grec correspondant s''applique habituellement au séjour temporaire d''un étranger ; il est traduit par s''exiler en Hé 11.9 ; cf. Ac 1.19+ ; 2.5n.'
  - type: text
    content: 'L''un d''eux, nommé Cléopas, lui répondit : Es-tu le seul qui, tout en séjournant à Jérusalem, ne sache pas ce qui s''y est produit ces jours-ci ? '
  '19':
  - type: note
    content: 'Ce qui concerne Jésus…  : cf. 22.37. –  le Nazaréen  : certains mss portent le Nazoréen  ; cf. 18.37+ ; Mt 2.23n  ; Ac 2.22. –  prophète 4.24 ; 7.16+ ; cf. Jg 6.8. –  puissant en œuvre et en parole Ac 7.22. –  devant Dieu 1.6. –  devant tout le peuple 20.26 ; cf. 18.43+.'
  - type: text
    content: '– Quoi ? leur dit-il. Ils lui répondirent : Ce qui concerne Jésus le Nazaréen, qui était un prophète puissant en œuvre et en parole devant Dieu et devant tout le peuple, '
  '2':
  - type: text
    content: 'Elles trouvèrent la pierre roulée de devant le tombeau ; '
  '20':
  - type: note
    content: 'nos grands prêtres et nos chefs  : cf. 23.13. –  livré…  : cf. 22.71 ; 23.24ss.'
  - type: text
    content: 'comment nos grands prêtres et nos chefs l''ont livré pour qu''il soit condamné à mort et l''ont crucifié. '
  '21':
  - type: note
    content: 'Nous espérions Jr 14.8. –  qui apporterait la rédemption à (ou qui délivrerait) Israël  : cf. 1.68n  ; 2.38 ; 19.11 ; Es 41.14 ; 43.14 ; 44.22ss ; voir aussi Ac 1.6 ; Hé 9.12 ; 1 Maccabées 4.11 : « Toutes les nations sauront qu''il y a quelqu''un qui rachète et sauve Israël. » –  troisième jour v. 13+ ; cf. 2.46 ; 9.22.'
  - type: text
    content: 'Nous espérions que ce serait lui qui apporterait la rédemption à Israël, mais avec tout cela, c''est aujourd''hui le troisième jour depuis que ces événements se sont produits. '
  '22':
  - type: note
    content: V. 1-11. –  stupéfiés 2.47+.
  - type: text
    content: 'Il est vrai que quelques femmes d''entre nous nous ont stupéfiés ; elles se sont rendues de bon matin au tombeau et, '
  '23':
  - type: note
    content: 'V. 4s. –  vision  : cf. 2Co 12.1. – Voir anges.'
  - type: text
    content: 'n''ayant pas trouvé son corps, elles sont venues dire qu''elles avaient eu une vision d''anges qui le disaient vivant. '
  '24':
  - type: note
    content: Cf. v. 12 ; Jn 20.3ss.
  - type: text
    content: 'Quelques-uns de ceux qui étaient avec nous sont allés au tombeau, et ils ont trouvé les choses tout comme les femmes l''avaient dit ; mais lui, ils ne l''ont pas vu. '
  '25':
  - type: note
    content: '9.41 ; Mc 16.14 ; Jn 20.27. –  Que vous êtes stupides…  : litt. ô stupides et lents de cœur à croire…  ; cf. v. 11 ; 9.45+ ; Ga 3.1. –  tout ce qu''ont dit les prophètes  : cf. v. 44 ; 18.31 ; voir aussi Jn 20.9 ; Ac 2.25s,34 ; 3.18ss ; 4.11 ; 8.30ss ; 10.43 ; 13.27,33ss,40s ; 1Co 15.3s ; 1P 1.11.'
  - type: text
    content: 'Alors il leur dit : Que vous êtes stupides ! Comme votre cœur est lent à croire tout ce qu''ont dit les prophètes ! '
  '26':
  - type: note
    content: 'Le Christ (2.11n) ne devait-il pas souffrir…  : cf. v. 44-46 ; 9.22+ ; 17.25 ; Ac 3.18 ; 17.2s ; 26.23. –  gloire  : cf. 9.26 ; 21.27 ; Ac 3.13 ; 7.2,55 ; voir aussi 14.22 ; comparer avec Jn 7.39 ; 12.16,23 ; 13.31s ; 17.1,5.'
  - type: text
    content: 'Le Christ ne devait-il pas souffrir de la sorte pour entrer dans sa gloire ? '
  '27':
  - type: note
    content: 'commençant  : cf. Ac 8.35. – (la loi de) Moïse et… les Prophètes  : cf. v. 44n  ; 16.16,29ss ; Ac 24.14 ; 26.22 ; 28.23. –  ce qui… le concernait v. 19 ; 22.37 ; voir aussi Dt 18.15,18 ; Es 53 ; Ps 22.'
  - type: text
    content: Et, commençant par Moïse et par tous les Prophètes, il leur fit l'interprétation de ce qui, dans toutes les Ecritures, le concernait.
  '28':
  - type: text
    content: 'Lorsqu''ils approchèrent du village où ils allaient, il parut vouloir aller plus loin. '
  '29':
  - type: note
    content: 'ils le pressèrent  : cf. 14.23 ; 16.16n  ; Ac 16.15. –  le jour…  : cf. 9.12n  ; Jg 19.9.'
  - type: text
    content: 'Mais ils le pressèrent, en disant : Reste avec nous, car le soir approche, le jour est déjà sur son déclin. Il entra, pour demeurer avec eux. '
  '3':
  - type: note
    content: Cf. Jn 20.2. –  du Seigneur (7.13+) Jésus Mc 16.19 ; Ac 1.21 ; 4.33 ; 8.16 ; 11.20 ; 15.11.
  - type: text
    content: 'elles entrèrent, mais elles ne trouvèrent pas le corps du Seigneur Jésus. '
  '30':
  - type: note
    content: V. 35+ ; cf. 9.16 ; 22.19 ; Jn 21.13. –  prononça la bénédiction 9.16.
  - type: text
    content: 'Une fois installé à table avec eux, il prit le pain et prononça la bénédiction ; puis il le rompit et le leur donna. '
  '31':
  - type: note
    content: Cf. v. 16 ; 2R 6.17 ; une expression très proche est employée pour décrire la fin d'une apparition en 2 Maccabées 3.34.
  - type: text
    content: 'Alors leurs yeux s''ouvrirent et ils le reconnurent ; mais il disparut de devant eux. '
  '32':
  - type: note
    content: 'Notre cœur…  : cf. Ps 39.4. –  en nous  : cette précision est absente de certains mss ; d''autres omettent les mots correspondant à lorsqu''il nous parlait. –  ouvrait…  : litt. ouvrait les Ecritures, ici au sens d’ouvrir le sens ou d’expliquer  ; même verbe v. 31,45 ; Mc 7.34 ; Ac 7.56 ; 16.14 ; 17.3 (emploi analogue).'
  - type: text
    content: 'Et ils se dirent l''un à l''autre : Notre cœur ne brûlait-il pas en nous, lorsqu''il nous parlait en chemin et nous ouvrait le sens des Ecritures ?'
  '33':
  - type: text
    content: ' '
  - type: note
    content: les Onze v. 9n  ; cf. Jn 20.19ss.
  - type: text
    content: 'Ils se levèrent à ce moment même, retournèrent à Jérusalem et trouvèrent assemblés les Onze et ceux qui étaient avec eux, '
  '34':
  - type: note
    content: 'Cf. 1Co 15.4s. –  Le Seigneur 7.13+. –  réveillé ou relevé, cf. v. 6 ; 1.69n  ; 7.14n  ; voir résurrection. –  est apparu 1.11+. –  à Simon (4.38+) : cf. 22.31s ; voir aussi Jn 21.15ss.'
  - type: text
    content: 'qui leur dirent : Le Seigneur s''est réellement réveillé, et il est apparu à Simon ! '
  '35':
  - type: note
    content: 'V. 16ss. –  en rompant le pain  : litt. à (ou par, litt. dans) la fraction (ou le partage) du pain (le substantif correspondant à fraction est dérivé du verbe traduit par rompre au v. 30) ; Ac 2.42,46 ; 20.7,11 ; 27.35. Jérôme (voir Vg) attribue à l’Evangile des hébreux un récit d''apparition à Jacques, qui aurait juré de ne plus manger depuis le dernier repas de Jésus jusqu''au moment où il le verrait ressuscité : « Il prit le pain, le bénit, le rompit et le donna à Jacques le Juste en disant : “Mon frère, mange ton pain, puisque le Fils de l''homme est ressuscité de ceux qui dorment.” »'
  - type: text
    content: Ils racontèrent ce qui leur était arrivé en chemin, et comment il s'était fait reconnaître d'eux en rompant le pain.
  - type: heading
    content: Jésus apparaît à ses disciples
  - type: heading
    content: Jn 20.19-23
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Mc 16.14 ; 1Co 15.5. –  Comme…  : cf. v. 15. –  et leur dit  : certains témoins omettent la fin du v. –  Que la paix…  : cf. 10.5 ; Jn 20.19,21,26.'
  - type: text
    content: 'Comme ils disaient cela, lui-même se présenta au milieu d''eux et leur dit : Que la paix soit avec vous ! '
  '37':
  - type: note
    content: 'Cf. v. 5. –  un esprit  : cf. Mt 14.26 ; voir aussi Hé 12.23 ; 1P 3.19.'
  - type: text
    content: 'Saisis de frayeur et de crainte, ils pensaient voir un esprit. '
  '38':
  - type: note
    content: 'des doutes  : le terme grec est traduit ailleurs par raisonnement(s) (cf. 2.35 ; 5.22 ; 6.8 ; 9.46s). –  vous viennent-ils  : litt. montent-ils dans votre cœur  ; l''expression grecque imite une formule hébraïque qui signifie venir à l''esprit dans l''A.T. ; cf. Ac 7.23 ; 1Co 2.9.'
  - type: text
    content: 'Mais il leur dit : Pourquoi êtes-vous troublés ? Pourquoi des doutes vous viennent-ils ? '
  '39':
  - type: note
    content: 'Cf. Ac 1.3 ; comparer avec 17.32 ; 1Co 15.12. –  palpez-moi Jn 20.27 ; Ac 17.27n  ; Hé 12.18 ; 1Jn 1.1. – Cf. Epître d''Ignace d''Antioche aux Smyrniotes 3.1s : « Pour moi, je sais et je crois que même après sa résurrection il était dans la chair. Et quand il vint à Pierre et à ceux qui étaient avec lui, il leur dit : “Prenez, touchez-moi, et voyez que je ne suis pas un démon sans corps.” » (La même parole est attribuée par Origène à un apocryphe appelé « Doctrine de Pierre ».)'
  - type: text
    content: 'Regardez mes mains et mes pieds, c''est bien moi ; palpez-moi et regardez ; un esprit n''a ni chair ni os, comme vous voyez que j''en ai. '
  '4':
  - type: note
    content: 'perplexes  : cf. Mc 6.20. –  deux hommes…  : cf. v. 23 ; 2.9 ; Jn 20.12 ; Ac 1.10 ; 10.30 ; 2 Maccabées 3.26 : « Deux autres jeunes hommes apparurent à Héliodore, d''une force remarquable et d''une très grande beauté, habillés de vêtements magnifiques. » –  éclatants 9.29n.'
  - type: text
    content: 'Comme elles étaient perplexes à ce sujet, deux hommes survinrent devant elles, en habits éclatants. '
  '40':
  - type: note
    content: Certains mss omettent ce v. ; cf. Jn 20.20.
  - type: text
    content: 'Et en disant cela, il leur montra ses mains et ses pieds. '
  '41':
  - type: note
    content: 'dans leur joie (1.14+), ils ne croyaient pas encore  : cf. v. 11 ; comparer avec 22.45 ; voir aussi Jn 20.20 ; Ac 12.14. –  Avez-vous…  : cf. Jn 21.5.'
  - type: text
    content: 'Comme, dans leur joie, ils ne croyaient pas encore et qu''ils s''étonnaient, il leur dit : Avez-vous ici quelque chose à manger ? '
  '42':
  - type: note
    content: 'poisson grillé  : certains mss ajoutent et un rayon de miel  ; cf. Jn 21.9ss.'
  - type: text
    content: 'Ils lui présentèrent un morceau de poisson grillé. '
  '43':
  - type: note
    content: Cf. Ac 10.41 ; voir aussi Gn 18.8 ; 19.3.
  - type: text
    content: Il le prit et le mangea devant eux.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 26+ ; 22.37. –  s''accomplisse 1.1,20. –  écrit à mon sujet  : cf. v. 25 ; Jn 5.39,46 ; Ac 13.29. –  loi de Moïse / Prophètes v. 27+ ; cf. 2.22 ; 18.31. –  les Psaumes  : l''expression désigne peut-être ici l''ensemble des Ecrits , qui commencent par les Psaumes dans la Bible hébraïque (voir l''introduction à l''Ancien Testament, p.$) ; voir aussi 23.34n.'
  - type: text
    content: 'Puis il leur dit : C''est là ce que je vous disais lorsque j''étais encore avec vous ; il fallait que s''accomplisse tout ce qui est écrit à mon sujet dans la loi de Moïse, dans les Prophètes et dans les Psaumes. '
  '45':
  - type: note
    content: ouvrit v. 27,31,32n  ; cf. 9.45+ ; Dn 9.22 ; Ac 16.14 ; 26.17s ; voir aussi 2.23ss ; 4.10s ; 8.31ss ; 13.28s,33ss ; 26.22s ; comparer avec Jn 12.16 ; 20.9.
  - type: text
    content: 'Alors il leur ouvrit l''intelligence pour comprendre les Ecritures. '
  '46':
  - type: note
    content: 'Cf. v. 26. –  se relèverait  : cf. 9.8 ; 1Co 15.4. –  le troisième jour v. 7,21 ; 9.22+.'
  - type: text
    content: 'Et il leur dit : Ainsi il est écrit que le Christ souffrirait, qu''il se relèverait d''entre les morts le troisième jour '
  '47':
  - type: note
    content: 'le changement radical (ou la repentance, la conversion), pour (certains mss portent et) le pardon…  : cf. 3.3n  ; Ac 2.38+ ; 5.31 ; 17.30 ; voir aussi Jn 20.23. –  en son nom 9.48+. –  à toutes les nations  : l''expression peut aussi signifier à tous les non-Juifs  ; cf. 12.30n  ; Ac 14.16 ; 15.17 ; voir aussi Mt 28.19 ; Mc 16.15 ; 1Tm 3.16. –  à commencer (1.2+) par Jérusalem v. 49,52s ; cf. 9.51+ ; Ac 1.8 ; Rm 15.19.'
  - type: text
    content: 'et que le changement radical, pour le pardon des péchés, serait proclamé en son nom à toutes les nations, à commencer par Jérusalem. '
  '48':
  - type: note
    content: Cf. Ac 1.8+,21-22+ ; 5.32 ; voir aussi Jn 15.27.
  - type: text
    content: 'Vous en êtes témoins. '
  '49':
  - type: note
    content: 'j''envoie ou je vais envoyer 6.13n  ; cf. Ac 1.2. –  ce que mon Père a promis  : litt. la promesse de mon Père  ; cf. Ac 1.4ns ; 2.33 ; voir aussi Jn 14.16 ; 16.7 ; 20.22. –  puissance (1.35 ; 4.14+ ; Ac 1.8) d''en haut  : cf. Es 32.15 ; Sagesse 9.17 : « Et ta volonté, qui donc l''aurait connue, si tu n''avais donné toi-même la Sagesse et envoyé d''en haut ton saint Esprit ? »'
  - type: text
    content: Moi, j'envoie sur vous ce que mon Père a promis ; vous, restez dans la ville, jusqu'à ce que vous soyez revêtus de la puissance d'en haut.
  - type: heading
    content: Mc 16.19  ; Ac 1.4-14
  '5':
  - type: note
    content: 'craintives 1.12+. –  Pourquoi…  : cf. Mc 16.6. –  le vivant…  : cf. Ac 1.3 ; 3.15 ; 25.19 ; Rm 14.9 ; Hé 7.25 ; Ap 1.18 ; voir aussi Jos 3.10 ; Jg 8.19 ; 1S 14.39.'
  - type: text
    content: 'Toutes craintives, elles baissèrent le visage vers la terre ; mais ils leur dirent : Pourquoi cherchez-vous le vivant parmi les morts ? '
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'Béthanie 19.29+ ; cf. Ac 1.12. –  leva les mains…  : cf. Lv 9.22 ; Siracide 50.20s : « Alors il (le grand prêtre Simon) redescendait et élevait les mains sur toute l''assemblée des fils d''Israël, pour donner de ses lèvres la bénédiction du Seigneur (cf. Nb 6.23ss) et avoir l''honneur de prononcer son nom. Et pour la seconde fois tous se prosternaient pour recevoir la bénédiction de la part du Très-Haut. » –  les bénit  : cf. 2.34 ; 9.16n  ; Ac 3.25s.'
  - type: text
    content: 'Il les emmena jusque vers Béthanie, puis il leva les mains et les bénit. '
  '51':
  - type: note
    content: 'et fut enlevé au ciel  : ces mots manquent dans certains mss ; cf. Ac 1.3,9ss,22 ; voir aussi Mc 16.19 ; Jn 20.17 ; Ep 4.9.'
  - type: text
    content: Pendant qu'il les bénissait, il se sépara d'eux et fut enlevé au ciel.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'après s''être prosternés devant lui  : autre traduction après l''avoir adoré (Mt 2.2n) ; les mots correspondants manquent dans un ms. –  à Jérusalem v. 47,49 ; Ac 1.12. –  grande joie 1.14+ ; cf. Jn 14.28 ; 16.22.'
  - type: text
    content: 'Quant à eux, après s''être prosternés devant lui, ils retournèrent à Jérusalem avec une grande joie ; '
  '53':
  - type: note
    content: dans le temple 1.8s ; Ac 2.46 ; 3.1 ; 5.42. –  bénissaient Dieu 1.64 ; 2.28 ; certains mss portent louaient et bénissaient Dieu. – A la fin du livre certains mss ajoutent Amen.
  - type: text
    content: ils étaient constamment dans le temple et bénissaient Dieu.
  '6':
  - type: note
    content: Il n'est pas ici, il s'est (ou il a été) réveillé (ou relevé, cf. 7.14n) ; voir résurrection  ; ici cette phrase manque ou se présente sous une forme différente chez certains témoins du texte ; cf. v. 34 ; Ac 3.15 ; 4.10 ; 5.30 ; 10.40 ; 13.30,37.
  - type: text
    content: 'Il n''est pas ici, il s''est réveillé. Souvenez-vous de quelle manière il vous a parlé, lorsqu''il était encore en Galilée '
  '7':
  - type: note
    content: 'Cf. v. 46 ; 9.22,43ss ; 17.25 ; 18.31ss ; Ac 17.3. –  Fils de l''homme 5.24+. –  pécheurs  : litt. hommes (ou humains, gens) pécheurs  ; cf. 5.8,30,32. –  crucifié 23.21,23,33.'
  - type: text
    content: 'et qu''il disait : Il faut que le Fils de l''homme soit livré aux pécheurs, qu''il soit crucifié et qu''il se relève le troisième jour. '
  '8':
  - type: note
    content: Cf. Jn 2.22.
  - type: text
    content: Et elles se souvinrent de ses paroles.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 22s. –  raconter ou annoncer  ; cf. Jn 20.18. –  aux Onze (c.-à-d. aux Douze de 6.13+, moins Judas Iscariote) v. 33 ; Ac 1.26 ; 2.14 ; cf. Mt 28.16 ; Mc 16.14. –  tous les autres  : cf. v. 13.'
  - type: text
    content: 'Elles s''en retournèrent du tombeau pour raconter tout cela aux Onze et à tous les autres. '
