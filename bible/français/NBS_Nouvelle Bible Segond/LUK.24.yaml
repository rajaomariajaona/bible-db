    marker-yv: yv-n
  - type: text
    text: Et, commençant par Moïse et par tous les Prophètes, il leur fit l'interprétation de ce qui, dans toutes les Ecritures, le concernait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu''ils approchèrent du village où ils allaient, il parut vouloir aller plus loin. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils le pressèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.23 ; 16.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 16.15. –  '
    - type: usfm
      marker: fq
      children:
