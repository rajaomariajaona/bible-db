        text: le jour…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 19.9.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils le pressèrent, en disant : Reste avec nous, car le soir approche, le jour est déjà sur son déclin. Il entra, pour demeurer avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 35+ ; cf. 9.16 ; 22.19 ; Jn 21.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prononça la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.16.
    marker-yv: yv-n
  - type: text
    text: 'Une fois installé à table avec eux, il prit le pain et prononça la bénédiction ; puis il le rompit et le leur donna. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 16 ; 2R 6.17 ; une expression très proche est employée pour décrire la fin d''une apparition en '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 Maccabées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.34.
    marker-yv: yv-n
  - type: text
    text: 'Alors leurs yeux s''ouvrirent et ils le reconnurent ; mais il disparut de devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Notre cœur…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 39.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en nous
    - type: usfm
      marker: ft
      children:
