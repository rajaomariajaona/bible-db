        marker: w
        children:
        - type: text
          text: anges
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'n''ayant pas trouvé son corps, elles sont venues dire qu''elles avaient eu une vision d''anges qui le disaient vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 12 ; Jn 20.3ss.
    marker-yv: yv-n
  - type: text
    text: 'Quelques-uns de ceux qui étaient avec nous sont allés au tombeau, et ils ont trouvé les choses tout comme les femmes l''avaient dit ; mais lui, ils ne l''ont pas vu. '
  - type: usfm
    marker: v
    metadata:
