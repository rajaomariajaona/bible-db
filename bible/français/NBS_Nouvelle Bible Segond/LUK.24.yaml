    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cléopas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 19.25 ( ?). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: séjournant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe grec correspondant s''applique habituellement au séjour temporaire d''un étranger ; il est traduit par '
    - type: usfm
