      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 1-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'stupéfiés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.47+.
    marker-yv: yv-n
  - type: text
    text: 'Il est vrai que quelques femmes d''entre nous nous ont stupéfiés ; elles se sont rendues de bon matin au tombeau et, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
