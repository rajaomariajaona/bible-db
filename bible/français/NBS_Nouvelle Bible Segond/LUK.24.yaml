      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 23.55. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le premier jour de la semaine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. le dimanche ; Mc 16.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 20.7 ; 1Co 16.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les aromates… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.56'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour de la semaine, elles vinrent au tombeau de grand matin, en apportant les aromates qu''elles avaient préparés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles trouvèrent la pierre roulée de devant le tombeau ; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jn 20.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(7.13+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jésus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 16.19 ; Ac 1.21 ; 4.33 ; 8.16 ; 11.20 ; 15.11.
    marker-yv: yv-n
  - type: text
    text: 'elles entrèrent, mais elles ne trouvèrent pas le corps du Seigneur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: perplexes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 6.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux hommes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 23 ; 2.9 ; Jn 20.12 ; Ac 1.10 ; 10.30 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.26 : « Deux autres jeunes hommes apparurent à Héliodore, d''une force remarquable et d''une très grande beauté, habillés de vêtements magnifiques. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'éclatants '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme elles étaient perplexes à ce sujet, deux hommes survinrent devant elles, en habits éclatants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'craintives '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.12+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pourquoi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 16.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le vivant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 1.3 ; 3.15 ; 25.19 ; Rm 14.9 ; Hé 7.25 ; Ap 1.18 ; voir aussi Jos 3.10 ; Jg 8.19 ; 1S 14.39.'
    marker-yv: yv-n
  - type: text
    text: 'Toutes craintives, elles baissèrent le visage vers la terre ; mais ils leur dirent : Pourquoi cherchez-vous le vivant parmi les morts ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il n''est pas ici, il s''est '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a été
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réveillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: relevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 7.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: résurrection
      - type: text
        text: '  ; ici cette phrase manque ou se présente sous une forme différente chez certains témoins du texte ; cf. v. 34 ; Ac 3.15 ; 4.10 ; 5.30 ; 10.40 ; 13.30,37.'
    marker-yv: yv-n
  - type: text
    text: 'Il n''est pas ici, il s''est réveillé. Souvenez-vous de quelle manière il vous a parlé, lorsqu''il était encore en Galilée '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 46 ; 9.22,43ss ; 17.25 ; 18.31ss ; Ac 17.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de l''homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pécheurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: humains, gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pécheurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 5.8,30,32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'crucifié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.21,23,33.
    marker-yv: yv-n
  - type: text
    text: 'et qu''il disait : Il faut que le Fils de l''homme soit livré aux pécheurs, qu''il soit crucifié et qu''il se relève le troisième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Jn 2.22.
    marker-yv: yv-n
  - type: text
    text: Et elles se souvinrent de ses paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 22s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'raconter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: annoncer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. Jn 20.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux Onze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. aux Douze de 6.13+, moins Judas Iscariote) v. 33 ; Ac 1.26 ; 2.14 ; cf. Mt 28.16 ; Mc 16.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous les autres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 13.'
    marker-yv: yv-n
  - type: text
    text: 'Elles s''en retournèrent du tombeau pour raconter tout cela aux Onze et à tous les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Marie-Madeleine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jeanne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Marie de Jacques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il faut probablement comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Marie, mère de Jacques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais l''expression pourrait aussi désigner la sœur ou l''épouse ; cf. Mc 6.3 ; 15.40 ; 16.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les autres…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 23.49,55 ; la phrase pourrait aussi être coupée avant ces mots ; il faudrait lire ensuite'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et les autres, avec elles, le dirent aussi aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: apôtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; comparer avec Mc 16.8.'
    marker-yv: yv-n
  - type: text
    text: 'C''étaient Marie-Madeleine, Jeanne, Marie de Jacques et les autres, avec elles ; elles le dirent aux apôtres ; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 25,41 ; Gn 45.26 ; Mc 16.11,16 ; Ac 28.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils ne crurent pas les femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils ne les crurent pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le pronom ne peut renvoyer qu'aux femmes).
    marker-yv: yv-n
  - type: text
    text: 'mais ces paroles leur parurent une niaiserie et ils ne crurent pas les femmes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce v. est absent dans un ms et plusieurs témoins occidentaux (voir introductions au N.T. et aux Actes des Apôtres) ; cf. Jn 20.3ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En se baissant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en regardant attentivement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plonger ses regards '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1P 1.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les bandelettes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; on pourrait aussi traduire plus vaguement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les linges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 23.53 ; de même Jn 19.40 ; 20.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'en alla…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 20.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui était arrivé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.15 ; 8.34ss ; Ac 4.21 ; 13.12.'
    marker-yv: yv-n
  - type: text
    text: Pierre cependant se leva et courut au tombeau. En se baissant il ne vit que les bandelettes qui étaient à terre ; puis il s'en alla chez lui, s'étonnant de ce qui était arrivé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur le chemin d'Emmaüs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mc 16.12-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce même jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1 ; cf. v. 21,33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux d'entre eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 9 ; Mc 16.12s. – La localisation d’'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Emmaüs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est incertaine ; plusieurs sites ont été proposés, en général au nord-ouest de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', à diverses distances. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soixante stades
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : environ 11 km ; certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cent soixante stades '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(près de 30 km) ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Or, ce même jour, deux d''entre eux se rendaient à un village du nom d''Emmaüs, à soixante stades de Jérusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 9,22.
    marker-yv: yv-n
  - type: text
    text: 'et ils s''entretenaient de tout ce qui s''était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mc 16.12 ; voir aussi Mt 18.20.
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu''ils s''entretenaient et débattaient, Jésus lui-même s''approcha et fit route avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 31,37ss ; Jn 20.14ss ; 21.4ss ; voir aussi Lc 9.45 ; 18.34 ; voir Gn 19.11 ; 2R 6.18.
    marker-yv: yv-n
  - type: text
    text: 'Mais leurs yeux étaient empêchés de le reconnaître. '
  - type: usfm
    marker: v
