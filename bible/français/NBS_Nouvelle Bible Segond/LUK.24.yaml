    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mt 6.16.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Quels sont ces propos que vous échangez en marchant ? Ils s''arrêtèrent, l''air sombre. '
  - type: usfm
    marker: v
