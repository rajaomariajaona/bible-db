          text: cœur
      - type: text
        text: ' à croire…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 11 ; 9.45+ ; Ga 3.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout ce qu'ont dit les prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 44 ; 18.31 ; voir aussi Jn 20.9 ; Ac 2.25s,34 ; 3.18ss ; 4.11 ; 8.30ss ; 10.43 ; 13.27,33ss,40s ; 1Co 15.3s ; 1P 1.11.'
    marker-yv: yv-n
  - type: text
    text: 'Alors il leur dit : Que vous êtes stupides ! Comme votre cœur est lent à croire tout ce qu''ont dit les prophètes ! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne devait-il pas souffrir…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 44-46 ; 9.22+ ; 17.25 ; Ac 3.18 ; 17.2s ; 26.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.26 ; 21.27 ; Ac 3.13 ; 7.2,55 ; voir aussi 14.22 ; comparer avec Jn 7.39 ; 12.16,23 ; 13.31s ; 17.1,5.'
    marker-yv: yv-n
  - type: text
    text: 'Le Christ ne devait-il pas souffrir de la sorte pour entrer dans sa gloire ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commençant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 8.35. – (la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' de) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moïse et… les '
