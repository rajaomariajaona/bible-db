    - type: usfm
      marker: fq
      children:
      - type: text
        text: lorsqu'il nous parlait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ouvrait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ouvrait les Ecritures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ici au sens d’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ouvrir le sens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: expliquer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe v. 31,45 ; Mc 7.34 ; Ac 7.56 ; 16.14 ; 17.3 (emploi analogue).'
    marker-yv: yv-n
  - type: text
    text: 'Et ils se dirent l''un à l''autre : Notre cœur ne brûlait-il pas en nous, lorsqu''il nous parlait en chemin et nous ouvrait le sens des Ecritures ?'
