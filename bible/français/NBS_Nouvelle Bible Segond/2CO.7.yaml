document_id: 2CO.7,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Puisque… promesses  : cf. 2P 1.4 ; 1Jn 3.3. –  portant… à son achèvement  : le même verbe est traduit par achever en 8.6,11 ; un verbe apparenté est traduit par s''accomplir en 12.9 ; cf. Ga 3.3n. –  crainte de Dieu 5.11+.'
  - type: text
    content: Puisque nous avons de telles promesses, bien-aimés, purifions-nous de toute souillure de la chair et de l'esprit, en portant la sainteté à son achèvement dans la crainte de Dieu.
  '10':
  - type: note
    content: 'Cf. 2.7,16 ; Siracide 30.23 : « Chasse loin de toi la tristesse ; car la tristesse a causé la perte de beaucoup et l''on ne gagne rien à s''y abandonner. » 38.18 : « Du chagrin en effet peut sortir la mort et l''affliction du cœur mine les forces. »'
  - type: text
    content: 'En effet, la tristesse selon Dieu produit un changement radical qui mène au salut et que l''on ne regrette pas, tandis que la tristesse du monde produit la mort. '
  '11':
  - type: note
    content: 'Cf. v. 3s ; 2.5-11. –  juste punition  : le mot signifie aussi vengeance ou justice, cf. 10.6 ; Rm 12.19 ; 13.4. –  montré 3.1n. –  purs 11.2.'
  - type: text
    content: 'Voyez donc ce que cette même tristesse selon Dieu a produit en vous : quel empressement ! Bien plus, quelle défense, quelle indignation, quelle crainte, quelle vive affection, quelle passion jalouse, quelle juste punition ! Vous avez montré à tous égards que vous étiez purs dans cette affaire. '
  '12':
  - type: note
    content: 'L’offensé (litt. celui qui a été injustement traité  ; le même verbe a été traduit par faire du tort au v. 2 ; cf. 12.13 ; en 1Co 6.7s s''applique à un préjudice financier) est vraisemblablement Paul lui-même ou l''un de ses représentants (voir 2Co 2.5n). –  votre empressement  : cf. v. 15.'
  - type: text
    content: 'Si donc je vous ai écrit, ce n''était ni à cause de l''offenseur, ni à cause de l''offensé, mais pour rendre manifeste à vos propres yeux, devant Dieu, votre empressement pour nous. '
  '13':
  - type: note
    content: Voir esprit. –  tranquillisé 1Co 16.18.
  - type: text
    content: C'est pourquoi nous avons été encouragés.
  - type: text
    content: 'Outre cet encouragement, nous avons été beaucoup plus réjouis encore par la joie de Tite, dont l''esprit a été tranquillisé par vous tous. '
  '14':
  - type: note
    content: fierté 1.14+.
  - type: text
    content: 'Si devant lui j''ai montré quelque fierté à votre sujet, je n''ai pas eu lieu d''en avoir honte ; comme nous vous avons toujours parlé selon la vérité, ce dont nous étions fiers en présence de Tite est aussi apparu comme la vérité ; '
  '15':
  - type: note
    content: 'sa tendresse  : litt. ses entrailles, cf. 6.12n. –  votre obéissance 2.9+. –  crainte et tremblement 1Co 2.3 ; Ep 6.5 ; Ph 2.12 ; voir aussi Es 19.16 ; Ps 2.11 ; 55.6 ; cf. Ga 4.14.'
  - type: text
    content: 'et sa tendresse pour vous n''en est que plus grande, au souvenir de votre obéissance à tous, car vous l''avez accueilli avec crainte et tremblement. '
  '16':
  - type: note
    content: 'de pouvoir vous faire confiance en tout  : autres traductions de faire en tout preuve de hardiesse à votre égard ; d''être tout à fait rassuré à votre sujet, cf. 5.6n.'
  - type: text
    content: Je me réjouis de pouvoir vous faire confiance en tout.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Faites-nous une place  : cf. 6.12s ; sur le verbe correspondant, voir Mt 19.11n. –  Nous n''avons fait de tort… Ac 20.33. –  ruiné  : cf. 4.16n.'
  - type: text
    content: 'Faites-nous une place ! Nous n''avons fait de tort à personne, nous n''avons ruiné personne, nous n''avons exploité personne. '
  '3':
  - type: note
    content: 'dans notre cœur 3.2 ; 6.11 ; Ph 1.7. –  pour la mort…  : litt. pour mourir ensemble et pour vivre ensemble, cf. 2Tm 2.11n.'
  - type: text
    content: 'Ce n''est pas pour vous condamner que je dis cela, car je l''ai déjà dit : vous êtes dans notre cœur pour la mort et pour la vie. '
  '4':
  - type: note
    content: assurance 3.12+. –  fier 1.14+ ; cf. 2Th 1.4. –  encouragements 1.3n  ; cf. Phm 7. –  détresse 1.4n.
  - type: text
    content: J'ai une grande assurance à votre égard, je suis très fier de vous, je suis comblé d'encouragements, je déborde de joie au milieu de toute notre détresse.
  - type: heading
    content: Paul en Macédoine
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'arrivée en Macédoine 2.13+. –  nous n''avons pas eu…  : litt. notre chair n''a pas eu… –  pressés ou dans la détresse (terme apparenté au v. 4) 1.4n  ; cf. 4.8 ; 1Co 4.11+.'
  - type: text
    content: 'En effet, depuis notre arrivée en Macédoine, nous n''avons pas eu le moindre repos ; nous étions pressés de toute manière : luttes au dehors, craintes au dedans. '
  '6':
  - type: note
    content: Dieu, qui encourage (ou console, réconforte) les humbles 1.3s ; Es 49.13 ; cf. Ac 28.15. –  Tite 2.13+.
  - type: text
    content: 'Mais Dieu, qui encourage les humbles, nous a encouragés par l''arrivée de Tite, '
  '7':
  - type: note
    content: Cf. 1Th 3.6s.
  - type: text
    content: 'et non seulement par son arrivée, mais encore par l''encouragement qu''il avait reçu de vous : il nous a raconté votre vive affection, vos pleurs, votre passion jalouse pour moi : ma joie n''en a été que plus grande.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.1-3ns.
  - type: text
    content: 'Même si je vous ai attristés par ma lettre, je ne le regrette pas. Même si je l''ai regretté – car je vois que cette lettre vous a attristés momentanément – '
  '9':
  - type: note
    content: 'un changement radical  : terme apparenté en 12.21 (revenir de) ; cf. Rm 2.4n.'
  - type: text
    content: 'maintenant je me réjouis, non pas de ce que vous ayez été attristés, mais de ce que votre tristesse vous a portés à un changement radical ; car vous avez été attristés selon Dieu, si bien que vous n''avez subi de notre part aucun dommage. '
