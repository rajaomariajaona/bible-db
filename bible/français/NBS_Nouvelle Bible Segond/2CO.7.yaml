  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Puisque… promesses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2P 1.4 ; 1Jn 3.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portant… à son achèvement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'achever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 8.6,11 ; un verbe apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''accomplir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 12.9 ; cf. Ga 3.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.11+.
      marker-yv: yv-n
    - type: text
      text: Puisque nous avons de telles promesses, bien-aimés, purifions-nous de toute souillure de la chair et de l'esprit, en portant la sainteté à son achèvement dans la crainte de Dieu.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.7,16 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.23 : « Chasse loin de toi la tristesse ; car la tristesse a causé la perte de beaucoup et l''on ne gagne rien à s''y abandonner. » 38.18 : « Du chagrin en effet peut sortir la mort et l''affliction du cœur mine les forces. »'
      marker-yv: yv-n
    - type: text
      text: 'En effet, la tristesse selon Dieu produit un changement radical qui mène au salut et que l''on ne regrette pas, tandis que la tristesse du monde produit la mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 3s ; 2.5-11. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
        - type: text
          text: ' punition'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vengeance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 10.6 ; Rm 12.19 ; 13.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: purs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.2.
      marker-yv: yv-n
    - type: text
      text: 'Voyez donc ce que cette même tristesse selon Dieu a produit en vous : quel empressement ! Bien plus, quelle défense, quelle indignation, quelle crainte, quelle vive affection, quelle passion jalouse, quelle juste punition ! Vous avez montré à tous égards que vous étiez purs dans cette affaire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offensé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui a été injustement traité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire du tort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 2 ; cf. 12.13 ; en 1Co 6.7s s'applique à un préjudice financier) est vraisemblablement Paul lui-même ou l'un de ses représentants (voir 2Co 2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: votre empressement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 15.'
      marker-yv: yv-n
    - type: text
      text: 'Si donc je vous ai écrit, ce n''était ni à cause de l''offenseur, ni à cause de l''offensé, mais pour rendre manifeste à vos propres yeux, devant Dieu, votre empressement pour nous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tranquillisé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 16.18.
      marker-yv: yv-n
    - type: text
      text: C'est pourquoi nous avons été encouragés.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Outre cet encouragement, nous avons été beaucoup plus réjouis encore par la joie de Tite, dont l''esprit a été tranquillisé par vous tous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fierté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.14+.
      marker-yv: yv-n
    - type: text
      text: 'Si devant lui j''ai montré quelque fierté à votre sujet, je n''ai pas eu lieu d''en avoir honte ; comme nous vous avons toujours parlé selon la vérité, ce dont nous étions fiers en présence de Tite est aussi apparu comme la vérité ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa tendresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses entrailles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 6.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'votre obéissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' et tremblement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 2.3 ; Ep 6.5 ; Ph 2.12 ; voir aussi Es 19.16 ; Ps 2.11 ; 55.6 ; cf. Ga 4.14.
      marker-yv: yv-n
    - type: text
      text: 'et sa tendresse pour vous n''en est que plus grande, au souvenir de votre obéissance à tous, car vous l''avez accueilli avec crainte et tremblement. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de pouvoir vous faire confiance en tout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de faire en tout preuve de hardiesse à votre égard ; d'être tout à fait rassuré à votre sujet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je me réjouis de pouvoir vous faire confiance en tout.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Faites-nous une place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.12s ; sur le verbe correspondant, voir Mt 19.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous n''avons fait de tort… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 20.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ruiné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Faites-nous une place ! Nous n''avons fait de tort à personne, nous n''avons ruiné personne, nous n''avons exploité personne. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans notre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.2 ; 6.11 ; Ph 1.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la mort…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour mourir ensemble et pour vivre ensemble
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2Tm 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce n''est pas pour vous condamner que je dis cela, car je l''ai déjà dit : vous êtes dans notre cœur pour la mort et pour la vie. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'assurance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.14+ ; cf. 2Th 1.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'encouragements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Phm 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: J'ai une grande assurance à votre égard, je suis très fier de vous, je suis comblé d'encouragements, je déborde de joie au milieu de toute notre détresse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul en Macédoine
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'arrivée en Macédoine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous n'avons pas eu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'notre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: ' n''a pas eu… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pressés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans la détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (terme apparenté au v. 4) 1.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 4.8 ; 1Co 4.11+.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, depuis notre arrivée en Macédoine, nous n''avons pas eu le moindre repos ; nous étions pressés de toute manière : luttes au dehors, craintes au dedans. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu, qui encourage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: console, réconforte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les humbles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3s ; Es 49.13 ; cf. Ac 28.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.13+.
      marker-yv: yv-n
    - type: text
      text: 'Mais Dieu, qui encourage les humbles, nous a encouragés par l''arrivée de Tite, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1Th 3.6s.
      marker-yv: yv-n
    - type: text
      text: 'et non seulement par son arrivée, mais encore par l''encouragement qu''il avait reçu de vous : il nous a raconté votre vive affection, vos pleurs, votre passion jalouse pour moi : ma joie n''en a été que plus grande.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2.1-3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'Même si je vous ai attristés par ma lettre, je ne le regrette pas. Même si je l''ai regretté – car je vois que cette lettre vous a attristés momentanément – '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: changement
        - type: text
          text: ' radical'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme apparenté en 12.21 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: revenir de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. Rm 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'maintenant je me réjouis, non pas de ce que vous ayez été attristés, mais de ce que votre tristesse vous a portés à un changement radical ; car vous avez été attristés selon Dieu, si bien que vous n''avez subi de notre part aucun dommage. '
