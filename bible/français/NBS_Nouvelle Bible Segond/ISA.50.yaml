document_id: ISA.50,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu a les moyens de sauver son peuple
  - type: text
    content: ' '
  - type: note
    content: 'l''attestation de rupture ou de répudiation  ; cf. 49.14 ; 54.4-8 ; Dt 24.1ss ; Jr 3.8 ; Os 2.4 ; Mt 19.7. –  votre mère  : cf. 49.20-22 ; 66.7-12. –  vendus 52.3 ; Ps 44.13 ; cf. Ex 21.7. –  à cause de vos fautes  : cf. 40.2 ; 42.24. Répudiation et vente (pour l''esclavage) évoquent l''exil, conséquence de la rupture de l''alliance.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Où est l'attestation de rupture
  - type: text
    content: avec laquelle j'ai répudié votre mère ?
  - type: text
    content: Ou bien, auquel de mes créanciers vous ai-je vendus ?
  - type: text
    content: C'est à cause de vos fautes
  - type: text
    content: que vous avez été vendus
  - type: text
    content: et c'est à cause de vos transgressions
  - type: text
    content: que votre mère a été répudiée.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Voir crainte. –  en écoutant  : LXX qu''il écoute  ; cf. Ex 23.21 ; Dt 4.30. –  ténèbres / clarté 42.7 ; 49.9 ; cf. Jn 12.35. – Voir nom.'
  - type: text
    content: 'Qui parmi vous craint le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: en écoutant son serviteur ?
  - type: text
    content: Quiconque marche dans les ténèbres
  - type: text
    content: et manque de clarté,
  - type: text
    content: 'qu''il mette sa confiance dans le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: et qu'il s'appuie sur son Dieu !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'vous qui vous armez…  : litt. vous qui ceignez  ; certaines versions anciennes ont compris qui attisez. –  vous vous coucherez  : cf. 43.17.'
  - type: text
    content: Vous tous qui allumez un feu,
  - type: text
    content: vous qui vous armez de projectiles incendiaires,
  - type: text
    content: allez dans votre feu, dans la fournaise,
  - type: text
    content: avec les projectiles incendiaires que vous avez enflammés !
  - type: text
    content: C'est par ma main que cela vous est arrivé ;
  - type: text
    content: c'est pour la souffrance que vous vous coucherez !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'personne  : cf. 41.28+ ; voir aussi 65.12 ; 66.4 ; Jr 7.13 ; 35.17. –  Mon bras (ou ma main ) … trop court (e)  : cf. 37.27n  ; 59.1 ; Nb 11.23. –  Quand je rabroue… 17.13+ ; 51.20. –  la mer… 44.27 ; 51.10 ; Ex 14.26 ; Na 1.4 ; Ps 106.9. –  pourrissent  : litt. puent , cf. Ex 7.18-21.'
  - type: text
    content: 'Je suis venu : pourquoi n''y avait-il personne ?'
  - type: text
    content: 'J''ai appelé : pourquoi personne n''a-t-il répondu ?'
  - type: text
    content: Mon bras est-il donc trop court pour libérer ?
  - type: text
    content: N'ai-je pas assez de force pour délivrer ?
  - type: text
    content: Quand je rabroue la mer, je la dessèche ;
  - type: text
    content: je réduis les fleuves en désert ;
  - type: text
    content: leurs poissons pourrissent, faute d'eau,
  - type: text
    content: ils meurent de soif.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 10.21-23. –  sac  : vêtement de deuil ; cf. 58.5 ; Ap 6.12.'
  - type: text
    content: Je revêts le ciel d'obscurité
  - type: text
    content: et je fais d'un sac sa couverture.
  - type: heading
    content: Le serviteur du Seigneur
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'm''a donné…  : cf. 49.1ss. –  le langage (litt. la langue ) des disciples  : c.-à-d., sans doute, un langage à la fois approprié à celui qui est à l''écoute de Dieu (le prophète comme disciple) et approprié à ceux qui l''entendront (les disciples du prophète) ; cf. 54.13. –  soutenir  : LXX répondre à. –  épuisé 40.29. – Autre traduction … pour que je sache soutenir celui qui est épuisé ; il fait surgir une parole ; chaque matin il me fait dresser l''oreille.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' m''a donné'
  - type: text
    content: le langage des disciples,
  - type: text
    content: pour que je sache soutenir par une parole
  - type: text
    content: celui qui est épuisé ;
  - type: text
    content: chaque matin, il éveille,
  - type: text
    content: il éveille mon oreille,
  - type: text
    content: pour que j'écoute
  - type: text
    content: à la manière des disciples.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'rebellé 63.10 ; cf. Ph 2.8 ; Hé 5.8. –  je ne me suis pas dérobé  : autre traduction je n''ai pas dévié  ; cf. Ps 53.4n.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' m''a ouvert l''oreille,'
  - type: text
    content: et moi, je ne me suis pas rebellé
  - type: text
    content: et je ne me suis pas dérobé.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lm 3.30 ; Mt 5.39 ; 26.67/ / ; 27.30/ /. –  je ne me suis pas détourné  : litt. je n''ai pas caché ma face aux insultes…  ; le terme hébreu correspondant à insultes est apparenté au verbe traduit par être confus au v. 7 (cf. 30.3 ; 45.16 ; Ez 16.27n  ; 34.29 ; 36.6-7n,15).'
  - type: text
    content: J'ai livré mon dos à ceux qui me frappaient
  - type: text
    content: et mes joues à ceux qui m'arrachaient la barbe ;
  - type: text
    content: je ne me suis pas détourné
  - type: text
    content: des insultes et des crachats.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'visage / granit (ou silex , Dt 8.15n) : Jr 1.18 ; Ez 3.7-9 ; cf. Lc 9.51n.'
  - type: text
    content: 'Mais le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' m''a secouru ;'
  - type: text
    content: c'est pourquoi je n'ai pas été confus,
  - type: text
    content: c'est pourquoi j'ai rendu mon visage semblable à du granit,
  - type: text
    content: sachant que je n'aurais pas honte.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 13.18s ; Rm 8.31-34. –  justifie  : cf. 43.9n. –  proche 46.13+ ; 55.6. –  Qui s''oppose à mon droit  : litt. qui est le maître ( ba`al ) de mon droit ?'
  - type: text
    content: 'Celui qui me justifie est proche :'
  - type: text
    content: qui veut m'accuser ?
  - type: text
    content: Comparaissons ensemble !
  - type: text
    content: Qui s'oppose à mon droit ?
  - type: text
    content: Qu'il s'avance vers moi !
  '9':
  - type: text
    content: ' '
  - type: note
    content: qui me condamnera ? autre traduction qui me déclarera méchant ? même formule en 54.17 ; cf. Dt 25.1n  ; Jb 9.20n  ; voir aussi Jn 8.46. –  mites 51.8 ; Os 5.12 ; Jb 13.28.
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' viendra à mon secours :'
  - type: text
    content: qui me condamnera ?
  - type: text
    content: Ils tomberont tous en lambeaux comme un vêtement,
  - type: text
    content: les mites les dévoreront.
