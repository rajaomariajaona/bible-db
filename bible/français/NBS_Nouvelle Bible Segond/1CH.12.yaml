document_id: 1CH.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les compagnons de David à Tsiqlag
  - type: text
    content: ' '
  - type: note
    content: 'Tsiqlag  : cf. 1S 27.6n. –  retenu loin de Saül  : cf. 1S 27.1-7 ; 30.1-31.'
  - type: text
    content: 'Voici ceux qui se rendirent auprès de David à Tsiqlag, lorsqu''il était encore retenu loin de Saül, fils de Qish. Ils faisaient partie des vaillants hommes qui lui prêtèrent secours pendant la guerre. '
  '10':
  - type: text
    content: 'Ezer, le chef ; Abdias, le second ; Eliab, le troisième ; '
  '11':
  - type: note
    content: 'Mishmanna  : deux mss hébreux portent Mashmanna.'
  - type: text
    content: 'Mishmanna, le quatrième ; Jérémie, le cinquième ; '
  '12':
  - type: note
    content: 'Eliel  : quelques mss hébreux et de LXX portent Eliab.'
  - type: text
    content: 'Attaï, le sixième ; Eliel, le septième ; '
  '13':
  - type: note
    content: 'Elzabad  : des mss de LXX portent Eliazer (= Eliézer).'
  - type: text
    content: 'Yohanân, le huitième ; Elzabad, le neuvième ; '
  '14':
  - type: text
    content: 'Jérémie, le dixième ; Makbannaï, le onzième. '
  '15':
  - type: note
    content: 'valait (ou commandait, sous-entendu dans le texte) …  : litt. pour cent.'
  - type: text
    content: 'C''étaient des fils de Gad, des chefs de l''armée ; un seul, le plus petit, valait cent hommes, et le plus grand mille. '
  '16':
  - type: note
    content: 'premier mois  : l''année commence au printemps, c.-à-d. mars-avril, période où la fonte des neiges du mont Hermon provoque des crues du Jourdain ; cf. Jos 3.15.'
  - type: text
    content: Voilà ceux qui passèrent le Jourdain au premier mois, lorsqu'il débordait sur toutes ses rives, et qui mirent en fuite tous les gens des vallées, à l'orient et à l'occident.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'auprès de David…  : LXX pour porter secours à David.'
  - type: text
    content: 'Il y eut aussi des fils de Benjamin et de Juda qui se rendirent auprès de David jusque dans les endroits escarpés. '
  '18':
  - type: note
    content: 'pour la paix  : cf. 2R 10.15. –  alors qu''il n''y a pas de violence dans mes mains  : cf. Jb 16.17 ; voir aussi Es 59.6 ; Jon 3.8. –  que le Dieu de nos pères…  : cf. Ex 5.21 ; 1S 24.12-13+.'
  - type: text
    content: 'David sortit au-devant d''eux. Il leur dit : Si vous venez à moi pour la paix, afin de me secourir, mon cœur s''unira à vous ; mais si c''est pour me tromper au profit de mes adversaires, alors qu''il n''y a pas de violence dans mes mains, que le Dieu de nos pères le voie et qu''il arbitre ! '
  '19':
  - type: note
    content: 'd''un souffle  : autres traductions du Souffle, de l''Esprit  ; cf. Jg 6.34+ ; 2Ch 24.20. –  A toi, David…  : ce bref texte poétique de ralliement est l''antithèse de 2S 20.1/ / (paroles de rupture). –  celui qui te secourt  : LXX a compris ce singulier comme un collectif ceux qui te secourent. –  ton Dieu t''a secouru  : cf. Za 8.23.'
  - type: text
    content: 'Alors Amasaï, chef des trente, fut revêtu d''un souffle :'
  - type: text
    content: A toi, David, avec toi, fils de Jessé,
  - type: text
    content: paix, paix à toi !
  - type: text
    content: paix à celui qui te secourt,
  - type: text
    content: car ton Dieu t'a secouru !
  - type: text
    content: David les accueillit et les plaça parmi les chefs de la troupe armée.
  '2':
  - type: note
    content: 'lançaient des pierres  : au moyen d''une fronde ; cf. Jg 20.16. –  les frères de Saül c.-à-d. les membres du clan de Saül.'
  - type: text
    content: 'C''étaient des archers ; ils lançaient des pierres de la main droite et de la main gauche, et ils tiraient des flèches avec leur arc : ils étaient de Benjamin, parmi les frères de Saül. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'passèrent dans le camp de David  : litt. tombèrent sur David  ; de même à la fin du v. 20 et au v. 21. –  la guerre contre Saül…  : cf. 1S 29.1-11.'
  - type: text
    content: 'Des hommes de Manassé passèrent dans le camp de David, lorsqu''il vint faire la guerre contre Saül avec les Philistins. Mais ils ne furent pas en aide aux Philistins ; car, après avoir tenu conseil, les princes de la confédération des Philistins renvoyèrent David, en disant : Il repasserait du côté de Saül, son seigneur, au prix de nos têtes ! '
  '21':
  - type: note
    content: 'Tsiqlag v. 1 ; 1S 30.1. –  chefs des phratries  : autres traductions chefs de mille ; chefs des milliers ; chefs des contingents, cf. 13.1 ; Nb 1.16n  ; Jg 5.8n  ; Mi 5.1n.'
  - type: text
    content: 'Quand il retourna à Tsiqlag, voici les gens de Manassé qui passèrent dans son camp : Adnah, Yozabad, Yediaël, Michel, Yozabad, Elihou et Tsiltaï, chefs des phratries de Manassé. '
  '22':
  - type: note
    content: 'à la tête de la troupe  : on peut aussi comprendre contre les troupes (de pillards amalécites), cf. 1S 30.'
  - type: text
    content: Ils prêtèrent secours à David à la tête de la troupe armée, car ils étaient tous de vaillants guerriers, et ils furent commandants dans l'armée.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'une troupe  : autre traduction un camp  ; l''expression troupe (ou camp ) de Dieu (cf. Gn 32.3) pourrait être comprise comme un superlatif  : une troupe (ou un camp ) immense (cf. Gn 1.2n).'
  - type: text
    content: Jour après jour on arrivait auprès de David pour lui prêter secours, jusqu'à ce qu'il eût une troupe considérable, comme une troupe de Dieu.
  - type: heading
    content: Nombre des partisans de David venus à Hébron
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'des hommes armés  : litt. des têtes (ou des chefs ) des hommes armés (ou équipés , cf. Nb 31.3 ; 32.17ss ; Jos 4.13+) pour l''armée  ; au vu des chiffres qui suivent, il ne s''agit probablement pas ici des chefs mais de l''ensemble des effectifs. –  Hébron  : cf. 11.1-3 ; 2S 2.1n. –  la royauté  : cf. v. 39. –  selon l''ordre du Seigneur  : cf. 1S 15.28 ; 16.1,12 ; Ps 89.21.'
  - type: text
    content: 'Voici le nombre des hommes armés. Ils se rendirent auprès de David, à Hébron, pour lui transférer la royauté de Saül, selon l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '25':
  - type: text
    content: Fils de Juda, portant le grand bouclier et la lance, 6 800 hommes armés.
  '26':
  - type: text
    content: Des fils de Siméon, de vaillants guerriers pour l'armée, 7 100.
  '27':
  - type: text
    content: ' '
  - type: note
    content: En mentionnant successivement les lévites (v. 27), puis Ephraïm et Manassé (v. 31,32,38), les Chroniques semblent porter à treize le nombre des tribus.
  - type: text
    content: Des fils des lévites, 4 600 ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Joïada  : cf. 11.22.'
  - type: text
    content: Joïada, chef pour Aaron, et, avec lui, 3 700 ;
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Tsadoq pourrait être le prêtre souvent mentionné aux côtés de David ; cf. 2S 8.17 ; 15.24. –  sa famille  : autre traduction la maison de son père.'
  - type: text
    content: Tsadoq, jeune et vaillant guerrier, et sa famille, 22 princes.
  '3':
  - type: note
    content: 'le Guibéatite  : de Guibéa de Benjamin, aussi désignée par Guibéa de Saül  ; cf. 11.31 ; Jg 19.12n  ; 1S 11.4 ; 13.2 ; 15.34.'
  - type: text
    content: 'Le chef Ahiézer et Joas, fils de Shemaa, le Guibéatite ; Yeziel et Péleth, fils d''Azmaveth ; Beraka ; Jéhu, l''Anatotite ; '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'assuraient le service  : autre traduction montaient la garde , cf. 2R 11.5ss ; voir aussi Lv 8.35n  ; Nb 1.53n.'
  - type: text
    content: Des fils de Benjamin, frères de Saül, 3 000 ; car jusque-là la plus grande partie d'entre eux assuraient le service de la maison de Saül.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'hommes de renom  : cf. 5.24n.'
  - type: text
    content: Des fils d'Ephraïm, 20 800, de vaillants guerriers, des hommes de renom, famille par famille.
  '32':
  - type: text
    content: De la demi-tribu de Manassé, 18 000, qui furent désignés par leur nom pour venir investir David de la royauté.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'qui savaient discerner les temps  : cf. 29.30n  ; Est 1.13n.'
  - type: text
    content: Des fils d'Issacar, qui savaient discerner les temps pour savoir ce que devait faire Israël, 200 chefs et tous leurs frères sous leurs ordres.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'hommes aptes à porter les armes v. 37 ; 5.18n  ; 7.11. –  d''un cœur sans partage  : litt. pas d''un cœur et d''un cœur , c.-à-d. pas d''un cœur partagé.'
  - type: text
    content: De Zabulon, 50 000 hommes aptes à porter les armes, en ordre de bataille, avec toutes les armes, prêts à se ranger en ordre de bataille d'un cœur sans partage.
  '35':
  - type: text
    content: De Nephtali, 1 000 commandants, et avec eux 37 000 hommes avec le grand bouclier et la lance.
  '36':
  - type: text
    content: Des Danites, en ordre de bataille, 28 600.
  '37':
  - type: text
    content: D'Aser, 40 000 hommes aptes à porter les armes, en ordre de bataille.
  '38':
  - type: text
    content: 'De Transjordanie, des Rubénites, des Gadites et de la demi-tribu de Manassé, avec toutes les armes de l''armée au combat : 120 000.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'd''un même cœur ou d''un seul cœur  ; cf. Jr 32.39 ; Ez 11.19 ; 2Ch 30.12. –  royauté de David  : cf. Gn 49.8-10 ; Ps 110.3.'
  - type: text
    content: 'Tous ces hommes de guerre prêts à se ranger en ligne de bataille vinrent d''un cœur entier à Hébron pour investir David de la royauté sur tout Israël. C''est d''un même cœur que tout le reste d''Israël investit David de la royauté. '
  '4':
  - type: note
    content: 'les trente  : cf. 2S 23.8n. – Dans certaines versions, les v. 4s sont groupés sous le chiffre 4, de sorte que les v. 6-41 sont numérotés 5-40.'
  - type: text
    content: 'Yishmaya, le Gabaonite, vaillant parmi les trente et à la tête des trente ; '
  '40':
  - type: note
    content: 'mangeant et buvant  : cf. 29.22. –  leur avaient préparé des vivres  : litt. avaient préparé pour eux.'
  - type: text
    content: Ils furent là trois jours avec David, mangeant et buvant, car leurs frères leur avaient préparé des vivres.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2S 17.27-29n. –  dans la joie  : cf. 2R 11.20 ; Pr 11.10 ; 29.2.'
  - type: text
    content: 'Et même ceux qui habitaient près d''eux jusqu''à Issacar, à Zabulon et à Nephtali, apportaient de la nourriture sur des ânes, sur des chameaux, sur des mulets et sur des bœufs : de quoi manger, de la farine, des gâteaux de figues sèches et des gâteaux de raisins secs, du vin, de l''huile, du gros bétail et du petit bétail en quantité, car Israël était dans la joie.'
  '5':
  - type: note
    content: 'le Guedératite  : de Guedéra, en Juda, cf. Jos 15.36.'
  - type: text
    content: 'Jérémie ; Yahaziel ; Yohanân ; Yozabad, le Guedératite ; '
  '6':
  - type: note
    content: 'Shemaria  : hébreu Shemaryahou. –  Shephatia  : hébreu Shephatyahou  ; pour le même nom, cf. 27.16 ; 2Ch 21.2. –  le Hariphite  : d''après une lecture traditionnelle du texte hébreu et certains mss de LXX, de Hariph (cf. Né 7.24 ; 10.20) ; ou, selon une autre lecture traditionnelle, d''autres mss de LXX, Tg et Vg, le Harouphite, de Harouph.'
  - type: text
    content: 'Elouzaï ; Yerimoth ; Béalia ; Shemaria ; Shephatia, le Hariphite ; '
  '7':
  - type: note
    content: 'Coréites  : descendants de Coré, cf. 2.43.'
  - type: text
    content: 'Elqana ; Yishiya ; Azaréel ; Yoézer et Yashobéam, Coréites ; '
  '8':
  - type: text
    content: Yoéla et Zebadia, fils de Yeroham, de Guedor.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'se détachèrent  : le même verbe est traduit par séparer en 23.13 ; 25.1 ; 2Ch 25.10. –  dans les endroits escarpés (omis par LXX) : le terme correspondant est traduit par forteresse en 1S 22.4n. –  semblables à des lions  : cf. 2S 1.23. –  des gazelles  : cf. 2S 2.18.'
  - type: text
    content: 'Parmi les Gadites, de vaillants guerriers se détachèrent pour aller vers David dans les endroits escarpés du désert ; c''étaient des soldats exercés à la guerre, munis du grand bouclier et de la lance, semblables à des lions, et aussi rapides que des gazelles sur les montagnes. '
