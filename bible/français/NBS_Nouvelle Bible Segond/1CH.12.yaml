    marker-yv: yv-n
  - type: text
    text: 'Et même ceux qui habitaient près d''eux jusqu''à Issacar, à Zabulon et à Nephtali, apportaient de la nourriture sur des ânes, sur des chameaux, sur des mulets et sur des bœufs : de quoi manger, de la farine, des gâteaux de figues sèches et des gâteaux de raisins secs, du vin, de l''huile, du gros bétail et du petit bétail en quantité, car Israël était dans la joie.'
