document_id: 1CH.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les compagnons de David à Tsiqlag
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsiqlag
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 27.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: retenu loin de Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 27.1-7 ; 30.1-31.'
    marker-yv: yv-n
  - type: text
    text: 'Voici ceux qui se rendirent auprès de David à Tsiqlag, lorsqu''il était encore retenu loin de Saül, fils de Qish. Ils faisaient partie des vaillants hommes qui lui prêtèrent secours pendant la guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lançaient des pierres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au moyen d''une fronde ; cf. Jg 20.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les frères de Saül '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c.-à-d. les membres du clan de Saül.
    marker-yv: yv-n
  - type: text
    text: 'C''étaient des archers ; ils lançaient des pierres de la main droite et de la main gauche, et ils tiraient des flèches avec leur arc : ils étaient de Benjamin, parmi les frères de Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Guibéatite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : de Guibéa de Benjamin, aussi désignée par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Guibéa de Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 11.31 ; Jg 19.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 11.4 ; 13.2 ; 15.34.'
    marker-yv: yv-n
  - type: text
    text: 'Le chef Ahiézer et Joas, fils de Shemaa, le Guibéatite ; Yeziel et Péleth, fils d''Azmaveth ; Beraka ; Jéhu, l''Anatotite ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les trente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 23.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – Dans certaines versions, les v. 4s sont groupés sous le chiffre 4, de sorte que les v. 6-41 sont numérotés 5-40.
    marker-yv: yv-n
  - type: text
    text: 'Yishmaya, le Gabaonite, vaillant parmi les trente et à la tête des trente ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Guedératite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : de Guedéra, en Juda, cf. Jos 15.36.'
    marker-yv: yv-n
  - type: text
    text: 'Jérémie ; Yahaziel ; Yohanân ; Yozabad, le Guedératite ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shemaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shemaryahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shephatia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shephatyahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; pour le même nom, cf. 27.16 ; 2Ch 21.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Hariphite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après une lecture traditionnelle du texte hébreu et certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hariph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Né 7.24 ; 10.20) ; ou, selon une autre lecture traditionnelle, d''autres mss de LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Harouphite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de Harouph.'
    marker-yv: yv-n
  - type: text
    text: 'Elouzaï ; Yerimoth ; Béalia ; Shemaria ; Shephatia, le Hariphite ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Coréites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : descendants de Coré, cf. 2.43.'
    marker-yv: yv-n
  - type: text
    text: 'Elqana ; Yishiya ; Azaréel ; Yoézer et Yashobéam, Coréites ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Yoéla et Zebadia, fils de Yeroham, de Guedor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se détachèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'séparer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 23.13 ; 25.1 ; 2Ch 25.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans les endroits escarpés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(omis par LXX) : le terme correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'forteresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1S 22.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: semblables à des lions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2S 1.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des gazelles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2S 2.18.'
    marker-yv: yv-n
  - type: text
    text: 'Parmi les Gadites, de vaillants guerriers se détachèrent pour aller vers David dans les endroits escarpés du désert ; c''étaient des soldats exercés à la guerre, munis du grand bouclier et de la lance, semblables à des lions, et aussi rapides que des gazelles sur les montagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ezer, le chef ; Abdias, le second ; Eliab, le troisième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mishmanna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : deux mss hébreux portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mashmanna.
    marker-yv: yv-n
  - type: text
    text: 'Mishmanna, le quatrième ; Jérémie, le cinquième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eliel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : quelques mss hébreux et de LXX portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Eliab.
    marker-yv: yv-n
  - type: text
    text: 'Attaï, le sixième ; Eliel, le septième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elzabad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des mss de LXX portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Eliazer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(= '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Eliézer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Yohanân, le huitième ; Elzabad, le neuvième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jérémie, le dixième ; Makbannaï, le onzième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'valait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: commandait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sous-entendu dans le texte) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour cent.
    marker-yv: yv-n
  - type: text
    text: 'C''étaient des fils de Gad, des chefs de l''armée ; un seul, le plus petit, valait cent hommes, et le plus grand mille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: premier mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''année commence au printemps, c.-à-d. mars-avril, période où la fonte des neiges du mont Hermon provoque des crues du Jourdain ; cf. Jos 3.15.'
    marker-yv: yv-n
  - type: text
    text: Voilà ceux qui passèrent le Jourdain au premier mois, lorsqu'il débordait sur toutes ses rives, et qui mirent en fuite tous les gens des vallées, à l'orient et à l'occident.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: auprès de David…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour porter secours à David.
    marker-yv: yv-n
  - type: text
    text: 'Il y eut aussi des fils de Benjamin et de Juda qui se rendirent auprès de David jusque dans les endroits escarpés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 10.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: alors qu'il n'y a pas de violence dans mes mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jb 16.17 ; voir aussi Es 59.6 ; Jon 3.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que le Dieu de nos pères…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 5.21 ; 1S 24.12-13+.'
    marker-yv: yv-n
  - type: text
    text: 'David sortit au-devant d''eux. Il leur dit : Si vous venez à moi pour la paix, afin de me secourir, mon cœur s''unira à vous ; mais si c''est pour me tromper au profit de mes adversaires, alors qu''il n''y a pas de violence dans mes mains, que le Dieu de nos pères le voie et qu''il arbitre ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'un souffle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du Souffle, de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 6.34+ ; 2Ch 24.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A toi, David…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce bref texte poétique de ralliement est l''antithèse de 2S 20.1/ / (paroles de rupture). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui qui te secourt
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX a compris ce singulier comme un collectif '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux qui te secourent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ton Dieu t'a secouru
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Za 8.23.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Amasaï, chef des trente, fut revêtu d''un souffle :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toi, David, avec toi, fils de Jessé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: paix, paix à toi !
- type: usfm
  marker: q1
  children:
  - type: text
    text: paix à celui qui te secourt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ton Dieu t'a secouru !
- type: usfm
  marker: p
  children:
  - type: text
    text: David les accueillit et les plaça parmi les chefs de la troupe armée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: passèrent dans le camp de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tombèrent sur David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; de même à la fin du v. 20 et au v. 21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la guerre contre Saül…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 29.1-11.'
    marker-yv: yv-n
  - type: text
    text: 'Des hommes de Manassé passèrent dans le camp de David, lorsqu''il vint faire la guerre contre Saül avec les Philistins. Mais ils ne furent pas en aide aux Philistins ; car, après avoir tenu conseil, les princes de la confédération des Philistins renvoyèrent David, en disant : Il repasserait du côté de Saül, son seigneur, au prix de nos têtes ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
