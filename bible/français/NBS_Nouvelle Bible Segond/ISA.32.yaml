document_id: ISA.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La justice régnera enfin
  - type: text
    content: ' '
  - type: note
    content: roi / justice 9.6 ; 11.4 ; Jr 23.5s. –  princes / équité (le même terme est traduit par droit au v. 7) ; cf. v. 16 ; 1.21-27 ; 28.6.
  - type: text
    content: Alors le roi régnera pour la justice.
  - type: text
    content: Quant aux princes, ils gouverneront pour l'équité.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'un an et quelques jours  : cf. 29.1n. –  vous tremblerez  : autre traduction vous serez bouleversées  ; même verbe v. 11. –  la vendange sera achevée  : autre traduction la vendange aura disparu.'
  - type: text
    content: Dans un an et quelques jours,
  - type: text
    content: vous tremblerez, vous qui êtes confiantes ;
  - type: text
    content: car la vendange sera achevée,
  - type: text
    content: et la récolte n'arrivera pas.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'mettez un pagne sur vos reins  : litt. ceignez vos reins  ; d''autres comprennent ceignez le sac  ; cf. 3.24 ; 15.3 ; 20.2 ; 22.12 ; 37.1s ; Gn 3.7 ; Jr 4.8 ; 6.26 ; Jl 1.13n  ; Mi 1.8,11.'
  - type: text
    content: Soyez dans l'effroi, vous qui êtes satisfaites !
  - type: text
    content: Tremblez, vous qui êtes confiantes !
  - type: text
    content: Déshabillez-vous, dénudez-vous
  - type: text
    content: et mettez un pagne sur vos reins !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'en se frappant la poitrine  : litt. sur les seins  ; cf. Lc 23.48. –  champs / vignes 16.9 ; 28.1.'
  - type: text
    content: On se lamente, en se frappant la poitrine,
  - type: text
    content: sur la beauté des champs
  - type: text
    content: et la fécondité des vignes.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la terre  : litt. le sol  ; cf. Gn 2.5n. –  ronces 5.6+. –  cité en liesse 22.2+.'
  - type: text
    content: Sur la terre de mon peuple
  - type: text
    content: croissent les épines et les ronces,
  - type: text
    content: même dans toutes les maisons de gaieté
  - type: text
    content: de la cité en liesse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'palais 25.2+. –  ville… abandonnée  : cf. 24.10s. –  Ophel / Tour  : cf. Mi 4.8n  ; Né 3.26n. –  troupeaux 7.25.'
  - type: text
    content: Car le palais est délaissé,
  - type: text
    content: la ville tumultueuse est abandonnée ;
  - type: text
    content: l'Ophel et la Tour
  - type: text
    content: deviendront pour toujours des grottes ;
  - type: text
    content: ils feront la gaieté des ânes sauvages
  - type: text
    content: et la pâture des troupeaux…
  - type: heading
    content: L'œuvre de la justice sera la paix
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'un souffle  : autres traductions le Souffle ; l''Esprit  ; 11.2 ; 44.3n  ; Ez 37.9s ; Jl 3.1s. –  soit déversé  : en hébreu yé‘aré , terme qui n''apparaît qu''ici dans ce sens et qui fait assonance avec le mot rendu par forêt ( ya‘ar ). –  désert / verger / forêt 29.17+ ; cf. 35.1s,6 ; 41.18s ; 43.19s ; 51.3.'
  - type: text
    content: … jusqu'à ce qu'un souffle soit déversé sur nous d'en haut,
  - type: text
    content: que le désert se change en verger,
  - type: text
    content: et que le verger soit considéré comme une forêt.
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 1,15.
  - type: text
    content: Alors l'équité demeurera dans le désert,
  - type: text
    content: et la justice habitera dans le verger.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'justice / paix  : cf. 9.6 ; Ps 72.2s ; Jc 3.18. –  l''ouvrage  : autre traduction le service, le travail . –  tranquillité / sécurité  : cf. 30.15 ; 33.15s.'
  - type: text
    content: L'œuvre de la justice sera la paix,
  - type: text
    content: et l'ouvrage de la justice,
  - type: text
    content: la tranquillité et la sécurité pour toujours.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 28.12+ ; Jr 23.6. –  confiance  : autre traduction sécurité. –  des lieux de repos  : cf. 11.10 ; 28.12. –  tranquilles  : le même terme est traduit par satisfaites aux v. 9,11 ; de même en 33.20.'
  - type: text
    content: Mon peuple habitera dans un domaine de paix,
  - type: text
    content: dans des demeures de confiance,
  - type: text
    content: dans des lieux de repos tranquilles.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'la forêt  : sur ses divers sens symboliques, voir v. 15 ; 7.2 ; 9.17s ; 10.18s,33s ; 22.8. –  la ville v. 14. – L''ensemble du v. est construit sur un jeu d''assonances.'
  - type: text
    content: Mais la forêt sera précipitée sous la grêle
  - type: text
    content: et la ville abaissée au plus bas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: abri 16.4 ; 25.4.
  - type: text
    content: Chacun sera comme un abri contre le vent
  - type: text
    content: et une cachette contre l'averse violente,
  - type: text
    content: comme des canaux d'irrigation dans un lieu desséché,
  - type: text
    content: comme l'ombre d'un roc massif dans une terre épuisée.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux 30.18+. –  laissant aller…  : litt. déliant le pied du bœuf et de l''âne. Sur le bœuf et l''âne  ; cf. 1.3 ; voir aussi 7.25.'
  - type: text
    content: Heureux êtes-vous, vous qui semez partout le long des eaux
  - type: text
    content: laissant aller le bœuf et l'âne !
  '3':
  - type: text
    content: ' '
  - type: note
    content: '29.18+. –  ceux qui voient  : le mot hébreu correspondant est traduit par voyants en 30.10 ; cf. 29.10. –  ne seront plus hagards  : litt. ne regarderont plus. La version latine (Vg) suggère une légère modification du texte hébreu traditionnel, qui permettrait de lire ne seront plus collés.'
  - type: text
    content: Les yeux de ceux qui voient ne seront plus hagards,
  - type: text
    content: et les oreilles de ceux qui entendent seront attentives.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  comprendre  : litt. connaître . –  ceux qui balbutient 28.10s.'
  - type: text
    content: Le cœur des hommes légers sera intelligent pour comprendre,
  - type: text
    content: la langue de ceux qui balbutient parlera vite et nettement.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'fourbe  : le terme hébreu est mal connu. On peut aussi le traduire par avare (de même au v. 7), et comprendre magnanime au sens de généreux. – Cf. 5.20.'
  - type: text
    content: On ne donnera plus au fou le nom de noble,
  - type: text
    content: ni au fourbe celui de magnanime.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le fou profère… 9.16+ ; Pr 15.2. –  trame le mal  : litt. fait le mal  ; un ms de Qumrân et des versions anciennes portent médite le mal , c.-à-d. prépare des plans malfaisants. –  la profanation ou l''impiété , cf. 24.5n. –  gosier  : cf. 29.8+ ; Gn 1.20n. –  affamé / assoiffé Mt 5.6.'
  - type: text
    content: Car le fou profère la folie,
  - type: text
    content: 'et son cœur trame le mal :'
  - type: text
    content: Il se livre à la profanation
  - type: text
    content: 'et divague contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: il laisse vide le gosier de l'affamé,
  - type: text
    content: il empêche l'assoiffé de boire.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Les armes du fourbe (cf. v. 5n) : litt. le fourbe, ses instruments (hébreu kélaï kélaïw , assonance qu''on pourrait imiter en traduisant le fourbi du fourbe ) sont mauvais (ou maléfiques ) ; cf. Mi 2.1. –  affligés ou pauvres  ; cf. Ps 9.13n. –  est dans son droit  : litt. parle droit  ; cf. 29.20s.'
  - type: text
    content: Les armes du fourbe sont pernicieuses ;
  - type: text
    content: il projette des intrigues
  - type: text
    content: pour perdre les affligés par des paroles mensongères,
  - type: text
    content: même quand le déshérité est dans son droit.
  '8':
  - type: text
    content: Mais celui qui est noble fait de nobles projets
  - type: text
    content: et il s'en tient à ses nobles projets.
  - type: heading
    content: Avertissement aux femmes de Jérusalem
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Femmes 3.16-24. –  satisfaites / confiantes  : cf. v. 18 ; Am 6.1 ; voir Ps 123.4n. –  écoutez-moi  : litt. levez-vous et écoutez ma voix.'
  - type: text
    content: Femmes satisfaites,
  - type: text
    content: écoutez-moi !
  - type: text
    content: Filles confiantes,
  - type: text
    content: prêtez l'oreille à ma parole !
