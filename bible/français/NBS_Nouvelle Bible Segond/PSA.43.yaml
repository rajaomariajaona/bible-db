    - type: text
      text: 'Tu es mon Dieu, ma forteresse : pourquoi m''as-tu rejeté ?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi dois-je me traîner, l'air sombre,
  - type: usfm
    marker: q1
