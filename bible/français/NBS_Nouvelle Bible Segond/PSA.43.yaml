document_id: PSA.43,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '42.1n. –  Rends-moi justice 7.9n. –  défends ma cause 9.5+ ; 35.1n,23 ; 74.22 ; 119.154. –  Donne-moi d''échapper… 140.2. –  trompeurs / injustes  : cf. 5.7 ; 17.1 ; 34.14 ; 36.4.'
  - type: text
    content: Rends-moi justice, ô Dieu,
  - type: text
    content: défends ma cause contre une nation infidèle !
  - type: text
    content: Donne-moi d'échapper aux hommes trompeurs et injustes !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 42.10. –  mon Dieu, ma forteresse  : litt. le Dieu de ma forteresse  ; cf. 52.9n.'
  - type: text
    content: 'Tu es mon Dieu, ma forteresse : pourquoi m''as-tu rejeté ?'
  - type: text
    content: Pourquoi dois-je me traîner, l'air sombre,
  - type: text
    content: sous l'oppression de l'ennemi ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ta lumière et ta loyauté (autre traduction ta vérité ) : cf. 57.4 ; Jb 29.2ss. –  ta montagne sacrée 2.6+ ; voir saint. –  tes demeures 46.5 ; 84.2 ; 132.5n,7.'
  - type: text
    content: Envoie ta lumière et ta loyauté !
  - type: text
    content: Qu'elles me guident,
  - type: text
    content: qu'elles me conduisent à ta montagne sacrée et à tes demeures !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'vers Dieu  : hébreu ’El , cf. Gn 21.33n. Les autres occurrences du mot Dieu traduisent l''hébreu ’Elohim , cf. Gn 1.1n. –  ma joie et mon allégresse  : litt. la joie de mon allégresse. –  sur la lyre 33.2+.'
  - type: text
    content: J'irai vers l'autel de Dieu,
  - type: text
    content: vers Dieu, ma joie et mon allégresse ;
  - type: text
    content: je te célébrerai sur la lyre, ô Dieu, mon Dieu !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 42.1n,6n,12n.
  - type: text
    content: – Pourquoi être abattu,
  - type: text
    content: pourquoi gémir sur toi-même ?
  - type: text
    content: Attends Dieu !
  - type: text
    content: '– Je le célébrerai encore :'
  - type: text
    content: il est mon salut et mon Dieu.
