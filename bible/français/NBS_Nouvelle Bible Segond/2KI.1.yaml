    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Est-ce parce qu''il n''y a pas de Dieu en Israël que tu envoies consulter Baal-Zeboub, dieu d''Eqrôn ? A cause de cela, tu ne descendras pas du lit sur lequel tu es monté : tu mourras.” » '
  - type: usfm
    marker: vlbl
