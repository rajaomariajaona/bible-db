document_id: 2KI.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elie dénonce la faute d'Achazia
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.5. Cet épisode est confirmé par le texte de la stèle de Mésha, datée de la fin du IXe s. av. J.-C. Sans citer une seule fois le nom d’ Achab , le roi de Moab y évoque la figure du fils d''Omri , terme qui peut désigner l''un ou l''autre des descendants de ce roi ; à son sujet il écrit : « Il a dit lui aussi : “J''opprimerai Moab.” C''est dans mes jours qu''il a parlé ainsi. Mais j''ai triomphé de lui et de sa maison. Israël a été anéanti à jamais. » (stèle de Mésha, 6-7).'
  - type: text
    content: Après la mort d'Achab, Moab se révolta contre Israël.
  '10':
  - type: note
    content: 'Si je suis un homme de Dieu  : Elie souligne la contradiction entre le titre qui vient de lui être donné et l''ordre qui lui a été intimé. –  un feu… du ciel  : cf. 1R 18.38 ; Lc 9.54 ; Ap 11.5 ; 20.9.'
  - type: text
    content: 'Elie répondit au chef de cinquante : Si je suis un homme de Dieu, qu''un feu descende du ciel et te dévore, toi et tes cinquante hommes ! Alors un feu descendit du ciel et le dévora, lui et ses cinquante hommes.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Celui-ci dit  : cette proposition est absente de Vg et d''un ms de LXX. Les autres mss grecs portent il monta , comme au v. 9. –  ainsi parle le roi  : à la différence de celui qui l''a précédé, ce chef militaire confère à son discours un caractère plus formel.'
  - type: text
    content: 'Il lui envoya encore un autre chef de cinquante avec ses cinquante hommes. Celui-ci dit à Elie : Homme de Dieu, ainsi parle le roi : « Descends vite ! » '
  '12':
  - type: note
    content: 'leur répondit  : certains mss hébreux, LXX et Syr portent lui répondit. –  un feu (ou le feu) de Dieu  : hébreu ’esh ’Elohim, qui rappelle l''appellation ’ish ’Elohim, homme de Dieu.'
  - type: text
    content: 'Elie leur répondit : Si je suis un homme de Dieu, qu''un feu descende du ciel et te dévore, toi et tes cinquante hommes ! Alors un feu de Dieu descendit du ciel et le dévora, avec ses cinquante hommes.'
  '13':
  - type: text
    content: 'Achazia envoya encore le chef d''une troisième cinquantaine avec ses cinquante hommes. Ce troisième chef de cinquante monta ; et à son arrivée, il fléchit les genoux devant Elie et le supplia : Homme de Dieu, je te prie, que ma vie et celle de ces cinquante hommes, tes serviteurs, soient précieuses à tes yeux ! '
  '14':
  - type: text
    content: 'Le feu est descendu du ciel et a dévoré les deux premiers chefs de cinquante et leurs cinquante hommes ; mais maintenant, que ma vie soit précieuse à tes yeux ! '
  '15':
  - type: note
    content: 'Le messager du Seigneur  : le texte souligne qu''Elie obéit au messager de Dieu (voir ange) et non à ceux du roi. –  de lui  : de l''officier ou du roi ?'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Elie : Descends avec lui, n''aie pas peur de lui. Elie descendit avec lui vers le roi. '
  '16':
  - type: note
    content: Voir Baal.
  - type: text
    content: 'Il lui dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Parce que tu as envoyé des messagers pour consulter Baal-Zeboub, dieu d''Eqrôn, – est-ce parce qu''il n''y aurait pas en Israël de Dieu dont on puisse consulter la parole ? – à cause de cela, tu ne descendras pas du lit sur lequel tu es monté : tu mourras. '
  '17':
  - type: note
    content: 'Achazia…  : litt. il mourut… car il n''avait pas de fils. –  Joram  : certains mss grecs précisent son frère. –  la deuxième année de Joram, fils de Josaphat  : cette information semble contredire la notice de 3.1 qui date le début du règne de Joram d''Israël de la dix-huitième année du règne de Josaphat de Juda, à moins que nous ne soyons en présence d''un phénomène de corégence (voir « Le temps des rois »♦) : 3.1 concernerait le moment où, à la suite de l''accident de son frère, Joram d''Israël prend en main les affaires du royaume, alors que 1.17 daterait le début de son règne de la mort d''Achazia ; cf. 8.16.'
  - type: text
    content: 'Achazia mourut, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononcée par Elie. Joram devint roi à sa place, la deuxième année de Joram, fils de Josaphat, roi de Juda ; car Achazia n''avait pas de fils. '
  '18':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. – LXX place l'épisode de 3.1-3 entre 1.18 et 2.1.
  - type: text
    content: Le reste de l'histoire d'Achazia, ce qu'il a fait, cela est écrit dans le livre des chroniques des rois d'Israël.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cet épisode de la vie du roi Achazia permet d''expliquer qu''Israël ne réagit pas immédiatement à la rébellion moabite. –  le treillis  : le mot hébreu correspondant (aussi 1R 7.17ss/ /) désigne les mailles (d''un filet) en Jb 18.8 ; il s''agit peut-être ici d''une sorte de persienne ou de balustrade. –  chambre à l''étage Jg 3.20n. –  consulter  : cf. 1R 14.5n. –  Baal-Zeboub ( Maître des mouches ) : c''est sans doute une déformation caricaturale du nom Baal-Zeboul ( Baal le prince ), attesté à Ougarit  ; cf. Mt 10.25 ; 12.24 ; Mc 3.22. –  Eqrôn  : ville philistine, cf. Jos 13.3 ; 15.11,45s ; 19.43 ; Jg 1.18 ; 1S 5.10 ; 6.16s ; 7.14 ; 17.52 ; Jr 25.20 ; Am 1.8 ; 2.4 ; So 2.4 ; Za 9.5-7. Peut-être prêtait-on au Baal local un pouvoir de guérison. –  pour savoir  : sous-entendu dans le texte. –  cette blessure ou cette maladie  ; des versions anciennes portent ma blessure  ; cf. 8.8.'
  - type: text
    content: 'Or Achazia tomba par le treillis de sa chambre à l''étage, à Samarie, et il se blessa. Il envoya des messagers en leur disant : Allez consulter Baal-Zeboub, dieu d''Eqrôn, pour savoir si je survivrai à cette blessure. '
  '3':
  - type: note
    content: 'Avant que les messagers du roi n''atteignent leur but, celui du Seigneur prévient Elie ; cf. les deux messagers de 1R 19.2,5 ; voir ange. –  Tishbite 9.36 ; cf. 1R 17.1n  ; 21.17,28. –  Monte  : litt. lève-toi, monte. –  roi de Samarie  : on attendrait roi d''Israël, mais de même que le roi envoie consulter le dieu d''Eqrôn, Elie renvoie les messagers au roi de Samarie. –  pas de Dieu en Israël  : la question est déjà au centre de la polémique de 1R 18.36.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit alors à Elie, le Tishbite : Monte à la rencontre des messagers du roi de Samarie et dis-leur : N''y a-t-il pas de Dieu en Israël, que vous alliez consulter Baal-Zeboub, dieu d''Eqrôn ? '
  '4':
  - type: note
    content: 'descendras  : cf. v. 9ss. –  tu mourras  : même expression qu''en Gn 2.17n  ; voir aussi Ez 3.18 ; 18.4.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu ne descendras pas du lit sur lequel tu es monté : tu mourras. Puis Elie s''en alla.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pourquoi revenez-vous ? autre traduction qu'est-ce que cela ? Vous revenez ?
  - type: text
    content: 'Les messagers revinrent auprès d''Achazia ; celui-ci leur demanda : Pourquoi revenez-vous ? '
  '6':
  - type: note
    content: 'Un homme  : les messagers n''ont pas reconnu Elie ou feignent de ne pas le connaître. –  que tu envoies  : LXX que tu ailles.'
  - type: text
    content: 'Ils lui répondirent : Un homme est monté à notre rencontre et nous a dit : « Allez, retournez vers le roi qui vous a envoyés et dites-lui : “Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Est-ce parce qu''il n''y a pas de Dieu en Israël que tu envoies consulter Baal-Zeboub, dieu d''Eqrôn ? A cause de cela, tu ne descendras pas du lit sur lequel tu es monté : tu mourras.” » '
  '7':
  - type: note
    content: 'allure  : le mot signifie aussi règle, décision de justice, droit, équité, coutume  ; en 1R 18.28, il caractérise les agissements des prêtres invoquant le Baal selon leur règle ou leur coutume. Voir Jg 13.12n.'
  - type: text
    content: 'Achazia leur dit : Quelle allure avait l''homme qui est monté à votre rencontre et qui vous a dit ces paroles ? '
  '8':
  - type: note
    content: 'couvert d''une toison  : litt. maître (hébreu ba`al) de poil, expression que l''on peut comprendre comme la description d''un homme velu (cf. 2.23n  ; Gn 25.25n  ; 27.11n) ou vêtu d''une toison (Za 13.4 ; cf. 1R 19.13 ; 2R 2.8-14). Dans cette seconde perspective, de même qu''il ne dépendait que de Dieu en ce qui concerne la nourriture (cf. 1R 17.6,16 ; 19.5-7), Elie ne devrait pas son vêtement à l''industrie des hommes. Cf. Mc 1.6/ /. –  il avait une ceinture de cuir  : litt. ceint d''une ceinture de peau, comme les guerriers prêts au combat, Jr 1.17 ; Jb 38.3 ; 40.7.'
  - type: text
    content: 'Ils lui répondirent : C''était un homme couvert d''une toison ; il avait une ceinture de cuir autour des reins. Alors Achazia dit : C''est Elie, le Tishbite !'
  - type: heading
    content: Achazia tente de faire arrêter Elie
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'avec ses cinquante hommes  : litt. et ses cinquante , de même dans la suite ; l''importance du contingent indique la crainte qu''Elie inspire au roi. –  monta  : des mss de LXX et Syr ont ici un pluriel. –  qui était  : LXX précise qu''il s''agit d''Elie. –  la montagne  : référence au Carmel (1R 18, cf. v. 42ss) ou à l''Horeb (1R 19) ? –  Homme de Dieu  : c.-à-d. prophète  ; cf. 1R 12.22n  ; 17.18n,24 ; 20.28 (voir v. 13,22) ; Jr 35.4. L''expression se trouve à 23 reprises concernant Elisée.'
  - type: text
    content: 'Il lui envoya un chef de cinquante avec ses cinquante hommes. Celui-ci monta auprès d''Elie, qui était assis au sommet de la montagne, et il lui dit : Homme de Dieu, le roi a dit : « Descends ! » '
