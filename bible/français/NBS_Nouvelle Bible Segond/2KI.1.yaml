  - type: text
    text: 'Or Achazia tomba par le treillis de sa chambre à l''étage, à Samarie, et il se blessa. Il envoya des messagers en leur disant : Allez consulter Baal-Zeboub, dieu d''Eqrôn, pour savoir si je survivrai à cette blessure. '
