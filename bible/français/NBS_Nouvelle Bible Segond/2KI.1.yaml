  - type: text
    text: 'Il lui envoya un chef de cinquante avec ses cinquante hommes. Celui-ci monta auprès d''Elie, qui était assis au sommet de la montagne, et il lui dit : Homme de Dieu, le roi a dit : « Descends ! » '
