document_id: 1SA.27,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David se réfugie chez les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dit à son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Gn 8.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je serai… de Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 20.1-3 ; voir aussi 12.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au pays des Philistins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 21.11-16.'
      marker-yv: yv-n
    - type: text
      text: 'David se dit : Je serai un jour emporté par la main de Saül ; je n''ai rien de mieux à faire que de m''échapper en allant au pays des Philistins, afin que Saül finisse par renoncer à me chercher dans tout le territoire d''Israël ; ainsi je lui échapperai. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Où
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’al '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est généralement une négation, mais utilisée ici d''une manière inhabituelle ; on pourrait à la rigueur traduire sur le mode interrogatif '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'n''avez-vous pas fait d''incursion ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pourtant il est plus probable qu''il s''agisse ici d''une variante dialectale de l''adverbe interrogatif de lieu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’an = où
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX a traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez qui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Néguev '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne globalement la région méridionale, semi-désertique, située entre la Judée et la péninsule du Sinaï ; selon les peuplades qui y nomadisaient ou y demeuraient, on pouvait distinguer entre diverses sous-régions : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Néguev de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', attenant au territoire de la tribu de Juda ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Néguev des Yerahméélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', probablement au sud-ouest du précédent ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Néguev des Caïnites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', probablement au sud-est du Néguev de Juda. Voir 15.6 ; 30.29.'
      marker-yv: yv-n
    - type: text
      text: 'Akish disait : Où avez-vous fait aujourd''hui vos incursions ? Et David répondait : Vers le Néguev de Juda, vers le Néguev des Yerahméélites et vers le Néguev des Caïnites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La construction du v. en hébreu n''est pas très claire, en particulier à cause du double emploi du verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', car on ne sait pas exactement ce qu''est le contenu de ces déclarations. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il se disait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 15.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même au v. 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils pourraient… Ce fut là sa manière d'agir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils pourraient, en parlant, faire des rapports contre nous. Ainsi faisait David ; ce fut sa manière d'agir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa manière d''agir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa conduite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa règle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(peut-être au sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: droit qu'il s'arrogeait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 13.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout le temps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 25.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au pays des Philistins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''est pas le même que celui qui est employé au v. 1 ; il est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: champ, campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; peut-être désigne-t-il plus précisément les zones en dehors des cinq villes habituellement citées (cf. 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'David ne laissait en vie ni homme ni femme pour les amener à Gath ; il se disait : Ils pourraient parler contre nous, en disant : « Voilà ce qu''a fait David. » Ce fut là sa manière d''agir tout le temps qu''il habita au pays des Philistins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il s'est rendu tout à fait odieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon serviteur.
      marker-yv: yv-n
    - type: text
      text: 'Akish avait confiance en David ; il se disait : Il s''est rendu tout à fait odieux à Israël, son peuple ; il est donc mon homme pour toujours.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: six cents hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Akish… roi de Gath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maok
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Maaka '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1R 2.39.
      marker-yv: yv-n
    - type: text
      text: 'Alors David et les six cents hommes qui étaient avec lui passèrent chez Akish, fils de Maok, roi de Gath. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa maisonnée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses deux femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.42s.'
      marker-yv: yv-n
    - type: text
      text: 'David s''installa chez Akish à Gath, lui et ses hommes ; chacun avec sa famille, David avec ses deux femmes, Ahinoam, la Jizréélite, et Abigaïl, femme de Nabal, le Carmélite. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: On dit à Saül que David s'était enfui à Gath, et il cessa de le chercher.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'si j''ai trouvé '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: ' à tes yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si tu veux me manifester ta bienveillance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 16.22
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''une des localités '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(terme habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ville[s]
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : David se fait passer aux yeux du roi pour un être modeste qui n''exige pas de résider '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la ville royale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais en même temps il cherche à gagner en indépendance et donc en liberté.'
      marker-yv: yv-n
    - type: text
      text: 'David dit à Akish : Je t''en prie, si j''ai trouvé grâce à tes yeux, qu''on me donne dans l''une des localités de la campagne un lieu où je puisse m''installer : pourquoi m''installerais-je chez toi, dans la ville royale, moi, ton serviteur ? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsiqlag
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité située au sud de Gath, à 50 km environ au sud-ouest de Jérusalem ; cf. Jos 15.31 ; Né 11.28 ; 1Ch 12.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est pourquoi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte se situe ainsi dans la période où les royaumes de Juda et d''Israël sont séparés.'
      marker-yv: yv-n
    - type: text
      text: 'Alors, ce même jour, Akish lui donna Tsiqlag. C''est pourquoi Tsiqlag appartient aux rois de Juda jusqu''à ce jour. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le temps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le nombre des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un an '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et quatre mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' ont lu seulement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quatre mois.
      marker-yv: yv-n
    - type: text
      text: 'Le temps que David habita au pays des Philistins fut d''un an et quatre mois. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gueshourites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'habitaient le sud de la Judée ; ils sont mentionnés aussi en Jos 13.2 ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Guirzites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', installés dans la même région, ne sont pas mentionnés ailleurs ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Amalécites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient des nomades que les Israélites eurent souvent à combattre, cf. chap. 15, en particulier 15.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habitent depuis toujours…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: habitaient autrefois…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains, d''après LXX, modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'habitent le pays qui va depuis Télam, aux abords de Shour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 15.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: )
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', jusqu''à l''Egypte'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jos 15.24 ; voir aussi 1S 15.4.'
      marker-yv: yv-n
    - type: text
      text: 'David et ses hommes partaient à l''attaque et faisaient des incursions chez les Gueshourites, les Guirzites et les Amalécites, car ceux-ci habitent depuis toujours la région de Shour, jusqu''à l''Egypte. '
