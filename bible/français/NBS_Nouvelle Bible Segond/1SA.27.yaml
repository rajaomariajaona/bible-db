document_id: 1SA.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David se réfugie chez les Philistins
  - type: text
    content: ' '
  - type: note
    content: 'se dit  : litt. dit à son cœur  ; cf. Gn 8.21. –  Je serai… de Saül  : cf. 20.1-3 ; voir aussi 12.25n. –  au pays des Philistins  : cf. 21.11-16.'
  - type: text
    content: 'David se dit : Je serai un jour emporté par la main de Saül ; je n''ai rien de mieux à faire que de m''échapper en allant au pays des Philistins, afin que Saül finisse par renoncer à me chercher dans tout le territoire d''Israël ; ainsi je lui échapperai. '
  '10':
  - type: note
    content: 'Où  : le mot hébreu ’al est généralement une négation, mais utilisée ici d''une manière inhabituelle ; on pourrait à la rigueur traduire sur le mode interrogatif n''avez-vous pas fait d''incursion ? Pourtant il est plus probable qu''il s''agisse ici d''une variante dialectale de l''adverbe interrogatif de lieu ’an = où  ; LXX a traduit chez qui. – Le Néguev désigne globalement la région méridionale, semi-désertique, située entre la Judée et la péninsule du Sinaï ; selon les peuplades qui y nomadisaient ou y demeuraient, on pouvait distinguer entre diverses sous-régions : Néguev de Juda, attenant au territoire de la tribu de Juda ; Néguev des Yerahméélites, probablement au sud-ouest du précédent ; Néguev des Caïnites, probablement au sud-est du Néguev de Juda. Voir 15.6 ; 30.29.'
  - type: text
    content: 'Akish disait : Où avez-vous fait aujourd''hui vos incursions ? Et David répondait : Vers le Néguev de Juda, vers le Néguev des Yerahméélites et vers le Néguev des Caïnites. '
  '11':
  - type: note
    content: 'La construction du v. en hébreu n''est pas très claire, en particulier à cause du double emploi du verbe dire, car on ne sait pas exactement ce qu''est le contenu de ces déclarations. –  il se disait  : litt. il dit, cf. 15.32n  ; de même au v. 12. –  Ils pourraient… Ce fut là sa manière d''agir  : autre traduction ils pourraient, en parlant, faire des rapports contre nous. Ainsi faisait David ; ce fut sa manière d''agir. –  sa manière d''agir ou sa conduite  : litt. sa règle ou son droit (peut-être au sens de droit qu''il s''arrogeait  ; cf. Jg 13.12n). –  tout le temps  : litt. tous les jours, cf. 25.7. –  au pays des Philistins  : le terme traduit ici par pays n''est pas le même que celui qui est employé au v. 1 ; il est aussi traduit par champ, campagne  ; peut-être désigne-t-il plus précisément les zones en dehors des cinq villes habituellement citées (cf. 5.1n).'
  - type: text
    content: 'David ne laissait en vie ni homme ni femme pour les amener à Gath ; il se disait : Ils pourraient parler contre nous, en disant : « Voilà ce qu''a fait David. » Ce fut là sa manière d''agir tout le temps qu''il habita au pays des Philistins. '
  '12':
  - type: note
    content: 'Il s''est rendu tout à fait odieux  : cf. 13.4n. –  mon homme  : litt. mon serviteur.'
  - type: text
    content: 'Akish avait confiance en David ; il se disait : Il s''est rendu tout à fait odieux à Israël, son peuple ; il est donc mon homme pour toujours.'
  '2':
  - type: note
    content: 'six cents hommes  : cf. 22.2+. –  Akish… roi de Gath  : cf. 21.11n. –  Maok  : appelé Maaka en 1R 2.39.'
  - type: text
    content: 'Alors David et les six cents hommes qui étaient avec lui passèrent chez Akish, fils de Maok, roi de Gath. '
  '3':
  - type: note
    content: 'sa famille  : litt. sa maison ou sa maisonnée. –  ses deux femmes  : cf. 25.42s.'
  - type: text
    content: 'David s''installa chez Akish à Gath, lui et ses hommes ; chacun avec sa famille, David avec ses deux femmes, Ahinoam, la Jizréélite, et Abigaïl, femme de Nabal, le Carmélite. '
  '4':
  - type: text
    content: On dit à Saül que David s'était enfui à Gath, et il cessa de le chercher.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'si j''ai trouvé grâce à tes yeux ou si tu veux me manifester ta bienveillance  ; cf. 16.22n. –  l''une des localités (terme habituellement traduit par ville[s] ) de la campagne  : David se fait passer aux yeux du roi pour un être modeste qui n''exige pas de résider dans la ville royale , mais en même temps il cherche à gagner en indépendance et donc en liberté.'
  - type: text
    content: 'David dit à Akish : Je t''en prie, si j''ai trouvé grâce à tes yeux, qu''on me donne dans l''une des localités de la campagne un lieu où je puisse m''installer : pourquoi m''installerais-je chez toi, dans la ville royale, moi, ton serviteur ? '
  '6':
  - type: note
    content: 'Tsiqlag  : localité située au sud de Gath, à 50 km environ au sud-ouest de Jérusalem ; cf. Jos 15.31 ; Né 11.28 ; 1Ch 12.1. –  C''est pourquoi…  : le texte se situe ainsi dans la période où les royaumes de Juda et d''Israël sont séparés.'
  - type: text
    content: 'Alors, ce même jour, Akish lui donna Tsiqlag. C''est pourquoi Tsiqlag appartient aux rois de Juda jusqu''à ce jour. '
  '7':
  - type: note
    content: 'Le temps  : litt. le nombre des jours. –  un an (litt. des jours  ; cf. 1.21n) et quatre mois  : certains mss de LXX et Vg ont lu seulement quatre mois.'
  - type: text
    content: 'Le temps que David habita au pays des Philistins fut d''un an et quatre mois. '
  '8':
  - type: note
    content: 'Les Gueshourites habitaient le sud de la Judée ; ils sont mentionnés aussi en Jos 13.2 ; les Guirzites, installés dans la même région, ne sont pas mentionnés ailleurs ; les Amalécites étaient des nomades que les Israélites eurent souvent à combattre, cf. chap. 15, en particulier 15.2n. –  habitent depuis toujours…  : autre traduction habitaient autrefois…  ; certains, d''après LXX, modifient le texte hébreu traditionnel pour lire habitent le pays qui va depuis Télam, aux abords de Shour (cf. 15.7n), jusqu''à l''Egypte  ; cf. Jos 15.24 ; voir aussi 1S 15.4.'
  - type: text
    content: 'David et ses hommes partaient à l''attaque et faisaient des incursions chez les Gueshourites, les Guirzites et les Amalécites, car ceux-ci habitent depuis toujours la région de Shour, jusqu''à l''Egypte. '
  '9':
  - type: note
    content: 'mettait le pays à mal  : litt. frappait le pays, cf. 4.2n. –  il ne laissait en vie…  : voir la raison donnée au v. 11.'
  - type: text
    content: 'David mettait le pays à mal ; il ne laissait en vie ni homme ni femme ; il prenait le petit bétail et le gros bétail, les ânes, les chameaux, les vêtements, puis il s''en retournait chez Akish. '
