        - type: text
          text: contre tous les êtres de la maison de ton père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est moi qui l'ai fait se lancer contre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX, Vg et '
        - type: usfm
          marker: w
