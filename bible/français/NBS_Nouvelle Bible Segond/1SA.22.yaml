      marker-yv: yv-n
    - type: text
      text: 'De là David s''en alla à Mitspé de Moab. Il dit au roi de Moab : Permets, je te prie, à mon père et à ma mère d''émigrer chez vous, jusqu''à ce que je sache ce que Dieu fera de moi. '
