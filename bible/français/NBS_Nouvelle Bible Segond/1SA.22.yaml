          - type: text
            text: Syr
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est moi qui suis coupable au sujet de…
      marker-yv: yv-n
    - type: text
      text: 'David dit à Abiathar : J''ai bien compris, ce jour-là, que Doëg, l''Edomite, se trouvant là, ne manquerait pas de le dire à Saül. C''est moi qui ai causé la mort de toute ta famille. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Reste avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 24.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'aie pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.20+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui qui en veut à ma vie en veut aussi à ta vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certaines versions anciennes intervertissent les possessifs'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui en voudra à ta vie en voudra à ma vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui s'attaquera à toi, je le traiterai comme s'il s'était attaqué à moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. En hébreu le sens est probablement un peu différent : David affirme en fait que c''est le même ennemi qui les menace tous les deux, et que par conséquent ils ont tout intérêt à se mettre ensemble. LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: partout où je chercherai un endroit pour ma vie, j'en chercherai aussi pour la tienne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu seras bien gardé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même après la mort de David, et quand il sera en pleine disgrâce, cf. 1R 2.26s.'
      marker-yv: yv-n
    - type: text
      text: Reste avec moi, n'aie pas peur, car celui qui en veut à ma vie en veut aussi à ta vie ; près de moi tu seras bien gardé.
