document_id: 1SA.22,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David devient chef de bande
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Fuite de David : cf. 21.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adoullam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité du pays de Juda, à 25 km environ au sud-ouest de Jérusalem ; cf. Jos 15.35 ; 2S 23.13 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.38 ; voir Ps 57.1 ; 142.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute sa famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute la maison de son père.
      marker-yv: yv-n
    - type: text
      text: 'David partit de là et se réfugia dans la grotte d''Adoullam. Ses frères et toute sa famille l''apprirent et ils descendirent l''y rejoindre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a interrogé pour lui le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le chap. 21 ne mentionnait pas ce fait ; cf. 10.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.18s,37 ; 23.2-12 ; 28.6 ; 30.8 ; Nb 27.21 ; Jg 1.1 ; 20.18 ; 2S 21.1.'
      marker-yv: yv-n
    - type: text
      text: 'Ahimélek a interrogé pour lui le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il lui a donné des vivres, il lui a donné l''épée du Philistin Goliath. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et toute sa famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi fit appeler Ahimélek, fils d''Ahitoub, le prêtre, et toute sa famille, les prêtres qui étaient à Nob. Ils se rendirent tous auprès du roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit : Ecoute, je te prie, fils d''Ahitoub ! Il répondit : Oui, mon seigneur ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'conspiré… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8+.
      marker-yv: yv-n
    - type: text
      text: 'Saül lui dit : Pourquoi avez-vous conspiré contre moi, toi et le fils de Jessé ? Pourquoi lui as-tu donné du pain et une épée, et as-tu interrogé Dieu pour lui, afin qu''il se dresse contre moi et me tende une embuscade ? – Voilà pourquoi il en est ainsi en ce jour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gendre du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.20-28 ; 19.11-17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'affecté à ta garde personnelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduit une expression hébraïque peu claire, qu''on a aussi rendue par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: admis à ton conseil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chef de toute ta garde personnelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2S 23.23 ; 1Ch 11.25 ; voir aussi Es 11.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ahimélek répondit au roi : Qui donc, parmi tous les gens de ta cour, est sûr comme David, le gendre du roi, lui qui est affecté à ta garde personnelle et qui est considéré dans ta maison ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Est-ce aujourd'hui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est aujourd''hui (seulement) que j''ai commencé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En interprétant différemment l''expression traduite par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sûrement pas ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jamais ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: profanation à moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), certains traduisent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce jour-là j''ai commis une profanation en interrogeant Dieu pour lui : que sur moi soit la profanation ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas un traître mot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pas une grande chose ni une petite chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.2+.'
      marker-yv: yv-n
    - type: text
      text: 'Est-ce aujourd''hui que j''ai commencé à interroger Dieu pour lui ? Sûrement pas ! Que le roi ne mette pas l''affaire à ma charge ni à celle de personne de ma famille, car je ne sais pas un traître mot de tout cela. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu mourras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même formule qu''en Gn 2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toute ta famille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Dt 24.16 ; Est 3.6.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit : Tu mourras, Ahimélek, toi et toute ta famille. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gardes du corps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coureurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agissait de soldats de la garde royale, qui accompagnaient les déplacements du roi et portaient ses messages. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas informé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne voulurent pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 1.17 ; Ps 105.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: exécuter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frapper
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et le roi dit aux gardes du corps qui se tenaient près de lui : Tournez-vous et mettez à mort les prêtres du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', car eux aussi ont prêté la main à David ; ils ont su qu''il s''enfuyait et ils ne m''ont pas informé. Mais les gens du roi ne voulurent pas porter la main sur les prêtres du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour les exécuter. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Doëg '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est un étranger (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'Edomite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') qui ne ressent pas, à mettre à mort les prêtres, les mêmes scrupules que les gardes du roi. Cf. 2.31-33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vas-y '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: alla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tourne-toi / se tourna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'exécute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: exécuta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: va vers / mit à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jette-toi sur / se jeta sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portant l'éphod de lin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors le roi dit à Doëg : Vas-y, toi, exécute les prêtres. Alors Doëg, l''Edomite, alla ; c''est lui qui exécuta les prêtres ; il mit à mort, ce jour-là, quatre-vingt-cinq hommes portant l''éphod de lin. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hommes et femmes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hommes jusqu''aux femmes, enfants jusqu''aux nourrissons… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le massacre de toute la population, y compris le bétail, constitue ce qu''on appelait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 15.3 ; Dt 2.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: furent passés au fil de l'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à bouche d'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 15.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il passa au fil de l'épée Nob, la ville des prêtres ; hommes et femmes, enfants et nourrissons, bœufs, ânes, moutons et chèvres furent passés au fil de l'épée.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le désarroi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'étroit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mécontents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '(tout homme) amer d''âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il devint leur chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 11.3 ; Ps 72.12-14 ; Mt 11.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quatre cents hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 23.13 ; 25.13 ; 27.2 ; 30.10.'
      marker-yv: yv-n
    - type: text
      text: Tous ceux qui se trouvaient dans le désarroi, qui avaient des créanciers ou qui étaient mécontents se rassemblèrent auprès de lui, et il devint leur chef. Il y eut avec lui environ quatre cents hommes.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'échappa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'échappa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en réchappa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abiathar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est la transcription du nom dans LXX et Vg, ainsi que dans le N.T. (Mc 2.26) ; en hébreu il est écrit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ebiatar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Sur le personnage, cf. 30.7 ; 2S 20.25 ; 1R 1.7,19 ; 2.26s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour suivre David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: derrière David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 23.6.
      marker-yv: yv-n
    - type: text
      text: 'Un seul fils d''Ahimélek, fils d''Ahitoub, échappa. Son nom était Abiathar. Il s''enfuit pour suivre David. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abiathar dit à David que Saül avait tué les prêtres du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: fq
