        marker: fq
        children:
        - type: text
          text: Benjaminites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : membres de la tribu de Saül (9.1), que celui-ci, devenu roi, avait sans doute favorisés. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le fils de Jessé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; David, venant de Beth-Léhem, donc de la tribu de Juda, n''aurait aucune raison de favoriser les Benjaminites. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des champs et des vignes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des chefs de mille et des chefs de cent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.12.'
      marker-yv: yv-n
    - type: text
      text: 'Saül leur dit : Ecoutez, je vous prie, Benjaminites ! Le fils de Jessé vous donnera-t-il aussi à tous des champs et des vignes ? Fera-t-il de vous tous des chefs de mille et des chefs de cent ? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous avez tous conspiré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Saül, qui voit dans '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'alliance
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de Jonathan avec David (18.3 ; 20.16,30) un complot contre lui, tient tous ceux qui ne l''en informent pas pour des complices des conjurés. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne m'informe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: afin qu'il me tende une embuscade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: afin qu'il soit un ennemi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voilà pourquoi il en est ainsi en ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 13 ; Dt 2.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: En effet, vous avez tous conspiré contre moi, et personne ne m'informe de l'alliance de mon fils avec le fils de Jessé. Aucun de vous ne souffre à mon sujet ni ne m'informe que mon fils a dressé mon serviteur contre moi, afin qu'il me tende une embuscade – voilà pourquoi il en est ainsi en ce jour.
