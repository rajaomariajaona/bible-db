document_id: 1SA.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David devient chef de bande
  - type: text
    content: ' '
  - type: note
    content: 'Fuite de David : cf. 21.11+. –  Adoullam  : localité du pays de Juda, à 25 km environ au sud-ouest de Jérusalem ; cf. Jos 15.35 ; 2S 23.13 ; 2 Maccabées 12.38 ; voir Ps 57.1 ; 142.1. –  toute sa famille  : litt. toute la maison de son père.'
  - type: text
    content: 'David partit de là et se réfugia dans la grotte d''Adoullam. Ses frères et toute sa famille l''apprirent et ils descendirent l''y rejoindre. '
  '10':
  - type: note
    content: 'a interrogé pour lui le Seigneur  : le chap. 21 ne mentionnait pas ce fait ; cf. 10.22n  ; 14.18s,37 ; 23.2-12 ; 28.6 ; 30.8 ; Nb 27.21 ; Jg 1.1 ; 20.18 ; 2S 21.1.'
  - type: text
    content: 'Ahimélek a interrogé pour lui le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il lui a donné des vivres, il lui a donné l''épée du Philistin Goliath. '
  '11':
  - type: note
    content: 'et toute sa famille  : cf. v. 1n.'
  - type: text
    content: 'Le roi fit appeler Ahimélek, fils d''Ahitoub, le prêtre, et toute sa famille, les prêtres qui étaient à Nob. Ils se rendirent tous auprès du roi. '
  '12':
  - type: text
    content: 'Saül dit : Ecoute, je te prie, fils d''Ahitoub ! Il répondit : Oui, mon seigneur ? '
  '13':
  - type: note
    content: conspiré… v. 8+.
  - type: text
    content: 'Saül lui dit : Pourquoi avez-vous conspiré contre moi, toi et le fils de Jessé ? Pourquoi lui as-tu donné du pain et une épée, et as-tu interrogé Dieu pour lui, afin qu''il se dresse contre moi et me tende une embuscade ? – Voilà pourquoi il en est ainsi en ce jour. '
  '14':
  - type: note
    content: 'gendre du roi  : cf. 18.20-28 ; 19.11-17. –  affecté à ta garde personnelle traduit une expression hébraïque peu claire, qu''on a aussi rendue par admis à ton conseil  ; LXX chef de toute ta garde personnelle  ; cf. 2S 23.23 ; 1Ch 11.25 ; voir aussi Es 11.14n.'
  - type: text
    content: 'Ahimélek répondit au roi : Qui donc, parmi tous les gens de ta cour, est sûr comme David, le gendre du roi, lui qui est affecté à ta garde personnelle et qui est considéré dans ta maison ? '
  '15':
  - type: note
    content: 'Est-ce aujourd''hui…  : traduction incertaine ; on pourrait aussi comprendre c''est aujourd''hui (seulement) que j''ai commencé… En interprétant différemment l''expression traduite par Sûrement pas ! (habituellement jamais ! litt. profanation à moi, cf. 2.30n), certains traduisent  : ce jour-là j''ai commis une profanation en interrogeant Dieu pour lui : que sur moi soit la profanation ! –  pas un traître mot  : litt. pas une grande chose ni une petite chose  ; cf. 20.2+.'
  - type: text
    content: 'Est-ce aujourd''hui que j''ai commencé à interroger Dieu pour lui ? Sûrement pas ! Que le roi ne mette pas l''affaire à ma charge ni à celle de personne de ma famille, car je ne sais pas un traître mot de tout cela. '
  '16':
  - type: note
    content: 'Tu mourras  : même formule qu''en Gn 2.17n. –  toute ta famille v. 1n  ; cf. Dt 24.16 ; Est 3.6.'
  - type: text
    content: 'Le roi dit : Tu mourras, Ahimélek, toi et toute ta famille. '
  '17':
  - type: note
    content: 'gardes du corps ou coureurs  : il s''agissait de soldats de la garde royale, qui accompagnaient les déplacements du roi et portaient ses messages. –  pas informé  : cf. 9.15n. –  ne voulurent pas  : cf. Ex 1.17 ; Ps 105.15. –  exécuter  : litt. frapper  ; cf. 4.2n.'
  - type: text
    content: 'Et le roi dit aux gardes du corps qui se tenaient près de lui : Tournez-vous et mettez à mort les prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', car eux aussi ont prêté la main à David ; ils ont su qu''il s''enfuyait et ils ne m''ont pas informé. Mais les gens du roi ne voulurent pas porter la main sur les prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour les exécuter. '
  '18':
  - type: note
    content: 'Doëg est un étranger (l''Edomite) qui ne ressent pas, à mettre à mort les prêtres, les mêmes scrupules que les gardes du roi. Cf. 2.31-33. –  Vas-y / alla  : litt. tourne-toi / se tourna. –  exécute / exécuta  : LXX va vers / mit à mort  ; Vg jette-toi sur / se jeta sur. –  portant l''éphod de lin  : cf. 2.18n  ; 21.10n.'
  - type: text
    content: 'Alors le roi dit à Doëg : Vas-y, toi, exécute les prêtres. Alors Doëg, l''Edomite, alla ; c''est lui qui exécuta les prêtres ; il mit à mort, ce jour-là, quatre-vingt-cinq hommes portant l''éphod de lin. '
  '19':
  - type: note
    content: 'hommes et femmes…  : litt. hommes jusqu''aux femmes, enfants jusqu''aux nourrissons… Le massacre de toute la population, y compris le bétail, constitue ce qu''on appelait l''anathème, cf. 15.3 ; Dt 2.34n. –  furent passés au fil de l''épée  : litt. à bouche d''épée  ; cf. 15.8n.'
  - type: text
    content: Il passa au fil de l'épée Nob, la ville des prêtres ; hommes et femmes, enfants et nourrissons, bœufs, ânes, moutons et chèvres furent passés au fil de l'épée.
  '2':
  - type: note
    content: 'dans le désarroi  : litt. à l''étroit. –  mécontents  : litt. (tout homme) amer d''âme (cf. Gn 1.20n). –  il devint leur chef  : cf. Jg 11.3 ; Ps 72.12-14 ; Mt 11.28. –  quatre cents hommes  : cf. 23.13 ; 25.13 ; 27.2 ; 30.10.'
  - type: text
    content: Tous ceux qui se trouvaient dans le désarroi, qui avaient des créanciers ou qui étaient mécontents se rassemblèrent auprès de lui, et il devint leur chef. Il y eut avec lui environ quatre cents hommes.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'échappa ou s''échappa , ou encore en réchappa . –  Abiathar est la transcription du nom dans LXX et Vg, ainsi que dans le N.T. (Mc 2.26) ; en hébreu il est écrit Ebiatar . Sur le personnage, cf. 30.7 ; 2S 20.25 ; 1R 1.7,19 ; 2.26s. –  pour suivre David  : litt. derrière David  ; cf. 23.6.'
  - type: text
    content: 'Un seul fils d''Ahimélek, fils d''Ahitoub, échappa. Son nom était Abiathar. Il s''enfuit pour suivre David. '
  '21':
  - type: text
    content: 'Abiathar dit à David que Saül avait tué les prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: note
    content: 'le dire à Saül  : cf. v. 9s. –  C''est moi…  : litt. c''est moi qui me suis tourné (cf. v. 17s) contre tous les êtres de la maison de ton père  ; Tg c''est moi qui l''ai fait se lancer contre…  ; LXX, Vg et Syr c''est moi qui suis coupable au sujet de…'
  - type: text
    content: 'David dit à Abiathar : J''ai bien compris, ce jour-là, que Doëg, l''Edomite, se trouvant là, ne manquerait pas de le dire à Saül. C''est moi qui ai causé la mort de toute ta famille. '
  '23':
  - type: note
    content: 'Reste avec moi  : cf. Lc 24.29. –  n''aie pas peur  : cf. 12.20+. –  celui qui en veut à ma vie en veut aussi à ta vie  : certaines versions anciennes intervertissent les possessifs  : celui qui en voudra à ta vie en voudra à ma vie, c.-à-d. celui qui s''attaquera à toi, je le traiterai comme s''il s''était attaqué à moi. En hébreu le sens est probablement un peu différent : David affirme en fait que c''est le même ennemi qui les menace tous les deux, et que par conséquent ils ont tout intérêt à se mettre ensemble. LXX partout où je chercherai un endroit pour ma vie, j''en chercherai aussi pour la tienne. –  tu seras bien gardé  : même après la mort de David, et quand il sera en pleine disgrâce, cf. 1R 2.26s.'
  - type: text
    content: Reste avec moi, n'aie pas peur, car celui qui en veut à ma vie en veut aussi à ta vie ; près de moi tu seras bien gardé.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Mitspé de Moab  : localité non identifiée, située à l''est de la mer Morte. –  à mon père et à ma mère  : cf. Ex 20.12 ; Mt 15.4-6 ; 1Tm 5.8. –  chez vous  : cf. Rt 1.1-4.'
  - type: text
    content: 'De là David s''en alla à Mitspé de Moab. Il dit au roi de Moab : Permets, je te prie, à mon père et à ma mère d''émigrer chez vous, jusqu''à ce que je sache ce que Dieu fera de moi. '
  '4':
  - type: note
    content: 'la forteresse  : endroit non identifié du pays de Moab ; le même terme sera traduit par endroits escarpés en 23.14,19 ; 24.1 etc.'
  - type: text
    content: Il les conduisit devant le roi de Moab, et ils restèrent avec lui tout le temps que David fut dans la forteresse.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Gad  : cf. 2S 24.11-19 ; 1Ch 21.9-19 ; 29.29 ; 2Ch 29.25. –  rentre au pays de Juda  : cf. 2R 8.3 ; Rt 1.6s ; Esd 1.3 ; Mt 2.20. –  forêt de Héreth  : endroit non identifié.'
  - type: text
    content: 'Gad, le prophète, dit à David : Ne reste pas dans la forteresse ; va-t''en et rentre au pays de Juda. David s''en alla et se rendit dans la forêt de Héreth.'
  - type: heading
    content: Saül fait massacrer les prêtres de Nob
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sous le tamaris  : cf. 14.2. –  Guibéa  : cf. 10.5n. –  sur la hauteur  : certaines versions anciennes ont pris le mot hébreu correspondant pour un nom propre et l''ont transcrit à Rama (cf. Jr 31.15n), localité proche de Guibéa. –  sa lance à la main  : cf. 18.10 ; 19.9. –  tous les gens de sa cour…  : cf. 16.16n.'
  - type: text
    content: 'Saül apprit que l''on avait des renseignements sur David et sur les hommes qui étaient avec lui. Saül était assis sous le tamaris, à Guibéa, sur la hauteur ; il avait sa lance à la main, et tous les gens de sa cour se tenaient près de lui. '
  '7':
  - type: note
    content: 'Benjaminites  : membres de la tribu de Saül (9.1), que celui-ci, devenu roi, avait sans doute favorisés. –  Le fils de Jessé  : cf. 20.27n  ; David, venant de Beth-Léhem, donc de la tribu de Juda, n''aurait aucune raison de favoriser les Benjaminites. –  des champs et des vignes  : cf. 8.14. –  des chefs de mille et des chefs de cent  : cf. 8.12.'
  - type: text
    content: 'Saül leur dit : Ecoutez, je vous prie, Benjaminites ! Le fils de Jessé vous donnera-t-il aussi à tous des champs et des vignes ? Fera-t-il de vous tous des chefs de mille et des chefs de cent ? '
  '8':
  - type: note
    content: 'vous avez tous conspiré  : Saül, qui voit dans l''alliance de Jonathan avec David (18.3 ; 20.16,30) un complot contre lui, tient tous ceux qui ne l''en informent pas pour des complices des conjurés. –  ne m''informe  : cf. 9.15n. –  afin qu''il me tende une embuscade  : LXX a lu afin qu''il soit un ennemi. –  voilà pourquoi il en est ainsi en ce jour  : cf. v. 13 ; Dt 2.30n.'
  - type: text
    content: En effet, vous avez tous conspiré contre moi, et personne ne m'informe de l'alliance de mon fils avec le fils de Jessé. Aucun de vous ne souffre à mon sujet ni ne m'informe que mon fils a dressé mon serviteur contre moi, afin qu'il me tende une embuscade – voilà pourquoi il en est ainsi en ce jour.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Doëg, l''Edomite  : cf. 21.8. –  à la tête des gens ou auprès des gens , cf. v. 6s,17. –  Nob  : cf. 21.2n.'
  - type: text
    content: 'Doëg, l''Edomite, qui se tenait à la tête des gens de Saül, répondit : J''ai vu le fils de Jessé venir à Nob, auprès d''Ahimélek, fils d''Ahitoub. '
