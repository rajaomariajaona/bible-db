      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est moi qui me suis tourné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 17s) '
      - type: usfm
        marker: fqa
