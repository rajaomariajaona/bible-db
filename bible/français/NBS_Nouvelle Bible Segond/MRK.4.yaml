          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '46.3 : « C''est le Fils d''homme auquel appartient la justice, la justice a demeuré avec lui, et c''est lui qui révélera tout le trésor des mystères. » 61.13 : « Tout ce qu''Il (le Seigneur des Esprits) a fait, il l''a révélé aux justes et aux élus. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règle de la Communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 11.5s : « La lumière dans mon cœur vient de Ses Mystères merveilleux (ceux de Dieu) ; c''est dans l''Etre éternel que mon œil a contemplé la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: '  : parce que la Connaissance est cachée aux hommes. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.22 : « Ils (les impies) ne connaissent pas les secrets desseins de Dieu… ils n''apprécient pas l''honneur réservé aux âmes pures. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ceux du dehors '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 5.12s ; Col 4.5 ; 1Th 4.12 ; 1Tm 3.7 ; Prologue du '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 5 : « Il faut aussi que les amis du savoir puissent être utiles à ceux du dehors. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en paraboles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2+ ; 7.17 ; cf. Ez 21.5 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '39.2s : « (Le scribe) pénètre dans les détours des paraboles. Il étudie le sens caché des proverbes, il passe sa vie parmi les énigmes des paraboles. »'
      marker-yv: yv-n
    - type: text
      text: 'Il leur disait : A vous, le mystère du règne de Dieu a été donné, mais pour ceux du dehors tout arrive en paraboles,'
