        - type: usfm
          marker: bk
          children:
          - type: text
            text: De congressu eruditionis gratia
        - type: text
          text: ', § 63-67 : « Il est nécessaire en effet, pour qui apprend, d''être docile aux ordres de la vertu. Mais tous n''ont pas cette docilité, seuls la possèdent ceux en qui a pénétré profondément un puissant amour de la science. Ainsi, il ne se passe guère de jour que les salles de conférence et les théâtres ne s''emplissent… mais de ce qui est dit quel profit retire-t-on ? Au lieu d''être attentifs, les gens donnent congé à leur esprit ; navigation, commerce, revenus, agriculture, honneurs, vie politique, gains procurés par les divers métiers et fonctions, vengeance à tirer d''ennemis, assouvissement de désirs amoureux, chacun a la mémoire occupée d''un objet différent. Aussi… sont-ils comme hébétés, présents par leur corps seulement, absents par leur intelligence, tout semblables à des images ou à des statues. Si d''autres vont jusqu''à écouter, c''est juste le temps de la séance ; une fois sortis, ils ne se souviennent en rien de ce qu''on a dit : ils sont venus là pour charmer leurs oreilles et non pour retirer quelque profit ; aussi leur âme a-t-elle été absolument incapable de concevoir et d''enfanter… Une troisième catégorie comprend ceux en qui les paroles entendues résonnent bien un instant, mais qui se révèlent être des sophistes et non des philosophes : leur parole mérite la louange, mais leur vie, le blâme… » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux en qui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'là où… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Satan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ceux qui sont le long du chemin, ce sont ceux en qui la Parole est semée, mais à peine l''ont-ils entendue que le Satan vient enlever la Parole qui a été semée en eux. '
