      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.4ss (récit de vision) : « Au moment même où nous entrions (dans le navire), il y eut une violente tempête et une terrible bourrasque… le navire fut rempli par les eaux, déchiré par les lames jusqu''à en être brisé… Mais Lévi, ceint d''un sac, pria le Seigneur. Quand la tempête se fut apaisée, le bâtiment toucha terre sans encombre. »'
      marker-yv: yv-n
    - type: text
      text: 'Survient une forte bourrasque : les vagues se jetaient dans le bateau, déjà il se remplissait. '
