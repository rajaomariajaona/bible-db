        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hermas
        - type: text
          text: ', Vis. III,7,3 : « Ce sont ceux qui ont entendu la parole de Dieu et qui veulent être baptisés au nom du Seigneur. Seulement, lorsqu''ils se rappellent la sainteté qu''exige la vérité, ils changent d''avis et se mettent de nouveau à la remorque de leurs passions mauvaises. » Sim. IX,20,1s : « Parmi eux, les uns sont riches, les autres, enfoncés dans d''innombrables affaires. Les épines symbolisent les riches, les chardons, ceux qui sont enfoncés dans des affaires multiples. Ces derniers, enfoncés dans leurs multiples affaires de tout genre, ne s''attachent pas aux serviteurs de Dieu : ils errent à l''aventure, étouffés par leurs affaires. Les riches, eux, s''attachent difficilement aux serviteurs de Dieu, par peur d''être sollicités. De telles gens entreront difficilement dans le royaume de Dieu. » (Cf. Mc 10.23.)'
      marker-yv: yv-n
    - type: text
      text: 'mais les inquiétudes du monde, l''attrait trompeur des richesses et l''intrusion des autres désirs étouffent la Parole, et elle devient stérile. '
  '2':
  - type: usfm
