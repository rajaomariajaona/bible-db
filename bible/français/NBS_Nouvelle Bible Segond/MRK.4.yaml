        children:
        - type: text
          text: '11.11 : « Le prince Mastéma envoya des corbeaux et d''autres oiseaux pour dévorer la semence semée en terre, gâter la terre et priver les humains du fruit de leur travail. Avant qu''ils ne recouvrent la semence, les corbeaux la picoraient à la surface du sol. »'
      marker-yv: yv-n
