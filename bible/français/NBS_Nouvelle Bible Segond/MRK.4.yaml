      marker-yv: yv-n
    - type: text
      text: 'Il se remit à enseigner au bord de la mer. Il se rassemble auprès de lui une foule si nombreuse qu''il monte dans un bateau, sur la mer, et s''y assied. Toute la foule était à terre, près de la mer. '
