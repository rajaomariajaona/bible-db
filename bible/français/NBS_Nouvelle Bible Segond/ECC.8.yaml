        text: 'ni la nuit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.23.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque j''ai décidé de connaître la sagesse et de voir l''occupation qui a cours sur la terre – car les yeux de l''homme ne voient le sommeil ni le jour ni la nuit – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.11+.
    marker-yv: yv-n
  - type: text
    text: 'j''ai vu toute l''œuvre de Dieu : l''être humain ne peut pas trouver l''œuvre qui se fait sous le soleil ; ce que l''être humain cherche avec peine, il ne le trouvera pas ; et même si le sage prétend connaître, il ne peut pas trouver.'
