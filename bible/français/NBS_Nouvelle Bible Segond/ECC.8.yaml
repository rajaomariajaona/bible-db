        - type: text
          text: n
      - type: text
        text: ',16s ; 1.9,13s etc.'
    marker-yv: yv-n
  - type: text
    text: 'Parce qu''une sentence contre une mauvaise action n''est pas exécutée rapidement, le cœur des humains, au dedans d''eux, est rempli du désir de mal agir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: craignent
      - type: text
        text: ' Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.14+ ; cf. Ps 37 ; Pr 1.33.
    marker-yv: yv-n
  - type: text
    text: 'Le pécheur peut mal agir cent fois et prolonger son existence, je sais pourtant, moi, qu''il y aura du bonheur pour ceux qui craignent Dieu, parce qu''ils ont de la crainte devant lui ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mais il n'y aura pas de bonheur pour le méchant, et il ne prolongera pas ses jours, pas plus que l'ombre, parce qu'il n'a pas de crainte devant Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
