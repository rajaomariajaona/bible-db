        text: .
    marker-yv: yv-n
  - type: text
    text: 'C''est une futilité qui a cours sur la terre : il y a des justes dont le sort conviendrait à l''œuvre des méchants, et des méchants dont le sort conviendrait à l''œuvre des justes. Je dis que c''est encore là une futilité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fait l''éloge de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . Cf. 2.24+.
    marker-yv: yv-n
  - type: text
    text: 'J''ai donc fait l''éloge de la joie, parce qu''il n''y a rien de bon pour l''être humain sous le soleil, sinon de manger, de boire et de se réjouir ; c''est là ce qui doit l''accompagner dans son travail, pendant les jours de la vie que Dieu lui donne sous le soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui a cours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
