      children:
      - type: text
        text: 'Cf. v. 12s ; 3.19 ; 7.15+ ; Jr 12.1 ; Ps 73.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui a cours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
