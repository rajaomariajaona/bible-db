document_id: ECC.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sage face au pouvoir du roi
  - type: text
    content: ' '
  - type: note
    content: 'les choses  : litt. une parole ou une chose, un événement  ; certains rattachent la phrase à ce qui suit et comprennent qui sait interpréter cette parole : La sagesse de l''homme… –  fait briller son visage  : cf. Nb 6.25+ ; Ps 19.9+ ; 104.15 ; voir aussi Siracide 13.25 : « C''est le cœur de l''homme qui modèle son visage, que ce soit en bien ou en mal. »'
  - type: text
    content: Qui est comme le sage ? Qui sait interpréter les choses ?
  - type: text
    content: La sagesse de l'homme fait briller son visage,
  - type: text
    content: et la sévérité de son visage se dissipe.
  '10':
  - type: note
    content: 'méchants ensevelis  : cf. 9.10 ; Jb 21.30-33. –  on allait  : traduction incertaine ; d''autres comprennent des méchants (pour ainsi dire) ensevelis qui revenaient et qui sortaient du lieu sacré  ; certains pensent qu''ici le lieu sacré est un cimetière. –  en oubliant…  : les versions grecques et plusieurs mss hébreux portent en les louant dans la ville d''avoir agi ainsi. D''autres comprennent alors que ceux qui avaient bien agi étaient oubliés.'
  - type: text
    content: 'Ainsi j''ai vu des méchants ensevelis ; on allait, on venait du lieu sacré en oubliant dans la ville comment ils avaient agi. C''est encore là une futilité. '
  '11':
  - type: note
    content: '9.3. –  sentence  : terme d''origine perse, traduit par édit en Est 1.20. –  action ou œuvre  ; même terme aux v. 9,14,17. –  n''est pas exécutée  : litt. ne se fait pas  ; cf. v. 9,14n,16s ; 1.9,13s etc.'
  - type: text
    content: 'Parce qu''une sentence contre une mauvaise action n''est pas exécutée rapidement, le cœur des humains, au dedans d''eux, est rempli du désir de mal agir. '
  '12':
  - type: note
    content: craignent Dieu 3.14+ ; cf. Ps 37 ; Pr 1.33.
  - type: text
    content: 'Le pécheur peut mal agir cent fois et prolonger son existence, je sais pourtant, moi, qu''il y aura du bonheur pour ceux qui craignent Dieu, parce qu''ils ont de la crainte devant lui ; '
  '13':
  - type: text
    content: mais il n'y aura pas de bonheur pour le méchant, et il ne prolongera pas ses jours, pas plus que l'ombre, parce qu'il n'a pas de crainte devant Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 12s ; 3.19 ; 7.15+ ; Jr 12.1 ; Ps 73.3. –  qui a cours  : litt. qui se fait , de même au v. 16 ; cf. v. 11n.'
  - type: text
    content: 'C''est une futilité qui a cours sur la terre : il y a des justes dont le sort conviendrait à l''œuvre des méchants, et des méchants dont le sort conviendrait à l''œuvre des justes. Je dis que c''est encore là une futilité. '
  '15':
  - type: note
    content: fait l'éloge de 4.2n. Cf. 2.24+.
  - type: text
    content: 'J''ai donc fait l''éloge de la joie, parce qu''il n''y a rien de bon pour l''être humain sous le soleil, sinon de manger, de boire et de se réjouir ; c''est là ce qui doit l''accompagner dans son travail, pendant les jours de la vie que Dieu lui donne sous le soleil. '
  '16':
  - type: note
    content: '1.13n,17. –  qui a cours v. 14n. –  les yeux de l''homme  : litt. ses yeux. –  ni la nuit 2.23.'
  - type: text
    content: 'Lorsque j''ai décidé de connaître la sagesse et de voir l''occupation qui a cours sur la terre – car les yeux de l''homme ne voient le sommeil ni le jour ni la nuit – '
  '17':
  - type: note
    content: 3.11+.
  - type: text
    content: 'j''ai vu toute l''œuvre de Dieu : l''être humain ne peut pas trouver l''œuvre qui se fait sous le soleil ; ce que l''être humain cherche avec peine, il ne le trouvera pas ; et même si le sage prétend connaître, il ne peut pas trouver.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je dis  : l''hébreu porte seulement le pronom correspondant à je, moi (verbe sous-entendu ?). D''après les versions anciennes, certains le modifient pour lire simplement observe les ordres du roi . –  les ordres  : litt. la bouche  ; cf. 10.13n. –  du serment de Dieu  : ou bien le serment d''obéissance au roi fait au nom de Dieu (cf. Ex 22.10), ou bien le serment divin considéré comme fondateur de la royauté (cf. 2S 7.11-16 ; Ps 89.4s ; 110) ; voir aussi Rm 13.1.'
  - type: text
    content: 'Je dis : Observe les ordres du roi,'
  - type: text
    content: et cela à cause du serment de Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.4.
  - type: text
    content: Ne te presse pas de t'éloigner de lui
  - type: text
    content: et ne persiste pas dans une mauvaise cause ;
  - type: text
    content: car il fait tout ce qui lui plaît.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Que fais-tu ? cf. Es 45.9 ; Jb 9.12.
  - type: text
    content: Quoi que dise le roi, il est le maître ;
  - type: text
    content: 'qui donc lui dira : « Que fais-tu ? »'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'commandement 12.13 ; Pr 19.16. –  rien de mauvais  : autre traduction pas de mauvaise cause  ; cf. v. 3. –  le temps (opportun ? l''emploi absolu du même terme désigne en 9.12 l''heure de la mort) et le jugement  : quelques mss portent le temps du jugement.'
  - type: text
    content: Celui qui observe le commandement ne connaîtra rien de mauvais ;
  - type: text
    content: le cœur sage connaîtra le temps et le jugement.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '3.1+. –  le mal…  : on pourrait aussi comprendre quand le mal accable l''être humain  ; autre traduction mais le malheur de l''homme est grand pour lui.'
  - type: text
    content: Car il y a pour chaque chose un temps et un jugement ;
  - type: text
    content: le mal de l'être humain est grave pour lui.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '3.22+. –  ce qui sera  : autre traduction ce qui arrivera.'
  - type: text
    content: En effet, il ne sait pas ce qui sera ;
  - type: text
    content: qui pourrait lui dire comment cela sera ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Personne…  : litt. il n''y a pas d''humain qui soit maître du souffle (le même mot est aussi traduit par vent  ; voir esprit) pour retenir le souffle  ; cf. Sagesse 2.1 : « Il n''y a pas de remède quand l''homme touche à sa fin. » –  maître (le même terme est traduit par gouverneur en 7.19) / pouvoir  : termes hébreux de la même racine sémitique, celle qui a donné le mot sultan  ; de même au v. 9. –  sur le jour  : autre traduction au jour. –  exemption  : cf. Dt 20.8 ; autres traductions dispense, trêve, sursis, délivrance  ; le même terme est traduit par mission en Ps 78.49. –  ne permet…  : litt. ne fait pas échapper ses maîtres (ou ceux qui la possèdent ), comme en 7.12n.'
  - type: text
    content: Personne n'est maître du souffle, pour le retenir ;
  - type: text
    content: nul n'a de pouvoir sur le jour de la mort ;
  - type: text
    content: il n'y a pas d'exemption à la guerre,
  - type: text
    content: et la méchanceté ne permet pas aux méchants d'échapper.
  - type: heading
    content: Le mystère de l'œuvre de Dieu
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'en réfléchissant à  : litt. en donnant mon cœur à. –  exerce son pouvoir v. 8n. –  pour son malheur  : plusieurs versions anciennes ont lu (l''être humain a pouvoir sur l''être humain) pour lui faire du mal , ce qui pourrait correspondre à une autre vocalisation du texte hébreu traditionnel.'
  - type: text
    content: 'J''ai vu tout cela en réfléchissant à toute l''œuvre qui se fait sous le soleil. Il y a un temps où l''être humain exerce son pouvoir sur l''être humain pour son malheur. '
