document_id: GEN.27,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob usurpe la bénédiction promise à Esaü
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 48.10 ; 1S 4.15.
      marker-yv: yv-n
    - type: text
      text: 'Isaac devenait vieux, ses yeux s''étaient affaiblis : il ne voyait plus. Il appela Esaü, son fils aîné : Mon fils ! Celui-ci lui répondit : Je suis là ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu l''apporteras à ton père pour qu''il le mange, afin qu''il te bénisse avant sa mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: velu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa‘ir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', allusion à Séir, l''autre nom du pays d''Edom, cf. 25.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob répondit à Rébecca, sa mère : Esaü, mon frère, est velu, tandis que ma peau est lisse. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il croira que je me suis moqué de lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je passerai à ses yeux pour un trompeur.
      marker-yv: yv-n
    - type: text
      text: 'Peut-être mon père me tâtera-t-il, et il croira que je me suis moqué de lui ; ce n''est pas une bénédiction, mais une malédiction que je ferai venir sur moi ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les chevreaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Sa mère lui dit : Que cette malédiction soit sur moi, mon fils ! Ecoute-moi seulement et va me chercher les chevreaux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il alla les chercher et les apporta à sa mère ; sa mère prépara un plat appétissant comme son père les aimait. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les plus beaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les désirables.
      marker-yv: yv-n
    - type: text
      text: 'Ensuite Rébecca prit les vêtements d''Esaü, son fils aîné, les plus beaux qu''elle avait à la maison, et elle les fit mettre à Jacob, son fils cadet. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses bras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité aux v. 22s.'
      marker-yv: yv-n
    - type: text
      text: 'De la peau des chevreaux, elle couvrit ses bras ainsi que son cou, qui était lisse. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans les mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',22s.'
      marker-yv: yv-n
    - type: text
      text: Puis elle mit le plat appétissant et le pain qu'elle avait préparés dans les mains de Jacob, son fils.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Il vint vers son père et dit : Père ! Celui-ci répondit : Je suis là ! Qui es-tu, mon fils ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob répondit à son père : Je suis Esaü, ton premier-né ; j''ai fait ce que tu m''as dit. Lève-toi, je te prie, assieds-toi et mange de mon gibier, afin que tu me bénisses. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il reprit : Je suis vieux, et je ne connais pas le jour de ma mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac dit à son fils : Comme tu l''as vite trouvé, mon fils ! Il répondit : C''est que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, l''a fait venir au-devant de moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac dit à Jacob : Approche, je te prie ; que je te tâte, mon fils, pour savoir si tu es bien mon fils Esaü ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob s''approcha d''Isaac, son père, qui le tâta et dit : C''est la voix de Jacob, mais ce sont les bras d''Esaü. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne le reconnut pas, parce que ses bras étaient velus, comme ceux d''Esaü, son frère ; et il le bénit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit : C''est bien toi, Esaü, mon fils ? Il répondit : C''est moi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob le servit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il le servit.
      marker-yv: yv-n
    - type: text
      text: 'Il dit : Sers-moi, que je mange du gibier de mon fils, afin que je te bénisse. Jacob le servit, et il mangea ; il lui apporta du vin, et il but. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Isaac, son père, lui dit : Approche, je te prie ; embrasse-moi, mon fils ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Hé 11.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Isaac sentit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il sentit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Oui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'regarde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un champ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des champs ; de la campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss hébreux et des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'un champ fertile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' a béni'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 26.12.'
      marker-yv: yv-n
    - type: text
      text: 'Il s''approcha et l''embrassa. Isaac sentit l''odeur de ses vêtements ; puis il le bénit en ces termes :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l'odeur de mon fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'est comme l''odeur d''un champ que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a béni.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 39
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 49 ; Dt 33.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des ressources
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des huiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant (aussi au v. 37) pourrait désigner, dans un sens plus précis, le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vin nouveau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. ses emplois particuliers en Es 65.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' et Mi 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). En général, il apparaît cependant comme un simple synonyme de celui qui est employé au v. 25 (9.21,24 ; 14.18 ; 19.32ss ; 49.11s etc.).
      marker-yv: yv-n
    - type: text
      text: Que Dieu te donne, de la rosée du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des ressources de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abondance de blé et de vin !
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.3 ; 25.23.
      marker-yv: yv-n
    - type: text
      text: Que des peuples te servent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que des nations se prosternent devant toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois le maître de tes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les fils de ta mère se prosternent devant toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit celui qui te maudit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: béni soit celui qui te bénit !
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, je te prie, prends tes armes, ton carquois et ton arc, sors dans la campagne et chasse du gibier pour moi. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Isaac avait achevé de bénir Jacob, et Jacob avait à peine quitté Isaac, son père, qu''Esaü, son frère, revint de la chasse. '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mange de mon gibier…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mange du gibier de ton fils, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'afin de me '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que ton être me bénisse ; pour que ton gosier me bénisse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Sur le terme hébreu correspondant, voir 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il prépara, lui aussi, un plat appétissant qu''il apporta à son père. Il dit à son père : Lève-toi, père, et mange de mon gibier, afin de me bénir, moi, ton fils ! '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Isaac, son père, lui dit : Qui es-tu ? Il répondit : Je suis ton fils premier-né, Esaü ! '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tremblement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frayeur, confusion.
      marker-yv: yv-n
    - type: text
      text: 'Isaac fut saisi d''un tremblement terrible ; il dit : Qui est donc celui qui a chassé du gibier et qui me l''a apporté ? J''ai mangé de tout avant que tu arrives, je l''ai béni, et il sera béni ! '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un grand cri, terriblement amer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Est 4.1 ; Hé 12.17.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Esaü entendit les paroles de son père, il poussa un grand cri, terriblement amer, et dit à son père : Moi aussi, bénis-moi, père ! '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 29.25 ; Jr 9.3s.'
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Ton frère est venu par tromperie et il a pris ta bénédiction. '
  '36':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Esaü dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il m'a supplanté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ya‘qevéni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui fait assonance avec le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 25.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ya‘aqov
      - type: usfm
        marker: ft
        children:
        - type: text
