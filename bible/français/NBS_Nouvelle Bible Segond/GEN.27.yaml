document_id: GEN.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob usurpe la bénédiction promise à Esaü
  - type: text
    content: ' '
  - type: note
    content: Cf. 48.10 ; 1S 4.15.
  - type: text
    content: 'Isaac devenait vieux, ses yeux s''étaient affaiblis : il ne voyait plus. Il appela Esaü, son fils aîné : Mon fils ! Celui-ci lui répondit : Je suis là ! '
  '10':
  - type: text
    content: 'Tu l''apporteras à ton père pour qu''il le mange, afin qu''il te bénisse avant sa mort. '
  '11':
  - type: note
    content: 'velu  : hébreu sa‘ir, allusion à Séir, l''autre nom du pays d''Edom, cf. 25.25n.'
  - type: text
    content: 'Jacob répondit à Rébecca, sa mère : Esaü, mon frère, est velu, tandis que ma peau est lisse. '
  '12':
  - type: note
    content: 'il croira que je me suis moqué de lui  : autre traduction je passerai à ses yeux pour un trompeur.'
  - type: text
    content: 'Peut-être mon père me tâtera-t-il, et il croira que je me suis moqué de lui ; ce n''est pas une bénédiction, mais une malédiction que je ferai venir sur moi ! '
  '13':
  - type: note
    content: 'cette  : litt. ta. –  les chevreaux  : sous-entendu dans le texte.'
  - type: text
    content: 'Sa mère lui dit : Que cette malédiction soit sur moi, mon fils ! Ecoute-moi seulement et va me chercher les chevreaux. '
  '14':
  - type: text
    content: 'Il alla les chercher et les apporta à sa mère ; sa mère prépara un plat appétissant comme son père les aimait. '
  '15':
  - type: note
    content: 'les plus beaux  : litt. les désirables.'
  - type: text
    content: 'Ensuite Rébecca prit les vêtements d''Esaü, son fils aîné, les plus beaux qu''elle avait à la maison, et elle les fit mettre à Jacob, son fils cadet. '
  '16':
  - type: note
    content: 'ses bras  : autre traduction ses mains, même possibilité aux v. 22s.'
  - type: text
    content: 'De la peau des chevreaux, elle couvrit ses bras ainsi que son cou, qui était lisse. '
  '17':
  - type: note
    content: 'dans les mains  : litt. dans la main  ; cf. v. 16n,22s.'
  - type: text
    content: Puis elle mit le plat appétissant et le pain qu'elle avait préparés dans les mains de Jacob, son fils.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Père  : litt. mon père , de même dans la suite.'
  - type: text
    content: 'Il vint vers son père et dit : Père ! Celui-ci répondit : Je suis là ! Qui es-tu, mon fils ? '
  '19':
  - type: text
    content: 'Jacob répondit à son père : Je suis Esaü, ton premier-né ; j''ai fait ce que tu m''as dit. Lève-toi, je te prie, assieds-toi et mange de mon gibier, afin que tu me bénisses. '
  '2':
  - type: text
    content: 'Il reprit : Je suis vieux, et je ne connais pas le jour de ma mort. '
  '20':
  - type: text
    content: 'Isaac dit à son fils : Comme tu l''as vite trouvé, mon fils ! Il répondit : C''est que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, l''a fait venir au-devant de moi. '
  '21':
  - type: text
    content: 'Isaac dit à Jacob : Approche, je te prie ; que je te tâte, mon fils, pour savoir si tu es bien mon fils Esaü ! '
  '22':
  - type: text
    content: 'Jacob s''approcha d''Isaac, son père, qui le tâta et dit : C''est la voix de Jacob, mais ce sont les bras d''Esaü. '
  '23':
  - type: text
    content: 'Il ne le reconnut pas, parce que ses bras étaient velus, comme ceux d''Esaü, son frère ; et il le bénit. '
  '24':
  - type: text
    content: 'Il dit : C''est bien toi, Esaü, mon fils ? Il répondit : C''est moi. '
  '25':
  - type: note
    content: 'Jacob le servit  : litt. il le servit.'
  - type: text
    content: 'Il dit : Sers-moi, que je mange du gibier de mon fils, afin que je te bénisse. Jacob le servit, et il mangea ; il lui apporta du vin, et il but. '
  '26':
  - type: text
    content: 'Alors Isaac, son père, lui dit : Approche, je te prie ; embrasse-moi, mon fils ! '
  '27':
  - type: note
    content: 'Cf. Hé 11.20. –  Isaac sentit  : litt. il sentit. –  Oui  : litt. regarde (ou vois). –  d''un champ  : autres traductions des champs ; de la campagne  ; certains mss hébreux et des versions anciennes portent d''un champ fertile. –  que le Seigneur a béni  : cf. 26.12.'
  - type: text
    content: 'Il s''approcha et l''embrassa. Isaac sentit l''odeur de ses vêtements ; puis il le bénit en ces termes :'
  - type: text
    content: Oui, l'odeur de mon fils
  - type: text
    content: 'est comme l''odeur d''un champ que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a béni.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 39n  ; 49 ; Dt 33.13. –  des ressources  : litt. des huiles , de même au v. 39. –  vin  : le terme hébreu correspondant (aussi au v. 37) pourrait désigner, dans un sens plus précis, le vin nouveau (cf. ses emplois particuliers en Es 65.8n et Mi 6.15n). En général, il apparaît cependant comme un simple synonyme de celui qui est employé au v. 25 (9.21,24 ; 14.18 ; 19.32ss ; 49.11s etc.).'
  - type: text
    content: Que Dieu te donne, de la rosée du ciel
  - type: text
    content: et des ressources de la terre,
  - type: text
    content: abondance de blé et de vin !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 12.3 ; 25.23.
  - type: text
    content: Que des peuples te servent,
  - type: text
    content: que des nations se prosternent devant toi !
  - type: text
    content: Sois le maître de tes frères,
  - type: text
    content: que les fils de ta mère se prosternent devant toi !
  - type: text
    content: Maudit soit celui qui te maudit,
  - type: text
    content: béni soit celui qui te bénit !
  '3':
  - type: text
    content: 'Maintenant, je te prie, prends tes armes, ton carquois et ton arc, sors dans la campagne et chasse du gibier pour moi. '
  '30':
  - type: text
    content: 'Isaac avait achevé de bénir Jacob, et Jacob avait à peine quitté Isaac, son père, qu''Esaü, son frère, revint de la chasse. '
  '31':
  - type: note
    content: 'mange de mon gibier…  : litt. mange du gibier de ton fils, afin de me bénir  ; autres traductions pour que ton être me bénisse ; pour que ton gosier me bénisse. Sur le terme hébreu correspondant, voir 1.20n.'
  - type: text
    content: 'Il prépara, lui aussi, un plat appétissant qu''il apporta à son père. Il dit à son père : Lève-toi, père, et mange de mon gibier, afin de me bénir, moi, ton fils ! '
  '32':
  - type: text
    content: 'Isaac, son père, lui dit : Qui es-tu ? Il répondit : Je suis ton fils premier-né, Esaü ! '
  '33':
  - type: note
    content: tremblement ou frayeur, confusion.
  - type: text
    content: 'Isaac fut saisi d''un tremblement terrible ; il dit : Qui est donc celui qui a chassé du gibier et qui me l''a apporté ? J''ai mangé de tout avant que tu arrives, je l''ai béni, et il sera béni ! '
  '34':
  - type: note
    content: 'un grand cri, terriblement amer  : cf. Est 4.1 ; Hé 12.17.'
  - type: text
    content: 'Lorsque Esaü entendit les paroles de son père, il poussa un grand cri, terriblement amer, et dit à son père : Moi aussi, bénis-moi, père ! '
  '35':
  - type: note
    content: 25.26n  ; cf. 29.25 ; Jr 9.3s.
  - type: text
    content: 'Il répondit : Ton frère est venu par tromperie et il a pris ta bénédiction. '
  '36':
  - type: note
    content: 'Esaü dit  : litt. il dit. –  il m''a supplanté  : hébreu ya‘qevéni, qui fait assonance avec le nom de Jacob, cf. 25.26n (Ya‘aqov). De même l''expression traduite par mon droit d''aînesse (bekorati) fait assonance avec celle qui signifie ma bénédiction (birkati) ; cf. 25.31-34.'
  - type: text
    content: 'Esaü dit : Est-ce parce qu''on l''a appelé du nom de Jacob qu''il m''a supplanté par deux fois ? Il avait déjà pris mon droit d''aînesse, et maintenant il a pris ma bénédiction ! Il ajouta : N''as-tu pas de bénédiction en réserve pour moi ? '
  '37':
  - type: note
    content: 'pour serviteurs  : autre traduction pour esclaves.'
  - type: text
    content: 'Isaac répondit à Esaü : J''ai fait de lui ton maître, je lui ai donné tous ses frères pour serviteurs, et je l''ai pourvu de blé et de vin : que puis-je donc faire pour toi, mon fils ? '
  '38':
  - type: note
    content: Hé 12.17.
  - type: text
    content: 'Esaü dit à son père : N''as-tu donc que cette seule bénédiction, père ? Moi aussi, bénis-moi, père ! Et Esaü se mit à sangloter. '
  '39':
  - type: note
    content: 'des ressources  : cf. v. 28n. La préposition traduite par loin des peut aussi signifier privé des, voire fait des  ; mais ce dernier sens ne s''accorde guère à l''habitat des Edomites (25.25n), qui vivaient dans le désert au sud de la mer Morte ; cf. Jos 24.4.'
  - type: text
    content: 'Isaac, son père, lui répondit :'
  - type: text
    content: Tu habiteras loin des ressources de la terre
  - type: text
    content: et de la rosée du ciel, de la rosée d'en haut.
  '4':
  - type: note
    content: 'comme je les aime 25.28. –  afin que…  : litt. afin que mon être te bénisse avant que je meure  ; même tournure aux v. 19,25,31. Certains voient ici un emploi typique du mot hébreu néphesh (voir 1.20n) comme simple équivalent du pronom personnel (mon être = moi-même) ; d''autres y discernent une nuance intensive, comme dans l''expression de toute mon âme  ; cf. Ps 103.1.'
  - type: text
    content: 'Prépare-moi un plat appétissant comme je les aime, et apporte-le-moi pour que je le mange, afin que je te bénisse avant de mourir. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'tu serviras  : autres traductions tu seras soumis à ; tu seras l''esclave de  ; cf. 25.23 ; voir aussi 48.14-20. –  en errant librement çà et là  : verbe diversement interprété ; autres possibilités se coucher, gémir, se libérer, vouloir, faire un effort . Les Edomites, soumis par David, ont ensuite recouvré leur indépendance.'
  - type: text
    content: Tu vivras de ton épée,
  - type: text
    content: et tu serviras ton frère ;
  - type: text
    content: mais en errant librement çà et là
  - type: text
    content: tu arracheras son joug de ton cou.
  - type: heading
    content: Jacob chez son oncle Laban
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Voir bénédiction . –  se disait  : litt. disait en son cœur.'
  - type: text
    content: 'Esaü prit Jacob en aversion, à cause de la bénédiction que son père lui avait accordée. Esaü se disait : Les jours du deuil de mon père approchent ; après, je tuerai Jacob, mon frère. '
  '42':
  - type: note
    content: tirer vengeance de toi ou obtenir satisfaction de toi  ; le verbe a aussi le sens de (s’)apaiser ou de (se) consoler  ; c'est lui aussi qui est traduit par avoir du regret en Nb 23.19n, par avoir pitié en Dt 32.36n  ; cf. Es 1.24n  ; Ez 5.13n.
  - type: text
    content: 'On rapporta à Rébecca les paroles d''Esaü, son fils aîné. Elle fit alors appeler Jacob, son fils cadet, et lui dit : Esaü, ton frère, veut te tuer pour tirer vengeance de toi. '
  '43':
  - type: note
    content: Laban 24.29. –  Harrân 11.31n  ; cf. 24.10n  ; 25.20n.
  - type: text
    content: 'Maintenant, mon fils, écoute-moi : va te réfugier chez Laban, mon frère, à Harrân. '
  '44':
  - type: note
    content: 's''en soit retournée  : autre traduction soit calmée  ; le même verbe avec un complément est traduit par se détourner au v. 45.'
  - type: text
    content: 'Tu habiteras chez lui quelque temps, jusqu''à ce que la fureur de ton frère s''en soit retournée. '
  '45':
  - type: note
    content: 'Quand…  : litt. jusqu''à ce que la colère… se soit détournée (v. 44n) et qu''il ait oublié… –  je te ferai revenir  : litt. je t''enverrai chercher.'
  - type: text
    content: Quand la colère de ton frère se sera détournée de toi et qu'il aura oublié ce que tu lui as fait, alors je te ferai revenir. Pourquoi devrais-je vous perdre tous les deux en un seul jour ?
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai pris ma vie en horreur  : cf. Nb 22.3n. –  Si Jacob…  : litt. si Jacob prend une femme des filles de Heth comme celles-là (26.34-35n) , des filles du pays, pourquoi à moi la vie ? (cf. 25.22n).'
  - type: text
    content: 'Rébecca dit à Isaac : J''ai pris ma vie en horreur à cause de ces filles de Heth. Si Jacob épouse une Hittite, une des filles du pays comme celles-là, à quoi me sert la vie ?'
  '5':
  - type: note
    content: 'et le rapporter  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire pour son père.'
  - type: text
    content: Tandis qu'Isaac parlait à son fils Esaü, Rébecca écoutait. Esaü s'en alla dans la campagne pour chasser du gibier et le rapporter.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Sur le rôle de la mère, cf. 1R 1.11-31.
  - type: text
    content: 'Rébecca dit à Jacob, son fils : J''ai entendu ton père dire à Esaü, ton frère : '
  '7':
  - type: note
    content: devant et avant traduisent la même locution hébraïque.
  - type: text
    content: '« Apporte-moi du gibier et prépare-moi un plat appétissant pour que je le mange, et je te bénirai devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avant ma mort. » '
  '8':
  - type: text
    content: 'Maintenant, mon fils, écoute-moi ; voici ce que je t''ordonne : '
  '9':
  - type: text
    content: 'va me chercher deux bons chevreaux du troupeau, je te prie ; j''en ferai pour ton père un plat appétissant comme il les aime. '
