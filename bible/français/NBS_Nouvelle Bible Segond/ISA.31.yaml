document_id: ISA.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Egypte n'est pas divine, mais humaine
  - type: text
    content: ' '
  - type: note
    content: descendent en Egypte 18.1+ ; 30.2+. –  chevaux / chars 2.7+. –  attelages 36.9. –  ne regardent pas 5.12+. –  Saint d'Israël 1.4+.
  - type: text
    content: Quel malheur pour ceux qui descendent en Egypte afin d'y trouver du secours,
  - type: text
    content: qui s'appuient sur des chevaux,
  - type: text
    content: qui mettent leur confiance dans des chars, parce qu'ils sont nombreux,
  - type: text
    content: et dans des attelages, parce qu'ils sont très forts,
  - type: text
    content: mais qui ne regardent pas vers le Saint d'Israël
  - type: text
    content: 'et ne cherchent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Lui aussi… sage  : cf. 5.21 ; 19.11s ; 29.14s. –  malfaisants  : litt. faiseurs d''injustice (1.13+) ; même formule en Os 6.8n  ; Ps 5.6+ ; Jb 31.3 ; 34.8,22 ; Pr 10.29 ; 21.15.'
  - type: text
    content: Lui aussi, cependant, il est sage
  - type: text
    content: pour faire venir le malheur ;
  - type: text
    content: il ne retire pas ses paroles ;
  - type: text
    content: il se dresse contre la maison des mauvais
  - type: text
    content: et contre le secours des malfaisants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'pas divine, mais humaine  : litt. homme (hébreu ’adam ) et pas dieu ( ’el , cf. Gn 21.33n) ; cf. Ez 28.2n  ; voir aussi Ps 146.3. –  souffle ou esprit  ; cf. Ps 104.29s. –  étendra la main 5.25+. –  disparaîtront 1.28 ; 10.18 ; 29.20. Les Egyptiens ont été battus en 701 av. J.-C. à Elteqé, à environ 40 km à l''ouest de Jérusalem.'
  - type: text
    content: L'Egypte n'est pas divine, mais humaine ;
  - type: text
    content: ses chevaux ne sont pas souffle, mais chair.
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' étendra la main,'
  - type: text
    content: celui qui porte secours trébuchera,
  - type: text
    content: celui qui est secouru tombera,
  - type: text
    content: et, tous ensemble, ils disparaîtront.
  - type: heading
    content: Le Seigneur protégera Jérusalem
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'lion Os 5.14 ; Am 1.2 ; 3.8. –  bergers  : cf. Jr 6.3 ; 12.10. –  appelés contre lui  : cf. Ez 19.4n. –  leurs cris  : litt. leur voix. –  intimidé  : le même verbe est traduit par dompter en Jg 16.5s,19. –  leur multitude  : autre traduction leur tumulte. –  sur le mont Sion 29.5-8 ; 36–37.'
  - type: text
    content: 'Car ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Comme le lion, comme le jeune lion gronde sur sa proie
  - type: text
    content: et, malgré tous les bergers appelés contre lui,
  - type: text
    content: n'est ni terrifié par leurs cris,
  - type: text
    content: ni intimidé par leur multitude,
  - type: text
    content: 'ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées descendra'
  - type: text
    content: pour combattre sur le mont Sion et sur sa colline.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Comme les oiseaux…  : autre traduction comme les oiseaux qui volent (au-dessus de leur couvée pour la protéger) ; cf. Dt 32.11 ; Ps 17.8 ; 91.4. –  protégera 37.35. –  épargnera  : c''est du verbe hébreu correspondant que vient le nom de la Pâque (Ex 12.11n).'
  - type: text
    content: Comme les oiseaux déploient leurs ailes,
  - type: text
    content: 'ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées étendra sa protection sur Jérusalem ;'
  - type: text
    content: il protégera et délivrera,
  - type: text
    content: il épargnera et sauvegardera.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Litt. revenez à celui contre qui (ou ce contre quoi ) ils ont (ou on a ) approfondi (la) subversion , cf. 1.5n. Autre traduction revenez (1.27n) à celui contre qui les Israélites se sont rendus coupables d'une grave subversion  ; cf. 1.2-4.
  - type: text
    content: 'Revenez à celui qui est la cible de votre subversion profonde, Israélites ! '
  '7':
  - type: note
    content: '2.20n  ; 17.7s ; 30.22. –  rejettera  : autre traduction méprisera. –  pécheresses  : le terme correspondant est absent de plusieurs versions anciennes.'
  - type: text
    content: En ce jour-là, chacun rejettera ses faux dieux d'argent et ses faux dieux d'or, ceux que vos mains pécheresses vous ont faits.
  '8':
  - type: text
    content: ' '
  - type: note
    content: épée 27.1+.
  - type: text
    content: L'Assyrien tombera
  - type: text
    content: sous une épée qui n'est pas celle d'un homme,
  - type: text
    content: une épée qui n'est pas celle d'un être humain le dévorera ;
  - type: text
    content: il s'enfuira pour échapper à l'épée,
  - type: text
    content: et ses jeunes gens seront astreints à la corvée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Son Rocher  : peut-être le roi des Assyriens (cf. 32.1s) ou plutôt leur dieu (cf. 17.10). Autre traduction d''effroi (voir Jr 20.3n) , il fuira son rocher. –  devant (ou en quittant ) la bannière 5.26+. –  feu / fournaise 4.5 ; 10.17 ; 33.14 ; cf. 1R 11.36.'
  - type: text
    content: Son Rocher s'enfuira, effrayé,
  - type: text
    content: et ses chefs seront terrifiés devant la bannière
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a un feu dans Sion,'
  - type: text
    content: une fournaise dans Jérusalem.
