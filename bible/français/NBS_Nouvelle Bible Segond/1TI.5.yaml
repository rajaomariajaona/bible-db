document_id: 1TI.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une grande famille
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le vieillard
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ici, plutôt que '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'ancien
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de l''Eglise (même mot aux v. 17,19) ; la forme féminine du même terme est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'femmes âgées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 2 ; voir 4.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 4.12 ; Lv 19.32 ; Lm 5.12 ; Tt 2.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'encourage-le '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: exhorte-le
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: supplie-le
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon un autre sens du même verbe ; cf. 1Co 4.13 ; 1Th 2.11 ; Phm 9s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme un père…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mc 3.31ss/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jeunes gens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1P 5.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 18.15 ; 2Th 3.15.
    marker-yv: yv-n
  - type: text
    text: 'Ne réprimande pas rudement le vieillard, mais encourage-le comme un père – les jeunes gens comme des frères, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'femmes âgées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Tt 2.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 19.26 ; Rm 16.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jeunes femmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jeunes filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Mt 5.27ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pureté
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.12+.
    marker-yv: yv-n
  - type: text
    text: les femmes âgées comme des mères, les jeunes femmes comme des sœurs, en toute pureté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les veuves
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Honore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe grec correspondant peut suggérer l''octroi d''une aide matérielle ; cf. v. 17+ ; Nb 22.17,37 ; Mt 15.4/ / ; Ac 28.10 ; 1P 2.17 ; voir aussi 1Co 8–9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les veuves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 6.1ss ; 9.39 ; Jc 1.27 ; cf. Dt 10.18 ; 14.29 ; 24.17ss ; Ps 68.6 ; 146.9 ; Es 1.17 ; Mc 12.40ss/ / ; Lc 7.12 ; 18.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les vraies veuves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 5,16) font l''objet d''une liste (v. 9), d''après les critères exposés dans la suite : il s''agit notamment de celles qui n''ont aucun soutien familial.'
    marker-yv: yv-n
  - type: text
    text: 'Honore les veuves, les vraies veuves. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 16 ; voir aussi Nb 27.8ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'piété '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 20.12 ; Pr 19.26 ; 28.24 ; 30.17 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.12ss : « Mon fils, prends soin de ton père dans sa vieillesse… ton aumône envers ton père ne sera pas oubliée. A la place de tes péchés, elle sera pour toi une maison nouvelle. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans leur propre maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: envers leur propre famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'agréé de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si une veuve a des enfants ou des petits-enfants, qu''ils apprennent d''abord à exercer la piété dans leur propre maison et à payer de retour leurs parents, car c''est cela qui est agréé de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'a mis son espérance… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.10+ ; cf. Jr 49.11 ; Ps 123 ; 1P 3.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle persévère…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 2.37 ; 18.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nuit et jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Th 2.9 ; 3.10 ; 2Th 3.8 ; 2Tm 1.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'requêtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prières '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.1+.
    marker-yv: yv-n
  - type: text
    text: 'La vraie veuve, celle qui est restée seule, a mis son espérance en Dieu ; elle persévère nuit et jour dans les requêtes et les prières. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans les plaisirs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans l'insouciance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ez 16.49 ; Am 6.4 ; Pr 29.21 (termes apparentés dans '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ') ; Jc 5.5 ; autres termes Lc 7.25 ; 15.13 ; 2P 3.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: morte, quoique vivante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.19 ; Mt 8.22 ; Lc 15.24 ; Jc 2.17 ; Ap 3.1.'
    marker-yv: yv-n
  - type: text
    text: 'Mais celle qui vit dans les plaisirs est morte, quoique vivante. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enjoindre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''elles soient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils soient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 4,8) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'irrépréhensibles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voilà ce que tu dois enjoindre, pour qu''elles soient irrépréhensibles. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 4,16 ; 3.4s ; voir aussi 1Co 13.2 ; Ga 6.2,10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'a pas soin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne pourvoit pas aux besoins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: renié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.10 ; voir aussi Lc 8.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.9+ ; 2Tm 2.12s ; 3.5 ; Tt 1.16 ; 2.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la fidélité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre sens possible du même mot) ; cf. 6.21 ; Ap 2.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 11.26 ; 12.48 ; Jn 9.41 ; 15.22 ; Hé 10.29 ; Jc 4.17 ; 2P 2.20s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'non-croyant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'infidèle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Co 6.6+ ; 2Co 6.14s ; Tt 1.15.
    marker-yv: yv-n
  - type: text
    text: Et si quelqu'un n'a pas soin des siens, surtout de ceux de sa maison, il a renié la foi et il est pire qu'un non-croyant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour être inscrite sur la liste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour être reconnue comme telle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le terme grec correspondant a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: catalogue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la femme d''un seul homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'un seul mari
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. v. 5,11,14 ; 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',12.'
    marker-yv: yv-n
  - type: text
    text: 'Qu''une veuve, pour être inscrite sur la liste, n''ait pas moins de soixante ans, qu''elle ait été la femme d''un seul homme ; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''elle ait le témoignage de ses belles œuvres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(3.1+) : cf. 3.7,10 ; Ac 6.3 ; 16.2 ; Rm 10.2 ; Ga 4.15 ; Hé 11.2,4s,39. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enfants '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hospitalité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' (terme apparenté) ; Hé 13.2 ; cf. Mt 25.35 ; voir aussi 1R 17.10 ; 2R 4.8 ; Lc 10.38 ; Ac 16.15 ; Rm 16.1s ; Hé 11.31 ; Jc 2.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lavé les pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', geste d''hospitalité et d''humilité 1S 25.41 ; Lc 7.44 ; Jn 13.4ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 1.7+ ; peut-être s''agit-il ici, en particulier, des prédicateurs itinérants qui bénéficiaient de l''hospitalité des membres de l''Eglise, cf. 3Jn 5ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'venue en aide '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la détresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2Co 1.6 ; 7.5 ; 1Th 3.4 ; 2Th 1.6s ; Hé 11.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'être attachée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
