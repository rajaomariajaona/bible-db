document_id: 1TI.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une grande famille
  - type: text
    content: ' '
  - type: note
    content: 'le vieillard , ici, plutôt que l''ancien de l''Eglise (même mot aux v. 17,19) ; la forme féminine du même terme est traduite par femmes âgées au v. 2 ; voir 4.14n  ; cf. 4.12 ; Lv 19.32 ; Lm 5.12 ; Tt 2.2. –  encourage-le ou exhorte-le  ; on pourrait aussi comprendre supplie-le , selon un autre sens du même verbe ; cf. 1Co 4.13 ; 1Th 2.11 ; Phm 9s. –  comme un père…  : cf. Mc 3.31ss/ /. –  jeunes gens 1P 5.5. –  frères Mt 18.15 ; 2Th 3.15.'
  - type: text
    content: 'Ne réprimande pas rudement le vieillard, mais encourage-le comme un père – les jeunes gens comme des frères, '
  '10':
  - type: note
    content: 'qu''elle ait le témoignage de ses belles œuvres (3.1+) : cf. 3.7,10 ; Ac 6.3 ; 16.2 ; Rm 10.2 ; Ga 4.15 ; Hé 11.2,4s,39. –  enfants v. 4. –  hospitalité 3.2n (terme apparenté) ; Hé 13.2 ; cf. Mt 25.35 ; voir aussi 1R 17.10 ; 2R 4.8 ; Lc 10.38 ; Ac 16.15 ; Rm 16.1s ; Hé 11.31 ; Jc 2.25. –  lavé les pieds, geste d''hospitalité et d''humilité 1S 25.41 ; Lc 7.44 ; Jn 13.4ss. –  des saints Rm 1.7+ ; peut-être s''agit-il ici, en particulier, des prédicateurs itinérants qui bénéficiaient de l''hospitalité des membres de l''Eglise, cf. 3Jn 5ss. –  venue en aide v. 16. –  dans la détresse 2Co 1.6 ; 7.5 ; 1Th 3.4 ; 2Th 1.6s ; Hé 11.37. –  s''être attachée  : litt. avoir suivi, même verbe v. 24n  ; Mc 16.20 (accompagner) ; 1P 2.21. –  toute œuvre bonne 2.10+ ; 2Co 9.8.'
  - type: text
    content: 'qu''elle ait le témoignage de ses belles œuvres : pour avoir élevé des enfants, exercé l''hospitalité, lavé les pieds des saints, pour être venue en aide à ceux qui sont dans la détresse et s''être attachée à toute œuvre bonne. '
  '11':
  - type: note
    content: 'refuse 4.7n. –  jeunes veuves  : cf. v. 9. –  leurs désirs les détachent  : le verbe grec qui correspond à cette formule n''apparaît qu''ici dans le N.T. Il pourrait aussi évoquer l''arrogance ; un verbe apparenté est traduit par se complaire dans le luxe en Ap 18.7,9 ; cf. Mt 13.7,22. –  du Christ  : cf. 2Co 11.2.'
  - type: text
    content: 'En revanche, refuse les jeunes veuves ; car lorsque leurs désirs les détachent du Christ, elles veulent se marier '
  '12':
  - type: note
    content: 'à un jugement  : autre traduction à une condamnation  ; cf. v. 14 ; Rm 13.2 ; 1Co 11.29,33. –  rompu  : même verbe Ga 3.15 (abolir) ; 1Th 4.8 (rejeter) ; Hé 10.28 (violer) ; cf. Es 1.2 ; Jr 3.20 ; 5.11. –  engagement  : le mot grec est habituellement traduit par foi ou fidélité  ; cf. Ap 2.4s.'
  - type: text
    content: 'et s''exposent à un jugement pour avoir rompu leur premier engagement. '
  '13':
  - type: note
    content: 'oisives  : cf. Tt 1.12. –  elles cherchent à s''instruire…  : traduction incertaine ; autre possibilité elles apprennent à aller de maison en maison, cf. 2Tm 3.7. –  se mêlent de tout  : le mot correspondant fait assonance avec celui qui est rendu par oisives  ; un terme apparenté est traduit par s''agiter, avec un jeu d''assonance comparable, en 2Th 3.11n  ; une autre forme du même mot désigne les sciences occultes en Ac 19.19n.'
  - type: text
    content: Avec cela, comme elles sont oisives, elles cherchent à s'instruire en courant les maisons ; non contentes d'être oisives, elles sont bavardes et se mêlent de tout, parlant de ce dont il ne faudrait pas parler.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je souhaite 2.8n. –  les jeunes veuves  : litt. les jeunes , comme au v. 2. –  se marient  : cf. 1Co 7.7ss,32,40. –  des enfants v. 10 ; 2.15. –  l''adversaire  : cf. 3.6+s ; 2Th 2.4 ; Tt 2.8 ; 1P 5.8 ; voir aussi Lc 13.17 ; 21.15 ; 1Co 16.9 ; Ph 1.28. –  occasion ou prétexte , même terme Rm 7.8,11 ; 2Co 11.12 ; Ga 5.13. –  de médire  : litt. d''insulte , cf. 1P 3.9 ; termes apparentés 1Co 4.12 ; 5.11 ; 6.10.'
  - type: text
    content: 'Je souhaite donc que les jeunes veuves se marient, qu''elles aient des enfants, qu''elles soient de bonnes maîtresses de maison, de façon à ne donner à l''adversaire aucune occasion de médire. '
  '15':
  - type: note
    content: 'dévié 1.6n. –  pour suivre le Satan  : litt. derrière le Satan (voir démon, diable, Satan) ; cf. 2Co 6.4 ; 11.3 ; voir aussi Mt 16.24.'
  - type: text
    content: 'Car déjà quelques-unes ont dévié pour suivre le Satan. '
  '16':
  - type: note
    content: 'Cf. v. 4. –  une croyante  : certains mss portent quelque croyant ou croyante. –  a des veuves  : on peut comprendre dans sa parenté ou éventuellement chez elle  ; cf. Ac 9.39. –  vienne en aide v. 10. – Voir Eglise. –  charge 2Co 12.16 ; 1Th 2.9 ; 2Th 3.8. –  vraies veuves v. 3n.'
  - type: text
    content: Si une croyante a des veuves, qu'elle leur vienne en aide et que l'Eglise n'en ait pas la charge, pour que celle-ci puisse venir en aide à celles qui sont de vraies veuves.
  - type: heading
    content: Les anciens
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'anciens ou presbytres , 4.14n. –  dirigent 3.4n. –  bien ou de belle manière , cf. 3.1n,4,13. –  jugés dignes  : cf. Hé 3.3. –  un double honneur  : peut-être au sens de double rémunération , cf. v. 3n,18 ; 6.1,5s ; 1Co 16.18 ; Ph 2.29 ; 1Th 5.9 ; Siracide 7.31 : « Crains le Seigneur et honore le prêtre, donne-lui sa part comme il t''a été prescrit. » –  surtout 4.10. –  qui se donnent de la peine  : cf. 4.10n  ; 1Co 15.10 ; 16.16 ; Ga 5.11 ; Ph 2.16 ; Col 1.29. –  la Parole Ga 6.6 ; cf. 1Co 9.11.'
  - type: text
    content: 'Que les anciens qui dirigent bien soient jugés dignes d''un double honneur, surtout ceux qui se donnent de la peine dans la Parole et l''enseignement. '
  '18':
  - type: note
    content: 'l''Ecriture dit Rm 9.17. –  Tu ne muselleras… Dt 25.4  ; 1Co 9.9 ; voir aussi Mt 22.12n. –  L''ouvrier… Lc 10.7 ; cf. Nb 18.31 ; Dt 24.14s ; Mt 10.10 ; Jc 5.4 ; voir aussi 1Co 9.14. –  salaire  : 1Co 3.8+ ; 9.17n.'
  - type: text
    content: 'Car l''Ecriture dit : '
  - type: text
    content: Tu ne muselleras pas le bœuf qui foule le grain,
  - type: text
    content: ' et : L''ouvrier mérite son salaire. '
  '19':
  - type: note
    content: 'contre un ancien  : cf. v. 1n. –  deux ou trois témoins Dt 17.6 ; 19.15  ; Mt 18.16 ; Jn 8.17 ; 2Co 13.1 ; Hé 10.28.'
  - type: text
    content: 'Ne reçois pas d''accusation contre un ancien, sinon '
  - type: text
    content: sur la déposition de deux ou trois témoins
  - type: text
    content: '. '
  '2':
  - type: note
    content: 'femmes âgées v. 1n  ; Tt 2.3. –  mères  : cf. Jn 19.26 ; Rm 16.13. –  jeunes femmes ou jeunes filles, cf. Mt 5.27ss. –  pureté 4.12+.'
  - type: text
    content: les femmes âgées comme des mères, les jeunes femmes comme des sœurs, en toute pureté.
  - type: heading
    content: Les veuves
  '20':
  - type: note
    content: 'Ceux qui pèchent  : il s''agit peut-être, toujours, des anciens (v. 19) ; cf. Mt 18.15ss. –  reprends ou confonds, démasque, reprends, dévoile, dénonce, réfute  ; même verbe Mt 18.15 ; Jn 16.8 ; 1Co 14.24 ; Ep 5.11,13 ; 2Tm 4.2 ; Tt 1.9,13 ; 2.15 ; Hé 12.5. –  devant tout le monde  : litt. devant tous Ga 2.14. –  crainte  : cf. Rm 13.3,7 ; 2Co 7.11.'
  - type: text
    content: Ceux qui pèchent, reprends-les devant tout le monde, pour que les autres aussi aient de la crainte.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''adjure 2Tm 2.14 ; 4.1 ; cf. Ac 2.40n  ; 20.21. –  devant Dieu…  : cf. Dn 7.10 ; Lc 9.26 ; 2Th 1.7 ; Hé 12.22s ; Ap 14.10. –  Jésus-Christ  : cf. Jn 5.22,27 ; Ac 17.31 ; 2Co 5.10. –  les anges choisis ou élus  : cette expression désigne les anges fidèles, par opposition aux anges déchus (cf. 2P 2.4 ; Jd 6), dans des textes du judaïsme du Ier s. apr. J.-C. ; voir aussi Hé 2.14. –  préjugé / favoritisme  : les termes grecs correspondants n''apparaissent qu''ici dans le N.T. ; cf. Siracide 11.7 : « Ne blâme pas avant de t''être informé. »'
  - type: text
    content: 'Je t''adjure devant Dieu, devant Jésus-Christ et devant les anges choisis, d''observer ces règles sans préjugé et de ne rien faire par favoritisme. '
  '22':
  - type: note
    content: 'Cf. 3.2ss. –  impose… les mains 4.14+. –  hâtivement  : cf. v. 24s ; 3.6. –  ne te rends pas complice  : litt. ne prends pas part aux péchés d''autrui, verbe apparenté au mot habituellement traduit par communion ou solidarité  ; il peut aussi avoir le sens de souiller ou profaner (Mt 15.11n) ; cf. 1Tm 4.16 ; voir aussi Ez 3.18 ; 33.6,8 ; Ps 50.18ss ; 2Jn 11. –  pur 4.12+ ; cf. Ac 20.26 ; 2Co 7.11.'
  - type: text
    content: N'impose hâtivement les mains à personne, ne te rends pas complice des péchés d'autrui ; toi-même, garde-toi pur.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Recommandation fréquente chez les médecins de l''Antiquité ; cf. Nb 6.1ss ; Jr 35.5s ; Dn 1.12 ; 2 Maccabées 15.39 : « Il est nuisible de boire du vin pur ou de l''eau pure, alors que le vin mêlé à l''eau est une boisson agréable qui produit une délicieuse jouissance. »'
  - type: text
    content: 'Cesse de boire uniquement de l''eau ; fais usage d''un peu de vin, à cause de ton estomac et de tes fréquentes indispositions. '
  '24':
  - type: note
    content: 'Cf. v. 20,22. –  notoires  : cf. Hé 7.14. –  les précèdent…  : c.-à-d. ces péchés sont jugés avant même que leurs auteurs ne le soient  ; autre traduction les conduisent au jugement  ; cf. Jn 3.20s. –  ils le deviennent ensuite  : litt. ils suivent ou ils suivent aussi  ; cf. v. 10n  ; Ap 14.13.'
  - type: text
    content: 'Les péchés de certains sont d''emblée notoires et les précèdent dans le jugement ; chez d''autres, ils le deviennent ensuite. '
  '25':
  - type: note
    content: 'Cf. Mt 10.26 ; Lc 12.2 ; voir aussi Lc 6.43s. –  belles œuvres  : cf. 3.1+. –  celles qui ne le sont pas  : litt. celles qui sont autrement  ; certains comprennent celles qui ne sont pas belles, mais le sens le plus probable est celles qui ne sont pas notoires. –  ne peuvent rester cachées Mt 5.14.'
  - type: text
    content: 'De même, les belles œuvres sont notoires : même celles qui ne le sont pas ne peuvent rester cachées.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Honore  : le verbe grec correspondant peut suggérer l''octroi d''une aide matérielle ; cf. v. 17+ ; Nb 22.17,37 ; Mt 15.4/ / ; Ac 28.10 ; 1P 2.17 ; voir aussi 1Co 8–9. –  les veuves Ac 6.1ss ; 9.39 ; Jc 1.27 ; cf. Dt 10.18 ; 14.29 ; 24.17ss ; Ps 68.6 ; 146.9 ; Es 1.17 ; Mc 12.40ss/ / ; Lc 7.12 ; 18.3. –  les vraies veuves (v. 5,16) font l''objet d''une liste (v. 9), d''après les critères exposés dans la suite : il s''agit notamment de celles qui n''ont aucun soutien familial.'
  - type: text
    content: 'Honore les veuves, les vraies veuves. '
  '4':
  - type: note
    content: 'Cf. v. 16 ; voir aussi Nb 27.8ss. –  piété 2.2n  ; Ex 20.12 ; Pr 19.26 ; 28.24 ; 30.17 ; Siracide 3.12ss : « Mon fils, prends soin de ton père dans sa vieillesse… ton aumône envers ton père ne sera pas oubliée. A la place de tes péchés, elle sera pour toi une maison nouvelle. » –  dans leur propre maison ou envers leur propre famille. –  agréé de Dieu 2.3n.'
  - type: text
    content: 'Si une veuve a des enfants ou des petits-enfants, qu''ils apprennent d''abord à exercer la piété dans leur propre maison et à payer de retour leurs parents, car c''est cela qui est agréé de Dieu. '
  '5':
  - type: note
    content: 'a mis son espérance… 4.10+ ; cf. Jr 49.11 ; Ps 123 ; 1P 3.5. –  elle persévère…  : cf. Lc 2.37 ; 18.1ss. –  nuit et jour 1Th 2.9 ; 3.10 ; 2Th 3.8 ; 2Tm 1.3. –  requêtes / prières 2.1+.'
  - type: text
    content: 'La vraie veuve, celle qui est restée seule, a mis son espérance en Dieu ; elle persévère nuit et jour dans les requêtes et les prières. '
  '6':
  - type: note
    content: 'dans les plaisirs ou dans l''insouciance  ; cf. Ez 16.49 ; Am 6.4 ; Pr 29.21 (termes apparentés dans LXX) ; Jc 5.5 ; autres termes Lc 7.25 ; 15.13 ; 2P 3.13. –  morte, quoique vivante  : cf. 6.19 ; Mt 8.22 ; Lc 15.24 ; Jc 2.17 ; Ap 3.1.'
  - type: text
    content: 'Mais celle qui vit dans les plaisirs est morte, quoique vivante. '
  '7':
  - type: note
    content: enjoindre 1.3n  ; 4.11. –  qu'elles soient (autre traduction possible qu'ils soient  ; cf. v. 4,8) irrépréhensibles 3.2n.
  - type: text
    content: 'Voilà ce que tu dois enjoindre, pour qu''elles soient irrépréhensibles. '
  '8':
  - type: note
    content: 'Cf. v. 4,16 ; 3.4s ; voir aussi 1Co 13.2 ; Ga 6.2,10. –  n''a pas soin  : autre traduction ne pourvoit pas aux besoins. –  renié  : cf. 2.10 ; voir aussi Lc 8.45n  ; 12.9+ ; 2Tm 2.12s ; 3.5 ; Tt 1.16 ; 2.12. –  la foi  : certains comprennent la fidélité (autre sens possible du même mot) ; cf. 6.21 ; Ap 2.13. –  pire  : cf. Lc 11.26 ; 12.48 ; Jn 9.41 ; 15.22 ; Hé 10.29 ; Jc 4.17 ; 2P 2.20s. –  non-croyant ou infidèle 1Co 6.6+ ; 2Co 6.14s ; Tt 1.15.'
  - type: text
    content: Et si quelqu'un n'a pas soin des siens, surtout de ceux de sa maison, il a renié la foi et il est pire qu'un non-croyant.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3n. –  pour être inscrite sur la liste  : autre traduction pour être reconnue comme telle  ; le terme grec correspondant a donné notre mot catalogue . –  la femme d''un seul homme (ou d''un seul mari ) : cf. v. 5,11,14 ; 3.2n,12.'
  - type: text
    content: 'Qu''une veuve, pour être inscrite sur la liste, n''ait pas moins de soixante ans, qu''elle ait été la femme d''un seul homme ; '
