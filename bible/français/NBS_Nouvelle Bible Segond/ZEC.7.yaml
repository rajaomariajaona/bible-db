document_id: ZEC.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jeûne commémorant la ruine de Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'La quatrième année…  : novembre 518 (cf. 1.1n).'
  - type: text
    content: 'La quatrième année du roi Darius, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Zacharie, le quatrième jour du neuvième mois – le mois de Kislev. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 8.17 ; Ex 22.21s ; Dt 24.17 ; Es 1.16s ; Jr 7.6 ; Ez 22.29 ; Am 8.4 ; Pr 22.22.
  - type: text
    content: N'opprimez pas la veuve et l'orphelin,
  - type: text
    content: l'immigré et le pauvre,
  - type: text
    content: et ne préparez pas en votre cœur
  - type: text
    content: de mal l'un contre l'autre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Né 9.16,29 ; voir aussi Es 6.10 ; Jr 18.12. –  ils se sont montrés rebelles  : litt. ils ont présenté une épaule rebelle  ; cf. Né 9.29n. –  se sont bouché  : litt. ont alourdi  ; cf. Es 59.1n.'
  - type: text
    content: 'Mais ils ont refusé de prêter attention, ils se sont montrés rebelles et se sont bouché les oreilles pour ne pas entendre. '
  '12':
  - type: note
    content: 'leur cœur… 2R 17.14 ; Ez 2.4 ; 3.7-9 ; 11.19. –  loi / prophètes (v. 7+) : cf. Mt 7.12+. –  son souffle ou son Esprit.'
  - type: text
    content: 'Ils ont rendu leur cœur dur comme le diamant pour ne pas écouter la loi et les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées leur avait envoyées par son souffle, par l''intermédiaire des prophètes d''autrefois. Cela fut la cause d''une grande irritation de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '13':
  - type: note
    content: Cf. Es 50.2 ; 65.12 ; 66.4 ; Jr 7.13 ; 11.11 ; 35.17 ; Pr 1.24,28. –  ils n'ont pas écouté et je n'entendrai pas traduisent deux formes d'un même verbe hébreu (aussi aux v. 11s).
  - type: text
    content: 'Quand il appelait, ils n''ont pas écouté ; aussi je n''entendrai pas quand ils appelleront, a dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '14':
  - type: note
    content: 'Cf. 2.4 ; Jr 16.13 ; 25.11 ; Ez 14.15 ; 32.9. –  dispersés  : autres traductions éparpillés ; emportés comme une tempête. –  pays de délices Ps 106.24+.'
  - type: text
    content: Je les ai dispersés parmi toutes les nations qu'ils ne connaissaient pas ; le pays a été dévasté derrière eux, personne n'y passait, personne n'y revenait ; d'un pays de délices ils ont fait une dévastation.
  '2':
  - type: note
    content: 'Ce v. a été fort diversement traduit par les versions anciennes ; au lieu de la ville de Beth-El (Esd 2.28 ; Né 7.32) il pourrait s''agir d''un nom de personne, composé d''hébreu et d''assyro-babylonien  : Beth-El-Sarétser avait envoyé Réguem-Mélek…, voire d''un nom et d''un titre  : Beth-El-Sarétser, haut fonctionnaire (= Réguem  ; cf. Jr 39.3,13) du roi (= Mélek), avait envoyé ses gens…  ; la requête viendrait alors probablement d''Israélites installés à Babylone. –  essayer d''apaiser  : litt. caresser la face de, de même en 8.21s ; voir Ex 32.11n.'
  - type: text
    content: 'Beth-El avait envoyé Sarétser et Réguem-Mélek avec ses gens pour essayer d''apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: ' '
  '3':
  - type: note
    content: 'aux prêtres  : cf. Ag 2.11n  ; voir aussi Ez 7.26 ; Ml 2.7. –  au cinquième mois  : le jeûne du 9 Ab (juillet-août) commémorait la destruction du temple en 587/6 av. J.-C. (2R 25.8s ; cf. Jl 2.12 ; Ps 137.1 ; Lm 2.18) ; la question est ici de savoir si l''on doit continuer à l''observer alors que la reconstruction a commencé (cf. Ag 2.18 ; Za 4.9). –  fasse abstinence  : verbe apparenté au mot nazir Nb 6.2n.'
  - type: text
    content: 'et pour dire aux prêtres de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées et aux prophètes : Faut-il que je pleure au cinquième mois et que je fasse abstinence, comme je l''ai fait depuis tant d''années ?'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Seigneur (YHWH) des Armées 1S 1.3n  ; voir noms divins.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées me parvint :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'au septième mois  : en souvenir de l''assassinat de Guedalia et de la désolation du pays, deux mois après le sac de la ville et du temple (2R 25.25s ; Jr 41.1-3). –  soixante-dix ans  : cf. 1.12n. –  est-ce vraiment pour moi  : cf. Es 58.3,5 ; Mt 6.16.'
  - type: text
    content: 'Dis à tout le peuple du pays et aux prêtres :'
  - type: text
    content: Quand vous avez jeûné, quand vous vous êtes lamentés
  - type: text
    content: au cinquième et au septième mois,
  - type: text
    content: et cela depuis soixante-dix ans,
  - type: text
    content: est-ce vraiment pour moi que vous avez tant jeûné ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Rm 14.6ss.
  - type: text
    content: Quand vous mangez et buvez,
  - type: text
    content: n'est-ce pas vous qui mangez et vous qui buvez ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'prophètes d''autrefois v. 12 ; 1.4 ; cf. Dt 18.7-18 ; Jr 32.44 ; 33.13. –  Bas-pays  : hébreu shephéla.'
  - type: text
    content: 'N''est-ce pas là ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a proclamé par l''intermédiaire des prophètes d''autrefois, lorsque Jérusalem était habitée et tranquille, avec les villes des alentours, et que le Néguev et le Bas-pays étaient habités ?'
  '8':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Zacharie :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: '8.16 ; Jr 7.5 ; Am 5.14s ; Mi 6.8 ; Pr 21.21 ; Mt 23.23. –  Jugez loyalement  : litt. jugez d''un jugement de loyauté ou de vérité (cf. 8.16n). Le terme correspondant à jugement est souvent traduit par droit.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Jugez loyalement,
  - type: text
    content: agissez l'un envers l'autre
  - type: text
    content: avec fidélité et compassion.
