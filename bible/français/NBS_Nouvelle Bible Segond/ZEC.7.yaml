  - type: text
    text: 'Dis à tout le peuple du pays et aux prêtres :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand vous avez jeûné, quand vous vous êtes lamentés
- type: usfm
  marker: q1
  children:
