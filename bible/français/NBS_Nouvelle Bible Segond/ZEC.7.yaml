        - type: text
          text: temple
      - type: text
        text: ' en 587/6 av. J.-C. (2R 25.8s ; cf. Jl 2.12 ; Ps 137.1 ; Lm 2.18) ; la question est ici de savoir si l''on doit continuer à l''observer alors que la reconstruction a commencé (cf. Ag 2.18 ; Za 4.9). –  '
