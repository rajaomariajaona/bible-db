- type: usfm
  marker: q1
  children:
  - type: text
    text: et cela depuis soixante-dix ans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: est-ce vraiment pour moi que vous avez tant jeûné ?
- type: usfm
  marker: q1
  children:
