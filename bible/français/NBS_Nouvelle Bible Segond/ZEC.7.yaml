  - type: text
    text: 'Ils ont rendu leur cœur dur comme le diamant pour ne pas écouter la loi et les paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées leur avait envoyées par son souffle, par l''intermédiaire des prophètes d''autrefois. Cela fut la cause d''une grande irritation de la part du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées. '
  - type: usfm
