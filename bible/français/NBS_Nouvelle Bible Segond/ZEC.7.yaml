    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées et aux prophètes : Faut-il que je pleure au cinquième mois et que je fasse abstinence, comme je l''ai fait depuis tant d''années ?'
