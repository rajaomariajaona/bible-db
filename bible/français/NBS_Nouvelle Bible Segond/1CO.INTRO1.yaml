type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Le recueil des écrits de Paul classe les lettres par ordre de longueur : seule l''épître aux Romains (5,19% du Nouveau Testament) dépasse en volume 1 Corinthiens (4,28%) et 2 Corinthiens (3,22%). L''ensemble des deux épîtres aux Corinthiens représente donc une part substantielle de l''œuvre de l''apôtre. Pourtant, toute sa correspondance avec l''Eglise de Corinthe ne semble pas nous être parvenue.'
  - type: text
    content: 'Qu''est devenue en effet la lettre mentionnée en 1 Corinthiens 5.9-13 ? Et la lettre « dans les larmes » (2Co 2.3 ; 7.8) ? Elles semblent bel et bien perdues, quoique certains aient cru les retrouver, au moins de façon fragmentaire, dans telle ou telle partie de ce que nous appelons « les deux épîtres aux Corinthiens ». Il faut reconnaître que la Seconde épître, en particulier, présente un certain nombre de '
  - type: text
    content: transitions difficiles
  - type: text
    content: ' (2.11/12,13/14 ; 6.2/3,13/14 ; 7.16 / 8.1 ; 8.24 / 9.1 ; et surtout 9.15 / 10.1 ; on a aussi vu la possibilité de deux enchaînements différents entre 2.11 et 2.14 ou entre 2.13 et 7.5). Il n''est donc pas impossible que plusieurs lettres aient été assemblées en un seul recueil pour former notre Seconde épître aux Corinthiens. Mais les reconstructions proposées sont aussi conjecturales que nombreuses.'
  - type: text
    content: En tout état de cause, Paul est l'auteur de ces écrits, qu'il adresse à une Eglise qu'il a fondée. Avant lui, nul n'a prononcé le nom de Jésus ou du Christ à Corinthe.
  - type: text
    content: Dans cette ville en pleine expansion, capitale de la province romaine d'Achaïe, vit une population
  - type: text
    content: cosmopolite
  - type: text
    content: ' venue de tous les horizons du bassin méditerranéen. Le récit des Actes (18.1-18) relate l''arrivée de Paul et la fondation de cette Eglise. C''est une communauté toute neuve qui, bien que sortie de la synagogue, s''accroît rapidement et se trouve composée en grande partie de gens de condition modeste, Grecs et autres croyants d''origine païenne. Le mélange des Juifs et des Grecs va très vite susciter des difficultés, provoquer des tensions dans la vie communautaire. Les réponses et les réactions de l''apôtre vont apparaître dans les deux lettres.'
  - type: text
    content: LA PREMIÈRE AUX CORINTHIENS
  - type: text
    content: Des informations préoccupantes
  - type: text
    content: 'Des nouvelles et des questions sont parvenues à Paul par divers canaux :'
  - type: text
    content: '1) '
  - type: text
    content: Les gens de Chloé
  - type: text
    content: ' (1.11'
  - type: text
    content: n
  - type: text
    content: ') lui ont fourni des informations officieuses portant sur des '
  - type: text
    content: divisions
  - type: text
    content: ' et sur trois cas de '
  - type: text
    content: désordres
  - type: text
    content: ' graves. Il les traite en premier lieu (1.1–6.20).'
  - type: text
    content: '2) Les Corinthiens ont écrit pour demander des conseils à l''apôtre. C''est la lettre à laquelle fait allusion 7.1. Paul se prononce de 7.1 à 11.1 sur le '
  - type: text
    content: mariage
  - type: text
    content: ' et le '
  - type: text
    content: célibat
  - type: text
    content: ' et sur la consommation des '
  - type: text
    content: viandes sacrifiées aux idoles
  - type: text
    content: .
  - type: text
    content: '3) Stéphanas, Fortunatus et Achaïcos (16.17) ont eu des entretiens avec l''apôtre. Celui-ci décide d''écrire sur la tenue dans les '
  - type: text
    content: assemblées chrétiennes
  - type: text
    content: ' (11.2–14.40), puis sur la '
  - type: text
    content: résurrection
  - type: text
    content: ' du Christ et des siens (15.1-58).'
  - type: text
    content: Une situation multi-conflictuelle
  - type: text
    content: Le tableau corinthien montre un beau désordre, et celui-ci n'est pas un effet de l'art !
  - type: text
    content: 'La '
  - type: text
    content: nouveauté
  - type: text
    content: ' chrétienne et les expériences qu''elle induit accentuent les clivages d''une communauté peu homogène. On va presque à la fracture. Même l''apôtre fondateur est devenu la cible des contestataires dans l''effervescence des prétentions rivales.'
  - type: text
    content: 'Des '
  - type: text
    content: partis
  - type: text
    content: ' se sont formés. Ils se réclament des divers prédicateurs passés par Corinthe (même Céphas, c''est-à-dire Pierre, a pu leur rendre visite, cf. 9.5). La fascination de plusieurs pour la « sagesse » est à l''origine de divisions et contribue à la dévaluation de l''autorité apostolique. S''agit-il seulement du goût traditionnel des Grecs pour les joutes oratoires et pour la dialectique ? Il a sa part, sans doute. Mais il y a aussi l''attirance, peut-être plus marquée chez les Juifs, pour les miracles, les signes de puissance. Le levain des futurs courants gnostiques (voir « La question gnostique », p. XXX) serait-il déjà à l''œuvre ? Plusieurs s''enflent d''une '
  - type: text
    content: connaissance
  - type: text
    content: ' (en grec '
  - type: text
    content: gnôsis
  - type: text
    content: ') de super-spirituels (8.1s). Ils s''estiment '
  - type: text
    content: forts
  - type: text
    content: ' et méprisent les '
  - type: text
    content: faibles
  - type: text
    content: . Ils frôlent même la provocation envers Dieu (10.22). Cette connaissance, ou sagesse, a moins rapport aux arguments et au savoir qu'à l'
  - type: text
    content: expérience
  - type: text
    content: ' grisante de la liberté à l''égard de la loi (chap. 6–10).'
  - type: text
    content: 'Ceux qui partagent cette prétention à la sagesse, prétention qui peut elle-même revêtir des formes diverses, ne voient guère pourquoi ils changeraient de conduite dans la cité païenne ; ils choquent, et parfois scandalisent, leurs frères issus du judaïsme et d''autres, attachés eux aussi aux directives de l''Ancien Testament. Le conflit est ouvert sur la question des '
  - type: text
    content: viandes sacrifiées aux idoles
  - type: text
    content: ' (elle symbolise tout le problème du rapport avec la société idolâtre) : les viandes qu''on vendait sur les marchés de Corinthe venaient, habituellement, d''animaux immolés dans des temples (chap. 8–10). De même, des divergences majeures apparaissent à propos de la '
  - type: text
    content: 'morale sexuelle :'
  - type: text
    content: ' certains se croient libres de fréquenter les prostituées (6.15), d''autres voient au contraire un avantage « spirituel » à s''abstenir du mariage (7.1-2), préférant peut-être former des couples ascétiques (7.36'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: 'De manière plus globale, le '
  - type: text
    content: rapport homme-femme
  - type: text
    content: ' est remis en cause. Un courant d''émancipation féminine fait surface (11.2-16), qui s''autorise probablement de l''enseignement de l''apôtre, pour qui, '
  - type: text
    content: en Jésus-Christ, il n'y a plus ni homme ni femme
  - type: text
    content: ' (cf. Ga 3.28).'
  - type: text
    content: 'L''antagonisme des '
  - type: text
    content: classes sociales
  - type: text
    content: ' se prolonge dans l''Eglise. Les chrétiens ont entre eux des procès (1Co 6.1-11), et les riches humilient outrageusement les pauvres lors de la célébration du repas de l''unité communautaire : le repas du Seigneur devient celui de l''égoïsme des nantis (11.17-34).'
  - type: text
    content: 'A tous ces facteurs de tension et de division s''ajoutent ceux qui sont liés à la diversité des '
  - type: text
    content: dons spirituels
  - type: text
    content: ' (chap. 12–14). Les différences sont l''occasion ou le prétexte de dépréciation réciproque. Dans certains cas, elles donnent lieu à des remontées de mysticisme païen : quelques-uns cherchent avant tout à ressentir intensément, au point que l''expérience échappe au contrôle de la Parole (12.2).'
  - type: text
    content: La discipline de la grâce
  - type: text
    content: Comment l'apôtre traite-t-il les maladies infantiles du pagano-christianisme telles qu'elles se sont déclarées à Corinthe ? On appréciera, en lisant l'épître, l'originalité de son effort pour tracer la voie sans tomber dans le légalisme.
  - type: text
    content: 'Jamais l''ancien rabbin pharisien ne met en doute l''autorité normative de la loi divine (voir en particulier 9.21), mais il ne l''invoque pas directement, et il évite avec soin de l''imposer comme un joug. Pour lutter contre l''aberration permissive, il réoriente le regard, il le concentre sur '
  - type: text
    content: le Christ
  - type: text
    content: '. Un Christ qui n''est pas divisé (1.13) ; un Christ qui est la sagesse et la puissance de Dieu (1.30) ; un Christ dont les apôtres communiquent la pensée (2.16) ; un Christ qui s''intéresse au '
  - type: text
    content: corps
  - type: text
    content: ' et dont les membres ne sauraient s''unir à une prostituée (6.13,15) ; un Christ qui est mort pour le frère, mon frère, que j''éviterai de blesser (8.11) ; un Christ dont la mort est signifiée à la Cène (11.20ss) ; un Christ qui baptise dans l''Esprit pour se constituer un unique corps (12.13) ; un Christ ressuscité qui est les '
  - type: text
    content: prémices
  - type: text
    content: ' des croyants décédés (15.20)… Dans ce Christ, le souci d''édifier l''Eglise l''emporte sur l''obsession de la justice légale.'
  - type: text
    content: 'Dans le tourbillon des tendances divergentes, comme entre les dons et leur exercice, trois choses demeurent : la foi, l''espérance et l''amour ; la plus grande de ces trois, la voie par excellence, c''est l''amour. Trouverait-on, à lire la description qu''en fait l''apôtre, portrait plus fidèle du Christ ?'
  - type: text
    content: LA SECONDE AUX CORINTHIENS
  - type: text
    content: 'La Seconde aux Corinthiens est la plus '
  - type: text
    content: autobiographique
  - type: text
    content: ' des lettres de l''apôtre Paul. Sur les huit « catalogues » de circonstances vécues qu''il a rédigés, cinq se trouvent ici :'
  - type: text
    content: '–deux listes procèdent par antithèses : 4.8-9 et 6.8-10 ;'
  - type: text
    content: '–trois listes procèdent par énumération : 6.4b-5 ; 12.10 et surtout 11.22-29, de loin la plus longue avec ses six strophes.'
  - type: text
    content: 'Un peu plus loin, nous apprenons comment Paul a pu fuir de Damas, descendu dans une corbeille le long de la muraille (11.32-33). On découvre ici tout ce que le livre des Actes nous laisse ignorer d''une vie si mouvementée : deux flagellations par les Romains, cinq par les Juifs, trois naufrages… ! Est-ce parce que Paul vient d''échapper à la mort (1.3-11) qu''il raconte ainsi sa vie ? Il avait fait allusion en 1 Corinthiens 15.32 à un combat mortel et semble s''y référer encore en 2 Corinthiens 1.8-10.'
  - type: text
    content: 'Paul a dû être libéré de prison fin 54 ou début 55 – un changement d''administration a suivi la mort du proconsul Julius Silanus, empoisonné à l''instigation d''Agrippine. Cette libération serait alors la '
  - type: text
    content: grâce
  - type: text
    content: ' obtenue par un grand nombre d''intercesseurs (1.11).'
  - type: text
    content: 'Certaines références autobiographiques de 2 Corinthiens intriguent. Quelles suppositions n''a-t-on pas faites, par exemple, sur les expériences spirituelles de l''apôtre, ou sur son '
  - type: text
    content: écharde dans la chair
  - type: text
    content: ' (12.1-7n) ! Si la curiosité reste insatisfaite, la foi, elle, pourra toujours se nourrir des réflexions de Paul sur sa propre existence, telle qu''il la vit devant Dieu. Par exemple, de cette parole que Dieu lui adresse alors même qu''il est aux prises avec ses limites : '
  - type: text
    content: Ma grâce te suffit, car ma puissance s'accomplit dans la faiblesse
  - type: text
    content: ' (12.9).'
  - type: text
    content: 'L''épître montre l''apôtre au cœur de tout un '
  - type: text
    content: réseau d'Eglises hellénistiques
  - type: text
    content: ' dont il est le fondateur, soit directement, soit par le moyen de son équipe apostolique.'
  - type: text
    content: Mort de la chair et vie de l'Esprit
  - type: text
    content: 'Ces circonstances introduisent une idée qui parcourt l''épître entière : la condition de la vie de l''Esprit, c''est un '
  - type: text
    content: processus de mort
  - type: text
    content: '. '
  - type: text
    content: Car nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus, afin que la vie de Jésus aussi se manifeste dans notre chair mortelle. Ainsi, en nous, c'est la mort qui est à l'œuvre, mais en vous, c'est la vie
  - type: text
    content: ' (4.11s ; cf. 1.9 ; 2.16 ; 4.16 ; 5.1-4,14-15 ; 6.9 ; 12.9-10 ; 13.4,9).'
  - type: text
    content: 'L''insistance de l''apôtre vise une tendance très présente dans l''Eglise de Corinthe. Les opposants sont pour la plupart des judaïsants (11.22). Friands de visions ou d''inspirations hors du commun, de prodiges et de miracles, ils aiment l''éloquence. Ils refusent clairement l''apostolat « christologique » de Paul. Ils accueillent avec faveur de faux apôtres, des missionnaires trompeurs camouflés en apôtres du Christ (11.13s), si prétentieux que Paul les appelle '
  - type: text
    content: super-apôtres
  - type: text
    content: ' (11.5 ; 12.11).'
  - type: text
    content: 'De quelle maladie spirituelle sont-ils affectés ? Ils souffrent de carences christologiques et eschatologiques. Ils se trompent sur la réalisation du salut dans l''histoire. Ils oublient l''abaissement et la réalité de la mort du Christ sur la croix, autant que l''importance de l''attente d''un achèvement encore futur fondée sur la résurrection. Pour se faire comprendre, Paul va tirer argument de sa faiblesse même (10.1–13.10). En se consacrant à son '
  - type: text
    content: apostolat
  - type: text
    content: ', qui est de'
  - type: text
    content: service
  - type: text
    content: ' et de '
  - type: text
    content: doctrine
  - type: text
    content: ', Paul va faire la démonstration de l''action du Christ dans sa propre personne.'
  - type: text
    content: '–Un '
  - type: text
    content: apostolat de service
  - type: text
    content: '  : son autorité apostolique est d''autant plus vraie qu''elle se manifeste dans la faiblesse. Aux Corinthiens, qui n''ont pas connu le Christ, Paul – faisant de sa propre vie un signe – proclame et figure l''abaissement du Christ (10.1). Ceux qui sont déjà en marche vers le salut ont encore besoin de découvrir la mort du Christ, comme ceux qui se perdent ont besoin de découvrir sa vie. Christ vit en Paul et parle par lui (13.3).'
  - type: text
    content: '–Un '
  - type: text
    content: apostolat de doctrine
  - type: text
    content: '  : Jésus en est le centre (1.2-4) ; l''Esprit l''inspire (11.4) ; l''Evangile en est la référence (11.4). C''est le ministère de l''alliance nouvelle (3.1-6). Celui qui l''a reçu ne perd pas courage (4.1), car '
  - type: text
    content: ce qui est ancien est passé
  - type: text
    content: ', et ce ministère est le ministère de la réconciliation (5.14-20).'
  - type: text
    content: 'La '
  - type: text
    content: vivacité du style
  - type: text
    content: ' atteint dans l''épître un degré encore insurpassé, les changements de ton font rebondir l''attention, les images et les antithèses crépitent, des formules vigoureusement frappées se gravent dans la mémoire du lecteur. Qui ne connaît ces expressions contrastées (qu''on utilise parfois dans un sens fort différent de celui voulu par l''auteur !) :'
  - type: text
    content: –
  - type: text
    content: la lettre tue, mais l'Esprit fait vivre
  - type: text
    content: ' (3.6)'
  - type: text
    content: –
  - type: text
    content: nous portons ce trésor dans des vases de terre
  - type: text
    content: ' (4.7)'
  - type: text
    content: –
  - type: text
    content: lui (Jésus-Christ) qui était riche, il s'est fait pauvre à cause de vous, pour que, vous, par sa pauvreté, vous deveniez riches
  - type: text
    content: ' (8.9)'
  - type: text
    content: –
  - type: text
    content: si je suis profane pour ce qui est de l'éloquence, je ne le suis pas pour ce qui est de la connaissance
  - type: text
    content: ' (11.6).'
  - type: text
    content: L'apôtre va même jusqu'à la légère ironie pour stimuler les Corinthiens à la générosité (9.1-5). A l'occasion de la collecte, dont il veut faire le signe d'une communion partagée entre les Eglises, Paul montre comment il sait allier le brio de la forme à la vigueur de l'exhortation, le sens pratique à la profondeur théologique.
  - type: text
    content: 'Certes, l''Eglise de Corinthe s''est divisée ; elle a été tentée par une liberté facile qui a montré ses effets pervers. Néanmoins, le Christ est là. L''apôtre rappelle à chacun (13.5) la nécessité de s''évaluer à la mesure définie par le Christ : '
  - type: text
    content: Mettez-vous vous-mêmes à l'épreuve, pour voir si vous êtes dans la foi ; examinez-vous vous-mêmes. Ne reconnaissez-vous pas que Jésus-Christ est en vous ?
