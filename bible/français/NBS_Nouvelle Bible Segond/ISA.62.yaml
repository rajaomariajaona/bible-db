document_id: ISA.62,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem retrouve le Seigneur, son époux
  - type: text
    content: ' '
  - type: note
    content: 'je ne me tairai pas  : cf. 42.14+. –  sa justice / son salut ( à elle ) : les pronoms de l''hébreu renvoient à Sion ou Jérusalem , personnifiée comme une femme ; LXX ma justice / mon salut. –  s''impose  : litt. sorte , cf. 42.1nss ; 51.4s. –  comme une clarté  : litt. comme la clarté  ; cf. 60.1,3.'
  - type: text
    content: A cause de Sion je ne me tairai pas,
  - type: text
    content: à cause de Jérusalem, je ne me tiendrai pas tranquille
  - type: text
    content: jusqu'à ce que sa justice s'impose, comme une clarté,
  - type: text
    content: et son salut, comme un flambeau qui s'allume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Préparez / Frayez 40.3+. –  ôtez les pierres  : cf. 5.2 ; certains comprennent pavez de pierres. –  bannière 5.26+ ; cf. 11.12 ; 49.22.'
  - type: text
    content: Passez, passez les portes !
  - type: text
    content: Préparez un chemin pour le peuple !
  - type: text
    content: Frayez, frayez la route,
  - type: text
    content: ôtez les pierres !
  - type: text
    content: Elevez une bannière au-dessus des peuples !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Za 9.9 ; Mt 21.5. –  Sion la belle  : litt. la fille de Sion  ; cf. 1.8n. –  Ton salut , comme en 45.8. Plusieurs versions anciennes ont traduit ton sauveur  ; cf. 43.3+. –  il a avec lui son salaire…  : cf. 40.10.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le fait entendre'
  - type: text
    content: 'aux extrémités de la terre :'
  - type: text
    content: 'Dites à Sion la belle :'
  - type: text
    content: Ton salut arrive ;
  - type: text
    content: il a avec lui son salaire,
  - type: text
    content: sa rétribution le précède.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'On les appellera v. 2+. –  Peuple saint ou sacré , ou Peuple du saint, de la sainteté  ; cf. 61.6 ; Ex 19.6. –  Rédimés ou Rachetés  ; cf. 35.10 ; voir aussi 41.14n  ; 63.4n  ; Ps 107.2. –  Cherchée  : cf. Jr 30.17.'
  - type: text
    content: On les appellera « Peuple saint »,
  - type: text
    content: '« Rédimés du '
  - type: text
    content: Seigneur
  - type: text
    content: '  » ;'
  - type: text
    content: et toi, on t'appellera « Cherchée »,
  - type: text
    content: « Ville non délaissée ».
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'nations / rois 60.3,11. – Voir justice et gloire. –  nom nouveau  : cf. v. 4,12 ; 65.15 ; Ap 2.17 ; 3.12. –  désignera  : le verbe hébreu correspondant est aussi traduit par percer  ; il a peut-être ici la nuance particulière de pointer ou de fixer  ; cf. Gn 30.28.'
  - type: text
    content: Alors les nations verront ta justice
  - type: text
    content: et tous les rois ta gloire ;
  - type: text
    content: et on t'appellera d'un nom nouveau
  - type: text
    content: 'que la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ' désignera.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'couronne de splendeur  : même expression en Jr 13.18 ; Ez 16.12 ; 23.42 ; Pr 4.9 ; 16.31.'
  - type: text
    content: Tu seras une couronne de splendeur
  - type: text
    content: 'dans la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: un turban royal
  - type: text
    content: dans la paume de ton Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Délaissée 54.1+ ; cf. 60.15. –  Dévastation cf. 49.8. –  Mon plaisir est en elle ou « Je prends plaisir en elle », « Elle me plaît » (cf. Gn 34.19 ; Nb 14.8n), hébreu Hephtsi-bah , cf. 2R 21.1n. –  épousée 54.5-8.
  - type: text
    content: On ne te dira plus « Délaissée »,
  - type: text
    content: on ne dira plus ta terre « Dévastation » ;
  - type: text
    content: mais on t'appellera « Mon plaisir est en elle »,
  - type: text
    content: et on appellera ta terre « L'Epousée » ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prend plaisir en toi,'
  - type: text
    content: et ta terre sera épousée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'une jeune fille  : litt. une vierge. –  tes fils  : certains modifient la vocalisation pour lire tes bâtisseurs (cf. 49.17n). –  t''épouseront 49.18. –  marié 61.10.'
  - type: text
    content: Comme un jeune homme épouse une jeune fille,
  - type: text
    content: ainsi tes fils t'épouseront ;
  - type: text
    content: et comme la mariée fait la gaieté du marié,
  - type: text
    content: ainsi tu feras la gaieté de ton Dieu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'murs 49.16. –  gardes 21.11 ; cf. 21.6-8 ; 52.8. –  qui évoquez…  : autres traductions qui rappelez le souvenir du Seigneur  ; qui évoquez le nom du Seigneur (YHWH)  ; ou bien qui appelez le Seigneur à se souvenir (cf. v. 7 ; 43.26 ; 49.14s). –  répit  : autre traduction silence (même terme au v. 7).'
  - type: text
    content: Sur tes murs, Jérusalem,
  - type: text
    content: j'ai posté des gardes ;
  - type: text
    content: de jour comme de nuit, ils ne se tairont pas.
  - type: text
    content: 'Vous qui évoquez le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: pas de répit pour vous !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ne lui laissez aucun répit  : cf. Lc 11.5-13 ; 18.1-8. –  louange 60.18 ; 61.11.'
  - type: text
    content: Ne lui laissez aucun répit,
  - type: text
    content: jusqu'à ce qu'il rétablisse Jérusalem
  - type: text
    content: et en fasse un sujet de louange sur la terre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'juré 45.23+. –  droite 41.10. –  bras 40.11+ ; 51.9. –  ton blé à tes ennemis Dt 28.30-35 ; Né 5.15. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a juré par sa main droite'
  - type: text
    content: 'et par son bras puissant :'
  - type: text
    content: Je ne donnerai plus ton blé
  - type: text
    content: à tes ennemis pour qu'ils le mangent,
  - type: text
    content: et les étrangers ne boiront plus le vin
  - type: text
    content: pour lequel tu t'es fatiguée ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: ceux qui auront récolté… 65.21s ; Am 9.14.
  - type: text
    content: mais ceux qui auront récolté le blé le mangeront
  - type: text
    content: 'et loueront le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et ceux qui auront vendangé boiront le vin
  - type: text
    content: dans les cours de mon sanctuaire.
