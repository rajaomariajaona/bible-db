document_id: 2CH.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josaphat s'allie au roi Achab d'Israël
  - type: heading
    content: 1R 22.1-4
  - type: text
    content: ' '
  - type: note
    content: 'Josaphat… 17.5. –  Il s''allia par mariage…  : Josaphat maria son fils Joram avec Athalie, fille d''Achab ; cf. 21.6 ; 2R 8.26s.'
  - type: text
    content: 'Josaphat eut richesse et gloire en abondance. Il s''allia par mariage avec Achab. '
  '10':
  - type: note
    content: 'Sédécias  : hébreu Tsidqiyahou  ; cf. 1R 22.11n.'
  - type: text
    content: 'Sédécias, fils de Kenaana, s''était fait des cornes de fer ; il dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Avec cela tu donneras des coups aux Araméens jusqu''à leur extermination. '
  '11':
  - type: text
    content: 'Tous les prophètes parlaient de même, en disant : Va à Ramoth de Galaad ! Tu vaincras ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' la livrera au roi !'
  - type: heading
    content: Le prophète Michée prédit la défaite
  - type: heading
    content: 1R 22.13-28
  '12':
  - type: text
    content: 'Le messager qui était allé appeler Michée lui dit : Les prophètes, d''un commun accord, annoncent du bien au roi. Je t''en prie, que ta parole s''accorde avec la leur : tu annonceras du bien ! '
  '13':
  - type: note
    content: ce que mon Dieu dira ! 1R 22.14 ce que le Seigneur me dira !
  - type: text
    content: 'Michée répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', je dirai ce que mon Dieu dira !'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Allez-y ! Vous vaincrez ! cf. 1R 22.15n.
  - type: text
    content: 'Lorsqu''il fut arrivé auprès du roi, le roi lui dit : Michée, devons-nous aller faire la guerre à Ramoth de Galaad, ou bien dois-je m''en abstenir ? Il répondit : Allez-y ! Vous vaincrez ! Ils vous seront livrés ! '
  '15':
  - type: note
    content: 'jurer… au nom du Seigneur  : cf. Dt 10.20 ; 1S 20.41 ; Es 48.1 ; Jr 12.16.'
  - type: text
    content: 'Mais le roi lui dit : Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '16':
  - type: note
    content: 'Michée répondit  : litt. il dit, de même au v. 18. –  comme un troupeau…  : cf. Mc 6.34/ /.'
  - type: text
    content: 'Michée répondit : J''ai vu tout Israël dispersé sur les montagnes, comme un troupeau qui n''a pas de berger. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : Ces gens n''ont plus de seigneurs ; que chacun rentre chez soi en paix ! '
  '17':
  - type: note
    content: 'il parle seulement pour le mal  : litt. seulement en mal, formule légèrement différente de celle qui est employée en 1R 22.18.'
  - type: text
    content: 'Le roi d''Israël dit à Josaphat : Ne te l''ai-je pas dit ? Il n''annonce sur moi rien de bon, il parle seulement pour le mal.'
  '18':
  - type: text
    content: 'Alors Michée dit : Eh bien, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! J''ai vu le '
  - type: text
    content: Seigneur
  - type: text
    content: ' assis sur son trône, et toute l''armée du ciel se tenant à sa droite et à sa gauche. '
  '19':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : Qui dupera Achab, roi d''Israël, pour qu''il attaque Ramoth de Galaad et qu''il y tombe ? Ils répondirent, qui d''une manière, qui d''une autre. '
  '2':
  - type: note
    content: 'quelques années…  : 1R 22.2 précise la troisième année. –  Samarie  : capitale du royaume du Nord (Israël). –  Achab sacrifia…  : le verbe s''applique le plus souvent à un sacrifice religieux mais peut aussi s''appliquer à un abattage en vue d''un repas, cf. 1R 1.9. –  Il l''incita…  : le verbe correspondant est souvent utilisé dans le sens d’inciter au mal, cf. 1R 21.25 ; 1Ch 21.1 ; il est parfois traduit par entraîner, cf. Dt 13.7 ; 2R 18.32 ; 2Ch 18.31 ; 32.11,15. –  Ramoth  : située dans le Galaad, c.-à-d. à l''est du Jourdain. Cette ville était à l''époque occupée par les Syriens.'
  - type: text
    content: 'Au bout de quelques années, il descendit auprès d''Achab à Samarie. Achab sacrifia, pour lui et pour le peuple qui était avec lui, du petit bétail et du gros bétail en quantité. Il l''incita à partir à l''attaque de Ramoth de Galaad. '
  '20':
  - type: text
    content: 'Alors un esprit sortit, se présenta devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit : Moi, je le duperai. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Comment ? '
  '21':
  - type: text
    content: '– Je sortirai, dit-il, et je deviendrai un souffle de mensonge dans la bouche de tous ses prophètes. Il répondit : Tu le duperas, tu réussiras ! Sors et fais ainsi ! '
  '22':
  - type: note
    content: 'de tes prophètes  : 1R 22.23 de tous tes prophètes.'
  - type: text
    content: 'Et maintenant, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a mis un souffle de mensonge dans la bouche de tes prophètes que voici ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', lui, a décrété un malheur contre toi !'
  '23':
  - type: text
    content: 'Alors Sédécias, fils de Kenaana, s''approcha, frappa Michée sur la joue et dit : Par quel chemin le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est-il sorti de moi pour te parler ? '
  '24':
  - type: note
    content: Cf. 1R 20.30n.
  - type: text
    content: 'Michée répondit : Tu le verras bien, le jour où tu iras de pièce en pièce pour te cacher. '
  '25':
  - type: text
    content: 'Le roi d''Israël dit : Prenez Michée et emmenez-le vers Amôn, chef de la ville, et vers Joas, fils du roi. '
  '26':
  - type: note
    content: 'revienne  : cf. 1R 22.27 rentre. –  victorieux  : litt. en paix  ; cf. v. 16,27 ; 19.1 ; 1R 22.27n  ; voir aussi Jos 10.21+.'
  - type: text
    content: 'Vous direz : Ainsi parle le roi : Mettez cet homme dans la maison de détention ; qu''il reste au pain sec et à l''eau, jusqu''à ce que je revienne victorieux ! '
  '27':
  - type: note
    content: Cf. 1R 22.28n.
  - type: text
    content: 'Michée dit : Si vraiment tu reviens victorieux, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas parlé par moi. Il dit encore : Ecoutez, vous tous, peuples !'
  - type: heading
    content: Le roi Achab est tué au combat
  - type: heading
    content: 1R 22.29-35
  '28':
  - type: text
    content: 'Le roi d''Israël et Josaphat, roi de Juda, partirent à l''attaque de Ramoth de Galaad. '
  '29':
  - type: text
    content: 'Le roi d''Israël dit à Josaphat qu''il se déguiserait pour aller au combat : « Toi, dit-il, revêts-toi de tes habits royaux ! » Ainsi le roi d''Israël se déguisa, et ils allèrent au combat. '
  '3':
  - type: note
    content: 'nous irons au combat avec toi  : à la place de cette proposition, 1R 22.4 porte pour mes chevaux comme pour tes chevaux  ; cf. 2R 3.7.'
  - type: text
    content: 'Achab, roi d''Israël, dit à Josaphat, roi de Juda : Iras-tu avec moi à Ramoth de Galaad ? Josaphat lui répondit : Il en sera pour moi comme pour toi, pour mon peuple comme pour ton peuple, nous irons au combat avec toi.'
  - type: heading
    content: Les prophètes d'Achab prédisent la victoire
  - type: heading
    content: 1R 22.5-12
  '30':
  - type: note
    content: 'aux chefs  : 1R 22.30 précise aux trente-deux chefs.'
  - type: text
    content: 'Le roi d''Aram avait donné cet ordre aux chefs de ses chars : Vous n''attaquerez personne d''autre que le roi d''Israël.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'et le Seigneur le secourut : Dieu les entraîna loin de lui  : les mots correspondants sont absents de 1R 22.32n.'
  - type: text
    content: 'Quand les chefs des chars aperçurent Josaphat, ils dirent : C''est le roi d''Israël. Ils l''entourèrent pour l''attaquer. Mais Josaphat appela au secours, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le secourut : Dieu les entraîna loin de lui. '
  '32':
  - type: text
    content: 'Les chefs des chars, voyant que ce n''était pas le roi d''Israël, s''éloignèrent de lui. '
  '33':
  - type: text
    content: 'Alors un homme tira au hasard avec son arc et frappa le roi d''Israël au défaut de la cuirasse. Le roi dit au conducteur du char : Tourne bride et fais-moi sortir du champ de bataille, car je suis blessé. '
  '34':
  - type: note
    content: Cf. 1R 22.35-39.
  - type: text
    content: Le combat fut si violent ce jour-là que le roi d'Israël dut être maintenu debout sur son char, en face des Araméens, jusqu'au soir ; il mourut vers le coucher du soleil.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'la parole  : absent de la plupart des mss de LXX.'
  - type: text
    content: 'Puis Josaphat dit au roi d''Israël : Consulte d''abord, je te prie, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'Devons-nous  : LXX dois-je  ; cf. 1R 22.6.'
  - type: text
    content: 'Le roi d''Israël rassembla les prophètes, au nombre de quatre cents, et leur dit : Devons-nous aller faire la guerre à Ramoth de Galaad, ou bien dois-je m''en abstenir ? Ils répondirent : Vas-y ! Dieu la livrera au roi. '
  '6':
  - type: note
    content: 1R 22.7n.
  - type: text
    content: 'Mais Josaphat dit : N''y a-t-il plus ici aucun prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: ', par qui nous puissions consulter ? '
  '7':
  - type: note
    content: 'consulter le Seigneur  : cf. v. 4 ; la même expression est aussi traduite par chercher ou rechercher le Seigneur  ; 15.12+.'
  - type: text
    content: 'Le roi d''Israël répondit à Josaphat : Il n''y a plus qu''un seul homme par qui l''on pourrait consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; mais moi, je le déteste, car il n''annonce jamais sur moi rien de bon, toujours du mal : c''est Michée, fils de Yimla. Josaphat dit : Que le roi ne parle pas ainsi ! '
  '8':
  - type: note
    content: 'Michée  : une lecture traditionnelle présente ici une légère variante orthographique ; cf. 1R 22.8n.'
  - type: text
    content: 'Alors le roi d''Israël appela un haut fonctionnaire et lui dit : Fais venir tout de suite Michée, fils de Yimla.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 22.10n. –  faisaient les prophètes  : 1S 10.5n.'
  - type: text
    content: 'Le roi d''Israël et Josaphat, roi de Juda, étaient assis chacun sur son trône, revêtus de leurs habits royaux ; ils étaient assis sur l''aire à l''entrée de la porte de Samarie, et tous les prophètes faisaient les prophètes devant eux. '
