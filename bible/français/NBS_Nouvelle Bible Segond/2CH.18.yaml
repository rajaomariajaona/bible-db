    - type: text
      text: 'Le roi d''Israël rassembla les prophètes, au nombre de quatre cents, et leur dit : Devons-nous aller faire la guerre à Ramoth de Galaad, ou bien dois-je m''en abstenir ? Ils répondirent : Vas-y ! Dieu la livrera au roi. '
