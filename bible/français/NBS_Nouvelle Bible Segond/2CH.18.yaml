document_id: 2CH.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josaphat s'allie au roi Achab d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 22.1-4
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josaphat… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il s'allia par mariage…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Josaphat maria son fils Joram avec Athalie, fille d''Achab ; cf. 21.6 ; 2R 8.26s.'
      marker-yv: yv-n
    - type: text
      text: 'Josaphat eut richesse et gloire en abondance. Il s''allia par mariage avec Achab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sédécias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tsidqiyahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 22.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Sédécias, fils de Kenaana, s''était fait des cornes de fer ; il dit : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Avec cela tu donneras des coups aux Araméens jusqu''à leur extermination. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les prophètes parlaient de même, en disant : Va à Ramoth de Galaad ! Tu vaincras ! Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' la livrera au roi !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prophète Michée prédit la défaite
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 22.13-28
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le messager qui était allé appeler Michée lui dit : Les prophètes, d''un commun accord, annoncent du bien au roi. Je t''en prie, que ta parole s''accorde avec la leur : tu annonceras du bien ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que mon Dieu dira ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1R 22.14 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' me dira !'
      marker-yv: yv-n
    - type: text
      text: 'Michée répondit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je dirai ce que mon Dieu dira !'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Allez-y ! Vous vaincrez ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 1R 22.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''il fut arrivé auprès du roi, le roi lui dit : Michée, devons-nous aller faire la guerre à Ramoth de Galaad, ou bien dois-je m''en abstenir ? Il répondit : Allez-y ! Vous vaincrez ! Ils vous seront livrés ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jurer… au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 10.20 ; 1S 20.41 ; Es 48.1 ; Jr 12.16.'
      marker-yv: yv-n
    - type: text
      text: 'Mais le roi lui dit : Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Michée répondit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme un troupeau…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mc 6.34/ /.
      marker-yv: yv-n
    - type: text
      text: 'Michée répondit : J''ai vu tout Israël dispersé sur les montagnes, comme un troupeau qui n''a pas de berger. Et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit : Ces gens n''ont plus de seigneurs ; que chacun rentre chez soi en paix ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il parle seulement pour le mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seulement en mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', formule légèrement différente de celle qui est employée en 1R 22.18.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi d''Israël dit à Josaphat : Ne te l''ai-je pas dit ? Il n''annonce sur moi rien de bon, il parle seulement pour le mal.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Michée dit : Eh bien, écoutez la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! J''ai vu le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' assis sur son trône, et toute l''armée du ciel se tenant à sa droite et à sa gauche. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit : Qui dupera Achab, roi d''Israël, pour qu''il attaque Ramoth de Galaad et qu''il y tombe ? Ils répondirent, qui d''une manière, qui d''une autre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quelques années…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1R 22.2 précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la troisième année. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : capitale du royaume du Nord (Israël). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Achab '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifia
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe s''applique le plus souvent à un sacrifice religieux mais peut aussi s''appliquer à un abattage en vue d''un repas, cf. 1R 1.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il l'incita…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe correspondant est souvent utilisé dans le sens d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: inciter au mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1R 21.25 ; 1Ch 21.1 ; il est parfois traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entraîner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Dt 13.7 ; 2R 18.32 ; 2Ch 18.31 ; 32.11,15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ramoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : située dans le Galaad, c.-à-d. à l''est du Jourdain. Cette ville était à l''époque occupée par les Syriens.'
      marker-yv: yv-n
    - type: text
      text: 'Au bout de quelques années, il descendit auprès d''Achab à Samarie. Achab sacrifia, pour lui et pour le peuple qui était avec lui, du petit bétail et du gros bétail en quantité. Il l''incita à partir à l''attaque de Ramoth de Galaad. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors un esprit sortit, se présenta devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et dit : Moi, je le duperai. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui dit : Comment ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– Je sortirai, dit-il, et je deviendrai un souffle de mensonge dans la bouche de tous ses prophètes. Il répondit : Tu le duperas, tu réussiras ! Sors et fais ainsi ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de tes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1R 22.23 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tous tes prophètes.
      marker-yv: yv-n
    - type: text
      text: 'Et maintenant, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a mis un souffle de mensonge dans la bouche de tes prophètes que voici ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', lui, a décrété un malheur contre toi !'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Sédécias, fils de Kenaana, s''approcha, frappa Michée sur la joue et dit : Par quel chemin le souffle du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est-il sorti de moi pour te parler ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 20.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Michée répondit : Tu le verras bien, le jour où tu iras de pièce en pièce pour te cacher. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d''Israël dit : Prenez Michée et emmenez-le vers Amôn, chef de la ville, et vers Joas, fils du roi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: revienne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 22.27 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rentre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: victorieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 16,27 ; 19.1 ; 1R 22.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Jos 10.21+.'
      marker-yv: yv-n
    - type: text
      text: 'Vous direz : Ainsi parle le roi : Mettez cet homme dans la maison de détention ; qu''il reste au pain sec et à l''eau, jusqu''à ce que je revienne victorieux ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 22.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Michée dit : Si vraiment tu reviens victorieux, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' n''a pas parlé par moi. Il dit encore : Ecoutez, vous tous, peuples !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le roi Achab est tué au combat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 22.29-35
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d''Israël et Josaphat, roi de Juda, partirent à l''attaque de Ramoth de Galaad. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d''Israël dit à Josaphat qu''il se déguiserait pour aller au combat : « Toi, dit-il, revêts-toi de tes habits royaux ! » Ainsi le roi d''Israël se déguisa, et ils allèrent au combat. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous irons au combat avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à la place de cette proposition, 1R 22.4 porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour mes chevaux comme pour tes chevaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 3.7.'
      marker-yv: yv-n
    - type: text
      text: 'Achab, roi d''Israël, dit à Josaphat, roi de Juda : Iras-tu avec moi à Ramoth de Galaad ? Josaphat lui répondit : Il en sera pour moi comme pour toi, pour mon peuple comme pour ton peuple, nous irons au combat avec toi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les prophètes d'Achab prédisent la victoire
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 22.5-12
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux chefs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1R 22.30 précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux trente-deux chefs.
      marker-yv: yv-n
    - type: text
      text: 'Le roi d''Aram avait donné cet ordre aux chefs de ses chars : Vous n''attaquerez personne d''autre que le roi d''Israël.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' le secourut : Dieu les entraîna loin de lui'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : les mots correspondants sont absents de 1R 22.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand les chefs des chars aperçurent Josaphat, ils dirent : C''est le roi d''Israël. Ils l''entourèrent pour l''attaquer. Mais Josaphat appela au secours, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le secourut : Dieu les entraîna loin de lui. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs des chars, voyant que ce n''était pas le roi d''Israël, s''éloignèrent de lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors un homme tira au hasard avec son arc et frappa le roi d''Israël au défaut de la cuirasse. Le roi dit au conducteur du char : Tourne bride et fais-moi sortir du champ de bataille, car je suis blessé. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.34 '
      - type: usfm
