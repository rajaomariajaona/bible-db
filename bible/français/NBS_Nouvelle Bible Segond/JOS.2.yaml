        - type: text
          text: '2.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en terrasse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte, cf. Dt 22.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les tiges de lin… étendues '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sur le toit en terrasse, pour sécher au soleil.
      marker-yv: yv-n
    - type: text
      text: 'En fait, elle les avait fait monter sur le toit en terrasse et elle les avait cachés parmi les tiges de lin qu''elle y avait étendues. '
