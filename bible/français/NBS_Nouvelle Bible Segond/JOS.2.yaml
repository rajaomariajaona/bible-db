document_id: JOS.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josué envoie deux espions à Jéricho
  - type: text
    content: ' '
  - type: note
    content: 'Josué, fils de Noun 1.1n. –  Shittim ( les Acacias ) : c''est sans doute le même lieu qu’ Abel-Shittim (Nb 33.49), à l''est du Jourdain, dernière étape des tribus avant la traversée du Jourdain ; cf. Nb 25.1 ; Jos 3.1. –  espions  : cf. Gn 42.9n  ; voir aussi Nb 13–14 ; Dt 1.19-25 ; Jos 3.1. –  Jéricho Nb 22.1 ; 26.3,63 ; 31.12 ; Dt 32.49 ; 34.1,3 etc. –  Rahab  : dans le N.T., Mt 1.5 ; Hé 11.31 ; Jc 2.25.'
  - type: text
    content: 'Josué, fils de Noun, envoya secrètement de Shittim deux espions, en disant : Allez voir le pays, et Jéricho ! Ils partirent, entrèrent chez une prostituée nommée Rahab et couchèrent là. '
  '10':
  - type: note
    content: 'Sihôn et Og  : cf. Nb 21.21-35 ; Dt 1.4 ; 2.30ss ; 3.1ss ; 29.6s ; 31.4 ; 1R 4.19 ; Ps 135.11 ; Né 9.22. –  anathème Dt 2.34n  ; voir bénédiction, malédiction.'
  - type: text
    content: 'Car nous avons appris que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a mis à sec devant vous les eaux de la mer des Joncs lorsque vous êtes sortis d''Egypte, et comment vous avez traité les deux rois amorites qui étaient en Transjordanie, Sihôn et Og, que vous avez frappés d''anathème. '
  '11':
  - type: note
    content: 'notre cœur a fondu 5.1 ; 7.5 ; 14.8 ; Dt 1.28n  ; 20.8+. –  à tous le souffle (voir esprit) manque devant vous  : litt. le souffle de personne ne tient devant vous. –  Seigneur (YHWH)  : voir noms divins. –  Dieu dans le ciel… Dt 4.39.'
  - type: text
    content: 'Nous l''avons appris, et notre cœur a fondu ; à tous le souffle manque devant vous, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, est Dieu dans le ciel, en haut, et sur la terre, en bas. '
  '12':
  - type: note
    content: 'Cf. Gn 21.23. –  fidélité  : voir grâce. –  un signe qui soit certain  : autre traduction un signe de loyauté (v. 14).'
  - type: text
    content: 'Maintenant, je vous prie, faites-moi un serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : comme j''ai agi avec fidélité envers vous, vous aussi, vous agirez avec fidélité envers ma famille. Vous me donnerez un signe qui soit certain. '
  '13':
  - type: note
    content: 'vous nous sauverez  : litt. vous délivrerez nos vies ou nos êtres (sur le terme hébreu correspondant, voir Gn 1.20n).'
  - type: text
    content: 'Vous laisserez vivre mon père, ma mère, mes frères, mes sœurs et tout ce qui leur appartient, vous nous sauverez de la mort. '
  '14':
  - type: note
    content: 'Que nous mourions…  : malédiction conditionnelle, censée s''accomplir en cas de non-respect de la parole donnée. –  notre affaire  : le mot hébreu correspondant a aussi le sens de parole  ; cf. v. 20s.'
  - type: text
    content: 'Les hommes lui dirent : Que nous mourions à votre place ! Mais ne divulguez pas notre affaire. Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous donnera le pays, nous agirons envers toi avec fidélité et loyauté. '
  '15':
  - type: note
    content: Cf. 1S 19.12 ; Ac 9.25 ; 2Co 11.32s ; voir aussi Jc 2.25.
  - type: text
    content: 'Elle les fit descendre avec une corde par la fenêtre, car sa maison était dans le mur même du rempart. C''est dans le rempart qu''elle habitait. '
  '16':
  - type: note
    content: 'vos poursuivants  : litt. les poursuivants, de même au v. 22.'
  - type: text
    content: 'Elle leur dit : Allez vers la montagne, de peur que vos poursuivants ne vous rattrapent. Cachez-vous là-bas pendant trois jours, jusqu''au retour de vos poursuivants, après quoi vous irez votre chemin. '
  '17':
  - type: text
    content: 'Ils lui dirent : Voici de quelle manière nous serons quittes de ce serment que tu nous as fait faire : '
  '18':
  - type: note
    content: 'écarlate  : cf. Gn 38.28,30 ; Ex 25.4n.'
  - type: text
    content: 'lorsque nous entrerons dans le pays, attache ce cordon écarlate à la fenêtre par laquelle tu nous as fait descendre et rassemble auprès de toi, dans la maison, ton père, ta mère, tes frères et toute ta famille. '
  '19':
  - type: note
    content: 'son sang sera sur notre tête  : formule qui exprime la responsabilité d''une personne à l''égard de la vie d''une autre ; cf. Ez 33.1-6 ; voir aussi Mt 27.25.'
  - type: text
    content: 'Quiconque franchira les portes de ta maison pour sortir, son sang sera sur sa tête, et nous, nous serons quittes ! Mais si l''on met la main sur l''un de ceux qui seront avec toi dans la maison, son sang sera sur notre tête ! '
  '2':
  - type: note
    content: 'cette nuit  : autre traduction ce soir.'
  - type: text
    content: 'On dit au roi de Jéricho : Des hommes sont venus ici cette nuit, des Israélites, pour explorer le pays ! '
  '20':
  - type: note
    content: 'cette parole que nous t''avons donnée  : litt. cette parole nôtre.'
  - type: text
    content: 'Si tu divulgues cette parole que nous t''avons donnée, nous serons quittes du serment que tu nous as fait faire. '
  '21':
  - type: note
    content: 'le cordon écarlate  : litt. l''écarlate, cf. v. 18+.'
  - type: text
    content: 'Elle dit : Qu''il en soit selon vos paroles ! Elle les laissa partir, et ils s''en allèrent. Puis elle attacha le cordon écarlate à la fenêtre.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'partout où ils allèrent  : litt. sur tout le chemin.'
  - type: text
    content: 'Ils partirent, arrivèrent dans la montagne et y restèrent trois jours, jusqu''au retour de leurs poursuivants. Leurs poursuivants les cherchèrent partout où ils allèrent, sans les trouver. '
  '23':
  - type: note
    content: 'le Jourdain  : sous-entendu dans le texte.'
  - type: text
    content: 'Les deux hommes redescendirent ensuite de la montagne et passèrent le Jourdain. Ils arrivèrent auprès de Josué, fils de Noun, et lui racontèrent tout ce qui leur était arrivé. '
  '24':
  - type: note
    content: 'nous a livré  : cf. Gn 9.2n.'
  - type: text
    content: 'Ils dirent à Josué : A coup sûr, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a livré tout le pays : tous les habitants du pays défaillent devant nous !'
  '3':
  - type: note
    content: 't''ont rendu visite  : autre traduction sont allés avec toi  ; sur l''expression correspondante (aussi au v. 4), voir Gn 16.2n.'
  - type: text
    content: 'Alors le roi de Jéricho fit dire à Rahab : Fais sortir les hommes qui t''ont rendu visite, ceux qui sont entrés chez toi, car c''est pour explorer tout le pays qu''ils sont venus ! '
  '4':
  - type: note
    content: 'les cacha  : litt. le cacha, d''après le texte hébreu traditionnel ; des versions anciennes ont lu le pluriel ; autre verbe au v. 6.'
  - type: text
    content: 'Mais la femme prit les deux hommes et les cacha ; elle dit : Ces hommes m''ont bien rendu visite, mais je ne savais pas d''où ils étaient. '
  '5':
  - type: note
    content: 'la porte de la ville (de la ville sous-entendu dans le texte) : cf. v. 7 ; Dt 16.18n.'
  - type: text
    content: 'Au moment où on allait fermer la porte de la ville, au crépuscule, ils sont sortis, sans que je sache où ils allaient ; poursuivez-les vite, et vous les rattraperez ! '
  '6':
  - type: note
    content: 'en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. –  les tiges de lin… étendues sur le toit en terrasse, pour sécher au soleil.'
  - type: text
    content: 'En fait, elle les avait fait monter sur le toit en terrasse et elle les avait cachés parmi les tiges de lin qu''elle y avait étendues. '
  '7':
  - type: note
    content: 'Ils  : litt. les hommes. –  jusqu''aux gués  : litt. sur les gués.'
  - type: text
    content: Ils les poursuivirent sur la route du Jourdain, jusqu'aux gués ; on ferma la porte de la ville après la sortie des poursuivants.
  '8':
  - type: text
    content: 'Avant que les espions ne se couchent, elle monta les rejoindre sur le toit. '
  '9':
  - type: note
    content: 'la terreur que vous inspirez s''est abattue sur nous  : litt. votre terreur est tombée sur nous.'
  - type: text
    content: 'Elle leur dit : Je sais que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) vous a donné le pays ; la terreur que vous inspirez s''est abattue sur nous, et tous les habitants du pays défaillent devant vous. '
