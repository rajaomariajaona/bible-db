document_id: JOS.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué envoie deux espions à Jéricho
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josué, fils de Noun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shittim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les Acacias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : c''est sans doute le même lieu qu’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abel-Shittim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Nb 33.49), à l''est du Jourdain, dernière étape des tribus avant la traversée du Jourdain ; cf. Nb 25.1 ; Jos 3.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: espions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 42.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Nb 13–14 ; Dt 1.19-25 ; Jos 3.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jéricho '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 22.1 ; 26.3,63 ; 31.12 ; Dt 32.49 ; 34.1,3 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rahab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : dans le N.T., Mt 1.5 ; Hé 11.31 ; Jc 2.25.'
      marker-yv: yv-n
    - type: text
      text: 'Josué, fils de Noun, envoya secrètement de Shittim deux espions, en disant : Allez voir le pays, et Jéricho ! Ils partirent, entrèrent chez une prostituée nommée Rahab et couchèrent là. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sihôn et Og
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 21.21-35 ; Dt 1.4 ; 2.30ss ; 3.1ss ; 29.6s ; 31.4 ; 1R 4.19 ; Ps 135.11 ; Né 9.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anathème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 2.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: 'Car nous avons appris que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a mis à sec devant vous les eaux de la mer des Joncs lorsque vous êtes sortis d''Egypte, et comment vous avez traité les deux rois amorites qui étaient en Transjordanie, Sihôn et Og, que vous avez frappés d''anathème. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'notre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' a fondu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.1 ; 7.5 ; 14.8 ; Dt 1.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à tous le souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: manque devant vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le souffle de personne ne tient devant vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu dans le ciel… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 4.39.
      marker-yv: yv-n
    - type: text
      text: 'Nous l''avons appris, et notre cœur a fondu ; à tous le souffle manque devant vous, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu, est Dieu dans le ciel, en haut, et sur la terre, en bas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 21.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fidélité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un signe qui soit certain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un signe de loyauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 14).
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, je vous prie, faites-moi un serment par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : comme j''ai agi avec fidélité envers vous, vous aussi, vous agirez avec fidélité envers ma famille. Vous me donnerez un signe qui soit certain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous nous sauverez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vous délivrerez nos vies '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nos êtres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (sur le terme hébreu correspondant, voir Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Vous laisserez vivre mon père, ma mère, mes frères, mes sœurs et tout ce qui leur appartient, vous nous sauverez de la mort. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que nous mourions…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : malédiction conditionnelle, censée s''accomplir en cas de non-respect de la parole donnée. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: notre affaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20s.'
      marker-yv: yv-n
    - type: text
      text: 'Les hommes lui dirent : Que nous mourions à votre place ! Mais ne divulguez pas notre affaire. Quand le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous donnera le pays, nous agirons envers toi avec fidélité et loyauté. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1S 19.12 ; Ac 9.25 ; 2Co 11.32s ; voir aussi Jc 2.25.
      marker-yv: yv-n
    - type: text
      text: 'Elle les fit descendre avec une corde par la fenêtre, car sa maison était dans le mur même du rempart. C''est dans le rempart qu''elle habitait. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vos poursuivants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les poursuivants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 22.'
      marker-yv: yv-n
    - type: text
      text: 'Elle leur dit : Allez vers la montagne, de peur que vos poursuivants ne vous rattrapent. Cachez-vous là-bas pendant trois jours, jusqu''au retour de vos poursuivants, après quoi vous irez votre chemin. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent : Voici de quelle manière nous serons quittes de ce serment que tu nous as fait faire : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écarlate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 38.28,30 ; Ex 25.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsque nous entrerons dans le pays, attache ce cordon écarlate à la fenêtre par laquelle tu nous as fait descendre et rassemble auprès de toi, dans la maison, ton père, ta mère, tes frères et toute ta famille. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' sera sur notre tête'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule qui exprime la responsabilité d''une personne à l''égard de la vie d''une autre ; cf. Ez 33.1-6 ; voir aussi Mt 27.25.'
      marker-yv: yv-n
    - type: text
      text: 'Quiconque franchira les portes de ta maison pour sortir, son sang sera sur sa tête, et nous, nous serons quittes ! Mais si l''on met la main sur l''un de ceux qui seront avec toi dans la maison, son sang sera sur notre tête ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce soir.
      marker-yv: yv-n
    - type: text
      text: 'On dit au roi de Jéricho : Des hommes sont venus ici cette nuit, des Israélites, pour explorer le pays ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette parole que nous t'avons donnée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette parole nôtre.
      marker-yv: yv-n
    - type: text
      text: 'Si tu divulgues cette parole que nous t''avons donnée, nous serons quittes du serment que tu nous as fait faire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le cordon écarlate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'écarlate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 18+.'
      marker-yv: yv-n
    - type: text
      text: 'Elle dit : Qu''il en soit selon vos paroles ! Elle les laissa partir, et ils s''en allèrent. Puis elle attacha le cordon écarlate à la fenêtre.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partout où ils allèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur tout le chemin.
      marker-yv: yv-n
    - type: text
      text: 'Ils partirent, arrivèrent dans la montagne et y restèrent trois jours, jusqu''au retour de leurs poursuivants. Leurs poursuivants les cherchèrent partout où ils allèrent, sans les trouver. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Les deux hommes redescendirent ensuite de la montagne et passèrent le Jourdain. Ils arrivèrent auprès de Josué, fils de Noun, et lui racontèrent tout ce qui leur était arrivé. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous a livré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 9.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent à Josué : A coup sûr, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nous a livré tout le pays : tous les habitants du pays défaillent devant nous !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'ont rendu visite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sont allés avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur l''expression correspondante (aussi au v. 4), voir Gn 16.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors le roi de Jéricho fit dire à Rahab : Fais sortir les hommes qui t''ont rendu visite, ceux qui sont entrés chez toi, car c''est pour explorer tout le pays qu''ils sont venus ! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les cacha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cacha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après le texte hébreu traditionnel ; des versions anciennes ont lu le pluriel ; autre verbe au v. 6.'
      marker-yv: yv-n
    - type: text
      text: 'Mais la femme prit les deux hommes et les cacha ; elle dit : Ces hommes m''ont bien rendu visite, mais je ne savais pas d''où ils étaient. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la porte de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sous-entendu dans le texte) : cf. v. 7 ; Dt 16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Au moment où on allait fermer la porte de la ville, au crépuscule, ils sont sortis, sans que je sache où ils allaient ; poursuivez-les vite, et vous les rattraperez ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
