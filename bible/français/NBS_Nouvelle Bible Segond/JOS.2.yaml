    - type: text
      text: Ils les poursuivirent sur la route du Jourdain, jusqu'aux gués ; on ferma la porte de la ville après la sortie des poursuivants.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que les espions ne se couchent, elle monta les rejoindre sur le toit. '
