        children:
        - type: text
          text: n
      - type: text
        text: '  ; 19.9 ; selon une ancienne tradition des scribes, le texte primitif du verset aurait été '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chacun à ses dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', allusion à l''idolâtrie qui régnait à l''époque en Israël.'
    marker-yv: yv-n
  - type: text
    text: 'Il se trouvait là un homme sans morale, nommé Shéba, fils de Bikri, un Benjaminite. Il sonna de la trompe et dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pas de part pour nous avec David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pas de patrimoine pour nous avec le fils de Jessé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun à ses tentes, Israël !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'attachèrent à leur roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 12.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et l'accompagnèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: Tous les hommes d'Israël laissèrent David pour suivre Shéba, fils de Bikri. Mais les hommes de Juda s'attachèrent à leur roi et l'accompagnèrent depuis le Jourdain jusqu'à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les dix concubines
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 15.16+ ; 16.21s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour garder la maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans une maison bien gardée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les deux expressions sont analogues en hébreu comme en français. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il n'alla pas avec elles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il n'eut plus de relations sexuelles avec elles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Gn 16.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 24.1-4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vivant dans un état de veuvage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: veuvage d'une durée de vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. qu''elles sont comme des veuves pour le restant de leur vie.'
    marker-yv: yv-n
  - type: text
    text: David rentra chez lui, à Jérusalem. Le roi prit les dix concubines qu'il avait laissées pour garder la maison et il les mit dans une maison bien gardée ; il pourvut à tous leurs besoins, mais il n'alla pas avec elles ; elles furent enfermées jusqu'au jour de leur mort, vivant dans un état de veuvage.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joab assassine Amasa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Amasa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 17.25 ; 19.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trois jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il faut agir vite, avant que la révolte de Shéba prenne de l''ampleur. Cf. le conseil analogue d''Ahitophel en 17.1-4, contré par celui de Houshaï dans les v. suivants. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les hommes de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'armée populaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et toi, sois présent ici
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ordre insolite du roi, qui viserait selon certains à empêcher Amasa de réussir la mobilisation ; mais on peut aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: puis viens te présenter ici (avec l'armée)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce que suggère le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Amasa partit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du v. 5.
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit à Amasa : Appelle-moi pour dans trois jours les hommes de Juda ; et toi, sois présent ici. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Amasa partit pour appeler Juda ; mais il tarda au-delà du temps que le roi lui avait fixé. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abishaï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 26.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les serviteurs de ton seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'armée de métier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que nous ne le perdions de vue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'il n'échappe (à) nos yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la préposition '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manque en hébreu, ce qui a conduit les versions anciennes à toutes sortes d'interprétations peu convaincantes.
    marker-yv: yv-n
  - type: text
    text: 'David dit alors à Abishaï : Shéba, fils de Bikri, va maintenant nous faire plus de mal qu''Absalom. Prends toi-même mes hommes et poursuis-le, de peur qu''il ne trouve des villes fortes et que nous ne le perdions de vue. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les hommes de Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'limogé de son poste de chef de l''armée (cf. 19.14), reste néanmoins à la tête de la garde royale ; c''est Abishaï, son frère, qui reprend le commandement général des troupes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Kérétites et les Pélétites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous les guerriers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous les hommes vaillants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 10.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 23.8ss.'
    marker-yv: yv-n
  - type: text
    text: Les hommes de Joab sortirent derrière lui, avec les Kérétites et les Pélétites, et tous les guerriers ; ils sortirent de Jérusalem afin de poursuivre Shéba, fils de Bikri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gabaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – La description de l'habillement et de l'équipement militaire de Joab n'est pas tout à fait claire.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils furent près de la grande pierre qui est à Gabaon, Amasa arriva devant eux. Joab avait passé une ceinture sur les habits dont il était vêtu, et il avait mis une épée à sa ceinture ; elle était attachée à ses reins, dans un fourreau. Elle tomba comme Joab s''avançait. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comment vas-tu… ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 10.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: saisit la barbe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : geste d''affection, encore en usage dans le monde arabe.'
    marker-yv: yv-n
  - type: text
    text: 'Joab dit à Amasa : Comment vas-tu, mon frère ? Et de la main droite il saisit la barbe d''Amasa, pour l''embrasser. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'épée qui était dans la main de Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : soit '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui était tombée et que Joab a ramassée discrètement, soit une autre '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'que Joab avait cachée auparavant sous son vêtement (cf. Jg 3.16-22). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un coup au ventre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.27 ; cf. 1R 2.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joab… : Amasa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'éliminé, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: retrouve quasi automatiquement son rang de chef de l'armée.
    marker-yv: yv-n
  - type: text
    text: 'Amasa ne prit pas garde à l''épée qui était dans la main de Joab ; Joab lui en donna un coup au ventre et répandit ses intestins à terre ; il n''eut pas à lui porter un second coup : Amasa mourut.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fin de la révolte de Shéba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Joab et Abishaï, son frère, se lancèrent à la poursuite de Shéba, fils de Bikri. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est partisan de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se plaît avec
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 15.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'derrière Joab ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'tous ceux qui pouvaient encore hésiter sur la meilleure manière de servir David sont invités à se rallier sans réserve à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', puisque '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amasa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: n'est plus en état de commander.
    marker-yv: yv-n
  - type: text
    text: 'Un des serviteurs de Joab s''était arrêté près d''Amasa et disait : Qui est partisan de Joab et qui appartient à David, derrière Joab ! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parce qu''il avait vu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: puisque tous ceux qui arrivaient près de lui le voyaient et s'arrêtaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.23.'
    marker-yv: yv-n
  - type: text
    text: 'Amasa se roulait dans le sang au milieu de la route ; l''homme, ayant vu que tout le peuple s''arrêtait, poussa Amasa du chemin dans un champ et jeta un vêtement sur lui, parce qu''il avait vu que tous ceux qui arrivaient près de lui s''arrêtaient. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand on l'eut retiré de la route, chacun suivit Joab, afin de poursuivre Shéba, fils de Bikri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce sujet pronominal peut désigner soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après la suite du texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abel-Beth-Maaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : localité située à une quarantaine de kilomètres au nord du lac de Gennésareth ; cf. 1R 15.20 ; 2R 15.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et de tous les Bérim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : population inconnue ; parmi plusieurs corrections proposées pour donner un sens à ces mots, la plus vraisemblable, appuyée partiellement par des versions anciennes, permettrait de lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et tous étaient alliés (à Joab). '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils se rassemblèrent et le suivirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les alliés se rassemblent pour suivre Joab ; mais on peut aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joab et ses alliés se rassemblèrent pour le poursuivre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour poursuivre Shéba.
    marker-yv: yv-n
  - type: text
    text: 'Il traversa toutes les tribus d''Israël dans la direction d''Abel-Beth-Maaka, et de tous les Bérim. Ils se rassemblèrent et le suivirent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: assiéger Shéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'assiéger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: remblai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 19.32.'
    marker-yv: yv-n
  - type: text
    text: 'Ils vinrent assiéger Shéba dans Abel-Beth-Maaka, et on éleva contre la ville un remblai ; il s''appuyait au rempart. Tout le peuple qui était avec Joab sapait la muraille pour la faire tomber. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 22 ; voir aussi 14.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors une femme sage se mit à crier de la ville : Ecoutez, écoutez, je vous prie, dites à Joab : « Approche jusqu''ici, je veux te parler ! » '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il s''approcha d''elle ; la femme dit : Est-ce toi, Joab ? Il répondit : C''est moi ! Elle lui dit : Ecoute mes paroles. Il répondit : J''écoute. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La construction et le sens des v. 18s ne sont pas des plus clairs. Les versions anciennes ont souvent deviné plutôt que traduit le texte. Il n''est cependant pas impossible d''en respecter le texte hébreu. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abel-Beth-Maaka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(en compagnie de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ') était semble-t-il considérée comme une gardienne de la tradition israélite, que l''on pouvait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: interroger.
    marker-yv: yv-n
  - type: text
    text: 'Alors elle dit : Autrefois on avait coutume de dire : « Qu''on interroge Abel ! » Et l''affaire était réglée. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moi, je suis parmi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'moi, les pacifiés des fidèles d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(adjectifs au masculin pluriel en hébreu). Il faut sans doute comprendre que la femme parle au nom de sa ville, dont elle fait l''éloge par comparaison à l''ensemble de la nation. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une mère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une métropole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: anéantirais-tu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avalerais-tu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'engloutirais-tu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de même au v. 20). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le patrimoine du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette expression désigne habituellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le peuple d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) dans son ensemble, cf. 14.16 ; Dt 9.26,29 ; 1S 26.19 ; ici le sort infligé à une seule ville est considéré comme une atteinte à l'ensemble de la communauté nationale.
    marker-yv: yv-n
  - type: text
    text: 'Moi, je suis parmi les plus paisibles et les plus sûrs en Israël, et toi tu cherches à faire mourir une ville qui est une mère en Israël ! Pourquoi anéantirais-tu le patrimoine du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jamais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 2.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Joab répondit : Jamais ! Jamais je n''anéantirais, jamais je ne ferais périr ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: a levé la main contre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ne s''agit pas de cela. Mais un homme de la région montagneuse d''Ephraïm, nommé Shéba, fils de Bikri, a levé la main contre le roi, contre David. Livrez-le, lui seul, et je m''éloignerai de la ville. La femme dit à Joab : Eh bien, sa tête te sera jetée par la muraille ! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: parler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte hébreu, explicité par LXX et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec sa sagesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sonna de la trompe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.28+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans ses tentes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: La femme alla parler à tout le peuple avec sa sagesse ; ils coupèrent la tête de Shéba, fils de Bikri, et la jetèrent à Joab. Alors Joab sonna de la trompe, et ils se dispersèrent loin de la ville, chacun dans ses tentes. Puis Joab revint à Jérusalem, auprès du roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liste des fonctionnaires de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir en 8.15-18 une notice analogue à celle des v. 23-26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 19.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Benaya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ici, hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Benaya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 8.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Kérétites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pélétites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 8.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Joab commandait toute l''armée d''Israël ; Benaya, fils de Joïada, était à la tête des Kérétites et des Pélétites ; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Adoram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''apparaît pas dans la liste de 8.15-18 ; il est peut-être à identifier avec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Adoniram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de 1R 4.6 ; 5.28, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'intendant des corvées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sous le règne de Salomon. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josaphat… archiviste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.16.'
    marker-yv: yv-n
  - type: text
    text: 'Adoram était intendant des corvées ; Josaphat, fils d''Ahiloud, était archiviste ; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sheva '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(nom parfois orthographié '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sheya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') a remplacé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Seraya '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de 8.17 ; cf. 1Ch 2.49 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribe
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsadoq et Abiathar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 8.17.'
    marker-yv: yv-n
  - type: text
    text: 'Sheva était scribe ; Tsadoq et Abiathar étaient prêtres ; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ira de Yaïr '
    - type: usfm
      marker: ft
