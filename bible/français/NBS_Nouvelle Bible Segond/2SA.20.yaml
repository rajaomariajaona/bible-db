document_id: 2SA.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Shéba se révolte contre David
  - type: text
    content: ' '
  - type: note
    content: 'là  : au Guilgal  ; cf. 19.16,41. –  un homme sans morale  : cf. 16.7n  ; Dt 13.14n. –  Benjaminite  : cf. 16.11n. –  Pas de part…  : voir un appel analogue à la sécession en 1R 12.16 ; cf. Lc 19.14. –  fils de Jessé  : voir 1S 16. –  à ses tentes  : cf. 18.17n  ; 19.9 ; selon une ancienne tradition des scribes, le texte primitif du verset aurait été chacun à ses dieux , allusion à l''idolâtrie qui régnait à l''époque en Israël.'
  - type: text
    content: 'Il se trouvait là un homme sans morale, nommé Shéba, fils de Bikri, un Benjaminite. Il sonna de la trompe et dit :'
  - type: text
    content: Pas de part pour nous avec David,
  - type: text
    content: pas de patrimoine pour nous avec le fils de Jessé !
  - type: text
    content: Chacun à ses tentes, Israël !
  '10':
  - type: note
    content: 'l''épée qui était dans la main de Joab  : soit l''épée qui était tombée et que Joab a ramassée discrètement, soit une autre épée que Joab avait cachée auparavant sous son vêtement (cf. Jg 3.16-22). –  un coup au ventre 3.27 ; cf. 1R 2.5. –  Joab… : Amasa éliminé, Joab retrouve quasi automatiquement son rang de chef de l''armée.'
  - type: text
    content: 'Amasa ne prit pas garde à l''épée qui était dans la main de Joab ; Joab lui en donna un coup au ventre et répandit ses intestins à terre ; il n''eut pas à lui porter un second coup : Amasa mourut.'
  - type: heading
    content: Fin de la révolte de Shéba
  - type: text
    content: 'Joab et Abishaï, son frère, se lancèrent à la poursuite de Shéba, fils de Bikri. '
  '11':
  - type: note
    content: 'est partisan de  : litt. se plaît avec  ; cf. 15.26n. –  derrière Joab ! tous ceux qui pouvaient encore hésiter sur la meilleure manière de servir David sont invités à se rallier sans réserve à Joab, puisque Amasa n''est plus en état de commander.'
  - type: text
    content: 'Un des serviteurs de Joab s''était arrêté près d''Amasa et disait : Qui est partisan de Joab et qui appartient à David, derrière Joab ! '
  '12':
  - type: note
    content: parce qu'il avait vu… ou puisque tous ceux qui arrivaient près de lui le voyaient et s'arrêtaient  ; cf. 2.23.
  - type: text
    content: 'Amasa se roulait dans le sang au milieu de la route ; l''homme, ayant vu que tout le peuple s''arrêtait, poussa Amasa du chemin dans un champ et jeta un vêtement sur lui, parce qu''il avait vu que tous ceux qui arrivaient près de lui s''arrêtaient. '
  '13':
  - type: text
    content: Quand on l'eut retiré de la route, chacun suivit Joab, afin de poursuivre Shéba, fils de Bikri.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Il  : ce sujet pronominal peut désigner soit Shéba , soit Joab , d''après la suite du texte. –  Abel-Beth-Maaka  : localité située à une quarantaine de kilomètres au nord du lac de Gennésareth ; cf. 1R 15.20 ; 2R 15.29. –  et de tous les Bérim  : population inconnue ; parmi plusieurs corrections proposées pour donner un sens à ces mots, la plus vraisemblable, appuyée partiellement par des versions anciennes, permettrait de lire et tous étaient alliés (à Joab). –  Ils se rassemblèrent et le suivirent  : les alliés se rassemblent pour suivre Joab ; mais on peut aussi comprendre Joab et ses alliés se rassemblèrent pour le poursuivre , c.-à-d. pour poursuivre Shéba.'
  - type: text
    content: 'Il traversa toutes les tribus d''Israël dans la direction d''Abel-Beth-Maaka, et de tous les Bérim. Ils se rassemblèrent et le suivirent. '
  '15':
  - type: note
    content: 'assiéger Shéba  : litt. l''assiéger. –  remblai  : cf. 2R 19.32.'
  - type: text
    content: 'Ils vinrent assiéger Shéba dans Abel-Beth-Maaka, et on éleva contre la ville un remblai ; il s''appuyait au rempart. Tout le peuple qui était avec Joab sapait la muraille pour la faire tomber. '
  '16':
  - type: note
    content: 'sage  : cf. v. 22 ; voir aussi 14.2n.'
  - type: text
    content: 'Alors une femme sage se mit à crier de la ville : Ecoutez, écoutez, je vous prie, dites à Joab : « Approche jusqu''ici, je veux te parler ! » '
  '17':
  - type: text
    content: 'Il s''approcha d''elle ; la femme dit : Est-ce toi, Joab ? Il répondit : C''est moi ! Elle lui dit : Ecoute mes paroles. Il répondit : J''écoute. '
  '18':
  - type: note
    content: La construction et le sens des v. 18s ne sont pas des plus clairs. Les versions anciennes ont souvent deviné plutôt que traduit le texte. Il n'est cependant pas impossible d'en respecter le texte hébreu. Abel, c.-à-d. Abel-Beth-Maaka (en compagnie de Dan d'après LXX) était semble-t-il considérée comme une gardienne de la tradition israélite, que l'on pouvait interroger.
  - type: text
    content: 'Alors elle dit : Autrefois on avait coutume de dire : « Qu''on interroge Abel ! » Et l''affaire était réglée. '
  '19':
  - type: note
    content: 'Moi, je suis parmi…  : litt. moi, les pacifiés des fidèles d''Israël (adjectifs au masculin pluriel en hébreu). Il faut sans doute comprendre que la femme parle au nom de sa ville, dont elle fait l''éloge par comparaison à l''ensemble de la nation. –  une mère, c.-à-d. une métropole. –  anéantirais-tu  : litt. avalerais-tu ou engloutirais-tu (de même au v. 20). –  le patrimoine du Seigneur  : cette expression désigne habituellement le peuple d''Israël (ou le pays d''Israël) dans son ensemble, cf. 14.16 ; Dt 9.26,29 ; 1S 26.19 ; ici le sort infligé à une seule ville est considéré comme une atteinte à l''ensemble de la communauté nationale.'
  - type: text
    content: 'Moi, je suis parmi les plus paisibles et les plus sûrs en Israël, et toi tu cherches à faire mourir une ville qui est une mère en Israël ! Pourquoi anéantirais-tu le patrimoine du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 's''attachèrent à leur roi  : cf. 1R 12.20. –  et l''accompagnèrent  : sous-entendu dans le texte.'
  - type: text
    content: Tous les hommes d'Israël laissèrent David pour suivre Shéba, fils de Bikri. Mais les hommes de Juda s'attachèrent à leur roi et l'accompagnèrent depuis le Jourdain jusqu'à Jérusalem.
  '20':
  - type: note
    content: 'Jamais  : cf. 1S 2.30n.'
  - type: text
    content: 'Joab répondit : Jamais ! Jamais je n''anéantirais, jamais je ne ferais périr ! '
  '21':
  - type: note
    content: 'a levé la main contre  : cf. 18.28n.'
  - type: text
    content: 'Il ne s''agit pas de cela. Mais un homme de la région montagneuse d''Ephraïm, nommé Shéba, fils de Bikri, a levé la main contre le roi, contre David. Livrez-le, lui seul, et je m''éloignerai de la ville. La femme dit à Joab : Eh bien, sa tête te sera jetée par la muraille ! '
  '22':
  - type: note
    content: 'parler  : sous-entendu dans le texte hébreu, explicité par LXX et Vg. –  avec sa sagesse  : cf. v. 16+. –  sonna de la trompe  : cf. 2.28+. –  dans ses tentes  : cf. 18.17n.'
  - type: text
    content: La femme alla parler à tout le peuple avec sa sagesse ; ils coupèrent la tête de Shéba, fils de Bikri, et la jetèrent à Joab. Alors Joab sonna de la trompe, et ils se dispersèrent loin de la ville, chacun dans ses tentes. Puis Joab revint à Jérusalem, auprès du roi.
  - type: heading
    content: Liste des fonctionnaires de David
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Voir en 8.15-18 une notice analogue à celle des v. 23-26. –  Joab  : cf. 2.13n  ; cf. 19.14. –  Benaya  : ici, hébreu Benaya  ; cf. 8.18n. –  Kérétites / Pélétites  : cf. 8.18n.'
  - type: text
    content: 'Joab commandait toute l''armée d''Israël ; Benaya, fils de Joïada, était à la tête des Kérétites et des Pélétites ; '
  '24':
  - type: note
    content: 'Adoram n''apparaît pas dans la liste de 8.15-18 ; il est peut-être à identifier avec Adoniram de 1R 4.6 ; 5.28, intendant des corvées sous le règne de Salomon. –  Josaphat… archiviste  : cf. 8.16.'
  - type: text
    content: 'Adoram était intendant des corvées ; Josaphat, fils d''Ahiloud, était archiviste ; '
  '25':
  - type: note
    content: Sheva (nom parfois orthographié Sheya) a remplacé Seraya de 8.17 ; cf. 1Ch 2.49 ; voir scribe. –  Tsadoq et Abiathar 15.24n  ; cf. 8.17.
  - type: text
    content: 'Sheva était scribe ; Tsadoq et Abiathar étaient prêtres ; '
  '26':
  - type: note
    content: Ira de Yaïr n'apparaît nulle part ailleurs dans l'A.T.
  - type: text
    content: et Ira de Yaïr était aussi prêtre pour David.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'les dix concubines  : cf. 15.16+ ; 16.21s. –  pour garder la maison / dans une maison bien gardée  : les deux expressions sont analogues en hébreu comme en français. –  il n''alla pas avec elles , c.-à-d. il n''eut plus de relations sexuelles avec elles  ; cf. Gn 16.2n  ; Dt 24.1-4. –  vivant dans un état de veuvage  : litt. veuvage d''une durée de vie , c.-à-d. qu''elles sont comme des veuves pour le restant de leur vie.'
  - type: text
    content: David rentra chez lui, à Jérusalem. Le roi prit les dix concubines qu'il avait laissées pour garder la maison et il les mit dans une maison bien gardée ; il pourvut à tous leurs besoins, mais il n'alla pas avec elles ; elles furent enfermées jusqu'au jour de leur mort, vivant dans un état de veuvage.
  - type: heading
    content: Joab assassine Amasa
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Amasa  : cf. 17.25 ; 19.14. –  trois jours  : il faut agir vite, avant que la révolte de Shéba prenne de l''ampleur. Cf. le conseil analogue d''Ahitophel en 17.1-4, contré par celui de Houshaï dans les v. suivants. –  les hommes de Juda , c.-à-d. l''armée populaire . –  et toi, sois présent ici  : ordre insolite du roi, qui viserait selon certains à empêcher Amasa de réussir la mobilisation ; mais on peut aussi comprendre puis viens te présenter ici (avec l''armée) , ce que suggère le Amasa partit du v. 5.'
  - type: text
    content: 'Le roi dit à Amasa : Appelle-moi pour dans trois jours les hommes de Juda ; et toi, sois présent ici. '
  '5':
  - type: text
    content: 'Amasa partit pour appeler Juda ; mais il tarda au-delà du temps que le roi lui avait fixé. '
  '6':
  - type: note
    content: 'Abishaï  : cf. 1S 26.6n. –  mes hommes  : litt. les serviteurs de ton seigneur, c.-à-d. l''armée de métier  ; cf. v. 7. –  que nous ne le perdions de vue  : litt. qu''il n''échappe (à) nos yeux  ; la préposition à manque en hébreu, ce qui a conduit les versions anciennes à toutes sortes d''interprétations peu convaincantes.'
  - type: text
    content: 'David dit alors à Abishaï : Shéba, fils de Bikri, va maintenant nous faire plus de mal qu''Absalom. Prends toi-même mes hommes et poursuis-le, de peur qu''il ne trouve des villes fortes et que nous ne le perdions de vue. '
  '7':
  - type: note
    content: 'Les hommes de Joab  : Joab limogé de son poste de chef de l''armée (cf. 19.14), reste néanmoins à la tête de la garde royale ; c''est Abishaï, son frère, qui reprend le commandement général des troupes. –  les Kérétites et les Pélétites  : cf. 8.18n. –  tous les guerriers  : autre traduction tous les hommes vaillants, cf. 10.7n  ; 23.8ss.'
  - type: text
    content: Les hommes de Joab sortirent derrière lui, avec les Kérétites et les Pélétites, et tous les guerriers ; ils sortirent de Jérusalem afin de poursuivre Shéba, fils de Bikri.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Gabaon  : cf. 2.12n. – La description de l''habillement et de l''équipement militaire de Joab n''est pas tout à fait claire.'
  - type: text
    content: 'Lorsqu''ils furent près de la grande pierre qui est à Gabaon, Amasa arriva devant eux. Joab avait passé une ceinture sur les habits dont il était vêtu, et il avait mis une épée à sa ceinture ; elle était attachée à ses reins, dans un fourreau. Elle tomba comme Joab s''avançait. '
  '9':
  - type: note
    content: 'Comment vas-tu… ? 1S 10.4n. –  saisit la barbe  : geste d''affection, encore en usage dans le monde arabe.'
  - type: text
    content: 'Joab dit à Amasa : Comment vas-tu, mon frère ? Et de la main droite il saisit la barbe d''Amasa, pour l''embrasser. '
