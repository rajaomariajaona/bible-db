    - type: text
      text: 'Faites le dénombrement de toute la communauté des Israélites, depuis l''âge de vingt ans et au-dessus, famille par famille, de tous ceux qui sont aptes à porter les armes en Israël. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les fils de Juda, clan par clan : Shéla, le clan des Shélanites ; Pérets, le clan des Partsites ; Zérah, le clan des Zarhites. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
