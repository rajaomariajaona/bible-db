document_id: NUM.26,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'fils du prêtre Aaron  : LXX le prêtre  ; cf. 20.22ss.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Eléazar, fils du prêtre Aaron : '
  '10':
  - type: note
    content: 'La terre ouvrit sa bouche… 16.31ss. –  sa communauté  : litt. la communauté. –  d''exemple  : litt. de signal, cf. 21.8n.'
  - type: text
    content: 'La terre ouvrit sa bouche et les engloutit avec Coré dans la mort de sa communauté, quand le feu dévora les deux cent cinquante hommes : ils servirent d''exemple. '
  '11':
  - type: note
    content: 'fils de Coré  : cf. v. 58n  ; 16.32 ; 1Ch 9.19 ; 26.1ss ; 2Ch 20.19 ; voir aussi les suscriptions des Psaumes 42–49 ; 84–85 ; 87–88.'
  - type: text
    content: Mais les fils de Coré ne moururent pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Siméon 1.22s. –  Nemouel  : cf. v. 9 ; 1Ch 4.24 ; Syr Yemouel , cf. Gn 46.10 ; Ex 6.15.'
  - type: text
    content: 'Fils de Siméon, clan par clan : Nemouel, le clan des Nemouélites ; Yamîn, le clan des Yaminites ; Yakîn, le clan des Yakinites ; '
  '13':
  - type: note
    content: 'Zérah  : cf. v. 20 ; certains modifient le texte hébreu traditionnel pour lire Tsohar (Gn 46.10 ; Ex 6.15).'
  - type: text
    content: 'Zérah, le clan des Zérahites ; Saül, le clan des Saülites. '
  '14':
  - type: text
    content: 'Ce sont là les clans des Siméonites : 22 200.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Dans LXX Gad vient après Zabulon (v. 27) ; cf. 1.24s ; Gn 46.16.
  - type: text
    content: 'Fils de Gad, clan par clan : Tsephôn, le clan des Tsephonites ; Haggui, le clan des Hagguites ; Shouni, le clan des Shounites ; '
  '16':
  - type: text
    content: 'Ozni, le clan des Oznites ; Eri, le clan des Erites ; '
  '17':
  - type: text
    content: 'Arod, le clan des Arodites ; Aréli, le clan des Arélites. '
  '18':
  - type: text
    content: 'Ce sont là les clans des fils de Gad, ceux qui furent recensés parmi eux : 40 500.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Juda  : cf. 1.26s ; Gn 38.3-12,27ss ; 46.12 ; 1Ch 2.3ss.'
  - type: text
    content: 'Fils de Juda : Er et Onân ; mais Er et Onân moururent en Canaan. '
  '2':
  - type: note
    content: 'Faites le dénombrement  : LXX porte le singulier (fais le dénombrement) ; cf. v. 52ss,64s ; 1.2nss. –  qui sont aptes… 1.3n.'
  - type: text
    content: 'Faites le dénombrement de toute la communauté des Israélites, depuis l''âge de vingt ans et au-dessus, famille par famille, de tous ceux qui sont aptes à porter les armes en Israël. '
  '20':
  - type: text
    content: 'Voici les fils de Juda, clan par clan : Shéla, le clan des Shélanites ; Pérets, le clan des Partsites ; Zérah, le clan des Zarhites. '
  '21':
  - type: text
    content: 'Les fils de Pérets : Hetsrôn, le clan des Hetsronites ; Hamoul, le clan des Hamoulites. '
  '22':
  - type: text
    content: 'Ce sont là les clans de Juda, ceux qui furent recensés parmi eux : 76 500.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Issacar 1.28s ; Gn 46.13 ; 1Ch 7.1ss. –  Tola  : cf. Jg 10.1s.'
  - type: text
    content: 'Fils d''Issacar, clan par clan : Tola, le clan des Tolaïtes ; Pouva, le clan des Pounites ; '
  '24':
  - type: note
    content: 'Shimrôn  : cf. Jos 11.1.'
  - type: text
    content: 'Yashoub, le clan des Yashoubites ; Shimrôn, le clan des Shimronites. '
  '25':
  - type: text
    content: 'Ce sont là les clans d''Issacar, ceux qui furent recensés parmi eux : 64 300.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Zabulon 1.30s ; Gn 46.14. –  Elôn  : cf. Jg 12.11s.'
  - type: text
    content: 'Fils de Zabulon, clan par clan : Séred, le clan des Sardites ; Elôn, le clan des Elonites ; Yahléel, le clan des Yahléélites. '
  '27':
  - type: text
    content: 'Ce sont là les clans des Zabulonites, ceux qui furent recensés parmi eux : 60 500.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Manassé et Ephraïm  : cf. Gn 46.20.'
  - type: text
    content: 'Fils de Joseph, clan par clan : Manassé et Ephraïm. '
  '29':
  - type: note
    content: 'Manassé 1.34s. –  Makir  : cf. 36.1 ; Gn 50.23n  ; Jos 17.1ss ; Jg 5.14n  ; 1Ch 2.21ss ; 7.14ss. –  Galaad  : cf. 32.39s ; Gn 31.21n.'
  - type: text
    content: 'Fils de Manassé : pour Makir, le clan des Makirites. Makir engendra Galaad. Pour Galaad, le clan des Galaadites. '
  '3':
  - type: note
    content: 'les plaines arides de Moab 22.1n. –  du Jourdain…  : litt. du Jourdain de Jéricho  ; de même au v. 63 ; 31.12 ; 33.48,50 ; 35.1 ; 36.13 ; cf. 22.1n. –  leur dirent  : le texte du v. 4 ne semble pas correspondre au discours annoncé ; certains modifient le texte hébreu traditionnel pour lire les recensèrent ou les comptèrent.'
  - type: text
    content: 'Dans les plaines arides de Moab, près du Jourdain, en face de Jéricho, Moïse et Eléazar, le prêtre, leur dirent : '
  '30':
  - type: text
    content: 'Voici les fils de Galaad : pour Yézer, le clan des Yézérites ; pour Héleq, le clan des Helqites ; '
  '31':
  - type: text
    content: 'pour Asriel, le clan des Asriélites ; pour Sichem, le clan des Sichémites ; '
  '32':
  - type: note
    content: 'Hépher  : cf. Jos 12.17 ; 1R 4.10.'
  - type: text
    content: 'pour Shemida, le clan des Shemidaïtes ; pour Hépher, le clan des Héphrites. '
  '33':
  - type: note
    content: 'Cf. 27.1ss ; Jos 17.3ss. –  Mahla…  : noms de localités à l''ouest du Jourdain. –  Noa  : cf. Jos 19.13. –  Hogla  : cf. Jos 15.6. –  Tirtsa  : cf. Jos 12.24 ; 1R 14.17 ; 15.21.'
  - type: text
    content: 'Tselophhad, fils de Hépher, n''eut pas de fils, mais seulement des filles. Voici les noms des filles de Tselophhad : Mahla, Noa, Hogla, Milka et Tirtsa. '
  '34':
  - type: text
    content: 'Ce sont là les clans de Manassé, ceux qui furent recensés parmi eux : 52 700.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Ephraïm  : cf. 1.32s ; 1Ch 7.20. –  Béker et son clan sont omis par LXX ; cf. Gn 46.21 ; 1Ch 7.20 ( Béred ).'
  - type: text
    content: 'Voici les fils d''Ephraïm, clan par clan : pour Shoutélah, le clan des Shoutalhites ; pour Béker, le clan des Bakrites ; pour Tahân, le clan des Tahanites. '
  '36':
  - type: text
    content: 'Voici les fils de Shoutélah : pour Erân, le clan des Eranites. '
  '37':
  - type: text
    content: 'Ce sont là les clans des fils d''Ephraïm, ceux qui furent recensés parmi eux : 32 500. Ce sont là les fils de Joseph, clan par clan.'
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Benjamin  : cf. 1.36s ; Gn 46.21 ; 1Ch 7.6ss ; 8.1ss.'
  - type: text
    content: 'Fils de Benjamin, clan par clan : pour Béla, le clan des Balites ; pour Ashbel, le clan des Ashbélites ; pour Ahiram, le clan des Ahiramites ; '
  '39':
  - type: text
    content: 'pour Shoupham, le clan des Shouphamites ; pour Houpham, le clan des Houphamites. '
  '4':
  - type: note
    content: 'Texte obscur ; à la fin on pourrait aussi comprendre  : les fils d''Israël qui sortirent d''Egypte (étaient) (5) Ruben…  ; cf. v. 64.'
  - type: text
    content: 'Depuis l''âge de vingt ans et au-dessus, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a ordonné à Moïse et aux Israélites qui sortaient d''Egypte.'
  '40':
  - type: note
    content: 'le clan des Ardites  : omis par certains mss de LXX ; d''autres témoins anciens portent pour Ard, le clan des Ardites.'
  - type: text
    content: 'Les fils de Béla furent Ard et Naaman ; le clan des Ardites ; pour Naaman, le clan des Naamanites. '
  '41':
  - type: note
    content: 'clan par clan  : absent de Syr.'
  - type: text
    content: 'Ce sont là les fils de Benjamin, clan par clan, ceux qui furent recensés parmi eux : 45 600.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Dan  : cf. 1.38s ; Gn 46.23 ; Jg 18.2.'
  - type: text
    content: 'Voici les fils de Dan, clan par clan : pour Shouham, le clan des Shouhamites. Ce sont là les clans de Dan, clan par clan. '
  '43':
  - type: text
    content: 'Total pour les clans des Shouhamites, ceux qui furent recensés parmi eux : 64 400.'
  '44':
  - type: text
    content: ' '
  - type: note
    content: Dans LXX Aser vient après Zabulon (v. 27) et Gad (cf. v. 15n) ; cf. 1.40s ; Gn 46.17 ; 1Ch 7.30s.
  - type: text
    content: 'Fils d''Aser, clan par clan : pour Yimna, le clan des Yimnites ; pour Yishvi, le clan des Yishvites ; pour Beria, le clan des Beriites. '
  '45':
  - type: note
    content: 'Pour les fils de Beria  : ces mots sont omis par LXX ; cf. Gn 46.17.'
  - type: text
    content: 'Pour les fils de Beria : pour Héber, le clan des Hébrites ; pour Malkiel, le clan des Malkiélites. '
  '46':
  - type: note
    content: 'la fille d''Aser  : on ne sait pas pourquoi cette fille d''Aser est mentionnée, à titre exceptionnel, parmi les fils ; cf. Gn 46.17.'
  - type: text
    content: 'Le nom de la fille d''Aser était Sérah. '
  '47':
  - type: text
    content: 'Ce sont là les clans des fils d''Aser, ceux qui furent recensés parmi eux : 53 400.'
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Nephtali  : cf. 1.42s.'
  - type: text
    content: 'Fils de Nephtali, clan par clan : pour Yahtséel, le clan des Yahtséélites ; pour Gouni, le clan des Gounites ; '
  '49':
  - type: note
    content: 'Yétser  : cf. 1Ch 7.13.'
  - type: text
    content: 'pour Yétser, le clan des Yitsrites ; pour Shillem, le clan des Shillémites. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 46.8ss ; Ex 6.14ss ; 1Ch 2–8 ; voir aussi Ap 7.4ss. –  Ruben 1.20s.
  - type: text
    content: 'Ruben, premier-né d''Israël. Fils de Ruben : pour Hénoch, le clan des Hénochites ; pour Pallou, le clan des Pallouites ; '
  '50':
  - type: text
    content: 'Ce sont là les clans de Nephtali, clan par clan, ceux qui furent recensés parmi eux : 45 400.'
  '51':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 7n  ; 1.46n.
  - type: text
    content: 'Tels sont ceux qui furent recensés parmi les Israélites : 601 730.'
  - type: heading
    content: Indications pour le partage du pays promis
  '52':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '53':
  - type: note
    content: 'Le pays  : cf. 33.50-56 ; 34.13 ; Jg 1.1ss. –  leur patrimoine Jos 14.1ss ; 17.14ss ; 18.2ss. –  des personnes  : litt. des noms, cf. 27.4.'
  - type: text
    content: 'Le pays sera partagé entre eux, pour être leur patrimoine, selon le nombre des personnes. '
  '54':
  - type: note
    content: Cf. 35.8.
  - type: text
    content: 'A ceux qui sont en plus grand nombre tu attribueras un patrimoine plus grand, à ceux qui sont en plus petit nombre tu attribueras un patrimoine plus petit ; on attribuera à chacun son patrimoine en fonction de ceux qu''on a recensés. '
  '55':
  - type: note
    content: 'par le sort 33.54 ; 34.13 ; 36.2s ; Lv 16.8n  ; Jos 13.6 ; 14.1ss ; 18.2ss ; cf. Jg 1.3ss ; 18–19 ; Jubilés 8.10s : « Au commencement du trente-troisième jubilé, ils répartirent la terre en trois lots, pour Sem, Cham et Japhet, respectivement. (…) Noé appela ses enfants, ils s''approchèrent de lui, eux et leurs enfants, et il répartit la terre au moyen de morceaux de bois que ses trois fils devaient prendre. Ils tendirent la main et tirèrent un écrit dans le giron de Noé leur père. » (Cf. Gn 10.) Sur les différents emplois du tirage au sort, voir aussi Jg 20.9 ; 1S 10.17-22 ; 14.41ss ; Es 34.17 ; Ez 21.26s ; Jl 4.3 ; Ab 11 ; Jon 1.7 ; Mi 2.5 ; Na 3.10 ; Ps 22.19 ; 78.55 ; Pr 16.33 ; 18.18 ; Né 10.35 ; 11.1 ; 1Ch 24.5 ; Mt 27.35/ / ; Ac 1.24ss. –  leurs tribus 1.16n.'
  - type: text
    content: 'Mais le partage du pays se fera par le sort ; ils recevront leur patrimoine selon les noms de leurs tribus. '
  '56':
  - type: text
    content: C'est par le sort que le patrimoine sera partagé entre ceux qui sont en grand nombre et ceux qui sont en petit nombre.
  - type: heading
    content: Second recensement des lévites
  '57':
  - type: text
    content: ' '
  - type: note
    content: 'lévites  : cf. 1.47+ss ; 2.33 ; 3.6ss,14ss ; Gn 46.11 ; Ex 6.16-19 ; 1Ch 6.1ss.'
  - type: text
    content: 'Voici ceux qui furent recensés parmi les lévites, clan par clan : pour Guershôn, le clan des Guershonites ; pour Qehath, le clan des Qehatites ; pour Merari, le clan des Merarites. '
  '58':
  - type: note
    content: 'de Lévi  : Smr, LXX des fils de Lévi. –  Libnites et Hébronites, termes dérivés du nom des villes sacerdotales d''Hébron et Libna, dans le territoire de Juda (Jos 21.13). –  Mahlites  : ce clan est omis par LXX ; cf. v. 33 ; 27.1. –  Moushites  : ce nom vient probablement de celui de Moïse (hébreu Moshé) ; voir cependant Ex 6.17ss. –  Coréites  : à rapprocher de Coré (v. 11 ; cf. 1Ch 2.43).'
  - type: text
    content: 'Voici les clans de Lévi : le clan des Libnites, le clan des Hébronites, le clan des Mahlites, le clan des Moushites, le clan des Coréites. Qehath engendra Amram. '
  '59':
  - type: note
    content: 'elle était née  : d''après des versions anciennes ; le texte hébreu traditionnel porte (litt.) qui l''enfanta (elle) pour Lévi  ; certains pensent que le texte portait à l''origine que sa mère enfanta  ; cf. Ex 6.20.'
  - type: text
    content: 'Le nom de la femme d''Amram était Yokébed, fille de Lévi ; elle était née de Lévi en Egypte ; elle donna à Amram Aaron, Moïse et Miriam, leur sœur. '
  '6':
  - type: text
    content: 'pour Hetsrôn, le clan des Hetsronites ; pour Karmi, le clan des Karmites. '
  '60':
  - type: text
    content: 'Nés d''Aaron : Nadab et Abihou, Eléazar et Itamar. '
  '61':
  - type: note
    content: 'Cf. 3.4n  ; Lv 10.1s. –  profane  : voir saint.'
  - type: text
    content: 'Nadab et Abihou moururent lorsqu''ils présentèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un feu profane.'
  '62':
  - type: text
    content: ' '
  - type: note
    content: 'depuis l''âge d''un mois… 3.39. –  23 000  : cf. 1Co 10.8. –  il ne leur avait pas été donné ou il ne devait pas leur être donné 1.47ss ; 18.20-24.'
  - type: text
    content: Ceux qui furent recensés parmi eux, tous les mâles depuis l'âge d'un mois et au-dessus, étaient 23 000. Ils ne furent pas recensés au milieu des Israélites, parce qu'il ne leur avait pas été donné de patrimoine au milieu des Israélites.
  - type: heading
    content: Conclusion du recensement
  '63':
  - type: text
    content: ' '
  - type: note
    content: V. 3n. –  Eléazar, le prêtre 17.2+.
  - type: text
    content: 'Tels sont ceux qui furent recensés par Moïse et par Eléazar, le prêtre, dans les plaines arides de Moab, près du Jourdain, en face de Jéricho. '
  '64':
  - type: note
    content: Cf. 1.19 ; 14.29s.
  - type: text
    content: 'Parmi eux, il n''y avait aucun de ceux qui avaient été recensés par Moïse et par Aaron, le prêtre, quand ils avaient recensé les Israélites dans le désert du Sinaï. '
  '65':
  - type: note
    content: Cf. 14.30,35,38.
  - type: text
    content: 'Car à leur sujet le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit : « Ils mourront dans le désert. » Il n''en restait aucun, excepté Caleb, fils de Yephounné, et Josué, fils de Noun.'
  '7':
  - type: note
    content: L'effectif des tribus varie dans plusieurs mss de LXX (v. 18,41,43,50), mais le total donné au v. 51 reste le même.
  - type: text
    content: 'Ce sont là les clans des Rubénites : ceux qui furent recensés parmi eux étaient 43 730. '
  '8':
  - type: note
    content: 'Fils  : au pluriel d''après le texte hébreu traditionnel ; une autre lecture traditionnelle propose le singulier.'
  - type: text
    content: 'Fils de Pallou : Eliab. '
  '9':
  - type: note
    content: 'Datân / Abiram  : voir chap. 16. –  convoqués par la communauté  : autre lecture traditionnelle qui convoquaient la communauté, cf. 1.16n  ; 16.2,5+. –  combattirent  : Smr s''assemblèrent contre.'
  - type: text
    content: 'Fils d''Eliab : Nemouel, Datân et Abiram. Ce sont ce Datân et cet Abiram, convoqués par la communauté, qui combattirent Moïse et Aaron avec la communauté de Coré, lorsqu''ils combattirent le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
