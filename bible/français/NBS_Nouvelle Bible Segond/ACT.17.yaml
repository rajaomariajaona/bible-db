      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', villes de Macédoine au sud-ouest de Philippes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Thessalonique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou Salonique, principale ville de Macédoine 1Th 2.1s.
      marker-yv: yv-n
    - type: text
      text: 'Après avoir cheminé par Amphipolis et Apollonie, ils arrivèrent à Thessalonique, où les Juifs avaient une synagogue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
