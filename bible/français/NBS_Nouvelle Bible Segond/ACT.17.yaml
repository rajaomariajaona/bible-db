document_id: ACT.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul et Silas à Thessalonique
  - type: text
    content: ' '
  - type: note
    content: Amphipolis et Apollonie , villes de Macédoine au sud-ouest de Philippes. –  Thessalonique ou Salonique, principale ville de Macédoine 1Th 2.1s.
  - type: text
    content: 'Après avoir cheminé par Amphipolis et Apollonie, ils arrivèrent à Thessalonique, où les Juifs avaient une synagogue. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'de nuit 9.25+. –  Bérée  : à l''ouest de Thessalonique ; v. 13 ; 20.4. –  à la synagogue des Juifs v. 1s ; 13.5+.'
  - type: text
    content: 'Aussitôt les frères firent partir de nuit Paul et Silas pour Bérée. A leur arrivée, ils se rendirent à la synagogue des Juifs. '
  '11':
  - type: note
    content: 'avaient de meilleurs sentiments  : litt. étaient plus nobles, peut-être au sens de plus aimables  ; même terme en Lc 19.12 (de haute naissance) et 1Co 1.26 (nobles). –  ils accueillirent la Parole 8.14+. –  en examinant  : le même verbe est traduit par interroger en 4.9n  ; 24.8 ; 28.18. –  les Ecritures v. 2+ ; cf. Jn 5.39. –  si ce qu''on leur disait était exact  : litt. s''il en était ainsi, cf. 7.1+.'
  - type: text
    content: 'Ceux-ci avaient de meilleurs sentiments que ceux de Thessalonique ; ils accueillirent la Parole avec beaucoup d''ardeur, en examinant chaque jour les Ecritures pour voir si ce qu''on leur disait était exact. '
  '12':
  - type: note
    content: 'des femmes grecques… v. 4+. –  en grand nombre  : litt. pas peu nombreux, cf. 14.28n.'
  - type: text
    content: Beaucoup d'entre eux devinrent croyants, ainsi que des femmes grecques de haut rang et des hommes en grand nombre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: V. 5+,10 ; cf. 14.19.
  - type: text
    content: 'Mais quand les Juifs de Thessalonique surent qu''à Bérée aussi Paul annonçait la parole de Dieu, ils vinrent, là encore, pour soulever et troubler les foules. '
  '14':
  - type: note
    content: Silas 15.22+. –  Timothée 16.1+.
  - type: text
    content: 'Alors les frères firent aussitôt partir Paul du côté de la mer ; mais Silas et Timothée restèrent là. '
  '15':
  - type: note
    content: 'Cf. 18.1-5 ; 1Th 3.1-6. – Après Athènes, le texte occidental ajoute  : il passa la Thessalie, car il était empêché de leur proclamer la parole.'
  - type: text
    content: Ceux qui escortaient Paul le conduisirent jusqu'à Athènes. Puis ils s'en retournèrent, avec l'ordre, pour Silas et Timothée, de le rejoindre au plus tôt.
  - type: heading
    content: Paul à Athènes
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Métropole historique, Athènes était toujours le centre intellectuel de la culture grecque ; cf. 1Co 1.22. –  la vue…  : litt. son esprit s''exaspérait en lui à la vue…  : cf. 15.39n.'
  - type: text
    content: 'Tandis que Paul les attendait, à Athènes, la vue de cette ville vouée aux idoles l''exaspérait. '
  '17':
  - type: note
    content: Il discutait v. 2n. –  Juifs / adorateurs 13.43n  ; voir culte. –  dans la synagogue 13.5+. –  la place publique 16.19n.
  - type: text
    content: 'Il discutait donc avec les Juifs et les adorateurs dans la synagogue, mais aussi, chaque jour, avec ceux qui se trouvaient sur la place publique. '
  '18':
  - type: note
    content: 'épicuriens et stoïciens  : ce sont les deux principales écoles philosophiques de l''époque. La première, plutôt matérialiste et relativiste, postulait le non-sens de l''existence et encourageait ses adeptes à jouir de la vie avec un certain détachement ; la seconde affirmait en revanche la rationalité de l''univers et préconisait en conséquence la maîtrise de la raison (logos, cf. Jn 1.1n) sur les passions. Sur le rapport de Paul à la philosophie grecque, cf. 1Co 1.17ss ; 15.12ss. –  cette jacasse  : le grec emploie un terme de dérision assez courant, litt. picoreur de graines, évoquant l''image d''un oiseau piaillard qui se nourrit de tout ce qu''il trouve. –  divinités  : dans le N.T., le mot grec désigne généralement les démons  ; mais il n''avait pas de connotation péjorative dans la littérature grecque classique. D''après Xénophon (Ve-IVe s. av. J.-C.), le reproche d''introduire des divinités (démons) nouvelles (cf. v. 19) avait été fait à Socrate. Selon certains, les Athéniens prendraient ici le mot résurrection (litt. relèvement, au féminin en grec ; cf. v. 3,31s ; 2.24n) pour le nom propre (Anastasis) d''une déesse associée à Jésus. L''idée de résurrection était en effet étrangère aux Grecs, qui abordaient plutôt le problème de la mort sous l''angle de la survie d''une âme immatérielle. Le texte occidental omet la dernière phrase du v. (Cela, parce qu''il annonçait…).'
  - type: text
    content: 'Quelques philosophes épicuriens et stoïciens vinrent parler avec lui. Les uns disaient : Que veut dire cette jacasse ? D''autres : Ce doit être un prédicateur de divinités étrangères. Cela, parce qu''il annonçait la bonne nouvelle de Jésus et de la résurrection. '
  '19':
  - type: note
    content: 'l''Aréopage est le nom d''une colline d''Athènes (colline d''Arès [= Mars]), à l''ouest de l''Acropole, et du conseil qui y siégeait (cf. v. 34 ; 4.8-12 ; 5.27-33 ; 9.15 ; 23.6 ; 24.10-21 ; 26.2-3 ; Lc 21.12). –  Pourrions-nous savoir…  : cf. 28.22.'
  - type: text
    content: 'Alors ils le prirent, le menèrent à l''Aréopage et dirent : Pourrions-nous savoir quel est ce nouvel enseignement dont tu parles ? '
  '2':
  - type: note
    content: 'selon sa coutume  : cf. 13.5+,14 ; Lc 4.16+. –  sabbats Lc 4.16n. –  il discuta  : le verbe grec (d''où vient notre mot dialogue) peut évoquer un débat ou un simple entretien ; on le retrouve au v. 17 et en 18.4,19 ; 19.8s ; 20.7,9 ; 24.12,25 ; Mc 9.34 ; Jd 9 ; il est traduit par adresser (un encouragement) en Hé 12.5n. –  à partir des Ecritures 8.35n  ; cf. 17.11.'
  - type: text
    content: 'Paul s''y rendit, selon sa coutume. Pendant trois sabbats il discuta avec eux, à partir des Ecritures, '
  '20':
  - type: text
    content: 'Car tu portes à nos oreilles des choses étranges. Nous souhaiterions donc savoir ce que cela veut dire. '
  '21':
  - type: text
    content: De fait, tous les Athéniens et les étrangers venus parmi eux passaient tout leur temps à raconter ou à écouter les dernières nouveautés.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'religieux  : le mot grec ainsi traduit est formé sur le terme rendu par divinités au v. 18n (litt. enclins à la crainte des « démons » ou des divinités ) ; un terme apparenté est traduit par religion en 25.19.'
  - type: text
    content: 'Debout au milieu de l''Aréopage, Paul dit : Hommes d''Athènes, je vois que vous êtes à tous égards extrêmement religieux. '
  '23':
  - type: note
    content: 'j''ai observé… v. 16. –  A un dieu inconnu  : il existe plusieurs témoignages historiques d''un culte des dieux inconnus à Athènes ; tout porte à croire que les Grecs, dans leur polythéisme ouvert, voulaient ainsi conjurer le risque d''irriter sans le savoir une divinité oubliée ; le verbe grec correspondant à inconnu, qui se retrouve dans l''expression sans le connaître, est apparenté au mot traduit par ignorance au v. 30 ; cf. 3.17n. –  Ce que vous vénérez…  : certains mss portent  : celui que vous vénérez… c''est lui que, moi, je vous annonce  ; cf. Jn 4.22ss.'
  - type: text
    content: 'En passant, en effet, j''ai observé vos objets de culte, et j''ai même trouvé un autel avec cette inscription :'
  - type: text
    content: « A un dieu inconnu. »
  - type: text
    content: 'Ce que vous vénérez sans le connaître, c''est cela même que, moi, je vous annonce. '
  '24':
  - type: note
    content: Cf. 14.15-17. –  Le Dieu qui a fait… 4.24+ ; cf. Gn 1.1 ; Ex 20.11 ; Es 42.5 ; Ps 146.6 ; Né 9.6 ; Ap 14.7. –  Seigneur du ciel et de la terre Mt 11.25. –  sanctuaires fabriqués… 7.48+,49+.
  - type: text
    content: 'Le Dieu qui a fait le monde et tout ce qui s''y trouve, lui qui est le Seigneur du ciel et de la terre, n''habite pas dans des sanctuaires fabriqués par des mains humaines ; '
  '25':
  - type: note
    content: 'servi par des mains humaines  : cf. 19.26. –  comme s''il avait besoin…  : cf. Jr 7.22 ; Ps 50.12 ; 51.18 ; 2 Maccabées 14.35 : « Seigneur, ô toi qui n''as besoin de rien, il t''a plu d''avoir parmi nous le Temple où tu habites. » –  la vie, le souffle (2.2n) …  : cf. Gn 2.7 ; Es 42.5 ; 57.15s ; Jr 27.5 ; 1Tm 6.13 ; 2 Maccabées 7.23 : « Aussi bien le Créateur du monde, qui a formé l''homme à sa naissance et qui est à l''origine de toute chose, vous rendra-t-il dans sa miséricorde et l''esprit (= le souffle) et la vie. »'
  - type: text
    content: 'il n''est pas servi par des mains humaines, comme s''il avait besoin de quoi que ce soit : c''est lui qui donne à tous la vie, le souffle et toutes choses. '
  '26':
  - type: note
    content: 'D''un seul être  : litt. d''un seul  ; on pourrait aussi comprendre, plus abstraitement  : de la même origine  ; quelques mss, dont ceux du texte occidental, ont d''un seul sang  ; autre traduction possible  : il a fait en sorte que toutes les nations des humains, issues d''un seul, habitent…  ; cf. Gn 1.28 ; 10.1ss ; Dt 32.8. –  les nations 10.45n  ; voir aussi non-Juifs. –  sur toute la surface de la terre…  : cf. Gn 11.9 ; Lc 21.35. –  dans les temps…  : litt. ayant institué (ou déterminé, cf. 2.23n) les temps fixés (ou les saisons, comme en 14.17) et les frontières de leur habitation  ; cf. Gn 1.14 ; Jr 31.35 ; Ps 74.13s,17 ; Dn 2.21 ; Sagesse 7.17ss : « Il m''a appris la structure de l''univers et l''activité des éléments, le commencement, la fin et le milieu des temps, les alternances des solstices et les changements de saisons, les cycles de l''année et les positions des astres… »'
  - type: text
    content: 'D''un seul être il a fait toutes les nations des humains, pour que ceux-ci habitent sur toute la surface de la terre, dans les temps fixés et les limites qu''il a institués, '
  '27':
  - type: note
    content: 'qu''ils cherchent Dieu (ou, selon certains mss, le Seigneur) : cf. Dt 4.29 ; Es 55.6 ; 65.1 ; Am 5.6. Texte occidental qu''ils cherchent plutôt [ce qu''est] le divin (ou la divinité, comme au v. 29). –  si tant est…  : autre traduction si vraiment on peut le palper (même verbe Lc 24.39 ; 1Jn 1.1) et le trouver…  ; cf. Rm 1.19ns. –  pas loin  : cf. Dt 30.11 ; Jr 23.23 ; Ps 139.7-12 ; 145.18 ; Mc 12.34.'
  - type: text
    content: 'afin qu''ils cherchent Dieu, si tant est qu''on puisse le trouver en tâtonnant. Pourtant il n''est pas loin de chacun de nous, '
  '28':
  - type: note
    content: 'c''est en lui (ou par lui  ; cf. Rm 11.36+ ; 1Co 8.6n) que nous vivons…  : on trouve une formule analogue chez Epiménide (VIe s. av. J.-C.). –  Nous sommes aussi sa lignée  : citation d''un vers des Phénomènes d''Aratos (IIIe s. av. J.-C.) ; cf. Gn 1.26s ; 5.1-3 ; 2P 1.4 ; 1Jn 3.2.'
  - type: text
    content: car c'est en lui que nous vivons, que nous nous mouvons et que nous sommes.
  - type: text
    content: 'C''est ce qu''ont également dit quelques-uns de vos poètes :'
  - type: text
    content: « Nous sommes aussi sa lignée. »
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.26 ; Dt 4.28 ; Es 40.18-20 ; 44.9-20 ; Rm 1.23 ; Sagesse 15.17 : « Mortel, il (l''idolâtre) ne peut produire de ses mains impies qu''une œuvre morte ; encore vaut-il mieux que les objets de son adoration : lui, il a reçu la vie, mais eux ne l''auront jamais. »'
  - type: text
    content: 'Si donc nous sommes la lignée de Dieu, nous ne devons pas penser que la divinité soit semblable à de l''or, à de l''argent ou à de la pierre sculptés par l''art et l''imagination des humains. '
  '3':
  - type: note
    content: 'dont il ouvrait le sens (litt. qu''il ouvrait  ; sur le verbe correspondant, voir Lc 24.32n) …  : cf. Ac 3.18 ; 26.22-23+ ; voir aussi Lc 24.26,46. –  se relever ou être relevé, c.-à-d. ressusciter, cf. 2.24n. –  disait-il  : sous-entendu dans le texte. –  c''est lui qui est le Christ 9.20,22+ ; 18.5 ; voir onction.'
  - type: text
    content: 'dont il ouvrait le sens pour établir que le Christ devait souffrir et se relever d''entre les morts. Ce Jésus que, moi, je vous annonce, disait-il, c''est lui qui est le Christ ! '
  '30':
  - type: note
    content: 'Sans tenir compte  : litt. passant par-dessus. –  ignorance v. 23n  ; 3.17n. –  enjoint  : certains mss portent annonce… (qu''ils doivent changer…). –  changer radicalement  : autres traductions se repentir ; se convertir  ; cf. 2.38n  ; Lc 24.47.'
  - type: text
    content: 'Sans tenir compte des temps d''ignorance, Dieu enjoint maintenant à tous les humains, en tous lieux, de changer radicalement, '
  '31':
  - type: note
    content: 'il va juger…  : cf. Ps 9.9n  ; 96.13 ; 98.9 ; voir aussi justice. –  par un homme  : ou un être humain, cf. v. 26,29 ; le texte occidental précise Jésus  ; cf. 10.42+ ; Jn 5.27. –  institué ou désigné, cf. 2.23n. –  une preuve digne de foi ou une garantie, autre sens du mot habituellement traduit par foi. –  en le relevant  : un terme apparenté est traduit par résurrection au v. 18n,32 ; 2.24n  ; 1Th 1.9s.'
  - type: text
    content: parce qu'il a fixé un jour où il va juger toute la terre habitée selon la justice par un homme qu'il a institué, et il en a donné à tous une preuve digne de foi en le relevant d'entre les morts.
  '32':
  - type: text
    content: ' '
  - type: note
    content: se moquèrent v. 18n  ; cf. 2.12s ; 4.2 ; 1Co 1.23 ; 15.12.
  - type: text
    content: 'Lorsqu''ils entendirent parler de résurrection des morts, certains se moquèrent et d''autres dirent : Nous t''entendrons là-dessus une autre fois. '
  '33':
  - type: note
    content: Cf. 1Co 2.1-5.
  - type: text
    content: 'Ainsi Paul sortit du milieu d''eux. '
  '34':
  - type: note
    content: 'Quelques-uns  : litt. quelques hommes (1.16n) ; cf. 17.4. –  Denys l''Aréopagite, c.-à-d. un des membres du conseil de l''Aréopage (v. 19n). C''est à lui qu''on attribuait, au Moyen Age, un ouvrage mystique fort prisé, écrit en fait sous son nom au Ve ou au VIe s. apr. J.-C.'
  - type: text
    content: Quelques-uns néanmoins s'attachèrent à lui et devinrent croyants ; parmi eux Denys l'Aréopagite, une femme nommée Damaris, et d'autres encore.
  '4':
  - type: note
    content: 'Cf. 20.4. –  persuadés 13.43n  ; 28.24. –  se joignirent à  : litt. devinrent le lot de. –  adorateurs grecs 13.43n  ; cf. 10.2n  ; voir culte. –  nombre de femmes…  : cf. v. 12 ; 13.50 ; Lc 8.1-3 ; 10.38-42.'
  - type: text
    content: Quelques-uns d'entre eux furent persuadés et se joignirent à Paul et à Silas, ainsi qu'une grande multitude d'adorateurs grecs, et nombre de femmes parmi les notables.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'les Juifs  : cf. 13.45 ; 1Th 2.14-16. –  passion jalouse 5.17n. –  mauvais garçons  : autre traduction hommes mauvais . –  parmi la populace  : le terme grec est dérivé de celui qui est traduit par place publique (v. 17 ; 16.19n). Autre traduction, moins probable  : parmi les orateurs publics . –  Jason v. 7,9 ; Rm 16.21. –  en cherchant Paul et Silas  : litt. en les cherchant.'
  - type: text
    content: 'Mais les Juifs, animés d''une passion jalouse, prirent avec eux quelques mauvais garçons parmi la populace ; ils provoquaient des attroupements et de l''agitation dans la ville. Ils assiégèrent la maison de Jason, en cherchant Paul et Silas pour les amener devant le peuple. '
  '6':
  - type: note
    content: 'politarques, c.-à-d. chefs de la ville, titre officiel attesté à Thessalonique. –  qui ont bouleversé…  : cf. 16.20 ; 24.5,12.'
  - type: text
    content: 'Mais ils ne les trouvèrent pas ; alors ils traînèrent Jason et quelques frères devant les politarques en criant : Ces gens qui ont bouleversé toute la terre habitée sont maintenant ici, '
  '7':
  - type: note
    content: 'décrets (16.4n) de César  : cf. 25.8 ; Lc 2.1 ; voir aussi Ep 2.15n. –  un autre roi  : cf. Mt 2.1-3 ; Lc 23.2 ; Jn 19.12.'
  - type: text
    content: 'et Jason les a accueillis ! Ils agissent tous à l''encontre des décrets de César, en disant qu''il y a un autre roi, Jésus ! '
  '8':
  - type: text
    content: 'Ces paroles troublèrent la foule et les politarques, '
  '9':
  - type: text
    content: qui ne relâchèrent Jason et les autres qu'après avoir obtenu d'eux une caution.
  - type: heading
    content: Paul et Silas à Bérée
