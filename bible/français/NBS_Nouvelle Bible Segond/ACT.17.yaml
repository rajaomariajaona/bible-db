      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des femmes grecques… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en grand nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pas peu nombreux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 14.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Beaucoup d'entre eux devinrent croyants, ainsi que des femmes grecques de haut rang et des hommes en grand nombre.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5+,10 ; cf. 14.19.
      marker-yv: yv-n
    - type: text
      text: 'Mais quand les Juifs de Thessalonique surent qu''à Bérée aussi Paul annonçait la parole de Dieu, ils vinrent, là encore, pour soulever et troubler les foules. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Silas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Timothée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.1+.
      marker-yv: yv-n
    - type: text
      text: 'Alors les frères firent aussitôt partir Paul du côté de la mer ; mais Silas et Timothée restèrent là. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 18.1-5 ; 1Th 3.1-6. – Après '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Athènes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le texte occidental ajoute'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il passa la Thessalie, car il était empêché de leur proclamer la parole.
      marker-yv: yv-n
    - type: text
      text: Ceux qui escortaient Paul le conduisirent jusqu'à Athènes. Puis ils s'en retournèrent, avec l'ordre, pour Silas et Timothée, de le rejoindre au plus tôt.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Athènes
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Métropole historique, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Athènes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était toujours le centre intellectuel de la culture grecque ; cf. 1Co 1.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la vue…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' s''exaspérait en lui à la vue…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tandis que Paul les attendait, à Athènes, la vue de cette ville vouée aux idoles l''exaspérait. '
