      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bérée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à l''ouest de Thessalonique ; v. 13 ; 20.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la synagogue des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1s ; 13.5+.
      marker-yv: yv-n
    - type: text
      text: 'Aussitôt les frères firent partir de nuit Paul et Silas pour Bérée. A leur arrivée, ils se rendirent à la synagogue des Juifs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
