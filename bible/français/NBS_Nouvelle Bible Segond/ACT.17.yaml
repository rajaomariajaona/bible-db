      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'interroger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 4.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.8 ; 28.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Ecritures '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2+ ; cf. Jn 5.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si ce qu'on leur disait était exact
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il en était ainsi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 7.1+.'
      marker-yv: yv-n
    - type: text
      text: 'Ceux-ci avaient de meilleurs sentiments que ceux de Thessalonique ; ils accueillirent la Parole avec beaucoup d''ardeur, en examinant chaque jour les Ecritures pour voir si ce qu''on leur disait était exact. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
