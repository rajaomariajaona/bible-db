    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il discutait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adorateurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la synagogue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la place publique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il discutait donc avec les Juifs et les adorateurs dans la synagogue, mais aussi, chaque jour, avec ceux qui se trouvaient sur la place publique. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: épicuriens et stoïciens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce sont les deux principales écoles philosophiques de l''époque. La première, plutôt matérialiste et relativiste, postulait le non-sens de l''existence et encourageait ses adeptes à jouir de la vie avec un certain détachement ; la seconde affirmait en revanche la rationalité de l''univers et préconisait en conséquence la maîtrise de la raison ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: logos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jn 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') sur les passions. Sur le rapport de Paul à la philosophie grecque, cf. 1Co 1.17ss ; 15.12ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette jacasse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le grec emploie un terme de dérision assez courant, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: picoreur de graines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', évoquant l''image d''un oiseau piaillard qui se nourrit de tout ce qu''il trouve. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: divinités
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans le N.T., le mot grec désigne généralement les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: démons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais il n''avait pas de connotation péjorative dans la littérature grecque classique. D''après Xénophon (V'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: -IV
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C.), le reproche d''introduire des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'divinités '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: démons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nouvelles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 19) avait été fait à Socrate. Selon certains, les Athéniens prendraient ici le mot '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: résurrection
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: relèvement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', au féminin en grec ; cf. v. 3,31s ; 2.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) pour le nom propre (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Anastasis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') d''une déesse associée à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jésus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . L'idée de résurrection était en effet étrangère aux Grecs, qui abordaient plutôt le problème de la mort sous l'angle de la survie d'une âme immatérielle. Le texte occidental omet la dernière phrase du v. (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cela, parce qu'il annonçait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Quelques philosophes épicuriens et stoïciens vinrent parler avec lui. Les uns disaient : Que veut dire cette jacasse ? D''autres : Ce doit être un prédicateur de divinités étrangères. Cela, parce qu''il annonçait la bonne nouvelle de Jésus et de la résurrection. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''Aréopage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est le nom d''une colline d''Athènes (colline d''Arès [= Mars]), à l''ouest de l''Acropole, et du conseil qui y siégeait (cf. v. 34 ; 4.8-12 ; 5.27-33 ; 9.15 ; 23.6 ; 24.10-21 ; 26.2-3 ; Lc 21.12). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pourrions-nous savoir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 28.22.'
      marker-yv: yv-n
    - type: text
      text: 'Alors ils le prirent, le menèrent à l''Aréopage et dirent : Pourrions-nous savoir quel est ce nouvel enseignement dont tu parles ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: selon sa coutume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.5+,14 ; Lc 4.16+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbats
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 4.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il discuta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe grec (d''où vient notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dialogue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') peut évoquer un débat ou un simple entretien ; on le retrouve au v. 17 et en 18.4,19 ; 19.8s ; 20.7,9 ; 24.12,25 ; Mc 9.34 ; Jd 9 ; il est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'adresser (un encouragement) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Hé 12.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à partir des Ecritures '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 17.11.'
      marker-yv: yv-n
    - type: text
