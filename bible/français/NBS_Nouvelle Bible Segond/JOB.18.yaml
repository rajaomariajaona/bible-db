      marker: ft
      children:
      - type: text
        text: '14.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Toi qui te déchires dans ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faut-il, à cause de toi, que la terre soit abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le rocher se déplace ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lumière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 18 ; 21.17 ; Jr 25.10 ; Pr 13.9. –  '
    - type: usfm
      marker: fq
