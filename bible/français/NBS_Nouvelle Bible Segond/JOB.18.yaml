    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des méchants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais toute la suite est au singulier. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la flamme qui en jaillit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
