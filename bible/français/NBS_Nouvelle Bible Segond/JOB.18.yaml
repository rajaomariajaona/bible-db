- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il est arraché…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa confiance est arrachée de sa tente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'roi des terreurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 11), figure du '
      - type: usfm
