    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jusqu''à quand retiendrez-vous vos paroles ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', Bildad s''adresse à Job dès le début de sa tirade.'
    marker-yv: yv-n
  - type: text
    text: Quand mettrez-vous un terme à ces propos ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ayez de l'intelligence, ensuite nous parlerons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le verbe hébreu traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne sommes-nous… que des brutes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''apparaît qu''ici et sa signification est incertaine. Il ressemble au verbe habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 17.4,10.
    marker-yv: yv-n
  - type: text
    text: Pourquoi sommes-nous considérés comme des bêtes ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ne sommes-nous à vos yeux que des brutes ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
