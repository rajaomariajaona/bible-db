    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui te déchires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
