    marker-yv: yv-n
  - type: text
    text: Oui, la lumière du méchant s'éteindra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la flamme qui en jaillit cessera de briller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La lumière s'obscurcira sous sa tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa lampe s'éteindra au-dessus de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ps 18.37 ; 27.2 ; 37.31 ; Pr 4.12.
    marker-yv: yv-n
  - type: text
    text: Ses pas pleins de vigueur seront à l'étroit ;
- type: usfm
  marker: q1
  children:
  - type: text
