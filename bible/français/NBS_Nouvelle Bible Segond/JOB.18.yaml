      marker: fr
      children:
      - type: text
        text: '18.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle n'est plus à lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans sa nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'soufre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 19.24+ ; Dt 29.22 ; Es 34.9 ; Ap 9.17s.
    marker-yv: yv-n
  - type: text
    text: 'Tu peux demeurer dans sa tente : elle n''est plus à lui ;'
- type: usfm
  marker: q1
  children:
