    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'assaillir.
    marker-yv: yv-n
  - type: text
    text: Sa vigueur est atteinte par la faim ;
- type: usfm
  marker: q1
