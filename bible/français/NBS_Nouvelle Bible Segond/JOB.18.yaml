document_id: JOB.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention de Bildad : un piège pour le méchant'
  - type: text
    content: 'Bildad le Shouhite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le lien qui l''attend…  : litt. son lien est caché dans la terre . –  sur son sentier  : litt. sur le sentier.'
  - type: text
    content: le lien qui l'attend est caché dans la terre,
  - type: text
    content: la trappe est sur son sentier.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '15.21. –  terreurs v. 14n  ; 27.20 ; 30.15 ; cf. 6.4+. –  elles le talonnent  : litt. elles le dispersent à ses pieds , peut-être au sens de  : elles le pourchassent pas à pas . Certains, pensant qu''il s''agit ici d''un homonyme, ont compris elles le font uriner (de peur) sur ses pieds.'
  - type: text
    content: De toutes parts des terreurs le remplissent d'effroi,
  - type: text
    content: elles le talonnent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'à ses côtés  : autre traduction à l''assaillir.'
  - type: text
    content: Sa vigueur est atteinte par la faim ;
  - type: text
    content: la catastrophe est toute prête à ses côtés.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Toute sa peau / tout son corps  : litt. les parties de sa peau / les parties de lui (c.-à-d. les parties de son corps). –  est dévoré (e) : litt. il ( le premier-né de la mort ) ou elle ( la catastrophe ) dévore . –  la mort  : ce terme désigne parfois un fléau mortel comme la peste (cf. 27.15 ; 28.22 ; Jr 15.2 ; Ap 6.8), de sorte que l''expression le premier-né de la mort pourrait signifier le pire des fléaux.'
  - type: text
    content: Toute sa peau est dévorée,
  - type: text
    content: tout son corps est dévoré par le premier-né de la mort.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Il est arraché…  : on pourrait aussi traduire sa confiance est arrachée de sa tente . –  roi des terreurs (v. 11), figure du séjour des morts (cf. v. 13).'
  - type: text
    content: Il est arraché de sa tente, à laquelle il se fiait ;
  - type: text
    content: il se traîne vers le roi des terreurs.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'elle n''est plus à lui  : litt. sans lui  ; LXX dans sa nuit . –  soufre Gn 19.24+ ; Dt 29.22 ; Es 34.9 ; Ap 9.17s.'
  - type: text
    content: 'Tu peux demeurer dans sa tente : elle n''est plus à lui ;'
  - type: text
    content: on répand du soufre sur son domaine.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dn 4.11,20.
  - type: text
    content: En bas, ses racines se dessèchent ;
  - type: text
    content: en haut, ses rameaux se fanent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Son souvenir / son nom… Es 14.20 ; Ps 9.6 ; 109.13 ; Pr 10.7 ; voir aussi Ex 3.15n. –  au dehors  : litt. sur la (sur)face du dehors , ce qui pourrait signifier il n''a plus part au monde des vivants ou il n''a plus de possession dans la campagne.'
  - type: text
    content: Son souvenir disparaît de la terre,
  - type: text
    content: il n'a plus de nom au dehors.
  '18':
  - type: text
    content: Il est repoussé de la lumière dans les ténèbres,
  - type: text
    content: on le chasse du monde.
  '19':
  - type: text
    content: ' '
  - type: note
    content: progéniture / postérité Gn 21.23 ; Es 14.22n  ; cf. Jr 22.30 ; Ps 37.28.
  - type: text
    content: Il n'a ni progéniture ni postérité dans son peuple,
  - type: text
    content: pas de survivant là où il résidait en immigré.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Quand  : litt. jusqu''à quand  ; certains interprètent en conséquence  : Jusqu''à quand retiendrez-vous vos paroles ? Selon LXX, Bildad s''adresse à Job dès le début de sa tirade.'
  - type: text
    content: Quand mettrez-vous un terme à ces propos ?
  - type: text
    content: Ayez de l'intelligence, ensuite nous parlerons.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Les Occidentaux / les Orientaux  : litt. ceux de derrière / ceux de devant , ce qui pourrait aussi signifier la génération à venir / la génération présente . Selon la façon hébraïque de se situer dans l''espace et le temps, devant peut désigner le lieu (l''est) ou le temps (avant) du soleil levant, tandis que derrière représente symétriquement l''indication spatiale ouest ou l''indication temporelle après . Cf. Gn 2.8n  ; 14.15n.'
  - type: text
    content: Les Occidentaux seront atterrés par sa ruine,
  - type: text
    content: et les Orientaux seront saisis d'effroi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'injuste  : voir justice.'
  - type: text
    content: Telles sont les demeures de l'homme injuste,
  - type: text
    content: telle est la place de celui qui ne connaît pas Dieu !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Le verbe hébreu traduit par ne sommes-nous… que des brutes n'apparaît qu'ici et sa signification est incertaine. Il ressemble au verbe habituellement traduit par être impur  ; cf. 17.4,10.
  - type: text
    content: Pourquoi sommes-nous considérés comme des bêtes ?
  - type: text
    content: Pourquoi ne sommes-nous à vos yeux que des brutes ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'qui te déchires  : cf. 16.9n  ; autre traduction qui déchires ta vie , cf. Gn 1.20n. –  le rocher se déplace 14.18n.'
  - type: text
    content: Toi qui te déchires dans ta colère,
  - type: text
    content: faut-il, à cause de toi, que la terre soit abandonnée,
  - type: text
    content: que le rocher se déplace ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'lumière v. 18 ; 21.17 ; Jr 25.10 ; Pr 13.9. –  du méchant  : litt. des méchants , mais toute la suite est au singulier. –  la flamme qui en jaillit  : litt. la flamme de son feu.'
  - type: text
    content: Oui, la lumière du méchant s'éteindra,
  - type: text
    content: et la flamme qui en jaillit cessera de briller.
  '6':
  - type: text
    content: La lumière s'obscurcira sous sa tente,
  - type: text
    content: et sa lampe s'éteindra au-dessus de lui.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 18.37 ; 27.2 ; 37.31 ; Pr 4.12.
  - type: text
    content: Ses pas pleins de vigueur seront à l'étroit ;
  - type: text
    content: ses propres projets le feront tomber.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '19.6 ; 22.10 ; Ps 35.7s ; 140.6 ; Pr 7.21-23. –  se sont précipités  : autre traduction ont été précipités.'
  - type: text
    content: Car ses pieds se sont précipités dans un filet,
  - type: text
    content: il marche dans les mailles,
  '9':
  - type: text
    content: il est saisi au piège par le talon,
  - type: text
    content: et les lacets se resserrent sur lui ;
