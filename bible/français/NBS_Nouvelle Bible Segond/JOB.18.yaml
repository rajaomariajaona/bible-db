    text: il marche dans les mailles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: il est saisi au piège par le talon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les lacets se resserrent sur lui ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
