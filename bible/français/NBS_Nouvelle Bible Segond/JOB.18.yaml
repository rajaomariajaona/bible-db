    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'elle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
