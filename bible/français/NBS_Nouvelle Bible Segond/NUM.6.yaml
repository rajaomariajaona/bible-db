document_id: NUM.6,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le naziréat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux tourterelles…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. d''autres rites analogues en Lv 12.6 ; 14.22 ; 15.14,29.'
      marker-yv: yv-n
    - type: text
      text: 'Le huitième jour, il apportera deux tourterelles ou deux colombes au prêtre, à l''entrée de la tente de la Rencontre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 14 ; Lv 4.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il consacrera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il faut probablement comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le nazir consacrera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le verbe est apparenté au mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 5,8, et à celui qui est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chose sacrée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 20.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre en offrira une en sacrifice pour le péché, et l''autre en holocauste ; il fera sur lui l''expiation du péché qu''il a commis pour le mort. Il consacrera ainsi sa tête ce jour-là. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mettra… à part '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un an
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: né dans l'année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sacrifice de réparation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de culpabilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne compteront pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tomberont.
      marker-yv: yv-n
    - type: text
      text: 'Il mettra de nouveau à part pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les jours de son naziréat et il apportera un agneau d''un an en sacrifice de réparation ; les jours précédents ne compteront pas, puisque son naziréat a été rendu impur.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 29 ; Lv 8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.29 ; Lv 6.2,7,18 ; 7.1,11,37 ; 12.7 ; 13.59 ; 14.32 ; 15.32 ; Ez 43.12.'
      marker-yv: yv-n
    - type: text
      text: 'Voici la loi concernant le nazir. Le jour où il aura accompli les jours de son naziréat, on l''amènera à l''entrée de la tente de la Rencontre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un agneau… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 1.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une agnelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 4.32 ; 5.6 ; 14.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrifice…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.27-29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un bélier… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 9.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 3.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il offrira son présent au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : un agneau d''un an et sans défaut en holocauste, une agnelle d''un an et sans défaut en sacrifice pour le péché, et un bélier sans défaut en sacrifice de paix ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 29.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s ; Lv 2.4 ; 7.11s.
      marker-yv: yv-n
    - type: text
      text: 'une corbeille de pains sans levain, de gâteaux de fleur de farine pétris à l''huile et de galettes sans levain arrosées d''huile, avec leur offrande végétale et leur libation. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces offrandes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte ; cf. 7.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il offrira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le sujet est-il le '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou le nazir ? Même ambiguïté au v. 17.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre présentera ces offrandes devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il offrira le sacrifice pour le péché et l''holocauste ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'il offrira le bélier en sacrifice de paix pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', en plus de la corbeille de pains sans levain ; le prêtre offrira son offrande végétale et sa libation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ac 18.18 ; 21.23ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa chevelure de nazir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses cheveux de nazir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la tête de son naziréat / les cheveux de la tête de son naziréat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le nazir rasera, à l''entrée de la tente de la Rencontre, sa chevelure de nazir ; il prendra ses cheveux de nazir et les mettra sur le feu qui brûle sous le sacrifice de paix. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 29.22ss ; Lv 8.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cuite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 7.6,31ss ; 1S 2.14s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa chevelure de nazir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son naziréat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre prendra l''épaule du bélier cuite, un gâteau sans levain de la corbeille et une galette sans levain ; il les déposera dans les mains du nazir, après que celui-ci aura rasé sa chevelure de nazir. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'acquitte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens probable, avec une modification de la lecture traditionnelle qui pourrait signifier'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lorsqu''un homme… fait œuvre extraordinaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le verbe hébreu évoque souvent l''étonnement) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en faisant vœu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; avec une autre modification on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lorsqu'un homme… se sépare des autres en faisant vœu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 15.3,8 ; voir aussi 30.3ss ; même forme verbale en Lv 27.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nazir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme apparenté au verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mis à part '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ici et aux v. 5s,12 ; cf. v. 11), on pourrait comprendre aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par lequel il a décidé de s''abstenir pour le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même verbe au v. 3) ; cf. Lv 15.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 33.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 13.4ss,7 ; 16.17 ; Os 9.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Am 2.11s ; Za 7.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Mt 2.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parle aux Israélites ; tu leur diras : Lorsqu''un homme ou une femme s''acquitte d''un vœu de nazir par lequel il s''est mis à part pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les dédiera… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui appartient au prêtre en plus…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.8ss ; Lv 7.28-34 ; 10.14s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pourra boire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'boira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (au cours du rituel) ; cf. v. 3s.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre les dédiera rituellement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : c''est une chose sacrée, qui appartient au prêtre en plus de la poitrine qu''on dédie rituellement et de la cuisse qu''on prélève. Ensuite, le nazir pourra boire du vin.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: outre ce que lui permettront… ses ressources
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il faut sans doute comprendre ici que le nazir était invité à offrir plus que ne l''exigeait la règle s''il le pouvait Lv 5.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 21.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
