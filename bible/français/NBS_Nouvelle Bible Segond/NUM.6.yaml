document_id: NUM.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le naziréat
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'deux tourterelles…  : cf. d''autres rites analogues en Lv 12.6 ; 14.22 ; 15.14,29.'
  - type: text
    content: 'Le huitième jour, il apportera deux tourterelles ou deux colombes au prêtre, à l''entrée de la tente de la Rencontre. '
  '11':
  - type: note
    content: 'sacrifice pour le péché v. 14 ; Lv 4.1+. –  expiation 8.19+. –  le mort 5.2n. –  Il consacrera  : il faut probablement comprendre le nazir consacrera. Le verbe est apparenté au mot traduit par saint aux v. 5,8, et à celui qui est rendu par chose sacrée au v. 20.'
  - type: text
    content: 'Le prêtre en offrira une en sacrifice pour le péché, et l''autre en holocauste ; il fera sur lui l''expiation du péché qu''il a commis pour le mort. Il consacrera ainsi sa tête ce jour-là. '
  '12':
  - type: note
    content: 'mettra… à part v. 2n. –  de nouveau  : sous-entendu dans le texte. –  d''un an  : autre traduction né dans l''année. –  sacrifice de réparation ou de culpabilité 5.7n  ; Lv 5.6n,15+. –  ne compteront pas  : litt. tomberont.'
  - type: text
    content: 'Il mettra de nouveau à part pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les jours de son naziréat et il apportera un agneau d''un an en sacrifice de réparation ; les jours précédents ne compteront pas, puisque son naziréat a été rendu impur.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 29 ; Lv 8. –  Voici la loi…  : cf. 5.29 ; Lv 6.2,7,18 ; 7.1,11,37 ; 12.7 ; 13.59 ; 14.32 ; 15.32 ; Ez 43.12.'
  - type: text
    content: 'Voici la loi concernant le nazir. Le jour où il aura accompli les jours de son naziréat, on l''amènera à l''entrée de la tente de la Rencontre. '
  '14':
  - type: note
    content: 'un agneau… Lv 1.10. –  une agnelle  : cf. Lv 4.32 ; 5.6 ; 14.10. –  sacrifice…  : cf. 15.27-29. –  un bélier… Lv 9.4. –  paix Lv 3.1n.'
  - type: text
    content: 'Il offrira son présent au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : un agneau d''un an et sans défaut en holocauste, une agnelle d''un an et sans défaut en sacrifice pour le péché, et un bélier sans défaut en sacrifice de paix ; '
  '15':
  - type: note
    content: Cf. Ex 29.2ns ; Lv 2.4 ; 7.11s.
  - type: text
    content: 'une corbeille de pains sans levain, de gâteaux de fleur de farine pétris à l''huile et de galettes sans levain arrosées d''huile, avec leur offrande végétale et leur libation. '
  '16':
  - type: note
    content: 'ces offrandes  : sous-entendu dans le texte ; cf. 7.2n  ; Lv 1.2n. –  il offrira  : litt. il fera  ; le sujet est-il le prêtre, ou le nazir ? Même ambiguïté au v. 17.'
  - type: text
    content: 'Le prêtre présentera ces offrandes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il offrira le sacrifice pour le péché et l''holocauste ; '
  '17':
  - type: text
    content: 'il offrira le bélier en sacrifice de paix pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en plus de la corbeille de pains sans levain ; le prêtre offrira son offrande végétale et sa libation. '
  '18':
  - type: note
    content: 'Cf. Ac 18.18 ; 21.23ss. –  sa chevelure de nazir / ses cheveux de nazir  : litt. la tête de son naziréat / les cheveux de la tête de son naziréat  ; cf. v. 9n.'
  - type: text
    content: 'Le nazir rasera, à l''entrée de la tente de la Rencontre, sa chevelure de nazir ; il prendra ses cheveux de nazir et les mettra sur le feu qui brûle sous le sacrifice de paix. '
  '19':
  - type: note
    content: 'Cf. Ex 29.22ss ; Lv 8.27. –  cuite  : cf. Lv 7.6,31ss ; 1S 2.14s. –  sa chevelure de nazir ou son naziréat, cf. v. 7n,9n.'
  - type: text
    content: 'Le prêtre prendra l''épaule du bélier cuite, un gâteau sans levain de la corbeille et une galette sans levain ; il les déposera dans les mains du nazir, après que celui-ci aura rasé sa chevelure de nazir. '
  '2':
  - type: note
    content: 's''acquitte…  : sens probable, avec une modification de la lecture traditionnelle qui pourrait signifier  : lorsqu''un homme… fait œuvre extraordinaire (le verbe hébreu évoque souvent l''étonnement) en faisant vœu…  ; avec une autre modification on pourrait aussi comprendre lorsqu''un homme… se sépare des autres en faisant vœu…  ; cf. 15.3,8 ; voir aussi 30.3ss ; même forme verbale en Lv 27.2. –  nazir  : terme apparenté au verbe traduit par mis à part (ici et aux v. 5s,12 ; cf. v. 11), on pourrait comprendre aussi par lequel il a décidé de s''abstenir pour le Seigneur (même verbe au v. 3) ; cf. Lv 15.31n  ; Dt 33.16n  ; Jg 13.4ss,7 ; 16.17 ; Os 9.10n  ; Am 2.11s ; Za 7.3n  ; voir aussi Mt 2.23n.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Lorsqu''un homme ou une femme s''acquitte d''un vœu de nazir par lequel il s''est mis à part pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '20':
  - type: note
    content: 'les dédiera… 5.25+. –  qui appartient au prêtre en plus…  : cf. 5.8ss ; Lv 7.28-34 ; 10.14s. –  pourra boire  : autre traduction boira (au cours du rituel) ; cf. v. 3s.'
  - type: text
    content: 'Le prêtre les dédiera rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : c''est une chose sacrée, qui appartient au prêtre en plus de la poitrine qu''on dédie rituellement et de la cuisse qu''on prélève. Ensuite, le nazir pourra boire du vin.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'outre ce que lui permettront… ses ressources  : il faut sans doute comprendre ici que le nazir était invité à offrir plus que ne l''exigeait la règle s''il le pouvait Lv 5.11n  ; Ac 21.24n.'
  - type: text
    content: 'Telle est la loi concernant le nazir qui fait un vœu ; tel est le présent qu''il offre au '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour son naziréat, outre ce que lui permettront par ailleurs ses ressources. Il accomplira ce qui est ordonné pour le vœu qu''il a fait, selon la loi concernant son naziréat.'
  - type: heading
    content: La formule de bénédiction
  '22':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '23':
  - type: note
    content: 'Cf. 10.35s ; Lv 9.22 ; Dt 10.8 ; 21.5 ; Ps 118.26 ; 134.3 ; 2Ch 30.27 ; voir aussi 2S 6.18 ; 1R 8.14,56ss ; Siracide 36.16 : « Exauce, Seigneur, la prière de tes serviteurs, selon la bénédiction d''Aaron sur ton peuple. » 45.15 : « C''est Moïse qui lui conféra l''investiture (à Aaron)… pour… exercer le sacerdoce et bénir son peuple par le Nom. » 50.20s : « (Au jour de l''expiation, le grand prêtre) redescendait (du sanctuaire) et élevait les mains sur toute l''assemblée des fils d''Israël, pour donner de ses lèvres la bénédiction du Seigneur et avoir l''honneur de prononcer son nom. Et… tous se prosternaient pour recevoir la bénédiction de la part du Très-Haut. » Règle de la Communauté (Qumrân) 2.1ss : « Et les prêtres béniront tous les hommes du lot de Dieu, ceux qui vont de façon parfaite en toutes Ses voies, et ils diront : “Qu''Il te bénisse en tout bien, et qu''Il te garde de tout mal ! Et qu''Il illumine ton cœur par l''intelligence de vie, et qu''Il te favorise de la Connaissance éternelle ! Et qu''Il lève vers toi Sa face gracieuse pour t''accorder l''éternel bonheur !” »'
  - type: text
    content: 'Dis à Aaron et à ses fils : Vous bénirez ainsi les Israélites ; vous leur direz :'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'te  : le singulier désigne souvent l''ensemble de la communauté (cf. Dt 1.8n). –  garde Ps 121.7s.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te bénisse et te garde !'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 67.2. –  fasse briller sa face  : avec Smr, certains traduisent  : le Seigneur fera briller… , hébraïsme qu''on pourrait traduire par te sourie ou te sourira  ; cf. Ps 31.17+ ; 80.4 ; 119.135 ; voir aussi Ec 8.1. –  t''accorde sa grâce  : Syr te fasse vivre.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse briller sa face sur toi et t''accorde sa grâce !'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'lève sa face vers toi , c.-à-d. te regarde avec bienveillance, t''accueille favorablement  ; cf. Gn 4.7n  ; Ps 4.7. –  te donne la paix  : litt. mette pour toi la paix , c.-à-d. le bonheur ; cf. Ps 122.6 ; 2Th 3.16 ; Siracide 50.23 : « Qu''il nous donne la joie du cœur et fasse de nos jours arriver la paix en Israël pour les jours de l''éternité. »'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lève sa face vers toi et te donne la paix !'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'LXX place ce v. entre les v. 23 et 24. –  ils placeront  : Smr a lu placez (verbe traduit au v. 26 par donner ou établir ) ; cf. Dt 12.5ss ; 28.9s ; Jr 14.9 ; Dn 9.18s ; voir aussi Es 44.5 ; Ez 9.4 ; Ap 3.12 ; 7.3 ; 14.1 ; 22.4. – Voir nom.'
  - type: text
    content: Ainsi ils placeront mon nom sur les Israélites, et je les bénirai.
  '3':
  - type: note
    content: 'il s''abstiendra v. 2n  ; cf. Jg 13.4,14 ; 14.10 ; Am 2.11s ; voir aussi Jr 35.6ss ; Lc 1.15. –  boissons alcoolisées  : cf. 28.7 ; Lv 10.9n  ; Es 5.11 ; 24.9 ; Pr 20.1. –  vinaigre Rt 2.14 ; Mt 27.48/ /.'
  - type: text
    content: 'il s''abstiendra de vin et de boissons alcoolisées ; il ne boira ni vinaigre fait avec du vin, ni vinaigre fait avec une boisson alcoolisée ; il ne boira d''aucune boisson à base de raisins, il ne mangera ni raisins frais ni raisins secs. '
  '4':
  - type: note
    content: 'depuis les pépins…  : traduction incertaine ; les mots hébreux correspondants sont mal connus.'
  - type: text
    content: 'Pendant tous les jours de son naziréat, il ne mangera rien de ce qui provient de la vigne, depuis les pépins jusqu''à la peau du raisin. '
  '5':
  - type: note
    content: 'Cf. Jg 13.5 ; 16.17ss ; 1S 1.11. –  les jours…  : autre traduction les jours pour lesquels il s''est mis à part, v. 2n. –  il sera saint ou sacré, cf. v. 11n. –  il laissera pousser…  : un terme apparenté décrit les cheveux défaits en 5.18 ; voir aussi Dt 32.42 ; Jg 5.2 ; Jr 7.29.'
  - type: text
    content: 'Pendant tous les jours de son vœu de naziréat, le rasoir ne passera pas sur sa tête ; jusqu''à ce que soient accomplis les jours qu''il a mis à part pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il sera saint, il laissera pousser ses cheveux librement. '
  '6':
  - type: note
    content: 'd''un mort  : cf. 5.2ns ; 19.11s ; Lv 21.1ss ; comparer avec Jg 14.6ss,19 ; 15.15s.'
  - type: text
    content: 'Pendant tous les jours qu''il a mis à part pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il ne s''approchera pas d''un mort ; '
  '7':
  - type: note
    content: 'Cf. Lv 21.11. –  impur  : voir pur. –  car il porte…  : litt. car le naziréat (ou la chevelure consacrée, en hébreu nézer) de son Dieu est sur sa tête  ; le même mot désigne le diadème du grand prêtre (Ex 29.6 ; 39.30 ; Lv 8.9 ; cf. 21.12n) ou du roi (voir 2S 1.10n  ; 2R 11.12) ; voir aussi Za 9.16 ; Ps 89.40+.'
  - type: text
    content: 'même pour la mort de son père, de sa mère, de son frère ou de sa sœur, il ne se rendra pas impur, car il porte sur sa tête un signe de mise à part pour son Dieu. '
  '8':
  - type: text
    content: 'Pendant tous les jours de son naziréat, il sera saint pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sa tête de nazir  : litt. la tête de son naziréat (hébreu nézer ), de même au v. 18 ; cf. Gn 49.26n  ; Dt 33.16n. –  il se rasera…  : cf. Lv 14.8. –  le septième jour  : il faut probablement comprendre  : au terme d''une période de purification de sept jours  ; cf. 19.11 ; Lv 5.7 ; 12.6ss ; 14.10.'
  - type: text
    content: 'Si quelqu''un meurt subitement près de lui, rendant ainsi impure sa tête de nazir, il se rasera la tête le jour de sa purification ; il se la rasera le septième jour. '
