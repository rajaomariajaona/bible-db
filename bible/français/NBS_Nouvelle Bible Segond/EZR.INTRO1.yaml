document_id: EZR.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La chute de Jérusalem (587/6 av. J.-C.) a été une catastrophe nationale ; cependant l''identité israélite demeure et va même se renforcer. En 538, l''empereur perse Cyrus, nouveau maître du monde, autorise la reconstruction du temple. '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jérusalem
    - type: text
      text: ', restée présente au cœur des croyants, mobilise à nouveau les énergies.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les livres d''Esdras et de Néhémie ne formaient à l''origine qu''un seul livre. Ils ne nous offrent pas une histoire officielle de cette époque nouvelle (il n''y a plus de roi en Israël, donc plus d''historiographie royale) mais réunissent les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: mémoires
    - type: text
      text: ' de deux figures marquantes des réformes politiques, sociales et religieuses de l''ère nouvelle. Ces fragments de style autobiographique sont précédés par le récit du retour à Jérusalem et de la reconstruction du temple sous la direction de Josué et de Zorobabel, à la fin du VI'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle (Esd 1–6, à l''exception de la section 4.6'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: -23 qui concerne des événements du V
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle). L''ouvrage recouvre donc deux périodes séparées par un intervalle d''au moins soixante ans.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La première période, inaugurée par l''édit autorisant la reconstruction du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: temple
    - type: text
      text: ', s''achève sous le règne de Darius I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ', en 515 (Esd 6.15). Des manœuvres d''intimidation et des intrigues auprès de l''administration perse, de la part des habitants de Samarie et d''autres voisins, avaient abouti à l''interruption du chantier (Esd 4.1-5). Mais, sous la direction du grand prêtre Josué et du gouverneur Zorobabel, aiguillonnés par la prédication des prophètes Aggée et Zacharie (Esd 5.1), les travaux reprennent et le projet est finalement mené à bien.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La seconde période, couverte par le reste du livre (Esd 7 – Né 13), correspond à une nouvelle étape de la restauration : '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: réforme religieuse
    - type: text
      text: ' et reconstruction de l'''
    - type: usfm
      marker: bd
      children:
      - type: text
        text: enceinte fortifiée
    - type: text
      text: . Sous ces deux aspects, cette nouvelle étape correspond au souci et au projet de deux hommes, venus tout exprès à Jérusalem et investis de pouvoirs spéciaux par l'empereur perse. L'un, Esdras le scribe, arrivait de Babylone, lieu de forte concentration des exilés de Juda ; l'autre, Néhémie, un homme de cour, venait de la capitale, Suse. L'un venait pour organiser la justice à Jérusalem (Esd 7.25), l'autre pour relever les murailles de la ville (Né 2.7s).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ces deux initiatives semblent d''abord totalement '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: indépendantes
    - type: text
      text: ' l''une de l''autre. Néhémie qui, selon la lecture traditionnelle du texte, serait arrivé à Jérusalem quatorze ans après Esdras (comparer Esd 7.7 et Né 1.1), rend compte de son activité de bâtisseur (Né 1–7) sans jamais évoquer le nom d''Esdras. Le récit réunit pour la première fois les deux personnages à l''occasion de la lecture solennelle de la loi* (Né 8.9). On les retrouve encore pour la cérémonie d''inauguration de l''enceinte de Jérusalem : Esdras est placé à la tête du premier chœur dans le cortège (Né 12.36), tandis que Néhémie suit le second (Né 12.38). La '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: concordance
    - type: text
      text: ' des deux aspects de l''œuvre de restauration est ainsi habilement figurée dans la seconde partie des mémoires de Néhémie.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: plan
    - type: text
      text: ' d''ensemble apparaît clairement. La restauration comporte trois grands projets plus ou moins soutenus par le pouvoir impérial perse :'
  - type: usfm
    marker: im
    children:
    - type: text
      text: –reconstruction du temple décrétée par Cyrus (Esd 1–6) ;
  - type: usfm
    marker: im
    children:
    - type: text
      text: –réforme religieuse mise en œuvre par Esdras avec l'appui d'Artaxerxès (Esd 7–10) ;
  - type: usfm
    marker: im
    children:
    - type: text
      text: –reconstruction des murailles entreprise par Néhémie avec l'accord d'Artaxerxès (à partir de Né 1).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La clôture de chacun des deux chantiers de reconstruction est marquée par une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: cérémonie
    - type: text
      text: ' (Esd 6.15-18 ; Né 12.27-43). La réforme religieuse, en revanche, n''est jamais vraiment achevée. Les engagements successifs pris par le peuple sous l''impulsion d''Esdras (Esd 10) et de Néhémie (Né 10) en témoignent. La fin du livre le confirme : au lieu de conclure ses mémoires par la belle cérémonie d''inauguration du mur d''enceinte (Né 12), Néhémie évoque encore les désordres qu''il a dû réprimer lors d''un second mandat à Jérusalem (Né 13). On voit ainsi dans quelle direction la tâche est à poursuivre.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette présentation des faits soulève cependant des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: questions
    - type: text
      text: ' auxquelles il n''est pas toujours possible de donner une réponse certaine :'
  - type: usfm
    marker: im
    children:
    - type: text
      text: –pourquoi Néhémie ne parle-t-il pas d'Esdras avant le chapitre 8 ?
  - type: usfm
    marker: im
    children:
    - type: text
      text: –pourquoi Esdras aurait-il attendu la venue de Néhémie et la fin des travaux du mur d'enceinte pour faire une lecture publique de la loi (Né 8–10) ?
  - type: usfm
    marker: im
    children:
    - type: text
      text: –pourquoi la question des mariages mixtes, qui semblait avoir été réglée par Esdras (Esd 10), doit-elle être reprise plus tard (Né 10 ; 13.23-29) ?
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'De telles questions ont conduit plusieurs auteurs à proposer des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: reconstitutions
    - type: text
      text: ' différentes de la chronologie traditionnelle. On a supposé par exemple que la mission de Néhémie avait précédé celle d''Esdras, qui aurait eu lieu non pas sous Artaxerxès I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' (465-424), mais sous Artaxerxès II (404-358) ou Artaxerxès III (358-338) ; ou bien que la lecture de la loi (Né 8–10) devrait être insérée après le chapitre 8 d''Esdras. Mais ces reconstructions aussi restent conjecturales.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La présence dans le corps du livre de deux sections importantes en '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: araméen
    - type: text
      text: ' (Esd 4.8–6.18 et 7.12-26) est peut-être due à la reproduction de documents rédigés par l''administration perse (4.8-22 ; 6.3-12 ; 7.12-26). Dans la première section, l''emploi de l''araméen ne se limite cependant pas aux citations de documents, mais s''étend au récit. La Bible elle-même porte ainsi la marque de l''influence croissante de cette langue internationale dans la communauté juive (cf. Dn 2.4–7.18).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: '*'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: '* *'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: judaïsme pharisien
    - type: text
      text: ' de la fin du I'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: er
    - type: text
      text: ' siècle apr. J.-C., auquel se heurteront si fortement les évangiles, s''est réclamé tout particulièrement de la réforme d''Esdras et de Néhémie, en privilégiant le zèle pour la loi, le souci de la pureté rituelle et un certain exclusivisme peut-être plus religieux que national : celui-ci est particulièrement sensible dans la condamnation des mariages « mixtes », qui sont souvent des unions entre « bons » et « mauvais » Israélites, c''est-à-dire, en général, entre les descendants des exilés et les « gens du pays » qui n''ont jamais connu l''exil (Esd 9–10 ; Né 8 ; 10 ; 13). Le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Talmud*
    - type: text
      text: ' fait d''Esdras le président de la Grande Synagogue, considérée comme l''assemblée constituante du judaïsme. Après l''autre catastrophe qui détruira le second temple (en 70 apr. J.-C.), les rescapés invoqueront l''autorité de cette tradition pour organiser la survie de la communauté juive autour de la Torah.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Toutefois, par certains traits, l''ouvrage d''Esdras et Néhémie annonce aussi le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Nouveau Testament
    - type: text
      text: . La situation nouvelle d'Israël, communauté réunie autour du temple et de la loi par l'engagement de ses membres, prépare le concept d'Eglise* autant que celui de synagogue. Le ton personnel des mémoires, inconnu jusqu'alors dans la littérature biblique, crée cette sorte d'intimité entre auteur et lecteur que nous goûtons si fort dans les épîtres de Paul. La confession des péchés, qu'exigera Jean le Baptiseur, tient déjà une grande place dans les émouvantes prières d'Esdras (Esd 9.6-15) et de l'assemblée conduite par les lévites (Né 9.5-37). Mais aussi, à l'instar de l'épître de Jacques, l'histoire d'Esdras et de Néhémie nous rappelle que toute réforme religieuse, individuelle ou collective, comporte une dimension éthique qui n'épargne pas le domaine économique et social — fait que le zèle religieux oublie trop souvent (cf. Né 5).
