    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : à la frontière de l''Egypte (Ex 14.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 29.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), à l''est de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tahpanhès '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Jr 43.7) et au nord-est de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Noph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Memphis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 46.14). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Patros
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la Haute-Egypte, tout au sud du pays ; cf. Gn 10.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 11.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 29.14'
      - type: usfm
        marker: ord
