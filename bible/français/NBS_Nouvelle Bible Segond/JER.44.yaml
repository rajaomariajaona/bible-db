document_id: JER.44,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les Judéens réfugiés en Egypte
  - type: text
    content: ' '
  - type: note
    content: 'Parole 1.2n  ; 35.1. –  Migdol  : à la frontière de l''Egypte (Ex 14.2n  ; Ez 29.10n), à l''est de Tahpanhès (Jr 43.7) et au nord-est de Noph ou Memphis (2.16n  ; 46.14). –  Patros  : la Haute-Egypte, tout au sud du pays ; cf. Gn 10.14n  ; Es 11.11n  ; Ez 29.14n.'
  - type: text
    content: 'Parole qui parvint à Jérémie sur tous les Judéens habitant en Egypte, à Migdol, à Tahpanhès, à Noph, et au pays de Patros :'
  '10':
  - type: note
    content: 'contrits  : litt. écrasés (cf. Ps 51.19). – Voir crainte. – Voir loi.'
  - type: text
    content: 'Jusqu''à ce jour ils n''ont pas été contrits, ils n''ont pas eu de crainte, ils n''ont pas suivi la loi et les prescriptions que j''ai mises devant vous et devant vos pères. '
  '11':
  - type: note
    content: 'Je me décide…  : litt. je tourne ma face contre vous pour le malheur 21.10+ ; cf. v. 12,27 ; 42.15nss.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je me décide à vous faire du mal et à retrancher tout Juda. '
  '12':
  - type: note
    content: 'V. 8+ ; 42.18+. –  d''atterrement  : le même mot hébreu a été traduit par lieu dévasté au v. 22. –  malédiction  : voir bénédiction.'
  - type: text
    content: 'Je prendrai le reste de Juda, ceux qui ont décidé de se rendre en Egypte pour y séjourner en immigrés ; ils seront tous exterminés en Egypte ; ils tomberont par l''épée, par la famine ; ils seront exterminés depuis le plus petit jusqu''au plus grand ; ils mourront par l''épée et par la famine, et ils deviendront une formule d''adjuration, un sujet d''atterrement, de malédiction et d''outrage. '
  '13':
  - type: note
    content: Je ferai rendre des comptes à… 6.15n. –  épée / famine / peste 14.12+ ; 27.13.
  - type: text
    content: 'Je ferai rendre des comptes à ceux qui habitent en Egypte comme j''ai fait rendre des comptes à Jérusalem, par l''épée, par la famine et par la peste. '
  '14':
  - type: note
    content: 'ni rescapé ni survivant 42.17+ ; cf. v. 27. –  avec le désir…  : litt. pour revenir au pays de Juda où ils portent leur être (ou leur désir) pour revenir y habiter  ; cf. 22.27n. –  quelques rescapés v. 28.'
  - type: text
    content: Il n'y aura ni rescapé ni survivant du reste de Juda qui est venu séjourner en immigré en Egypte avec le désir de revenir habiter le pays de Juda ; car ils n'y reviendront pas, si ce n'est quelques rescapés.
  - type: heading
    content: Les sacrifices offerts à la reine du ciel
  '15':
  - type: text
    content: ' '
  - type: note
    content: offraient de l'encens v. 3+. –  en Egypte, à Patros ou, d'après Syr, en Egypte et à Patros.
  - type: text
    content: 'Tous les hommes qui savaient que leurs femmes offraient de l''encens à d''autres dieux, toutes les femmes qui se tenaient là en une grande assemblée, et tout le peuple qui habitait en Egypte, à Patros, répondirent ainsi à Jérémie : '
  '16':
  - type: note
    content: V. 23+ ; 6.17.
  - type: text
    content: 'Nous ne voulons pas écouter la parole que tu nous as dite au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'tout ce que nous avons dit  : litt. selon toute parole qui est sortie de notre bouche  ; cf. v. 22s ; 2.31 ; 5.23 ; Ps 50.17. –  reine du ciel 7.18n. –  nous ne connaissions pas  : litt. nous ne voyions pas  ; cf. Os 2.7.'
  - type: text
    content: 'Nous voulons faire tout ce que nous avons dit : offrir de l''encens à la reine du ciel et répandre des libations pour elle, comme nous l''avons fait, nous et nos pères, nos rois et nos princes, dans les villes de Juda et dans les rues de Jérusalem. Alors nous avions du pain à satiété, nous étions heureux et nous ne connaissions pas le malheur. '
  '18':
  - type: note
    content: 'Cf. 1 Maccabées 1.11 : « Faisons alliance avec les nations qui nous entourent car, depuis que nous nous sommes séparés d''elles, bien des maux nous ont atteints. »'
  - type: text
    content: 'Mais depuis que nous avons cessé d''offrir de l''encens à la reine du ciel et de répandre des libations pour elle, nous avons manqué de tout et nous avons été exterminés par l''épée et par la famine… '
  '19':
  - type: note
    content: 'D''ailleurs  : certains mss de LXX ajoutent Et les femmes dirent : lorsque…  ; cf. v. 25. –  à son image  : traduction incertaine d''un mot hébreu qui rappelle l''un des qualificatifs donnés aux idoles  ; les gâteaux (7.18n) étaient peut-être moulés à l''image de la déesse ; on pourrait aussi comprendre pour lui rendre un culte  ; l''expression est omise par LXX et Syr.'
  - type: text
    content: D'ailleurs, lorsque nous offrons de l'encens à la reine du ciel et que nous répandons des libations pour elle, est-ce sans l'accord de nos maris que nous faisons des gâteaux à son image, et que nous répandons des libations pour elle ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: ruines v. 6+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Vous avez vu tout le malheur que j''ai fait venir sur Jérusalem et sur toutes les villes de Juda : elles ne sont plus en ce jour que ruines, et il n''y a plus d''habitants, '
  '20':
  - type: text
    content: 'Jérémie dit alors à tout le peuple, aux hommes, aux femmes, à tout le peuple qui lui avait donné cette réponse : '
  '21':
  - type: note
    content: 'V. 3+ ; cf. 11.13. –  L''encens que vous avez offert  : litt. la fumée que vous avez fait fumer. –  venu au cœur  : cf. 3.16n.'
  - type: text
    content: 'L''encens que vous avez offert dans les villes de Juda et dans les rues de Jérusalem, vous et vos pères, vos rois, vos princes et le peuple du pays, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne s''en est-il pas souvenu, cela ne lui est-il pas venu au cœur ? '
  '22':
  - type: note
    content: 'pas pu le supporter  : cf. 15.6. –  agissements mauvais 4.4n. –  ruines… v. 6+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas pu le supporter davantage, à cause de vos agissements mauvais, à cause des abominations que vous avez commises ; et votre pays est devenu un champ de ruines, un lieu dévasté, un sujet de malédiction, sans habitants – voilà pourquoi il en est ainsi en ce jour. '
  '23':
  - type: note
    content: 'V. 3+. –  pas écouté… 3.25+ ; 7.26+. –  préceptes  : litt. témoignages, comme en Ex 16.34+.'
  - type: text
    content: 'C''est parce que vous avez offert de l''encens, parce que vous avez péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', que vous n''avez pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et que vous n''avez pas suivi sa loi, ses prescriptions et ses préceptes, c''est pour cela que ce malheur vous est arrivé – voilà pourquoi il en est ainsi en ce jour.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: V. 26.
  - type: text
    content: 'Jérémie dit encore à tout le peuple et à toutes les femmes : Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous tous, de Juda, qui êtes en Egypte ! '
  '25':
  - type: note
    content: 'Vous et vos femmes  : LXX vous, les femmes  ; cf. v. 17 ; le verbe qui suit dans le texte hébreu (vous avez dit…) suppose un sujet féminin. –  vous acquitter de vos vœux ou répandre vos libations, selon quelques mss ; cf. Am 4.4s.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Vous et vos femmes, vous avez accompli de vos mains ce que vous avez dit de votre bouche, à savoir : « Nous voulons nous acquitter des vœux que nous avons faits, offrir de l''encens à la reine du ciel et répandre des libations pour elle ! » Vous allez donc réaliser vos vœux, vous allez vous acquitter de vos vœux. '
  '26':
  - type: note
    content: Je le jure… 22.5+. – Voir nom. –  Par la vie du Seigneur 4.2n  ; cf. 12.16n.
  - type: text
    content: 'A cause de cela, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous tous, de Juda, qui habitez en Egypte ! Je le jure par mon grand nom, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), mon nom ne sera plus invoqué par la bouche d''aucun des hommes de Juda ; dans toute l''Egypte aucun ne dira : « Par la vie du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) ! » '
  '27':
  - type: note
    content: Je veillerai 1.11n-12+ ; 31.28. –  supprimés… v. 12 ; 42.16.
  - type: text
    content: Je veillerai sur eux, non pas pour leur bonheur, mais pour leur malheur. Tous les hommes de Juda qui sont en Egypte seront supprimés par l'épée et par la famine, jusqu'à leur extermination.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Cf. 51.50 ; Es 11.11 ; 27.13 ; Ez 6.8. –  Un petit nombre d'hommes Gn 34.30n.
  - type: text
    content: 'Un petit nombre d''hommes, ceux qui auront échappé à l''épée, reviendront d''Egypte au pays de Juda. Mais tout le reste de Juda, tous ceux qui sont venus en Egypte pour y séjourner en immigrés, sauront quelle parole se réalise, la mienne ou la leur. '
  '29':
  - type: note
    content: le signe est énoncé au v. 30 ; cf. Ex 3.12 ; 1S 2.34 ; 2R 19.29 ; Es 38.7.
  - type: text
    content: 'Et voici pour vous le signe – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – que je vous ferai rendre des comptes en ce lieu, afin que vous sachiez que mes paroles se réaliseront vraiment sur vous pour votre malheur : '
  '3':
  - type: note
    content: 'ils m''ont contrarié 7.18n. –  offrir de l''encens v. 8,15,21,23 ; 1.16+. –  qu''ils ne connaissaient pas…  : LXX a simplement que vous ne connaissiez pas 7.9+.'
  - type: text
    content: 'à cause du mal qu''ils ont fait, parce qu''ils m''ont contrarié en allant offrir de l''encens et servir d''autres dieux qu''ils ne connaissaient pas, ni eux, ni vous, ni vos pères. '
  '30':
  - type: note
    content: Hophra (le pharaon de 37.5-11) fut détrôné par Amasis en 570 ou 569 av. J.-C., soit environ deux ans avant la campagne de Nabuchodonosor contre l'Egypte, cf. 43.8-13 ; 46.25s. Il mourut quelque temps plus tard au cours d'une tentative pour reprendre le pouvoir. –  qui en veulent / voulait à sa vie 11.21n  ; cf. 39.5.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je livrerai le pharaon Hophra, roi d''Egypte, à ses ennemis, à ceux qui en veulent à sa vie, comme j''ai livré Sédécias, roi de Juda, à Nabuchodonosor, roi de Babylone, son ennemi, qui en voulait à sa vie.'
  '4':
  - type: note
    content: 'Je vous ai envoyé… 7.25+. –  mes serviteurs, les prophètes  : 7.25+. –  cette abomination, cette chose… ou cette chose abominable  ; cf. v. 22 ; 6.15 ; 7.10 ; 16.18 ; Ez 8.6.'
  - type: text
    content: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés, inlassablement, vous dire : « Je vous en prie, ne commettez pas cette abomination, cette chose que je déteste ! » '
  '5':
  - type: note
    content: pas écouté v. 23 ; 7.26n.
  - type: text
    content: 'Mais ils n''ont pas écouté, ils n''ont pas tendu l''oreille ; ils ne sont pas revenus du mal qu''ils faisaient et ils n''ont pas cessé d''offrir de l''encens à d''autres dieux. '
  '6':
  - type: note
    content: fureur / colère 7.20+. –  ruines et lieux dévastés 9.9-10+ ; 25.9n,11+. –  voilà pourquoi… v. 22s ; 25.18+ ; Dt 2.30n.
  - type: text
    content: 'Ma fureur et ma colère se sont répandues et ont embrasé les villes de Juda et les rues de Jérusalem qui ne sont plus que ruines et lieux dévastés – voilà pourquoi il en est ainsi en ce jour. '
  '7':
  - type: note
    content: 'vous faites-vous à vous-mêmes…  : cf. 26.19 ; Ha 2.10n. –  de Juda  : litt. du milieu de Juda. –  enfants et nourrissons Lm 2.11 ; 4.4.'
  - type: text
    content: 'Maintenant, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées, le Dieu d''Israël : Pourquoi vous faites-vous à vous-mêmes un si grand mal, en faisant retrancher de Juda hommes, femmes, enfants et nourrissons, de telle sorte que plus rien ne reste de vous ? '
  '8':
  - type: note
    content: 'les œuvres…  : certains mss lisent le singulier l''ouvrage de leurs mains 25.6+. –  séjourner en immigrés 42.15+. –  un sujet de malédiction… v. 12,22 ; 24.9+ ; voir bénédiction.'
  - type: text
    content: 'Vous me contrariez par les œuvres de vos mains en offrant de l''encens à d''autres dieux en Egypte, où vous êtes venus séjourner en immigrés, vous exposant à être retranchés, à être un sujet de malédiction et d''outrage parmi toutes les nations de la terre. '
  '9':
  - type: text
    content: 'Avez-vous oublié les méfaits de vos pères, les méfaits des rois de Juda, les méfaits de leurs femmes, vos propres méfaits et les méfaits de vos femmes, tout ce qui s''est fait au pays de Juda et dans les rues de Jérusalem ? '
