        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Parole qui parvint à Jérémie sur tous les Judéens habitant en Egypte, à Migdol, à Tahpanhès, à Noph, et au pays de Patros :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ruines '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 6+.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Vous avez vu tout le malheur que j''ai fait venir sur Jérusalem et sur toutes les villes de Juda : elles ne sont plus en ce jour que ruines, et il n''y a plus d''habitants, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils m''ont contrarié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'offrir de l''encens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 8,15,21,23 ; 1.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils ne connaissaient pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a simplement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que vous ne connaissiez pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.9+.
    marker-yv: yv-n
  - type: text
    text: 'à cause du mal qu''ils ont fait, parce qu''ils m''ont contrarié en allant offrir de l''encens et servir d''autres dieux qu''ils ne connaissaient pas, ni eux, ni vous, ni vos pères. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je vous ai envoyé… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.25+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mes serviteurs, les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 7.25+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cette abomination, cette chose… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cette chose abominable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 22 ; 6.15 ; 7.10 ; 16.18 ; Ez 8.6.'
    marker-yv: yv-n
  - type: text
    text: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés, inlassablement, vous dire : « Je vous en prie, ne commettez pas cette abomination, cette chose que je déteste ! » '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas écouté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 23 ; 7.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais ils n''ont pas écouté, ils n''ont pas tendu l''oreille ; ils ne sont pas revenus du mal qu''ils faisaient et ils n''ont pas cessé d''offrir de l''encens à d''autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fureur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'colère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ruines et lieux dévastés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.9-10+ ; 25.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'voilà pourquoi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 22s ; 25.18+ ; Dt 2.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ma fureur et ma colère se sont répandues et ont embrasé les villes de Juda et les rues de Jérusalem qui ne sont plus que ruines et lieux dévastés – voilà pourquoi il en est ainsi en ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous faites-vous à vous-mêmes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 26.19 ; Ha 2.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du milieu de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enfants et nourrissons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lm 2.11 ; 4.4.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu des Armées, le Dieu d''Israël : Pourquoi vous faites-vous à vous-mêmes un si grand mal, en faisant retrancher de Juda hommes, femmes, enfants et nourrissons, de telle sorte que plus rien ne reste de vous ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les œuvres…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss lisent le singulier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''ouvrage de leurs mains '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'séjourner en immigrés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '42.15+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un sujet de malédiction… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 12,22 ; 24.9+ ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous me contrariez par les œuvres de vos mains en offrant de l''encens à d''autres dieux en Egypte, où vous êtes venus séjourner en immigrés, vous exposant à être retranchés, à être un sujet de malédiction et d''outrage parmi toutes les nations de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avez-vous oublié les méfaits de vos pères, les méfaits des rois de Juda, les méfaits de leurs femmes, vos propres méfaits et les méfaits de vos femmes, tout ce qui s''est fait au pays de Juda et dans les rues de Jérusalem ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: contrits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'écrasés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Ps 51.19). – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '– Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jusqu''à ce jour ils n''ont pas été contrits, ils n''ont pas eu de crainte, ils n''ont pas suivi la loi et les prescriptions que j''ai mises devant vous et devant vos pères. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je me décide…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je tourne ma face contre vous pour le malheur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.10+ ; cf. v. 12,27 ; 42.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss.
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Je me décide à vous faire du mal et à retrancher tout Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 8+ ; 42.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'atterrement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot hébreu a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lieu dévasté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: malédiction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je prendrai le reste de Juda, ceux qui ont décidé de se rendre en Egypte pour y séjourner en immigrés ; ils seront tous exterminés en Egypte ; ils tomberont par l''épée, par la famine ; ils seront exterminés depuis le plus petit jusqu''au plus grand ; ils mourront par l''épée et par la famine, et ils deviendront une formule d''adjuration, un sujet d''atterrement, de malédiction et d''outrage. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je ferai rendre des comptes à… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'famine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.12+ ; 27.13.
    marker-yv: yv-n
  - type: text
    text: 'Je ferai rendre des comptes à ceux qui habitent en Egypte comme j''ai fait rendre des comptes à Jérusalem, par l''épée, par la famine et par la peste. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ni rescapé ni survivant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '42.17+ ; cf. v. 27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec le désir…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour revenir au pays de Juda où ils portent leur être '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur désir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour revenir y habiter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 22.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quelques rescapés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 28.
    marker-yv: yv-n
  - type: text
    text: Il n'y aura ni rescapé ni survivant du reste de Juda qui est venu séjourner en immigré en Egypte avec le désir de revenir habiter le pays de Juda ; car ils n'y reviendront pas, si ce n'est quelques rescapés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les sacrifices offerts à la reine du ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'offraient de l''encens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en Egypte, à Patros '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Egypte et à Patros.
    marker-yv: yv-n
  - type: text
    text: 'Tous les hommes qui savaient que leurs femmes offraient de l''encens à d''autres dieux, toutes les femmes qui se tenaient là en une grande assemblée, et tout le peuple qui habitait en Egypte, à Patros, répondirent ainsi à Jérémie : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 23+ ; 6.17.
    marker-yv: yv-n
  - type: text
    text: 'Nous ne voulons pas écouter la parole que tu nous as dite au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout ce que nous avons dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon toute parole qui est sortie de notre bouche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 22s ; 2.31 ; 5.23 ; Ps 50.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'reine du ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous ne connaissions pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous ne voyions pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Os 2.7.'
    marker-yv: yv-n
  - type: text
    text: 'Nous voulons faire tout ce que nous avons dit : offrir de l''encens à la reine du ciel et répandre des libations pour elle, comme nous l''avons fait, nous et nos pères, nos rois et nos princes, dans les villes de Juda et dans les rues de Jérusalem. Alors nous avions du pain à satiété, nous étions heureux et nous ne connaissions pas le malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.11 : « Faisons alliance avec les nations qui nous entourent car, depuis que nous nous sommes séparés d''elles, bien des maux nous ont atteints. »'
    marker-yv: yv-n
  - type: text
    text: 'Mais depuis que nous avons cessé d''offrir de l''encens à la reine du ciel et de répandre des libations pour elle, nous avons manqué de tout et nous avons été exterminés par l''épée et par la famine… '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: D'ailleurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Et les femmes dirent : lorsque…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à son image
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine d''un mot hébreu qui rappelle l''un des qualificatifs donnés aux '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: idoles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gâteaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (7.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') étaient peut-être moulés à l''image de la déesse ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour lui rendre un culte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''expression est omise par LXX et Syr.'
    marker-yv: yv-n
  - type: text
    text: D'ailleurs, lorsque nous offrons de l'encens à la reine du ciel et que nous répandons des libations pour elle, est-ce sans l'accord de nos maris que nous faisons des gâteaux à son image, et que nous répandons des libations pour elle ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jérémie dit alors à tout le peuple, aux hommes, aux femmes, à tout le peuple qui lui avait donné cette réponse : '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 3+ ; cf. 11.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'encens que vous avez offert
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la fumée que vous avez fait fumer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'venu au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'L''encens que vous avez offert dans les villes de Juda et dans les rues de Jérusalem, vous et vos pères, vos rois, vos princes et le peuple du pays, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne s''en est-il pas souvenu, cela ne lui est-il pas venu au cœur ? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas pu le supporter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'agissements mauvais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ruines… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 6+.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n''a pas pu le supporter davantage, à cause de vos agissements mauvais, à cause des abominations que vous avez commises ; et votre pays est devenu un champ de ruines, un lieu dévasté, un sujet de malédiction, sans habitants – voilà pourquoi il en est ainsi en ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas écouté… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.25+ ; 7.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: préceptes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: témoignages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Ex 16.34+.'
    marker-yv: yv-n
  - type: text
    text: 'C''est parce que vous avez offert de l''encens, parce que vous avez péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', que vous n''avez pas écouté le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et que vous n''avez pas suivi sa loi, ses prescriptions et ses préceptes, c''est pour cela que ce malheur vous est arrivé – voilà pourquoi il en est ainsi en ce jour.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 26.
    marker-yv: yv-n
  - type: text
    text: 'Jérémie dit encore à tout le peuple et à toutes les femmes : Ecoutez la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', vous tous, de Juda, qui êtes en Egypte ! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous et vos femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous, les femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 17 ; le verbe qui suit dans le texte hébreu ('
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous avez dit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') suppose un sujet féminin. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous acquitter de vos vœux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: répandre vos libations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon quelques mss ; cf. Am 4.4s.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Vous et vos femmes, vous avez accompli de vos mains ce que vous avez dit de votre bouche, à savoir : « Nous voulons nous acquitter des vœux que nous avons faits, offrir de l''encens à la reine du ciel et répandre des libations pour elle ! » Vous allez donc réaliser vos vœux, vous allez vous acquitter de vos vœux. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je le jure… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.5+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par la vie du Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 12.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, écoutez la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', vous tous, de Juda, qui habitez en Egypte ! Je le jure par mon grand nom, dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), mon nom ne sera plus invoqué par la bouche d''aucun des hommes de Juda ; dans toute l''Egypte aucun ne dira : « Par la vie du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ' (YHWH) ! » '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je veillerai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '-12+ ; 31.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'supprimés… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 12 ; 42.16.
    marker-yv: yv-n
  - type: text
    text: Je veillerai sur eux, non pas pour leur bonheur, mais pour leur malheur. Tous les hommes de Juda qui sont en Egypte seront supprimés par l'épée et par la famine, jusqu'à leur extermination.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 51.50 ; Es 11.11 ; 27.13 ; Ez 6.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un petit nombre d''hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 34.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Un petit nombre d''hommes, ceux qui auront échappé à l''épée, reviendront d''Egypte au pays de Juda. Mais tout le reste de Juda, tous ceux qui sont venus en Egypte pour y séjourner en immigrés, sauront quelle parole se réalise, la mienne ou la leur. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le signe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est énoncé au v. 30 ; cf. Ex 3.12 ; 1S 2.34 ; 2R 19.29 ; Es 38.7.
    marker-yv: yv-n
  - type: text
    text: 'Et voici pour vous le signe – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – que je vous ferai rendre des comptes en ce lieu, afin que vous sachiez que mes paroles se réaliseront vraiment sur vous pour votre malheur : '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hophra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pharaon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de 37.5-11) fut détrôné par Amasis en 570 ou 569 av. J.-C., soit environ deux ans avant la campagne de Nabuchodonosor contre l''Egypte, cf. 43.8-13 ; 46.25s. Il mourut quelque temps plus tard au cours d''une tentative pour reprendre le pouvoir. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui en veulent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'voulait à sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 39.5.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je livrerai le pharaon Hophra, roi d''Egypte, à ses ennemis, à ceux qui en veulent à sa vie, comme j''ai livré Sédécias, roi de Juda, à Nabuchodonosor, roi de Babylone, son ennemi, qui en voulait à sa vie.'
