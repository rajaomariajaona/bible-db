  - type: text
    content: 'et bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: bénisse de Sion 20.3 ; 118.26 ; 128.5 ; cf. Nb 6.22ss ; Dt 21.5 ; 1S 2.20. –  lui qui fait… 115.15+.
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te bénisse de Sion,'
  - type: text
    content: lui qui fait le ciel et la terre !
