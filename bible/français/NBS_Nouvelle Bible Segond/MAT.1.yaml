        text: '11.2ss : « Je vis une femme, de la famille du prophète David, du nom de Marie ; elle était vierge et était fiancée à un homme du nom de Joseph – un artisan, lui aussi de la descendance et de la famille de David le juste –, qui était de Bethléem de Juda, et qui entra en possession de son lot. Et, lorsqu''elle fut fiancée, elle fut trouvée enceinte, et Joseph, l''artisan, voulut la renvoyer. Mais l''ange de l''Esprit apparut dans ce monde, et après cela Joseph ne renvoya pas Marie et la garda ; mais lui ne révélait à personne cette affaire. Et il ne s''approcha pas de Marie, et la garda comme une vierge sainte, bien qu''elle fût grosse. » –  '
