document_id: MAT.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: D'Abraham à Jésus-Christ
  - type: heading
    content: Lc 3.23-38
  - type: text
    content: ' '
  - type: note
    content: 'Généalogie  : litt. livre de l''origine  ; le terme grec correspondant à origine signifie aussi naissance (v. 18 ; Lc 1.14) et a donné notre mot genèse , cf. Gn 2.4n  ; 5.1 ; voir aussi Lc 3.23ss. –  fils de David 9.27+. –  Abraham Gn 22.18.'
  - type: text
    content: Généalogie de Jésus-Christ, fils de David, fils d'Abraham.
  '10':
  - type: note
    content: Amos, pour Amôn, d'après certains mss de LXX  ; cf. 2R 21.19-26 ; 2Ch 33.21ss.
  - type: text
    content: 'Ezéchias engendra Manassé ; Manassé engendra Amos ; Amos engendra Josias ; '
  '11':
  - type: text
    content: Josias engendra Jékonia et ses frères au temps de l'exil à Babylone.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Salathiel , d'après LXX, pour l'hébreu Shéaltiel (cf. Ag 1.1 ; Esd 3.2 ; 1Ch 3.17ss).
  - type: text
    content: 'Après l''exil à Babylone, Jékonia engendra Salathiel ; Salathiel engendra Zorobabel ; '
  '13':
  - type: note
    content: Eliakim, pour le nom hébreu Eliaqim.
  - type: text
    content: 'Zorobabel engendra Abioud ; Abioud engendra Eliakim ; Eliakim engendra Azor ; '
  '14':
  - type: note
    content: Sadok, pour le nom hébreu Tsadoq.
  - type: text
    content: 'Azor engendra Sadok ; Sadok engendra Akhim ; Akhim engendra Elioud ; '
  '15':
  - type: text
    content: 'Elioud engendra Eléazar ; Eléazar engendra Matthan ; Matthan engendra Jacob ; '
  '16':
  - type: note
    content: Christ (d'après le grec), comme Messie (d'après l'équivalent hébreu), signifie oint  ; dans l'A.T., ce terme s'applique fréquemment aux rois ou aux prêtres d'Israël, consacrés par une onction d'huile sainte ; au temps de Mt, ce nom désignait en particulier le grand libérateur attendu par les Juifs (Es 61.1 ; Dn 9.25ss ; Ps 2.2-6) ; voir aussi Phm 11n.
  - type: text
    content: Jacob engendra Joseph, l'époux de Marie, de laquelle est né Jésus, celui qu'on appelle le Christ.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cette insistance sur trois fois quatorze a été diversement interprétée, selon les multiples rapprochements possibles avec la littérature rabbinique. Ainsi, quatorze est la somme des valeurs numériques des trois lettres hébraïques qui forment le nom de David (le quatorzième de la liste) ; 3 x 14 (= 6 x 7) marquerait l'accomplissement de la grande semaine de l'histoire du salut et l'entrée dans le sabbat messianique qui doit suivre ; ou, par analogie avec les mois lunaires, les quatorze générations d'Abraham à David évoqueraient la phase de croissance (quatorze jours de la nouvelle à la pleine lune), celles de David à l'exil, le déclin (de la pleine lune à la fin du mois), enfin celles de l'exil à Jésus, la restauration de la plénitude. Il est clair en tout cas que, pour l'auteur, la venue de Jésus constitue un accomplissement de l'histoire d'Israël.
  - type: text
    content: Il y a donc en tout quatorze générations depuis Abraham jusqu'à David, quatorze générations depuis David jusqu'à l'exil à Babylone, et quatorze générations depuis l'exil à Babylone jusqu'au Christ.
  - type: heading
    content: La naissance de Jésus
  - type: heading
    content: Lc 2.1-7
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ascension d''Isaïe 11.2ss : « Je vis une femme, de la famille du prophète David, du nom de Marie ; elle était vierge et était fiancée à un homme du nom de Joseph – un artisan, lui aussi de la descendance et de la famille de David le juste –, qui était de Bethléem de Juda, et qui entra en possession de son lot. Et, lorsqu''elle fut fiancée, elle fut trouvée enceinte, et Joseph, l''artisan, voulut la renvoyer. Mais l''ange de l''Esprit apparut dans ce monde, et après cela Joseph ne renvoya pas Marie et la garda ; mais lui ne révélait à personne cette affaire. Et il ne s''approcha pas de Marie, et la garda comme une vierge sainte, bien qu''elle fût grosse. » –  naissance  : voir v. 1n. –  fiancée  : le terme employé ici suggère que, selon les coutumes de l''époque, Marie et Joseph étaient déjà considérés comme légalement mariés mais ne vivaient pas encore sous le même toit (cf. v. 19nss) ; cf. 25.1-13. Voir « La naissance de Jésus : récits et légendes »♦. –  par le fait de l''Esprit saint  : cf. Lc 1.35.'
  - type: text
    content: 'Voici comment arriva la naissance de Jésus-Christ. Marie, sa mère, était fiancée à Joseph ; avant leur union, elle se trouva enceinte par le fait de l''Esprit saint. '
  '19':
  - type: note
    content: 'mari  : le même mot (litt. homme) a été traduit par époux v. 16 ; il est employé ici selon la perspective juridique de l''époque concernant les fiançailles (v. 18n) ; cf. Ap 21.2. –  juste  : le terme peut être compris ici au sens de fidèle pratiquant de la loi de Dieu, mais aussi au sens plus général d’homme bon  ; en tant que juste, au premier sens du terme, Joseph aurait pu s''estimer obligé de répudier une épouse infidèle pour ne pas contracter une union impure (cf. Dt 24.1) ; mais on pourrait aussi comprendre que sa justice consiste à ne pas vouloir la dénoncer publiquement. Sur le mot juste et la notion de justice, cf. 3.15n  ; 5.45 ; 9.13 ; 10.41 ; 13.17,43,49 ; 23.28s,35 ; 25.37,46 ; 27.19 ; voir aussi Lc 1.6. –  dénoncer publiquement  : le mot grec correspondant à cette expression et un autre, très voisin, se retrouvent respectivement en Col 2.15 (livrer en spectacle) et Hé 6.6 (déshonorer publiquement). Cf. Nb 5.11ss ; Dt 22.23ss. –  en secret  : même terme 2.7 ; Jn 11.28 ; Ac 16.37.'
  - type: text
    content: 'Joseph, son mari, qui était juste et qui ne voulait pas la dénoncer publiquement, décida de la répudier en secret. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 5.1ss ; 10–11 ; 1Ch 1–9.
  - type: text
    content: 'Abraham engendra Isaac ; Isaac engendra Jacob ; Jacob engendra Juda et ses frères ; '
  '20':
  - type: note
    content: 'l''ange du Seigneur  : autre traduction possible un ange du Seigneur  ; de même v. 24 ; 2.13,19 ; 28.2 ; Lc 1.11 ; 2.9 ; Ac 5.19+ ; cf. Gn 16.7,13 ; 22.11,15 ; Ex 3.2. –  en rêve 2.12s,19,22 ; 27.19 ; cf. Gn 20.3-7 ; 31.24 ; 46.2-4 ; Ac 16.9 ; 18.9 ; 23.11. –  n''aie pas peur  : cf. 10.31 ; 14.27 ; 17.7 ; 28.5,10 ; voir crainte. –  l''enfant qu''elle a conçu  : litt. ce qui a été engendré en elle  ; cf. Lc 1.35.'
  - type: text
    content: 'Comme il y pensait, l''ange du Seigneur lui apparut en rêve et dit : Joseph, fils de David, n''aie pas peur de prendre chez toi Marie, ta femme, car l''enfant qu''elle a conçu vient de l''Esprit saint ; '
  '21':
  - type: note
    content: 'Jésus  : le nom est traditionnellement rapproché d''une racine hébraïque qui signifie sauver, délivrer  ; il fait aussi assonance avec le verbe grec traduit par sauvera  ; cf. Nb 13.16n  ; Es 1.1n  ; Ps 130.8 ; Jn 4.42 ; Ac 4.12 ; Hé 5.9 ; voir aussi Lc 1.31. –  péchés Jn 1.29 ; 1Jn 2.2 ; 3.5.'
  - type: text
    content: 'elle mettra au monde un fils, et tu l''appelleras du nom de Jésus, car c''est lui qui sauvera son peuple de ses péchés. '
  '22':
  - type: note
    content: Cf. 2.15,17,23 ; 3.3,15 ; 4.14 ; 8.17 ; 12.17 ; 13.14,35 ; 21.4 ; 24.15 ; 26.54,56 ; 27.9 ; voir aussi 5.17 ; Esd 1.1.
  - type: text
    content: 'Tout cela arriva afin que s''accomplisse ce que le Seigneur avait dit par l''entremise du prophète :'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Es 7.14 (LXX) . –  avec nous  : cf. 28.20 ; Es 8.8-10 ; So 3.17 ; Ag 1.13 ; Jn 1.14 ; Rm 8.31 ; Ap 21.3.'
  - type: text
    content: La vierge sera enceinte ; elle mettra au monde un fils
  - type: text
    content: et on l'appellera du nom d'Emmanuel,
  - type: text
    content: 'ce qui se traduit : '
  - type: text
    content: Dieu avec nous
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'A son réveil, Joseph fit ce que l''ange du Seigneur lui avait ordonné, et il prit sa femme chez lui. '
  '25':
  - type: note
    content: 'n''eut pas de relations avec elle  : litt. ne la connut pas, cf. Gn 4.1n. –  jusqu''à  : la préposition grecque qui apparaît ici ne permet pas, à elle seule, de conclure que Marie a eu des relations avec Joseph après la naissance de Jésus ; voir cependant 12.46 ; 13.55. –  un fils  : plusieurs mss et versions anciennes portent son fils premier-né. Cf. Lc 2.7.'
  - type: text
    content: Mais il n'eut pas de relations avec elle jusqu'à ce qu'elle eût mis au monde un fils, qu'il appela du nom de Jésus.
  '3':
  - type: note
    content: 'avec Tamar  : litt. de Tamar, de même v. 5s ; cf. Gn 38 ; Testament de Juda 10.1 : « Thamar, une Mésopotamienne, fille d''Aram. » –  Pharès et Zara, d''après LXX, pour les noms hébreux Pérets et Zérah. –  Hesrom, pour le nom hébreu Hetsrôn, cf. Gn 46.12 ; Nb 26.21.'
  - type: text
    content: 'Juda, avec Tamar, engendra Pharès et Zara ; Pharès engendra Hesrom ; Hesrom engendra Aram ; '
  '4':
  - type: note
    content: Cf. 1Ch 2.9ss ; voir aussi Ex 6.23 ; Lc 3.33.
  - type: text
    content: 'Aram engendra Aminadab ; Aminadab engendra Naassôn ; Naassôn engendra Salmôn ; '
  '5':
  - type: note
    content: 'Rahab Jos 2. –  Boes  : orthographe originale pour Booz ; les mss de LXX portent Booz ou Boos, d''après l''hébreu Boaz (Rt 2.1n). –  Ruth Rt 1–4. –  Yobed ou Obed. La forme qui apparaît ici correspond à celle qui figure dans certains mss de LXX.'
  - type: text
    content: 'Salmôn, avec Rahab, engendra Boes ; Boes, avec Ruth, engendra Yobed ; '
  '6':
  - type: note
    content: Jessé, également transcrit Isaï. –  femme d'Urie 2S 11–12.
  - type: text
    content: Yobed engendra Jessé ; Jessé engendra David.
  - type: text
    content: 'Le roi David, avec la femme d''Urie, engendra Salomon ; '
  '7':
  - type: note
    content: Abiya ou Abia, également appelé Abiyam, cf. 1R 15 ; 2Ch 13. –  Asaph, pour le roi Asa, 1R 15.9-24 ; cf. Ps 50.1 ; 73–83.
  - type: text
    content: 'Salomon engendra Roboam ; Roboam engendra Abiya ; Abiya engendra Asaph ; '
  '8':
  - type: text
    content: 'Asaph engendra Josaphat ; Josaphat engendra Joram ; Joram engendra Ozias ; '
  '9':
  - type: note
    content: Joatham, pour Jotam, d'après LXX  ; cf. 2R 15.32ss ; 2Ch 27.
  - type: text
    content: 'Ozias engendra Joatham ; Joatham engendra Achaz ; Achaz engendra Ezéchias ; '
