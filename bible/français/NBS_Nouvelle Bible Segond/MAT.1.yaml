    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quatorze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est la somme des valeurs numériques des trois lettres hébraïques qui forment le nom de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'David '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le quatorzième de la liste) ; 3 x 14 (= 6 x 7) marquerait l''accomplissement de la grande semaine de l''histoire du salut et l''entrée dans le sabbat messianique qui doit suivre ; ou, par analogie avec les mois lunaires, les quatorze '
      - type: usfm
        marker: w
        children:
        - type: text
          text: générations
      - type: text
        text: ' d''Abraham à David évoqueraient la phase de croissance (quatorze jours de la nouvelle à la pleine lune), celles de David à l''exil, le déclin (de la pleine lune à la fin du mois), enfin celles de l''exil à Jésus, la restauration de la plénitude. Il est clair en tout cas que, pour l''auteur, la venue de Jésus constitue un accomplissement de l''histoire d''Israël.'
    marker-yv: yv-n
  - type: text
    text: Il y a donc en tout quatorze générations depuis Abraham jusqu'à David, quatorze générations depuis David jusqu'à l'exil à Babylone, et quatorze générations depuis l'exil à Babylone jusqu'au Christ.
