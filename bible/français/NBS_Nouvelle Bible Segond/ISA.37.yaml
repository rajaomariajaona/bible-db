          text: v. 14.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque le roi Ezéchias eut entendu cela, il déchira ses vêtements, se couvrit d''un sac et se rendit à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 36.14-19.
      marker-yv: yv-n
    - type: text
      text: 'Vous parlerez ainsi à Ezéchias, roi de Juda : Que ton Dieu, en qui tu mets ta confiance, ne te trompe pas en disant : « Jérusalem ne sera pas livrée au roi d''Assyrie ! » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anathème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 34.2+ ; Dt 2.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu as toi-même appris ce qu''ont fait les rois d''Assyrie à tous les pays : ils les ont frappés d''anathème ; et toi, tu serais délivré ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.10s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gozân…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : villes de Mésopotamie ; voir 2R 19.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les dieux des nations que mes pères ont détruites les ont-ils délivrées, Gozân, Harrân, Rétseph, et les fils d''Eden qui sont à Telassar ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.9 ; 36.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Laïr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 19.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Où sont le roi de Hamath, le roi d'Arpad et le roi de la ville de Sepharvaïm, de Héna et d'Ivva ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière d'Ezéchias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 19.14-19
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la lettre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : au pluriel dans le texte ; on pourrait traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les documents. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias prit la lettre de la main des messagers, la lut et monta à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; Ezéchias la déploya devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ezéchias pria le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il dit : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'keroubim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 25.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',22+ ; Ps 80.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fait le ciel et la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 1.1 ; 2.4.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, Dieu d''Israël, qui es assis sur les keroubim, c''est toi seul qui es Dieu pour tous les royaumes de la terre, c''est toi qui as fait le ciel et la terre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dn 9.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entends '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ecoute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent le même verbe hébreu.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tends l''oreille et entends ! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ouvre les yeux et vois ! Ecoute toutes les paroles que Sennachérib a envoyées pour outrager le Dieu vivant ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les pays…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les pays et leurs pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les nations et leurs pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2R 19.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). Un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' omet la précision '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et leur propre pays.
      marker-yv: yv-n
    - type: text
      text: 'Il est vrai, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', que les rois d''Assyrie ont réduit en ruines tous les pays et leur propre pays, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.8 ; 40.20 ; 44.13-17 ; cf. Dt 4.28 ; 28.36,64 ; Jr 1.16 ; 2.27s ; 3.9 ; 44.8 ; Ez 20.32 ; Os 14.4 ; Ps 115.4-7.
      marker-yv: yv-n
    - type: text
      text: 'en jetant leurs dieux au feu – en fait, ceux-là n''étaient pas des dieux, mais l''œuvre de mains humaines, du bois et de la pierre – et ils les ont anéantis. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 22.12-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eliaqim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shebna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '36.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaïe… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il envoya Eliaqim, l''intendant de la maison, Shebna, le scribe, et les anciens des prêtres, couverts d''un sac, chez Esaïe, fils d''Amots, le prophète. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la main de Sennachérib
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de sa main. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sachent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 8.60.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, sauve-nous de la main de Sennachérib ; que tous les royaumes de la terre sachent ainsi que, toi seul, tu es le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esaïe transmet la réponse de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 19.20-28
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 15 ; 38.5.
      marker-yv: yv-n
    - type: text
      text: 'Alors Esaïe, fils d''Amots, fit dire à Ezéchias : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, à qui tu as adressé ta prière au sujet de Sennachérib, roi d''Assyrie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sion la jolie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérusalem la belle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la vierge de la fille de Sion / la fille de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici la parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a prononcée contre lui :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle te méprise, elle se moque de toi, Sion la jolie ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle hoche la tête derrière toi, Jérusalem la belle.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les yeux en haut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Saint
        - type: text
          text: ' d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Qui as-tu outragé et injurié ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre qui as-tu élevé la voix ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as levé les yeux en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le Saint d'Israël !
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Liban '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses plus épaisses forêts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la forêt de son verger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 29.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 19.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Par l'intermédiaire de tes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as outragé le Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu as dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Avec la multitude de mes chars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, je suis monté tout en haut des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au plus profond du Liban ;
  - type: usfm
    marker: q1
