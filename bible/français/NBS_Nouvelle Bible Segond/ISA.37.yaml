document_id: ISA.37,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias consulte le prophète Esaïe
  - type: heading
    content: 2R 19.1-7
  - type: text
    content: ' '
  - type: note
    content: vêtements / sac 36.22n. –  maison du Seigneur v. 14.
  - type: text
    content: 'Lorsque le roi Ezéchias eut entendu cela, il déchira ses vêtements, se couvrit d''un sac et se rendit à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '10':
  - type: note
    content: 36.14-19.
  - type: text
    content: 'Vous parlerez ainsi à Ezéchias, roi de Juda : Que ton Dieu, en qui tu mets ta confiance, ne te trompe pas en disant : « Jérusalem ne sera pas livrée au roi d''Assyrie ! » '
  '11':
  - type: note
    content: anathème 34.2+ ; Dt 2.34n.
  - type: text
    content: 'Tu as toi-même appris ce qu''ont fait les rois d''Assyrie à tous les pays : ils les ont frappés d''anathème ; et toi, tu serais délivré ! '
  '12':
  - type: note
    content: 'Les dieux 10.10s. –  Gozân…  : villes de Mésopotamie ; voir 2R 19.12n.'
  - type: text
    content: 'Les dieux des nations que mes pères ont détruites les ont-ils délivrées, Gozân, Harrân, Rétseph, et les fils d''Eden qui sont à Telassar ? '
  '13':
  - type: note
    content: 10.9 ; 36.19n. –  la ville ou Laïr  ; cf. 2R 19.13n.
  - type: text
    content: Où sont le roi de Hamath, le roi d'Arpad et le roi de la ville de Sepharvaïm, de Héna et d'Ivva ?
  - type: heading
    content: Prière d'Ezéchias
  - type: heading
    content: 2R 19.14-19
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la lettre  : au pluriel dans le texte ; on pourrait traduire les documents. –  maison du Seigneur v. 1.'
  - type: text
    content: 'Ezéchias prit la lettre de la main des messagers, la lut et monta à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; Ezéchias la déploya devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Ezéchias pria le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il dit : '
  '16':
  - type: note
    content: keroubim Ex 25.18n,22+ ; Ps 80.2. –  fait le ciel et la terre Gn 1.1 ; 2.4.
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, Dieu d''Israël, qui es assis sur les keroubim, c''est toi seul qui es Dieu pour tous les royaumes de la terre, c''est toi qui as fait le ciel et la terre. '
  '17':
  - type: note
    content: Dn 9.18. –  entends et Ecoute traduisent le même verbe hébreu.
  - type: text
    content: Seigneur
  - type: text
    content: ', tends l''oreille et entends ! '
  - type: text
    content: Seigneur
  - type: text
    content: ', ouvre les yeux et vois ! Ecoute toutes les paroles que Sennachérib a envoyées pour outrager le Dieu vivant ! '
  '18':
  - type: note
    content: 'les pays…  : litt. les pays et leurs pays  ; quelques mss portent les nations et leurs pays (cf. 2R 19.17n). Un ms de Qumrân omet la précision et leur propre pays.'
  - type: text
    content: 'Il est vrai, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que les rois d''Assyrie ont réduit en ruines tous les pays et leur propre pays, '
  '19':
  - type: note
    content: 2.8 ; 40.20 ; 44.13-17 ; cf. Dt 4.28 ; 28.36,64 ; Jr 1.16 ; 2.27s ; 3.9 ; 44.8 ; Ez 20.32 ; Os 14.4 ; Ps 115.4-7.
  - type: text
    content: 'en jetant leurs dieux au feu – en fait, ceux-là n''étaient pas des dieux, mais l''œuvre de mains humaines, du bois et de la pierre – et ils les ont anéantis. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2R 22.12-14. –  Eliaqim / Shebna 36.3+. –  Esaïe… 1.1n.
  - type: text
    content: 'Il envoya Eliaqim, l''intendant de la maison, Shebna, le scribe, et les anciens des prêtres, couverts d''un sac, chez Esaïe, fils d''Amots, le prophète. '
  '20':
  - type: note
    content: 'de la main de Sennachérib  : litt. de sa main. –  sachent 1R 8.60.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, sauve-nous de la main de Sennachérib ; que tous les royaumes de la terre sachent ainsi que, toi seul, tu es le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) !'
  - type: heading
    content: Esaïe transmet la réponse de Dieu
  - type: heading
    content: 2R 19.20-28
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 15 ; 38.5.
  - type: text
    content: 'Alors Esaïe, fils d''Amots, fit dire à Ezéchias : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, à qui tu as adressé ta prière au sujet de Sennachérib, roi d''Assyrie. '
  '22':
  - type: note
    content: 'Sion la jolie / Jérusalem la belle  : litt. la vierge de la fille de Sion / la fille de Jérusalem  ; cf. 1.8n.'
  - type: text
    content: 'Voici la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a prononcée contre lui :'
  - type: text
    content: Elle te méprise, elle se moque de toi, Sion la jolie ;
  - type: text
    content: elle hoche la tête derrière toi, Jérusalem la belle.
  '23':
  - type: text
    content: ' '
  - type: note
    content: les yeux en haut 10.12. –  Saint d'Israël 1.4n.
  - type: text
    content: Qui as-tu outragé et injurié ?
  - type: text
    content: Contre qui as-tu élevé la voix ?
  - type: text
    content: Tu as levé les yeux en haut,
  - type: text
    content: sur le Saint d'Israël !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Liban 33.9+. –  ses plus épaisses forêts  : litt. la forêt de son verger  ; cf. 29.17n  ; 2R 19.23n.'
  - type: text
    content: Par l'intermédiaire de tes gens,
  - type: text
    content: tu as outragé le Seigneur
  - type: text
    content: 'et tu as dit :'
  - type: text
    content: « Avec la multitude de mes chars,
  - type: text
    content: moi, je suis monté tout en haut des montagnes,
  - type: text
    content: au plus profond du Liban ;
  - type: text
    content: je coupe les plus élevés de ses cèdres,
  - type: text
    content: les plus beaux de ses cyprès,
  - type: text
    content: et j'atteins sa dernière cime,
  - type: text
    content: ses plus épaisses forêts ;
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 11.15 ; Na 1.4. –  de l''eau  : 2R 19.24 et un ms de Qumrân ajoutent étrangère. –  les bras du Nil 7.18n  ; 19.6n.'
  - type: text
    content: j'ai creusé et j'ai bu de l'eau,
  - type: text
    content: je tarirai avec mes pieds
  - type: text
    content: tous les bras du Nil en Egypte. »
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'depuis longtemps 22.11. –  et toi, tu n''as plus qu''à…  : certains comprennent  : ce sera pour transformer…'
  - type: text
    content: N'as-tu pas appris que j'ai fait ces choses depuis longtemps,
  - type: text
    content: que dès les jours de jadis je les ai façonnées ?
  - type: text
    content: Maintenant, je les fais venir,
  - type: text
    content: et toi, tu n'as plus qu'à transformer les villes fortes en tas de ruines.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'impuissants  : litt. courts de main  ; cf. 50.2+. –  en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. –  et le champ…  : quelques mss lisent ici le même texte qu''en 2R 19.26n, ce qui représente une variante d''une seule lettre. Un ms de Qumrân porte (comme) le blé desséché par le vent d''est.'
  - type: text
    content: Leurs habitants sont impuissants,
  - type: text
    content: ils sont terrifiés et honteux ;
  - type: text
    content: ils sont comme l'herbe des champs et la tendre verdure,
  - type: text
    content: comme le gazon des toits en terrasse
  - type: text
    content: et le champ avant qu'il y pousse des tiges.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Un ms de Qumrân ajoute au début du v.  : quand tu te lèves  ; cf. Ps 139.2. –  quand tu pars en campagne…  : cf. 2R 19.27n.'
  - type: text
    content: Mais je sais quand tu t'assieds,
  - type: text
    content: quand tu pars en campagne et quand tu en reviens,
  - type: text
    content: et quand tu t'agites contre moi.
  '29':
  - type: text
    content: ' '
  - type: note
    content: boucle / mors 30.28 ; Ez 19.4,9 ; 38.4 ; Ps 32.9. –  retourner par le chemin v. 7+.
  - type: text
    content: Parce que tu t'agites contre moi
  - type: text
    content: et que ta suffisance est montée à mes oreilles,
  - type: text
    content: je mettrai ma boucle à tes narines
  - type: text
    content: et mon mors à tes lèvres,
  - type: text
    content: et je te ferai retourner par le chemin par lequel tu es venu.
  - type: heading
    content: Le signe donné à Ezéchias
  - type: heading
    content: 2R 19.29-31
  '3':
  - type: note
    content: 'sont prêts à sortir du ventre de leur mère  : litt. sont venus jusqu''à la brisure (ou à la brèche) ; cf. 26.18 ; 66.9 ; Os 13.13n.'
  - type: text
    content: 'Ils lui dirent : Ainsi parle Ezéchias : Ce jour est un jour de détresse, de châtiment et d''opprobre ; des fils sont prêts à sortir du ventre de leur mère, et il n''y a plus de force pour les mettre au monde. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'signe 7.11+. –  pour toi  : Ezéchias.'
  - type: text
    content: 'Voici le signe pour toi :'
  - type: text
    content: on mangera cette année le produit du grain tombé,
  - type: text
    content: et la suivante ce qui pousse de soi-même.
  - type: text
    content: Mais la troisième année,
  - type: text
    content: semez, moissonnez,
  - type: text
    content: plantez des vignes et mangez-en le fruit.
  '31':
  - type: text
    content: ' '
  - type: note
    content: racines 11.1.
  - type: text
    content: Les rescapés de la maison de Juda qui seront restés
  - type: text
    content: produiront encore des racines vers le bas
  - type: text
    content: et porteront du fruit vers le haut.
  '32':
  - type: text
    content: ' '
  - type: note
    content: reste / rescapés v. 4 ; 10.21. –  passion jalouse… 9.6+.
  - type: text
    content: Car de Jérusalem sortira un reste
  - type: text
    content: et du mont Sion des rescapés.
  - type: text
    content: 'Voilà ce que fera la passion jalouse du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: La fin de Sennachérib
  - type: heading
    content: 2R 19.32-37  ; 2Ch 32.21-22
  '33':
  - type: text
    content: ' '
  - type: note
    content: 33.20. –  remblai Jr 6.6 ; Ez 4.2 ; 26.8.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet du roi d''Assyrie :'
  - type: text
    content: Il n'entrera pas dans cette ville,
  - type: text
    content: il n'y tirera pas de flèche,
  - type: text
    content: il ne lui opposera pas de bouclier
  - type: text
    content: et il n'élèvera pas de remblai contre elle.
  '34':
  - type: text
    content: ' '
  - type: note
    content: retournera par le chemin… v. 7+.
  - type: text
    content: Il s'en retournera par le chemin par lequel il est venu,
  - type: text
    content: et il n'entrera pas dans cette ville
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Je protégerai… 30.19 ; 31.5 ; 38.6. –  à cause de moi  : cf. 60.14 ; Ps 46.5 ; 48.9 ; 87.3 ; 101.8. –  David 29.1 ; 2S 5.7,9 ; 7.16.'
  - type: text
    content: Je protégerai cette ville pour la sauver,
  - type: text
    content: à cause de moi et à cause de David, mon serviteur.
  '36':
  - type: text
    content: ' '
  - type: note
    content: '2R 19.35 ajoute au début du v.  : cette nuit-là. –  messager (ou ange ) : cf. Gn 19.13 ; Ex 12.23 ; 2S 24.16. –  on se leva  : autre traduction ils se levèrent . –  de bon matin 17.14.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sortit et abattit dans le camp des Assyriens cent quatre-vingt-cinq mille hommes ; quand on se leva, de bon matin, c''étaient tous des cadavres, des morts ! '
  '37':
  - type: note
    content: 's''en retourna…  : cf. 2R 19.36n. –  Ninive  : capitale de l''Assyrie.'
  - type: text
    content: 'Alors Sennachérib, roi d''Assyrie, s''en retourna habiter à Ninive. '
  '38':
  - type: note
    content: Cf. 14.9s. –  Ararat Gn 8.4n. –  Asarhaddon Esd 4.2n.
  - type: text
    content: Alors qu'il était prosterné dans la maison de Nisrok, son dieu, ses fils Adrammélek et Sarétser le tuèrent d'un coup d'épée et s'enfuirent au pays d'Ararat. Son fils Asarhaddon devint roi à sa place.
  '4':
  - type: note
    content: 'outrager  : autres traductions déshonorer, défier v. 23s ; 36.18-20 ; 1S 17.10n  ; 2R 19.4n. –  le Dieu vivant Dt 5.26+ ; Os 2.1. –  reste v. 31s ; 1.8-9+ ; 10.21s. –  qui subsiste encore  : litt. qui est trouvé.'
  - type: text
    content: 'Peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, entendra-t-il les paroles du chef d''intendance, que le roi d''Assyrie, son maître, a envoyé pour outrager le Dieu vivant ; peut-être le châtiera-t-il pour ces paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a entendues. Elève une prière pour le reste qui subsiste encore.'
  '5':
  - type: text
    content: 'Les gens de la cour du roi Ezéchias allèrent donc auprès d''Esaïe. '
  '6':
  - type: note
    content: N'aie pas peur… 7.4 ; 10.24 ; 41.10-14 ; voir crainte.
  - type: text
    content: 'Esaïe leur dit : Voici ce que vous direz à votre maître : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : N''aie pas peur des paroles que tu as entendues, de ces injures que les serviteurs du roi d''Assyrie ont proférées contre moi. '
  '7':
  - type: note
    content: 'V. 9,29,34,37s ; cf. 31.8. –  souffle  : voir esprit.'
  - type: text
    content: 'J''envoie sur lui un souffle : sur une nouvelle qu''il recevra, il retournera dans son pays, et je le ferai tomber par l''épée dans son pays.'
  - type: heading
    content: Nouvelles menaces de Sennachérib
  - type: heading
    content: 2R 19.8-13  ; 2Ch 32.16-19
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Libna / Lakish  : cf. 36.1s ; Jos 10.29-33 ; 2R 8.22n  ; 18.13s. –  que le roi…  : litt. qu''il avait quitté Lakish  ; autre traduction son départ de Lakish.'
  - type: text
    content: 'Le chef d''intendance s''en retourna trouver le roi d''Assyrie qui attaquait Libna – en effet, il avait appris que le roi avait quitté Lakish. '
  '9':
  - type: note
    content: 'nouvelle v. 7+. –  Koush ou la Nubie  ; voir 18.1n  ; cf. 7.18 ; 36.6 ; Gn 2.13n. –  Il s''est mis en campagne  : litt. il est sorti  ; cf. 40.26 ; 42.13 ; Am 5.3n. –  il envoya  : 2R 19.9  : il envoya de nouveau.'
  - type: text
    content: 'Alors le roi d''Assyrie reçut une nouvelle au sujet de Tirhaqa, roi de Koush : « Il s''est mis en campagne pour te faire la guerre. » Dès qu''il eut entendu cela, il envoya des messagers à Ezéchias, en disant : '
