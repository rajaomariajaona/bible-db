    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'car le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' de ce peuple… '
    - type: usfm
      marker: fqa
      children:
      - type: text
