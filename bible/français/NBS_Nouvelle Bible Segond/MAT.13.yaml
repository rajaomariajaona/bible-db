    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: car le cœur de ce peuple s'est engourdi ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: ils sont devenus durs d'oreille et ils ont fermé les yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: de peur de voir avec leurs yeux, d'entendre avec leurs oreilles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: de comprendre avec leur cœur
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: et de faire demi-tour ; je les aurais guéris !
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.17 ; Lc 10.23s ; Jn 10.27.
    marker-yv: yv-n
  - type: text
    text: 'Mais heureux sont vos yeux, parce qu''ils voient, et vos oreilles, parce qu''elles entendent ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 8.56 ; Ep 3.5 ; Hé 11.13 ; 1P 1.10s.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, en effet, beaucoup de prophètes et de justes ont désiré voir ce que vous regardez, et ils ne l''ont pas vu ; ils ont désiré entendre ce que vous entendez, et ils ne l''ont pas entendu.'
- type: usfm
  marker: s1
