      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '57 : « Jésus a dit : “Le Royaume du Père est semblable à un homme qui avait une bonne semence. Son ennemi vint la nuit, et il sema l''ivraie parmi la bonne semence. L''homme ne permit pas qu''on arrache l''ivraie, et il leur dit : ‘De peur que vous n''alliez arracher l''ivraie et que vous n''arrachiez le blé avec elle.’ Car le jour de la moisson, l''ivraie apparaîtra, et elle sera arrachée et brûlée.” »'
    marker-yv: yv-n
  - type: text
    text: 'Il leur proposa cette autre parabole : Il en va du règne des cieux comme d''un homme qui avait semé de la bonne semence dans son champ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pendant que… dormaient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 4.27 ; cf. Jb 24.13-17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de la mauvaise herbe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, plus précisément, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'ivraie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le mot grec ainsi traduit a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: zizanie.
    marker-yv: yv-n
  - type: text
    text: 'Pendant que les gens dormaient, son ennemi vint, sema de la mauvaise herbe au milieu du blé et s''en alla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsque l''herbe eut poussé et produit du fruit, la mauvaise herbe parut aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les esclaves du maître de maison vinrent lui dire : Seigneur, n''as-tu pas semé de la bonne semence dans ton champ ? D''où vient donc qu''il y ait de la mauvaise herbe ? '
  - type: usfm
    marker: vlbl
