    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un homme ennemi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un ennemi, un homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'arracher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'recueillir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 48 et par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cueillir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 7.16.
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : C''est un ennemi qui a fait cela. Les esclaves lui dirent : Veux-tu que nous allions l''arracher ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 12.20 ; Es 65.8. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Le Pasteur '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Hermas
      - type: text
        text: ', Sim. III,3 : « En hiver, les arbres, dépouillés de leurs feuilles, sont semblables et on ne peut distinguer lesquels sont morts ou vivants : de même, dans ce monde, ne se distinguent ni les justes ni les pécheurs ; ils sont tous semblables. »'
    marker-yv: yv-n
  - type: text
    text: 'Non, dit-il, de peur qu''en arrachant la mauvaise herbe, vous ne déraciniez le blé en même temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 17.15.
    marker-yv: yv-n
  - type: text
    text: 'Laissez croître ensemble l''un et l''autre jusqu''à la moisson ; au temps de la moisson, je dirai aux moissonneurs : Arrachez d''abord la mauvaise herbe et liez-la en gerbes pour la brûler, puis recueillez le blé dans ma grange.'
