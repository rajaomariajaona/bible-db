document_id: MAT.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole du semeur
  - type: heading
    content: Mc 4.1-9  ; Lc 8.4-8
  - type: text
    content: ' '
  - type: note
    content: 4.13n.
  - type: text
    content: 'Ce jour-là, Jésus sortit de la maison et s''assit au bord de la mer. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 3+.
  - type: text
    content: 'Les disciples vinrent lui demander : Pourquoi leur parles-tu en paraboles ? '
  '11':
  - type: note
    content: 11.25 ; 1Co 2.10. –  règne ou royaume 3.2n.
  - type: text
    content: 'Il leur répondit : Parce que, s''il vous a été donné, à vous, de connaître les mystères du règne des cieux, à eux cela n''a pas été donné. '
  '12':
  - type: note
    content: 25.29/ / ; Mc 4.25/ /.
  - type: text
    content: 'Car on donnera à celui qui a, et il sera dans l''abondance, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  '13':
  - type: note
    content: Dt 29.3 ; Jr 5.21 ; Mc 8.18 ; Lc 19.42 ; Jn 9.39 ; 12.40 ; Ac 13.40s ; 28.26s ; 2Co 4.4.
  - type: text
    content: 'Voilà pourquoi je leur parle en paraboles, parce qu''en voyant ils ne voient pas, et qu''en entendant ils n''entendent ni ne comprennent. '
  '14':
  - type: note
    content: 'parole du prophète Esaïe  : litt. prophétie d''Esaïe. Voir Es 6.9. –  jamais  : autres traductions rien, en aucun cas.'
  - type: text
    content: 'Et pour eux s''accomplit cette parole du prophète Esaïe :'
  - type: text
    content: Vous aurez beau entendre, vous ne comprendrez jamais.
  - type: text
    content: Vous aurez beau regarder, vous ne verrez jamais
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'car le cœur de ce peuple… Es 6.10 . –  s''est engourdi  : litt. a été épaissi, engraissé . –  ils sont devenus durs d''oreille  : litt. des oreilles ils ont entendu lourdement  ; cf. Hé 5.11. –  faire demi-tour ou se retourner (cf. 12.44), revenir , terme traditionnellement traduit par se convertir  ; voir changement radical. –  guéris  : même verbe en 8.8,13 (voir 8.7n).'
  - type: text
    content: car le cœur de ce peuple s'est engourdi ;
  - type: text
    content: ils sont devenus durs d'oreille et ils ont fermé les yeux,
  - type: text
    content: de peur de voir avec leurs yeux, d'entendre avec leurs oreilles,
  - type: text
    content: de comprendre avec leur cœur
  - type: text
    content: et de faire demi-tour ; je les aurais guéris !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 16.17 ; Lc 10.23s ; Jn 10.27.
  - type: text
    content: 'Mais heureux sont vos yeux, parce qu''ils voient, et vos oreilles, parce qu''elles entendent ! '
  '17':
  - type: note
    content: Jn 8.56 ; Ep 3.5 ; Hé 11.13 ; 1P 1.10s.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, en effet, beaucoup de prophètes et de justes ont désiré voir ce que vous regardez, et ils ne l''ont pas vu ; ils ont désiré entendre ce que vous entendez, et ils ne l''ont pas entendu.'
  - type: heading
    content: Explication de la parabole du semeur
  - type: heading
    content: Mc 4.13-20  ; Lc 8.11-15
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3ss. Cf. 4 Esdras 8.41 : « Lorsque le paysan sème en terre beaucoup de graines et plante un grand nombre de plantes, tout ce qui a été semé n''est pas sauvé, à la saison voulue, et tout ce qui a été planté ne prend pas racine : ainsi ceux qui ont été semés en ce monde ne seront pas tous sauvés. » 9.31-37 : « Voici, je sème ma loi en vous, elle portera du fruit en vous et vous en tirerez gloire à jamais (…). Nous qui avons reçu la loi, nous devons périr à cause de nos péchés ainsi que notre cœur où elle avait été déposée. La loi, elle, ne périt pas mais demeure dans sa gloire. »'
  - type: text
    content: 'Vous donc, entendez la parabole du semeur. '
  '19':
  - type: note
    content: 'Lorsque quelqu''un…  : litt. quiconque entend ou écoute… –  ensemencé ou semé  ; de même aux v. 20,22s. – Cf. 1Co 2.14 ; 1P 5.8.'
  - type: text
    content: 'Lorsque quelqu''un entend la parole du Règne et ne la comprend pas, le Mauvais vient s''emparer de ce qui a été semé dans son cœur : c''est celui qui a été ensemencé le long du chemin. '
  '2':
  - type: note
    content: Mc 2.13 ; 3.9 ; Lc 5.1-3.
  - type: text
    content: Il se rassembla auprès de lui de si grandes foules qu'il monta dans un bateau et s'y assit. Toute la foule se tenait sur le rivage.
  '20':
  - type: text
    content: 'Celui qui a été ensemencé dans les endroits pierreux, c''est celui qui entend la Parole et la reçoit aussitôt avec joie, '
  '21':
  - type: note
    content: il ne tient qu'un temps ou il est éphémère  ; terme apparenté au mot traduit par temps en 8.29+ ; également 2Co 4.18 ; Hé 11.25. – Cf. 7.26s ; Ga 1.6.
  - type: text
    content: 'mais il n''a pas de racine en lui-même, il ne tient qu''un temps ; sitôt que survient la détresse ou la persécution à cause de la Parole, c''est pour lui une cause de chute. '
  '22':
  - type: note
    content: 'parmi les épines  : cf. Jr 4.3 ; Os 10.12. –  du monde  : certains mss portent de ce monde  ; 12.32n  ; 2Tm 4.10. –  attrait trompeur Mc 4.19n. –  elle devient stérile  : on pourrait aussi traduire le rendent stérile (cf. 1Co 14.14). – Cf. 6.19-34/ / ; Mc 10.23s ; Lc 14.18-20 ; 21.34.'
  - type: text
    content: 'Celui qui a été ensemencé parmi les épines, c''est celui qui entend la Parole, mais les inquiétudes du monde et l''attrait trompeur des richesses étouffent la Parole, et elle devient stérile. '
  '23':
  - type: note
    content: 'entend  : cf. Ac 16.14. –  fruit Ps 1.1-3 ; Jn 15.5,8 ; Ga 5.22s.'
  - type: text
    content: Celui qui a été ensemencé dans la bonne terre, c'est celui qui entend la Parole et la comprend ; il porte du fruit et produit, l'un cent, l'autre soixante, l'autre trente.
  - type: heading
    content: La parabole de la mauvaise herbe
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'V. 36-43. Evangile selon Thomas 57 : « Jésus a dit : “Le Royaume du Père est semblable à un homme qui avait une bonne semence. Son ennemi vint la nuit, et il sema l''ivraie parmi la bonne semence. L''homme ne permit pas qu''on arrache l''ivraie, et il leur dit : ‘De peur que vous n''alliez arracher l''ivraie et que vous n''arrachiez le blé avec elle.’ Car le jour de la moisson, l''ivraie apparaîtra, et elle sera arrachée et brûlée.” »'
  - type: text
    content: 'Il leur proposa cette autre parabole : Il en va du règne des cieux comme d''un homme qui avait semé de la bonne semence dans son champ. '
  '25':
  - type: note
    content: Pendant que… dormaient Mc 4.27 ; cf. Jb 24.13-17. –  de la mauvaise herbe ou, plus précisément, de l'ivraie  ; le mot grec ainsi traduit a donné notre mot zizanie.
  - type: text
    content: 'Pendant que les gens dormaient, son ennemi vint, sema de la mauvaise herbe au milieu du blé et s''en alla. '
  '26':
  - type: text
    content: 'Lorsque l''herbe eut poussé et produit du fruit, la mauvaise herbe parut aussi. '
  '27':
  - type: text
    content: 'Les esclaves du maître de maison vinrent lui dire : Seigneur, n''as-tu pas semé de la bonne semence dans ton champ ? D''où vient donc qu''il y ait de la mauvaise herbe ? '
  '28':
  - type: note
    content: 'un ennemi  : litt. un homme ennemi ou un ennemi, un homme. –  l''arracher  : le même verbe est traduit par recueillir au v. 48 et par cueillir en 7.16.'
  - type: text
    content: 'Il leur répondit : C''est un ennemi qui a fait cela. Les esclaves lui dirent : Veux-tu que nous allions l''arracher ? '
  '29':
  - type: note
    content: 'Cf. 12.20 ; Es 65.8. Le Pasteur d''Hermas, Sim. III,3 : « En hiver, les arbres, dépouillés de leurs feuilles, sont semblables et on ne peut distinguer lesquels sont morts ou vivants : de même, dans ce monde, ne se distinguent ni les justes ni les pécheurs ; ils sont tous semblables. »'
  - type: text
    content: 'Non, dit-il, de peur qu''en arrachant la mauvaise herbe, vous ne déraciniez le blé en même temps. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: V. 10-13,34s/ /.
  - type: text
    content: 'Il leur parla longuement en paraboles ; il disait : Le semeur sortit pour semer. '
  '30':
  - type: note
    content: Jn 17.15.
  - type: text
    content: 'Laissez croître ensemble l''un et l''autre jusqu''à la moisson ; au temps de la moisson, je dirai aux moissonneurs : Arrachez d''abord la mauvaise herbe et liez-la en gerbes pour la brûler, puis recueillez le blé dans ma grange.'
  - type: heading
    content: La parabole de la graine de moutarde
  - type: heading
    content: Mc 4.30-32  ; Lc 13.18-19
  '31':
  - type: text
    content: ' '
  - type: note
    content: Le mot grec traduit par moutarde a donné nos mots sénevé, sinapisme . La graine de moutarde semble avoir été la plus petite des semences utilisées dans la région ; elle pouvait produire un arbuste assez important. Mais il se peut aussi que Jésus ait désigné une autre semence. Cf. 17.20.
  - type: text
    content: 'Il leur proposa cette autre parabole : Voici à quoi le règne des cieux est semblable : une graine de moutarde qu''un homme a prise et semée dans son champ. '
  '32':
  - type: note
    content: Cf. Ez 17.23 ; 31.6 ; Ps 104.12 (formulation analogue dans LXX) ; Dn 4.9,18. –  habiter 8.20n.
  - type: text
    content: 'C''est la plus petite de toutes les semences ; mais, quand elle a poussé, elle est plus grande que les plantes potagères et elle devient un arbre, de sorte que '
  - type: text
    content: les oiseaux du ciel
  - type: text
    content: ' viennent '
  - type: text
    content: habiter dans ses branches
  - type: text
    content: .
  - type: heading
    content: La parabole du levain
  - type: heading
    content: Lc 13.20-21
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Le levain était généralement un reste de pâte levée provenant de la panification précédente ; l''image est parfois positive (c''est le cas ici selon toute vraisemblance), plus souvent négative ; cf. 16.6 ; 1Co 5.6 ; Ga 5.9. –  trois séas…  : une grande quantité de farine (les estimations varient d''une douzaine à une quarantaine de litres) ; le mot grec employé ici et en Lc 13.21 transcrit l''hébreu séa , cf. Gn 18.6 ; voir mesures. – Cf. Evangile selon Thomas 96 : « Jésus a dit : “Le Royaume du Père est semblable à une femme. Elle prit un peu de levain, le cacha dans de la pâte et en fit de grands pains. Celui qui a des oreilles, qu''il entende !” »'
  - type: text
    content: 'Il leur dit cette autre parabole : Voici à quoi le règne des cieux est semblable : du levain qu''une femme a pris et introduit dans trois '
  - type: text
    content: séas
  - type: text
    content: ' de farine, jusqu''à ce que tout ait levé.'
  - type: heading
    content: L'enseignement par les paraboles
  - type: heading
    content: Mc 4.33-34
  '34':
  - type: text
    content: ' '
  - type: note
    content: V. 3,10ss ; Jn 16.25.
  - type: text
    content: 'Tout cela, Jésus le dit aux foules en paraboles ; il ne leur disait rien sans parabole, '
  '35':
  - type: note
    content: 'par l''entremise du prophète 1.22+. –  Je prendrai la parole…  : litt. j''ouvrirai ma bouche en paraboles  ; cf. Ps 78.2  ; Rm 16.25 ; 1Co 2.7. –  la fondation du monde  : cf. 25.34 ; la précision du monde est absente de certains mss.'
  - type: text
    content: 'afin que s''accomplisse ce qui avait été dit par l''entremise du prophète :'
  - type: text
    content: Je prendrai la parole pour dire des paraboles,
  - type: text
    content: je proclamerai des choses cachées depuis la fondation
  - type: text
    content: ' du monde.'
  - type: heading
    content: Jésus explique la parabole de la mauvaise herbe
  '36':
  - type: text
    content: ' '
  - type: note
    content: V. 1s,24-30.
  - type: text
    content: 'Alors il laissa les foules et entra dans la maison. Ses disciples vinrent lui dire : Explique-nous la parabole de la mauvaise herbe dans le champ. '
  '37':
  - type: note
    content: 1Jn 3.9. –  Fils de l'homme 8.20n.
  - type: text
    content: 'Il leur répondit : Celui qui sème la bonne semence, c''est le Fils de l''homme ; '
  '38':
  - type: note
    content: 'champ 1Co 3.9. –  semence / fils  : cf. Jn 1.13 ; 1P 1.23. –  fils du Mauvais Jn 8.44 ; Ac 13.10 ; 1Jn 3.10. – Cf. Le Pasteur d''Hermas, Sim. V,5,2s : « Le champ, c''est ce monde-ci, et le maître du champ, c''est celui qui a créé toutes choses, qui les a organisées et qui leur a donné la force. Le fils, c''est le Saint-Esprit (proposition absente de certains mss), et l''esclave, c''est le fils de Dieu ; les vignes, c''est le peuple qu''il a lui-même planté. Les pieux, ce sont les saints anges du Seigneur qui retiennent son peuple. Les herbes arrachées à la vigne sont les iniquités des serviteurs de Dieu… »'
  - type: text
    content: 'le champ, c''est le monde, la bonne semence, ce sont les fils du Royaume ; la mauvaise herbe, ce sont les fils du Mauvais ; '
  '39':
  - type: note
    content: 'diable (voir démon) / anges  : cf. 4.11 ; 25.41. –  moisson 9.37 ; Jl 4.13 ; Ap 14.15. –  fin (ou achèvement) du monde (v. 22n), c.-à-d. de l''ère présente (12.32n). Cette expression est employée uniquement par Mt (v. 40,49 ; 24.3 ; 28.20) ; on trouve une autre formule très proche en Hé 9.26n (cf. le « jour de la consommation, du grand Jugement, où s''accomplira le grand Siècle » en 1 Hénoch 16.1) ; terme apparenté en Mc 13.4n.'
  - type: text
    content: 'l''ennemi qui l''a semée, c''est le diable ; la moisson, c''est la fin du monde ; les moissonneurs, ce sont les anges. '
  '4':
  - type: note
    content: V. 18n  ; Mc 4.4n.
  - type: text
    content: 'Comme il semait, des grains tombèrent le long du chemin ; les oiseaux vinrent et les mangèrent. '
  '40':
  - type: note
    content: 3.10 ; Jn 15.6.
  - type: text
    content: 'Ainsi, tout comme on arrache la mauvaise herbe pour la jeter au feu, de même en sera-t-il à la fin du monde. '
  '41':
  - type: note
    content: anges 16.27 ; 24.31 ; 25.31ss. –  mal 7.23n.
  - type: text
    content: 'Le Fils de l''homme enverra ses anges, qui arracheront de son royaume toutes les causes de chute et ceux qui font le mal, '
  '42':
  - type: note
    content: 'la fournaise ardente  : litt. la fournaise du feu, de même v. 50 ; Dn 3.6. –  pleurs… 8.12+.'
  - type: text
    content: 'et '
  - type: text
    content: ils les jetteront dans la fournaise ardente ;
  - type: text
    content: ' c''est là qu''il y aura des pleurs et des grincements de dents. '
  '43':
  - type: note
    content: justes / soleil 17.2 ; Jg 5.31 ; 2S 23.3s ; Dn 12.3. –  Que celui… 11.15+.
  - type: text
    content: Alors les justes brilleront comme le soleil dans le royaume de leur Père. Que celui qui a des oreilles entende !
  - type: heading
    content: La parabole du trésor caché
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'trésor Pr 2.4. –  vendre tout 19.21,29 ; Lc 14.33 ; Ph 3.7s. – Cf. Evangile selon Thomas 109 : « Jésus a dit : “Le Royaume est semblable à un homme qui avait un trésor caché dans son champ, mais ne le savait pas. Après sa mort, il le laissa à son fils. Le fils ne savait rien du trésor ; il hérita le champ et le vendit. Celui qui l''avait acheté vint labourer et trouva le trésor. Il se mit à prêter de l''argent à intérêt à qui il voulut.” »'
  - type: text
    content: 'Voici à quoi le règne des cieux est semblable : un trésor caché dans un champ ; l''homme qui l''a trouvé le cache et, dans sa joie, il va vendre tout ce qu''il a pour acheter ce champ-là.'
  - type: heading
    content: La parabole de la perle
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'un marchand  : litt. un homme marchand ou un homme, un marchand.'
  - type: text
    content: 'Voici encore à quoi le règne des cieux est semblable : un marchand qui cherchait de belles perles. '
  '46':
  - type: note
    content: 'vendre  : le verbe grec employé ici n''est pas le même qu''au v. 44. –  Evangile selon Thomas 76 : « Jésus a dit : “Le Royaume du Père est semblable à un marchand qui avait un ballot et qui trouva une perle. Ce marchand était avisé. Il vendit le ballot et s''acheta la perle seule. Vous aussi cherchez le trésor incorruptible et durable, où la mite ne vient pas manger et où le ver ne détruit pas.” » Cf. 6.20.'
  - type: text
    content: Ayant trouvé une perle de grand prix, il est allé vendre tout ce qu'il avait pour l'acheter.
  - type: heading
    content: La parabole du filet
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Evangile selon Thomas 8 : « Et il a dit : “L''homme est semblable à un pêcheur avisé, qui jeta son filet à la mer et l''en retira plein de petits poissons ; parmi eux, le pêcheur avisé trouva un gros et beau poisson ; il rejeta tous les petits à la mer, et choisit le gros sans difficulté. Celui qui a des oreilles pour entendre, qu''il entende !” » –  rassemble ou ramasse, prend  ; le même verbe est traduit par recueillir au v. 30 ; cf. 4.19/ / ; 22.9s ; Ha 1.14s. –  des poissons  : sous-entendu dans le texte.'
  - type: text
    content: 'Voici encore à quoi le règne des cieux est semblable : un filet jeté dans la mer et qui rassemble des poissons de toute espèce. '
  '48':
  - type: note
    content: 'recueille v. 28n. –  bon v. 8n. –  récipients  : mot employé uniquement ici et en 25.4, qui désigne habituellement des vases de poterie. –  jette  : litt. jette dehors. –  mauvais  : autre traduction pourri 12.33n  ; voir aussi Lv 11.9-12.'
  - type: text
    content: 'Quand il est rempli, on le tire sur le rivage, puis on s''assied, on recueille ce qui est bon dans des récipients et on jette ce qui est mauvais. '
  '49':
  - type: note
    content: 'Cf. v. 39n  ; 3.12 ; 25.32 ; Ps 1.5. –  anges v. 41+. –  justes  : cf. v. 17,43 ; 5.45 ; 9.13 ; 23.28s ; 25.37,46.'
  - type: text
    content: 'Il en sera de même à la fin du monde. Les anges s''en iront séparer les mauvais du milieu des justes '
  '5':
  - type: note
    content: Cf. 15.13 ; Jn 15.6 ; Jc 1.11.
  - type: text
    content: 'D''autres tombèrent dans les endroits pierreux, où ils n''avaient pas beaucoup de terre : ils levèrent aussitôt, parce que la terre n''était pas profonde ; '
  '50':
  - type: note
    content: V. 42n.
  - type: text
    content: 'et '
  - type: text
    content: ils les jetteront dans la fournaise ardente ;
  - type: text
    content: ' c''est là qu''il y aura des pleurs et des grincements de dents.'
  - type: heading
    content: L'ancien et le nouveau
  '51':
  - type: text
    content: ' '
  - type: note
    content: V. 16,23.
  - type: text
    content: 'Avez-vous compris tout cela ? – Oui, répondirent-ils. '
  '52':
  - type: note
    content: 'scribe 23.34 ; Esd 7.6,10. –  instruit  : autre traduction devenu disciple. –  maître de maison 20.1 ; 21.33. –  trésor 12.35/ / ; 2Co 4.7. –  nouvelles / anciennes  : cf. 9.16s.'
  - type: text
    content: 'Il leur dit : C''est pourquoi tout scribe instruit du règne des cieux est semblable à un maître de maison qui tire de son trésor des choses nouvelles et des choses anciennes.'
  - type: heading
    content: Les gens de Nazareth ne croient pas en Jésus
  - type: heading
    content: Mc 6.1-6  ; Lc 4.16-24
  '53':
  - type: text
    content: ' '
  - type: note
    content: 7.28.
  - type: text
    content: 'Lorsque Jésus eut achevé ces paraboles, il partit de là. '
  '54':
  - type: note
    content: 'son pays ou sa région d''origine, c.-à-d. Nazareth 2.23 ; 4.13,23. –  ébahis 7.28+. –  miracles  : cf. 7.22n.'
  - type: text
    content: 'Il vint dans son pays et se mit à enseigner dans leur synagogue ; ébahis, les gens se demandaient : D''où lui viennent cette sagesse et ces miracles ? '
  '55':
  - type: note
    content: 'le fils du charpentier  : cf. Mc 6.3n. –  Marie (en grec Mariam, cf. Lc 1.27n), et ses fils… 12.46+/ / ; Jn 2.1,12 ; 6.42 ; 19.25 ; Ac 1.14 ; 12.17 ; Ga 1.19 ; Jd 1.'
  - type: text
    content: 'N''est-ce pas le fils du charpentier ? Sa mère ne s''appelle-t-elle pas Marie, et ses frères Jacques, Joseph, Simon et Judas ? '
  '56':
  - type: note
    content: Jn 7.15.
  - type: text
    content: 'Ses sœurs ne sont-elles pas toutes parmi nous ? D''où lui vient donc tout cela ? '
  '57':
  - type: note
    content: cause de chute 11.6n. –  prophète / pays Lc 4.24n  ; Jn 4.44.
  - type: text
    content: 'Il était pour eux une cause de chute. Mais Jésus leur dit : On ne refuse pas d''honorer un prophète, sinon dans son pays et dans sa maison. '
  '58':
  - type: note
    content: 'manque de foi  : litt. non-foi, cf. 17.17,20n  ; 23.23n  ; Rm 11.20 ; voir aussi 8.13+.'
  - type: text
    content: Et il ne fit pas, là, beaucoup de miracles, à cause de leur manque de foi.
  '6':
  - type: note
    content: Jb 31.40.
  - type: text
    content: 'mais quand le soleil se leva, ils furent brûlés et se desséchèrent, faute de racines. '
  '7':
  - type: text
    content: 'D''autres tombèrent parmi les épines : les épines montèrent et les étouffèrent. '
  '8':
  - type: note
    content: 'bonne  : le mot signifie parfois belle, cf. 12.33n  ; de même v. 23s,27,37s,45,48n.'
  - type: text
    content: 'D''autres tombèrent dans la bonne terre : ils finirent par donner du fruit, l''un cent, l''autre soixante, l''autre trente. '
  '9':
  - type: note
    content: 11.15+.
  - type: text
    content: Que celui qui a des oreilles entende !
  - type: heading
    content: Pourquoi Jésus parle en paraboles
  - type: heading
    content: Mc 4.10-12  ; Lc 8.9-10
