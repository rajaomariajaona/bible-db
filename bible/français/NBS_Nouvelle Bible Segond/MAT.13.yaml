          text: d'Hermas
      - type: text
        text: ', Sim. V,5,2s : « Le champ, c''est ce monde-ci, et le maître du champ, c''est celui qui a créé toutes choses, qui les a organisées et qui leur a donné la force. Le fils, c''est le Saint-Esprit (proposition absente de certains mss), et l''esclave, c''est le fils de Dieu ; les vignes, c''est le peuple qu''il a lui-même planté. Les pieux, ce sont les saints anges du Seigneur qui retiennent son peuple. Les herbes arrachées à la vigne sont les iniquités des serviteurs de Dieu… »'
    marker-yv: yv-n
  - type: text
    text: 'le champ, c''est le monde, la bonne semence, ce sont les fils du Royaume ; la mauvaise herbe, ce sont les fils du Mauvais ; '
