    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 4.3 ; Os 10.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du monde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
