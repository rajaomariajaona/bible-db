- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 36-43. '
    - type: usfm
