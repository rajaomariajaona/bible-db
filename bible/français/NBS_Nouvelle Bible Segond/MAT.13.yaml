      children:
      - type: text
        text: '96 : « Jésus a dit : “Le Royaume du Père est semblable à une femme. Elle prit un peu de levain, le cacha dans de la pâte et en fit de grands pains. Celui qui a des oreilles, qu''il entende !” »'
    marker-yv: yv-n
  - type: text
