      - type: text
        text: '109 : « Jésus a dit : “Le Royaume est semblable à un homme qui avait un trésor caché dans son champ, mais ne le savait pas. Après sa mort, il le laissa à son fils. Le fils ne savait rien du trésor ; il hérita le champ et le vendit. Celui qui l''avait acheté vint labourer et trouva le trésor. Il se mit à prêter de l''argent à intérêt à qui il voulut.” »'
    marker-yv: yv-n
  - type: text
    text: 'Voici à quoi le règne des cieux est semblable : un trésor caché dans un champ ; l''homme qui l''a trouvé le cache et, dans sa joie, il va vendre tout ce qu''il a pour acheter ce champ-là.'
