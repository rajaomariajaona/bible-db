  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 3ss. Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esdras
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.41 : « Lorsque le paysan sème en terre beaucoup de graines et plante un grand nombre de plantes, tout ce qui a été semé n''est pas sauvé, à la saison voulue, et tout ce qui a été planté ne prend pas racine : ainsi ceux qui ont été semés en ce monde ne seront pas tous sauvés. » 9.31-37 : « Voici, je sème ma loi en vous, elle portera du fruit en vous et vous en tirerez gloire à jamais (…). Nous qui avons reçu la loi, nous devons périr à cause de nos péchés ainsi que notre cœur où elle avait été déposée. La loi, elle, ne périt pas mais demeure dans sa gloire. »'
    marker-yv: yv-n
  - type: text
    text: 'Vous donc, entendez la parabole du semeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lorsque quelqu'un…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quiconque entend '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'écoute… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ensemencé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: semé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même aux v. 20,22s. – Cf. 1Co 2.14 ; 1P 5.8.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque quelqu''un entend la parole du Règne et ne la comprend pas, le Mauvais vient s''emparer de ce qui a été semé dans son cœur : c''est celui qui a été ensemencé le long du chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui qui a été ensemencé dans les endroits pierreux, c''est celui qui entend la Parole et la reçoit aussitôt avec joie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il ne tient qu''un temps '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il est éphémère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; terme apparenté au mot traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'temps '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 8.29+ ; également 2Co 4.18 ; Hé 11.25. – Cf. 7.26s ; Ga 1.6.
    marker-yv: yv-n
  - type: text
    text: 'mais il n''a pas de racine en lui-même, il ne tient qu''un temps ; sitôt que survient la détresse ou la persécution à cause de la Parole, c''est pour lui une cause de chute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
