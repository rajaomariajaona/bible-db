  - type: text
    text: 'Ce jour-là, Jésus sortit de la maison et s''assit au bord de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 2.13 ; 3.9 ; Lc 5.1-3.
    marker-yv: yv-n
  - type: text
    text: Il se rassembla auprès de lui de si grandes foules qu'il monta dans un bateau et s'y assit. Toute la foule se tenait sur le rivage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 10-13,34s/ /.
    marker-yv: yv-n
  - type: text
    text: 'Il leur parla longuement en paraboles ; il disait : Le semeur sortit pour semer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mc 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il semait, des grains tombèrent le long du chemin ; les oiseaux vinrent et les mangèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 15.13 ; Jn 15.6 ; Jc 1.11.
    marker-yv: yv-n
  - type: text
    text: 'D''autres tombèrent dans les endroits pierreux, où ils n''avaient pas beaucoup de terre : ils levèrent aussitôt, parce que la terre n''était pas profonde ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jb 31.40.
    marker-yv: yv-n
  - type: text
    text: 'mais quand le soleil se leva, ils furent brûlés et se desséchèrent, faute de racines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'D''autres tombèrent parmi les épines : les épines montèrent et les étouffèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bonne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot signifie parfois '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: belle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 12.33'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; de même v. 23s,27,37s,45,48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'D''autres tombèrent dans la bonne terre : ils finirent par donner du fruit, l''un cent, l''autre soixante, l''autre trente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 11.15+.
    marker-yv: yv-n
  - type: text
    text: Que celui qui a des oreilles entende !
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pourquoi Jésus parle en paraboles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mc 4.10-12  ; Lc 8.9-10
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 3+.
    marker-yv: yv-n
  - type: text
    text: 'Les disciples vinrent lui demander : Pourquoi leur parles-tu en paraboles ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.25 ; 1Co 2.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'règne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'royaume '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Parce que, s''il vous a été donné, à vous, de connaître les mystères du règne des cieux, à eux cela n''a pas été donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.29/ / ; Mc 4.25/ /.
    marker-yv: yv-n
  - type: text
    text: 'Car on donnera à celui qui a, et il sera dans l''abondance, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 29.3 ; Jr 5.21 ; Mc 8.18 ; Lc 19.42 ; Jn 9.39 ; 12.40 ; Ac 13.40s ; 28.26s ; 2Co 4.4.
    marker-yv: yv-n
  - type: text
    text: 'Voilà pourquoi je leur parle en paraboles, parce qu''en voyant ils ne voient pas, et qu''en entendant ils n''entendent ni ne comprennent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parole du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' Esaïe'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prophétie d'Esaïe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Voir '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Es 6.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jamais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rien, en aucun cas.
    marker-yv: yv-n
  - type: text
    text: 'Et pour eux s''accomplit cette parole du prophète Esaïe :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vous aurez beau entendre, vous ne comprendrez jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Vous aurez beau regarder, vous ne verrez jamais
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
