    marker-yv: yv-n
  - type: text
    text: 'Celui qui a été ensemencé parmi les épines, c''est celui qui entend la Parole, mais les inquiétudes du monde et l''attrait trompeur des richesses étouffent la Parole, et elle devient stérile. '
