document_id: AMO.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Quatrième vision : la corbeille de fruits'
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 24.1. –  fruits d'été (dernière saison du calendrier agricole ; cf. Jr 40.10,12 ; Mi 7.1) ; autre traduction fruits mûrs  ; le terme hébreu correspondant qayits fait assonance avec celui qui est traduit par fin ( qets ) au v. 2 (cf. Jr 1.11ns).
  - type: text
    content: 'Voici ce que me fit voir le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : une corbeille de fruits d''été. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'je couvrirai…  : litt. je ferai monter le sac sur tous les reins , en signe de deuil ou, plus généralement, de lamentation Gn 37.34 ; 1R 20.31 ; 21.27 ; 2R 6.30 ; Jr 4.8. –  je tondrai ou je rendrai chauves  ; la tonsure est aussi un signe de deuil ; cf. Es 3.24 ; 15.2 ; 22.12 ; Jr 7.29 ; 48.37 ; Ez 7.18 ; Mi 1.16 ; voir aussi Lv 19.27 ; 21.5 ; Dt 14.1. –  deuil… fils unique  : cf. 5.2+ ; Jr 6.26 ; Za 12.10.'
  - type: text
    content: Je changerai vos fêtes en deuil
  - type: text
    content: et tous vos chants en complainte ;
  - type: text
    content: je couvrirai tous les reins de sacs
  - type: text
    content: et je tondrai toutes les têtes ;
  - type: text
    content: je mettrai le pays dans le deuil
  - type: text
    content: comme pour un fils unique,
  - type: text
    content: et son avenir ne sera plus qu'un jour d'amertume.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Les jours viennent 4.2+. –  famine et faim traduisent le même mot hébreu ; cf. 4.6+ ; voir aussi Dt 8.2s ; Jn 4.13s. –  la faim et la soif  : sous-entendu dans le texte.'
  - type: text
    content: Les jours viennent
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  –'
  - type: text
    content: où j'enverrai une famine dans le pays ;
  - type: text
    content: non pas une faim de pain
  - type: text
    content: ni une soif d'eau,
  - type: text
    content: 'mais la faim et la soif d''entendre les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ils erreront ou ils se traîneront (4.8n  ; Dt 28.28s) alors d''une mer à l''autre  : de la mer Morte à la Méditerranée ; cf. Dt 30.11ss. –  à l''est  : certains modifient le texte hébreu traditionnel pour lire au sud , mais le sud est la direction du désert. –  en titubant…  : cf. Dn 12.4n. –  ne la trouveront pas Os 5.6 ; Ps 74.9 ; Pr 1.28 ; Ct 5.6 ; cf. Es 55.6.'
  - type: text
    content: Ils erreront alors d'une mer à l'autre,
  - type: text
    content: du nord à l'est ;
  - type: text
    content: 'ils rechercheront la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en titubant,'
  - type: text
    content: et ils ne la trouveront pas.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'jeunes filles (litt. vierges  ; cf. 5.2) / jeunes gens Za 9.17. –  s''évanouiront  : cf. Es 51.20 ; Jon 4.8.'
  - type: text
    content: En ce jour-là, les belles jeunes filles
  - type: text
    content: et les jeunes gens s'évanouiront de soif,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le sacrilège  : litt. la faute ; le tort  ; le mot hébreu correspondant rappelle le nom d''une divinité syrienne (Ashima, 2R 17.30) ; cf. Os 10.8 ; 2Ch 24.18 ; 33.22s ; l''expression désigne probablement les taurillons ou veaux associés au culte de YHWH à Beth-El et à Dan , tout au nord d''Israël (1R 12.28ss ; Os 8.5s). Certains modifient le texte hébreu traditionnel pour lire le poteau cultuel (ou l''ashéra , Jg 3.7n  ; voir 1R 16.33). –  rite  : litt. chemin  ; certains modifient le texte hébreu traditionnel pour lire ton bien-aimé , désignation de la divinité. –  Bersabée 5.5+. –  ils tomberont… 5.2.'
  - type: text
    content: eux qui jurent par le sacrilège de Samarie,
  - type: text
    content: 'et qui disent : « Par la vie de ton dieu, Dan ! »'
  - type: text
    content: « Par la vie du rite de Bersabée ! »
  - type: text
    content: Mais ils tomberont et ne se relèveront plus.
  '2':
  - type: note
    content: 'Cf. 7.8+. –  La fin a mûri (v. 1n) : litt. la fin vient  ; cf. Ez 7.2s ; Mt 24.14 ; voir aussi Ap 14.15,18.'
  - type: text
    content: 'Il dit : Que vois-tu, Amos ? Je répondis : Une corbeille de fruits d''été. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit :'
  - type: text
    content: La fin a mûri pour Israël, mon peuple ;
  - type: text
    content: je ne lui passerai plus rien.
  '3':
  - type: text
    content: ' '
  - type: note
    content: du palais ou peut-être du temple  ; cf. 3.14n. –  On jettera ou il (Dieu) jettera  ; traduction incertaine ; cf. 6.10+.
  - type: text
    content: En ce jour-là, les chants du palais seront des gémissements
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: text
    content: On jettera partout une multitude de cadavres. Silence !
  - type: heading
    content: L'avidité des marchands
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez 3.1+. –  qui harcelez 2.7n. –  pauvre 2.6+. –  supprimez  : litt. qui faites cesser , verbe apparenté au mot sabbat (v. 5) ; certains comprennent qui réduisez au chômage.'
  - type: text
    content: Ecoutez, vous qui harcelez le pauvre
  - type: text
    content: et qui supprimez les déshérités du pays !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'la nouvelle lune  : jour de fête (Nb 28.9,11ss ; 1S 20.5,24 ; 2R 4.23 ; Es 1.13s ; Os 2.13 ; voir calendrier) où le commerce devait être interrompu, comme pour le sabbat  ; cf. Lv 23.24s ; Né 10.32 ; 13.15ss. –  les sacs de blé  : litt. le blé . –  l''épha , mesure de capacité pour les solides ; cf. Gn 18.6 ; Ex 16.36. –  le prix  : litt. le sicle ( shèqèl ), unité de poids (2R 7.1) qui servait à peser la monnaie ; autrement dit, on gagnera plus en vendant moins ; cf. Lv 19.35 ; Dt 25.13ss ; Ez 45.10 ; Os 12.8 ; Mi 6.10s ; Pr 11.1 ; 20.10,23 ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Vous dites : Quand la nouvelle lune sera-t-elle passée,'
  - type: text
    content: que nous vendions le grain ?
  - type: text
    content: Quand le sabbat finira-t-il,
  - type: text
    content: que nous ouvrions les sacs de blé ?
  - type: text
    content: Nous diminuerons l'épha,
  - type: text
    content: nous augmenterons le prix,
  - type: text
    content: nous fausserons les balances pour tromper ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.6+ss.
  - type: text
    content: nous achèterons les petites gens pour de l'argent,
  - type: text
    content: le pauvre pour une paire de sandales,
  - type: text
    content: et nous vendrons même le déchet du blé.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'juré par l''orgueil de Jacob  : cf. 4.2+ ; 6.8 ; voir aussi Gn 49.24 ; 1S 15.29 ; Mi 2.3 ; Ps 47.5. –  je n''oublierai jamais Os 7.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a juré par l''orgueil de Jacob :'
  - type: text
    content: je n'oublierai jamais aucune de leurs œuvres.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'La terre (ou le pays ) ne tremblera-t-elle pas  : cf. 1.1+ ; 9.1 ; voir aussi Es 2.10 ; Jr 4.24 ; Os 4.3. –  comme le Nil , d''après quelques mss hébreux et des versions anciennes ; litt. comme le fleuve (= le Nil d''Egypte , ou fleuve d''Egypte ), de même en 9.5 ; le texte évoque les crues et les décrues du Nil. Le texte hébreu traditionnel porte comme la lumière (une lettre de différence en hébreu).'
  - type: text
    content: La terre ne tremblera-t-elle pas à cause de cela ?
  - type: text
    content: Tous ses habitants ne prendront-ils pas le deuil ?
  - type: text
    content: Elle montera tout entière comme le Nil,
  - type: text
    content: elle se soulèvera et s'affaissera
  - type: text
    content: comme le Nil d'Egypte.
  - type: heading
    content: Le jour du Seigneur sera un jour de deuil
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 2.16+. –  je ferai…  : cf. 5.18+ ; Jr 4.23 ; 15.9 ; Ez 13.10 ; 32.7s ; Jl 2.2,10s ; 3.3s ; 4.15s ; Mi 3.6 ; Ha 3.6 ; So 1.15 ; Mc 15.33/ / ; Ap 6.12ss ; 8.12. –  en plein jour  : litt. dans un jour de lumière.'
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  –'
  - type: text
    content: je ferai coucher le soleil à midi
  - type: text
    content: et j'obscurcirai la terre en plein jour.
