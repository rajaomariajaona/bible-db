      - type: text
        text: '35.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joïaqim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
