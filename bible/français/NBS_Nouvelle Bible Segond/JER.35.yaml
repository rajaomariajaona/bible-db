document_id: JER.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'exemple des Rékabites
  - type: text
    content: ' '
  - type: note
    content: Joïaqim 1.3n  ; 25.1.
  - type: text
    content: 'Parole qui parvint à Jérémie, de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', aux jours de Joïaqim, fils de Josias, roi de Juda : '
  '10':
  - type: note
    content: nous obéissons v. 8n.
  - type: text
    content: 'nous habitons sous des tentes, nous obéissons à Jonadab, notre père, en faisant exactement ce qu''il nous a ordonné. '
  '11':
  - type: note
    content: 'fuyons  : litt. de devant. –  Chaldéens 21.4n. –  d''Aram (ou de Syrie) : il s''agit sans doute de troupes syriennes associées aux forces babyloniennes ; cf. 2R 24.2 ; LXX a lu d''Assyrie, Syr d''Edom.'
  - type: text
    content: 'Lorsque Nabuchodonosor, roi de Babylone, a envahi ce pays, nous avons dit : Allons, rendons-nous à Jérusalem, fuyons l''armée des Chaldéens et l''armée d''Aram ! C''est ainsi que nous habitons à Jérusalem.'
  '12':
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie : '
  '13':
  - type: note
    content: l'instruction 5.3+. –  N'écouterez-vous pas v. 8n  ; 7.26n.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Va, tu diras aux hommes de Juda et aux habitants de Jérusalem : Ne recevrez-vous pas l''instruction ? N''écouterez-vous pas mes paroles ? – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: On respecte ou on exécute, on réalise  ; litt. on maintient. –  obéi et écouté traduisent un même verbe hébreu ; cf. v. 8n. –  inlassablement 7.13n.
  - type: text
    content: 'On respecte les paroles de Jonadab, fils de Rékab, qui a ordonné à ses fils de ne pas boire de vin : ils n''en boivent pas, jusqu''à ce jour ; ils ont obéi au commandement de leur père. Et moi, je vous ai parlé et reparlé, inlassablement, et vous ne m''avez pas écouté. '
  '15':
  - type: note
    content: '7.25s. –  revienne… 18.11+. –  ne suivez pas… 7.6+. –  la terre  : cf. v. 7 ; Gn 2.5n. –  pas écouté 7.26+ ; 25.4n.'
  - type: text
    content: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés, inlassablement, pour vous dire : « Que chacun de vous revienne, je vous prie, de sa voie mauvaise ; réformez vos agissements, ne suivez pas d''autres dieux pour les servir, et vous resterez sur la terre que je vous ai donnée, à vous et à vos pères. » Mais vous n''avez pas tendu l''oreille, vous ne m''avez pas écouté. '
  '16':
  - type: text
    content: 'Les fils de Jonadab, fils de Rékab, eux, respectent le commandement que leur a donné leur père, et ce peuple ne m''écoute pas ! '
  '17':
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées, le Dieu d''Israël : Je fais venir sur Juda et sur tous les habitants de Jérusalem tout le malheur que j''ai annoncé contre eux, parce que je leur ai parlé et qu''ils n''ont pas écouté, parce que je les ai appelés et qu''ils n''ont pas répondu.'
  '18':
  - type: text
    content: 'Et Jérémie dit à la maison des Rékabites : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Puisque vous avez obéi au commandement de Jonadab, votre père, puisque vous avez observé tous ses commandements et fait exactement ce qu''il vous a ordonné, '
  '19':
  - type: note
    content: 'des descendants  : autre traduction des successeurs  ; litt. il ne sera pas retranché à Jonadab fils de Rékab d''homme se tenant devant moi tous les jours  ; formule analogue en 33.17ns ; 1R 2.4n. –  se tiendront devant moi  : autre traduction qui seront à mon service  ; cf. 7.10+ ; 15.19.'
  - type: text
    content: 'à cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Jonadab, fils de Rékab, aura toujours des descendants qui se tiendront devant moi.'
  '2':
  - type: note
    content: 'Rékabites  : sur cette communauté nomade ou semi-nomade à la tradition très stricte (v. 6-8), cf. 2R 10.15-23 ; Né 3.14 ; 1Ch 2.55.'
  - type: text
    content: 'Va à la maison des Rékabites et parle-leur ; tu les conduiras à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans une des salles, et tu leur offriras du vin. '
  '3':
  - type: text
    content: 'Je pris Yaazania, fils de Jérémie, fils de Habatsinia, ses frères, tous ses fils et toute la maison des Rékabites, '
  '4':
  - type: note
    content: 'des fils de Hanân ou, d''après un ms hébreu et certaines versions anciennes, du fils de Yohanân. –  Yigdalia  : hébreu Yigdalyahou. –  l''homme de Dieu 2R 1.9n. –  salle de Maaséya (hébreu Ma‘aséyahou) ou office de Maaséya. –  gardien du seuil 52.24 ; 2R 12.10n.'
  - type: text
    content: 'et je les conduisis à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans la salle des fils de Hanân, fils de Yigdalia, l''homme de Dieu, près de la salle des princes, au-dessus de la salle de Maaséya, fils de Shalloum, gardien du seuil. '
  '5':
  - type: note
    content: 'les gens  : litt. les fils.'
  - type: text
    content: 'Je mis devant les gens de la maison des Rékabites des vases pleins de vin et des coupes, et je leur dis : Buvez du vin ! '
  '6':
  - type: note
    content: 'pas de vin  : la vigne est souvent l''emblème de la vie sédentaire ; cf. v. 7 ; voir aussi Nb 6.3s. –  Jonadab, fils de Rékab 2R 10.15ss.'
  - type: text
    content: 'Mais ils répondirent : Nous ne boirons pas de vin, car Jonadab, fils de Rékab, notre père, nous a donné cet ordre : « Vous ne boirez jamais de vin, ni vous, ni vos fils, '
  '7':
  - type: note
    content: 'sur la terre  : litt. sur la face du sol, cf. Gn 2.5n. –  séjournez en immigrés  : cf. Ex 12.48n  ; voir aussi Hé 11.13 ; 1P 2.11.'
  - type: text
    content: 'vous ne bâtirez pas de maisons, vous ne sèmerez aucune semence, vous ne planterez pas de vignes et vous n''en posséderez pas ; mais vous habiterez sous des tentes toute votre vie, pour que vous viviez longtemps sur la terre où vous séjournez en immigrés. » '
  '8':
  - type: note
    content: 'Nous obéissons…  : litt. nous avons écouté la voix de Jonadab… quant à tout ce qu''il nous a ordonné  ; cf. v. 10,13ss.'
  - type: text
    content: 'Nous obéissons à tout ce que nous a ordonné Jonadab, fils de Rékab, notre père : nous ne buvons pas de vin pendant tous nos jours, nous, nos femmes, nos fils et nos filles ; '
  '9':
  - type: text
    content: 'nous ne bâtissons pas de maisons pour y habiter, nous ne possédons ni vignes, ni champs, ni terres ensemencées ; '
