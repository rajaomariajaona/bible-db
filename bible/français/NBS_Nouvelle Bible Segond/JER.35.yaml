    marker-yv: yv-n
  - type: text
    text: 'Parole qui parvint à Jérémie, de la part du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', aux jours de Joïaqim, fils de Josias, roi de Juda : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rékabites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur cette communauté nomade ou semi-nomade à la tradition très stricte (v. 6-8), cf. 2R 10.15-23 ; Né 3.14 ; 1Ch 2.55.'
    marker-yv: yv-n
  - type: text
    text: 'Va à la maison des Rékabites et parle-leur ; tu les conduiras à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dans une des salles, et tu leur offriras du vin. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je pris Yaazania, fils de Jérémie, fils de Habatsinia, ses frères, tous ses fils et toute la maison des Rékabites, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des fils de Hanân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, d''après un ms hébreu et certaines versions anciennes, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du fils de Yohanân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yigdalia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yigdalyahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''homme de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2R 1.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'salle de Maaséya '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ma‘aséyahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: office de Maaséya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gardien du seuil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 52.24 ; 2R 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et je les conduisis à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dans la salle des fils de Hanân, fils de Yigdalia, l''homme de Dieu, près de la salle des princes, au-dessus de la salle de Maaséya, fils de Shalloum, gardien du seuil. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je mis devant les gens de la maison des Rékabites des vases pleins de vin et des coupes, et je leur dis : Buvez du vin ! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas de vin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la vigne est souvent l''emblème de la vie sédentaire ; cf. v. 7 ; voir aussi Nb 6.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jonadab, fils de Rékab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2R 10.15ss.
    marker-yv: yv-n
  - type: text
    text: 'Mais ils répondirent : Nous ne boirons pas de vin, car Jonadab, fils de Rékab, notre père, nous a donné cet ordre : « Vous ne boirez jamais de vin, ni vous, ni vos fils, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la face du sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: séjournez en immigrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 12.48'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Hé 11.13 ; 1P 2.11.'
    marker-yv: yv-n
  - type: text
    text: 'vous ne bâtirez pas de maisons, vous ne sèmerez aucune semence, vous ne planterez pas de vignes et vous n''en posséderez pas ; mais vous habiterez sous des tentes toute votre vie, pour que vous viviez longtemps sur la terre où vous séjournez en immigrés. » '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nous obéissons…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous avons écouté la voix de Jonadab… quant à tout ce qu'il nous a ordonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10,13ss.'
    marker-yv: yv-n
  - type: text
    text: 'Nous obéissons à tout ce que nous a ordonné Jonadab, fils de Rékab, notre père : nous ne buvons pas de vin pendant tous nos jours, nous, nos femmes, nos fils et nos filles ; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nous ne bâtissons pas de maisons pour y habiter, nous ne possédons ni vignes, ni champs, ni terres ensemencées ; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nous obéissons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'nous habitons sous des tentes, nous obéissons à Jonadab, notre père, en faisant exactement ce qu''il nous a ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fuyons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de devant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chaldéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''Aram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Syrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : il s''agit sans doute de troupes syriennes associées aux forces babyloniennes ; cf. 2R 24.2 ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'Assyrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'Edom.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Nabuchodonosor, roi de Babylone, a envahi ce pays, nous avons dit : Allons, rendons-nous à Jérusalem, fuyons l''armée des Chaldéens et l''armée d''Aram ! C''est ainsi que nous habitons à Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parvint à Jérémie : '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''instruction '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'N''écouterez-vous pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Va, tu diras aux hommes de Juda et aux habitants de Jérusalem : Ne recevrez-vous pas l''instruction ? N''écouterez-vous pas mes paroles ? – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On respecte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on exécute, on réalise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on maintient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'obéi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'écouté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: traduisent un même verbe hébreu ; cf. v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inlassablement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On respecte les paroles de Jonadab, fils de Rékab, qui a ordonné à ses fils de ne pas boire de vin : ils n''en boivent pas, jusqu''à ce jour ; ils ont obéi au commandement de leur père. Et moi, je vous ai parlé et reparlé, inlassablement, et vous ne m''avez pas écouté. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.25s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'revienne… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne suivez pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 7 ; Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas écouté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.26+ ; 25.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés, inlassablement, pour vous dire : « Que chacun de vous revienne, je vous prie, de sa voie mauvaise ; réformez vos agissements, ne suivez pas d''autres dieux pour les servir, et vous resterez sur la terre que je vous ai donnée, à vous et à vos pères. » Mais vous n''avez pas tendu l''oreille, vous ne m''avez pas écouté. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les fils de Jonadab, fils de Rékab, eux, respectent le commandement que leur a donné leur père, et ce peuple ne m''écoute pas ! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A cause de cela, ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu des Armées, le Dieu d''Israël : Je fais venir sur Juda et sur tous les habitants de Jérusalem tout le malheur que j''ai annoncé contre eux, parce que je leur ai parlé et qu''ils n''ont pas écouté, parce que je les ai appelés et qu''ils n''ont pas répondu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et Jérémie dit à la maison des Rékabites : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Puisque vous avez obéi au commandement de Jonadab, votre père, puisque vous avez observé tous ses commandements et fait exactement ce qu''il vous a ordonné, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des descendants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des successeurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne sera pas retranché à Jonadab fils de Rékab d'homme se tenant devant moi tous les jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; formule analogue en 33.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
