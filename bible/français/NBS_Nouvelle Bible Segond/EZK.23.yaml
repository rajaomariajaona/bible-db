document_id: EZK.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Samarie s'est prostituée
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'un exemple  : litt. un nom  ; LXX a lu une fable, comme en 1R 9.7.'
  - type: text
    content: Ce sont eux qui ont exposé sa nudité ; ils ont pris ses fils et ses filles, et elle, ils l'ont tuée par l'épée ; elle a été un exemple pour les femmes ; ils ont exécuté leurs jugements contre elle.
  - type: heading
    content: Jérusalem s'est prostituée
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 4n  ; cf. chap. 16. –  elle a été plus déréglée…  : litt. elle a perverti sa passion plus qu''elle (16.47).'
  - type: text
    content: 'Sa sœur Oholiba a vu cela, et elle a été plus déréglée qu''elle dans sa passion ; sa prostitution a dépassé la prostitution de sa sœur. '
  '12':
  - type: note
    content: 'Cf. 38.4. –  Assyriens  : cf. 16.28 ; 2R 16.7-18. –  montés sur des chevaux v. 6n  ; Jr 6.22s.'
  - type: text
    content: 'Elle s''est prise de passion pour les Assyriens, gouverneurs et magistrats, ses voisins vêtus à la perfection, des cavaliers, montés sur des chevaux, tous jeunes et charmants. '
  '13':
  - type: text
    content: 'J''ai vu qu''elle s''était rendue impure, que l''une et l''autre avaient suivi la même voie. '
  '14':
  - type: note
    content: 'Cf. 8.10. –  Elle a même ajouté…  : on peut comprendre elle est allée plus loin dans sa propre prostitution, ou bien elle s''est prostituée davantage encore que sa sœur (cf. v. 11).'
  - type: text
    content: 'Elle a même ajouté à sa prostitution. Elle a vu des hommes sculptés sur le mur, des images de Chaldéens sculptées, de couleur rouge, '
  '15':
  - type: note
    content: 'turban luxueux  : traduction incertaine. –  Babyloniens  : litt. fils de Babylone, de même aux v. 17,23. –  leur pays d''origine  : cf. 16.3n  ; Jr 22.10n.'
  - type: text
    content: 'avec une ceinture autour des reins, avec un turban luxueux sur la tête, ayant tous l''aspect de chefs et ressemblant à des Babyloniens, des Chaldéens d''après leur pays d''origine. '
  '16':
  - type: note
    content: 'au premier regard  : litt. à la vision (le mot correspondant est traduit par aspect au v. 15, cf. 1.1n) de ses yeux. –  envoyé v. 40 ; cf. 16.29,33s ; 2R 20.12-19 ; Es 39 ; 57.9.'
  - type: text
    content: 'Elle s''est prise de passion pour eux, au premier regard, et elle leur a envoyé des messagers en Chaldée. '
  '17':
  - type: note
    content: 'partager  : sous-entendu dans le texte (litt. pour la couche). –  l''ont souillée et s''est rendue impure traduisent deux formes du même verbe hébreu ; voir pur. –  prostitution  : cf. v. 8n. –  s''en est détachée Jr 6.8n (même verbe au v. 18).'
  - type: text
    content: 'Les Babyloniens sont venus chez elle pour partager le lit des amours, et ils l''ont souillée par leur prostitution. Elle s''est rendue impure avec eux, puis elle s''en est détachée. '
  '18':
  - type: text
    content: 'Elle a exposé sa prostitution, elle a exposé sa nudité ; et je me suis détaché d''elle, comme je m''étais détaché de sa sœur. '
  '19':
  - type: note
    content: V. 3+.
  - type: text
    content: 'Elle a multiplié sa prostitution pour se rappeler les jours de sa jeunesse, lorsqu''elle se prostituait en Egypte. '
  '2':
  - type: text
    content: 'Humain, il y avait deux femmes, filles d''une même mère. '
  '20':
  - type: note
    content: 'impudiques  : le terme hébreu signifie habituellement concubine(s). –  au membre d''âne  : litt. chair d''ânes leur chair  ; cf. 16.26n. –  qui éjaculent…  : autres traductions et au sperme de cheval ; et au sexe de cheval  ; cf. Jr 2.24 ; 5.8.'
  - type: text
    content: 'Elle s''est prise de passion pour des impudiques au membre d''âne, qui éjaculent comme des chevaux. '
  '21':
  - type: note
    content: 'Tu es revenue à  : le verbe correspondant est parfois traduit par visiter, inspecter, passer en revue. –  des Egyptiens…  : autre traduction depuis l''Egypte, on caressait (cf. v. 8). –  caressaient  : litt. faisaient  ; c''est le même verbe, à une autre forme, qui a été traduit par caresser aux v. 3,8. –  attirés par  : litt. à cause de  ; d''après Syr et Vg, certains modifient le texte hébreu traditionnel de façon à lire pour presser tes jeunes seins (cf. v. 3).'
  - type: text
    content: Tu es revenue à l'infamie de ta jeunesse, lorsque des Egyptiens caressaient ta poitrine, attirés par tes jeunes seins.
  - type: heading
    content: Jérusalem sera châtiée
  '22':
  - type: text
    content: ' '
  - type: note
    content: V. 28 ; 16.37.
  - type: text
    content: 'A cause de cela, Oholiba, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : J''éveille contre toi tes amants, ceux dont tu t''es détachée, et je les amènerai de toutes parts contre toi. '
  '23':
  - type: note
    content: 'Chaldéens v. 15 ; 11.24n  ; 16.29. –  Peqod (cf. Jr 50.21n), Shoa et Qoa  : sans doute des populations de Mésopotamie intégrées à l''empire néo-babylonien ; Vg a interprété ces noms  : nobles, tyrans et princes. –  Assyriens… v. 12. –  illustres  : litt. appelés ou proclamés (cf. convoqués en Nb 1.16).'
  - type: text
    content: 'Les Babyloniens et tous les Chaldéens, Peqod, Shoa et Qoa, et tous les Assyriens avec eux, jeunes et charmants, tous gouverneurs et magistrats, officiers illustres, tous montés sur des chevaux. '
  '24':
  - type: note
    content: 'des armes  : traduction conjecturale ; LXX du nord. –  lois  : le mot correspondant est souvent traduit par droit  ; le sens pourrait être ils te feront ce que bon leur semblera.'
  - type: text
    content: 'Ils viendront contre toi avec des armes, des chars et des roues, et une assemblée de peuples ; ils t''opposeront de toutes parts le grand bouclier et le petit bouclier, ainsi que le casque ; je leur ai remis le jugement, et ils te jugeront selon leurs lois. '
  '25':
  - type: note
    content: ta progéniture ou ce qui restera de toi  ; cf. Am 4.2n  ; 9.1.
  - type: text
    content: 'Je répandrai sur toi la jalousie de ma passion : ils te traiteront avec fureur. Ils t''arracheront le nez et les oreilles, et ta progéniture tombera par l''épée ; ce sont eux qui prendront tes fils et tes filles, et ta progéniture sera dévorée par le feu. '
  '26':
  - type: note
    content: 16.39.
  - type: text
    content: 'Ils te dépouilleront de tes vêtements et ils prendront les bijoux de ta parure. '
  '27':
  - type: note
    content: 'V. 3+. –  qui durent  : sous-entendu dans le texte.'
  - type: text
    content: Je ferai cesser tes infamies et ta prostitution, qui durent depuis l'Egypte ; tu ne lèveras plus les yeux vers eux, tu ne te souviendras plus de l'Egypte.
  '28':
  - type: text
    content: ' '
  - type: note
    content: V. 9,22.
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je te livre à ceux que tu détestes, à ceux dont tu t''es détachée. '
  '29':
  - type: note
    content: 'tout le produit…  : litt. toute ta fatigue, c.-à-d. tout ce pour quoi tu t''es fatiguée. –  la nudité ou l''impudeur  ; cf. v. 10,18 ; 16.36s. –  débauche et prostitution traduisent ici deux termes apparentés et synonymes. –  de ton infamie…  : certains rattachent la fin du v. à la suite et traduisent  : ton infamie et ta prostitution (30) seront la cause de ton sort.'
  - type: text
    content: 'Ils te traiteront comme ils te détestent ; ils prendront tout le produit de ton travail et te laisseront nue, entièrement nue ; on exposera la nudité de ta débauche, de ton infamie et de ta prostitution. '
  '3':
  - type: note
    content: prostituées 6.9+. –  en Egypte v. 8,19,21 ; 20.7+,8.
  - type: text
    content: 'Elles se sont prostituées en Egypte, elles se sont prostituées dans leur jeunesse ; là-bas on a pressé leurs seins, là on a caressé leur poitrine virginale. '
  '30':
  - type: note
    content: 6.9.
  - type: text
    content: 'On te traitera ainsi parce que tu t''es prostituée avec les nations, parce que tu t''es rendue impure avec leurs idoles. '
  '31':
  - type: text
    content: 'Tu as suivi la voie de ta sœur, et je mets sa coupe dans ta main. '
  '32':
  - type: note
    content: 'la coupe  : cf. Es 51.17,22 ; Jr 25.15-17,28 ; 49.12 ; Ha 2.15s ; Ps 11.6 ; 75.9 ; Ap 16.1.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Tu boiras la coupe de ta sœur,
  - type: text
    content: la coupe large et profonde
  - type: text
    content: – elle sera cause de rire
  - type: text
    content: et de moquerie –
  - type: text
    content: elle contient beaucoup.
  '33':
  - type: text
    content: ' '
  - type: note
    content: atterrement et dévastation correspondent à deux termes hébreux apparentés et souvent synonymes. –  Samarie v. 4n.
  - type: text
    content: 'Tu seras remplie d''ivresse et de tourments :'
  - type: text
    content: c'est la coupe d'atterrement et de dévastation,
  - type: text
    content: la coupe de ta sœur Samarie.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'tu la briseras…  : litt. tu en rongeras (cf. So 3.3n) les tessons  ; il faut peut-être comprendre  : tu la boiras jusqu''à la lie et tu la briseras (comme en Nb 24.8) de tes dents pour te déchirer les seins avec ses tessons.'
  - type: text
    content: Tu la boiras, tu la videras,
  - type: text
    content: tu la briseras en morceaux,
  - type: text
    content: 'et tu te déchireras les seins :'
  - type: text
    content: moi j'ai parlé
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '35':
  - type: text
    content: ' '
  - type: note
    content: sois aussi chargée… v. 49 ; 4.4n  ; 16.58.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que tu m''as oublié, parce que tu m''as rejeté derrière ton dos, sois aussi chargée de ton infamie et de ta prostitution.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 20.4+. –  Fais… la description ou dis, annonce , comme en Es 58.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Humain, jugeras-tu Ohola et Oholiba ? Fais-leur la description de leurs abominations, '
  '37':
  - type: note
    content: 'adultère 16.32. –  sang v. 49. –  fait passer…  : cf. 16.20-21n.'
  - type: text
    content: 'car elles se sont livrées à l''adultère, et il y a du sang sur leurs mains : elles ont commis l''adultère avec leurs idoles ; de plus, leurs fils qu''elles m''avaient donnés, elles les leur ont fait passer pour qu''ils les dévorent. '
  '38':
  - type: note
    content: 'sanctuaire / sabbats 22.8. –  impur  : voir pur. –  le même jour  : cette précision est absente de LXX et de certains mss latins ; de même au v. 39.'
  - type: text
    content: 'Voici encore ce qu''elles m''ont fait : elles ont rendu mon sanctuaire impur, le même jour, et elles ont profané mes sabbats. '
  '39':
  - type: note
    content: Cf. Ps 106.37. –  pour le profaner 44.7.
  - type: text
    content: 'Tout en immolant leurs fils à leurs idoles, elles sont allées le même jour dans mon sanctuaire pour le profaner. C''est là ce qu''elles ont fait au beau milieu de ma maison. '
  '4':
  - type: note
    content: 'Le nom de…  : litt. et leurs noms, Ohola (« Sa tente ») la grande et Oholiba (« Ma tente est en elle ») sa sœur  ; ces noms sont peut-être à comprendre comme des allusions aux sanctuaires respectifs de Samarie et de Jérusalem. –  à moi Jr 2.2 ; Os 1–3 ; cf. Lv 18.18.'
  - type: text
    content: Le nom de l'aînée était Ohola, et celui de sa sœur, Oholiba. Elles étaient à moi, et elles ont mis au monde des fils et des filles. Quant à leurs noms, Ohola, c'est Samarie ; Oholiba, c'est Jérusalem.
  '40':
  - type: note
    content: V. 16.
  - type: text
    content: 'Elles ont même envoyé chercher des hommes venant de loin ; elles leur ont envoyé des messagers, et ils sont venus. Pour eux tu t''es lavée, tu as mis du fard à tes yeux, tu t''es parée de tes ornements ; '
  '41':
  - type: note
    content: mon encens… 16.18+.
  - type: text
    content: 'tu t''es assise sur un lit d''apparat, devant lequel une table était dressée, et tu y avais placé mon encens et mon huile, '
  '42':
  - type: note
    content: 'Texte obscur et traduction conjecturale, de même au v. 43. –  au bruit d''une multitude insouciante  : autres traductions au milieu d''un tumulte insouciant ; et une abondance insouciante  ; sur le terme correspondant, voir 7.11n. –  des Sabéens  : autre traduction des ivrognes. –  des bracelets…  : cf. 16.11s.'
  - type: text
    content: au bruit d'une multitude insouciante ; et parmi des hommes de tout le genre humain on a fait venir du désert des Sabéens, qui ont mis des bracelets aux mains des deux sœurs et une couronne de splendeur sur leur tête.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Texte très incertain que beaucoup renoncent à traduire.
  - type: text
    content: 'Je dis alors à celle qui s''est usée dans l''adultère : maintenant on se livre à sa prostitution, et elle… '
  '44':
  - type: note
    content: 'dépravées  : litt. d''infamie, comme aux v. 21,27,29,35,48s.'
  - type: text
    content: 'Et on est allé avec elle comme on va avec une prostituée ; c''est ainsi qu''on est allé avec Ohola et Oholiba, ces femmes dépravées. '
  '45':
  - type: note
    content: V. 37 ; 16.38 ; cf. Ps 1.5. – Voir justice.
  - type: text
    content: 'Mais des hommes justes les jugeront comme on juge les femmes adultères, comme on juge celles qui répandent du sang ; car elles sont adultères, et il y a du sang sur leurs mains. '
  '46':
  - type: note
    content: 16.40s. –  pillage 7.21.
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Qu''une assemblée monte à l''assaut contre elles, et je les livrerai à la terreur et au pillage. '
  '47':
  - type: note
    content: 'les lapidera  : cf. Lv 20.10 ; Dt 22.21-24 ; Jn 8.5. –  les abattra ou les taillera, cf. 21.24n  ; Gn 1.1n. –  fils / filles 24.21.'
  - type: text
    content: 'Cette assemblée les lapidera et les abattra à coups d''épée ; on tuera leurs fils et leurs filles, on mettra le feu à leurs maisons. '
  '48':
  - type: note
    content: 'toutes les femmes…  : cf. v. 10.'
  - type: text
    content: 'Je ferai cesser ainsi l''infamie dans le pays ; toutes les femmes en recevront instruction, elles ne commettront plus une infamie comme la vôtre. '
  '49':
  - type: note
    content: 'vous serez chargés… v. 35 ; 4.4n. –  vos péchés d''idolâtrie  : litt. les péchés de vos idoles.'
  - type: text
    content: 'On fera retomber sur vous votre infamie, vous serez chargés de vos péchés d''idolâtrie, et ainsi vous saurez que je suis le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH).'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'alors même qu''elle était à moi  : litt. sous moi ou à ma place , ce qui signifie peut-être alors qu''elle était sous mon autorité , ou bien au lieu de me rester fidèle (16.32n). –  ses voisins  : autre traduction des guerriers , même possibilité au v. 12.'
  - type: text
    content: 'Ohola s''est prostituée alors même qu''elle était à moi. Elle s''est prise de passion pour ses amants, les Assyriens, ses voisins, '
  '6':
  - type: note
    content: 'pourpre violette  : cf. v. 12 ; Ex 25.4n  ; Jr 10.9 ; Est 1.6n. –  des cavaliers…  : autre traduction des conducteurs de chars tirés par des chevaux.'
  - type: text
    content: 'vêtus de pourpre violette, gouverneurs et magistrats, tous jeunes et charmants, des cavaliers, montés sur des chevaux. '
  '7':
  - type: note
    content: 'Assyriens  : litt. fils de l''Assyrie, de même aux v. 9,12,23.'
  - type: text
    content: 'C''est à eux qu''elle a prodigué sa prostitution, à toute l''élite des Assyriens ; elle s''est rendue impure avec tous ceux pour lesquels elle s''était prise de passion, avec toutes leurs idoles. '
  '8':
  - type: note
    content: 'depuis l''Egypte  : autre traduction avec des Egyptiens  ; cf. v. 3,21,27. –  leur prostitution  : peut-être ici au sens de débauche, souillure  ; cf. v. 17.'
  - type: text
    content: 'Elle n''a pas abandonné sa prostitution depuis l''Egypte ; car ceux-là avaient couché avec elle dans sa jeunesse, ils avaient caressé sa poitrine virginale et ils avaient répandu sur elle leur prostitution. '
  '9':
  - type: note
    content: V. 22,28s ; 16.37,39 ; cf. 2R 17.6,23 ; Os 2.5.
  - type: text
    content: 'C''est pourquoi je l''ai livrée à ses amants, aux Assyriens, pour lesquels elle s''était prise de passion. '
