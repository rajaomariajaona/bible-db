document_id: GEN.45,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph se fait reconnaître
  - type: text
    content: ' '
  - type: note
    content: Ac 7.13.
  - type: text
    content: 'Joseph ne pouvait plus se contenir devant tous ceux qui se tenaient auprès de lui. Il s''écria : Faites sortir tout le monde d''auprès de moi ! Et il ne resta personne avec Joseph quand il se fit reconnaître de ses frères. '
  '10':
  - type: note
    content: Goshen 46.28s ; 47.1-6,27 ; 50.8 ; Ex 8.18 ; 9.26. On situe habituellement cette région entre le delta du Nil et l'actuel canal de Suez. Voir cependant Jos 10.41 ; 11.16 ; 15.51 où le même nom désigne une région et une ville au sud de Juda qui furent longtemps sous domination égyptienne.
  - type: text
    content: 'Tu habiteras au pays de Goshen, et tu seras près de moi, toi, tes fils, tes petits-fils, ton petit bétail et ton gros bétail, et tout ce qui t''appartient. '
  '11':
  - type: note
    content: 'V. 6+. –  tu ne seras pas dépossédé…  : autre traduction tu ne t''appauvriras pas, ni toi, ni ta maison, ni aucun de ceux qui t''appartiennent  ; même forme verbale en Pr 20.13 (devenir pauvre) ; 23.21 ; 30.9.'
  - type: text
    content: 'Là, je pourvoirai à tous tes besoins, car il y aura encore cinq années de famine ; ainsi tu ne seras pas dépossédé, ni toi, ni ta maison, et rien de ce qui t''appartient ne se perdra. » '
  '12':
  - type: note
    content: 'moi  : litt. ma bouche.'
  - type: text
    content: 'Vous le voyez de vos yeux, et Benjamin, mon frère, le voit de ses yeux : c''est bien moi qui vous parle. '
  '13':
  - type: note
    content: 'Ac 7.14. – Voir gloire. –  amener  : litt. faire descendre, v. 9+.'
  - type: text
    content: 'Vous décrirez à mon père toute ma gloire en Egypte et tout ce que vous avez vu. Hâtez-vous d''amener ici mon père. '
  '14':
  - type: text
    content: 'Il se jeta au cou de Benjamin, son frère, et se mit à pleurer ; Benjamin aussi pleura à son cou. '
  '15':
  - type: text
    content: Il embrassa tous ses frères, en pleurant. Après cela, ses frères purent parler avec lui.
  - type: heading
    content: Jacob est invité à venir en Egypte
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 2 ; cf. Pr 16.15.
  - type: text
    content: 'Le bruit se répandit dans la maison du pharaon que les frères de Joseph étaient arrivés : cela plut au pharaon et aux gens de sa cour. '
  '17':
  - type: text
    content: 'Le pharaon dit à Joseph : Dis à tes frères : « Faites ceci : chargez vos bêtes ; partez, allez en Canaan ; '
  '18':
  - type: note
    content: 'toutes vos maisons  : litt. vos maisons, c.-à-d. vos familles, vos maisonnées. –  les meilleurs produits  : litt. la graisse  ; cf. 47.6 ; Ps 81.17n.'
  - type: text
    content: 'prenez votre père et toutes vos maisons, et venez auprès de moi. Je vous donnerai ce qu''il y a de bon en Egypte, et vous mangerez les meilleurs produits du pays. » '
  '19':
  - type: note
    content: 'Tu as ordre de leur dire  : d''après LXX et Vg, certains modifient le texte hébreu traditionnel pour lire donne-leur cet ordre. –  pour vos femmes…  : litt. pour vos familles (ou enfants) et pour vos femmes  ; cf. 34.29n.'
  - type: text
    content: 'Tu as ordre de leur dire : « Faites ceci : prenez en Egypte des chariots pour vos femmes et pour toutes vos familles ; faites-y aussi monter votre père et venez. '
  '2':
  - type: note
    content: 'sangloter 42.24+. –  Les Egyptiens  : autre traduction l''Egypte  ; v. 16-20 ; cf. 46.31ss.'
  - type: text
    content: 'Il se mit à sangloter. Les Egyptiens l''entendirent ; toute la maison du pharaon l''entendit. '
  '20':
  - type: note
    content: 'Ne regrettez pas  : litt. que votre œil ne s''attriste pas. Cf. 12.1 ; 19.17,23 ; voir cependant 46.1,6.'
  - type: text
    content: 'Ne regrettez pas vos affaires, car ce qu''il y a de meilleur dans toute l''Egypte sera pour vous. » '
  '21':
  - type: note
    content: 'fils d''Israël  : voir 32.29n.'
  - type: text
    content: 'Les fils d''Israël firent ainsi. Joseph leur donna des chariots, sur l''ordre du pharaon ; il leur donna aussi des provisions pour la route. '
  '22':
  - type: note
    content: Cf. 43.34+ ; 2R 5.5.
  - type: text
    content: 'Il leur donna à tous des habits de fête ; il donna à Benjamin trois cents pièces d''argent et cinq habits de fête. '
  '23':
  - type: text
    content: 'A son père, il envoya dix ânes chargés de ce qu''il y avait de meilleur en Egypte, dix ânesses chargées de blé, de pain et de ravitaillement, à l''intention de son père, pour la route. '
  '24':
  - type: note
    content: 'Ne vous querellez pas  : litt. ne vous agitez pas. Certains comprennent  : ne vous pressez pas, ne vous excitez pas ou ne vous effrayez pas (cf. 42.35 ; 44.4-13).'
  - type: text
    content: 'Puis il laissa partir ses frères, et ceux-ci s''en allèrent. Il leur dit : Ne vous querellez pas en chemin !'
  '25':
  - type: text
    content: 'Ils montèrent d''Egypte et arrivèrent en Canaan, chez Jacob, leur père. '
  '26':
  - type: note
    content: Ps 126.1 ; Jb 9.16 ; Lc 24.11. – Voir cœur.
  - type: text
    content: 'Ils lui dirent : Joseph est encore en vie, c''est lui qui gouverne toute l''Egypte ! Mais son cœur resta insensible, parce qu''il ne les croyait pas. '
  '27':
  - type: note
    content: 'Jacob  : litt. le souffle (ou l''esprit, 1.2n  ; 6.3n) de Jacob.'
  - type: text
    content: 'Ils lui dirent tout ce que Joseph leur avait dit. Il vit les chariots que Joseph avait envoyés pour le transporter. C''est alors que Jacob, leur père, reprit vie ; '
  '28':
  - type: note
    content: 46.30.
  - type: text
    content: 'Israël dit : Cela suffit ! Mon fils Joseph est encore en vie ! Que je le voie avant de mourir !'
  '3':
  - type: note
    content: est-il encore en vie ? cf. 43.7,27s ; 44.30ss. –  épouvante 50.15ss.
  - type: text
    content: 'Joseph dit à ses frères : Je suis Joseph ! Mon père est-il encore en vie ? Mais ses frères ne purent lui répondre, tant ils étaient saisis d''épouvante en face de lui. '
  '4':
  - type: note
    content: vendu 37.27s ; Ps 105.17.
  - type: text
    content: 'Joseph dit à ses frères : Je vous en prie, approchez-vous de moi. Alors ils s''approchèrent. Il dit : Je suis Joseph, votre frère, que vous avez vendu pour l''Egypte. '
  '5':
  - type: note
    content: 'ne soyez pas fâchés  : même tournure en 31.35. –  c''est… Dieu v. 8 ; 50.20 ; cf. Rm 8.28.'
  - type: text
    content: 'Maintenant, ne vous affligez pas et ne soyez pas fâchés de m''avoir vendu ici, car c''est pour sauver des vies que Dieu m''a envoyé en avant de vous. '
  '6':
  - type: note
    content: V. 11 ; 41.27. –  cinq 41.34n.
  - type: text
    content: 'Voilà deux ans que la famine sévit dans le pays ; pendant cinq ans encore il n''y aura ni labour, ni moisson. '
  '7':
  - type: note
    content: 'un reste dans le pays (ou sur la terre) : fréquent dans les textes prophétiques, le terme traduit par reste désigne généralement ce qui subsiste d''un peuple après une catastrophe (Es 15.9 ; Jr 6.9 ; Am 5.15 ; Mi 2.12 ; cf. Rm 9.27). L''expression pourrait toutefois s''appliquer ici aux réserves de nourriture. –  vous permettre…  : litt. faire vivre pour vous. –  par (ou pour) une grande délivrance  : on pourrait aussi comprendre pour permettre à un grand nombre de rescapés de rester en vie.'
  - type: text
    content: 'Dieu m''a envoyé en avant de vous pour vous assurer un reste dans le pays et pour vous permettre de rester en vie, par une grande délivrance. '
  '8':
  - type: note
    content: 'En fait  : litt. maintenant. –  c''est Dieu v. 5+. –  père du pharaon  : il s''agit peut-être d''un titre égyptien désignant précisément les fonctions éminentes de Joseph (certains pensent à un mot égyptien qui signifierait écuyer et dont la prononciation était proche de l''hébreu ’ab, père  ; cf. Es 9.5 ; 22.21) ; mais, même en hébreu, le terme traduit par père peut être employé en un sens figuré, pour désigner une personne qui a de l''autorité. –  maître ou seigneur  ; cf. v. 26 ; 39.4 ; 41.40-44 ; 42.30,33.'
  - type: text
    content: 'En fait, ce n''est pas vous qui m''avez envoyé ici, c''est Dieu ; il m''a fait père du pharaon, maître de toute sa maison et gouverneur de toute l''Egypte. '
  '9':
  - type: note
    content: monter / descends 12.10n.
  - type: text
    content: 'Hâtez-vous de monter vers mon père ; vous lui direz : « Ainsi a parlé ton fils Joseph : Dieu m''a fait maître de toute l''Egypte ; descends vers moi, sans tarder. '
