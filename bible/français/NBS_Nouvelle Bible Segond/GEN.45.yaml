document_id: GEN.45,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph se fait reconnaître
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ac 7.13.
      marker-yv: yv-n
    - type: text
      text: 'Joseph ne pouvait plus se contenir devant tous ceux qui se tenaient auprès de lui. Il s''écria : Faites sortir tout le monde d''auprès de moi ! Et il ne resta personne avec Joseph quand il se fit reconnaître de ses frères. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Goshen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 46.28s ; 47.1-6,27 ; 50.8 ; Ex 8.18 ; 9.26. On situe habituellement cette région entre le delta du Nil et l'actuel canal de Suez. Voir cependant Jos 10.41 ; 11.16 ; 15.51 où le même nom désigne une région et une ville au sud de Juda qui furent longtemps sous domination égyptienne.
      marker-yv: yv-n
    - type: text
      text: 'Tu habiteras au pays de Goshen, et tu seras près de moi, toi, tes fils, tes petits-fils, ton petit bétail et ton gros bétail, et tout ce qui t''appartient. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu ne seras pas dépossédé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne t'appauvriras pas, ni toi, ni ta maison, ni aucun de ceux qui t'appartiennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même forme verbale en Pr 20.13 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devenir pauvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; 23.21 ; 30.9.
      marker-yv: yv-n
    - type: text
      text: 'Là, je pourvoirai à tous tes besoins, car il y aura encore cinq années de famine ; ainsi tu ne seras pas dépossédé, ni toi, ni ta maison, et rien de ce qui t''appartient ne se perdra. » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ma bouche.
      marker-yv: yv-n
    - type: text
      text: 'Vous le voyez de vos yeux, et Benjamin, mon frère, le voit de ses yeux : c''est bien moi qui vous parle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 7.14. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: amener
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire descendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 9+.'
      marker-yv: yv-n
    - type: text
      text: 'Vous décrirez à mon père toute ma gloire en Egypte et tout ce que vous avez vu. Hâtez-vous d''amener ici mon père. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il se jeta au cou de Benjamin, son frère, et se mit à pleurer ; Benjamin aussi pleura à son cou. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il embrassa tous ses frères, en pleurant. Après cela, ses frères purent parler avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob est invité à venir en Egypte
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 2 ; cf. Pr 16.15.
      marker-yv: yv-n
    - type: text
      text: 'Le bruit se répandit dans la maison du pharaon que les frères de Joseph étaient arrivés : cela plut au pharaon et aux gens de sa cour. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le pharaon dit à Joseph : Dis à tes frères : « Faites ceci : chargez vos bêtes ; partez, allez en Canaan ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes vos maisons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vos maisons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vos familles, vos maisonnées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les meilleurs produits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la graisse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 47.6 ; Ps 81.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'prenez votre père et toutes vos maisons, et venez auprès de moi. Je vous donnerai ce qu''il y a de bon en Egypte, et vous mangerez les meilleurs produits du pays. » '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu as ordre de leur dire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ', certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: donne-leur cet ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour vos femmes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour vos familles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et pour vos femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 34.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu as ordre de leur dire : « Faites ceci : prenez en Egypte des chariots pour vos femmes et pour toutes vos familles ; faites-y aussi monter votre père et venez. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sangloter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; v. 16-20 ; cf. 46.31ss.'
      marker-yv: yv-n
    - type: text
      text: 'Il se mit à sangloter. Les Egyptiens l''entendirent ; toute la maison du pharaon l''entendit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne regrettez pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que votre œil ne s'attriste pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. 12.1 ; 19.17,23 ; voir cependant 46.1,6.
      marker-yv: yv-n
    - type: text
      text: 'Ne regrettez pas vos affaires, car ce qu''il y a de meilleur dans toute l''Egypte sera pour vous. » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.21 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Israël'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 32.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils d''Israël firent ainsi. Joseph leur donna des chariots, sur l''ordre du pharaon ; il leur donna aussi des provisions pour la route. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 43.34+ ; 2R 5.5.
      marker-yv: yv-n
    - type: text
      text: 'Il leur donna à tous des habits de fête ; il donna à Benjamin trois cents pièces d''argent et cinq habits de fête. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'A son père, il envoya dix ânes chargés de ce qu''il y avait de meilleur en Egypte, dix ânesses chargées de blé, de pain et de ravitaillement, à l''intention de son père, pour la route. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne vous querellez pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne vous agitez pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Certains comprennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne vous pressez pas, ne vous excitez pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne vous effrayez pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 42.35 ; 44.4-13).
      marker-yv: yv-n
    - type: text
      text: 'Puis il laissa partir ses frères, et ceux-ci s''en allèrent. Il leur dit : Ne vous querellez pas en chemin !'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils montèrent d''Egypte et arrivèrent en Canaan, chez Jacob, leur père. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 126.1 ; Jb 9.16 ; Lc 24.11. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils lui dirent : Joseph est encore en vie, c''est lui qui gouverne toute l''Egypte ! Mais son cœur resta insensible, parce qu''il ne les croyait pas. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Jacob.
      marker-yv: yv-n
    - type: text
      text: 'Ils lui dirent tout ce que Joseph leur avait dit. Il vit les chariots que Joseph avait envoyés pour le transporter. C''est alors que Jacob, leur père, reprit vie ; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 46.30.
      marker-yv: yv-n
    - type: text
      text: 'Israël dit : Cela suffit ! Mon fils Joseph est encore en vie ! Que je le voie avant de mourir !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'est-il encore en vie ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 43.7,27s ; 44.30ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épouvante '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 50.15ss.
      marker-yv: yv-n
    - type: text
      text: 'Joseph dit à ses frères : Je suis Joseph ! Mon père est-il encore en vie ? Mais ses frères ne purent lui répondre, tant ils étaient saisis d''épouvante en face de lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vendu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 37.27s ; Ps 105.17.
      marker-yv: yv-n
    - type: text
      text: 'Joseph dit à ses frères : Je vous en prie, approchez-vous de moi. Alors ils s''approchèrent. Il dit : Je suis Joseph, votre frère, que vous avez vendu pour l''Egypte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne soyez pas fâchés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même tournure en 31.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'c''est… Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8 ; 50.20 ; cf. Rm 8.28.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, ne vous affligez pas et ne soyez pas fâchés de m''avoir vendu ici, car c''est pour sauver des vies que Dieu m''a envoyé en avant de vous. '
