  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Manassé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : pour ses fils, cf. Nb 26.30s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Makir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 13.31+.'
    marker-yv: yv-n
  - type: text
    text: 'Il y eut un lot pour la tribu de Manassé, qui était le premier-né de Joseph. Makir, premier-né de Manassé et père du Galaad, avait eu le Galaad et le Bashân, car il était un homme de guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un lot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Il y eut un lot pour les autres fils de Manassé, clan par clan, pour les fils d''Abiézer, les fils de Héleq, les fils d''Asriel, les fils de Sichem, les fils de Hépher, les fils de Shemida : ce sont là les enfants mâles de Manassé, fils de Joseph, clan par clan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir l''histoire des cinq filles de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tselophhad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Nb 26.33 ; 27.1-11 ; 36.1-12.
    marker-yv: yv-n
  - type: text
    text: 'Tselophhad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, n''avait pas de fils, mais des filles dont voici les noms : Mahla, Noa, Hogla, Milka et Tirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eléazar, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Josué, fils de Noun '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on leur donna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il leur donna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'ordre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la bouche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 15.13 ; Nb 27.6s.'
    marker-yv: yv-n
  - type: text
    text: 'Elles se présentèrent devant Eléazar, le prêtre, devant Josué, fils de Noun, et devant les princes, en disant : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné à Moïse de nous donner un patrimoine au milieu de nos frères. Alors on leur donna, conformément à l''ordre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', un patrimoine au milieu des frères de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On attribua…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (les) dix portions de Manassé tombèrent.
    marker-yv: yv-n
  - type: text
    text: 'On attribua par le sort dix portions à Manassé, outre le Galaad et le Bashân, qui sont en Transjordanie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ainsi les filles de Manassé eurent un patrimoine au milieu de ses fils, et le Galaad fut pour les autres fils de Manassé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: La frontière…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 16.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vers le sud
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vers la droite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vers Yamîn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eïn-Tappouah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Source de Tappouah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir note suivante) : cf. 12.17 ; 16.8.'
    marker-yv: yv-n
  - type: text
    text: 'La frontière de Manassé s''étendait d''Aser au Mikmetath qui fait face à Sichem ; la frontière allait vers le sud, vers les habitants d''Eïn-Tappouah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tappouah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Pomme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : entre Beth-El et Hépher, à 37 km au nord de Jérusalem ; cf. 16.8+.'
    marker-yv: yv-n
  - type: text
    text: 'Le pays de Tappouah fut pour Manassé, mais Tappouah, sur la frontière de Manassé, fut pour les fils d''Ephraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: longeait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: descendait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 16.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au milieu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.9.
    marker-yv: yv-n
  - type: text
    text: 'La frontière longeait l''oued Qana. Au sud de l''oued, les villes qui étaient au milieu des villes de Manassé furent pour Ephraïm. Au nord de l''oued, la frontière de Manassé débouchait sur la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Au sud, c''était à Ephraïm, au nord à Manassé, et la mer leur servait de frontière ; ils touchaient Aser vers le nord et Issacar vers l''est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Beth-Shéân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à la jonction de la vallée du Jourdain et de la vallée de Jizréel, au sud du lac de Galilée. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les localités…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite ; cf. 15.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yibléam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à 25 km au nord de Sichem ; cf. Jg 1.27 ; 2R 9.27 ; 1Ch 6.55 ; voir aussi 2R 15.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.2 ; 12.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eïn-Dor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Source de Dor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : au sud du mont Tabor ; cf. 19.22 ; 1S 28.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Meguiddo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au sud du mont Tabor, cf. 12.21 ; Jg 1.27 ; 5.19 ; 1R 4.12 ; 9.15 ; 2R 9.27 ; 23.29s ; 1Ch 7.29 ; 2Ch 35.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trois contrées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trois coteaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) : sur ce terme associé à Dor, cf. 11.2 ; 12.23 ; 1R 4.11.'
    marker-yv: yv-n
  - type: text
    text: 'Pour Manassé, dans Issacar et dans Aser, il y avait Beth-Shéân et les localités qui en dépendent, Yibléam et les localités qui en dépendent, les habitants de Dor et des localités qui en dépendent, les habitants d''Eïn-Dor et des localités qui en dépendent, les habitants de Taanak et des localités qui en dépendent, et les habitants de Meguiddo et des localités qui en dépendent : trois contrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prendre possession
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: déposséder (les habitants)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même verbe hébreu au v. 13.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Manassé ne purent pas prendre possession de ces villes ; les Cananéens persistèrent à habiter dans ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la corvée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.10 ; voir aussi Jg 1.27s.'
    marker-yv: yv-n
  - type: text
    text: Lorsque les Israélites furent assez forts, ils soumirent les Cananéens à la corvée, mais ils ne purent les déposséder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les fils de Joseph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je suis un peuple nombreux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 49.22,26 ; Dt 33.13-17. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Joseph demandèrent à Josué : Pourquoi m''as-tu donné comme patrimoine un seul lot, une seule portion, alors que je suis un peuple nombreux, puisque le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a béni jusqu''à présent ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: défricheras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu correspondant (aussi au v. 18), à une autre forme, est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: créer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Perizzites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.1 ; 11.3 ; 12.8 ; Ex 3.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rephaïtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué leur dit : Si tu es un peuple nombreux, monte dans la forêt ; tu te défricheras un endroit au pays des Perizzites et des Rephaïtes, puisque la région montagneuse d''Ephraïm est trop exiguë pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la vallée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays de la vallée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vallée de Jizréel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : aussi appelée '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: plaine d'Esdrélon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c''était une vallée fertile en Galilée inférieure, entre Meguiddo et Beth-Shéân. Cf. 19.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Joseph dirent : La montagne ne nous suffira pas ; de plus, il y a des chars de fer chez tous les Cananéens qui habitent la vallée, ceux qui sont à Beth-Shéân et dans les localités qui en dépendent, et ceux qui sont dans la vallée de Jizréel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un lot seulement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un seul lot.
    marker-yv: yv-n
  - type: text
    text: 'Josué dit à la maison de Joseph (Ephraïm et Manassé) : Tu es un peuple nombreux, et ta force est grande ; tu n''auras pas un lot seulement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en tireras profit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu auras ses sorties
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu en posséderas toutes les limites.
    marker-yv: yv-n
  - type: text
    text: Mais tu auras la montagne, même si c'est une forêt. Tu la défricheras et en tireras profit. Tu déposséderas les Cananéens, malgré leurs chars de fer et malgré leur force.
