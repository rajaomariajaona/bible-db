document_id: JOS.17,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Manassé  : pour ses fils, cf. Nb 26.30s. –  Makir  : cf. 13.31+.'
  - type: text
    content: 'Il y eut un lot pour la tribu de Manassé, qui était le premier-né de Joseph. Makir, premier-né de Manassé et père du Galaad, avait eu le Galaad et le Bashân, car il était un homme de guerre. '
  '10':
  - type: text
    content: 'Au sud, c''était à Ephraïm, au nord à Manassé, et la mer leur servait de frontière ; ils touchaient Aser vers le nord et Issacar vers l''est. '
  '11':
  - type: note
    content: 'Beth-Shéân  : à la jonction de la vallée du Jourdain et de la vallée de Jizréel, au sud du lac de Galilée. –  les localités…  : litt. ses filles, de même dans la suite ; cf. 15.45n. –  Yibléam  : à 25 km au nord de Sichem ; cf. Jg 1.27 ; 2R 9.27 ; 1Ch 6.55 ; voir aussi 2R 15.10n. –  Dor  : cf. 11.2 ; 12.23. –  Eïn-Dor (Source de Dor) : au sud du mont Tabor ; cf. 19.22 ; 1S 28.7. –  Meguiddo  : au sud du mont Tabor, cf. 12.21 ; Jg 1.27 ; 5.19 ; 1R 4.12 ; 9.15 ; 2R 9.27 ; 23.29s ; 1Ch 7.29 ; 2Ch 35.22. –  trois contrées ou trois coteaux ( ?) : sur ce terme associé à Dor, cf. 11.2 ; 12.23 ; 1R 4.11.'
  - type: text
    content: 'Pour Manassé, dans Issacar et dans Aser, il y avait Beth-Shéân et les localités qui en dépendent, Yibléam et les localités qui en dépendent, les habitants de Dor et des localités qui en dépendent, les habitants d''Eïn-Dor et des localités qui en dépendent, les habitants de Taanak et des localités qui en dépendent, et les habitants de Meguiddo et des localités qui en dépendent : trois contrées. '
  '12':
  - type: note
    content: 'prendre possession  : autre traduction déposséder (les habitants), même verbe hébreu au v. 13.'
  - type: text
    content: 'Les fils de Manassé ne purent pas prendre possession de ces villes ; les Cananéens persistèrent à habiter dans ce pays. '
  '13':
  - type: note
    content: 'la corvée  : cf. 16.10 ; voir aussi Jg 1.27s.'
  - type: text
    content: Lorsque les Israélites furent assez forts, ils soumirent les Cananéens à la corvée, mais ils ne purent les déposséder.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les fils de Joseph 16.1n. –  je suis un peuple nombreux  : cf. Gn 49.22,26 ; Dt 33.13-17. – Voir bénédiction .'
  - type: text
    content: 'Les fils de Joseph demandèrent à Josué : Pourquoi m''as-tu donné comme patrimoine un seul lot, une seule portion, alors que je suis un peuple nombreux, puisque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a béni jusqu''à présent ? '
  '15':
  - type: note
    content: 'défricheras  : le verbe hébreu correspondant (aussi au v. 18), à une autre forme, est traduit par créer, cf. Gn 1.1n. –  Perizzites  : cf. 3.10n  ; 9.1 ; 11.3 ; 12.8 ; Ex 3.8. –  Rephaïtes 12.4n.'
  - type: text
    content: 'Josué leur dit : Si tu es un peuple nombreux, monte dans la forêt ; tu te défricheras un endroit au pays des Perizzites et des Rephaïtes, puisque la région montagneuse d''Ephraïm est trop exiguë pour toi. '
  '16':
  - type: note
    content: 'la vallée  : litt. le pays de la vallée. –  vallée de Jizréel  : aussi appelée plaine d''Esdrélon  ; c''était une vallée fertile en Galilée inférieure, entre Meguiddo et Beth-Shéân. Cf. 19.18n.'
  - type: text
    content: 'Les fils de Joseph dirent : La montagne ne nous suffira pas ; de plus, il y a des chars de fer chez tous les Cananéens qui habitent la vallée, ceux qui sont à Beth-Shéân et dans les localités qui en dépendent, et ceux qui sont dans la vallée de Jizréel. '
  '17':
  - type: note
    content: 'un lot seulement  : litt. un seul lot.'
  - type: text
    content: 'Josué dit à la maison de Joseph (Ephraïm et Manassé) : Tu es un peuple nombreux, et ta force est grande ; tu n''auras pas un lot seulement. '
  '18':
  - type: note
    content: 'en tireras profit  : litt. tu auras ses sorties, c.-à-d. tu en posséderas toutes les limites.'
  - type: text
    content: Mais tu auras la montagne, même si c'est une forêt. Tu la défricheras et en tireras profit. Tu déposséderas les Cananéens, malgré leurs chars de fer et malgré leur force.
  '2':
  - type: note
    content: 'un lot  : sous-entendu dans le texte.'
  - type: text
    content: 'Il y eut un lot pour les autres fils de Manassé, clan par clan, pour les fils d''Abiézer, les fils de Héleq, les fils d''Asriel, les fils de Sichem, les fils de Hépher, les fils de Shemida : ce sont là les enfants mâles de Manassé, fils de Joseph, clan par clan. '
  '3':
  - type: note
    content: 'des filles  : voir l''histoire des cinq filles de Tselophhad en Nb 26.33 ; 27.1-11 ; 36.1-12.'
  - type: text
    content: 'Tselophhad, fils de Hépher, fils de Galaad, fils de Makir, fils de Manassé, n''avait pas de fils, mais des filles dont voici les noms : Mahla, Noa, Hogla, Milka et Tirtsa. '
  '4':
  - type: note
    content: 'Eléazar, le prêtre 14.1n. –  Josué, fils de Noun 1.1n. –  on leur donna  : litt. il leur donna. –  l''ordre  : litt. la bouche, cf. 15.13 ; Nb 27.6s.'
  - type: text
    content: 'Elles se présentèrent devant Eléazar, le prêtre, devant Josué, fils de Noun, et devant les princes, en disant : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné à Moïse de nous donner un patrimoine au milieu de nos frères. Alors on leur donna, conformément à l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', un patrimoine au milieu des frères de leur père. '
  '5':
  - type: note
    content: 'On attribua…  : litt. (les) dix portions de Manassé tombèrent.'
  - type: text
    content: 'On attribua par le sort dix portions à Manassé, outre le Galaad et le Bashân, qui sont en Transjordanie. '
  '6':
  - type: text
    content: Ainsi les filles de Manassé eurent un patrimoine au milieu de ses fils, et le Galaad fut pour les autres fils de Manassé.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'La frontière…  : cf. 16.6. –  vers le sud  : litt. vers la droite  ; autre traduction vers Yamîn . –  Eïn-Tappouah ( Source de Tappouah , voir note suivante) : cf. 12.17 ; 16.8.'
  - type: text
    content: 'La frontière de Manassé s''étendait d''Aser au Mikmetath qui fait face à Sichem ; la frontière allait vers le sud, vers les habitants d''Eïn-Tappouah. '
  '8':
  - type: note
    content: 'Tappouah (Pomme) : entre Beth-El et Hépher, à 37 km au nord de Jérusalem ; cf. 16.8+.'
  - type: text
    content: 'Le pays de Tappouah fut pour Manassé, mais Tappouah, sur la frontière de Manassé, fut pour les fils d''Ephraïm. '
  '9':
  - type: note
    content: 'longeait  : litt. descendait, cf. 16.8. –  au milieu… 16.9.'
  - type: text
    content: 'La frontière longeait l''oued Qana. Au sud de l''oued, les villes qui étaient au milieu des villes de Manassé furent pour Ephraïm. Au nord de l''oued, la frontière de Manassé débouchait sur la mer. '
