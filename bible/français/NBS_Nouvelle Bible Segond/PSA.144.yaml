document_id: PSA.144,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du roi
  - type: text
    content: ' '
  - type: note
    content: 'De David  : LXX ajoute à propos de Goliath  ; cf. 1S 17. –  Béni… 18.35,47.'
  - type: text
    content: De David.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Rocher,'
  - type: text
    content: qui enseigne à mes mains le combat,
  - type: text
    content: à mes doigts la guerre,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le salut (ou la victoire ) aux rois 18.51 ; 33.16ss. –  l''épée cruelle 22.21 ; Ex 18.4. –  David, son serviteur  : cf. 89.4.'
  - type: text
    content: Il donne le salut aux rois,
  - type: text
    content: il délivre de l'épée cruelle David, son serviteur.
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 7n.
  - type: text
    content: Délivre-moi, sauve-moi
  - type: text
    content: de la main des étrangers,
  - type: text
    content: dont la bouche parle faussement,
  - type: text
    content: et dont la main droite est pleine de mensonge.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ce verset est introduit dans le texte par un relatif dont le sens est obscur ; on a parfois compris eux qui disent…  ; certains commentateurs en modifient légèrement la vocalisation pour lire  : Heureux nos fils, qui sont… ou, s''adressant à Dieu  : Bénis nos fils, qu''ils soient…  ; cf. v. 15 ; voir aussi 72.3ss. –  plants… 128.3. –  nos filles…  : cf. Siracide 26.17s (description de l''épouse parfaite) : « Comme une lampe qui brille sur le chandelier sacré, tel apparaît un beau visage sur un corps bien planté. Des colonnes d''or sur une base d''argent, ainsi de belles jambes sur des talons solides. »'
  - type: text
    content: Nos fils sont comme des plants
  - type: text
    content: qui grandissent dans leur jeunesse ;
  - type: text
    content: nos filles sont comme des figures d'angle
  - type: text
    content: sculptées dans la construction d'un palais.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 28.8 ; Es 30.23 ; Pr 3.10 ; Lc 12.16ss.
  - type: text
    content: Nos granges sont pleines,
  - type: text
    content: regorgeant de toutes sortes de produits ;
  - type: text
    content: notre petit bétail se multiplie par milliers,
  - type: text
    content: par dizaines de milliers dans nos campagnes ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'nos vaches sont grosses  : autres traductions nos bœufs sont chargés ou gras  ; on a aussi compris nos alliés portent les fardeaux. –  accident  : litt. brèche, éclatement  ; cf. Gn 38.29 ; 2S 6.8n. –  avortement (du bétail) : sens probable dans ce contexte, litt. sortie.'
  - type: text
    content: nos vaches sont grosses ;
  - type: text
    content: pas d'accident, pas d'avortement,
  - type: text
    content: pas de cris sur nos places !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 1.1+ ; 33.12 ; 146.5 ; Dt 33.29.
  - type: text
    content: Heureux le peuple pour lequel il en est ainsi !
  - type: text
    content: 'Heureux le peuple dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est le Dieu !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.3n. –  mon bienfaiteur  : litt. ma fidélité  ; cf. 59.11n,18 ; certains modifient légèrement le texte hébreu traditionnel pour lire ma force. –  mon peuple  : plusieurs mss hébreux et des versions anciennes ont lu mes peuples  ; cf. 18.48.'
  - type: text
    content: mon bienfaiteur, ma forteresse,
  - type: text
    content: ma citadelle, mon libérateur,
  - type: text
    content: mon bouclier, en qui je trouve un abri,
  - type: text
    content: qui me soumet mon peuple !
  '3':
  - type: text
    content: ' '
  - type: note
    content: '8.5+ ; Jb 7.17. –  pour que tu le distingues  : litt. pour que tu le connaisses  ; cf. Gn 18.19n  ; 2S 7.20n.'
  - type: text
    content: Seigneur
  - type: text
    content: ', qu''est-ce que l''être humain, pour que tu le distingues ?'
  - type: text
    content: Qu'est-ce que l'homme, pour que tu tiennes compte de lui ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 39.6,12 ; 62.10 ; 102.12 ; 109.23 ; Jb 8.9 ; 14.1ss ; Ec 1.2n  ; Jc 4.14.
  - type: text
    content: L'homme est semblable à une vapeur,
  - type: text
    content: ses jours sont comme l'ombre qui passe.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 18.7ss ; 97.2ss ; Jg 5.4ss ; Dt 33.2s ; Ha 3.4ss. –  incline… 18.10+. –  Touche… 104.32.
  - type: text
    content: Seigneur
  - type: text
    content: ', incline ton ciel et descends !'
  - type: text
    content: Touche les montagnes, et qu'elles fument !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 18.15n  ; Dt 32.23.
  - type: text
    content: Fais éclater les éclairs et disperse-les !
  - type: text
    content: Lance tes flèches et frappe-les de panique !
  '7':
  - type: text
    content: ' '
  - type: note
    content: '18.5ss,17. –  étrangers  : litt. fils de l''étranger , de même au v. 11 ; cf. 2.1ss.'
  - type: text
    content: Etends tes mains d'en haut,
  - type: text
    content: délivre-moi, sauve-moi des grandes eaux,
  - type: text
    content: de la main des étrangers
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'dont la main droite…  : l''expression signifie sans doute ici qui se parjurent (cf. Dn 12.7) ; voir aussi Es 44.20n  ; Ps 26.10.'
  - type: text
    content: dont la bouche parle faussement,
  - type: text
    content: et dont la main droite est pleine de mensonge.
  '9':
  - type: text
    content: ' '
  - type: note
    content: je jouerai… 7.18n  ; cf. 33.2-3+ ; 98.1.
  - type: text
    content: O Dieu, je chanterai un chant nouveau pour toi,
  - type: text
    content: je jouerai pour toi du luth à dix cordes.
