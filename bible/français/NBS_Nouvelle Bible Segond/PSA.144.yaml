        children:
        - type: text
          text: '26.17s (description de l''épouse parfaite) : « Comme une lampe qui brille sur le chandelier sacré, tel apparaît un beau visage sur un corps bien planté. Des colonnes d''or sur une base d''argent, ainsi de belles jambes sur des talons solides. »'
      marker-yv: yv-n
    - type: text
      text: Nos fils sont comme des plants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui grandissent dans leur jeunesse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos filles sont comme des figures d'angle
  - type: usfm
    marker: q1
    children:
    - type: text
