document_id: HEB.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La lecture de ce qu''on appelle communément « l''épître aux Hébreux » peut déconcerter. En effet, divers thèmes théologiques s''y entremêlent. De plus, une bonne connaissance de l''Ancien Testament est requise : l''ouvrage le cite plus de trente fois, de manière formelle ou non (quant aux simples réminiscences, on en compte plus de quatre-vingts). Enfin, les questions d''introduction classiques (destinataires, genre littéraire, auteur) atteignent ici un degré de complexité élevé. Pourtant, ce texte est un des joyaux du Nouveau Testament, ne serait-ce que pour l''originalité de son interprétation de la mort du Christ, qui fait de celui-ci à la fois le grand prêtre et la victime du sacrifice.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le point capital
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Si le fil conducteur du livre ne se laisse pas découvrir facilement, du moins l''auteur déclare-t-il nettement quel est le centre de son propos. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or voici le
    - type: text
      text: ' '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: point capital
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'de ce que nous disons : nous avons un tel grand prêtre, qui s''est assis à la droite du trône de la majesté dans les cieux ; il est au service du sanctuaire et de la tente véritable, celle qui a été dressée par le Seigneur et non pas par un être humain'
    - type: text
      text: ' (8.1s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On peut dégager de ce résumé les idées suivantes : il y a dans le ciel un grand prêtre de nature divine. Contrairement aux grands prêtres terrestres, il est assis sur un trône. Il cumule donc les fonctions sacerdotale et royale, comme le confirme la citation du Psaume 110 ; enfin, il officie dans un sanctuaire véritable qui, à la différence de tous les autres, a été construit par Dieu lui-même.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans ces quelques lignes apparaît l''enjeu principal de l''écrit : '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: deux cultes
    - type: text
      text: ' – deux systèmes – s''opposent, correspondant chacun à une alliance. Le premier culte – celui de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'ancienne alliance
    - type: text
      text: ' – n''était que figuratif (8.5), provisoire, imparfait (8.7) et appelé à être remplacé (8.13). Le second – celui de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'alliance nouvelle
    - type: text
      text: ' – s''adresse à des réalités spirituelles ou célestes. Le Christ en est devenu le grand prêtre en s''offrant lui-même en sacrifice. Alors qu''il était impossible au fidèle de s''approcher de Dieu dans le système ancien, Jésus lui a ainsi ouvert un accès direct (10.19).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: La structure
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''auteur donne parfois l''impression de se répéter et de mélanger certains thèmes. Pourtant, le lecteur qui s''astreint à repérer l''agencement des mots aura tôt fait de découvrir en cet écrit l''un des plus construits du Nouveau Testament. L''auteur utilise un certain nombre de procédés littéraires qui servent à structurer son propos :'
  - type: usfm
    marker: im
    children:
    - type: text
      text: –L'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: inclusion
    - type: text
      text: '  : Un même mot (ou une même expression) sert à marquer le début et la fin d''un paragraphe. Ainsi, en 1.5,13, l''expression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: auquel
    - type: text
      text: ' (ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pour lequel
    - type: text
      text: ') '
    - type: usfm
      marker: it
      children:
      - type: text
        text: des anges, en effet, Dieu a-t-il jamais dit ?
  - type: usfm
    marker: im
    children:
    - type: text
      text: '–Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: vocabulaire caractéristique
    - type: text
      text: '  : Chaque partie est marquée par l''utilisation intensive d''un vocabulaire caractéristique, plus rare dans le reste de l''ouvrage. C''est le cas du mot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foi
    - type: text
      text: ' au chapitre 11.'
  - type: usfm
    marker: im
    children:
    - type: text
      text: –L'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: annonce du sujet
    - type: text
      text: '  : Chaque partie annonce dans sa conclusion le contenu de la partie suivante. C''est le cas en 10.38s où le mot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foi
    - type: text
      text: ' introduit le chapitre 11.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Qui plus est, l''ensemble s''organise autour de son sommet en une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: construction symétrique
    - type: text
      text: ' (voir l''encadré « Un aperçu de la structure symétrique de l''épître aux Hébreux »).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Une première partie (1.5–2.18) démontre la supériorité du Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: premier-né
    - type: text
      text: ' par rapport aux anges. Une seconde souligne sa foi (3.1–4.14) ainsi que sa persévérance (4.15–5.10) dans l''épreuve. On accède progressivement au sommet (chap. 8 et 9) par une exhortation (5.11–6.20), puis par un paragraphe où l''auteur démontre l''appartenance du Christ à l''ordre sacerdotal de Melchisédek (chap. 7). On redescend du point culminant par un paragraphe qui tire les conséquences du sacrifice du Christ (10.1-18) et par une exhortation qui sert de conclusion (10.19-39). Les deux dernières parties achèvent l''ensemble. La foi des pères est citée en exemple (11.1–12.13) ; les exigences de la consécration sont incontournables. La vision finale est celle d''une '
    - type: usfm
      marker: it
      children:
      - type: text
        text: assemblée
    - type: text
      text: ' (ou « Eglise ») de '
    - type: usfm
      marker: it
      children:
      - type: text
        text: premiers-nés
    - type: text
      text: ' inscrits dans les cieux (12.14–13.19).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Les destinataires
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Incontestablement, aux yeux de l'auteur, les premiers destinataires de l'épître aux Hébreux étaient sur une mauvaise voie. S'il met tout ce soin à leur rappeler la supériorité du Christ et du culte dont il est le ministre, s'il dénonce avec autant de force l'insuffisance du rituel ancien, c'est qu'ils étaient en passe de revenir à des pratiques cultuelles anciennes, tout à fait périmées selon lui.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ailleurs dans le Nouveau Testament, on trouve l''écho de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: préoccupations cultuelles.
    - type: text
      text: ' La question de la Samaritaine quant au lieu d''adoration est sur ce point significative (Jn 4.20). L''un des manuscrits découverts à Qumrân*, le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rouleau du Temple
    - type: text
      text: ', atteste lui aussi l''attente d''une restauration cultuelle selon les termes du Pentateuque. Il est dès lors probable que certains Juifs devenus chrétiens (dont peut-être un certain nombre de prêtres) aient été tentés de revenir à des pratiques sacrificielles. L''auteur leur démontre avec force que retourner au système ancien ne serait rien de moins que rejeter le Christ ; cela reviendrait à le crucifier à nouveau (6.6).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le genre littéraire
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La tradition et l''habitude font parler de « l''épître » aux Hébreux. Bien des indices, en particulier l''utilisation fréquente de verbes exprimant la diction (2.5 ; 5.11 ; 6.9 ; 8.1 ; 9.5 ; 11.32), suggèrent que le contenu de cet écrit a pu d''abord être communiqué oralement. L''introduction ne ressemble en rien à celle des autres épîtres. Seuls les derniers versets évoquent une lettre, mais leur allure si différente donne l''impression qu''ils ont été ajoutés. Parmi les hypothèses avancées, il y a de bonnes raisons de penser que l''épître aux Hébreux a d''abord été un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: sermon
    - type: text
      text: ' ou un discours ensuite mis au point et couché par écrit avant d''être envoyé avec un billet final à telle ou telle Eglise.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'auteur
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'auteur de cet écrit ne se nomme pas. Dès la fin du II
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle, les Eglises d''Orient ont attribué cette épître à '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Paul
    - type: text
      text: ', alors que les Eglises d''Occident étaient sur ce point quelque peu réticentes. A partir du V'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle elle est incluse sans hésitation dans les listes canoniques.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On est cependant loin du style paulinien. Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: vocabulaire
    - type: text
      text: ' n''est pas le même, pas plus que les tournures de phrase et l''organisation de la pensée. Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: citations
    - type: text
      text: ' de l''Ancien Testament sont systématiquement introduites par une formule inhabituelle chez Paul : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: il dit
    - type: text
      text: '. Enfin, l''insistance de l''auteur sur le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: sacerdoce du Christ
    - type: text
      text: ' est originale. Dès lors, même si les chapitres sur la foi, la persévérance et la consécration sont proches de la pensée de l''apôtre, il est peu vraisemblable que celui-ci soit l''auteur de l''ouvrage. D''autres noms ont donc été avancés. Ainsi Luther a proposé '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Apollos
    - type: text
      text: ', qui correspondrait bien au profil de l''auteur ; en Actes 18.24s, cet Apollos, originaire d''Alexandrie comme Philon* (dont les écrits présentent plus d''une analogie avec l''épître aux Hébreux), est décrit en effet comme éloquent, versé dans les Ecritures, doué pour enseigner aux Juifs ce qui concernait le Christ. Toutefois, pour attrayante que soit cette hypothèse, elle est pure conjecture. A la question de savoir qui avait rédigé cet écrit, Origène répondait : « Dieu seul le sait. » Sa prudence est encore de mise aujourd''hui, d''autant que l''identité de l''auteur, si on la connaissait, ne donnerait pas forcément de clef pour comprendre ce texte.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une autre expression de l'Evangile
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le Christ est au-dessus de tout. Son sacrifice unique – '
    - type: usfm
      marker: it
      children:
      - type: text
        text: une fois pour toutes
    - type: text
      text: ' (7.27+) – est pleinement suffisant et ne peut être réitéré. Lui seul permet à l''être humain de s''approcher de Dieu. Lui seul est le garant de l''alliance nouvelle. Ces formules ne sont rien d''autre qu''une proclamation de l''Evangile. A sa façon l''épître aux Hébreux dit la bonne nouvelle toujours nécessaire à l''humanité.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Plus encore, ce texte rappelle que tout système qui voudrait jouer un rôle d''intermédiaire ou de médiateur entre Dieu et le genre humain est contraire à l''essence même du christianisme. Une fois les sacrifices sanglants abolis, le croyant ne se confiera en aucune autre pratique humaine pour '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: s'approcher de Dieu.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Après avoir insisté sur l''efficacité irremplaçable du sacrifice du Christ, l''épître aux Hébreux, dans un judicieux équilibre, insiste aussi sur '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'indispensable consécration.
    - type: text
      text: ' L''heure n''est pas à la passivité (4.1,11). Le salut obtenu par le Christ se manifeste dans la vie du croyant. Puisque le Christ a aboli le péché (9.26), approchons-nous de Dieu (10.22), et préparons pour nos pieds des pistes droites (12.13).'
