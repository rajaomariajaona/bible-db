document_id: 1SA.21,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans certaines éditions de la Bible, ce verset, qui constitue la conclusion du chap. 20, est numéroté 20.43 ; il s'ensuit que les versets suivants du chap. 21 sont numérotés 1 à 15 au lieu de 2 à 16.
      marker-yv: yv-n
    - type: text
      text: David s'en alla, et Jonathan rentra dans la ville.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David à Nob, chez le prêtre Ahimélek
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Goliath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. chap. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vallée du Térébinthe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: éphod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il peut s''agir soit de l’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'éphod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de lin, vêtement liturgique mentionné en 2.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.18 ; 2S 6.14 ; soit plus probablement d''un objet de culte dont on ne connaît pas la forme précise, mentionné en Jg 8.26s ; 17.5 ; 18.14. – L''arme de l''ennemi vaincu avait été déposée dans un sanctuaire, comme ce sera le cas pour les armes de Saül, cf. 31.10.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre répondit : Voici l''épée du Philistin Goliath, que tu as tué dans la vallée du Térébinthe ; elle est enveloppée dans un manteau derrière l''éphod ; si tu veux la prendre, prends-la, car il n''y en a pas d''autre ici. David dit : Il n''y en a pas de pareille, donne-la-moi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David chez les Philistins de Gath
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur la '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: fuite de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 22.1 ; 24.1 ; 27.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Akish
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 27.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 56.1.'
      marker-yv: yv-n
    - type: text
      text: 'Ce jour-là, David s''enfuit pour échapper à Saül. Il arriva chez Akish, roi de Gath. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le roi du pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce titre curieux peut être une abréviation de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: roi du pays d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme déjà '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' l''avait compris ; mais on pourrait aussi y voir un vocatif adressé à Akish'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Roi du pays, n''est-ce pas là David ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Saül…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.7+.'
      marker-yv: yv-n
    - type: text
      text: 'Les gens de la cour d''Akish lui dirent : N''est-ce pas là David, le roi du pays ? N''est-ce pas celui pour qui l''on chantait en dansant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saül a abattu ses milliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et David ses dizaines de milliers !
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prit au sérieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fit attention à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plaça ces paroles dans son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 51.12 ; Pr 29.25.'
      marker-yv: yv-n
    - type: text
      text: 'David prit au sérieux ces paroles ; il avait très peur d''Akish, roi de Gath. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: simula la folie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'changea sa raison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son bon sens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. Ps 34.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ec 7.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parmi eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entre leurs mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faisait des marques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant est dérivé du nom d''une lettre hébraïque ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: taw
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), qui avait la forme d''une croix, comme notre X ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il traçait des croix.
      marker-yv: yv-n
    - type: text
      text: 'Il simula la folie sous leurs yeux et fit des extravagances parmi eux ; il faisait des marques sur les battants des portes et laissait couler sa salive sur sa barbe. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Akish dit aux gens de sa cour : Vous voyez bien que cet homme délire ; pourquoi me l''amenez-vous ? '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'délirer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent deux termes hébreux apparentés (cf. 2R 9.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Est-ce que je manque de fous pour que vous m'ameniez celui-ci délirer devant moi ? Un tel homme va-t-il entrer dans ma maison ?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité proche de Jérusalem, mais non identifiée avec certitude ; cf. 22.9-19 ; Es 10.32 ; Né 11.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ahimélek '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était probablement un frère du prêtre Ahiya, lui aussi fils d''Ahitoub, mentionné en 14.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en tremblant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''arrivée inopinée de David, qui n''est pas accompagné d''une escorte digne d''un chef militaire, jette le trouble et l''inquiétude dans la localité.'
      marker-yv: yv-n
    - type: text
      text: 'David se rendit à Nob, chez Ahimélek, le prêtre, qui vint en tremblant à sa rencontre et lui dit : Pourquoi es-tu seul ? Pourquoi n''y a-t-il personne avec toi ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La réponse évasive de David est justifiée par une prétendue discrétion imposée par le roi. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai donné rendez-vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la traduction suppose une modification (permutation de deux lettres), d''après un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' et plusieurs versions anciennes, du texte hébreu traditionnel qui porte une forme insolite du verbe habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'connaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai fait connaître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ?). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tel et tel endroit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au lieu d'un tel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 6.8 ; Rt 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . – Cf. Ps 119.29 ; Col 3.9.
      marker-yv: yv-n
    - type: text
      text: 'David répondit à Ahimélek, le prêtre : Le roi m''a donné un ordre ; il m''a dit : « Que personne ne sache rien de l''affaire pour laquelle je t''envoie et de l''ordre que je t''ai donné ! » J''ai donné rendez-vous à mes jeunes gens à tel et tel endroit. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cinq pains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 14.17/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que tu pourras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui se trouve(ra).
      marker-yv: yv-n
    - type: text
      text: 'Maintenant qu''as-tu sous la main ? Donne-moi cinq pains ou ce que tu pourras. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pain profane '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pain ordinaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', que tout un chacun peut consommer en tout temps. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pain sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 6 ; cf. Ex 25.30 ; Lv 24.5-9. Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pain sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ne pouvait normalement être consommé que par les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: '  ; Ahimélek admet une exception, pour autant que les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jeunes gens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ne soient pas en état temporaire d'impureté, par suite de relations sexuelles ; cf. Ex 19.15 ; Lv 15.18.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre répondit à David : Je n''ai pas de pain profane sous la main, mais il y a du pain sacré, à condition du moins que tes jeunes gens se soient gardés des femmes ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le verset tout entier est difficile à traduire ; le texte joue sur l''ambiguïté de certains mots ; en particulier, le mot rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'armes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: récipients, ustensiles, objets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') pourrait désigner aussi les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sacs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: militaires, ou même être un euphémisme désignant les organes sexuels (cf. 1Th 4.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme d'habitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme hier, avant-hier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la guerre ayant une dimension religieuse, certains actes profanes étaient interdits aux combattants. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: expédition profane
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans son mensonge, David n''ose pas aller jusqu''à présenter sa fuite sous le couvert d''un acte religieux.'
      marker-yv: yv-n
    - type: text
      text: 'David répondit au prêtre : La femme nous est interdite, comme d''habitude quand je pars en campagne. Si les armes des jeunes gens sont consacrées pour une expédition profane, à plus forte raison y aura-t-il aujourd''hui consécration en ce qui concerne les armes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du pain sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le jour où on le reprend
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit du jour du sabbat, selon Lv 24.8. – Cet épisode est mentionné en Mt 12.3s ; Mc 2.25s ; Lc 6.3s.'
      marker-yv: yv-n
    - type: text
      text: 'Alors le prêtre lui donna du pain sacré, car il n''y avait pas là d''autre pain que le pain offert, celui qu''on retire de devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour le remplacer par du pain chaud le jour où on le reprend. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'retenu… devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être par une obligation religieuse ou par une mission royale, mais on ignore laquelle. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Edomite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : appartenant au peuple descendant d''Esaü (cf. Gn 25.30). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Doëg
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.9 ; Ps 52.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sur le terme hébreu correspondant, cf. Gn 49.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, ce même jour, un homme de la cour de Saül était retenu là, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; c''était un Edomite nommé Doëg, le chef des bergers de Saül. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans ma main.
      marker-yv: yv-n
    - type: text
      text: 'David dit à Ahimélek : N''as-tu pas sous la main une lance ou une épée ? Je n''ai pris avec moi ni mon épée ni mes armes, parce que l''affaire du roi était pressante. '
