document_id: 1SA.21,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Dans certaines éditions de la Bible, ce verset, qui constitue la conclusion du chap. 20, est numéroté 20.43 ; il s'ensuit que les versets suivants du chap. 21 sont numérotés 1 à 15 au lieu de 2 à 16.
  - type: text
    content: David s'en alla, et Jonathan rentra dans la ville.
  - type: heading
    content: David à Nob, chez le prêtre Ahimélek
  '10':
  - type: note
    content: 'Goliath  : cf. chap. 17. –  vallée du Térébinthe  : cf. 17.2n. –  éphod  : il peut s''agir soit de l’éphod de lin, vêtement liturgique mentionné en 2.18n  ; 22.18 ; 2S 6.14 ; soit plus probablement d''un objet de culte dont on ne connaît pas la forme précise, mentionné en Jg 8.26s ; 17.5 ; 18.14. – L''arme de l''ennemi vaincu avait été déposée dans un sanctuaire, comme ce sera le cas pour les armes de Saül, cf. 31.10.'
  - type: text
    content: 'Le prêtre répondit : Voici l''épée du Philistin Goliath, que tu as tué dans la vallée du Térébinthe ; elle est enveloppée dans un manteau derrière l''éphod ; si tu veux la prendre, prends-la, car il n''y en a pas d''autre ici. David dit : Il n''y en a pas de pareille, donne-la-moi.'
  - type: heading
    content: David chez les Philistins de Gath
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Sur la fuite de David , cf. 22.1 ; 24.1 ; 27.1. –  Akish  : cf. 27.1s. –  Gath  : cf. 5.1n  ; Ps 56.1.'
  - type: text
    content: 'Ce jour-là, David s''enfuit pour échapper à Saül. Il arriva chez Akish, roi de Gath. '
  '12':
  - type: note
    content: 'le roi du pays  : ce titre curieux peut être une abréviation de roi du pays d''Israël, comme déjà Syr l''avait compris ; mais on pourrait aussi y voir un vocatif adressé à Akish  : Roi du pays, n''est-ce pas là David ? –  Saül…  : cf. 18.7+.'
  - type: text
    content: 'Les gens de la cour d''Akish lui dirent : N''est-ce pas là David, le roi du pays ? N''est-ce pas celui pour qui l''on chantait en dansant :'
  - type: text
    content: Saül a abattu ses milliers,
  - type: text
    content: et David ses dizaines de milliers !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'prit au sérieux  : autre traduction fit attention à  ; litt. plaça ces paroles dans son cœur . –  peur  : cf. Es 51.12 ; Pr 29.25.'
  - type: text
    content: 'David prit au sérieux ces paroles ; il avait très peur d''Akish, roi de Gath. '
  '14':
  - type: note
    content: 'simula la folie  : litt. changea sa raison (ou son bon sens) ; cf. Ps 34.1n  ; voir aussi Ec 7.7. –  parmi eux  : litt. entre leurs mains. –  faisait des marques  : le verbe hébreu correspondant est dérivé du nom d''une lettre hébraïque (taw), qui avait la forme d''une croix, comme notre X ; autre traduction il traçait des croix.'
  - type: text
    content: 'Il simula la folie sous leurs yeux et fit des extravagances parmi eux ; il faisait des marques sur les battants des portes et laissait couler sa salive sur sa barbe. '
  '15':
  - type: text
    content: 'Akish dit aux gens de sa cour : Vous voyez bien que cet homme délire ; pourquoi me l''amenez-vous ? '
  '16':
  - type: note
    content: fous et délirer traduisent deux termes hébreux apparentés (cf. 2R 9.11n).
  - type: text
    content: Est-ce que je manque de fous pour que vous m'ameniez celui-ci délirer devant moi ? Un tel homme va-t-il entrer dans ma maison ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Nob  : localité proche de Jérusalem, mais non identifiée avec certitude ; cf. 22.9-19 ; Es 10.32 ; Né 11.32. –  Ahimélek était probablement un frère du prêtre Ahiya, lui aussi fils d''Ahitoub, mentionné en 14.3. –  en tremblant  : l''arrivée inopinée de David, qui n''est pas accompagné d''une escorte digne d''un chef militaire, jette le trouble et l''inquiétude dans la localité.'
  - type: text
    content: 'David se rendit à Nob, chez Ahimélek, le prêtre, qui vint en tremblant à sa rencontre et lui dit : Pourquoi es-tu seul ? Pourquoi n''y a-t-il personne avec toi ? '
  '3':
  - type: note
    content: 'La réponse évasive de David est justifiée par une prétendue discrétion imposée par le roi. –  J''ai donné rendez-vous  : la traduction suppose une modification (permutation de deux lettres), d''après un ms de Qumrân et plusieurs versions anciennes, du texte hébreu traditionnel qui porte une forme insolite du verbe habituellement traduit par connaître (j''ai fait connaître  ?). –  tel et tel endroit  : litt. au lieu d''un tel  ; cf. 2R 6.8 ; Rt 4.1n. – Cf. Ps 119.29 ; Col 3.9.'
  - type: text
    content: 'David répondit à Ahimélek, le prêtre : Le roi m''a donné un ordre ; il m''a dit : « Que personne ne sache rien de l''affaire pour laquelle je t''envoie et de l''ordre que je t''ai donné ! » J''ai donné rendez-vous à mes jeunes gens à tel et tel endroit. '
  '4':
  - type: note
    content: 'cinq pains  : cf. Mt 14.17/ /. –  ce que tu pourras  : litt. ce qui se trouve(ra).'
  - type: text
    content: 'Maintenant qu''as-tu sous la main ? Donne-moi cinq pains ou ce que tu pourras. '
  '5':
  - type: note
    content: pain profane ou pain ordinaire, que tout un chacun peut consommer en tout temps. –  pain sacré ou consacré, v. 6 ; cf. Ex 25.30 ; Lv 24.5-9. Le pain sacré ne pouvait normalement être consommé que par les prêtres  ; Ahimélek admet une exception, pour autant que les jeunes gens ne soient pas en état temporaire d'impureté, par suite de relations sexuelles ; cf. Ex 19.15 ; Lv 15.18.
  - type: text
    content: 'Le prêtre répondit à David : Je n''ai pas de pain profane sous la main, mais il y a du pain sacré, à condition du moins que tes jeunes gens se soient gardés des femmes ! '
  '6':
  - type: note
    content: 'Le verset tout entier est difficile à traduire ; le texte joue sur l''ambiguïté de certains mots ; en particulier, le mot rendu par armes (litt. récipients, ustensiles, objets) pourrait désigner aussi les sacs militaires, ou même être un euphémisme désignant les organes sexuels (cf. 1Th 4.4n). –  comme d''habitude  : litt. comme hier, avant-hier  ; cf. 4.7+. –  consacrées  : la guerre ayant une dimension religieuse, certains actes profanes étaient interdits aux combattants. –  expédition profane  : dans son mensonge, David n''ose pas aller jusqu''à présenter sa fuite sous le couvert d''un acte religieux.'
  - type: text
    content: 'David répondit au prêtre : La femme nous est interdite, comme d''habitude quand je pars en campagne. Si les armes des jeunes gens sont consacrées pour une expédition profane, à plus forte raison y aura-t-il aujourd''hui consécration en ce qui concerne les armes. '
  '7':
  - type: note
    content: 'du pain sacré  : litt. du sacré, cf. v. 5. –  le jour où on le reprend  : il s''agit du jour du sabbat, selon Lv 24.8. – Cet épisode est mentionné en Mt 12.3s ; Mc 2.25s ; Lc 6.3s.'
  - type: text
    content: 'Alors le prêtre lui donna du pain sacré, car il n''y avait pas là d''autre pain que le pain offert, celui qu''on retire de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour le remplacer par du pain chaud le jour où on le reprend. '
  '8':
  - type: note
    content: 'retenu… devant le Seigneur  : peut-être par une obligation religieuse ou par une mission royale, mais on ignore laquelle. –  Edomite  : appartenant au peuple descendant d''Esaü (cf. Gn 25.30). –  Doëg  : cf. 22.9 ; Ps 52.2. –  chef  : sur le terme hébreu correspondant, cf. Gn 49.24n.'
  - type: text
    content: 'Or, ce même jour, un homme de la cour de Saül était retenu là, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''était un Edomite nommé Doëg, le chef des bergers de Saül. '
  '9':
  - type: note
    content: 'avec moi  : litt. dans ma main.'
  - type: text
    content: 'David dit à Ahimélek : N''as-tu pas sous la main une lance ou une épée ? Je n''ai pris avec moi ni mon épée ni mes armes, parce que l''affaire du roi était pressante. '
