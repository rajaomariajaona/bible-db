document_id: PSA.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange au Dieu créateur et sauveur
  - type: text
    content: ' '
  - type: note
    content: 'LXX a comme suscription de David  ; cf. 32.11+. –  au sujet du Seigneur  : autres traductions chez le Seigneur, dans le Seigneur , à cause du Seigneur . –  aux gens droits  : cf. Ps 1 ; 11.7 ; 15 ; 24.'
  - type: text
    content: 'Justes, poussez des cris de joie au sujet du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: La louange convient aux gens droits.
  '10':
  - type: text
    content: ' '
  - type: note
    content: les projets ou le projet  ; de même au v. 11, voir 106.13n  ; cf. 2.2ss ; 83.4ss ; Es 5.19n  ; 8.10 ; voir aussi 1Co 1.19. –  contrecarre Nb 32.7n. –  les pensées ou les plans  ; de même au v. 11.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' déjoue les projets des nations,'
  - type: text
    content: il contrecarre les pensées des peuples ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: Es 14.24 ; 46.10 ; Pr 19.21.
  - type: text
    content: 'les projets du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tiennent pour toujours,'
  - type: text
    content: et les pensées de son cœur, de génération en génération.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '144.15. –  Heureuse 1.1+. –  pour patrimoine  : cf. Dt 7.6.'
  - type: text
    content: 'Heureuse la nation qui a le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) pour Dieu,'
  - type: text
    content: le peuple qu'il s'est choisi pour patrimoine !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 11.4+ ; 14.2 ; 53.3 ; cf. Dt 26.15.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regarde du ciel,'
  - type: text
    content: il voit tous les humains ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 66.7 ; 102.20 ; 113.5s. –  du lieu où il habite  : cf. Ex 15.17n  ; 1R 8.13,39ss.'
  - type: text
    content: du lieu où il habite, il observe
  - type: text
    content: tous les habitants de la terre,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'qui façonne à la manière d''un potier, comme en Gn 2.7n. –  leur cœur à tous  : litt. ensemble leur cœur  ; certains ont compris  : qui leur façonne un même cœur  ; cf. 94.9-11 ; 139.13-16 ; Za 12.1.'
  - type: text
    content: lui qui façonne leur cœur à tous,
  - type: text
    content: qui est attentif à toutes leurs œuvres.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 20.8+ ; 147.10 ; 1S 17.45-47 ; Am 2.14-16 ; Pr 21.31. –  sauvé ou victorieux  ; cf. Za 9.9n.
  - type: text
    content: Il n'y a pas de roi qui soit sauvé par une grande armée ;
  - type: text
    content: le vaillant guerrier n'est pas délivré par une grande force.
  '17':
  - type: text
    content: ' '
  - type: note
    content: le salut ou la victoire.
  - type: text
    content: Que le cheval assure le salut, c'est un mensonge,
  - type: text
    content: et toute sa vigueur ne donne pas la délivrance.
  '18':
  - type: text
    content: ' '
  - type: note
    content: L'œil du Seigneur … 32.8n  ; 34.8,16. –  ceux qui le craignent 15.4+. –  ceux qui attendent sa fidélité 31.25+ ; 147.11.
  - type: text
    content: 'L''œil du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sur ceux qui le craignent,'
  - type: text
    content: sur ceux qui attendent sa fidélité,
  '19':
  - type: text
    content: ' '
  - type: note
    content: mort 16.10+. –  famine 37.19.
  - type: text
    content: afin de les délivrer de la mort
  - type: text
    content: et de les faire vivre pendant la famine.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'avec la lyre…  : cf. 43.4 ; 71.22 ; 92.4 ; 98.5 ; 144.9 ; 147.7 ; 150.3. –  jouez 7.18n.'
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec la lyre,'
  - type: text
    content: jouez pour lui du luth à dix cordes.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Nous attendons  : même verbe en 106.13. –  secours / bouclier 3.4+ ; cf. 28.7 ; 40.18 ; 115.9-11 ; 119.114.'
  - type: text
    content: 'Nous attendons le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: il est notre secours, notre bouclier ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'en son nom sacré  : cf. 20.8 ; 124.8 ; Pr 18.10.'
  - type: text
    content: oui, notre cœur se réjouit en lui,
  - type: text
    content: car nous avons mis notre confiance en son nom sacré.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 32.10 ; cf. 90.17.
  - type: text
    content: Seigneur
  - type: text
    content: ', que ta fidélité soit sur nous,'
  - type: text
    content: comme nous t'attendons !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un chant nouveau  : cf. 40.4 ; 96.1 ; 98.1 ; 144.9 ; 149.1 ; Es 42.10 ; Ap 5.9 ; 14.3. –  Jouez bien  : cf. 1S 16.16,18 ; Es 23.16. –  pour l''acclamation  : autres traductions jouez bien l''acclamation sur vos instruments, jouez bien de vos instruments avec l''acclamation  ; cf. 27.6+ ; Nb 10.5n.'
  - type: text
    content: Chantez pour lui un chant nouveau !
  - type: text
    content: Jouez bien de vos instruments pour l'acclamation.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '19.9 ; Dt 32.4. –  s''accomplit  : sous-entendu dans le texte. –  constance et fidélité (v. 5) sont deux synonymes en hébreu.'
  - type: text
    content: 'Car la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est droite ;'
  - type: text
    content: toute son œuvre s'accomplit avec constance.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 89.15 ; cf. 11.7+ ; 37.28. –  la fidélité… 119.64 ; cf. 8.2+.
  - type: text
    content: Il aime la justice et l'équité ;
  - type: text
    content: 'la fidélité du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplit la terre.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'par la parole  : cf. 147.4 ; Gn 1.3n,6,14 ; Es 40.26 ; Jn 1.1-3 ; Hé 11.3. –  le ciel 8.4. –  le souffle (le mot hébreu peut aussi être traduit par esprit ) de sa bouche  : cf. Es 11.4 ; 2Th 2.8. –  toute son armée  : c.-à-d. l''armée du ciel (les astres).'
  - type: text
    content: 'C''est par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que le ciel a été fait,'
  - type: text
    content: – par le souffle de sa bouche, toute son armée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'en une masse  : plusieurs versions anciennes ont lu dans une outre  ; cf. 78.13 ; 104.9 ; Ex 15.8. –  réserves  : le mot est traduit le plus souvent par trésor(s) (cf. Dt 28.12), mais aussi, selon le contexte, magasin (Né 12.44 ; 13.12), arsenal (Jr 50.25), grenier (Jl 1.17) ; cf. Ps 135.6s ; voir aussi Gn 1.2,6ss ; Es 40.12ss ; Jr 10.13 ; 51.16 ; Jb 38.8-11,22,37 ; Pr 8.27-29.'
  - type: text
    content: Il amoncelle en une masse les eaux de la mer,
  - type: text
    content: il met les abîmes dans des réserves.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 67.8 ; 102.16. –  les habitants du monde 24.1.
  - type: text
    content: 'Que toute la terre craigne le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Que tous les habitants du monde tremblent devant lui !
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 6+ ; 148.5 ; Gn 1.3n  ; Es 48.13 ; 55.11.
  - type: text
    content: Car il dit, et la chose arrive ;
  - type: text
    content: il ordonne, elle est là.
