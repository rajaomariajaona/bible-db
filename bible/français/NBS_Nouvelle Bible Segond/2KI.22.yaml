        text: (le même verbe revient trois fois dans ce v.).
    marker-yv: yv-n
  - type: text
    text: 'Elle leur dit : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : Dites à l''homme qui vous a envoyés à moi : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je fais venir sur ce lieu et sur ses habitants un malheur, toutes les paroles du livre qu''a lu le roi de Juda. '
