    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La fin du v. semble tronquée. On pourrait aussi lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', le Dieu d''Israël, a prononcé toutes les paroles que tu as entendues.'
    marker-yv: yv-n
  - type: text
    text: 'Mais vous direz au roi de Juda qui vous a envoyés consulter le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël – les paroles que tu as entendues : '
  - type: usfm
    marker: v
