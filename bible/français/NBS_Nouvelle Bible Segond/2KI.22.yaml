    marker-yv: yv-n
  - type: text
    text: C'est pourquoi je te réunirai à tes pères, tu seras recueilli en paix dans ton tombeau, et tes yeux ne verront pas tout le malheur que je ferai venir sur ce lieu. Ils rapportèrent cette réponse au roi.
