document_id: 2KI.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josias, roi de Juda
  - type: heading
    content: 2Ch 34.1-2
  - type: text
    content: ' '
  - type: note
    content: 'huit ans  : un ms hébreu et deux mss de LXX portent dix-huit ans . –  Yedida signifie bien-aimée (cf. 2S 12.25). –  Botsqath  : ville de Juda, cf. Jos 15.39.'
  - type: text
    content: 'Josias avait huit ans lorsqu''il devint roi ; il régna trente et un ans à Jérusalem. Le nom de sa mère était Yedida, fille d''Adaya, de Botsqath. '
  '10':
  - type: text
    content: 'Shaphân, le scribe, dit encore au roi : Hilqiya, le prêtre, m''a donné un livre. Et Shaphân le lut à haute voix devant le roi.'
  - type: heading
    content: Josias fait consulter la prophétesse Houlda
  - type: heading
    content: 2Ch 34.19-28
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'il déchira ses vêtements  : signe de deuil, de grande tristesse ou de pénitence ; cf. 18.37 ; Gn 37.29,34 ; 44.13 ; 2S 13.31. Josias prend conscience de l''infidélité de Juda à la loi.'
  - type: text
    content: 'Lorsque le roi entendit les paroles du livre de la loi, il déchira ses vêtements. '
  '12':
  - type: note
    content: 'Ahiqam  : cf. 25.22 ; Jr 26.24 ; 39.14. –  Akbor  : cf. Jr 36.12-20.'
  - type: text
    content: 'Le roi donna cet ordre à Hilqiya, le prêtre, à Ahiqam, fils de Shaphân, à Akbor, fils de Michée, à Shaphân, le scribe, et à Asaya, serviteur du roi : '
  '13':
  - type: note
    content: 'selon tout ce qui est écrit  : autre traduction exactement comme il est écrit. –  à notre sujet (cf. Ps 40.8) : litt. sur nous  ; un ms hébreu porte sur lui (c.-à-d. dans le livre) ; certains mss de LXX portent un texte analogue ; cf. 23.3 ; 2Ch 34.21.'
  - type: text
    content: 'Allez consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour moi, pour le peuple et pour tout Juda, au sujet des paroles de ce livre qu''on a trouvé ; car grande est la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: . Elle s'est enflammée contre nous, parce que nos pères n'ont pas écouté les paroles de ce livre ; ils n'ont pas agi selon tout ce qui est écrit à notre sujet.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Shalloum  : à ne pas confondre avec le roi du même nom, cf. 15.10-15. –  Tiqva  : Toqehath en 2Ch 34.22. –  Harhas ou Harham selon plusieurs mss, et Hasra en 2Ch 34.22. –  dans la Ville Neuve  : litt. dans la deuxième (ville).'
  - type: text
    content: 'Hilqiya, le prêtre, Ahiqam, Akbor, Shaphân et Asaya allèrent trouver la prophétesse Houlda, femme de Shalloum, fils de Tiqva, fils de Harhas, gardien des vêtements. Elle habitait à Jérusalem, dans la Ville Neuve. Ils lui parlèrent. '
  '15':
  - type: note
    content: 'parle  : litt. dit (le même verbe revient trois fois dans ce v.).'
  - type: text
    content: 'Elle leur dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Dites à l''homme qui vous a envoyés à moi : '
  '16':
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je fais venir sur ce lieu et sur ses habitants un malheur, toutes les paroles du livre qu''a lu le roi de Juda. '
  '17':
  - type: note
    content: 'Cf. Jr 1.16. –  me contrariant  : autre traduction afin de me contrarier.'
  - type: text
    content: 'Puisqu''ils m''ont abandonné et qu''ils ont offert de l''encens à d''autres dieux, me contrariant ainsi par toutes les œuvres de leurs mains, ma fureur s''est enflammée contre ce lieu : elle ne s''éteindra pas. '
  '18':
  - type: note
    content: La fin du v. semble tronquée. On pourrait aussi lire ainsi le Seigneur, le Dieu d'Israël, a prononcé toutes les paroles que tu as entendues.
  - type: text
    content: 'Mais vous direz au roi de Juda qui vous a envoyés consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël – les paroles que tu as entendues : '
  '19':
  - type: note
    content: 'ton cœur a été touché  : autre traduction ton cœur a molli, c.-à-d. tu as pris peur (cf. Dt 20.3,8 ; Es 7.4 ; Jr 51.46) ; le verbe correspondant à être touché est traduit par être délicat en 2S 3.39 ; 1Ch 22.5 ; 29.1 ; 2Ch 13.7. –  tu t''es humilié  : le verbe hébreu peut évoquer une défaite militaire ; Jg 3.30 ; 8.28 ; 11.33 ; cf. 1R 21.29. –  livrés à la dévastation  : cf. Mi 6.16 ; 2Ch 30.7. –  malédiction  : voir bénédiction, malédiction.'
  - type: text
    content: 'Parce que ton cœur a été touché, parce que tu t''es humilié devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en entendant ce que j''ai dit contre ce lieu et contre ses habitants, qui seront livrés à la dévastation et à la malédiction, parce que tu as déchiré tes vêtements et que tu as pleuré devant moi, moi aussi, j''ai entendu – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '2':
  - type: note
    content: ce qui convenait… 10.30n.
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et suivit en tout la voie de David, son père. Il ne s''en écarta ni à droite ni à gauche.'
  - type: heading
    content: Le grand prêtre découvre le livre de la loi
  - type: heading
    content: 2Ch 34.8-18
  '20':
  - type: note
    content: 'réunirai et recueilli traduisent deux formes différentes d''un même verbe hébreu. –  en paix  : en lisant un texte hébreu un peu différent, LXX a traduit à Jérusalem. –  ton tombeau  : litt. tes tombeaux. –  sur ce lieu  : certains mss de LXX ainsi que 2Ch 34.28 ajoutent et sur ses habitants. –  cette réponse  : litt. une parole.'
  - type: text
    content: C'est pourquoi je te réunirai à tes pères, tu seras recueilli en paix dans ton tombeau, et tes yeux ne verront pas tout le malheur que je ferai venir sur ce lieu. Ils rapportèrent cette réponse au roi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'La dix-huitième année du roi Josias  : LXX précise le huitième (certains mss le septième ) mois . –  Shaphân  : nom désignant le daman (cf. Lv 11.5 ; Dt 14.7). Il est le père d''Ahiqam (v. 12 ; Jr 26.24 ; 39.14) et de Guemaria (Jr 36.10), protecteurs de Jérémie, ainsi que de Yaazania dénoncé par Ezéchiel (Ez 8.11) ; voir scribe. –  Atsalia  : hébreu ’Atsalyahou.'
  - type: text
    content: 'La dix-huitième année du roi Josias, le roi envoya dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' Shaphân, le scribe, fils d''Atsalia, fils de Meshoullam, en lui disant : '
  '4':
  - type: note
    content: 'Hilqiya  : hébreu Hilqiyahou, Portion de YHWH, à ne pas confondre avec le père de Jérémie qui porte le même nom mais qui fait partie du groupe de prêtres exilés à Anatoth (Jr 1.1) ; cf. 1Ch 5.39n. –  qu''il fasse le total  : lisant une forme légèrement différente en hébreu, LXX a compris et verse  ; cf. v. 9. –  les gardiens du seuil  : cf. 12.10n.'
  - type: text
    content: 'Monte trouver Hilqiya, le grand prêtre ; qu''il fasse le total de l''argent qu''on a apporté à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celui que les gardiens du seuil ont recueilli du peuple. '
  '5':
  - type: note
    content: 'à ceux qui ont la responsabilité…  : litt. à ceux qui font les travaux chargés de… –  les fissures  : litt. la fissure.'
  - type: text
    content: 'On le confiera à ceux qui ont la responsabilité de faire les travaux dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils le donneront à ceux qui font les travaux dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour réparer les fissures de la Maison, '
  '6':
  - type: note
    content: la Maison ou le temple  ; quelques mss hébreux, LXX et Syr ajoutent la fissure du temple.
  - type: text
    content: 'aux artisans, aux bâtisseurs, aux maçons, pour les achats de bois et de pierres de taille nécessaires pour réparer la Maison. '
  '7':
  - type: note
    content: on ne leur demandera pas… ou on ne comptera pas avec eux l'argent.
  - type: text
    content: 'Mais on ne leur demandera pas compte pour l''argent qui leur est confié, car ils agissent avec probité. '
  '8':
  - type: note
    content: 'Hilqiya  : hébreu Hilqiyahou, puis Hilqiya  ; cf. v. 4n. –  le livre de la loi v. 11 ; 23.24 ; cf. Dt 28.61+ ; voir l''introduction au Deutéronome♦, et aux Rois♦. –  à haute voix  : sous-entendu dans le texte.'
  - type: text
    content: 'Alors Hilqiya, le grand prêtre, dit à Shaphân, le scribe : J''ai trouvé le livre de la loi dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Hilqiya donna le livre à Shaphân, qui le lut à haute voix. '
  '9':
  - type: note
    content: 'Shaphân, le scribe  : les mots correspondants sont absents de la plupart des mss de LXX. –  alla trouver le roi  : certains mss de LXX lisent l''apporta (le livre) au roi, avec 2Ch 34.16. –  Tes serviteurs ont versé  : autre traduction nous, tes serviteurs, nous avons versé. –  dans la Maison  : certains mss hébreux précisent de YHWH (LXX, Vg la maison du Seigneur). –  à ceux qui ont la responsabilité…  : litt. ils (l’)ont donné sur la main de ceux qui font l''ouvrage, des responsables de la maison de YHWH  ; cf. v. 5n.'
  - type: text
    content: 'Puis Shaphân, le scribe, alla trouver le roi. Il rendit compte au roi en disant : Tes serviteurs ont versé l''argent qui se trouvait dans la Maison à ceux qui ont la responsabilité de faire les travaux dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
