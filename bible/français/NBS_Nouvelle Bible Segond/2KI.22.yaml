    marker-yv: yv-n
  - type: text
    text: 'Parce que ton cœur a été touché, parce que tu t''es humilié devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en entendant ce que j''ai dit contre ce lieu et contre ses habitants, qui seront livrés à la dévastation et à la malédiction, parce que tu as déchiré tes vêtements et que tu as pleuré devant moi, moi aussi, j''ai entendu – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
