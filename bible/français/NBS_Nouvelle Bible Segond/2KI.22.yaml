    marker-yv: yv-n
  - type: text
    text: 'Alors Hilqiya, le grand prêtre, dit à Shaphân, le scribe : J''ai trouvé le livre de la loi dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
