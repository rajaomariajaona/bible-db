  - type: text
    text: 'Puis Shaphân, le scribe, alla trouver le roi. Il rendit compte au roi en disant : Tes serviteurs ont versé l''argent qui se trouvait dans la Maison à ceux qui ont la responsabilité de faire les travaux dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Shaphân, le scribe, dit encore au roi : Hilqiya, le prêtre, m''a donné un livre. Et Shaphân le lut à haute voix devant le roi.'
