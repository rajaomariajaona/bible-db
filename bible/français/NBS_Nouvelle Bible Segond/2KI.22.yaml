    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: afin de me contrarier.
    marker-yv: yv-n
  - type: text
    text: 'Puisqu''ils m''ont abandonné et qu''ils ont offert de l''encens à d''autres dieux, me contrariant ainsi par toutes les œuvres de leurs mains, ma fureur s''est enflammée contre ce lieu : elle ne s''éteindra pas. '
  - type: usfm
