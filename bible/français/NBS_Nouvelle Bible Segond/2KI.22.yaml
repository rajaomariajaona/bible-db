    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' portent un texte analogue ; cf. 23.3 ; 2Ch 34.21.'
    marker-yv: yv-n
  - type: text
    text: 'Allez consulter le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pour moi, pour le peuple et pour tout Juda, au sujet des paroles de ce livre qu''on a trouvé ; car grande est la fureur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Elle s'est enflammée contre nous, parce que nos pères n'ont pas écouté les paroles de ce livre ; ils n'ont pas agi selon tout ce qui est écrit à notre sujet.
