    marker-yv: yv-n
  - type: text
    text: 'Hilqiya, le prêtre, Ahiqam, Akbor, Shaphân et Asaya allèrent trouver la prophétesse Houlda, femme de Shalloum, fils de Tiqva, fils de Harhas, gardien des vêtements. Elle habitait à Jérusalem, dans la Ville Neuve. Ils lui parlèrent. '
