    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shaphân, le scribe
    - type: usfm
      marker: ft
      children:
