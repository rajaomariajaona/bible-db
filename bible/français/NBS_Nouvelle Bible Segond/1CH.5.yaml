document_id: 1CH.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de Ruben
  - type: text
    content: ' '
  - type: note
    content: 'Ruben  : cf. Gn 29.31s. –  profané le lit de son père  : cf. Gn 35.22 ; 49.3s. –  son droit d''aînesse  : LXX sa bénédiction . –  aux fils de Joseph  : quelques mss portent à Joseph  ; LXX à Joseph, son fils, fils d''Israël  ; Joseph est le fils aîné de Rachel, épouse préférée de Jacob, cf. Gn 30.22-24. La Genèse ne déclare pas explicitement que le droit d''aînesse lui a été attribué, mais mentionne sa prééminence sur ses frères (37.3-11 ; 49.22-26) ; de plus le fait que ses deux fils reçoivent chacun une part entière lors du partage de la Terre promise correspond à la législation de Dt 21.17 qui prévoit que l''aîné reçoive une double part de l''héritage paternel. –  pas enregistré… c.-à-d. il ne fut plus considéré comme étant l''aîné, il perdit son droit d''aînesse  ; le texte ne précise pas s''il s''agit de Ruben ou de Joseph.'
  - type: text
    content: 'Fils de Ruben, premier-né d''Israël. – Car il était le premier-né ; mais parce qu''il avait profané le lit de son père, son droit d''aînesse fut donné aux fils de Joseph, fils d''Israël ; ainsi il ne fut pas enregistré selon son droit d''aînesse. '
  '10':
  - type: note
    content: 'Hagarites  : tribu arabe inconnue, probablement à mettre en relation avec Hagar, cf. Gn 21.8-21 ; LXX a lu aux immigrés. –  qui tombèrent entre leurs mains  : autre traduction possible mais ils tombèrent entre leurs mains. –  ils habitèrent…  : LXX porte ils habitèrent dans des tentes jusqu''à ce qu''ils (soient) tous à l''est du Galaad.'
  - type: text
    content: Aux jours de Saül, ils firent la guerre aux Hagarites, qui tombèrent entre leurs mains ; ils habitèrent dans leurs tentes, sur tout le côté oriental du Galaad.
  - type: heading
    content: Les descendants de Gad
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Bashân  : région de Transjordanie, au nord du Galaad.'
  - type: text
    content: 'Les fils de Gad habitaient en face d''eux, au pays du Bashân, jusqu''à Salka. '
  '12':
  - type: note
    content: 'et Shaphath  : au lieu du nom propre, LXX porte le scribe, Tg a compris le juge.'
  - type: text
    content: 'Joël, le chef ; Shapham, le second ; Yanaï et Shaphath, au Bashân. '
  '13':
  - type: note
    content: 'Michel Nb 13.13n. –  Zia  : LXX Zoué. –  Eber  : quelques mss hébreux et un ms de LXX portent Obed, d''autres mss de LXX Yobed.'
  - type: text
    content: 'Leurs frères, famille par famille : Michel, Meshoullam, Shéba, Yoraï, Yakân, Zia et Eber, sept. '
  '14':
  - type: note
    content: 'Yaroah  : un ms hébreu porte Yaroa  ; LXX (selon les mss) Idaï, Adaï ou Aroué  ; Vg Yara. –  Yeshishaï  : LXX Isaï ou Soussi. –  Yahdo  : un ms de LXX porte Youri, d''autres Yeddaï. –  Bouz  : LXX porte Zaboucham ou Achibouz selon les mss.'
  - type: text
    content: 'Voici les fils d''Abihaïl, fils de Houri, fils de Yaroah, fils de Galaad, fils de Michel, fils de Yeshishaï, fils de Yahdo, fils de Bouz ; '
  '15':
  - type: note
    content: 'Ahi  : omis par certains mss de LXX et Syr  ; Vg traduit frères.'
  - type: text
    content: 'Ahi, fils d''Abdiel, fils de Gouni, était à la tête de leurs familles. '
  '16':
  - type: note
    content: 'le Galaad  : omis par Syr, de même que la fin du v. et tous les abords de Sarôn… –  le Bashân  : certains proposent de lire à Yabesh. –  Sarôn  : sans doute en Transjordanie, à ne pas confondre avec le Sharôn ou plaine côtière en bordure de la Méditerranée, entre le Carmel et Jaffa (cf. 27.29 ; Es 33.9n).'
  - type: text
    content: 'Ils habitaient le Galaad, le Bashân et les localités qui en dépendent, et tous les abords de Sarôn jusqu''à leurs extrémités. '
  '17':
  - type: note
    content: 'enregistrés  : cf. v. 1 ; 4.33. –  Jotam (cf. 2R 15.32-38) / Jéroboam (il s''agit de Jéroboam II, cf. 2R 14.23-29) : des mss de LXX portent Joas / Jéroboam et Joas.'
  - type: text
    content: Ils furent tous enregistrés aux jours de Jotam, roi de Juda, et aux jours de Jéroboam, roi d'Israël.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'les Gadites  : certains proposent de lire ici et de Gad , comme dans des versions anciennes. – Une moitié de la tribu de Manassé (cf. v. 23) s''était jointe aux tribus de Ruben et de Gad pour obtenir le droit de s''installer en Transjordanie ; cf. Nb 32 ; Jos 1.12-18 ; 22. –  hommes aptes à porter les armes  : litt. sortant (en) armée  ; cf. 7.11n  ; Nb 1.3n.'
  - type: text
    content: 'Les fils de Ruben, les Gadites et la demi-tribu de Manassé avaient des hommes vaillants, portant le bouclier et l''épée, tirant à l''arc, exercés à la guerre – 44 760 hommes aptes à porter les armes. '
  '19':
  - type: note
    content: 'Hagarites  : cf. v. 10n. –  Yetour / Naphish / Nodab  : trois autres tribus arabes, cf. Gn 25.15 ; ces trois noms sont absents de Syr.'
  - type: text
    content: 'Ils firent la guerre aux Hagarites, à Yetour, à Naphish et à Nodab. '
  '2':
  - type: note
    content: 'Juda  : cf. Gn 29.35 ; 49.8-12. –  un chef  : cf. Ps 60.9 ; Hé 7.14 ; Ap 5.5. –  droit d''aînesse  : LXX bénédiction.'
  - type: text
    content: Juda fut, en effet, puissant parmi ses frères, et de lui est issu un chef, mais le droit d'aînesse appartient à Joseph.
  - type: heading
    content: Gn 46.9  ; Nb 26.5-6
  '20':
  - type: note
    content: 'Ils reçurent du secours contre eux  : le texte correspondant est absent de Syr ; LXX ils l''emportèrent sur eux. –  du secours  : cf. v. 22. –  livrés Gn 9.2n. –  s''était laissé fléchir  : cf. Gn 25.21n  ; 2S 21.14 ; 24.25 ; voir aussi Ps 9.11 ; 2Ch 14.10s ; 18.31.'
  - type: text
    content: 'Ils reçurent du secours contre eux : les Hagarites et tous ceux qui étaient avec eux leur furent livrés. Car, pendant le combat, ils avaient crié vers Dieu, qui s''était laissé fléchir en leur faveur, parce qu''ils avaient mis leur confiance en lui. '
  '21':
  - type: note
    content: '50 000  : LXX porte 5 000. –  personnes  : litt. être (ou vie, cf. Gn 1.20n) d''homme (ou d''humain) : cf. Nb 31.35n,40,46.'
  - type: text
    content: 'Ils capturèrent leurs troupeaux : 50 000 chameaux, 250 000 têtes de petit bétail, 2 000 ânes, ainsi que 100 000 personnes ; '
  '22':
  - type: note
    content: 'le combat venait de Dieu  : cf. Jos 23.10 ; 2Ch 32.8 ; voir aussi Rm 8.31. –  l''exil  : vers 733/2 av. J.-C., Tiglath-Piléser exila les tribus transjordaniennes en Assyrie (2R 15.29).'
  - type: text
    content: beaucoup de victimes tombèrent, car le combat venait de Dieu. Ils s'installèrent à leur place jusqu'à l'exil.
  - type: heading
    content: Les descendants de Manassé en Transjordanie
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 32.39 ; Dt 3.13. –  Senir  : cf. Dt 3.9+.'
  - type: text
    content: 'Les fils de la demi-tribu de Manassé habitaient le pays, depuis le Bashân jusqu''à Baal-Hermon, à Senir et au mont Hermon ; ils étaient nombreux. '
  '24':
  - type: note
    content: 'Syr présente quelques variantes pour certains noms cités ici. –  vaillants guerriers  : cf. 1S 9.1n. –  de renom  : litt. de noms, de même en 12.31 ; cf. 14.17 ; Gn 6.4n  ; Nb 16.2.'
  - type: text
    content: 'Voici les chefs de leurs familles : Epher, Yishéi, Eliel, Azriel, Jérémie, Hodavia et Yahdiel, de vaillants guerriers, des hommes de renom, chefs de leurs familles.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ils commirent des sacrilèges  : cf. 2R 17.7 ; 18.12. –  ils se prostituèrent  : cf. Jg 2.17n  ; Os 1.2n.'
  - type: text
    content: 'Mais ils commirent des sacrilèges envers le Dieu de leurs pères et ils se prostituèrent avec les dieux des peuples du pays que Dieu avait détruits devant eux. '
  '26':
  - type: note
    content: 'éveilla l''esprit  : cf. Esd 1.1n  ; 2Ch 21.16. –  de Poul, roi d''Assyrie, l''esprit  : la portion de texte correspondante est omise par Syr ; Poul et Tilgath-Pilnéser (que certains mss hébreux et certaines versions anciennes donnent sous la forme Tiglath-Pilnéser ou Tiglath-Piléser) sont peut-être deux noms d''un même souverain assyrien ; cf. v. 6n. –  Halah…  : cf. 2R 17.6, où il est question de l''exil des habitants de Samarie par le roi Salmanasar.'
  - type: text
    content: 'Le Dieu d''Israël éveilla l''esprit de Poul, roi d''Assyrie, l''esprit de Tilgath-Pilnéser, roi d''Assyrie, et Tilgath-Pilnéser exila les Rubénites, les Gadites et la demi-tribu de Manassé : il les conduisit à Halah, à Habor, à Hara, près de la rivière de Gozân – jusqu''à ce jour.'
  - type: heading
    content: 'Les descendants de Lévi : les grands prêtres'
  - type: heading
    content: Cf. Gn 46.11  ; Nb 26.59-60
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Certaines traductions de la Bible font des v. 27-41 le début du chap. 6 (v. 1-15). –  Fils de Lévi  : cf. 6.1-15 ; Ex 6.16-25 ; Nb 3.14-39. –  Guershôn  : cf. 6.1n.'
  - type: text
    content: 'Fils de Lévi : Guershôn, Qehath et Merari. '
  '28':
  - type: text
    content: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel. '
  '29':
  - type: note
    content: 'Aaron / Moïse / Miriam Ex 6.20 ; Nb 26.59 ; Mi 6.4. –  Fils d''Aaron  : cf. Lv 10.'
  - type: text
    content: 'Fils d''Amram : Aaron et Moïse ; et Miriam. Fils d''Aaron : Nadab, Abihou, Eléazar et Itamar. '
  '3':
  - type: text
    content: 'Fils de Ruben, premier-né d''Israël : Hénoch, Pallou, Hetsrôn et Karmi.'
  '30':
  - type: note
    content: 'La liste des v. 30-41 énumère les grands prêtres successifs de la communauté israélite ; cf. Esd 7.1-5. –  Phinéas  : cf. Nb 25.7+.'
  - type: text
    content: 'Eléazar engendra Phinéas ; Phinéas engendra Abishoua ; '
  '31':
  - type: text
    content: 'Abishoua engendra Bouqqi ; Bouqqi engendra Ouzzi ; '
  '32':
  - type: text
    content: 'Ouzzi engendra Zerahia ; Zerahia engendra Merayoth ; '
  '33':
  - type: text
    content: 'Merayoth engendra Amaria ; Amaria engendra Ahitoub ; '
  '34':
  - type: note
    content: 'Tsadoq  : cf. 2S 8.17. –  Ahimaats  : cf. 2S 15.27.'
  - type: text
    content: 'Ahitoub engendra Tsadoq ; Tsadoq engendra Ahimaats ; '
  '35':
  - type: text
    content: 'Ahimaats engendra Azaria ; Azaria engendra Yohanân ; '
  '36':
  - type: note
    content: 'Azaria  : cf. 1R 4.2.'
  - type: text
    content: 'Yohanân engendra Azaria, qui exerça le sacerdoce dans la maison que Salomon avait bâtie à Jérusalem. '
  '37':
  - type: note
    content: 'Amaria  : cf. 2Ch 19.11. –  Ahitoub  : cf. Esd 7.2.'
  - type: text
    content: 'Azaria engendra Amaria ; Amaria engendra Ahitoub ; '
  '38':
  - type: note
    content: 'Shalloum  : cf. Esd 7.2.'
  - type: text
    content: 'Ahitoub engendra Tsadoq ; Tsadoq engendra Shalloum ; '
  '39':
  - type: note
    content: 'Hilqiya  : cf. 2R 22.4. –  Azaria  : cf. 2Ch 26.17-20.'
  - type: text
    content: 'Shalloum engendra Hilqiya ; Hilqiya engendra Azaria ; '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Fils de Joël  : certains mss de LXX portent Joël, son fils  ; Syr fils de Karmi (cf. v. 3). –  Shemaya  : LXX Banaya . –  Gog  : LXX Goug , Syr Doug.'
  - type: text
    content: 'Fils de Joël : Shemaya, son fils ; Gog, son fils ; Shiméi, son fils ; '
  '40':
  - type: note
    content: 'Seraya  : cf. 2R 25.18 ; Né 11.11. –  Yehotsadaq  : cf. Ag 1.1 ; Esd 5.2 (Yotsadaq).'
  - type: text
    content: 'Azaria engendra Seraya ; Seraya engendra Yehotsadaq. '
  '41':
  - type: note
    content: Cf. 2R 25.
  - type: text
    content: 'Yehotsadaq s''en alla quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' exila Juda et Jérusalem par l''intermédiaire de Nabuchodonosor.'
  '5':
  - type: note
    content: 'Baal  : LXX Joël.'
  - type: text
    content: 'Michée, son fils ; Réaya, son fils ; Baal, son fils ; '
  '6':
  - type: note
    content: Tilgath-Pilnéser (cf. v. 26n) est appelé Tiglath-Piléser en 2R 15.29 (transcription de l'assyrien Toukoulti-Apil-Esharra) et Poul en 2R 15.19.
  - type: text
    content: 'Bééra, son fils, que Tilgath-Pilnéser, roi d''Assyrie, exila : il était prince des Rubénites. '
  '7':
  - type: note
    content: 'Frères de Bééra  : litt. ses frères. –  clan par clan  : litt. pour ses clans  ; la plupart des versions anciennes portent pour leurs clans. –  Yéiel  : LXX loél (= Joël).'
  - type: text
    content: 'Frères de Bééra, clan par clan, tels qu''ils sont enregistrés selon leur généalogie : le premier, Yéiel ; Zacharie ; '
  '8':
  - type: note
    content: 'Il habitait  : peut-être Béla  ; mais on pourrait aussi comprendre ce singulier comme un collectif désignant les descendants de Ruben  ; de même au v. 9. –  Aroër / Nebo/ Baal-Méôn  : trois localités de Transjordanie ; cf. Nb 32.34-38 ; Jos 13.15-17.'
  - type: text
    content: 'Béla, fils d''Azaz, fils de Shéma, fils de Joël. Il habitait à Aroër, et jusqu''à Nebo et à Baal-Méôn ; '
  '9':
  - type: note
    content: 'l''Euphrate  : le grand fleuve de Babylonie coule à 800 km environ à l''est du territoire de la tribu de Ruben ; le texte hébreu, quelque peu imprécis, signifie probablement que le désert (d''Arabie) s''étend entre le pays des Rubénites et l''Euphrate. –  Galaad  : cf. Jos 22.'
  - type: text
    content: 'à l''est, il habitait jusqu''à l''entrée du désert du côté de l''Euphrate, car leurs troupeaux étaient nombreux au pays de Galaad. '
