        children:
        - type: text
          text: ' : quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Joseph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Joseph, son fils, fils d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; Joseph est le fils aîné de Rachel, épouse préférée de Jacob, cf. Gn 30.22-24. La Genèse ne déclare pas explicitement que le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'droit d''aînesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'lui a été attribué, mais mentionne sa prééminence sur ses frères (37.3-11 ; 49.22-26) ; de plus le fait que ses deux fils reçoivent chacun une part entière lors du partage de la Terre promise correspond à la législation de Dt 21.17 qui prévoit que l''aîné reçoive une double part de l''héritage paternel. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas enregistré… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne fut plus considéré comme étant l'aîné, il perdit son droit d'aînesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; le texte ne précise pas s'il s'agit de Ruben ou de Joseph.
      marker-yv: yv-n
    - type: text
      text: 'Fils de Ruben, premier-né d''Israël. – Car il était le premier-né ; mais parce qu''il avait profané le lit de son père, son droit d''aînesse fut donné aux fils de Joseph, fils d''Israël ; ainsi il ne fut pas enregistré selon son droit d''aînesse. '
