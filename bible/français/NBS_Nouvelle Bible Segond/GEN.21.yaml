document_id: GEN.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance d'Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.15-21 ; 18.9-15 ; cf. Ga 4.23 ; Hé 11.11s.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' intervint en faveur de Sara, comme il l''avait dit ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' agit envers Sara selon sa parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 18.10,14.'
    marker-yv: yv-n
  - type: text
    text: 'Sara fut enceinte et donna un fils à Abraham dans sa vieillesse, au temps fixé dont Dieu lui avait parlé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',19 ; 21.6,9. – Sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Isaac '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hors du Pentateuque, voir 17.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Abraham appela du nom d''Isaac (« Rire ») le fils qui était né de lui, celui que Sara lui avait donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abraham '
      - type: usfm
        marker: w
        children:
        - type: text
          text: circoncit
      - type: text
        text: ' son fils'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 17.9-14 ; Ac 7.8.'
    marker-yv: yv-n
  - type: text
    text: 'Abraham circoncit son fils Isaac à l''âge de huit jours, comme Dieu le lui avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.1.
    marker-yv: yv-n
  - type: text
    text: 'Abraham avait cent ans à la naissance de son fils Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 17.17
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu m'a suscité du rire… rira à mon sujet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''hébreu, ambigu, peut signifier soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu m'a fait rire de joie… rira avec moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit négativement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu a fait de moi la risée des gens… rira de moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se réjouira avec moi.
    marker-yv: yv-n
  - type: text
    text: 'Alors Sara dit : Dieu m''a suscité du rire ; quiconque l''apprendra rira à mon sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pourtant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car.
    marker-yv: yv-n
  - type: text
    text: 'Elle ajouta : Qui aurait dit à Abraham que Sara allaiterait des enfants ? Pourtant je lui ai donné un fils dans sa vieillesse !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'enfant grandit et fut sevré. Abraham donna un grand banquet le jour où Isaac fut sevré.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham renvoie Hagar et Ismaël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'amuser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; c''est ici une autre forme du verbe associé au nom d''Isaac (v. 6 ; 17.17+) ; elle peut signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plaisanter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(19.14) ; sur ses différents sens, cf. 26.8 ; 39.14,17 ; Ex 32.6 ; Jg 16.25. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui jouait avec son fils Isaac
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ga 4.29 interprète ce rire en mauvaise part (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: persécutait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Sara vit rire le fils que l''Egyptienne Hagar avait donné à Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 16.6ss ; voir aussi 25.6 ; Jn 8.33,35 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ga 4.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'héritera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Elle dit à Abraham : Chasse cette servante et son fils, car le fils de cette servante n''héritera pas avec Isaac, mon fils ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.18.
    marker-yv: yv-n
  - type: text
    text: 'Cette parole déplut beaucoup à Abraham, à cause de son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est par Isaac…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : phrase difficile, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par Isaac sera appelée pour toi une descendance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . On comprend habituellement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'c''est par Isaac que tu auras ta vraie descendance, celle qui sera appelée descendance d''Abraham '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir cependant v. 13) ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rm 9.7 ; Hé 11.18.
    marker-yv: yv-n
  - type: text
    text: 'Mais Dieu dit à Abraham : Que cela ne te déplaise pas, à cause du garçon et de ta servante. Ecoute tout ce que Sara te dira ; car c''est par Isaac que viendra ce qui sera appelé ta descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une nation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Smr
      - type: text
        text: ', LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une grande nation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 18). Voir 16.10 ; 17.20+.
    marker-yv: yv-n
  - type: text
    text: Quant au fils de ta servante, je ferai aussi de lui une nation, car il est ta descendance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'D''après Syr et plusieurs mss de LXX, certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''il donna à Hagar, et il plaça l''enfant sur ses épaules '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(mais d''après 17.25 Ismaël aurait eu au moins 14 ans). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit à errer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'égara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 20.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bersabée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Béer-Shéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ville du Néguev qui existe encore de nos jours (v. 31s).'
    marker-yv: yv-n
  - type: text
    text: 'Abraham se leva de bon matin ; il prit du pain et une outre d''eau qu''il donna à Hagar, mettant cela sur ses épaules, ainsi que l''enfant, puis il la renvoya. Elle s''en alla et se mit à errer dans le désert de Bersabée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: abandonna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jeta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur le verbe correspondant, cf. Ps 71.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand l''eau de l''outre fut épuisée, elle abandonna l''enfant sous l''un des arbrisseaux '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: portée d'arc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit à sangloter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après LXX, c''est l''enfant qui pleure (cf. v. 17).'
    marker-yv: yv-n
  - type: text
    text: 'pour aller s''asseoir à l''écart, à une portée d''arc ; car elle disait : Que je ne voie pas mourir l''enfant ! Elle s''assit donc à l''écart et se mit à sangloter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: messager
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'N''aie pas peur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.1+ ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : allusion au nom d''Ismaël, cf. 16.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 17.20+.'
    marker-yv: yv-n
  - type: text
    text: 'Dieu entendit le garçon ; le messager de Dieu appela Hagar depuis le ciel et lui dit : Qu''as-tu, Hagar ? N''aie pas peur, car Dieu a entendu le garçon là où il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lève-toi, prends le garçon et tiens-le bien ; car je ferai de lui une grande nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 15 ; cf. 16.7.
    marker-yv: yv-n
  - type: text
    text: 'Dieu lui ouvrit les yeux, et elle vit un puits ; elle alla remplir l''outre d''eau et fit boire le garçon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tireur à l'arc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte hébreu traditionnel porte une forme inhabituelle ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un archer fort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: habile
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Dieu fut avec le garçon, qui grandit ; il s''installa dans le désert et devint tireur à l''arc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Parân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 14.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : entre le Sinaï et le Néguev, à l''ouest de la Araba, la plaine aride au sud de la mer Morte (cf. Nb 12.16). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une femme d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
