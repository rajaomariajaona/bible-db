document_id: GEN.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance d'Isaac
  - type: text
    content: ' '
  - type: note
    content: 17.15-21 ; 18.9-15 ; cf. Ga 4.23 ; Hé 11.11s.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' intervint en faveur de Sara, comme il l''avait dit ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agit envers Sara selon sa parole. '
  '10':
  - type: note
    content: Cf. 16.6ss ; voir aussi 25.6 ; Jn 8.33,35 ; Ga 4.30. –  héritera 15.3n.
  - type: text
    content: 'Elle dit à Abraham : Chasse cette servante et son fils, car le fils de cette servante n''héritera pas avec Isaac, mon fils ! '
  '11':
  - type: note
    content: 17.18.
  - type: text
    content: 'Cette parole déplut beaucoup à Abraham, à cause de son fils. '
  '12':
  - type: note
    content: 'c''est par Isaac…  : phrase difficile, litt. par Isaac sera appelée pour toi une descendance. On comprend habituellement  : c''est par Isaac que tu auras ta vraie descendance, celle qui sera appelée descendance d''Abraham (voir cependant v. 13) ; Rm 9.7 ; Hé 11.18.'
  - type: text
    content: 'Mais Dieu dit à Abraham : Que cela ne te déplaise pas, à cause du garçon et de ta servante. Ecoute tout ce que Sara te dira ; car c''est par Isaac que viendra ce qui sera appelé ta descendance. '
  '13':
  - type: note
    content: 'une nation  : Smr, LXX, Syr, Vg précisent une grande nation (cf. v. 18). Voir 16.10 ; 17.20+.'
  - type: text
    content: Quant au fils de ta servante, je ferai aussi de lui une nation, car il est ta descendance.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'D''après Syr et plusieurs mss de LXX, certains modifient le texte hébreu traditionnel pour lire qu''il donna à Hagar, et il plaça l''enfant sur ses épaules (mais d''après 17.25 Ismaël aurait eu au moins 14 ans). –  se mit à errer  : autre traduction s''égara  ; cf. 20.13n. –  Bersabée ou Béer-Shéba , ville du Néguev qui existe encore de nos jours (v. 31s).'
  - type: text
    content: 'Abraham se leva de bon matin ; il prit du pain et une outre d''eau qu''il donna à Hagar, mettant cela sur ses épaules, ainsi que l''enfant, puis il la renvoya. Elle s''en alla et se mit à errer dans le désert de Bersabée. '
  '15':
  - type: note
    content: 'abandonna  : autre traduction jeta  ; sur le verbe correspondant, cf. Ps 71.9n.'
  - type: text
    content: 'Quand l''eau de l''outre fut épuisée, elle abandonna l''enfant sous l''un des arbrisseaux '
  '16':
  - type: note
    content: 'portée d''arc  : cf. v. 20. –  se mit à sangloter  : d''après LXX, c''est l''enfant qui pleure (cf. v. 17).'
  - type: text
    content: 'pour aller s''asseoir à l''écart, à une portée d''arc ; car elle disait : Que je ne voie pas mourir l''enfant ! Elle s''assit donc à l''écart et se mit à sangloter. '
  '17':
  - type: note
    content: 'messager  : autre traduction ange. –  N''aie pas peur 15.1+ ; voir crainte. –  entendu  : allusion au nom d''Ismaël, cf. 16.11n  ; 17.20+.'
  - type: text
    content: 'Dieu entendit le garçon ; le messager de Dieu appela Hagar depuis le ciel et lui dit : Qu''as-tu, Hagar ? N''aie pas peur, car Dieu a entendu le garçon là où il est. '
  '18':
  - type: note
    content: V. 13n.
  - type: text
    content: 'Lève-toi, prends le garçon et tiens-le bien ; car je ferai de lui une grande nation. '
  '19':
  - type: note
    content: V. 15 ; cf. 16.7.
  - type: text
    content: 'Dieu lui ouvrit les yeux, et elle vit un puits ; elle alla remplir l''outre d''eau et fit boire le garçon. '
  '2':
  - type: note
    content: 17.21n  ; 18.10,14.
  - type: text
    content: 'Sara fut enceinte et donna un fils à Abraham dans sa vieillesse, au temps fixé dont Dieu lui avait parlé. '
  '20':
  - type: note
    content: 'tireur à l''arc  : le texte hébreu traditionnel porte une forme inhabituelle ; on pourrait aussi comprendre un archer fort (c.-à-d. habile).'
  - type: text
    content: 'Dieu fut avec le garçon, qui grandit ; il s''installa dans le désert et devint tireur à l''arc. '
  '21':
  - type: note
    content: 'Parân (voir 14.6n) : entre le Sinaï et le Néguev, à l''ouest de la Araba, la plaine aride au sud de la mer Morte (cf. Nb 12.16). –  une femme d''Egypte 16.1n.'
  - type: text
    content: Il s'installa dans le désert de Parân ; sa mère prit pour lui une femme d'Egypte.
  - type: heading
    content: Abraham fait alliance avec Abimélek
  '22':
  - type: text
    content: ' '
  - type: note
    content: '20.2 ; cf. 26.12-33. –  Pikol v. 32 ; 26.26. –  Dieu est avec toi  : autre traduction les dieux sont avec toi  ; même possibilité au v. 23 ( par Dieu ou par les dieux ).'
  - type: text
    content: 'En ce temps-là, Abimélek, avec Pikol, le chef de son armée, vint dire à Abraham : Dieu est avec toi dans tout ce que tu fais. '
  '23':
  - type: note
    content: 'Cf. 14.22s. –  progéniture / postérité Es 14.22n  ; Jb 18.19. –  séjourné en immigré  : cf. 12.10n  ; 20.1n. –  fidélité  : cf. v. 13 ; 19.19 ; Jos 2.12.'
  - type: text
    content: 'Maintenant, jure-moi ici, par Dieu, que tu ne me tromperas pas, ni moi, ni ma progéniture, ni ma postérité, et que tu montreras envers moi et envers le pays où tu as séjourné en immigré la même fidélité que j''ai montrée envers toi. '
  '24':
  - type: text
    content: 'Abraham dit : Je le jure. '
  '25':
  - type: note
    content: 'fit des reproches  : autre traduction avait fait des reproches. –  s''étaient emparés de force  : cf. 31.31n.'
  - type: text
    content: 'Abraham fit des reproches à Abimélek au sujet d''un puits dont les gens d''Abimélek s''étaient emparés de force. '
  '26':
  - type: text
    content: 'Abimélek dit : Je ne sais pas qui a fait cela ; toi, tu ne me l''avais pas rapporté, et moi-même je ne l''apprends qu''aujourd''hui. '
  '27':
  - type: note
    content: 31.44.
  - type: text
    content: 'Alors Abraham prit du petit bétail et du gros bétail, qu''il donna à Abimélek ; puis ils conclurent une alliance tous les deux. '
  '28':
  - type: text
    content: 'Abraham plaça à part sept brebis du troupeau, '
  '29':
  - type: text
    content: 'et Abimélek dit à Abraham : Qu''est-ce que ces sept brebis que tu as placées à part ? '
  '3':
  - type: note
    content: 17.17n,19 ; 21.6,9. – Sur Isaac hors du Pentateuque, voir 17.5n.
  - type: text
    content: 'Abraham appela du nom d''Isaac (« Rire ») le fils qui était né de lui, celui que Sara lui avait donné. '
  '30':
  - type: text
    content: 'Il répondit : Tu prendras ces sept brebis ; ce sera pour moi un témoignage que c''est moi qui ai creusé ce puits. '
  '31':
  - type: note
    content: Bersabée (v. 14n) peut se traduire par Puits des Sept (v. 28-30) ou Puits du Serment (v. 23s,31). Voir 26.33n.
  - type: text
    content: 'C''est pourquoi on a appelé ce lieu Bersabée (« Puits des Sept » ou « Puits du Serment »), car c''est là qu''ils prêtèrent serment l''un et l''autre. '
  '32':
  - type: note
    content: 'Abimélek…  : litt. Abimélek se leva (après le repas d’alliance  ?), et Pikol… et ils retournèrent… –  Philistins 10.14n.'
  - type: text
    content: 'Ils conclurent donc une alliance à Bersabée. Après quoi Abimélek et Pikol, le chef de son armée, retournèrent au pays des Philistins. '
  '33':
  - type: note
    content: il invoqua… 4.26+. –  Dieu de pérennité ou Dieu de perpétuité, ou encore Dieu d'autrefois, hébreu ’El ‘olam, sans doute une des appellations cananéennes du Dieu suprême (’El, cf. 14.18n  ; 16.13n  ; 17.1n  ; 33.20n  ; 35.1n,3,7n  ; 46.3n  ; 49.25n  ; Es 14.13n). A Ougarit El est considéré comme le père des dieux. Cependant, dans la Bible, ce nom sera souvent employé comme un simple équivalent poétique d’’Elohim, Dieu (cf. Gn 1.1n) ; il entre souvent dans la composition des noms de personnes (Samuel, Ezéchiel, Daniel, Emmanuel…).
  - type: text
    content: 'Abraham planta un tamaris à Bersabée, et il invoqua le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu de pérennité. '
  '34':
  - type: text
    content: Abraham séjourna longtemps en immigré au pays des Philistins.
  '4':
  - type: note
    content: 'Abraham circoncit son fils  : 17.9-14 ; Ac 7.8.'
  - type: text
    content: 'Abraham circoncit son fils Isaac à l''âge de huit jours, comme Dieu le lui avait ordonné. '
  '5':
  - type: note
    content: 17.1.
  - type: text
    content: 'Abraham avait cent ans à la naissance de son fils Isaac. '
  '6':
  - type: note
    content: 'Cf. 17.17n. –  Dieu m''a suscité du rire… rira à mon sujet  : l''hébreu, ambigu, peut signifier soit Dieu m''a fait rire de joie… rira avec moi, soit négativement Dieu a fait de moi la risée des gens… rira de moi. LXX se réjouira avec moi.'
  - type: text
    content: 'Alors Sara dit : Dieu m''a suscité du rire ; quiconque l''apprendra rira à mon sujet. '
  '7':
  - type: note
    content: 'Pourtant  : autre traduction car.'
  - type: text
    content: 'Elle ajouta : Qui aurait dit à Abraham que Sara allaiterait des enfants ? Pourtant je lui ai donné un fils dans sa vieillesse !'
  '8':
  - type: text
    content: L'enfant grandit et fut sevré. Abraham donna un grand banquet le jour où Isaac fut sevré.
  - type: heading
    content: Abraham renvoie Hagar et Ismaël
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'rire  : autre traduction s''amuser  ; c''est ici une autre forme du verbe associé au nom d''Isaac (v. 6 ; 17.17+) ; elle peut signifier plaisanter (19.14) ; sur ses différents sens, cf. 26.8 ; 39.14,17 ; Ex 32.6 ; Jg 16.25. LXX qui jouait avec son fils Isaac . Ga 4.29 interprète ce rire en mauvaise part ( persécutait ).'
  - type: text
    content: 'Sara vit rire le fils que l''Egyptienne Hagar avait donné à Abraham. '
