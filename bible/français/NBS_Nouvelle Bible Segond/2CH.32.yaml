          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 14.43 ; Dt 20.4 ; Jg 6.12+,16+ ; voir aussi Es 7.14 ; 8.8,10.'
      marker-yv: yv-n
    - type: text
      text: 'avec lui il y a un bras de chair ; avec nous, il y a le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, qui viendra à notre secours et qui mènera nos combats. Le peuple s''appuya sur les paroles d''Ezéchias, roi de Juda.'
