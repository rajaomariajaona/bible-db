        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 20.15+.
      marker-yv: yv-n
    - type: text
      text: 'Soyez forts et courageux ! N''ayez pas peur, ne soyez pas terrifiés par le roi d''Assyrie et par toute la multitude qui est avec lui ; car avec nous il y a plus qu''avec lui : '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
