          text: il fit.
      marker-yv: yv-n
    - type: text
      text: 'Il devint fort ; il rebâtit la muraille, où il y avait des brèches, et il l''éleva jusqu''aux tours, il bâtit une autre muraille en dehors, il répara le Millo dans la Ville de David et il se procura une quantité d''armes et de boucliers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.6 '
      - type: usfm
        marker: fq
        children:
