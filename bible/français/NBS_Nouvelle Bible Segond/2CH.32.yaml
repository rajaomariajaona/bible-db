    - type: text
      text: 'Une foule de gens se rassemblèrent ; ils bouchèrent toutes les sources et l''oued qui coule au milieu du pays. Pourquoi, disaient-ils, les rois d''Assyrie trouveraient-ils à leur arrivée de l''eau en abondance ? '
