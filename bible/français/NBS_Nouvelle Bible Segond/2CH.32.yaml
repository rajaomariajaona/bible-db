        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il plaça des chefs militaires à la tête du peuple et il les rassembla auprès de lui sur la place de la porte de la ville. Il parla à leur cœur, en disant : '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
