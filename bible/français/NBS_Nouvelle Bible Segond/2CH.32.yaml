document_id: 2CH.32,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sennachérib envahit le royaume de Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 18.13 ; Es 36.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Après ces actes de loyauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'après ces choses et cette loyauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette vérité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Après ces actes de loyauté, survint Sennachérib, roi d''Assyrie ; il pénétra en Juda, dressa son camp contre les villes fortes et ordonna de les forcer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la détresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en état de siège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 28.53'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 19.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle Sennachérib, roi d''Assyrie : En quoi mettez-vous votre confiance, pour rester à Jérusalem dans la détresse ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'N''est-ce pas Ezéchias qui vous entraîne, pour vous livrer à la mort par la famine et par la soif, quand il dit : « Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), notre Dieu, nous délivrera de la main du roi d''Assyrie. » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses hauts lieux et ses autels
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. ceux de YHWH. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un seul autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cet autel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 2R 18.22 ; Es 36.7.'
      marker-yv: yv-n
    - type: text
      text: 'N''est-ce pas lui, Ezéchias, qui a supprimé ses hauts lieux et ses autels, et qui a dit à Juda et à Jérusalem : « C''est devant un seul autel que vous vous prosternerez, c''est sur lui que vous offrirez de l''encens. » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ne savez-vous pas ce que nous avons fait, moi et mes pères, à tous les peuples des pays ? Les dieux des nations de ces pays ont-ils vraiment pu délivrer leurs pays de ma main ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: 'Qui donc, parmi tous les dieux de ces nations que mes pères ont frappées d''anathème, a pu délivrer son peuple de ma main, pour que votre Dieu puisse vous délivrer de ma main ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Maintenant, qu''Ezéchias ne vous trompe pas ! Qu''il ne vous entraîne pas de cette manière ! Ne le croyez pas ! Car aucun dieu d''aucune nation ni d''aucun royaume n''a pu délivrer son peuple de ma main ni de la main de mes pères : vos dieux ne vous délivreront pas davantage de ma main !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Sennachérib insulte le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 19.8-13  ; Es 37.8-13
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les gens de Sennachérib
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses serviteurs.
      marker-yv: yv-n
    - type: text
      text: 'Les gens de Sennachérib parlèrent encore contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu et contre Ezéchias, son serviteur. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sennachérib
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une lettre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au pluriel dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'outrager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: déshonorer, défier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1S 17.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 9.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 20.7.'
      marker-yv: yv-n
    - type: text
      text: 'Sennachérib avait écrit une lettre pour outrager le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu d''Israël, en s''exprimant ainsi contre lui : De même que les dieux des nations des pays n''ont pu délivrer leur peuple de ma main, de même le Dieu d''Ezéchias ne délivrera pas son peuple de ma main. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils crièrent à pleine voix en judéen, afin de jeter la crainte et l''épouvante parmi le peuple de Jérusalem qui était sur la muraille et de pouvoir ainsi prendre la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2R 19.18.
      marker-yv: yv-n
    - type: text
      text: Ils parlèrent du Dieu de Jérusalem comme des dieux des autres peuples de la terre, qui sont l'œuvre de mains humaines.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu délivre Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 19.35-37  ; Es 37.36-38
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ezéchias, voyant que Sennachérib était venu et qu''il se préparait à attaquer Jérusalem, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le roi Ezéchias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2R 19.15 ; Es 37.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaïe…, le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi Ezéchias et Esaïe, fils d''Amots, le prophète, se mirent à prier à ce sujet ; ils crièrent vers le ciel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui extermina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe est souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire disparaître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le roi retourna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il retourna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de son dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ses dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses propres fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte hébreu, incertain, semble signifier litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'entre ceux qui étaient sortis de ses entrailles.
      marker-yv: yv-n
    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' envoya un messager, qui extermina dans le camp du roi d''Assyrie tous les vaillants guerriers, les chefs et les princes. Alors le roi retourna dans son pays, la honte au visage. Il entra dans la maison de son dieu, et là ses propres fils le firent tomber par l''épée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les protégea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; le verbe hébreu signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'diriger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: conduire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur accorda le repos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 14.6 ; 15.15 ; 20.30 ; 1Ch 22.18).
      marker-yv: yv-n
    - type: text
      text: 'Ainsi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sauva Ezéchias et les habitants de Jérusalem de la main de Sennachérib, roi d''Assyrie, et de la main de tous, et il les protégea contre ceux qui les entouraient. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des offrandes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des offrandes végétales
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lv 2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 16.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Beaucoup de gens apportèrent à Jérusalem des offrandes pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et de riches présents pour Ezéchias, roi de Juda, qui depuis lors fut élevé sous les yeux de toutes les nations.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin du règne d'Ezéchias
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maladie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et la '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: guérison
        - type: text
          text: ' d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 2R 20.1-11 ; Es 38.1-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fut atteint d'une maladie mortelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fut malade et tout près de la mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fut malade jusqu'à mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression très légèrement différente de celle de 2R 20.1 ; Es 38.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui-ci lui répondit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la tournure introduit normalement un discours direct ; certains pensent que l''oracle proprement dit a disparu du texte hébreu traditionnel ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui-ci l'exauça
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prodige
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
