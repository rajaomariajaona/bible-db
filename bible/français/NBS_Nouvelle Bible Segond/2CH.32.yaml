document_id: 2CH.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sennachérib envahit le royaume de Juda
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 18.13 ; Es 36.1. –  Après ces actes de loyauté  : litt. après ces choses et cette loyauté (ou cette vérité ).'
  - type: text
    content: 'Après ces actes de loyauté, survint Sennachérib, roi d''Assyrie ; il pénétra en Juda, dressa son camp contre les villes fortes et ordonna de les forcer. '
  '10':
  - type: note
    content: 'dans la détresse  : autre traduction en état de siège  ; cf. Dt 28.53n  ; Jr 19.9n.'
  - type: text
    content: 'Ainsi parle Sennachérib, roi d''Assyrie : En quoi mettez-vous votre confiance, pour rester à Jérusalem dans la détresse ? '
  '11':
  - type: text
    content: 'N''est-ce pas Ezéchias qui vous entraîne, pour vous livrer à la mort par la famine et par la soif, quand il dit : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, nous délivrera de la main du roi d''Assyrie. » '
  '12':
  - type: note
    content: 'ses hauts lieux et ses autels, c.-à-d. ceux de YHWH. –  un seul autel  : LXX cet autel, comme en 2R 18.22 ; Es 36.7.'
  - type: text
    content: 'N''est-ce pas lui, Ezéchias, qui a supprimé ses hauts lieux et ses autels, et qui a dit à Juda et à Jérusalem : « C''est devant un seul autel que vous vous prosternerez, c''est sur lui que vous offrirez de l''encens. » '
  '13':
  - type: text
    content: 'Ne savez-vous pas ce que nous avons fait, moi et mes pères, à tous les peuples des pays ? Les dieux des nations de ces pays ont-ils vraiment pu délivrer leurs pays de ma main ? '
  '14':
  - type: note
    content: 'anathème  : voir bénédiction, malédiction.'
  - type: text
    content: 'Qui donc, parmi tous les dieux de ces nations que mes pères ont frappées d''anathème, a pu délivrer son peuple de ma main, pour que votre Dieu puisse vous délivrer de ma main ? '
  '15':
  - type: text
    content: 'Maintenant, qu''Ezéchias ne vous trompe pas ! Qu''il ne vous entraîne pas de cette manière ! Ne le croyez pas ! Car aucun dieu d''aucune nation ni d''aucun royaume n''a pu délivrer son peuple de ma main ni de la main de mes pères : vos dieux ne vous délivreront pas davantage de ma main !'
  - type: heading
    content: Sennachérib insulte le Seigneur
  - type: heading
    content: 2R 19.8-13  ; Es 37.8-13
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Les gens de Sennachérib  : litt. ses serviteurs.'
  - type: text
    content: 'Les gens de Sennachérib parlèrent encore contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu et contre Ezéchias, son serviteur. '
  '17':
  - type: note
    content: 'Sennachérib  : sous-entendu dans le texte. –  une lettre  : au pluriel dans le texte. –  outrager ou déshonorer, défier, cf. 1S 17.10n  ; 2R 9.4n  ; 1Ch 20.7.'
  - type: text
    content: 'Sennachérib avait écrit une lettre pour outrager le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël, en s''exprimant ainsi contre lui : De même que les dieux des nations des pays n''ont pu délivrer leur peuple de ma main, de même le Dieu d''Ezéchias ne délivrera pas son peuple de ma main. '
  '18':
  - type: text
    content: 'Ils crièrent à pleine voix en judéen, afin de jeter la crainte et l''épouvante parmi le peuple de Jérusalem qui était sur la muraille et de pouvoir ainsi prendre la ville. '
  '19':
  - type: note
    content: Cf. 2R 19.18.
  - type: text
    content: Ils parlèrent du Dieu de Jérusalem comme des dieux des autres peuples de la terre, qui sont l'œuvre de mains humaines.
  - type: heading
    content: Dieu délivre Jérusalem
  - type: heading
    content: 2R 19.35-37  ; Es 37.36-38
  '2':
  - type: text
    content: 'Ezéchias, voyant que Sennachérib était venu et qu''il se préparait à attaquer Jérusalem, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Le roi Ezéchias / prier  : cf. 2R 19.15 ; Es 37.15. –  Esaïe…, le prophète Es 1.1n.'
  - type: text
    content: 'Le roi Ezéchias et Esaïe, fils d''Amots, le prophète, se mirent à prier à ce sujet ; ils crièrent vers le ciel. '
  '21':
  - type: note
    content: 'un messager ou un ange. –  qui extermina  : le verbe est souvent traduit par faire disparaître. –  le roi retourna  : litt. il retourna. –  de son dieu  : autre traduction possible de ses dieux. –  ses propres fils  : le texte hébreu, incertain, semble signifier litt. d''entre ceux qui étaient sortis de ses entrailles.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya un messager, qui extermina dans le camp du roi d''Assyrie tous les vaillants guerriers, les chefs et les princes. Alors le roi retourna dans son pays, la honte au visage. Il entra dans la maison de son dieu, et là ses propres fils le firent tomber par l''épée. '
  '22':
  - type: note
    content: 'les protégea  : traduction incertaine ; le verbe hébreu signifie habituellement diriger ou conduire  ; d''après LXX, certains modifient le texte hébreu traditionnel pour lire leur accorda le repos (cf. 14.6 ; 15.15 ; 20.30 ; 1Ch 22.18).'
  - type: text
    content: 'Ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sauva Ezéchias et les habitants de Jérusalem de la main de Sennachérib, roi d''Assyrie, et de la main de tous, et il les protégea contre ceux qui les entouraient. '
  '23':
  - type: note
    content: des offrandes ou des offrandes végétales  ; cf. Lv 2.1n  ; 1Ch 16.29n.
  - type: text
    content: 'Beaucoup de gens apportèrent à Jérusalem des offrandes pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de riches présents pour Ezéchias, roi de Juda, qui depuis lors fut élevé sous les yeux de toutes les nations.'
  - type: heading
    content: Fin du règne d'Ezéchias
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Sur la maladie et la guérison d’ Ezéchias , voir 2R 20.1-11 ; Es 38.1-8. –  fut atteint d''une maladie mortelle  : autre traduction fut malade et tout près de la mort , litt. fut malade jusqu''à mourir , expression très légèrement différente de celle de 2R 20.1 ; Es 38.1. –  celui-ci lui répondit  : la tournure introduit normalement un discours direct ; certains pensent que l''oracle proprement dit a disparu du texte hébreu traditionnel ; LXX celui-ci l''exauça . –  prodige  : le même terme hébreu est aussi traduit par présage en 1R 13.3n.'
  - type: text
    content: 'En ces jours-là, Ezéchias fut atteint d''une maladie mortelle. Il fit une prière au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; celui-ci lui répondit et lui accorda un prodige. '
  '25':
  - type: note
    content: 'son cœur s''enhardit 17.6n. –  la Colère s''abattit  : cf. 19.2+,10 ; 24.18.'
  - type: text
    content: 'Mais Ezéchias ne répondit pas au bienfait qu''il avait reçu, car son cœur s''enhardit ; et la Colère s''abattit sur lui ainsi que sur Juda et Jérusalem. '
  '26':
  - type: note
    content: 'son orgueil  : litt. l''élévation de son cœur.'
  - type: text
    content: 'Alors Ezéchias, en dépit de son orgueil, s''humilia avec les habitants de Jérusalem, et la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne s''abattit pas sur eux pendant la vie d''Ezéchias.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 20.13 ; Es 39.2. –  de richesses et de gloire 1.11s ; 17.5 ; 32.27 ; 1Ch 29.12,28. –  Il se procura  : litt. il se fit.'
  - type: text
    content: 'Ezéchias eut beaucoup de richesses et de gloire. Il se procura des trésors d''argent, d''or, de pierres précieuses, d''essences odoriférantes, de boucliers et de tous les objets de valeur ; '
  '28':
  - type: note
    content: 'entrepôts  : LXX villes  ; voir 8.4,6 ; 16.4 ; 17.12 ; 1R 9.19+. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n. –  pour toutes les bêtes…  : texte incertain ; litt. pour toute bête et bête et des troupeaux pour les étables, le terme correspondant à ce dernier mot étant orthographié un peu différemment à la deuxième occurrence, et uniquement ici ; la fin du v. est absente de certaines versions anciennes.'
  - type: text
    content: 'des entrepôts pour les récoltes de blé, de vin et d''huile, des étables pour toutes les bêtes et des troupeaux pour les étables. '
  '29':
  - type: text
    content: 'Il se fit des villes et il eut en abondance des troupeaux de petit bétail et de gros bétail : Dieu lui avait donné des biens très considérables. '
  '3':
  - type: note
    content: 'les sources  : litt. les eaux des sources  ; autre terme, apparenté, au v. 4. –  ils vinrent à son secours ou ils l''aidèrent, ils lui prêtèrent main-forte  ; même verbe au v. 8.'
  - type: text
    content: 'tint conseil avec ses princes et ses guerriers en vue de boucher les sources qui étaient hors de la ville ; ils vinrent à son secours. '
  '30':
  - type: note
    content: 'eaux de Guihôn  : voir ci-dessus « L''inscription de Siloé ». –  Ezéchias réussit… 31.21n.'
  - type: text
    content: C'est aussi lui, Ezéchias, qui boucha la sortie supérieure des eaux de Guihôn et les dirigea en bas vers l'ouest de la Ville de David. Ezéchias réussit dans toutes ses entreprises.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'porte-parole  : la forme verbale correspondante est rendue par interprète en Es 43.27n  ; Jb 33.23n. –  prodige  : cf. v. 24n.'
  - type: text
    content: Cependant, dans l'affaire des porte-parole des princes de Babylone qui lui avaient été envoyés pour s'informer du prodige qui avait eu lieu dans le pays, Dieu l'abandonna pour le mettre à l'épreuve, afin de savoir tout ce qui était dans son cœur.
  - type: heading
    content: 2R 20.20-21
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  ce qu''il a fait avec fidélité  : litt. ses fidélités , cf. 35.26 ; Né 13.14. –  dans (litt. sur ) le livre des rois de Juda et d''Israël  : cf. 16.11n  ; autre traduction en plus du livre…  ; plusieurs versions anciennes portent et dans le livre…'
  - type: text
    content: 'Le reste de l''histoire d''Ezéchias, ce qu''il a fait avec fidélité, cela est écrit dans la vision d''Esaïe, fils d''Amots, le prophète, dans le livre des rois de Juda et d''Israël. '
  '33':
  - type: note
    content: 'dans la montée…  : autre traduction dans le plus élevé des tombeaux des fils de David.'
  - type: text
    content: Ezéchias se coucha avec ses pères, et on l'ensevelit dans la montée des tombeaux des fils de David ; tout Juda et les habitants de Jérusalem lui rendirent honneur à sa mort. Manassé, son fils, devint roi à sa place.
  '4':
  - type: note
    content: l'oued ou le torrent  ; il s'agit probablement de l'oued Cédron, qui est alimenté par la source de Guihôn ; LXX le fleuve qui coule au milieu de la ville.
  - type: text
    content: 'Une foule de gens se rassemblèrent ; ils bouchèrent toutes les sources et l''oued qui coule au milieu du pays. Pourquoi, disaient-ils, les rois d''Assyrie trouveraient-ils à leur arrivée de l''eau en abondance ? '
  '5':
  - type: note
    content: 'Il devint fort  : c.-à-d. Ezéchias. –  devint fort et répara traduisent deux formes du même verbe hébreu. –  il se procura  : litt. il fit.'
  - type: text
    content: 'Il devint fort ; il rebâtit la muraille, où il y avait des brèches, et il l''éleva jusqu''aux tours, il bâtit une autre muraille en dehors, il répara le Millo dans la Ville de David et il se procura une quantité d''armes et de boucliers. '
  '6':
  - type: note
    content: parla à leur cœur 30.22 ; Gn 34.3n.
  - type: text
    content: 'Il plaça des chefs militaires à la tête du peuple et il les rassembla auprès de lui sur la place de la porte de la ville. Il parla à leur cœur, en disant : '
  '7':
  - type: note
    content: Cf. 20.15+.
  - type: text
    content: 'Soyez forts et courageux ! N''ayez pas peur, ne soyez pas terrifiés par le roi d''Assyrie et par toute la multitude qui est avec lui ; car avec nous il y a plus qu''avec lui : '
  '8':
  - type: note
    content: 'avec lui / avec nous  : cf. Nb 14.43 ; Dt 20.4 ; Jg 6.12+,16+ ; voir aussi Es 7.14 ; 8.8,10.'
  - type: text
    content: 'avec lui il y a un bras de chair ; avec nous, il y a le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, qui viendra à notre secours et qui mènera nos combats. Le peuple s''appuya sur les paroles d''Ezéchias, roi de Juda.'
  - type: heading
    content: Sennachérib menace Jérusalem
  - type: heading
    content: 2R 18.17-37  ; Es 36.2-22
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'toutes ses forces  : litt. tout son domaine ou tous ceux qu''il dirigeait.'
  - type: text
    content: 'Après cela, Sennachérib, roi d''Assyrie, envoya ses hommes à Jérusalem, pendant qu''il était devant Lakish avec toutes ses forces ; il les envoya vers Ezéchias, roi de Juda, et vers tous les gens de Juda qui étaient à Jérusalem, pour leur dire : '
