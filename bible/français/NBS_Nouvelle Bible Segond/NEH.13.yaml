document_id: NEH.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernières réformes réalisées par Néhémie
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.2 ; 10.31 ; 13.23ss ; Dt 23.4ss. –  En ce temps-là  : litt. en ce jour , cf. 12.44. –  au peuple  : litt. aux oreilles du peuple , autre traduction en présence du peuple , c.-à-d. on lut à haute voix devant le peuple  ; cf. 8.1-8.'
  - type: text
    content: 'En ce temps-là, on lut le livre de Moïse au peuple et on y trouva écrit que l''Ammonite et le Moabite n''entreraient jamais dans l''assemblée de Dieu, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.1ss ; 12.27ss,47 ; Dt 12.19. –  chargés du service 11.22n.
  - type: text
    content: 'J''appris aussi que les parts des lévites n''avaient pas été livrées, et que les lévites et les chantres chargés du service avaient fui chacun vers son champ. '
  '11':
  - type: note
    content: 'Je rassemblai les lévites et les chantres  : litt. je les rassemblai (cf. v. 10).'
  - type: text
    content: 'Je fis des reproches aux magistrats et je dis : Pourquoi la maison de Dieu a-t-elle été abandonnée ? Je rassemblai les lévites et les chantres et je les remis à leur poste. '
  '12':
  - type: note
    content: Cf. v. 5n  ; 10.38ss ; 12.44 ; Ml 3.10.
  - type: text
    content: 'Alors tout Juda apporta dans les magasins la dîme du blé, du vin et de l''huile. '
  '13':
  - type: note
    content: 'Je confiai la surveillance  : texte et traduction incertains, le verbe hébreu semble calqué sur le mot traduit par magasins  ; d''après LXX, certains modifient légèrement le texte hébreu traditionnel pour lire je donnai des ordres au sujet des magasins à Shélémia… –  Mattania  : un ms de LXX porte Nethania. –  dignes de confiance ou fidèles, autre mot au v. 14.'
  - type: text
    content: Je confiai la surveillance des magasins à Shélémia, le prêtre, à Tsadoq, le scribe, à Pedaya, l'un des lévites, et, pour les assister, à Hanân, fils de Zakkour, fils de Mattania, car ils avaient la réputation d'être dignes de confiance. Ils furent chargés de faire les distributions à leurs frères.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'V. 22,31 ; 3.36+. –  n''efface pas  : cf. Ex 17.14 ; 32.32s ; Es 43.25 ; Ps 51.3,11. –  ce que j''ai fait avec fidélité 2Ch 32.32 ; 35.26. –  ses observances ou son service , litt. ses gardes  ; le possessif peut se rapporter à la maison aussi bien qu''à mon Dieu.'
  - type: text
    content: Souviens-toi de moi, mon Dieu, à cause de cela, et n'efface pas ce que j'ai fait avec fidélité pour la maison de mon Dieu et pour ses observances.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'En ces jours-là  : cf. v. 1n. –  sabbat v. 17+ ; 10.32 ; Lv 19.3+. –  des gerbes  : autre traduction des sacs de céréales . –  je leur donnai des avertissements  : autre traduction je témoignai contre eux (cf. Dt 4.26 ; 8.19 ; 30.19 etc.) ; d''autres modifient légèrement le texte pour lire je les mis en demeure de ne plus vendre leurs denrées (ce jour-là).'
  - type: text
    content: 'En ces jours-là, je vis en Juda des hommes fouler au pressoir pendant le sabbat, rentrer des gerbes, les charger sur des ânes, de même que du vin, des raisins, des figues et toutes sortes de fardeaux, et les amener à Jérusalem le jour du sabbat ; je leur donnai des avertissements le jour où ils vendaient leurs denrées. '
  '16':
  - type: note
    content: 'des Tyriens  : cette précision ne figure pas dans LXX et Syr, qui rapportent l''action au sujet du v. 15 (des hommes) ; cf. Ez 27.12ss ; 28.16. –  Judéens  : litt. fils de Juda.'
  - type: text
    content: 'Il y avait aussi des Tyriens qui habitaient là, qui apportaient du poisson et toutes sortes de marchandises, et qui les vendaient le jour du sabbat aux Judéens et à Jérusalem. '
  '17':
  - type: note
    content: 'reproches v. 25. –  aux notables  : cf. Esd 9.2. –  profanant le… sabbat  : cf. Ez 20.12-24 ; 22.8 ; 23.38 ; voir aussi Ex 31.14 ; Es 56.2,6 ; Jr 17.19-27.'
  - type: text
    content: 'Je fis des reproches aux notables de Juda et je leur dis : Que signifie cette action mauvaise que vous faites, en profanant le jour du sabbat ? '
  '18':
  - type: note
    content: 'ces malheurs  : la destruction de Jérusalem et l''exil. –  sur nous  : LXX sur eux et sur nous. –  vous augmentez sa colère Esd 9.14 ; 10.10.'
  - type: text
    content: N'est-ce pas ainsi qu'ont agi vos pères ? Notre Dieu a fait venir tous ces malheurs sur nous et sur cette ville. Et vous, vous augmentez sa colère contre Israël, en profanant le sabbat !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'furent dans l''ombre  : le sabbat commençait le vendredi soir au coucher du soleil ; autre traduction possible se vidèrent (le terme portes désignant aussi la place publique devant les portes de la ville proprement dites). –  pour empêcher…  : traduction d''après des versions anciennes ; le texte hébreu traditionnel porte simplement il n''entrera aucun fardeau…'
  - type: text
    content: 'Puis, dès que les portes de Jérusalem furent dans l''ombre, avant le sabbat, je dis de fermer les battants et je dis de ne les ouvrir qu''après le sabbat. Je plaçai quelques-uns de mes serviteurs aux portes, pour empêcher l''entrée des fardeaux le jour du sabbat. '
  '2':
  - type: note
    content: 'ils avaient soudoyé  : pluriel d''après des versions anciennes ; le texte hébreu traditionnel a le singulier il avait soudoyé, peut-être en référence à Balaq, roi de Moab (Nb 22–24 ; 2P 2.15). –  malédiction / bénédiction  : cf. Dt 23.6 ; Jos 24.9s.'
  - type: text
    content: 'parce qu''ils n''étaient pas venus au-devant des Israélites avec du pain et de l''eau, et parce qu''ils avaient soudoyé contre eux Balaam pour qu''il les maudisse ; mais notre Dieu a changé la malédiction en bénédiction. '
  '20':
  - type: text
    content: 'Alors les marchands et les vendeurs de toutes sortes de produits passèrent la nuit une fois, et même deux, hors de Jérusalem. '
  '21':
  - type: note
    content: 'j''utiliserai la force  : autre traduction je mettrai la main sur vous, cf. v. 8,25,28.'
  - type: text
    content: 'Je les avertis, en leur disant : Pourquoi passez-vous la nuit devant la muraille ? Si vous recommencez, j''utiliserai la force contre vous. Dès ce moment, ils ne vinrent plus pendant le sabbat.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pour cela… v. 14,31 ; 3.36+. –  selon ta grande fidélité Ps 106.45 ; cf. 5.8n  ; 51.3.
  - type: text
    content: Je dis aussi aux lévites de se purifier et de venir garder les portes pour faire du sabbat un jour sacré.
  - type: text
    content: Pour cela aussi souviens-toi de moi, mon Dieu, et protège-moi selon ta grande fidélité.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Esd 9–10. –  épousé  : sur le verbe correspondant (aussi v. 27), voir Esd 10.2n. –  ashdodites 4.1n. –  ammonites, moabites v. 1.'
  - type: text
    content: 'En ces jours-là, je vis des Judéens qui avaient épousé des femmes ashdodites, ammonites, moabites. '
  '24':
  - type: note
    content: 'parlaient l''ashdodite…  : autres traductions possibles  : parlaient l''ashdodite ou la langue de tel ou tel autre peuple ; ils ne savaient plus parler le judéen  ; ou parlaient l''ashdodite ; ils ne savaient pas parler la langue judéenne ni celle d''aucun autre peuple. Sur l''ashdodite, dialecte (probablement araméen) d''Ashdod en Philistie, cf. Dt 23.3 et Za 9.6 ; sur le judéen ou langue juive comme désignation de l''hébreu de Jérusalem, cf. 2R 18.26,28 ; Es 36.11,13 ; 2Ch 32.18 ; voir aussi Jr 32.12n.'
  - type: text
    content: 'La moitié de leurs fils parlaient l''ashdodite et ne savaient pas parler le judéen ; ils ne connaissaient que la langue de tel ou tel autre peuple. '
  '25':
  - type: note
    content: 'je les maudis  : autre traduction je les traitai avec mépris. –  je leur arrachai les cheveux  : même verbe Es 50.6 ; Esd 9.3. –  je leur fis prêter serment 10.31. –  Vous ne donnerez… Dt 7.3.'
  - type: text
    content: 'Je leur fis des reproches et je les maudis ; j''en frappai quelques-uns, je leur arrachai les cheveux, et je leur fis prêter serment par Dieu, en disant : Vous ne donnerez pas vos filles à leurs fils et vous ne prendrez leurs filles ni pour vos fils ni pour vous. '
  '26':
  - type: note
    content: 'Cf. 1R 3.12s ; 11.1-13 ; 2Ch 1.12 ; 8.11. –  aimé de son Dieu  : cf. 2S 12.24s ; 1Ch 28.5. –  roi sur tout Israël 1R 4.1 ; 11.42. –  femmes étrangères  : cf. 1R 11.1 ; Pr 2.16n.'
  - type: text
    content: 'N''est-ce pas en cela qu''a péché Salomon, roi d''Israël ? Il n''y avait pas de roi semblable à lui parmi la multitude des nations, il était aimé de son Dieu, et Dieu l''avait fait roi sur tout Israël ; néanmoins, les femmes étrangères l''ont aussi entraîné dans le péché. '
  '27':
  - type: note
    content: 'Et nous apprenons…  : autres traductions est-ce par obéissance que vous avez commis un aussi grand crime… ; saviez-vous ce que vous faisiez quand vous avez commis…  ; cf. 1S 15.22ss. –  sacrilège Esd 9.2+.'
  - type: text
    content: Et nous apprenons que vous commettez un aussi grand mal, un sacrilège envers notre Dieu, en épousant des femmes étrangères !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Eliashib, le grand prêtre  : cf. 3.1 ; 12.10 ; 13.4n  ; Esd 10.6+. –  Sanballat 2.10n.'
  - type: text
    content: 'Un des fils de Joïada, fils d''Eliashib, le grand prêtre, était gendre de Sanballat, le Horonite. Je le chassai loin de moi. '
  '29':
  - type: note
    content: 'souillé le sacerdoce Lv 21.13ss ; Ml 2.1-8,13-16. –  des prêtres  : d''après certains mss hébreux et des versions anciennes ; texte hébreu traditionnel du sacerdoce.'
  - type: text
    content: Souviens-toi d'eux, mon Dieu, car ils ont souillé le sacerdoce et l'alliance des prêtres et des lévites.
  '3':
  - type: note
    content: 'toute la population mêlée  : autre traduction tout métis (cf. Esd 9.2+) ; sur le terme correspondant, voir Ex 12.38n  ; Jr 25.20 ; 50.37.'
  - type: text
    content: Lorsqu'on eut entendu la loi, on sépara d'Israël toute la population mêlée.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Je les purifiai…  : cf. v. 3 ; 9.2. –  je rétablis…  : cf. 11.23 ; Esd 6.18 ; 1Ch 23–26.'
  - type: text
    content: 'Je les purifiai de tout étranger et je rétablis le service des prêtres et des lévites, chacun dans sa fonction, '
  '31':
  - type: note
    content: 10.34-35ns ; cf. 2Ch 8.12ss ; 31.2s ; 35.2ss. –  Souviens-toi (v. 14,22 ; 3.36+) favorablement 5.19n.
  - type: text
    content: ainsi que le présent de bois aux dates fixées, de même que les premiers fruits.
  - type: text
    content: Souviens-toi favorablement de moi, mon Dieu !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Avant cela  : cf. v. 6. –  le prêtre Eliashib  : il s''agit peut-être, mais pas nécessairement, du grand prêtre de 3.1,20s ; 12.10,22s ; cf. 13.28. –  chargé des salles  : litt. donné dans la salle  ; cf. 12.44 ; voir aussi Nb 3.9n. –  parent  : le même terme hébreu est traduit par proche parent en Rt 2.20. –  Tobiya 2.10n.'
  - type: text
    content: 'Avant cela, le prêtre Eliashib, qui était chargé des salles de la maison de notre Dieu, et qui était parent de Tobiya, '
  '5':
  - type: note
    content: 'pour lui  : pour Tobiya ; cf. 6.11n. –  offrandes… 10.33ss. –  l''encens Ex 30.34n. –  vin  : autre traduction vin nouveau, cf. v. 12 ; Gn 27.28n.'
  - type: text
    content: 'avait disposé pour lui une grande salle où se trouvaient auparavant les offrandes végétales, l''encens, les ustensiles, la dîme du blé, du vin et de l''huile, ce qui était ordonné pour les lévites, les chantres et les portiers, et le prélèvement pour les prêtres. '
  '6':
  - type: note
    content: 'la trente-deuxième année…  : 433/2 av. J.-C., cf. 1.1n  ; 2.1 ; 5.14. –  roi de Babylone  : depuis Cyrus, conquérant de l''empire babylonien, les rois de Perse portaient aussi ce titre et avaient l''une de leurs résidences à Babylone.'
  - type: text
    content: 'Je n''étais pas à Jérusalem quand tout cela eut lieu, car j''étais retourné auprès du roi, la trente-deuxième année d''Artaxerxès, roi de Babylone. A la fin de l''année, je demandai au roi '
  '7':
  - type: text
    content: 'la permission de revenir à Jérusalem, et je m''aperçus du mal qu''avait fait Eliashib, en disposant une salle pour Tobiya dans les cours de la maison de Dieu. '
  '8':
  - type: note
    content: 'qui appartenaient à Tobiya  : litt. de la maison de Tobiya.'
  - type: text
    content: 'Je le pris très mal. Je jetai hors de la salle tous les objets qui appartenaient à Tobiya ; '
  '9':
  - type: text
    content: je dis de purifier les salles et j'y replaçai les objets de la maison de Dieu, les offrandes végétales et l'encens.
