document_id: NEH.13,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières réformes réalisées par Néhémie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.2 ; 10.31 ; 13.23ss ; Dt 23.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En ce temps-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 12.44. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux oreilles du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en présence du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on lut à haute voix devant le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 8.1-8.
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, on lut le livre de Moïse au peuple et on y trouva écrit que l''Ammonite et le Moabite n''entreraient jamais dans l''assemblée de Dieu, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 11.1ss ; 12.27ss,47 ; Dt 12.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chargés du service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''appris aussi que les parts des lévites n''avaient pas été livrées, et que les lévites et les chantres chargés du service avaient fui chacun vers son champ. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je rassemblai les lévites et les chantres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je les rassemblai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 10).
      marker-yv: yv-n
    - type: text
      text: 'Je fis des reproches aux magistrats et je dis : Pourquoi la maison de Dieu a-t-elle été abandonnée ? Je rassemblai les lévites et les chantres et je les remis à leur poste. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.38ss ; 12.44 ; Ml 3.10.'
      marker-yv: yv-n
    - type: text
      text: 'Alors tout Juda apporta dans les magasins la dîme du blé, du vin et de l''huile. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je confiai la surveillance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte et traduction incertains, le verbe hébreu semble calqué sur le mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: magasins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''après LXX, certains modifient légèrement le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je donnai des ordres au sujet des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'magasins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shélémia… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mattania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms de LXX porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Nethania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dignes de confiance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidèles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', autre mot au v. 14.'
      marker-yv: yv-n
    - type: text
      text: Je confiai la surveillance des magasins à Shélémia, le prêtre, à Tsadoq, le scribe, à Pedaya, l'un des lévites, et, pour les assister, à Hanân, fils de Zakkour, fils de Mattania, car ils avaient la réputation d'être dignes de confiance. Ils furent chargés de faire les distributions à leurs frères.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 22,31 ; 3.36+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'efface pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 17.14 ; 32.32s ; Es 43.25 ; Ps 51.3,11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que j''ai fait avec fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Ch 32.32 ; 35.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ses observances '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses gardes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le possessif peut se rapporter à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aussi bien qu''à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon Dieu.
      marker-yv: yv-n
    - type: text
      text: Souviens-toi de moi, mon Dieu, à cause de cela, et n'efface pas ce que j'ai fait avec fidélité pour la maison de mon Dieu et pour ses observances.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En ces jours-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sabbat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 17+ ; 10.32 ; Lv 19.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des gerbes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des sacs de céréales
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je leur donnai des avertissements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je témoignai contre eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Dt 4.26 ; 8.19 ; 30.19 etc.) ; d''autres modifient légèrement le texte pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je les mis en demeure de ne plus vendre leurs denrées (ce jour-là).
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, je vis en Juda des hommes fouler au pressoir pendant le sabbat, rentrer des gerbes, les charger sur des ânes, de même que du vin, des raisins, des figues et toutes sortes de fardeaux, et les amener à Jérusalem le jour du sabbat ; je leur donnai des avertissements le jour où ils vendaient leurs denrées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Tyriens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision ne figure pas dans LXX et Syr, qui rapportent l''action au sujet du v. 15 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; cf. Ez 27.12ss ; 28.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Judéens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils de Juda.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait aussi des Tyriens qui habitaient là, qui apportaient du poisson et toutes sortes de marchandises, et qui les vendaient le jour du sabbat aux Judéens et à Jérusalem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reproches '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux notables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Esd 9.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: profanant le… sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 20.12-24 ; 22.8 ; 23.38 ; voir aussi Ex 31.14 ; Es 56.2,6 ; Jr 17.19-27.'
      marker-yv: yv-n
    - type: text
      text: 'Je fis des reproches aux notables de Juda et je leur dis : Que signifie cette action mauvaise que vous faites, en profanant le jour du sabbat ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces malheurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la destruction de Jérusalem et l''exil. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur eux et sur nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous augmentez sa colère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esd 9.14 ; 10.10.
      marker-yv: yv-n
    - type: text
      text: N'est-ce pas ainsi qu'ont agi vos pères ? Notre Dieu a fait venir tous ces malheurs sur nous et sur cette ville. Et vous, vous augmentez sa colère contre Israël, en profanant le sabbat !
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: furent dans l'ombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le sabbat commençait le vendredi soir au coucher du soleil ; autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se vidèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le terme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'portes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désignant aussi la place publique devant les portes de la ville proprement dites). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour empêcher…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction d''après des versions anciennes ; le texte hébreu traditionnel porte simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'entrera aucun fardeau…
      marker-yv: yv-n
    - type: text
      text: 'Puis, dès que les portes de Jérusalem furent dans l''ombre, avant le sabbat, je dis de fermer les battants et je dis de ne les ouvrir qu''après le sabbat. Je plaçai quelques-uns de mes serviteurs aux portes, pour empêcher l''entrée des fardeaux le jour du sabbat. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils avaient soudoyé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : pluriel d''après des versions anciennes ; le texte hébreu traditionnel a le singulier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il avait soudoyé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut-être en référence à Balaq, roi de Moab (Nb 22–24 ; 2P 2.15). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'malédiction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bénédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 23.6 ; Jos 24.9s.'
      marker-yv: yv-n
    - type: text
      text: 'parce qu''ils n''étaient pas venus au-devant des Israélites avec du pain et de l''eau, et parce qu''ils avaient soudoyé contre eux Balaam pour qu''il les maudisse ; mais notre Dieu a changé la malédiction en bénédiction. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les marchands et les vendeurs de toutes sortes de produits passèrent la nuit une fois, et même deux, hors de Jérusalem. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'utiliserai la force
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je mettrai la main sur vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 8,25,28.'
      marker-yv: yv-n
    - type: text
      text: 'Je les avertis, en leur disant : Pourquoi passez-vous la nuit devant la muraille ? Si vous recommencez, j''utiliserai la force contre vous. Dès ce moment, ils ne vinrent plus pendant le sabbat.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pour cela… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 14,31 ; 3.36+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon ta grande fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 106.45 ; cf. 5.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 51.3.'
      marker-yv: yv-n
    - type: text
      text: Je dis aussi aux lévites de se purifier et de venir garder les portes pour faire du sabbat un jour sacré.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour cela aussi souviens-toi de moi, mon Dieu, et protège-moi selon ta grande fidélité.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Esd 9–10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: épousé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur le verbe correspondant (aussi v. 27), voir Esd 10.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ashdodites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ammonites, moabites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1.
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, je vis des Judéens qui avaient épousé des femmes ashdodites, ammonites, moabites. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parlaient l'ashdodite…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions possibles'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parlaient l'ashdodite ou la langue de tel ou tel autre peuple ; ils ne savaient plus parler le judéen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parlaient l'ashdodite ; ils ne savaient pas parler la langue judéenne ni celle d'aucun autre peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'ashdodite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dialecte (probablement araméen) d''Ashdod en Philistie, cf. Dt 23.3 et Za 9.6 ; sur '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le judéen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'langue juive '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme désignation de l'hébreu de Jérusalem, cf. 2R 18.26,28 ; Es 36.11,13 ; 2Ch 32.18 ; voir aussi Jr 32.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La moitié de leurs fils parlaient l''ashdodite et ne savaient pas parler le judéen ; ils ne connaissaient que la langue de tel ou tel autre peuple. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je les maudis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je les traitai avec mépris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je leur arrachai les cheveux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe Es 50.6 ; Esd 9.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je leur fis prêter serment '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vous ne donnerez… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 7.3.
      marker-yv: yv-n
    - type: text
      text: 'Je leur fis des reproches et je les maudis ; j''en frappai quelques-uns, je leur arrachai les cheveux, et je leur fis prêter serment par Dieu, en disant : Vous ne donnerez pas vos filles à leurs fils et vous ne prendrez leurs filles ni pour vos fils ni pour vous. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 3.12s ; 11.1-13 ; 2Ch 1.12 ; 8.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aimé de son Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 12.24s ; 1Ch 28.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'roi sur tout Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1R 4.1 ; 11.42. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: femmes étrangères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 11.1 ; Pr 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'N''est-ce pas en cela qu''a péché Salomon, roi d''Israël ? Il n''y avait pas de roi semblable à lui parmi la multitude des nations, il était aimé de son Dieu, et Dieu l''avait fait roi sur tout Israël ; néanmoins, les femmes étrangères l''ont aussi entraîné dans le péché. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Et nous apprenons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est-ce par obéissance que vous avez commis un aussi grand crime… ; saviez-vous ce que vous faisiez quand vous avez commis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1S 15.22ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sacrilège '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esd 9.2+.
      marker-yv: yv-n
    - type: text
      text: Et nous apprenons que vous commettez un aussi grand mal, un sacrilège envers notre Dieu, en épousant des femmes étrangères !
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Eliashib, le grand prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.1 ; 12.10 ; 13.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 10.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sanballat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Un des fils de Joïada, fils d''Eliashib, le grand prêtre, était gendre de Sanballat, le Horonite. Je le chassai loin de moi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souillé le sacerdoce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 21.13ss ; Ml 2.1-8,13-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des prêtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après certains mss hébreux et des versions anciennes ; texte hébreu traditionnel '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du sacerdoce.
      marker-yv: yv-n
    - type: text
      text: Souviens-toi d'eux, mon Dieu, car ils ont souillé le sacerdoce et l'alliance des prêtres et des lévites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute la population mêlée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout métis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Esd 9.2+) ; sur le terme correspondant, voir Ex 12.38
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 25.20 ; 50.37.'
      marker-yv: yv-n
    - type: text
      text: Lorsqu'on eut entendu la loi, on sépara d'Israël toute la population mêlée.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je les purifiai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3 ; 9.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je rétablis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.23 ; Esd 6.18 ; 1Ch 23–26.'
      marker-yv: yv-n
    - type: text
      text: 'Je les purifiai de tout étranger et je rétablis le service des prêtres et des lévites, chacun dans sa fonction, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.34-35
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; cf. 2Ch 8.12ss ; 31.2s ; 35.2ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Souviens-toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 14,22 ; 3.36+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'favorablement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ainsi que le présent de bois aux dates fixées, de même que les premiers fruits.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Souviens-toi favorablement de moi, mon Dieu !
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Avant cela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le prêtre Eliashib
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit peut-être, mais pas nécessairement, du grand prêtre de 3.1,20s ; 12.10,22s ; cf. 13.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chargé des salles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: donné dans la salle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 12.44 ; voir aussi Nb 3.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même terme hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'proche parent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Rt 2.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tobiya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Avant cela, le prêtre Eliashib, qui était chargé des salles de la maison de notre Dieu, et qui était parent de Tobiya, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : pour Tobiya ; cf. 6.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrandes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.33ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 30.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vin nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 12 ; Gn 27.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'avait disposé pour lui une grande salle où se trouvaient auparavant les offrandes végétales, l''encens, les ustensiles, la dîme du blé, du vin et de l''huile, ce qui était ordonné pour les lévites, les chantres et les portiers, et le prélèvement pour les prêtres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la trente-deuxième année…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 433/2 av. J.-C., cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.1 ; 5.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: roi de Babylone
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : depuis Cyrus, conquérant de l''empire babylonien, les rois de Perse portaient aussi ce titre et avaient l''une de leurs résidences à Babylone.'
      marker-yv: yv-n
    - type: text
      text: 'Je n''étais pas à Jérusalem quand tout cela eut lieu, car j''étais retourné auprès du roi, la trente-deuxième année d''Artaxerxès, roi de Babylone. A la fin de l''année, je demandai au roi '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la permission de revenir à Jérusalem, et je m''aperçus du mal qu''avait fait Eliashib, en disposant une salle pour Tobiya dans les cours de la maison de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui appartenaient à Tobiya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la maison de Tobiya.
      marker-yv: yv-n
    - type: text
      text: 'Je le pris très mal. Je jetai hors de la salle tous les objets qui appartenaient à Tobiya ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je dis de purifier les salles et j'y replaçai les objets de la maison de Dieu, les offrandes végétales et l'encens.
