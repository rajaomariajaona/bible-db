        - type: text
          text: Ga 2.4.
      marker-yv: yv-n
    - type: text
      text: 'Voyageant à pied, souvent ; exposé aux dangers des fleuves, aux dangers des bandits, aux dangers de la part de mes compatriotes, aux dangers de la part des non-Juifs, aux dangers de la ville, aux dangers du désert, aux dangers de la mer, aux dangers parmi les faux frères, '
