document_id: 2CO.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'apôtre Paul, un apôtre authentique
  - type: text
    content: ' '
  - type: note
    content: 'déraison  : cf. v. 16-23 ; 12.6,11 ; voir Mc 7.22n. –  mais vous me supportez bien ! autre traduction eh bien, supportez-moi !'
  - type: text
    content: 'Si seulement vous pouviez supporter de ma part un peu de déraison… mais vous me supportez bien ! '
  '10':
  - type: note
    content: 'la vérité du Christ qui est en moi  : cf. v. 31 ; Rm 9.1 ; voir aussi Ga 2.20 ; Ph 1.21. –  fierté 1.14+ ; cf. 1Co 9.15.'
  - type: text
    content: 'Par la vérité du Christ qui est en moi, personne ne m''interdira cette fierté dans les contrées d''Achaïe ! '
  '11':
  - type: note
    content: Dieu le sait 12.2s.
  - type: text
    content: Pourquoi ? Parce que je ne vous aime pas ? Dieu le sait !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pour être considérés…  : sens incertain, litt. afin qu''en ce dont ils font leur fierté ils soient trouvés comme nous  ; on pourrait aussi comprendre pour pouvoir afficher la même fierté que nous.'
  - type: text
    content: 'Ce que je fais, je le ferai encore, afin d''ôter tout prétexte à ceux qui en voudraient un pour être considérés comme nos égaux en ce qui fait leur fierté. '
  '13':
  - type: note
    content: 'apôtres de mensonge ou faux apôtres, pseudo-apôtres  ; cf. v. 5+ ; Ga 2.4 ; Ap 2.2 ; voir aussi Mt 7.15. –  ouvriers trompeurs  : cf. Ph 3.2. –  qui se transforment  : autre traduction qui se déguisent  ; même verbe v. 14s ; cf. 1Co 4.6n. – Voir aussi 2.17 ; Lc 16.15.'
  - type: text
    content: 'De tels individus sont des apôtres de mensonge, des ouvriers trompeurs, qui se transforment en apôtres du Christ. '
  '14':
  - type: note
    content: 'Satan 2.11+ (voir démon, diable, Satan). –  se transforme…  : cf. Vie grecque d''Adam et Eve 17.1 : « Satan survint (auprès d''Eve, cf. v. 3) sous l''apparence d''un ange, chantant Dieu comme les anges. »'
  - type: text
    content: 'Et ce n''est pas étonnant, car le Satan lui-même se transforme en ange de lumière. '
  '15':
  - type: note
    content: ministres ou serviteurs, v. 23 ; 3.3n  ; 5.18n. – Voir justice. –  Leur fin… Ph 3.19. –  selon leurs œuvres Rm 2.6+ ; cf. 2Tm 4.14 ; 2P 2.1.
  - type: text
    content: Il n'est donc pas étrange que ses ministres se transforment aussi en ministres de justice. Leur fin sera selon leurs œuvres.
  - type: heading
    content: Les souffrances endurées par l'apôtre
  '16':
  - type: text
    content: ' '
  - type: note
    content: déraisonnable v. 1n. –  fier 10.8+.
  - type: text
    content: 'Je le répète, que personne ne me croie déraisonnable – ou plutôt acceptez-moi comme un homme déraisonnable, pour que, moi aussi, je puisse un peu faire le fier ! '
  '17':
  - type: note
    content: 'puisqu''il s''agit d''être fier  : autres traductions sachant que je suis en situation (9.4n) d''être fier, ou que j''ai l''assurance d''avoir de quoi être fier.'
  - type: text
    content: 'Ce que je dis, je ne le dis pas selon le Seigneur, mais comme par déraison, puisqu''il s''agit d''être fier. '
  '18':
  - type: note
    content: Ga 6.13 ; Ph 3.4. –  selon la chair Jn 8.15n.
  - type: text
    content: 'Puisque beaucoup font les fiers selon la chair, moi aussi je vais faire le fier. '
  '19':
  - type: note
    content: 'raisonnables  : le même terme est traduit par avisés en 1Co 4.10n  ; ici le texte joue sur sa parenté avec celui qui est rendu par déraisonnables.'
  - type: text
    content: 'Vous supportez si volontiers les gens déraisonnables, vous qui êtes raisonnables ! '
  '2':
  - type: note
    content: 'passion jalouse (cf. 7.11 ; 9.2 ; 12.20) de Dieu Dt 4.24+ ; 1Co 10.22. –  un seul homme ou un seul mari  : cf. Rm 7.4 ; 1Co 7.2. –  comme une vierge pure  : cf. Ep 5.25-27 ; Ap 14.4 ; 19.7+.'
  - type: text
    content: 'Car j''ai une passion jalouse pour vous, la passion jalouse de Dieu lui-même, parce que je vous ai fiancés à un seul homme, pour vous présenter au Christ comme une vierge pure. '
  '20':
  - type: note
    content: Cf. Ps 53.5. –  qu'on vous gruge ou qu'on profite de vous  ; le même verbe est traduit par prendre en 12.16.
  - type: text
    content: 'Vous supportez en effet qu''on vous asservisse, qu''on vous dévore, qu''on vous gruge, qu''on vous traite avec arrogance, qu''on vous frappe au visage ! '
  '21':
  - type: note
    content: 'c''est un déshonneur  : autres traductions pour notre déshonneur ou pour votre déshonneur  ; même mot 6.8. –  faiblesse 10.10+.'
  - type: text
    content: 'Je le dis, c''est un déshonneur : il semble que nous ayons montré de la faiblesse.'
  - type: text
    content: 'Cependant, tout ce que peut oser quelqu''un – je parle en homme déraisonnable – moi aussi, je l''ose ! '
  '22':
  - type: note
    content: 'Ph 3.5ns ; cf. Rm 11.1 ; Ga 2.15 ; voir aussi Ac 21.39 ; 22.3 ; 23.6 ; 26.5. –  descendance d''Abraham  : cf. Jn 8.33.'
  - type: text
    content: 'Ils sont hébreux ? Moi aussi. Ils sont israélites ? Moi aussi. Ils sont de la descendance d''Abraham ? Moi aussi. '
  '23':
  - type: note
    content: 'ministres (ou serviteurs, 3.3nss) du Christ  : cf. 6.4 ; 10.7 ; voir aussi Ga 2.6,9 ; 1Co 15.10. –  je déraisonne ou je délire  ; termes apparentés pour déraison et déraisonnable (v. 1n) ; un terme apparenté est traduit par démence en 2P 2.16. –  par les travaux… v. 27 ; 6.5 ; 1Co 4.11+ss ; voir aussi Ac 16.23 ; 1Co 15.32 ; Ep 3.1 ; 4.1 ; Ph 1.7,13 ; Col 4.18 ; Phm 9. –  en danger de mort  : litt. dans des morts, cf. 1.10n.'
  - type: text
    content: 'Ils sont ministres du Christ ? – je déraisonne – je le suis plus encore : par les travaux pénibles, bien plus ; par les emprisonnements, bien plus ; par les coups, bien davantage. Souvent en danger de mort : '
  '24':
  - type: note
    content: 'Voir Juifs. –  quarante coups moins un  : voir Dt 25.3n.'
  - type: text
    content: 'cinq fois j''ai reçu des Juifs quarante coups moins un, '
  '25':
  - type: note
    content: 'coups de bâton ou de baguette  : cf. Ac 16.22. –  lapidé  : cf. Ac 14.19. –  dans les abysses  : ou dans les profondeurs c.-à-d. probablement dans la mer, à la suite d''un naufrage (cf. celui d''Ac 27 qui se situe plus tard).'
  - type: text
    content: 'trois fois j''ai été frappé à coups de bâton, une fois j''ai été lapidé, trois fois j''ai fait naufrage ; j''ai passé un jour et une nuit dans les abysses. '
  '26':
  - type: note
    content: Cf. Ac 9.23 ; 13.50 ; 20.3. – Voir non-Juifs. –  faux frères Ga 2.4.
  - type: text
    content: 'Voyageant à pied, souvent ; exposé aux dangers des fleuves, aux dangers des bandits, aux dangers de la part de mes compatriotes, aux dangers de la part des non-Juifs, aux dangers de la ville, aux dangers du désert, aux dangers de la mer, aux dangers parmi les faux frères, '
  '27':
  - type: note
    content: Cf. v. 23+ ; 6.5 ; 7.5.
  - type: text
    content: 'au travail et à la peine ; souvent dans les veilles, dans la faim et la soif ; souvent dans les jeûnes, dans le froid et le dénuement. '
  '28':
  - type: note
    content: Cf. Ac 20.18-21,31. – Voir Eglises.
  - type: text
    content: 'Sans parler du reste, ma préoccupation quotidienne, l''inquiétude au sujet de toutes les Eglises ! '
  '29':
  - type: note
    content: 'Cf. Rm 9.3 ; 1Co 12.26. –  faible  : cf. 1Co 9.22. –  De qui cause-t-on la chute  : autre traduction qui trébuche  ; cf. 1Co 8.13n  ; voir aussi Mt 11.6n  ; 18.6-7/ /. –  je brûle  : sens incertain (cf. 1Co 7.9) ; on pourrait comprendre ici de compassion ou d''indignation.'
  - type: text
    content: Qui est faible sans que je sois faible ? De qui cause-t-on la chute, sans que moi-même je brûle ?
  '3':
  - type: note
    content: 'le serpent a trompé Eve v. 14n  ; Gn 3.1-20 ; cf. Rm 7.11 ; 1Tm 2.14. –  ruse 4.2 ; 12.16n. –  se pervertisse  : le même verbe est traduit par pourrir en 1Co 15.33 ; cf. 1Tm 6.5. –  la simplicité 1.12n. –  pureté 6.6 ; le terme grec correspondant est omis ici par certains mss.'
  - type: text
    content: 'Toutefois, de même que le serpent a trompé Eve par sa ruse, je crains que votre intelligence ne se pervertisse et ne s''écarte de la simplicité et de la pureté à l''égard du Christ. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 12.5,9 ; 1Co 2.3+.
  - type: text
    content: 'S''il faut faire le fier, c''est de ma faiblesse que je ferai ma fierté. '
  '31':
  - type: note
    content: Cf. Rm 9.1 ; Ga 2.20. – Voir bénédiction.
  - type: text
    content: 'Dieu, qui est le Père du Seigneur Jésus et qui est béni pour toujours, sait que je ne mens pas. '
  '32':
  - type: note
    content: 'Cf. Ac 9.23-25. –  le gouverneur  : litt. l''ethnarque (le terme correspondant n''apparaît qu''ici dans le N.T.). –  Arétas IV, roi des Nabatéens (de 9 av. J.-C. à 39 ou 40 apr. J.-C. environ) en Arabie (cf. Ga 1.17), et beau-père d''Hérode Antipas, avait sans doute reçu de l''empereur Caligula l''autorité sur Damas.'
  - type: text
    content: 'A Damas, le gouverneur du roi Arétas faisait garder la ville des Damascéniens, pour se saisir de moi, '
  '33':
  - type: note
    content: Cf. Ac 9.25 ; voir aussi Mt 10.23.
  - type: text
    content: mais on m'a descendu par une fenêtre, dans une corbeille, le long de la muraille, et je lui ai échappé.
  '4':
  - type: note
    content: Voir esprit. –  une autre « bonne nouvelle » ou un autre « Evangile » Ga 1.6-9.
  - type: text
    content: En effet, si le premier venu proclame un autre Jésus que celui que nous avons proclamé, ou si vous recevez un autre esprit que celui que vous avez reçu ou une autre « bonne nouvelle » que celle que vous avez accueillie, vous le supportez fort bien.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'super-apôtres  : de même en 12.11 ; cf. 11.23.'
  - type: text
    content: 'Or j''estime n''avoir été inférieur en rien à ces super-apôtres. '
  '6':
  - type: note
    content: 'profane  : sur le terme correspondant, cf. 1Co 14.16n. –  éloquence 10.1,10 ; 1Co 2.1. –  connaissance  : cf. Ep 3.4. –  clairement montré  : verbe habituellement traduit par rendre manifeste, cf. 5.10n.'
  - type: text
    content: Si je suis profane pour ce qui est de l'éloquence, je ne le suis pas pour ce qui est de la connaissance ; nous vous l'avons clairement montré, de toute manière et à tous égards.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Voir péché . –  en m'abaissant ou en m'humiliant , comme en 12.21 ; Ph 4.12. –  gratuitement v. 9+ ; 1Co 9.12,18 ; cf. Ac 18.3 ; 20.33-35 ; 1Co 4.12. –  la bonne nouvelle de Dieu 1Th 2.2+.
  - type: text
    content: 'Ou bien ai-je commis un péché en m''abaissant moi-même pour vous élever, lorsque je vous ai annoncé gratuitement la bonne nouvelle de Dieu ? '
  '8':
  - type: note
    content: 'd''autres Eglises 8.1ns ; voir Ph 4.10-18. –  un salaire  : même terme en Rm 6.23 ; il est traduit par frais en 1Co 9.7 et par solde en Lc 3.14. –  vous servir  : autre traduction exercer mon ministère en votre faveur, cf. 3.3n  ; 5.18n.'
  - type: text
    content: 'J''ai dépouillé d''autres Eglises, en recevant d''elles un salaire pour vous servir. '
  '9':
  - type: note
    content: 12.13s ; cf. 1Th 2.5-7.
  - type: text
    content: 'Et lorsque chez vous j''ai manqué de tout, je n''ai été à charge à personne, car les frères venus de Macédoine ont suppléé à ce qui me manquait. En tout, je me suis gardé d''être un fardeau pour vous, et je m''en garderai. '
