document_id: 2CO.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'apôtre Paul, un apôtre authentique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déraison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 16-23 ; 12.6,11 ; voir Mc 7.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mais vous me supportez bien ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eh bien, supportez-moi !
      marker-yv: yv-n
    - type: text
      text: 'Si seulement vous pouviez supporter de ma part un peu de déraison… mais vous me supportez bien ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la vérité du Christ qui est en moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 31 ; Rm 9.1 ; voir aussi Ga 2.20 ; Ph 1.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fierté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.14+ ; cf. 1Co 9.15.
      marker-yv: yv-n
    - type: text
      text: 'Par la vérité du Christ qui est en moi, personne ne m''interdira cette fierté dans les contrées d''Achaïe ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu le sait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.2s.
      marker-yv: yv-n
    - type: text
      text: Pourquoi ? Parce que je ne vous aime pas ? Dieu le sait !
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour être considérés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sens incertain, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: afin qu'en ce dont ils font leur fierté ils soient trouvés comme nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour pouvoir afficher la même fierté que nous.
      marker-yv: yv-n
    - type: text
      text: 'Ce que je fais, je le ferai encore, afin d''ôter tout prétexte à ceux qui en voudraient un pour être considérés comme nos égaux en ce qui fait leur fierté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'apôtres de mensonge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faux apôtres, pseudo-apôtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 5+ ; Ga 2.4 ; Ap 2.2 ; voir aussi Mt 7.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ouvriers trompeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ph 3.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui se transforment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui se déguisent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe v. 14s ; cf. 1Co 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . – Voir aussi 2.17 ; Lc 16.15.
      marker-yv: yv-n
    - type: text
      text: 'De tels individus sont des apôtres de mensonge, des ouvriers trompeurs, qui se transforment en apôtres du Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Satan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.11+ (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ', diable, Satan). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se transforme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Vie grecque '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Adam
        - type: text
          text: ' et Eve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.1 : « Satan survint (auprès d''Eve, cf. v. 3) sous l''apparence d''un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
        - type: text
          text: ', chantant Dieu comme les anges. »'
      marker-yv: yv-n
    - type: text
      text: 'Et ce n''est pas étonnant, car le Satan lui-même se transforme en ange de lumière. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ministres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 23 ; 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 5.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Leur fin… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ph 3.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon leurs œuvres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 2.6+ ; cf. 2Tm 4.14 ; 2P 2.1.
      marker-yv: yv-n
    - type: text
      text: Il n'est donc pas étrange que ses ministres se transforment aussi en ministres de justice. Leur fin sera selon leurs œuvres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les souffrances endurées par l'apôtre
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déraisonnable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.8+.
      marker-yv: yv-n
    - type: text
      text: 'Je le répète, que personne ne me croie déraisonnable – ou plutôt acceptez-moi comme un homme déraisonnable, pour que, moi aussi, je puisse un peu faire le fier ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puisqu'il s'agit d'être fier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sachant que je suis en situation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (9.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'être fier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que j'ai l'assurance d'avoir de quoi être fier.
      marker-yv: yv-n
    - type: text
      text: 'Ce que je dis, je ne le dis pas selon le Seigneur, mais comme par déraison, puisqu''il s''agit d''être fier. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ga 6.13 ; Ph 3.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jn 8.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Puisque beaucoup font les fiers selon la chair, moi aussi je vais faire le fier. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: raisonnables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avisés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1Co 4.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; ici le texte joue sur sa parenté avec celui qui est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: déraisonnables.
      marker-yv: yv-n
    - type: text
      text: 'Vous supportez si volontiers les gens déraisonnables, vous qui êtes raisonnables ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'passion jalouse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 7.11 ; 9.2 ; 12.20) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 4.24+ ; 1Co 10.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un seul homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un seul mari
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 7.4 ; 1Co 7.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme une vierge '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ep 5.25-27 ; Ap 14.4 ; 19.7+.'
      marker-yv: yv-n
    - type: text
      text: 'Car j''ai une passion jalouse pour vous, la passion jalouse de Dieu lui-même, parce que je vous ai fiancés à un seul homme, pour vous présenter au Christ comme une vierge pure. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ps 53.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''on vous gruge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'on profite de vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 12.16.
      marker-yv: yv-n
    - type: text
      text: 'Vous supportez en effet qu''on vous asservisse, qu''on vous dévore, qu''on vous gruge, qu''on vous traite avec arrogance, qu''on vous frappe au visage ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est un déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour notre déshonneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour votre déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même mot 6.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faiblesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.10+.
      marker-yv: yv-n
    - type: text
      text: 'Je le dis, c''est un déshonneur : il semble que nous ayons montré de la faiblesse.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, tout ce que peut oser quelqu''un – je parle en homme déraisonnable – moi aussi, je l''ose ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ph 3.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; cf. Rm 11.1 ; Ga 2.15 ; voir aussi Ac 21.39 ; 22.3 ; 23.6 ; 26.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: descendance d'Abraham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 8.33.'
      marker-yv: yv-n
    - type: text
      text: 'Ils sont hébreux ? Moi aussi. Ils sont israélites ? Moi aussi. Ils sont de la descendance d''Abraham ? Moi aussi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ministres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.4 ; 10.7 ; voir aussi Ga 2.6,9 ; 1Co 15.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je déraisonne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je délire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; termes apparentés pour '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'déraison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'déraisonnable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'démence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 2P 2.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par les travaux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 27 ; 6.5 ; 1Co 4.11+ss ; voir aussi Ac 16.23 ; 1Co 15.32 ; Ep 3.1 ; 4.1 ; Ph 1.7,13 ; Col 4.18 ; Phm 9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en danger de mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans des morts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils sont ministres du Christ ? – je déraisonne – je le suis plus encore : par les travaux pénibles, bien plus ; par les emprisonnements, bien plus ; par les coups, bien davantage. Souvent en danger de mort : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
