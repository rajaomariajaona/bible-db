document_id: PSA.85,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur parle pour la paix
  - type: text
    content: ' '
  - type: note
    content: 84.1+.
  - type: text
    content: Du chef de chœur. Des fils de Coré. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'son salut est proche Es 46.13 ; 51.5 ; 56.1 ; Mt 3.2/ /. –  qui le craignent 15.4+. –  la gloire  : cf. 26.8 ; 1R 8.10s ; Es 40.5 ; 60.2 ; 62.2 ; Ez 10.18 ; 44.4s.'
  - type: text
    content: Oui, son salut est proche pour ceux qui le craignent,
  - type: text
    content: afin que la gloire demeure dans notre pays.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'loyauté ou vérité , de même au v. 12 (25.10n) ; cf. 89.15 ; voir aussi Os 4.1n  ; Ep 4.15. –  la justice et la paix s''embrassent  : autre traduction possible  : elles embrassent la justice et la paix. – Cf. 43.3 ; Es 58.8 ; 59.14s.'
  - type: text
    content: La fidélité et la loyauté se rencontrent,
  - type: text
    content: la justice et la paix s'embrassent ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 45.8.
  - type: text
    content: la loyauté germe de la terre,
  - type: text
    content: et la justice se penche du ciel.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 65.12 ; 67.7 ; Lv 26.4ss ; Es 4.2 ; 30.23ss ; Jr 31.12ss ; Os 2.23s ; Am 9.13 ; Za 8.12.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aussi donnera le bonheur,'
  - type: text
    content: et notre terre donnera ses produits.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'La justice marchera…  : cf. Es 40.10 ; 58.8 ; 62.11.'
  - type: text
    content: La justice marchera devant lui
  - type: text
    content: et marquera ses pas sur le chemin.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Tu as été favorable ou tu as pris plaisir 44.4 ; 77.8 ; 147.11 ; 149.4. –  Tu as rétabli la situation 14.7n  ; cf. 126.1-4 ; voir aussi Dt 30.3n  ; Jr 29.14n  ; Ez 39.25 ; Os 6.11 ; Jb 42.10n.
  - type: text
    content: 'Tu as été favorable à ton pays, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Tu as rétabli la situation de Jacob ;
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'pardonné  : autres traductions enlevé, pris en charge  ; cf. 32.5n  ; Ex 34.9 ; Es 22.14 ; 27.9 ; 38.17 ; 40.2. – Voir péché.'
  - type: text
    content: Tu as pardonné la faute de ton peuple,
  - type: text
    content: 'tu as couvert tous ses péchés. '
  - type: text
    content: Pause.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 78.38 ; Ex 32.11-14 ; Es 48.9 ; Ez 20.21s ; Os 11.9.
  - type: text
    content: Tu as ramené toute ta fureur,
  - type: text
    content: tu es revenu de ta colère ardente.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ramène-nous  : cf. 80.4+ ; le texte hébreu traditionnel porte ici une forme différente du même verbe, que certains modifient pour lire reviens (cf. v. 7) ; sur l''ensemble de la situation, cf. Es 59.9ss ; Ez 37.11 ; Ag 1.5ss ; 2.15s ; Za 1.12. –  Dieu de notre salut 24.5+.'
  - type: text
    content: Ramène-nous, Dieu de notre salut !
  - type: text
    content: Cesse d'être contrarié à notre sujet !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 77.8ss ; 79.5.
  - type: text
    content: Seras-tu toujours en colère contre nous ?
  - type: text
    content: Conserveras-tu ta colère de génération en génération ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: nous faire vivre 71.20 ; 80.19 ; Os 6.1ss.
  - type: text
    content: N'est-ce pas toi qui vas revenir nous faire vivre,
  - type: text
    content: afin que ton peuple se réjouisse en toi ?
  '8':
  - type: text
    content: ' '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-nous voir ta fidélité'
  - type: text
    content: et donne-nous ton salut !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'J''écouterai… 81.6 ; Ha 2.1. –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  il parle pour la paix 35.20n  ; cf. 122.8 ; 125.5 ; 128.6 ; Es 57.19 ; Jr 6.14+ ; Za 1.13 ; Est 10.3n  ; Lc 2.14. –  stupidité  : le terme hébreu peut aussi avoir le sens d’ assurance, confiance en soi  ; certains modifient le texte hébreu traditionnel pour lire et (il parle) de confiance à ceux qui se tournent vers lui  ; cf. 49.14 ; 78.7 (terme apparenté) ; même mot Jb 4.6.'
  - type: text
    content: 'J''écouterai ce que dit Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: car il parle pour la paix de son peuple et de ses fidèles ;
  - type: text
    content: mais qu'ils ne retournent pas à la stupidité !
