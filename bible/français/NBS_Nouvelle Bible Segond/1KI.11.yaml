  - type: text
    text: 'Partis de Madiân, ils allèrent à Parân, prirent avec eux des hommes de Parân et arrivèrent en Egypte auprès du pharaon, le roi d''Egypte, qui lui donna une maison, lui assura sa nourriture et lui donna une terre. '
