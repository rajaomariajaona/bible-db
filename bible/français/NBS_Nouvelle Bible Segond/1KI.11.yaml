document_id: 1KI.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salomon devient infidèle au Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Mais…  : sur cette rupture de ton, où l''éloge cède la place à la condamnation, voir l''introduction♦. –  femmes étrangères  : cf. Pr 2.16n. –  la fille du pharaon 3.1+. –  des Moabites, des Ammonites…  : cf. Gn 19.37s ; Nb 25.1 ; Dt 20.17 ; 23.4 ; Jos 3.10n  ; Esd 9.1 ; Né 13.1,23.'
  - type: text
    content: 'Mais le roi Salomon avait aimé beaucoup de femmes étrangères, outre la fille du pharaon : des Moabites, des Ammonites, des Edomites, des Sidoniennes, des Hittites, '
  '10':
  - type: note
    content: 'ne pas suivre d''autres dieux  : cf. 9.6 ; 14.8 ; Dt 4.3 ; Jr 2.8. –  Salomon…  : litt. il…'
  - type: text
    content: 'Il lui avait ordonné, à ce sujet, de ne pas suivre d''autres dieux ; mais Salomon n''observa pas ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné. '
  '11':
  - type: note
    content: 'tu n''as pas observé mon alliance Gn 17.9 ; Dt 29.8 ; Ps 132.12. –  prescriptions  : voir loi. –  instituées  : le même terme hébreu est plus généralement traduit par ordonner  ; cf. v. 10,38. –  pour te l''ôter  : litt. de dessus toi  ; cf. 1S 15.27s.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Salomon : Puisqu''il en est ainsi de toi, puisque tu n''as pas observé mon alliance et mes prescriptions, telles que je les avais instituées pour toi, je vais déchirer le royaume pour te l''ôter et le donner à ton serviteur. '
  '12':
  - type: note
    content: 'pendant ta vie  : litt. dans tes jours.'
  - type: text
    content: 'Seulement, je ne le ferai pas pendant ta vie, à cause de David, ton père : c''est de la main de ton fils que je l''arracherai. '
  '13':
  - type: note
    content: 'Je n''arracherai… pas  : cf. v. 29-31. –  une tribu  : Juda ; cf. v. 32 ; 12.21. –  à cause de David, mon serviteur v. 32,34,36,38 ; 2R 19.34 ; 20.6 ; Es 37.35 ; cf. 2R 8.19 ; Ps 132.10. –  à cause de Jérusalem v. 32 ; cf. Es 62.1.'
  - type: text
    content: Je n'arracherai cependant pas tout le royaume ; je laisserai une tribu à ton fils, à cause de David, mon serviteur, et à cause de Jérusalem que j'ai choisie.
  - type: heading
    content: Deux adversaires de Salomon
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur suscita…  : les problèmes politiques, extérieurs et intérieurs (v. 26), du règne de Salomon apparaissent comme les conséquences de sa faute ; cf. 2R 10.32ss. –  un adversaire  : hébreu satân , de même aux v. 23,25. –  Hadad  : ce nom était donné en Orient à certains personnages en l''honneur du dieu de l''orage qui portait ce nom (voir Baal).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' suscita un adversaire à Salomon : Hadad, l''Edomite, qui était de descendance royale en Edom. '
  '15':
  - type: note
    content: 'Au temps où David…  : cf. 2S 8.13s. –  en Edom  : litt. avec Edom  ; LXX avait exterminé Edom.'
  - type: text
    content: 'Au temps où David était en Edom, Joab, le chef de l''armée, qui était monté ensevelir les morts, tua tous les mâles qui étaient en Edom. '
  '16':
  - type: text
    content: 'Joab y resta six mois avec tout Israël, jusqu''à ce qu''il eût retranché tous les mâles d''Edom. '
  '17':
  - type: note
    content: Hadad v. 14n  ; le nom est orthographié différemment les deux fois qu'il apparaît dans ce v. (hébreu ’Adad / Hadad).
  - type: text
    content: 'C''est alors que Hadad s''enfuit avec des serviteurs édomites de son père pour se rendre en Egypte. Hadad était encore un jeune garçon. '
  '18':
  - type: note
    content: 'Madiân Ex 2.15n. –  Parân Nb 10.12n. –  pharaon  : peut-être celui de 3.1n. –  et lui donna une terre  : absent de LXX.'
  - type: text
    content: 'Partis de Madiân, ils allèrent à Parân, prirent avec eux des hommes de Parân et arrivèrent en Egypte auprès du pharaon, le roi d''Egypte, qui lui donna une maison, lui assura sa nourriture et lui donna une terre. '
  '19':
  - type: note
    content: 'trouva grâce… Gn 6.8+. –  la grande dame  : litt. la puissante  ; même terme hébreu en 15.13 ; 2R 10.13 ; Jr 13.18n  ; 29.2 ; 2Ch 15.16. Ce mot pourrait rendre approximativement le sens du nom Tahpenès, qui ne serait pas à l''origine un nom propre, mais un titre égyptien désignant l''épouse du roi.'
  - type: text
    content: 'Hadad trouva grâce aux yeux du pharaon, à tel point que le pharaon lui donna pour femme la sœur de sa femme, la sœur de Tahpenès, la grande dame. '
  '2':
  - type: note
    content: 'Vous n''irez pas…  : cf. Ex 23.32s ; 34.12-16 ; Dt 7.1-4 ; Jos 23.12.'
  - type: text
    content: 'venant des nations au sujet desquelles le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit aux Israélites : Vous n''irez pas chez eux, et ils ne viendront pas chez vous ; ils inclineraient à coup sûr votre cœur vers leurs dieux. C''est à eux que Salomon s''attacha, entraîné par l''amour. '
  '20':
  - type: note
    content: 'Guenoubath  : ce nom a été rapproché d''un terme arabe désignant un hôte étranger (cf. Ex 2.22). –  le sevra  : LXX l''éleva. Cf. Ex 2.9s.'
  - type: text
    content: 'La sœur de Tahpenès lui donna un fils, Guenoubath. Tahpenès le sevra dans la maison du pharaon ; Guenoubath resta dans la maison du pharaon, au milieu des fils du pharaon. '
  '21':
  - type: note
    content: couché avec ses pères 1.21n.
  - type: text
    content: 'Hadad apprit en Egypte que David s''était couché avec ses pères et que Joab, le chef de l''armée, était mort. Hadad dit au pharaon : Laisse-moi partir dans mon pays. '
  '22':
  - type: text
    content: 'Le pharaon lui dit : Que te manque-t-il auprès de moi, pour que tu désires aller dans ton pays ? Il répondit : Rien, mais laisse-moi quand même partir.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'suscita un autre adversaire…  : litt. fit lever pour lui un adversaire  ; v. 14n. –  son maître ou son seigneur . –  Hadad-Ezer ( Secours de Hadad  ; cf. v. 14n) , roi de Tsoba  : cf. 2S 8.3,5,12 ; 1Ch 18.3,5,9.'
  - type: text
    content: 'Dieu suscita un autre adversaire à Salomon : Rezôn, fils d''Eliada, qui s''était enfui de chez son maître Hadad-Ezer, roi de Tsoba. '
  '24':
  - type: note
    content: 'il était devenu…  : on peut comprendre ce texte difficile de plusieurs façons : Rezôn devint chef de bande pour se défendre contre les massacres perpétrés par David ; ou bien Rezôn et ses hommes s''enfuirent vers Damas pour échapper aux massacres. Ou encore : Rezôn et ses hommes s''installèrent à Damas à la faveur de massacres perpétrés par David dans cette ville.'
  - type: text
    content: 'Il avait rassemblé des hommes auprès de lui ; il était devenu chef d''une troupe armée – lorsque David les massacrait. Ils allèrent à Damas, y restèrent et régnèrent à Damas. '
  '25':
  - type: note
    content: 'régna  : cf. v. 24, autre traduction devint roi, cf. v. 43.'
  - type: text
    content: Il fut un adversaire d'Israël pendant tous les jours de Salomon – en plus du mal que faisait Hadad. Il prit Israël en horreur. Il régna sur Aram.
  - type: heading
    content: La sécession de Jéroboam
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Jéroboam  : hébreu Yarov‘am ( Le peuple se multipliera ), futur roi d''Israël (12.20). –  Ephratite  : autre traduction Ephraïmite  ; cf. Jg 12.5n  ; 1S 1.1n  ; 17.12 ; Rt 1.2n. –  Tseréda  : nom de lieu conservé dans l''actuelle Serida , nom d''une source à Der Gassân, à 21 km au nord de Lod. Peut être également Tsartân (Jos 3.16). –  leva la main  : l''expression peut vouloir dire se révolta , sans qu''il y ait eu voie de fait. Cf. 2S 18.28 ; 20.21.'
  - type: text
    content: 'Jéroboam était fils de Nebath, un Ephratite de Tseréda, et il avait pour mère une veuve nommée Tseroua. Il faisait partie de la cour de Salomon, mais il leva la main contre le roi. '
  '27':
  - type: note
    content: le Millo 9.15n.
  - type: text
    content: 'Voici dans quelles circonstances il leva la main contre le roi : Salomon bâtissait le Millo et fermait la brèche de la Ville de David, son père. '
  '28':
  - type: note
    content: 'fort et vaillant  : en contexte militaire, la même expression hébraïque est souvent traduite par vaillant guerrier  ; cf. Jg 6.12+ ; 11.1 ; 1S 9.1 ; 14.52 ; 16.18 ; 2R 5.1 ; Rt 2.1n  ; 1Ch 12.29 ; 28.1 ; 2Ch 13.3 ; 17.16s ; 25.6 ; 32.21. –  travail obligatoire  : un terme hébreu apparenté est traduit par porteurs de fardeaux en 5.29 ; un autre est rendu par corvées en Ex 1.11+ ; Ps 81.7 ; Né 4.11. –  la maison de Joseph  : les tribus de Manassé et d''Ephraïm. Chaque tribu apportait à tour de rôle son concours aux travaux royaux (cf. 4.7 ; 5.7).'
  - type: text
    content: 'Jéroboam était un homme fort et vaillant ; Salomon, ayant vu ce jeune homme à l''œuvre, le nomma responsable du travail obligatoire pour toute la maison de Joseph. '
  '29':
  - type: note
    content: 'Ahiya (YHWH est mon frère) : le même nom est écrit Ahiyahou en 14.4-6,18. –  Silo 1S 1.3n  ; 4.3 ; voir aussi Jos 18.1n.'
  - type: text
    content: 'En ce temps-là, Jéroboam sortit de Jérusalem et trouva en chemin Ahiya de Silo, le prophète, qui était couvert d''un manteau neuf. Ils étaient seuls tous les deux dans la campagne. '
  '3':
  - type: note
    content: 'sept cents princesses… trois cents concubines… ses femmes  : cf. Ct 6.8 ; voir aussi 2S 5.13n  ; 15.16 ; 20.3 ; 1Ch 3.1-9 ; 2Ch 11.21.'
  - type: text
    content: 'Il eut sept cents princesses pour femmes et trois cents concubines ; et ses femmes inclinèrent son cœur. '
  '30':
  - type: note
    content: 'douze morceaux  : litt. douze déchirures, de même au v. 31. Ces douze morceaux représentent les douze tribus d''Israël. Cf. 1S 15.27s ; Es 20 ; Jr 13.1-14 ; 27.2-13 ; Ez 3.24ss ; 4.1-17.'
  - type: text
    content: 'Ahiya prit le manteau neuf qu''il avait sur lui, le déchira en douze morceaux '
  '31':
  - type: note
    content: 'J''arrache…  : cf. v. 35. –  dix tribus  : cf. 2S 19.44.'
  - type: text
    content: 'et dit à Jéroboam : Prends dix morceaux ! Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : J''arrache le royaume de la main de Salomon, et je te donnerai dix tribus. '
  '32':
  - type: note
    content: 'une seule tribu…  : LXX deux tribus  ; cf. v. 36 ; 12.20. –  à cause de David, mon serviteur… v. 13+. –  la ville que j''ai choisie v. 36 ; 2R 23.27 ; cf. 1R 8.16+ ; 2Ch 6.5.'
  - type: text
    content: 'Cependant, une seule tribu lui restera, à cause de David, mon serviteur, et à cause de Jérusalem, la ville que j''ai choisie parmi toutes les tribus d''Israël ; '
  '33':
  - type: note
    content: 'Astarté v. 5n. –  déesse  : le même terme est traduit par dieu dans la suite. –  Kemosh v. 7n. –  Milkom v. 5n. –  ce qui me convient  : litt. ce qui est droit à mes yeux  ; cf. v. 38 ; Dt 6.18n. –  son père  : le père de Salomon.'
  - type: text
    content: 'et cela, parce qu''ils m''ont abandonné et se sont prosternés devant Astarté, déesse des Sidoniens, devant Kemosh, dieu de Moab, et devant Milkom, dieu des Ammonites, et parce qu''ils n''ont pas suivi mes voies pour faire ce qui me convient et pour observer mes prescriptions et mes règles, comme David, son père. '
  '34':
  - type: note
    content: à cause de David, mon serviteur v. 13+.
  - type: text
    content: 'Je ne lui prendrai pas tout le royaume ; je le maintiendrai comme prince tous les jours de sa vie, à cause de David, mon serviteur, que j''ai choisi, et qui a observé mes commandements et mes prescriptions. '
  '35':
  - type: note
    content: 'Mais je prendrai…  : cf. v. 31. –  je t''en donnerai…  : cf. v. 31+.'
  - type: text
    content: 'Mais je prendrai le royaume à son fils et je t''en donnerai dix tribus. '
  '36':
  - type: note
    content: 'Je donnerai une tribu…  : cf. v. 32+. –  ait toujours (litt. tous les jours) une lampe  : expression semblant désigner la postérité de la dynastie régnante de David ; cf. 15.4 ; 2R 8.19 ; 2Ch 21.7. Voir aussi Ps 132.17n. Certains rapprochent le terme hébreu d''une autre racine (homonymie ?) et lui donnent le sens de champ défriché, ce qui pourrait être une autre métaphore pour la famille royale (cf. Jr 4.3 ; Os 10.12). –  pour y placer mon nom  : cf. 9.3+.'
  - type: text
    content: 'Je donnerai une tribu à son fils, afin que David, mon serviteur, ait toujours une lampe devant moi à Jérusalem, la ville que j''ai choisie pour y placer mon nom. '
  '37':
  - type: note
    content: 'sur tout ce que tu désires  : autres traductions sur tout ce que ton âme (cf. Gn 1.20n) désire ; exactement comme tu le désires  ; même expression en 2S 3.21.'
  - type: text
    content: 'Je te prendrai, et tu régneras sur tout ce que tu désires, tu seras roi sur Israël. '
  '38':
  - type: note
    content: 'Si tu écoutes  : cf. Dt 11.13 ; 28.1 ; Jr 17.24 ; Za 6.15. –  si tu suis mes voies  : cf. Dt 28.9. –  en observant…  : cf. Dt 6.2. –  je serai avec toi  : cf. Gn 26.3 ; 28.15 ; 31.3 ; Ex 3.12 ; Dt 31.3 ; Jos 1.5 ; 3.7 ; Jg 6.16 ; 2S 7.9 ; 1Ch 17.8. –  bâtirai… une maison  : cf. Dt 25.9 ; 2S 7.27 ; voir aussi 2S 7.11 (faire une maison). –  stable  : les termes de la promesse faite ici à Jéroboam sont les termes mêmes de la promesse faite à David en 2S 7.16. Cf. 1S 2.35n  ; 25.28.'
  - type: text
    content: 'Si tu écoutes tout ce que je t''ordonne, si tu suis mes voies et si tu fais ce qui me convient, en observant mes prescriptions et mes commandements, comme l''a fait David, mon serviteur, je serai avec toi, je bâtirai pour toi une maison stable, comme j''en ai bâti une pour David, et je te donnerai Israël. '
  '39':
  - type: note
    content: 'pour toujours  : litt. tous les jours.'
  - type: text
    content: J'affligerai la descendance de David à cause de cela, mais ce ne sera pas pour toujours.
  '4':
  - type: text
    content: 'Au temps de la vieillesse de Salomon, ses femmes inclinèrent son cœur vers d''autres dieux ; son cœur ne fut pas tout entier avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), son Dieu, comme l''avait été le cœur de David, son père. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon chercha…  : comparer l''attitude de Saül à l''égard de David (1S 19.1s ; 20.33). –  s''enfuit  : litt. se leva et s''enfuit . –  Shishaq  : il s''agit de Shéshonq Ier (≈ 945-924 av. J.-C.), pharaon libyen, fondateur de la XXIIe dynastie égyptienne ; cf. 14.25-28 ; 2Ch 12.1-12.'
  - type: text
    content: Salomon chercha à faire mourir Jéroboam. Alors Jéroboam s'enfuit en Egypte auprès de Shishaq, roi d'Egypte ; il resta en Egypte jusqu'à la mort de Salomon.
  - type: heading
    content: La mort de Salomon
  - type: heading
    content: 2Ch 9.29-31
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 14.19,29 ; 15.7,23,31 ; 16.5,14,20,27 ; 22.39,46 ; 2R 1.18 ; 8.23 ; 10.34 ; 12.20 ; 13.8,12 ; 14.15,18,28 ; 15.6,11,15,21,26,31,36 ; 16.19 ; 20.20 ; 21.17,25 ; 23.28 ; 24.5 ; 1Ch 29.29 ; 2Ch 9.29 ; 12.15 ; 13.22 ; 16.11 ; 20.34 ; 25.26 ; 26.22 ; 27.7 ; 32.32 ; 33.18 ; 35.26s ; 36.8. –  l''histoire  : le mot hébreu employé ici signifie aussi bien événements que paroles. –  cela est écrit…  : litt. cela n''est-il pas écrit… ? de même dans plusieurs notices de ce type (15.7 ; 16.14 ; 22.39 ; 2R 1.18 ; 8.23 ; 10.34 ; 13.8,12 ; 15.21 ; voir aussi Jos 10.13 ; Est 10.2), renvoyant à des sources qui ne nous sont pas parvenues.'
  - type: text
    content: 'Le reste de l''histoire de Salomon, tout ce qu''il a fait, sa sagesse, cela est écrit dans le livre de l''histoire de Salomon. '
  '42':
  - type: note
    content: 'Le temps  : litt. les jours. –  quarante ans  : cf. 2.11.'
  - type: text
    content: 'Le temps du règne de Salomon à Jérusalem sur tout Israël fut de quarante ans. '
  '43':
  - type: note
    content: 'Cf. 1.21n  ; 2.10+. –  enseveli…  : cf. 2.10+. –  Roboam  : hébreu Rehav‘am (Le peuple s''est élargi).'
  - type: text
    content: Salomon se coucha avec ses pères et fut enseveli dans la Ville de David, son père. Roboam, son fils, devint roi à sa place.
  '5':
  - type: note
    content: 'Astarté  : hébreu ’Ashtoreth  ; déesse cananéenne de l''amour et de la fécondité. La vocalisation du nom dans le texte hébreu traditionnel évoque aussi le mot bosheth, honte. C''est une déformation méprisante, cf. 2S 2.8n  ; 4.4n  ; voir aussi Jg 2.13ss. –  Milkom est proche du mot signifiant roi  ; cf. v. 33 ; 2R 23.13 ; Jr 49.1,3. –  l''horreur  : terme méprisant pour désigner les faux dieux ; cf. v. 7 ; Dt 29.16 ; 2R 23.13 ; Jr 4.1 ; 7.30 ; Ez 5.11 ; 7.20.'
  - type: text
    content: 'Salomon suivit Astarté, la déesse des Sidoniens, et Milkom, l''horreur des Ammonites. '
  '6':
  - type: note
    content: 'fit ce qui déplaisait au Seigneur  : litt. fit ce qui (est) mauvais aux yeux de YHWH  ; cf. 14.22+ ; 15.26,34 ; 16.25,30 ; 22.53 ; Nb 22.34n  ; 32.13 ; Dt 4.25 ; 17.2 ; 31.29 ; 2R 3.2 ; 8.18,27 ; 13.2 etc. ; Jr 52.2. –  ne remplit pas ses obligations envers…  : cf. Nb 14.24n. –  comme David, son père  : cf. 15.11 ; 2R 14.3.'
  - type: text
    content: 'Salomon fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il ne remplit pas ses obligations envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' comme David, son père. '
  '7':
  - type: note
    content: la montagne… en face de Jérusalem, c.-à-d. le mont des Oliviers, appelé en 2R 23.13+ mont de la Destruction  ; cf. 2S 15.30. –  Kemosh Nb 21.29n. –  l'horreur v. 5n. –  Molek a la même racine que Milkom, v. 5n  ; voir aussi Lv 18.21n  ; 20.2-5 ; 2R 23.10 ; Jr 32.35.
  - type: text
    content: 'Alors Salomon bâtit dans la montagne qui est en face de Jérusalem un haut lieu pour Kemosh, l''horreur de Moab, et pour Molek, l''horreur des Ammonites. '
  '8':
  - type: note
    content: 'Il agissait ainsi…  : cf. Siracide 47.19s : « Tu (Salomon) as livré tes flancs aux femmes, tu as été asservi dans ton corps. Tu as infligé une tache à ta gloire, tu as profané ta race au point d''amener la colère sur tes enfants et de leur faire déplorer ta folie. »'
  - type: text
    content: Il agissait ainsi pour toutes ses femmes étrangères qui offraient de l'encens et des sacrifices à leurs dieux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'qui lui était apparu par deux fois  : cf. 3.5 ; 9.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Salomon, parce qu''il avait détourné son cœur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui lui était apparu par deux fois. '
