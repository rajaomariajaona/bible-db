      - type: text
        text: '11.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'couché avec ses pères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Hadad apprit en Egypte que David s''était couché avec ses pères et que Joab, le chef de l''armée, était mort. Hadad dit au pharaon : Laisse-moi partir dans mon pays. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le pharaon lui dit : Que te manque-t-il auprès de moi, pour que tu désires aller dans ton pays ? Il répondit : Rien, mais laisse-moi quand même partir.'
