    marker-yv: yv-n
  - type: text
    text: 'La sœur de Tahpenès lui donna un fils, Guenoubath. Tahpenès le sevra dans la maison du pharaon ; Guenoubath resta dans la maison du pharaon, au milieu des fils du pharaon. '
  - type: usfm
    marker: v
    metadata:
