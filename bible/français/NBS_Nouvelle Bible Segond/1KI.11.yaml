segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Salomon devient infidèle au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mais…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sur cette rupture de ton, où l''éloge cède la place à la condamnation, voir l''introduction♦. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: femmes étrangères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Pr 2.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la fille du pharaon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des Moabites, des Ammonites…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 19.37s ; Nb 25.1 ; Dt 20.17 ; 23.4 ; Jos 3.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Esd 9.1 ; Né 13.1,23.'
    marker-yv: yv-n
  - type: text
    text: 'Mais le roi Salomon avait aimé beaucoup de femmes étrangères, outre la fille du pharaon : des Moabites, des Ammonites, des Edomites, des Sidoniennes, des Hittites, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous n'irez pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 23.32s ; 34.12-16 ; Dt 7.1-4 ; Jos 23.12.'
    marker-yv: yv-n
  - type: text
    text: 'venant des nations au sujet desquelles le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dit aux Israélites : Vous n''irez pas chez eux, et ils ne viendront pas chez vous ; ils inclineraient à coup sûr votre cœur vers leurs dieux. C''est à eux que Salomon s''attacha, entraîné par l''amour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept cents princesses… trois cents concubines… ses femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ct 6.8 ; voir aussi 2S 5.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 15.16 ; 20.3 ; 1Ch 3.1-9 ; 2Ch 11.21.'
    marker-yv: yv-n
  - type: text
    text: 'Il eut sept cents princesses pour femmes et trois cents concubines ; et ses femmes inclinèrent son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Au temps de la vieillesse de Salomon, ses femmes inclinèrent son cœur vers d''autres dieux ; son cœur ne fut pas tout entier avec le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), son Dieu, comme l''avait été le cœur de David, son père. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Astarté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ’Ashtoreth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; déesse cananéenne de l''amour et de la fécondité. La vocalisation du nom dans le texte hébreu traditionnel évoque aussi le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bosheth, honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . C'est une déformation méprisante, cf. 2S 2.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Jg 2.13ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Milkom '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est proche du mot signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 33 ; 2R 23.13 ; Jr 49.1,3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'horreur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : terme méprisant pour désigner les faux dieux ; cf. v. 7 ; Dt 29.16 ; 2R 23.13 ; Jr 4.1 ; 7.30 ; Ez 5.11 ; 7.20.'
    marker-yv: yv-n
  - type: text
    text: 'Salomon suivit Astarté, la déesse des Sidoniens, et Milkom, l''horreur des Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fit ce qui déplaisait au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fit ce qui (est) mauvais aux yeux de YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 14.22+ ; 15.26,34 ; 16.25,30 ; 22.53 ; Nb 22.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 32.13 ; Dt 4.25 ; 17.2 ; 31.29 ; 2R 3.2 ; 8.18,27 ; 13.2 etc. ; Jr 52.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne remplit pas ses obligations envers…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 14.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme David, son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.11 ; 2R 14.3.'
    marker-yv: yv-n
  - type: text
    text: 'Salomon fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; il ne remplit pas ses obligations envers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' comme David, son père. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la montagne… en face de Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. le mont des Oliviers, appelé en 2R 23.13+ '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mont de la Destruction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2S 15.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Kemosh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 21.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''horreur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Molek '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a la même racine que '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Milkom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', v. 5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Lv 18.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 20.2-5 ; 2R 23.10 ; Jr 32.35.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Salomon bâtit dans la montagne qui est en face de Jérusalem un haut lieu pour Kemosh, l''horreur de Moab, et pour Molek, l''horreur des Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il agissait ainsi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '47.19s : « Tu (Salomon) as livré tes flancs aux femmes, tu as été asservi dans ton corps. Tu as infligé une tache à ta gloire, tu as profané ta race au point d''amener la colère sur tes enfants et de leur faire déplorer ta folie. »'
    marker-yv: yv-n
  - type: text
    text: Il agissait ainsi pour toutes ses femmes étrangères qui offraient de l'encens et des sacrifices à leurs dieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui lui était apparu par deux fois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 3.5 ; 9.2.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se mit en colère contre Salomon, parce qu''il avait détourné son cœur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, qui lui était apparu par deux fois. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne pas suivre d'autres dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.6 ; 14.8 ; Dt 4.3 ; Jr 2.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Salomon…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il…
    marker-yv: yv-n
  - type: text
    text: 'Il lui avait ordonné, à ce sujet, de ne pas suivre d''autres dieux ; mais Salomon n''observa pas ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu n''as pas observé mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 17.9 ; Dt 29.8 ; Ps 132.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prescriptions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: instituées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme hébreu est plus généralement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ordonner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10,38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour te l'ôter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de dessus toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 15.27s.'
    marker-yv: yv-n
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Salomon : Puisqu''il en est ainsi de toi, puisque tu n''as pas observé mon alliance et mes prescriptions, telles que je les avais instituées pour toi, je vais déchirer le royaume pour te l''ôter et le donner à ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pendant ta vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans tes jours.
    marker-yv: yv-n
  - type: text
    text: 'Seulement, je ne le ferai pas pendant ta vie, à cause de David, ton père : c''est de la main de ton fils que je l''arracherai. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je n'arracherai… pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 29-31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une tribu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Juda ; cf. v. 32 ; 12.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à cause de David, mon serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 32,34,36,38 ; 2R 19.34 ; 20.6 ; Es 37.35 ; cf. 2R 8.19 ; Ps 132.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à cause de Jérusalem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 32 ; cf. Es 62.1.
    marker-yv: yv-n
  - type: text
    text: Je n'arracherai cependant pas tout le royaume ; je laisserai une tribu à ton fils, à cause de David, mon serviteur, et à cause de Jérusalem que j'ai choisie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deux adversaires de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' suscita…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les problèmes politiques, extérieurs et intérieurs (v. 26), du règne de Salomon apparaissent comme les conséquences de sa faute ; cf. 2R 10.32ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un adversaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: satân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même aux v. 23,25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hadad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
