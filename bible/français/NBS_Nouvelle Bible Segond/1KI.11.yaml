    marker-yv: yv-n
  - type: text
    text: 'Hadad trouva grâce aux yeux du pharaon, à tel point que le pharaon lui donna pour femme la sœur de sa femme, la sœur de Tahpenès, la grande dame. '
  - type: usfm
    marker: v
