      marker: fr
      children:
      - type: text
        text: '11.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il était devenu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre ce texte difficile de plusieurs façons : Rezôn devint chef de bande pour se défendre contre les massacres perpétrés par David ; ou bien Rezôn et ses hommes s''enfuirent vers Damas pour échapper aux massacres. Ou encore : Rezôn et ses hommes s''installèrent à Damas à la faveur de massacres perpétrés par David dans cette ville.'
    marker-yv: yv-n
  - type: text
    text: 'Il avait rassemblé des hommes auprès de lui ; il était devenu chef d''une troupe armée – lorsque David les massacrait. Ils allèrent à Damas, y restèrent et régnèrent à Damas. '
  - type: usfm
    marker: v
    metadata:
