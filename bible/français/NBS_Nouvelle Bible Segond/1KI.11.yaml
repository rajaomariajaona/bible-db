  - type: text
    text: 'Au temps où David était en Edom, Joab, le chef de l''armée, qui était monté ensevelir les morts, tua tous les mâles qui étaient en Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab y resta six mois avec tout Israël, jusqu''à ce qu''il eût retranché tous les mâles d''Edom. '
  - type: usfm
    marker: v
