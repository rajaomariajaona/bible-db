    marker-yv: yv-n
  - type: text
    text: 'Jéroboam était fils de Nebath, un Ephratite de Tseréda, et il avait pour mère une veuve nommée Tseroua. Il faisait partie de la cour de Salomon, mais il leva la main contre le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Millo '
    - type: usfm
