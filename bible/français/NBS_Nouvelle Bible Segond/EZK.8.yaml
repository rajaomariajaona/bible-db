document_id: EZK.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'idolâtrie dans le temple de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sixième année '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de l'exil de Joïakîn (cf. 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), soit en 592 av. J.-C. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les anciens… devant moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 14.1 ; 20.1 ; 33.31 ; 2R 6.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la main…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: là, la main du Seigneur YHWH tomba sur moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1.3+.
      marker-yv: yv-n
    - type: text
      text: 'La sixième année, le cinquième jour du sixième mois, j''étais assis chez moi, et les anciens de Juda étaient assis devant moi, lorsque la main du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ' s''abattit sur moi.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: images
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'forme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 3 ; c''est celui qui est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'modèle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Dt 4.16ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bestioles… bêtes – des horreurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 7.21 ; 11.8,10,44 ; 20.25 ; Es 66.17 ; Ac 10.10-14.'
      marker-yv: yv-n
    - type: text
      text: 'J''entrai et je regardai ; il y avait là toutes sortes d''images de bestioles et de bêtes – des horreurs – et toutes les idoles de la maison d''Israël étaient gravées sur le mur, tout autour. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Soixante-dix des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 24.1 ; Nb 11.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant elles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : devant les idoles ; cf. Dt 4.16-18 ; 5.8s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'encensoir à la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 16 ; 2Ch 26.16-19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: épais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sens du mot hébreu est incertain ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le parfum d'un nuage d'encens, l'adoration d'un nuage d'encens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme pourrait être apparenté au verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'intercéder '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se laisser fléchir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Gn 25.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ez 35.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Soixante-dix des anciens de la maison d''Israël, et au milieu d''eux Yaazania, fils de Shaphân, se tenaient debout devant elles, chacun l''encensoir à la main ; un épais nuage d''encens s''élevait. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chacun…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chacun dans les pièces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les chambres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de son ornement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le terme correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ornement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir Lv 26.1 ; Nb 33.52. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' ne nous voit pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.9 ; Es 29.15 ; Ps 10.11 ; 73.11 ; 94.7 ; Jb 22.13.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Humain, vois-tu ce que font dans les ténèbres les anciens de la maison d''Israël, chacun dans sa salle ornée d''images ? Ils disent : « Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne nous voit pas, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a abandonné le pays ! » '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 6+.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Tu verras encore d''autres grandes abominations qu''ils commettent.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tammouz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : dieu mésopotamien de la végétation, dont on pleurait la mort au début de la saison sèche (au mois dit de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tammouz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. juin-juillet) et dont on célébrait ensuite la résurrection ; il était aussi connu dans l''Antiquité grecque sous le nom d''Adonis (de l''invocation '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: adoni, mon Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dans le culte syro-phénicien) ; sur les cultes de la végétation, cf. 6.13+ ; Jg 11.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 1.29 ; 17.10s ; 66.17 ; Os 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Za 12.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il me conduisit à l''entrée de la porte de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', du côté du nord. Il y avait là des femmes assises, qui pleuraient Tammouz. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 6+.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Vois-tu, humain ? Tu verras encore d''autres abominations plus grandes que celles-là.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 6.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tournaient le dos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''entrée du sanctuaire était située à l''est. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le soleil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 4.19 ; 2R 21.5 ; 23.5,11.'
      marker-yv: yv-n
    - type: text
      text: 'Il me conduisit dans la cour intérieure de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : à l''entrée du temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', entre le vestibule et l''autel, il y avait environ vingt-cinq hommes qui tournaient le dos au temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et le visage vers l''est ; ils se prosternaient vers l''est devant le soleil. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les gens de…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la maison de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils continuent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faut-il encore qu''ils continuent… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui approchent le rameau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 15.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de mon nez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après une indication des scribes, selon laquelle le texte original aurait porté la première personne du singulier ; le texte hébreu traditionnel porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: … de leur nez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. L''expression, d''interprétation difficile, fait peut-être allusion à une pratique rituelle ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils excitent ma colère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils me présentent une puanteur.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Vois-tu, humain ? Est-ce peu de chose pour les gens de la maison de Juda de commettre les abominations qu''ils commettent ici ? Ils continuent à me contrarier en remplissant le pays de violence. Les voilà qui approchent le rameau de mon nez ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans pitié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils crieront…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils crieront d'une grande voix à mes oreilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 9.1 ; cf. Jr 11.11.'
      marker-yv: yv-n
    - type: text
      text: Moi aussi, j'agirai avec fureur ; mon œil sera sans pitié, je n'épargnerai personne ; quand ils crieront vers moi à pleine voix, je ne les entendrai pas.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dont l''aspect ressemblait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui correspondrait à une variante légère en hébreu ; cf. 1.26-28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'éclat étincelant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je regardai : il y avait quelque chose dont l''aspect ressemblait à du feu – du feu à partir de ce qui paraissait être ses reins jusqu''en bas, et l''aspect d''un rayonnement, d''un éclat étincelant, à partir de ses reins jusqu''en haut. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: forme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme au v. 10 ('
      - type: usfm
        marker: fqa
