      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ma chevelure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ma tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un souffle '
      - type: usfm
        marker: ft
        children:
