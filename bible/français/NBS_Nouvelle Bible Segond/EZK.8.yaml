document_id: EZK.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'idolâtrie dans le temple de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'sixième année de l''exil de Joïakîn (cf. 1.2n), soit en 592 av. J.-C. –  les anciens… devant moi  : cf. 14.1 ; 20.1 ; 33.31 ; 2R 6.32. –  la main…  : litt. là, la main du Seigneur YHWH tomba sur moi  ; cf. 1.3+.'
  - type: text
    content: 'La sixième année, le cinquième jour du sixième mois, j''étais assis chez moi, et les anciens de Juda étaient assis devant moi, lorsque la main du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' s''abattit sur moi.'
  '10':
  - type: note
    content: 'images  : le même mot a été traduit par forme au v. 3 ; c''est celui qui est rendu par modèle en Dt 4.16ss. –  bestioles… bêtes – des horreurs  : cf. Lv 7.21 ; 11.8,10,44 ; 20.25 ; Es 66.17 ; Ac 10.10-14.'
  - type: text
    content: 'J''entrai et je regardai ; il y avait là toutes sortes d''images de bestioles et de bêtes – des horreurs – et toutes les idoles de la maison d''Israël étaient gravées sur le mur, tout autour. '
  '11':
  - type: note
    content: 'Soixante-dix des anciens  : cf. Ex 24.1 ; Nb 11.16. –  devant elles  : devant les idoles ; cf. Dt 4.16-18 ; 5.8s. –  l''encensoir à la main  : cf. Nb 16 ; 2Ch 26.16-19. –  épais  : le sens du mot hébreu est incertain ; autres traductions le parfum d''un nuage d''encens, l''adoration d''un nuage d''encens  ; le terme pourrait être apparenté au verbe traduit par intercéder et se laisser fléchir en Gn 25.21n  ; voir aussi Ez 35.13n.'
  - type: text
    content: 'Soixante-dix des anciens de la maison d''Israël, et au milieu d''eux Yaazania, fils de Shaphân, se tenaient debout devant elles, chacun l''encensoir à la main ; un épais nuage d''encens s''élevait. '
  '12':
  - type: note
    content: 'chacun…  : litt. chacun dans les pièces (ou les chambres) de son ornement  ; sur le terme correspondant à ornement voir Lv 26.1 ; Nb 33.52. –  Le Seigneur ne nous voit pas 9.9 ; Es 29.15 ; Ps 10.11 ; 73.11 ; 94.7 ; Jb 22.13.'
  - type: text
    content: 'Il me dit : Humain, vois-tu ce que font dans les ténèbres les anciens de la maison d''Israël, chacun dans sa salle ornée d''images ? Ils disent : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne nous voit pas, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a abandonné le pays ! » '
  '13':
  - type: note
    content: V. 6+.
  - type: text
    content: 'Il me dit : Tu verras encore d''autres grandes abominations qu''ils commettent.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Tammouz  : dieu mésopotamien de la végétation, dont on pleurait la mort au début de la saison sèche (au mois dit de Tammouz , c.-à-d. juin-juillet) et dont on célébrait ensuite la résurrection ; il était aussi connu dans l''Antiquité grecque sous le nom d''Adonis (de l''invocation adoni, mon Seigneur , dans le culte syro-phénicien) ; sur les cultes de la végétation, cf. 6.13+ ; Jg 11.40n  ; Es 1.29 ; 17.10s ; 66.17 ; Os 6.2n  ; Za 12.11n.'
  - type: text
    content: 'Il me conduisit à l''entrée de la porte de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', du côté du nord. Il y avait là des femmes assises, qui pleuraient Tammouz. '
  '15':
  - type: note
    content: V. 6+.
  - type: text
    content: 'Il me dit : Vois-tu, humain ? Tu verras encore d''autres abominations plus grandes que celles-là.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'temple  : cf. Es 6.1n. –  tournaient le dos  : l''entrée du sanctuaire était située à l''est. –  le soleil  : cf. Dt 4.19 ; 2R 21.5 ; 23.5,11.'
  - type: text
    content: 'Il me conduisit dans la cour intérieure de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : à l''entrée du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', entre le vestibule et l''autel, il y avait environ vingt-cinq hommes qui tournaient le dos au temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et le visage vers l''est ; ils se prosternaient vers l''est devant le soleil. '
  '17':
  - type: note
    content: 'les gens de…  : litt. la maison de Juda. –  Ils continuent…  : autre traduction faut-il encore qu''ils continuent… ? –  qui approchent le rameau (cf. 15.2n) de mon nez, d''après une indication des scribes, selon laquelle le texte original aurait porté la première personne du singulier ; le texte hébreu traditionnel porte … de leur nez. L''expression, d''interprétation difficile, fait peut-être allusion à une pratique rituelle ; certains comprennent ils excitent ma colère, ou encore ils me présentent une puanteur.'
  - type: text
    content: 'Il me dit : Vois-tu, humain ? Est-ce peu de chose pour les gens de la maison de Juda de commettre les abominations qu''ils commettent ici ? Ils continuent à me contrarier en remplissant le pays de violence. Les voilà qui approchent le rameau de mon nez ! '
  '18':
  - type: note
    content: 'sans pitié 5.11+. –  ils crieront…  : litt. ils crieront d''une grande voix à mes oreilles  ; cf. 9.1 ; cf. Jr 11.11.'
  - type: text
    content: Moi aussi, j'agirai avec fureur ; mon œil sera sans pitié, je n'épargnerai personne ; quand ils crieront vers moi à pleine voix, je ne les entendrai pas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dont l''aspect ressemblait 1.5n. –  du feu  : LXX a lu un homme , ce qui correspondrait à une variante légère en hébreu ; cf. 1.26-28. –  éclat étincelant 1.4n.'
  - type: text
    content: 'Je regardai : il y avait quelque chose dont l''aspect ressemblait à du feu – du feu à partir de ce qui paraissait être ses reins jusqu''en bas, et l''aspect d''un rayonnement, d''un éclat étincelant, à partir de ses reins jusqu''en haut. '
  '3':
  - type: note
    content: 'forme  : même terme au v. 10 (images) ; 10.8 ; voir Ex 25.9n. –  main  : cf. 2.9. –  une mèche  : cf. Nb 15.38n. –  de ma chevelure  : litt. de ma tête. –  Un souffle (ou le Souffle, cf. 2.2n) m''enleva  : cf. 3.12,14 ; voir aussi Lc 4.9. –  visions divines 1.1n. –  à l''entrée de la porte intérieure  : on pourrait aussi traduire à l''entrée de la porte de la cour intérieure  ; dans l''enceinte du temple (cf. v. 5). –  l''effigie (cf. Dt 4.16n) de la passion jalouse  : il s''agit d''une idole (v. 5 ; peut-être celle de Tammouz  ; cf. v. 14n). –  qui provoque la jalousie  : cf. 5.13+.'
  - type: text
    content: 'Il étendit une forme de main et me saisit par une mèche de ma chevelure. Un souffle m''enleva entre la terre et le ciel et me transporta, dans des visions divines, à Jérusalem, à l''entrée de la porte intérieure qui donne sur le nord, où était l''effigie de la passion jalouse, qui provoque la jalousie. '
  '4':
  - type: note
    content: Cf. 1.28 ; 3.22s. – Voir gloire.
  - type: text
    content: La gloire du Dieu d'Israël était là ; son aspect était tel que je l'avais vu dans la vallée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Humain 2.1n. –  vers le nord  : litt. chemin du nord.'
  - type: text
    content: 'Il me dit : Humain, lève les yeux vers le nord, je te prie ! Je levai les yeux vers le nord, et je vis l''effigie de la passion jalouse au nord de la porte de l''autel, à l''entrée. '
  '6':
  - type: note
    content: pour que je m'éloigne de (cf. 10.18 ; 11.23), litt. pour l'éloignement de  ; on pourrait aussi comprendre en s'éloignant de, auquel cas l'expression viserait les cultes évoqués dans le contexte, qui se pratiquaient hors du sanctuaire proprement dit. –  d'autres grandes abominations v. 13,15 ; cf. 5.9.
  - type: text
    content: 'Il me dit : Humain, vois-tu ce qu''ils font, les grandes abominations que commet ici la maison d''Israël, pour que je m''éloigne de mon sanctuaire ? Mais tu verras encore d''autres grandes abominations.'
  '7':
  - type: text
    content: 'Alors il me conduisit à l''entrée de la cour. Je vis un trou dans le mur. '
  '8':
  - type: text
    content: 'Il me dit : Humain, creuse le mur, je te prie ! Je creusai le mur, et une ouverture apparut. '
  '9':
  - type: note
    content: 'funestes  : litt. mauvaises  ; cf. 6.11.'
  - type: text
    content: 'Il me dit : Entre et vois les abominations funestes qu''ils commettent ici ! '
