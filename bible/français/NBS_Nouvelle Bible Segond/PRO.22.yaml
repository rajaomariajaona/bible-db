        - type: text
          text: '24.13ss : « L''homme n''est qu''argile et paille, c''est le dieu qui le construit. Chaque jour il démolit et construit. Il fait mille pauvres quand il le souhaite, il fait mille fonctionnaires quand c''est pour lui l''heure de (donner) la vie. »'
