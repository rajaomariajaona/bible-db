document_id: PRO.22,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Un nom  : autres traductions le nom ; une renommée 27.21 ; cf. Ec 7.1. – Voir grâce. –  l''argent… l''or 3.14n.'
  - type: text
    content: Un nom est préférable à de grandes richesses ;
  - type: text
    content: la grâce vaut mieux que l'argent et que l'or.
  '10':
  - type: text
    content: ' '
  - type: note
    content: insolent 1.22n. – Les mots correspondant à dispute et à mépris (3.35+) font assonance en hébreu. Cf. 26.20.
  - type: text
    content: Chasse l'insolent, et la dispute prendra fin ;
  - type: text
    content: litiges et mépris cesseront.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui aime la pureté du cœur  : LXX le Seigneur aime les cœurs saints, tous ceux qui sont sans défaut sont agréés de lui ; par les lèvres le roi fait paître (son troupeau) . Cf. Ps 101.6 ; Mt 5.8. –  le roi est son ami  : certains modifient le texte hébreu traditionnel pour lire il a la faveur du roi.'
  - type: text
    content: Celui qui aime la pureté du cœur,
  - type: text
    content: la grâce est sur ses lèvres, et le roi est son ami.
  '12':
  - type: text
    content: 'Les yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ' préservent la connaissance ;'
  - type: text
    content: il rejette les paroles du traître.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 26.13. –  Le paresseux 6.6n.
  - type: text
    content: 'Le paresseux dit : « Il y a un lion dans la rue !'
  - type: text
    content: Je serai tué au milieu de la place ! »
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ec 7.26. –  des autres femmes ou des étrangères ; des prostituées  ; cf. 2.16n  ; 23.33n  ; Siracide 9.3 : « Ne va pas au-devant d''une courtisane, prends garde de tomber dans ses filets. » Cf. Ec 7.26. –  une fosse profonde 23.27.'
  - type: text
    content: La bouche des autres femmes est une fosse profonde ;
  - type: text
    content: 'celui contre qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est furieux y tombe.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'le bâton  : cf. 10.13n. –  la correction ou l''instruction  ; cf. 1.2n  ; 19.18 ; 29.17.'
  - type: text
    content: L'imbécillité est attachée au cœur de l'enfant ;
  - type: text
    content: c'est le bâton de la correction qui l'éloignera de lui.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui opprime…  : on pourrait aussi comprendre celui qui opprime le pauvre pour augmenter son propre bien donne au riche, pour arriver lui-même à l''appauvrissement . Cf. 14.31 ; 17.5.'
  - type: text
    content: Celui qui opprime le pauvre arrive à le rendre riche,
  - type: text
    content: celui qui donne au riche n'arrive qu'à l'appauvrir.
  - type: heading
    content: Paroles des sages
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Tends l''oreille pour écouter les paroles des sages  : ces mots servent sans doute de titre à ce passage (cf. 24.23). Les proverbes de cette section (surtout 22.17–23.11) présentent des ressemblances particulièrement marquées avec l''ouvrage égyptien intitulé Instruction d''Aménémopé (cf. v. 20n), qui s''ouvre par ces mots (3.9ss) : « Tends l''oreille, écoute ce qui est dit ; incline ton cœur pour le comprendre ; il est utile de mettre cela en ton cœur. » Cf. 23.12 ; 25.23n.'
  - type: text
    content: Tends l'oreille pour écouter les paroles des sages ;
  - type: text
    content: applique ton cœur à ma connaissance.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'au dedans de toi  : litt. dans ton ventre.'
  - type: text
    content: Car il est beau que tu les gardes au dedans de toi,
  - type: text
    content: qu'elles soient toutes prêtes sur tes lèvres.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ta confiance  : autre traduction ta sécurité . –  je veux te donner…  : LXX je te ferai connaître sa voie (ou ta voie , selon un ms).'
  - type: text
    content: 'Afin que ta confiance soit dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je veux te donner la connaissance, à toi-même, aujourd'hui.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 29.13. –  c''est le Seigneur qui les fait (autre traduction qui les a faits ) : cf. Jb 31.15 ; Mt 5.45 ; Sagesse 6.7 : « Le souverain de tous ne reculera devant personne et ne tiendra pas compte de la grandeur : il a créé le petit comme le grand et sa providence est la même pour tous. » Voir aussi v. 7 ; 10.15+,22 ; 13.23+ ; 14.20+,31 ; 18.11 ; 19.17 ; 28.8. – Cf. Instruction d''Aménémopé 24.13ss : « L''homme n''est qu''argile et paille, c''est le dieu qui le construit. Chaque jour il démolit et construit. Il fait mille pauvres quand il le souhaite, il fait mille fonctionnaires quand c''est pour lui l''heure de (donner) la vie. »'
  - type: text
    content: 'Le riche et le pauvre se retrouvent :'
  - type: text
    content: 'c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui les fait tous deux.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'trente instructions  : litt. trente  ; le terme hébreu est lu traditionnellement avec une vocalisation différente : ou bien trois fois , ou bien avant-hier (c.-à-d. naguère, autrefois ) ; de nombreux spécialistes y voient cependant une référence directe aux trente chapitres de l’ Instruction d''Aménémopé , avec laquelle cette portion du livre des Proverbes présente de nombreuses analogies (v. 17n). On peut lire dans sa conclusion (27.7ss) : « Tu vois ces trente chapitres ; ils divertissent et ils instruisent ; ce sont les meilleurs des livres : ils donnent la connaissance à l''ignorant. » –  des conseils  : litt. dans (ou par ) des conseils.'
  - type: text
    content: Ne t'ai-je pas écrit trente instructions,
  - type: text
    content: des conseils et de la connaissance,
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Instruction d''Aménémopé 1.5s : « Pour savoir répondre à celui qui parle, et faire rapport à celui qui envoie. »'
  - type: text
    content: pour te faire connaître ce qui est sûr, des paroles vraies,
  - type: text
    content: afin que tu puisses répondre par des paroles vraies à celui qui t'envoie ?
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'n''écrase pas…  : cf. Jb 5.4n  ; voir aussi Es 3.15 ; Za 7.10 ; Ps 82.3s ; Jb 31.13. –  à la porte ( de la ville est sous-entendu) : c.-à-d. en justice, le tribunal siégeant à la porte de la ville (cf. Dt 16.18n). – Cf. Instruction d''Aménémopé 4.4s : « Garde-toi de dépouiller l''opprimé et d''écraser celui qui est démuni. »'
  - type: text
    content: Ne dépouille pas le faible, parce qu'il est faible,
  - type: text
    content: n'écrase pas le pauvre à la porte de la ville ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'car le Seigneur …  : cf. 23.11 ; Ex 22.22s ; Ps 10.18. –  il frustrera  : même verbe en Ml 3.8s.'
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' défendra leur cause,'
  - type: text
    content: il frustrera de leur vie ceux qui les auront frustrés.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'l''individu coléreux  : litt. un maître (hébreu ba`al ) de colère . –  ne va pas…  : autre traduction n''entre pas chez l''homme furieux . – Cf. Instruction d''Aménémopé 11.13s : « Ne fréquente pas l''homme impulsif, ne t''approche pas de lui pour lier conversation. » Siracide 8.15 : « Ne fais pas route avec l''audacieux, de peur qu''il ne t''accable de maux. Car il se dirigera selon sa volonté et par sa folie tu périras avec lui. »'
  - type: text
    content: Ne fréquente pas l'individu coléreux,
  - type: text
    content: ne va pas avec l'homme furieux,
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'que tu n''y trouves  : litt. que tu ne prennes . –  pour ta vie  : autre traduction pour toi-même  ; sur le terme hébreu correspondant, voir Gn 1.20n.'
  - type: text
    content: de peur que tu ne t'habitues à ses sentiers
  - type: text
    content: et que tu n'y trouves un piège pour ta vie.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui prennent des engagements  : litt. ceux qui tapent (dans) la paume , pour prendre un engagement ; cf. 6.1n. –  des prêts  : cf. Dt 24.10n.'
  - type: text
    content: Ne sois pas de ceux qui prennent des engagements,
  - type: text
    content: qui se portent garants pour des prêts ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'donner en compensation  : le verbe signifie aussi s''acquitter (d''une promesse, d''un vœu), rétribuer, rendre . –  te prendrait-on ton lit  : litt. prendrait-on ton lit de dessous toi  ; LXX on prendra le lit qui est sous tes flancs  ; cf. 20.16.'
  - type: text
    content: si tu n'as rien à donner en compensation,
  - type: text
    content: pourquoi te prendrait-on ton lit ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'la borne  : le terme est habituellement traduit par territoire, frontière, limite  ; 23.10 ; cf. 15.25n ( propriété ) ; Dt 19.14n  ; 27.17. –  ont posée  : litt. ont faite.'
  - type: text
    content: Ne déplace pas la borne ancienne
  - type: text
    content: que tes pères ont posée.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Il se tient devant des rois  : parce qu''il entre à leur service. – Cf. Instruction d''Aménémopé 27.16s : « Quant au scribe qui est expert en sa charge, il sera jugé digne d''être courtisan. »'
  - type: text
    content: As-tu vu un homme habile dans son ouvrage ?
  - type: text
    content: Il se tient devant des rois,
  - type: text
    content: il ne se tient pas devant des gens obscurs.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme avisé 1.4n  ; 27.12. – Les mots correspondant à voit et à malheur font assonance en hébreu. –  naïfs 1.4n. –  passent outre…  : litt. passent et sont frappés d''une amende (17.26n).'
  - type: text
    content: L'homme avisé voit le malheur, et il se cache ;
  - type: text
    content: les naïfs passent outre, et ils doivent en payer le prix.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'La conséquence  : autres traductions la récompense ; le revenu . Certains comprennent la conséquence de l''humilité, c''est la crainte du Seigneur, la richesse, la gloire et la vie . –  humilité / crainte du Seigneur (1.7n) 15.33 ; cf. 21.21.'
  - type: text
    content: 'La conséquence de l''humilité, de la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: c'est la richesse, la gloire et la vie.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'la voie de l''homme tortueux  : autre traduction la voie tortueuse . –  celui qui se garde lui-même  : autre traduction celui qui garde sa vie.'
  - type: text
    content: Des épines, des pièges sont sur la voie de l'homme tortueux ;
  - type: text
    content: celui qui se garde lui-même s'en éloigne.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. ne figure pas dans LXX. –  Initie  : le verbe hébreu correspondant signifie habituellement faire la dédicace (cf. 1R 8.63) ou inaugurer (cf. Dt 20.5) ; autres traductions éduque ; oriente . –  le jeune homme  : autre traduction le jeune garçon  ; le terme correspondant peut aussi désigner un serviteur  ; cf. 20.11 ; 23.13. –  à la voie qu''il doit suivre  : litt. sur la bouche de sa voie , ce qui pourrait aussi signifier à l''orée de sa voie . Cf. Siracide 6.18 : « Mon fils, dès ta jeunesse accueille l''instruction, jusqu''à tes cheveux blancs tu trouveras la sagesse. »'
  - type: text
    content: Initie le jeune homme à la voie qu'il doit suivre ;
  - type: text
    content: même quand il sera vieux, il ne s'en écartera pas.
  '7':
  - type: text
    content: Le riche domine sur les pauvres ;
  - type: text
    content: celui qui emprunte est l'esclave de celui qui prête.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui sème  : cf. Jb 4.8 ; Siracide 7.3 : « Ne sème pas dans les sillons de l''injustice, de peur d''en récolter sept fois plus. » – Voir justice. –  moissonne  : cf. Os 10.13. –  le bâton (cf. 10.13n) de sa colère disparaît  : sens incertain. LXX il paiera (ou accomplira ) le châtiment de ses œuvres. Dieu bénit l''homme joyeux et généreux, mais il (l''homme) paiera la futilité de ses œuvres  ; cf. 2Co 9.5ss.'
  - type: text
    content: Celui qui sème l'injustice moissonne le mal ;
  - type: text
    content: le bâton de sa colère disparaît.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme dont le regard est bon  : litt. celui qui a l''œil bon . –  est béni  : autre traduction sera béni . –  il donne de son pain  : cf. 19.17 ; 28.27 ; Ps 112.9 ; Lc 14.13s ; 2Co 9.6.'
  - type: text
    content: L'homme dont le regard est bon est béni,
  - type: text
    content: parce qu'il donne de son pain au pauvre.
