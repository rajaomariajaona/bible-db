          text: '6.7 : « Le souverain de tous ne reculera devant personne et ne tiendra pas compte de la grandeur : il a créé le petit comme le grand et sa providence est la même pour tous. » Voir aussi v. 7 ; 10.15+,22 ; 13.23+ ; 14.20+,31 ; 18.11 ; 19.17 ; 28.8. – Cf. '
