document_id: PRO.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mise en garde contre les séductrices
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.8n  ; 3.1+.
  - type: text
    content: Mon fils, prête attention à ma sagesse,
  - type: text
    content: tends l'oreille vers mon intelligence,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ton bien  : litt. ta force  ; cf. 24.10n. –  d''un autre  : litt. d''un étranger  ; cf. Ec 6.2.'
  - type: text
    content: de peur que des étrangers se rassasient de ton bien
  - type: text
    content: et que le produit de ta peine soit pour la maison d'un autre ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'gémisses  : le verbe évoque aussi un grondement  ; cf. 19.12 ; 20.2 ; 28.15 ; Ez 24.23n  ; Ps 38.9. –  par la suite  : litt. à ta suite ou à ta fin . – Voir chair.'
  - type: text
    content: de peur que tu gémisses, par la suite,
  - type: text
    content: quand ta chair et ton corps s'épuiseront,
  '12':
  - type: text
    content: ' '
  - type: note
    content: l'instruction 1.2n. – Voir cœur. –  avertissements 1.23n.
  - type: text
    content: 'et que tu dises : Comment donc ai-je pu détester l''instruction ?'
  - type: text
    content: Comment mon cœur a-t-il pu mépriser les avertissements ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'lorsqu''ils m''instruisaient  : litt. à ceux qui m''instruisaient.'
  - type: text
    content: Comment ai-je pu ne pas écouter mes maîtres,
  - type: text
    content: ne pas tendre l'oreille lorsqu'ils m'instruisaient ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai été bien vite…  : autre traduction pour un peu j''aurais été au comble du malheur…'
  - type: text
    content: J'ai été bien vite au comble du malheur
  - type: text
    content: au milieu de l'assemblée et de la communauté.
  - type: heading
    content: Aimer la femme de sa jeunesse
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Bois…  : cf. 11.22 ; 18.22 ; 19.13s ; 21.9 ; 25.24 ; 27.15 ; 31.10ss ; Ct 4.12-15 ; voir aussi Os 1.2+.'
  - type: text
    content: Bois l'eau de ta propre citerne,
  - type: text
    content: celle qui coule de ton puits.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'canaux d''irrigation  : cf. 21.1.'
  - type: text
    content: Tes sources doivent-elles se répandre dans les rues,
  - type: text
    content: tes canaux d'irrigation doivent-ils couler sur les places ?
  '17':
  - type: text
    content: Qu'ils soient pour toi seul,
  - type: text
    content: et non pour des étrangers avec toi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: la femme Ec 9.9.
  - type: text
    content: Que ta source soit bénie,
  - type: text
    content: et fais ta joie de la femme de ta jeunesse,
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'enivre-toi…  : litt. que ses seins t''abreuvent  ; même verbe en 7.18 ; 11.25. –  grisé  : litt. égaré  ; cf. v. 20,23 ; 19.27 ; 20.1.'
  - type: text
    content: biche des amours, gazelle gracieuse ;
  - type: text
    content: enivre-toi de ses seins en tout temps,
  - type: text
    content: sois sans cesse grisé par son amour.
  '2':
  - type: text
    content: pour que tu gardes la réflexion
  - type: text
    content: et que tes lèvres préservent la connaissance.
  '20':
  - type: text
    content: ' '
  - type: note
    content: autre femme v. 3 ; 2.16+.
  - type: text
    content: Pourquoi, mon fils, serais-tu grisé par une autre femme
  - type: text
    content: et étreindrais-tu la poitrine d'une inconnue ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'voies de l''homme 2.13n. –  devant les yeux du Seigneur  : cf. 15.3 ; Jr 16.17 ; 32.19 ; Jb 31.4 ; 34.31 ; 2Ch 16.9. –  qui aplanit ou qui pèse  ; cf. v. 6 ; 4.26n  ; Es 26.7.'
  - type: text
    content: 'Car les voies de l''homme sont devant les yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: qui aplanit toutes ses routes.
  '22':
  - type: text
    content: Le méchant est pris dans ses propres fautes,
  - type: text
    content: il est retenu par les liens de son péché.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'il se perd, grisé  : litt. il s''égare ou il s''égarera  ; cf. v. 19n. –  l''excès de son imbécillité  : cf. 6.1-20.'
  - type: text
    content: Il meurt, faute d'avoir reçu l'instruction,
  - type: text
    content: il se perd, grisé par l'excès de son imbécillité.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'LXX ne t''approche pas de la femme mauvaise ; car c''est du miel qui coule des lèvres de la prostituée, et pour un temps elle adoucit ta gorge . –  l''autre femme 2.16n. –  sa bouche  : litt. son palais.'
  - type: text
    content: Car les lèvres de l'autre femme distillent le miel,
  - type: text
    content: et sa bouche est plus douce que l'huile ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'par la suite…  : litt. sa suite ou sa fin est amère…  ; LXX par la suite tu la trouveras plus amère que le fiel et plus acérée… –  l''absinthe  : tenue pour un poison (Dt 29.18 ; Jr 9.15 ; Am 6.12 ; Lm 3.19) à cause de son amertume (Lm 3.15 ; Ap 8.10,11) ; cf. Ec 7.26.'
  - type: text
    content: mais par la suite elle est amère comme l'absinthe,
  - type: text
    content: acérée comme une épée à deux tranchants.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'descendent 1.12n  ; cf. Siracide 19.3 : « La putréfaction et les vers, tel sera son lot, et sa témérité causera sa perte. » –  mènent tout droit au  : le même verbe a été traduit par tenir (31.19), tenir ferme (3.18 ; 4.4), retenir (v. 22 ; 28.17), se saisir (11.16 ; 29.23), arrêter (28.17). – Voir séjour des morts.'
  - type: text
    content: Ses pieds descendent vers la mort,
  - type: text
    content: ses pas mènent tout droit au séjour des morts.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Elle n''aplanit pas  : litt. de peur qu''elle n''aplanisse ou, peut-être, qu''elle réfléchisse (au sentier…) cf. v. 21 ; 4.26n. –  sentier de la vie  : cf. 2.19n  ; voir aussi 2.13n. –  sans qu''elle le sache  : autres traductions et elle ne sait pas où elle va  ; ou, peut-être, et tu ne sais pas où cela mène.'
  - type: text
    content: Elle n'aplanit pas le sentier de la vie,
  - type: text
    content: ses routes se perdent sans qu'elle le sache.
  '7':
  - type: text
    content: ' '
  - type: note
    content: écoutez-moi 1.8 ; 4.2.
  - type: text
    content: Maintenant donc, mes fils, écoutez-moi ;
  - type: text
    content: ne vous écartez pas des discours de ma bouche.
  '8':
  - type: text
    content: Eloigne d'elle ton chemin
  - type: text
    content: et ne t'approche pas de la porte de sa maison,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'ton honneur  : autre traduction ta dignité (cf. Nb 27.20) ; le terme est souvent traduit par éclat  ; cf. Ps 8.2n. –  homme cruel  : cf. v. 10 ; 6.34s.'
  - type: text
    content: de peur que tu ne livres ton honneur à d'autres,
  - type: text
    content: et tes années à un homme cruel ;
