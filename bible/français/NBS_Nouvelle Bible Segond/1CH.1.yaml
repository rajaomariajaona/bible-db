document_id: 1CH.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LISTES GÉNÉALOGIQUES
  - type: heading
    content: D'Adam aux descendants d'Esaü
  - type: heading
    content: Cf. Gn 5
  - type: text
    content: ' '
  - type: note
    content: 'Seth, Enosh  : cf. Gn 4.25-26n  ; 5.6ss ; Lc 3.38.'
  - type: text
    content: 'Adam, Seth, Enosh, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Nemrod  : cf. Gn 10.8n  ; Mi 5.5.'
  - type: text
    content: Koush engendra Nemrod ; c'est lui qui, le premier, fut un héros sur la terre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Les v. 11-23 sont absents de LXX.
  - type: text
    content: 'Egypte engendra les Loudites, les Anamites, les Lehabites, les Naphtouhites, '
  '12':
  - type: text
    content: les Patrousites, les Kaslouhites, d'où sont sortis les Philistins, et les Kaphtorites.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Sidon est le nom d'une des principales villes de Phénicie (Gn 49.13 ; 1R 17.9 ; Jr 25.22).
  - type: text
    content: 'Canaan engendra Sidon, son premier-né, et Heth, '
  '14':
  - type: text
    content: 'et les Jébusites, les Amorites, les Guirgashites, '
  '15':
  - type: text
    content: 'les Hivvites, les Arqites, les Sinites, '
  '16':
  - type: text
    content: les Arvadites, les Tsemarites, les Hamatites.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Assyrie  : hébreu ’Ashour , qui peut désigner soit l''empire de Haute-Mésopotamie qui connut son apogée au VIIIe s. av. J.-C. (2R 15.19 ; Es 7.17s ; Os 7.11), soit la capitale primitive de l''empire en question (Gn 2.14). –  Aram  : quelques mss hébreux et des versions anciennes ajoutent ici fils d''Aram , selon Gn 10.23. –  Méshek  : ce nom est déjà apparu au v. 5 ; ici une variante de lecture Mash (= Gn 10.23) est attestée par quelques mss hébreux et des versions anciennes.'
  - type: text
    content: 'Fils de Sem : Elam, Assyrie, Arpakshad, Loud et Aram ; Outs, Houl, Guéter et Méshek.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'engendra  : un ms de LXX ajoute ici Kaïnan ; Kaïnan engendra Shélah… cf. Gn 10.24n.'
  - type: text
    content: 'Arpakshad engendra Shélah ; et Shélah engendra Héber. '
  '19':
  - type: note
    content: Péleg est dérivé d'une racine qui signifie partager, séparer ou diviser  ; cf. Gn 10.25n.
  - type: text
    content: 'Deux fils naquirent d''Héber : le nom du premier était Péleg, parce qu''en ses jours la terre fut partagée, et le nom de son frère était Yoqtân. '
  '2':
  - type: note
    content: 'Caïnân…  : cf. Gn 5.12ss ; Lc 3.36s.'
  - type: text
    content: 'Caïnân, Mahalaléel, Yéred, '
  '20':
  - type: text
    content: 'Yoqtân engendra Almodad, Shéleph, Hatsarmaveth, Yérah, '
  '21':
  - type: text
    content: 'Hadoram, Ouzal, Diqla, '
  '22':
  - type: note
    content: 'Ebal  : Obal en Gn 10.28.'
  - type: text
    content: 'Ebal, Abimaël, Saba, '
  '23':
  - type: text
    content: Ophir, Havila et Yobab. Tous ceux-là sont les fils de Yoqtân.
  - type: heading
    content: Cf. Gn 11.10-26
  '24':
  - type: text
    content: 'Sem, Arpakshad, Shélah, '
  '25':
  - type: text
    content: 'Héber, Péleg, Réou, '
  '26':
  - type: text
    content: 'Seroug, Nahor, Térah, '
  '27':
  - type: note
    content: Cf. Gn 17.5 ; LXX ne mentionne que le deuxième nom Abraham.
  - type: text
    content: Abram, c'est-à-dire Abraham.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Bien qu'étant l'aîné, Ismaël (cf. Gn 16) n'est nommé qu'après son frère, car Isaac (cf. Gn 21) est l'ancêtre de la lignée israélite (cf. v. 34 ; voir Ga 4.22-31).
  - type: text
    content: 'Fils d''Abraham : Isaac et Ismaël.'
  - type: heading
    content: Cf. Gn 25
  '29':
  - type: text
    content: ' '
  - type: note
    content: généalogie 5.7 ; 7.2,4,9 ; 8.28 ; 9.9,34 ; 26.31n  ; Gn 2.4n.
  - type: text
    content: 'Voici leur généalogie : Nebayoth, premier-né d''Ismaël, Qédar, Adbéel, Mibsam, '
  '3':
  - type: note
    content: 'Hénoch  : cf. Gn 5.21ss ; Hé 11.5.'
  - type: text
    content: 'Hénoch, Mathusalem, Lémek, '
  '30':
  - type: text
    content: 'Mishma, Douma, Massa, Hadad, Téma, '
  '31':
  - type: text
    content: Yetour, Naphish et Qedma. Ce sont là les fils d'Ismaël.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'concubine d''Abraham  : cf. Gn 25.1. –  Zimrân… Gn 25.2. –  Saba et Dedân  : cf. v. 9.'
  - type: text
    content: 'Fils de Qetoura, concubine d''Abraham : elle mit au monde Zimrân, Yoqshân, Medân, Madiân, Yishbaq et Shouah. Fils de Yoqshân : Saba et Dedân.'
  '33':
  - type: text
    content: 'Fils de Madiân : Epha, Epher, Hénoch, Abida et Eldaa. Tous ceux-là sont fils de Qetoura.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Esaü et Israël  : cf. Gn 25.19-26, où le second des jumeaux porte son nom primitif de Jacob  ; ce n''est qu''en Gn 32.29 qu''il recevra le nom Israël.'
  - type: text
    content: 'Abraham engendra Isaac. Fils d''Isaac : Esaü et Israël.'
  - type: heading
    content: Cf. Gn 36.10-28
  '35':
  - type: text
    content: 'Fils d''Esaü : Eliphaz, Réouel, Yéoush, Yalam et Coré.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Tsephi  : de nombreux mss hébreux et certaines versions anciennes portent Tsepho comme en Gn 36.11. –  Fils d''Eliphaz… Timna  : cf. Gn 36.12.'
  - type: text
    content: 'Fils d''Eliphaz : Témân, Omar, Tsephi, Gatam, Qenaz, Timna et Amalec.'
  '37':
  - type: text
    content: 'Fils de Réouel : Nahath, Zérah, Shamma et Mizza.'
  '38':
  - type: text
    content: 'Fils de Séir : Lotân, Shobal, Tsibéôn, Ana, Dishôn, Etser et Dishân.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Homam  : Gn 36.22 Hémam  ; LXX a lu Emân ou Hémân et ajoute Elath (Hélath ?) et Namna à la place de la fin du v.'
  - type: text
    content: 'Fils de Lotân : Hori et Homam. Sœur de Lotân : Timna.'
  '4':
  - type: note
    content: 'Noé…  : LXX Noé ; fils de Noé : Sem… cf. Gn 6–9 ; Ez 14.14 ; Hé 11.7 ; 2P 2.5.'
  - type: text
    content: Noé, Sem, Cham et Japhet.
  - type: heading
    content: Cf. Gn 10
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Aliân / Shephi  : Alvân / Shepho en Gn 36.23. –  Onam  : un ms hébreu et LXX portent Onân.'
  - type: text
    content: 'Fils de Shobal : Aliân, Manahath, Ebal, Shephi et Onam.'
  - type: text
    content: 'Fils de Tsibéôn : Aya et Ana.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Dishôn  : est nommé une fois Dishân , en Gn 36.26. –  Hamrân est nommé Hemedân en Gn 36.26.'
  - type: text
    content: 'Fils d''Ana : Dishôn.'
  - type: text
    content: 'Fils de Dishôn : Hamrân, Eshbân, Yitrân et Kerân.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: Yaaqân est nommé Aqân en Gn 36.27.
  - type: text
    content: 'Fils d''Etser : Bilhân, Zaavân et Yaaqân. Fils de Dishân : Outs et Arân.'
  - type: heading
    content: Les rois et chefs d'Edom
  - type: heading
    content: Cf. Gn 36.31-43
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Voici les rois… pour les Israélites  : LXX voici leurs rois . –  Edom est un autre nom d’ Esaü , cf. Gn 25.29s. –  avant qu''un roi…  : cf. Gn 36.31n. –  Béla  : LXX Balak  ; cf. Gn 36.32n.'
  - type: text
    content: 'Voici les rois qui ont régné en Edom avant qu''un roi règne pour les Israélites : Béla, fils de Béor ; le nom de sa ville était Dinhaba. '
  '44':
  - type: text
    content: 'Béla mourut ; et Yobab, fils de Zérah, de Botsra, devint roi à sa place. '
  '45':
  - type: text
    content: 'Yobab mourut ; et Housham du pays des Témanites, devint roi à sa place. '
  '46':
  - type: note
    content: 'Avith  : autre lecture traditionnelle Ayouth  ; localisation incertaine.'
  - type: text
    content: 'Housham mourut ; et Hadad, fils de Bedad, devint roi à sa place. C''est lui qui battit Madiân au pays de Moab. Le nom de sa ville était Avith. '
  '47':
  - type: text
    content: 'Hadad mourut ; et Samla, de Masréqa, devint roi à sa place. '
  '48':
  - type: note
    content: Rehoboth-Nahar Gn 36.37n.
  - type: text
    content: 'Samla mourut ; et Saül, de Rehoboth-Nahar, devint roi à sa place. '
  '49':
  - type: text
    content: 'Saül mourut ; et Baal-Hanân, fils d''Akbor, devint roi à sa place. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Médie  : cf. 2R 17.6 ; Es 13.17 ; Dn 8.20. –  Grèce  : cf. Gn 10.2n  ; Es 66.19 ; Ez 27.13 ; Dn 8.21.'
  - type: text
    content: 'Fils de Japhet : Gomer, Magog, Médie, Grèce, Toubal, Méshek et Tiras.'
  '50':
  - type: text
    content: 'Baal-Hanân mourut, et Hadad devint roi à sa place. Le nom de sa ville était Paï, et le nom de sa femme Mehétabéel, fille de Matred, fille de Mé-Zahab. '
  '51':
  - type: text
    content: Hadad mourut.
  - type: text
    content: 'Les chefs d''Edom furent : le chef Timna, le chef Alva, le chef Yeteth, '
  '52':
  - type: text
    content: 'le chef Oholibama, le chef Ela, le chef Pinôn, '
  '53':
  - type: text
    content: 'le chef Qenaz, le chef Témân, le chef Mibtsar, '
  '54':
  - type: text
    content: le chef Magdiel, le chef Iram. Ce sont là les chefs d'Edom.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Diphath est appelé Riphath dans la liste parallèle en Gn 10.3 (en écriture hébraïque les lettres correspondant à D et R se confondent facilement) ; on ignore quelle était la forme primitive du nom.
  - type: text
    content: 'Fils de Gomer : Ashkenaz, Diphath et Togarma.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Chypre et Rhodes  : cf. Gn 10.4n  ; on trouve ici la même variante de lecture Rodanim / Dodanim (cf. v. 6n).'
  - type: text
    content: 'Fils de Grèce : Elisha, Tarsis, Chypre et Rhodes.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Dans d'autres textes, Koush désigne généralement une région située au sud de l'Egypte (Nubie ? Ethiopie ? Soudan ?) et parfois une région d'Arabie du sud-ouest ou de Babylonie ; cf. Gn 2.13n  ; 10.6ss. –  Canaan Gn 9.18n.
  - type: text
    content: 'Fils de Cham : Koush, Egypte, Pouth et Canaan.'
  '9':
  - type: text
    content: 'Fils de Koush : Seba, Havila, Sabta, Rama et Sabteka. – Fils de Rama : Saba et Dedân.'
