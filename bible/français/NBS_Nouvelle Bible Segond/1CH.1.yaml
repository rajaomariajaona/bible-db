      - type: text
        text: '1.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Diphath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Riphath '
    - type: usfm
      marker: ft
      children:
      - type: text
