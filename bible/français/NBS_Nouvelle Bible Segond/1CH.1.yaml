      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans d''autres textes, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Koush '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne généralement une région située au sud de l'Egypte (Nubie ? Ethiopie ? Soudan ?) et parfois une région d'Arabie du sud-ouest ou de Babylonie ; cf. Gn 2.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.6ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Canaan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 9.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Cham : Koush, Egypte, Pouth et Canaan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils de Koush : Seba, Havila, Sabta, Rama et Sabteka. – Fils de Rama : Saba et Dedân.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nemrod
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 10.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mi 5.5.'
    marker-yv: yv-n
  - type: text
    text: Koush engendra Nemrod ; c'est lui qui, le premier, fut un héros sur la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les v. 11-23 sont absents de LXX.
    marker-yv: yv-n
  - type: text
    text: 'Egypte engendra les Loudites, les Anamites, les Lehabites, les Naphtouhites, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: les Patrousites, les Kaslouhites, d'où sont sortis les Philistins, et les Kaphtorites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sidon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est le nom d'une des principales villes de Phénicie (Gn 49.13 ; 1R 17.9 ; Jr 25.22).
    marker-yv: yv-n
  - type: text
    text: 'Canaan engendra Sidon, son premier-né, et Heth, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et les Jébusites, les Amorites, les Guirgashites, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les Hivvites, les Arqites, les Sinites, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: les Arvadites, les Tsemarites, les Hamatites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Assyrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ’Ashour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui peut désigner soit l''empire de Haute-Mésopotamie qui connut son apogée au VIII'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s. av. J.-C. (2R 15.19 ; Es 7.17s ; Os 7.11), soit la capitale primitive de l''empire en question (Gn 2.14). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : quelques mss hébreux et des versions anciennes ajoutent ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fils d'Aram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon Gn 10.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Méshek
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce nom est déjà apparu au v. 5 ; ici une variante de lecture '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mash '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (= Gn 10.23) est attestée par quelques mss hébreux et des versions anciennes.
    marker-yv: yv-n
  - type: text
    text: 'Fils de Sem : Elam, Assyrie, Arpakshad, Loud et Aram ; Outs, Houl, Guéter et Méshek.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: engendra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : un ms de LXX ajoute ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kaïnan ; Kaïnan engendra Shélah… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. Gn 10.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Arpakshad engendra Shélah ; et Shélah engendra Héber. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Péleg '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est dérivé d''une racine qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'partager, séparer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: diviser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 10.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Deux fils naquirent d''Héber : le nom du premier était Péleg, parce qu''en ses jours la terre fut partagée, et le nom de son frère était Yoqtân. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yoqtân engendra Almodad, Shéleph, Hatsarmaveth, Yérah, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hadoram, Ouzal, Diqla, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ebal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Obal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Gn 10.28.
    marker-yv: yv-n
  - type: text
    text: 'Ebal, Abimaël, Saba, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ophir, Havila et Yobab. Tous ceux-là sont les fils de Yoqtân.
- type: usfm
  marker: r
  children:
  - type: text
    text: Cf. Gn 11.10-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sem, Arpakshad, Shélah, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Héber, Péleg, Réou, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Seroug, Nahor, Térah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Gn 17.5 ; LXX ne mentionne que le deuxième nom '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abraham.
    marker-yv: yv-n
  - type: text
    text: Abram, c'est-à-dire Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Bien qu''étant l''aîné, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ismaël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Gn 16) n''est nommé qu''après son frère, car '
    - type: usfm
      marker: fq
      children:
