document_id: JOB.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (suite) : il se plaint de Dieu'
  - type: text
    content: ' '
  - type: note
    content: 'celui d''un soldat  : autre traduction un service militaire , comme en 14.14 ; le mot est habituellement traduit par armée.'
  - type: text
    content: Le sort de l'homme sur la terre n'est-il pas celui d'un soldat,
  - type: text
    content: et ses jours ceux d'un salarié ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 8.18 ; 20.9 ; Ps 103.15s.
  - type: text
    content: il ne reviendra plus chez lui,
  - type: text
    content: et le lieu qu'il habitait ne le reconnaîtra plus.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'je parlerai 9.35 ; 10.1 ; 13.3,13 ; 23.4,7. –  dans ma détresse…  : litt. dans la détresse de mon esprit… dans l''amertume de mon âme  ; sur cette dernière expression, cf. 21.25 ; 27.2.'
  - type: text
    content: C'est pourquoi je ne retiendrai pas ma bouche,
  - type: text
    content: je parlerai dans ma détresse,
  - type: text
    content: je me plaindrai dans mon amertume.
  '12':
  - type: text
    content: ' '
  - type: note
    content: mer 9.8 ; 26.12n  ; 38.8,11 (voir aussi 3.8n) ; cf. Gn 1.6-8. Selon un mythe babylonien, Mardouk, après avoir terrassé le dragon ou monstre marin (Gn 1.21n  ; Es 27.1n), l'emprisonne et le confie à des gardes.
  - type: text
    content: Suis-je une mer, ou un dragon,
  - type: text
    content: pour que tu postes une garde contre moi ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'calmera ma plainte  : litt. portera (ou m''aidera à porter ) ma plainte , tournure analogue en Nb 11.17.'
  - type: text
    content: 'Quand je dis : Mon lit me consolera,'
  - type: text
    content: ma couche calmera ma plainte,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.13+. –  terrifies … effroi  : voir crainte.'
  - type: text
    content: alors tu me terrifies par des rêves,
  - type: text
    content: tu me remplis d'effroi par des visions.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Je préférerais…  : litt. ma vie (ou ma gorge , voir Gn 1.20n) a choisi l''étranglement  ; en modifiant la vocalisation traditionnelle du texte hébreu, certains traduisent tu as choisi l''étranglement de ma gorge . Sur le souhait de la mort , voir 3.21+ ; 6.9+ ; sur la strangulation ou pendaison, cf. 2S 17.23 ; Mt 27.5/ /. –  plutôt que ces os  : litt. que mes os  ; d''autres comprennent mes os souhaitent la mort  ; certains modifient le texte hébreu traditionnel pour lire la mort plutôt que mes douleurs.'
  - type: text
    content: Je préférerais être étranglé ;
  - type: text
    content: la mort plutôt que ces os !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'V. 7+. –  Je renonce  : le même verbe, habituellement traduit par rejeter ou mépriser (cf. 5.17 ; 8.20 ; 9.21 ; 10.3 ; 19.18 ; 30.1 ; 31.13), revient sans complément, comme ici, en 34.33 ; 36.5 ; 42.6n. Une autre forme du même verbe (ou d''un homonyme) est traduite par se décomposer en 7.5 ; certains, ici, modifient le texte hébreu traditionnel pour lire je dépéris . –  s''évaporent  : litt. (sont) une vapeur ou une futilité  ; sur le mot hébreu ainsi traduit, voir Gn 4.2n  ; Ps 39.6 ; Ec 1.2+.'
  - type: text
    content: Je renonce ! Je ne vivrai pas toujours…
  - type: text
    content: Laisse-moi, mes jours s'évaporent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'pour que tu te soucies de lui  : litt. et que tu mettes sur lui ton cœur  ; cf. Ps 8.5n  ; 144.3.'
  - type: text
    content: Qu'est-ce que l'homme,
  - type: text
    content: pour que tu en fasses tant de cas,
  - type: text
    content: pour que tu te soucies de lui,
  '18':
  - type: text
    content: ' '
  - type: note
    content: '33.11 ; 34.23 ; Ps 73.14 ; 139. –  l''éprouves  : le verbe hébreu peut évoquer la purification des métaux ; on le retrouve en 23.10 ; 34.36 et en 12.11 ; 34.3 ( discerner ) ; ailleurs il est souvent traduit par sonder (Ps 7.10+).'
  - type: text
    content: que tu t'occupes de lui chaque matin,
  - type: text
    content: que tu l'éprouves à chaque instant ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: 9.18 ; 10.20 ; 14.6 ; Ps 39.14.
  - type: text
    content: Quand cesseras-tu d'avoir le regard sur moi ?
  - type: text
    content: Quand me laisseras-tu le temps d'avaler ma salive ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 19.13 ; Dt 24.15 ; Mt 20.8. –  sa paye  : litt. son action , c.-à-d. le produit de son travail.'
  - type: text
    content: Comme l'esclave aspire à l'ombre,
  - type: text
    content: comme le salarié espère sa paye,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Voir péché. –  qu''ai-je pu te faire 35.6 ; Jr 7.18s. –  cible  : cf. 6.4+. –  En quoi te suis-je à charge ? d''après une tradition des scribes, la deuxième personne originelle ( te suis-je ) a été modifiée en première personne dans les manuscrits ( me suis-je ) par révérence envers Dieu.'
  - type: text
    content: Si j'ai péché, qu'ai-je pu te faire, gardien des humains ?
  - type: text
    content: Pourquoi m'as-tu pris pour cible ?
  - type: text
    content: En quoi te suis-je à charge ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: '10.14. –  ne pardonnes-tu pas  : autres traductions n''enlèves-tu pas ; ne supportes-tu pas ; ne te charges-tu pas de (terme apparenté au v. 20) ; cf. Ex 10.17n  ; 34.7n.'
  - type: text
    content: Que ne pardonnes-tu pas ma transgression,
  - type: text
    content: que ne laisses-tu passer ma faute ?
  - type: text
    content: Car maintenant je vais me coucher dans la poussière ;
  - type: text
    content: tu me chercheras, et je ne serai plus.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ec 2.23. –  des mois  : litt. des lunes  ; cf. 3.6n. –  de malheur  : autres traductions d''illusion ; inutiles  ; même terme en 11.11 ( faux ) ; 15.31 ; 31.5 ; 35.13 ; Ps 89.48.'
  - type: text
    content: moi, j'ai pour patrimoine des mois de malheur,
  - type: text
    content: j'ai pour mon compte des nuits de peine.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Quand me lèverai-je…  : LXX quand viendra le jour ? Et lorsque je me lève : Quand reviendra le soir ? Cf. Dt 28.67. –  aube  : le mot pourrait aussi désigner le crépuscule du soir.'
  - type: text
    content: 'Lorsque je me couche, je dis :'
  - type: text
    content: Quand me lèverai-je ?
  - type: text
    content: Le soir se prolonge,
  - type: text
    content: et je suis rassasié d'agitation jusqu'à l'aube.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '19.20. –  Mon corps  : litt. ma chair . –  se crevasse  : autre traduction se sclérose . –  se décompose  : cf. v. 16n.'
  - type: text
    content: Mon corps se couvre de vers et d'une croûte terreuse,
  - type: text
    content: ma peau se crevasse et se décompose.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'rapides 9.25. –  s''achèvent ou se dissipent , comme au v. 9. Le mot traduit par espoir désigne aussi un fil tendu, d''où l''autre traduction possible  : ils cessent faute de fil , comme une navette de tisserand (voir 6.9n).'
  - type: text
    content: Mes jours sont plus rapides que la navette du tisserand ;
  - type: text
    content: 'ils s''achèvent : plus d''espoir !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 16 ; 8.9 ; 10.20 ; 14.1s,5 ; Ps 78.39 ; 89.48 ; Ec 6.12.
  - type: text
    content: Souviens-toi que ma vie est un souffle !
  - type: text
    content: Mes yeux ne reverront pas le bonheur.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'me chercheront  : litt. (seront) sur moi  ; cf. 14.10.'
  - type: text
    content: L'œil qui me regarde ne m'apercevra plus ;
  - type: text
    content: tes yeux me chercheront, et je ne serai plus.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '10.21 ; 14.12 ; 16.22 ; Jc 4.14. Cf. Sagesse 1.16–2.4 : « Mais les impies ont invité l''Hadès du geste et de la voix, s''éprenant d''amitié pour lui, ils se sont pâmés, puis ils ont conclu un pacte avec lui. Aussi bien méritent-ils d''être de son parti. Car ils se disent entre eux, avec de faux raisonnements : Elle est courte et triste notre vie ; il n''y a pas de remède quand l''homme touche à sa fin et personne, à notre connaissance, n''est revenu de l''Hadès. Nous sommes nés à l''improviste et après, ce sera comme si nous n''avions pas existé. Le souffle dans nos narines n''est qu''une fumée, la pensée, une étincelle qui jaillit au battement de notre cœur. Qu''elle s''éteigne, le corps se résoudra en cendre et le souffle se dissipera comme l''air fluide. Notre nom sera oublié avec le temps et personne ne se rappellera nos actions. Notre vie aura passé comme un nuage, sans plus de traces, elle se dissipera telle la brume chassée par les rayons du soleil. » – Voir séjour des morts.'
  - type: text
    content: La nuée se dissipe, elle s'en va ;
  - type: text
    content: ainsi celui qui descend au séjour des morts n'en remontera pas ;
