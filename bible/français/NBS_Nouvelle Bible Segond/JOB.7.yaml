        - type: text
          text: '1.16–2.4 : « Mais les impies ont invité l''Hadès du geste et de la voix, s''éprenant d''amitié pour lui, ils se sont pâmés, puis ils ont conclu un pacte avec lui. Aussi bien méritent-ils d''être de son parti. Car ils se disent entre eux, avec de faux raisonnements : Elle est courte et triste notre vie ; il n''y a pas de remède quand l''homme touche à sa fin et personne, à notre connaissance, n''est revenu de l''Hadès. Nous sommes nés à l''improviste et après, ce sera comme si nous n''avions pas existé. Le souffle dans nos narines n''est qu''une fumée, la pensée, une étincelle qui jaillit au battement de notre cœur. Qu''elle s''éteigne, le corps se résoudra en cendre et le souffle se dissipera comme l''air fluide. Notre nom sera oublié avec le temps et personne ne se rappellera nos actions. Notre vie aura passé comme un nuage, sans plus de traces, elle se dissipera telle la brume chassée par les rayons du soleil. » – Voir '
