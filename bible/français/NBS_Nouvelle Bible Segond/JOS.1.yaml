    marker-yv: yv-n
  - type: text
    text: 'Moïse, mon serviteur, est mort ; maintenant, passe ce Jourdain, toi et tout ce peuple, vers le pays que je donne aux Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
