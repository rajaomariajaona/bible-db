    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ex 19.8 ; 24.7.'
    marker-yv: yv-n
  - type: text
    text: 'Ils répondirent à Josué : Tout ce que tu nous as ordonné, nous le ferons : nous irons partout où tu nous enverras. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nous t'écouterons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 34.9.'
    marker-yv: yv-n
  - type: text
    text: 'Nous t''écouterons exactement comme nous avons écouté Moïse. Seulement, que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, soit avec toi comme il a été avec Moïse ! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à tes ordres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ta bouche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'obéira pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
