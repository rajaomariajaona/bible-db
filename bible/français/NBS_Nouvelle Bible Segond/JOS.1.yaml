      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout lieu que vos pieds fouleront, je vous l''ai donné, comme je l''ai dit à Moïse : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Votre territoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'frontière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ici au pluriel). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis le désert…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 1.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'au grand fleuve, l'Euphrate
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ap 9.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout le pays des Hittites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de LXX et de Dt 11.24. L''expression désigne l''ensemble de la région située à l''ouest de l''Euphrate (Syrie et pays d''Israël) dans les documents néo-babyloniens. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la grande mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la Méditerranée ; de même en 9.1 ; 15.12,47 ; 23.4.'
    marker-yv: yv-n
  - type: text
    text: 'Votre territoire s''étendra depuis le désert et ce Liban, jusqu''au grand fleuve, l''Euphrate – tout le pays des Hittites, jusqu''à la grande mer, au soleil couchant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Personne ne tiendra…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 7.24 ; 11.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je serai avec toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.7 ; cf. 6.27 ; Gn 26.3 ; 31.3 ; Ex 3.12 ; Jg 6.16 ; 1R 11.38 ; Es 43.2 ; Jr 15.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je ne te délaisserai pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hé 13.5.
    marker-yv: yv-n
  - type: text
    text: 'Personne ne tiendra devant toi, tous les jours de ta vie. Je serai avec toi comme j''ai été avec Moïse ; je ne te délaisserai pas, je ne t''abandonnerai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sois fort… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 7,9,18 ; cf. Dt 31.7s,23 ; 1R 2.2 ; 20.22 ; Ag 2.4 ; Ps 27.14 ; 1Ch 22.13 ; 28.10,20 ; voir aussi Dt 3.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le pays que j''ai juré… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 6.8 ; 33.1 ; Nb 14.23 ; 32.11 ; Dt 1.35 ; 10.11 ; 31.20s,23 ; 34.4 ; Jg 2.1.
    marker-yv: yv-n
  - type: text
    text: 'Sois fort et courageux, car c''est toi qui vas donner à ce peuple, comme patrimoine, le pays que j''ai juré à leurs pères de leur donner. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sois fort… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour veiller à…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en veillant à…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même possibilité au v. 8 ; cf. Dt 28.13 ; 29.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' que Moïse, mon serviteur… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moïse, mon serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ap 15.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ni à droite ni à gauche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.6 ; Dt 5.32 ; 17.11,20 ; 28.14 ; 2R 22.2 ; Pr 4.27 ; 2Ch 34.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'partout où tu iras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9 ; cf. Gn 28.15.
    marker-yv: yv-n
  - type: text
    text: 'Seulement sois fort et très courageux, pour veiller à mettre en pratique toute la loi que Moïse, mon serviteur, a instituée pour toi ; ne t''en écarte ni à droite ni à gauche, afin de réussir partout où tu iras. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne s'éloignera pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 17.17s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu le reliras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu le réciteras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu le murmureras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''expression évoque une lecture personnelle, à voix basse, ou une méditation ; de même en Ps 1.2 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: redire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Ce livre de la loi ne s''éloignera pas de ta bouche ; tu le reliras jour et nuit pour veiller à mettre en pratique tout ce qui y est écrit ; alors tu mèneras à bien tes entreprises, tu réussiras. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sois fort… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ne t'effraie pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.1 ; 10.25 ; Dt 1.21,29 ; 7.21 ; 31.8 ; Ac 18.9s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', ton Dieu, est avec toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 17 ; cf. Dt 2.7 ; 20.1 ; 31.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'partout où tu iras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7+.
    marker-yv: yv-n
  - type: text
    text: 'Ne t''ai-je pas donné cet ordre : Sois fort et courageux ! Ne t''effraie pas, ne sois pas terrifié, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, est avec toi partout où tu iras.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué prépare la traversée du Jourdain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
