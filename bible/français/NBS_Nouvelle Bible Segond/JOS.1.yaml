      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'secrétaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribes
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) 3.2 ; 8.33 ; 23.2 ; 24.1 ; Ex 5.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',14s ; Nb 11.16 ; Dt 1.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Pr 6.7 ; 1Ch 26.29. Sur l''ensemble des v. 10-18, voir Nb 32.16-22 ; Dt 3.18-20 ; voir aussi Jos 22.1-9.'
    marker-yv: yv-n
  - type: text
    text: 'Josué donna cet ordre aux secrétaires du peuple : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous passez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 11.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous donne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous donne pour en prendre possession.
    marker-yv: yv-n
  - type: text
    text: 'Parcourez le camp, et donnez au peuple cet ordre : « Préparez-vous des provisions, car dans trois jours vous passez ce Jourdain pour aller prendre possession du pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous donne. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux Rubénites, aux Gadites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Nb 32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: demi-tribu de Manassé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Dt 3.13ss.'
    marker-yv: yv-n
  - type: text
    text: 'Josué dit aux Rubénites, aux Gadites et à la demi-tribu de Manassé : '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
