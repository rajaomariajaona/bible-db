      - type: text
        text: '  ; 7.7 ; 9.1,10 ; 12.1,7 ; 13.8,27,32 ; 14.3 ; 17.5 ; 18.7 ; 22.4,7 ; 24.8 ; Dt 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en ordre de bataille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.12 ; Ex 13.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 7.11.'
    marker-yv: yv-n
  - type: text
    text: 'Vos femmes, toutes vos familles et vos troupeaux resteront dans le pays que Moïse vous a donné en Transjordanie. Mais vous tous, vaillants guerriers, vous passerez en ordre de bataille devant vos frères, et vous les aiderez, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en Transjordanie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'jusqu''à ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ait accordé le repos à vos frères comme à vous, et qu''ils soient, eux aussi, en possession du pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, leur a donné. Après quoi vous reviendrez prendre possession du pays qui est votre propriété. Moïse, serviteur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', vous l''a donné en Transjordanie, du côté du soleil levant.'
