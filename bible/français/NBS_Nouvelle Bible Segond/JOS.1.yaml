  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tout ce que tu nous as ordonné…
    - type: usfm
      marker: ft
      children:
      - type: text
