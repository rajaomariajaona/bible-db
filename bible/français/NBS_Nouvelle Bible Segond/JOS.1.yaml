document_id: JOS.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: CONQUÊTE DE CANAAN
  - type: heading
    content: Josué succède à Moïse
  - type: text
    content: ' '
  - type: note
    content: la mort de Moïse Dt 34. –  serviteur du Seigneur Dt 34.5+ ; Hé 3.5n. –  Josué (hébreu Yehoshoua‘ ) , fils de Noun 2.1,23 ; 6.6 ; 14.1 ; 17.4 ; 19.49,51 ; 21.1 ; 24.29 ; Ex 33.11 ; Nb 11.28 ; 14.6,30,38 ; 26.65 ; 27.18 ; 32.12,28 ; 34.17 ; Dt 1.38 ; 31.23 ; 34.9 ; Jg 2.8 ; 1R 16.34. On trouve le nom du même personnage sous des formes différentes ( Hoshéa‘ = Osée comme en Os 1.1n) en Nb 13.8,16 ; Dt 32.44. Egalement sous une autre forme (hébreu Yéshoua‘ ) en Né 8.17. –  auxiliaire de Moïse Ex 24.13n  ; Nb 11.28.
  - type: text
    content: 'Après la mort de Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué, fils de Noun, auxiliaire de Moïse : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: secrétaires (ou scribes ) 3.2 ; 8.33 ; 23.2 ; 24.1 ; Ex 5.6n,14s ; Nb 11.16 ; Dt 1.15n  ; Pr 6.7 ; 1Ch 26.29. Sur l'ensemble des v. 10-18, voir Nb 32.16-22 ; Dt 3.18-20 ; voir aussi Jos 22.1-9.
  - type: text
    content: 'Josué donna cet ordre aux secrétaires du peuple : '
  '11':
  - type: note
    content: 'vous passez…  : cf. Dt 11.31. –  vous donne  : litt. vous donne pour en prendre possession.'
  - type: text
    content: 'Parcourez le camp, et donnez au peuple cet ordre : « Préparez-vous des provisions, car dans trois jours vous passez ce Jourdain pour aller prendre possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous donne. »'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'aux Rubénites, aux Gadites  : cf. Nb 32. –  demi-tribu de Manassé  : cf. Dt 3.13ss.'
  - type: text
    content: 'Josué dit aux Rubénites, aux Gadites et à la demi-tribu de Manassé : '
  '13':
  - type: note
    content: 'Souvenez-vous  : cf. Nb 32.20-22 ; Dt 3.18. –  vous accorde le repos  : autre traduction vous conduit  ; cf. v. 15 ; 21.44 ; 22.4 ; 23.1 ; Dt 3.20.'
  - type: text
    content: 'Souvenez-vous de ce que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous a ordonné, quand il a dit : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous accorde le repos ; il vous donne ce pays. » '
  '14':
  - type: note
    content: 'toutes vos familles  : autre traduction vos enfants  ; cf. Gn 34.19n  ; Jg 18.21n. –  en Transjordanie  : litt. de l''autre côté du Jourdain, à l''est  ; cf. 2.10 ; 5.1n  ; 7.7 ; 9.1,10 ; 12.1,7 ; 13.8,27,32 ; 14.3 ; 17.5 ; 18.7 ; 22.4,7 ; 24.8 ; Dt 1.1n. –  en ordre de bataille  : cf. 4.12 ; Ex 13.18n  ; Jg 7.11.'
  - type: text
    content: 'Vos femmes, toutes vos familles et vos troupeaux resteront dans le pays que Moïse vous a donné en Transjordanie. Mais vous tous, vaillants guerriers, vous passerez en ordre de bataille devant vos frères, et vous les aiderez, '
  '15':
  - type: note
    content: en Transjordanie v. 14n.
  - type: text
    content: 'jusqu''à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ait accordé le repos à vos frères comme à vous, et qu''ils soient, eux aussi, en possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, leur a donné. Après quoi vous reviendrez prendre possession du pays qui est votre propriété. Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous l''a donné en Transjordanie, du côté du soleil levant.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Tout ce que tu nous as ordonné…  : cf. Ex 19.8 ; 24.7.'
  - type: text
    content: 'Ils répondirent à Josué : Tout ce que tu nous as ordonné, nous le ferons : nous irons partout où tu nous enverras. '
  '17':
  - type: note
    content: 'Nous t''écouterons  : cf. Dt 34.9.'
  - type: text
    content: 'Nous t''écouterons exactement comme nous avons écouté Moïse. Seulement, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, soit avec toi comme il a été avec Moïse ! '
  '18':
  - type: note
    content: 'à tes ordres  : litt. à ta bouche. –  n''obéira pas…  : litt. n''écoutera pas toutes tes paroles en tout ce que tu nous ordonneras.'
  - type: text
    content: Quiconque sera rebelle à tes ordres, quiconque n'obéira pas à tout ce que tu lui ordonneras, sera mis à mort. Seulement, sois fort et courageux !
  '2':
  - type: note
    content: 'passe (litt. lève-toi, passe) ce Jourdain  : cf. Dt 2.29. –  pays que je donne… Nb 20.24 ; 27.12 ; 33.53. –  aux Israélites  : litt. à eux, aux fils d''Israël  ; cette dernière précision est absente de LXX.'
  - type: text
    content: 'Moïse, mon serviteur, est mort ; maintenant, passe ce Jourdain, toi et tout ce peuple, vers le pays que je donne aux Israélites. '
  '3':
  - type: note
    content: 'Tout lieu…  : cf. 14.9 ; Dt 11.24 ; 34.1-4. –  je vous l''ai donné  : autre traduction je vous le donne, cf. v. 15 ; 2.9 ; 8.1n.'
  - type: text
    content: 'Tout lieu que vos pieds fouleront, je vous l''ai donné, comme je l''ai dit à Moïse : '
  '4':
  - type: note
    content: 'Votre territoire  : le même terme est aussi traduit par frontière (ici au pluriel). –  depuis le désert…  : cf. Dt 1.7. –  jusqu''au grand fleuve, l''Euphrate  : cf. Ap 9.14+. –  tout le pays des Hittites  : absent de LXX et de Dt 11.24. L''expression désigne l''ensemble de la région située à l''ouest de l''Euphrate (Syrie et pays d''Israël) dans les documents néo-babyloniens. –  la grande mer  : la Méditerranée ; de même en 9.1 ; 15.12,47 ; 23.4.'
  - type: text
    content: 'Votre territoire s''étendra depuis le désert et ce Liban, jusqu''au grand fleuve, l''Euphrate – tout le pays des Hittites, jusqu''à la grande mer, au soleil couchant. '
  '5':
  - type: note
    content: 'Personne ne tiendra…  : cf. Dt 7.24 ; 11.25. –  Je serai avec toi 3.7 ; cf. 6.27 ; Gn 26.3 ; 31.3 ; Ex 3.12 ; Jg 6.16 ; 1R 11.38 ; Es 43.2 ; Jr 15.20. –  je ne te délaisserai pas… Hé 13.5.'
  - type: text
    content: 'Personne ne tiendra devant toi, tous les jours de ta vie. Je serai avec toi comme j''ai été avec Moïse ; je ne te délaisserai pas, je ne t''abandonnerai pas. '
  '6':
  - type: note
    content: Sois fort… v. 7,9,18 ; cf. Dt 31.7s,23 ; 1R 2.2 ; 20.22 ; Ag 2.4 ; Ps 27.14 ; 1Ch 22.13 ; 28.10,20 ; voir aussi Dt 3.28. –  le pays que j'ai juré… Ex 6.8 ; 33.1 ; Nb 14.23 ; 32.11 ; Dt 1.35 ; 10.11 ; 31.20s,23 ; 34.4 ; Jg 2.1.
  - type: text
    content: 'Sois fort et courageux, car c''est toi qui vas donner à ce peuple, comme patrimoine, le pays que j''ai juré à leurs pères de leur donner. '
  '7':
  - type: note
    content: 'sois fort… v. 6+. –  pour veiller à…  : autre traduction en veillant à…  ; même possibilité au v. 8 ; cf. Dt 28.13 ; 29.8. –  la loi que Moïse, mon serviteur… 22.5. –  Moïse, mon serviteur  : cf. Ap 15.3+. –  ni à droite ni à gauche 23.6 ; Dt 5.32 ; 17.11,20 ; 28.14 ; 2R 22.2 ; Pr 4.27 ; 2Ch 34.2. –  partout où tu iras v. 9 ; cf. Gn 28.15.'
  - type: text
    content: 'Seulement sois fort et très courageux, pour veiller à mettre en pratique toute la loi que Moïse, mon serviteur, a instituée pour toi ; ne t''en écarte ni à droite ni à gauche, afin de réussir partout où tu iras. '
  '8':
  - type: note
    content: 'ne s''éloignera pas  : cf. Dt 17.17s. –  tu le reliras ou tu le réciteras, litt. tu le murmureras  ; l''expression évoque une lecture personnelle, à voix basse, ou une méditation ; de même en Ps 1.2 (redire).'
  - type: text
    content: 'Ce livre de la loi ne s''éloignera pas de ta bouche ; tu le reliras jour et nuit pour veiller à mettre en pratique tout ce qui y est écrit ; alors tu mèneras à bien tes entreprises, tu réussiras. '
  '9':
  - type: note
    content: 'Sois fort… v. 6+. –  Ne t''effraie pas…  : cf. 8.1 ; 10.25 ; Dt 1.21,29 ; 7.21 ; 31.8 ; Ac 18.9s. –  le Seigneur, ton Dieu, est avec toi v. 17 ; cf. Dt 2.7 ; 20.1 ; 31.6. –  partout où tu iras v. 7+.'
  - type: text
    content: 'Ne t''ai-je pas donné cet ordre : Sois fort et courageux ! Ne t''effraie pas, ne sois pas terrifié, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, est avec toi partout où tu iras.'
  - type: heading
    content: Josué prépare la traversée du Jourdain
