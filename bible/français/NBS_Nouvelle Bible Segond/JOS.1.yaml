    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tout lieu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.9 ; Dt 11.24 ; 34.1-4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je vous l'ai donné
    - type: usfm
      marker: ft
      children:
      - type: text
