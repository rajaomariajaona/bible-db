  - type: text
    text: 'Tous les princes de la mer descendront de leurs trônes, ils ôteront leurs manteaux et quitteront leurs vêtements brodés ; ils se revêtiront de terreurs et s''assiéront par terre ; à chaque instant ils seront terrifiés, atterrés, à cause de toi. '
