document_id: EZK.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Tyr
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'onzième année '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 587/6 av. J.-C. (cf. 1.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le premier jour du mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : celui-ci n''est pas précisé dans l''hébreu ; un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du premier mois.
    marker-yv: yv-n
  - type: text
    text: 'La onzième année, le premier jour du mois, la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tyr
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : grande ville et port phénicien, voir aussi chap. 27–28 ; Es 23.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ah ! ah ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la porte des peuples
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Jérusalem est peut-être ainsi nommée parce qu''elle était située sur l''une des principales routes d''accès à Tyr, ou bien, d''une façon plus métaphorique, en raison de son importance économique, politique, voire religieuse (cf. 1R 8.41-43). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elle se tourne vers moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on se tourne vers moi ; c'est à moi que revient son rôle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; Tyr espère retirer des avantages politiques et commerciaux de la ruine de Jérusalem. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je me remplirai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : des versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'opulente (est en ruine).
    marker-yv: yv-n
  - type: text
    text: 'Humain, parce que Tyr a dit contre Jérusalem : « Ah ! ah ! Elle est brisée, la porte des peuples ! Elle se tourne vers moi, je me remplirai, elle est en ruine ! », '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je m''oppose… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.8+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme la mer…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Tyr était alors bâtie sur une île.'
    marker-yv: yv-n
  - type: text
    text: 'à cause de cela, ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Je m''oppose à toi, Tyr ! Je ferai monter à l''assaut contre toi une multitude de nations, comme la mer fait monter ses flots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'murailles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 2.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la poussière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. les débris, de même au v. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un rocher nu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 24.7+.'
    marker-yv: yv-n
  - type: text
    text: 'Elles détruiront les murailles de Tyr, elles raseront ses tours, et j''en raclerai la poussière ; je ferai d''elle un rocher nu ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 14 ; cf. 47.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pillage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 25.7.
    marker-yv: yv-n
  - type: text
    text: 'elle sera dans la mer un lieu où l''on étendra les filets : c''est moi qui ai parlé – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '. Elle sera livrée au pillage des nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ses filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.46'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on saura
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils sauront.
    marker-yv: yv-n
  - type: text
    text: 'Ses filles qui sont dans les campagnes seront tuées par l''épée, et ainsi on saura que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: J'amène
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jr 46.26 ; 51.20-23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nabuchodonosor, roi de Babylone '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de 605 à 562 av. J.-C. ; dans Ez comme le plus souvent dans Jr, son nom est orthographié '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Neboukadretsar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ailleurs '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Neboukadnetsar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; il investit '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tyr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 585 av. J.-C. et ne réussit à la soumettre qu''après un siège de treize ans (cf. 29.18-21 ; 30.10s). La ville ne fut rasée qu''en 332 av. J.-C., par Alexandre le Grand ; encore ne tarda-t-elle pas à être reconstruite et à recouvrer son influence maritime et commerciale. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: roi des rois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Dn 2.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec des chevaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 23.23s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des équipages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même terme au v. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une assemblée et un peuple nombreux.
    marker-yv: yv-n
  - type: text
    text: 'Car ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : J''amène du nord contre Tyr Nabuchodonosor, roi de Babylone, le roi des rois, avec des chevaux, des chars, des équipages, une assemblée de troupes nombreuses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tes filles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'terrassement… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.2+ ; 2R 25.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il tuera par l''épée tes filles qui sont dans les campagnes ; il fera contre toi un terrassement, élèvera contre toi un remblai et dressera contre toi le grand bouclier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bélier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: machines
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: épées.
    marker-yv: yv-n
  - type: text
    text: 'Il dirigera les coups de son bélier contre tes murailles, et il démolira tes tours avec ses machines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'attelages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 27.14 ; cf. 1S 8.11 ; Os 1.7 ; Jl 2.4 ; Ha 1.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: conquise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ouverte par une brèche.
    marker-yv: yv-n
  - type: text
    text: 'La foule de ses chevaux te couvrira de poussière ; tes murailles trembleront au bruit des attelages, des roues et des chars, lorsqu''il entrera dans tes portes comme on entre dans une ville conquise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les pierres levées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les monuments '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Es 19.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; certains ont vu ici une allusion aux colonnes dressées à l'entrée du grand temple de Tyr (cf. 1R 7.15-21).
    marker-yv: yv-n
  - type: text
    text: 'Il foulera toutes tes rues avec les sabots de ses chevaux, il tuera ton peuple par l''épée, et les pierres levées de ta puissance s''écraseront à terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Es 23.13.
    marker-yv: yv-n
  - type: text
    text: 'On prendra tes richesses comme butin, on pillera tes marchandises, on rasera tes murailles, on démolira tes maisons luxueuses et on jettera au milieu de l''eau tes pierres, ton bois et ta poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Es 24.8s ; Jr 25.10 ; Ap 18.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le tumulte…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Am 5.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je ferai cesser le tumulte de tes chants, et on n''entendra plus le son de tes lyres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 4s.
    marker-yv: yv-n
  - type: text
    text: 'Je ferai de toi un rocher nu ; tu seras un lieu où l''on étend les filets ; tu ne seras plus rebâtie – c''est moi, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), qui ai parlé (déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voici ce que dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la formule correspondante est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi parle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(p. ex. v. 3,7,19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Au bruit de ta chute '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jr 49.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les îles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : non seulement les îles proprement dites de la Méditerranée, mais aussi les régions côtières lointaines qui faisaient du commerce maritime avec les Phéniciens de Tyr (cf. 27.3).'
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que dit le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ' à Tyr : Au bruit de ta chute, quand les mourants gémiront, quand la tuerie se déchaînera au milieu de toi, les îles ne trembleront-elles pas ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ap 18.9-19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les princes de la mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les souverains des îles et du littoral (voir v. 15'
      - type: usfm
        marker: ord
        children:
