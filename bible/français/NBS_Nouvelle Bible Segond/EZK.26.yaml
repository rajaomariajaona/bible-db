  - type: text
    text: 'je te ferai descendre avec ceux qui descendent dans le gouffre, vers le peuple d''autrefois, je te ferai habiter dans les profondeurs de la terre, semblable aux ruines d''autrefois, avec ceux qui descendent dans le gouffre, afin que tu ne sois plus habitée ; et je donnerai la beauté à la terre des vivants. '
