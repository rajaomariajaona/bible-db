document_id: EZK.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Tyr
  - type: text
    content: ' '
  - type: note
    content: 'onzième année 587/6 av. J.-C. (cf. 1.2n). –  le premier jour du mois  : celui-ci n''est pas précisé dans l''hébreu ; un ms de LXX porte du premier mois.'
  - type: text
    content: 'La onzième année, le premier jour du mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'attelages v. 7n  ; 27.14 ; cf. 1S 8.11 ; Os 1.7 ; Jl 2.4 ; Ha 1.8. –  conquise  : litt. ouverte par une brèche.'
  - type: text
    content: 'La foule de ses chevaux te couvrira de poussière ; tes murailles trembleront au bruit des attelages, des roues et des chars, lorsqu''il entrera dans tes portes comme on entre dans une ville conquise. '
  '11':
  - type: note
    content: les pierres levées ou les monuments (cf. Es 19.19n) ; certains ont vu ici une allusion aux colonnes dressées à l'entrée du grand temple de Tyr (cf. 1R 7.15-21).
  - type: text
    content: 'Il foulera toutes tes rues avec les sabots de ses chevaux, il tuera ton peuple par l''épée, et les pierres levées de ta puissance s''écraseront à terre. '
  '12':
  - type: note
    content: Cf. Es 23.13.
  - type: text
    content: 'On prendra tes richesses comme butin, on pillera tes marchandises, on rasera tes murailles, on démolira tes maisons luxueuses et on jettera au milieu de l''eau tes pierres, ton bois et ta poussière. '
  '13':
  - type: note
    content: 'Cf. Es 24.8s ; Jr 25.10 ; Ap 18.22. –  le tumulte…  : cf. Am 5.23n.'
  - type: text
    content: 'Je ferai cesser le tumulte de tes chants, et on n''entendra plus le son de tes lyres. '
  '14':
  - type: note
    content: V. 4s.
  - type: text
    content: 'Je ferai de toi un rocher nu ; tu seras un lieu où l''on étend les filets ; tu ne seras plus rebâtie – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé (déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ).
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 3,7,19). –  Au bruit de ta chute Jr 49.21. –  les îles  : non seulement les îles proprement dites de la Méditerranée, mais aussi les régions côtières lointaines qui faisaient du commerce maritime avec les Phéniciens de Tyr (cf. 27.3).'
  - type: text
    content: 'Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' à Tyr : Au bruit de ta chute, quand les mourants gémiront, quand la tuerie se déchaînera au milieu de toi, les îles ne trembleront-elles pas ? '
  '16':
  - type: note
    content: 'Cf. Ap 18.9-19. –  les princes de la mer  : les souverains des îles et du littoral (voir v. 15n) ; cf. 27.35 ; 32.10 ; voir aussi Jon 3.6 ; Jb 2.12s ; Lm 2.10. –  terreurs / terrifiés  : autre traduction tremblements / tremblants  ; cf. v. 18n.'
  - type: text
    content: 'Tous les princes de la mer descendront de leurs trônes, ils ôteront leurs manteaux et quitteront leurs vêtements brodés ; ils se revêtiront de terreurs et s''assiéront par terre ; à chaque instant ils seront terrifiés, atterrés, à cause de toi. '
  '17':
  - type: note
    content: 'complainte 19.14+ ; cf. 27.2,32. –  Tu as disparu… les mers  : LXX tu as disparu de la mer. –  tous ceux d''alentour  : litt. tous ses habitants, comme au vers précédent ; Syr tout le continent  ; cf. Es 23.8.'
  - type: text
    content: 'Ils entonneront sur toi une complainte et te diront :'
  - type: text
    content: Comment ! Tu as disparu,
  - type: text
    content: toi que peuplaient ceux qui parcourent les mers,
  - type: text
    content: ville célèbre, qui étais puissante sur la mer,
  - type: text
    content: elle et ses habitants,
  - type: text
    content: qui donnaient des tremblements à tous ceux d'alentour !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sont terrifiées  : autre traduction tremblent  ; cf. v. 16n  ; Es 41.5. –  ta disparition  : litt. ta sortie  ; LXX omet la fin du v.'
  - type: text
    content: Maintenant les îles sont terrifiées
  - type: text
    content: au jour de ta chute.
  - type: text
    content: Les îles de la mer sont épouvantées par ta disparition.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '27.34. –  l''abîme 31.4 ; cf. Gn 1.2 ; 7.11. –  les grandes eaux te couvriront  : cf. Ex 15.19.'
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Quand je ferai de toi une ville en ruine, comme les villes qui n''ont pas d''habitants, quand je ferai monter contre toi l''abîme, et que les grandes eaux te couvriront, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Tyr  : grande ville et port phénicien, voir aussi chap. 27–28 ; Es 23.1n. –  Ah ! ah ! 25.3+. –  la porte des peuples  : Jérusalem est peut-être ainsi nommée parce qu''elle était située sur l''une des principales routes d''accès à Tyr, ou bien, d''une façon plus métaphorique, en raison de son importance économique, politique, voire religieuse (cf. 1R 8.41-43). –  Elle se tourne vers moi  : autres traductions on se tourne vers moi ; c''est à moi que revient son rôle  ; Tyr espère retirer des avantages politiques et commerciaux de la ruine de Jérusalem. –  je me remplirai  : des versions anciennes ont lu l''opulente (est en ruine).'
  - type: text
    content: 'Humain, parce que Tyr a dit contre Jérusalem : « Ah ! ah ! Elle est brisée, la porte des peuples ! Elle se tourne vers moi, je me remplirai, elle est en ruine ! », '
  '20':
  - type: note
    content: 'dans le gouffre  : cf. 31.14-16 ; 32.18,23+. –  que tu ne sois plus habitée  : une légère modification de la vocalisation traditionnelle permettrait de lire que tu ne recommences pas, expression qui pourrait introduire la fin du v. –  je donnerai la beauté (ou un ornement)… : le texte hébreu traditionnel est obscur ; beaucoup le modifient pour lire et que jamais tu ne t''établisses à nouveau sur la terre des vivants  ; sur cette dernière expression, voir 32.23ss ; Ps 27.13+.'
  - type: text
    content: 'je te ferai descendre avec ceux qui descendent dans le gouffre, vers le peuple d''autrefois, je te ferai habiter dans les profondeurs de la terre, semblable aux ruines d''autrefois, avec ceux qui descendent dans le gouffre, afin que tu ne sois plus habitée ; et je donnerai la beauté à la terre des vivants. '
  '21':
  - type: note
    content: 'un objet d''épouvante… 27.36 ; 28.19. –  on ne te trouvera plus  : cf. Dn 11.19 ; Ap 18.21.'
  - type: text
    content: 'Je ferai de toi un objet d''épouvante, et tu ne seras plus rien ; on te cherchera et on ne te trouvera plus jamais – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '3':
  - type: note
    content: 'Je m''oppose… 5.8+. –  comme la mer…  : Tyr était alors bâtie sur une île.'
  - type: text
    content: 'à cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose à toi, Tyr ! Je ferai monter à l''assaut contre toi une multitude de nations, comme la mer fait monter ses flots. '
  '4':
  - type: note
    content: 'murailles / tours  : cf. Es 2.15. –  la poussière, c.-à-d. les débris, de même au v. 12. –  un rocher nu  : cf. 24.7+.'
  - type: text
    content: 'Elles détruiront les murailles de Tyr, elles raseront ses tours, et j''en raclerai la poussière ; je ferai d''elle un rocher nu ; '
  '5':
  - type: note
    content: V. 14 ; cf. 47.10n. –  pillage 25.7.
  - type: text
    content: 'elle sera dans la mer un lieu où l''on étendra les filets : c''est moi qui ai parlé – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. Elle sera livrée au pillage des nations. '
  '6':
  - type: note
    content: 'Ses filles  : cf. 16.46n. –  on saura  : autre traduction ils sauront.'
  - type: text
    content: 'Ses filles qui sont dans les campagnes seront tuées par l''épée, et ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'J''amène  : cf. Jr 46.26 ; 51.20-23. –  Nabuchodonosor, roi de Babylone de 605 à 562 av. J.-C. ; dans Ez comme le plus souvent dans Jr, son nom est orthographié Neboukadretsar (ailleurs Neboukadnetsar ) ; il investit Tyr en 585 av. J.-C. et ne réussit à la soumettre qu''après un siège de treize ans (cf. 29.18-21 ; 30.10s). La ville ne fut rasée qu''en 332 av. J.-C., par Alexandre le Grand ; encore ne tarda-t-elle pas à être reconstruite et à recouvrer son influence maritime et commerciale. –  roi des rois  : cf. Dn 2.37. –  avec des chevaux  : cf. 23.23s. –  des équipages  : autre traduction des attelages , même terme au v. 10. –  une assemblée  : litt. une assemblée et un peuple nombreux.'
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : J''amène du nord contre Tyr Nabuchodonosor, roi de Babylone, le roi des rois, avec des chevaux, des chars, des équipages, une assemblée de troupes nombreuses. '
  '8':
  - type: note
    content: tes filles v. 6+. –  terrassement… 4.2+ ; 2R 25.1n.
  - type: text
    content: 'Il tuera par l''épée tes filles qui sont dans les campagnes ; il fera contre toi un terrassement, élèvera contre toi un remblai et dressera contre toi le grand bouclier. '
  '9':
  - type: note
    content: 'bélier 4.2n. –  machines  : litt. épées.'
  - type: text
    content: 'Il dirigera les coups de son bélier contre tes murailles, et il démolira tes tours avec ses machines. '
