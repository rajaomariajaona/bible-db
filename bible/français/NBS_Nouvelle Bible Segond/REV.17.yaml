  - type: text
    text: 'La bête que tu as vue était, et elle n''est plus. Elle va monter de l''abîme et s''en aller à la perdition. Les habitants de la terre, ceux dont le nom n''a pas été inscrit dans le livre de la vie depuis la fondation du monde, seront étonnés à la vue de la bête, parce qu''elle était, qu''elle n''est plus et qu''elle reparaîtra. '
