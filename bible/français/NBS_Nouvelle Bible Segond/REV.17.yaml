document_id: REV.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La grande prostituée et la bête écarlate
  - type: text
    content: ' '
  - type: note
    content: 'sept anges… v. 7+ ; 15.1+. –  prostituée  : cf. v. 5 ; 2.14n  ; Es 1.21 ; 23.16ss ; Ez 16.15-63 ; Os 2 ; 5.3 ; Na 3.4. –  eaux v. 15 ; cf. Jr 51.13.'
  - type: text
    content: 'Alors l''un des sept anges qui tenaient les sept coupes vint parler avec moi. Il me dit : Viens, je te montrerai le jugement de la grande prostituée qui est assise sur de grandes eaux. '
  '10':
  - type: note
    content: 'cinq (litt. les cinq) sont tombés…  : cette précision est peut-être destinée à situer la prophétie dans la succession des empereurs romains (voir la liste), mais l''identification précise de ces derniers est très discutée aujourd''hui ; on a souvent vu dans le cinquième et dans le huitième roi (v. 11n) respectivement Néron (54-68) et Domitien (81-96). Selon l''historien latin Tacite (≈ 55-120), Néron a lancé la première persécution contre les chrétiens en les laissant accuser du grand incendie de Rome en 64. Domitien n''a pas été un persécuteur au même titre que Néron, mais son absolutisme a beaucoup favorisé le développement du culte impérial, notamment en Asie Mineure, ce qui a pu fournir l''occasion de persécutions sporadiques et parfois violentes contre les chrétiens (cf. v. 8n  ; 2.13 ; chap. 13). Cependant le règne de Domitien est aussi une période de paix et de prospérité, ce qui peut expliquer certains des reproches adressés aux Eglises aux chap. 2 et 3.'
  - type: text
    content: 'cinq sont tombés, l''un est, l''autre n''est pas encore venu ; quand il viendra, il doit demeurer peu. '
  '11':
  - type: note
    content: 'V. 8,10n. –  l''un des sept  : on peut discerner là une allusion aux légendes concernant le retour de Néron (v. 8n), peut-être identifié avec Domitien ; certains voient cependant dans le huitième roi Titus, le destructeur de Jérusalem (il fut empereur de 79 à 81).'
  - type: text
    content: La bête qui était et qui n'est plus est elle-même un huitième roi ; elle est aussi l'un des sept, et elle s'en va à la perdition.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'dix cornes / dix rois 13.1+ ; cf. Dn 7.20,24. Il s''agit peut-être de puissances vassales de Rome. –  royaume  : autre traduction royauté , cf. v. 17s ; 1.9n.'
  - type: text
    content: 'Les dix cornes que tu as vues sont dix rois, qui n''ont pas encore reçu de royaume, mais qui reçoivent le pouvoir comme rois pendant une seule heure avec la bête. '
  '13':
  - type: note
    content: 'un même dessein  : cf. v. 17 ; 13.4.'
  - type: text
    content: 'Ils ont un même dessein et donnent leur puissance et leur pouvoir à la bête. '
  '14':
  - type: note
    content: 'Ils feront la guerre… 2.16+ ; 19.19ss. –  Seigneur des seigneurs… 19.16 ; Dt 10.17 ; Ps 136.3 ; Dn 2.47 ; 1Tm 6.15. –  Vaincront également  : sous-entendu dans le texte. –  fidèles  : cf. 2.13n.'
  - type: text
    content: Ils feront la guerre à l'agneau, et l'agneau les vaincra, parce qu'il est le Seigneur des seigneurs et le Roi des rois. Vaincront également ceux qui, avec lui, sont appelés, choisis et fidèles.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'eaux v. 1+. –  des peuples… 5.9+. –  nations  : voir non-Juifs.'
  - type: text
    content: 'Il me dit : Les eaux que tu as vues, sur lesquelles la prostituée est assise, ce sont des peuples, des foules, des nations et des langues. '
  '16':
  - type: note
    content: 'dix cornes / bête v. 11-13. –  la dépouilleront… à nu  : litt. la feront déserte (ou dévastée  ; cf. 18.17n  ; Es 47.8s) et nue, cf. Ez 16.39-41 ; 23.29 ; 26.19 ; Os 2.5. –  mangeront ses chairs  : cf. Mi 3.3 ; Ps 27.2. –  feu 18.8 ; Gn 38.24 ; Lv 21.9 ; Jr 34.22.'
  - type: text
    content: 'Quant aux dix cornes que tu as vues et à la bête, elles se mettront à détester la prostituée, elles la dépouilleront et la mettront à nu, elles mangeront ses chairs et la brûleront complètement par le feu. '
  '17':
  - type: note
    content: 'Voir cœur. –  d''exécuter  : litt. de faire. –  dessein  : cf. v. 13. –  accomplies 10.7n.'
  - type: text
    content: 'Car Dieu leur a mis au cœur d''exécuter son dessein, d''exécuter un même dessein et de donner leur royauté à la bête, jusqu''à ce que les paroles de Dieu soient accomplies. '
  '18':
  - type: note
    content: la grande ville (cf. v. 9n  ; 14.8+) 18.10,16. –  rois de la terre v. 2+.
  - type: text
    content: La femme que tu as vue, c'est la grande ville qui a la royauté sur les rois de la terre.
  '2':
  - type: note
    content: 'rois de la terre v. 18 ; 18.3,9 ; cf. Es 23.17 ; voir aussi Es 24.21 ; Ps 2.2 ; 89.28. –  se sont prostitués  : autre traduction se sont livrés à l''inconduite sexuelle (c.-à-d. ils ont été ses clients), cf. 2.14n. –  sont ivres  : autre traduction se sont enivrés. –  vin 14.8+ ; Jr 25.15 ; 51.7.'
  - type: text
    content: 'C''est avec elle que les rois de la terre se sont prostitués, et les habitants de la terre sont ivres du vin de sa prostitution. '
  '3':
  - type: note
    content: 'Il me transporta, par l''Esprit (cf. 1.10n) 21.10. –  désert  : cf. 12.6+ ; voir Es 21.1. –  bête v. 7-14 ; cf. 13.1+. –  noms blasphématoires  : litt. noms de blasphème, de même 13.1.'
  - type: text
    content: Il me transporta, par l'Esprit, dans un désert.
  - type: text
    content: 'Je vis alors une femme assise sur une bête écarlate, pleine de noms blasphématoires, qui avait sept têtes et dix cornes. '
  '4':
  - type: note
    content: 'pourpre… 18.16 ; cf. Ez 28.13. –  parée  : litt. dorée. –  coupe v. 2+. –  abominations Mt 24.15/ / ; voir pur, impur.'
  - type: text
    content: 'Cette femme était vêtue de pourpre et d''écarlate, parée d''or, de pierres précieuses et de perles. Elle tenait à la main une coupe d''or, pleine d''abominations et des impuretés de sa prostitution. '
  '5':
  - type: note
    content: 'mystère  : cf. 10.7 ; 2Th 2.7. –  Babylone la Grande 14.8+.'
  - type: text
    content: 'Sur son front était écrit un nom, un mystère : Babylone la Grande, la mère des prostituées et des abominations de la terre. '
  '6':
  - type: note
    content: 'sang des saints 16.6 ; 18.24 ; cf. 6.10+ ; Es 34.7. –  frappé  : litt. étonné, cf. v. 8.'
  - type: text
    content: Je vis cette femme ivre du sang des saints et du sang des témoins de Jésus. A sa vue, je fus frappé d'un grand étonnement.
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 1-3.
  - type: text
    content: 'L''ange me dit : Pourquoi t''étonner ? Moi, je te dirai le mystère de la femme et de la bête qui la porte, celle qui a les sept têtes et les dix cornes.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'était… v. 11 ; cf. 1.4+. –  n''est plus ou n''est pas  : certains voient ici une allusion historique au répit accordé aux chrétiens après Néron (certaines légendes affirmaient que Néron n''était pas vraiment mort et qu''il allait revenir), ou encore à celui dont a bénéficié Jérusalem entre 66 et 70 ; cf. v. 10n,11n. –  monter de l''abîme 9.1 ; 11.7+. –  Les habitants de la terre 3.10+. –  livre de la vie 3.5+ ; cf. 20.12. –  depuis la fondation du monde  : cf. 13.8n. –  seront étonnés 13.3. –  reparaîtra ou paraîtra.'
  - type: text
    content: 'La bête que tu as vue était, et elle n''est plus. Elle va monter de l''abîme et s''en aller à la perdition. Les habitants de la terre, ceux dont le nom n''a pas été inscrit dans le livre de la vie depuis la fondation du monde, seront étonnés à la vue de la bête, parce qu''elle était, qu''elle n''est plus et qu''elle reparaîtra. '
  '9':
  - type: note
    content: 'sagesse 13.18. –  sept têtes 13.1+. –  sept montagnes  : cf. 6.14n  ; 8.8n  ; Rome était connue comme la ville aux sept collines (cf. 17.18). –  assise v. 3.'
  - type: text
    content: C'est ici qu'intervient l'intelligence qui a de la sagesse.
  - type: text
    content: 'Les sept têtes sont sept montagnes, sur lesquelles la femme est assise. Ce sont aussi sept rois : '
