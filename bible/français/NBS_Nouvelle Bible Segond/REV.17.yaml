      marker: fq
      children:
      - type: text
        text: 'cinq '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les cinq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sont tombés…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est peut-être destinée à situer la prophétie dans la succession des empereurs romains (voir la liste), mais l''identification précise de ces derniers est très discutée aujourd''hui ; on a souvent vu dans le cinquième et dans le huitième roi (v. 11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) respectivement Néron (54-68) et Domitien (81-96). Selon l'historien latin Tacite (≈ 55-120), Néron a lancé la première persécution contre les chrétiens en les laissant accuser du grand incendie de Rome en 64. Domitien n'a pas été un persécuteur au même titre que Néron, mais son absolutisme a beaucoup favorisé le développement du culte impérial, notamment en Asie Mineure, ce qui a pu fournir l'occasion de persécutions sporadiques et parfois violentes contre les chrétiens (cf. v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.13 ; chap. 13). Cependant le règne de Domitien est aussi une période de paix et de prospérité, ce qui peut expliquer certains des reproches adressés aux Eglises aux chap. 2 et 3.'
    marker-yv: yv-n
  - type: text
    text: 'cinq sont tombés, l''un est, l''autre n''est pas encore venu ; quand il viendra, il doit demeurer peu. '
