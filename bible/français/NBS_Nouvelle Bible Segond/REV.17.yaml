      - type: text
        text: ), peut-être identifié avec Domitien ; certains voient cependant dans le huitième roi Titus, le destructeur de Jérusalem (il fut empereur de 79 à 81).
    marker-yv: yv-n
  - type: text
    text: La bête qui était et qui n'est plus est elle-même un huitième roi ; elle est aussi l'un des sept, et elle s'en va à la perdition.
