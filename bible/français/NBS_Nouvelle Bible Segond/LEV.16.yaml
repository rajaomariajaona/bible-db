document_id: LEV.16,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l'Expiation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.1-7.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parla à Moïse, après la mort des deux fils d''Aaron qui s''étaient présentés devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et qui en étaient morts. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',21s ; cf. 14.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'envoyer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le chasser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; cf. v. 8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quant au bouc sur lequel est tombé le sort pour Azazel, on le placera vivant devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', afin de faire l''expiation sur lui et de l''envoyer dans le désert, pour Azazel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 6.
      marker-yv: yv-n
    - type: text
      text: 'Aaron présentera le taureau du sacrifice pour son propre péché ; il fera l''expiation pour lui-même et pour sa maison. Il immolera le taureau du sacrifice pour son propre péché. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cassolette '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''autel, devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.7 ; cf. Ap 8.5.
      marker-yv: yv-n
    - type: text
      text: 'Il prendra une cassolette pleine de braises sur l''autel, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et deux pleines poignées d''encens aromatique en poudre ; il apportera cela au-delà du voile ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nuée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 2 ; Ex 13.21+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cachait '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''expiatoire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au-dessus duquel YHWH était présent, entre les keroubim (Ex 25.22 ; Ps 99.1). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 16.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il ne mourra pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1s ; cf. Ex 33.20.
      marker-yv: yv-n
    - type: text
      text: 'il mettra l''encens sur le feu devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', afin que la nuée de l''encens couvre l''expiatoire qui est sur le Témoignage ; ainsi il ne mourra pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers l'est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. sur la face de l''expiatoire qui se présente devant lui lorsqu''il entre (par l''est) dans le sanctuaire. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept fois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.6+.
      marker-yv: yv-n
    - type: text
      text: 'Il prendra du sang du taureau et, avec son doigt, il en fera l''aspersion sur le devant de l''expiatoire, vers l''est ; avec son doigt il fera sept fois l''aspersion du sang devant l''expiatoire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du sacrifice…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' qui est pour le peuple'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Hé 9.12.'
      marker-yv: yv-n
    - type: text
      text: 'Il immolera le bouc du sacrifice pour le péché du peuple et il en apportera le sang au-delà du voile. Il fera avec ce sang comme il a fait avec le sang du taureau : il en fera l''aspersion sur l''expiatoire et devant l''expiatoire.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le sanctuaire l''expiation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') Ez 45.18-20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tente de la Rencontre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', distincte du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sanctuaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ici le Très-Sacré ou Saint des saints) semble s''identifier dans ce passage au lieu dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de la Demeure (Ex 25.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), en deçà du voile ; cf. Hé 9.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.19s. – Un programme pour la fête babylonienne du nouvel an (voir aussi Ex 36.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') comporte les prescriptions suivantes (353-363) : « Il appellera un sacrificateur pour qu''il décapite un bélier ; le prêtre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mashmashou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'utilisera le corps du bélier pour accomplir le rituel de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'kouppourou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sur le temple. Il récitera les incantations pour exorciser le temple. Il purifiera tout le sanctuaire et ses dépendances, et il enlèvera l''encensoir. Le prêtre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mashmashou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'se chargera du corps du bélier et se rendra vers le fleuve. Il se tournera vers l''ouest et jettera le corps du bélier dans le fleuve. Puis il s''en ira dans la campagne. Le sacrificateur agira de même avec la tête du bélier. Le prêtre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mashmashou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et le sacrificateur s'en iront dans la campagne. Tant que le dieu Nabou sera à Babylone, ils n'entreront pas dans Babylone, mais ils resteront dans la campagne du cinquième au douzième jour (du mois de Nisannou). »
      marker-yv: yv-n
    - type: text
      text: 'Ainsi il fera sur le sanctuaire l''expiation des impuretés des Israélites et de leurs transgressions, pour tous leurs péchés. Il fera de même pour la tente de la Rencontre qui demeure avec eux au milieu de leurs impuretés. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il n'y aura personne dans la tente de la Rencontre lorsqu'il entrera pour faire l'expiation dans le sanctuaire et jusqu'à ce qu'il en sorte. Il fera l'expiation pour lui-même, pour sa maison et pour toute l'assemblée d'Israël.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cornes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.15.
      marker-yv: yv-n
    - type: text
      text: 'Il sortira vers l''autel qui est devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et il fera l''expiation sur l''autel ; il prendra du sang du taureau et du sang du bouc, et il en mettra sur les cornes de l''autel, tout autour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifiera
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il le purifiera et le consacrera des impuretés…
      marker-yv: yv-n
    - type: text
      text: Avec son doigt, il fera sept fois l'aspersion du sang sur l'autel ; il le purifiera des impuretés des Israélites et le consacrera.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 25.10-22+ ; 26.31-33 ; Hé 6.19 ; 9.1-7.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Parle à Aaron, ton frère, afin qu''il n''entre pas en tout temps dans le sanctuaire, à l''intérieur, au-delà du voile, devant l''expiatoire qui est sur le Coffre ; ainsi il ne mourra pas ; car j''apparaîtrai dans la nuée au-dessus de l''expiatoire.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Quand il aura achevé de faire l''expiation pour le sanctuaire, pour la tente de la Rencontre et pour l''autel, il présentera le bouc vivant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: posera les deux mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : par ce geste, selon toute vraisemblance, le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' transfère les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'péchés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sur l'animal ; voir aussi 1.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.14 ; Hé 10.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''enverra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',22,26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homme disponible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un homme affecté à cette tâche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 27.32/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Aaron posera les deux mains sur la tête du bouc vivant et confessera sur lui toutes les fautes des Israélites et toutes leurs transgressions, tous leurs péchés ; il les mettra sur la tête du bouc, puis il l''enverra dans le désert, par l''intermédiaire d''un homme disponible. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inaccessible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coupée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', probablement au sens d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: isolée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aride.
      marker-yv: yv-n
    - type: text
      text: Le bouc sera chargé de toutes leurs fautes et les emportera vers une terre inaccessible ; ainsi on enverra le bouc dans le désert.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ez 44.19.
      marker-yv: yv-n
    - type: text
      text: 'Aaron rentrera dans la tente de la Rencontre, il quittera les vêtements de lin qu''il avait mis en entrant dans le sanctuaire et il les déposera là. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son holocauste et l'holocauste du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3,5.'
      marker-yv: yv-n
    - type: text
      text: 'Il lavera son corps avec de l''eau dans un lieu sacré et remettra ses vêtements. Puis il sortira, offrira son holocauste et l''holocauste du peuple ; il fera l''expiation pour lui-même et pour le peuple. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Il fera fumer sur l'autel la graisse du sacrifice pour le péché.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
