document_id: LEV.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour de l'Expiation
  - type: text
    content: ' '
  - type: note
    content: 10.1-7.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla à Moïse, après la mort des deux fils d''Aaron qui s''étaient présentés devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et qui en étaient morts. '
  '10':
  - type: note
    content: 'V. 8n,21s ; cf. 14.7. –  l''envoyer  : autre traduction le chasser, de même dans la suite ; cf. v. 8n.'
  - type: text
    content: 'Quant au bouc sur lequel est tombé le sort pour Azazel, on le placera vivant devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', afin de faire l''expiation sur lui et de l''envoyer dans le désert, pour Azazel. '
  '11':
  - type: note
    content: V. 6.
  - type: text
    content: 'Aaron présentera le taureau du sacrifice pour son propre péché ; il fera l''expiation pour lui-même et pour sa maison. Il immolera le taureau du sacrifice pour son propre péché. '
  '12':
  - type: note
    content: cassolette 10.1+. –  l'autel, devant le Seigneur 4.7 ; cf. Ap 8.5.
  - type: text
    content: 'Il prendra une cassolette pleine de braises sur l''autel, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et deux pleines poignées d''encens aromatique en poudre ; il apportera cela au-delà du voile ; '
  '13':
  - type: note
    content: La nuée (cf. v. 2 ; Ex 13.21+) de l'encens cachait l'expiatoire au-dessus duquel YHWH était présent, entre les keroubim (Ex 25.22 ; Ps 99.1). –  le Témoignage Ex 16.34n. –  il ne mourra pas v. 1s ; cf. Ex 33.20.
  - type: text
    content: 'il mettra l''encens sur le feu devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', afin que la nuée de l''encens couvre l''expiatoire qui est sur le Témoignage ; ainsi il ne mourra pas. '
  '14':
  - type: note
    content: 'sang 17.11. –  vers l''est  : c.-à-d. sur la face de l''expiatoire qui se présente devant lui lorsqu''il entre (par l''est) dans le sanctuaire. –  sept fois 4.6+.'
  - type: text
    content: 'Il prendra du sang du taureau et, avec son doigt, il en fera l''aspersion sur le devant de l''expiatoire, vers l''est ; avec son doigt il fera sept fois l''aspersion du sang devant l''expiatoire. '
  '15':
  - type: note
    content: 'du sacrifice…  : litt. du péché qui est pour le peuple  ; cf. Hé 9.12.'
  - type: text
    content: 'Il immolera le bouc du sacrifice pour le péché du peuple et il en apportera le sang au-delà du voile. Il fera avec ce sang comme il a fait avec le sang du taureau : il en fera l''aspersion sur l''expiatoire et devant l''expiatoire.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sur (ou pour ) le sanctuaire l''expiation (v. 6n) Ez 45.18-20. –  la tente de la Rencontre , distincte du sanctuaire (ici le Très-Sacré ou Saint des saints) semble s''identifier dans ce passage au lieu dit Sacré de la Demeure (Ex 25.9n), en deçà du voile ; cf. Hé 9.3n  ; 10.19s. – Un programme pour la fête babylonienne du nouvel an (voir aussi Ex 36.2n) comporte les prescriptions suivantes (353-363) : « Il appellera un sacrificateur pour qu''il décapite un bélier ; le prêtre mashmashou utilisera le corps du bélier pour accomplir le rituel de kouppourou sur le temple. Il récitera les incantations pour exorciser le temple. Il purifiera tout le sanctuaire et ses dépendances, et il enlèvera l''encensoir. Le prêtre mashmashou se chargera du corps du bélier et se rendra vers le fleuve. Il se tournera vers l''ouest et jettera le corps du bélier dans le fleuve. Puis il s''en ira dans la campagne. Le sacrificateur agira de même avec la tête du bélier. Le prêtre mashmashou et le sacrificateur s''en iront dans la campagne. Tant que le dieu Nabou sera à Babylone, ils n''entreront pas dans Babylone, mais ils resteront dans la campagne du cinquième au douzième jour (du mois de Nisannou). »'
  - type: text
    content: 'Ainsi il fera sur le sanctuaire l''expiation des impuretés des Israélites et de leurs transgressions, pour tous leurs péchés. Il fera de même pour la tente de la Rencontre qui demeure avec eux au milieu de leurs impuretés. '
  '17':
  - type: text
    content: Il n'y aura personne dans la tente de la Rencontre lorsqu'il entrera pour faire l'expiation dans le sanctuaire et jusqu'à ce qu'il en sorte. Il fera l'expiation pour lui-même, pour sa maison et pour toute l'assemblée d'Israël.
  '18':
  - type: text
    content: ' '
  - type: note
    content: cornes 8.15.
  - type: text
    content: 'Il sortira vers l''autel qui est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il fera l''expiation sur l''autel ; il prendra du sang du taureau et du sang du bouc, et il en mettra sur les cornes de l''autel, tout autour. '
  '19':
  - type: note
    content: 'il le purifiera…  : litt. il le purifiera et le consacrera des impuretés…'
  - type: text
    content: Avec son doigt, il fera sept fois l'aspersion du sang sur l'autel ; il le purifiera des impuretés des Israélites et le consacrera.
  '2':
  - type: note
    content: Cf. v. 13n  ; Ex 25.10-22+ ; 26.31-33 ; Hé 6.19 ; 9.1-7.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Parle à Aaron, ton frère, afin qu''il n''entre pas en tout temps dans le sanctuaire, à l''intérieur, au-delà du voile, devant l''expiatoire qui est sur le Coffre ; ainsi il ne mourra pas ; car j''apparaîtrai dans la nuée au-dessus de l''expiatoire.'
  '20':
  - type: text
    content: 'Quand il aura achevé de faire l''expiation pour le sanctuaire, pour la tente de la Rencontre et pour l''autel, il présentera le bouc vivant. '
  '21':
  - type: note
    content: 'posera les deux mains  : par ce geste, selon toute vraisemblance, le prêtre transfère les péchés sur l''animal ; voir aussi 1.4n  ; 24.14 ; Hé 10.3. –  l''enverra v. 10n,22,26. –  dans le désert  : cf. 14.53. –  un homme disponible  : autre traduction un homme affecté à cette tâche  ; cf. Mt 27.32/ /.'
  - type: text
    content: 'Aaron posera les deux mains sur la tête du bouc vivant et confessera sur lui toutes les fautes des Israélites et toutes leurs transgressions, tous leurs péchés ; il les mettra sur la tête du bouc, puis il l''enverra dans le désert, par l''intermédiaire d''un homme disponible. '
  '22':
  - type: note
    content: 'inaccessible  : litt. coupée, probablement au sens d’isolée  ; d''autres comprennent aride.'
  - type: text
    content: Le bouc sera chargé de toutes leurs fautes et les emportera vers une terre inaccessible ; ainsi on enverra le bouc dans le désert.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 44.19.
  - type: text
    content: 'Aaron rentrera dans la tente de la Rencontre, il quittera les vêtements de lin qu''il avait mis en entrant dans le sanctuaire et il les déposera là. '
  '24':
  - type: note
    content: 'son holocauste et l''holocauste du peuple  : cf. v. 3,5.'
  - type: text
    content: 'Il lavera son corps avec de l''eau dans un lieu sacré et remettra ses vêtements. Puis il sortira, offrira son holocauste et l''holocauste du peuple ; il fera l''expiation pour lui-même et pour le peuple. '
  '25':
  - type: text
    content: Il fera fumer sur l'autel la graisse du sacrifice pour le péché.
  '26':
  - type: text
    content: ' '
  - type: note
    content: aura envoyé v. 10n. –  lavera ses vêtements et lavera son corps… 14.8n.
  - type: text
    content: 'Celui qui aura envoyé le bouc pour Azazel lavera ses vêtements et lavera son corps avec de l''eau ; après cela, il rentrera dans le camp. '
  '27':
  - type: note
    content: 'hors du camp  : cf. 4.11s,21 ; voir aussi 24.14 ; Hé 13.11-13. –  on jettera au feu 6.23 ; le même verbe (sans le complément) est traduit par brûler au v. 28.'
  - type: text
    content: 'On emportera hors du camp le taureau du sacrifice pour le péché et le bouc du sacrifice pour le péché, dont on a porté le sang dans le sanctuaire pour faire l''expiation, et on jettera au feu leur peau, leur chair et leurs excréments. '
  '28':
  - type: text
    content: Celui qui les brûlera lavera ses vêtements et lavera son corps avec de l'eau ; après cela, il rentrera dans le camp.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'prescription  : voir loi. –  le dixième jour du septième mois 23.27 : cf. Ez 45.18-20. –  vous vous priverez ou vous vous humilierez  : l''expression hébraïque (litt. vous humilierez votre être , ou peut-être votre désir, votre gosier , cf. Gn 1.20n) peut évoquer en particulier le jeûne ; de même au v. 31 ; 23.27,29n,32 ; cf. Nb 30.14n  ; Ac 27.9n. –  autochtone / immigré 18.26 ; 19.34 ; 24.16 ; Ex 12.48ns ; Nb 15.29s ; Ez 14.7 ; 47.22.'
  - type: text
    content: 'C''est là pour vous une prescription perpétuelle : le dixième jour du septième mois, vous vous priverez, vous ne ferez aucun travail, ni l''autochtone, ni l''immigré qui séjourne au milieu de vous. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: en et pour traduisent la même préposition, de même au v. 5 ; cf. 9.2n. –  sacrifice pour le péché 4.1+. –  holocauste 1.3n.
  - type: text
    content: 'Voici comment Aaron entrera dans le sanctuaire : avec un taureau en sacrifice pour le péché et un bélier pour l''holocauste. '
  '30':
  - type: note
    content: 'on fera l''expiation  : litt. il fera l''expiation.'
  - type: text
    content: 'Car en ce jour on fera l''expiation sur vous, pour vous purifier : vous serez purs de tous vos péchés devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '31':
  - type: note
    content: 'un sabbat, un repos sabbatique  : hébreu shabbath shabbatôn (cf. Ex 16.23n), jour strictement chômé, à la différence des autres fêtes annuelles qui proscrivaient seulement l’ouvrage servile (Lv 23.3,7 etc.) ; voir aussi 25.4n.'
  - type: text
    content: Ce sera pour vous un sabbat, un repos sabbatique, et vous vous priverez. C'est une prescription perpétuelle.
  '32':
  - type: text
    content: ' '
  - type: note
    content: L'expiation annuelle ne peut être accomplie que par le grand prêtre. –  onction 4.3n. –  investi 7.37n.
  - type: text
    content: 'L''expiation sera faite par le prêtre qui a reçu l''onction et qui a été investi pour succéder à son père dans le sacerdoce. Il mettra des vêtements de lin, des vêtements sacrés ; '
  '33':
  - type: text
    content: 'il fera l''expiation pour le sanctuaire sacré, il fera l''expiation pour la tente de la Rencontre et pour l''autel, il fera l''expiation sur les prêtres et sur tout le peuple de l''assemblée. '
  '34':
  - type: note
    content: 'Cf. Hé 10.3. –  On fit  : litt. il fit  ; LXX il sera fait  ; Syr ils firent (pluriel qui correspond plus naturellement à l''indéfini on).'
  - type: text
    content: 'C''est là pour vous une prescription perpétuelle, afin qu''une fois par an soit faite sur les Israélites l''expiation de tous leurs péchés. On fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse.'
  '4':
  - type: note
    content: Cf. 6.3 ; Ex 28.39ss ; ce ne sont pas les vêtements les plus somptueux du grand prêtre (cf. Ex 28.5-30). –  après avoir lavé son corps 14.8n,9n  ; Hé 10.22.
  - type: text
    content: 'Il se revêtira d''une tunique sacrée en lin et portera des caleçons de lin ; il se ceindra d''une écharpe de lin et se couvrira la tête d''un turban de lin ; tels sont les vêtements sacrés dont il se revêtira après avoir lavé son corps avec de l''eau. '
  '5':
  - type: note
    content: 'V. 3+. –  Il recevra  : litt. il prendra.'
  - type: text
    content: 'Il recevra de la communauté des Israélites deux boucs en sacrifice pour le péché et un bélier pour l''holocauste. '
  '6':
  - type: note
    content: fera l'expiation 1.4+ ; le terme est apparenté à celui qui est traduit par expiatoire (16.2+) ; c'est lui qui a donné son nom au jour annuel de l'Expiation (en hébreu Yom ha-Kippourim ou Kippour, cf. 16.29-31 ; 23.27n) dont l'ensemble du présent chapitre décrit le rituel ; cf. 23.26-32 ; 25.9 ; Nb 29.7-11 ; Rm 3.25. –  pour lui-même… Hé 5.3+.
  - type: text
    content: 'Aaron présentera le taureau du sacrifice pour son propre péché ; il fera l''expiation pour lui-même et pour sa maison. '
  '7':
  - type: text
    content: 'Il prendra les deux boucs et les placera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre. '
  '8':
  - type: note
    content: 'sort  : le terme hébreu peut aussi désigner le lot attribué par le sort ; cf. Nb 26.55+ ; Jos 14.2+ ; Jg 1.3+ ; Es 17.14+ ; Jr 13.25 ; Ez 24.6 ; Jl 4.3 ; Ab 11 ; Jon 1.7 ; Mi 2.5 ; Na 3.10 ; Ps 16.5+ ; Pr 1.14+ ; Est 3.7+ ; Dn 12.13 ; Né 10.35+ ; 1Ch 6.39+. –  pour Azazel  : on n''est pas sûr du sens qu''il faut donner à ce nom ; selon son orthographe dans Smr, il signifierait puissant d''El (ou de Dieu) ; le judaïsme tardif (Qumrân, 1 Hénoch) l''a identifié au chef des fils de Dieu rebelles (Gn 6.4n) ou au diable (voir démon, diable, Satan) ; peut-être évoquait-il au départ les esprits démoniaques associés au désert (v. 10). Des versions anciennes ont remplacé ce nom par une forme du verbe traduit par envoyer à partir du v. 10, d''où l''appellation traditionnelle bouc émissaire  ; dans LXX il s''agit plutôt de celui qui renvoie au loin le mal, dans Vg de celui qui est envoyé dans le désert ; cf. 17.7n  ; Es 13.21n  ; 34.11-14 ; Mt 4.1-4/ / ; 12.43/ /.'
  - type: text
    content: 'Aaron tirera au sort les deux boucs : un sort pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et un sort pour Azazel. '
  '9':
  - type: note
    content: 'est tombé  : litt. est monté, de même au v. 10 ; pour tirer au sort, on retirait sans doute au hasard des marques distinctives préalablement déposées dans un sac ou dans un pot ; cf. Pr 16.33.'
  - type: text
    content: 'Aaron présentera le bouc sur lequel est tombé le sort pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il l''offrira en sacrifice pour le péché. '
