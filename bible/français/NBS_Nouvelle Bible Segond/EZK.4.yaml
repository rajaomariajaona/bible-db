        text: à heures fixes.
    marker-yv: yv-n
  - type: text
    text: 'Ta nourriture, tu la mangeras en te rationnant : vingt sicles par jour. C''est ce que tu mangeras pendant tout ce temps-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un sixième de hîn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 1 l.'
    marker-yv: yv-n
  - type: text
    text: 'Tu boiras l''eau à la mesure : un sixième de hîn. C''est ce que tu boiras pendant tout ce temps-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
