      - type: text
        text: ). On a aussi noté que la somme des durées de ce chapitre (40 ans + 390 ans) équivalait au séjour d'Israël en Egypte selon Ex 12.40s.
    marker-yv: yv-n
  - type: text
    text: 'Moi, je t''impose un nombre de jours égal à celui des années de leur faute, trois cent quatre-vingt-dix jours ; tu seras ainsi chargé de la faute de la maison d''Israël. '
