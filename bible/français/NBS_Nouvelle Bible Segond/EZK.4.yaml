    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au poids
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mot apparenté à '
    - type: usfm
      marker: fq
