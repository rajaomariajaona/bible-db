      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu dirigeras ton visage et ton bras nu vers Jérusalem assiégée et tu parleras sur elle en prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.25.
    marker-yv: yv-n
  - type: text
    text: Je mettrai des cordes sur toi, de sorte que tu ne puisses pas te tourner d'un côté sur l'autre, jusqu'à ce que tu aies achevé les jours de ton siège.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
