          text: pur
      - type: text
        text: ') ; cf. Ex 22.30 ; Lv 7.24 ; 11 ; 17.15s ; 22.8 ; Dt 14.21 ; Ac 10.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impropre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir Lv 7.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je dis : Ah ! Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ', j''ai évité toute impureté ; je n''ai jamais mangé d''une bête crevée ou déchiquetée depuis ma jeunesse jusqu''à présent, et aucune viande impropre n''est entrée dans ma bouche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il me répondit : Je vais te donner de la bouse de vache au lieu d''excréments humains, et tu feras ton pain dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je retire le pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je brise le bâton de pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même en 5.16 ; 14.13 ; cf. Lv 26.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils mangeront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils boiront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils mangeront du pain / ils boiront de l'eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 12.18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en se rationnant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.17-19.'
    marker-yv: yv-n
  - type: text
    text: 'Il me dit encore : Humain, je retire le pain à Jérusalem ; ils mangeront en se rationnant et dans l''appréhension, ils boiront à la mesure et dans l''atterrement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pourriront dans '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cause de, par, pour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur faute
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 24.23 ; 33.10 ; Lv 26.39 ; voir aussi Za 14.12 ; Ps 38.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ainsi ils manqueront de pain et d'eau, ils seront atterrés, les uns comme les autres, ils pourriront dans leur faute.
