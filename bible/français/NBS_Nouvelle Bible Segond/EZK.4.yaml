      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je t'impose
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je te donne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trois cent quatre-vingt-dix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce chiffre correspond sans doute à une estimation approximative de la durée du royaume de Juda, depuis le schisme (≈ 931 av. J.-C., 1R 12) ou peut-être la construction du temple (1R 6–8) jusqu''à la chute de Jérusalem (2R 25). '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu '
    - type: usfm
      marker: fqa
