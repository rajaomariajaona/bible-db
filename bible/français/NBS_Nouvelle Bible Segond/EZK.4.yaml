    - type: usfm
      marker: fq
      children:
      - type: text
        text: sous leurs yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.3-7 ; 21.11 ; 37.20 ; 43.11.'
    marker-yv: yv-n
  - type: text
    text: 'Tu mangeras de la galette d''orge ; tu la feras cuire sur des excréments humains et sous leurs yeux. '
  - type: usfm
