    marker-yv: yv-n
  - type: text
    text: 'Toi, prends du froment, de l''orge, des fèves, des lentilles, du millet et de l''épeautre, mets-les dans un seul récipient et fais-en ton pain autant de jours que tu seras couché sur le côté ; tu en mangeras pendant trois cent quatre-vingt-dix jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
