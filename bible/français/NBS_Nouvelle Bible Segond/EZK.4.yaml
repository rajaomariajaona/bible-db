      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu dirigeras… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu parleras… en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu prophétiseras contre elle
    - type: usfm
      marker: ft
      children:
