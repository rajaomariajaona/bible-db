        text: 'de la période visée (v. 9), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de jour en jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou encore '
    - type: usfm
      marker: fqa
      children:
