  - type: text
    text: Toi, prends une poêle de fer et mets-la comme un mur de fer entre toi et la ville ; tu dirigeras ton visage vers elle, et tu l'assiégeras – qu'elle soit en état de siège. C'est un signe pour la maison d'Israël.
