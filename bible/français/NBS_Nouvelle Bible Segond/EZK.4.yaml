        text: Cf. Es 52.11 ; Os 9.3 ; Am 7.17.
    marker-yv: yv-n
  - type: text
    text: 'Et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit : C''est ainsi que les Israélites mangeront leur pain impur parmi les nations vers lesquelles je les chasserai.'
