document_id: EZK.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchiel et le siège de Jérusalem
  - type: text
    content: ' '
  - type: note
    content: Cf. 2R 25.1-8.
  - type: text
    content: 'Toi, humain, prends une brique. Tu la placeras devant toi et tu y traceras une ville, Jérusalem. '
  '10':
  - type: note
    content: 'en te rationnant  : litt. au poids, mot apparenté à sicles. –  vingt sicles ≈ 200 g. –  pendant tout ce temps-là  : litt. de temps à temps  ; cette expression, qui n''apparaît qu''ici et au v. 11, a été diversement interprétée  : du début à la fin de la période visée (v. 9), de jour en jour, ou encore à heures fixes.'
  - type: text
    content: 'Ta nourriture, tu la mangeras en te rationnant : vingt sicles par jour. C''est ce que tu mangeras pendant tout ce temps-là. '
  '11':
  - type: note
    content: 'un sixième de hîn  : environ 1 l.'
  - type: text
    content: 'Tu boiras l''eau à la mesure : un sixième de hîn. C''est ce que tu boiras pendant tout ce temps-là. '
  '12':
  - type: note
    content: 'd''orge  : cf. v. 9. – Les excréments humains, qui pouvaient servir de combustible lorsque le bois faisait défaut, sont considérés comme impurs ; cf. v. 13s,17 ; Dt 23.13-15. –  sous leurs yeux  : cf. 12.3-7 ; 21.11 ; 37.20 ; 43.11.'
  - type: text
    content: 'Tu mangeras de la galette d''orge ; tu la feras cuire sur des excréments humains et sous leurs yeux. '
  '13':
  - type: note
    content: Cf. Es 52.11 ; Os 9.3 ; Am 7.17.
  - type: text
    content: 'Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : C''est ainsi que les Israélites mangeront leur pain impur parmi les nations vers lesquelles je les chasserai.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ah ! Seigneur Dieu 21.5 ; Jr 1.6+. –  j''ai évité…  : litt. mon être (ou mon gosier  ; cf. Gn 1.20n) ne s''est jamais rendu impur (voir pur) ; cf. Ex 22.30 ; Lv 7.24 ; 11 ; 17.15s ; 22.8 ; Dt 14.21 ; Ac 10.14. –  impropre  : voir Lv 7.18n.'
  - type: text
    content: 'Je dis : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', j''ai évité toute impureté ; je n''ai jamais mangé d''une bête crevée ou déchiquetée depuis ma jeunesse jusqu''à présent, et aucune viande impropre n''est entrée dans ma bouche. '
  '15':
  - type: text
    content: 'Il me répondit : Je vais te donner de la bouse de vache au lieu d''excréments humains, et tu feras ton pain dessus. '
  '16':
  - type: note
    content: 'je retire le pain  : litt. je brise le bâton de pain, de même en 5.16 ; 14.13 ; cf. Lv 26.26n. –  ils mangeront / ils boiront  : litt. ils mangeront du pain / ils boiront de l''eau  ; cf. 12.18s. –  en se rationnant  : cf. v. 10n  ; 12.17-19.'
  - type: text
    content: 'Il me dit encore : Humain, je retire le pain à Jérusalem ; ils mangeront en se rationnant et dans l''appréhension, ils boiront à la mesure et dans l''atterrement. '
  '17':
  - type: note
    content: 'pourriront dans (ou à cause de, par, pour, cf. 3.18n) leur faute  : cf. 24.23 ; 33.10 ; Lv 26.39 ; voir aussi Za 14.12 ; Ps 38.6n.'
  - type: text
    content: Ainsi ils manqueront de pain et d'eau, ils seront atterrés, les uns comme les autres, ils pourriront dans leur faute.
  '2':
  - type: note
    content: 'Cf. 17.17 ; 26.8s. –  terrassement 2R 25.1n. –  béliers  : comme son équivalent français, le mot hébreu peut désigner aussi bien l''animal que la machine de guerre (cf. 21.27) ; il peut en outre avoir le sens de chef(s) militaire(s) (cf. 2R 11.4n).'
  - type: text
    content: 'Puis, mets le siège contre elle, bâtis contre elle un terrassement, élève contre elle un remblai, place contre elle des camps et dresse contre elle des béliers tout autour. '
  '3':
  - type: note
    content: 'poêle ou plaque  ; cf. Lv 2.5n. –  tu dirigeras ton visage  : même expression au v. 7 ; expression similaire (tourne-toi) en 6.2n  ; 13.17 ; 21.2,7 ; 25.2 ; 28.21 ; 29.2 ; 35.2 ; 38.2.'
  - type: text
    content: Toi, prends une poêle de fer et mets-la comme un mur de fer entre toi et la ville ; tu dirigeras ton visage vers elle, et tu l'assiégeras – qu'elle soit en état de siège. C'est un signe pour la maison d'Israël.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le côté gauche  : c.-à-d. vers le nord (on s''oriente face à l''est) ; le geste vise Israël , le royaume du Nord (cf. v. 6 ; 16.46n). –  Tu seras chargé de leur faute  : selon les contextes, la formule correspondante peut signifier être considéré comme responsable d''une faute ; subir les conséquences de la faute (le châtiment) ; enlever (rituellement ; voir prêtre, expiation)  ; pardonner (cf. v. 5s ; 14.10 ; 16.52 ; 18.19s ; 23.35,49 ; 44.10,12 ; Gn 4.7n,13n  ; 18.24n  ; 50.17n  ; Ex 10.17n  ; 28.38,43 ; 32.32 ; 34.7n  ; Lv 5.1,17 ; 7.18 ; 10.17 ; 16.22 ; 17.16 ; 19.8,17 ; 20.17,19s ; 22.9 ; 24.15 ; Nb 5.31 ; 9.13 ; 14.18n,34 ; 18.1,22s,32 ; 30.16 ; Jos 24.19n  ; Es 33.24 ; 53.11ns ; Mi 7.18n  ; Ps 32.1n,5 ; Jb 7.21n).'
  - type: text
    content: 'Toi, couche-toi sur le côté gauche, mets-y la faute de la maison d''Israël. Tu seras chargé de leur faute autant de jours que tu seras couché sur ce côté. '
  '5':
  - type: note
    content: 'je t''impose  : litt. je te donne, de même au v. 6. –  trois cent quatre-vingt-dix  : ce chiffre correspond sans doute à une estimation approximative de la durée du royaume de Juda, depuis le schisme (≈ 931 av. J.-C., 1R 12) ou peut-être la construction du temple (1R 6–8) jusqu''à la chute de Jérusalem (2R 25). LXX a lu 190, ce qui situerait vraisemblablement le point de départ au moment de la chute de Samarie (722/1 av. J.-C., 2R 17) ; les années de leur faute seraient alors à comprendre comme celles de leur châtiment (cf. 4.4n). On a aussi noté que la somme des durées de ce chapitre (40 ans + 390 ans) équivalait au séjour d''Israël en Egypte selon Ex 12.40s.'
  - type: text
    content: 'Moi, je t''impose un nombre de jours égal à celui des années de leur faute, trois cent quatre-vingt-dix jours ; tu seras ainsi chargé de la faute de la maison d''Israël. '
  '6':
  - type: note
    content: 'côté droit / Juda  : cf. v. 4n. –  quarante jours / année  : cf. 29.11 ; Gn 7.4,12 ; Nb 14.34 ; Mt 4.2/ / ; il s''agit peut-être ici de la durée envisagée pour l''exil.'
  - type: text
    content: 'Quand tu auras achevé ces jours, couche-toi sur le côté droit, et tu seras chargé de la faute de la maison de Juda pendant quarante jours ; je t''impose un jour pour chaque année. '
  '7':
  - type: note
    content: Tu dirigeras… v. 3+. –  tu parleras… en prophète ou tu prophétiseras contre elle, même verbe 6.2 ; 11.4,13 ; 12.27 ; 13.2,17 ; 21.2,7 etc. ; cf. Jr 2.8n.
  - type: text
    content: 'Tu dirigeras ton visage et ton bras nu vers Jérusalem assiégée et tu parleras sur elle en prophète. '
  '8':
  - type: note
    content: 3.25.
  - type: text
    content: Je mettrai des cordes sur toi, de sorte que tu ne puisses pas te tourner d'un côté sur l'autre, jusqu'à ce que tu aies achevé les jours de ton siège.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 19.19.
  - type: text
    content: 'Toi, prends du froment, de l''orge, des fèves, des lentilles, du millet et de l''épeautre, mets-les dans un seul récipient et fais-en ton pain autant de jours que tu seras couché sur le côté ; tu en mangeras pendant trois cent quatre-vingt-dix jours. '
