document_id: LAM.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, un ennemi
  - type: text
    content: ' '
  - type: note
    content: 'Comment ! voir v. 1n  ; ce deuxième poème est conçu sur le même modèle que le premier, à l''exception d''une interversion des lettres hébraïques ( pé-‘aïn au lieu de ‘aïn-pé ) correspondant ici aux v. 16 et 17 ; le même ordre se retrouvera dans les deux poèmes suivants. –  Sion la belle  : litt. la fille de Sion , de même aux v. 4,8,10,13,18 ; 1.6n. –  splendeur (Es 60.7 ; 64.10) et marchepied (litt. marchepied de ses pieds  ; cf. Es 60.13 ; 66.1 ; Ez 43.5-7 ; Ps 99.5 ; 132.7 ; 1Ch 28.2) désignent sans doute ici Jérusalem et son temple.'
  - type: text
    content: Comment !
  - type: text
    content: Le Seigneur, dans sa colère,
  - type: text
    content: a couvert de nuages Sion la belle !
  - type: text
    content: Il a précipité du ciel sur la terre
  - type: text
    content: la splendeur d'Israël !
  - type: text
    content: Il ne s'est pas souvenu de son marchepied
  - type: text
    content: au jour de sa colère !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Sion la belle v. 1n. –  assis… muets 3.28 ; cf. Es 47.5. –  poussière / sac  : signes de deuil, de tristesse ou de pénitence ; cf. Jr 6.26. –  jeunes filles  : litt. vierges  ; cf. v. 13n,21. –  baissent  : le même verbe est traduit par laisser couler au v. 18.'
  - type: text
    content: Les anciens de Sion la belle
  - type: text
    content: sont assis à terre, ils restent muets ;
  - type: text
    content: ils ont jeté de la poussière sur leur tête,
  - type: text
    content: ils ont mis un sac pour pagne ;
  - type: text
    content: les jeunes filles de Jérusalem
  - type: text
    content: baissent la tête vers la terre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux… 4.17 ; Ps 69.4+. –  mes entrailles… 1.20. –  ma bile  : litt. mon foie , terme très proche en hébreu du mot habituellement traduit par gloire  ; cf. Jb 19.9 ; 29.20. –  désastre 3.47s ; mot de la racine signifiant briser  ; cf. Jr 8.21ns ( blessure ). –  de la belle, de mon peuple  : litt. de la fille de mon peuple , de même 3.48 ; 4.10 ; cf. 1.6n.'
  - type: text
    content: Mes yeux s'épuisent à force de pleurer,
  - type: text
    content: mes entrailles bouillonnent,
  - type: text
    content: ma bile se répand sur la terre
  - type: text
    content: à cause du désastre de la belle, de mon peuple,
  - type: text
    content: parce que des enfants et des nourrissons défaillent
  - type: text
    content: sur les places de la cité.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'leur mère  : litt. leurs mères. –  blé / vin  : Syr ajoute l''huile  ; cf. Dt 7.13 ; Jl 1.10 ; 2.19. –  ils rendaient le souffle  : litt. leur souffle (le terme désigne aussi la vie, l''être vivant ; cf. Gn 1.20n) se répandait  ; cf. Ps 42.5n.'
  - type: text
    content: 'Ils disaient à leur mère :'
  - type: text
    content: Où sont le blé et le vin ?
  - type: text
    content: Et ils défaillaient comme des blessés
  - type: text
    content: sur les places de la ville,
  - type: text
    content: ils rendaient le souffle
  - type: text
    content: sur le sein de leur mère.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'te comparerai-je / t''égalerai-je  : cf. Es 46.5. –  quelle consolation 1.2+ ; Es 51.19. –  Sion jolie  : litt. vierge de la fille de Sion (v. 1+) ; cf. 1.6n,15n,18 ; Jr 18.13 ; 31.4,21 ; Am 5.2. –  désastre v. 11n  ; cf. Jr 30.12.'
  - type: text
    content: Que te dirai-je encore ?
  - type: text
    content: A qui te comparerai-je, Jérusalem ?
  - type: text
    content: A qui t'égalerai-je,
  - type: text
    content: et quelle consolation te donner, Sion jolie ?
  - type: text
    content: 'Car ton désastre est aussi grand que la mer :'
  - type: text
    content: qui pourra te guérir ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Tes prophètes v. 9 ; cf. Jr 23.9-40 ; 28 ; 29.8s. –  illusoires Ez 12.24 ; 13.6ss ; 21.34 ; 22.28. –  insipides  : cf. Jb 6.6 ; un homonyme ( ?) est traduit par badigeon en Ez 13.10-15 ; 22.28. –  ils n''ont pas mis à nu  : le verbe hébreu peut aussi avoir le sens d’ exiler  ; cf. 1.3 ; 4.22n. –  rétablir ta situation , sous-entendu  : afin que le Seigneur puisse rétablir ta situation  ; le verbe et son complément, traditionnellement traduits par ramener les captifs , font assonance en hébreu ; voir aussi Dt 30.3n  ; Jr 29.14n  ; Ez 16.53 ; Ps 126.1n,4 ; Jb 42.10n. –  sentences ou oracles  ; le terme a aussi le sens de charge ou fardeau  ; cf. Es 13.1n  ; Jr 23.33n.'
  - type: text
    content: Tes prophètes ont eu pour toi des visions
  - type: text
    content: illusoires et insipides ;
  - type: text
    content: ils n'ont pas mis à nu ta faute
  - type: text
    content: afin de rétablir ta situation ;
  - type: text
    content: leurs visions ont abouti pour toi
  - type: text
    content: à des sentences illusoires et décevantes.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les passants  : litt. ceux qui passent sur le chemin , comme en 1.12n. –  de dégoût  : formellement, cette précision n''est pas dans le texte, mais elle correspond au sens le plus probable du geste consistant à battre des mains  : il s''agit sans doute moins d''approuver que de conjurer le malheur (cf. l''expression française se signer ) ; de même pour les sifflements d''horreur , etc. ; cf. Ps 22.8 ; Jb 27.23 ; Mt 27.39 ; voir aussi Jr 18.16n. –  Jérusalem la belle  : litt. la fille de Jérusalem  ; cf. 1.6n. –  Beauté parfaite…  : cf. 1.1 ; Es 60.15 ; Ez 16.14 ; 27.3s ; Ps 48.3 ; 50.2.'
  - type: text
    content: Tous les passants, de dégoût,
  - type: text
    content: battent des mains à ton sujet,
  - type: text
    content: ils sifflent d'horreur et hochent la tête
  - type: text
    content: 'sur Jérusalem la belle :'
  - type: text
    content: Est-ce là la ville qu'on appelle
  - type: text
    content: « Beauté parfaite », « Gaieté de toute la terre » ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: '3.46. –  atteint  : litt. trouvé.'
  - type: text
    content: Tous tes ennemis
  - type: text
    content: ouvrent la bouche contre toi,
  - type: text
    content: ils sifflent d'horreur et grincent des dents,
  - type: text
    content: 'ils disent : Nous l''avons engloutie !'
  - type: text
    content: C'est bien le jour que nous espérions,
  - type: text
    content: nous l'avons atteint, nous le voyons !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'sa parole, ce qu''il avait ordonné… Ex 20.5 ; Dt 28.15ss. –  rasé v. 2. –  la corne  : cf. v. 3n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait ce qu''il avait décidé,'
  - type: text
    content: il a accompli sa parole,
  - type: text
    content: 'ce qu''il avait ordonné aux jours de jadis :'
  - type: text
    content: il a rasé, il n'a rien épargné ;
  - type: text
    content: il a fait de toi la joie de l'ennemi,
  - type: text
    content: il a élevé la corne de tes adversaires.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Leur cœur  : probablement celui des habitants de Jérusalem. –  Muraille de Sion la belle (v. 1n) : cf. v. 8 ; l''expression pourrait aussi être lue en apposition à Seigneur . –  tes larmes  : litt. les larmes  ; cf. Jr 14.17. –  un torrent ou un oued  ; cf. Ps 110.7n. –  la pupille  : litt. la fille. –  n''ait pas de repos 3.49 ; le verbe hébreu signifie aussi se taire.'
  - type: text
    content: Leur cœur crie vers le Seigneur.
  - type: text
    content: Muraille de Sion la belle,
  - type: text
    content: laisse couler tes larmes comme un torrent, jour et nuit !
  - type: text
    content: Ne te donne aucun répit,
  - type: text
    content: et que la pupille de ton œil n'ait pas de repos !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'crie  : le verbe hébreu peut aussi s''appliquer, dans d''autres contextes, à une clameur joyeuse. –  au début des veilles  : cf. Ex 14.24n  ; l''expression signifie peut-être ici le début de chaque veille, c.-à-d. trois fois par nuit. –  Répands ton cœur Ps 62.9. –  tes mains  : litt. tes paumes 3.41 ; Ps 28.2 ; 44.21 ; 141.2 ; cf. Jg 12.3n. –  la vie  : autre traduction le gosier , cf. Gn 1.20n. –  qui défaillent… v. 11s. –  à tous les coins de rues  : litt. à la tête de toutes les rues 4.1 ; Es 51.20.'
  - type: text
    content: Lève-toi, crie,
  - type: text
    content: au début des veilles de la nuit !
  - type: text
    content: Répands ton cœur comme de l'eau
  - type: text
    content: devant le Seigneur !
  - type: text
    content: Lève tes mains vers lui
  - type: text
    content: pour la vie de tes enfants
  - type: text
    content: qui défaillent de faim
  - type: text
    content: à tous les coins de rues.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'forteresses  : cf. Dt 28.52. –  Juda la belle  : litt. la fille de Juda , v. 5 ; 1.15n.'
  - type: text
    content: Le Seigneur a englouti tous les domaines de Jacob,
  - type: text
    content: il n'a rien épargné ;
  - type: text
    content: il a, dans sa fureur, rasé
  - type: text
    content: les forteresses de Juda la belle,
  - type: text
    content: il les a fait tomber à terre ;
  - type: text
    content: il a profané le royaume et ses princes.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. v. 7n. –  le fruit de leur ventre  : litt. leur fruit  ; cf. 4.10 ; Lv 26.29 ; Dt 28.53-57 ; 2R 6.28s ; Es 49.26 ; Jr 19.9 ; Ez 5.10. –  tendrement aimés v. 22 ; le terme évoque probablement l''image d''enfants à qui l''on tend les bras pour leur apprendre à marcher ; certains pensent qu''il désigne plutôt des enfants pleinement développés, arrivés à terme, par opposition aux avortons.'
  - type: text
    content: 'Regarde, '
  - type: text
    content: Seigneur
  - type: text
    content: ', vois'
  - type: text
    content: qui tu as ainsi traité !
  - type: text
    content: Fallait-il que des femmes dévorent le fruit de leur ventre,
  - type: text
    content: les petits enfants tendrement aimés ?
  - type: text
    content: Que prêtres et prophètes
  - type: text
    content: soient tués dans le sanctuaire du Seigneur ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'mes jeunes filles (litt. mes vierges ) / mes jeunes gens  : cf. 1.18.'
  - type: text
    content: Les adolescents et les vieillards
  - type: text
    content: gisent par terre dans les rues ;
  - type: text
    content: mes jeunes filles et mes jeunes gens
  - type: text
    content: sont tombés par l'épée ;
  - type: text
    content: tu as tué, au jour de ta colère,
  - type: text
    content: tu as égorgé, tu n'as épargné personne.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'de tous côtés, ceux qui font mon effroi  : formule comparable en Jr 6.25n  ; 20.3,10 ; 46.5 ; 49.29 ; Ps 31.14. Autre traduction mes voisins des alentours. –  rencontre festive 1.4n,15.'
  - type: text
    content: Tu as convoqué, de tous côtés, ceux qui font mon effroi,
  - type: text
    content: comme en un jour de rencontre festive.
  - type: text
    content: 'Au jour de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: il n'y eut ni rescapé ni survivant.
  - type: text
    content: Ceux que j'avais tendrement aimés et élevés,
  - type: text
    content: mon ennemi les a exterminés.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la corne  : l''image évoque habituellement la puissance ou la fierté ; cf. v. 17 ; Jr 48.25n  ; Ps 75.11n. –  retiré… en arrière  : la même formule est rendue par faire reculer en 1.13. –  sa main droite  : sa protection ; cf. Ps 118.15s ; 121.5-7. –  un feu flamboyant  : litt. un feu de flamme  ; cf. Es 45 ; Os 7.6.'
  - type: text
    content: Il a, dans sa colère ardente, abattu complètement
  - type: text
    content: la corne d'Israël ;
  - type: text
    content: il a retiré sa main droite en arrière
  - type: text
    content: devant l'ennemi ;
  - type: text
    content: il a allumé en Jacob comme un feu flamboyant
  - type: text
    content: qui dévore de tous côtés.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'comme un ennemi v. 5 ; cf. Jr 21.5. –  ce qui charmait  : la même formule hébraïque est traduite par ce qui (est) précieux en 1.10+. –  il a répandu sa fureur… Es 42.25. –  Sion la belle v. 1n.'
  - type: text
    content: Il a tendu son arc comme un ennemi ;
  - type: text
    content: sa main droite s'est dressée en adversaire ;
  - type: text
    content: il a tué
  - type: text
    content: tout ce qui charmait les yeux ;
  - type: text
    content: il a répandu sa fureur comme le feu
  - type: text
    content: sur la tente de Sion la belle.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Juda v. 2+. –  plaintes et gémissements  : les deux termes font assonance en hébreu ; on les retrouve en Es 29.2.'
  - type: text
    content: Le Seigneur est devenu comme un ennemi ;
  - type: text
    content: il a englouti Israël,
  - type: text
    content: il a englouti tous ses palais,
  - type: text
    content: il a détruit ses forteresses ;
  - type: text
    content: il a multiplié chez Juda la belle
  - type: text
    content: plaintes et gémissements.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sa  : ici et au v. 7, les possessifs ( son lieu de rencontre, son autel, son sanctuaire ) sont au masculin et se rapportent à Dieu plutôt qu''à Jérusalem. –  clôture  : le mot hébreu n''apparaît qu''ici et sa traduction est incertaine ; certains, d''après des versions anciennes, comprennent  : il a ravagé sa hutte (cf. Es 1.8 ; Am 9.11) comme le jardin (cf. Nb 24.6 ; Jl 2.3) ; cf. Jr 52.13 ; 2Ch 36.19. –  lieu de rencontre et rencontre festive traduisent le même mot hébreu ; cf. v. 7,22 ; 1.4n,15 ; voir aussi Ps 74.4n. –  colère  : cf. So 3.8.'
  - type: text
    content: Il a forcé sa clôture comme celle d'un jardin,
  - type: text
    content: il a détruit son lieu de rencontre ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait oublier en Sion'
  - type: text
    content: rencontre festive et sabbat ;
  - type: text
    content: dans la fureur de sa colère,
  - type: text
    content: il n'a eu que mépris pour le roi et le prêtre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur / du Seigneur  : hébreu ’Adonaï / YHWH . –  son autel / son sanctuaire  : cf. v. 6n  ; Ez 24.21 ; Ps 89.40. –  livré Dt 23.16n. –  des palais de Sion  : litt. de ses palais , le possessif étant cette fois au féminin. –  des appels ont retenti  : litt. on a donné de la voix.'
  - type: text
    content: Le Seigneur a rejeté son autel,
  - type: text
    content: dédaigné son sanctuaire ;
  - type: text
    content: il a livré à l'ennemi
  - type: text
    content: les murailles des palais de Sion ;
  - type: text
    content: 'des appels ont retenti dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: comme en un jour de rencontre festive.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'détruire la muraille  : cf. Jr 5.10. –  Sion la belle v. 1n. –  il a tendu le cordeau  : pour raser la ville ; cf. 2R 21.13 ; Es 34.11 ; Am 7.7-9. –  rempart et muraille  : probablement deux enceintes de hauteur inégale. –  sont délabrés  : le même verbe est habituellement traduit par dépérir  ; cf. Es 16.8 ; 19.8 ; 24.4,7 ; 33.9.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a décidé de détruire'
  - type: text
    content: la muraille de Sion la belle ;
  - type: text
    content: il a tendu le cordeau,
  - type: text
    content: il n'a pas retiré sa main
  - type: text
    content: avant d'avoir tout englouti ;
  - type: text
    content: il a mis en deuil rempart et muraille,
  - type: text
    content: l'un et l'autre sont délabrés.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ses portes  : les portes de Sion (possessif féminin). –  parmi les nations  : c.-à-d. en exil ; cf. Dt 28.36 ; 2R 25.7. –  plus de loi  : cf. Dt 4.6-8 ; Ml 2.6s. –  prophètes v. 14 ; Ps 74.9. –  vision Ez 7.26.'
  - type: text
    content: Ses portes se sont enfoncées dans la terre ;
  - type: text
    content: il a détruit, brisé leurs verrous.
  - type: text
    content: Son roi et ses princes sont parmi les nations ;
  - type: text
    content: il n'y a plus de loi,
  - type: text
    content: et ses prophètes ne trouvent plus
  - type: text
    content: 'de vision venant du '
  - type: text
    content: Seigneur
  - type: text
    content: .
