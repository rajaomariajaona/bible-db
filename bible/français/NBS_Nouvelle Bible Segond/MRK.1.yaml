document_id: MRK.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La proclamation de Jean le Baptiseur
  - type: heading
    content: Mt 3.1-6  ; Lc 3.1-6  ; cf. Jn 1.19-23
  - type: text
    content: ' '
  - type: note
    content: 'Commencement  : cf. Jn 1.1. –  la bonne nouvelle  : le terme grec a donné notre mot évangile v. 14s ; 8.35 ; 10.29 ; 13.10 ; 14.9/ / ; 16.15 ; cf. Rm 1.1 ; 15.19 ; 16.25. –  de  : on peut comprendre aussi bien concernant Jésus… que annoncée par Jésus… –  Jésus-Christ ou Jésus l''Oint (= le Messie ), 8.29s ; 9.41 ; 12.35-37 ; 14.61s ; Mt 1.16n  ; Phm 11n  ; voir aussi onction. –  Fils de Dieu  : ici cette précision est absente de certains mss ; v. 11 ; 3.11 ; 5.7 ; 9.7 ; 14.61s ; 15.39.'
  - type: text
    content: Commencement de la bonne nouvelle de Jésus-Christ, Fils de Dieu.
  '10':
  - type: note
    content: 'Dès qu''il remonta…  : litt. aussitôt (comme aux v. 12,18,20…), en remontant (ou en sortant) de l''eau…  ; le terme grec correspondant à aussitôt est l''un des mots favoris de Mc ; dans la présente traduction il est diversement rendu (v. 23n), et parfois sous-entendu (v. 21). Sur l''eau nécessaire aux purifications dans la communauté de Qumrân, cf. Ecrit de Damas 10.10ss : « Qu''on ne se baigne pas dans de l''eau sale ou en trop petite quantité pour envelopper complètement un homme. Qu''on ne purifie pas avec cette eau un vase. Et toute mare se trouvant dans (le creux d’)un rocher dans laquelle il n''y a pas assez d''eau pour couvrir entièrement un homme, si une personne impure l''a touchée, celle-ci rend impure l''eau de la mare comme elle ferait l''eau d''un vase. » –  se déchirer, comme en 15.38 ; cf. Es 63.19 ; Ez 1.1 ; Mt 3.16+ ; Ac 10.11+. –  et l''Esprit descendre Es 11.2 ; 42.1 ; 63.11 ; Ac 2.2ss ; cf. Testament de Lévi 18.6s : « Les cieux s''ouvriront, et du Temple de gloire viendra sur lui (le grand prêtre nouveau) la sanctification, en même temps qu''une voix paternelle comme celle d''Abraham à Isaac. La gloire du Très-Haut sera proclamée sur lui, et l''Esprit d''intelligence et de sanctification reposera sur lui par l''eau. » Testament de Juda 24.2 : « Les cieux s''ouvriront sur lui (le Messie descendant de David) pour répandre l''Esprit, la bénédiction du Père saint, et c''est lui qui répandra l''Esprit de grâce sur vous » (ajouts chrétiens à des textes juifs ?) ; Evangile des hébreux 1 : « Lorsque le Seigneur fut remonté de l''eau, toute source de l''Esprit saint descendit, se reposa sur lui et lui dit : “Mon fils, dans tous les prophètes, j''attendais que tu viennes pour me reposer en toi. Car tu es mon repos, tu es mon Fils premier-né qui règnes pour l''éternité.” » –  vers lui  : autre traduction en lui. –  comme une colombe  : cf. Gn 1.2n  ; 8.8.'
  - type: text
    content: 'Dès qu''il remonta de l''eau, il vit les cieux se déchirer et l''Esprit descendre vers lui comme une colombe. '
  '11':
  - type: note
    content: 'une voix  : cf. v. 3n  ; Dt 4.10ss ; Es 30.30s ; Ps 18.14. –  mon Fils v. 1n  ; cf. Ps 2.7. –  bien-aimé 9.7 ; 12.6 ; cf. Gn 22.2,12,16 (dans LXX le même terme grec traduit le mot hébreu rendu par unique) ; autre traduction mon Fils, le bien-aimé  ; cf. Mt 12.18. –  c''est en toi…  : cf. Mt 3.17n  ; Es 42.1.'
  - type: text
    content: 'Et une voix survint des cieux : Tu es mon Fils bien-aimé ; c''est en toi que j''ai pris plaisir.'
  - type: heading
    content: Mt 4.1-11  ; Lc 4.1-13
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'chasse  : autre traduction pousse  ; même verbe v. 34,39,43 etc. ; voir aussi Mt 4.1-11 ; Lc 4.1-13. En grec le verbe est au présent, comme souvent dans les récits de Mc où l''irruption de ce temps sert, au moins dans certains cas, à mettre en valeur des éléments marquants du récit ; la fréquence de ce trait, qui ressort nettement d''une comparaison avec Mt et Lc, est caractéristique du style heurté, voire haletant de Mc (p. ex. v. 21,30,40 ; 2.4 ; 3.20 ; 4.38 ; 5.15,22 ; 6.48 ; 11.4 ; 14.12s,63,67 ; 15.16ss ; 16.4 ; voir aussi v. 10n pour le terme traduit ici par Aussitôt , et l''introduction à l''Evangile selon Marc♦).'
  - type: text
    content: 'Aussitôt l''Esprit le chasse au désert. '
  '13':
  - type: note
    content: 'Il passa  : litt. il était. –  quarante jours Mt 4.2+. –  mis à l''épreuve ou tenté  : cf. 8.11 ; 10.2 ; 12.15 ; 14.38 ; Mt 4.1n  ; Hé 2.18 ; 4.15. –  le Satan ou Satan (voir démon) ; 3.23,26/ / ; 4.15 ; 8.33/ / ; cf. Jb 1.6n  ; Mt 4.10 ; Lc 10.18 ; 13.16 ; 22.3,31 ; Jn 13.27 ; Ac 5.3 ; 26.18 ; Rm 16.20 ; 1Co 5.5 ; 7.5 ; 2Co 2.11 ; 11.14 ; 12.7 ; 1Th 2.18 ; 2Th 2.9 ; 1Tm 1.20 ; 5.15 ; Ap 2.9,13,24 ; 3.9 ; 12.9 ; 20.7 ; en grec ce nom n''apparaît sans article qu''en Mc 3.23 ; Lc 22.3 ; 2Co 12.7. –  avec les bêtes sauvages  : cf. Es 11.6-9 ; 34.11-15 ; Ps 91.13 ; Jb 5.22s. –  les anges  : cf. Ps 91.11s ; Jn 1.51. –  le servaient v. 31 ; 10.45 ; 15.41 ; Mt 4.11n  ; Lc 8.3+ ; 22.43 ; Jn 12.2.'
  - type: text
    content: Il passa quarante jours dans le désert, mis à l'épreuve par le Satan. Il était avec les bêtes sauvages, et les anges le servaient.
  - type: heading
    content: Les quatre premiers disciples
  - type: heading
    content: Mt 4.12-17  ; Lc 4.14-15  ; cf. Jn 4.1-3,43-46
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Après que Jean eut été livré  : cf. 6.17 ; Mt 4.12+ss ; Lc 3.20 ; Jn 3.24. –  Jésus vint en Galilée Lc 4.14s ; Jn 3.24 ; 4.1-3,43-46. –  la bonne nouvelle de Dieu v. 1n  ; certains mss portent la bonne nouvelle du règne de Dieu  ; cf. Es 61.1-3 ; Rm 1.1 ; 15.16 ; 2Co 11.7.'
  - type: text
    content: 'Après que Jean eut été livré, Jésus vint en Galilée ; il proclamait la bonne nouvelle de Dieu '
  '15':
  - type: note
    content: 'Le temps est accompli  : autre traduction le moment est venu  ; le mot grec kaïros, ici rendu par temps (10.30) et ailleurs par saison (11.13) ou moment (12.2 ; 13.33), désigne moins le temps en général qu''une durée ou un moment qualifiés, notamment le moment opportun ou l''occasion pour telle ou telle action, et plus particulièrement le moment attendu de l''intervention divine ; Mt 8.29+ ; Jn 7.6ss ; Ep 1.10 ; Rm 3.26n  ; Hé 11.15n  ; 1P 1.5n. Voir aussi (autres termes) Mc 13.20 et Dn 7.22 ; 12.4-9 ; Ga 4.4. –  s''est approché ou est là (même forme verbale 14.42) ; Mt 3.2n. –  Changez radicalement  : cf. 6.12. –  croyez (ou ayez foi en) la bonne nouvelle  : autre traduction croyez, à cause de la bonne nouvelle, v. 1n  ; cf. Col 1.5s ; 1Th 1.5s,9 ; 2.13.'
  - type: text
    content: 'et disait : Le temps est accompli et le règne de Dieu s''est approché. Changez radicalement et croyez à la bonne nouvelle.'
  - type: heading
    content: Mt 4.18-22  ; cf. Lc 5.1-11  ; Jn 1.35-51
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.14 ; 3.13-19 ; 6.7-13,30 ; 1R 19.19s ; Mt 4.18-22 ; Lc 5.1-11 ; Jn 1.35-51. –  En passant  : même verbe 2.14 ; 15.21 ; Mt 9.9,27 ; 20.30 ; Jn 9.1 ; 1Co 7.31 ; 1Jn 2.8,17 ; cf. Evangile selon Thomas 42 : « Jésus a dit : “Devenez passant.” » –  la mer (ou lac ) de Galilée 2.13 ; 3.7s ; 4.1s ; 5.21 ; Lc 5.1-3.'
  - type: text
    content: 'En passant au bord de la mer de Galilée, il vit Simon et André, frère de Simon, qui jetaient leurs filets dans la mer – car ils étaient pêcheurs. '
  '17':
  - type: note
    content: 'à ma suite  : litt. derrière moi, cf. v. 7n  ; 2R 6.19 ; Mt 4.19n. –  pêcheurs d''humains ou d''hommes, de gens (Mt 5.13+) ; cf. Jr 16.16 ; Ez 12.13 ; 47.10 ; Ha 1.15,17 ; Mt 13.47-50.'
  - type: text
    content: 'Jésus leur dit : Venez à ma suite, et je vous ferai devenir pêcheurs d''humains. '
  '18':
  - type: note
    content: V. 20 ; 10.28.
  - type: text
    content: 'Aussitôt ils laissèrent leurs filets et le suivirent. '
  '19':
  - type: note
    content: '3.17 ; 10.35 ; Mt 4.21+ ; Lc 9.54. –  dans leur bateau  : litt. dans le bateau.'
  - type: text
    content: 'En allant un peu plus loin, il vit Jacques, fils de Zébédée, et Jean, son frère, qui étaient aussi dans leur bateau, à réparer les filets. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 11.10/ / ; Lc 1.76 ; Jn 3.28. –  dans le Prophète Esaïe  : certains comprennent par l''entremise du prophète Esaïe . –  J''envoie… Ex 23.20 ; Ml 3.1  ; un même mot signifie messager et ange , en grec comme en hébreu (voir Mc 1.13). –  frayer ou préparer (autre verbe v. 3).'
  - type: text
    content: 'Selon ce qui est écrit dans le Prophète Esaïe :'
  - type: text
    content: J'envoie devant toi mon messager
  - type: text
    content: pour frayer
  - type: text
    content: ' ton '
  - type: text
    content: chemin ;
  '20':
  - type: note
    content: 'V. 18+. –  les employés  : même terme Jn 10.12s. –  à sa suite  : litt. derrière lui, cf. v. 7n,17n.'
  - type: text
    content: Aussitôt il les appela ; ils laissèrent leur père Zébédée dans le bateau avec les employés, et ils s'en allèrent à sa suite.
  - type: heading
    content: L'homme possédé d'un esprit impur
  - type: heading
    content: Lc 4.31-37
  '21':
  - type: text
    content: ' '
  - type: note
    content: Capharnaüm 9.33 ; Mt 4.13n  ; 9.1n  ; 11.23 ; Lc 4.23 ; Jn 2.12. –  synagogue / sabbat 3.1s ; 6.2 ; Lc 4.16 ; 6.6 ; 13.10.
  - type: text
    content: 'Ils entrent dans Capharnaüm. S''étant rendu à la synagogue le jour du sabbat, il se mit à enseigner. '
  '22':
  - type: note
    content: ébahis 6.2 ; 7.37 ; 10.26 ; 11.18. –  enseignement / autorité (ou pouvoir, droit) v. 27 ; voir aussi 2.10,24n  ; 11.28-33 ; 13.34 ; cf. Jn 1.12n  ; 1Co 8.9n. –  pas comme les scribes Mt 7.28-29n  ; Jn 7.46.
  - type: text
    content: Ils étaient ébahis de son enseignement ; car il enseignait comme quelqu'un qui a de l'autorité, et non pas comme les scribes.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'justement  : le même mot grec est traduit ailleurs par aussitôt (v. 10n) ; cf. 5.2. –  possédé d''un esprit impur (voir pur, impur) : litt. dans un esprit impur ou d''esprit impur , de même en 5.2 ; cf. 3.11,30 ; 5.8,13 ; 6.7 ; 7.25 ; 9.25 ; Mt 10.1 ; 12.43/ / ; Lc 4.33,36 ; 6.18 ; 8.29 ; 9.42 ; Ac 5.16 ; 8.7 ; Ap 16.13 ; 18.2 ; voir aussi Za 13.2n  ; Testament de Benjamin 5.2 : « Si vous faites le bien, alors les esprits impurs fuiront loin de vous, et les bêtes sauvages vous craindront. Car celui qui respecte les bonnes œuvres et dont la pensée est éclairée, celui-là, les ténèbres s''enfuient loin de lui. »'
  - type: text
    content: 'Il se trouvait justement dans leur synagogue un homme possédé d''un esprit impur, qui s''écria : '
  '24':
  - type: note
    content: 'Pourquoi te mêles-tu de nos affaires  : litt. quoi à nous et à toi, c.-à-d. qu''avons-nous de commun, nous et toi ? (réponse sous-entendue  : rien) ; on pourrait aussi traduire laisse-nous tranquilles, 5.7/ / ; cf. Jn 2.4n  ; formules comparables en Jg 11.12 ; 1R 17.18 ; 2R 3.13 ; Os 14.9 ; 2Ch 35.21 ; cf. Actes de Thomas 45.1 (paroles des démons dans un récit d''exorcisme) : « Que nous veux-tu, participant des saints mystères de Dieu ? Pourquoi veux-tu notre destruction, alors que pour lors notre temps n''est pas arrivé ? Pourquoi cherches-tu à prendre le pouvoir qui nous a été donné, alors que, jusqu''à maintenant, notre confiance repose sur lui ? » –  le Nazaréen ou Nazarénien, c.-à-d. l''homme de Nazareth 10.47 ; 14.67 ; 16.6 ; Lc 4.34 ; 24.19 ; cf. Mt 2.23n. –  Es-tu venu…  : autre traduction Tu es venu… –  pour notre perte ou pour nous faire périr  : cf. 1Jn 3.8 ; voir aussi Lc 10.18 ; Ap 20.10. –  le Saint de Dieu Lc 4.34 ; Jn 6.69 ; Ac 3.14 ; 4.27,30 ; cf. Ps 106.16.'
  - type: text
    content: 'Pourquoi te mêles-tu de nos affaires, Jésus le Nazaréen ? Es-tu venu pour notre perte ? Je sais bien qui tu es : le Saint de Dieu ! '
  '25':
  - type: note
    content: 'le rabroua  : le verbe grec évoque une réprobation catégorique, un blâme brutal, une censure qui n''admet pas de discussion ; il s''agit souvent d''une parole d''exorcisme ; cf. 3.12 ; 4.39 ; 8.30,32s ; 9.25 ; 10.13,48 ; Mt 8.26+ ; Lc 4.35+ ; on le traduit également par reprendre Lc 17.3 ; 19.39n  ; 2Tm 4.2 ; voir aussi Jd 9 ; cf. Za 3.2, Ps 68.31 ; 106.9 (même verbe grec dans LXX) ; voir Es 17.13+ ; Ps 9.6+. –  Tais-toi  : cf. v. 34,44+ ; 3.11s ; 5.43 ; 7.36 ; 8.26,30 ; 9.9 ; 16.8 ; Mt 8.4+ ; 22.12n  ; Lc 4.41 ; 5.14 ; 8.56. –  de cet homme  : litt. de lui.'
  - type: text
    content: 'Jésus le rabroua, en disant : Tais-toi et sors de cet homme. '
  '26':
  - type: note
    content: 'le secouant violemment 9.20,26. –  un grand cri  : cf. 5.7 ; 15.34.'
  - type: text
    content: 'L''esprit impur sortit de lui en le secouant violemment et en poussant un grand cri. '
  '27':
  - type: note
    content: 'effrayés  : autre traduction en émoi  ; cf. v. 22 ; même verbe en 10.24,32 ; forme dérivée en 9.15n  ; voir aussi Lc 4.36 ; 5.9 ; Ac 3.10s ; voir aussi crainte. –  ils débattaient 8.11 ; 9.10,14,16 ; 12.28. –  Qu''est-ce donc ? litt. qu''est-ce que cela ? cf. 4.41. –  quelle autorité  : litt. avec autorité, pouvoir ou peut-être liberté, cf. v. 22+.'
  - type: text
    content: 'Tous furent effrayés ; ils débattaient entre eux : Qu''est-ce donc ? Un enseignement nouveau, et quelle autorité ! Il commande même aux esprits impurs, et ils lui obéissent ! '
  '28':
  - type: note
    content: 'Mt 4.24 ; 9.26. –  se répandit  : litt. sortit. –  la Galilée  : litt. la région de la Galilée, cf. Lc 4.37.'
  - type: text
    content: Et sa renommée se répandit aussitôt dans toute la Galilée.
  - type: heading
    content: Guérisons de malades et de démoniaques
  - type: heading
    content: Mt 8.14-17  ; Lc 4.38-41
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'ils se rendirent  : certains mss ont le singulier  : il se rendit . –  Jacques et Jean v. 19. –  Simon et André v. 16.'
  - type: text
    content: 'En sortant de la synagogue, ils se rendirent, avec Jacques et Jean, chez Simon et André. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'c''est celui qui crie  : litt. voix de celui qui crie Es 40.3  ; Jn 1.23 ; Règle de la Communauté (Qumrân) 8.13ss : « Ils se sépareront du milieu de l''habitation des hommes pervers pour aller au désert, afin d''y frayer la voie de “Lui”, ainsi qu''il est écrit : Dans le désert frayez la voie de [YHWH] ; aplanissez dans la steppe une chaussée pour notre Dieu. Cette (voie), c''est l''étude de la Loi… » –  rendez droits  : autre traduction aplanissez.'
  - type: text
    content: 'c''est celui qui crie dans le désert :'
  - type: text
    content: « Préparez le chemin du Seigneur,
  - type: text
    content: rendez droits
  - type: text
    content: ' ses '
  - type: text
    content: sentiers »,
  '30':
  - type: note
    content: fièvre Ac 28.8.
  - type: text
    content: 'La belle-mère de Simon était alitée, elle avait de la fièvre ; aussitôt on lui parle d''elle. '
  '31':
  - type: note
    content: 'la fit lever  : le verbe signifie aussi, selon les contextes, réveiller ou ressusciter 2.9ss ; 3.3 ; 4.27n,38 ; 5.41 ; 6.14,16 ; 9.27 ; 10.49 ; 12.26 ; 13.8,22 ; 14.28,42 ; 16.6,14 ; voir aussi Mt 2.13n  ; Lc 1.69n  ; Jn 2.19n. –  en lui saisissant la main 5.41/ / ; 9.27. –  la fièvre la quitta Jn 4.52. –  les servir  : comme au v. 13.'
  - type: text
    content: Il s'approcha et la fit lever en lui saisissant la main ; la fièvre la quitta, et elle se mit à les servir.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'après le coucher du soleil  : c.-à-d. après la fin du sabbat (v. 21). –  on lui amenait  : autre traduction on se mit à lui amener . –  malades / démoniaques v. 34 ; 3.10s ; 6.13 ; cf. 9.20 ; Mt 8.16 ; Lc 6.18 ; Ac 5.16 ; 8.7.'
  - type: text
    content: 'Le soir venu, après le coucher du soleil, on lui amenait tous les malades et les démoniaques. '
  '33':
  - type: note
    content: 2.2 ; 3.8 ; 6.55.
  - type: text
    content: 'Toute la ville était rassemblée devant la porte. '
  '34':
  - type: note
    content: malades / démons v. 32+. –  il ne laissait pas les démons parler v. 25+ ; cf. Ac 16.17s.
  - type: text
    content: Il guérit beaucoup de malades qui souffraient de divers maux et chassa beaucoup de démons ; il ne laissait pas les démons parler, parce qu'ils le connaissaient.
  - type: heading
    content: Proclamation en Galilée
  - type: heading
    content: Lc 4.42-43
  '35':
  - type: text
    content: ' '
  - type: note
    content: 6.46 ; Mt 14.23 ; Lc 3.21 ; 4.42 ; 9.28+.
  - type: text
    content: 'Au matin, alors qu''il faisait encore très sombre, il se leva et sortit pour aller dans un lieu désert où il se mit à prier. '
  '36':
  - type: text
    content: 'Simon et ceux qui étaient avec lui s''empressèrent de le rechercher. '
  '37':
  - type: note
    content: Cf. Jn 6.24.
  - type: text
    content: 'Quand ils l''eurent trouvé, ils lui disent : Tous te cherchent. '
  '38':
  - type: note
    content: 'Lc 4.43. –  je proclame le message  : litt. je proclame (de même v. 39) ; v. 4n  ; 3.14 ; 16.20 ; cf. Mt 11.1n. –  sorti (sans doute de la ville, cf. v. 35) : cf. v. 29 ; 2.12s ; Lc 4.43 ; voir aussi Jn 1.43n  ; 8.42+.'
  - type: text
    content: 'Il leur répond : Allons ailleurs, dans les bourgades voisines, afin que là aussi je proclame le message ; car c''est pour cela que je suis sorti.'
  - type: heading
    content: Mt 4.23  ; Lc 4.44
  '39':
  - type: text
    content: ' '
  - type: note
    content: Mt 9.35 ; voir aussi démon .
  - type: text
    content: Et il se rendit dans toute la Galilée, proclamant le message dans leurs synagogues et chassant les démons.
  - type: heading
    content: Jésus guérit un lépreux
  - type: heading
    content: Mt 8.1-4  ; Lc 5.12-16
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'survint  : cf. Jn 1.3n,6. –  Jean, celui qui baptisait ou Jean le Baptiseur  ; même expression 6.14,24 ; terme apparenté 6.25 ; 8.28, comme en Mt 3.1n. –  désert Mt 3.1n. –  proclamait  : c''est du mot grec correspondant que vient le terme technique kérygme , qui désigne l''annonce du message apostolique ; il évoquait à l''origine la proclamation d''un « héraut » ; v. 7,14,38s,45 ; 3.14 ; 5.20 ; 6.12 ; 7.36 ; 13.10 ; 14.9 ; 16.15,20 ; Mt 3.1+ ; Lc 3.3+ ; Ac 8.5+ ; Rm 10.8+ ; 1Co 1.21+ ; 2Co 1.19+ ; Ga 2.2+ ; Ph 1.15 ; Col 1.23 ; 1Th 2.9 ; 1Tm 2.7n  ; 1P 3.19 ; Ap 5.2. –  baptême  : cette pratique (à l''origine, une immersion complète dans l''eau) a pu dériver d''un rite de purification comparable aux bains et ablutions que pratiquait la communauté de Qumrân, également dans le désert  ; voir 7.4n  ; Ac 13.24 ; 19.4 ; cf. 2.38 ; 22.16 ; Hé 6.2n  ; 9.10 ; cf. Es 1.16 ; 4.4 ; Ez 36.25. –  changement radical ou repentance, conversion Mt 3.2n. –  pardon des péchés  : cf. Mt 26.28.'
  - type: text
    content: 'survint Jean, celui qui baptisait dans le désert et proclamait un baptême de changement radical, pour le pardon des péchés. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'lépreux Ex 4.6 ; Lv 13–14 ; Nb 5.2s ; 12.10ss ; Dt 24.8 ; 2R 5.27 ; 7.3ss ; Mt 8.2 ; 10.8 ; 11.5 ; voir Lv 13.2n. –  se mettant à genoux  : cette précision est absente de certains mss. – Un papyrus égyptien (Egerton 2) du IIe ou du IIIe s., reconstitué, porterait le texte suivant : « Et voici qu''un lépreux s''avança vers lui et dit : “Maître Jésus, à force de cheminer avec des lépreux et de manger avec eux à l''auberge, j''ai contracté la lèpre moi aussi. Cependant, si tu le veux, je peux être purifié.” Le Seigneur lui dit alors : “Je le veux, sois purifié.” Et aussitôt la lèpre le quitta. Jésus lui dit : “Va, montre-toi aux prêtres, fais l''offrande pour la purification comme l''a prescrit Moïse et ne pèche plus.” »'
  - type: text
    content: 'Un lépreux vient à lui et, se mettant à genoux, il le supplie : Si tu le veux, tu peux me rendre pur. '
  '41':
  - type: note
    content: 'Emu  : certains mss portent en colère  ; le terme correspondant est absent du récit parallèle de Matthieu ; cf. v. 43n  ; 3.5 ; voir aussi 8.2 ; 9.22 ; Mt 9.36n  ; 18.27 ; 20.34 ; Lc 7.13 ; 10.33 ; 15.20. –  le toucha  : autre traduction possible toucha la sienne (la main du lépreux) 3.10 ; 5.27s ; 6.56 ; 7.33 ; 8.22 ; 10.13/ / ; Lc 6.19 ; cf. Ac 5.15 ; 19.11s ; voir aussi Lv 13.43-46. –  sois pur  : litt. sois rendu pur, même verbe v. 40,42.'
  - type: text
    content: 'Emu, il tendit la main, le toucha et dit : Je le veux, sois pur. '
  '42':
  - type: note
    content: 'il était pur  : litt. il fut rendu pur.'
  - type: text
    content: 'Aussitôt la lèpre le quitta ; il était pur. '
  '43':
  - type: note
    content: 'Jésus  : sous-entendu dans le texte. –  s''emportant contre lui ou réagissant vivement à son égard, le grondant  ; même verbe 14.5 ; Mt 9.30 ; Jn 11.33n,38 ; voir aussi Mc 3.5 ; 9.19. –  le chassa v. 12n.'
  - type: text
    content: 'Jésus, s''emportant contre lui, le chassa aussitôt '
  '44':
  - type: note
    content: 'Garde-toi de rien dire  : cf. v. 25+. –  va te montrer au prêtre Lv 13.49 ; Lc 17.14. –  ce que Moïse a prescrit Lv 14.1-32. –  témoignage 6.11 ; 13.9 ; Mt 8.4+ ; Jc 5.3n.'
  - type: text
    content: 'en disant : Garde-toi de rien dire à personne, mais va te montrer au prêtre, et présente pour ta purification ce que Moïse a prescrit ; ce sera pour eux un témoignage. '
  '45':
  - type: note
    content: 'parti  : litt. sorti. –  proclamer v. 4n. –  chose et Parole traduisent deux sens possibles du même mot grec ; cf. 2.2 ; 4.14-20,33 ; 8.32n  ; Ac 4.29+. –  Jésus…  : litt. il ne pouvait plus… –  ouvertement  : terme apparenté à celui qui est traduit par se manifester en 4.22n  ; cf. Jn 7.10n.'
  - type: text
    content: Mais lui, une fois parti, se mit à proclamer la chose haut et fort et à répandre la Parole, de sorte que Jésus ne pouvait plus entrer ouvertement dans une ville. Il se tenait dehors, dans les lieux déserts, et on venait à lui de toutes parts.
  '5':
  - type: note
    content: 'Toute la Judée  : litt. toute la région de Judée. –  se rendaient  : litt. sortaient. –  dans le Jourdain  : litt. dans le fleuve Jourdain. –  en reconnaissant publiquement ou en confessant  : le verbe grec évoque habituellement une déclaration publique ; cf. Lv 5.5s ; 26.40 ; Ps 32.5 ; Pr 28.13 ; Dn 9.20 ; Esd 10.1 ; Né 1.6 ; 9.2 ; 2Ch 6.37 ; Lc 18.13s ; Ac 19.18-20 ; Jc 4.10 ; 1Jn 1.9n.'
  - type: text
    content: 'Toute la Judée et tous les habitants de Jérusalem se rendaient auprès de lui et recevaient de lui le baptême, dans le Jourdain, en reconnaissant publiquement leurs péchés. '
  '6':
  - type: note
    content: 'vêtu de poil de chameau  : cf. 2R 1.8 ; Za 13.4 ; Mt 3.4+ ; 11.8/ /. –  criquets ou sauterelles Lv 11.21s. – Cf. Evangile des ébionites (Epiphane, Panarion, 30,13,5) : « Il se nourrissait de miel sauvage – dont le goût est celui de la manne – comme un gâteau à l''huile. »'
  - type: text
    content: Jean était vêtu de poil de chameau, avec une ceinture de cuir autour des reins. Il se nourrissait de criquets et de miel sauvage.
  - type: heading
    content: Mt 3.11-12  ; Lc 3.15-18  ; cf. Jn 1.24-28
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il vient derrière moi (ou après moi  ; cf. Jn 1.15n) : une expression analogue est traduite par venir à la suite v. 17n,20n  ; cf. 8.33ns ; 13.16n. –  plus puissant 3.27n  ; cf. Es 11.2. –  ce serait encore trop d''honneur…  : cf. Mt 3.11n  ; Lc 3.16 ; Jn 1.26s ; Ac 13.25.'
  - type: text
    content: 'Il proclamait : Il vient derrière moi, celui qui est plus puissant que moi, et ce serait encore trop d''honneur pour moi que de me baisser pour délier la lanière de ses sandales. '
  '8':
  - type: note
    content: 'Cf. Mt 3.11+ ; Jn 15.26+ ; Ac 1.5 ; 11.16 ; 19.1-6 ; Règle de la Communauté (Qumrân) 3.6-9 : « C''est par l''Esprit de vrai conseil à l''égard des voies de l''homme que seront expiées toutes ses iniquités, quand il contemplera la lumière de vie ; et c''est par l''Esprit saint de la Communauté, dans Sa vérité, qu''il sera purifié de toutes ses iniquités ; et c''est par l''Esprit de droiture et d''humilité que sera expié son péché. Et c''est par l''humilité de son âme à l''égard de tous les préceptes de Dieu que sera purifiée sa chair, quand on l''aspergera avec l''eau lustrale et qu''il se sanctifiera dans l''eau courante. » 4.20s : « Dieu, par Sa Vérité, nettoiera toutes les œuvres d''un chacun… pour le purifier par l''Esprit de sainteté de tous les actes d''impiété ; et Il fera jaillir sur lui l''Esprit de vérité comme de l''eau lustrale. » –  dans (ou par) l''Esprit saint ou un esprit saint, un souffle sacré.'
  - type: text
    content: Moi, je vous ai baptisés d'eau ; lui vous baptisera dans l'Esprit saint.
  - type: heading
    content: Baptême et mise à l'épreuve de Jésus
  - type: heading
    content: Mt 3.13-17  ; Lc 3.21-22  ; cf. Jn 1.29-34
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'de Nazareth de Galilée  : cf. Mt 2.22n-23n. – Cf. Jn 1.29-34 ; voir aussi baptême'
  - type: text
    content: 'En ces jours-là Jésus vint, de Nazareth de Galilée, et il reçut de Jean le baptême dans le Jourdain. '
