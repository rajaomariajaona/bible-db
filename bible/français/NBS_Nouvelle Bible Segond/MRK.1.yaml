      - type: usfm
        marker: ft
        children:
        - type: text
          text: est l'un des mots favoris de Mc ; dans la présente traduction il est diversement rendu (v. 23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), et parfois sous-entendu (v. 21). Sur l''eau nécessaire aux purifications dans la communauté de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ', cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ecrit de Damas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.10ss : « Qu''on ne se baigne pas dans de l''eau sale ou en trop petite quantité pour envelopper complètement un homme. Qu''on ne purifie pas avec cette eau un vase. Et toute mare se trouvant dans (le creux d’)un rocher dans laquelle il n''y a pas assez d''eau pour couvrir entièrement un homme, si une personne impure l''a touchée, celle-ci rend impure l''eau de la mare comme elle ferait l''eau d''un vase. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se déchirer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 15.38 ; cf. Es 63.19 ; Ez 1.1 ; Mt 3.16+ ; Ac 10.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' descendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 11.2 ; 42.1 ; 63.11 ; Ac 2.2ss ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Lévi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.6s : « Les cieux s''ouvriront, et du Temple de gloire viendra sur lui (le grand prêtre nouveau) la sanctification, en même temps qu''une voix paternelle comme celle d''Abraham à Isaac. La gloire du Très-Haut sera proclamée sur lui, et l''Esprit d''intelligence et de sanctification reposera sur lui par l''eau. » '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.2 : « Les cieux s''ouvriront sur lui (le Messie descendant de David) pour répandre l''Esprit, la bénédiction du Père saint, et c''est lui qui répandra l''Esprit de grâce sur vous » (ajouts chrétiens à des textes juifs ?) ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: hébreux
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1 : « Lorsque le Seigneur fut remonté de l''eau, toute source de l''Esprit saint descendit, se reposa sur lui et lui dit : “Mon fils, dans tous les prophètes, j''attendais que tu viennes pour me reposer en toi. Car tu es mon repos, tu es mon Fils premier-né qui règnes pour l''éternité.” » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme une colombe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 8.8.'
      marker-yv: yv-n
    - type: text
      text: 'Dès qu''il remonta de l''eau, il vit les cieux se déchirer et l''Esprit descendre vers lui comme une colombe. '
