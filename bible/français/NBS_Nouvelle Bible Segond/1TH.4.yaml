      - type: text
        text: '  : cf. v. 14 ; 1.10 ; 5.10 ; Jn 12.26 ; 17.24 ; Rm 6.8 ; Ph 1.23+ ; Col 3.3s.'
    marker-yv: yv-n
  - type: text
    text: 'Ensuite, nous, les vivants qui restons, nous serons enlevés ensemble avec eux, dans les nuées, à la rencontre du Seigneur, dans les airs ; et ainsi nous serons toujours avec le Seigneur. '
