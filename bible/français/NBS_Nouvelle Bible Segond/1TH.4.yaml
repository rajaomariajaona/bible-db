document_id: 1TH.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ce que Dieu veut, c'est votre consécration
  - type: text
    content: ' '
  - type: note
    content: 'Au reste 2Co 13.11 ; Ph 3.1 ; 4.8 ; 2Th 3.1. –  frères 2.1+. –  nous vous le demandons et nous vous y encourageons (ou exhortons ) …  : cf. v. 10ss ; 5.14 ; Rm 12.1s ; 15.30ss ; 16.17 ; 1Co 1.10 ; 4.16 ; 16.15s ; 2Co 10.1s. –  appris  : litt. reçu  ; cf. 2.13+. –  vous comporter 2.12n. –  pour (litt. et ) plaire à Dieu  : même verbe en 1Co 7.32. –  c''est bien ce que vous faites  : litt. comme aussi vous marchez . –  progressez  : litt. abondez  ; v. 10 ; 3.10,12s.'
  - type: text
    content: 'Au reste, frères, nous vous le demandons et nous vous y encourageons dans le Seigneur Jésus : vous avez appris de nous comment vous devez vous comporter pour plaire à Dieu ; c''est bien ce que vous faites, mais progressez encore. '
  '10':
  - type: note
    content: 'envers tous les frères…  : cf. 1Co 16.1,19 ; 2Co 1.1 ; Ga 1.2 ; 2Th 3.4. –  dans l''ensemble de la Macédoine 1.7+s. –  progresser encore v. 1+.'
  - type: text
    content: 'c''est ainsi que vous agissez aussi envers tous les frères dans l''ensemble de la Macédoine. Mais nous vous encourageons, frères, à progresser encore, '
  '11':
  - type: note
    content: 'Cf. 2.9 ; 5.14 ; Ep 4.28 ; 2Th 3.6-12. –  un point d''honneur Rm 15.20n. – Voir paix. –  travailler de vos mains  : dans la société antique, c''est le lot des gens de condition modeste, en particulier des esclaves.'
  - type: text
    content: 'à mettre un point d''honneur à vivre en paix, à vous occuper de vos propres affaires et à travailler de vos mains, comme nous vous en avons donné l''injonction, '
  '12':
  - type: note
    content: 'vous vous comportiez (2.12n) convenablement (ou décemment) : cf. Rm 13.13 ; 1Co 7.35n  ; 14.40. –  envers  : autre traduction aux yeux de. –  ceux du dehors Mc 4.11 ; 1Co 5.12s ; 10.32 ; Col 4.5. –  de personne  : autre traduction de rien  ; cf. 2.9.'
  - type: text
    content: afin que vous vous comportiez convenablement envers ceux du dehors et que vous n'ayez besoin de personne.
  - type: heading
    content: Ceux qui se sont endormis dans la mort
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2Th 2.1ss. –  Nous ne voulons pas… Rm 1.13+ ; 11.25 ; 1Co 10.1 ; 12.1. –  frères 2.1+. –  dans la mort , sous-entendu dans le texte (cf. v. 15) ; le verbe correspondant à s''endormir signifie fréquemment mourir , par euphémisme ; un autre verbe est traduit par dormir en 5.6s,10 ; cf. Jr 51.39s ; Ps 13.4 ; Jb 14.12s ; Dn 12.2 ; Jn 11.11ss ; Ac 13.36n  ; 1Co 11.30n  ; 15.20s ; 2 Maccabées 12.45 : « Une très belle récompense est réservée à ceux qui s''endorment dans la piété. » –  comme les autres 5.6 ; Ep 2.3. –  pas d''espérance  : cf. Rm 4.18 ; Ep 2.12 ; Sagesse 3.18 : « S''ils meurent tôt, ils n''auront ni espoir, ni consolation au jour du verdict. »'
  - type: text
    content: 'Nous ne voulons pas, frères, que vous soyez dans l''ignorance au sujet de ceux qui se sont endormis dans la mort, afin que vous ne vous attristiez pas comme les autres, qui n''ont pas d''espérance. '
  '14':
  - type: note
    content: 'si, comme nous le croyons…  : litt. si nous croyons que… cf. Rm 10.9s. –  mort (5.10) / s''est relevé ou a été relevé, verbe apparenté au substantif traduit par résurrection en Rm 1.4n  ; voir aussi 14.9 ; 1Co 15.3s,12 ; Paul évoque plus souvent la résurrection en employant l''autre verbe, traduit par (se) réveiller (Rm 4.24n  ; 6.4,9 ; 8.11 ; 10.9 ; 1Co 15.12,20 ; Ga 1.1 ; cf. Ac 3.15n). –  réunira…  : litt. conduira  ; autre traduction  : ceux qui se sont endormis par Jésus (ou à cause de lui, cf. Rm 1.5 ; 5.9,17s ; 8.37 ; 2Co 1.20 ; voir aussi 1Co 15.18), Dieu les réunira à lui, cf. v. 17+.'
  - type: text
    content: 'En effet, si, comme nous le croyons, Jésus est mort et s''est relevé, alors, par Jésus, Dieu réunira aussi avec lui ceux qui se sont endormis. '
  '15':
  - type: note
    content: 'c''est (litt. dans, ce qui peut signifier par ou d''après) une parole du Seigneur  : cf. v. 2 ; 1Co 7.10 ; 9.14 ; 11.23 ; voir aussi Mt 16.27 ; 24.30 ; Mc 13/ /. –  nous, les vivants  : cf. 1Co 7.25ss ; 15.51 ; 2Co 1.8s ; 5.8 ; Ph 1.21ss. –  qui restons  : litt. laissés  ; cf. 4 Esdras 13.20,24 : « Il vaut mieux parvenir au terme à travers les dangers que disparaître du monde comme une nuée et ne pas voir ce qui arrivera à la fin des temps… ceux qui ont été laissés sont plus heureux que ceux qui sont morts. » –  l''avènement 2.19+. –  nous ne devancerons…  : le même verbe est traduit par atteindre en 2.16 (voir Lc 11.20n) ; cette affirmation s''oppose peut-être à une des idées courantes de l''apocalyptique juive, selon laquelle la résurrection des morts se produirait longtemps après l''avènement du Messie (plus de 400 ans selon 4 Esdras 7.28ss) ; cf. Ap 20.4ss ; 2 Baruch 30.1 : « Quand sera accompli le temps de la venue du Messie et qu''il retournera avec gloire (après son règne, chap. 29), tous ceux qui se sont endormis dans son espérance ressusciteront. »'
  - type: text
    content: 'Voici en effet ce que nous vous disons – c''est une parole du Seigneur : nous, les vivants qui restons jusqu''à l''avènement du Seigneur, nous ne devancerons en aucun cas ceux qui se sont endormis. '
  '16':
  - type: note
    content: 'Cf. 1.10 ; Mt 24.30s/ / ; 1Co 15.51ss ; 2Th 1.7. –  archange (voir ange) Jd 9 ; cf. Dn 10.13 ; Mt 24.31 ; Mc 8.38 ; 2Th 1.7 ; Ap 15.1. –  la trompette de Dieu  : cf. Ex 19.16,19 ; Es 27.13 ; Jl 2.1 ; So 1.14ss ; Za 9.14 ; Mt 24.31 ; 1Co 15.52 ; Ap 8.2,6,13. –  se relèveront d''abord v. 15n  ; cf. 1Co 15.23 ; voir aussi Ap 11.11s.'
  - type: text
    content: 'Car le Seigneur lui-même, avec un cri de commandement, avec la voix d''un archange, avec le son de la trompette de Dieu, descendra du ciel, et ceux qui sont morts dans le Christ se relèveront d''abord. '
  '17':
  - type: note
    content: 'enlevés  : même verbe grec Gn 5.24 (LXX) ; Ac 8.39+ ; 2Co 12.2,4. –  nuées  : cf. Ex 13.21+ ; 16.10 ; 19.16 ; Es 19.1 ; Ez 1.4ss ; Dn 7.13s ; Mc 13.26/ / ; Ac 1.9. –  à la rencontre  : le terme grec correspondant désigne parfois la délégation de citoyens qui se porte au-devant d''un personnage important avant qu''il arrive dans la ville ; cf. Ex 19.17. –  toujours avec le Seigneur  : cf. v. 14 ; 1.10 ; 5.10 ; Jn 12.26 ; 17.24 ; Rm 6.8 ; Ph 1.23+ ; Col 3.3s.'
  - type: text
    content: 'Ensuite, nous, les vivants qui restons, nous serons enlevés ensemble avec eux, dans les nuées, à la rencontre du Seigneur, dans les airs ; et ainsi nous serons toujours avec le Seigneur. '
  '18':
  - type: note
    content: Encouragez-vous ou exhortez-vous, consolez-vous, cf. 5.11+.
  - type: text
    content: Encouragez-vous donc les uns les autres par ces paroles.
  '2':
  - type: note
    content: 'Vous savez 1.5+. –  injonctions  : terme apparenté v. 11 ; Mc 6.8+/ / ; Ac 1.4+ ; 1Co 7.10+ ; 2Th 3.4+ ; 1Tm 1.3+. –  par ou au nom du Seigneur  : cf. v. 15+.'
  - type: text
    content: Vous savez en effet quelles injonctions nous vous avons données par le Seigneur Jésus.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'La volonté de Dieu  : cf. 5.18. –  votre consécration ou votre sanctification , c.-à-d. que vous soyez saints , cf. v. 4,7 ; 5.23 ; Rm 6.19n,22 ; cf. Lv 11.44s ; 19.2 ; 21.8 ; Ep 1.4 ; Hé 10.10 ; 12.14 ; 1P 1.16. –  l''inconduite sexuelle  : cf. Ac 15.20,29 ; Rm 1.24ss ; 1Co 6.12-20 ; 7.2.'
  - type: text
    content: 'La volonté de Dieu, c''est votre consécration : abstenez-vous de l''inconduite sexuelle ; '
  '4':
  - type: note
    content: 'prendre femme  : litt. acquérir son objet  ; le mot grec correspondant à objet (ou ustensile, traditionnellement vase) et son principal équivalent hébreu peuvent s''appliquer à n''importe quel type d''objet (Rm 9.21nss). Dans certains cas ils désignent figurément le corps (2Co 4.7) et peuvent servir d''euphémisme pour le sexe (1S 21.6n), d''où l''autre traduction possible maîtriser son corps. Néanmoins il s''applique souvent, spécialement, à la femme (cf. 1P 3.7n  ; voir aussi Gn 2.23 ; Pr 5.15), d''où notre traduction ; cf. 1Co 7.2 ; Hé 13.4.'
  - type: text
    content: 'que chacun de vous sache prendre femme dans la consécration et l''honneur, '
  '5':
  - type: note
    content: 'aux passions…  : litt. à une passion de désir  ; cf. Ga 5.24 ; Col 3.5. –  les gens des nations  : autre traduction les non-Juifs (quoique ici les chrétiens aussi s''en distinguent ; cf. 1Co 5.1n  ; Ep 2.11n  ; 4.17n) qui ne connaissent pas Dieu, cf. Rm 1.24ss ; 1Co 15.34 ; Ga 4.8 ; 2Th 1.8 ; voir aussi Jr 10.25 ; Ps 79.6.'
  - type: text
    content: 'sans se livrer aux passions du désir, comme le font les gens des nations qui ne connaissent pas Dieu ; '
  '6':
  - type: note
    content: 'en cette affaire  : litt. en l''affaire  ; le mot ainsi traduit évoque un différend en 1Co 6.1 ; certains, ici, ont compris en affaires  ; d''autres y voient un euphémisme pour les questions sexuelles évoquées dans le contexte, ou une simple référence à ce qui précède (notre traduction) ; un verbe apparenté est traduit par vous occuper de vos propres affaires au v. 11. –  le Seigneur fait justice  : litt. parce que c''est le Seigneur qui est justicier (ou vengeur) ; cf. 1.10 ; 5.1ss ; Rm 12.19 ; 13.4 ; Col 3.23ss ; 2Th 1.7ss ; voir aussi Dt 32.35 ; Ps 94.1s. –  nous vous l''avons déjà dit  : autre traduction nous vous avons déjà prévenus  ; Ga 1.9 ; 5.21.'
  - type: text
    content: 'que personne, en cette affaire, ne lèse son frère ni ne lui cause du tort : le Seigneur fait justice de tout cela, nous vous l''avons déjà dit et attesté. '
  '7':
  - type: note
    content: pour (ou en rapport avec) l'impureté (voir pur, impur) Rm 1.24 ; 2Co 12.21 ; Ga 5.19 ; Col 3.5. –  appelés 2.12+. –  dans (ou par, cf. 1Co 7.15) la consécration v. 3n  ; cf. 2Th 2.13s.
  - type: text
    content: 'Car ce n''est pas pour l''impureté que Dieu nous a appelés, mais dans la consécration. '
  '8':
  - type: note
    content: 'ces préceptes  : complément sous-entendu dans le texte. –  pas un homme, mais Dieu  : cf. 1S 8.7 ; Lc 10.16 ; Jn 12.44 ; 13.20. –  même  : le terme correspondant est absent de plusieurs mss ; autres traductions Dieu qui vous donne aussi son Esprit saint ; Dieu qui met aussi en vous son Esprit saint  ; quelques mss portent le passé (qui vous a donné ; qui a mis en vous) ; Ez 36.27 ; 37.14 ; cf. 1Co 6.19 ; voir aussi Rm 5.5 ; 2Co 1.22 ; Ga 4.6.'
  - type: text
    content: Ainsi celui qui rejette ces préceptes ne rejette pas un homme, mais Dieu, celui-là même qui vous donne son Esprit saint.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Pour ce qui concerne  : expression analogue au v. 13 ( au sujet de ) ; cf. 5.1 ; 1Co 7.1n,25 ; 8.1 ; 12.1. –  affection fraternelle Rm 12.10+. –  pas besoin  : cf. 5.1 ; 2Co 9.1. –  instruits par Dieu  : cf. Es 54.13 ; Jn 6.45 ; voir aussi Jr 31.33s. –  vous aimer… 3.12 ; Jn 13.34+.'
  - type: text
    content: 'Pour ce qui concerne l''affection fraternelle, vous n''avez pas besoin qu''on vous écrive, car vous êtes vous-mêmes instruits par Dieu de façon à vous aimer les uns les autres ; '
