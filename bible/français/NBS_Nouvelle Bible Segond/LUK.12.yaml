    - type: text
      text: 'Sur ces entrefaites, la foule s''étant rassemblée par dizaines de milliers, au point que les gens s''écrasaient les uns les autres, il se mit à dire, à ses disciples d''abord : Gardez-vous du levain des pharisiens, qui est l''hypocrisie.'
  - type: usfm
