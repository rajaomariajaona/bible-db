        - type: text
          text: 'Rm 1.29 ; 2Co 9.5 ; Ep 4.19 ; 5.3 ; Col 3.5 ; 2P 2.3,14 ; cf. 1Tm 6.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abondance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.4. –  '
      - type: usfm
        marker: fq
        children:
