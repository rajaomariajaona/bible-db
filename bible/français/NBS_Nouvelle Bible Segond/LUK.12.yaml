document_id: LUK.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ceux qui se déclarent pour Jésus
  - type: text
    content: ' '
  - type: note
    content: 'Mt 16.5s,12 ; Mc 8.14s. –  par dizaines de milliers (litt. myriades ) : cf. 11.29 ; Ac 2.41+. –  s''écrasaient  : le même verbe est traduit par piétiner en 8.5 ; certains mss portent s''étouffaient . –  d''abord  : le terme correspondant pourrait aussi se rattacher au discours de Jésus  : Avant tout, gardez-vous du (ou prenez garde au…  ; cf. 17.3 ; 20.46 ; 21.34 ; Ac 5.35 ; 20.28) levain… 13.21 ; cf. Mt 13.33n  ; 1Co 5.6ss ; Ga 5.9. –  pharisiens 5.17+. –  l''hypocrisie v. 56 ; 6.42 ; Mt 6.2n.'
  - type: text
    content: 'Sur ces entrefaites, la foule s''étant rassemblée par dizaines de milliers, au point que les gens s''écrasaient les uns les autres, il se mit à dire, à ses disciples d''abord : Gardez-vous du levain des pharisiens, qui est l''hypocrisie.'
  - type: heading
    content: Mt 10.26-33
  '10':
  - type: text
    content: ' '
  - type: note
    content: Mt 12.31s ; Mc 3.28ss. –  contre le Fils de l'homme (5.24+) 22.65 ; 23.34,39 ; Ac 3.17 ; 13.27. –  blasphémera contre (ou calomniera, insultera ) l'Esprit saint… Mc 3.29n  ; cf. Ac 13.46 ; 18.6 ; 28.24ss ; comparer avec 2.38 ; 3.19 ; voir aussi Hé 6.4ss.
  - type: text
    content: Et quiconque parlera contre le Fils de l'homme, il lui sera pardonné, mais à celui qui blasphémera contre l'Esprit saint, il ne sera pas pardonné.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.12-15 ; Mt 10.19s ; Mc 13.11. –  synagogues 4.15+ ; cf. Ac 22.19 ; 26.11 ; 2Co 11.24. –  princes / autorités (probablement non juifs) 20.20n  ; Tt 3.1 ; voir aussi Ep 1.21+ ; 3.10 ; Col 1.16 ; 2.15. –  ne vous inquiétez pas v. 22. –  de la manière dont vous présenterez votre défense  : litt. (selon les meilleurs mss) de comment ou (avec) quoi vous vous défendrez , formulation analogue à celle de Mt 10.19.'
  - type: text
    content: 'Quand on vous mènera devant les synagogues, les princes et les autorités, ne vous inquiétez pas de la manière dont vous présenterez votre défense, ni de ce que vous direz ; '
  '12':
  - type: note
    content: 'l''Esprit saint vous enseignera Jn 14.26 ; 1Co 2.13 ; cf. Ac 4.8 ; 5.32 ; 7.55. –  au moment même  : litt. en cette heure.'
  - type: text
    content: car l'Esprit saint vous enseignera au moment même ce qu'il faudra dire.
  - type: heading
    content: La parabole du riche déraisonnable
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Quelqu''un…  : cf. 9.57 ; 13.23. –  Maître 3.12n. –  héritage  : cf. 15.12 ; 20.14 ; voir Nb 27.1-11 ; 36.7ss ; Dt 21.15ss.'
  - type: text
    content: 'Quelqu''un de la foule lui dit : Maître, dis à mon frère de partager avec moi notre héritage. '
  '14':
  - type: note
    content: 'Qui (litt. Homme, qui…, cf. 5.20n) a fait de moi…  : litt. qui m''a institué juge ou arbitre sur vous ? cf. Ex 2.14 ; Ac 7.27,35. –  arbitre  : autre traduction exécuteur testamentaire (chargé de partager les biens). – Cf. Evangile selon Thomas 72 : « Un homme lui dit : “Dis à mes frères de partager avec moi les biens de mon père.” Il lui répondit : “O homme, qui a fait de moi un partageur ?” Il se tourna vers les disciples et leur dit : “Suis-je donc un partageur ?” »'
  - type: text
    content: 'Il lui répondit : Qui a fait de moi votre juge ou votre arbitre ? '
  '15':
  - type: note
    content: avidité Rm 1.29 ; 2Co 9.5 ; Ep 4.19 ; 5.3 ; Col 3.5 ; 2P 2.3,14 ; cf. 1Tm 6.9s. –  abondance 21.4. –  la vie… 9.25 ; cf. Jb 31.24ss ; Ec 2.3ss. –  ses biens 8.3 ; Ac 4.32.
  - type: text
    content: 'Puis il leur dit : Veillez à vous garder de toute avidité ; car même dans l''abondance, la vie d''un homme ne dépend pas de ses biens.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'parabole 5.36+ ; 6.39 ; 10.30. Cf. Jr 17.11 ; Ps 49.7-13 ; Siracide 11.18s : « Tel est riche à force d''attention et d''économie, mais voici quel sera son salaire : Quand il se dit : “J''ai trouvé le repos, maintenant je vais manger de mes propres biens”, il ne sait pas combien de temps s''écoulera, puis il laissera ses biens à d''autres et il mourra. » 1 Hénoch 97.8ss : « Malheur à vous qui acquérez de l''or et de l''argent au détriment de la justice et qui dites : “Nous nous sommes enrichis, nous avons acquis et nous possédons des biens, nous possédons tout ce que nous voulons. Maintenant faisons tout ce que nous voulons, puisque nous avons amassé de l''argent dans nos trésors, et dans nos maisons toute une fortune (qui) se déverse comme l''eau.” Vous vous égarez, car, à coup sûr, votre richesse ne subsistera pas. » Evangile selon Thomas 63 : « Jésus a dit : “Il y avait un homme riche, qui possédait beaucoup d''argent. Il dit : ‘J''utiliserai mon argent pour semer, moissonner, planter et remplir mes magasins de fruits, de façon à ce que je ne manque de rien.’ Voilà ce qu''il pensait dans son cœur ; et cette même nuit il mourut. Celui qui a des oreilles, qu''il entende !” »'
  - type: text
    content: 'Il leur dit une parabole : La terre d''un homme riche avait beaucoup rapporté. '
  '17':
  - type: note
    content: 'Il raisonnait… 5.21-22+ ; cf. v. 45 ; 15.17ss ; 16.3s ; 18.4s ; 20.13. –  mes récoltes  : litt. mes fruits.'
  - type: text
    content: 'Il raisonnait, se disant : Que vais-je faire ? car je n''ai pas assez de place pour recueillir mes récoltes. '
  '18':
  - type: text
    content: 'Voici, dit-il, ce que je vais faire : je vais démolir mes granges, j''en construirai de plus grandes, j''y recueillerai tout mon blé et mes biens, '
  '19':
  - type: note
    content: 'je pourrai me dire…  : litt. je dirai à mon âme : Ame, tu as beaucoup…  ; sur le mot correspondant à âme, qui sera traduit par vie aux v. 20-23 et qui peut désigner la personne elle-même, voir 1.46 ; 6.9 ; 9.24 ; 14.26 ; 17.33 ; 21.19 ; Mt 10.28n  ; sur le terme hébreu correspondant dans l''A.T., voir Gn 1.20n  ; voir aussi Ec 6.2s où LXX emploie le terme correspondant à âme en un sens analogue à celui qui apparaît ici. –  mange, bois… Ec 8.15 ; 1Co 15.32 ; cf. Jc 4.13s. –  fais la fête  : même verbe 15.23ss ; 16.19 ; Ac 2.26 ; 7.41 ; Rm 15.10 ; 2Co 2.2 ; Ga 4.27 ; Ap 11.10 ; 12.12 ; 18.20.'
  - type: text
    content: 'et alors je pourrai me dire : « Tu as beaucoup de biens en réserve, pour de nombreuses années ; repose-toi, mange, bois et fais la fête. » '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.17.
  - type: text
    content: 'Il n''y a rien de voilé qui ne doive être révélé, rien de caché qui ne doive être connu. '
  '20':
  - type: note
    content: 'Homme déraisonnable 11.40. –  ta vie te sera redemandée  : litt. on te redemandera ta vie (ou ton âme, v. 19n) ; sur la formulation, voir 6.38n  ; cf. Sagesse 15.8 : « Tout juste né de la terre, il retournera bientôt à cette terre d''où il a été tiré, quand on lui demandera de restituer son âme. » –  à qui… Ps 39.7.'
  - type: text
    content: 'Mais Dieu lui dit : Homme déraisonnable, cette nuit même ta vie te sera redemandée ! Et ce que tu as préparé, à qui cela ira-t-il ? '
  '21':
  - type: note
    content: 'Cf. v. 33 ; 16.9 ; 18.22 ; Mt 6.20 ; 1Tm 6.17ss. Certains mss omettent ce v. D''autres ajoutent à la fin  : En disant cela, il s''écriait : « Celui qui a des oreilles pour entendre, qu''il entende ! » (cf. 8.8 ; 14.35) ; de même 13.9.'
  - type: text
    content: Ainsi en est-il de celui qui amasse des trésors pour lui-même et qui n'est pas riche pour Dieu.
  - type: heading
    content: Avoir confiance en Dieu
  - type: heading
    content: Mt 6.25-34
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'à ses disciples  : certains mss portent aux disciples . –  Ne vous inquiétez pas v. 11 ; 21.34. –  vie v. 19n.'
  - type: text
    content: 'Il dit ensuite à ses disciples : C''est pourquoi je vous dis : Ne vous inquiétez pas, pour votre vie, de ce que vous mangerez ni, pour votre corps, de ce dont vous serez vêtus. '
  '23':
  - type: text
    content: 'Car la vie est plus que la nourriture, et le corps plus que le vêtement. '
  '24':
  - type: note
    content: 'Considérez  : même verbe v. 27 ; 6.41 (remarquer) ; 20.23 (comprendre) ; Ac 7.31,32 (regarder) ; 11.6 (avec attention) ; 27.39 (apercevoir). –  les corbeaux Ps 147.9 ; Jb 38.41. –  vous valez… v. 7.'
  - type: text
    content: 'Considérez les corbeaux : ils ne sèment pas, ils ne moissonnent pas, ils n''ont ni cellier, ni grange ; et Dieu les nourrit. Or vous valez plus que les oiseaux, combien plus ! '
  '25':
  - type: note
    content: 'Qui de vous 11.5+. –  rallonger tant soit peu  : litt. rajouter une coudée (mesure d''environ 45 cm) à…  ; au lieu de la durée de sa vie on pourrait comprendre sa taille, cf. 2.52n  ; voir aussi Ps 39.5.'
  - type: text
    content: 'Qui de vous peut, par ses inquiétudes, rallonger tant soit peu la durée de sa vie ? '
  '26':
  - type: note
    content: Cf. 16.10 ; 19.17.
  - type: text
    content: 'Si donc vous ne pouvez pas même la moindre chose, pourquoi vous inquiétez-vous du reste ? '
  '27':
  - type: note
    content: 'Certains mss portent considérez les lis : ils ne filent pas, ils ne tissent pas. –  Salomon, dans toute sa gloire 1R 10.4ss,21,23 ; 2Ch 9.4,20,22.'
  - type: text
    content: 'Considérez comment poussent les lis : ils ne travaillent pas, ils ne filent pas ; cependant je vous dis que pas même Salomon, dans toute sa gloire, n''a été vêtu comme l''un d''eux. '
  '28':
  - type: note
    content: 'l''herbe  : cf. Es 37.27 ; 40.6ss ; Ps 37.2 ; 90.5s ; 102.12 ; 103.15 ; Jb 8.12. –  gens de peu de foi Mt 6.30+.'
  - type: text
    content: 'Si Dieu habille ainsi l''herbe qui est aujourd''hui dans les champs et qui demain sera jetée au four, à combien plus forte raison le fera-t-il pour vous, gens de peu de foi ! '
  '29':
  - type: note
    content: 'ne vous tourmentez pas  : certains ont compris ne vous exaltez pas.'
  - type: text
    content: 'Et vous, ne cherchez pas ce que vous allez manger ou ce que vous allez boire, et ne vous tourmentez pas. '
  '3':
  - type: note
    content: 'C''est pourquoi  : autre traduction parce que (même formule 1.20 ; 19.44). –  chuchoté  : litt. dit, autre verbe dans la première partie du v. –  les pièces les plus retirées  : le même terme est traduit par celliers au v. 24 ; cf. Mt 6.6n  ; voir aussi Jg 16.9 ; 1R 22.25. –  sur les toits en terrasse (5.19n) : en Orient, on peut souvent communiquer d''un toit à l''autre, du fait de la proximité des maisons.'
  - type: text
    content: C'est pourquoi tout ce que vous aurez dit dans les ténèbres sera entendu en plein jour ; ce que vous aurez chuchoté à l'oreille, dans les pièces les plus retirées, sera proclamé sur les toits en terrasse.
  '30':
  - type: note
    content: 'les gens…  : litt. les nations du monde, c.-à-d. les non-Juifs, selon la façon dont les Juifs les désignaient ; cf. Mt 4.15n  ; 1Th 4.5. –  votre Père 6.36+.'
  - type: text
    content: 'Tout cela, en effet, c''est ce que les gens de toutes les nations du monde recherchent sans relâche ; votre Père sait que vous en avez besoin. '
  '31':
  - type: note
    content: 'son règne ou son royaume, même terme v. 32 ; 4.43+ ; 11.2 ; Mt 3.2n. – Une parole comparable est connue d''Origène (la première partie se trouve aussi chez Clément d''Alexandrie) : « Demandez les grandes choses, et les petites vous seront ajoutées ; demandez les choses célestes, et les choses terrestres vous seront ajoutées. »'
  - type: text
    content: 'Cherchez plutôt son règne, et cela vous sera donné par surcroît. '
  '32':
  - type: note
    content: 'N''aie pas peur 1.13+ ; Es 41.10+ ; voir crainte. –  petit troupeau  : cf. 10.3 ; voir aussi 15.4ss ; Es 40.11 ; 49.9s ; Jr 31.10 ; 50.19 ; Ez 34 ; Mi 2.12s ; 4.6s ; 7.14 ; Ps 95.7 ; Jn 10.1ss,27 ; 21.15ss ; Ac 20.28s ; 1P 5.2s. –  il a plu à… 1Co 1.21 ; Ga 1.15 ; Col 1.19. –  donner le Royaume (v. 31n) : cf. 22.29s ; Dn 7.13s,18,27.'
  - type: text
    content: N'aie pas peur, petit troupeau ; car il a plu à votre Père de vous donner le Royaume.
  - type: heading
    content: Un trésor dans les cieux
  - type: heading
    content: Mt 6.19-21
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21 ; 18.22/ /. –  donnez-les par des actes de compassion 11.41 ; Mt 6.2n. –  qui ne s''usent pas  : litt. qui ne vieillissent pas . –  trésor… dans les cieux  : cf. 16.9 ; Mt 6.19ns ; Col 3.2. –  ronge ou détruit  ; le même verbe a ailleurs le sens de ruiner, pourrir, faire périr , cf. 1Co 9.25+.'
  - type: text
    content: 'Vendez vos biens et donnez-les par des actes de compassion. Faites-vous des bourses qui ne s''usent pas, un trésor inépuisable dans les cieux, là où aucun voleur n''approche et où aucune mite ne ronge. '
  '34':
  - type: note
    content: cœur 1.66n.
  - type: text
    content: Car là où est votre trésor, là aussi sera votre cœur.
  - type: heading
    content: Paraboles sur la vigilance
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Tenez-vous prêts…  : litt. que vos reins soient ceints et vos lampes allumées  ; sur l''image de la ceinture qui tient repliés les pans du vêtement, rendant possible le travail du serviteur, le combat du guerrier ou la marche du voyageur, cf. v. 37n  ; 17.8 ; Ex 12.11  ; 1R 18.46 ; 2R 4.29 ; 9.1 ; Jr 1.17 ; Jb 38.3 ; 40.7 ; Pr 31.17 ; Ep 6.14 ; 1P 1.13n  ; Règlement de la Guerre (Qumrân) 15.14 : « Tous les Vaillants des dieux se ceignent pour le combat. » Sur les lampes allumées , cf. Lc 8.16 ; 11.33 ; voir aussi Ex 27.20 ; Lv 24.2 ; Mt 25.1ss ; Didachè 16.1 : « Veillez sur votre vie ; que vos lampes ne soient pas éteintes et que vos reins ne soient pas déliés, mais soyez prêts ; car vous ignorez l''heure où notre Seigneur viendra. »'
  - type: text
    content: 'Tenez-vous prêts, '
  - type: text
    content: la ceinture aux reins
  - type: text
    content: ' et les lampes allumées. '
  '36':
  - type: note
    content: 'Mt 25.1ss. –  leur maître ou leur seigneur, même possibilité dans la suite. –  noces ou fête (aussi 14.8) : le même terme grec traduit le mot correspondant à banquet en Est 2.18 ; 9.22 (LXX) ; cf. Mt 25.6. –  frappera  : cf. Ap 3.20.'
  - type: text
    content: 'Vous aussi, soyez semblables à ces hommes qui attendent que leur maître revienne des noces, afin de lui ouvrir sitôt qu''il arrivera et frappera. '
  '37':
  - type: note
    content: 'Heureux (6.20+)… v. 43 ; cf. Ap 16.15 ; 19.9 ; voir aussi 1Co 16.13. –  Amen… 4.24+ ; cf. Mt 5.18n. –  il se mettra…  : litt. il se ceindra, cf. v. 35n  ; de même 17.8 ; verbe apparenté Jn 13.4ss. –  les installera à table…  : comparer avec v. 7 ; cf. 13.29 ; 22.27ss ; verbe apparenté en 7.36n. –  viendra…  : autre traduction passera (de l''un à l''autre) pour les servir.'
  - type: text
    content: 'Heureux ces esclaves que le maître, à son arrivée, trouvera en train de veiller ! '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il se mettra à son tour en tenue de travail, il les installera à table et il viendra les servir. '
  '38':
  - type: note
    content: 'à la deuxième ou à la troisième veille  : il faut probablement comprendre autour de minuit ou juste avant l''aube  ; cf. 2.8n  ; Mc 13.35s. –  heureux sont-ils ! Certains mss portent heureux ces esclaves, comme au v. 37+.'
  - type: text
    content: Qu'il arrive à la deuxième ou à la troisième veille, s'il les trouve ainsi, heureux sont-ils !
  - type: heading
    content: Mt 24.43-51
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction  : si le maître de maison avait su à quelle heure le voleur devait venir, il n''aurait pas laissé…  ; certains mss portent il veillerait et ne laisserait pas…  ; cf. 1Th 5.2ss ; 2P 3.10 ; Ap 3.3 ; 16.15. –  fracturer  : voir Mt 6.19n. –  Evangile selon Thomas 21 (à la suite d''une sentence passablement obscure) : « Si le maître de maison sait que le voleur va venir, il veillera avant qu''il n''arrive, et il ne permettra pas qu''il entre par la force dans la maison royale et qu''il en emporte les biens. Quant à vous, soyez vigilants en face du monde, ceignez vos reins avec grande force, de peur que les voleurs ne trouvent un passage pour arriver jusqu''à vous ; car le profit que vous attendez, ils le trouveront… » (sur la suite, voir Mc 4.29n) ; 103 : « Jésus a dit : “Heureux l''homme qui sait en quelle partie de la nuit les voleurs viendront, de telle manière qu''il se lèvera, il inspectera son domaine et se ceindra les reins avant qu''ils n''entrent.” »'
  - type: text
    content: 'Sachez-le bien, si le maître de maison savait à quelle heure le voleur doit venir, il ne laisserait pas fracturer sa maison. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'mes amis Jn 15.13ss ; cf. Ac 27.3 ; 3Jn 15. –  ne craignez pas ou n''ayez pas peur (de) , même formule v. 7. Cf. 2 Clément 5.2ss : « Le Seigneur dit : “Vous serez comme des agneaux au milieu des loups.” Pierre lui répondit : “Les loups ne vont-ils pas mettre les agneaux en pièces (ou : disperser les agneaux) ?” Jésus dit à Pierre : “Une fois qu''ils sont morts, les agneaux n''ont plus peur des loups. Vous, de même, ne craignez pas ceux qui, quand ils vous ont tués, ne peuvent plus rien vous faire, mais craignez celui qui, après votre mort, a l''autorité pour jeter âme et corps dans la géhenne de feu.” »'
  - type: text
    content: 'Je vous le dis, à vous, mes amis : ne craignez pas ceux qui tuent le corps et qui, après cela, ne peuvent rien faire de plus. '
  '40':
  - type: note
    content: V. 39,46 ; 17.26ss ; 21.34s ; Mc 13.34ss ; 2P 3.4ss,9s. –  Fils de l'homme 5.24+.
  - type: text
    content: Vous aussi, soyez prêts, car le Fils de l'homme viendra à l'heure que vous ne pensez pas.
  '41':
  - type: text
    content: ' '
  - type: note
    content: Pierre 5.8+ ; 8.45+. –  à nous… v. 47s ; cf. v. 1,13,22,54 ; comparer avec 11.45. –  parabole 5.36+.
  - type: text
    content: 'Pierre lui dit : Seigneur, est-ce à nous que tu adresses cette parabole, ou aussi à tous ? '
  '42':
  - type: note
    content: 'Le Seigneur 7.13+. –  intendant 16.1,8,10ss ; 1Co 4.1ss. –  digne de confiance ou fidèle, cf. v. 46n. –  le maître ou le Seigneur. –  en temps voulu  : expression presque identique en 20.10 (le moment venu).'
  - type: text
    content: 'Le Seigneur dit : Quel est donc l''intendant avisé et digne de confiance que le maître nommera responsable de ses gens, pour leur donner leur ration de blé en temps voulu ? '
  '43':
  - type: note
    content: V. 37+.
  - type: text
    content: 'Heureux cet esclave, celui que son maître, à son arrivée, trouvera occupé de la sorte ! '
  '44':
  - type: note
    content: 'En vérité 9.27n. –  il le nommera responsable de  : litt. il l''établira sur, Mt 25.21ss.'
  - type: text
    content: 'En vérité, je vous le dis, il le nommera responsable de tous ses biens. '
  '45':
  - type: note
    content: 'se dit  : litt. se dit en son cœur  ; cf. v. 17+. –  tarde Mt 25.5. –  manger / boire / s''enivrer  : cf. Ct 5.1 (mêmes verbes dans LXX).'
  - type: text
    content: 'Mais si cet esclave se dit : « Mon maître tarde à venir », qu''il se mette à battre les serviteurs et les servantes, à manger, à boire et à s''enivrer, '
  '46':
  - type: note
    content: 'le jour  : cf. Jl 3.4. –  mettra en pièces  : voir Mt 24.51n. –  infidèles  : terme opposé à celui qui a été traduit par digne de confiance au v. 42 ; il a aussi été rendu par sans foi (9.41).'
  - type: text
    content: le maître de cet esclave viendra le jour où il ne s'y attend pas et à l'heure qu'il ne connaît pas, il le mettra en pièces et lui fera partager le sort des infidèles.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 41 ; Jc 4.17. –  connu la volonté Ac 22.14 ; Rm 2.18 ; 2P 2.21 ; cf. Nb 15.27ss. –  ni fait  : autre traduction possible ou qui aura agi contre cette volonté…  ; ou, d''après un ms, qui se sera préparé à agir contre…'
  - type: text
    content: 'L''esclave qui aura connu la volonté de son maître, mais qui n''aura rien préparé ni fait en vue de cette volonté sera battu d''un grand nombre de coups. '
  '48':
  - type: note
    content: 'qui méritent un châtiment  : litt. dignes de coups. –  demandé  : même verbe traduit par chercher en 13.6s.'
  - type: text
    content: En revanche, celui qui ne l'aura pas connue et aura fait des choses qui méritent un châtiment ne sera battu que de peu de coups. A quiconque il a été beaucoup donné, il sera beaucoup demandé ; de celui à qui on a beaucoup confié, on exigera davantage.
  - type: heading
    content: Jésus, cause de division
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis venu…  : cf. 4.34 ; 5.32 ; 7.34 ; 9.58 ; Jn 3.2. –  mettre (litt. jeter ) un feu…  : cf. 3.9,16 ; 9.54 ; 17.29 ; Gn 19.24 ; Ex 9.24 ; Lv 13.52 ; Nb 31.23 ; Es 33.14 ; 66.15s ; Jr 23.29 ; Ez 38.22 ; 39.6 ; Ml 3.19 ; Ps 66.12 ; Ac 2.3,19 ; 2P 3.7. –  comme je voudrais…  : autre traduction qu''ai-je à désirer s''il est déjà allumé ? –  Evangile selon Thomas 10 : « Jésus a dit : “J''ai jeté un feu sur le monde, et voici, je le garde, jusqu''à ce que le monde brûle.” » 82 : « Jésus a dit : “Celui qui est près de moi est près du feu, et celui qui est loin de moi est loin du Royaume” » (sentence également citée par Origène et Didyme d''Alexandrie, mort vers 398 apr. J.-C.).'
  - type: text
    content: 'Je suis venu mettre un feu sur la terre ; comme je voudrais qu''il soit déjà allumé ! '
  '5':
  - type: note
    content: 'Je vais vous montrer 6.47. –  craindre (Dieu) : cf. 1.50 ; 18.2,4 ; 23.40 ; Ac 9.31 ; 10.2,22,35 ; Rm 11.20 ; 2Co 7.1 ; Ph 2.12 ; 1P 1.17 ; 2.17 ; Ap 14.7 ; voir aussi Ps 119.120 ; Pr 1.7 ; Hé 10.31. –  après avoir tué  : cf. Ap 2.11+. –  la géhenne Mt 5.22n.'
  - type: text
    content: 'Je vais vous montrer qui vous devez craindre. Craignez celui qui, après avoir tué, a l''autorité pour jeter dans la géhenne ; oui, je vous le dis, c''est lui que vous devez craindre. '
  '50':
  - type: note
    content: 'un baptême…  : cf. 3.16,21 ; Mc 10.38s. –  comme cela me pèse ou comme cela m''angoisse (le même verbe est traduit par serrer en 8.45 ; presser en 19.43) ; cf. 22.15. –  accompli  : cf. 18.31.'
  - type: text
    content: J'ai un baptême à recevoir ; comme cela me pèse d'ici qu'il soit accompli !
  - type: heading
    content: Mt 10.34-36
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'donner  : autre traduction mettre . –  paix  : cf. 1.79 ; 2.14 ; voir aussi Jr 6.14 ; 8.11 ; Ez 13.10,16 ; Mi 3.5. Evangile selon Thomas 16 : « Jésus a dit : “Peut-être les hommes pensent-ils que je suis venu jeter la paix sur le monde ; ils ne savent pas que je suis venu jeter les divisions sur la terre : feu, épée et guerre. Car il y en aura cinq dans une maison : trois contre deux et deux contre trois, le père contre le fils et le fils contre le père ; et ils se tiendront debout, en étant un seul.” »'
  - type: text
    content: 'Pensez-vous que je sois venu donner la paix sur la terre ? Non, je vous le dis, mais plutôt la division. '
  '52':
  - type: note
    content: désormais 1.48+.
  - type: text
    content: 'Car désormais cinq dans une maison seront divisés, trois contre deux et deux contre trois ; '
  '53':
  - type: note
    content: 21.16/ / ; Mi 7.6  ; Ag 2.22 ; Za 13.3.
  - type: text
    content: 'père contre fils et '
  - type: text
    content: fils
  - type: text
    content: ' contre '
  - type: text
    content: père,
  - type: text
    content: ' mère contre fille et '
  - type: text
    content: fille contre mère,
  - type: text
    content: ' belle-mère contre belle-fille et '
  - type: text
    content: belle-fille contre belle-mère
  - type: text
    content: .
  - type: heading
    content: Comprendre le sens des temps
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 16.2s. –  aux foules v. 1,13. –  un nuage  : cf. 1R 18.44.'
  - type: text
    content: 'Il disait encore aux foules : Quand vous voyez un nuage se lever à l''ouest, vous dites aussitôt : « La pluie vient. » Et cela arrive. '
  '55':
  - type: note
    content: 'vent du sud Jr 4.11. –  Il va faire chaud  : cf. Jc 1.11n.'
  - type: text
    content: 'Et quand c''est le vent du sud qui souffle, vous dites : « Il va faire chaud. » Et cela arrive. '
  '56':
  - type: note
    content: 'Hypocrites v. 1 ; 6.42+. –  ne pas savoir apprécier  : certains mss portent ne pas apprécier (sur le verbe correspondant, voir 14.19n). –  ce temps-ci  : sur le terme grec correspondant, cf. 1.20+ ; voir aussi 7.22 ; 11.20,29. Evangile selon Thomas 91 : « Ils lui dirent : “Dis-nous qui tu es, pour que nous croyions en toi.” Il leur répondit : “Vous éprouvez la face du ciel et de la terre, mais vous n''avez pas reconnu celui qui est devant vous et vous ne savez pas éprouver le moment présent.” »'
  - type: text
    content: Hypocrites, vous savez apprécier l'aspect de la terre et du ciel ; comment pouvez-vous ne pas savoir apprécier ce temps-ci ?
  - type: heading
    content: S'arranger avec son adversaire
  - type: heading
    content: Mt 5.25-26
  '57':
  - type: text
    content: ' '
  - type: note
    content: 'ne jugez-vous pas par vous-mêmes…  : cf. 21.30 ; Ac 4.19 ; voir aussi 1Co 6.5. – Voir juste.'
  - type: text
    content: 'Et pourquoi ne jugez-vous pas par vous-mêmes de ce qui est juste ? '
  '58':
  - type: text
    content: 'Lorsque tu vas avec ton adversaire devant un chef, tâche en chemin de te dégager de lui, de peur qu''il ne te traîne devant le juge, que le juge ne te livre à l''huissier, et que l''huissier ne te fasse mettre en prison. '
  '59':
  - type: note
    content: lepte (cf. 21.2n), pièce de monnaie valant la moitié du quadrant (Mt 5.26n) ; cf. Mc 12.42n  ; voir mesures, poids et monnaies.
  - type: text
    content: Je te le dis, tu n'en sortiras pas que tu n'aies payé jusqu'au dernier lepte.
  '6':
  - type: note
    content: 'deux as  : cf. Mt 10.29n. –  oublié  : cf. Es 49.15 ; Ac 10.31.'
  - type: text
    content: 'Ne vend-on pas cinq moineaux pour deux as ? Cependant, pas un seul d''entre eux n''est oublié devant Dieu. '
  '7':
  - type: note
    content: 'les cheveux  : cf. 21.18 ; Ac 27.34 ; voir aussi 1S 14.45 ; 2S 14.11 ; 1R 1.52. –  vous valez plus… v. 24.'
  - type: text
    content: Même les cheveux de votre tête sont tous comptés. N'ayez donc pas peur ; vous valez plus que beaucoup de moineaux.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'se reconnaît en moi  : cf. Mt 10.32n. –  Fils de l''homme 5.24+. –  se reconnaîtra aussi…  : cf. Ap 3.5. –  devant les anges de Dieu 2.13 ; 9.26 ; 15.10 ; Ac 10.3 ; cf. Jn 1.51 ; Ga 4.14 ; Hé 1.6.'
  - type: text
    content: 'Je vous le dis, quiconque se reconnaît en moi devant les gens, le Fils de l''homme se reconnaîtra aussi en lui devant les anges de Dieu ; '
  '9':
  - type: note
    content: 9.26. –  renié traduit ici deux verbes grecs apparentés ; le premier figure également en 8.45n  ; 9.23 ; 22.57 ; Ac 3.12ss ; 7.35 ; le second en Lc 22.34,61.
  - type: text
    content: mais celui qui m'aura renié devant les gens sera renié devant les anges de Dieu.
