        - type: text
          text: aux v. 20-23 et qui peut désigner la personne elle-même, voir 1.46 ; 6.9 ; 9.24 ; 14.26 ; 17.33 ; 21.19 ; Mt 10.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; sur le terme hébreu correspondant dans l''A.T., voir Gn 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ec 6.2s où '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' emploie le terme correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en un sens analogue à celui qui apparaît ici. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mange, bois… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ec 8.15 ; 1Co 15.32 ; cf. Jc 4.13s. –  '
      - type: usfm
        marker: fq
        children:
