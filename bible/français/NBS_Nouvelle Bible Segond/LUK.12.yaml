        - type: text
          text: Ps 39.7.
      marker-yv: yv-n
    - type: text
      text: 'Mais Dieu lui dit : Homme déraisonnable, cette nuit même ta vie te sera redemandée ! Et ce que tu as préparé, à qui cela ira-t-il ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
