        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exécuteur testamentaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(chargé de partager les biens). – Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Thomas
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '72 : « Un homme lui dit : “Dis à mes frères de partager avec moi les biens de mon père.” Il lui répondit : “O homme, qui a fait de moi un partageur ?” Il se tourna vers les disciples et leur dit : “Suis-je donc un partageur ?” »'
      marker-yv: yv-n
    - type: text
      text: 'Il lui répondit : Qui a fait de moi votre juge ou votre arbitre ? '
