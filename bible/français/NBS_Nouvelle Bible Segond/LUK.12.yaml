      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ses biens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.3 ; Ac 4.32.
      marker-yv: yv-n
    - type: text
      text: 'Puis il leur dit : Veillez à vous garder de toute avidité ; car même dans l''abondance, la vie d''un homme ne dépend pas de ses biens.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parabole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.36+ ; 6.39 ; 10.30. Cf. Jr 17.11 ; Ps 49.7-13 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.18s : « Tel est riche à force d''attention et d''économie, mais voici quel sera son salaire : Quand il se dit : “J''ai trouvé le repos, maintenant je vais manger de mes propres biens”, il ne sait pas combien de temps s''écoulera, puis il laissera ses biens à d''autres et il mourra. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '97.8ss : « Malheur à vous qui acquérez de l''or et de l''argent au détriment de la justice et qui dites : “Nous nous sommes enrichis, nous avons acquis et nous possédons des biens, nous possédons tout ce que nous voulons. Maintenant faisons tout ce que nous voulons, puisque nous avons amassé de l''argent dans nos trésors, et dans nos maisons toute une fortune (qui) se déverse comme l''eau.” Vous vous égarez, car, à coup sûr, votre richesse ne subsistera pas. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon Thomas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '63 : « Jésus a dit : “Il y avait un homme riche, qui possédait beaucoup d''argent. Il dit : ‘J''utiliserai mon argent pour semer, moissonner, planter et remplir mes magasins de fruits, de façon à ce que je ne manque de rien.’ Voilà ce qu''il pensait dans son cœur ; et cette même nuit il mourut. Celui qui a des oreilles, qu''il entende !” »'
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit une parabole : La terre d''un homme riche avait beaucoup rapporté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il raisonnait… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.21-22+ ; cf. v. 45 ; 15.17ss ; 16.3s ; 18.4s ; 20.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes récoltes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mes fruits.
      marker-yv: yv-n
    - type: text
      text: 'Il raisonnait, se disant : Que vais-je faire ? car je n''ai pas assez de place pour recueillir mes récoltes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Voici, dit-il, ce que je vais faire : je vais démolir mes granges, j''en construirai de plus grandes, j''y recueillerai tout mon blé et mes biens, '
