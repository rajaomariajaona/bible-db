      marker-yv: yv-n
    - type: text
      text: 'Il dit ensuite à ses disciples : C''est pourquoi je vous dis : Ne vous inquiétez pas, pour votre vie, de ce que vous mangerez ni, pour votre corps, de ce dont vous serez vêtus. '
