document_id: JAS.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Le Nouveau Testament présente au moins  '
  - type: text
    content: quatre Jacques
  - type: text
    content: '  différents : Jacques l''apôtre, fils de Zébédée (Mc 1.19) ; Jacques, fils d''Alphée (Mc 3.18), parfois identifié avec Jacques le Mineur (Mc 15.40) ; Jacques, frère de Jésus (Mc 6.3) ; Jacques, le père de l''apôtre Judas (ou Jude, Lc 6.16 ; Ac 1.13).'
  - type: text
    content: 'Seuls deux d''entre eux peuvent entrer en considération pour l''attribution de l''épître dite de Jacques : le fils de Zébédée et le frère de Jésus. Si le premier a été très tôt mis à mort par Hérode (Ac 12.2), le dernier pourrait bien être le  '
  - type: text
    content: Jacques, serviteur de Dieu et du Seigneur Jésus-Christ
  - type: text
    content: '  de notre épître (1.1). Telle était déjà l''opinion reçue dans l''Eglise ancienne. L''historien Eusèbe de Césarée (265-340) la rapporte sans y souscrire en parlant de Jacques, le frère du Seigneur, « de qui est, dit-on, la première des épîtres appelées catholiques » ('
  - type: text
    content: Histoire ecclésiastique
  - type: text
    content: ', II, XXIII, 24).'
  - type: text
    content: 'Ce Jacques nous est présenté par ailleurs comme une  '
  - type: text
    content: figure marquante
  - type: text
    content: '  de l''Eglise ancienne. Paul le cite parmi les premiers témoins du Christ ressuscité (1Co 15.7).'
  - type: text
    content: Vers 37 déjà, Paul, montant à Jérusalem pour la première fois après sa conversion, juge opportun de rendre visite à Jacques, l'une des « colonnes » de l'Eglise (Ga 1.19 ; 2.9). Dans le livre des Actes, Jacques est à la tête de l'Eglise de Jérusalem (Ac 12.17 ; 15.13 ; 21.18). Suivant la tradition, les Juifs non chrétiens le tenaient en haute estime et l'avaient surnommé « le Juste ». Certains textes du Nouveau Testament rappellent cependant que les « frères du Seigneur », dont Jacques faisait partie (Ga 1.19 ; cf. Ac 1.14 ; 1Co 9.5), ne comptaient pas parmi les disciples de Jésus de son vivant (Jn 7.5 ; cf. Mc 3.31ss/ /).
  - type: text
    content: 'Jacques s''adresse  '
  - type: text
    content: 'aux  '
  - type: text
    content: douze tribus dans la dispersion
  - type: text
    content: ' (1.1'
  - type: text
    content: n
  - type: text
    content: ') : il ne s''agit vraisemblablement pas des Juifs de la  '
  - type: text
    content: diaspora
  - type: text
    content: '  en général, puisque les destinataires ont  '
  - type: text
    content: 'la foi de notre Seigneur glorieux, Jésus-Christ  '
  - type: text
    content: '(2.1). Mais il reste difficile de savoir si ces  '
  - type: text
    content: 'douze tribus  '
  - type: text
    content: 'sont en particulier les chrétiens d''origine juive, ou bien l''ensemble de la communauté chrétienne, comprise comme  '
  - type: text
    content: 'l''Israël de Dieu  '
  - type: text
    content: (Ga 6.16
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: Fait surprenant à première vue, cette épître, la plus juive peut-être du Nouveau Testament, s'exprime dans un grec des plus purs.
  - type: text
    content: L'épître de Jacques et l'enseignement de Jésus
  - type: text
    content: De très nombreux rapprochements peuvent être établis entre l'enseignement de l'épître de Jacques et celui de Jésus, surtout dans le « Sermon sur la montagne » tel que le présente Matthieu, bien que nulle part l'auteur ne cite formellement les paroles de Jésus (voir « Jacques et le “Sermon sur la montagne” », p.${Xjacqserm). Comme les discours de Jésus dans les synoptiques, l'épître de Jacques contient beaucoup d'
  - type: text
    content: images
  - type: text
    content: '  tirées de la nature, plus que toutes les épîtres de Paul réunies.'
  - type: text
    content: Procédés littéraires
  - type: text
    content: 'Certains éléments de l''épître de Jacques, surtout dans le texte central 2.1–3.12, ressortissent au genre littéraire de la  '
  - type: text
    content: diatribe
  - type: text
    content: '  grecque, forme populaire de prédication morale pratiquée par les philosophes dès le II'
  - type: text
    content: e
  - type: text
    content: '  siècle av. J.-C. Comme dans la diatribe grecque, on trouve dans l''épître des dialogues interrompus, des questions et des réponses brèves (2.18 et 5.13s), ainsi que de nombreuses personnifications (1.5 ; 2.13 ; 3.5 ; 4.1 ; 5.3s).'
  - type: text
    content: 'Mais l''épître présente aussi de nombreux points communs avec les textes de sagesse issus du  '
  - type: text
    content: judaïsme hellénistique
  - type: text
    content: '  (notamment le  '
  - type: text
    content: Siracide
  - type: text
    content: '*) et les écrits retrouvés à  '
  - type: text
    content: Qumrân
  - type: text
    content: '*. Parmi les traits qui la rattachent, plus généralement, aux sermons juifs traditionnels, on peut relever les suivants :'
  - type: text
    content: –citation ou formulation nouvelle de préceptes ancestraux, recours à l'exemple des personnages de l'histoire biblique (Abraham, Rahab, Jacob, Elie, Job) ;
  - type: text
    content: '–reprise du même thème en divers endroits (la douceur : 1.21 et 3.13ss ; l''endurance dans la souffrance : 1.2-4,12 et 5.7ss ; les riches : 1.9ss ; 2.1ss ; 5.1ss ; la prière : 1.5-8 ; 5.16ss) ;'
  - type: text
    content: '–usage de mots-crochets (un même terme à la fin d''un paragraphe et au début du suivant) pour relier les idées (ainsi  '
  - type: text
    content: manquer
  - type: text
    content: '  en 1.4s ;  '
  - type: text
    content: épreuve / éprouver
  - type: text
    content: '  en 1.12s ;  '
  - type: text
    content: religion
  - type: text
    content: '  1.26s ; voir aussi  '
  - type: text
    content: juger / jugement
  - type: text
    content: '  en 2.12s).'
  - type: text
    content: La foi et les œuvres, les riches et les pauvres
  - type: text
    content: 'Une apparente contradiction exerce depuis longtemps la sagacité des commentateurs : celle de notre épître (2.14-26) et des affirmations de Paul sur  '
  - type: text
    content: 'la foi et les œuvres  '
  - type: text
    content: '(cf. Rm 3.28 ; 4.2ss, etc.), qui ne semble pas vraiment correspondre au conflit suggéré en Galates 1 et 2 (cf. Ac 15). Si certains ont achoppé sur cette tension (ainsi Luther qui s''étonnait qu''on admît Jacques, « l''épître de paille », dans le Nouveau Testament), d''autres ont tenté de la résoudre en faisant valoir que Paul parle d''œuvres de la loi juive et de foi chrétienne, alors que Jacques opposerait une foi purement cérébrale à des œuvres authentiquement chrétiennes, nées d''une foi vivante. Toujours est-il qu''en christianisme comme en judaïsme la foi – surtout comprise au sens de « croyance » – n''est pas à l''abri de devenir un vain mot, une abstraction incapable de sauver, concrètement, de quoi que ce soit (1.22ss ; 2.14ss). Or l''épître de Jacques ne craint pas de s''en prendre de front à la « foi » que les chrétiens sacralisent –  '
  - type: text
    content: 'les démons croient aussi ! '
  - type: text
    content: (2.19) – quand celle-ci n'inspire plus que des discours au lieu de changer les comportements, quand elle fait de l'Eglise, non plus une communauté où l'on vit différemment, mais une chapelle où le statut de maître est la dignité suprême et devient l'enjeu de luttes pour le pouvoir (3.1ss ; 4.1ss).
  - type: text
    content: 'En particulier, l''épître de Jacques débusque les hypocrisies d''un christianisme qui, tout en se proclamant différent du « monde » (cf. 1.27 ; 4.4), en adopte sans discrimination les convenances sociales. Ce qui peut expliquer ses paroles très dures au sujet des  '
  - type: text
    content: riches
  - type: text
    content: ', qu''il se garde d''appeler directement  '
  - type: text
    content: frères
  - type: text
    content: '. Quand ces riches, qui ne semblaient guère s''intéresser dans un premier temps aux communautés chrétiennes, se mettent à y affluer(comparer 1Co 1.26ss et 1Tm 6.17ss), ils sont enclins à y importer subrepticement leur façon de voir et de faire le monde (cf. Jc 4.1ss,13ss ; 5.1ss). On comprend, dès lors, que l''auteur proteste contre une adhésion à la « foi » qu''il juge trop légère. Pour lui, la vraie foi signifie une conversion de la pensée et de la pratique. Ce qui, dans le cas des riches, suppose un abaissement dont ils ne sauraient faire l''économie (1.9s). Il n''y a aucune raison (l''auteur, semble-t-il, n''hésiterait pas à dire : au contraire !) pour que les riches qui entrent dans une assemblée chrétienne y soient accueillis d''emblée avec plus d''honneur que des pauvres (2.1ss).'
  - type: text
    content: 'Pour l''épître de Jacques, ce n''est pas une foi trop aisément dissociable de la réalité, mais bien la  '
  - type: text
    content: compassion
  - type: text
    content: '  qui sauve du jugement (2.13). Compassion qui n''est pas la « charité » trop bien ordonnée des riches, mais un engagement décisif et sans retour auprès du prochain, notamment des plus démunis (1.27 ; sur le sens du mot traduit par  '
  - type: text
    content: compassion
  - type: text
    content: ', voir Lc 10.30ss). Cette compassion présuppose, certes, une foi réelle, mais elle ne peut être une simple profession de foi (2.14ss). Elle situe en effet l''existence chrétienne non pas dans une sphère « spirituelle » qui risque toujours de devenir imaginaire, mais dans l''existence tout court, lieu des épreuves qu''il convient d''affronter sans aucun pieux fatalisme (1.12ss).'
  - type: text
    content: 'Quand on suit la logique propre de l''épître de Jacques, on s''aperçoit vite que, malgré des formules à première vue opposées, elle n''est pas très loin de Paul sur le fond : témoin les remarques de ce dernier touchant le Repas du Seigneur, qui n''a aucun sens hors d''une solidarité concrète entre les participants (1Co 11.17ss).'
  - type: text
    content: Autres lignes de force
  - type: text
    content: On ne s'étonnera pas, dès lors, de l'importance que l'épître de Jacques attache à
  - type: text
    content: '  la vie communautaire'
  - type: text
    content: ', importance qui se reflète dans la fréquence inhabituelle d''expressions telles que  '
  - type: text
    content: parmi vous
  - type: text
    content: '  (4.1 ; 5.13s,19),  '
  - type: text
    content: les uns les autres
  - type: text
    content: '  (4.11 ; 5.16),  '
  - type: text
    content: frères
  - type: text
    content: '  (18 fois). L''auteur insiste sur l''importance du lien de la parole : que le oui soit oui sans nécessité de serment ; que chacun s''abstienne de médire de son prochain ; qu''il ait le courage de reprendre son frère et de le sauver ainsi d''une voie mortelle (5.20) ; que tous prient les uns pour les autres, et en particulier les anciens pour la guérison des malades.'
  - type: text
    content: 'Plus surprenante, peut-être, et pourtant profondément liée à la volonté et à la puissance de transformation que l''épître ne veut en aucun cas voir perdre à la foi chrétienne, est l''insistance sur la  '
  - type: text
    content: fin des temps
  - type: text
    content: '  : c''est dans l''attente de l''avènement du Seigneur (5.7s) et du jour du jugement (2.12s ; 4.12 ; 5.9) que doit s''exercer l''endurance active du chrétien (1.2-4,12 ; 5.10s). Celui-ci est appelé à supporter patiemment les épreuves (1.2-4,12) et les souffrances (5.10s) jusqu''à l''avènement du Seigneur. Le juge est à la porte (5.9) : qu''on se montre donc vigilant et généreux (2.12s). Celui qui aura persévéré jusqu''à la fin dans l''amour du Seigneur  '
  - type: text
    content: recevra la couronne de la vie
  - type: text
    content: '  (1.12).'
  - type: text
    content: 'Cette lettre rude, dérangeante à bien des égards, mérite certainement d''être encore reçue avec toute l''attention dont elle juge elle-même digne l''ensemble de l''héritage chrétien, compris comme  '
  - type: text
    content: 'loi de la liberté : non pas en écoutant pour oublier, mais en mettant en pratique, – en faisant œuvre  '
  - type: text
    content: (1.25)
  - type: text
    content: .
