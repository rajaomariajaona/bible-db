verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un ciel nouveau et une terre nouvelle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ciel nouveau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: terre nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 5 ; Es 65.17 ; 66.22 ; 2P 3.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'premier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 4 ; cf. 1.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avaient disparu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.13 ; cf. Gn 1.2,6-10 ; Es 21.1 ; 50.2+ ; Jb 7.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Sur l''ensemble, voir aussi Mt 19.28 ; Mc 13.24,31 ; 2Co 5.17 ; Col 3.10 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '45.4s : « Ce jour-là, Je ferai habiter Mon Elu parmi eux, Je transformerai le ciel, et J''en ferai une bénédiction, une lumière éternelles. Je transformerai l''aride, J''en ferai une bénédiction et J''y ferai habiter Mes élus. » 91.16 : « Les premiers cieux passeront ; alors, des cieux neufs apparaîtront, toutes les puissances des cieux brillant et resplendissant au septuple. »'
      marker-yv: yv-n
    - type: text
      text: 'Alors je vis un ciel nouveau et une terre nouvelle ; car le premier ciel et la première terre avaient disparu, et la mer n''était plus. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il me transporta, par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.3 ; cf. 1.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: montagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 40.1s ; Mt 4.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ville '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2+.
      marker-yv: yv-n
    - type: text
      text: 'Il me transporta, par l''Esprit, sur une grande et haute montagne, et il me montra la ville sainte, Jérusalem, qui descendait du ciel, d''auprès de Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' de Dieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 23 ; 15.8 ; Es 58.8 ; 60.1s,19 ; Ez 43.2ss.'
      marker-yv: yv-n
    - type: text
      text: 'Elle avait la gloire de Dieu ; son éclat ressemblait à celui d''une pierre précieuse, une pierre de jaspe transparente comme du cristal. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: muraille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 40.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'douze portes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 14 ; 22.14 ; Ez 48.30ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: '… inscrits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.5+ ; Lc 10.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'douze tribus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.4ss ; cf. Ex 28.21 ; 39.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israélites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 1.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle avait une grande et haute muraille. Elle avait douze portes, et sur les portes douze anges. Des noms y étaient inscrits, ceux des douze tribus des Israélites : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lc 13.29.
      marker-yv: yv-n
    - type: text
      text: 'à l''est trois portes, au nord trois portes, au sud trois portes et à l''ouest trois portes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fondations / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: apôtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ep 2.20 ; voir aussi Hé 11.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: elles portaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur elles.
      marker-yv: yv-n
    - type: text
      text: La muraille de la ville avait douze fondations ; elles portaient les douze noms des douze apôtres de l'agneau.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.1+.
      marker-yv: yv-n
    - type: text
      text: 'Celui qui parlait avec moi avait une mesure, un roseau d''or, pour mesurer la ville, ses portes et sa muraille. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'carré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 43.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il mesura '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 48.16ss ; Za 2.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'douze mille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 7.5ss) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: stades
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 2 000 km ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hauteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on peut l''imaginer comme un cube ou comme une pyramide.'
      marker-yv: yv-n
    - type: text
      text: 'La ville avait la forme d''un carré, sa longueur était égale à sa largeur. Il mesura la ville avec le roseau : douze mille stades ; la longueur, la largeur et la hauteur en étaient égales. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cent quarante-quatre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 7.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 70 m. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'une mesure humaine…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mesure d'humain, qui est d'ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 13.18 ; Dt 3.11 ; voir aussi Ap 19.10+.'
      marker-yv: yv-n
    - type: text
      text: 'Il mesura la muraille : cent quarante-quatre coudées, d''une mesure humaine qui était celle de l''ange. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 11.
      marker-yv: yv-n
    - type: text
      text: 'La muraille était construite en jaspe, et la ville était d''or pur, semblable à du verre pur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 14+ ; Es 54.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s ; les v. 19s énumèrent 12 variétés de pierres fines ou précieuses, dont l'identification est parfois incertaine ; cf. Ex 24.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 28.17-20 ; Ez 28.13s.'
      marker-yv: yv-n
    - type: text
      text: 'Les fondations de la muraille de la ville étaient ornées de toutes sortes de pierres précieuses : la première fondation était de jaspe, la deuxième de saphir, la troisième de calcédoine, la quatrième d''émeraude, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la ville '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.2+ ; Es 52.1 ; Né 11.1,18 ; Mt 4.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jérusalem nouvelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prête comme une mariée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.7+,8.
      marker-yv: yv-n
    - type: text
      text: 'Et je vis descendre du ciel, d''auprès de Dieu, la ville sainte, la Jérusalem nouvelle, prête comme une mariée qui s''est parée pour son mari. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'la cinquième de sardonyx, la sixième de sardoine, la septième de chrysolithe, la huitième de béryl, la neuvième de topaze, la dixième de chrysoprase, la onzième d''hyacinthe, la douzième d''améthyste. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grande rue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22.2 ; cf. 11.8.
      marker-yv: yv-n
    - type: text
      text: Les douze portes étaient douze perles ; chacune des portes était d'une seule perle. La grande rue de la ville était d'or pur, comme du verre transparent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sanctuaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.15+ ; cf. 21.3 ; 22.3 ; Jn 2.19-21 ; 4.22-24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tout-Puissant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.8+.
      marker-yv: yv-n
    - type: text
      text: 'Je n''y vis pas de sanctuaire, car le Seigneur Dieu, le Tout-Puissant, est son sanctuaire, ainsi que l''agneau. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soleil… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.5 ; cf. Es 24.23 ; 60.1,19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gloire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11+.
      marker-yv: yv-n
    - type: text
      text: 'La ville n''a besoin ni du soleil ni de la lune pour y briller, car la gloire de Dieu l''éclaire, et sa lampe, c''est l''agneau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les nations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Es 60.3,5 ; Ps 68.30 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les nations marcheront à sa lumière, et les rois de la terre y apporteront leur gloire. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ses portes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 60.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas de nuit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22.5 ; cf. 21.1+ ; Gn 1.2-5 ; Za 14.7.
      marker-yv: yv-n
    - type: text
      text: 'Ses portes ne se fermeront jamais pendant le jour – or là il n''y aura pas de nuit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 2.2ss ; 25.6ss ; 60.3,11 ; Ps 72.10s.
      marker-yv: yv-n
    - type: text
      text: 'On y apportera la gloire et l''honneur des nations. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.27 '
