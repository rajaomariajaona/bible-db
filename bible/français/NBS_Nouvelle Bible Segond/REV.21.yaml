document_id: REV.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un ciel nouveau et une terre nouvelle
  - type: text
    content: ' '
  - type: note
    content: 'ciel nouveau / terre nouvelle  : cf. v. 5 ; Es 65.17 ; 66.22 ; 2P 3.13. –  premier v. 4 ; cf. 1.17+. –  avaient disparu 20.11. –  la mer 20.13 ; cf. Gn 1.2,6-10 ; Es 21.1 ; 50.2+ ; Jb 7.12n. – Sur l''ensemble, voir aussi Mt 19.28 ; Mc 13.24,31 ; 2Co 5.17 ; Col 3.10 ; cf. 1 Hénoch 45.4s : « Ce jour-là, Je ferai habiter Mon Elu parmi eux, Je transformerai le ciel, et J''en ferai une bénédiction, une lumière éternelles. Je transformerai l''aride, J''en ferai une bénédiction et J''y ferai habiter Mes élus. » 91.16 : « Les premiers cieux passeront ; alors, des cieux neufs apparaîtront, toutes les puissances des cieux brillant et resplendissant au septuple. »'
  - type: text
    content: 'Alors je vis un ciel nouveau et une terre nouvelle ; car le premier ciel et la première terre avaient disparu, et la mer n''était plus. '
  '10':
  - type: note
    content: 'Il me transporta, par l''Esprit 17.3 ; cf. 1.10+. –  montagne  : cf. Ez 40.1s ; Mt 4.8+. –  ville sainte v. 2+.'
  - type: text
    content: 'Il me transporta, par l''Esprit, sur une grande et haute montagne, et il me montra la ville sainte, Jérusalem, qui descendait du ciel, d''auprès de Dieu. '
  '11':
  - type: note
    content: 'la gloire de Dieu  : cf. v. 23 ; 15.8 ; Es 58.8 ; 60.1s,19 ; Ez 43.2ss.'
  - type: text
    content: 'Elle avait la gloire de Dieu ; son éclat ressemblait à celui d''une pierre précieuse, une pierre de jaspe transparente comme du cristal. '
  '12':
  - type: note
    content: 'muraille  : cf. Ez 40.5. –  douze portes v. 14 ; 22.14 ; Ez 48.30ss. –  noms… inscrits 3.5+ ; Lc 10.20n. –  douze tribus 7.4ss ; cf. Ex 28.21 ; 39.14. –  Israélites Lc 1.16n.'
  - type: text
    content: 'Elle avait une grande et haute muraille. Elle avait douze portes, et sur les portes douze anges. Des noms y étaient inscrits, ceux des douze tribus des Israélites : '
  '13':
  - type: note
    content: Cf. Lc 13.29.
  - type: text
    content: 'à l''est trois portes, au nord trois portes, au sud trois portes et à l''ouest trois portes. '
  '14':
  - type: note
    content: 'fondations / apôtres  : cf. Ep 2.20 ; voir aussi Hé 11.10. –  elles portaient  : litt. sur elles.'
  - type: text
    content: La muraille de la ville avait douze fondations ; elles portaient les douze noms des douze apôtres de l'agneau.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 11.1+.
  - type: text
    content: 'Celui qui parlait avec moi avait une mesure, un roseau d''or, pour mesurer la ville, ses portes et sa muraille. '
  '16':
  - type: note
    content: 'carré Ez 43.16. –  Il mesura Ez 48.16ss ; Za 2.6. –  douze mille (cf. 7.5ss) stades  : environ 2 000 km ; voir mesures, poids et monnaies. –  hauteur  : on peut l''imaginer comme un cube ou comme une pyramide.'
  - type: text
    content: 'La ville avait la forme d''un carré, sa longueur était égale à sa largeur. Il mesura la ville avec le roseau : douze mille stades ; la longueur, la largeur et la hauteur en étaient égales. '
  '17':
  - type: note
    content: 'cent quarante-quatre (cf. 7.4n) coudées  : environ 70 m. –  d''une mesure humaine…  : litt. mesure d''humain, qui est d''ange  ; cf. 13.18 ; Dt 3.11 ; voir aussi Ap 19.10+.'
  - type: text
    content: 'Il mesura la muraille : cent quarante-quatre coudées, d''une mesure humaine qui était celle de l''ange. '
  '18':
  - type: note
    content: Cf. v. 11.
  - type: text
    content: 'La muraille était construite en jaspe, et la ville était d''or pur, semblable à du verre pur. '
  '19':
  - type: note
    content: V. 14+ ; Es 54.11ns ; les v. 19s énumèrent 12 variétés de pierres fines ou précieuses, dont l'identification est parfois incertaine ; cf. Ex 24.10n  ; 28.17-20 ; Ez 28.13s.
  - type: text
    content: 'Les fondations de la muraille de la ville étaient ornées de toutes sortes de pierres précieuses : la première fondation était de jaspe, la deuxième de saphir, la troisième de calcédoine, la quatrième d''émeraude, '
  '2':
  - type: note
    content: la ville sainte 11.2+ ; Es 52.1 ; Né 11.1,18 ; Mt 4.5+. –  Jérusalem nouvelle 3.12+. –  prête comme une mariée 19.7+,8.
  - type: text
    content: 'Et je vis descendre du ciel, d''auprès de Dieu, la ville sainte, la Jérusalem nouvelle, prête comme une mariée qui s''est parée pour son mari. '
  '20':
  - type: text
    content: 'la cinquième de sardonyx, la sixième de sardoine, la septième de chrysolithe, la huitième de béryl, la neuvième de topaze, la dixième de chrysoprase, la onzième d''hyacinthe, la douzième d''améthyste. '
  '21':
  - type: note
    content: grande rue 22.2 ; cf. 11.8.
  - type: text
    content: Les douze portes étaient douze perles ; chacune des portes était d'une seule perle. La grande rue de la ville était d'or pur, comme du verre transparent.
  '22':
  - type: text
    content: ' '
  - type: note
    content: sanctuaire 7.15+ ; cf. 21.3 ; 22.3 ; Jn 2.19-21 ; 4.22-24. –  Tout-Puissant 1.8+.
  - type: text
    content: 'Je n''y vis pas de sanctuaire, car le Seigneur Dieu, le Tout-Puissant, est son sanctuaire, ainsi que l''agneau. '
  '23':
  - type: note
    content: soleil… 22.5 ; cf. Es 24.23 ; 60.1,19s. –  gloire v. 11+.
  - type: text
    content: 'La ville n''a besoin ni du soleil ni de la lune pour y briller, car la gloire de Dieu l''éclaire, et sa lampe, c''est l''agneau. '
  '24':
  - type: note
    content: Les nations 2.26n  ; cf. Es 60.3,5 ; Ps 68.30 ; voir non-Juifs.
  - type: text
    content: 'Les nations marcheront à sa lumière, et les rois de la terre y apporteront leur gloire. '
  '25':
  - type: note
    content: 'Ses portes… Es 60.11. –  or  : litt. car. –  pas de nuit 22.5 ; cf. 21.1+ ; Gn 1.2-5 ; Za 14.7.'
  - type: text
    content: 'Ses portes ne se fermeront jamais pendant le jour – or là il n''y aura pas de nuit. '
  '26':
  - type: note
    content: Es 2.2ss ; 25.6ss ; 60.3,11 ; Ps 72.10s.
  - type: text
    content: 'On y apportera la gloire et l''honneur des nations. '
  '27':
  - type: note
    content: 'rien de souillé ou de profane Es 35.8 ; 52.1 ; Za 13.1s ; voir pur, impur. –  abomination  : cf. Ez 33.29. –  mensonge v. 8 ; 14.5n  ; 22.15. –  livre de la vie 3.5+.'
  - type: text
    content: Il n'y entrera jamais rien de souillé, ni faiseur d'abomination ou de mensonge, mais ceux-là seuls qui sont inscrits dans le livre de la vie de l'agneau.
  '3':
  - type: note
    content: 'du trône… 16.17+. –  La demeure (litt. la tente) / Il aura sa demeure  : voir 7.15n  ; 13.6n  ; cf. Lv 26.11ss. –  La demeure de Dieu est (autre traduction voici la demeure de Dieu) avec les humains  : cf. 1R 8.27 ; Ez 37.27 ; Za 2.14s ; 2Co 6.16. –  ses peuples, d''après les meilleurs mss ; d''autres portent son peuple  ; cf. Dt 33.3n  ; Jr 31.1 ; Ps 95.7. –  et lui-même…  : certains mss portent et Dieu lui-même sera avec eux  ; cf. Es 7.14n  ; 8.8 ; Mt 1.23+.'
  - type: text
    content: 'J''entendis du trône une voix forte qui disait :'
  - type: text
    content: 'La demeure de Dieu est avec les humains ! Il aura sa demeure avec eux, ils seront ses peuples, et lui-même, qui est Dieu avec eux, sera leur Dieu. '
  '4':
  - type: note
    content: 7.17+ ; 20.14 ; Es 25.8  ; 35.10 ; 51.11 ; 65.19 ; cf. Jr 31.16. –  les premières choses v. 1 ; cf. Es 43.18.
  - type: text
    content: Il essuiera toute larme de
  - type: text
    content: ' leurs '
  - type: text
    content: yeux,
  - type: text
    content: ' la mort ne sera plus, et il n''y aura plus ni deuil, ni cri, ni douleur, car les premières choses ont disparu.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui était assis… 4.2+. –  De tout…  : litt. je fais tout nouveau , c.-à-d. je rends toutes choses nouvelles . Cf. 2.17+ ; Es 43.19 ; 2Co 5.17. –  Ecris 1.11+. –  certaines (ou dignes de foi  ; le terme est aussi traduit par fidèle ) et vraies 19.11+ ; cf. 19.9n.'
  - type: text
    content: 'Celui qui était assis sur le trône dit : De tout je fais du nouveau. Et il dit : Ecris, car ces paroles sont certaines et vraies. '
  '6':
  - type: note
    content: 'C''est fait 16.17n. –  C''est moi qui suis certains mss portent la formule légèrement différente qui est traduite par c''est moi en 22.13 ; cf. 1.8n. –  A celui qui a soif…  : cf. 7.16-17+ ; Mt 5.6 ; Jn 4.10,14.'
  - type: text
    content: 'Il me dit : C''est fait ! C''est moi qui suis l''alpha et l''oméga, le commencement et la fin. A celui qui a soif, je donnerai de la source de l''eau de la vie, gratuitement. '
  '7':
  - type: note
    content: 'vainqueur 2.7+. –  je serai son Dieu…  : cf. Lv 26.12 ; 2S 7.14 ; Ez 11.20  ; Za 8.8 ; Ps 2.7 ; 89.27s ; Hé 1.1-5. – Voir fils.'
  - type: text
    content: 'Tel sera l''héritage du vainqueur ; '
  - type: text
    content: je serai son Dieu, et lui sera mon fils
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'Cf. v. 27 ; 22.15 ; Rm 1.29+ ; 1Co 6.9s ; Ga 5.19-21 ; Ep 5.5s ; Tt 1.16. –  infidèles  : on pourrait aussi traduire gens sans foi, non-croyants 2Co 4.4n. –  les prostitués  : autre traduction ceux qui se livrent à l''inconduite sexuelle  ; cf. 2.14n. –  sorciers 9.21n  ; 22.15. –  étang 19.20+. –  feu / soufre 14.10+. –  seconde mort 2.11+.'
  - type: text
    content: 'Mais pour les lâches, les infidèles, les êtres abominables, les meurtriers, les prostitués, les sorciers, les idolâtres et tous les menteurs, leur part sera dans l''étang brûlant de feu et de soufre : c''est la seconde mort.'
  - type: heading
    content: La Jérusalem nouvelle
  '9':
  - type: text
    content: ' '
  - type: note
    content: un des sept anges… 15.1+,7+ ; cf. 17.1. –  la mariée… 19.7+.
  - type: text
    content: 'Puis un des sept anges qui tenaient les sept coupes pleines des sept derniers fléaux vint parler avec moi. Il me dit : Viens, je te montrerai la mariée, l''épouse de l''agneau. '
