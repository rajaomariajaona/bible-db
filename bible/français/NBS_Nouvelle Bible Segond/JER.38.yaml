    marker-yv: yv-n
  - type: text
    text: 'Ebed-Mélek, le Koushite, haut fonctionnaire qui était dans la maison du roi, apprit qu''on avait mis Jérémie dans la citerne. Le roi était assis à la porte de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ebed-Mélek sortit de la maison du roi et dit au roi : '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 37.20 ; 52.6.
    marker-yv: yv-n
  - type: text
    text: 'O roi, mon seigneur, ces hommes ont mal agi en tout ce qu''ils ont fait à Jérémie, le prophète, en le jetant dans la citerne ; il y mourra de faim, car il n''y a plus de pain dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Prends
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prends dans ta main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sous tes ordres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms hébreu porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: trois.
    marker-yv: yv-n
  - type: text
    text: 'Le roi donna cet ordre à Ebed-Mélek, le Koushite : Prends ici trente hommes, et tu feras remonter de la citerne Jérémie, le prophète, avant qu''il ne meure. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des lambeaux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : termes rares et traduction incertaine.'
    marker-yv: yv-n
  - type: text
    text: 'Ebed-Mélek prit les hommes et se rendit à la maison du roi, dans un lieu au-dessous du trésor ; il en sortit des lambeaux de vêtements usés et les descendit à Jérémie dans la citerne, avec des cordes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ebed-Mélek, le Koushite, dit à Jérémie : Je t''en prie, mets ces lambeaux usés et ces haillons sous tes aisselles, à l''endroit des cordes. Jérémie fit ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 28 ; 37.21.
    marker-yv: yv-n
  - type: text
    text: Ils tirèrent Jérémie avec les cordes et le firent remonter de la citerne. Jérémie resta dans la cour de la garde.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernière entrevue de Sédécias et de Jérémie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
