  - type: text
    text: 'Les princes dirent au roi : S''il te plaît, que cet homme soit mis à mort ! C''est lui qui décourage les hommes de guerre restant dans cette ville, ainsi que tout le peuple, en leur tenant de tels discours ; cet homme ne cherche pas le bien de ce peuple, mais son malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
