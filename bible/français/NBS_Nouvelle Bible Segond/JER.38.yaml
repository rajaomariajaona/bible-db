document_id: JER.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie jeté dans une citerne
  - type: text
    content: ' '
  - type: note
    content: 'Youkal, fils de Shélémia  : cf. 37.3. –  Pashhour… 21.1+.'
  - type: text
    content: 'Shephatia, fils de Mattân, Guedalia, fils de Pashhour, Youkal, fils de Shélémia et Pashhour, fils de Malkiya, entendirent ce que Jérémie disait à tout le peuple, à savoir : '
  '10':
  - type: note
    content: 'Prends  : litt. prends dans ta main, c.-à-d. avec toi ou sous tes ordres  ; de même au v. 11. –  trente  : un ms hébreu porte trois.'
  - type: text
    content: 'Le roi donna cet ordre à Ebed-Mélek, le Koushite : Prends ici trente hommes, et tu feras remonter de la citerne Jérémie, le prophète, avant qu''il ne meure. '
  '11':
  - type: note
    content: 'des lambeaux…  : termes rares et traduction incertaine.'
  - type: text
    content: 'Ebed-Mélek prit les hommes et se rendit à la maison du roi, dans un lieu au-dessous du trésor ; il en sortit des lambeaux de vêtements usés et les descendit à Jérémie dans la citerne, avec des cordes. '
  '12':
  - type: text
    content: 'Ebed-Mélek, le Koushite, dit à Jérémie : Je t''en prie, mets ces lambeaux usés et ces haillons sous tes aisselles, à l''endroit des cordes. Jérémie fit ainsi. '
  '13':
  - type: note
    content: Cf. v. 28 ; 37.21.
  - type: text
    content: Ils tirèrent Jérémie avec les cordes et le firent remonter de la citerne. Jérémie resta dans la cour de la garde.
  - type: heading
    content: Dernière entrevue de Sédécias et de Jérémie
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 37.17.
  - type: text
    content: 'Le roi Sédécias envoya chercher Jérémie, le prophète, et le fit venir auprès de lui dans la troisième entrée de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Le roi dit à Jérémie : Je veux te demander quelque chose ; ne me cache rien ! '
  '15':
  - type: note
    content: Cf. Lc 22.67.
  - type: text
    content: 'Jérémie répondit à Sédécias : Si je te le dis, ne me feras-tu pas mettre à mort ? Et si je te donne un conseil, tu ne m''écouteras pas ! '
  '16':
  - type: note
    content: Par la vie du Seigneur 4.2n. –  qui nous a faits ou qui nous a donné cette vie (hébreu néphesh, cf. 2.24n).
  - type: text
    content: 'Le roi Sédécias fit en secret ce serment à Jérémie : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui nous a faits, je ne te ferai pas mettre à mort, et je ne te livrerai pas à ces hommes qui en veulent à ta vie. '
  '17':
  - type: note
    content: tu auras la vie sauve v. 20 ; cf. v. 2+.
  - type: text
    content: 'Jérémie dit alors à Sédécias : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées, le Dieu d''Israël : Si tu sors au-devant des princes du roi de Babylone, tu auras la vie sauve, et cette ville ne sera pas détruite par le feu ; tu vivras, toi et ta maison. '
  '18':
  - type: note
    content: V. 3,23.
  - type: text
    content: 'Mais si tu ne sors pas au-devant des princes du roi de Babylone, cette ville sera livrée aux Chaldéens, qui y mettront le feu ; et toi, tu ne lui échapperas pas. '
  '19':
  - type: note
    content: Cf. 1S 31.4.
  - type: text
    content: 'Le roi Sédécias dit à Jérémie : Je suis inquiet à cause des Judéens qui se sont rendus aux Chaldéens ; je crains qu''on ne me livre à eux, et qu''ils ne me brutalisent. '
  '2':
  - type: note
    content: Cf. v. 17 ; 21.9 ; 27.12s. –  épée / famine / peste 14.12+. –  Chaldéens 21.4n.
  - type: text
    content: '« Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Celui qui restera dans cette ville mourra par l''épée, par la famine ou par la peste ; mais celui qui sortira pour se rendre aux Chaldéens gardera la vie, sa vie sera son butin, et il vivra. '
  '20':
  - type: note
    content: Cf. 42.6.
  - type: text
    content: 'Jérémie répondit : On ne te livrera pas. Ecoute le '
  - type: text
    content: Seigneur
  - type: text
    content: ', je te prie, en ce que je te dis ; tu t''en trouveras bien et tu auras la vie sauve. '
  '21':
  - type: note
    content: 'm''a révélée  : litt. m''a fait voir.'
  - type: text
    content: 'Mais si tu refuses de sortir, voici la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a révélée : '
  '22':
  - type: note
    content: 'Cf. Ab 7. –  tes amis  : litt. les hommes de ta paix, ce qui peut aussi signifier tes proches  ; cf. 20.10n. –  dans la boue  : cf. v. 6 (autre terme en hébreu).'
  - type: text
    content: 'Toutes les femmes qui sont restées dans la maison du roi de Juda seront menées aux princes du roi de Babylone, et elles diront :'
  - type: text
    content: Ils t'ont entraîné et ils l'ont emporté sur toi,
  - type: text
    content: tes amis.
  - type: text
    content: Quand tes pieds se sont enfoncés dans la boue,
  - type: text
    content: ils ont reculé.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'V. 18. –  qui mettra le feu à cette ville  : d''après Vg  ; LXX et cette ville sera détruite par le feu , texte hébreu traditionnel et tu brûleras cette ville par le feu , c.-à-d., peut-être, tu seras la cause de sa destruction.'
  - type: text
    content: 'Toutes tes femmes et tes fils seront menés aux Chaldéens ; et toi, tu ne lui échapperas pas, tu seras pris par le roi de Babylone, qui mettra le feu à cette ville. '
  '24':
  - type: text
    content: 'Sédécias dit à Jérémie : Que personne ne sache rien de ces paroles, et tu ne mourras pas. '
  '25':
  - type: text
    content: 'Si les princes apprennent que je t''ai parlé et s''ils viennent te dire : « Rapporte-nous, s''il te plaît, ce que tu as dit au roi et ce que le roi t''a dit ; ne nous cache rien, et nous ne te ferons pas mettre à mort », '
  '26':
  - type: note
    content: J'ai fait parvenir 36.7n  ; 37.20. –  maison de Jonathan 37.20.
  - type: text
    content: 'tu leur répondras : « J''ai fait parvenir ma supplication devant le roi, pour qu''il ne me renvoie pas dans la maison de Jonathan, de peur que je n''y meure. »'
  '27':
  - type: text
    content: Tous les princes vinrent trouver Jérémie et l'interrogèrent. Il leur répondit exactement comme le roi le lui avait ordonné. Ils se retirèrent en silence, car la chose ne s'était pas divulguée.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'V. 13+ ; 39.14s. –  Et lorsque Jérusalem fut prise…  : la phrase reste en suspens.'
  - type: text
    content: Jérémie resta dans la cour de la garde jusqu'au jour de la prise de Jérusalem. Et lorsque Jérusalem fut prise…
  '3':
  - type: note
    content: 21.10+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Cette ville sera vraiment livrée à l''armée du roi de Babylone, qui la prendra. »'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 26.11. –  décourage  : litt. affaiblit les mains  ; cf. 6.24+ ; Esd 4.4n. –  le bien ou la paix  ; cf. 4.10n  ; 14.13.'
  - type: text
    content: 'Les princes dirent au roi : S''il te plaît, que cet homme soit mis à mort ! C''est lui qui décourage les hommes de guerre restant dans cette ville, ainsi que tout le peuple, en leur tenant de tels discours ; cet homme ne cherche pas le bien de ce peuple, mais son malheur. '
  '5':
  - type: note
    content: 'le roi…  : LXX le roi ne pouvait rien contre eux  ; cf. Dn 6.15+ss.'
  - type: text
    content: 'Le roi Sédécias répondit : Le voici, il est entre vos mains : le roi ne peut rien contre vous. '
  '6':
  - type: note
    content: 'citerne 37.16n,20s ; cf. 32.2+. –  Malkiya  : hébreu Malkiyahou. –  fils du roi  : cf. 36.26n  ; Sédécias devait avoir environ trente ans à l''époque (2R 24.18). –  dans la boue Ps 69.3.'
  - type: text
    content: Alors ils prirent Jérémie et le jetèrent dans la citerne de Malkiya, fils du roi, laquelle se trouvait dans la cour de la garde ; ils descendirent Jérémie avec des cordes. Il n'y avait pas d'eau dans la citerne, mais il y avait de la boue ; et Jérémie s'enfonça dans la boue.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ebed-Mélek signifie serviteur du roi . –  Koushite ou Nubien  ; cf. 13.23n. –  haut fonctionnaire 29.2n. –  était assis  : position du roi et du juge. –  porte de Benjamin 37.13.'
  - type: text
    content: 'Ebed-Mélek, le Koushite, haut fonctionnaire qui était dans la maison du roi, apprit qu''on avait mis Jérémie dans la citerne. Le roi était assis à la porte de Benjamin. '
  '8':
  - type: text
    content: 'Ebed-Mélek sortit de la maison du roi et dit au roi : '
  '9':
  - type: note
    content: 37.20 ; 52.6.
  - type: text
    content: 'O roi, mon seigneur, ces hommes ont mal agi en tout ce qu''ils ont fait à Jérémie, le prophète, en le jetant dans la citerne ; il y mourra de faim, car il n''y a plus de pain dans la ville. '
