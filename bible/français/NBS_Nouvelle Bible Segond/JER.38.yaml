  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 37.17.
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias envoya chercher Jérémie, le prophète, et le fit venir auprès de lui dans la troisième entrée de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Le roi dit à Jérémie : Je veux te demander quelque chose ; ne me cache rien ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Lc 22.67.
    marker-yv: yv-n
  - type: text
    text: 'Jérémie répondit à Sédécias : Si je te le dis, ne me feras-tu pas mettre à mort ? Et si je te donne un conseil, tu ne m''écouteras pas ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par la vie du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui nous a faits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui nous a donné cette vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: néphesh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias fit en secret ce serment à Jérémie : Par la vie du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui nous a faits, je ne te ferai pas mettre à mort, et je ne te livrerai pas à ces hommes qui en veulent à ta vie. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu auras la vie sauve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 20 ; cf. v. 2+.
    marker-yv: yv-n
  - type: text
    text: 'Jérémie dit alors à Sédécias : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu des Armées, le Dieu d''Israël : Si tu sors au-devant des princes du roi de Babylone, tu auras la vie sauve, et cette ville ne sera pas détruite par le feu ; tu vivras, toi et ta maison. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 3,23.
    marker-yv: yv-n
  - type: text
    text: 'Mais si tu ne sors pas au-devant des princes du roi de Babylone, cette ville sera livrée aux Chaldéens, qui y mettront le feu ; et toi, tu ne lui échapperas pas. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1S 31.4.
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias dit à Jérémie : Je suis inquiet à cause des Judéens qui se sont rendus aux Chaldéens ; je crains qu''on ne me livre à eux, et qu''ils ne me brutalisent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 42.6.
    marker-yv: yv-n
  - type: text
    text: 'Jérémie répondit : On ne te livrera pas. Ecoute le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', je te prie, en ce que je te dis ; tu t''en trouveras bien et tu auras la vie sauve. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: m'a révélée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: m'a fait voir.
    marker-yv: yv-n
  - type: text
    text: 'Mais si tu refuses de sortir, voici la parole que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a révélée : '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ab 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tes amis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les hommes de ta paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes proches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 20.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la boue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6 (autre terme en hébreu).'
    marker-yv: yv-n
  - type: text
    text: 'Toutes les femmes qui sont restées dans la maison du roi de Juda seront menées aux princes du roi de Babylone, et elles diront :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils t'ont entraîné et ils l'ont emporté sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes amis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tes pieds se sont enfoncés dans la boue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont reculé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui mettra le feu à cette ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et cette ville sera détruite par le feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', texte hébreu traditionnel '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et tu brûleras cette ville par le feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d., peut-être, tu seras la cause de sa destruction.'
    marker-yv: yv-n
  - type: text
    text: 'Toutes tes femmes et tes fils seront menés aux Chaldéens ; et toi, tu ne lui échapperas pas, tu seras pris par le roi de Babylone, qui mettra le feu à cette ville. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sédécias dit à Jérémie : Que personne ne sache rien de ces paroles, et tu ne mourras pas. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si les princes apprennent que je t''ai parlé et s''ils viennent te dire : « Rapporte-nous, s''il te plaît, ce que tu as dit au roi et ce que le roi t''a dit ; ne nous cache rien, et nous ne te ferons pas mettre à mort », '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai fait parvenir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '36.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 37.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maison de Jonathan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 37.20.
    marker-yv: yv-n
  - type: text
    text: 'tu leur répondras : « J''ai fait parvenir ma supplication devant le roi, pour qu''il ne me renvoie pas dans la maison de Jonathan, de peur que je n''y meure. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tous les princes vinrent trouver Jérémie et l'interrogèrent. Il leur répondit exactement comme le roi le lui avait ordonné. Ils se retirèrent en silence, car la chose ne s'était pas divulguée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 13+ ; 39.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Et lorsque Jérusalem fut prise…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la phrase reste en suspens.'
    marker-yv: yv-n
  - type: text
    text: Jérémie resta dans la cour de la garde jusqu'au jour de la prise de Jérusalem. Et lorsque Jérusalem fut prise…
