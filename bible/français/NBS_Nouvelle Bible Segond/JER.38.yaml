    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.10+.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Cette ville sera vraiment livrée à l''armée du roi de Babylone, qui la prendra. »'
