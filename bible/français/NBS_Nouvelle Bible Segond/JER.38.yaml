    marker-yv: yv-n
  - type: text
    text: '« Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Celui qui restera dans cette ville mourra par l''épée, par la famine ou par la peste ; mais celui qui sortira pour se rendre aux Chaldéens gardera la vie, sa vie sera son butin, et il vivra. '
  - type: usfm
    marker: v
    metadata:
