    marker-yv: yv-n
  - type: text
    text: Alors ils prirent Jérémie et le jetèrent dans la citerne de Malkiya, fils du roi, laquelle se trouvait dans la cour de la garde ; ils descendirent Jérémie avec des cordes. Il n'y avait pas d'eau dans la citerne, mais il y avait de la boue ; et Jérémie s'enfonça dans la boue.
