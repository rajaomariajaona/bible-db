    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le roi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le roi ne pouvait rien contre eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dn 6.15+ss.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias répondit : Le voici, il est entre vos mains : le roi ne peut rien contre vous. '
  - type: usfm
