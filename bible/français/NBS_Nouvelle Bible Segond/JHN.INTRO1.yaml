document_id: JHN.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: « Quant à ce que Jean a été mis au quatrième lieu, on a eu égard au temps auquel il a été écrit. Mais quant à la lecture, on fera mieux de commencer par celui-ci ; afin que quand nous viendrons à lire en saint Matthieu et aux autres que le Fils nous a été donné de son Père, nous commencions premièrement à apprendre de saint Jean à quelle fin Jésus-Christ a été manifesté. »
  - type: text
    content: 'Cet « argument » de Jean Calvin résume bien la façon dont l''Eglise reçoit traditionnellement le quatrième évangile : comme un évangile écrit un certain temps après les autres et qui, longuement mûri, fournit la clef du  '
  - type: text
    content: mystère
  - type: text
    content: '  de Jésus-Christ.'
  - type: text
    content: Avant toutes choses, l'idée du Christ
  - type: text
    content: 'L''évangéliste ne laisse pas au lecteur le temps d''hésiter sur ses intentions : dès les premiers mots de son livre, il définit de façon originale la situation du Christ en s''inspirant du début de la Genèse (Jn 1.1ss ; Gn 1). A la fin de l''ouvrage, l''auteur scande à nouveau le même motif : '
  - type: text
    content: afin que vous croyiez que Jésus est le Christ, le Fils de Dieu, et que, par cette foi, vous ayez la vie en son nom
  - type: text
    content: '  (20.31).'
  - type: text
    content: 'Qui voudrait encore, d''un seul regard, apprécier ce dessein, lira soigneusement l''évaluation intermédiaire située au centre du livre, en 12.37ss. Il y verra comment la très haute idée du Christ dont Jean se fait le témoin provoque un clivage parmi les  '
  - type: text
    content: « Juifs »
  - type: text
    content: '  et dans le  '
  - type: text
    content: '« monde »,  '
  - type: text
    content: 'et amène en particulier les synagogues à exclure les chrétiens « johanniques », ceux qui vont former la communauté liée à l''Evangile selon  '
  - type: text
    content: Jean
  - type: text
    content: .
  - type: text
    content: Le cadre historique
  - type: text
    content: 'Le quatrième évangile, tel qu''il nous parvient, a dû être publié peu d''années avant la fin du premier siècle. Les explications assez nombreuses qu''il contient sur les coutumes des  '
  - type: text
    content: « Juifs »
  - type: text
    content: '  laissent largement entendre que les communautés destinataires ne vivent plus dans le pays de Jésus. Cependant nous ne savons pas précisément où cette œuvre a été composée. Antioche, en Syrie, a la faveur de nombreux spécialistes modernes. Ephèse, dans la province romaine d''Asie, a pour elle le témoignage quasi unanime de l''Eglise ancienne.'
  - type: text
    content: La mention réitérée de l'exclusion de la synagogue (9.22 ; 12.42 ; 16.2) invite à situer la réflexion johannique au moment où les communautés d'Asie Mineure assistent à la montée en puissance du judaïsme pharisien* après la chute de Jérusalem (donc après 70).
  - type: text
    content: 'Afin d''illustrer ce propos on peut mentionner la référence à l''élimination des apostats dans une prière prescrite aux Juifs de cette époque à l''instigation de Gamaliel II (Talmud de Babylone,  '
  - type: text
    content: Berakoth
  - type: text
    content: '  28b). La plupart des recensions qui nous en sont parvenues les désignent sous le terme assez général de  '
  - type: text
    content: minim
  - type: text
    content: '  (approximativement « hérétiques »), mais un fragment tardif retrouvé au Caire les nomme expressément « nazaréens » ou « nazoréens » ('
  - type: text
    content: notsrim
  - type: text
    content: '). La formulation de cette prière – qui n''est plus en usage depuis longtemps – pourrait avoir été :  '
  - type: text
    content: Qu'il n'y ait pour les apostats aucune espérance. Déracine vite en nos jours la domination scélérate. Que les nazaréens et les hérétiques disparaissent vite et qu'ils ne soient pas inscrits avec les justes. Béni sois-tu, Seigneur notre Dieu, toi qui broies les scélérats.
  - type: text
    content: Les « Juifs »
  - type: text
    content: 'Les  '
  - type: text
    content: « Juifs »
  - type: text
    content: '  de l''Evangile selon Jean sont très présents (68 occurrences) et très actifs. Qui sont-ils ? Le mot « Juif* » (en grec  '
  - type: text
    content: Ioudaios
  - type: text
    content: ') désigne étymologiquement un habitant de la Judée, c''est-à-dire de la région de Jérusalem. Jean semble l''utiliser quelquefois avec ce sens restreint, notamment dans les chapitres 11 et 12. Or ce sont les Judéens qui, à l''époque de l''évangile, détenaient tous les leviers du pouvoir juridictionnel sur les synagogues de l''Empire romain. Rien d''étonnant donc à ce que, dans les récits de Jean, l''expression  '
  - type: text
    content: les Juifs
  - type: text
    content: '  en vienne à désigner les  '
  - type: text
    content: autorités religieuses
  - type: text
    content: '  juives (p. ex. 5.15 ; 8.18ss ; 9.22).'
  - type: text
    content: 'Au fil des pages, l''expression  '
  - type: text
    content: les Juifs
  - type: text
    content: '  se charge d''une connotation hostile. Elle est assez proche alors de l''idée de «  '
  - type: text
    content: monde
  - type: text
    content: '  » telle qu''elle apparaît, par exemple, en 17.14 (cf. 1.10'
  - type: text
    content: n
  - type: text
    content: '). Cette façon de parler est à replacer dans le contexte historique du conflit entre le judaïsme officiel, essentiellement pharisien après la destruction du temple, et les premiers chrétiens, d''origine juive ou non. Qu''il s''agisse d''un conflit  '
  - type: text
    content: religieux
  - type: text
    content: '  et non ethnique, c''est évident, non seulement parce que Jean ne perd pas de vue que Jésus et ses disciples sont eux-mêmes juifs d''un point de vue ethnique, même s''ils sont spirituellement « d''ailleurs » (cf. 18.35s), mais aussi parce que le nom d’'
  - type: text
    content: Israël
  - type: text
    content: '  reste, lui, connoté positivement (1.31,47). Du reste, la plupart des membres de la communauté johannique sont sans doute eux-mêmes d''origine juive.'
  - type: text
    content: 'Dans ces conditions on comprend que certains faits de la trame évangélique soient déjà interprétés par l''auteur en fonction de la situation de son époque. On a souvent souligné le paradoxe suivant lequel Jésus et les disciples ne sont parfois plus présentés comme des  '
  - type: text
    content: « Juifs »
  - type: text
    content: ', mais comme des  '
  - type: text
    content: chrétiens
  - type: text
    content: '  persécutés. Les nombreuses références aux tentatives des adversaires pour procéder à l''élimination physique de Jésus sont autant d''allusions à ce qui arrive maintenant aux membres de la communauté johannique. Et pourquoi veut-on les faire mourir ? Parce qu''ils affirment la préexistence et la nature divine de Jésus, pain vivant descendu du ciel (voir 6.51 et 7.1,13,25,43) et Seigneur du buisson ardent (cf.  '
  - type: text
    content: moi, je suis,
  - type: text
    content: '  8.24'
  - type: text
    content: n
  - type: text
    content: ss, cf. Ex 3.14 ; voir aussi Jn 5.17s ; 8.37,40,44,48 ; 10.32ss, etc.) – et qu'ils ne se plient pas à l'orthodoxie du judaïsme contrôlé désormais par les pharisiens.
  - type: text
    content: Il est certain que la conception du Christ en vigueur dans la communauté johannique a exaspéré le judaïsme. Le texte de Jean mentionne l'accusation de blasphème (10.33,36).
  - type: text
    content: A l'origine du livre, le disciple bien-aimé
  - type: text
    content: 'L''opinion reçue dans l''Eglise, depuis le second siècle au moins, est exprimée par Irénée (130-202 environ) en ces termes : « Jean, le disciple du Seigneur, celui qui reposait sur son sein (13.25 ; 21.20), publia son évangile à Ephèse après que les autres évangiles eurent été écrits. »'
  - type: text
    content: 'En fait, l''apôtre Jean n''est jamais nommé dans cet évangile. Le texte renvoie à la figure du  '
  - type: text
    content: disciple que Jésus aimait
  - type: text
    content: '  (19.25ss ; 20.2 ; 21.7 ; 21.24 ; cf. le disciple non nommé en 1.37ss ; et'
  - type: text
    content: '  l''autre disciple'
  - type: text
    content: '  18.15s et 20.3ss).'
  - type: text
    content: Le Bien-Aimé et « les siens »
  - type: text
    content: 'Contrairement à une idée assez répandue, le quatrième évangile est loin d''ignorer la notion de  '
  - type: text
    content: communauté.
  - type: text
    content: '  L''image du cep et des sarments (chap. 15) et celle du berger (chap. 10) le montrent clairement.'
  - type: text
    content: 'Pour autant, on n''entre pas sans préalable dans cette communauté des « siens » (13.1). L''adhésion à la personne et à l''action de Jésus en est la condition indispensable (chap. 3). Mais une fois membre de cette communauté, on pénètre la pensée du Maître grâce à la communication par  '
  - type: text
    content: l'amour
  - type: text
    content: . L'image du cep postule un lien continu et vivant entre le Maître et les disciples.
  - type: text
    content: 'La reformulation du commandement d''amour (Lv 18.19) est caractéristique. En Jn 13.34s (cf. 15.12,17) la communauté johannique accueille un précepte qui figurait aussi dans la Règle de la communauté de Qumrân (2.24s) :  '
  - type: text
    content: Tous, ils seront dans la Communauté... d'affectueuse charité... l'un envers l'autre
  - type: text
    content: '. Mais l''enseignement du Bien-Aimé, dans sa profonde méditation du message légué par Jésus, souligne combien ce lien entre frères en la foi est la constante conséquence du lien spirituel entretenu avec Jésus par l''action de  '
  - type: text
    content: 'l''Esprit* de vérité,  '
  - type: text
    content: 'le «  '
  - type: text
    content: Défenseur
  - type: text
    content: '  ».'
  - type: text
    content: 'Le quatrième évangile est le fruit d''une  '
  - type: text
    content: méditation
  - type: text
    content: '  théologique accomplie sous la conduite de cet Esprit-'
  - type: text
    content: Défenseur
  - type: text
    content: . Car la signification véritable des faits apparaît rarement d'emblée. Jean le remarque lui-même lorsqu'il précise à propos de l'affaire des vendeurs du temple, de l'entrée triomphale à Jérusalem ou de la Résurrection elle-même, que les disciples ne comprirent pas tout d'abord, mais seulement plus tard (2.17,22 ; 12.16 ; 13.7 ; 20.9). En fait, pour reprendre l'expression d'un spécialiste du quatrième évangile, Jean se propose de « restructurer le croire des croyants », en les faisant passer à une compréhension plus profonde de la foi qu'ils ont reçue.
  - type: text
    content: La Révélation développée par le  Défenseur –  le « Paraclet »
  - type: text
    content: 'Le terme grec  '
  - type: text
    content: 'paraklètos,  '
  - type: text
    content: 'qui revient à quatre reprises dans le dernier discours (14.16,26 ; 15.26 ; 16.7), désigne celui qu''on appelle à côté de soi comme aide, soutien, défenseur et témoin. La présente traduction le rend par  '
  - type: text
    content: défenseur,
  - type: text
    content: '  mais beaucoup de versions renoncent à le traduire et se contentent de le transcrire « Paraclet ».'
  - type: text
    content: 'L''examen des textes montrera que la notion de Paraclet s''applique d''abord à  '
  - type: text
    content: 'Jésus  '
  - type: text
    content: 'lui-même, qui se désigne ainsi de son vivant (14.16 ; cf. 1 Jn 2.1). Ensuite le Paraclet assure la réalité de la présence du Ressuscité auprès des siens, dans toute la continuité de l''histoire. Ainsi, même après la disparition des témoins oculaires, l''Eglise peut-elle vivre dans  '
  - type: text
    content: l'Esprit
  - type: text
    content: ', le souffle de Jésus (20.22,29).'
  - type: text
    content: La véracité des récits et l'authenticité des discours
  - type: text
    content: 'L''originalité de Jean, qui laisse de côté quantité de considérations ne servant pas directement son propos, conduit parfois le nouveau lecteur à se poser la question de la relation entre ses écrits et l''histoire. Une telle interrogation a peut-être le mérite de ramener à une plus sage vision du rôle de l''évangéliste. Car ce dernier n''a pas à écrire pour satisfaire certaines curiosités qui seraient les nôtres, par exemple sur l''exacte démarcation entre les paroles de Jésus et leur commentaire, ou pour s''inscrire dans le cadre précis de ce que nous, lecteurs modernes, appelons l''exactitude en matière d''histoire. Il écrit  '
  - type: text
    content: dans la foi et pour la foi.
  - type: text
    content: '  Il se préoccupe moins de recherches objectives et neutres que de fidélité actuelle à celui qui est  '
  - type: text
    content: 'le chemin, la vérité, la vie  '
  - type: text
    content: '(14.6), et en qui il s''agit de '
  - type: text
    content: demeurer
  - type: text
    content: ', ici et maintenant (6.56 ; 15.4).'
  - type: text
    content: Une connaissance très précise de certains détails
  - type: text
    content: 'Malgré cette liberté de style, Jean montre qu''il connaît certains  '
  - type: text
    content: détails
  - type: text
    content: '  précis, absents chez ses devanciers. Il donne ainsi des indications sur la ville de Jérusalem qui ont été éclairées par les fouilles archéologiques. Par exemple, dans le quartier de Bethzatha, on a retrouvé des « bains d''Asclépios-Sérapis » qui pourraient bien correspondre à la piscine de Jean 5.2ss. Manifestement, l''auteur dispose d''une bonne connaissance du pays et des coutumes juives.'
  - type: text
    content: 'On évoque souvent la différence entre le  '
  - type: text
    content: calendrier
  - type: text
    content: '  pascal de Jean et celui des synoptiques (comparer Jn 13.1s et Mt 26.17ss/ /). On a coutume d''expliquer le décalage par une intention théologique de la part de Jean, celle de faire coïncider la condamnation à mort de Jésus avec le moment où l''on immolait les agneaux pour la Pâque, la veille de la fête proprement dite (Jn 19.14'
  - type: text
    content: n
  - type: text
    content: '  ; cf. 1.29 et les nombreuses mentions de la Pâque dans l''évangile, 2.13+). Cependant, on sait maintenant que plusieurs calendriers liturgiques étaient en concurrence à l''époque de Jésus, et il se pourrait que ce soit aussi un facteur à prendre en considération. Le quatrième évangéliste, qui semble proche du milieu des grands prêtres (18.15), aurait-il suivi, contrairement aux autres, le calendrier officiel dans son récit de la Passion ?'
  - type: text
    content: Une vue d'ensemble
  - type: text
    content: 'Nous distinguerons cinq parties :'
  - type: text
    content: 1.Le grand prologue = 1.1-18
  - type: text
    content: 2.Les actes significatifs de Jésus = 1.19–12.50
  - type: text
    content: 3.Le testament de Jésus = chap. 13 à 17
  - type: text
    content: 4.Le récit de la passion ou « élévation » de Jésus = chap. 18 à 20
  - type: text
    content: 5.Le post-scriptum (ou épilogue) = chap. 21
  - type: text
    content: '1re partie : 1.1-18 '
  - type: text
    content: 'Le très beau, mais difficile « prologue » contient toutes les clefs du quatrième évangile. Sa richesse se révèle à mesure qu''on avance dans le corps de l''ouvrage. C''est une  '
  - type: text
    content: hymne
  - type: text
    content: '  : dans ces 18 versets, on peut distinguer quatre strophes, toutes consacrées au Christ : il est Dieu ; il est Créateur ; il est venu dans le monde, et dans sa communauté. En contrepoint de l''hymne à la Parole éternelle, deux notations précisent les limites de la tâche dévolue à Jean le Baptiseur.'
  - type: text
    content: '2e partie : 1.19–12.50'
  - type: text
    content: ' Un récit en trois journées (1.19-51) met en scène les premiers acteurs du drame. Les «  '
  - type: text
    content: Juifs
  - type: text
    content: '  », immédiatement présents, questionnent Jean le Baptiseur sur lui-même et sur Jésus. Puis Jésus fait son apparition, ainsi que les premiers disciples. La progression du récit s''articule autour des titres christologiques, c''est-à-dire de la  '
  - type: text
    content: confession de la foi.
  - type: text
    content: '  Elle culmine avec l''image du Christ « échelle de Jacob », médiateur entre le ciel et la terre (1.51).'
  - type: text
    content: 'A partir du chapitre 2, des  '
  - type: text
    content: signes
  - type: text
    content: '  jalonnent le parcours. En général ce sont des réalisations prodigieuses que l''auteur nomme  '
  - type: text
    content: signes
  - type: text
    content: '  (voir « Les ‘’signes’’ de Jésus dans l''Evangile selon Jean », p.${Xsignes}). Le choix du terme  '
  - type: text
    content: 'signe  '
  - type: text
    content: 'donne cependant à penser que ce qui compte, pour l''auteur, ce n''est pas tant le caractère miraculeux ou sensationnel du miracle que sa capacité de signifier, de renvoyer à autre chose que lui-même – cette autre chose qui est, proprement, l''unique objet de la foi. Ainsi le lecteur est d''emblée rendu attentif aux résonances mystérieuses des actes et des paroles de Jésus, qu''ils soient ou non qualifiés de  '
  - type: text
    content: 'signes.  '
  - type: text
    content: 'A bien des égards l''entretien avec Nicodème ou avec la femme samaritaine (chap. 3 et 4), la grande controverse christologique de la fête des Tentes ou des Huttes (chap. 7 et 8), l''onction à Béthanie (12.1-8), l''entrée royale à Jérusalem (12.12-19), sont tout aussi « significatifs » que la guérison du paralytique un jour de sabbat (chap. 5) ou la marche sur la mer (6.16ss). Pour Jean, les  '
  - type: text
    content: signes
  - type: text
    content: '  ne contraignent pas à la foi : ils l''éclairent et l''affermissent.'
  - type: text
    content: 'D''autres indices interviennent également dans la structure de cette section. Ainsi la gradation des  '
  - type: text
    content: « heures »
  - type: text
    content: ', qui est comme un compte à rebours en attendant l''heure suprême, celle de la croix. On sera attentif également à l''échelonnement des  '
  - type: text
    content: fêtes
  - type: text
    content: '  et en particulier aux trois Pâques juives qui encadrent le ministère de Jésus (un ministère de deux ans au moins, selon cet évangile).'
  - type: text
    content: 'Notons enfin la présence d''un grand  '
  - type: text
    content: discours figuré
  - type: text
    content: '  – l''enclos et le berger : ceux qui appartiennent au troupeau du Christ se révèlent par leur réponse à sa voix même et le refus de tout autre, parce qu''ils reconnaissent en lui le Seigneur venu en personne prendre soin du troupeau (chap. 10 ; cf. Ez 34).'
  - type: text
    content: '3e partie : chapitres 13 à 17'
  - type: text
    content: ' Ce  '
  - type: text
    content: 'testament  '
  - type: text
    content: '(ou discours d''adieu) ne prend sens qu''une fois connu le contenu de la 4e partie : le récit de la Passion-Résurrection. Il l''explique et le commente. Les chapitres 13 et 15 ont été très sollicités au cours des siècles dans le sens d''une symbolique eucharistique. On peut en tout cas tenir que le chapitre 13 (le lavement des pieds), situé au moment du dernier repas de Jésus, figurant en lieu et place des récits d''institution de la Cène donnés par les synoptiques, procède d''un choix délibéré. Ce morceau destiné aux  '
  - type: text
    content: siens
  - type: text
    content: ', à ceux que Jésus aima jusqu''à l''extrême, met en avant la figure du traître, lequel peut faire penser à ceux qui, par intérêt, trahissent les membres de la communauté johannique. Aussi importe-t-il de resserrer les liens de solidarité et de service mutuel. Le lavement des pieds, geste moins habituel que la fraction du pain, souligne l''extrême du service : le Fils préexistant du Père s''abaisse jusqu''à laver les pieds de ses compagnons.'
  - type: text
    content: 'Aux chapitres 14 et 16, le développement sur  '
  - type: text
    content: l'absence-présence
  - type: text
    content: '  est déjà, pour la communauté johannique, un commentaire de la situation qui résulte du « départ » de son Seigneur et Dieu. Le but de ces développements sur le  '
  - type: text
    content: 'Défenseur,  '
  - type: text
    content: qui sera identifié à l'Esprit saint en 14.26, est en effet de donner corps à la foi, en communion vivante et permanente avec le Ressuscité.
  - type: text
    content: 'Le chapitre 17, traditionnellement appelé  '
  - type: text
    content: « prière sacerdotale »
  - type: text
    content: ', met l''accent sur l''union des disciples de Jésus. Ils seront  '
  - type: text
    content: 'un  '
  - type: text
    content: à l'image du Père et du Fils, comme témoignage pour le monde. La formulation de ce chapitre fait penser à un élément liturgique.
  - type: text
    content: '4e partie : chapitres 18 à 20'
  - type: text
    content: 'Le récit de la  '
  - type: text
    content: Passion
  - type: text
    content: '  (arrestation, procès, crucifixion) comporte de nombreuses originalités. L''auteur y poursuit son projet principal : mettre en évidence l''origine divine de Jésus et sa gloire paradoxale dont le sommet est la croix. Les éléments narratifs n''apparaissent que d''une manière assez sobre et dans la mesure où ils servent ce projet théologique.'
  - type: text
    content: 'Le  '
  - type: text
    content: procès
  - type: text
    content: '  semble rondement mené. Les juges donnent l''impression de se livrer à un interrogatoire de pure forme, car leur verdict est établi d''avance. L''entrevue avec Pilate, très originale, irait même, d''après certains, jusqu''à placer Jésus en situation de président du tribunal (19.13 et la note), trait supplémentaire de l''ironie de Jean (cf. déjà 18.28). Le motif théologique deviendrait alors celui-ci : en condamnant Jésus, l''humanité se condamne elle-même... et Jésus est son juge, siégeant au tribunal.'
  - type: text
    content: 'Nouvel indice important : l''insistance de Jean sur le fait que Jésus portait lui-même la  '
  - type: text
    content: croix
  - type: text
    content: '  (19.17). C''est ici la reprise du thème du « sacrifice » d''Isaac (Gn 22.6) ; en même temps, Jean coupe court aux spéculations, occasionnées par le scandale de la croix, selon lesquelles un certain Simon de Cyrène (absent de ce récit) aurait, au dernier moment, pris la place de Jésus (cf. Mc 15.21/ /).'
  - type: text
    content: 'En 19.19 enfin, la pancarte apposée par Pilate au-dessus du supplicié désigne clairement Jésus comme le  '
  - type: text
    content: nazoréen
  - type: text
    content: ', donc le chef de file de ces  '
  - type: text
    content: minim
  - type: text
    content: '  (« hérétiques ») visés par la formulation toute récente de la prière des « Dix-huit Bénédictions » mentionnée plus haut.'
  - type: text
    content: Les récits du constat de la
  - type: text
    content: '  Résurrection'
  - type: text
    content: '  rapportés par Jean sont absolument originaux. Ils font ressortir l''importance des deux grands responsables d''Eglise que sont Pierre et  '
  - type: text
    content: l'autre disciple
  - type: text
    content: . Lequel est le premier ? Tous deux, avec leurs dons respectifs, témoignent pour les générations à venir – même si, pour le quatrième évangile, le Bien-Aimé occupe une place privilégiée (21.20 renvoie explicitement à 13.23ss, la scène du dernier repas, où le Bien-Aimé joue un rôle d'intermédiaire entre Jésus et Pierre).
  - type: text
    content: '5e partie : chapitre 21'
  - type: text
    content: Ce post-scriptum annonce la mort des deux grands apôtres, mais d'abord celle de Pierre, le pêcheur d'hommes au ministère miraculeux.
  - type: text
    content: 'Jésus vient, prend le pain et le leur donne, ainsi que le poisson  '
  - type: text
    content: '(21.13) : l''avenir s''ouvre ici, dans le signe de cette communion vivante qui durera par-delà les générations.'
