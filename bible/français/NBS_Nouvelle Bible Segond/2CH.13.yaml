    children:
    - type: text
      text: '1'
  - type: text
    text: 'La dix-huitième année du roi Jéroboam, Abiya devint roi sur Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Michée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mikayahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' habituellement masculin qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui est comme YHWH ? '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Maaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 11.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il régna trois ans à Jérusalem. Le nom de sa mère était Michée, fille d''Uriel, de Guibéa. Il y eut guerre entre Abiya et Jéroboam. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Abiya engagea le combat avec une armée de vaillants guerriers, quatre cent mille hommes d'élite ; Jéroboam se rangea en ordre de bataille contre lui avec huit cent mille hommes d'élite, de vaillants guerriers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mont Tsemaraïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jos 18.22.'
    marker-yv: yv-n
  - type: text
    text: 'Du haut du mont Tsemaraïm, qui fait partie de la région montagneuse d''Ephraïm, Abiya se leva et dit : Ecoutez-moi, Jéroboam et tout Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une '
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' de sel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: imprescriptible
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; symbole de conservation durable. Cf. Lv 2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 18.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 2S 7.12-16 ; 1Ch 17.11-14.'
    marker-yv: yv-n
  - type: text
    text: 'Ne savez-vous pas que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, a donné pour toujours à David la royauté sur Israël, à lui et à ses fils, par une alliance de sel ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéroboam… serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fonctionnaire, officier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 11.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses maîtres.
    marker-yv: yv-n
  - type: text
    text: 'Mais Jéroboam, fils de Nebath, serviteur de Salomon, fils de David, s''est levé et s''est rebellé contre son maître. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hommes de rien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 9.4 ; 11.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gens sans morale '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 13.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Roboam était jeune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: inexpérimenté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1Ch 22.5 ; 29.1 ; voir aussi 1R 3.7 ; Jr 1.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: était… délicat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: était peureux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la même expression est rendue par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sentir son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' mollir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Dt 20.8 ; cf. 2R 22.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2Ch 10.13s.'
    marker-yv: yv-n
  - type: text
    text: 'Des hommes de rien, des gens sans morale, se sont rassemblés auprès de lui et l''ont emporté sur Roboam, fils de Salomon. Roboam était jeune et délicat, et il n''eut pas la force de leur tenir tête. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'royaume du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Ch 28.5 ; cf. 1Ch 29.23 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trône du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grande multitude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.2,12,15 ; Es 16.14 ; Dn 11.10s ; voir aussi 1R 20.13,28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec vous, comme dieux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ', les taurillons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les veaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'or…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 12.28-30.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, vous dites que vous aurez la force de tenir tête au royaume du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui est entre les mains des fils de David. Vous êtes une grande multitude et vous avez avec vous, comme dieux, les taurillons d''or que Jéroboam vous a faits. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: repoussé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.14. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Aaron'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 28.41 ; 29.44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 3.5ss ; 18.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les peuples du pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les peuples des pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les peuples des autres pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . La même expression désigne ceux qui étaient restés dans le pays pendant l'exil en Esd 3.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.1s,11 ; Né 10.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un taureau et sept béliers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 29.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: être investi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: remplir sa main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Ex 28.41'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui n'est pas Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 32.17 ; Es 37.19 ; Jr 2.11 ; 5.7 ; Os 8.6 ; voir aussi Ga 4.8.'
    marker-yv: yv-n
  - type: text
    text: 'N''avez-vous pas repoussé les prêtres du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', les fils d''Aaron, et les lévites, et ne vous êtes-vous pas fait des prêtres comme les peuples du pays ? Quiconque vient avec un taureau et sept béliers pour être investi, le voilà qui devient prêtre de ce qui n''est pas Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils d''Aaron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 28.1 ; Lv 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sont à l'œuvre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Né 13.30 ; 1Ch 9.33.'
    marker-yv: yv-n
  - type: text
    text: 'Quant à nous, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est notre Dieu, et nous ne l''avons pas abandonné : les prêtres qui officient pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sont fils d''Aaron, et les lévites sont à l''œuvre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chaque matin et chaque soir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 29.38ss ; 30.7s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'holocaustes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'encens aromatique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Hé 9.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la table '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pure
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 24.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le porte-lampes d''or… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 25.31,37 ; 40.24s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous assurons le service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous observons l'observance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lv 8.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 18.30 ; 22.9 ; Dt 11.1+ ; Ez 48.11.'
    marker-yv: yv-n
  - type: text
    text: 'Nous faisons fumer pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', chaque matin et chaque soir, des holocaustes et de l''encens aromatique, nous exposons le pain sur la table pure, et nous allumons chaque soir le porte-lampes d''or et ses lampes ; car nous assurons le service du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', notre Dieu. Mais vous, vous l''avez abandonné. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trompettes de l'acclamation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 10.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ps 150.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne faites pas la guerre au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 5.39. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous ne vaincrez pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 32.5 ; voir aussi 1R 22.12ss/ / ; 2Ch 20.20.'
    marker-yv: yv-n
  - type: text
    text: 'Dieu et ses prêtres sont avec nous, à notre tête, et nous avons les trompettes de l''acclamation pour sonner l''acclamation contre vous. Israélites, ne faites pas la guerre au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
