document_id: 2CH.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Abiya
  - type: heading
    content: 1R 15.1-2
  - type: text
    content: 'La dix-huitième année du roi Jéroboam, Abiya devint roi sur Juda. '
  '10':
  - type: note
    content: 'fils d''Aaron v. 9n  ; Ex 28.1 ; Lv 8. –  sont à l''œuvre  : cf. Né 13.30 ; 1Ch 9.33.'
  - type: text
    content: 'Quant à nous, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est notre Dieu, et nous ne l''avons pas abandonné : les prêtres qui officient pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont fils d''Aaron, et les lévites sont à l''œuvre. '
  '11':
  - type: note
    content: 'chaque matin et chaque soir Ex 29.38ss ; 30.7s. –  holocaustes / encens aromatique / pain 2.3n  ; cf. Hé 9.2. –  la table pure Lv 24.6n. –  le porte-lampes d''or… Ex 25.31,37 ; 40.24s. –  nous assurons le service  : autre traduction nous observons l''observance  ; cf. Lv 8.35n  ; 18.30 ; 22.9 ; Dt 11.1+ ; Ez 48.11.'
  - type: text
    content: 'Nous faisons fumer pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', chaque matin et chaque soir, des holocaustes et de l''encens aromatique, nous exposons le pain sur la table pure, et nous allumons chaque soir le porte-lampes d''or et ses lampes ; car nous assurons le service du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu. Mais vous, vous l''avez abandonné. '
  '12':
  - type: note
    content: 'trompettes de l''acclamation  : cf. Nb 10.5n  ; Ps 150.5+. –  ne faites pas la guerre au Seigneur  : cf. Ac 5.39. –  vous ne vaincrez pas  : cf. Jr 32.5 ; voir aussi 1R 22.12ss/ / ; 2Ch 20.20.'
  - type: text
    content: 'Dieu et ses prêtres sont avec nous, à notre tête, et nous avons les trompettes de l''acclamation pour sonner l''acclamation contre vous. Israélites, ne faites pas la guerre au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, car vous ne vaincrez pas !'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'embuscade  : cf. Jos 8.2-24 ; Jg 20.29-45. –  ses troupes  : sous-entendu dans le texte.'
  - type: text
    content: 'Jéroboam fit faire à l''embuscade un mouvement tournant pour les prendre par-derrière ; ses troupes étaient en face de Juda, et l''embuscade par-derrière. '
  '14':
  - type: text
    content: 'Juda dut se retourner, ayant à combattre devant et derrière. Ils crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et les prêtres sonnèrent des trompettes. '
  '15':
  - type: note
    content: 'battit  : autres traduction fit battre… par Abiya… ; frappa d''un fléau… devant Abiya  ; cf. Lv 26.17n.'
  - type: text
    content: 'Les hommes de Juda lancèrent des acclamations ; aux acclamations des hommes de Juda, Dieu battit Jéroboam et tout Israël devant Abiya et Juda. '
  '16':
  - type: note
    content: les leur livra Gn 9.2n.
  - type: text
    content: 'Les Israélites s''enfuirent pour échapper à Juda, et Dieu les leur livra. '
  '17':
  - type: note
    content: 'leur infligèrent une grande défaite  : litt. les frappèrent d''un grand coup.'
  - type: text
    content: 'Abiya et son peuple leur infligèrent une grande défaite, et cinq cent mille hommes d''élite d''Israël tombèrent blessés à mort. '
  '18':
  - type: note
    content: 'furent humiliés  : cf. Jg 3.30 ; 8.28 ; 11.33 ; même verbe en 1S 7.13 ; Ps 106.42 ; 1Ch 20.4. –  les Judéens  : litt. les fils de Juda. –  ils s''étaient appuyés… cf. 14.10 ; 16.7s ; Es 10.20 ; 50.10 ; Mi 3.11 ; voir aussi Es 31.1 ; Ez 29.6s ; Pr 3.5.'
  - type: text
    content: 'Les Israélites furent humiliés en ce temps-là, et les Judéens l''emportèrent, parce qu''ils s''étaient appuyés sur le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Beth-El  : anciennement Louz , cf. Gn 28.19n  ; Jos 16.1-2n  ; 18.13 ; Jg 1.22-23n  ; voir aussi Jos 7.2 ; 8.9,12 ; 12.9,16 ; 18.22 ; Jg 20.18+ ; 1S 7.16 ; 2R 2.2s ; 17.28 ; Os 4.15n  ; 5.8 ; 10.5,8 ; Am 7.10-13. –  les localités qui en dépendent  : litt. ses filles , de même dans la suite ; cf. 1Ch 2.23n. –  Yeshana  : à environ 25 km au nord de Jérusalem ; cf. 1S 7.12n. –  Ephrôn  : autre lecture traditionnelle Ephraïn (= Ephraïm  ?).'
  - type: text
    content: 'Abiya poursuivit Jéroboam et lui prit des villes : Beth-El et les localités qui en dépendent, Yeshana et les localités qui en dépendent, Ephrôn et les localités qui en dépendent. '
  '2':
  - type: note
    content: 'Michée  : hébreu Mikayahou, nom habituellement masculin qui signifie qui est comme YHWH ? LXX, Syr Maaka, cf. 11.20n.'
  - type: text
    content: 'Il régna trois ans à Jérusalem. Le nom de sa mère était Michée, fille d''Uriel, de Guibéa. Il y eut guerre entre Abiya et Jéroboam. '
  '20':
  - type: note
    content: 'n''eut plus aucune force  : même expression en Dn 10.8,16 ; 11.6. –  le frappa  : le verbe correspondant peut évoquer une défaite militaire (v. 15) ou un fléau, cf. 21.14 ; Ex 7.27n  ; 1S 25.38 ; 1R 14.20.'
  - type: text
    content: 'Jéroboam n''eut plus aucune force aux jours d''Abiya ; puis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le frappa, et il mourut. '
  '21':
  - type: text
    content: Mais Abiya devint fort. Il eut quatorze femmes et engendra vingt-deux fils et seize filles.
  - type: heading
    content: 1R 15.7-8
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire…  : cf. 1R 11.41n  ; 15.7+. –  ce qu''il a fait et ce qu''il a dit  : litt. ses voies et ses paroles (le mot correspondant à paroles est le même que celui qui est rendu par histoire ). –  commentaire  : hébreu midrash , cf. 24.27. –  Iddo, le prophète  : cf. 9.29n.'
  - type: text
    content: 'Le reste de l''histoire d''Abiya, ce qu''il a fait et ce qu''il a dit, cela est écrit dans le commentaire d''Iddo, le prophète. '
  '23':
  - type: note
    content: 'se coucha avec ses pères 9.31n. –  dans la Ville de David 9.31+. –  le pays fut tranquille…  : cf. Jg 3.11,30 ; 5.31 ; 8.28.'
  - type: text
    content: Abiya se coucha avec ses pères, et on l'ensevelit dans la Ville de David. Asa, son fils, devint roi à sa place. En ses jours, le pays fut tranquille pendant dix ans.
  '3':
  - type: text
    content: Abiya engagea le combat avec une armée de vaillants guerriers, quatre cent mille hommes d'élite ; Jéroboam se rangea en ordre de bataille contre lui avec huit cent mille hommes d'élite, de vaillants guerriers.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'mont Tsemaraïm  : cf. Jos 18.22.'
  - type: text
    content: 'Du haut du mont Tsemaraïm, qui fait partie de la région montagneuse d''Ephraïm, Abiya se leva et dit : Ecoutez-moi, Jéroboam et tout Israël ! '
  '5':
  - type: note
    content: une alliance de sel ou imprescriptible  ; symbole de conservation durable. Cf. Lv 2.13n  ; Nb 18.19n  ; voir aussi 2S 7.12-16 ; 1Ch 17.11-14.
  - type: text
    content: 'Ne savez-vous pas que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, a donné pour toujours à David la royauté sur Israël, à lui et à ses fils, par une alliance de sel ? '
  '6':
  - type: note
    content: 'Jéroboam… serviteur (ou fonctionnaire, officier) de Salomon  : cf. 1R 11.26. –  son maître  : litt. ses maîtres.'
  - type: text
    content: 'Mais Jéroboam, fils de Nebath, serviteur de Salomon, fils de David, s''est levé et s''est rebellé contre son maître. '
  '7':
  - type: note
    content: 'hommes de rien  : cf. Jg 9.4 ; 11.3+. –  gens sans morale Dt 13.14n. –  Roboam était jeune  : c.-à-d. inexpérimenté  ; cf. 1Ch 22.5 ; 29.1 ; voir aussi 1R 3.7 ; Jr 1.7. –  était… délicat  : autre traduction était peureux  ; la même expression est rendue par sentir son cœur mollir en Dt 20.8 ; cf. 2R 22.19n  ; 2Ch 10.13s.'
  - type: text
    content: 'Des hommes de rien, des gens sans morale, se sont rassemblés auprès de lui et l''ont emporté sur Roboam, fils de Salomon. Roboam était jeune et délicat, et il n''eut pas la force de leur tenir tête. '
  '8':
  - type: note
    content: 'royaume du Seigneur 1Ch 28.5 ; cf. 1Ch 29.23 trône du Seigneur. –  grande multitude  : cf. 20.2,12,15 ; Es 16.14 ; Dn 11.10s ; voir aussi 1R 20.13,28. –  avec vous, comme dieux (autre traduction comme Dieu), les taurillons (ou les veaux) d''or…  : cf. 1R 12.28-30.'
  - type: text
    content: 'Maintenant, vous dites que vous aurez la force de tenir tête au royaume du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui est entre les mains des fils de David. Vous êtes une grande multitude et vous avez avec vous, comme dieux, les taurillons d''or que Jéroboam vous a faits. '
  '9':
  - type: note
    content: 'repoussé  : cf. 11.14. – Voir prêtre. –  les fils d''Aaron  : cf. Ex 28.41 ; 29.44. –  les lévites  : cf. Nb 3.5ss ; 18.6. –  les peuples du pays  : litt. les peuples des pays  ; on pourrait aussi comprendre les peuples des autres pays. La même expression désigne ceux qui étaient restés dans le pays pendant l''exil en Esd 3.3n  ; 9.1s,11 ; Né 10.29. –  un taureau et sept béliers  : cf. Ex 29.1n. –  être investi  : litt. remplir sa main, Ex 28.41n. –  ce qui n''est pas Dieu  : cf. Dt 32.17 ; Es 37.19 ; Jr 2.11 ; 5.7 ; Os 8.6 ; voir aussi Ga 4.8.'
  - type: text
    content: 'N''avez-vous pas repoussé les prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', les fils d''Aaron, et les lévites, et ne vous êtes-vous pas fait des prêtres comme les peuples du pays ? Quiconque vient avec un taureau et sept béliers pour être investi, le voilà qui devient prêtre de ce qui n''est pas Dieu. '
