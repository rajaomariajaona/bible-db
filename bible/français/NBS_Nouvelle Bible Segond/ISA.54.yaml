document_id: ISA.54,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem, l'épouse du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Ga 4.27. –  stérile 1S 2.5 ; Ps 113.9. –  délaissée 60.15 ; 62.4,12 ; le terme hébreu correspondant s''applique généralement à une région dévastée, ici à Jérusalem ; cf. 49.18s ( lieux dévastés ). –  nombreux  : cf. 53.10-12.'
  - type: text
    content: Pousse des cris de joie, femme stérile,
  - type: text
    content: toi qui n'as pas accouché !
  - type: text
    content: Eclate en cris de joie et triomphe,
  - type: text
    content: toi qui n'as pas connu les douleurs de l'accouchement !
  - type: text
    content: Car les fils de la délaissée seront plus nombreux
  - type: text
    content: que les fils de la femme mariée,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Quand les montagnes… 63.19 ; Mi 1.4 ; Ha 3.6,10 ; Ps 18.8 ; 46.3s. –  ma fidélité  : cf. v. 8n. –  alliance de paix Ez 34.25 ; 37.26 ; cf. Jr 31.31ss.'
  - type: text
    content: Quand les montagnes s'en iraient,
  - type: text
    content: quand les collines vacilleraient,
  - type: text
    content: ma fidélité envers toi ne s'en ira pas,
  - type: text
    content: et mon alliance de paix ne vacillera pas,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a compassion de toi.'
  - type: heading
    content: La Jérusalem des temps futurs
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Malheureuse 51.21n  ; cf. 53.4. –  personne ne console 51.3. –  stuc  : litt. fard (cf. 2R 9.30 ; Jr 4.30 ; Jb 42.14n). Certains pensent qu''il s''agit d''antimoine, métal qui entre dans la composition de certaines peintures. –  fondations de lapis-lazuli…  : cf. Ex 24.10n  ; voir aussi Ez 28.13s ; Ap 21.10-21 ; Tobit 13.17 : « Les portes de Jérusalem seront bâties en saphir et en émeraude ; en pierres précieuses seront tous ses murs. Les tours de Jérusalem seront bâties en or, et leurs défenses en or pur. Les rues de Jérusalem seront pavées d''escarboucles et de pierres d''Ophir. »'
  - type: text
    content: Malheureuse, battue par la tempête,
  - type: text
    content: toi que personne ne console !
  - type: text
    content: Je garnis tes pierres de stuc,
  - type: text
    content: et je te donne des fondations de lapis-lazuli ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 11n. –  ton enceinte  : le terme est habituellement traduit par territoire, frontière, limite . –  pierres précieuses  : litt. pierres de plaisir.'
  - type: text
    content: je ferai tes créneaux de rubis,
  - type: text
    content: tes portes d'escarboucles
  - type: text
    content: et toute ton enceinte de pierres précieuses.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'tes fils 49.20-22. –  disciples du Seigneur  : cf. 50.4 ; Jr 31.34 ; Jn 6.45. –  paix ou prospérité  ; cf. Ps 119.165n.'
  - type: text
    content: 'Tous tes fils seront disciples du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et la paix de tes fils sera abondante.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'affermie  : cf. 45.18. –  justice  : cf. 1.26-27. –  tiens-toi loin  : certains modifient le texte hébreu traditionnel pour lire tu seras loin. –  tu n''auras plus peur…  : cf. Ps 91 ; 121.'
  - type: text
    content: Tu seras affermie par la justice ;
  - type: text
    content: tiens-toi loin de l'oppression
  - type: text
    content: – tu n'auras plus peur –
  - type: text
    content: et de la terreur
  - type: text
    content: – elle n'approchera plus de toi.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.12. –  à cause de toi  : litt. sur toi  ; cf. Lc 20.18.'
  - type: text
    content: Si l'on t'attaque,
  - type: text
    content: cela ne viendra pas de moi ;
  - type: text
    content: quiconque t'attaquera
  - type: text
    content: tombera à cause de toi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'une arme  : cf. v. 17. Autres traductions un objet, un instrument . –  le destructeur  : cf. 41.25. –  le (sous-entendu dans le texte) briser  : litt. ruiner, anéantir  ; cf. 51.13.'
  - type: text
    content: Moi, j'ai créé le forgeron
  - type: text
    content: qui souffle sur les braises
  - type: text
    content: pour fabriquer une arme de sa façon ;
  - type: text
    content: mais j'ai créé aussi
  - type: text
    content: le destructeur pour le briser.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 5.17-26. –  Toute arme 8.9ss ; 37.33-37. –  forgée ou préparée  : le même terme est traduit par façonner en 43.1+. –  sera sans effet  : litt. ne réussira pas , cf. 48.15. –  justice  : ici, le même mot que celui souvent traduit par droit . –  tu la condamneras ou tu la convaincras de méchanceté  : cf. 50.9n. –  serviteurs du Seigneur  : cf. 41.8+ (unique mention au pluriel dans les chapitres 40–55).'
  - type: text
    content: Toute arme forgée contre toi
  - type: text
    content: sera sans effet ;
  - type: text
    content: et toute langue qui s'élèvera en justice contre toi,
  - type: text
    content: tu la condamneras.
  - type: text
    content: 'Voilà le patrimoine des serviteurs du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: la justice qui leur vient de moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: espace 49.19-21. –  tente 33.20+.
  - type: text
    content: Agrandis l'espace de ta tente ;
  - type: text
    content: 'qu''on déploie les toiles de tes demeures :'
  - type: text
    content: ne les ménage pas !
  - type: text
    content: Allonge tes cordages,
  - type: text
    content: affermis tes piquets !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tu t''étendras  : autres traductions tu t''accroîtras ou, plus litt., tu éclateras, tu exploseras  ; cf. Gn 28.14n  ; 30.30,43n. –  possession des nations 45.14 ; 60.3-16 ; cf. 52.15 ; 55.5 ; Gn 22.17s. –  villes dévastées 44.26 ; 49.19.'
  - type: text
    content: Car tu t'étendras à droite et à gauche ;
  - type: text
    content: tes descendants prendront possession des nations
  - type: text
    content: et peupleront des villes dévastées.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'N''aie pas peur 41.10+. –  honteuse / confuse 41.11+. –  tu n''auras pas à rougir  : autre terme que celui qui a été traduit ici par confuse  ; il a été rendu par confus en 33.9. –  jeunesse et veuvage (47.8) désignent peut-être respectivement l''esclavage en Egypte et l''exil à Babylone.'
  - type: text
    content: N'aie pas peur,
  - type: text
    content: car tu ne seras pas honteuse ;
  - type: text
    content: ne sois pas confuse,
  - type: text
    content: car tu n'auras pas à rougir ;
  - type: text
    content: oui, tu oublieras la honte de ta jeunesse
  - type: text
    content: et tu ne te souviendras plus
  - type: text
    content: du déshonneur de ton veuvage.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui te fait 43.7+. –  ton époux  : cf. 50.1 ; cf. Os 2.18n. –  le Seigneur (YHWH) des Armées 44.6+. –  rédempteur v. 4 ; 41.14n. –  Saint d''Israël 1.4+.'
  - type: text
    content: Car celui qui te fait, c'est ton époux,
  - type: text
    content: '– son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: ton rédempteur, c'est le Saint d'Israël.
  - type: text
    content: Il est appelé Dieu de toute la terre ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'femme abandonnée 49.14+. – Voir esprit. –  La compagne…  : autre traduction (comme) une compagne de jeunesse rejetée  ; cf. 41.9 ; Jr 3.1 ; Ml 2.14-16 ; Pr 5.18.'
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te rappelle'
  - type: text
    content: comme une femme abandonnée
  - type: text
    content: dont l'esprit est affligé.
  - type: text
    content: La compagne de jeunesse peut-elle être rejetée ?
  - type: text
    content: – dit ton Dieu.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 30.6. –  je te recueillerai  : autre traduction je te rassemblerai (cf. 40.11 ; 43.5).'
  - type: text
    content: Un court instant,
  - type: text
    content: je t'avais abandonnée,
  - type: text
    content: mais avec une grande compassion
  - type: text
    content: je te recueillerai ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'irritation / compassion 47.6 ; 60.10 ; le terme correspondant à irritation (ou colère , cf. 34.2+) fait assonance avec celui qui est rendu par débordement. –  je m''étais détourné de toi  : litt. je t''avais caché ma face  ; cf. 8.17 ; 50.6 ; 59.2 ; 64.6 ; voir aussi 53.3 ; Dt 31.17s ; 32.20 ; Ez 39.23s ; Ps 13.2+. –  avec fidélité (v. 10 ; voir 40.6n) , pour toujours ou avec une fidélité perpétuelle  ; cf. 51.6,8 ; Jr 31.3 ; Ps 136. –  ton rédempteur v. 4.'
  - type: text
    content: dans un débordement d'irritation,
  - type: text
    content: un instant je m'étais détourné de toi ;
  - type: text
    content: mais avec fidélité, pour toujours,
  - type: text
    content: j'aurai compassion de toi,
  - type: text
    content: 'dit ton rédempteur, le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'comme aux jours  : de nombreux mss hébreux et LXX ont lu comme (pour) les eaux  ; cf. Gn 8.21s ; 9.8-16 ; Jr 31.35-37.'
  - type: text
    content: 'Il en sera pour moi comme aux jours de Noé :'
  - type: text
    content: j'avais juré
  - type: text
    content: que les eaux de Noé ne se répandraient plus sur la terre ;
  - type: text
    content: je jure de même
  - type: text
    content: de ne plus m'irriter contre toi
  - type: text
    content: et de ne plus te rabrouer.
