document_id: PSA.81,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Si mon peuple m'écoutait…
  - type: text
    content: ' '
  - type: note
    content: guittith 8.1n  ; 84.1. –  D'Asaph 73.1+.
  - type: text
    content: Du chef de chœur. Sur la guittith. D'Asaph.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Certains comprennent ce v. comme une conséquence du précédent  : Si tu m''écoutais, il n''y aurait pas… tu ne te prosternerais pas…  ; cf. Ex 20.3ss ; Dt 5.7ss ; Jos 24.23. –  dieu  : hébreu ’el , cf. Gn 21.33n.'
  - type: text
    content: Qu'il n'y ait pas chez toi d'autre dieu !
  - type: text
    content: Ne te prosterne pas devant un dieu étranger !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 20.2 ; Dt 5.6. –  monter d''Egypte Gn 12.10n. –  ouvre grand (litt. élargis ) ta bouche…  : cf. 119.131 ; Dt 18.18 ; Es 51.16 ; Jr 1.9 ; 15.16 ; Ez 3.3.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu,'
  - type: text
    content: celui qui t'a fait monter d'Egypte ;
  - type: text
    content: ouvre grand ta bouche, et je la remplirai.
  '12':
  - type: text
    content: ' '
  - type: note
    content: pas écouté Dt 1.43 ; Es 1.3 ; 66.4 ; Jr 7.26n  ; So 3.2.
  - type: text
    content: Mais mon peuple ne m'a pas écouté,
  - type: text
    content: Israël n'a pas voulu de moi.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'livrés  : cf. Jr 2.19 ; Ac 7.42 ; Rm 1.24,26. –  l''obstination de leur cœur Dt 29.18 ; Jr 3.17+.'
  - type: text
    content: 'Alors je les ai livrés à l''obstination de leur cœur :'
  - type: text
    content: ils ont suivi leurs propres conseils.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 1R 11.38 ; Es 48.18s.
  - type: text
    content: Oh ! si mon peuple m'écoutait,
  - type: text
    content: si Israël suivait mes voies !
  '15':
  - type: text
    content: En un instant j'humilierais leurs ennemis,
  - type: text
    content: je tournerais ma main contre leurs adversaires ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le flatteraient  : cf. 18.45 ; 66.3 ; Dt 33.29n. –  leur temps  : expression obscure ; certains y voient le temps du châtiment des ennemis, d''autres celui du bonheur d''Israël ; d''après Syr, quelques-uns modifient le texte hébreu traditionnel pour lire leur épouvante.'
  - type: text
    content: 'ceux qui détestent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le flatteraient,'
  - type: text
    content: et leur temps serait fixé pour toujours ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu…  : litt. il le nourrirait  ; certains modifient le texte hébreu traditionnel pour lire je le nourrirais. –  du meilleur froment  : litt. de la graisse du blé , de même en 147.14. –  je le rassasierais , d''après LXX et Syr ; texte hébreu traditionnel d''un rocher de miel je te rassasierais  ; cf. Dt 32.13 ; Es 7.22.'
  - type: text
    content: Dieu nourrirait Israël du meilleur froment,
  - type: text
    content: et je le rassasierais du miel du rocher.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'cris de joie 32.11+. –  notre force  : on pourrait aussi traduire notre forteresse , 21.2 ; 59.18 ; cf. 27.1+. –  Acclamez 27.6+ ; 47.2 ; 95.1ss. –  Jacob 14.7+ ; 46.7 ; 75.10.'
  - type: text
    content: Poussez des cris de joie vers Dieu, notre force !
  - type: text
    content: Acclamez le Dieu de Jacob !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Entonnez  : litt. élevez. –  la mélodie  : cf. 7.18n  ; 98.5 ; 118.14n  ; voir aussi 47.6-8 ; 92.2-4 ; 149.3 ; 150.3s.'
  - type: text
    content: Entonnez la mélodie, faites résonner le tambourin,
  - type: text
    content: la lyre douce et le luth !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'nouvelle lune Nb 10.10 ; 2R 4.23 ; Es 1.13 ; Os 2.13 ; Am 8.5. –  pleine lune / fête  : cf. Lv 23.24,34 ; Nb 29.1ss ; Dt 31.10 ; voir aussi Pr 7.20 ; certains mss hébreux et des versions anciennes ont lu de nos fêtes.'
  - type: text
    content: Sonnez de la trompe à la nouvelle lune,
  - type: text
    content: à la pleine lune, au jour de notre fête !
  '5':
  - type: text
    content: ' '
  - type: note
    content: Dt 33.10 ; cf. Ex 23.14 ; Lv 23.41ss ; voir aussi 2R 23.22 ; Né 8.17.
  - type: text
    content: Car c'est une prescription pour Israël,
  - type: text
    content: une règle du Dieu de Jacob.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Joseph signifie sans doute ici Israël en Egypte  ; cf. 77.16 ; 78.67 ; 80.2s ; 105.17. –  il sortit contre  : c.-à-d. il (Dieu) partit en guerre contre  ; LXX il (Joseph) sortit d''Egypte  ; cf. Ex 20.2. –  J''entends…  : LXX il entendit un langage qui lui était inconnu  ; cf. 62.12 ; 85.9 ; Nb 24.4,16 ; 1S 3.7 ; Es 5.9 ; 22.14 ; Jb 4.12-16.'
  - type: text
    content: C'est un témoignage qu'il a placé en Joseph,
  - type: text
    content: quand il sortit contre l'Egypte…
  - type: text
    content: 'J''entends un langage qui m''est inconnu :'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ex 1.11-14 ; 3.8 ; 5.6-9 ; 6.6 ; cf. 1R 11.28 ; voir aussi Ps 55.23 ; Mt 11.29s ; 1P 5.7. –  corbeille ou chaudron , cf. 2R 10.7n.
  - type: text
    content: J'ai déchargé son épaule du fardeau,
  - type: text
    content: ses mains ont lâché la corbeille.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Tu as crié (ou invoqué ) 4.2+ ; 34.5 ; 50.15 ; Ex 3.7 ; Jon 2.3. –  secret du tonnerre 18.12-14 ; 29.3ss ; 77.19 ; 104.7 ; Ex 19.16 ; Es 29.6. –  éprouvé (autre traduction sondé , cf. 7.10n) … Meriba 95.8s ; Ex 17 ; Nb 20 ; Dt 33.8.
  - type: text
    content: Tu as crié dans la détresse, et je t'ai délivré ;
  - type: text
    content: je t'ai répondu dans le secret du tonnerre ;
  - type: text
    content: 'je t''ai éprouvé près des eaux de Meriba. '
  - type: text
    content: Pause.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoute… 50.7 ; 78.1 ; Dt 4.1 ; 5.1 ; 6.4. –  et je t''avertirai  : autres traductions possibles je t''en adjure ; et je témoignerai contre toi (même expression en 50.7) ; cf. Dt 31.28.'
  - type: text
    content: Ecoute, mon peuple, et je t'avertirai.
  - type: text
    content: Israël, si tu m'écoutais !
