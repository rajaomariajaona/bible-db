document_id: DEU.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Respecter les biens du prochain
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 23.4. –  tu ne t''esquiveras pas  : autres traductions tu ne te déroberas pas ; tu ne fermeras pas les yeux (cf. v. 3s ; Lv 4.13n  ; 20.4).'
  - type: text
    content: 'Si tu vois s''égarer le bœuf de ton frère, son mouton ou sa chèvre, tu ne t''esquiveras pas : tu ne manqueras pas de les ramener à ton frère. '
  '10':
  - type: text
    content: 'Tu ne laboureras pas avec un bœuf et un âne attelés ensemble. '
  '11':
  - type: text
    content: Tu ne te revêtiras pas d'un tissu fait à la fois de laine et de lin.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'des glands ou des pompons  ; autre traduction des houppes  ; même mot en 1R 7.17 ( festons ) ; cf. Nb 15.37-40 (autre terme hébreu) ; Mt 9.20 ; 23.5. –  pans du vêtement  : le terme hébreu ainsi traduit peut, dans d''autres contextes, désigner des ailes ou un rebord.'
  - type: text
    content: Tu te feras des glands aux quatre pans du vêtement dont tu te couvriras.
  - type: heading
    content: Cas litigieux au sujet d'une femme
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ne l''aime pas  : litt. la déteste ou la hait , cf. 21.15n.'
  - type: text
    content: 'Si un homme qui a pris une femme et qui est allé avec elle ne l''aime pas, '
  '14':
  - type: note
    content: 's''il lui impute…  : autre traduction s''il porte contre elle des accusations sans fondement.'
  - type: text
    content: 's''il lui impute des agissements scandaleux et lui fait une mauvaise réputation, en disant : « J''ai pris cette femme, je me suis approché d''elle, et je n''ai pas trouvé chez elle les signes de la virginité », '
  '15':
  - type: note
    content: 'les signes de sa virginité  : il s''agit de la couverture ou du manteau (v. 17) dans lequel ont couché les jeunes mariés lors de la nuit de noces (cf. Ex 22.26) et qui porte des traces de sang ; cette couverture devait être conservée par les parents de la jeune fille. –  devant les anciens…  : litt. devant les anciens de la ville, à la porte 16.18n  ; 17.5n.'
  - type: text
    content: 'alors le père et la mère de la jeune femme prendront les signes de sa virginité et les produiront devant les anciens, à la porte de la ville. '
  '16':
  - type: text
    content: 'Le père de la jeune femme dira aux anciens : « J''ai donné ma fille pour femme à cet homme, et il ne l''aime pas ; '
  '17':
  - type: text
    content: 'il lui impute des agissements scandaleux, en disant : “Je n''ai pas trouvé les signes de la virginité chez ta fille.” Or voici les signes de virginité de ma fille. » Et ils déploieront le manteau devant les anciens de la ville. '
  '18':
  - type: text
    content: 'Les anciens de cette ville saisiront alors cet homme et lui infligeront une correction ; '
  '19':
  - type: note
    content: 'amende  : cf. Ex 21.22. –  cent pièces d''argent  : litt. cent (d’)argent  ; il s''agit vraisemblablement de sicles, comme le précise LXX, peut-être plutôt comme unité de poids que comme monnaie ; voir mesures. –  il ne pourra pas la renvoyer  : cf. v. 29. –  tant qu''il vivra  : litt. tous ses jours, de même au v. 29.'
  - type: text
    content: 'parce qu''il a fait une mauvaise réputation à une vierge d''Israël, ils le condamneront à une amende de cent pièces d''argent, qu''ils donneront au père de la jeune femme. Elle restera sa femme, et il ne pourra pas la renvoyer, tant qu''il vivra. '
  '2':
  - type: note
    content: 'n''habite pas…  : litt. n’(est) pas proche de toi. –  tu recueilleras l''animal  : litt. tu le recueilleras.'
  - type: text
    content: 'Si ton frère n''habite pas près de toi, et que tu ne le connaisses pas, tu recueilleras l''animal dans ta maison, et il restera chez toi jusqu''à ce que ton frère le réclame ; alors tu le lui rendras. '
  '20':
  - type: text
    content: 'Mais si la chose est vraie, si les signes de la virginité n''ont pas été trouvés chez la jeune femme, '
  '21':
  - type: note
    content: 'la lapideront 13.11+. –  une folie  : autre traduction une infamie  ; cf. Gn 34.7n  ; Jos 7.15 ; Jg 19.23n  ; 20.6 ; 2S 13.12 ; Jr 29.23. –  Tu élimineras… 13.6n.'
  - type: text
    content: on fera sortir la jeune femme à l'entrée de la maison de son père ; les gens de sa ville la lapideront ; elle mourra, parce qu'elle a commis une folie en Israël, en se prostituant dans la maison de son père. Tu élimineras ainsi de ton sein ce qui est mauvais.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '5.18 ; Lv 20.10 ; Jn 8.5. Cf. Code d''Hammourabi 129 : « Si la femme d''un homme a été surprise en train de coucher avec un autre homme, on les liera et on les jettera dans l''eau (pour les noyer). Si le maître de la femme veut faire grâce à sa femme, alors le roi aussi pourra faire grâce à son sujet (litt. “son serviteur”, c.-à-d. l''homme adultère). »'
  - type: text
    content: Si on trouve un homme couché avec une femme mariée, ils mourront tous les deux, l'homme qui a couché avec la femme, et la femme elle-même. Tu élimineras ainsi d'Israël ce qui est mauvais.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Code d''Hammourabi 130 : « Si un homme a usé de contrainte envers la femme (fiancée) d''un autre homme, qui n''avait pas eu de relation avec un mâle et qui vivait encore dans la maison de son père, pour coucher sur son sein, et qu''on l''ait surpris, cet homme sera mis à mort, mais la femme sera quitte. »'
  - type: text
    content: 'Si une jeune fille vierge est fiancée à quelqu''un, qu''un homme la trouve dans la ville et couche avec elle, '
  '24':
  - type: note
    content: V. 21. –  abusé 21.9n.
  - type: text
    content: 'vous les ferez sortir tous les deux à la porte de la ville ; vous les lapiderez, et ils mourront, la jeune fille pour n''avoir pas crié dans la ville, et l''homme pour avoir abusé de la femme de son prochain. Tu élimineras ainsi de ton sein ce qui est mauvais. '
  '25':
  - type: text
    content: 'Mais si c''est dans la campagne que cet homme trouve la jeune fille fiancée, si l''homme la saisit et couche avec elle, seul l''homme qui aura couché avec elle mourra. '
  '26':
  - type: note
    content: 'un péché passible de mort  : litt. un péché de mort, cf. 1Jn 5.16.'
  - type: text
    content: 'Tu ne feras rien à la jeune fille ; la jeune fille n''est pas coupable d''un péché passible de mort ; c''est comme si un homme se dressait contre son prochain pour l''assassiner. '
  '27':
  - type: note
    content: 'a pu crier  : litt. a crié.'
  - type: text
    content: 'Car c''est dans la campagne qu''il l''a trouvée : la jeune fille fiancée a pu crier sans qu''il y ait eu personne pour la sauver.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 34 ; Ex 22.15s ; 2S 13.
  - type: text
    content: 'Si un homme trouve une jeune fille vierge non fiancée, qu''il la saisisse et couche avec elle, et qu''on les trouve, '
  '29':
  - type: note
    content: V. 19n.
  - type: text
    content: l'homme qui aura couché avec elle donnera au père de la jeune fille cinquante pièces d'argent ; parce qu'il a abusé d'elle, il la prendra pour femme et il ne pourra pas la renvoyer, tant qu'il vivra.
  '3':
  - type: text
    content: 'Tu feras de même pour son âne, tu feras de même pour son manteau, tu feras de même pour tout ce que ton frère a perdu et que tu as trouvé ; tu ne pourras pas t''esquiver. '
  '4':
  - type: note
    content: Cf. Ex 23.5 ; Lc 14.5.
  - type: text
    content: 'Si tu vois l''âne de ton frère ou son bœuf tomber en chemin, tu ne t''esquiveras pas : tu l''aideras à le relever.'
  - type: heading
    content: Prescriptions diverses
  '5':
  - type: text
    content: ' '
  - type: note
    content: une abomination 7.25+ ; voir pur, impur.
  - type: text
    content: 'Une femme ne portera pas un habillement d''homme, et un homme ne mettra pas un manteau de femme : quiconque fait cela est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 22.28.
  - type: text
    content: 'Si tu trouves sur ton chemin un nid d''oiseau, sur un arbre quelconque ou sur la terre, avec des petits ou des œufs, et la mère couchée sur les petits ou sur les œufs, tu ne prendras pas la mère avec les petits : '
  '7':
  - type: note
    content: heureux 4.40n. –  tu prolonges tes jours 4.26+.
  - type: text
    content: tu laisseras s'en aller la mère et tu ne prendras que les petits, afin que tu sois heureux et que tu prolonges tes jours.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'en terrasse  : sous-entendu dans le texte ; il s''agit, comme souvent en Orient, d''un toit en terrasse où l''on va fréquemment s''installer. –  du sang 21.8, litt. des sangs  ; cf. Ex 22.1n  ; Es 1.15n.'
  - type: text
    content: Si tu bâtis une maison neuve, tu feras une balustrade autour de ton toit en terrasse, afin de ne pas mettre du sang sur ta maison, pour le cas où quelqu'un en tomberait.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'd''avoir à consacrer (voir saint) : c.-à-d. de rendre impropre à l''usage profane  ; cf. Lv 19.19n.'
  - type: text
    content: 'Tu ne sèmeras pas dans ta vigne deux espèces différentes, de peur d''avoir à consacrer tout le produit de ce que tu auras semé, avec la récolte de ta vigne. '
