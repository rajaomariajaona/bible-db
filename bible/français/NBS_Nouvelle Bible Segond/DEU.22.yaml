      - type: text
        text: '3'
    - type: text
      text: 'Tu feras de même pour son âne, tu feras de même pour son manteau, tu feras de même pour tout ce que ton frère a perdu et que tu as trouvé ; tu ne pourras pas t''esquiver. '
  '4':
