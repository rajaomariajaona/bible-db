document_id: DEU.22,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Respecter les biens du prochain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 23.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu ne t'esquiveras pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu ne te déroberas pas ; tu ne fermeras pas les yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 3s ; Lv 4.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.4).'
      marker-yv: yv-n
    - type: text
      text: 'Si tu vois s''égarer le bœuf de ton frère, son mouton ou sa chèvre, tu ne t''esquiveras pas : tu ne manqueras pas de les ramener à ton frère. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tu ne laboureras pas avec un bœuf et un âne attelés ensemble. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu ne te revêtiras pas d'un tissu fait à la fois de laine et de lin.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des glands '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des pompons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des houppes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même mot en 1R 7.17 (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: festons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; cf. Nb 15.37-40 (autre terme hébreu) ; Mt 9.20 ; 23.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pans du vêtement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu ainsi traduit peut, dans d''autres contextes, désigner des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ailes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rebord.
      marker-yv: yv-n
    - type: text
      text: Tu te feras des glands aux quatre pans du vêtement dont tu te couvriras.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cas litigieux au sujet d'une femme
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne l'aime pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la déteste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la hait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 21.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme qui a pris une femme et qui est allé avec elle ne l''aime pas, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'il lui impute…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il porte contre elle des accusations sans fondement.
      marker-yv: yv-n
    - type: text
      text: 's''il lui impute des agissements scandaleux et lui fait une mauvaise réputation, en disant : « J''ai pris cette femme, je me suis approché d''elle, et je n''ai pas trouvé chez elle les signes de la virginité », '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les signes de sa virginité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit de la couverture ou du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'manteau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 17) dans lequel ont couché les jeunes mariés lors de la nuit de noces (cf. Ex 22.26) et qui porte des traces de sang ; cette couverture devait être conservée par les parents de la jeune fille. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'devant les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devant les anciens de la ville, à la porte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'alors le père et la mère de la jeune femme prendront les signes de sa virginité et les produiront devant les anciens, à la porte de la ville. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le père de la jeune femme dira aux anciens : « J''ai donné ma fille pour femme à cet homme, et il ne l''aime pas ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'il lui impute des agissements scandaleux, en disant : “Je n''ai pas trouvé les signes de la virginité chez ta fille.” Or voici les signes de virginité de ma fille. » Et ils déploieront le manteau devant les anciens de la ville. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Les anciens de cette ville saisiront alors cet homme et lui infligeront une correction ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: amende
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 21.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cent pièces d'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cent (d’)argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit vraisemblablement de sicles, comme le précise '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', peut-être plutôt comme unité de poids que comme monnaie ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne pourra pas la renvoyer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tant qu'il vivra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous ses jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 29.'
      marker-yv: yv-n
    - type: text
      text: 'parce qu''il a fait une mauvaise réputation à une vierge d''Israël, ils le condamneront à une amende de cent pièces d''argent, qu''ils donneront au père de la jeune femme. Elle restera sa femme, et il ne pourra pas la renvoyer, tant qu''il vivra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'habite pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'n’(est) pas proche de toi. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu recueilleras l'animal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu le recueilleras.
      marker-yv: yv-n
    - type: text
      text: 'Si ton frère n''habite pas près de toi, et que tu ne le connaisses pas, tu recueilleras l''animal dans ta maison, et il restera chez toi jusqu''à ce que ton frère le réclame ; alors tu le lui rendras. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais si la chose est vraie, si les signes de la virginité n''ont pas été trouvés chez la jeune femme, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la lapideront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une folie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une infamie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 34.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 7.15 ; Jg 19.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.6 ; 2S 13.12 ; Jr 29.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu élimineras… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: on fera sortir la jeune femme à l'entrée de la maison de son père ; les gens de sa ville la lapideront ; elle mourra, parce qu'elle a commis une folie en Israël, en se prostituant dans la maison de son père. Tu élimineras ainsi de ton sein ce qui est mauvais.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.18 ; Lv 20.10 ; Jn 8.5. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '129 : « Si la femme d''un homme a été surprise en train de coucher avec un autre homme, on les liera et on les jettera dans l''eau (pour les noyer). Si le maître de la femme veut faire grâce à sa femme, alors le roi aussi pourra faire grâce à son sujet (litt. “son serviteur”, c.-à-d. l''homme adultère). »'
      marker-yv: yv-n
    - type: text
      text: Si on trouve un homme couché avec une femme mariée, ils mourront tous les deux, l'homme qui a couché avec la femme, et la femme elle-même. Tu élimineras ainsi d'Israël ce qui est mauvais.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code d''Hammourabi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '130 : « Si un homme a usé de contrainte envers la femme (fiancée) d''un autre homme, qui n''avait pas eu de relation avec un mâle et qui vivait encore dans la maison de son père, pour coucher sur son sein, et qu''on l''ait surpris, cet homme sera mis à mort, mais la femme sera quitte. »'
      marker-yv: yv-n
    - type: text
      text: 'Si une jeune fille vierge est fiancée à quelqu''un, qu''un homme la trouve dans la ville et couche avec elle, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abusé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'vous les ferez sortir tous les deux à la porte de la ville ; vous les lapiderez, et ils mourront, la jeune fille pour n''avoir pas crié dans la ville, et l''homme pour avoir abusé de la femme de son prochain. Tu élimineras ainsi de ton sein ce qui est mauvais. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mais si c''est dans la campagne que cet homme trouve la jeune fille fiancée, si l''homme la saisit et couche avec elle, seul l''homme qui aura couché avec elle mourra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' passible de mort'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un péché de mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1Jn 5.16.'
      marker-yv: yv-n
    - type: text
      text: 'Tu ne feras rien à la jeune fille ; la jeune fille n''est pas coupable d''un péché passible de mort ; c''est comme si un homme se dressait contre son prochain pour l''assassiner. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a pu crier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a crié.
      marker-yv: yv-n
    - type: text
      text: 'Car c''est dans la campagne qu''il l''a trouvée : la jeune fille fiancée a pu crier sans qu''il y ait eu personne pour la sauver.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 34 ; Ex 22.15s ; 2S 13.
      marker-yv: yv-n
    - type: text
      text: 'Si un homme trouve une jeune fille vierge non fiancée, qu''il la saisisse et couche avec elle, et qu''on les trouve, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
