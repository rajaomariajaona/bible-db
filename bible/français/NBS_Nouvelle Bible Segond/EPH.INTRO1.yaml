document_id: EPH.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''épître aux Ephésiens s''adresse-t-elle aux Ephésiens ? Les manuscrits les plus anciens ne comportent pas les mots '
    - type: usfm
      marker: it
      children:
      - type: text
        text: à Ephèse
    - type: text
      text: ' au premier verset : ni le papyrus P46 (daté des environs de l''an 200), ni ces deux princes parmi les grands manuscrits onciaux (c.-à-d. écrits en capitales) du IV'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle, le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sinaïticus
    - type: text
      text: ' et le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vaticanus
    - type: text
      text: '. Vers 140, le puissant hérétique Marcion en attribuait les éléments qu''il citait à une épître aux '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Laodicéens,
    - type: text
      text: ' celle, sans doute, que l''apôtre voulait faire lire aux Colossiens (Col 4.16) ; certains modernes ont repris cette hypothèse. D''autres, plus nombreux, penchent pour une suggestion du réformé français Théodore de Bèze et imaginent une lettre '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: circulaire,
    - type: text
      text: ' peut-être avec un « blanc » à remplir différemment selon les exemplaires : « à Ephèse », « à Laodicée », etc. Mais cela ne correspond guère aux habitudes de l''époque, ni à celles de Paul lorsqu''il écrit à plusieurs Eglises (comparer Ga 1.2).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Même les Pères de l''Eglise qui ne trouvent pas '
    - type: usfm
      marker: it
      children:
      - type: text
        text: à Ephèse
    - type: text
      text: ' dans le manuscrit dont ils disposent considèrent, pourtant, que l''épître était destinée aux Ephésiens : ainsi Basile de Césarée (≈ 329-379), Epiphane (≈ 315-403), Jérôme (≈ 331-420) et, déjà, Tertullien (≈ 155-220). Dès 180, Irénée de Lyon exprime une conviction semblable, et les paroles d''Ignace d''Antioche écrivant, vers 115, aux Ephésiens (de lui, la chose est sûre !), l''impliquent probablement (chapitre 12 de son épître). Sans exclure la perspective d''une audience plus large, il est raisonnable de compter parmi les destinataires originels les chrétiens d''Ephèse, la grande cité d''Asie Mineure, avec ses 200 000 habitants, son temple d''Artémis (Diane), son emblème de la déesse tombé du ciel (peut-être un météorite rappelant la forme féminine), et son théâtre de plus de 20 000 places. L''apôtre aurait œuvré près de trois ans dans cette ville (Ac 19.1–20.1 ; cf. 20.31) – sa plus longue halte de missionnaire itinérant. Il avait pu y nouer des amitiés durables.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une éloquence majestueuse
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Mais, justement, si l''apôtre était aussi lié aux Ephésiens, pourquoi se montre-t-il si impersonnel, presque distant ? Pourquoi, hormis le porteur, Tychique (6.21), ne mentionne-t-il pas de frères et de sœurs par leur nom comme il aime à le faire ? C''est cette différence qui rend l''idée de l''encyclique (circulaire) si attrayante. Elle oriente en tout cas vers un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: genre
    - type: text
      text: ' particulier, susceptible, en outre, d''expliquer l''écart entre le style de l''épître aux Ephésiens et celui des grandes épîtres.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'Antiquité, qui prisait moins que nous l'expression du génie individuel, modifiait volontiers le style selon le genre du discours. Sauf à penser que l'épître a été écrite plus tard par un disciple désireux de faire fructifier l'héritage paulinien, c'est le genre adopté qui fait comprendre le passage du style incisif et bondissant de l'épître aux Galates à l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: éloquence imposante,
    - type: text
      text: ' à la fois hiératique et ciselée, que nous découvrons ici. Comme on déploierait d''immenses draperies brodées, l''auteur déroule des phrases interminables et savamment agencées, surchargées de subordonnées et de participes (1.3-14 ne fait qu''une seule phrase dans le texte grec). Il se complaît dans la redondance, jusqu''à enfiler trois quasi-synonymes, « l''énergie (ou l''opération) du pouvoir de sa force » (1.19'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ). Il cherche le sublime et le solennel. Il cultive ainsi un genre oratoire goûté de ses contemporains et qui fait, en même temps, de sa lettre un sermon adapté à une liturgie grave et magnifique. En fait, les épîtres antérieures de l'apôtre contiennent aussi des passages analogues (cf. p. ex. 1Th 1.2-10 ; Rm 3.21-26), qui prouvent son aptitude à changer de style.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une synthèse sereine
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''autre trait littéraire frappant, c''est la multitude de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: parallèles
    - type: text
      text: ' avec d''autres épîtres du Nouveau Testament. On a pu, avec quelque exagération, parler d''anthologie de tout le corpus paulinien ; ainsi 5.5 reprend 1Co 6.9s, et 2.8ss résume la doctrine caractéristique de l''apôtre sur la foi et les œuvres : simples échantillons.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Curieusement, les similitudes sont aussi nombreuses avec la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'Première de Pierre :'
    - type: text
      text: ' même sorte de bénédiction majestueuse pour servir de porche d''entrée, même thème du Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pierre de l'angle
    - type: text
      text: ' (2.20 ; 1P 2.4-7) ; et les fameuses listes de préceptes domestiques (5.22–6.9 ; 1P 2.18–3.7).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ces préceptes se trouvent aussi dans l'épître aux
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Colossiens
    - type: text
      text: ' (Col 3.18–4.1), et c''est, bien sûr, avec elle que les éléments communs surabondent : sur les 115 versets de l''épître aux Ephésiens, 73 ont un parallèle proche dans l''épître jumelle. La reprise des formules mêmes est patente : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: en lui, nous avons la rédemption
    - type: text
      text: ' (1.7 ; Col 1.14) ; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: la parole de la vérité
    - type: text
      text: ' (1.13 ; Col 1.5) ; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: vous étiez morts du fait de vos fautes / il [vous] a rendus vivants
    - type: text
      text: ' (2.1,5 ; Col 2.13) ; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faites-vous grâce… comme Dieu vous a fait grâce
    - type: text
      text: ' (4.32 ; Col 3.13), etc. L''épître aux Ephésiens fait figure de version révisée et augmentée de l''autre, avec élimination de la polémique qu''avait exigée la situation à Colosses.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Si l''on écarte l''hypothèse d''une reprise de la pensée de Paul par un disciple postérieur, on peut supposer que Paul, prisonnier à Rome vers 62-63, après avoir dilaté sa vision théologique sous la nécessité de riposter à ses adversaires de Colosses, ait voulu faire une nouvelle synthèse de sa théologie, de « sa bonne nouvelle », à l''usage à la fois de la grande Eglise d''Ephèse et de toutes les Eglises composées essentiellement de chrétiens non juifs, en vertu de son ministère d''apôtre des non-Juifs. Peut-être lui avait-on demandé une épître-sermon pour une occasion spéciale, telle l''instruction aux nouveaux baptisés (on l''a envisagé à propos des ressemblances avec 1P). L''épître aux Ephésiens serait le pendant de l''épître aux Romains : celle-ci exposerait le premier état de la théologie paulinienne, dirigée contre les judaïsants encore imprégnés de légalisme pharisien ; l''épître aux Ephésiens correspondrait à son second état, quand le danger principal était devenu la prolifération des sectes ou '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: hérésies syncrétistes,
    - type: text
      text: ' où se mêlaient spéculations juives hétérodoxes, formes embryonnaires de gnose (voir « La question gnostique », p.${Xgnose}), et motifs chrétiens réinterprétés.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un point de vue céleste
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''expression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dans les lieux célestes
    - type: text
      text: ' est propre à l''épître aux Ephésiens et s''y répète (1.3'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ',20 ; 2.6 ; 3.10 ; 6.12). Elle signale commodément le point de vue original, plus spatial que temporel, de la synthèse. L''auteur part de l''accomplissement du Psaume 110 dans la résurrection et l''ascension du Christ, fréquemment évoqué dans le Nouveau Testament, pour célébrer son exaltation souveraine (1.20ss) et tout contempler dans sa perspective : l''épître est un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: panorama de l'histoire
    - type: text
      text: ' vue du ciel.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'D''où l''accent mis sur la prédestination « dans le Christ » (cf. la répétition de la formule '
    - type: usfm
      marker: it
      children:
      - type: text
        text: en lui,
    - type: text
      text: ' 1.4,9,11 ; voir aussi 2.10), sur la position déjà céleste des chrétiens '
    - type: usfm
      marker: it
      children:
      - type: text
        text: en Jésus-Christ
    - type: text
      text: ' (2.6), sur l''importance du témoignage donné aux '
    - type: usfm
      marker: it
      children:
      - type: text
        text: autorités
    - type: text
      text: ' et aux '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pouvoirs
    - type: text
      text: ' du monde invisible (3.10) et du combat spirituel contre eux (6.12ss). Ce point de vue céleste conduit à parler de l''Esprit saint, peu évoqué dans l''épître aux Colossiens (en particulier, Ep 1.13s ; 4.30 ; 5.18 ; 6.17s). A l''idée que l''Esprit est le gage de l''accomplissement se rattache l''annonce de la lumière, lumière de la résurrection, qui brille déjà (5.8-14).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'unité plénière
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La fin dévoile l''intention divine dans toute l''histoire : tout réunir ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: récapituler dans le Christ
    - type: text
      text: ' (1.10). Le thème de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'union
    - type: text
      text: ' ou '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: réunion
    - type: text
      text: ' est l''un des plus marqués de l''épître. Notre réunion à Dieu, dont nos péchés nous séparaient (2.1-10), entraîne celle des Juifs et des non-Juifs qui sont désormais, en Christ, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: un seul homme nouveau
    - type: text
      text: ' (2.11ss). L''auteur souligne l''importance de cette réconciliation, qui fonde son ministère d''apôtre des non-Juifs – ministère qui lui a valu tant de persécutions, et l''emprisonnement même dont il souffre alors qu''il écrit (3.1).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''union crée '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'Eglise
    - type: text
      text: '. L''épître aux Ephésiens est l''épître de l''Eglise (ici, toujours au singulier). Les sept piliers de son unité sont dressés : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: un seul corps et un seul Esprit… une seule espérance… un seul Seigneur, une seule foi, un seul baptême, un seul Dieu et Père de tous…
    - type: text
      text: ' (4.4ss). La question des dons pour les ministères est traitée sous l''angle de la collaboration et de l''harmonie (comparer 4.7ss avec Rm 12.3ss ; 1Co 12–14). Trois grandes métaphores éclairent ce qu''est l''Eglise et l''unité qu''on doit y voir : celle du '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: corps,
    - type: text
      text: ' déjà mentionnée (introduite dès 1.23), celle du '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: sanctuaire
    - type: text
      text: ' (2.20ss) et celle de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'épouse
    - type: text
      text: ' (5.23ss). L''unité s''accomplit dans la dépendance à l''égard de la '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: tête
    - type: text
      text: ' ou chef (1.22 ; 4.15s ; 5.23), la fermeté dans la foi et la connaissance, signes de maturité (4.13ss), et l''Esprit (4.3).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: La Trinité glorieuse
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''ampleur panoramique de la vision permet à l''épître de faire resplendir la gloire de Dieu dans le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Père,
    - type: text
      text: ' le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Fils
    - type: text
      text: ' et l’'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Esprit saint
    - type: text
      text: '. A cet égard, elle a des affinités avec les écrits johanniques (traditionnellement liés, on peut le noter, à l''Eglise d''Ephèse). La bénédiction initiale est trinitaire dans sa structure, comme l''est aussi, dans l''ordre inverse, le passage des « sept piliers » : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: un seul Esprit… un seul Seigneur… un seul Dieu et Père
    - type: text
      text: ' (4.4ss). Les rôles se dessinent précisément : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: par lui
    - type: text
      text: ' (le Fils) '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nous avons les uns et les autres accès auprès du Père dans un même Esprit
    - type: text
      text: ' (2.18), résume l''auteur, et il présente encore trinitairement la « maison de Dieu » (2.20ss). Pour lui, tout procède du Père dans les cieux (1.3), se réalise par le Fils au temps fixé (1.10) et devient vie dans l''Eglise par l''Esprit.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ces pensées si élevées n''autorisent, cependant, aucune fuite des tâches terrestres. Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: préceptes domestiques
    - type: text
      text: ' (5.22–6.9) enseignent à la fois le respect des ordres qui préservent la vie ici-bas et le renouvellement radical provoqué par la grâce et l''exemple divin révélés en Jésus-Christ. La manière de s''adresser directement aux femmes (d''abord), aux maris, aux serviteurs et aux maîtres est révolutionnaire, plus révolutionnaire que ne l''eût été un appel (alors utopique) à l''émancipation.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: '*'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: '* *'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''épître aux Ephésiens comptait sans doute les Ephésiens parmi ses premiers destinataires, mais aussi bien, elle nous est adressée : nous appartenons à cette audience plus large que nous n''avons pas pu exclure. Après un siècle dit « de l''Eglise », préoccupé d''unité, elle a beaucoup à nous apprendre sur les conditions de la réunion, vue des « lieux célestes ». Plus contemplative qu''argumentée, elle a le pouvoir de nourrir notre méditation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jusqu'à ce que nous soyons tous parvenus à l'unité de la foi et de la connaissance du Fils de Dieu, à l'état de l'homme adulte, à la mesure de la stature parfaite du Christ
    - type: text
      text: ' (4.13).'
