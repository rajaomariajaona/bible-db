document_id: ROM.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Un monument de la pensée apostolique
  - type: text
    content: Les grands théologiens, tout au long de l'histoire de l'Eglise, n'ont cessé de scruter l'épître aux Romains. C'est cependant au XVI
  - type: text
    content: e
  - type: text
    content: ' siècle que celle-ci a rencontré l''intérêt le plus vif : au centre des débats qui ont alors secoué la chrétienté occidentale, elle a enthousiasmé la '
  - type: text
    content: Réforme
  - type: text
    content: '. Or la question de la justification par la foi était le nœud de la controverse. On s''est donc concentré sur les chapitres 1 à 8, surtout 1 à 5, qui en traitent. Ce modèle de lecture s''est perpétué dans les siècles qui ont suivi, avec toutefois des modifications importantes : le '
  - type: text
    content: piétisme
  - type: text
    content: ' et les mouvements du réveil méthodiste ont mis en valeur les chapitres 6 à 8 avec leur exigence de sanctification. Plus récemment, l''intérêt renouvelé pour le destin d''Israël a remis à l''ordre du jour les chapitres 9 à 11. Bref, la richesse de l''épître aux Romains semble l''avoir condamnée à des lectures partielles. Aujourd''hui la dernière section du corps de la lettre (chapitres 12 à 15), avec ses directives pratiques, retient l''attention d''un grand nombre.'
  - type: text
    content: Paul et les chrétiens de Rome
  - type: text
    content: 'Campons le cadre historique. Paul se trouve, selon toute probabilité, à Corinthe (cf. Rm 16.23 et 1Co 1.14). Il a évangélisé les non-Juifs dans la partie orientale du bassin méditerranéen (Rm 15.19). Il a déjà rédigé une bonne partie de ses lettres (Thessaloniciens, Corinthiens, Galates, peut-être Philippiens). Reste une '
  - type: text
    content: mission
  - type: text
    content: ' urgente et périlleuse : apporter à Jérusalem le produit de la collecte des Eglises qu''il a fondées ; Paul espère un bon accueil de ce don qui doit sceller l''unité entre les deux composantes de l''Eglise primitive : les chrétiens d''origine juive et les chrétiens d''origine grecque (15.31). En lui, un '
  - type: text
    content: désir
  - type: text
    content: ' profond : se rendre à Rome, afin de jouir de la communion avec les chrétiens de la Ville, l’'
  - type: text
    content: Urbs,
  - type: text
    content: ' comme on l''appelait dans l''Empire (1.10-15 ; 15.22-24). Au-delà, un '
  - type: text
    content: horizon
  - type: text
    content: ', à l''extrémité occidentale du monde connu : l''Espagne (15.24,28). Paul est tiraillé entre la mission d''apporter la collecte à Jérusalem et ce désir d''aller à l''ouest : impossible de réaliser les deux à la fois (1.13 ; 15.22,25-32).'
  - type: text
    content: 'Paul écrit alors une lettre. Sur les circonstances de celle-ci, nous savons à la fois beaucoup et peu de chose. Nous connaissons jusqu''au nom du secrétaire, Tertius (16.22) ; c''est peut-être Phœbé de Cenchrées, bienfaitrice de Paul, qui a transmis la missive (16.1-2). Mais ses '
  - type: text
    content: destinataires
  - type: text
    content: ', qui sont-ils ? Nous ne le savons pas précisément. Une chose est certaine : le nom du Christ a été proclamé dans la capitale ; mais ce n''est pas l''apôtre Paul qui l''a prêché, car il n''est pas encore allé à Rome. Au moment où Paul écrit (57 ou 58, au début du règne de Néron), il se trouve déjà à Rome une majorité de chrétiens d''origine non juive (1.6). Forment-ils une seule Eglise ? Ce mot lui-même étant absent du corps de la lettre, certains en ont conclu que les chrétiens de Rome formaient seulement des groupes séparés. Le chapitre final, lui, évoque plusieurs Eglises de maison, avec des chrétiens d''origine juive et non juive (16.3-15). Des conflits portent sur des lois alimentaires, où les clivages dépendent probablement de l''attitude envers la loi de Moïse (14.1–15.13). Mais tout cela a fort bien pu se produire au sein d''une même assemblée.'
  - type: text
    content: Une vraie lettre ?
  - type: text
    content: 'L''épître aux Romains n''est donc pas seulement un exposé théologique, mais aussi une lettre (voir « Qu''est-ce qu''une épître ? », p.${Xepitre}) – sinon, l''introduction et la conclusion seraient-elles si personnelles et si étendues (1.1-15 et 15.14–16.27) ? Cependant les formules de la correspondance ordinaire s''y enrichissent d''une série de '
  - type: text
    content: développements originaux.
  - type: text
    content: ' Ainsi, dès l''introduction, entre la désignation de l''auteur et celle des destinataires, Paul insère diverses considérations sur sa mission et sur le Christ (1.1-7). De l''action de grâces habituelle (présente au début de toutes ses lettres, sauf Galates) Paul en vient aussitôt à son intention, plusieurs fois exprimée, de voir ses destinataires (1.8-15). Le thème est repris au chapitre 15, une fois l''exposé conclu. Là, les raisons de l''ajournement sont données : avant d''avoir achevé sa mission, Paul tenait à se rendre en priorité là où le Christ était inconnu (15.20-22) ; en outre, la mission à Jérusalem occasionnera un retard supplémentaire (15.25-28). Aussi les destinataires sont-ils incités à contribuer, par leurs prières, à la venue de l''apôtre (15.29-32). Enfin, le chapitre 16 conclut la lettre par une impressionnante série de salutations, interrompue par un coup de tonnerre dans un ciel serein : l''avertissement contre '
  - type: text
    content: ceux qui causent des divisions
  - type: text
    content: ' (16.17-20).'
  - type: text
    content: Il est vrai que les manuscrits ne contiennent pas tous ce chapitre final (voir les notes sur 16.20,24,27 pour l'état des documents). Certains ont supposé que l'apôtre ne l'avait pas écrit pour les Romains, mais qu'il l'avait ajouté à une copie de Romains 1–15 envoyée à Ephèse. Ils estiment invraisemblable que Paul ait eu autant d'amis à saluer à Rome, une ville où il ne s'était jamais rendu. La capitale, toutefois, attirait des ressortissants de tout l'Empire, car on voyageait beaucoup. Il reste donc plausible que Paul y ait connu de nombreux chrétiens. Dans ce cas, les deux ou trois bénédictions qui se succèdent avant la fin de la lettre seraient simplement l'effet d'un style répétitif.
  - type: text
    content: 'Le rapport entre lettre et exposé théologique n''est pas artificiel, comme le montre la transition : après avoir promis aux Romains de leur '
  - type: text
    content: annoncer la bonne nouvelle
  - type: text
    content: ' lors de sa venue (1.15), il passe à la présentation de cette '
  - type: text
    content: bonne nouvelle
  - type: text
    content: ' dans la lettre même (dès 1.16). Car là se trouve la vraie communion de Paul avec ses destinataires. Celle-ci ne consiste pas en un simple « être-ensemble », mais se construit autour de valeurs, d''une '
  - type: text
    content: foi
  - type: text
    content: ' commune qui demande à être explicitée et argumentée. Dans le monde païen d''alors, les lettres de Sénèque offrent une analogie : elles lient la communication de la doctrine stoïcienne à l''amitié exprimée dans la relation épistolaire. Ici, dans l''épître aux Romains, la raison et l''affectivité, loin de s''exclure, se renforcent l''une l''autre à un degré rarement atteint.'
  - type: text
    content: Polémique et consensus
  - type: text
    content: 'Le procédé dit de la '
  - type: text
    content: « diatribe »
  - type: text
    content: ' est abondamment employé dans l''épître aux Romains. C''est une méthode pédagogique qui consiste à '
  - type: text
    content: interpeller
  - type: text
    content: ' directement l''élève, à lui poser une question à laquelle le maître répond lui-même (ces questions aux réponses induites sont appelées « questions rhétoriques »), à anticiper une objection de sa part, à le prendre à partie de diverses manières. Si l''auditeur semble malmené par ces propos, ce n''est pas forcément parce que l''enseignant combat directement ses opinions ; c''est plutôt une manière de le faire participer à ce qui se dit, ou de lui montrer en quoi cela le concerne personnellement. Dans l''épître aux Romains, on rencontre deux utilisations de la diatribe : certains passages prennent véritablement le lecteur à partie et d''autres, par une question ou une objection purement rhétoriques, visent simplement à faire avancer l''argumentation (2.1-5,17-24 ; 3.1-8 ; 6.1-3 ; 7.1,7 ; 8.31-39 ; 9.14-23,30-33 ; 10.14-21 ; 11.1-10,11-24).'
  - type: text
    content: 'Certes, l''exposé se veut consensuel et irénique, mais c''est aussi une leçon sur les '
  - type: text
    content: limites
  - type: text
    content: ' de l''accord. A la fin de son propos, Paul s''excuse d''avoir '
  - type: text
    content: écrit avec une certaine audace
  - type: text
    content: ' (15.15). Il s''est exprimé avec vivacité à propos des « forts » et des « faibles » (14.1). Cette polémique rejaillit peut-être dans le brusque avertissement de 16.17-20 : les adversaires sont accusés de servir '
  - type: text
    content: leur propre ventre,
  - type: text
    content: ' alors que le problème des « forts » et des « faibles » est justement d''ordre alimentaire (cf. les expressions '
  - type: text
    content: cause de chute
  - type: text
    content: ' et '
  - type: text
    content: pierre d'achoppement
  - type: text
    content: ' en 14.13 et 16.17). Néanmoins, même quand Paul doit tailler dans le vif, c''est pour réconcilier des chrétiens qui s''excluent mutuellement. Tandis que l''épître aux Galates condamne ceux qui mettent l''Evangile en péril, l''épître aux Romains appelle les chrétiens d''origine juive ou non juive à vivre ensemble dans la louange au Dieu d''Israël qui est aussi le Dieu de Jésus-Christ (15.6).'
  - type: text
    content: 'Quant au procédé de la diatribe, il n''est pas un simple artifice de style. Sa vigueur s''accorde au mouvement profond de la pensée paulinienne. Au lieu de constamment nuancer son propos, Paul préfère poser des '
  - type: text
    content: affirmations massives
  - type: text
    content: ' et y revenir pour les '
  - type: text
    content: corriger
  - type: text
    content: ' ou les '
  - type: text
    content: modifier
  - type: text
    content: '. S''il se lance d''entrée de jeu dans une proclamation retentissante de la colère de Dieu contre le péché (1.18–3.20), c''est pour mieux affirmer ce qui lui tient le plus à cœur : l''égalité de tous, Juifs et non-Juifs, dans le jugement annonce, en creux pour ainsi dire, que tous bénéficient solidairement de la grâce de Dieu dont ils ont semblablement besoin. De même, si Paul prône d''abord la justice de Dieu par la foi '
  - type: text
    content: indépendamment de la loi, indépendamment des œuvres de la loi
  - type: text
    content: ' (3.21,28 ; cf. 10.4), c''est pour préciser aussitôt que par là même '
  - type: text
    content: nous confirmons la loi
  - type: text
    content: ' (3.31). Au chapitre 7 où la question est développée, il est déclaré sans ambages que la loi, sainte, juste et bonne (7.12), ne saurait être abolie, mais que ceux qui sont « morts avec le Christ » sont '
  - type: text
    content: morts pour la loi
  - type: text
    content: ' et ne sont dès lors plus sous sa juridiction (7.1-6) ; cela n''empêche pas que, par l''Esprit, ils accomplissent précisément '
  - type: text
    content: la justice prescrite par la loi
  - type: text
    content: ' (8.4), telle que la résume le Décalogue (13.8-10). Cette logique de balancier montre comment, dans l''épître aux Romains, Paul va jusqu''au bout des questions qu''il aborde. On perçoit ici la maîtrise de l''apôtre.'
  - type: text
    content: Un condensé de l'Evangile
  - type: text
    content: Le caractère fortement charpenté et structuré de l'épître aux Romains saute aux yeux. Pourtant, l'accord n'est pas fait sur le détail de cette construction. Le découpage classique (introduction – doctrine – exhortation – conclusion), qui peut valoir pour certaines autres épîtres, convient fort peu à l'épître aux Romains.
  - type: text
    content: 'Le texte suggère, par divers indices, le plan suivi par l''apôtre (voir ci-contre « Plan de l''épître »). Paul a en effet utilisé des '
  - type: text
    content: procédés littéraires
  - type: text
    content: ' fréquemment mis en œuvre à son époque, entre autres l''inclusion (le début et la fin d''un développement sont marqués par l''emploi d''un même mot) ; le mot-crochet (le même mot sert à relier deux paragraphes consécutifs) ; la concentration de vocabulaire caractéristique (ainsi les verbes correspondant à '
  - type: text
    content: vivre
  - type: text
    content: ' et à '
  - type: text
    content: mourir
  - type: text
    content: ' sont utilisés chacun 12 fois dans les chapitres 5 à 8).'
  - type: text
    content: Ces ponctuations littéraires sont ici mises au service de la pensée. Ce que Paul avait esquissé çà et là dans ses écrits antérieurs, il l'élabore maintenant avec force. En fait, c'est tout l'Evangile qu'il formule dans cette épître. Le plan ci-dessus en fait apparaître les quatre grands mouvements.
  - type: text
    content: 'L''épître aux Romains reste, à toutes les époques, une pierre de touche pour la pensée chrétienne. Il s''agit en effet de l''exposé le plus '
  - type: text
    content: systématique
  - type: text
    content: ' de la substance de l''Evangile dans le Nouveau Testament. Or la tentation guette toujours de prendre l''Evangile pour une nouvelle loi, souvent plus contraignante encore que celle des pharisiens, quand même elle se déguiserait en proclamation de la grâce. Toute consigne, même la plus utile, si elle devient subrepticement chemin de salut, ne conduit jamais qu''à la situation désespérée où l''agir ne suit pas le vouloir (cf. chap. 7).'
  - type: text
    content: La puissance de l'Evangile pour libérer, clé de la compréhension vraie des quatre évangiles eux-mêmes (rédigés plus tard), se trouve dans cette lettre qu'il faut aimer, et donc connaître, même si l'expression en semble parfois un peu difficile. Cet Evangile n'est pas du lait, mais une nourriture solide pour une humanité adulte.
