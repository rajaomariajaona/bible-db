document_id: PSA.71,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne me rejette pas au temps de la vieillesse
  - type: text
    content: ' '
  - type: note
    content: 'LXX a le titre suivant  : De (ou à ) David, des fils de Jonadab et des premiers exilés (cf. Jr 35). –  Seigneur …  : voir 31.2ss et les notes. –  je trouve un abri 7.2+.'
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est en toi que je trouve un abri :'
  - type: text
    content: que jamais je n'aie honte !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui m''épient  : litt. qui me gardent ou qui gardent ma vie , expression qui est prise ailleurs en bonne part (25.10) mais qui a de toute évidence ici le sens négatif de guetter, espionner pour faire du tort (cf. 56.7n  ; 35.4n).'
  - type: text
    content: Car mes ennemis parlent de moi,
  - type: text
    content: et ceux qui m'épient tiennent conseil ensemble,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.3. –  poursuivez-le  : litt. poursuivez.'
  - type: text
    content: 'disant : Dieu l''a abandonné ;'
  - type: text
    content: poursuivez-le, saisissez-le ; il n'y a personne pour le délivrer.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.12,20 ; 27.9 ; 38.23 ; 40.14s ; 70.2-4.
  - type: text
    content: O Dieu, ne t'éloigne pas de moi !
  - type: text
    content: Mon Dieu, viens vite à mon secours !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 24 ; 35.4n  ; 109.29 ; 132.18. –  qu''ils disparaissent ou qu''ils soient exterminés  ; certains modifient le texte hébreu traditionnel pour lire qu''ils soient confus. –  ceux qui s''opposent à moi  : autres traductions ceux qui m''accusent ; ceux qui en veulent à ma vie  ; cf. 38.21n  ; 109.6n. –  de déshonneur  : autre traduction d''outrages. –  confusion 4.3+. –  ceux qui cherchent à me faire du mal  : autre traduction ceux qui veulent mon malheur  ; cf. v. 24 ; Nb 35.23 ; 1S 24.10 ; 25.26.'
  - type: text
    content: Qu'ils soient honteux, qu'ils disparaissent,
  - type: text
    content: ceux qui s'opposent à moi !
  - type: text
    content: Qu'ils soient couverts de déshonneur et de confusion,
  - type: text
    content: ceux qui cherchent à me faire du mal !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'je te louerai de plus en plus  : litt. j''ajouterai à toute ta louange.'
  - type: text
    content: Et moi, j'attendrai constamment,
  - type: text
    content: je te louerai de plus en plus.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'sans cesse v. 8. –  le compte  : traduction conjecturale d''un terme qui n''apparaît qu''ici et qui semble dérivé du verbe traduit par compter ou raconter en 40.6 ; cf. 139.17s ; plusieurs versions anciennes ont compris je n''en connais pas les lettres ( ?).'
  - type: text
    content: Ma bouche racontera sans cesse ta justice, ton salut,
  - type: text
    content: car je n'en connais pas le compte.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''avancerai ou j''entrerai  ; cf. 118.19ss. –  avec des hauts faits  : plusieurs mss hébreux et versions anciennes ont lu avec la puissance du Seigneur…  ; cf. 145.5. –  la tienne seule  : litt. toi seul.'
  - type: text
    content: Je m'avancerai avec des hauts faits.
  - type: text
    content: 'Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ','
  - type: text
    content: j'évoquerai ta justice, la tienne seule.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'depuis ma jeunesse  : cf. v. 5s. –  je dis (ou je raconte ) tes actes étonnants 26.7+.'
  - type: text
    content: O Dieu, tu m'as instruit depuis ma jeunesse,
  - type: text
    content: et jusqu'ici je dis tes actes étonnants.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9. –  ta force  : litt. ton bras. –  à cette génération… 22.31+.'
  - type: text
    content: Aussi, jusque dans la vieillesse aux cheveux blancs,
  - type: text
    content: ô Dieu, ne m'abandonne pas,
  - type: text
    content: afin que je dise ta force à cette génération,
  - type: text
    content: ta puissance à tous ceux qui viendront ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ta justice…  : autre traduction et ta justice… qui atteint des hauteur  ; 36.6s. –  de grandes choses Lc 1.49. –  qui est semblable à toi 35.10+.'
  - type: text
    content: ta justice, ô Dieu, atteint les hauteurs,
  - type: text
    content: 'car tu as fait de grandes choses :'
  - type: text
    content: O Dieu, qui est semblable à toi ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'délivre-moi…  : litt. tu me délivreras et tu me feras échapper. –  Tends vers moi… 5.2+.'
  - type: text
    content: Dans ta justice, délivre-moi et donne-moi d'échapper !
  - type: text
    content: Tends vers moi ton oreille, et sauve-moi !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Tu nous…  : autre lecture traditionnelle  : tu m''as fait éprouver… tu me redonneras…  ; cf. 22.5ss. –  tu nous redonneras…  : autre traduction tu reviendras nous donner la vie (85.7) , tu reviendras pour me faire remonter des abîmes…  ; 30.4 ; 1S 2.6 ; cf. Rm 10.7.'
  - type: text
    content: Tu nous as fait éprouver bien des détresses et des malheurs ;
  - type: text
    content: mais tu nous redonneras la vie,
  - type: text
    content: tu me feras remonter des abîmes de la terre.
  '21':
  - type: text
    content: Accrois ma grandeur,
  - type: text
    content: console-moi de nouveau !
  '22':
  - type: text
    content: ' '
  - type: note
    content: je jouerai (le verbe correspondant est rendu par jouer des psaumes au v. 23, voir 7.18n) de la lyre 33.2+ ; 43.4 ; 98.5 ; 147.7. –  Saint d'Israël 78.41 ; 89.19 ; cf. 99.3,5,9 ; Es 1.4+.
  - type: text
    content: Et moi aussi je te célébrerai au son du luth
  - type: text
    content: pour ta loyauté, mon Dieu,
  - type: text
    content: je jouerai de la lyre pour toi,
  - type: text
    content: Saint d'Israël !
  '23':
  - type: text
    content: ' '
  - type: note
    content: '119.171. –  Je pousserai…  : litt. mes lèvres pousseront des cris de joie. –  je jouerai des psaumes (v. 22+)… ou je chanterai pour toi. –  toute ma vie  : autre traduction mon âme. –  chantera pour toi  : le verbe est sous-entendu dans le texte.'
  - type: text
    content: Je pousserai des cris de joie quand je jouerai des psaumes pour toi ;
  - type: text
    content: toute ma vie, que tu as libérée, chantera pour toi.
  '24':
  - type: text
    content: ' '
  - type: note
    content: V. 13 ; 35.26,28 ; 51.16. –  redira 1.2n  ; 35.28+.
  - type: text
    content: Ma langue redira sans cesse ta justice,
  - type: text
    content: car ils ont honte et rougissent,
  - type: text
    content: ceux qui cherchent à me faire du mal.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un rocher qui me serve de refuge (même terme en 90.1 ; 91.9 ; cf. 26.8n) : plusieurs mss hébreux et des versions anciennes ont lu un rocher fortifié , comme en 31.3 ; cf. 18.3+. –  tu as ordonné d''y venir constamment  : traduction incertaine ; on pourrait aussi comprendre  : tu l''as institué de façon constante, pour qu''on puisse y venir , ou bien  : pour y venir constamment ; tu as ordonné de me sauver  ; LXX une forteresse pour que je sois sauvé , comme en 31.3.'
  - type: text
    content: Sois pour moi un rocher qui me serve de refuge
  - type: text
    content: – tu as ordonné d'y venir constamment –
  - type: text
    content: pour que je sois sauvé,
  - type: text
    content: car tu es mon roc et ma forteresse !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 59.3+.
  - type: text
    content: Mon Dieu, donne-moi d'échapper au méchant,
  - type: text
    content: à l'homme injuste et aigri !
  '5':
  - type: text
    content: ' '
  - type: note
    content: '22.10s. –  c''est à toi que je me fie  : autres traductions ma confiance, ma sécurité.'
  - type: text
    content: 'Car tu es mon espoir, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ','
  - type: text
    content: c'est à toi que je me fie depuis ma jeunesse.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'c''est toi qui m''as fait sortir  : traduction incertaine d''un terme hébreu qui n''apparaît qu''ici et qui ressemble à celui de 22.10 ; certains mss hébreux et des versions anciennes ont lu tu es ma force (ou mon protecteur ) depuis le sein maternel  ; cf. 139.13 ; Es 44.2 ; 49.1. –  tu es constamment…  : litt. en toi ma louange constamment  ; cf. Dt 10.21n  ; Jr 17.14n.'
  - type: text
    content: Depuis le ventre de ma mère je m'appuie sur toi ;
  - type: text
    content: c'est toi qui m'as fait sortir du sein maternel ;
  - type: text
    content: tu es constamment l'objet de ma louange.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 31.12. –  un sujet d''étonnement  : litt. comme un prodige ou un présage , ce qui signifie peut-être : un exemple vivant de la malédiction divine ; cf. Dt 28.46 ; voir aussi Es 8.18 ; Ez 12.6,11 ; 24.24,27. –  mais toi… 3.4 ; 142.4. –  abri v. 1 ; 7.2n  ; 46.2 ; 62.8s.'
  - type: text
    content: Je suis un sujet d'étonnement pour la multitude,
  - type: text
    content: mais toi, tu es mon puissant abri.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '51.17. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Que ma bouche soit remplie de ta louange,
  - type: text
    content: de ta splendeur, sans cesse !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 11s,18 ; 22.12 ; 38.22. –  rejette  : même verbe en Gn 21.15 ; Jr 38.6,9 ; Ez 16.5.'
  - type: text
    content: Ne me rejette pas au temps de la vieillesse ;
  - type: text
    content: quand ma force s'épuise, ne m'abandonne pas !
