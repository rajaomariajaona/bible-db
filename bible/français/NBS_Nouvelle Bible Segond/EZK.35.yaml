document_id: EZK.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les Edomites
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Les deux nations / pays  : vraisemblablement Juda et Israël (37.16ss), séparés depuis le schisme de 1R 12 ; cf. Ps 83.13. –  mais le Seigneur était là  : autre traduction bien que le Seigneur fût là  ; cf. 36.5 ; 48.35 ; Jr 2.7 ; 16.18 ; Jl 1.6 ; 4.2.'
  - type: text
    content: 'Parce que tu as dit : « Les deux nations, les deux pays m''appartiendront, et nous en prendrons possession » – mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était là – '
  '11':
  - type: note
    content: 'Cf. Am 1.11 ; Ab 15. –  colère / passion jalouse  : cf. 5.13+ ; 36.5-7 ; 38.18s. –  parmi eux  : LXX à toi.'
  - type: text
    content: 'à cause de cela, par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – j''agirai avec la colère et la passion jalouse que tu as montrées dans ta haine contre eux ; ainsi je me ferai connaître parmi eux, quand je te jugerai. '
  '12':
  - type: note
    content: V. 15.
  - type: text
    content: 'Ainsi tu sauras que moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), j''ai entendu tous les propos méprisants que tu as proférés contre les montagnes d''Israël : « Elles sont dévastées, elles nous sont données en pâture ! » '
  '13':
  - type: note
    content: 'vos discours  : litt. votre bouche. –  vous avez tenu… des propos grossiers  : sens incertain, traduction conjecturale ; le verbe hébreu signifie habituellement supplier, intercéder (8.11n  ; Gn 25.21n  ; Ex 8.4ns,26) ; en le rapprochant d''un homonyme araméen, on pourrait aussi traduire vous avez multiplié les paroles. –  je les ai entendus Ps 94.9.'
  - type: text
    content: Vous vous êtes élevés contre moi par vos discours, vous avez tenu contre moi des propos grossiers, je les ai entendus moi-même.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'tout le pays  : autre traduction toute la terre.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Lorsque tout le pays se réjouira, je ferai de toi un lieu dévasté. '
  '15':
  - type: note
    content: Cf. 36.5. –  Séir / Edom v. 2+.
  - type: text
    content: 'A cause de la joie que tu as éprouvée parce que le patrimoine de la maison d''Israël était dévasté, je te traiterai de la même manière ; tu deviendras un lieu dévasté, région montagneuse de Séir, toi, ainsi qu''Edom tout entier ; ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi vers (ou contre ) : cf. 4.3+ ; 29.2. –  Séir ou Edom 25.8n,12+. –  parle… en prophète 4.7n.'
  - type: text
    content: 'Humain, tourne-toi vers la région montagneuse de Séir et parle sur eux en prophète ! '
  '3':
  - type: note
    content: Cf. 6.14+ ; 25.13.
  - type: text
    content: 'Tu lui diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Je m'oppose à toi, région montagneuse de Séir !
  - type: text
    content: J'étendrai la main sur toi
  - type: text
    content: et je ferai de toi un lieu complètement dévasté.
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 9.
  - type: text
    content: Je réduirai tes villes en ruines,
  - type: text
    content: tu deviendras un lieu dévasté ;
  - type: text
    content: 'ainsi tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'hostilité perpétuelle  : cf. 25.15+ ; Gn 27.41 ; Nb 20.20s. –  précipité  : cf. Jr 18.21n  ; Ps 63.11. –  au temps où la catastrophe…  : litt. au temps de leur catastrophe . –  au temps où la faute… 21.30n.'
  - type: text
    content: 'Parce que tu as eu une hostilité perpétuelle, parce que tu as précipité les Israélites sur le tranchant de l''épée au temps où la catastrophe s''abattait sur eux, au temps où la faute était à son comble, '
  '6':
  - type: note
    content: 'par ma vie / à coup sûr 5.11n. –  tu as détesté le sang  : texte obscur ; on pourrait aussi traduire  : si tu n''as pas détesté le sang. Certains interprètent ici le mot sang au sens de ta parenté. LXX omet les deux propositions précédentes et lit ici tu as péché pour le sang, c.-à-d. en versant le sang. –  le sang te poursuivra  : cf. 24.7n.'
  - type: text
    content: '– par ma vie (déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '), je te mettrai en sang, et le sang te poursuivra ; à coup sûr, tu as détesté le sang : le sang te poursuivra. '
  '7':
  - type: note
    content: 'Cf. v. 3 ; voir aussi 33.28. –  entièrement dévasté  : expression analogue au v. 3, où le texte hébreu répète deux mots apparentés ; ici, le texte répète deux fois le même mot. –  ceux qui vont…  : autre traduction ceux qui passent et ceux qui reviennent  ; même expression hébraïque en Za 7.14 ; 9.8.'
  - type: text
    content: 'Je ferai de la région montagneuse de Séir un lieu entièrement dévasté et j''en retrancherai ceux qui vont et ceux qui viennent. '
  '8':
  - type: note
    content: victimes 30.4n.
  - type: text
    content: Je remplirai ses montagnes de victimes ; sur tes collines, dans tes vallées, dans tous tes ravins, tomberont les victimes de l'épée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: V. 4.
  - type: text
    content: Je ferai de toi des lieux dévastés pour toujours,
  - type: text
    content: tes villes ne seront plus habitées ;
  - type: text
    content: 'ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
