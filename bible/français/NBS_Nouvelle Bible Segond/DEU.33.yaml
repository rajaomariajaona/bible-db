document_id: DEU.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Moïse bénit les douze tribus d'Israël
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 49. – Voir bénédiction. –  Moïse, l'homme de Dieu Jos 14.6 ; Ps 90.1 ; Esd 3.2 ; 1Ch 23.14 ; 2Ch 30.16 ; ce titre est également donné à David (Né 12.24,36 ; 2Ch 8.14), aux prophètes Elisée (2R 4.7,21ss ; 5.8ss ; 6.6ss ; 7.2,17ss ; 8.2ss ; 13.19) et Shemaya (1R 12.22/ /) et à plusieurs prophètes anonymes (Jg 13.8 ; 1S 9.7ss ; 1R 13.4ss ; 20.28 ; 2R 23.16s ; 2Ch 25.7ss).
  - type: text
    content: 'Voici la bénédiction par laquelle Moïse, l''homme de Dieu, bénit les Israélites avant sa mort. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''ils enseignent  : c''est du verbe correspondant que vient le mot tora, loi (comme au v. 4) ; cf. Lv 10.11 ; Ag 2.11-13 ; Ml 2.7 ; Siracide 45.17 : « Il (Dieu) lui donna (à Aaron) dans ses commandements pouvoir sur les prescriptions de la loi, pour enseigner à Jacob ses exigences et illuminer Israël par sa loi. » –  offrande entière Lv 6.15s. – Cf. 1S 2.28.'
  - type: text
    content: Qu'ils enseignent tes règles à Jacob
  - type: text
    content: et ta loi à Israël !
  - type: text
    content: Qu'ils mettent l'encens sous tes narines,
  - type: text
    content: et l'offrande entière sur ton autel !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'sa force  : le même mot est aussi traduit par troupe, armée  ; cf. Nb 16–17.5. –  qui s''élèvent ou qui se dressent contre lui  : le même verbe est traduit par se relèvent dans la suite.'
  - type: text
    content: 'Bénis sa force, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Agrée l'œuvre de ses mains !
  - type: text
    content: Fracasse les reins de ceux qui s'élèvent contre lui,
  - type: text
    content: 'et de ceux qui le détestent : qu''ils ne se relèvent plus !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Benjamin Gn 49.27. –  bien-aimé du Seigneur  : cf. 2Th 2.13. –  demeure en sécurité v. 28. –  le Seigneur le protège  : litt. il le protège . –  entre ses épaules  : allusion probable à un sanctuaire installé sur des collines de Benjamin, soit à Silo (1S 1–3) soit à Jérusalem.'
  - type: text
    content: 'Sur Benjamin, il dit :'
  - type: text
    content: 'C''est le bien-aimé du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: il demeure en sécurité auprès de lui ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le protège toujours,'
  - type: text
    content: et il demeure entre ses épaules.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Joseph Gn 49.22-26. –  l'abîme 8.7n  ; Gn 1.2n.
  - type: text
    content: 'Sur Joseph, il dit :'
  - type: text
    content: 'Son pays est béni du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: par les largesses du ciel, par la rosée,
  - type: text
    content: par l'abîme étendu en bas,
  '14':
  - type: text
    content: ' '
  - type: note
    content: lune ou lunaison  ; le mot hébreu correspondant est aussi traduit par mois en 21.13.
  - type: text
    content: par les largesses des produits du soleil,
  - type: text
    content: par les largesses de ce qui germe à chaque lune,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les meilleurs produits  : litt. la tête  ; cf. Gn 49.26 ; Ha 3.6. –  des montagnes du temps jadis  : on pourrait aussi comprendre des montagnes de l''est ou de l''Orient (voir aussi v. 27 ; Nb 23.7).'
  - type: text
    content: par les meilleurs produits des montagnes du temps jadis,
  - type: text
    content: par les largesses des collines d'autrefois,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'de tout ce qui s''y trouve ou, plus littéralement, de ce qui la remplit  ; cf. Ps 24.1+. –  dans le buisson  : cf. Ex 3.2nss. –  sur le crâne…  : litt. sur le crâne (même mot en 28.35, cf. 33.20) du nazir (cf. Nb 6) de ses frères  ; voir Gn 49.26n.'
  - type: text
    content: par les largesses de la terre et de tout ce qui s'y trouve.
  - type: text
    content: Que la faveur de celui qui demeure dans le buisson
  - type: text
    content: vienne sur la tête de Joseph,
  - type: text
    content: sur le crâne de celui qui a été consacré parmi ses frères !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le premier-né de son taureau ou du taureau , selon plusieurs mss hébreux et des versions anciennes ; cf. Nb 23.22. –  cornes de l''aurochs  : cf. Ps 92.11+. –  les peuples…  : autre traduction, d''après LXX  : tous les peuples ensemble, jusqu''aux extrémités de la terre (ou du pays ) (cf. Es 1.28n). –  milliers ou phratries  ; sur le double sens du terme correspondant, voir Nb 1.16n  ; Mi 5.1n. –  Ephraïm et Manassé constituent ensemble la maison de Joseph ; cf. Gn 48.13-20.'
  - type: text
    content: C'est le premier-né de son taureau, à lui la magnificence !
  - type: text
    content: Ses cornes sont les cornes de l'aurochs ;
  - type: text
    content: avec elles il frappera les peuples,
  - type: text
    content: 'toutes les extrémités de la terre :'
  - type: text
    content: telles sont les dizaines de milliers d'Ephraïm,
  - type: text
    content: tels sont les milliers de Manassé.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Zabulon / Issacar Gn 49.13-15. –  dans tes expéditions  : litt. dans ta sortie , comme en 28.6n.'
  - type: text
    content: 'Sur Zabulon, il dit :'
  - type: text
    content: Réjouis-toi, Zabulon, dans tes expéditions,
  - type: text
    content: et toi, Issacar, dans tes tentes !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les peuples v. 3+. –  la montagne  : probablement le Tabor ; cf. Jg 4.12-16. –  des sacrifices de justice  : l''expression signifie peut-être des sacrifices conformes aux prescriptions de la loi ; cf. Ps 4.6 ; 51.21. –  suceront ou tèteront 32.13n. –  l''abondance de la mer , sans doute liée au commerce maritime des Phéniciens ; cf. Es 60.5. –  le sable des plages était utilisé pour la fabrication du verre ; c''est aussi là qu''on trouvait les coquillages d''où l''on tirait la pourpre (cf. Ex 25.4n).'
  - type: text
    content: Ils appelleront les peuples à la montagne ;
  - type: text
    content: là, ils offriront des sacrifices de justice,
  - type: text
    content: car ils suceront l'abondance de la mer,
  - type: text
    content: et les trésors cachés dans le sable.
  '2':
  - type: note
    content: 'Sinaï Ps 68.16-18. –  il s''est levé  : c''est le verbe habituellement employé pour le lever des astres. –  sur eux  : LXX sur nous  ; certains modifient le texte hébreu traditionnel pour lire sur son peuple  ; d''autres y ont vu le nom ou le titre d''une divinité (Lim s''est levé de Séir). –  Séir 1.2+ ; cf. Jg 5.4s. –  Parân Gn 21.21n  ; Nb 12.16 ; Ha 3.3. –  il a paru…  : cf. Ps 50.2n. –  d''entre des dizaines de milliers de saints  : litt. de myriades (= dizaines de milliers) de sainteté, en hébreu méribboth qodesh  ; LXX des myriades de Qadesh. Certains modifient le texte hébreu traditionnel pour lire ici une désignation de Meriba de Qadesh, autre étape de l''Exode (1.19-46 ; 32.51) ; cf. Jd 14n. –  De sa main droite il leur a…  : traduction conjecturale d''un texte obscur, dans lequel le mot traduit par loi ne serait pas le terme habituel (tora, v. 4) mais un équivalent araméen ; avec une légère modification du texte hébreu traditionnel, on pourrait aussi comprendre  : du sud (cf. Gn 14.15n) aux pentes (du Pisga, cf. 3.17), pour eux  ; LXX à sa droite des anges avec lui, cf. Ac 7.38,53 ; Ga 3.19 ; Hé 2.2.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est venu du Sinaï,'
  - type: text
    content: il s'est levé sur eux de Séir ;
  - type: text
    content: depuis le mont Parân il a paru dans sa splendeur
  - type: text
    content: et il est sorti d'entre des dizaines de milliers de saints.
  - type: text
    content: De sa main droite il leur a envoyé le feu de la loi.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Gad Gn 49.19. –  met Gad au large ou agrandit Gad  : cf. Gn 26.22 ; Ps 4.2n. –  comme une lionne Gn 49.9 ; Nb 24.9 ; voir 1Ch 12.9.'
  - type: text
    content: 'Sur Gad, il dit :'
  - type: text
    content: Béni soit celui qui met Gad au large !
  - type: text
    content: Il se couche comme une lionne,
  - type: text
    content: il déchiquette le bras et le crâne.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les prémices  : cf. 3.12-17. –  un commandant  : le même terme est traduit par bâton de commandement , en parallèle avec sceptre , en Gn 49.10. –  il a marché à la tête…  : cf. 3.18-20. –  il a agi…  : autre traduction il a défendu la justice…  ; litt. il a fait la justice de YHWH (voir noms divins) et son équité (autre traduction sa règle ) avec Israël (cf. 10.18n).'
  - type: text
    content: Il a choisi les prémices,
  - type: text
    content: car là est cachée la part d'un commandant ;
  - type: text
    content: il a marché à la tête du peuple,
  - type: text
    content: 'il a agi selon la justice du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: il a agi selon son équité envers Israël.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Dan Gn 49.16s. –  jeune lion Gn 49.9 ; cf. Jg 18.7n. –  Bashân 1.4 ; 32.14n.
  - type: text
    content: 'Sur Dan, il dit :'
  - type: text
    content: Dan est un jeune lion,
  - type: text
    content: qui s'élance du Bashân.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Nephtali Gn 49.21. –  l''ouest  : litt. la mer , désignant habituellement la direction de la Méditerranée  ; il pourrait toutefois s''agir ici du lac de Galilée.'
  - type: text
    content: 'Sur Nephtali, il dit :'
  - type: text
    content: Nephthali, rassasié de faveur
  - type: text
    content: 'et comblé de la bénédiction du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: prends possession de l'ouest et du sud !
  '24':
  - type: text
    content: ' '
  - type: note
    content: Aser Gn 49.20. –  huile , symbole d'abondance, Jb 29.6.
  - type: text
    content: 'Sur Aser, il dit :'
  - type: text
    content: Béni soit Aser parmi les fils !
  - type: text
    content: Qu'il soit favorisé entre ses frères
  - type: text
    content: et qu'il plonge son pied dans l'huile !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'verrous 3.5. –  ta prospérité  : le mot n''apparaît qu''ici dans l''A.T. et sa traduction est incertaine ; autres traductions possibles santé, sécurité  ; LXX ta force.'
  - type: text
    content: Que tes verrous soient de fer et de bronze,
  - type: text
    content: et que ta prospérité dure autant que tes jours !
  '26':
  - type: text
    content: ' '
  - type: note
    content: Nul n'est semblable 3.24+ ; 32.39+. –  à Dieu (hébreu ’El , Gn 21.33n), ô Yeshouroun (32.15n) ; plusieurs témoins anciens ont lu au Dieu de Yeshouroun . –  Il chevauche le ciel ou il fait du ciel son char (autre forme du même verbe hébreu en 32.13n) … Ps 18.11 ; 68.34s ; 104.3.
  - type: text
    content: Nul n'est semblable à Dieu, ô Yeshouroun !
  - type: text
    content: Il chevauche le ciel pour venir à ton secours,
  - type: text
    content: et les nuées, dans sa majesté.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'du temps jadis  : cf. v. 15n. –  un refuge Ps 90.2. –  depuis toujours…  : texte obscur, litt. dessous, des bras de toujours ou des bras éternels (même terme au v. 15). –  Détruis  : cf. 2.34+ ; même verbe en 31.4n.'
  - type: text
    content: Le Dieu du temps jadis est un refuge,
  - type: text
    content: depuis toujours il est à l'œuvre ;
  - type: text
    content: devant toi il a chassé l'ennemi,
  - type: text
    content: 'en disant : « Détruis ! »'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'en sécurité v. 12 ; cf. Jr 23.6. –  source de Jacob  : cf. Es 48.1 ; Ps 68.27. –  à part Nb 23.9. –  blé / vin / rosée Gn 27.28n.'
  - type: text
    content: Israël demeure en sécurité.
  - type: text
    content: La source de Jacob est à part
  - type: text
    content: dans un pays de blé et de vin,
  - type: text
    content: et son ciel distille la rosée.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux Ps 1.1+ ; 33.12 ; 144.15. –  bouclier / secours Ps 3.4+ ; 115.9-11. –  te flatteront  : le verbe correspondant signifie habituellement mentir, tromper  ; on l''a compris ici au sens de feindront de se soumettre à toi  ; autre traduction possible défailliront devant toi  ; cf. Ps 18.45 ; 66.3+. –  leurs hauteurs 32.13n  ; autre traduction possible leur dos.'
  - type: text
    content: Heureux es-tu, Israël ! Qui est comme toi,
  - type: text
    content: 'peuple sauvé par le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: le bouclier de ton secours
  - type: text
    content: et l'épée de ta majesté ?
  - type: text
    content: Tes ennemis te flatteront,
  - type: text
    content: et tu fouleras leurs hauteurs.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Oui, il chérit  : cf. 4.37+ ; LXX il a eu compassion de son peuple . –  les peuples v. 5ss,19 ; cf. Ap 21.3n. –  ses saints  : cf. 7.6+ ; on pourrait aussi traduire, avec LXX, ceux qui lui sont consacrés . –  dans ta main (LXX tes mains ) : celle de Dieu, ou celle d''Israël ? –  Ils se sont tenus  : traduction incertaine, d''après un terme hébreu qui n''apparaît nulle part ailleurs ; autre possibilité ils se sont inclinés . –  il est ton porte-parole  : litt. il porte de tes paroles (il s''agit peut-être de Moïse) ; autre traduction on reçoit de tes paroles.'
  - type: text
    content: Oui, il chérit les peuples ;
  - type: text
    content: tous ses saints sont dans ta main.
  - type: text
    content: Ils se sont tenus à tes pieds,
  - type: text
    content: il est ton porte-parole.
  '4':
  - type: text
    content: ' '
  - type: note
    content: assemblée 5.22+.
  - type: text
    content: Moïse a institué pour nous la loi,
  - type: text
    content: possession de l'assemblée de Jacob.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'roi  : cf. 17.14ss ; il s''agit probablement ici de Dieu plutôt que de Moïse ; cf. Ex 15.18 ; Nb 23.21 ; Jg 8.23. –  Yeshouroun 32.15n. –  quand les chefs…  : cf. Jos 24.1ss.'
  - type: text
    content: Il était roi en Yeshouroun,
  - type: text
    content: quand les chefs du peuple se réunissaient
  - type: text
    content: avec les tribus d'Israël.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ruben Gn 49.3s. –  en petit nombre  : litt. en nombre (ou en compte ) ; même expression en 4.27n  ; d''autres comprennent ici et que ses hommes soient nombreux , mais la formule employée n''a ce sens nulle part ailleurs.'
  - type: text
    content: Que Ruben vive, qu'il ne meure pas,
  - type: text
    content: mais que ses hommes soient en petit nombre !
  '7':
  - type: text
    content: ' '
  - type: note
    content: Juda Gn 49.8-12 ; cf. Jg 1.19 ; 1R 12.
  - type: text
    content: 'Voici ce qu''il dit sur Juda :'
  - type: text
    content: 'Entends Juda, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et ramène-le vers son peuple.
  - type: text
    content: Puissent ses mains le défendre,
  - type: text
    content: puisses-tu venir à son secours pour le délivrer de ses adversaires !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Lévi Gn 49.5-7. –  Ton toummim et ton ourim , ou tes toummim et tes ourim , Ex 28.30n. –  ont été confiés  : sous-entendu dans le texte. – Le texte hébreu fait un double jeu d''assonances : Massa correspond à tu as mis à l''épreuve (dans les autres textes relatifs à l''histoire de Massa, c''est le même verbe qui est traduit par provoquer [traduction traditionnelle tenter (Dieu) ], mais ici c''est Dieu qui tente l''homme , c.-à-d. le met à l''épreuve ) et Meriba à tu as cherché querelle  ; cf. 6.16+ ; 8.2n  ; Ex 17.7n  ; Nb 20.13.'
  - type: text
    content: 'Sur Lévi, il dit :'
  - type: text
    content: Ton toummim et ton ourim ont été confiés à l'homme qui t'est fidèle,
  - type: text
    content: celui que tu as mis à l'épreuve à Massa (« Epreuve »),
  - type: text
    content: et à qui tu as cherché querelle aux eaux de Meriba (« Querelle »).
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 32.25-29 ; Mt 10.37/ / ; 19.29/ /. –  qui ne reconnaît pas  : cf. 1.17n. –  ils observent…  : il s''agit probablement des lévites ; un ms de Qumrân et LXX ont lu le singulier il observe… et garde . – Voir alliance.'
  - type: text
    content: 'Lui qui dit de son père et de sa mère :'
  - type: text
    content: « Je ne les regarde pas ! »
  - type: text
    content: Lui qui ne reconnaît pas ses frères,
  - type: text
    content: qui ne connaît pas ses fils.
  - type: text
    content: Car ils observent ta parole
  - type: text
    content: et gardent ton alliance.
