      marker-yv: yv-n
    - type: text
      text: Ecoutez cette parole, vaches du Bashân,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui êtes dans la montagne de Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui opprimez les petites gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui écrasez les pauvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui dites à vos maris :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Apportez, et buvons !
