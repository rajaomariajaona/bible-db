        children:
        - type: text
          text: 'vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'du v. 2, certains pensent que l''oracle vise, non les femmes, mais des fonctionnaires de Samarie. Cependant le reste est au féminin. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'buvons '
      - type: usfm
        marker: ft
        children:
        - type: text
