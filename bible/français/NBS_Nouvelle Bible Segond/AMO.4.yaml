        marker: ft
        children:
        - type: text
          text: Es 34.3 ; Jl 2.20.
      marker-yv: yv-n
    - type: text
      text: J'ai envoyé parmi vous la peste, comme en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai tué vos jeunes gens par l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai laissé prendre vos chevaux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai fait monter à vos narines la puanteur de votre camp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
