      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.12+ ; Es 7.4 ; Za 3.2 ; 1Co 3.15 ; Jd 23.'
      marker-yv: yv-n
    - type: text
      text: Je vous ai détruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme lors de la destruction divine de Sodome et Gomorrhe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous avez été comme un tison arraché à l'incendie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré cela, vous n'êtes pas revenus à moi
  - type: usfm
    marker: q1
