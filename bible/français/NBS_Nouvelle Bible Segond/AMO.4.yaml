document_id: AMO.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dames de Samarie
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 3.16ss ; 32.18ss. –  Bashân , dans le nord de la Transjordanie, région célèbre pour ses pâturages ; cf. Dt 32.14 ; Ez 39.18 ; Mi 7.14 ; Ps 22.13. –  montagne (ou région montagneuse ) de Samarie 3.9+. –  opprimez… 2.6+,7n  ; Lv 19.13 ; Dt 28.33 ; 1S 12.3 ; Ez 22.29. –  à vos maris  : litt. à leurs maîtres (ou seigneurs , Gn 18.12n), le pronom possessif étant au masculin dans le texte hébreu, de même que les vous du v. 2, certains pensent que l''oracle vise, non les femmes, mais des fonctionnaires de Samarie. Cependant le reste est au féminin. –  buvons 6.6 ; Es 5.11s ; 22.12s ; 28.1,7s ; Jl 1.5 ; Mi 2.11.'
  - type: text
    content: Ecoutez cette parole, vaches du Bashân,
  - type: text
    content: vous qui êtes dans la montagne de Samarie,
  - type: text
    content: vous qui opprimez les petites gens,
  - type: text
    content: qui écrasez les pauvres
  - type: text
    content: 'et qui dites à vos maris :'
  - type: text
    content: Apportez, et buvons !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la peste Lv 26.25 ; 2S 24.15 ; 2R 19.35. –  comme en Egypte  : cf. Dt 7.15 ; 28.27,60 ; voir aussi Ex 5.3 ; 9.1ss. –  j''ai laissé prendre…  : certains modifient le texte hébreu traditionnel pour lire ainsi que vos chevaux splendides . –  puanteur Es 34.3 ; Jl 2.20.'
  - type: text
    content: J'ai envoyé parmi vous la peste, comme en Egypte,
  - type: text
    content: j'ai tué vos jeunes gens par l'épée,
  - type: text
    content: j'ai laissé prendre vos chevaux ;
  - type: text
    content: j'ai fait monter à vos narines la puanteur de votre camp.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'détruits  : cf. 1.1+. –  comme… de Sodome et Gomorrhe  : cf. Gn 19.25+ss ; Dt 29.22 ; Es 1.9+ ; Jr 49.18 ; formule identique en Es 13.19 ; Jr 50.40. –  comme un tison…  : cf. 3.12+ ; Es 7.4 ; Za 3.2 ; 1Co 3.15 ; Jd 23.'
  - type: text
    content: Je vous ai détruits,
  - type: text
    content: comme lors de la destruction divine de Sodome et Gomorrhe,
  - type: text
    content: et vous avez été comme un tison arraché à l'incendie.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'je vais te traiter ainsi  : la menace suprême n''est pas exprimée ; cf. Rt 1.17. –  prépare-toi…  : cf. Ex 19.11 ; Ez 38.7 ; Jl 2.11 ; Ml 3.1s ; 2Ch 35.4 ; Lc 14.31 ; voir aussi Mt 3.2/ /.'
  - type: text
    content: C'est pourquoi je vais te traiter ainsi, Israël ! Et puisque je vais te traiter de la sorte, prépare-toi à la rencontre de ton Dieu, Israël !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.8s ; 9.5s. –  façonne Gn 2.7n  ; Es 43.1+. –  crée (Gn 1.1n) le vent Ps 104.4. –  qui fait connaître à l''homme ses pensées  : le texte est ambigu en hébreu comme en français : pensées de Dieu ou de l''homme ? 3.7 ; Jr 11.20 ; Ps 94.11 ; 139.1ss. –  qui change (litt. qui fait  ; cf. Gn 1.26) l''aurore en ténèbres ou, selon certains mss hébreux et des versions anciennes, qui fait l''aurore et les ténèbres  ; certains comprennent qui des ténèbres fait l''aurore . –  qui marche sur les hauteurs de la terre  : cf. Mi 1.3s ; Jb 9.8 ; voir aussi Dt 32.13 ; Es 58.14 ; Ps 18.8ss,34. –  son nom… 3.13n  ; 5.8,27 ; 9.6 ; Es 48.2 ; Jr 10.16+ ; 32.18.'
  - type: text
    content: Car celui qui façonne les montagnes et crée le vent,
  - type: text
    content: qui fait connaître à l'homme ses pensées,
  - type: text
    content: celui qui change l'aurore en ténèbres
  - type: text
    content: et qui marche sur les hauteurs de la terre,
  - type: text
    content: 'son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Armées.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'juré par sa sainteté  : cf. 6.8 ; 8.7 ; Ps 89.36 ; voir aussi Gn 22.16 ; 26.3 ; 1S 3.14 ; 2S 3.9 ; Es 62.8 ; Jr 51.14 ; Ps 95.11 ; Hé 6.13. –  les jours viennent Jr 7.32+ ; Mc 2.20/ / ; Lc 17.22 ; 19.43 ; 21.6 ; 23.9. –  crochets / harpons  : cf. Jr 16.16 ; ces expressions font peut-être allusion à la coutume assyrienne de passer un anneau à la lèvre inférieure de leurs prisonniers pour les emmener ; cf. 2R 19.28 ; Ez 38.4 ; 2Ch 33.11. –  votre progéniture  : traduction incertaine ; autres possibilités votre arrière-garde ; ceux qui resteront d''entre vous ; vos suivantes.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' l''a juré par sa sainteté :'
  - type: text
    content: les jours viennent sur vous
  - type: text
    content: où on vous enlèvera, vous, avec des crochets,
  - type: text
    content: et votre progéniture avec des harpons ;
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'chacune de son côté  : litt. chacune devant soi  ; cf. Jr 49.5n. –  dans la forteresse  : texte obscur ; avec une légère modification on pourrait lire vous serez rejetées vers l''Hermon , à la frontière nord-est, sur la route de l''Assyrie (Dt 3.8s).'
  - type: text
    content: vous sortirez par les brèches, chacune de son côté,
  - type: text
    content: et vous vous jetterez dans la forteresse,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Des sacrifices dérisoires
  '4':
  - type: text
    content: ' '
  - type: note
    content: '5.5,21ss. –  Beth-El 3.14n. –  transgressez ou révoltez-vous  ; cf. 1.3n. –  Guilgal  : cf. Dt 11.30n  ; Os 4.15n  ; voir aussi Jos 4.1ss (entre Jéricho et le Jourdain) ; 2R 2.1 ; 4.38 (au nord de Beth-El). –  vos sacrifices le matin  : cf. Lv 7.11-18 ; 22.29s ; autre traduction tous les matins . –  dîmes Gn 28.22 ; cf. Dt 14.22,28 ; 26.12ss. –  le troisième jour  : ce verset semble faire allusion à une fête de trois jours comportant, le deuxième jour (= le premier matin), l''offrande des sacrifices, et le troisième celle de la dîme ; autre traduction tous les trois jours  ; certains ont traduit tous les trois ans en pensant à la dîme de Dt 14.28, mais cette interprétation est très peu probable.'
  - type: text
    content: Allez à Beth-El et transgressez !
  - type: text
    content: Allez au Guilgal et transgressez davantage !
  - type: text
    content: Offrez vos sacrifices le matin
  - type: text
    content: et vos dîmes le troisième jour !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Faites fumer  : certains pensent que l''injonction s''adresse en particulier au prêtre. –  sacrifices de reconnaissance Lv 7.12ns. –  avec du pain levé  : l''expression hébraïque est ambiguë, litt. avec du levé ou loin du levé  ; on pourrait aussi comprendre sans levain  ; cf. Ex 12.15+ ; Lv 2.11. –  Proclamez  : cf. Ps 66.13ss ; Mt 6.2s ; 23.5. –  offrandes volontaires Ex 35.29 ; Esd 1.4 ; 2Ch 35.8. –  ce que vous aimez Jr 5.31.'
  - type: text
    content: Faites fumer vos sacrifices de reconnaissance avec du pain levé !
  - type: text
    content: Proclamez vos offrandes volontaires, faites-les connaître !
  - type: text
    content: Car c'est là ce que vous aimez, Israélites,
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Israël n'est pas revenu à Dieu
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 5.25 ; 9.11ss. –  je vous ai donné…  : cf. 8.11 ; Lv 26.14ss ; Dt 8.2ss ; 28.15ss ; Ez 14.13 ; Os 1–3 ; 5.15 ; Jb 5.17ss ; Pr 3.11s ; 1Co 11.31s ; Hé 12.5ss ; Ap 2.2ss ; 3.19 ; 9.20s ; 16.9ss. –  rien…  : litt. la propreté des dents . –  pas revenus à moi Es 1.27+ ; 9.12 ; Os 7.10 ; Ag 2.17 ; Mt 23.37s.'
  - type: text
    content: 'Quant à moi, voici ce que je vous ai donné :'
  - type: text
    content: rien à vous mettre sous la dent dans toutes vos villes,
  - type: text
    content: plus de pain dans tous vos lieux.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1R 17.1 ; Jr 3.3 ; 14.1ss ; Jl 1.17ss ; Ag 1.10s.
  - type: text
    content: Quant à moi, je vous ai refusé la pluie,
  - type: text
    content: alors qu'il y avait encore trois mois jusqu'à la moisson ;
  - type: text
    content: j'ai fait pleuvoir sur une ville
  - type: text
    content: et sur une autre ville je n'ai pas fait pleuvoir ;
  - type: text
    content: une parcelle a reçu la pluie,
  - type: text
    content: et la parcelle sur laquelle la pluie n'est pas tombée s'est desséchée.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'se traînaient  : même verbe en 8.12 ( errer ).'
  - type: text
    content: Deux villes, trois villes se traînaient vers une autre
  - type: text
    content: pour boire de l'eau,
  - type: text
    content: et elles n'apaisaient pas leur soif.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'rouille / nielle Dt 28.22 ; 1R 8.37 ; Ag 2.17. –  vos nombreux jardins  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire j''ai desséché vos jardins et vos vignes . –  chenilles ou sauterelles  ; cf. 7.1s ; Jl 1.4nss ; voir aussi Dt 28.38 ; 2Ch 7.13.'
  - type: text
    content: Je vous ai frappés par la rouille et par la nielle ;
  - type: text
    content: vos nombreux jardins, vos vignes, vos figuiers et vos oliviers
  - type: text
    content: ont été dévorés par les chenilles.
  - type: text
    content: Malgré cela, vous n'êtes pas revenus à moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
