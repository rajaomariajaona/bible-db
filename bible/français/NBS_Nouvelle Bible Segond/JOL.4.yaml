      - type: text
        text: '3.41 (lors de l''invasion de Juda par l''empire hellénistique de Syrie) : « Les marchands de la région… se munirent d''or et d''argent en grande quantité, ainsi que d''entraves et ils vinrent au camp pour emmener les fils d''Israël comme esclaves. Un contingent de Syrie et du pays des Philistins se joignit à eux. » '
    - type: usfm
