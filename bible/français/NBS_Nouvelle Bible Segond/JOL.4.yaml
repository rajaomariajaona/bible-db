document_id: JOL.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le procès de Dieu contre les nations
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.1n. –  En ces jours-là, en ce temps-là Jr 33.15 ; 50.4,20. –  je rétablirai…  : cf. Dt 30.3n  ; Jr 29.14n  ; 30.3 ; Ez 29.14 ; Os 6.11 ; Am 9.14 ; Jb 42.10n  ; Lm 2.14.'
  - type: text
    content: En ces jours-là, en ce temps-là,
  - type: text
    content: quand je rétablirai la situation de Juda et de Jérusalem,
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 2.4 ; Mi 4.3.
  - type: text
    content: De vos socs de charrue forgez des épées,
  - type: text
    content: de vos serpes des lances !
  - type: text
    content: 'Que le faible dise :'
  - type: text
    content: Je suis vaillant !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Dépêchez-vous  : traduction conjecturale ; le verbe hébreu correspondant n''apparaît qu''ici ; on a aussi traduit assemblez-vous ou, au prix d''une modification du texte hébreu traditionnel, éveillez-vous . –  nations d''alentour Ez 36.4,7. –  tes héros  : cf. v. 9 ; voir aussi 2R 6.14ss ; Za 14.5 ; Ps 103.20.'
  - type: text
    content: Dépêchez-vous et venez,
  - type: text
    content: vous toutes, nations d'alentour,
  - type: text
    content: et rassemblez-vous !
  - type: text
    content: 'Là, '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais descendre tes héros !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 's''éveillent ou surgissent , cf. v. 7n,9 ; Jr 6.22 ; 50.41. –  Josaphat v. 2n. –  je m''assiérai pour juger  : cf. Ex 18.13 ; Es 28.6 ; Ps 9.5.'
  - type: text
    content: Que les nations s'éveillent et qu'elles montent
  - type: text
    content: vers la vallée de Josaphat !
  - type: text
    content: Car là je m'assiérai pour juger
  - type: text
    content: toutes les nations d'alentour.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 63.1ss ; Jr 50.16 ; Mc 4.29 ; Ap 14.14ss. –  les cuves regorgent  : cf. 2.24. –  leur mal  : autres traductions le mal qu''ils ont fait ; leur malheur.'
  - type: text
    content: Lancez la faucille,
  - type: text
    content: car la moisson est mûre !
  - type: text
    content: Venez, foulez,
  - type: text
    content: car le pressoir est plein,
  - type: text
    content: les cuves regorgent !
  - type: text
    content: Oui, leur mal est grand.
  '14':
  - type: text
    content: ' '
  - type: note
    content: vallée (v. 2n,12) du verdict ou de la décision  ; le terme hébreu est apparenté à un verbe qui signifie couper, aiguiser (cf. le double sens de notre verbe trancher ), mais aussi décider (ainsi en Es 10.22s ; 28.22) ; le même mot désigne aussi, concrètement, une herse ou un traîneau à dépiquer pour le battage du grain, cf. Am 1.3 ; Jb 41.22. –  le jour… 1.15+.
  - type: text
    content: Multitudes, multitudes,
  - type: text
    content: dans la vallée du verdict !
  - type: text
    content: 'Car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche,'
  - type: text
    content: dans la vallée du verdict.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 2.10+ ; 3.4.
  - type: text
    content: Le soleil et la lune s'assombrissent,
  - type: text
    content: les étoiles perdent leur clarté.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur rugit Jr 25.30 ; Am 1.2. –  fait retentir sa voix 2.11n. –  le ciel…  : cf. 2.10 ; Ag 2.6. –  abri / forteresse  : cf. Es 4.6 ; 25.4 ; 28.15,17 ; voir aussi Ps 7.2+ ; 14.6 ; 27.1 ; 28.8 ; 31.5 ; 46.2s ; 61.4 ; 62.8s.'
  - type: text
    content: 'De Sion le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rugit,'
  - type: text
    content: 'de Jérusalem il fait retentir sa voix :'
  - type: text
    content: le ciel et la terre tremblent.
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un abri pour son peuple,'
  - type: text
    content: une forteresse pour les Israélites.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'vous saurez… 2.27+. –  demeure à Sion v. 21 ; Es 8.18 ; Ez 48.35. –  montagne sacrée ou sainte 2.1+. –  Jérusalem sera sacrée (ou sainte ) … Es 52.1 ; cf. Jr 31.40 ; Ab 17 ; Na 2.1 ; Za 9.8 ; voir aussi Ap 21.27. –  les étrangers  : autre traduction les profanes.'
  - type: text
    content: 'Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu,'
  - type: text
    content: et que je demeure à Sion, ma montagne sacrée.
  - type: text
    content: Jérusalem sera sacrée,
  - type: text
    content: et les étrangers n'y passeront plus.
  - type: heading
    content: Nouvelle prospérité pour le peuple de Dieu
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là Os 1.5+. –  le jus du raisin (1.5n) ruissellera… Am 9.13 ; cf. Ex 3.8+ ; Es 7.22 ; 55.1 ; Os 2.23s ; Jb 29.6. –  l''eau coulera…  : cf. 1.20 ; Es 30.25. –  une source  : cf. Ez 47.1ss ; Za 13.1 ; 14.8 ; Ps 46.5 ; Ap 22.1s. –  l''oued des Acacias ou oued Shittim , localisation incertaine ; cf. Nb 25.1 ; Jos 2.1.'
  - type: text
    content: En ce jour-là, le jus du raisin ruissellera des montagnes,
  - type: text
    content: le lait coulera des collines,
  - type: text
    content: l'eau coulera dans tous les torrents de Juda ;
  - type: text
    content: 'une source sortira aussi de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: et abreuvera l'oued des Acacias.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Egypte Ez 29.9 ; 32.15 ; cf. Ap 11.8. –  Edom Gn 25.30 ; Es 34.5ss ; Jr 49.7ss ; Ez 25.12s ; Am 1.11 ; Ab ; Ml 1.2ss ; Ps 137.7 ; Lm 4.21s. –  désert / dévasté 2.3 ; Jr 12.10. –  sang innocent…  : cf. v. 21n  ; Mt 23.35.'
  - type: text
    content: L'Egypte sera dévastée ;
  - type: text
    content: Edom deviendra un désert, il sera dévasté,
  - type: text
    content: à cause de la violence faite aux fils de Juda,
  - type: text
    content: dont ils ont répandu le sang innocent sur leur terre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Josaphat signifie YHWH juge (termes apparentés pour jugement, juger au v. 12 ; cf. v. 14) ; c''est le nom d''un roi de Juda (1R 22.41ss ; 2Ch 17). –  j''entrerai en jugement… Jr 2.35 ; 25.31 ; Ez 17.20 ; 20.35s ; 38.22. –  au sujet d''Israël…  : cf. Ez 25 ; Am 1.3ss ; Ab 11ss. –  patrimoine 2.17+. –  dispersé… 2R 24.15s ; 25.11s ; Ez 11.17 ; 12.15 ; 20.34 etc. –  mon pays… partagé  : cf. Jos 13.7 ; Am 7.17 ; Mi 2.4.'
  - type: text
    content: je rassemblerai toutes les nations,
  - type: text
    content: et je les ferai descendre dans la vallée de Josaphat ;
  - type: text
    content: là, j'entrerai en jugement avec elles
  - type: text
    content: au sujet d'Israël, mon peuple, mon patrimoine,
  - type: text
    content: qu'elles ont dispersé parmi les nations,
  - type: text
    content: et au sujet de mon pays qu'elles se sont partagé.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Jr 17.25 ; Ez 37.25 ; Za 12.6.
  - type: text
    content: Mais Juda sera toujours habité ;
  - type: text
    content: Jérusalem, de génération en génération.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Je déclare…  : texte obscur ; autres traductions je les déclare exempts de châtiment, eux que je n''ai pas déclarés… ou, selon certains, je déclare leur sang innocent, oui, je le déclare  ; d''autres, s''inspirant de LXX, modifient le texte hébreu traditionnel pour lire je vengerai leur sang, je ne le laisserai pas impuni , ou bien … je ne me vengerai pas d''eux  ; cf. Es 4.4. –  demeurera à Sion v. 17+.'
  - type: text
    content: Je déclare leur sang innocent
  - type: text
    content: comme je ne l'ai pas déclaré innocent ;
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' demeurera à Sion.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tiré mon peuple au sort (cf. Lv 16.8n) : pour le partage des prisonniers de guerre, qui font partie du butin Ab 11 ; Na 3.10.'
  - type: text
    content: On a tiré mon peuple au sort ;
  - type: text
    content: on a donné le garçonnet pour une prostituée,
  - type: text
    content: on a vendu la fillette pour le vin qu'on a bu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'De même  : le sens de la transition n''est pas clair ; il s''agit maintenant, non plus des grands empires, mais des petites nations voisines d''Israël, qui se sont contentées de tirer profit de ses malheurs : Tyr et Sidon en Phénicie, au nord-ouest (Ez 26–28 ; Am 1.9), Philistins au sud-ouest (Jr 25.20 ; Am 1.6ss ; So 2.5) ; cf. Jr 47.4. – Sur la famille de termes qui évoque la vengeance , c.-à-d. tirer vengeance et ce que vous méritez (même terme au v. 7, ailleurs rétribution ou représailles ), cf. Jg 9.57 ; Ab 15 ; Ps 28.4+. –  je ferai bien vite retomber…  : litt. rapidement et vite je ferai revenir votre rétribution (ou votre vengeance ) sur votre tête (cf. v. 7).'
  - type: text
    content: De même,
  - type: text
    content: que me voulez-vous, Tyr et Sidon,
  - type: text
    content: et vous tous, districts des Philistins ?
  - type: text
    content: Voulez-vous tirer vengeance de moi ?
  - type: text
    content: Si vous vous vengez de moi,
  - type: text
    content: je ferai bien vite retomber sur votre tête ce que vous méritez !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'mon argent et mon or  : cf. 1R 14.26 ; 2R 14.14. –  objets précieux Es 64.10 ; Lm 1.10s. –  palais ou temples  ; le mot hébreu peut avoir les deux sens.'
  - type: text
    content: Vous avez pris mon argent et mon or ;
  - type: text
    content: mes beaux objets précieux,
  - type: text
    content: vous les avez emportés dans vos palais.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vendu… Am 1.6-10. –  aux Grecs  : litt. aux fils des Grecs  ; cf. Gn 10.2n,4 ; Es 66.19 ; Ez 27.13 ; Za 9.13 ; cf. 1 Maccabées 3.41 (lors de l''invasion de Juda par l''empire hellénistique de Syrie) : « Les marchands de la région… se munirent d''or et d''argent en grande quantité, ainsi que d''entraves et ils vinrent au camp pour emmener les fils d''Israël comme esclaves. Un contingent de Syrie et du pays des Philistins se joignit à eux. » 2 Maccabées 8.10s : « Nikanor (le général de l''armée d''occupation) envisageait d''acquitter le tribut de deux mille talents dû par le roi (Antiochos IV Epiphane) aux Romains au moyen de la vente des Juifs qu''on ferait prisonniers. Il envoya aussitôt aux villes maritimes une invitation à venir acheter des esclaves juifs, promettant de leur en céder quatre-vingt-dix pour un talent. »'
  - type: text
    content: Vous avez vendu les fils de Juda et de Jérusalem aux Grecs
  - type: text
    content: afin de les éloigner de leur territoire.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'je les éveille (ou je les suscite ) pour qu''ils quittent le lieu (litt. du lieu où vous les avez vendus ) …  : cf. Es 13.17n  ; 41.2,25 ; 45.13 ; Jr 6.22+ ; 50.9 ; Esd 1.1,5. –  ce que vous méritez v. 4n.'
  - type: text
    content: Eh bien, je les éveille
  - type: text
    content: pour qu'ils quittent le lieu
  - type: text
    content: où vous les avez vendus,
  - type: text
    content: et je ferai retomber sur votre tête ce que vous méritez.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'aux fils de Juda  : autre traduction par l''entremise de gens de Juda . –  Sabéens Gn 10.7n  ; 1R 10.1ss ; Es 60.6n  ; Jr 6.20 ; Ez 27.22 ; Ps 72.15 ; Jb 1.15. –  c''est le Seigneur qui parle 1R 14.11+ ; Es 1.2n  ; Ab 18.'
  - type: text
    content: Je vendrai vos fils et vos filles aux fils de Juda,
  - type: text
    content: et ils les vendront aux Sabéens, nation lointaine ;
  - type: text
    content: '– c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  - type: heading
    content: Combat final et jugement
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Proclamez…  : cf. Am 3.9 ; Ab 1. –  Consacrez…  : litt. consacrez une guerre  ; cf. 1.14 ; 2.15s ; voir Jr 6.4n  ; Mi 3.5n  ; voir aussi Es 13.3s ; Jr 22.7n  ; 51.27n. –  les héros  : autres traductions les vaillants hommes ; les guerriers  ; cf. v. 11 ; 2.7. –  qu''ils attaquent  : autres traductions qu''ils envahissent cf. 1.6.'
  - type: text
    content: Proclamez ceci parmi les nations !
  - type: text
    content: Consacrez une armée pour la guerre !
  - type: text
    content: Eveillez les héros !
  - type: text
    content: Qu'ils s'approchent, qu'ils attaquent,
  - type: text
    content: tous les hommes de guerre !
