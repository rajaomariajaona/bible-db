      children:
      - type: text
        text: '2 Maccabées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.10s : « Nikanor (le général de l''armée d''occupation) envisageait d''acquitter le tribut de deux mille talents dû par le roi (Antiochos IV Epiphane) aux Romains au moyen de la vente des Juifs qu''on ferait prisonniers. Il envoya aussitôt aux villes maritimes une invitation à venir acheter des esclaves juifs, promettant de leur en céder quatre-vingt-dix pour un talent. »'
