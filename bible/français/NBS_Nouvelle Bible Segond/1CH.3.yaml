document_id: 1CH.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants de David
  - type: heading
    content: Cf. 2S 3.2-5
  - type: text
    content: ' '
  - type: note
    content: 'Daniel  : cf. 2S 3.3n.'
  - type: text
    content: 'Voici les fils de David qui naquirent de lui à Hébron : le premier-né, Amnon, d''Ahinoam la Jizréélite ; le deuxième, Daniel, d''Abigaïl la Carmélite ; '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 10-16 donnent la liste des rois successifs de Juda, jusqu''à l''exil, selon 2Ch : Salomon (chap. 1–9), Roboam (chap. 10–12), Abiya (chap. 13), Asa (chap. 14–16), Josaphat (chap. 17–20).'
  - type: text
    content: 'Fils de Salomon : Roboam ; Abiya, son fils ; Asa, son fils ; Josaphat, son fils ; '
  '11':
  - type: note
    content: Joram (cf. 2Ch 21), Achazia (2Ch 22), Joas (2Ch 24).
  - type: text
    content: 'Joram, son fils ; Achazia, son fils ; Joas, son fils ; '
  '12':
  - type: note
    content: Amatsia (cf. 2Ch 25), Azaria (appelé Ozias en 2Ch 26), Jotam (2Ch 27).
  - type: text
    content: 'Amatsia, son fils ; Azaria, son fils ; Jotam, son fils ; '
  '13':
  - type: note
    content: Achaz (cf. 2Ch 28), Ezéchias (2Ch 29–32), Manassé (2Ch 33.1-20).
  - type: text
    content: 'Achaz, son fils ; Ezéchias, son fils ; Manassé, son fils ; '
  '14':
  - type: note
    content: Amôn (cf. 2Ch 33.21-25), Josias (2Ch 34–35).
  - type: text
    content: 'Amôn, son fils ; Josias, son fils. '
  '15':
  - type: text
    content: 'Fils de Josias : le premier-né, Yohanân ; le deuxième, Joïaqim ; le troisième, Sédécias ; le quatrième, Shalloum. '
  '16':
  - type: note
    content: Cf. 2Ch 36 ; Jékonia (ou Jéchonias) est appelé Joïakîn en 2R 24.8-17.
  - type: text
    content: 'Fils de Joïaqim : Jékonia, son fils ; Sédécias, son fils.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'On ignore l''origine de la liste donnée dans les v. 17-24, liste qui énumère les descendants de Jékonia , sur environ neuf générations. –  prisonnier  : Jékonia fut emmené en captivité à Babylone (cf. 2Ch 36.10). LXX ne traduit pas en grec, mais transcrit le mot hébreu traduit par prisonnier , de sorte qu''on pourrait le lire comme un autre nom propre ( Asir ).'
  - type: text
    content: 'Fils du prisonnier Jékonia : Shéaltiel, son fils, '
  '18':
  - type: note
    content: 'Shénatsar  : certains l''identifient au Sheshbatsar d''Esd 1.8n.'
  - type: text
    content: 'Malkiram, Pedaya, Shénatsar, Yeqamia, Hoshama et Nedabia. '
  '19':
  - type: note
    content: Le terme correspondant à Fils est au pluriel dans Fils de Pedaya et au singulier dans Fils de Zorobabel. Sur Zorobabel, désigné ailleurs comme fils de Shéaltiel (v. 17), cf. Ag 1.1 ; Za 4.6-9 ; Esd 2.2 ; 3.2 ; 5.2 ; Mt 1.12 ; Lc 3.27.
  - type: text
    content: 'Fils de Pedaya : Zorobabel et Shiméi. Fils de Zorobabel : Meshoullam et Hanania – et Shelomith, leur sœur ; '
  '2':
  - type: text
    content: 'le troisième, Absalom, fils de Maaka, fille de Talmaï, roi de Gueshour ; le quatrième, Adonias, fils de Hagguith ; '
  '20':
  - type: note
    content: Le lien généalogique entre les noms de ce verset n'est pas clairement indiqué. Certains pensent que ce sont les fils de Meshoullam (par rapport au v. 21 qui énumère les fils de Hanania, deuxième fils de Zorobabel), d'autres pensent qu'il s'agit de la suite de la liste des fils de Zorobabel.
  - type: text
    content: 'et Hashouba, Ohel, Bérékia, Hasadia, Youshab, Hésed, cinq. '
  '21':
  - type: text
    content: 'Fils de Hanania : Pelatia et Esaïe ; les fils de Rephaya, les fils d''Arnân, les fils d''Abdias, les fils de Shekania. '
  '22':
  - type: text
    content: 'Fils de Shekania : Shemaya. Fils de Shemaya : Hattoush, Yiguéal, Bariah, Néaria et Shaphath, six. '
  '23':
  - type: text
    content: 'Fils de Néaria : Elioénaï, Ezéchias et Azriqam, trois. '
  '24':
  - type: note
    content: 'Hodavia  : hébreu Hodawyahou.'
  - type: text
    content: 'Fils d''Elioénaï : Hodavia, Eliashib, Pelaya, Aqqoub, Yohanân, Delaya et Anani, sept.'
  '3':
  - type: text
    content: 'le cinquième, Shephatia, d''Abital ; le sixième, Yitréam, de sa femme Egla. '
  '4':
  - type: text
    content: Ces six-là naquirent de lui à Hébron. Il régna là sept ans et six mois, et il régna trente-trois ans à Jérusalem.
  - type: heading
    content: 2S 5.14-16
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2S 5.14n-16. –  Bath-Shoua semble être une variante orthographique de Bethsabée (hébreu Bath-Shéba ).
  - type: text
    content: 'Voici ceux qui naquirent de lui à Jérusalem : Shiméa, Shobab, Nathan et Salomon, quatre de Bath-Shoua, fille d''Ammiel ; '
  '6':
  - type: note
    content: 'Elishama, Eliphéleth  : ces deux noms reparaissent au v. 8 ; dans la liste parallèle de 14.5, ils sont remplacés par Elishoua (cf. 2S 5.15) et Elpéleth. –  Eliphéleth (= Elpéleth) et Noga (v. 7) ne figurent pas dans la liste parallèle de 2S 5.14-16.'
  - type: text
    content: 'Yibhar, Elishama, Eliphéleth, '
  '7':
  - type: text
    content: 'Noga, Népheg, Yaphia, '
  '8':
  - type: text
    content: 'Elishama, Eliada et Eliphéleth, neuf, '
  '9':
  - type: note
    content: 'concubines  : cf. 2S 5.13n. –  Tamar  : cf. 2S 13.1.'
  - type: text
    content: tous fils de David, sans compter les fils des concubines. Tamar était leur sœur.
