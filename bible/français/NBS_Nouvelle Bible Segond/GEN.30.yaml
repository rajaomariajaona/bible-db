      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.20,30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'servi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travail '
      - type: usfm
        marker: ft
        children:
        - type: text
