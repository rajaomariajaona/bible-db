        children:
        - type: text
          text: cela m'a été révélé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres encore, très différemment'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est à cause de toi que je suis devenu riche et que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' m''a '
        - type: usfm
          marker: w
          children:
          - type: text
            text: béni
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Laban lui dit : Je t''en prie, que je trouve grâce à tes yeux ! Je l''ai appris par divination, c''est à cause de toi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a béni. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ajouta : Fixe-moi ton salaire, et je te le donnerai. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit.
      marker-yv: yv-n
    - type: text
      text: 'Jacob dit : Tu sais toi-même comme je t''ai servi, et ce qu''est devenu ton troupeau grâce à moi ; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur mes genoux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : rite d''adoption, cf. 48.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que par elle j''aie… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.1-2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle dit : Voici ma servante Bilha ; va avec elle ; qu''elle accouche sur mes genoux, et que par elle j''aie aussi des fils ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''est beaucoup accru '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus litt., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a éclaté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: explosé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en beaucoup
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 43 ; 28.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis que j'ai mis les pieds chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à mon pied
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur mes pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Es 41.2), c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cause de moi, partout où je suis allé.
      marker-yv: yv-n
    - type: text
      text: 'car le peu que tu possédais avant moi s''est beaucoup accru, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a béni depuis que j''ai mis les pieds chez toi. Maintenant, quand travaillerai-je aussi pour ma maison ? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Laban dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit.
      marker-yv: yv-n
    - type: text
      text: 'Laban dit : Que dois-je te donner ? Jacob répondit : Tu ne me donneras rien. Si tu consens à faire ce que je vais te dire, je recommencerai à faire paître ton petit bétail ; je le garderai. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mets à part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et je mettrai à part.
      marker-yv: yv-n
    - type: text
      text: 'Aujourd''hui je passerai parmi tout ton petit bétail. Mets à part toute bête tachetée et marquetée et toute bête de couleur foncée parmi les moutons ; de même, parmi les chèvres, tout ce qui est marqueté et tacheté. Ce sera mon salaire. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon honnêteté.
      marker-yv: yv-n
    - type: text
      text: 'Ma justice répondra pour moi demain, quand tu viendras voir mon salaire ; tout ce qui ne sera pas tacheté et marqueté parmi les chèvres, ou foncé parmi les moutons, c''est que je l''aurai volé. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban dit : Eh bien, qu''il en soit comme tu l''as dit ! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Il est difficile de décrire exactement les marques distinctives des animaux destinés à Jacob. Il est clair toutefois qu'il s'agit d'une minorité par rapport à l'ensemble du troupeau, car en général les chèvres étaient uniformément noires ou brunes, et les moutons blancs (cf. v. 37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ce même jour, il mit à part les boucs rayés et marquetés, toutes les chèvres tachetées et marquetées, toutes celles où il y avait du blanc, et tout ce qui était foncé parmi les moutons. Il les confia à ses fils. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il mit une distance de trois journées de marche entre lui et Jacob qui faisait paître le reste du petit bétail de Laban.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les mots hébreux traduits par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuplier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Os 4.13), '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'blanches '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'blanc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rappellent le nom de Laban.
      marker-yv: yv-n
    - type: text
      text: 'Jacob prit des branches vertes de peuplier, d''amandier et de platane ; il y pela des bandes blanches, en mettant à nu le blanc des branches. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il plaça les branches qu''il avait pelées dans les auges, dans les abreuvoirs où le petit bétail venait boire, juste en face des bêtes, qui entraient en chaleur en venant boire. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les bêtes entraient en chaleur près des branches et elles firent des petits rayés, tachetés et marquetés. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui donna pour femme Bilha, sa servante ; Jacob alla avec elle ; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains comprennent que Jacob place les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'moutons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en face des chèvres (naturellement foncées, v. 35
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') pour que les brebis mettent bas des petits rayés ou foncés (variante du stratagème des branches, v. 37ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il ne réunit pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il n'en fit pas autant pour le bétail de Laban.
      marker-yv: yv-n
    - type: text
      text: 'Jacob sépara les moutons ; il tourna les bêtes vers ce qui était rayé et vers tout ce qui était foncé parmi les bêtes de Laban. Il se fit ainsi des troupeaux à part, qu''il ne réunit pas au bétail de Laban. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les fois que des bêtes vigoureuses entraient en chaleur, Jacob plaçait les branches dans les auges, sous les yeux des bêtes, pour que celles-ci entrent en chaleur près des branches. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 31.9.
      marker-yv: yv-n
    - type: text
      text: Quand les bêtes étaient chétives, il ne les plaçait pas ; de sorte que les chétives étaient pour Laban, et les vigoureuses pour Jacob.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob s'enfuit de chez Laban
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Celui-ci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''enrichit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus litt., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éclata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''accroître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''étendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 28.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ex 1.12 ; Es 54.3 ; Jb 1.10 ; 1Ch 4.38.'
      marker-yv: yv-n
    - type: text
      text: Celui-ci s'enrichit de plus en plus ; il eut du petit bétail en abondance, des servantes et des serviteurs, des chameaux et des ânes.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bilha fut enceinte et donna un fils à Jacob. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'm''a rendu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: danani
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') explique le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dan.
      marker-yv: yv-n
    - type: text
      text: 'Rachel dit : Dieu m''a rendu justice ; il m''a entendue et il m''a donné un fils. C''est pourquoi elle l''appela du nom de Dan (« Juge »). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bilha, servante de Rachel, fut encore enceinte et donna un deuxième fils à Jacob. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai livré…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''ai lutté les luttes de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sur le sens intensif du mot correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: naphtouléi ’élohim niphtalti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui rappelle le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nephtali
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . La racine hébraïque correspondante peut évoquer l'astuce ou la ruse, ce qui est tortueux ou retors (cf. Ps 18.27 ; Jb 5.13 ; Pr 8.8).
      marker-yv: yv-n
    - type: text
      text: 'Rachel dit : J''ai livré un combat surhumain contre ma sœur, et je l''ai emporté. Elle l''appela du nom de Nephtali (« Combat »).'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Léa, voyant qu''elle avait cessé d''avoir des enfants, prit Zilpa, sa servante, et la donna pour femme à Jacob. '
