        - type: text
          text: '30.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 25.22 ; 27.46.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Rachel vit qu''elle ne donnait pas d''enfants à Jacob, elle fut jalouse de sa sœur. Rachel dit à Jacob : Donne-moi des fils, sinon je vais mourir ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zilpa, servante de Léa, donna un fils à Jacob. '
