document_id: GEN.30,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Cf. 25.22 ; 27.46.
  - type: text
    content: 'Lorsque Rachel vit qu''elle ne donnait pas d''enfants à Jacob, elle fut jalouse de sa sœur. Rachel dit à Jacob : Donne-moi des fils, sinon je vais mourir ! '
  '10':
  - type: text
    content: 'Zilpa, servante de Léa, donna un fils à Jacob. '
  '11':
  - type: note
    content: 'Quelle chance ! le texte hébreu traditionnel porte un terme qu''on pourrait lire comme un verbe  : il a trahi. Mais, d''après une autre lecture traditionnelle, il faudrait le décomposer en deux mots  : la chance est venue. LXX et Vg ont lu par chance. Le nom de Gad signifie chance ou fortune, bonheur  ; c''est également le nom d''une divinité (cf. Es 65.11n).'
  - type: text
    content: 'Léa dit : Quelle chance ! Et elle l''appela du nom de Gad (« Chance »). '
  '12':
  - type: text
    content: 'Zilpa, servante de Léa, donna un deuxième fils à Jacob. '
  '13':
  - type: note
    content: 'Quel bonheur pour moi…  : hébreu be''ashri ki ’ishrouni banoth, litt. par mon bonheur, car les filles me déclareront heureuse. La racine hébraïque, typique des béatitudes (Ps 1.1 ; 32.1 ; 112.1), est ici associée au nom d’Aser (hébreu ’Asher). Cf. Pr 31.28 ; Ct 6.9 ; Lc 1.48.'
  - type: text
    content: 'Léa dit : Quel bonheur pour moi ! Les filles me déclareront heureuse ! Et elle l''appela du nom d''Aser (« Bonheur »).'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'moisson des blés  : mai-juin. –  mandragores  : solanacées à grosses racines charnues dont le nom hébreu rappelle l''un des mots traduits par amour . La croyance populaire voyait sans doute en elles un aphrodisiaque et un remède contre la stérilité (cf. Ct 7.12-14).'
  - type: text
    content: 'Ruben sortit aux jours de la moisson des blés et trouva des mandragores dans les champs. Il les apporta à Léa, sa mère. Alors Rachel dit à Léa : Donne-moi, je te prie, quelques-unes des mandragores de ton fils. '
  '15':
  - type: text
    content: 'Elle lui répondit : Ne te suffit-il pas d''avoir pris mon mari, que tu prennes aussi les mandragores de mon fils ? Alors Rachel dit : Eh bien, qu''il couche avec toi cette nuit en échange des mandragores de ton fils ! '
  '16':
  - type: note
    content: 'je t''ai engagé (comme un salarié) : hébreu sakor sekartika  : cf. v. 18.'
  - type: text
    content: 'Comme Jacob revenait des champs, le soir, Léa sortit à sa rencontre et dit : C''est avec moi que tu iras, car je t''ai engagé au prix des mandragores de mon fils. Il coucha donc avec elle cette nuit-là. '
  '17':
  - type: note
    content: entendit ou exauça, même possibilité v. 22.
  - type: text
    content: 'Dieu entendit Léa : elle fut enceinte et donna à Jacob un cinquième fils. '
  '18':
  - type: note
    content: 'mon salaire  : hébreu sekari (cf. v. 16), terme associé au nom d’Issacar (hébreu Yissakar) : cf. 49.14s ; Jos 19.17.'
  - type: text
    content: 'Léa dit : Dieu m''a donné mon salaire, à moi qui ai donné ma servante à mon mari. Et elle l''appela du nom d''Issacar (« Salarié »). '
  '19':
  - type: text
    content: 'Léa fut encore enceinte et donna un sixième fils à Jacob. '
  '2':
  - type: note
    content: '1S 1.6 ; Lc 1.7. –  qui t''empêche…  : litt. qui a retenu pour toi le fruit du ventre.'
  - type: text
    content: 'Jacob se mit en colère contre Rachel ; il dit : Suis-je donc à la place de Dieu, qui t''empêche d''avoir des enfants ? '
  '20':
  - type: note
    content: 'm''a fait… cadeau  : hébreu zevadani… zéved. –  m''honorera  : hébreu yizbeléni  ; autres traductions habitera avec moi, me préférera (LXX), me mettra à ma place, c.-à-d. reconnaîtra et honorera mon rang de femme légitime, mère des fils du maître de maison. –  Zabulon  : hébreu Zevouloun, du mot zevoul ou zeboul qui peut signifier prince  ; cf. 49.13n.'
  - type: text
    content: 'Léa dit : Dieu m''a fait un beau cadeau ; cette fois mon mari m''honorera, car je lui ai donné six fils. Et elle l''appela du nom de Zabulon (« Honorable »). '
  '21':
  - type: note
    content: 'fille 37.35. –  Dina  : ce nom est de la même racine que celui de Dan (v. 6) ; voir chap. 34.'
  - type: text
    content: Ensuite, elle mit au monde une fille qu'elle appela du nom de Dina.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'la rendit féconde  : litt. ouvrit sa matrice  ; cf. 21.1ss ; 25.21 ; 29.31 ; 1S 1.27.'
  - type: text
    content: 'Alors Dieu se souvint de Rachel ; il l''entendit et la rendit féconde. '
  '23':
  - type: note
    content: 'a enlevé  : hébreu ’asaph (cf. v. 24n). –  mon déshonneur  : autre traduction l''outrage qui m''était fait  ; il s''agit en l''occurrence de la stérilité.'
  - type: text
    content: 'Elle fut enceinte et mit au monde un fils. Elle dit : Dieu a enlevé mon déshonneur. '
  '24':
  - type: note
    content: 'L''hébreu yoseph peut être compris comme une forme de deux verbes différents  : il enlèvera (cf. v. 23n) et il ajoute  ; le nom de Joseph se trouve ainsi expliqué par deux étymologies, qui font assonance. –  un autre fils 35.17.'
  - type: text
    content: 'Elle l''appela du nom de Joseph (« Ajouté »), en disant : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''ajoute un autre fils !'
  - type: heading
    content: Jacob s'enrichit
  '25':
  - type: text
    content: ' '
  - type: note
    content: '27.44s. –  chez moi  : litt. vers mon lieu.'
  - type: text
    content: 'Lorsque Rachel eut mis Joseph au monde, Jacob dit à Laban : Laisse-moi partir, pour que j''aille chez moi, dans mon pays. '
  '26':
  - type: note
    content: 29.20,30. –  servi et travail traduisent des termes hébreux apparentés.
  - type: text
    content: 'Donne-moi mes femmes et mes enfants, pour lesquels je t''ai servi, et je m''en irai : tu sais toi-même tout le travail que j''ai fait pour toi. '
  '27':
  - type: note
    content: '12.3+. –  que je trouve grâce…  : cf. 33.15n. –  Je l''ai appris par divination…  : traduction incertaine ; d''autres comprennent plus généralement cela m''a été révélé  ; d''autres encore, très différemment  : c''est à cause de toi que je suis devenu riche et que le Seigneur m''a béni.'
  - type: text
    content: 'Laban lui dit : Je t''en prie, que je trouve grâce à tes yeux ! Je l''ai appris par divination, c''est à cause de toi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a béni. '
  '28':
  - type: text
    content: 'Il ajouta : Fixe-moi ton salaire, et je te le donnerai. '
  '29':
  - type: note
    content: 'Jacob dit  : litt. il dit.'
  - type: text
    content: 'Jacob dit : Tu sais toi-même comme je t''ai servi, et ce qu''est devenu ton troupeau grâce à moi ; '
  '3':
  - type: note
    content: 'sur mes genoux  : rite d''adoption, cf. 48.12. –  que par elle j''aie… 16.1-2n.'
  - type: text
    content: 'Elle dit : Voici ma servante Bilha ; va avec elle ; qu''elle accouche sur mes genoux, et que par elle j''aie aussi des fils ! '
  '30':
  - type: note
    content: 's''est beaucoup accru ou, plus litt., a éclaté (ou explosé) en beaucoup, cf. v. 43 ; 28.14n. –  depuis que j''ai mis les pieds chez toi  : litt. à mon pied  ; autre traduction sur mes pas (cf. Es 41.2), c.-à-d. à cause de moi, partout où je suis allé.'
  - type: text
    content: 'car le peu que tu possédais avant moi s''est beaucoup accru, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a béni depuis que j''ai mis les pieds chez toi. Maintenant, quand travaillerai-je aussi pour ma maison ? '
  '31':
  - type: note
    content: 'Laban dit  : litt. il dit.'
  - type: text
    content: 'Laban dit : Que dois-je te donner ? Jacob répondit : Tu ne me donneras rien. Si tu consens à faire ce que je vais te dire, je recommencerai à faire paître ton petit bétail ; je le garderai. '
  '32':
  - type: note
    content: 'Mets à part  : autre traduction et je mettrai à part.'
  - type: text
    content: 'Aujourd''hui je passerai parmi tout ton petit bétail. Mets à part toute bête tachetée et marquetée et toute bête de couleur foncée parmi les moutons ; de même, parmi les chèvres, tout ce qui est marqueté et tacheté. Ce sera mon salaire. '
  '33':
  - type: note
    content: 'Ma justice  : autre traduction mon honnêteté.'
  - type: text
    content: 'Ma justice répondra pour moi demain, quand tu viendras voir mon salaire ; tout ce qui ne sera pas tacheté et marqueté parmi les chèvres, ou foncé parmi les moutons, c''est que je l''aurai volé. '
  '34':
  - type: text
    content: 'Laban dit : Eh bien, qu''il en soit comme tu l''as dit ! '
  '35':
  - type: note
    content: Il est difficile de décrire exactement les marques distinctives des animaux destinés à Jacob. Il est clair toutefois qu'il s'agit d'une minorité par rapport à l'ensemble du troupeau, car en général les chèvres étaient uniformément noires ou brunes, et les moutons blancs (cf. v. 37n).
  - type: text
    content: 'Ce même jour, il mit à part les boucs rayés et marquetés, toutes les chèvres tachetées et marquetées, toutes celles où il y avait du blanc, et tout ce qui était foncé parmi les moutons. Il les confia à ses fils. '
  '36':
  - type: text
    content: Puis il mit une distance de trois journées de marche entre lui et Jacob qui faisait paître le reste du petit bétail de Laban.
  '37':
  - type: text
    content: ' '
  - type: note
    content: Les mots hébreux traduits par peuplier (Os 4.13), blanches et blanc rappellent le nom de Laban.
  - type: text
    content: 'Jacob prit des branches vertes de peuplier, d''amandier et de platane ; il y pela des bandes blanches, en mettant à nu le blanc des branches. '
  '38':
  - type: text
    content: 'Puis il plaça les branches qu''il avait pelées dans les auges, dans les abreuvoirs où le petit bétail venait boire, juste en face des bêtes, qui entraient en chaleur en venant boire. '
  '39':
  - type: text
    content: 'Les bêtes entraient en chaleur près des branches et elles firent des petits rayés, tachetés et marquetés. '
  '4':
  - type: text
    content: 'Elle lui donna pour femme Bilha, sa servante ; Jacob alla avec elle ; '
  '40':
  - type: note
    content: 'Certains comprennent que Jacob place les moutons en face des chèvres (naturellement foncées, v. 35n) pour que les brebis mettent bas des petits rayés ou foncés (variante du stratagème des branches, v. 37ss). –  qu''il ne réunit pas  : on pourrait aussi comprendre et il n''en fit pas autant pour le bétail de Laban.'
  - type: text
    content: 'Jacob sépara les moutons ; il tourna les bêtes vers ce qui était rayé et vers tout ce qui était foncé parmi les bêtes de Laban. Il se fit ainsi des troupeaux à part, qu''il ne réunit pas au bétail de Laban. '
  '41':
  - type: text
    content: 'Toutes les fois que des bêtes vigoureuses entraient en chaleur, Jacob plaçait les branches dans les auges, sous les yeux des bêtes, pour que celles-ci entrent en chaleur près des branches. '
  '42':
  - type: note
    content: 31.9.
  - type: text
    content: Quand les bêtes étaient chétives, il ne les plaçait pas ; de sorte que les chétives étaient pour Laban, et les vigoureuses pour Jacob.
  - type: heading
    content: Jacob s'enfuit de chez Laban
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Celui-ci  : litt. l''homme . –  s''enrichit ou, plus litt., éclata  ; le même verbe est traduit par s''accroître au v. 30n, par s''étendre en 28.14n  ; cf. Ex 1.12 ; Es 54.3 ; Jb 1.10 ; 1Ch 4.38.'
  - type: text
    content: Celui-ci s'enrichit de plus en plus ; il eut du petit bétail en abondance, des servantes et des serviteurs, des chameaux et des ânes.
  '5':
  - type: text
    content: 'Bilha fut enceinte et donna un fils à Jacob. '
  '6':
  - type: note
    content: L'expression m'a rendu justice (hébreu danani) explique le nom de Dan.
  - type: text
    content: 'Rachel dit : Dieu m''a rendu justice ; il m''a entendue et il m''a donné un fils. C''est pourquoi elle l''appela du nom de Dan (« Juge »). '
  '7':
  - type: text
    content: 'Bilha, servante de Rachel, fut encore enceinte et donna un deuxième fils à Jacob. '
  '8':
  - type: note
    content: 'J''ai livré…  : litt. j''ai lutté les luttes de Dieu (sur le sens intensif du mot correspondant à Dieu, cf. 1.2n) ; en hébreu naphtouléi ’élohim niphtalti, qui rappelle le nom de Nephtali. La racine hébraïque correspondante peut évoquer l''astuce ou la ruse, ce qui est tortueux ou retors (cf. Ps 18.27 ; Jb 5.13 ; Pr 8.8).'
  - type: text
    content: 'Rachel dit : J''ai livré un combat surhumain contre ma sœur, et je l''ai emporté. Elle l''appela du nom de Nephtali (« Combat »).'
  '9':
  - type: text
    content: 'Léa, voyant qu''elle avait cessé d''avoir des enfants, prit Zilpa, sa servante, et la donna pour femme à Jacob. '
