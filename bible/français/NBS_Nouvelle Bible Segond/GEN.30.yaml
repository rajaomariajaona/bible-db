        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: moisson des blés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : mai-juin. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mandragores
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : solanacées à grosses racines charnues dont le nom hébreu rappelle l''un des mots traduits par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: amour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . La croyance populaire voyait sans doute en elles un aphrodisiaque et un remède contre la stérilité (cf. Ct 7.12-14).
      marker-yv: yv-n
    - type: text
      text: 'Ruben sortit aux jours de la moisson des blés et trouva des mandragores dans les champs. Il les apporta à Léa, sa mère. Alors Rachel dit à Léa : Donne-moi, je te prie, quelques-unes des mandragores de ton fils. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui répondit : Ne te suffit-il pas d''avoir pris mon mari, que tu prennes aussi les mandragores de mon fils ? Alors Rachel dit : Eh bien, qu''il couche avec toi cette nuit en échange des mandragores de ton fils ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je t''ai engagé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(comme un salarié) : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sakor sekartika
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 18.'
      marker-yv: yv-n
    - type: text
      text: 'Comme Jacob revenait des champs, le soir, Léa sortit à sa rencontre et dit : C''est avec moi que tu iras, car je t''ai engagé au prix des mandragores de mon fils. Il coucha donc avec elle cette nuit-là. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
