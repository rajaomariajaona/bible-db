      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Cf. Pr 31.28 ; Ct 6.9 ; Lc 1.48.
      marker-yv: yv-n
    - type: text
      text: 'Léa dit : Quel bonheur pour moi ! Les filles me déclareront heureuse ! Et elle l''appela du nom d''Aser (« Bonheur »).'
  '14':
  - type: usfm
