      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quel bonheur pour moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: be'ashri ki ’ishrouni banoth
      - type: usfm
        marker: ft
        children:
