          text: '. Le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fq
        children:
        - type: text
