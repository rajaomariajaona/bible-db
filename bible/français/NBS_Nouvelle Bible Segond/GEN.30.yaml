    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1S 1.6 ; Lc 1.7. –  '
      - type: usfm
