          text: par mon bonheur, car les filles me déclareront heureuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . La racine hébraïque, typique des béatitudes (Ps 1.1 ; 32.1 ; 112.1), est ici associée au nom d’
      - type: usfm
