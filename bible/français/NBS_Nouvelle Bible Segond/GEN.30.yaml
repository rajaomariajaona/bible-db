          text: qui a retenu pour toi le fruit du ventre.
      marker-yv: yv-n
    - type: text
      text: 'Jacob se mit en colère contre Rachel ; il dit : Suis-je donc à la place de Dieu, qui t''empêche d''avoir des enfants ? '
