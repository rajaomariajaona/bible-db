      marker-yv: yv-n
    - type: text
      text: 'Léa dit : Dieu m''a donné mon salaire, à moi qui ai donné ma servante à mon mari. Et elle l''appela du nom d''Issacar (« Salarié »). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Léa fut encore enceinte et donna un sixième fils à Jacob. '
  '2':
  - type: usfm
    marker: p
