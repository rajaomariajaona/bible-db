      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entendit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exauça
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité v. 22.'
      marker-yv: yv-n
    - type: text
      text: 'Dieu entendit Léa : elle fut enceinte et donna à Jacob un cinquième fils. '
  '18':
  - type: usfm
