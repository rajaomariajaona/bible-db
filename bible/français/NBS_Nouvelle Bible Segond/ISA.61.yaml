document_id: ISA.61,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'envoyé du Seigneur et sa mission
  - type: text
    content: ' '
  - type: note
    content: 'Lc 4.18s. –  Le souffle (ou l''Esprit , même terme au v. 3) … sur moi 11.2+ ; 42.1+. –  onction 45.1n  ; cf. Ac 10.38. –  bonne nouvelle (40.9n) / pauvres Mt 11.5/ /. –  cœur brisé 57.15. –  proclamer… libération  : cf. 58.6 ; Lv 25.10. –  élargissement  : litt. ouverture des yeux  ; les prisonniers vont passer de l''obscurité du cachot à la lumière. LXX aux aveugles le recouvrement de la vue.'
  - type: text
    content: 'Le souffle du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' est sur moi,'
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a conféré l''onction.'
  - type: text
    content: Il m'a envoyé porter une bonne nouvelle aux pauvres,
  - type: text
    content: panser ceux qui ont le cœur brisé,
  - type: text
    content: proclamer aux captifs leur libération
  - type: text
    content: et aux prisonniers leur élargissement,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Je trouverai la gaieté…  : ces paroles peuvent être celles du prophète ou celles de Sion ; cf. 41.16. –  je serai ou tout mon être sera  ; cf. 1S 2.1 ; Lc 1.46. –  vêtements du salut / manteau de la justice  : cf. 59.17. –  tel un prêtre, se coiffe  : ces mots traduisent un seul verbe hébreu qui signifie habituellement exercer le sacerdoce, faire office de prêtre. –  parure splendide v. 3n  ; cf. Ct 3.11. –  comme la mariée s''orne 49.18 ; Ap 19.8 ; 21.2.'
  - type: text
    content: 'Je trouverai la gaieté dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je serai plein d'allégresse en mon Dieu ;
  - type: text
    content: car il m'a revêtu des vêtements du salut,
  - type: text
    content: il m'a couvert du manteau de la justice,
  - type: text
    content: comme le marié, tel un prêtre, se coiffe d'une parure splendide,
  - type: text
    content: comme la mariée s'orne de ses atours.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'germe  : cf. 42.9+ ; 45.8.'
  - type: text
    content: En effet, comme la terre fait sortir son germe,
  - type: text
    content: et comme un jardin fait germer ses semences,
  - type: text
    content: 'ainsi le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' fera germer la justice et la louange devant toutes les nations.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'année…  : cf. 34.8 ; voir aussi Ex 21.2 ; Lv 25.10 ; Dt 15.12 ; Jr 34.8-16 ; Ez 46.17. –  faveur 49.8+ ; 58.5n. –  jour de vengeance 63.4. –  consoler 40.1+. –  deuil 57.18+.'
  - type: text
    content: 'proclamer pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' une année de faveur'
  - type: text
    content: et pour notre Dieu un jour de vengeance ;
  - type: text
    content: consoler tous ceux qui sont dans le deuil,
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'rétablir les gens de Sion…  : litt. mettre aux endeuillés de Sion, leur donner une parure…  ; LXX porte un seul verbe ( pour donner aux endeuillés de Sion de la gloire… ). –  parure splendide / cendre (cf. 58.5) : les deux mots correspondants font assonance en hébreu ; le premier d''entre eux (aussi au v. 10), qui est apparenté au verbe traduit plus loin par montrer sa splendeur , est traduit par coiffe d''apparat en 3.20 ; il désigne les parures des tiares des prêtres en Ex 39.28 et, sans doute, ces tiares elles-mêmes en Ez 24.17,23 ; 44.18 ( parure ). –  huile de gaieté  : cf. Ps 45.8. –  vêtement (en opposition avec les vêtements déchirés du deuil, 58.5) : cf. v. 10 ; 52.1. –  qui vacille  : cf. 42.3s. –  Plantation / splendeur 60.21.'
  - type: text
    content: rétablir les gens de Sion qui sont dans le deuil,
  - type: text
    content: mettre sur leur tête une parure splendide au lieu de la cendre,
  - type: text
    content: une huile de gaieté au lieu du deuil,
  - type: text
    content: un vêtement de louange au lieu d'un esprit qui vacille,
  - type: text
    content: afin qu'on les appelle « Térébinthes de la justice »,
  - type: text
    content: '« Plantation du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) »,'
  - type: text
    content: pour montrer sa splendeur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ils rebâtiront… 58.12 ; Ez 36.10. –  du passé ou des anciens , c.-à-d. infligés aux ancêtres.
  - type: text
    content: Ils rebâtiront les ruines d'autrefois,
  - type: text
    content: ils relèveront les lieux dévastés du passé ;
  - type: text
    content: ils restaureront des villes désertes,
  - type: text
    content: dévastées de génération en génération.
  '5':
  - type: text
    content: ' '
  - type: note
    content: étrangers et gens d'autres nations traduisent deux formules synonymes en hébreu ; 56.3n  ; cf. 14.2 ; 60.10.
  - type: text
    content: Des étrangers seront là
  - type: text
    content: pour faire paître votre petit bétail,
  - type: text
    content: des gens d'autres nations
  - type: text
    content: seront vos laboureurs et vos vignerons.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Prêtres  : cf. Ex 19.6 ; 1P 2.5 ; Ap 1.6. –  Officiants 60.7+. –  ressources 60.5n. –  nations / gloire 66.12.'
  - type: text
    content: 'Mais vous, on vous appellera « Prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) »,'
  - type: text
    content: on vous dira « Officiants de notre Dieu » ;
  - type: text
    content: vous mangerez les ressources des nations
  - type: text
    content: et vous vous ornerez de leur gloire.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'double  : cf. 40.2n (autre terme hébreu) ; Za 9.12 ; Jb 42.10. –  ils pousseront des cris de joie  : texte obscur.'
  - type: text
    content: Au lieu de votre honte,
  - type: text
    content: vous aurez double mesure ;
  - type: text
    content: au lieu de la confusion,
  - type: text
    content: ils pousseront des cris de joie en voyant leur part ;
  - type: text
    content: ils auront ainsi une double possession dans leur pays,
  - type: text
    content: et leur joie sera perpétuelle.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'j''aime l''équité Ps 37.28. –  la perversité  : d''après plusieurs mss hébreux et des versions anciennes. Le texte hébreu traditionnel porte l''holocauste (les deux mots ne diffèrent en hébreu que par leur vocalisation). –  alliance perpétuelle 24.5n  ; 55.3.'
  - type: text
    content: 'Car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), j''aime l''équité,'
  - type: text
    content: je déteste la spoliation avec la perversité ;
  - type: text
    content: je les récompenserai loyalement
  - type: text
    content: et je conclurai pour eux une alliance perpétuelle.
  '9':
  - type: text
    content: ' '
  - type: note
    content: descendance bénie 65.23.
  - type: text
    content: Leur descendance sera connue parmi les nations
  - type: text
    content: et leur progéniture au milieu des peuples ;
  - type: text
    content: tous ceux qui les verront reconnaîtront
  - type: text
    content: 'qu''ils sont une descendance bénie du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Chant de reconnaissance
