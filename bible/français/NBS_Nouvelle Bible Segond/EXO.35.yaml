document_id: EXO.35,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le sabbat, jour de repos
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rassembla… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 32.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse rassembla toute la communauté des Israélites et leur dit : Voici ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a ordonné de faire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous ceux d'entre vous qui sont habiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout sage de cœur parmi vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 28.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; les termes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: habiles, habileté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', rendent des formules analogues dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Que tous ceux d''entre vous qui sont habiles viennent faire tout ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a ordonné : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la Demeure, sa tente et sa couverture, ses agrafes, ses planches, ses traverses, ses colonnes et ses socles ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.12 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'expiatoire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le Coffre et ses barres, l''expiatoire et le voile qui sert de rideau ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la table, ses barres, tous ses ustensiles et le pain offert ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le luminaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. (la première fois) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le porte-lampes du luminaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (25.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'le luminaire, ses ustensiles, ses lampes et l''huile pour le luminaire ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce v. constitue la deuxième partie du v. 12 dans LXX.
      marker-yv: yv-n
    - type: text
      text: 'l''autel de l''encens et ses barres ; l''huile d''onction et l''encens aromatique ; le rideau de l''entrée, pour l''entrée de la Demeure ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l''autel des holocaustes, sa grille de bronze, ses barres et tous ses ustensiles ; la cuve et sa base ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les v. 17s sont absents de LXX.
      marker-yv: yv-n
    - type: text
      text: 'les tentures de la cour, ses colonnes, ses socles et le rideau de la porte de la cour ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les piquets de la Demeure, les piquets de la cour et leurs cordages ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtements spéciaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: les vêtements spéciaux pour officier dans le sanctuaire, les vêtements sacrés pour Aaron, le prêtre, et les vêtements sacerdotaux de ses fils.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.29+ ; 31.12-17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mis à mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 31.15.
      marker-yv: yv-n
    - type: text
      text: 'Pendant six jours on travaillera ; mais le septième jour sera un jour sacré, un sabbat, un repos sabbatique pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Quiconque travaillera ce jour-là sera mis à mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Toute la communauté des Israélites se retira de devant Moïse. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le cœur bien disposé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 31.
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui avaient le cœur bien disposé et l''esprit généreux vinrent apporter le prélèvement du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour les travaux de la tente de la Rencontre, pour tout son service et pour les vêtements sacrés. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vinrent, les hommes comme les femmes ; tous ceux qui avaient le cœur généreux apportèrent, qui une boucle, qui un anneau, qui une bague à cachet, qui un médaillon, toutes sortes d''objets d''or ; de même tout homme qui dédia rituellement de l''or au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux qui avaient de la pourpre violette et rouge, de l''écarlate, du fin lin et du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins les apportèrent. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les travaux du service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 36.1.'
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui avaient fait un prélèvement d''argent ou de bronze apportèrent le prélèvement du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Tous ceux qui avaient du bois d''acacia l''apportèrent pour tous les travaux du service. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Toutes les femmes habiles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Toutes les femmes habiles filèrent de leurs mains, et elles apportèrent ce qu''elles avaient filé : de la pourpre violette et rouge, de l''écarlate et du fin lin. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les femmes habiles dont le cœur était bien disposé filèrent du poil de chèvre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les princes apportèrent des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que des essences odoriférantes et de l''huile pour le luminaire, pour l''huile d''onction et pour l''encens aromatique. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contribuer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: apporter.
      marker-yv: yv-n
    - type: text
      text: 'Tout homme, toute femme qui avait le cœur assez généreux pour contribuer à tous les travaux que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné de faire par l''intermédiaire de Moïse, tous ces Israélites apportèrent des offrandes volontaires au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Betsaléel et Oholiab se mettent au travail
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n'allumerez pas de feu, dans aucun de vos lieux d'habitation, le jour du sabbat.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Israélites apportent leur contribution
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.1-11. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit aux Israélites : Regardez : le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a appelé par son nom Betsaléel, fils d''Ouri, fils de Hour, de la tribu de Juda. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: souffle de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il l''a rempli du souffle de Dieu, de sagesse, d''intelligence et de connaissance pour toutes sortes de travaux, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour concevoir des ouvrages, pour travailler l''or, l''argent et le bronze, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour graver les pierres à enchâsser, pour tailler le bois et pour faire toutes sortes de travaux d''artisanat. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: accordé le don
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 36.1.'
      marker-yv: yv-n
    - type: text
      text: 'Il lui a aussi accordé le don d''enseigner, de même qu''à Oholiab, fils d''Ahisamak, de la tribu de Dan. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il les a remplis d'habileté pour faire toutes sortes de travaux de sculpture et d'artisanat, pour broder et tisser la pourpre violette et rouge, l'écarlate et le fin lin, pour faire toutes sortes de travaux et pour concevoir des ouvrages.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les derniers chap. racontent l'exécution des ordres donnés aux chap. 25-31. Nous nous contentons de renvoyer aux notes de ces chap.
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit à toute la communauté des Israélites : Voici ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a ordonné : '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'homme au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' généreux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 25.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (tournure analogue) ; le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'généreux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduit des formules apparentées dans la suite.
      marker-yv: yv-n
    - type: text
      text: 'Prenez sur ce qui vous appartient un prélèvement pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Tout homme au cœur généreux apportera le prélèvement du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : de l''or, de l''argent et du bronze ; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de la pourpre violette et rouge, de l''écarlate, du fin lin et du poil de chèvre ; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des peaux de béliers teintes en rouge et des peaux de dauphins ; du bois d''acacia ; '
  '8':
