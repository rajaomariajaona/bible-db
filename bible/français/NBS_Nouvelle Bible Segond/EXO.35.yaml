document_id: EXO.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sabbat, jour de repos
  - type: text
    content: ' '
  - type: note
    content: rassembla… 12.3n  ; 32.1n.
  - type: text
    content: 'Moïse rassembla toute la communauté des Israélites et leur dit : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné de faire. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tous ceux d''entre vous qui sont habiles  : litt. tout sage de cœur parmi vous , cf. 28.3n  ; les termes habiles, habileté , rendent des formules analogues dans la suite.'
  - type: text
    content: 'Que tous ceux d''entre vous qui sont habiles viennent faire tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné : '
  '11':
  - type: text
    content: 'la Demeure, sa tente et sa couverture, ses agrafes, ses planches, ses traverses, ses colonnes et ses socles ; '
  '12':
  - type: note
    content: l'expiatoire 25.17n.
  - type: text
    content: 'le Coffre et ses barres, l''expiatoire et le voile qui sert de rideau ; '
  '13':
  - type: text
    content: 'la table, ses barres, tous ses ustensiles et le pain offert ; '
  '14':
  - type: note
    content: 'le luminaire  : litt. (la première fois) le porte-lampes du luminaire (25.6n).'
  - type: text
    content: 'le luminaire, ses ustensiles, ses lampes et l''huile pour le luminaire ; '
  '15':
  - type: note
    content: Ce v. constitue la deuxième partie du v. 12 dans LXX.
  - type: text
    content: 'l''autel de l''encens et ses barres ; l''huile d''onction et l''encens aromatique ; le rideau de l''entrée, pour l''entrée de la Demeure ; '
  '16':
  - type: text
    content: 'l''autel des holocaustes, sa grille de bronze, ses barres et tous ses ustensiles ; la cuve et sa base ; '
  '17':
  - type: note
    content: Les v. 17s sont absents de LXX.
  - type: text
    content: 'les tentures de la cour, ses colonnes, ses socles et le rideau de la porte de la cour ; '
  '18':
  - type: text
    content: 'les piquets de la Demeure, les piquets de la cour et leurs cordages ; '
  '19':
  - type: note
    content: 'vêtements spéciaux 31.10n. –  sacrés  : voir saint. – Voir prêtre.'
  - type: text
    content: les vêtements spéciaux pour officier dans le sanctuaire, les vêtements sacrés pour Aaron, le prêtre, et les vêtements sacerdotaux de ses fils.
  '2':
  - type: note
    content: 'sacré  : voir saint. –  sabbat 16.29+ ; 31.12-17. –  mis à mort 31.15.'
  - type: text
    content: 'Pendant six jours on travaillera ; mais le septième jour sera un jour sacré, un sabbat, un repos sabbatique pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Quiconque travaillera ce jour-là sera mis à mort. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: communauté 12.3n.
  - type: text
    content: 'Toute la communauté des Israélites se retira de devant Moïse. '
  '21':
  - type: note
    content: 'le cœur bien disposé… v. 5n. –  esprit  : le même terme est traduit par souffle au v. 31.'
  - type: text
    content: 'Tous ceux qui avaient le cœur bien disposé et l''esprit généreux vinrent apporter le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour les travaux de la tente de la Rencontre, pour tout son service et pour les vêtements sacrés. '
  '22':
  - type: text
    content: 'Ils vinrent, les hommes comme les femmes ; tous ceux qui avaient le cœur généreux apportèrent, qui une boucle, qui un anneau, qui une bague à cachet, qui un médaillon, toutes sortes d''objets d''or ; de même tout homme qui dédia rituellement de l''or au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Tous ceux qui avaient de la pourpre violette et rouge, de l''écarlate, du fin lin et du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins les apportèrent. '
  '24':
  - type: note
    content: 'les travaux du service  : cf. 36.1.'
  - type: text
    content: 'Tous ceux qui avaient fait un prélèvement d''argent ou de bronze apportèrent le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Tous ceux qui avaient du bois d''acacia l''apportèrent pour tous les travaux du service. '
  '25':
  - type: note
    content: Toutes les femmes habiles v. 10n.
  - type: text
    content: 'Toutes les femmes habiles filèrent de leurs mains, et elles apportèrent ce qu''elles avaient filé : de la pourpre violette et rouge, de l''écarlate et du fin lin. '
  '26':
  - type: text
    content: 'Toutes les femmes habiles dont le cœur était bien disposé filèrent du poil de chèvre. '
  '27':
  - type: text
    content: 'Les princes apportèrent des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral, '
  '28':
  - type: text
    content: 'ainsi que des essences odoriférantes et de l''huile pour le luminaire, pour l''huile d''onction et pour l''encens aromatique. '
  '29':
  - type: note
    content: 'V. 5n. –  contribuer  : litt. apporter.'
  - type: text
    content: 'Tout homme, toute femme qui avait le cœur assez généreux pour contribuer à tous les travaux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné de faire par l''intermédiaire de Moïse, tous ces Israélites apportèrent des offrandes volontaires au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Betsaléel et Oholiab se mettent au travail
  '3':
  - type: text
    content: Vous n'allumerez pas de feu, dans aucun de vos lieux d'habitation, le jour du sabbat.
  - type: heading
    content: Les Israélites apportent leur contribution
  '30':
  - type: text
    content: ' '
  - type: note
    content: 31.1-11. – Voir nom.
  - type: text
    content: 'Moïse dit aux Israélites : Regardez : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a appelé par son nom Betsaléel, fils d''Ouri, fils de Hour, de la tribu de Juda. '
  '31':
  - type: note
    content: '31.3. –  souffle de Dieu  : cf. v. 21n.'
  - type: text
    content: 'Il l''a rempli du souffle de Dieu, de sagesse, d''intelligence et de connaissance pour toutes sortes de travaux, '
  '32':
  - type: text
    content: 'pour concevoir des ouvrages, pour travailler l''or, l''argent et le bronze, '
  '33':
  - type: text
    content: 'pour graver les pierres à enchâsser, pour tailler le bois et pour faire toutes sortes de travaux d''artisanat. '
  '34':
  - type: note
    content: 'accordé le don  : litt. donné (ou mis) dans son cœur  ; cf. 36.1.'
  - type: text
    content: 'Il lui a aussi accordé le don d''enseigner, de même qu''à Oholiab, fils d''Ahisamak, de la tribu de Dan. '
  '35':
  - type: note
    content: V. 10n.
  - type: text
    content: Il les a remplis d'habileté pour faire toutes sortes de travaux de sculpture et d'artisanat, pour broder et tisser la pourpre violette et rouge, l'écarlate et le fin lin, pour faire toutes sortes de travaux et pour concevoir des ouvrages.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Les derniers chap. racontent l'exécution des ordres donnés aux chap. 25-31. Nous nous contentons de renvoyer aux notes de ces chap.
  - type: text
    content: 'Moïse dit à toute la communauté des Israélites : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné : '
  '5':
  - type: note
    content: 'homme au cœur généreux  : voir 25.2n (tournure analogue) ; le mot généreux traduit des formules apparentées dans la suite.'
  - type: text
    content: 'Prenez sur ce qui vous appartient un prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Tout homme au cœur généreux apportera le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : de l''or, de l''argent et du bronze ; '
  '6':
  - type: text
    content: 'de la pourpre violette et rouge, de l''écarlate, du fin lin et du poil de chèvre ; '
  '7':
  - type: text
    content: 'des peaux de béliers teintes en rouge et des peaux de dauphins ; du bois d''acacia ; '
  '8':
  - type: note
    content: Ce v. est absent de LXX. – Voir onction.
  - type: text
    content: 'de l''huile pour le luminaire, des essences odoriférantes pour l''huile d''onction et pour l''encens aromatique ; '
  '9':
  - type: text
    content: des pierres d'onyx et d'autres pierres pour la garniture de l'éphod et du pectoral.
