document_id: JOB.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention d''Eliphaz : heureux l''homme que Dieu reprend !'
  - type: text
    content: 'Eliphaz le Témanite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'rugissement 3.24n. –  lion  : les v. 10s emploient cinq termes hébreux différents qui semblent désigner le même animal. Cf. 38.39s ; So 3.3 ; Ps 10.9 ; 17.12 ; 22.14,22 ; 34.11 ; 57.5 ; Pr 28.15.'
  - type: text
    content: Le rugissement du lion, le cri du fauve,
  - type: text
    content: les dents du jeune lion se brisent ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: proie 16.9n.
  - type: text
    content: le lion disparaît faute de proie,
  - type: text
    content: la progéniture de la lionne se disperse.
  '12':
  - type: text
    content: Une parole est arrivée furtivement jusqu'à moi,
  - type: text
    content: mon oreille en a perçu le murmure.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 7.14 ; 33.15. –  visions nocturnes Gn 20.3 ; 41.25 ; Nb 12.6. –  torpeur ou profond sommeil , cf. Gn 2.21+.
  - type: text
    content: Au moment où les angoisses surgissent des visions nocturnes,
  - type: text
    content: quand une torpeur tombe sur les hommes,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'frisson  : cf. Ps 55.6 ; Esd 10.9n. –  tous mes os ont tremblé  : litt. il (ou cela ) fit trembler (verbe apparenté au mot traduit par frayeur ) la multitude de mes os.'
  - type: text
    content: frayeur et frisson m'ont assailli,
  - type: text
    content: tous mes os ont tremblé ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'souffle ou vent, esprit . –  passait  : même verbe (ou homonymes) en 9.11,26 ; 11.10 ; 14.7 ( repousser ) ; 20.24 ( transpercer ) ; 29.20 ( retrouver sa force ) ; cf. Es 21.1 ( balayer ). –  mon corps  : litt. ma chair.'
  - type: text
    content: un souffle passait sur mon visage,
  - type: text
    content: tous les poils de mon corps se sont hérissés.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'forme  : cf. Nb 12.8n. –  J''entendis dans le calme (ou dans le silence ) …  : litt. silence et la voix j''entends  ; voir 1R 19.12n.'
  - type: text
    content: 'Quelqu''un se tenait là :'
  - type: text
    content: je ne reconnaissais pas son aspect ;
  - type: text
    content: une forme était devant mes yeux.
  - type: text
    content: 'J''entendis dans le calme une voix qui disait :'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '9.2 ; 14.3s ; 15.14 ; 25.4 ; Ps 143.2 ; Pr 20.9 ; Rm 3.10ss. –  Un mortel  : le mot hébreu, habituellement traduit par homme , souligne parfois la fragilité de l''humain, alors que le terme rendu par homme au vers suivant désigne plutôt un homme vaillant (cf. 38.3). –  plus juste que…  : autre traduction juste devant Dieu… pur devant celui qui le fait  ; cf. 9.2 ; 25.4 ; 32.2+.'
  - type: text
    content: Un mortel serait-il plus juste que Dieu ?
  - type: text
    content: Un homme serait-il plus pur que celui qui le fait ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le mot traduit par erreurs n''apparaît qu''ici et son sens est incertain ; autres traductions de l''égarement ; une folie  ; cf. 15.5. –  messagers  : voir ange.'
  - type: text
    content: Si Dieu ne fait pas confiance à ses serviteurs,
  - type: text
    content: s'il découvre des erreurs chez ses messagers,
  '19':
  - type: text
    content: ' '
  - type: note
    content: '25.6. –  ceux qui demeurent…  : c.-à-d. les humains.'
  - type: text
    content: combien plus chez ceux qui demeurent dans des maisons d'argile,
  - type: text
    content: eux dont les fondations sont dans la poussière
  - type: text
    content: et qu'on écrase plus vite qu'une mite !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Si l''on tente…  : on a aussi compris  : t''envoie-t-il une épreuve, tu te lasses ! (cf. v. 5). –  retenir ses propos  : cf. 32.18-20 ; Jc 3.2.'
  - type: text
    content: Si l'on tente de prononcer une parole, en seras-tu lassé ?
  - type: text
    content: Mais qui pourrait retenir ses propos ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ps 90.5s.
  - type: text
    content: Du matin au soir ils sont mis en pièces,
  - type: text
    content: ils disparaissent pour toujours, et personne n'y prend garde ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'la corde…  : texte incertain, litt. leur corde (même terme pour une corde d''arc en 30.11 ; cf. Jg 16.7n) n''est-elle pas arrachée en (ou chez ) eux  ; cf. Jb 8.22. –  sans sagesse  : autres traductions faute de sagesse ; sans le savoir ; et ce n''est pas à cause de la sagesse  ; cf. 32.12.'
  - type: text
    content: la corde de leur tente est arrachée,
  - type: text
    content: ils meurent sans sagesse.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'instruit  : autres traductions corrigé ; donné des leçons à  ; cf. 12.18n  ; 40.2 ; Pr 1.2n. –  tu as encouragé…  : litt. tu as fortifié les mains faibles , 1S 23.16 ; Es 35.3s ; Hé 12.12.'
  - type: text
    content: Tu as instruit beaucoup de gens,
  - type: text
    content: tu as encouragé les faibles,
  '4':
  - type: text
    content: tes propos ont relevé celui qui trébuchait,
  - type: text
    content: tu as affermi les genoux qui pliaient.
  '5':
  - type: text
    content: ' '
  - type: note
    content: V. 2 ; cf. Pr 24.10 ; Rm 2.19-21.
  - type: text
    content: Et maintenant qu'il s'agit de toi, tu te lasses !
  - type: text
    content: Maintenant que cela te touche, tu es saisi d'épouvante !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ta piété  : litt. ta crainte , cf. 15.4n  ; 22.4n  ; voir aussi 28.28+. –  ton assurance ou ta confiance  ; cf. 8.14n  ; Ps 85.9n.'
  - type: text
    content: Ta piété n'est-elle pas ton assurance ?
  - type: text
    content: Ton espoir, n'est-ce pas l'intégrité de tes voies ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 22.5s ; 34.20s ; 37.25 ; Pr 12.21 ; 2P 2.9 ; cf. Siracide 2.10 : « Regardez les générations passées et voyez : qui a mis sa confiance dans le Seigneur et a été déçu ? Qui a persévéré dans la crainte du Seigneur et a été abandonné ? Qui l''a invoqué et en a été méprisé ? » –  péri  : le verbe hébreu correspondant est traduit par (être) détruit en 15.28, par disparaître en 22.20 ; une autre forme du même verbe signifie cacher , 6.10n  ; 15.18 ; 27.11.'
  - type: text
    content: 'Souviens-toi, je te prie :'
  - type: text
    content: quel est l'innocent qui a disparu ?
  - type: text
    content: Où les gens droits ont-ils péri ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Os 8.7 ; 10.13 ; Pr 22.8 ; Ga 6.7 ; cf. Siracide 7.3 : « Ne sème pas dans les sillons de l''injustice, de peur d''en récolter sept fois plus. » –  mal / oppression 5.6s ; cf. Ps 7.15+.'
  - type: text
    content: Comme je l'ai vu, ceux qui labourent le mal
  - type: text
    content: et qui sèment l'oppression en font aussi la moisson ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 27.3+.
  - type: text
    content: ils disparaissent par le souffle de Dieu,
  - type: text
    content: ils sont exterminés par le vent de sa colère.
