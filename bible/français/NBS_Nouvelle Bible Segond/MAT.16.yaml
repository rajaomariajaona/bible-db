      children:
      - type: text
        text: ' : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui suis-je, moi, le Fils de l''homme ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.20+.
    marker-yv: yv-n
  - type: text
    text: 'Jésus, arrivé dans la région de Césarée de Philippe, se mit à demander à ses disciples : Au dire des gens, qui est le Fils de l''homme ? '
  - type: usfm
    marker: v
