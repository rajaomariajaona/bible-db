    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.18 : « Comme le feuillage verdoyant sur un arbre touffu tantôt tombe et tantôt repousse, ainsi les générations de chair et de sang : l''une meurt et une autre apparaît. » 17.31 : « L''être de chair et de sang médite le mal. » '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Hénoch
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.4 : « Eux (les humains) qui créent de la chair et du sang, qui meurent et disparaissent. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'révélé '
    - type: usfm
      marker: ft
      children:
      - type: text
