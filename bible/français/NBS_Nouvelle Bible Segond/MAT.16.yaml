      - type: text
        text: V. 1,11s ; 13.33
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 12.1 ; 1Co 5.7.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit : Veillez à vous garder du levain des pharisiens et des sadducéens. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
