      - type: text
        text: '16.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains mss omettent la première partie de la réponse, depuis '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le soir… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: jusqu'à la fin du v. 3. Cf. Lc 12.54-56.
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Le soir, vous dites : « Il fera beau, car le ciel est rouge. » '
  - type: usfm
    marker: v
    metadata:
