      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
      - type: text
        text: ' et le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
