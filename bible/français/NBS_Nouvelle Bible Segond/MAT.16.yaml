document_id: MAT.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Pas de signe venant du ciel
  - type: heading
    content: Mc 8.11-13  ; Lc 11.16,29
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.38. –  pharisiens / sadducéens v. 6,11s ; 3.7+. –  mettre à l''épreuve 4.1n. –  signe  : cf. Ex 4.1-9 ; Jg 6.17 ; 2R 20.8 ; Es 7.11,14.'
  - type: text
    content: 'Les pharisiens et les sadducéens l''abordèrent et, pour le mettre à l''épreuve, lui demandèrent de leur faire voir un signe venant du ciel. '
  '10':
  - type: note
    content: 15.34-38.
  - type: text
    content: 'ni les sept pains des quatre mille et le nombre de corbeilles que vous avez emportées ? '
  '11':
  - type: note
    content: V. 6.
  - type: text
    content: 'Comment pouvez-vous ne pas comprendre que ce n''est pas de pains que je vous parlais ? Mais gardez-vous du levain des pharisiens et des sadducéens. '
  '12':
  - type: note
    content: 'Cf. 5.20+. –  des pains  : certains mss portent du pain.'
  - type: text
    content: Alors ils comprirent qu'il avait dit de se garder non pas du levain des pains, mais de l'enseignement des pharisiens et des sadducéens.
  - type: heading
    content: Pierre déclare que Jésus est le Christ
  - type: heading
    content: Mc 8.27-30  ; Lc 9.18-21  ; cf. Jn 6.66-71
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Césarée de Philippe  : ville bâtie par Hérode Philippe près des sources du Jourdain, au nord-est de la Galilée. –  des gens  : autres traductions des humains ; des hommes (même terme dans l''expression Fils de l''homme ) ; cf. 5.13+. –  qui est…  : certains mss portent qui suis-je, moi, le Fils de l''homme ? 8.20+.'
  - type: text
    content: 'Jésus, arrivé dans la région de Césarée de Philippe, se mit à demander à ses disciples : Au dire des gens, qui est le Fils de l''homme ? '
  '14':
  - type: note
    content: Cf. 14.2 ; 17.10 ; 21.11+ ; Mc 6.14s. –  Jean le Baptiseur 3.1n. –  l'un des prophètes 5.12+ ; 11.13 ; 13.17.
  - type: text
    content: 'Ils dirent : Pour les uns, Jean le Baptiseur ; pour d''autres, Elie ; pour d''autres encore, Jérémie, ou l''un des prophètes. '
  '15':
  - type: text
    content: '– Et pour vous, leur dit-il, qui suis-je ? '
  '16':
  - type: note
    content: 'Christ 1.16n. –  Fils du Dieu vivant  : cf. 3.17 ; 8.29 ; 14.33 ; 26.63 ; 27.40,43,54 ; Jn 1.34+.'
  - type: text
    content: 'Simon Pierre répondit : Toi, tu es le Christ, le Fils du Dieu vivant. '
  '17':
  - type: note
    content: 'Heureux 13.16. –  Simon 4.18. –  la chair et le sang 1Co 15.50 ; Ga 1.16 ; Ep 6.12 ; Hé 2.14 ; Siracide 14.18 : « Comme le feuillage verdoyant sur un arbre touffu tantôt tombe et tantôt repousse, ainsi les générations de chair et de sang : l''une meurt et une autre apparaît. » 17.31 : « L''être de chair et de sang médite le mal. » 1 Hénoch 15.4 : « Eux (les humains) qui créent de la chair et du sang, qui meurent et disparaissent. » –  révélé 11.27 (cf. 16.23) ; Jn 6.44s ; 1Co 2.9 ; 12.3 ; Ga 1.15s.'
  - type: text
    content: 'Jésus lui dit : Heureux es-tu, Simon, fils de Jonas ; car ce ne sont pas la chair et le sang qui t''ont révélé cela, mais mon Père qui est dans les cieux ! '
  '18':
  - type: note
    content: 'pierre  : en grec petra (roc, 7.24ss ; rocher, 27.51). Le nom de Pierre se dit Petros (cf. Jn 1.42) ; voir Ep 2.20 ; 1P 2.5ss. –  Eglise  : transcription traditionnelle du grec ekklèsia qui, avant le N.T., avait été souvent employé dans la traduction grecque de l''A.T. (LXX) au sens d’assemblée  ; Dt 23.2,4 ; Ps 22.23 ; Ac 7.38. –  les portes du séjour des morts…  : c.-à-d. le pouvoir de la mort, ou celui du mal ; cf. v. 28 ; 10.23 ; sur l''expression, voir Ps 9.14 ; Jb 38.17 ; Sagesse 16.13 : « Tu as pouvoir sur la vie et la mort, tu fais descendre aux portes de l''Hadès et en fais remonter. » Voir aussi Es 5.14 ; 28.15-19 ; Pr 1.12 ; Ap 6.8 ; 9.1ss ; 20.3,7s ; Hymnes (Qumrân) 6.24ss : « Et l''Abîme retentit de mon gémissement, et mon âme descendit jusqu''aux portes de la Mort. Et je fus comme quelqu''un qui a pénétré dans une ville fortifiée et qui s''est retranché dans une muraille escarpée en attendant la délivrance. Et je me suis appuyé sur ta vérité, ô mon Dieu ! Car c''est toi qui mettras la fondation sur le rocher et la charpente sur le cordeau de justice et le fil à plomb de vérité pour contrôler les pierres éprouvées, en vue de construire une bâtisse robuste, telle qu''elle ne soit pas ébranlée et que nul de ceux qui y pénètrent ne chancelle. » –  ne prévaudront pas Es 54.17.'
  - type: text
    content: 'Moi, je te dis que tu es Pierre, et sur cette pierre je construirai mon Eglise, et les portes du séjour des morts ne prévaudront pas contre elle. '
  '19':
  - type: note
    content: 'les clefs, symboles du pouvoir, cf. 23.13 ; Es 22.22 ; Ap 1.18 ; 3.7. –  lié / délié  : dans les textes anciens, des expressions analogues sont employées dans des sens très différents en fonction des contextes (p. ex., dans des écrits magiques, le sens est analogue à celui du couple envoûter / désenvoûter). Dans l''usage du judaïsme rabbinique, il s''agit le plus souvent d’interdire et d’autoriser  ; on trouve aussi d''autres nuances, comme exclure et intégrer (dans une communauté), retenir et pardonner (les péchés) ; cf. 18.18 ; Jn 20.23 ; voir aussi Jb 38.31.'
  - type: text
    content: 'Je te donnerai les clefs du royaume des cieux : ce que tu lieras sur la terre sera lié dans les cieux, et ce que tu délieras sur la terre sera délié dans les cieux.'
  '2':
  - type: note
    content: Certains mss omettent la première partie de la réponse, depuis Le soir… jusqu'à la fin du v. 3. Cf. Lc 12.54-56.
  - type: text
    content: 'Il leur répondit : Le soir, vous dites : « Il fera beau, car le ciel est rouge. » '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 8.4.
  - type: text
    content: Alors il recommanda aux disciples de ne dire à personne qu'il était le Christ.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: Mc 8.31-33  ; Lc 9.22
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Dès lors 4.17. –  Jésus  : certains mss portent Jésus-Christ . –  il lui fallait… 17.12,22s/ / ; 20.18s/ / ; 26.2/ / ; Lc 24.6s. –  Jérusalem Lc 13.33. –  anciens / grands prêtres / scribes 2.4n  ; 27.41+. –  se réveiller  : autre traduction se relever , cf. 2.13n  ; voir résurrection. –  troisième jour 12.40 ; 28.6 ; Os 6.2 ; Jn 2.19 ; 1Co 15.4.'
  - type: text
    content: 'Dès lors Jésus commença à montrer à ses disciples qu''il lui fallait aller à Jérusalem, souffrir beaucoup de la part des anciens, des grands prêtres et des scribes, être tué et se réveiller le troisième jour. '
  '22':
  - type: note
    content: 'le rabrouer 8.26n. –  Dieu t''en préserve  : dans l''expression grecque correspondante, le mot pour Dieu est absent, mais vraisemblablement sous-entendu ; autres traductions  : Que Dieu te soit propice ! Dieu ait pitié de toi ! d''autres comprennent, sans sous-entendre le mot Dieu : Sûrement pas ! –  jamais  : autre traduction en aucun cas.'
  - type: text
    content: 'Pierre le prit à part et se mit à le rabrouer, en disant : Dieu t''en préserve, Seigneur ! Cela ne t''arrivera jamais. '
  '23':
  - type: note
    content: 'Va-t''en (4.10) derrière moi  : la formule traduite par derrière moi se retrouve au v. 24 dans l''expression venir à ma suite, litt. venir derrière moi. –  Satan  : voir Mc 8.33n et démon, diable, Satan. –  une cause de chute 11.6n  ; cf. 2S 19.23. –  tu ne penses pas…  : litt. tu ne penses pas les choses de Dieu, mais celles des humains (ou des hommes ; des gens  ; cf. 5.13+) ; l''expression peut signifier, plus simplement  : tu n''es pas du côté de Dieu, mais du côté des humains  ; cf. v. 17 ; 12.40 ; Es 55.8 ; 1Co 2.14 ; 3.3 ; même tournure en Rm 8.5ss (s''accorder aux tendances de) ; formulation comparable Ph 3.19 ; Col 3.2 (penser à).'
  - type: text
    content: 'Mais lui se retourna et dit à Pierre : Va-t''en derrière moi, Satan ! Tu es pour moi une cause de chute, car tu ne penses pas comme Dieu, mais comme les humains.'
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: Mc 8.34–9.1  ; Lc 9.23-27
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'qu''il se renie lui-même  : même verbe 26.34s,75 ; verbe apparenté 10.33n  ; cf. 10.38s/ / ; Lc 14.26s ; Jn 12.26.'
  - type: text
    content: 'Alors Jésus dit à ses disciples : Si quelqu''un veut venir à ma suite, qu''il se renie lui-même, qu''il se charge de sa croix et qu''il me suive. '
  '25':
  - type: note
    content: Autre traduction Quiconque voudra se sauver se perdra, mais quiconque se perdra à cause de moi se trouvera  ; sur le terme traduit par vie, voir 10.28n. – Lc 17.33 ; Jn 12.25 ; Ac 20.24 ; Ap 12.11.
  - type: text
    content: 'Car quiconque voudra sauver sa vie la perdra, mais quiconque perdra sa vie à cause de moi la trouvera. '
  '26':
  - type: note
    content: 'gagner le monde 4.8 ; Jc 4.13. –  perd  : le verbe employé ici peut évoquer la perte qui découle d''une amende ; celui qui apparaît au v. 25 signifie parfois faire disparaître ou faire périr (2.13) ; il a aussi le simple sens de perdre (10.42). Autres traductions s''il perd son âme ; s''il se perd lui-même, cf. v. 25+ ; Ps 49.7-9 ; Lc 12.20.'
  - type: text
    content: 'Et à quoi servira-t-il à un être humain de gagner le monde entier, s''il perd sa vie ? Ou bien, que donnera un être humain en échange de sa vie ? '
  '27':
  - type: note
    content: 'Fils de l''homme (v. 13n) … gloire 19.28 ; 24.30s/ / ; 25.31 ; 2Th 1.7. –  avec ses anges  : cf. 13.41+ ; 24.31,36 ; 25.31. –  il rendra… Ps 62.13 ; Pr 24.12.'
  - type: text
    content: 'Car le Fils de l''homme va venir dans la gloire de son Père, avec ses anges, et alors '
  - type: text
    content: il rendra à chacun selon sa manière d'agir
  - type: text
    content: '. '
  '28':
  - type: note
    content: Cf. 10.23 ; 23.36 ; 24.34. –  Amen 5.18n. –  ne goûteront pas (autres traductions jamais, en aucun cas) la mort Jn 8.52 ; Hé 2.9. –  sa royauté ou son royaume, son règne, cf. 3.2n.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, quelques-uns de ceux qui se tiennent ici ne goûteront pas la mort avant d''avoir vu le Fils de l''homme venant dans sa royauté.'
  '3':
  - type: note
    content: 'orage  : le même mot est aussi traduit par hiver (24.20) et tempête (Ac 27.20). –  signes des temps  : cf. Lc 19.44.'
  - type: text
    content: 'Et le matin : « Il y aura de l''orage aujourd''hui, car le ciel est d''un rouge sombre. » Vous savez discerner l''aspect du ciel, et vous ne pouvez pas discerner les signes des temps ! '
  '4':
  - type: note
    content: 'génération… 12.39+,45. –  Jonas  : cf. 12.39-41n.'
  - type: text
    content: Une génération mauvaise et adultère recherche un signe ; il ne lui sera pas donné d'autre signe que le signe de Jonas. Puis il les laissa et s'en alla.
  - type: heading
    content: Le levain des pharisiens et des sadducéens
  - type: heading
    content: Mc 8.14-21
  '5':
  - type: text
    content: 'Les disciples, en partant pour l''autre rive, avaient oublié de prendre des pains. '
  '6':
  - type: note
    content: V. 1,11s ; 13.33n  ; Lc 12.1 ; 1Co 5.7.
  - type: text
    content: 'Jésus leur dit : Veillez à vous garder du levain des pharisiens et des sadducéens. '
  '7':
  - type: note
    content: 'raisonnaient  : la tournure du grec peut signifier raisonnaient en eux-mêmes ou entre eux, même possibilité v. 8 ; cf. 21.25. –  C''est parce que…  : autre traduction et disaient : Nous n''avons pas pris de pains.'
  - type: text
    content: 'Les disciples raisonnaient, se disant : C''est parce que nous n''avons pas pris de pains. '
  '8':
  - type: note
    content: 's''en rendit compte 12.15+ ; Mc 2.8/ /. –  raisonnez… v. 7n. –  peu de foi  : cf. 6.30+s. –  en vous disant  : autre traduction parce que. –  vous n''avez pas  : certains mss portent vous n''avez pas pris.'
  - type: text
    content: 'Jésus s''en rendit compte et dit : Pourquoi raisonnez-vous, gens de peu de foi, en vous disant que vous n''avez pas de pains ? '
  '9':
  - type: note
    content: 14.17-21 ; Mc 6.52.
  - type: text
    content: 'Vous ne comprenez pas encore ? Vous ne vous rappelez pas les cinq pains des cinq mille et le nombre de paniers que vous avez emportés, '
