    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''en rendit compte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.15+ ; Mc 2.8/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'raisonnez… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: peu de foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.30+s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en vous disant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parce que
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous n'avez pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous n'avez pas pris.
    marker-yv: yv-n
  - type: text
    text: 'Jésus s''en rendit compte et dit : Pourquoi raisonnez-vous, gens de peu de foi, en vous disant que vous n''avez pas de pains ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.17-21 ; Mc 6.52.
    marker-yv: yv-n
  - type: text
    text: 'Vous ne comprenez pas encore ? Vous ne vous rappelez pas les cinq pains des cinq mille et le nombre de paniers que vous avez emportés, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 15.34-38.
    marker-yv: yv-n
  - type: text
    text: 'ni les sept pains des quatre mille et le nombre de corbeilles que vous avez emportées ? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 6.
    marker-yv: yv-n
  - type: text
    text: 'Comment pouvez-vous ne pas comprendre que ce n''est pas de pains que je vous parlais ? Mais gardez-vous du levain des pharisiens et des sadducéens. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 5.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des pains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du pain.
    marker-yv: yv-n
  - type: text
    text: Alors ils comprirent qu'il avait dit de se garder non pas du levain des pains, mais de l'enseignement des pharisiens et des sadducéens.
