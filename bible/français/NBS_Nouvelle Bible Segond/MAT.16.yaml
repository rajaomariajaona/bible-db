  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: raisonnaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la tournure du grec peut signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'raisonnaient en eux-mêmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entre eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même possibilité v. 8 ; cf. 21.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est parce que…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et disaient : Nous n''avons pas pris de pains.'
    marker-yv: yv-n
  - type: text
    text: 'Les disciples raisonnaient, se disant : C''est parce que nous n''avons pas pris de pains. '
  - type: usfm
