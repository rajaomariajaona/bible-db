    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'hiver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(24.20) et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tempête '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Ac 27.20). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
