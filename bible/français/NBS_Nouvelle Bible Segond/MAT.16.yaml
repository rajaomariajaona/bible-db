    marker-yv: yv-n
  - type: text
    text: 'Et le matin : « Il y aura de l''orage aujourd''hui, car le ciel est d''un rouge sombre. » Vous savez discerner l''aspect du ciel, et vous ne pouvez pas discerner les signes des temps ! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
