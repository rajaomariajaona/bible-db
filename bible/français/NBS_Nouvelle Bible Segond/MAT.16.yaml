      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: génération
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.39+,45. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jonas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.39-41'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Une génération mauvaise et adultère recherche un signe ; il ne lui sera pas donné d'autre signe que le signe de Jonas. Puis il les laissa et s'en alla.
- type: usfm
  marker: s1
  children:
  - type: text
