document_id: PSA.97,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Le Seigneur est roi : joie en tout lieu !'
  - type: text
    content: ' '
  - type: note
    content: 'LXX porte la suscription  : De David, quand sa terre lui fut restituée. –  C''est le Seigneur (YHWH)… 93.1n  ; 96.10s. –  îles  : le terme peut s''appliquer à tous les rivages lointains ; cf. Gn 10.5n  ; Es 11.11+ ; 42.10,12.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est roi ! Que la terre soit dans l''allégresse,'
  - type: text
    content: que la multitude des îles se réjouisse !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'détestez le mal Am 5.15 ; Pr 8.13 ; Rm 12.9. –  Il garde…  : cf. 145.20 ; Pr 2.8. –  il les délivre… 59.3 ; Lc 1.74.'
  - type: text
    content: 'Vous qui aimez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', détestez le mal !'
  - type: text
    content: Il garde la vie de ses fidèles,
  - type: text
    content: il les délivre de la main des méchants.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'est semée  : versions anciennes se lève  ; cf. 112.4 ; Es 58.8,10 ; 60.1s. – Voir cœur.'
  - type: text
    content: La lumière est semée pour le juste,
  - type: text
    content: et la joie pour ceux qui ont le cœur droit.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Justes… 32.11+ ; cf. 15.1ss ; 24.1ss ; 118.19s. –  en évoquant son nom sacré 30.5n.
  - type: text
    content: 'Justes, réjouissez-vous dans le '
  - type: text
    content: Seigneur
  - type: text
    content: célébrez-le en évoquant son nom sacré !
  '2':
  - type: text
    content: ' '
  - type: note
    content: nuée… 18.10ss ; 99.7 ; Ex 19.16-18. –  obscurité épaisse 18.10 ; Ex 20.21n  ; 1R 8.12. –  la justice… 89.15+ ; cf. 93.2,5.
  - type: text
    content: La nuée et l'obscurité épaisse l'entourent,
  - type: text
    content: la justice et l'équité sont la base de son trône.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Un feu 18.9 ; 50.3. –  embrase ses adversaires 68.2s ; 106.18 ; Es 42.25 ; cf. Ex 33.20 ; Es 6.5 ; Ap 11.5.
  - type: text
    content: Un feu va devant lui
  - type: text
    content: et embrase ses adversaires tout autour.
  '4':
  - type: text
    content: ' '
  - type: note
    content: éclairs 77.19 ; cf. 29.1ss. –  la terre… 96.9+.
  - type: text
    content: Ses éclairs illuminent le monde,
  - type: text
    content: la terre le voit et tremble ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'fondent comme de la cire  : cf. 68.3 ; Jg 5.5 ; Mi 1.4. –  Seigneur (hébreu ’adôn ) de toute la terre Jos 3.11,13 ; Mi 4.13 ; Za 4.14 ; 6.5.'
  - type: text
    content: 'les montagnes fondent comme de la cire devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: devant le Seigneur de toute la terre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ciel…  : cf. 19.2 ; 50.6. –  dit  : autre traduction raconte. –  voient sa gloire Es 40.5 ; 52.10.'
  - type: text
    content: Le ciel dit sa justice,
  - type: text
    content: et tous les peuples voient sa gloire.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ils auront honte… Es 1.29 ; 42.17 ; 45.16 ; Jr 10.14. – Les termes hébreux pour sont fiers , faux dieux et dieux font assonance ; cf. 96.5n. –  Tous les dieux…  : LXX prosternez-vous devant lui (ou adorez-le ), vous tous ses anges  ; cf. 103.20 ; Dt 32.43n  ; Hé 1.6  ; Ap 7.11.'
  - type: text
    content: Ils auront honte,
  - type: text
    content: tous ceux qui servent une statue,
  - type: text
    content: ceux qui sont fiers de leurs faux dieux.
  - type: text
    content: Tous les dieux se prosternent devant lui.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 48.12n.
  - type: text
    content: Sion l'entend et se réjouit,
  - type: text
    content: les filles de Juda sont dans l'allégresse,
  - type: text
    content: 'à cause de tes jugements, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '9':
  - type: text
    content: ' '
  - type: note
    content: le Très-Haut… 83.19. –  au-dessus de tous les dieux 95.3+ ; 96.4.
  - type: text
    content: 'Car toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es le Très-Haut sur toute la terre,'
  - type: text
    content: tu es souverainement élevé au-dessus de tous les dieux.
