document_id: LEV.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La consommation des viandes sacrifiées
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'profane  : litt. étranger, c.-à-d. étranger à la famille sacerdotale d''Aaron, de même aux v. 12s ; cf. 1S 21.2-7 ; Mt 12.3s/ / ; voir aussi 7.6 ; 15.26. –  L''hôte temporaire  : le même terme est traduit par résident temporaire en 25.6,23,35,40,45,47 ; Gn 23.4 ; Ex 12.45 ; Nb 35.15 ; Ps 39.13 ; 1Ch 29.15.'
  - type: text
    content: 'Aucun profane ne mangera d''une offrande sacrée. L''hôte temporaire et le salarié du prêtre ne mangeront pas d''une offrande sacrée. '
  '11':
  - type: note
    content: 'un esclave acheté par le prêtre à prix d''argent  : litt. quand le prêtre acquerra un être comme acquisition de son argent, celui-là… L''esclave fait partie intégrante de la maisonnée du prêtre, à la différence du salarié (v. 10). –  son pain  : autre traduction sa nourriture, de même dans la suite.'
  - type: text
    content: 'Mais un esclave acheté par le prêtre à prix d''argent pourra en manger, de même que celui qui est né dans sa maison ; ils pourront manger de son pain. '
  '12':
  - type: note
    content: Cf. 21.3n.
  - type: text
    content: 'La fille d''un prêtre mariée à un profane ne mangera pas de ce qui est prélevé sur les offrandes sacrées. '
  '13':
  - type: note
    content: Cf. Gn 38.11 ; Jg 19.2 ; Rt 1.8.
  - type: text
    content: 'Mais la fille d''un prêtre qui est veuve ou répudiée, sans avoir de descendance, et qui revient chez son père comme dans sa jeunesse pourra manger du pain de son père. Aucun profane n''en mangera. '
  '14':
  - type: note
    content: Cf. 5.16,24 ; chap. 27. –  par erreur 4.2n.
  - type: text
    content: 'Si un homme, par erreur, mange une offrande sacrée, il donnera au prêtre la valeur de l''offrande sacrée en y ajoutant un cinquième. '
  '15':
  - type: text
    content: 'Les prêtres ne profaneront pas les offrandes sacrées que les Israélites ont prélevées pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; '
  '16':
  - type: note
    content: 'Cf. 5.14-16. –  en mangeant  : sous-entendu de façon contraire à la règle.'
  - type: text
    content: 'ils leur feraient porter une faute exigeant réparation en mangeant leurs offrandes sacrées : c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui les consacre.'
  - type: heading
    content: Règles pour choisir les victimes
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '18':
  - type: note
    content: immigrés 16.29+. –  présent / holocauste 1.2n-3n. –  vœu / offrande volontaire 7.16+.
  - type: text
    content: 'Parle à Aaron et à ses fils, ainsi qu''à tous les Israélites ; tu leur diras : Tout homme de la maison d''Israël ou parmi les immigrés en Israël qui offre en présent un holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ', soit pour un vœu, soit en offrande volontaire, quels qu''ils soient, '
  '19':
  - type: note
    content: 'prendra  : sous-entendu dans le texte. –  pour que vous soyez agréés 19.5.'
  - type: text
    content: 'prendra, pour que vous soyez agréés, un mâle sans défaut parmi le gros bétail, les moutons ou les chèvres. '
  '2':
  - type: note
    content: 'des cas…  : sens probable (cf. v. 3ss) d''un texte difficile, litt. et qu''ils s''abstiennent (ou se tiennent à l''écart, verbe apparenté au mot nazir, cf. 15.31n) des choses sacrées (les offrandes, d''après le contexte) des fils d''Israël et qu''ils ne profanent pas (18.21+) le nom de ma sainteté, (offrandes ou nom ?) qu''ils sanctifient (ou consacrent) pour moi. –  offrandes  : voir sacrifices. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Parle à Aaron et à ses fils des cas où ils doivent s''abstenir des offrandes que les Israélites me consacrent, afin de ne pas profaner mon nom sacré. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '20':
  - type: note
    content: Dt 17.1 ; Ml 1.8 ; Hé 9.14 ; 1P 1.19.
  - type: text
    content: 'Vous ne présenterez aucune bête qui ait une malformation : elle ne serait pas agréée pour vous. '
  '21':
  - type: note
    content: sacrifice de paix 3.1+ ; cf. 22.18.
  - type: text
    content: 'Si un homme présente au '
  - type: text
    content: Seigneur
  - type: text
    content: ' du gros bétail ou du petit bétail en sacrifice de paix, soit pour s''acquitter d''un vœu, soit en offrande volontaire, la bête, pour être agréée, sera sans défaut ; il n''y aura en elle aucune malformation. '
  '22':
  - type: note
    content: 'verrue  : traduction incertaine ; autres possibilités ulcère, infection. –  dartre  : cf. 21.20n.'
  - type: text
    content: 'Vous ne présenterez pas au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une bête aveugle, estropiée ou mutilée, qui a une verrue, la gale ou une dartre ; vous ne la présenterez pas sur l''autel en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Tu pourras sacrifier en offrande volontaire un bovin, un mouton ou une chèvre qui a un membre trop long ou trop court ; mais il ne sera pas agréé pour un vœu. '
  '24':
  - type: note
    content: 'vous ne ferez pas cela dans votre pays  : certains comprennent cette expression comme une interdiction totale de la castration en Israël ; d''autres l''interprètent seulement comme une interdiction d''offrir en sacrifice des animaux castrés.'
  - type: text
    content: 'Vous ne présenterez pas au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un animal dont les testicules ont été froissés, écrasés, arrachés ou coupés ; vous ne ferez pas cela dans votre pays. '
  '25':
  - type: note
    content: 'de la part d''un étranger  : litt. de la main d''un fils d''étranger  ; autre traduction provenant d''un étranger. –  pain v. 11,13 ; 21.6n. –  agréées  : cf. v. 19.'
  - type: text
    content: 'Même de la part d''un étranger vous ne présenterez aucune bête de ce genre comme pain de votre Dieu : si elles sont mutilées, si elles ont une malformation, elles ne seraient pas agréées pour vous.'
  '26':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '27':
  - type: note
    content: 'avec  : litt. sous  ; cf. Ex 22.29. –  huitième jour  : cf. 12.3.'
  - type: text
    content: 'A sa naissance, un veau, un agneau ou un chevreau restera sept jours avec sa mère ; à partir du huitième jour, il sera agréé comme présent consumé par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '28':
  - type: note
    content: Litt. bovin ou tête de petit bétail (voir Ex 12.3n  ; 34.19n), vous ne l'immolerez pas, lui (l'animal) et son petit…  ; cette interdiction s'opposait peut-être à des pratiques cananéennes ; cf. Ex 23.19.
  - type: text
    content: 'Vous n''immolerez pas une vache, une brebis ou une chèvre avec son petit, le même jour. '
  '29':
  - type: note
    content: 'sacrifice de reconnaissance 7.12n. –  que vous soyez agréés  : voir 19.5.'
  - type: text
    content: 'Quand vous offrirez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un sacrifice de reconnaissance, vous l''offrirez de telle sorte que vous soyez agréés. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Voir générations. –  impureté 5.2s ; 11.31-47 ; 13.45s ; 15.1-18 ; voir pur.
  - type: text
    content: 'Dis-leur : Dans toutes vos générations, tout homme qui, se trouvant en état d''impureté, se présente devant les offrandes que les Israélites consacrent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', cet homme-là sera retranché de devant moi. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '30':
  - type: note
    content: '7.15+. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'On le mangera le jour même ; vous n''en laisserez rien jusqu''au matin. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'commandements  : voir loi.'
  - type: text
    content: 'Vous observerez mes commandements et vous les mettrez en pratique. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Vous ne profanerez pas 18.21+. –  sacré / reconnu pour saint / consacre  : les termes hébreux correspondants sont apparentés. Cf. v. 9n.'
  - type: text
    content: 'Vous ne profanerez pas mon nom sacré, afin que je sois reconnu pour saint au milieu des Israélites. C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui vous consacre '
  '33':
  - type: note
    content: 'qui vous fais sortir  : autre traduction qui vous ai fait sortir. –  pour être votre Dieu 11.45+.'
  - type: text
    content: 'et qui vous fais sortir d''Egypte pour être votre Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'lèpre 13.2n. –  écoulement génital 15.2n. –  d''un cadavre  : cf. 19.28n. –  épanchement de semence 15.16+.'
  - type: text
    content: 'Quiconque parmi la descendance d''Aaron est atteint de la « lèpre » ou d''un écoulement génital ne mangera pas des offrandes sacrées jusqu''à ce qu''il soit pur. De même celui qui touche une personne rendue impure par le contact d''un cadavre, celui qui a un épanchement de semence, '
  '5':
  - type: note
    content: 11.42s ; chap. 15.
  - type: text
    content: 'celui qui s''est rendu impur en touchant une petite bête ou un être humain qui s''est rendu impur d''une impureté quelconque. '
  '6':
  - type: text
    content: 'Celui qui l''a touché sera impur jusqu''au soir ; il ne mangera pas des offrandes sacrées, mais il lavera son corps avec de l''eau ; '
  '7':
  - type: note
    content: son pain ou sa nourriture  ; de même aux v. 11,13 ; voir 21.6n.
  - type: text
    content: 'dès le coucher du soleil, il sera pur ; ensuite il pourra manger des offrandes sacrées : c''est son pain. '
  '8':
  - type: note
    content: 7.24+ ; cf. Ez 44.31.
  - type: text
    content: 'Il ne mangera pas d''une bête crevée ou déchiquetée ; il se rendrait impur avec elle. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ils assureront… 8.35n. –  de profanation  : litt. car (ou quand ) ils l''ont profané(e)  ; il faut sans doute comprendre en profanant la nourriture sacrée . –  qui les consacre  : autre traduction qui les rends saints , même possibilité dans la suite.'
  - type: text
    content: 'Ils assureront mon service sans se charger d''un péché de profanation qui entraînerait leur mort. C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui les consacre. '
