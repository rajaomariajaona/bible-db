document_id: LEV.22,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: La consommation des viandes sacrifiées
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: profane
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: étranger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. étranger à la famille sacerdotale d''Aaron, de même aux v. 12s ; cf. 1S 21.2-7 ; Mt 12.3s/ / ; voir aussi 7.6 ; 15.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: L'hôte temporaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'résident temporaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 25.6,23,35,40,45,47 ; Gn 23.4 ; Ex 12.45 ; Nb 35.15 ; Ps 39.13 ; 1Ch 29.15.
      marker-yv: yv-n
    - type: text
      text: 'Aucun profane ne mangera d''une offrande sacrée. L''hôte temporaire et le salarié du prêtre ne mangeront pas d''une offrande sacrée. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un esclave acheté par le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' à prix d''argent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quand le prêtre acquerra un être comme acquisition de son argent, celui-là… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''esclave fait partie intégrante de la maisonnée du prêtre, à la différence du salarié (v. 10). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa nourriture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Mais un esclave acheté par le prêtre à prix d''argent pourra en manger, de même que celui qui est né dans sa maison ; ils pourront manger de son pain. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 21.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La fille d''un prêtre mariée à un profane ne mangera pas de ce qui est prélevé sur les offrandes sacrées. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 38.11 ; Jg 19.2 ; Rt 1.8.
      marker-yv: yv-n
    - type: text
      text: 'Mais la fille d''un prêtre qui est veuve ou répudiée, sans avoir de descendance, et qui revient chez son père comme dans sa jeunesse pourra manger du pain de son père. Aucun profane n''en mangera. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 5.16,24 ; chap. 27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par erreur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme, par erreur, mange une offrande sacrée, il donnera au prêtre la valeur de l''offrande sacrée en y ajoutant un cinquième. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les prêtres ne profaneront pas les offrandes sacrées que les Israélites ont prélevées pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 5.14-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en mangeant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de façon contraire à la règle.
      marker-yv: yv-n
    - type: text
      text: 'ils leur feraient porter une faute exigeant réparation en mangeant leurs offrandes sacrées : c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui les consacre.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles pour choisir les victimes
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'immigrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'présent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocauste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vœu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrande volontaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.16+.
      marker-yv: yv-n
    - type: text
      text: 'Parle à Aaron et à ses fils, ainsi qu''à tous les Israélites ; tu leur diras : Tout homme de la maison d''Israël ou parmi les immigrés en Israël qui offre en présent un holocauste au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', soit pour un vœu, soit en offrande volontaire, quels qu''ils soient, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prendra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour que vous soyez agréés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.5.
      marker-yv: yv-n
    - type: text
      text: 'prendra, pour que vous soyez agréés, un mâle sans défaut parmi le gros bétail, les moutons ou les chèvres. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des cas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens probable (cf. v. 3ss) d''un texte difficile, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et qu''ils s''abstiennent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se tiennent à l'écart
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', verbe apparenté au mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nazir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 15.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des choses sacrées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les offrandes, d''après le contexte) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des fils d''Israël et qu''ils ne profanent pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(18.21+) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le nom de ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainteté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', (offrandes ou nom ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''ils sanctifient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consacrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: offrandes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Parle à Aaron et à ses fils des cas où ils doivent s''abstenir des offrandes que les Israélites me consacrent, afin de ne pas profaner mon nom sacré. Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 17.1 ; Ml 1.8 ; Hé 9.14 ; 1P 1.19.
      marker-yv: yv-n
    - type: text
      text: 'Vous ne présenterez aucune bête qui ait une malformation : elle ne serait pas agréée pour vous. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' de paix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.1+ ; cf. 22.18.
      marker-yv: yv-n
    - type: text
      text: 'Si un homme présente au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' du gros bétail ou du petit bétail en sacrifice de paix, soit pour s''acquitter d''un vœu, soit en offrande volontaire, la bête, pour être agréée, sera sans défaut ; il n''y aura en elle aucune malformation. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: verrue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; autres possibilités '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ulcère, infection
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dartre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne présenterez pas au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' une bête aveugle, estropiée ou mutilée, qui a une verrue, la gale ou une dartre ; vous ne la présenterez pas sur l''autel en offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tu pourras sacrifier en offrande volontaire un bovin, un mouton ou une chèvre qui a un membre trop long ou trop court ; mais il ne sera pas agréé pour un vœu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous ne ferez pas cela dans votre pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent cette expression comme une interdiction totale de la castration en Israël ; d''autres l''interprètent seulement comme une interdiction d''offrir en sacrifice des animaux castrés.'
      marker-yv: yv-n
    - type: text
      text: 'Vous ne présenterez pas au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' un animal dont les testicules ont été froissés, écrasés, arrachés ou coupés ; vous ne ferez pas cela dans votre pays. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la part d'un étranger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la main d''un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''étranger'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: provenant d'un étranger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11,13 ; 21.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agréées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 19.'
      marker-yv: yv-n
    - type: text
      text: 'Même de la part d''un étranger vous ne présenterez aucune bête de ce genre comme pain de votre Dieu : si elles sont mutilées, si elles ont une malformation, elles ne seraient pas agréées pour vous.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
