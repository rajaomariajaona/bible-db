document_id: ZEC.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Quatrième vision : le grand prêtre Josué'
  - type: text
    content: ' '
  - type: note
    content: Josué (LXX Iésous, Jésus ) 6.11 ; Ag 1.1 ; Esd 3.2 ; cf. Nb 27.18+ ; voir prêtre. –  l'Adversaire ou l'accusateur , en hébreu le satan  ; terme apparenté au verbe traduit ici par l'accuser (ou s'opposer à lui ) ; même terme en Nb 22.22n,32 ; 1S 29.4 ; 2S 19.23 ; 1R 5.18 ; 11.14,23,25 ; Ps 109.6n  ; Jb 1.6n  ; 1Ch 21.1n  ; terme apparenté en Gn 26.21n  ; Esd 4.6 ( accusation ) ; de même dans la suite. Ce terme sera transcrit satanas , comme un titre ou même comme un nom propre (= Satan ), dans le N.T. Ici LXX le traduit par le mot diabolos , qui a donné diable  ; cf. Ap 12.9s ; voir démon, diable, Satan.
  - type: text
    content: 'Il me fit voir Josué, le grand prêtre, debout devant le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et l''Adversaire debout à sa droite pour l''accuser. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1R 5.5 ; Es 36.16 ; Mi 4.4.
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: vous vous inviterez les uns les autres
  - type: text
    content: sous la vigne et sous le figuier.
  '2':
  - type: note
    content: 'Le Seigneur dit  : Syr a lu le messager du Seigneur dit. –  Que le Seigneur te rabroue Jd 9. –  qui porte son choix 1.17+. –  n''est-il pas  : c.-à-d. Josué ; autre traduction n''est-ce pas là… –  un tison arraché au feu Am 4.11 ; cf. Es 7.4 ; 1Co 3.15 ; Jd 23.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te rabroue, Adversaire ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te rabroue, lui qui porte son choix sur Jérusalem ! Cet homme-là n''est-il pas un tison arraché au feu ? '
  '3':
  - type: note
    content: 'sales  : le terme hébreu évoque peut-être l''image d''une souillure causée par des excréments.'
  - type: text
    content: 'Or Josué était habillé de vêtements sales, et il se tenait debout devant le messager. '
  '4':
  - type: note
    content: 'Cf. Ex 28 ; 29.5 ; Lv 8.7. –  il lui dit  : c.-à-d. il dit à Josué. –  je t''enlève ta faute v. 9 ; Es 6.7 ; cf. Jr 31.34 ; voir péché. –  vêtements de fête  : même terme en Es 3.22.'
  - type: text
    content: 'Celui-ci dit à ceux qui étaient devant lui : Otez-lui les vêtements sales ! Puis il lui dit : Regarde, je t''enlève ta faute pour t''habiller de vêtements de fête. '
  '5':
  - type: note
    content: 'Je dis…  : Vg et il (c.-à-d. le messager, v. 3s) dit : Mettez… –  un turban propre ou pur, cf. Ex 28.39-43 ; 29.6 ; Lv 8.9. –  les vêtements  : litt. des vêtements  ; autres traductions d''autres vêtements ou des vêtements propres  ; certains modifient le texte hébreu traditionnel pour lire ils changèrent ses vêtements  ; d''autres pensent qu''il est question ici d''une cérémonie d''ordination (cf. Ex 29.5 ; Lv 21.10 ; Ez 42.14 ; 44.19).'
  - type: text
    content: 'Je dis : Qu''on mette sur sa tête un turban propre ! Ils mirent le turban propre sur sa tête et l''habillèrent avec les vêtements. Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se tenait là. '
  '6':
  - type: note
    content: 'apporta ce témoignage à  : autres traductions avertit ainsi ; conjura  ; cf. Gn 43.3 ; Dt 8.19 ; 32.46n  ; 1R 2.42 ; Jr 42.19.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apporta ce témoignage à Josué : '
  '7':
  - type: note
    content: 'Si tu suis…  : cf. 1R 2.4 ; 9.4. –  si tu assures mon service  : autre traduction si tu observes mon observance (Gn 26.5+ ; Lv 8.35n  ; Nb 1.53n  ; Ez 40.45n). –  c''est toi qui gouverneras (litt. qui jugeras) …  : cf. 1R 2.27 ; 8.62-66 ; 2R 16.10-18 ; 22.3-7 ; Hé 5.5s ; 10.21 ; on pourrait voir ici la suite de la condition  : si tu gouvernes ma maison et si tu gardes les cours de mon temple, je te donnerai… –  les cours de mon temple  : litt. mes cours. –  parmi ceux qui se tiennent ici  : litt. ceux-ci qui se tiennent ou qui se tiennent debout, comme en 4.14 ; cf. v. 1 ; 1R 22.19-22 ; Dn 7.9-14.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Si tu suis mes voies
  - type: text
    content: et si tu assures mon service,
  - type: text
    content: c'est toi qui gouverneras ma maison ;
  - type: text
    content: tu garderas aussi les cours de mon temple,
  - type: text
    content: et je te donnerai libre accès
  - type: text
    content: parmi ceux qui se tiennent ici.
  - type: heading
    content: Dieu va faire venir son serviteur Germe
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ces hommes sont un présage  : litt. ce sont des hommes de présage (ou de prodige ) ; cf. Es 8.18 ; Ez 12.6+. –  Germe (hébreu tsémah ) 6.12 ; Es 4.2 ; Jr 23.5 ; 33.15 ; cf. Es 11.1s ; LXX a traduit par Levant , comme en Lc 1.78n. –  mon serviteur  : cf. Es 49.5s ; 52.13 ; Ag 2.23.'
  - type: text
    content: Ecoute, je te prie, grand prêtre Josué,
  - type: text
    content: toi et tes compagnons qui sont assis devant toi
  - type: text
    content: '– car ces hommes sont un présage :'
  - type: text
    content: Je fais venir Germe, mon serviteur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sept yeux  : il s''agit peut-être ici de sept facettes d''une pierre taillée pour la construction du temple (cf. 4.10) ; on a aussi proposé de traduire sept sources (le mot hébreu a les deux sens). –  Je grave moi-même  : cf. 1R 6.29 ; 7.36 ; Ps 74.6 ; 2Ch 3.7 ; ceux qui traduisent sources au lieu d’ yeux dans la phrase précédente comprennent ici  : je fore moi-même leur ouverture . –  je retirerai la faute  : cf. v. 4 ; Es 33.24.'
  - type: text
    content: 'Car voici la pierre que j''ai placée devant Josué :'
  - type: text
    content: il y a sept yeux sur cette seule pierre.
  - type: text
    content: Je grave moi-même ce qui doit y être gravé
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: et je retirerai la faute de ce pays,
  - type: text
    content: en un seul jour.
