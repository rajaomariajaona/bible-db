    - type: text
      text: Approchez, nations, pour entendre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peuples, prêtez attention !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la terre écoute, avec tout ce qui s'y trouve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le monde, avec tout ce qu'il produit !
