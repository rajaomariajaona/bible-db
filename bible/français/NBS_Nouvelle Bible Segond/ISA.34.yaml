document_id: ISA.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement d'Edom
  - type: text
    content: ' '
  - type: note
    content: 1.2 ; 41.1 ; 49.1 ; Mi 1.2.
  - type: text
    content: Approchez, nations, pour entendre !
  - type: text
    content: Peuples, prêtez attention !
  - type: text
    content: Que la terre écoute, avec tout ce qui s'y trouve,
  - type: text
    content: le monde, avec tout ce qu'il produit !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 66.24 ; Ap 14.11 ; 19.3. –  personne n'y passera 33.8 ; 60.15.
  - type: text
    content: Elle ne s'éteindra ni la nuit, ni le jour,
  - type: text
    content: la fumée s'en élèvera toujours ;
  - type: text
    content: elle restera en ruine de génération en génération,
  - type: text
    content: à tout jamais personne n'y passera.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 13.20-22 ; 14.23 ; 23.13 ; So 2.14n  ; Ps 102.17n. –  cordeau (hébreu qaw , comme en 28.10n) / niveau (litt. les pierres , peut-être des ancêtres du fil à plomb). Instruments de construction (Za 1.16), ici associés paradoxalement à chaos / vide , hébreu tohou (Es 24.10n) / bohou , cf. Gn 1.2n  ; voir aussi 2R 21.13 ; Am 7.7-9.
  - type: text
    content: Le pélican et le hérisson en prendront possession.
  - type: text
    content: La chouette et le corbeau y demeureront.
  - type: text
    content: On y tendra le cordeau du chaos
  - type: text
    content: et le niveau du vide.
  '12':
  - type: text
    content: ' '
  - type: note
    content: notables Jr 27.20 ; 39.6 ; Ec 10.17 ; Né 2.16+. –  proclamer un roi , litt. la royauté  ; cf. Gn 36.31-43.
  - type: text
    content: Ses notables ne seront plus là
  - type: text
    content: pour proclamer un roi,
  - type: text
    content: tous ses princes ne seront plus.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '25.2 ; 23.13. –  domaine des chacals  : cf. 35.7. –  un emplacement  : d''après un ms de Qumrân et des versions anciennes ; de l''herbe , selon le texte hébreu traditionnel.'
  - type: text
    content: Les épines pousseront dans ses palais,
  - type: text
    content: les orties et les ajoncs dans ses forteresses ;
  - type: text
    content: ce sera le domaine des chacals,
  - type: text
    content: un emplacement pour les autruches.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'habitants du désert / hyènes 13.21n,22n. –  le spectre de la nuit  : hébreu lilith , nom propre d''un démon femelle chez les Babyloniens, proche du mot hébreu pour nuit ( layla ).'
  - type: text
    content: Les habitants du désert y rencontreront les hyènes,
  - type: text
    content: et les boucs s'y appelleront les uns les autres ;
  - type: text
    content: là le spectre de la nuit séjournera tranquille,
  - type: text
    content: il trouvera son lieu de repos ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'le serpent  : traduction incertaine. –  ses petits  : sous-entendu dans le texte.'
  - type: text
    content: là le serpent fera son nid, déposera ses œufs,
  - type: text
    content: les couvera et recueillera ses petits à son ombre ;
  - type: text
    content: là se rassembleront les milans,
  - type: text
    content: les uns avec les autres.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cherchez ou consultez , même verbe en 8.19 ; 65.1. –  le livre du Seigneur  : sans doute un recueil de prophéties ; cf. 29.18 ; voir aussi Ap 20.12. –  les uns comme les autres  : même formule qu''au v. 15 ( les uns avec les autres ) : les v. 16s s''appliquent probablement à toutes les bêtes sauvages énumérées précédemment. –  sa bouche  : d''après quelques mss hébreux, dont un ms de Qumrân ; d''autres (et LXX) portent la bouche du Seigneur  ; texte hébreu traditionnel ma bouche  ; certains interprètent  : par ma bouche, il l''a ordonné  ; cf. 1.20. –  son souffle ou son Esprit.'
  - type: text
    content: 'Cherchez le livre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et lisez !'
  - type: text
    content: Aucun d'eux ne fera défaut ;
  - type: text
    content: les uns comme les autres, aucun ne manquera ;
  - type: text
    content: car sa bouche l'a ordonné,
  - type: text
    content: c'est son souffle qui les rassemblera.
  '17':
  - type: text
    content: ' '
  - type: note
    content: tiré au sort , pour attribuer un lot ; cf. 17.14+ ; Jos 14.2. –  cordeau v. 11n.
  - type: text
    content: C'est lui qui a tiré au sort pour eux,
  - type: text
    content: c'est sa main qui leur a partagé cette terre au cordeau.
  - type: text
    content: Ils en prendront possession pour toujours,
  - type: text
    content: ils y demeureront de génération en génération.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '24.21 ; 30.27s. –  la colère  : cf. Nb 1.53n  ; 2Ch 19.2n. –  va fondre  : sous-entendu dans le texte. –  anathème v. 5 ; 1.15 ; 37.11 ; cf. Dt 2.34n  ; Jos 6.17.'
  - type: text
    content: 'Car la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: va fondre sur toutes les nations,
  - type: text
    content: 'et sa fureur sur toute leur armée :'
  - type: text
    content: il les frappe d'anathème,
  - type: text
    content: il les livre au carnage.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '5.25+. –  Les victimes  : litt. leurs transpercés . –  fait fondre les montagnes  : cf. Mi 1.4 ; Ps 68.3 ; 97.5.'
  - type: text
    content: Les victimes sont jetées,
  - type: text
    content: leurs cadavres exhalent leur puanteur,
  - type: text
    content: et leur sang fait fondre les montagnes.
  '4':
  - type: text
    content: ' '
  - type: note
    content: l'armée du ciel 24.21n,23. –  roulé comme un livre (c.-à-d. un rouleau de papyrus ou de parchemin) Ap 6.12-14 ; cf. Ps 102.26s ; Hé 1.10-12.
  - type: text
    content: Toute l'armée du ciel tombe en pourriture ;
  - type: text
    content: le ciel est roulé comme un livre,
  - type: text
    content: et toute son armée se flétrit
  - type: text
    content: comme se flétrissent les feuilles de la vigne,
  - type: text
    content: comme les feuilles flétries du figuier.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'épée 27.1+ ; personnifiée : Ez 21.13-22 ; cf. Gn 3.24 ; Jr 12.12 ; 46.10. –  s''est abreuvée (comme au v. 7) : autres traductions s''est enivrée ; s''est rassasiée. Un ms de Qumrân porte est apparue. –  Edom  : au sud d''Israël ; cf. 63.1-6 ; Jr 49.7-22 ; Ez 25.12-14 ; 35.1–36.5 ; Jl 4.19 ; Am 1.11s ; Ab 1-14 ; Ml 1.2-5 ; Ps 137.7 ; Lm 4.21-22. –  que j''ai frappé d''anathème  : litt. de mon anathème  ; cf. v. 2+.'
  - type: text
    content: Car mon épée s'est abreuvée dans le ciel ;
  - type: text
    content: elle descend sur Edom,
  - type: text
    content: sur le peuple que j'ai frappé d'anathème, pour le jugement.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sang / graisse 2S 1.22. –  jeunes béliers et béliers sont deux mots différents en hébreu ; cf. 2R 3.4+. –  boucs  : cf. 14.9n. –  graisse des rognons Lv 3.4. –  sacrifice / carnage  : hébreu zévah / tévah  ; cf. Jr 46.10 ; Ez 39.17-20 ; So 1.7. –  Botsra  : ville importante d''Edom, qui en fut un temps capitale 63.1 ; cf. Gn 36.33 ; Jr 49.13,22 ; Am 1.12.'
  - type: text
    content: 'L''épée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est pleine de sang, enduite de graisse,'
  - type: text
    content: du sang des jeunes béliers et des boucs,
  - type: text
    content: de la graisse des rognons des béliers ;
  - type: text
    content: 'car il y a un sacrifice pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Botsra'
  - type: text
    content: et un grand carnage en Edom.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'aurochs Ps 92.11+. –  taureaux  : le même mot est traduit par puissant en 10.13.'
  - type: text
    content: Les aurochs tombent avec eux
  - type: text
    content: et les bœufs avec les taureaux ;
  - type: text
    content: leur terre s'abreuve de sang,
  - type: text
    content: et leur poussière est imprégnée de graisse.
  '8':
  - type: text
    content: ' '
  - type: note
    content: vengeance voir 63.4n (au sujet d'Edom) ; cf. 35.4 ; 59.18 ; 61.2 ; 66.6 ; Jr 50.28 ; 51.6,11.
  - type: text
    content: 'Car c''est un jour de vengeance pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: une année de représailles pour la cause de Sion.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Les oueds d''Edom  : litt. ses oueds (cf. v. 9 ; 15.7 ; 27.12 ; 30.28 ; Gn 26.17n  ; Jb 6.15n), voir 1.9s ; Gn 19.23-29 ; Dt 29.22.'
  - type: text
    content: Les oueds d'Edom seront changés en goudron
  - type: text
    content: et sa poussière en soufre ;
  - type: text
    content: sa terre sera comme du goudron qui brûle.
