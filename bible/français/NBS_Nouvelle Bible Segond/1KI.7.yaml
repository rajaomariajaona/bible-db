        - type: text
          text: '  ; Ec 12.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'deux colonnes, avec les deux chapiteaux évasés au sommet des deux colonnes ; les deux treillis, pour couvrir les deux chapiteaux évasés au sommet des colonnes ; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les quatre cents grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux chapiteaux évasés au sommet des colonnes ; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les dix bases et les dix cuves sur les bases, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la Mer, une, et les douze bœufs sous la Mer ; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'récipients '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 27.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 25.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: poli
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la forme verbale ainsi traduite (synonyme en 2Ch 4.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') est rendue par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'luisant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Es 18.2,7.
      marker-yv: yv-n
    - type: text
      text: 'les récipients, les pelles et les calices. Tous ces objets que Hiram avait faits pour le roi Salomon dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' étaient de bronze poli. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le district du Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 13.10-12 ; voir aussi 2S 18.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans l'épaisseur de la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la masse, à Adam(a)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Os 6.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsartân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.12 ; Jos 3.16 ; 13.27.'
      marker-yv: yv-n
    - type: text
      text: 'C''est dans le district du Jourdain que le roi les fondit, dans l''épaisseur de la terre, entre Soukkoth et Tsartân. '
  '47':
  - type: usfm
    marker: p
    children:
