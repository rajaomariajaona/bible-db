      text: c'était le fils d'une veuve de la tribu de Nephtali et d'un père Tyrien, qui travaillait le bronze. Il était rempli de sagesse, d'intelligence et de connaissance pour faire toutes sortes d'ouvrages de bronze. Il arriva auprès du roi Salomon et il fit tous ses ouvrages.
