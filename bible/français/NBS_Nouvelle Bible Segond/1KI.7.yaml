document_id: 1KI.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La construction de la maison du roi
  - type: text
    content: ' '
  - type: note
    content: 'pendant treize ans  : cf. 9.10. –  toute sa maison  : c.-à-d. tous les bâtiments de la cité royale dont la description est donnée dans les v. suivants.'
  - type: text
    content: 'Quant à sa propre maison, Salomon la bâtit pendant treize ans ; il acheva ainsi toute sa maison. '
  '10':
  - type: note
    content: 'dix… huit coudées  : environ 4,5 m et 3,6 m.'
  - type: text
    content: 'Les fondations étaient en pierres magnifiques, en grandes pierres, en pierres de dix coudées et en pierres de huit coudées. '
  '11':
  - type: text
    content: 'Au-dessus il y avait encore de magnifiques pierres de taille, sur mesure, et du cèdre. '
  '12':
  - type: note
    content: 'cour  : cf. 6.36.'
  - type: text
    content: 'La grande cour avait, sur tout son périmètre, trois rangées de pierres de taille et une rangée de poutres de cèdre, comme la cour intérieure de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et comme le vestibule de la Maison.'
  - type: heading
    content: Les travaux confiés à Hiram
  - type: heading
    content: 2Ch 2.10-13
  '13':
  - type: text
    content: ' '
  - type: note
    content: Hiram v. 40,45 ( Houram-Abi 2Ch 2.12 ; Houram 2Ch 4.11 ; Houram-Abiv 2Ch 4.16). Ne pas confondre avec l'autre Hiram, roi de Tyr (1R 5.15n).
  - type: text
    content: 'Le roi Salomon envoya chercher Hiram à Tyr ; '
  '14':
  - type: note
    content: 'veuve de la tribu de Nephtali  : cf. 2Ch 2.12 femme d''entre les filles de Dan. –  de sagesse ou d''habileté, le mot hébreu pouvant avoir le sens de science ou d’art. Voir « La littérature de sagesse »♦. –  tous ses ouvrages ou tous ses travaux  ; LXX omet le possessif.'
  - type: text
    content: c'était le fils d'une veuve de la tribu de Nephtali et d'un père Tyrien, qui travaillait le bronze. Il était rempli de sagesse, d'intelligence et de connaissance pour faire toutes sortes d'ouvrages de bronze. Il arriva auprès du roi Salomon et il fit tous ses ouvrages.
  - type: heading
    content: Les colonnes de bronze
  - type: heading
    content: 2Ch 3.15-17
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Il moula…  : d''après LXX  ; hébreu il forma . –  les deux colonnes  : cf. Jr 52.17,21. –  dix-huit coudées de hauteur  : environ 8 m ; voir mesures. –  un fil de douze coudées  : environ 5,4 m. –  la circonférence  : LXX insère ici  : de la première ; elle était creuse et son épaisseur était de quatre doigts. Il en était de même… Cf. Ez 40.49. Les v. 15-22 comportent un grand nombre de termes techniques et de difficultés de traduction.'
  - type: text
    content: 'Il moula les deux colonnes de bronze ; la première colonne avait dix-huit coudées de hauteur, et un fil de douze coudées mesurait la circonférence de la seconde colonne. '
  '16':
  - type: note
    content: 'Il fit les deux chapiteaux…  : cf. Jr 52.22. –  cinq coudées  : environ 2,2 m.'
  - type: text
    content: 'Il fit les deux chapiteaux en fonte de bronze, pour les mettre au sommet des colonnes ; le premier chapiteau avait cinq coudées de hauteur, et le second chapiteau avait cinq coudées de hauteur. '
  '17':
  - type: note
    content: 'Il fit des treillis…  : litt. des treillis œuvre de treillis, des festons œuvre de guirlande ( ?).'
  - type: text
    content: 'Il fit des treillis, des festons en forme de guirlande, pour les chapiteaux qui étaient au sommet des colonnes, sept pour le premier chapiteau, et sept pour le second chapiteau. '
  '18':
  - type: note
    content: 'Il fit les grenades  : beaucoup de mss intervertissent dans ce v. les mots correspondant à grenades et colonne, ce qui donne  : il fit les colonnes avec deux rangs autour de chaque treillis pour couvrir les chapiteaux qui étaient en haut des grenades.'
  - type: text
    content: 'Il fit les grenades en deux rangs, autour du premier treillis, pour couvrir le chapiteau qui était au sommet de la première colonne ; il fit de même pour le second chapiteau. '
  '19':
  - type: note
    content: 'figuraient des lis  : litt. œuvre de lis. –  quatre coudées  : 1,8 m.'
  - type: text
    content: 'Les chapiteaux qui étaient au sommet des colonnes, dans le vestibule, figuraient des lis et avaient quatre coudées. '
  '2':
  - type: note
    content: 'la maison-de-la-forêt-du-Liban  : cette construction tire vraisemblablement son nom des rangées de colonnes de cèdre venant du Liban qui la composent. Cf. 10.17,21 ; 2Ch 9.16,20. –  cent… cinquante… trente coudées  : environ 45 m, 23 m et 13,50 m. –  et haute de trente coudées  : absent de LXX. –  quatre rangées  : LXX trois rangées.'
  - type: text
    content: 'Il bâtit d''abord la maison-de-la-forêt-du-Liban, longue de cent coudées, large de cinquante coudées, et haute de trente coudées, sur quatre rangées de colonnes de cèdre. Il y avait des poutres de cèdre sur les colonnes. '
  '20':
  - type: note
    content: 'près du renflement (litt. du ventre) qui était au-delà du treillis  : interprétation conjecturale d''un texte très obscur ; les mots correspondants à étaient entourés de deux cents grenades ne figurent pas dans le texte hébreu ; cf. v. 42 ; Jr 52.23.'
  - type: text
    content: 'Les chapiteaux placés sur les deux colonnes étaient entourés de deux cents grenades en haut, près du renflement qui était au-delà du treillis ; il y avait aussi deux cents grenades rangées autour du second chapiteau. '
  '21':
  - type: note
    content: 'temple  : voir plan ♦. –  Yakîn signifie il affermit. –  Booz signifie en lui la force, cf. Rt 2.1n.'
  - type: text
    content: 'Il dressa les colonnes près du vestibule du temple ; il dressa la colonne de droite et l''appela du nom de Yakîn ; puis il dressa la colonne de gauche et l''appela du nom de Booz. '
  '22':
  - type: text
    content: Il y avait au sommet des colonnes un travail figurant des lis. Ainsi fut achevé l'ouvrage des colonnes.
  - type: heading
    content: La Mer de fonte
  - type: heading
    content: 2Ch 4.2-5
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Il fit la Mer…  : il s''agit d''un grand bassin pour les ablutions des prêtres (cf. 2Ch 4.6) ; voir aussi Ex 30.17-21. –  de fonte  : absent de LXX. –  dix… trente coudées  : environ 4,5 m et 13 m.'
  - type: text
    content: 'Il fit la Mer de fonte. Elle avait dix coudées d''un bord à l''autre, une forme entièrement ronde, cinq coudées de hauteur et une circonférence que mesurait un cordeau de trente coudées. '
  '24':
  - type: note
    content: coloquintes 6.18n.
  - type: text
    content: 'Des coloquintes l''entouraient au-dessous de son bord, dix par coudée, faisant tout le tour de la Mer ; les coloquintes, sur deux rangs, étaient fondues avec elle en une seule pièce. '
  '25':
  - type: note
    content: 'vers l''ouest  : litt. vers la mer (Méditerranée).'
  - type: text
    content: 'Elle était posée sur douze bœufs, trois tournés vers le nord, trois tournés vers l''ouest, trois tournés vers le sud, et trois tournés vers l''est ; la Mer reposait sur eux, et toute la partie postérieure de leur corps était en dedans. '
  '26':
  - type: note
    content: 'un palme  : environ 7,5 cm. –  deux mille baths  : soit 42 000 l (voir mesures, poids et monnaies) ; cf. 2Ch 4.5 (trois mille baths).'
  - type: text
    content: Son épaisseur était d'un palme ; et son bord était façonné comme le bord d'une coupe, en fleur de lis. Elle contenait deux mille baths.
  - type: heading
    content: Les bases de bronze
  '27':
  - type: text
    content: ' '
  - type: note
    content: les dix bases sont destinées à supporter les cuves. Cf. v. 38 ; 2Ch 4.6,14. Dans les v. 27-37, l'abondance des termes techniques au sens mal connu rend la traduction incertaine.
  - type: text
    content: 'Il fit les dix bases de bronze. Chaque base avait quatre coudées de longueur, quatre coudées de largeur, et trois coudées de hauteur. '
  '28':
  - type: note
    content: 'Voici comment étaient faites ces bases  : litt. et ceci est l''œuvre de la base.'
  - type: text
    content: 'Voici comment étaient faites ces bases : elles étaient formées de panneaux, ces panneaux étant pris entre les montants. '
  '29':
  - type: note
    content: 'au-dessus comme au-dessous  : autre traduction au-dessus il y avait un socle (cf. v. 31n), au-dessous des lions… –  des torsades…  : traduction incertaine.'
  - type: text
    content: 'Sur les panneaux qui étaient pris entre les montants il y avait des lions, des bœufs et des keroubim ; sur les montants, au-dessus comme au-dessous des lions et des bœufs, il y avait des torsades qui descendaient. '
  '3':
  - type: note
    content: 'quarante-cinq, quinze par rangée  : cela semble justifier la lecture de LXX, trois rangées au lieu de quatre (v. 2n  ; 3 x 15 = 45). Cependant, les planches recouvrent les trois intervalles entre les quatre colonnes.'
  - type: text
    content: 'Elle était recouverte de cèdre par-dessus les planches qui étaient sur les colonnes, au nombre de quarante-cinq, quinze par rangée. '
  '30':
  - type: note
    content: 'des renforts  : traduction incertaine.'
  - type: text
    content: 'Chaque base avait quatre roues de bronze avec des essieux de bronze ; aux quatre angles il y avait des renforts ; les renforts étaient de métal fondu, au-dessous de la cuve, et au-delà des torsades. '
  '31':
  - type: note
    content: 'Traduction incertaine. La cuve est placée sur la base (v. 27). –  comme pour les ouvrages de ce genre  : autre traduction en forme de socle (v. 29n).'
  - type: text
    content: 'L''ouverture de la cuve, à l''intérieur de son cadre, dépassait d''une coudée vers le haut ; cette ouverture était ronde, comme pour les ouvrages de ce genre, et elle avait une coudée et demie de largeur ; il y avait aussi des sculptures sur cette ouverture. Les panneaux n''étaient pas arrondis, mais carrés. '
  '32':
  - type: note
    content: 'essieux  : le mot hébreu correspondant est habituellement traduit par main, de même au v. 33. Aux v. 35s il est rendu par appui.'
  - type: text
    content: 'Les quatre roues étaient sous les panneaux, et les essieux des roues fixés à la base ; chaque roue avait une coudée et demie de hauteur. '
  '33':
  - type: text
    content: 'Les roues étaient faites comme les roues d''un char. Leurs essieux, leurs jantes, leurs rayons et leurs moyeux, tout était de métal fondu. '
  '34':
  - type: text
    content: 'Il y avait aux quatre angles de chaque base quatre renforts, d''une seule pièce avec la base. '
  '35':
  - type: text
    content: 'A la partie supérieure de la base il y avait un cercle d''une demi-coudée de hauteur. A la partie supérieure de la base, ses appuis et ses panneaux étaient d''une seule pièce avec elle. '
  '36':
  - type: note
    content: 'plaques  : même mot hébreu pour tables  ; cf. Ex 24.12n  ; Dt 5.22n.'
  - type: text
    content: 'Sur les plaques des appuis et sur les panneaux il grava des keroubim, des lions et des branches de palmiers, selon les espaces libres, et des torsades tout autour. '
  '37':
  - type: note
    content: 'même forme (ou même taille) : le terme correspondant est absent de LXX.'
  - type: text
    content: 'C''est ainsi qu''il fit les dix bases : même métal fondu, même mesure et même forme pour toutes.'
  - type: heading
    content: 2Ch 4.6
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'quarante baths  : environ 840 l (voir mesures).'
  - type: text
    content: 'Il fit dix cuves de bronze. Chaque cuve contenait quarante baths, chaque cuve avait quatre coudées, chaque cuve était sur l''une des dix bases. '
  '39':
  - type: note
    content: 'il plaça la Mer…  : cf. 2Ch 4.10.'
  - type: text
    content: 'Il plaça cinq bases sur le côté droit de la Maison, et cinq bases sur le côté gauche de la Maison ; il plaça la Mer du côté droit de la Maison, au sud-est. '
  '4':
  - type: note
    content: claires-voies v. 5 ; 6.4n.
  - type: text
    content: 'Il y avait trois rangées de claires-voies, et les embrasures se faisaient vis-à-vis, trois fois. '
  '40':
  - type: note
    content: 'Hiram  : le nom est ici vocalisé Hirom à la première occurrence. –  les cuves  : de nombreux mss hébreux, LXX, Syr et Vg ont lu, en modifiant une lettre du mot hébreu, les récipients ou les marmites, comme en 2Ch 4.11.'
  - type: text
    content: Hiram fit les cuves, les pelles et les calices.
  - type: heading
    content: Liste récapitulative des objets de métal
  - type: heading
    content: 2Ch 4.7–5.1
  - type: text
    content: 'Hiram acheva tous les travaux qu''il avait faits pour le roi Salomon dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '41':
  - type: note
    content: 'chapiteaux évasés  : litt. coupes des chapiteaux. Sur le terme hébreu correspondant à coupes, cf. Za 4.2n  ; Ec 12.6n.'
  - type: text
    content: 'deux colonnes, avec les deux chapiteaux évasés au sommet des deux colonnes ; les deux treillis, pour couvrir les deux chapiteaux évasés au sommet des colonnes ; '
  '42':
  - type: text
    content: 'les quatre cents grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux chapiteaux évasés au sommet des colonnes ; '
  '43':
  - type: text
    content: 'les dix bases et les dix cuves sur les bases, '
  '44':
  - type: text
    content: 'la Mer, une, et les douze bœufs sous la Mer ; '
  '45':
  - type: note
    content: 'récipients Ex 27.3n  ; 2R 25.14. –  poli  : la forme verbale ainsi traduite (synonyme en 2Ch 4.16n) est rendue par luisant en Es 18.2,7.'
  - type: text
    content: 'les récipients, les pelles et les calices. Tous ces objets que Hiram avait faits pour le roi Salomon dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' étaient de bronze poli. '
  '46':
  - type: note
    content: 'le district du Jourdain  : cf. Gn 13.10-12 ; voir aussi 2S 18.23. –  dans l''épaisseur de la terre  : autre traduction dans la masse, à Adam(a)  ; cf. Gn 2.5n  ; Os 6.7n. –  Tsartân  : cf. 4.12 ; Jos 3.16 ; 13.27.'
  - type: text
    content: 'C''est dans le district du Jourdain que le roi les fondit, dans l''épaisseur de la terre, entre Soukkoth et Tsartân. '
  '47':
  - type: note
    content: 'Salomon mit en place…  : autre traduction Salomon laissa tous ces objets sans évaluer le poids du bronze, tant était grande leur quantité.'
  - type: text
    content: Salomon mit en place tous ces objets en si grande quantité qu'on ne put évaluer le poids du bronze.
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'les objets…  : autres traductions les objets destinés à la maison du Seigneur  ; les ustensiles qui sont dans la maison du Seigneur . –  le pain offert  : litt. les pains de la face  ; cf. Ex 25.30n  ; 35.13 ; 39.36 ; 1S 21.7. Autre expression  : pain exposé (Né 10.34+ ; 1Ch 9.32 ; 23.29 ; 28.16 ; 2Ch 13.11). L''appellation pain offert est tirée du grec de LXX et employée par le N.T. (Mt 12.4+ ; Mc 2.26 ; Lc 6.4 ; Hé 9.2).'
  - type: text
    content: 'Salomon fit tous les objets de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : l''autel d''or ; la table d''or, sur laquelle on mettait le pain offert ; '
  '49':
  - type: note
    content: d'or fin 6.20n.
  - type: text
    content: 'les porte-lampes d''or fin, cinq à droite et cinq à gauche, devant le Secret, avec les fleurs, les lampes et les mouchettes d''or ; '
  '5':
  - type: note
    content: 'claire-voie  : on a ici un singulier proche du mot au pluriel du v. 4 mais dont le sens est également mal connu ; cf. 6.4n.'
  - type: text
    content: 'Toutes les ouvertures et tous les montants étaient à claire-voie et carrés ; de devant, les embrasures se faisaient vis-à-vis, trois fois. '
  '50':
  - type: note
    content: 'bassins Ex 12.22+ ; 2R 12.14 ; Jr 52.19. –  les cassolettes  : autre traduction les cendriers, cf. Ex 25.38n. –  d''or fin 6.20n. –  l''intérieur de la Maison  : cf. 6.27 ; voir plan du temple de Salomon♦.'
  - type: text
    content: 'les bassins, les couteaux, les calices, les coupes et les cassolettes d''or fin ; et les gonds en or pour les portes de l''intérieur de la Maison à l''entrée du Très-Sacré, et pour les portes de la Maison, à l''entrée du temple. '
  '51':
  - type: note
    content: 'ce que David, son père, avait consacré  : cf. 2S 8.9-12 ; voir saint. –  les objets  : autre traduction les ustensiles, cf. 8.4 ; 15.15.'
  - type: text
    content: 'Ainsi furent achevés tous les travaux que le roi Salomon fit pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Salomon apporta ce que David, son père, avait consacré : l''argent, l''or et les objets. Il les plaça parmi les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: note
    content: 'Il fit  : absent de LXX. –  trente  : un ms de LXX porte cinquante. –  un entablement  : terme technique pour lequel on a proposé diverses autres traductions porche, auvent  ; cf. Ez 41.25s. Le texte est passablement obscur.'
  - type: text
    content: 'Il fit le vestibule des colonnes, long de cinquante coudées et large de trente coudées, et un vestibule en avant avec des colonnes et un entablement en avant. '
  '7':
  - type: note
    content: 'depuis le sol jusqu''au plafond  : litt. du sol au sol (supérieur ?).'
  - type: text
    content: 'Il fit le vestibule du trône, où il rendait la justice : le vestibule du jugement, et il le recouvrit de cèdre, depuis le sol jusqu''au plafond.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'construite  : sous-entendu dans le texte. –  la fille du pharaon…  : cf. 3.1n. –  pour femme  : sous-entendu dans le texte.'
  - type: text
    content: Sa maison, celle où il habitait, fut construite de la même manière, dans une autre cour, derrière le vestibule. Salomon fit une maison du même genre que ce vestibule pour la fille du pharaon, qu'il avait prise pour femme.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'de taille, sur mesure  : litt. selon les mesures de taille.'
  - type: text
    content: 'Pour tout cela, on employa de magnifiques pierres de taille, sur mesure, taillées à la scie à l''intérieur comme à l''extérieur, et ce depuis les fondations jusqu''aux corniches, et de l''extérieur jusqu''à la grande cour. '
