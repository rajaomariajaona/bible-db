          text: 'les récipients '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les marmites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 2Ch 4.11.'
      marker-yv: yv-n
    - type: text
      text: Hiram fit les cuves, les pelles et les calices.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Liste récapitulative des objets de métal
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 4.7–5.1
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hiram acheva tous les travaux qu''il avait faits pour le roi Salomon dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chapiteaux évasés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coupes des chapiteaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Sur le terme hébreu correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Za 4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
