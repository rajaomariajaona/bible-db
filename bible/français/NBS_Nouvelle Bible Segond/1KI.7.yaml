      marker-yv: yv-n
    - type: text
      text: 'Il fit les deux chapiteaux en fonte de bronze, pour les mettre au sommet des colonnes ; le premier chapiteau avait cinq coudées de hauteur, et le second chapiteau avait cinq coudées de hauteur. '
  '17':
