    - type: text
      text: 'Il bâtit d''abord la maison-de-la-forêt-du-Liban, longue de cent coudées, large de cinquante coudées, et haute de trente coudées, sur quatre rangées de colonnes de cèdre. Il y avait des poutres de cèdre sur les colonnes. '
