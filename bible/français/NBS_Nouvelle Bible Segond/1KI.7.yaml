      marker-yv: yv-n
    - type: text
      text: 'Des coloquintes l''entouraient au-dessous de son bord, dix par coudée, faisant tout le tour de la Mer ; les coloquintes, sur deux rangs, étaient fondues avec elle en une seule pièce. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers l'ouest
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers la mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Méditerranée).
      marker-yv: yv-n
    - type: text
      text: 'Elle était posée sur douze bœufs, trois tournés vers le nord, trois tournés vers l''ouest, trois tournés vers le sud, et trois tournés vers l''est ; la Mer reposait sur eux, et toute la partie postérieure de leur corps était en dedans. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un palme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 7,5 cm. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux mille baths
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : soit 42 000 l (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies) ; cf. 2Ch 4.5 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trois mille baths
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Son épaisseur était d'un palme ; et son bord était façonné comme le bord d'une coupe, en fleur de lis. Elle contenait deux mille baths.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les bases de bronze
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les dix bases '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont destinées à supporter les cuves. Cf. v. 38 ; 2Ch 4.6,14. Dans les v. 27-37, l'abondance des termes techniques au sens mal connu rend la traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: 'Il fit les dix bases de bronze. Chaque base avait quatre coudées de longueur, quatre coudées de largeur, et trois coudées de hauteur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voici comment étaient faites ces bases
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ceci est l'œuvre de la base.
      marker-yv: yv-n
    - type: text
      text: 'Voici comment étaient faites ces bases : elles étaient formées de panneaux, ces panneaux étant pris entre les montants. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au-dessus comme au-dessous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au-dessus il y avait un socle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: )
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', au-dessous des lions… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des torsades…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine.'
      marker-yv: yv-n
    - type: text
      text: 'Sur les panneaux qui étaient pris entre les montants il y avait des lions, des bœufs et des keroubim ; sur les montants, au-dessus comme au-dessous des lions et des bœufs, il y avait des torsades qui descendaient. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quarante-cinq, quinze par rangée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cela semble justifier la lecture de LXX, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trois rangées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au lieu de quatre (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3 x 15 = 45). Cependant, les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'planches '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'recouvrent les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: intervalles entre les quatre colonnes.
      marker-yv: yv-n
    - type: text
      text: 'Elle était recouverte de cèdre par-dessus les planches qui étaient sur les colonnes, au nombre de quarante-cinq, quinze par rangée. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des renforts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine.'
      marker-yv: yv-n
    - type: text
      text: 'Chaque base avait quatre roues de bronze avec des essieux de bronze ; aux quatre angles il y avait des renforts ; les renforts étaient de métal fondu, au-dessous de la cuve, et au-delà des torsades. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction incertaine. La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est placée sur la base (v. 27). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme pour les ouvrages de ce genre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en forme de socle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'L''ouverture de la cuve, à l''intérieur de son cadre, dépassait d''une coudée vers le haut ; cette ouverture était ronde, comme pour les ouvrages de ce genre, et elle avait une coudée et demie de largeur ; il y avait aussi des sculptures sur cette ouverture. Les panneaux n''étaient pas arrondis, mais carrés. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: essieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 33. Aux v. 35s il est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: appui.
      marker-yv: yv-n
    - type: text
      text: 'Les quatre roues étaient sous les panneaux, et les essieux des roues fixés à la base ; chaque roue avait une coudée et demie de hauteur. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les roues étaient faites comme les roues d''un char. Leurs essieux, leurs jantes, leurs rayons et leurs moyeux, tout était de métal fondu. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait aux quatre angles de chaque base quatre renforts, d''une seule pièce avec la base. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la partie supérieure de la base il y avait un cercle d''une demi-coudée de hauteur. A la partie supérieure de la base, ses appuis et ses panneaux étaient d''une seule pièce avec elle. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même mot hébreu pour '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 24.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 5.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Sur les plaques des appuis et sur les panneaux il grava des keroubim, des lions et des branches de palmiers, selon les espaces libres, et des torsades tout autour. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'même forme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: même taille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : le terme correspondant est absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est ainsi qu''il fit les dix bases : même métal fondu, même mesure et même forme pour toutes.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 4.6
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quarante baths
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : environ 840 l (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il fit dix cuves de bronze. Chaque cuve contenait quarante baths, chaque cuve avait quatre coudées, chaque cuve était sur l''une des dix bases. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il plaça la Mer…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 4.10.'
      marker-yv: yv-n
    - type: text
      text: 'Il plaça cinq bases sur le côté droit de la Maison, et cinq bases sur le côté gauche de la Maison ; il plaça la Mer du côté droit de la Maison, au sud-est. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'claires-voies '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5 ; 6.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait trois rangées de claires-voies, et les embrasures se faisaient vis-à-vis, trois fois. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.40 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hiram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le nom est ici vocalisé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hirom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à la première occurrence. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les cuves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : de nombreux mss hébreux, LXX, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' et '
        - type: usfm
