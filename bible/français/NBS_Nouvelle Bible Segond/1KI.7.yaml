      marker-yv: yv-n
    - type: text
      text: 'Les fondations étaient en pierres magnifiques, en grandes pierres, en pierres de dix coudées et en pierres de huit coudées. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au-dessus il y avait encore de magnifiques pierres de taille, sur mesure, et du cèdre. '
