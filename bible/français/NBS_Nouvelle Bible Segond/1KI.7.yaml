      marker-yv: yv-n
    - type: text
      text: 'La grande cour avait, sur tout son périmètre, trois rangées de pierres de taille et une rangée de poutres de cèdre, comme la cour intérieure de la maison du '
    - type: usfm
      marker: nd
      children:
