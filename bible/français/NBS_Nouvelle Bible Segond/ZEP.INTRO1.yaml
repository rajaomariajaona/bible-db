document_id: ZEP.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La prédication du prophète Sophonie intervient au temps de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Josias
    - type: text
      text: ', fils d''Amôn, roi de Juda de 640 à 609 av. J.-C. environ (cf. So 1.1'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ). La seconde moitié du VII
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle est une période sombre et troublée, entre l''apogée de la domination assyrienne (début du VII'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle) et la montée de la puissance babylonienne (fin du VII'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''hégémonie assyrienne a entraîné la ruine des petits Etats de la région située à l''ouest de l''Euphrate. Parmi eux, le royaume d''Israël ou royaume du Nord : en 722/1, sa capitale, Samarie, est détruite, et une partie de sa population est exilée. Dans la situation incertaine qui suit, lorsque le pouvoir assyrien fléchit, une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: compétition
    - type: text
      text: ' s''établit entre les candidats à la domination des peuples plus faibles. Autour de 640 les Scythes se répandent dans une partie du Moyen-Orient, et l''Egypte redresse la tête.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La situation intérieure du royaume de Juda reflète ce climat général de crise. Josias, à l''âge de huit ans, succède à son père Amôn, assassiné après un règne très bref. La minorité du roi est sans doute marquée par des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: intrigues
    - type: text
      text: ' et des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: conflits
    - type: text
      text: ' autour du pouvoir et des choix politiques. Sur le plan religieux, elle se caractérise par le maintien des cultes idolâtriques dont le long règne de Manassé (≈ 687-642) a favorisé la recrudescence.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Josias et sa réforme
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Entre 630 et 620 le roi Josias entreprend une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: réforme religieuse
    - type: text
      text: ' dont l''élément déterminant sera la découverte du '
    - type: usfm
      marker: it
      children:
      - type: text
        text: livre de la loi
    - type: text
      text: ' dans le temple de Jérusalem (2R 22–23 ; 2Ch 34). Josias meurt en 609 à Meguiddo, alors qu''il essaie de barrer la route au pharaon Néko, qui monte au secours de l''Assyrie moribonde dans l''espoir de faire échec aux ambitions babyloniennes.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre de Sophonie renvoie probablement à la période de minorité du roi Josias qui précède la réforme religieuse. Sur le prophète lui-même nous n''avons aucun renseignement en dehors de la généalogie fournie par le verset titre. Son livre laisse deviner un familier de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jérusalem
    - type: text
      text: '  ; il connaît ses divers quartiers et leurs occupants (cf. 1.9-13), et il en fustige les responsables civils et religieux (3.1-3).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Sentences et promesses
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On pourrait présenter le livre de Sophonie selon un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: schéma classique
    - type: text
      text: ' de la prédication prophétique, avec les trois étapes suivantes :'
  - type: usfm
    marker: im
    children:
    - type: text
      text: —sentences contre Juda et Jérusalem (1.2–2.3)
  - type: usfm
    marker: im
    children:
    - type: text
      text: —sentences contre les peuples étrangers (2.4–3.8)
  - type: usfm
    marker: im
    children:
    - type: text
      text: —promesses de salut (3.9-20).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce schéma est bien présent, mais le texte joue d'un va-et-vient entre l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: universel
    - type: text
      text: ' (la terre entière et les nations qui la peuplent) et le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: particulier
    - type: text
      text: ' (Jérusalem et le peuple de Dieu) qui le bouscule sans cesse. Ce jeu de relations est traversé par le thème central du livre : le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jour du Seigneur
    - type: text
      text: ', sous son double aspect de jugement et de salut.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le jour du Seigneur
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le jour du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui va bientôt venir est un jour de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: sacrifice
    - type: text
      text: ' (1.7s). Un sacrifice* comporte deux aspects : immolation et purification*. Le premier est développé de 1.8 à 3.8 : Jérusalem et les nations sont dévorées ; le second, à partir de 3.9, avec la purification des peuples et de Jérusalem ainsi que la restauration de la ville sainte. Le jugement et l''annonce de la destruction occupent donc la plus grande partie du livre. L''introduction (1.2-6) indique à la fois qu''ils concernent la création entière, et qu''ils se concentreront sur Jérusalem et Juda.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le péché de Jérusalem
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Jérusalem '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ne cherche pas le Seigneur
    - type: text
      text: ' (1.6 ; 3.6). C''est là son péché. Il en résulte de multiples compromissions religieuses (adoption de pratiques idolâtriques, cf. 1.4s,8s), une suffisance orgueilleuse (3.11), une confiance futile dans les richesses (1.11s,18) et l''incrédulité (1.12). L''injustice et la violence ont libre cours (1.9 ; 3.13ss). Les responsables du peuple, prêtres, prophètes, princes, juges, sont particulièrement pris à partie parce qu''ils trahissent leur mission (1.4s ; 3.1-4).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Jérusalem et les peuples étrangers
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans son oubli de Dieu, dans son refus de le consulter et de l''écouter, Jérusalem a perdu son '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: identité
    - type: text
      text: '. Les violentes invectives qui lui sont adressées (1.2–2.3 ; 3.1-8) encadrent les sentences contre les peuples qui l''entourent : à l''ouest, les Philistins ; à l''est, Moab et Ammon ; au sud, Koush ou la Nubie ; au nord enfin, l''Assyrie. En 3.1-8, Jérusalem est mise au rang de ces peuples : son nom n''apparaît pas, la voilà devenue une ville anonyme qui prend, sans transition dans le texte, la suite de Ninive, capitale de l''empire assyrien et lieu symbolique de l''oppression et de l''orgueil. Jérusalem est pourtant la ville au sein de laquelle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est présent (3.5). Son malheur vient de ce qu''elle n''en tient pas compte. Sa restauration consistera à être de nouveau définie par cette présence.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Un petit reste
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En dévoilant la réalité, le message prophétique de jugement dit aussi comment on pourrait la transformer. Ainsi en va-t-il chez Sophonie comme chez les autres prophètes (2.1-3). Son originalité est d''exhorter à un changement radical d''autres que les pécheurs directement visés par la condamnation. Ainsi les '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: gens humbles
    - type: text
      text: ' (ou « pauvres »)'
    - type: usfm
      marker: it
      children:
      - type: text
        text: du pays
    - type: text
      text: ' (ou « de la terre ») s''opposent aux responsables religieux et politiques comme aux riches commerçants. Leur situation ne comporte ni puissance ni richesse ; ils ne sont pas tentés de placer leur sécurité en elles. Ce sont eux qui constituent le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reste d'Israël
    - type: text
      text: ' autour duquel s''articulent les promesses. Leur seul refuge est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (3.12s), contrairement à la majorité de la population de Jérusalem (1.6 ; 3.2).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les prophètes de l''Ancien Testament ont développé le thème du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: reste
    - type: text
      text: ' (voir p. ex. Es 6.13 ; 11.1 ; Am 5.13). Il indique à la fois l''ampleur du désastre (il n''y a plus qu''un reste) et l''espérance d''un avenir possible. Dans le livre de Sophonie le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: reste d'Israël
    - type: text
      text: ' apparaît déjà avec les sentences contre les peuples étrangers (2.7,9). Il n''y a pas de « revanche » glorieuse d''Israël comme en Abdias 17 et 21. Le reste, les rescapés, bénéficient d''une possibilité de survie dans les pays étrangers (2.7) et sont en même temps porteurs d''une condamnation de Dieu contre ceux-ci (2.9). Le reste, peuple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pauvre et faible
    - type: text
      text: ', permet la restauration de Jérusalem-Sion (3.14,16) qui retrouve son identité et son nom. La présence du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en son sein se manifeste par la sollicitude qu''il lui témoigne (3.11,15,18s). La Jérusalem future qui naîtra '
    - type: usfm
      marker: it
      children:
      - type: text
        text: en ce jour-là
    - type: text
      text: ' (3.11,16,19,20), c''est-à-dire au jour où Dieu interviendra, s''oppose à la Jérusalem historique décrite auparavant (comparer 3.11-13 avec 3.1-4).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le particulier et l'universel
  - type: usfm
    marker: ip
    children:
    - type: text
      text: A l'horizon des promesses de Sophonie apparaît une note d'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: universalité
    - type: text
      text: ' (2.11 ; 3.9s). Jérusalem restaurée cesse de prendre les couleurs des autres peuples et de s''y perdre. La confusion est remplacée par l''unanimité dans le culte rendu à Dieu. L''universalité du jugement (1.2–3.8) fait discrètement place à une universalité du salut, où chaque nation est à sa place (3.9) et où Jérusalem manifeste la joie de Dieu au milieu des peuples.'
  - type: usfm
    marker: iot
    children:
    - type: text
      text: 'Sophonie : thèmes et correspondances'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'Parole du Seigneur qui parvint à Sophonie '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (1.1)
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'I Avertissement à Juda et à Jérusalem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (1.2-6)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 1.2-3 jugement universel et cosmique
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: je retrancherai les humains de la terre
    - type: text
      text: ' (v.3)'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 1.4-6 jugement de Juda et de Jérusalem
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: (j'étendrai ma main sur) ceux qui ne cherchent pas le Seigneur
    - type: text
      text: ' (v. 6)'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'II Le jour du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (1.7–2.3)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 1.7 jour du sacrifice
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 1.8-13 jour de l'intervention de Dieu contre Jérusalem
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'aux hommes… qui se disent :'
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le Seigneur ne fait ni bien ni mal
    - type: text
      text: ' (v. 12)'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 1.14-18 imminence et description du jour
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: il fera l'extermination…
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: de tous les habitants de la terre
    - type: text
      text: ' (v. 18)'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 2.1-3 avant le jour…
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: cherchez le Seigneur,
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: vous tous, gens humbles du pays…
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peut-être serez-vous cachés
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: au jour de la colère du Seigneur
    - type: text
      text: ' (v. 3)'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'III Sentences contre les peuples étrangers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (2.4-15)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 2.4-7 la Philistie
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 2.9-11 Moab et Ammon
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 2.12 Koush ou la Nubie
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 2.13-15 l'Assyrie
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: '(Ninive) qui se dit : Moi, et rien que moi !'
    - type: text
      text: ' (v. 15)'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'IV Avertissement à Jérusalem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (3.1-8)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 3.1-4 la ville rebelle
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: elle ne met pas sa confiance dans le Seigneur, elle ne s'approche pas de son Dieu
    - type: text
      text: ' (v. 2)'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '3.5-8 au jour du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: io2
    children:
    - type: text
      text: elle partage le sort des peuples étrangers
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Au jour où je me lèverai… tout le pays sera dévoré
    - type: text
      text: ' (v. 8)'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 'V Promesses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: (3.9-20)
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '3.9-10 purification des peuples : les fidèles dispersés'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '3.11-13 purification de Jérusalem : le reste d''Israël'
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: je laisserai en ton sein un peuple pauvre et faible
    - type: text
      text: ' (v. 12)'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: 3.14-20 restauration de Jérusalem
  - type: usfm
    marker: io3
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: je ferai de vous un nom et une louangeparmi tous les peuples de la terre
    - type: text
      text: ' (v. 20)'
