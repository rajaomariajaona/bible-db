type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'La prédication du prophète Sophonie intervient au temps de '
  - type: text
    content: Josias
  - type: text
    content: ', fils d''Amôn, roi de Juda de 640 à 609 av. J.-C. environ (cf. So 1.1'
  - type: text
    content: n
  - type: text
    content: ). La seconde moitié du VII
  - type: text
    content: e
  - type: text
    content: ' siècle est une période sombre et troublée, entre l''apogée de la domination assyrienne (début du VII'
  - type: text
    content: e
  - type: text
    content: ' siècle) et la montée de la puissance babylonienne (fin du VII'
  - type: text
    content: e
  - type: text
    content: ' siècle).'
  - type: text
    content: 'L''hégémonie assyrienne a entraîné la ruine des petits Etats de la région située à l''ouest de l''Euphrate. Parmi eux, le royaume d''Israël ou royaume du Nord : en 722/1, sa capitale, Samarie, est détruite, et une partie de sa population est exilée. Dans la situation incertaine qui suit, lorsque le pouvoir assyrien fléchit, une '
  - type: text
    content: compétition
  - type: text
    content: ' s''établit entre les candidats à la domination des peuples plus faibles. Autour de 640 les Scythes se répandent dans une partie du Moyen-Orient, et l''Egypte redresse la tête.'
  - type: text
    content: 'La situation intérieure du royaume de Juda reflète ce climat général de crise. Josias, à l''âge de huit ans, succède à son père Amôn, assassiné après un règne très bref. La minorité du roi est sans doute marquée par des '
  - type: text
    content: intrigues
  - type: text
    content: ' et des '
  - type: text
    content: conflits
  - type: text
    content: ' autour du pouvoir et des choix politiques. Sur le plan religieux, elle se caractérise par le maintien des cultes idolâtriques dont le long règne de Manassé (≈ 687-642) a favorisé la recrudescence.'
  - type: text
    content: Josias et sa réforme
  - type: text
    content: 'Entre 630 et 620 le roi Josias entreprend une '
  - type: text
    content: réforme religieuse
  - type: text
    content: ' dont l''élément déterminant sera la découverte du '
  - type: text
    content: livre de la loi
  - type: text
    content: ' dans le temple de Jérusalem (2R 22–23 ; 2Ch 34). Josias meurt en 609 à Meguiddo, alors qu''il essaie de barrer la route au pharaon Néko, qui monte au secours de l''Assyrie moribonde dans l''espoir de faire échec aux ambitions babyloniennes.'
  - type: text
    content: 'Le livre de Sophonie renvoie probablement à la période de minorité du roi Josias qui précède la réforme religieuse. Sur le prophète lui-même nous n''avons aucun renseignement en dehors de la généalogie fournie par le verset titre. Son livre laisse deviner un familier de '
  - type: text
    content: Jérusalem
  - type: text
    content: '  ; il connaît ses divers quartiers et leurs occupants (cf. 1.9-13), et il en fustige les responsables civils et religieux (3.1-3).'
  - type: text
    content: Sentences et promesses
  - type: text
    content: 'On pourrait présenter le livre de Sophonie selon un '
  - type: text
    content: schéma classique
  - type: text
    content: ' de la prédication prophétique, avec les trois étapes suivantes :'
  - type: text
    content: —sentences contre Juda et Jérusalem (1.2–2.3)
  - type: text
    content: —sentences contre les peuples étrangers (2.4–3.8)
  - type: text
    content: —promesses de salut (3.9-20).
  - type: text
    content: Ce schéma est bien présent, mais le texte joue d'un va-et-vient entre l'
  - type: text
    content: universel
  - type: text
    content: ' (la terre entière et les nations qui la peuplent) et le '
  - type: text
    content: particulier
  - type: text
    content: ' (Jérusalem et le peuple de Dieu) qui le bouscule sans cesse. Ce jeu de relations est traversé par le thème central du livre : le '
  - type: text
    content: jour du Seigneur
  - type: text
    content: ', sous son double aspect de jugement et de salut.'
  - type: text
    content: Le jour du Seigneur
  - type: text
    content: 'Le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui va bientôt venir est un jour de '
  - type: text
    content: sacrifice
  - type: text
    content: ' (1.7s). Un sacrifice* comporte deux aspects : immolation et purification*. Le premier est développé de 1.8 à 3.8 : Jérusalem et les nations sont dévorées ; le second, à partir de 3.9, avec la purification des peuples et de Jérusalem ainsi que la restauration de la ville sainte. Le jugement et l''annonce de la destruction occupent donc la plus grande partie du livre. L''introduction (1.2-6) indique à la fois qu''ils concernent la création entière, et qu''ils se concentreront sur Jérusalem et Juda.'
  - type: text
    content: Le péché de Jérusalem
  - type: text
    content: 'Jérusalem '
  - type: text
    content: ne cherche pas le Seigneur
  - type: text
    content: ' (1.6 ; 3.6). C''est là son péché. Il en résulte de multiples compromissions religieuses (adoption de pratiques idolâtriques, cf. 1.4s,8s), une suffisance orgueilleuse (3.11), une confiance futile dans les richesses (1.11s,18) et l''incrédulité (1.12). L''injustice et la violence ont libre cours (1.9 ; 3.13ss). Les responsables du peuple, prêtres, prophètes, princes, juges, sont particulièrement pris à partie parce qu''ils trahissent leur mission (1.4s ; 3.1-4).'
  - type: text
    content: Jérusalem et les peuples étrangers
  - type: text
    content: 'Dans son oubli de Dieu, dans son refus de le consulter et de l''écouter, Jérusalem a perdu son '
  - type: text
    content: identité
  - type: text
    content: '. Les violentes invectives qui lui sont adressées (1.2–2.3 ; 3.1-8) encadrent les sentences contre les peuples qui l''entourent : à l''ouest, les Philistins ; à l''est, Moab et Ammon ; au sud, Koush ou la Nubie ; au nord enfin, l''Assyrie. En 3.1-8, Jérusalem est mise au rang de ces peuples : son nom n''apparaît pas, la voilà devenue une ville anonyme qui prend, sans transition dans le texte, la suite de Ninive, capitale de l''empire assyrien et lieu symbolique de l''oppression et de l''orgueil. Jérusalem est pourtant la ville au sein de laquelle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est présent (3.5). Son malheur vient de ce qu''elle n''en tient pas compte. Sa restauration consistera à être de nouveau définie par cette présence.'
  - type: text
    content: Un petit reste
  - type: text
    content: 'En dévoilant la réalité, le message prophétique de jugement dit aussi comment on pourrait la transformer. Ainsi en va-t-il chez Sophonie comme chez les autres prophètes (2.1-3). Son originalité est d''exhorter à un changement radical d''autres que les pécheurs directement visés par la condamnation. Ainsi les '
  - type: text
    content: gens humbles
  - type: text
    content: ' (ou « pauvres »)'
  - type: text
    content: du pays
  - type: text
    content: ' (ou « de la terre ») s''opposent aux responsables religieux et politiques comme aux riches commerçants. Leur situation ne comporte ni puissance ni richesse ; ils ne sont pas tentés de placer leur sécurité en elles. Ce sont eux qui constituent le '
  - type: text
    content: reste d'Israël
  - type: text
    content: ' autour duquel s''articulent les promesses. Leur seul refuge est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (3.12s), contrairement à la majorité de la population de Jérusalem (1.6 ; 3.2).'
  - type: text
    content: 'Les prophètes de l''Ancien Testament ont développé le thème du '
  - type: text
    content: reste
  - type: text
    content: ' (voir p. ex. Es 6.13 ; 11.1 ; Am 5.13). Il indique à la fois l''ampleur du désastre (il n''y a plus qu''un reste) et l''espérance d''un avenir possible. Dans le livre de Sophonie le '
  - type: text
    content: reste d'Israël
  - type: text
    content: ' apparaît déjà avec les sentences contre les peuples étrangers (2.7,9). Il n''y a pas de « revanche » glorieuse d''Israël comme en Abdias 17 et 21. Le reste, les rescapés, bénéficient d''une possibilité de survie dans les pays étrangers (2.7) et sont en même temps porteurs d''une condamnation de Dieu contre ceux-ci (2.9). Le reste, peuple '
  - type: text
    content: pauvre et faible
  - type: text
    content: ', permet la restauration de Jérusalem-Sion (3.14,16) qui retrouve son identité et son nom. La présence du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en son sein se manifeste par la sollicitude qu''il lui témoigne (3.11,15,18s). La Jérusalem future qui naîtra '
  - type: text
    content: en ce jour-là
  - type: text
    content: ' (3.11,16,19,20), c''est-à-dire au jour où Dieu interviendra, s''oppose à la Jérusalem historique décrite auparavant (comparer 3.11-13 avec 3.1-4).'
  - type: text
    content: Le particulier et l'universel
  - type: text
    content: A l'horizon des promesses de Sophonie apparaît une note d'
  - type: text
    content: universalité
  - type: text
    content: ' (2.11 ; 3.9s). Jérusalem restaurée cesse de prendre les couleurs des autres peuples et de s''y perdre. La confusion est remplacée par l''unanimité dans le culte rendu à Dieu. L''universalité du jugement (1.2–3.8) fait discrètement place à une universalité du salut, où chaque nation est à sa place (3.9) et où Jérusalem manifeste la joie de Dieu au milieu des peuples.'
  - type: text
    content: 'Sophonie : thèmes et correspondances'
