          text: 'désigner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 1Ch 9.29 ; voir aussi Nb 22 ; Jb 7.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui engloutit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour engloutir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trois jours et trois nuits '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mt 12.40/ /.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit intervenir un grand poisson qui engloutit Jonas, et Jonas resta dans le ventre du poisson trois jours et trois nuits. '
