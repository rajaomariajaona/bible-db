    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il m'a répondu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du sein du séjour des morts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai appelé au secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu m'as entendu.
