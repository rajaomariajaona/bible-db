document_id: JON.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La prière de Jonas
  - type: text
    content: ' '
  - type: note
    content: 'fit intervenir  : le verbe hébreu suggère une nomination à un poste ou un ordre de mission ; de même en 4.6-8 ; il est traduit par destiner en Es 65.12 et par désigner en 1Ch 9.29 ; voir aussi Nb 22 ; Jb 7.12. –  qui engloutit  : litt. pour engloutir . –  trois jours et trois nuits Mt 12.40/ /.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit intervenir un grand poisson qui engloutit Jonas, et Jonas resta dans le ventre du poisson trois jours et trois nuits. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.16 ; Ps 3.9 ; 22.26. –  en déclarant…  : litt. par la voix de la reconnaissance Ps 26.7n  ; 42.5.'
  - type: text
    content: Quant à moi, je t'offrirai des sacrifices en déclarant ma reconnaissance,
  - type: text
    content: je m'acquitterai des vœux que j'ai faits.
  - type: text
    content: 'C''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''appartient le salut !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: terre ferme 1.9n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla au poisson, qui vomit Jonas sur la terre ferme.'
  '2':
  - type: text
    content: 'Jonas, dans le ventre du poisson, pria le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. '
  '3':
  - type: note
    content: 'Ps 18.7 ; 120.1 ; 130.1 ; Lm 3.55-57. –  du sein ou du ventre (autre mot qu''aux v. 1s). –  séjour des morts  : cf. Gn 37.35+.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'De ma détresse, j''ai invoqué le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et il m'a répondu ;
  - type: text
    content: du sein du séjour des morts
  - type: text
    content: j'ai appelé au secours,
  - type: text
    content: et tu m'as entendu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 42.8. –  les courants  : litt. un fleuve.'
  - type: text
    content: Tu m'as jeté dans les profondeurs, au cœur des mers,
  - type: text
    content: les courants m'entourent ;
  - type: text
    content: tous tes flots, toutes tes vagues ont passé sur moi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 31.23n  ; 5.8. –  loin de tes yeux  : cf. Jr 32.19 ; Ps 32.8 ; 34.16 ; 123.1. –  Mais je verrai encore  : autre traduction pourtant je continue à regarder…  ; ou, d''après une version grecque, comment pourrais-je encore voir… ? –  ton temple sacré ou ton saint temple , ou encore ton palais sacré v. 8 ; Mi 1.2n  ; Ps 11.4.'
  - type: text
    content: 'Et moi, je disais :'
  - type: text
    content: Je suis chassé loin de tes yeux !
  - type: text
    content: Mais je verrai encore ton temple sacré.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 69.2s ; 116.3. –  m''ont enserré Ps 18.5 ; 40.13 ; 116.3. –  jusqu''à la gorge  : autres traductions j''étouffe ; je meurs  ; sur le mot traduit ici par gorge , cf. Gn 1.20n  ; Es 29.8n. –  abîme Gn 1.2n.'
  - type: text
    content: Les eaux m'ont enserré jusqu'à la gorge,
  - type: text
    content: l'abîme m'entoure,
  - type: text
    content: des joncs se sont noués autour de ma tête.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'de la terre ou du pays (des morts)  : cf. Jr 17.13n. –  tu m''as fait remonter Ps 16.10 ; 30.4 ; 103.4 ; 107.20 ; Jb 33.18.'
  - type: text
    content: Je suis descendu jusqu'aux ancrages des montagnes,
  - type: text
    content: les verrous de la terre m'enfermaient pour toujours ;
  - type: text
    content: mais tu m'as fait remonter vivant de la fosse,
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 142.4 ; 143.4. –  Alors que je défaillais  : autre traduction quand j''étais abattu . –  je me suis souvenu…  : autres traductions j''ai pensé au Seigneur  ; j''ai évoqué le nom du Seigneur (YHWH) ; j''ai invoqué le Seigneur (autre formule hébraïque en 1.14 ; 2.3). –  temple sacré v. 5n.'
  - type: text
    content: Alors que je défaillais,
  - type: text
    content: 'je me suis souvenu du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ma prière est parvenue jusqu'à toi,
  - type: text
    content: jusqu'à ton temple sacré.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 31.7. –  s''attachent à  : le verbe hébreu est souvent traduit par garder, observer . –  des futilités illusoires ou des idoles futiles  ; cf. Es 44.11 ; Jr 10.14s ; Ps 31.7n  ; 115.5ss.'
  - type: text
    content: Ceux qui s'attachent à des futilités illusoires
  - type: text
    content: éloignent d'eux la fidélité.
