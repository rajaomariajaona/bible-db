        - type: text
          text: '  ; 42.5.'
      marker-yv: yv-n
    - type: text
      text: Quant à moi, je t'offrirai des sacrifices en déclarant ma reconnaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je m'acquitterai des vœux que j'ai faits.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qu''appartient le salut !'
