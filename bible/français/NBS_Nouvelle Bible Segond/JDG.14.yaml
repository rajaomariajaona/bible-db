document_id: JDG.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mariage de Samson
  - type: text
    content: ' '
  - type: note
    content: 'Timna (ou Timnata , forme inhabituelle à la deuxième occurrence) : cf. Jos 15.10 ; 19.43.'
  - type: text
    content: 'Samson descendit à Timna ; à Timna, il vit une femme d''entre les filles des Philistins. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'un banquet  : le terme hébreu est apparenté au verbe habituellement traduit par boire (13.4,14 ; Est 1.3n). –  c''est ainsi…  : il s''agit d''un type de mariage particulier, encore en usage dans le monde arabe, habituellement lorsqu''un homme se marie sans engager ses parents (cf. v. 3s) : l''épouse reste chez son père ; le mari n''a pas à verser de dot au moment du mariage, mais il doit apporter des cadeaux à chacune de ses visites (15.1).'
  - type: text
    content: 'Son père descendit chez la femme. Là, Samson donna un banquet, car c''est ainsi que faisaient les jeunes gens. '
  '11':
  - type: note
    content: trente compagnons philistins, cf. v. 16,20n  ; 15.1-3.
  - type: text
    content: 'Dès qu''ils le virent, ils firent choix de trente compagnons pour être avec lui. '
  '12':
  - type: note
    content: 'énigme 1R 10.1-3 ; Ez 17.2. –  sous-vêtements  : traduction incertaine ; le même terme apparaît en Es 3.23 et en Pr 31.24. –  vêtements de fête  : le terme hébreu dérive d''un verbe qui signifie entre autres changer  ; il désigne des vêtements précieux réservés à des occasions particulières ; il est associé à plusieurs autres termes désignant des vêtements en Gn 45.22 ; 2R 5.5,21-23.'
  - type: text
    content: 'Samson leur dit : Laissez-moi vous proposer une énigme, je vous prie. Si vous me l''expliquez au cours des sept jours du banquet, si vous la trouvez, je vous donnerai trente sous-vêtements et trente vêtements de fête. '
  '13':
  - type: text
    content: 'Mais si vous ne pouvez pas me l''expliquer, c''est vous qui me donnerez trente sous-vêtements et trente vêtements de fête. Ils lui dirent : Propose ton énigme ; nous l''écoutons. '
  '14':
  - type: note
    content: V. 8s,18. On a vu dans cette énigme, en dépit de son explication dans le cadre du récit, une métaphore sexuelle (cf. les références à la nourriture en Gn 39.6,9 ; Pr 30.20n). Voir aussi la réponse de Samson au v. 18n.
  - type: text
    content: 'Il leur dit :'
  - type: text
    content: Du mangeur est sorti ce qui se mange,
  - type: text
    content: du fort est sorti le doux.
  - type: text
    content: 'Pendant trois jours, ils ne purent expliquer l''énigme. '
  '15':
  - type: note
    content: 'Le septième jour  : certaines versions anciennes ont lu le quatrième jour (cf. v. 16s). –  Dupe  : autre traduction séduis  ; même possibilité en 16.5. –  nous te jetterons au feu  : formule analogue à celle de 12.1n  ; cf. 15.6. –  la maison de ton père  : autre traduction ta famille.'
  - type: text
    content: 'Le septième jour, ils dirent à la femme de Samson : Dupe ton mari, pour qu''il nous explique l''énigme ; sinon, nous te jetterons au feu, toi et la maison de ton père. Est-ce pour nous déposséder que vous nous avez invités ? '
  '16':
  - type: note
    content: 'Tu ne m''aimes pas  : litt. tu ne fais que me détester (ou me haïr) et tu ne m''aimes pas  ; cf. 15.2n. –  aux gens de mon peuple  : litt. aux fils de mon peuple, de même dans la suite. –  ni à mon père ni à ma mère v. 6+ ; cf. 16.15.'
  - type: text
    content: 'La femme de Samson se mit à le poursuivre de ses pleurs, en disant : Tu ne m''aimes pas ; tu as proposé une énigme aux gens de mon peuple, et tu ne me l''as pas expliquée ! Mais il lui répondit : Je ne l''ai expliquée ni à mon père ni à ma mère ; devrais-je te l''expliquer, à toi ? '
  '17':
  - type: note
    content: Cf. v. 14-15n  ; 16.16.
  - type: text
    content: 'Elle le poursuivit de ses pleurs pendant les sept jours que dura leur banquet ; le septième jour, il lui donna l''explication, car elle le tourmentait ; alors elle expliqua l''énigme aux gens de son peuple. '
  '18':
  - type: note
    content: 'Si vous n''aviez pas labouré…  : c.-à-d. sans le concours de ma femme, vous n''auriez pas trouvé  ; mais on a aussi discerné dans cette expression une métaphore sexuelle (cf. v. 14n).'
  - type: text
    content: 'Le septième jour, avant le coucher du soleil, les gens de la ville dirent à Samson :'
  - type: text
    content: Quoi de plus doux que le miel,
  - type: text
    content: quoi de plus fort que le lion ?
  - type: text
    content: 'Il leur dit :'
  - type: text
    content: Si vous n'aviez pas labouré avec ma génisse,
  - type: text
    content: vous n'auriez pas trouvé mon énigme.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'le souffle… v. 6+ ; 3.10+ ; voir esprit. –  Ashqelôn ou Askalon , l''une des cinq principales villes philistines (1.18 ; Jos 13.3). –  En colère…  : autre traduction puis il se mit en colère et remonta…  ; même expression en 2.14+.'
  - type: text
    content: 'Alors le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''empara de lui et il descendit à Ashqelôn. Il y tua trente hommes, dépouilla leurs cadavres et donna les habits de fête à ceux qui avaient expliqué l''énigme. En colère, il remonta chez son père. '
  '2':
  - type: note
    content: 'Cf. Gn 34.4. –  à son père et à sa mère  : cf. chap. 13.'
  - type: text
    content: 'Lorsqu''il fut remonté, il dit à son père et à sa mère : J''ai vu à Timna une femme d''entre les filles des Philistins ; prenez-la-moi maintenant pour femme. '
  '20':
  - type: note
    content: 'garçon d''honneur  : l''expression correspondante désigne peut-être celui des compagnons (v. 11, terme apparenté) qui avait servi de témoin et qui avait présidé à l''organisation du festin ; cf. 15.2,6 ; Jn 3.29.'
  - type: text
    content: Quant à la femme de Samson, elle fut donnée au compagnon qui lui avait servi de garçon d'honneur.
  '3':
  - type: note
    content: 'Cf. 3.6 ; Gn 24.3s ; 28.1s ; Dt 7.3s ; Né 13.23-27. –  tes frères  : au sens large ; il s''agit ici du clan ou de la tribu. –  notre peuple  : litt. mon peuple  ; plusieurs versions anciennes ont lu ton peuple. –  les Philistins, ces incirconcis (15.18 ; 1S 14.6 ; 17.26,36 ; 31.4 ; 2S 1.20 ; 1Ch 10.4), à la différence d''Israël et d''autres peuples voisins (cf. Jos 5.7-9) ; voir circoncision. –  me convient  : litt. est droite à mes yeux, de même au v. 7.'
  - type: text
    content: 'Son père et sa mère lui dirent : N''y a-t-il pas de femme parmi les filles de tes frères et dans tout notre peuple, que tu ailles prendre une femme d''entre les Philistins, ces incirconcis ? Samson répondit à son père : Prends-la-moi, car c''est elle qui me convient. '
  '4':
  - type: note
    content: 'ne savaient pas  : cf. v. 10n. –  cela venait du Seigneur Es 28.29 ; Ps 118.23 ; Ac 5.39. –  il cherchait  : le sujet peut être Samson, ou plus probablement YHWH (le Seigneur). –  En ce temps-là  : autre traduction à ce moment-là. –  les Philistins étaient les maîtres en Israël ou dominaient Israël  ; cf. 8.22 ; voir aussi 13.1 ; 15.11.'
  - type: text
    content: 'Son père et sa mère ne savaient pas que cela venait du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; en effet, il cherchait un prétexte contre les Philistins. En ce temps-là, les Philistins étaient les maîtres en Israël.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'avec son père et sa mère  : cf. v. 6. –  quand ils arrivèrent  : certains mss de LXX portent le singulier ( quand il arriva ).'
  - type: text
    content: 'Samson descendit avec son père et sa mère à Timna ; quand ils arrivèrent aux vignes de Timna, un jeune lion rugissant vint à sa rencontre. '
  '6':
  - type: note
    content: 'Le souffle (voir esprit) du Seigneur (3.10+ ; cf. 16.28) s''empara de Samson (litt. de lui) ou pénétra violemment en lui  ; même expression en 14.19 ; 15.14 ; 1S 10.6,10 ; 11.6 ; 16.13 ; 18.10. –  fendit le lion en deux  : litt. le fendit  ; même verbe en Lv 1.17 ; 11.3 ; 1S 24.8n  ; action semblable en 1S 17.34-37 ; 2S 23.20. –  Il ne dit pas…  : cf. v. 5,9,16.'
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''empara de Samson ; sans avoir rien à la main, celui-ci fendit le lion en deux comme on fend un chevreau. Il ne dit pas à son père et à sa mère ce qu''il avait fait. '
  '7':
  - type: text
    content: Il descendit et parla à la femme ; elle lui convint.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Quelque temps plus tard 11.4n. –  essaim  : cf. Ex 12.3n.'
  - type: text
    content: 'Quelque temps plus tard, il revint à Timna afin de la prendre pour femme, et il fit un détour pour voir le cadavre du lion. Il y avait un essaim d''abeilles dans le corps du lion, avec du miel. '
  '9':
  - type: note
    content: Contrairement aux règles imposées en Nb 6.6 au nazir (cf. Jg 13.4), Samson n'évite pas le contact avec les cadavres (15.15 ; 16.7n) ; voir aussi Lv 11.24s,39. –  il ne leur dit pas v. 6+.
  - type: text
    content: Il en prit dans le creux de ses mains et en mangea pendant qu'il faisait route ; lorsqu'il fut arrivé auprès de son père et de sa mère, il leur en donna, et ils en mangèrent. Mais il ne leur dit pas qu'il avait pris ce miel dans le corps du lion.
  - type: heading
    content: Samson propose une énigme aux Philistins
