document_id: JDG.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mariage de Samson
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Timna '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Timnata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', forme inhabituelle à la deuxième occurrence) : cf. Jos 15.10 ; 19.43.'
      marker-yv: yv-n
    - type: text
      text: 'Samson descendit à Timna ; à Timna, il vit une femme d''entre les filles des Philistins. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un banquet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu est apparenté au verbe habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'boire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (13.4,14 ; Est 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est ainsi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit d''un type de mariage particulier, encore en usage dans le monde arabe, habituellement lorsqu''un homme se marie sans engager ses parents (cf. v. 3s) : l''épouse reste chez son père ; le mari n''a pas à verser de dot au moment du mariage, mais il doit apporter des cadeaux à chacune de ses visites (15.1).'
      marker-yv: yv-n
    - type: text
      text: 'Son père descendit chez la femme. Là, Samson donna un banquet, car c''est ainsi que faisaient les jeunes gens. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trente compagnons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: philistins, cf. v. 16,20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.1-3.'
      marker-yv: yv-n
    - type: text
      text: 'Dès qu''ils le virent, ils firent choix de trente compagnons pour être avec lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'énigme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1R 10.1-3 ; Ez 17.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous-vêtements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; le même terme apparaît en Es 3.23 et en Pr 31.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vêtements de fête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu dérive d''un verbe qui signifie entre autres '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: changer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il désigne des vêtements précieux réservés à des occasions particulières ; il est associé à plusieurs autres termes désignant des vêtements en Gn 45.22 ; 2R 5.5,21-23.'
      marker-yv: yv-n
    - type: text
      text: 'Samson leur dit : Laissez-moi vous proposer une énigme, je vous prie. Si vous me l''expliquez au cours des sept jours du banquet, si vous la trouvez, je vous donnerai trente sous-vêtements et trente vêtements de fête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais si vous ne pouvez pas me l''expliquer, c''est vous qui me donnerez trente sous-vêtements et trente vêtements de fête. Ils lui dirent : Propose ton énigme ; nous l''écoutons. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8s,18. On a vu dans cette énigme, en dépit de son explication dans le cadre du récit, une métaphore sexuelle (cf. les références à la nourriture en Gn 39.6,9 ; Pr 30.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Voir aussi la réponse de Samson au v. 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du mangeur est sorti ce qui se mange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du fort est sorti le doux.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant trois jours, ils ne purent expliquer l''énigme. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le septième jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certaines versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le quatrième jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 16s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: séduis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même possibilité en 16.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous te jetterons au feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule analogue à celle de 12.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 15.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la maison de ton père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta famille.
      marker-yv: yv-n
    - type: text
      text: 'Le septième jour, ils dirent à la femme de Samson : Dupe ton mari, pour qu''il nous explique l''énigme ; sinon, nous te jetterons au feu, toi et la maison de ton père. Est-ce pour nous déposséder que vous nous avez invités ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu ne m'aimes pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu ne fais que me détester '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me haïr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et tu ne m'aimes pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux gens de mon peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de mon peuple'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni à mon père ni à ma mère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6+ ; cf. 16.15.
      marker-yv: yv-n
    - type: text
      text: 'La femme de Samson se mit à le poursuivre de ses pleurs, en disant : Tu ne m''aimes pas ; tu as proposé une énigme aux gens de mon peuple, et tu ne me l''as pas expliquée ! Mais il lui répondit : Je ne l''ai expliquée ni à mon père ni à ma mère ; devrais-je te l''expliquer, à toi ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 14-15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.16.'
      marker-yv: yv-n
    - type: text
      text: 'Elle le poursuivit de ses pleurs pendant les sept jours que dura leur banquet ; le septième jour, il lui donna l''explication, car elle le tourmentait ; alors elle expliqua l''énigme aux gens de son peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si vous n'aviez pas labouré…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans le concours de ma femme, vous n'auriez pas trouvé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais on a aussi discerné dans cette expression une métaphore sexuelle (cf. v. 14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Le septième jour, avant le coucher du soleil, les gens de la ville dirent à Samson :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoi de plus doux que le miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quoi de plus fort que le lion ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous n'aviez pas labouré avec ma génisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous n'auriez pas trouvé mon énigme.
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le souffle… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6+ ; 3.10+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ashqelôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Askalon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', l''une des cinq principales villes philistines (1.18 ; Jos 13.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En colère…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: puis il se mit en colère et remonta…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même expression en 2.14+.
      marker-yv: yv-n
    - type: text
      text: 'Alors le souffle du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''empara de lui et il descendit à Ashqelôn. Il y tua trente hommes, dépouilla leurs cadavres et donna les habits de fête à ceux qui avaient expliqué l''énigme. En colère, il remonta chez son père. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 34.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à son père et à sa mère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. chap. 13.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''il fut remonté, il dit à son père et à sa mère : J''ai vu à Timna une femme d''entre les filles des Philistins ; prenez-la-moi maintenant pour femme. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: garçon d'honneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression correspondante désigne peut-être celui des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'compagnons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 11, terme apparenté) qui avait servi de témoin et qui avait présidé à l'organisation du festin ; cf. 15.2,6 ; Jn 3.29.
      marker-yv: yv-n
    - type: text
      text: Quant à la femme de Samson, elle fut donnée au compagnon qui lui avait servi de garçon d'honneur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 3.6 ; Gn 24.3s ; 28.1s ; Dt 7.3s ; Né 13.23-27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sens large ; il s''agit ici du clan ou de la tribu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: notre peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Philistins, ces incirconcis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(15.18 ; 1S 14.6 ; 17.26,36 ; 31.4 ; 2S 1.20 ; 1Ch 10.4), à la différence d''Israël et d''autres peuples voisins (cf. Jos 5.7-9) ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: circoncision
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: me convient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est droite à mes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 7.'
      marker-yv: yv-n
    - type: text
      text: 'Son père et sa mère lui dirent : N''y a-t-il pas de femme parmi les filles de tes frères et dans tout notre peuple, que tu ailles prendre une femme d''entre les Philistins, ces incirconcis ? Samson répondit à son père : Prends-la-moi, car c''est elle qui me convient. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne savaient pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cela venait du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 28.29 ; Ps 118.23 ; Ac 5.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
