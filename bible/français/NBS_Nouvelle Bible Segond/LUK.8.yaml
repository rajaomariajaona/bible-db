      marker: ft
      children:
      - type: text
        text: Autre traduction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ceux qui avaient vu comment le démoniaque avait été sauvé le leur annoncèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur le verbe correspondant à '
    - type: usfm
