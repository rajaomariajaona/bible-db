document_id: LUK.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les femmes qui accompagnent Jésus
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4 ; 4.18s,43+ ; 7.11. –  il se mit à cheminer  : autre traduction il cheminait  ; même verbe Ac 17.1. –  Les Douze 6.13 ; 9.1,12 ; 18.31 ; 22.3,47 ; cf. Ac 10.39ss.'
  - type: text
    content: 'Par la suite, il se mit à cheminer de ville en ville et de village en village ; il proclamait et annonçait la bonne nouvelle du règne de Dieu. Les Douze étaient avec lui, '
  '10':
  - type: note
    content: 'connaître les mystères…  : cf. 11.52 ; Ac 1.3 ; l''expression les mystères de Dieu revient souvent dans les écrits de Qumrân. –  de sorte…  : cf. 9.45 ; 11.50 ; Es 6.9s ; Ac 28.25ss.'
  - type: text
    content: 'Il répondit : A vous, il a été donné de connaître les mystères du règne de Dieu ; mais pour les autres, cela leur est dit en paraboles, de sorte'
  - type: text
    content: qu'en voyant ils ne voient rien,
  - type: text
    content: et qu'en entendant ils ne comprennent rien.
  - type: heading
    content: Explication de la parabole du semeur
  - type: heading
    content: Mt 13.18-23  ; Mc 4.13-20
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'signifie  : litt. est  ; autre traduction voici ce qu''est la parabole . –  parole de Dieu 5.1+ ; cf. Mt 13.18n  ; 1P 1.23.'
  - type: text
    content: 'Voici ce que signifie la parabole : La semence, c''est la parole de Dieu. '
  '12':
  - type: note
    content: 'diable  : voir démon. –  qu''ils n''aient pas la foi pour être sauvés  : litt. qu''ils ne soient pas sauvés pour avoir cru  ; cf. Ac 16.31 ; 1Co 1.21 ; voir aussi Mc 4.12.'
  - type: text
    content: 'Ceux qui sont le long du chemin, ce sont ceux qui entendent ; puis le diable vient enlever de leur cœur la Parole afin qu''ils n''aient pas la foi pour être sauvés. '
  '13':
  - type: note
    content: 'accueillent… Ac 8.14+. –  pas de racine (trait non évoqué au v. 6) : cf. Col 2.7. –  pour un temps  : cf. 9.23. –  épreuve ou tentation 4.2+ ; cf. Ac 20.19. –  ils s''éloignent  : le verbe correspondant est apparenté au terme habituellement transcrit apostasie  ; cf. 2.37 ; 4.13 ; 13.27 ; Ac 5.37n  ; 1Tm 4.1n  ; Hé 3.12.'
  - type: text
    content: 'Ceux qui sont sur le roc, ce sont ceux qui, lorsqu''ils entendent, accueillent la Parole avec joie ; mais ils n''ont pas de racine, ils ne croient que pour un temps, et au temps de l''épreuve ils s''éloignent. '
  '14':
  - type: note
    content: 'ceux qui…  : autre traduction ceux qui ont entendu et qui, allant sous le poids des inquiétudes, des richesses et des plaisirs de la vie, sont étouffés et ne donnent pas… –  inquiétudes 10.41 ; 12.11,22,25s ; 21.34 ; 1Co 7.32ss. –  richesses 6.24+ ; cf. 7.25. –  plaisirs  : cf. 12.19 ; 16.19. –  la vie  : le terme grec s''applique en particulier à la vie présente, considérée dans sa durée (cf. 21.34 ; Ac 26.4 ; 1Co 6.3s [termes apparentés] ; 1Tm 2.2 ; 2Tm 2.4) ; même terme au v. 43 pour ressources  ; 15.12,30 bien  ; 21.4 ce qu''elle avait pour vivre (sur cet autre sens, voir 1Jn 2.16n).'
  - type: text
    content: 'Ce qui est tombé parmi les épines, ce sont ceux qui, après avoir entendu, sont étouffés en cours de route par les inquiétudes, les richesses et les plaisirs de la vie, et ne donnent pas de fruits mûrs. '
  '15':
  - type: note
    content: 'avec un cœur (cf. Ac 16.14) noble et bon  : litt. bel et bon (la bonne terre étant ici, litt., la belle terre  ; c''est l''autre adjectif en revanche qui apparaît au v. 8) ; l''expression grecque correspondante désignait l''homme de qualité dans la bonne société (on la retrouve en Tobit 5.14 « d''excellente origine », 9.6 « fils excellent d''un homme excellent », 2 Maccabées 15.12 « homme de bien », mais nulle part ailleurs qu''ici dans le N.T.). –  persévérance ou endurance 21.19 ; Rm 2.7 ; 5.3s ; 8.25 ; 15.4s ; 2Co 1.6 ; 6.4 ; 12.12 ; Col 1.11 ; 1Th 1.3 ; Hé 10.36 ; 12.1 ; Ap 3.10 ; 13.10 ; 14.12.'
  - type: text
    content: Ce qui est dans la bonne terre, ce sont ceux qui entendent la Parole avec un cœur noble et bon, la retiennent et portent du fruit avec persévérance.
  - type: heading
    content: La parabole de la lampe
  - type: heading
    content: Mc 4.21-25
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 11.33 ; Mt 5.15. –  afin que ceux qui entrent…  : cette proposition est absente de certains mss.'
  - type: text
    content: 'Personne, après avoir allumé une lampe, ne la recouvre d''un vase ni ne la met sous un lit ; mais on la met sur un porte-lampe, afin que ceux qui entrent voient la lumière. '
  '17':
  - type: note
    content: Cf. 2.30ss ; 12.2 ; Mt 10.26 ; Mc 4.22n  ; Rm 2.16 ; 1Co 3.12s.
  - type: text
    content: Car il n'est rien de caché qui ne doive devenir manifeste, rien de secret qui ne doive être connu et venir en pleine lumière.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'la manière dont vous écoutez (ou entendez ) : cf. v. 12-15. –  on donnera à celui qui a… 19.26 ; Mc 4.25+. –  ce qu''il pense avoir  : autre traduction ce qu''il semble avoir.'
  - type: text
    content: Prenez donc garde à la manière dont vous écoutez ; car on donnera à celui qui a, mais à celui qui n'a pas on enlèvera même ce qu'il pense avoir.
  - type: heading
    content: La mère et les frères de Jésus
  - type: heading
    content: Mt 12.46-50  ; Mc 3.31-35
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.27s ; Mc 3.21.
  - type: text
    content: 'Sa mère et ses frères se présentèrent, mais ils ne pouvaient l''aborder à cause de la foule. '
  '2':
  - type: note
    content: 'femmes 23.49 ; Ac 1.14 ; cf. Jn 4.27. –  guéries 4.38ss ; 6.17ss. –  esprits mauvais  : voir démon. –  Madeleine, c.-à-d. de Magdala, localité située vraisemblablement à l''ouest du lac de Tibériade ; cf. 24.10 ; Mc 15.40+ ; Jn 19.25. –  sept démons  : cf. v. 27,30 ; 11.26 ; Mc 16.9.'
  - type: text
    content: 'ainsi que quelques femmes qui avaient été guéries d''esprits mauvais et de maladies : Marie, celle qu''on appelle Madeleine, de qui étaient sortis sept démons, '
  '20':
  - type: note
    content: 'Cf. Ac 1.14+. –  ils veulent te voir  : cf. 9.9 ; 19.3s ; 23.8.'
  - type: text
    content: 'On l''en informa : Ta mère et tes frères se tiennent dehors, et ils veulent te voir. '
  '21':
  - type: note
    content: 'Cf. 11.28. –  mes frères Jn 20.17+. –  qui entendent  : autre traduction qui écoutent.'
  - type: text
    content: 'Mais il leur répondit : Ma mère et mes frères, ce sont ceux qui entendent la parole de Dieu et la mettent en pratique.'
  - type: heading
    content: Jésus apaise une tempête
  - type: heading
    content: Mt 8.18,23-27  ; Mc 4.35-41
  '22':
  - type: text
    content: ' '
  - type: note
    content: avec ses disciples v. 1ss,9. –  l'autre rive du lac (5.1), à l'est, en pays non juif (cf. v. 26). –  ils partirent ou ils gagnèrent le large  ; le même verbe est traduit par faire voile en Ac 13.13 ; 16.11 ; 18.21 etc.
  - type: text
    content: 'Un de ces jours-là, il monta dans un bateau avec ses disciples. Il leur dit : Passons sur l''autre rive du lac. Et ils partirent. '
  '23':
  - type: note
    content: 's''endormit  : cf. Mc 4.38+. –  Une bourrasque  : litt. une tempête de vent  ; cf. Mc 4.37+. –  le bateau se remplissait  : litt. ils se remplissaient.'
  - type: text
    content: 'Pendant qu''ils naviguaient, il s''endormit. Une bourrasque fondit sur le lac : le bateau se remplissait, ils étaient en danger. '
  '24':
  - type: note
    content: Maître 5.5n. –  rabroua 4.35+. –  calme Mc 4.39+.
  - type: text
    content: 'Ils vinrent le réveiller, en disant : Maître, maître, nous sommes perdus ! Réveillé, il rabroua le vent et les flots, qui s''apaisèrent ; le calme se fit. '
  '25':
  - type: note
    content: 'Où…  : cf. 17.6 ; 18.8. –  crainte / étonnement  : cf. 1.12+,63+ ; 4.36 ; 9.43 ; comparer avec Mt 8.27 ; Mc 4.41.'
  - type: text
    content: 'Puis il leur dit : Où est votre foi ? Saisis de crainte et d''étonnement, ils se disaient les uns aux autres : Qui est-il donc, celui-ci ? Il commande même aux vents et à l''eau, et ceux-ci lui obéissent.'
  - type: heading
    content: Jésus guérit un démoniaque
  - type: heading
    content: Mt 8.28-34  ; Mc 5.1-20
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Géraséniens  : certains mss portent Gergéséniens , d''autres Gadaréniens  ; cf. Mt 8.28n.'
  - type: text
    content: 'Ils abordèrent dans le pays des Géraséniens, qui est en face de la Galilée. '
  '27':
  - type: note
    content: 'des démons  : cf. v. 2+. –  Depuis longtemps  : selon certains mss, cette précision serait à rattacher à ce qui précède  : qui avait des démons depuis longtemps. –  tombeaux  : voir Mc 5.3n.'
  - type: text
    content: 'Lorsqu''il fut descendu à terre, un homme de la ville, qui avait des démons, vint au-devant de lui. Depuis longtemps il ne portait pas de vêtement et il ne demeurait pas dans une maison, mais dans les tombeaux. '
  '28':
  - type: note
    content: 'Pourquoi… 1R 17.18 ; Mc 1.24n. –  Fils du Dieu Très-Haut 1.32 ; cf. 4.34,41 ; Ac 16.17 ; voir aussi Gn 14.18. –  Je t''en prie  : même verbe v. 38 ; 5.12 ; 9.38 ; 10.2 ; Ac 8.34 ; 21.39 ; 26.3.'
  - type: text
    content: 'Voyant Jésus, il poussa un cri, tomba à ses pieds et dit d''une voix forte : Pourquoi te mêles-tu de mes affaires, Jésus, Fils du Dieu Très-Haut ? Je t''en prie, ne me tourmente pas ! '
  '29':
  - type: note
    content: 'Jésus (litt. il) enjoignait  : autre traduction s''apprêtait à enjoindre  ; ou, selon certains mss, il enjoignit, il avait enjoint. –  esprit impur (voir pur, impur) Mc 1.23. –  il s''était emparé  : même verbe Ac 6.12 ; 19.29 ; 27.15 (entraîner). –  depuis longtemps 13.16 ; Mc 9.21 ; Jn 5.6. –  dans les déserts  : cf. 4.1 ; 11.24 ; Lv 16.10 ; Es 13.21 ; 34.12ss ; voir aussi Ap 18.2.'
  - type: text
    content: 'Car Jésus enjoignait à l''esprit impur de sortir de l''homme, dont il s''était emparé depuis longtemps ; on le gardait lié de chaînes, et les fers aux pieds, mais il brisait ses liens et était poussé par le démon dans les déserts. '
  '3':
  - type: note
    content: 'Jeanne 24.10. –  Hérode Antipas (3.1n) : cf. 9.7ss ; Ac 13.1. –  beaucoup d''autres  : autre traduction plusieurs autres. –  les servir  : même verbe 4.39 ; 10.40n  ; 12.37 ; 17.8 ; 22.26s ; Mt 4.11n  ; Ac 6.1ns ; certains mss portent le servir, cf. Mc 15.41.'
  - type: text
    content: Jeanne, femme de Chuza, intendant d'Hérode, Susanne, et beaucoup d'autres, qui utilisaient leurs biens pour les servir.
  - type: heading
    content: La parabole du semeur
  - type: heading
    content: Mt 13.1-9  ; Mc 4.1-9
  '30':
  - type: note
    content: Voir Mc 5.9n.
  - type: text
    content: 'Jésus lui demanda : Quel est ton nom ? – Légion, répondit-il. Car beaucoup de démons étaient entrés en lui. '
  '31':
  - type: note
    content: 'Cf. 11.24ss. –  l''abîme  : cf. Gn 1.2n  ; Ps 107.26 ; Rm 10.7 ; Ap 9.11+ ; 20.1ss.'
  - type: text
    content: 'Et ils le suppliaient de ne pas leur ordonner de s''en aller dans l''abîme. '
  '32':
  - type: note
    content: cochons 15.15n  ; Mc 5.11n.
  - type: text
    content: 'Il y avait là un important troupeau de cochons en train de paître sur la montagne. Les démons le supplièrent de leur permettre d''entrer en eux. Il le leur permit. '
  '33':
  - type: text
    content: Les démons sortirent de l'homme, entrèrent dans les cochons, et le troupeau se précipita dans le lac du haut de l'escarpement et se noya.
  '34':
  - type: text
    content: 'Voyant ce qui s''était passé, ceux qui les faisaient paître s''enfuirent et répandirent la nouvelle dans la ville et dans les hameaux. '
  '35':
  - type: note
    content: assis aux pieds de Jésus 10.39 ; Ac 22.3. –  avec toute sa raison ou tout son bon sens (terme apparenté en Ac 26.25).
  - type: text
    content: 'Les gens sortirent pour voir ce qui s''était passé. Ils arrivèrent auprès de Jésus et ils trouvèrent l''homme de qui étaient sortis les démons assis aux pieds de Jésus, vêtu et avec toute sa raison ; et ils eurent peur. '
  '36':
  - type: note
    content: 'Autre traduction  : Ceux qui avaient vu comment le démoniaque avait été sauvé le leur annoncèrent  ; sur le verbe correspondant à sauver, qui signifie aussi guérir, cf. v. 12,48,50 ; 6.9 ; 7.50 ; 17.19 ; 18.42 ; 19.10 ; 23.35,37,39.'
  - type: text
    content: 'Ceux qui avaient vu ce qui s''était passé leur racontèrent comment le démoniaque avait été sauvé. '
  '37':
  - type: note
    content: 'Cf. 4.28s. –  En foule…  : litt. toute la multitude de la région… 1.10+. –  demandèrent à Jésus  : litt. lui demandèrent. –  grande crainte 1.65+ ; 7.16 ; Ac 2.43 ; 5.5,11. –  Il monta…  : cf. Mt 9.1.'
  - type: text
    content: 'En foule, tous ceux de la région des Géraséniens demandèrent à Jésus de s''éloigner d''eux, car ils étaient en proie à une grande crainte. Il monta dans le bateau et s''en retourna. '
  '38':
  - type: note
    content: 'le priait v. 28n. –  de le garder avec lui  : litt. d''être avec lui.'
  - type: text
    content: 'L''homme de qui étaient sortis les démons le priait de le garder avec lui. Mais il le renvoya en disant : '
  '39':
  - type: note
    content: 'Retourne chez toi (litt. dans ta maison) : comparer avec 9.59s ; 14.26 ; 18.28. –  raconte  : un terme apparenté est traduit par récit en 1.1. –  la ville v. 27,34.'
  - type: text
    content: Retourne chez toi et raconte tout ce que Dieu a fait pour toi. Il s'en alla et proclama par toute la ville tout ce que Jésus avait fait pour lui.
  - type: heading
    content: La fille de Jaïros et la femme qui touche le vêtement de Jésus
  - type: heading
    content: Mt 9.18-26  ; Mc 5.21-43
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'diverses villes  : cf. v. 1. –  parabole 5.36+.'
  - type: text
    content: 'Une grande foule se réunit auprès de lui, des gens de diverses villes. Il dit cette parabole : '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'retour  : cf. 10.17. –  accueilli  : cf. 9.11. –  la foule v. 4,19 ; cf. 4.42/ /. –  l''attendaient  : cf. 7.19s ; 12.46 ; 2P 3.12ss.'
  - type: text
    content: 'A son retour, Jésus fut accueilli par la foule, car tous l''attendaient. '
  '41':
  - type: note
    content: 'Jaïros Mc 5.22n. –  chef de la synagogue (4.15+) : formule légèrement différente v. 49 et Mc 5.22 ; voir Mt 9.18n. –  venir chez lui (litt. dans sa maison) : comparer avec 7.6.'
  - type: text
    content: 'Un homme du nom de Jaïros arriva ; il était chef de la synagogue. Tombant aux pieds de Jésus, il le suppliait de venir chez lui, '
  '42':
  - type: note
    content: 'une fille unique…  : cf. 7.12+. –  douze ans  : cf. v. 43 ; Mc 5.42n. –  le pressaient au point de l''étouffer  : litt. l''étouffaient (même verbe v. 14).'
  - type: text
    content: car il avait une fille unique d'environ douze ans, qui se mourait. Pendant qu'il y allait, les foules le pressaient au point de l'étouffer.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'perte de sang Lv 15.25ss. –  qui avait dépensé toutes ses ressources chez les médecins  : cette précision est absente de certains mss. Cf. Mc 5.26.'
  - type: text
    content: 'Or il y avait là une femme atteinte d''une perte de sang depuis douze ans, qui avait dépensé toutes ses ressources chez les médecins et qui n''avait pu être guérie par personne. '
  '44':
  - type: note
    content: 'toucha 5.13+. –  frange Mt 9.20n. –  du vêtement de Jésus  : litt. de son vêtement. –  A l''instant même v. 47 ; 1.64+.'
  - type: text
    content: 'Elle s''approcha par-derrière et toucha la frange du vêtement de Jésus. A l''instant même sa perte de sang s''arrêta. '
  '45':
  - type: note
    content: 's''en défendaient  : le même verbe est traduit par (se) renier (9.23 ; 12.9n) et par nier (22.57). –  Pierre  : cf. 9.20 ; 12.41 ; certains mss ajoutent et ceux qui étaient avec lui, cf. Mc 5.31. –  Maître 5.5n.'
  - type: text
    content: 'Jésus dit : Qui m''a touché ? Comme tous s''en défendaient, Pierre dit : Maître, les foules te serrent et te pressent ! '
  '46':
  - type: note
    content: je sais bien (ou je me suis rendu compte) … qu'une force… 5.17n  ; 6.19n.
  - type: text
    content: 'Mais Jésus répondit : Quelqu''un m''a touché : je sais bien, moi, qu''une force est sortie de moi. '
  '47':
  - type: text
    content: 'La femme, se voyant découverte, vint toute tremblante se jeter à ses pieds et expliqua devant tout le peuple pourquoi elle l''avait touché et comment elle avait été guérie à l''instant même. '
  '48':
  - type: note
    content: 'Ma fille  : litt. fille  ; cf. v. 42 ; 13.26. –  ta foi… v. 12+,50 ; 7.50+. –  va en paix 7.50.'
  - type: text
    content: 'Mais il lui dit : Ma fille, ta foi t''a sauvée ; va en paix.'
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Il parlait encore…  : cf. 22.47. –  n''importune plus 7.6n. –  maître 3.12n.'
  - type: text
    content: 'Il parlait encore lorsque arrive de chez le chef de la synagogue quelqu''un qui dit : Ta fille est morte ; n''importune plus le maître. '
  '5':
  - type: note
    content: 'sa semence  : cf. Mc 4.26ss. –  oiseaux du ciel 9.58 ; 13.19 ; Ac 10.12 ; 11.6 ; cf. Gn 1.26ss ; Ez 31.6 ; Ps 104.12 ; Dn 4.11,18 ; voir Mc 4.4n.'
  - type: text
    content: 'Le semeur sortit pour semer sa semence. Comme il semait, une partie de la semence tomba le long du chemin : elle fut piétinée, et les oiseaux du ciel la mangèrent. '
  '50':
  - type: note
    content: 'N''aie pas peur 1.13+ ; voir crainte. –  crois  : le temps du verbe, différent de Mc 5.36n, peut avoir la nuance de crois maintenant, fais un acte de foi. –  sauvée v. 36n,48.'
  - type: text
    content: 'Mais Jésus, qui avait entendu cela, dit au chef de la synagogue : N''aie pas peur, crois seulement, et elle sera sauvée. '
  '51':
  - type: note
    content: Cf. v. 10. –  Pierre (5.8+), Jean et Jacques (5.10+) 9.28 ; Ac 1.13 ; cf. Mt 17.1+ ; Lc 22.8 ; Ac 3.1ss,11 ; 4.13ss ; 8.14 ; 12.2.
  - type: text
    content: 'Lorsqu''il fut arrivé à la maison, il ne laissa personne entrer avec lui, si ce n''est Pierre, Jean et Jacques, ainsi que le père et la mère de l''enfant. '
  '52':
  - type: note
    content: 'et se lamentaient  : autre traduction se frappaient (la poitrine), 23.27n  ; Mt 11.17n  ; expression comparable dans Gn 23.2 ; 1S 25.1 (LXX). –  Ne pleurez pas 7.13+. –  morte / dort Mc 5.39+.'
  - type: text
    content: 'Tous pleuraient et se lamentaient sur elle. Mais lui dit : Ne pleurez pas ; elle n''est pas morte : elle dort. '
  '53':
  - type: note
    content: Cf. Ac 17.32.
  - type: text
    content: 'Eux se moquaient de lui, sachant qu''elle était morte. '
  '54':
  - type: note
    content: Mc 5.41n. –  réveille-toi ou lève-toi (autre verbe au v. 55) 1.69n  ; 7.14n.
  - type: text
    content: 'Mais il la saisit par la main et dit d''une voix forte : Mon enfant, réveille-toi ! '
  '55':
  - type: note
    content: Cf. 1R 17.21s. –  Son esprit ou son souffle.
  - type: text
    content: 'Son esprit revint ; à l''instant même elle se leva. Il ordonna qu''on lui donne à manger. '
  '56':
  - type: note
    content: 'stupéfaits Mc 2.12n. –  ne dire à personne  : comparer avec v. 39 ; Mt 8.4+.'
  - type: text
    content: Les parents de la jeune fille furent stupéfaits ; il leur enjoignit de ne dire à personne ce qui était arrivé.
  '6':
  - type: note
    content: 'pas d''humidité  : cf. Jr 17.8.'
  - type: text
    content: 'Une autre partie tomba sur le roc ; quand elle poussa, elle se dessécha, parce qu''elle n''avait pas d''humidité. '
  '7':
  - type: text
    content: 'Une autre partie tomba au milieu des épines ; les épines poussèrent avec elle et l''étouffèrent. '
  '8':
  - type: note
    content: 'produisit du fruit  : cf. 3.8. –  au centuple  : cf. Gn 26.12. –  il s''écriait  : autre traduction il s''écria. –  Celui…  : cf. 14.35 ; Mt 11.15+.'
  - type: text
    content: 'Une autre partie tomba dans la bonne terre ; quand elle poussa, elle produisit du fruit au centuple. En disant cela, il s''écriait : Celui qui a des oreilles pour entendre, qu''il entende !'
  - type: heading
    content: Pourquoi Jésus parle en paraboles
  - type: heading
    content: Mt 13.10-17  ; Mc 4.10-12
  '9':
  - type: text
    content: ' '
  - type: note
    content: disciples v. 1s.
  - type: text
    content: 'Ses disciples lui demandaient ce que signifiait cette parabole. '
