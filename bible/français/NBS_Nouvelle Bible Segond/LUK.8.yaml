      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Magdala
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', localité située vraisemblablement à l''ouest du lac de Tibériade ; cf. 24.10 ; Mc 15.40+ ; Jn 19.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept démons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 27,30 ; 11.26 ; Mc 16.9.'
    marker-yv: yv-n
  - type: text
    text: 'ainsi que quelques femmes qui avaient été guéries d''esprits mauvais et de maladies : Marie, celle qu''on appelle Madeleine, de qui étaient sortis sept démons, '
  - type: usfm
    marker: v
