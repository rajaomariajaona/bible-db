- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole du semeur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 13.1-9  ; Mc 4.1-9
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: diverses villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parabole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.36+.
    marker-yv: yv-n
  - type: text
    text: 'Une grande foule se réunit auprès de lui, des gens de diverses villes. Il dit cette parabole : '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa semence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 4.26ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'oiseaux du ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.58 ; 13.19 ; Ac 10.12 ; 11.6 ; cf. Gn 1.26ss ; Ez 31.6 ; Ps 104.12 ; Dn 4.11,18 ; voir Mc 4.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le semeur sortit pour semer sa semence. Comme il semait, une partie de la semence tomba le long du chemin : elle fut piétinée, et les oiseaux du ciel la mangèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas d'humidité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 17.8.'
    marker-yv: yv-n
  - type: text
    text: 'Une autre partie tomba sur le roc ; quand elle poussa, elle se dessécha, parce qu''elle n''avait pas d''humidité. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une autre partie tomba au milieu des épines ; les épines poussèrent avec elle et l''étouffèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: produisit du fruit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au centuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 26.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il s'écriait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il s'écria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Celui…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.35 ; Mt 11.15+.'
    marker-yv: yv-n
  - type: text
    text: 'Une autre partie tomba dans la bonne terre ; quand elle poussa, elle produisit du fruit au centuple. En disant cela, il s''écriait : Celui qui a des oreilles pour entendre, qu''il entende !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pourquoi Jésus parle en paraboles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 13.10-17  ; Mc 4.10-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
