    marker-yv: yv-n
  - type: text
    text: 'Car Jésus enjoignait à l''esprit impur de sortir de l''homme, dont il s''était emparé depuis longtemps ; on le gardait lié de chaînes, et les fers aux pieds, mais il brisait ses liens et était poussé par le démon dans les déserts. '
  - type: usfm
