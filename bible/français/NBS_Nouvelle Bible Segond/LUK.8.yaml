    marker-yv: yv-n
  - type: text
    text: 'Voyant Jésus, il poussa un cri, tomba à ses pieds et dit d''une voix forte : Pourquoi te mêles-tu de mes affaires, Jésus, Fils du Dieu Très-Haut ? Je t''en prie, ne me tourmente pas ! '
