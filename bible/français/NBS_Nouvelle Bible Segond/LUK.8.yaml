  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'disciples '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1s.
    marker-yv: yv-n
  - type: text
    text: 'Ses disciples lui demandaient ce que signifiait cette parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: connaître les mystères…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.52 ; Ac 1.3 ; l''expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les mystères de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'revient souvent dans les écrits de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de sorte…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.45 ; 11.50 ; Es 6.9s ; Ac 28.25ss.'
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : A vous, il a été donné de connaître les mystères du règne de Dieu ; mais pour les autres, cela leur est dit en paraboles, de sorte'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'en voyant ils ne voient rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'en entendant ils ne comprennent rien.
- type: usfm
  marker: s1
  children:
  - type: text
