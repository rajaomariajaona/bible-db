    marker-yv: yv-n
  - type: text
    text: 'Les gens sortirent pour voir ce qui s''était passé. Ils arrivèrent auprès de Jésus et ils trouvèrent l''homme de qui étaient sortis les démons assis aux pieds de Jésus, vêtu et avec toute sa raison ; et ils eurent peur. '
