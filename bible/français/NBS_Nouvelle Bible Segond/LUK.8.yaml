      - type: text
        text: Voir Mc 5.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus lui demanda : Quel est ton nom ? – Légion, répondit-il. Car beaucoup de démons étaient entrés en lui. '
