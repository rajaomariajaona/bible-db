        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y avait là un important troupeau de cochons en train de paître sur la montagne. Les démons le supplièrent de leur permettre d''entrer en eux. Il le leur permit. '
  - type: usfm
    marker: v
