  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: signifie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: voici ce qu'est la parabole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parole de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.1+ ; cf. Mt 13.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1P 1.23.'
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que signifie la parabole : La semence, c''est la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: diable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: démon
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils n'aient pas la foi pour être sauvés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils ne soient pas sauvés pour avoir cru
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ac 16.31 ; 1Co 1.21 ; voir aussi Mc 4.12.'
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui sont le long du chemin, ce sont ceux qui entendent ; puis le diable vient enlever de leur cœur la Parole afin qu''ils n''aient pas la foi pour être sauvés. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'accueillent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 8.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas de racine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(trait non évoqué au v. 6) : cf. Col 2.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour un temps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épreuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tentation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.2+ ; cf. Ac 20.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils s'éloignent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant est apparenté au terme habituellement transcrit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: apostasie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.37 ; 4.13 ; 13.27 ; Ac 5.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Tm 4.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Hé 3.12.'
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui sont sur le roc, ce sont ceux qui, lorsqu''ils entendent, accueillent la Parole avec joie ; mais ils n''ont pas de racine, ils ne croient que pour un temps, et au temps de l''épreuve ils s''éloignent. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux qui…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceux qui ont entendu et qui, allant sous le poids des inquiétudes, des richesses et des plaisirs de la vie, sont étouffés et ne donnent pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inquiétudes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.41 ; 12.11,22,25s ; 21.34 ; 1Co 7.32ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'richesses '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.24+ ; cf. 7.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plaisirs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.19 ; 16.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la vie
    - type: usfm
      marker: ft
