  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 13.18-23  ; Mc 4.13-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
