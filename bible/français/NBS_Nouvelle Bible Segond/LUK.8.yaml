  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les démons sortirent de l'homme, entrèrent dans les cochons, et le troupeau se précipita dans le lac du haut de l'escarpement et se noya.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Voyant ce qui s''était passé, ceux qui les faisaient paître s''enfuirent et répandirent la nouvelle dans la ville et dans les hameaux. '
  - type: usfm
    marker: v
    metadata:
