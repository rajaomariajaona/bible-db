        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 90.10 ; Dn 9.2+ ; 2Ch 36.21 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lettre de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Jérémie
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2 : « Une fois arrivés à Babylone, vous y serez pour de très nombreuses années, pour une longue période, jusqu''à sept générations. »'
      marker-yv: yv-n
    - type: text
      text: Tout ce pays deviendra un champ de ruines, un lieu dévasté, et ces nations seront soumises au roi de Babylone pendant soixante-dix ans.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je ferai rendre des comptes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''interviendrai contre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (6.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : cf. 36.31 ; 51.24,62.'
      marker-yv: yv-n
    - type: text
      text: 'Mais lorsque ces soixante-dix ans seront accomplis, je ferai rendre des comptes au roi de Babylone et à cette nation pour leurs fautes – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – ainsi qu''au pays des Chaldéens, que je réduirai pour toujours en un lieu dévasté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je ferai venir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que Jérémie a annoncé en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 30 ; 2.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes les nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans LXX ces mots servent d''introduction aux prophéties sur les nations correspondant aux chapitres 46–51 du texte hébreu et de la présente traduction ; cf. 1.5.'
      marker-yv: yv-n
    - type: text
      text: 'Je ferai venir sur ce pays tout ce que j''ai dit sur lui, tout ce qui est écrit dans ce livre – ce que Jérémie a annoncé en prophète sur toutes les nations. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. est omis par LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des nations puissantes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je les paierai de retour… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 50.29+ ; cf. 17.10+ ; Es 59.18 ; 66.6.'
      marker-yv: yv-n
    - type: text
      text: Car des nations puissantes et de grands rois les soumettront, eux aussi, et je les paierai de retour selon leurs actions et selon l'œuvre de leurs mains.
  - type: usfm
