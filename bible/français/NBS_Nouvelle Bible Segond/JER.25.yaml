      marker-yv: yv-n
    - type: text
      text: 'Parole qui parvint à Jérémie au sujet de tout le peuple de Juda, la quatrième année de Joïaqim, fils de Josias, roi de Juda – c''était la première année de Nabuchodonosor, roi de Babylone, – '
