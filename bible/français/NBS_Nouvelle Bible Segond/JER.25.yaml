          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'à Jérusalem et aux villes de Juda, à ses rois et à ses princes, pour en faire un champ de ruines, un lieu dévasté, un objet de sifflement d''horreur et de malédiction, – voilà pourquoi il en est ainsi en ce jour – '
  '19':
  - type: usfm
