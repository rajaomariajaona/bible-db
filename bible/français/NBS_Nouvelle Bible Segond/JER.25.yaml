      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 27 ; 50.35-37 ; Ez 23.32 ; Ab 16 ; Na 3.11.
      marker-yv: yv-n
    - type: text
      text: 'Qu''elles boivent, titubent et perdent la tête à la vue de l''épée que j''envoie parmi elles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pris la coupe de la main du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et je la fis boire à toutes les nations vers lesquelles le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''envoyait : '
  '18':
  - type: usfm
