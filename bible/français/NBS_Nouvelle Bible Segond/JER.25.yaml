        - type: text
          text: Nb 11.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je ferai disparaître de chez eux les chants de gaieté et les chants de joie, les chants du marié et les chants de la mariée, le bruit du moulin et la lumière de la lampe. '
  '11':
