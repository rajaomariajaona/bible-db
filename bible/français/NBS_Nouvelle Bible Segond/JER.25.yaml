document_id: JER.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Vingt-trois années d'activité prophétique
  - type: text
    content: ' '
  - type: note
    content: 'qui parvint litt. qui fut sur  ; cf. 1.2n. –  quatrième année de Joïaqim (2R 23.36) / première année de Nabuchodonosor  : 605/4 av. J.-C. ; cf. 36.1 ; 45.1 ; 46.2 ; Dn 1.1.'
  - type: text
    content: 'Parole qui parvint à Jérémie au sujet de tout le peuple de Juda, la quatrième année de Joïaqim, fils de Josias, roi de Juda – c''était la première année de Nabuchodonosor, roi de Babylone, – '
  '10':
  - type: note
    content: chants et bruit traduisent le même mot hébreu, ailleurs traduit par voix  ; cf. 7.34n. –  moulin Nb 11.8n.
  - type: text
    content: 'Je ferai disparaître de chez eux les chants de gaieté et les chants de joie, les chants du marié et les chants de la mariée, le bruit du moulin et la lumière de la lampe. '
  '11':
  - type: note
    content: 'lieu dévasté v. 9n  ; cf. 44.6,22. –  ces nations seront soumises (litt. serviront) 27.7 ; 28.14 ; LXX ils serviront (ou ils seront esclaves) parmi les nations. –  soixante-dix ans  : cf. v. 9 ; 29.10 ; voir aussi Za 1.12n  ; Ps 90.10 ; Dn 9.2+ ; 2Ch 36.21 ; Lettre de Jérémie 2 : « Une fois arrivés à Babylone, vous y serez pour de très nombreuses années, pour une longue période, jusqu''à sept générations. »'
  - type: text
    content: Tout ce pays deviendra un champ de ruines, un lieu dévasté, et ces nations seront soumises au roi de Babylone pendant soixante-dix ans.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'je ferai rendre des comptes ou j''interviendrai contre (6.15n) : cf. 36.31 ; 51.24,62.'
  - type: text
    content: 'Mais lorsque ces soixante-dix ans seront accomplis, je ferai rendre des comptes au roi de Babylone et à cette nation pour leurs fautes – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – ainsi qu''au pays des Chaldéens, que je réduirai pour toujours en un lieu dévasté. '
  '13':
  - type: note
    content: 'Je ferai venir…  : cf. 11.8. –  ce que Jérémie a annoncé en prophète (v. 30 ; 2.8n) sur (ou contre) toutes les nations  : dans LXX ces mots servent d''introduction aux prophéties sur les nations correspondant aux chapitres 46–51 du texte hébreu et de la présente traduction ; cf. 1.5.'
  - type: text
    content: 'Je ferai venir sur ce pays tout ce que j''ai dit sur lui, tout ce qui est écrit dans ce livre – ce que Jérémie a annoncé en prophète sur toutes les nations. '
  '14':
  - type: note
    content: Ce v. est omis par LXX. –  des nations puissantes… 27.7. –  je les paierai de retour… 16.18n  ; 50.29+ ; cf. 17.10+ ; Es 59.18 ; 66.6.
  - type: text
    content: Car des nations puissantes et de grands rois les soumettront, eux aussi, et je les paierai de retour selon leurs actions et selon l'œuvre de leurs mains.
  - type: heading
    content: La coupe de vin, symbole du jugement
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'de la fureur  : cette explicitation est omise dans LXX ; cf. 13.13+ ; 49.12 ; 51.7,39 ; Es 29.9 ; 51.17+ ; Ez 23.32-34 ; Ab 16 ; Na 3.11 ; Ha 2.16 ; Ps 60.5 ; 75.9 ; Lm 4.21 ; Mc 14.36/ / ; Ap 14.10.'
  - type: text
    content: 'Car ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Prends de ma main cette coupe remplie du vin de la fureur et fais-la boire à toutes les nations vers lesquelles je t''envoie. '
  '16':
  - type: note
    content: V. 27 ; 50.35-37 ; Ez 23.32 ; Ab 16 ; Na 3.11.
  - type: text
    content: 'Qu''elles boivent, titubent et perdent la tête à la vue de l''épée que j''envoie parmi elles. '
  '17':
  - type: text
    content: 'Je pris la coupe de la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et je la fis boire à toutes les nations vers lesquelles le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''envoyait : '
  '18':
  - type: note
    content: '24.9+. –  sifflement 18.16n. –  malédiction  : voir bénédiction. –  voilà pourquoi… 11.5 ; 32.20n  ; 44.6,22s ; Dt 2.30n.'
  - type: text
    content: 'à Jérusalem et aux villes de Juda, à ses rois et à ses princes, pour en faire un champ de ruines, un lieu dévasté, un objet de sifflement d''horreur et de malédiction, – voilà pourquoi il en est ainsi en ce jour – '
  '19':
  - type: note
    content: 46.2-28 ; Es 19–20 ; Ez 29–30.
  - type: text
    content: 'au pharaon, le roi d''Egypte, aux gens de sa cour, à ses princes et à tout son peuple ; '
  '2':
  - type: note
    content: 'devant  : autre traduction concernant.'
  - type: text
    content: 'parole que Jérémie prononça sur tout le peuple de Juda et devant tous les habitants de Jérusalem :'
  '20':
  - type: note
    content: 'la population mêlée (cf. 50.37 ; Ex 12.38n) : certains comprennent l''Occident, de même au v. 24 ; le mot hébreu ressemble à celui qui désigne le soir, il rappelle par ailleurs le nom de l''Arabie ; il peut aussi avoir le sens de métis (cf. Né 13.3n). –  Outs Gn 10.23n. –  Ashqelôn…  : avec Gath, les principales villes des Philistins 47.1-7 ; Am 1.6ss.'
  - type: text
    content: 'à toute la population mêlée, à tous les rois du pays d''Outs, à tous les rois du pays des Philistins, à Ashqelôn, à Gaza, à Eqrôn et à ce qui reste d''Ashdod ; '
  '21':
  - type: note
    content: Cf. 27.3n.
  - type: text
    content: 'à Edom, à Moab et aux Ammonites ; '
  '22':
  - type: note
    content: 'Tyr / Sidon Es 23.1n. –  l''île…  : ou bien Chypre, ou bien d''une façon plus générale les îles et les régions côtières de la Méditerranée ; cf. 2.10n.'
  - type: text
    content: 'à tous les rois de Tyr, à tous les rois de Sidon et aux rois de l''île qui est au-delà de la mer ; '
  '23':
  - type: note
    content: Dedân 49.8 ; Gn 10.7+. –  Téma Gn 25.15n  ; Es 21.14n. –  Bouz Gn 22.21n. –  ceux qui se rasent… 9.25n.
  - type: text
    content: 'à Dedân, à Téma, à Bouz et à tous ceux qui se rasent les tempes ; '
  '24':
  - type: note
    content: Arabie v. 13n  ; cf. 49.28ss ; Es 21.13-17.
  - type: text
    content: 'à tous les rois d''Arabie, et à tous les rois de la population mêlée qui demeure dans le désert ; '
  '25':
  - type: note
    content: 'Zimri  : région non identifiée ; certains modifient le texte hébreu traditionnel pour lire soit un Gimri qui désignerait les Cimmériens (associés à la Médie en Gn 10.2n  ; Es 13.17n), soit un Zimki qui serait le cryptogramme (selon le procédé du v. 26n) d’Elam (49.34-39 ; Gn 10.22n  ; Es 11.11n).'
  - type: text
    content: 'à tous les rois de Zimri, à tous les rois d''Elam et à tous les rois de Médie ; '
  '26':
  - type: note
    content: 'qui sont sur la terre  : litt. de la terre (omis par LXX) qui sont sur la face du sol  ; cf. Gn 2.5n. –  Shéshak  : peut-être un cryptogramme de Babel ou Babylone, selon un code (dit athbash) remplaçant la première lettre de l''alphabet hébreu par la dernière, la deuxième par l''avant-dernière, etc. ; cf. 51.1n,41 ; d''autres y voient une déformation du nom de Shamash-shoum-oukîn, fils d''Asarhaddon et frère d''Assourbanipal, qui a été le vice-roi assyrien de Babylone au milieu du VIIe s. av. J.-C. Celui-ci s''est révolté contre son frère, qui a en conséquence assiégé, pris et incendié Babylone. Voir aussi 50–51 ; Es 13.1–14.23 ; 21.1-10. –  boira après eux  : cf. Na 3.11.'
  - type: text
    content: 'à tous les rois du nord, proches ou éloignés les uns des autres, et à tous les royaumes qui sont sur la terre. Et le roi de Shéshak boira après eux. '
  '27':
  - type: note
    content: 'V. 16+ ; 48.26. –  sans vous relever  : cf. 51.39+,64.'
  - type: text
    content: '– Tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Buvez, enivrez-vous et vomissez, et tombez sans vous relever à la vue de l''épée que j''envoie parmi vous ! '
  '28':
  - type: note
    content: 49.12.
  - type: text
    content: 'Et s''ils refusent de prendre de ta main la coupe pour boire, tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Buvez, buvez ! '
  '29':
  - type: note
    content: sur laquelle mon nom… 7.10+ ; cf. 1P 4.17. –  innocentés 49.12. –  l'épée v. 38n  ; 47.6s ; Ez 38.21. –  de la terre ou du pays, de même dans la suite.
  - type: text
    content: 'Car c''est par la ville sur laquelle mon nom est invoqué que j''inaugure le malheur ; et vous, vous seriez innocentés ? Vous ne serez pas innocentés ! Car j''appelle l''épée sur tous les habitants de la terre – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Depuis la treizième année (1.2n) … jusqu'à ce jour 36.2. –  inlassablement… vous n'écoutez pas 7.13n.
  - type: text
    content: 'Depuis la treizième année de Josias, fils d''Amôn, roi de Juda, jusqu''à ce jour, voilà vingt-trois ans que la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''est parvenue ; je vous la dis, inlassablement, je vous la dis, et vous n''écoutez pas. '
  '30':
  - type: note
    content: 'tout cela  : autre traduction toutes ces paroles. –  Le Seigneur rugit  : cf. 2.15+ ; Os 11.10 ; Jl 4.16 ; Am 12 ; Ap 10.3. –  sacré  : voir saint. –  au-dessus  : autre traduction contre. –  son domaine 10.25n. –  un cri de vendange, comme ceux qui foulent  : cf. 48.33 ; 51.14 ; Es 16.9ns ; Ap 14.18.'
  - type: text
    content: 'Et toi, tu leur annonceras tout cela en prophète ; tu leur diras :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rugit d''en haut ;'
  - type: text
    content: de son séjour sacré il fait retentir sa voix ;
  - type: text
    content: il pousse des rugissements au-dessus de son domaine ;
  - type: text
    content: il pousse un cri de vendange, comme ceux qui foulent au pressoir,
  - type: text
    content: contre tous les habitants de la terre.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''aux extrémités  : litt. jusqu''à l''extrémité  ; cf. Es 48.20 ; Ps 46.10. –  un litige…  : cf. Es 3.13 ; Os 4.1 ; Mi 6.1s ; Ps 50.6. –  tous  : litt. toute chair.'
  - type: text
    content: Un vacarme se répand jusqu'aux extrémités de la terre,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a un litige avec les nations ;'
  - type: text
    content: il entre en jugement contre tous ;
  - type: text
    content: il livre les méchants à l'épée
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'va  : litt. sort . –  tempête 23.19+. –  s''éveille  : cf. 6.22+.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Un malheur va de nation en nation,
  - type: text
    content: une grande tempête s'éveille des confins de la terre.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Les victimes du Seigneur ou ceux que le Seigneur tuera , 51.4+ ; cf. Es 66.16 ; Ez 21.19n  ; So 2.12. –  on ne se lamentera pas  : cf. 4.8 ; 16.4ss. –  du fumier… 8.2+ ; cf. Es 66.16.'
  - type: text
    content: 'Les victimes du '
  - type: text
    content: Seigneur
  - type: text
    content: ' seront en ce jour-là d''une extrémité de la terre à l''autre ; ceux-là, on ne se lamentera pas sur eux, on ne les réunira pas, on ne les ensevelira pas ; ils deviendront du fumier sur la terre.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Hurlez 6.26 ; cf. Za 11.3. –  bergers 2.8+ ; 6.3. –  princes 14.3n. –  les jours  : litt. vos jours sont accomplis pour l''égorgement . –  un objet  : LXX des béliers (de choix).'
  - type: text
    content: Hurlez, bergers, criez !
  - type: text
    content: Roulez-vous par terre, princes des troupeaux !
  - type: text
    content: Car les jours sont arrivés où vous allez être égorgés
  - type: text
    content: et dispersés.
  - type: text
    content: Vous tomberez comme un objet de valeur.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Plus de refuge  : litt. le refuge périra , c.-à-d. fera défaut aux bergers Am 2.14 ; 9.1.'
  - type: text
    content: Plus de refuge pour les bergers !
  - type: text
    content: Plus de lieu sûr pour les princes des troupeaux !
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Entendez les cris  : litt. voix (ou bruit, son ) du cri . –  bergers v. 34+.'
  - type: text
    content: Entendez les cris des bergers,
  - type: text
    content: le hurlement des princes des troupeaux,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ravage le lieu où ils faisaient paître.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'prospères  : litt. de la paix . –  silencieux  : autre traduction anéantis  ; cf. Ps 94.17. –  colère ardente 4.8+.'
  - type: text
    content: Les pâturages prospères sont silencieux
  - type: text
    content: 'à cause de la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Il a abandonné…  : sens incertain ; quelques-uns modifient le texte hébreu traditionnel pour lire le jeune lion a quitté sa tanière  ; cf. 4.7. –  sa tanière Ps 10.9+. –  par la fureur du destructeur  : traduction conjecturale ; le mot rendu par destructeur (aussi 46.16 ; 50.16) est sans doute un homonyme de celui qui est habituellement rendu par colombe  ; autre traduction, d''après des versions anciennes  : par l''épée cruelle ou par l''épée de l''oppression (le même terme est traduit par exploiter en 22.3 ; cf. So 3.1 tyrannique ).'
  - type: text
    content: Il a abandonné sa demeure comme un jeune lion sa tanière ;
  - type: text
    content: car leur pays est devenu un lieu dévasté
  - type: text
    content: par la fureur du destructeur,
  - type: text
    content: à cause de sa colère ardente.
  '4':
  - type: note
    content: écouter ou obéir  ; cf. 7.25-26+ ; 35.8n,14.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a envoyé tous ses serviteurs, les prophètes, il les a envoyés à nouveau, inlassablement ; et vous n''avez pas écouté, vous n''avez pas tendu l''oreille pour écouter. '
  '5':
  - type: note
    content: 'revienne… 18.11+ ; le verbe hébreu (shouvou) fait assonance avec celui qui est traduit par vous resterez (shevou). –  agissements mauvais 4.4n. –  la terre  : litt. le sol, cf. Gn 2.5n.'
  - type: text
    content: 'Ils disaient : Que chacun de vous revienne, je vous prie, de sa voie mauvaise et de ses agissements mauvais, et vous resterez sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a donnée, à vous à vos pères, depuis toujours et pour toujours. '
  '6':
  - type: note
    content: Ne suivez pas… 7.6+. –  l'œuvre (ou l'ouvrage) de vos mains v. 7,14 ; 1.16+ ; 10.3n  ; 32.30 ; 44.8.
  - type: text
    content: 'Ne suivez pas d''autres dieux pour les servir et pour vous prosterner devant eux ; ne me contrariez pas par l''œuvre de vos mains, et je ne vous ferai aucun mal. '
  '7':
  - type: note
    content: de sorte que vous m'avez contrarié ou afin de me contrarier 7.18n.
  - type: text
    content: 'Mais vous ne m''avez pas écouté, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – de sorte que vous m''avez contrarié par l''œuvre de vos mains, pour votre malheur. '
  '8':
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Parce que vous n''avez pas écouté mes paroles, '
  '9':
  - type: note
    content: 'tous les peuples du nord 1.14n,15n. –  Nabuchodonosor (21.2n)… mon serviteur 27.6 ; 43.10. –  les frapper d''anathème 50.21,26 ; 51.3 ; Dt 2.34n  ; Es 34.2 ; Mi 4.13n  ; Za 14.11n. –  lieu dévasté  : cf. v. 11,18,38 ; le même mot hébreu a aussi été traduit par sujet (ou objet) d''atterrement  ; cf. 29.18 ; 44.12,22. –  sifflement 18.16n. –  des ruines pour toujours  : cf. v. 11 ; 49.13 ; LXX une honte pour toujours  ; cf. 23.40.'
  - type: text
    content: 'j''envoie chercher tous les peuples du nord – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et Nabuchodonosor, roi de Babylone, mon serviteur ; je les ferai venir contre ce pays, contre ses habitants et contre toutes ces nations qui l''entourent, afin de les frapper d''anathème, de les réduire en un lieu dévasté et d''en faire un objet de sifflement d''horreur, des ruines pour toujours. '
