      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette explicitation est omise dans LXX ; cf. 13.13+ ; 49.12 ; 51.7,39 ; Es 29.9 ; 51.17+ ; Ez 23.32-34 ; Ab 16 ; Na 3.11 ; Ha 2.16 ; Ps 60.5 ; 75.9 ; Lm 4.21 ; Mc 14.36/ / ; Ap 14.10.'
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi m''a parlé le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : Prends de ma main cette coupe remplie du vin de la fureur et fais-la boire à toutes les nations vers lesquelles je t''envoie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
