document_id: ISA.43,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Saint d'Israël, sauveur de son peuple
  - type: text
    content: ' '
  - type: note
    content: crée v. 7,15 ; 40.26,28 ; 42.5 ; cf. Gn 1.1n  ; Dt 32.6,15. –  façonne v. 7,10,21 ; 22.11 ; 27.11 ; 37.26 ; 42.6n  ; 44.2,21,24 ; 45.7,11 ; 46.11 ; 49.5 ; 54.17n  ; cf. Gn 2.7n. –  N'aie pas peur 41.10+. –  j'ai assuré ta rédemption 35.9n  ; 41.14n. –  appelé (41.4n) par ton nom 41.9 ; cf. Gn 2.19n.
  - type: text
    content: 'Maintenant, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: celui qui te crée, ô Jacob,
  - type: text
    content: 'celui qui te façonne, ô Israël :'
  - type: text
    content: N'aie pas peur,
  - type: text
    content: car j'ai assuré ta rédemption.
  - type: text
    content: 'Je t''ai appelé par ton nom :'
  - type: text
    content: tu es à moi !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'mes témoins v. 9,12 ; 44.8 ; Ac 1.8. –  mon serviteur, celui que j''ai choisi  : en comprenant mon serviteur… comme une apposition au mot témoins , désignant également l''ensemble d''Israël (cf. 41.8+) ; autre traduction vous, et mon serviteur…  ; Syr a lu mes serviteurs. –  choisi  : cf. 42.1n. –  c''est moi  : voir 41.4n  ; cf. Jn 8.28. –  Dieu  : hébreu ’El , de même au v. 12 ; cf. 40.18n  ; Gn 21.33n.'
  - type: text
    content: Vous êtes mes témoins,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: mon serviteur, celui que j'ai choisi,
  - type: text
    content: afin que vous sachiez,
  - type: text
    content: que vous me croyiez
  - type: text
    content: 'et que vous compreniez que c''est moi :'
  - type: text
    content: avant moi aucun Dieu n'a été façonné,
  - type: text
    content: et après moi il n'y en aura pas.
  '11':
  - type: text
    content: ' '
  - type: note
    content: C'est moi, moi seul… v. 25 ; 48.15 ; 51.12 ; Dt 32.39 ; Os 12.10. –  hors de moi (44.6+) il n'y a pas de sauveur 45.21.
  - type: text
    content: 'C''est moi, moi seul, qui suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: hors de moi il n'y a pas de sauveur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'annoncé 41.22+. –  dit  : litt. fait entendre . –  un étranger  : il faut sans doute comprendre un dieu étranger  ; cf. Jr 2.25 ; Dt 32.16 ; Ps 44.21. –  mes témoins v. 10+.'
  - type: text
    content: C'est moi qui ai annoncé, sauvé et dit,
  - type: text
    content: ce n'est pas un étranger parmi vous ;
  - type: text
    content: vous êtes donc mes témoins,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: c'est moi qui suis Dieu.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Depuis ce jour  : litt. dès le jour , ce qui pourrait aussi signifier dès aujourd''hui, désormais  ; LXX depuis le commencement  ; certains modifient le texte hébreu traditionnel pour lire depuis toujours , ou depuis toujours et jusqu''à aujourd''hui . –  c''est moi  : cf. 41.4n. –  personne ne délivre… Dt 32.29 ; Jb 10.7 ; 11.10 ; 23.13.'
  - type: text
    content: Depuis ce jour c'est moi,
  - type: text
    content: et personne ne délivre de ma main ;
  - type: text
    content: 'j''agirai : qui s''y opposera ?'
  - type: heading
    content: Un nouveau chemin dans le désert
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'votre rédempteur 41.14+. –  Saint d''Israël 1.4+. –  quelqu''un  : sous-entendu dans le texte ; peut-être Cyrus (44.28n). On pourrait aussi suppléer un complément plus général, par exemple une expédition. –  Je les ferai couler…  : texte obscur et traduction conjecturale ; certains modifient légèrement le texte pour comprendre je ferai tomber tous les verrous, et les Chaldéens (23.13n) se lamenteront à grands cris.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'votre rédempteur, le Saint d''Israël :'
  - type: text
    content: C'est pour vous que j'ai envoyé quelqu'un contre Babylone.
  - type: text
    content: Je les ferai couler, tous ces fuyards,
  - type: text
    content: ces Chaldéens, dans les vaisseaux de leur triomphe.
  '15':
  - type: text
    content: ' '
  - type: note
    content: votre Saint v. 14. –  créateur v. 1+. –  roi 41.21+.
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Saint,'
  - type: text
    content: le créateur d'Israël, votre roi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'route dans la mer  : cf. v. 2 ; 51.10 ; Ex 14.21s.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui trace une route dans la mer
  - type: text
    content: et un sentier dans les eaux puissantes,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'qui met en campagne  : litt. qui fait sortir  ; cf. 37.9n  ; 40.26 ; 42.13. –  chars / chevaux…  : cf. Ex 14.23–15.10. –  tous ensemble  : selon une lecture traditionnelle, cette formule (voir 1.28n) pourrait aussi se rattacher à ce qui suit  : tous ensemble ils se couchent… –  mèche 42.3.'
  - type: text
    content: qui met en campagne des chars et des chevaux,
  - type: text
    content: une armée, de vaillants guerriers, tous ensemble.
  - type: text
    content: Ils se couchent,
  - type: text
    content: ils ne se relèvent plus,
  - type: text
    content: ils se sont éteints,
  - type: text
    content: ils se sont consumés comme une mèche.
  '18':
  - type: text
    content: ' '
  - type: note
    content: le passé 41.22+ ; cf. 46.9 ; 65.17 ; voir aussi Jr 23.7s.
  - type: text
    content: Ne vous rappelez pas le passé,
  - type: text
    content: et ne considérez plus ce qui est ancien.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'du nouveau  : cf. 2Co 5.17 ; Ap 21.5. –  germe 42.9. –  savez-vous pas  : autre traduction reconnaîtrez-vous pas . –  chemin / désert 40.3+. –  des fleuves… 41.18+ ; un ms de Qumrân a ici des sentiers.'
  - type: text
    content: Je fais du nouveau,
  - type: text
    content: dès maintenant cela germe ;
  - type: text
    content: ne le savez-vous pas ?
  - type: text
    content: Je mettrai un chemin dans le désert
  - type: text
    content: et des fleuves dans la terre aride.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 66.12. –  Si tu traverses les eaux  : cf. v. 16 ; Ex 14. –  si tu passes  : sous-entendu dans le texte. –  dans le feu 48.10 ; cf. Nb 11.1-3 ; 1Co 3.15. –  dévoreront 42.25.'
  - type: text
    content: Si tu traverses les eaux,
  - type: text
    content: je serai avec toi ;
  - type: text
    content: si tu passes les fleuves,
  - type: text
    content: ils ne t'emporteront pas ;
  - type: text
    content: si tu marches dans le feu,
  - type: text
    content: tu ne te brûleras pas,
  - type: text
    content: et les flammes ne te dévoreront pas.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Les animaux sauvages  : litt. l''animal de la campagne (ou des champs ), cf. Gn 3.14n. –  chacals / autruches 34.13. –  eau / désert 35.6 ; 48.21+. –  fleuves v. 19n. –  choisi 42.1.'
  - type: text
    content: Les animaux sauvages me glorifieront,
  - type: text
    content: les chacals comme les autruches,
  - type: text
    content: car je mets de l'eau dans le désert,
  - type: text
    content: des fleuves dans la terre aride,
  - type: text
    content: pour faire boire mon peuple, celui que j'ai choisi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: façonné v. 1+. –  dira (litt. racontera ) ma louange 1P 2.9.
  - type: text
    content: Le peuple que je me suis façonné
  - type: text
    content: dira ma louange.
  - type: heading
    content: Le Seigneur fait un procès à son peuple
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'as invoqué  : certains entendent ici ce verbe (litt. appeler ) au sens d''inviter à un repas (cf. 1R 1.9s,19), comme si Israël avait voulu faire de Dieu son obligé en lui offrant le culte du temple (cf. 1.11-15 ; Ml 3.14 ; Ps 50.7ss).'
  - type: text
    content: Ce n'est pas moi que tu as invoqué, Jacob !
  - type: text
    content: Tu t'es fatigué de moi, Israël !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 6.20. –  le mouton ou la chèvre  : c.-à-d. la tête de petit bétail. –  astreint à un service  : même forme verbale au v. 24 astreint à l''esclavage . –  l''encens Ex 30.34n.'
  - type: text
    content: Tu ne m'as pas offert le mouton ou la chèvre de tes holocaustes.
  - type: text
    content: Tes sacrifices n'étaient pas à ma gloire ;
  - type: text
    content: je ne t'ai pas astreint à un service d'offrandes,
  - type: text
    content: et je ne t'ai pas fatigué pour de l'encens.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'rassasié  : litt. abreuvé , cf. Jr 31.14n. –  tu m''as fatigué ou tu m''as lassé.'
  - type: text
    content: Tu n'as pas acheté pour moi à prix d'argent du roseau aromatique
  - type: text
    content: et tu ne m'as pas rassasié de la graisse de tes sacrifices ;
  - type: text
    content: mais tu m'as astreint à l'esclavage par tes péchés,
  - type: text
    content: tu m'as fatigué par tes fautes.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'C''est moi… v. 11+ ; 41.4n. –  de moi-même  : autre traduction à cause de moi  ; cf. 42.21 ; 48.9. –  transgressions  : le terme hébreu vient du verbe traduit par se révolter au v. 27.'
  - type: text
    content: C'est moi, moi seul, qui de moi-même efface tes transgressions ;
  - type: text
    content: je ne me souviendrai plus de tes péchés.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Rappelle-toi à mon souvenir  : litt. fais-moi souvenir ou évoque-moi  ; même verbe au v. 25. –  parle  : litt. raconte. – Voir justice.'
  - type: text
    content: Rappelle-toi à mon souvenir, entrons ensemble en jugement,
  - type: text
    content: parle toi-même, pour te justifier.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Ton premier père  : Jacob (Gn 25.26 ; 27.36 ; Jr 9.3 ; Os 12.3s) ; cf. 48.8. –  tes interprètes  : vraisemblablement les prêtres et les prophètes.'
  - type: text
    content: Ton premier père a péché,
  - type: text
    content: et tes interprètes se sont révoltés contre moi.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai profané  : cf. 23.9 ; 47.6 ; 53.5n  ; 56.2 ; Ez 28.16 ; Ps 89.35-40. –  princes (ou chefs ) du sanctuaire  : cf. 1Ch 24.5. –  anathème 34.2+ ; Jr 25.9.'
  - type: text
    content: J'ai profané les princes du sanctuaire
  - type: text
    content: j'ai livré Jacob à l'anathème,
  - type: text
    content: Israël aux injures.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 45.14 ; 52.3. –  Saint d''Israël 1.4+. –  Sauveur v. 11 ; 12.2 ; 17.10 ; 45.15,21 ; 49.26 ; 60.16 ; 62.11 ; 63.8 ; Ex 15.2 ; Jr 3.23 ; 14.8 ; Za 9.16 ; Ps 25.5 ; 51.16 ; 65.6 ; 79.9 ; 85.5 ; 106.21 ; 118.14 ; 1Tm 1.1. –  je donne…  : probablement au conquérant perse : c''est Cambyse qui fera la conquête de l''Egypte en 525 av. J.-C. –  rançon Ex 21.30n  ; Nb 35.31ns. –  Koush ou la Nubie  ; cf. 11.11n  ; 18.1n  ; Gn 2.13n. –  Seba Gn 10.7n, région correspondant vraisemblablement au nord du Soudan.'
  - type: text
    content: 'Car je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu,'
  - type: text
    content: le Saint d'Israël, ton Sauveur ;
  - type: text
    content: je donne l'Egypte en rançon pour toi,
  - type: text
    content: Koush et Seba à ta place.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'glorifié  : autres traductions honoré, considéré.'
  - type: text
    content: Du fait que tu as du prix à mes yeux,
  - type: text
    content: du fait que tu es glorifié et que je t'aime,
  - type: text
    content: je donne des hommes à ta place
  - type: text
    content: et des peuples pour ta vie.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'N''aie pas peur / je suis avec toi 41.10+ ; Jr 46.28. –  orient / occident  : cf. 41.9 ; 49.12 ; Za 8.7 ; Ps 107.3 ; Jn 11.52. –  je te rassemblerai 40.11.'
  - type: text
    content: N'aie pas peur,
  - type: text
    content: car je suis avec toi ;
  - type: text
    content: de l'orient je ramènerai ta descendance
  - type: text
    content: et de l'occident je te rassemblerai.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Fais venir  : autre traduction ramène . –  des extrémités  : litt. de l''extrémité.'
  - type: text
    content: 'Je dirai au nord : Donne !'
  - type: text
    content: 'et au sud : Ne retiens pas !'
  - type: text
    content: Fais venir mes fils de loin
  - type: text
    content: et mes filles des extrémités de la terre,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'de mon nom  : autre traduction par mon nom . –  pour ma gloire  : cf. Jn 11.4 ; 17 ; Ep 1.6,12,14. –  créé / façonné v. 1+. –  fait 17.7 ; 27.11 ; 37.16 ; 44.2 ; 51.13 ; 54.5 ; cf. Gn 1.7,16 ; 2.3,4 ; Dt 32.6.'
  - type: text
    content: quiconque est appelé de mon nom,
  - type: text
    content: et que pour ma gloire j'ai créé,
  - type: text
    content: façonné et fait.
  - type: heading
    content: Hors le Seigneur, pas de sauveur
  '8':
  - type: text
    content: ' '
  - type: note
    content: 42.18+.
  - type: text
    content: Qu'on fasse sortir le peuple qui est aveugle
  - type: text
    content: bien qu'il ait des yeux,
  - type: text
    content: et ceux qui sont sourds
  - type: text
    content: bien qu'ils aient des oreilles.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les nations se rassemblent 41.1+. –  annoncé / ce qui s''est passé 41.22+. –  témoins  : cf. v. 10. –  se justifier  : autre traduction prouver leur innocence  ; cf. 43.26 ; 45.25 ; 50.8s.'
  - type: text
    content: Que toutes les nations se rassemblent,
  - type: text
    content: que les peuples s'amassent !
  - type: text
    content: Qui d'entre eux a annoncé cela ?
  - type: text
    content: Qui d'entre eux nous avait appris ce qui s'est passé ?
  - type: text
    content: Qu'ils produisent leurs témoins pour se justifier !
  - type: text
    content: 'Qu''on les entende pour pouvoir dire : C''est vrai !'
