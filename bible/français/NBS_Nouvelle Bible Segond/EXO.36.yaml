    marker-yv: yv-n
  - type: text
    text: 'On fit le voile de pourpre violette et rouge, d''écarlate et de fin lin retors, avec des keroubim ; c''était un ouvrage d''artisan. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'On lui fit quatre colonnes d''acacia ; on les couvrit d''or, on leur mit des crochets d''or ; on fondit pour elles quatre socles d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'On fit pour l''entrée de la tente un rideau de pourpre violette et rouge, d''écarlate et de fin lin retors ; c''était un ouvrage de brodeur. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: On fit ses cinq colonnes et leurs crochets, on couvrit d'or leurs chapiteaux et leurs tringles ; leurs cinq socles étaient de bronze.
