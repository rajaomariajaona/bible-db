document_id: EXO.36,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'tous les hommes habiles  : litt. tout homme sage de cœur , cf. 35.10n.'
  - type: text
    content: 'Betsaléel, Oholiab et tous les hommes habiles, en qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait mis de la sagesse et de l''intelligence pour qu''ils sachent faire tous les travaux pour le service du sanctuaire, se mirent au travail exactement comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné.'
  '10':
  - type: note
    content: 'LXX omet les v. 10-33 ; voir aussi v. 8n. –  On attacha  : litt. il attacha, de même dans la suite, jusqu''à la fin du chapitre ; le singulier pourrait se rapporter à Betsaléel (37.1) ou à Moïse (cf. chap. 40).'
  - type: text
    content: 'On attacha cinq de ces toiles l''une à l''autre ; on attacha les cinq autres toiles l''une à l''autre. '
  '11':
  - type: text
    content: 'On fit des lacets de pourpre violette au bord de la toile à l''extrémité du premier assemblage ; on fit de même au bord de la toile à l''extrémité du second assemblage. '
  '12':
  - type: text
    content: 'On fit cinquante lacets à la première toile ; on fit cinquante lacets au bord de la toile à l''extrémité du second assemblage ; ces lacets correspondaient les uns aux autres. '
  '13':
  - type: note
    content: 26.6n.
  - type: text
    content: On fit cinquante agrafes d'or, et on attacha les toiles l'une à l'autre avec ces agrafes. Ainsi la Demeure forma un tout.
  '14':
  - type: text
    content: 'On fit des toiles de poil de chèvre qui constituaient une tente au-dessus de la Demeure ; on fit onze toiles. '
  '15':
  - type: note
    content: 'trente coudées  : environ 13,50 m ; quatre coudées  : environ 1,80 m.'
  - type: text
    content: 'La longueur de chaque toile était de trente coudées, la largeur de chaque toile était de quatre coudées ; la mesure était la même pour les onze toiles. '
  '16':
  - type: text
    content: 'On attacha séparément cinq de ces toiles, et les six autres toiles séparément. '
  '17':
  - type: text
    content: 'On fit cinquante lacets au bord de la toile à l''extrémité d''un assemblage, et on fit cinquante lacets au bord de la toile du second assemblage. '
  '18':
  - type: note
    content: 26.11n.
  - type: text
    content: 'On fit cinquante agrafes de bronze, pour assembler la tente, afin qu''elle forme un tout. '
  '19':
  - type: note
    content: dauphin 25.5n.
  - type: text
    content: On fit pour la tente une couverture en peau de bélier teinte en rouge, et une couverture en peau de dauphin par-dessus.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 's''appliquer au travail  : litt. à s''approcher du travail  ; cf. 12.48n. – Un programme pour la fête babylonienne du nouvel an (voir aussi Lv 16.16n) comporte les prescriptions suivantes (190-195) : « (Le prêtre) appellera un ouvrier en métaux, il lui donnera des pierres précieuses et de l''or du trésor du dieu Mardouk pour faire deux images pour les cérémonies du sixième jour (du mois de Nisannou). Il appellera un menuisier et lui donnera du bois de cèdre et de tamaris. Il appellera un orfèvre et lui donnera de l''or. »'
  - type: text
    content: 'Moïse appela Betsaléel, Oholiab et tous les hommes habiles dans le cœur desquels le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait mis de l''intelligence, tous ceux dont le cœur était disposé à s''appliquer au travail pour le faire. '
  '20':
  - type: text
    content: 'On fit les planches pour la Demeure ; elles étaient en bois d''acacia, placées debout. '
  '21':
  - type: note
    content: 'dix coudées  : environ 4,50 m ; une coudée et demie  : environ 70 cm.'
  - type: text
    content: 'La longueur d''une planche était de dix coudées et la largeur de chaque planche était d''une coudée et demie. '
  '22':
  - type: text
    content: 'Il y avait pour chaque planche deux tenons, parallèles l''un à l''autre ; on fit de même pour toutes les planches de la Demeure. '
  '23':
  - type: text
    content: 'On fit vingt planches en direction du midi, au sud, pour la Demeure. '
  '24':
  - type: text
    content: 'On fit quarante socles d''argent pour les placer sous les vingt planches, deux socles sous chaque planche, pour ses deux tenons. '
  '25':
  - type: text
    content: 'On fit vingt planches pour le deuxième côté de la Demeure, en direction du nord, '
  '26':
  - type: text
    content: 'et leurs quarante socles d''argent, deux socles sous chaque planche. '
  '27':
  - type: text
    content: 'On fit six planches pour le fond de la Demeure, vers l''ouest. '
  '28':
  - type: text
    content: 'On fit deux planches pour les angles de la Demeure, dans le fond ; '
  '29':
  - type: text
    content: 'elles étaient jumelées depuis le bas, et bien liées ensemble à leur sommet par un seul anneau ; on fit de même pour les deux qui étaient placées aux deux coins. '
  '3':
  - type: note
    content: 'Ils reçurent…  : litt. ils prirent de devant Moïse tout le prélèvement  ; cf. 25.2+. –  offrandes  : voir sacrifices.'
  - type: text
    content: 'Ils reçurent de Moïse tout le prélèvement que les Israélites avaient apporté afin de faire le travail pour le service du sanctuaire. Chaque matin, on lui apportait encore des offrandes volontaires. '
  '30':
  - type: text
    content: 'Il y avait ainsi huit planches, avec leurs socles d''argent, soit seize socles, deux socles sous chaque planche. '
  '31':
  - type: note
    content: 'On fit  : litt. il fit. –  traverses 26.26n.'
  - type: text
    content: 'On fit cinq traverses en bois d''acacia pour les planches d''un côté de la Demeure, '
  '32':
  - type: text
    content: 'cinq traverses pour les planches de l''autre côté de la Demeure et cinq traverses pour les planches du côté de la Demeure qui formait le fond, vers l''ouest ; '
  '33':
  - type: text
    content: 'on fit la traverse centrale pour aller au milieu des planches, d''une extrémité à l''autre. '
  '34':
  - type: text
    content: On couvrit d'or les planches, on fit d'or leurs anneaux pour recevoir les traverses, et on couvrit d'or les traverses.
  '35':
  - type: text
    content: ' '
  - type: note
    content: voile 26.31+.
  - type: text
    content: 'On fit le voile de pourpre violette et rouge, d''écarlate et de fin lin retors, avec des keroubim ; c''était un ouvrage d''artisan. '
  '36':
  - type: text
    content: 'On lui fit quatre colonnes d''acacia ; on les couvrit d''or, on leur mit des crochets d''or ; on fondit pour elles quatre socles d''argent. '
  '37':
  - type: text
    content: 'On fit pour l''entrée de la tente un rideau de pourpre violette et rouge, d''écarlate et de fin lin retors ; c''était un ouvrage de brodeur. '
  '38':
  - type: text
    content: On fit ses cinq colonnes et leurs crochets, on couvrit d'or leurs chapiteaux et leurs tringles ; leurs cinq socles étaient de bronze.
  '4':
  - type: text
    content: 'Alors les hommes habiles qui faisaient tous les travaux pour le sanctuaire quittèrent chacun le travail qu''il faisait. '
  '5':
  - type: note
    content: 1Ch 29.14-18.
  - type: text
    content: 'Ils vinrent dire à Moïse : Le peuple apporte beaucoup plus qu''il ne faut pour faire le travail que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné de faire. '
  '6':
  - type: note
    content: diffuser… une proclamation Esd 1.1n.
  - type: text
    content: 'Moïse donna l''ordre de diffuser dans le camp une proclamation : Que personne, homme ou femme, ne travaille plus pour le prélèvement du sanctuaire ! On empêcha ainsi le peuple d''apporter davantage. '
  '7':
  - type: note
    content: Les objets préparés et le travail traduisent un même mot hébreu.
  - type: text
    content: Les objets préparés suffisaient amplement pour tout le travail à faire.
  - type: heading
    content: La demeure sacrée
  '8':
  - type: text
    content: ' '
  - type: note
    content: 26.1-30. A partir de la deuxième partie du v. LXX poursuit avec le texte de 39.1n-31 ; voir ci-après « La réalisation de la Demeure dans la Bible grecque ».
  - type: text
    content: 'Tous les hommes habiles qui faisaient le travail firent la Demeure avec dix toiles de fin lin retors, de pourpre violette et rouge et d''écarlate, avec des keroubim ; c''était un ouvrage d''artisan. '
  '9':
  - type: note
    content: 'vingt-huit coudées  : environ 13 m ; quatre coudées  : environ 1,80 m ; voir mesures.'
  - type: text
    content: 'La longueur de chaque toile était de vingt-huit coudées, la largeur de chaque toile était de quatre coudées ; la mesure était la même pour toutes les toiles. '
