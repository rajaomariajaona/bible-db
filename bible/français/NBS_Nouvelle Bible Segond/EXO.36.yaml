document_id: EXO.36
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tous les hommes habiles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tout homme sage de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 35.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Betsaléel, Oholiab et tous les hommes habiles, en qui le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait mis de la sagesse et de l''intelligence pour qu''ils sachent faire tous les travaux pour le service du sanctuaire, se mirent au travail exactement comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'appliquer au travail
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à s'approcher du travail
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 12.48
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – Un programme pour la fête babylonienne du nouvel an (voir aussi Lv 16.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') comporte les prescriptions suivantes (190-195) : « (Le prêtre) appellera un ouvrier en métaux, il lui donnera des pierres précieuses et de l''or du trésor du dieu Mardouk pour faire deux images pour les cérémonies du sixième jour (du mois de Nisannou). Il appellera un menuisier et lui donnera du bois de cèdre et de tamaris. Il appellera un orfèvre et lui donnera de l''or. »'
    marker-yv: yv-n
  - type: text
    text: 'Moïse appela Betsaléel, Oholiab et tous les hommes habiles dans le cœur desquels le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait mis de l''intelligence, tous ceux dont le cœur était disposé à s''appliquer au travail pour le faire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils reçurent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils prirent de devant Moïse tout le prélèvement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 25.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: offrandes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils reçurent de Moïse tout le prélèvement que les Israélites avaient apporté afin de faire le travail pour le service du sanctuaire. Chaque matin, on lui apportait encore des offrandes volontaires. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors les hommes habiles qui faisaient tous les travaux pour le sanctuaire quittèrent chacun le travail qu''il faisait. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Ch 29.14-18.
    marker-yv: yv-n
  - type: text
    text: 'Ils vinrent dire à Moïse : Le peuple apporte beaucoup plus qu''il ne faut pour faire le travail que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné de faire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'diffuser… une proclamation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Esd 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse donna l''ordre de diffuser dans le camp une proclamation : Que personne, homme ou femme, ne travaille plus pour le prélèvement du sanctuaire ! On empêcha ainsi le peuple d''apporter davantage. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les objets préparés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le travail '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: traduisent un même mot hébreu.
    marker-yv: yv-n
  - type: text
    text: Les objets préparés suffisaient amplement pour tout le travail à faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La demeure sacrée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.1-30. A partir de la deuxième partie du v. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' poursuit avec le texte de 39.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: -31 ; voir ci-après « La réalisation de la Demeure dans la Bible grecque ».
    marker-yv: yv-n
  - type: text
    text: 'Tous les hommes habiles qui faisaient le travail firent la Demeure avec dix toiles de fin lin retors, de pourpre violette et rouge et d''écarlate, avec des keroubim ; c''était un ouvrage d''artisan. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt-huit coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 13 m ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 1,80 m ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La longueur de chaque toile était de vingt-huit coudées, la largeur de chaque toile était de quatre coudées ; la mesure était la même pour toutes les toiles. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: LXX omet les v. 10-33 ; voir aussi v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On attacha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il attacha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite, jusqu''à la fin du chapitre ; le singulier pourrait se rapporter à Betsaléel (37.1) ou à Moïse (cf. chap. 40).'
    marker-yv: yv-n
  - type: text
    text: 'On attacha cinq de ces toiles l''une à l''autre ; on attacha les cinq autres toiles l''une à l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On fit des lacets de pourpre violette au bord de la toile à l''extrémité du premier assemblage ; on fit de même au bord de la toile à l''extrémité du second assemblage. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On fit cinquante lacets à la première toile ; on fit cinquante lacets au bord de la toile à l''extrémité du second assemblage ; ces lacets correspondaient les uns aux autres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: On fit cinquante agrafes d'or, et on attacha les toiles l'une à l'autre avec ces agrafes. Ainsi la Demeure forma un tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On fit des toiles de poil de chèvre qui constituaient une tente au-dessus de la Demeure ; on fit onze toiles. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trente coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 13,50 m ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 1,80 m.'
    marker-yv: yv-n
  - type: text
    text: 'La longueur de chaque toile était de trente coudées, la largeur de chaque toile était de quatre coudées ; la mesure était la même pour les onze toiles. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On attacha séparément cinq de ces toiles, et les six autres toiles séparément. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On fit cinquante lacets au bord de la toile à l''extrémité d''un assemblage, et on fit cinquante lacets au bord de la toile du second assemblage. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On fit cinquante agrafes de bronze, pour assembler la tente, afin qu''elle forme un tout. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dauphin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: On fit pour la tente une couverture en peau de bélier teinte en rouge, et une couverture en peau de dauphin par-dessus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On fit les planches pour la Demeure ; elles étaient en bois d''acacia, placées debout. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dix coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 4,50 m ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une coudée et demie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 70 cm.'
    marker-yv: yv-n
  - type: text
    text: 'La longueur d''une planche était de dix coudées et la largeur de chaque planche était d''une coudée et demie. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il y avait pour chaque planche deux tenons, parallèles l''un à l''autre ; on fit de même pour toutes les planches de la Demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On fit vingt planches en direction du midi, au sud, pour la Demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On fit quarante socles d''argent pour les placer sous les vingt planches, deux socles sous chaque planche, pour ses deux tenons. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'On fit vingt planches pour le deuxième côté de la Demeure, en direction du nord, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et leurs quarante socles d''argent, deux socles sous chaque planche. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'On fit six planches pour le fond de la Demeure, vers l''ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'On fit deux planches pour les angles de la Demeure, dans le fond ; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'elles étaient jumelées depuis le bas, et bien liées ensemble à leur sommet par un seul anneau ; on fit de même pour les deux qui étaient placées aux deux coins. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il y avait ainsi huit planches, avec leurs socles d''argent, soit seize socles, deux socles sous chaque planche. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'traverses '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On fit cinq traverses en bois d''acacia pour les planches d''un côté de la Demeure, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'cinq traverses pour les planches de l''autre côté de la Demeure et cinq traverses pour les planches du côté de la Demeure qui formait le fond, vers l''ouest ; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'on fit la traverse centrale pour aller au milieu des planches, d''une extrémité à l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: On couvrit d'or les planches, on fit d'or leurs anneaux pour recevoir les traverses, et on couvrit d'or les traverses.
