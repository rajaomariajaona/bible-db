      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le poteau cultuel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 7 ; cf. Jg 3.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
