    marker-yv: yv-n
  - type: text
    text: 'Le roi envoya des émissaires pour qu''ils rassemblent auprès de lui tous les anciens de Juda et de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A la place des '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', quelques mss évoquent avec 2Ch 34.30 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il leur lut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il lut à leurs oreilles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 18.19.'
    marker-yv: yv-n
  - type: text
    text: 'Puis le roi monta à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', avec tous les hommes de Juda et tous les habitants de Jérusalem, les prêtres, les prophètes et tout le peuple, du plus petit au plus grand. Il leur lut toutes les paroles du livre de l''alliance qu''on avait trouvé dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jos 24 ; Né 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il conclut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il coupa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. le rite pratiqué par Abram en Gn 15.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de tout son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 25 ; Dt 6.5 ; Ez 21.12 ; So 3.14 ; Ps 119.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: adhéra…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se tint debout dans '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Dt 29.14.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi se tenait sur l''estrade et, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', il conclut l''alliance en s''engageant à suivre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et à observer ses commandements, ses préceptes et ses prescriptions de tout son cœur et de toute son âme, afin de réaliser les paroles de cette alliance, écrites dans ce livre ; et tout le peuple adhéra à l''alliance.'
