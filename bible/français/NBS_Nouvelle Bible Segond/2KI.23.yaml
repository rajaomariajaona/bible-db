      - type: text
        text: les terrains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions possibles '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jardins, vergers, terrasses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-El '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Gn 28.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : sanctuaire d''Israël où Jéroboam I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' avait érigé un de ses veaux (1R 12.29). C''est là que, selon 17.28, les Assyriens auraient chargé un prêtre israélite, revenu tout exprès d''exil, d''instruire les populations installées sur place. Sur l''intervention de Josias à Beth-El, voir v. 15.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi ordonna à Hilqiya, le grand prêtre, aux prêtres de second rang et aux gardiens du seuil de sortir du temple du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' tous les objets qui avaient été faits pour le Baal, pour l''Ashéra et pour toute l''armée du ciel ; il les brûla hors de Jérusalem, dans les terrains du Cédron, et il en fit porter la poussière à Beth-El. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: desservants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Os 10.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; So 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Comme l''hébreu utilise ici le verbe qui, au v. 11, sert pour signifier la désaffection des statues des chevaux du soleil, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a compris qu''il s''agissait, ici comme au v. 10, d''un objet de culte que Josias détruit entièrement par le feu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour offrir…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte incertain ; autres possibilités '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: alors qu'on offrait de l'encens ; et qui offraient de l'encens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au soleil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Shémesh.
    marker-yv: yv-n
  - type: text
    text: 'Il supprima les desservants que les rois de Juda avaient établis pour offrir de l''encens dans les hauts lieux des villes de Juda et des environs de Jérusalem, et ceux qui offraient de l''encens au Baal, au soleil, à la lune, aux constellations du zodiaque et à toute l''armée du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de la maison du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent de certains mss hébreux. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la tombe des gens du peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' du peuple'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : peut-être une fosse commune considérée comme impure.'
    marker-yv: yv-n
  - type: text
    text: 'Il sortit de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le poteau cultuel (l''ashéra), qu''il emporta hors de Jérusalem, vers l''oued Cédron ; il le brûla dans le Cédron et le réduisit en poussière. Il en jeta la poussière sur la tombe des gens du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les maisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prostitués sacrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: consacrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Gn 38.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; 1R 14.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des robes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des housses pour le poteau cultuel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il démolit les maisons des prostitués sacrés qui étaient dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', maisons où les femmes tissaient des robes pour l''Ashéra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dt 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il rendit impurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il profana
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un ms hébreu, certains mss de LXX et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' ont lu un verbe au pluriel ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils rendirent impurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : s''il s''agit de la ville de Guéba située à une dizaine de kilomètres au nord-est de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' (correspondant au site d''Et-Tell ?), la mention de cette localité pour indiquer la limite nord du territoire où s''exerce le pouvoir de Josias signifie que ce dernier, mettant à profit le déclin de l''empire assyrien (prise de Ninive en 612 av. J.-C.), a recouvré une partie de la province de Samarie, ce qui explique ses interventions à Beth-El et dans toute la Samarie (v. 15-20). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et à gauche…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à gauche…
    marker-yv: yv-n
  - type: text
    text: 'Il fit venir tous les prêtres des villes de Juda ; il rendit impurs les hauts lieux où les prêtres offraient de l''encens, depuis Guéba jusqu''à Bersabée ; il démolit les hauts lieux des portes : à l''entrée de la porte de Josué, chef de la ville, et à gauche de la porte de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils mangeaient…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les mesures prises par Josias ne visent pas à la précarisation des prêtres sacrifiant jusque-là en dehors de Jérusalem mais à la centralisation du culte.'
    marker-yv: yv-n
  - type: text
    text: 'Toutefois les prêtres des hauts lieux ne montaient pas à l''autel du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à Jérusalem, mais ils mangeaient des pains sans levain au milieu de leurs frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rendit impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le topheth qui est dans la vallée du Fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de Hinnom '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jr 7.31
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au Molek '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 18.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi rendit impur le topheth qui est dans la vallée du Fils de Hinnom, afin que personne ne fasse plus passer son fils ou sa fille par le feu au Molek. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il supprima
    - type: usfm
      marker: ft
      children:
      - type: text
