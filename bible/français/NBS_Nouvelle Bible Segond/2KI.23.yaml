  - type: text
    text: 'De plus, Josias élimina les spirites et les médiums, les teraphim, les idoles et toutes les horreurs qui se voyaient au pays de Juda et à Jérusalem, afin de réaliser les paroles de la loi écrites dans le livre que Hilqiya, le prêtre, avait trouvé dans la maison du '
