    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''année où fut découvert le rouleau dans le temple (22.3), ce qui sous-entend qu''il s''agit de l''application d''une des premières mesures prises par Josias, l''ordre dans lesquels les événements sont ici relatés n''étant pas forcément chronologique.'
    marker-yv: yv-n
  - type: text
