    text: Ses hommes le mirent sur un char pour l'emporter, mort, de Meguiddo à Jérusalem, où ils l'ensevelirent dans son tombeau. Le peuple du pays prit Joachaz, fils de Josias ; ils lui conférèrent l'onction et l'investirent de la royauté à la place de son père.
