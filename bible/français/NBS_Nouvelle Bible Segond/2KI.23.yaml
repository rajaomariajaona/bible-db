document_id: 2KI.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josias renouvelle l'alliance avec Dieu
  - type: heading
    content: 2Ch 34.29-32
  - type: text
    content: ' '
  - type: note
    content: 'envoya…  : autre traduction fit rassembler auprès de lui… (texte légèrement différent en 2Ch 34.29) ; certains modifient ici le texte hébreu traditionnel pour lire le roi envoya (des émissaires) et tous les anciens… se rassemblèrent auprès de lui.'
  - type: text
    content: 'Le roi envoya des émissaires pour qu''ils rassemblent auprès de lui tous les anciens de Juda et de Jérusalem. '
  '10':
  - type: note
    content: 'rendit impur  : cf. v. 8. –  le topheth qui est dans la vallée du Fils (autre lecture traditionnelle des Fils) de Hinnom Jr 7.31n. –  au Molek Lv 18.21n.'
  - type: text
    content: 'Le roi rendit impur le topheth qui est dans la vallée du Fils de Hinnom, afin que personne ne fasse plus passer son fils ou sa fille par le feu au Molek. '
  '11':
  - type: note
    content: 'Il supprima  : LXX précise il brûla entièrement. –  avaient consacrés…  : litt. avaient donnés au soleil (ou à Shémesh) ; cf. Dt 4.14 ; 17.3 ; Jr 8.2 ; Ez 8.16. –  la salle  : autre traduction l''office  ; sur ce terme, voir 1S 9.22 ; Jr 35.2ss ; 36.10ss,20s ; Ez 40.17+ ; Esd 8.29 ; 10.6 ; Né 10.38ss ; 13.4ss ; 1Ch 9.26,33 ; 23.28 ; 28.12 ; 2Ch 31.11. –  haut fonctionnaire 8.6n.'
  - type: text
    content: 'Il supprima de l''entrée de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' les chevaux que les rois de Juda avaient consacrés au soleil, près de la salle du haut fonctionnaire Netân-Mélek, qui se trouvait dans les annexes ; et il mit le feu aux chars du soleil. '
  '12':
  - type: note
    content: 'la chambre… à l''étage Jg 3.20n. Cette chambre est également mentionnée par un ms d''Es 38.8 trouvé à Qumrân, cf. 20.11n. –  en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. –  le Cédron  : litt. l''oued Cédron, cf. v. 6.'
  - type: text
    content: 'Le roi démolit les autels de la chambre d''Achaz, à l''étage, sur le toit en terrasse, autels que les rois de Juda avaient faits, ainsi que les autels que Manassé avait faits dans les deux cours de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Après les avoir brisés et enlevés de là, il en jeta la poussière dans le Cédron. '
  '13':
  - type: note
    content: 'les hauts lieux  : LXX a lu le mot hébreu signifiant la maison ou le temple. –  mont de la Destruction  : cf. Jr 51.25 ; on y voit souvent une déformation d''une autre formule (mont de l''Onction ou mont de l''Huile) désignant le mont des Oliviers ; cf. 1R 11.7.'
  - type: text
    content: 'Le roi rendit impurs les hauts lieux qui étaient en face de Jérusalem, au sud du mont de la Destruction, et que Salomon, roi d''Israël, avait bâtis pour Astarté, l''horreur des Sidoniens, pour Kemosh, l''horreur de Moab, et pour Milkom, l''abomination des Ammonites. '
  '14':
  - type: note
    content: 'remplit… d''ossements humains  : afin de les rendre impurs et définitivement inutilisables à des fins cultuelles. –  ces lieux  : litt. leurs lieux.'
  - type: text
    content: Il brisa les pierres levées, coupa les poteaux cultuels (les ashéras) et remplit ces lieux d'ossements humains.
  - type: heading
    content: Réformes religieuses sur le territoire d'Israël
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Le déclin de la puissance assyrienne permet à Josias d''étendre l''influence de Juda sur le territoire de l''ancien royaume du Nord. –  du haut lieu qu''avait fait Jéroboam…  : cf. 1R 12.25-33. –  qui avait fait pécher  : autre traduction par lequel il avait fait pécher . –  il démolit cet autel  : cf. 1R 13.3. –  il brûla le haut lieu  : comprenant le terme hébreu qui signifie haut lieu comme un adjectif qualifiant un autel élevé , LXX a traduit il en a brisé les pierres . –  le poteau cultuel (l''ashéra)  : voir Baal.'
  - type: text
    content: 'De même pour ce qui est de l''autel qui était à Beth-El et du haut lieu qu''avait fait Jéroboam, fils de Nebath, qui avait fait pécher Israël : il démolit cet autel et le haut lieu ; il brûla le haut lieu et le réduisit en poussière, et il brûla le poteau cultuel (l''ashéra).'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'dans la montagne  : LXX dans la ville . –  impur  : voir pur. –  proclamée par l''homme de Dieu 1R 13.3. LXX présente ici un texte plus long pour la fin du v.  : … la parole du Seigneur proclamée par l''homme de Dieu alors que Jéroboam était à l''autel lors de la fête. Se tournant, il (Josias) leva les yeux vers le tombeau de l''homme de Dieu qui avait proclamé ces paroles.'
  - type: text
    content: 'Josias se retourna et vit les tombes qui étaient là dans la montagne ; il fit prendre les ossements dans les tombes et les brûla sur l''autel ; il le rendit impur, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' proclamée par l''homme de Dieu ; c''étaient bien là les paroles qu''il avait proclamées. '
  '17':
  - type: note
    content: 'ce monument  : le mot hébreu correspondant désigne en Jr 31.21 un cairn ou un poteau indicateur, et en Ez 39.15 un signe permettant de localiser un cadavre non encore enseveli. –  C''est la tombe de l''homme de Dieu  : LXX lit c''est l''homme de Dieu. –  ces choses que tu as faites  : autre traduction ces paroles que tu as réalisées.'
  - type: text
    content: 'Il dit : Quel est ce monument que je vois ? Les gens de la ville lui répondirent : C''est la tombe de l''homme de Dieu qui est venu de Juda et qui a crié contre l''autel de Beth-El ces choses que tu as faites. '
  '18':
  - type: note
    content: 'venu de Samarie  : s''il faut voir dans ce prophète l''homme de 1R 13.11-32, le nom de Samarie n''est pas employé pour la ville qui n''existe pas encore sous Jéroboam, mais, comme au v. 19, au sens de la province assyrienne de Samarie, dont Josias s''est rendu maître en partie.'
  - type: text
    content: 'Il dit alors : Laissez-le ; que personne ne touche ses ossements ! On préserva ainsi ses ossements, ainsi que les ossements du prophète qui était venu de Samarie.'
  - type: heading
    content: 2Ch 34.6-7
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les maisons ou les temples . –  provoquant ainsi…  : litt. afin de contrarier (sous-entendu : Dieu) ; cf. 22.17n.'
  - type: text
    content: 'Josias supprima encore, dans les villes de Samarie, toutes les maisons des hauts lieux qu''avaient faites les rois d''Israël, provoquant ainsi la contrariété ; il leur fit exactement comme il avait fait à Beth-El. '
  '2':
  - type: note
    content: 'A la place des prophètes, quelques mss évoquent avec 2Ch 34.30 les lévites. –  Il leur lut  : litt. il lut à leurs oreilles  ; cf. Dt 18.19.'
  - type: text
    content: 'Puis le roi monta à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec tous les hommes de Juda et tous les habitants de Jérusalem, les prêtres, les prophètes et tout le peuple, du plus petit au plus grand. Il leur lut toutes les paroles du livre de l''alliance qu''on avait trouvé dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: Il sacrifia sur les autels tous les prêtres des hauts lieux qui s'y trouvaient, et il y brûla des ossements humains. Puis il revint à Jérusalem.
  - type: heading
    content: Célébration de la Pâque
  - type: heading
    content: 2Ch 35.1,18-19
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Pâque  : voir calendrier et fêtes. –  ce livre de l''alliance ou, selon un ms hébreu, LXX et Vg le livre de cette alliance.'
  - type: text
    content: 'Le roi donna cet ordre à tout le peuple : Célébrez la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, comme il est écrit dans ce livre de l''alliance. '
  '22':
  - type: note
    content: 'L''époque prémonarchique des juges est parfois présentée comme une période idéale, où YHWH gouverne directement Israël (cf. 1S 8). –  gouvernaient  : autre traduction jugeaient  ; le verbe est apparenté au terme traduit par juges, cf. Jg 2.16n  ; Rt 1.1n.'
  - type: text
    content: 'On n''avait pas célébré une telle Pâque depuis les jours où les juges gouvernaient Israël, pendant tous les jours des rois d''Israël et des rois de Juda. '
  '23':
  - type: note
    content: 'la dix-huitième année  : l''année où fut découvert le rouleau dans le temple (22.3), ce qui sous-entend qu''il s''agit de l''application d''une des premières mesures prises par Josias, l''ordre dans lesquels les événements sont ici relatés n''étant pas forcément chronologique.'
  - type: text
    content: 'C''est seulement la dix-huitième année du roi Josias qu''on célébra cette Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem.'
  - type: heading
    content: Conclusion sur le règne de Josias
  - type: heading
    content: Cf. 2Ch 35.20–36.1
  '24':
  - type: text
    content: ' '
  - type: note
    content: élimina Dt 13.6n.
  - type: text
    content: 'De plus, Josias élimina les spirites et les médiums, les teraphim, les idoles et toutes les horreurs qui se voyaient au pays de Juda et à Jérusalem, afin de réaliser les paroles de la loi écrites dans le livre que Hilqiya, le prêtre, avait trouvé dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: note
    content: 'Sur cette appréciation, voir l''introduction ♦. –  de tout son cœur, de toute son âme (cf. Gn 1.20n) : cf. v. 3+. –  selon toute la loi  : plusieurs mss lisent dans toute la loi.'
  - type: text
    content: 'Il n''y eut jamais avant lui de roi qui, comme lui, revînt au '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tout son cœur, de toute son âme et de toute sa force, selon toute la loi de Moïse ; et après lui, il ne s''en est jamais levé de semblable.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 24.3n.
  - type: text
    content: 'Toutefois le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne revint pas de sa grande colère, de la colère ardente dans laquelle il s''était mis contre Juda, à cause de tout ce que Manassé avait fait pour le contrarier. '
  '27':
  - type: note
    content: 'de ma vue  : litt. de ma face. –  la maison ou le temple. –  Là sera mon nom  : cf. 1R 8.16n,29.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : J''écarterai Juda de ma vue comme je l''ai fait pour Israël ; je rejetterai cette ville que j''avais choisie, Jérusalem, ainsi que la maison dont j''avais dit : « Là sera mon nom. » '
  '28':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: Le reste de l'histoire de Josias, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois de Juda.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Néko (610-595 av. J.-C.) : profitant de la chute de l''empire assyrien, il reconquit la Syrie jusqu''à l''Euphrate avant d''en être repoussé par Babylone. –  Le roi Josias  : LXX Josias . –  à sa rencontre  : autre traduction pour l''interpeller.'
  - type: text
    content: 'En ses jours, le pharaon Néko, roi d''Egypte, partit en campagne contre le roi d''Assyrie, vers l''Euphrate. Le roi Josias marcha à sa rencontre ; le pharaon le fit mettre à mort à Meguiddo dès qu''il le vit. '
  '3':
  - type: note
    content: 'Cf. Jos 24 ; Né 8. –  il conclut  : litt. il coupa  ; cf. le rite pratiqué par Abram en Gn 15.10. –  de tout son cœur…  : cf. v. 25 ; Dt 6.5 ; Ez 21.12 ; So 3.14 ; Ps 119.2. –  adhéra…  : litt. se tint debout dans l''alliance, cf. Dt 29.14.'
  - type: text
    content: 'Le roi se tenait sur l''estrade et, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il conclut l''alliance en s''engageant à suivre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à observer ses commandements, ses préceptes et ses prescriptions de tout son cœur et de toute son âme, afin de réaliser les paroles de cette alliance, écrites dans ce livre ; et tout le peuple adhéra à l''alliance.'
  - type: heading
    content: Réformes religieuses en Juda
  - type: heading
    content: 2Ch 34.3-5
  '30':
  - type: note
    content: 'dans son tombeau  : des mss de LXX précisent dans la Ville de David. –  Le peuple du pays  : cf. 21.24n. –  onction 1R 1.34n.'
  - type: text
    content: Ses hommes le mirent sur un char pour l'emporter, mort, de Meguiddo à Jérusalem, où ils l'ensevelirent dans son tombeau. Le peuple du pays prit Joachaz, fils de Josias ; ils lui conférèrent l'onction et l'investirent de la royauté à la place de son père.
  - type: heading
    content: Joachaz, roi de Juda
  - type: heading
    content: 2Ch 36.2-4
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Hamoutal ou Hamital , voir Jr 52.1n. –  Jérémie, de Libna  : à ne pas confondre avec le prophète d''Anatoth (Jr 1.1), Libna correspondant vraisemblablement au site actuel de Tell Bornat, à 7 km au nord de Lakish, cf. Jos 10.29.'
  - type: text
    content: 'Joachaz avait vingt-trois ans lorsqu''il devint roi ; il régna trois mois à Jérusalem. Le nom de sa mère était Hamoutal, fille de Jérémie, de Libna. '
  '32':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. 3.2n  ; 1R 11.6+. –  ses pères ou ses ancêtres.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avaient fait ses pères. '
  '33':
  - type: note
    content: 'l''enchaîna à Ribla…  : LXX l''exila à Deblatha au pays de Emath, pour qu''il ne règne plus à Jérusalem (cf. 2Ch 36.3n). –  Ribla, au pays de Hamath  : correspondant au site moderne de Tell Zarra''a, sur l''Oronte, à 34 km au sud de Homs. –  alors qu''il régnait  : autre lecture traditionnelle pour qu''il ne règne plus. –  une contribution  : le mot est habituellement traduit par amende (Ex 21.22 ; Dt 22.19). –  un talent (environ 34 kg ; voir mesures, poids et monnaies) : la plupart des mss de LXX portent cent talents (3,4 tonnes), d''autres dix.'
  - type: text
    content: 'Le pharaon Néko l''enchaîna à Ribla, au pays de Hamath, alors qu''il régnait à Jérusalem ; il imposa au pays une contribution de cent talents d''argent et d''un talent d''or. '
  '34':
  - type: note
    content: 'Eliaqim (Dieu m''a mis debout ou m''a suscité) / Joïaqim (YHWH m''a mis debout ou m''a suscité) : même si le sens du nom du roi reste pratiquement le même, le fait que ce soit le pharaon qui impose ce changement de nom signifie que désormais le roi de Juda doit se considérer comme un vassal de l''Egypte ; cf. 24.17. –  qui vint en Egypte…  : litt. il vint en Egypte et y mourut, il peut aussi bien s''agir du pharaon que de son prisonnier. LXX a lu avec 2Ch 36.4 il l''emmena en Egypte et il y mourut.'
  - type: text
    content: 'Le pharaon Néko investit de la royauté Eliaqim, fils de Josias, à la place de Josias, son père, et il changea son nom en Joïaqim. Il fit prisonnier Joachaz, qui vint en Egypte et y mourut. '
  '35':
  - type: note
    content: 'les ressources  : sous-entendu dans le texte. –  sur l''ordre  : litt. sur la bouche. –  le peuple du pays  : cf. 21.24n. –  selon sa fortune  : litt. selon son évaluation ou son estimation  ; cf. Lv 5.15n.'
  - type: text
    content: Joïaqim donna au pharaon l'argent et l'or ; il dut faire évaluer les ressources du pays pour donner cet argent, sur l'ordre du pharaon ; il contraignit le peuple du pays, chacun selon sa fortune, à donner l'argent et l'or pour le pharaon Néko.
  - type: heading
    content: Joïaqim, roi de Juda
  - type: heading
    content: 2Ch 36.5-8
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Zeboudda  : selon la lecture traditionnelle ; le texte hébreu suivi par Syr et Vg a lu Zevidda . –  Pedaya  : qui signifie YHWH a consolé . –  Rouma ( Hauteur ) : actuellement Khirbet Rouma à 9 km au nord de Nazareth.'
  - type: text
    content: 'Joïaqim avait vingt-cinq ans lorsqu''il devint roi ; il régna onze ans à Jérusalem. Le nom de sa mère était Zeboudda, fille de Pedaya, de Rouma. '
  '37':
  - type: note
    content: Cf. v. 32+.
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avaient fait ses pères.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'aux prêtres de second rang  : Tg au prêtre en second , cf. 25.18. –  gardiens du seuil  : cf. 12.10n. –  pour l''Ashéra  : autre traduction pour le poteau cultuel , de même au v. 7 ; cf. Jg 3.7n. Voir Baal. –  les terrains  : autres traductions possibles jardins, vergers, terrasses . –  Beth-El (cf. Gn 28.19n) : sanctuaire d''Israël où Jéroboam Ier avait érigé un de ses veaux (1R 12.29). C''est là que, selon 17.28, les Assyriens auraient chargé un prêtre israélite, revenu tout exprès d''exil, d''instruire les populations installées sur place. Sur l''intervention de Josias à Beth-El, voir v. 15.'
  - type: text
    content: 'Le roi ordonna à Hilqiya, le grand prêtre, aux prêtres de second rang et aux gardiens du seuil de sortir du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tous les objets qui avaient été faits pour le Baal, pour l''Ashéra et pour toute l''armée du ciel ; il les brûla hors de Jérusalem, dans les terrains du Cédron, et il en fit porter la poussière à Beth-El. '
  '5':
  - type: note
    content: 'desservants  : voir Os 10.5n  ; So 1.4n. Comme l''hébreu utilise ici le verbe qui, au v. 11, sert pour signifier la désaffection des statues des chevaux du soleil, LXX a compris qu''il s''agissait, ici comme au v. 10, d''un objet de culte que Josias détruit entièrement par le feu. –  pour offrir…  : texte incertain ; autres possibilités alors qu''on offrait de l''encens ; et qui offraient de l''encens. –  au soleil ou à Shémesh.'
  - type: text
    content: 'Il supprima les desservants que les rois de Juda avaient établis pour offrir de l''encens dans les hauts lieux des villes de Juda et des environs de Jérusalem, et ceux qui offraient de l''encens au Baal, au soleil, à la lune, aux constellations du zodiaque et à toute l''armée du ciel. '
  '6':
  - type: note
    content: 'de la maison du Seigneur  : texte absent de certains mss hébreux. –  la tombe des gens du peuple (litt. des fils du peuple) : peut-être une fosse commune considérée comme impure.'
  - type: text
    content: 'Il sortit de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' le poteau cultuel (l''ashéra), qu''il emporta hors de Jérusalem, vers l''oued Cédron ; il le brûla dans le Cédron et le réduisit en poussière. Il en jeta la poussière sur la tombe des gens du peuple. '
  '7':
  - type: note
    content: 'les maisons  : LXX la maison. –  prostitués sacrés  : litt. consacrés  ; Gn 38.21ns ; 1R 14.24n. –  des robes…  : autre traduction des housses pour le poteau cultuel  ; cf. v. 4n.'
  - type: text
    content: 'Il démolit les maisons des prostitués sacrés qui étaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', maisons où les femmes tissaient des robes pour l''Ashéra. '
  '8':
  - type: note
    content: 'Cf. Dt 12. –  il rendit impurs ou il profana  ; un ms hébreu, certains mss de LXX et Syr ont lu un verbe au pluriel (ils rendirent impurs) ; voir pur. –  Guéba  : s''il s''agit de la ville de Guéba située à une dizaine de kilomètres au nord-est de Samarie (correspondant au site d''Et-Tell ?), la mention de cette localité pour indiquer la limite nord du territoire où s''exerce le pouvoir de Josias signifie que ce dernier, mettant à profit le déclin de l''empire assyrien (prise de Ninive en 612 av. J.-C.), a recouvré une partie de la province de Samarie, ce qui explique ses interventions à Beth-El et dans toute la Samarie (v. 15-20). –  et à gauche…  : autre traduction à gauche…'
  - type: text
    content: 'Il fit venir tous les prêtres des villes de Juda ; il rendit impurs les hauts lieux où les prêtres offraient de l''encens, depuis Guéba jusqu''à Bersabée ; il démolit les hauts lieux des portes : à l''entrée de la porte de Josué, chef de la ville, et à gauche de la porte de la ville. '
  '9':
  - type: note
    content: 'ils mangeaient…  : les mesures prises par Josias ne visent pas à la précarisation des prêtres sacrifiant jusque-là en dehors de Jérusalem mais à la centralisation du culte.'
  - type: text
    content: 'Toutefois les prêtres des hauts lieux ne montaient pas à l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem, mais ils mangeaient des pains sans levain au milieu de leurs frères. '
