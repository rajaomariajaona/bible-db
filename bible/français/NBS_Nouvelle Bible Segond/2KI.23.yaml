  - type: text
    text: 'En ses jours, le pharaon Néko, roi d''Egypte, partit en campagne contre le roi d''Assyrie, vers l''Euphrate. Le roi Josias marcha à sa rencontre ; le pharaon le fit mettre à mort à Meguiddo dès qu''il le vit. '
