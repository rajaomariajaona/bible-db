document_id: LEV.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Purification de la femme accouchée
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '2':
  - type: note
    content: 'un garçon  : litt. un mâle, de même au v. 7. –  où elle est souillée…  : litt. de la souillure de ses règles  ; le terme correspondant à souillure est traduit par souillure menstruelle au v. 5 ; 15.19ss ; 18.19 ; Ez 18.6 ; 22.10 ; 36.17 ; il peut aussi s''appliquer à d''autres formes de souillure, cf. Lv 20.21n  ; Ez 7.19s ; Lm 1.8n  ; Esd 9.11n  ; 2Ch 29.5 ; voir aussi Nb 19.9n  ; Za 13.1 ; autre terme en Es 64.5n. –  règles  : terme apparenté en 15.33n  ; 20.18 ; il évoque aussi une souillure ou une impureté de sens plus général, en Es 30.22.'
  - type: text
    content: 'Dis aux Israélites : Lorsqu''une femme est enceinte et qu''elle met au monde un garçon, elle sera impure pendant sept jours ; elle sera impure comme les jours où elle est souillée par ses règles. '
  '3':
  - type: note
    content: 'Cf. 22.27 ; voir aussi Gn 17.12 ; Lc 1.59 ; 2.21 ; Jn 7.22n  ; Ph 3.5. –  l''enfant  : litt. la chair de son prépuce, cf. Gn 17.11n. – Voir circoncis.'
  - type: text
    content: 'Le huitième jour, l''enfant sera circoncis. '
  '4':
  - type: note
    content: 'Elle restera…  : litt. trente jours et trois jours elle restera dans les sangs de sa purification, même tournure au v. 5 ; cf. Lc 2.22. Il s''agit toujours de pureté rituelle et non morale ; la naissance d''un enfant (surtout d''un fils, d''où sans doute la différence entre les v. 3s et 5) était toujours considérée comme une bénédiction (Gn 1.28 ; Ps 127.3-5 ; Rt 4.11s). –  rien de sacré ou rien de consacré  ; voir saint.'
  - type: text
    content: 'Elle restera encore trente-trois jours à se purifier de son sang ; elle ne touchera rien de sacré, et elle n''ira pas au sanctuaire jusqu''à ce que les jours de sa purification soient accomplis. '
  '5':
  - type: note
    content: 'une fille  : litt. une femelle, de même au v. 7. –  sa souillure menstruelle v. 2n.'
  - type: text
    content: 'Si elle met au monde une fille, elle sera impure pendant deux semaines, comme lors de sa souillure menstruelle ; elle restera soixante-six jours à se purifier de son sang. '
  '6':
  - type: note
    content: 'un agneau d''un an 9.3+. –  pour l''holocauste / en sacrifice  : cf. v. 8 ; 9.2n.'
  - type: text
    content: 'Lorsque les jours de sa purification sont accomplis, pour un fils ou pour une fille, elle apportera au prêtre, à l''entrée de la tente de la Rencontre, un agneau d''un an pour l''holocauste, et une colombe ou une tourterelle en sacrifice pour le péché. '
  '7':
  - type: note
    content: 'Voir prêtre et expiation. –  de son flux de sang  : litt. de la source de son sang  ; cf. Mc 5.29n.'
  - type: text
    content: 'Le prêtre les présentera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et fera sur elle l''expiation, après quoi elle sera pure de son flux de sang. Telle est la loi concernant la femme qui met au monde un enfant, garçon ou fille. '
  '8':
  - type: note
    content: '5.7+ ; cf. Lc 2.24. –  un mouton  : le terme peut désigner un mouton ou une chèvre ; ici il s''agit de l''agneau prévu au v. 6.'
  - type: text
    content: Si elle n'a pas de quoi se procurer un mouton, elle prendra deux tourterelles ou deux colombes, l'une pour l'holocauste, l'autre en sacrifice pour le péché. Le prêtre fera sur elle l'expiation, et elle sera pure.
