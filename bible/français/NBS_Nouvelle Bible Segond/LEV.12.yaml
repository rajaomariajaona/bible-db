    - type: text
      text: '1'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un garçon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un mâle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où elle est souillée…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la souillure de ses règles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souillure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souillure menstruelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 5 ; 15.19ss ; 18.19 ; Ez 18.6 ; 22.10 ; 36.17 ; il peut aussi s''appliquer à d''autres formes de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: souillure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Lv 20.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 7.19s ; Lm 1.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Esd 9.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2Ch 29.5 ; voir aussi Nb 19.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Za 13.1 ; autre terme en Es 64.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: règles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : terme apparenté en 15.33'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 20.18 ; il évoque aussi une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souillure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'impureté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de sens plus général, en Es 30.22.
    marker-yv: yv-n
  - type: text
    text: 'Dis aux Israélites : Lorsqu''une femme est enceinte et qu''elle met au monde un garçon, elle sera impure pendant sept jours ; elle sera impure comme les jours où elle est souillée par ses règles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 22.27 ; voir aussi Gn 17.12 ; Lc 1.59 ; 2.21 ; Jn 7.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ph 3.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'enfant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la chair de son prépuce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 17.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: circoncis
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, l''enfant sera circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elle restera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trente jours et trois jours elle restera dans les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sangs
      - type: text
        text: ' de sa purification'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même tournure au v. 5 ; cf. Lc 2.22. Il s''agit toujours de pureté rituelle et non morale ; la naissance d''un enfant (surtout d''un fils, d''où sans doute la différence entre les v. 3s et 5) était toujours considérée comme une bénédiction (Gn 1.28 ; Ps 127.3-5 ; Rt 4.11s). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rien de sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rien de consacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Elle restera encore trente-trois jours à se purifier de son sang ; elle ne touchera rien de sacré, et elle n''ira pas au sanctuaire jusqu''à ce que les jours de sa purification soient accomplis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une fille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une femelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sa souillure menstruelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si elle met au monde une fille, elle sera impure pendant deux semaines, comme lors de sa souillure menstruelle ; elle restera soixante-six jours à se purifier de son sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un agneau d''un an '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour l''holocauste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8 ; 9.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque les jours de sa purification sont accomplis, pour un fils ou pour une fille, elle apportera au prêtre, à l''entrée de la tente de la Rencontre, un agneau d''un an pour l''holocauste, et une colombe ou une tourterelle en sacrifice pour le péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: expiation
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de son flux de sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la source de son sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mc 5.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre les présentera devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et fera sur elle l''expiation, après quoi elle sera pure de son flux de sang. Telle est la loi concernant la femme qui met au monde un enfant, garçon ou fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.7+ ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Lc 2.24. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un mouton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme peut désigner un mouton ou une chèvre ; ici il s''agit de l''agneau prévu au v. 6.'
    marker-yv: yv-n
  - type: text
    text: Si elle n'a pas de quoi se procurer un mouton, elle prendra deux tourterelles ou deux colombes, l'une pour l'holocauste, l'autre en sacrifice pour le péché. Le prêtre fera sur elle l'expiation, et elle sera pure.
