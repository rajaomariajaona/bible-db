document_id: GEN.31,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a acquis toute cette richesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a fait toute cette '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ec 4.4.'
      marker-yv: yv-n
    - type: text
      text: 'Jacob entendit les propos des fils de Laban, qui disaient : Jacob a pris tout ce qui appartenait à notre père ; c''est avec ce qui appartenait à notre père qu''il a acquis toute cette richesse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au temps où les bêtes entraient en chaleur, j''ai levé les yeux et j''ai vu en rêve que les mâles qui couvraient les bêtes étaient rayés, tachetés et mouchetés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'messager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.7 ; 28.12 ; 48.16.
      marker-yv: yv-n
    - type: text
      text: 'Le messager de Dieu m''a dit en rêve : « Jacob ! » J''ai répondu : « Je suis là ! » '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'regarde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10.
      marker-yv: yv-n
    - type: text
      text: 'Il a dit : « Lève les yeux, je te prie, et regarde : tous les mâles qui couvrent les bêtes sont rayés, tachetés et mouchetés ; car j''ai vu tout ce que Laban t''a fait. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.12-22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’El '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(comme dans '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Beth-El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maison d''El '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maison de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.8 ; 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 28.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 33.20). Le texte hébreu est incertain ; on pourrait comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je suis le Dieu Beth-El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. D''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', on modifie parfois le texte hébreu traditionnel pour traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je suis le Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui t'est apparu à Beth-El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu as fait '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu a généralement été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: conférer l'onction à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1R 1.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 2.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quitte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lève-toi, sors de ce pays et retourne…
      marker-yv: yv-n
    - type: text
      text: Je suis le Dieu de Beth-El, où tu as fait l'onction d'une pierre levée et où tu m'as fait un vœu. Maintenant, quitte ce pays et retourne au pays de tes origines. »
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la maison de notre père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: notre famille.
      marker-yv: yv-n
    - type: text
      text: 'Rachel et Léa lui répondirent : Avons-nous encore une part, un patrimoine, dans la maison de notre père ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inconnues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: étrangères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Pr 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne nous considère-t-il pas comme des inconnues, puisqu''il nous a vendues et qu''il a mangé notre argent ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute la richesse dont Dieu a dépouillé notre père nous revient, à nous et à nos fils. Maintenant, fais tout ce que Dieu t'a dit.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob fit monter ses fils et ses femmes sur les chameaux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 28.2-7.
      marker-yv: yv-n
    - type: text
      text: 'Il emmena tout son troupeau et tous les biens qu''il avait acquis, le troupeau dont il avait fait l''acquisition à Paddân-Aram, pour s''en aller chez Isaac, son père, en Canaan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: teraphim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ces objets, de dimensions variées, sont généralement assimilés à des divinités domestiques. Statuettes ou masques d''ancêtres, ils constituaient un titre de propriété qui revenait à l''héritier, d''où sans doute la fureur et la crainte de Laban ; cf. v. 30ss ; Jg 17.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 19.13,16 ; 2R 23.24 ; Os 3.4.'
      marker-yv: yv-n
    - type: text
      text: 'Laban était allé tondre son petit bétail. Rachel vola les teraphim de son père ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: remarqua que le visage de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans d''autres contextes, la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voir la face de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Ex 33.20+) ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'paraître en la présence de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Gn 32.21+). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme d'habitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme hier, avant-hier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 5 ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme auparavant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 4.10 ; 5.7s,14 ; 21.29,36 ; Dt 4.42 ; 19.4,6 ; 1S 4.7 ; 10.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.21 ; 19.7 ; 21.6 ; 2S 3.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 5.2 ; 2R 13.5 ; Rt 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 11.2.'
      marker-yv: yv-n
    - type: text
      text: 'Jacob remarqua que le visage de Laban n''était plus envers lui comme d''habitude. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trompa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vola le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' de'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 26-27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cette formule rappelle l''acte de Rachel (v. 19) ; cf. 2S 15.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en s'enfuyant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en ne l'informant pas qu'il s'enfuyait.
      marker-yv: yv-n
    - type: text
      text: 'quant à Jacob, il trompa Laban, l''Araméen, en s''enfuyant sans l''informer de son départ. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le fleuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Euphrate, cf. Mi 7.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : partie de Transjordanie comprise entre le plateau de Moab, au sud, et les hauteurs de Golân, au nord. Cf. v. 45,48 ; Ct 4.1.'
      marker-yv: yv-n
    - type: text
      text: Il s'enfuit avec tout ce qui lui appartenait ; il traversa le fleuve et se dirigea vers la région montagneuse du Galaad.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Laban rattrape Jacob
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le troisième jour, on informa Laban que Jacob s''était enfui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit avec lui ses frères, le poursuivit sur sept jours de marche et le rejoignit dans la région montagneuse du Galaad. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rêve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de rien dire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''hébreu précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis le bon jusqu'au mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 29 ; cf. 24.50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Sur l''idée de '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: totalité
        - type: text
          text: ' exprimée par la juxtaposition des contraires, voir 2.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 13.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais Dieu vint vers Laban, l''Araméen, dans un rêve nocturne, et il lui dit : Garde-toi de rien dire à Jacob.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban atteignit donc Jacob. Jacob avait dressé sa tente dans la montagne ; Laban dressa aussi la sienne avec ses frères, dans la région montagneuse du Galaad. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 21.10-14 ; 1S 30.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de guerre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'épée.
      marker-yv: yv-n
    - type: text
      text: 'Alors Laban dit à Jacob : Qu''as-tu fait ? Tu m''as trompé et tu as emmené mes filles comme des captives de guerre ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'as-tu trompé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: m'as-tu volé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi t''es-tu enfui en cachette et m''as-tu trompé, au lieu de m''informer ? Je t''aurais laissé partir dans la joie et avec des chants, avec le tambourin et la lyre ! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cette fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant.
      marker-yv: yv-n
    - type: text
      text: 'Tu ne m''as même pas laissé embrasser mes fils et mes filles ! Cette fois, tu as agi stupidement. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ps 124. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai le pouvoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mi 2.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la nuit dernière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 42 ; 19.34.'
      marker-yv: yv-n
    - type: text
      text: 'J''ai le pouvoir de vous faire du mal ; mais le Dieu de votre père m''a dit la nuit dernière : « Garde-toi de rien dire à Jacob ! » '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.3 ; 28.15.
      marker-yv: yv-n
    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Jacob : Retourne au pays de tes pères, au lieu de tes origines ; je serai avec toi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la maison de ton père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce sont les teraphim du v. 19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Et maintenant que tu es parti pour de bon, parce que tu languissais tellement après la maison de ton père, pourquoi as-tu volé mes dieux ?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prendrais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''emparer de force de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 21.25.
      marker-yv: yv-n
    - type: text
      text: 'Jacob répondit à Laban : J''avais peur ; je me disais que tu me prendrais peut-être tes filles. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 30 ; cf. 44.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: regarde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: reconnais.
      marker-yv: yv-n
    - type: text
      text: Mais celui auprès de qui tu trouveras tes dieux, celui-là ne vivra pas ! Devant nos frères, regarde ce qui t'appartient chez moi et prends-le ! – Jacob ne savait pas que Rachel les avait volés.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban entra dans la tente de Jacob, dans la tente de Léa, dans la tente des deux servantes, et il ne trouva rien. Il sortit de la tente de Léa et entra dans la tente de Rachel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rachel avait pris les teraphim, elle les avait mis sous le bât du chameau et s''était assise dessus. Laban fouilla toute la tente et ne trouva rien. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ne te fâche pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '45.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes règles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la voie des femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les règles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (expression comparable en 18.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Cf. Lv 15.19s.
      marker-yv: yv-n
    - type: text
      text: 'Elle dit à son père : Ne te fâche pas, mon seigneur, si je ne peux pas me lever devant toi, car j''ai mes règles. Il chercha et ne trouva pas les teraphim.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il accusa Laban
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il chercha querelle à Laban '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 26.21 ; Ex 17.2 ; Jb 10.2). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma transgression
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ma révolte ; mon crime.
      marker-yv: yv-n
    - type: text
      text: 'Jacob se fâcha ; il accusa Laban. Il dit à Laban : Quelle est ma transgression, quel est mon péché, que tu me poursuives avec tant d''ardeur ? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tu as fouillé toutes mes affaires, qu''as-tu trouvé de toutes les affaires de ta maison ? Expose-le ici devant mes frères et tes frères, et qu''ils soient arbitres entre nous deux ! '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: troupeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot, rendu ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'petit bétail '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bêtes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', s''applique aux moutons et aux chèvres (de même au v. 43).'
      marker-yv: yv-n
    - type: text
      text: 'J''ai passé vingt ans chez toi ; tes brebis et tes chèvres n''ont pas avorté, et je n''ai pas mangé les béliers de ton troupeau. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui en étais responsable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette forme du verbe habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pécher
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut signifier dans un sens religieux '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: offrir un sacrifice pour le péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et dans un sens profane '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: offrir une compensation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le berger n''était normalement pas tenu pour responsable s''il ramenait au propriétaire les restes d''une bête tuée par un animal sauvage ; cf. Ex 22.12 ; Lv 6.18ss ; Am 3.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la valeur de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Je ne t''ai pas rapporté de bête déchiquetée : c''est moi qui en étais responsable. Tu me réclamais la valeur de ce qu''on me volait le jour et de ce qu''on me volait la nuit. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob fit appeler Rachel et Léa qui étaient aux champs, près de son petit bétail. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''étais dévoré par la chaleur pendant le jour et par le froid pendant la nuit, et le sommeil fuyait mes yeux. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 29.15-30 ; 30.25-43 ; 31.7.
      marker-yv: yv-n
    - type: text
      text: 'Je suis resté vingt ans chez toi ; je t''ai servi quatorze ans pour tes deux filles, six ans pour ton petit bétail, et tu as changé dix fois mon salaire. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 24,29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Frayeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : titre de Dieu (cf. v. 53) dont le sens originel est incertain ; par comparaison avec l''arabe, on l''a aussi interprété au sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Parent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; un homonyme ( ?) désigne la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cuisse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Jb 40.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon affliction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon oppression, mon humiliation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma fatigue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la fatigue de mes mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le produit de mon travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 28.33 ; Jb 10.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la nuit dernière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 24.'
      marker-yv: yv-n
    - type: text
      text: Si le Dieu de mon père, le Dieu d'Abraham, la Frayeur d'Isaac, n'avait été pour moi, tu m'aurais maintenant laissé partir les mains vides. Dieu a vu mon affliction et ma fatigue, et la nuit dernière il a rendu son arbitrage.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Laban et Jacob concluent une alliance
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'troupeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 38
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Laban répondit à Jacob : Ces filles sont mes filles, ces fils sont mes fils, ce troupeau est mon troupeau, et tout ce que tu vois m''appartient. Que puis-je faire aujourd''hui pour mes filles ou pour les fils qu''elles ont mis au monde ? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.44 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.27,32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et que cela soit un témoin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte est incertain ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et faisons un tas de pierres qui soit un témoin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ou encore, d''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', la même formule qu''au v. 50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce n'est pas à un homme…
      marker-yv: yv-n
    - type: text
      text: 'Maintenant viens, concluons une alliance, moi et toi, et que cela soit un témoin entre moi et toi ! '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Jacob prit une pierre et en fit une pierre levée.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mangèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 54 ; 26.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
