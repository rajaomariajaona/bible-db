        children:
        - type: text
          text: 'tas de pierres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans la suite.
      marker-yv: yv-n
    - type: text
      text: 'Jacob dit à ses frères : Ramassez des pierres. Ils prirent des pierres et en firent un tas ; puis ils mangèrent là, sur le tas de pierres. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.47 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yegar-Sahadouta '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tas (de pierres) du témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en araméen (cf. v. 20 ; Jb 16.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Galéed '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gal‘ed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) a approximativement la même signification en hébreu (cf. v. 48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). Ce nom rappelle celui du Galaad (hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gil‘ad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 21).'
      marker-yv: yv-n
    - type: text
      text: 'Laban l''appela Yegar-Sahadouta, et Jacob l''appela Galéed. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.48 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce tas de pierres est aujourd''hui témoin entre toi et moi ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cette portion de texte termine le v. 46 dans LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tas de pierres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: témoin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: gal / ‘ed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est pourquoi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX insère ici le v. 51 et le début du v. 52.'
      marker-yv: yv-n
    - type: text
      text: 'Laban dit : Ce tas de pierres est aujourd''hui témoin entre toi et moi ! C''est pourquoi on l''a appelé du nom de Galéed (« Tas du témoin ») '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mitspa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
