document_id: GEN.31,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'il a acquis toute cette richesse  : litt. il a fait toute cette gloire , cf. 13.2n  ; voir aussi Ec 4.4.'
  - type: text
    content: 'Jacob entendit les propos des fils de Laban, qui disaient : Jacob a pris tout ce qui appartenait à notre père ; c''est avec ce qui appartenait à notre père qu''il a acquis toute cette richesse. '
  '10':
  - type: text
    content: 'Au temps où les bêtes entraient en chaleur, j''ai levé les yeux et j''ai vu en rêve que les mâles qui couvraient les bêtes étaient rayés, tachetés et mouchetés. '
  '11':
  - type: note
    content: messager (autre traduction ange) de Dieu 16.7 ; 28.12 ; 48.16.
  - type: text
    content: 'Le messager de Dieu m''a dit en rêve : « Jacob ! » J''ai répondu : « Je suis là ! » '
  '12':
  - type: note
    content: regarde ou vois v. 10.
  - type: text
    content: 'Il a dit : « Lève les yeux, je te prie, et regarde : tous les mâles qui couvrent les bêtes sont rayés, tachetés et mouchetés ; car j''ai vu tout ce que Laban t''a fait. '
  '13':
  - type: note
    content: '28.12-22. –  Dieu  : hébreu ’El (comme dans Beth-El, qui signifie maison d''El ou maison de Dieu  ; cf. 12.8 ; 21.33n  ; 28.19n  ; 33.20). Le texte hébreu est incertain ; on pourrait comprendre je suis le Dieu Beth-El. D''après LXX, on modifie parfois le texte hébreu traditionnel pour traduire je suis le Dieu (ou El) qui t''est apparu à Beth-El  ; voir aussi noms divins. –  tu as fait l''onction  : le verbe hébreu a généralement été traduit par conférer l''onction à, cf. 1R 1.34n  ; Ps 2.2n. –  quitte…  : litt. lève-toi, sors de ce pays et retourne…'
  - type: text
    content: Je suis le Dieu de Beth-El, où tu as fait l'onction d'une pierre levée et où tu m'as fait un vœu. Maintenant, quitte ce pays et retourne au pays de tes origines. »
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la maison de notre père  : autre traduction notre famille.'
  - type: text
    content: 'Rachel et Léa lui répondirent : Avons-nous encore une part, un patrimoine, dans la maison de notre père ? '
  '15':
  - type: note
    content: 'inconnues  : autre traduction étrangères  ; cf. Pr 2.16n.'
  - type: text
    content: 'Ne nous considère-t-il pas comme des inconnues, puisqu''il nous a vendues et qu''il a mangé notre argent ? '
  '16':
  - type: text
    content: Toute la richesse dont Dieu a dépouillé notre père nous revient, à nous et à nos fils. Maintenant, fais tout ce que Dieu t'a dit.
  '17':
  - type: text
    content: 'Jacob fit monter ses fils et ses femmes sur les chameaux. '
  '18':
  - type: note
    content: 28.2-7.
  - type: text
    content: 'Il emmena tout son troupeau et tous les biens qu''il avait acquis, le troupeau dont il avait fait l''acquisition à Paddân-Aram, pour s''en aller chez Isaac, son père, en Canaan. '
  '19':
  - type: note
    content: 'teraphim  : ces objets, de dimensions variées, sont généralement assimilés à des divinités domestiques. Statuettes ou masques d''ancêtres, ils constituaient un titre de propriété qui revenait à l''héritier, d''où sans doute la fureur et la crainte de Laban ; cf. v. 30ss ; Jg 17.5n  ; 1S 19.13,16 ; 2R 23.24 ; Os 3.4.'
  - type: text
    content: 'Laban était allé tondre son petit bétail. Rachel vola les teraphim de son père ; '
  '2':
  - type: note
    content: 'remarqua que le visage de  : dans d''autres contextes, la même expression est traduite par voir la face de (Ex 33.20+) ou paraître en la présence de (Gn 32.21+). –  comme d''habitude  : litt. comme hier, avant-hier, de même au v. 5 ; autre traduction comme auparavant  ; cf. Ex 4.10 ; 5.7s,14 ; 21.29,36 ; Dt 4.42 ; 19.4,6 ; 1S 4.7 ; 10.11n  ; 14.21 ; 19.7 ; 21.6 ; 2S 3.17n  ; 5.2 ; 2R 13.5 ; Rt 2.11n  ; 1Ch 11.2.'
  - type: text
    content: 'Jacob remarqua que le visage de Laban n''était plus envers lui comme d''habitude. '
  '20':
  - type: note
    content: 'trompa  : litt. vola le cœur de, de même aux v. 26-27n  ; cette formule rappelle l''acte de Rachel (v. 19) ; cf. 2S 15.6. –  en s''enfuyant…  : litt. en ne l''informant pas qu''il s''enfuyait.'
  - type: text
    content: 'quant à Jacob, il trompa Laban, l''Araméen, en s''enfuyant sans l''informer de son départ. '
  '21':
  - type: note
    content: 'le fleuve Euphrate, cf. Mi 7.12n. –  Galaad  : partie de Transjordanie comprise entre le plateau de Moab, au sud, et les hauteurs de Golân, au nord. Cf. v. 45,48 ; Ct 4.1.'
  - type: text
    content: Il s'enfuit avec tout ce qui lui appartenait ; il traversa le fleuve et se dirigea vers la région montagneuse du Galaad.
  - type: heading
    content: Laban rattrape Jacob
  '22':
  - type: text
    content: 'Le troisième jour, on informa Laban que Jacob s''était enfui. '
  '23':
  - type: text
    content: 'Il prit avec lui ses frères, le poursuivit sur sept jours de marche et le rejoignit dans la région montagneuse du Galaad. '
  '24':
  - type: note
    content: 'rêve 21.20. –  de rien dire  : l''hébreu précise depuis le bon jusqu''au mauvais, de même au v. 29 ; cf. 24.50n. Sur l''idée de totalité exprimée par la juxtaposition des contraires, voir 2.9n  ; 2S 13.22n.'
  - type: text
    content: 'Mais Dieu vint vers Laban, l''Araméen, dans un rêve nocturne, et il lui dit : Garde-toi de rien dire à Jacob.'
  '25':
  - type: text
    content: 'Laban atteignit donc Jacob. Jacob avait dressé sa tente dans la montagne ; Laban dressa aussi la sienne avec ses frères, dans la région montagneuse du Galaad. '
  '26':
  - type: note
    content: 'Dt 21.10-14 ; 1S 30.2. –  de guerre  : litt. d''épée.'
  - type: text
    content: 'Alors Laban dit à Jacob : Qu''as-tu fait ? Tu m''as trompé et tu as emmené mes filles comme des captives de guerre ! '
  '27':
  - type: note
    content: 'm''as-tu trompé  : litt. m''as-tu volé, v. 20n.'
  - type: text
    content: 'Pourquoi t''es-tu enfui en cachette et m''as-tu trompé, au lieu de m''informer ? Je t''aurais laissé partir dans la joie et avec des chants, avec le tambourin et la lyre ! '
  '28':
  - type: note
    content: 'Cette fois  : litt. maintenant.'
  - type: text
    content: 'Tu ne m''as même pas laissé embrasser mes fils et mes filles ! Cette fois, tu as agi stupidement. '
  '29':
  - type: note
    content: 'V. 24n  ; cf. Ps 124. –  J''ai le pouvoir Mi 2.1n. –  la nuit dernière  : cf. v. 42 ; 19.34.'
  - type: text
    content: 'J''ai le pouvoir de vous faire du mal ; mais le Dieu de votre père m''a dit la nuit dernière : « Garde-toi de rien dire à Jacob ! » '
  '3':
  - type: note
    content: 26.3 ; 28.15.
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Jacob : Retourne au pays de tes pères, au lieu de tes origines ; je serai avec toi. '
  '30':
  - type: note
    content: 'la maison de ton père  : autre traduction ta famille. –  dieux  : ce sont les teraphim du v. 19n.'
  - type: text
    content: Et maintenant que tu es parti pour de bon, parce que tu languissais tellement après la maison de ton père, pourquoi as-tu volé mes dieux ?
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'prendrais  : le même verbe est traduit par s''emparer de force de en 21.25.'
  - type: text
    content: 'Jacob répondit à Laban : J''avais peur ; je me disais que tu me prendrais peut-être tes filles. '
  '32':
  - type: note
    content: 'V. 30 ; cf. 44.9. –  regarde  : litt. reconnais.'
  - type: text
    content: Mais celui auprès de qui tu trouveras tes dieux, celui-là ne vivra pas ! Devant nos frères, regarde ce qui t'appartient chez moi et prends-le ! – Jacob ne savait pas que Rachel les avait volés.
  '33':
  - type: text
    content: 'Laban entra dans la tente de Jacob, dans la tente de Léa, dans la tente des deux servantes, et il ne trouva rien. Il sortit de la tente de Léa et entra dans la tente de Rachel. '
  '34':
  - type: text
    content: 'Rachel avait pris les teraphim, elle les avait mis sous le bât du chameau et s''était assise dessus. Laban fouilla toute la tente et ne trouva rien. '
  '35':
  - type: note
    content: 'Ne te fâche pas 45.5n. –  mes règles  : litt. la voie des femmes, c.-à-d. les règles (expression comparable en 18.11n). Cf. Lv 15.19s.'
  - type: text
    content: 'Elle dit à son père : Ne te fâche pas, mon seigneur, si je ne peux pas me lever devant toi, car j''ai mes règles. Il chercha et ne trouva pas les teraphim.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'il accusa Laban  : autre traduction il chercha querelle à Laban (cf. 26.21 ; Ex 17.2 ; Jb 10.2). –  ma transgression  : autres traductions ma révolte ; mon crime.'
  - type: text
    content: 'Jacob se fâcha ; il accusa Laban. Il dit à Laban : Quelle est ma transgression, quel est mon péché, que tu me poursuives avec tant d''ardeur ? '
  '37':
  - type: text
    content: 'Quand tu as fouillé toutes mes affaires, qu''as-tu trouvé de toutes les affaires de ta maison ? Expose-le ici devant mes frères et tes frères, et qu''ils soient arbitres entre nous deux ! '
  '38':
  - type: note
    content: 'troupeau  : le même mot, rendu ailleurs par petit bétail ou bêtes, s''applique aux moutons et aux chèvres (de même au v. 43).'
  - type: text
    content: 'J''ai passé vingt ans chez toi ; tes brebis et tes chèvres n''ont pas avorté, et je n''ai pas mangé les béliers de ton troupeau. '
  '39':
  - type: note
    content: 'qui en étais responsable  : cette forme du verbe habituellement traduit par pécher peut signifier dans un sens religieux offrir un sacrifice pour le péché, et dans un sens profane offrir une compensation. Le berger n''était normalement pas tenu pour responsable s''il ramenait au propriétaire les restes d''une bête tuée par un animal sauvage ; cf. Ex 22.12 ; Lv 6.18ss ; Am 3.12. –  la valeur de  : sous-entendu dans le texte.'
  - type: text
    content: 'Je ne t''ai pas rapporté de bête déchiquetée : c''est moi qui en étais responsable. Tu me réclamais la valeur de ce qu''on me volait le jour et de ce qu''on me volait la nuit. '
  '4':
  - type: text
    content: 'Jacob fit appeler Rachel et Léa qui étaient aux champs, près de son petit bétail. '
  '40':
  - type: text
    content: 'J''étais dévoré par la chaleur pendant le jour et par le froid pendant la nuit, et le sommeil fuyait mes yeux. '
  '41':
  - type: note
    content: Cf. 29.15-30 ; 30.25-43 ; 31.7.
  - type: text
    content: 'Je suis resté vingt ans chez toi ; je t''ai servi quatorze ans pour tes deux filles, six ans pour ton petit bétail, et tu as changé dix fois mon salaire. '
  '42':
  - type: note
    content: 'V. 24,29. –  Frayeur  : titre de Dieu (cf. v. 53) dont le sens originel est incertain ; par comparaison avec l''arabe, on l''a aussi interprété au sens de Parent  ; un homonyme ( ?) désigne la cuisse en Jb 40.17. –  mon affliction ou mon oppression, mon humiliation. –  ma fatigue  : litt. la fatigue de mes mains  ; autre traduction le produit de mon travail  ; cf. Dt 28.33 ; Jb 10.3. –  la nuit dernière  : cf. v. 24.'
  - type: text
    content: Si le Dieu de mon père, le Dieu d'Abraham, la Frayeur d'Isaac, n'avait été pour moi, tu m'aurais maintenant laissé partir les mains vides. Dieu a vu mon affliction et ma fatigue, et la nuit dernière il a rendu son arbitrage.
  - type: heading
    content: Laban et Jacob concluent une alliance
  '43':
  - type: text
    content: ' '
  - type: note
    content: troupeau v. 38n.
  - type: text
    content: 'Laban répondit à Jacob : Ces filles sont mes filles, ces fils sont mes fils, ce troupeau est mon troupeau, et tout ce que tu vois m''appartient. Que puis-je faire aujourd''hui pour mes filles ou pour les fils qu''elles ont mis au monde ? '
  '44':
  - type: note
    content: 'alliance 21.27,32. –  et que cela soit un témoin  : le texte est incertain ; certains modifient le texte hébreu traditionnel pour lire et faisons un tas de pierres qui soit un témoin  ; ou encore, d''après LXX, la même formule qu''au v. 50n  : ce n''est pas à un homme…'
  - type: text
    content: 'Maintenant viens, concluons une alliance, moi et toi, et que cela soit un témoin entre moi et toi ! '
  '45':
  - type: note
    content: 28.18n.
  - type: text
    content: Jacob prit une pierre et en fit une pierre levée.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'mangèrent v. 54 ; 26.30n. –  tas  : le même terme est aussi traduit par tas de pierres dans la suite.'
  - type: text
    content: 'Jacob dit à ses frères : Ramassez des pierres. Ils prirent des pierres et en firent un tas ; puis ils mangèrent là, sur le tas de pierres. '
  '47':
  - type: note
    content: Yegar-Sahadouta signifie tas (de pierres) du témoignage en araméen (cf. v. 20 ; Jb 16.19n) ; Galéed (Gal‘ed) a approximativement la même signification en hébreu (cf. v. 48n). Ce nom rappelle celui du Galaad (hébreu gil‘ad, cf. v. 21).
  - type: text
    content: 'Laban l''appela Yegar-Sahadouta, et Jacob l''appela Galéed. '
  '48':
  - type: note
    content: 'Ce tas de pierres est aujourd''hui témoin entre toi et moi ! cette portion de texte termine le v. 46 dans LXX. –  tas de pierres / témoin  : hébreu gal / ‘ed. –  C''est pourquoi…  : LXX insère ici le v. 51 et le début du v. 52.'
  - type: text
    content: 'Laban dit : Ce tas de pierres est aujourd''hui témoin entre toi et moi ! C''est pourquoi on l''a appelé du nom de Galéed (« Tas du témoin ») '
  '49':
  - type: note
    content: 'Mitspa (litt. le Mitspa) signifie le poste de guet (terme apparenté au verbe traduit par fasse le guet). C''est le nom d''une localité du Galaad (Jg 10.17 ; 11.29). Il fait aussi assonance avec le mot traduit par pierre levée (matséva, v. 45,51s). –  quand nous ne nous verrons plus…  : litt. quand nous serons cachés l''un de l''autre.'
  - type: text
    content: 'et de Mitspa (« Le Poste de guet »), parce que Laban avait dit : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse le guet entre moi et toi, quand nous ne nous verrons plus l''un l''autre ! '
  '5':
  - type: text
    content: 'Il leur dit : Je remarque que le visage de votre père n''est plus envers moi comme d''habitude ; mais le Dieu de mon père a été avec moi. '
  '50':
  - type: note
    content: 'Si tu affliges  : autres traductions si tu humilies, si tu maltraites  ; cf. 15.13n. –  ce n''est pas à un homme… prends garde (litt. regarde, vois)… : autre traduction possible, avec une légère modification de la lecture traditionnelle de l''hébreu  : quand il n''y aurait personne pour le voir, Dieu serait témoin…  ; cf. Jg 11.10 ; 1S 12.5. –  c''est Dieu qui sera témoin…  : dans LXX, cette portion de texte fait suite au v. 44.'
  - type: text
    content: 'Si tu affliges mes filles, si tu prends d''autres femmes en plus de mes filles, ce n''est pas à un homme que nous aurons affaire : prends garde, c''est Dieu qui sera témoin entre moi et toi. '
  '51':
  - type: text
    content: 'Laban dit à Jacob : Ce tas de pierres, cette pierre levée, je les ai dressés entre moi et toi. '
  '52':
  - type: note
    content: 'Ce tas de pierres est témoin, cette pierre levée est témoin  : cf. v. 48n. –  que je ne passerai pas…  : LXX fait débuter ici le v. 52. –  pour faire du mal  : on pourrait aussi comprendre sous peine de malheur.'
  - type: text
    content: 'Ce tas de pierres est témoin, cette pierre levée est témoin que je ne passerai pas ce tas de pierres dans ta direction, et que tu ne passeras pas dans ma direction, pour faire du mal, ce tas de pierres et cette pierre levée. '
  '53':
  - type: note
    content: Nahor 11.27. –  Dieu (ou dieu) de leur père 43.23. Certains traduisent que le Dieu d'Abraham et le Dieu de Nahor, le Dieu de leur père, soit juge… Mais le pluriel du verbe hébreu (contrairement au v. 42, qui emploie le singulier) peut également être compris comme une adaptation au polythéisme supposé de Laban (cf. v. 30 ; voir aussi 20.13n). –  Frayeur v. 42n.
  - type: text
    content: Que le dieu d'Abraham et le dieu de Nahor soient juges entre nous – c'était le Dieu de leur père. Jacob prêta serment par la Frayeur d'Isaac, son père.
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'V. 46 ; 26.30n. – Voir sacrifice . –  manger  : litt. manger du pain.'
  - type: text
    content: Jacob offrit un sacrifice dans la montagne et invita ses frères à manger ; ils mangèrent donc et passèrent la nuit dans la montagne.
  '6':
  - type: note
    content: 30.29.
  - type: text
    content: 'Vous savez vous-mêmes que j''ai servi votre père de toutes mes forces. '
  '7':
  - type: note
    content: dix fois v. 41+ ; cf. Nb 14.22 ; Jb 19.3 ; Né 4. –  Dieu ne lui a pas permis Ps 105.14.
  - type: text
    content: 'Or votre père a essayé de me tromper, et il a changé dix fois mon salaire ; mais Dieu ne lui a pas permis de me faire du mal. '
  '8':
  - type: note
    content: 30.32ss ; ici Jacob fait allusion à des péripéties dont ne parle pas le chap. 30.
  - type: text
    content: 'S''il disait : « Les tachetées seront ton salaire », toutes les bêtes faisaient des petits tachetés ; s''il disait : « Les rayées seront ton salaire », toutes les bêtes faisaient des petits rayés. '
  '9':
  - type: text
    content: Dieu a dépouillé votre père de son troupeau, et il me l'a donné.
