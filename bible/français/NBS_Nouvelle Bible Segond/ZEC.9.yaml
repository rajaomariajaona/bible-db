document_id: ZEC.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: DEUXIÈME PARTIE
  - type: heading
    content: Jugement et salut des peuples voisins d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 12.1 ; Es 13.1n  ; cf. Ml 1.1. –  Hadrak  : ville du nord de la Syrie. –  elle s''arrête sur Damas  : litt. Damas (est) son repos ou son lieu de repos . –  l''être humain  : litt. l''œil (ou la source ) de l''homme (hébreu ’adam ), sens incertain ; LXX a compris le Seigneur a l''œil sur les hommes  ; on pourrait aussi comprendre  : les yeux de (tous) les hommes sont tournés vers le Seigneur  ; beaucoup modifient légèrement le texte hébreu traditionnel pour lire la source (ou l''œil ) de la Syrie (hébreu ’Aram ), expression qui désignerait Damas.'
  - type: text
    content: Sentence.
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur le pays de Hadrak :'
  - type: text
    content: elle s'arrête sur Damas.
  - type: text
    content: 'Car c''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''appartient l''être humain,'
  - type: text
    content: comme toutes les tribus d'Israël.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Je retrancherai  : LXX il retranchera  ; cf. Es 2.4 ; Os 1.7 ; 2.20 ; Ps 46.10. –  Ephraïm désigne l''ancien royaume du Nord (Os 4.17n) maintenant uni à Jérusalem (cf. v. 13). –  chars / chevaux  : cf. Dt 17.16 ; Es 31.1 ; Ps 33.17. –  paix des nations  : cf. Es 9.5s ; 11.6-9 ; 42.1-4 ; 57.19 ; Ps 72.7. –  le Fleuve  : l''Euphrate ; cf. Gn 15.18 ; 1R 5.1 ; Es 11.15 ; 27.12 ; Ps 72.8 ; 80.12. –  de la terre ou du pays.'
  - type: text
    content: Je retrancherai d'Ephraïm les chars
  - type: text
    content: et de Jérusalem les chevaux ;
  - type: text
    content: les arcs de guerre seront retranchés.
  - type: text
    content: Il parlera pour la paix des nations,
  - type: text
    content: et sa domination s'étendra
  - type: text
    content: d'une mer à l'autre,
  - type: text
    content: depuis le Fleuve
  - type: text
    content: jusqu'aux extrémités de la terre.
  - type: heading
    content: La libération des prisonniers
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'pour toi  : le pronom correspondant, au féminin en hébreu, désigne de toute évidence Jérusalem ; cf. v. 9,13. –  du sang de ton alliance Ex 24.4-8 ; cf. Ps 50.5 ; Mt 26.28/ / ; Hé 13.20. –  de la citerne ou de la fosse  ; le mot signifie aussi cachot , cf. Gn 37.20-29 ; Jr 38.6.'
  - type: text
    content: Et pour toi, à cause du sang de ton alliance,
  - type: text
    content: j'ai relâché tes prisonniers de la citerne
  - type: text
    content: où il n'y a pas d'eau.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la forteresse  : cf. Ps 122.1-7. –  prisonniers pleins d''espoir  : litt. prisonniers de l''espoir . –  au double  : cf. Es 61.7 ; Jb 42.10+ ; voir aussi Es 40.2n.'
  - type: text
    content: Revenez à la forteresse,
  - type: text
    content: prisonniers pleins d'espoir !
  - type: text
    content: Aujourd'hui encore je l'annonce,
  - type: text
    content: je te rendrai tout au double.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Juda / Ephraïm  : cf. v. 10n. –  j''éveillerai ou je susciterai, j''exciterai  ; cf. 2.17 ; 4.1 ; Es 13.17n  ; Jr 6.22+. –  tes fils, ô Sion Es 66.8 ; Jl 2.23 ; Ps 149.2 ; Lm 4.2. –  Grèce  : cf. Gn 10.2nss ; Es 66.19 ; Ez 27.13 ; Jl 4.6 ; il ne faut peut-être voir ici qu''une référence générale à des ennemis lointains, cf. Ez 38.3. –  d''un héros  : autres traductions d''un homme vaillant ; d''un guerrier  ; cf. 10.5n.'
  - type: text
    content: Car je bande mon arc (c'est Juda),
  - type: text
    content: je le garnis (c'est Ephraïm) ;
  - type: text
    content: j'éveillerai tes fils, ô Sion,
  - type: text
    content: contre tes fils, ô Grèce !
  - type: text
    content: Je te rendrai pareille à l'épée d'un héros.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'partira  : litt. sortira , 2.7+. –  trompe  : cf. Ex 19.16 ; Es 27.13n  ; Jr 4.5+ ; Mt 24.31/ / ; Ap 8.6. –  du sud ou de Témân (le même mot indique la région et la direction du sud) : cf. Dt 33.2 ; Jg 5.4 ; Ha 3.3s ; Ps 18.8-15.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au-dessus d''eux apparaîtra,'
  - type: text
    content: et sa flèche partira comme l'éclair ;
  - type: text
    content: 'le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' sonnera de la trompe,'
  - type: text
    content: il s'avancera dans les tempêtes du sud.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'pierres de la fronde Jb 41.20. –  ils boiront…  : autre traduction ils boiront, ils seront agités comme sous l''effet du vin  ; certains témoins de LXX ont lu ils boiront leur sang comme du vin  ; cf. Ez 39.17-19. –  comme un calice  : le terme hébreu désigne en particulier l''ustensile qui sert à l''aspersion rituelle de l’ autel  ; cf. 14.20 ; Ex 27.3n  ; 38.3 ; Nb 4.14 ; 7.13 ; 1R 7.40,45 ; Jr 52.18 ; Am 6.6. –  les coins de l''autel  : cf. Ex 27.2n  ; 29.12 ; Lv 4.7 ; 8.15 ; 16.18.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées les protégera ;'
  - type: text
    content: ils dévoreront, ils écraseront les pierres de la fronde ;
  - type: text
    content: ils boiront, ils bouillonneront comme le vin,
  - type: text
    content: ils en seront pleins comme un calice,
  - type: text
    content: comme les coins de l'autel.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'les sauvera  : cf. Es 43.3+. –  comme le troupeau  : cf. 11.4ss. –  pierres (précieuses) d''un diadème (cf. Nb 6.7n) : cf. Es 62.3. –  sa terre  : litt. son sol  ; cf. Gn 2.5n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, les sauvera en ce jour-là,'
  - type: text
    content: comme le troupeau de son peuple ;
  - type: text
    content: car ils sont les pierres d'un diadème,
  - type: text
    content: scintillantes sur sa terre.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 31.12s. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n. –  jeunes filles  : litt. vierges.'
  - type: text
    content: Oh ! qu'il est bon, qu'il est beau !
  - type: text
    content: Le froment fera croître les jeunes gens,
  - type: text
    content: et le vin, les jeunes filles.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Elle s''arrête aussi…  : litt. même Hamath est dans ses frontières . –  Hamath en Syrie, Nb 13.21n  ; Ez 47.15n. –  Tyr et Sidon , ports phéniciens Es 23.1 ; Ez 26.2n  ; 27.8n. –  sagesse Ez 28.4.'
  - type: text
    content: Elle s'arrête aussi sur Hamath,
  - type: text
    content: sur Tyr et Sidon,
  - type: text
    content: avec toute leur sagesse.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 26–28. – Le nom de Tyr fait assonance avec le mot traduit par forteresse , lequel revient avec le sens de siège en 12.2. –  l'argent comme de la poussière Jb 27.16.
  - type: text
    content: Tyr s'est bâti une forteresse ;
  - type: text
    content: elle a amoncelé l'argent comme de la poussière
  - type: text
    content: et l'or comme la boue des rues.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'son rempart  : autres traductions sa force, ses troupes, sa richesse . –  dans la mer Ez 27.34. –  le feu Ez 28.18 ; Am 1.10.'
  - type: text
    content: Le Seigneur la dépossédera,
  - type: text
    content: il précipitera son rempart dans la mer,
  - type: text
    content: elle sera dévorée par le feu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ashqelôn / Gaza / Eqrôn  : villes de Philistie (de même Ashdod au v. 6), au sud de la Phénicie, sur le littoral méditerranéen, et au sud-ouest de la Judée ; cf. Jos 13.2s ; Am 1.6-8 ; So 2.4-7.'
  - type: text
    content: Ashqelôn le verra et aura peur ;
  - type: text
    content: Gaza aussi, elle tremblera violemment ;
  - type: text
    content: Eqrôn aussi, car son espoir la couvrira de honte.
  - type: text
    content: Le roi disparaîtra de Gaza,
  - type: text
    content: et Ashqelôn ne sera plus habitée.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Un bâtard ou des bâtards  : le terme s''applique peut-être ici à une population mixte, issue d''unions entre Juifs et non-Juifs  ; cf. Dt 23.3 ; Né 13.23-27. –  habitera  : autre traduction régnera . –  l''orgueil 10.11 ; 11.3n.'
  - type: text
    content: Un bâtard habitera dans Ashdod ;
  - type: text
    content: ainsi je retrancherai l'orgueil des Philistins.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le sang de sa bouche  : la viande mangée par les Philistins n''était pas, jusque-là, saignée selon les lois d''Israël (cf. Gn 9.4 ; Lv 3.17+). –  les horreurs  : le terme peut désigner un aliment rituellement impur (Lv 11.10ss). Il s''applique aussi aux idoles (Ez 5.11+), et il pourrait se rapporter ici aux viandes sacrifiées aux idoles ; cf. Es 66.3s. –  sera un reste  : c.-à-d. sera épargné, deviendra un reste au sens prophétique (voir Es 1.9+) ; cf. Ps 87.4-6. –  un chef  : le terme hébreu est apparenté au nombre mille (cf. 12.5s ; Gn 36.15ss). –  les Jébusites , anciens habitants de Jérusalem intégrés à Israël, cf. Jos 15.63 ; Jg 1.21 ; 2S 5.6-9.'
  - type: text
    content: J'ôterai le sang de sa bouche
  - type: text
    content: et les horreurs d'entre ses dents ;
  - type: text
    content: lui aussi sera un reste pour notre Dieu ;
  - type: text
    content: il sera comme un chef en Juda,
  - type: text
    content: Eqrôn sera comme les Jébusites.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Je dresserai mon camp (cf. Ps 34.8) auprès de ma maison  : cf. Jr 12.7n  ; Os 8.1n  ; 9.15 ; Ps 114.1s. –  pour la protéger contre toute armée  : texte obscur ; LXX (comme) un poste de garde (cf. 1S 14.12), ce qui correspond à une légère variante de la vocalisation traditionnelle de l''hébreu. –  oppresseur 10.4n. –  j''ai vu de mes yeux  : cf. Ex 3.7,9.'
  - type: text
    content: Je dresserai mon camp auprès de ma maison
  - type: text
    content: pour la protéger contre toute armée,
  - type: text
    content: contre ceux qui passent et ceux qui reviennent,
  - type: text
    content: et aucun oppresseur ne passera plus chez eux ;
  - type: text
    content: car maintenant j'ai vu de mes yeux.
  - type: heading
    content: Le roi qui établira la paix
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 21.5/ / ; Jn 12.15 . –  Sois transportée…  : cf. 2.14+. –  Sion la belle / Jérusalem la belle  : litt. fille de Sion / fille de Jérusalem , cf. 2.11n,14n. –  acclamations  : cf. Jos 6.10 ; 1S 17.20 ; So 3.14s ; Ps 47.2s ; 95.1-3 ; 98.4,6,8. –  ton roi… vient  : cf. Es 35.4 ; 59.20. –  juste Es 9.6 ; 11.4 ; 16.5 ; Jr 23.5. –  victorieux  : litt. sauvé , cf. Nb 10.9 ; Ps 33.16 ; des versions anciennes ont compris sauvant ou sauveur . –  pauvre  : autre traduction humble  ; cf. 7.10 ; 11.7n  ; cf. Es 57.15 ; 61.1s ; So 2.3 ; 3.12n  ; Ps 69.33s ; Dn 4.14 ; voir aussi Mt 11.29 ; Lc 1.52. –  sur un âne Gn 49.11. –  le petit d''une ânesse  : litt. sur un âne fils d''ânesses  ; LXX a compris un jeune ânon  ; cf. Ps 147.9 ; Jb 4.11.'
  - type: text
    content: Sois transportée d'allégresse, Sion la belle !
  - type: text
    content: Lance des acclamations, Jérusalem la belle !
  - type: text
    content: Il est là, ton roi, il vient à toi ;
  - type: text
    content: il est juste et victorieux,
  - type: text
    content: il est pauvre et monté sur un âne,
  - type: text
    content: sur un ânon, le petit d'une ânesse.
