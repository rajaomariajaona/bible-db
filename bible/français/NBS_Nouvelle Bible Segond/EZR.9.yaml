document_id: EZR.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: De nombreux Judéens ont épousé des étrangères
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.10. –  Lorsque…  : cf. 10.9n  ; 2Ch 31.1. –  peuples / prêtres / lévites 6.16 ; 7.13. –  séparés 6.21+ ; Né 9.2. –  peuples des pays , c.-à-d. populations locales , de même aux v. 2,11 ; 3.3n. –  et de (litt. selon ) leurs abominations , cf. Dt 7.25+ ; 2R 21.2 ; 2Ch 28.3 ; 33.2 ; 36.14. –  Cananéens…  : cf. Gn 15.19ss ; Ex 3.8 ; Dt 7.1 ; Jos 3.10 ; 24.11. –  Ammonites / Moabites  : cf. Dt 23.4ss. –  Egyptiens  : cf. Dt 23.8.'
  - type: text
    content: 'Lorsque cela fut terminé, les chefs s''approchèrent pour me dire : Le peuple d''Israël, les prêtres et les lévites ne se sont pas séparés des peuples des pays et de leurs abominations, celles des Cananéens, des Hittites, des Perizzites, des Jébusites, des Ammonites, des Moabites, des Egyptiens et des Amorites. '
  '10':
  - type: text
    content: 'Maintenant, notre Dieu, que dirons-nous après cela ? Nous avons abandonné tes commandements, '
  '11':
  - type: note
    content: 'tes serviteurs, les prophètes Dn 9.6,10. –  en disant  : cette citation est en fait un assemblage de divers textes, principalement dans le Deutéronome (Moïse étant considéré comme prophète en Dt 18.15 ; 34.10) ; cas analogue en Né 1.8s. –  Le pays… Dt 4.1,5,14,21s,26,38. –  souillé…  : litt. souillé par la souillure des peuples des pays  ; sur le terme correspondant à souillure, cf. Lv 12.2n  ; 20.21 ; voir aussi Lv 18.24ss ; 20.22ss ; Ez 36.17 ; Lm 1.8n  ; 2Ch 29.5. –  abominations Dt 18.9 ; 2R 16.3 ; 21.2 ; 2Ch 28.3 ; 33.2. –  d''un bout à l''autre 2R 10.21n  ; 21.16.'
  - type: text
    content: 'ceux que tu avais institués pour nous par l''intermédiaire de tes serviteurs, les prophètes, en disant : « Le pays dans lequel vous entrez pour en prendre possession est un pays souillé par les peuples des pays, à cause des abominations dont ils l''ont rempli d''un bout à l''autre avec leurs impuretés ; '
  '12':
  - type: note
    content: ne donnez donc pas… Dt 7.3 ; Né 10.31. –  vous ne chercherez… Dt 23.7. – Voir paix. –  deviendrez forts Dt 11.8. –  mangerez… Gn 45.18 ; Dt 32.13s ; Es 1.19 ; Jr 2.7. –  vous le laisserez pour toujours… Dt 11.9 ; Es 58.4 ; Ez 37.25.
  - type: text
    content: 'ne donnez donc pas vos filles à leurs fils et ne prenez pas leurs filles pour vos fils ; vous ne chercherez pas leur paix ni leur bien-être ; ainsi vous deviendrez forts, vous mangerez ce qu''il y a de meilleur dans le pays, et vous le laisserez pour toujours en possession à vos fils. » '
  '13':
  - type: note
    content: 'torts v. 6+. –  tu ne nous aies pas punis  : texte et traduction incertains ; litt. que tu aies gardé en retrait (certaines) de nos fautes  ; ou bien, avec une légère modification, que tu aies gardé loin de ton bâton (certaines) de nos fautes.'
  - type: text
    content: 'Après tout ce qui nous est arrivé à cause de nos mauvaises actions et de nos grands torts, bien que toi, notre Dieu, tu ne nous aies pas punis en proportion de nos fautes, et maintenant que tu nous as conservé ces rescapés, '
  '14':
  - type: note
    content: 'nous allier par des mariages  : cf. Gn 34.9 ; Dt 7.3 ; Jos 23.12 ; 1S 18.21ss ; 1R 3.1 ; 2Ch 18.1. –  ces peuples et leurs abominations  : litt. ces peuples d''abominations  ; on pourrait aussi comprendre ces peuples abominables  ; cf. Dt 7.25+. –  ni reste ni rescapés  : cf. v. 8 ; cf. Règle de la Communauté (Qumrân) 4.13s : « Jusqu''à ce qu''ils soient exterminés sans qu''un seul d''entre eux ne survive ni ne réchappe. » Règlement de la Guerre (Qumrân) 1.6s : « Pour que soit abattue l''impiété sans qu''il y ait un reste, et sans qu''il y ait un rescapé pour tous les fils de ténèbres. » 14.5 : « (Dieu a épargné son peuple) tandis que l''assemblée des nations, il l''a supprimée jusqu''à extermination, sans qu''il y ait un reste. »'
  - type: text
    content: 'recommencerions-nous à violer tes commandements et à nous allier par des mariages avec ces peuples et leurs abominations ? Ne t''irriterais-tu pas contre nous au point de nous exterminer, sans laisser ni reste ni rescapés ? '
  '15':
  - type: note
    content: 'tu es juste Jr 12.1 ; 23.6 ; So 3.5 ; Ps 51.6 ; 145.17 ; Lm 1.18 ; Dn 4.34 ; 9.14 ; Né 9.33. –  voilà pourquoi… v. 7+. –  subsister ou être absous  : litt. tenir debout  ; cf. Na 1.6 ; Ml 3.2 ; Ps 76.8 ; 130.3.'
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, tu es juste, car nous sommes un reste, des rescapés – voilà pourquoi il en est ainsi en ce jour. Nous sommes ici, devant toi, avec nos torts, et nous ne saurions subsister ainsi devant toi.'
  '2':
  - type: note
    content: 'Cf. Né 13.23ss ; voir aussi Ml 2.10ss. Sur les mariages mixtes, cf. Gn 24.3 ; 28.1,6 ; Ex 34.15s ; Dt 7.2ss ; Jg 3.5s ; 14.3 ; 1R 11.1 ; 16.31 ; voir aussi Gn 41.45 ; Nb 12.1ss ; Dt 21.10ss ; Ez 16.3 ; Rt 1 ; cf. Jubilés 20.4 : « Qu''on ne prenne pas de femme parmi les filles de Canaan, car la race de Canaan sera extirpée du pays » (la consigne est maintes fois répétée dans ce livre) ; Testament de Lévi 9.10 : « Pendant que tu es encore jeune, prends donc une femme sans tache ni souillure et qui n''appartienne pas à une race étrangère ou aux nations. » –  mêlé  : cf. Ps 106.35 ; Né 13.3n. –  la descendance ou la semence, cf. Gn 3.15n  ; 2Ch 20.7. –  sainte ou sacrée, cf. Ex 19.6 ; Lv 11.44 ; 19.2 ; 20.7 ; 21.8 ; Dt 7.6 ; Es 6.13 ; 52.1,6. –  sacrilège  : cf. v. 4 ; 10.2,6,10 ; Nb 5.6,12,15,21,27 ; Dt 32.51 ; Né 1.8 ; 13.27 ; 1Ch 5.21 ; 2Ch 12.2 ; 26.16,18 ; 28.19,22 ; 29.6 ; 30.7.'
  - type: text
    content: Car ils ont pris leurs filles pour eux-mêmes et pour leurs fils et ils ont mêlé la descendance sainte avec les peuples des pays ; les chefs et les magistrats ont été les premiers à commettre ce sacrilège.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Né 13.25. –  je déchirai… Gn 37.29,34 ; 44.13 ; Jg 11.35 ; 2S 1.2,11 ; Jb 1.20. –  je m''arrachai…  : cf. Es 50.6 ; voir aussi 2S 10.4 ; Es 15.2 ; Jr 41.5 ; 48.37 ; Ez 5.1.'
  - type: text
    content: 'Lorsque j''entendis cela, je déchirai mon vêtement et mon manteau, je m''arrachai les cheveux de la tête et les poils de la barbe et je m''assis, atterré. '
  '4':
  - type: note
    content: 'ceux qui tremblaient… 10.3 ; Es 66.2,5. –  commis par les exilés  : litt. de l''exil, cf. 4.1n  ; de même 10.6,8. –  l''heure de (sous-entendu dans le texte) l''offrande (ou l''offrande végétale, 7.17+) du soir, heure de la prière (vers 15 h) ; cf. Ex 29.39ss ; Nb 28.4 ; 2R 16.15n  ; voir aussi 1R 18.29 ; Ps 141.2 ; Dn 9.21 ; Lc 1.10 ; Ac 3.1.'
  - type: text
    content: Auprès de moi se rassemblèrent tous ceux qui tremblaient aux paroles du Dieu d'Israël, à cause du sacrilège commis par les exilés ; quant à moi, je restai assis, atterré, jusqu'à l'heure de l'offrande du soir.
  - type: heading
    content: La prière d'Esdras en faveur des fautifs
  '5':
  - type: text
    content: ' '
  - type: note
    content: mon affliction ou mon humiliation , cf. 8.21n  ; Dt 8.2n. –  à genoux 1R 8.54 ; Ps 95.6 ; Dn 6.11 ; cf. Lc 22.41 ; Ac 7.60. –  je tendis les mains… Ex 9.29 ; 1R 8.22 ; Ps 28.2 ; Né 8.6.
  - type: text
    content: 'Puis, à l''heure de l''offrande du soir, je me levai du sein de mon affliction, avec mon vêtement et mon manteau déchirés, je tombai à genoux, je tendis les mains vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu '
  '6':
  - type: note
    content: 'Cf. Dn 9. –  J''ai honte…  : autre traduction j''ai trop de confusion et de honte… pour lever la face vers toi  ; cf. Es 45.16 ; Jr 6.15 ; 8.12 ; 31.19 ; Ez 16.27n  ; 36.32 ; voir aussi Lc 18.13. –  nos fautes…  : cf. Lv 26.40 ; Né 1.5ss ; voir aussi Jg 2.11ss ; Es 6.5 ; 53.4ss ; Tobit 3.5 : « Oui, tous tes jugements sont véridiques, quand tu me traites selon mes péchés et ceux de mes pères, car nous n''avons pas observé tes commandements. » –  par-dessus nos têtes  : autre traduction possible par-dessus les sommets (des montagnes) (même terme en 2S 15.32) ; cf. Ps 38.5 ; 40.13 ; 69.2s,16 ; voir aussi Ez 33.10 ; Jon 1.2. –  nos torts v. 7,13,15 ; 10.10,19 ; 1Ch 21.3 ; 2Ch 24.18 ; 28.10,13 ; 33.23. –  jusqu''au ciel Jr 51.9 ; 2Ch 28.9.'
  - type: text
    content: 'et je dis : J''ai honte, mon Dieu, je suis confus de lever la face vers toi, mon Dieu : nos fautes se sont multipliées par-dessus nos têtes, et nos torts se sont élevés jusqu''au ciel. '
  '7':
  - type: note
    content: 'Depuis les jours de nos pères  : cf. Ps 106.6n  ; Règle de la Communauté (Qumrân) 1.25s : « Nous avons péché, nous avons été impies, nous et nos pères avant nous, en allant à l''encontre des préceptes de vérité. Et juste est Dieu, qui a accompli son jugement contre nous et contre nos pères. » –  nous, nos rois… Né 9.32. –  des nations  : litt. des pays  ; cf. Lc 21.24. –  pillage Est 9.10,15s ; Dn 11.24,33 ; Né 3.36 ; 2Ch 14.13 ; 25.13 ; 28.14. –  honte  : litt. honte de la face, cf. Jr 7.19 ; Dn 9.7s ; 2Ch 32.21. –  voilà pourquoi il en est ainsi en ce jour v. 15 ; Dt 2.30n  ; 6.24 ; Jr 44.22 ; Né 9.10.'
  - type: text
    content: 'Depuis les jours de nos pères et jusqu''à ce jour nous avons eu de grands torts ; et c''est à cause de nos fautes que nous avons été livrés, nous, nos rois et nos prêtres, aux rois des nations, à l''épée, à la captivité, au pillage et à la honte – voilà pourquoi il en est ainsi en ce jour. '
  '8':
  - type: note
    content: 'tout juste  : autre traduction en peu de temps. – Voir grâce. –  rescapés v. 14s. –  une place  : litt. un piquet (de tente) ; un ms porte un reste, cf. 1.4 ; Es 1.9+ ; sur l''image de la tente, cf. Es 54.2 ; voir aussi Es 22.23 ; Siracide 14.24ss : « Il (le sage) campe près de sa maison (celle de la Sagesse), il fixe le piquet de sa tente dans ses murs. Il dresse sa tente auprès d''elle, il campe au séjour du bonheur. Il place ses enfants sous son abri, sous ses rameaux il demeure. Il est abrité par elle de la chaleur, il campe dans sa gloire. » –  son lieu sacré Es 60.13 ; Ps 24.3 ; voir saint. –  fait briller nos yeux  : cf. 1S 14.27,29 ; Ps 13.4 ; 19.9 ; Pr 29.13 ; voir aussi Ep 1.18 ; Siracide 34.20 : « Il (Dieu) élève l''âme et fait briller le regard, en procurant guérison, vie et bénédiction. »'
  - type: text
    content: 'Et cependant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, vient tout juste de nous faire grâce en nous laissant quelques rescapés et en nous faisant une place dans son lieu sacré ; ainsi notre Dieu a fait briller nos yeux et nous a redonné un peu de vie dans notre esclavage. '
  '9':
  - type: note
    content: 'Il nous a accordé… 7.28+. –  des murs  : litt. une clôture, peut-être dans un sens métaphorique général (un abri sûr), quoique certains y voient une allusion plus précise à la muraille de Jérusalem (qui aurait alors été reconstruite, cf. 7.1n,7n  ; Né 1.1n) ; le même terme hébreu est traduit par clôture en Nb 22.24 ; Es 5.5s ; Ez 13.5 ; 22.30 ; 42.7,10 ; Ps 62.4 ; 80.13 ; Ec 10.8 ; barrière en Os 2.8 ; mur en Mi 7.11 ; Pr 24.31. –  Juda / Jérusalem 2.1 ; 4.6 ; 5.1 ; 10.7.'
  - type: text
    content: 'Car nous sommes esclaves ; mais notre Dieu ne nous a pas abandonnés à notre esclavage. Il nous a accordé de la faveur devant les rois de Perse, pour nous rendre la vie, afin que nous relevions la maison de notre Dieu et que nous redressions ses ruines, et pour nous donner des murs en Juda et à Jérusalem. '
