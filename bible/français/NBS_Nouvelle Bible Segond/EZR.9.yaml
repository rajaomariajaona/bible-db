  - type: text
    text: 'Lorsque cela fut terminé, les chefs s''approchèrent pour me dire : Le peuple d''Israël, les prêtres et les lévites ne se sont pas séparés des peuples des pays et de leurs abominations, celles des Cananéens, des Hittites, des Perizzites, des Jébusites, des Ammonites, des Moabites, des Egyptiens et des Amorites. '
