          text: mariages mixtes
      - type: text
        text: ', cf. Gn 24.3 ; 28.1,6 ; Ex 34.15s ; Dt 7.2ss ; Jg 3.5s ; 14.3 ; 1R 11.1 ; 16.31 ; voir aussi Gn 41.45 ; Nb 12.1ss ; Dt 21.10ss ; Ez 16.3 ; Rt 1 ; cf. '
