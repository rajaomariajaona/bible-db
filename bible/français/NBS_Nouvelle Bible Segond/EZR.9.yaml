        text: '14.24ss : « Il (le sage) campe près de sa maison (celle de la Sagesse), il fixe le piquet de sa tente dans ses murs. Il dresse sa tente auprès d''elle, il campe au séjour du bonheur. Il place ses enfants sous son abri, sous ses rameaux il demeure. Il est abrité par elle de la chaleur, il campe dans sa gloire. » –  '
