    text: 'Car nous sommes esclaves ; mais notre Dieu ne nous a pas abandonnés à notre esclavage. Il nous a accordé de la faveur devant les rois de Perse, pour nous rendre la vie, afin que nous relevions la maison de notre Dieu et que nous redressions ses ruines, et pour nous donner des murs en Juda et à Jérusalem. '
