      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.4 : « Qu''on ne prenne pas de femme parmi les filles de Canaan, car la race de Canaan sera extirpée du pays » (la consigne est maintes fois répétée dans ce livre) ; '
    - type: usfm
      marker: fqa
