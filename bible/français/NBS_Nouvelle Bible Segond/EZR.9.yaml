      children:
      - type: text
        text: v. 15 ; Dt 2.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 6.24 ; Jr 44.22 ; Né 9.10.'
    marker-yv: yv-n
  - type: text
    text: 'Depuis les jours de nos pères et jusqu''à ce jour nous avons eu de grands torts ; et c''est à cause de nos fautes que nous avons été livrés, nous, nos rois et nos prêtres, aux rois des nations, à l''épée, à la captivité, au pillage et à la honte – voilà pourquoi il en est ainsi en ce jour. '
