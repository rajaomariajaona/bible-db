    text: 'Après tout ce qui nous est arrivé à cause de nos mauvaises actions et de nos grands torts, bien que toi, notre Dieu, tu ne nous aies pas punis en proportion de nos fautes, et maintenant que tu nous as conservé ces rescapés, '
