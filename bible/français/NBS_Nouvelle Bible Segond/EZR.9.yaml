    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''au ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jr 51.9 ; 2Ch 28.9.
    marker-yv: yv-n
  - type: text
    text: 'et je dis : J''ai honte, mon Dieu, je suis confus de lever la face vers toi, mon Dieu : nos fautes se sont multipliées par-dessus nos têtes, et nos torts se sont élevés jusqu''au ciel. '
