    marker-yv: yv-n
  - type: text
    text: 'recommencerions-nous à violer tes commandements et à nous allier par des mariages avec ces peuples et leurs abominations ? Ne t''irriterais-tu pas contre nous au point de nous exterminer, sans laisser ni reste ni rescapés ? '
