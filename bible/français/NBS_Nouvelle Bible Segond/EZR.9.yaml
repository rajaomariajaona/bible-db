    marker-yv: yv-n
  - type: text
    text: Car ils ont pris leurs filles pour eux-mêmes et pour leurs fils et ils ont mêlé la descendance sainte avec les peuples des pays ; les chefs et les magistrats ont été les premiers à commettre ce sacrilège.
