    marker-yv: yv-n
  - type: text
    text: Auprès de moi se rassemblèrent tous ceux qui tremblaient aux paroles du Dieu d'Israël, à cause du sacrilège commis par les exilés ; quant à moi, je restai assis, atterré, jusqu'à l'heure de l'offrande du soir.
