document_id: ISA.49,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le serviteur du Seigneur, lumière des nations
  - type: text
    content: ' '
  - type: note
    content: 'Iles 11.11+ ; 41.1. –  m''a appelé  : cf. 42.1-6. –  depuis le ventre… v. 5 ; 44.2n. –  il a évoqué  : litt. il a fait mémoire , le verbe hébreu est traduit par invoquer en 26.13n  ; 48.1. – Voir nom.'
  - type: text
    content: Iles, écoutez-moi !
  - type: text
    content: Peuples lointains, prêtez attention !
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a appelé depuis le ventre maternel,'
  - type: text
    content: il a évoqué mon nom depuis les entrailles de ma mère.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ap 7.16. –  faim / soif  : cf. Jn 4.14 ; 7.35. –  chaleur torride 35.7n. –  ne les feront plus souffrir  : litt. ne les frapperont pas. –  sources 41.17s.'
  - type: text
    content: Ils n'auront plus faim,
  - type: text
    content: ils n'auront plus soif ;
  - type: text
    content: la chaleur torride et le soleil ne les feront plus souffrir ;
  - type: text
    content: car celui qui a compassion d'eux sera leur guide,
  - type: text
    content: et il les conduira vers des sources.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 40.3+.
  - type: text
    content: Je transformerai toutes mes montagnes en chemins,
  - type: text
    content: et mes routes seront rehaussées.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 43.5+. –  de l''ouest  : litt. de la mer. –  Sinim  : pays non identifié. LXX le pays des Perses. Certains, s''appuyant sur un ms de Qumrân, modifient le texte hébreu traditionnel pour lire Syène (c.-à-d. Assouan, en Haute-Egypte), comme en Ez 29.10 ; 30.6.'
  - type: text
    content: Ils sont là, ils arrivent de loin,
  - type: text
    content: ils arrivent, les uns du nord et de l'ouest,
  - type: text
    content: les autres du pays de Sinim.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ciel… Terre… Montagnes… 44.23+. –  console 40.1+.
  - type: text
    content: Ciel, pousse des cris de joie !
  - type: text
    content: Terre, sois dans l'allégresse !
  - type: text
    content: Montagnes, éclatez en cris de joie !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' console son peuple,'
  - type: text
    content: il a compassion de ses pauvres.
  - type: heading
    content: Jérusalem rebâtie et repeuplée
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.27 ; 54.6 ; 60.15 ; Os 11.8 ; Ps 89.39-52 ; Lm 5.22. –  Le Seigneur / le Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n.'
  - type: text
    content: 'Sion disait : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a abandonnée,'
  - type: text
    content: le Seigneur m'a oubliée !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'fils qui est sorti de son ventre  : cf. Pr 31.2 ; voir aussi Gn 15.4n  ; Jb 19.17. –  Quand elle l''oublierait  : litt. quand elles l''oublieraient. –  je ne t''oublierais pas 44.21n  ; cf. Jr 31.20.'
  - type: text
    content: Une femme oublie-t-elle son nourrisson ?
  - type: text
    content: N'a-t-elle pas compassion du fils qui est sorti de son ventre ?
  - type: text
    content: Quand elle l'oublierait,
  - type: text
    content: moi je ne t'oublierais pas.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sur mes mains  : cf. 44.5.'
  - type: text
    content: Je t'ai gravée sur mes mains ;
  - type: text
    content: tes murs sont constamment devant moi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Tes fils  : des versions anciennes ont lu tes bâtisseurs , comme un ms de Qumrân, ce qui correspond à une autre vocalisation des mêmes consonnes hébraïques ; cf. v. 20 ; 60.4 ; 62.5n.'
  - type: text
    content: Tes fils accourent ;
  - type: text
    content: ceux qui t'ont rasée et réduite en ruines
  - type: text
    content: sortiront de toi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Lève les yeux… 60.4. –  Par ma vie  : litt. je suis vivant , formule de serment ; cf. 45.23 ; Os 4.15.'
  - type: text
    content: 'Lève les yeux et regarde tout autour :'
  - type: text
    content: tous se rassemblent,
  - type: text
    content: ils viennent vers toi.
  - type: text
    content: Par ma vie,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: tu les revêtiras tous comme une parure.
  - type: text
    content: Tu les attacheras à toi,
  - type: text
    content: à la manière d'une mariée.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui te dévoraient  : cf. Jr 51.34.'
  - type: text
    content: Oui, tes ruines, tes lieux dévastés,
  - type: text
    content: cette terre de décombres,
  - type: text
    content: tes habitants y seront désormais à l'étroit ;
  - type: text
    content: et ceux qui te dévoraient s'éloigneront.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'bouche / épée  : cf. Hé 4.12 ; Ap 1.16 ; 19.13n. –  il m''a couvert… 51.16. –  caché  : cf. Dt 32.34.'
  - type: text
    content: Il a rendu ma bouche semblable à une épée acérée,
  - type: text
    content: il m'a couvert de l'ombre de sa main ;
  - type: text
    content: il a fait de moi une flèche aiguë,
  - type: text
    content: il m'a caché dans son carquois.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Ils te le répéteront  : litt. ils diront encore à tes oreilles . –  dont tu avais été privée  : autre traduction que tu avais perdus  ; cf. 47.9 ; Lm 1.5 ; 2.21. –  L''espace… 54.2.'
  - type: text
    content: Ils te le répéteront,
  - type: text
    content: 'ces fils dont tu avais été privée :'
  - type: text
    content: L'espace est trop étroit pour moi ;
  - type: text
    content: fais-moi de la place,
  - type: text
    content: pour que je puisse m'installer.
  '21':
  - type: text
    content: ' '
  - type: note
    content: stérile 54.1. –  élevés 1.2 ; cf. 66.8.
  - type: text
    content: 'Et tu te diras :'
  - type: text
    content: Qui me les a donnés ?
  - type: text
    content: Car j'étais privée d'enfants,
  - type: text
    content: j'étais stérile.
  - type: text
    content: 'J''étais exilée, répudiée :'
  - type: text
    content: qui les a élevés ?
  - type: text
    content: 'J''étais restée seule :'
  - type: text
    content: ceux-ci, où étaient-ils ?
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'bannière 5.26+ ; 11.10-12. –  ramèneront tes fils 60.9. –  dans leurs bras  : litt. dans le sein , terme hébreu rare qui désigne sans doute la poche formée par un pan de vêtement relevé (cf. Né 5.13). Voir encore Es 60.4 (autre terme) ; Baruch 5.6 : « Ils sortirent de tes portes à pied, poussés par des ennemis, mais Dieu les fit revenir vers toi, portés glorieusement comme sur un trône royal. »'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Je lèverai ma main vers les nations,
  - type: text
    content: j'élèverai ma bannière vers les peuples ;
  - type: text
    content: ils ramèneront tes fils dans leurs bras,
  - type: text
    content: ils porteront tes filles sur leurs épaules.
  '23':
  - type: text
    content: ' '
  - type: note
    content: nourriciers / nourrices 60.16. –  se prosterneront v. 7 ; 60.14+. –  tu sauras 41.20 ; 43.10 ; 45.6 ; Ez 6.7+. –  ceux qui m'espèrent ou qui mettent en moi leur espérance 30.18+ ; cf. 51.5+.
  - type: text
    content: Des rois seront tes nourriciers,
  - type: text
    content: et leurs princesses tes nourrices ;
  - type: text
    content: ils se prosterneront devant toi, face contre terre,
  - type: text
    content: et ils lécheront la poussière de tes pieds ;
  - type: text
    content: 'ainsi tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: et ceux qui m'espèrent ne seront pas honteux.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'du guerrier  : cf. Mt 12.29. –  juste  : un ms de Qumrân et plusieurs versions anciennes lisent ici brute , comme au v. 25.'
  - type: text
    content: Le butin du guerrier lui sera-t-il repris ?
  - type: text
    content: La capture du juste échappera-t-elle ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'la capture du guerrier… Jr 31.11 ; Mc 3.27+/ /. –  j''attaquerai  : le verbe correspondant est aussi traduit par accuser, chercher querelle  ; cf. 41.11n  ; cf. Ps 35.1n  ; autre traduction celui qui te prend à partie, c''est moi qui le prendrai à partie.'
  - type: text
    content: 'En effet, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: la capture du guerrier sera reprise,
  - type: text
    content: et le butin de la brute échappera ;
  - type: text
    content: j'attaquerai ceux qui t'attaquent
  - type: text
    content: et je sauverai tes fils.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'leur propre chair  : cf. 9.19. –  ils s''enivreront de leur sang 63.6 ; cf. Ap 16.4-6. –  tous  : litt. toute chair. –  Sauveur 43.3+. –  rédempteur 41.14n. –  Indomptable de Jacob 60.16 ; cf. 1.24 ; 46.12 ; Gn 49.24n.'
  - type: text
    content: Ceux qui t'exploitent, je leur ferai manger leur propre chair ;
  - type: text
    content: ils s'enivreront de leur sang comme de vin nouveau ;
  - type: text
    content: 'ainsi tous sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Sauveur,'
  - type: text
    content: ton rédempteur, l'Indomptable de Jacob.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'mon serviteur 41.8+ ; cf. v. 5. –  ma splendeur  : cf. 44.23.'
  - type: text
    content: 'Et il m''a dit : Tu es mon serviteur, Israël,'
  - type: text
    content: c'est en toi que je montre ma splendeur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'pour rien…  : cf. 65.23 ; Jr 51.58. –  le chaos 45.18n. –  mon droit…  : cf. 40.27.'
  - type: text
    content: 'Mais moi, j''ai dit :'
  - type: text
    content: C'est pour rien que je me suis fatigué,
  - type: text
    content: c'est pour le chaos, la futilité, que j'ai épuisé ma force ;
  - type: text
    content: 'assurément, mon droit est auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: et ma récompense auprès de mon Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'depuis le ventre de ma mère v. 1. –  ramener  : ici la mission du serviteur le distingue d''Israël ; cf. v. 3 ; Mt 23.37 ; Jn 11.52. –  pour qu''Israël soit rassemblé auprès de lui  : d''après une lecture traditionnelle du texte hébreu, un ms de Qumrân et des versions anciennes ; autre lecture pour qu''Israël ne soit pas rassemblé . D''après Syr, certains modifient le texte hébreu traditionnel de façon à lire pour que j''assemble… –  glorifié  : cf. 43.4.'
  - type: text
    content: 'Maintenant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parle,'
  - type: text
    content: lui qui me façonne depuis le ventre de ma mère
  - type: text
    content: pour que je sois son serviteur,
  - type: text
    content: pour ramener à lui Jacob,
  - type: text
    content: pour qu'Israël soit rassemblé auprès de lui ;
  - type: text
    content: 'je suis glorifié aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car mon Dieu a été ma force.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 13.47. –  relever les tribus de Jacob  : Siracide 48.10 applique cette expression au retour d''Elie. –  les restes  : litt. les préservés  ; une autre forme du même verbe est traduite par protéger au v. 8. –  lumière des nations 42.6+. –  pour que mon salut parvienne  : autre traduction pour que tu sois mon salut. –  jusqu''aux extrémités  : litt. jusqu''à l''extrémité  ; cf. 45.22+.'
  - type: text
    content: 'Il a dit : C''est peu de chose que tu sois mon serviteur'
  - type: text
    content: pour relever les tribus de Jacob
  - type: text
    content: 'et pour ramener les restes d''Israël :'
  - type: text
    content: j'ai fait de toi la lumière des nations,
  - type: text
    content: pour que mon salut parvienne
  - type: text
    content: jusqu'aux extrémités de la terre.
  - type: heading
    content: La délivrance des exilés
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 8,22,25). –  le rédempteur…  : litt. le rédempteur (41.14n) d''Israël, son Saint (cf. 1.4+). –  celui dont la vie (sur le mot correspondant, voir Gn 1.20n) est méprisée  : traduction d''après un ms de Qumrân et plusieurs versions anciennes (53.3+). Le texte hébreu traditionnel pourrait aussi être lu, avec LXX, celui qui méprise sa vie. –  que la nation…  : traduction d''après des versions anciennes. Hébreu celui qui a la nation (ou, peut-être, les non-Juifs, les païens ) en abomination. –  l''esclave  : le même mot a été traduit par serviteur dans les v. précédents, cf. 42.1+. –  des rois le verront… v. 23 ; 52.15.'
  - type: text
    content: 'Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: le rédempteur, le Saint d'Israël,
  - type: text
    content: à celui dont la vie est méprisée,
  - type: text
    content: celui que la nation a en abomination,
  - type: text
    content: 'l''esclave des dominateurs :'
  - type: text
    content: des rois le verront et ils se lèveront,
  - type: text
    content: des princes et ils se prosterneront,
  - type: text
    content: 'à cause du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui est digne de confiance,'
  - type: text
    content: du Saint d'Israël, qui t'a choisi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Au temps de la faveur  : cf. 61.2 ; 2Co 6.2. –  je te préserve (ou je te façonne  ; cf. v. 6n) … 42.6n. –  peuple 40.7+.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Au temps de la faveur je t'ai répondu
  - type: text
    content: et au jour du salut je t'ai secouru ;
  - type: text
    content: je te préserve pour faire de toi
  - type: text
    content: l'alliance du peuple,
  - type: text
    content: pour relever le pays
  - type: text
    content: et pour distribuer les patrimoines dévastés ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Sortez 42.7 ; 48.20. –  Paraissez  : litt. soyez découverts (cf. 47.2n). –  sur les chemins  : LXX sur tous les chemins. –  pistes 41.18n.'
  - type: text
    content: 'pour dire aux prisonniers : Sortez !'
  - type: text
    content: 'et à ceux qui sont dans les ténèbres : Paraissez !'
  - type: text
    content: Ils pourront paître sur les chemins
  - type: text
    content: et ils trouveront des pâturages sur toutes les pistes.
