      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A la suite de cette petite pièce poétique, LXX ajoute qu''elle est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'écrite dans le Livre des Odes '
      - type: usfm
        marker: ft
        children:
        - type: text
