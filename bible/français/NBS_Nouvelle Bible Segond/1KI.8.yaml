    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 6.3-11
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 55.
      marker-yv: yv-n
    - type: text
      text: 'Le roi se retourna et bénit toute l''assemblée d''Israël. Toute l''assemblée d''Israël était debout. '
