      marker-yv: yv-n
    - type: text
      text: 'Il dit : Béni soit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, qui, de sa bouche, a parlé à David, mon père, et qui, de sa main, a accompli ce qu''il avait dit : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 12.11 ; 2S 7.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'où résiderait mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que mon nom soit là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 29 ; 2R 23.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la tête d'Israël, mon peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur mon peuple Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 2Ch 6.6.'
      marker-yv: yv-n
    - type: text
      text: '« Depuis le jour où j''ai fait sortir d''Egypte Israël, mon peuple, je n''ai pas choisi de ville parmi toutes les tribus d''Israël pour qu''y soit bâtie une maison où résiderait mon nom ; mais j''ai choisi David pour qu''il soit à la tête d''Israël, mon peuple. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'David… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il fut avec le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' de David, mon père'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression hébraïque v. 18 ; 10.2 ; 1Ch 22.7 ; 2Ch 9.1 ; voir aussi 2S 7.2ss ; 1Ch 17.1ss.'
      marker-yv: yv-n
    - type: text
      text: 'David, mon père, a eu à cœur de bâtir une maison pour le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a dit à David, mon père : « Puisque tu as eu à cœur de bâtir une maison pour mon nom, tu as bien fait d''avoir eu cela à cœur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sorti de tes reins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression hébraïque rare ; cf. Gn 35.11 ; 2Ch 6.9 ; voir aussi 2S 7.12 ; 16.11 ; Es 48.19 ; 2Ch 32.21 (expression similaire).'
      marker-yv: yv-n
    - type: text
      text: 'Seulement, ce n''est pas toi qui bâtiras la Maison ; mais ce sera ton fils, celui qui est sorti de tes reins ; c''est lui qui bâtira la maison pour mon nom. » '
