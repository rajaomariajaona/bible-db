document_id: 1KI.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le coffre de l'alliance déposé dans le temple
  - type: heading
    content: 2Ch 5.2–6.2
  - type: text
    content: ' '
  - type: note
    content: 'le roi Salomon rassembla auprès de lui  : litt. Salomon rassembla auprès du roi Salomon . Le texte des v. 1-5, dans certains mss grecs, est plus court en plusieurs endroits. –  rassembla  : le verbe (aussi au v. 2 ; 12.21) évoque habituellement l’ assemblée cultuelle, cf. v. 14,22,55,65 ; 12.3.'
  - type: text
    content: 'Alors le roi Salomon rassembla auprès de lui, à Jérusalem, les anciens d''Israël et tous les chefs des tribus, les princes des familles des Israélites, pour faire monter de la Ville de David, c''est-à-dire Sion, le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la nuée remplit…  : cf. Ex 40.34.'
  - type: text
    content: 'Au moment où les prêtres sortaient du sanctuaire, la nuée remplit la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'Cf. Ex 40.34s. –  à cause de la nuée  : cf. Ex 19.16 ; Dt 4.11 ; voir aussi Ex 16.10 ; 24.16 ; Nb 9.15-23 ; Ez 43.2,4s ; 11.22s. –  la gloire du Seigneur remplissait… Ex 40.33ss ; Nb 14.21.'
  - type: text
    content: 'Les prêtres ne pouvaient plus se tenir là pour officier, à cause de la nuée ; car la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplissait la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: obscurité épaisse Ex 20.21n.
  - type: text
    content: 'Alors Salomon dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit qu''il demeurerait dans l''obscurité épaisse !'
  '13':
  - type: text
    content: ' '
  - type: note
    content: A la suite de cette petite pièce poétique, LXX ajoute qu'elle est écrite dans le Livre des Odes (ou des Chants ).
  - type: text
    content: Ainsi j'ai bâti une maison qui sera ta résidence,
  - type: text
    content: un lieu où tu habiteras toujours !
  - type: heading
    content: Discours de consécration du temple
  - type: heading
    content: 2Ch 6.3-11
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 55.
  - type: text
    content: 'Le roi se retourna et bénit toute l''assemblée d''Israël. Toute l''assemblée d''Israël était debout. '
  '15':
  - type: note
    content: 'Béni soit le Seigneur v. 56. –  de sa main  : cf. Ex 3.19s ; 6.1 ; 13.9 ; Dt 5.15 ; Ez 20.33 ; Ps 136.12 ; Dn 9.15.'
  - type: text
    content: 'Il dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui, de sa bouche, a parlé à David, mon père, et qui, de sa main, a accompli ce qu''il avait dit : '
  '16':
  - type: note
    content: 'Cf. Dt 12.11 ; 2S 7.6. –  où résiderait mon nom  : litt. pour que mon nom soit là  ; cf. v. 29 ; 2R 23.27. –  à la tête d''Israël, mon peuple  : litt. sur mon peuple Israël, de même en 2Ch 6.6.'
  - type: text
    content: '« Depuis le jour où j''ai fait sortir d''Egypte Israël, mon peuple, je n''ai pas choisi de ville parmi toutes les tribus d''Israël pour qu''y soit bâtie une maison où résiderait mon nom ; mais j''ai choisi David pour qu''il soit à la tête d''Israël, mon peuple. » '
  '17':
  - type: note
    content: David… litt. il fut avec le cœur de David, mon père  ; même expression hébraïque v. 18 ; 10.2 ; 1Ch 22.7 ; 2Ch 9.1 ; voir aussi 2S 7.2ss ; 1Ch 17.1ss.
  - type: text
    content: 'David, mon père, a eu à cœur de bâtir une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '18':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit à David, mon père : « Puisque tu as eu à cœur de bâtir une maison pour mon nom, tu as bien fait d''avoir eu cela à cœur. '
  '19':
  - type: note
    content: 'sorti de tes reins  : expression hébraïque rare ; cf. Gn 35.11 ; 2Ch 6.9 ; voir aussi 2S 7.12 ; 16.11 ; Es 48.19 ; 2Ch 32.21 (expression similaire).'
  - type: text
    content: 'Seulement, ce n''est pas toi qui bâtiras la Maison ; mais ce sera ton fils, celui qui est sorti de tes reins ; c''est lui qui bâtira la maison pour mon nom. » '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Tous les hommes…  : cf. Dt 27.14n. –  au mois (6.37n) d''Etanim  : ce mois fait partie d''un ancien calendrier cananéen et correspond à septembre-octobre. Cf. 6.37n-38n. La fête célébrée à ce moment-là est celle des Huttes. –  pour la fête  : autre traduction pendant la fête.'
  - type: text
    content: Tous les hommes d'Israël se rassemblèrent auprès du roi Salomon, au mois d'Etanim, pour la fête – c'était le septième mois.
  '20':
  - type: note
    content: Cf. Ac 7.47+. –  réalisé (litt. fait levé ou dressé  ; autre traduction confirmé, cf. 2.4n) / J'ai succédé à (litt. je me suis levé à la place de, cf. Nb 32.14) traduisent deux formes du même verbe hébreu.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a réalisé la parole qu''il avait dite. J''ai succédé à David, mon père, je me suis assis sur le trône d''Israël, comme l''avait dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et j''ai bâti la maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '21':
  - type: note
    content: 'ai réservé  : le verbe hébreu correspondant, fréquent, est habituellement traduit par mettre ou placer. –  l''alliance  : il s''agit des tablettes de pierre du v. 9+. –  avec nos pères…  : 2Ch 6.11 porte un texte plus bref avec les Israélites.'
  - type: text
    content: 'J''y ai réservé un lieu pour le coffre où est l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celle qu''il a conclue avec nos pères quand il les a fait sortir d''Egypte.'
  - type: heading
    content: La prière solennelle de Salomon
  - type: heading
    content: 2Ch 6.12-40
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon se tint debout…  : autre traduction Salomon se plaça…  ; cf. v. 54. –  Il tendit les mains vers le ciel  : geste accompagnant la prière dans l''Antiquité ; cf. v. 38,54.'
  - type: text
    content: 'Salomon se tint debout devant l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', en face de toute l''assemblée d''Israël. Il tendit les mains vers le ciel '
  '23':
  - type: note
    content: 'il n''y a pas de dieu semblable à toi  : cf. v. 60+ ; 2S 7.22 ; Ps 86.8 ; 1Ch 17.20 (même expression hébraïque) ; voir aussi Ex 15.11 ; Ps 35.10 ; 71.19 ; 89.9 (expression hébraïque légèrement différente). –  tu gardes l''alliance et la fidélité Né 1.5+. –  tes serviteurs qui marchent devant toi  : cf. v. 25 ; Gn 17.1 ; 24.40 ; 48.15 ; Ps 56.14 ; 116.9. –  de tout leur cœur  : cf. Dt 4.29 ; 6.5 ; 10.12 ; 11.13 ; 26.16 ; Jr 29.13.'
  - type: text
    content: 'et dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu d''Israël, il n''y a pas de dieu semblable à toi, ni dans le ciel, en haut, ni sur la terre, en bas : tu gardes l''alliance et la fidélité envers tes serviteurs qui marchent devant toi de tout leur cœur. '
  '24':
  - type: note
    content: 'Cf. v. 15. –  gardé  : autre traduction observé, même possibilité au v. 25. –  ce que tu avais dit…  : autre traduction ce que tu dis, par ta bouche, tu l''accomplis par ta main, comme on le voit aujourd''hui  ; cf. v. 61 ; Dt 2.30n.'
  - type: text
    content: 'Ainsi tu as gardé pour ton serviteur David, mon père, ce que tu lui avais dit ; ce que tu avais dit, de ta bouche, tu l''as accompli de ta main – voilà pourquoi il en est ainsi en ce jour. '
  '25':
  - type: note
    content: 'garde v. 24n. –  Tu auras toujours…  : cf. 2.4n  ; 9.5 ; 2S 7.12-16. – Voir fils. –  qu''ils marchent devant moi  : cf. v. 23+.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, garde pour ton serviteur David, mon père, ce que tu lui as dit : « Tu auras toujours devant moi un successeur assis sur le trône d''Israël, pourvu que tes fils gardent leur voie et qu''ils marchent devant moi comme tu as marché devant moi. » '
  '26':
  - type: note
    content: 'Maintenant, Dieu d''Israël…  : de nombreux mss hébreux, LXX, Syr, Tg et Vg ont lu ici maintenant, Seigneur (YHWH), Dieu d''Israël (comme en 2Ch 6.17). –  que se confirme…  : cf. Gn 42.20 ; 1Ch 17.24. –  la parole…  : d''après une lecture traditionnelle du texte hébreu (litt. ta parole…) ; autre lecture traditionnelle les paroles (litt. tes paroles) que tu as dites.'
  - type: text
    content: Maintenant, Dieu d'Israël, je t'en prie, que se confirme la parole que tu as dite à ton serviteur David, mon père !
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu habiterait-il… sur la terre ? LXX ajoute ici avec l''être humain  ; voir Es 66.1 ; Jr 23.23s ; Ps 139.7-12. –  Le ciel et le ciel du ciel ou les cieux et les cieux des cieux (Gn 1.1n) : cf. Dt 10.14n  ; Ps 148.4 ; Né 9.6 ; 2Ch 2.4s. –  combien moins…  : cf. Es 66.1.'
  - type: text
    content: 'Mais Dieu habiterait-il vraiment sur la terre ? Le ciel et le ciel du ciel ne peuvent te contenir : combien moins cette maison que j''ai bâtie ! '
  '28':
  - type: note
    content: 'le cri  : le terme hébreu correspondant désigne aussi, souvent, un cri de joie. –  que moi, ton serviteur, je t''adresse  : litt. que ton serviteur prie devant toi.'
  - type: text
    content: 'Cependant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, tu te tourneras vers ma prière, vers ma supplication, pour entendre le cri, la prière, que moi, ton serviteur, je t''adresse aujourd''hui. '
  '29':
  - type: note
    content: 'Que tes yeux…  : cf. v. 52. –  nuit et jour  : cf. v. 59 ; 2Ch 6.20  : jour et nuit. Cf. Ps 134.1s ; 1Ch 9.33. –  sur cette maison  : litt. vers cette maison. –  Là sera mon nom  : cf. Dt 12.5-14. –  Entends la prière…  : litt. pour entendre la prière que ton serviteur prie vers ce lieu. –  vers ce lieu v. 30,35,42.'
  - type: text
    content: 'Que tes yeux soient ouverts nuit et jour sur cette maison, sur le lieu dont tu as dit : « Là sera mon nom. » Entends la prière que je fais vers ce lieu. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Tous les anciens d''Israël arrivèrent  : cette partie de v. est omise par LXX. –  les prêtres  : cf. 2Ch 5.4n.'
  - type: text
    content: 'Tous les anciens d''Israël arrivèrent, et les prêtres portèrent le Coffre. '
  '30':
  - type: note
    content: 'vers ce lieu v. 29+ ; c''est la même préposition qui est traduite ici par vers, en et dans  ; elle est aussi présente dans la formule traduite par Tu entendras (litt. tu entendras vers) ma supplication. –  Toi, tu entendras… v. 34,36,39,43,45,49. –  en ce lieu que tu habites  : autre traduction en ce lieu où tu es assis (comme juge, ou comme roi) ; cf. Ps 2.4 ; 123.1. –  tu pardonneras  : cf. v. 34+.'
  - type: text
    content: Tu entendras ma supplication et celle d'Israël, ton peuple, lorsque nous prierons vers ce lieu. Toi, tu entendras, en ce lieu que tu habites, dans le ciel ; tu entendras et tu pardonneras.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Voir péché . –  une adjuration  : autre traduction une malédiction (voir bénédiction, malédiction) ; il s''agit de la malédiction conditionnelle qu''on invoquait sur soi-même en cas de parjure ; cf. Lv 5.1n  ; Nb 5.21nss ; Pr 29.24. –  s''il vient pour l''adjuration  : autre traduction si son adjuration vient.'
  - type: text
    content: 'Si quelqu''un commet un péché contre son prochain et qu''on lui impose une adjuration, s''il vient pour l''adjuration devant ton autel, dans cette maison, '
  '32':
  - type: note
    content: 'tu entendras, dans le ciel  : l''hébreu pourrait aussi signifier tu entendras le ciel, de même dans la suite ; cf. v. 30n. –  condamner le coupable / acquitter le juste  : autre traduction déclarer méchant le méchant / déclarer juste (ou justifier) le juste  ; cf. Ex 22.8n  ; 23.7n  ; Dt 25.1n. –  faire retomber sa voie sur sa tête  : c.-à-d. lui faire subir les conséquences de sa conduite  ; cf. v. 36,39.'
  - type: text
    content: toi, tu entendras, dans le ciel ; tu agiras et tu jugeras tes serviteurs pour condamner le coupable et faire retomber sa voie sur sa tête, pour acquitter le juste et le traiter selon sa justice.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'battu par  : autres traductions battu devant ; frappé d''un fléau devant  ; cf. Lv 26.17n. –  s''ils reviennent à toi  : cf. Dt 30.2 ; 1S 7.3 ; 2R 23.25 ; 2Ch 30.6. –  célèbrent ton nom  : le verbe hébreu correspondant (de même au v. 35) évoque souvent la confession des péchés (cf. Ps 26.7n  ; 32.5 ; Pr 28.13 ; Dn 9.4 ; Esd 10.1 ; Né 9.3 ; voir aussi Ps 54.8 ; 106.47 ; 122.4).'
  - type: text
    content: 'Quand Israël, ton peuple, sera battu par l''ennemi, parce qu''ils auront péché contre toi, s''ils reviennent à toi et célèbrent ton nom, s''ils t''adressent des prières, des supplications, dans cette maison, '
  '34':
  - type: note
    content: 'V. 30n. –  Tu pardonneras le péché d''Israël  : cf. v. 36,50 ; voir aussi v. 30,39 ; Ex 34.9 ; Nb 14.20 ; Jr 33.8 ; 36.3 ; Ps 25.11 ; Lm 3.42. –  tu les ramèneras…  : cf. v. 46 ; voir « Exils successifs à partir du VIIIe siècle av. J.-C. »♦ ; « L''Exil et la Bible »♦.'
  - type: text
    content: toi, tu entendras, dans le ciel. Tu pardonneras le péché d'Israël, ton peuple ; tu les ramèneras sur la terre que tu as donnée à leurs pères.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Quand le ciel…  : cf. 17.1 ; 18.1 ; Jr 14.1-7 ; Jl 1 ; 2.12-17,22. –  parce qu''ils auront péché  : cf. Lv 26.18s ; Dt 28.20-24 ; Jr 14.7. –  parce que tu les auras affligés  : cf. Dt 8.2n  ; il faut peut-être lire ainsi, d''après LXX (qui modifie légèrement l''orthographe dans le verbe hébreu des mss qui portent  : parce que tu leur auras répondu ).'
  - type: text
    content: 'Quand le ciel sera fermé et qu''il n''y aura pas de pluie, parce qu''ils auront péché contre toi ; s''ils prient vers ce lieu, célèbrent ton nom et reviennent de leurs péchés, parce que tu les auras affligés, '
  '36':
  - type: note
    content: 'toi, tu entendras… v. 30+. –  tu pardonneras le péché… v. 34+. –  de tes serviteurs  : quelques mss hébreux et LXX ont lu de ton serviteur. –  tu feras venir la pluie…  : cf. Dt 11.10s. –  donné comme patrimoine  : cf. Dt 4.21 ; 12.9 ; Es 58.14 ; Jr 12.14 ; 17.4 ; Ps 105.11 ; 1Ch 16.18.'
  - type: text
    content: toi, tu entendras, dans le ciel ; tu pardonneras le péché de tes serviteurs et d'Israël, ton peuple. Car tu leur enseigneras la bonne voie qu'ils doivent suivre, et tu feras venir la pluie sur ton pays, celui que tu as donné comme patrimoine à ton peuple.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'peste  : cf. Jr 14.12 ; 21.6 ; Am 4.10 ; Ps 91.3,6. –  la rouille, la nielle  : cf. Dt 28.22 ; Ag 2.17. –  le criquet, la sauterelle  : cf. Jl 1.4n  ; Ps 105.34 ; voir aussi Lv 22.11 ; 26.16,19,25s. –  dans son pays, aux portes de ses villes  : litt. dans le pays de ses portes  ; cf. Dt 5.14 ; 12.12 ; 16.18n  ; 28.52. –  fléaux  : le même terme est traduit par plaie au v. 38.'
  - type: text
    content: 'Quand il y aura la famine dans le pays, quand il y aura la peste, quand il y aura la rouille, la nielle, le criquet, la sauterelle, quand l''ennemi assiégera ton peuple dans son pays, aux portes de ses villes, quand il y aura toutes sortes de fléaux et de maladies, '
  '38':
  - type: note
    content: 'de tout homme  : autre traduction pour tout homme. –  pour tout ton peuple, pour Israël  : autres traductions de tout ton peuple, Israël ; et tout ton peuple, Israël  ; le texte correspondant est omis par LXX à cet endroit mais figure dans 2Ch 6.29. –  tendra les mains  : cf. v. 22n  ; Ps 28.2 ; 134.2.'
  - type: text
    content: 'chaque prière, chaque supplication de tout homme pour tout ton peuple, pour Israël – alors que chacun connaîtra la plaie de son cœur et tendra les mains vers cette maison – '
  '39':
  - type: note
    content: 'toi, tu l''entendras… v. 30n. –  tu pardonneras  : cf. v. 34+. –  tu agiras  : cf. 1S 14.6 ; Jr 14.7 ; Ps 22.32 ; 37.5. –  toi seul connais…  : cf. 1S 16.7 ; Jr 11.20 ; 17.10 ; 20.12 ; Lc 16.15.'
  - type: text
    content: 'toi, tu l''entendras, dans le ciel, le lieu que tu habites ; tu pardonneras, tu agiras et tu rendras à chacun selon toutes ses voies, parce que tu connais son cœur ; car toi seul connais le cœur de tous les humains. '
  '4':
  - type: note
    content: 'Ils firent monter le coffre du Seigneur  : cette partie de v. est omise par LXX. –  tente de la Rencontre Ex 27.21+. –  sacrés  : voir saint. –  ce sont les prêtres et les lévites…  : absent de LXX.'
  - type: text
    content: 'Ils firent monter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la tente de la Rencontre et tous les ustensiles sacrés qui étaient dans la tente : ce sont les prêtres et les lévites qui les firent monter. '
  '40':
  - type: note
    content: 'ils te craindront…  : cf. Dt 31.13. –  sur la terre  : litt. sur la face du sol  ; même expression en 9.7 ; 13.34 ; 17.14.'
  - type: text
    content: Ainsi ils te craindront tous les jours qu'ils vivront sur la terre que tu as donnée à nos pères.
  '41':
  - type: text
    content: ' '
  - type: note
    content: Voir Es 2.2s ; 56.6s ; Jr 16.19 ; Za 8.20ss.
  - type: text
    content: 'De même pour l''étranger, celui qui n''est pas d''Israël, ton peuple ; quand il viendra d''un pays lointain, à cause de ton nom, '
  '42':
  - type: note
    content: 'ton grand nom  : cf. Jos 7.9 ; 1S 12.22 ; Jr 10.6 ; 44.26 ; Ez 36.23 ; Ps 76.2 ; 99.3. –  main forte / bras étendu  : cf. Dt 4.34 ; 5.15 ; 7.19 ; 11.2.'
  - type: text
    content: '– car on entendra parler de ton grand nom, de ta main forte et de ton bras étendu – quand il viendra prier vers cette maison, '
  '43':
  - type: note
    content: toi, tu entendras v. 30+.
  - type: text
    content: toi, tu entendras, dans le ciel, le lieu que tu habites, et tu accorderas à l'étranger tout ce pour quoi il t'aura invoqué, afin que tous les peuples de la terre connaissent ton nom et te craignent, comme Israël, ton peuple, et qu'ils sachent que ton nom est invoqué sur cette maison que j'ai bâtie !
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'partira  : litt. sortira . –  ses ennemis  : litt. son ennemi (2Ch 6.34 ses ennemis ). –  dans la direction de la ville…  : cf. v. 48.'
  - type: text
    content: 'Quand ton peuple partira en guerre contre ses ennemis, par le chemin sur lequel tu l''auras envoyé, s''ils prient le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans la direction de la ville que tu as choisie et de la maison que j''ai bâtie pour ton nom, '
  '45':
  - type: note
    content: 'V. 30n. –  tu défendras leur droit  : autre traduction tu prendras en main leur cause  ; cf. v. 49,59 ; 3.28n.'
  - type: text
    content: tu entendras dans le ciel leurs prières, leurs supplications, et tu défendras leur droit !
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'car il n''y a pas d''être humain qui ne pèche  : cf. Ps 25.7 ; 51.7 ; 130.3 ; 143.2 ; Jb 4.17 ; 13.26 ; 14.4 ; 15.14-16 ; 25.4-6 ; Pr 20.9 ; Ec 7.20. –  en captivité v. 34+.'
  - type: text
    content: 'Quand ils pécheront contre toi, – car il n''y a pas d''être humain qui ne pèche – quand tu seras en colère contre eux et que tu les livreras devant l''ennemi, quand ceux qui les auront faits captifs les emmèneront en captivité dans un pays ennemi, lointain ou proche, '
  '47':
  - type: note
    content: 's''ils réfléchissent  : litt. s''ils font revenir vers leur cœur  ; cf. Es 44.19n. –  Nous avons péché…  : cf. Ps 106.6 ; Dn 9.15.'
  - type: text
    content: 's''ils réfléchissent dans le pays où ils auront été emmenés captifs, s''ils reviennent, s''ils t''adressent des supplications au pays de ceux qui les ont emmenés captifs et qu''ils disent : « Nous avons péché, nous avons commis des fautes, nous avons agi en méchants ! », '
  '48':
  - type: note
    content: 'de tout leur cœur et de toute leur âme (cf. Gn 1.20n) 2.4+. –  en direction du pays… de la ville…  : cf. v. 44.'
  - type: text
    content: 's''ils reviennent à toi de tout leur cœur et de toute leur âme et si, au pays de leurs ennemis qui les ont emmenés captifs, ils te prient en direction du pays que tu as donné à leurs pères, de la ville que tu as choisie et de la maison que j''ai bâtie pour ton nom, '
  '49':
  - type: note
    content: 'tu entendras dans le ciel… v. 30n. –  leurs prières…  : absent de LXX. –  tu défendras leur droit  : cf. v. 45n,59 ; 3.28n.'
  - type: text
    content: 'tu entendras dans le ciel, le lieu que tu habites, leurs prières, leurs supplications, et tu défendras leur droit. '
  '5':
  - type: note
    content: 'Salomon et… la communauté  : absent de LXX (le roi et tout Israël). –  rassemblée auprès de lui  : absent de LXX. –  avec lui  : absent de 2Ch 5.6. –  ni le compter ni l''évaluer  : cf. 3.8 ; Gn 13.16 ; Ec 1.15.'
  - type: text
    content: 'Le roi Salomon et toute la communauté d''Israël rassemblée auprès de lui, avec lui devant le Coffre, sacrifiaient du petit bétail et du gros bétail, en si grand nombre qu''on ne pouvait ni le compter ni l''évaluer. '
  '50':
  - type: note
    content: 'Tu pardonneras… v. 34n. –  tu leur accorderas…  : litt. tu les donneras (ou tu les livreras) à la compassion devant ceux…  ; même expression hébraïque en Ps 106.46 ; cf. Né 1.11.'
  - type: text
    content: 'Tu pardonneras à ton peuple, qui a péché contre toi, tu pardonneras toutes les transgressions qu''ils ont commises contre toi ; tu leur accorderas la compassion de ceux qui les ont emmenés captifs, et ils auront compassion d''eux. '
  '51':
  - type: note
    content: 'ton peuple et ton patrimoine  : cf. Dt 9.26,29 ; Jl 2.17 ; Mi 7.14 ; Ps 28.9 ; 94.5. –  sortir de l''Egypte, du creuset à fondre le fer  : cf. Dt 4.20+ ; Jr 11.4.'
  - type: text
    content: Car ils sont ton peuple et ton patrimoine, ceux que tu as fait sortir de l'Egypte, du creuset à fondre le fer.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'Que tes yeux…  : cf. v. 29+.'
  - type: text
    content: 'Que tes yeux soient ouverts sur ma supplication et sur la supplication d''Israël, ton peuple ! Entends-nous chaque fois que nous t''invoquerons ! '
  '53':
  - type: note
    content: 'Car c''est toi qui nous as séparés  : cf. Ex 6.7 ; 19.5s ; Lv 20.24-26 ; Dt 4.34 ; 7.6 ; 14.2 ; 26.18 ; Ps 135.4. –  ton patrimoine  : cf. Dt 4.20n  ; 9.26. –  Seigneur Dieu 2.26+.'
  - type: text
    content: 'Car c''est toi qui nous as séparés de tous les peuples de la terre pour faire de nous ton patrimoine, comme tu l''as dit par l''intermédiaire de Moïse, ton serviteur, quand tu fis sortir d''Egypte nos pères, Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  !'
  - type: heading
    content: Salomon demande à Dieu de bénir le peuple
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'il se leva de devant l''autel… les mains tendues vers le ciel  : cf. v. 22n.'
  - type: text
    content: 'Lorsque Salomon eut achevé d''adresser au '
  - type: text
    content: Seigneur
  - type: text
    content: ' toute cette prière, cette supplication, il se leva de devant l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', où il s''était agenouillé, les mains tendues vers le ciel. '
  '55':
  - type: note
    content: V. 14.
  - type: text
    content: 'Debout, il bénit toute l''assemblée d''Israël, en disant d''une voix forte : '
  '56':
  - type: note
    content: 'Béni soit le Seigneur v. 15. –  le repos  : autre traduction un lieu de repos  ; cf. Dt 12.9 ; Es 66.1 ; Ps 95.11 ; 132.8,14 ; voir aussi Za 9.1n. –  aucune n''est restée sans effet  : cf. Jos 21.45n  ; 23.14 ; 2R 10.10.'
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a donné le repos à Israël, son peuple, exactement comme il l''avait dit ! De toutes les bonnes paroles qu''il avait dites par l''intermédiaire de Moïse, son serviteur, aucune n''est restée sans effet. '
  '57':
  - type: note
    content: 'soit avec nous  : cf. Gn 26.3 ; 28.15 ; 31.3 ; Ex 3.12 ; Jos 1.5 ; Jg 1.19. –  qu''il ne nous abandonne pas…  : cf. Dt 31.6.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, soit avec nous, comme il a été avec nos pères ; qu''il ne nous abandonne pas, qu''il ne nous délaisse pas, '
  '58':
  - type: note
    content: 'qu''il incline notre cœur vers lui  : cf. Ps 119.36 ; 141.4 ; voir aussi Jos 24.23 ; 1R 11.2s. –  ses commandements…  : cf. Dt 4.2n.'
  - type: text
    content: 'mais qu''il incline notre cœur vers lui, afin que nous suivions toutes ses voies et que nous observions ses commandements, ses prescriptions et ses règles, tels qu''il les a institués pour nos pères ! '
  '59':
  - type: note
    content: 'jour et nuit  : cf. v. 29n. –  chaque jour  : litt. du jour dans son jour  ; même expression hébraïque en Ex 16.4n  ; Lv 23.37n  ; 2R 25.30 (selon l''ordre de chaque jour). –  il défende mon droit v. 49n.'
  - type: text
    content: 'Que ces paroles que j''ai présentées comme une supplication devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soient jour et nuit présentes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, et que chaque jour il défende mon droit, et le droit d''Israël, son peuple, '
  '6':
  - type: note
    content: 'en son lieu  : autre traduction à sa place  ; cf. 2S 6.17.'
  - type: text
    content: 'Les prêtres amenèrent le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en son lieu, dans le Secret de la Maison, dans le Très-Sacré, sous les ailes des keroubim. '
  '60':
  - type: note
    content: 'c''est le Seigneur (YHWH) qui est Dieu  : cf. 18.39+. –  il n''y en a pas d''autre  : cf. v. 23n  ; Dt 4.35,39.'
  - type: text
    content: 'afin que tous les peuples de la terre sachent que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu ; il n''y en a pas d''autre. '
  '61':
  - type: note
    content: 'Que votre cœur soit tout entier avec le Seigneur  : cf. 11.4 ; 15.3s ; voir aussi 2R 20.3 ; Es 38.3 ; 1Ch 28.9 ; 29.9,19 ; 2Ch 15.17 ; 16.9 ; 19.9 ; 25.2. –  voilà pourquoi…  : autre traduction comme il l''est en ce jour  ; cf. v. 24 ; Dt 2.30n.'
  - type: text
    content: 'Que votre cœur soit tout entier avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, pour suivre ses prescriptions et pour observer ses commandements ! – voilà pourquoi il en est ainsi en ce jour.'
  - type: heading
    content: Les sacrifices offerts au Seigneur
  - type: heading
    content: 2Ch 7.4-10
  '62':
  - type: text
    content: 'Le roi et tout Israël avec lui offrirent des sacrifices devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '63':
  - type: note
    content: 'un sacrifice de paix Ex 24.5 ; Lv 3.1n. –  firent la dédicace ou inaugurèrent  ; le verbe employé ici et en 2Ch 7.5, ainsi que le nom correspondant en 2Ch 7.9 (hébreu hanoukka) sont des termes techniques pour cette consécration solennelle. Ce même mot désigne la fête juive de Hanoukka qui commémore la purification du temple et sa dédicace après la victoire de Judas Maccabée sur Antiochos IV Epiphane (voir 1 Maccabées 4.52-54 : « Le vingt-cinq du neuvième mois, nommé Kislew, en l''an cent quarante-huit, ils se levèrent de bon matin et ils offrirent, conformément à la Loi, un sacrifice sur le nouvel autel des holocaustes qu''ils avaient édifié. L''autel fut inauguré avec des cantiques, au son des cithares, des lyres et des cymbales »).'
  - type: text
    content: 'Salomon offrit un sacrifice de paix ; il sacrifia pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vingt-deux mille têtes de gros bétail et cent vingt mille têtes de petit bétail. Ainsi le roi et tous les Israélites firent la dédicace de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '64':
  - type: note
    content: 'le roi consacra la cour  : litt. le roi consacra l''intérieur (ou le milieu) de la cour. –  les holocaustes Lv 1.3nss ; voir aussi Ex 29.18. –  offrandes végétales Lv 2.1nss ; voir aussi Gn 4.3 ; Ex 40.29. –  les graisses des sacrifices de paix Lv 6.5n. –  l''autel de bronze  : description en 2Ch 4.1 ; voir aussi 1R 9.25 ; 2R 16.14.'
  - type: text
    content: 'Ce jour-là, le roi consacra la cour qui est devant la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il y offrit les holocaustes, les offrandes végétales et les graisses des sacrifices de paix, parce que l''autel de bronze qui est devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était trop petit pour contenir les holocaustes, les offrandes végétales et les graisses des sacrifices de paix.'
  '65':
  - type: text
    content: ' '
  - type: note
    content: 'la fête  : la fête des Huttes ; cf. v. 2n. –  l''entrée de Hamath était probablement la limite des territoires qui dépendaient de Hamath (Nb 13.21 ; 34.8 ; Jg 3.3), ville située sur l''Oronte, à près de 200 km au nord de Damas. Ce nom pourrait être aussi compris comme le nom d''une ville  : Lebo-Hamath . –  l''oued d''Egypte  : cf. Nb 34.5n. Noter qu''avec le règne de Salomon, la limite traditionnelle du pays d''Israël, depuis Dan jusqu''à Bersabée (5.5), est considérablement reculée. Voir la carte ♦. –  et puis sept autres jours…  : cette partie de v., jusqu''à la fin, est omise par LXX. Le récit parallèle de 2Ch 7.8ss distingue sept jours pour la dédicace et sept pour la fête ; cf. Dt 16.13,15 ; comparer avec Esd 6.15ss ; 2Ch 30.23-26.'
  - type: text
    content: 'Salomon célébra la fête en ce temps-là, et tout Israël avec lui. Une grande assemblée, venue depuis l''entrée de Hamath jusqu''à l''oued d''Egypte, se tenait devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, pendant sept jours et puis sept autres jours, soit quatorze jours. '
  '66':
  - type: note
    content: 'Le huitième jour  : cf. Lv 23.36 ; Nb 29.35. –  Ils bénirent  : au sens d''une salutation, cf. Gn 24.60 ; 47.10 ; 2S 14.22 ; 19.40. –  s''en allèrent à leurs tentes  : cette expression, qui évoque le nomadisme, est plusieurs fois employée dans le récit de circonstances nationales solennelles ; cf. 12.16 ; Jg 7.8 ; 19.9 ; 20.8 ; 1S 4.10 ; 2S 20.1,22. –  le cœur content ou heureux  ; cf. 21.7n  ; voir aussi Dt 4.40n.'
  - type: text
    content: 'Le huitième jour, il renvoya le peuple. Ils bénirent le roi et s''en allèrent à leurs tentes ; ils se réjouissaient, le cœur content de tout le bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait fait à David, son serviteur, et à Israël, son peuple.'
  '7':
  - type: note
    content: 'les ailes  : cf. 6.23-28 ; Ex 25.20. –  couvraient  : cf. 2Ch 5.8n.'
  - type: text
    content: 'Car les keroubim étendaient les ailes au-dessus du lieu du Coffre. Les keroubim couvraient le Coffre et ses barres par-dessus. '
  '8':
  - type: note
    content: 'barres  : cf. Ex 25.13-16 ; 37.4s.'
  - type: text
    content: 'Les barres étaient d''une longueur telle que leurs extrémités se voyaient depuis le sanctuaire, devant le Secret, mais on ne les voyait pas du dehors. Elles sont restées là jusqu''à ce jour. '
  '9':
  - type: note
    content: 'les deux tablettes de pierre  : cf. Ex 34.1-4 ; Dt 4.13 ; 5.22 ; 9.9-11 ; 10.1-3. LXX ajoute les tablettes de l''alliance (cf. v. 21) ; dans le texte hébreu traditionnel le terme correspondant à alliance est sous-entendu. –  l''Horeb  : cf. Ex 3.1n  ; 17.6 ; 19.1ss ; 33.6 ; Dt 5.2. –  avait conclu  : cf. Gn 15.18n.'
  - type: text
    content: 'Il n''y avait rien dans le Coffre, sinon les deux tablettes de pierre que Moïse y avait déposées, à l''Horeb, quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait conclu une alliance avec les Israélites, lorsqu''ils étaient sortis d''Egypte.'
