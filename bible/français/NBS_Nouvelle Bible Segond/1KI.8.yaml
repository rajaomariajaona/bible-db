      marker-yv: yv-n
    - type: text
      text: 'Les prêtres ne pouvaient plus se tenir là pour officier, à cause de la nuée ; car la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' remplissait la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
