          text: des Chants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Ainsi j'ai bâti une maison qui sera ta résidence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un lieu où tu habiteras toujours !
  - type: usfm
    marker: s1
    children:
    - type: text
