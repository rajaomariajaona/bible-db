      marker-yv: yv-n
    - type: text
      text: 'Alors le roi Salomon rassembla auprès de lui, à Jérusalem, les anciens d''Israël et tous les chefs des tribus, les princes des familles des Israélites, pour faire monter de la Ville de David, c''est-à-dire Sion, le coffre de l''alliance du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
