      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu semble dériver d''une racine qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pervertir, corrompre, abîmer, détruire
