        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Voir aussi Ps 22.7 ; Jn 19.5.
      marker-yv: yv-n
    - type: text
      text: De même qu'une multitude est atterrée à cause de toi,
  - type: usfm
    marker: q1
    children:
