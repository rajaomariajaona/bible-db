      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'oindre, consacrer par l''onction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(celle qui a donné '
      - type: usfm
        marker: fqa
        children:
        - type: text
