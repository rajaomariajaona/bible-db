document_id: ISA.52,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour du Seigneur à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Eveille-toi 51.9+. –  ville sacrée (ou sainte ) 48.2. –  n''entrera plus  : cf. 47.1+. –  incirconcis Ez 44.9 ; voir aussi circoncision  ; pur, impur.'
  - type: text
    content: Eveille-toi, éveille-toi !
  - type: text
    content: Revêts-toi de ta force, Sion !
  - type: text
    content: Revêts tes habits de splendeur,
  - type: text
    content: Jérusalem, ville sacrée !
  - type: text
    content: Car il n'entrera plus chez toi
  - type: text
    content: ni incirconcis, ni impur.
  '10':
  - type: text
    content: ' '
  - type: note
    content: son bras saint ou le bras de sa sainteté 40.5+,10+ ; 45.22+ ; cf. Ps 98.1-4.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a mis à nu son bras saint'
  - type: text
    content: sous les yeux de toutes les nations ;
  - type: text
    content: et toutes les extrémités de la terre verront
  - type: text
    content: le salut de notre Dieu.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '48.20+ ; 2Co 6.17  ; Ap 18.4. –  d''elle  : de Babylone. –  les ustensiles (ou les récipients , cf. 66.20) du Seigneur  : les objets sacrés du temple que les Babyloniens avaient emportés ; cf. 2R 25.13-15 ; Esd 1.7-11.'
  - type: text
    content: Partez, partez, sortez de là !
  - type: text
    content: Ne touchez rien d'impur !
  - type: text
    content: Sortez du milieu d'elle !
  - type: text
    content: Purifiez-vous,
  - type: text
    content: 'vous qui portez les ustensiles du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'précipitation  : cf. Ex 12.11,33s ; Dt 16.3. –  en fuyant Ex 14.5. –  devant vous (45.2+) / arrière-garde 58.8 ; cf. Ex 14.19.'
  - type: text
    content: Ne sortez pas dans la précipitation,
  - type: text
    content: ne partez pas en fuyant ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' marche devant vous,'
  - type: text
    content: et le Dieu d'Israël sera ton arrière-garde.
  - type: heading
    content: Le serviteur du Seigneur méprisé et justifié
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Mon serviteur 42.1+ ; 49.5. –  prospérera  : le verbe hébreu peut signifier comprendre, agir avec sagesse , ou réussir  ; cf. Jr 23.5. –  haut placé  : mêmes termes qu''en 2.13n  ; voir 6.1+ ; 57.15 ; Jn 12.32 ; Ac 3.13 ; Ph 2.9.'
  - type: text
    content: Mon serviteur prospérera ;
  - type: text
    content: il s'élèvera, il montera, il sera très haut placé.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'atterrée ou dévastée  ; cf. 49.7 ; 53.2s. –  à cause de toi  : deux mss hébreux et des versions anciennes ont ici la troisième personne  : à cause de lui… –  défiguré  : le terme hébreu semble dériver d''une racine qui signifie pervertir, corrompre, abîmer, détruire  ; certains le rattachent à une autre racine, qui signifie oindre, consacrer par l''onction (celle qui a donné messie ) et traduisent  : de même son onction paraîtra plus que celle d''un homme, sa distinction plus que celle des êtres humains (litt. fils d''homme  ; cf. Gn 1.26n). Voir aussi Ps 22.7 ; Jn 19.5.'
  - type: text
    content: De même qu'une multitude est atterrée à cause de toi,
  - type: text
    content: – tant son aspect, défiguré, n'était plus celui d'un homme,
  - type: text
    content: son apparence n'était plus celle des êtres humains
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'il purifiera par l''aspersion  : le verbe hébreu évoque peut-être une aspersion rituelle, comme celles des rites de purification  ; voir Lv 4.6n,17 etc. ; Nb 19.17-22 (cf. Ex 24.8 où apparaît un autre verbe) ; d''autres traduisent il dispersera, il fera sursauter (cf. Es 41.15 ; 45.14,16) ; LXX une multitude de nations s''étonneront à son sujet (cf. Mi 7.16). –  des rois 49.7. –  fermeront la bouche  : le verbe traduit par fermer signifie littéralement rassembler les coins (d''un sac) ; il s''agit ici d''un signe de soumission ou d''étonnement (cf. Jb 29.9s). –  ce qu''ils n''avaient pas entendu 64.3 ; Rm 15.21.'
  - type: text
    content: – de même il purifiera par l'aspersion une multitude de nations.
  - type: text
    content: Devant lui des rois fermeront la bouche ;
  - type: text
    content: car ils verront ce qui ne leur avait pas été raconté,
  - type: text
    content: ils comprendront ce qu'ils n'avaient pas entendu.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Secoue ta poussière  : cf. 47.1. –  assieds-toi  : le terme hébreu ainsi traduit est très semblable à celui qui a été rendu par captive à la fin du v. ; certains modifient légèrement le texte hébreu traditionnel pour lire deux fois le même mot et traduisent  : Jérusalem, toi qui es captive… Sion la belle (litt. fille de Sion , cf. 1.8n) toi qui es captive. Cf. 49.25 ; Jr 48.46.'
  - type: text
    content: Secoue ta poussière, relève-toi,
  - type: text
    content: assieds-toi, Jérusalem !
  - type: text
    content: Détache les liens de ton cou,
  - type: text
    content: Sion la belle, toi qui es captive !
  '3':
  - type: text
    content: ' '
  - type: note
    content: pour rien… vendus 45.13+. –  pas à prix d'argent… rédimés ou rachetés, repris  ; autre traduction … qu'aura lieu votre rédemption  ; cf. 41.14n  ; 1P 1.18.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: c'est pour rien que vous avez été vendus,
  - type: text
    content: et ce n'est pas à prix d'argent que vous serez rédimés.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'descendit en Egypte Gn 12.10n  ; 46–47. –  séjourner en immigré  : cf. Ex 12.48n. –  l''Assyrien l''opprima 10.24. –  pour rien  : autre traduction à la fin  ; LXX violemment.'
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: D'abord mon peuple descendit en Egypte pour y séjourner en immigré.
  - type: text
    content: Puis l'Assyrien l'opprima pour rien.
  '5':
  - type: text
    content: ' '
  - type: note
    content: pour rien v. 3. –  pris 53.8n. –  constamment (51.13+) mon nom est bafoué 48.11 ; Ez 36.20-22 ; Rm 2.24.
  - type: text
    content: Et maintenant, qu'ai-je à faire
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: quand mon peuple, pour rien, a été pris ?
  - type: text
    content: Ceux qui le dominent hurlent
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: et constamment mon nom est bafoué.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'connaîtra (49.23+) mon nom  : cf. 50.10 ; Ez 39.7 ; Jn 17.6,26. –  en ce jour-là  : cf. 12.1+. –  c''est moi qui parle  : autre traduction c''est moi qui dis : Je suis là ! cf. 40.9+ ; 41.4n.'
  - type: text
    content: C'est pourquoi mon peuple connaîtra mon nom ;
  - type: text
    content: c'est pourquoi il saura, en ce jour-là,
  - type: text
    content: 'que c''est moi qui parle : je suis là !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.9n  ; Na 2.1n  ; Rm 10.15  ; Ap 14.6. –  les pas  : litt. les pieds. –  Ton Dieu est roi Ps 93.1+.'
  - type: text
    content: Qu'ils sont beaux, sur les montagnes,
  - type: text
    content: les pas de celui qui porte la bonne nouvelle,
  - type: text
    content: qui proclame la paix,
  - type: text
    content: de celui qui porte l'heureuse nouvelle,
  - type: text
    content: qui proclame le salut,
  - type: text
    content: 'qui dit à Sion : Ton Dieu est roi !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'guetteurs  : cf. 21.6+ ; 56.10 ; Jr 6.17 ; Ez 3.17 ; Ha 2.1. –  face à face  : même expression hébraïque (litt. œil à œil ) en Nb 14.14. –  revenir à Sion  : cf. Ez 11.22s ; 43.1-5 ; avec l''exil de son peuple, Dieu avait déserté sa montagne sainte.'
  - type: text
    content: 'C''est la voix de tes guetteurs :'
  - type: text
    content: ils élèvent la voix,
  - type: text
    content: tous ensemble ils poussent des cris de joie ;
  - type: text
    content: car c'est face à face qu'ils voient
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' revenir à Sion.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: console 40.1+. –  assure la rédemption 41.14n.
  - type: text
    content: Eclatez en cris de joie, toutes ensemble,
  - type: text
    content: ruines de Jérusalem !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' console son peuple,'
  - type: text
    content: il assure la rédemption de Jérusalem.
