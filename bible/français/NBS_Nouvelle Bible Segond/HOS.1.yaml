document_id: HOS.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Parole…  : cf. Jl 1.1 ; Mi 1.1 ; So 1.1 ; voir aussi Ez 1.3n. –  Osée  : hébreu Hoshéa‘ , ce qui signifie il sauve (cf. Nb 13.16). –  Jéroboam II (≈ 783-743 av. J.-C. ; cf. 2R 14.23-29). Les règnes des rois de Juda mentionnés ici s''étendent jusqu''à la fin du VIIIe s. av. J.-C., soit au-delà de la chute du royaume du Nord (722/1 ; cf. 2R 17).'
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Osée, fils de Bééri, aux jours d''Ozias, de Jotam, d''Achaz, d''Ezéchias, rois de Juda, et aux jours de Jéroboam, fils de Joas, roi d''Israël.'
  - type: heading
    content: Les enfants d'Osée et de Gomer
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 16.1-4 ; Ez 24.15-24. –  prostituée  : litt. femme de prostitutions  ; de même pour les enfants de la prostitution , litt. des prostitutions  ; cf. 5.7 ; voir aussi Ez 16.44. –  le pays… prostitution  : le terme hébreu régulièrement traduit par prostitution n''évoque pas nécessairement la vénalité : il peut inclure l''adultère et d''autres types d''inconduite sexuelle, même s''ils ne sont pas motivés par le gain (cf. Lv 21.9). La prostitution et l''adultère sont des images courantes de l''idolâtrie, laquelle était, du reste, souvent accompagnée de prostitution proprement dite ; cf. 4.12 ; 5.4 ; Ex 34.16 ; Lv 17.7 ; Dt 23.18ns ; 31.16 ; Jg 8.33 ; Es 1.21 ; Jr 2.20,23 ; 3.1s ; 13.27 ; Ez 6.9 ; 16.15,34 ; 23.3,7s ; Na 3.4 ; Ps 106.39 ; cf. Mt 12.39/ / ; 16.4/ / ; Jc 4.4. –  en abandonnant le Seigneur  : litt. de derrière YHWH , c.-à-d. en cessant de suivre le Seigneur.'
  - type: text
    content: 'Début de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit par l''entremise d''Osée :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Osée :'
  - type: text
    content: Va, prends une prostituée
  - type: text
    content: et des enfants de la prostitution ;
  - type: text
    content: car le pays se vautre dans la prostitution,
  - type: text
    content: 'en abandonnant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: 'Il alla et prit Gomer, fille de Diblaïm. Elle fut enceinte et lui donna un fils. '
  '4':
  - type: note
    content: 'lui dit  : c.-à-d. dit à Osée. –  Appelle-le du nom…  : cf. Es 1.26 ; 7.3n,14n. –  Jizréel signifie Dieu sème(ra)  ; cf. 2.24s. C''est le nom de la grande plaine qui sépare la Galilée de la Samarie, où Jéhu, ancêtre de Jéroboam II (v. 1n), avait massacré la dynastie d''Omri (2R 9–10). –  je ferai rendre des comptes ou j''interviendrai contre  ; cf. 2.15 ; 4.9,14 ; 8.13 ; 9.7,9 ; 12.3 ; Jr 6.15n. –  le sang de Jizréel  : c.-à-d. le sang versé à Jizréel.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit :'
  - type: text
    content: Appelle-le du nom de Jizréel ;
  - type: text
    content: car encore un peu de temps
  - type: text
    content: et je ferai rendre des comptes à la maison de Jéhu
  - type: text
    content: 'pour le sang de Jizréel :'
  - type: text
    content: je mettrai fin à la royauté de la maison d'Israël.
  '5':
  - type: text
    content: ' '
  - type: note
    content: En ce jour-là Es 2.11 ; 12.1+ ; Jr 39.17 ; Jl 3.2 ; 4.18 ; Am 2.16+ ; Za 14.9 ; Mt 7.22 ; Mc 2.20 ; Lc 6.23 ; Jn 14.20 ; 2Tm 1.18. –  arc 1S 2.4 ; Jb 29.20.
  - type: text
    content: En ce jour-là je briserai l'arc d'Israël
  - type: text
    content: dans la vallée de Jizréel.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Il lui dit  : c.-à-d. le Seigneur dit à Osée . –  Lo-Rouhama signifie celle dont on n''a pas compassion . –  en lui pardonnant indéfiniment  : traduction incertaine (cf. 14.3n) ; autres possibilités  : en la supportant indéfiniment , ou encore  : je la leur retirerai (ma compassion) complètement  ; LXX je leur résisterai , comme en Jc 5.6.'
  - type: text
    content: 'Elle fut de nouveau enceinte et mit au monde une fille. Il lui dit :'
  - type: text
    content: Appelle-la du nom de Lo-Rouhama (« Celle dont on n'a pas compassion ») ;
  - type: text
    content: car je ne continuerai plus à avoir compassion
  - type: text
    content: de la maison d'Israël
  - type: text
    content: en lui pardonnant indéfiniment.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'maison de Juda 4.15 ; 6.11 ; 8.14 ; 10.11 ; 12.1,3. –  ni par l''arc…  : cf. Jos 24.12 ; Es 31.1 ; Za 4.6 ; Ps 20.8 ; Pr 21.31. –  chars  : litt. attelages ou équipages (de chars) (sur le terme hébreu correspondant, voir Ez 26.7n,10).'
  - type: text
    content: 'Mais j''aurai compassion de la maison de Juda ; je les sauverai par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu ; je ne les sauverai ni par l''arc, ni par l''épée, ni par la guerre, ni par les chevaux, ni par les chars.'
  '8':
  - type: text
    content: 'Elle sevra Lo-Rouhama ; puis elle fut encore enceinte et mit au monde un fils. '
  '9':
  - type: note
    content: 'Il dit  : c.-à-d. le Seigneur dit à Osée. –  Lo-Ammi signifie pas mon peuple  ; cf. 2.3,25 ; Dt 32.21n. –  je ne serai rien (ou je ne serai pas ; je ne suis rien ; je ne suis pas) pour vous  : l''expression peut être lue comme la négation de la formule qui explique le nom YHWH (le Seigneur) en Ex 3.14n  ; cf. Jr 31.33.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: Appelle-le du nom de Lo-Ammi (« Pas mon peuple ») ;
  - type: text
    content: car vous n'êtes pas mon peuple,
  - type: text
    content: et moi, je ne serai rien pour vous.
