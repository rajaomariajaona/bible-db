document_id: JHN.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les noces de Cana
  - type: text
    content: ' '
  - type: note
    content: 'Le troisième jour  : cf. 1.29+ ; voir aussi Mt 16.21+. –  Cana , village de Galilée, à quelques kilomètres au nord de Nazareth ; 4.46 ; 21.2. –  Galilée 1.43+.'
  - type: text
    content: 'Le troisième jour, il y eut des noces à Cana de Galilée. La mère de Jésus était là. '
  '10':
  - type: note
    content: Cf. Lc 5.39. –  le bon vin ou le meilleur vin.
  - type: text
    content: 'et lui dit : Tout homme sert d''abord le bon vin, puis, quand les gens sont ivres, le moins bon ; toi, tu as gardé le bon vin jusqu''à présent.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le commencement (1.1+) ou le premier . –  signes  : c''est par le mot grec correspondant, séméion , qui a donné notre mot sémantique , que Jn désigne de préférence les miracles qui révèlent la gloire du Christ v. 18,23n  ; 3.2 ; 4.48,54 ; 6.2,14,26 ; 7.31 ; 9.16 ; 10.41 ; 11.47 ; 12.18,37 ; 20.30s ; voir aussi 12.33n  ; cf. Ex 4.9,17,28,30 ; Nb 14.11,22 ; Dt 6.8 ; Jos 24.17 ; Es 66.19 ; Mt 12.38n  ; 1Co 1.22+ et l''introduction à l''Evangile selon Jean. –  Il manifesta 17.6 ; 1Tm 3.16+ ; 1Jn 1.2+. –  gloire 1.14+ ; cf. Es 8.23–9.1 ; Lc 9.32. –  mirent leur foi en lui  : cf. 1.7n,12n.'
  - type: text
    content: Tel fut le commencement des signes de Jésus, ce qu'il fit à Cana de Galilée. Il manifesta sa gloire, et ses disciples mirent leur foi en lui.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Capharnaüm 4.46n  ; 6.17,24,59 ; Mt 4.13n. –  ses frères 5.10 ; 7.3 ; Mt 13.55+ ; 1Co 9.5.
  - type: text
    content: Après cela, il descendit à Capharnaüm avec sa mère, ses frères et ses disciples, et ils n'y demeurèrent que peu de jours.
  - type: heading
    content: Jésus chasse les marchands du temple
  - type: heading
    content: Cf. Mt 21.12-13  ; Mc 11.15-17  ; Lc 19.45-46
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pâque des Juifs v. 13,23 ; 6.4 ; 11.55 ; 12.1 ; 13.1 ; 18.28,39 ; 19.14 ; voir aussi 4.45 ; 5.1n  ; Ex 12 ; voir aussi calendrier et fêtes.
  - type: text
    content: La Pâque des Juifs était proche, et Jésus monta à Jérusalem.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 21.12ns/ / ; voir aussi temple.
  - type: text
    content: 'Il trouva dans le temple les vendeurs de bovins, de moutons et de colombes, ainsi que les changeurs, assis. '
  '15':
  - type: note
    content: 'fouet  : cf. Mc 15.15. –  tables  : le même mot est traduit par banque en Lc 19.23n.'
  - type: text
    content: 'Il fit un fouet de cordes et les chassa tous hors du temple, avec les moutons et les bovins ; il dispersa la monnaie des changeurs, renversa les tables '
  '16':
  - type: note
    content: Cf. Za 14.21. –  la maison de mon Père Lc 2.49. –  une maison de commerce ou un marché.
  - type: text
    content: 'et dit aux vendeurs de colombes : Enlevez tout cela d''ici ! Cessez de faire de la maison de mon Père une maison de commerce ! '
  '17':
  - type: note
    content: Ps 69.10. –  passion jalouse ou zèle.
  - type: text
    content: 'Ses disciples se souvinrent qu''il est écrit : '
  - type: text
    content: La passion jalouse de ta maison me dévorera
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Juifs 1.19n. –  signe v. 11+ ; voir aussi 4.48 ; 6.30 ; 7.4 ; Mt 12.38-40. –  pour agir de la sorte  : litt. pour faire ces choses-là.'
  - type: text
    content: 'Les Juifs lui dirent : Quel signe nous montres-tu pour agir de la sorte ? '
  '19':
  - type: note
    content: 'Mt 16.21 ; 26.61+. –  je le relèverai  : le verbe correspondant est souvent traduit par se réveiller (ainsi v. 22) ou se lever, se relever (voir résurrection) ; on le retrouve 5.8,21 ; 7.52n  ; 11.29 ; 12.1,9,17 ; 13.4 ; 14.31 ; 21.14 ; voir aussi Mt 2.13n  ; Mc 1.31n  ; Lc 1.69n.'
  - type: text
    content: 'Jésus leur répondit : Détruisez ce sanctuaire, et en trois jours je le relèverai. '
  '2':
  - type: text
    content: 'Jésus aussi fut invité aux noces, ainsi que ses disciples. '
  '20':
  - type: note
    content: La reconstruction du temple avait commencé, sous Hérode le Grand, vers l'an 20 av. J.-C. ; elle n'était pas encore achevée à l'époque de Jésus (Mc 13.1n). – Dans Jn les paroles de Jésus provoquent souvent des malentendus qui sont dissipés par de nouveaux éclaircissements, cf. 3.3ss ; 4.33 etc.
  - type: text
    content: 'Les Juifs dirent : Il a fallu quarante-six ans pour construire ce sanctuaire, et toi, en trois jours, tu le relèveras ! '
  '21':
  - type: note
    content: Cf. 1.14,51 ; 4.20-24 ; 1Co 6.19.
  - type: text
    content: 'Mais le sanctuaire dont il parlait, lui, c''était son corps. '
  '22':
  - type: note
    content: 'Cf. 12.16+ ; 20.9 ; Lc 24.6-8,25-32,44-46 ; Ac 2.27,31 ; 1Co 15.4. –  réveillé ou relevé, cf. v. 19n. –  crurent  : le même verbe, dans des constructions différentes, est traduit dans les v. 23ss par mettre sa foi en et se fier à.'
  - type: text
    content: Quand donc il se fut réveillé d'entre les morts, ses disciples se souvinrent qu'il disait cela ; ils crurent l'Ecriture et la parole que Jésus avait dite.
  - type: heading
    content: Jésus connaît tout de l'homme
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'V. 11n,13+. –  fête de la Pâque  : voir calendrier et fêtes. –  beaucoup mirent leur foi (ou crurent ) en son nom 1.12n  ; 4.39 ; 7.31 ; 8.30 ; 10.42 ; 11.45-48 ; 12.11,42. –  qu''il produisait  : litt. qu''il faisait , cf. v. 11 ; de même dans la suite.'
  - type: text
    content: 'Pendant qu''il était à Jérusalem, à la fête de la Pâque, beaucoup mirent leur foi en son nom, à la vue des signes qu''il produisait, '
  '24':
  - type: note
    content: ne se fiait pas à eux ou ne croyait pas en eux, n'avait pas foi en eux  ; cf. v. 22n  ; cf. 6.15,60s.
  - type: text
    content: 'mais Jésus, lui, ne se fiait pas à eux, parce qu''il les connaissait tous '
  '25':
  - type: note
    content: 'Cf. 1.42,47s ; 4.18 ; 5.42 ; 10.14 ; 16.30 ; Mt 9.4+. –  l''homme  : autre traduction l''être humain. –  connaissait  : autre traduction savait.'
  - type: text
    content: 'et parce qu''il n''avait pas besoin qu''on lui présente un témoignage sur l''homme : lui-même connaissait ce qui était dans l''homme.'
  '3':
  - type: text
    content: 'Comme le vin venait à manquer, la mère de Jésus lui dit : Ils n''ont pas de vin. '
  '4':
  - type: note
    content: 'Femme  : cette façon de parler, sans être impolie, suggère une certaine distance (on peut voir un équivalent approximatif dans l''emploi du mot Madame, dans la langue classique, pour s''adresser à sa mère) 19.26n  ; cf. 4.21 ; 8.10 ; 19.26 ; 20.13,15. –  qu''avons-nous de commun en cette affaire ? litt. quoi à moi et à toi ? Il s''agit d''un sémitisme dont le sens courant peut être à peu près de quoi te mêles-tu ? (sans être forcément aussi rude que cette expression française) ; certains comprennent ici en quoi cela nous regarde-t-il ? Cf. Mc 1.24n  ; pour les différentes nuances de la formule hébraïque correspondante, voir Jg 11.12 ; 2S 16.10n  ; 19.23 ; 1R 17.18 ; 2R 3.13 ; Os 14.9 ; 2Ch 35.21. –  Mon heure  : l''expression renvoie habituellement, dans Jean, au moment de la mort par laquelle le Christ sera « élevé » 7.30 ; 8.20 ; 12.23,27 ; 13.1 ; 17.1 ; voir aussi 4.23 ; 5.25,28 ; Mt 24.36,44,50/ / ; Mc 14.35-41.'
  - type: text
    content: 'Jésus lui répond : Femme, qu''avons-nous de commun en cette affaire ? Mon heure n''est pas encore venue. '
  '5':
  - type: note
    content: Cf. Gn 41.55.
  - type: text
    content: 'Sa mère dit aux serviteurs : Faites tout ce qu''il vous dira. '
  '6':
  - type: note
    content: 'jarres  : même terme en 4.28. –  destinées…  : litt. qui étaient là pour…  ; le même verbe est traduit par il y avait là en 19.29 ; gisent, gisait en 20.5ss,12 ; là en 21.9 ; cf. Lc 2.12n. –  purifications des Juifs  : cf. 3.25 ; 11.55 ; 13.10s ; 15.2s ; Mc 7.3s. –  mesures  : le terme grec correspondant désigne habituellement une mesure grecque de capacité pour les liquides équivalant à près de quarante litres.'
  - type: text
    content: 'Il y avait là six jarres de pierre, destinées aux purifications des Juifs et contenant chacune deux ou trois mesures. '
  '7':
  - type: note
    content: 'à ras bord  : litt. jusqu''en haut.'
  - type: text
    content: 'Jésus leur dit : Remplissez d''eau ces jarres. Ils les remplirent à ras bord. '
  '8':
  - type: text
    content: '– Puisez maintenant, leur dit-il, et portez-en à l''organisateur du repas. Ils lui en portèrent. '
  '9':
  - type: note
    content: 'changée en vin  : litt. devenue (cf. 1.3n) vin.'
  - type: text
    content: 'Quand l''organisateur du repas eut goûté l''eau changée en vin – il ne savait pas d''où venait ce vin, tandis que les serviteurs qui avaient puisé l''eau le savaient – il appelle le marié '
