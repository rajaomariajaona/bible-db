document_id: PSA.77,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Au jour de ma détresse, je me souviens
  - type: text
    content: ' '
  - type: note
    content: D'après Yedoutoun 39.1n. –  D'Asaph 73.1+.
  - type: text
    content: Du chef de chœur. D'après Yedoutoun. D'Asaph. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , de même aux v. 14ns ; cf. Gn 21.33n. –  fermé sa compassion ou, plus littéralement, fermé ses entrailles  ; cf. Phm 7n  ; 1Jn 3.17n.'
  - type: text
    content: Dieu a-t-il oublié de faire grâce ?
  - type: text
    content: 'A-t-il, dans sa colère, fermé sa compassion ? '
  - type: text
    content: Pause.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je dis  : cf. 55.7 ; Jb 29.18 ; Lm 3.18. –  Ce qui fait ma souffrance  : autre traduction ce qui me transperce. –  la main droite 17.7+.'
  - type: text
    content: 'Je dis : Ce qui fait ma souffrance,'
  - type: text
    content: c'est que la main droite du Très-Haut n'est plus la même…
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je rappellerai…  : autre lecture traditionnelle je me souviendrai (comme dans la suite) des actions (le terme correspondant, souvent employé dans un sens négatif, est traduit par agissements en 28.4 ; 106.29,39 ; même terme en 78.7 ; voir Jr 4.4+ ; voir aussi Mi 2.7, comme ici au sujet de Dieu) ; cf. Ps 44.2 ; 143.5. –  Seigneur (Yah)  : cf. 68.5n  ; 104.35n  ; Ex 15.2n. –  actes étonnants  : d''après plusieurs mss hébreux et des versions anciennes ; le texte hébreu traditionnel a le singulier ; cf. v. 15.'
  - type: text
    content: 'Je rappellerai les actions du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) ;'
  - type: text
    content: je me souviendrai des actes étonnants que tu as accomplis au temps jadis.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Je redirai 1.2n  ; cf. v. 12. –  ton action ou tes actions , d'après plusieurs mss hébreux et des versions anciennes.
  - type: text
    content: Je redirai toute ton action ;
  - type: text
    content: je méditerai tes hauts faits.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ton chemin  : cf. Es 55.8ss. –  n''est que sainteté  : litt. (est) dans la sainteté  ; Vg a compris dans le sanctuaire  ; cf. 71.22+. –  quel dieu est grand 48.2+ ; cf. 35.10+ ; 86.10 ; 2S 7.21s ; dieu traduit ici l''hébreu ’el , cf. Gn 21.33n, Dieu ’Elohim , Gn 1.1n.'
  - type: text
    content: O Dieu, ton chemin n'est que sainteté ;
  - type: text
    content: quel dieu est grand comme Dieu ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: des choses étonnantes v. 12n  ; cf. 72.18.
  - type: text
    content: C'est toi, le Dieu qui fait des choses étonnantes ;
  - type: text
    content: tu as fait connaître ta puissance parmi les peuples.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 9.29. –  rédemption ou délivrance , 19.15+. –  Jacob / Joseph 81.5s ; cf. Ex 1.1ss.
  - type: text
    content: Par ton bras tu as assuré la rédemption de ton peuple,
  - type: text
    content: 'les fils de Jacob et de Joseph. '
  - type: text
    content: Pause.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.8ss ; 74.13+ss ; 114.3,5 ; Ex 14–15 ; Es 51.10 ; Jb 38.8-11.
  - type: text
    content: Les eaux t'ont vu, ô Dieu !
  - type: text
    content: Les eaux t'ont vu, elles ont bouillonné ;
  - type: text
    content: les abîmes se sont agités.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 29.1-11.
  - type: text
    content: Les nuages ont versé des torrents d'eau,
  - type: text
    content: le ciel d'orage a fait retentir sa voix ;
  - type: text
    content: tes flèches ont volé de toutes parts
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 19.16 ; Hé 12.26. –  dans le tourbillon Es 5.28 ; Ez 10.2,6,13. –  les éclairs… 97.4.
  - type: text
    content: Au bruit de ton tonnerre, dans le tourbillon,
  - type: text
    content: les éclairs ont illuminé le monde ;
  - type: text
    content: la terre s'est agitée, elle a tremblé.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'A pleine voix…  : cf. 142.2. –  je crie 3.5+. –  il prête l''oreille (le texte hébreu précise à moi ) 5.2+.'
  - type: text
    content: A pleine voix je crie vers Dieu ;
  - type: text
    content: à pleine voix, vers Dieu, et il prête l'oreille.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 15.8 ; Es 43.16 ; 63.12s ; Mt 14.25/ / ; Rm 11.33.
  - type: text
    content: Ton chemin était dans la mer,
  - type: text
    content: ton sentier dans les grandes eaux,
  - type: text
    content: et tes traces n'ont pas été connues.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'comme un troupeau 74.1n  ; 78.52 ; 80.2 ; Es 40.11 ; 63.11 ; Jn 10.1ss. –  par l''intermédiaire  : litt. par la main  ; cf. Nb 4.37 ; 9.23. –  de Moïse 103.7 ; 1S 12.6 ; 1R 8.53. –  et d''Aaron 99.6 ; Ex 4.14-16 ; 7.1 ; Jos 24.5 ; 1S 12.8 ; Mi 6.4.'
  - type: text
    content: Tu as conduit ton peuple comme un troupeau,
  - type: text
    content: par l'intermédiaire de Moïse et d'Aaron.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Au jour de ma détresse 9.10+. –  je cherche le Seigneur 9.11+. –  ma main se tend  : cf. 28.2 ; 88.10 ; 143.6.'
  - type: text
    content: Au jour de ma détresse, je cherche le Seigneur ;
  - type: text
    content: la nuit, ma main se tend sans se lasser ;
  - type: text
    content: je refuse d'être consolé.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Je me souviens de (ou j''évoque le nom de, j''invoque ) Dieu et je gémis (ou je m''agite ) : cf. 42.5-6n+. –  mon esprit défaille 142.4n  ; 143.4.'
  - type: text
    content: Je me souviens de Dieu et je gémis ;
  - type: text
    content: 'je réfléchis, et mon esprit défaille. '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Tu tiens mes paupières…  : litt. tu as saisi les gardiennes de mes yeux  ; un ms de LXX porte mes ennemis veillent . –  je ne parle pas 39.2ss.'
  - type: text
    content: Tu tiens mes paupières en éveil ;
  - type: text
    content: je suis troublé, je ne parle pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Je réfléchis 73.16. –  aux années d''autrefois  : on pourrait aussi, avec plusieurs versions anciennes, rattacher à ce vers le verbe qui ouvre le v. 7 et traduire je me souviens des années d''autrefois  ; cf. 143.5 ; Dt 32.7.'
  - type: text
    content: Je réfléchis aux jours de jadis,
  - type: text
    content: aux années d'autrefois.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte incertain. –  Je me souviens  : autres traductions j''invoque ; j''évoque  ; cf. v. 6n,12. –  par mon chant  : le même mot a été traduit ailleurs par instrument(s) à cordes  ; LXX a lu je médite (v. 13 ; 1.2n) pendant la nuit  ; cf. 63.7+ ; 92.3+. –  s''interroge ou scrute, recherche.'
  - type: text
    content: Je me souviens, par mon chant, pendant la nuit ;
  - type: text
    content: mon cœur médite,
  - type: text
    content: mon esprit s'interroge.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 74.1+ ; Lm 3.31 ; 5.22
  - type: text
    content: Le Seigneur rejettera-t-il pour toujours ?
  - type: text
    content: N'accordera-t-il pas de nouveau sa faveur ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 85.6 ; Lm 3.21s.
  - type: text
    content: Sa fidélité est-elle à jamais épuisée ?
  - type: text
    content: Ce qu'il dit est-il anéanti de génération en génération ?
