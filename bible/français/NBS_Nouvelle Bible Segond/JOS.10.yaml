    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Josué dit alors : Ouvrez l''entrée de la grotte, faites-en sortir ces cinq rois et amenez-les-moi. '
