    - type: text
      text: 'Ils firent ainsi ; ils sortirent de la grotte ces cinq rois et les lui amenèrent ; c''étaient le roi de Jérusalem, le roi d''Hébron, le roi de Yarmouth, le roi de Lakish, le roi d''Eglôn. '
