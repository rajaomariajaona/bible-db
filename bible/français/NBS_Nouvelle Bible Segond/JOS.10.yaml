document_id: JOS.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire sur les rois amorites
  - type: text
    content: ' '
  - type: note
    content: 'Adoni-Tsédeq  : Mon Seigneur est justice ou Mon Seigneur est (le dieu) Tsédeq . LXX porte Adoni-Bézeq , comme en Jg 1.5-7. –  Jérusalem  : première mention de Jérusalem sous ce nom ; plus loin, la ville est nommée Jébus (Jg 19.10). –  anathème  : voir bénédiction, malédiction. –  traité Jéricho et son roi  : cf. v. 28 ; 6.1ss ; 8.2. –  Gabaon… la paix avec Israël  : voir chap. 6 ; 8–9.'
  - type: text
    content: 'Adoni-Tsédeq, roi de Jérusalem, apprit que Josué avait pris le Aï et qu''il l''avait frappé d''anathème, qu''il avait traité le Aï et son roi comme il avait traité Jéricho et son roi, que les habitants de Gabaon avaient fait la paix avec Israël et qu''ils étaient parmi eux. '
  '10':
  - type: note
    content: 'Le Seigneur les frappa de panique  : cf. Ex 14.24 ; 23.27 ; Jg 4.15 ; 1S 7.10 ; voir aussi Dt 2.25 ; 11.25. –  il leur infligea  : le sujet n''est pas précisé. –  vers la montée de Beth-Horôn…  : entre Beth-Horôn-le-Haut, à une dizaine de kilomètres au nord-ouest de Gabaon, et Beth-Horôn-le-Bas, 4 km plus loin en direction du Bas-Pays et du littoral méditerranéen ; cf. 16.3,5 ; 18.13s. –  Azéqa  : au sud de la vallée d''Ayyalôn, v. 12, et à une trentaine de kilomètres de Gabaon. –  Maqqéda  : entre Lakish et Hébron, au sud, v. 3 ; cf. v. 16-27.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les frappa de panique devant Israël ; il leur infligea une grande défaite à Gabaon, les poursuivit vers la montée de Beth-Horôn et les battit jusqu''à Azéqa et Maqqéda. '
  '11':
  - type: note
    content: 'pierres de grêle  : cf. Ex 9.18 ; Es 28.17 ; 30.30 ; Siracide 46.5s : « Le Seigneur Grand l''exauça en envoyant des grêlons d''une force énorme. Il fondit sur la nation ennemie, il fit périr les adversaires qui dévalaient la pente. »'
  - type: text
    content: 'Alors qu''ils fuyaient pour échapper à Israël, dans la descente de Beth-Horôn, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit tomber du ciel sur eux de grosses pierres jusqu''à Azéqa, et ils moururent ; ceux qui moururent par les pierres de grêle furent plus nombreux que ceux que les Israélites tuèrent par l''épée.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 28.21. –  aux Israélites  : litt. devant les fils d''Israël . –  sous les yeux d''Israël…  : on pourrait aussi lire et il dit : Sous les yeux d''Israël, soleil…  ; dans LXX, cette formule fait partie d''un texte plus long  : quand il les brisa à Gabaon et qu''ils furent brisés devant les Israélites . –  il dit  : LXX Josué dit . –  tiens-toi immobile  : le verbe hébreu signifie le plus souvent se taire . Cf. Siracide 46.4 : « N''est-ce pas par lui que le soleil fut arrêté et qu''un seul jour en devint deux ? » –  vallée d''Ayyalôn  : à l''ouest de Gabaon.'
  - type: text
    content: 'Alors Josué parla au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' livra les Amorites aux Israélites ; sous les yeux d''Israël, il dit :'
  - type: text
    content: Soleil, tiens-toi immobile sur Gabaon,
  - type: text
    content: et toi, lune, sur la vallée d'Ayyalôn !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le livre du Juste (hébreu Yashar  ; cf. le terme apparenté Yeshouroun en Dt 32.15n) ou de Rectitude  : sans doute un recueil perdu de chants de victoire ; il est également cité en 2S 1.18.'
  - type: text
    content: Alors le soleil se tint immobile, la lune s'arrêta,
  - type: text
    content: jusqu'à ce que la nation eût tiré vengeance de ses ennemis.
  - type: text
    content: 'Cela est écrit dans le livre du Juste : le soleil s''arrêta au milieu du ciel et ne se pressa pas de se coucher, presque tout un jour. '
  '14':
  - type: note
    content: le Seigneur combattait pour Israël v. 42 ; cf. 23.3+.
  - type: text
    content: 'Il n''y a jamais eu de jour comme celui-là, ni avant ni après, où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ait entendu un homme ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' combattait pour Israël. '
  '15':
  - type: note
    content: au camp, au Guilgal v. 6n.
  - type: text
    content: Puis Josué, et tout Israël avec lui, retourna au camp, au Guilgal.
  - type: heading
    content: Josué exécute les cinq rois vaincus
  '16':
  - type: text
    content: ' '
  - type: note
    content: Maqqéda v. 10n.
  - type: text
    content: 'Ces cinq rois s''enfuirent et se cachèrent dans la grotte de Maqqéda. '
  '17':
  - type: text
    content: 'On dit à Josué : Les cinq rois ont été trouvés cachés dans la grotte de Maqqéda. '
  '18':
  - type: note
    content: 'grosses pierres  : cf. v. 27. –  à l''entrée  : litt. à la bouche.'
  - type: text
    content: 'Josué dit : Roulez de grosses pierres à l''entrée de la grotte et postez-y des hommes pour les garder. '
  '19':
  - type: note
    content: 'attaquez leur arrière-garde  : même formule en Dt 25.18. –  vous les a livrés  : cf. v. 8+.'
  - type: text
    content: 'Quant à vous, ne vous arrêtez pas, poursuivez vos ennemis et attaquez leur arrière-garde, ne les laissez pas rentrer dans leurs villes, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous les a livrés. '
  '2':
  - type: note
    content: 'Ils eurent très peur  : il s''agit probablement d''Adoni-Tsédeq et de ses gens ; certains modifient le texte hébreu traditionnel pour lire il eut très peur. –  Gabaon… une des villes royales  : Gabaon était gouvernée par un conseil d''anciens (9.11) et non par un roi. –  vaillants  : autre traduction guerriers (cf. v. 7).'
  - type: text
    content: 'Ils eurent très peur, car Gabaon était une grande ville, comme une des villes royales, plus grande même que le Aï, et tous ses hommes étaient vaillants. '
  '20':
  - type: note
    content: 'de leur infliger une très grande défaite  : litt. de les frapper d''un très grand coup. –  jusqu''à leur extermination ou jusqu''à la défaite totale  ; cf. 8.24. –  les survivants  : cf. v. 28ss.'
  - type: text
    content: 'Quand Josué et les Israélites eurent achevé de leur infliger une très grande défaite, jusqu''à leur extermination – les survivants allèrent se réfugier dans les villes fortifiées – '
  '21':
  - type: note
    content: 'sain et sauf ou victorieux  : litt. en paix, cf. Gn 26.29 ; 28.21 ; Ex 18.23 ; Jg 8.9 ; 11.31 ; 2S 19.25 ; 1R 22.27s ; 2Ch 18.26s ; 19.1. –  Maqqéda v. 10n. –  sans que personne ose…  : litt. aucun homme ne remua la langue pour les fils d''Israël, cf. Ex 11.7.'
  - type: text
    content: tout le peuple revint sain et sauf au camp vers Josué, à Maqqéda, sans que personne ose dire un mot contre les Israélites.
  '22':
  - type: text
    content: 'Josué dit alors : Ouvrez l''entrée de la grotte, faites-en sortir ces cinq rois et amenez-les-moi. '
  '23':
  - type: note
    content: 'ces cinq rois  : comme au v. 5 ; leurs noms sont au v. 3.'
  - type: text
    content: 'Ils firent ainsi ; ils sortirent de la grotte ces cinq rois et les lui amenèrent ; c''étaient le roi de Jérusalem, le roi d''Hébron, le roi de Yarmouth, le roi de Lakish, le roi d''Eglôn. '
  '24':
  - type: note
    content: tous les hommes d'Israël 9.6n. –  mettez le pied (litt. vos pieds) sur la nuque (ou sur le cou), geste symbolique du vainqueur ; les souverains d'Egypte et de Mésopotamie sont souvent représentés le pied sur la nuque ou la poitrine de leurs adversaires vaincus. Voir 1R 5.17 ; Es 51.23 ; Ps 66.12 ; 110.1.
  - type: text
    content: 'Lorsqu''on eut fait sortir ces rois vers Josué, Josué appela tous les hommes d''Israël et dit aux capitaines des hommes de guerre qui avaient marché avec lui : Approchez, mettez le pied sur la nuque de ces rois. Ils s''approchèrent et mirent le pied sur leur nuque. '
  '25':
  - type: note
    content: 'N''ayez pas peur  : cf. 1.6s,9n  ; 8.1n  ; Dt 3.21s ; 31.6. –  Soyez forts… 1.6n,18 ; Dt 3.28+.'
  - type: text
    content: 'Josué leur dit : N''ayez pas peur, ne soyez pas terrifiés. Soyez forts et courageux, car c''est ainsi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' traitera tous les ennemis que vous combattez. '
  '26':
  - type: note
    content: 'les mit à mort  : litt. les frappa et les mit à mort  ; cf. 9.18. –  jusqu''au soir  : cf. 8.29n.'
  - type: text
    content: 'Après cela, Josué les mit à mort ; il les pendit à cinq arbres, et ils restèrent pendus aux arbres jusqu''au soir. '
  '27':
  - type: note
    content: 'grosses pierres  : cf. v. 18. –  jusqu''à ce jour même  : cf. 4.9 ; 7.26 ; 8.29.'
  - type: text
    content: Vers le coucher du soleil, Josué ordonna de les descendre des arbres. On les jeta dans la grotte où ils s'étaient cachés et on mit à l'entrée de la grotte de grosses pierres ; elles y sont restées jusqu'à ce jour même.
  - type: heading
    content: Josué conquiert les villes du sud
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Ce jour-là  : cf. v. 27,35. –  Maqqéda v. 10n. –  au fil de l''épée 6.21n. –  anathème  : cf. 6.17,21 ; Dt 2.34n  ; voir bénédiction, malédiction. –  aucun survivant  : cf. v. 30,33,37,39s ; 8.22 ; Nb 21.35 ; Dt 2.34 ; 3.3 ; 2R 10.11. –  traité le roi de Jéricho  : cf. v. 1 ; 8.2+.'
  - type: text
    content: 'Ce jour-là, Josué prit Maqqéda et la passa au fil de l''épée, avec son roi. Il les frappa d''anathème, ainsi que tous les êtres vivants qui s''y trouvaient : il ne laissa aucun survivant, et il traita le roi de Maqqéda comme il avait traité le roi de Jéricho.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'passa  : cf. v. 31,34. –  Libna , à l''ouest de Maqqéda , serait localisée à Tell Bornat, à 7 km au nord de Lakish (v. 3) et à 10 km à l''est de Qiriath-Gath.'
  - type: text
    content: 'Josué, et tout Israël avec lui, passa de Maqqéda à Libna ; il fit la guerre à Libna. '
  '3':
  - type: note
    content: 'Hébron (Ligue, Confédération) : ville de Juda à 35 km au sud de Jérusalem ; cf. 14.15 ; 15.13 ; 20.7 ; 21.11 ; 2S 2.1-4 ; 5.5 ; 15.7-11 ; 2Ch 11.5,10. –  Yarmouth  : localité du Bas-Pays, non loin de Beth-Shémesh v. 5 ; 15.35 ; Né 11.29. –  Lakish, au sud-ouest de Jérusalem, v. 31-33 ; 15.39 ; cf. 2R 14.9 ; 18.13s ; Es 36.2 ; 37.8 ; 2Ch 11.9 ; 25.27 ; 32.9. –  Eglôn 15.39 ; peut-être à une vingtaine de kilomètres au sud-ouest de Jérusalem.'
  - type: text
    content: 'Adoni-Tsédeq, roi de Jérusalem, envoya à Hoham, roi d''Hébron, à Piréam, roi de Yarmouth, à Yaphia, roi de Lakish, et à Debir, roi d''Eglôn, le message suivant : '
  '30':
  - type: note
    content: V. 28,32.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' la livra aussi, avec son roi, à Israël, qui la passa au fil de l''épée, avec tous les êtres vivants qui s''y trouvaient. Il n''y laissa aucun survivant, et il traita son roi comme il avait traité le roi de Jéricho.'
  '31':
  - type: text
    content: 'Josué, et tout Israël avec lui, passa de Libna à Lakish ; ils dressèrent leur camp contre elle et lui firent la guerre. '
  '32':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' livra Lakish à Israël, qui la prit le deuxième jour et la passa au fil de l''épée, avec tous les êtres vivants qui s''y trouvaient, tout comme il l''avait fait pour Libna. '
  '33':
  - type: note
    content: 'Guézer  : carrefour important entre la « route de la Mer » qui relie l''Egypte et la Mésopotamie en longeant le littoral philistin, et celle qui conduit de Jérusalem au port de Jaffa ; cf. 16.10 ; Jg 1.29 ; voir aussi 1R 9.15-17.'
  - type: text
    content: Alors Horam, roi de Guézer, monta pour secourir Lakish. Josué le battit, lui et son peuple, sans lui laisser aucun survivant.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Lakish / Eglôn v. 3n.
  - type: text
    content: 'Josué, et tout Israël avec lui, passa de Lakish à Eglôn ; ils dressèrent leur camp contre elle et lui firent la guerre. '
  '35':
  - type: note
    content: anathème v. 28+.
  - type: text
    content: Ils la prirent le jour même et la passèrent au fil de l'épée, avec tous les êtres vivants qui s'y trouvaient ; il les frappa d'anathème ce jour-là, tout comme il l'avait fait pour Lakish.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Hébron v. 3n.
  - type: text
    content: 'Josué, et tout Israël avec lui, monta d''Eglôn à Hébron, et ils lui firent la guerre. '
  '37':
  - type: text
    content: Ils la prirent et la passèrent au fil de l'épée, avec son roi, toutes les villes qui en dépendaient et tous les êtres vivants qui s'y trouvaient, tout comme il l'avait fait pour Eglôn. Il ne laissa aucun survivant ; il la frappa d'anathème, ainsi que tous les êtres vivants qui s'y trouvaient.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Debir (nom d''une personne au v. 3) : cf. 11.21 ; 15.15s,49 ; 21.15 ; voir aussi Jg 1.11s. Peut-être à 13 km au sud-ouest d''Hébron.'
  - type: text
    content: 'Josué, et tout Israël avec lui, se tourna vers Debir et lui fit la guerre. '
  '39':
  - type: text
    content: Il la prit, avec son roi et toutes les villes qui en dépendaient, et ils les passèrent au fil de l'épée ; ils frappèrent d'anathème tous les êtres vivants qui s'y trouvaient. Il ne laissa aucun survivant. Il traita Debir et son roi comme il avait traité Hébron et comme il avait traité Libna et son roi.
  '4':
  - type: text
    content: 'Ralliez-vous à moi et aidez-moi à attaquer Gabaon, car elle a fait la paix avec Josué et avec les Israélites. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Bas-Pays  : hébreu shephéla . –  les coteaux  : la région des coteaux (mot traduit par pentes en 12.3 ; même mot hébreu au v. 8 ; 13.20) se situe entre le Bas-Pays et la région montagneuse de Juda. –  aucun survivant v. 28+. –  anathème v. 28+. –  tout ce qui respirait  : litt. tout souffle , c.-à-d. tout vivant  ; cf. 11.11,14 ; Dt 20.16 ; 1R 15.9 ; voir esprit. –  le Seigneur, le Dieu d''Israël  : cf. Dt 7.2 ; 20.16s.'
  - type: text
    content: 'Josué battit tout le pays, la montagne, le Néguev, le Bas-Pays et les coteaux, ainsi que tous leurs rois ; il ne laissa aucun survivant. Il frappa d''anathème tout ce qui respirait, comme l''avait ordonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '41':
  - type: note
    content: 'Qadesh-Barnéa ou Qadesh  : étape de l''Exode (Nb 13.26n  ; 20). –  Gaza  : l''une des cinq villes des Philistins, sur le littoral. –  le pays de Goshen  : nom identique à celui du territoire égyptien où séjournèrent les descendants de Jacob (cf. Gn 45.10n  ; 47.1,11,27). Ici, il s''agit d''une ville qui fera partie de Juda (Jos 15.51).'
  - type: text
    content: 'Josué les battit de Qadesh-Barnéa à Gaza, tout le pays de Goshen, jusqu''à Gabaon. '
  '42':
  - type: note
    content: 'captura et prit traduisent un seul verbe hébreu. –  le Seigneur … combattait…  : cf. v. 14n.'
  - type: text
    content: 'Josué captura tous ces rois et prit leur pays en une seule fois, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, combattait pour Israël. '
  '43':
  - type: note
    content: Ce v. est absent de LXX (cf. v. 15). –  au camp, au Guilgal v. 6n.
  - type: text
    content: Puis Josué, et tout Israël avec lui, retourna au camp, au Guilgal.
  '5':
  - type: note
    content: 'Amorites  : cf. 3.10n  ; Ex 3.8.'
  - type: text
    content: Les cinq rois des Amorites – le roi de Jérusalem, le roi d'Hébron, le roi de Yarmouth, le roi de Lakish, le roi d'Eglôn – se rassemblèrent et se mirent en campagne avec toutes leurs troupes ; ils dressèrent leur camp contre Gabaon et lui firent la guerre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'au camp, au Guilgal  : cf. v. 15,43 ; 4.19ns ; 5.9s ; 9.6. –  serviteurs  : le même mot peut être traduit par esclave . –  délivre-nous, secours-nous  : cf. Ac 16.9. –  rassemblés 9.2n.'
  - type: text
    content: 'Les hommes de Gabaon envoyèrent à Josué, au camp, au Guilgal, le message suivant : Ne nous abandonne pas, nous qui sommes tes serviteurs ! Rejoins-nous vite, délivre-nous, secours-nous ! Car tous les rois des Amorites qui habitent la montagne se sont rassemblés contre nous. '
  '7':
  - type: note
    content: 'tous les hommes de guerre  : cf. 8.1. –  les vaillants guerriers  : cf. 1.14 ; 6.2 ; 8.3.'
  - type: text
    content: Josué monta du Guilgal, lui et tous les hommes de guerre avec lui, tous les vaillants guerriers.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'N''aie pas peur d''eux  : cf. v. 25+ ; 1.9 ; 6.2 ; 8.1 ; 11.6. –  je te les ai livrés  : cf. 6.2 ; 8.18. –  aucun d''eux ne tiendra…  : cf. 1.5+ (autre verbe).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : N''aie pas peur d''eux, car je te les ai livrés ; aucun d''eux ne tiendra devant toi. '
  '9':
  - type: note
    content: 'Il avait marché  : litt. il était monté (marche d''une trentaine de kilomètres). –  toute la nuit  : cf. 2S 2.29,32 ; 4.7 ; voir aussi 17.16.'
  - type: text
    content: 'Josué arriva sur eux à l''improviste. Il avait marché toute la nuit depuis le Guilgal. '
