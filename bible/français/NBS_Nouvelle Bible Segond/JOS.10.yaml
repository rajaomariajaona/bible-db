        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hébron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Josué, et tout Israël avec lui, monta d''Eglôn à Hébron, et ils lui firent la guerre. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Ils la prirent et la passèrent au fil de l'épée, avec son roi, toutes les villes qui en dépendaient et tous les êtres vivants qui s'y trouvaient, tout comme il l'avait fait pour Eglôn. Il ne laissa aucun survivant ; il la frappa d'anathème, ainsi que tous les êtres vivants qui s'y trouvaient.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Debir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(nom d''une personne au v. 3) : cf. 11.21 ; 15.15s,49 ; 21.15 ; voir aussi Jg 1.11s. Peut-être à 13 km au sud-ouest d''Hébron.'
      marker-yv: yv-n
    - type: text
      text: 'Josué, et tout Israël avec lui, se tourna vers Debir et lui fit la guerre. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Il la prit, avec son roi et toutes les villes qui en dépendaient, et ils les passèrent au fil de l'épée ; ils frappèrent d'anathème tous les êtres vivants qui s'y trouvaient. Il ne laissa aucun survivant. Il traita Debir et son roi comme il avait traité Hébron et comme il avait traité Libna et son roi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ralliez-vous à moi et aidez-moi à attaquer Gabaon, car elle a fait la paix avec Josué et avec les Israélites. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.40 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bas-Pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shephéla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les coteaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la région des coteaux (mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pentes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 12.3 ; même mot hébreu au v. 8 ; 13.20) se situe entre le Bas-Pays et la région montagneuse de Juda. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aucun survivant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 28+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anathème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 28+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ce qui respirait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout souffle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 11.11,14 ; Dt 20.16 ; 1R 15.9 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', le Dieu d''Israël'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 7.2 ; 20.16s.'
      marker-yv: yv-n
    - type: text
      text: 'Josué battit tout le pays, la montagne, le Néguev, le Bas-Pays et les coteaux, ainsi que tous leurs rois ; il ne laissa aucun survivant. Il frappa d''anathème tout ce qui respirait, comme l''avait ordonné le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qadesh-Barnéa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qadesh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : étape de l''Exode (Nb 13.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''une des cinq villes des Philistins, sur le littoral. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le pays de Goshen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : nom identique à celui du territoire égyptien où séjournèrent les descendants de Jacob (cf. Gn 45.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 47.1,11,27). Ici, il s''agit d''une ville qui fera partie de Juda (Jos 15.51).'
      marker-yv: yv-n
    - type: text
      text: 'Josué les battit de Qadesh-Barnéa à Gaza, tout le pays de Goshen, jusqu''à Gabaon. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'captura '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent un seul verbe hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' … combattait…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Josué captura tous ces rois et prit leur pays en une seule fois, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, combattait pour Israël. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. est absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' (cf. v. 15). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au camp, au Guilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Puis Josué, et tout Israël avec lui, retourna au camp, au Guilgal.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amorites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 3.8.'
      marker-yv: yv-n
    - type: text
      text: Les cinq rois des Amorites – le roi de Jérusalem, le roi d'Hébron, le roi de Yarmouth, le roi de Lakish, le roi d'Eglôn – se rassemblèrent et se mirent en campagne avec toutes leurs troupes ; ils dressèrent leur camp contre Gabaon et lui firent la guerre.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au camp, au Guilgal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 15,43 ; 4.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; 5.9s ; 9.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot peut être traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: esclave
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: délivre-nous, secours-nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ac 16.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rassemblés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les hommes de Gabaon envoyèrent à Josué, au camp, au Guilgal, le message suivant : Ne nous abandonne pas, nous qui sommes tes serviteurs ! Rejoins-nous vite, délivre-nous, secours-nous ! Car tous les rois des Amorites qui habitent la montagne se sont rassemblés contre nous. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les hommes de guerre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les vaillants guerriers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.14 ; 6.2 ; 8.3.'
      marker-yv: yv-n
    - type: text
      text: Josué monta du Guilgal, lui et tous les hommes de guerre avec lui, tous les vaillants guerriers.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'aie pas peur d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 25+ ; 1.9 ; 6.2 ; 8.1 ; 11.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je te les ai livrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.2 ; 8.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aucun d'eux ne tiendra…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.5+ (autre verbe).'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Josué : N''aie pas peur d''eux, car je te les ai livrés ; aucun d''eux ne tiendra devant toi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il avait marché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il était monté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(marche d''une trentaine de kilomètres). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute la nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 2.29,32 ; 4.7 ; voir aussi 17.16.'
      marker-yv: yv-n
    - type: text
      text: 'Josué arriva sur eux à l''improviste. Il avait marché toute la nuit depuis le Guilgal. '
