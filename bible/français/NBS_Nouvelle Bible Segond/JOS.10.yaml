      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mon Seigneur est '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mon Seigneur est (le dieu) Tsédeq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Adoni-Bézeq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en Jg 1.5-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : première mention de Jérusalem sous ce nom ; plus loin, la ville est nommée '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jébus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Jg 19.10). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: traité Jéricho et son roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 28 ; 6.1ss ; 8.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gabaon… la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' avec Israël'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir chap. 6 ; 8–9.'
      marker-yv: yv-n
    - type: text
      text: 'Adoni-Tsédeq, roi de Jérusalem, apprit que Josué avait pris le Aï et qu''il l''avait frappé d''anathème, qu''il avait traité le Aï et son roi comme il avait traité Jéricho et son roi, que les habitants de Gabaon avaient fait la paix avec Israël et qu''ils étaient parmi eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' les frappa de panique'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 14.24 ; 23.27 ; Jg 4.15 ; 1S 7.10 ; voir aussi Dt 2.25 ; 11.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il leur infligea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sujet n''est pas précisé. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers la montée de Beth-Horôn…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : entre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Beth-Horôn-le-Haut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à une dizaine de kilomètres au nord-ouest de Gabaon, et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Beth-Horôn-le-Bas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 4 km plus loin en direction du Bas-Pays et du littoral méditerranéen ; cf. 16.3,5 ; 18.13s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Azéqa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sud de la vallée d''Ayyalôn, v. 12, et à une trentaine de kilomètres de Gabaon. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maqqéda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : entre Lakish et Hébron, au sud, v. 3 ; cf. v. 16-27.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les frappa de panique devant Israël ; il leur infligea une grande défaite à Gabaon, les poursuivit vers la montée de Beth-Horôn et les battit jusqu''à Azéqa et Maqqéda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pierres de grêle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 9.18 ; Es 28.17 ; 30.30 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '46.5s : « Le Seigneur Grand l''exauça en envoyant des grêlons d''une force énorme. Il fondit sur la nation ennemie, il fit périr les adversaires qui dévalaient la pente. »'
      marker-yv: yv-n
    - type: text
      text: 'Alors qu''ils fuyaient pour échapper à Israël, dans la descente de Beth-Horôn, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit tomber du ciel sur eux de grosses pierres jusqu''à Azéqa, et ils moururent ; ceux qui moururent par les pierres de grêle furent plus nombreux que ceux que les Israélites tuèrent par l''épée.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 28.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devant les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Israël'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous les yeux d'Israël…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait aussi lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il dit : Sous les yeux d''Israël, soleil…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; dans LXX, cette formule fait partie d'un texte plus long
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand il les brisa à Gabaon et qu'ils furent brisés devant les Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Josué dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tiens-toi immobile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu signifie le plus souvent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se taire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '46.4 : « N''est-ce pas par lui que le soleil fut arrêté et qu''un seul jour en devint deux ? » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vallée d'Ayyalôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à l''ouest de Gabaon.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Josué parla au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le jour où le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' livra les Amorites aux Israélites ; sous les yeux d''Israël, il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soleil, tiens-toi immobile sur Gabaon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toi, lune, sur la vallée d'Ayyalôn !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre du Juste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yashar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. le terme apparenté '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yeshouroun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Dt 32.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Rectitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sans doute un recueil perdu de chants de victoire ; il est également cité en 2S 1.18.'
      marker-yv: yv-n
    - type: text
      text: Alors le soleil se tint immobile, la lune s'arrêta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce que la nation eût tiré vengeance de ses ennemis.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela est écrit dans le livre du Juste : le soleil s''arrêta au milieu du ciel et ne se pressa pas de se coucher, presque tout un jour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' combattait pour Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 42 ; cf. 23.3+.
      marker-yv: yv-n
    - type: text
      text: 'Il n''y a jamais eu de jour comme celui-là, ni avant ni après, où le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ait entendu un homme ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' combattait pour Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au camp, au Guilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Puis Josué, et tout Israël avec lui, retourna au camp, au Guilgal.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué exécute les cinq rois vaincus
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Maqqéda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ces cinq rois s''enfuirent et se cachèrent dans la grotte de Maqqéda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On dit à Josué : Les cinq rois ont été trouvés cachés dans la grotte de Maqqéda. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grosses pierres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'entrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la bouche.
      marker-yv: yv-n
    - type: text
      text: 'Josué dit : Roulez de grosses pierres à l''entrée de la grotte et postez-y des hommes pour les garder. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attaquez leur arrière-garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même formule en Dt 25.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous les a livrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8+.'
      marker-yv: yv-n
    - type: text
      text: 'Quant à vous, ne vous arrêtez pas, poursuivez vos ennemis et attaquez leur arrière-garde, ne les laissez pas rentrer dans leurs villes, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, vous les a livrés. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils eurent très peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit probablement d''Adoni-Tsédeq et de ses gens ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il eut très peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gabaon… une des villes royales
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Gabaon était gouvernée par un conseil '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'anciens
        - type: text
          text: ' (9.11) et non par un roi. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vaillants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'guerriers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 7).
      marker-yv: yv-n
    - type: text
