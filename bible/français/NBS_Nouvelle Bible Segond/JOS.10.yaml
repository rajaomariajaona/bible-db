      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''on eut fait sortir ces rois vers Josué, Josué appela tous les hommes d''Israël et dit aux capitaines des hommes de guerre qui avaient marché avec lui : Approchez, mettez le pied sur la nuque de ces rois. Ils s''approchèrent et mirent le pied sur leur nuque. '
  '25':
