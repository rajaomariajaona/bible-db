  - type: usfm
    marker: it
    children:
    - type: text
      text: Il y a dans ton royaume un homme qui a en lui le souffle des dieux saints. Aux jours de ton père, on a trouvé chez lui des lumières, de l'intelligence et une sagesse semblable à la sagesse des dieux. Aussi le roi Nabuchodonosor, ton père, l'a-t-il nommé chef des mages, des envoûteurs, des chaldéens, des devins – c'était le roi, ton père –
  - type: text
    text: ' '
  - type: usfm
    marker: v
