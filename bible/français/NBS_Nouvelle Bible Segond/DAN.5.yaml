      - type: text
        text: '2 Maccabées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.4 : « Le Temple était… rempli de débauches et d''orgies : des païens se divertissaient avec des courtisanes, avaient commerce avec des femmes dans les parvis sacrés et y apportaient des choses défendues. »'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sous l'effet du vin, Belshatsar ordonna d'apporter les coupes d'or et d'argent que son père Nabuchodonosor avait enlevées du temple de Jérusalem, afin que le roi y boive, ainsi que ses femmes, ses concubines et ses grands.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Alors on apporta les coupes d'or qui avaient été enlevées du temple, de la maison de Dieu à Jérusalem ; et le roi, ses grands, ses femmes et ses concubines y burent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
