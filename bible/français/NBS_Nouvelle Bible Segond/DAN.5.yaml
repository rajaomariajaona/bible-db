    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Le roi cria avec force de faire venir les envoûteurs, les chaldéens et les devins ; et le roi dit aux sages de Babylone : Quiconque lira cette inscription et m''en donnera l''interprétation sera revêtu de pourpre rouge, portera un collier d''or à son cou et aura la troisième place dans le gouvernement du royaume.'
  - type: text
    text: ' '
  - type: usfm
