  - type: usfm
    marker: it
    children:
    - type: text
      text: Tous les sages du roi entrèrent ; mais ils ne purent pas lire l'inscription, ni en faire connaître l'interprétation au roi.
  - type: text
    text: ' '
  - type: usfm
