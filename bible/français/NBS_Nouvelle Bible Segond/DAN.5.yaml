    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ps 115.5-7 ; 135.15-17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans sa main ton souffle et toutes tes voies
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 10.23 ; Ps 31.16 ; Jb 12.10 ; Ac 17.25.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tu t'es élevé contre le Seigneur du ciel ; tu as fait apporter devant toi les coupes de sa maison, et vous y avez bu du vin, toi et tes grands, tes femmes et tes concubines ; tu as loué les dieux d'argent, d'or, de bronze, de fer, de bois et de pierre, qui ne voient pas, qui n'entendent pas et qui n'ont pas la connaissance, et tu n'as pas glorifié le Dieu qui a dans sa main ton souffle et toutes tes voies.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: it
    children:
    - type: text
      text: C'est pourquoi il a envoyé cette main tracer cette inscription.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
