    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.22,29.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: il fut chassé d'entre les humains, son cœur devint semblable à celui des bêtes, et sa demeure fut avec les ânes sauvages ; on lui donna, comme aux bœufs, de l'herbe à manger, et son corps fut trempé de la rosée du ciel, jusqu'à ce qu'il sache que le Dieu Très-Haut est maître de la royauté des hommes et qu'il y place qui il veut.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
