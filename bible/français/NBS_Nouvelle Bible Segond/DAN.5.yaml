  - type: usfm
    marker: it
    children:
    - type: text
      text: 'La reine, alertée par les paroles du roi et de ses grands, entra dans la salle du banquet et dit : O roi, puisses-tu vivre toujours ! Que tes pensées ne t''épouvantent pas, tu n''as pas besoin de pâlir !'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
