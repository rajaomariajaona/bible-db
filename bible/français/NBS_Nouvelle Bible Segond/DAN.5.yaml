  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Alors Daniel fut introduit devant le roi. Le roi demanda à Daniel : Es-tu ce Daniel, l''un des exilés de Juda, que le roi, mon père, a amenés de Juda ?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: it
    children:
    - type: text
      text: J'ai appris sur ton compte que tu as en toi le souffle des dieux, et qu'on trouve chez toi des lumières, de l'intelligence et une sagesse extraordinaire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: it
    children:
    - type: text
      text: On vient d'amener devant moi les sages et les envoûteurs, afin de lire cette inscription et de m'en faire connaître l'interprétation ; mais ils n'ont pas pu donner l'interprétation des mots.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: J'ai appris que tu peux donner des interprétations et résoudre des questions difficiles ; maintenant, si tu peux lire cette inscription et m'en faire connaître l'interprétation, tu seras revêtu de pourpre rouge, tu porteras un collier d'or à ton cou et tu auras la troisième place dans le gouvernement du royaume.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Alors Daniel répondit, devant le roi : Garde tes dons pour toi, et accorde à un autre tes présents. Je lirai néanmoins l''inscription au roi et je lui en ferai connaître l''interprétation.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: O roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toi, ô roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 4.19. –  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'royauté… grandeur… honneur… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.37 ; 4.27.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: O roi, le Dieu Très-Haut avait donné à Nabuchodonosor, ton père, la royauté, la grandeur, l'honneur et la gloire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: A cause de la grandeur qu'il lui avait donnée, les gens de tous peuples, nations et langues avaient peur et tremblaient devant lui. Le roi faisait mettre à mort qui il voulait et il laissait la vie à ceux qu'il voulait ; il élevait ceux qu'il voulait et il abaissait ceux qu'il voulait.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
