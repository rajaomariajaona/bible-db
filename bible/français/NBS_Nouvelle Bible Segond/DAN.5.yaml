      - type: text
        text: '5.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu ne t'es pas abaissé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
