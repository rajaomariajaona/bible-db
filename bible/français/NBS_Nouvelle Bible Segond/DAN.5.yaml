    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: parce qu'on a trouvé chez ce Daniel, à qui le roi a donné le nom de Belteshatsar, un souffle extraordinaire, de la connaissance et de l'intelligence, la faculté d'interpréter les rêves, de déchiffrer les énigmes et de résoudre les questions difficiles ; qu'on appelle donc Daniel, et il donnera l'interprétation.
- type: usfm
