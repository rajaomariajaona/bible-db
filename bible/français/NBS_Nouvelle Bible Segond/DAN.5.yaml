    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.7 (sur la situation à Jérusalem et dans le temple sous le règne d''Antiochos IV Epiphane ; cf. Dn 7.24-26 ; 8.23-26 ; 9.26s ; 11.36-45 et les notes) : « On était conduit par une amère contrainte à participer tous les mois à un repas rituel, le jour de la naissance du roi, et… (aux) fêtes dionysiaques (connues pour leurs beuveries). » Voir aussi Mt 14.6/ /.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Le roi Belshatsar donna un grand banquet pour mille de ses grands ; devant ces mille-là il but du vin.
