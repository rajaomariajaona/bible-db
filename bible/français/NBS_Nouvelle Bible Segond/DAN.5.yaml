          text: cœur
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Et toi, Belshatsar, son fils, tu ne t'es pas abaissé, quoique tu aies connu tout cela.
  - type: text
    text: ' '
  - type: usfm
    marker: v
