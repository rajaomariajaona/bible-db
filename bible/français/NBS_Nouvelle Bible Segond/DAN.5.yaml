  - type: usfm
    marker: it
    children:
    - type: text
      text: A ce moment-là apparut une main d'homme, dont les doigts se mirent à écrire, en face du porte-lampes, sur le plâtre du mur du palais royal. Le roi vit cette main qui écrivait.
