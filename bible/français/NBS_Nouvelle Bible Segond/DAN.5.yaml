      marker: fr
      children:
      - type: text
        text: '5.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son cœur s'éleva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.12 ; Dt 8.14 ; 17.20 ; Ez 31.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'obstina
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'endurcit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 7.13,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dépouillé de son honneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.30.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mais lorsque son cœur s'éleva et que son esprit s'obstina jusqu'à l'arrogance, il fut précipité de son trône royal et dépouillé de son honneur,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
