document_id: DAN.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le banquet du roi Belshatsar
  - type: text
    content: ' '
  - type: note
    content: 'Belshatsar ( Balthasar dans les versions grecques) était le fils du dernier roi de Babylone, Nabonide, successeur indirect de Nabuchodonosor (cf. v. 2). Il semble avoir exercé la régence pendant les campagnes militaires de son père (cf. 4.26n). –  banquet / vin  : cf. 2 Maccabées 6.7 (sur la situation à Jérusalem et dans le temple sous le règne d''Antiochos IV Epiphane ; cf. Dn 7.24-26 ; 8.23-26 ; 9.26s ; 11.36-45 et les notes) : « On était conduit par une amère contrainte à participer tous les mois à un repas rituel, le jour de la naissance du roi, et… (aux) fêtes dionysiaques (connues pour leurs beuveries). » Voir aussi Mt 14.6/ /.'
  - type: text
    content: Le roi Belshatsar donna un grand banquet pour mille de ses grands ; devant ces mille-là il but du vin.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'La reine  : probablement la reine-mère (v. 11) ; cf. 2R 10.13 ; Jr 13.18. –  O roi, puisses-tu vivre toujours ! 2.4n.'
  - type: text
    content: 'La reine, alertée par les paroles du roi et de ses grands, entra dans la salle du banquet et dit : O roi, puisses-tu vivre toujours ! Que tes pensées ne t''épouvantent pas, tu n''as pas besoin de pâlir !'
  - type: text
    content: ' '
  '11':
  - type: note
    content: 'le souffle (ou l''esprit) des dieux saints 4.5n. –  ton père  : cf. v. 1ns. –  chef des mages 2.28 ; 4.6.'
  - type: text
    content: Il y a dans ton royaume un homme qui a en lui le souffle des dieux saints. Aux jours de ton père, on a trouvé chez lui des lumières, de l'intelligence et une sagesse semblable à la sagesse des dieux. Aussi le roi Nabuchodonosor, ton père, l'a-t-il nommé chef des mages, des envoûteurs, des chaldéens, des devins – c'était le roi, ton père –
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'Belteshatsar 1.7n. –  un souffle (ou un esprit  ; cf. v. 11,14) extraordinaire (ou supérieur) : cf. 6.4. –  énigmes  : cf. Jg 14.12-19 ; 1R 10.1 ; Ps 78.2. –  résoudre les questions difficiles  : litt. dénouer des nœuds  ; certains comprennent conjurer les sorts.'
  - type: text
    content: parce qu'on a trouvé chez ce Daniel, à qui le roi a donné le nom de Belteshatsar, un souffle extraordinaire, de la connaissance et de l'intelligence, la faculté d'interpréter les rêves, de déchiffrer les énigmes et de résoudre les questions difficiles ; qu'on appelle donc Daniel, et il donnera l'interprétation.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Alors Daniel fut introduit devant le roi. Le roi demanda à Daniel : Es-tu ce Daniel, l''un des exilés de Juda, que le roi, mon père, a amenés de Juda ?'
  - type: text
    content: ' '
  '14':
  - type: text
    content: J'ai appris sur ton compte que tu as en toi le souffle des dieux, et qu'on trouve chez toi des lumières, de l'intelligence et une sagesse extraordinaire.
  - type: text
    content: ' '
  '15':
  - type: text
    content: On vient d'amener devant moi les sages et les envoûteurs, afin de lire cette inscription et de m'en faire connaître l'interprétation ; mais ils n'ont pas pu donner l'interprétation des mots.
  - type: text
    content: ' '
  '16':
  - type: note
    content: V. 7n.
  - type: text
    content: J'ai appris que tu peux donner des interprétations et résoudre des questions difficiles ; maintenant, si tu peux lire cette inscription et m'en faire connaître l'interprétation, tu seras revêtu de pourpre rouge, tu porteras un collier d'or à ton cou et tu auras la troisième place dans le gouvernement du royaume.
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'Alors Daniel répondit, devant le roi : Garde tes dons pour toi, et accorde à un autre tes présents. Je lirai néanmoins l''inscription au roi et je lui en ferai connaître l''interprétation.'
  - type: text
    content: ' '
  '18':
  - type: note
    content: 'O roi  : litt. toi, ô roi  ; cf. 4.19. –  royauté… grandeur… honneur… gloire 2.37 ; 4.27.'
  - type: text
    content: O roi, le Dieu Très-Haut avait donné à Nabuchodonosor, ton père, la royauté, la grandeur, l'honneur et la gloire.
  - type: text
    content: ' '
  '19':
  - type: text
    content: A cause de la grandeur qu'il lui avait donnée, les gens de tous peuples, nations et langues avaient peur et tremblaient devant lui. Le roi faisait mettre à mort qui il voulait et il laissait la vie à ceux qu'il voulait ; il élevait ceux qu'il voulait et il abaissait ceux qu'il voulait.
  - type: text
    content: ' '
  '2':
  - type: note
    content: 'Sous l''effet du vin  : autre traduction après avoir goûté le vin. –  coupes  : litt. objets, de même aux v. 3,23 ; cf. 1.2+ ; même terme araméen en Esd 5.14+. –  femmes / concubines  : cf. 2 Maccabées 6.4 : « Le Temple était… rempli de débauches et d''orgies : des païens se divertissaient avec des courtisanes, avaient commerce avec des femmes dans les parvis sacrés et y apportaient des choses défendues. »'
  - type: text
    content: Sous l'effet du vin, Belshatsar ordonna d'apporter les coupes d'or et d'argent que son père Nabuchodonosor avait enlevées du temple de Jérusalem, afin que le roi y boive, ainsi que ses femmes, ses concubines et ses grands.
  - type: text
    content: ' '
  '20':
  - type: note
    content: 'son cœur s''éleva  : cf. 11.12 ; Dt 8.14 ; 17.20 ; Ez 31.10. –  s''obstina  : litt. s''endurcit  ; cf. Ex 7.13,22. –  dépouillé de son honneur  : cf. 4.30.'
  - type: text
    content: Mais lorsque son cœur s'éleva et que son esprit s'obstina jusqu'à l'arrogance, il fut précipité de son trône royal et dépouillé de son honneur,
  - type: text
    content: ' '
  '21':
  - type: note
    content: 4.22,29.
  - type: text
    content: il fut chassé d'entre les humains, son cœur devint semblable à celui des bêtes, et sa demeure fut avec les ânes sauvages ; on lui donna, comme aux bœufs, de l'herbe à manger, et son corps fut trempé de la rosée du ciel, jusqu'à ce qu'il sache que le Dieu Très-Haut est maître de la royauté des hommes et qu'il y place qui il veut.
  - type: text
    content: ' '
  '22':
  - type: note
    content: 'son fils  : cf. v. 1ns. –  tu ne t''es pas abaissé  : litt. tu n''as pas abaissé ton cœur.'
  - type: text
    content: Et toi, Belshatsar, son fils, tu ne t'es pas abaissé, quoique tu aies connu tout cela.
  - type: text
    content: ' '
  '23':
  - type: note
    content: 'V. 2nss. –  qui ne voient pas… Ps 115.5-7 ; 135.15-17. –  dans sa main ton souffle et toutes tes voies  : cf. Jr 10.23 ; Ps 31.16 ; Jb 12.10 ; Ac 17.25.'
  - type: text
    content: Tu t'es élevé contre le Seigneur du ciel ; tu as fait apporter devant toi les coupes de sa maison, et vous y avez bu du vin, toi et tes grands, tes femmes et tes concubines ; tu as loué les dieux d'argent, d'or, de bronze, de fer, de bois et de pierre, qui ne voient pas, qui n'entendent pas et qui n'ont pas la connaissance, et tu n'as pas glorifié le Dieu qui a dans sa main ton souffle et toutes tes voies.
  - type: text
    content: ' '
  '24':
  - type: text
    content: C'est pourquoi il a envoyé cette main tracer cette inscription.
  - type: text
    content: ' '
  '25':
  - type: note
    content: 'Mené, mené…  : tel quel, le message semble désigner des monnaies de valeur décroissante (cf. 2.32s)  : une mine, une mine (ou bien il est compté : une mine), un sicle, et des demi(-sicles) (voir mesures, poids et monnaies). L''interprétation suit l''étymologie de chacun des mots.'
  - type: text
    content: 'Voici l''inscription qui a été tracée :'
  - type: text
    content: ' Mené, mené, teqel, parsîn. '
  '26':
  - type: note
    content: 'a fait le compte  : araméen mena.'
  - type: text
    content: Et voici l'interprétation de ces mots.
  - type: text
    content: ' Mené '
  - type: text
    content: '(« Compté ») : Dieu a fait le compte de ton règne et il y a mis fin.'
  - type: text
    content: ' '
  '27':
  - type: note
    content: 'Tu as été pesé  : araméen teqilta.'
  - type: text
    content: 'Teqel '
  - type: text
    content: '(« Pesé ») : Tu as été pesé dans la balance et tu as été trouvé insuffisant.'
  - type: text
    content: ' '
  '28':
  - type: note
    content: 'Perès  : singulier de parsîn (v. 25n) ; le terme rappelle à la fois le verbe traduit par sera divisé (perisath) et le nom Perses (paras). Au lieu de divisé LXX traduit abrégé et achevé, cf. Rm 9.28n.'
  - type: text
    content: 'Perès '
  - type: text
    content: '(« Divisé ») : Ton royaume sera divisé et donné aux Mèdes et aux Perses.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'ordonna qu''on revête  : litt. dit et on revêtit  ; cf. v. 7n  ; Gn 41.41-43 ; Est 6.7-11.'
  - type: text
    content: Aussitôt Belshatsar ordonna qu'on revête Daniel de pourpre rouge, qu'on lui mette au cou un collier d'or et qu'on fasse publiquement de lui le troisième personnage dans le gouvernement du royaume.
  '3':
  - type: text
    content: Alors on apporta les coupes d'or qui avaient été enlevées du temple, de la maison de Dieu à Jérusalem ; et le roi, ses grands, ses femmes et ses concubines y burent.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ce verset se réfère à la nuit de la prise de Babylone en 539 av. J.-C., également associée à un banquet en Es 21.5,9.
  - type: text
    content: Cette même nuit, Belshatsar, roi des Chaldéens, fut tué.
  '4':
  - type: note
    content: 'dieux d''or… v. 23 ; Es 40.19s ; Jr 10.3 ; Ps 115.4 ; Ap 9.20 ; cf. Lettre de Jérémie 3 : « Vous verrez à Babylone des dieux d''argent, d''or et de bois… »'
  - type: text
    content: Ils burent du vin et ils louèrent les dieux d'or, d'argent, de bronze, de fer, de bois et de pierre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'cette main  : autre traduction cette main détachée , de même au v. 24 ; cf. Ez 21.24n.'
  - type: text
    content: A ce moment-là apparut une main d'homme, dont les doigts se mirent à écrire, en face du porte-lampes, sur le plâtre du mur du palais royal. Le roi vit cette main qui écrivait.
  - type: text
    content: ' '
  '6':
  - type: note
    content: 'le roi pâlit  : litt. le roi, ses couleurs changèrent, de même aux v. 9s. –  ses pensées l''épouvantèrent  : cf. 4.16.'
  - type: text
    content: Alors le roi pâlit et ses pensées l'épouvantèrent ; les jointures de ses reins se relâchèrent, et ses genoux s'entrechoquaient.
  - type: text
    content: ' '
  '7':
  - type: note
    content: 'cria avec force 3.4 ; 4.11. –  envoûteurs / chaldéens / devins v. 11 ; 2.2n. –  sages 2.12. –  revêtu / collier v. 16,29+. –  aura la troisième place dans le gouvernement  : litt. gouvernera en troisième  ; on peut comprendre au troisième rang (après Nabonide et Belshatsar ; cf. v. 1n), mais aussi comme membre d''un triumvirat (cf. 6.3s).'
  - type: text
    content: 'Le roi cria avec force de faire venir les envoûteurs, les chaldéens et les devins ; et le roi dit aux sages de Babylone : Quiconque lira cette inscription et m''en donnera l''interprétation sera revêtu de pourpre rouge, portera un collier d''or à son cou et aura la troisième place dans le gouvernement du royaume.'
  - type: text
    content: ' '
  '8':
  - type: note
    content: lire l'inscription ou l'écriture  ; peut-être s'agissait-il d'un alphabet cryptique ; cf. 1.4n. Voir aussi 2.11 ; 4.4.
  - type: text
    content: Tous les sages du roi entrèrent ; mais ils ne purent pas lire l'inscription, ni en faire connaître l'interprétation au roi.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Sur quoi le roi Belshatsar fut tout à fait épouvanté ; il pâlit et ses grands furent consternés.
  - type: heading
    content: Daniel explique l'inscription mystérieuse
