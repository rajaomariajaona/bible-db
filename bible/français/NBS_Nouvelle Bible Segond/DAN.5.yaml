  - type: usfm
    marker: it
    children:
    - type: text
      text: Aussitôt Belshatsar ordonna qu'on revête Daniel de pourpre rouge, qu'on lui mette au cou un collier d'or et qu'on fasse publiquement de lui le troisième personnage dans le gouvernement du royaume.
- type: usfm
  marker: p
