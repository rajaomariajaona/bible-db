        text: '5.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce verset se réfère à la nuit de la prise de Babylone en 539 av. J.-C., également associée à un banquet en Es 21.5,9.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Cette même nuit, Belshatsar, roi des Chaldéens, fut tué.
