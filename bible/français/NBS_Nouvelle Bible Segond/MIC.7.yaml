document_id: MIC.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Il n'y a plus d'homme droit
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine. –  Quel malheur pour moi ! Jb 10.15. –  la récolte , avec une légère modification du texte hébreu traditionnel, litt. comme ceux qui récoltent  ; cf. Ex 23.16 ; 34.22. –  grappillage  : cf. Jg 8.2 ; Es 17.6 ; 24.13 ; Jr 49.9. –  figues précoces , de la première récolte ; cf. Es 28.4 ; Jr 24.2 ; Os 9.10 ; voir aussi Na 3.12. –  je désire  : litt. mon être ou mon gosier désire  ; sur les deux sens possibles du mot hébreu, cf. v. 3 ; Dt 12.20 ; Es 5.14 ; 29.8 ; Jr 31.25 ; Ha 2.5 ; Ps 107.9 ; Pr 6.30 ; 10.3 ; 25.25 ; 27.7.'
  - type: text
    content: Quel malheur pour moi !
  - type: text
    content: Je suis comme à la récolte des fruits d'été,
  - type: text
    content: 'comme au grappillage après la vendange :'
  - type: text
    content: il n'y a pas une grappe à manger,
  - type: text
    content: pas une de ces figues précoces que je désire.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.11-13. –  couverte de honte Ab 10. –  Où est le Seigneur  : cf. Jl 2.17 ; Ps 42.4+. –  Elle me sera offerte en spectacle ou mes yeux la verront (même forme verbale au v. 9) ; cf. 4.11n. –  foulée aux pieds Es 5.5 ; 28.18. –  comme la boue des rues Es 10.6 ; Za 9.3 ; 10.5 ; Ps 18.43.'
  - type: text
    content: Mon ennemie le verra
  - type: text
    content: et sera couverte de honte,
  - type: text
    content: 'elle qui me disait :'
  - type: text
    content: 'Où est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu ?'
  - type: text
    content: 'Elle me sera offerte en spectacle :'
  - type: text
    content: La voilà foulée aux pieds
  - type: text
    content: comme la boue des rues.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'on rebâtira tes murs Am 9.14 ; Ps 51.20 ; 147.2 ; Né 2–4. –  tes limites  : traduction conjecturale ; cf. Dt 19.8 ; Es 54.2.'
  - type: text
    content: Le jour où l'on rebâtira tes murs,
  - type: text
    content: ce jour-là tes limites seront reculées.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.1ss ; Es 27.13. –  des villes d''Egypte  : au lieu de sa forme habituelle, le mot hébreu correspondant à Egypte est ici un homonyme du mot signifiant siège, fortification ou forteresse (on pourrait traduire villes fortes , 2Ch 8.5) ; de même en Es 19.6 ; 37.25 ; la deuxième fois LXX a lu Tyr  ; certains modifient le texte hébreu traditionnel pour lire jusqu''à l''Egypte . –  jusqu''au Fleuve , désignation habituelle de l''Euphrate ; cf. Gn 31.21 ; Ex 23.31 ; Nb 22.5 ; Dt 11.24 ; Es 8.7 ; Za 9.10 ; Ps 72.8s. –  d''une mer à l''autre…  : traduction obtenue par modification du texte hébreu traditionnel, d''après plusieurs versions anciennes.'
  - type: text
    content: En ce jour, on viendra vers toi
  - type: text
    content: de l'Assyrie et des villes d'Egypte,
  - type: text
    content: de l'Egypte jusqu'au Fleuve,
  - type: text
    content: d'une mer à l'autre, et d'une montagne à l'autre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 7.34 ; 49.13,17 ; 50.23 ; Jl 4.19 ; So 1.18 ; 2.13,15. –  fruit… Es 3.10 ; Jr 17.10 ; 21.14 ; 32.19.
  - type: text
    content: Le pays sera dévasté à cause de ses habitants,
  - type: text
    content: à cause du fruit de leurs agissements.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'houlette  : le mot correspondant est traduit par bâton en 4.14. –  fais paître (5.3+ ; Ps 23 ; 80.2) ton peuple / troupeau / patrimoine Es 63.17 ; Ps 28.9 ; 74.1+s ; 95.7 ; cf. Dt 9.26,29. –  solitaire ou à part Nb 23.9 ; Dt 33.28 ; Jr 49.31. –  la forêt ou les broussailles  ; cf. Jr 26.18n. –  au milieu des vergers ou d''un verger  ; certains comprennent le mot comme un nom propre et traduisent au milieu du Carmel  ; cf. Es 29.17n  ; 37.24n. – Le Bashân et le Galaad à l''est du Jourdain (cf. Gn 31.21n  ; Nb 32 ; 1R 4.13,19 ; Es 33.9 ; Jr 50.19 ; Na 1.4), régions d''élevage Dt 32.14 ; Ez 39.18 ; Am 4.1 ; Ps 22.13 ; Ct 4.1 ; 6.5. –  comme aux jours d''autrefois Am 9.11 ; Ps 143.5.'
  - type: text
    content: Avec ta houlette, fais paître ton peuple,
  - type: text
    content: le troupeau qui constitue ton patrimoine !
  - type: text
    content: Il demeure solitaire dans la forêt,
  - type: text
    content: au milieu des vergers.
  - type: text
    content: Qu'ils paissent au Bashân et au Galaad
  - type: text
    content: comme aux jours d'autrefois !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'aux jours où tu sortis… Ex 13.21 ; Jg 5.4 ; Es 11.16 ; 63.7-14 ; Ps 68.8 ; 114.1 ; voir aussi 2S 5.24 ; Ps 44.10+. –  je lui ferai voir  : sens incertain ; quelques-uns modifient le texte hébreu traditionnel pour lire fais-nous voir.'
  - type: text
    content: Comme aux jours où tu sortis d'Egypte,
  - type: text
    content: je lui ferai voir des choses étonnantes.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Les nations… Es 26.11. –  la main sur leur bouche Jg 18.19 ; Es 52.15 ; Jb 21.5 ; 29.9 ; 40.4 ; Pr 30.32.
  - type: text
    content: Les nations le verront et seront confuses
  - type: text
    content: malgré toute leur puissance ;
  - type: text
    content: elles mettront la main sur leur bouche,
  - type: text
    content: leurs oreilles deviendront sourdes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Elles lécheront… Gn 3.14 ; Es 49.23 ; Ps 72.9. –  elles sortiront… Ps 18.46 ; cf. Os 3.5. –  effrayées Ex 15.14ss.
  - type: text
    content: Elles lécheront la poussière comme le serpent,
  - type: text
    content: comme les reptiles de la terre ;
  - type: text
    content: elles sortiront en tremblant de leurs forteresses
  - type: text
    content: 'vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ;'
  - type: text
    content: elles seront effrayées,
  - type: text
    content: elles te craindront.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est Dieu (hébreu ’El  ; cf. Gn 21.33n) …  : autre traduction y a-t-il un dieu comme toi… Ex 15.11 ; Es 40.18 ; 43.11 ; Jr 10.6 ; Ps 35.10+. –  qui pardonnes  : autres traductions qui enlèves ; qui te charges de  ; cf. Ex 34.6s ; Jr 50.20 ; Ps 32.1s ; 51.3 ; 65.4 : 86.5,15 ; 103 ; 130.7 ; voir aussi Es 53.4s ; Jn 1.29. –  transgression 1.5n. –  il prend plaisir  : cf. Ex 33.19 ; Es 30.18 ; Os 6.6.'
  - type: text
    content: Qui est Dieu comme toi,
  - type: text
    content: qui pardonnes la faute et passes sur la transgression
  - type: text
    content: en faveur du reste de ton patrimoine ?
  - type: text
    content: Il n'entretient pas sa colère à jamais,
  - type: text
    content: car il prend plaisir à la fidélité.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'il piétinera ou il écrasera . –  tu jetteras…  : cf. Es 38.17 ; Jr 50.20.'
  - type: text
    content: Il aura encore compassion de nous,
  - type: text
    content: il piétinera nos fautes ;
  - type: text
    content: tu jetteras dans les profondeurs de la mer tous leurs péchés,
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 57.1 ; Jr 5.1 ; Ps 14. –  fidèle  : terme dérivé du mot habituellement traduit par fidélité 6.8n  ; cf. Dt 33.8 ; 1S 2.9 ; 2S 22.6 ; Jr 3.12 ; Ps 12.2 ; 30.5 ; 31.24 ; 37.28 ; 50.5 ; 145.17 ; Pr 2.8 ; 2Ch 6.41. –  plus d''homme droit ou plus de juste parmi les hommes (6.8n) ; cf. 3.9+. –  en embuscade… 3.2s,10 ; Es 1.15 ; 3.5 ; Ez 22.2 ; Os 4.2 ; 6.8s ; Ps 10.9 ; Pr 1.11,18. –  un piège Jr 5.26.'
  - type: text
    content: Le fidèle a disparu du pays,
  - type: text
    content: et il n'y a plus d'homme droit,
  - type: text
    content: ils sont tous en embuscade pour verser le sang,
  - type: text
    content: chacun tend un piège à son frère.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Gn 12.1ss ; 28.13ss ; Es 41.8 ; Lc 1.54s,72s ; Rm 15.8. –  loyauté 6.8. –  juré Gn 22.16ss ; Lc 1.73.
  - type: text
    content: tu témoigneras ta loyauté à Jacob,
  - type: text
    content: ta fidélité à Abraham,
  - type: text
    content: comme tu l'as juré aux jours de jadis à nos pères.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Texte et traduction incertains. –  a des exigences  : litt. demande ou interroge . –  par intérêt  : litt. pour une rétribution  ; cf. 3.11+ ; Es 1.23 ; 5.23. –  montre  : litt. dit . –  son avidité  : autre traduction l''avidité de son gosier  ; cf. v. 1+ ; Pr 10.3 ; 11.6. –  ils font ainsi cause commune , traduction conjecturale ; on pourrait aussi comprendre ensemble ils pervertissent (la justice).'
  - type: text
    content: 'Leurs mains sont habiles pour faire le mal :'
  - type: text
    content: le prince a des exigences,
  - type: text
    content: le juge agit par intérêt,
  - type: text
    content: le grand montre son avidité,
  - type: text
    content: et ils font ainsi cause commune.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ronce / buisson d''épines  : cf. Gn 3.18 ; Jg 9.8ss ; 2S 23.6 ; Es 5.5s ; Ez 2.6 ; Pr 15.19 ; 22.5 ; Mt 13.7/ /. –  C''est le jour…  : texte incertain, litt. jour de tes guetteurs  ; quelques-uns modifient le texte hébreu traditionnel pour lire malheur ! leur châtiment vient du nord (cf. Jr 1.14n) ; sur où tu vas rendre des comptes , voir Jr 6.15n  ; 8.12n. –  guetteurs  : cf. v. 7 ; Es 56.10 ; Jr 6.17 ; Ez 3.17ss ; 33.2,7 ; Ha 2.1. –  confusion Ex 14.3 ; Es 22.5 ; Jl 1.18 ; Est 3.15.'
  - type: text
    content: Le meilleur d'entre eux est comme une ronce,
  - type: text
    content: l'homme droit pire qu'un buisson d'épines.
  - type: text
    content: C'est le jour annoncé par tes guetteurs,
  - type: text
    content: celui où tu vas rendre des comptes.
  - type: text
    content: Maintenant ils seront dans la confusion.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ami / intime Jr 9.4 ; Ps 55.13s ; Pr 16.28 ; 17.9. –  celle qui couche… Dt 13.7 ; 28.54 ; cf. Siracide 9.1s : « Ne sois pas jaloux de la femme que tu chéris, de peur qu''elle n''apprenne à mal agir envers toi. Ne te livre pas à une femme au point qu''elle domine sur toi. » –  les portes (litt. les entrées, les ouvertures ) de ta bouche  : cf. Ps 39.2 ; 141.3.'
  - type: text
    content: Ne vous fiez pas à un ami,
  - type: text
    content: ne faites pas confiance à un intime ;
  - type: text
    content: devant celle qui couche sur ton sein
  - type: text
    content: garde les portes de ta bouche.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Es 3.5 ; Mt 10 .21s, 35s ; Lc 12.53  ; cf. Ex 20.12 ; 21.15,17 ; Lv 20.9 ; Dt 21.18s ; Pr 20.20 ; voir aussi Ml 3.24. –  rabaisse ou méprise , même verbe en Dt 32.15n  ; Jr 14.21 ; Na 3.6.
  - type: text
    content: Car le fils rabaisse le père,
  - type: text
    content: la fille se dresse contre sa mère,
  - type: text
    content: la belle-fille contre sa belle-mère ;
  - type: text
    content: chacun a pour ennemis les gens de sa propre maison.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Quant à moi  : cf. 3.8 ; Jos 24.15 ; Es 8.17s ; Ha 3.18 ; Ps 13.6. –  je guetterai  : cf. v. 4 ; Es 17.7 ; Ha 2.1 ; Ps 5.4. –  j''attendrai  : cf. 5.6 ; Lm 3.21ss. –  Dieu de mon salut Ps 24.5+. –  m''entendra  : cf. Jr 37.3 ; Am 7.2.'
  - type: text
    content: 'Quant à moi, je guetterai le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: j'attendrai le Dieu de mon salut ;
  - type: text
    content: mon Dieu m'entendra.
  - type: heading
    content: Espérance et prière du peuple
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ne te réjouis pas… Ab 12 ; Ps 30.2 ; 35.19 ; 137.7ss. –  ténèbres / lumière Es 9.1 ; 42.7 ; 49.9 ; 50.10 ; 58.10 ; 59.9 ; Am 5.18 ; Ps 18.29 ; 27.1 ; 88.7 ; 107.10 ; 143.3 ; Jb 5.14 ; 15.22 ; 30.26 ; Jn 8.12+ ; 1Jn 1.5.
  - type: text
    content: Ne te réjouis pas à mon sujet, mon ennemie !
  - type: text
    content: Car, si je tombe, je me relève ;
  - type: text
    content: si je suis assise dans les ténèbres,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est ma lumière.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Je supporterai Jr 10.19 ; Lm 3.26ss. –  l''irritation ou la rage , cf. Es 30.30 ; Pr 19.3n,12 ; 2Ch 16.10 ; 26.19 ; 28.9. –  puisque j''ai péché  : cf. 1.5 ; Es 64.5 ; Ps 41.5. –  défende ma cause 1S 24.16 ; 25.39 ; Jr 11.20 ; 50.34 ; 51.36 ; Ps 43.1 ; 74.22 ; 119.154 ; Pr 22.23 ; 23.11 ; cf. Dt 32.35. –  il me fera sortir…  : cf. Es 42.1n  ; Ha 1.4n  ; Ps 17.2n  ; 37.6n. –  sa justice  : cf. 6.5n  ; Es 41.2,10 ; 45.8,13,24 ; 46.13 ; 51.5ss ; 54.17.'
  - type: text
    content: 'Je supporterai l''irritation du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: puisque j'ai péché contre lui,
  - type: text
    content: jusqu'à ce qu'il défende ma cause et mon droit ;
  - type: text
    content: il me fera sortir à la lumière,
  - type: text
    content: et je verrai sa justice.
