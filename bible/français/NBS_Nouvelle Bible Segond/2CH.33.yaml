  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Manassé avait douze ans lorsqu''il devint roi ; il régna cinquante-cinq ans à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui déplaisait au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6,22 ; 1R 11.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les abominations des nations…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 7.25+ ; 18.9,12.'
    marker-yv: yv-n
  - type: text
    text: 'Il fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', imitant les abominations des nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dépossédées devant les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il éleva des autels
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il s'était fait des pierres levées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baals
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des poteaux cultuels
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au singulier en 2R 21.3.'
    marker-yv: yv-n
  - type: text
    text: 'Il rebâtit les hauts lieux qu''Ezéchias, son père, avait démolis ; il éleva des autels pour les Baals, il fit des poteaux cultuels (des ashéras) ; il se prosterna devant toute l''armée du ciel et la servit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Jérusalem… mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' pour toujours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.36.
    marker-yv: yv-n
  - type: text
    text: 'Il bâtit des autels dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dont le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dit : « C''est à Jérusalem que sera mon nom pour toujours. » '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il bâtit des autels pour toute l''armée du ciel dans les deux cours de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la vallée du Fils de Hinnom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 28.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 15.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'présages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'divination '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sorcellerie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 19.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 24.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 18.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'spirites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: médiums
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 19.31+ ; 1S 28.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit passer ses fils par le feu dans la vallée du Fils de Hinnom ; il cherchait des présages et pratiquait la divination et la sorcellerie. Il installa des spirites et des médiums. Il contraria le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en faisant de plus en plus ce qui lui déplaisait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la statue, l'effigie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la statue de l'effigie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur le second terme, voir v. 15 ; Dt 4.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 8.3,5.'
    marker-yv: yv-n
  - type: text
    text: 'Il mit la statue, l''effigie qu''il avait faite, dans la maison de Dieu, dont Dieu avait dit à David et à Salomon, son fils : « C''est dans cette maison et c''est dans Jérusalem, que j''ai choisie parmi toutes les tribus d''Israël, que je veux pour toujours placer mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pied d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pourvu… qu''ils veillent à mettre en pratique… selon toute la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.16 ; 33.8 ; 2R 21.8.
    marker-yv: yv-n
  - type: text
    text: 'Je n''éloignerai plus Israël de la terre que j''ai destinée à vos pères, pourvu seulement qu''ils veillent à mettre en pratique tout ce que je leur ai ordonné, selon toute la loi, les prescriptions et les règles instituées pour eux par l''intermédiaire de Moïse. » '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais Manassé égara Juda et les habitants de Jérusalem, de sorte qu''ils firent plus de mal que les nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait détruites devant les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 21.10-15.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parla à Manassé et à son peuple, mais ils ne prêtèrent pas attention.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec des crochets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu a été compris de deux façons : généralement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'épine, ajonc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(2R 14.9 ; Ps 58.10), il pourrait aussi désigner une cachette, un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trou '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(1S 13.6). Certains comprennent donc que Manassé s''était caché '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans un recoin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec des entraves de bronze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 36.6 ; cf. Jg 16.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 25.7.'
    marker-yv: yv-n
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fit venir contre eux les chefs de l''armée du roi d''Assyrie, qui prirent Manassé avec des crochets ; ils l''attachèrent avec des entraves de bronze et l''emmenèrent à Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chercha à apaiser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: adoucit la face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ex 32.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''humilia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 19,23 ; 12.6+.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il fut dans la détresse, il chercha à apaiser le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', son Dieu ; il s''humilia profondément devant le Dieu de ses pères. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il pria le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il le pria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se laissa fléchir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 19 ; Gn 25.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 21.14 ; 24.25 ; Es 19.22 ; Esd 8.23 ; 1Ch 5.20.'
    marker-yv: yv-n
  - type: text
    text: 'Il pria le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et celui-ci se laissa fléchir ; il entendit sa supplication et le ramena à Jérusalem, dans son royaume. Ainsi Manassé sut que c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) qui est Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la porte des Poissons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. So 1.10 ; Né 3.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Après cela, il bâtit une muraille extérieure à la Ville de David, à l'ouest de Guihôn, dans l'oued, jusqu'à l'accès de la porte des Poissons ; elle entourait l'Ophel, et il l'éleva à une grande hauteur ; il mit aussi des chefs militaires dans toutes les villes fortes de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il supprima de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) les dieux étrangers et l''effigie, ainsi que tous les autels qu''il avait bâtis dans la montagne de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et à Jérusalem ; il les jeta hors de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rebâtit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: affermit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sacrifices de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 29.31 ; 1S 11.15 ; 2S 6.17 ; 1R 3.15.
    marker-yv: yv-n
  - type: text
    text: 'Il rebâtit l''autel du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', il y offrit des sacrifices de paix et de reconnaissance, et il dit à Juda de servir le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: hauts
      - type: text
        text: ' lieux.'
    marker-yv: yv-n
  - type: text
    text: 'Le peuple sacrifiait bien encore dans les hauts lieux, mais seulement au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', son Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le reste de l''histoire… '
