    - type: usfm
      marker: fq
      children:
      - type: text
        text: des rois d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2R 21.17 ; les mots correspondants sont absents de LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Le reste de l''histoire de Manassé, sa prière à son Dieu, et les paroles des visionnaires qui lui parlèrent au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, cela est écrit dans l''histoire des rois d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se laissa fléchir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péchés
      - type: text
        text: ' et ses sacrilèges'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son péché et son sacrilège
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les endroits '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les lieux
    - type: usfm
      marker: ft
      children:
