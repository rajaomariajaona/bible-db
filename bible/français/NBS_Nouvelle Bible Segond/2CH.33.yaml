document_id: 2CH.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Manassé
  - type: heading
    content: 2R 21.1-18
  - type: text
    content: 'Manassé avait douze ans lorsqu''il devint roi ; il régna cinquante-cinq ans à Jérusalem. '
  '10':
  - type: note
    content: Cf. 2R 21.10-15.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla à Manassé et à son peuple, mais ils ne prêtèrent pas attention.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'avec des crochets  : le mot hébreu a été compris de deux façons : généralement traduit par épine, ajonc (2R 14.9 ; Ps 58.10), il pourrait aussi désigner une cachette, un trou (1S 13.6). Certains comprennent donc que Manassé s''était caché dans un recoin . –  avec des entraves de bronze 36.6 ; cf. Jg 16.21n  ; 2R 25.7.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit venir contre eux les chefs de l''armée du roi d''Assyrie, qui prirent Manassé avec des crochets ; ils l''attachèrent avec des entraves de bronze et l''emmenèrent à Babylone. '
  '12':
  - type: note
    content: 'chercha à apaiser  : litt. adoucit la face, cf. Ex 32.11+. –  s''humilia v. 19,23 ; 12.6+.'
  - type: text
    content: 'Lorsqu''il fut dans la détresse, il chercha à apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu ; il s''humilia profondément devant le Dieu de ses pères. '
  '13':
  - type: note
    content: 'Il pria le Seigneur  : litt. il le pria. –  se laissa fléchir  : cf. v. 19 ; Gn 25.21n  ; 2S 21.14 ; 24.25 ; Es 19.22 ; Esd 8.23 ; 1Ch 5.20.'
  - type: text
    content: 'Il pria le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et celui-ci se laissa fléchir ; il entendit sa supplication et le ramena à Jérusalem, dans son royaume. Ainsi Manassé sut que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est Dieu.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la porte des Poissons  : cf. So 1.10 ; Né 3.3n.'
  - type: text
    content: Après cela, il bâtit une muraille extérieure à la Ville de David, à l'ouest de Guihôn, dans l'oued, jusqu'à l'accès de la porte des Poissons ; elle entourait l'Ophel, et il l'éleva à une grande hauteur ; il mit aussi des chefs militaires dans toutes les villes fortes de Juda.
  '15':
  - type: text
    content: 'Il supprima de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) les dieux étrangers et l''effigie, ainsi que tous les autels qu''il avait bâtis dans la montagne de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à Jérusalem ; il les jeta hors de la ville. '
  '16':
  - type: note
    content: 'rebâtit  : autre lecture traditionnelle affermit. –  sacrifices de paix 29.31 ; 1S 11.15 ; 2S 6.17 ; 1R 3.15.'
  - type: text
    content: 'Il rebâtit l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il y offrit des sacrifices de paix et de reconnaissance, et il dit à Juda de servir le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '17':
  - type: note
    content: Voir hauts lieux.
  - type: text
    content: 'Le peuple sacrifiait bien encore dans les hauts lieux, mais seulement au '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  des rois d''Israël  : cf. 2R 21.17 ; les mots correspondants sont absents de LXX.'
  - type: text
    content: 'Le reste de l''histoire de Manassé, sa prière à son Dieu, et les paroles des visionnaires qui lui parlèrent au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, cela est écrit dans l''histoire des rois d''Israël. '
  '19':
  - type: note
    content: 'Dieu  : sous-entendu dans le texte. –  se laissa fléchir v. 13+. –  ses péchés et ses sacrilèges  : litt. son péché et son sacrilège. –  les endroits ou les lieux, terme qui désigne souvent des lieux sacrés. –  l''histoire de Hozaï  : un ms hébreu et LXX portent ici l''histoire (ou les paroles) des visionnaires.'
  - type: text
    content: 'Sa prière et la manière dont Dieu se laissa fléchir, ses péchés et ses sacrilèges, les endroits où il bâtit des hauts lieux et plaça des poteaux cultuels (des ashéras) et des statues avant de s''être humilié, cela est écrit dans l''histoire de Hozaï. '
  '2':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. v. 6,22 ; 1R 11.6n. –  les abominations des nations…  : cf. Dt 7.25+ ; 18.9,12.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', imitant les abominations des nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédées devant les Israélites. '
  '20':
  - type: note
    content: 'on l''ensevelit  : cf. 9.31n. –  chez lui  : litt. (dans) sa maison  ; LXX dans le jardin (autre terme en 2R 21.18) de sa maison.'
  - type: text
    content: Manassé se coucha avec ses pères, et on l'ensevelit chez lui. Amôn, son fils, devint roi à sa place.
  - type: heading
    content: Règne d'Amôn
  - type: heading
    content: 2R 21.19-26
  '21':
  - type: text
    content: 'Amôn avait vingt-deux ans lorsqu''il devint roi ; il régna deux ans à Jérusalem. '
  '22':
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme l''avait fait son père Manassé ; il sacrifia à toutes les statues que son père Manassé avait faites et les servit. '
  '23':
  - type: note
    content: 's''humilia / s''était humilié v. 12 ; 12.6+. –  se mit en tort bien davantage  : autre traduction multiplia ses torts.'
  - type: text
    content: 'Il ne s''humilia pas devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme son père Manassé s''était humilié. Lui, Amôn, se mit en tort bien davantage. '
  '24':
  - type: note
    content: 'chez lui  : litt. dans sa maison.'
  - type: text
    content: 'Les gens de sa cour conspirèrent contre lui et le mirent à mort chez lui. '
  '25':
  - type: text
    content: Mais le peuple du pays abattit tous ceux qui avaient conspiré contre le roi Amôn ; à sa place, le peuple du pays investit de la royauté Josias, son fils.
  '3':
  - type: note
    content: 'il éleva des autels  : LXX il s''était fait des pierres levées. –  les Baals / des poteaux cultuels  : au singulier en 2R 21.3.'
  - type: text
    content: 'Il rebâtit les hauts lieux qu''Ezéchias, son père, avait démolis ; il éleva des autels pour les Baals, il fit des poteaux cultuels (des ashéras) ; il se prosterna devant toute l''armée du ciel et la servit. '
  '4':
  - type: note
    content: à Jérusalem… mon nom pour toujours 1R 11.36.
  - type: text
    content: 'Il bâtit des autels dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit : « C''est à Jérusalem que sera mon nom pour toujours. » '
  '5':
  - type: text
    content: 'Il bâtit des autels pour toute l''armée du ciel dans les deux cours de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'dans la vallée du Fils de Hinnom  : cf. 28.3n  ; Jos 15.8n. –  présages / divination / sorcellerie  : cf. Lv 19.26n  ; Nb 24.1n  ; Dt 18.10+. –  spirites / médiums  : cf. Lv 19.31+ ; 1S 28.3n.'
  - type: text
    content: 'Il fit passer ses fils par le feu dans la vallée du Fils de Hinnom ; il cherchait des présages et pratiquait la divination et la sorcellerie. Il installa des spirites et des médiums. Il contraria le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en faisant de plus en plus ce qui lui déplaisait. '
  '7':
  - type: note
    content: 'la statue, l''effigie  : litt. la statue de l''effigie  ; sur le second terme, voir v. 15 ; Dt 4.16n  ; Ez 8.3,5.'
  - type: text
    content: 'Il mit la statue, l''effigie qu''il avait faite, dans la maison de Dieu, dont Dieu avait dit à David et à Salomon, son fils : « C''est dans cette maison et c''est dans Jérusalem, que j''ai choisie parmi toutes les tribus d''Israël, que je veux pour toujours placer mon nom. '
  '8':
  - type: note
    content: 'Israël  : litt. le pied d''Israël. –  de la terre  : cf. Gn 2.5n. –  pourvu… qu''ils veillent à mettre en pratique… selon toute la loi 6.16 ; 33.8 ; 2R 21.8.'
  - type: text
    content: 'Je n''éloignerai plus Israël de la terre que j''ai destinée à vos pères, pourvu seulement qu''ils veillent à mettre en pratique tout ce que je leur ai ordonné, selon toute la loi, les prescriptions et les règles instituées pour eux par l''intermédiaire de Moïse. » '
  '9':
  - type: text
    content: 'Mais Manassé égara Juda et les habitants de Jérusalem, de sorte qu''ils firent plus de mal que les nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait détruites devant les Israélites. '
