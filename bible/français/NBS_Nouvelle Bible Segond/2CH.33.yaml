    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des visionnaires.
    marker-yv: yv-n
  - type: text
    text: 'Sa prière et la manière dont Dieu se laissa fléchir, ses péchés et ses sacrilèges, les endroits où il bâtit des hauts lieux et plaça des poteaux cultuels (des ashéras) et des statues avant de s''être humilié, cela est écrit dans l''histoire de Hozaï. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on l'ensevelit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.31'
      - type: usfm
        marker: ord
