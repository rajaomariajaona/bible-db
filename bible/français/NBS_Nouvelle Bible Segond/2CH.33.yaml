    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sa maison.
    marker-yv: yv-n
  - type: text
    text: Manassé se coucha avec ses pères, et on l'ensevelit chez lui. Amôn, son fils, devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Amôn
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2R 21.19-26
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Amôn avait vingt-deux ans lorsqu''il devint roi ; il régna deux ans à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', comme l''avait fait son père Manassé ; il sacrifia à toutes les statues que son père Manassé avait faites et les servit. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''humilia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''était humilié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 12 ; 12.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit en tort bien davantage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: multiplia ses torts.
    marker-yv: yv-n
  - type: text
    text: 'Il ne s''humilia pas devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', comme son père Manassé s''était humilié. Lui, Amôn, se mit en tort bien davantage. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans sa maison.
    marker-yv: yv-n
  - type: text
    text: 'Les gens de sa cour conspirèrent contre lui et le mirent à mort chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais le peuple du pays abattit tous ceux qui avaient conspiré contre le roi Amôn ; à sa place, le peuple du pays investit de la royauté Josias, son fils.
