        text: ', terme qui désigne souvent des lieux sacrés. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'histoire de Hozaï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms hébreu et LXX portent ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''histoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les paroles
