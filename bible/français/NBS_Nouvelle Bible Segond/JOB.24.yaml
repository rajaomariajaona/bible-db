verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Réplique de Job (suite) : Dieu laisse faire les méchants'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il s''agit ici des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'temps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'où Dieu exerce ses jugements. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Puissant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Pourquoi des temps ne sont-ils pas mis en réserve par le Puissant ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ceux qui le connaissent ne voient-ils pas ses jours ?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils vont tout nus, sans vêtement ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: affamés, ils portent les gerbes ;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 28.30-33 ; Jc 5.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans les enclos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans leurs enclos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les enclos des autres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: dans les enclos ils font de l'huile ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils foulent le pressoir, et pourtant ils ont soif ;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 35.9-13 ; So 1.10s ; Ps 94.5-7 ; Ec 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les mourants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après un ms hébreu et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: '  ; le texte hébreu traditionnel porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(variante de vocalisation) ; cf. Ez 30.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les victimes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la gorge des victimes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu ne voit là rien de choquant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur ce dernier terme, cf. 1.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; deux mss hébreux et Syr ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu ne fait pas attention à la prière.
      marker-yv: yv-n
    - type: text
      text: de la ville, les mourants soupirent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les victimes appellent au secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Dieu ne voit là rien de choquant !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jn 3.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses voies… ses sentiers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : probablement de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la lumière.
      marker-yv: yv-n
    - type: text
      text: Ceux-là ont été rebelles à la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne reconnaissent pas ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne restent pas dans ses sentiers.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 10.8s ; 37.32.
      marker-yv: yv-n
    - type: text
      text: Le meurtrier se lève quand paraît la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il tue le pauvre et le déshérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pendant la nuit il est comme un voleur.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Personne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (aucun) œil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Pr 7.9s.
      marker-yv: yv-n
    - type: text
      text: L'œil de l'adultère épie le crépuscule.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Personne ne me verra », dit-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il met un voile sur son visage.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dans les ténèbres, ils forcent les maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour ils se tiennent enfermés ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne connaissent pas la lumière.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '38.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ombre de mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Pour eux tous, le matin c'est une ombre de mort ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils y reconnaissent les terreurs de l'ombre de la mort.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ici et aux v. suivants Job semble formuler les idées de ses amis (cf. 15.20ss ; 18.5ss ; 20.4ss) plutôt que les siennes. On peut supposer qu''il le fait par dérision (d''où le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dit-on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui n''a pas d''équivalent dans le texte hébreu). Certains déplacent cependant les versets 18-24 pour en faire un troisième discours de Tsophar, après 27.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ou 27.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le méchant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est léger sur la face des eaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; d''autres modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils sont légers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 20.28 ; Os 10.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur part '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parcelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), cf. 15.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maudite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne prend pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aucun fouleur ne va plus vers ses vignes.
      marker-yv: yv-n
    - type: text
      text: Le méchant est, dit-on, emporté au gré des eaux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa part sur la terre est maudite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne prend pas le chemin des vignes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ps 49.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tarissent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''emparer de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 2,9 ; cf. 20.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: piller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ainsi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts, (ceux qui) ont '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (mais la suite est au singulier).
      marker-yv: yv-n
    - type: text
      text: Comme la sécheresse et la chaleur tarissent les eaux de la neige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi le séjour des morts fait disparaître le pécheur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bornes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 19.14 ; 27.17 ; Os 5.10 ; Pr 22.28 ; 23.10. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les méchants passent la limite.
      marker-yv: yv-n
    - type: text
      text: On déplace les bornes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on s'empare d'un troupeau et on le fait paître ;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 14.11 ; 26.14 ; Ez 21.37 ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la femme qui lui était douce l'oublie, on ne se souvient même plus de son nom.
      marker-yv: yv-n
    - type: text
      text: Le sein qui l'a porté l'oublie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les vers en font leurs délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne se souvient même plus de lui !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'injustice est abattue comme un arbre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il fréquentait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même verbe en Pr 13.20 ; 28.7 ; 29.3 ; certains lisent, avec une légère modification'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il faisait du mal à la femme stérile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 29.13 ; Gn 38.1-30 ; Dt 25.5-10.
