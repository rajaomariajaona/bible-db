document_id: JOB.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (suite) : Dieu laisse faire les méchants'
  - type: text
    content: ' '
  - type: note
    content: Il s'agit ici des temps et des jours où Dieu exerce ses jugements. –  Puissant 5.17n.
  - type: text
    content: Pourquoi des temps ne sont-ils pas mis en réserve par le Puissant ?
  - type: text
    content: Pourquoi ceux qui le connaissent ne voient-ils pas ses jours ?
  '10':
  - type: text
    content: Ils vont tout nus, sans vêtement ;
  - type: text
    content: affamés, ils portent les gerbes ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 28.30-33 ; Jc 5.4. –  dans les enclos  : litt. dans leurs enclos (c.-à-d. les enclos des autres ).'
  - type: text
    content: dans les enclos ils font de l'huile ;
  - type: text
    content: ils foulent le pressoir, et pourtant ils ont soif ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 35.9-13 ; So 1.10s ; Ps 94.5-7 ; Ec 4.1. –  les mourants  : d''après un ms hébreu et Syr  ; le texte hébreu traditionnel porte les hommes (variante de vocalisation) ; cf. Ez 30.24. –  les victimes  : autre traduction la gorge des victimes (voir Gn 1.20n). –  Dieu ne voit là rien de choquant  : sur ce dernier terme, cf. 1.22n  ; deux mss hébreux et Syr ont lu Dieu ne fait pas attention à la prière.'
  - type: text
    content: de la ville, les mourants soupirent,
  - type: text
    content: les victimes appellent au secours,
  - type: text
    content: et Dieu ne voit là rien de choquant !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Jn 3.19s. –  ses voies… ses sentiers  : probablement de la lumière.'
  - type: text
    content: Ceux-là ont été rebelles à la lumière,
  - type: text
    content: ils ne reconnaissent pas ses voies,
  - type: text
    content: ils ne restent pas dans ses sentiers.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 10.8s ; 37.32.
  - type: text
    content: Le meurtrier se lève quand paraît la lumière,
  - type: text
    content: il tue le pauvre et le déshérité,
  - type: text
    content: et pendant la nuit il est comme un voleur.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Personne  : litt. (aucun) œil  ; cf. Pr 7.9s.'
  - type: text
    content: L'œil de l'adultère épie le crépuscule.
  - type: text
    content: « Personne ne me verra », dit-il,
  - type: text
    content: il met un voile sur son visage.
  '16':
  - type: text
    content: Dans les ténèbres, ils forcent les maisons,
  - type: text
    content: le jour ils se tiennent enfermés ;
  - type: text
    content: ils ne connaissent pas la lumière.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 38.15. –  ombre de mort 3.5n.
  - type: text
    content: Pour eux tous, le matin c'est une ombre de mort ;
  - type: text
    content: ils y reconnaissent les terreurs de l'ombre de la mort.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ici et aux v. suivants Job semble formuler les idées de ses amis (cf. 15.20ss ; 18.5ss ; 20.4ss) plutôt que les siennes. On peut supposer qu''il le fait par dérision (d''où le dit-on , qui n''a pas d''équivalent dans le texte hébreu). Certains déplacent cependant les versets 18-24 pour en faire un troisième discours de Tsophar, après 27.13n ou 27.23. –  Le méchant…  : litt. il est léger sur la face des eaux  ; d''autres modifient le texte hébreu traditionnel pour lire ils sont légers  ; cf. 20.28 ; Os 10.7. –  sa part  : litt. leur part (ou parcelle ), cf. 15.28. –  sur la terre  : autre traduction dans le pays . –  maudite  : voir bénédiction. –  il ne prend pas…  : certains modifient le texte hébreu traditionnel pour lire aucun fouleur ne va plus vers ses vignes.'
  - type: text
    content: Le méchant est, dit-on, emporté au gré des eaux ;
  - type: text
    content: sa part sur la terre est maudite,
  - type: text
    content: il ne prend pas le chemin des vignes.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 49.15. –  tarissent  : le même verbe est traduit par s''emparer de aux v. 2,9 ; cf. 20.19n ( piller ). –  ainsi…  : litt. le séjour des morts, (ceux qui) ont péché (mais la suite est au singulier).'
  - type: text
    content: Comme la sécheresse et la chaleur tarissent les eaux de la neige,
  - type: text
    content: ainsi le séjour des morts fait disparaître le pécheur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'bornes  : cf. Dt 19.14 ; 27.17 ; Os 5.10 ; Pr 22.28 ; 23.10. LXX les méchants passent la limite.'
  - type: text
    content: On déplace les bornes,
  - type: text
    content: on s'empare d'un troupeau et on le fait paître ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 14.11 ; 26.14 ; Ez 21.37 ; certains modifient le texte hébreu traditionnel pour lire la femme qui lui était douce l'oublie, on ne se souvient même plus de son nom.
  - type: text
    content: Le sein qui l'a porté l'oublie,
  - type: text
    content: les vers en font leurs délices,
  - type: text
    content: on ne se souvient même plus de lui !
  - type: text
    content: L'injustice est abattue comme un arbre.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Il fréquentait  : même verbe en Pr 13.20 ; 28.7 ; 29.3 ; certains lisent, avec une légère modification  : il faisait du mal à la femme stérile  ; cf. 29.13 ; Gn 38.1-30 ; Dt 25.5-10.'
  - type: text
    content: Il fréquentait une femme stérile, qui n'avait pas d'enfants,
  - type: text
    content: au lieu de faire du bien à une veuve.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Traduction conjecturale jusqu'au v. 24 ; autre possibilité quand il (le méchant) serait de taille à dompter les taureaux (autre sens du terme traduit par tyrans ou indomptables , cf. 34.20 ; Gn 49.24n) , il se lèvera incertain de la vie  ; cf. Dt 28.66.
  - type: text
    content: Mais celui qui par sa force emporte les tyrans
  - type: text
    content: s'est dressé, et ceux-là ne peuvent plus compter sur la vie.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Il leur donnait  : litt. il lui donnait… et il s''y appuyait , mais la suite est au pluriel.'
  - type: text
    content: Il leur donnait la sécurité et ils s'y appuyaient,
  - type: text
    content: mais il gardait les yeux sur leurs voies.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '21.13. –  comme toutes les gerbes…  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire comme un fruit (d''arroche , cf. 30.4n ) mûr.'
  - type: text
    content: Ils ont été élevés un peu de temps, et ils ne sont plus.
  - type: text
    content: Ils tombent comme toutes les gerbes de la moisson,
  - type: text
    content: ils sont coupés comme des épis.
  '25':
  - type: text
    content: S'il n'en est pas ainsi, qui me démentira ?
  - type: text
    content: Qui réduira mes propos à néant ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: orphelins / veuve 22.9+. –  gage 22.6+ ; voir Dt 24.17.
  - type: text
    content: on emmène l'âne des orphelins,
  - type: text
    content: on prend pour gage le bœuf de la veuve ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: pauvres Dt 15.11. –  se cacher Pr 28.12,28.
  - type: text
    content: on fait dévier du chemin les déshérités,
  - type: text
    content: on force tous les pauvres du pays à se cacher.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '30.3-5. –  de quoi manger 16.9n. –  aux enfants  : autre traduction aux jeunes gens.'
  - type: text
    content: Comme des ânes sauvages dans le désert,
  - type: text
    content: ils sortent à leur travail dès l'aurore pour trouver de quoi manger ;
  - type: text
    content: il n'y a que la plaine aride pour donner du pain aux enfants ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le fourrage  : litt. son fourrage.'
  - type: text
    content: dans la campagne, ils coupent le fourrage
  - type: text
    content: et grappillent la vigne du méchant ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: Dt 24.12s.
  - type: text
    content: ils passent la nuit tout nus, sans vêtement,
  - type: text
    content: ils n'ont pas de couverture contre le froid ;
  '8':
  - type: text
    content: ils sont trempés par les averses des montagnes,
  - type: text
    content: et, faute d'abri, ils étreignent les rochers.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'On s''empare de  : autre traduction on dépouille (cf. v. 2,19n). –  par la violence  : litt. par (la) dévastation (hébreu shod ). LXX on arrache l''orphelin à la mamelle (ce qui correspondrait à l''hébreu shad ). –  gages 22.6+ ; voir Am 2.6 ; 8.6.'
  - type: text
    content: On s'empare de l'orphelin par la violence,
  - type: text
    content: on prend des gages sur le pauvre.
