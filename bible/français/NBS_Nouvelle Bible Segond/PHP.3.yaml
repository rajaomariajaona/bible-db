document_id: PHP.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vraie manière d'être juste aux yeux de Dieu
  - type: text
    content: ' '
  - type: note
    content: réjouissez-vous 1.4+ ; cf. 2.18 ; 2Co 13.11 ; 1Th 5.16.
  - type: text
    content: Au reste, mes frères, réjouissez-vous dans le Seigneur. Je n'éprouve aucun ennui à vous écrire les mêmes choses, et pour vous, c'est une sécurité.
  '10':
  - type: note
    content: 'Cf. Rm 6.4-9 ; 8.11 ; 1Co 6.14 ; 2Co 4.10+ss ; voir aussi Jn 11.24-26. –  Il s''agit…  : litt. pour le connaître…  ; autre traduction la foi (v. 9) qui consiste à le connaître… v. 8+. –  la puissance de sa résurrection Rm 1.4n  ; Ep 1.19s. –  la communion de (ou la solidarité avec, 1.5n,7) ses souffrances Rm 8.17 ; Ga 6.17. –  en étant…  : litt. en étant configurés à sa mort  ; terme apparenté v. 21 ; Rm 8.29n.'
  - type: text
    content: 'Il s''agit maintenant de le connaître, lui, ainsi que la puissance de sa résurrection et la communion de ses souffrances, en étant configurés à lui dans la mort, '
  '11':
  - type: note
    content: 'Cf. Lc 20.35 ; 2Co 5.3. –  résurrection  : terme apparenté à celui qui a été employé au v. 10 (on trouve un jeu analogue sur deux autres mots apparentés entre eux en 1Co 6.14) ; autre traduction à la résurrection qui est, nécessairement, résurrection d''entre les morts.'
  - type: text
    content: pour parvenir, si possible, à la résurrection d'entre les morts.
  - type: heading
    content: Courir vers le but
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'tout cela  : sous-entendu dans le texte. –  accomplissement  : cf. v. 15n. –  je le poursuis ou je m''élance , cf. v. 14 ; 2.16+ ; même verbe en Rm 9.30nss. –  le saisir ou saisir , cf. 1Tm 6.12 (terme apparenté). –  j''ai été saisi  : cf. 1Co 8.3 ; Ga 4.9 ; 1Jn 4.10,19 ; voir aussi Ac 9.5s ; Ga 1.15s. –  par Jésus-Christ ou, selon certains mss, par le Christ.'
  - type: text
    content: 'Ce n''est pas que j''aie déjà obtenu tout cela ni que je sois déjà parvenu à l''accomplissement ; mais je le poursuis, tâchant de le saisir, pour autant que moi-même j''ai été saisi par Jésus-Christ. '
  '13':
  - type: note
    content: 'Cf. Lc 9.62 ; Hé 12.1. –  je n''estime pas  : certains mss portent je n''estime pas encore.'
  - type: text
    content: 'En ce qui me concerne, mes frères, je n''estime pas moi-même l''avoir déjà saisi ; mais une seule chose compte : oubliant ce qui est en arrière et tendant vers ce qui est en avant, '
  '14':
  - type: note
    content: 'le prix 1Co 9.24. –  l''appel céleste  : litt. l''appel d''en haut, cf. Hé 3.1 ; certains voient ici l''image de la mention publique et officielle du nom des athlètes qui avaient remporté une épreuve aux jeux Olympiques.'
  - type: text
    content: 'je cours vers le but pour obtenir le prix de l''appel céleste de Dieu en Jésus-Christ. '
  '15':
  - type: note
    content: 'Si donc…  : autre traduction nous tous qui sommes des adultes…  ; le terme rendu par gens « accomplis », apparenté au verbe traduit par parvenir à l''accomplissement au v. 12, est peut-être employé ici avec une certaine ironie ; cf. 1Co 2.6n  ; 14.20 ; Ep 4.13 ; Col 1.28. –  à cette pensée 1.7n. –  Dieu vous révélera…  : cf. 1Co 14.30.'
  - type: text
    content: 'Si donc nous sommes des gens « accomplis », tenons-nous-en à cette pensée ; et si sur quelque point vous pensez différemment, Dieu vous révélera aussi ce qu''il en est. '
  '16':
  - type: note
    content: 'avançons  : même verbe en Ga 6.16n.'
  - type: text
    content: Seulement, au point où nous sommes parvenus, avançons ensemble.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'imitez-moi 4.9 ; 1Co 11.1+. –  ceux qui suivent…  : litt. ceux qui marchent (v. 18n) selon le modèle (Rm 5.14n) …  ; cf. 2.19ss ; voir aussi 1Th 1.6s ; 2.14 ; 2Th 3.9 ; 1Tm 4.12 ; Tt 2.7 ; 1P 5.3.'
  - type: text
    content: 'Mes frères, imitez-moi, et portez les regards sur ceux qui suivent le modèle que vous avez en nous. '
  '18':
  - type: note
    content: 'qui se comportent  : litt. qui marchent, comme au v. 17. –  ennemis 1.28. –  la croix du Christ 2.8+ ; cf. 1Co 1.17s ; Ga 5.11 ; 6.12. –  en pleurant 2Co 2.4.'
  - type: text
    content: 'Car il en est beaucoup qui se comportent en ennemis de la croix du Christ ; je vous en ai souvent parlé, mais maintenant j''en parle en pleurant : '
  '19':
  - type: note
    content: 'leur fin 2Co 11.15. –  perdition 2P 2.1+. –  leur ventre Rm 16.18 ; 1Co 6.13 ; cf. Col 2.16,20s ; 2Tm 3.4. –  gloire / honte  : cf. Os 4.7. –  ils ne pensent (1.7n) qu''aux choses de la terre Col 3.2 ; cf. Mt 6.19 ; Jn 3.12.'
  - type: text
    content: 'leur fin, c''est la perdition ; leur dieu, c''est leur ventre, ils mettent leur gloire dans ce qui fait leur honte ; ils ne pensent qu''aux choses de la terre. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'chiens  : cf. Mt 7.6 ; 15.26 ; 2P 2.22 ; Ap 22.15. –  mauvais ouvriers  : cf. 2Co 11.13. –  aux partisans de la mutilation  : litt. à la mutilation ou à l''incision , terme apparenté à celui qui désigne la circoncision (v. 3n), de toute évidence employé ici pour l''évoquer ironiquement ; cf. Ga 5.12 (autre terme).'
  - type: text
    content: 'Prenez garde aux chiens, prenez garde aux mauvais ouvriers, prenez garde aux partisans de la mutilation. '
  '20':
  - type: note
    content: 'notre citoyenneté  : autre traduction notre cité  ; cf. 1.27n. –  dans les cieux v. 14 ; Ep 2.6 ; Col 3.1 ; Hé 12.22+. –  nous attendons Rm 8.19ss ; 1Co 1.7 ; Tt 2.13 ; Hé 9.28. –  sauveur 2Tm 1.10+ ; cf. Rm 5.9 ; 1Co 3.15 ; 5.5 ; 1Th 5.9.'
  - type: text
    content: 'Quant à nous, notre citoyenneté est dans les cieux ; de là nous attendons comme sauveur le Seigneur Jésus-Christ, '
  '21':
  - type: note
    content: 'qui transformera 2.7n  ; 1Co 15.42-49,53. –  notre corps humilié  : litt. le corps de notre humiliation ou de notre abaissement 2.8n. –  en le configurant (v. 10n) : terme dérivé du mot correspondant à forme, figure ou condition en 2.6ns ; même terme en Rm 8.29 ; un verbe apparenté est traduit par transfigurer en Mc 9.2n  ; Rm 12.2n  ; 2Co 3.18 ; voir aussi 1Jn 3.2. –  par l''opération… 2.10-12n  ; 1Co 15.27+ss ; Ep 1.19-22 ; Hé 2.8 ; voir aussi 1Co 1.25.'
  - type: text
    content: qui transformera notre corps humilié, en le configurant à son corps glorieux par l'opération qui le rend capable de tout s'assujettir.
  '3':
  - type: note
    content: 'les vrais circoncis  : litt. la circoncision (v. 2n) ; cf. Rm 2.28-29+ ; Col 2.11. –  qui célébrons le culte…  : cf. 2.17 ; sur le verbe qui apparaît ici, voir Lc 2.37n  ; Rm 1.9n  ; cf. Rm 12.1 ; voir aussi Jn 4.23s. – Voir Esprit. –  fierté 1.26+ ; 1Co 1.31+. –  dans la chair 3.4 ; Ga 6.13s.'
  - type: text
    content: 'Car c''est nous qui sommes les vrais circoncis, nous qui célébrons le culte par l''Esprit de Dieu, qui mettons notre fierté en Jésus-Christ et qui ne mettons pas notre confiance dans la chair. '
  '4':
  - type: note
    content: Moi… 2Co 11.18+ ; pour la suite cf. Ac 22.3-5 ; 26.4-7 ; Rm 11.1 ; 2Co 11.21ss ; Ga 1.13s.
  - type: text
    content: Moi, pourtant, j'aurais des raisons de mettre ma confiance dans la chair.
  - type: text
    content: 'Si d''autres considèrent qu''ils peuvent mettre leur confiance dans la chair, à plus forte raison moi : '
  '5':
  - type: note
    content: 'circoncis le huitième jour Gn 17.12 ; Lv 12.3 ; Lc 1.59+. –  Benjamin  : cf. 1R 12.21 ; Ac 13.21n  ; Rm 11.1. –  Hébreu  : sans doute au sens linguistique et culturel, par opposition aux Juifs de langue grecque Ac 6.1n  ; cf. 21.39s ; 22.2s ; 26.4 ; 2Co 11.22n. –  pharisien Ac 22.3 ; 23.6 ; 26.5.'
  - type: text
    content: 'circoncis le huitième jour, de la lignée d''Israël, de la tribu de Benjamin, Hébreu né d''Hébreux ; quant à la loi, pharisien ; '
  '6':
  - type: note
    content: 'quant à la passion ou à la jalousie, au zèle, cf. Ga 1.14n. –  persécuteur Ac 8.1-3+ ; 9.1ss ; 1Co 15.9 ; Ga 1.13s,23 ; 1Tm 1.13s. – Voir Eglise. –  de la loi  : litt. qui advient par une loi, cf. Rm 2.17 ; voir aussi Mt 5.17-20. –  irréprochable 2.15n.'
  - type: text
    content: quant à la passion, persécuteur de l'Eglise ; quant à la justice de la loi, irréprochable.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ga 1.15 ; cf. Ac 9.4ss ; voir aussi Mt 13.44,46 ; 16.26. –  à cause du Christ  : 1Co 4.10 ; 2Co 4.5.'
  - type: text
    content: 'Mais ce qui était pour moi un gain, je l''ai considéré comme une perte à cause du Christ. '
  '8':
  - type: note
    content: 'la supériorité ou la valeur suprême, litt. ce qui surpasse (comme en 4.7) ; on pourrait traduire le bien suprême qu''est la connaissance du Christ  : v. 10s ; cf. Jn 17.3 ; 1Co 13.12 ; Ep 3.19 ; 4.13 ; 2P 3.18. –  mon Seigneur 2.11+.'
  - type: text
    content: 'En fait, je considère tout comme une perte à cause de la supériorité de la connaissance de Jésus-Christ, mon Seigneur. A cause de lui, j''ai accepté de tout perdre, et je considère tout comme des ordures, afin de gagner le Christ '
  '9':
  - type: note
    content: 'être trouvé (2.7n) 1Co 4.2 ; 15.15 ; 2Co 5.3 ; Ga 2.17 ; cf. Mt 24.46. –  justice Rm 1.17+ ; autre traduction possible ayant pour justice, non pas celle qui est en vertu de la loi, mais celle qui est par la foi… –  la foi du Christ  : autre traduction une foi de Christ  ; voir Rm 3.22n  ; Ga 2.16n. –  fondée sur la foi Rm 3.21s ; 10.2s ; Ga 3.21s.'
  - type: text
    content: 'et d''être trouvé en lui, non pas avec ma propre justice, qui viendrait de la loi, mais avec celle qui est par la foi du Christ, une justice venant de Dieu et fondée sur la foi. '
