        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1Tm 6.12 (terme apparenté). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai été saisi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1Co 8.3 ; Ga 4.9 ; 1Jn 4.10,19 ; voir aussi Ac 9.5s ; Ga 1.15s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par Jésus-Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon certains mss, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par le Christ.
      marker-yv: yv-n
    - type: text
      text: 'Ce n''est pas que j''aie déjà obtenu tout cela ni que je sois déjà parvenu à l''accomplissement ; mais je le poursuis, tâchant de le saisir, pour autant que moi-même j''ai été saisi par Jésus-Christ. '
