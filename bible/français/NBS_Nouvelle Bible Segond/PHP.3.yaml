        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il s''agit maintenant de le connaître, lui, ainsi que la puissance de sa résurrection et la communion de ses souffrances, en étant configurés à lui dans la mort, '
