        - type: text
          text: je n'estime pas encore.
      marker-yv: yv-n
    - type: text
      text: 'En ce qui me concerne, mes frères, je n''estime pas moi-même l''avoir déjà saisi ; mais une seule chose compte : oubliant ce qui est en arrière et tendant vers ce qui est en avant, '
