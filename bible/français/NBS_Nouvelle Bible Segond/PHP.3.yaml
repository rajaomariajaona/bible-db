          text: 'Cf. Lc 20.35 ; 2Co 5.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: résurrection
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme apparenté à celui qui a été employé au v. 10 (on trouve un jeu analogue sur deux autres mots apparentés entre eux en 1Co 6.14) ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la résurrection qui est, nécessairement, résurrection d'entre les morts.
      marker-yv: yv-n
    - type: text
      text: pour parvenir, si possible, à la résurrection d'entre les morts.
  - type: usfm
