  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vraie manière d'être juste aux yeux de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réjouissez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.4+ ; cf. 2.18 ; 2Co 13.11 ; 1Th 5.16.
      marker-yv: yv-n
    - type: text
      text: Au reste, mes frères, réjouissez-vous dans le Seigneur. Je n'éprouve aucun ennui à vous écrire les mêmes choses, et pour vous, c'est une sécurité.
