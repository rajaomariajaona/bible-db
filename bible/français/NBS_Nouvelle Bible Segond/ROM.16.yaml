document_id: ROM.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutations personnelles
  - type: text
    content: ' '
  - type: note
    content: 'Je vous recommande 3.5n  ; Ac 18.27+. –  Phœbé  : cette femme, comme la plupart des personnes mentionnées dans ce chapitre et dont les noms suggèrent une grande diversité ethnique et sociale, ne nous est pas connue par ailleurs. C''est peut-être elle qui a porté l''épître (cf. v. 27n). –  ministre  : autre traduction diacre (voir 12.7n  ; 15.8n), d''où le titre traditionnel de diaconesse , quoique dans le N.T. le même terme soit appliqué indifféremment à des hommes et à des femmes (cf. Ph 1.1 ; 1Tm 3.8n,11n) ; on le retrouve en 1Co 3.5 ( serviteurs ) ; 2Co 3.6 ; 6.4 ; Ep 3.7 ; 6.21 ; Col 1.7,23,25. –  Cenchrées  : le port oriental de Corinthe (Ac 18.18).'
  - type: text
    content: 'Je vous recommande Phœbé, notre sœur, qui est ministre de l''Eglise de Cenchrées, '
  '10':
  - type: note
    content: 'qui a fait ses preuves  : litt. celui qui a été approuvé ou apprécié (cf. 1.28n  ; 5.4n  ; 14.18).'
  - type: text
    content: 'Saluez Apellès, qui a fait ses preuves dans le Christ. Saluez ceux de la maison d''Aristobule. '
  '11':
  - type: note
    content: parenté v. 7n.
  - type: text
    content: 'Saluez Hérodion, qui est de ma parenté. Saluez ceux de la maison de Narcisse qui sont dans le Seigneur. '
  '12':
  - type: text
    content: 'Saluez Tryphène et Tryphose, elles qui se sont donné de la peine dans le Seigneur. Saluez Perside, la bien-aimée, qui s''est donné beaucoup de peine dans le Seigneur. '
  '13':
  - type: note
    content: 'Rufus  : peut-être le fils de Simon de Cyrène (Mc 15.21). –  a été choisi  : on peut comprendre a été tout particulièrement choisi (ou élu). –  sa mère…  : cf. Jn 19.26s.'
  - type: text
    content: 'Saluez Rufus, celui qui, dans le Seigneur, a été choisi, et sa mère, qui est aussi la mienne. '
  '14':
  - type: text
    content: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas, et les frères qui sont avec eux. '
  '15':
  - type: note
    content: Olympas ou Olympe.
  - type: text
    content: 'Saluez Philologue et Julie, Nérée et sa sœur, ainsi qu''Olympas et tous les saints qui sont avec eux. '
  '16':
  - type: note
    content: Le saint baiser était sans doute un élément habituel dans le déroulement des assemblées chrétiennes ; cf. 1Co 16.20 ; 2Co 13.12 ; 1Th 5.26 ; 1P 5.14 ; voir aussi Lc 7.45 ; 22.48 ; Ac 20.37.
  - type: text
    content: Saluez-vous les uns les autres par un saint baiser.
  - type: text
    content: Toutes les Eglises du Christ vous saluent.
  - type: heading
    content: Un dernier avertissement
  '17':
  - type: text
    content: ' '
  - type: note
    content: encourage ou exhorte 12.1+. –  divisions Ga 5.20. –  des chutes ou des causes de chutes , cf. 9.33 ; 11.9 ; 14.13,21 ; Mt 11.6n. –  enseignement 6.17. –  Eloignez-vous d'eux 1Co 5.9,11 ; 2Th 3.6,14 ; 2Tm 3.5 ; Tt 3.10s ; 2Jn 7-10 ; cf. Mt 18.17.
  - type: text
    content: 'Je vous encourage, mes frères, à prendre garde à ceux qui causent des divisions et des chutes, contrairement à l''enseignement que vous avez reçu. Eloignez-vous d''eux. '
  '18':
  - type: note
    content: 'ne sont pas esclaves… ou ne servent pas le Christ… 7.6n  ; 12.11n  ; 14.18n. –  leur propre ventre Ph 3.18s. –  trompent Ep 5.6 ; Col 2.4 ; Tt 1.10-14 ; 2P 2.3. – Voir cœur. –  sans malice  : le terme peut être pris dans un sens positif (sans méchanceté) ou légèrement négatif (naïfs).'
  - type: text
    content: 'Car de tels individus ne sont pas esclaves du Christ, notre Seigneur, mais de leur propre ventre ; par de bonnes paroles et par des éloges, ils trompent le cœur des gens sans malice. '
  '19':
  - type: note
    content: 'votre obéissance 1.5+,8. –  que vous soyez sages…  : cf. Jr 4.22 ; Mt 10.16 ; 1Co 14.20 ; Ph 2.15 ; Hé 5.14. – Voir pur, impur.'
  - type: text
    content: 'Quant à vous, votre obéissance est connue de tous ; je me réjouis donc à votre sujet, mais je veux que vous soyez sages en ce qui concerne le bien comme vous êtes purs en ce qui concerne le mal. '
  '2':
  - type: note
    content: 'saints 1.7+ ; 15.25 ; 1Co 6.1. –  elle a été une protectrice…  : autre traduction elle est venue en aide à beaucoup…  ; le terme employé ici (apparenté à celui qui est traduit par diriger en 12.8n) suggère un statut social élevé.'
  - type: text
    content: afin que vous la receviez dans le Seigneur d'une manière digne des saints. Mettez-vous à sa disposition pour toute affaire où elle pourrait avoir besoin de vous, car elle a été une protectrice pour beaucoup, y compris pour moi-même.
  '20':
  - type: note
    content: 'Dieu de la paix 15.33+. –  écrasera  : cf. Gn 3.15. –  le Satan (voir démon, diable, Satan) 1Co 5.5 ; 7.5 ; 2Co 2.11 ; 11.14 ; 12.7 ; 1Th 2.18 ; 2Th 2.9 ; Ap 12.9+. –  Que la grâce… 1Co 16.23 ; 1Th 5.28 ; 2Th 3.18. Cette dernière phrase est absente de plusieurs mss ; cf. 16.24n,27n.'
  - type: text
    content: Le Dieu de la paix écrasera bientôt le Satan sous vos pieds.
  - type: text
    content: Que la grâce de notre Seigneur Jésus soit avec vous !
  '21':
  - type: text
    content: ' '
  - type: note
    content: Timothée Ac 16.1-3 ; 1Co 4.17. –  Lucius Ac 13.1 ( ?). –  Jason Ac 17.5s ( ?). –  Sosipater Ac 20.4 ( ?). –  parenté v. 7n.
  - type: text
    content: 'Timothée, mon collaborateur, vous salue, ainsi que Lucius, Jason et Sosipater, qui sont de ma parenté. '
  '22':
  - type: note
    content: 'Tertius  : le secrétaire de Paul ; cf. v. 27n  ; 1Co 16.21 ; Ga 6.11 ; Col 4.18 ; 2Th 3.17.'
  - type: text
    content: 'Je vous salue, moi, Tertius, qui ai écrit cette lettre, dans le Seigneur. '
  '23':
  - type: note
    content: Gaïos Ac 19.29 ; 1Co 1.14 ( ?). – Voir Eglise. –  Eraste Ac 19.22 ; 2Tm 4.20 ( ?).
  - type: text
    content: 'Gaïos, mon hôte et celui de toute l''Eglise, vous salue. Eraste, l''intendant de la ville, vous salue, ainsi que le frère Quartus. [ '
  '24':
  - type: note
    content: 'Quelques mss portent ici  : Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous ! Amen ! Certains d''entre eux omettent la formule correspondante au v. 20.'
  - type: text
    content: ']'
  - type: heading
    content: A Dieu, seul sage, la gloire !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Certains mss omettent les v. 25-27, d''autres les placent après 14.23 ou après 15.33 ; voir 16.20n,24n et l''introduction. –  A celui qui a le pouvoir Ep 3.20 ; Jd 24. –  ma bonne nouvelle 2.16n. –  proclamation 10.8+. –  révélation 1.17+ ; Ga 1.16 ; 3.23 ; Ep 3.5. –  mystère 11.25 ; 1Co 2.1+,7 ; Ep 1.9 ; 3.3-9 ; Col 1.26s ; 2.2s ; Ap 10.7. –  tenu secret…  : cf. 1P 1.20. –  depuis toujours  : litt. (pendant) des temps éternels (ou immémoriaux ).'
  - type: text
    content: 'A celui qui a le pouvoir de vous affermir selon ma bonne nouvelle et la proclamation de Jésus-Christ – conformément à la révélation du mystère qui était tenu secret depuis toujours, '
  '26':
  - type: note
    content: 's''est… manifesté  : litt. a été manifesté 3.21 ; 2Tm 1.9s. –  les Ecritures prophétiques  : autre traduction des Ecritures prophétiques 1.2+. –  porté à la connaissance 9.22n  ; Ep 1.9n. –  nations Ac 9.15+. –  l''obéissance de la foi 1.5n.'
  - type: text
    content: 'mais qui s''est maintenant manifesté par les Ecritures prophétiques, d''après l''ordre du Dieu éternel, et qui a été porté à la connaissance de toutes les nations en vue de l''obéissance de la foi – '
  '27':
  - type: note
    content: '11.36 ; Ga 1.5 ; Ep 3.21 ; Ph 4.20 ; 1Tm 1.17 ; 2Tm 4.18 ; Hé 13.21 ; 1P 4.11 ; 2P 3.18 ; Jd 25 ; Ap 1.6 ; 4.11+. –  seul sage 11.33 ; 1Co 1.24s ; Ap 7.12. – Certains mss donnent à la fin diverses indications  : Aux Romains ; écrite de Corinthe ; par Phœbé ministre de l''Eglise de Cenchrées ; écrite par Tertius et envoyée par Phœbé (cf. v. 1s,22).'
  - type: text
    content: 'à Dieu, seul sage, la gloire, par Jésus-Christ, pour toujours ! '
  - type: text
    content: Amen !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Prisca et Aquilas Ac 18.2s,18,26 ; 1Co 16.19 ; 2Tm 4.19.
  - type: text
    content: 'Saluez Prisca et Aquilas, mes collaborateurs en Jésus-Christ, '
  '4':
  - type: note
    content: 'risqué leur tête  : litt. exposé leur cou, cf. Ac 15.26. –  pour sauver ma vie  : autre traduction pour moi  ; sur le terme correspondant à vie, qui est quelquefois traduit par âme, cf. 2.9n. –  rends grâce 14.6 ; Mt 26.27n  ; 1Co 10.30 ; 1Tm 4.4. – Voir non-Juifs.'
  - type: text
    content: 'qui ont risqué leur tête pour sauver ma vie ; ce n''est pas moi seul qui leur rends grâce, ce sont encore toutes les Eglises des non-Juifs ; '
  '5':
  - type: note
    content: 'l''Eglise qui est dans leur maison 1Co 16.19 ; Col 4.15 ; Phm 2. –  prémices 8.23+ ; cf. 1Co 16.15n. –  Asie  : région d''Ephèse, cf. Ac 16.6n.'
  - type: text
    content: 'saluez aussi l''Eglise qui est dans leur maison. Saluez Epaïnète, mon bien-aimé, qui est les prémices de l''Asie pour le Christ. '
  '6':
  - type: text
    content: 'Saluez Marie, qui s''est donné beaucoup de peine pour vous. '
  '7':
  - type: note
    content: 'Junias (nom masculin) : on pourrait aussi lire Junia (nom féminin) ; quelques témoins lisent Julie (cf. v. 15). –  de ma parenté  : l''expression peut signifier mes compatriotes  ; cf. v. 11,21 ; 9.3. –  compagnons de captivité Col 4.10 ; Phm 23. –  parmi les apôtres  : cf. 1.1n  ; 2Co 8.23n.'
  - type: text
    content: 'Saluez Andronicos et Junias, qui sont de ma parenté et qui sont aussi mes compagnons de captivité ; ils sont très estimés parmi les apôtres, ils étaient même dans le Christ avant moi. '
  '8':
  - type: note
    content: Ampliatus ou Amplias, selon les mss.
  - type: text
    content: 'Saluez Ampliatus, mon bien-aimé dans le Seigneur. '
  '9':
  - type: text
    content: 'Saluez Urbain, notre collaborateur dans le Christ, et Stachys, mon bien-aimé. '
