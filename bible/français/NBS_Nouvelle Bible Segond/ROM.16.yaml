        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Saluez Hérodion, qui est de ma parenté. Saluez ceux de la maison de Narcisse qui sont dans le Seigneur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saluez Tryphène et Tryphose, elles qui se sont donné de la peine dans le Seigneur. Saluez Perside, la bien-aimée, qui s''est donné beaucoup de peine dans le Seigneur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rufus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être le fils de Simon de Cyrène (Mc 15.21). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a été choisi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on peut comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a été tout particulièrement choisi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: élu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa mère…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 19.26s.'
      marker-yv: yv-n
    - type: text
      text: 'Saluez Rufus, celui qui, dans le Seigneur, a été choisi, et sa mère, qui est aussi la mienne. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas, et les frères qui sont avec eux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Olympas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Olympe.
      marker-yv: yv-n
    - type: text
      text: 'Saluez Philologue et Julie, Nérée et sa sœur, ainsi qu''Olympas et tous les saints qui sont avec eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'saint baiser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était sans doute un élément habituel dans le déroulement des assemblées chrétiennes ; cf. 1Co 16.20 ; 2Co 13.12 ; 1Th 5.26 ; 1P 5.14 ; voir aussi Lc 7.45 ; 22.48 ; Ac 20.37.
      marker-yv: yv-n
    - type: text
      text: Saluez-vous les uns les autres par un saint baiser.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutes les Eglises du Christ vous saluent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un dernier avertissement
    marker-yv: yv-h
