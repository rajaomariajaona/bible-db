          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'enseignement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eloignez-vous d''eux '
      - type: usfm
        marker: ft
        children:
        - type: text
