        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quant à vous, votre obéissance est connue de tous ; je me réjouis donc à votre sujet, mais je veux que vous soyez sages en ce qui concerne le bien comme vous êtes purs en ce qui concerne le mal. '
