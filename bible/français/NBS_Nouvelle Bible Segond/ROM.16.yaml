        - type: text
          text: '  ; 14.18).'
      marker-yv: yv-n
    - type: text
      text: 'Saluez Apellès, qui a fait ses preuves dans le Christ. Saluez ceux de la maison d''Aristobule. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
