      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans malice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme peut être pris dans un sens positif (sans méchanceté) ou légèrement négatif (naïfs).'
      marker-yv: yv-n
    - type: text
      text: 'Car de tels individus ne sont pas esclaves du Christ, notre Seigneur, mais de leur propre ventre ; par de bonnes paroles et par des éloges, ils trompent le cœur des gens sans malice. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'votre obéissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5+,8. –  '
      - type: usfm
        marker: fq
        children:
