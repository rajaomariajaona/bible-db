document_id: JER.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un grand désastre menace Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Fuyez  : cf. 4.5-6 ; Lc 21.21. –  Sonnez (hébreu tiqe''ou ) fait assonance avec Teqoa , nom d''une bourgade à quelques kilomètres au sud de Jérusalem (Am 1.1n). –  Beth-Kérem  : localisation incertaine (Né 3.14). –  depuis le nord 1.14n. –  vous guette  : litt. se penche , même verbe Ps 85.12. –  désastre 4.6n.'
  - type: text
    content: Fuyez de Jérusalem, fils de Benjamin !
  - type: text
    content: Sonnez de la trompe à Teqoa,
  - type: text
    content: dressez une bannière à Beth-Kérem !
  - type: text
    content: Car depuis le nord vous guette un malheur,
  - type: text
    content: un grand désastre.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Qui prendre à témoin  : autres traductions devant qui témoigner ? ou qui conjurer ? cf. 11.7n  ; 29.23 ; Es 28.9. –  pour qu''ils écoutent  : autre traduction pour qu''on écoute . –  Leur oreille n''est pas circoncise  : l''expression signifie sans doute leur oreille est inapte à entendre , c.-à-d. ils sont incapables d''obéir  ; l''incirconcision évoque par ailleurs l''impureté rituelle et la non-appartenance au peuple de l''alliance ; cf. 4.4+ ; voir aussi 7.26+ ; Ac 7.51. –  un déshonneur  : autre traduction un outrage  ; même terme en 15.15 ; 20.8 ; 24.9+ ; 31.19 ; 51.51.'
  - type: text
    content: A qui m'adresser ?
  - type: text
    content: Qui prendre à témoin pour qu'ils écoutent ?
  - type: text
    content: Leur oreille n'est pas circoncise,
  - type: text
    content: et ils sont incapables de prêter attention ;
  - type: text
    content: 'la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: est pour eux un déshonneur,
  - type: text
    content: ils n'y prennent aucun plaisir.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis plein… 20.9. –  sur l''enfant… 9.20+. –  le conseil secret ou, plus simplement, le groupe  ; même terme en 15.17 ; 23.18,22. –  chargé  : litt. plein.'
  - type: text
    content: 'Je suis plein de la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je suis las de la contenir.
  - type: text
    content: – Répands-la sur l'enfant dans la rue
  - type: text
    content: comme sur le conseil secret des jeunes gens !
  - type: text
    content: Car l'homme et la femme seront pris,
  - type: text
    content: le vieillard et celui qui est chargé de jours.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 5.17+ ; 8.10-12. –  j'étendrai la main 15.6 ; 51.25 ; Es 5.25+.
  - type: text
    content: Leurs maisons passeront à d'autres,
  - type: text
    content: – les champs et les femmes aussi –
  - type: text
    content: quand j'étendrai la main sur les habitants du pays
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'du plus petit…  : c.-à-d. tous sans exception , de même en 8.10 ; 31.34 ; 42.1,8 ; 44.10,12 ; cf. 16.6 ; Gn 19.11n. –  âpres au gain 5.27s ; Es 56.11 ; Ez 22.27 ; Ha 2.9. –  prophète / prêtre 5.31+ ; 14.14. –  pratiquent le mensonge  : cf. 8.10 ; 2S 18.13n.'
  - type: text
    content: Car du plus petit d'entre eux jusqu'au plus grand,
  - type: text
    content: tous sont âpres au gain ;
  - type: text
    content: depuis le prophète jusqu'au prêtre,
  - type: text
    content: tous pratiquent le mensonge.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'blessure ou fracture , le même mot hébreu est rendu par désastre en 4.6n, de même en 8.11,21 ; cf. Es 30.26n. –  Tout ira bien…  : autres traductions tout va bien ! que tout aille bien ! ou, plus littéralement, paix ! paix ! – et il n''y a pas de paix  ; 4.10n  ; cf. 8.11,15 ; 14.19 ; 15.5n  ; 43.12 ; Ez 7.25 ; 13.10,16 ; Mi 3.5 ; 1Th 5.3.'
  - type: text
    content: Ils soignent à la légère
  - type: text
    content: 'la blessure de mon peuple :'
  - type: text
    content: « Tout ira bien, tout ira bien ! », disent-ils,
  - type: text
    content: et rien ne va !
  '15':
  - type: text
    content: ' '
  - type: note
    content: être confus 3.3. –  ils trébucheront 8.12 ; 23.12. –  au temps où je leur ferai rendre des comptes ou au temps où j'interviendrai contre eux ; au temps où je m'occuperai d'eux  ; le même terme (parfois traduit par visiter ) évoque souvent un châtiment (cf. 5.9+ ; 8.12n  ; 21.14 ; 49.8 ; 50.21n,27,31 ; 51.18), mais il peut aussi avoir un sens positif (15.15 ; 27.22 ; 29.10 ; 32.5) ; l'hébreu joue parfois sur ce double sens, voir 23.2n  ; Es 24.21-22n  ; Ez 9.1 ; Os 1.4+ ; Am 3.2+ ; Mi 7.4 ; So 1.9+ ; Ps 8.5n  ; Lc 19.44n.
  - type: text
    content: Ils se sont couverts de honte par les abominations qu'ils ont commises,
  - type: text
    content: mais la honte ne les atteint même pas,
  - type: text
    content: ils ne savent même pas être confus.
  - type: text
    content: C'est pourquoi ils tomberont avec ceux qui tombent,
  - type: text
    content: ils trébucheront au temps où je leur ferai rendre des comptes,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 14.28. –  Informez-vous  : litt. demandez . –  sentiers d''autrefois ou de toujours  ; cf. 18.15 ; Ps 139.24n  ; Siracide 8.9 : « Ne t''écarte pas des récits des vieillards, car eux-mêmes les ont appris de leurs pères. » –  Suivez-le Es 30.21. –  la tranquillité  : autre traduction le repos de vos âmes  ; cf. Es 28.12 ; Mt 11.29. –  Nous ne le suivrons pas 2.31.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Placez-vous sur les chemins et regardez !
  - type: text
    content: 'Informez-vous des sentiers d''autrefois :'
  - type: text
    content: Où donc est le bon chemin ? Suivez-le,
  - type: text
    content: et vous trouverez la tranquillité !
  - type: text
    content: 'Mais ils répondent :'
  - type: text
    content: Nous ne le suivrons pas !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'pour vous  : quelques mss portent pour eux . –  guetteurs  : cf. Nb 23.3,14 ; Es 21.6-12 ; 52.8 ; 62.6 ; Ez 3.16-21 ; 33.1-9 ; Os 9.8 ; Ha 2.1. –  trompe 4.5+ ; 42.14. –  ne prêterons pas attention v. 10 ; 44.16.'
  - type: text
    content: 'J''ai suscité pour vous des guetteurs :'
  - type: text
    content: prêtez attention au son de la trompe !
  - type: text
    content: 'Mais ils répondent :'
  - type: text
    content: Nous ne prêterons pas attention.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ecoutez donc, nations ! Es 34.1 ; Mi 1.2. –  Et toi, communauté… texte obscur ; LXX et ceux qui font paître leurs troupeaux ( ?) ; certains modifient le texte hébreu traditionnel pour lire et sachez bien ce que je vais faire contre eux.
  - type: text
    content: Ecoutez donc, nations !
  - type: text
    content: Et toi, communauté,
  - type: text
    content: sache ce qui se passe chez eux !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoute, terre (ou pays ) Dt 32.1 ; Es 1.2. –  C''est moi qui fais venir 11.11 ; 19.3 ; 45.5. –  fruit de ses pensées ou de ses plans 2.19+ ; 18.12n  ; Pr 1.30s ; Ga 6.7. – Voir loi. –  rejetée  : autre traduction méprisée.'
  - type: text
    content: Ecoute, terre !
  - type: text
    content: C'est moi qui fais venir sur ce peuple le malheur,
  - type: text
    content: fruit de ses pensées ;
  - type: text
    content: car ils n'ont pas prêté attention à mes paroles ;
  - type: text
    content: quant à ma loi, ils l'ont rejetée.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Verset obscur : certains modifient le texte hébreu traditionnel pour lire n''es-tu pas semblable à un beau pâturage, Sion la belle (litt. fille de Sion , 4.31n)  ?  ; cf. 4.3. –  choyée Dt 28.54+. –  je la réduis au silence ou je la fais périr.'
  - type: text
    content: Sion la belle, si jolie, si choyée,
  - type: text
    content: je la réduis au silence !
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.21s ; 14.12 ; Es 1.11 ; Os 9.4 ; Am 5.22ss ; Ps 50.8-15 ; 51.18 ; Hé 10.5s. –  encens Ex 30.34n  ; Lv 16.13 ; Es 43.23s. –  de Saba Gn 10.7n  ; Es 60.6n.
  - type: text
    content: Qu'ai-je besoin de l'encens qui vient de Saba,
  - type: text
    content: du roseau aromatique d'un pays lointain ?
  - type: text
    content: Vos holocaustes ne sont pas agréés,
  - type: text
    content: vos sacrifices ne me sont pas doux.
  '21':
  - type: text
    content: ' '
  - type: note
    content: obstacles ou causes de chute  ; le terme hébreu est apparenté au verbe rendu ailleurs par trébucher  ; cf. Es 8.14n  ; Ez 3.20n  ; 7.19n  ; 1P 2.6-8.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je mets devant ce peuple des obstacles,
  - type: text
    content: contre lesquels trébucheront ensemble pères et fils,
  - type: text
    content: voisins et amis – et ils disparaîtront.
  - type: heading
    content: Le dévastateur est en route
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 50.9n,41-43 ; Ez 23.23s. –  du nord 1.14n. –  s''éveille  : cf. 25.32 ; 51.1,11 ; Es 13.17n  ; Ez 23.22. –  des confins de la terre 25.32 ; 31.8 ; 50.41 ; la même expression est traduite du plus profond (du nord) en Ez 38.6,15 etc.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Un peuple vient du pays du nord,
  - type: text
    content: une grande nation s'éveille des confins de la terre.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'ils grondent comme la mer 5.22 ; 51.55 ; Es 17.12 ; Dn 7.2. –  comme un seul homme  : LXX comme le feu  ; on pourrait aussi comprendre comme des hommes , c.-à-d. des cavaliers en rangs serrés comme des fantassins (cf. 2R 18.23). –  Sion la belle  : litt. fille de Sion 4.31n.'
  - type: text
    content: Ils brandissent l'arc et le javelot ;
  - type: text
    content: ils sont cruels, sans compassion ;
  - type: text
    content: ils grondent comme la mer ;
  - type: text
    content: ils sont montés sur des chevaux,
  - type: text
    content: ils sont rangés comme un seul homme pour le combat
  - type: text
    content: contre toi, Sion la belle !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'nous avons perdu courage  : litt. nos mains sont faibles (ou tombent ) ; cf. 38.4n  ; 47.3 ; 50.43 ; Es 13.7 ; Ez 7.17. –  la détresse… 49.24. –  femme qui accouche 4.31+ ; cf. Es 13.8 ; Mi 4.9s.'
  - type: text
    content: – Nous avons entendu la nouvelle,
  - type: text
    content: et nous avons perdu courage ;
  - type: text
    content: la détresse nous a saisis,
  - type: text
    content: des douleurs comme celles d'une femme qui accouche.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'car l''ennemi s''y trouve…  : litt. car l''ennemi a une épée . –  effroi de tous côtés  : hébreu magor-missaviv  ; cf. 20.3nss,10 ; 46.5 ; 49.29 ; Ps 31.14 ; Lm 2.22.'
  - type: text
    content: Ne sortez pas dans la campagne,
  - type: text
    content: n'allez pas sur les chemins ;
  - type: text
    content: car l'ennemi s'y trouve avec son épée,
  - type: text
    content: l'effroi de tous côtés !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'O belle, mon peuple  : litt. fille de mon peuple , cf. 4.11n  ; voir aussi Es 22.4. –  sac 4.8+ ; cf. Es 22.12 ; Lm 2.10. –  roule-toi dans la cendre  : cf. 25.34 ; Ez 27.30s ; Jon 3.5s ; Est 4.1 ; Mt 11.21. –  comme pour un fils unique Am 8.10 ; Za 12.10. –  lamentations  : cf. 4.8n. –  celui qui ravage tout 12.12 ; 15.8 ; 48.8,18,32 ; 51.56 ; cf. Na 2.2.'
  - type: text
    content: O belle, mon peuple,
  - type: text
    content: mets un sac pour pagne
  - type: text
    content: et roule-toi dans la cendre,
  - type: text
    content: prends le deuil comme pour un fils unique,
  - type: text
    content: répands-toi en lamentations amères !
  - type: text
    content: Car celui qui ravage tout arrive sur nous à l'improviste.
  - type: heading
    content: Des rebelles invétérés
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'observateur  : traduction incertaine ; le même terme hébreu est généralement traduit par ville forte (cf. 1.18 ; 4.5), mais il semble avoir ici un sens différent ; certains traduisent essayeur de métaux  ; cf. 5.17 ; 8.14. –  pour que tu le mettes à l''épreuve (v. 28-30) : cf. 5.1ss ; sur le verbe hébreu correspondant, aussi traduit par éprouver ou sonder , voir 9.6 ; 11.20 ; 12.3 ; 17.10 ; 20.12 ; cf. Za 13.9 ; Ps 7.10n  ; 17.3 ; 26.2 ; 139.23 ; Jb 7.18n  ; 23.10.'
  - type: text
    content: Je t'ai placé en observateur au sein de mon peuple,
  - type: text
    content: pour que tu le mettes à l'épreuve,
  - type: text
    content: pour que tu connaisses
  - type: text
    content: et que tu éprouves leur voie.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'des rebelles invétérés  : litt. des rebelles qui se retirent (les deux termes hébreux sont presque identiques ; cf. 5.23) ; certains, d''après plusieurs versions anciennes, modifient le texte hébreu traditionnel pour lire des princes rebelles ou des chefs de rebelles (cf. Es 1.23-25). –  calomniateurs 9.3+. –  du bronze et du fer  : cf. 15.12 ; Dt 28.23. –  destructeurs  : autre traduction pervertis.'
  - type: text
    content: Ce sont tous des rebelles invétérés,
  - type: text
    content: des calomniateurs,
  - type: text
    content: du bronze et du fer ;
  - type: text
    content: ce sont tous des destructeurs.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'les scories  : litt. les mauvais  ; cf. v. 7 ; 13.23 ; 17.1+ ; Pr 27.22.'
  - type: text
    content: Le soufflet est brûlant,
  - type: text
    content: le plomb disparaît au feu…
  - type: text
    content: C'est inutilement qu'on s'obstine à épurer,
  - type: text
    content: les scories ne se détachent pas.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 12.10 ; cf. 2.8+.
  - type: text
    content: Vers elle marchent des bergers avec leurs troupeaux ;
  - type: text
    content: ils plantent leurs tentes contre elle, tout autour ;
  - type: text
    content: chacun en fait brouter sa part.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 1.22. –  rejeté / rejetés  : autre traduction méprisable / méprisés.'
  - type: text
    content: On les appelle « Argent rejeté »,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a rejetés.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Consacrez…  : litt. consacrez une guerre contre elle (les préparatifs de guerre comportaient une préparation rituelle) ; cf. 12.3 ; 22.7 ; 51.27 ; Es 13.3 ; Jl 4.9n  ; Mi 3.5n  ; voir aussi Dt 20 ; 1S 7.8s. –  en plein midi  : cf. Jos 10.12-14. –  Le jour baisse Ps 90.9.'
  - type: text
    content: Consacrez une armée pour lui faire la guerre !
  - type: text
    content: Attaquons en plein midi !
  - type: text
    content: Quel malheur pour nous ! Le jour baisse,
  - type: text
    content: les ombres du soir s'allongent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'de nuit Jg 7.9,15. –  ses palais  : cf. 9.20 ; 17.27 ; 49.27 ; voir aussi 39.8.'
  - type: text
    content: Attaquons de nuit !
  - type: text
    content: Détruisons ses palais !
  - type: heading
    content: Avertissement solennel
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Coupez du bois  : cf. Dt 20.19s ; Es 29.3 ; Lc 19.43. –  élevez un remblai servant à s''élever à la hauteur des remparts 32.24 ; 33.4 ; 2S 20.15 ; 2R 19.32 ; Dn 11.15. –  C''est la ville qui doit rendre des comptes  : traduction incertaine ; on lit ici une forme inhabituelle (au masculin) du verbe hébreu pour visiter ou intervenir (contre) ; cf. v. 15n. D''autres comprennent c''est la ville qui doit être livrée . Certains, d''après LXX, modifient le texte hébreu traditionnel pour lire malheureuse la ville de débauche , ou quel malheur pour la ville du mensonge  ; cf. Na 3.1.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Coupez du bois,
  - type: text
    content: élevez un remblai contre Jérusalem !
  - type: text
    content: C'est la ville qui doit rendre des comptes ;
  - type: text
    content: tout n'est qu'oppression en son sein.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'renouvelle  : traduction incertaine ; les uns pensent que le verbe hébreu correspondant signifie faire sourdre ou faire jaillir , comme s''il s''agissait d''une source ; les autres lui donnent le sens de conserver au frais  ; cf. v. 29 ; 4.14 ; 17.1+. –  violence / ravage 20.8 ; cf. Ps 55.10. –  à mes regards  : litt. sur (ou contre ) ma face . –  plaies  : autres traductions coups ; fléaux.'
  - type: text
    content: Comme un puits renouvelle son eau,
  - type: text
    content: ainsi elle renouvelle son mal ;
  - type: text
    content: on n'entend en son sein que violence et ravage ;
  - type: text
    content: constamment à mes regards
  - type: text
    content: s'offrent douleurs et plaies.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'l''instruction ou la correction 5.3+. –  que je ne me détache  : litt. que mon être (cf. Gn 1.20n) ne se détache  ; le même verbe est traduit par se démettre en Gn 32.26 ; de même en Ez 23.17s ; cf. Os 9.12. –  lieu dévasté 4.7.'
  - type: text
    content: Reçois l'instruction, Jérusalem,
  - type: text
    content: de peur que je ne me détache de toi,
  - type: text
    content: que je ne te réduise en un lieu dévasté,
  - type: text
    content: en un pays inhabitable !
  - type: heading
    content: Un peuple qui refuse d'écouter
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.21+ ; Dt 24.21. –  le reste 11.23+ ; Es 1.9+. –  sur les ceps  : des versions anciennes ont compris aux paniers.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: On grappillera, comme une vigne,
  - type: text
    content: le reste d'Israël.
  - type: text
    content: Portes-y de nouveau la main,
  - type: text
    content: comme le vendangeur sur les ceps.
