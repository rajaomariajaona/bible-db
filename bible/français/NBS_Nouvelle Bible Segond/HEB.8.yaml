document_id: HEB.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le culte ancien dépassé
  - type: text
    content: ' '
  - type: note
    content: grand prêtre 2.17+ ; 7.26. –  s'est assis… 1.3+.
  - type: text
    content: 'Or voici le point capital de ce que nous disons : nous avons un tel grand prêtre, qui s''est assis à la droite du trône de la majesté dans les cieux ; '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '10.16. –  que j''établirai  : une autre forme du même verbe, apparenté au mot traduit par alliance (aussi 10.16), est rendue par testateur en 9.16ns ; voir Lc 22.29n. –  dans leur cœur  : litt. sur leurs cœurs , cf. 2Co 3.3. –  je serai leur Dieu… 2Co 6.16 ; Ap 21.3.'
  - type: text
    content: Or voici l'alliance que j'établirai avec la maison d'Israël
  - type: text
    content: 'après ces jours-là, dit le Seigneur :'
  - type: text
    content: je mettrai mes lois dans leur intelligence,
  - type: text
    content: je les inscrirai dans leur cœur ;
  - type: text
    content: je serai leur Dieu,
  - type: text
    content: et ils seront mon peuple
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 23.8 ; 1Th 4.9 ; 1Jn 2.27 ; 5.20.
  - type: text
    content: Personne n'instruira plus jamais son concitoyen,
  - type: text
    content: 'ni personne son frère, en disant : « Connais le Seigneur ! »'
  - type: text
    content: En effet, tous me connaîtront,
  - type: text
    content: depuis le plus petit jusqu'au plus grand d'entre eux
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: je leur ferai grâce 2.17n  ; autre traduction je serai apaisé (terme apparenté à celui qui est traduit par expiatoire en 9.5n  ; cf. Lc 18.13n) en ce qui concerne leurs injustices  ; cf. 10.17s.
  - type: text
    content: Car je leur ferai grâce de leurs injustices,
  - type: text
    content: et je ne me souviendrai plus jamais de leurs péchés
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Rm 10.4. –  nouvelle / ancienne Rm 7.6 ; 2Co 3.6,14n. Sur l’alliance nouvelle, voir aussi 12.24 ; Lc 22.20 ; 1Co 11.25.
  - type: text
    content: En l'appelant « nouvelle », il a rendu ancienne la première. Or ce qui est ancien et vieilli est en passe de disparaître.
  '2':
  - type: note
    content: 'au service  : cf. v. 6 ; 1.14n. –  sanctuaire… 9.24 ; certains comprennent du sanctuaire, c''est-à-dire de la tente. –  la tente ou la Demeure, de même dans la suite (allusion au sanctuaire du désert) ; voir 9.2ss,11 ; 13.10 ; Ex 25.9n  ; cf. 2Co 5.1+ ; voir aussi Nb 24.6n  ; Siracide 24.10 : « Dans la Demeure sainte j''ai officié en sa présence, et c''est ainsi qu''en Sion je me suis fixée » (c''est la Sagesse qui parle).'
  - type: text
    content: il est au service du sanctuaire et de la tente véritable, celle qui a été dressée par le Seigneur et non pas par un être humain.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '5.1,3. – Voir sacrifices . –  pour lui aussi  : c.-à-d. pour le Christ (v. 1s).'
  - type: text
    content: 'En effet, tout grand prêtre est institué pour présenter des offrandes et des sacrifices ; d''où la nécessité, pour lui aussi, d''avoir quelque chose à présenter. '
  '4':
  - type: note
    content: Cf. 10.8. – Voir loi.
  - type: text
    content: 'Or s''il était sur la terre, il ne serait même pas prêtre, puisqu''il y en a d''autres qui présentent des offrandes selon la loi. '
  '5':
  - type: note
    content: 'célèbrent le culte…  : ou rendent un culte à une copie… (cf. 9.23) ; même verbe en 9.9,14 ; 10.2 ; 12.28 ; 13.10 ; Lc 2.37n. –  divinement averti  : même verbe en 11.7 ; 12.25 ; Ac 10.22+. –  réaliser  : litt. accomplir  ; le même verbe est traduit par accomplir le rituel (du culte) en 9.6. –  la tente v. 2n. –  Regarde… Ex 25.39s  ; Ac 7.44. –  dit-il  : le sujet sous-entendu est vraisemblablement Dieu ou, moins probablement, l''Ecriture (dit-elle). –  modèle  : le terme grec ainsi traduit a donné notre mot type  ; il désigne la réalité première, en l''occurrence céleste, dont procède une réalité seconde ou antitype (9.24n) : pour l''auteur, cette réalité seconde est le culte terrestre, qui n''est que la copie ou l’ombre (cf. 10.1 ; Col 2.17) d''une réalité céleste ; cf. Rm 5.14n  ; 1P 3.20-21n.'
  - type: text
    content: 'Ceux-ci célèbrent le culte dans une copie et une ombre des choses célestes, ainsi que Moïse en fut divinement averti alors qu''il allait réaliser la tente : '
  - type: text
    content: Regarde,
  - type: text
    content: ' dit-il, '
  - type: text
    content: tu feras tout d'après le modèle qui t'a été montré sur la montagne
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'il  : c.-à-d. le Christ. –  service v. 2 ; 1.14n. –  plus remarquable  : cf. 1.4n. –  médiateur 9.15 ; 12.24 ; cf. 6.17n  ; Ga 3.19 ; 1Tm 2.5. –  alliance supérieure ou meilleure, même possibilité dans la suite, cf. 1.4n  ; 7.22+.'
  - type: text
    content: Mais maintenant, il a accédé à un service d'autant plus remarquable qu'il est médiateur d'une alliance supérieure, fondée sur des promesses supérieures.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.11. –  première alliance v. 9,13 ; 9.18 ; cf. 10.9 ; Ex 19.5s ; 24.3-8.
  - type: text
    content: 'Si, en effet, la première alliance avait été irréprochable, il n''y aurait pas eu lieu d''en chercher une seconde. '
  '8':
  - type: note
    content: 'il dit ou elle (l''Ecriture) dit  : 4.3n  ; Jr 31.31-34.'
  - type: text
    content: 'C''est bien en effet comme un reproche à leur adresse qu''il dit :'
  - type: text
    content: Les jours viennent, dit le Seigneur,
  - type: text
    content: où je conclurai avec la maison d'Israël
  - type: text
    content: et la maison de Juda une alliance nouvelle
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: text
    content: Ce ne sera pas comme l'alliance que j'ai faite avec leurs pères,
  - type: text
    content: le jour où je les ai pris par la main
  - type: text
    content: pour les faire sortir d'Egypte.
  - type: text
    content: Puisque eux-mêmes ne sont pas demeurés dans mon alliance,
  - type: text
    content: moi non plus je ne me suis pas soucié d'eux, dit le Seigneur
  - type: text
    content: .
