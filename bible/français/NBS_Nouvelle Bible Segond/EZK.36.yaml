        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: outrages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'déshonneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 30 ; cf. 21.33
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu ne feras plus trébucher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne tueras plus d'enfant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; les deux verbes hébreux ne diffèrent que par la permutation de deux lettres.'
      marker-yv: yv-n
    - type: text
      text: 'Je ne te ferai plus entendre les insultes des nations, et tu ne seras plus chargée des outrages des peuples ; tu ne feras plus trébucher ta nation – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' va rassembler et purifier Israël'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur voie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
