document_id: EZK.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites reprendront possession de leur pays
  - type: text
    content: ' '
  - type: note
    content: 'parle en prophète 4.7n. –  montagnes d''Israël  : cf. v. 4 ; 6.2-3+ ; Dt 8.7.'
  - type: text
    content: Toi, humain, parle en prophète sur les montagnes d'Israël !
  - type: text
    content: 'Tu diras : Montagnes d''Israël, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '10':
  - type: note
    content: 'Je multiplierai v. 11+ ; 37.26 ; Jr 30.19. –  humains  : hébreu ’adam (voir Gn 1.26n), de même dans la suite. –  les ruines rebâties  : cf. Es 44.26-28 ; 58.12 ; 61.4 ; Jr 30.18 ; Ps 69.36.'
  - type: text
    content: 'Je multiplierai sur vous les êtres humains : la maison d''Israël tout entière ; les villes seront habitées, et les ruines rebâties. '
  '11':
  - type: note
    content: 'les humains (v. 10n) et les bêtes 14.13+ ; cf. Jr 31.27. –  multiplieront / deviendront féconds  : cf. v. 37s ; Gn 1.22+,28 ; Za 10.8 ; les deux verbes sont absents de LXX. –  que dans le passé  : litt. qu''en vos commencements  ; cf. 16.55.'
  - type: text
    content: 'Je multiplierai sur vous les humains et les bêtes : ils se multiplieront, ils deviendront féconds ; je vous peuplerai comme au temps jadis et je vous ferai plus de bien que dans le passé ; ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '12':
  - type: note
    content: 'ils prendront possession de toi  : le prophète ne s''adresse plus aux montagnes (v. 1-4) mais au pays dans son ensemble. –  tuer leurs enfants  : autre traduction les priver d''enfants (de même dans la suite) ; par la sécheresse ou d''autres fléaux naturels, cf. v. 13 ; 5.17 ; certains croient voir en outre une allusion aux sacrifices d''enfants pratiqués sur les montagnes pour les divinités de la nature, cf. 16.20s ; 18.6 ; 22.9.'
  - type: text
    content: Je ferai marcher sur vous des êtres humains – Israël, mon peuple – et ils prendront possession de toi ; tu seras leur patrimoine et tu ne continueras plus à tuer leurs enfants.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'on vous dit  : plusieurs versions anciennes ont lu on te dit  ; la suite s''adresse au pays ou à la terre d''Israël, cf. Nb 13.32. –  ta propre nation  : autre lecture traditionnelle tes nations.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce qu''on vous dit : « Tu as dévoré des êtres humains, tu as tué les enfants de ta propre nation », '
  '14':
  - type: note
    content: 'tu ne tueras plus les enfants  : lecture traditionnelle appuyée par plusieurs mss hébreux et des versions anciennes ; autre lecture tu ne feras plus trébucher (comme au v. 15).'
  - type: text
    content: 'à cause de cela tu ne dévoreras plus d''êtres humains, tu ne tueras plus les enfants de ta nation – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'insultes v. 6s ; 16.27n. –  outrages  : le mot correspondant est traduit par déshonneur au v. 30 ; cf. 21.33n. –  tu ne feras plus trébucher  : quelques mss et Tg ont lu tu ne tueras plus d''enfant, comme au v. 14n  ; les deux verbes hébreux ne diffèrent que par la permutation de deux lettres.'
  - type: text
    content: 'Je ne te ferai plus entendre les insultes des nations, et tu ne seras plus chargée des outrages des peuples ; tu ne feras plus trébucher ta nation – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Le Seigneur va rassembler et purifier Israël
  '16':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'leur voie ou leur chemin  ; cf. 14.22+. –  l''impureté de la femme pendant sa souillure menstruelle  : litt. l''impureté de sa souillure (menstruelle)  ; cf. 16.7n  ; 18.6+ ; Lv 12.2n  ; 15.19+ ; Es 64.5n.'
  - type: text
    content: 'Humain, les gens de la maison d''Israël, quand ils habitaient sur leur terre, l''ont rendue impure par leur voie et par leurs agissements ; leur voie a été devant moi comme l''impureté de la femme pendant sa souillure menstruelle. '
  '18':
  - type: note
    content: Cf. 22.4.
  - type: text
    content: 'Alors j''ai répandu ma fureur sur eux à cause du sang qu''ils avaient répandu dans le pays et des idoles par lesquelles ils l''avaient rendu impur. '
  '19':
  - type: note
    content: 5.10+ ; 6.8n.
  - type: text
    content: 'Je les ai dispersés parmi les nations, et ils ont été disséminés dans tous les pays ; je les ai jugés selon leur voie et selon leurs agissements. '
  '2':
  - type: note
    content: 'Ah ! ah ! 25.3+. –  hauteurs  : le terme hébreu correspondant est aussi traduit par haut(s) lieu(x)  ; cf. Dt 32.13n. –  possession 35.10 ; cf. 11.15+.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que l''ennemi a dit sur vous : « Ah ! ah ! ces hauteurs d''autrefois sont devenues notre possession ! », '
  '20':
  - type: note
    content: 'Ils sont arrivés  : la plupart des mss hébreux ont le singulier, qui doit de toute évidence être compris dans un sens collectif  : mon peuple est arrivé  ; cf. v. 22. – Voir nom.'
  - type: text
    content: 'Ils sont arrivés dans les nations où ils se rendaient et ils ont profané mon nom sacré ; en effet, on disait d''eux : « C''est le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est de son pays qu''ils sont sortis ! » '
  '21':
  - type: note
    content: Cf. v. 23 ; Ex 31.12 ; Es 52.5 ; Rm 2.24.
  - type: text
    content: Et j'ai voulu épargner mon nom sacré, que la maison d'Israël profanait parmi les nations où elle s'était rendue.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.9+,44 ; cf. Dt 9.5s. –  de la sorte  : sous-entendu dans le texte, de même au v. 32.'
  - type: text
    content: 'A cause de cela, dis à la maison d''Israël : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Ce n''est pas à cause de vous que j''agis de la sorte, maison d''Israël ; c''est à cause de mon nom sacré, que vous avez profané parmi les nations où vous vous êtes rendus. '
  '23':
  - type: note
    content: 'Je montrerai… sacré et je montrerai ma sainteté traduisent deux formes du même verbe hébreu. –  parmi (ou en) vous  : quelques mss portent parmi eux.'
  - type: text
    content: 'Je montrerai qu''il est sacré, mon grand nom qui a été profané parmi les nations, ce nom que vous avez profané au milieu d''elles. Ainsi les nations sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – quand je montrerai ma sainteté parmi vous sous leurs yeux. '
  '24':
  - type: note
    content: '11.17+. –  votre terre  : litt. votre sol, cf. 7.2+ ; Gn 2.5n.'
  - type: text
    content: 'Je vous retirerai d''entre les nations, je vous rassemblerai de tous les pays et je vous ramènerai sur votre terre. '
  '25':
  - type: note
    content: 'Je vous aspergerai  : le verbe hébreu est associé à divers rites de purification, voir 43.18 ; Ex 24.6-8 ; Lv 17.6 ; Nb 19.9,13,20 ; cf. Ex 30.17-21 ; Nb 31.23 ; Es 4.4 ; Jr 33.8 ; Ez 47 ; Za 13.1 ; Ps 51.4 ; Jn 3.5 ; Hé 10.22. –  impuretés ou souillures  ; cf. v. 29 ; 14.11n.'
  - type: text
    content: 'Je vous aspergerai d''une eau pure, et vous serez purs ; je vous purifierai de toutes vos impuretés et de toutes vos idoles. '
  '26':
  - type: note
    content: Cf. 11.19+.
  - type: text
    content: 'Je vous donnerai un cœur nouveau et je mettrai en vous un souffle nouveau ; j''ôterai de votre chair le cœur de pierre et je vous donnerai un cœur de chair. '
  '27':
  - type: note
    content: 'souffle ou Esprit  : cf. 2.2n  ; 37.5+ ; 2R 19.7 ; Es 63.11 ; 1Th 4.8. –  prescriptions / règles  : cf. Ex 15.25 ; Dt 4.1 ; Lc 1.6 ; voir loi.'
  - type: text
    content: 'Je mettrai mon souffle en vous et je ferai en sorte que vous suiviez mes prescriptions, que vous observiez mes règles et les mettiez en pratique. '
  '28':
  - type: note
    content: 'le pays que j''ai donné…  : cf. 28.25+. –  vous serez mon peuple… 11.20+.'
  - type: text
    content: 'Vous habiterez le pays que j''ai donné à vos pères ; vous serez mon peuple, et moi, je serai votre Dieu. '
  '29':
  - type: note
    content: 'impuretés v. 25 ; 14.11+. –  J''appellerai le blé…  : cf. Gn 1.5,8,10 ; 1R 17.1 ; 2R 8.1 ; Jr 14 ; Os 2.11,24s.'
  - type: text
    content: 'Je vous sauverai de toutes vos impuretés. J''appellerai le blé et je le multiplierai ; je ne vous infligerai plus la famine. '
  '3':
  - type: note
    content: 'des autres nations  : litt. du reste des nations, de même aux v. 4s. –  vous avez été l''objet…  : litt. vous êtes montés (cf. 14.3n) sur la lèvre de la langue et le bavardage (ou les mauvais propos, comme en Gn 37.2 ; Jr 20.10 ; Pr 10.18 ; cf. Pr 25.10n) du peuple.'
  - type: text
    content: 'à cause de cela, parle en prophète ! Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Oui, parce qu''on a voulu de toutes parts vous dévaster et vous harceler, pour que vous deveniez la possession des autres nations, parce que vous avez été l''objet de propos et de bavardages populaires, '
  '30':
  - type: note
    content: V. 15n  ; 34.27-29.
  - type: text
    content: 'Je multiplierai le fruit des arbres et le produit des champs, afin que vous ne subissiez plus le déshonneur de la famine parmi les nations. '
  '31':
  - type: note
    content: 'Jr 4.4+. –  vous ne pourrez plus… 6.9n. –  fautes  : voir péché.'
  - type: text
    content: 'Alors vous vous souviendrez de vos voies mauvaises et de vos agissements, qui n''étaient pas bons ; vous ne pourrez plus vous regarder en face, à cause de vos fautes et de vos abominations. '
  '32':
  - type: note
    content: V. 22. –  soyez confus 16.27n.
  - type: text
    content: 'Ce n''est pas à cause de vous que j''agis de la sorte, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – sachez-le ! Ayez honte et soyez confus de vos voies, maison d''Israël !'
  '33':
  - type: text
    content: ' '
  - type: note
    content: V. 10.
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Le jour où je vous purifierai de toutes vos fautes, je repeuplerai les villes, et on rebâtira sur les ruines ; '
  '34':
  - type: text
    content: 'la terre dévastée sera cultivée, alors qu''elle était dévastée sous les yeux de tous les passants. '
  '35':
  - type: note
    content: 28.13+ ; cf. Es 51.3 ; Am 9.13.
  - type: text
    content: 'Et on dira : « Ce pays dévasté est devenu comme un jardin d''Eden ; ces villes en ruine, dévastées et rasées, sont fortifiées et habitées ! » '
  '36':
  - type: note
    content: qui ai parlé et qui agirai 17.24+.
  - type: text
    content: 'Ainsi les nations qui seront restées, autour de vous, sauront que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai rebâti ce qui avait été rasé et planté ce qui était dévasté. C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé et qui agirai.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'je me laisserai encore chercher ou je serai consulté  ; cf. 20.3n. –  je multiplierai…  : litt. je les multiplierai comme un troupeau (le mot hébreu correspondant est traduit par brebis en 34.2n) d''hommes (v. 10ns), comme au v. 38 ; cf. Mi 2.12.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Voici en quoi je me laisserai encore chercher par la maison d''Israël, pour agir à leur égard : je multiplierai les hommes comme un troupeau. '
  '38':
  - type: note
    content: consacrés en vue des sacrifices.
  - type: text
    content: 'Les villes en ruine seront remplies de troupeaux d''hommes, pareils aux troupeaux consacrés, pareils aux troupeaux qui sont à Jérusalem lors de ses rencontres festives. Ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '4':
  - type: note
    content: 'V. 1+. –  Voici ce que dit  : la formule (aussi v. 20) est habituellement traduite par ainsi parle (p. ex. v. 2s,5ss).'
  - type: text
    content: 'à cause de cela, montagnes d''Israël, écoutez la parole du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' aux montagnes et aux collines, aux ravins et aux vallées, aux ruines dévastées et aux villes abandonnées, qui ont été livrés au pillage et aux moqueries des autres nations, tout autour ; '
  '5':
  - type: note
    content: 'A coup sûr 5.11n. –  passion jalouse 35.11+. –  Edom tout entier 35.15. – Voir cœur. –  en piller les pâturages  : texte obscur et traduction incertaine ; on pourrait aussi comprendre la ( ?) chasser en vue du pillage.'
  - type: text
    content: 'à cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : A coup sûr, dans le feu de ma passion jalouse, je parle contre les autres nations et contre Edom tout entier, qui se sont donné mon pays en possession, avec toute la joie de leur cœur et le mépris de leur âme, pour en piller les pâturages ! '
  '6':
  - type: note
    content: 'vous êtes chargés d''insultes…  : autre traduction vous êtes chargés de confusion  ; cf. v. 7n,15 ; 34.29n.'
  - type: text
    content: 'A cause de cela, parle en prophète au sujet de la terre d''Israël ! Tu diras aux montagnes et aux collines, aux ravins et aux vallées : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Dans ma passion jalouse et dans ma fureur, je parle, parce que vous êtes chargés d''insultes par les nations. '
  '7':
  - type: note
    content: 'j''ai juré, à main levée  : litt. j''ai levé la main  ; cf. 20.5nss. – Les mots insultes (aussi v. 6) et confusion (16.52,54 ; 32.24s,30 ; 34.29n) traduisent un seul et même terme hébreu.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Moi j''ai juré, à main levée : A coup sûr, ce sont les nations qui vous entourent qui seront chargées de confusion, par leurs propres insultes !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vous produirez… 17.23+. –  ces choses…  : litt. ils sont près d''arriver , il pourrait s''agir du retour d''exil des Israélites.'
  - type: text
    content: 'Et vous, montagnes d''Israël, vous produirez votre ramure, et vous porterez votre fruit pour Israël, mon peuple ; car ces choses sont près d''arriver. '
  '9':
  - type: note
    content: 'je viens à vous  : litt. me voici vers vous  ; c''est la même formule hébraïque qui, dans un sens négatif, est traduite par je m''oppose à vous en 5.8n.'
  - type: text
    content: 'Oui, je viens à vous ; je me tournerai vers vous, et vous serez cultivées et ensemencées. '
