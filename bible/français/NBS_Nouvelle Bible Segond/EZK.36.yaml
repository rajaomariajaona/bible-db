          text: leur chemin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 14.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'impureté de la femme pendant sa souillure menstruelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'impureté de sa souillure (menstruelle)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 16.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.6+ ; Lv 12.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.19+ ; Es 64.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Humain, les gens de la maison d''Israël, quand ils habitaient sur leur terre, l''ont rendue impure par leur voie et par leurs agissements ; leur voie a été devant moi comme l''impureté de la femme pendant sa souillure menstruelle. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 22.4.
      marker-yv: yv-n
    - type: text
      text: 'Alors j''ai répandu ma fureur sur eux à cause du sang qu''ils avaient répandu dans le pays et des idoles par lesquelles ils l''avaient rendu impur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.10+ ; 6.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je les ai dispersés parmi les nations, et ils ont été disséminés dans tous les pays ; je les ai jugés selon leur voie et selon leurs agissements. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ah ! ah ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hauteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: haut(s)
        - type: text
          text: ' lieu(x)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 32.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'possession '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 35.10 ; cf. 11.15+.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Parce que l''ennemi a dit sur vous : « Ah ! ah ! ces hauteurs d''autrefois sont devenues notre possession ! », '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils sont arrivés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la plupart des mss hébreux ont le singulier, qui doit de toute évidence être compris dans un sens collectif'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon peuple est arrivé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 22. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils sont arrivés dans les nations où ils se rendaient et ils ont profané mon nom sacré ; en effet, on disait d''eux : « C''est le peuple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', c''est de son pays qu''ils sont sortis ! » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 23 ; Ex 31.12 ; Es 52.5 ; Rm 2.24.
      marker-yv: yv-n
    - type: text
      text: Et j'ai voulu épargner mon nom sacré, que la maison d'Israël profanait parmi les nations où elle s'était rendue.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 20.9+,44 ; cf. Dt 9.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la sorte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte, de même au v. 32.'
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, dis à la maison d''Israël : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Ce n''est pas à cause de vous que j''agis de la sorte, maison d''Israël ; c''est à cause de mon nom sacré, que vous avez profané parmi les nations où vous vous êtes rendus. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je montrerai… sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je montrerai ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainteté
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux formes du même verbe hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parmi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parmi eux.
      marker-yv: yv-n
    - type: text
      text: 'Je montrerai qu''il est sacré, mon grand nom qui a été profané parmi les nations, ce nom que vous avez profané au milieu d''elles. Ainsi les nations sauront que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  – quand je montrerai ma sainteté parmi vous sous leurs yeux. '
