      - type: usfm
        marker: fq
        children:
        - type: text
          text: montagnes d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 4 ; 6.2-3+ ; Dt 8.7.'
      marker-yv: yv-n
    - type: text
      text: Toi, humain, parle en prophète sur les montagnes d'Israël !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras : Montagnes d''Israël, écoutez la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je multiplierai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 11+ ; 37.26 ; Jr 30.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: humains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’adam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir Gn 1.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les ruines rebâties
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 44.26-28 ; 58.12 ; 61.4 ; Jr 30.18 ; Ps 69.36.'
      marker-yv: yv-n
    - type: text
      text: 'Je multiplierai sur vous les êtres humains : la maison d''Israël tout entière ; les villes seront habitées, et les ruines rebâties. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les humains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et les bêtes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.13+ ; cf. Jr 31.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'multiplieront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deviendront féconds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 37s ; Gn 1.22+,28 ; Za 10.8 ; les deux verbes sont absents de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que dans le passé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'en vos commencements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 16.55.'
      marker-yv: yv-n
    - type: text
      text: 'Je multiplierai sur vous les humains et les bêtes : ils se multiplieront, ils deviendront féconds ; je vous peuplerai comme au temps jadis et je vous ferai plus de bien que dans le passé ; ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils prendront possession de toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le prophète ne s''adresse plus aux montagnes (v. 1-4) mais au pays dans son ensemble. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tuer leurs enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les priver d''enfants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même dans la suite) ; par la sécheresse ou d'autres fléaux naturels, cf. v. 13 ; 5.17 ; certains croient voir en outre une allusion aux sacrifices d'enfants pratiqués sur les montagnes pour les divinités de la nature, cf. 16.20s ; 18.6 ; 22.9.
      marker-yv: yv-n
    - type: text
      text: Je ferai marcher sur vous des êtres humains – Israël, mon peuple – et ils prendront possession de toi ; tu seras leur patrimoine et tu ne continueras plus à tuer leurs enfants.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on vous dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on te dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; la suite s''adresse au pays ou à la terre d''Israël, cf. Nb 13.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta propre nation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes nations.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Parce qu''on vous dit : « Tu as dévoré des êtres humains, tu as tué les enfants de ta propre nation », '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu ne tueras plus les enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : lecture traditionnelle appuyée par plusieurs mss hébreux et des versions anciennes ; autre lecture '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu ne feras plus trébucher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (comme au v. 15).
      marker-yv: yv-n
    - type: text
      text: 'à cause de cela tu ne dévoreras plus d''êtres humains, tu ne tueras plus les enfants de ta nation – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '36.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'insultes '
      - type: usfm
