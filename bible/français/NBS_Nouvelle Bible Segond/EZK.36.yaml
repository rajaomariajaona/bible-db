      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parle en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
