document_id: PSA.135,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Je sais que le Seigneur est grand
  - type: text
    content: ' '
  - type: note
    content: 'Louez le Seigneur (Yah) v. 3 ; 111.1n  ; 104.35n. –  louez-le  : litt. louez . –  serviteurs… 113.1+.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Louez le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'louez-le, serviteurs du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  '10':
  - type: text
    content: ' '
  - type: note
    content: 136.17ss ; Dt 1.4.
  - type: text
    content: Il battit une multitude de nations
  - type: text
    content: et tua des rois puissants,
  '11':
  - type: text
    content: ' '
  - type: note
    content: Nb 21.21ss,33ss ; Jos 11.23 ; 12 ; Né 9.22.
  - type: text
    content: Sihôn, roi des Amorites,
  - type: text
    content: Og, roi du Bashân,
  - type: text
    content: et tous les rois de Canaan ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 78.55 ; 136.21s.
  - type: text
    content: et il donna leur pays comme patrimoine,
  - type: text
    content: comme patrimoine à Israël, son peuple.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'on évoque ton nom  : litt. ton évocation ou ton souvenir , terme employé ici comme synonyme de ton nom ou évocation de ton nom  ; cf. 6.6n  ; 102.13 ; Ex 3.15n.'
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton nom est pour toujours !'
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), on évoque ton nom de génération en génération !'
  '14':
  - type: text
    content: ' '
  - type: note
    content: '72.2 ; Dt 32.36 ; Hé 10.30. –  jugera  : autre traduction rendra justice à (il faudrait alors lire et au lieu de mais au début du second vers). –  il aura pitié  : litt. il aura du regret au sujet de ses serviteurs  ; cf. 90.13n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' jugera son peuple ;'
  - type: text
    content: mais il aura pitié de ses serviteurs.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Voir 115.4ss et les notes ; cf. Dt 4.28.
  - type: text
    content: Les idoles des nations sont de l'argent et de l'or,
  - type: text
    content: œuvre de mains humaines.
  '16':
  - type: text
    content: Elles ont une bouche et ne parlent pas,
  - type: text
    content: elles ont des yeux et ne voient pas,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'elles… n''entendent pas  : le verbe hébreu correspondant, habituellement traduit par prêter l''oreille (5.2 etc.), est apparenté au terme qui désigne les oreilles . –  elles n''ont pas…  : certains comprennent  : elles ont un nez, mais pas de souffle (le mot hébreu est aussi traduit par esprit ) dans leur bouche.'
  - type: text
    content: elles ont des oreilles et n'entendent pas,
  - type: text
    content: elles n'ont pas de souffle dans leur bouche.
  '18':
  - type: text
    content: Ils leur ressemblent, ceux qui les font,
  - type: text
    content: tous ceux qui mettent leur confiance en elles !
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 115.9nss ; 118.2ss.
  - type: text
    content: 'Maison d''Israël, bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Maison d''Aaron, bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 134.1.
  - type: text
    content: 'qui vous tenez dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: dans les cours de la maison de notre Dieu !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 115.11n. – Voir lévite. – Voir crainte.
  - type: text
    content: 'Maison des lévites, bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Vous qui craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. 134.3+. –  Louez le Seigneur v. 1+ ; 104.35n.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis Sion,'
  - type: text
    content: lui qui demeure à Jérusalem !
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Louez le Seigneur (Yah) v. 1+. –  bon 54.8 ; 106.1+ ; 136.1ss. –  Chantez 7.18n. –  beau ou agréable , le même mot apparaît en 133.1.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah), car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon.'
  - type: text
    content: Chantez pour son nom, car il est beau.
  '4':
  - type: text
    content: ' '
  - type: note
    content: s'est choisi Jacob 14.7+ ; Es 41.8. –  qu'il lui appartienne… Ex 19.5 ; Dt 7.6 ; 14.2 ; 26.18 ; Ml 3.17 ; Tt 2.14 ; 1P 2.9.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) s''est choisi Jacob,'
  - type: text
    content: Israël, pour qu'il lui appartienne en propre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 95.3 ; Ex 18.11. –  Je sais bien ou je reconnais  ; cf. 119.75,152.
  - type: text
    content: 'Je sais bien, moi, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est grand,'
  - type: text
    content: que notre Seigneur est au-dessus de tous les dieux.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 115.3 ; 134.3.
  - type: text
    content: 'Tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' veut, il le fait,'
  - type: text
    content: dans le ciel et sur la terre,
  - type: text
    content: dans les mers et dans tous les abîmes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 33.7n  ; voir aussi 29.5ss ; Jr 10.13 ; 51.16. –  des extrémités  : litt. de l''extrémité.'
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: il produit les éclairs avec la pluie,
  - type: text
    content: il tire le vent de ses trésors.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 78.51 ; 105.36 ; 136.10 ; Ex 11.5 ; 12.29.
  - type: text
    content: Il frappa les premiers-nés de l'Egypte,
  - type: text
    content: depuis les humains jusqu'aux bêtes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '78.43ss ; 105.27 ; Ex 7–14 ; Dt 6.21ss ; 11.3 ; 26.8ss ; Jr 32.20. –  les gens de sa cour  : litt. ses serviteurs  ; cf. v. 14.'
  - type: text
    content: Il envoya des signes et des prodiges
  - type: text
    content: au milieu de toi, Egypte,
  - type: text
    content: contre le pharaon et contre tous les gens de sa cour.
