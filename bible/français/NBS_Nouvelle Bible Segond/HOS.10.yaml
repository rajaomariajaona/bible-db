        - type: text
          text: je suis passé devant.
      marker-yv: yv-n
    - type: text
      text: Ephraïm est une génisse dressée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui aime fouler le grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je fais plier sa belle encolure ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'attellerai Ephraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda labourera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob hersera.
