    - type: text
      text: Israël était une vigne luxuriante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il produisait du fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus son fruit était abondant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus il a multiplié les autels ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus son pays était beau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus il a embelli les pierres levées.
