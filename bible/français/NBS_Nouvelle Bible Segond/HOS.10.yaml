document_id: HOS.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Fin de la royauté et des cultes idolâtriques
  - type: text
    content: ' '
  - type: note
    content: 'une vigne luxuriante  : autre traduction une vigne qui dégénère  ; cf. Es 5.1+ ; Jr 2.21. –  il produisait  : autre traduction il (Dieu) lui faisait produire . –  autels 8.11+. –  beau  : autre traduction bon.'
  - type: text
    content: Israël était une vigne luxuriante,
  - type: text
    content: il produisait du fruit.
  - type: text
    content: Plus son fruit était abondant,
  - type: text
    content: plus il a multiplié les autels ;
  - type: text
    content: plus son pays était beau,
  - type: text
    content: plus il a embelli les pierres levées.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'selon mon désir  : LXX je viendrai pour les corriger . –  quand on les enchaînera  : le verbe hébreu est très proche de celui qui est traduit par corriger  ; autre traduction parce qu''ils sont attachés… –  pour leur double faute  : traduction incertaine, d''après une lecture traditionnelle et des versions anciennes ; une autre lecture traditionnelle pourrait signifier leurs deux sources, leurs deux yeux ou leurs deux sillons  ; cf. 1R 12.28s ; Jr 2.13.'
  - type: text
    content: Je les corrigerai selon mon désir ;
  - type: text
    content: des peuples se rassembleront contre eux,
  - type: text
    content: quand on les enchaînera pour leur double faute.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Certains modifient la vocalisation du texte hébreu traditionnel pour lire Ephraïm que j''aime est une génisse dressée à fouler (le grain). J''ai fait plier… –  je fais plier  : litt. je suis passé sur  ; d''autres comprennent je suis passé devant.'
  - type: text
    content: Ephraïm est une génisse dressée,
  - type: text
    content: qui aime fouler le grain,
  - type: text
    content: mais je fais plier sa belle encolure ;
  - type: text
    content: j'attellerai Ephraïm,
  - type: text
    content: Juda labourera,
  - type: text
    content: Jacob hersera.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'semez / moissonnez  : cf. 2Co 9.10. –  défrichez-vous… Jr 4.3. –  chercher le Seigneur 5.15 ; Dt 4.29 ; 1R 22.5 ; 2R 3.11 ; 8.8 ; 22.13 ; Es 55.6 ; 65.1 ; Jr 29.13 ; 37.7 ; 38.14 ; 42.1-3 ; Am 5.4 ; Za 8.22 ; Ac 17.27. –  jusqu''à ce qu''il vienne…  : cf. 6.3. –  fasse pleuvoir pour vous  : autre traduction vous enseigne . –  justice  : cf. Es 42.1 ; Ps 85.11,14.'
  - type: text
    content: Vous, semez pour vous la justice,
  - type: text
    content: moissonnez à la mesure de la fidélité,
  - type: text
    content: défrichez-vous un champ nouveau !
  - type: text
    content: 'Il est temps de chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: jusqu'à ce qu'il vienne
  - type: text
    content: et fasse pleuvoir pour vous la justice.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 22.8. –  labouré  : cf. v. 11 ; 8.7+ ; l''expression labourer la méchanceté a aussi été traduite par tramer le mal  ; cf. 1S 23.9 ; Pr 6.14 ; 12.20 ; 14.22. –  ta voie  : LXX tes chars  ; cf. Es 31.1 ; Mi 1.13.'
  - type: text
    content: Vous avez labouré la méchanceté,
  - type: text
    content: moissonné l'injustice,
  - type: text
    content: mangé le fruit de la dissimulation.
  - type: text
    content: Parce que tu as mis ta confiance dans ta voie,
  - type: text
    content: dans le nombre de tes guerriers,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Shalmân / Beth-Arbel  : allusion à un événement qui nous est aujourd''hui inconnu, sans doute la conquête d''une ville de Transjordanie, soit par un roi de Moab (p. ex. le Salamana mentionné par Tiglath-Piléser III), soit par Salmanasar, roi d''Assyrie. –  mère / enfants  : cf. 14.1 ; 2R 8.12 ; Es 13.18 ; Na 3.10 ; Ps 137.9 ; Lc 19.44.'
  - type: text
    content: un vacarme s'élèvera parmi ton peuple,
  - type: text
    content: et toutes tes forteresses seront ravagées,
  - type: text
    content: comme Shalmân ravagea Beth-Arbel,
  - type: text
    content: au jour de la guerre,
  - type: text
    content: lorsque la mère fut écrasée sur les enfants.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Beth-El , le sanctuaire du royaume du Nord, considéré comme illégitime ; cf. 4.15n. –  du mal terrible…  : litt. du mal de votre mal , tournure probablement superlative ; cf. 7.3. –  l''aurore  : cf. 6.3 ; Es 17.14 ; Ps 46.6 ; 2Ch 20.16-20. –  roi d''Israël v. 7+ ; 7.5-7 ; 13.11.'
  - type: text
    content: Voilà ce que vous attirera Beth-El,
  - type: text
    content: à cause du mal terrible que vous avez fait.
  - type: text
    content: Vienne l'aurore,
  - type: text
    content: et le roi d'Israël aura péri.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  partagé  : litt. glissant , c.-à-d. faux . –  ils vont devoir faire réparation  : autre traduction ils sont en tort  ; cf. 4.15n  ; 5.15n  ; 14.1 ; Lv 5.6n  ; Es 24.6. –  Il va briser  : c.-à-d. Dieu va briser  ; le verbe est utilisé ailleurs au sens de briser la nuque d''un animal, cf. Ex 13.13 ; 34.20 ; Dt 21.4,6 ; Es 66.3. –  saccager  : une autre forme du même verbe est traduite par ravager au v. 14.'
  - type: text
    content: 'Leur cœur est partagé :'
  - type: text
    content: maintenant ils vont devoir faire réparation.
  - type: text
    content: Il va briser leurs autels,
  - type: text
    content: saccager leurs pierres levées.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.1nss. – Voir crainte.
  - type: text
    content: 'Et maintenant ils disent :'
  - type: text
    content: Nous n'avons pas de roi,
  - type: text
    content: 'car nous n''avons pas craint le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: et le roi, que pourrait-il faire pour nous ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'maudissent  : autres traductions jurent ; adjurent  ; sur les malédictions conditionnelles, cf. 4.2n. –  concluent des alliances  : litt. en concluant alliance . –  jugement  : le mot hébreu correspondant est souvent rendu par équité ou droit  ; on pourrait aussi comprendre que l''équité ou le respect du droit ne sont pas mieux considérés que des mauvaises herbes.'
  - type: text
    content: Ils parlent, parlent,
  - type: text
    content: maudissent pour tromper,
  - type: text
    content: concluent des alliances,
  - type: text
    content: et le jugement bourgeonne
  - type: text
    content: comme une plante vénéneuse,
  - type: text
    content: dans les sillons des champs.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Samarie 7.1n. –  génisses  : cf. 8.5n. –  Beth-Aven 4.15n. –  sur l''idole  : litt. sur lui . –  ses desservants  : le terme hébreu qui apparaît ici est réservé dans la Bible aux prêtres des idoles (de même en 2R 23.5 et So 1.4) ; sans doute d''origine étrangère (il semble dériver d''un verbe assyrien pour se prosterner ), il rappelle en hébreu d''autres familles de mots évoquant, soit l''excitation ou l''échauffement, soit le noir ou une couleur sombre (cf. Jb 3.5 ; Lm 5.10). –  trembleront  : on a aussi compris se réjouiront (ironiquement ?), danseront (rite de deuil ?) ; le verbe hébreu fait assonance avec celui qui est traduit par s''en va en exil . – Voir gloire.'
  - type: text
    content: Ceux qui demeurent à Samarie seront consternés au sujet des génisses de Beth-Aven ;
  - type: text
    content: le peuple mènera deuil sur l'idole,
  - type: text
    content: et ses desservants trembleront pour elle,
  - type: text
    content: pour sa gloire qui s'en va en exil, loin d'eux.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Assyrie 9.3+. –  présent  : le mot hébreu correspondant peut aussi être traduit par offrande  ; cf. Jg 3.15n  ; 1S 4.11. –  Yareb 5.13n.'
  - type: text
    content: Elle sera offerte à l'Assyrie,
  - type: text
    content: en présent au roi Yareb.
  - type: text
    content: La honte saisira Ephraïm.
  - type: text
    content: Et Israël aura honte de ses projets.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'est réduite au silence et périt traduisent un seul verbe hébreu (v. 15 ; 4.5n). –  de l''écume  : on a aussi traduit un fétu, un bout de bois , parce qu''un terme apparenté apparaît dans l''expression pour mettre en pièces (un figuier) en Jl 1.7, mais toutes ces traductions sont conjecturales ; le terme hébreu qui apparaît ici désigne habituellement la colère , souvent divine (Lv 10.6n  ; Nb 1.53n) ; on pourrait aussi comprendre quand la Colère éclate sur les eaux (cf. Ps 29.3).'
  - type: text
    content: Samarie est réduite au silence, son roi périt,
  - type: text
    content: comme de l'écume sur les eaux.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'hauts lieux (cf. 4.13) d''Aven (= Beth-Aven, v. 5) ou, dans un sens plus général, hauts lieux d''injustice ou de malfaisance (cf. 6.8n  ; Jr 5.31n) ; cf. 2R 23.15s. – Voir péché. –  épines / chardons  : mêmes termes en Gn 3.18 ; cf. Es 5.6+. – Cf. Es 2.10,19,21 ; Lc 23.30 ; Ap 6.16.'
  - type: text
    content: Les hauts lieux d'Aven, où Israël a péché, seront détruits ;
  - type: text
    content: les épines et les chardons croîtront sur leurs autels.
  - type: text
    content: 'Ils diront aux montagnes : « Couvrez-nous ! »'
  - type: text
    content: 'Et aux collines : « Tombez sur nous ! »'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Depuis les jours  : certains comprennent plus encore qu''aux jours . –  Guibéa 9.9+ ; sur la guerre , cf. en particulier Jg 20.'
  - type: text
    content: Depuis les jours de Guibéa
  - type: text
    content: tu as péché, Israël !
  - type: text
    content: Ils en restent là,
  - type: text
    content: et la guerre contre les fils pervers ne les atteindrait pas à Guibéa !
