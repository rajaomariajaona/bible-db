document_id: MAL.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu aime Israël
  - type: text
    content: ' '
  - type: note
    content: Sentence Es 13.1n  ; Jr 23.33ss ; avec LXX et Vg, certains traduisent ici proclamation de la parole…  ; cf. Za 9.1 ; 12.1. –  Malachie signifie mon messager ou mon ange  ; LXX traduit ici son messager ou son ange (cf. 2.7n  ; 3.1n).
  - type: text
    content: 'Sentence, parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Israël, par l''intermédiaire de Malachie.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 8 ; 2.13 ; 1S 15.22 ; Es 1.11ss ; Jr 6.20 ; 7.21 ; Os 6.9 ; Am 5.21ss.
  - type: text
    content: Qui d'entre vous
  - type: text
    content: fermera donc les portes,
  - type: text
    content: afin que vous n'allumiez pas pour rien
  - type: text
    content: le feu sur mon autel ?
  - type: text
    content: Je ne prends aucun plaisir en vous,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: et je n'agrée pas l'offrande de votre main.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'du soleil levant… Es 43.5 ; 45.6 ; 59.19 ; Ps 50.1 ; 75.7 ; 103.12 ; 107.3 ; 113.3n  ; Lc 13.29. –  mon nom est grand Jos 7.9 ; 1S 12.22 ; 1R 8.42 ; Jr 10.6 ; 44.26 ; Ez 36.23 ; Ps 76.2 ; 99.3. – Si le texte, dont la construction est inhabituelle, est à entendre de la vénération de Dieu par les nations (v. 14 ; voir cependant Gn 48.19 ; Ez 37.22), c.-à-d. les non-Juifs, le nom honoré est peut-être celui de Dieu des cieux , fréquent à l''époque perse (Jon 1.9 ; Dn 2.18 ; 4.34 ; 5.23 ; Esd 1.2 ; 5.11s ; 6.9ss ; 7.12,21,23 ; Né 1.4 ; 2.4) ; cf. So 3.9s ; Jn 4.21 ; Rm 12.1 ; 2Th 1.12 ; Ap 15.4. Certains voient là un reproche cinglant aux prêtres : on ne pouvait leur faire pire injure que de comparer leur sacerdoce à ceux des religions « païennes ».'
  - type: text
    content: Car du soleil levant jusqu'au couchant,
  - type: text
    content: mon nom est grand parmi les nations.
  - type: text
    content: 'En tout lieu on offre de l''encens pour mon nom et on apporte une offrande pure ; car mon nom est grand parmi les nations, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. '
  '12':
  - type: note
    content: 'Cf. v. 7n. –  vous me profanez  : autre lecture traditionnelle, probablement introduite par respect pour Dieu  : vous le profanez  ; cf. v. 7n  ; voir aussi Lv 18.21 ; 19.12 ; 20.3 ; 21.6 ; 22.2,32 ; Jr 34.16 ; Ez 20.9,39 ; 36.20,22 ; 39.7. –  la nourriture qu''elle rapporte…  : traduction approximative et incertaine ; litt. son fruit ( ?) (est) méprisé, sa nourriture.'
  - type: text
    content: 'Mais vous, vous me profanez, en disant : « La table du Seigneur est souillée, et la nourriture qu''elle rapporte est méprisable. » '
  '13':
  - type: note
    content: 'Cf. v. 8. –  Quelle fatigue ! cf. Dt 14.26 ; 16.14s ; voir aussi 28.66ns ; Né 9.32 (le même mot est rendu par peine) ; Lm 3.5 (lassitude). –  vous faites fi de moi  : litt. vous me soufflez dessus  ; autre lecture traditionnelle (cf. v. 12n) vous en faites fi. –  dit le Seigneur  : à la fin du v., quelques mss hébreux et LXX ajoutent des Armées.'
  - type: text
    content: 'Vous dites : « Quelle fatigue ! », et vous faites fi de moi, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ; et cependant vous amenez ce qui est le produit d''une spoliation, ce qui est boiteux ou infirme : voilà l''offrande que vous amenez ! Vais-je l''agréer de votre main ? dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2S 24.24 ; Mc 12.41ss. –  Maudit  : cf. 2.2 ; Lv 22.20 ; voir bénédiction, malédiction. –  le perfide ou l''hypocrite  : cf. Nb 25.18 ; voir aussi Ac 5. –  un mâle  : il faut probablement comprendre un animal complet, en bon état (cf. Lv 3.1). –  voue  : voir Nb 30. –  bête mutilée Lv 22.25. –  un grand roi  : cf. So 3.15+ ; Ps 47.3+. –  est redoutable Dt 28.58 ; Ps 99.3 ; on pourrait aussi comprendre est craint , c.-à-d. est respecté  ; cf. v. 6n,11n.'
  - type: text
    content: 'Maudit soit le perfide qui a dans son troupeau un mâle, et qui voue et sacrifie au Seigneur une bête mutilée ! Car je suis un grand roi, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, et mon nom est redoutable parmi les nations.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous aime  : autre traduction je vous ai aimés , Dt 4.37 ; 7.8 ; Jr 31.3 ; Os 11.1 ; cf. Es 49.14 ; 54 ; 59.9ss ; Ag 2.21s ; Za 1.14,17 ; 2.14s ; 8.2. –  En quoi… ? cf. v. 6s ; 2.14,17 ; 3.7s,13. –  Esaü (= Edom , v. 3s) / Jacob (= Israël , v. 1,5 ; 2.12) : cf. Gn 25–27 ; 36 ; 1R 11.15 ; Es 34.5ss ; Jr 49.7ss ; Jl 4.19 ; Ab 6 ; voir aussi Es 41.8ss ; 43.1ss ; Jr 30.10 ; Os 12.3s ; sur l''opposition de l’amour et de la haine, qui peut être relative (aimer ou détester = aimer plus ou moins) ou absolue, cf. Gn 29.31n  ; Dt 21.15n  ; Mt 6.24 ; Lc 14.25s ; voir Rm 9.13  ; cf. 4 Esdras 3.16 : « Tu te choisis Jacob et tu rejetas Esaü. »'
  - type: text
    content: 'Je vous aime, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'mais vous dites :'
  - type: text
    content: « En quoi nous aimes-tu ? »
  - type: text
    content: Esaü n'est-il pas frère de Jacob ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Cependant j'ai aimé Jacob,
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'lieu dévasté / chacals  : cf. Jr 9.10 ; 10.22 ; 49.33 (termes très proches) ; certains, d''après LXX, traduisent le dernier vers comme suit  : et de son patrimoine des pâturages du désert  ; cf. Jr 9.9 ; ou des cachettes abandonnées  ; cf. Gn 27.39 ; Jr 49.6 ; Ab 3,6.'
  - type: text
    content: 'et j''ai détesté Esaü :'
  - type: text
    content: j'ai fait de ses montagnes un lieu dévasté,
  - type: text
    content: j'ai livré son patrimoine aux chacals du désert.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Edom v. 2n  ; cf. 2R 16.6 ; Es 63.1ss ; Ez 25.12ss ; 35.1ss ; Jl 4.19 ; Am 1.11s ; Ab ; Ps 137.7 ; Lm 4.21s. –  détruits  : même verbe en Jr 5.17 ( démanteler ). –  nous rebâtirons  : cf. Es 9.8s. –  le Seigneur … des Armées 1S 1.3n. –  pour toujours Ab 10.'
  - type: text
    content: 'Si Edom dit : « Nous avons été détruits,'
  - type: text
    content: mais nous rebâtirons les ruines ! »
  - type: text
    content: '– ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Qu'ils bâtissent, je raserai !
  - type: text
    content: On les appellera « Territoire de la méchanceté »,
  - type: text
    content: '« Peuple contre lequel le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est furieux pour toujours ».'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Vos yeux le verront Ps 91.8. –  Le Seigneur est grand Ps 48.2+. –  au-dessus…  : autre traduction par-delà les frontières d''Israël.'
  - type: text
    content: Vos yeux le verront,
  - type: text
    content: 'et vous direz vous-mêmes :'
  - type: text
    content: '« Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand'
  - type: text
    content: au-dessus du territoire d'Israël ! »
  - type: heading
    content: Un culte indigne du Seigneur
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'fils / père  : cf. 3.17s,24 ; Ex 20.12 ; Dt 21.18ss ; voir aussi Ex 4.22 ; Dt 32.5s ; Es 1.2 ; 43.6 ; Jr 3.4 ; Os 11.1,4 ; Mt 6.9 ; Jn 8.49. –  honore  : litt. glorifie  ; de même l''honneur qui m''est dû , litt. ma gloire . –  un serviteur  : LXX ajoute craint  ; cf. 3.5+. –  maître ou seigneur . – Voir crainte . –  prêtres 2.1ss ; Jr 2.8 ; 8.10ss ; Ez 22.26 ; Os 4.4ss ; Mi 3.11 ; So 3.4. –  méprisez mon nom  : cf. v. 11,14 ; 2.2,5 ; Ps 74.10.'
  - type: text
    content: Un fils honore son père,
  - type: text
    content: et un serviteur son maître.
  - type: text
    content: Si je suis Père,
  - type: text
    content: où est l'honneur qui m'est dû ?
  - type: text
    content: Si je suis Maître,
  - type: text
    content: où est la crainte qui m'est due ?
  - type: text
    content: '– dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: à vous, prêtres,
  - type: text
    content: qui méprisez mon nom.
  - type: text
    content: 'Vous dites : « En quoi avons-nous méprisé ton nom ? »'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Vous apportez…  : cf. 2.12 ; 3.3 ; Am 5.25. –  une nourriture  : le mot hébreu correspondant est aussi traduit par pain  ; cf. Ez 44.7. –  t''avons-nous souillé  : LXX l''avons-nous souillé (le sacrifice, l''autel ou le nom, v. 6) ; cf. v. 12ns ; voir pur, impur. –  La table du Seigneur , c.-à-d. l’ autel  ; cf. Ez 44.16 ; 1Co 10.21. –  méprisable  : cf. v. 6+ ; autres traductions dérisoire, sans importance  ; de même au v. 12.'
  - type: text
    content: Vous apportez sur mon autel une nourriture souillée,
  - type: text
    content: 'et vous dites :'
  - type: text
    content: « En quoi t'avons-nous souillé ? »
  - type: text
    content: 'C''est en disant :'
  - type: text
    content: '« La table du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est chose méprisable. »'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 22.17ss ; Dt 15.21. –  n''est-ce pas mal ? autre traduction (vous dites :) il n''y a aucun mal à cela ! –  ton gouverneur  : le terme évoque sans doute l''administration perse ; cf. 1R 10.15n  ; Esd 8.36 ; Né 2.7,9 ; 5.14s,18 ; 12.26. –  t''agréera-t-il  : plusieurs mss de LXX portent l''agréera-t-il  ; cf. v. 10,13. –  Te fera-t-il bon accueil  : litt. relèvera-t-il ta face , de même au v. 9. Sur cette expression, voir aussi 2.9n  ; Gn 4.7n  ; cf. 19.21n  ; 32.21n.'
  - type: text
    content: Quand vous amenez en sacrifice une bête aveugle,
  - type: text
    content: n'est-ce pas mal ?
  - type: text
    content: Quand vous en amenez une boiteuse ou malade,
  - type: text
    content: n'est-ce pas mal ?
  - type: text
    content: 'Offre-la à ton gouverneur, je te prie :'
  - type: text
    content: t'agréera-t-il ?
  - type: text
    content: Te fera-t-il bon accueil ?
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'cherchez à apaiser Dieu  : litt. caressez donc la face de Dieu (hébreu ’El , cf. Gn 21.33n) ; voir Ex 32.11+. – Voir grâce. –  bon accueil v. 8n  ; certains comprennent est-ce par vous qu''il va faire bon accueil , c.-à-d. est-ce vous qui le rendrez favorable ?'
  - type: text
    content: Et maintenant, je vous en prie, cherchez à apaiser Dieu,
  - type: text
    content: pour qu'il nous fasse grâce !
  - type: text
    content: 'C''est de vous que cela vient :'
  - type: text
    content: vous fera-t-il bon accueil ?
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
