        text: les (deux) bronzes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Jr 52.11 précise que Sédécias fut emprisonné jusqu''à sa mort.'
    marker-yv: yv-n
  - type: text
    text: On égorgea les fils de Sédécias sous ses yeux ; puis le roi de Babylone fit crever les yeux de Sédécias, il le fit attacher avec des entraves de bronze et l'emmena à Babylone.
