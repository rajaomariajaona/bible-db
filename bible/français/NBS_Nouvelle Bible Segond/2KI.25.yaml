    marker-yv: yv-n
  - type: text
    text: 'une brèche fut ouverte dans la ville. Tous les hommes de guerre prirent, de nuit, le chemin de la porte entre les deux murailles, près du Jardin du Roi, tandis que les Chaldéens encerclaient la ville. Il prit le chemin de la plaine aride. '
  - type: usfm
