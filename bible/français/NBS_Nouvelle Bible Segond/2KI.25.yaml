  - type: text
    text: 'Lorsque tous les chefs des troupes apprirent, eux et leurs hommes, que le roi de Babylone avait nommé Guedalia, ils se rendirent auprès de Guedalia, au Mitspa : c''étaient Ismaël, fils de Netania, Yohanân, fils de Qaréah, Seraya, fils de Tanhoumeth, le Netophatite, et Yaazania, fils du Maakatite, eux et leurs hommes. '
