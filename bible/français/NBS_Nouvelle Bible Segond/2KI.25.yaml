    text: 'La trente-septième année de l''exil de Joïakîn, roi de Juda, le vingt-septième jour du douzième mois, Evil-Merodak, roi de Babylone, l''année où il devint roi, gracia Joïakîn, roi de Juda, et le tira de la maison de détention. '
