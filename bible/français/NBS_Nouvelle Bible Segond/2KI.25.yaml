  - type: text
    text: 'Mais, au septième mois, Ismaël, fils de Netania, fils d''Elishama, de la descendance royale, arriva avec dix hommes ; ils mirent à mort Guedalia, ainsi que les Judéens et les Chaldéens qui étaient avec lui au Mitspa. '
