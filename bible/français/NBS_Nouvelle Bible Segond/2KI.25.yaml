document_id: 2KI.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nabuchodonosor assiège Jérusalem
  - type: heading
    content: Jr 39.1-7  ; 52.4-11
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 39.1-10 ; 52.4-16. –  le dixième jour  : précision absente de LXX comme de Jr 39.1. –  dixième mois  : certains mss de LXX ont lu douzième , un autre deuxième . –  Nabuchodonosor  : cf. 24.1n. –  il dressa son camp  : le verbe est au pluriel dans un ms de Tg et dans Vg, comme en Jr 52.4. –  ils bâtirent  : LXX, Syr et des mss de Tg portent il bâtit . –  un terrassement  : c.-à-d. une rampe d''assaut, résultat d''un travail de terrassement pour mieux attaquer la ville ; même mot en Jr 52.4 ; Ez 4.2 ; 17.17 ; 21.27 ; 26.8.'
  - type: text
    content: 'La neuvième année de son règne, le dixième jour du dixième mois, Nabuchodonosor, roi de Babylone, attaqua Jérusalem avec toute son armée ; il dressa son camp contre elle, et ils bâtirent contre elle un terrassement, tout autour. '
  '10':
  - type: note
    content: 'Toute l''armée  : LXX l''armée. –  qui était avec  : le mot correspondant à avec est restitué d''après plusieurs mss hébreux, Syr et Vg et des mss de Tg, ainsi que Jr 52.14. –  les murailles  : toutes les murailles selon un ms hébreu et Jr 52 ; la muraille selon LXX et Syr.'
  - type: text
    content: Toute l'armée des Chaldéens, qui était avec le chef des gardes, démolit les murailles qui entouraient Jérusalem.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le reste du peuple  : autre traduction le reste des troupes (cf. v. 12). –  ceux qui s''étaient rendus au roi  : litt. les prosternés qui s''étaient prosternés sur (ou vers ) le roi . Il pourrait s''agir de déserteurs. –  la multitude  : litt. la foule.'
  - type: text
    content: 'Nebouzaradân, chef des gardes, exila le reste du peuple, ceux qui étaient restés dans la ville, ceux qui s''étaient rendus au roi de Babylone et le reste de la multitude. '
  '12':
  - type: note
    content: 'certains, parmi les petites gens  : cf. 24.14n. –  cultivateurs ou laboureurs.'
  - type: text
    content: Cependant le chef des gardes permit à certains, parmi les petites gens du pays, de rester comme vignerons et comme cultivateurs.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 52.17-27. –  les colonnes de bronze…  : cf. 1R 7.15-26. A noter l''absence de toute mention du coffre sacré parmi les objets pillés ou détruits (cf. Ap 2.17n). –  le bronze  : un ms hébreu porte comme Jr tout le bronze.'
  - type: text
    content: 'Des Chaldéens brisèrent les colonnes de bronze qui étaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', les bases, la Mer de bronze qui était dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ils en emportèrent le bronze à Babylone. '
  '14':
  - type: note
    content: récipients 1R 7.45+.
  - type: text
    content: 'Ils prirent les récipients, les pelles, les couteaux, les coupes et tous les objets de bronze avec lesquels on officiait. '
  '15':
  - type: note
    content: cassolettes ou cendriers, voir Ex 25.38n  ; comparer avec 2R 24.13 ; voir aussi Jr 52.18.
  - type: text
    content: 'Le chef des gardes prit encore les cassolettes et les calices, tout ce qui était d''or et tout ce qui était d''argent. '
  '16':
  - type: note
    content: 'la Mer  : litt. la mer une (par opposition aux deux colonnes). –  Salomon  : des mss de LXX et Syr précisent le roi Salomon, comme en Jr 52.20.'
  - type: text
    content: 'Les deux colonnes, la Mer et les bases, que Salomon avait faites pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', tous ces objets de bronze avaient un poids incalculable. '
  '17':
  - type: note
    content: 'dix-huit coudées  : plus de 8 m ; voir mesures, poids et monnaies. –  trois coudées (environ 1,40 m)  : cinq coudées en Jr 52.22, reprenant les données de 1R 7.16.'
  - type: text
    content: La hauteur de la première colonne était de dix-huit coudées. Il y avait au-dessus un chapiteau de bronze, et la hauteur du chapiteau était de trois coudées ; autour du chapiteau il y avait un treillis et des grenades, le tout de bronze ; il en était de même pour la seconde colonne avec le treillis.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Seraya  : à ne pas confondre avec le fils d''Azriel cité en Jr 36.26 ou celui de Nériya en Jr 51.59-64. –  Sophonie  : hébreu Tsephaniahou  ; le personnage n''est pas à confondre avec le prophète qui a donné son nom à un livre biblique (So 1.1n  ; voir aussi Jr 21.1+ ; Za 6.10,14 ; 1Ch 6.21). –  les trois gardiens du seuil  : cf. 12.10n.'
  - type: text
    content: 'Le chef des gardes prit Seraya, le prêtre en chef, Sophonie, le prêtre en second, et les trois gardiens du seuil. '
  '19':
  - type: note
    content: 'préposé…  : autre traduction inspecteur des hommes de guerre. –  cinq hommes  : cinquante selon Tg, sept selon Jr 52.25. –  les familiers du roi  : litt. ceux qui voyaient le visage du roi. –  le scribe chef de l''armée  : LXX le scribe du chef de l''armée, comme en Jr 52.25.'
  - type: text
    content: 'De la ville, il prit un haut fonctionnaire qui était préposé aux hommes de guerre, cinq hommes parmi les familiers du roi qui furent trouvés dans la ville, le scribe chef de l''armée qui était chargé d''enrôler le peuple du pays, et soixante hommes du peuple du pays qui se trouvaient dans la ville. '
  '2':
  - type: text
    content: 'La ville fut en état de siège jusqu''à la onzième année du roi Sédécias. '
  '20':
  - type: note
    content: 'Ribla  : cf. 23.33n.'
  - type: text
    content: 'Nebouzaradân, chef des gardes, les prit et les conduisit au roi de Babylone à Ribla. '
  '21':
  - type: note
    content: 'les mit à mort  : litt. les frappa et les fit mourir. –  de sa terre  : litt. de son sol, cf. 21.8 ; Gn 2.5n.'
  - type: text
    content: Le roi de Babylone les mit à mort à Ribla, au pays de Hamath. Ainsi Juda fut exilé loin de sa terre.
  - type: heading
    content: Guedalia, gouverneur de Juda
  - type: heading
    content: Cf. Jr 40.7–41.18
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 40.5. –  Quant au peuple qui restait  : la politique babylonienne diffère ici de celle des Assyriens en ce que des autochtones peuvent demeurer dans le pays où ils ne sont pas remplacés par des populations allogènes ; cf. 17.24. –  Ahiqam, fils de Shaphân  : cf. 22.12+.'
  - type: text
    content: Quant au peuple qui restait dans le pays de Juda, ceux à qui Nabuchodonosor, roi de Babylone, avait permis de rester, il nomma à leur tête Guedalia, fils d'Ahiqam, fils de Shaphân.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'leurs hommes  : avec des versions anciennes et Jr 40.7 ; les hommes pour le texte hébreu (à la première occurrence). –  Guedalia / Yaazania  : hébreu Gedalyahou / Ya''azanyahou . –  Yohanân  : un des protagonistes des derniers épisodes de la vie du prophète Jérémie selon Jr 42–43. –  Netophatite  : de Netopha, vraisemblablement Khirbet Bett Falut, au sud-ouest de Beth-Léhem ; cf. Esd 2.22 ; Né 7.26. –  Maakatite  : originaire du royaume syrien de Maaka ou, plus vraisemblablement, de la ville d''Abel-Beth-Maaka dans le nord d''Israël (Jos 12.5).'
  - type: text
    content: 'Lorsque tous les chefs des troupes apprirent, eux et leurs hommes, que le roi de Babylone avait nommé Guedalia, ils se rendirent auprès de Guedalia, au Mitspa : c''étaient Ismaël, fils de Netania, Yohanân, fils de Qaréah, Seraya, fils de Tanhoumeth, le Netophatite, et Yaazania, fils du Maakatite, eux et leurs hommes. '
  '24':
  - type: note
    content: 'N''ayez pas peur des Chaldéens  : litt. n''ayez pas peur des serviteurs (ou gens) des Chaldéens  ; quelques mss hébreux et la Vg portent n''ayez pas peur de vous soumettre aux Chaldéens, cf. Jr 40.9. –  vous vous en trouverez bien  : litt. ce sera bien pour vous.'
  - type: text
    content: 'Guedalia leur fit un serment, à eux et à leurs hommes ; il leur dit : N''ayez pas peur des Chaldéens ; restez dans le pays, soumettez-vous au roi de Babylone, et vous vous en trouverez bien. '
  '25':
  - type: note
    content: 'ils mirent à mort Guedalia  : litt. ils frappèrent (LXX il frappa) Guedalia et le firent mourir  ; cf. v. 21 ; cet épisode ainsi que la fuite en Egypte qui s''ensuit sont relatés en Jr 40–45. –  Judéens 16.6n.'
  - type: text
    content: 'Mais, au septième mois, Ismaël, fils de Netania, fils d''Elishama, de la descendance royale, arriva avec dix hommes ; ils mirent à mort Guedalia, ainsi que les Judéens et les Chaldéens qui étaient avec lui au Mitspa. '
  '26':
  - type: text
    content: Alors tout le peuple, du plus petit au plus grand, ainsi que les officiers des troupes, s'en allèrent en Egypte, parce qu'ils avaient peur des Chaldéens.
  - type: heading
    content: Evil-Merodak fait grâce à Joïakîn
  - type: heading
    content: Jr 52.31-34
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'trente-septième année ≈ 561/0 av. J.-C. –  vingt-septième jour  : vingt-huitième pour un ms hébreu, vingt-cinquième pour le texte hébreu de Jr 52.31 où LXX porte vingt-quatrième . –  Evil-Merodak (akkadien Awil-Mardouk, l''homme de Mardouk ) : 562-560 av. J.-C. –  gracia… et le tira de la maison de détention  : litt. éleva la tête de Joïakîn… de la maison de détention  ; cf. Gn 40.13,19 ; Jr 52.31 ( et le fit sortir ).'
  - type: text
    content: 'La trente-septième année de l''exil de Joïakîn, roi de Juda, le vingt-septième jour du douzième mois, Evil-Merodak, roi de Babylone, l''année où il devint roi, gracia Joïakîn, roi de Juda, et le tira de la maison de détention. '
  '28':
  - type: text
    content: 'Il lui parla avec bonté et mit son trône au-dessus du trône des rois qui étaient avec lui à Babylone. '
  '29':
  - type: note
    content: 'enlever  : litt. changer.'
  - type: text
    content: 'Il lui fit enlever ses vêtements de détenu ; Joïakîn mangea devant lui constamment, tous les jours de sa vie. '
  '3':
  - type: note
    content: 'Le neuvième jour du mois  : cf. v. 8 ; pour Jr 39.2 ; 52.6 il s''agit du quatrième mois, probablement juin-juillet 587 ou peut-être 586 av. J.-C.'
  - type: text
    content: 'Le neuvième jour du mois, comme la famine était forte dans la ville et qu''il n''y avait plus de pain pour le peuple du pays, '
  '30':
  - type: note
    content: 'de la part du roi  : LXX depuis le palais du roi. –  selon l''ordre de chaque jour…  : cf. 1R 8.59n  ; 1Ch 16.37n  ; Jr 52.34 précise jusqu''au jour de sa mort. – Sur cette conclusion, surprenante mais positive, voir l''introduction♦.'
  - type: text
    content: Son entretien – entretien constant – lui fut assuré de la part du roi, selon l'ordre de chaque jour, tous les jours de sa vie.
  '4':
  - type: note
    content: 'prirent  : le verbe est sous-entendu dans le texte hébreu ; certains mss de LXX portent le roi sortit, ainsi que tous les hommes de guerre, par le chemin de la porte  ; cf. Jr 39.4 ; 52.7. –  Jardin du Roi  : cf. Né 3.15. –  Il prit  : le sujet du verbe n''est pas exprimé dans le texte hébreu traditionnel ; dans ce contexte il s''agit probablement du roi, cf. v. 5 et Jr 39.4 ; certains mss hébreux, certains mss de LXX et Syr portent le pluriel ils prirent, cf. Jr 52.7. –  plaine aride  : hébreu ‘arava  ; cf. Dt 1.1n  ; Jos 8.14n.'
  - type: text
    content: 'une brèche fut ouverte dans la ville. Tous les hommes de guerre prirent, de nuit, le chemin de la porte entre les deux murailles, près du Jardin du Roi, tandis que les Chaldéens encerclaient la ville. Il prit le chemin de la plaine aride. '
  '5':
  - type: note
    content: 'la dépression  : le mot utilisé ici au pluriel est celui qui, au singulier, est traduit par plaine aride au v. 4.'
  - type: text
    content: 'Mais l''armée des Chaldéens poursuivit le roi et le rattrapa dans la dépression de Jéricho, et toute son armée se dispersa loin de lui. '
  '6':
  - type: note
    content: 'Ribla  : Jr 39.5 et 52.9 précisent au pays de Hamath  ; cf. 23.33n. –  on prononça  : plusieurs mss hébreux et la plupart des versions anciennes portent celui-ci prononça, comme dans Jr.'
  - type: text
    content: 'Ils prirent le roi et le firent monter à Ribla, devant le roi de Babylone ; là, on prononça contre lui un jugement. '
  '7':
  - type: note
    content: 'On égorgea  : des versions anciennes portent ici le même texte qu''en Jr 39.6 ; 52.10 il (= le roi de Babylone) égorgea  ; Jr 52.10 mentionne l''exécution conjointe des dignitaires ou princes de Juda. –  le roi de Babylone  : sous-entendu dans le texte (litt. il fit crever les yeux…). –  des entraves de bronze  : litt. les (deux) bronzes  ; Jr 52.11 précise que Sédécias fut emprisonné jusqu''à sa mort.'
  - type: text
    content: On égorgea les fils de Sédécias sous ses yeux ; puis le roi de Babylone fit crever les yeux de Sédécias, il le fit attacher avec des entraves de bronze et l'emmena à Babylone.
  - type: heading
    content: Prise de Jérusalem ; second exil
  - type: heading
    content: Jr 39.8-10  ; 52.12-27  ; 2Ch 36.17-21
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'septième  : neuvième pour deux mss hébreux, certains mss de LXX et Syr  ; dixième en Jr 52.12. –  officier  : litt. serviteur  ; LXX se tenant devant le roi ou au service du roi  ; cf. Jr 52.12n.'
  - type: text
    content: 'Le septième jour du cinquième mois – c''était la dix-neuvième année du règne de Nabuchodonosor, roi de Babylone – Nebouzaradân, chef des gardes, officier du roi de Babylone, vint à Jérusalem. '
  '9':
  - type: note
    content: 'la maison du Seigneur, la maison du roi ou le temple du Seigneur, le palais du roi. –  il mit le feu  : litt. il brûla par le feu. –  toutes les grandes maisons  : litt. toute maison de grand  ; autre traduction toutes les maisons de dignitaires  ; LXX toute maison.'
  - type: text
    content: 'Il brûla la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la maison du roi et toutes les maisons de Jérusalem ; il mit le feu à toutes les grandes maisons. '
