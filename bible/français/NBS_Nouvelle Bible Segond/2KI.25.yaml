  - type: text
    text: La hauteur de la première colonne était de dix-huit coudées. Il y avait au-dessus un chapiteau de bronze, et la hauteur du chapiteau était de trois coudées ; autour du chapiteau il y avait un treillis et des grenades, le tout de bronze ; il en était de même pour la seconde colonne avec le treillis.
