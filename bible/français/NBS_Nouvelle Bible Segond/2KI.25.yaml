      children:
      - type: text
        text: ' : c.-à-d. une rampe d''assaut, résultat d''un travail de terrassement pour mieux attaquer la ville ; même mot en Jr 52.4 ; Ez 4.2 ; 17.17 ; 21.27 ; 26.8.'
    marker-yv: yv-n
  - type: text
    text: 'La neuvième année de son règne, le dixième jour du dixième mois, Nabuchodonosor, roi de Babylone, attaqua Jérusalem avec toute son armée ; il dressa son camp contre elle, et ils bâtirent contre elle un terrassement, tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La ville fut en état de siège jusqu''à la onzième année du roi Sédécias. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
