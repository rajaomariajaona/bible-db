    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le neuvième jour du mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8 ; pour Jr 39.2 ; 52.6 il s''agit du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quatrième mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', probablement juin-juillet 587 ou peut-être 586 av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: 'Le neuvième jour du mois, comme la famine était forte dans la ville et qu''il n''y avait plus de pain pour le peuple du pays, '
