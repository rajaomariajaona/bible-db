  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonas et la compassion divine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cela…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce fut mauvais pour Jonas, d'un grand mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 6 ; voir aussi Lc 15.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui se fâcha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui fut abattu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Cela fut très mal pris par Jonas, qui se fâcha. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en une nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fils d''une nuit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (les deux fois).
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit : Toi, tu as pitié du ricin qui ne t''a coûté aucune peine et que tu n''as pas fait grandir, qui est né en une nuit et qui a disparu en une nuit. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cent vingt mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: douze myriades
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ap 7.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui ne savent pas distinguer…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression signifie peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui ne reconnaissent pas le bon chemin du mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.17+ ; Ec 10.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; elle peut s''appliquer à tous les Ninivites dans leur ignorance du vrai Dieu ; selon certains, elle viserait plus particulièrement les enfants n''ayant pas atteint l''âge de raison. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bêtes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.7s.
      marker-yv: yv-n
    - type: text
      text: Et moi, je n'aurais pas pitié de Ninive, la grande ville, où il y a plus de cent vingt mille humains qui ne savent pas distinguer leur droite de leur gauche, et des bêtes en grand nombre !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est pourquoi j'ai préféré fuir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sens précis du verbe hébreu traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai préféré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est incertain ; il dérive d''une racine qui désigne ce qui est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dans l''espace (p. ex., l’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'est '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans la mesure où on s''oriente face au soleil levant, cf. v. 5,7) ou ce qui est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dans le temps (voir Gn 2.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). Autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est pour cela que je me suis empressé de fuir ; c''est pour cela que j''avais prévu de fuir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 1.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je savais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 34.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui renonces… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui regrettes le mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.9s.
      marker-yv: yv-n
    - type: text
      text: 'Il pria le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en disant : S''il te plaît, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', n''est-ce pas ce que je disais quand j''étais encore dans mon pays ? C''est pourquoi j''ai préféré fuir à Tarsis. Car je savais que tu es un Dieu clément et compatissant, patient et grand par la fidélité, qui renonces au mal. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prends-moi la vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8 ; 1R 19.4 ; voir aussi Jb 7.15.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', prends-moi la vie, je t''en prie, car mieux vaut pour moi mourir que vivre.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fais-tu bien de te fâcher ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'es-tu vraiment fâché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'abattu ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; même possibilité au v. 9.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' répondit : Fais-tu bien de te fâcher ?'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains traduisent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jonas était sorti… s''était assis… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jonas sortit de la ville et s''assit à l''est de la ville. Là il se fit une hutte et s''assit dessous, à l''ombre, afin de voir ce qui arriverait dans la ville. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' Dieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 2.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fit intervenir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un ricin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qiqayôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ce nom pourrait rappeler celui de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jonas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yona
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), traduction incertaine ; une identification botanique exacte est impossible.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' Dieu fit intervenir un ricin, qui s''éleva au-dessus de Jonas, pour donner de l''ombre sur sa tête et le délivrer de son mal. Jonas éprouva une grande joie à cause de ce ricin. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui s'attaqua
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui frappa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 8.'
      marker-yv: yv-n
    - type: text
      text: 'Mais le lendemain, quand parut l''aurore, Dieu fit intervenir un ver qui s''attaqua au ricin, et le ricin se dessécha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un vent d'est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 41.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Os 13.15 ; Jb 1.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étouffant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu n''apparaît qu''ici et son sens précis est incertain ; on le rapproche parfois d''un verbe qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: labourer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frappa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il demanda à mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il demanda sa vie pour mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3 ; même formule en 1R 19.4.'
      marker-yv: yv-n
    - type: text
      text: 'Au lever du soleil, Dieu fit intervenir un vent d''est étouffant, et le soleil frappa la tête de Jonas : il tomba en défaillance. Il demanda à mourir, en disant : Mieux vaut pour moi mourir que vivre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 4,7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au point de demander la mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jusqu''à la mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Mc 14.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: / /).
      marker-yv: yv-n
    - type: text
      text: 'Dieu dit à Jonas : Fais-tu bien de te fâcher à cause du ricin ? Il répondit : Je fais bien de me fâcher au point de demander la mort. '
