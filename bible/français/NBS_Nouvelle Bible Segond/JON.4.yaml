document_id: JON.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonas et la compassion divine
  - type: text
    content: ' '
  - type: note
    content: 'Cela…  : litt. ce fut mauvais pour Jonas, d''un grand mal , cf. v. 6 ; voir aussi Lc 15.28. –  qui se fâcha  : autre traduction possible qui fut abattu , de même dans la suite.'
  - type: text
    content: 'Cela fut très mal pris par Jonas, qui se fâcha. '
  '10':
  - type: note
    content: 'en une nuit  : litt. fils d''une nuit (les deux fois).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Toi, tu as pitié du ricin qui ne t''a coûté aucune peine et que tu n''as pas fait grandir, qui est né en une nuit et qui a disparu en une nuit. '
  '11':
  - type: note
    content: 'cent vingt mille  : litt. douze myriades  ; cf. Ap 7.4ss. –  qui ne savent pas distinguer…  : l''expression signifie peut-être qui ne reconnaissent pas le bon chemin du mauvais  ; cf. Gn 2.17+ ; Ec 10.2n  ; elle peut s''appliquer à tous les Ninivites dans leur ignorance du vrai Dieu ; selon certains, elle viserait plus particulièrement les enfants n''ayant pas atteint l''âge de raison. –  bêtes 3.7s.'
  - type: text
    content: Et moi, je n'aurais pas pitié de Ninive, la grande ville, où il y a plus de cent vingt mille humains qui ne savent pas distinguer leur droite de leur gauche, et des bêtes en grand nombre !
  '2':
  - type: note
    content: 'C''est pourquoi j''ai préféré fuir  : le sens précis du verbe hébreu traduit par j''ai préféré est incertain ; il dérive d''une racine qui désigne ce qui est devant, dans l''espace (p. ex., l’est dans la mesure où on s''oriente face au soleil levant, cf. v. 5,7) ou ce qui est avant, dans le temps (voir Gn 2.8n). Autres traductions c''est pour cela que je me suis empressé de fuir ; c''est pour cela que j''avais prévu de fuir (cf. 1.3). –  je savais…  : cf. Ex 34.6+. –  Dieu  : hébreu ’El, cf. Gn 21.33n. –  qui renonces… ou qui regrettes le mal 3.9s.'
  - type: text
    content: 'Il pria le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en disant : S''il te plaît, '
  - type: text
    content: Seigneur
  - type: text
    content: ', n''est-ce pas ce que je disais quand j''étais encore dans mon pays ? C''est pourquoi j''ai préféré fuir à Tarsis. Car je savais que tu es un Dieu clément et compatissant, patient et grand par la fidélité, qui renonces au mal. '
  '3':
  - type: note
    content: 'prends-moi la vie  : cf. v. 8 ; 1R 19.4 ; voir aussi Jb 7.15.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', prends-moi la vie, je t''en prie, car mieux vaut pour moi mourir que vivre.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Fais-tu bien de te fâcher ? Autre traduction possible es-tu vraiment fâché ou abattu ? (v. 1n) ; même possibilité au v. 9.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : Fais-tu bien de te fâcher ?'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Certains traduisent  : Jonas était sorti… s''était assis… –  à l''est  : autre traduction en face , cf. v. 2n.'
  - type: text
    content: 'Jonas sortit de la ville et s''assit à l''est de la ville. Là il se fit une hutte et s''assit dessous, à l''ombre, afin de voir ce qui arriverait dans la ville. '
  '6':
  - type: note
    content: 'Le Seigneur Dieu  : cf. Gn 2.4nss. –  fit intervenir 2.1n. –  un ricin  : hébreu qiqayôn (ce nom pourrait rappeler celui de Jonas, en hébreu Yona), traduction incertaine ; une identification botanique exacte est impossible.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu fit intervenir un ricin, qui s''éleva au-dessus de Jonas, pour donner de l''ombre sur sa tête et le délivrer de son mal. Jonas éprouva une grande joie à cause de ce ricin. '
  '7':
  - type: note
    content: 'qui s''attaqua  : litt. qui frappa, comme au v. 8.'
  - type: text
    content: 'Mais le lendemain, quand parut l''aurore, Dieu fit intervenir un ver qui s''attaqua au ricin, et le ricin se dessécha. '
  '8':
  - type: note
    content: 'un vent d''est  : cf. Gn 41.6n  ; Os 13.15 ; Jb 1.19. –  étouffant  : le mot hébreu n''apparaît qu''ici et son sens précis est incertain ; on le rapproche parfois d''un verbe qui signifie labourer. –  frappa v. 7n. –  Il demanda à mourir  : litt. il demanda sa vie pour mourir, cf. v. 3 ; même formule en 1R 19.4.'
  - type: text
    content: 'Au lever du soleil, Dieu fit intervenir un vent d''est étouffant, et le soleil frappa la tête de Jonas : il tomba en défaillance. Il demanda à mourir, en disant : Mieux vaut pour moi mourir que vivre. '
  '9':
  - type: note
    content: 'Cf. v. 4,7. –  au point de demander la mort  : autre traduction à mort, litt. jusqu''à la mort (cf. Mc 14.34n/ /).'
  - type: text
    content: 'Dieu dit à Jonas : Fais-tu bien de te fâcher à cause du ricin ? Il répondit : Je fais bien de me fâcher au point de demander la mort. '
