    text: 'On les exposera au soleil, à la lune et à toute l''armée du ciel, qu''ils ont aimés, qu''ils ont servis, qu''ils ont suivis, qu''ils ont cherchés, et devant lesquels ils se sont prosternés. On ne les réunira pas, on ne les ensevelira pas ; ils deviendront du fumier sur la terre. '
