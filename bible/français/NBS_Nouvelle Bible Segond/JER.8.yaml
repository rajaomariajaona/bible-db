document_id: JER.8,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.32n  ; 1R 13.22 ; Ps 53.6.
  - type: text
    content: 'En ce temps-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – on retirera de leurs tombes les ossements des rois de Juda, les ossements de ses princes, les ossements des prêtres, les ossements des prophètes et les ossements des habitants de Jérusalem. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '6.12-15. –  qui les déposséderont  : autre traduction qui en prendront possession . –  Car, du plus petit jusqu''au plus grand…  : LXX omet cette portion de texte (jusqu''à la fin du v. 12).'
  - type: text
    content: C'est pourquoi je donnerai leurs femmes à d'autres,
  - type: text
    content: leurs champs à ceux qui les déposséderont.
  - type: text
    content: Car, du plus petit jusqu'au plus grand,
  - type: text
    content: tous sont âpres au gain ;
  - type: text
    content: depuis le prophète jusqu'au prêtre
  - type: text
    content: tous pratiquent le mensonge.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'blessure 6.14n. –  de la belle, de mon peuple  : litt. de la fille de mon peuple , de même aux v. 19,21ss ; voir 4.11n. –  Tout ira bien 6.14n.'
  - type: text
    content: Ils soignent à la légère
  - type: text
    content: la blessure de la belle, de mon peuple ;
  - type: text
    content: « Tout ira bien, tout ira bien ! », disent-ils,
  - type: text
    content: et rien ne va !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'au temps…  : cf. 6.15n  ; voir aussi 10.15 ; 11.23 ; 23.12 ; 46.21 ; 48.44 ; 50.27 ; Os 9.7 ; Mi 7.4.'
  - type: text
    content: Ils se sont couverts de honte par les abominations qu'ils ont commises,
  - type: text
    content: mais la honte ne les atteint même pas,
  - type: text
    content: ils ne savent même pas être confus.
  - type: text
    content: C'est pourquoi ils tomberont avec ceux qui tombent,
  - type: text
    content: ils trébucheront au temps où ils rendront des comptes,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Une attente déçue
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Je les faucherai jusqu''au dernier  : par deux termes qui font assonance, le texte hébreu semble évoquer à la fois l''idée de récolte et celle d''extermination. Certains modifient le texte hébreu traditionnel pour lire je récolterai leur récolte (terme apparenté pour ensevelir au v. 2 ; cf. 9.21n) ; cf. So 1.2s. –  Plus de raisins… Ha 3.17 ; Mt 21.19/ /. –  les feuilles…  : cf. 17.8 ; Es 1.30. –  ce que je leur avais donné…  : traduction conjecturale ; on pourrait aussi comprendre  : ce que je leur avais donné leur échappera, passera à d''autres ou encore je leur ai envoyé (des ennemis) qui les piétineront.'
  - type: text
    content: Je les faucherai jusqu'au dernier
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Plus de raisins à la vigne,
  - type: text
    content: plus de figues au figuier,
  - type: text
    content: les feuilles se flétriront ;
  - type: text
    content: ce que je leur avais donné,
  - type: text
    content: ils l'ont galvaudé.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'dans les villes fortes  : cf. 4.5+. –  de l''eau empoisonnée 9.14 ; 23.15 ; Lm 3.15,19 ; Ap 8.11. – Voir péché.'
  - type: text
    content: Pourquoi restons-nous assis ?
  - type: text
    content: Rassemblez-vous
  - type: text
    content: et allons dans les villes fortes,
  - type: text
    content: pour y périr !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous fait périr ;'
  - type: text
    content: il nous fait boire de l'eau empoisonnée,
  - type: text
    content: 'parce que nous avons péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: '14.13,19 ; Ez 7.25. –  On espérait…  : autre traduction on espérait la paix.'
  - type: text
    content: On espérait que tout irait bien,
  - type: text
    content: mais il n'y a rien de bon ;
  - type: text
    content: un temps de guérison,
  - type: text
    content: mais c'est l'effroi !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 's''ébrouer  : même terme en Jb 39.20 ; autre traduction hennir (auquel cas on aurait affaire à un synonyme au vers suivant). –  Dan 4.15n. –  hennissement  : même terme en 13.27. –  la terre ou le pays . –  ils dévorent  : cf. 2.3 ; 10.25 ; 30.16 ; Ps 14.4. –  le pays avec tout ce qui s''y trouve 47.2 ; dans d''autres contextes la même expression signifie la terre avec tout ce qui s''y trouve (Ps 24.1+). –  la ville avec tous ceux qui l''habitent 46.8.'
  - type: text
    content: On entend ses chevaux s'ébrouer du côté de Dan,
  - type: text
    content: au hennissement de ses étalons
  - type: text
    content: toute la terre tremble ;
  - type: text
    content: ils viennent, ils dévorent
  - type: text
    content: le pays avec tout ce qui s'y trouve,
  - type: text
    content: la ville avec tous ceux qui l'habitent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'des serpents…  : cf. Nb 21.6 ; Dt 32.24 ; Es 59.5. –  pas de charme  : cf. Ps 58.6 ; Ec 10.11 ; voir aussi Es 3.3n.'
  - type: text
    content: Car j'envoie parmi vous
  - type: text
    content: des serpents, des aspics,
  - type: text
    content: contre lesquels il n'y a pas de charme ;
  - type: text
    content: ils vous mordront
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Le chagrin de Jérémie
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Je voudrais surmonter  : texte obscur : LXX a lu sans remède , en rattachant l''expression au v. 17 ( ils vous mordront ). –  au dedans de moi  : litt. sur moi  ; cf. Es 1.5 ; Lm 1.22 ; 5.17.'
  - type: text
    content: Je voudrais surmonter mon tourment ;
  - type: text
    content: mon cœur souffre au dedans de moi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'J''entends  : litt. voici. –  de la belle, de mon peuple v. 11n. –  Le Seigneur … Dt 31.17. –  Son roi… Mi 4.9. –  contrarié… 7.18+ ; Dt 32.16. –  futilités (2.5+) : le terme s''applique ici aux idoles, cf. 10.3,8,15 ; 14.22 ; 16.19 ; 51.18 ; Dt 32.21 ; 1R 16.13,26 ; Jon 2.9 ; Ps 31.7 ; Ac 14.15. –  étrangères 2.25n.'
  - type: text
    content: J'entends les appels au secours de la belle, de mon peuple,
  - type: text
    content: 'depuis un pays lointain :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est-il plus à Sion ?'
  - type: text
    content: Son roi n'y est-il plus ?
  - type: text
    content: – Pourquoi m'ont-ils contrarié par leurs statues,
  - type: text
    content: par des futilités étrangères ?
  '2':
  - type: note
    content: 'l''armée du ciel…  : cf. 7.18n  ; 19.13 ; Dt 4.19 ; 17.3 ; 2R 17.16 ; 21.3-5 ; Es 24.21 ; 34.4 ; So 1.5 ; Ac 7.42. –  cherchés  : autre traduction consultés. –  On ne les réunira pas  : autre traduction on ne les enterrera pas. –  du fumier sur la terre  : litt. du fumier sur la face du sol, cf. 9.21 ; 16.4 ; 25.33 ; Gn 2.5n  ; voir aussi Jr 14.16 ; 22.18s ; 36.30 ; 2R 9.37 ; Ps 83.11.'
  - type: text
    content: 'On les exposera au soleil, à la lune et à toute l''armée du ciel, qu''ils ont aimés, qu''ils ont servis, qu''ils ont suivis, qu''ils ont cherchés, et devant lesquels ils se sont prosternés. On ne les réunira pas, on ne les ensevelira pas ; ils deviendront du fumier sur la terre. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 13 ; 6.4.
  - type: text
    content: – La moisson est passée, l'été est fini,
  - type: text
    content: et nous ne sommes pas sauvés !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'brisé par la blessure  : le verbe et son complément sont apparentés en hébreu ; cf. 6.14n  ; 8.11 ; voir 10.19. –  la dévastation ou l''atterrement  ; cf. 5.30.'
  - type: text
    content: Je suis brisé par la blessure de la belle, de mon peuple,
  - type: text
    content: je suis sombre,
  - type: text
    content: la dévastation me saisit.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'La région de Galaad , en Transjordanie du Nord, était connue pour ses aromates, notamment son baume qui servait à soigner les plaies 46.11 ; cf. 51.8 ; Gn 37.25 ; 43.11. –  ne se rétablit-elle pas  : le terme hébreu désigne au propre la chair nouvelle qui se forme lors de la cicatrisation ; la même image apparaît en 30.17 ; 33.6 ; Es 58.8 ; Né 4.1n  ; autre traduction pourquoi la plaie de mon peuple ne peut-elle se cicatriser ?'
  - type: text
    content: N'y a-t-il plus de baume au Galaad ?
  - type: text
    content: N'y a-t-il plus de médecin là-bas ?
  - type: text
    content: Pourquoi la belle, mon peuple, ne se rétablit-elle pas ?
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Certaines versions font commencer ici le chapitre 9, dont la numérotation est décalée en conséquence. –  fontaine  : litt. eau . –  Je pleurerais  : cf. 9.17 ; 13.17 ; 14.17 ; 2S 1.24 ; 2R 8.11s ; Es 22.4 ; Lm 1.16 ; 2.18 ; 3.48 ; Lc 19.41. –  les victimes…  : litt. les victimes de la fille de mon peuple , c.-à-d. les victimes parmi mon peuple.'
  - type: text
    content: Ah ! si ma tête était fontaine,
  - type: text
    content: et mes yeux source de larmes !
  - type: text
    content: Je pleurerais jour et nuit
  - type: text
    content: les victimes pour la belle, mon peuple !
  '3':
  - type: note
    content: 'La mort sera préférable à la vie Jon 4.3 ; Jb 3.21 ; 7.15 ; Ap 9.6. –  le reste  : litt. le reste, (ceux) qui resteront  ; le texte hébreu traditionnel répète ceux qui resteront avant dans tous les lieux…  ; cette répétition est absente d''un ms hébreu et de plusieurs versions anciennes. –  ce peuple  : cf. 1.15n.'
  - type: text
    content: 'La mort sera préférable à la vie pour tout le reste de ce peuple mauvais, dans tous les lieux où je les aurai bannis – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Une obstination incompréhensible
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Tombe-t-on…  : cf. Rm 11.11. –  Se détourne et revenir traduisent un même verbe hébreu (cf. 3.12n).'
  - type: text
    content: 'Tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Tombe-t-on sans se relever ?
  - type: text
    content: Se détourne-t-on sans revenir ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'de Jérusalem  : LXX et un ms hébreu omettent cette précision. –  rebelle / infidélité  : les termes hébreux (au féminin) rappellent le verbe traduit par se détourner (v. 4n) et revenir  ; voir aussi 2.31 ; 5.3n.'
  - type: text
    content: Pourquoi donc ce peuple de Jérusalem se montre-t-il rebelle
  - type: text
    content: par une continuelle infidélité ?
  - type: text
    content: Ils persistent dans la tromperie,
  - type: text
    content: ils refusent de revenir.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ils ne parlent pas…  : autres traductions ils ne parlent pas ainsi ; ils ne disent pas le bien  ; expression analogue en 23.10 ( ce qui ne devrait pas se faire , en parallèle avec ce qui est mauvais ), en 48.30 ( inutile ) et en 2R 17.9. –  regrette son mal  : l''expression hébraïque est presque identique à celle qui est rendue par regretter le malheur en Jl 2.13 ; Jon 4.2. –  Qu''ai-je fait ? cf. 2.23. –  poursuit sa course  : litt. tous se sont détournés (cf. v. 4n) dans leur course ou à leur gré , d''après une autre leçon traditionnelle ; cf. 7.24. –  comme un cheval  : cf. 5.8+.'
  - type: text
    content: 'Je suis attentif, j''écoute :'
  - type: text
    content: ils ne parlent pas comme ils devraient ;
  - type: text
    content: aucun ne regrette son mal
  - type: text
    content: 'et ne dit : Qu''ai-je fait ?'
  - type: text
    content: Chacun poursuit sa course,
  - type: text
    content: comme un cheval qui s'élance au combat.
  '7':
  - type: text
    content: ' '
  - type: note
    content: L'identification précise des oiseaux cités ici est incertaine, mais la comparaison porte de toute évidence sur la régularité (idée associée au mot hébreu traduit par règle , qui peut signifier coutume , mais aussi droit, équité ) de leurs migrations ; cf. 4.2,22 ; 5.4 ; 6.10 ; 9.23 ; Es 1.3.
  - type: text
    content: Même la cigogne dans le ciel connaît sa saison ;
  - type: text
    content: la tourterelle, l'hirondelle et la grue
  - type: text
    content: observent le temps de leur retour ;
  - type: text
    content: 'mon peuple, lui, ne connaît pas la règle du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les scribes ont falsifié la loi du Seigneur
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Nous sommes sages  : cf. Dt 4.6. – Voir loi. –  le stylet mensonger…  : cf. 31.33 ; Es 10.1 ; sur le terme traduit par stylet , voir 17.1 ; Ps 45.2 ; Jb 19.24n. – Voir scribe.'
  - type: text
    content: 'Comment pouvez-vous dire :'
  - type: text
    content: Nous sommes sages,
  - type: text
    content: 'la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec nous !'
  - type: text
    content: C'est bien pour le mensonge que s'est mis à l'œuvre
  - type: text
    content: le stylet mensonger des scribes !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'rejeté  : autre traduction méprisé . –  quelle sagesse  : litt. la sagesse de quoi Jb 5.13 ; Rm 1.22 ; 1Co 1.19s,27.'
  - type: text
    content: Les sages se sont couverts de honte ;
  - type: text
    content: ils sont terrifiés, ils sont pris ;
  - type: text
    content: 'ils ont rejeté la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et quelle sagesse ont-ils ?
  - type: heading
    content: Tous agissent dans le mensonge
