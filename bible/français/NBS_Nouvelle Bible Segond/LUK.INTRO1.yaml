document_id: LUK.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''Evangile selon Luc est le premier volet d''une œuvre plus vaste, qui se poursuit avec le livre des Actes des Apôtres. Irénée de Lyon (vers 180 apr. J.-C.) identifie l''auteur au '
    - type: usfm
      marker: it
      children:
      - type: text
        text: médecin bien-aimé
    - type: text
      text: ' mentionné parmi les compagnons de Paul (Col 4.14).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Pour le public cultivé de l'époque
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Dès le début, on découvre un auteur capable de manier avec élégance, finesse et précision la langue grecque du premier siècle (
    - type: usfm
      marker: it
      children:
      - type: text
        text: koïnè
    - type: text
      text: ). Il expose son sujet selon les règles de l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: 'historiographie antique :'
    - type: text
      text: ' il annonce ainsi à son lecteur les circonstances et les objectifs de sa composition. Celle-ci est dédiée à Théophile, comme le sera aussi le livre des Actes. Ce nom désigne-t-il un grand personnage connu de Luc, ou l''auteur songe-t-il ici à tout lecteur « qui aime Dieu » (c''est le sens du nom grec Théophile) ? En tout cas, plus encore que les autres auteurs du Nouveau Testament, Luc a cherché à atteindre le public cultivé de son temps.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le troisième évangile n''est toutefois pas une œuvre classique de littérature hellénistique. Bien des expressions, tournures et constructions de phrase sont de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: style sémitique.
    - type: text
      text: ' Elles semblent imiter la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Septante
    - type: text
      text: ' (LXX*), même là où l''auteur ne cite pas directement l''Ancien Testament.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''œuvre est située par rapport à celles qui ont déjà traité du sujet. Comme ses devanciers, Luc s''appuie sur les nombreux témoignages reçus de l''Eglise primitive (1.1s) ; mais il a aussi fait des recherches personnelles, et il a rédigé une narration suivie (1.3). Il prend également la peine de relier les événements qu''il rapporte à ceux de l''histoire générale : c''est pendant que César Auguste était empereur à Rome et Quirinius gouverneur de la province de Syrie que Jésus naquit à Bethléem (2.1-3) ; c''est du temps de l''empereur Tibère et du gouverneur Ponce Pilate que Jean le Baptiseur commença son ministère (3.1).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Jésus au centre du temps
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Pour Luc, l''histoire se découpe en trois grandes périodes : celle d''Israël, celle de Jésus, celle de l''Eglise. C''est '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: le temps de Jésus
    - type: text
      text: ' qui fait l''objet de son évangile, tandis que le livre des Actes est consacré au temps de l''Eglise. Chacune de ces deux périodes est introduite par une manifestation de l''Esprit (Lc 3.21-22 et Ac 2.1-13) et par un discours programme (Lc 4.17-30 et Ac 2.14-40). La proclamation de Jésus dans la synagogue de Nazareth expose le thème de l''évangile : la grâce de Dieu qui libère, guérit et sauve s''est manifestée dans la personne et l''action de Jésus. Elle est offerte à tous les hommes. La transition entre la période de Jésus et celle de l''Eglise est marquée par l''Ascension, mentionnée à la fois dans la conclusion du premier tome – l''évangile – et l''introduction du second – le livre des Actes (Lc 24.49-53 et Ac 1.1-11). Jean le Baptiseur marque, quant à lui, la transition entre le temps d''Israël auquel il appartient (Lc 16.16) et celui de Jésus qu''il inaugure par sa proclamation (Ac 1.21-22 ; 10.36-37). Ainsi délimitée, la période de Jésus apparaît comme « le centre du temps », le centre de l''histoire du salut.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Synoptiques, mais différents
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Même si le troisième évangile ressemble en bien des points à Matthieu et Marc, les deux autres évangiles synoptiques (voir « De l''Evangile aux quatre évangiles », p.${Xintev}), Luc utilise pourtant une tradition absente au moins de Marc. Sur les quelque 1150 versets de son évangile, plus de 400 figurent aussi chez Marc ; plus de 200 autres se retrouvent chez Matthieu, émanant peut-être d''une source commune (voir « Un document caché dans l''Evangile selon Luc ? », p.${Xdocluc}) ; mais près de 500 versets lui sont propres. On les trouve essentiellement dans les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: récits de l'enfance
    - type: text
      text: ' (1.5–2.52) et dans ce qu''on a coutume d''appeler '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: « la grande incise »
    - type: text
      text: ' (9.51–18.14 ; ainsi la parabole du bon Samaritain, 10.25-37 ; ou celle du fils perdu et retrouvé, 15.11-32).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'évangile de l'enfance
  - type: usfm
    marker: is2
    children:
    - type: text
      text: (1.5–2.52)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les récits des deux premiers chapitres de Luc diffèrent sensiblement de ceux de Matthieu 1–2. En une construction littéraire assez élaborée, Luc établit un parallèle entre Jean le Baptiseur et Jésus (voir ci-contre « Naissance et enfance selon Luc : Jean et Jésus »). Ces récits attestent la continuité du dessein de Dieu en ce qui concerne Jean le Baptiseur et Jésus. Mais ils font également apparaître la mission spécifique du Christ.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: La grande incise
  - type: usfm
    marker: is2
    children:
    - type: text
      text: (9.51–18.14)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On remarque déjà dans les récits de l''enfance l''intérêt que Luc porte à la ville sainte et au temple*. Au cœur de son évangile, il raconte le voyage de Jésus vers '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jérusalem
    - type: text
      text: '. N''en cherchons pas l''itinéraire précis. Seul le point d''aboutissement importe vraiment (9.51,53,57 ; 10.38 ; 13.22,33 ; 14.25 ; 17.11 ; 18.35 ; 19.1,11,28), car c''est là qu''aura lieu l''essentiel, le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: départ
    - type: text
      text: ' (en grec '
    - type: usfm
      marker: it
      children:
      - type: text
        text: exodos
    - type: text
      text: ) mentionné en 9.31. C'est dans cette longue montée vers Jérusalem que Luc regroupe la plupart des récits et paraboles qui lui sont propres (voir paragraphes suivants).
  - type: usfm
    marker: is2
    children:
    - type: text
      text: De Jérusalem vers toutes les nations
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Après la résurrection, le rendez-vous est fixé non en Galilée, mais à Jérusalem. Si l'Ascension est située vers Béthanie, c'est à Jérusalem que l'évangile s'achève, comme il y avait commencé (24.50-53).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Luc n'étant probablement pas d'origine juive, s'il insiste tant sur le judaïsme et sur Jérusalem, c'est qu'il y voit le point d'origine du salut pour tous les hommes (cf. Jn 4.22).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Dès le début, Syméon avait accueilli l'enfant Jésus comme le salut préparé par Dieu pour tous les peuples et la lumière pour éclairer les nations (2.30-32). De même la mission de Jean le Baptiseur devait permettre à tous de voir le salut de Dieu (3.6). De même encore, tout au long de son évangile, Luc a rendu compte des paroles et des situations qui annoncent clairement que la mission de Jésus, même si elle est limitée au territoire habité par les Juifs, concerne toutes les nations. C'est sans doute pour cette raison que l'Evangile selon Luc se poursuit en un deuxième tome, qui décrit l'arrivée du salut chez les autres peuples. Sa perspective est donc résolument universelle.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'évangile des méprisés
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Luc accorde un intérêt particulier à tous les méprisés. Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Samaritains
    - type: text
      text: '*, que les Juifs exécraient, sont mentionnés plus souvent que dans les autres évangiles. Ils sont même donnés en exemple. Ainsi, parmi les dix lépreux purifiés par Jésus, le seul qui revient exprimer sa reconnaissance est un Samaritain (17.11ss) ; ainsi encore, parmi tous ceux qui ont vu l''homme dévalisé et blessé sur le bord de la route, le seul à montrer de la compassion est le « Bon Samaritain » (10.30ss). Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: femmes
    - type: text
      text: ' occupent aussi une place importante dans le troisième évangile : certaines se signalent dans le groupe qui accompagne Jésus (8.2s), d''autres l''accueillent chez elles (10.38ss). Luc est encore le seul à montrer Jésus, en chemin vers le calvaire, attentif aux femmes de Jérusalem qui pleurent sur lui (23.27ss). Enfin les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: pauvres
    - type: text
      text: ', les petits, sont les premiers bénéficiaires des dires et des actes de Jésus. C''est ce qui a fait écrire à Dante que Luc est « l''évangile de la tendresse de Dieu ».'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: La théologie de Luc
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'De tous les auteurs du Nouveau Testament, c''est Luc qui parle le plus du '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: pardon
    - type: text
      text: ' de Dieu et de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: conversion
    - type: text
      text: '. La parabole du fils perdu et retrouvé, ou du « fils prodigue » (15.11ss), l''histoire de Zachée (19.1ss), celle du malfaiteur en croix aux côtés de Jésus (23.39ss), ne se trouvent que chez Luc, sans compter la célèbre prière du crucifié : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Père, pardonne-leur, car ils ne savent pas ce qu'ils font
    - type: text
      text: ' (23.34'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ). Le lecteur entend ainsi l'appel répété à recevoir le pardon et à se convertir. Par l'intermédiaire de Jean le Baptiseur, il découvre aussi les implications éthiques de la conversion (3.8ss).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tout comme celle de Jésus, la vie des disciples est marquée par la présence de
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'Esprit saint
    - type: text
      text: . C'est en effet par la puissance de l'Esprit que Jésus est conçu dans le sein de sa mère (1.35). C'est lui qui l'introduit dans son ministère et l'y consacre désormais (3.22 ; cf. Ac 10.38). L'Esprit le remplit et ne cesse de le conduire (4.1,14 ; 10.21). De la même manière, l'Esprit saint introduit les disciples dans leur mission. Répandu sur eux, il leur donne la capacité de proclamer l'Evangile. C'est lui qui les guide jusqu'aux extrémités de la terre.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'C''est aussi dans l''Evangile selon Luc qu''on voit le plus souvent Jésus en '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: prière
    - type: text
      text: '  : lors de son baptême (3.21) ; tout au long de sa mission (5.16) ; avant de choisir ses apôtres (6.12) ; au moment de révéler sa véritable identité (9.18) ; lors de la transfiguration (9.28s) ; sur la croix (23.34). L''importance de la prière est encore soulignée par les paraboles suivantes, propres à Luc : l''ami qui se laisse fléchir (11.5ss) ; la veuve et le mauvais juge (18.1ss) ; le pharisien et le collecteur des taxes (18.9ss).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Lire l''Evangile selon Luc, c''est finalement s''intéresser à la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: certitude des enseignements reçus
    - type: text
      text: ' (1.4). C''est chercher à vivre une vie renouvelée par l''Esprit. Cette présence divine est un don gratuit. Là où, dans l''Evangile selon Matthieu, Dieu donne '
    - type: usfm
      marker: it
      children:
      - type: text
        text: de bonnes choses
    - type: text
      text: ' à ceux qui les lui demandent (Mt 7.11), Luc assure de son côté que Dieu donnera l''Esprit (11.13).'
