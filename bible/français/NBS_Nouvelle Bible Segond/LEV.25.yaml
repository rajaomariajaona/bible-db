document_id: LEV.25,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'année sabbatique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au mont Sinaï, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la cinquantième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'année des cinquante années
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous proclamerez la libération
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 61.1 ; Jr 34.8,15,17 ; Ez 46.17 ; Lc 4.18-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jubilé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : transcription de l''hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: yovel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot signifie d''abord '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bélier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', puis '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: corne de bélier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il désigne ici l''année jubilaire annoncée par la sonnerie de la corne de bélier.'
      marker-yv: yv-n
    - type: text
      text: 'Vous consacrerez la cinquantième année et vous proclamerez la libération dans le pays, pour tous ses habitants ; ce sera pour vous le jubilé ; chacun de vous reviendra dans sa propriété, chacun de vous reviendra dans son clan. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La cinquantième année sera pour vous le jubilé : vous ne sèmerez pas, vous ne moissonnerez pas ce que les champs produiront d''eux-mêmes, et vous ne vendangerez pas la vigne non taillée ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: c'est le jubilé, il sera sacré pour vous. Vous mangerez le produit des champs.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En cette année de jubilé, chacun de vous reviendra dans sa propriété. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un compatriote
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton compatriote
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 15 ; cf. 18.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne fasse de tort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exploiter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 17 et en 19.33 ; Ex 22.20+.
      marker-yv: yv-n
    - type: text
      text: 'Si vous vendez quelque chose à un compatriote ou si vous achetez quelque chose à un compatriote, qu''aucun de vous ne fasse de tort à son frère. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tu achèteras à ton compatriote en comptant les années depuis le jubilé ; et il te vendra en comptant les années de récolte. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Plus il y aura d''années, plus tu élèveras le prix d''achat ; moins il y aura d''années, plus tu réduiras le prix d''achat : c''est le nombre des récoltes qu''il te vend. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Aucun de vous n''exploitera son compatriote : tu craindras ton Dieu ; je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes règles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 18.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mettez mes prescriptions en pratique, observez mes règles et mettez-les en pratique : vous habiterez en sécurité dans le pays. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la terre.
      marker-yv: yv-n
    - type: text
      text: 'Le pays donnera son fruit, vous mangerez à satiété, et vous y habiterez en sécurité. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quand vous serez entrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.34+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent un même mot hébreu ; de même dans la suite ; cf. 26.34s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fera '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se reposera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : verbe apparenté au mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 23.10s.'
      marker-yv: yv-n
    - type: text
      text: 'Parle aux Israélites ; tu leur diras : Quand vous serez entrés dans le pays que je vous donne, la terre fera sabbat ; ce sera un sabbat pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.53 : « Il n''y avait pas de provisions dans les dépôts, car c''était la septième année et les Israélites ramenés en Judée du milieu des païens avaient consommé les dernières réserves. »'
      marker-yv: yv-n
    - type: text
      text: 'Si vous dites : « Que mangerons-nous la septième année, puisque nous ne sèmerons rien et que nous ne récolterons rien ? » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je vous assignerai ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ordonnerai que ma bénédiction soit sur vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 28.8 ; Ps 133.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour trois ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. suffisante même lorsque l''année sabbatique est suivie de l''année du jubilé (v. 11).'
      marker-yv: yv-n
    - type: text
      text: '– je vous assignerai ma bénédiction la sixième année, et elle produira une récolte pour trois ans. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 26.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la récolte de la neuvième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa récolte.
      marker-yv: yv-n
    - type: text
      text: Vous sèmerez la huitième année, et vous mangerez de l'ancienne récolte jusqu'à la neuvième année ; jusqu'à ce que la récolte de la neuvième année soit arrivée, vous mangerez de l'ancienne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le droit de rédemption
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 55 ; Ps 39.13 ; 1P 1.1 ; 2.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent un même mot hébreu.
      marker-yv: yv-n
    - type: text
      text: 'La terre ne se vendra pas à titre définitif : le pays m''appartient, et vous êtes chez moi des immigrés et des résidents temporaires. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'droit de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: rédemption
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de rachat, de reprise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss,48ss ; 27.13ss ; cf. Ex 6.6+.
      marker-yv: yv-n
    - type: text
      text: Dans tout le pays qui est votre propriété, vous accorderez un droit de rédemption pour la terre.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 48s ; Jr 32.6-15 ; Rt 4.1-12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reprendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: racheter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le terme est apparenté à celui qui est traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rédempteur.
      marker-yv: yv-n
    - type: text
      text: 'Si ton frère devient pauvre et doit vendre une portion de sa propriété, son rédempteur, son parent proche, pourra venir reprendre ce que son frère a vendu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Si un homme n''a pas de rédempteur, et qu''il se procure lui-même les ressources nécessaires à sa rédemption, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'acquéreur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'homme à qui il a vendu.
      marker-yv: yv-n
    - type: text
      text: 'il comptera les années depuis la vente, restituera l''excédent à l''acquéreur et reviendra dans sa propriété. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sera dégagé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sortira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 30s.'
      marker-yv: yv-n
    - type: text
      text: 'S''il ne trouve pas de quoi lui faire cette restitution, ce qu''il a vendu restera entre les mains de l''acheteur jusqu''à l''année du jubilé et sera dégagé au jubilé ; alors il reviendra dans sa propriété. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entourée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. – Les maisons des villes fortifiées n''étaient pas liées à une terre cultivable ; elles ne sont pas considérées comme un moyen de subsistance (cf. v. 31).'
      marker-yv: yv-n
    - type: text
      text: 'Si un homme vend une maison d''habitation dans une ville entourée de murs, il aura un droit de rédemption jusqu''à l''accomplissement d''une année depuis la vente ; son droit de rédemption durera un an. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Pendant six années tu ensemenceras ton champ, pendant six années tu tailleras ta vigne et tu en récolteras le produit. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et à ses descendants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou, selon la traduction habituelle de la même formule, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour toutes ses '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 3.17 ; 6.11 ; 7.36 etc.).
      marker-yv: yv-n
    - type: text
      text: 'Si cette maison située dans une ville pourvue de murs n''est pas reprise avant l''accomplissement d''une année entière, elle restera à titre définitif à l''acheteur et à ses descendants ; elle ne sera pas dégagée au jubilé. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Les maisons des villages non pourvus de murs seront considérées comme des fonds de terre ; elles pourront être reprises, et elles seront dégagées au jubilé. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Nb 35.1-8 ; Jos 21.1-42 ; Ez 48.13s ; 1Ch 6.39-66.
      marker-yv: yv-n
    - type: text
      text: 'Quant aux villes des lévites et aux maisons des villes qui sont leur propriété, les lévites auront un droit perpétuel de rédemption. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Texte difficile, diversement interprété. On pourrait aussi comprendre, entre autres possibilités
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si quelqu''un rachète '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: reprend
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux lévites, il sortira de la maison vendue et de la ville de sa propriété au jubilé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains, d''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ', modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si un lévite ne reprend pas sa maison, vendue dans la ville de sa propriété, elle lui reviendra au jubilé.
      marker-yv: yv-n
    - type: text
      text: 'Si c''est un autre lévite qui assure la rédemption, la vente de la propriété – maison ou ville – sera résiliée au jubilé : les maisons des villes des lévites sont leur propriété au milieu des Israélites. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Les champs situés dans les abords de leurs villes ne pourront pas se vendre : ils en ont la propriété perpétuelle.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez toi et que les ressources lui manquent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et que sa main tremble '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vacille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'il ne puisse plus te payer ce qu'il te doit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Dt 15.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un immigré ou un résident temporaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.33s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Si ton frère devient pauvre chez toi et que les ressources lui manquent, tu le soutiendras, même si c''est un immigré ou un résident temporaire, afin qu''il puisse vivre chez toi. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'intérêt '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les deux termes correspondants sont pratiquement équivalents ; le premier, qui vient d''une racine signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mordre, rogner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', pourrait évoquer étymologiquement la compensation d''un tort subi par le prêteur ; le second, qui vient d''une racine signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: accroître, multiplier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', désignerait plus directement son profit ; Ex 22.24 ; Dt 23.20s ; Ez 22.12. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne tireras de lui ni intérêt ni rente : tu craindras ton Dieu, et ton frère vivra chez toi. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prêteras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donneras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent le même verbe hébreu.
      marker-yv: yv-n
    - type: text
      text: 'Tu ne lui prêteras pas ton argent à intérêt, et tu ne lui donneras pas ta nourriture contre une rente. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.38 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'être votre Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.45+.
      marker-yv: yv-n
    - type: text
      text: 'Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), ton Dieu ; c''est moi qui vous ai fait sortir d''Egypte pour vous donner Canaan, pour être votre Dieu.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 21.2-6 ; Dt 15.12-18 ; Jr 34.8-16 ; cf. Jn 8.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: imposeras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travail '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esclave '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent des termes apparentés en hébreu ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne le réduiras pas à un statut d'esclave.
      marker-yv: yv-n
    - type: text
      text: 'Si ton frère devient pauvre chez toi et qu''il se vende à toi, tu ne lui imposeras pas le travail d''un esclave. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: septième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir aussi Dt 15.1 ; Né 10.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un sabbat, un repos sabbatique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shabbath shabbatôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 16.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais la septième année il y aura un sabbat, un repos sabbatique pour la terre, un sabbat pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : tu n''ensemenceras pas ton champ et tu ne tailleras pas ta vigne. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Il sera chez toi comme un salarié, comme un résident temporaire ; il sera à ton service jusqu''à l''année du jubilé. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Il sortira alors de chez toi, lui et ses fils avec lui, et il reviendra dans son clan, dans la propriété de ses pères. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esclaves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent un même mot hébreu, de même au v. 55 ; cf. v. 44
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '– Car ce sont mes serviteurs, je les ai fait sortir d''Egypte ; on ne les vendra pas comme on vend des esclaves. – '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ep 6.9 ; Col 4.1.
      marker-yv: yv-n
    - type: text
      text: 'Tu ne domineras pas sur lui avec rudesse : tu craindras ton Dieu. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ton esclave et ta servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton esclave, homme ou femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 12.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 20.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui t'appartiennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux que tu auras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit ici d''esclaves au sens propre du terme (cf. v. 42'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ton esclave et ta servante, ceux qui t''appartiennent, c''est aux nations qui vous entourent que vous pourrez les acheter, l''esclave et la servante. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Vous pourrez aussi les acheter aux fils des résidents temporaires qui séjournent en immigrés chez vous, et à leurs clans qui sont chez vous, les clans qu''ils ont engendrés dans votre pays ; ceux-là seront votre propriété. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Vous les laisserez comme patrimoine à vos fils après vous, comme une propriété dont ils hériteront ; vous les garderez comme esclaves à perpétuité. Mais pour ce qui est de vos frères, les Israélites, aucun de vous ne dominera avec rudesse sur son frère.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 28.43s.
      marker-yv: yv-n
    - type: text
      text: 'Si un immigré ou un résident temporaire chez toi a des ressources et que ton frère devienne pauvre chez lui et se vende à l''immigré, au résident temporaire qui est chez toi ou à quelqu''un du clan de l''immigré, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Né 5.8. – Les degrés de parenté sont sans doute énumérés ici et au v. 49 dans l'ordre de priorité pour la rédemption (cf. Rt 3.12 ; 4.4).
      marker-yv: yv-n
    - type: text
      text: 'il y aura pour lui un droit de rédemption après qu''il se sera vendu : un de ses frères pourra assurer sa rédemption. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Son oncle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu désigne l''oncle paternel. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'un de ses proches parents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du corps de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: ' de son clan'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 18.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir Nb 27.8-11.'
      marker-yv: yv-n
    - type: text
      text: 'Son oncle, ou le fils de son oncle, ou l''un de ses proches parents, pourra aussi assurer sa rédemption ; ou bien, s''il a les ressources nécessaires, il pourra assurer lui-même sa rédemption. '
  '5':
  - type: usfm
    marker: p
    children:
