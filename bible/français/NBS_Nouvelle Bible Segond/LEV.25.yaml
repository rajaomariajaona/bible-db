document_id: LEV.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'année sabbatique
  - type: text
    content: 'Au mont Sinaï, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'la cinquantième année  : litt. l''année des cinquante années. –  vous proclamerez la libération  : cf. Es 61.1 ; Jr 34.8,15,17 ; Ez 46.17 ; Lc 4.18-21. –  jubilé  : transcription de l''hébreu yovel  ; le mot signifie d''abord bélier, puis corne de bélier  ; il désigne ici l''année jubilaire annoncée par la sonnerie de la corne de bélier.'
  - type: text
    content: 'Vous consacrerez la cinquantième année et vous proclamerez la libération dans le pays, pour tous ses habitants ; ce sera pour vous le jubilé ; chacun de vous reviendra dans sa propriété, chacun de vous reviendra dans son clan. '
  '11':
  - type: text
    content: 'La cinquantième année sera pour vous le jubilé : vous ne sèmerez pas, vous ne moissonnerez pas ce que les champs produiront d''eux-mêmes, et vous ne vendangerez pas la vigne non taillée ; '
  '12':
  - type: note
    content: 'sacré  : voir saint.'
  - type: text
    content: c'est le jubilé, il sera sacré pour vous. Vous mangerez le produit des champs.
  '13':
  - type: text
    content: 'En cette année de jubilé, chacun de vous reviendra dans sa propriété. '
  '14':
  - type: note
    content: 'un compatriote  : litt. ton compatriote, comme au v. 15 ; cf. 18.20n. –  ne fasse de tort  : le même verbe est traduit par exploiter au v. 17 et en 19.33 ; Ex 22.20+.'
  - type: text
    content: 'Si vous vendez quelque chose à un compatriote ou si vous achetez quelque chose à un compatriote, qu''aucun de vous ne fasse de tort à son frère. '
  '15':
  - type: text
    content: 'Tu achèteras à ton compatriote en comptant les années depuis le jubilé ; et il te vendra en comptant les années de récolte. '
  '16':
  - type: text
    content: 'Plus il y aura d''années, plus tu élèveras le prix d''achat ; moins il y aura d''années, plus tu réduiras le prix d''achat : c''est le nombre des récoltes qu''il te vend. '
  '17':
  - type: note
    content: 'Voir crainte. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Aucun de vous n''exploitera son compatriote : tu craindras ton Dieu ; je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'mes règles  : cf. 18.4n  ; voir loi.'
  - type: text
    content: 'Mettez mes prescriptions en pratique, observez mes règles et mettez-les en pratique : vous habiterez en sécurité dans le pays. '
  '19':
  - type: note
    content: 'Le pays  : autre traduction la terre.'
  - type: text
    content: 'Le pays donnera son fruit, vous mangerez à satiété, et vous y habiterez en sécurité. '
  '2':
  - type: note
    content: 'Quand vous serez entrés 14.34+. –  pays et terre traduisent un même mot hébreu ; de même dans la suite ; cf. 26.34s. –  fera sabbat ou se reposera  : verbe apparenté au mot sabbat  ; cf. Ex 23.10s.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Quand vous serez entrés dans le pays que je vous donne, la terre fera sabbat ; ce sera un sabbat pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: note
    content: 'Cf. 1 Maccabées 6.53 : « Il n''y avait pas de provisions dans les dépôts, car c''était la septième année et les Israélites ramenés en Judée du milieu des païens avaient consommé les dernières réserves. »'
  - type: text
    content: 'Si vous dites : « Que mangerons-nous la septième année, puisque nous ne sèmerons rien et que nous ne récolterons rien ? » '
  '21':
  - type: note
    content: 'je vous assignerai ma bénédiction  : autre traduction j''ordonnerai que ma bénédiction soit sur vous  ; cf. Dt 28.8 ; Ps 133.3. –  pour trois ans  : c.-à-d. suffisante même lorsque l''année sabbatique est suivie de l''année du jubilé (v. 11).'
  - type: text
    content: '– je vous assignerai ma bénédiction la sixième année, et elle produira une récolte pour trois ans. '
  '22':
  - type: note
    content: 'Cf. 26.10. –  la récolte de la neuvième année  : litt. sa récolte.'
  - type: text
    content: Vous sèmerez la huitième année, et vous mangerez de l'ancienne récolte jusqu'à la neuvième année ; jusqu'à ce que la récolte de la neuvième année soit arrivée, vous mangerez de l'ancienne.
  - type: heading
    content: Le droit de rédemption
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 55 ; Ps 39.13 ; 1P 1.1 ; 2.11. –  terre et pays traduisent un même mot hébreu.
  - type: text
    content: 'La terre ne se vendra pas à titre définitif : le pays m''appartient, et vous êtes chez moi des immigrés et des résidents temporaires. '
  '24':
  - type: note
    content: droit de rédemption ou de rachat, de reprise  ; cf. v. 25nss,48ss ; 27.13ss ; cf. Ex 6.6+.
  - type: text
    content: Dans tout le pays qui est votre propriété, vous accorderez un droit de rédemption pour la terre.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 48s ; Jr 32.6-15 ; Rt 4.1-12. –  reprendre ou racheter  ; le terme est apparenté à celui qui est traduit par rédempteur.
  - type: text
    content: 'Si ton frère devient pauvre et doit vendre une portion de sa propriété, son rédempteur, son parent proche, pourra venir reprendre ce que son frère a vendu. '
  '26':
  - type: text
    content: 'Si un homme n''a pas de rédempteur, et qu''il se procure lui-même les ressources nécessaires à sa rédemption, '
  '27':
  - type: note
    content: 'l''acquéreur  : litt. l''homme à qui il a vendu.'
  - type: text
    content: 'il comptera les années depuis la vente, restituera l''excédent à l''acquéreur et reviendra dans sa propriété. '
  '28':
  - type: note
    content: 'sera dégagé  : litt. sortira, de même aux v. 30s.'
  - type: text
    content: 'S''il ne trouve pas de quoi lui faire cette restitution, ce qu''il a vendu restera entre les mains de l''acheteur jusqu''à l''année du jubilé et sera dégagé au jubilé ; alors il reviendra dans sa propriété. '
  '29':
  - type: note
    content: 'entourée  : sous-entendu dans le texte. – Les maisons des villes fortifiées n''étaient pas liées à une terre cultivable ; elles ne sont pas considérées comme un moyen de subsistance (cf. v. 31).'
  - type: text
    content: 'Si un homme vend une maison d''habitation dans une ville entourée de murs, il aura un droit de rédemption jusqu''à l''accomplissement d''une année depuis la vente ; son droit de rédemption durera un an. '
  '3':
  - type: text
    content: 'Pendant six années tu ensemenceras ton champ, pendant six années tu tailleras ta vigne et tu en récolteras le produit. '
  '30':
  - type: note
    content: 'et à ses descendants  : ou, selon la traduction habituelle de la même formule, pour toutes ses générations (cf. 3.17 ; 6.11 ; 7.36 etc.).'
  - type: text
    content: 'Si cette maison située dans une ville pourvue de murs n''est pas reprise avant l''accomplissement d''une année entière, elle restera à titre définitif à l''acheteur et à ses descendants ; elle ne sera pas dégagée au jubilé. '
  '31':
  - type: text
    content: 'Les maisons des villages non pourvus de murs seront considérées comme des fonds de terre ; elles pourront être reprises, et elles seront dégagées au jubilé. '
  '32':
  - type: note
    content: Cf. Nb 35.1-8 ; Jos 21.1-42 ; Ez 48.13s ; 1Ch 6.39-66.
  - type: text
    content: 'Quant aux villes des lévites et aux maisons des villes qui sont leur propriété, les lévites auront un droit perpétuel de rédemption. '
  '33':
  - type: note
    content: 'Texte difficile, diversement interprété. On pourrait aussi comprendre, entre autres possibilités  : si quelqu''un rachète (ou reprend, cf. v. 25n) aux lévites, il sortira de la maison vendue et de la ville de sa propriété au jubilé  ; certains, d''après Vg, modifient le texte hébreu traditionnel pour lire si un lévite ne reprend pas sa maison, vendue dans la ville de sa propriété, elle lui reviendra au jubilé.'
  - type: text
    content: 'Si c''est un autre lévite qui assure la rédemption, la vente de la propriété – maison ou ville – sera résiliée au jubilé : les maisons des villes des lévites sont leur propriété au milieu des Israélites. '
  '34':
  - type: text
    content: 'Les champs situés dans les abords de leurs villes ne pourront pas se vendre : ils en ont la propriété perpétuelle.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'chez toi et que les ressources lui manquent  : litt. et que sa main tremble (ou vacille ) avec toi , ce qui pourrait aussi signifier qu''il ne puisse plus te payer ce qu''il te doit  ; cf. Dt 15.7s. –  un immigré ou un résident temporaire  : cf. 19.33s. –  chez toi  : autre traduction avec toi , de même dans la suite.'
  - type: text
    content: 'Si ton frère devient pauvre chez toi et que les ressources lui manquent, tu le soutiendras, même si c''est un immigré ou un résident temporaire, afin qu''il puisse vivre chez toi. '
  '36':
  - type: note
    content: 'intérêt / rente  : les deux termes correspondants sont pratiquement équivalents ; le premier, qui vient d''une racine signifiant mordre, rogner, pourrait évoquer étymologiquement la compensation d''un tort subi par le prêteur ; le second, qui vient d''une racine signifiant accroître, multiplier, désignerait plus directement son profit ; Ex 22.24 ; Dt 23.20s ; Ez 22.12. – Voir crainte.'
  - type: text
    content: 'Tu ne tireras de lui ni intérêt ni rente : tu craindras ton Dieu, et ton frère vivra chez toi. '
  '37':
  - type: note
    content: prêteras et donneras traduisent le même verbe hébreu.
  - type: text
    content: 'Tu ne lui prêteras pas ton argent à intérêt, et tu ne lui donneras pas ta nourriture contre une rente. '
  '38':
  - type: note
    content: 'Seigneur (YHWH)  : voir noms divins. –  être votre Dieu 11.45+.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu ; c''est moi qui vous ai fait sortir d''Egypte pour vous donner Canaan, pour être votre Dieu.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 21.2-6 ; Dt 15.12-18 ; Jr 34.8-16 ; cf. Jn 8.33. –  imposeras , travail et esclave traduisent des termes apparentés en hébreu ; on pourrait aussi comprendre tu ne le réduiras pas à un statut d'esclave.
  - type: text
    content: 'Si ton frère devient pauvre chez toi et qu''il se vende à toi, tu ne lui imposeras pas le travail d''un esclave. '
  '4':
  - type: note
    content: 'septième année  : voir aussi Dt 15.1 ; Né 10.32. –  un sabbat, un repos sabbatique  : hébreu shabbath shabbatôn, cf. 16.31n.'
  - type: text
    content: 'Mais la septième année il y aura un sabbat, un repos sabbatique pour la terre, un sabbat pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : tu n''ensemenceras pas ton champ et tu ne tailleras pas ta vigne. '
  '40':
  - type: text
    content: 'Il sera chez toi comme un salarié, comme un résident temporaire ; il sera à ton service jusqu''à l''année du jubilé. '
  '41':
  - type: text
    content: 'Il sortira alors de chez toi, lui et ses fils avec lui, et il reviendra dans son clan, dans la propriété de ses pères. '
  '42':
  - type: note
    content: serviteurs et esclaves traduisent un même mot hébreu, de même au v. 55 ; cf. v. 44n.
  - type: text
    content: '– Car ce sont mes serviteurs, je les ai fait sortir d''Egypte ; on ne les vendra pas comme on vend des esclaves. – '
  '43':
  - type: note
    content: Cf. Ep 6.9 ; Col 4.1.
  - type: text
    content: 'Tu ne domineras pas sur lui avec rudesse : tu craindras ton Dieu. '
  '44':
  - type: note
    content: 'Ton esclave et ta servante  : autre traduction ton esclave, homme ou femme  ; cf. Gn 12.16n  ; Ex 20.10n  ; 21.7n. –  ceux qui t''appartiennent  : autre traduction ceux que tu auras  ; il s''agit ici d''esclaves au sens propre du terme (cf. v. 42n).'
  - type: text
    content: 'Ton esclave et ta servante, ceux qui t''appartiennent, c''est aux nations qui vous entourent que vous pourrez les acheter, l''esclave et la servante. '
  '45':
  - type: text
    content: 'Vous pourrez aussi les acheter aux fils des résidents temporaires qui séjournent en immigrés chez vous, et à leurs clans qui sont chez vous, les clans qu''ils ont engendrés dans votre pays ; ceux-là seront votre propriété. '
  '46':
  - type: text
    content: Vous les laisserez comme patrimoine à vos fils après vous, comme une propriété dont ils hériteront ; vous les garderez comme esclaves à perpétuité. Mais pour ce qui est de vos frères, les Israélites, aucun de vous ne dominera avec rudesse sur son frère.
  '47':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 28.43s.
  - type: text
    content: 'Si un immigré ou un résident temporaire chez toi a des ressources et que ton frère devienne pauvre chez lui et se vende à l''immigré, au résident temporaire qui est chez toi ou à quelqu''un du clan de l''immigré, '
  '48':
  - type: note
    content: Cf. Né 5.8. – Les degrés de parenté sont sans doute énumérés ici et au v. 49 dans l'ordre de priorité pour la rédemption (cf. Rt 3.12 ; 4.4).
  - type: text
    content: 'il y aura pour lui un droit de rédemption après qu''il se sera vendu : un de ses frères pourra assurer sa rédemption. '
  '49':
  - type: note
    content: 'Son oncle  : le mot hébreu désigne l''oncle paternel. –  l''un de ses proches parents  : litt. du corps de la chair de son clan, cf. 18.6n  ; voir Nb 27.8-11.'
  - type: text
    content: 'Son oncle, ou le fils de son oncle, ou l''un de ses proches parents, pourra aussi assurer sa rédemption ; ou bien, s''il a les ressources nécessaires, il pourra assurer lui-même sa rédemption. '
  '5':
  - type: note
    content: 'vigne non taillée  : le même mot désigne le nazir qui ne se coupait pas les cheveux, cf. Nb 6.5 ; de même au v. 11. –  année sabbatique ou année de repos sabbatique, cf. 16.31n.'
  - type: text
    content: 'Tu ne moissonneras pas ce qui provient des grains tombés de ta moisson, et tu ne vendangeras pas les raisins de ta vigne non taillée : ce sera une année sabbatique pour la terre. '
  '50':
  - type: note
    content: 'le prix à payer  : litt. l''argent de son prix.'
  - type: text
    content: 'Il comptera avec son acheteur depuis l''année où il s''est vendu jusqu''à l''année du jubilé ; le prix à payer dépendra du nombre d''années ; elles seront évaluées comme celles d''un salarié. '
  '51':
  - type: text
    content: 'S''il y a encore beaucoup d''années, il remboursera pour sa rédemption une part proportionnelle de l''argent versé lors de son achat ; '
  '52':
  - type: text
    content: 's''il reste peu d''années jusqu''à l''année du jubilé, il en fera le compte et remboursera pour sa rédemption une part proportionnelle à ces années. '
  '53':
  - type: note
    content: 'chez son maître  : litt. avec lui.'
  - type: text
    content: 'Il sera comme un salarié à l''année chez son maître ; celui-ci ne dominera pas sur lui avec rudesse sous tes yeux. '
  '54':
  - type: text
    content: Si sa rédemption n'est assurée d'aucune de ces manières, il sortira l'année du jubilé, lui et ses fils avec lui.
  - type: heading
    content: Je suis le Seigneur (YHWH), votre Dieu
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'de moi  : autre traduction pour moi . –  esclaves / serviteurs  : voir v. 42n  ; cf. v. 23 ; voir aussi 26.13.'
  - type: text
    content: 'Car c''est de moi que les Israélites sont esclaves ; ce sont mes serviteurs, je les ai fait sortir d''Egypte. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '6':
  - type: note
    content: 'Le sabbat de la terre…  : il faut sans doute comprendre vous vous nourrirez de ce qui poussera tout seul (cf. v. 7). –  au salarié et au résident temporaire  : litt. à ton salarié et à ton résident temporaire. –  séjournent en immigrés  : cf. Ex 12.48n.'
  - type: text
    content: 'Le sabbat de la terre sera votre nourriture, à toi, à ton serviteur, à ta servante, au salarié et au résident temporaire qui séjournent en immigrés chez toi, '
  '7':
  - type: note
    content: 'aux animaux  : peut-être les animaux sauvages, par opposition à tes bêtes (ou ton bétail), cf. 5.2n  ; 26.22 ; Gn 7.21n.'
  - type: text
    content: à tes bêtes et aux animaux qui sont dans ton pays ; tout son produit servira de nourriture.
  - type: heading
    content: L'année du jubilé
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'sept sabbats d''années  : cf. Dn 9.25. –  la durée  : litt. les jours . –  sera  : litt. sera pour toi.'
  - type: text
    content: 'Tu compteras sept sabbats d''années, sept fois sept ans ; la durée de ces sept sabbats d''années sera de quarante-neuf ans. '
  '9':
  - type: note
    content: 'Cf. 16.29-31 ; 23.26-32. –  la trompe de l''acclamation  : cf. 23.24n  ; voir Nb 10.5n  ; 31.6 ; Jos 6.5,20 ; 1S 4.5s ; 2S 6.15. –  jour de l''Expiation  : voir calendrier et fêtes.'
  - type: text
    content: 'Le dixième jour du septième mois, tu feras retentir la trompe de l''acclamation : le jour de l''Expiation, vous ferez retentir la trompe dans tout votre pays. '
