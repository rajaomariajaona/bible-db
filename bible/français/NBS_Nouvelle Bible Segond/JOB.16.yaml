document_id: JOB.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : j''ai un témoin dans le ciel'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pour m''outrager  : autre traduction pour me déshonorer.'
  - type: text
    content: Ils ouvrent toute grande leur bouche contre moi ;
  - type: text
    content: pour m'outrager, ils me frappent les joues,
  - type: text
    content: ils s'attroupent tous contre moi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'livre Dt 23.16n. –  d''un gamin  : cf. 19.18 (autre mot hébreu) ; 30.1 ; des versions anciennes ont lu de l''injuste , ce qui correspondrait à une légère variante de l''hébreu. Cf. 30.9-14 ; Ps 22.13-19. –  il me jette…  : autre traduction il me serre dans les mains des méchants.'
  - type: text
    content: Dieu me livre à la merci d'un gamin,
  - type: text
    content: il me jette aux mains des méchants.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.20 (autre mot hébreu pour cible ).
  - type: text
    content: J'étais tranquille, et il m'a secoué,
  - type: text
    content: il m'a saisi par la nuque et m'a brisé.
  - type: text
    content: Il m'a redressé pour lui servir de cible.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'projectiles  : cf. 6.4+. –  transperce / répand  : cf. 30.16 ; 34.6. –  les profondeurs de mon être  : litt. mes reins , cf. 19.27n. –  il n''épargne rien  : même expression en 6.10 ; 27.22 ; le verbe correspondant est traduit par conserver en 20.13.'
  - type: text
    content: Ses projectiles m'atteignent de toutes parts ;
  - type: text
    content: il transperce les profondeurs de mon être,
  - type: text
    content: il n'épargne rien,
  - type: text
    content: il répand ma bile sur la terre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 10.17+.
  - type: text
    content: Il a ouvert en moi brèche sur brèche,
  - type: text
    content: il court sur moi comme un guerrier.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ma corne  : l''image évoque habituellement la puissance ou la fierté ; cf. 1S 2.1n  ; Ps 75.5s. Sur les signes de deuil, de tristesse ou de pénitence, voir 1.20+.'
  - type: text
    content: J'ai cousu un sac sur ma peau ;
  - type: text
    content: j'ai plongé ma corne dans la poussière.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'assombri  : autre traduction rougi. –  pleurs  : cf. v. 20. –  une ombre de mort 3.5n.'
  - type: text
    content: Mon visage est assombri par mes pleurs ;
  - type: text
    content: une ombre de mort est sur mes paupières.
  '17':
  - type: text
    content: ' '
  - type: note
    content: violence / mains 1Ch 12.18 ; cf. Es 59.6 ; Jon 3.8. –  pure ou sans reproche  ; 8.6+ ; 11.4 ; cf. 31.1-34 ; Ps 141.2 ; 1Tm 2.8.
  - type: text
    content: Il n'y a pourtant pas de violence dans mes mains,
  - type: text
    content: et ma prière est pure.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ne recouvre pas mon sang (pour l''empêcher de crier vengeance) : cf. Gn 4.10+ ; Es 26.21 ; Ez 24.7s ; Ps 9.13 ; Ap 18.24. –  Que mes cris…  : litt. qu''il n''y ait pas de lieu pour mon cri , c.-à-d. pas de limite au-delà de laquelle il ne puisse être entendu.'
  - type: text
    content: Terre, ne recouvre pas mon sang !
  - type: text
    content: Que mes cris prennent librement leur essor !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'répondant  : hébreu sahed , correspondant au mot araméen qui signifie témoin (cf. Gn 31.47n). –  dans les hauteurs  : cf. Ps 148.1 ; Mc 11.10.'
  - type: text
    content: Dès maintenant, j'ai un témoin dans le ciel,
  - type: text
    content: j'ai un répondant dans les hauteurs.
  '2':
  - type: text
    content: ' '
  - type: note
    content: consolateurs 15.11+.
  - type: text
    content: J'ai entendu beaucoup de choses semblables ;
  - type: text
    content: vous êtes tous de pénibles consolateurs.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Mes amis me traitent avec insolence  : certains modifient légèrement le texte hébreu pour lire un autre (qui soit mon) interprète ou mon intercesseur (cf. 33.23n  ; voir aussi Jn 14.16n), expression qu''ils rattachent au v. 19 ; LXX ma supplication monte vers le Seigneur. –  c''est Dieu…  : litt. vers Dieu a coulé mon œil (16.16). Cf. Ex 3.7 ; Ps 79.11 ; 88.3 ; 102.2 ; Lm 3.44 ; Ap 8.3s.'
  - type: text
    content: Mes amis me traitent avec insolence ;
  - type: text
    content: c'est Dieu que j'implore par mes larmes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'l''arbitre  : cf. 9.33n  ; 14.15n  ; voir aussi 19.25n  ; 33.23s. –  être humain  : litt. fils d''homme  ; cf. 25.6 ; Ps 62.10n.'
  - type: text
    content: Puisse-t-il être l'arbitre entre l'homme et Dieu,
  - type: text
    content: entre l'être humain et son compagnon !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'le nombre…  : litt. les années du nombre arrivent . –  d''où je ne reviendrai pas 7.9+.'
  - type: text
    content: Car le nombre de mes années arrive à son terme,
  - type: text
    content: et je m'en irai par un sentier d'où je ne reviendrai pas.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 15.2+.
  - type: text
    content: Y aura-t-il une fin à ces paroles qui ne sont que du vent ?
  - type: text
    content: Qu'est-ce qui t'irrite lorsque tu réponds ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'si vous étiez à ma place  : litt. s''il y avait votre vie à la place de ma vie ou votre être à la place de mon être , voir Gn 1.20n. –  pour vous  : autre traduction contre vous . –  je hocherais la tête  : geste de mépris ou de consolation.'
  - type: text
    content: Moi aussi, je pourrais parler comme vous,
  - type: text
    content: 'si vous étiez à ma place :'
  - type: text
    content: je rassemblerais des propos pour vous,
  - type: text
    content: je hocherais la tête sur vous.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'le mouvement… vous soulagerait (cf. Pr 12.25) : LXX je ne retiendrais pas le mouvement de mes lèvres.'
  - type: text
    content: Je vous encouragerais par ma bouche,
  - type: text
    content: le mouvement de mes lèvres vous soulagerait.
  '6':
  - type: text
    content: Si je parle, ma souffrance n'est pas soulagée ;
  - type: text
    content: si je cesse de parler, comment s'en irait-elle loin de moi ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'communauté  : cf. 15.34n. Les v. 7s sont difficiles et donnent lieu à de nombreuses variantes dans les versions anciennes. LXX maintenant il m''a fatigué, il m''a rendu fou, il m''a laissé pourrir.'
  - type: text
    content: Maintenant, hélas ! il m'a épuisé…
  - type: text
    content: Tu as semé la dévastation dans toute ma communauté.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '19.20 ; 33.21. –  qui témoignent contre moi…  : LXX mon mensonge devient un témoin contre moi, il se dresse contre moi et m''accuse en face.'
  - type: text
    content: Tu m'as creusé des rides qui témoignent contre moi,
  - type: text
    content: ma maigreur se lève et m'accuse en face.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '10.16. –  me déchire  : le verbe est souvent traduit par déchiqueter , en parlant d''un animal féroce ; terme apparenté en 4.11 ( proie ) ; 24.5 ( de quoi manger ) ; 29.17 ; 38.39 ; cf. 18.4.'
  - type: text
    content: Sa colère me déchire et s'attaque à moi,
  - type: text
    content: il grince des dents contre moi.
  - type: text
    content: Mon adversaire aiguise ses regards sur moi.
