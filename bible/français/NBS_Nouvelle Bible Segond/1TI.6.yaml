    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', représentait un idéal de la philosophie grecque ; cf. Ph 4.11s.'
    marker-yv: yv-n
  - type: text
    text: Certes, c'est une grande source de profit que la piété, si l'on se contente de ce qu'on a.
