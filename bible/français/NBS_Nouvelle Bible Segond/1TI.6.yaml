      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.1s : « Beaucoup ont péché par amour du gain, et celui qui cherche à s''enrichir détourne son regard. Comme un piquet s''enfonce dans la jointure des pierres, entre vente et achat s''intercale le péché. » 31.5ss : « Celui qui aime l''or ne saurait rester juste et celui qui poursuit le gain se laissera fourvoyer par lui. Beaucoup ont été livrés à la ruine à cause de l''or et leur perte est arrivée sur eux. C''est un piège pour ceux qui en sont entichés et tous les insensés s''y laissent attraper. » –  '
