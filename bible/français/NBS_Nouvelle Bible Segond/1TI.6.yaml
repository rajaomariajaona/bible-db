      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2P 1.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aveuglé par l''orgueil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Co 8.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne sait rien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.7 ; cf. 1Co 2.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maladie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'saines paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'débats '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: querelles de mots
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2Tm 2.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''envie… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 1.29+ ; Ga 5.20s.
    marker-yv: yv-n
  - type: text
    text: 'il est aveuglé par l''orgueil, il ne sait rien ; il a la maladie des débats et des querelles de mots. De là naissent l''envie, les disputes, les calomnies, les mauvais soupçons, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les contestations interminables
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon certains, le terme grec évoquerait une maladie contagieuse (cf. v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pervertie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: corrompue, pourrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme évoque habituellement ce qui est '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'périssable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(il s''oppose à l''adjectif traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'impérissable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1.17) ; terme apparenté en 2Tm 3.8 ; cf. Rm 1.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: privés de la vérité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.4 ; 2Tm 3.7 ; 4.4 ; Tt 1.14 ; 3.11 ; voir aussi Jn 8.45 ; 2Co 4.4 ; 2Th 2.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: source de profit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; Mt 10.8 ; 1Th 2.5 ; Tt 1.11.
    marker-yv: yv-n
  - type: text
    text: les contestations interminables de gens à l'intelligence pervertie, privés de la vérité, qui considèrent la piété comme une source de profit.
