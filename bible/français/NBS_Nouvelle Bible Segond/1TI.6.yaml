      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'propage d''autres enseignements '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne suit pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne vient pas vers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'entre pas dans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.4 ; Hé 4.16 ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''approcher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Hé 7.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: saines paroles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.10+ ; 2Tm 1.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de notre Seigneur…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 7.24,26/ / ; Jn 5.24 ; 6.63,68 ; voir aussi 1Co 3.11 ; Col 3.16 ; 1Th 1.8 ; 2Th 3.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'conforme à la piété '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (2.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) Tt 2.9.
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu''un propage d''autres enseignements et ne suit pas les saines paroles de notre Seigneur Jésus-Christ et l''enseignement conforme à la piété, '
  - type: usfm
    marker: v
    metadata:
