      children:
      - type: text
        text: il est vrai que
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sorte que.
    marker-yv: yv-n
  - type: text
    text: Car nous n'avons rien apporté dans le monde,
- type: usfm
  marker: q1
