document_id: 1TI.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les esclaves
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 7.21ss ; Ep 6.5ss ; Col 3.22ss ; Tt 2.9s ; Phm 10ss ; 1P 2.18ss. –  sous le joug  : cf. Gn 27.40 ; Lv 26.13 ; Dt 28.48 ; Es 9.3 ; 58.6 ; 2Co 6.14 ; Ga 5.1. –  honneur 5.3n. –  qu''on ne calomnie pas ou qu''on ne blasphème pas , terme apparenté v. 4 ; cf. 3.7+ ; Tt 2.5. –  le nom de Dieu… Es 52.5 ; Ez 36.20 ; Rm 2.24 ; Jc 2.7 ; 1P 4.4,14 ; 2P 2.2.'
  - type: text
    content: 'Que tous ceux qui sont sous le joug de l''esclavage estiment leur maître digne de tout honneur, pour qu''on ne calomnie pas le nom de Dieu et l''enseignement. '
  '10':
  - type: note
    content: 'Cf. Jc 4.4 ; 1Jn 2.15 ; Testament de Juda 19.1 : « Mes enfants, l''amour de l''argent conduit à l''idolâtrie, car, égarés par l''argent, les hommes donnent le nom de dieux à ceux qui ne le sont pas ; ce même amour de l''argent fait sombrer dans la folie celui qui le possède. » –  la racine  : cf. Hé 12.15. –  quelques-uns  : cf. 1.19 ; 2Tm 4.10. –  s''y être adonnés  : le même verbe est traduit par aspirer en 3.1. –  se sont égarés…  : cf. Mc 13.22/ /. –  la foi  : cf. 3.9. –  tourments  : cf. Lc 15.14ss.'
  - type: text
    content: Car l'amour de l'argent est la racine de tous les maux, et quelques-uns, pour s'y être adonnés, se sont égarés loin de la foi et se sont infligé à eux-mêmes bien des tourments.
  - type: heading
    content: Consignes de l'apôtre à Timothée
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'homme de Dieu 2Tm 3.17n  ; cf. Dt 33.1 ; Jg 13.8 ; 1S 2.27 ; 9.6 ; 1R 12.22 ; 13.1 ; 17.18 ; 2R 4.7 ; Ps 90.1 ; Esd 3.2 ; Né 12.24 ; 2Ch 8.14. –  fuis 1Co 6.18 ; 2Tm 2.22. –  poursuis ou recherche  : cf. Rm 9.30n. –  justice / piété (2.2n) Tt 2.12. –  foi / amour / persévérance ou endurance 1Th 1.3 ; 2Th 1.3s ; 2Tm 3.10 ; Tt 2.2. –  douceur  : cf. 2Tm 2.25 ; Tt 3.2n. – Sur l''ensemble, voir Ga 5.22+.'
  - type: text
    content: Quant à toi, homme de Dieu, fuis ces choses ;
  - type: text
    content: poursuis plutôt la justice, la piété, la foi,
  - type: text
    content: l'amour, la persévérance, la douceur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'beau / bel 1.8n. –  combat  : cf. 1.18n  ; même terme 2Tm 4.7 ; Hé 12.1n ( épreuve ), cf. 12.4 ; voir aussi 1Co 9.24ss. –  saisis Ph 3.12. –  vie éternelle  : cf. v. 19 ; 1.16+. –  appelé 2Th 2.14 ; 2Tm 1.9. –  acte de reconnaissance ou confession (de foi) v. 13 ; cf. 3.16n  ; Rm 10.10 ; 2Co 9.13n  ; Hé 3.1n  ; 1Jn 2.23. –  témoins  : cf. Hé 12.1.'
  - type: text
    content: Mène le beau combat de la foi,
  - type: text
    content: saisis la vie éternelle, à laquelle tu as été appelé
  - type: text
    content: et pour laquelle tu as fait le bel acte de reconnaissance
  - type: text
    content: devant beaucoup de témoins.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''enjoins 1.3n. –  devant…  : cf. 5.21. –  qui donne la vie ou qui maintient en vie tous les êtres  : cf. 3.15 ; 4.10 ; le même verbe est traduit par conserver (sa vie) en Lc 17.33 ; rester en vie en Ac 7.19 ; cf. 17.25. –  témoignage  : cf. 2.5s ; Ap 3.14. –  acte de reconnaissance v. 12n. –  devant Ponce Pilate  : cf. Mt 27.11/ / ; Jn 18.36s ; 19.12 ; autre traduction possible sous Ponce Pilate , cf. Lc 3.1s ; Ac 3.13 ; 4.27 ; 13.28.'
  - type: text
    content: 'Je t''enjoins devant Dieu, qui donne la vie à tous les êtres, et devant Jésus-Christ, qui a rendu témoignage par son bel acte de reconnaissance devant Ponce Pilate, '
  '14':
  - type: note
    content: 'garder (ou observer) le commandement  : cf. v. 20 ; Mt 28.20 ; Jn 14.15,21 ; 15.10 ; 2P 2.21 ; voir loi. –  sans tache peut se rapporter à garder ou à commandement  ; autre traduction possible de te garder sans tache et d''observer le commandement sans reproche Ep 5.27 ; Jc 1.27 ; 1P 1.19 ; 2P 3.14 ; cf. Ps 19.8. –  sans reproche 3.2n. –  manifestation  : cf. 3.16 ; 2Tm 1.10 ; 4.1,8 ; Tt 2.13 ; voir aussi 2Th 2.8.'
  - type: text
    content: 'de garder le commandement sans tache, sans reproche, jusqu''à la manifestation de notre Seigneur Jésus-Christ, '
  '15':
  - type: note
    content: 'produira  : litt. montrera. –  en son temps  : cf. 2.6+ ; voir aussi Ac 1.6s ; 17.26,30 ; 2P 3.4. –  bienheureux 1.11. –  seul  : cf. Jd 25 ; Ap 15.4. –  Souverain  : même terme Lc 1.52 (puissants) ; Ac 8.27 (haut fonctionnaire) ; cf. Pr 8.15s ; Jn 19.11 ; 2 Maccabées 12.15 (« le grand Souverain du monde » = Dieu) ; notre texte peut être lu comme une pointe contre les prétentions divines de l''empereur de Rome. –  Roi…  : cf. Ez 26.7 ; Dn 2.37 ; Esd 7.12 ; Ap 17.14+ ; 2 Maccabées 13.4 (« le Roi des rois » = Dieu). –  Seigneur… Dt 10.17 ; Ps 136.3 ; Col 4.1n.'
  - type: text
    content: que produira en son temps
  - type: text
    content: le bienheureux et seul Souverain,
  - type: text
    content: le Roi de ceux qui règnent en rois
  - type: text
    content: et le Seigneur de ceux qui dominent en seigneurs,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'immortalité  : cf. 1Co 15.53s. –  lumière inaccessible  : cf. Ez 1.28 ; Dn 2.22 ; Ps 104.2 ; Jb 37.21ss ; Col 1.12 ; Jc 1.17 ; 1P 2.9 ; 1Jn 1.5 ; Ap 22.5. –  aucun homme n''a vu…  : cf. 1.17 ; Ex 33.20 ; Jn 1.18 ; 6.46 ; Rm 1.20 ; 1Jn 4.12. –  pouvoir ou puissance, force  : cf. Ep 1.19n  ; Col 1.11 ; 1P 4.11 ; 5.11 ; Jd 25 ; Ap 1.6 ; 5.13 ; voir aussi 2Co 6.18 ; Ap 1.8+.'
  - type: text
    content: lui qui seul possède l'immortalité,
  - type: text
    content: qui habite une lumière inaccessible,
  - type: text
    content: qu'aucun homme n'a vu ni ne peut voir ;
  - type: text
    content: 'à lui, honneur et pouvoir éternel ! '
  - type: text
    content: Amen !
  - type: heading
    content: Les riches
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Enjoins 1.3+. –  riches Jc 1.10. –  le monde présent Mt 12.32n  ; Rm 12.2 ; 1Co 2.6 ; 2Co 4.4 ; 2Tm 4.10 ; Tt 2.12s. –  orgueilleux ou arrogants , expressions proches en Rm 11.20 ; 12.16. –  mettre leur espérance  : cf. 4.10+. –  incertaines  : termes apparentés 1Co 9.26 ( à l''aventure ) ; 14.8 ; cf. Ps 49.7 ; 52.9 ; 62.11 ; Jb 31.24 ; Pr 11.28 ; 23.5 ; Lc 12.16ss. –  Dieu qui nous donne… Mt 7.11 ; Jc 1.17. –  largement  : litt. richement , cf. 2Co 8.9 ; Ep 1.7 ; 2.4 ; Col 3.16 ; Tt 3.6 ; voir aussi Ps 37.25 ; 145.15s. –  pour que nous en jouissions  : cf. 4.3ss.'
  - type: text
    content: 'Enjoins à ceux qui sont riches dans le monde présent de ne pas être orgueilleux et de ne pas mettre leur espérance dans des richesses incertaines, mais en Dieu qui nous donne tout largement, pour que nous en jouissions. '
  '18':
  - type: note
    content: 'fassent le bien  : cf. Lc 6.35 ; Ac 14.17 ; Ga 6.10. –  riches de belles œuvres 5.25+ ; cf. 2Co 9.11 ; voir aussi Ac 9.36 ; Tt 2.14 ; 3.8,14. –  disposés à partager  : cf. Rm 12.8 ; Ep 4.28. –  solidaires  : le terme est apparenté au mot habituellement traduit par communion  ; cf. Ac 2.44s ; 4.34 ; Rm 15.26s.'
  - type: text
    content: 'Qu''ils fassent le bien, qu''ils soient riches de belles œuvres, disposés à partager, solidaires, '
  '19':
  - type: note
    content: 's''amassant… comme trésor…  : cf. 3.13 ; Mt 6.2+,20 ; Lc 12.21,33 ; 18.28ss ; le mot traduit par fonds signifie aussi fondement, fondation  : cf. Lc 6.47ss. –  saisir v. 12.'
  - type: text
    content: s'amassant ainsi comme trésor un beau fonds pour l'avenir, afin de saisir la vraie vie.
  - type: heading
    content: Dernières recommandations
  '2':
  - type: note
    content: 'ne les respectent pas moins  : litt. ne les méprisent pas  ; cf. 1Co 7.22 ; Ga 3.28 ; Col 3.11 ; voir aussi Mt 6.24. –  frères Phm 16. –  qu''ils servent…  : autre traduction qu''ils soient de meilleurs esclaves encore  ; cf. Ga 5.13. –  qui bénéficient…  : autre traduction, moins probable, qui s''appliquent à faire le bien  ; le terme traduit par bons services s''entend habituellement d''un bienfait librement accordé. –  Voilà…  : cf. 4.6,11 ; 5.21 ; Tt 2.15.'
  - type: text
    content: Et que ceux qui ont des maîtres croyants ne les respectent pas moins sous prétexte que ce sont des frères, mais qu'ils servent d'autant mieux que ce sont des croyants et des bien-aimés qui bénéficient de leurs bons services.
  - type: heading
    content: Les enseignements non conformes à la piété
  - type: text
    content: 'Voilà ce que tu dois enseigner et recommander. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'garde ce qui t''a été confié (litt. le dépôt , c.-à-d. l''intégralité de l''enseignement et de la foi apostoliques, qui t''ont été confiés) : cf. v. 14 ; verbe apparenté en 1.18 ; 2Tm 1.12,14n  ; 4.7. –  évitant 1.6n. –  discours vides  : certains mss portent discours nouveaux  ; cf. 1.6 (autre terme) ; 2Tm 2.16 ; voir aussi Ep 5.6 ; Col 2.8. –  profanateurs 1.9n. –  contradictions  : le terme grec correspondant a donné notre mot antithèse  ; c''était peut-être un terme technique des adversaires de l''auteur ; terme apparenté en 2Tm 2.25 ( contradicteurs ) ; voir aussi 2Tm 3.8. –  pseudo-connaissance ou fausse connaissance, connaissance de mensonge  ; certains voient ici une allusion aux premiers gnostiques qui se réclamaient d''une connaissance (grec gnosis ) ésotérique et non ecclésiastique du Christ ; cf. Lc 10.21ss ; Jn 17.3 ; 1Co 8.1ss.'
  - type: text
    content: 'O Timothée, garde ce qui t''a été confié, en évitant les discours vides et profanateurs, et les contradictions de la pseudo-connaissance. '
  '21':
  - type: note
    content: 'prétendu  : cf. 2.10n. –  sont passés à côté 1.6n. –  Que la grâce… 1Co 16.23 ; Col 4.18+ ; 2Tm 4.22 ; Tt 3.15 ; Hé 13.25. – Certains mss portent, avec diverses variantes, l''indication suivante  : Première à Timothée, écrite de Laodicée [de Nicopolis].'
  - type: text
    content: Quelques-uns, pour y avoir prétendu, sont passés à côté de la foi.
  - type: text
    content: Que la grâce soit avec vous !
  '3':
  - type: note
    content: 'propage d''autres enseignements 1.3+. –  ne suit pas  : litt. ne vient pas vers ou n''entre pas dans, cf. 2.4 ; Hé 4.16 ; le même verbe est traduit par s''approcher en Hé 7.25. –  saines paroles  : cf. 1.10+ ; 2Tm 1.13. –  de notre Seigneur…  : cf. Mt 7.24,26/ / ; Jn 5.24 ; 6.63,68 ; voir aussi 1Co 3.11 ; Col 3.16 ; 1Th 1.8 ; 2Th 3.1. –  conforme à la piété (2.2n) Tt 2.9.'
  - type: text
    content: 'Si quelqu''un propage d''autres enseignements et ne suit pas les saines paroles de notre Seigneur Jésus-Christ et l''enseignement conforme à la piété, '
  '4':
  - type: note
    content: 'Cf. 2P 1.9. –  aveuglé par l''orgueil 3.6n  ; 1Co 8.2s. –  ne sait rien 1.7 ; cf. 1Co 2.2. –  maladie  : cf. les saines paroles v. 3. –  débats 1.4n. –  querelles de mots  : cf. 2Tm 2.14. –  l''envie… Rm 1.29+ ; Ga 5.20s.'
  - type: text
    content: 'il est aveuglé par l''orgueil, il ne sait rien ; il a la maladie des débats et des querelles de mots. De là naissent l''envie, les disputes, les calomnies, les mauvais soupçons, '
  '5':
  - type: note
    content: 'les contestations interminables  : selon certains, le terme grec évoquerait une maladie contagieuse (cf. v. 4n). –  pervertie ou corrompue, pourrie  ; le terme évoque habituellement ce qui est périssable (il s''oppose à l''adjectif traduit par impérissable en 1.17) ; terme apparenté en 2Tm 3.8 ; cf. Rm 1.28. –  privés de la vérité  : cf. 2.4 ; 2Tm 3.7 ; 4.4 ; Tt 1.14 ; 3.11 ; voir aussi Jn 8.45 ; 2Co 4.4 ; 2Th 2.10. –  source de profit  : cf. 5.17ns ; Mt 10.8 ; 1Th 2.5 ; Tt 1.11.'
  - type: text
    content: les contestations interminables de gens à l'intelligence pervertie, privés de la vérité, qui considèrent la piété comme une source de profit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'une grande source de profit v. 5 ; cf. 4.8 ; 2P 1.3s ; voir aussi Mt 13.44ss ; Col 3.11. –  si l''on se contente…  : litt. avec la vertu de se suffire à soi-même (v. 8+) ; le terme correspondant, qui a donné notre mot autarcie , représentait un idéal de la philosophie grecque ; cf. Ph 4.11s.'
  - type: text
    content: Certes, c'est une grande source de profit que la piété, si l'on se contente de ce qu'on a.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Jb 1.21 ; Ec 5.14s ; Lc 12.20. –  comme d''ailleurs  : la traduction de la particule qui relie les deux propositions est incertaine ; quelques mss ajoutent il est évident ou il est vrai que  ; d''autres comprennent de sorte que.'
  - type: text
    content: Car nous n'avons rien apporté dans le monde,
  - type: text
    content: comme d'ailleurs nous n'en pouvons rien emporter.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 30.8 ; Lc 12.22ss/ /. –  nourriture / vêtement Gn 28.20 ; Dt 10.18 ; Es 3.7 ; Jc 2.15. –  nous suffira v. 6n  ; cf. Lc 3.14 ; 2Co 12.9 ; Hé 13.5.
  - type: text
    content: Si donc nous avons la nourriture et le vêtement,
  - type: text
    content: cela nous suffira.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 17ss ; Pr 15.27 ; 23.4 ; 28.20,22 ; Mt 6.24 ; Lc 8.14 ; 12.13ss ; Jc 5.1ss ; Siracide 27.1s : « Beaucoup ont péché par amour du gain, et celui qui cherche à s''enrichir détourne son regard. Comme un piquet s''enfonce dans la jointure des pierres, entre vente et achat s''intercale le péché. » 31.5ss : « Celui qui aime l''or ne saurait rester juste et celui qui poursuit le gain se laissera fourvoyer par lui. Beaucoup ont été livrés à la ruine à cause de l''or et leur perte est arrivée sur eux. C''est un piège pour ceux qui en sont entichés et tous les insensés s''y laissent attraper. » –  ceux qui sont décidés à  : autre traduction ceux qui souhaitent , cf. 2.8n. –  l''épreuve  : autre traduction une tentation  ; cf. Mt 4.1n  ; Jc 1.13+s. –  piège  : cf. 3.7+. –  beaucoup de désirs  : cf. Lc 11.26 ; Jc 1.15. –  stupides Ga 3.1n  ; cf. Lc 12.20. –  plongent  : le même verbe est traduit par enfoncer en Lc 5.7. –  destruction 1Co 5.5 ; 1Th 5.3 ; 2Th 1.9. –  perdition Rm 9.22 ; Ph 1.28 ; 3.19 ; cf. Mt 16.25s/ /.'
  - type: text
    content: 'Mais ceux qui sont décidés à devenir riches tombent dans l''épreuve, dans un piège et dans beaucoup de désirs stupides et pernicieux, qui plongent les gens dans la destruction et la perdition. '
