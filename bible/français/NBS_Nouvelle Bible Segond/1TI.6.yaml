    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 27.40 ; Lv 26.13 ; Dt 28.48 ; Es 9.3 ; 58.6 ; 2Co 6.14 ; Ga 5.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'honneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''on ne calomnie pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'on ne blasphème pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', terme apparenté v. 4 ; cf. 3.7+ ; Tt 2.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' de Dieu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 52.5 ; Ez 36.20 ; Rm 2.24 ; Jc 2.7 ; 1P 4.4,14 ; 2P 2.2.
    marker-yv: yv-n
  - type: text
    text: 'Que tous ceux qui sont sous le joug de l''esclavage estiment leur maître digne de tout honneur, pour qu''on ne calomnie pas le nom de Dieu et l''enseignement. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne les respectent pas moins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne les méprisent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1Co 7.22 ; Ga 3.28 ; Col 3.11 ; voir aussi Mt 6.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Phm 16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils servent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils soient de meilleurs esclaves encore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ga 5.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui bénéficient…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction, moins probable, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui s'appliquent à faire le bien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bons services '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 's''entend habituellement d''un bienfait librement accordé. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voilà…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.6,11 ; 5.21 ; Tt 2.15.'
    marker-yv: yv-n
  - type: text
    text: Et que ceux qui ont des maîtres croyants ne les respectent pas moins sous prétexte que ce sont des frères, mais qu'ils servent d'autant mieux que ce sont des croyants et des bien-aimés qui bénéficient de leurs bons services.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les enseignements non conformes à la piété
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Voilà ce que tu dois enseigner et recommander. '
