document_id: PSA.93,104
type_code: fra
verses:
  '1':
  - type: heading
    content: C'est le Seigneur qui est roi !
  - type: text
    content: ' '
  - type: note
    content: 'LXX porte la suscription suivante  : Pour la veille du sabbat, quand la terre fut habitée (cf. Gn 1.24–2.3) . Chant. Psaume de David. –  est roi  : autre traduction règne  ; cf. 47.8s ; 96.10 ; 97.1 ; 99.1 ; voir aussi 145.13 ; 146.10 ; Ex 15.18 ; Es 24.23 ; 52.7 ; 1Ch 16.31 ; Ap 11.15 ; 19.6. –  revêtu de majesté 104.1s ; cf. Es 11.5 ; 26.10 ; 51.9 ; 59.17. –  il se ceint de force  : cf. 65.7n  ; Pr 31.25. –  aussi le monde est ferme 24.1s ; 75.4 ; 95.3ss ; 96.5,10 ; 97.9 ; 119.90 ; 125.1 ; 1S 2.8.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est roi ! Il est revêtu de majesté ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est revêtu, il se ceint de force,'
  - type: text
    content: aussi le monde est ferme, il ne vacille pas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ton trône 47.9 ; 97.2 ; cf. 9.8+ ; 45.7 ; 89.5,30 ; 1S 4.4 ; Es 6.1ss ; Jr 3.16s. –  depuis toujours  : cf. 90.2+ ; 92.9+.'
  - type: text
    content: Ton trône est établi dès les temps anciens ;
  - type: text
    content: depuis toujours tu es.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'élèvent  : la forme du verbe correspondant varie dans le texte ; les deux premières fois il pourrait être traduit au passé ( ont élevé ), la troisième fois plutôt au présent ou au futur ( élèveront ) ; cf. 46.3ss ; Es 17.12ss.'
  - type: text
    content: 'Les fleuves élèvent, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Les fleuves élèvent leur voix,
  - type: text
    content: les fleuves élèvent leur grondement.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 29.10 ; Jb 38.8 ; cf. Ex 15.10. –  hauteur 7.8 ; 68.19 ; 144.7.
  - type: text
    content: Plus que le bruit des grandes eaux,
  - type: text
    content: des flots magnifiques de la mer,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est magnifique, dans la hauteur.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: préceptes ou témoignages  ; cf. 19.8 ; 99.4,6ss ; 119.2n. – Voir saint. –  pour la longueur des jours 21.5+ ; 23.6.
  - type: text
    content: Tes préceptes sont tout à fait sûrs ;
  - type: text
    content: la sainteté convient à ta maison,
  - type: text
    content: Seigneur
  - type: text
    content: ', pour la longueur des jours !'
