document_id: JOS.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les tribus de Transjordanie
  - type: text
    content: ' '
  - type: note
    content: 'les Rubénites…  : c.-à-d. les tribus de Transjordanie.'
  - type: text
    content: 'Alors Josué appela les Rubénites, les Gadites et la demi-tribu de Manassé. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'districts  : litt. cercles , comme en 13.2n.'
  - type: text
    content: 'Quand ils furent arrivés dans les districts du Jourdain qui appartiennent à Canaan, les fils de Ruben, les fils de Gad et la demi-tribu de Manassé bâtirent là un autel, près du Jourdain, un autel imposant. '
  '11':
  - type: note
    content: 'face à Canaan  : situé ainsi, cet autel marque un séparatisme caractérisé. Il semble couper Canaan en deux, en séparer les districts du Jourdain (v. 10n), et affronter les Israélites de Cisjordanie. Cf. v. 19.'
  - type: text
    content: 'Les Israélites apprirent que les fils de Ruben, les fils de Gad et la demi-tribu de Manassé avaient bâti cet autel face à Canaan, dans les districts du Jourdain, de l''autre côté par rapport aux Israélites. '
  '12':
  - type: note
    content: 'toute la communauté 18.1n. –  expédition militaire  : cf. v. 33.'
  - type: text
    content: 'Lorsque les Israélites eurent appris cela, toute la communauté des Israélites se rassembla à Silo pour lancer contre eux une expédition militaire. '
  '13':
  - type: note
    content: 'Phinéas succédera à son père Eléazar (24.33), le prêtre  : cf. Nb 25.6-13 ; Jg 20.28+ ; voir aussi v. 30-33 ; Ex 6.25 ; Nb 31.6 ; Ps 106.30 ; 1Ch 5.30 ; 6.35.'
  - type: text
    content: 'Les Israélites envoyèrent Phinéas, fils d''Eléazar, le prêtre, auprès des fils de Ruben, des fils de Gad et de la demi-tribu de Manassé, au Galaad, '
  '14':
  - type: note
    content: 'princes  : cf. 9.15n,18 ; 17.4. –  famille  : litt. maison paternelle  ; même expression hébraïque en Nb 3.24,30,35 ; 25.14s ; Es 3.6 ; Esd 2.59 ; Né 7.61 ; 1Ch 23.11 ; 24.6. –  phratries ou milliers, contingents  ; cf. Nb 1.16n  ; 10.4,36 ; 1S 10.19 ; 17.18 ; 23.23.'
  - type: text
    content: 'et avec lui dix princes, un prince par famille pour chacune des tribus d''Israël ; chacun était chef de sa famille parmi les phratries d''Israël. '
  '15':
  - type: text
    content: 'Ils se rendirent auprès des fils de Ruben, des fils de Gad et de la demi-tribu de Manassé, au Galaad, et ils leur dirent : '
  '16':
  - type: note
    content: 'la communauté du Seigneur  : cf. Nb 27.17 ; 31.16 ; Ps 74.2. –  sacrilège  : cf. v. 31 ; Lv 5.21 ; 26.40 ; Nb 5.6 ; voir aussi 14.9 ; Lv 17.8s ; Dt 12.10-14. –  Vous vous êtes détournés…  : litt. pour vous détourner (ou revenir) aujourd''hui de derrière YHWH  ; de même aux v. 18,23,29 ; cf. Nb 14.43n.'
  - type: text
    content: 'Ainsi parle toute la communauté du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Que signifie ce sacrilège que vous avez commis envers le Dieu d''Israël ? Vous vous êtes détournés aujourd''hui du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en vous bâtissant un autel, vous vous êtes rebellés aujourd''hui contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '17':
  - type: note
    content: 'La faute de Péor  : cf. Nb 25.1-10 où Phinéas, précisément, intervient pour faire cesser le scandale. Son choix ici comme délégué auprès des tribus transjordaniennes établit le parallèle entre les deux affaires ; voir aussi Dt 4.3. – Voir pur. –  fléau  : cf. Ex 7.27n  ; 12.13 ; 30.12+ ; Nb 8.19+ ; 17.11.'
  - type: text
    content: 'La faute de Péor ne nous suffit-elle pas, alors que nous n''en sommes pas encore purifiés jusqu''à ce jour malgré le fléau qui a frappé la communauté du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '18':
  - type: note
    content: 'Cf. v. 20 ; 6.18 ; 7.1. –  la Colère s''abattra sur  : autre traduction possible il (le Seigneur ) sera en colère contre  ; cf. v. 20 (terme apparenté).'
  - type: text
    content: 'Et vous, vous vous détournez aujourd''hui du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Si vous vous rebellez aujourd''hui contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', demain la Colère s''abattra sur toute la communauté d''Israël. '
  '19':
  - type: note
    content: 'où se trouve la demeure  : litt. où demeure la demeure. –  en plus de l''autel du Seigneur  : cf. Dt 12.10ss.'
  - type: text
    content: 'Si vraiment le pays qui est votre propriété est impur, passez donc dans le pays qui est la propriété du '
  - type: text
    content: Seigneur
  - type: text
    content: ', là où se trouve la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ayez votre propriété au milieu de nous ; mais ne vous rebellez pas contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ne vous rebellez pas non plus contre nous, en bâtissant pour vous un autel en plus de l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ! '
  '2':
  - type: note
    content: vous m'avez écouté (litt. vous avez écouté ma voix) ou vous m'avez obéi  ; cf. 1.12-18 ; Nb 32.20-22 ; Dt 3.18-20.
  - type: text
    content: 'Il leur dit : Vous avez observé tout ce que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous a ordonné, et vous m''avez écouté en tout ce que je vous ai ordonné. '
  '20':
  - type: note
    content: 'Il ne fut pas  : autre traduction pourtant il ne fut pas  ; cf. 7.1,6-26, en particulier les v. 11s (la punition collective). –  périr  : litt. expirer. –  dans sa faute  : autres traductions par sa faute ; pour sa faute  ; voir péché.'
  - type: text
    content: Lorsque Akân, fils de Zérah, commit un sacrilège en matière d'anathème, c'est sur toute la communauté d'Israël que la Colère s'abattit. Il ne fut pas le seul homme à périr dans sa faute.
  '21':
  - type: text
    content: 'Les fils de Ruben, les fils de Gad et la demi-tribu de Manassé répondirent aux chefs des phratries d''Israël : '
  '22':
  - type: note
    content: 'Dieu (El), Dieu, le Seigneur  : hébreu ’El (Gn 21.33n) ’Elohim (Gn 1.1n) YHWH (deux fois) ; certains traduisent le Dieu des dieux, (c''est) le Seigneur  ; la présente traduction suit la ponctuation du texte hébreu traditionnel ; LXX Dieu, c''est Dieu Seigneur, et Dieu, Dieu Seigneur, lui le sait…  ; cf. Dt 10.17 (expression différente) ; Ps 50.1.'
  - type: text
    content: 'Dieu (El), Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu (El), Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), lui le sait, et Israël le saura ! Si c''est par rébellion que nous avons agi, si c''est pour commettre un sacrilège envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ne nous sauve pas en ce jour ! '
  '23':
  - type: note
    content: 'Si nous nous sommes bâti un autel…  : selon Dt 12.6-14, c''est uniquement sur l''autel dressé à l''entrée de la tente de la Rencontre que l''on peut offrir des holocaustes et des offrandes végétales (autre traduction offrandes, cf. Gn 4.3n  ; Lv 2.1n).'
  - type: text
    content: 'Si nous nous sommes bâti un autel pour nous détourner du '
  - type: text
    content: Seigneur
  - type: text
    content: ', si c''est pour y offrir des holocaustes et des offrandes végétales, si c''est pour y offrir des sacrifices de paix, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en demande compte ! '
  '24':
  - type: note
    content: 'Non  : litt. et sinon  ; l''expression correspondante est rendue par sans faute en 14.9, où elle est une formule de serment (Es 5.9n) ; autre traduction et si nous n''avons pas fait cela.'
  - type: text
    content: 'Non, nous avons fait cela parce que nous étions inquiets à la pensée que demain vos fils pourraient dire à nos fils : « Qu''y a-t-il de commun entre vous et le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël ? '
  '25':
  - type: note
    content: Voir crainte.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a mis le Jourdain pour frontière entre nous et vous, fils de Ruben et fils de Gad : vous n''avez aucune part au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » Et à cause de vos fils, nos fils cesseraient de craindre le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Alors nous nous sommes dit : Mettons-nous à l''œuvre pour bâtir un autel, non pas pour des holocaustes et pour des sacrifices, '
  '27':
  - type: note
    content: 'témoin entre nous et vous  : cf. v. 28,34. –  nos descendants  : litt. nos générations. –  nous accomplissons bien le service  : cf. Nb 3.7n  ; 8.11. – Sur ces formes de sacrifices, cf. Lv 1–3.'
  - type: text
    content: 'mais comme témoin entre nous et vous, ainsi qu''entre nos descendants après nous, que nous accomplissons bien le service du '
  - type: text
    content: Seigneur
  - type: text
    content: ' devant lui par nos holocaustes, nos sacrifices, nos sacrifices de paix, afin que demain vos fils ne disent pas à nos fils : « Vous n''avez aucune part au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » '
  '28':
  - type: note
    content: 'modèle  : cf. Ex 25.9n. –  témoin… v. 27+.'
  - type: text
    content: 'Nous nous sommes dit : S''ils nous disent cela, à nous ou à nos descendants, nous répondrons : « Regardez le modèle de l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''ont fait nos pères, non pas pour des holocaustes et pour des sacrifices, mais comme témoin entre nous et vous. » '
  '29':
  - type: note
    content: Jamais / Pour rien au monde traduisent une seule et même formule hébraïque (litt. profanation à nous !) ; cf. 24.16 ; 1S 2.30n.
  - type: text
    content: 'Jamais nous ne nous rebellerions contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Pour rien au monde nous ne nous détournerions aujourd''hui du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en bâtissant un autel pour des holocaustes, des offrandes végétales et des sacrifices, en plus de l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, celui qui est devant sa demeure !'
  '3':
  - type: note
    content: 'jusqu''à ce jour 4.9n. –  vous avez observé scrupuleusement…  : litt. vous avez gardé la garde (expression traduite ailleurs par assurer le service, Nb 1.53, ou garder les observances, Gn 26.5) du commandement de YHWH (voir noms divins). Cf. Lv 8.35 ; Nb 3.7n  ; Dt 11.1.'
  - type: text
    content: 'Pendant bien des jours, jusqu''à ce jour, vous n''avez pas abandonné vos frères, et vous avez observé scrupuleusement le commandement du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'leur plut  : litt. fut bon à leurs yeux  ; de même au v. 33.'
  - type: text
    content: 'Quand Phinéas, le prêtre, les princes de la communauté et les chefs des phratries d''Israël qui étaient avec lui entendirent ce que disaient les fils de Ruben, les fils de Gad et les fils de Manassé, cela leur plut. '
  '31':
  - type: note
    content: 'ainsi vous avez délivré…  : il faut sans doute comprendre que les bonnes intentions des tribus transjordaniennes mettent tout Israël à l''abri du châtiment qu''un autel dissident aurait pu entraîner (cf. v. 16-20).'
  - type: text
    content: 'Phinéas, fils d''Eléazar, le prêtre, dit aux fils de Ruben, aux fils de Gad et aux fils de Manassé : Nous savons aujourd''hui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est au milieu de nous, puisque vous n''avez pas commis ce sacrilège envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ainsi vous avez délivré les Israélites de la main du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Phinéas, fils d''Eléazar, le prêtre, et les princes partirent de chez les fils de Ruben et de chez les fils de Gad, du Galaad, pour revenir en Canaan, auprès des Israélites, auxquels ils firent un rapport. '
  '33':
  - type: note
    content: 'Le rapport plut… v. 30n. – Voir bénédiction. –  expédition militaire  : cf. v. 12.'
  - type: text
    content: 'Le rapport plut aux Israélites. Ils bénirent Dieu et ne parlèrent plus de lancer contre eux une expédition militaire pour détruire le pays qu''habitaient les fils de Ruben et les fils de Gad. '
  '34':
  - type: note
    content: 'Il est témoin entre nous  : cf. v. 27. Le nom de l''autel n''est pas mentionné dans le texte hébreu traditionnel. D''après Syr et le contexte (v. 27), certains pensent que le texte donnait originellement le nom de ‘ed, témoin. Cf. 24.27 ; voir aussi Gn 31.47n-48n.'
  - type: text
    content: 'Les fils de Ruben et les fils de Gad donnèrent un nom à l''autel, en disant : Il est témoin entre nous que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est Dieu.'
  '4':
  - type: note
    content: 'accordé le repos  : cf. 1.13+,15 ; 21.44 ; 23.1. –  retournez…  : litt. tournez-vous et allez-vous-en (voir Gn 12.1n) à vos tentes, c.-à-d. rentrez chez vous  ; cf. v. 8 (autre expression hébraïque).'
  - type: text
    content: 'Maintenant que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a accordé le repos à vos frères, comme il le leur avait dit, retournez à vos tentes, dans le pays qui est votre propriété, celui que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous a donné en Transjordanie.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'la loi…  : cf. 1.7 ; Dt 4.2n. –  aimez…  : la suite emprunte des formules chères au Deutéronome ; cf. Dt 6.5 ; 8.6 ; 10.12,20 ; 11.13,22 ; 19.9 ; 28.9 ; 30.6,16. –  de tout votre cœur et de toute votre âme (cf. Gn 1.20n) 23.14 ; Dt 4.29+.'
  - type: text
    content: 'Seulement, veillez bien à mettre en pratique le commandement et la loi que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', a institués pour vous : aimez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, suivez toutes ses voies, observez ses commandements, attachez-vous à lui et servez-le de tout votre cœur et de toute votre âme. '
  '6':
  - type: text
    content: 'Josué les bénit et les renvoya ; ils s''en allèrent à leurs tentes. '
  '7':
  - type: note
    content: 'à la demi-tribu de Manassé  : cf. 1.12-15 ; 12.6 ; 13.29-31 ; 14.3 ; 17.1 ; 18.7. –  l''autre demi-tribu  : cf. 12.7 ; 13.8 ; 17.2-13. –  de ses frères  : litt. de leurs frères. –  au-delà  : cf. 5.1n. – Voir bénédiction.'
  - type: text
    content: Moïse avait donné à la demi-tribu de Manassé un patrimoine au Bashân, et Josué donna à l'autre demi-tribu un patrimoine auprès de ses frères au-delà du Jourdain, à l'ouest.
  - type: text
    content: 'Lorsque Josué les renvoya à leurs tentes, il les bénit '
  '8':
  - type: note
    content: 'Retournez à vos tentes  : cf. v. 4n. –  de l''argent, de l''or, du bronze, du fer 6.19 ; cf. 6.24 ; voir aussi Nb 31.22s. –  Partagez… le butin  : cf. Nb 31.27 ; 1S 30.24s.'
  - type: text
    content: 'et leur dit : Retournez à vos tentes avec de grandes richesses, avec des troupeaux très nombreux, avec de l''argent, de l''or, du bronze, du fer et des vêtements en très grande quantité. Partagez avec vos frères le butin de vos ennemis.'
  - type: heading
    content: L'autel bâti près du Jourdain
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Voir fils. –  à Silo  : cf. 18.1n-10 ; 21.2. –  Canaan Gn 9.18n. –  au Galaad , en Transjordanie, v. 32 ; cf. 12.2,5. –  sur l''ordre…  : litt. sur la bouche de YHWH 19.50n. –  par l''intermédiaire… 14.2n.'
  - type: text
    content: 'Les fils de Ruben, les fils de Gad et la demi-tribu de Manassé s''en retournèrent ; ils quittèrent les Israélites à Silo, en Canaan, pour aller au Galaad, le pays qu''ils avaient reçu en propriété sur l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné par l''intermédiaire de Moïse.'
