document_id: JOS.22,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les tribus de Transjordanie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Rubénites…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. les tribus de Transjordanie.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Josué appela les Rubénites, les Gadites et la demi-tribu de Manassé. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: districts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cercles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand ils furent arrivés dans les districts du Jourdain qui appartiennent à Canaan, les fils de Ruben, les fils de Gad et la demi-tribu de Manassé bâtirent là un autel, près du Jourdain, un autel imposant. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: face à Canaan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : situé ainsi, cet autel marque un séparatisme caractérisé. Il semble couper '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Canaan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en deux, en séparer les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'districts du Jourdain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), et affronter les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israélites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Cisjordanie. Cf. v. 19.
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites apprirent que les fils de Ruben, les fils de Gad et la demi-tribu de Manassé avaient bâti cet autel face à Canaan, dans les districts du Jourdain, de l''autre côté par rapport aux Israélites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toute la communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: expédition militaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 33.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque les Israélites eurent appris cela, toute la communauté des Israélites se rassembla à Silo pour lancer contre eux une expédition militaire. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Phinéas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'succédera à son père '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eléazar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (24.33)
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ', le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 25.6-13 ; Jg 20.28+ ; voir aussi v. 30-33 ; Ex 6.25 ; Nb 31.6 ; Ps 106.30 ; 1Ch 5.30 ; 6.35.'
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites envoyèrent Phinéas, fils d''Eléazar, le prêtre, auprès des fils de Ruben, des fils de Gad et de la demi-tribu de Manassé, au Galaad, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: princes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',18 ; 17.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maison paternelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression hébraïque en Nb 3.24,30,35 ; 25.14s ; Es 3.6 ; Esd 2.59 ; Né 7.61 ; 1Ch 23.11 ; 24.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'phratries '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: milliers, contingents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 1.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.4,36 ; 1S 10.19 ; 17.18 ; 23.23.'
      marker-yv: yv-n
    - type: text
      text: 'et avec lui dix princes, un prince par famille pour chacune des tribus d''Israël ; chacun était chef de sa famille parmi les phratries d''Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils se rendirent auprès des fils de Ruben, des fils de Gad et de la demi-tribu de Manassé, au Galaad, et ils leur dirent : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la communauté du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 27.17 ; 31.16 ; Ps 74.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrilège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 31 ; Lv 5.21 ; 26.40 ; Nb 5.6 ; voir aussi 14.9 ; Lv 17.8s ; Dt 12.10-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous vous êtes détournés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour vous détourner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: revenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aujourd'hui de derrière YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même aux v. 18,23,29 ; cf. Nb 14.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle toute la communauté du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Que signifie ce sacrilège que vous avez commis envers le Dieu d''Israël ? Vous vous êtes détournés aujourd''hui du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en vous bâtissant un autel, vous vous êtes rebellés aujourd''hui contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La faute de Péor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 25.1-10 où Phinéas, précisément, intervient pour faire cesser le scandale. Son choix ici comme délégué auprès des tribus transjordaniennes établit le parallèle entre les deux affaires ; voir aussi Dt 4.3. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fléau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 7.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.13 ; 30.12+ ; Nb 8.19+ ; 17.11.'
      marker-yv: yv-n
    - type: text
      text: 'La faute de Péor ne nous suffit-elle pas, alors que nous n''en sommes pas encore purifiés jusqu''à ce jour malgré le fléau qui a frappé la communauté du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 20 ; 6.18 ; 7.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Colère s'abattra sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il (le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' ) sera en colère contre'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20 (terme apparenté).'
      marker-yv: yv-n
    - type: text
      text: 'Et vous, vous vous détournez aujourd''hui du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! Si vous vous rebellez aujourd''hui contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', demain la Colère s''abattra sur toute la communauté d''Israël. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: où se trouve la demeure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: où demeure la demeure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en plus de l''autel du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 12.10ss.'
      marker-yv: yv-n
    - type: text
      text: 'Si vraiment le pays qui est votre propriété est impur, passez donc dans le pays qui est la propriété du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', là où se trouve la demeure du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et ayez votre propriété au milieu de nous ; mais ne vous rebellez pas contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et ne vous rebellez pas non plus contre nous, en bâtissant pour vous un autel en plus de l''autel du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous m''avez écouté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous avez écouté ma voix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous m'avez obéi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.12-18 ; Nb 32.20-22 ; Dt 3.18-20.'
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : Vous avez observé tout ce que Moïse, serviteur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', vous a ordonné, et vous m''avez écouté en tout ce que je vous ai ordonné. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il ne fut pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pourtant il ne fut pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 7.1,6-26, en particulier les v. 11s (la punition collective). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: périr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: expirer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans sa faute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par sa faute ; pour sa faute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Lorsque Akân, fils de Zérah, commit un sacrilège en matière d'anathème, c'est sur toute la communauté d'Israël que la Colère s'abattit. Il ne fut pas le seul homme à périr dans sa faute.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Les fils de Ruben, les fils de Gad et la demi-tribu de Manassé répondirent aux chefs des phratries d''Israël : '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu (El), Dieu, le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’El '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Gn 21.33
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’Elohim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Gn 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(deux fois) ; certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Dieu des dieux, (c''est) le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la présente traduction suit la ponctuation du texte hébreu traditionnel ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
