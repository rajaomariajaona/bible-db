  - type: text
    text: 'Manassé avait douze ans lorsqu''il devint roi ; il régna cinquante-cinq ans à Jérusalem. Le nom de sa mère était Hephtsiba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui déplaisait au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6,15s,20 ; 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 11.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' …'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 18.24-30 ; Dt 18.9,12-14.'
    marker-yv: yv-n
  - type: text
    text: 'Il fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', imitant les abominations des nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dépossédées devant les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: poteau cultuel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ashéra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 7 ; cf. Jg 3.7
      - type: usfm
        marker: ord
        children:
        - type: text
