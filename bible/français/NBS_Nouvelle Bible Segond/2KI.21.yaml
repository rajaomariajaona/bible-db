    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 17.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il installa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fréquenta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui lui déplaisait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2+.'
    marker-yv: yv-n
  - type: text
    text: 'Il fit passer son fils par le feu ; il cherchait des présages et pratiquait la divination. Il installa des spirites et des médiums. Il contraria le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en faisant de plus en plus ce qui lui déplaisait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la statue de l'Ashéra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 3.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la statue, le poteau cultuel (l'ashéra)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il avait faite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent de LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Il plaça la statue de l''Ashéra qu''il avait faite dans la maison dont le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dit à David et à Salomon, son fils : « C''est dans cette maison et c''est dans Jérusalem, que j''ai choisie parmi toutes les tribus d''Israël, que je veux placer mon nom pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pied d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ordonné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'instituée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent le même verbe hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en suivant toute la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et pour toute la loi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon toute la loi…
    marker-yv: yv-n
  - type: text
    text: 'Je ne ferai plus vagabonder Israël hors de la terre que j''ai donnée à ses pères, pourvu seulement qu''ils veillent à faire exactement ce que je leur ai ordonné, en suivant toute la loi que Moïse, mon serviteur, a instituée pour eux. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais ils n''écoutèrent pas ; Manassé les égara, de sorte qu''ils firent plus de mal que les nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait détruites devant les Israélites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses serviteurs, les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.7 ; 14.25 ; 17.13,23 ; 24.2 ; Jr 7.25+ ; Ez 38.17 ; Dn 9.6 ; Am 3.7 ; Za 1.6 ; Esd 9.11.
    marker-yv: yv-n
  - type: text
    text: 'Alors, par l''intermédiaire de ses serviteurs, les prophètes, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 24.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Parce que Manassé, roi de Juda, a commis ces abominations, parce qu''il a fait pire que tout ce qu''avaient fait avant lui les Amorites, et parce qu''il a aussi fait pécher Juda par ses idoles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en restera abasourdi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses deux oreilles tinteront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 3.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 19.3.'
    marker-yv: yv-n
  - type: text
    text: 'à cause de cela, ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : Je fais venir sur Jérusalem et sur Juda un malheur tel que quiconque en entendra parler en restera abasourdi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Il faut sans doute comprendre que Manassé cumule à Jérusalem les fautes commises par Jéroboam, fondateur du royaume du Nord (
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Samarie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), et par la dynastie d’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Achab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', associée au culte de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: '. En tout cas le châtiment de Jérusalem sera comparable à celui de Samarie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le cordeau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lm 2.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le niveau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le fil à plomb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 28.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je nettoierai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: détruirai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 6.7 ; 7.4 ; Ex 17.14 ; 32.32s ; Dt 9.14 ; Es 25.8.'
    marker-yv: yv-n
  - type: text
    text: 'Je tendrai sur Jérusalem le cordeau de Samarie et le niveau de la maison d''Achab ; et je nettoierai Jérusalem, comme un plat qu''on nettoie en le renversant sens dessus dessous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils seront pillés et dépouillés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils deviendront butin et proie.
    marker-yv: yv-n
  - type: text
    text: 'Je délaisserai le reste de mon patrimoine ; je les livrerai à leurs ennemis ; ils seront pillés et dépouillés par tous leurs ennemis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui me déplaisait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2+.
    marker-yv: yv-n
  - type: text
    text: parce qu'ils ont fait ce qui me déplaisait, en me contrariant depuis le jour où leurs pères sont sortis d'Egypte jusqu'à ce jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' innocent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jr 7.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''un bout à l''autre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui déplaisait… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2+.
    marker-yv: yv-n
  - type: text
    text: 'De plus, Manassé répandit beaucoup de sang innocent, jusqu''à en remplir Jérusalem d''un bout à l''autre, outre le péché qu''il fit commettre à Juda en faisant ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: r
  children:
  - type: text
    text: 2Ch 33.18-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le reste de l''histoire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le livre des chroniques des rois de Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 14.19
      - type: usfm
