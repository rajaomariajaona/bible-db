document_id: 2KI.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Manassé, roi de Juda
  - type: heading
    content: 2Ch 33.1-10
  - type: text
    content: ' '
  - type: note
    content: 'Hephtsiba ( Mon plaisir est en elle ) : cf. Es 62.4n.'
  - type: text
    content: 'Manassé avait douze ans lorsqu''il devint roi ; il régna cinquante-cinq ans à Jérusalem. Le nom de sa mère était Hephtsiba. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: ses serviteurs, les prophètes 9.7 ; 14.25 ; 17.13,23 ; 24.2 ; Jr 7.25+ ; Ez 38.17 ; Dn 9.6 ; Am 3.7 ; Za 1.6 ; Esd 9.11.
  - type: text
    content: 'Alors, par l''intermédiaire de ses serviteurs, les prophètes, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : '
  '11':
  - type: note
    content: Cf. 24.3n.
  - type: text
    content: 'Parce que Manassé, roi de Juda, a commis ces abominations, parce qu''il a fait pire que tout ce qu''avaient fait avant lui les Amorites, et parce qu''il a aussi fait pécher Juda par ses idoles, '
  '12':
  - type: note
    content: 'en restera abasourdi  : litt. ses deux oreilles tinteront  ; cf. 1S 3.11n  ; Jr 19.3.'
  - type: text
    content: 'à cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Je fais venir sur Jérusalem et sur Juda un malheur tel que quiconque en entendra parler en restera abasourdi. '
  '13':
  - type: note
    content: 'Il faut sans doute comprendre que Manassé cumule à Jérusalem les fautes commises par Jéroboam, fondateur du royaume du Nord (Samarie), et par la dynastie d’Achab, associée au culte de Baal. En tout cas le châtiment de Jérusalem sera comparable à celui de Samarie. –  le cordeau  : cf. Lm 2.8. –  le niveau ou le fil à plomb  : cf. Es 28.17. –  je nettoierai ou détruirai  : cf. Gn 6.7 ; 7.4 ; Ex 17.14 ; 32.32s ; Dt 9.14 ; Es 25.8.'
  - type: text
    content: 'Je tendrai sur Jérusalem le cordeau de Samarie et le niveau de la maison d''Achab ; et je nettoierai Jérusalem, comme un plat qu''on nettoie en le renversant sens dessus dessous. '
  '14':
  - type: note
    content: 'ils seront pillés et dépouillés  : litt. ils deviendront butin et proie.'
  - type: text
    content: 'Je délaisserai le reste de mon patrimoine ; je les livrerai à leurs ennemis ; ils seront pillés et dépouillés par tous leurs ennemis, '
  '15':
  - type: note
    content: ce qui me déplaisait v. 2+.
  - type: text
    content: parce qu'ils ont fait ce qui me déplaisait, en me contrariant depuis le jour où leurs pères sont sortis d'Egypte jusqu'à ce jour.
  '16':
  - type: text
    content: ' '
  - type: note
    content: sang innocent Jr 7.6n. –  d'un bout à l'autre 10.21n. –  ce qui déplaisait… v. 2+.
  - type: text
    content: 'De plus, Manassé répandit beaucoup de sang innocent, jusqu''à en remplir Jérusalem d''un bout à l''autre, outre le péché qu''il fit commettre à Juda en faisant ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: 2Ch 33.18-20
  '17':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire de Manassé, tout ce qu''il a fait, le péché qu''il a commis, cela est écrit dans le livre des chroniques des rois de Juda. '
  '18':
  - type: note
    content: 'se coucha… 8.24+ ; 1R 1.21+. –  dans le jardin de sa maison (ou de son palais) : texte absent de LXX.'
  - type: text
    content: Manassé se coucha avec ses pères et fut enseveli dans le jardin de sa maison, dans le jardin d'Ouzza. Amôn, son fils, devint roi à sa place.
  - type: heading
    content: Amôn, roi de Juda
  - type: heading
    content: 2Ch 33.21-25
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Meshoullémeth signifie récompensée ou apaisée . –  Yotba  : connue par les écrits de Flavius Josèphe, cette ville a été identifiée avec le site moderne de Khirbet Jefat à 25 km à l''est de Haïfa et à 14 km au nord de Nazareth (à distinguer de Yotbata citée en Nb 33.33 ; Dt 10.7).'
  - type: text
    content: 'Amôn avait vingt-deux ans lorsqu''il devint roi ; il régna deux ans à Jérusalem. Le nom de sa mère était Meshoullémeth, fille de Harouts, de Yotba. '
  '2':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. v. 6,15s,20 ; 3.2n  ; 1R 11.6+. –  que le Seigneur …  : cf. Lv 18.24-30 ; Dt 18.9,12-14.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', imitant les abominations des nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédées devant les Israélites. '
  '20':
  - type: note
    content: ce qui déplaisait au Seigneur v. 2+.
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme l''avait fait son père Manassé ; '
  '21':
  - type: text
    content: 'il suivit en tout la voie qu''avait suivie son père ; il servit les idoles que son père avait servies et se prosterna devant elles ; '
  '22':
  - type: text
    content: 'il abandonna le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de ses pères, et ne suivit pas la voie du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'Les gens de la cour d''Amôn  : litt. les serviteurs d''Amôn  ; certains mss de LXX et la Vg portent les gens de sa cour, litt. ses serviteurs, cf. 2Ch 33.24. –  dans sa maison ou dans son palais.'
  - type: text
    content: 'Les gens de la cour d''Amôn conspirèrent contre lui. Ils mirent à mort le roi dans sa maison. '
  '24':
  - type: note
    content: 'le peuple du pays  : l''expression peut désigner l''ensemble de la population ou plus particulièrement les notables ; Jr 1.18n. –  investit… Josias  : cf. 1R 13.2n.'
  - type: text
    content: 'Mais le peuple du pays abattit tous ceux qui avaient conspiré contre le roi Amôn ; à sa place, le peuple du pays investit de la royauté Josias, son fils. '
  '25':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire d''Amôn, ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '26':
  - type: note
    content: 'Josias  : hébreu Yo''shiyahou.'
  - type: text
    content: On l'ensevelit dans son tombeau, dans le jardin d'Ouzza. Josias, son fils, devint roi à sa place.
  '3':
  - type: note
    content: 'poteau cultuel  : le même mot est traduit par Ashéra au v. 7 ; cf. Jg 3.7n.'
  - type: text
    content: 'Il rebâtit les hauts lieux qu''Ezéchias, son père, avait fait disparaître, il éleva des autels pour le Baal, il fit un poteau cultuel (une ashéra), comme l''avait fait Achab, roi d''Israël, il se prosterna devant toute l''armée du ciel et la servit. '
  '4':
  - type: note
    content: je placerai mon nom v. 7 ; Nb 6.27 ; Dt 12.5,21 ; 14.24 ; 1R 9.3.
  - type: text
    content: 'Il bâtit des autels dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit : « C''est à Jérusalem que je placerai mon nom. » '
  '5':
  - type: note
    content: 'dans les deux cours  : certains mss de LXX ont lu dans toutes les cours.'
  - type: text
    content: 'Il bâtit des autels pour toute l''armée du ciel dans les deux cours de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'son fils  : LXX ses fils. –  divination ou magie  ; cf. 17.17. –  Il installa  : autre traduction il fréquenta. –  ce qui lui déplaisait  : cf. v. 2+.'
  - type: text
    content: 'Il fit passer son fils par le feu ; il cherchait des présages et pratiquait la divination. Il installa des spirites et des médiums. Il contraria le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en faisant de plus en plus ce qui lui déplaisait. '
  '7':
  - type: note
    content: 'la statue de l''Ashéra  : cf. Jg 3.7n  ; autre traduction la statue, le poteau cultuel (l''ashéra). –  qu''il avait faite  : texte absent de LXX.'
  - type: text
    content: 'Il plaça la statue de l''Ashéra qu''il avait faite dans la maison dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit à David et à Salomon, son fils : « C''est dans cette maison et c''est dans Jérusalem, que j''ai choisie parmi toutes les tribus d''Israël, que je veux placer mon nom pour toujours. '
  '8':
  - type: note
    content: 'Israël  : litt. le pied d''Israël. –  de la terre  : litt. du sol, cf. Gn 2.5n. –  ordonné et instituée traduisent le même verbe hébreu. –  en suivant toute la loi…  : litt. et pour toute la loi…  ; LXX selon toute la loi…'
  - type: text
    content: 'Je ne ferai plus vagabonder Israël hors de la terre que j''ai donnée à ses pères, pourvu seulement qu''ils veillent à faire exactement ce que je leur ai ordonné, en suivant toute la loi que Moïse, mon serviteur, a instituée pour eux. » '
  '9':
  - type: text
    content: 'Mais ils n''écoutèrent pas ; Manassé les égara, de sorte qu''ils firent plus de mal que les nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait détruites devant les Israélites.'
