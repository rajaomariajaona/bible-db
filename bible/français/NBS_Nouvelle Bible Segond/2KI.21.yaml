      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il rebâtit les hauts lieux qu''Ezéchias, son père, avait fait disparaître, il éleva des autels pour le Baal, il fit un poteau cultuel (une ashéra), comme l''avait fait Achab, roi d''Israël, il se prosterna devant toute l''armée du ciel et la servit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je placerai mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7 ; Nb 6.27 ; Dt 12.5,21 ; 14.24 ; 1R 9.3.
    marker-yv: yv-n
  - type: text
    text: 'Il bâtit des autels dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', dont le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dit : « C''est à Jérusalem que je placerai mon nom. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans les deux cours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans toutes les cours.
    marker-yv: yv-n
  - type: text
    text: 'Il bâtit des autels pour toute l''armée du ciel dans les deux cours de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'divination '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
