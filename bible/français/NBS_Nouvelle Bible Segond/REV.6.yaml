    marker-yv: yv-n
  - type: text
    text: 'Je regardai quand l''agneau ouvrit un des sept sceaux, et j''entendis l''un des quatre êtres vivants dire d''une voix de tonnerre : Viens ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Za 1.8 ; 6.1-8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un cheval blanc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.11-14 et l''illustration.'
    marker-yv: yv-n
  - type: text
    text: Alors je vis un cheval blanc. Celui qui le montait tenait un arc ; une couronne lui fut donnée, et il partit en vainqueur et pour vaincre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 1+ ; 4.7.
    marker-yv: yv-n
  - type: text
    text: 'Quand il ouvrit le deuxième sceau, j''entendis le deuxième être vivant dire : Viens ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''entre-égorgent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Et un autre cheval, rouge feu, sortit. A celui qui le montait il fut donné d'ôter la paix de la terre, pour que les gens s'entre-égorgent ; et une grande épée lui fut donnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand il ouvrit le troisième sceau, j''entendis le troisième être vivant dire : Viens ! Alors je vis un cheval noir. Celui qui le montait tenait une balance à la main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2R 7.1 ; Ez 4.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une chénice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mesure gréco-romaine d''environ 52 litres. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un denier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit d''un prix anormalement élevé (annonce de la famine) ; cf. Mt 20.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne leur fais pas de mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Et j''entendis comme une voix au milieu des quatre êtres vivants ; elle disait : Une mesure de blé pour un denier, et trois mesures d''orge pour un denier ; quant à l''huile et au vin, ne leur fais pas de mal !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand il ouvrit le quatrième sceau, j''entendis la voix du quatrième être vivant dire : Viens ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la Mort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon certains mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: séjour
      - type: text
        text: ' des morts '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.18+ ; cf. Os 13.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le quart
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la peste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', terme qui correspond souvent au mot pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'peste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' (voir aussi Lc 21.11) ; cf. Jr 14.12 ; 15.2-4 ; 21.7 ; Ez 5.12,17 ; 14.21 ; 29.5 ; 33.27 ; Mt 24.4-7/ /.'
    marker-yv: yv-n
  - type: text
    text: Alors je vis un cheval verdâtre. Celui qui le montait avait pour nom la Mort, et le séjour des morts l'accompagnait. Pouvoir leur fut donné sur le quart de la terre, pour tuer par l'épée, par la famine, par la peste et par les bêtes sauvages de la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''autel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.3,5 ; 9.13 ; 11.1 ; 14.18 ; 16.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les âmes de ceux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le mot traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'âme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est aussi rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souffle de vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 8.9, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 12.11, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'être (vivant) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 16.3 ; cf. 18.13s ; 20.4 ; Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 10.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; ici la vie des martyrs est peut-être représentée par leur '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ', répandu comme celui d''un sacrifice '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'expiation
      - type: text
        text: ' sur l''autel (v. 11 ; cf. Lv 17.10ss). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'immolés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: égorgés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 20.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.2+,9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils avaient porté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils avaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 12.17 ; 19.10 ; 1Jn 5.10.
    marker-yv: yv-n
  - type: text
    text: 'Quand il ouvrit le cinquième sceau, je vis sous l''autel les âmes de ceux qui avaient été immolés à cause de la parole de Dieu et du témoignage qu''ils avaient porté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils crièrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils crièrent d'une grande voix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; formules analogues 7.2,10 ; 10.3 ; 14.15,18 ; 18.2 ; 19.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jusqu''à quand… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ha 1.2 ; Za 1.12 ; Ps 79.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 4.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: ' et vrai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'venger notre sang… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(16.6 ; 17.6 ; 18.24 ; 19.2) : cf. 11.18 ; 18.20 ; Dt 32.43 ; 2R 9.7 ; Ps 79.10 ; Lc 18.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux habitants… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.10+.
    marker-yv: yv-n
  - type: text
    text: 'Ils crièrent : Jusqu''à quand, Maître saint et vrai, tardes-tu à juger, à venger notre sang en le faisant payer aux habitants de la terre ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une robe blanche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''à ce que soient au complet… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.4ss ; cf. Hé 11.40 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esdras
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.35s : « Les âmes des justes dans leurs demeures n''ont-elles pas posé les mêmes questions que toi : “Jusques à quand serons-nous ici ? Quand récolterons-nous les fruits de notre récompense ?” Et l''archange Jérémiel leur répondit : “Jusqu''à ce que soit atteint le nombre de vos semblables.” » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'compagnons d''esclavage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.1+ ; 7.3 ; 19.10 ; 22.9 ; Mt 18.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss ; Col 1.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui allaient être tués
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui étaient sur le point d''être tués '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 3.2).
    marker-yv: yv-n
  - type: text
    text: Une robe blanche fut donnée à chacun d'eux, et il leur fut dit de se tenir en repos quelque temps encore, jusqu'à ce que soient au complet leurs compagnons d'esclavage et leurs frères qui allaient être tués comme eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tremblement de terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.5 ; 11.13,19 ; 16.18 ; cf. Jr 10.22 ; Ez 38.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'soleil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lune '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.12 ; Es 13.10 ; Ez 32.7s ; Jl 2.10 ; 3.4 ; 4.15 ; Mt 24.29/ / ; Ac 2.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme un sac '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 11.3 ; Es 50.3 ; allusion probable à un signe de deuil, de tristesse ou de pénitence traditionnel chez les Juifs.
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que je vis quand il ouvrit le sixième sceau : il y eut un grand tremblement de terre ; le soleil devint noir comme un sac de crin ; la lune entière devint comme du sang, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'figuier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 34.4.
    marker-yv: yv-n
  - type: text
    text: 'et les étoiles du ciel tombèrent sur la terre, comme lorsqu''un figuier secoué par un grand vent laisse tomber ses figues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le ciel se retira… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.11 ; cf. Hé 1.12. –  '
    - type: usfm
