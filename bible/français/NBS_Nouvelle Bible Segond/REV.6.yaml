document_id: REV.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ouverture des six premiers sceaux
  - type: text
    content: ' '
  - type: note
    content: quand l'agneau ouvrit… 5.1-7. –  êtres vivants 4.6+. –  d'une voix (litt. comme d'une voix ) de tonnerre 14.2 ; 19.6. –  Viens ! cf. 22.17,20 ; certains mss portent Viens et vois.
  - type: text
    content: 'Je regardai quand l''agneau ouvrit un des sept sceaux, et j''entendis l''un des quatre êtres vivants dire d''une voix de tonnerre : Viens ! '
  '10':
  - type: note
    content: 'Ils crièrent  : litt. ils crièrent d''une grande voix  ; formules analogues 7.2,10 ; 10.3 ; 14.15,18 ; 18.2 ; 19.17. –  Jusqu''à quand… Ha 1.2 ; Za 1.12 ; Ps 79.5. –  Maître Ac 4.24+. –  saint et vrai 3.7+. –  venger notre sang… (16.6 ; 17.6 ; 18.24 ; 19.2) : cf. 11.18 ; 18.20 ; Dt 32.43 ; 2R 9.7 ; Ps 79.10 ; Lc 18.7. –  aux habitants… 3.10+.'
  - type: text
    content: 'Ils crièrent : Jusqu''à quand, Maître saint et vrai, tardes-tu à juger, à venger notre sang en le faisant payer aux habitants de la terre ? '
  '11':
  - type: note
    content: 'Une robe blanche 3.4+. –  jusqu''à ce que soient au complet… 7.4ss ; cf. Hé 11.40 ; 4 Esdras 4.35s : « Les âmes des justes dans leurs demeures n''ont-elles pas posé les mêmes questions que toi : “Jusques à quand serons-nous ici ? Quand récolterons-nous les fruits de notre récompense ?” Et l''archange Jérémiel leur répondit : “Jusqu''à ce que soit atteint le nombre de vos semblables.” » –  compagnons d''esclavage ou de service  : cf. 1.1+ ; 7.3 ; 19.10 ; 22.9 ; Mt 18.28nss ; Col 1.7+. –  qui allaient être tués  : autre traduction qui étaient sur le point d''être tués (cf. 3.2).'
  - type: text
    content: Une robe blanche fut donnée à chacun d'eux, et il leur fut dit de se tenir en repos quelque temps encore, jusqu'à ce que soient au complet leurs compagnons d'esclavage et leurs frères qui allaient être tués comme eux.
  '12':
  - type: text
    content: ' '
  - type: note
    content: tremblement de terre 8.5 ; 11.13,19 ; 16.18 ; cf. Jr 10.22 ; Ez 38.19. –  soleil / lune 8.12 ; Es 13.10 ; Ez 32.7s ; Jl 2.10 ; 3.4 ; 4.15 ; Mt 24.29/ / ; Ac 2.20. –  comme un sac 11.3 ; Es 50.3 ; allusion probable à un signe de deuil, de tristesse ou de pénitence traditionnel chez les Juifs.
  - type: text
    content: 'Voici ce que je vis quand il ouvrit le sixième sceau : il y eut un grand tremblement de terre ; le soleil devint noir comme un sac de crin ; la lune entière devint comme du sang, '
  '13':
  - type: note
    content: figuier Es 34.4.
  - type: text
    content: 'et les étoiles du ciel tombèrent sur la terre, comme lorsqu''un figuier secoué par un grand vent laisse tomber ses figues. '
  '14':
  - type: note
    content: 'Le ciel se retira… 20.11 ; cf. Hé 1.12. –  livre  : cf. 5.1n  ; Es 34.4. –  montagnes / îles 16.20 ; cf. Jr 4.24 ; Ez 26.15,18 ; 38.20 ; Na 1.5 ; Ps 46.3s. –  enlevées… 2.5n.'
  - type: text
    content: Le ciel se retira tel un livre qu'on roule, et toutes les montagnes et les îles furent enlevées de leur place.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Les rois… 19.18 ; cf. Es 24.21 ; 34.12. –  dignitaires  : autre traduction grands  : même terme en 18.23 ; terme apparenté en 11.18+ ; cf. Mc 6.21n. –  esclaves (cf. 1.1n) / hommes libres  : voir aussi 13.16 ; 19.18. –  cavernes / rochers Es 2.10,19,21 ; Jr 4.29.'
  - type: text
    content: 'Les rois de la terre, les dignitaires, les chefs militaires, les riches, les puissants, tous, esclaves et hommes libres, allèrent se cacher dans les cavernes et dans les rochers des montagnes. '
  '16':
  - type: note
    content: 'Cf. 9.6 ; Es 2.10,19,21 ; Os 10.8  ; Lc 23.30. –  de celui  : litt. de la face de celui. –  qui est assis… 4.2+. –  l''agneau 5.6.'
  - type: text
    content: 'Et ils disaient aux montagnes et aux rochers : Tombez sur nous, cachez-nous'
  - type: text
    content: ' de celui qui est assis sur le trône et de la colère de l''agneau, '
  '17':
  - type: note
    content: 'le grand jour de leur colère  : cf. 11.18 ; Ez 7.19 ; Jl 2.1,11 ; 3.4 ; So 1.14s ; 2.2s ; Ps 110.5 ; Rm 2.5. –  tenir debout ou tenir  ; cf. Na 1.6 ; Ml 3.2 ; même verbe en Lc 21.36.'
  - type: text
    content: car le grand jour de leur colère est venu, et qui pourrait tenir debout ?
  '2':
  - type: note
    content: 'Cf. Za 1.8 ; 6.1-8. –  un cheval blanc  : cf. 19.11-14 et l''illustration.'
  - type: text
    content: Alors je vis un cheval blanc. Celui qui le montait tenait un arc ; une couronne lui fut donnée, et il partit en vainqueur et pour vaincre.
  '3':
  - type: text
    content: ' '
  - type: note
    content: V. 1+ ; 4.7.
  - type: text
    content: 'Quand il ouvrit le deuxième sceau, j''entendis le deuxième être vivant dire : Viens ! '
  '4':
  - type: note
    content: Voir paix. –  s'entre-égorgent 5.6n.
  - type: text
    content: Et un autre cheval, rouge feu, sortit. A celui qui le montait il fut donné d'ôter la paix de la terre, pour que les gens s'entre-égorgent ; et une grande épée lui fut donnée.
  '5':
  - type: text
    content: 'Quand il ouvrit le troisième sceau, j''entendis le troisième être vivant dire : Viens ! Alors je vis un cheval noir. Celui qui le montait tenait une balance à la main. '
  '6':
  - type: note
    content: 'Cf. 2R 7.1 ; Ez 4.16. –  Une mesure  : litt. une chénice, mesure gréco-romaine d''environ 52 litres. –  un denier  : il s''agit d''un prix anormalement élevé (annonce de la famine) ; cf. Mt 20.2. –  ne leur fais pas de mal 2.11n.'
  - type: text
    content: 'Et j''entendis comme une voix au milieu des quatre êtres vivants ; elle disait : Une mesure de blé pour un denier, et trois mesures d''orge pour un denier ; quant à l''huile et au vin, ne leur fais pas de mal !'
  '7':
  - type: text
    content: 'Quand il ouvrit le quatrième sceau, j''entendis la voix du quatrième être vivant dire : Viens ! '
  '8':
  - type: note
    content: 'Voir nom. –  la Mort ou Mort, selon certains mss. –  séjour des morts 1.18+ ; cf. Os 13.14. –  le quart  : cf. 8.7+. –  la peste  : litt. la mort, terme qui correspond souvent au mot pour peste dans LXX (voir aussi Lc 21.11) ; cf. Jr 14.12 ; 15.2-4 ; 21.7 ; Ez 5.12,17 ; 14.21 ; 29.5 ; 33.27 ; Mt 24.4-7/ /.'
  - type: text
    content: Alors je vis un cheval verdâtre. Celui qui le montait avait pour nom la Mort, et le séjour des morts l'accompagnait. Pouvoir leur fut donné sur le quart de la terre, pour tuer par l'épée, par la famine, par la peste et par les bêtes sauvages de la terre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'l''autel 8.3,5 ; 9.13 ; 11.1 ; 14.18 ; 16.7. –  les âmes de ceux  : autre traduction ceux  ; le mot traduit par âme est aussi rendu par souffle de vie en 8.9, vie en 12.11, être (vivant) en 16.3 ; cf. 18.13s ; 20.4 ; Gn 1.20n  ; Mt 10.28n  ; ici la vie des martyrs est peut-être représentée par leur sang, répandu comme celui d''un sacrifice d''expiation sur l''autel (v. 11 ; cf. Lv 17.10ss). –  immolés ou égorgés  : cf. 5.6n  ; voir aussi 20.4. –  parole / témoignage 1.2+,9. –  qu''ils avaient porté  : litt. qu''ils avaient  ; cf. 12.17 ; 19.10 ; 1Jn 5.10.'
  - type: text
    content: 'Quand il ouvrit le cinquième sceau, je vis sous l''autel les âmes de ceux qui avaient été immolés à cause de la parole de Dieu et du témoignage qu''ils avaient porté. '
