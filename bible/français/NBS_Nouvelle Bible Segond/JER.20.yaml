    marker-yv: yv-n
  - type: text
    text: 'Je livrerai toutes les réserves de cette ville, tout le produit de son travail, tout ce qu''elle a de précieux, je livrerai tous les trésors des rois de Juda à leurs ennemis, qui en feront leur butin ; ils les prendront et les emporteront à Babylone. '
