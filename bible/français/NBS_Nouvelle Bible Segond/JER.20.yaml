  - type: text
    text: 'Quant à toi, Pashhour, et à tous ceux qui habitent dans ta maison, vous irez en captivité ; tu iras à Babylone : c''est là que tu mourras, c''est là que tu seras enseveli, toi et tous tes amis pour lesquels tu as parlé en prophète par le mensonge.'
