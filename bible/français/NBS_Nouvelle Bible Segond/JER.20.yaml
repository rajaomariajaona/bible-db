document_id: JER.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie mis aux entraves
  - type: text
    content: ' '
  - type: note
    content: 'Pashhour (v. 3n,6) , fils d''Immer (Esd 2.37 ; 1Ch 9.12 ; 24.14) à ne pas confondre avec celui de 21.1+. –  inspecteur  : le même mot hébreu est traduit par préposé en 52.25. –  prononcer… 19.14n  ; 2.8n.'
  - type: text
    content: 'Pashhour, fils d''Immer, le prêtre, inspecteur en chef de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', entendit Jérémie prononcer ces paroles en prophète. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 31.14. –  Effroi de tous côtés v. 3n  ; il s''agit probablement d''une reprise ironique des propos de Jérémie par ses adversaires ; on a aussi compris qu''ici Jérémie parle des menaces qu''il subit, de même dans la suite. –  Annoncez ! Annonçons-le  : même verbe 4.5 ; 5.20 etc. ; autre traduction dénoncez et nous le dénoncerons ! –  Tous mes amis  : litt. tout homme de ma paix , expression analogue à celle de 38.22 ; Ab 7 ; Ps 41.10. –  si je vais chanceler  : cf. Ps 35.15 ; 56.7 ; 71.10 ; Mc 3.2. –  duper nous l''emporterons sur lui  : cf. v. 7.'
  - type: text
    content: 'Car j''apprends les mauvais propos d''une multitude :'
  - type: text
    content: Effroi de tous côtés !
  - type: text
    content: Annoncez ! Annonçons-le !
  - type: text
    content: – Tous mes amis m'observent
  - type: text
    content: 'pour voir si je vais chanceler :'
  - type: text
    content: Peut-être se laissera-t-il duper,
  - type: text
    content: et nous l'emporterons sur lui,
  - type: text
    content: nous nous vengerons de lui !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'comme un héros (ou un guerrier ) brutal  : cf. 32.18 ; Ex 15.3 ; Es 42.13. –  mes persécuteurs… 17.18+ ; Ps 40.15. –  confusion pour toujours ou éternelle 23.40.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec moi comme un héros brutal ;'
  - type: text
    content: c'est pourquoi mes persécuteurs trébucheront
  - type: text
    content: et ne l'emporteront pas.
  - type: text
    content: 'Ils auront bien honte de n''avoir pas réussi :'
  - type: text
    content: ce sera une confusion pour toujours ; on ne l'oubliera pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'sonde (ou éprouve ) le juste  : quelques mss hébreux et plusieurs versions anciennes portent sonde avec justice , tournure analogue à est un juge juste en 11.20n  ; cf. 2Ch 16.9. –  les reins et les cœurs 11.20+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées sonde le juste,'
  - type: text
    content: il voit les reins et les cœurs.
  - type: text
    content: Que je voie ta vengeance contre eux,
  - type: text
    content: car c'est à toi que j'ai confié ma cause !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Chantez Ps 96.1. –  louez Ps 106.1 ; 148.1. –  le pauvre  : autre traduction la vie du pauvre  ; cf. 15.21+ ; 39.17 ; Ps 97.10 ; Jb 5.15.'
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', louez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car il délivre le pauvre
  - type: text
    content: de la main des mauvais.
  - type: heading
    content: Jérémie regrette d'être né
  '14':
  - type: text
    content: ' '
  - type: note
    content: 15.10+ ; cf. Jb 3.3.
  - type: text
    content: Maudit soit le jour où je suis né !
  - type: text
    content: Le jour où ma mère m'a mis au monde, qu'il ne soit pas béni !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Maudit  : voir bénédiction. –  celui  : litt. l''homme  ; certains modifient la vocalisation traditionnelle du texte hébreu pour lire celui au sujet de qui on porta…'
  - type: text
    content: 'Maudit soit celui qui porta à mon père la bonne nouvelle :'
  - type: text
    content: « Un fils, un mâle, est né de toi ! »
  - type: text
    content: – et qui le combla de joie !
  '16':
  - type: text
    content: ' '
  - type: note
    content: villes… détruites 49.18 ; 50.40 ; Gn 19.21+ ; cf. Es 1.8s ; Am 4.11. –  sans regret ou sans pitié . –  Qu'il entende des cris 18.22. –  acclamations ( guerrières sous-entendu dans le texte) 49.2+.
  - type: text
    content: Que celui-là soit comme les villes
  - type: text
    content: 'que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a détruites sans regret !'
  - type: text
    content: Qu'il entende des cris dès le matin,
  - type: text
    content: et des acclamations guerrières à l'heure de midi !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Jb 3.11 ; 10.18s ; cf. 4 Esdras 5.35 : « Pourquoi, Seigneur ? Pourquoi suis-je né ? Pourquoi le sein maternel n''a-t-il pas été ma tombe ? Je n''aurais pas vu la misère de Jacob et la détresse des enfants d''Israël. »'
  - type: text
    content: Que ne m'a-t-il fait mourir depuis le ventre de ma mère ?
  - type: text
    content: Ma mère aurait été ma tombe
  - type: text
    content: et sa grossesse n'aurait jamais atteint son terme.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pourquoi suis-je sorti… Jb 3.10,20 ; 10.18. –  achever mes jours Ps 31.10s.
  - type: text
    content: Pourquoi suis-je sorti du ventre de ma mère
  - type: text
    content: si je dois voir l'oppression et la douleur
  - type: text
    content: et achever mes jours dans la honte ?
  '2':
  - type: note
    content: 'entraves 29.26 ; 2Ch 16.10n  ; parce que le mot hébreu vient d''une racine qui signifie habituellement renverser ou courber, certains pensent qu''il s''agissait d''une sorte de pilori ; sur les mauvais traitements subis par Jérémie, cf. 26.7-11 ; 36.26 ; 37.11-16 ; 38.4-6 ; Mt 21.35 ; Hé 11.36. –  porte Haute de Benjamin  : peut-être une porte du temple (dans la maison du Seigneur) située en face de la porte de la ville mentionnée en 37.13 ; 38.7, c.-à-d. probablement au nord ou nord-est ; cf. 26.10+ ; comparer avec 2R 15.35 ; Ez 9.2 ; 2Ch 23.20 ; 27.3.'
  - type: text
    content: 'Pashhour frappa Jérémie, le prophète, et le mit aux entraves à la porte Haute de Benjamin, dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: Le nom de Pashhour (v. 1n) pourrait être interprété, d'après l'araméen, sois fécond de tous côtés, d'où peut-être son changement en Magor-Missabib ou effroi de tous côtés (v. 10) ; même expression en 6.25n. Outre l’Effroi (v. 4) ou l'épouvante (Es 31.9), le terme hébreu magor peut évoquer, par homonymie, la condition de l'immigré (Gn 17.8 ; Ex 12.48n  ; cf. v. 6) et peut-être l'assaut d'un ennemi (v. 5).
  - type: text
    content: 'Le lendemain, Pashhour fit sortir Jérémie des entraves. Alors Jérémie lui dit : Ce n''est pas du nom de Pashhour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a appelé, mais du nom de Magor-Missabib (« Effroi de tous côtés »). '
  '4':
  - type: note
    content: 'Je te livre…  : autre traduction je fais de toi un effroi (v. 3n) pour toi-même (précision absente dans LXX) et pour tous tes amis  ; cf. Ps 31.12. –  roi de Babylone 25.1 ; 46.2 ; cf. 1.14n  ; 2Ch 33.11.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je te livre à l''effroi, toi et tous tes amis ; ils tomberont par l''épée de leurs ennemis, et tes yeux le verront. Je livrerai aussi tout Juda au roi de Babylone, qui les exilera à Babylone et les tuera d''un coup d''épée. '
  '5':
  - type: note
    content: Cf. 2R 20.17 ; 21.14 ; 24.13 ; Es 39.6.
  - type: text
    content: 'Je livrerai toutes les réserves de cette ville, tout le produit de son travail, tout ce qu''elle a de précieux, je livrerai tous les trésors des rois de Juda à leurs ennemis, qui en feront leur butin ; ils les prendront et les emporteront à Babylone. '
  '6':
  - type: note
    content: Pashhour a probablement été exilé en 597, à l'issue du premier siège de Jérusalem (2R 24.14) ; en effet, il semble qu'après cette date quelqu'un d'autre a occupé sa fonction au temple (29.1s,25s). –  parlé en prophète par le mensonge 5.31n.
  - type: text
    content: 'Quant à toi, Pashhour, et à tous ceux qui habitent dans ta maison, vous irez en captivité ; tu iras à Babylone : c''est là que tu mourras, c''est là que tu seras enseveli, toi et tous tes amis pour lesquels tu as parlé en prophète par le mensonge.'
  - type: heading
    content: Jérémie avoue à Dieu qu'il n'en peut plus
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Confessions de Jérémie 11.18+ ; cf. 15.16-18. –  dupé  : cf. 1.7 ; 4.10 ; le même verbe, qui apparaît aussi au v. 10, peut également avoir le sens de séduire  ; cf. Ex 22.15 ; Jg 14.15 ; 16.5 ; 2S 3.25 ; 1R 22.20-22 ; Ez 14.9 ; Os 2.16. –  tu m''as saisi  : autre traduction tu as été plus fort que moi  ; cf. Dt 22.25 ; 2S 13.14. –  sans cesse  : litt. tout le jour . –  dérision  : cf. 15.17 ; 48.26 ; Ez 23.32 ; Ps 44.14 ; Lm 3.14 ; Sagesse 5.4 (confession des impies devant le juste glorifié) : « C''est lui que jadis nous tournions en ridicule et dont nous faisions un objet de sarcasme. Insensés, nous avons jugé sa vie une pure folie et sa mort déshonorante. »'
  - type: text
    content: 'Tu m''as dupé, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et je me suis laissé duper ;
  - type: text
    content: tu m'as saisi, et tu l'as emporté.
  - type: text
    content: Je suis sans cesse en butte à la dérision,
  - type: text
    content: tout le monde se moque de moi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 18 ; 6.7,10n  ; 15.10,15. –  toutes les fois…  : autre traduction toutes les fois que je parle, que je crie, que je proclame « Violence et ravage », la parole du Seigneur m''expose… –  La parole…  : autre traduction la parole du Seigneur m''est parvenue (cf. 1.2n) pour le déshonneur et les railleries.'
  - type: text
    content: Car toutes les fois que je parle, je crie,
  - type: text
    content: 'je proclame : « Violence et ravage ! »'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''expose sans cesse'
  - type: text
    content: aux outrages et aux railleries.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Je ne l''évoquerai plus  : autre traduction je ne me souviendrai plus de lui . –  je ne parlerai plus  : cf. Jon 1.3. – Voir cœur. –  feu 5.14+ ; cf. 6.11 ; Am 3.8 ; Ps 39.3s ; Jb 32.18s ; 1Co 9.16.'
  - type: text
    content: 'Si je dis :'
  - type: text
    content: « Je ne l'évoquerai plus,
  - type: text
    content: je ne parlerai plus en son nom »,
  - type: text
    content: c'est dans mon cœur comme un feu dévorant,
  - type: text
    content: enfermé dans mes os ;
  - type: text
    content: je me fatigue à le contenir, et je n'y parviens pas.
  - type: heading
    content: Le prophète s'en remet à Dieu
