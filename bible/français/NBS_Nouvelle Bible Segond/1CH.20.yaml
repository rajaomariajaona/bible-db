    marker-yv: yv-n
  - type: text
    text: Quant au peuple qui s'y trouvait, il le fit sortir ; il le condamna aux scies, aux herses de fer et aux haches ; il traita de même toutes les villes des Ammonites. Puis David revint à Jérusalem avec toutes les troupes.
