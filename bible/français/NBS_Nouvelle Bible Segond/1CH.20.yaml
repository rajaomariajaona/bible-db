document_id: 1CH.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joab s'empare de Rabba
  - type: heading
    content: 2S 11.1  ; 12.26-31
  - type: text
    content: ' '
  - type: note
    content: 'Joab est ici sujet de l''action ; en 2S 11.1, David envoya Joab… –  Joab battit Rabba et la rasa  : les Chroniques, après avoir laissé de côté tout l''épisode relatif à David et Bethsabée (voir 2S 11.2–12.25), résument en ces quelques mots le texte de 2S 12.26-29.'
  - type: text
    content: 'Au temps de l''année nouvelle, au temps où les rois partent en campagne, Joab, à la tête d''une forte armée, détruisit le pays des Ammonites et vint assiéger Rabba. David, lui, resta à Jérusalem. Joab battit Rabba et la rasa. '
  '2':
  - type: note
    content: 'Voir 2S 12.30n. –  couronne…  : cf. Ap 14.14.'
  - type: text
    content: 'David prit la couronne de la tête de son roi : telle qu''il la trouva, son poids était d''un talent – un talent d''or – et elle était garnie d''une pierre précieuse. Elle fut dès lors sur la tête de David. Il emporta de la ville un très grand butin. '
  '3':
  - type: note
    content: 'le condamna  : litt. le scia, c.-à-d. le supplicia (au moyen de…) ; cf. 2S 12.31n. –  aux haches  : d''après 2S 12.31 (haches de fer) ; ici l''hébreu répète, au pluriel, le premier des trois mots de la liste aux scies. En hébreu, les deux mots correspondants à scies et haches ne diffèrent que d''une lettre.'
  - type: text
    content: Quant au peuple qui s'y trouvait, il le fit sortir ; il le condamna aux scies, aux herses de fer et aux haches ; il traita de même toutes les villes des Ammonites. Puis David revint à Jérusalem avec toutes les troupes.
  - type: heading
    content: Combats contre les Philistins
  - type: heading
    content: 2S 21.18-22
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Guézer Jg 1.29+ ; cf. 2S 21.18 Gob . –  humiliés  : cf. 1S 7.13+.'
  - type: text
    content: Après cela, un combat eut lieu à Guézer avec les Philistins. Alors Sibbekaï, le Houshatite, tua Sippaï, un descendant des Rephaïtes, et ils furent humiliés.
  '5':
  - type: text
    content: ' '
  - type: note
    content: En 2S 21.19, la victime d’ Elhanân porte le nom de Goliath.
  - type: text
    content: Le combat reprit avec les Philistins. Elhanân, fils de Yaïr, tua Lahmi, le frère de Goliath, le Gatite, qui avait une lance dont le bois était comme l'ensouple des tisserands.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'de haute taille  : litt. de mesure  ; cf. 2S 21.20n.'
  - type: text
    content: 'Il y eut encore un combat à Gath. Il y avait là un homme de haute taille, qui avait six doigts à chaque membre, vingt-quatre en tout, et qui était également issu de Rapha. '
  '7':
  - type: note
    content: 'défia  : autres traductions outragea, déshonora  ; cf. 1S 17.10n.'
  - type: text
    content: 'Il défia Israël, et Jonathan, fils de Shiméa, frère de David, le tua. '
  '8':
  - type: text
    content: Ces hommes de Gath étaient issus de Rapha. Ils tombèrent sous les coups de David et de ses hommes.
