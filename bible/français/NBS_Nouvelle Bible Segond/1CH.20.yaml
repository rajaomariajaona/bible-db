    marker-yv: yv-n
  - type: text
    text: Le combat reprit avec les Philistins. Elhanân, fils de Yaïr, tua Lahmi, le frère de Goliath, le Gatite, qui avait une lance dont le bois était comme l'ensouple des tisserands.
