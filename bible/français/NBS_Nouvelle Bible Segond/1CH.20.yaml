    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les Chroniques, après avoir laissé de côté tout l''épisode relatif à David et Bethsabée (voir 2S 11.2–12.25), résument en ces quelques mots le texte de 2S 12.26-29.'
    marker-yv: yv-n
  - type: text
    text: 'Au temps de l''année nouvelle, au temps où les rois partent en campagne, Joab, à la tête d''une forte armée, détruisit le pays des Ammonites et vint assiéger Rabba. David, lui, resta à Jérusalem. Joab battit Rabba et la rasa. '
  - type: usfm
