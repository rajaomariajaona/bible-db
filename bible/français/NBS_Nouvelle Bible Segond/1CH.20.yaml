        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: couronne…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ap 14.14.'
    marker-yv: yv-n
  - type: text
    text: 'David prit la couronne de la tête de son roi : telle qu''il la trouva, son poids était d''un talent – un talent d''or – et elle était garnie d''une pierre précieuse. Elle fut dès lors sur la tête de David. Il emporta de la ville un très grand butin. '
