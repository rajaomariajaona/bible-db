document_id: PSA.119,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mystères et merveilles de la loi de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Psaume alphabétique (9.1n  ; 25.1n), composé de 22 strophes de huit versets chacune où chaque verset commence par la même lettre de l''alphabet. Il consiste en variations sur le thème de la loi , évoqué par un jeu de synonymes  : préceptes, voies, directives, prescriptions, commandements, règles, parole, promesse  ; cf. 19.8ss ; voir aussi Dt 6.6ss ; Jos 1.8. –  Heureux… 1.1n  ; 84.12s ; 128.1 ; Pr 8.32 ; 29.18 ; Lc 11.28. –  ceux qui sont intègres…  : autres traductions ceux dont la voie est intègre ; ceux qui suivent la voie de l''intégrité.'
  - type: text
    content: Heureux ceux qui sont intègres dans leur voie,
  - type: text
    content: 'ceux qui suivent la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Je te cherche… Jr 29.13s. –  ne me laisse pas m''égarer ou ne m''égare pas  : cf. v. 21,118 ; Lv 4.13n  ; autre verbe au v. 67 ; voir aussi v. 110,176 ; 139.24.'
  - type: text
    content: Je te cherche de tout mon cœur ;
  - type: text
    content: ne me laisse pas m'égarer loin de tes commandements !
  '100':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Sagesse 8.10 : « Grâce à elle (la sagesse), j''aurai de la gloire auprès des foules et, bien que jeune, je jouirai de la considération des vieillards. »'
  - type: text
    content: J'ai plus d'intelligence que les vieillards,
  - type: text
    content: car je garde tes directives.
  '101':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 1.15. –  mes pieds  : litt. mon pied.'
  - type: text
    content: Je retiens mes pieds loin de toute voie mauvaise,
  - type: text
    content: pour observer ta parole.
  '102':
  - type: text
    content: ' '
  - type: note
    content: 18.23.
  - type: text
    content: Je ne m'écarte pas de tes règles
  - type: text
    content: car c'est toi qui me les enseignes.
  '103':
  - type: text
    content: ' '
  - type: note
    content: '19.11+ ; Jr 15.16 ; Ez 3.3 ; Ap 10.9. –  tes paroles  : autre texte ta parole (v. 11n). –  ma bouche / mon palais  : les termes sont intervertis par rapport à la traduction habituelle de l''hébreu ; en hébreu le palais est considéré non seulement comme organe du goût, mais aussi comme organe de la parole (comme la bouche, la langue, les lèvres).'
  - type: text
    content: Que tes paroles sont douces à ma bouche,
  - type: text
    content: plus que le miel à mon palais !
  '104':
  - type: text
    content: ' '
  - type: note
    content: je déteste… v. 128.
  - type: text
    content: Par tes directives je deviens intelligent,
  - type: text
    content: aussi je déteste toute voie de mensonge.
  '105':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 6.23 ; cf. Jn 8.12 ; Sagesse 18.4 : « La lumière incorruptible de la Loi. »'
  - type: text
    content: Ta parole est une lampe pour mes pieds,
  - type: text
    content: une lumière pour mon sentier.
  '106':
  - type: text
    content: ' '
  - type: note
    content: Né 10.30.
  - type: text
    content: 'Je le jure, et je m''y tiendrai :'
  - type: text
    content: j'observerai les règles de ta justice.
  '107':
  - type: text
    content: ' '
  - type: note
    content: très affligé v. 50,67,71,75,92 ; 116.10 ; cf. 38.9 ; 70.6.
  - type: text
    content: 'Je suis très affligé :'
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi vivre selon ta parole !'
  '108':
  - type: text
    content: ' '
  - type: note
    content: 'agrée 19.15 ; 104.34. –  l''offrande de mes lèvres  : litt. l''offrande volontaire de ma bouche  ; cf. 50.14,23 ; 51.17ss ; Lv 7.16+.'
  - type: text
    content: 'Je t''en prie, '
  - type: text
    content: Seigneur
  - type: text
    content: ', agrée l''offrande de mes lèvres ;'
  - type: text
    content: apprends-moi tes règles !
  '109':
  - type: text
    content: ' '
  - type: note
    content: 'Ma vie…  : cf. Jb 13.14n.'
  - type: text
    content: Ma vie est constamment exposée,
  - type: text
    content: mais je n'oublie pas ta loi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'dans mon cœur  : cf. 37.31 ; 40.9 ; Dt 6.6ss ; 30.14 ; Es 51.7 ; Jr 31.33 ; voir aussi Dn 7.28 ; Lc 2.19,51. –  ce que tu as dit  : litt. ta parole (ainsi v. 82,103,140,172) ; dans ce psaume, on a généralement traduit ainsi le substantif hébreu correspondant, qui apparaît aussi en 12.7 ; 18.31 ; 105.19 ; 138.2 ; 147.15, afin de le distinguer de son synonyme plus courant (v. 9,17 etc.) ; voir aussi v. 123n. – Voir péché.'
  - type: text
    content: Je serre dans mon cœur ce que tu as dit,
  - type: text
    content: pour ne pas pécher contre toi.
  '110':
  - type: text
    content: ' '
  - type: note
    content: un piège 9.16 ; Jr 9.7. –  je ne m'égare pas… v. 10n.
  - type: text
    content: Des méchants me tendent un piège,
  - type: text
    content: mais je ne m'égare pas loin de tes directives.
  '111':
  - type: text
    content: ' '
  - type: note
    content: la gaieté de mon cœur v. 14 ; Jr 15.16.
  - type: text
    content: 'Tes préceptes sont pour toujours mon patrimoine :'
  - type: text
    content: ils sont la gaieté de mon cœur.
  '112':
  - type: text
    content: ' '
  - type: note
    content: 19.12. –  toujours, jusqu'à la fin v. 33n  ; certains comprennent ici c'est pour toujours ma récompense.
  - type: text
    content: J'incline mon cœur à mettre tes prescriptions en pratique,
  - type: text
    content: toujours, jusqu'à la fin.
  '113':
  - type: text
    content: ' '
  - type: note
    content: 'les hommes indécis  : cf. Mt 6.24 ; Jc 1.8n.'
  - type: text
    content: Je déteste les hommes indécis
  - type: text
    content: et j'aime ta loi.
  '114':
  - type: text
    content: ' '
  - type: note
    content: 'bouclier 3.4+ ; 28.7. –  j''attends…  : cf. v. 43+.'
  - type: text
    content: 'Tu es ma cachette et mon bouclier :'
  - type: text
    content: j'attends ta parole.
  '115':
  - type: text
    content: ' '
  - type: note
    content: Ecartez-vous 6.9+ ; 139.19.
  - type: text
    content: Ecartez-vous de moi, mauvais,
  - type: text
    content: que je garde les commandements de mon Dieu !
  '116':
  - type: text
    content: ' '
  - type: note
    content: Soutiens-moi 18.36 ; 63.9. –  ce que tu as dit v. 11n. –  et je vivrai ou afin que je vive  ; cf. Ph 1.20.
  - type: text
    content: Soutiens-moi selon ce que tu as dit, et je vivrai ;
  - type: text
    content: ne me rends pas honteux de mon espoir !
  '117':
  - type: text
    content: ' '
  - type: note
    content: 'que j''aie constamment les yeux  : plusieurs versions anciennes ont lu que je me délecte de tes prescriptions  ; cf. v. 16+.'
  - type: text
    content: Soutiens-moi, pour que je sois sauvé
  - type: text
    content: et que j'aie constamment les yeux sur tes prescriptions !
  '118':
  - type: text
    content: ' '
  - type: note
    content: 'leur tromperie  : plusieurs versions anciennes ont lu leur dessein, leur pensée.'
  - type: text
    content: Tu repousses tous ceux qui s'égarent loin de tes prescriptions,
  - type: text
    content: car leur tromperie est mensonge.
  '119':
  - type: text
    content: ' '
  - type: note
    content: 'Tu élimines  : litt. tu fais cesser , terme apparenté à sabbat  ; certains mss hébreux et des versions anciennes ont lu tu considères comme des scories…  ; cf. 73.18ss.'
  - type: text
    content: Tu élimines comme des scories tous les méchants de la terre ;
  - type: text
    content: c'est pourquoi j'aime tes préceptes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Apprends-moi… v. 26,64,68,124,135.
  - type: text
    content: 'Béni sois-tu, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Apprends-moi tes prescriptions !
  '120':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 12.5/ /. –  de la frayeur que tu inspires  : litt. de ta frayeur.'
  - type: text
    content: Ma chair frissonne de la frayeur que tu inspires,
  - type: text
    content: je crains tes jugements.
  '121':
  - type: text
    content: ' '
  - type: note
    content: 'l''équité  : le mot correspondant est rendu par règle au v. 132n et, au pluriel, par jugements au v. 120 ; cf. Lv 25.18n. –  oppresseurs v. 134.'
  - type: text
    content: 'J''agis selon l''équité et la justice :'
  - type: text
    content: ne me livre pas à mes oppresseurs !
  '122':
  - type: text
    content: ' '
  - type: note
    content: 'garant Jb 17.3. –  de moi, ton serviteur  : certains modifient le texte hébreu traditionnel pour lire de ta parole. –  pour le bien  : certains ont compris pour mon bien.'
  - type: text
    content: Porte-toi garant de moi, ton serviteur, pour le bien.
  - type: text
    content: Que des gens arrogants ne m'oppriment pas !
  '123':
  - type: text
    content: ' '
  - type: note
    content: 'V. 82+. –  l''annonce  : litt. la parole ou ce que tu as dit , cf. v. 11n.'
  - type: text
    content: Mes yeux s'épuisent à attendre ton salut
  - type: text
    content: et l'annonce de ta justice.
  '124':
  - type: text
    content: ' '
  - type: note
    content: apprends-moi… v. 12+.
  - type: text
    content: Agis envers moi, ton serviteur, selon ta fidélité ;
  - type: text
    content: apprends-moi tes prescriptions !
  '125':
  - type: text
    content: ' '
  - type: note
    content: Je suis ton serviteur 116.16+. –  donne-moi… v. 34+.
  - type: text
    content: 'Je suis ton serviteur : donne-moi l''intelligence,'
  - type: text
    content: pour que je connaisse tes préceptes !
  '126':
  - type: text
    content: ' '
  - type: note
    content: 'Il est temps…  : certains ont compris il est temps d''agir pour le Seigneur  ; cf. 69.14 ; 102.14 ; voir aussi 10.4.'
  - type: text
    content: 'Il est temps que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agisse :'
  - type: text
    content: on viole ta loi.
  '127':
  - type: text
    content: ' '
  - type: note
    content: 'C''est pourquoi  : certains modifient le texte pour lire plus que tout (cf. v. 128). –  plus que l''or v. 14+,72 ; 19.11.'
  - type: text
    content: C'est pourquoi j'aime tes commandements,
  - type: text
    content: plus que l'or, plus que l'or fin ;
  '128':
  - type: text
    content: ' '
  - type: note
    content: 'en tout…  : litt. toutes les directives de tout , texte obscur ; des versions anciennes ont lu simplement toutes tes directives. –  je déteste… v. 104.'
  - type: text
    content: c'est pourquoi en tout je considère toutes tes directives comme droites,
  - type: text
    content: je déteste toute voie de mensonge.
  '129':
  - type: text
    content: ' '
  - type: note
    content: merveilleux ou étonnants  ; v. 18n.
  - type: text
    content: 'Tes préceptes sont merveilleux :'
  - type: text
    content: c'est pourquoi je les garde.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 1.2n. –  j'énumère ou je raconte , même verbe v. 26 ; cf. 9.2+.
  - type: text
    content: De mes lèvres j'énumère
  - type: text
    content: toutes les règles de ta bouche.
  '130':
  - type: text
    content: ' '
  - type: note
    content: 'La révélation  : litt. l''ouverture  ; le terme hébreu fait assonance avec le mot traduit par naïfs , cf. v. 105 ; 19.8s ; Pr 1.4 ; Mt 11.25.'
  - type: text
    content: La révélation de tes paroles éclaire,
  - type: text
    content: elle donne de l'intelligence aux naïfs.
  '131':
  - type: text
    content: ' '
  - type: note
    content: V. 20+ ; cf. 81.11.
  - type: text
    content: J'ouvre la bouche et je soupire,
  - type: text
    content: car je suis avide de tes commandements.
  '132':
  - type: text
    content: ' '
  - type: note
    content: 'Tourne-toi vers moi… 25.16 ; 86.16 ; cf. Nb 6.26 ; 2R 13.23. –  fais-moi grâce Es 30.18s ; Pr 3.34. –  ta règle  : le même mot hébreu est aussi traduit par droit ou jugement dans le reste du psaume (cf. v. 121n). –  ceux qui aiment ton nom 69.37 ; cf. 97.10 ; 116.1+ ; 145.20 ; Es 56.6.'
  - type: text
    content: Tourne-toi vers moi et fais-moi grâce,
  - type: text
    content: selon ta règle à l'égard de ceux qui aiment ton nom !
  '133':
  - type: text
    content: ' '
  - type: note
    content: 'Affermis mes pas 37.23 ; 40.3. –  selon ce que tu as dit  : litt. dans tes paroles  ; cf. v. 11n. –  se rendre maître de moi  : cf. Rm 6.12.'
  - type: text
    content: Affermis mes pas selon ce que tu as dit
  - type: text
    content: et ne laisse aucun mal se rendre maître de moi !
  '134':
  - type: text
    content: ' '
  - type: note
    content: V. 121 ; cf. Es 54.14 ; Lc 1.74.
  - type: text
    content: Libère-moi de l'oppression des hommes,
  - type: text
    content: afin que j'observe tes directives !
  '135':
  - type: text
    content: ' '
  - type: note
    content: Fais briller… 31.17. –  apprends-moi… v. 12+.
  - type: text
    content: Fais briller ta face sur moi, ton serviteur ;
  - type: text
    content: apprends-moi tes prescriptions !
  '136':
  - type: text
    content: ' '
  - type: note
    content: Jr 9.17 ; 13.17 ; Lm 3.48. –  torrents 1.3n.
  - type: text
    content: Mes yeux répandent des torrents d'eau,
  - type: text
    content: parce qu'on n'observe pas ta loi.
  '137':
  - type: text
    content: ' '
  - type: note
    content: Tu es juste 11.7 ; Dt 32.4 ; So 3.5 ; Ap 16.5,7 ; 19.2.
  - type: text
    content: 'Tu es juste, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et tes jugements sont droits ;
  '138':
  - type: text
    content: tu as institué tes préceptes avec justice
  - type: text
    content: et une grande constance.
  '139':
  - type: text
    content: ' '
  - type: note
    content: V. 53+ ; 69.10.
  - type: text
    content: Ma passion jalouse me coupe la voix,
  - type: text
    content: parce que mes adversaires oublient tes paroles.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis content  : verbe apparenté au terme traduit par gaieté au v. 111 ; de même au v. 162. –  si je possédais  : sous-entendu dans le texte. –  richesse v. 72,127,162 ; 19.11 ; Pr 2.4.'
  - type: text
    content: Je suis content de suivre tes préceptes,
  - type: text
    content: comme si je possédais toute richesse.
  '140':
  - type: text
    content: ' '
  - type: note
    content: Ta parole v. 11n. –  entièrement éprouvée , image du métal affiné au feu ; cf. 12.7 ; 105.19n  ; Pr 30.5.
  - type: text
    content: Ta parole est entièrement éprouvée ;
  - type: text
    content: moi qui suis ton serviteur, je l'aime.
  '141':
  - type: text
    content: Je suis chétif et méprisé ;
  - type: text
    content: je n'oublie pas tes directives.
  '142':
  - type: text
    content: Ta justice est justice pour toujours,
  - type: text
    content: ta loi est vérité.
  '143':
  - type: text
    content: ' '
  - type: note
    content: V. 16+ ; cf. Jn 12.27.
  - type: text
    content: La détresse et le désarroi m'ont saisi ;
  - type: text
    content: tes commandements font mes délices.
  '144':
  - type: text
    content: 'A toujours tes préceptes sont justice :'
  - type: text
    content: donne-moi l'intelligence, pour que je vive !
  '145':
  - type: text
    content: ' '
  - type: note
    content: V. 94+. –  de tout mon cœur v. 2+.
  - type: text
    content: 'Je t''invoque de tout mon cœur : réponds-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: afin que je garde tes prescriptions !
  '146':
  - type: text
    content: 'Je t''invoque : sauve-moi,'
  - type: text
    content: afin que j'observe tes préceptes !
  '147':
  - type: text
    content: ' '
  - type: note
    content: '57.9 ; 88.14. –  Je devance l''aube  : autre traduction je me lève à l''aube. –  j''attends…  : cf. v. 43+.'
  - type: text
    content: 'Je devance l''aube et j''appelle au secours :'
  - type: text
    content: j'attends ta parole.
  '148':
  - type: text
    content: ' '
  - type: note
    content: ce que tu as dit v. 11n.
  - type: text
    content: Mes yeux devancent les veilles de la nuit
  - type: text
    content: pour méditer ce que tu as dit.
  '149':
  - type: text
    content: ' '
  - type: note
    content: fais-moi vivre v. 25+.
  - type: text
    content: Entends-moi, selon ta fidélité !
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi vivre selon ton jugement !'
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 23,117.
  - type: text
    content: Je médite tes directives,
  - type: text
    content: j'ai tes sentiers sous les yeux.
  '150':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui poursuivent l''infamie  : autre texte, d''après certains mss hébreux et des versions anciennes  : ceux qui me poursuivent de façon infâme , c.-à-d. les infâmes qui me persécutent.'
  - type: text
    content: Ils s'approchent, ceux qui poursuivent l'infamie,
  - type: text
    content: ils s'éloignent de la loi.
  '151':
  - type: text
    content: ' '
  - type: note
    content: 34.19 ; 145.18 ; Dt 4.7.
  - type: text
    content: 'Tu es proche, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et tous tes commandements sont vérité.
  '152':
  - type: text
    content: ' '
  - type: note
    content: V. 89+.
  - type: text
    content: Depuis le temps jadis je sais par tes préceptes
  - type: text
    content: que tu les as fondés pour toujours.
  '153':
  - type: text
    content: ' '
  - type: note
    content: 'mon affliction  : cf. v. 71+ ; 31.8.'
  - type: text
    content: Regarde mon affliction et délivre-moi,
  - type: text
    content: car je n'oublie pas ta loi.
  '154':
  - type: text
    content: ' '
  - type: note
    content: V. 25+. –  rédemption 19.15+. –  ce que tu as dit v. 11n.
  - type: text
    content: Défends ma cause et assure ma rédemption ;
  - type: text
    content: fais-moi vivre selon ce que tu as dit !
  '155':
  - type: text
    content: ' '
  - type: note
    content: Le salut est loin… Jb 5.4.
  - type: text
    content: Le salut est loin des méchants,
  - type: text
    content: car ils ne recherchent pas tes prescriptions.
  '156':
  - type: text
    content: ' '
  - type: note
    content: Ta compassion… 69.17 ; 145.9. –  Fais-moi vivre v. 25+.
  - type: text
    content: 'Ta compassion est grande, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Fais-moi vivre selon tes règles !
  '157':
  - type: text
    content: ' '
  - type: note
    content: 3.2+ ; 69.5.
  - type: text
    content: Mes persécuteurs et mes adversaires sont nombreux ;
  - type: text
    content: je ne dévie pas de tes préceptes.
  '158':
  - type: text
    content: ' '
  - type: note
    content: V. 53+. –  dégoût 95.10. –  ce que tu as dit v. 11n.
  - type: text
    content: Je vois avec dégoût des traîtres
  - type: text
    content: qui n'observent pas ce que tu as dit.
  '159':
  - type: text
    content: ' '
  - type: note
    content: j'aime… v. 47+. –  fais-moi vivre v. 25+,88.
  - type: text
    content: 'Considère que j''aime tes directives :'
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi vivre selon ta fidélité !'
  '16':
  - type: text
    content: ' '
  - type: note
    content: délices v. 24,47,70,77,92,143,174 ; 1.2 ; Rm 7.22.
  - type: text
    content: Je fais mes délices de tes prescriptions,
  - type: text
    content: je n'oublie pas ta parole.
  '160':
  - type: text
    content: ' '
  - type: note
    content: 'Le principe  : le mot hébreu correspondant signifie habituellement tête  ; Jn 17.17.'
  - type: text
    content: Le principe de ta parole est vérité,
  - type: text
    content: et toute règle de ta justice est pour toujours.
  '161':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1S 26.18.
  - type: text
    content: Des princes me persécutent sans raison ;
  - type: text
    content: mais seule ta parole effraie mon cœur.
  '162':
  - type: text
    content: ' '
  - type: note
    content: V. 14+ ; cf. Es 9.2 ; Mt 13.44. –  ce que tu as dit v. 11n.
  - type: text
    content: Je suis content de ce que tu as dit,
  - type: text
    content: comme celui qui trouve un grand butin.
  '163':
  - type: text
    content: Je déteste le mensonge, je l'ai en abomination ;
  - type: text
    content: j'aime ta loi.
  '164':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 17.4.
  - type: text
    content: Sept fois le jour je te loue
  - type: text
    content: à cause des règles de ta justice.
  '165':
  - type: text
    content: ' '
  - type: note
    content: 'une paix (ou une prospérité ) abondante  : cf. 37.11 ; 72.7 ; Es 54.13. –  aucun obstacle… ou aucune cause de chute  ; cf. Lv 19.14 ; Es 8.14n  ; Ez 3.20n  ; 7.19n  ; Mt 11.6n  ; 1Jn 2.10.'
  - type: text
    content: Il y a une paix abondante pour ceux qui aiment ta loi,
  - type: text
    content: et aucun obstacle ne les fait trébucher.
  '166':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 174 ; 33.18+ ; Gn 49.18 ; Lc 2.25.
  - type: text
    content: 'J''ai mis mon espoir en ton salut, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et je mets tes commandements en pratique.
  '167':
  - type: text
    content: ' '
  - type: note
    content: je les aime v. 47+.
  - type: text
    content: J'observe tes préceptes
  - type: text
    content: et je les aime beaucoup.
  '168':
  - type: text
    content: ' '
  - type: note
    content: toutes mes voies… 139.3.
  - type: text
    content: J'observe tes directives et tes préceptes,
  - type: text
    content: car toutes mes voies sont devant toi.
  '169':
  - type: text
    content: ' '
  - type: note
    content: 'parvienne devant toi  : litt. s''approche de ta face  ; cf. 18.7 ; 88.3 ; 102.2 ; 140.7 ; 143.1.'
  - type: text
    content: 'Que mon cri parvienne devant toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Donne-moi l'intelligence selon ta parole !
  '17':
  - type: text
    content: ' '
  - type: note
    content: Fais-moi du bien 116.7+.
  - type: text
    content: Fais-moi du bien, à moi, ton serviteur, pour que je vive
  - type: text
    content: et que j'observe ta parole !
  '170':
  - type: text
    content: ' '
  - type: note
    content: ce que tu as dit v. 11n.
  - type: text
    content: Que ma supplication arrive jusqu'à toi !
  - type: text
    content: Délivre-moi, selon ce que tu as dit !
  '171':
  - type: text
    content: ' '
  - type: note
    content: 71.23. –  fassent jaillir 19.3n.
  - type: text
    content: Que mes lèvres fassent jaillir la louange,
  - type: text
    content: Car tu m'apprends tes prescriptions !
  '172':
  - type: text
    content: ' '
  - type: note
    content: 'entonne un chœur en réponse à (ou pour ) tes paroles (v. 11n) : cf. 88.1n  ; 147.7+. –  tous tes commandements… Rm 7.12.'
  - type: text
    content: Que ma langue entonne un chœur en réponse à tes paroles !
  - type: text
    content: Car tous tes commandements sont justice.
  '173':
  - type: text
    content: ' '
  - type: note
    content: V. 94+ ; cf. 63.9.
  - type: text
    content: Que ta main vienne à mon secours,
  - type: text
    content: car j'ai choisi tes directives !
  '174':
  - type: text
    content: ' '
  - type: note
    content: V. 166+. –  mes délices v. 16+.
  - type: text
    content: 'Je soupire après ton salut, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et ta loi fait mes délices.
  '175':
  - type: text
    content: Que je vive pour te louer !
  - type: text
    content: Et que tes jugements me secourent !
  '176':
  - type: text
    content: ' '
  - type: note
    content: égaré v. 10n  ; cf. Es 53.6 ; Ez 34.6 ; Mt 18.12 ; Lc 15.4 ; 1P 2.25.
  - type: text
    content: 'Je suis égaré comme un mouton perdu : cherche-moi, moi, ton serviteur,'
  - type: text
    content: car je n'oublie pas tes commandements !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ouvre mes yeux  : cf. 2 Maccabées 1.4 : « Qu''il ouvre votre cœur à sa Loi et à ses préceptes. » –  merveilles v. 27,129 ; le mot est habituellement traduit par choses étonnantes, actes étonnants  ; cf. 9.2+.'
  - type: text
    content: Ouvre mes yeux, pour que je contemple
  - type: text
    content: les merveilles de ta loi !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'immigré  : cf. v. 54 ; 39.13 ; Gn 12.10 ; 19.9 ; 21.23,34 ; 26.3 ; voir Ex 12.48n  ; Hé 11.13 ; 1P 1.1 ; 2.11.'
  - type: text
    content: Je suis un immigré sur la terre ;
  - type: text
    content: ne me cache pas tes commandements.
  '2':
  - type: text
    content: ' '
  - type: note
    content: préceptes ou témoignages. –  qui le cherchent 9.11+. –  de tout leur cœur v. 10,145 ; Dt 4.29+ ; 2Ch 30.19 ; 31.21.
  - type: text
    content: Heureux ceux qui gardent ses préceptes,
  - type: text
    content: qui le cherchent de tout leur cœur !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'V. 40,131. –  me porte  : sous-entendu dans le texte.'
  - type: text
    content: Je suis rongé par le désir
  - type: text
    content: qui en tout temps me porte vers tes règles.
  '21':
  - type: text
    content: ' '
  - type: note
    content: maudits Dt 27.26 ; voir bénédiction.
  - type: text
    content: Tu rabroues les gens arrogants, les maudits,
  - type: text
    content: qui s'égarent loin de tes commandements.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Décharge-moi  : litt. découvre-moi  ; avec une légère modification de la vocalisation traditionnelle, roule loin de moi le déshonneur (ou les outrages  ; cf. v. 39,42) ; voir aussi 22.9n  ; 37.5n.'
  - type: text
    content: Décharge-moi du déshonneur et du mépris,
  - type: text
    content: car je garde tes statuts.
  '23':
  - type: text
    content: ' '
  - type: note
    content: V. 15+.
  - type: text
    content: Des princes ont beau s'asseoir et parler contre moi, ton serviteur,
  - type: text
    content: je médite tes prescriptions.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'V. 16+,99. –  mes conseillers  : litt. les hommes de mon conseil  ; cf. Es 40.13n.'
  - type: text
    content: Tes préceptes font mes délices ;
  - type: text
    content: ce sont mes conseillers.
  '25':
  - type: text
    content: ' '
  - type: note
    content: poussière 44.26. –  fais-moi vivre v. 40,50,88,93,149,154,156,159 ; cf. 85.7 ; 138.7 ; 143.11 ; Os 6.2.
  - type: text
    content: 'Je suis attaché à la poussière :'
  - type: text
    content: fais-moi vivre selon ta parole !
  '26':
  - type: text
    content: ' '
  - type: note
    content: tu me réponds 22.22 ; 118.5,21. –  apprends-moi… v. 12+.
  - type: text
    content: 'Je raconte mes voies, et tu me réponds :'
  - type: text
    content: apprends-moi tes prescriptions !
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'la voie 16.11 ; 32.8ss ; 1S 12.23. –  je méditerai…  : cf. 105.2. –  actes étonnants v. 18n.'
  - type: text
    content: Fais-moi comprendre la voie de tes directives,
  - type: text
    content: et je méditerai tes actes étonnants !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Je pleure  : litt. mon être (Gn 1.20n) coule  ; on pourrait aussi comprendre je fonds, je me consume. –  selon ta parole  : certains mss portent selon tes paroles  ; d''autres, par tes paroles.'
  - type: text
    content: 'Je pleure de chagrin :'
  - type: text
    content: relève-moi selon ta parole !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 1.6.
  - type: text
    content: Eloigne de moi la voie du mensonge,
  - type: text
    content: et accorde-moi la grâce de ta loi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Jamais ils n'agissent injustement Jb 36.23.
  - type: text
    content: Jamais ils n'agissent injustement,
  - type: text
    content: ils suivent ses voies.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'la probité ou la fidélité, la constance (v. 25,34,50,75,86n,90,138) ; cf. 89.2n. –  je me conforme à  : litt. je place ( ?) ; on modifie parfois le texte hébreu traditionnel pour lire je désire.'
  - type: text
    content: J'ai choisi la voie de la probité ;
  - type: text
    content: je me conforme à tes règles.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''attache  : cf. Dt 11.22 ; Jr 13.11.'
  - type: text
    content: Je m'attache à tes préceptes ;
  - type: text
    content: Seigneur
  - type: text
    content: ', ne me rends pas honteux !'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'LXX j''ai couru (sur) la voie de tes commandements quand tu as élargi mon cœur  ; le verbe grec correspondant à ce dernier verbe est traduit par s''ouvrir largement en 2Co 6.11 ; cf. Es 60.5 ; voir aussi Hé 12.1. –  au large  : cf. v. 45+.'
  - type: text
    content: Je cours dans la voie de tes commandements,
  - type: text
    content: car tu mets mon cœur au large.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''à la fin  : traduction incertaine ; on a aussi compris en retour, avec profit  ; de même au v. 112.'
  - type: text
    content: 'Enseigne-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', la voie de tes prescriptions,'
  - type: text
    content: pour que je les garde jusqu'à la fin !
  '34':
  - type: text
    content: ' '
  - type: note
    content: Donne-moi l'intelligence v. 73,125 ; Jr 9.23.
  - type: text
    content: Donne-moi l'intelligence, pour que je garde ta loi,
  - type: text
    content: que je l'observe de tout mon cœur !
  '35':
  - type: text
    content: Conduis-moi dans le sentier de tes commandements !
  - type: text
    content: Car j'y prends plaisir.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1R 8.58 ; Jr 22.17 ; Hé 13.5.
  - type: text
    content: Incline mon cœur vers tes préceptes
  - type: text
    content: et non vers le gain !
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'de (litt. de voir des ) l''illusion ou des choses mauvaises  ; cf. 101.3 ; Es 33.15 ; 1Jn 5.21. –  dans ta voie  : autre texte selon tes voies  ; cf. v. 25,41,107.'
  - type: text
    content: Détourne mes yeux de l'illusion,
  - type: text
    content: fais-moi vivre dans ta voie !
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Réalise  : litt. établis, dresse  ; autre traduction confirme. –  ce que tu as dit v. 11n. –  en faveur…  : autre traduction de sorte qu''on te craigne.'
  - type: text
    content: Réalise envers moi, ton serviteur, ce que tu as dit
  - type: text
    content: en faveur de ceux qui te craignent !
  '39':
  - type: text
    content: ' '
  - type: note
    content: V. 22n. –  tes règles ou tes jugements.
  - type: text
    content: Détourne de moi le déshonneur qui m'effraie,
  - type: text
    content: car tes règles sont bonnes.
  '4':
  - type: text
    content: ' '
  - type: note
    content: qu'on les observe Dt 5.1n.
  - type: text
    content: Tu as institué tes directives
  - type: text
    content: pour qu'on les observe avec soin.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Je soupire v. 20+. –  fais-moi vivre v. 25+.
  - type: text
    content: 'Je soupire après tes directives :'
  - type: text
    content: fais-moi vivre dans ta justice !
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'ta fidélité  : litt. tes fidélités , 17.7n  ; 25.6n  ; 89.2ns ; Es 55.3. –  ce que tu as dit v. 11n.'
  - type: text
    content: Seigneur
  - type: text
    content: ', que viennent jusqu''à moi ta fidélité,'
  - type: text
    content: ton salut, selon ce que tu as dit !
  '42':
  - type: text
    content: ' '
  - type: note
    content: Je pourrai répondre Pr 27.11 ; Mt 10.19. –  qui m'outrage v. 22n.
  - type: text
    content: Je pourrai répondre à celui qui m'outrage,
  - type: text
    content: car je me fie à ta parole.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'parole de vérité  : le terme hébreu rendu ici par vérité (cf. v. 142,151,160 ; voir aussi 19.10 ; Ep 4.15) est généralement traduit par loyauté (cf. 25.10+ ; Os 4.1n). Le texte hébreu traditionnel ajoute jusqu''à l''extrême ( ? cf. v. 51n), qui fait défaut dans Syr  ; cf. v. 162 ; Jc 1.18. –  j''attends…  : cf. v. 49,74,81,114,147 ; 33.18 ; 147.11. –  tes jugements  : autre traduction tes règles.'
  - type: text
    content: N'arrache pas de ma bouche la parole de vérité,
  - type: text
    content: car j'attends tes jugements.
  '44':
  - type: text
    content: J'observerai ta loi constamment,
  - type: text
    content: toujours, à jamais.
  '45':
  - type: text
    content: ' '
  - type: note
    content: au large 4.2 ; 18.20 ; Gn 26.22 ; cf. Jn 8.31s. –  je recherche 111.2.
  - type: text
    content: Je marcherai au large,
  - type: text
    content: car je recherche tes directives.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'devant les rois  : cf. Mt 10.18. –  pas honte  : cf. Rm 1.16.'
  - type: text
    content: Je parlerai de tes préceptes devant les rois,
  - type: text
    content: et je n'aurai pas honte.
  '47':
  - type: text
    content: ' '
  - type: note
    content: V. 16+ ; cf. Jn 4.34. –  que j'aime v. 97,159,167.
  - type: text
    content: Je fais mes délices de tes commandements
  - type: text
    content: que j'aime.
  '48':
  - type: text
    content: ' '
  - type: note
    content: 28.2 ; 63.5.
  - type: text
    content: Je lève mes mains vers tes commandements que j'aime,
  - type: text
    content: et je veux méditer tes prescriptions.
  '49':
  - type: text
    content: ' '
  - type: note
    content: 105.42.
  - type: text
    content: Souviens-toi de ta parole en ma faveur,
  - type: text
    content: puisque tu m'as donné l'espérance, à moi, ton serviteur !
  '5':
  - type: text
    content: ' '
  - type: note
    content: bien réglées ou fermement établies  ; cf. v. 133 ; 1R 8.61.
  - type: text
    content: Puissent mes voies être bien réglées,
  - type: text
    content: pour que j'observe tes prescriptions !
  '50':
  - type: text
    content: ' '
  - type: note
    content: Cf. Rm 15.4+. –  mon affliction v. 92,107+. –  ce que tu as dit v. 11n.
  - type: text
    content: 'C''est ma consolation dans mon affliction :'
  - type: text
    content: ce que tu as dit me fait vivre.
  '51':
  - type: text
    content: ' '
  - type: note
    content: V. 69,78 ; 123.3s. –  arrogants / insolence Pr 21.24. –  me traitent… ou se moquent de moi jusqu'à l'extrême  ; cf. v. 43n.
  - type: text
    content: Des gens arrogants me traitent avec insolence ;
  - type: text
    content: je ne dévie pas de ta loi.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'Je me souviens  : cf. v. 49 ; le même verbe est traduit par évoquer au v. 55. –  tes jugements  : autre traduction tes règles.'
  - type: text
    content: Je me souviens de tes jugements d'autrefois,
  - type: text
    content: Seigneur
  - type: text
    content: ', et je me console.'
  '53':
  - type: text
    content: ' '
  - type: note
    content: 'V. 139,158. –  ardeur  : le même terme est traduit par brûlant en 11.6 ; voir aussi Lm 5.10.'
  - type: text
    content: Une vive ardeur me saisit à cause des méchants
  - type: text
    content: qui abandonnent ta loi.
  '54':
  - type: text
    content: ' '
  - type: note
    content: sujet de mes psaumes 101.1. –  immigré v. 19+.
  - type: text
    content: Tes prescriptions sont le sujet de mes psaumes,
  - type: text
    content: dans la maison où je séjourne en immigré.
  '55':
  - type: text
    content: ' '
  - type: note
    content: V. 52n,62 ; 1.2 ; 42.9 ; 63.7 ; 77.7 ; 134.1 ; Ac 16.25.
  - type: text
    content: 'La nuit j''évoque ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et j'observe ta loi.
  '56':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ec 12.13.
  - type: text
    content: C'est là ce qui m'est propre,
  - type: text
    content: car je garde tes directives.
  '57':
  - type: text
    content: ' '
  - type: note
    content: Ma part 16.5 ; Lm 3.24 ; cf. Nb 18.20 ; Dt 10.9 ; Jos 13.14.
  - type: text
    content: 'Ma part, '
  - type: text
    content: Seigneur
  - type: text
    content: ', je le dis,'
  - type: text
    content: c'est d'observer tes paroles.
  '58':
  - type: text
    content: ' '
  - type: note
    content: 'je cherche à t''apaiser  : litt. j''adoucis ta face  ; cf. 45.13 ; Ex 32.11+ ; Ml 1.9. –  ce que tu as dit v. 11n.'
  - type: text
    content: De tout mon cœur je cherche à t'apaiser ;
  - type: text
    content: fais-moi grâce, selon ce que tu as dit !
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'mes pas  : litt. mes pieds  ; cf. Lc 15.17.'
  - type: text
    content: Je réfléchis à ma voie
  - type: text
    content: et je ramène mes pas vers tes préceptes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'pas honte v. 31 ; 31.2 ; 1Jn 2.28. –  considérerai…  : autre traduction regarderai…  ; cf. Jc 1.23ss.'
  - type: text
    content: Alors je n'aurai pas honte,
  - type: text
    content: quand je considérerai tous tes commandements.
  '60':
  - type: text
    content: Je me hâte, je ne tarde pas
  - type: text
    content: à observer tes commandements.
  '61':
  - type: text
    content: Les liens des méchants m'enveloppent ;
  - type: text
    content: je n'oublie pas ta loi.
  '62':
  - type: text
    content: ' '
  - type: note
    content: V. 55+.
  - type: text
    content: En pleine nuit je me lève pour te célébrer
  - type: text
    content: à cause des jugements de ta justice.
  '63':
  - type: text
    content: ' '
  - type: note
    content: V. 79 ; 15.4+ ; Dt 4.10+.
  - type: text
    content: Je suis le compagnon de tous ceux qui te craignent,
  - type: text
    content: et de ceux qui observent tes directives.
  '64':
  - type: text
    content: ' '
  - type: note
    content: remplit la terre 33.5 ; 65.10 ; 104.24. –  apprends-moi v. 12+.
  - type: text
    content: Seigneur
  - type: text
    content: ', ta fidélité remplit la terre ;'
  - type: text
    content: apprends-moi tes prescriptions !
  '65':
  - type: text
    content: Tu me fais du bien, à moi, ton serviteur,
  - type: text
    content: Seigneur
  - type: text
    content: ', selon ta parole.'
  '66':
  - type: text
    content: ' '
  - type: note
    content: 'à bien discerner…  : autres traductions ce qui est bon dans le discernement et la connaissance ; à discerner et à connaître ce qui est bon  ; comme les deux premiers mots de ce v. commencent par la même lettre (v. 1n), le premier étant identique à celui qui ouvre le v. 65 ( bien ), certains proposent de lire simplement le discernement et la connaissance  ; cf. Jc 1.5.'
  - type: text
    content: Apprends-moi à bien discerner et à connaître
  - type: text
    content: car j'ai mis ma foi dans tes commandements.
  '67':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 71,75,107 ; 118.18 ; Pr 15.33. –  je m'égarais v. 10n (verbe proche par la forme et le sens). –  ce que tu as dit v. 11n.
  - type: text
    content: Avant d'avoir été affligé, je m'égarais ;
  - type: text
    content: maintenant j'observe ce que tu as dit.
  '68':
  - type: text
    content: ' '
  - type: note
    content: Tu es bon 25.8 ; 73.1 ; 100.5. –  apprends-moi v. 12+.
  - type: text
    content: Tu es bon et bienfaisant ;
  - type: text
    content: apprends-moi tes prescriptions !
  '69':
  - type: text
    content: ' '
  - type: note
    content: 'V. 51+. –  m''enduisent…  : cf. Jb 13.4n  ; 14.17.'
  - type: text
    content: Des gens arrogants m'enduisent de mensonges ;
  - type: text
    content: moi, je garde tes directives de tout mon cœur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 86.12.
  - type: text
    content: Je te célébrerai avec un cœur droit,
  - type: text
    content: en étudiant les règles de ta justice.
  '70':
  - type: text
    content: ' '
  - type: note
    content: 'Leur cœur… 17.10 ; Es 6.10. –  dans leur graisse  : litt. comme la graisse. –  mes délices v. 16+.'
  - type: text
    content: Leur cœur est insensible dans leur graisse ;
  - type: text
    content: moi, je fais mes délices de ta loi.
  '71':
  - type: text
    content: ' '
  - type: note
    content: V. 67+.
  - type: text
    content: Il est bon pour moi d'être affligé,
  - type: text
    content: afin que j'apprenne tes prescriptions.
  '72':
  - type: text
    content: ' '
  - type: note
    content: V. 14+.
  - type: text
    content: Mieux vaut pour moi la loi de ta bouche
  - type: text
    content: que mille objets d'or et d'argent.
  '73':
  - type: text
    content: ' '
  - type: note
    content: Tes mains… 139.14s ; Gn 2.7 ; Es 64.7 ; Jb 10.8. –  donne-moi l'intelligence v. 34+.
  - type: text
    content: Tes mains m'ont façonné, elles m'ont affermi ;
  - type: text
    content: donne-moi l'intelligence, pour que j'apprenne tes commandements !
  '74':
  - type: text
    content: ' '
  - type: note
    content: 107.42.
  - type: text
    content: Ceux qui te craignent me voient et se réjouissent,
  - type: text
    content: car j'attends ta parole.
  '75':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 107+ ; 51.6 ; Jos 7.19. –  tes jugements  : autre traduction tes règles . –  constance et fidélité (v. 76) traduisent deux synonymes de l''hébreu (cf. v. 30n,138).'
  - type: text
    content: 'Je sais, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que tes jugements sont justes ;'
  - type: text
    content: c'est dans ta constance que tu m'as affligé.
  '76':
  - type: text
    content: ' '
  - type: note
    content: ce que tu m'as dit v. 11n.
  - type: text
    content: Que ta fidélité soit ma consolation, je t'en prie,
  - type: text
    content: selon ce que tu m'as dit, à moi, ton serviteur !
  '77':
  - type: text
    content: ' '
  - type: note
    content: V. 16+.
  - type: text
    content: Que ta compassion vienne sur moi, pour que je vive,
  - type: text
    content: car ta loi fait mes délices !
  '78':
  - type: text
    content: ' '
  - type: note
    content: V. 51+. –  à tort ou par le mensonge , de même au v. 86.
  - type: text
    content: Qu'ils aient honte, les gens arrogants qui, à tort, me maltraitent !
  - type: text
    content: Moi, je médite tes directives.
  '79':
  - type: text
    content: ' '
  - type: note
    content: 'V. 63+. –  ceux qui connaissent  : autre lecture traditionnelle ils connaîtront.'
  - type: text
    content: Qu'ils reviennent à moi, ceux qui te craignent,
  - type: text
    content: ceux qui connaissent tes préceptes !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ne m''abandonne pas  : cf. 22.2 ; 38.22 ; Jn 8.29.'
  - type: text
    content: Je veux observer tes prescriptions ;
  - type: text
    content: ne m'abandonne pas entièrement !
  '80':
  - type: text
    content: Que mon cœur soit intègre dans tes prescriptions,
  - type: text
    content: afin que je n'aie pas honte !
  '81':
  - type: text
    content: ' '
  - type: note
    content: 'j''attends…  : cf. v. 43+.'
  - type: text
    content: Je m'épuise à espérer ton salut ;
  - type: text
    content: j'attends ta parole.
  '82':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux…  : cf. v. 81,123 ; 69.4n  ; 84.3 ; Gn 27.1 ; Es 38.14. –  tes paroles v. 11n. –  Quand… 101.2.'
  - type: text
    content: Mes yeux s'épuisent à attendre tes paroles ;
  - type: text
    content: 'je dis : Quand me consoleras-tu ?'
  '83':
  - type: text
    content: ' '
  - type: note
    content: 'comme une outre qui se dessèche (verbe sous-entendu dans le texte) dans la fumée  : on suspendait les outres de vin au-dessus d''un foyer pour hâter la fermentation.'
  - type: text
    content: Même si je suis comme une outre qui se dessèche dans la fumée,
  - type: text
    content: je n'oublie pas tes prescriptions.
  '84':
  - type: text
    content: ' '
  - type: note
    content: 'Quelle est la durée de la vie  : litt. combien sont les jours  ; cf. 2S 19.35. –  contre mes persécuteurs 7.2n.'
  - type: text
    content: Quelle est la durée de ma vie ?
  - type: text
    content: Quand exerceras-tu le jugement contre mes persécuteurs ?
  '85':
  - type: text
    content: ' '
  - type: note
    content: 57.7.
  - type: text
    content: Des gens arrogants creusent des fosses devant moi,
  - type: text
    content: ce qui n'est pas conforme à ta loi.
  '86':
  - type: text
    content: ' '
  - type: note
    content: disent ta constance ou ne sont que probité  ; cf. v. 30n  ; 33.4 ; 111.7s. –  à tort v. 78n.
  - type: text
    content: Tous tes commandements disent ta constance ;
  - type: text
    content: 'on me persécute à tort : secours-moi !'
  '87':
  - type: text
    content: ' '
  - type: note
    content: V. 110.
  - type: text
    content: Pour un peu, on m'aurait supprimé ;
  - type: text
    content: mais moi, je n'abandonne pas tes directives.
  '88':
  - type: text
    content: ' '
  - type: note
    content: V. 25+.
  - type: text
    content: Fais-moi vivre selon ta fidélité,
  - type: text
    content: afin que j'observe les préceptes de ta bouche !
  '89':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 152 ; Es 40.8 ; Mt 5.18 ; 24.35/ / ; Jn 1.1 ; 1P 1.25.
  - type: text
    content: 'Pour toujours, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: ta parole se tient dans le ciel,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 1.4. – Voir pur. –  observant  : autre traduction gardant.'
  - type: text
    content: Comment un jeune homme rendra-t-il pur son sentier ?
  - type: text
    content: En observant ta parole.
  '90':
  - type: text
    content: ' '
  - type: note
    content: ta constance… 103.17. –  la terre… 104.5 ; Ec 1.4.
  - type: text
    content: ta constance dure de génération en génération.
  - type: text
    content: Tu as affermi la terre, et elle subsiste.
  '91':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 105.7 ; Jr 33.25 ; Col 1.17 ; Hé 1.3. –  d''après tes règles  : autre traduction pour tes jugements , cf. v. 121.'
  - type: text
    content: C'est d'après tes règles que les choses subsistent aujourd'hui,
  - type: text
    content: car toutes sont à ton service.
  '92':
  - type: text
    content: ' '
  - type: note
    content: V. 16+,50+.
  - type: text
    content: Si ta loi n'avait fait mes délices,
  - type: text
    content: alors j'aurais disparu dans mon affliction.
  '93':
  - type: text
    content: ' '
  - type: note
    content: 'tu me fais vivre  : cf. v. 25+.'
  - type: text
    content: Je n'oublierai jamais tes directives,
  - type: text
    content: car par elles tu me fais vivre.
  '94':
  - type: text
    content: ' '
  - type: note
    content: V. 145s,173s ; cf. 100.3 ; 1Co 3.23.
  - type: text
    content: 'Je suis à toi : sauve-moi !'
  - type: text
    content: Car je recherche tes directives.
  '95':
  - type: text
    content: ' '
  - type: note
    content: 'm''attendent  : le verbe est habituellement traduit par espérer.'
  - type: text
    content: Des méchants m'attendent pour me faire disparaître ;
  - type: text
    content: je suis attentif à tes préceptes.
  '96':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 24.28s : « Le premier n''a jamais fini de la connaître (la loi), tout comme le dernier n''en touchera jamais le fond. Car sa pensée est plus vaste que l''océan, et ses desseins plus profonds que le grand abîme. »'
  - type: text
    content: Je vois une fin à tout ce qui est parfait,
  - type: text
    content: mais ton commandement est très vaste.
  '97':
  - type: text
    content: ' '
  - type: note
    content: 'V. 47+ ; 40.9. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Combien j'aime ta loi !
  - type: text
    content: Je la médite sans cesse.
  '98':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 4.6 ; 2Tm 3.15. –  Ton commandement  : d''après un ms hébreu et LXX. Autre lecture traditionnelle tes commandements.'
  - type: text
    content: Ton commandement me rend plus sage que mes ennemis,
  - type: text
    content: car je l'ai toujours avec moi.
  '99':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 24+ ; Mt 11.25.
  - type: text
    content: J'ai plus de bon sens que tous mes maîtres,
  - type: text
    content: car ce sont tes préceptes que je médite.
