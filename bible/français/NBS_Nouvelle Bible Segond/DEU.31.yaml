        - type: text
          text: '(la seconde expression est aussi traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en présence de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 28,30).
      marker-yv: yv-n
    - type: text
      text: 'quand tout Israël viendra pour paraître devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, au lieu qu''il choisira, tu liras cette loi en présence de tout Israël. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
