      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 1.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se prostituera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se lèvera et se prostituera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') Ex 34.15s ; Jg 2.17 ; Ez 16.15 ; cf. Os 2.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des dieux étrangers…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les dieux de l''étranger, de ce pays… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les dieux du pays étranger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Gn 35.2-4 ; Jos 24.23 ; Jg 10.16 ; 1S 7.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rompra mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 11.10 ; 31.32.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Tu vas te coucher avec tes pères. Quant à ce peuple, il se prostituera avec des dieux étrangers, ceux du pays dans lequel il entre. Il m''abandonnera et rompra mon alliance, celle que j''ai conclue avec lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'colère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.15 ; 7.4 ; 11.17 ; 29.19,22s,27 ; Jg 2.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je me détournerai d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je leur cacherai ma face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 18 ; cf. 32.20 ; Ps 13.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'atteindront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le trouveront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas en mon sein '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.42 ; cf. Jg 6.13 ; Ps 42.11.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là, je me mettrai en colère contre lui. Je les abandonnerai et je me détournerai d''eux. Il sera dévoré ; de nombreux malheurs et des détresses l''atteindront ; il dira : « N''est-ce pas parce que mon Dieu n''est pas en mon sein que ces malheurs m''ont atteint ? » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et moi, je me détournerai en ce jour-là, à cause de tout le mal qu''il aura fait en se tournant vers d''autres dieux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce chant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir v. 30+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'témoin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 26 ; cf. 4.26+ ; Jn 5.45.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, écrivez ce chant. Apprends-le aux Israélites, mets-le dans leur bouche, et ce chant sera pour moi un témoin contre les Israélites. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cent vingt ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '34.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rien faire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sortir et rentrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression souvent employée en contexte militaire, au sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: partir en campagne et en revenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais parfois aussi dans un sens beaucoup plus général ; cf. 28.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Nb 27.17 ; Jos 14.11 ; 1R 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne passeras pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.37+ ; 3.27.
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : J''ai aujourd''hui cent vingt ans. Je ne pourrai plus rien faire, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a dit : « Tu ne passeras pas ce Jourdain. » '
