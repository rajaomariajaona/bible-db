  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je ferai entrer ce peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je le ferai entrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que j''ai promise par serment '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lait '
      - type: usfm
        marker: ft
        children:
