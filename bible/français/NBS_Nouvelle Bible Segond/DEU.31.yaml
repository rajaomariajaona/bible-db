        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tente de la Rencontre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 27.21+ ; 33.7-11.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Le moment de ta mort approche. Appelle Josué, et tenez-vous debout dans la tente de la Rencontre. Je lui donnerai mes ordres. Moïse et Josué allèrent se tenir debout dans la tente de la Rencontre. '
  '15':
  - type: usfm
