      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu rassembleras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les familles entières
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
