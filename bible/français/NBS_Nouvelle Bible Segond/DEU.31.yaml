          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les immigrés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton immigré qui est dans tes portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''ils veillent… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu rassembleras le peuple, les hommes, les femmes et les familles entières, ainsi que les immigrés qui sont dans tes villes, afin qu''ils entendent et qu''ils apprennent, pour qu''ils craignent le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, et qu''ils veillent à mettre en pratique toutes les paroles de cette loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leurs fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la terre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous allez prendre possession…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous passez le Jourdain pour en prendre possession
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 1.21+.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi leurs fils, qui ne la connaissent pas, l''entendront, et ils apprendront à craindre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, tout le temps que vous vivrez sur la terre dont vous allez prendre possession après avoir passé le Jourdain.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'infidélité d'Israël
    marker-yv: yv-h
