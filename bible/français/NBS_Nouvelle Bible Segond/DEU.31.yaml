document_id: DEU.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: ADIEUX ET MORT DE MOÏSE
  - type: heading
    content: Josué désigné comme successeur de Moïse
  - type: text
    content: ' '
  - type: note
    content: tout Israël 1.1+.
  - type: text
    content: 'Moïse alla dire ces paroles à tout Israël. '
  '10':
  - type: note
    content: au temps fixé Gn 1.14n  ; Ex 13.10n. –  remise 15.1ss. –  fête des Huttes 16.13-15 ; cf. 26–27 ; voir calendrier et fêtes.
  - type: text
    content: 'Moïse leur donna cet ordre : Au bout de sept ans, au temps fixé de l''année de la remise, à la fête des Huttes, '
  '11':
  - type: note
    content: 'tout Israël 1.1+. –  paraître devant le Seigneur 16.16 ; Ex 23.15n. –  lieu qu''il choisira 12.5+. –  tu liras Jos 8.34s ; 2R 23.1-3 ; Né 8. –  en présence de tout Israël  : litt. devant tout Israël, à leurs oreilles (la seconde expression est aussi traduite par en présence de aux v. 28,30).'
  - type: text
    content: 'quand tout Israël viendra pour paraître devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu qu''il choisira, tu liras cette loi en présence de tout Israël. '
  '12':
  - type: note
    content: 'Tu rassembleras 4.10+. –  les familles entières  : autre traduction les enfants  ; cf. Gn 34.29n. –  les immigrés…  : litt. ton immigré qui est dans tes portes. – Voir crainte. –  qu''ils veillent… 5.1n.'
  - type: text
    content: 'Tu rassembleras le peuple, les hommes, les femmes et les familles entières, ainsi que les immigrés qui sont dans tes villes, afin qu''ils entendent et qu''ils apprennent, pour qu''ils craignent le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et qu''ils veillent à mettre en pratique toutes les paroles de cette loi. '
  '13':
  - type: note
    content: 'leurs fils 4.10+. –  la terre… 7.13+. –  vous allez prendre possession…  : litt. vous passez le Jourdain pour en prendre possession  ; 1.21+.'
  - type: text
    content: 'Ainsi leurs fils, qui ne la connaissent pas, l''entendront, et ils apprendront à craindre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, tout le temps que vous vivrez sur la terre dont vous allez prendre possession après avoir passé le Jourdain.'
  - type: heading
    content: L'infidélité d'Israël
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le moment de ta mort…  : litt. les jours de mourir s''approchent  ; cf. Gn 47.29 ; 1R 2.1n. –  tente de la Rencontre Ex 27.21+ ; 33.7-11.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Le moment de ta mort approche. Appelle Josué, et tenez-vous debout dans la tente de la Rencontre. Je lui donnerai mes ordres. Moïse et Josué allèrent se tenir debout dans la tente de la Rencontre. '
  '15':
  - type: note
    content: nuée Ex 13.21n  ; 40.34-38.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut dans la tente, dans une colonne de nuée ; la colonne de nuée s''arrêta à l''entrée de la tente.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Tu vas te coucher avec tes pères  : cf. 1R 1.21. –  se prostituera (litt. se lèvera et se prostituera ) Ex 34.15s ; Jg 2.17 ; Ez 16.15 ; cf. Os 2.4. –  des dieux étrangers…  : autres traductions les dieux de l''étranger, de ce pays… ou les dieux du pays étranger  ; cf. Gn 35.2-4 ; Jos 24.23 ; Jg 10.16 ; 1S 7.3. –  rompra mon alliance  : cf. Jr 11.10 ; 31.32.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Tu vas te coucher avec tes pères. Quant à ce peuple, il se prostituera avec des dieux étrangers, ceux du pays dans lequel il entre. Il m''abandonnera et rompra mon alliance, celle que j''ai conclue avec lui. '
  '17':
  - type: note
    content: 'colère 6.15 ; 7.4 ; 11.17 ; 29.19,22s,27 ; Jg 2.14. –  lui / eux 1.8n. –  je me détournerai d''eux  : litt. je leur cacherai ma face, de même au v. 18 ; cf. 32.20 ; Ps 13.2+. –  l''atteindront  : litt. le trouveront, de même dans la suite. –  pas en mon sein 1.42 ; cf. Jg 6.13 ; Ps 42.11.'
  - type: text
    content: 'En ce jour-là, je me mettrai en colère contre lui. Je les abandonnerai et je me détournerai d''eux. Il sera dévoré ; de nombreux malheurs et des détresses l''atteindront ; il dira : « N''est-ce pas parce que mon Dieu n''est pas en mon sein que ces malheurs m''ont atteint ? » '
  '18':
  - type: text
    content: 'Et moi, je me détournerai en ce jour-là, à cause de tout le mal qu''il aura fait en se tournant vers d''autres dieux. '
  '19':
  - type: note
    content: 'ce chant  : voir v. 30+. –  témoin v. 26 ; cf. 4.26+ ; Jn 5.45.'
  - type: text
    content: 'Maintenant, écrivez ce chant. Apprends-le aux Israélites, mets-le dans leur bouche, et ce chant sera pour moi un témoin contre les Israélites. '
  '2':
  - type: note
    content: 'cent vingt ans 34.7. –  rien faire  : litt. sortir et rentrer  : expression souvent employée en contexte militaire, au sens de partir en campagne et en revenir, mais parfois aussi dans un sens beaucoup plus général ; cf. 28.6n  ; voir aussi Nb 27.17 ; Jos 14.11 ; 1R 3.7n. –  Tu ne passeras pas… 1.37+ ; 3.27.'
  - type: text
    content: 'Il leur dit : J''ai aujourd''hui cent vingt ans. Je ne pourrai plus rien faire, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : « Tu ne passeras pas ce Jourdain. » '
  '20':
  - type: note
    content: 'je ferai entrer ce peuple  : litt. je le ferai entrer. –  terre 7.13+. –  que j''ai promise par serment 1.8+. –  lait / miel 11.9+. –  il mangera…  : cf. 6.11s ; 8.12-14. –  bafouera ou méprisera, cf. 32.19n  ; Es 1.4. –  rompra mon alliance v. 16+.'
  - type: text
    content: 'Car je ferai entrer ce peuple sur la terre que j''ai promise par serment à ses pères, une terre qui ruisselle de lait et de miel ; il mangera, il sera rassasié, il engraissera ; puis il se tournera vers d''autres dieux et les servira, il me bafouera et rompra mon alliance. '
  '21':
  - type: note
    content: 'malheurs 28.15-68 ; 32.23. –  l''atteindront v. 17n. –  de sa descendance  : litt. de la bouche de sa descendance. –  ses dispositions…  : litt. son tour (de la racine qui signifie façonner, former, modeler, évoquant notamment le travail du potier ; le terme peut signifier penchant, disposition ou dessein) qu''il fait aujourd''hui (1.10+).'
  - type: text
    content: 'Quand de nombreux malheurs et des détresses l''atteindront, ce chant répondra devant lui en témoin, car il ne sera pas oublié de sa descendance. Je connais, en effet, ses dispositions, qui déjà se manifestent aujourd''hui, avant même que je l''aie fait entrer dans le pays que j''ai promis par serment. '
  '22':
  - type: note
    content: V. 19.
  - type: text
    content: En ce jour-là, Moïse écrivit ce chant et l'apprit aux Israélites.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Il donna ses ordres…  : d''après le contenu de la déclaration qui suit, le sujet est peut-être Dieu, plutôt que Moïse ; cf. v. 6-8+,14s.'
  - type: text
    content: 'Il donna ses ordres à Josué, fils de Noun. Il dit : Sois fort et courageux, car c''est toi qui feras entrer les Israélites dans le pays que je leur ai promis par serment ; je serai moi-même avec toi.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: V. 9 ; cf. 17.18.
  - type: text
    content: 'Lorsque Moïse eut achevé d''écrire dans un livre les paroles de cette loi, jusqu''au bout, '
  '25':
  - type: note
    content: Voir lévite.
  - type: text
    content: 'il donna cet ordre aux lévites qui portaient le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '26':
  - type: note
    content: ce livre de la loi 28.61+. –  témoin v. 19+.
  - type: text
    content: 'Prenez ce livre de la loi et mettez-le à côté du coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ; il sera là comme témoin contre toi. '
  '27':
  - type: note
    content: 'je sais…  : litt. je connais tes rébellions et ta nuque raide 9.6ns ; Ex 32.9n.'
  - type: text
    content: 'Car je sais combien tu es rebelle et rétif. Si vous êtes rebelles envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant que je suis encore vivant avec vous, combien plus le serez-vous après ma mort ! '
  '28':
  - type: note
    content: 'secrétaires 1.15n. –  en leur présence  : litt. à leurs oreilles, de même au v. 30. –  je prendrai à témoin… 4.26+.'
  - type: text
    content: 'Rassemblez auprès de moi tous les anciens de vos tribus et vos secrétaires ; je dirai ces paroles en leur présence et je prendrai à témoin contre eux le ciel et la terre. '
  '29':
  - type: note
    content: 'après ma mort  : cf. Ac 20.29s. –  dans la suite des temps 4.30+. –  quand  : autre traduction car. –  ce qui lui déplaît Nb 22.34n.'
  - type: text
    content: 'Car je sais qu''après ma mort vous vous pervertirez : vous vous écarterez de la voie que je vous ai prescrite et le malheur viendra à votre rencontre, dans la suite des temps, quand vous contrarierez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' par les œuvres de vos mains, en faisant ce qui lui déplaît.'
  - type: heading
    content: Chant de Moïse
  '3':
  - type: note
    content: Josué 1.38+ ; 3.28.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, passe lui-même devant toi ; c''est lui qui détruira ces nations devant toi, et tu les déposséderas. Josué aussi passe devant toi, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: ce chant v. 19 ; cf. Ex 15 ; Jg 5 ; 1S 2 ; 2S 22 ; Lc 1.46-55,67-79. –  en présence de v. 28n.
  - type: text
    content: Moïse prononça jusqu'au bout les paroles de ce chant en présence de toute l'assemblée d'Israël.
  '4':
  - type: note
    content: 1.4+. –  les a détruits v. 3.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' traitera ces nations comme il a traité Sihôn et Og, rois des Amorites, et leur pays – il les a détruits. '
  '5':
  - type: note
    content: tout le commandement 5.31n. –  que j'ai institué pour vous 4.2n. – Voir 7.1-5,17-26 ; 20.16-18.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous les livrera, et vous agirez à leur égard selon tout le commandement que j''ai institué pour vous. '
  '6':
  - type: note
    content: Soyez forts… 3.28+. –  N'ayez pas peur 1.21+. –  effrayer 1.29+. –  marche lui-même avec toi 20.4. –  il ne te délaissera pas… Gn 28.15 ; Jos 1.5 ; Hé 13.5.
  - type: text
    content: 'Soyez forts et courageux ! N''ayez pas peur, ne vous laissez pas effrayer par eux : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, marche lui-même avec toi ; il ne te délaissera pas, il ne t''abandonnera pas.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 27.18-23. –  qui entreras avec  : certains mss portent qui feras entrer , comme au v. 23 ; cf. Hé 4.8. –  le pays que le Seigneur a juré 1.8+.'
  - type: text
    content: 'Moïse appela Josué et lui dit sous les yeux de tout Israël : Sois fort et courageux, car c''est toi qui entreras avec ce peuple dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré à leurs pères de leur donner ; c''est toi qui le leur donneras comme patrimoine. '
  '8':
  - type: note
    content: 'avec toi v. 6 ; 2.7+. –  n''aie pas peur, ne sois pas terrifié  : cf. 1.21 ; Jos 8.1 ; 1Ch 22.13 ; 28.20.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui-même marche devant toi ; il sera lui-même avec toi ; il ne te délaissera pas, il ne t''abandonnera pas ; n''aie pas peur, ne sois pas terrifié.'
  - type: heading
    content: Moïse confie la loi aux prêtres
  '9':
  - type: text
    content: ' '
  - type: note
    content: écrivit cette loi 29.20+. –  prêtres, les fils de Lévi 17.9+ ; cf. 33.8. –  qui portaient le coffre 10.8.
  - type: text
    content: 'Moïse écrivit cette loi et la remit aux prêtres, les fils de Lévi, qui portaient le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et à tous les anciens d''Israël. '
