        text: . Elisée connaît une expérience semblable à celle des prophètes rencontrés par Saül (1S 10.5).
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, amenez-moi un musicien. Comme le musicien jouait, la main du '
  - type: usfm
