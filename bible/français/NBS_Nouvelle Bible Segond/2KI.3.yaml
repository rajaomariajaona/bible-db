    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Vous ne verrez pas de vent et vous ne verrez pas de pluie, mais cet oued se remplira d''eau et vous boirez, vous, vos troupeaux et vos bêtes. '
  - type: usfm
    marker: v
