    marker-yv: yv-n
  - type: text
    text: 'Joram, fils d''Achab, devint roi sur Israël à Samarie, la dix-huitième année de Josaphat, roi de Juda. Il régna douze ans. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui déplaisait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce qui (est) mauvais aux yeux du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 22.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la pierre levée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' ont le pluriel. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', non pas toutefois comme son père et sa mère. Il supprima la pierre levée du Baal que son père avait faite ; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péchés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la plupart des mss de LXX mettent le mot au singulier, conformément à la fin du texte hébreu ('
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne s'en écarta pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne s'écarta pas de lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jéroboam… qui avait fait pécher Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 12.28ss.'
    marker-yv: yv-n
  - type: text
    text: mais il s'attacha aux péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël ; il ne s'en écarta pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Expédition militaire contre Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mésha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce roi moabite, artisan de l''indépendance de son pays et allié de son voisin syrien, nous est plus connu par le texte d''une stèle dont la reconstitution est exposée au musée du Louvre. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: éleveur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt., le terme désigne celui qui perce un trou ; peut-être renvoie-t-il à une manière de compter le bétail. Il est attesté à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Ougarit
      - type: text
        text: ' et employé pour Amos (Am 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.14). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un tribut de cent mille jeunes béliers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Es 16.1 ; plutôt qu''un tribut annuel, on peut voir dans ce '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cadeau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: considérable, soit le cumul de l'impôt versé durant le règne d'Achab, soit le montant de l'impôt versé une seule fois par le vassal lors de l'accession au trône de son suzerain. Ces lectures sont cohérentes avec le fait que c'est à la mort d'Achab (v. 5) que la rébellion de Mésha éclate au plein jour, du fait du non-versement du tribut attendu.
    marker-yv: yv-n
  - type: text
    text: 'Mésha, roi de Moab, était éleveur ; il payait au roi d''Israël un tribut de cent mille jeunes béliers et de cent mille béliers adultes, avec leur laine. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A la mort d''Achab, le roi de Moab se révolta contre le roi d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: alors
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce jour-là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui ne saurait renvoyer au jour de la mort d''Achab puisque Joram ne succède pas directement à son père (cf. 1.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). On peut penser au jour de la révolte de Mésha (v. 5 ; 1.1) ; une interprétation juive y voit le jour de l''arrivée d''Elisée à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' (2.25), ce qui expliquerait la présence du prophète dans l''armée (3.11).'
    marker-yv: yv-n
  - type: text
    text: 'Le roi Joram sortit alors de Samarie et passa en revue tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 22.2-4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il se mit en marche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''expression correspondante est omise par certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il se mit en marche et fit dire à Josaphat, roi de Juda : Le roi de Moab s''est révolté contre moi ; marcheras-tu avec moi au combat contre Moab ? Josaphat répondit : J''irai ; il en sera pour moi comme pour toi, pour mon peuple comme pour ton peuple, pour mes chevaux comme pour tes chevaux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: monterons-nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la plupart des mss de LXX portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: monterai-je
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chemin du désert d'Edom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il est possible que les frontières nord et ouest de Moab aient été fortifiées. Le détour par le sud avec le contournement de la mer Morte permet aussi de ne pas porter ombrage à l''allié syrien du roi de Moab.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit encore : Par quel chemin monterons-nous ? Joram dit : Par le chemin du désert d''Edom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le roi d'Edom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : selon 8.20, jusqu''au règne de Joram de Juda, Edom appartient à Juda. Peut-être le mot '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne-t-il le gouverneur judéen d'Edom (cf. 1R 22.48
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la troupe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le camp
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui les suivaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans leurs pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', il s''agirait des bêtes de charge et de trait et non pas de celles qui sont destinées à la nourriture des troupes. La description rappelle Nb 20.14-21.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Israël, le roi de Juda et le roi d''Edom partirent ; quand ils eurent marché sept jours par une route détournée, il n''y eut plus d''eau pour la troupe ni pour les bêtes qui les suivaient. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour les livrer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de LXX portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour nous livrer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 9.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors le roi d''Israël dit : Ah ! le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a appelé ces trois rois pour les livrer à Moab ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'N''y a-t-il ici aucun '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 22.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Josaphat dit : N''y a-t-il ici aucun prophète du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', par qui nous puissions consulter le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? Parmi les gens de la cour du roi d''Israël, quelqu''un répondit : Il y a ici Elisée, fils de Shaphath, qui versait l''eau sur les mains d''Elie. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josaphat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss hébreux, LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et certains mss de Vg précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: roi de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: descendirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme au v. 8, LXX et Vg présentent un verbe au singulier.'
    marker-yv: yv-n
  - type: text
    text: 'Josaphat dit : La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est avec lui. Le roi d''Israël, Josaphat et le roi d''Edom descendirent auprès de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qu'ai-je à faire…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 17.18+ ; Os 14.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les prophètes de ta mère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent de LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Elisée dit au roi d''Israël : Qu''ai-je à faire avec toi ? Va trouver les prophètes de ton père et les prophètes de ta mère. Alors le roi d''Israël lui dit : Non, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a convoqué ces trois rois pour les livrer à Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH) des Armées'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 1S 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au service duquel je me tiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 10.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 17.1 ; 18.15.'
    marker-yv: yv-n
  - type: text
    text: 'Elisée dit : Par la vie du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, au service duquel je me tiens, si je n''avais de la considération pour Josaphat, roi de Juda, je ne ferais aucune attention à toi et je ne te regarderais même pas. '
