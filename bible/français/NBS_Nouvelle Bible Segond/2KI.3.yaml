  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et toutes les villes d'importance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent d''un ms hébreu et de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous abattrez tous les bons arbres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''ordre du prophète va au-delà de ce que la loi permet (Dt 20.19s). On a pu rapprocher cette manière de conduire une guerre totale des pratiques assyriennes contemporaines d''Elisée.'
    marker-yv: yv-n
  - type: text
    text: 'vous mettrez à mal toutes les villes fortes et toutes les villes d''importance, vous abattrez tous les bons arbres, vous boucherez toutes les sources d''eau et vous causerez du dommage avec des pierres à toutes les meilleures parcelles. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
