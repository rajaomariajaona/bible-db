    marker-yv: yv-n
  - type: text
    text: 'Cependant, tous les Moabites ayant appris que les rois venaient leur faire la guerre, on mobilisa tous ceux qui étaient en âge de porter les armes, et ils se tinrent sur la frontière. '
  - type: usfm
    marker: v
