        - type: text
          text: n
      - type: text
        text: '  ; Ex 29.38-46 ; Nb 28.2-8 ; voir aussi Ps 141.2 ; Dn 9.21 ; Esd 9.4 (cf. Gn 3.8).'
    marker-yv: yv-n
  - type: text
    text: Au matin, au moment de la présentation de l'offrande, l'eau arriva du côté d'Edom, et le pays fut rempli d'eau.
- type: usfm
  marker: p
  children:
  - type: usfm
