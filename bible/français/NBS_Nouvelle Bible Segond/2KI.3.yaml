        text: '. Le texte hébreu est délicat à traduire. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: abattus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe ainsi traduit est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'battre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 24, par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mettre à mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 25.
    marker-yv: yv-n
  - type: text
    text: 'Ils dirent : C''est du sang ! Les rois ont tiré l''épée entre eux, ils se sont abattus les uns les autres ; maintenant, Moabites, au butin ! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils allèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils entrèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Une autre lecture traditionnelle répète le verbe correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: battirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mettre à mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 25).
    marker-yv: yv-n
  - type: text
    text: 'Ils arrivèrent au camp d''Israël, mais Israël se leva et battit Moab, qui dut fuir pour échapper. Ils allèrent et battirent Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Finalement…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte obscur ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jusqu''à ne laisser que ses pierres dans '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qir-Haréseth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou, selon d''autres mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Qir-Harésheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: seules les pierres de Qir-Haréseth étaient (encore) intactes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''autres '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à ce que ne reste que Qir-Haréseth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qir-Haréseth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 16.11 ; Jr 48.31 ; cette ville est généralement identifiée avec le site moderne de Kérak, à environ 90 km au sud d''Amman, mais cette identification est contestée. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frondes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains pensent que le terme désigne ici une sorte de catapulte.'
    marker-yv: yv-n
  - type: text
    text: 'Ils rasèrent les villes, ils jetèrent chacun sa pierre dans toutes les meilleures parcelles et les en remplirent, ils bouchèrent toutes les sources et abattirent tous les bons arbres. Finalement, il ne resta plus que les pierres de Qir-Haréseth ; les hommes armés de frondes l''encerclèrent et la mirent à mal. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'Edom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce roi (qui n''en est peut-être pas vraiment un, cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') était peut-être le moins bien défendu de la coalition. Certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd''Aram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (la confusion entre les deux noms est assez fréquente en hébreu). Selon cette dernière lecture, le roi de Moab aurait alors tenté de fuir en direction de son allié.
    marker-yv: yv-n
  - type: text
    text: 'Le roi de Moab, voyant que le combat dépassait ses forces, prit avec lui sept cents hommes tirant l''épée pour se frayer un passage jusqu''au roi d''Edom ; mais ils n''y parvinrent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son fils premier-né…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement le fils du roi de Moab ; certains commentateurs pensent cependant à celui du roi d''Edom (ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'Aram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') dont il vient d''être question. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: holocauste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Une grande colère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains expliquent le retrait d''Israël par une mésentente au sein de la coalition ou par l''horreur suscitée par le geste du roi de Moab, cf. Lv 20.2-5 ; Dt 18.10. C''est dans ce sens que l''interprètent LXX ou Flavius '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Josèphe
      - type: text
        text: '. Le terme utilisé par le texte biblique désigne généralement la colère d''un dieu : il peut s''agir ici de celle de YHWH (Lv 10.6 ; Nb 16.22 ; Dt 9.7,8,19,22 ; Ps 106.32 ; 1Ch 27.24 ; 2Ch 19.2+), mais aussi de celle de Kemosh, dieu de Moab. Dans la stèle de Mésha (5-6) les défaites de Moab sont expliquées par la colère de ce dieu.'
    marker-yv: yv-n
  - type: text
    text: Il prit alors son fils premier-né, qui devait devenir roi à sa place, et il l'offrit en holocauste sur la muraille. Une grande colère s'abattit alors sur les Israélites, qui s'éloignèrent de lui et retournèrent dans leur pays.
