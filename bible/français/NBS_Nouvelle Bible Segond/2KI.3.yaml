document_id: 2KI.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joram, roi d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.18n. –  à Samarie  : absent de certains mss. –  la dix-huitième année de Josaphat  : cf. 1.17n  ; 8.16n.'
  - type: text
    content: 'Joram, fils d''Achab, devint roi sur Israël à Samarie, la dix-huitième année de Josaphat, roi de Juda. Il régna douze ans. '
  '10':
  - type: note
    content: 'pour les livrer  : certains mss de LXX portent pour nous livrer  ; cf. Gn 9.2n.'
  - type: text
    content: 'Alors le roi d''Israël dit : Ah ! le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a appelé ces trois rois pour les livrer à Moab ! '
  '11':
  - type: note
    content: 'N''y a-t-il ici aucun prophète…  : cf. 1R 22.7n.'
  - type: text
    content: 'Mais Josaphat dit : N''y a-t-il ici aucun prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: ', par qui nous puissions consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Parmi les gens de la cour du roi d''Israël, quelqu''un répondit : Il y a ici Elisée, fils de Shaphath, qui versait l''eau sur les mains d''Elie. '
  '12':
  - type: note
    content: 'Josaphat  : certains mss hébreux, LXX, Syr et certains mss de Vg précisent roi de Juda. –  descendirent  : comme au v. 8, LXX et Vg présentent un verbe au singulier.'
  - type: text
    content: 'Josaphat dit : La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec lui. Le roi d''Israël, Josaphat et le roi d''Edom descendirent auprès de lui. '
  '13':
  - type: note
    content: 'Qu''ai-je à faire…  : cf. 1R 17.18+ ; Os 14.9. –  et les prophètes de ta mère  : texte absent de LXX.'
  - type: text
    content: 'Elisée dit au roi d''Israël : Qu''ai-je à faire avec toi ? Va trouver les prophètes de ton père et les prophètes de ta mère. Alors le roi d''Israël lui dit : Non, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a convoqué ces trois rois pour les livrer à Moab. '
  '14':
  - type: note
    content: 'Seigneur (YHWH) des Armées  : voir 1S 1.3n. –  au service duquel je me tiens  : cf. 1R 10.8n  ; 17.1 ; 18.15.'
  - type: text
    content: 'Elisée dit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, au service duquel je me tiens, si je n''avais de la considération pour Josaphat, roi de Juda, je ne ferais aucune attention à toi et je ne te regarderais même pas. '
  '15':
  - type: note
    content: 'musicien  : le terme désigne un joueur de cordes. –  la main du Seigneur  : cf. Ez 1.3 ; 8.1. Dans plusieurs mss hébreux et Tg, il s''agit de l''esprit du Seigneur. Elisée connaît une expérience semblable à celle des prophètes rencontrés par Saül (1S 10.5).'
  - type: text
    content: 'Maintenant, amenez-moi un musicien. Comme le musicien jouait, la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur Elisée. '
  '16':
  - type: note
    content: 'Creusez… des fosses  : litt. faire (dans) cet oued (cf. Gn 26.17n) fosses fosses. Cette demande rappelle celle d''Elie en 1R 18.34.'
  - type: text
    content: 'Il dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Creusez dans cet oued, faites des fosses et encore des fosses ! '
  '17':
  - type: note
    content: 'La montée rapide des eaux dans un oued à sec est un phénomène bien connu dans la région. –  pas de pluie  : cf. 1R 18.1ss. –  vos troupeaux  : autre traduction vos biens  ; certains mss de LXX ont lu votre camp comme au v. 9.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Vous ne verrez pas de vent et vous ne verrez pas de pluie, mais cet oued se remplira d''eau et vous boirez, vous, vos troupeaux et vos bêtes. '
  '18':
  - type: note
    content: 'cela est peu de chose  : cf. 20.10n.'
  - type: text
    content: 'Mais cela est peu de chose aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il vous livrera Moab ; '
  '19':
  - type: note
    content: 'et toutes les villes d''importance  : texte absent d''un ms hébreu et de LXX. –  vous abattrez tous les bons arbres  : l''ordre du prophète va au-delà de ce que la loi permet (Dt 20.19s). On a pu rapprocher cette manière de conduire une guerre totale des pratiques assyriennes contemporaines d''Elisée.'
  - type: text
    content: 'vous mettrez à mal toutes les villes fortes et toutes les villes d''importance, vous abattrez tous les bons arbres, vous boucherez toutes les sources d''eau et vous causerez du dommage avec des pierres à toutes les meilleures parcelles. '
  '2':
  - type: note
    content: 'ce qui déplaisait…  : litt. ce qui (est) mauvais aux yeux du Seigneur  ; cf. Nb 22.34n. –  la pierre levée  : LXX et Vg ont le pluriel. – Voir Baal.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', non pas toutefois comme son père et sa mère. Il supprima la pierre levée du Baal que son père avait faite ; '
  '20':
  - type: note
    content: 'au moment de la présentation de l''offrande  : cf. 16.15n  ; Ex 29.38-46 ; Nb 28.2-8 ; voir aussi Ps 141.2 ; Dn 9.21 ; Esd 9.4 (cf. Gn 3.8).'
  - type: text
    content: Au matin, au moment de la présentation de l'offrande, l'eau arriva du côté d'Edom, et le pays fut rempli d'eau.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'on mobilisa Jg 7.23n. –  ceux qui étaient en âge de porter les armes  : litt. tous ceux qui ceignaient la ceinture, et au-dessus  ; cf. 2S 18.11 ; voir aussi Nb 1.3 (autre expression hébraïque).'
  - type: text
    content: 'Cependant, tous les Moabites ayant appris que les rois venaient leur faire la guerre, on mobilisa tous ceux qui étaient en âge de porter les armes, et ils se tinrent sur la frontière. '
  '22':
  - type: note
    content: 'rouges comme du sang  : le texte hébreu joue sur les sonorités des mots correspondants à rouges et sang, qui rappellent Edom (’adoummim et dam).'
  - type: text
    content: 'Ils se levèrent de bon matin, et quand le soleil brilla sur les eaux, les Moabites virent en face d''eux les eaux rouges comme du sang. '
  '23':
  - type: note
    content: 'C''est du sang…  : LXX et Vg lisent selon une vocalisation différente du texte hébreu ce sang (est celui) de l''épée. Le texte hébreu est délicat à traduire. –  abattus  : le verbe ainsi traduit est rendu par battre au v. 24, par mettre à mal au v. 25.'
  - type: text
    content: 'Ils dirent : C''est du sang ! Les rois ont tiré l''épée entre eux, ils se sont abattus les uns les autres ; maintenant, Moabites, au butin ! '
  '24':
  - type: note
    content: 'Ils allèrent  : autre traduction ils entrèrent. Une autre lecture traditionnelle répète le verbe correspondant à battirent, qui est aussi traduit par mettre à mal (v. 25).'
  - type: text
    content: 'Ils arrivèrent au camp d''Israël, mais Israël se leva et battit Moab, qui dut fuir pour échapper. Ils allèrent et battirent Moab. '
  '25':
  - type: note
    content: 'Finalement…  : texte obscur ; litt. jusqu''à ne laisser que ses pierres dans Qir-Haréseth (ou, selon d''autres mss, Qir-Harésheth) ; certains comprennent seules les pierres de Qir-Haréseth étaient (encore) intactes, d''autres jusqu''à ce que ne reste que Qir-Haréseth. –  Qir-Haréseth  : cf. Es 16.11 ; Jr 48.31 ; cette ville est généralement identifiée avec le site moderne de Kérak, à environ 90 km au sud d''Amman, mais cette identification est contestée. –  frondes  : certains pensent que le terme désigne ici une sorte de catapulte.'
  - type: text
    content: 'Ils rasèrent les villes, ils jetèrent chacun sa pierre dans toutes les meilleures parcelles et les en remplirent, ils bouchèrent toutes les sources et abattirent tous les bons arbres. Finalement, il ne resta plus que les pierres de Qir-Haréseth ; les hommes armés de frondes l''encerclèrent et la mirent à mal. '
  '26':
  - type: note
    content: 'd''Edom  : ce roi (qui n''en est peut-être pas vraiment un, cf. v. 9n) était peut-être le moins bien défendu de la coalition. Certains modifient le texte hébreu traditionnel pour lire d''Aram (la confusion entre les deux noms est assez fréquente en hébreu). Selon cette dernière lecture, le roi de Moab aurait alors tenté de fuir en direction de son allié.'
  - type: text
    content: 'Le roi de Moab, voyant que le combat dépassait ses forces, prit avec lui sept cents hommes tirant l''épée pour se frayer un passage jusqu''au roi d''Edom ; mais ils n''y parvinrent pas. '
  '27':
  - type: note
    content: 'son fils premier-né…  : probablement le fils du roi de Moab ; certains commentateurs pensent cependant à celui du roi d''Edom (ou d''Aram) dont il vient d''être question. –  holocauste  : voir sacrifices. –  Une grande colère  : certains expliquent le retrait d''Israël par une mésentente au sein de la coalition ou par l''horreur suscitée par le geste du roi de Moab, cf. Lv 20.2-5 ; Dt 18.10. C''est dans ce sens que l''interprètent LXX ou Flavius Josèphe. Le terme utilisé par le texte biblique désigne généralement la colère d''un dieu : il peut s''agir ici de celle de YHWH (Lv 10.6 ; Nb 16.22 ; Dt 9.7,8,19,22 ; Ps 106.32 ; 1Ch 27.24 ; 2Ch 19.2+), mais aussi de celle de Kemosh, dieu de Moab. Dans la stèle de Mésha (5-6) les défaites de Moab sont expliquées par la colère de ce dieu.'
  - type: text
    content: Il prit alors son fils premier-né, qui devait devenir roi à sa place, et il l'offrit en holocauste sur la muraille. Une grande colère s'abattit alors sur les Israélites, qui s'éloignèrent de lui et retournèrent dans leur pays.
  '3':
  - type: note
    content: 'aux péchés  : la plupart des mss de LXX mettent le mot au singulier, conformément à la fin du texte hébreu (il ne s''en écarta pas, litt. il ne s''écarta pas de lui). –  Jéroboam… qui avait fait pécher Israël  : cf. 1R 12.28ss.'
  - type: text
    content: mais il s'attacha aux péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël ; il ne s'en écarta pas.
  - type: heading
    content: Expédition militaire contre Moab
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.1n. –  Mésha  : ce roi moabite, artisan de l''indépendance de son pays et allié de son voisin syrien, nous est plus connu par le texte d''une stèle dont la reconstitution est exposée au musée du Louvre. –  éleveur  : litt., le terme désigne celui qui perce un trou ; peut-être renvoie-t-il à une manière de compter le bétail. Il est attesté à Ougarit et employé pour Amos (Am 1.1n  ; 7.14). –  un tribut de cent mille jeunes béliers  : cf. Es 16.1 ; plutôt qu''un tribut annuel, on peut voir dans ce cadeau considérable, soit le cumul de l''impôt versé durant le règne d''Achab, soit le montant de l''impôt versé une seule fois par le vassal lors de l''accession au trône de son suzerain. Ces lectures sont cohérentes avec le fait que c''est à la mort d''Achab (v. 5) que la rébellion de Mésha éclate au plein jour, du fait du non-versement du tribut attendu.'
  - type: text
    content: 'Mésha, roi de Moab, était éleveur ; il payait au roi d''Israël un tribut de cent mille jeunes béliers et de cent mille béliers adultes, avec leur laine. '
  '5':
  - type: text
    content: 'A la mort d''Achab, le roi de Moab se révolta contre le roi d''Israël. '
  '6':
  - type: note
    content: 'alors  : litt. ce jour-là, qui ne saurait renvoyer au jour de la mort d''Achab puisque Joram ne succède pas directement à son père (cf. 1.17n). On peut penser au jour de la révolte de Mésha (v. 5 ; 1.1) ; une interprétation juive y voit le jour de l''arrivée d''Elisée à Samarie (2.25), ce qui expliquerait la présence du prophète dans l''armée (3.11).'
  - type: text
    content: 'Le roi Joram sortit alors de Samarie et passa en revue tout Israël. '
  '7':
  - type: note
    content: 'Cf. 1R 22.2-4. –  Il se mit en marche  : l''expression correspondante est omise par certains mss de LXX et Vg.'
  - type: text
    content: 'Il se mit en marche et fit dire à Josaphat, roi de Juda : Le roi de Moab s''est révolté contre moi ; marcheras-tu avec moi au combat contre Moab ? Josaphat répondit : J''irai ; il en sera pour moi comme pour toi, pour mon peuple comme pour ton peuple, pour mes chevaux comme pour tes chevaux. '
  '8':
  - type: note
    content: 'monterons-nous  : la plupart des mss de LXX portent monterai-je. –  chemin du désert d''Edom  : il est possible que les frontières nord et ouest de Moab aient été fortifiées. Le détour par le sud avec le contournement de la mer Morte permet aussi de ne pas porter ombrage à l''allié syrien du roi de Moab.'
  - type: text
    content: 'Il dit encore : Par quel chemin monterons-nous ? Joram dit : Par le chemin du désert d''Edom.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le roi d''Edom  : selon 8.20, jusqu''au règne de Joram de Juda, Edom appartient à Juda. Peut-être le mot roi désigne-t-il le gouverneur judéen d''Edom (cf. 1R 22.48n). –  la troupe  : litt. le camp . –  qui les suivaient  : litt. dans leurs pieds , il s''agirait des bêtes de charge et de trait et non pas de celles qui sont destinées à la nourriture des troupes. La description rappelle Nb 20.14-21.'
  - type: text
    content: 'Le roi d''Israël, le roi de Juda et le roi d''Edom partirent ; quand ils eurent marché sept jours par une route détournée, il n''y eut plus d''eau pour la troupe ni pour les bêtes qui les suivaient. '
