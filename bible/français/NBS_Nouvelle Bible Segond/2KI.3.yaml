        text: dam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Ils se levèrent de bon matin, et quand le soleil brilla sur les eaux, les Moabites virent en face d''eux les eaux rouges comme du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est du sang…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX et Vg lisent selon une vocalisation différente du texte hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce sang (est celui) de l'épée
    - type: usfm
      marker: ft
      children:
