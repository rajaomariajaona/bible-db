          text: de tous côtés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; semblable expression en Gn 34.21 ; Jg 18.10 ; Es 22.18 ; 33.21 ; Ps 104.25 ; 1Ch 4.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peu peuplée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.1ss ; Dt 28.62. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les maisons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les familles n'étaient pas encore reconstituées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 5ss ; 2.8 ; 3.7,10,20s ; Ag 1.4,9.'
      marker-yv: yv-n
    - type: text
      text: La ville était vaste et grande, mais peu peuplée, et les maisons n'étaient pas bâties.
