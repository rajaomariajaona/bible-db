        text: '61'
    - type: text
      text: 'Voici ceux qui montèrent de Tel-Mélah, de Tel-Harsha, de Keroub-Addôn et d''Immer, et qui ne purent faire connaître leur famille et leur ascendance pour prouver qu''ils étaient d''Israël : '
