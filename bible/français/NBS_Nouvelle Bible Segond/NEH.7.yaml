  '39':
  - type: text
    content: 'Prêtres : les fils de Yedaya, pour la maison de Josué : 973 ;'
  '4':
  - type: note
    content: 'vaste  : litt. large des deux mains, c.-à-d. de tous côtés  ; semblable expression en Gn 34.21 ; Jg 18.10 ; Es 22.18 ; 33.21 ; Ps 104.25 ; 1Ch 4.40. –  peu peuplée  : cf. 11.1ss ; Dt 28.62. –  les maisons…  : certains comprennent les familles n''étaient pas encore reconstituées  ; cf. v. 5ss ; 2.8 ; 3.7,10,20s ; Ag 1.4,9.'
  - type: text
    content: La ville était vaste et grande, mais peu peuplée, et les maisons n'étaient pas bâties.
  '40':
  - type: text
