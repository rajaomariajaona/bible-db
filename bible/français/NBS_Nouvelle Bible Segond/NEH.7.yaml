  '2':
  - type: note
    content: Hanani, mon frère 1.2 ; certains pensent que lui et Hanania sont une seule et même personne. –  citadelle 1.1n  ; 2.8. –  loyauté / crainte de Dieu Ex 18.21.
  - type: text
    content: 'Je donnai mes ordres à Hanani, mon frère, et à Hanania, chef de la citadelle de Jérusalem, homme supérieur à beaucoup par sa loyauté et par sa crainte de Dieu. '
  '20':
  - type: text
