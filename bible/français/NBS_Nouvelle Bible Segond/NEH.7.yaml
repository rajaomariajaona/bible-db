verses:
  '1':
  - type: heading
    content: Les mesures de protection de la ville
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque…  : cf. 1.1+ ; 6.15. –  les battants 3.1,3 etc. –  les portiers  : il s''agit ici, principalement, des gardiens des portes de la ville (v. 3) ; les portiers du temple seront mentionnés à nouveau avec les chantres et les lévites aux v. 43ss.'
  - type: text
    content: 'Lorsque la muraille fut rebâtie et que j''eus posé les battants des portes, on nomma les portiers, les chantres et les lévites. '
