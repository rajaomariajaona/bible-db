      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.1+ ; 6.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les battants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1,3 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les portiers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit ici, principalement, des gardiens des portes de la ville (v. 3) ; les portiers du temple seront mentionnés à nouveau avec '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les chantres et les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 43ss.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque la muraille fut rebâtie et que j''eus posé les battants des portes, on nomma les portiers, les chantres et les lévites. '
