  - type: text
    content: ' '
  - type: note
    content: Esd 2.40n.
  - type: text
    content: 'Lévites : les fils de Josué, pour Qadmiel – pour les fils de Hodva : 74.'
  '44':
  - type: text
    content: 'Chantres : les fils d''Asaph : 148.'
  '45':
  - type: text
    content: 'Portiers : les fils de Shalloum, les fils d''Ater, les fils de Talmôn, les fils d''Aqqoub, les fils de Hatita, les fils de Shobaï : 138.'
  '46':
  - type: text
    content: ' '
  - type: note
    content: V. 60,72 ; 11.3 ; 3.26+.
  - type: text
    content: 'Netinim : les fils de Tsiha, les fils de Hasoupha, les fils de Tabbaoth, '
  '47':
  - type: text
    content: 'les fils de Qéros, les fils de Sia, les fils de Padôn, '
  '48':
  - type: text
    content: 'les fils de Lebana, les fils de Hagaba, les fils de Salmaï, '
  '49':
  - type: text
    content: 'les fils de Hanân, les fils de Guiddel, les fils de Gahar, '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'me mit au cœur 2.12. –  rassembler 8.1. –  les notables… 2.16+. –  registre  : sous-entendu registre généalogique. Les v. 6-72 reproduisent presque textuellement la liste qui se trouve en Esd 2.1-70 (voir les notes de ce chap.) ; cf. 1Ch 4.33 ; 5.1,7 ; 7.5,9 ; 2Ch 31.16ss.'
  - type: text
    content: 'Mon Dieu me mit au cœur de rassembler les notables, les magistrats et le peuple, pour les enregistrer. Je trouvai un registre de ceux qui étaient montés les premiers, et j''y trouvai écrit ce qui suit :'
  - type: heading
    content: Liste des Judéens qui revinrent à Jérusalem et en Juda
  - type: heading
    content: Esd 2.1-70
  '50':
  - type: text
    content: 'les fils de Réaya, les fils de Retsîn, les fils de Neqoda, '
  '51':
  - type: text
    content: 'les fils de Gazzam, les fils d''Ouzza, les fils de Paséah, '
  '52':
  - type: text
    content: 'les fils de Bésaï, les fils de Méounim, les fils de Nephishsim, '
  '53':
  - type: text
    content: 'les fils de Baqbouq, les fils de Haqoupha, les fils de Harhour, '
  '54':
  - type: note
    content: Batslith ou Batslouth, d'après plusieurs mss hébreux et des versions anciennes (cf. Esd 2.52).
  - type: text
    content: 'les fils de Batslith, les fils de Mehida, les fils de Harsha, '
  '55':
  - type: text
    content: 'les fils de Barqos, les fils de Sisera, les fils de Tamah, '
  '56':
  - type: text
    content: les fils de Netsiah, les fils de Hatipha.
  '57':
  - type: text
    content: ' '
  - type: note
    content: Esd 2.55n.
  - type: text
    content: 'Fils des gens de la cour de Salomon : les fils de Sotaï, les fils de Sophéreth, les fils de Perida, '
  '58':
  - type: text
    content: 'les fils de Yaala, les fils de Darqôn, les fils de Guiddel, '
  '59':
  - type: text
    content: les fils de Shephatia, les fils de Hattil, les fils de Pokéreth-Tsebaïm, les fils d'Amôn.
  '6':
  - type: text
    content: 'Voici ceux de la province qui montèrent de captivité, ceux que Nabuchodonosor, roi de Babylone, avait exilés, et qui revinrent à Jérusalem et en Juda, chacun dans sa ville. '
  '60':
  - type: text
    content: 'Total des Netinim et des fils des gens de la cour de Salomon : 392.'
  '61':
  - type: text
    content: 'Voici ceux qui montèrent de Tel-Mélah, de Tel-Harsha, de Keroub-Addôn et d''Immer, et qui ne purent faire connaître leur famille et leur ascendance pour prouver qu''ils étaient d''Israël : '
  '62':
  - type: text
    content: 'les fils de Delaya, les fils de Tobiya, les fils de Neqoda : 642.'
  '63':
  - type: text
    content: ' '
  - type: note
    content: Esd 2.61n.
  - type: text
    content: 'Et parmi les prêtres : les fils de Hobaya, les fils de Haqqots, les fils de Barzillaï, qui avait pris pour femme une des filles de Barzillaï, le Galaadite, et fut appelé de leur nom. '
  '64':
  - type: note
    content: Esd 2.62n.
  - type: text
    content: 'Ils cherchèrent leurs titres généalogiques, mais ne les trouvèrent pas. Ils furent déchus du sacerdoce, '
  '65':
  - type: note
    content: 'Son Excellence v. 69 ; 8.9 ; 10.2 ; Esd 2.63n. –  sacrées  : voir saint.'
  - type: text
    content: et Son Excellence leur dit de ne pas manger des choses très sacrées jusqu'à ce qu'un prêtre soit là pour consulter l'ourim et le toummim.
  '66':
  - type: text
    content: 'L''assemblée tout entière était de 42 360 personnes, '
  '67':
  - type: note
    content: 'Quelques mss hébreux et grecs ajoutent à la fin du v.  : (Ils avaient) 736 chevaux, 245 mulets (cf. Esd 2.66), décalant ainsi la numérotation de cette fin de chap.'
  - type: text
    content: 'sans compter leurs serviteurs et leurs servantes, au nombre de 7 337. Parmi eux se trouvaient 245 chantres et chanteuses. '
  '68':
  - type: text
    content: Ils avaient 435 chameaux et 6 720 ânes.
  '69':
  - type: text
    content: ' '
  - type: note
    content: 'Jusqu''au v. 72 le texte diverge davantage de celui d''Esdras (2.68ss). –  530  : LXX 30  ; certains modifient le texte hébreu traditionnel pour lire 30 tuniques sacerdotales et 500 mines d''argent.'
  - type: text
    content: 'Plusieurs chefs de famille firent des dons pour les travaux. Son Excellence donna au fonds 1 000 drachmes d''or, 50 calices, 530 tuniques sacerdotales. '
  '7':
  - type: note
    content: Cf. Esd 2.2n.
  - type: text
    content: Ils vinrent avec Zorobabel, Josué, Néhémie, Azaria, Raamia, Nahamani, Mardochée, Bilshân, Mispéreth, Bigvaï, Nehoum, Baana.
  - type: text
    content: 'Nombre des hommes du peuple d''Israël :'
  '70':
  - type: note
    content: 'Voir Esd 2.69n. –  fonds  : le terme est aussi traduit par Trésor (10.39) ou magasin (12.44 ; 13.12s). –  2 200 mines  : plus de 1,2 tonnes ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Les chefs de famille donnèrent au fonds des travaux 20 000 drachmes d''or et 2 200 mines d''argent. '
  '71':
  - type: note
    content: '2 000 mines  : plus de 1,1 tonnes.'
  - type: text
    content: Le reste du peuple donna 20 000 drachmes d'or, 2 000 mines d'argent et 67 tuniques sacerdotales.
  '72':
  - type: text
    content: ' '
  - type: note
    content: 'Le septième mois…  : cette phrase est sans doute à considérer comme l''introduction du chap. 8 ; cf. Esd 2.70–3.1 ; 7.7n  ; sur les célébrations du septième mois , voir Lv 16.29 ; 23.24,27,34,39,41 ; 25.9 ; Nb 29.1,7,12 ; Za 7.5 ; 8.19 ; 2Ch 5.3 ; 31.7.'
  - type: text
    content: Les prêtres et les lévites, les portiers, les chantres, une partie du peuple, les Netinim et tout Israël s'installèrent dans leurs villes. Le septième mois arriva, et les Israélites étaient dans leurs villes.
  '8':
  - type: text
    content: 'les fils de Paréosh : 2 172 ;'
  '9':
  - type: text
    content: 'les fils de Shephatia : 372 ;'
