        children:
        - type: text
          text: 'loyauté / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 18.21.
      marker-yv: yv-n
    - type: text
      text: 'Je donnai mes ordres à Hanani, mon frère, et à Hanania, chef de la citadelle de Jérusalem, homme supérieur à beaucoup par sa loyauté et par sa crainte de Dieu. '
