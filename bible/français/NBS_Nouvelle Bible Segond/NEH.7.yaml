  '3':
  - type: note
    content: 'avant que le soleil… Ex 16.21 ; 1S 11.11 ; Es 18.4 ; cf. Jg 16.2. –  et on fermera…  : traduction conjecturale, litt. et jusqu''à ce qu''eux (les portiers ?) se tenant debout fermeront les battants et verrouilleront  ; des versions anciennes ont compris et le jour sera encore là quand on fermera les battants  ; en modifiant quelque peu le texte hébreu on pourrait lire et il (le soleil) sera encore haut quand on fermera les battants. –  monteront la garde  : traduction incertaine ; on pourrait aussi comprendre on établira un tour de garde parmi les habitants…  ; un ms hébreu et une version ancienne ont lu et je postai comme gardes des habitants de Jérusalem… –  en face de sa maison 3.10+.'
  - type: text
    content: 'Je leur dis : Les portes de Jérusalem ne s''ouvriront pas avant que le soleil chauffe, et on fermera les battants au verrou quand les gens se tiennent encore là ; les habitants de Jérusalem monteront la garde, chacun à son poste et chacun en face de sa maison. '
