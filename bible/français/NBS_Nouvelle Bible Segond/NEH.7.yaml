      marker-yv: yv-n
    - type: text
      text: 'Mon Dieu me mit au cœur de rassembler les notables, les magistrats et le peuple, pour les enregistrer. Je trouvai un registre de ceux qui étaient montés les premiers, et j''y trouvai écrit ce qui suit :'
