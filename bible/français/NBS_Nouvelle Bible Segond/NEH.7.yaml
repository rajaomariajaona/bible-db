        children:
        - type: text
          text: 'avant que le soleil… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 16.21 ; 1S 11.11 ; Es 18.4 ; cf. Jg 16.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et on fermera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction conjecturale, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et jusqu''à ce qu''eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les portiers ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se tenant debout fermeront les battants et verrouilleront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; des versions anciennes ont compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et le jour sera encore là quand on fermera les battants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; en modifiant quelque peu le texte hébreu on pourrait lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le soleil) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sera encore haut quand on fermera les battants. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: monteront la garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on établira un tour de garde parmi les habitants…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; un ms hébreu et une version ancienne ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et je postai comme gardes des habitants de Jérusalem… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en face de sa maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.10+.
      marker-yv: yv-n
    - type: text
      text: 'Je leur dis : Les portes de Jérusalem ne s''ouvriront pas avant que le soleil chauffe, et on fermera les battants au verrou quand les gens se tiennent encore là ; les habitants de Jérusalem monteront la garde, chacun à son poste et chacun en face de sa maison. '
