document_id: ZEC.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu éliminera idoles et prophètes
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 12.3+. –  source 14.8 ; cf. Ez 47.1+ ; Ap 22.1. –  maison de David… 12.7+. –  pour le péché…  : cf. Lv 20.21n  ; Nb 19.9n  ; Es 4.4 ; Ez 36.17s,25. –  souillure Lv 12.2n  ; Nb 19.9n  ; Ez 7.19n.'
  - type: text
    content: En ce jour-là, une source sera ouverte pour la maison de David et les habitants de Jérusalem, pour le péché et pour la souillure.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'je retrancherai (cf. Mi 5.11s) … les noms Nb 27.4 ; Jos 7.9 ; Es 14.22 ; 48.19 ; Rt 4.10. –  les prophètes Jr 14.13-15 ; 23.9-22 ; Ez 13 ; Mi 3.5s. –  le souffle (ou l''esprit ) de l''impureté (voir pur, impur) : l''expression désigne sans doute l''inspiration prophétique au service de l''idolâtrie (cf. une expression analogue en Os 4.12 ; 5.4 ; voir aussi Mc 1.23n).'
  - type: text
    content: 'En ce jour-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées – je retrancherai du pays les noms des idoles, et on ne s''en souviendra plus ; j''ôterai aussi du pays les prophètes et le souffle de l''impureté. '
  '3':
  - type: note
    content: 'Cf. Dt 13.6 ; 18.20 ; voir aussi Mc 3.21. –  agit… en prophète  : autre traduction parle… en prophète  ; sur le verbe correspondant, voir Jr 2.8n  ; Ez 4.7n  ; Am 3.8n. –  proféré le mensonge Es 59.3 ; Jr 9.4 ; 14.4s ; 29.23 ; Mi 6.12.'
  - type: text
    content: 'Si un homme agit encore en prophète, son père et sa mère, ceux qui l''ont fait naître, lui diront : Tu ne vivras pas, car tu as proféré le mensonge au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Et son père et sa mère, ceux qui l''ont fait naître, le transperceront, s''il agit en prophète. '
  '4':
  - type: note
    content: chaque prophète aura honte Mi 3.7. –  manteau de poil, vêtement distinctif du prophète 2R 1.8 ; Mt 3.4/ /.
  - type: text
    content: 'En ce jour-là, chaque prophète aura honte de ses visions, quand il parlera en prophète. Ils ne revêtiront plus un manteau de poil afin de dissimuler. '
  '5':
  - type: note
    content: 'Cf. Am 7.14s. –  Chacun d''eux dira  : litt. il dira. –  je suis cultivateur…  : litt. je suis un homme qui cultive la terre (hébreu ’adama, cf. Gn 2.5n,7 ; 4.2n), car un homme (’adam, Gn 1.26n) m''a acquis (cf. Gn 4.1n) depuis ma jeunesse  ; certains modifient le texte hébreu traditionnel de façon à traduire  : je possède de la terre depuis ma jeunesse.'
  - type: text
    content: 'Chacun d''eux dira : Je ne suis pas prophète, je suis cultivateur : depuis ma jeunesse je suis au service de l''homme qui m''a acheté. '
  '6':
  - type: note
    content: 'sur la poitrine  : litt. entre les mains (ou les bras) ; cf. Ex 13.9 ; Lv 21.5 ; Dt 14.1 ; 1R 18.28. –  ceux qui m''aiment  : cf. v. 3 ; on pourrait aussi traduire mes amants, métaphore fréquente pour les faux dieux Ez 16.33 ; Os 2.7 ; 9.12 ; certains ont compris dans la maison de prostitution.'
  - type: text
    content: 'Mais on lui dira : Qu''est-ce que ces blessures que tu as sur la poitrine ? Il répondra : c''est que j''ai été frappé dans la maison de ceux qui m''aiment.'
  - type: heading
    content: L'alliance renouvelée
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Epée Ez 11.8+ ; 21.13ss. –  éveille-toi Es 51.9+ ; cf. Ps 59.5 ; 80.3. –  mon berger  : cf. 11.4-17. –  qui m''est proche  : litt. qui est mon compatriote  ; cf. 12.10 ; sur le terme, voir Lv 18.20n  ; 19.15,17. –  Frappe  : certains mss grecs portent je frapperai  ; cf. Es 53.10 ; Mt 26.31/ . –  je tournerai ma main  : la phrase peut être comprise en bonne part (pour les protéger) comme en mauvaise (pour les frapper) ; cf. Es 1.25 ; Am 1.8. –  les petits  : cf. Jr 44.12.'
  - type: text
    content: Epée, éveille-toi contre mon berger,
  - type: text
    content: contre l'homme qui m'est proche !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: Frappe le berger,
  - type: text
    content: que les bêtes se dispersent !
  - type: text
    content: Et je tournerai ma main vers les petits.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 14.2 ; Ez 5.1-4,12+ ; Ap 8.7+. –  périront  : litt. expireront . –  subsistera  : litt. y restera (dans le pays).'
  - type: text
    content: Alors dans tout le pays
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: les deux tiers seront retranchés, ils périront,
  - type: text
    content: et l'autre tiers subsistera.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je le ferai fondre / je l''éprouverai  : litt. je les ferai fondre / je les éprouverai  ; Es 48.10 ; Ez 22.17-22 ; Ml 3.2s ; Ps 66.10 ; Pr 17.3 ; cf. Sagesse 3.5s : « Après de légères corrections, ils recevront de grands bienfaits. Dieu les a éprouvés et les a trouvés dignes de lui ; comme l''or au creuset, il les a épurés, comme l''offrande d''un holocauste, il les a accueillis. » –  Il invoquera mon nom Gn 4.26n. –  mon peuple / mon Dieu 8.8+.'
  - type: text
    content: Je mettrai ce tiers dans le feu
  - type: text
    content: et je le ferai fondre
  - type: text
    content: comme on fait fondre l'argent,
  - type: text
    content: je l'éprouverai
  - type: text
    content: comme on éprouve l'or.
  - type: text
    content: Il invoquera mon nom,
  - type: text
    content: et je lui répondrai ;
  - type: text
    content: 'je dirai : C''est lui qui est mon peuple !'
  - type: text
    content: 'Et lui dira : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est mon Dieu !'
