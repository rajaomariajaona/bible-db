document_id: LEV.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le porte-lampes du sanctuaire
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 12.38. –  Israélite  : exceptionnellement le texte porte ici (v. 11 ; 2S 17.25) le nom de peuple correspondant exactement à notre mot Israélite , et non pas la formule habituelle (litt. fils d''Israël ).'
  - type: text
    content: 'Le fils d''une Israélite et d''un Egyptien, qui était venu au milieu des Israélites, sortit ; une querelle éclata dans le camp entre le fils de cette Israélite et un Israélite. '
  '11':
  - type: note
    content: 'blasphéma  : autre traduction prononça  ; le verbe hébreu correspondant (de même dans la suite) peut être rattaché à deux racines différentes ; l''une signifie proprement percer, transpercer (cf. 2R 12.10 ; 18.21 etc.) et peut avoir les sens de fixer, indiquer, désigner (cf. Gn 30.28 ; Es 62.2 ; Am 6.1n) ; l''autre a le sens de maudire ou vouer à la malédiction (Nb 22.11n  ; Jb 3.8 ; 5.3 ; Pr 11.26 ; 24.24), comme ici le verbe suivant. Voir bénédiction, malédiction. –  le Nom  : pour éviter de prononcer le nom de YHWH (le Seigneur), surtout dans un contexte évoquant le blasphème ou la malédiction, on le remplaçait souvent par des équivalents comme celui-ci ; cf. Ex 20.7 ; 22.27 ; 1R 21.10,13 ; Es 8.21 ; Mt 26.66/ / ; Jn 10.33.'
  - type: text
    content: 'Le fils de cette Israélite blasphéma le Nom et le maudit. On l''amena à Moïse. Le nom de sa mère était Shelomith, fille de Dibri, de la tribu de Dan. '
  '12':
  - type: note
    content: 'Cf. Nb 27.5-7. –  qu''une décision soit prise  : litt. qu''il soit décidé pour eux  ; cf. Nb 15.34 ; Né 8.8n.'
  - type: text
    content: 'On le plaça sous bonne garde, jusqu''à ce qu''une décision soit prise sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '14':
  - type: note
    content: 'Fais sortir du camp…  : cf. 16.27+ ; Nb 15.35s ; Jos 7.25 ; Ac 7.58 ; Hé 13.13. –  celui qui a maudit v. 11,15,23. –  poseront les mains…  : cf. 1.4n  ; 16.21n.'
  - type: text
    content: 'Fais sortir du camp celui qui a maudit ; tous ceux qui l''ont entendu poseront les mains sur sa tête, et toute la communauté le lapidera. '
  '15':
  - type: note
    content: Voir péché.
  - type: text
    content: 'Tu diras aux Israélites : Quiconque maudit son Dieu sera chargé de son péché. '
  '16':
  - type: text
    content: 'Celui qui blasphème le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) sera mis à mort : toute la communauté le lapidera. Qu''il soit immigré ou autochtone, il mourra pour avoir blasphémé le Nom. '
  '17':
  - type: note
    content: Ex 20.13 ; 21.12 ; cf. 1R 21.19 ; Mt 5.21.
  - type: text
    content: 'Celui qui frappe mortellement un être humain sera mis à mort. '
  '18':
  - type: note
    content: Litt. celui qui frappe un être de bête la compensera (ou restituera) être pour être  ; cf. v. 21 ; Ex 21.33s ; 22.13 ; voir Gn 1.20n.
  - type: text
    content: 'Celui qui frappe mortellement une bête en donnera une compensation : vie pour vie. '
  '19':
  - type: note
    content: compatriote 18.20n.
  - type: text
    content: 'Si quelqu''un inflige une mutilation à son compatriote, il lui sera fait comme il a fait : '
  '2':
  - type: note
    content: 'Cf. Ex 25.31-40 ; 27.20s ; 37.17-24 ; Nb 4.16 ; 1S 3.3. –  huile d''olive… Ex 27.20n. –  d''entretenir  : litt. de faire monter, cf. Ex 25.37n  ; 30.8. –  les lampes  : litt. une lampe  ; de même le v. 3 s''y réfère au singulier (litt. la disposera…).'
  - type: text
    content: 'Ordonne aux Israélites de te procurer, pour le luminaire, de l''huile d''olive fine et vierge, afin d''entretenir constamment les lampes. '
  '20':
  - type: note
    content: Ex 21.23-25 ; Dt 19.16ss ; Ab 15 ; Mt 5.38-42. –  mutilation 21.17n.
  - type: text
    content: 'fracture pour fracture, œil pour œil, dent pour dent ; il lui sera infligé la même mutilation qu''il a infligée à un être humain. '
  '21':
  - type: text
    content: 'Celui qui frappe mortellement une bête en donnera une compensation, mais celui qui frappe mortellement un être humain sera mis à mort. '
  '22':
  - type: note
    content: '16.29+ ; cf. Nb 15.16. –  un même droit  : autre traduction une même règle  ; voir loi.'
  - type: text
    content: 'Il y aura un même droit pour l''immigré et pour l''autochtone : je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '23':
  - type: text
    content: 'Moïse parla aux Israélites ; ils firent sortir du camp le blasphémateur et le lapidèrent. Les Israélites firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse.'
  '3':
  - type: note
    content: 'pour qu''elles brûlent  : sous-entendu dans le texte. –  prescription  : voir loi. – Voir générations.'
  - type: text
    content: 'C''est à l''extérieur du voile du Témoignage, dans la tente de la Rencontre, qu''Aaron les disposera pour qu''elles brûlent constamment devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', du soir au matin. C''est une prescription perpétuelle, pour toutes vos générations. '
  '4':
  - type: note
    content: 'Cf. Ex 31.8. –  pur  : autre traduction d''or pur, de même au v. 6.'
  - type: text
    content: 'Il disposera les lampes sur le porte-lampes pur, pour qu''elles soient constamment devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les pains offerts à Dieu
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 25.23-30 ; 37.10-16 ; 1S 21.5-7 ; Mt 12.4/ /. –  deux dixièmes  : probablement d''épha (voir mesures), c.-à-d. un peu plus de 4 l. (cf. 23.13n).'
  - type: text
    content: 'Tu prendras de la fleur de farine et tu en feras douze gâteaux ; chaque gâteau sera de deux dixièmes. '
  '6':
  - type: note
    content: 'rangées  : autre traduction piles. –  la table pure  : autre traduction la table d''or pur.'
  - type: text
    content: 'Tu les placeras en deux rangées, six par rangée, sur la table pure, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'de l''encens raffiné 2.1n  ; LXX ajoute et du sel (cf. 2.13), mais ne porte pas la mention de l’offrande consumée par le feu. –  comme évocation 2.2n  ; cf. 1Co 11.24. –  offrande  : voir sacrifices.'
  - type: text
    content: 'Tu mettras de l''encens raffiné sur chaque rangée ; il sera sur le pain comme évocation, en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'Voir sabbat. –  ils seront pris sur ce qui appartient aux Israélites  : autre traduction de la part des Israélites. – Voir alliance.'
  - type: text
    content: 'Chaque jour de sabbat, on disposera ces pains pour qu''ils soient constamment devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils seront pris sur ce qui appartient aux Israélites. C''est une alliance perpétuelle. '
  '9':
  - type: note
    content: 'Voir fils. –  dans un lieu sacré 6.9+ ; voir saint. –  prescription  : voir loi.'
  - type: text
    content: 'Ils seront pour Aaron et pour ses fils ; ceux-ci les mangeront dans un lieu sacré : ce sera pour eux une chose très sacrée parmi les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: . C'est une prescription perpétuelle.
  - type: heading
    content: Châtiment du blasphème
