      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joram avait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
