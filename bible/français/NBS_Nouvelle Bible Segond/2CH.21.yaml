    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Azaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '‘Azaryahou '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à la deuxième occurrence, cf. 1R 4.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shephatia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Ch 12.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: roi d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : plusieurs mss hébreux et des versions anciennes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: roi de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cependant, le nom Israël pour le royaume de Juda est fréquent dans 2 Chroniques, cf. v. 4 ; 12.1 ; 15.17.
    marker-yv: yv-n
  - type: text
    text: 'Joram avait des frères, fils de Josaphat : Azaria, Yehiel, Zacharie, Azaria, Michel et Shephatia. Tous ceux-là sont les fils de Josaphat, roi d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 11.22s.
    marker-yv: yv-n
  - type: text
    text: 'Leur père leur avait fait des dons considérables en argent et en or et de riches présents, y compris des villes fortes en Juda ; mais il laissa le royaume à Joram, parce que celui-ci était le premier-né. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: eut pris possession du royaume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se fut levé sur le royaume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il tua par l'épée…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Joram veut ainsi s''assurer le pouvoir.'
    marker-yv: yv-n
  - type: text
    text: Lorsque Joram eut pris possession du royaume de son père et qu'il fut devenu fort, il tua par l'épée tous ses frères et quelques-uns aussi des chefs d'Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2R 8.17-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'huit ans '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ≈ 848-841 av. J.-C. ; cf. v. 20.
    marker-yv: yv-n
  - type: text
    text: 'Joram avait trente-deux ans lorsqu''il devint roi ; il régna huit ans à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui déplaisait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 11.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il suivit la voie des rois d''Israël, comme l''avait fait la maison d''Achab, car il avait pour femme une fille d''Achab, et il fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 8.19 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
      - type: text
        text: ' qu''il avait conclue pour David '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il lui donnerait toujours une lampe…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il assurerait toujours une lignée royale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2S 21.17 ; 1R 11.36. Plus généralement la lampe peut être une image de la vie, cf. Jb 18.6 ; 21.17 ; Pr 24.20.'
    marker-yv: yv-n
  - type: text
    text: 'Mais le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne voulut pas détruire la maison de David, à cause de l''alliance qu''il avait conclue pour David, et parce qu''il avait dit qu''il lui donnerait toujours une lampe, à lui et à ses fils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Edom se révolta…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Josaphat avait remporté une victoire sur Edom, mais son fils n''arrive pas à tenir ce pays sous sa domination.'
    marker-yv: yv-n
  - type: text
    text: 'En ses jours, Edom se révolta contre la domination de Juda et se donna un roi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.36 souligne l'échec de Juda, alors que les Chroniques semblent l'atténuer.
    marker-yv: yv-n
  - type: text
    text: 'Joram partit avec ses chefs et tous ses chars. Il se leva de nuit et battit les Edomites qui l''encerclaient ainsi que les chefs des chars. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'à ce jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même expression hébraïque en 5.9 ; 8.8 ; 10.19 ; 20.26 ; 35.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Libna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 8.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'contre sa domination, parce qu''il avait abandonné le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : remarque n''ayant pas de parallèle dans 2R 8.22 ; cf. 2Ch 12.2 ; voir l''introduction aux Chroniques♦.'
    marker-yv: yv-n
  - type: text
    text: 'Edom s''est révolté contre la domination de Juda jusqu''à ce jour. Libna aussi se révolta en ce temps-là contre sa domination, parce qu''il avait abandonné le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de ses pères.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 11-19, partie propre aux Chroniques. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: hauts
      - type: text
        text: ' lieux'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Joram bâtit des centres de cultes idolâtriques que les rois pieux avaient essayé d''éradiquer (cf. 17.6). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: montagnes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : plusieurs mss hébreux, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prostitution
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : image de l''infidélité d''Israël à l''égard du S'
      - type: usfm
        marker: sc
        children:
        - type: text
          text: eigneur
      - type: text
        text: ' lorsque le peuple adopte des cultes étrangers, cf. Dt 31.16 ; Jg 8.33 ; Jr 3.1-6 ; Ez 6.9 ; Os 1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss ; Ps 106.39 etc.
    marker-yv: yv-n
  - type: text
    text: 'Joram fit même des hauts lieux dans les montagnes de Juda ; il livra les habitants de Jérusalem à la prostitution et il entraîna Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'écrit du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 29.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prophète Elie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : seule mention de ce prophète dans les Chroniques.'
    marker-yv: yv-n
  - type: text
    text: 'Il lui vint un écrit du prophète Elie, qui disait : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de David, ton père : Parce que tu n''as pas suivi les voies de ton père Josaphat, et les voies d''Asa, roi de Juda, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme l'a fait la maison d'Achab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6 ; 22.3s ; 1R 16.30-33 ; 2R 8.18,27 ; voir aussi 2R 9.7ss ; 10.10s,30 ; Mi 6.16.'
    marker-yv: yv-n
  - type: text
    text: 'mais que tu as suivi la voie des rois d''Israël ; parce que tu as livré à la prostitution Juda et les habitants de Jérusalem, comme l''a fait la maison d''Achab, et parce que tu as tué tes frères, ceux de la maison même de ton père, qui étaient meilleurs que toi ; – '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frappera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe au v. 18) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: '… d''un grand fléau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' frappera ton peuple d''un grand fléau, tes fils, tes femmes et tous tes biens ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il te frappera de graves maladies…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. la maladie d''Asa (16.12-14) et la « lèpre » d''Ozias (26.16-23) ; voir aussi l''introduction aux Chroniques♦.'
    marker-yv: yv-n
  - type: text
    text: et toi, il te frappera de graves maladies, d'un mal d'intestins qui augmentera de jour en jour, jusqu'à ce que tes intestins sortent par la force du mal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'éveilla… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 36.22 ; Esd 1.1 ; 1Ch 5.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des Arabes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 17.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Koushites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce terme désigne souvent les Nubiens, mais peut se référer à d''autres populations ; cf. Gn 2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' éveilla contre Joram l''esprit des Philistins et des Arabes qui étaient voisins des Koushites. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils attaquèrent Juda, ils y pénétrèrent et ils capturèrent tous les biens qui se trouvaient dans la maison du roi, y compris ses fils et ses femmes, de sorte qu'il ne lui resta d'autre fils que Joachaz, le plus jeune de ses fils.
