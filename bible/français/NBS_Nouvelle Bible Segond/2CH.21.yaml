    - type: text
      text: '1'
  - type: text
    text: Josaphat se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Joram, son fils, devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Joram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
