document_id: 2CH.21,104
type_code: fra
verses:
  '1':
  - type: text
    content: Josaphat se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Joram, son fils, devint roi à sa place.
  - type: heading
    content: Règne de Joram
  '10':
  - type: note
    content: 'jusqu''à ce jour  : même expression hébraïque en 5.9 ; 8.8 ; 10.19 ; 20.26 ; 35.25. –  Libna  : cf. 2R 8.22n. –  contre sa domination, parce qu''il avait abandonné le Seigneur  : remarque n''ayant pas de parallèle dans 2R 8.22 ; cf. 2Ch 12.2 ; voir l''introduction aux Chroniques♦.'
  - type: text
    content: 'Edom s''est révolté contre la domination de Juda jusqu''à ce jour. Libna aussi se révolta en ce temps-là contre sa domination, parce qu''il avait abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de ses pères.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 11-19, partie propre aux Chroniques. –  des hauts lieux  : Joram bâtit des centres de cultes idolâtriques que les rois pieux avaient essayé d''éradiquer (cf. 17.6). –  montagnes  : plusieurs mss hébreux, LXX et Vg portent villes . –  prostitution  : image de l''infidélité d''Israël à l''égard du Seigneur lorsque le peuple adopte des cultes étrangers, cf. Dt 31.16 ; Jg 8.33 ; Jr 3.1-6 ; Ez 6.9 ; Os 1.2nss ; Ps 106.39 etc.'
  - type: text
    content: 'Joram fit même des hauts lieux dans les montagnes de Juda ; il livra les habitants de Jérusalem à la prostitution et il entraîna Juda. '
  '12':
  - type: note
    content: 'écrit du prophète  : cf. Jr 29.1ss. –  prophète Elie  : seule mention de ce prophète dans les Chroniques.'
  - type: text
    content: 'Il lui vint un écrit du prophète Elie, qui disait : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de David, ton père : Parce que tu n''as pas suivi les voies de ton père Josaphat, et les voies d''Asa, roi de Juda, '
  '13':
  - type: note
    content: 'comme l''a fait la maison d''Achab  : cf. v. 6 ; 22.3s ; 1R 16.30-33 ; 2R 8.18,27 ; voir aussi 2R 9.7ss ; 10.10s,30 ; Mi 6.16.'
  - type: text
    content: 'mais que tu as suivi la voie des rois d''Israël ; parce que tu as livré à la prostitution Juda et les habitants de Jérusalem, comme l''a fait la maison d''Achab, et parce que tu as tué tes frères, ceux de la maison même de ton père, qui étaient meilleurs que toi ; – '
  '14':
  - type: note
    content: frappera (même verbe au v. 18) … d'un grand fléau 13.20n.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappera ton peuple d''un grand fléau, tes fils, tes femmes et tous tes biens ; '
  '15':
  - type: note
    content: 'il te frappera de graves maladies…  : cf. la maladie d''Asa (16.12-14) et la « lèpre » d''Ozias (26.16-23) ; voir aussi l''introduction aux Chroniques♦.'
  - type: text
    content: et toi, il te frappera de graves maladies, d'un mal d'intestins qui augmentera de jour en jour, jusqu'à ce que tes intestins sortent par la force du mal.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'éveilla… l''esprit  : cf. 36.22 ; Esd 1.1 ; 1Ch 5.26. –  des Arabes  : cf. 17.11n. –  Koushites  : ce terme désigne souvent les Nubiens, mais peut se référer à d''autres populations ; cf. Gn 2.13n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' éveilla contre Joram l''esprit des Philistins et des Arabes qui étaient voisins des Koushites. '
  '17':
  - type: text
    content: Ils attaquèrent Juda, ils y pénétrèrent et ils capturèrent tous les biens qui se trouvaient dans la maison du roi, y compris ses fils et ses femmes, de sorte qu'il ne lui resta d'autre fils que Joachaz, le plus jeune de ses fils.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'inguérissable  : l''expression hébraïque correspondante est rendue par sans remède en 36.16 ; Pr 6.15 ; 29.1.'
  - type: text
    content: 'Après tout cela, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le frappa d''une maladie d''intestins inguérissable. '
  '19':
  - type: note
    content: 'ne fit pas de feu pour lui  : contrairement à ce qui avait été fait pour le roi Asa (16.14n) ; cf. Jr 34.5.'
  - type: text
    content: Elle augmenta de jour en jour, et sur la fin de la deuxième année les intestins de Joram sortirent par la force de son mal. Il mourut dans de violentes souffrances. Son peuple ne fit pas de feu pour lui, comme il l'avait fait pour ses pères.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Joram avait  : litt. il avait . –  Azaria  : hébreu ‘Azaryahou à la deuxième occurrence, cf. 1R 4.2n. –  Shephatia 1Ch 12.6n. –  roi d''Israël  : plusieurs mss hébreux et des versions anciennes portent roi de Juda  ; cependant, le nom Israël pour le royaume de Juda est fréquent dans 2 Chroniques, cf. v. 4 ; 12.1 ; 15.17.'
  - type: text
    content: 'Joram avait des frères, fils de Josaphat : Azaria, Yehiel, Zacharie, Azaria, Michel et Shephatia. Tous ceux-là sont les fils de Josaphat, roi d''Israël. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Pour la première fois, les Chroniques omettent de renvoyer à des sources plus complètes sur le règne d''un roi (cf. 20.34). –  Il s''en alla sans être regretté…  : cf. 2R 8.24, qui omet les détails désobligeants sur la mort de Joram. –  on l''ensevelit dans la Ville de David  : cf. 9.31n.'
  - type: text
    content: Il avait trente-deux ans lorsqu'il devint roi ; il régna huit ans à Jérusalem. Il s'en alla sans être regretté, et on l'ensevelit dans la Ville de David, mais non pas dans les tombeaux des rois.
  '3':
  - type: note
    content: Cf. 11.22s.
  - type: text
    content: 'Leur père leur avait fait des dons considérables en argent et en or et de riches présents, y compris des villes fortes en Juda ; mais il laissa le royaume à Joram, parce que celui-ci était le premier-né. '
  '4':
  - type: note
    content: 'eut pris possession du royaume  : litt. se fut levé sur le royaume. –  il tua par l''épée…  : Joram veut ainsi s''assurer le pouvoir.'
  - type: text
    content: Lorsque Joram eut pris possession du royaume de son père et qu'il fut devenu fort, il tua par l'épée tous ses frères et quelques-uns aussi des chefs d'Israël.
  - type: heading
    content: 2R 8.17-24
  '5':
  - type: text
    content: ' '
  - type: note
    content: huit ans ≈ 848-841 av. J.-C. ; cf. v. 20.
  - type: text
    content: 'Joram avait trente-deux ans lorsqu''il devint roi ; il régna huit ans à Jérusalem. '
  '6':
  - type: note
    content: 'ce qui déplaisait…  : cf. 1R 11.6n.'
  - type: text
    content: 'Il suivit la voie des rois d''Israël, comme l''avait fait la maison d''Achab, car il avait pour femme une fille d''Achab, et il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'la maison de David  : cf. 2R 8.19 (Juda). –  l''alliance qu''il avait conclue pour David 13.5n. –  il lui donnerait toujours une lampe…  : c.-à-d. il assurerait toujours une lignée royale  ; cf. 2S 21.17 ; 1R 11.36. Plus généralement la lampe peut être une image de la vie, cf. Jb 18.6 ; 21.17 ; Pr 24.20.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne voulut pas détruire la maison de David, à cause de l''alliance qu''il avait conclue pour David, et parce qu''il avait dit qu''il lui donnerait toujours une lampe, à lui et à ses fils.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Edom se révolta…  : Josaphat avait remporté une victoire sur Edom, mais son fils n''arrive pas à tenir ce pays sous sa domination.'
  - type: text
    content: 'En ses jours, Edom se révolta contre la domination de Juda et se donna un roi. '
  '9':
  - type: note
    content: 1R 11.36 souligne l'échec de Juda, alors que les Chroniques semblent l'atténuer.
  - type: text
    content: 'Joram partit avec ses chefs et tous ses chars. Il se leva de nuit et battit les Edomites qui l''encerclaient ainsi que les chefs des chars. '
