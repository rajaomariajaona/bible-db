  - type: text
    text: Elle augmenta de jour en jour, et sur la fin de la deuxième année les intestins de Joram sortirent par la force de son mal. Il mourut dans de violentes souffrances. Son peuple ne fit pas de feu pour lui, comme il l'avait fait pour ses pères.
