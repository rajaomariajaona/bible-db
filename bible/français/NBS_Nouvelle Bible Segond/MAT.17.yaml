        - type: text
          text: n
      - type: text
        text: '  ; 2Co 3.18 ; Ap 1.16.'
    marker-yv: yv-n
  - type: text
    text: 'Il fut transfiguré devant eux : son visage se mit à briller comme le soleil, et ses vêtements devinrent blancs comme la lumière. '
