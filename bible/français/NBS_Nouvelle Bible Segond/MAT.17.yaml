    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ml 3.23s.
    marker-yv: yv-n
  - type: text
    text: 'Les disciples lui posèrent cette question : Pourquoi donc les scribes disent-ils : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Il faut qu'Elie vienne d'abord.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rétablir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 1.6 ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '48.10 : « Toi (Elie) qui fus désigné, dans les reproches pour les temps à venir, pour apaiser la colère avant qu''elle ne se déchaîne, ramener le cœur du père vers le fils et rétablir les tribus de Jacob. »'
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Il est vrai qu’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Elie vient
  - type: text
    text: ' tout '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rétablir
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1R 19.2,10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'souffrir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.21+.
    marker-yv: yv-n
  - type: text
    text: 'Mais je vous dis qu''Elie est déjà venu : ils ne l''ont pas reconnu et ils l''ont traité comme ils ont voulu. De même ils vont faire souffrir le Fils de l''homme. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les disciples comprirent alors qu'il leur parlait de Jean le Baptiseur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit un enfant lunatique
  marker-yv: yv-h
- type: usfm
