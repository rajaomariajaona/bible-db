    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10 ; Ml 3.22s.
    marker-yv: yv-n
  - type: text
    text: 'Moïse et Elie leur apparurent, qui s''entretenaient avec lui. '
  - type: usfm
