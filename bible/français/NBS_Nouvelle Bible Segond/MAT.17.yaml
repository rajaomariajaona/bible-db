document_id: MAT.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus transfiguré
  - type: heading
    content: Mc 9.2-10  ; Lc 9.28-36
  - type: text
    content: ' '
  - type: note
    content: Pierre / Jacques / Jean 26.37/ / ; Mc 5.37/ / ; 13.3/ / ; cf. Ex 24.13-16 ; 2P 1.16-18.
  - type: text
    content: 'Six jours après, Jésus prend avec lui Pierre, Jacques et Jean, son frère, et il les conduit à l''écart sur une haute montagne. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: scribes 7.29 ; 9.3 ; 23.34. –  Il faut… 11.14 ; Ml 3.23s.
  - type: text
    content: 'Les disciples lui posèrent cette question : Pourquoi donc les scribes disent-ils : '
  - type: text
    content: Il faut qu'Elie vienne d'abord.
  - type: text
    content: ' '
  '11':
  - type: note
    content: 'rétablir Ac 1.6 ; cf. Siracide 48.10 : « Toi (Elie) qui fus désigné, dans les reproches pour les temps à venir, pour apaiser la colère avant qu''elle ne se déchaîne, ramener le cœur du père vers le fils et rétablir les tribus de Jacob. »'
  - type: text
    content: 'Il répondit : Il est vrai qu’'
  - type: text
    content: Elie vient
  - type: text
    content: ' tout '
  - type: text
    content: rétablir
  - type: text
    content: '. '
  '12':
  - type: note
    content: 1R 19.2,10. –  souffrir 16.21+.
  - type: text
    content: 'Mais je vous dis qu''Elie est déjà venu : ils ne l''ont pas reconnu et ils l''ont traité comme ils ont voulu. De même ils vont faire souffrir le Fils de l''homme. '
  '13':
  - type: text
    content: Les disciples comprirent alors qu'il leur parlait de Jean le Baptiseur.
  - type: heading
    content: Jésus guérit un enfant lunatique
  - type: heading
    content: Mc 9.14-29  ; Lc 9.37-43
  '14':
  - type: text
    content: 'Lorsqu''ils furent arrivés près de la foule, un homme vint se mettre à genoux devant lui '
  '15':
  - type: note
    content: aie compassion 9.27+. –  lunatique 4.24n  ; cf. Mc 9.17-22. –  souffre beaucoup ou, selon certains mss, va mal.
  - type: text
    content: 'en disant : Seigneur, aie compassion de mon fils, qui est lunatique et souffre beaucoup ; il tombe souvent dans le feu, souvent dans l''eau. '
  '16':
  - type: note
    content: 10.1 ; 2R 4.31.
  - type: text
    content: 'Je l''ai amené à tes disciples, et ils n''ont pas pu le guérir. '
  '17':
  - type: note
    content: Génération 12.39+. – Sur l'ensemble, cf. Nb 14.11 ; Jn 14.9.
  - type: text
    content: 'Jésus dit : Génération sans foi et perverse, jusqu''à quand serai-je avec vous ? Jusqu''à quand vous supporterai-je ? Amenez-le-moi ici. '
  '18':
  - type: note
    content: 'rabroua (8.26n) …  : litt. le rabroua et le démon sortit de lui, et le garçon fut guéri. –  dès ce moment même 8.13n.'
  - type: text
    content: Jésus rabroua le démon, qui sortit du garçon, et celui-ci fut guéri dès ce moment même.
  '19':
  - type: text
    content: 'Alors les disciples vinrent demander à Jésus, en privé : Pourquoi n''avons-nous pas pu le chasser nous-mêmes ? '
  '2':
  - type: note
    content: 13.43 ; Ex 34.29s ; Mc 9.2n  ; 2Co 3.18 ; Ap 1.16.
  - type: text
    content: 'Il fut transfiguré devant eux : son visage se mit à briller comme le soleil, et ses vêtements devinrent blancs comme la lumière. '
  '20':
  - type: note
    content: 'peu de foi (cf. 6.30+) : certains mss portent c''est à cause de votre manque de foi (comme en 13.58n). –  Amen 5.18n. –  graine de moutarde 13.31n. – Sur l''ensemble, cf. 18.19n  ; 21.21/ / ; Jn 11.40 ; 1Co 13.2.'
  - type: text
    content: '– C''est parce que vous avez peu de foi, leur dit-il. '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, en effet, si vous avez de la foi comme une graine de moutarde, vous direz à cette montagne : « Déplace-toi d''ici à là », et elle se déplacera ; rien ne vous sera impossible. [ '
  '21':
  - type: note
    content: 'Certains mss ajoutent ici  : Mais cette espèce-là ne sort que par la prière et le jeûne (cf. Mc 9.29).'
  - type: text
    content: ']'
  - type: heading
    content: Jésus annonce de nouveau sa mort et sa résurrection
  - type: heading
    content: Mc 9.30-32  ; Lc 9.43-45
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'En Galilée, un jour qu''ils étaient réunis  : certains mss portent alors qu''ils parcouraient la Galilée… 16.21+ ; cf. 2S 24.14. –  homme et humains traduisent un même mot grec ; voir Fils.'
  - type: text
    content: 'En Galilée, un jour qu''ils étaient réunis, Jésus leur dit : Le Fils de l''homme va être livré aux humains ; '
  '23':
  - type: note
    content: 'se réveillera  : autre traduction se relèvera, cf. 2.13n  ; voir résurrection. –  profondément attristés  : même expression 18.31 ; 26.22 ; cf. 9.15 ; Jn 16.5s.'
  - type: text
    content: ils le tueront, et le troisième jour il se réveillera. Ils furent profondément attristés.
  - type: heading
    content: Jésus et Pierre paient l'impôt du temple
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque Jésus…  : litt. lorsqu''ils arrivèrent . –  maître  : au sens d’ enseignant . –  les didrachmes  : pièces de monnaie grecques d''une valeur de deux drachmes ; il s''agit sans doute de l''impôt annuel prélevé sur tout Israélite pour le temple (cf. Ex 30.13s ; deux drachmes sont à peu près équivalentes à un demi-sicle). Voir mesures, poids et monnaies ; voir aussi 22.17-21.'
  - type: text
    content: 'Lorsque Jésus et ses disciples arrivèrent à Capharnaüm, ceux qui percevaient les didrachmes vinrent demander à Pierre : Votre maître paie-t-il les didrachmes ? '
  '25':
  - type: note
    content: 'la capitation  : impôt direct prélevé « par tête », sur chaque individu ; le texte grec emploie une transcription du latin census, qui a donné notre mot « recensement » ; de même en 22.17,19 ; Mc 12.14. –  leurs fils  : l''expression peut signifier leur propre famille ou, moins probablement, leur propre peuple  ; parallèlement, le terme traduit par autres pourrait être rendu par étrangers, de même au v. 26 ; cf. Jn 10.5n.'
  - type: text
    content: '– Oui, dit-il. Quand il fut entré dans la maison, Jésus, prenant les devants, lui dit : Simon, qu''en penses-tu ? Les rois de la terre, de qui perçoivent-ils les taxes ou la capitation ? De leurs fils, ou des autres ? '
  '26':
  - type: note
    content: 'exemptés  : litt. libres (cf. Jn 8.33-36).'
  - type: text
    content: 'Il répondit : Des autres. Jésus lui dit : Alors les fils sont exemptés. '
  '27':
  - type: note
    content: que nous ne causions pas leur chute ou que nous ne les scandalisions pas, 11.6n  ; 16.23n  ; Rm 14.13 ; 1Co 8.13 ; 9.1,12 ; cf. Ac 21.17-26. –  un statère = 4 drachmes ou 2 didrachmes (v. 24n  ; voir mesures, poids et monnaies). – Cf. Mc 14.13.
  - type: text
    content: Mais pour que nous ne causions pas leur chute, va à la mer, jette l'hameçon et tire le premier poisson qui viendra ; ouvre-lui la bouche et tu y trouveras un statère. Prends-le et donne-le-leur, pour moi et pour toi.
  '3':
  - type: note
    content: Elie v. 10 ; Ml 3.22s.
  - type: text
    content: 'Moïse et Elie leur apparurent, qui s''entretenaient avec lui. '
  '4':
  - type: note
    content: bon ou beau, cf. 12.33n. Voir aussi Ph 1.23.
  - type: text
    content: 'Pierre dit à Jésus : Seigneur, il est bon que nous soyons ici ; si tu le veux, je dresserai ici trois tentes, une pour toi, une pour Moïse et une pour Elie. '
  '5':
  - type: note
    content: nuée Ex 13.21+ ; Ac 1.9. –  voix… 3.17n  ; 16.16+ ; Dt 18.15 ; Jn 10.17 ; Ac 3.22. –  mon Fils bien-aimé ou mon Fils, le bien-aimé.
  - type: text
    content: 'Comme il parlait encore, une nuée lumineuse les couvrit de son ombre. Et une voix retentit de la nuée : Celui-ci est mon Fils bien-aimé ; c''est en lui que j''ai pris plaisir. Ecoutez-le !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ez 1.28 ; Ha 3.2 ; Dn 10.9. –  saisis d''une grande crainte  : même expression 27.54.'
  - type: text
    content: 'Lorsqu''ils entendirent cela, les disciples tombèrent face contre terre, saisis d''une grande crainte. '
  '7':
  - type: note
    content: 'Dn 8.18 ; Ap 1.17. –  Levez-vous  : le même verbe est traduit par se réveiller v. 9 ; cf. 2.13n.'
  - type: text
    content: 'Mais Jésus s''approcha, les toucha de la main et dit : Levez-vous, n''ayez pas peur ! '
  '8':
  - type: note
    content: Litt. ayant levé les yeux ils ne virent personne sinon lui, Jésus, seul.
  - type: text
    content: Ils levèrent les yeux et ne virent personne que Jésus, seul.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 8.4+ ; 16.20s. –  vision Ac 9.10+. –  Fils de l'homme 8.20n. –  se soit réveillé ou relevé (2.13n), voir résurrection  ; certains mss portent l'autre verbe grec traduit par se lever ou se relever  ; de même v. 23 ; 20.19.
  - type: text
    content: 'Comme ils descendaient de la montagne, Jésus leur donna cet ordre : Ne parlez à personne de cette vision jusqu''à ce que le Fils de l''homme se soit réveillé d''entre les morts.'
  - type: heading
    content: Les disciples questionnent Jésus au sujet d'Elie
  - type: heading
    content: Mc 9.11-13
