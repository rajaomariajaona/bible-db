        text: 'mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' bien-aimé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon Fils, le bien-aimé.
    marker-yv: yv-n
  - type: text
    text: 'Comme il parlait encore, une nuée lumineuse les couvrit de son ombre. Et une voix retentit de la nuée : Celui-ci est mon Fils bien-aimé ; c''est en lui que j''ai pris plaisir. Ecoutez-le !'
