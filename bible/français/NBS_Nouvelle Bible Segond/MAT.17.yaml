      marker: ft
      children:
      - type: text
        text: '9.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lunatique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Mc 9.17-22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'souffre beaucoup '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: va mal.
    marker-yv: yv-n
  - type: text
    text: 'en disant : Seigneur, aie compassion de mon fils, qui est lunatique et souffre beaucoup ; il tombe souvent dans le feu, souvent dans l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.1 ; 2R 4.31.
    marker-yv: yv-n
  - type: text
    text: 'Je l''ai amené à tes disciples, et ils n''ont pas pu le guérir. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Génération
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 12.39+. – Sur l'ensemble, cf. Nb 14.11 ; Jn 14.9.
    marker-yv: yv-n
  - type: text
    text: 'Jésus dit : Génération sans foi et perverse, jusqu''à quand serai-je avec vous ? Jusqu''à quand vous supporterai-je ? Amenez-le-moi ici. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
