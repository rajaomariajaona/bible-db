    - type: usfm
      marker: fq
      children:
      - type: text
        text: Levez-vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
