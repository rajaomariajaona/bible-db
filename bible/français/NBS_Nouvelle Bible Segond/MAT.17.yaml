    marker-yv: yv-n
  - type: text
    text: 'Pierre dit à Jésus : Seigneur, il est bon que nous soyons ici ; si tu le veux, je dresserai ici trois tentes, une pour toi, une pour Moïse et une pour Elie. '
  - type: usfm
    marker: v
