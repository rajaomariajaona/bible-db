        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ils le mettront, avec tous ses ustensiles, dans une couverture en peau de dauphin ; puis ils le placeront sur le brancard. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autel d''or '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (autel de l'encens) Ex 25.23ss ; 30.1ss ; 37.25ss ; 39.38 ; 40.5,26.
      marker-yv: yv-n
    - type: text
      text: 'Ils étendront un drap de pourpre violette sur l''autel d''or et le couvriront d''une couverture en peau de dauphin ; puis ils placeront ses barres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils prendront tous les ustensiles dont on se sert pour officier dans le sanctuaire, ils les mettront dans un drap de pourpre violette et ils les couvriront d''une couverture en peau de dauphin ; puis ils les placeront sur le brancard. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils ôteront les cendres grasses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Lv 6.4) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''autel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(des holocaustes) : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il placera le couvercle sur l'autel de l'encens.
      marker-yv: yv-n
    - type: text
      text: 'Ils ôteront les cendres grasses de l''autel, puis ils étendront sur lui un drap de pourpre rouge ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' et LXX ajoutent à la fin du v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils prendront un drap de pourpre rouge, envelopperont la cuve et son socle, les emballeront dans une couverture de peau violette, et les placeront sur des barres.
      marker-yv: yv-n
    - type: text
      text: 'ils mettront dessus tous les ustensiles dont on se sert pour y officier – les cassolettes, les fourchettes, les pelles, les calices, tous les ustensiles de l''autel – et ils étendront par-dessus une couverture en peau de dauphin ; puis ils placeront les barres de l''autel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s,17ss ; cf. 1.51
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.10 ; 2S 6.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la charge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sens propre et figuré ; le terme correspondant est apparenté au verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porter.
      marker-yv: yv-n
    - type: text
      text: 'Après qu''Aaron et ses fils auront achevé de couvrir le sanctuaire et tous les ustensiles du sanctuaire, les fils de Qehath viendront, au départ du camp, pour les porter ; mais ils ne toucheront pas le sanctuaire, car ils mourraient. Telle est la charge des fils de Qehath dans la tente de la Rencontre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
