      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'charge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent un même mot hébreu, de même au v. 32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous leur assignerez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' lit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nominativement
      - type: usfm
        marker: ft
        children:
        - type: text
