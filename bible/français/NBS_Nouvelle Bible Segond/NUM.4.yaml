      marker-yv: yv-n
    - type: text
      text: 'Ils porteront les toiles de la Demeure et de la tente de la Rencontre, sa couverture et la couverture de dauphin qui se met par-dessus, le rideau qui est à l''entrée de la tente de la Rencontre, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui en dépendent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils feront…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et tout ce qui se fait pour eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les Guershonites ? les objets ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et ils serviront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: travailleront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'les tentures de la cour et le rideau de l''entrée de la porte de la cour, tout autour de la Demeure et de l''autel, leurs cordages et tous les ustensiles qui en dépendent. Ils feront tout le service qui s''y rapporte. '
