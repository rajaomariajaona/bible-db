        - type: text
          text: 8.6+.
      marker-yv: yv-n
    - type: text
      text: 'Ne retranchez pas la tribu des clans des Qehatites d''entre les lévites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'très sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Faites ceci pour eux – ainsi ils vivront, ils ne mourront pas, quand ils s''approcheront de ce qui est très sacré : Aaron et ses fils viendront et placeront chacun d''eux dans son service et dans sa charge. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 21ss,29ss,34ss ; 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',47ss. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Fais le dénombrement des fils de Qehath au milieu des fils de Lévi, clan par clan, famille par famille, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.51-53 ; Ex 33.20 ; 2S 6.7.
      marker-yv: yv-n
    - type: text
      text: Ils n'entreront pas un instant pour voir les choses sacrées, sans quoi ils mourraient.
  - type: usfm
    marker: s2
    children:
    - type: text
