      marker-yv: yv-n
    - type: text
      text: 'Fais aussi le dénombrement des fils de Guershôn, famille par famille, clan par clan ; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui sont aptes à…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quiconque entre pour faire le service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(terme normalement militaire) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et accomplir le service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(terme évoquant habituellement le travail du serviteur ou de l''esclave, mais aussi le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: ), voir v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'tu recenseras, depuis l''âge de trente ans et au-dessus jusqu''à l''âge de cinquante ans, tous ceux qui sont aptes à accomplir un service dans la tente de la Rencontre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.25s.
      marker-yv: yv-n
    - type: text
      text: 'Voici le service des clans des Guershonites, leur service et leur charge. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 26.1-14 ; 36.37. –  '
      - type: usfm
