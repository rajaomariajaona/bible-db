        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout le service des Guershonites se fera sur l''ordre d''Aaron et de ses fils, pour toute leur charge et pour tout leur service ; vous leur assignerez tout ce qu''ils ont la responsabilité de porter. '
