          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'huile '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 25.6 ; 27.20s ; 30.22ss,34ss.
      marker-yv: yv-n
    - type: text
      text: Eléazar, fils d'Aaron, le prêtre, aura sous sa surveillance l'huile du luminaire, l'encens aromatique, l'offrande végétale constante et l'huile d'onction ; il aura sous sa surveillance toute la Demeure et tout ce qu'elle contient, le sanctuaire et ses ustensiles.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
