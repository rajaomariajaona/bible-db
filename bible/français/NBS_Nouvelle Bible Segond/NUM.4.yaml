      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sous la direction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans '
      - type: usfm
        marker: ft
