document_id: NUM.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tâches des clans lévitiques
  - type: heading
    content: Les fils de Qehath
  - type: text
    content: ' '
  - type: note
    content: 'et à Aaron  : ces mots sont absents de plusieurs mss hébreux ; cf. v. 5,21ss,34,45.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '10':
  - type: note
    content: sur le brancard ou sur la perche  ; cf. 13.23 ; 1Ch 15.15n.
  - type: text
    content: 'ils le mettront, avec tous ses ustensiles, dans une couverture en peau de dauphin ; puis ils le placeront sur le brancard. '
  '11':
  - type: note
    content: autel d'or (autel de l'encens) Ex 25.23ss ; 30.1ss ; 37.25ss ; 39.38 ; 40.5,26.
  - type: text
    content: 'Ils étendront un drap de pourpre violette sur l''autel d''or et le couvriront d''une couverture en peau de dauphin ; puis ils placeront ses barres. '
  '12':
  - type: text
    content: 'Ils prendront tous les ustensiles dont on se sert pour officier dans le sanctuaire, ils les mettront dans un drap de pourpre violette et ils les couvriront d''une couverture en peau de dauphin ; puis ils les placeront sur le brancard. '
  '13':
  - type: note
    content: 'Ils ôteront les cendres grasses (cf. Lv 6.4) de l''autel (des holocaustes) : LXX il placera le couvercle sur l''autel de l''encens.'
  - type: text
    content: 'Ils ôteront les cendres grasses de l''autel, puis ils étendront sur lui un drap de pourpre rouge ; '
  '14':
  - type: note
    content: 'Smr et LXX ajoutent à la fin du v.  : ils prendront un drap de pourpre rouge, envelopperont la cuve et son socle, les emballeront dans une couverture de peau violette, et les placeront sur des barres.'
  - type: text
    content: 'ils mettront dessus tous les ustensiles dont on se sert pour y officier – les cassolettes, les fourchettes, les pelles, les calices, tous les ustensiles de l''autel – et ils étendront par-dessus une couverture en peau de dauphin ; puis ils placeront les barres de l''autel. '
  '15':
  - type: note
    content: 'V. 4ns,17ss ; cf. 1.51n  ; 3.10 ; 2S 6.6s. –  la charge  : au sens propre et figuré ; le terme correspondant est apparenté au verbe traduit par porter.'
  - type: text
    content: 'Après qu''Aaron et ses fils auront achevé de couvrir le sanctuaire et tous les ustensiles du sanctuaire, les fils de Qehath viendront, au départ du camp, pour les porter ; mais ils ne toucheront pas le sanctuaire, car ils mourraient. Telle est la charge des fils de Qehath dans la tente de la Rencontre. '
  '16':
  - type: note
    content: Eléazar 3.2,4n,32 ; cf. v. 28,33. –  offrande végétale (5.15n) constante 28.5 ; Ex 29.38ss ; Né 10.34 ; voir sacrifices. –  huile d'onction Ex 25.6 ; 27.20s ; 30.22ss,34ss.
  - type: text
    content: Eléazar, fils d'Aaron, le prêtre, aura sous sa surveillance l'huile du luminaire, l'encens aromatique, l'offrande végétale constante et l'huile d'onction ; il aura sous sa surveillance toute la Demeure et tout ce qu'elle contient, le sanctuaire et ses ustensiles.
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '18':
  - type: note
    content: lévites 8.6+.
  - type: text
    content: 'Ne retranchez pas la tribu des clans des Qehatites d''entre les lévites. '
  '19':
  - type: note
    content: très sacré v. 4n.
  - type: text
    content: 'Faites ceci pour eux – ainsi ils vivront, ils ne mourront pas, quand ils s''approcheront de ce qui est très sacré : Aaron et ses fils viendront et placeront chacun d''eux dans son service et dans sa charge. '
  '2':
  - type: note
    content: Cf. v. 21ss,29ss,34ss ; 1.2n,47ss. – Voir fils.
  - type: text
    content: 'Fais le dénombrement des fils de Qehath au milieu des fils de Lévi, clan par clan, famille par famille, '
  '20':
  - type: note
    content: Cf. 1.51-53 ; Ex 33.20 ; 2S 6.7.
  - type: text
    content: Ils n'entreront pas un instant pour voir les choses sacrées, sans quoi ils mourraient.
  - type: heading
    content: Les fils de Guershôn
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 1+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '22':
  - type: note
    content: 3.17s,21ss. – Voir fils.
  - type: text
    content: 'Fais aussi le dénombrement des fils de Guershôn, famille par famille, clan par clan ; '
  '23':
  - type: note
    content: 'qui sont aptes à…  : litt. quiconque entre pour faire le service (terme normalement militaire) et accomplir le service (terme évoquant habituellement le travail du serviteur ou de l''esclave, mais aussi le culte), voir v. 3n.'
  - type: text
    content: 'tu recenseras, depuis l''âge de trente ans et au-dessus jusqu''à l''âge de cinquante ans, tous ceux qui sont aptes à accomplir un service dans la tente de la Rencontre. '
  '24':
  - type: note
    content: 3.25s.
  - type: text
    content: 'Voici le service des clans des Guershonites, leur service et leur charge. '
  '25':
  - type: note
    content: 'Ex 26.1-14 ; 36.37. –  de dauphin  : cf. Ex 25.5n  ; Ez 16.10.'
  - type: text
    content: 'Ils porteront les toiles de la Demeure et de la tente de la Rencontre, sa couverture et la couverture de dauphin qui se met par-dessus, le rideau qui est à l''entrée de la tente de la Rencontre, '
  '26':
  - type: note
    content: 'qui en dépendent 3.31n. –  Ils feront…  : traduction incertaine, litt. et tout ce qui se fait pour eux (les Guershonites ? les objets ?) et ils serviront (ou travailleront).'
  - type: text
    content: 'les tentures de la cour et le rideau de l''entrée de la porte de la cour, tout autour de la Demeure et de l''autel, leurs cordages et tous les ustensiles qui en dépendent. Ils feront tout le service qui s''y rapporte. '
  '27':
  - type: note
    content: 'des Guershonites  : litt. des fils des Guershonites, de même au v. 28. –  charge et porter traduisent un même mot hébreu, de même au v. 32. –  vous leur assignerez  : LXX lit nominativement, voir v. 32n.'
  - type: text
    content: 'Tout le service des Guershonites se fera sur l''ordre d''Aaron et de ses fils, pour toute leur charge et pour tout leur service ; vous leur assignerez tout ce qu''ils ont la responsabilité de porter. '
  '28':
  - type: note
    content: sous la direction (litt. dans ou par la main, cf. v. 37n) d'Itamar v. 33 ; cf. v. 16+ ; 3.2,4 ; 7.8 ; Ex 38.21. –  Itamar, fils d'Aaron, le prêtre v. 33 ; 7.8.
  - type: text
    content: Tel est le service des clans des Guershonites dans la tente de la Rencontre, leur responsabilité sous la direction d'Itamar, fils d'Aaron, le prêtre.
  - type: heading
    content: Les fils de Merari
  '29':
  - type: text
    content: ' '
  - type: note
    content: 3.17,20,33ss.
  - type: text
    content: 'Tu recenseras les fils de Merari, clan par clan, famille par famille ; '
  '3':
  - type: note
    content: 'trente ans…  : LXX vingt-cinq ans, de même dans la suite ; cf. 1.3 ; 3.14ss ; 8.22ss ; Esd 3.8 ; 1Ch 23.3,24,27 ; 2Ch 31.17. –  qui sont aptes à…  : litt. qui entrent dans l''armée (c.-à-d. qui sont aptes à un service obligatoire, 1.3n) pour faire un ouvrage (ou travailler) ; cf. 28.18 ; 29.1, où l''expression traduite par travail servile est composée du mot correspondant ici à ouvrage et de celui qui sera rendu par service au v. 4 ; cf. v. 23n  ; 2Ch 2.16s. –  tente de la Rencontre 1.1.'
  - type: text
    content: depuis l'âge de trente ans et au-dessus jusqu'à l'âge de cinquante ans, tous ceux qui sont aptes à exercer une fonction dans la tente de la Rencontre.
  '30':
  - type: note
    content: V. 3+.
  - type: text
    content: tu recenseras, depuis l'âge de trente ans et au-dessus jusqu'à l'âge de cinquante ans, tous ceux qui sont aptes à accomplir le service de la tente de la Rencontre.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'ses socles  : LXX ajoute la couverture, ses socles et ses colonnes, et le voile de la porte de la tente  ; 3.36s ; Ex 26.15ss.'
  - type: text
    content: 'Voici la charge qui leur revient, tout leur service dans la tente de la Rencontre : les planches de la Demeure, ses barres, ses colonnes, ses socles ; '
  '32':
  - type: note
    content: 'leurs socles  : LXX ajoute et les poteaux du voile de la porte de la cour et leurs socles  ; cf. Ex 27.9ss. –  Vous leur assignerez… ou vous recenserez…  ; LXX a compris vous les recenserez (les lévites fils de Merari) nominativement, ainsi que tous les objets…'
  - type: text
    content: 'les colonnes qui entourent la cour, leurs socles, leurs piquets, leurs cordages, tous leurs ustensiles et tout ce qui est destiné à leur service. Vous leur assignerez nominativement tous les objets qu''ils ont la responsabilité de porter. '
  '33':
  - type: note
    content: V. 28+.
  - type: text
    content: Tel est le service des clans des fils de Merari, tout leur service dans la tente de la Rencontre, sous la direction d'Itamar, fils d'Aaron, le prêtre.
  - type: heading
    content: Recensement des lévites en activité
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 2+s. –  les Qehatites  : litt. les fils des Qehatites.'
  - type: text
    content: 'Moïse, Aaron et les princes de la communauté recensèrent les Qehatites, clan par clan, famille par famille, '
  '35':
  - type: text
    content: 'tous ceux qui, depuis l''âge de trente ans et au-dessus jusqu''à l''âge de cinquante ans, étaient aptes à accomplir un service dans la tente de la Rencontre. '
  '36':
  - type: note
    content: Cf. 3.28.
  - type: text
    content: 'Ceux qui furent recensés parmi eux, clan par clan, étaient 2 750. '
  '37':
  - type: note
    content: 'sur l''ordre…  : litt. sur la bouche de YHWH par la main de Moïse, cf. v. 27,45,49.'
  - type: text
    content: 'Tels sont ceux qui furent recensés parmi les clans des Qehatites, tous ceux qui servaient dans la tente de la Rencontre ; Moïse et Aaron les recensèrent sur l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné par l''intermédiaire de Moïse.'
  '38':
  - type: text
    content: 'Ceux qui furent recensés parmi les fils de Guershôn, clan par clan, famille par famille, '
  '39':
  - type: text
    content: 'depuis l''âge de trente ans et au-dessus jusqu''à l''âge de cinquante ans, tous ceux qui étaient aptes à accomplir un service dans la tente de la Rencontre, '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui est très sacré  : l''expression désigne parfois le Très-Sacré (traduction traditionnelle le Saint des saints , calquant une forme normale du superlatif en hébreu), compartiment le plus sacré de la Demeure, au-delà du voile, où se trouvaient les objets mentionnés v. 5s ; ici il semble englober le lieu dit Sacré ou Saint (v. 7-14) ; ces compartiments étaient habituellement réservés aux prêtres (cf. v. 15,17-20) ; voir Ex 25–30 ; 35–38 ; voir aussi Jos 3.3,13 ; 2S 15.24.'
  - type: text
    content: 'Voici le service des fils de Qehath, dans la tente de la Rencontre ; il concerne ce qui est très sacré. '
  '40':
  - type: note
    content: Cf. 3.22.
  - type: text
    content: 'ceux qui furent recensés parmi eux, clan par clan, famille par famille, étaient 2 630. '
  '41':
  - type: note
    content: 'sur l''ordre du Seigneur  : LXX ajoute par l''intermédiaire de Moïse, comme aux v. 37,45,49.'
  - type: text
    content: 'Tels sont ceux qui furent recensés parmi les clans des fils de Guershôn, tous ceux qui servaient dans la tente de la Rencontre ; Moïse et Aaron les recensèrent sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '42':
  - type: text
    content: 'Ceux qui furent recensés parmi les clans des fils de Merari, clan par clan, famille par famille, '
  '43':
  - type: text
    content: 'depuis l''âge de trente ans et au-dessus jusqu''à l''âge de cinquante ans, tous ceux qui étaient aptes à accomplir un service dans la tente de la Rencontre, '
  '44':
  - type: note
    content: Cf. 3.34.
  - type: text
    content: 'ceux qui furent recensés parmi eux, clan par clan, étaient 3 200. '
  '45':
  - type: text
    content: 'Tels sont ceux qui furent recensés parmi les clans des fils de Merari ; Moïse et Aaron les recensèrent sur l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné par l''intermédiaire de Moïse.'
  '46':
  - type: text
    content: ' '
  - type: note
    content: lévites 8.6+.
  - type: text
    content: 'Tous les lévites que recensèrent Moïse, Aaron et les princes d''Israël, clan par clan, famille par famille, '
  '47':
  - type: note
    content: 'qui pouvaient…  : litt. qui entrent (v. 3n) pour servir (dans) le service du service et le service du transport dans la tente de la Rencontre.'
  - type: text
    content: 'depuis l''âge de trente ans et au-dessus jusqu''à l''âge de cinquante ans, tous ceux qui pouvaient accomplir un service de serviteurs et de porteurs dans la tente de la Rencontre, '
  '48':
  - type: note
    content: Cf. 3.39 ; 1Ch 23.3.
  - type: text
    content: 'tous ceux qui furent recensés parmi eux étaient 8 580. '
  '49':
  - type: note
    content: 'On (litt. il) les recensa…  : autre traduction possible  : on les affecta… chacun à son service et à sa charge, aux tâches que le Seigneur avait désignées à Moïse ou, au lieu de aux tâches… : ainsi que ses subordonnés, ceux que le Seigneur avait indiqués à Moïse.'
  - type: text
    content: 'On les recensa sur l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné par l''intermédiaire de Moïse, en indiquant à chacun son service et sa charge ; on les recensa comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '5':
  - type: note
    content: 'V. 15. –  le voile… rideau  : litt. le voile du rideau  ; Ex 35.12 ; 39.34 ; 40.21. –  coffre du Témoignage  : cf. 1.50+ ; Ex 25.10ss,16,22.'
  - type: text
    content: 'Au départ du camp, Aaron et ses fils viendront décrocher le voile qui sert de rideau, et ils en couvriront le coffre du Témoignage ; '
  '6':
  - type: note
    content: 'de dauphin v. 8,10ss,14,25 ; cf. Ex 25.5n  ; 26.14 ; Ez 16.10. –  drap  : le terme est habituellement traduit par vêtement (de même dans la suite) ; cf. Ex 31.10n. –  les barres du Coffre  : litt. ses barres, de même pour le reste du mobilier (v. 8,14) ; cf. Ex 25.13ss.'
  - type: text
    content: 'ils mettront dessus une couverture en peau de dauphin et ils étendront par-dessus un drap tout de pourpre violette ; puis ils placeront les barres du Coffre. '
  '7':
  - type: note
    content: 'table du pain offert  : litt. table de la face Ex 25.23ss ; 37.10ss ; cf. Lv 24.5ss.'
  - type: text
    content: 'Ils étendront un drap de pourpre violette sur la table du pain offert et ils mettront dessus les plats, les coupes, les bols et les aiguières pour les libations ; le pain constant y restera ; '
  '8':
  - type: note
    content: 'sur tout cela  : litt. sur eux  ; LXX a lu le singulier. –  ses barres v. 6n  ; Ex 25.27s.'
  - type: text
    content: 'ils étendront sur tout cela un drap d''écarlate et le couvriront d''une couverture en peau de dauphin ; puis ils placeront ses barres. '
  '9':
  - type: note
    content: 'le luminaire  : litt. le porte-lampes du luminaire, cf. Ex 35.14n  ; voir aussi 25.31ss,38n  ; 37.17ss.'
  - type: text
    content: 'Ils prendront un drap de pourpre violette et couvriront le luminaire, ses lampes, ses mouchettes, ses cendriers et tous ses récipients à huile, dont on se sert pour son office ; '
