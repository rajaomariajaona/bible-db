        text: ') : cf. Nb 33.14s ; ce nom se retrouve dans celui du Ouadi Refayed, dans l''est de la péninsule, à une dizaine de kilomètres au nord-ouest de la montagne traditionnellement identifiée au mont Sinaï.'
    marker-yv: yv-n
  - type: text
    text: 'Toute la communauté des Israélites partit du désert de Sîn pour ses étapes, sur l''ordre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; ils campèrent à Rephidim, mais il n''y avait pas d''eau à boire pour le peuple. '
