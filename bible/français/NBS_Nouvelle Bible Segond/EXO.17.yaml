  - type: text
    text: 'Quant à moi, je me tiens là, devant toi, sur le rocher, en Horeb ; tu frapperas le rocher, il en sortira de l''eau, et le peuple boira. Moïse fit ainsi, sous les yeux des anciens d''Israël. '
