    - type: text
      text: '12'
  - type: text
    text: 'Comme les mains de Moïse se faisaient lourdes, ils prirent une pierre qu''ils placèrent sous lui, et il s''assit dessus. Aaron et Hour soutenaient ses mains, l''un d''un côté, l''autre de l''autre ; ainsi ses mains restèrent fermes jusqu''au coucher du soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
