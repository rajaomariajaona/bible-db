    marker-yv: yv-n
  - type: text
    text: 'Il appela ce lieu du nom de Massa (« Provocation ») et Meriba (« Querelle »), parce que les Israélites avaient cherché querelle, et parce qu''ils avaient provoqué le '
  - type: usfm
    marker: nd
