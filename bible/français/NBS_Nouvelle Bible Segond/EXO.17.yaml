document_id: EXO.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'eau de Massa et Meriba
  - type: text
    content: ' '
  - type: note
    content: 'communauté 12.3n. –  partit 12.37n. –  pour ses étapes…  : cf. Nb 10.12n. –  Rephidim ( Espaces ) : cf. Nb 33.14s ; ce nom se retrouve dans celui du Ouadi Refayed, dans l''est de la péninsule, à une dizaine de kilomètres au nord-ouest de la montagne traditionnellement identifiée au mont Sinaï.'
  - type: text
    content: 'Toute la communauté des Israélites partit du désert de Sîn pour ses étapes, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils campèrent à Rephidim, mais il n''y avait pas d''eau à boire pour le peuple. '
  '10':
  - type: note
    content: 'Aaron  : voir prêtre. –  Hour  : cf. 24.14 ; 1Ch 2.19s.'
  - type: text
    content: 'Josué fit ce que Moïse lui avait dit pour combattre Amalec. Moïse, Aaron et Hour montèrent au sommet de la colline. '
  '11':
  - type: note
    content: 'Cf. Jos 8.18,26 ; 2R 13.14-19 ; voir aussi Ps 44.6-8. –  sa main  : Smr et plusieurs versions anciennes portent le pluriel ses mains.'
  - type: text
    content: 'Lorsque Moïse élevait sa main, Israël était le plus fort ; lorsqu''il reposait sa main, Amalec était le plus fort. '
  '12':
  - type: text
    content: 'Comme les mains de Moïse se faisaient lourdes, ils prirent une pierre qu''ils placèrent sous lui, et il s''assit dessus. Aaron et Hour soutenaient ses mains, l''un d''un côté, l''autre de l''autre ; ainsi ses mains restèrent fermes jusqu''au coucher du soleil. '
  '13':
  - type: text
    content: Josué vainquit Amalec et son peuple au fil de l'épée.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ecris 24.4 ; 34.27. –  dans le livre  : LXX dans un livre . Cf. Nb 21.14n. –  pour qu''on s''en souvienne  : autres traductions en évocation, en rappel  ; cf. 12.14n  ; 13.9n. –  dis bien à  : litt. mets dans les oreilles de . –  le souvenir ou le nom, l''évocation , voir 3.15n. –  Amalec Nb 24.20 ; Dt 25.17-19 ; 1S 15 ; 28.18 ; 30 ; Est 3.1n  ; 1Ch 4.43.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Ecris cela dans le livre, pour qu''on s''en souvienne, et dis bien à Josué que j''effacerai le souvenir d''Amalec de dessous le ciel.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: mon étendard ou mon signal . – Voir nom divins.
  - type: text
    content: 'Moïse bâtit un autel et l''appela du nom d''Adonaï-Nissi (« YHWH est mon étendard »). '
  '16':
  - type: note
    content: 'main…  : cf. 1R 11.27. –  Seigneur (Yah) 15.2n. – Voir génération.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'Parce qu''une main s''est levée contre le trône du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: 'il y aura guerre pour le '
  - type: text
    content: Seigneur
  - type: text
    content: contre Amalec, de génération en génération.
  '2':
  - type: note
    content: 'Donnez-nous  : plusieurs mss hébreux, LXX, Syr, Tg et Vg portent donne-nous. –  querelle / provoquez v. 7n. – Cf. Nb 20.1-13.'
  - type: text
    content: 'Alors le peuple chercha querelle à Moïse. Ils dirent : Donnez-nous de l''eau à boire. Moïse leur répondit : Pourquoi me cherchez-vous querelle ? Pourquoi provoquez-vous le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '3':
  - type: note
    content: '14.11+. –  monter d''Egypte Gn 12.10n. –  moi, mes fils et mes troupeaux  : LXX, Syr, Tg, Vg nous, nos fils et nos troupeaux.'
  - type: text
    content: 'Là, le peuple avait soif, le peuple maugréait contre Moïse. Il disait : Pourquoi donc nous as-tu fait monter d''Egypte, si tu nous fais mourir de soif, moi, mes fils et mes troupeaux ? '
  '4':
  - type: text
    content: 'Moïse cria vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Que dois-je faire pour ce peuple ? Encore un peu, et ils me lapideront ! '
  '5':
  - type: note
    content: bâton / Nil 4.17+ ; 7.20.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Passe devant le peuple et prends avec toi des anciens d''Israël ; prends aussi ton bâton, avec lequel tu as frappé le Nil, et tu t''avanceras. '
  '6':
  - type: note
    content: rocher 1Co 10.4n. –  Horeb 3.1n. –  eau Es 43.20 ; 48.21 ; Ps 78.15s ; 105.41 ; cf. Jn 7.38 ; 19.34.
  - type: text
    content: 'Quant à moi, je me tiens là, devant toi, sur le rocher, en Horeb ; tu frapperas le rocher, il en sortira de l''eau, et le peuple boira. Moïse fit ainsi, sous les yeux des anciens d''Israël. '
  '7':
  - type: note
    content: Massa signifie provocation ou épreuve (la même racine hébraïque est traduite ici par provoquer, traditionnellement tenter, et en 15.25 ; 16.4 ; 20.20 par mettre à l'épreuve  ; cf. Dt 6.16 ; 9.22), et Meriba, querelle (cf. Nb 20.13 ; Ps 81.8 ; 106.32) ; voir encore Nb 14.22 ; Dt 33.8n  ; Es 7.12 ; Ps 78.18+ ; 95.8s ; Hé 3.8.
  - type: text
    content: 'Il appela ce lieu du nom de Massa (« Provocation ») et Meriba (« Querelle »), parce que les Israélites avaient cherché querelle, et parce qu''ils avaient provoqué le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est-il parmi nous ou non ?'
  - type: heading
    content: Les Amalécites attaquent les Israélites
  '8':
  - type: text
    content: ' '
  - type: note
    content: Amalec Gn 36.12. Les Amalécites fréquentaient le nord-est de la péninsule du Sinaï (Nb 13.29 ; Jg 3.13+).
  - type: text
    content: 'A Rephidim, Amalec vint faire la guerre à Israël. '
  '9':
  - type: note
    content: 'Josué 24.13 ; 32.17 ; 33.11 ; Nb 11.28 ; 13.8,16 ; 14.6,30,38 ; 26.65 ; 27.18,22 ; 32.12,28 ; 34.17 ; Dt 1.38 ; 3.21,28 ; 31.3,7,14,23 ; 32.44 ; 34.9 ; Jos 1.1. –  Choisis-nous  : LXX, Syr et un ms de Tg ont lu choisis-toi. –  bâton v. 5 ; 4.17+.'
  - type: text
    content: 'Alors Moïse dit à Josué : Choisis-nous des hommes, sors et combats Amalec ; demain je me tiendrai sur le sommet de la colline, le bâton de Dieu à la main. '
