    marker-yv: yv-n
  - type: text
    text: 'Alors le peuple chercha querelle à Moïse. Ils dirent : Donnez-nous de l''eau à boire. Moïse leur répondit : Pourquoi me cherchez-vous querelle ? Pourquoi provoquez-vous le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? '
  - type: usfm
    marker: v
