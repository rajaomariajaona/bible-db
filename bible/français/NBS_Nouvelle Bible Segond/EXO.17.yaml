      - type: text
        text: '17.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monter d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: moi, mes fils et mes troupeaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX, Syr, Tg, Vg '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous, nos fils et nos troupeaux.
    marker-yv: yv-n
  - type: text
    text: 'Là, le peuple avait soif, le peuple maugréait contre Moïse. Il disait : Pourquoi donc nous as-tu fait monter d''Egypte, si tu nous fais mourir de soif, moi, mes fils et mes troupeaux ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse cria vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Que dois-je faire pour ce peuple ? Encore un peu, et ils me lapideront ! '
