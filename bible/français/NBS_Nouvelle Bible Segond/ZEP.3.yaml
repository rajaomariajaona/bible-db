document_id: ZEP.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem n'a pas écouté l'appel de Dieu
  - type: text
    content: ' '
  - type: note
    content: Quel malheur 2.5+. –  souillée Es 59.3 ; Ml 1.7 ; voir pur, impur. –  ville tyrannique ou ville destructrice, ville d'exploitation  ; sur le terme correspondant, cf. Jr 25.38n  ; voir aussi Ez 24.9. La ville est ici Jérusalem ; cf. v. 4s ; Jr 6.6ss ; voir aussi Na 3.1.
  - type: text
    content: Quel malheur pour la rebelle, la souillée,
  - type: text
    content: la ville tyrannique !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Koush 2.12n  ; cf. Es 19.21 ; 45.14 ; Ps 68.32 ; Ac 8.27. –  mes adorateurs ou peut-être, plus littéralement, mes suppliants, mes intercesseurs (terme apparenté en Gn 25.21n). –  mes dispersés  : texte obscur, litt. la fille de mes disséminés (cf. v. 14n) ; certains modifient le texte hébreu traditionnel pour lire d''au-delà des fleuves de Koush (cf. Es 18.1) et jusqu''au plus profond du nord (Es 14.13n) on m''apportera l''offrande  ; cf. Es 18.7 ; 66.20 ; voir aussi 60.6s. Le terme traduit par offrande peut avoir le sens général de présent , le sens politique de tribut ou le sens rituel précis d’ offrande végétale (cf. Lv 2.1n).'
  - type: text
    content: D'au-delà des fleuves de Koush
  - type: text
    content: mes adorateurs, mes dispersés m'apporteront l'offrande.
  - type: heading
    content: Le reste d'Israël
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'plus honte Es 54.4 ; cf. Ez 20.43s. –  tu t''es révoltée ou tu as transgressé  ; cf. Es 1.2 ; 43.27 ; 59.13 ; Jr 2.8,29 ; Ez 2.3 ; Os 7.13. –  de toi  : litt. de ton sein  ; cf. v. 3,5. –  ceux qui exultent (2.15n) de ton triomphe ou de ton orgueil , tournure analogue en Es 13.3 ; on pourrait aussi comprendre ceux qui, en toi, exultent avec orgueil . –  hautaine Es 3.16 ; Jr 13.15 ; Ez 16.50. –  ma montagne sacrée ou sainte Es 2.2+ ; 11.9 ; 27.13 ; 56.7 ; Ez 20.40 ; Jl 2.1 ; 4.12 ; Ps 2.6+.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: tu n'auras plus honte de tous les agissements
  - type: text
    content: par lesquels tu t'es révoltée contre moi ;
  - type: text
    content: car alors j'écarterai de toi
  - type: text
    content: ceux qui exultent de ton triomphe,
  - type: text
    content: et tu ne seras plus hautaine dans ma montagne sacrée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'laisserai  : verbe apparenté au mot pour reste (v. 13+). –  pauvre ou humble  ; cf. 2.3+ (mot très proche). –  qui trouvera un abri…  : cf. v. 2 ; Es 14.32 ; Ps 7.2+. –  dans le nom… Ps 20.2 ; Pr 18.10.'
  - type: text
    content: Je laisserai en ton sein un peuple pauvre et faible,
  - type: text
    content: 'qui trouvera un abri dans le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'reste d''Israël  : cf. 2.7+ ; Jr 6.9 ; 31.7 ; Mi 2.12. –  plus injustement  : cf. v. 5 ; voir justice. –  plus de mensonges  : cf. Jb 36.4 ; Jn 1.47 ; Ap 14.5 . –  langue trompeuse  : cf. Ps 52.6 ; 102.9 ; Pr 6.17. –  ils se coucheront…  : litt. ils paîtront et se coucheront  ; cf. 2.7,14. –  personne pour les troubler Lv 26.6 ; Es 17.2 ; Jr 7.33 ; 30.10 ; Ez 34.28 ; Mi 4.4.'
  - type: text
    content: Le reste d'Israël n'agira plus injustement.
  - type: text
    content: Ils ne diront plus de mensonges,
  - type: text
    content: et il ne se trouvera plus dans leur bouche une langue trompeuse,
  - type: text
    content: quand ils se coucheront dans leur pâturage
  - type: text
    content: et qu'il n'y aura personne pour les troubler.
  - type: heading
    content: La restauration de Jérusalem
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 12.6 ; 54.1 ; Za 2.14 ; 9.9. –  cris de joie Jr 31.12 ; Ps 5.12 ; 67.5 ; 71.23 ; 90.14. –  Sion la belle / Jérusalem la belle  : litt. fille de Sion / fille de Jérusalem , c.-à-d. Jérusalem personnifiée comme une jeune fille ; voir Es 1.8n  ; Jr 4.11n,31n. –  acclamations Ps 47.2,6+ ; 95.1ss ; 98.4.'
  - type: text
    content: Pousse des cris de joie, Sion la belle !
  - type: text
    content: Lance des acclamations, Israël !
  - type: text
    content: Réjouis-toi, exulte de tout ton cœur, Jérusalem la belle !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 40.2. –  les jugements  : litt. tes jugements , il s''agit du mot habituellement traduit par droit , ici au pluriel ; d''après Tg, certains modifient la vocalisation traditionnelle pour lire tes juges . –  ton ennemi  : versions anciennes tes ennemis . –  le roi d''Israël 1S 12.12 ; Es 6.5 ; 33.22 ; 41.21 ; 52.7 ; Jr 8.19 ; Ps 5.3+ ; 149.2 ; cf. Mc 15.32/ / ; Jn 1.49 ; 12.13. –  en ton sein v. 5,17 ; Es 12.6 ; Ez 48.35 ; Jl 2.27 ; Mi 3.7 ; Ps 46.6. –  tu n''as plus de malheur à craindre  : certains mss hébreux et LXX ont lu tu ne verras plus le malheur.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a écarté de toi les jugements,'
  - type: text
    content: il a détourné ton ennemi ;
  - type: text
    content: 'le roi d''Israël, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', est en ton sein ;'
  - type: text
    content: tu n'as plus de malheur à craindre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 35.3s ; 41.13s. –  ne perds pas courage  : litt. que tes mains ne s''affaiblissent pas  ; cf. 13.7 ; Jr 6.24 ; 50.43 ; Ez 7.17 ; 21.12.'
  - type: text
    content: 'En ce jour-là, on dira à Jérusalem :'
  - type: text
    content: N'aie pas peur, Sion,
  - type: text
    content: ne perds pas courage !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 62.5 ; Jr 32.41. –  En ton sein  : cf. v. 5,15+. –  il fera…  : litt. il s''égaiera de joie sur (ou à cause de ) toi . –  il gardera le silence  : sens incertain ; une tradition juive interprète il taira tes péchés  ; certains comprennent il garde le silence, malgré son amour  ; d''autres modifient le texte hébreu traditionnel pour lire il sera excité, il courra, il sautera de joie dans son amour  ; LXX il te renouvellera par son amour . –  il poussera des cris…  : autre traduction il dansera pour toi en chantant  ; avec LXX et Syr, certains rattachent ici les premiers mots du v. 18 en les modifiant pour lire comme aux jours de la rencontre festive (cf. Os 12.10) ; cf. Ex 25.22 ; 29.42s ; 30.6,36 ; voir aussi Jr 2.2 ; Os 2.16.'
  - type: text
    content: 'En ton sein, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, est un héros sauveur ;'
  - type: text
    content: il fera de toi sa plus grande joie ;
  - type: text
    content: il gardera le silence dans son amour ;
  - type: text
    content: il poussera des cris d'allégresse à ton sujet.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale : certains modifient le texte hébreu traditionnel pour traduire aujourd''hui j''écarte de toi (féminin : il s''agit de Sion) le déshonneur que tu portes ou les outrages qu''on t''a infligés  ; cf. 2.8nss ; Jr 15.15 ; Ps 15.3 ; 69.8 ; voir aussi Es 25.8.'
  - type: text
    content: Je recueillerai ceux qui sont dans le chagrin, loin des rencontres festives,
  - type: text
    content: ceux qui sont restés loin de toi,
  - type: text
    content: sur qui le déshonneur pesait comme un fardeau.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'j''agirai…  : Tg a lu j''accomplirai l''extermination (1.18) de tous ceux qui t''affligent  ; sur ce verbe, cf. Gn 15.13 ; Ex 1.11 ; Nb 24.24 ; Dt 26.6 ; Es 60.14 ; Ps 89.23 ; 94.5 ; voir aussi Es 60.14 ; Jr 30.11 ; Na 1.8. –  ce qui boite…  : litt. celle (la bête, la brebis) qui boite , de même dans la suite ; cf. Ez 34.16 ; Mi 4.6ns. –  une louange et un nom  : autre traduction un sujet de louange et de renom , même possibilité au v. 20 ; cf. Dt 26.19 ; Es 62.7 ; Jr 13.11 ; 33.9 ; voir aussi Es 61.9,11. –  sur toute la terre où ils ont honte  : litt. sur toute la terre (ou dans tout le pays ) de leur honte  ; LXX a rattaché la fin au v. 20  : ils auront honte en ce temps-là où je vous ferai du bien.'
  - type: text
    content: En ce temps-là,
  - type: text
    content: j'agirai contre tous ceux qui t'affligent ;
  - type: text
    content: je sauverai ce qui boite,
  - type: text
    content: je rassemblerai ce qui était banni.
  - type: text
    content: Je ferai d'eux une louange et un nom
  - type: text
    content: sur toute la terre où ils ont honte.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'n''écoute rien  : autre traduction n''obéit à personne  ; cf. Dt 4.30n  ; Jr 7.26+ ; 22.21. –  l''instruction ou la correction  ; cf. v. 7 ; Jr 2.30 ; 5.3+ ; 7.28 ; voir aussi Am 4.6ss. –  confiance Ps 4.6+.'
  - type: text
    content: Elle n'écoute rien,
  - type: text
    content: elle ne veut pas recevoir l'instruction,
  - type: text
    content: 'elle ne met pas sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: elle ne s'approche pas de son Dieu.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19n. –  je rétablirai , même formule hébraïque qu''en 2.7n  ; ici certains comprennent, exceptionnellement  : je ramènerai vos captifs  ; cf. Dt 30.3n  ; Jr 29.14n  ; 32.37.'
  - type: text
    content: En ce temps-là, je vous ramènerai,
  - type: text
    content: en ce temps je vous rassemblerai ;
  - type: text
    content: car je ferai de vous un nom et une louange
  - type: text
    content: parmi tous les peuples de la terre,
  - type: text
    content: lorsque sous vos yeux je rétablirai votre situation,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 22.25-28 ; voir aussi Jr 2.8,21 ; 4.9 ; 5.31 ; 18.18 ; Mi 3.11. –  princes  : cf. 1.8. –  lions rugissants Pr 19.12 ; 20.2 ; 28.15s ; cf. Os 5.14 ; Ps 17.12 ; 22.14 ; 1P 5.8. –  loups du soir  : LXX loups d''Arabie  ; d''autres modifient la vocalisation traditionnelle pour lire loups de la steppe  ; cf. Ha 1.8n  ; voir aussi Es 1.23 ; 10.1s. –  qui n''ont plus rien à ronger  : traduction conjecturale ; sur le verbe correspondant, comparer Nb 24.8 ( briser ) et Ez 23.34n  ; d''autres comprennent qui ne s''acquittent pas de leurs responsabilités au matin  ; cf. v. 5 ; Ex 18.13 ; 2S 15.2s ; Jr 21.12.'
  - type: text
    content: Ses princes, en son sein,
  - type: text
    content: sont des lions rugissants ;
  - type: text
    content: ses juges sont des loups du soir
  - type: text
    content: qui n'ont plus rien à ronger au matin,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 6.13ss ; 23.11,14 ; Ez 22.26 ; Os 9.7. –  des aventuriers  : cf. Jr 23.32 (le terme traduit par témérité est apparenté) ; voir aussi Gn 49.4 ( impétueux ) ; Jg 9.4. –  sacré  : voir saint.'
  - type: text
    content: ses prophètes sont des aventuriers,
  - type: text
    content: des hommes portés à la trahison ;
  - type: text
    content: ses prêtres profanent ce qui est sacré,
  - type: text
    content: ils font violence à la loi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'En son sein… v. 15+,17. –  juste Ps 11.7 ; 119.137. –  n''agit pas injustement v. 13 ; Dt 32.4. –  chaque matin  : cf. v. 3n. –  il fait paraître son équité (ou son droit ) à la lumière  : cf. Os 6.5 ; l''expression pourrait signifier il rend son jugement  ; cf. Ha 1.4n. –  honte Jr 3.3 ; 6.15 ; 8.12.'
  - type: text
    content: 'En son sein, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est juste,'
  - type: text
    content: il n'agit pas injustement ;
  - type: text
    content: chaque matin il fait paraître son équité à la lumière,
  - type: text
    content: sans jamais y manquer ;
  - type: text
    content: mais l'homme injuste ne connaît pas la honte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: retranché 1.3s,11 ; Dt 19.1. –  tours d'angle 1.16n  ; le terme pourrait aussi désigner ici des chefs politiques ou militaires ; cf. Jg 20.2n  ; 1S 14.38n  ; Es 19.13n. –  plus de passants Jr 9.11 ; Ez 14.15. –  plus d'habitants 2.5 ; Es 5.9 ; 6.11 ; Jr 4.7 ; 9.10.
  - type: text
    content: J'ai retranché des nations ;
  - type: text
    content: leurs tours d'angle sont dévastées ;
  - type: text
    content: 'j''ai fait de leurs rues un champ de ruines :'
  - type: text
    content: plus de passants !
  - type: text
    content: Leurs villes sont ravagées,
  - type: text
    content: plus d'hommes, plus d'habitants !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je disais Jr 3.19. – Voir crainte. –  si tu voulais  : autre traduction (alors) tu voudrais  ; cf. v. 2n. –  son séjour (Dt 26.15n) …  : texte incertain ; avec LXX on pourrait lire de ses yeux (c.-à-d. de son regard ) ne sera pas retranché tout ce pour quoi je lui ai fait rendre des comptes (1.7+). –  ils se sont hâtés  : litt. ils se sont levés de bon matin (cf. v. 3n  ; Jr 7.13n) pour… –  se pervertir…  : litt. pervertir tous leurs agissements  ; cf. Gn 6.12n  ; Ez 23.11n  ; Ps 14.1.'
  - type: text
    content: 'Je disais : Si seulement tu me craignais,'
  - type: text
    content: si tu voulais recevoir l'instruction !
  - type: text
    content: – son séjour ne serait pas retranché.
  - type: text
    content: Chaque fois que je lui ai fait rendre des comptes,
  - type: text
    content: ils se sont hâtés de se pervertir
  - type: text
    content: dans tous leurs agissements.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Attendez-moi Ps 106.13. –  au jour 1.7+,14ss. –  pour le butin (même terme en Es 33.23) ou pour toujours ( ?) ; LXX comme témoin  ; cf. Mi 1.2 ; Ml 3.5 ; voir aussi Dt 19.15n  ; Jb 16.8. –  j''ai résolu…  : litt. mon jugement (cf. v. 15n) c''est de réunir… 1.2n  ; cf. Es 14.26s. –  répandre sur eux ma fureur Jr 6.11 ; Os 5.10 ; Ps 69.25 ; Ap 16.1. –  par le feu… 1.18.'
  - type: text
    content: Attendez-moi donc
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: au jour où je me lèverai pour le butin,
  - type: text
    content: car j'ai résolu de réunir les nations,
  - type: text
    content: pour rassembler à moi les royaumes,
  - type: text
    content: pour répandre sur eux ma fureur,
  - type: text
    content: ma colère ardente ;
  - type: text
    content: car par le feu de ma passion jalouse
  - type: text
    content: tout le pays sera dévoré.
  - type: heading
    content: Dieu transformera les peuples
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je rendrai pures  : litt. je renverserai (sur le verbe correspondant, voir Gn 19.21n  ; 1S 10.9n) sur les peuples des lèvres pures  ; cf. Gn 11.1nss ; Es 6.5ss. –  qu''ils invoquent tous le nom… Ml 1.11 ; Ps 86.9 ; cf. Jr 10.25 ; Ps 79.6 ; voir aussi Gn 12.8 ; 13.4 ; 21.33 ; 26.25 ; Jl 3.5 ; Ps 80.19. –  dans un même effort  : litt. d''une seule épaule  ; cf. 1R 22.13n.'
  - type: text
    content: Alors je rendrai pures les lèvres des peuples,
  - type: text
    content: 'pour qu''ils invoquent tous le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH)'
  - type: text
    content: en le servant dans un même effort.
