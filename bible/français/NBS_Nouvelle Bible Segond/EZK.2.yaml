document_id: EZK.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu envoie Ezéchiel à Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Fils
        - type: text
          text: ' d''homme'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cette formule, qui revient une centaine de fois chez Ez, souligne la faiblesse humaine face à la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gloire du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(1.28) ; cf. Ps 8.5 ; 144.3 ; Jb 25.6 ; Dn 7.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur tes jambes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ac 14.10 ; 26.16.'
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Humain, tiens-toi sur tes jambes, et je te parlerai. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en dedans et en dehors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. recto-verso, à cause de l''abondance des malheurs qu''il annonce ; cf. Ap 5.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gémissements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine.'
      marker-yv: yv-n
    - type: text
      text: 'Il le déploya devant moi : il était écrit en dedans et en dehors. Il y était écrit : Lamentations, plaintes, gémissements.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un souffle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Souffle ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 3.12,14,24 ; 8.3 ; 11.1,5 ; 43.5 ; Nb 11.17,25 ; Jg 3.10 ; 14.6,9 ; 15.14 ; 1S 10.6,10-12 ; 16.13s ; 18.10 ; 1R 18.12 ; 2R 2.15s ; 5.26 ; Es 11.2.'
      marker-yv: yv-n
    - type: text
      text: Dès qu'il m'eut dit cela, un souffle entra en moi et me fit tenir sur mes jambes ; j'écoutai celui qui me parlait.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui t''envoie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.4 ; 13.6 ; cf. Ex 3.10 ; Jg 6.14 ; Es 6.8-13 ; Jr 1.7 ; Ml 3.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : si ce pluriel n''est pas dû à une erreur de copie (il ne figure pas dans certaines versions anciennes), il pourrait s''entendre comme une apostrophe méprisante qui mettrait Israël sur le même pied que les autres nations (cf. 25–32) ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 17.1-7 ; Nb 14.1-4.'
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Humain, c''est moi qui t''envoie vers les Israélites, vers les nations rebelles, qui se sont rebellées contre moi ; eux et leurs pères se sont révoltés contre moi jusqu''à ce jour même ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ont le visage obstiné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sont durs de visage et forts de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 4.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'les fils ont le visage obstiné, ils sont entêtés ; je t''envoie vers eux, et tu leur diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''ils écoutent ou qu''ils ne prennent pas garde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 7 ; 3.11,27 ; cf. Ex 4.1 ; Es 6.9s ; 30.10 ; Jr 11.21 ; Am 2.12 ; 7.12s ; Mt 23.37. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison rebelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.9,27 ; 12.2s ; 17.12 ; 24.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils sauront… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.3 ; 2R 5.8. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Qu''ils écoutent ou qu''ils ne prennent pas garde – car c''est une maison rebelle – ils sauront qu''il y a un prophète au milieu d''eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des ronces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens incertain ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contradicteurs, rebelles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; en s''appuyant partiellement sur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', quelques-uns modifient le texte pour traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu es entouré de piquants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 28.24). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur des scorpions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: auprès de scorpions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne sois pas terrifié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.9 ; Jos 1.9 ; 8.1 ; Jr 1.1,17 ; 1Ch 22.13 ; 28.1.
      marker-yv: yv-n
    - type: text
      text: 'Toi, humain, n''aie pas peur d''eux, n''aie pas peur de leurs discours, car tu as avec toi des ronces et des piquants, et tu vas t''asseoir sur des scorpions ; n''aie pas peur de leurs discours et ne sois pas terrifié par leurs visages – car c''est une maison rebelle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5+.
      marker-yv: yv-n
    - type: text
      text: 'Tu leur diras mes paroles, qu''ils écoutent ou qu''ils ne prennent pas garde, car ce sont des rebelles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne sois pas rebelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 3.11-13 ; 4.1-13 ; Es 42.18-20 ; 49.4 ; 50.5-7 ; Jr 1.6 ; 12.1-3 ; 15.10-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mange '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.1-3 ; cf. Ap 10.9s.
      marker-yv: yv-n
    - type: text
      text: 'Toi, humain, écoute ce que je te dis : Ne sois pas rebelle comme cette maison rebelle ! Ouvre ta bouche et mange ce que je te donnerai !'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un livre-rouleau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un rouleau de livre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; les livres de l'Antiquité étaient constitués de feuillets cousus bord à bord en une longue bande qu'on enroulait pour la conserver ; cf. Jr 36.2,4 ; Ps 40.8 ; voir aussi Lc 4.20 ; Ap 10.2.
      marker-yv: yv-n
    - type: text
      text: 'Je regardai : une main était tendue vers moi, tenant un livre-rouleau. '
