document_id: EZK.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu envoie Ezéchiel à Israël
  - type: text
    content: ' '
  - type: note
    content: 'Humain  : litt. Fils d''homme  ; cette formule, qui revient une centaine de fois chez Ez, souligne la faiblesse humaine face à la gloire du Seigneur (1.28) ; cf. Ps 8.5 ; 144.3 ; Jb 25.6 ; Dn 7.9. –  sur tes jambes  : cf. Ac 14.10 ; 26.16.'
  - type: text
    content: 'Il me dit : Humain, tiens-toi sur tes jambes, et je te parlerai. '
  '10':
  - type: note
    content: 'en dedans et en dehors, c.-à-d. recto-verso, à cause de l''abondance des malheurs qu''il annonce ; cf. Ap 5.1. –  gémissements  : traduction incertaine.'
  - type: text
    content: 'Il le déploya devant moi : il était écrit en dedans et en dehors. Il y était écrit : Lamentations, plaintes, gémissements.'
  '2':
  - type: note
    content: 'un souffle  : autres traductions le Souffle ; l''Esprit, cf. 1.12n  ; voir aussi 3.12,14,24 ; 8.3 ; 11.1,5 ; 43.5 ; Nb 11.17,25 ; Jg 3.10 ; 14.6,9 ; 15.14 ; 1S 10.6,10-12 ; 16.13s ; 18.10 ; 1R 18.12 ; 2R 2.15s ; 5.26 ; Es 11.2.'
  - type: text
    content: Dès qu'il m'eut dit cela, un souffle entra en moi et me fit tenir sur mes jambes ; j'écoutai celui qui me parlait.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'qui t''envoie 3.4 ; 13.6 ; cf. Ex 3.10 ; Jg 6.14 ; Es 6.8-13 ; Jr 1.7 ; Ml 3.1. –  les nations  : si ce pluriel n''est pas dû à une erreur de copie (il ne figure pas dans certaines versions anciennes), il pourrait s''entendre comme une apostrophe méprisante qui mettrait Israël sur le même pied que les autres nations (cf. 25–32) ; voir non-Juifs. –  leurs pères  : cf. Ex 17.1-7 ; Nb 14.1-4.'
  - type: text
    content: 'Il me dit : Humain, c''est moi qui t''envoie vers les Israélites, vers les nations rebelles, qui se sont rebellées contre moi ; eux et leurs pères se sont révoltés contre moi jusqu''à ce jour même ; '
  '4':
  - type: note
    content: 'ont le visage obstiné…  : litt. sont durs de visage et forts de cœur  ; cf. 3.7n  ; Ex 4.21n  ; 7.3n.'
  - type: text
    content: 'les fils ont le visage obstiné, ils sont entêtés ; je t''envoie vers eux, et tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '5':
  - type: note
    content: Qu'ils écoutent ou qu'ils ne prennent pas garde v. 7 ; 3.11,27 ; cf. Ex 4.1 ; Es 6.9s ; 30.10 ; Jr 11.21 ; Am 2.12 ; 7.12s ; Mt 23.37. –  maison rebelle 3.9,27 ; 12.2s ; 17.12 ; 24.3. –  ils sauront… 33.3 ; 2R 5.8. – Voir prophète.
  - type: text
    content: 'Qu''ils écoutent ou qu''ils ne prennent pas garde – car c''est une maison rebelle – ils sauront qu''il y a un prophète au milieu d''eux. '
  '6':
  - type: note
    content: 'des ronces  : sens incertain ; autres traductions contradicteurs, rebelles  ; en s''appuyant partiellement sur LXX, quelques-uns modifient le texte pour traduire tu es entouré de piquants (cf. 28.24). –  sur des scorpions  : autre traduction auprès de scorpions. –  ne sois pas terrifié 3.9 ; Jos 1.9 ; 8.1 ; Jr 1.1,17 ; 1Ch 22.13 ; 28.1.'
  - type: text
    content: 'Toi, humain, n''aie pas peur d''eux, n''aie pas peur de leurs discours, car tu as avec toi des ronces et des piquants, et tu vas t''asseoir sur des scorpions ; n''aie pas peur de leurs discours et ne sois pas terrifié par leurs visages – car c''est une maison rebelle. '
  '7':
  - type: note
    content: V. 5+.
  - type: text
    content: 'Tu leur diras mes paroles, qu''ils écoutent ou qu''ils ne prennent pas garde, car ce sont des rebelles. '
  '8':
  - type: note
    content: 'Ne sois pas rebelle  : cf. Ex 3.11-13 ; 4.1-13 ; Es 42.18-20 ; 49.4 ; 50.5-7 ; Jr 1.6 ; 12.1-3 ; 15.10-21. –  mange 3.1-3 ; cf. Ap 10.9s.'
  - type: text
    content: 'Toi, humain, écoute ce que je te dis : Ne sois pas rebelle comme cette maison rebelle ! Ouvre ta bouche et mange ce que je te donnerai !'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'un livre-rouleau  : litt. un rouleau de livre  ; les livres de l''Antiquité étaient constitués de feuillets cousus bord à bord en une longue bande qu''on enroulait pour la conserver ; cf. Jr 36.2,4 ; Ps 40.8 ; voir aussi Lc 4.20 ; Ap 10.2.'
  - type: text
    content: 'Je regardai : une main était tendue vers moi, tenant un livre-rouleau. '
