  - type: text
    text: 'Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous fermez aux gens le royaume des cieux ; vous n''y entrez pas vous-mêmes, et vous n''y laissez pas entrer ceux qui le voudraient. [ '
