document_id: MAT.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus met en garde contre les scribes et les pharisiens
  - type: heading
    content: Mc 12.37-40  ; Lc 11.39-52  ; 20.45-47
  - type: text
    content: 'Alors Jésus dit aux foules et à ses disciples : '
  '10':
  - type: note
    content: docteurs ou guides, instructeurs  ; le mot grec correspondant n'apparaît qu'ici dans le N.T. –  Christ 1.16n.
  - type: text
    content: 'Ne vous faites pas appeler docteurs, car un seul est votre docteur, le Christ. '
  '11':
  - type: note
    content: 20.26ns/ /.
  - type: text
    content: 'Le plus grand parmi vous sera votre serviteur. '
  '12':
  - type: note
    content: Le verbe rendu par abaisser est aussi traduit par humilier. Cf. 18.4 (se rendre humble) ; Jb 22.29 ; Pr 29.23 ; Lc 1.52 ; 14.11+.
  - type: text
    content: Qui s'élèvera sera abaissé, et qui s'abaissera sera élevé.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '5.20 ; cf. 3Jn 10. –  malheur 11.21n. –  aux gens  : litt. devant les gens ou devant les humains  ; cf. 5.13+. –  ceux qui le voudraient  : litt. ceux qui entrent . – Cf. Lc 11.52n. Evangile selon Thomas 102 : « Jésus a dit : “Malheur aux pharisiens, car ils ressemblent à un chien couché sur la mangeoire des bœufs : il ne mange ni ne laisse les bœufs manger.” »'
  - type: text
    content: 'Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous fermez aux gens le royaume des cieux ; vous n''y entrez pas vous-mêmes, et vous n''y laissez pas entrer ceux qui le voudraient. [ '
  '14':
  - type: note
    content: 'Certains mss ajoutent ici (ou avant le v. 13)  : Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous dévorez les maisons des veuves et, pour l''apparence, vous faites de longues prières ; à cause de cela, vous recevrez un jugement plus sévère. Cf. Mc 12.40/ /.'
  - type: text
    content: Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous dévorez les maisons des veuves et, pour l'apparence, vous faites de longues prières ; à cause de cela, vous recevrez un jugement plus sévère.]
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'la terre  : litt. le sec (cf. Gn 1.9n). –  vous en faites un fils…  : autre traduction vous le rendez passible de la géhenne (v. 33 ; 5.22n) deux fois plus que vous.'
  - type: text
    content: Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous courez la mer et la terre pour faire un prosélyte, et, quand il l'est devenu, vous en faites un fils de la géhenne deux fois pire que vous.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'guides aveugles v. 24 ; 15.14 ; Jn 9.39ss ; Rm 2.19ss. –  il est engagé  : litt. il doit . Cf. Ex 30.29.'
  - type: text
    content: 'Quel malheur pour vous, guides aveugles, qui dites : Si quelqu''un jure par le sanctuaire, cela ne compte pas ; mais si quelqu''un jure par l''or du sanctuaire, il est engagé. '
  '17':
  - type: note
    content: 'Fous  : cf. v. 19n  ; 5.22n.'
  - type: text
    content: 'Fous et aveugles ! Qu''est-ce qui est le plus grand, l''or ou le sanctuaire qui consacre l''or ? '
  '18':
  - type: note
    content: 'dites-vous  : sous-entendu dans le texte. –  autel 5.23 ; Ex 29.37. –  offrande 5.23s ; 8.4 ; 15.5 ; voir sacrifice.'
  - type: text
    content: 'Si quelqu''un, dites-vous encore, jure par l''autel, cela ne compte pas ; mais si quelqu''un jure par l''offrande qui est sur l''autel, il est engagé. '
  '19':
  - type: note
    content: 'Certains mss ajoutent  : Fous ! comme au v. 17.'
  - type: text
    content: 'Aveugles ! Qu''est-ce qui est le plus grand, l''offrande ou l''autel qui consacre l''offrande ? '
  '2':
  - type: note
    content: 'scribes / pharisiens 5.20 ; 7.29. –  assis dans la chaire de Moïse  : cf. Jn 9.28 ; cf. Dt 17.10 ; Esd 7.6-10 ; Né 8.4.'
  - type: text
    content: 'Les scribes et les pharisiens se sont assis dans la chaire de Moïse. '
  '20':
  - type: text
    content: 'Celui qui jure par l''autel jure par l''autel et par tout ce qui est dessus ; '
  '21':
  - type: note
    content: 1R 8.13 ; Ps 26.8.
  - type: text
    content: 'celui qui jure par le sanctuaire jure par le sanctuaire et par celui qui l''habite, '
  '22':
  - type: note
    content: 5.34s ; Ap 4.2.
  - type: text
    content: et celui qui jure par le ciel jure par le trône de Dieu et par celui qui y est assis.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'dîme Lv 27.30 ; Dt 14.22 ; Lc 18.12. –  le plus important  : litt. de plus grand poids , cf. v. 4. –  dans la loi  : cf. 12.5+ ; 22.34ss. –  justice (litt. jugement , cf. 12.18,20) / compassion 5.7n  ; 9.13 ; Es 1.17 ; Jr 22.3 ; Os 6.6 ; Mi 6.8 ; Za 7.9 ; Lc 6.36 ; 1Tm 1.5. –  foi ou fidélité  ; le mot grec peut avoir les deux sens ; cf. 8.26 ; 9.2,22,29 ; 15.28 ; 17.20 ; 21.21 ; 24.45n  ; 25.21,23. –  pratiquer  : litt. faire.'
  - type: text
    content: 'Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous payez la dîme de la menthe, de l''aneth et du cumin, et vous laissez de côté ce qui est le plus important dans la loi : la justice, la compassion et la foi ; c''est cela qu''il fallait pratiquer, sans laisser de côté le reste. '
  '24':
  - type: note
    content: 'retenez au filtre  : litt. filtrez (en faisant passer à travers une étoffe), emploi unique dans le N.T. Le même verbe grec apparaît dans la traduction (LXX) d''Am 6.6  : ils boivent du vin filtré dans… –  moucheron ou moustique. –  chameau Lv 11.4 ; cf. Jn 18.28,40.'
  - type: text
    content: Guides aveugles, qui retenez au filtre le moucheron et qui avalez le chameau !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Mc 7.4/ /. –  du plat ou de l''écuelle  ; Lc 11.39 emploie un autre terme grec. –  rapacité  : autre traduction rapine  ; cf. 7.15n  ; Lc 11.39. –  excès  : le même terme évoque le manque de maîtrise de soi en 1Co 7.5n.'
  - type: text
    content: 'Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous purifiez le dehors de la coupe et du plat, alors qu''au dedans ils sont pleins de rapacité et d''excès. '
  '26':
  - type: note
    content: 'Tt 1.15. –  de la coupe  : certains mss ajoutent et du plat.'
  - type: text
    content: Pharisien aveugle ! Purifie d'abord l'intérieur de la coupe, afin que l'extérieur aussi devienne pur.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'On avait coutume de blanchir chaque année les tombeaux avant la Pâque, pour éviter que quelqu''un se rende impur en les touchant par inadvertance ; cf. Lc 11.44n  ; voir aussi Nb 19.16 ; 2R 23.16 ; Ac 23.3. Voir pur, impur. Cf. Epître d''Ignace d''Antioche aux Philadelphiens 6.1 : « Si quelqu''un vous prêche le judaïsme, ne l''écoutez pas. Car il est meilleur d''entendre le christianisme de la part d''un homme circoncis, que le judaïsme de la part d''un incirconcis. Si l''un et l''autre ne vous parlent pas de Jésus-Christ, ils sont pour moi des stèles et des tombeaux de morts, sur lesquels ne sont écrits que des noms d''hommes. »'
  - type: text
    content: 'Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous ressemblez à des sépulcres blanchis qui paraissent beaux au dehors, et qui au dedans sont pleins d''ossements de morts et de toute espèce d''impureté. '
  '28':
  - type: note
    content: Lc 12.1 ; 16.15. –  mal 7.23n.
  - type: text
    content: Vous de même, au dehors, vous paraissez justes aux gens, mais au dedans vous êtes remplis d'hypocrisie et de mal.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 2.29. –  les tombeaux  : autre traduction les monuments commémoratifs.'
  - type: text
    content: 'Quel malheur pour vous, scribes et pharisiens, hypocrites ! Vous construisez les sépulcres des prophètes et ornez les tombeaux des justes, '
  '3':
  - type: note
    content: Ml 2.7s ; Rm 2.19-23.
  - type: text
    content: 'Faites et observez donc tout ce qu''ils vous diront, mais n''agissez pas selon leurs œuvres, car ils disent et ne font pas. '
  '30':
  - type: note
    content: 'nous n''aurions pas été…  : litt. nous n''aurions pas été leurs compagnons dans le sang des prophètes  ; le mot correspondant à compagnons est apparenté au terme habituellement traduit par communion ou solidarité et au verbe traduit par participer, avoir part à (Rm 12.13n  ; 15.26ns) ; c''est un verbe de la même famille qui a été traduit par souiller en Mt 15.11n.'
  - type: text
    content: 'et vous dites : Si nous avions vécu au temps de nos pères, nous n''aurions pas été leurs complices pour répandre le sang des prophètes. '
  '31':
  - type: note
    content: 'assassiné  : le verbe correspondant est celui qui est traduit par commettre un meurtre en 5.21 ; 19.18 ; c''est un autre verbe qui est traduit par tuer aux v. 34,37 ; voir aussi 5.12.'
  - type: text
    content: 'Vous témoignez ainsi contre vous-mêmes que vous êtes les fils de ceux qui ont assassiné les prophètes. '
  '32':
  - type: note
    content: 'Gn 15.16 ; 1Th 2.16. Epître de Barnabé 5.11s : « Si le fils de Dieu est venu dans la chair, c''est donc pour porter à son comble la somme des péchés de ceux qui ont persécuté à mort ses prophètes. »'
  - type: text
    content: 'Mettez donc le comble à la mesure de vos pères ! '
  '33':
  - type: note
    content: 'Serpents, vipères 3.7n. –  le jugement  : autre traduction le châtiment. –  géhenne v. 15 ; 5.22n.'
  - type: text
    content: Serpents, vipères ! Comment pourrez-vous fuir le jugement de la géhenne ?
  '34':
  - type: text
    content: ' '
  - type: note
    content: prophètes 10.41 ; Jr 7.25s ; 25.4 ; 1Co 12.28. –  scribes 13.52. –  tuerez … 5.12+ ; 10.17,23 ; 21.35 ; 24.9 ; Mc 13.9 ; Ac 7.58s ; 13.50 ; 22.19 ; 1Th 2.15 ; Hé 11.37. –  persécuterez ou poursuivrez , cf. 10.23.
  - type: text
    content: 'C''est pourquoi, moi, je vous envoie des prophètes, des sages et des scribes. Vous tuerez et crucifierez les uns, vous fouetterez les autres dans vos synagogues et vous les persécuterez de ville en ville, '
  '35':
  - type: note
    content: 'retombe  : litt. vienne, cf. 27.25n. –  innocent  : litt. juste  ; cf. 27.24s ; Jl 4.19 ; Jon 1.14 ; Pr 6.17 ; Ap 18.24. –  Abel Gn 4.8-10 ; Hé 11.4. –  Zacharie, fils de Barachie  : cf. 2Ch 24.20-22 ; voir aussi Za 1.1. Le Protévangile de Jacques (22–24) semble l''identifier au père de Jean le Baptiseur (Lc 1), assassiné par Hérode qui recherchait son fils pour le tuer (cf. Mt 2.13ss) ; Zacharie répond aux émissaires d''Hérode : « Je suis un témoin de Dieu. Prends mon sang ; mon esprit par contre, le Maître le recevra, parce que tu verses un sang innocent dans le temple du Seigneur. » Après avoir attendu Zacharie un certain temps (cf. Lc 1.21), un des prêtres pénètre dans le sanctuaire, voit du sang et entend une voix qui dit : « Zacharie a été assassiné, et son sang ne s''enlèvera pas jusqu''à ce que vienne le vengeur. » Flavius Josèphe raconte une histoire comparable sur un Zacharie fils de Baris, assassiné dans le temple par les zélotes au cours de la révolte juive (66-70 apr. J.-C.).'
  - type: text
    content: 'afin que retombe sur vous tout le sang innocent répandu sur la terre, depuis le sang d''Abel le juste jusqu''au sang de Zacharie, fils de Barachie, que vous avez assassiné entre le sanctuaire et l''autel. '
  '36':
  - type: note
    content: sur cette génération 24.34+.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, tout cela viendra sur cette génération.'
  - type: heading
    content: Complainte de Jésus sur Jérusalem
  - type: heading
    content: Lc 13.34-35
  '37':
  - type: text
    content: ' '
  - type: note
    content: qui tues v. 34+ ; Lc 13.34. –  prophètes v. 29ss,34+. –  lapides 1S 30.6 ; 1R 12.18 ; 21.13 ; Ac 7.58. –  ses ailes Dt 32.11 ; Ps 17.8 ; 36.8 ; 91.4 ; Rt 2.12 ; cf. Es 31.5 ; 65.2. –  pas voulu 22.3+.
  - type: text
    content: 'Jérusalem, Jérusalem, toi qui tues les prophètes et qui lapides ceux qui te sont envoyés, combien de fois j''ai voulu rassembler tes enfants, comme une poule rassemble ses poussins sous ses ailes ! Mais vous ne l''avez pas voulu. '
  '38':
  - type: note
    content: 'Certains mss omettent le mot déserte  : le texte devient alors identique à Lc 13.21 (vous est abandonnée) ; 24.2 ; 1R 9.7s ; Es 64.9ss ; Jr 7.1ss ; 12.7 ; 22.5 ; 26.6,9,18 ; Ez 8–11 ; Mi 3.12 ; Ps 69.26 ; Ac 1.20 ; 6.14 ; cf. Tobit 14.4 : « Samarie et Jérusalem seront désertes et la Maison de Dieu sera désolée et brûlée pour un temps. »'
  - type: text
    content: 'Eh bien, votre maison vous est laissée déserte. '
  '39':
  - type: note
    content: vous ne me verrez plus Jn 14.19 ; 16.17,19 ; cf. Os 3.4s. –  Béni soit celui qui vient au nom du Seigneur ! 21.9+.
  - type: text
    content: 'Car, je vous le dis, vous ne me verrez plus désormais, jusqu''à ce que vous disiez :'
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur !
  '4':
  - type: note
    content: 'des charges lourdes…  : cf. 11.28ss ; voir aussi Ac 15.10,28. –  difficiles à porter  : le terme correspondant est absent de certains mss.'
  - type: text
    content: 'Ils lient des charges lourdes, difficiles à porter, pour les mettre sur les épaules des gens, mais eux-mêmes ne veulent pas les remuer du doigt. '
  '5':
  - type: note
    content: 'pour être vus… 6.1,5,16 ; Lc 16.15 ; Jn 5.44. –  phylactères  : le mot grec ainsi transcrit correspond sans doute à l''araméen tephillîn, qui désigne les petites boîtes de cuir portées au front et sur le bras gauche par les juifs pieux et contenant des textes bibliques écrits sur du parchemin (cf. Ex 13.9,16 ; Dt 6.8s ; 11.18) ; le verbe traduit par élargir est diversement interprété (faire des cassettes plus grandes, les attacher avec des bandelettes plus larges, les porter plus longtemps). Le texte en tout cas dénonce une piété ostentatoire. –  houppes  : le même terme est traduit par frange en 9.20n  ; 14.36 ; cf. Nb 15.38s ; Dt 22.12. –  de leurs vêtements  : certains mss portent la précision correspondante, mais elle est sous-entendue dans les meilleurs témoins du texte.'
  - type: text
    content: 'Toutes leurs œuvres, ils les font pour être vus des gens. Ainsi, ils élargissent leurs phylactères et ils agrandissent les houppes de leurs vêtements ; '
  '6':
  - type: note
    content: Lc 14.7-11.
  - type: text
    content: 'ils se plaisent à avoir la première place dans les dîners et les premiers sièges dans les synagogues, '
  '7':
  - type: note
    content: 'Rabbi  : mot araméen, dérivé d''une racine évoquant la grandeur, qui signifie maître, instructeur (Mc 9.5n  ; Jn 1.38) ; certains mss portent  : Rabbi ! Rabbi !'
  - type: text
    content: 'être salués sur les places publiques et être appelés '
  - type: text
    content: Rabbi
  - type: text
    content: ' par les gens.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 31.34 ; Jn 13.13 ; Ep 4.5 ; Jc 3.1. –  maître  : au sens d’ enseignant.'
  - type: text
    content: 'Mais vous, ne vous faites pas appeler '
  - type: text
    content: Rabbi ;
  - type: text
    content: ' car un seul est votre maître, et vous, vous êtes tous frères. '
  '9':
  - type: note
    content: '« père »  : litt. votre père. –  le Père céleste  : litt. le céleste 6.9+ ; Ml 2.10 ; Ep 4.6 ; cf. 1Co 4.14.'
  - type: text
    content: 'Et n''appelez personne sur la terre « père », car un seul est votre père, le Père céleste. '
