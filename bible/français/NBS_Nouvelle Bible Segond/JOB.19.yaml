document_id: JOB.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : à la fin mon rédempteur interviendra'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: espoir 13.15+. –  arbre 14.7+.
  - type: text
    content: Il me démolit de toutes parts, et je m'en vais ;
  - type: text
    content: il a arraché mon espoir comme un arbre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 33.10.
  - type: text
    content: Il s'est mis en colère contre moi,
  - type: text
    content: il me considère comme un de ses adversaires.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'elles se sont frayé…  : cf. 30.12. –  elles ont dressé leur camp…  : cf. Ps 34.8.'
  - type: text
    content: Ses troupes surviennent ensemble,
  - type: text
    content: elles se sont frayé un chemin jusqu'à moi,
  - type: text
    content: elles ont dressé leur camp autour de ma tente.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.15 ; Ps 38.12 ; 69.9 ; 88.9,19. –  Il a éloigné de moi mes frères  : un ms hébreu et des versions anciennes portent mes frères se sont éloignés de moi. –  je suis repoussant  : cf. v. 17 ; autres traductions ceux qui me connaissent me fuient ; ceux qui me connaissaient me sont devenus hostiles  ; LXX mes amis sont devenus impitoyables envers moi.'
  - type: text
    content: Il a éloigné de moi mes frères,
  - type: text
    content: je suis repoussant pour ceux qui me connaissent ;
  '14':
  - type: text
    content: je suis abandonné de mes proches,
  - type: text
    content: je suis oublié de mes connaissances.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Les hôtes  : le terme hébreu est généralement traduit par immigrés.'
  - type: text
    content: Les hôtes de ma maison et mes servantes
  - type: text
    content: me considèrent comme un étranger,
  - type: text
    content: je ne suis plus à leurs yeux qu'un inconnu.
  '16':
  - type: text
    content: J'appelle mon serviteur, il ne répond pas ;
  - type: text
    content: je dois le supplier de ma bouche.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'haleine  : le même mot est ailleurs traduit par souffle ou esprit (cf. 15.30n). –  je suis devenu fétide  : le verbe hébreu ainsi traduit n''apparaît qu''ici et sa signification est incertaine. –  mes propres fils  : litt. les fils de mon ventre (cf. 3.10n), l''expression semble désigner les enfants de Job (cf. Mi 6.7 ; mais voir aussi Jb 1.19) ; selon certains, elle pourrait aussi s''appliquer à ceux qui sont issus de la même mère (du même ventre ) que lui, c.-à-d. à ses frères.'
  - type: text
    content: Mon haleine est repoussante pour ma femme,
  - type: text
    content: je suis devenu fétide pour mes propres fils.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'gamins 16.11+. –  me méprisent  : autre traduction me rejettent  ; cf. 5.17n  ; 7.16.'
  - type: text
    content: Même les gamins me méprisent ;
  - type: text
    content: si je me lève, ils parlent contre moi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: mes secrets 15.8+. –  se sont retournés contre moi Ps 41.10 ; 55.14.
  - type: text
    content: Les gens à qui je confiais mes secrets m'ont en abomination.
  - type: text
    content: Ceux que j'aimais se sont retournés contre moi.
  '2':
  - type: text
    content: Jusqu'à quand me causerez-vous du chagrin
  - type: text
    content: et m'écraserez-vous de vos propos ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Ce verset présente diverses variantes dans les versions anciennes. LXX mes chairs ont pourri dans ma peau et mes os sont entre mes dents. Cf. 7.5 ; 16.8+. –  la peau des dents  : certains ont discerné dans cette expression une référence à la membrane recouvrant les dents de lait des enfants, probablement déjà observée par la médecine antique ; ils y voient en conséquence une allusion supplémentaire à l''innocence de Job dans son dénuement.'
  - type: text
    content: Mes os sont attachés à ma peau et à ma chair ;
  - type: text
    content: je n'ai gardé que la peau des dents.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Voir grâce. –  la main de Dieu 13.21 ; Jg 2.15 ; 1S 5.6-11 ; Rt 1.13.
  - type: text
    content: Faites-moi grâce, faites-moi grâce, vous, mes amis,
  - type: text
    content: car la main de Dieu m'a frappé !
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 27.2.
  - type: text
    content: Pourquoi me poursuivez-vous, comme Dieu ?
  - type: text
    content: N'êtes-vous pas rassasiés de ma chair ?
  '23':
  - type: text
    content: Ah ! si mes propos pouvaient être écrits,
  - type: text
    content: s'ils étaient gravés dans un livre !
  '24':
  - type: text
    content: ' '
  - type: note
    content: du plomb était peut-être coulé dans les lettres gravées au stylet de fer (même terme en Jr 8.8 ; 17.1 ; Ps 45.2). Certains modifient le mot traduit par plomb pour lire une pointe , comme en Jr 17.1.
  - type: text
    content: Qu'avec un stylet de fer et avec du plomb
  - type: text
    content: ils soient pour toujours taillés dans le roc !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'rédempteur  : hébreu go''el , cf. 3.5n  ; voir aussi 16.19,21 ; Ex 6.6+ ; Es 43.14 ; 44.6 ; 47.4 ; Pr 23.11 ; Rt 2.20n. –  est vivant…  : autre traduction est le Vivant, le Dernier, qui se lèvera… –  il se lèvera…  : celui qui se lève le dernier dans un procès est sans doute celui qui prononce la sentence (cf. Ps 12.6) ; Vg je ressusciterai  ; LXX je sais qu''il est éternel, celui qui vient me délivrer sur la terre. –  sur la poussière  : autre traduction contre la poussière (c.-à-d. contre la mort ).'
  - type: text
    content: Je sais bien, moi, que mon rédempteur est vivant,
  - type: text
    content: et qu'il se lèvera, le dernier, sur la poussière,
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'après que ma peau aura été détruite  : traduction difficile. Litt. après ma peau, ils abattront (ou on abattra ) cela  ; autre traduction après ma peau, qu''on arrachera . Les versions anciennes présentent de nombreuses variantes. –  de ma chair  : on pourrait à la rigueur comprendre (même) privé de ma chair ou hors de ma chair , ou, en modifiant l''ordre des termes du texte hébreu traditionnel, même si l''on arrache ma peau de ma chair , mais la signification plus probable est depuis ma chair  ; on peut aussi interpréter moi-même, en personne . –  je verrai Dieu  : même verbe au v. 27 ; Ex 24.11n. – Vg de nouveau je serai revêtu de ma peau et dans ma chair je verrai Dieu.'
  - type: text
    content: après que ma peau aura été détruite ;
  - type: text
    content: de ma chair je verrai Dieu.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Moi, je le verrai  : litt. que moi je verrai (ou je vois ) pour moi (cf. 33.26n  ; 42.5 ; Gn 32.31n  ; Es 6.5 ; Mt 5.8 ; Jn 14.9 ; Hé 11.27 ; 3Jn 11). Certains ont compris  : celui que je verrai alors (sera) pour moi . –  et non pas quelqu''un d''autre  : litt. et non un étranger , ce qui peut signifier et non les yeux d''un étranger ou bien il ( celui que je verrai ou que je vois ) ne sera (ou n''est ) pas un étranger (cf. 14.15). –  les profondeurs de mon être…  : litt. mes reins s''épuisent (les deux termes font assonance en hébreu) en mon sein  ; cf. 16.13 ; Jr 12.2n.'
  - type: text
    content: Moi, je le verrai,
  - type: text
    content: mes yeux le verront, et non pas quelqu'un d'autre ;
  - type: text
    content: les profondeurs de mon être s'épuisent au dedans de moi.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'on découvrira le bien-fondé de ma cause  : litt. la racine de la parole (ou de la chose ) sera trouvée en moi . Au lieu de en moi , de nombreux mss hébreux et des versions anciennes portent en lui , ce qui permettrait de traduire  : Si vous dites : « Comment le poursuivrons-nous et trouverons-nous en lui la cause de ces paroles (ou un sujet d''accusation )  », alors (29) craignez pour vous l''épée… (cf. 34.36).'
  - type: text
    content: 'Lorsque vous direz : « Pourquoi le poursuivons-nous ? »'
  - type: text
    content: alors on découvrira le bien-fondé de ma cause.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'l''acharnement  : litt. la fureur , ou la brûlure  ; autre traduction possible car les châtiments de l''épée sont terribles . –  un jugement ou un juge , texte et traduction incertains ; quelques-uns interprètent le terme correspondant comme un nom propre ( Shaddayân , dérivé possible de Shaddaï , cf. 5.17n) ; dans cette hypothèse, on pourrait traduire ainsi vous saurez qu''il y a un Puissant.'
  - type: text
    content: Craignez pour vous l'épée,
  - type: text
    content: car l'acharnement est une faute passible de l'épée ;
  - type: text
    content: et vous saurez qu'il y a un jugement !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'dix fois Gn 31.7+. –  que vous m''insultez  : autre traduction que vous cherchez à me confondre (cf. 11.3n).'
  - type: text
    content: Voilà dix fois que vous m'insultez ;
  - type: text
    content: n'avez-vous pas honte de me malmener ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'repose sur moi  : litt. passe la nuit (ou loge  ; même verbe en 17.2n  ; 24.7 ; 29.19 ; 31.32 ; 39.9,28 ; 41.14n) avec (ou chez ) moi , c.-à-d., sans doute, ne regarde que moi  ; cf. 22.3+ ; Pr 9.12 ; Ga 6.5.'
  - type: text
    content: Si vraiment j'ai été dans l'erreur,
  - type: text
    content: mon erreur repose sur moi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'si vous me reprochez mon déshonneur  : autre traduction si vous me couvrez d''outrages  ; cf. 16.10n.'
  - type: text
    content: Si vraiment vous vous élevez contre moi,
  - type: text
    content: si vous me reprochez mon déshonneur,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '18.8+. –  maltraite  : cf. Ps 119.78 ; Lm 3.36 ; le même verbe a aussi été traduit par courber , cf. Ec 1.15 ; 7.13 ; 12.3.'
  - type: text
    content: sachez que c'est Dieu qui me maltraite
  - type: text
    content: et qui m'enveloppe de son filet.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 13.22+.
  - type: text
    content: Si je crie à la violence, personne ne répond ;
  - type: text
    content: si j'appelle au secours, pas de jugement !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'barré la route  : cf. 3.23+. –  ténèbres 17.12s ; 22.11 ; cf. 3.5+.'
  - type: text
    content: Il m'a barré la route, je ne peux plus passer ;
  - type: text
    content: il a mis des ténèbres sur mes sentiers.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 29.14. – Voir gloire.
  - type: text
    content: Il m'a dépouillé de ma gloire,
  - type: text
    content: il a retiré la couronne de ma tête.
