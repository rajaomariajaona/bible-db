document_id: JDG.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Trois cents hommes pour Gédéon
  - type: text
    content: ' '
  - type: note
    content: 'Yeroub-Baal / Gédéon 6.32n. –  toute sa troupe  : autre traduction tout le peuple qui était avec lui , même possibilité dans la suite ; cf. v. 23s ; 6.35 ; voir aussi 8.2. –  la source de Harod (hébreu ‘eyn-Harod, source du Tremblement , terme apparenté au verbe traduit par trembler au v. 3), probablement au pied du mont Guilboa, à l''ouest de Beth-Shéân. –  colline de Moré ou colline du visionnaire , également connue sous le nom de Petit Hermon, au sud du Tabor (4.6n) ; elle domine la vallée de Jizréel.'
  - type: text
    content: 'Yeroub-Baal (c''est-à-dire Gédéon) et toute sa troupe se levèrent de bon matin et dressèrent leur camp près de la source de Harod. Le camp de Madiân était au nord du sien, depuis la colline de Moré jusque dans la vallée. '
  '10':
  - type: note
    content: Cf. 1S 14.1-23.
  - type: text
    content: 'Si tu as peur de descendre, descends vers le camp avec Poura, ton serviteur. '
  '11':
  - type: note
    content: 'tu prendras courage  : litt. tes mains seront fortifiées. –  aux avant-postes du camp  : litt. à la limite des hommes en ordre de bataille (Ex 13.18n) qui sont dans le camp.'
  - type: text
    content: 'Tu écouteras ce qu''ils diront et, après cela, tu prendras courage ; descends donc au camp. Il descendit avec Poura, son serviteur, jusqu''aux avant-postes du camp. '
  '12':
  - type: note
    content: '6.1n,3n,5+. –  s''étaient abattus  : autres traductions étaient étendus, installés, déployés. –  comme le sable… de la mer  : cf. Gn 22.17 ; Jos 11.4 ; Ap 20.8.'
  - type: text
    content: 'Madiân, Amalec et tous les fils de l''Orient s''étaient abattus sur la vallée comme une multitude de criquets ; leurs chameaux étaient innombrables, comme le sable qui est au bord de la mer. '
  '13':
  - type: note
    content: Cf. Gn 37.5-11 ; 40.5–41.36. – Le pain d'orge et la tente symbolisent peut-être respectivement les sédentaires (Israël) et les nomades (Madiân) ; cf. Gn 4 ; 27. –  roulait et retournée traduisent deux formes du même verbe hébreu.
  - type: text
    content: 'Quand Gédéon arriva, un homme racontait un rêve à son compagnon. Il disait : J''ai fait un rêve : un pain d''orge grillé roulait dans le camp de Madiân ; il est arrivé jusqu''à la tente et l''a heurtée : elle est tombée ; il l''a retournée sens dessus dessous : la tente est tombée. '
  '14':
  - type: note
    content: 'l''épée de Gédéon v. 20. –  l''homme d''Israël  : autre traduction un homme d''Israël, cf. v. 8n. –  Dieu lui a livré… v. 9.'
  - type: text
    content: 'Son compagnon répondit : Ce n''est rien d''autre que l''épée de Gédéon, fils de Joas, l''homme d''Israël ; Dieu lui a livré Madiân et tout le camp ! '
  '15':
  - type: text
    content: 'Lorsque Gédéon eut entendu le récit du rêve et son explication, il se prosterna. Puis il revint au camp d''Israël et dit : Levez-vous ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a livré le camp de Madiân !'
  - type: heading
    content: Déroute des Madianites
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'trois bandes  : litt. trois têtes , de même au v. 20 ; cf. 9.34n,37,43 ; 1S 11.11 ; 13.17 ; voir aussi Jb 1.17.'
  - type: text
    content: 'Il divisa les trois cents hommes en trois bandes et leur remit à tous des trompes et des cruches vides, avec des torches à l''intérieur des cruches. '
  '17':
  - type: note
    content: 'aux abords  : autre traduction à l''extrémité, même possibilité dans la suite.'
  - type: text
    content: 'Il leur dit : Vous me regarderez et vous ferez comme moi. Dès que j''arriverai aux abords du camp, vous ferez ce que je ferai ; '
  '18':
  - type: note
    content: ceux qui seront avec moi v. 19. –  Pour le Seigneur … v. 20.
  - type: text
    content: 'quand je sonnerai de la trompe, moi et tous ceux qui seront avec moi, vous aussi vous sonnerez de la trompe tout autour du camp et vous direz : Pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et pour Gédéon !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'la veille du milieu  : entre 22 h et 2 h du matin environ ; cf. Ex 14.24n  ; 1S 11.11.'
  - type: text
    content: 'Gédéon et les cent hommes qui étaient avec lui arrivèrent aux abords du camp au commencement de la veille du milieu, comme on venait de relever les gardes. Ils sonnèrent de la trompe et brisèrent les cruches qu''ils avaient à la main. '
  '2':
  - type: note
    content: 's''en vanter  : même verbe en Es 10.15n. –  C''est ma propre force (litt. ma main) qui m''a sauvé  : cf. Dt 8.17s ; 9.4-6 ; Es 10.13-15 ; Am 6.13 ; voir aussi Jos 24.12 ; 1S 14.6 ; 17.47 ; Os 1.7 ; Ps 44.4.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Gédéon : Ta troupe est trop nombreuse pour que je lui livre Madiân ; Israël pourrait s''en vanter à mes dépens et dire : « C''est ma propre force qui m''a sauvé. » '
  '20':
  - type: note
    content: 'trois bandes v. 16n. –  les trompes… pour en sonner  : certains modifient le texte hébreu traditionnel pour lire ici l''épée, et plus loin Pour le Seigneur et pour Gédéon ! –  L''épée (litt. épée, cf. v. 14) pour le Seigneur … v. 18 ; cf. Jos 6.'
  - type: text
    content: 'Les trois bandes sonnèrent de la trompe et brisèrent les cruches ; ils saisirent les torches de la main gauche et les trompes de la main droite, pour en sonner ; puis ils s''écrièrent : L''épée pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et pour Gédéon ! '
  '21':
  - type: note
    content: 'pousser des cris  : cf. 15.14n.'
  - type: text
    content: 'Ils se tinrent debout autour du camp, chacun à sa place ; tout le camp se mit à courir, à pousser des cris et à prendre la fuite. '
  '22':
  - type: note
    content: 'tourna  : litt. plaça, cf. 1S 14.19s ; Za 14.13+. –  tous s''enfuirent  : litt. le camp s''enfuit. –  Beth-Shitta (Maison de l''Acacia), Tseréra (peut-être identique à Tseréda en 1R 11.26), Abel-Mehola (Champ de la Danse), localités à situer probablement près du Jourdain, au sud de Beth-Shéân ; Tabbath était peut-être de l''autre côté du Jourdain.'
  - type: text
    content: 'Quand les trois cents hommes sonnèrent de la trompe, dans tout le camp le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tourna l''épée des uns contre les autres ; tous s''enfuirent jusqu''à Beth-Shitta, vers Tseréra, jusqu''aux confins d''Abel-Mehola, près de Tabbath.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.35 (Zabulon n'est plus mentionné). –  se mobilisèrent ou furent mobilisés, convoqués  ; même forme verbale au v. 24 et en 10.17 ; 12.1 ; 1S 13.4 ; 2R 3.21.
  - type: text
    content: 'Les hommes d''Israël se mobilisèrent – ceux de Nephtali, d''Aser et de tout Manassé – et ils poursuivirent Madiân. '
  '24':
  - type: note
    content: 'les points d''eau  : litt. les eaux  ; certains modifient le texte hébreu traditionnel pour lire les gués du Jourdain, cf. 3.28+. –  Ephraïm 8.1.'
  - type: text
    content: 'Gédéon envoya des messagers dans toute la région montagneuse d''Ephraïm, pour dire : Descendez à la rencontre de Madiân et prenez avant eux les points d''eau jusqu''à Beth-Bara, ainsi que le Jourdain. Tous les hommes d''Ephraïm se mobilisèrent ; ils prirent les points d''eau jusqu''à Beth-Bara, ainsi que le Jourdain. '
  '25':
  - type: note
    content: 'les deux princes  : autre traduction deux princes, cf. 8.5. –  Oreb signifie corbeau, Zéeb loup  ; cf. 8.3 ; Ps 83.12. –  rocher d''Oreb Es 10.26. –  les têtes  : cf. 1S 17.51,54. –  au-delà du Jourdain  : on peut comprendre en Transjordanie, à l''est du Jourdain (5.17+), ou éventuellement de Transjordanie (si Gédéon se trouvait à l''ouest) ; cf. 8.4ss ; voir aussi Gn 50.10ns ; Nb 32.19n  ; Dt 3.20n  ; Jos 5.1n.'
  - type: text
    content: Ils prirent les deux princes de Madiân, Oreb et Zéeb ; ils tuèrent Oreb au rocher d'Oreb ; ils tuèrent Zéeb au pressoir de Zéeb. Ils poursuivirent Madiân et apportèrent les têtes d'Oreb et de Zéeb à Gédéon, au-delà du Jourdain.
  '3':
  - type: note
    content: 'Dt 20.8. –  en présence de  : litt. aux oreilles de. –  tremble v. 1n. –  qu''il s''en aille  : traduction incertaine d''un verbe hébreu qui n''apparaît qu''ici ; certains le rattachent à un terme signifiant oiseau et comprennent, métaphoriquement, s''enfuient à tire-d''aile  ; d''autres modifient le texte hébreu traditionnel pour lire ainsi Gédéon en fit le tri, comme au v. 4. –  la région montagneuse (ou la montagne) du Galaad, à l''est du Jourdain, cf. Gn 31.21ss.'
  - type: text
    content: 'Maintenant, proclame ceci en présence de la troupe, je te prie : « Que celui qui a peur et tremble reparte, qu''il s''en aille de la région montagneuse du Galaad ! » Vingt-deux mille hommes parmi la troupe repartirent ; il en restait dix mille.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'vers l''eau  : cf. v. 1.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Gédéon : La troupe est encore trop nombreuse. Fais-les descendre vers l''eau, et là j''en ferai le tri pour toi ; celui dont je te dirai : « Que celui-ci aille avec toi » ira avec toi ; et tout homme dont je te dirai : « Que celui-ci n''aille pas avec toi » n''ira pas. '
  '5':
  - type: note
    content: 'comme le chien  : litt. comme lape le chien. –  place-les à part  : cf. 6.37+.'
  - type: text
    content: 'Il fit donc descendre la troupe vers l''eau. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit alors à Gédéon : Tous ceux qui laperont l''eau avec la langue, comme le chien, place-les à part, et de même tous ceux qui se mettront à genoux pour boire. '
  '6':
  - type: text
    content: 'Ceux qui lapèrent l''eau en la portant à la bouche avec leur main furent au nombre de trois cents hommes ; tout le reste de la troupe se mit à genoux pour boire de l''eau. '
  '7':
  - type: note
    content: 'tout le reste de la troupe  : litt. toute la troupe (ou tout le peuple). –  chez soi  : litt. à son lieu, de même en 9.55.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Gédéon : C''est par les trois cents hommes qui ont lapé que je vous sauverai ; c''est par eux que je te livrerai Madiân. Que tout le reste de la troupe s''en aille, chacun chez soi ! '
  '8':
  - type: note
    content: 'Ils prirent les provisions…  : traduction et sens incertains ; on pourrait comprendre (les trois cents) prirent les provisions du reste du peuple dans leurs mains, ainsi que leurs (propres) trompes  ; certains modifient le texte hébreu traditionnel pour lire il prit les cruches des mains du peuple (cf. v. 16ss). –  tous les hommes d''Israël  : litt. tout homme d''Israël (de même v. 14,23 ; 8.22 ; 9.55 ; 20.11ss) ; cf. Dt 27.14n. –  dans leur tente  : cf. v. 7 ; 20.8 ; 1S 13.2 ; 2S 20.1 ; 1R 8.66 ; 12.16. –  la vallée de Jizréel, cf. v. 1n.'
  - type: text
    content: Ils prirent les provisions que la troupe avait en main, ainsi que leurs trompes. Puis il renvoya tous les hommes d'Israël dans leur tente, ne retenant que les trois cents hommes. Le camp de Madiân était au-dessous de lui, dans la vallée.
  - type: heading
    content: Présage de victoire
  '9':
  - type: text
    content: ' '
  - type: note
    content: 3.28+.
  - type: text
    content: 'Cette nuit-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Gédéon : Lève-toi, descends au camp ; je te l''ai livré. '
