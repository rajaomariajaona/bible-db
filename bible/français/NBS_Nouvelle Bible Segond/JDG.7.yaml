  - type: text
    text: 'Gédéon envoya des messagers dans toute la région montagneuse d''Ephraïm, pour dire : Descendez à la rencontre de Madiân et prenez avant eux les points d''eau jusqu''à Beth-Bara, ainsi que le Jourdain. Tous les hommes d''Ephraïm se mobilisèrent ; ils prirent les points d''eau jusqu''à Beth-Bara, ainsi que le Jourdain. '
