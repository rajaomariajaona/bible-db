    marker-yv: yv-n
  - type: text
    text: 'Quand Gédéon arriva, un homme racontait un rêve à son compagnon. Il disait : J''ai fait un rêve : un pain d''orge grillé roulait dans le camp de Madiân ; il est arrivé jusqu''à la tente et l''a heurtée : elle est tombée ; il l''a retournée sens dessus dessous : la tente est tombée. '
  - type: usfm
