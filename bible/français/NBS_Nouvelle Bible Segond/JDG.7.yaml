  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque Gédéon eut entendu le récit du rêve et son explication, il se prosterna. Puis il revint au camp d''Israël et dit : Levez-vous ! Le '
  - type: usfm
    marker: nd
    children:
