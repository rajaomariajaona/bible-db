  - type: text
    text: Ils prirent les deux princes de Madiân, Oreb et Zéeb ; ils tuèrent Oreb au rocher d'Oreb ; ils tuèrent Zéeb au pressoir de Zéeb. Ils poursuivirent Madiân et apportèrent les têtes d'Oreb et de Zéeb à Gédéon, au-delà du Jourdain.
