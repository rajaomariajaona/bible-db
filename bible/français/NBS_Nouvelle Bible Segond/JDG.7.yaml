  - type: text
    text: 'Maintenant, proclame ceci en présence de la troupe, je te prie : « Que celui qui a peur et tremble reparte, qu''il s''en aille de la région montagneuse du Galaad ! » Vingt-deux mille hommes parmi la troupe repartirent ; il en restait dix mille.'
