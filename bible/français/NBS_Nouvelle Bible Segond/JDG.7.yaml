  - type: text
    text: 'Yeroub-Baal (c''est-à-dire Gédéon) et toute sa troupe se levèrent de bon matin et dressèrent leur camp près de la source de Harod. Le camp de Madiân était au nord du sien, depuis la colline de Moré jusque dans la vallée. '
