  - type: text
    text: Ils prirent les provisions que la troupe avait en main, ainsi que leurs trompes. Puis il renvoya tous les hommes d'Israël dans leur tente, ne retenant que les trois cents hommes. Le camp de Madiân était au-dessous de lui, dans la vallée.
