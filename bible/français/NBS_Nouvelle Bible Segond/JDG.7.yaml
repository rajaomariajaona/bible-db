    marker-yv: yv-n
  - type: text
    text: 'Gédéon et les cent hommes qui étaient avec lui arrivèrent aux abords du camp au commencement de la veille du milieu, comme on venait de relever les gardes. Ils sonnèrent de la trompe et brisèrent les cruches qu''ils avaient à la main. '
