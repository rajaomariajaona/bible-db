      - type: text
        text: v. 9.
    marker-yv: yv-n
  - type: text
    text: 'Son compagnon répondit : Ce n''est rien d''autre que l''épée de Gédéon, fils de Joas, l''homme d''Israël ; Dieu lui a livré Madiân et tout le camp ! '
  - type: usfm
    marker: v
