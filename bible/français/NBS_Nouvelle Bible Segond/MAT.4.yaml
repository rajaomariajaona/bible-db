document_id: MAT.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus mis à l'épreuve par le diable
  - type: heading
    content: Mc 1.12-13  ; Lc 4.1-13
  - type: text
    content: ' '
  - type: note
    content: 'Esprit Ac 8.29,39. –  mis à l''épreuve ou tenté  ; c''est une autre forme du même verbe qui est traduite par tentateur au v. 3 ; un verbe apparenté et souvent équivalent est rendu par provoquer au v. 7 ; cf. 6.13 ; 16.1 ; 19.3 ; 22.18,35 ; 26.41 ; Hé 2.18 ; 4.15. –  diable  : voir démon, diable, Satan.'
  - type: text
    content: 'Alors Jésus fut emmené par l''Esprit au désert, pour être mis à l''épreuve par le diable. '
  '10':
  - type: note
    content: Va-t'en, Satan ! 16.23 ; cf. 12.26n. –  C'est devant… Dt 6.13 ; 10.20  ; 1S 7.3. Au lieu de c'est à lui seul que tu rendras un culte on pourrait traduire tu le serviras, lui seul  ; mais le verbe, à connotation religieuse (cf. Lc 1.74), diffère de celui qui est traduit par servir au v. 11.
  - type: text
    content: 'Jésus lui dit : Va-t''en, Satan ! Car il est écrit : '
  - type: text
    content: C'est devant le Seigneur, ton Dieu, que tu te prosterneras, et c'est à lui
  - type: text
    content: ' seul '
  - type: text
    content: que tu rendras un culte
  - type: text
    content: '. '
  '11':
  - type: note
    content: diable Jc 4.7 ; 1P 5.9. –  servir est probablement à prendre ici dans un sens concret, comme dans servir à table (8.15) ; même verbe en 20.28 ; 25.44 (se mettre au service de) ; 27.55 ; cf. 20.26n  ; 26.53 ; Mc 1.13 ; voir aussi 1R 19.5ss ; Lc 22.43 ; Jn 1.51 ; Hé 1.6,14.
  - type: text
    content: Alors le diable le laissa, et des anges vinrent le servir.
  - type: heading
    content: Jésus se retire en Galilée
  - type: heading
    content: Mc 1.14-15  ; Lc 4.14-15  ; cf. Jn 4.1-3,43-46
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'livré (c.-à-d., en l''occurrence, arrêté et emprisonné) 17.22 ; 26.2 ; 27.2,18,26 ; cf. Lc 3.20 ; Ac 4.28. –  Jésus se retira  : litt. il se retira 2.12ss,22 ; 12.15 ; 14.13 ; 15.21. –  Galilée v. 23,25 ; 2.22n  ; 3.13 ; 28.16.'
  - type: text
    content: 'Lorsqu''il eut appris que Jean avait été livré, Jésus se retira en Galilée. '
  '13':
  - type: note
    content: 'Nazareth (2.23n  ; les meilleurs mss portent ici Nazara, de même en Lc 4.16) ; cf. Jn 4.44. –  mer  : il s''agit ici du lac de Galilée, aussi appelé lac de Tibériade. Capharnaüm se trouve sur la rive nord de ce lac. Zabulon et Nephtali étaient deux anciennes tribus d''Israël installées dans le nord du pays (Jos 19.10-16,32-39).'
  - type: text
    content: 'Il quitta Nazareth et vint demeurer à Capharnaüm, près de la mer, dans le territoire de Zabulon et de Nephtali, '
  '14':
  - type: note
    content: prophète 1.22+.
  - type: text
    content: 'afin que s''accomplisse ce qui avait été dit par l''entremise du prophète Esaïe :'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Es 8.23n . –  au-delà ou de l''autre côté du Jourdain  : la même expression désigne ailleurs la Transjordanie, c.-à-d. la région à l''est du Jourdain (cf. v. 25 ; 19.1n). –  nations ou non-Juifs, païens  ; le terme correspondant est celui par lequel les Juifs désignaient les non-Juifs ; cf. 6.32 ; 10.5 ; 12.21 ; 20.25 ; 24.9,14 ; 25.32 ; 28.19 ; voir aussi 5.47 ; Ac 10.45n.'
  - type: text
    content: Terre de Zabulon et terre de Nephtali,
  - type: text
    content: route de la mer, au-delà du Jourdain,
  - type: text
    content: Galilée des nations,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Es 9.1 . –  assis  : autre traduction qui habitait  ; même possibilité pour ceux qui étaient assis ( qui habitaient ).'
  - type: text
    content: le peuple assis dans les ténèbres
  - type: text
    content: a vu une grande lumière,
  - type: text
    content: et sur ceux qui étaient assis dans le pays,
  - type: text
    content: dans l'ombre de la mort,
  - type: text
    content: une lumière s'est levée
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Dès lors  : cf. 16.21. –  Changez radicalement… 3.2n  ; 12.28.'
  - type: text
    content: 'Dès lors Jésus commença à proclamer : Changez radicalement, car le règne des cieux s''est approché !'
  - type: heading
    content: Les quatre premiers disciples
  - type: heading
    content: Mc 1.16-20  ; cf. Lc 5.1-11  ; Jn 1.35-51
  '18':
  - type: text
    content: ' '
  - type: note
    content: Jn 21.3 ; cf. Am 7.14.
  - type: text
    content: 'Comme il marchait au bord de la mer de Galilée, il vit deux frères, Simon, celui qu''on appelle Pierre, et André, son frère, qui jetaient un filet dans la mer – car ils étaient pêcheurs. '
  '19':
  - type: note
    content: 'à ma suite  : litt. derrière moi, comme en 10.38n  ; 16.23ns ; voir aussi 3.11n (autres verbes, même préposition). C''est une autre formule que le verbe traduit par suivre aux v. 20,22, ainsi qu''en 8.22+ ; cf. Mc 1.17n. –  pêcheurs d''humains (ou d''hommes, de gens  ; cf. 5.13+) 13.47 ; Lc 5.10 ; Ac 2.41.'
  - type: text
    content: 'Il leur dit : Venez à ma suite, et je vous ferai pêcheurs d''humains. '
  '2':
  - type: note
    content: quarante jours et quarante nuits Ex 24.18 ; 34.28 ; Dt 9.9,18 ; 1R 19.8.
  - type: text
    content: 'Après avoir jeûné quarante jours et quarante nuits, il eut faim. '
  '20':
  - type: note
    content: Cf. Ga 1.16.
  - type: text
    content: 'Aussitôt ils laissèrent les filets et le suivirent. '
  '21':
  - type: note
    content: 10.2/ / ; 17.1 ; 20.20/ / ; 27.56 ; Mc 1.29 ; 10.41 ; Lc 5.9+ ; Jn 21.2.
  - type: text
    content: 'En allant plus loin, il vit deux autres frères, Jacques, fils de Zébédée, et Jean, son frère, qui étaient dans leur bateau avec Zébédée, leur père, à réparer leurs filets. Il les appela : '
  '22':
  - type: note
    content: Cf. 8.21s ; 10.37.
  - type: text
    content: aussitôt ils laissèrent le bateau et leur père, et ils le suivirent.
  - type: heading
    content: Jésus enseigne, proclame la bonne nouvelle et guérit
  - type: heading
    content: Mc 1.39  ; Lc 4.44  ; 6.17-18
  '23':
  - type: text
    content: ' '
  - type: note
    content: parcourait… 9.35 ; 11.1 ; cf. Jn 18.20 ; Ac 10.38. –  leurs synagogues 9.35 ; 10.17 ; 12.9 ; 13.54 ; 23.34 ; Mc 1.39 ; Lc 4.15. –  bonne nouvelle (le terme a donné notre mot évangile ) du Règne (ou royaume ) de Dieu 9.35 ; 24.14 ; 26.13 ; cf. 11.5/ / ; Es 61.1-3. –  guérissant 8.7n.
  - type: text
    content: Il parcourait toute la Galilée, enseignant dans leurs synagogues, proclamant la bonne nouvelle du Règne et guérissant toute maladie et toute infirmité parmi le peuple.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Sa renommée ou ce qu''on entendait dire de lui , cf. 14.1 ; voir aussi 9.25+. –  démoniaques (c.-à-d. possédés par un démon) 8.16,28. –  lunatiques  : ces malades (épileptiques ?) étaient considérés comme influencés par les phases de la lune. Ils pouvaient aussi être regardés comme démoniaques (cf. 17.15, seule autre occurrence du mot ; voir aussi Ps 121.6). –  paralytiques 9.2. –  guérit  : voir 8.7n,17.'
  - type: text
    content: 'Sa renommée se répandit dans toute la Syrie. On lui amenait tous ceux qui souffraient, en proie à toutes sortes de maladies et de tourments – démoniaques, lunatiques, paralytiques – et il les guérit. '
  '25':
  - type: note
    content: 'Mc 3.7s. –  Décapole  : région située à l''est du Jourdain, autour d''une dizaine de villes confédérées (d''où son nom grec de Décapole = dix villes) qui jouissaient depuis Pompée (63 av. J.-C.) d''une certaine autonomie politique. Elle était peuplée en grande majorité de non-Juifs de langue grecque. –  Transjordanie  : cf. v. 15n.'
  - type: text
    content: De grandes foules le suivirent, de la Galilée, de la Décapole, de Jérusalem, de la Judée et de la Transjordanie.
  '3':
  - type: note
    content: 'tentateur ou probateur, provocateur, cf. v. 1n. –  vint lui dire  : litt. s''approchant, lui dit  ; cette formule et d''autres, voisines, reviennent particulièrement souvent chez Mt (v. 11 ; 5.1 ; 8.2,5,19,25 ; 9.14,20,28 etc.) ; certains y ont vu une marque de déférence (même, en l''occurrence, de la part du diable) : on s''approcherait de Jésus comme d''un roi ou d''une divinité. –  Fils de Dieu 3.17 ; 16.16+.'
  - type: text
    content: 'Le tentateur vint lui dire : Si tu es Fils de Dieu, ordonne que ces pierres deviennent des pains. '
  '4':
  - type: note
    content: 'Dt 8.3  ; cf. Mt 4.11n  ; voir aussi Pr 9.1ss ; Sagesse 16.26 : « Par là (le fléau de la grêle opposé au don de la manne, dans le récit de l''Exode), tes fils que tu as aimés, Seigneur, devaient apprendre que ce n''est pas la production de fruits qui nourrit l''homme, mais bien ta parole qui fait subsister ceux qui croient en toi. » Le Pasteur d''Hermas, Sim. IX,11,8 : « De quoi as-tu dîné, dit-il ? – J''ai dîné, Seigneur, dis-je, des paroles du Seigneur, toute la nuit. »'
  - type: text
    content: 'Il répondit : Il est écrit : '
  - type: text
    content: L'être humain ne vivra pas de pain seulement, mais de toute parole qui sort de la bouche de Dieu
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'ville sainte ou sacrée 27.53 ; Né 11.1. –  haut  : le mot grec signifie petite aile, rebord. On ignore quelle partie du temple est désignée : certains pensent qu''il s''agit du faîte d''une de ses portes. Une tradition juive difficile à dater est ainsi rapportée (Midrash Pesiqta 36) : « Quand le Roi, le Messie, se révélera, il viendra se tenir sur le toit du temple. »'
  - type: text
    content: 'Le diable l''emmena dans la ville sainte, le plaça sur le haut du temple '
  '6':
  - type: note
    content: Ps 91.11s.
  - type: text
    content: 'et lui dit : Si tu es Fils de Dieu, jette-toi en bas, car il est écrit :'
  - type: text
    content: Il donnera à ses anges des ordres à ton sujet,
  - type: text
    content: 'et '
  - type: text
    content: ils te porteront sur leurs mains,
  - type: text
    content: de peur que ton pied ne heurte une pierre
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 1n  ; Dt 6.16  ; cf. Ex 17.2-7 ; Nb 14.22 ; Ps 78.18 ; 95.8s.
  - type: text
    content: 'Jésus lui dit : Il est aussi écrit : '
  - type: text
    content: Tu ne provoqueras pas le Seigneur, ton Dieu
  - type: text
    content: '. '
  '8':
  - type: note
    content: Cf. Dt 3.27 ; 34.1 ; Ap 21.10. Voir gloire.
  - type: text
    content: 'Le diable l''emmena encore sur une montagne très haute, lui montra tous les royaumes du monde et leur gloire, '
  '9':
  - type: note
    content: 'si tu tombes…  : autre traduction si tu te prosternes devant moi pour m''adorer 2.2n,11n  ; voir culte.'
  - type: text
    content: 'et lui dit : Je te donnerai tout cela si tu tombes à mes pieds pour te prosterner devant moi. '
