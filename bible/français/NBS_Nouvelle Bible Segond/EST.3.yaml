          text: Esther
      - type: text
        text: ' grec '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'C.5-7 (prière de Mardochée) : « Tu sais bien, Seigneur, que ce n''est ni par démesure ni par orgueil ni par ambition que j''ai fait cela : ne pas me prosterner devant Haman l''orgueilleux. Car je consentirais à lui lécher les pieds pour le salut d''Israël. Mais j''ai fait cela pour ne pas mettre la gloire d''un homme au-dessus de la gloire de Dieu ; je ne me prosternerai devant personne sauf devant toi, mon Seigneur ; et ce ne sera pas par orgueil. »'
    marker-yv: yv-n
  - type: text
    text: 'Tous les gens de la cour du roi qui étaient à la porte du Roi s''agenouillaient et se prosternaient devant Haman, comme le roi en avait spécialement donné l''ordre. Pourtant, Mardochée ne s''agenouillait ni ne se prosternait. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
