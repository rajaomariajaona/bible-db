    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.12+ ; 5.9.
    marker-yv: yv-n
  - type: text
    text: 'Quand Haman vit que Mardochée ne s''inclinait pas, qu''il ne se prosternait pas devant lui, Haman fut rempli de fureur. '
  - type: usfm
    marker: v
    metadata:
