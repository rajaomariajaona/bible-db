  - type: text
    text: 'On convoqua les scribes du roi, le treizième jour du premier mois, et on écrivit tous les ordres de Haman à l''intention des satrapes du roi, des gouverneurs de chaque province et des princes de chaque peuple, à chaque province dans son écriture, à chaque peuple dans sa langue. Cela fut écrit au nom du roi Xerxès et scellé avec le cachet du roi. '
