document_id: EST.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Conflit entre Haman et Mardochée
  - type: text
    content: ' '
  - type: note
    content: 'distingua  : litt. grandit  ; 5.11 ; 10.3 ; Gn 41.40 ; Dn 5.29 ; 6.3. –  Haman, fils de Hammedata  : ces noms semblent d''origine perse, mais leur signification est incertaine ; certains y ont vu des noms de divinités élamites v. 10 ; 9.24. –  Agaguite  : c.-à-d. descendant d''Agag , roi d''Amalec, l''adversaire du roi Saül, fils de Qish, lui-même ancêtre de Mardochée (2.5 ; cf. 1S 15 ; voir aussi Ex 17.16 ; Nb 24.7n,20). –  le plaça  : litt. plaça son siège  ; le même mot est traduit par trône en 1.2. –  de son rang  : litt. qui étaient avec lui.'
  - type: text
    content: 'Après cela, le roi Xerxès distingua Haman, fils de Hammedata, l''Agaguite ; il l''éleva et le plaça au-dessus de tous les princes de son rang. '
  '10':
  - type: note
    content: 'de son doigt  : litt. de sa main  ; cf. v. 12 ; 8.2,8,10 ; Gn 41.42. –  adversaire 7.4n,6 ; 8.1,11n  ; 9.10,24.'
  - type: text
    content: 'Le roi retira de son doigt la bague à cachet et la donna à Haman, fils de Hammedata, l''Agaguite, adversaire des Juifs. '
  '11':
  - type: note
    content: 'ce qu''il te plaira  : litt. selon ce qui est bon à tes yeux  ; cf. 1.19n,21n.'
  - type: text
    content: 'Le roi dit à Haman : L''argent t''est donné, ainsi que ce peuple. Fais-en ce qu''il te plaira. '
  '12':
  - type: note
    content: 'Voir scribes. –  le treizième jour…  : c.-à-d. la veille de la Pâque ; cf. v. 13+ ; voir calendrier et fêtes. –  satrapes / gouverneurs Esd 8.36. –  dans sa langue 1.22n. –  le cachet ou la bague à cachet  ; cf. v. 10+ ; 8.8-10 ; 1R 21.8.'
  - type: text
    content: 'On convoqua les scribes du roi, le treizième jour du premier mois, et on écrivit tous les ordres de Haman à l''intention des satrapes du roi, des gouverneurs de chaque province et des princes de chaque peuple, à chaque province dans son écriture, à chaque peuple dans sa langue. Cela fut écrit au nom du roi Xerxès et scellé avec le cachet du roi. '
  '13':
  - type: note
    content: Cf. v. 7n,12 ; 8.11s ; 9.1. –  courriers 2Ch 30.6n.
  - type: text
    content: 'Les lettres furent envoyées par l''intermédiaire des courriers à toutes les provinces du roi : on devait détruire, tuer et faire disparaître tous les Juifs, du jeune homme au vieillard, avec leurs femmes et toutes leurs familles, en un seul jour, le treize du douzième mois – le mois d''Adar. On pouvait les piller pour en prendre du butin. '
  '14':
  - type: text
    content: 'Il y avait une copie de l''écrit pour communiquer à chaque province l''édit qui devait être rendu public parmi tous les peuples, afin qu''ils se tiennent prêts pour ce jour-là. '
  '15':
  - type: note
    content: 'à Suse 4.8 ; 8.14 ; 9.14. –  pour boire 1.3n,10. –  la ville de Suse 1.2n  ; cf. 8.15. –  était en pleine confusion  : même verbe en Ex 14.3 ; Jl 1.18 (errer en pleine confusion) ; cf. Pr 29.2.'
  - type: text
    content: Les courriers sortirent en hâte, par ordre du roi, et l'édit fut communiqué à Suse la citadelle. Le roi et Haman s'installèrent pour boire, tandis que la ville de Suse était en pleine confusion.
  '2':
  - type: note
    content: 'les gens de la cour du roi  : litt. les serviteurs du roi  ; cf. v. 3. –  porte du Roi 2.19n. –  s''agenouillaient…  : cf. Gn 41.43. –  Mardochée ne s''agenouillait…  : cf. Dn 3.12 ; 6.6-11 ; Esther grec C.5-7 (prière de Mardochée) : « Tu sais bien, Seigneur, que ce n''est ni par démesure ni par orgueil ni par ambition que j''ai fait cela : ne pas me prosterner devant Haman l''orgueilleux. Car je consentirais à lui lécher les pieds pour le salut d''Israël. Mais j''ai fait cela pour ne pas mettre la gloire d''un homme au-dessus de la gloire de Dieu ; je ne me prosternerai devant personne sauf devant toi, mon Seigneur ; et ce ne sera pas par orgueil. »'
  - type: text
    content: 'Tous les gens de la cour du roi qui étaient à la porte du Roi s''agenouillaient et se prosternaient devant Haman, comme le roi en avait spécialement donné l''ordre. Pourtant, Mardochée ne s''agenouillait ni ne se prosternait. '
  '3':
  - type: note
    content: 'passes-tu outre  : cf. 1.19n  ; voir aussi Ac 5.29.'
  - type: text
    content: 'Les gens de la cour du roi qui étaient à la porte du Roi dirent à Mardochée : Pourquoi passes-tu outre à l''ordre du roi ? '
  '4':
  - type: note
    content: 'si Mardochée… s''en tiendrait à son attitude  : litt. si les paroles de Mardochée… tiendraient.'
  - type: text
    content: 'Ils lui disaient cela chaque jour, mais il ne les écoutait pas. Ils le dirent alors à Haman, pour voir si Mardochée (qui leur avait dit qu''il était juif) s''en tiendrait à son attitude. '
  '5':
  - type: note
    content: 1.12+ ; 5.9.
  - type: text
    content: 'Quand Haman vit que Mardochée ne s''inclinait pas, qu''il ne se prosternait pas devant lui, Haman fut rempli de fureur. '
  '6':
  - type: note
    content: 'Il ne voulut pas se contenter…  : litt. il méprisa à ses yeux (ou, en modifiant légèrement la vocalisation traditionnelle, ce fut méprisable à ses yeux  ; expression analogue en 1.17) … –  détruire  : cf. v. 13 ; 4.8 ; 7.4 ; 8.11 ; autres traductions faire disparaître ; exterminer. –  tous les Juifs  : cf. Ps 83.5.'
  - type: text
    content: 'Il ne voulut pas se contenter de porter la main sur le seul Mardochée : comme on lui avait fait savoir quel était le peuple de Mardochée, Haman chercha à détruire tous les Juifs, le peuple de Mardochée, dans tout le royaume de Xerxès. '
  '7':
  - type: note
    content: 'Nisân  : mars-avril, premier mois du calendrier babylonien (cf. Ex 12.2n), où l''on tirait (litt. on faisait tomber  ; cf. 6.13n) le Pour afin de connaître le sort que les dieux avaient fixé aux hommes pour l''année (cf. 9.24-26,31 ; Lv 16.8n  ; Pr 16.33). –  sur chaque jour…  : on pourrait aussi comprendre  : de jour en jour et de mois en mois : (ce fut) le douzième, le mois d’Adar (février-mars), sous-entendu  : qui fut désigné par le sort.'
  - type: text
    content: Le premier mois (le mois de Nisân), la douzième année du roi Xerxès, devant Haman, on tira le Pour, c'est-à-dire le sort, sur chaque jour, du premier au douzième mois – le mois d'Adar.
  - type: heading
    content: Haman prépare l'extermination des Juifs
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'infiltrés ou dispersés  ; cf. Lv 26.33. –  les distinguent de tout peuple  : autre traduction sont différentes de celles de tous les peuples  ; cf. Dn 3.8-12 ; 6.6 ; Esd 4.19 ; Ac 16.20s ; voir aussi Dt 4.7 ; Esther grec B.4s : « … une espèce de peuple malveillant, opposé par ses lois à toute nation, des gens qui rejettent continuellement les ordonnances royales pour que ne s''établisse pas le gouvernement commun que nous dirigeons avec droiture et de façon irréprochable. (…) cette nation est la seule à se placer en une continuelle opposition à tout homme… elle se met à part en se conduisant selon des lois étrangères… hostile à nos affaires, elle commet les pires méfaits, et cela, afin que le royaume ne trouve pas de stabilité. » Sagesse 2.12-15 : « Traquons le juste : il nous gêne, s''oppose à nos actions… Il est devenu un reproche vivant pour nos pensées et sa seule vue nous est à charge. Car sa vie ne ressemble pas à celle des autres et sa conduite est étrange. »'
  - type: text
    content: 'Haman dit au roi Xerxès : Il y a un peuple à part. Ils sont partout, infiltrés parmi tous les peuples, dans toutes les provinces de ton royaume ; leurs lois les distinguent de tout peuple, et ils n''agissent pas selon les lois du roi : il n''est pas dans ton intérêt de les laisser en repos. '
  '9':
  - type: note
    content: 'Si cela te semble bon, ô roi  : comme en 1.19+. –  dix mille talents  : environ 340 tonnes ; voir mesures, poids et monnaies. –  les fonctionnaires du royaume  : litt. ceux qui font l''ouvrage  ; il s''agit vraisemblablement, non des gages destinés aux assassins, mais d''un dédommagement pour les coffres du roi qui ne percevront plus les impôts des Juifs ; cf. 4.7.'
  - type: text
    content: 'Si cela te semble bon, ô roi, signe leur perte, et je ferai peser dix mille talents d''argent par les fonctionnaires du royaume, pour les verser dans les coffres du roi. '
