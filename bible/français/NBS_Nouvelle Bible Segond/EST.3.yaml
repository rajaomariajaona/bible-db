      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: passes-tu outre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Ac 5.29.'
    marker-yv: yv-n
  - type: text
    text: 'Les gens de la cour du roi qui étaient à la porte du Roi dirent à Mardochée : Pourquoi passes-tu outre à l''ordre du roi ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
