    marker-yv: yv-n
  - type: text
    text: 'Le roi retira de son doigt la bague à cachet et la donna à Haman, fils de Hammedata, l''Agaguite, adversaire des Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
