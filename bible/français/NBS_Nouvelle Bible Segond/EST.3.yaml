    marker-yv: yv-n
  - type: text
    text: 'Les lettres furent envoyées par l''intermédiaire des courriers à toutes les provinces du roi : on devait détruire, tuer et faire disparaître tous les Juifs, du jeune homme au vieillard, avec leurs femmes et toutes leurs familles, en un seul jour, le treize du douzième mois – le mois d''Adar. On pouvait les piller pour en prendre du butin. '
  - type: usfm
    marker: v
