      children:
      - type: text
        text: '  : cf. Ps 83.5.'
    marker-yv: yv-n
  - type: text
    text: 'Il ne voulut pas se contenter de porter la main sur le seul Mardochée : comme on lui avait fait savoir quel était le peuple de Mardochée, Haman chercha à détruire tous les Juifs, le peuple de Mardochée, dans tout le royaume de Xerxès. '
  - type: usfm
    marker: v
