    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de jour en jour et de mois en mois : (ce fut) le douzième, le mois d’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Adar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (février-mars), sous-entendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui fut désigné par le sort.
    marker-yv: yv-n
  - type: text
    text: Le premier mois (le mois de Nisân), la douzième année du roi Xerxès, devant Haman, on tira le Pour, c'est-à-dire le sort, sur chaque jour, du premier au douzième mois – le mois d'Adar.
