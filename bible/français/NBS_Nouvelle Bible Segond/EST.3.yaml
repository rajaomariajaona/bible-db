      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si Mardochée… s'en tiendrait à son attitude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si les paroles de Mardochée… tiendraient.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui disaient cela chaque jour, mais il ne les écoutait pas. Ils le dirent alors à Haman, pour voir si Mardochée (qui leur avait dit qu''il était juif) s''en tiendrait à son attitude. '
  - type: usfm
    marker: v
