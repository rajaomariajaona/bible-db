      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit à Haman : L''argent t''est donné, ainsi que ce peuple. Fais-en ce qu''il te plaira. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
