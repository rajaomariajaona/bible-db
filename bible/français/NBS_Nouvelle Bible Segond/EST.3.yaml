    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon ce qui est bon à tes yeux
    - type: usfm
      marker: ft
      children:
