    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. Dn 3.8-12 ; 6.6 ; Esd 4.19 ; Ac 16.20s ; voir aussi Dt 4.7 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esther
      - type: text
        text: ' grec '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'B.4s : « … une espèce de peuple malveillant, opposé par ses lois à toute nation, des gens qui rejettent continuellement les ordonnances royales pour que ne s''établisse pas le gouvernement commun que nous dirigeons avec droiture et de façon irréprochable. (…) cette nation est la seule à se placer en une continuelle opposition à tout homme… elle se met à part en se conduisant selon des lois étrangères… hostile à nos affaires, elle commet les pires méfaits, et cela, afin que le royaume ne trouve pas de stabilité. » '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.12-15 : « Traquons le juste : il nous gêne, s''oppose à nos actions… Il est devenu un reproche vivant pour nos pensées et sa seule vue nous est à charge. Car sa vie ne ressemble pas à celle des autres et sa conduite est étrange. »'
    marker-yv: yv-n
  - type: text
    text: 'Haman dit au roi Xerxès : Il y a un peuple à part. Ils sont partout, infiltrés parmi tous les peuples, dans toutes les provinces de ton royaume ; leurs lois les distinguent de tout peuple, et ils n''agissent pas selon les lois du roi : il n''est pas dans ton intérêt de les laisser en repos. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si cela te semble bon, ô roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme en 1.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dix mille talents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 340 tonnes ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les fonctionnaires du royaume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux qui font l'ouvrage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agit vraisemblablement, non des gages destinés aux assassins, mais d''un dédommagement pour '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les coffres du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui ne percevront plus les impôts des Juifs ; cf. 4.7.
    marker-yv: yv-n
  - type: text
    text: 'Si cela te semble bon, ô roi, signe leur perte, et je ferai peser dix mille talents d''argent par les fonctionnaires du royaume, pour les verser dans les coffres du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
