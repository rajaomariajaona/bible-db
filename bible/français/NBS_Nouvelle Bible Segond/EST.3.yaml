      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y avait une copie de l''écrit pour communiquer à chaque province l''édit qui devait être rendu public parmi tous les peuples, afin qu''ils se tiennent prêts pour ce jour-là. '
