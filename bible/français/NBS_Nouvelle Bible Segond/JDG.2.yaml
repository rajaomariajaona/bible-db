      - type: text
        text: '2.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 20.23 ; 21.2 ; Nb 11.4 ; 14.1 ; 1S 11.4 ; Esd 10.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit à sangloter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'élevèrent la voix et pleurèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 4).
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le messager du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' eut dit ces paroles à tous les Israélites, le peuple se mit à sangloter. '
