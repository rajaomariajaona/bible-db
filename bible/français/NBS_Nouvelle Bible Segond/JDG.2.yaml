document_id: JDG.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches du Seigneur à son peuple
  - type: text
    content: ' '
  - type: note
    content: 'Le messager (ou l''ange ) du Seigneur  : cf. 5.23 ; 6.11 ; Gn 16.7,13 ; Ex 23.20ss ; 32.34 ; 33.2. –  du Guilgal 3.19n  ; Jos 4.19n. –  Bokim v. 4s ; nom voisin de celui du Chêne-des-Pleurs en Gn 35.8 ; LXX à Béthel (ou Beth-El ). –  monter d''Egypte 6.13 ; 19.30 ; Gn 12.10n  ; Ex 33.1 ; Lv 11.45 ; Jr 2.6 ; Os 12.14 ; Am 2.10 ; Ps 81.11. –  dans le pays que j''avais promis Dt 26.3 ; 34.4 ; Jos 1.6. –  mon alliance  : cf. Gn 17.7 ; Lv 26.44 ; Jr 14.21 ; 33.20s ; Ps 89.35 ; voir aussi Dt 29.11-14.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' monta du Guilgal à Bokim et dit : Je vous ai fait monter d''Egypte et je vous ai fait entrer dans le pays que j''avais promis par serment à vos pères. J''ai dit : « Jamais je ne romprai mon alliance avec vous. '
  '10':
  - type: note
    content: 'Dt 11.2-7. –  ses pères  : cf. Gn 25.8n  ; Ac 13.36.'
  - type: text
    content: 'Toute cette génération fut, elle aussi, réunie à ses pères, et il se leva après elle une autre génération, qui ne connaissait pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ni l''œuvre qu''il avait accomplie pour Israël.'
  - type: heading
    content: Infidélité, détresse, délivrance
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'firent alors ce qui déplaisait 3.12 ; 4.1 ; 6.1 ; 10.6 ; 13.1 ; cf. 8.33-35 ; Dt 4.25+ ; 2R 13.2-5 ; Né 9.28. –  Seigneur (YHWH)  : voir noms divins. –  les Baals  : le pluriel évoque sans doute les diverses formes que revêtait selon les régions le culte du Baal (= Seigneur ), dieu de l''orage et de la fertilité, ou la multiplicité de ses représentations (cf. v. 13n).'
  - type: text
    content: 'Les Israélites firent alors ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; ils se mirent à servir les Baals. '
  '12':
  - type: note
    content: 'abandonnèrent  : cf. Jr 2.13+. –  suivre d''autres dieux Dt 6.14ns ; cf. 29.24-26 ; 1R 9.9 ; 2Ch 7.22.'
  - type: text
    content: 'Ils abandonnèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de leurs pères, qui les avait fait sortir d''Egypte, et ils se mirent à suivre d''autres dieux, d''entre les dieux des peuples qui les entouraient ; ils se prosternèrent devant eux et ils contrarièrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '13':
  - type: note
    content: 'les Astartés  : probablement les divers cultes ou représentations d''Astarté, déesse de l''amour et de la fécondité, sans doute associée au Baal comme parèdre ou compagne ; la vocalisation traditionnelle de son nom dans le texte hébreu (Ashtoreth) évoque, par mépris, le mot qui signifie honte  ; cf. 3.7n  ; 8.33 ; 10.6,10 ; 1S 12.10.'
  - type: text
    content: 'Ils abandonnèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et se mirent à servir le Baal et les Astartés.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: colère v. 20 ; Nb 25.3 ; Dt 7.4 ; Jos 22.20 ; 2S 24.1 ; Es 5.25 ; Jr 4.8 ; Ep 5.6. –  il les vendit 3.8 ; 4.2,9 ; 10.7 ; Dt 32.30 ; 1S 12.9 ; Es 50.1 ; 52.3 ; Ps 44.13.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Israël. Il les livra à des pillards qui les pillèrent, il les vendit aux ennemis qui les entouraient : ils ne purent plus tenir devant leurs ennemis. '
  '15':
  - type: note
    content: 'ils se mettaient en campagne  : litt. ils sortaient. –  comme le Seigneur l''avait dit  : cf. Dt 28.15-46. –  grande détresse 10.9.'
  - type: text
    content: 'Chaque fois qu''ils se mettaient en campagne, la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était contre eux pour leur malheur, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le leur avait juré. Ils furent ainsi dans une grande détresse. '
  '16':
  - type: note
    content: 'des juges  : le terme représente ici un pouvoir civil beaucoup plus large que la simple fonction judiciaire (voir introduction) ; cf. 1S 7.6+ ; 2S 7.11 ; 2R 23.22 ; Rt 1.1n  ; Ac 13.20. –  qui les sauvèrent  : cf. 3.9n,15,31 ; 6.36s ; 7.7 ; 10.13 ; voir aussi 1S 12.11 ; 2R 13.5 ; Es 19.20 ; Mi 3.11 ; Né 9.27.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' suscita des juges qui les sauvèrent de la main de ceux qui les pillaient. '
  '17':
  - type: note
    content: 'ils ne les écoutèrent pas  : autre traduction ils ne leur obéirent pas  ; v. 2+. –  ils se prostituèrent… 8.33 ; Dt 31.16 ; Os 1.2n. –  la voie qu''avaient suivie leurs pères Jr 6.16. –  commandements  : voir loi.'
  - type: text
    content: 'Mais même leurs juges, ils ne les écoutèrent pas : ils se prostituèrent avec d''autres dieux et se prosternèrent devant eux. Ils se détournèrent bien vite de la voie qu''avaient suivie leurs pères, qui écoutaient les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils n''agirent pas ainsi. '
  '18':
  - type: note
    content: avait du regret 21.6,15 ; Ex 32.12,14 ; cf. Nb 23.19+ ; autre traduction avait pitié de leurs soupirs… (cf. Dt 32.36).
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur suscitait des juges, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec le juge et les délivrait de la main de leurs ennemis pendant tous les jours du juge ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait du regret, à cause de leurs soupirs devant ceux qui les opprimaient et les tourmentaient. '
  '19':
  - type: note
    content: 'd''autres dieux 3.6+. –  ils ne laissaient rien  : litt. ils ne faisaient (rien) tomber. –  agissements Jr 4.4+. –  leur obstination  : litt. leur voie dure  ; la dureté évoque souvent l''obstination (voir cœur).'
  - type: text
    content: Mais, à la mort du juge, ils recommençaient à se pervertir, plus que leurs pères, en se mettant à suivre d'autres dieux pour les servir et se prosterner devant eux ; ils ne laissaient rien de leurs agissements et de leur obstination.
  - type: heading
    content: Dieu met Israël à l'épreuve
  '2':
  - type: note
    content: Ex 23.32s ; 34.12s ; Dt 7.2,5 ; 12.3. –  vous ne m'avez pas écouté v. 17 ; 6.10 ; Dt 1.43 ; Es 66.4 ; Jr 13.11.
  - type: text
    content: 'Quant à vous, vous ne conclurez pas d''alliance pour les habitants de ce pays, vous démolirez leurs autels. » Mais vous ne m''avez pas écouté. Pourquoi avez-vous fait cela ? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: colère v. 14+. –  passé outre à mon alliance Dt 17.2+ ; Jos 7.11 ; 2R 18.12 ; Os 6.7. –  alliance que j'avais instituée Jos 7.11+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Israël ; il dit : Puisque cette nation a passé outre à mon alliance, l''alliance que j''avais instituée pour ses pères, et qu''ils ne m''ont pas écouté, '
  '21':
  - type: note
    content: V. 3+.
  - type: text
    content: 'moi, je ne déposséderai plus devant eux aucune des nations que Josué a laissées quand il est mort, '
  '22':
  - type: note
    content: 'épreuve  : cf. Ex 15.25 ; 16.4 ; 20.20 ; Dt 8.2 ; Es 48.10 ; Jr 9.6 ; Ps 81.8. –  pour voir…  : litt. garderont-ils la voie du Seigneur pour marcher en eux (ses commandements ? certains mss hébreux et des versions anciennes ont le singulier qui se rapporte à voie) comme leurs pères ont gardé, ou non ? Cf. Dt 8.2,6.'
  - type: text
    content: 'afin de mettre par elles Israël à l''épreuve, pour voir s''ils veilleront ou non à suivre la voie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme leurs pères y ont veillé. '
  '23':
  - type: text
    content: 'Ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' laissa ces nations en repos, il ne se hâta pas de les déposséder. Il ne les livra pas à Josué.'
  '3':
  - type: note
    content: 'V. 21-23 ; 3.1,4 ; cf. 8.27 ; Dt 4.38 ; 7.16 ; Jos 23.13. –  à vos côtés  : le même terme est traduit par flancs en Jos 23.13 ; beaucoup croient qu''il s''agit ici d''un homonyme et comprennent ils seront un piège pour vous (autre terme, dans ce cas synonyme, à la fin du v.) ; d''autres modifient le texte hébreu traditionnel pour lire ils seront des adversaires pour vous.'
  - type: text
    content: 'J''ai dit alors : « Je ne les chasserai pas devant vous ; ils seront à vos côtés, et leurs dieux seront un piège pour vous. » '
  '4':
  - type: note
    content: 'Cf. 20.23 ; 21.2 ; Nb 11.4 ; 14.1 ; 1S 11.4 ; Esd 10.1. –  se mit à sangloter  : litt. élevèrent la voix et pleurèrent (cf. v. 4).'
  - type: text
    content: 'Lorsque le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' eut dit ces paroles à tous les Israélites, le peuple se mit à sangloter. '
  '5':
  - type: note
    content: 'Bokim v. 1n. –  sacrifices  : cf. Nb 18.12 ; 1S 1.21 ; 2Ch 1.6.'
  - type: text
    content: 'Ils appelèrent ce lieu du nom de Bokim (« les Pleureurs ») et ils offrirent là des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: La mort de Josué
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jos 24.28.
  - type: text
    content: 'Josué renvoya le peuple, et les Israélites s''en allèrent chacun dans son patrimoine, pour prendre possession du pays. '
  '7':
  - type: note
    content: 'Jos 24.31. –  servit…  : autre traduction rendit un culte au Seigneur  ; cf. v. 11 ; Jos 24.29. –  qui survécurent à  : litt. qui prolongèrent (leurs) jours après.'
  - type: text
    content: 'Le peuple servit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant tous les jours de Josué et tous les jours des anciens qui survécurent à Josué, ceux qui avaient vu toute la grande œuvre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait accomplie pour Israël. '
  '8':
  - type: text
    content: 'Josué, fils de Noun, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mourut à l''âge de cent dix ans. '
  '9':
  - type: note
    content: 'Jos 19.50 ; 24.30. –  le territoire…  : litt. le territoire (ou la frontière, la limite) de son patrimoine.'
  - type: text
    content: 'On l''ensevelit dans le territoire qui constituait son patrimoine, à Timnath-Hérès, dans la région montagneuse d''Ephraïm, au nord du mont Gaash. '
