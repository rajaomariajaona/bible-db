  - type: text
    text: 'Le messager du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' monta du Guilgal à Bokim et dit : Je vous ai fait monter d''Egypte et je vous ai fait entrer dans le pays que j''avais promis par serment à vos pères. J''ai dit : « Jamais je ne romprai mon alliance avec vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 23.32s ; 34.12s ; Dt 7.2,5 ; 12.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous ne m''avez pas écouté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 17 ; 6.10 ; Dt 1.43 ; Es 66.4 ; Jr 13.11.
    marker-yv: yv-n
  - type: text
    text: 'Quant à vous, vous ne conclurez pas d''alliance pour les habitants de ce pays, vous démolirez leurs autels. » Mais vous ne m''avez pas écouté. Pourquoi avez-vous fait cela ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 21-23 ; 3.1,4 ; cf. 8.27 ; Dt 4.38 ; 7.16 ; Jos 23.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à vos côtés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'flancs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Jos 23.13 ; beaucoup croient qu''il s''agit ici d''un homonyme et comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils seront un piège pour vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre terme, dans ce cas synonyme, à la fin du v.) ; d''autres modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils seront des adversaires pour vous.
    marker-yv: yv-n
  - type: text
    text: 'J''ai dit alors : « Je ne les chasserai pas devant vous ; ils seront à vos côtés, et leurs dieux seront un piège pour vous. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
