    marker-yv: yv-n
  - type: text
    text: 'Les Israélites firent alors ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) ; ils se mirent à servir les Baals. '
