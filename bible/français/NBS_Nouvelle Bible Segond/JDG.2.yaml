    text: 'Mais même leurs juges, ils ne les écoutèrent pas : ils se prostituèrent avec d''autres dieux et se prosternèrent devant eux. Ils se détournèrent bien vite de la voie qu''avaient suivie leurs pères, qui écoutaient les commandements du '
