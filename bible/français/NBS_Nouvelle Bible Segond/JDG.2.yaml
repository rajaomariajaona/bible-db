    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.33 ; 10.6,10 ; 1S 12.10.'
