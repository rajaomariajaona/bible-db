  - type: text
    text: ' (YHWH), le Dieu de leurs pères, qui les avait fait sortir d''Egypte, et ils se mirent à suivre d''autres dieux, d''entre les dieux des peuples qui les entouraient ; ils se prosternèrent devant eux et ils contrarièrent le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
