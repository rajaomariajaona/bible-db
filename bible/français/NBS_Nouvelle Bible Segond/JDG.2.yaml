  - type: text
    text: 'Le peuple servit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pendant tous les jours de Josué et tous les jours des anciens qui survécurent à Josué, ceux qui avaient vu toute la grande œuvre que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait accomplie pour Israël. '
  - type: usfm
