      children:
      - type: text
        text: le territoire…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le territoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la frontière, la limite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de son patrimoine.
    marker-yv: yv-n
  - type: text
    text: 'On l''ensevelit dans le territoire qui constituait son patrimoine, à Timnath-Hérès, dans la région montagneuse d''Ephraïm, au nord du mont Gaash. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 11.2-7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses pères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 25.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 13.36.'
    marker-yv: yv-n
  - type: text
    text: 'Toute cette génération fut, elle aussi, réunie à ses pères, et il se leva après elle une autre génération, qui ne connaissait pas le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ni l''œuvre qu''il avait accomplie pour Israël.'
- type: usfm
  marker: s1
  children:
