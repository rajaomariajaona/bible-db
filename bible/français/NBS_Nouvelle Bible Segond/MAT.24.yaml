    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2Th 2.3-10 ; 2Tm 3.1-5 ; Ap 2.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se répandra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
