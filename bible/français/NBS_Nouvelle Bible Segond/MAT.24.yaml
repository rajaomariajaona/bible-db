        text: ', cf. 11.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Didachè
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.3ss : « Aux derniers jours, les faux prophètes et les corrupteurs se multiplieront, les brebis se transformeront en loups et l''amour se transformera en haine. L''impiété (ou : le mal) progressant en effet, les hommes se haïront, se persécuteront et se trahiront les uns les autres et le séducteur du monde (ou : celui qui égare le monde) apparaîtra alors comme Fils de Dieu ; il fera des signes et des prodiges, la terre sera livrée entre ses mains et il fera des iniquités qui ne se sont jamais produites depuis le commencement des siècles. Alors toute créature humaine en viendra au feu de l''épreuve, beaucoup seront scandalisés (ou : trébucheront) et périront ; mais ceux qui demeureront dans leur foi seront sauvés par celui qui est malédiction. »'
    marker-yv: yv-n
  - type: text
    text: 'Ce sera pour beaucoup une cause de chute ; ils se livreront, ils se détesteront les uns les autres. '
  - type: usfm
