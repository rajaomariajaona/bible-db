      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 8.22 ; Ga 4.19,27 ; 1Th 5.3 ; Ap 12.2.'
    marker-yv: yv-n
  - type: text
