        text: '24.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dn 2.28s,45 ; Ap 1.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous allez entendre parler…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 51.46 ; voir aussi Dn 11.20,25,44 ; Ap 6.3s ; 9.9 ; 12.7 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esdras
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.30-32 : « Un égarement d''esprit viendra sur eux ; ils songeront à se faire la guerre, cité contre cité, pays contre pays, nation contre nation, royaume contre royaume. Et lorsque ces événements arriveront, lorsque se produiront les signes que je t''ai montrés auparavant, alors sera révélé mon Fils. » – Ici et au v. 14 le mot traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: n'est pas le même qu'au v. 3 ; cf. 2Th 2.2.
    marker-yv: yv-n
  - type: text
    text: 'Vous allez entendre parler de guerres et de rumeurs de guerres : gardez-vous de vous alarmer ; car cela doit arriver, mais ce n''est pas encore la fin. '
  - type: usfm
