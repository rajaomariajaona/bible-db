        text: 'bonne nouvelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: terre habitée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot grec correspondant a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: œcuménique
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il désigne l''ensemble du monde habité, l''humanité (voir aussi son emploi en Lc 2.1). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour toutes les nations '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour tous les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
    - type: usfm
      marker: ft
