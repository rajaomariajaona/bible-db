    marker-yv: yv-n
  - type: text
    text: 'Car nation se dressera contre nation et royaume contre royaume ; dans divers lieux il y aura des famines et des tremblements de terre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
