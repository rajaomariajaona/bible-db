        text: '16.6ss : « Et alors les signes de la vérité apparaîtront : premièrement le signe de l''extension dans le ciel (traditionnellement interprété comme le signe de la croix embrassant le monde), puis le signe de la trompette retentissante, et, troisième signe, la résurrection des morts, non de tous, comme il a été dit : “Le Seigneur viendra et tous les saints avec lui.” Alors le monde verra le Seigneur venir sur les nuées du ciel. » –  '
