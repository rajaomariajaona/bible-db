      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.15 ; 2P 2.1 ; 1Jn 4.1 ; Ap 16.13 ; voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Beaucoup de prophètes de mensonge se lèveront et égareront une multitude de gens. '
  - type: usfm
    marker: v
