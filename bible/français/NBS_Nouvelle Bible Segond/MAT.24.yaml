      - type: text
        text: '  ; cf. v. 9 ; 4.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.32 ; 28.19+ ; voir aussi Ap 14.6.'
    marker-yv: yv-n
  - type: text
    text: Cette bonne nouvelle du Règne sera proclamée par toute la terre habitée ; ce sera un témoignage pour toutes les nations. Alors viendra la fin.
