document_id: MAT.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus annonce la destruction du temple
  - type: heading
    content: Mc 13.1-4  ; Lc 21.5-7
  - type: text
    content: ' '
  - type: note
    content: Voir Mc 13.1n  ; Jn 2.20n  ; voir aussi temple.
  - type: text
    content: 'Comme Jésus s''en allait, au sortir du temple, ses disciples vinrent lui en faire remarquer les constructions. '
  '10':
  - type: note
    content: 'Ce sera…  : litt. alors beaucoup trébucheront, cf. 11.6n. –  Didachè 16.3ss : « Aux derniers jours, les faux prophètes et les corrupteurs se multiplieront, les brebis se transformeront en loups et l''amour se transformera en haine. L''impiété (ou : le mal) progressant en effet, les hommes se haïront, se persécuteront et se trahiront les uns les autres et le séducteur du monde (ou : celui qui égare le monde) apparaîtra alors comme Fils de Dieu ; il fera des signes et des prodiges, la terre sera livrée entre ses mains et il fera des iniquités qui ne se sont jamais produites depuis le commencement des siècles. Alors toute créature humaine en viendra au feu de l''épreuve, beaucoup seront scandalisés (ou : trébucheront) et périront ; mais ceux qui demeureront dans leur foi seront sauvés par celui qui est malédiction. »'
  - type: text
    content: 'Ce sera pour beaucoup une cause de chute ; ils se livreront, ils se détesteront les uns les autres. '
  '11':
  - type: note
    content: V. 4+,5n  ; 7.15 ; 2P 2.1 ; 1Jn 4.1 ; Ap 16.13 ; voir prophètes.
  - type: text
    content: 'Beaucoup de prophètes de mensonge se lèveront et égareront une multitude de gens. '
  '12':
  - type: note
    content: '2Th 2.3-10 ; 2Tm 3.1-5 ; Ap 2.4. –  mal 7.23n. –  se répandra  : autre traduction se multipliera.'
  - type: text
    content: 'Parce que le mal se répandra, l''amour de la multitude se refroidira. '
  '13':
  - type: note
    content: 10.22+.
  - type: text
    content: 'Mais celui qui persévérera jusqu''à la fin sera sauvé. '
  '14':
  - type: note
    content: 'bonne nouvelle 4.23+. –  terre habitée  : le mot grec correspondant a donné notre mot œcuménique  ; il désigne l''ensemble du monde habité, l''humanité (voir aussi son emploi en Lc 2.1). –  témoignage 8.4+. –  pour toutes les nations ou pour tous les non-Juifs  ; cf. v. 9 ; 4.15n  ; 25.32 ; 28.19+ ; voir aussi Ap 14.6.'
  - type: text
    content: Cette bonne nouvelle du Règne sera proclamée par toute la terre habitée ; ce sera un témoignage pour toutes les nations. Alors viendra la fin.
  - type: heading
    content: Une grande détresse
  - type: heading
    content: Mc 13.14-23  ; Lc 21.20-24
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'l''abomination (ou l''horreur ) dévastatrice (traduction traditionnelle l''abomination de la désolation ) ; l''expression pourrait aussi signifier l''abominable dévastateur  ; mais ici, contrairement à Mc 13.14n, la suite est au neutre ; voir Dn 9.27 ; 11.31 ; 12.11  ; cf. 1 Maccabées 1.54 : « Le roi construisit l''abomination de la dévastation (l''autel dédié au Zeus olympien) sur l''autel. » Voir pur, impur. –  un lieu sacré ou saint , en l''occurrence le temple de Jérusalem ; cf. Ez 42.13 ; Ac 6.13 ; 21.28 ; 2Th 2.4.'
  - type: text
    content: 'C''est pourquoi, lorsque vous verrez '
  - type: text
    content: l'abomination dévastatrice,
  - type: text
    content: ' qui a été annoncée par l''entremise du prophète Daniel, installée dans un lieu sacré – que le lecteur comprenne – '
  '16':
  - type: note
    content: 'Ez 7.15s. Cf. Gn 19.17 ; 1 Maccabées 2.28 : « Lui-même (le prêtre Mattathias) et ses fils s''enfuirent dans les montagnes, abandonnant tout ce qu''ils possédaient dans la ville. »'
  - type: text
    content: 'alors, que ceux qui seront en Judée fuient dans les montagnes ; '
  '17':
  - type: note
    content: 'le toit en terrasse  : on peut en descendre par un escalier extérieur, sans rentrer dans la maison (cf. Mc 2.4 ; Lc 17.31).'
  - type: text
    content: 'que celui qui sera sur le toit en terrasse n''en descende pas pour prendre ce qui est chez lui, '
  '18':
  - type: note
    content: 'ne s''en retourne pas  : litt. ne retourne pas en arrière (le même terme est traduit derrière en 3.11n).'
  - type: text
    content: 'et que celui qui sera aux champs ne s''en retourne pas pour prendre son vêtement. '
  '19':
  - type: note
    content: Lc 23.29 ; 1Co 7.26-28. –  malheur 11.21n.
  - type: text
    content: Quel malheur pour les femmes enceintes et pour celles qui allaiteront en ces jours-là !
  '2':
  - type: note
    content: Jr 7.14 ; Lc 19.44 ; Ac 6.14. –  Amen 5.18n.
  - type: text
    content: 'Mais il leur répondit : Vous voyez tout cela ? '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il ne restera pas ici pierre sur pierre qui ne soit renversée.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: sabbat Ex 16.29 ; cf. Ac 1.12n.
  - type: text
    content: 'Priez pour que votre fuite n''arrive pas en hiver, ni un jour de sabbat. '
  '21':
  - type: note
    content: détresse v. 9+,29 ; Jl 2.2 ; Dn 12.1 ; Ap 7.14.
  - type: text
    content: 'Car alors il y aura une grande détresse, telle qu''il n''y en a pas eu depuis le commencement du monde jusqu''à maintenant, et qu''il n''y en aura jamais plus. '
  '22':
  - type: note
    content: 'personne…  : litt. toute chair ne serait pas sauvée, c.-à-d. aucune chair ne serait sauvée. –  ceux qui ont été choisis v. 24,31 ; 22.14n  ; Lc 18.7 ; 2Tm 2.10. Cf. Es 65.8.'
  - type: text
    content: Si ces jours-là n'étaient abrégés, personne ne serait sauvé, mais à cause de ceux qui ont été choisis ces jours-là seront abrégés.
  '23':
  - type: text
    content: ' '
  - type: note
    content: V. 5,26 ; Lc 17.21,23.
  - type: text
    content: 'Si alors quelqu''un vous dit : « Le Christ est ici ! » ou : « Il est là ! », ne le croyez pas. '
  '24':
  - type: note
    content: 'V. 11+ ; 1Jn 2.18. –  des christs…  : autres traductions de faux christs et de faux prophètes  ; des pseudo-christs et des pseudo-prophètes. –  ils donneront…  : cf. 12.39 ; 16.4 ; 26.48. –  signes / prodiges Dt 13.2-6 ; 2Th 2.9 ; Ap 13.13.'
  - type: text
    content: 'Car des christs de mensonge et des prophètes de mensonge se lèveront ; ils donneront de grands signes et des prodiges de façon à égarer, si possible, même ceux qui ont été choisis. '
  '25':
  - type: note
    content: Mc 13.23n  ; Jn 13.19 ; 2P 3.17.
  - type: text
    content: Je vous ai prévenus.
  - type: heading
    content: Lc 17.23-24,37
  '26':
  - type: text
    content: ' '
  - type: note
    content: V. 23 ; cf. Ac 21.38. –  les pièces les plus retirées 6.6n.
  - type: text
    content: 'Si donc on vous dit : « Il est dans le désert ! », n''y allez pas. – « Il est dans les pièces les plus retirées ! », ne le croyez pas. '
  '27':
  - type: note
    content: 'se voit  : le même verbe est traduit par paraître au v. 30. –  avènement v. 3n,37 ; cf. Za 9.14. –  Fils de l''homme 8.20n.'
  - type: text
    content: 'En effet, comme l''éclair qui jaillit au levant se voit jusqu''au couchant, ainsi sera l''avènement du Fils de l''homme. '
  '28':
  - type: note
    content: 'C.-à-d., selon toute vraisemblance : l''apparition du Messie sera immédiatement perceptible à tous ceux qu''elle concerne (cf. Lc 17.37). –  les vautours  : le terme grec est généralement traduit par aigle(s) (Ap 4.7 ; 8.13 ; 12.14), mais il correspond à un terme hébreu qui peut désigner les deux espèces d''oiseaux ; l''image ici correspond mieux au charognard qu''est le vautour ; toutefois il pourrait y avoir aussi une allusion secondaire aux emblèmes d''aigles qui précédaient les légions romaines ; cf. Jb 39.27n,30 ; voir aussi Es 18.6 ; 34.15s ; Jr 7.33 ; 12.9 ; 15.3 ; Ez 39.17 ; Ha 1.8 ; Ap 19.17s.'
  - type: text
    content: Où que soit le cadavre, là se rassembleront les vautours.
  - type: heading
    content: Le signe du Fils de l'homme
  - type: heading
    content: Mc 13.24-27  ; Lc 21.25-31
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Es 13.10 ; 34.4  ; Ez 32.7 ; Jl 2.10 ; 3.4 ; 4.15 ; Hé 12.26s ; 2P 3.10 ; Ap 6.12-14. –  ces jours…  : litt. la détresse de ces jours-là  ; v. 9+,21 ; Mc 13.24.'
  - type: text
    content: Aussitôt après ces jours de détresse,
  - type: text
    content: le soleil s'obscurcira,
  - type: text
    content: la lune ne donnera plus sa clarté,
  - type: text
    content: les étoiles tomberont
  - type: text
    content: ' du ciel'
  - type: text
    content: 'et '
  - type: text
    content: les puissances des cieux
  - type: text
    content: ' seront ébranlées.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'mont des Oliviers 21.1+. –  en privé 17.19 ; Mc 4.34. –  quand Ac 1.6. –  avènement  : le mot grec parousia , qui apparaît 21 fois dans le N.T., signifie présence ou venue  ; il désigne en particulier l''arrivée officielle d''un personnage important (1Co 15.23 ; 1Th 2.19+ ; Jc 5.7s). –  signe v. 30. –  fin du monde 13.39n.'
  - type: text
    content: 'Comme il était assis sur le mont des Oliviers, les disciples vinrent lui demander, en privé : Dis-nous, quand cela arrivera-t-il ? Quel sera le signe de ton avènement et de la fin du monde ?'
  - type: heading
    content: Les signes annonciateurs de la fin
  - type: heading
    content: Mc 13.5-13  ; Lc 21.8-19
  '30':
  - type: text
    content: ' '
  - type: note
    content: '10.23+ ; 26.64/ / ; Didachè 16.6ss : « Et alors les signes de la vérité apparaîtront : premièrement le signe de l''extension dans le ciel (traditionnellement interprété comme le signe de la croix embrassant le monde), puis le signe de la trompette retentissante, et, troisième signe, la résurrection des morts, non de tous, comme il a été dit : “Le Seigneur viendra et tous les saints avec lui.” Alors le monde verra le Seigneur venir sur les nuées du ciel. » –  signe 24.3 ; même terme, dans le sens de bannière , en Es 18.3 (LXX). –  se lamenteront… 11.17n  ; Za 12.10,12,14 ; Ap 1.7. –  Fils de l''homme / nuées Dn 7.13 . –  gloire 16.27+.'
  - type: text
    content: 'Alors le signe du Fils de l''homme paraîtra dans le ciel, toutes les tribus de la terre se lamenteront, et elles verront '
  - type: text
    content: le Fils de l'homme venant sur les nuées du ciel
  - type: text
    content: ' avec beaucoup de puissance et de gloire. '
  '31':
  - type: note
    content: 'anges 13.41+ ; 16.27. –  grande trompette  : cf. Es 18.3 (même terme dans LXX) ; 27.13 ; 1Co 15.52 ; 1Th 4.16 ; Ap 8.2. –  des quatre vents, c.-à-d. des quatre points cardinaux ; cf. Ez 37.9ss ; Za 2.10 ; Ap 7.1ss. –  extrémité… Dt 30.4 ; Né 1.9. –  ceux qu''il a choisis  : litt. ses choisis ou ses élus, v. 22+.'
  - type: text
    content: Il enverra ses anges avec une grande trompette, et ils rassembleront des quatre vents, depuis une extrémité des cieux jusqu'à l'autre, ceux qu'il a choisis.
  - type: heading
    content: La parabole du figuier
  - type: heading
    content: Mc 13.28-32  ; Lc 21.29-33
  '32':
  - type: text
    content: ' '
  - type: note
    content: '21.19. –  deviennent tendres  : c.-à-d. bourgeonnent.'
  - type: text
    content: 'Laissez-vous instruire par la parabole tirée du figuier. Dès que ses branches deviennent tendres et que les feuilles poussent, vous savez que l''été est proche. '
  '33':
  - type: note
    content: 'il est proche  : le Fils de l''homme ou, plus généralement, l''événement. –  aux portes (de la ville ?) Jc 5.9 ; Ap 3.20.'
  - type: text
    content: 'De même, vous aussi, quand vous verrez tout cela, sachez qu''il est proche, aux portes. '
  '34':
  - type: note
    content: Cf. 10.23 ; 16.28. –  génération 12.36+ ; 17.17 ; 23.36. –  ne passera pas ou ne passera jamais, 5.18n.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, cette génération ne passera pas que tout cela n''arrive.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 5.18 ; cf. Es 40.8 ; 51.6.
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront pas.
  - type: heading
    content: Personne ne connaît le jour ni l'heure
  '36':
  - type: text
    content: ' '
  - type: note
    content: V. 42,44,50 ; 25.13 ; Za 14.7 ; Ac 1.7 ; 1Th 5.1s ; voir aussi anges et Fils.
  - type: text
    content: Pour ce qui est du jour et de l'heure, personne ne les connaît, ni les anges des cieux, ni le Fils, mais le Père seul.
  - type: heading
    content: Lc 17.26-36
  '37':
  - type: text
    content: ' '
  - type: note
    content: jours de Noé Gn 6.11-13 ; Es 54.9. –  avènement v. 3n,27.
  - type: text
    content: 'En effet, comme ont été les jours de Noé, ainsi sera l''avènement du Fils de l''homme. '
  '38':
  - type: note
    content: Gn 7.7 ; 2P 2.5 ; 3.5s.
  - type: text
    content: 'En effet, aux jours qui précédèrent le déluge, les gens mangeaient et buvaient, se mariaient et mariaient leurs enfants, jusqu''au jour où Noé entra dans l''arche ; '
  '39':
  - type: note
    content: Gn 7.23 ; cf. Jb 22.15s. –  avènement v. 3n.
  - type: text
    content: 'et ils ne se doutèrent de rien jusqu''à ce que le déluge vienne et les emporte tous ; il en sera de même à l''avènement du Fils de l''homme. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'égare  : cf. v. 5,11,24 ; 22.29 ; Jr 14.14.'
  - type: text
    content: 'Jésus leur répondit : Prenez garde que personne ne vous égare. '
  '40':
  - type: note
    content: Cf. Lc 17.34s ; 2P 2.9. –  pris pour le salut et laissé pour le jugement, ou le contraire ; cf. 13.41ss ; 1Th 4.17.
  - type: text
    content: 'Alors, de deux hommes qui seront aux champs, l''un sera pris et l''autre laissé ; '
  '41':
  - type: text
    content: de deux femmes qui moudront à la meule, l'une sera prise et l'autre laissée.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'V. 36+. –  Veillez 25.13 ; 1Th 5.6. –  viendra  : litt. vient , de même au v. 44. Cf. Mc 13.35.'
  - type: text
    content: Veillez donc, puisque vous ne savez pas quel jour votre Seigneur viendra.
  '43':
  - type: text
    content: ' '
  - type: note
    content: fracture 6.19ns ; Lc 12.39-46 ; 1Th 5.2 ; 2P 3.10 ; Ap 3.3 ; 16.15.
  - type: text
    content: 'Sachez-le bien, si le maître de maison savait à quelle veille de la nuit le voleur doit venir, il veillerait et ne permettrait pas qu''on fracture sa maison. '
  '44':
  - type: note
    content: V. 42n  ; 2P 3.14. –  prêts 25.10.
  - type: text
    content: C'est pourquoi, vous aussi, soyez prêts, car le Fils de l'homme viendra à l'heure que vous ne pensez pas.
  - type: heading
    content: La parabole de l'esclave digne de confiance
  - type: heading
    content: Lc 12.42-46
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'esclave  : autre traduction serviteur , même possibilité dans la suite (21.34n). –  avisé 7.24n  ; 25.2ss. –  digne de confiance ou fidèle (23.23n) ; de même 25.21,23. –  maître ou Seigneur 12.8n. –  nommé responsable de  : litt. institué sur , de même v. 48 ; cf. Gn 39.4-6. –  nourriture / temps  : cf. Ps 104.27 ; 145.15.'
  - type: text
    content: 'Quel est donc l''esclave avisé et digne de confiance que le maître a nommé responsable de ses domestiques, pour leur donner la nourriture en temps voulu ? '
  '46':
  - type: note
    content: 'Cf. 2Tm 4.6-8. –  occupé de la sorte  : litt. faisant ainsi.'
  - type: text
    content: 'Heureux cet esclave, celui que son maître, à son arrivée, trouvera occupé de la sorte ! '
  '47':
  - type: note
    content: V. 45n  ; 25.21,23.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il le nommera responsable de tous ses biens. '
  '48':
  - type: note
    content: 'Litt. si ce mauvais esclave dit en son cœur : mon maître (ou Seigneur) tarde…  ; cf. 25.5,19 ; 2P 3.3s.'
  - type: text
    content: 'Mais si c''est un mauvais esclave qui se dit : « Mon maître tarde à venir », '
  '49':
  - type: note
    content: compagnons d'esclavage 18.28nss.
  - type: text
    content: 'qu''il commence à battre ses compagnons d''esclavage, qu''il mange et boive avec les ivrognes, '
  '5':
  - type: note
    content: en se servant de mon nom ou en mon nom  ; même formule 18.5. –  le Christ v. 23 ; 1.16n. –  beaucoup et une multitude de gens traduisent le même mot grec. De même v. 11.
  - type: text
    content: 'Beaucoup, en effet, viendront en se servant de mon nom, en disant : « C''est moi qui suis le Christ ! », et ils égareront une multitude de gens. '
  '50':
  - type: note
    content: 24.36+.
  - type: text
    content: 'le maître de cet esclave viendra le jour où il ne s''y attend pas et à l''heure qu''il ne connaît pas, '
  '51':
  - type: note
    content: 'le mettra en pièces  : litt. le coupera en deux  ; dans le N.T., le verbe grec correspondant n''apparaît qu''ici et en Lc 12.46 ; certains le rapprochent de formules d''exclusion ou de mise en quarantaine en usage à Qumrân, et traduisent il le retranchera. –  pleurs… 8.12+.'
  - type: text
    content: il le mettra en pièces et lui fera partager le sort des hypocrites ; c'est là qu'il y aura des pleurs et des grincements de dents.
  '6':
  - type: note
    content: 'Cf. Dn 2.28s,45 ; Ap 1.1. –  Vous allez entendre parler…  : cf. Jr 51.46 ; voir aussi Dn 11.20,25,44 ; Ap 6.3s ; 9.9 ; 12.7 ; 4 Esdras 13.30-32 : « Un égarement d''esprit viendra sur eux ; ils songeront à se faire la guerre, cité contre cité, pays contre pays, nation contre nation, royaume contre royaume. Et lorsque ces événements arriveront, lorsque se produiront les signes que je t''ai montrés auparavant, alors sera révélé mon Fils. » – Ici et au v. 14 le mot traduit par fin n''est pas le même qu''au v. 3 ; cf. 2Th 2.2.'
  - type: text
    content: 'Vous allez entendre parler de guerres et de rumeurs de guerres : gardez-vous de vous alarmer ; car cela doit arriver, mais ce n''est pas encore la fin. '
  '7':
  - type: note
    content: 'nation… Es 19.2 ; 2Ch 15.6. –  se dressera  : le même verbe est traduit par se lever v. 11,24 ; cf. 2.13n. –  tremblements de terre  : cf. 8.24n  ; 27.51,54 ; 28.2 ; Es 24.19s ; Ag 2.6s ; Za 14.4s ; Ap 6.12+.'
  - type: text
    content: 'Car nation se dressera contre nation et royaume contre royaume ; dans divers lieux il y aura des famines et des tremblements de terre. '
  '8':
  - type: note
    content: Sur l'image des douleurs de l'accouchement, fréquemment employée dans le judaïsme postérieur pour décrire les souffrances préalables à l'avènement de l'ère messianique, cf. Es 13.8 ; Jr 4.31 ; 6.24 ; 13.21 ; 22.23 ; 49.22 ; 50.43 ; Os 13.13 ; Mi 4.9s ; Ac 2.24n  ; Rm 8.22 ; Ga 4.19,27 ; 1Th 5.3 ; Ap 12.2.
  - type: text
    content: Mais tout cela ne sera que le commencement des douleurs de l'accouchement.
  '9':
  - type: text
    content: ' '
  - type: note
    content: à la détresse (sur le mot correspondant, voir v. 21,29 ; 7.14n  ; 13.21) ; cf. 10.17-22 ; Jn 16.2,33+ ; 2Co 1.4n  ; 1Th 3.3n. –  toutes les nations v. 14n.
  - type: text
    content: 'Alors on vous livrera à la détresse et on vous tuera ; vous serez détestés de toutes les nations à cause de mon nom. '
