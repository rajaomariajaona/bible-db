      marker: fr
      children:
      - type: text
        text: '24.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur l''image des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: douleurs de l'accouchement
    - type: usfm
      marker: ft
      children:
      - type: text
