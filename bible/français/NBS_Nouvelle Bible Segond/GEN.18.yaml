document_id: GEN.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu annonce que Sara aura un fils
  - type: text
    content: ' '
  - type: note
    content: 'apparut  : cf. v. 2n  ; 17.1n. –  térébinthes de Mamré 13.18n. –  pendant la chaleur du jour  : vers midi.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui apparut aux térébinthes de Mamré, alors qu''il était assis à l''entrée de sa tente, pendant la chaleur du jour. '
  '10':
  - type: note
    content: 'Il dit  : dans ce chapitre, le récit oscille constamment entre le singulier et le pluriel (cf. v. 2-4). D''après la suite, on suppose habituellement que le singulier désigne l''un des trois hommes et l''identifie à YHWH, le Seigneur (cf. v. 1,16s,22,33 ; 19.1). –  l''année prochaine  : litt. comme le temps d''un vivant (de même au v. 14 ; autre expression en 17.21), ce qui pourrait signifier après le temps d''une grossesse, ou au temps de la vie, c.-à-d. à la saison des pluies qui renouvelle la végétation ; cf. 17.21+ ; Rm 9.9. –  qui était derrière lui  : LXX elle était derrière lui.'
  - type: text
    content: 'Il dit : Je reviendrai chez toi l''année prochaine ; Sara, ta femme, aura un fils. Sara écoutait à l''entrée de la tente qui était derrière lui.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Sara avait cessé…  : litt. le chemin comme celui des femmes (cf. 31.35n) avait cessé d''être pour Sara . Cf. Rm 4.19 ; Hé 11.11s.'
  - type: text
    content: 'Abraham et Sara étaient vieux, avancés en âge, et Sara avait cessé d''avoir ses règles. '
  '12':
  - type: note
    content: rit 17.17n. –  mon maître ou mon mari  ; le terme correspondant est souvent traduit par seigneur (cf., dans un contexte comparable, Jg 19.26s ; Am 4.1n) ; voir 1P 3.6n.
  - type: text
    content: 'Sara rit en elle-même : Maintenant que je suis usée, se dit-elle, aurais-je encore du plaisir ? D''ailleurs mon maître aussi est vieux. '
  '13':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Abraham : Pourquoi donc Sara a-t-elle ri, en disant : « Pourrais-je vraiment avoir un enfant, moi qui suis vieille ? » '
  '14':
  - type: note
    content: 'Y a-t-il…  : autre traduction y a-t-il rien de trop difficile pour le Seigneur  ? cf. Nb 11.23 ; Jr 32.17,27 ; Mt 19.26/ / ; Lc 1.36s. –  L''année prochaine v. 10n. –  au temps fixé  : autre traduction à cette époque-ci, cf. 17.21n.'
  - type: text
    content: 'Y a-t-il rien qui soit étonnant de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? L''année prochaine, au temps fixé, je reviendrai vers toi, et Sara aura un fils. '
  '15':
  - type: note
    content: 'mentit  : autre traduction nia. –  peur  : voir crainte.'
  - type: text
    content: 'Sara mentit : Je n''ai pas ri, dit-elle ; car elle avait peur. Mais il dit : Si, tu as ri !'
  - type: heading
    content: Abraham intercède pour Sodome
  '16':
  - type: text
    content: ' '
  - type: note
    content: La scène se situe près d'Hébron (v. 1n). Sodome et Gomorrhe (v. 20) étaient situées aux environs de la mer Morte (voir 10.19n).
  - type: text
    content: 'Les hommes se levèrent pour partir et se tournèrent du côté de Sodome. Abraham marchait avec eux pour les reconduire. '
  '17':
  - type: note
    content: 'Cf. Am 3.7 ; Jn 15.15. –  Cacherai-je  : le verbe hébreu correspondant est habituellement traduit par couvrir ou recouvrir, cf. 9.23 ; 37.26.'
  - type: text
    content: 'Or le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit : Cacherai-je à Abraham ce que je vais faire, '
  '18':
  - type: note
    content: 'grande et forte  : cf. 26.16 ; Ex 1.7,9,20. –  se béniront par lui 12.3n.'
  - type: text
    content: 'alors qu''Abraham va devenir une nation grande et forte, et que toutes les nations de la terre se béniront par lui ? '
  '19':
  - type: note
    content: 'distingué  : litt. connu Ex 33.12n  ; Jr 1.5n  ; Am 3.2n  ; cf. Os 13.5 ; Ps 139.1ss ; Rm 8.29 ; voir aussi 2Ch 20.7 ; Jc 2.23. –  toute sa maison  : litt. sa maison, c.-à-d. sa maisonnée, sa famille. Voir aussi fils. –  en agissant…  : litt. en faisant justice et équité (ce dernier terme étant aussi traduit ailleurs par règle, droit) ; cf. v. 25 ; 2S 8.15 ; Es 9.6 ; Jr 22.3,15 ; 23.5 ; voir aussi loi.'
  - type: text
    content: 'Car je l''ai distingué afin qu''il ordonne à ses fils et à toute sa maison, après lui, de garder la voie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en agissant selon la justice et l''équité ; ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera venir sur Abraham ce qu''il a dit à son sujet. '
  '2':
  - type: note
    content: 'vit ou regarda  : autre forme du verbe traduit au v. 1 par apparaître. –  trois hommes  : cf. v. 10n,16.'
  - type: text
    content: 'Il leva les yeux et vit trois hommes debout devant lui. Quand il les vit, il courut à leur rencontre, depuis l''entrée de sa tente, se prosterna jusqu''à terre '
  '20':
  - type: note
    content: 'Les cris…  : litt. le cri (cf. 4.10) de Sodome et de Gomorrhe, parce qu''il est grand, et leur péché, parce qu''il est très lourd, (je vais descendre…). Voir 13.10-13 ; 19.1-13. – Voir péché.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Les cris contre Sodome et Gomorrhe sont si forts, leur péché si grave, '
  '21':
  - type: note
    content: 'descendre  : cf. 19.1-13 ; on retrouve une semblable descente de Dieu en 11.5ss ; cf. Ex 3.8. –  s''ils ont agi…  : litt. s''ils ont fait comme son cri (synonyme et quasi-homonyme du mot traduit par cris au v. 20) qui est venu à moi  ; cf. Jr 5.1.'
  - type: text
    content: 'que je vais descendre pour voir s''ils ont agi tout à fait selon les cris qui sont venus jusqu''à moi ; que cela soit ou non, je le saurai. '
  '22':
  - type: note
    content: 'Les hommes  : voir v. 10n  ; 19.1. –  Mais Abraham…  : d''après une ancienne tradition des scribes, le texte originel aurait porté  : mais le Seigneur se tenait encore devant Abraham (les scribes auraient interverti sujet et complément par déférence pour Dieu).'
  - type: text
    content: 'Les hommes repartirent de là pour Sodome. Mais Abraham se tenait encore devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'Sur l’intercession du juste, cf. Ex 32.11-14 ; Nb 14.11-20 ; Es 53.12 ; Jr 15.1 ; Am 7.1-6 ; Ps 106.23 ; Jb 42.8ss ; Jn 17.20 ; Jc 5.16. –  supprimer  : le même verbe (aussi au v. 24) est traduit par emporter en 19.15,17.'
  - type: text
    content: 'Abraham s''approcha et dit : Vas-tu vraiment supprimer le juste avec le méchant ? '
  '24':
  - type: note
    content: 'pardonneras  : le verbe signifie habituellement lever ou enlever, se charger de  ; il a habituellement pour complément un terme signifiant la faute ou le péché, mais ici ce complément est sous-entendu ; de même au v. 26 ; cf. 4.7n,13n  ; Ez 4.4n. –  ce lieu 19.24n.'
  - type: text
    content: 'Peut-être y a-t-il cinquante justes au milieu de la ville : vas-tu vraiment supprimer ? Ne pardonneras-tu pas à ce lieu à cause des cinquante justes qui s''y trouvent ? '
  '25':
  - type: note
    content: Jamais… 44.7,17 ; cf. 1S 2.30n  ; Jb 34.10-17 ; Rm 3.6.
  - type: text
    content: 'Jamais tu ne ferais une chose pareille : mettre à mort le juste avec le méchant, de sorte qu''il en serait du juste comme du méchant, jamais ! Le juge de toute la terre n''agirait-il pas selon l''équité ? '
  '26':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Si je trouve, à Sodome, cinquante justes au milieu de la ville, à cause d''eux je pardonnerai à ce lieu tout entier. '
  '27':
  - type: note
    content: poussière 3.19+.
  - type: text
    content: 'Abraham reprit : J''ose te parler, Seigneur, alors que je ne suis que poussière et cendre… '
  '28':
  - type: text
    content: 'peut-être, des cinquante justes, en manquera-t-il cinq : pour cinq, anéantiras-tu toute la ville ? Il répondit : Je ne l''anéantirai pas, si j''en trouve là quarante-cinq. '
  '29':
  - type: note
    content: 'Abraham continua  : litt. il continua (de même dans la suite). –  je ne ferai rien  : autre traduction je ne le ferai pas, même possibilité au v. 30.'
  - type: text
    content: 'Abraham continua cependant de lui parler ; il dit : Peut-être s''en trouvera-t-il là quarante. Il répondit : A cause de ces quarante-là, je ne ferai rien. '
  '3':
  - type: note
    content: 'Seigneur  : certains modifient légèrement le texte hébreu traditionnel pour lire mon seigneur  ; d''autres comprennent mes seigneurs, mais la suite est au singulier dans le texte. –  si j''ai trouvé grâce…  : cf. 6.8+ ; la formule correspondante est à peu près l''équivalent de notre s''il te plaît, avec une connotation de profonde déférence. –  moi, ton serviteur  : litt. ton serviteur. La politesse hébraïque veut, surtout lorsqu''on s''adresse à un supérieur, qu''on se désigne soi-même comme serviteur ou servante (ou esclave) de celui à qui l''on parle, et qu''on appelle son interlocuteur mon seigneur (ou mon maître) ; il s''ensuit de nombreux dialogues à la troisième personne, que la traduction s''efforce de clarifier en utilisant la première et la deuxième personne, tout en rappelant ici et là le rapport hiérarchique conventionnel par l''usage des mots ton serviteur, ta servante ou mon seigneur.'
  - type: text
    content: 'et dit : Seigneur, si j''ai trouvé grâce à tes yeux, ne passe pas, je te prie, sans t''arrêter chez moi, ton serviteur ! '
  '30':
  - type: text
    content: 'Abraham dit : Je t''en prie, Seigneur, ne te fâche pas si je parle encore. Peut-être s''en trouvera-t-il là trente. Il répondit : Je ne ferai rien si j''en trouve là trente. '
  '31':
  - type: text
    content: 'Abraham dit : J''ose encore te parler, Seigneur… peut-être s''en trouvera-t-il là vingt. Il répondit : A cause de ces vingt-là, je n''anéantirai pas. '
  '32':
  - type: note
    content: Cf. Es 1.9 ; Jr 5.1 ; Ez 22.30 ; voir aussi Ez 16.53-55.
  - type: text
    content: 'Abraham dit : Je t''en prie, Seigneur, ne te fâche pas si je parle encore une fois : peut-être s''en trouvera-t-il dix. Il répondit : A cause de ces dix-là, je n''anéantirai pas. '
  '33':
  - type: note
    content: 'chez lui  : litt. à son lieu.'
  - type: text
    content: 'Lorsqu''il eut achevé de parler à Abraham, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''en alla, et Abraham retourna chez lui.'
  '4':
  - type: note
    content: On voyageait pieds nus ou en sandales. Le lavage des pieds était un rite d'hospitalité (cf. 43.24 ; Jn 13.1-17).
  - type: text
    content: 'Laissez-moi apporter un peu d''eau, je vous prie, pour que vous vous laviez les pieds, puis reposez-vous sous l''arbre ! '
  '5':
  - type: note
    content: 'quelque chose à manger  : litt. un morceau de pain. –  pour que vous vous restauriez  : litt. et vous soutiendrez votre cœur, cf. Jg 19.5n  ; Ps 104.15. –  car c''est pour cela  : cf. 33.10n. Cf. 2R 4.8-17 ; Rm 12.13 ; Hé 13.2.'
  - type: text
    content: 'Je vais chercher quelque chose à manger pour que vous vous restauriez ; après quoi vous passerez votre chemin, car c''est pour cela que vous êtes passés chez moi, votre serviteur. Ils répondirent : D''accord, fais comme tu as dit.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'trois séas  : environ 21 l ; voir mesures.'
  - type: text
    content: 'Abraham se précipita dans la tente pour dire à Sara : Dépêche-toi, pétris trois séas de fleur de farine et fais-en des galettes. '
  '7':
  - type: note
    content: 'Abraham…  : autre traduction entre-temps, Abraham avait couru vers le bétail, avait pris… –  un veau  : la même expression peut, dans d''autres contextes, désigner le taureau offert en sacrifice  ; cf. Nb 15.8ns.'
  - type: text
    content: 'Abraham courut vers le bétail, prit un veau tendre et bon et le donna à un serviteur, qui se dépêcha de le préparer. '
  '8':
  - type: note
    content: 'du lait fermenté, du lait frais  : autre traduction de la crème (ou du lait caillé ; du beurre) et du lait  ; le terme traduit par lait fermenté revient en Dt 32.14 ; Jg 5.25 ; 2S 17.29 ; Es 7.15,22 ; Jb 20.17 ; 29.6 ; Pr 30.33.'
  - type: text
    content: Il prit du lait fermenté, du lait frais, et le veau qu'on avait préparé, et il les mit devant eux. Il resta debout à leurs côtés, sous l'arbre, tandis qu'ils mangeaient.
  '9':
  - type: text
    content: 'Alors ils lui dirent : Où est Sara, ta femme ? Il répondit : Elle est là, dans la tente. '
