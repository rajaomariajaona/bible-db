    marker-yv: yv-n
  - type: text
    text: 'Sara rit en elle-même : Maintenant que je suis usée, se dit-elle, aurais-je encore du plaisir ? D''ailleurs mon maître aussi est vieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
