  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Abraham : Pourquoi donc Sara a-t-elle ri, en disant : « Pourrais-je vraiment avoir un enfant, moi qui suis vieille ? » '
  - type: usfm
