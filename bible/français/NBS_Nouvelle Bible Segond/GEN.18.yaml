    marker-yv: yv-n
  - type: text
    text: Il prit du lait fermenté, du lait frais, et le veau qu'on avait préparé, et il les mit devant eux. Il resta debout à leurs côtés, sous l'arbre, tandis qu'ils mangeaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors ils lui dirent : Où est Sara, ta femme ? Il répondit : Elle est là, dans la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans ce chapitre, le récit oscille constamment entre le singulier et le pluriel (cf. v. 2-4). D''après la suite, on suppose habituellement que le singulier désigne l''un des trois hommes et l''identifie à YHWH, le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (cf. v. 1,16s,22,33 ; 19.1). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'année prochaine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme le temps d''un vivant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de même au v. 14 ; autre expression en 17.21), ce qui pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: après le temps d'une grossesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au temps de la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. à la saison des pluies qui renouvelle la végétation ; cf. 17.21+ ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rm 9.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui était derrière lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle était derrière lui.
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Je reviendrai chez toi l''année prochaine ; Sara, ta femme, aura un fils. Sara écoutait à l''entrée de la tente qui était derrière lui.'
- type: usfm
  marker: p
