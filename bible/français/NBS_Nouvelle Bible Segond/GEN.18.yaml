  - type: text
    text: 'Il leva les yeux et vit trois hommes debout devant lui. Quand il les vit, il courut à leur rencontre, depuis l''entrée de sa tente, se prosterna jusqu''à terre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains modifient légèrement le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mes seigneurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais la suite est au singulier dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'si j''ai trouvé '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.8+ ; la formule correspondante est à peu près l''équivalent de notre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'il te plaît
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', avec une connotation de profonde déférence. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: moi, ton serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. La politesse hébraïque veut, surtout lorsqu''on s''adresse à un supérieur, qu''on se désigne soi-même comme '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'servante '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: esclave
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') de celui à qui l''on parle, et qu''on appelle son interlocuteur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mon seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; il s''ensuit de nombreux dialogues à la troisième personne, que la traduction s''efforce de clarifier en utilisant la première et la deuxième personne, tout en rappelant ici et là le rapport hiérarchique conventionnel par l''usage des mots '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ton serviteur, ta servante '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon seigneur.
    marker-yv: yv-n
  - type: text
    text: 'et dit : Seigneur, si j''ai trouvé grâce à tes yeux, ne passe pas, je te prie, sans t''arrêter chez moi, ton serviteur ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'On voyageait pieds nus ou en sandales. Le lavage des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pieds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: était un rite d'hospitalité (cf. 43.24 ; Jn 13.1-17).
    marker-yv: yv-n
  - type: text
    text: 'Laissez-moi apporter un peu d''eau, je vous prie, pour que vous vous laviez les pieds, puis reposez-vous sous l''arbre ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
