        - type: text
          text: n
      - type: text
        text: '  ; Ps 104.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: car c'est pour cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 33.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . Cf. 2R 4.8-17 ; Rm 12.13 ; Hé 13.2.
    marker-yv: yv-n
  - type: text
    text: 'Je vais chercher quelque chose à manger pour que vous vous restauriez ; après quoi vous passerez votre chemin, car c''est pour cela que vous êtes passés chez moi, votre serviteur. Ils répondirent : D''accord, fais comme tu as dit.'
