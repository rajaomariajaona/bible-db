    marker-yv: yv-n
  - type: text
    text: 'Abraham se précipita dans la tente pour dire à Sara : Dépêche-toi, pétris trois séas de fleur de farine et fais-en des galettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abraham…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'entre-temps, Abraham avait couru vers le bétail, avait pris… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un veau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression peut, dans d''autres contextes, désigner le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'taureau '
    - type: usfm
      marker: ft
      children:
