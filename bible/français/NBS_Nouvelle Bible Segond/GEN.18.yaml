      - type: text
        text: et du lait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lait fermenté '
    - type: usfm
      marker: ft
      children:
      - type: text
