        - type: text
          text: '12.50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.21 ; Jn 15.14.
      marker-yv: yv-n
    - type: text
      text: En effet, quiconque fait la volonté de mon Père qui est dans les cieux, celui-là est mon frère, ma sœur et ma mère.
  '6':
  - type: usfm
    marker: p
    children:
