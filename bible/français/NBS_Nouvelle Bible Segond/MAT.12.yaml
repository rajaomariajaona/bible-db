        - type: text
          text: un être humain…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.26 ; 10.31. – Sur l''ensemble, cf. Mc 2.27 ; Jn 5.17.'
      marker-yv: yv-n
    - type: text
      text: 'Or un être humain vaut plus qu''un mouton, combien plus ! Ainsi il est permis de faire du bien un jour de sabbat. '
