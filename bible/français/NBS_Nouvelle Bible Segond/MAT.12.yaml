      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme au v. 45).
      marker-yv: yv-n
    - type: text
      text: 'Lorsque l''esprit impur est sorti de l''être humain, il passe par des lieux arides, cherche du repos et n''en trouve pas. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1P 5.8.
      marker-yv: yv-n
    - type: text
      text: 'Alors il se dit : « Je vais retourner dans ma maison, celle d''où je suis sorti. » Quand il arrive, il la trouve vide, balayée et ornée. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 8.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jn 5.14 ; 2P 2.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: génération
        - type: text
          text: ' mauvaise '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 39+.
      marker-yv: yv-n
    - type: text
      text: Alors il s'en va chercher sept autres esprits plus mauvais que lui ; ils entrent là et s'installent, et la condition dernière de cet homme-là est pire que la première. Il en sera de même pour cette génération mauvaise.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vraie famille de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mc 3.31-35  ; Lc 8.19-21
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.55/ / ; Mc 3.21 ; Jn 7.3-5 ; Ac 1.14.
      marker-yv: yv-n
    - type: text
      text: 'Comme il parlait encore aux foules, sa mère et ses frères se tenaient dehors et cherchaient à lui parler. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ce v. qui manque dans certains mss de Mt se retrouve, à quelques variantes près, en Mc 3.32 et Lc 8.20.
      marker-yv: yv-n
    - type: text
      text: 'Quelqu''un lui dit : Ta mère et tes frères se tiennent dehors, et ils cherchent à te parler. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Mais il répondit à celui qui le lui disait : Qui est ma mère ? Qui sont mes frères ? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.40 ; 28.10 ; Jn 20.17 ; Rm 8.29 ; Hé 2.11,17.'
      marker-yv: yv-n
    - type: text
      text: 'Puis il étendit la main sur ses disciples et dit : Voici ma mère et mes frères ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 23.23 ; Lc 2.23+s ; 10.26. Sur l''activité des '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'le jour du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Lv 24.8 ; Nb 28.9 ; cf. Jn 7.22s.'
      marker-yv: yv-n
    - type: text
      text: 'Ou encore, n''avez-vous pas lu dans la Loi que, les jours de sabbat, les prêtres profanent le sabbat dans le temple sans se rendre coupables ? '
  '50':
  - type: usfm
    marker: p
    children:
