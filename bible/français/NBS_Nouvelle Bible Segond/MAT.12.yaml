          text: '12.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 12.41s ; 1R 8.27.
      marker-yv: yv-n
    - type: text
      text: 'Or, je vous le dis, il y a ici plus grand que le temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.13+ ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Os 6.6.
      marker-yv: yv-n
    - type: text
      text: 'Si vous saviez ce que signifie : '
    - type: usfm
      marker: it
      children:
      - type: text
