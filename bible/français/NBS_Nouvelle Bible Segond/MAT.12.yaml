document_id: MAT.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les épis arrachés
  - type: heading
    content: Mc 2.23-28  ; Lc 6.1-5
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 23.26.
  - type: text
    content: 'En ce temps-là, Jésus traversa des champs de blé un jour de sabbat. Ses disciples, qui avaient faim, se mirent à arracher des épis et à manger. '
  '10':
  - type: note
    content: 'paralysée ou atrophiée, litt. sèche  ; cf. 13.6 ; 21.19s ; 1R 13.4. D''après Jérôme (voir Vg), l’Evangile des nazaréens aurait décrit cet homme comme un maçon, mettant dans sa bouche la demande suivante : « J''étais maçon, et c''est par mes mains que j''arrivais à vivre ; je t''en prie, Jésus, rends-moi la santé, de façon à ce que je n''aie pas la honte de mendier ma nourriture. » –  Ils demandèrent à Jésus  : litt. ils lui demandèrent (ou on lui demanda). –  Est-il permis Mc 3.4n  ; Lc 14.3. –  faire une guérison  : même verbe en 8.7n. –  sabbat v. 2n. –  l''accuser 27.12 ; Jn 8.6 ; cf. Lc 20.20.'
  - type: text
    content: 'Il se trouvait là un homme qui avait la main paralysée. Ils demandèrent à Jésus : Est-il permis de faire une guérison un jour de sabbat ? C''était afin de l''accuser. '
  '11':
  - type: note
    content: 'Lc 14.5 ; cf. Ecrit de Damas (Qumrân) 11.13s : « Qu''on n''aide pas une bête à mettre bas le jour du sabbat ; et si elle tombe dans une citerne ou dans une fosse, qu''on ne la relève pas le sabbat. » –  retirer  : le même verbe est traduit ailleurs par réveiller, relever, parfois au sens de ressusciter, cf. 2.13n.'
  - type: text
    content: 'Il leur répondit : Lequel d''entre vous, s''il n''a qu''un seul mouton et que celui-ci tombe dans une fosse un jour de sabbat, ne le saisira pour l''en retirer ? '
  '12':
  - type: note
    content: 'un être humain…  : cf. 6.26 ; 10.31. – Sur l''ensemble, cf. Mc 2.27 ; Jn 5.17.'
  - type: text
    content: 'Or un être humain vaut plus qu''un mouton, combien plus ! Ainsi il est permis de faire du bien un jour de sabbat. '
  '13':
  - type: note
    content: 'redevint  : litt. fut rétablie, cf. Mc 3.5.'
  - type: text
    content: 'Alors il dit à l''homme : Tends ta main. Il la tendit, et elle redevint saine comme l''autre.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 22.15 ; Jn 5.18 ; 11.53.
  - type: text
    content: Les pharisiens sortirent et tinrent conseil contre lui, sur les moyens de le faire disparaître.
  - type: heading
    content: Jésus, le serviteur de Dieu
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'l''apprit et  : litt. (l’)ayant su , même forme verbale en 16.8 ( s''en rendit compte ) ; 22.18 ( connaissait ) ; 26.10 ( s''en aperçut ) ; cf. Mc 2.8 ; Jn 2.24s. –  se retira 10.23+. –  De grandes foules…  : certains mss portent beaucoup le suivirent . –  guérit 19.2 ; Lc 6.17-19.'
  - type: text
    content: 'Mais Jésus l''apprit et se retira de là. De grandes foules de gens le suivirent ; il les guérit tous, '
  '16':
  - type: note
    content: '8.4+. –  en les rabrouant 8.26n. –  ne parlent pas de lui  : litt. ne le rendent pas manifeste, de même Mc 3.12.'
  - type: text
    content: 'en les rabrouant pour qu''ils ne parlent pas de lui, '
  '17':
  - type: note
    content: du prophète Esaïe 1.22+ ; Es 42.1-4.
  - type: text
    content: 'afin que s''accomplisse ce qui avait été dit par l''entremise du prophète Esaïe :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 41.9 ; 49.5s ; Ag 2.23. Le mot traduit par serviteur est le même qu''en 8.6n  ; il est également employé à propos de Jésus en Ac 3.26+. –  bien-aimé… 3.17n  ; 17.5. –  j''ai pris plaisir  : autre traduction mon âme a pris plaisir , cf. 10.28n  ; 11.29n  ; 26.38n. –  Esprit 3.16 ; Es 11.2 ; Lc 4.18. –  justice  : litt. jugement , de même au v. 20.'
  - type: text
    content: Voici mon serviteur, celui que j'ai choisi,
  - type: text
    content: mon bien-aimé, celui en qui j'ai pris plaisir.
  - type: text
    content: Je mettrai mon Esprit sur lui
  - type: text
    content: et il annoncera la justice aux nations
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Il ne cherchera pas la dispute  : le verbe grec, qui n''apparaît qu''ici dans le N.T., est de la même racine que le mot traduit par dispute en Rm 1.29 ; cf. 2Tm 2.24. –  dans les grandes rues  : cf. 6.2,5.'
  - type: text
    content: Il ne cherchera pas la dispute, il ne criera pas,
  - type: text
    content: et personne n'entendra sa voix dans les grandes rues
  - type: text
    content: .
  '2':
  - type: note
    content: pharisiens 9.34+. – Cf. Ex 31.14 ; 34.21 ; Dt 5.14. D'après la tradition juive, le glanage était assimilé à la moisson et au vannage, activités interdites pendant le sabbat.
  - type: text
    content: 'Voyant cela, les pharisiens lui dirent : Tes disciples font ce qu''il n''est pas permis de faire pendant le sabbat. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'froissé Es 57.15 ; 65.8 ; Ps 51.19. –  le lumignon  : autre traduction la mèche . –  justice v. 18n  ; Es 11.4s ; Ps 45.5-8.'
  - type: text
    content: Il ne brisera pas le roseau froissé,
  - type: text
    content: et il n'éteindra pas le lumignon qui fume
  - type: text
    content: jusqu'à ce qu'il ait porté la justice
  - type: text
    content: ' à la victoire ;'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Es 11.10 ; Rm 15.12. –  les nations ou les gens des nations, les non-Juifs , 4.15n. –  en son nom  : cf. 18.5 ; voir Jn 1.12+.'
  - type: text
    content: et les nations mettront leur espérance en son nom
  - type: text
    content: .
  - type: heading
    content: Jésus a-t-il partie liée avec les démons ?
  - type: heading
    content: Mc 3.22-27  ; Lc 11.14-23  ; cf. Mt 9.32-34
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.32ss.
  - type: text
    content: 'Alors on lui amena un démoniaque aveugle et muet, et il le guérit, de sorte que le muet parlait et voyait. '
  '23':
  - type: note
    content: 'stupéfaites  : voir Mc 2.12n. –  Fils de David 9.27+.'
  - type: text
    content: 'Toutes les foules, stupéfaites, disaient : N''est-ce pas là le Fils de David ? '
  '24':
  - type: note
    content: 9.34n.
  - type: text
    content: 'L''ayant appris, les pharisiens dirent : Il ne chasse les démons que par Béelzéboul, prince des démons !'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Connaissant leurs pensées 9.4n. –  va à sa ruine  : le verbe correspondant est dérivé du mot habituellement traduit par désert.'
  - type: text
    content: 'Connaissant leurs pensées, il leur dit : Tout royaume divisé contre lui-même va à sa ruine, et toute ville ou maison divisée contre elle-même ne peut tenir. '
  '26':
  - type: note
    content: 'le Satan  : autre traduction Satan  ; le mot grec correspondant transcrit un terme hébreu ou araméen qui signifie (l’)adversaire (Jb 1.6n  ; 1Ch 21.1n) ; il est généralement employé avec l''article, exceptionnellement sans (Mc 3.23 ; Lc 22.3 ; 2Co 12.7) ; on peut le considérer soit comme un titre, soit comme un nom propre (en grec l''article peut être utilisé aussi pour les noms propres). Voir démon, diable, Satan.'
  - type: text
    content: 'Si le Satan chasse le Satan, il est divisé contre lui-même : comment donc son royaume tiendra-t-il ? '
  '27':
  - type: note
    content: vos fils, c.-à-d., selon toute vraisemblance, vos disciples  ; cf. Ac 19.13ss. –  vos juges v. 41s.
  - type: text
    content: 'Et si, moi, je chasse les démons par Béelzéboul, vos fils, par qui les chassent-ils ? C''est pourquoi ils seront eux-mêmes vos juges. '
  '28':
  - type: note
    content: '1Jn 3.8. –  l''Esprit de Dieu  : cf. 3.16 ; voir aussi Rm 15.19 ; 1Co 7.40 ; 12.3 ; 1Jn 4.2. –  règne ou royaume… Lc 17.21. –  est parvenu jusqu''à vous  : autre traduction vous a atteints, cf. Lc 11.20n.'
  - type: text
    content: 'Mais si c''est par l''Esprit de Dieu que, moi, je chasse les démons, c''est donc que le règne de Dieu est parvenu jusqu''à vous. '
  '29':
  - type: note
    content: Es 49.24 ; 53.12 ; voir Mc 3.27+. Le mot traduit par biens signifie aussi, selon les contextes, objets, affaires, ustensiles, vases (cf. Rm 9.21n) ; il a également le sens d’instrument (Ac 9.15n).
  - type: text
    content: 'Comment quelqu''un pourrait-il entrer dans la maison d''un homme fort et s''emparer de ses biens sans avoir d''abord lié cet homme fort ? Alors seulement il pillera sa maison. '
  '3':
  - type: note
    content: N'avez-vous pas lu 19.4 ; 21.16 ; 22.31. –  David… 1S 21.3-7.
  - type: text
    content: 'Mais il leur dit : N''avez-vous pas lu ce que fit David, lorsqu''il eut faim, lui et ceux qui étaient avec lui ? '
  '30':
  - type: note
    content: Cf. 6.24 ; Mc 9.40/ /. –  rassemble ou recueille, cf. 3.12 ; 13.30.
  - type: text
    content: Celui qui n'est pas avec moi est contre moi, et celui qui ne rassemble pas avec moi disperse.
  - type: heading
    content: L'être humain sera jugé sur ses paroles
  - type: heading
    content: Mc 3.28-29  ; Lc 12.10
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 7.51 ; 1Tm 1.13 ; Hé 6.4-6 ; 10.26-29 ; 1Jn 5.16. –  aux humains  : autres traductions aux hommes ; aux gens (de même v. 36 ; cf. 5.13+).'
  - type: text
    content: 'C''est pourquoi, je vous le dis, tout péché, tout blasphème sera pardonné aux humains, mais le blasphème contre l''Esprit ne sera pas pardonné. '
  '32':
  - type: note
    content: 'le Fils de l''homme 8.20n. –  parlera contre l''Esprit saint  : cf. Mc 3.29n. –  ce monde-ci / le monde à venir  : le judaïsme du Ier s. apr. J.-C. distinguait ainsi l''ère ou l''âge (le terme grec est traditionnellement transcrit éon et traduit par siècle, cf. Rm 12.2n  ; Ga 1.5n) présent, caractérisé par l''épreuve et le péché, et l''âge messianique qui verrait l''accomplissement de toutes les espérances des justes ; cf. 13.22,39s,49 ; Ep 1.21 ; Hé 6.5. –  Evangile selon Thomas 44 : « Jésus a dit : “Celui qui a blasphémé contre le Père, on lui pardonnera, et celui qui a blasphémé contre le Fils, on lui pardonnera ; mais celui qui a blasphémé contre l''Esprit saint, on ne lui pardonnera point, ni sur la terre ni au ciel.” »'
  - type: text
    content: Quiconque parlera contre le Fils de l'homme, il lui sera pardonné, mais quiconque parlera contre l'Esprit saint, il ne lui sera pardonné ni dans ce monde-ci, ni dans le monde à venir.
  - type: heading
    content: Mt 7.16-20  ; Lc 6.43-45
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Autres traductions  : faites que l''arbre soit bon, et son fruit sera beau ; faites que l''arbre soit malade et son fruit sera pourri ; jugez l''arbre bon et son fruit beau, ou jugez l''arbre malade et son fruit pourri ; bon et beau traduisent un même mot grec, de même malade et pourri  ; cf. 3.10 ; 5.16 ; 7.17nss ; 13.8n. Cf. Evangile selon Thomas 45 : « Jésus a dit : “On ne récolte pas des raisins parmi les épines, et l''on ne cueille pas des figues dans les buissons, car ils ne donnent pas de fruit. Un homme bon produit du bien de son trésor ; un homme méchant produit des choses pernicieuses du mauvais trésor qui est dans son cœur, car de l''abondance du cœur il produit des choses pernicieuses.” » Voir aussi Jn 8.25n.'
  - type: text
    content: 'Ou bien faites que l''arbre soit bon et que son fruit soit beau, ou bien faites que l''arbre soit malade et que son fruit soit pourri ; car on connaît l''arbre à son fruit. '
  '34':
  - type: note
    content: 'Vipères 3.7n. –  comment pourriez-vous  : autre traduction comment pouvez-vous. –  mauvais 7.11. –  cœur / bouche 15.18 ; Lc 6.45.'
  - type: text
    content: 'Vipères, comment pourriez-vous dire de bonnes choses, mauvais comme vous l''êtes ? Car c''est de l''abondance du cœur que la bouche parle. '
  '35':
  - type: note
    content: 'Cf. 13.52 ; Pr 10.20s ; Rm 8.7. –  trésor  : cf. 6.19+ ; Pr 2.4 ; 8.21 ; 21.20.'
  - type: text
    content: 'L''homme bon, de son bon trésor, tire du bon ; l''homme mauvais, de son mauvais trésor, tire du mauvais. '
  '36':
  - type: note
    content: 'jour du jugement 10.15+. – En grec, rendre compte se dit (litt.) rendre parole (logos, cf. v. 37n) ; Lc 16.2. –  paroles  : grec rhèma (70 fois dans le N.T.) Jc 3.1,6 ; Jd 15. –  inutiles  : litt. inactives  ; autres traductions oiseuses, futiles  ; même terme 20.3,6 (sans rien faire) ; cf. Dt 32.47 ; Pr 13.3.'
  - type: text
    content: 'Je vous le dis : au jour du jugement, les humains rendront compte de toutes les paroles inutiles qu''ils auront proférées. '
  '37':
  - type: note
    content: Le mot paroles traduit ici le grec logos (330 fois dans le N.T.), voir v. 36n. Cf. Jb 15.12s ; Lc 19.22.
  - type: text
    content: Car c'est par tes paroles que tu seras justifié, et c'est par tes paroles que tu seras condamné.
  - type: heading
    content: Le signe de Jonas ; la reine du Sud
  - type: heading
    content: Mt 16.1-4  ; Mc 8.11-12  ; Lc 11.16,29-32
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'scribes / pharisiens  : cf. 5.20 ; 15.1 ; 22.46 ; 23.2,13ss. –  Maître  : au sens d’ enseignant . –  signe ou miracle  ; 16.1-4/ /. Cf. Lc 23.8 ; Jn 2.11n  ; 4.48 ; 1Co 1.22 ; voir aussi Jg 6.17+.'
  - type: text
    content: 'Alors quelques-uns des scribes et des pharisiens dirent : Maître, nous voudrions voir un signe de ta part. '
  '39':
  - type: note
    content: 'génération mauvaise v. 45 ; 16.4 ; 17.17/ / ; Dt 32.5,20 ; Es 57.3 ; Jr 2.31 ; 7.29 ; Ps 78.8 ; Mc 8.38 ; Lc 9.41 ; Ac 2.40 ; Ph 2.15. –  recherche ou demande. –  prophète Jonas  : voir « Le “signe” de Jonas »♦.'
  - type: text
    content: 'Il leur répondit : Une génération mauvaise et adultère recherche un signe ; il ne lui sera pas donné d''autre signe que le signe du prophète Jonas. '
  '4':
  - type: note
    content: 'ils mangèrent  : certains mss portent il mangea. –  pains offerts Ex 25.30 ; 35.13 ; 39.36 ; 40.23 ; Lv 24.5ss ; Nb 4.7 ; 1R 7.48 ; 1Ch 9.32 ; 2Ch 4.19.'
  - type: text
    content: '– comment il entra dans la maison de Dieu et comment ils mangèrent les pains offerts, alors qu''il n''était permis d''en manger ni à lui, ni à ceux qui étaient avec lui, mais aux prêtres seuls ? '
  '40':
  - type: note
    content: Jon 2.1. Le mot grec traduit par grand poisson ici est celui qui est utilisé, dans LXX, pour le récit de Jonas ; il est également employé pour les monstres marins de Gn 1.21. C'est lui qui a donné notre mot cétacé. –  Fils de l'homme v. 8,32 ; cf. 8.20n  ; 10.23 ; 11.19 etc. – Voir cœur. – Cf. 16.21+ ; Ep 4.9.
  - type: text
    content: 'En effet, tout comme '
  - type: text
    content: Jonas fut trois jours et trois nuits dans le ventre du grand poisson,
  - type: text
    content: ' de même le Fils de l''homme sera trois jours et trois nuits dans le cœur de la terre. '
  '41':
  - type: note
    content: 'Ninive  : ancienne capitale de l''empire assyrien ; voir Jon 3.5ss. –  se lèveront  : autre traduction ressusciteront (autre verbe au v. 42). –  condamneront  : cf. v. 27 ; Rm 2.27. –  changé radicalement 3.2n. –  plus que v. 6.'
  - type: text
    content: 'Les hommes de Ninive se lèveront, lors du jugement, avec cette génération, et ils la condamneront, parce qu''ils ont changé radicalement à la proclamation de Jonas ; et pourtant il y a ici plus que Jonas. '
  '42':
  - type: note
    content: 1R 10.1-10. –  se réveillera ou se lèvera, ressuscitera, cf. 2.13n  ; 8.25 ; Jn 12.1.
  - type: text
    content: La reine du Sud se réveillera, lors du jugement, avec cette génération, et elle la condamnera, parce qu'elle est venue des extrémités de la terre pour entendre la sagesse de Salomon ; et pourtant il y a ici plus que Salomon.
  - type: heading
    content: Le retour de l'esprit impur
  - type: heading
    content: Lc 11.24-26
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Es 34.14 ; Ap 18.2. –  esprit impur (voir pur, impur) 10.1n. –  l''être humain  : autre traduction l''homme (même terme au v. 45).'
  - type: text
    content: 'Lorsque l''esprit impur est sorti de l''être humain, il passe par des lieux arides, cherche du repos et n''en trouve pas. '
  '44':
  - type: note
    content: 1P 5.8.
  - type: text
    content: 'Alors il se dit : « Je vais retourner dans ma maison, celle d''où je suis sorti. » Quand il arrive, il la trouve vide, balayée et ornée. '
  '45':
  - type: note
    content: sept Lc 8.2. –  pire Jn 5.14 ; 2P 2.20. –  génération mauvaise v. 39+.
  - type: text
    content: Alors il s'en va chercher sept autres esprits plus mauvais que lui ; ils entrent là et s'installent, et la condition dernière de cet homme-là est pire que la première. Il en sera de même pour cette génération mauvaise.
  - type: heading
    content: La vraie famille de Jésus
  - type: heading
    content: Mc 3.31-35  ; Lc 8.19-21
  '46':
  - type: text
    content: ' '
  - type: note
    content: 13.55/ / ; Mc 3.21 ; Jn 7.3-5 ; Ac 1.14.
  - type: text
    content: 'Comme il parlait encore aux foules, sa mère et ses frères se tenaient dehors et cherchaient à lui parler. '
  '47':
  - type: note
    content: Ce v. qui manque dans certains mss de Mt se retrouve, à quelques variantes près, en Mc 3.32 et Lc 8.20.
  - type: text
    content: 'Quelqu''un lui dit : Ta mère et tes frères se tiennent dehors, et ils cherchent à te parler. '
  '48':
  - type: text
    content: 'Mais il répondit à celui qui le lui disait : Qui est ma mère ? Qui sont mes frères ? '
  '49':
  - type: note
    content: 'mes frères  : cf. 25.40 ; 28.10 ; Jn 20.17 ; Rm 8.29 ; Hé 2.11,17.'
  - type: text
    content: 'Puis il étendit la main sur ses disciples et dit : Voici ma mère et mes frères ! '
  '5':
  - type: note
    content: 'dans la Loi  : cf. 23.23 ; Lc 2.23+s ; 10.26. Sur l''activité des prêtres le jour du sabbat, voir Lv 24.8 ; Nb 28.9 ; cf. Jn 7.22s.'
  - type: text
    content: 'Ou encore, n''avez-vous pas lu dans la Loi que, les jours de sabbat, les prêtres profanent le sabbat dans le temple sans se rendre coupables ? '
  '50':
  - type: note
    content: 7.21 ; Jn 15.14.
  - type: text
    content: En effet, quiconque fait la volonté de mon Père qui est dans les cieux, celui-là est mon frère, ma sœur et ma mère.
  '6':
  - type: note
    content: Cf. 12.41s ; 1R 8.27.
  - type: text
    content: 'Or, je vous le dis, il y a ici plus grand que le temple. '
  '7':
  - type: note
    content: 9.13+ ; Os 6.6.
  - type: text
    content: 'Si vous saviez ce que signifie : '
  - type: text
    content: Je veux la compassion et non le sacrifice,
  - type: text
    content: ' vous n''auriez pas condamné des innocents. '
  '8':
  - type: note
    content: Fils de l'homme 8.20n  ; 9.6. –  maître ou Seigneur.
  - type: text
    content: Car le Fils de l'homme est maître du sabbat.
  - type: heading
    content: L'homme à la main paralysée
  - type: heading
    content: Mc 3.1-6  ; Lc 6.6-11
  '9':
  - type: text
    content: 'Il partit de là et se rendit à leur synagogue. '
