    - type: text
      text: 'A cause de cela, voici ce que dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta femme se prostituera dans la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes fils et tes filles tomberont par l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta terre sera partagée au cordeau ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, tu mourras sur une terre impure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël sera exilé loin de sa terre.
  '2':
