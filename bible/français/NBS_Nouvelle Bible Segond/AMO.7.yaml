        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle Amos :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jéroboam mourra par l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël sera exilé loin de sa terre.
