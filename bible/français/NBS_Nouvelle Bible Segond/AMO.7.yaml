      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amos conspire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 8.17 ; Jr 26.8ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
