        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cultivateur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pinceur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: piqueur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; on incisait sans doute la tige des fruits du '
      - type: usfm
        marker: fk
        children:
        - type: text
          text: 'sycomore '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou figuier sauvage (Ps 78.47 ; 1Ch 27.28 ; Lc 19.4), qui servaient surtout à l'alimentation du bétail, pour en hâter la maturation.
      marker-yv: yv-n
    - type: text
      text: 'Amos répondit à Amatsia : Je ne suis ni prophète, ni fils de prophète ; je suis éleveur de bovins et cultivateur de sycomores. '
