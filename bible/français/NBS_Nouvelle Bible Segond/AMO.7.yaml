document_id: AMO.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Première vision d''Amos : les criquets'
  - type: text
    content: ' '
  - type: note
    content: 'voir 1.1+. –  il façonnait…  : certains modifient le texte hébreu traditionnel pour lire un essaim de criquets 4.9n. –  la coupe du roi  : sens incertain ; peut-être la maison royale prélevait-elle pour sa cavalerie (1R 18.5) une partie de la première fenaison, tandis que le regain était destiné au peuple.'
  - type: text
    content: 'Voici ce que me fit voir le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : il façonnait des criquets au moment où le regain commençait à croître ; c''était le regain après la coupe du roi. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'prêtre de Beth-El v. 13 ; 3.14n. –  Jéroboam 1.1n. –  Amos conspire  : cf. 1R 8.17 ; Jr 26.8ss. –  supporter  : cf. Jl 2.10s.'
  - type: text
    content: 'Alors Amatsia, prêtre de Beth-El, fit dire à Jéroboam, roi d''Israël : Amos conspire contre toi au sein de la maison d''Israël ; le pays ne peut supporter toutes ses paroles. '
  '11':
  - type: note
    content: Cf. v. 9,17 ; 5.27+ ; 6.7 ; 9.4ss. –  sa terre v. 17 ; Gn 2.5n.
  - type: text
    content: 'Car ainsi parle Amos :'
  - type: text
    content: Jéroboam mourra par l'épée,
  - type: text
    content: et Israël sera exilé loin de sa terre.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '2.12+. –  visionnaire 1.1n  ; cf. 2S 24.11n  ; voir aussi 1S 9.9+ (autre terme). –  manger ton pain  : sur le métier de prophète, cf. 1S 9.7 ; 2R 5.11,15ss ; Ez 13.19 ; Mi 3.5,11.'
  - type: text
    content: 'Amatsia dit à Amos : Va-t''en, visionnaire, va te réfugier au pays de Juda ; là-bas, tu pourras manger ton pain et parler en prophète. '
  '13':
  - type: note
    content: sanctuaire de roi 3.14n  ; cf. 1R 12.26-33.
  - type: text
    content: Mais ne continue pas à parler en prophète à Beth-El, car c'est un sanctuaire de roi, et une maison royale.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ni prophète officiel ; cf. v. 15 ; Za 13.5. –  fils de prophète , peut-être au sens de membre d''une confrérie de prophètes ; cf. 1S 10.5ss ; 1R 20.35 ; 2R 2.3nss ; 4.1. –  éleveur de bovins  : cf. 1.1n. –  cultivateur  : litt. pinceur ou piqueur  ; on incisait sans doute la tige des fruits du sycomore ou figuier sauvage (Ps 78.47 ; 1Ch 27.28 ; Lc 19.4), qui servaient surtout à l''alimentation du bétail, pour en hâter la maturation.'
  - type: text
    content: 'Amos répondit à Amatsia : Je ne suis ni prophète, ni fils de prophète ; je suis éleveur de bovins et cultivateur de sycomores. '
  '15':
  - type: note
    content: 'Cf. 2S 7.8 ; Ps 78.70s ; Jn 15.16 ; Ph 3.12. –  parle en prophète  : cf. 3.8+. –  mon peuple 8.2 ; 9.10 ; cf. 9.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a pris derrière le troupeau ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : Va, parle en prophète à Israël, mon peuple. '
  '16':
  - type: note
    content: ne vaticine pas Ez 21.2n  ; Mi 2.6n.
  - type: text
    content: 'Ecoute maintenant la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', toi qui dis : « Ne parle pas en prophète sur Israël et ne vaticine pas sur la maison d''Isaac ! » '
  '17':
  - type: note
    content: Dt 28.30ss. –  ta terre (cf. Gn 2.5n) sera partagée Mi 2.4. –  tu mourras… Es 22.18. –  terre impure Os 9.3s ; voir pur. –  exilé v. 11+.
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Ta femme se prostituera dans la ville,
  - type: text
    content: tes fils et tes filles tomberont par l'épée,
  - type: text
    content: ta terre sera partagée au cordeau ;
  - type: text
    content: toi, tu mourras sur une terre impure,
  - type: text
    content: et Israël sera exilé loin de sa terre.
  '2':
  - type: note
    content: 'V. 5 ; cf. Gn 18.22ss ; 20.7 ; Ex 17.11s ; 32.11ss,30ss ; Nb 11.2 ; 14.13ss ; 16.22 ; 21.7 ; 1S 7.8s ; 1R 18.42ss ; Es 37.4 ; Jr 14.7ss ; 15.1 ; 18.20 ; Ez 9.8 ; Ps 99.6 ; Dn 9.15ss ; Jc 5.16ss. –  Comment Jacob (3.13+) …  : versions anciennes qui relèvera Jacob ?'
  - type: text
    content: 'Comme ils dévoraient entièrement l''herbe du pays, je dis : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', pardonne, je t''en prie ! Comment Jacob subsisterait-il ? Il est si petit ! '
  '3':
  - type: note
    content: 'en eut du regret  : autres traductions y renonça ; changea d''avis à ce sujet ; eut pitié  ; cf. v. 6 ; Gn 6.6 ; Ex 32.14 ; Jr 18.8,10 ; 26.3 ; Jl 2.13s ; Jon 3.9s ; Za 8.14 ; Ps 110.4.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en eut du regret. Cela n''arrivera pas, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: 'Deuxième vision : le feu'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur Dieu proclamait…  : certains modifient le texte pour lire une flamme de feu s''approchait . –  le feu  : sans doute figure de la sécheresse ; cf. 4.6ss ; 8.11 ; Jl 1.19s ; 2.3 ; voir aussi Gn 19.24ss ; Es 66.16 ; Ez 21.1ss ; Mt 3.11/ /. –  le grand abîme Gn 1.2 ; 7.11 ; 49.25 ; Dt 33.13 ; Ps 24.2 ; 36.7. –  la parcelle (cf. 4.7) ou le champ , litt. la part , ce qui pourrait aussi signifier (ainsi LXX) la part du Seigneur , c.-à-d. le territoire de son peuple ; cf. Mi 2.4.'
  - type: text
    content: 'Voici ce que me fit voir le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' proclamait le jugement par le feu ; le feu avait dévoré le grand abîme et dévorait la parcelle. '
  '5':
  - type: text
    content: 'Je dis : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', arrête, je t''en prie ! Comment Jacob subsisterait-il ? Il est si petit ! '
  '6':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en eut du regret. Cela non plus n''arrivera pas, dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: 'Troisième vision : l''étain'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'près d''un mur  : autre traduction sur un mur  ; cf. 9.1. –  étain  : sens et traduction incertains ; le terme hébreu semble désigner un métal (probablement l''étain) ; il pourrait s''agir ici d''une sorte de fil à plomb, auquel cas l''image serait sur la norme qui juge de la rectitude du mur (cf. Es 30.13 ; Ez 13.10ss). Peut-être, par un système d''équerre, le même instrument servait-il de niveau, signe de destruction (on rase tout pour reconstruire droit) ; cf. v. 8s ; 2R 21.13 ; Es 28.17 ; 34.11 ; Lm 2.8. Certains, cependant, y voient plutôt une évocation des armes de guerre en bronze (étain + cuivre = bronze), cf. l''épée du v. 9 ; d''autres, une allusion à un rituel babylonien accompli lors de la destruction et de la fondation d''un temple (v. 9), peut-être doublé d''une allusion, par assonance, à un verbe signifiant gémir.'
  - type: text
    content: 'Voici ce qu''il me fit voir : le Seigneur se tenait près d''un mur d''étain, et il avait de l''étain. '
  '8':
  - type: note
    content: 'Que vois-tu 8.2 ; Jr 1.11 ; Za 4.2 ; 5.2. –  je ne lui passerai plus rien  : litt. je ne passerai plus pour lui  ; cf. v. 3,6 ; 8.2 ; expression comparable en Mi 7.18 ; Pr 19.11.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Que vois-tu, Amos ? Je répondis : De l''étain. Alors le Seigneur dit : Je mets de l''étain au sein d''Israël, mon peuple : je ne lui passerai plus rien.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: hauts lieux 1R 14.23 ; 2R 16.4 ; 17.9s ; 23.15s ; Jr 2.20 ; 3.6,13 ; Os 4.13 ; 10.8. –  Isaac / Israël 1.1n. –  je me dresserai ou je me lèverai  ; cf. Ps 3.8+ ; 7.7 ; 9.20 ; 10.12.
  - type: text
    content: Les hauts lieux d'Isaac seront dévastés ;
  - type: text
    content: les sanctuaires d'Israël seront réduits en ruines,
  - type: text
    content: et je me dresserai contre la maison de Jéroboam avec l'épée.
  - type: heading
    content: Amos est expulsé de Beth-El
