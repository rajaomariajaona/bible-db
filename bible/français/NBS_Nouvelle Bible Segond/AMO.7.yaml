        children:
        - type: text
          text: manger ton pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'métier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ', cf. 1S 9.7 ; 2R 5.11,15ss ; Ez 13.19 ; Mi 3.5,11.'
      marker-yv: yv-n
    - type: text
      text: 'Amatsia dit à Amos : Va-t''en, visionnaire, va te réfugier au pays de Juda ; là-bas, tu pourras manger ton pain et parler en prophète. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sanctuaire de roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 1R 12.26-33.'
      marker-yv: yv-n
    - type: text
      text: Mais ne continue pas à parler en prophète à Beth-El, car c'est un sanctuaire de roi, et une maison royale.
