      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jl 2.10s.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Amatsia, prêtre de Beth-El, fit dire à Jéroboam, roi d''Israël : Amos conspire contre toi au sein de la maison d''Israël ; le pays ne peut supporter toutes ses paroles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 9,17 ; 5.27+ ; 6.7 ; 9.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa terre '
      - type: usfm
        marker: ft
        children:
        - type: text
