          text: ' : sens et traduction incertains ; le terme hébreu semble désigner un métal (probablement l''étain) ; il pourrait s''agir ici d''une sorte de fil à plomb, auquel cas l''image serait sur la norme qui juge de la rectitude du mur (cf. Es 30.13 ; Ez 13.10ss). Peut-être, par un système d''équerre, le même instrument servait-il de niveau, signe de destruction (on rase tout pour reconstruire droit) ; cf. v. 8s ; 2R 21.13 ; Es 28.17 ; 34.11 ; Lm 2.8. Certains, cependant, y voient plutôt une évocation des armes de guerre en bronze (étain + cuivre = bronze), cf. '
