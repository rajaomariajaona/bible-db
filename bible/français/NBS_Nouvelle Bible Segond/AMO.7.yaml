        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il façonnait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un essaim de criquets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la coupe du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sens incertain ; peut-être la maison royale prélevait-elle pour sa cavalerie (1R 18.5) une partie de la première fenaison, tandis que le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'regain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était destiné au peuple.
      marker-yv: yv-n
    - type: text
      text: 'Voici ce que me fit voir le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : il façonnait des criquets au moment où le regain commençait à croître ; c''était le regain après la coupe du roi. '
