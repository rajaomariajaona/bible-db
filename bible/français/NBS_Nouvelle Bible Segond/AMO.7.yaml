        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss ; 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: éleveur de bovins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
