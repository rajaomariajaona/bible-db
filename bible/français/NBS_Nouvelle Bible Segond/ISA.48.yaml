document_id: ISA.48,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel, reproches, promesses à Israël
  - type: text
    content: ' '
  - type: note
    content: 'des eaux  : peut-être celles de l''accouchement. Tg de la semence de Juda. –  Juda 40.9 ; 44.26 ; 65.9. –  prêtez serment… 19.18 ; 65.16 ; Dt 6.13 ; 10.20 ; Jr 4.2. –  évoquez  : cf. 26.13n. –  sans loyauté ni justice  : 29.13 ; cf. Jr 5.2 ; Za 8.8.'
  - type: text
    content: Ecoutez, maison de Jacob,
  - type: text
    content: vous qui portez le nom d'Israël
  - type: text
    content: et qui êtes sortis des eaux de Juda ;
  - type: text
    content: 'vous qui prêtez serment par le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: et qui évoquez le Dieu d'Israël,
  - type: text
    content: mais sans loyauté ni justice !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pas pour de l''argent  : autre traduction pas dans l''argent , ce qui ferait allusion à un procédé de raffinage du plomb par l''argent (cf. Jr 6.27-30). –  éprouvé  : le verbe correspondant peut être traduit par choisir (cf. 42.1n), ici au sens de séparer des scories (cf. Za 13.9).'
  - type: text
    content: Je t'ai fait fondre,
  - type: text
    content: mais ce n'est pas pour de l'argent ;
  - type: text
    content: je t'ai éprouvé au creuset de l'affliction.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'De moi-même ou à cause de moi  ; cf. v. 9. –  me laisserais-je profaner  : d''après un ms de Qumrân, Syr et Vg. Le texte hébreu traditionnel porte serait-il profané  ; d''après LXX, certains le modifient pour lire comment mon nom serait-il profané ? Cf. 52.5 ; Ez 20.9,14 ; 36.22s. –  ma gloire à un autre 42.8.'
  - type: text
    content: De moi-même, de moi-même, j'agirai.
  - type: text
    content: Comment me laisserais-je profaner !
  - type: text
    content: Je ne donnerai pas ma gloire à un autre.
  '12':
  - type: text
    content: ' '
  - type: note
    content: C'est moi 41.4n. –  premier / dernier 41.4+.
  - type: text
    content: Ecoute-moi, Jacob,
  - type: text
    content: Israël, toi que j'ai appelé !
  - type: text
    content: C'est moi ! C'est moi qui suis le premier,
  - type: text
    content: c'est aussi moi qui suis le dernier.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 42.5s ; 45.12.
  - type: text
    content: C'est ma main qui fonde la terre,
  - type: text
    content: 'c''est ma main droite qui a tendu le ciel :'
  - type: text
    content: je les appelle,
  - type: text
    content: et ensemble ils se présentent.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Qui d''entre eux  : peut-être les astres, consultés par l''astrologie babylonienne ; de nombreux mss portent qui d''entre vous. –  annoncé 41.22+. –  Celui que le Seigneur aime  : Cyrus (44.26–45.1) ; cf. 53.10. –  Babylone 47.1ss. –  s''abattra sur  : sous-entendu dans le texte ( ?) ; au lieu de et son bras LXX a lu et (sur) sa descendance, les Chaldéens , ce qui correspondrait à une variante mineure du texte hébreu traditionnel.'
  - type: text
    content: Vous tous, rassemblez-vous, écoutez !
  - type: text
    content: Qui d'entre eux a annoncé cela ?
  - type: text
    content: 'Celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aime'
  - type: text
    content: fera ce qu'il désire à l'encontre de Babylone,
  - type: text
    content: et son bras s'abattra sur les Chaldéens.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'son œuvre (litt. sa voie, son chemin ) …  : autre traduction son voyage aboutira , cf. Gn 24.21 ; cf. Dt 28.29n.'
  - type: text
    content: C'est moi, moi seul, qui ai parlé,
  - type: text
    content: et je l'ai appelé ;
  - type: text
    content: je l'ai fait venir,
  - type: text
    content: et son œuvre réussira.
  '16':
  - type: text
    content: ' '
  - type: note
    content: en cachette 45.19+. –  avec son souffle ou avec son Esprit 42.1 ; 61.1 ; Mi 3.8.
  - type: text
    content: Approchez-vous de moi, écoutez !
  - type: text
    content: Dès le commencement, je n'ai pas parlé en cachette,
  - type: text
    content: dès l'origine de ces choses, j'étais là.
  - type: text
    content: 'Et maintenant, le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: m'a envoyé, avec son souffle.
  '17':
  - type: text
    content: ' '
  - type: note
    content: ton rédempteur 41.14n. –  Saint d'Israël 1.4+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton rédempteur,'
  - type: text
    content: 'le Saint d''Israël :'
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu,'
  - type: text
    content: je t'instruis pour ton profit,
  - type: text
    content: je te conduis dans la voie où tu marches.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Oh ! si…  : cf. Ps 81.14-17. –  Ta paix…  : cf. v. 22 ; 66.12.'
  - type: text
    content: Oh ! si tu prêtais attention à mes commandements !
  - type: text
    content: Ta paix serait comme un fleuve
  - type: text
    content: et ta justice comme les flots de la mer ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'descendance (44.3) / sable 10.22+ ; cf. Gn 22.17. –  ta progéniture  : litt. la progéniture de tes entrailles . –  son nom  : LXX ton nom  ; cf. 66.22 ; 1S 24.22 ; Ps 37.38. –  il ne disparaîtrait pas…  : autre traduction il ne serait pas détruit devant moi.'
  - type: text
    content: ta descendance serait comme le sable,
  - type: text
    content: ta progéniture comme les grains de sable ;
  - type: text
    content: son nom ne serait pas retranché, il ne disparaîtrait pas de devant moi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: ville sacrée (ou sainte ) 52.1. –  ils s'appuient Ps 71.6. –  le Seigneur (YHWH) des Armées 44.6+.
  - type: text
    content: Car ils tirent leur nom de la ville sacrée
  - type: text
    content: et ils s'appuient sur le Dieu d'Israël
  - type: text
    content: 'dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Sortez de Babylone v. 14 ; 52.11 ; cf. Jr 51.6 ; Ap 18.4. –  propagez-le  : litt. faites-le sortir  ; cf. Ps 126.1s. –  jusqu''aux extrémités  : litt. jusqu''à l''extrémité . –  assuré la rédemption 41.14n. –  son serviteur 41.8+.'
  - type: text
    content: Sortez de Babylone,
  - type: text
    content: fuyez d'entre les Chaldéens !
  - type: text
    content: Avec des cris de joie
  - type: text
    content: annoncez-le, faites-le entendre ;
  - type: text
    content: propagez-le jusqu'aux extrémités de la terre,
  - type: text
    content: 'dites : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a assuré la rédemption de Jacob, son serviteur !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 43.20 ; 49.10 ; cf. Ex 17.1-7 ; Ps 78.15s.
  - type: text
    content: Ils n'auront pas soif
  - type: text
    content: 'dans les lieux desséchés où il les conduira :'
  - type: text
    content: il fera jaillir pour eux l'eau du rocher,
  - type: text
    content: il fendra le rocher,
  - type: text
    content: et l'eau coulera.
  '22':
  - type: text
    content: ' '
  - type: note
    content: V. 17 ; 57.21 ; cf. 59.8.
  - type: text
    content: Il n'y a pas de paix,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour les méchants.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Depuis longtemps (litt. depuis lors , cf. 45.21) j'avais annoncé… 41.22+. –  ce qui s'est passé ou le passé, les événements du passé. –  c'est arrivé 44.8 ; 45.21.
  - type: text
    content: Depuis longtemps j'avais annoncé ce qui s'est passé ;
  - type: text
    content: c'est sorti de ma bouche,
  - type: text
    content: et je l'ai fait entendre ;
  - type: text
    content: tout à coup j'ai agi, et c'est arrivé.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'rétif  : litt. dur, raide  ; le texte joue sur les composants de l''expression habituellement traduite par être, se montrer rétif , litt. avoir la nuque raide  ; cf. Ex 32.9n  ; Dt 9.6,13 ; 2R 17.14 ; Jr 7.26. –  une barre  : litt. un nerf, un tendon.'
  - type: text
    content: Sachant que tu es rétif,
  - type: text
    content: que ta nuque est une barre de fer
  - type: text
    content: et que tu as un front de bronze,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 44.18.
  - type: text
    content: je te l'ai annoncé dès longtemps,
  - type: text
    content: je te l'ai fait entendre avant que cela n'arrive,
  - type: text
    content: 'afin que tu ne dises pas :'
  - type: text
    content: C'est mon idole qui l'a fait,
  - type: text
    content: c'est ma statue ou mon image de métal fondu
  - type: text
    content: qui l'a ordonné.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Tu entends…  : autre traduction tu as entendu ; vois (à présent) toute la chose (c.-à-d. la parole accomplie) ; certains modifient le texte hébreu traditionnel pour lire tu as entendu et vu tout cela ou tout cela, tu l''as entendu . –  choses nouvelles 42.9+. –  tenues en réserve  : le verbe hébreu correspondant est traduit par préserver en 42.6n. –  que tu ne connaissais pas  : cf. Jr 33.3.'
  - type: text
    content: Tu entends ! Regarde tout cela !
  - type: text
    content: Et vous, ne l'annoncerez-vous pas ?
  - type: text
    content: Je te fais entendre des choses nouvelles, dès maintenant,
  - type: text
    content: des choses tenues en réserve, que tu ne connaissais pas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''à ce jour  : litt. à la face du jour  ; on pourrait aussi rattacher cette expression à ce qui précède et comprendre elles sont créées… en plein jour.'
  - type: text
    content: Ce n'est pas depuis longtemps qu'elles sont créées,
  - type: text
    content: mais maintenant ;
  - type: text
    content: jusqu'à ce jour, tu n'en avais rien entendu,
  - type: text
    content: 'pour que tu ne dises pas :'
  - type: text
    content: Eh ! je le savais !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'n''a rien perçu  : litt. n''a pas été ouverte. –  traître Jr 5.11 ; Os 5.7. –  depuis le ventre de ta mère 44.2n. –  Révolté  : cf. 43.27 ; 46.8.'
  - type: text
    content: Tu n'as rien entendu,
  - type: text
    content: tu n'as rien su,
  - type: text
    content: ton oreille n'a rien perçu à l'avance.
  - type: text
    content: Car je savais que tu n'es qu'un traître,
  - type: text
    content: et que depuis le ventre de ta mère on t'appelle « Révolté ».
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'A cause de mon nom  : cf. v. 11 ; 43.25+ ; voir aussi Ex 32.11-14 ; 34.6 ; Ez 36.22. –  je me contiens  : litt. je me muselle.'
  - type: text
    content: A cause de mon nom,
  - type: text
    content: je suspends ma colère ;
  - type: text
    content: à cause de la louange qui m'est due,
  - type: text
    content: je me contiens envers toi,
  - type: text
    content: pour ne pas te retrancher.
