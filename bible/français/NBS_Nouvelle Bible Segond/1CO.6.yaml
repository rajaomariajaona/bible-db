document_id: 1CO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les procès entre frères
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: faire un procès
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être jugé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même verbe dans ce qui précède et dans la suite ; de même v. 6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les « injustes »
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. les non-chrétiens (voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: ') ; cf. v. 7ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.2+.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque l''un de vous a un différend avec un autre, comment ose-t-il faire un procès devant les « injustes », et non pas devant les saints ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dn 7.22 ; Ap 3.21+ ; 20.4 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.7s : « Au temps de l''intervention de Dieu, ils (les justes) resplendiront… Ils jugeront les nations et domineront sur les peuples. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jugeront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jugent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Rm 2.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en vous ; parmi vous.
    marker-yv: yv-n
  - type: text
    text: 'Ne savez-vous pas que ce sont les saints qui jugeront le monde ? Et si c''est par vous que le monde est jugé, seriez-vous indignes de juger les affaires de moindre importance ? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2P 2.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des affaires de la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même terme en Lc 21.34 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Ne savez-vous pas que nous jugerons des anges ? Pourquoi pas, à plus forte raison, des affaires de la vie ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des gens…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les méprisés dans '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Eglise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Rm 13.1-7 ; autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faites juges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faites asseoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceux qui sont les moins considérés dans l''Eglise '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(sous-entendu : ce serait encore mieux ! ou : c''est bien assez pour ces affaires-là).'
    marker-yv: yv-n
  - type: text
    text: 'Si donc vous avez des différends concernant des affaires de la vie, ce sont des gens dont l''Eglise ne fait aucun cas que vous faites juges ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à votre honte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.17+. – Cf. Lc 12.57.'
    marker-yv: yv-n
  - type: text
    text: 'Je le dis à votre honte. Ainsi, parmi vous, il n''y a pas un seul sage qui puisse prononcer un jugement entre ses frères ! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: non-croyants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.12 ; 10.27 ; 14.22s ; 2Co 6.14s.'
    marker-yv: yv-n
  - type: text
    text: Mais un frère fait un procès à un autre frère, et cela devant des non-croyants !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 5.39 ; 1Th 5.15 ; 1P 3.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dépouiller
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'priver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 7.5, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire du tort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Mc 10.19, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'frustrer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Jc 5.4.
    marker-yv: yv-n
  - type: text
    text: 'Pour vous, c''est déjà une défaite que d''avoir des procès entre vous. Pourquoi ne souffrez-vous pas plutôt une injustice ? Pourquoi ne vous laissez-vous pas plutôt dépouiller ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C'est vous qui pratiquez l'injustice et qui dépouillez les autres – et ce sont vos frères !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'n''hériteront pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.50 ; Ga 5.19-21 ; Ep 5.5 ; Ap 21.7s ; 22.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne vous égarez pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne vous laissez pas égarer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.33 ; Ga 6.7 ; cf. Lc 21.8 ; Jc 1.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux qui se livrent à l''inconduite sexuelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les hommes qui couchent avec des hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cette formule rend deux termes grecs qui désignent respectivement les partenaires passif et actif dans les pratiques homosexuelles masculines ; on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ni les efféminés, ni les pédérastes.
    marker-yv: yv-n
  - type: text
    text: 'Ne savez-vous pas que les injustes n''hériteront pas le royaume de Dieu ? Ne vous égarez pas : ce ne sont pas ceux qui se livrent à l''inconduite sexuelle, à l''idolâtrie, à l''adultère, les hommes qui couchent avec des hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 1.29+.
    marker-yv: yv-n
  - type: text
    text: 'les voleurs, les gens avides, les ivrognes, ceux qui s''adonnent aux insultes ou à la rapacité qui hériteront le royaume de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous avez été lavés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous vous êtes lavés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ac 22.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ep 5.26 ; Tt 3.5 ; Hé 10.22 ; 2P 1.9 ; cf. Ez 16.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'consacrés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sanctifiés, rendus saints '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',30 ; cf. 2Th 2.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'justifiés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 3.24+ ; cf. 1Tm 3.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au nom… et dans l''Esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 1Jn 2.12.
    marker-yv: yv-n
  - type: text
    text: Et pourtant c'est là ce que vous étiez – quelques-uns d'entre vous. Mais vous avez été lavés, vous avez été consacrés, vous avez été justifiés par le nom du Seigneur Jésus-Christ et par l'Esprit de notre Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Glorifiez Dieu dans votre corps
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tout m''est permis… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.23 ; cf. 3.21-23 ; 7.35 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '37.27s : « Vois ce qui est mauvais pour toi et ne te l''accorde pas, car tout ne convient pas à tous et tous ne trouvent pas en tout leur agrément. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ne permettrai à rien…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe correspondant est apparenté à celui qui est traduit précédemment par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: permettre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Ga 5.1,13.
    marker-yv: yv-n
  - type: text
    text: 'Tout m''est permis, mais tout n''est pas utile ; tout m''est permis, mais moi, je ne permettrai à rien d''avoir autorité sur moi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les aliments sont pour le ventre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 15.17/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.4 ; 15.35ss ; Rm 6.12 ; 8.10-13,23 ; 12.1 ; 2Co 4.10 ; Ph 1.20 ; 3.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inconduite sexuelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour le Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Th 4.3-5.
    marker-yv: yv-n
  - type: text
    text: 'Les aliments sont pour le ventre, comme le ventre pour les aliments ; Dieu réduira à rien celui-ci comme ceux-là. Mais le corps n''est pas pour l''inconduite sexuelle : il est pour le Seigneur, comme le Seigneur pour le corps. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réveillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: relevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Rm 4.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous éveillera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous a éveillés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''autres '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous éveille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe grec est apparenté a celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: réveiller
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; tous deux peuvent avoir le sens de '
    - type: usfm
