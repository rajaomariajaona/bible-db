document_id: 1CO.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les procès entre frères
  - type: text
    content: ' '
  - type: note
    content: 'faire un procès  : litt. être jugé , même verbe dans ce qui précède et dans la suite ; de même v. 6. –  les « injustes » , c.-à-d. les non-chrétiens (voir justice) ; cf. v. 7ss. –  saints  : cf. 1.2+.'
  - type: text
    content: 'Lorsque l''un de vous a un différend avec un autre, comment ose-t-il faire un procès devant les « injustes », et non pas devant les saints ? '
  '10':
  - type: note
    content: Rm 1.29+.
  - type: text
    content: 'les voleurs, les gens avides, les ivrognes, ceux qui s''adonnent aux insultes ou à la rapacité qui hériteront le royaume de Dieu. '
  '11':
  - type: note
    content: 'vous avez été lavés ou vous vous êtes lavés Ac 22.16n  ; Ep 5.26 ; Tt 3.5 ; Hé 10.22 ; 2P 1.9 ; cf. Ez 16.9. –  consacrés ou sanctifiés, rendus saints 1.2n,30 ; cf. 2Th 2.13. –  justifiés Rm 3.24+ ; cf. 1Tm 3.16. –  par le nom…  : autre traduction au nom… et dans l''Esprit cf. 1Jn 2.12.'
  - type: text
    content: Et pourtant c'est là ce que vous étiez – quelques-uns d'entre vous. Mais vous avez été lavés, vous avez été consacrés, vous avez été justifiés par le nom du Seigneur Jésus-Christ et par l'Esprit de notre Dieu.
  - type: heading
    content: Glorifiez Dieu dans votre corps
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Tout m''est permis… 10.23 ; cf. 3.21-23 ; 7.35 ; Siracide 37.27s : « Vois ce qui est mauvais pour toi et ne te l''accorde pas, car tout ne convient pas à tous et tous ne trouvent pas en tout leur agrément. » –  je ne permettrai à rien…  : le verbe correspondant est apparenté à celui qui est traduit précédemment par permettre  ; cf. Ga 5.1,13.'
  - type: text
    content: 'Tout m''est permis, mais tout n''est pas utile ; tout m''est permis, mais moi, je ne permettrai à rien d''avoir autorité sur moi. '
  '13':
  - type: note
    content: 'Les aliments sont pour le ventre Mt 15.17/ /. –  le corps  : cf. 7.4 ; 15.35ss ; Rm 6.12 ; 8.10-13,23 ; 12.1 ; 2Co 4.10 ; Ph 1.20 ; 3.21. –  inconduite sexuelle 5.1n. –  pour le Seigneur 1Th 4.3-5.'
  - type: text
    content: 'Les aliments sont pour le ventre, comme le ventre pour les aliments ; Dieu réduira à rien celui-ci comme ceux-là. Mais le corps n''est pas pour l''inconduite sexuelle : il est pour le Seigneur, comme le Seigneur pour le corps. '
  '14':
  - type: note
    content: 'réveillé ou relevé, Rm 4.24n. –  nous éveillera  : certains mss portent nous a éveillés, d''autres nous éveille  ; le verbe grec est apparenté a celui qui est traduit par réveiller  ; tous deux peuvent avoir le sens de ressusciter  ; celui qui est ici rendu par éveiller n''apparaît qu''en Rm 9.17 (susciter) ; cf. 15.15,20 ; Rm 8.9-11 ; 2Co 4.14 ; Ga 1.1. –  par sa puissance  : cf. Mc 12.24 ; 2Co 13.4.'
  - type: text
    content: 'Or Dieu, qui a réveillé le Seigneur, nous éveillera aussi par sa puissance. '
  '15':
  - type: note
    content: 'votre corps fait partie du corps du Christ  : litt. vos corps sont des parties du corps (ou des membres) de Christ  ; 10.17 ; 12.12s,27 ; Rm 6.13n  ; 12.1,4s. –  Prendrai-je  : autre traduction arracherai-je, cf. 5.2n. –  des parties du corps  : litt. les parties du corps (ou des membres). –  prostituée  : le terme grec est apparenté à ceux qui ont été traduits par inconduite sexuelle (v. 9,18 ; 5.1n,9n).'
  - type: text
    content: 'Ne savez-vous pas que votre corps fait partie du corps du Christ ? Prendrai-je donc des parties du corps du Christ pour en faire des parties d''un corps de prostituée ? Jamais de la vie ! '
  '16':
  - type: note
    content: 'qui s''attache  : autre traduction qui s''unit  ; LXX emploie un verbe apparenté en Gn 2.24. –  avec elle  : sous-entendu dans le texte ; de même avec lui au v. 17. –  il (c.-à-d. Dieu  ?) dit  : autres traductions il est dit ; l''Ecriture dit  ; cf. Mt 19.5/ /. – Voir chair.'
  - type: text
    content: 'Ne savez-vous pas que celui qui s''attache à la prostituée est un seul corps avec elle ? En effet, il dit : '
  - type: text
    content: Les deux seront une seule chair
  - type: text
    content: '. '
  '17':
  - type: note
    content: 's''attache (ou s''unit) au Seigneur Dt 10.20. –  avec lui  : sous-entendu dans le texte. –  un seul Esprit (ou un seul esprit) 15.45 ; 2Co 3.17 ; voir aussi Jn 17.21-23 ; Ga 2.20.'
  - type: text
    content: Mais celui qui s'attache au Seigneur est avec lui un seul Esprit.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Fuyez 10.14 ; 1Tm 6.11. –  l''inconduite sexuelle 5.1n  ; cf. Ac 15.20. – Voir péché . –  contre son propre corps  : cf. Siracide 23.16 : « L''homme qui livre à l''impureté la chair de son corps, qui n''a de cesse que le feu ne le brûle. »'
  - type: text
    content: 'Fuyez l''inconduite sexuelle. Tout autre péché qu''un homme commet est extérieur au corps ; mais celui qui se livre à l''inconduite sexuelle pèche contre son propre corps. '
  '19':
  - type: note
    content: '3.16+ ; 2Co 6.16 ; cf. Jn 2.21 ; 1Th 4.8. –  sanctuaire de l''Esprit saint  : voir temple. –  vous ne vous appartenez pas… 3.23 ; Rm 14.7.'
  - type: text
    content: 'Ne le savez-vous pas ? Votre corps est le sanctuaire de l''Esprit saint qui est en vous et que vous tenez de Dieu ; vous ne vous appartenez pas à vous-mêmes, '
  '2':
  - type: note
    content: 'Cf. Dn 7.22 ; Ap 3.21+ ; 20.4 ; Sagesse 3.7s : « Au temps de l''intervention de Dieu, ils (les justes) resplendiront… Ils jugeront les nations et domineront sur les peuples. » –  jugeront ou jugent, cf. Rm 2.16n. –  par vous  : autres traductions en vous ; parmi vous.'
  - type: text
    content: 'Ne savez-vous pas que ce sont les saints qui jugeront le monde ? Et si c''est par vous que le monde est jugé, seriez-vous indignes de juger les affaires de moindre importance ? '
  '20':
  - type: note
    content: 'achetés (autre traduction rachetés) à un prix  : cf. 7.23 ; Ga 4.5 ; 1P 1.18s ; voir aussi Rm 3.24+ ; voir aussi rédemption. –  dans votre corps  : certains mss ajoutent et dans votre esprit, qui appartiennent à Dieu.'
  - type: text
    content: car vous avez été achetés à un prix. Glorifiez donc Dieu dans votre corps.
  '3':
  - type: note
    content: 'des anges  : cf. 2P 2.4. –  des affaires de la vie  : même terme en Lc 21.34 (de la vie).'
  - type: text
    content: 'Ne savez-vous pas que nous jugerons des anges ? Pourquoi pas, à plus forte raison, des affaires de la vie ? '
  '4':
  - type: note
    content: 'des gens…  : litt. les méprisés dans l''Eglise  ; cf. Rm 13.1-7 ; autre traduction possible faites juges (litt. faites asseoir) ceux qui sont les moins considérés dans l''Eglise (sous-entendu : ce serait encore mieux ! ou : c''est bien assez pour ces affaires-là).'
  - type: text
    content: 'Si donc vous avez des différends concernant des affaires de la vie, ce sont des gens dont l''Eglise ne fait aucun cas que vous faites juges ! '
  '5':
  - type: note
    content: 'à votre honte 4.14+. –  sage  : cf. 1.17+. – Cf. Lc 12.57.'
  - type: text
    content: 'Je le dis à votre honte. Ainsi, parmi vous, il n''y a pas un seul sage qui puisse prononcer un jugement entre ses frères ! '
  '6':
  - type: note
    content: 'V. 1n. –  non-croyants  : cf. 7.12 ; 10.27 ; 14.22s ; 2Co 6.14s.'
  - type: text
    content: Mais un frère fait un procès à un autre frère, et cela devant des non-croyants !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 5.39 ; 1Th 5.15 ; 1P 3.9. –  dépouiller  : le même verbe est traduit par priver en 7.5, faire du tort en Mc 10.19, frustrer en Jc 5.4.'
  - type: text
    content: 'Pour vous, c''est déjà une défaite que d''avoir des procès entre vous. Pourquoi ne souffrez-vous pas plutôt une injustice ? Pourquoi ne vous laissez-vous pas plutôt dépouiller ? '
  '8':
  - type: text
    content: C'est vous qui pratiquez l'injustice et qui dépouillez les autres – et ce sont vos frères !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'n''hériteront pas… 15.50 ; Ga 5.19-21 ; Ep 5.5 ; Ap 21.7s ; 22.15. –  Ne vous égarez pas ou ne vous laissez pas égarer 15.33 ; Ga 6.7 ; cf. Lc 21.8 ; Jc 1.16. –  ceux qui se livrent à l''inconduite sexuelle 5.1n,9n. –  les hommes qui couchent avec des hommes  : cette formule rend deux termes grecs qui désignent respectivement les partenaires passif et actif dans les pratiques homosexuelles masculines ; on pourrait aussi traduire ni les efféminés, ni les pédérastes.'
  - type: text
    content: 'Ne savez-vous pas que les injustes n''hériteront pas le royaume de Dieu ? Ne vous égarez pas : ce ne sont pas ceux qui se livrent à l''inconduite sexuelle, à l''idolâtrie, à l''adultère, les hommes qui couchent avec des hommes, '
