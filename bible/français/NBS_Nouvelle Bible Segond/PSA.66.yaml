    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par le feu et par l''eau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 43.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous donner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'abondance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''ivresse '
    - type: usfm
      marker: ft
      children:
      - type: text
