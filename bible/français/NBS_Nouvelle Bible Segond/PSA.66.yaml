  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui '
      - type: usfm
        marker: w
        children:
        - type: text
          text: craignez
      - type: text
        text: ' Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je raconterai…
    - type: usfm
      marker: ft
      children:
