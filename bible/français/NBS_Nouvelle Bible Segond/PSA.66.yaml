document_id: PSA.66,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu le libérateur
  - type: text
    content: ' '
  - type: note
    content: Cf. 65.1+. –  Acclame 27.6+. –  terre entière v. 4 ; cf. 8.2 ; 96.1 ; 98.4 ; 100.1 ; 1Ch 16.23.
  - type: text
    content: Du chef de chœur. Chant. Psaume.
  - type: text
    content: Acclame Dieu,
  - type: text
    content: terre entière !
  '10':
  - type: text
    content: ' '
  - type: note
    content: tu nous as sondés 7.10n  ; 17.3 ; 26.2 ; Jr 12.3 ; Pr 17.3 ; 1Ch 29.17. –  comme on éprouve (ou comme on affine ) l'argent Es 48.10 ; Jr 9.6 ; Za 13.9 ; 1P 1.7.
  - type: text
    content: Car tu nous as sondés, ô Dieu,
  - type: text
    content: tu nous as éprouvés comme on éprouve l'argent.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'un pesant fardeau  : le terme hébreu correspondant n''apparaît qu''ici et sa traduction est incertaine ; cf. 129.3.'
  - type: text
    content: Tu nous avais amenés dans le filet,
  - type: text
    content: tu avais mis sur nos reins un pesant fardeau,
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'tu avais fait chevaucher ou tu avais fait circuler (en char)  : cf. 18.11n  ; Dt 32.13n. –  des hommes  : litt. un homme  ; selon certains la métaphore se rapporte au triomphe des ennemis d''Israël, selon d''autres à l''oppression du peuple par un tyran ; voir aussi Os 10.11. –  par le feu et par l''eau Es 43.2. –  nous donner  : sous-entendu dans le texte. –  l''abondance  : litt. l''ivresse ou, d''après des versions anciennes, pour reprendre souffle  ; cf. 23.5.'
  - type: text
    content: tu avais fait chevaucher des hommes à notre tête,
  - type: text
    content: nous avions passé par le feu et par l'eau,
  - type: text
    content: mais tu nous en as fait sortir pour nous donner l'abondance.
  '13':
  - type: text
    content: ' '
  - type: note
    content: vœux 22.26+.
  - type: text
    content: J'irai à ta maison avec des holocaustes,
  - type: text
    content: je m'acquitterai envers toi de mes vœux,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ceux que mes lèvres…  : litt. ceux pour lesquels mes lèvres se sont ouvertes.'
  - type: text
    content: ceux que mes lèvres ont exprimés,
  - type: text
    content: et que ma bouche a prononcés dans ma détresse.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 51.21 ; Lv 9.3s. –  Je sacrifierai  : litt. je ferai , sans doute au sens de je préparerai.'
  - type: text
    content: Je t'offrirai de gras holocaustes,
  - type: text
    content: des béliers avec de l'encens.
  - type: text
    content: 'Je sacrifierai du gros bétail avec des boucs. '
  - type: text
    content: Pause.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'qui craignez Dieu 15.4+. –  Je raconterai…  : cf. 9.2+ ; 22.23 ; Mc 5.19.'
  - type: text
    content: Venez, écoutez, vous tous qui craignez Dieu ! Je raconterai
  - type: text
    content: ce qu'il a fait pour moi.
  '17':
  - type: text
    content: Je l'ai invoqué de ma bouche,
  - type: text
    content: et ma langue a pu l'exalter.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Si j'avais vu ou si j'avais eu en vue le mal… , c.-à-d. si j'avais pensé à mal  ; cf. Jn 9.31.
  - type: text
    content: Si j'avais vu le mal dans mon cœur,
  - type: text
    content: le Seigneur ne m'aurait pas entendu.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'à ma prière  : litt. à la voix (ou au son ) de ma prière  ; cf. 17.1 ; 65.3 ; 116.1n.'
  - type: text
    content: Or Dieu m'a entendu,
  - type: text
    content: il a été attentif à ma prière.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Chantez… 7.18n  ; 18.50 ; 68.5. –  rendez-lui gloire…  : traduction incertaine, litt. faites de sa louange une gloire ( ?) ou, avec une légère modification, rendez-lui la gloire de sa louange (en parallèle avec la gloire de son nom ) ; cf. 29.2 ; 79.9 ; 96.8 ; 115.1 ; Es 42.12.'
  - type: text
    content: Chantez la gloire de son nom,
  - type: text
    content: rendez-lui gloire par la louange !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit Dieu 28.6+ ; cf. 31.22 ; Gn 24.27. –  et qui ne m''a pas retiré…  : litt. ni sa fidélité (loin) de moi.'
  - type: text
    content: Béni soit Dieu,
  - type: text
    content: qui n'a pas écarté ma prière
  - type: text
    content: et qui ne m'a pas retiré sa fidélité !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'redoutables 145.6 ; Ex 34.10. –  tes ennemis te flattent  : cf. 18.45 ; 81.16 ; Dt 33.29n.'
  - type: text
    content: 'Dites à Dieu : Que tes œuvres sont redoutables !'
  - type: text
    content: A cause de ta grande force, tes ennemis te flattent.
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 1-2+. –  se prosterne Es 49.23 ; 66.23 ; Ez 46.3.
  - type: text
    content: Toute la terre se prosterne devant toi et chante pour toi ;
  - type: text
    content: 'elle chante ton nom. '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Venez voir… 46.9. –  pour les humains Jr 32.19.
  - type: text
    content: Venez voir les œuvres de Dieu !
  - type: text
    content: Ses hauts faits pour les humains sont redoutables.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 74.15 ; 114.3-5 ; voir Ex 14.16,21 ; Jos 3.14ss ; Es 44.27 ; 50.2.
  - type: text
    content: Il changea la mer en terre ferme,
  - type: text
    content: 'on traversa le fleuve à pied :'
  - type: text
    content: c'est là que nous nous sommes réjouis en lui.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il domine pour toujours  : certains comprennent il domine (ou il gouverne ) l''univers  ; cf. 9.8 ; 29.10 ; 145.13. –  ses yeux surveillent 5.4n  ; cf. 11.4+ ; 33.14.'
  - type: text
    content: Il domine pour toujours par sa puissance,
  - type: text
    content: 'ses yeux surveillent les nations :'
  - type: text
    content: 'que les rebelles ne s''élèvent pas ! '
  - type: text
    content: Pause.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Peuples 22.28ss ; 117.1 ; 145.21 ; Es 42.10ss ; 44.23 ; 49.13.
  - type: text
    content: Peuples, bénissez notre Dieu,
  - type: text
    content: faites retentir sa louange !
  '9':
  - type: text
    content: ' '
  - type: note
    content: il ne nous a pas laissés… 121.3 ; cf. 55.23.
  - type: text
    content: Il nous amène à la vie,
  - type: text
    content: et il ne nous a pas laissés vaciller sur nos jambes.
