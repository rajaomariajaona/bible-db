- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 51.21 ; Lv 9.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je '
