        text: 22.26+.
    marker-yv: yv-n
  - type: text
    text: J'irai à ta maison avec des holocaustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m'acquitterai envers toi de mes vœux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux que mes lèvres…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
