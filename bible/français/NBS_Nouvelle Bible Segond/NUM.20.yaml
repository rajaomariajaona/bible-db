        - type: text
          text: ' : cf. v. 12,23ss.'
      marker-yv: yv-n
    - type: text
      text: Les Israélites, toute la communauté, arrivèrent dans le désert de Tsîn le premier mois, et le peuple s'installa à Qadesh. C'est là que Miriam mourut et fut ensevelie.
  '10':
  - type: usfm
    marker: p
    children:
