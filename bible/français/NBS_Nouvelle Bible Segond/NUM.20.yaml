document_id: NUM.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les eaux de Meriba
  - type: text
    content: ' '
  - type: note
    content: 'Tsîn 13.21n. –  Qadesh 13.26 ; 33.36ss ; Dt 1.46. –  Miriam 12.1+ss ; Dt 24.9. –  mourut  : cf. v. 12,23ss.'
  - type: text
    content: Les Israélites, toute la communauté, arrivèrent dans le désert de Tsîn le premier mois, et le peuple s'installa à Qadesh. C'est là que Miriam mourut et fut ensevelie.
  '10':
  - type: note
    content: 'réunirent l''assemblée  : litt. assemblèrent l''assemblée, cf. v. 8. –  en face du rocher  : cf. 3.4 ; 17.8 ; 19.4 ; Lv 17.5 ; Dt 16.16 ; 31.11 ; 2S 7.18 ; voir aussi Ps 18.3 ; 31.4 ; 42.10 ; 1Co 10.4. –  Moïse leur dit  : litt. il leur dit. –  rebelles  : cf. v. 24 ; 27.14. –  Est-ce…  : cf. Gn 18.13.'
  - type: text
    content: 'Moïse et Aaron réunirent l''assemblée en face du rocher. Moïse leur dit : Ecoutez, je vous prie, rebelles ! Est-ce de ce rocher que nous ferons sortir de l''eau pour vous ? '
  '11':
  - type: note
    content: 'deux fois  : autre traduction une seconde fois ; Targum (Tg) du pseudo-Jonathan : La première fois, il laissa dégoutter du sang et, la seconde fois, il sortit de l''eau en abondance (cf. Jn 7.38 ; 19.34 ; 1Co 10.4). –  son bâton  : LXX, Vg le bâton, cf. v. 8+. –  de l''eau en abondance  : la même expression est traduite par de grandes eaux en 24.7 etc. –  La communauté but  : cf. Ex 17.6 ; voir aussi Es 43.20 ; 49.10.'
  - type: text
    content: Puis Moïse leva la main et frappa deux fois le rocher avec son bâton. Il en sortit de l'eau en abondance. La communauté but, et son bétail aussi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'La faute de Moïse n''est pas clairement définie par le texte, on l''a souvent cherchée dans les paroles rapportées au v. 10 ou dans le geste ( frapper deux fois ) décrit au v. 11 ; cf. v. 24ss ; 14.27-38 ; Dt 1.35-37 ; 3.23ss ; 4.21ss ; 34.5 ; Ps 106.32s. –  en moi  : précision omise par LXX ; sur la foi , cf. 14.11 ; Gn 15.6 ; Ex 14.31 ; 19.9. –  montrer ma sainteté  : terme apparenté au nom de Qadesh v. 1 ; cf. v. 13 ; 27.14 ; Dt 32.51.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : Parce que vous n''avez pas eu assez de foi en moi pour montrer ma sainteté sous les yeux des Israélites, vous ne ferez pas entrer cette assemblée dans le pays que je lui donne. '
  '13':
  - type: note
    content: Le nom Meriba est apparenté en hébreu au verbe traduit par cherchèrent querelle (v. 3, cf. v. 24n) ; 27.14n  ; Ex 17.7n  ; Dt 32.51 ; 33.8 ; Ez 47.19 ; 48.28 ; Ps 81.8 ; 95.8 ; 106.32. –  qui montra sa sainteté (ou dont la sainteté se montra) parmi eux (ou en eux, contre eux, à leurs dépens) v. 12+ ; cf. Lv 10.3n  ; Ez 20.41+. –  Smr et un témoin de Syr insèrent ici un dialogue entre Dieu et Moïse inspiré de Dt 3.24ss.
  - type: text
    content: 'Ce sont là les eaux de Meriba (« Querelle ») où les Israélites cherchèrent querelle au '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui montra sa sainteté parmi eux.'
  - type: heading
    content: Le roi d'Edom refuse de laisser passer Israël
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.21ss ; Dt 2.2ss ; Jg 11.17ss. –  Moïse envoya des messagers au roi d''Edom  : autre lecture possible du texte hébreu  : Moïse envoya des messagers : Au roi d''Edom. Ainsi… –  Edom (surnom d''Esaü en Gn 36.1+,8,19) désigne un territoire au sud-sud-est de la mer Morte Gn 36.31ss ; cf. 1S 14.47 ; 2S 8.13s ; 1R 11.14ss ; 2R 8.20ss ; 14.7 ; 16.6 ; Es 63.1s ; Ez 25.12ss ; 35 ; Ab 1n,6,8 ; Ps 60. –  Israël, ton frère Gn 25.21ss ; 32–33 ; 36.1ss ; Am 1.11. –  Tu sais…  : cf. 14.13s ; Es 52.10. –  choses pénibles Ex 18.8 ; le terme évoque habituellement la fatigue ou la lassitude, cf. Ml 1.13n  ; Lm 3.5. –  nous ont atteints  : litt. nous ont trouvés.'
  - type: text
    content: 'De Qadesh, Moïse envoya des messagers au roi d''Edom : Ainsi parle Israël, ton frère : Tu sais toutes les choses pénibles qui nous ont atteints. '
  '15':
  - type: note
    content: 'Cf. Dt 26.5ss ; voir aussi Ex 3.7 ; 12.40. –  les Egyptiens  : autre traduction l''Egypte.'
  - type: text
    content: 'Nos pères sont descendus en Egypte, et nous y avons habité longtemps. Mais les Egyptiens nous ont maltraités, nous et nos pères. '
  '16':
  - type: note
    content: 'Ex 2.23ss. –  un messager  : autre traduction un ange  ; Ex 14.19 ; 23.20,23 ; 32.34 ; 33.2. –  Qadesh v. 1+.'
  - type: text
    content: 'Nous avons crié vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il nous a entendus. Il a envoyé un messager et nous a fait sortir d''Egypte. Nous voici à Qadesh, ville située à l''extrémité de ton territoire. '
  '17':
  - type: note
    content: 'passer par ton pays 21.22 ; Dt 2.27s. –  nous ne boirons pas…  : cf. Dt 2.6. –  la route royale  : sans doute la piste principale qui traversait le pays.'
  - type: text
    content: 'Laisse-nous, je te prie, passer par ton pays ; nous ne passerons pas dans les champs ni dans les vignes, et nous ne boirons pas l''eau des puits ; nous suivrons la route royale, sans nous écarter ni à droite ni à gauche, jusqu''à ce que nous ayons passé ton territoire. '
  '18':
  - type: text
    content: 'Edom lui dit : Tu ne passeras pas chez moi, sinon je sortirai à ta rencontre avec l''épée. '
  '19':
  - type: note
    content: 'sans m''arrêter  : litt. avec mes pieds ou sur mes pieds.'
  - type: text
    content: 'Les Israélites lui dirent : Nous monterons par la route ; si nous buvons de ton eau, moi et mes troupeaux, j''en paierai le prix ; ce n''est pas une affaire. Je veux seulement passer, sans m''arrêter. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'pas d''eau  : cf. 21.16ss ; Ex 17.1-7 ; Dt 8.14ss ; Ps 106.32s ; voir aussi Dt 8.15 ; Es 48.21 ; Ps 78.15ss ; 105.41 ; 114.8 ; Né 9.15. –  contre Moïse…  : cf. 21.4ss.'
  - type: text
    content: 'Il n''y avait pas d''eau pour la communauté ; ils se rassemblèrent contre Moïse et Aaron. '
  '20':
  - type: note
    content: 'des troupes nombreuses  : litt. un peuple lourd. –  main forte  : cf. Ex 6.1+ ; Dt 3.24+ ; voir aussi Dt 4.34+.'
  - type: text
    content: 'Il répondit : Tu ne passeras pas ! Et Edom sortit à sa rencontre avec des troupes nombreuses, d''une main forte. '
  '21':
  - type: note
    content: 'Cf. Dt 2.29 ; le Targum (Tg) du pseudo-Jonathan ajoute  : Israël se détourna de lui, car ils avaient reçu ordre de devant la Parole des cieux de ne pas engager la bataille avec eux… le moment n''était pas encore arrivé où la vengeance à tirer d''Edom serait remise entre leurs mains. –  s''écarta  : autre traduction se détourna.'
  - type: text
    content: Ainsi Edom refusa de laisser passer Israël sur son territoire. Alors Israël s'écarta de lui.
  - type: heading
    content: La mort d'Aaron
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Hor-la-Montagne  : point non identifié entre Qadesh, le Néguev et Edom (21.1 ; 33.37), soit à la frontière sud de Canaan (à ne pas confondre avec Hor-la-Montagne de 34.7). D''après les indications de Flavius Josèphe, il s''agirait du djebel Haroun (1 396 m), près de Pétra.'
  - type: text
    content: 'Ils partirent de Qadesh. Les Israélites, toute la communauté, arrivèrent à Hor-la-Montagne. '
  '23':
  - type: note
    content: 'à (litt. sur) la frontière  : autre traduction près de la frontière.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron, à Hor-la-Montagne, à la frontière d''Edom : '
  '24':
  - type: note
    content: 'être réuni aux siens, c.-à-d. mourir 33.38s ; Dt 10.6 ; cf. Gn 25.8n  ; 1R 1.21 ; comparer avec le récit de la mort de Moïse en Dt 34.1ss ; voir Nb 27.12ss ; Dt 32.48ss ; voir aussi Hé 5.1ss ; 7.23ss. –  il n''entrera pas  : LXX vous n''entrerez pas. –  vous avez été rebelles (v. 10), terme qui fait également assonance avec Meriba (v. 13n). –  mes ordres  : litt. ma bouche  ; LXX vous m''avez méprisé  ; cf. v. 12+s.'
  - type: text
    content: 'Aaron va être réuni aux siens ; il n''entrera pas dans le pays que je donne aux Israélites, parce que vous avez été rebelles à mes ordres, aux eaux de Meriba. '
  '25':
  - type: note
    content: LXX ajoute à la fin sous les yeux de toute la communauté, cf. v. 27.
  - type: text
    content: 'Prends Aaron et Eléazar, son fils, et fais-les monter à Hor-la-Montagne. '
  '26':
  - type: note
    content: 'Aaron  : voir prêtre. –  ses vêtements Ex 28.2 ; Lv 8.7ss ; cf. Es 22.21. –  tu en revêtiras Eléazar, son fils  : cf. 3.3 ; Ex 29.4ss,29s. –  Eléazar 17.2+ ; cf. 3.1-4 ; 25.7ss ; Lv 10.6 ; 1Ch 5.29s. –  aux siens  : sous-entendu dans le texte, cf. v. 24.'
  - type: text
    content: 'Dépouille Aaron de ses vêtements, et tu en revêtiras Eléazar, son fils. C''est là qu''Aaron sera réuni aux siens ; c''est là qu''il mourra. '
  '27':
  - type: note
    content: 'Ils montèrent  : LXX il les fit monter.'
  - type: text
    content: 'Moïse fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné. Ils montèrent à Hor-la-Montagne, sous les yeux de toute la communauté. '
  '28':
  - type: note
    content: 33.38 ; cf. 35.25.
  - type: text
    content: 'Moïse dépouilla Aaron de ses vêtements et en revêtit Eléazar, son fils. Aaron mourut là, au sommet de la montagne. Puis Moïse et Eléazar descendirent de la montagne. '
  '29':
  - type: note
    content: Cf. Dt 34.8 ; voir aussi Gn 50.3,10 ; 1S 25.1 ; 31.13.
  - type: text
    content: Toute la communauté vit qu'Aaron avait expiré, et toute la maison d'Israël pleura Aaron pendant trente jours.
  '3':
  - type: note
    content: 'chercha querelle v. 13n  ; cf. 11.1ss ; 14.1ss ; 16.2ss ; 17.6 ; Ex 14.10ss ; 16.2s ; 17.2s. –  péri  : litt. expiré, cf. v. 29 ; 17.27n,28n  ; voir aussi 16.32,35 ; 17.13ss.'
  - type: text
    content: 'Le peuple chercha querelle à Moïse. Ils dirent : Si seulement nous avions péri quand nos frères ont péri devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '4':
  - type: note
    content: 'si nous devons y mourir  : LXX a lu pour nous tuer, cf. 21.5.'
  - type: text
    content: 'Pourquoi avez-vous amené l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans ce désert, si nous devons y mourir, nous et notre bétail ? '
  '5':
  - type: note
    content: 'monter d''Egypte Gn 12.10n. –  hostile  : litt. mauvais. –  ni figuier, ni vigne…  : cf. 13.23 ; 16.12ss ; Dt 8.7s ; Jl 1.12 ; Ag 2.19.'
  - type: text
    content: 'Pourquoi nous avez-vous fait monter d''Egypte, si c''était pour nous amener dans ce lieu hostile ? Ce n''est pas un lieu où l''on puisse semer ; il n''y a ni figuier, ni vigne, ni grenadier, il n''y a même pas d''eau à boire. '
  '6':
  - type: note
    content: Cf. 14.5+,10,21 ; 16.19,22 ; 17.7 ; Lv 9.23+. – Voir gloire.
  - type: text
    content: 'Moïse et Aaron s''éloignèrent de l''assemblée pour aller à l''entrée de la tente de la Rencontre. Ils tombèrent face contre terre, et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur apparut.'
  '7':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '8':
  - type: note
    content: 'le bâton v. 9 ; cf. 17.17nss ; voir aussi Ex 4.2,17,20 ; 7.15 ; 9.23 ; 10.13 ; 14.16 ; 17.5-9 ; Es 11.4. –  Vous parlerez  : Syr tu parleras. –  tu feras sortir / tu feras boire  : LXX vous ferez sortir / vous ferez boire.'
  - type: text
    content: 'Prends le bâton et rassemble la communauté, toi et Aaron, ton frère. Vous parlerez au rocher, sous leurs yeux, et il donnera son eau ; tu feras sortir pour eux de l''eau du rocher et tu feras boire la communauté et son bétail. '
  '9':
  - type: text
    content: 'Moïse prit le bâton qui était devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme celui-ci le lui avait ordonné. '
