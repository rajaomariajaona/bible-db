        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réunirent l'assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: assemblèrent l'assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 8. –  '
      - type: usfm
        marker: fq
        children:
