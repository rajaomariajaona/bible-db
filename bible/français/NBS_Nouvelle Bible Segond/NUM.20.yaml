      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Miriam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.1+ss ; Dt 24.9. –  '
      - type: usfm
        marker: fq
