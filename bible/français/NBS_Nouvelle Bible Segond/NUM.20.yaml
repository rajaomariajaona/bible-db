        - type: text
          text: '  : cf. 3.4 ; 17.8 ; 19.4 ; Lv 17.5 ; Dt 16.16 ; 31.11 ; 2S 7.18 ; voir aussi Ps 18.3 ; 31.4 ; 42.10 ; 1Co 10.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse leur dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il leur dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rebelles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 24 ; 27.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Est-ce…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 18.13.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse et Aaron réunirent l''assemblée en face du rocher. Moïse leur dit : Ecoutez, je vous prie, rebelles ! Est-ce de ce rocher que nous ferons sortir de l''eau pour vous ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une seconde fois ; Targum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du pseudo-Jonathan : La première fois, il laissa dégoutter du sang et, la seconde fois, il sortit de l''eau en abondance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Jn 7.38 ; 19.34 ; 1Co 10.4). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son bâton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le bâton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'eau en abondance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de grandes eaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 24.7 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La communauté but
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 17.6 ; voir aussi Es 43.20 ; 49.10.'
      marker-yv: yv-n
    - type: text
      text: Puis Moïse leva la main et frappa deux fois le rocher avec son bâton. Il en sortit de l'eau en abondance. La communauté but, et son bétail aussi.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La faute de Moïse n'est pas clairement définie par le texte, on l'a souvent cherchée dans les paroles rapportées au v. 10 ou dans le geste (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frapper deux fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') décrit au v. 11 ; cf. v. 24ss ; 14.27-38 ; Dt 1.35-37 ; 3.23ss ; 4.21ss ; 34.5 ; Ps 106.32s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : précision omise par LXX ; sur la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 14.11 ; Gn 15.6 ; Ex 14.31 ; 19.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montrer ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainteté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : terme apparenté au nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qadesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1 ; cf. v. 13 ; 27.14 ; Dt 32.51.
      marker-yv: yv-n
    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse et à Aaron : Parce que vous n''avez pas eu assez de foi en moi pour montrer ma sainteté sous les yeux des Israélites, vous ne ferez pas entrer cette assemblée dans le pays que je lui donne. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Meriba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est apparenté en hébreu au verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cherchèrent querelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 3, cf. v. 24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; 27.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 17.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 32.51 ; 33.8 ; Ez 47.19 ; 48.28 ; Ps 81.8 ; 95.8 ; 106.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui montra sa sainteté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dont la sainteté se montra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parmi eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en eux, contre eux, à leurs dépens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) v. 12+ ; cf. Lv 10.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 20.41+. –  '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' et un témoin de Syr insèrent ici un dialogue entre Dieu et Moïse inspiré de Dt 3.24ss.'
      marker-yv: yv-n
    - type: text
      text: 'Ce sont là les eaux de Meriba (« Querelle ») où les Israélites cherchèrent querelle au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui montra sa sainteté parmi eux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le roi d'Edom refuse de laisser passer Israël
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 21.21ss ; Dt 2.2ss ; Jg 11.17ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse envoya des messagers au roi d'Edom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre lecture possible du texte hébreu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Moïse envoya des messagers : Au roi d''Edom. Ainsi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Edom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (surnom d'Esaü en Gn 36.1+,8,19) désigne un territoire au sud-sud-est de la mer Morte Gn 36.31ss ; cf. 1S 14.47 ; 2S 8.13s ; 1R 11.14ss ; 2R 8.20ss ; 14.7 ; 16.6 ; Es 63.1s ; Ez 25.12ss ; 35 ; Ab 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',6,8 ; Ps 60. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israël, ton frère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 25.21ss ; 32–33 ; 36.1ss ; Am 1.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu sais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 14.13s ; Es 52.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'choses pénibles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 18.8 ; le terme évoque habituellement la fatigue ou la lassitude, cf. Ml 1.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lm 3.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous ont atteints
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous ont trouvés.
      marker-yv: yv-n
    - type: text
      text: 'De Qadesh, Moïse envoya des messagers au roi d''Edom : Ainsi parle Israël, ton frère : Tu sais toutes les choses pénibles qui nous ont atteints. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 26.5ss ; voir aussi Ex 3.7 ; 12.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'Egypte.
      marker-yv: yv-n
    - type: text
      text: 'Nos pères sont descendus en Egypte, et nous y avons habité longtemps. Mais les Egyptiens nous ont maltraités, nous et nos pères. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 2.23ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un messager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Ex 14.19 ; 23.20,23 ; 32.34 ; 33.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qadesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1+.
      marker-yv: yv-n
    - type: text
      text: 'Nous avons crié vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et il nous a entendus. Il a envoyé un messager et nous a fait sortir d''Egypte. Nous voici à Qadesh, ville située à l''extrémité de ton territoire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'passer par ton pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.22 ; Dt 2.27s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous ne boirons pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 2.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la route royale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute la piste principale qui traversait le pays.'
      marker-yv: yv-n
    - type: text
      text: 'Laisse-nous, je te prie, passer par ton pays ; nous ne passerons pas dans les champs ni dans les vignes, et nous ne boirons pas l''eau des puits ; nous suivrons la route royale, sans nous écarter ni à droite ni à gauche, jusqu''à ce que nous ayons passé ton territoire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Edom lui dit : Tu ne passeras pas chez moi, sinon je sortirai à ta rencontre avec l''épée. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans m'arrêter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec mes pieds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur mes pieds.
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites lui dirent : Nous monterons par la route ; si nous buvons de ton eau, moi et mes troupeaux, j''en paierai le prix ; ce n''est pas une affaire. Je veux seulement passer, sans m''arrêter. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas d'eau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 21.16ss ; Ex 17.1-7 ; Dt 8.14ss ; Ps 106.32s ; voir aussi Dt 8.15 ; Es 48.21 ; Ps 78.15ss ; 105.41 ; 114.8 ; Né 9.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre Moïse…
      - type: usfm
        marker: ft
