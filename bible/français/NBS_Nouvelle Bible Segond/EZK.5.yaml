  - type: text
    text: 'Tu seras un sujet d''outrage et d''injure, une leçon et un objet d''atterrement pour les nations qui t''entourent, quand j''exécuterai contre toi mes jugements avec colère, avec fureur, par des châtiments furieux – c''est moi, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), qui ai parlé – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fq
