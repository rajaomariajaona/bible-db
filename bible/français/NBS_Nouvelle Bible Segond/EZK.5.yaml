document_id: EZK.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu va châtier Israël
  - type: text
    content: ' '
  - type: note
    content: 'prends une épée…  : autre traduction prends une lame tranchante, un rasoir de barbier  ; cf. 11.8+. –  sur ta tête…  : c''est le traitement infligé aux prisonniers de guerre ; cf. Es 7.20n.'
  - type: text
    content: 'Toi, humain, prends une épée acérée ; tu t''en serviras comme d''un rasoir de barbier ; tu la prendras et tu la passeras sur ta tête et sur ta barbe. Tu prendras ensuite une balance à peser et tu feras des parts. '
  '10':
  - type: note
    content: des pères mangeront des fils Lv 26.29 ; Dt 28.53+ ; cf. Es 9.19s. –  J'exécuterai mes jugements… ou je te châtierai  ; cf. v. 8 ; 14.21 ; même formule v. 15 ; 11.9 ; 16.41 ; 25.11 ; 28.22,26 ; 30.14,19 ; Ex 12.12 ; Nb 33.4n  ; voir aussi Pr 19.29 ; 2Ch 24.24. –  je disséminerai 5.2 ; 12.15 ; 17.21 ; 20.23 ; 22.15 ; cf. Dt 28.64 ; Jr 8.3.
  - type: text
    content: 'C''est pourquoi des pères mangeront des fils au milieu de toi, et des fils mangeront leurs pères. J''exécuterai mes jugements contre toi et je disséminerai à tout vent tout ce qui restera de toi. '
  '11':
  - type: note
    content: 'A cause de cela ou c''est pourquoi  ; cf. v. 10. –  par ma vie  : formule de serment ; cf. Os 4.15n  ; Rm 14.11. –  à coup sûr ou sans faute, litt. sinon  ; sur cette formule de serment, cf. 17.16,19 ; 20.33 ; 33.27 ; 34.8 ; 35.6 ; 36.5ss ; 38.19 ; Es 5.9n. –  impur  : voir pur. –  horreurs 7.20 ; 11.18,21 ; 20.7s,30 ; 37.23 ; cf. Lv 11.10n  ; 2R 23.24. –  abominations v. 9n. –  je me retirerai, c.-à-d. je cesserai de protéger (le verbe est traduit par détourner en Jb 36.7) ; plusieurs versions anciennes ont lu je raserai (cf. v. 1). –  mon œil sera sans pitié 7.4,9 ; 8.18 ; cf. 20.17 ; Es 9.16 ; Jr 13.14 ; Os 1.6.'
  - type: text
    content: 'A cause de cela, par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – à coup sûr, parce que tu as rendu mon sanctuaire impur par toutes tes horreurs, toutes tes abominations, moi aussi, je me retirerai et mon œil sera sans pitié ; moi non plus, je n''épargnerai personne. '
  '12':
  - type: note
    content: 'Cf. v. 2+ ; voir aussi v. 17 ; 6.11s ; 7.15 ; 12.16 ; 14.21 ; 28.23 ; 33.27 ; Dt 28.15-45 ; Jr 14.12+ ; Ap 6.8. –  exterminé  : le même verbe est traduit par aller jusqu''au bout au v. 13.'
  - type: text
    content: Un tiers de tes habitants mourra par la peste ou sera exterminé par la famine au milieu de toi ; un tiers tombera par l'épée autour de toi ; j'en disséminerai un tiers à tout vent et je tirerai l'épée derrière eux.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ma colère ira jusqu''au bout  : cf. 6.12 ; 7.8 ; 13.15 ; 20.21 ; Lm 4.11. –  j''assouvirai  : litt. je ferai reposer 16.42 ; 21.22 ; 24.13. –  je me donnerai satisfaction ou je me vengerai  ; cf. Gn 27.42n  ; Es 1.24n. –  ils sauront… 6.7,10,14 ; 7.4,9,27 etc. ; cf. 17.24 ; 20.12,20,42+ ; 21.4,10 ; 22.22 ; 28.26 ; 29.6 ; 36.23,36 ; 37.28 ; 39.7,22 ; voir aussi Ex 7.5 ; 14.4,18 ; 1S 17.47 ; 1R 20.13,38 ; Es 49.26 ; Jr 16.21. –  passion jalouse 8.3 ; 16.38,42 ; 23.25 ; 35.11+ ; cf. Ex 20.5 ; Dt 4.24+.'
  - type: text
    content: 'Ma colère ira jusqu''au bout, j''assouvirai ma fureur contre eux et je me donnerai satisfaction ; ainsi ils sauront que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé dans ma passion jalouse, quand je serai allé jusqu''au bout de ma fureur contre eux. '
  '14':
  - type: note
    content: Cf. Jr 24.9+.
  - type: text
    content: 'Je ferai de toi une ruine, un sujet d''outrage parmi les nations qui t''entourent, sous les yeux de tous les passants. '
  '15':
  - type: note
    content: 'Tu seras  : traduction d''après plusieurs versions anciennes ; la vocalisation traditionnelle du texte hébreu donne elle sera ou ce sera. –  une leçon  : le terme est habituellement traduit par instruction ou correction  ; cf. Jr 5.3+ ; Pr 1.2n. –  un objet d''atterrement ou de stupéfaction  ; cf. Dt 28.37. –  c''est moi, le Seigneur v. 17 ; 21.22,37n.'
  - type: text
    content: 'Tu seras un sujet d''outrage et d''injure, une leçon et un objet d''atterrement pour les nations qui t''entourent, quand j''exécuterai contre toi mes jugements avec colère, avec fureur, par des châtiments furieux – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé – '
  '16':
  - type: note
    content: 'les flèches destructrices  : litt. les flèches mauvaises qui sont pour détruire. –  à vos maux  : litt. sur vous. –  je vous retirerai le pain  : cf. 4.16n.'
  - type: text
    content: 'quand je lancerai sur eux les flèches destructrices de la famine. Je les lancerai pour vous détruire : j''ajouterai la famine à vos maux, je vous retirerai le pain. '
  '17':
  - type: note
    content: 'animaux féroces  : cf. Lv 26.22. –  qui tueront tes enfants  : litt. qui te priveront d''enfants  ; cf. 14.15 ; Dt 32.25n  ; Lm 1.20.'
  - type: text
    content: 'J''enverrai contre vous la famine et les animaux féroces, qui tueront tes enfants ; la peste et le sang passeront au milieu de toi, et je ferai venir l''épée sur toi – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé.'
  '2':
  - type: note
    content: V. 12+ ; 12.14-16 ; cf. Za 13.8 ; Ap 8.7+. –  lame / épée v. 1n. –  dissémineras ou vanneras  ; cf. Jr 4.11 ; Rt 3.2.
  - type: text
    content: 'Tu en brûleras un tiers dans les flammes, au milieu de la ville, lorsque les jours du siège seront accomplis ; tu en prendras un tiers et tu le frapperas avec la lame tout autour de la ville ; tu en dissémineras un tiers au vent, et je tirerai l''épée derrière eux. '
  '3':
  - type: note
    content: 'Cf. 6.8-10 ; 9.4-8 ; 11.13 ; 12.16 ; 14.22s ; voir aussi Es 1.9+. –  serreras  : le même verbe hébreu est traduit par assiéger en 4.3. –  les pans de ton vêtement  : dans un autre contexte, l''expression hébraïque pourrait signifier tes ailes  ; cf. Rt 2.12 ; 3.9n.'
  - type: text
    content: 'Tu en prendras une petite quantité, que tu serreras dans les pans de ton vêtement. '
  '4':
  - type: note
    content: 'tu brûleras  : litt. tu brûleras dans le feu. –  Il en sortira un feu  : cf. 19.14.'
  - type: text
    content: Et tu prendras encore quelques-uns de ceux-là, que tu jetteras au milieu du feu et que tu brûleras. Il en sortira un feu contre toute la maison d'Israël.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'au milieu  : cf. 38.12. –  les pays  : litt. des pays  ; LXX emploie l''article défini.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : C''est Jérusalem. Je l''ai placée au milieu des nations, les pays l''entourent. '
  '6':
  - type: note
    content: 'rejeté  : autre traduction méprisé  ; cf. 20.13.'
  - type: text
    content: 'Elle s''est rebellée contre mes règles et mes prescriptions ; sa méchanceté a été pire que celle des nations et des pays qui l''entourent, car ils ont rejeté mes règles et ils n''ont pas suivi mes prescriptions. '
  '7':
  - type: note
    content: 'mis… en pratique et agi traduisent un même verbe hébreu ; cf. 11.12 ; 18.19 ; 20.21 ; voir aussi 11.20 ; 20.11,13,19,24 ; 36.27 ; 37.24. –  règles  : le mot est aussi traduit par droit, équité, jugement (v. 8) ; cf. 2.3n  ; 11.12 ; 16.48,53,55 ; 23.11 ; Jr 18.13-15. –  que vous n''avez pas même agi…  : certains mss portent que vous avez agi  ; cf. 11.12.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que vous vous êtes insurgés plus que les nations qui vous entourent, parce que vous n''avez pas suivi mes prescriptions ni mis mes règles en pratique, parce que vous n''avez pas même agi selon les règles des nations qui vous entourent, '
  '8':
  - type: note
    content: 'Je m''oppose… à toi  : litt. me voici contre toi  ; cf. 13.8,20n  ; 21.8 ; 26.3 ; 28.22 ; 29.3,10 ; 30.22 ; 34.10 ; 35.3 ; 38.3 ; 39.1 ; voir aussi 36.9n où la même expression est prise dans un sens positif. –  J''exécuterai (le même verbe est traduit par agir selon ou faire aux v. 7,9) mes jugements  : expression très proche au v. 10n  ; Jr 4.12+.'
  - type: text
    content: 'à cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose moi-même à toi ! J''exécuterai mes jugements au milieu de toi, sous les yeux des nations, '
  '9':
  - type: note
    content: 'abominations  : le terme s''applique fréquemment aux idoles et au culte idolâtrique ; cf. 8.6-17 ; voir Dt 7.25+.'
  - type: text
    content: 'j''agirai contre toi comme je ne l''ai encore jamais fait et comme je ne le ferai jamais plus, à cause de toutes tes abominations. '
