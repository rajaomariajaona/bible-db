  - type: text
    text: 'Ma colère ira jusqu''au bout, j''assouvirai ma fureur contre eux et je me donnerai satisfaction ; ainsi ils sauront que c''est moi, le '
  - type: usfm
    marker: nd
    children:
    - type: text
