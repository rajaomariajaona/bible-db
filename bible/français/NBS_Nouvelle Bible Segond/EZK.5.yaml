document_id: EZK.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu va châtier Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prends une épée…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prends une lame tranchante, un rasoir de barbier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 11.8+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur ta tête…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c''est le traitement infligé aux prisonniers de guerre ; cf. Es 7.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, prends une épée acérée ; tu t''en serviras comme d''un rasoir de barbier ; tu la prendras et tu la passeras sur ta tête et sur ta barbe. Tu prendras ensuite une balance à peser et tu feras des parts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 12+ ; 12.14-16 ; cf. Za 13.8 ; Ap 8.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lame '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dissémineras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vanneras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jr 4.11 ; Rt 3.2.'
    marker-yv: yv-n
  - type: text
    text: 'Tu en brûleras un tiers dans les flammes, au milieu de la ville, lorsque les jours du siège seront accomplis ; tu en prendras un tiers et tu le frapperas avec la lame tout autour de la ville ; tu en dissémineras un tiers au vent, et je tirerai l''épée derrière eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 6.8-10 ; 9.4-8 ; 11.13 ; 12.16 ; 14.22s ; voir aussi Es 1.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: serreras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe hébreu est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'assiéger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 4.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les pans de ton vêtement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans un autre contexte, l''expression hébraïque pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes ailes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Rt 2.12 ; 3.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu en prendras une petite quantité, que tu serreras dans les pans de ton vêtement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu brûleras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu brûleras dans le feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il en sortira un feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.14.'
    marker-yv: yv-n
  - type: text
    text: Et tu prendras encore quelques-uns de ceux-là, que tu jetteras au milieu du feu et que tu brûleras. Il en sortira un feu contre toute la maison d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au milieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 38.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' emploie l''article défini.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : C''est Jérusalem. Je l''ai placée au milieu des nations, les pays l''entourent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rejeté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: méprisé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 20.13.'
    marker-yv: yv-n
  - type: text
    text: 'Elle s''est rebellée contre mes règles et mes prescriptions ; sa méchanceté a été pire que celle des nations et des pays qui l''entourent, car ils ont rejeté mes règles et ils n''ont pas suivi mes prescriptions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mis… en pratique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'agi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent un même verbe hébreu ; cf. 11.12 ; 18.19 ; 20.21 ; voir aussi 11.20 ; 20.11,13,19,24 ; 36.27 ; 37.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: règles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'droit, équité, jugement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 8) ; cf. 2.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 11.12 ; 16.48,53,55 ; 23.11 ; Jr 18.13-15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que vous n'avez pas même agi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que vous avez agi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 11.12.'
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Parce que vous vous êtes insurgés plus que les nations qui vous entourent, parce que vous n''avez pas suivi mes prescriptions ni mis mes règles en pratique, parce que vous n''avez pas même agi selon les règles des nations qui vous entourent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je m'oppose… à toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me voici contre toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 13.8,20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 21.8 ; 26.3 ; 28.22 ; 29.3,10 ; 30.22 ; 34.10 ; 35.3 ; 38.3 ; 39.1 ; voir aussi 36.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' où la même expression est prise dans un sens positif. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''exécuterai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'agir selon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aux v. 7,9) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes jugements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression très proche au v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 4.12+.'
    marker-yv: yv-n
  - type: text
    text: 'à cause de cela, ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Je m''oppose moi-même à toi ! J''exécuterai mes jugements au milieu de toi, sous les yeux des nations, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: abominations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme s''applique fréquemment aux idoles et au culte idolâtrique ; cf. 8.6-17 ; voir Dt 7.25+.'
    marker-yv: yv-n
  - type: text
    text: 'j''agirai contre toi comme je ne l''ai encore jamais fait et comme je ne le ferai jamais plus, à cause de toutes tes abominations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des pères mangeront des fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 26.29 ; Dt 28.53+ ; cf. Es 9.19s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''exécuterai mes jugements… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je te châtierai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 8 ; 14.21 ; même formule v. 15 ; 11.9 ; 16.41 ; 25.11 ; 28.22,26 ; 30.14,19 ; Ex 12.12 ; Nb 33.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Pr 19.29 ; 2Ch 24.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je disséminerai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.2 ; 12.15 ; 17.21 ; 20.23 ; 22.15 ; cf. Dt 28.64 ; Jr 8.3.
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi des pères mangeront des fils au milieu de toi, et des fils mangeront leurs pères. J''exécuterai mes jugements contre toi et je disséminerai à tout vent tout ce qui restera de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'A cause de cela '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est pourquoi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par ma vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : formule de serment ; cf. Os 4.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 14.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à coup sûr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sans faute
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sinon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur cette formule de serment, cf. 17.16,19 ; 20.33 ; 33.27 ; 34.8 ; 35.6 ; 36.5ss ; 38.19 ; Es 5.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'horreurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.20 ; 11.18,21 ; 20.7s,30 ; 37.23 ; cf. Lv 11.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 23.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abominations '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je me retirerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je cesserai de protéger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'détourner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Jb 36.7) ; plusieurs versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je raserai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 1). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mon œil sera sans pitié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.4,9 ; 8.18 ; cf. 20.17 ; Es 9.16 ; Jr 13.14 ; Os 1.6.
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, par ma vie, – déclaration du Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  – à coup sûr, parce que tu as rendu mon sanctuaire impur par toutes tes horreurs, toutes tes abominations, moi aussi, je me retirerai et mon œil sera sans pitié ; moi non plus, je n''épargnerai personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 2+ ; voir aussi v. 17 ; 6.11s ; 7.15 ; 12.16 ; 14.21 ; 28.23 ; 33.27 ; Dt 28.15-45 ; Jr 14.12+ ; Ap 6.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exterminé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aller jusqu''au bout '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 13.
    marker-yv: yv-n
  - type: text
    text: Un tiers de tes habitants mourra par la peste ou sera exterminé par la famine au milieu de toi ; un tiers tombera par l'épée autour de toi ; j'en disséminerai un tiers à tout vent et je tirerai l'épée derrière eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
