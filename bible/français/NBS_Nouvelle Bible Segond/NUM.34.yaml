      marker: fr
      children:
      - type: text
        text: '34.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La frontière '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du sud '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(= '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du Néguev
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 13.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') sépare Juda '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''Edom '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (20.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; Jos 15.1-4 ; voir aussi 11.17 ; 12.7 ; Ez 47.19 ; 48.8 ; cf. 2S 8.14 ; 1R 9.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: désert de Tsîn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit ici de sa partie septentrionale, au nord d''Edom 13.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la mer du Sel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou la mer Morte, cf. Gn 14.3.
    marker-yv: yv-n
  - type: text
    text: 'Le côté du sud commencera au désert de Tsîn, près d''Edom. Votre frontière sud partira de l''extrémité de la mer du Sel, vers l''est. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aqrabbim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Scorpions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), au sud-ouest de la mer Morte, sans doute un passage le long d''une falaise vers le désert de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsîn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 1.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qadesh-Barnéa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 32.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hatsar-Addar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hetsrôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Addar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jos 15.3) et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Atsmôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hashmona '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 33.29) : localisation incertaine, au nord-ouest de Qadesh.'
    marker-yv: yv-n
  - type: text
    text: 'Votre frontière tournera au sud de la montée d''Aqrabbim, passera par Tsîn, pour aboutir au sud de Qadesh-Barnéa ; elle continuera par Hatsar-Addar et passera par Atsmôn ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: oued d'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit selon toute vraisemblance du '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ouadi el-Arish '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui se jette dans la Méditerranée (= '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) à environ 80 km au sud de Gaza ; cependant on l'a parfois identifié au bras oriental du Nil ; cf. Jos 15.4,47 ; 1R 8.65 ; 2R 24.7 ; Es 27.12 ; 1Ch 13.5 ; 2Ch 7.8 ; voir aussi 2R 14.25 ; Am 6.14.
    marker-yv: yv-n
  - type: text
    text: 'depuis Atsmôn, la frontière tournera jusqu''à l''oued d''Egypte, pour aboutir à la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ouest '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent ici un même mot hébreu ; le territoire ainsi défini englobe celui des Philistins, le long de la côte de la Méditerranée (= '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la grande mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; cf. Dt 11.24 ; Jos 1.4 ; 15.12,47 ; 17.9 ; 19.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son rivage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot peut être traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frontière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: territoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la formule, dont le sens et la fonction sont incertains, revient en Dt 3.16s ; Jos 13.23,27 ; 15.12,47.'
    marker-yv: yv-n
  - type: text
    text: 'Votre frontière ouest sera la grande mer (son rivage) ; ce sera votre frontière à l''ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frontière nord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit un peu au nord de l''actuelle frontière israélo-libanaise, soit beaucoup plus au nord, près de la frontière syro-libanaise ; sur l''étendue variable du territoire d''Israël, voir Jos 13.1ss ; 2S 8.3ss ; 24.5ss ; 1R 5.1 ; 2R 15.29 ; Ez 47.15ss ; 48.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hor-la-Montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la haute montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Il s''agit d''un sommet indéterminé du Liban (à ne pas confondre avec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hor-la-Montagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de 20.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 33.37ss).'
    marker-yv: yv-n
  - type: text
    text: 'Voici quelle sera votre frontière nord : à partir de la grande mer ; vous la tracerez jusqu''à Hor-la-Montagne ; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsedad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Ez 47.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), sans doute au sud-est de l’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'entrée de Hamath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Nb 13.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), sur l'une des principales routes de Damas ; cf. 1R 8.65 ; 2R 14.25 ; Am 6.14 ; 1Ch 13.5 ; 2Ch 7.8.
    marker-yv: yv-n
  - type: text
    text: 'depuis Hor-la-Montagne, vous la tracerez vers l''entrée de Hamath, pour que la frontière aboutisse à Tsedad ; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'la frontière continuera par Ziphrôn, pour aboutir à Hatsar-Eïnân : ce sera votre frontière nord. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Localisation incertaine ; les noms de lieux sont transcrits assez diversement par les versions anciennes ; cf. Ez 47.18 ; 48.1.
    marker-yv: yv-n
  - type: text
    text: 'Vous tracerez votre frontière est de Hatsar-Eïnân à Shepham, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ribla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains l''identifient à Ribla sur l''Oronte (2R 23.33 ; 25.21), à 80 km au sud de Hamath, et à 150 km au nord de Dan ; cependant il pourrait s''agir d''une autre localité ('
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Arbéla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la mer de Kinnéreth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le lac de Galilée, également appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lac de Gennésareth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mer de Tibériade.
    marker-yv: yv-n
  - type: text
    text: 'la frontière descendra de Shepham vers Ribla, à l''est d''Aïn ; la frontière descendra et touchera la rive de la mer de Kinnéreth, à l''est ; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En longeant le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jourdain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', la frontière ne compte pas les territoires conquis en Transjordanie (v. 13-15 ; chap. 32 ; cf. Dt 3.17 ; Jos 12.3 ; 13.27 ; 1R 4.13s,19 ; 2R 10.32s ; 13.25 ; 14.25). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mer du Sel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: la frontière descendra encore vers le Jourdain, pour aboutir à la mer du Sel. Tel sera votre pays, avec ses frontières tout autour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur le '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: partage du pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 26.52ss ; 33.54 ; Jos 14.2s.'
    marker-yv: yv-n
  - type: text
    text: 'Moïse donna cet ordre aux Israélites : C''est là le pays que vous partagerez par le sort, celui que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné de donner aux neuf tribus et demie. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rubénites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gadites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: demi-tribu de Manassé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 23 ; 32.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss,33.
    marker-yv: yv-n
  - type: text
    text: 'Car la tribu des Rubénites, famille par famille, et la tribu des Gadites, famille par famille, ont reçu leur patrimoine ; la demi-tribu de Manassé aussi a reçu son patrimoine. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Transjordanie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à l''est du Jourdain 32.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 35.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en face de Jéricho
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.1+.'
    marker-yv: yv-n
  - type: text
    text: Ces deux tribus et la demi-tribu ont reçu leur patrimoine en Transjordanie, en face de Jéricho, du côté de l'est.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liste des responsables du partage
  marker-yv: yv-h
- type: usfm
