    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 15.18 ; Ex 23.31 ; Dt 11.24 ; Jos 1.4 ; 13.2-7 ; Ez 47.13-20.'
    marker-yv: yv-n
  - type: text
    text: 'Donne cet ordre aux Israélites ; tu leur diras : Quand vous serez entrés en Canaan, voici le pays qui doit vous échoir comme patrimoine, Canaan, avec ses frontières. '
  - type: usfm
    marker: v
