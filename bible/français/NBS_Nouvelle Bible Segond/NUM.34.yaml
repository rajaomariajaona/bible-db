      children:
      - type: text
        text: 'Cf. 27.18-23 ; Jos 14.1 ; 19.51. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui partageront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : avec plusieurs mss hébreux et des versions anciennes on lit ici comme au v. 29 ; lecture traditionnelle '
