document_id: NUM.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les frontières de Canaan
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: Localisation incertaine ; les noms de lieux sont transcrits assez diversement par les versions anciennes ; cf. Ez 47.18 ; 48.1.
  - type: text
    content: 'Vous tracerez votre frontière est de Hatsar-Eïnân à Shepham, '
  '11':
  - type: note
    content: 'Ribla  : certains l''identifient à Ribla sur l''Oronte (2R 23.33 ; 25.21), à 80 km au sud de Hamath, et à 150 km au nord de Dan ; cependant il pourrait s''agir d''une autre localité (LXX Arbéla). –  la mer de Kinnéreth  : le lac de Galilée, également appelé lac de Gennésareth ou mer de Tibériade.'
  - type: text
    content: 'la frontière descendra de Shepham vers Ribla, à l''est d''Aïn ; la frontière descendra et touchera la rive de la mer de Kinnéreth, à l''est ; '
  '12':
  - type: note
    content: En longeant le Jourdain, la frontière ne compte pas les territoires conquis en Transjordanie (v. 13-15 ; chap. 32 ; cf. Dt 3.17 ; Jos 12.3 ; 13.27 ; 1R 4.13s,19 ; 2R 10.32s ; 13.25 ; 14.25). –  mer du Sel v. 3n.
  - type: text
    content: la frontière descendra encore vers le Jourdain, pour aboutir à la mer du Sel. Tel sera votre pays, avec ses frontières tout autour.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Sur le partage du pays , cf. 26.52ss ; 33.54 ; Jos 14.2s.
  - type: text
    content: 'Moïse donna cet ordre aux Israélites : C''est là le pays que vous partagerez par le sort, celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné de donner aux neuf tribus et demie. '
  '14':
  - type: note
    content: 'Rubénites / Gadites / demi-tribu de Manassé  : cf. v. 23 ; 32.1nss,33.'
  - type: text
    content: 'Car la tribu des Rubénites, famille par famille, et la tribu des Gadites, famille par famille, ont reçu leur patrimoine ; la demi-tribu de Manassé aussi a reçu son patrimoine. '
  '15':
  - type: note
    content: 'Transjordanie  : à l''est du Jourdain 32.19n  ; 35.14. –  en face de Jéricho  : cf. 22.1+.'
  - type: text
    content: Ces deux tribus et la demi-tribu ont reçu leur patrimoine en Transjordanie, en face de Jéricho, du côté de l'est.
  - type: heading
    content: Liste des responsables du partage
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '17':
  - type: note
    content: 'Cf. 27.18-23 ; Jos 14.1 ; 19.51. –  qui partageront  : avec plusieurs mss hébreux et des versions anciennes on lit ici comme au v. 29 ; lecture traditionnelle qui recevront en patrimoine, de même au v. 18. –  Eléazar, le prêtre 17.2+.'
  - type: text
    content: 'Voici les noms des hommes qui partageront le pays entre vous : Eléazar, le prêtre, et Josué, fils de Noun. '
  '18':
  - type: note
    content: 'un prince de chaque tribu  : cf. 1.5-16 ; 13.3ss.'
  - type: text
    content: 'Vous prendrez encore un prince de chaque tribu, pour partager le pays. '
  '19':
  - type: note
    content: Caleb 13.6+ ; 14.24ss.
  - type: text
    content: Voici les noms de ces hommes.
  - type: text
    content: 'Pour la tribu de Juda : Caleb, fils de Yephounné ;'
  '2':
  - type: note
    content: 'Quand…  : cf. 33.51n. –  frontières  : cf. Gn 15.18 ; Ex 23.31 ; Dt 11.24 ; Jos 1.4 ; 13.2-7 ; Ez 47.13-20.'
  - type: text
    content: 'Donne cet ordre aux Israélites ; tu leur diras : Quand vous serez entrés en Canaan, voici le pays qui doit vous échoir comme patrimoine, Canaan, avec ses frontières. '
  '20':
  - type: text
    content: 'pour la tribu des fils de Siméon : Samuel, fils d''Ammihoud ;'
  '21':
  - type: text
    content: 'pour la tribu de Benjamin : Elidad, fils de Kislôn ;'
  '22':
  - type: text
    content: 'pour la tribu des fils de Dan : le prince Bouqqi, fils de Yogli ;'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Manassé  : cf. v. 14+.'
  - type: text
    content: 'pour les fils de Joseph, pour la tribu des fils de Manassé : le prince Hanniel, fils d''Ephod ;'
  '24':
  - type: text
    content: 'et pour la tribu des fils d''Ephraïm : le prince Qemouel, fils de Shiphtân ;'
  '25':
  - type: text
    content: 'pour la tribu des fils de Zabulon : le prince Elitsaphân, fils de Parnak ;'
  '26':
  - type: text
    content: 'pour la tribu des fils d''Issacar : le prince Paltiel, fils d''Azzân ;'
  '27':
  - type: text
    content: 'pour la tribu des fils d''Aser : le prince Ahihoud, fils de Shelomi ;'
  '28':
  - type: text
    content: 'pour la tribu des fils de Nephtali : le prince Pedahel, fils d''Ammihoud.'
  '29':
  - type: text
    content: 'Tels sont ceux à qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonna de partager Canaan entre les Israélites.'
  '3':
  - type: note
    content: 'La frontière du sud (= du Néguev, 13.17n) sépare Juda d''Edom (20.14n) ; Jos 15.1-4 ; voir aussi 11.17 ; 12.7 ; Ez 47.19 ; 48.8 ; cf. 2S 8.14 ; 1R 9.26. –  désert de Tsîn  : il s''agit ici de sa partie septentrionale, au nord d''Edom 13.21n. –  la mer du Sel ou la mer Morte, cf. Gn 14.3.'
  - type: text
    content: 'Le côté du sud commencera au désert de Tsîn, près d''Edom. Votre frontière sud partira de l''extrémité de la mer du Sel, vers l''est. '
  '4':
  - type: note
    content: 'Aqrabbim (Scorpions), au sud-ouest de la mer Morte, sans doute un passage le long d''une falaise vers le désert de Tsîn  ; cf. Jg 1.36n. –  Qadesh-Barnéa 13.26n  ; 32.8. –  Hatsar-Addar (cf. Hetsrôn et Addar Jos 15.3) et Atsmôn (cf. Hashmona Nb 33.29) : localisation incertaine, au nord-ouest de Qadesh.'
  - type: text
    content: 'Votre frontière tournera au sud de la montée d''Aqrabbim, passera par Tsîn, pour aboutir au sud de Qadesh-Barnéa ; elle continuera par Hatsar-Addar et passera par Atsmôn ; '
  '5':
  - type: note
    content: 'oued d''Egypte  : il s''agit selon toute vraisemblance du Ouadi el-Arish qui se jette dans la Méditerranée (= la mer) à environ 80 km au sud de Gaza ; cependant on l''a parfois identifié au bras oriental du Nil ; cf. Jos 15.4,47 ; 1R 8.65 ; 2R 24.7 ; Es 27.12 ; 1Ch 13.5 ; 2Ch 7.8 ; voir aussi 2R 14.25 ; Am 6.14.'
  - type: text
    content: 'depuis Atsmôn, la frontière tournera jusqu''à l''oued d''Egypte, pour aboutir à la mer. '
  '6':
  - type: note
    content: 'ouest et mer traduisent ici un même mot hébreu ; le territoire ainsi défini englobe celui des Philistins, le long de la côte de la Méditerranée (= la grande mer) ; cf. Dt 11.24 ; Jos 1.4 ; 15.12,47 ; 17.9 ; 19.29. –  son rivage  : le même mot peut être traduit par frontière ou territoire  ; la formule, dont le sens et la fonction sont incertains, revient en Dt 3.16s ; Jos 13.23,27 ; 15.12,47.'
  - type: text
    content: 'Votre frontière ouest sera la grande mer (son rivage) ; ce sera votre frontière à l''ouest. '
  '7':
  - type: note
    content: 'La frontière nord, soit un peu au nord de l''actuelle frontière israélo-libanaise, soit beaucoup plus au nord, près de la frontière syro-libanaise ; sur l''étendue variable du territoire d''Israël, voir Jos 13.1ss ; 2S 8.3ss ; 24.5ss ; 1R 5.1 ; 2R 15.29 ; Ez 47.15ss ; 48.1. –  Hor-la-Montagne  : autre traduction la haute montagne. Il s''agit d''un sommet indéterminé du Liban (à ne pas confondre avec Hor-la-Montagne de 20.22n  ; 33.37ss).'
  - type: text
    content: 'Voici quelle sera votre frontière nord : à partir de la grande mer ; vous la tracerez jusqu''à Hor-la-Montagne ; '
  '8':
  - type: note
    content: Tsedad (Ez 47.15n), sans doute au sud-est de l’entrée de Hamath (Nb 13.21n), sur l'une des principales routes de Damas ; cf. 1R 8.65 ; 2R 14.25 ; Am 6.14 ; 1Ch 13.5 ; 2Ch 7.8.
  - type: text
    content: 'depuis Hor-la-Montagne, vous la tracerez vers l''entrée de Hamath, pour que la frontière aboutisse à Tsedad ; '
  '9':
  - type: text
    content: 'la frontière continuera par Ziphrôn, pour aboutir à Hatsar-Eïnân : ce sera votre frontière nord. '
