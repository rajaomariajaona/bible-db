    marker-yv: yv-n
  - type: text
    text: Après l'avoir trouvé, il le conduisit à Antioche. Pendant une année entière, ils participèrent aux rassemblements de l'Eglise et instruisirent une foule importante. Ce fut à Antioche que, pour la première fois, les disciples furent appelés chrétiens.
