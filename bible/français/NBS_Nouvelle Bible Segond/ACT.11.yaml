  - type: text
    text: 'Il y eut cependant parmi eux quelques hommes de Chypre et de Cyrène qui, venus à Antioche, parlèrent aussi aux gens de langue grecque et leur annoncèrent la bonne nouvelle du Seigneur Jésus. '
