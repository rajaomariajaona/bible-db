document_id: ACT.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: A Jérusalem, Pierre se justifie
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.14+. – Voir apôtres . –  frères 1.15+. –  Judée v. 29. –  les non-Juifs ou les nations , cf. 10.45n.
  - type: text
    content: 'Les apôtres et les frères qui étaient en Judée apprirent que les non-Juifs aussi avaient accueilli la parole de Dieu. '
  '10':
  - type: text
    content: 'Cela s''est produit trois fois ; puis tout est retourné au ciel. '
  '11':
  - type: note
    content: 'où nous étions  : certains mss portent où j''étais (cf. v. 5).'
  - type: text
    content: 'Immédiatement, trois hommes qui m''avaient été envoyés de Césarée sont survenus devant la maison où nous étions. '
  '12':
  - type: note
    content: 'six frères  : cf. 10.23+,45. –  nous sommes entrés  : cf. 11.3. –  chez  : litt. dans la maison de, de même v. 13.'
  - type: text
    content: 'L''Esprit m''a dit de partir avec eux sans la moindre hésitation. Les six frères que voici m''ont accompagné, et nous sommes entrés chez cet homme. '
  '13':
  - type: note
    content: 'l''ange  : certains mss portent un ange. –  chez lui  : litt. dans sa maison.'
  - type: text
    content: 'Celui-ci nous a raconté comment il avait vu l''ange se présenter chez lui en disant : Envoie quelqu''un à Joppé chercher Simon surnommé Pierre, '
  '14':
  - type: note
    content: 'des paroles  : autre traduction des choses. –  tu seras sauvé  : cf. 4.12+. –  et toute ta maison 10.2n  ; cf. 16.15+.'
  - type: text
    content: 'qui te dira des paroles par lesquelles tu seras sauvé, toi et toute ta maison. '
  '15':
  - type: note
    content: 'il était tombé  : sous-entendu dans le texte ; cf. 2.4 ; 8.16n.'
  - type: text
    content: 'Lorsque je me suis mis à parler, l''Esprit saint est tombé sur eux comme il était tombé sur nous au commencement. '
  '16':
  - type: note
    content: 'je me suis souvenu  : cf. Lc 22.61 ; 24.6 ; Jn 14.26. –  Jean… 1.5+. –  baptême dans l''Esprit saint 1.5 ; Lc 3.16/ / ; Jn 1.33.'
  - type: text
    content: 'Alors je me suis souvenu de cette parole du Seigneur, qui disait : Jean a baptisé d''eau, mais vous, vous recevrez le baptême dans l''Esprit saint. '
  '17':
  - type: note
    content: 'le même don qu''à nous  : cf. 10.47 ; 11.15 ; 15.8s ; Rm 9.24 ; 2P 1.1. –  pour avoir cru  : on peut comprendre aussi bien parce qu''ils ont cru ou à nous qui avons cru, 10.43+. –  pour pouvoir m''opposer…  : texte occidental  : pour pouvoir empêcher (même verbe, 8.36+ ; 10.47n) Dieu de leur donner l''Esprit saint, puisqu''ils avaient cru en lui ? Cf. 5.39 ; 15.10.'
  - type: text
    content: Si donc Dieu leur a fait le même don qu'à nous pour avoir cru au Seigneur Jésus-Christ, qui étais-je, moi, pour pouvoir m'opposer à Dieu ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.14 ; Rm 15.7-13. –  glorifièrent Dieu Lc 2.20+. –  Dieu a donc donné… le changement radical ou la repentance, la conversion 2.38n  ; cf. 5.31 ; 26.20 ; 2Tm 2.25 ; Sagesse 12.19 : « Tu as rempli tes fils d''espérance puisque tu offres le repentir pour les péchés. » –  aussi aux non-Juifs  : 10.45n. –  qui mène à la vie , cf. 3.15 ; 5.20 ; 13.46-48.'
  - type: text
    content: 'Après avoir entendu cela, ils se calmèrent et glorifièrent Dieu, en disant : Dieu a donc donné aussi aux non-Juifs le changement radical qui mène à la vie !'
  - type: heading
    content: L'Eglise d'Antioche
  '19':
  - type: text
    content: ' '
  - type: note
    content: la détresse , ici la persécution 7.10s ; 14.22 ; 20.23 ; cf. 8.1+,4. –  Phénicie 15.3 ; 21.2,7 ; 27.3. –  Chypre 4.36+ ; 21.3 ; cf. 13.4ss ; 15.39. –  Antioche de Syrie, la ville romaine la plus importante en Asie ; cf. 13.1 ; 14.26-28 ; 15.22-35 ; 18.22 ; Ga 2.11. –  disaient la Parole 4.29+.
  - type: text
    content: 'Ceux qui avaient été dispersés à cause de la détresse survenue au sujet d''Etienne passèrent donc en Phénicie, à Chypre et à Antioche ; ils ne disaient la Parole à personne d''autre qu''aux Juifs. '
  '2':
  - type: note
    content: 'Texte occidental  : Pierre, au bout d''un certain temps, décida de se rendre à Jérusalem. Il convoqua les frères et les affermit, faisant de nombreux discours et enseignant à travers la campagne. Quand il arriva chez eux (chez les chrétiens de Jérusalem), il leur annonça la grâce de Dieu. Mais les frères circoncis le prirent à partie… –  fut monté  : cf. 9.32. –  les circoncis  : cf. 10.45n.'
  - type: text
    content: 'Lorsque Pierre fut monté à Jérusalem, les circoncis le prirent à partie '
  '20':
  - type: note
    content: 'hommes de Chypre et de Cyrène  : cf. 4.36 ; 6.5 ; 13.1 ; 21.16 ; Mc 15.21/ /. –  gens de langue grecque  : l''expression est probablement à entendre ici dans un sens plus général qu''en 6.1n  ; par opposition aux Juifs du v. 19, il doit en effet s''agir de non-Juifs ; certains mss portent aux Grecs, terme employé plusieurs fois dans le sens très général de non-Juifs  ; cf. Jn 7.35 ; 12.20 ; Rm 1.14n,16. –  leur annoncèrent la bonne nouvelle 8.35+. –  du Seigneur Jésus 1.21+ ; cf. 2.36 ; 7.59 ; 10.36.'
  - type: text
    content: 'Il y eut cependant parmi eux quelques hommes de Chypre et de Cyrène qui, venus à Antioche, parlèrent aussi aux gens de langue grecque et leur annoncèrent la bonne nouvelle du Seigneur Jésus. '
  '21':
  - type: note
    content: 'La main du Seigneur… Lc 1.66 ; cf. 2S 3.12. –  un grand nombre…  : litt. grand fut le nombre qui crut et se tourna…  ; cf. 2.41+. –  se tournèrent… 9.35.'
  - type: text
    content: La main du Seigneur était avec eux, et un grand nombre de gens devinrent croyants et se tournèrent vers le Seigneur.
  '22':
  - type: text
    content: ' '
  - type: note
    content: '8.14+. –  Barnabé 4.36+. –  en lui demandant…  : litt. passer à Antioche  ; certains mss portent seulement et on envoya Barnabé à Antioche.'
  - type: text
    content: 'La nouvelle parvint aux oreilles de l''Eglise de Jérusalem, et on envoya Barnabé, en lui demandant de passer à Antioche. '
  '23':
  - type: note
    content: 'il se réjouit 8.8+ ; le terme grec qui évoque la joie est très proche de celui qui est traduit par grâce. –  les encouragea  : autre traduction les exhorta  ; cf. 2.40n  ; 4.36n  ; 13.15 ; 14.22 ; 15.32 ; 16.40 ; 20.1s. –  d''un cœur résolu ou ferme, cf. Ps 10.17.'
  - type: text
    content: 'A son arrivée, lorsqu''il vit la grâce de Dieu, il se réjouit, et il les encouragea tous à rester attachés au Seigneur d''un cœur résolu. '
  '24':
  - type: note
    content: 'un homme bon  : cf. Lc 1.6 ; 2.25 ; 23.50. –  plein d''Esprit saint (2.4+) et de foi  : cf. 6.3,5. –  une foule importante… v. 26 ; 2.41+,47.'
  - type: text
    content: Car c'était un homme bon, plein d'Esprit saint et de foi. Et une foule importante se joignit au Seigneur.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Texte occidental apprenant que Saul était à Tarse, il partit le chercher . –  Tarse 9.11n,27-30 ; cf. Ga 1.18–2.1.
  - type: text
    content: 'Il partit ensuite chercher Saul à Tarse. '
  '26':
  - type: note
    content: 'Texte occidental  : L''ayant rencontré, il le supplia de venir à Antioche. Quand ils furent arrivés, pendant une année entière une foule importante fut excitée… –  à Antioche v. 19n  ; cf. Ga 2.11. –  ils participèrent…  : autre traduction ils furent accueillis dans l''Eglise  ; cf. 5.11n. –  disciples 6.1+. –  chrétiens  : appellation dérivée, à la manière latine, du mot Christ pris comme nom propre (chrétien = adepte de Christ) ; c''était sans doute à l''origine un sobriquet ; cf. 24.5 ; 26.28 ; 1P 4.16.'
  - type: text
    content: Après l'avoir trouvé, il le conduisit à Antioche. Pendant une année entière, ils participèrent aux rassemblements de l'Eglise et instruisirent une foule importante. Ce fut à Antioche que, pour la première fois, les disciples furent appelés chrétiens.
  - type: heading
    content: Un geste d'entraide
  '27':
  - type: text
    content: ' '
  - type: note
    content: prophètes 13.1 ; 15.32 ; 19.6 ; 21.9-11 ; cf. 2.18+.
  - type: text
    content: 'En ces jours-là, des prophètes descendirent de Jérusalem à Antioche. '
  '28':
  - type: note
    content: 'Texte occidental  : Il y avait une grande allégresse. Alors que nous (16.10+) étions réunis, l''un d''eux, nommé Agabos (21.10)… –  annonça  : le même verbe est traduit par signifier en 25.27 ; Jn 12.33+. –  par l''Esprit  : cf. 8.29+. – Flavius Josèphe évoque une famine dans le pays des Juifs entre 46 et 48, sous l''empereur Claude (18.2).'
  - type: text
    content: 'L''un d''eux, nommé Agabos, se leva et annonça par l''Esprit qu''il y aurait une grande famine sur toute la terre habitée. Elle eut lieu, en effet, sous Claude. '
  '29':
  - type: note
    content: 'un secours  : le mot grec est aussi traduit par service ou ministère, voir 6.1n  ; cf. 12.25 ; 24.17 ; Rm 15.25-28,31 ; 1Co 16.1 ; 2Co 8.3-6 ; 9.1-13 ; Ga 2.10.'
  - type: text
    content: 'Les disciples décidèrent d''envoyer, chacun selon ses moyens, un secours aux frères qui habitaient la Judée. '
  '3':
  - type: note
    content: 'des incirconcis  : litt. des hommes ayant (encore) un prépuce. –  tu as mangé avec eux 10.28,48 ; cf. Ga 2.12.'
  - type: text
    content: 'en disant : Tu es entré chez des incirconcis et tu as mangé avec eux !'
  '30':
  - type: note
    content: 'aux anciens 15.2ss ; cf. 4.5,8,23 ; 23.14 ; 25.15 ; voir aussi 14.23 ; 16.4 ; 20.17s ; 21.18. –  de Barnabé et de Saul  : cf. 12.24s ; 15.2ss : Ga 1.18 ; 2.1.'
  - type: text
    content: 'C''est ce qu''ils firent : ils l''envoyèrent aux anciens par l''entremise de Barnabé et de Saul.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'exposé suivi  : cf. Lc 1.3n.'
  - type: text
    content: 'Alors Pierre se mit à leur présenter cet exposé suivi :'
  - type: heading
    content: 10.9-48
  '5':
  - type: text
    content: 'Moi, j''étais dans la ville de Joppé et je priais lorsque, en extase, j''ai eu une vision : un objet descendait, semblable à une toile tenue par les quatre coins, qui s''abaissait depuis le ciel et vint jusqu''à moi. '
  '6':
  - type: text
    content: 'En la fixant avec attention, j''y ai vu les quadrupèdes de la terre, les bêtes sauvages, les reptiles et les oiseaux du ciel. '
  '7':
  - type: text
    content: 'J''ai aussi entendu une voix qui me disait : Lève-toi, Pierre, abats et mange ! '
  '8':
  - type: note
    content: 'souillé / impur  : voir pur, impur.'
  - type: text
    content: 'J''ai répondu : En aucun cas, Seigneur ! Jamais rien de souillé ou d''impur n''est entré dans ma bouche ! '
  '9':
  - type: note
    content: 10.15n.
  - type: text
    content: 'Pour la deuxième fois, depuis le ciel la voix a repris : Ce que Dieu a purifié, toi, ne le souille pas !'
