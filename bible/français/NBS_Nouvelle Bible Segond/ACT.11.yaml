  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 8.14+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: apôtres
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.15+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Judée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les nations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 10.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les apôtres et les frères qui étaient en Judée apprirent que les non-Juifs aussi avaient accueilli la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte occidental
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Pierre, au bout d''un certain temps, décida de se rendre à Jérusalem. Il convoqua les frères et les affermit, faisant de nombreux discours et enseignant à travers la campagne. Quand il arriva chez eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (chez les chrétiens de Jérusalem)
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', il leur annonça la grâce de Dieu. Mais les frères '
      - type: usfm
        marker: w
        children:
        - type: text
          text: circoncis
      - type: text
        text: ' le prirent à partie… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fut monté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les circoncis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Pierre fut monté à Jérusalem, les circoncis le prirent à partie '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des incirconcis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des hommes ayant (encore) un prépuce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu as mangé avec eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.28,48 ; cf. Ga 2.12.
    marker-yv: yv-n
  - type: text
    text: 'en disant : Tu es entré chez des incirconcis et tu as mangé avec eux !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exposé suivi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lc 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Pierre se mit à leur présenter cet exposé suivi :'
- type: usfm
  marker: r
  children:
  - type: text
    text: 10.9-48
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moi, j''étais dans la ville de Joppé et je priais lorsque, en extase, j''ai eu une vision : un objet descendait, semblable à une toile tenue par les quatre coins, qui s''abaissait depuis le ciel et vint jusqu''à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En la fixant avec attention, j''y ai vu les quadrupèdes de la terre, les bêtes sauvages, les reptiles et les oiseaux du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''ai aussi entendu une voix qui me disait : Lève-toi, Pierre, abats et mange ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'souillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ', impur.'
    marker-yv: yv-n
  - type: text
    text: 'J''ai répondu : En aucun cas, Seigneur ! Jamais rien de souillé ou d''impur n''est entré dans ma bouche ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour la deuxième fois, depuis le ciel la voix a repris : Ce que Dieu a purifié, toi, ne le souille pas !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela s''est produit trois fois ; puis tout est retourné au ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où nous étions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'où j''étais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 5).
    marker-yv: yv-n
  - type: text
    text: 'Immédiatement, trois hommes qui m''avaient été envoyés de Césarée sont survenus devant la maison où nous étions. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: six frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.23+,45. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous sommes entrés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la maison de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 13.'
    marker-yv: yv-n
  - type: text
    text: 'L''Esprit m''a dit de partir avec eux sans la moindre hésitation. Les six frères que voici m''ont accompagné, et nous sommes entrés chez cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'ange
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un ange
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans sa maison.
    marker-yv: yv-n
  - type: text
    text: 'Celui-ci nous a raconté comment il avait vu l''ange se présenter chez lui en disant : Envoie quelqu''un à Joppé chercher Simon surnommé Pierre, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des paroles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des choses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu seras sauvé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.12+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et toute ta maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 16.15+.'
    marker-yv: yv-n
  - type: text
    text: 'qui te dira des paroles par lesquelles tu seras sauvé, toi et toute ta maison. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il était tombé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; cf. 2.4 ; 8.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque je me suis mis à parler, l''Esprit saint est tombé sur eux comme il était tombé sur nous au commencement. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je me suis souvenu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 22.61 ; 24.6 ; Jn 14.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: baptême
      - type: text
        text: ' dans '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
      - type: text
        text: ' '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.5 ; Lc 3.16/ / ; Jn 1.33.
    marker-yv: yv-n
  - type: text
    text: 'Alors je me suis souvenu de cette parole du Seigneur, qui disait : Jean a baptisé d''eau, mais vous, vous recevrez le baptême dans l''Esprit saint. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le même don qu'à nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.47 ; 11.15 ; 15.8s ; Rm 9.24 ; 2P 1.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour avoir cru
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre aussi bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parce qu''ils ont cru '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à nous qui avons cru
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 10.43+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour pouvoir m'opposer…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte occidental'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour pouvoir empêcher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même verbe, 8.36+ ; 10.47
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu de leur donner l''Esprit saint, puisqu''ils avaient cru en lui ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 5.39 ; 15.10.
    marker-yv: yv-n
  - type: text
    text: Si donc Dieu leur a fait le même don qu'à nous pour avoir cru au Seigneur Jésus-Christ, qui étais-je, moi, pour pouvoir m'opposer à Dieu ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 21.14 ; Rm 15.7-13. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifièrent
      - type: text
        text: ' Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lc 2.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu a donc donné… le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: changement
      - type: text
        text: ' radical '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la repentance, la conversion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.38'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 5.31 ; 26.20 ; 2Tm 2.25 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.19 : « Tu as rempli tes fils d''espérance puisque tu offres le repentir pour les péchés. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aussi aux non-Juifs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : 10.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui mène à la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.15 ; 5.20 ; 13.46-48.'
    marker-yv: yv-n
  - type: text
    text: 'Après avoir entendu cela, ils se calmèrent et glorifièrent Dieu, en disant : Dieu a donc donné aussi aux non-Juifs le changement radical qui mène à la vie !'
