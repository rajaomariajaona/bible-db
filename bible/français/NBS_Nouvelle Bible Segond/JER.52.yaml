      children:
      - type: text
        text: '52.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toutes les grandes maisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toute maison du grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toutes les maisons des dignitaires.
    marker-yv: yv-n
  - type: text
    text: 'Il brûla la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', la maison du roi et toutes les maisons de Jérusalem ; il mit le feu à toutes les grandes maisons. '
  - type: usfm
