document_id: JER.52,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nabuchodonosor capture Sédécias
  - type: heading
    content: 2R 25.1-7  ; 2Ch 36.11-13  ; cf. Jr 39.1-7
  - type: text
    content: ' '
  - type: note
    content: Cf. 39.1-10 ; 2R 24.18–25.26 ; 2Ch 36.11-13,17-21. –  Sédécias 1.3n. –  Hamoutal ou Hamital , 2R 23.31n, les deux vocalisations ont été transmises dans les mss. –  Jérémie, de Libna , probablement à une quarantaine de kilomètres à l'ouest-sud-ouest de Jérusalem (Jos 10.29 ; 2R 8.22 ; 19.8), à ne pas confondre avec le prophète d'Anatoth (1.1n  ; autre homonyme en 35.3).
  - type: text
    content: Sédécias avait vingt et un ans lorsqu'il devint roi ; il régna onze ans à Jérusalem. Le nom de sa mère était Hamoutal, fille de Jérémie, de Libna.
  '10':
  - type: text
    content: 'Le roi de Babylone fit égorger les fils de Sédécias sous ses yeux ; il fit aussi égorger tous les princes de Juda à Ribla. '
  '11':
  - type: note
    content: '32.5 ; Ez 12.13. –  prison  : litt. maison des châtiments  ; LXX maison de la meule  ; cf. Jg 16.21n.'
  - type: text
    content: Puis il fit crever les yeux de Sédécias et le fit attacher avec des entraves de bronze. Le roi de Babylone l'emmena à Babylone et il le mit en prison jusqu'au jour de sa mort.
  - type: heading
    content: Nebouzaradân dévaste Jérusalem
  - type: heading
    content: 2R 25.8-21  ; cf. Jr 39.8-10
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'dixième jour… dix-neuvième année  : sans doute en juillet 586 av. J.-C., cf. v. 5,29 ; 25.1n  ; 2R 25.3n. –  Nebouzaradân 39.9+. –  au service…  : litt. se tint devant (cf. 15.19+) le roi de Babylone  ; cf. 2R 25.8n.'
  - type: text
    content: 'Le dixième jour du cinquième mois – c''était la dix-neuvième année du règne de Nabuchodonosor, roi de Babylone – Nebouzaradân, chef des gardes au service du roi de Babylone, vint à Jérusalem. '
  '13':
  - type: note
    content: '17.27+. –  toutes les grandes maisons  : litt. toute maison du grand  ; autre traduction toutes les maisons des dignitaires.'
  - type: text
    content: 'Il brûla la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la maison du roi et toutes les maisons de Jérusalem ; il mit le feu à toutes les grandes maisons. '
  '14':
  - type: note
    content: 'démolit  : cf. 1.10+. –  les murailles…  : litt. toutes les murailles autour de Jérusalem  ; cf. 2R 25.10n.'
  - type: text
    content: Toute l'armée des Chaldéens, qui était avec le chef des gardes, démolit les murailles tout autour de Jérusalem.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'une partie des petites gens du peuple  : cette formule est absente en 39.9 et 2R 25.11 ; cf. 24.14.'
  - type: text
    content: 'Nebouzaradân, chef des gardes, exila une partie des petites gens du peuple, le reste du peuple, ceux qui étaient restés dans la ville, ceux qui s''étaient rendus au roi de Babylone, et le reste des artisans. '
  '16':
  - type: text
    content: Cependant Nebouzaradân, chef des gardes, permit à certains, parmi les petites gens du pays, de rester comme vignerons et comme cultivateurs.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 27.21s ; voir 1R 7.21,23,27.
  - type: text
    content: 'Des Chaldéens brisèrent les colonnes de bronze de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', les bases, la Mer de bronze qui était dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ils en emportèrent tout le bronze à Babylone. '
  '18':
  - type: note
    content: 1R 7.40. –  les récipients ou les marmites, Ex 27.3n.
  - type: text
    content: 'Ils prirent les récipients, les pelles, les couteaux, les calices, les coupes et tous les objets de bronze avec lesquels on officiait. '
  '19':
  - type: note
    content: 'bassins Ex 12.22n  ; 1R 7.50. –  cassolettes ou cendriers  ; cf. Ex 25.38n. –  tout ce qui était…  : litt. ce qui était d''or (pour l’)or et ce qui était d''argent (pour l’)argent  ; cf. 15.2.'
  - type: text
    content: 'Le chef des gardes prit encore les bassins, les cassolettes, les calices, les récipients, les porte-lampes, les coupes et les bols, tout ce qui était d''or et tout ce qui était d''argent. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 2s sont absents de LXX. –  ce qui déplaisait au Seigneur  : litt. ce qui (est) mauvais aux yeux de YHWH  ; cf. 18.10 ; 1R 11.6n. –  Joïaqim 1.3n  ; 22.13nss.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait Joïaqim. '
  '20':
  - type: note
    content: '1R 7.25. –  avaient un poids incalculable  : litt. il n''y avait pas de poids pour tous ces objets de bronze.'
  - type: text
    content: 'Les deux colonnes, la Mer et les douze bœufs de bronze qui servaient de base, que le roi Salomon avait faits pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', tous ces objets de bronze avaient un poids incalculable. '
  '21':
  - type: note
    content: 1R 7.15. –  dix-huit coudées ≈ 9 m ; voir mesures.
  - type: text
    content: 'Quant aux colonnes, la hauteur de la première colonne était de dix-huit coudées, et un cordon de douze coudées l''entourait ; elle était creuse, et son épaisseur avait quatre doigts. '
  '22':
  - type: note
    content: 1R 7.16,18. –  cinq coudées ≈ 2,30 m ; voir mesures.
  - type: text
    content: 'Il y avait au-dessus un chapiteau de bronze, et la hauteur d''un chapiteau était de cinq coudées ; autour du chapiteau il y avait un treillis et des grenades, le tout de bronze ; il en était de même pour la seconde colonne et ses grenades. '
  '23':
  - type: note
    content: 'en saillie  : litt. vers le vent, peut-être au sens de dans toutes les directions.'
  - type: text
    content: Il y avait quatre-vingt-seize grenades en saillie, et toutes les grenades sur le pourtour du treillis étaient au nombre de cent.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Sophonie 21.1+.
  - type: text
    content: 'Le chef des gardes prit Seraya, le prêtre en chef, Sophonie, le prêtre en second, et les trois gardiens du seuil. '
  '25':
  - type: note
    content: 'préposé 20.1n. –  les familiers du roi  : litt. ceux qui voient la face du roi  ; cf. Est 1.14n. – Voir scribe.'
  - type: text
    content: De la ville, il prit un haut fonctionnaire qui était préposé aux hommes de guerre, sept hommes parmi les familiers du roi qui furent trouvés dans la ville, le scribe du chef de l'armée qui était chargé d'enrôler le peuple du pays, et soixante hommes du peuple du pays qui se trouvaient dans la ville.
  '26':
  - type: text
    content: ' '
  - type: note
    content: V. 9.
  - type: text
    content: 'Nebouzaradân, chef des gardes, les prit et les conduisit au roi de Babylone à Ribla. '
  '27':
  - type: note
    content: 'Ainsi Juda fut exilé…  : texte omis par LXX, à partir d''ici jusqu''à la fin du v. 30 ; cf. Lm 1.3. –  de sa terre  : litt. de dessus son sol, cf. Gn 2.5n.'
  - type: text
    content: Le roi de Babylone les mit à mort à Ribla, au pays de Hamath. Ainsi Juda fut exilé loin de sa terre.
  '28':
  - type: text
    content: ' '
  - type: note
    content: la septième année du règne de Nabuchodonosor, c.-à-d. en 597 av. J.-C. ; cette date est confirmée par la chronique babylonienne ; il s'agit du premier exil (22.26s ; 28.4 ; 29.1s ; 2R 24.14s ; Ez 1.2n).
  - type: text
    content: 'Voici le peuple que Nabuchodonosor exila : la septième année, 3 023 Judéens ; '
  '29':
  - type: note
    content: 'dix-huitième année (cf. v. 12n) : 587/6 av. J.-C., deuxième exil ; cf. 32.1 ; 39.9.'
  - type: text
    content: 'la dix-huitième année de Nabuchodonosor, il emmena de Jérusalem 832 personnes ; '
  '3':
  - type: note
    content: 'Cela arriva…  : autre traduction ce qui arriva dans Jérusalem et dans Juda irrita tellement le Seigneur qu''il les rejeta…  ; cf. 32.31 ; 2R 24.20.'
  - type: text
    content: 'Cela arriva dans Jérusalem et Juda à cause de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ', jusqu''à ce qu''il les rejette loin de lui. Sédécias se rebella contre le roi de Babylone.'
  '30':
  - type: note
    content: 'vingt-troisième année  : en 582/1 av. J.-C., troisième exil non rapporté par ailleurs. D''après des documents extra-bibliques, cette année-là Nabuchodonosor aurait exilé des Ammonites et des Moabites. –  en tout 4 600 personnes  : cf. 2R 24.14-16.'
  - type: text
    content: la vingt-troisième année de Nabuchodonosor, Nebouzaradân, chef des gardes, exila 745 Judéens, en tout 4 600 personnes.
  - type: heading
    content: Le roi de Babylone gracie Joïakîn
  - type: heading
    content: 2R 25.27-30
  '31':
  - type: text
    content: ' '
  - type: note
    content: '2R 25.27-30. –  Evil-Merodak ou Awil-Mardouk , successeur de Nabuchodonosor (561-559 av. J.-C.). –  la première année de son règne  : litt. l''année de son règne , c.-à-d. l''année de son accession au trône (cf. la formule légèrement différente de 2R 25.27). –  gracia  : litt. éleva la tête de (cf. Gn 40.13n). –  Joïakîn 1.3n  ; cf. chap. 24.'
  - type: text
    content: 'La trente-septième année de l''exil de Joïakîn, roi de Juda, le vingt-cinquième jour du douzième mois, Evil-Merodak, roi de Babylone, dans la première année de son règne, gracia Joïakîn, roi de Juda, et le fit sortir de prison. '
  '32':
  - type: note
    content: 'qui étaient avec lui  : c.-à-d. qui avaient été aussi exilés.'
  - type: text
    content: 'Il lui parla avec bonté et mit son trône au-dessus du trône des rois qui étaient avec lui à Babylone. '
  '33':
  - type: note
    content: 'enlever  : litt. changer. –  Joïakîn  : le nom du roi est ici sous-entendu dans le texte hébreu qui porte il mangea.'
  - type: text
    content: 'Il lui fit enlever ses vêtements de détenu ; Joïakîn mangea devant lui constamment, tous les jours de sa vie. '
  '34':
  - type: text
    content: Son entretien – entretien constant – lui fut assuré de la part du roi de Babylone, selon l'ordre de chaque jour, jusqu'au jour de sa mort, tous les jours de sa vie.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le dixième jour du dixième mois  : fin décembre 589 av. J.-C. ; cf. 32.2 ; 34.1 ; Ez 24.1s. –  Nabuchodonosor 21.2n. –  terrassement 2R 25.1n.'
  - type: text
    content: 'La neuvième année de son règne, le dixième jour du dixième mois, Nabuchodonosor, roi de Babylone, attaqua Jérusalem avec toute son armée ; ils dressèrent leur camp contre elle et bâtirent contre elle un terrassement, tout autour. '
  '5':
  - type: note
    content: 'onzième année  : 587/6 av. J.-C.'
  - type: text
    content: La ville fut en état de siège jusqu'à la onzième année du roi Sédécias.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'quatrième mois  : juin-juillet ; cf. v. 12n,29n. –  plus de pain  : cf. 38.9.'
  - type: text
    content: 'Le neuvième jour du quatrième mois, alors que la famine était forte dans la ville et qu''il n''y avait plus de pain pour le peuple du pays, '
  '7':
  - type: note
    content: Voir 39.4-10 et notes.
  - type: text
    content: 'une brèche fut ouverte dans la ville ; tous les hommes de guerre prirent la fuite et sortirent de la ville, de nuit, par le chemin de la porte entre les deux murailles, près du Jardin du Roi, tandis que les Chaldéens encerclaient la ville. Ils prirent le chemin de la plaine aride. '
  '8':
  - type: text
    content: 'Mais l''armée des Chaldéens poursuivit le roi et rattrapa Sédécias dans la plaine aride de Jéricho, et toute son armée se dispersa. '
  '9':
  - type: text
    content: 'Ils prirent le roi et le firent monter à Ribla, au pays de Hamath, devant le roi de Babylone ; et celui-ci prononça des jugements contre lui. '
