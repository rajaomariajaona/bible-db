  - type: text
    text: 'Le dixième jour du cinquième mois – c''était la dix-neuvième année du règne de Nabuchodonosor, roi de Babylone – Nebouzaradân, chef des gardes au service du roi de Babylone, vint à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
