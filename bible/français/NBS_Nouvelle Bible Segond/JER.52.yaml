  - type: text
    text: 'La neuvième année de son règne, le dixième jour du dixième mois, Nabuchodonosor, roi de Babylone, attaqua Jérusalem avec toute son armée ; ils dressèrent leur camp contre elle et bâtirent contre elle un terrassement, tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: onzième année
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 587/6 av. J.-C.'
    marker-yv: yv-n
  - type: text
    text: La ville fut en état de siège jusqu'à la onzième année du roi Sédécias.
