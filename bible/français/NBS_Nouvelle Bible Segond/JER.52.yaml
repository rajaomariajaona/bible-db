  - type: text
    text: 'Le neuvième jour du quatrième mois, alors que la famine était forte dans la ville et qu''il n''y avait plus de pain pour le peuple du pays, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 39.4-10 et notes.
    marker-yv: yv-n
  - type: text
    text: 'une brèche fut ouverte dans la ville ; tous les hommes de guerre prirent la fuite et sortirent de la ville, de nuit, par le chemin de la porte entre les deux murailles, près du Jardin du Roi, tandis que les Chaldéens encerclaient la ville. Ils prirent le chemin de la plaine aride. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais l''armée des Chaldéens poursuivit le roi et rattrapa Sédécias dans la plaine aride de Jéricho, et toute son armée se dispersa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils prirent le roi et le firent monter à Ribla, au pays de Hamath, devant le roi de Babylone ; et celui-ci prononça des jugements contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi de Babylone fit égorger les fils de Sédécias sous ses yeux ; il fit aussi égorger tous les princes de Juda à Ribla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
