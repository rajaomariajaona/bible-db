    marker-yv: yv-n
  - type: text
    text: 'Nebouzaradân, chef des gardes, exila une partie des petites gens du peuple, le reste du peuple, ceux qui étaient restés dans la ville, ceux qui s''étaient rendus au roi de Babylone, et le reste des artisans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Cependant Nebouzaradân, chef des gardes, permit à certains, parmi les petites gens du pays, de rester comme vignerons et comme cultivateurs.
