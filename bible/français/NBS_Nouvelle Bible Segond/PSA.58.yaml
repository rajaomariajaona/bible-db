      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Dieu ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les emportera comme une tempête.
      marker-yv: yv-n
    - type: text
      text: Avant que vos épines ne deviennent un buisson,
  - type: usfm
    marker: q1
    children:
