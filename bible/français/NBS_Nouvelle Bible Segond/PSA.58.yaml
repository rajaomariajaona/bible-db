document_id: PSA.58,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Il y a un Dieu qui juge
  - type: text
    content: ' '
  - type: note
    content: 57.1n.
  - type: text
    content: Du chef de chœur. « Ne détruis pas ! » De David. Hymne.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction conjecturale d''un texte hébreu difficilement compréhensible en l''état où il nous est parvenu. –  vos épines  : autre traduction vos marmites (cf. Ec 7.6n) ; un ms hébreu et Syr portent la troisième personne du pluriel ( leurs marmites  ? leurs épines  ?). –  ne deviennent  : le texte hébreu porte le verbe habituellement traduit par comprendre , que certains interprètent au sens d''un contact  : avant que vos marmites soient au contact des épines (servant de combustible). –  alors qu''elles sont encore vertes… sèches  : litt. comme vivant comme feu ( ?) ; autre interprétation vertes ou enflammées  ; certains modifient le texte hébreu traditionnel pour lire comme des chardons, comme des mauvaises herbes la tempête… –  la tempête les emportera (les méchants ?) : autre traduction il (Dieu ?) les emportera comme une tempête.'
  - type: text
    content: Avant que vos épines ne deviennent un buisson,
  - type: text
    content: alors qu'elles sont encore vertes, comme si elles étaient sèches, la tempête les emportera.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 35.27 ; 107.42 ; Jr 11.20 ; Jb 22.19 ; Ap 18.20.
  - type: text
    content: Le juste se réjouira, car il aura vu la vengeance ;
  - type: text
    content: il se lavera les pieds dans le sang des méchants.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'une récompense  : litt. du fruit  ; cf. 1.3 ; Es 3.10. –  un Dieu qui exerce…  : le verbe hébreu correspondant est au pluriel, de sorte qu''on pourrait éventuellement traduire des dieux qui exercent…  ; cf. v. 2n (autre mot pour dieux ) ; LXX un Dieu qui les juge  ; voir aussi Gn 1.1n  ; Ml 2.17 ; Jb 19.29.'
  - type: text
    content: 'Et les humains diront :'
  - type: text
    content: Oui, il y a une récompense pour le juste ;
  - type: text
    content: oui, il y a un Dieu qui exerce le jugement sur la terre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine : en vous taisant rend un mot qui apparaît également en 56.1n et dont un des sens possibles est silencieux. Toutefois on pourrait, ici aussi, modifier la vocalisation traditionnelle pour lire dieux et traduire est-ce loyalement (= En vérité ) que vous rendez la justice, ô dieux ? Est-ce avec droiture que vous jugez les êtres humains (litt. fils d''hommes , d''où hommes )  ? cf. 82.1s,6 ; Gn 6.2ss ; 1R 22.20ss ; Jb 1.6ss.'
  - type: text
    content: En vérité, est-ce en vous taisant que vous rendez la justice ?
  - type: text
    content: Est-ce ainsi que vous jugez avec droiture, humains ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Déjà dans le cœur…  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire, p. ex.  : avec un cœur injuste vous agissez dans le pays. –  dans le pays…  : texte incertain ; on a aussi compris vos mains font peser la violence sur le pays ; vos mains font pencher la balance vers la violence ; vos mains donnent libre cours à la violence (cf. 78.50) ; voir aussi Jb 31.6 ; Dn 5.27.'
  - type: text
    content: Déjà dans le cœur, vous agissez injustement ;
  - type: text
    content: dans le pays, c'est la violence de vos mains que vous placez sur la balance.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 51.7 ; Es 48.8.
  - type: text
    content: Les méchants se pervertissent dès le sein maternel,
  - type: text
    content: les menteurs s'égarent au sortir du ventre de leur mère,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 140.4 ; Dt 32.33.
  - type: text
    content: ils ont un venin semblable au venin d'un serpent,
  - type: text
    content: d'une vipère sourde, qui ferme son oreille,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'du charmeur  : litt. des charmeurs  ; cf. Jr 18.7 ; Ec 10.11 ; voir aussi Es 3.3n. –  enchanteur  : autre traduction celui qui jette des sorts (Dt 18.11). –  habile  : le terme hébreu correspondant évoque aussi la sagesse.'
  - type: text
    content: qui n'entend pas la voix du charmeur,
  - type: text
    content: de l'enchanteur le plus habile.
  '7':
  - type: text
    content: ' '
  - type: note
    content: brise-leur (le verbe est habituellement traduit par raser ou renverser  ; il est synonyme de celui qui est rendu par démolis dans la suite) les dents 3.8+. –  jeunes lions 7.3+ ; cf. 57.5.
  - type: text
    content: O Dieu, brise-leur les dents dans la bouche !
  - type: text
    content: Seigneur
  - type: text
    content: ', démolis les mâchoires des jeunes lions !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'comme de l''eau…  : cf. Jb 11.16. –  Qu''il lance ses flèches (18.15+ ; cf. 64.4) …  : texte obscur ; certains le modifient pour lire qu''ils se fanent comme l''herbe sur le chemin.'
  - type: text
    content: Qu'ils soient refoulés comme de l'eau qui s'écoule !
  - type: text
    content: Qu'il lance ses flèches, et qu'ils deviennent infirmes !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'la limace  : traduction incertaine, le mot correspondant n''apparaît qu''ici ; autre possibilité une fausse couche . –  l''avorton  : litt. l''avorton d''une femme , mais le texte est incertain ; cf. Jb 3.16 ; Ec 6.3.'
  - type: text
    content: Qu'ils soient comme la limace qui fond en avançant,
  - type: text
    content: comme l'avorton qui ne verra pas le soleil !
