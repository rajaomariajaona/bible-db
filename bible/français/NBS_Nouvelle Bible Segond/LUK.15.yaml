        marker: fq
        children:
        - type: text
          text: 'se jeter à son cou… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 20.37 ; cf. Gn 33.4 ; 45.14s ; voir aussi 2S 14.33 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tobit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.9 : « Anna courut se jeter au cou de son fils et lui dit : “Je te revois, mon enfant, désormais je peux mourir !” » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''embrassa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mc 14.45
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il partit pour rentrer chez son père.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il était encore loin, son père le vit et fut ému ; il courut se jeter à son cou et l''embrassa. '
