        children:
        - type: text
          text: 'contre le ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (= Dieu, v. 7 ; 11.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et envers toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 10.16 ; voir aussi Ps 51.6.'
      marker-yv: yv-n
    - type: text
      text: 'Je vais partir, j''irai chez mon père et je lui dirai : “Père, j''ai péché contre le ciel et envers toi ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: traite-moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais de moi l'un de tes employés.
      marker-yv: yv-n
    - type: text
      text: 'je ne suis plus digne d''être appelé ton fils ; traite-moi comme l''un de tes employés.” » '
