  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un homme… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.30+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
