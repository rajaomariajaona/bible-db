      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de salariés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lv 25.50 ; Jb 7.1 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.15 : « Je te donne un salaire d''une drachme par jour et, en ce qui concerne ton entretien, la même chose qu''à mon fils. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je meurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'perdre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se perdre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 4ss,24,32). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de faim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'famine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 14.
      marker-yv: yv-n
    - type: text
      text: 'Rentré en lui-même, il se dit : « Combien d''employés, chez mon père, ont du pain de reste, alors que moi, ici, je meurs de faim ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
