document_id: LUK.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus accueille les pécheurs
  - type: text
    content: ' '
  - type: note
    content: '5.29-32/ /. –  Tous  : le terme correspondant est omis par certains témoins du texte ; cf. 3.16 ; 4.15 ; 9.1. –  collecteurs des taxes (3.12+) / pécheurs 5.30 ; 7.34.'
  - type: text
    content: 'Tous les collecteurs des taxes et les pécheurs s''approchaient de lui pour l''entendre. '
  '10':
  - type: note
    content: 'V. 7+. –  devant les anges  : cf. 12.8s ; Hé 1.6. – Voir péché.'
  - type: text
    content: De même, je vous le dis, il y a de la joie devant les anges de Dieu pour un seul pécheur qui change radicalement.
  - type: heading
    content: La parabole du fils perdu et retrouvé
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme… 10.30+. –  deux fils  : cf. v. 25 ; Mt 21.28ss.'
  - type: text
    content: 'Il dit encore : Un homme avait deux fils. '
  '12':
  - type: note
    content: 'Père  : comme en 10.21+. –  donne-moi…  : cf. Siracide 33.20ss : « A ton fils, ta femme, ton frère ou ton ami, ne donne pas pouvoir sur toi pendant ta vie. Ne fais pas à un autre donation de tes biens, de peur que, pris de regret, tu n''aies à les redemander… Mieux vaut en effet que tes enfants te demandent, que de dépendre toi-même du vouloir de tes fils… Quand arrivera le dernier des jours de ta vie et l''heure de mourir, alors distribue ton héritage. » –  la part…  : cf. Dt 21.17. –  partagea…  : en fait le père garde l''autorité sur la part destinée à l''aîné, cf. v. 22s,31.'
  - type: text
    content: 'Le plus jeune dit à son père : « Père, donne-moi la part de fortune qui doit me revenir. » Le père partagea son bien entre eux. '
  '13':
  - type: note
    content: 'Peu de jours  : cf. Ac 1.5 ; voir aussi Jn 2.12. –  convertit en argent  : autre traduction rassembla. –  pays lointain  : cf. 19.12. –  dilapida (le même verbe est traduit par disperser en 1.51) v. 30 ; 16.1 ; Pr 29.3.'
  - type: text
    content: 'Peu de jours après, le plus jeune fils convertit en argent tout ce qu''il avait et partit pour un pays lointain où il dilapida sa fortune en vivant dans la débauche. '
  '14':
  - type: text
    content: 'Lorsqu''il eut tout dépensé, une grande famine survint dans ce pays, et il commença à manquer de tout. '
  '15':
  - type: note
    content: 'Il se mit au service d''un…  : litt. il s''attacha à un…  ; cf. v. 19,26. –  les cochons, animaux impurs pour les Juifs : la scène se situe en pays non juif 8.32+ ; Lv 11.7 ; Dt 14.8 ; Talmud de Babylone, Baba Qamma 82b : « Maudit l''homme qui élève des porcs, et maudit l''homme qui enseigne à son fils la sagesse grecque. »'
  - type: text
    content: 'Il se mit au service d''un des citoyens de ce pays, qui l''envoya dans ses champs pour y faire paître les cochons. '
  '16':
  - type: note
    content: 'Il aurait bien désiré se rassasier (6.21+) 16.21 ; certains mss portent se remplir le ventre. –  caroubes, fruits (gousses) d''un arbre méditerranéen, utilisés comme aliment pour le bétail. –  personne ne lui en donnait  : autre traduction personne ne lui donnait rien.'
  - type: text
    content: 'Il aurait bien désiré se rassasier des caroubes que mangeaient les cochons, mais personne ne lui en donnait. '
  '17':
  - type: note
    content: 'Rentré…  : autres traductions revenu à lui-même ; retrouvant son bon sens. –  il se dit  : cf. 12.17+ ; 16.3. –  d''employés  : litt. de salariés  ; cf. Lv 25.50 ; Jb 7.1 ; Tobit 5.15 : « Je te donne un salaire d''une drachme par jour et, en ce qui concerne ton entretien, la même chose qu''à mon fils. » –  je meurs  : le même verbe est traduit ailleurs par perdre ou se perdre (v. 4ss,24,32). –  de faim  : le même mot a été traduit par famine au v. 14.'
  - type: text
    content: 'Rentré en lui-même, il se dit : « Combien d''employés, chez mon père, ont du pain de reste, alors que moi, ici, je meurs de faim ? '
  '18':
  - type: note
    content: 'V. 21. –  partir  : litt. me lever, de même v. 20. – Voir péché. –  contre le ciel (= Dieu, v. 7 ; 11.16n) et envers toi  : cf. Ex 10.16 ; voir aussi Ps 51.6.'
  - type: text
    content: 'Je vais partir, j''irai chez mon père et je lui dirai : “Père, j''ai péché contre le ciel et envers toi ; '
  '19':
  - type: note
    content: 'traite-moi…  : autre traduction fais de moi l''un de tes employés.'
  - type: text
    content: 'je ne suis plus digne d''être appelé ton fils ; traite-moi comme l''un de tes employés.” » '
  '2':
  - type: note
    content: 'pharisiens (5.17+) / scribes (5.21+) 5.30 ; 6.7 ; 11.53. –  maugréaient 5.30 ; 19.7. –  Il accueille…  : cf. 5.29ss ; 7.39. –  mange avec eux  : cf. Ga 2.12s.'
  - type: text
    content: 'Les pharisiens et les scribes maugréaient : Il accueille des pécheurs et il mange avec eux !'
  - type: heading
    content: La parabole du mouton perdu et retrouvé
  - type: heading
    content: Mt 18.12-14
  '20':
  - type: note
    content: 'ému 7.13+. –  se jeter à son cou… Ac 20.37 ; cf. Gn 33.4 ; 45.14s ; voir aussi 2S 14.33 ; Tobit 11.9 : « Anna courut se jeter au cou de son fils et lui dit : “Je te revois, mon enfant, désormais je peux mourir !” » –  l''embrassa Mc 14.45n.'
  - type: text
    content: Il partit pour rentrer chez son père.
  - type: text
    content: 'Comme il était encore loin, son père le vit et fut ému ; il courut se jeter à son cou et l''embrassa. '
  '21':
  - type: note
    content: 'V. 18s. A la fin du v. certains mss ajoutent  : Traite-moi comme un de tes employés.'
  - type: text
    content: 'Le fils lui dit : « Père, j''ai péché contre le ciel et envers toi, je ne suis plus digne d''être appelé ton fils. » '
  '22':
  - type: note
    content: 'la plus belle robe  : litt. la première robe  ; on a aussi compris la robe qu''il avait auparavant  ; cf. Gn 37.3s. –  une bague  : les bagues servaient parfois de sceau, instrument d''autorité ; cf. Gn 41.42 ; Est 3.10 ; 8.2 ; 1 Maccabées 6.15 : « Il lui donna (le roi Antiochos, au moment de sa mort, au régent) son diadème, sa robe et son sceau (ou : son anneau sigillaire). » Voir aussi Jc 2.2. –  des sandales  : ce sont généralement les esclaves qui allaient nu-pieds.'
  - type: text
    content: 'Mais le père dit à ses esclaves : « Apportez vite la plus belle robe et mettez-la-lui ; mettez-lui une bague au doigt et des sandales aux pieds. '
  '23':
  - type: note
    content: 'veau (ou taurillon  : cf. Ac 7.41 ; Hé 9.12,19 ; Ap 4.7) engraissé  : cf. v. 27 ; Jg 6.28 ; Jr 46.21+. –  Mangeons…  : cf. 12.19.'
  - type: text
    content: 'Amenez le veau engraissé et abattez-le. Mangeons, faisons la fête, '
  '24':
  - type: note
    content: 'mort  : cf. 9.60 ; Ep 2.1+. –  perdu / retrouvé v. 6+,32 ; 19.10.'
  - type: text
    content: car mon fils que voici était mort, et il a repris vie ; il était perdu, et il a été retrouvé ! » Et ils commencèrent à faire la fête.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 11s. –  aux champs  : cf. 17.7. –  de la musique  : le terme correspondant a donné notre mot symphonie  ; cf. Dn 3.5n.'
  - type: text
    content: 'Or le fils aîné était aux champs. Lorsqu''il revint et s''approcha de la maison, il entendit de la musique et des danses. '
  '26':
  - type: note
    content: 'un des serviteurs  : même terme 7.7n. –  lui demander…  : même verbe 18.36 ; Mt 2.4 ; Jn 4.52 ; 13.24 ; Ac 4.7 ; 10.18,29 ; 21.33 ; 23.19ns,34.'
  - type: text
    content: 'Il appela un des serviteurs pour lui demander ce qui se passait. '
  '27':
  - type: text
    content: 'Ce dernier lui dit : « Ton frère est de retour, et parce qu''il lui a été rendu en bonne santé, ton père a abattu le veau engraissé. » '
  '28':
  - type: note
    content: Cf. v. 2.
  - type: text
    content: 'Mais il se mit en colère ; il ne voulait pas entrer. Son père sortit le supplier. '
  '29':
  - type: note
    content: 'Il y a tant d''années…  : cf. Gn 31.41. –  je travaille pour toi comme un esclave  ; autre traduction je te sers  ; cf. 1.38n  ; 16.13n. –  jamais je n''ai désobéi à tes commandements (ou à tes ordres) : cf. 17.9s ; 18.9.'
  - type: text
    content: 'Alors il répondit à son père : « Il y a tant d''années que je travaille pour toi comme un esclave, jamais je n''ai désobéi à tes commandements, et jamais tu ne m''as donné un chevreau pour que je fasse la fête avec mes amis ! '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 5.36+.
  - type: text
    content: 'Mais il leur dit cette parabole : '
  '30':
  - type: note
    content: 'ton fils que voici  : cf. v. 24,32n  ; 18.11. –  qui a dévoré… v. 13.'
  - type: text
    content: 'Mais quand ton fils que voici est arrivé, lui qui a dévoré ton bien avec des prostituées, pour lui tu as abattu le veau engraissé ! » '
  '31':
  - type: note
    content: 'mon enfant  : cf. 2.48. –  tout ce qui est à moi est à toi v. 12n  ; cf. Jn 17.10.'
  - type: text
    content: 'Le père lui dit : « Toi, mon enfant, tu es toujours avec moi, et tout ce qui est à moi est à toi ; '
  '32':
  - type: note
    content: 'ton frère que voici  : formule analogue à celle du v. 30. –  mort… v. 24+.'
  - type: text
    content: mais il fallait bien faire la fête et se réjouir, car ton frère que voici était mort, et il a repris vie ; il était perdu, et il a été retrouvé ! »
  '4':
  - type: note
    content: 'Cf. 12.32+ ; Ps 23.1ss. –  Quel homme d''entre vous… 11.5+. –  dans le désert  : en fait une zone semi-désertique, lieu habituel de pâturage pour le petit bétail dans la région ; cf. 1S 17.28. –  aller après celui qui est perdu (v. 6,8s,24,32 ; 19.10) Jr 23.1ss ; Ez 34.11-16 ; Mi 4.6s ; Jn 10.11s.'
  - type: text
    content: 'Quel homme d''entre vous, s''il a cent moutons et qu''il en perde un, ne laisse les quatre-vingt-dix-neuf autres dans le désert pour aller après celui qui est perdu, jusqu''à ce qu''il le retrouve ? '
  '5':
  - type: note
    content: Cf. Es 40.11 ; 49.22. –  tout joyeux 1.14+ ; 19.6,37.
  - type: text
    content: 'Lorsqu''il l''a retrouvé, il le met sur ses épaules, tout joyeux, '
  '6':
  - type: note
    content: Cf. v. 9,23s,32 ; voir aussi Ac 10.24.
  - type: text
    content: 'et, de retour chez lui, il appelle ses amis et ses voisins pour leur dire : « Réjouissez-vous avec moi, car j''ai retrouvé mon mouton, qui était perdu ! » '
  '7':
  - type: note
    content: Cf. v. 10,32 ; 1.14+ ; voir aussi Ez 18.23. –  ciel 11.16n. – Voir péché. –  justes 5.32/ / ; 16.15 ; 18.9 ; 20.20n  ; cf. 7.39ss. –  changement radical ou repentance, conversion  ; 3.3n.
  - type: text
    content: De même, je vous le dis, il y aura plus de joie dans le ciel pour un seul pécheur qui change radicalement que pour quatre-vingt-dix-neuf justes qui n'ont pas besoin d'un changement radical.
  - type: heading
    content: La parabole de la drachme perdue et retrouvée
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'La drachme est une monnaie d''argent grecque dont la valeur a varié selon les époques ; au temps de Néron (54-68 apr. J.-C.) elle était équivalente au denier romain (7.41n) ; en tout cas dix drachmes représentent une somme assez modeste. A partir d''une découverte archéologique on a parfois supposé que les dix drachmes , montées sur une sorte de diadème pour le jour des noces, constituaient la dot de la femme , mais cette hypothèse n''est pas nécessaire à la compréhension du texte ; voir mesures, poids et monnaies. –  n''allume…  : dans la région l''intérieur des maisons, qui avaient peu d''ouvertures, était passablement obscur. –  jusqu''à ce qu''elle la retrouve v. 4+.'
  - type: text
    content: 'Ou bien quelle femme, si elle a dix drachmes et qu''elle perde une drachme, n''allume une lampe, ne balaie la maison et ne cherche avec soin, jusqu''à ce qu''elle la retrouve ? '
  '9':
  - type: note
    content: V. 6+.
  - type: text
    content: 'Lorsqu''elle l''a retrouvée, elle appelle chez elle ses amies et ses voisines et dit : « Réjouissez-vous avec moi, car j''ai retrouvé la drachme que j''avais perdue ! » '
