      - type: usfm
        marker: fq
        children:
        - type: text
          text: convertit en argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rassembla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pays lointain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 19.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dilapida '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'disperser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1.51) v. 30 ; 16.1 ; Pr 29.3.
      marker-yv: yv-n
    - type: text
      text: 'Peu de jours après, le plus jeune fils convertit en argent tout ce qu''il avait et partit pour un pays lointain où il dilapida sa fortune en vivant dans la débauche. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''il eut tout dépensé, une grande famine survint dans ce pays, et il commença à manquer de tout. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il se mit au service d'un…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il s'attacha à un…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 19,26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les cochons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', animaux impurs pour les Juifs : la scène se situe en pays non juif 8.32+ ; Lv 11.7 ; Dt 14.8 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Talmud
        - type: text
          text: ' de Babylone, Baba Qamma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '82b : « Maudit l''homme qui élève des porcs, et maudit l''homme qui enseigne à son fils la sagesse grecque. »'
      marker-yv: yv-n
    - type: text
      text: 'Il se mit au service d''un des citoyens de ce pays, qui l''envoya dans ses champs pour y faire paître les cochons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il aurait bien désiré se rassasier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(6.21+) 16.21 ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se remplir le ventre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: caroubes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', fruits (gousses) d''un arbre méditerranéen, utilisés comme aliment pour le bétail. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: personne ne lui en donnait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: personne ne lui donnait rien.
      marker-yv: yv-n
    - type: text
      text: 'Il aurait bien désiré se rassasier des caroubes que mangeaient les cochons, mais personne ne lui en donnait. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rentré…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
