        - type: text
          text: ' : cf. v. 25 ; Mt 21.28ss.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit encore : Un homme avait deux fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comme en 10.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donne-moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.20ss : « A ton fils, ta femme, ton frère ou ton ami, ne donne pas pouvoir sur toi pendant ta vie. Ne fais pas à un autre donation de tes biens, de peur que, pris de regret, tu n''aies à les redemander… Mieux vaut en effet que tes enfants te demandent, que de dépendre toi-même du vouloir de tes fils… Quand arrivera le dernier des jours de ta vie et l''heure de mourir, alors distribue ton héritage. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la part…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 21.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partagea…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en fait le père garde l''autorité sur la part destinée à l''aîné, cf. v. 22s,31.'
      marker-yv: yv-n
    - type: text
      text: 'Le plus jeune dit à son père : « Père, donne-moi la part de fortune qui doit me revenir. » Le père partagea son bien entre eux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
