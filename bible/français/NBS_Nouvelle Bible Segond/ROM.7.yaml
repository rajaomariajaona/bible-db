document_id: ROM.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chrétien est libéré de la loi
  - type: text
    content: ' '
  - type: note
    content: 'Ignorez-vous 6.3. –  qui connaissent la loi  : autre traduction qui savent ce qu''est une loi  ; les Romains étaient réputés pour leur science juridique. –  exerce sa maîtrise… 6.9n. –  aussi longtemps qu''il vit  : cf. 6.7.'
  - type: text
    content: 'Ignorez-vous, mes frères – je parle à des gens qui connaissent la loi – que la loi exerce sa maîtrise sur l''être humain aussi longtemps qu''il vit ? '
  '10':
  - type: note
    content: 'le commandement qui mène à la vie Lv 18.5 ; Dt 4.1 ; 5.32s ; Ez 20.11. –  mort  : cf. Gn 2.17.'
  - type: text
    content: 'et moi, je suis mort. Ainsi, le commandement qui mène à la vie s''est trouvé, pour moi, mener à la mort. '
  '11':
  - type: note
    content: Cf. Gn 3.13 ; 2Co 11.3 ; Hé 3.13.
  - type: text
    content: 'Car le péché, profitant de l''occasion, m''a trompé par le commandement et, par lui, il m''a tué. '
  '12':
  - type: note
    content: V. 16 ; Dt 4.8 ; 1Tm 1.8. –  la loi… sainte / juste 2.26 ; 7.12 ; Ps 19.10 ; 119.75.
  - type: text
    content: Certes, donc, la loi est sainte ; le commandement est saint, juste et bon.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '4.15+. –  le bien  : litt. le bon (v. 12, de même v. 19) ; cf. v. 18n. –  comme tel  : litt. péché . –  apparaisse… péché  : litt. devienne excessivement pécheur.'
  - type: text
    content: Est-ce donc le bien qui est devenu pour moi la mort ? Jamais de la vie ! C'est le péché qui, pour se manifester comme tel, a produit en moi la mort par le bien, afin que, par le commandement, le péché apparaisse dans toute sa puissance de péché.
  - type: heading
    content: Captif de la loi du péché
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'est spirituelle  : autre traduction relève de l''Esprit . –  un être de chair  : litt. charnel , même terme 1Co 3.1n  ; 2Co 3.3 ; Hé 7.16 ; terme apparenté en Rm 15.27n  ; cf. 7.18 ; 8.7 ; Ps 51.7 ; Jn 3.6 ; Ga 5.17. –  au péché  : litt. sous le péché , c.-à-d. au pouvoir du péché.'
  - type: text
    content: 'Nous savons, en effet, que la loi est spirituelle ; mais moi, je suis un être de chair, vendu au péché. '
  '15':
  - type: note
    content: ce que je produis 2.9n. –  je ne le comprends pas ou je ne le reconnais pas, litt. je ne le connais pas, je ne le sais pas.
  - type: text
    content: 'Car ce que je produis, je ne le comprends pas. Ce que je veux, je ne le pratique pas, mais ce que je fais, c''est ce que je déteste. '
  '16':
  - type: note
    content: 'V. 12. –  bonne  : le terme peut aussi avoir le sens de belle  ; cf. v. 18n  ; 1Tm 1.8n.'
  - type: text
    content: 'Si ce que je fais, c''est ce que je ne veux pas, je suis d''accord avec la loi pour dire qu''elle est bonne. '
  '17':
  - type: note
    content: V. 8,13,20.
  - type: text
    content: Maintenant, ce n'est plus moi qui produis cela, c'est le péché qui habite en moi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 6.5 ; 8.21. –  à ma portée v. 21. –  le bien  : le terme grec qui apparaît ici (et au v. 21 ; cf. v. 16n) peut aussi évoquer ce qui est beau (autre terme aux v. 13n,19).'
  - type: text
    content: 'Je le sais, rien de bon n''habite en moi, c''est-à-dire dans ma chair. Car il est à ma portée de vouloir, mais non pas de produire le bien. '
  '19':
  - type: note
    content: V. 16.
  - type: text
    content: 'Je ne fais pas le bien que je veux, mais je pratique le mal que je ne veux pas. '
  '2':
  - type: note
    content: '1Co 7.39. –  dégagée v. 6 ; 3.3+ ; la même formule est traduite par séparé de en Ga 5.4. –  la loi qui la liait à son mari  : litt. la loi du mari.'
  - type: text
    content: 'Ainsi, une femme mariée est liée par la loi à son mari tant qu''il est vivant ; mais si son mari meurt, elle est dégagée de la loi qui la liait à son mari. '
  '20':
  - type: note
    content: 'V. 17. –  ce que, moi, je ne veux pas  : certains mss portent seulement ce que je ne veux pas.'
  - type: text
    content: 'Si je fais ce que, moi, je ne veux pas, ce n''est plus moi qui le produis, c''est le péché qui habite en moi. '
  '21':
  - type: note
    content: 'qui est à ma portée (v. 18) : autre traduction qui se présente à moi.'
  - type: text
    content: 'Je trouve donc cette loi, pour moi qui veux faire le bien : ce qui est à ma portée, c''est le mal. '
  '22':
  - type: note
    content: 'pour ce qui est de l''homme…  : litt. selon l''homme (ou l''humain) intérieur  : cf. 2Co 4.16 ; Ep 3.16.'
  - type: text
    content: 'Car, pour ce qui est de l''homme que je suis intérieurement, je prends plaisir à la loi de Dieu, '
  '23':
  - type: note
    content: Ga 5.17 ; Jc 4.1,5 ; 1P 2.11. –  mon corps tout entier et tout mon corps traduisent la même expression grecque ; voir 6.13n.
  - type: text
    content: 'mais je vois dans mon corps tout entier une autre loi qui lutte contre la loi de mon intelligence et qui me rend captif – captif de la loi du péché qui est dans tout mon corps. '
  '24':
  - type: note
    content: 'Misérable ou malheureux (un terme apparenté est traduit par malheur en 3.16) : cf. Ap 3.17 ; voir aussi Ps 22.1-12 ; 107.6+ ; Jc 4.9 ; 5.1. –  de ce corps de mort  : on pourrait aussi comprendre du corps de cette mort, mais il s''agit sans doute d''un sémitisme (le démonstratif s''applique en fait à toute l''expression corps de mort) ; cf. 6.12s ; 8.10 ; 12.1.'
  - type: text
    content: 'Misérable que je suis ! Qui me délivrera de ce corps de mort ? '
  '25':
  - type: note
    content: 5.21 ; 6.17,23 ; 1Co 15.57 ; 2Co 2.14 ; 8.16 ; 9.15. –  Ainsi donc… v. 23+.
  - type: text
    content: Grâce soit rendue à Dieu par Jésus-Christ, notre Seigneur !
  - type: text
    content: Ainsi donc, moi, par mon intelligence, je suis esclave de la loi de Dieu, tandis que, par ma chair, je suis esclave de la loi du péché.
  '3':
  - type: text
    content: 'Si donc, du vivant de son mari, elle devient la femme d''un autre homme, on la dira adultère, mais si son mari meurt, elle est libérée de la loi : elle n''est donc pas adultère si elle devient la femme d''un autre homme.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'mis à mort pour (ou à l''égard de ) la loi  : cf. Ga 2.19 ; 3.13 ; Col 2.14s. –  corps du Christ 1Co 10.16. –  réveillé ou relevé , 4.24n. –  pour être à un autre  : cf. 6.5s ; 8.11-13 ; 2Co 5.15. –  portions du fruit 6.21s ; Col 1.10.'
  - type: text
    content: 'Par conséquent, mes frères, vous aussi vous avez été mis à mort pour la loi, au moyen du corps du Christ, pour être à un autre, celui qui s''est réveillé d''entre les morts, afin que nous portions du fruit pour Dieu. '
  '5':
  - type: note
    content: 'sous l''empire de la chair  : litt. dans la chair (cf. 8.8s). – Voir péchés. –  par la loi  : litt. qui (sont) par la loi  ; on peut comprendre excitées par la loi ou se servant de la loi  ; voir v. 7-25 ; 4.15+. –  étaient à l''œuvre  : un verbe apparenté est traduit par produire aux v. 8,13ss ; cf. 2.9n. –  corps tout entier 6.13n.'
  - type: text
    content: 'Car, lorsque nous étions sous l''empire de la chair, les passions des péchés, par la loi, étaient à l''œuvre dans notre corps tout entier et nous faisaient porter du fruit pour la mort. '
  '6':
  - type: note
    content: 'dégagés (v. 1+) / morts 6.2 ; 8.1s. –  captifs Ga 3.23. –  nous sommes esclaves  : autre traduction nous servons, cf. 6.6,16ss ; 12.11n  ; 14.18n  ; 16.18n. –  ce n''est plus…  : litt. en nouveauté (6.4+) d''Esprit et non (en) ancienneté de lettre (2.28s+) ; le texte oppose le régime de l''Esprit, qui caractérise la communauté chrétienne, à la loi écrite de Moïse (la Torah) ; cf. 2Co 3.6 ; Hé 8.13.'
  - type: text
    content: Mais maintenant, nous sommes dégagés de la loi, car nous sommes morts à ce qui nous tenait captifs, de sorte que si nous sommes esclaves, ce n'est plus sous le régime ancien de la lettre, mais sous le régime nouveau de l'Esprit.
  - type: heading
    content: Le rôle de la loi
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'loi / péché 3.20 ; 4.15+. –  Tu ne désireras pas ou tu ne convoiteras pas  ; le verbe peut s''appliquer à toutes sortes de désirs, bons ou mauvais du point de vue moral ; Paul cite ici le commandement d''une façon partielle, sans indiquer l''objet du désir, ce qui semble lui donner une portée très générale ; cf. Ex 20.17 ; Dt 5.21 ; 4 Maccabées 2.6 : « Dès lors, puisque la loi nous a dit de ne pas désirer (ou convoiter), je vous persuaderai plus aisément que la raison peut dominer les désirs, tout comme les passions qui font obstacle à la justice. »'
  - type: text
    content: 'Que dirons-nous donc ? La loi est-elle péché ? Jamais de la vie ! Mais je n''ai connu le péché que par la loi. Ainsi, je n''aurais pas su ce qu''était le désir si la loi n''avait pas dit : '
  - type: text
    content: Tu ne désireras pas
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'V. 5 ; 4.15 ; cf. 1Co 15.56 ; Jc 1.14s. –  en dehors de la loi  : autres traductions sans la loi ; sans loi  ; cf. 3.21.'
  - type: text
    content: 'Alors le péché, profitant de l''occasion, a produit en moi, par le commandement, toutes sortes de désirs ; en effet, en dehors de la loi, le péché est mort. '
  '9':
  - type: note
    content: Cf. 5.13.
  - type: text
    content: 'Moi, autrefois, en dehors de la loi, je vivais ; mais quand le commandement est venu, le péché a pris vie, '
