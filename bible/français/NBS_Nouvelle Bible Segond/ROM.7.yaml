document_id: ROM.7,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le chrétien est libéré de la loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ignorez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui connaissent la loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui savent ce qu'est une loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; les Romains étaient réputés pour leur science juridique. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'exerce sa maîtrise… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aussi longtemps qu'il vit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.7.'
      marker-yv: yv-n
    - type: text
      text: 'Ignorez-vous, mes frères – je parle à des gens qui connaissent la loi – que la loi exerce sa maîtrise sur l''être humain aussi longtemps qu''il vit ? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le commandement qui mène à la vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 18.5 ; Dt 4.1 ; 5.32s ; Ez 20.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 2.17.'
      marker-yv: yv-n
    - type: text
      text: 'et moi, je suis mort. Ainsi, le commandement qui mène à la vie s''est trouvé, pour moi, mener à la mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 3.13 ; 2Co 11.3 ; Hé 3.13.
      marker-yv: yv-n
    - type: text
      text: 'Car le péché, profitant de l''occasion, m''a trompé par le commandement et, par lui, il m''a tué. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 16 ; Dt 4.8 ; 1Tm 1.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la loi… '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainte
        - type: text
          text: ' / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.26 ; 7.12 ; Ps 19.10 ; 119.75.
      marker-yv: yv-n
    - type: text
      text: Certes, donc, la loi est sainte ; le commandement est saint, juste et bon.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le bon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 12, de même v. 19) ; cf. v. 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme tel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: apparaisse… péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devienne excessivement pécheur.
      marker-yv: yv-n
    - type: text
      text: Est-ce donc le bien qui est devenu pour moi la mort ? Jamais de la vie ! C'est le péché qui, pour se manifester comme tel, a produit en moi la mort par le bien, afin que, par le commandement, le péché apparaisse dans toute sa puissance de péché.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Captif de la loi du péché
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est spirituelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'relève de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un être de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charnel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même terme 1Co 3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 3.3 ; Hé 7.16 ; terme apparenté en Rm 15.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 7.18 ; 8.7 ; Ps 51.7 ; Jn 3.6 ; Ga 5.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous le péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au pouvoir du péché.
      marker-yv: yv-n
    - type: text
      text: 'Nous savons, en effet, que la loi est spirituelle ; mais moi, je suis un être de chair, vendu au péché. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que je produis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je ne le comprends pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ne le reconnais pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je ne le connais pas, je ne le sais pas.
      marker-yv: yv-n
    - type: text
      text: 'Car ce que je produis, je ne le comprends pas. Ce que je veux, je ne le pratique pas, mais ce que je fais, c''est ce que je déteste. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bonne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme peut aussi avoir le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: belle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Tm 1.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si ce que je fais, c''est ce que je ne veux pas, je suis d''accord avec la loi pour dire qu''elle est bonne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8,13,20.
      marker-yv: yv-n
    - type: text
      text: Maintenant, ce n'est plus moi qui produis cela, c'est le péché qui habite en moi.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 6.5 ; 8.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à ma portée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme grec qui apparaît ici (et au v. 21 ; cf. v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') peut aussi évoquer ce qui est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'beau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (autre terme aux v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',19).'
      marker-yv: yv-n
    - type: text
      text: 'Je le sais, rien de bon n''habite en moi, c''est-à-dire dans ma chair. Car il est à ma portée de vouloir, mais non pas de produire le bien. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 16.
      marker-yv: yv-n
    - type: text
      text: 'Je ne fais pas le bien que je veux, mais je pratique le mal que je ne veux pas. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 7.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dégagée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6 ; 3.3+ ; la même formule est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'séparé de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ga 5.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la loi qui la liait à son mari
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la loi du mari.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, une femme mariée est liée par la loi à son mari tant qu''il est vivant ; mais si son mari meurt, elle est dégagée de la loi qui la liait à son mari. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que, moi, je ne veux pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent seulement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce que je ne veux pas.
      marker-yv: yv-n
    - type: text
      text: 'Si je fais ce que, moi, je ne veux pas, ce n''est plus moi qui le produis, c''est le péché qui habite en moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui est à ma portée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 18) : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui se présente à moi.
      marker-yv: yv-n
    - type: text
      text: 'Je trouve donc cette loi, pour moi qui veux faire le bien : ce qui est à ma portée, c''est le mal. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour ce qui est de l'homme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'selon l''homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: intérieur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Co 4.16 ; Ep 3.16.'
      marker-yv: yv-n
    - type: text
      text: 'Car, pour ce qui est de l''homme que je suis intérieurement, je prends plaisir à la loi de Dieu, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ga 5.17 ; Jc 4.1,5 ; 1P 2.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon corps tout entier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout mon corps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent la même expression grecque ; voir 6.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'mais je vois dans mon corps tout entier une autre loi qui lutte contre la loi de mon intelligence et qui me rend captif – captif de la loi du péché qui est dans tout mon corps. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Misérable '
      - type: usfm
        marker: ft
        children:
        - type: text
