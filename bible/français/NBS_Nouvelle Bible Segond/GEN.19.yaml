document_id: GEN.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Loth échappe à la destruction de Sodome
  - type: text
    content: ' '
  - type: note
    content: 'messagers  : autre traduction anges  ; cf. 18.10n,16. –  Loth 13.12. –  assis à la porte Dt 16.18n  ; Rt 4.1+.'
  - type: text
    content: 'Les deux messagers arrivèrent à Sodome sur le soir. Or Loth était assis à la porte de Sodome. Quand Loth les vit, il se leva pour aller à leur rencontre et se prosterna face contre terre. '
  '10':
  - type: note
    content: 'Les hommes  : il s''agit des messagers ou anges que Loth a invités chez lui ; cf. v. 1 ; 18.1,22.'
  - type: text
    content: 'Les hommes tendirent la main, firent rentrer Loth auprès d''eux dans la maison et fermèrent la porte. '
  '11':
  - type: note
    content: 'cécité ou aveuglement 2R 6.18. –  depuis le plus petit jusqu''au plus grand, c.-à-d. tous sans exception  : cf. 1S 5.9 ; 2R 23.2 ; 25.26 ; Jr 6.13n  ; Jon 3.5 ; Est 1.5,20 ; 2Ch 34.30.'
  - type: text
    content: Quant aux hommes qui étaient à l'entrée de la maison, ils les frappèrent de cécité, depuis le plus petit jusqu'au plus grand, de sorte qu'ils n'arrivaient plus à trouver l'entrée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'fils et filles  : litt. tes fils et tes filles . –  tout ce qui t''appartient  : autre traduction tous ceux qui t''appartiennent.'
  - type: text
    content: 'Les hommes dirent à Loth : Qui as-tu encore ici ? Gendre, fils et filles, tout ce qui t''appartient dans la ville, fais-leur quitter ce lieu. '
  '13':
  - type: note
    content: 'les cris…  : litt. leur cri est grand, 18.20ns.'
  - type: text
    content: 'Car nous allons anéantir ce lieu. En effet, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', les cris contre eux sont si forts que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a envoyés pour anéantir la ville. '
  '14':
  - type: note
    content: 'Cf. Lc 17.28s. –  Quittez ce lieu  : litt. levez-vous, sortez de ce lieu.'
  - type: text
    content: 'Loth sortit pour parler à ses gendres, à ceux qui allaient épouser ses filles, et il leur dit : Quittez ce lieu, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' va anéantir la ville. Mais ses gendres crurent qu''il plaisantait.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'emporté ou supprimé , de même au v. 17 ; cf. 18.23n. –  par (ou dans ) la faute (ou le châtiment )… : cf. Jr 51.6 ; Ez 3.18n  ; Ap 18.4 ; voir aussi péché .'
  - type: text
    content: 'Quand l''aurore se leva, les messagers pressèrent Loth en disant : Lève-toi, prends ta femme et tes deux filles qui se trouvent ici, pour ne pas être emporté par la faute de la ville. '
  '16':
  - type: note
    content: 'le Seigneur voulait l''épargner  : autre traduction par la magnanimité du Seigneur  ; sur le terme correspondant, voir Es 63.9n  ; terme voisin en Ex 2.6n. –  le laissèrent  : autre traduction le conduisirent  ; cf. 2.15n.'
  - type: text
    content: 'Mais il s''attardait ; alors les hommes le saisirent par la main, lui, sa femme et ses deux filles, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voulait l''épargner ; ils le firent sortir et le laissèrent en dehors de la ville. '
  '17':
  - type: note
    content: 'ta vie  : cf. 1.20n. –  ne regarde pas…  : cf. Mt 24.15-18/ /. –  District 13.10nss. –  de peur que…  : cf. Nb 16.26.'
  - type: text
    content: 'En les faisant sortir à l''extérieur, il dit : Sauve-toi, il y va de ta vie ; ne regarde pas derrière toi et ne t''arrête pas dans tout le District ; sauve-toi vers la montagne, de peur que tu ne sois emporté ! '
  '18':
  - type: text
    content: 'Loth leur dit : Oh ! non, je t''en prie, Seigneur ! '
  '19':
  - type: note
    content: 'tu as montré…  : litt. tu as grandi ta fidélité que tu as faite avec moi  ; voir grâce.'
  - type: text
    content: 'Je t''en prie : moi, ton serviteur, j''ai trouvé grâce à tes yeux et tu as montré une grande fidélité envers moi en me conservant la vie ; mais je ne peux pas, moi, me sauver vers la montagne sans que le malheur s''attache à moi : je mourrai ! '
  '2':
  - type: note
    content: Sur l’hospitalité cf. 18.3-5+ ; Jg 19.16-21.
  - type: text
    content: 'Puis il dit : Mes seigneurs, je vous prie, faites un détour par chez moi, votre serviteur, pour y passer la nuit ; lavez-vous les pieds ; vous vous lèverez de bon matin et vous poursuivrez votre route. Non, répondirent-ils, nous passerons la nuit dehors, sur la place. '
  '20':
  - type: note
    content: 'petite  : hébreu mits‘ar, qui fait assonance avec le nom de Tsoar au v. 22n  ; cf. v. 31n  ; Ps 42.7n.'
  - type: text
    content: 'Regarde cette ville, je t''en prie : elle est assez proche pour que je m''y enfuie, et elle est petite ! Je t''en prie, pour que je reste en vie, laisse-moi me sauver jusque-là – n''est-elle pas petite ? '
  '21':
  - type: note
    content: 'Je te fais encore cette faveur  : litt. j''ai relevé ta face (cf. 4.7n) aussi pour cette parole (ou chose). –  détruirai  : le verbe employé ici signifie au sens propre retourner, renverser, mettre sens dessus dessous, bouleverser  ; on le retrouve aux v. 25,29 et en Dt 29.22 ; Es 1.7 ; 13.19 ; Jr 20.16 ; 49.18 ; 50.40 ; Os 11.8n  ; Am 4.11 ; Jon 3.4 ; Lm 4.6 ; voir aussi 1S 10.9n  ; So 3.9n. Son équivalent grec dans LXX a donné notre mot catastrophe.'
  - type: text
    content: 'Alors il lui dit : Je te fais encore cette faveur : je ne détruirai pas la ville dont tu parles. '
  '22':
  - type: note
    content: 'Tsoar  : nom propre apparenté à la racine qui exprime la petitesse au v. 20n  ; cf. Es 15.5.'
  - type: text
    content: 'Vite, sauve-toi jusque-là, car je ne peux rien faire jusqu''à ce que tu y sois arrivé. C''est pourquoi on a appelé cette ville du nom de Tsoar (« Petite »). '
  '23':
  - type: text
    content: Le soleil se levait sur la terre lorsque Loth entra dans Tsoar.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Gomorrhe  : la catastrophe est étendue à Adma et Tseboïm en Dt 29.22 ; cf. Os 11.8. Voir aussi Mt 10.15 ; 11.23s ; 2P 2.6 ; Jd 7. –  soufre (Jb 18.15+) / feu Lc 17.29 ; Ap 14.10 ; 20.10.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit pleuvoir sur Sodome et sur Gomorrhe du soufre et du feu venant du '
  - type: text
    content: Seigneur
  - type: text
    content: ', du ciel. '
  '25':
  - type: text
    content: 'Il détruisit ces villes, tout le District, tous les habitants des villes et la végétation de la terre. '
  '26':
  - type: note
    content: 'La femme de Loth  : litt. sa femme  ; Lc 17.32. –  sel So 2.9. – Cf. Sagesse 10.7 : « En témoignage de leur perversité subsistent toujours une terre aride et fumante, des plantes aux fruits que les saisons ne mûrissent pas, et une colonne de sel dressée en mémorial d''une âme incrédule. »'
  - type: text
    content: La femme de Loth regarda en arrière et devint une statue de sel.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 18.16ss.
  - type: text
    content: 'Abraham se leva de bon matin pour aller au lieu où il s''était tenu devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '28':
  - type: note
    content: 'fumée Ap 9.2 ; 14.11. –  fourneau  : comparer avec 15.17 (c''est un autre terme qui y est traduit par fournaise) ; même terme en Ex 9.8,10 ; 19.18.'
  - type: text
    content: 'Il porta ses regards du côté de Sodome et de Gomorrhe, et sur tout le District, et il vit monter de la terre une fumée comme celle d''un fourneau. '
  '29':
  - type: note
    content: 'il retira…  : litt. il renvoya Loth du milieu de la destruction, cf. Es 1.7.'
  - type: text
    content: 'Lorsque Dieu anéantit les villes du District, il se souvint d''Abraham : il retira Loth de la destruction lorsqu''il détruisit les villes où Loth habitait.'
  - type: heading
    content: Loth et ses filles
  '3':
  - type: note
    content: 'il insista tellement  : cf. v. 9n.'
  - type: text
    content: Mais il insista tellement qu'ils firent un détour pour se rendre chez lui. Il donna un banquet pour eux. Il fit cuire des pains sans levain, et ils mangèrent.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'une grotte  : litt. la grotte  : elle est peut-être connue du lecteur (cf. 6.17n  ; 14.13n).'
  - type: text
    content: 'Loth monta de Tsoar pour s''installer dans la montagne avec ses deux filles, car il avait peur de s''installer à Tsoar. Il s''installa dans une grotte. '
  '31':
  - type: note
    content: 'Cf. Rt 3. –  la cadette  : litt. la petite (hébreu tse‘ira), nouveau terme faisant assonance avec le nom de Tsoar (v. 20n,22n). –  il n''y a pas d''homme dans le pays  : on pourrait aussi traduire il n''y a plus personne sur la terre, ce qui donnerait une autre idée de la dimension de la catastrophe et expliquerait la situation désespérée de la famille de Loth. –  selon l''usage commun à tous  : litt. selon la voie (ou le chemin) de toute la terre  ; formule analogue (à propos de la mort) Jos 23.14 ; 1R 2.2n.'
  - type: text
    content: 'Alors l''aînée dit à la cadette : Notre père est vieux, et il n''y a pas d''homme dans le pays pour aller avec nous selon l''usage commun à tous. '
  '32':
  - type: note
    content: 'afin de donner…  : litt. et nous ferons vivre de notre père une descendance, de même au v. 34. Cf. 11.4 ; 38.11-30 ; voir aussi Lv 18.6s ; Ha 2.15 ; Rm 3.8.'
  - type: text
    content: 'Viens, faisons boire du vin à notre père et couchons avec lui, afin de donner la vie à une descendance issue de notre père. '
  '33':
  - type: note
    content: 'ce soir-là  : autre traduction cette nuit-là. –  il ne se rendit compte de rien  : litt. il ne sut pas ou il ne connut pas.'
  - type: text
    content: 'Elles firent donc boire du vin à leur père ce soir-là ; et l''aînée alla coucher avec son père : il ne se rendit compte de rien, ni quand elle se coucha, ni quand elle se leva. '
  '34':
  - type: text
    content: 'Le lendemain, l''aînée dit à la cadette : J''ai couché avec mon père la nuit dernière ; faisons-lui boire du vin ce soir encore, et va coucher avec lui, afin de donner la vie à une descendance issue de notre père. '
  '35':
  - type: text
    content: 'Elles firent boire du vin à leur père ce soir-là encore, et la cadette se releva pour coucher avec lui : il ne se rendit compte de rien, ni quand elle se coucha, ni quand elle se leva. '
  '36':
  - type: note
    content: 'de leur père  : hébreu mé''abihèn, formule qui fait assonance avec le nom de Moab, cf. v. 37n.'
  - type: text
    content: 'Ainsi les deux filles de Loth furent enceintes de leur père. '
  '37':
  - type: note
    content: 'Cette conclusion établit la parenté d''Israël avec ses deux voisins Moab (v. 36n) et Ammon (v. 38). Du point de vue d''Israël, ces voisins sont à la fois stigmatisés par leur origine incestueuse et mis en valeur par un double rattachement à Loth, et par celui-ci à Abraham (cf. Dt 2.9,19 ; voir aussi 23.3ss ; Rt). –  c''est le père…  : litt. c''est le père de Moab jusqu''à aujourd''hui  ; les Moabites étaient installés sur le plateau qui domine la mer Morte, à l''est.'
  - type: text
    content: 'L''aînée mit au monde un fils qu''elle appela du nom de Moab : c''est le père de Moab – jusqu''à aujourd''hui. '
  '38':
  - type: note
    content: Ben-Ammi signifie Fils de mon peuple ou mon compatriote, l'un des miens (cf. Os 1.9 ; 2.3). Voir aussi nom. –  c'est le père des Ammonites (litt. des fils d'Ammon), cf. v. 37n  ; les Ammonites avaient leur territoire à l'est du Jourdain, au nord de celui des Moabites (cf. So 2.9).
  - type: text
    content: 'La cadette mit aussi au monde un fils, qu''elle appela du nom de Ben-Ammi (« Fils de mon peuple ») : c''est le père des Ammonites – jusqu''à aujourd''hui.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'sans exception  : autre traduction de tous les coins , cf. Jr 51.31 ( d''une extrémité à l''autre ).'
  - type: text
    content: 'Ils n''étaient pas encore couchés que les gens de la ville, les hommes de Sodome, entourèrent la maison, depuis les jeunes gens jusqu''aux vieillards, tout le peuple, sans exception. '
  '5':
  - type: note
    content: 'ce soir  : autre traduction cette nuit. –  ayons des relations… 4.1n  ; c''est de cette mention de l''homosexualité des gens de Sodome que nous vient le mot sodomie. Cf. 13.13 ; 18.20 ; Lv 20.13 ; Jg 19.22-25 ; Rm 1.24,27 ; cf. Ez 16.49s.'
  - type: text
    content: 'Ils appelèrent Loth et lui dirent : Où sont les hommes qui sont entrés chez toi ce soir ? Fais-les sortir vers nous, pour que nous ayons des relations avec eux ! '
  '6':
  - type: note
    content: 'de la maison  : sous-entendu dans le texte.'
  - type: text
    content: 'Loth sortit vers eux, à l''entrée de la maison, et ferma la porte derrière lui. '
  '7':
  - type: text
    content: 'Il dit : Mes frères, je vous en prie, n''agissez pas mal ! '
  '8':
  - type: note
    content: Voir Jg 19.23n.
  - type: text
    content: 'J''ai deux filles qui n''ont jamais eu de relations avec un homme ; je vais les faire sortir vers vous, et vous leur ferez ce qu''il vous plaira. Seulement, ne faites rien à ces hommes, puisqu''ils sont venus à l''ombre de mon toit. '
  '9':
  - type: note
    content: 'juge Ex 2.14+ ; 2P 2.7s. –  en insistant fortement  : autre traduction en pressant violemment  ; la même formule hébraïque évoque l''insistance de Loth au v. 3 ; même verbe en 33.11 ; Jg 19.7 ; 2R 2.17 ; 5.16. –  Loth  : litt. l''homme Loth  ; cf. Nb 12.3n.'
  - type: text
    content: 'Ils dirent : Pousse-toi ! Ils dirent encore : Celui-ci est venu tout seul, en immigré, et il veut faire le juge ! Maintenant, nous allons te faire plus de mal qu''à eux ! Tout en insistant fortement auprès de Loth, ils s''avançaient pour briser la porte. '
