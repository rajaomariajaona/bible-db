    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Jr 51.31 ('
    - type: usfm
      marker: ft
      children:
      - type: text
