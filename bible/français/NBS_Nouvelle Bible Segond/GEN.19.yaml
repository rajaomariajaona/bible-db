      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand l''aurore se leva, les messagers pressèrent Loth en disant : Lève-toi, prends ta femme et tes deux filles qui se trouvent ici, pour ne pas être emporté par la faute de la ville. '
  - type: usfm
    marker: v
