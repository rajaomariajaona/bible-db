      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il ne sut pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne connut pas.
    marker-yv: yv-n
  - type: text
    text: 'Elles firent donc boire du vin à leur père ce soir-là ; et l''aînée alla coucher avec son père : il ne se rendit compte de rien, ni quand elle se coucha, ni quand elle se leva. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le lendemain, l''aînée dit à la cadette : J''ai couché avec mon père la nuit dernière ; faisons-lui boire du vin ce soir encore, et va coucher avec lui, afin de donner la vie à une descendance issue de notre père. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Elles firent boire du vin à leur père ce soir-là encore, et la cadette se releva pour coucher avec lui : il ne se rendit compte de rien, ni quand elle se coucha, ni quand elle se leva. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de leur père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mé'abihèn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', formule qui fait assonance avec le nom de Moab, cf. v. 37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi les deux filles de Loth furent enceintes de leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cette conclusion établit la parenté d''Israël avec ses deux voisins '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 36
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ammon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 38). Du point de vue d''Israël, ces voisins sont à la fois stigmatisés par leur origine incestueuse et mis en valeur par un double rattachement à Loth, et par celui-ci à Abraham (cf. Dt 2.9,19 ; voir aussi 23.3ss ; Rt). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est le père…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est le père de Moab jusqu'à aujourd'hui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; les Moabites étaient installés sur le plateau qui domine la mer Morte, à l''est.'
    marker-yv: yv-n
  - type: text
    text: 'L''aînée mit au monde un fils qu''elle appela du nom de Moab : c''est le père de Moab – jusqu''à aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ben-Ammi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de mon peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mon compatriote, l''un des miens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Os 1.9 ; 2.3). Voir aussi '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'c''est le père des Ammonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des fils d'Ammon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), cf. v. 37
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; les Ammonites avaient leur territoire à l''est du Jourdain, au nord de celui des Moabites (cf. So 2.9).'
    marker-yv: yv-n
  - type: text
    text: 'La cadette mit aussi au monde un fils, qu''elle appela du nom de Ben-Ammi (« Fils de mon peuple ») : c''est le père des Ammonites – jusqu''à aujourd''hui.'
