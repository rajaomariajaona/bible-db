        - type: text
          text: fils
      - type: text
        text: ' et filles'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes fils et tes filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout ce qui t'appartient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous ceux qui t'appartiennent.
    marker-yv: yv-n
  - type: text
    text: 'Les hommes dirent à Loth : Qui as-tu encore ici ? Gendre, fils et filles, tout ce qui t''appartient dans la ville, fais-leur quitter ce lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les cris…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur cri est grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 18.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'Car nous allons anéantir ce lieu. En effet, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', les cris contre eux sont si forts que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a envoyés pour anéantir la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 17.28s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quittez ce lieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: levez-vous, sortez de ce lieu.
    marker-yv: yv-n
  - type: text
    text: 'Loth sortit pour parler à ses gendres, à ceux qui allaient épouser ses filles, et il leur dit : Quittez ce lieu, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' va anéantir la ville. Mais ses gendres crurent qu''il plaisantait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
