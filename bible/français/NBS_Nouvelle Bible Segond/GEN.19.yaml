    marker-yv: yv-n
  - type: text
    text: 'Les deux messagers arrivèrent à Sodome sur le soir. Or Loth était assis à la porte de Sodome. Quand Loth les vit, il se leva pour aller à leur rencontre et se prosterna face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sur l’
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: hospitalité
      - type: text
        text: ' cf. 18.3-5+ ; Jg 19.16-21.'
    marker-yv: yv-n
  - type: text
    text: 'Puis il dit : Mes seigneurs, je vous prie, faites un détour par chez moi, votre serviteur, pour y passer la nuit ; lavez-vous les pieds ; vous vous lèverez de bon matin et vous poursuivrez votre route. Non, répondirent-ils, nous passerons la nuit dehors, sur la place. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il insista tellement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Mais il insista tellement qu'ils firent un détour pour se rendre chez lui. Il donna un banquet pour eux. Il fit cuire des pains sans levain, et ils mangèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
