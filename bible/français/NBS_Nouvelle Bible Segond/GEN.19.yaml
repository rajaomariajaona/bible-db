    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Ils n''étaient pas encore couchés que les gens de la ville, les hommes de Sodome, entourèrent la maison, depuis les jeunes gens jusqu''aux vieillards, tout le peuple, sans exception. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce soir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cette nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ayons des relations… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; c''est de cette mention de l''homosexualité des gens de Sodome que nous vient le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sodomie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 13.13 ; 18.20 ; Lv 20.13 ; Jg 19.22-25 ; Rm 1.24,27 ; cf. Ez 16.49s.
    marker-yv: yv-n
  - type: text
    text: 'Ils appelèrent Loth et lui dirent : Où sont les hommes qui sont entrés chez toi ce soir ? Fais-les sortir vers nous, pour que nous ayons des relations avec eux ! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Loth sortit vers eux, à l''entrée de la maison, et ferma la porte derrière lui. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il dit : Mes frères, je vous en prie, n''agissez pas mal ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Jg 19.23
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'J''ai deux filles qui n''ont jamais eu de relations avec un homme ; je vais les faire sortir vers vous, et vous leur ferez ce qu''il vous plaira. Seulement, ne faites rien à ces hommes, puisqu''ils sont venus à l''ombre de mon toit. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'juge '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 2.14+ ; 2P 2.7s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en insistant fortement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en pressant violemment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la même formule hébraïque évoque l''insistance de Loth au v. 3 ; même verbe en 33.11 ; Jg 19.7 ; 2R 2.17 ; 5.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Loth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'homme Loth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 12.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils dirent : Pousse-toi ! Ils dirent encore : Celui-ci est venu tout seul, en immigré, et il veut faire le juge ! Maintenant, nous allons te faire plus de mal qu''à eux ! Tout en insistant fortement auprès de Loth, ils s''avançaient pour briser la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'messagers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'anges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: que Loth a invités chez lui ; cf. v. 1 ; 18.1,22.
    marker-yv: yv-n
  - type: text
    text: 'Les hommes tendirent la main, firent rentrer Loth auprès d''eux dans la maison et fermèrent la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cécité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'aveuglement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 6.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis le plus petit jusqu'au plus grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous sans exception
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 5.9 ; 2R 23.2 ; 25.26 ; Jr 6.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jon 3.5 ; Est 1.5,20 ; 2Ch 34.30.'
    marker-yv: yv-n
  - type: text
    text: Quant aux hommes qui étaient à l'entrée de la maison, ils les frappèrent de cécité, depuis le plus petit jusqu'au plus grand, de sorte qu'ils n'arrivaient plus à trouver l'entrée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
