document_id: DAN.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le premier rêve de Nabuchodonosor
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deuxième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette précision indique peut-être que le roi ne connaît pas encore personnellement Daniel (cf. 1.5,18). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de son règne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du règne de Nabuchodonosor, Nabuchodonosor… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il fut troublé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son souffle fut troublé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 3 ; 4.2 ; 7.28 ; cf. Gn 41.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le sommeil le quitta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte hébreu traditionnel porte une formule qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le sommeil revint sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se rendormit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; d'après des versions anciennes, certains le modifient pour lire une tournure moins ambiguë, comparable à celle de 6.19 ; cf. Gn 31.40 ; Est 6.1.
      marker-yv: yv-n
    - type: text
      text: 'La deuxième année de son règne, Nabuchodonosor fit des rêves. Il fut troublé, et le sommeil le quitta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Les chaldéens répondirent au roi : Il n''est personne sur terre qui puisse faire ce que demande le roi. C''est pourquoi aucun roi, si grand et puissant soit-il, n''a exigé pareille chose d''aucun mage, envoûteur ou chaldéen.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 30 ; Gn 41.16.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ce que le roi demande est difficile, il n'y a personne d'autre qui puisse le dire au roi, sinon les dieux, dont la demeure n'est pas parmi les êtres charnels.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu révèle à Daniel le rêve du roi
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.4+.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Là-dessus le roi entra dans une violente colère. Il ordonna de faire disparaître tous les sages de Babylone.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: La sentence fut publiée ; les sages allaient être mis à mort, et l'on vint chercher Daniel et ses compagnons pour les mettre à mort.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chef des gardes du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 25.8 ; Jr 39.9.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors Daniel parla d'une manière avisée et sensée à Ariok, chef des gardes du roi, qui était sorti pour mettre à mort les sages de Babylone.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Il dit à Ariok, commandant du roi : Pourquoi la sentence du roi est-elle si sévère ? Ariok exposa la chose à Daniel.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors Daniel se rendit auprès du roi et le pria de lui accorder un délai pour donner au roi l'interprétation.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Puis Daniel rentra chez lui et fit connaître l'affaire à Hanania, Mishaël et Azaria, ses compagnons,
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu du ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 19,37,44 ; cf. Gn 24.7 ; Esd 5.11s ; 6.9s ; Ap 11.13 ; 16.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mystère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant, d''origine perse, n''apparaît que dans Daniel ; cf. v. 27-30,47 ; 4.6.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: pour implorer la compassion du Dieu du ciel au sujet de ce mystère, afin qu'on ne fasse pas disparaître Daniel et ses compagnons avec le reste des sages de Babylone.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nuit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.2,7 ; cf. Gn 46.2 ; Jb 4.13 ; 20.8.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors le mystère fut révélé à Daniel dans une vision, pendant la nuit. Alors Daniel bénit le Dieu du ciel.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'envoûteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.20+ ; le terme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chaldéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est ici à prendre, non pas dans son sens ethnique ou géographique (équivalent de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Babyloniens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 5.30 ; 9.1 ; voir Gn 11.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), mais comme synonyme de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: envoûteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut-être plus particulièrement au sens d’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: astrologues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les arts occultes, et en particulier l''astrologie, étaient liés depuis toujours à la réputation de Babylone (cf. 1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.4 etc.). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: exposent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on peut comprendre aussi bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'racontent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'que '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: expliquent.
      marker-yv: yv-n
    - type: text
      text: 'Le roi fit appeler les mages, les envoûteurs, les sorciers et les chaldéens, pour qu''ils exposent au roi ses rêves. Ils vinrent et se présentèrent devant le roi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Béni
        - type: text
          text: ' soit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 41.14 ; Né 9.5. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'force '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jb 12.13 ; Ap 5.12.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Daniel dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Béni soit le nom de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: depuis toujours et pour toujours !
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A lui sont la sagesse et la force.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les temps et les circonstances
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les années et les saisons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 7.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 1.7 ; 1Th 5.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.4+,17 ; cf. 1Co 2.6-8.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: C'est lui qui change les temps et les circonstances,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: qui renverse les rois
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et qui établit les rois,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: qui donne la sagesse aux sages
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et la connaissance à ceux qui ont de l'intelligence.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ténèbres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 139.11s ; Jb 12.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lumière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Tm 6.16 ; 1Jn 1.5.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: C'est lui qui révèle ce qui est profond et caché,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: qui connaît ce qui est dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et la lumière demeure avec lui.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dieu de mes pères,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: je te célèbre et je te loue
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: pour la sagesse et la force que tu m'as données,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: car tu m'as fait connaître ce que nous t'avons demandé,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et tu nous as fait connaître l'affaire du roi !
  '24':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Après cela, Daniel se rendit auprès d''Ariok, à qui le roi avait ordonné de faire disparaître les sages de Babylone. Il alla lui dire : Ne fais pas disparaître les sages de Babylone. Conduis-moi devant le roi, et je donnerai au roi l''interprétation.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La statue aux pieds fragiles
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ariok conduisit vite Daniel devant le roi et lui dit : J''ai trouvé parmi les exilés de Juda un homme qui donnera l''interprétation au roi.'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Daniel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Belteshatsar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.6s ; 4.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le roi demanda à Daniel, qu''on nommait Belteshatsar : Es-tu capable de me faire connaître le rêve que j''ai vu et son interprétation ?'
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme araméen semble désigner ceux qui prétendent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tailler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou déterminer les destinées (il est apparenté au verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se détacher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 34).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Daniel répondit, devant le roi : Le mystère que le roi demande, ce ne sont pas les sages, les envoûteurs, les mages et les devins qui sont capables de le dire au roi ;'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.28 '
