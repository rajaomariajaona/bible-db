            text: sacrifices
        - type: text
          text: ' d''odeur agréable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 6.8 ; Esd 6.10 ; cf. 1Co 14.25.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors le roi Nabuchodonosor tomba face contre terre, prosterné devant Daniel, et il ordonna de lui présenter des offrandes et des sacrifices d'odeur agréable.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.47 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu des dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Seigneur des rois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.36 ; cf. Dt 10.17 ; 1Tm 6.15 ; Ap 17.14 ; 19.16.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le roi dit à Daniel : En vérité, votre Dieu est le Dieu des dieux, le Seigneur des rois et le révélateur des mystères, puisque tu as pu révéler ce mystère.'
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.48 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le nomma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ensuite le roi éleva Daniel et lui fit de nombreux et riches présents. Il lui donna le commandement de toute la province de Babylone et le nomma chef suprême de tous les sages de Babylone.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la porte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Est 2.19,21 ; 3.2s ; 5.9,13.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Daniel pria le roi de remettre l'administration de la province de Babylone à Shadrak, Méshak et Abed-Nego. Daniel était à la cour du roi.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voici ce que j'ai décidé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole est sortie de moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', formule d''origine perse signifiant que la chose est assurée ; certains ont cependant compris'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la chose (le rêve) m''a échappé. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mis en pièces… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.29 ; cf. Esd 6.11 ; au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réduites en un tas d'immondices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', des versions anciennes ont compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: confisquées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ac 8.20.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le roi répondit aux chaldéens : Voici ce que j''ai décidé : si vous ne me faites pas connaître le rêve et son interprétation, vous serez mis en pièces, et vos maisons seront réduites en un tas d''immondices.'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mais si vous me dites le rêve et son interprétation, vous recevrez de moi des dons, des présents et de grands honneurs. Aussi dites-moi le rêve et son interprétation.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ils répondirent pour la seconde fois : O roi, dis-nous le rêve, à nous, tes serviteurs, et nous en donnerons l''interprétation !'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous voulez gagner du temps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous achetez le temps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ep 5.16 ; Col 4.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que j'ai décidé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.9,13,16 ; Est 1.19 ; 8.8.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le roi reprit : Je sais, en vérité, que vous voulez gagner du temps, parce que vous voyez ce que j''ai décidé.'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Si donc vous ne me faites pas connaître le rêve, il y aura une même sentence pour vous tous ; vous êtes prêts à me dire des paroles mensongères et erronées, en attendant que les temps changent. Aussi dites-moi le rêve, et je saurai que vous êtes capables de m'en donner l'interprétation.
    - type: text
      text: ' '
