        marker: ft
        children:
        - type: text
          text: 'V. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les pensées de ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.28 ; Gn 6.5 ; Ez 38.10 ; Ps 33.11 ; Pr 19.21.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Si ce mystère m'a été révélé, ce n'est pas qu'il y ait en moi une sagesse supérieure à celle de tous les vivants, mais c'est afin que l'interprétation soit donnée au roi, et que tu connaisses les pensées de ton cœur.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: statue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.1.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: O roi, tu as eu une vision, celle d'une grande statue. Cette statue était immense et d'une splendeur extraordinaire. Elle était debout devant toi, et son aspect était terrible.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: La tête de cette statue était d'or pur ; sa poitrine et ses bras étaient d'argent ; son ventre et ses cuisses étaient de bronze ;
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: ses jambes, de fer ; ses pieds, en partie de fer et en partie d'argile.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se détacha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : les versions grecque et latine ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''une montagne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 45). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans l'action d'aucune main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.25 ; Es 31.8.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu regardais, lorsqu'une pierre se détacha sans l'action d'aucune main, frappa les pieds de fer et d'argile de la statue et les réduisit en poussière.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme la balle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 1.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'on n'en retrouva aucune trace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Théodotion (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ) a lu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'y eut plus de place pour eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ap 12.8 ; 20.11.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors le fer, l'argile, le bronze, l'argent et l'or furent pulvérisés ensemble et devinrent comme la balle qui s'échappe d'une aire de battage en été ; le vent les emporta, et l'on n'en retrouva aucune trace. Mais la pierre qui avait frappé la statue devint une grande montagne et remplit toute la terre.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Voilà le rêve. Nous en donnerons l'interprétation devant le roi.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
