document_id: DAN.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le premier rêve de Nabuchodonosor
  - type: text
    content: ' '
  - type: note
    content: 'deuxième année  : cette précision indique peut-être que le roi ne connaît pas encore personnellement Daniel (cf. 1.5,18). –  de son règne…  : litt. du règne de Nabuchodonosor, Nabuchodonosor… –  Il fut troublé  : litt. son esprit ou son souffle fut troublé , v. 3 ; 4.2 ; 7.28 ; cf. Gn 41.8. –  le sommeil le quitta  : le texte hébreu traditionnel porte une formule qui pourrait aussi signifier le sommeil revint sur lui , c.-à-d. il se rendormit  ; d''après des versions anciennes, certains le modifient pour lire une tournure moins ambiguë, comparable à celle de 6.19 ; cf. Gn 31.40 ; Est 6.1.'
  - type: text
    content: 'La deuxième année de son règne, Nabuchodonosor fit des rêves. Il fut troublé, et le sommeil le quitta. '
  '10':
  - type: text
    content: 'Les chaldéens répondirent au roi : Il n''est personne sur terre qui puisse faire ce que demande le roi. C''est pourquoi aucun roi, si grand et puissant soit-il, n''a exigé pareille chose d''aucun mage, envoûteur ou chaldéen.'
  - type: text
    content: ' '
  '11':
  - type: note
    content: V. 30 ; Gn 41.16.
  - type: text
    content: Ce que le roi demande est difficile, il n'y a personne d'autre qui puisse le dire au roi, sinon les dieux, dont la demeure n'est pas parmi les êtres charnels.
  - type: heading
    content: Dieu révèle à Daniel le rêve du roi
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'sages  : cf. 1.4+.'
  - type: text
    content: Là-dessus le roi entra dans une violente colère. Il ordonna de faire disparaître tous les sages de Babylone.
  - type: text
    content: ' '
  '13':
  - type: text
    content: La sentence fut publiée ; les sages allaient être mis à mort, et l'on vint chercher Daniel et ses compagnons pour les mettre à mort.
  - type: text
    content: ' '
  '14':
  - type: note
    content: 'chef des gardes du roi  : cf. 2R 25.8 ; Jr 39.9.'
  - type: text
    content: Alors Daniel parla d'une manière avisée et sensée à Ariok, chef des gardes du roi, qui était sorti pour mettre à mort les sages de Babylone.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Il dit à Ariok, commandant du roi : Pourquoi la sentence du roi est-elle si sévère ? Ariok exposa la chose à Daniel.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: Alors Daniel se rendit auprès du roi et le pria de lui accorder un délai pour donner au roi l'interprétation.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Puis Daniel rentra chez lui et fit connaître l'affaire à Hanania, Mishaël et Azaria, ses compagnons,
  - type: text
    content: ' '
  '18':
  - type: note
    content: 'Dieu du ciel v. 19,37,44 ; cf. Gn 24.7 ; Esd 5.11s ; 6.9s ; Ap 11.13 ; 16.11. –  mystère  : le mot correspondant, d''origine perse, n''apparaît que dans Daniel ; cf. v. 27-30,47 ; 4.6.'
  - type: text
    content: pour implorer la compassion du Dieu du ciel au sujet de ce mystère, afin qu'on ne fasse pas disparaître Daniel et ses compagnons avec le reste des sages de Babylone.
  '19':
  - type: text
    content: ' '
  - type: note
    content: vision / nuit 7.2,7 ; cf. Gn 46.2 ; Jb 4.13 ; 20.8.
  - type: text
    content: Alors le mystère fut révélé à Daniel dans une vision, pendant la nuit. Alors Daniel bénit le Dieu du ciel.
  - type: text
    content: ' '
  '2':
  - type: note
    content: 'mages / envoûteurs 1.20+ ; le terme chaldéens est ici à prendre, non pas dans son sens ethnique ou géographique (équivalent de Babyloniens, comme en 5.30 ; 9.1 ; voir Gn 11.28n  ; 22.22n), mais comme synonyme de mages ou envoûteurs, peut-être plus particulièrement au sens d’astrologues  : les arts occultes, et en particulier l''astrologie, étaient liés depuis toujours à la réputation de Babylone (cf. 1.4n  ; 4.4 etc.). –  exposent  : on peut comprendre aussi bien racontent que expliquent.'
  - type: text
    content: 'Le roi fit appeler les mages, les envoûteurs, les sorciers et les chaldéens, pour qu''ils exposent au roi ses rêves. Ils vinrent et se présentèrent devant le roi. '
  '20':
  - type: note
    content: Béni soit… Ps 41.14 ; Né 9.5. – Voir nom. –  sagesse / force Jb 12.13 ; Ap 5.12.
  - type: text
    content: 'Daniel dit :'
  - type: text
    content: Béni soit le nom de Dieu,
  - type: text
    content: depuis toujours et pour toujours !
  - type: text
    content: A lui sont la sagesse et la force.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les temps et les circonstances  : autre traduction les années et les saisons  ; cf. 7.12n,25n  ; Ac 1.7 ; 1Th 5.1. –  sagesse / connaissance 1.4+,17 ; cf. 1Co 2.6-8.'
  - type: text
    content: C'est lui qui change les temps et les circonstances,
  - type: text
    content: qui renverse les rois
  - type: text
    content: et qui établit les rois,
  - type: text
    content: qui donne la sagesse aux sages
  - type: text
    content: et la connaissance à ceux qui ont de l'intelligence.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ténèbres Ps 139.11s ; Jb 12.22. –  lumière 1Tm 6.16 ; 1Jn 1.5.
  - type: text
    content: C'est lui qui révèle ce qui est profond et caché,
  - type: text
    content: qui connaît ce qui est dans les ténèbres,
  - type: text
    content: et la lumière demeure avec lui.
  '23':
  - type: text
    content: ' '
  - type: text
    content: Dieu de mes pères,
  - type: text
    content: je te célèbre et je te loue
  - type: text
    content: pour la sagesse et la force que tu m'as données,
  - type: text
    content: car tu m'as fait connaître ce que nous t'avons demandé,
  - type: text
    content: et tu nous as fait connaître l'affaire du roi !
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Après cela, Daniel se rendit auprès d''Ariok, à qui le roi avait ordonné de faire disparaître les sages de Babylone. Il alla lui dire : Ne fais pas disparaître les sages de Babylone. Conduis-moi devant le roi, et je donnerai au roi l''interprétation.'
  - type: heading
    content: La statue aux pieds fragiles
  '25':
  - type: text
    content: ' '
  - type: text
    content: 'Ariok conduisit vite Daniel devant le roi et lui dit : J''ai trouvé parmi les exilés de Juda un homme qui donnera l''interprétation au roi.'
  - type: text
    content: ' '
  '26':
  - type: note
    content: Daniel / Belteshatsar 1.6s ; 4.5n.
  - type: text
    content: 'Le roi demanda à Daniel, qu''on nommait Belteshatsar : Es-tu capable de me faire connaître le rêve que j''ai vu et son interprétation ?'
  - type: text
    content: ' '
  '27':
  - type: note
    content: 'devins  : le terme araméen semble désigner ceux qui prétendent tailler ou déterminer les destinées (il est apparenté au verbe traduit par se détacher au v. 34).'
  - type: text
    content: 'Daniel répondit, devant le roi : Le mystère que le roi demande, ce ne sont pas les sages, les envoûteurs, les mages et les devins qui sont capables de le dire au roi ;'
  - type: text
    content: ' '
  '28':
  - type: note
    content: 'mystères  : cf. v. 18n  ; Mc 4.11 ; Rm 16.25 ; 1Co 2.7-11 ; Ep 3.10 ; Col 4.3. –  dans la suite des temps  : cf. 10.14n  ; Ap 1.1,19 ; 4.1 ; 22.6. –  les visions que tu as eues  : litt. les visions de ta tête  ; 4.2n.'
  - type: text
    content: mais il y a dans le ciel un Dieu qui révèle les mystères, et qui a fait connaître au roi Nabuchodonosor ce qui arrivera dans la suite des temps. Voici ton rêve, les visions que tu as eues sur ton lit.
  - type: text
    content: ' '
  '29':
  - type: note
    content: le révélateur des mystères v. 47.
  - type: text
    content: Sur ton lit, ô roi, il t'est venu des pensées concernant ce qui arrivera dans la suite ; et le révélateur des mystères t'a fait connaître ce qui arrivera.
  - type: text
    content: ' '
  '3':
  - type: note
    content: 'comprendre  : le verbe correspondant en araméen (v. 4n) est traduit par connaître aux v. 5,9,17,22s,26,28ss,45.'
  - type: text
    content: 'Le roi leur dit : J''ai fait un rêve, et je suis troublé, parce que je voudrais comprendre ce rêve. '
  '30':
  - type: note
    content: V. 11. –  les pensées de ton cœur 7.28 ; Gn 6.5 ; Ez 38.10 ; Ps 33.11 ; Pr 19.21.
  - type: text
    content: Si ce mystère m'a été révélé, ce n'est pas qu'il y ait en moi une sagesse supérieure à celle de tous les vivants, mais c'est afin que l'interprétation soit donnée au roi, et que tu connaisses les pensées de ton cœur.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'statue  : cf. 3.1.'
  - type: text
    content: O roi, tu as eu une vision, celle d'une grande statue. Cette statue était immense et d'une splendeur extraordinaire. Elle était debout devant toi, et son aspect était terrible.
  - type: text
    content: ' '
  '32':
  - type: text
    content: La tête de cette statue était d'or pur ; sa poitrine et ses bras étaient d'argent ; son ventre et ses cuisses étaient de bronze ;
  - type: text
    content: ' '
  '33':
  - type: text
    content: ses jambes, de fer ; ses pieds, en partie de fer et en partie d'argile.
  - type: text
    content: ' '
  '34':
  - type: note
    content: 'se détacha (cf. v. 27n) : les versions grecque et latine ajoutent d''une montagne (cf. v. 45). –  sans l''action d''aucune main  : cf. 8.25 ; Es 31.8.'
  - type: text
    content: Tu regardais, lorsqu'une pierre se détacha sans l'action d'aucune main, frappa les pieds de fer et d'argile de la statue et les réduisit en poussière.
  - type: text
    content: ' '
  '35':
  - type: note
    content: 'comme la balle Ps 1.4+. –  l''on n''en retrouva aucune trace  : Théodotion (voir LXX) a lu  : il n''y eut plus de place pour eux  ; cf. Ap 12.8 ; 20.11.'
  - type: text
    content: Alors le fer, l'argile, le bronze, l'argent et l'or furent pulvérisés ensemble et devinrent comme la balle qui s'échappe d'une aire de battage en été ; le vent les emporta, et l'on n'en retrouva aucune trace. Mais la pierre qui avait frappé la statue devint une grande montagne et remplit toute la terre.
  '36':
  - type: text
    content: ' '
  - type: text
    content: Voilà le rêve. Nous en donnerons l'interprétation devant le roi.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'roi des rois  : cf. Ez 26.7. –  royauté… puissance… force… gloire 4.27 ; 5.18.'
  - type: text
    content: O roi, tu es le roi des rois, car le Dieu du ciel t'a donné la royauté, la puissance, la force et la gloire.
  - type: text
    content: ' '
  '38':
  - type: note
    content: 'Jr 27.6 ; 28.14 ; cf. Gn 1.28 ; 2.19s ; Ps 8.7-9 ; Judith 11.7 : « Grâce à toi (Holopherne, général en chef de l''armée babylonienne) non seulement tous les hommes le servent (Nabuchodonosor), mais les bêtes sauvages, le bétail et les oiseaux du ciel vivront par ta vigueur pour Nabuchodonosor et toute sa maison. » –  les hommes  : litt. les fils des hommes. –  les animaux sauvages  : litt. les animaux de la campagne ou des champs, de même dans la suite.'
  - type: text
    content: Il t'a livré les hommes, les animaux sauvages et les oiseaux du ciel, où qu'ils habitent, et il t'a fait dominer sur eux tous ; c'est toi qui es la tête d'or.
  - type: text
    content: ' '
  '39':
  - type: note
    content: 'un autre royaume (cf. 7.17) : après l''empire babylonien vient sans doute le royaume des Mèdes (6.1 ; cf. Es 13.17 ; 21.2 ; Jr 51.11,28), puis un troisième royaume, l''empire perse dont l''étendue est ici mise en évidence. Certains commentateurs ont vu dans le deuxième royaume l''alliance médo-perse et dans le troisième l''empire grec et hellénistique (cf. v. 40n).'
  - type: text
    content: Après toi s'élèvera un autre royaume, moindre que le tien ; puis un troisième royaume, qui sera de bronze, et qui dominera sur toute la terre.
  - type: text
    content: ' '
  '4':
  - type: note
    content: 'en langue araméenne  : le texte qui suit, jusqu''à la fin du chapitre 7, est effectivement en araméen (sur l''emploi international de cette langue, cf. 2R 18.26 ; Esd 4.7n). –  O roi, puisses-tu vivre toujours ! 3.9 ; 5.10 ; 6.7,22 ; Né 2.3.'
  - type: text
    content: 'Les chaldéens répondirent au roi, en langue araméenne :'
  - type: text
    content: O roi, puisses-tu vivre toujours ! Dis-nous le rêve, à nous, tes serviteurs, et nous en donnerons l'interprétation.
  - type: text
    content: ' '
  '40':
  - type: note
    content: 'Le quatrième royaume est, dans la première hypothèse (v. 39n), l''empire grec bâti par Alexandre le Grand (7.23-25 ; 8.5,21 ; 11.2s). Pour les tenants du second schéma il s''agirait de l''Empire romain. –  solide  : même mot araméen que puissance au v. 37.'
  - type: text
    content: Il y aura un quatrième royaume, solide comme du fer ; de même que le fer pulvérise et casse tout, il pulvérisera et brisera tout, comme le fer brise tout.
  - type: text
    content: ' '
  '41':
  - type: note
    content: 'divisé  : allusion possible au partage de l''empire d''Alexandre entre les dynasties hellénistiques lagide (Egypte, au sud de la Judée) et séleucide (Syrie, au nord) ; cf. 11.4ss.'
  - type: text
    content: Et comme tu as vu les pieds et les orteils en partie d'argile de potier et en partie de fer, ce royaume sera divisé ; mais il y aura en lui quelque chose de la force du fer, parce que tu as vu le fer mêlé à l'argile.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Et comme les doigts des pieds étaient en partie de fer et en partie d'argile, ce royaume sera en partie solide et en partie fragile.
  - type: text
    content: ' '
  '43':
  - type: note
    content: 'par des alliances humaines  : litt. par de la semence d''homme  ; cette expression désigne vraisemblablement des alliances scellées par des mariages, comme il y en eut, par exemple, entre les deux royaumes hellénistiques en 255 et en 194 av. J.-C. (cf. 11.6).'
  - type: text
    content: Tu as vu le fer mêlé à l'argile, parce qu'ils se mêleront par des alliances humaines ; mais ils ne s'attacheront pas l'un à l'autre, de même que le fer ne se mêle pas à l'argile.
  - type: text
    content: ' '
  '44':
  - type: note
    content: 'un royaume…  : cf. 3.33 ; 4.31 ; 7.14,18 ; 2S 7.16 ; Lc 1.33. –  il pulvérisera Mt 21.44/ / ; cf. 1Co 15.24 ; Ap 11.15. –  anéantira  : litt. mettra fin (à).'
  - type: text
    content: Aux jours de ces rois, le Dieu du ciel suscitera un royaume qui ne sera jamais détruit, et ce royaume ne passera pas sous la domination d'un autre peuple ; il pulvérisera et anéantira tous ces royaumes-là, et lui-même subsistera toujours.
  - type: text
    content: ' '
  '45':
  - type: note
    content: V. 34s.
  - type: text
    content: Ainsi, tu as vu la pierre se détacher de la montagne sans l'action d'aucune main, et elle a pulvérisé le fer, le bronze, l'argile, l'argent et l'or. Un grand Dieu a fait connaître au roi ce qui doit arriver dans la suite. Le rêve est sûr, et son interprétation est digne de foi.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'prosterné  : le même verbe araméen sera rendu en 3.5ss par adorer. –  offrandes / sacrifices d''odeur agréable Lv 6.8 ; Esd 6.10 ; cf. 1Co 14.25.'
  - type: text
    content: Alors le roi Nabuchodonosor tomba face contre terre, prosterné devant Daniel, et il ordonna de lui présenter des offrandes et des sacrifices d'odeur agréable.
  - type: text
    content: ' '
  '47':
  - type: note
    content: Dieu des dieux / Seigneur des rois 11.36 ; cf. Dt 10.17 ; 1Tm 6.15 ; Ap 17.14 ; 19.16.
  - type: text
    content: 'Le roi dit à Daniel : En vérité, votre Dieu est le Dieu des dieux, le Seigneur des rois et le révélateur des mystères, puisque tu as pu révéler ce mystère.'
  - type: text
    content: ' '
  '48':
  - type: note
    content: 'le nomma  : sous-entendu dans le texte.'
  - type: text
    content: Ensuite le roi éleva Daniel et lui fit de nombreux et riches présents. Il lui donna le commandement de toute la province de Babylone et le nomma chef suprême de tous les sages de Babylone.
  - type: text
    content: ' '
  '49':
  - type: note
    content: 'à la cour  : litt. à la porte  ; cf. Est 2.19,21 ; 3.2s ; 5.9,13.'
  - type: text
    content: Daniel pria le roi de remettre l'administration de la province de Babylone à Shadrak, Méshak et Abed-Nego. Daniel était à la cour du roi.
  '5':
  - type: note
    content: 'Voici ce que j''ai décidé  : litt. la parole est sortie de moi, formule d''origine perse signifiant que la chose est assurée ; certains ont cependant compris  : la chose (le rêve) m''a échappé. –  mis en pièces… 3.29 ; cf. Esd 6.11 ; au lieu de réduites en un tas d''immondices, des versions anciennes ont compris confisquées  ; cf. Ac 8.20.'
  - type: text
    content: 'Le roi répondit aux chaldéens : Voici ce que j''ai décidé : si vous ne me faites pas connaître le rêve et son interprétation, vous serez mis en pièces, et vos maisons seront réduites en un tas d''immondices.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais si vous me dites le rêve et son interprétation, vous recevrez de moi des dons, des présents et de grands honneurs. Aussi dites-moi le rêve et son interprétation.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Ils répondirent pour la seconde fois : O roi, dis-nous le rêve, à nous, tes serviteurs, et nous en donnerons l''interprétation !'
  - type: text
    content: ' '
  '8':
  - type: note
    content: 'vous voulez gagner du temps  : litt. vous achetez le temps  ; cf. Ep 5.16 ; Col 4.5. –  ce que j''ai décidé  : cf. 6.9,13,16 ; Est 1.19 ; 8.8.'
  - type: text
    content: 'Le roi reprit : Je sais, en vérité, que vous voulez gagner du temps, parce que vous voyez ce que j''ai décidé.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Si donc vous ne me faites pas connaître le rêve, il y aura une même sentence pour vous tous ; vous êtes prêts à me dire des paroles mensongères et erronées, en attendant que les temps changent. Aussi dites-moi le rêve, et je saurai que vous êtes capables de m'en donner l'interprétation.
  - type: text
    content: ' '
