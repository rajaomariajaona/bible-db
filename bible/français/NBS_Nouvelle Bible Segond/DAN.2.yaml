        text: Ainsi, tu as vu la pierre se détacher de la montagne sans l'action d'aucune main, et elle a pulvérisé le fer, le bronze, l'argile, l'argent et l'or. Un grand Dieu a fait connaître au roi ce qui doit arriver dans la suite. Le rêve est sûr, et son interprétation est digne de foi.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
