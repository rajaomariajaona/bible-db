  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 27.6 ; 28.14 ; cf. Gn 1.28 ; 2.19s ; Ps 8.7-9 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Judith
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.7 : « Grâce à toi (Holopherne, général en chef de l''armée babylonienne) non seulement tous les hommes le servent (Nabuchodonosor), mais les bêtes sauvages, le bétail et les oiseaux du ciel vivront par ta vigueur pour Nabuchodonosor et toute sa maison. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les fils des hommes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les animaux sauvages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les animaux de la campagne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des champs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Il t'a livré les hommes, les animaux sauvages et les oiseaux du ciel, où qu'ils habitent, et il t'a fait dominer sur eux tous ; c'est toi qui es la tête d'or.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un autre royaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 7.17) : après l''empire babylonien vient sans doute le royaume des Mèdes (6.1 ; cf. Es 13.17 ; 21.2 ; Jr 51.11,28), '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puis un troisième royaume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', l''empire perse dont l''étendue est ici mise en évidence. Certains commentateurs ont vu dans le deuxième royaume l''alliance médo-perse et dans le troisième l''empire grec et hellénistique (cf. v. 40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Après toi s'élèvera un autre royaume, moindre que le tien ; puis un troisième royaume, qui sera de bronze, et qui dominera sur toute la terre.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en langue araméenne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte qui suit, jusqu''à la fin du chapitre 7, est effectivement en araméen (sur l''emploi international de cette langue, cf. 2R 18.26 ; Esd 4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'O roi, puisses-tu vivre toujours ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.9 ; 5.10 ; 6.7,22 ; Né 2.3.
      marker-yv: yv-n
    - type: text
      text: 'Les chaldéens répondirent au roi, en langue araméenne :'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: O roi, puisses-tu vivre toujours ! Dis-nous le rêve, à nous, tes serviteurs, et nous en donnerons l'interprétation.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quatrième royaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est, dans la première hypothèse (v. 39
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), l''empire grec bâti par Alexandre le Grand (7.23-25 ; 8.5,21 ; 11.2s). Pour les tenants du second schéma il s''agirait de l''Empire romain. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: solide
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même mot araméen que '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'puissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 37.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Il y aura un quatrième royaume, solide comme du fer ; de même que le fer pulvérise et casse tout, il pulvérisera et brisera tout, comme le fer brise tout.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: divisé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : allusion possible au partage de l''empire d''Alexandre entre les dynasties hellénistiques lagide (Egypte, au sud de la Judée) et séleucide (Syrie, au nord) ; cf. 11.4ss.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Et comme tu as vu les pieds et les orteils en partie d'argile de potier et en partie de fer, ce royaume sera divisé ; mais il y aura en lui quelque chose de la force du fer, parce que tu as vu le fer mêlé à l'argile.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Et comme les doigts des pieds étaient en partie de fer et en partie d'argile, ce royaume sera en partie solide et en partie fragile.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par des alliances humaines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par de la semence d'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette expression désigne vraisemblablement des alliances scellées par des mariages, comme il y en eut, par exemple, entre les deux royaumes hellénistiques en 255 et en 194 av. J.-C. (cf. 11.6).'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu as vu le fer mêlé à l'argile, parce qu'ils se mêleront par des alliances humaines ; mais ils ne s'attacheront pas l'un à l'autre, de même que le fer ne se mêle pas à l'argile.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un royaume…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.33 ; 4.31 ; 7.14,18 ; 2S 7.16 ; Lc 1.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il pulvérisera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 21.44/ / ; cf. 1Co 15.24 ; Ap 11.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anéantira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mettra fin (à).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aux jours de ces rois, le Dieu du ciel suscitera un royaume qui ne sera jamais détruit, et ce royaume ne passera pas sous la domination d'un autre peuple ; il pulvérisera et anéantira tous ces royaumes-là, et lui-même subsistera toujours.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.45 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 34s.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
