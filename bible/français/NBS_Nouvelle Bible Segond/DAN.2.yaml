          text: 'connaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 5,9,17,22s,26,28ss,45.
      marker-yv: yv-n
    - type: text
      text: 'Le roi leur dit : J''ai fait un rêve, et je suis troublé, parce que je voudrais comprendre ce rêve. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
