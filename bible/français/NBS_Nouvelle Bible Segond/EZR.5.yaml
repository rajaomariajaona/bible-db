document_id: EZR.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reprise des travaux de reconstruction du temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.14 ; Ag 1.1,12ss ; 2.1ss ; Za 1.1 (où '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zacharie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: apparaît comme le petit-fils d’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Iddo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; 3.1,6. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Judéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le prophète Aggée et le prophète Zacharie, fils d'Iddo, parlèrent au nom du Dieu d'Israël aux Judéens qui étaient en Juda et à Jérusalem.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 4 ; 2.3ss.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nous leur avons aussi demandé leurs noms pour te les faire connaître, en mettant par écrit les noms des hommes qui sont à leur tête.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réponse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu du ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un grand roi d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Salomon (1R 6).'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Voici la réponse qu''ils nous ont faite : Nous sommes les serviteurs du Dieu du ciel et de la terre, et nous rebâtissons la maison qui avait été bâtie il y a bien des années ; un grand roi d''Israël l''avait bâtie et achevée.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'irrité… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 1R 14.9 ; 2R 17.17 ; 21.6,15 ; Jr 32.32 ; Ez 16.26 ; Za 8.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il les livra… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 25 ; 2Ch 36.16s ; cf. Gn 9.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Chaldéen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 23.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui détruisit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Dieu) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: détruisit.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mais après que nos pères eurent irrité le Dieu du ciel, il les livra à Nabuchodonosor, roi de Babylone, le Chaldéen, qui détruisit cette maison et exila le peuple à Babylone.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss ; 6.3.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toutefois, la première année de Cyrus, roi de Babylone, le roi Cyrus donna l'ordre de rebâtir cette maison de Dieu.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'objets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.5 ; 7.19 ; cf. 1.7s ; même terme araméen en Dn 5.2s,23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le temple de Babylone
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement le temple de Mardouk ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.18 dit « dans son propre temple ». –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sheshbatsar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ajoute ici le nom de « Zorobabel », sans doute pour identifier les deux personnages (cf. 1.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',11) ; en fait Zorobabel a dû achever ce que Sheshbatsar avait commencé (v. 16 ; cf. 3.8,10).'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Le roi Cyrus enleva même du temple de Babylone les objets d'or et d'argent de la maison de Dieu, que Nabuchodonosor avait enlevés du temple de Jérusalem et emportés dans le temple de Babylone ; il les fit remettre à un homme nommé Sheshbatsar, qu'il nomma gouverneur,
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur son emplacement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression 6.5 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la place où ils étaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), 7.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'et il lui dit : Emporte ces objets, va les déposer dans le temple de Jérusalem, et que la maison de Dieu soit rebâtie sur son emplacement.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fondations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.6 ; 4.12 ; 6.3 ; Za 4.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis lors…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis lors jusqu'à maintenant.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ce Sheshbatsar est donc venu et il a posé les fondations de la maison de Dieu à Jérusalem ; depuis lors on la bâtit, mais elle n'est pas achevée.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Est 1.19 ; 8.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maison des trésors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains pensent qu''il s''agit du lieu où sont déposées les archives (les archives faisant partie des trésors) ; même terme en 7.20 ; un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trésorier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1.8 ; cf. 4.15 ; 6.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Babylone
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le nom semble désigner ici une région plus vaste que la simple ville (cf. 6.1s).'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Maintenant, si cela te semble bon, ô roi, qu'on fasse des recherches dans la maison des trésors du roi à Babylone, pour voir s'il y a eu de la part du roi Cyrus un ordre donné pour rebâtir cette maison de Dieu à Jérusalem. Puis, que le roi nous transmette sa volonté à ce sujet. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',16 ; 2.2+ ; 3.2+,8-10 ; Za 4.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: commencèrent à bâtir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se levèrent et commencèrent à bâtir. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '– Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors Zorobabel, fils de Shéaltiel, et Josué, fils de Yotsadaq, commencèrent à bâtir la maison de Dieu à Jérusalem. Et avec eux étaient les prophètes de Dieu, qui les assistaient.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tathnaï, gouverneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(équivalent du terme hébreu de 8.36+) 6.6,13 ; on pense avoir retrouvé son nom dans des documents de l''administration perse à Babylone. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Transeuphratène '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'collègues '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.7+.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Dans ce même temps, Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï et leurs collègues vinrent leur dire : Qui vous a donné l''ordre de bâtir cette maison et de restaurer cette charpente ?'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nous leur avons dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils leur dirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cet édifice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette ville.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Nous leur avons dit alors : Comment se nomment les hommes qui bâtissent cet édifice ?'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'œil de leur Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 11.12 ; Jr 24.6 ; Ps 33.18 ; 34.16 ; 2Ch 7.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les anciens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les exilés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait correspondre à une autre vocalisation des consonnes de l''araméen. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lettre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mais l'œil de leur Dieu était sur les anciens des Judéens. On ne leur fit pas interrompre les travaux avant d'avoir envoyé un rapport à Darius et d'avoir reçu une lettre à ce sujet.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Judéens dénoncés au roi Darius
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et leurs collègues d'Apharsak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et leurs collègues, les légats de Transeuphratène
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 4.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.6.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Copie de la lettre que Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï et leurs collègues d'Apharsak, en Transeuphratène, envoyèrent au roi Darius.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rapport '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Ils lui envoyèrent un rapport ainsi conçu : « Au roi Darius. Paix parfaite !'
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esdras
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.8s : « Que notre seigneur le roi sache parfaitement que, nous étant rendus dans la province de Juda, nous avons trouvé dans la ville de Jérusalem les anciens des Judéens déportés qui construisaient une nouvelle et grande maison pour le Seigneur, avec des pierres taillées de grand prix, et le bois était déjà posé sur les murs. » –  '
