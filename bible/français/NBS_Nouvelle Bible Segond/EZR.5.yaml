document_id: EZR.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Reprise des travaux de reconstruction du temple
  - type: text
    content: ' '
  - type: note
    content: 6.14 ; Ag 1.1,12ss ; 2.1ss ; Za 1.1 (où Zacharie apparaît comme le petit-fils d’ Iddo ) ; 3.1,6. – Voir nom. –  Judéens 4.12n.
  - type: text
    content: Le prophète Aggée et le prophète Zacharie, fils d'Iddo, parlèrent au nom du Dieu d'Israël aux Judéens qui étaient en Juda et à Jérusalem.
  - type: text
    content: ' '
  '10':
  - type: note
    content: Cf. v. 4 ; 2.3ss.
  - type: text
    content: Nous leur avons aussi demandé leurs noms pour te les faire connaître, en mettant par écrit les noms des hommes qui sont à leur tête.
  - type: text
    content: ' '
  '11':
  - type: note
    content: 'réponse 4.17n. –  Dieu du ciel 1.2n. –  un grand roi d''Israël  : Salomon (1R 6).'
  - type: text
    content: 'Voici la réponse qu''ils nous ont faite : Nous sommes les serviteurs du Dieu du ciel et de la terre, et nous rebâtissons la maison qui avait été bâtie il y a bien des années ; un grand roi d''Israël l''avait bâtie et achevée.'
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'irrité… cf. 1R 14.9 ; 2R 17.17 ; 21.6,15 ; Jr 32.32 ; Ez 16.26 ; Za 8.14. –  il les livra… 2R 25 ; 2Ch 36.16s ; cf. Gn 9.2n. –  Chaldéen  : cf. 4.15n  ; Es 23.13n. –  qui détruisit  : autre traduction possible et il (Dieu) détruisit.'
  - type: text
    content: Mais après que nos pères eurent irrité le Dieu du ciel, il les livra à Nabuchodonosor, roi de Babylone, le Chaldéen, qui détruisit cette maison et exila le peuple à Babylone.
  - type: text
    content: ' '
  '13':
  - type: note
    content: 1.1nss ; 6.3.
  - type: text
    content: Toutefois, la première année de Cyrus, roi de Babylone, le roi Cyrus donna l'ordre de rebâtir cette maison de Dieu.
  - type: text
    content: ' '
  '14':
  - type: note
    content: 'objets 6.5 ; 7.19 ; cf. 1.7s ; même terme araméen en Dn 5.2s,23. –  dans le temple de Babylone  : probablement le temple de Mardouk ; 3 Esdras 6.18 dit « dans son propre temple ». –  Sheshbatsar  : 3 Esdras ajoute ici le nom de « Zorobabel », sans doute pour identifier les deux personnages (cf. 1.8n,11) ; en fait Zorobabel a dû achever ce que Sheshbatsar avait commencé (v. 16 ; cf. 3.8,10).'
  - type: text
    content: Le roi Cyrus enleva même du temple de Babylone les objets d'or et d'argent de la maison de Dieu, que Nabuchodonosor avait enlevés du temple de Jérusalem et emportés dans le temple de Babylone ; il les fit remettre à un homme nommé Sheshbatsar, qu'il nomma gouverneur,
  - type: text
    content: ' '
  '15':
  - type: note
    content: 'sur son emplacement  : même expression 6.5 (à la place où ils étaient), 7.'
  - type: text
    content: 'et il lui dit : Emporte ces objets, va les déposer dans le temple de Jérusalem, et que la maison de Dieu soit rebâtie sur son emplacement.'
  - type: text
    content: ' '
  '16':
  - type: note
    content: 'Cf. 1.8n. –  les fondations  : cf. 3.6 ; 4.12 ; 6.3 ; Za 4.9. –  depuis lors…  : litt. depuis lors jusqu''à maintenant.'
  - type: text
    content: Ce Sheshbatsar est donc venu et il a posé les fondations de la maison de Dieu à Jérusalem ; depuis lors on la bâtit, mais elle n'est pas achevée.
  - type: text
    content: ' '
  '17':
  - type: note
    content: 'Cf. Est 1.19 ; 8.8. –  maison des trésors  : certains pensent qu''il s''agit du lieu où sont déposées les archives (les archives faisant partie des trésors) ; même terme en 7.20 ; un terme apparenté est traduit par trésorier en 1.8 ; cf. 4.15 ; 6.1nss. –  à Babylone  : le nom semble désigner ici une région plus vaste que la simple ville (cf. 6.1s).'
  - type: text
    content: Maintenant, si cela te semble bon, ô roi, qu'on fasse des recherches dans la maison des trésors du roi à Babylone, pour voir s'il y a eu de la part du roi Cyrus un ordre donné pour rebâtir cette maison de Dieu à Jérusalem. Puis, que le roi nous transmette sa volonté à ce sujet. »
  '2':
  - type: note
    content: 'Cf. v. 14n,16 ; 2.2+ ; 3.2+,8-10 ; Za 4.9. –  commencèrent à bâtir  : litt. se levèrent et commencèrent à bâtir. – Voir prophète.'
  - type: text
    content: Alors Zorobabel, fils de Shéaltiel, et Josué, fils de Yotsadaq, commencèrent à bâtir la maison de Dieu à Jérusalem. Et avec eux étaient les prophètes de Dieu, qui les assistaient.
  - type: text
    content: ' '
  '3':
  - type: note
    content: Tathnaï, gouverneur (équivalent du terme hébreu de 8.36+) 6.6,13 ; on pense avoir retrouvé son nom dans des documents de l'administration perse à Babylone. –  Transeuphratène 4.10n. –  collègues 4.7+.
  - type: text
    content: 'Dans ce même temps, Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï et leurs collègues vinrent leur dire : Qui vous a donné l''ordre de bâtir cette maison et de restaurer cette charpente ?'
  - type: text
    content: ' '
  '4':
  - type: note
    content: 'Nous leur avons dit  : LXX ils leur dirent  ; cf. v. 10. –  cet édifice  : LXX cette ville.'
  - type: text
    content: 'Nous leur avons dit alors : Comment se nomment les hommes qui bâtissent cet édifice ?'
  - type: text
    content: ' '
  '5':
  - type: note
    content: 'l''œil de leur Dieu  : cf. Dt 11.12 ; Jr 24.6 ; Ps 33.18 ; 34.16 ; 2Ch 7.16. –  les anciens  : LXX a lu les exilés, ce qui pourrait correspondre à une autre vocalisation des consonnes de l''araméen. –  lettre 4.18n.'
  - type: text
    content: Mais l'œil de leur Dieu était sur les anciens des Judéens. On ne leur fit pas interrompre les travaux avant d'avoir envoyé un rapport à Darius et d'avoir reçu une lettre à ce sujet.
  - type: heading
    content: Les Judéens dénoncés au roi Darius
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'et leurs collègues d''Apharsak  : autre traduction et leurs collègues, les légats de Transeuphratène  ; cf. 4.9n-10n  ; 6.6.'
  - type: text
    content: Copie de la lettre que Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï et leurs collègues d'Apharsak, en Transeuphratène, envoyèrent au roi Darius.
  - type: text
    content: ' '
  '7':
  - type: note
    content: rapport 4.17n.
  - type: text
    content: 'Ils lui envoyèrent un rapport ainsi conçu : « Au roi Darius. Paix parfaite !'
  - type: text
    content: ' '
  '8':
  - type: note
    content: 'Cf. 3 Esdras 6.8s : « Que notre seigneur le roi sache parfaitement que, nous étant rendus dans la province de Juda, nous avons trouvé dans la ville de Jérusalem les anciens des Judéens déportés qui construisaient une nouvelle et grande maison pour le Seigneur, avec des pierres taillées de grand prix, et le bois était déjà posé sur les murs. » –  la province de Juda dépendait alors de Samarie (4.10n). –  la maison du grand Dieu ou la grande maison de Dieu. –  pierres de taille  : litt. pierres de roulement, pierres de grandes dimensions qu''on déplaçait en les faisant rouler sur des rondins de bois ; LXX pierres de choix. –  bois dans les murs  : chevrons ou lambris ? Cf. 6.4 ; 1R 6.36 ; 7.12. –  avec soin  : cf. 7.17 ; le même terme sera traduit par exactement en 6.8+. –  progresse rapidement  : litt. réussit, 6.14.'
  - type: text
    content: Que le roi sache que nous sommes allés dans la province de Juda, à la maison du grand Dieu. On la bâtit en pierres de taille, et on pose du bois dans les murs ; le travail se fait avec soin et progresse rapidement entre leurs mains.
  - type: text
    content: ' '
  '9':
  - type: note
    content: 'les anciens  : cf. v. 5n,8n.'
  - type: text
    content: 'Nous avons interrogé les anciens ; nous leur avons demandé : Qui vous a donné l''ordre de bâtir cette maison et de restaurer cette charpente ?'
  - type: text
    content: ' '
