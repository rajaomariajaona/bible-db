document_id: 1SA.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvelle faute de Saül
  - type: text
    content: ' '
  - type: note
    content: 'l''onction  : cf. 10.1. –  ce que dit le Seigneur  : litt. la voix (ou le son ) des paroles du Seigneur  ; cf. Dt 4.12.'
  - type: text
    content: 'Samuel dit à Saül : C''est moi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a envoyé pour te conférer l''onction, afin que tu sois roi sur son peuple, sur Israël. Ecoute donc ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'La parole du Seigneur parvint à  : cette tournure se rencontre fréquemment dans les livres des prophètes, en particulier Jérémie (1.4 etc.) et Ezéchiel (3.16 etc.).'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Samuel : '
  '11':
  - type: note
    content: 'Je regrette  : cf. v. 29,35 ; Gn 6.6s ; Ex 32.12-14 ; Jr 18.7-10. –  il s''est détourné de moi  : litt. il s''est détourné (ou il est revenu) de derrière moi  ; autre traduction il a cessé de me suivre  ; cf. Nb 14.43n  ; 1R 9.6 ; 11.9. –  exécuté  : autre traduction réalisé. –  en fut fâché  : autre traduction en fut profondément ému ou bouleversé. –  cria vers le Seigneur  : cf. 7.8n  ; 12.8,10.'
  - type: text
    content: 'Je regrette d''avoir investi Saül de la royauté, car il s''est détourné de moi et il n''a pas exécuté mes paroles. Samuel en fut fâché ; il cria vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' toute la nuit. '
  '12':
  - type: note
    content: 'trouver Saül pour lui transmettre le message prophétique que Dieu lui a communiqué. –  Carmel  : localité de Juda, située au sud d''Hébron, cf. 25.2 ; Jos 15.55 ; à ne pas confondre avec le mont Carmel, sur le littoral méditerranéen. –  un monument  : litt. une main, cf. 2S 18.18 ; Es 56.5 ; Ez 21.24. –  il est redescendu au Guilgal  : litt. il a tourné et il est passé et il est descendu au Guilgal (cf. 7.16n). –  LXX présente la fin du v. 12 et le début du v. 13 sous une forme un peu différente, avec des informations tirées en fait du v. 21  : Samuel… descendit au Guilgal auprès de Saül. Or celui-ci était en train d''offrir des holocaustes au Seigneur, les prémices du butin qu''il avait pris à Amalec. Samuel s''approcha de Saül, et Saül lui dit : …'
  - type: text
    content: 'Samuel se leva de bon matin pour aller trouver Saül. On lui dit : Saül est allé au Carmel, il s''y est érigé un monument ; puis il est redescendu au Guilgal. '
  '13':
  - type: note
    content: 'Sois béni du Seigneur  : formule qui peut être interprétée comme une salutation ou comme un remerciement ; cf. 23.21 ; Jg 17.2 ; 2S 2.5 ; Rt 3.10. –  J''ai exécuté la parole du Seigneur v. 11 ; cf. Pr 21.2 ; 28.13.'
  - type: text
    content: 'Samuel se rendit auprès de Saül, et Saül lui dit : Sois béni du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! J''ai exécuté la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Samuel dit : Qu''est-ce donc que ces bêlements de petit bétail qui parviennent à mes oreilles, et ces mugissements de gros bétail que j''entends ? '
  '15':
  - type: note
    content: 'On les a amenés  : LXX dit je les ai amenés. –  a épargné le meilleur  : cf. v. 9. –  afin de le sacrifier  : Saül essaie de justifier ainsi la désobéissance des soldats ; cf. v. 21. –  nous l''avons frappé  : LXX je l''ai frappé  ; cf. v. 20.'
  - type: text
    content: 'Saül répondit : On les a amenés de chez les Amalécites : le peuple a épargné le meilleur du petit bétail et du gros bétail, afin de le sacrifier au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; le reste, nous l''avons frappé d''anathème.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Assez ! ou cela suffit ! litt. abandonne ou cesse  ; cf. Ps 46.11. –  m'a dit cette nuit v. 10s ; 2S 7.4+.
  - type: text
    content: 'Samuel dit à Saül : Assez ! Je vais t''annoncer ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit cette nuit. Et Saül lui dit : Parle ! '
  '17':
  - type: note
    content: petit à tes propres yeux 9.21n  ; cf. Pr 15.33. –  onction 9.16 ; 10.1.
  - type: text
    content: 'Samuel dit : N''est-ce pas lorsque tu étais petit à tes propres yeux que tu es devenu le chef des tribus d''Israël, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a conféré l''onction pour que tu sois roi sur Israël ? '
  '18':
  - type: note
    content: 't''avait envoyé  : litt. t''avait envoyé sur le chemin  ; le sens de cette expression pourrait être ici t''avait indiqué le chemin à suivre  ; cf. v. 20. –  jusqu''à leur extermination  : cf. 2R 13.17-19.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''avait envoyé en disant : Va et frappe d''anathème ces pécheurs d''Amalécites ; tu leur feras la guerre jusqu''à leur extermination. '
  '19':
  - type: note
    content: 'écouté le Seigneur  : cf. 12.14s ; 15.1. –  jeté sur le butin  : cf. 14.32. –  fait ce qui déplaisait  : cf. Nb 22.34n  ; Jg 2.11+.'
  - type: text
    content: 'Pourquoi n''as-tu pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Pourquoi t''es-tu jeté sur le butin et as-tu fait ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '2':
  - type: note
    content: 'Seigneur (YHWH) des Armées  : cf. 1.3n  ; voir noms divins. –  J''ai décidé de…  : autre traduction j''ai repensé à Amalec  ; Vg j''ai passé en revue Amalec  ; LXX je ferai justice à Amalec… –  Amalec, c.-à-d. les Amalécites (de même dans la suite du chap.) : cf. Ex 17.8-16 ; Dt 25.17-19. –  montait d''Egypte Gn 12.10n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : J''ai décidé de faire rendre des comptes à Amalec pour ce qu''il a fait à Israël, quand il s''est mis sur son chemin tandis que celui-ci montait d''Egypte. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Dans les v. 20s, Saül énumère les points sur lesquels il considère avoir obéi au Seigneur, en reprenant les expressions de Samuel dans les v. 18s ; quant aux désobéissances (Agag et le bétail épargnés), il tente de les présenter sous un jour positif. –  J''ai amené Agag  : cf. 1R 20.30-43.'
  - type: text
    content: 'Saül répondit à Samuel : J''ai bien écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et j''ai suivi le chemin sur lequel le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''avait envoyé. J''ai amené Agag, roi d''Amalec, et j''ai frappé Amalec d''anathème ; '
  '21':
  - type: text
    content: 'mais le peuple a pris sur le butin du petit bétail et du gros bétail, comme prémices de l''anathème, afin de les sacrifier au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au Guilgal. '
  '22':
  - type: note
    content: 'qu''à l''obéissance…  : litt. qu''à (l''attitude consistant à) écouter (ou obéir à) la voix du Seigneur  ; cf. v. 19s ; sur l''opposition entre obéissance et sacrifices, voir Es 1.11-17 ; Jr 7.21-23 ; Os 6.6 ; Am 5.22-25 ; Mi 6.6-8 ; Ps 50.8-14 ; Pr 21.3 ; Ec 4.17 ; Mt 9.13 ; 12.7.'
  - type: text
    content: 'Samuel dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prend-il autant plaisir'
  - type: text
    content: aux holocaustes et aux sacrifices
  - type: text
    content: 'qu''à l''obéissance de celui qui écoute le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Ecouter vaut mieux que les sacrifices,
  - type: text
    content: prêter attention vaut mieux que la graisse des béliers.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'péché de divination ou péché de magie  ; cf. 28.7-10 ; Dt 18.10. –  la résistance ou l''insoumission, l''insubordination . –  le recours illicite aux teraphim  : litt. le mal des teraphim , d''après la façon dont le texte a été lu par une version ancienne ; texte hébreu traditionnel le mal (ou l''injustice , cf. Nb 23.21n) et les teraphim  ; ces derniers semblent évoquer ici l''idolâtrie en général (cf. 1S 19.13 ; 2R 23.24). –  rejeté  : cf. 8.7n. –  tu ne seras plus roi  : litt. de (la position de) roi  ; cf. 13.14. LXX ajoute sur Israël , cf. v. 26.'
  - type: text
    content: Car la rébellion vaut le péché de divination,
  - type: text
    content: et la résistance vaut le recours illicite aux teraphim.
  - type: text
    content: 'Puisque tu as rejeté la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'il te rejette aussi : tu ne seras plus roi.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai péché  : cf. v. 30 ; 26.21 ; Ex 9.27 ; 10.16 ; Nb 22.34 ; 2S 12.13 ; 24.10,17 ; Ps 51.6. –  aux ordres  : litt. à la bouche  ; cf. Nb 14.41 ; 22.18. –  je craignais…  : cf. Ex 23.2 ; Pr 29.25 ; Ga 1.10.'
  - type: text
    content: 'Alors Saül dit à Samuel : J''ai péché ; j''ai passé outre aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à tes paroles ; je craignais le peuple, et je l''ai écouté. '
  '25':
  - type: note
    content: 'Cf. v. 30. –  pardonne mon péché  : autres traductions enlève mon péché ; charge-toi de mon péché  ; cf. Gn 50.17n  ; Ex 10.17n  ; Ps 32.5n. –  je me prosternerai devant le Seigneur  : cf. 1.3,19,28 ; Gn 22.5 ; Dt 26.10 ; 2S 12.20 ; Ps 5.8.'
  - type: text
    content: 'Maintenant, je te prie, pardonne mon péché, reviens avec moi, et je me prosternerai devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '26':
  - type: note
    content: Cf. 2.30 ; 1R 11.11.
  - type: text
    content: 'Samuel dit à Saül : Je ne reviendrai pas avec toi. Puisque tu as rejeté la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te rejette : tu ne seras plus roi sur Israël. '
  '27':
  - type: note
    content: 'le pan  : litt. l''aile  ; cf. 24.5s ; Rt 3.9.'
  - type: text
    content: 'Comme Samuel se tournait pour s''en aller, Saül le saisit par le pan de son manteau, qui se déchira. '
  '28':
  - type: note
    content: 'déchire  : cf. 28.17 ; 1R 11.30s. –  à un autre, qui est meilleur que toi  : litt. à ton prochain, qui…, allusion à David, cf. 13.14n  ; Ac 13.22 ; on a parfois traduit à l''un de tes proches, qui…'
  - type: text
    content: 'Samuel lui dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' déchire aujourd''hui la royauté d''Israël pour te l''ôter, et il la donne à un autre, qui est meilleur que toi. '
  '29':
  - type: note
    content: 'La majesté  : le sens du mot hébreu correspondant (Lm 3.18 ; 1Ch 29.11) est difficile à cerner ; autres traductions la confiance, l''éternité, la gloire, la protection, la splendeur, la vérité, la victoire. Voir d''autres titres en Ex 15.2 ; Es 60.19 ; Ez 38.7 ; Ps 3.4 ; Jn 10.9. –  ne ment pas (ou ne trompe pas) / n''a pas de regret (ou ne change pas d''avis) : cf. v. 11,35 ; Nb 23.19 ; Ez 24.14 ; 2Tm 2.13 ; Tt 1.2.'
  - type: text
    content: 'La majesté d''Israël ne ment pas et n''a pas de regret ; ce n''est pas un être humain, pour qu''il ait du regret. '
  '3':
  - type: note
    content: 'attaque  : litt. frappe  ; cf. 4.2n. –  frappe d''anathème  : cf. Dt 2.34n  ; voir bénédiction, malédiction. –  moutons et chèvres  : cf. Ex 12.3n. – Extermination de tous les êtres vivants : voir 22.19 ; Dt 13.16 ; Jos 6.21.'
  - type: text
    content: 'Va maintenant, attaque Amalec et frappe d''anathème tout ce qui lui appartient : tu ne l''épargneras pas ; tu mettras à mort hommes et femmes, enfants et nourrissons, bœufs, moutons et chèvres, chameaux et ânes.'
  '30':
  - type: note
    content: 'Cf. v. 24+. –  Saül  : litt. il.'
  - type: text
    content: 'Saül dit encore : J''ai péché ! Maintenant, je te prie, honore-moi devant les anciens de mon peuple et devant Israël ; reviens avec moi, et je me prosternerai devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Samuel revint et suivit Saül  : litt. Samuel revint derrière Saül , ce qui signifie Samuel accompagna (ou raccompagna ) Saül.'
  - type: text
    content: 'Samuel revint et suivit Saül, et Saül se prosterna devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '32':
  - type: note
    content: 'Agag  : cf. v. 20. –  l''air serein  : le mot hébreu correspondant ne se trouve qu''ici, et en Jb 38.31, où il s''applique à une constellation (les liens des Pléiades) ; son origine et son sens sont très incertains. Les versions anciennes et modernes présentent une grande variété de traductions  : avec assurance, avec noblesse, chargé de chaînes, en chancelant, en résistant, en tremblant. –  il se disait  : litt. il dit, mais le verbe hébreu peut aussi exprimer l''idée de se dire à soi-même, intérieurement. –  l''amertume de la mort est écartée  : LXX la mort est amère  ; cf. 1Th 5.3.'
  - type: text
    content: 'Puis Samuel dit : Amenez-moi Agag, roi d''Amalec. Agag s''avança vers lui l''air serein ; il se disait : A coup sûr, l''amertume de la mort est écartée. '
  '33':
  - type: note
    content: 'Par ton épée… le sien  : autre traduction, plus littérale comme ton épée a privé des femmes de leurs enfants, ainsi ta mère entre les femmes sera privée d''enfants  ; cf. Ex 21.24 ; Jg 1.7 ; Mt 7.2 ; Jc 2.13. –  mit en pièces  : le mot hébreu correspondant n''apparaît qu''ici dans l''A.T. et son sens précis est incertain ; autres traductions exécuta ; fit exécuter. –  au Guilgal  : cf. 7.16n.'
  - type: text
    content: 'Samuel dit : Par ton épée, des femmes ont perdu leurs enfants ; ta mère aussi va perdre le sien ! Et Samuel mit en pièces Agag devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', au Guilgal.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Rama  : résidence habituelle de Samuel (1.1 ; 7.17). –  Guibéa  : cf. 11.4n.'
  - type: text
    content: 'Samuel partit pour Rama, et Saül monta chez lui, à Guibéa de Saül. '
  '35':
  - type: note
    content: 'menait deuil sur Saül  : autre traduction pleurait sur Saül. –  regrettait v. 11+,29. –  d''avoir investi Saül…  : autre traduction d''avoir fait Saül roi sur Israël  ; cf. v. 11.'
  - type: text
    content: 'Samuel ne revit plus Saül jusqu''au jour de sa mort ; en effet, Samuel menait deuil sur Saül : quant au '
  - type: text
    content: Seigneur
  - type: text
    content: ', il regrettait d''avoir investi Saül de la royauté sur Israël.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'battit le rappel des troupes  : litt. fit entendre au peuple (cf. 13.4n), ce qui signifie concrètement mobilisa l''armée  ; cf. 23.8. –  Telaïm  : probablement la même localité que Télem , Jos 15.24.'
  - type: text
    content: 'Saül battit le rappel des troupes et les passa en revue à Telaïm : il y avait deux cent mille fantassins et, de Juda, dix mille hommes. '
  '5':
  - type: note
    content: 'jusqu''à la ville d''Amalec  : LXX jusqu''aux villes d''Amalec. –  mit une embuscade  : sens probable, d''après des versions anciennes, d''une forme verbale hébraïque difficilement identifiable. –  oued  : cf. Gn 26.17n.'
  - type: text
    content: 'Saül marcha jusqu''à la ville d''Amalec et mit une embuscade dans l''oued. '
  '6':
  - type: note
    content: 'aux Caïnites (ou aux Qénites  ; litt. au Caïnite, singulier à valeur collective) : clan nomade des déserts du sud, voir en particulier Gn 4.1n  ; 15.19 ; Nb 24.21ns ; Jg 1.16 ; 4.11-24. –  descendez  : les Amalécites vivaient dans une région montagneuse ; le verbe correspondant est absent de LXX. –  d''Amalec  : litt. du milieu d''Amalec. –  afin que je ne vous fasse pas disparaître avec lui  : litt. afin que je ne t''ajoute pas à lui, c.-à-d. afin que je ne te traite pas comme lui. Cf. Gn 19.12 ; Ap 18.4. –  vous avez agi avec fidélité  : cf. 20.8. –  lorsqu''ils sont montés d''Egypte  : cf. Nb 10.29-32.'
  - type: text
    content: 'Il dit aux Caïnites : Allez, écartez-vous, descendez d''Amalec, afin que je ne vous fasse pas disparaître avec lui ; car vous avez agi avec fidélité envers tous les Israélites, lorsqu''ils sont montés d''Egypte. Les Caïnites s''écartèrent donc d''Amalec.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Havila  : cf. Gn 2.11 ; 10.7,29 ; Shour  : cf. 27.8 ; Gn 16.7 ; 20.1 ; Ex 15.22 ; ces deux localités, également mentionnées ensemble en Gn 25.18, représentent les limites orientale et occidentale du désert situé au sud du pays d''Israël, entre l''Arabie et l''Egypte.'
  - type: text
    content: 'Saül battit Amalec depuis Havila jusqu''aux abords de Shour, qui est en face de l''Egypte. '
  '8':
  - type: note
    content: 'Agag  : un Agag est mentionné en Nb 24.7 ; dans le livre d''Esther, Haman (3.1) est un Agaguite, donc un descendant d''Agag. –  et le passa au fil de l''épée  : litt. à bouche d''épée (Jos 6.21+), image qui suggère l''idée de l''épée qui dévore ses victimes, cf. 22.19 ; 2S 2.26 ; 11.25 ; Jr 46.10,14.'
  - type: text
    content: 'Il prit vivant Agag, roi d''Amalec. Il frappa d''anathème tout le peuple et le passa au fil de l''épée. '
  '9':
  - type: note
    content: 'épargnèrent Agag  : cf. 1R 20.30-34. –  les bêtes de seconde portée  : le sens du mot hébreu correspondant est très incertain. –  de bon  : cf. Jos 6.18 ; 7.21. –  méprisable et chétif  : le sens des mots hébreux correspondants est incertain. Le mot traduit par chétif signifie litt. qui fond  ; LXX qu''on rejette.'
  - type: text
    content: Mais Saül et le peuple épargnèrent Agag, ainsi que ce qu'il y avait de meilleur dans le petit bétail et le gros bétail, les bêtes de seconde portée et les jeunes béliers, tout ce qu'il y avait de bon. Ils ne voulurent pas frapper tout cela d'anathème ; ils ne frappèrent d'anathème que ce qui était méprisable et chétif.
  - type: heading
    content: Dieu rejette Saül
