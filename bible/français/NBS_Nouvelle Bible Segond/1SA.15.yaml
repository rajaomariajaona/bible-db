    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que dit le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la voix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le son
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des paroles du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Dt 4.12.
      marker-yv: yv-n
    - type: text
      text: 'Samuel dit à Saül : C''est moi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a envoyé pour te conférer l''onction, afin que tu sois roi sur son peuple, sur Israël. Ecoute donc ce que dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La parole du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' parvint à'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette tournure se rencontre fréquemment dans les livres des prophètes, en particulier Jérémie (1.4 etc.) et Ezéchiel (3.16 etc.).'
      marker-yv: yv-n
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Samuel : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je regrette
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 29,35 ; Gn 6.6s ; Ex 32.12-14 ; Jr 18.7-10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s'est détourné de moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il s''est détourné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est revenu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de derrière moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il a cessé de me suivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 14.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 9.6 ; 11.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: exécuté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: réalisé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en fut fâché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en fut profondément ému '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bouleversé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cria vers le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 7.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.8,10.'
      marker-yv: yv-n
    - type: text
      text: 'Je regrette d''avoir investi Saül de la royauté, car il s''est détourné de moi et il n''a pas exécuté mes paroles. Samuel en fut fâché ; il cria vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' toute la nuit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trouver Saül '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pour lui transmettre le message prophétique que Dieu lui a communiqué. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Carmel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité de Juda, située au sud d''Hébron, cf. 25.2 ; Jos 15.55 ; à ne pas confondre avec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le mont Carmel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sur le littoral méditerranéen. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un monument
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2S 18.18 ; Es 56.5 ; Ez 21.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il est redescendu au Guilgal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a tourné et il est passé et il est descendu au Guilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 7.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' présente la fin du v. 12 et le début du v. 13 sous une forme un peu différente, avec des informations tirées en fait du v. 21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Samuel… descendit au Guilgal auprès de Saül. Or celui-ci était en train d''offrir des holocaustes au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', les prémices du butin qu''il avait pris à Amalec. Samuel s''approcha de Saül, et Saül lui dit : …'
      marker-yv: yv-n
    - type: text
      text: 'Samuel se leva de bon matin pour aller trouver Saül. On lui dit : Saül est allé au Carmel, il s''y est érigé un monument ; puis il est redescendu au Guilgal. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sois '
        - type: usfm
          marker: w
          children:
          - type: text
            text: béni
        - type: text
          text: ' du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule qui peut être interprétée comme une salutation ou comme un remerciement ; cf. 23.21 ; Jg 17.2 ; 2S 2.5 ; Rt 3.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai exécuté la parole du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11 ; cf. Pr 21.2 ; 28.13.
      marker-yv: yv-n
    - type: text
      text: 'Samuel se rendit auprès de Saül, et Saül lui dit : Sois béni du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! J''ai exécuté la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit : Qu''est-ce donc que ces bêlements de petit bétail qui parviennent à mes oreilles, et ces mugissements de gros bétail que j''entends ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On les a amenés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je les ai amenés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a épargné le meilleur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: afin de le sacrifier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Saül essaie de justifier ainsi la désobéissance des soldats ; cf. v. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous l'avons frappé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je l'ai frappé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20.'
      marker-yv: yv-n
    - type: text
      text: 'Saül répondit : On les a amenés de chez les Amalécites : le peuple a épargné le meilleur du petit bétail et du gros bétail, afin de le sacrifier au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu ; le reste, nous l''avons frappé d''anathème.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Assez ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cela suffit ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'abandonne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Ps 46.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'm''a dit cette nuit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10s ; 2S 7.4+.
      marker-yv: yv-n
    - type: text
      text: 'Samuel dit à Saül : Assez ! Je vais t''annoncer ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a dit cette nuit. Et Saül lui dit : Parle ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'petit à tes propres yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Pr 15.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.16 ; 10.1.
      marker-yv: yv-n
    - type: text
      text: 'Samuel dit : N''est-ce pas lorsque tu étais petit à tes propres yeux que tu es devenu le chef des tribus d''Israël, et que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a conféré l''onction pour que tu sois roi sur Israël ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'avait envoyé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: t'avait envoyé sur le chemin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le sens de cette expression pourrait être ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: t'avait indiqué le chemin à suivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à leur extermination
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 13.17-19.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''avait envoyé en disant : Va et frappe d''anathème ces pécheurs d''Amalécites ; tu leur feras la guerre jusqu''à leur extermination. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'écouté le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.14s ; 15.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jeté sur le butin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fait ce qui déplaisait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 22.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 2.11+.'
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi n''as-tu pas écouté le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ? Pourquoi t''es-tu jeté sur le butin et as-tu fait ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH) des Armées'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai décidé de…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai repensé à Amalec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai passé en revue Amalec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je ferai justice à Amalec… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amalec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les Amalécites '
      - type: usfm
        marker: ft
        children:
