        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jéthro, prêtre de Madiân, beau-père de Moïse, apprit tout ce que Dieu avait fait pour Moïse et pour Israël, son peuple, à savoir que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait fait sortir Israël d''Egypte. '
  '10':
