        - type: text
          text: '  ; 37.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Sur la signification de ce '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: repas
        - type: text
          text: ', cf. 24.11 ; Gn 26.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 31.54 ; 1Ch 29.22.'
      marker-yv: yv-n
    - type: text
      text: Jéthro, beau-père de Moïse, prit un holocauste et des sacrifices pour Dieu. Aaron et tous les anciens d'Israël vinrent manger devant Dieu avec le beau-père de Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse nomme des chefs pour rendre la justice
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''assit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: debout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : positions respectives de celui qui juge et de ceux qui sont jugés ; cf. v. 14,16,22 ; Jg 4.5.'
      marker-yv: yv-n
    - type: text
      text: 'Le lendemain, Moïse s''assit pour juger le peuple ; le peuple se tint debout devant Moïse du matin au soir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le système des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: ' est aussi en vigueur dans la patrie du beau-père de Moïse, cf. Nb 22.7.'
      marker-yv: yv-n
    - type: text
      text: 'Le beau-père de Moïse vit tout ce qu''il faisait pour le peuple, et il dit : Que fais-tu là pour ce peuple ? Pourquoi es-tu assis là tout seul, et pourquoi tout le peuple se tient-il debout devant toi du matin au soir ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 33.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consulter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chercher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les dieux.
      marker-yv: yv-n
    - type: text
      text: 'Moïse répondit à son beau-père : C''est que le peuple vient à moi pour consulter Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un litige '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une affaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on vient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il vient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le litige). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je fais office de juge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je juge entre un homme et son prochain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lois
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quand il y a un litige, on vient devant moi ; je fais office de juge entre les deux parties et je fais connaître les prescriptions de Dieu et ses lois.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le beau-père de Moïse lui dit : Ce que tu fais n''est pas bien. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sur l’
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: organisation politique et judiciaire d'Israël
        - type: text
          text: ', cf. Nb 11.11-30 ; Dt 1.9-18 ; 17.8-13. Voir aussi Ac 6.1-6.'
      marker-yv: yv-n
    - type: text
      text: 'Tu t''épuiseras, toi comme ce peuple qui est avec toi : la tâche est trop lourde pour toi ; tu ne pourras pas l''accomplir tout seul. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, écoute-moi ; je vais te donner un conseil, et que Dieu soit avec toi ! Représente le peuple auprès de Dieu et porte toi-même les affaires devant Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Séphora '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui avait été renvoyée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après son renvoi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.20,24-26 ; sur le terme correspondant, voir 1R 9.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mi 1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jéthro, beau-père de Moïse, prit Séphora, femme de Moïse, qui avait été renvoyée, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chemin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qu'ils doivent faire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''œuvre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ils doivent faire.
      marker-yv: yv-n
    - type: text
      text: 'Explique-leur les prescriptions et les lois ; fais-leur connaître la voie qu''ils doivent suivre et ce qu''ils doivent faire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le gain malhonnête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le gain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nomme-les
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mets-les sur eux.
      marker-yv: yv-n
    - type: text
      text: 'Toi, discerne parmi tout le peuple des hommes de valeur, craignant Dieu, des hommes loyaux qui détestent le gain malhonnête ; nomme-les chefs de mille, chefs de cent, chefs de cinquante et chefs de dix. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu''ils jugent le peuple en tout temps ; qu''ils portent devant toi toute affaire importante, et qu''ils jugent eux-mêmes les affaires secondaires. Allège ta charge, et qu''ils la portent avec toi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sain et sauf
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 10.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez lui.
      marker-yv: yv-n
    - type: text
      text: Si tu fais cela, et que Dieu te donne des ordres, tu pourras tenir bon, et tout ce peuple parviendra sain et sauf à son lieu.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse écouta son beau-père ; il fit tout ce qu''il avait dit. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse choisit des hommes de valeur dans tout Israël et les plaça à la tête du peuple comme chefs de mille, chefs de cent, chefs de cinquante et chefs de dix. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils jugeaient le peuple en tout temps ; ils portaient devant Moïse les affaires difficiles et jugeaient eux-mêmes toutes les affaires secondaires.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Nb 10.29-32.
      marker-yv: yv-n
    - type: text
      text: Moïse laissa partir son beau-père, qui s'en alla dans son pays.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'ainsi que ses deux fils ; l''un se nommait Guershom (« Immigré »), car il avait dit : Je suis un immigré dans un pays étranger ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eliézer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon Dieu est un secours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. 2.15.
      marker-yv: yv-n
    - type: text
      text: 'l''autre se nommait Eliézer (« Mon Dieu est un secours »), car il avait dit : Le Dieu de mon père est venu à mon secours et m''a délivré de l''épée du pharaon.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fils et la femme de Moïse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses fils et sa femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montagne de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jéthro, beau-père de Moïse, avec les fils et la femme de Moïse, vint le trouver au désert, là où il campait, à la montagne de Dieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit à Moïse : Moi, Jéthro, ton beau-père, je viens te trouver avec ta femme, accompagnée de ses deux fils. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comment ils allaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour (la) '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 43.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse sortit à la rencontre de son beau-père, se prosterna et l''embrassa. Ils se demandèrent l''un à l''autre comment ils allaient, puis ils entrèrent sous la tente. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: choses pénibles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 20.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: atteints
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trouvés.
      marker-yv: yv-n
    - type: text
      text: 'Moïse raconta à son beau-père tout ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait fait au pharaon et à l''Egypte à cause d''Israël, ainsi que toutes les choses pénibles qui les avaient atteints en chemin et dont le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les avait délivrés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de l''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même au v. 10).
      marker-yv: yv-n
    - type: text
      text: 'Jéthro se réjouit de tout le bien que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait fait à Israël, et de ce qu''il l''avait délivré de la main des Egyptiens. '
