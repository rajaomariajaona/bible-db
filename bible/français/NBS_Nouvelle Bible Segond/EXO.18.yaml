document_id: EXO.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Moïse et son beau-père Jéthro
  - type: text
    content: ' '
  - type: note
    content: Jéthro 2.16,18n  ; 3.1 ; voir aussi prêtre.
  - type: text
    content: 'Jéthro, prêtre de Madiân, beau-père de Moïse, apprit tout ce que Dieu avait fait pour Moïse et pour Israël, son peuple, à savoir que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait fait sortir Israël d''Egypte. '
  '10':
  - type: note
    content: 'Béni soit le Seigneur Gn 9.26 ; 1S 25.32,39 ; 1R 8.15,56 ; Ps 72.18s ; 124.6 ; Rt 4.14 ; Esd 7.27. –  de la main des Egyptiens  : la seconde fois le texte hébreu porte, litt., de sous la main des Egyptiens.'
  - type: text
    content: 'Jéthro dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui vous a délivrés de la main des Egyptiens et de la main du pharaon, qui a délivré le peuple de la main des Egyptiens '
  '11':
  - type: note
    content: 'et cela…  : texte obscur et traduction incertaine, litt. car dans l''affaire où ils s''étaient échauffés contre eux, formule qui serait peut-être à rattacher au v. 10 ; même verbe en 21.14 ; expression très proche en Né 9.10.'
  - type: text
    content: '– je sais maintenant que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est plus grand que tous les dieux – et cela, alors que les Egyptiens les maltraitaient avec arrogance !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'prit  : plusieurs versions anciennes ont lu apporta , comme en Gn 14.18. – Voir sacrifices . –  pour Dieu  : autre traduction pour les dieux (cf. Gn 1.1n). –  Aaron  : voir prêtre. –  manger  : litt. manger du pain , cf. Gn 3.19n  ; 37.25n. Sur la signification de ce repas, cf. 24.11 ; Gn 26.30n  ; 31.54 ; 1Ch 29.22.'
  - type: text
    content: Jéthro, beau-père de Moïse, prit un holocauste et des sacrifices pour Dieu. Aaron et tous les anciens d'Israël vinrent manger devant Dieu avec le beau-père de Moïse.
  - type: heading
    content: Moïse nomme des chefs pour rendre la justice
  '13':
  - type: text
    content: ' '
  - type: note
    content: 's''assit / debout  : positions respectives de celui qui juge et de ceux qui sont jugés ; cf. v. 14,16,22 ; Jg 4.5.'
  - type: text
    content: 'Le lendemain, Moïse s''assit pour juger le peuple ; le peuple se tint debout devant Moïse du matin au soir. '
  '14':
  - type: note
    content: Le système des anciens est aussi en vigueur dans la patrie du beau-père de Moïse, cf. Nb 22.7.
  - type: text
    content: 'Le beau-père de Moïse vit tout ce qu''il faisait pour le peuple, et il dit : Que fais-tu là pour ce peuple ? Pourquoi es-tu assis là tout seul, et pourquoi tout le peuple se tient-il debout devant toi du matin au soir ? '
  '15':
  - type: note
    content: 'Cf. 33.7. –  consulter  : litt. chercher. –  Dieu  : autre traduction les dieux.'
  - type: text
    content: 'Moïse répondit à son beau-père : C''est que le peuple vient à moi pour consulter Dieu. '
  '16':
  - type: note
    content: 'un litige ou une affaire  ; le terme signifie habituellement parole ou chose. –  on vient ou il vient (le litige). –  je fais office de juge  : litt. je juge entre un homme et son prochain. – Voir lois.'
  - type: text
    content: Quand il y a un litige, on vient devant moi ; je fais office de juge entre les deux parties et je fais connaître les prescriptions de Dieu et ses lois.
  '17':
  - type: text
    content: 'Le beau-père de Moïse lui dit : Ce que tu fais n''est pas bien. '
  '18':
  - type: note
    content: Sur l’organisation politique et judiciaire d'Israël, cf. Nb 11.11-30 ; Dt 1.9-18 ; 17.8-13. Voir aussi Ac 6.1-6.
  - type: text
    content: 'Tu t''épuiseras, toi comme ce peuple qui est avec toi : la tâche est trop lourde pour toi ; tu ne pourras pas l''accomplir tout seul. '
  '19':
  - type: text
    content: 'Maintenant, écoute-moi ; je vais te donner un conseil, et que Dieu soit avec toi ! Représente le peuple auprès de Dieu et porte toi-même les affaires devant Dieu. '
  '2':
  - type: note
    content: 'Séphora 2.21. –  qui avait été renvoyée  : litt. après son renvoi, cf. 4.20,24-26 ; sur le terme correspondant, voir 1R 9.16n  ; Mi 1.14n.'
  - type: text
    content: 'Jéthro, beau-père de Moïse, prit Séphora, femme de Moïse, qui avait été renvoyée, '
  '20':
  - type: note
    content: 'voie ou chemin. –  ce qu''ils doivent faire  : litt. l''œuvre (ou le travail) qu''ils doivent faire.'
  - type: text
    content: 'Explique-leur les prescriptions et les lois ; fais-leur connaître la voie qu''ils doivent suivre et ce qu''ils doivent faire. '
  '21':
  - type: note
    content: 'Voir crainte. –  le gain malhonnête  : autre traduction le gain. –  nomme-les  : litt. mets-les sur eux.'
  - type: text
    content: 'Toi, discerne parmi tout le peuple des hommes de valeur, craignant Dieu, des hommes loyaux qui détestent le gain malhonnête ; nomme-les chefs de mille, chefs de cent, chefs de cinquante et chefs de dix. '
  '22':
  - type: text
    content: 'Qu''ils jugent le peuple en tout temps ; qu''ils portent devant toi toute affaire importante, et qu''ils jugent eux-mêmes les affaires secondaires. Allège ta charge, et qu''ils la portent avec toi. '
  '23':
  - type: note
    content: 'sain et sauf  : litt. en paix Jos 10.21n. –  à son lieu  : autre traduction chez lui.'
  - type: text
    content: Si tu fais cela, et que Dieu te donne des ordres, tu pourras tenir bon, et tout ce peuple parviendra sain et sauf à son lieu.
  '24':
  - type: text
    content: 'Moïse écouta son beau-père ; il fit tout ce qu''il avait dit. '
  '25':
  - type: text
    content: 'Moïse choisit des hommes de valeur dans tout Israël et les plaça à la tête du peuple comme chefs de mille, chefs de cent, chefs de cinquante et chefs de dix. '
  '26':
  - type: text
    content: Ils jugeaient le peuple en tout temps ; ils portaient devant Moïse les affaires difficiles et jugeaient eux-mêmes toutes les affaires secondaires.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. Nb 10.29-32.
  - type: text
    content: Moïse laissa partir son beau-père, qui s'en alla dans son pays.
  '3':
  - type: note
    content: 2.22n.
  - type: text
    content: 'ainsi que ses deux fils ; l''un se nommait Guershom (« Immigré »), car il avait dit : Je suis un immigré dans un pays étranger ; '
  '4':
  - type: note
    content: Eliézer signifie mon Dieu est un secours. Cf. 2.15.
  - type: text
    content: 'l''autre se nommait Eliézer (« Mon Dieu est un secours »), car il avait dit : Le Dieu de mon père est venu à mon secours et m''a délivré de l''épée du pharaon.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'les fils et la femme de Moïse  : litt. ses fils et sa femme . –  montagne de Dieu 3.1n.'
  - type: text
    content: 'Jéthro, beau-père de Moïse, avec les fils et la femme de Moïse, vint le trouver au désert, là où il campait, à la montagne de Dieu. '
  '6':
  - type: text
    content: 'Il dit à Moïse : Moi, Jéthro, ton beau-père, je viens te trouver avec ta femme, accompagnée de ses deux fils. '
  '7':
  - type: note
    content: 'comment ils allaient  : litt. pour (la) paix, cf. Gn 43.27n.'
  - type: text
    content: 'Moïse sortit à la rencontre de son beau-père, se prosterna et l''embrassa. Ils se demandèrent l''un à l''autre comment ils allaient, puis ils entrèrent sous la tente. '
  '8':
  - type: note
    content: 'choses pénibles  : cf. Nb 20.14+. –  atteints  : litt. trouvés.'
  - type: text
    content: 'Moïse raconta à son beau-père tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait fait au pharaon et à l''Egypte à cause d''Israël, ainsi que toutes les choses pénibles qui les avaient atteints en chemin et dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les avait délivrés. '
  '9':
  - type: note
    content: 'des Egyptiens  : autre traduction de l''Egypte (de même au v. 10).'
  - type: text
    content: 'Jéthro se réjouit de tout le bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait fait à Israël, et de ce qu''il l''avait délivré de la main des Egyptiens. '
