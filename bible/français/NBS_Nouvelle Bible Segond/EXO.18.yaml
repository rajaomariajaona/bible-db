    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Béni
        - type: text
          text: ' soit le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 9.26 ; 1S 25.32,39 ; 1R 8.15,56 ; Ps 72.18s ; 124.6 ; Rt 4.14 ; Esd 7.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la main des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la seconde fois le texte hébreu porte, litt., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de sous la main des Egyptiens.
      marker-yv: yv-n
    - type: text
      text: 'Jéthro dit : Béni soit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui vous a délivrés de la main des Egyptiens et de la main du pharaon, qui a délivré le peuple de la main des Egyptiens '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et cela…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte obscur et traduction incertaine, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car dans l'affaire où ils s'étaient échauffés contre eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', formule qui serait peut-être à rattacher au v. 10 ; même verbe en 21.14 ; expression très proche en Né 9.10.'
      marker-yv: yv-n
    - type: text
      text: '– je sais maintenant que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) est plus grand que tous les dieux – et cela, alors que les Egyptiens les maltraitaient avec arrogance !'
