document_id: JOB.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : le bonheur des méchants est un fait'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: Leur taureau féconde sans faillir,
  - type: text
    content: leur vache met bas et n'avorte pas.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'comme le petit bétail ou comme un troupeau  ; cf. Ps 77.21. –  s''ébattent  : litt. bondissent . Cf. Za 8.5.'
  - type: text
    content: Ils laissent courir leurs gamins comme le petit bétail,
  - type: text
    content: et leurs enfants s'ébattent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Es 5.12 ; Am 6.5.
  - type: text
    content: Ils chantent au son du tambourin et de la lyre,
  - type: text
    content: ils se réjouissent au son du chalumeau.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 's''achèvent , d''après des versions anciennes et une lecture traditionnelle de l''hébreu ; autre lecture traditionnelle s''usent . –  en un instant  : autre traduction dans la tranquillité . –  ils descendent au séjour des morts (= Vg) : certains, rapprochant le verbe hébreu d''une autre racine, traduisent  : ils sont terrifiés par le séjour des morts (cf. Jr 21.13n) ; LXX ils se sont endormis dans le repos du séjour des morts  ; cf. 24.24 ; Lc 12.20.'
  - type: text
    content: Leurs jours s'achèvent dans le bonheur,
  - type: text
    content: en un instant ils descendent au séjour des morts.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ecarte-toi 22.17 ; cf. Es 30.11 ; Jr 2.31. –  nous ne désirons pas  : autre traduction nous ne prenons pas plaisir à  ; cf. Ps 16.11.'
  - type: text
    content: 'Ils disaient pourtant à Dieu : « Ecarte-toi de nous ;'
  - type: text
    content: nous ne désirons pas connaître tes voies.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 5.2. –  le Puissant 5.17n. –  que nous le servions ou que nous lui rendions un culte (cf. Ex 3.12n). –  Que nous sert-il  : voir 1.9 ; 35.3 ; cf. Ml 3.14.'
  - type: text
    content: Qu'est-ce que le Puissant, pour que nous le servions ?
  - type: text
    content: Que nous sert-il d'intercéder auprès de lui ? »
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'leur bonheur…  : la phrase est parfois comprise dans un sens interrogatif  : leur bonheur n''est-il pas entre leurs mains ? cf. LXX car le bonheur était dans leurs mains . –  Les projets (ou le conseil ) des méchants Ps 1.1. –  loin de moi  : certains modifient légèrement le texte hébreu traditionnel pour lire loin de lui  ; cf. 22.18n  ; LXX il (Dieu) ne prête pas attention aux œuvres des méchants.'
  - type: text
    content: Certes, leur bonheur n'est pas entre leurs mains.
  - type: text
    content: Les projets des méchants sont bien loin de moi !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'arrive-t-il souvent  : cette phrase pourrait aussi être comprise comme une exclamation ironique  : Comme il arrive souvent que… –  lampe des méchants  : cf. 18.5+. –  une catastrophe  : litt. leur catastrophe.'
  - type: text
    content: Mais arrive-t-il souvent que la lampe des méchants s'éteigne,
  - type: text
    content: qu'une catastrophe s'abatte sur eux,
  - type: text
    content: que Dieu leur distribue leur part dans sa colère,
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 1.4.
  - type: text
    content: qu'ils soient comme la paille emportée par le vent,
  - type: text
    content: comme la balle enlevée par l'ouragan ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les fils du méchant  : litt. ses fils  ; cf. Ex 20.5+. –  son châtiment  : litt. sa malfaisance . –  le méchant lui-même  : litt. lui.'
  - type: text
    content: Est-ce pour les fils du méchant que Dieu réserve son châtiment ?
  - type: text
    content: C'est le méchant lui-même qu'il devrait payer de retour, pour qu'il le sache ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez… 33.1. –  donnez-moi…  : litt. et cela sera vos consolations.'
  - type: text
    content: Ecoutez, écoutez mon propos,
  - type: text
    content: donnez-moi seulement cette consolation.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'sa propre misère  : autre traduction son propre châtiment , le mot hébreu ainsi traduit n''apparaît nulle part ailleurs et son sens est incertain. –  Puissant 5.17n.'
  - type: text
    content: ses yeux devraient voir sa propre misère,
  - type: text
    content: c'est lui qui devrait boire la fureur du Puissant.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 14.21+.
  - type: text
    content: En effet, que lui importe sa maison après lui,
  - type: text
    content: quand le nombre de ses mois est mesuré ?
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'qui juge  : autre traduction qui gouverne . –  les êtres supérieurs  : litt. ceux qui sont élevés (cf. Es 40.14). LXX qui juge le sang versé , ce qui correspondrait à une variante d''une lettre dans l''hébreu.'
  - type: text
    content: Est-ce à Dieu qu'on apprendra la connaissance,
  - type: text
    content: à lui qui juge les êtres supérieurs ?
  '23':
  - type: text
    content: L'un meurt au sein de son intégrité,
  - type: text
    content: totalement satisfait et insouciant,
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'les flancs  : autre traduction les entrailles  ; le terme correspondant n''apparaît qu''ici ; quelques-uns modifient le texte hébreu traditionnel pour lire les cuisses . –  graisse 15.27. –  os 20.11. –  remplie de sève  : litt. abreuvée.'
  - type: text
    content: les flancs chargés de graisse
  - type: text
    content: et la moelle des os remplie de sève ;
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'amer 7.11+. –  goûté au bonheur  : litt. mangé (dans) le bonheur.'
  - type: text
    content: l'autre meurt, amer,
  - type: text
    content: sans avoir goûté au bonheur.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Ensemble 3.19+.
  - type: text
    content: Ensemble, ils se couchent dans la poussière,
  - type: text
    content: et la vermine les recouvre.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'vos pensées…  : autre traduction vos plans et les intrigues que vous montez contre moi.'
  - type: text
    content: Je connais bien vos pensées
  - type: text
    content: et les réflexions par lesquelles vous me faites tort.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Où est… 20.7ss.
  - type: text
    content: 'Vous dites : « Où est la maison du notable ?'
  - type: text
    content: Où est la tente qu'habitaient les méchants ? »
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'les passants  : litt. ceux qui passent le chemin . –  leur témoignage  : litt. leurs signes.'
  - type: text
    content: N'avez-vous pas interrogé les passants ?
  - type: text
    content: Ne reconnaissez-vous pas leur témoignage ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Permettez-moi… 36.2. –  tu pourras…  : des versions anciennes ont le pluriel ( vous pourrez… ).'
  - type: text
    content: Permettez-moi de parler ;
  - type: text
    content: et quand j'aurai parlé, tu pourras te moquer.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'épargné 24.22s ; Ps 73.5. –  la colère  : autre terme hébreu qu''au v. 17 (synonyme) ; cf. Pr 11.4+.'
  - type: text
    content: Au jour de la catastrophe, le mauvais est épargné,
  - type: text
    content: au jour de la colère il est à l'abri.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'sa voie  : autre traduction sa conduite.'
  - type: text
    content: Qui lui reproche sa voie en face ?
  - type: text
    content: Qui lui paie de retour ce qu'il a fait ?
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'porté au cimetière Ec 8.10 ; cf. Lc 16.22. –  on veille ou il veille  ; certains comprennent  : il y aura une statue de lui sur sa tombe, comme pour la veiller.'
  - type: text
    content: Il est porté au cimetière,
  - type: text
    content: et on veille sur son sépulcre.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Les mottes de terre ou, moins probablement les pierres  ; même terme en 38.38. –  la vallée  : autre traduction l''oued  ; cf. 6.15n  ; Gn 26.17n. –  des gens sans nombre l''avaient précédé  : litt. et devant lui il n''y a pas de nombre . Les expressions hébraïques correspondant à derrière et devant peuvent désigner respectivement, dans un sens temporel, ceux d''après et ceux d''avant lui (cf. 18.20n). Elles pourraient aussi s''appliquer, dans un sens spatial, à des gens qui marchent derrière et devant sa dépouille dans un cortège funèbre.'
  - type: text
    content: Les mottes de terre de la vallée lui sont douces ;
  - type: text
    content: tous se laissent entraîner derrière lui,
  - type: text
    content: des gens sans nombre l'avaient précédé.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Comment…  : autre traduction Comment ! Vous m''offrez… –  des consolations si futiles v. 2 ; 15.11+. –  tromperie  : le terme est habituellement traduit par sacrilège , cf. Esd 9.2+ ; voir aussi Nb 5.12n  ; Pr 16.10n.'
  - type: text
    content: Comment pouvez-vous m'offrir des consolations si futiles !
  - type: text
    content: Ce qui reste de vos réponses n'est que tromperie.
  '4':
  - type: text
    content: ' '
  - type: note
    content: contre un être humain 10.4+.
  - type: text
    content: Quant à moi, ma plainte est-elle contre un être humain ?
  - type: text
    content: Dès lors, pourquoi ne perdrais-je pas patience ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: mettez la main sur votre bouche , pour faire silence ; cf. 29.9 ; 40.4 ; Jg 18.19 ; Mi 7.16 ; Pr 30.32.
  - type: text
    content: Tournez-vous vers moi et soyez atterrés,
  - type: text
    content: mettez la main sur votre bouche.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Quand j''y pense  : autre traduction quand je me souviens.'
  - type: text
    content: Quand j'y pense, je suis saisi d'épouvante,
  - type: text
    content: un frémissement s'empare de ma chair.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 12.6+.
  - type: text
    content: Pourquoi les méchants vivent-ils ?
  - type: text
    content: Pourquoi vieillissent-ils ? Pourquoi reprennent-ils même des forces ?
  '8':
  - type: text
    content: Leur descendance s'affermit devant eux, avec eux,
  - type: text
    content: ils ont leurs rejetons sous leurs yeux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: le bâton de Dieu 9.34+.
  - type: text
    content: 'Chez eux, aucune frayeur : c''est la paix ;'
  - type: text
    content: le bâton de Dieu n'est pas contre eux.
