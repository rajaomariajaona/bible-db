      text: 'Job répondit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur taureau féconde sans faillir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur vache met bas et n'avorte pas.
