document_id: NUM.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le porte-lampes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: poseront les mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression au v. 12 ; cf. v. 16ss,19 ; 3.12s ; voir aussi Ex 29.10 ; Lv 1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.2,8 ; 4.4,15,24 etc. ; 16.20ss ; pour d''autres sens attachés à ce geste, cf. Gn 48.14 ; Nb 27.18,23 ; Dt 34.9.'
      marker-yv: yv-n
    - type: text
      text: 'Tu présenteras les lévites devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et les Israélites poseront les mains sur les lévites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 13,21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dédiera rituellement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans le cas des lévites, le verbe correspondant est à comprendre, soit dans un sens abstrait, soit comme description d''un mouvement rituel (par exemple, il les fera s''avancer en signe de dédicace) v. 13,15,21 ; 5.25+ ; voir Lv 7.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pris d'entre les Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la part des Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils seront au service…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils seront pour servir le service de YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 19 ; 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Aaron dédiera rituellement les lévites, pris d''entre les Israélites, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et ils seront au service du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: poseront les mains…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 4.15s ; 8.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu… offriras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''après LXX, d''autres modifient la vocalisation traditionnelle pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il (Aaron) fera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 10s,13,15,21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'autre en holocauste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 6.26.'
      marker-yv: yv-n
    - type: text
      text: 'Les lévites poseront les mains sur la tête des taureaux ; tu en offriras un en sacrifice pour le péché, et l''autre en holocauste au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', pour faire l''expiation sur les lévites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 3.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant le Seigneur et devant Aaron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant le Seigneur.
      marker-yv: yv-n
    - type: text
      text: 'Tu placeras les lévites debout devant Aaron et ses fils, et tu les dédieras rituellement au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 3.12 ; 16.9 ; Ex 19.6 ; sur le verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: séparer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir aussi 16.21 ; Gn 1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 10.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu sépareras les lévites d''entre les Israélites ; ainsi les lévites m''appartiendront. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faire le service…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après certains mss hébreux et quelques témoins anciens ; le texte hébreu traditionnel pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: servir la tente…
      marker-yv: yv-n
    - type: text
      text: 'Après cela, les lévites viendront faire le service de la tente de la Rencontre. C''est ainsi que tu les purifieras et que tu les dédieras rituellement. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 19 ; 3.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',12+.'
      marker-yv: yv-n
    - type: text
      text: 'Car ils me sont donnés, à titre de « donnés », d''entre les Israélites : je les ai pris à la place des premiers-nés, de tout Israélite né le premier de sa mère. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.13,40-51 ; Ex 13.2 ; 22.29 ; 34.19 ; Lv 27.26 ; Lc 2.22ss.
      marker-yv: yv-n
    - type: text
      text: 'Car tout premier-né parmi les Israélites m''appartient, tant parmi les hommes que parmi les bêtes ; le jour où j''ai frappé tous les premiers-nés en Egypte, je me les suis consacrés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.12,41 ; Ex 13.11ss.
      marker-yv: yv-n
    - type: text
      text: 'J''ai pris les lévites à la place de tous les premiers-nés parmi les Israélites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.53 ; 3.7ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai donné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 16 ; 3.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''ils fassent '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'expiation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.53 ; 15.25 ; Ex 30.10 ; Lv 4.20,26,31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fléau… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.53 ; 17.28 ; 18.22 ; Ex 7.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: J'ai donné les lévites à Aaron et à ses fils, à titre de « donnés », d'entre les Israélites, afin qu'ils accomplissent le service pour les Israélites dans la tente de la Rencontre et qu'ils fassent l'expiation sur les Israélites ; ainsi les Israélites ne seront pas frappés d'un fléau pour s'être approchés du sanctuaire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quand tu arrangeras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand tu allumeras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quand tu feras monter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand tu monteras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 25.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.8 ; Lv 24.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers le devant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute par l''orientation de la mèche ; Ex 25.37. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte-lampes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.1 ; 4.9 ; Ex 25.3,31ss ; 27.20s ; 30.27 ; 37.17ss ; Lv 24.1ss ; cf. 1S 3.3 ; 1R 7.48s ; Za 4.2,11 ; 2Ch 4.7s ; Ap 1.12s ; 2.1ss.
      marker-yv: yv-n
    - type: text
      text: 'Parle à Aaron ; tu lui diras : Quand tu arrangeras les lampes, les sept lampes devront éclairer vers le devant du porte-lampes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse, Aaron et toute la communauté des Israélites firent exactement, pour les lévites, ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné à Moïse pour les lévites. Ainsi les Israélites firent-ils pour eux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ôtèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se débarrassèrent de, se '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifièrent
        - type: text
          text: ' de'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre verbe à la fin du v.) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe ainsi traduit est apparenté au mot habituellement rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 19.12s,20 ; 31.19s,23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fit l'expiation sur eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Vg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pria pour eux.
      marker-yv: yv-n
    - type: text
      text: 'Les lévites ôtèrent leur péché et lavèrent leurs vêtements ; Aaron les dédia rituellement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et fit l''expiation sur eux pour les purifier. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: accomplir leur service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Après cela, les lévites vinrent accomplir leur service dans la tente de la Rencontre devant Aaron et ses fils, selon ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné à Moïse au sujet des lévites. Ainsi firent-ils pour eux.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vingt-cinq ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.3+.'
      marker-yv: yv-n
    - type: text
      text: 'Voici ce qui concerne les lévites. Depuis l''âge de vingt-cinq ans et au-dessus, tout lévite sera apte au service de la tente de la Rencontre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il cessera d'être apte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il reviendra de l'armée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A partir de l''âge de cinquante ans, il cessera d''être apte et n''accomplira plus de service. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On peut voir dans le service retiré au lévite âgé une activité pénible, et dans les fonctions qu'il peut encore exercer un poste de surveillance. Cf. 3.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il assistera ses frères lorsqu'ils assureront leur service dans la tente de la Rencontre, mais lui-même n'accomplira pas de service. Tu agiras ainsi à l'égard des lévites en ce qui concerne leur service.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron fit ainsi ; il arrangea les lampes vers le devant du porte-lampes, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: martelé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: massif, repoussé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 10.2 ; Ex 25.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de son pied à ses fleurs '
