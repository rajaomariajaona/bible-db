document_id: NUM.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le porte-lampes
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'poseront les mains  : même expression au v. 12 ; cf. v. 16ss,19 ; 3.12s ; voir aussi Ex 29.10 ; Lv 1.4n  ; 3.2,8 ; 4.4,15,24 etc. ; 16.20ss ; pour d''autres sens attachés à ce geste, cf. Gn 48.14 ; Nb 27.18,23 ; Dt 34.9.'
  - type: text
    content: 'Tu présenteras les lévites devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et les Israélites poseront les mains sur les lévites. '
  '11':
  - type: note
    content: 'Aaron  : cf. v. 13,21. –  dédiera rituellement  : dans le cas des lévites, le verbe correspondant est à comprendre, soit dans un sens abstrait, soit comme description d''un mouvement rituel (par exemple, il les fera s''avancer en signe de dédicace) v. 13,15,21 ; 5.25+ ; voir Lv 7.30n. –  pris d''entre les Israélites  : autre traduction de la part des Israélites  ; cf. 3.9. –  ils seront au service…  : litt. ils seront pour servir le service de YHWH  ; cf. v. 19 ; 3.7n.'
  - type: text
    content: 'Aaron dédiera rituellement les lévites, pris d''entre les Israélites, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ils seront au service du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'poseront les mains…  : cf. v. 10n  ; Lv 4.15s ; 8.14. –  tu… offriras  : litt. fais  ; d''après LXX, d''autres modifient la vocalisation traditionnelle pour lire et il (Aaron) fera, cf. v. 10s,13,15,21. –  l''autre en holocauste  : cf. Jg 6.26.'
  - type: text
    content: 'Les lévites poseront les mains sur la tête des taureaux ; tu en offriras un en sacrifice pour le péché, et l''autre en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour faire l''expiation sur les lévites. '
  '13':
  - type: note
    content: 'Cf. 3.6. –  devant Aaron  : LXX devant le Seigneur et devant Aaron. –  au Seigneur  : LXX devant le Seigneur.'
  - type: text
    content: 'Tu placeras les lévites debout devant Aaron et ses fils, et tu les dédieras rituellement au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: Cf. 3.12 ; 16.9 ; Ex 19.6 ; sur le verbe traduit par séparer, voir aussi 16.21 ; Gn 1.4n  ; Lv 10.10n.
  - type: text
    content: 'Tu sépareras les lévites d''entre les Israélites ; ainsi les lévites m''appartiendront. '
  '15':
  - type: note
    content: 'faire le service…  : d''après certains mss hébreux et quelques témoins anciens ; le texte hébreu traditionnel pourrait aussi signifier servir la tente…'
  - type: text
    content: 'Après cela, les lévites viendront faire le service de la tente de la Rencontre. C''est ainsi que tu les purifieras et que tu les dédieras rituellement. '
  '16':
  - type: note
    content: Cf. v. 19 ; 3.9n,12+.
  - type: text
    content: 'Car ils me sont donnés, à titre de « donnés », d''entre les Israélites : je les ai pris à la place des premiers-nés, de tout Israélite né le premier de sa mère. '
  '17':
  - type: note
    content: Cf. 3.13,40-51 ; Ex 13.2 ; 22.29 ; 34.19 ; Lv 27.26 ; Lc 2.22ss.
  - type: text
    content: 'Car tout premier-né parmi les Israélites m''appartient, tant parmi les hommes que parmi les bêtes ; le jour où j''ai frappé tous les premiers-nés en Egypte, je me les suis consacrés. '
  '18':
  - type: note
    content: Cf. 3.12,41 ; Ex 13.11ss.
  - type: text
    content: 'J''ai pris les lévites à la place de tous les premiers-nés parmi les Israélites. '
  '19':
  - type: note
    content: 'Cf. 1.53 ; 3.7ss. –  J''ai donné…  : cf. v. 16 ; 3.9n. –  qu''ils fassent l''expiation  : cf. 1.53 ; 15.25 ; Ex 30.10 ; Lv 4.20,26,31. –  fléau… 1.53 ; 17.28 ; 18.22 ; Ex 7.27n.'
  - type: text
    content: J'ai donné les lévites à Aaron et à ses fils, à titre de « donnés », d'entre les Israélites, afin qu'ils accomplissent le service pour les Israélites dans la tente de la Rencontre et qu'ils fassent l'expiation sur les Israélites ; ainsi les Israélites ne seront pas frappés d'un fléau pour s'être approchés du sanctuaire.
  '2':
  - type: note
    content: 'Quand tu arrangeras ou quand tu allumeras  : litt. quand tu feras monter ou quand tu monteras  ; cf. Ex 25.37n  ; 30.8 ; Lv 24.3. –  vers le devant  : sans doute par l''orientation de la mèche ; Ex 25.37. –  porte-lampes 3.1 ; 4.9 ; Ex 25.3,31ss ; 27.20s ; 30.27 ; 37.17ss ; Lv 24.1ss ; cf. 1S 3.3 ; 1R 7.48s ; Za 4.2,11 ; 2Ch 4.7s ; Ap 1.12s ; 2.1ss.'
  - type: text
    content: 'Parle à Aaron ; tu lui diras : Quand tu arrangeras les lampes, les sept lampes devront éclairer vers le devant du porte-lampes. '
  '20':
  - type: text
    content: 'Moïse, Aaron et toute la communauté des Israélites firent exactement, pour les lévites, ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse pour les lévites. Ainsi les Israélites firent-ils pour eux. '
  '21':
  - type: note
    content: 'V. 11. –  ôtèrent (ou se débarrassèrent de, se purifièrent de  ; autre verbe à la fin du v.) leur péché  : le verbe ainsi traduit est apparenté au mot habituellement rendu par péché  ; cf. 19.12s,20 ; 31.19s,23. –  fit l''expiation sur eux  : Vg pria pour eux.'
  - type: text
    content: 'Les lévites ôtèrent leur péché et lavèrent leurs vêtements ; Aaron les dédia rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et fit l''expiation sur eux pour les purifier. '
  '22':
  - type: note
    content: 'accomplir leur service  : cf. 3.7n.'
  - type: text
    content: 'Après cela, les lévites vinrent accomplir leur service dans la tente de la Rencontre devant Aaron et ses fils, selon ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse au sujet des lévites. Ainsi firent-ils pour eux.'
  '23':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '24':
  - type: note
    content: 'vingt-cinq ans  : cf. 4.3+.'
  - type: text
    content: 'Voici ce qui concerne les lévites. Depuis l''âge de vingt-cinq ans et au-dessus, tout lévite sera apte au service de la tente de la Rencontre. '
  '25':
  - type: note
    content: 'il cessera d''être apte  : litt. il reviendra de l''armée, cf. 4.3n.'
  - type: text
    content: 'A partir de l''âge de cinquante ans, il cessera d''être apte et n''accomplira plus de service. '
  '26':
  - type: note
    content: On peut voir dans le service retiré au lévite âgé une activité pénible, et dans les fonctions qu'il peut encore exercer un poste de surveillance. Cf. 3.6n,7n.
  - type: text
    content: Il assistera ses frères lorsqu'ils assureront leur service dans la tente de la Rencontre, mais lui-même n'accomplira pas de service. Tu agiras ainsi à l'égard des lévites en ce qui concerne leur service.
  '3':
  - type: text
    content: 'Aaron fit ainsi ; il arrangea les lampes vers le devant du porte-lampes, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse. '
  '4':
  - type: note
    content: 'martelé  : autres traductions massif, repoussé  ; cf. 10.2 ; Ex 25.18n. –  de son pied à ses fleurs (litt. sa fleur) : d''après Smr, certains traduisent ses tiges et ses fleurs. –  on avait fait  : litt. il avait fait. –  la vision  : cf. Ex 25.9,40.'
  - type: text
    content: 'Voici comment le porte-lampes était fait : il était d''or martelé ; de son pied à ses fleurs, il était d''or martelé ; on avait fait le porte-lampes selon la vision que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donnée à Moïse.'
  - type: heading
    content: La consécration des lévites
  '5':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '6':
  - type: note
    content: 'lévites  : cf. 1.48ss ; 3–4 ; 18.1-7 ; Ex 29.1ss ; Lv 8.6ss ; 14.2ss ; cf. Jg 17.5,12 ; 1R 12.31, Ez 44.6ss ; Esd 6.18. –  d''entre les Israélites…  : cf. Dt 7.6.'
  - type: text
    content: 'Prends les lévites d''entre les Israélites et purifie-les. '
  '7':
  - type: note
    content: 'eau pour le péché  : litt. eau de péché ou eau de sacrifice pour le péché  ; Vg a lu comme en 19.9ss (eau lustrale) ; cf. 5.17 ; Lv 8.6 ; 14.4-9 ; Ps 51.9. –  tout leur corps  : litt. toute leur chair. –  lavent leurs vêtements v. 21 ; cf. Ex 19.14 ; voir aussi 29.5-9 ; Lv 8.13.'
  - type: text
    content: 'Voici comment tu les purifieras. Fais sur eux une aspersion d''eau pour le péché ; qu''ils passent le rasoir sur tout leur corps, qu''ils lavent leurs vêtements et qu''ils se purifient. '
  '8':
  - type: note
    content: 'Cf. Lv 8.2ss. –  un taureau v. 12 ; 7.15+ ; Lv 1.3s. –  son offrande végétale  : voir 15.8s. –  un second taureau  : LXX a lu un taureau d''un an. –  sacrifice pour le péché Lv 4.1+,13s.'
  - type: text
    content: 'Ils prendront ensuite un taureau, avec son offrande végétale, de la fleur de farine pétrie à l''huile ; tu prendras un second taureau en sacrifice pour le péché. '
  '9':
  - type: note
    content: Cf. Ex 29.4.
  - type: text
    content: 'Tu présenteras les lévites devant la tente de la Rencontre et tu rassembleras toute la communauté des Israélites. '
