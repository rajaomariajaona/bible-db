document_id: GEN.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vengeance de Siméon et Lévi
  - type: text
    content: ' '
  - type: note
    content: Dina 30.21. –  filles du pays 27.46.
  - type: text
    content: 'Dina, la fille que Léa avait donnée à Jacob, sortait pour voir les filles du pays. '
  '10':
  - type: note
    content: V. 16. –  Vous habiterez et installez-vous traduisent deux formes du même verbe hébreu.
  - type: text
    content: Vous habiterez avec nous, le pays sera à votre disposition ; installez-vous, vous ferez du commerce et vous acquerrez des propriétés.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'au père et aux frères de Dina  : litt. à son père et à ses frères (à elle) . –  Que je trouve grâce…  : cf. 33.15n.'
  - type: text
    content: 'Sichem dit au père et aux frères de Dina : Que je trouve grâce à vos yeux ! Je donnerai ce que vous me direz. '
  '12':
  - type: note
    content: La dot (voir Ex 22.15n) était versée par le futur mari aux parents de la jeune fille ; la donation revenait probablement à la mariée comme son bien propre.
  - type: text
    content: 'Exigez de moi une forte dot et une donation importante, je donnerai ce que vous me direz ; mais donnez-moi la jeune fille pour femme ! '
  '13':
  - type: note
    content: Pr 26.24-26.
  - type: text
    content: 'Les fils de Jacob répondirent de manière trompeuse à Sichem et à Hamor, son père, parce que Sichem avait souillé leur sœur Dina. '
  '14':
  - type: note
    content: 'incirconcis  : litt. qui a un prépuce, cf. 17.10nss ; voir circoncision. –  un déshonneur  : autre traduction un outrage.'
  - type: text
    content: 'Ils leur dirent : Nous ne pourrons jamais donner notre sœur à un homme incirconcis : ce serait un déshonneur pour nous ! '
  '15':
  - type: text
    content: 'A cette seule condition nous donnerons notre consentement : si vous devenez comme nous, si tout mâle parmi vous se fait circoncire. '
  '16':
  - type: text
    content: 'Nous vous donnerons alors nos filles et nous prendrons les vôtres pour femmes ; nous habiterons avec vous, et nous deviendrons un seul peuple. '
  '17':
  - type: text
    content: 'Mais si vous ne nous écoutez pas, si vous ne vous faites pas circoncire, nous prendrons notre fille et nous nous en irons. '
  '18':
  - type: text
    content: 'Leurs paroles plurent à Hamor et à Sichem, fils de Hamor. '
  '19':
  - type: note
    content: 's''exécuter  : litt. faire la chose (ou la parole, même mot au v. 18). –  lui plaisait  : le même verbe hébreu est aussi rendu par prendre plaisir en  ; cf. Nb 14.8.'
  - type: text
    content: Le jeune homme ne tarda pas à s'exécuter, car la fille de Jacob lui plaisait ; or il était le plus considéré de toute sa famille.
  '2':
  - type: note
    content: 'Sichem 33.18s ; cf. Jos 24 ; Jg 9. –  Hivvite 10.17. –  la prit…  : cf. Ex 22.15s ; Dt 22.28s. –  abusa d''elle  : autre traduction l''humilia  ; sur le verbe correspondant, cf. Dt 21.14n  ; 22.24,29 ; Jg 19.24 ; 20.5 ; 2S 13.12,14,22,32 ; Es 60.14n  ; Ez 22.10s ; Lm 5.11.'
  - type: text
    content: 'Sichem, fils de Hamor, le Hivvite, prince du pays, la vit, la prit et coucha avec elle ; il abusa d''elle. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: porte 23.10+.
  - type: text
    content: 'Hamor et Sichem, son fils, se rendirent à la porte de leur ville et dirent aux gens de leur ville : '
  '21':
  - type: note
    content: 'bien assez vaste pour eux  : litt. large des deux mains (c.-à-d. de tous côtés, cf. Né 7.4n) devant eux  ; d''autres comprennent que le pays leur soit largement ouvert  ; cf. Jg 18.10n  ; 1Ch 4.40.'
  - type: text
    content: 'Ces gens se montrent pacifiques avec nous ; qu''ils s''installent dans le pays et qu''ils y fassent du commerce ; le pays est bien assez vaste pour eux ! Nous prendrons leurs filles pour femmes, et nous leur donnerons nos filles. '
  '22':
  - type: text
    content: 'Mais ils ne consentiront à habiter avec nous, pour ne faire avec nous qu''un seul peuple, que si tout mâle parmi nous est circoncis, comme ils le sont eux-mêmes. '
  '23':
  - type: note
    content: Cf. Pr 1.13.
  - type: text
    content: 'Leurs troupeaux, leurs biens, et toutes leurs bêtes ne seront-ils pas alors à nous ? Acceptons seulement leur condition, pour qu''ils habitent avec nous. '
  '24':
  - type: note
    content: 'qui sortaient…  : autre traduction qui étaient venus à la porte de sa ville  ; certains modifient le texte hébreu traditionnel pour lire, au lieu de la répétition de cette expression à la fin du v., tous les mâles se firent circoncire dans la chair de leur prépuce (cf. 17.11n,14).'
  - type: text
    content: Tous ceux qui sortaient par la porte de sa ville écoutèrent Hamor et Sichem, son fils ; tous les mâles qui sortaient par la porte de sa ville se firent circoncire.
  '25':
  - type: text
    content: ' '
  - type: note
    content: souffrants Jos 5.8. –  Siméon / Lévi 29.33s ; 42.24 ; 49.5s. –  en toute sécurité ou sans aucun risque  ; cette précision s'applique vraisemblablement à Siméon et Lévi ; d'autres comprennent la ville qui se croyait en sécurité.
  - type: text
    content: 'Le troisième jour, alors qu''ils étaient souffrants, deux des fils de Jacob, Siméon et Lévi, frères de Dina, prirent chacun son épée, arrivèrent dans la ville en toute sécurité et tuèrent tous les mâles. '
  '26':
  - type: text
    content: 'Ils tuèrent aussi au fil de l''épée Hamor et Sichem, son fils ; ils reprirent Dina de la maison de Sichem et sortirent. '
  '27':
  - type: note
    content: 'les victimes  : le terme hébreu correspondant (litt. les transpercés) peut inclure les morts et les blessés.'
  - type: text
    content: 'Les fils de Jacob se jetèrent sur les victimes et pillèrent la ville, parce qu''on avait souillé leur sœur. '
  '28':
  - type: text
    content: 'Ils prirent leur petit bétail et leur gros bétail, leurs ânes, ce qui était dans la ville et ce qui était dans la campagne ; '
  '29':
  - type: note
    content: 'leurs femmes et toutes leurs familles  : ou, selon l''ordre des mots hébreux, leurs familles et leurs femmes  ; 45.19 ; 46.5 ; 47.12,24 ; 50.8,21. Le terme hébreu correspondant à familles désigne le plus souvent les enfants, mais parfois aussi les personnes âgées, les femmes et les esclaves ; voir aussi Jg 18.21n.'
  - type: text
    content: ils capturèrent et pillèrent toutes leurs richesses, leurs femmes et toutes leurs familles, ainsi que tout ce qui se trouvait dans les maisons.
  '3':
  - type: note
    content: 'Il s''attacha 2.24+. –  parla au (litt. sur le) cœur de  : sur l''expression hébraïque correspondante, qui évoque avec diverses nuances l''établissement d''une relation de confiance, voir 50.21 ; Jg 19.3 ; 2S 19.8 ; Es 40.2 ; Os 2.16 ; Rt 2.13 ; 2Ch 30.22 ; 32.6.'
  - type: text
    content: 'Il s''attacha à Dina, fille de Jacob ; il aima la jeune fille et parla au cœur de la jeune fille. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Vous avez attiré le malheur sur moi  : sur le verbe correspondant, voir Jos 6.18 ; 7.25n  ; Jg 11.35 ; 1S 14.29 ; 1R 18.17s ; Ps 39.3n  ; Pr 11.17+ ; 1Ch 2.7. –  odieux ou puant  ; le terme peut évoquer une odeur nauséabonde ; cf. Ex 5.21n  ; voir 1S 13.4 ; 27.12 ; 2S 10.6 ; 16.21 ; Pr 13.5. –  Cananéens / Perizzites 13.7. –  un petit nombre d''hommes  : même expression hébraïque Dt 4.27 ; Jr 44.28 ; Ps 105.12 ; 1Ch 16.19 ; cf. Dt 26.5 ; 1R 20.27. –  ma maison ou ma maisonnée, ma famille.'
  - type: text
    content: 'Alors Jacob dit à Siméon et à Lévi : Vous avez attiré le malheur sur moi en me rendant odieux aux habitants du pays, aux Cananéens et aux Perizzites. Je n''ai, moi, qu''un petit nombre d''hommes ; ils se rassembleront contre moi, ils m''attaqueront, et je disparaîtrai, moi et ma maison. '
  '31':
  - type: text
    content: 'Ils répondirent : Doit-on traiter notre sœur comme une prostituée ?'
  '4':
  - type: note
    content: 'Prends… Jg 14.1s. –  cette jeune fille  : litt. cette enfant.'
  - type: text
    content: 'Sichem dit à Hamor, son père : Prends-moi cette jeune fille pour femme. '
  '5':
  - type: note
    content: souillé ou rendu impure v. 13,27 (voir pur). –  silence Am 5.13 ; Ec 3.7.
  - type: text
    content: Jacob apprit qu'il avait souillé Dina, sa fille ; mais comme ses fils étaient aux champs avec son troupeau, Jacob garda le silence jusqu'à leur arrivée.
  '6':
  - type: text
    content: 'Hamor, père de Sichem, sortit auprès de Jacob pour lui parler. '
  '7':
  - type: note
    content: 'Sichem…  : litt. il avait commis… –  folie ou infamie  ; le terme évoque souvent un acte scandaleux ; cf. Dt 22.21 ; Jos 7.15 ; Jg 19.23s ; 20.6,10 ; 1S 25.25 ; 2S 13.12 ; Es 9.16 ; 32.6 ; Jr 29.23 ; Jb 42.8. –  en Israël  : on pourrait aussi comprendre contre Israël. –  inadmissible  : litt. et qu''il ne se fait pas ainsi, c.-à-d. cela ne se fait pas  ; cf. 20.9.'
  - type: text
    content: 'Les fils de Jacob arrivaient des champs lorsqu''ils apprirent la chose. Ils furent consternés et très fâchés, parce que Sichem avait commis une folie en Israël en couchant avec la fille de Jacob, ce qui était inadmissible. '
  '8':
  - type: text
    content: 'Hamor leur dit : Sichem, mon fils, s''est épris de votre fille ; donnez-la-lui pour femme, je vous en prie. '
  '9':
  - type: text
    content: 'Vous pourrez vous allier par des mariages avec nous ; vous nous donnerez vos filles et vous prendrez les nôtres. '
