document_id: GEN.34,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vengeance de Siméon et Lévi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'filles du pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 27.46.
      marker-yv: yv-n
    - type: text
      text: 'Dina, la fille que Léa avait donnée à Jacob, sortait pour voir les filles du pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vous habiterez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'installez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent deux formes du même verbe hébreu.
      marker-yv: yv-n
    - type: text
      text: Vous habiterez avec nous, le pays sera à votre disposition ; installez-vous, vous ferez du commerce et vous acquerrez des propriétés.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au père et aux frères de Dina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à son père et à ses frères (à elle)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que je trouve '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 33.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Sichem dit au père et aux frères de Dina : Que je trouve grâce à vos yeux ! Je donnerai ce que vous me direz. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dot '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir Ex 22.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') était versée par le futur mari aux parents de la jeune fille ; la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: revenait probablement à la mariée comme son bien propre.
      marker-yv: yv-n
    - type: text
      text: 'Exigez de moi une forte dot et une donation importante, je donnerai ce que vous me direz ; mais donnez-moi la jeune fille pour femme ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pr 26.24-26.
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Jacob répondirent de manière trompeuse à Sichem et à Hamor, son père, parce que Sichem avait souillé leur sœur Dina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: incirconcis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui a un prépuce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 17.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: circoncision
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un outrage.
      marker-yv: yv-n
    - type: text
      text: 'Ils leur dirent : Nous ne pourrons jamais donner notre sœur à un homme incirconcis : ce serait un déshonneur pour nous ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'A cette seule condition nous donnerons notre consentement : si vous devenez comme nous, si tout mâle parmi vous se fait circoncire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nous vous donnerons alors nos filles et nous prendrons les vôtres pour femmes ; nous habiterons avec vous, et nous deviendrons un seul peuple. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais si vous ne nous écoutez pas, si vous ne vous faites pas circoncire, nous prendrons notre fille et nous nous en irons. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Leurs paroles plurent à Hamor et à Sichem, fils de Hamor. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'exécuter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire la chose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même mot au v. 18). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui plaisait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe hébreu est aussi rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prendre plaisir en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 14.8.'
      marker-yv: yv-n
    - type: text
      text: Le jeune homme ne tarda pas à s'exécuter, car la fille de Jacob lui plaisait ; or il était le plus considéré de toute sa famille.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sichem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '33.18s ; cf. Jos 24 ; Jg 9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hivvite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la prit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 22.15s ; Dt 22.28s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abusa d'elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'humilia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le verbe correspondant, cf. Dt 21.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.24,29 ; Jg 19.24 ; 20.5 ; 2S 13.12,14,22,32 ; Es 60.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 22.10s ; Lm 5.11.'
      marker-yv: yv-n
    - type: text
      text: 'Sichem, fils de Hamor, le Hivvite, prince du pays, la vit, la prit et coucha avec elle ; il abusa d''elle. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 23.10+.
      marker-yv: yv-n
    - type: text
      text: 'Hamor et Sichem, son fils, se rendirent à la porte de leur ville et dirent aux gens de leur ville : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bien assez vaste pour eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'large des deux mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tous côtés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Né 7.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que le pays leur soit largement ouvert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 18.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 4.40.'
      marker-yv: yv-n
    - type: text
      text: 'Ces gens se montrent pacifiques avec nous ; qu''ils s''installent dans le pays et qu''ils y fassent du commerce ; le pays est bien assez vaste pour eux ! Nous prendrons leurs filles pour femmes, et nous leur donnerons nos filles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais ils ne consentiront à habiter avec nous, pour ne faire avec nous qu''un seul peuple, que si tout mâle parmi nous est circoncis, comme ils le sont eux-mêmes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Pr 1.13.
      marker-yv: yv-n
    - type: text
      text: 'Leurs troupeaux, leurs biens, et toutes leurs bêtes ne seront-ils pas alors à nous ? Acceptons seulement leur condition, pour qu''ils habitent avec nous. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui sortaient…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui étaient venus à la porte de sa ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire, au lieu de la répétition de cette expression à la fin du v., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tous les mâles se firent circoncire dans la chair de leur prépuce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 17.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',14).'
      marker-yv: yv-n
    - type: text
      text: Tous ceux qui sortaient par la porte de sa ville écoutèrent Hamor et Sichem, son fils ; tous les mâles qui sortaient par la porte de sa ville se firent circoncire.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souffrants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jos 5.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Siméon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lévi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.33s ; 42.24 ; 49.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en toute sécurité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans aucun risque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cette précision s''applique vraisemblablement à Siméon et Lévi ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la ville qui se croyait en sécurité.
      marker-yv: yv-n
    - type: text
      text: 'Le troisième jour, alors qu''ils étaient souffrants, deux des fils de Jacob, Siméon et Lévi, frères de Dina, prirent chacun son épée, arrivèrent dans la ville en toute sécurité et tuèrent tous les mâles. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ils tuèrent aussi au fil de l''épée Hamor et Sichem, son fils ; ils reprirent Dina de la maison de Sichem et sortirent. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les victimes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant (litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les transpercés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) peut inclure les morts et les blessés.
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Jacob se jetèrent sur les victimes et pillèrent la ville, parce qu''on avait souillé leur sœur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils prirent leur petit bétail et leur gros bétail, leurs ânes, ce qui était dans la ville et ce qui était dans la campagne ; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs femmes et toutes leurs familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou, selon l''ordre des mots hébreux, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs familles et leurs femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 45.19 ; 46.5 ; 47.12,24 ; 50.8,21. Le terme hébreu correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'familles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne le plus souvent les enfants, mais parfois aussi les personnes âgées, les femmes et les esclaves ; voir aussi Jg 18.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ils capturèrent et pillèrent toutes leurs richesses, leurs femmes et toutes leurs familles, ainsi que tout ce qui se trouvait dans les maisons.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il s''attacha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parla au '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur le
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' de'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sur l''expression hébraïque correspondante, qui évoque avec diverses nuances l''établissement d''une relation de confiance, voir 50.21 ; Jg 19.3 ; 2S 19.8 ; Es 40.2 ; Os 2.16 ; Rt 2.13 ; 2Ch 30.22 ; 32.6.'
      marker-yv: yv-n
    - type: text
      text: 'Il s''attacha à Dina, fille de Jacob ; il aima la jeune fille et parla au cœur de la jeune fille. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous avez attiré le malheur sur moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur le verbe correspondant, voir Jos 6.18 ; 7.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 11.35 ; 1S 14.29 ; 1R 18.17s ; Ps 39.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Pr 11.17+ ; 1Ch 2.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'odieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: puant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; le terme peut évoquer une odeur nauséabonde ; cf. Ex 5.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir 1S 13.4 ; 27.12 ; 2S 10.6 ; 16.21 ; Pr 13.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cananéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Perizzites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un petit nombre d'hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même expression hébraïque Dt 4.27 ; Jr 44.28 ; Ps 105.12 ; 1Ch 16.19 ; cf. Dt 26.5 ; 1R 20.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ma maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ma maisonnée, ma famille.
      marker-yv: yv-n
    - type: text
      text: 'Alors Jacob dit à Siméon et à Lévi : Vous avez attiré le malheur sur moi en me rendant odieux aux habitants du pays, aux Cananéens et aux Perizzites. Je n''ai, moi, qu''un petit nombre d''hommes ; ils se rassembleront contre moi, ils m''attaqueront, et je disparaîtrai, moi et ma maison. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ils répondirent : Doit-on traiter notre sœur comme une prostituée ?'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Prends… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jg 14.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette jeune fille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette enfant.
      marker-yv: yv-n
    - type: text
      text: 'Sichem dit à Hamor, son père : Prends-moi cette jeune fille pour femme. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souillé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rendu impure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 13,27 (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'silence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Am 5.13 ; Ec 3.7.
      marker-yv: yv-n
    - type: text
      text: Jacob apprit qu'il avait souillé Dina, sa fille ; mais comme ses fils étaient aux champs avec son troupeau, Jacob garda le silence jusqu'à leur arrivée.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hamor, père de Sichem, sortit auprès de Jacob pour lui parler. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sichem…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il avait commis… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'folie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: infamie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme évoque souvent un acte scandaleux ; cf. Dt 22.21 ; Jos 7.15 ; Jg 19.23s ; 20.6,10 ; 1S 25.25 ; 2S 13.12 ; Es 9.16 ; 32.6 ; Jr 29.23 ; Jb 42.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inadmissible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et qu'il ne se fait pas ainsi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cela ne se fait pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.9.'
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Jacob arrivaient des champs lorsqu''ils apprirent la chose. Ils furent consternés et très fâchés, parce que Sichem avait commis une folie en Israël en couchant avec la fille de Jacob, ce qui était inadmissible. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hamor leur dit : Sichem, mon fils, s''est épris de votre fille ; donnez-la-lui pour femme, je vous en prie. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vous pourrez vous allier par des mariages avec nous ; vous nous donnerez vos filles et vous prendrez les nôtres. '
