document_id: ISA.58,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jeûne que le Seigneur préconise
  - type: text
    content: ' '
  - type: note
    content: dis ou annonce… Mi 3.8.
  - type: text
    content: Crie à plein gosier,
  - type: text
    content: ne te retiens pas !
  - type: text
    content: Elève la voix comme une trompe,
  - type: text
    content: dis à mon peuple sa transgression,
  - type: text
    content: à la maison de Jacob ses péchés !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ce que tu désires toi-même / l''affligé  : litt. ton être / l''être de l''affligé ou ton gosier…, ton appétit…  ; cf. Gn 1.20n. –  ta lumière… Ps 37.6 ; Jb 11.17 ; Mt 5.14 ; Jn 8.12.'
  - type: text
    content: si tu offres à l'affamé
  - type: text
    content: ce que tu désires toi-même,
  - type: text
    content: si tu rassasies l'affligé,
  - type: text
    content: ta lumière se lèvera dans les ténèbres,
  - type: text
    content: et ton obscurité sera comme le midi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'il te rassasiera  : autre traduction il rassasiera ton âme (cf. Gn 1.20n). –  redonnera de la vigueur  : traduction incertaine ; d''autres formes du même verbe sont traduites par délivrer (Ps 6.5 ; 7.5 ; 18.20 etc.). –  tout ton corps  : litt. tes os. –  comme un point d''eau Jn 4.14. –  ne déçoit pas  : cf. Jb 6.15-20 ; Jc 3.11 ; 2P 2.17.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te conduira constamment,'
  - type: text
    content: il te rassasiera dans les lieux arides
  - type: text
    content: et redonnera de la vigueur à tout ton corps.
  - type: text
    content: Tu seras comme un jardin abreuvé,
  - type: text
    content: comme un point d'eau dont l'eau ne déçoit pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Grâce à toi ou à partir de toi. –  on rebâtira 44.26-28 ; 61.4. –  ruines 64.10. –  pour rendre…  : litt. pour habiter.'
  - type: text
    content: Grâce à toi, on rebâtira sur les ruines d'autrefois,
  - type: text
    content: tu relèveras les fondations des générations passées ;
  - type: text
    content: on t'appellera « Celui qui répare les brèches »,
  - type: text
    content: « Celui qui restaure les sentiers,
  - type: text
    content: pour rendre le pays habitable ».
  - type: heading
    content: Le sabbat qui plaît au Seigneur
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Si tu te gardes…  : litt. si tu fais revenir du sabbat ton pied  ; l''expression pourrait signifier simplement si, le jour du sabbat, tu te retiens . –  sabbat 56.2+ ; cf. Ez 20.12-24. –  jour sacré Ex 31.15 ; voir saint. –  en ne vaquant pas…  : cf. v. 3n.'
  - type: text
    content: Si tu te gardes de piétiner le sabbat,
  - type: text
    content: de t'occuper de tes propres affaires en mon jour sacré,
  - type: text
    content: si tu appelles « délices » le sabbat,
  - type: text
    content: '« glorieux » le jour sacré du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: si tu le glorifies
  - type: text
    content: en ne suivant pas tes propres voies,
  - type: text
    content: en ne vaquant pas à tes propres affaires
  - type: text
    content: ni à tes discours,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur tes délices Ps 37.4 ; Jb 22.26. –  je te ferai circuler  : litt. je te ferai chevaucher ou je t''emmènerai en char . –  sur les hauteurs… Dt 32.12s ; cf. Am 4.13 ; Mi 1.3. –  la bouche du Seigneur 1.20 ; 40.5.'
  - type: text
    content: 'alors tu feras du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tes délices,'
  - type: text
    content: et je te ferai circuler sur les hauteurs du pays,
  - type: text
    content: je te nourrirai du patrimoine de Jacob, ton père
  - type: text
    content: '– c''est la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ils me cherchent 55.6+. –  justice / équité (autre traduction droit  ; c''est le même terme hébreu, au pluriel, qui est rendu par jugements ) 56.1+. –  de son Dieu  : autre traduction de ses dieux . –  s''approcher de Dieu  : litt. l''approche (ou la proximité ) de Dieu  ; même expression en Ps 73.28 ; autre traduction se présenter devant Dieu (cf. Lv 1.2n) ; cf. Am 5.18-20.'
  - type: text
    content: Jour après jour ils me cherchent,
  - type: text
    content: ils désirent connaître mes voies,
  - type: text
    content: comme une nation qui aurait agi selon la justice
  - type: text
    content: et qui n'aurait pas abandonné l'équité de son Dieu ;
  - type: text
    content: ils me demandent des jugements justes,
  - type: text
    content: ils désirent s'approcher de Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi jeûnons-nous ? cf. Za 7 ; Ml 3.14 ; Mt 6.16-18. –  Tu ne le vois pas  : cf. 59.1. –  nous privons-nous  : litt. humilier (ou affliger ) notre être (cf. Gn 1.20n) ; voir aussi v. 5 ; Lv 16.29nss ; 23.27 ; Nb 29.7. –  à vos propres affaires  : autre traduction à vos penchants  ; même terme au v. 13n. –  vous pressez ou vous maltraitez, vous opprimez  ; cf. 3.5 ; 53.7 ; Ex 3.7n.'
  - type: text
    content: Pourquoi jeûnons-nous ?
  - type: text
    content: Tu ne le vois pas !
  - type: text
    content: Pourquoi nous privons-nous ?
  - type: text
    content: Tu ne le sais pas !
  - type: text
    content: Le jour où vous jeûnez,
  - type: text
    content: vous vaquez à vos propres affaires
  - type: text
    content: et vous pressez tous vos ouvriers.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Quand vous jeûnez…  : litt. vous jeûnez pour la querelle et la brouille, pour frapper méchamment du poing. Au lieu de méchamment , LXX a lu le pauvre  ; cf. 1.15.'
  - type: text
    content: Quand vous jeûnez, ce ne sont que querelles et brouilles,
  - type: text
    content: méchants coups de poing ;
  - type: text
    content: vous ne jeûnez pas comme le veut ce jour,
  - type: text
    content: pour être entendus d'en haut.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'préconise  : le verbe hébreu correspondant (aussi au v. 6) est souvent traduit par choisir . –  se prive v. 3n. –  sac / cendre Jr 6.26 ; Est 4.3 ; Dn 9.3 ; Mt 11.21. –  agréé  : le même mot est rendu par faveur en 49.8 ; 60.10 ; 61.2.'
  - type: text
    content: Est-ce là le jeûne que je préconise,
  - type: text
    content: un jour où l'homme se prive ?
  - type: text
    content: S'agit-il de courber la tête comme un roseau,
  - type: text
    content: de se coucher sur le sac et la cendre ?
  - type: text
    content: Est-ce là ce que tu appelles un jeûne,
  - type: text
    content: 'un jour agréé du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Le jeûne que je préconise (v. 5n) : cf. 1.11 ; Am 5.21. –  détacher… Dt 15.12-15 ; Jr 34.8ss. –  chaînes de la méchanceté  : LXX liens de l''injustice , comme en Ac 8.23. –  ceux qu''on écrase  : le verbe correspondant est rendu par ployer en 42.3.'
  - type: text
    content: 'Le jeûne que je préconise, n''est-ce pas plutôt ceci :'
  - type: text
    content: détacher les chaînes de la méchanceté,
  - type: text
    content: dénouer les liens du joug,
  - type: text
    content: renvoyer libres ceux qu'on écrase,
  - type: text
    content: et rompre tout joug ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'partager… Ez 18.5-9 ; Jb 31.16-20 ; Mt 25.34-40. –  De couvrir…  : litt. quand tu vois (un homme) nu, couvre-le . –  ne pas t''esquiver Dt 22.1n.'
  - type: text
    content: Ne s'agit-il pas de partager ton pain avec celui qui a faim
  - type: text
    content: et de ramener à la maison les pauvres sans abri ?
  - type: text
    content: De couvrir celui que tu vois nu,
  - type: text
    content: et de ne pas t'esquiver devant celui qui est ta propre chair ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'tu te rétablirais  : litt. ta chair nouvelle germera (cf. 42.9), image de la cicatrisation d''une plaie ; cf. Jr 8.21-22n  ; 30.17 ; 33.6. –  devant / arrière-garde 52.12n. – Voir gloire.'
  - type: text
    content: Alors ta lumière poindrait comme l'aurore,
  - type: text
    content: et tu te rétablirais bien vite ;
  - type: text
    content: ta justice marcherait devant toi,
  - type: text
    content: 'et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' serait ton arrière-garde.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: appellerais / répondrait 65.24 ; Jr 33.3 ; Ps 91.15. –  Je suis là ! 52.6 ; cf. 40.9+. –  les gestes menaçants ou accusateurs , litt. l'envoi du doigt  ; cf. Pr 6.13. –  malfaisants ou favorisant l'injustice  ; cf. 1.13n  ; 31.2n  ; 59.4.
  - type: text
    content: Alors tu appellerais,
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondrait ;'
  - type: text
    content: tu appellerais au secours,
  - type: text
    content: 'et il dirait : Je suis là !'
  - type: text
    content: Si tu éloignes du milieu de toi le joug,
  - type: text
    content: les gestes menaçants
  - type: text
    content: et les discours malfaisants,
