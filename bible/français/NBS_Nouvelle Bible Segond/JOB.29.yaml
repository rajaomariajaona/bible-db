document_id: JOB.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Dernière réplique de Job : ah, les beaux jours d''autrefois !'
  - type: text
    content: ' '
  - type: note
    content: 'son poème  : cf. 27.1n.'
  - type: text
    content: 'Job reprit son poème :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'les chefs…  : litt. la voix des chefs se cachait , même verbe hébreu qu''au v. 8n.'
  - type: text
    content: les chefs se taisaient,
  - type: text
    content: et leur langue s'attachait à leur palais.
  '11':
  - type: text
    content: Car l'oreille qui m'entendait me déclarait heureux,
  - type: text
    content: l'œil qui me voyait me rendait témoignage ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 72.12. –  le pauvre 6.14+. –  qui appelait à l''aide  : le même verbe est traduit par appeler au secours en 24.12 etc. C''est une autre racine hébraïque qui est traduite par secourait . –  orphelin 22.9+.'
  - type: text
    content: en effet, je délivrais le pauvre qui appelait à l'aide,
  - type: text
    content: l'orphelin que personne ne secourait.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Voir bénédiction. –  je remplissais de joie  : litt. je faisais pousser des cris de joie (au cœur…) –  veuve 22.9+ ; voir aussi 24.21n.'
  - type: text
    content: La bénédiction de celui qui allait disparaître venait sur moi ;
  - type: text
    content: je remplissais de joie le cœur de la veuve.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 19.9. – Voir justice.
  - type: text
    content: Je me revêtais de la justice ; elle me revêtait.
  - type: text
    content: J'avais mon droit pour manteau et pour turban.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 19.14.
  - type: text
    content: J'étais des yeux pour l'aveugle
  - type: text
    content: et des jambes pour le boiteux.
  '16':
  - type: text
    content: ' '
  - type: note
    content: père Es 22.21. –  j'examinais à fond (5.27n) la cause… Pr 29.7.
  - type: text
    content: J'étais un père pour les pauvres,
  - type: text
    content: j'examinais à fond la cause de l'inconnu ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 22.8+.
  - type: text
    content: je brisais la mâchoire de l'homme injuste
  - type: text
    content: et j'arrachais la proie de ses dents.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'dans mon nid  : certains modifient le texte hébreu traditionnel pour lire avec ma corne (c.-à-d. ma force ou ma fierté ) ou dans ma vieillesse . –  le sable  : LXX emploie le terme grec phoinix , qui peut désigner le palmier , mais aussi le phénix , l''oiseau fabuleux qui vivait très vieux et renaissait de ses cendres après avoir été brûlé dans son nid. Le terme hébreu employé ici pourrait évoquer une légende analogue ; cf. Es 40.31 ; Ps 103.5.'
  - type: text
    content: 'Alors je disais : « J''expirerai dans mon nid,'
  - type: text
    content: j'aurai des jours nombreux comme le sable ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'mes racines…  : litt. ma racine (sera) ouverte vers les eaux (cf. Ps 1.3). –  rosée Gn 27.28 ; Os 14.6 ; Pr 19.12. –  passera la nuit ou logera , cf. 19.4n. –  rameaux 15.32.'
  - type: text
    content: mes racines se tendront vers l'eau,
  - type: text
    content: la rosée passera la nuit sur mes rameaux ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'aux mois  : litt. les lunes , cf. 1.1-5 ; 3.6n  ; 8.6 ; 42.10-17. –  me gardait  : cf. 1S 2.9 ; Ps 40.12 ; Esd 5.5.'
  - type: text
    content: Ah ! si j'étais comme aux mois de jadis,
  - type: text
    content: comme aux jours où Dieu me gardait,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'ma gloire  : cf. Ps 7.6n.'
  - type: text
    content: ma gloire se renouvellera en moi,
  - type: text
    content: et mon arc retrouvera sa force dans ma main. »
  '21':
  - type: text
    content: ' '
  - type: note
    content: Les v. 21-25 semblent former la suite logique des v. 7-10 où Job parlait de l'assemblée dans laquelle il était écouté et respecté. Dans l'hébreu, tous les verbes sont à la troisième personne du pluriel ; on pourrait aussi traduire ils m'écoutaient, dans l'attente, ils gardaient le silence…
  - type: text
    content: On m'écoutait, dans l'attente,
  - type: text
    content: on gardait le silence pour entendre mes conseils.
  '22':
  - type: text
    content: ' '
  - type: note
    content: se répandaient Ez 21.2n.
  - type: text
    content: Après mes paroles, on ne répliquait pas,
  - type: text
    content: et mes propos se répandaient sur tous ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: la pluie était considérée comme une bénédiction de Dieu ; cf. Dt 32.2+ ; 2S 23.3s.
  - type: text
    content: ils m'attendaient comme on attend la pluie,
  - type: text
    content: ils ouvraient la bouche comme pour une pluie printanière.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ils ne voulaient…  : litt. ils ne faisaient pas tomber la lumière de ma face , le sourire comme signe de faveur. Cf. Jr 3.12n  ; Pr 16.15.'
  - type: text
    content: Je leur souriais, ils n'osaient y croire,
  - type: text
    content: ils ne voulaient rien perdre de la lumière de mon visage.
  '25':
  - type: text
    content: Je choisissais pour eux la voie à suivre,
  - type: text
    content: et je m'asseyais à leur tête ;
  - type: text
    content: je demeurais comme un roi au milieu de ses troupes,
  - type: text
    content: comme celui qui console les affligés.
  '3':
  - type: text
    content: quand il faisait briller sa lampe sur ma tête
  - type: text
    content: et qu'à sa lumière je m'avançais dans les ténèbres !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ma pleine maturité  : litt. mon automne , saison de la récolte. –  quand ma tente…  : litt. quand le secret (ou le conseil secret , 15.8 ; 19.19) de Dieu (était) sur ma tente  ; certains modifient le texte hébreu traditionnel pour lire quand la hutte de Dieu était sur ma tente (c.-à-d. quand Dieu protégeait ma famille ) ; d''autres, quand Dieu (le texte emploierait alors deux noms divins différents mais équivalents) avait fondé ma tente.'
  - type: text
    content: Tel que j'étais aux jours de ma pleine maturité,
  - type: text
    content: quand ma tente était dans les secrets de Dieu,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Puissant 5.17n. –  garçons  : le terme hébreu correspondant est traduit par jeunes gens au v. 8 ; cf. 1.19n  ; 24.5n.'
  - type: text
    content: quand le Puissant était encore avec moi
  - type: text
    content: et que mes garçons m'entouraient ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 20.17+. –  rocher / huile Dt 32.13.
  - type: text
    content: quand je me lavais les pieds dans le lait fermenté
  - type: text
    content: et que le rocher répandait pour moi des torrents d'huile !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 5.4n.
  - type: text
    content: Quand je sortais pour aller à la porte de la ville
  - type: text
    content: et que je me faisais préparer un siège sur la place.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les jeunes gens v. 5n. –  se cachaient  : cf. v. 10n. –  se levaient  : cf. Lv 19.32.'
  - type: text
    content: Les jeunes gens me voyaient et se cachaient,
  - type: text
    content: les vieillards se levaient et se tenaient debout.
  '9':
  - type: text
    content: ' '
  - type: note
    content: la main… 21.5+.
  - type: text
    content: Les princes arrêtaient leurs propos
  - type: text
    content: et mettaient la main sur leur bouche ;
