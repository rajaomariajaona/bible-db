document_id: EXO.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chant de Moïse et des Israélites
  - type: text
    content: ' '
  - type: note
    content: 'chantèrent  : litt. chantèrent ce chant  ; cf. Nb 21.17 ; Es 43.21 ; Ps 105.43 ; 106.12 ; Ap 15.3. –  son cavalier  : autre traduction le conducteur du char.'
  - type: text
    content: 'Alors Moïse et les Israélites chantèrent pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: 'Je chanterai pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il a montré sa souveraineté ;'
  - type: text
    content: il a jeté dans la mer le cheval et son cavalier.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Tu as soufflé  : litt. tu as soufflé de ton souffle (verbe et complément non apparentés) ; le second terme est aussi traduit par vent (14.21) ou esprit  ; cf. Gn 1.2n. –  magnifiques  : un verbe apparenté apparaît aux v. 6,11 ; cf. 1S 4.8n  ; Es 33.21 ; Ps 8.2+.'
  - type: text
    content: 'Tu as soufflé :'
  - type: text
    content: la mer les a recouverts ;
  - type: text
    content: ils se sont enfoncés comme du plomb
  - type: text
    content: dans les eaux magnifiques.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'dieux  : hébreu ’élim , pluriel de ’el (v. 2 ; Gn 21.33n) ; Dt 3.24 ; Ps 86.8. –  magnifique en sainteté  : LXX glorifié parmi les saints . –  redoutable…  : litt. redoutable de louanges . On peut comprendre redoutable par ses sujets de louange , c.-à-d. par ses hauts faits.'
  - type: text
    content: 'Qui est comme toi parmi les dieux, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ?'
  - type: text
    content: Qui est comme toi magnifique en sainteté,
  - type: text
    content: redoutable et digne de louanges,
  - type: text
    content: toi qui fais des choses étonnantes ?
  '12':
  - type: text
    content: 'Tu as étendu la main droite :'
  - type: text
    content: la terre les a engloutis.
  '13':
  - type: text
    content: ' '
  - type: note
    content: assuré la rédemption 6.6+. –  sacré ou saint (cf. v. 11,17, terme apparenté pour sanctuaire ).
  - type: text
    content: Par ta fidélité tu as conduit
  - type: text
    content: ce peuple dont tu as assuré la rédemption ;
  - type: text
    content: par ta puissance tu le diriges
  - type: text
    content: vers ton domaine sacré.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 48.5-7.
  - type: text
    content: 'Les peuples l''ont appris : ils tremblent ;'
  - type: text
    content: les douleurs de l'accouchement ont saisi les habitants de la Philistie ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'frisson  : cf. Es 33.14 ; Ps 2.11+ ; Esd 10.9n. –  puissants  : litt. béliers  ; cf. 2R 24.15 ; Ez 17.13 ; 31.11 ; 32.21. –  défailli  : litt. fondu  ; cf. Jos 2.9,24 ; Ez 21.20n.'
  - type: text
    content: les chefs d'Edom sont saisis d'épouvante ;
  - type: text
    content: un frisson s'empare des puissants de Moab ;
  - type: text
    content: tous les habitants de Canaan ont défailli.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'terreur  : voir crainte. –  acquis  : autres traductions produit ; acheté  ; cf. Gn 4.1n  ; Ps 74.2.'
  - type: text
    content: La terreur, la frayeur s'abat sur eux ;
  - type: text
    content: par la grandeur de ton bras
  - type: text
    content: ils deviennent muets comme une pierre,
  - type: text
    content: 'jusqu''à ce que ton peuple soit passé, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: jusqu'à ce qu'il soit passé,
  - type: text
    content: le peuple que tu as acquis.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'montagne Ps 68.17. –  de ton patrimoine  : autre traduction qui est ton patrimoine . –  au lieu que tu as préparé  : autre traduction dans la résidence où tu dois habiter  ; le terme correspondant est apparenté au verbe traduit plus loin par ont établi . –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï , cf. 3.15n  ; plusieurs mss hébreux portent deux fois le tétragramme YHWH.'
  - type: text
    content: Tu les amèneras et tu les planteras
  - type: text
    content: dans la montagne de ton patrimoine,
  - type: text
    content: 'au lieu que tu as préparé pour y habiter, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: au sanctuaire, Seigneur, que tes mains ont établi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'est roi  : autre traduction régnera  ; cf. Ps 95.3 ; 96.10 ; 97.1 ; 98.6 ; 99.1.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est roi pour toujours, à jamais.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'attelages  : autre traduction équipages , cf. 14.9n.'
  - type: text
    content: 'Car les chevaux du pharaon, ses chars et ses attelages, sont entrés dans la mer, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ramené sur eux les eaux de la mer ; mais les Israélites ont marché sur la terre ferme au milieu de la mer.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur (Yah)  : forme abrégée du nom divin YHWH, particulièrement fréquente dans les textes poétiques ; de même en 17.16 ; Es 12.2 ; 38.11 ; Ps 68.5+ ; cf. Ct 8.6n. –  ma puissance  : LXX mon protecteur  ; autre traduction, d''après une racine hébraïque homonyme (cf. Gn 43.11n)  : mon chant  ; cf. Es 12.2 ; Ps 118.14. –  mon Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) est ma force et ma puissance,'
  - type: text
    content: il a été pour moi le salut.
  - type: text
    content: 'C''est mon Dieu : je veux lui rendre hommage.'
  - type: text
    content: 'C''est le Dieu de mon père : je l''exalterai.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: tambourin Jg 11.34 ; 1S 18.6 ; 2S 6.5.
  - type: text
    content: 'Miriam, la prophétesse, sœur d''Aaron, prit le tambourin, et toutes les femmes sortirent derrière elle, avec des tambourins et des danses. '
  '21':
  - type: note
    content: 'répondait  : litt. leur répondait, le pronom leur étant à entendre au masculin : ou bien Miriam répondait aux Israélites qui avaient chanté le cantique (v. 1-18), ou bien elle l''avait entonné pour eux (autre traduction possible du verbe) ; cf. 32.18n  ; Nb 21.17 (entonner un chœur) ; 1S 18.7 ; 21.12 ; 29.5.'
  - type: text
    content: 'Miriam répondait :'
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car il a montré sa souveraineté ;
  - type: text
    content: il a jeté dans la mer le cheval et son cavalier.
  - type: heading
    content: L'eau de Mara
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ils prirent la direction du désert  : litt. ils sortirent vers le désert . –  Shour Gn 16.7n.'
  - type: text
    content: Moïse fit partir Israël de la mer des Joncs ; ils prirent la direction du désert de Shour ; ils firent trois journées de marche dans le désert, ils ne trouvèrent pas d'eau.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Mara signifie amère . Il s'agit peut-être d'une oasis au sud-est de Suez. Cf. Nb 33.8.
  - type: text
    content: 'Ils arrivèrent à Mara ; mais ils ne purent pas boire l''eau de Mara, parce qu''elle était amère. C''est pourquoi on l''a appelée du nom de Mara (« Amère »). '
  '24':
  - type: note
    content: 14.11+.
  - type: text
    content: 'Le peuple se mit à maugréer contre Moïse, en disant : Qu''allons-nous boire ? '
  '25':
  - type: note
    content: 'Il  : Smr, LXX, Syr et Vg précisent Moïse. –  lui indiqua  : Smr, Vg, Tg et LXX ont lu lui fit voir. –  un certain bois  : autre traduction un arbre (dont il jeta le bois…). –  l''eau devint douce  : cf. 2R 2.19-22 ; Ez 47.8 ; Ap 8.10s ; Siracide 38.4s : « Le Seigneur a créé des remèdes issus de la terre, l''homme avisé ne les méprise pas. N''est-ce pas un bout de bois qui a adouci l''eau pour faire connaître sa vertu ? » –  il donna… des règles  : litt. il plaça pour lui prescription et règle (ce dernier terme peut aussi désigner le droit, ou la coutume  ; cf. 21.31 ; 26.30n  ; 28.15n  ; voir aussi loi) ; le sujet de la phrase peut être le Seigneur ou Moïse. Cf. Jos 24.25 ; 1S 30.25.'
  - type: text
    content: 'Il cria vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui indiqua un certain bois, qu''il jeta dans l''eau : l''eau devint douce. C''est là qu''il donna au peuple des prescriptions et des règles ; c''est là aussi qu''il le mit à l''épreuve. '
  '26':
  - type: note
    content: 'ce qui lui convient  : litt. ce qui est droit à ses yeux. –  maladies 9.1-12 ; Dt 7.12-15. –  YHWH  : voir noms divins. –  guéris Es 19.22 ; 57.18s ; Jr 33.6 ; Os 6.1 ; Ml 3.20 ; Mt 8.1-17/ /.'
  - type: text
    content: 'Il dit : Si vraiment tu écoutes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, si tu fais ce qui lui convient, si tu prêtes l''oreille à ses commandements et si tu observes toutes ses prescriptions, je ne t''infligerai aucune des maladies que j''ai infligées à l''Egypte : c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui te guéris.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Elim ( Les Grands arbres ) : cet endroit est parfois identifié avec l''oasis de Gharandel, à une centaine de kilomètres au sud-est de Suez, entre la montagne et la mer (16.1 ; Nb 33.9s).'
  - type: text
    content: Ils arrivèrent à Elim, où il y avait douze sources et soixante-dix palmiers. Ils campèrent là, près de l'eau.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un guerrier  : litt. un homme de guerre  ; cf. Jr 21.5 ; LXX briseur de guerres (cf. Ps 46.10 ; 76.4). –  Son nom… 3.14n-15n  ; Jr 10.16+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un guerrier.'
  - type: text
    content: 'Son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'précipité  : cf. 19.13n. –  équipages  : litt. troisièmes  ; voir 14.7n (même mot hébreu). –  ont été submergés  : LXX il les a submergés.'
  - type: text
    content: Il a précipité dans la mer les chars du pharaon et son armée ;
  - type: text
    content: ses équipages d'élite ont été submergés par la mer des Joncs.
  '5':
  - type: text
    content: ' '
  - type: note
    content: abîmes v. 8 ; cf. Gn 1.2n  ; voir aussi Jr 51.63s ; Ap 18.21.
  - type: text
    content: 'Les abîmes les ont recouverts :'
  - type: text
    content: ils sont descendus dans les profondeurs, comme une pierre.
  '6':
  - type: text
    content: 'Ta main droite, '
  - type: text
    content: Seigneur
  - type: text
    content: ', est magnifiée par sa vigueur !'
  - type: text
    content: 'Ta main droite, '
  - type: text
    content: Seigneur
  - type: text
    content: ', a écrasé l''ennemi !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'majesté  : le terme hébreu est habituellement traduit par orgueil ou fierté , cf. Mi 5.3 ; voir aussi Es 2.10,19,21 ; 24.14n. –  tu renverses 23.24n. –  chaume  : cf. Es 5.24 ; Ab 18 ; Na 1.10.'
  - type: text
    content: Par la grandeur de ta majesté
  - type: text
    content: tu renverses ceux qui se dressent contre toi ;
  - type: text
    content: 'tu déchaînes l''ardeur de ta colère :'
  - type: text
    content: elle les dévore comme du chaume.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'souffle de tes narines  : l''expression hébraïque peut évoquer la colère, comme au v. 7. –  abîmes v. 5+.'
  - type: text
    content: Au souffle de tes narines,
  - type: text
    content: les eaux se sont amoncelées,
  - type: text
    content: les courants se sont arrêtés comme une masse,
  - type: text
    content: les abîmes se sont durcis au cœur de la mer.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je m''en repaîtrai  : litt. mon être (ou peut-être ma gorge ) se remplira d''eux . Cf. Es 5.14 ; Ha 1.13 ; 2.5. –  s''en emparera ou, selon la traduction habituelle du verbe, en prendra possession.'
  - type: text
    content: 'L''ennemi disait : « Je poursuivrai, j''atteindrai,'
  - type: text
    content: je partagerai le butin ;
  - type: text
    content: je m'en repaîtrai,
  - type: text
    content: je tirerai l'épée, ma main s'en emparera ! »
