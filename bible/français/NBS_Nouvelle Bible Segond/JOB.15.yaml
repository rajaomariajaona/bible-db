document_id: JOB.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention d''Eliphaz : le méchant n''échappera pas'
  - type: text
    content: 'Eliphaz le Témanite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.8+.
  - type: text
    content: Il y a parmi nous des cheveux blancs, des vieillards,
  - type: text
    content: plus riches de jours que ton père.
  '11':
  - type: text
    content: ' '
  - type: note
    content: consolations 16.2 ; 21.2,34 ; cf. 26.2.
  - type: text
    content: Ne te suffisent-elles pas, les consolations de Dieu,
  - type: text
    content: et la parole qu'on t'adresse avec douceur ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  se mettent à cligner  : le sens du verbe hébreu correspondant, qui n''apparaît qu''ici, est incertain. D''autres comprennent pourquoi ces yeux hagards (ou fatigués )  ? La leçon de LXX, pourquoi tes yeux se sont-ils haussés ? (c.-à-d. pourquoi ce regard orgueilleux ? ), pourrait s''expliquer par une variante du texte hébreu.'
  - type: text
    content: Comme ton cœur t'entraîne,
  - type: text
    content: comme tes yeux se mettent à cligner !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ta colère  : litt. ton esprit ou ton souffle.'
  - type: text
    content: C'est contre Dieu que tu tournes ta colère
  - type: text
    content: et que tu profères de tels propos !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 4.17+ ; 14.4+. – Voir pur.
  - type: text
    content: Qu'est-ce qu'un homme, pour qu'il soit pur ?
  - type: text
    content: Et celui qui est né de la femme, pour qu'il soit juste ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: '4.18. –  Si Dieu  : litt. s''il . –  saints 5.1n. –  le ciel ou les cieux , cf. Gn 1.1n.'
  - type: text
    content: Si Dieu n'a pas confiance en ses saints,
  - type: text
    content: si le ciel n'est pas pur à ses yeux,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 34.7.
  - type: text
    content: combien moins l'être abominable et corrompu,
  - type: text
    content: l'homme qui boit l'injustice comme de l'eau !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 32.10 ; 36.2.
  - type: text
    content: Je vais t'expliquer, écoute-moi !
  - type: text
    content: Je raconterai ce que j'ai vu,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 8.8+.
  - type: text
    content: ce que les sages ont dit,
  - type: text
    content: ce qui venait de leurs pères et qu'ils n'ont pas caché.
  '19':
  - type: text
    content: C'est à eux seuls que le pays avait été donné,
  - type: text
    content: et parmi eux aucun étranger n'était encore passé.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 16.3 ; 32.18. –  qui n''est que du vent  : litt. de vent ou de souffle (terme aussi traduit par esprit ). –  Se remplit-il…  : litt. remplit(-il) son ventre de l''est  ; le vent d''est est particulièrement sec et destructeur.'
  - type: text
    content: Le sage répond-il par un savoir qui n'est que du vent ?
  - type: text
    content: Se remplit-il du vent de l'est ?
  '20':
  - type: text
    content: Le méchant est dans le tourment tous les jours de sa vie ;
  - type: text
    content: quel que soit le nombre des années réservées à la brute,
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.4+ ; 18.11-14. –  celui qui ravage tout  : litt. un ravageur , cf. Es 16.4n  ; Jr 51.48n  ; autre traduction un pillard , cf. Ab 5n.'
  - type: text
    content: 'un bruit effrayant retentit à ses oreilles :'
  - type: text
    content: en pleine paix, celui qui ravage tout fond sur lui !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ténèbres  : cf. 3.5+. –  l''épée le guette  : litt. on le guette pour l''épée . Plusieurs mss présentent un texte légèrement différent qui pourrait se traduire  : il est destiné à l''épée.'
  - type: text
    content: il ne croit pas pouvoir échapper aux ténèbres,
  - type: text
    content: l'épée le guette ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'l''attend  : litt. est préparé dans sa main . Des versions anciennes portent il est destiné à être la pâture du vautour, il sait que sa ruine est proche.'
  - type: text
    content: il vagabonde pour chercher du pain,
  - type: text
    content: il sait que le jour des ténèbres l'attend.
  '24':
  - type: text
    content: ' '
  - type: note
    content: détresse / désarroi 3.25. –  l'assaillent 10.17.
  - type: text
    content: La détresse et le désarroi le remplissent d'effroi.
  - type: text
    content: Ils l'assaillent comme un roi prêt à l'attaque ;
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 14.13s ; Ez 28.2. –  Dieu  : hébreu ’El . –  le Puissant 5.17n.'
  - type: text
    content: car il a levé sa main contre Dieu,
  - type: text
    content: il a bravé le Puissant,
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'il a eu l''audace de courir à lui  : litt. il court vers lui avec le cou (tendu)  ; certains ont traduit tête baissée.'
  - type: text
    content: il a eu l'audace de courir à lui
  - type: text
    content: sous le dos épais de ses boucliers.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.24 ; Ps 73.4. –  Il avait…  : litt. sa graisse couvrait son visage . –  les flancs chargés d''embonpoint  : litt. il faisait de la graisse (synonyme probable du terme employé dans la première partie du v. ; le mot correspondant n''apparaît qu''ici) sur les reins.'
  - type: text
    content: Il avait le visage noyé dans la graisse,
  - type: text
    content: les flancs chargés d'embonpoint ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: '3.14n. –  prêtes à  : autre traduction destinées à  ; le verbe correspondant n''apparaît qu''ici et, dans une autre forme, en Pr 24.27 ( organiser ).'
  - type: text
    content: mais il demeurera dans des villes détruites,
  - type: text
    content: dans des maisons inhabitées,
  - type: text
    content: prêtes à tomber en ruine.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'prospérité  : le sens du mot hébreu est incertain, LXX a traduit son ombre . Cf. 20.18-20.'
  - type: text
    content: Il ne s'enrichira plus, sa fortune ne se relèvera pas,
  - type: text
    content: sa prospérité ne s'étalera plus sur la terre.
  '3':
  - type: text
    content: Se défend-il par des paroles inutiles,
  - type: text
    content: par des propos qui ne servent à rien ?
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'il s''écartera  : certains ont compris il fuira sa propre haleine (cf. 19.17n) ; LXX sa fleur sera emportée par le vent . Cf. 8.12+.'
  - type: text
    content: Il ne pourra s'écarter des ténèbres.
  - type: text
    content: Les flammes dessécheront ses rejetons,
  - type: text
    content: il s'écartera par le souffle de sa bouche.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur ; certains le modifient pour lire qu'il ne se fie pas à sa haute taille, car il titube…  ; cf. Es 28.7n,15,18.
  - type: text
    content: Qu'il ne croie pas à l'illusion ! Il s'égarerait,
  - type: text
    content: car c'est l'illusion qui lui sera donnée en échange.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'avant le terme…  : litt. pas en son jour . –  rameau 29.19.'
  - type: text
    content: Cela s'accomplira avant le terme de ses jours,
  - type: text
    content: et son rameau ne verdira plus.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 8.12+.
  - type: text
    content: Il se dépouillera comme une vigne de ses fruits encore verts,
  - type: text
    content: comme un olivier, il fera tomber ses fleurs.
  '34':
  - type: text
    content: ' '
  - type: note
    content: '20.26. –  La communauté ou la famille, l''entourage , même terme hébreu en 16.7 ; voir Ex 12.3n. –  de l''homme vénal  : litt. du présent , au sens de pot-de-vin destiné à pervertir la justice (cf. Ex 23.7s).'
  - type: text
    content: La communauté de l'impie deviendra stérile,
  - type: text
    content: et le feu dévorera les tentes de l'homme vénal.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'oppression / mal 3.10n  ; 4.8+. –  c''est faire sortir…  : litt. leur ventre prépare la tromperie (image du sein maternel qui conçoit et enfante). Cf. Es 59.4 ; Ps 7.15.'
  - type: text
    content: Concevoir l'oppression,
  - type: text
    content: c'est mettre au monde le mal,
  - type: text
    content: c'est faire sortir de son ventre la tromperie.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'piété  : litt. crainte , cf. 4.6n. –  abolis  : cf. v. 8n. –  méditation  : cf. Ps 119.97,99.'
  - type: text
    content: Toi, tu détruis même la piété
  - type: text
    content: et tu abolis toute méditation devant Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 12.34-37/ / ; 15.18s/ /. –  faute  : voir péché. –  avisés  : autre traduction rusés , cf. 5.12 ; Gn 3.1n  ; terme apparenté en Pr 1.4n.'
  - type: text
    content: Car c'est ta faute qui commande ta bouche,
  - type: text
    content: et tu choisis le langage des gens avisés.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'te condamne  : autre traduction te déclare méchant  ; cf. 9.20n  ; 10.2. –  déposent  : litt. répondent  ; cf. Pr 18.7 ; Mt 22.15/ /.'
  - type: text
    content: Ce n'est pas moi, c'est ta propre bouche qui te condamne.
  - type: text
    content: Ce sont tes propres lèvres qui déposent contre toi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '38.4,21. –  le premier des êtres humains (hébreu ’adam , cf. Gn 1.26n) : cf. Siracide 49.16 : « Au-dessus de tout être vivant dans la création est Adam. » –  avant les collines Pr 8.25.'
  - type: text
    content: Es-tu né le premier des êtres humains ?
  - type: text
    content: As-tu été mis au monde avant les collines ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'As-tu entendu…  : autres traductions as-tu écouté les confidences de Dieu ? as-tu assisté au conseil secret de Dieu ? même terme en 19.19 ; 29.4n  ; Jr 23.18 ; Am 3.7 ; cf. Rm 11.34. –  subtilisé  : le même verbe hébreu est traduit par abolir au v. 4.'
  - type: text
    content: As-tu entendu les secrets de Dieu ?
  - type: text
    content: As-tu subtilisé la sagesse à ton profit ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Quelle compréhension…  : litt. (que) comprends-tu qui ne soit aussi avec (ou chez ) nous ?'
  - type: text
    content: Que sais-tu que nous ne sachions pas ?
  - type: text
    content: Quelle compréhension as-tu que nous n'ayons pas ?
