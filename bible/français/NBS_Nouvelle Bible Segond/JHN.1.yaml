document_id: JHN.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie, la lumière, le Fils unique
  - type: text
    content: ' '
  - type: note
    content: 'Au commencement  : cf. 2.11 ; 6.64 ; 8.25n,44 ; 15.27 ; 16.4 ; Mc 1.1 ; 1Jn 1.1 ; 2.13s,24 ; 3.8,11 ; 2Jn 5s ; voir Gn 1.1n  ; Pr 8.22n  ; Ap 3.14n. –  était v. 3n,15n  ; sur l''emploi du verbe correspondant au sujet du Christ, voir aussi 4.26n. –  la Parole (5.24 ; 10.33ss ; 15.3) ou le Verbe , en grec logos (mot masculin, ce qui facilite l''identification au Christ, v. 11,14) ; ce terme, l''un des deux principaux équivalents du mot hébreu correspondant à parole dans l''A.T. grec (LXX), était souvent, pour les premiers chrétiens, synonyme de bonne nouvelle ou d’ évangile (Mc 4.14s ; Ac 8.25) ; il désignait aussi chez les Grecs, et en particulier dans la philosophie stoïcienne (voir Ac 17.18n), le principe divin organisateur du monde et les plus hautes facultés de l''homme (équivalent approximatif de notre mot raison ) ; chez le philosophe juif Philon comme dans les Targums (Tg) la parole de Dieu tend à être de plus en plus personnifiée ; cf. Gn 1.3n  ; 1Jn 1.1 ; Ap 19.13 ; cf. Siracide 24.3 : « Je (la Sagesse) suis sortie de la bouche du Très-Haut et comme une vapeur j''ai recouvert la terre. » Philon, De migratione Abrahami , 3-6 : « La parole est l''habitation du père… L''habitation de Dieu n''est pas telle ou telle des réalités qui supportent la description ou tombent sous le sens… que serait cette habitation sinon la Parole antérieure à tous les êtres qui ont reçu l''existence et le devenir, la Parole dont le Pilote de l''Univers s''est emparé comme d''un timon pour gouverner le Tout : quand il façonnait le monde, Il en avait fait son instrument pour assurer l''irréprochable cohésion de son œuvre. » Epître d''Ignace d''Antioche aux Magnésiens 8.2 : « Car les très divins prophètes ont vécu selon Jésus-Christ… Ils étaient inspirés par sa grâce, pour que les incrédules fussent pleinement convaincus qu''il n''y a qu''un seul Dieu, manifesté par Jésus-Christ son Fils qui est son Verbe sorti du silence, qui en toutes choses s''est rendu agréable à celui qui l''avait envoyé. » –  auprès de  : la préposition grecque comporte une idée d''orientation, sinon de mouvement ; avec un verbe de mouvement, elle est souvent traduite par vers ou à ( aller, s''en aller vers, venir à  ; v. 19n,29,42,47 etc. ; aussi venir trouver quelqu''un , 3.2 etc. ; en ce qui concerne la relation entre Jésus et le Père, voir ses emplois en 5.45 ; 7.33+) ; avec un verbe de parole, elle indique le destinataire, celui à qui la parole s''adresse (p. ex. 2.3, lui dit  ; 10.35) ; certains comprennent ici tournée vers Dieu  ; mais le sens peut être aussi avec Dieu, devant Dieu, chez Dieu, en relation avec Dieu  ; de même au v. 2 ; cf. v. 18n  ; 5.27-30 ; 14.3n  ; 17.5 ; Es 55.11 ; Pr 8.30 ; 1Jn 1.2n  ; Ap 12.5. –  était Dieu  : cf. v. 18 ; 5.18 ; 10.33 ; 12.45 ; 14.8 ; 20.28 ; voir aussi Ph 2.6 ; Col 1.15 ; Hé 1.3.'
  - type: text
    content: Au commencement était la Parole ;
  - type: text
    content: la Parole était auprès de Dieu ;
  - type: text
    content: la Parole était Dieu.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le monde  : dans l''évangile et les épîtres de Jean le terme grec correspondant ( kosmos ) s''applique parfois à l''humanité que Dieu aime et sauve (v. 29 ; 3.16s ; 4.42 ; 6.33,51 ; 10.36 ; 12.47), voire à la création tout entière (11.9 ; 17.5,24 ; 21.25) ; mais il désigne aussi souvent, d''une façon plus particulière, le monde de l''homme comme totalité radicalement fermée et hostile à Dieu (7.7 ; 9.39 ; 12.31,35s ; 14.17 ; 15.19 ; 16.8ss,20,33 ; 17.14,16 ; 18.36 ; 1Jn 2.9s,15ss ; 3.13 ; 5.19). –  venu à l''existence ou advenu , v. 3n. –  connue ou reconnue 14.17 ; 16.3 ; 17.25 ; cf. 1Co 2.8 ; 1Jn 3.1n.'
  - type: text
    content: Elle était dans le monde,
  - type: text
    content: et le monde est venu à l'existence par elle,
  - type: text
    content: mais le monde ne l'a jamais connue.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'chez elle  : litt. à ce qui était sien (même tournure en 19.27, chez lui ). –  les siens  : cf. 13.2. –  pas accueillie v. 5n (un verbe apparenté est traduit par recevoir au v. 12) ; cf. 3.11 ; 5.43 ; voir aussi 4.44 ; 12.37 ; 1 Hénoch 42.1s : « La Sagesse n''a pas trouvé de lieu où demeurer. Sa demeure était dans les cieux ; la Sagesse l''a quittée afin d''habiter parmi les humains, mais elle n''a pas trouvé de demeure… »'
  - type: text
    content: Elle est venue chez elle,
  - type: text
    content: et les siens ne l'ont pas accueillie ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'reçue v. 11n  ; cf. 3.32s. –  le pouvoir de devenir (v. 3n) : autre traduction le droit de devenir…  ; le terme traduit par pouvoir revient en 5.27 ; 10.17s ; 17.2 ; 19.10s ; il est rendu par autorité en Mc 1.22n  ; cf. 2.24n  ; 1Co 8.9n. –  enfants de Dieu 11.52 ; cf. Ep 1.5 ; 1Jn 3.1s,10 ; 5.2,4. –  ceux qui mettent leur foi (ou qui croient , v. 7n) en son nom 2.23 ; 3.18 ; 17.11s ; 20.31 ; 1Jn 3.23 ; 5.13 ; cf. Ga 3.26.'
  - type: text
    content: mais à tous ceux qui l'ont reçue,
  - type: text
    content: elle a donné le pouvoir
  - type: text
    content: de devenir enfants de Dieu
  - type: text
    content: '— à ceux qui mettent leur foi en son nom. '
  '13':
  - type: note
    content: 'sont nés ou ont été engendrés 3.3-8 ; cf. Mt 19.28n  ; Tt 3.5 ; Jc 1.18 ; 1P 1.23 ; 1Jn 2.29 ; 3.9 ; 4.7 ; 5.1ss,18. –  sang (au pluriel dans le texte) / chair (cf. v. 14+) : l''association de ces deux termes désigne l''homme, par opposition à Dieu, cf. Mt 16.17 ; 1Co 15.50. Cf. Sagesse 7.1s : « Je suis moi aussi (Salomon) un homme mortel, égal à tous, descendant du premier qui fut modelé de terre. Dans le ventre d''une mère, j''ai été sculpté en chair. Durant dix mois, ayant pris consistance dans le sang à partir d''une semence d''homme et du plaisir qui accompagne le sommeil. » –  d''homme  : à comprendre ici au sens de mâle.'
  - type: text
    content: Ceux-là sont nés, non pas du sang, ni d'une volonté de chair, ni d'une volonté d'homme, mais de Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'La Parole (v. 1n) est devenue (v. 3n) chair (c.-à-d. existence humaine) : cf. 3.6 ; 6.51,63 ; 8.15 ; Rm 1.3 ; 8.3 ; Ga 4.4 ; Ph 2.7 ; Col 1.22 ; 1Tm 3.16 ; Hé 2.14 ; 1Jn 4.2. –  a fait sa demeure  : litt. a dressé sa tente . Le verbe employé ici, skènoô , n''est pas celui qui sera fréquemment traduit par demeurer dans la suite de l''Evangile selon Jean ; il rappelle le mot hébreu qui désigne la demeure de Dieu parmi les Israélites, traditionnellement appelée tabernacle . Le judaïsme rabbinique utilisera un terme araméen apparenté qui ne figure pas dans la Bible, shekina , pour désigner la présence de Dieu au sein de son peuple ; cf. 2.21 ; 7.2n  ; Ex 25.8-9n  ; Lv 15.31+ ; Ez 37.27 ; Jl 4.17 ; Za 2.10 ; Lc 16.9n  ; Ap 7.15n  ; 21.3 ; Siracide 24.8 (c''est la Sagesse qui parle) : « Celui qui m''a créée a fixé ma demeure. Il m''a dit : “En Jacob établis ta demeure, en Israël reçois ton patrimoine.” » –  parmi (litt. en ) nous  : cf. 1.5,9-13. –  nous avons vu (ou contemplé, regardé  ; même verbe v. 32,38 ; 4.35 ; 6.5 ; 11.45 ; 1Jn 1.1, contempler  ; 4.12,14) sa gloire 2.11 ; 11.4,40 ; voir aussi 12.23,28,41 ; 13.31 ; 17.2-5,22s ; cf. Ex 40.34s ; 1R 8.10-13 ; Es 6.1-4 ; 60.1s ; Lc 9.32 ; 2P 1.16s. –  de Fils unique  : litt. comme d''un unique v. 18 ; 3.16+ ; le même terme grec qualifie l''esprit « unique, multiple » de la Sagesse en Sagesse 7.22. –  issu ou issue, provenant  ; l''expression pourrait aussi se rapporter à la gloire . –  pleine de  : l''adjectif renvoie probablement à la Parole , mais il pourrait aussi avoir pour antécédent la gloire ou le Fils unique (on traduirait alors il était plein de ). –  grâce  : le mot grec correspondant, très fréquent chez Paul, n''apparaît qu''ici et aux v. 16s dans Jn ; l''association grâce / vérité (v. 17 ; voir 8.32+) correspond sans doute au couple fidélité / loyauté dans l''A.T. (Ex 34.6 ; Ps 25.10n  ; 40.11 ; 85.11).'
  - type: text
    content: La Parole est devenue chair ;
  - type: text
    content: elle a fait sa demeure parmi nous,
  - type: text
    content: et nous avons vu sa gloire,
  - type: text
    content: une gloire de Fils unique issu du Père ;
  - type: text
    content: elle était pleine de grâce et de vérité.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 30. –  lui rend témoignage v. 7+. –  C''était de lui…  : autre traduction il était celui dont j''ai dit . –  qui vient derrière moi ou après moi v. 27ss ; Mt 3.11n  ; 11.3n. –  est passé  : litt. est devenu (v. 3n). –  avant moi, il était (comme au v. 1n  ; cf. 6.62) : autre traduction il était premier par rapport à moi.'
  - type: text
    content: 'Jean lui rend témoignage, il s''est écrié : C''était de lui que j''ai dit : Celui qui vient derrière moi est passé devant moi, car, avant moi, il était.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sa plénitude  : cf. v. 14 ; 3.34, Col 1.19 ; 2.9s. –  grâce pour grâce  : autre traduction grâce sur grâce , litt. grâce contre grâce  ; on a vu dans cette expression une allusion au remplacement de la fidélité / loyauté associée à la loi (v. 14n,17) par la grâce / vérité de la foi chrétienne ; cf. Rm 1.17 ; 2Co 3.18 ; voir aussi Hé 1.1.'
  - type: text
    content: Nous, en effet, de sa plénitude
  - type: text
    content: nous avons tous reçu,
  - type: text
    content: et grâce pour grâce ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'la loi  : cf. Rm 6.14 ; 10.4. –  par Moïse 5.45+ ; Ex 31.18 ; 34.28. –  grâce / vérité v. 14n. –  venues v. 3n.'
  - type: text
    content: car la loi a été donnée par Moïse, la grâce et la vérité sont venues par Jésus-Christ.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Personne n''a jamais vu Dieu 5.37 ; 6.46 ; 14.8s ; 1Jn 4.12 ; cf. Ex 33.18ss ; Dt 4.12 ; Ps 97.2 ; 1Tm 1.17+ ; 6.16. –  annoncé  : autres traductions révélé ; fait comprendre ; raconté  ; ou encore, selon l''étymologie, qui a conduit (à Dieu ?) . Le verbe grec a donné notre mot exégèse  ; il pouvait s''appliquer aux oracles des divinités ; ailleurs dans le N.T. il a le sens de raconter (Lc 24.35 ; Ac 10.8 ; 15.12,14 ; 21.19). –  le Dieu (v. 1n) Fils unique ou un Fils unique, (lui-même) Dieu  ; certains mss portent seulement le Fils unique , cf. v. 14 ; 3.16+,18 ; voir aussi Mt 11.27/ / ; 1Jn 5.20. –  sur le sein  : cf. 13.23n  ; autre traduction tourné vers le sein (tournure différente de celle qui est employée aux v. 1ns) ; cf. 6.46n.'
  - type: text
    content: Personne n'a jamais vu Dieu ; celui qui l'a annoncé, c'est le Dieu Fils unique qui est sur le sein du Père.
  - type: heading
    content: Ce que Jean le Baptiseur dit de lui-même
  - type: heading
    content: Cf. Mt 3.1-6,11-12  ; Mc 1.2-8  ; Lc 3.1-6,15-18
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 3.1-3/ /. –  témoignage v. 7+. –  les Juifs  : dans Jn, le terme désigne souvent les autorités religieuses de Judée qui se sont opposées à Jésus ; l''usage de ce mot reflète sans doute les conflits entre juifs et chrétiens à l''époque de la rédaction de l''évangile (voir l''introduction à l''Evangile selon Jean♦) ; cf. 2.18 ; 5.10-18 ; 7.1,13 ; 9.22 etc. ; voir aussi Jr 32.12n. –  lui envoyèrent  : litt. envoyèrent vers lui (cf. v. 1n) ; certains mss portent seulement envoyèrent . –  de Jérusalem  : cf. Mt 15.1/ /. – Voir prêtres et lévites . –  Toi, qui es-tu ? Lc 3.15s/ /.'
  - type: text
    content: 'Voici le témoignage de Jean, lorsque les Juifs lui envoyèrent de Jérusalem des prêtres et des lévites pour lui demander : Toi, qui es-tu ? '
  '2':
  - type: text
    content: Elle était au commencement auprès de Dieu.
  '20':
  - type: note
    content: '3.28 ; Ac 13.25. –  Il le reconnut…  : autre traduction il déclara sans restriction  ; le verbe traduit ici par reconnaître (ou déclarer  ; de même en 9.22 ; 12.42, reconnaître publiquement) est traditionnellement rendu par confesser  ; cf. Mt 10.32n  ; 1Jn 1.9n. –  nia  : le même verbe (aussi 18.25,27) est traduit par renier en 13.38 ; cf. 1Jn 2.22n.'
  - type: text
    content: 'Il le reconnut, il ne le nia pas, il reconnut : Moi, je ne suis pas le Christ. '
  '21':
  - type: note
    content: 'Toi…  : certains mss portent seulement es-tu Elie ? –  Elie  : cf. Ml 3.23 ; Mt 11.14 ; 17.10-13. –  le Prophète 4.19 ; 6.14 ; 7.40 ; 9.17 ; cf. Dt 18.15 ; Mt 21.11 ; Ac 3.22 ; 7.37 ; cf. Règle de la Communauté (Qumrân) 9.11 : « Jusqu''à la venue du Prophète et des Oints (= Messies, voir onction) d''Aaron et d''Israël. »'
  - type: text
    content: 'Ils lui demandèrent : Alors quoi ? Toi, es-tu Elie ? Il dit : Je ne le suis pas. – Est-ce toi qui es le Prophète ? Il répondit : Non. '
  '22':
  - type: note
    content: Cf. 8.13.
  - type: text
    content: 'Ils lui dirent alors : Qui es-tu ? – que nous puissions donner une réponse à ceux qui nous ont envoyés ! Que dis-tu de toi-même ? '
  '23':
  - type: note
    content: 'celui  : litt. la voix de celui…, Es 40.3  ; Mt 3.3/ /. –  Rendez droit  : autre traduction aplanissez.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'Moi, je suis '
  - type: text
    content: 'celui qui crie dans le désert :'
  - type: text
    content: Rendez droit le chemin du Seigneur,
  - type: text
    content: comme a dit le prophète Esaïe.
  - type: heading
    content: Cf. Mt 3.11-12  ; Mc 1.7-8  ; Lc 3.15-18
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mt 3.7-11/ /. Autres traductions Ils avaient été envoyés de chez les pharisiens, (25) et ils lui demandèrent… ; des pharisiens avaient été envoyés…  ; ou, d'après certains mss, ceux qui avaient été envoyés étaient des pharisiens . Sur les pharisiens , cf. 4.1 ; 7.32 ; 8.13 ; 9.16 ; 11.46,57 ; 12.42.
  - type: text
    content: 'Ceux qui avaient été envoyés de chez les pharisiens '
  '25':
  - type: text
    content: 'lui demandèrent : Pourquoi donc baptises-tu, si, toi, tu n''es ni le Christ, ni Elie, ni le Prophète ? '
  '26':
  - type: note
    content: 'je baptise dans l''eau Ac 1.5 ; 19.1-7 ; cf. 1Jn 5.6. –  au milieu de vous  : cf. Lc 17.21n. –  que vous ne connaissez pas  : cf. v. 31,33 ; 7.27 ; 8.19.'
  - type: text
    content: 'Jean leur répondit : Moi, je baptise dans l''eau ; au milieu de vous, il en est un que vous ne connaissez pas '
  '27':
  - type: note
    content: qui vient derrière moi ou après moi, v. 15 ; cf. Mt 3.11n/ / ; Ac 13.25.
  - type: text
    content: et qui vient derrière moi ; moi, je ne suis pas digne de délier la lanière de sa sandale.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Béthanie, de l''autre côté (c.-à-d. à l''est) du Jourdain (cf. 3.26 ; 10.40) ou en Transjordanie  : à distinguer du village proche de Jérusalem qui porte le même nom (11.1n,18) ; quelques mss portent Bétharaba ou Béthabara (cf. Jg 7.24).'
  - type: text
    content: Cela se passait à Béthanie, de l'autre côté du Jourdain, là où Jean baptisait.
  - type: heading
    content: Ce que Jean le Baptiseur dit de Jésus
  - type: heading
    content: Cf. Mt 3.13-17  ; Mc 1.9-11  ; Lc 3.21-22
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 3.13-17/ /. –  Le lendemain cf. v. 35,43 ; 2.1. –  à lui ou vers lui (v. 1n). –  Voici (cf. 19.5) l''agneau de Dieu 1.36 : derrière cette métaphore on a pu voir le symbolisme de l''agneau pascal (cf. 19.36 ; Ex 12 ; 1Co 5.7), le récit du sacrifice d''Abraham (Gn 22.8,13), la description du serviteur souffrant d''Esaïe (Es 53.7 ; cf. Jr 11.19 ; Ac 8.32 ; selon certains, le mot agneau pourrait même résulter d''une méprise sur un terme araméen signifiant serviteur , mais cela ne correspond pas au vocabulaire d''Es 53), ou encore l''agneau ou bélier des apocalypses juives (notamment 1 Hénoch 89–90), instrument puissant du jugement de Dieu (cf. Ap 5.6n  ; 17.14 [autre terme grec]) ; voir aussi 1P 1.18s ; 2.24. –  qui enlève le péché  : le même verbe (également en 2.16 ; 10.18 ; 11.39,41,48 ; 15.2 ; 16.22 ; 17.15 ; 19.15n,31,38 ; 20.1s,13,15) signifie aussi porter ou prendre (5.8-12) ; cf. Mt 8.17 ; 1P 2.24 ; 1Jn 3.5. –  du monde  : cf. v. 10n  ; 4.42.'
  - type: text
    content: 'Le lendemain, il voit Jésus venir à lui et dit : Voici l''agneau de Dieu, qui enlève le péché du monde. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'est venu à l''existence  : le verbe grec correspondant signifie souvent être (autres traductions survenir v. 6 ; devenir v. 12,14, venir v. 17 ; cf. v. 15n), mais ce n''est pas le même que celui des v. 1s ; il s''applique à l''apparition des choses créées dans Gn 1 (LXX), par exemple pour il y eut de la lumière (v. 3), il y eut un soir (v. 5 ; de même en Jn 1.6n), il en fut ainsi (v. 9) ; autre traduction Tout est apparu (ou advenu ) par elle, et rien n''est apparu (ou advenu ) sans elle (ou hors d''elle ) ; cf. 5.20n  ; 15.5 ; 17.24 ; Ps 33.6 ; Pr 8.23-30 ; 1Co 8.6 ; Col 1.16s ; Hé 1.2 ; Ap 3.14. –  Ce qui est venu…  : autre traduction possible, en déplaçant la coupure de la phrase  : rien de ce qui est venu à l''existence n''est venu à l''existence sans elle. (4) En elle était la vie…'
  - type: text
    content: Tout est venu à l'existence par elle,
  - type: text
    content: et rien n'est venu à l'existence sans elle.
  - type: text
    content: 'Ce qui est venu à l''existence '
  '30':
  - type: note
    content: V. 15n,27.
  - type: text
    content: 'C''est à son sujet que, moi, j''ai dit : Derrière moi vient un homme qui est passé devant moi, car, avant moi, il était ; '
  '31':
  - type: note
    content: 'baptiser v. 26+,33. –  qu''il se manifeste  : litt. qu''il soit manifesté 2.11 ; 3.21 ; 7.4,10 ; 9.3 ; 17.6 ; 21.1,14 ; verbe apparenté en 14.21s.'
  - type: text
    content: moi-même, je ne le connaissais pas ; mais si je suis venu baptiser dans l'eau, c'est pour qu'il se manifeste à Israël.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai vu v. 14n. – Voir Esprit . –  demeurer (verbe fréquent chez Jn, v. 38s ; 2.12 ; 3.36 etc. ; cf. 14.10,17,25 etc.) sur lui  : cf. Es 11.2+.'
  - type: text
    content: 'Jean rendit ce témoignage : J''ai vu l''Esprit descendre du ciel comme une colombe et demeurer sur lui ; '
  '33':
  - type: note
    content: V. 31.
  - type: text
    content: 'moi-même, je ne le connaissais pas ; c''est celui qui m''a envoyé baptiser dans l''eau qui m''a dit : Celui sur qui tu verras l''Esprit descendre et demeurer, c''est lui qui baptise dans l''Esprit saint. '
  '34':
  - type: note
    content: 'le Fils  : cf. v. 14,49 ; 3.16+ ; 5.17-20 ; 10.36 ; Mt 3.17/ / ; 16.16+ ; 17.5/ / ; Mc 1.1 ; Ac 9.20 ; 1Jn 4.15 ; 5.5 ; Ap 2.18 ; quelques mss ajoutent celui qu''il a choisi, cf. Lc 9.35 ; 23.35 ; Es 42.1.'
  - type: text
    content: Moi-même, j'ai vu et j'ai témoigné que c'est lui le Fils de Dieu.
  - type: heading
    content: Les premiers disciples de Jésus
  - type: heading
    content: Cf. Mt 4.18-22  ; Mc 1.16-20  ; Lc 5.1-11
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 4.18-22/ /.
  - type: text
    content: 'Le lendemain, Jean était de nouveau là, avec deux de ses disciples ; '
  '36':
  - type: note
    content: 'qui passait  : litt. qui marchait. –  l''agneau de Dieu v. 29+.'
  - type: text
    content: 'il regarda Jésus qui passait et dit : Voici l''agneau de Dieu. '
  '37':
  - type: note
    content: Cf. v. 40.
  - type: text
    content: 'Les deux disciples entendirent ces paroles et suivirent Jésus. '
  '38':
  - type: note
    content: 'Jésus se retourna  : cf. Mt 9.22/ /. –  Que cherchez-vous ? cf. 4.23,27 ; 5.44 ; 6.24,26 ; 7.11,18ss,34ss ; 8.21 ; 11.56 ; 13.33 ; 16.19n  ; 18.4ss ; 20.15. Evangile selon Thomas 24 : « Ses disciples dirent : “Montre-nous le lieu où tu es, parce qu''il est nécessaire pour nous de le chercher.” Il leur répondit : “Celui qui a des oreilles, qu''il entende ! Il y a de la lumière dans un homme de lumière, et il illumine le monde entier ; s''il n''illumine pas, c''est l''obscurité.” » –  Rabbi / Maître 3.2,10 ; 8.4 ; 11.28 ; 13.13s ; 20.16 ; Mt 23.7ns ; Mc 9.5n.'
  - type: text
    content: 'Jésus se retourna, vit qu''ils le suivaient et leur dit : Que cherchez-vous ? Ils lui dirent : '
  - type: text
    content: Rabbi
  - type: text
    content: '  – ce qui se traduit : Maître – où demeures-tu ? '
  '39':
  - type: note
    content: 'Venez…  : cf. v. 46 ; 11.34 ; 2R 6.13 ; 10.16. –  auprès de lui  : la formule correspondante (aussi 4.40 ; 8.38 ; 14.17,23,25 ; 17.5 ; 19.35) est différente de celle qui est employée aux v. 1ns ; autre traduction chez lui. –  la dixième heure  : entre trois et quatre heures de l''après-midi (cf. Mt 20.1-16).'
  - type: text
    content: 'Il leur dit : Venez et vous verrez. Ils vinrent et virent où il demeurait ; ils demeurèrent auprès de lui ce jour-là. C''était environ la dixième heure.'
  '4':
  - type: note
    content: 'en elle était vie  : autre traduction était vie en elle (voir aussi v. 3n). –  la vie 3.15+ ; 5.26 ; 6.57 ; 10.10 ; 11.25s ; 14.6 ; 1Jn 1.1s ; 4.9 ; Ap 1.18. –  lumière 8.12+.'
  - type: text
    content: en elle était vie,
  - type: text
    content: et la vie était la lumière des humains.
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'André v. 44 ; 6.8 ; 12.22. –  qui avaient suivi Jésus  : litt. qui l''avaient suivi.'
  - type: text
    content: 'André, frère de Simon Pierre, était l''un des deux qui avaient entendu Jean et qui avaient suivi Jésus. '
  '41':
  - type: note
    content: 'Il trouve d''abord  : autre traduction, d''après certains mss  : le premier, il trouva… –  le Messie (transcription du mot hébreu ou araméen) / le Christ (traduction en grec), c.-à-d. l''Oint, terme qui désignait traditionnellement le roi ou le grand prêtre (4.25 ; Lc 4.41+ ; cf. Lv 4.3n  ; Ps 2.2) ; voir onction.'
  - type: text
    content: 'Il trouve d''abord son propre frère, Simon, et il lui dit : Nous avons trouvé le Messie – ce qui se traduit : le Christ. '
  '42':
  - type: note
    content: 'Toi, tu es…  : cf. v. 48 ; 2.25 ; 4.16-19 ; 10.3. –  Simon, fils de Jean (ou de Jonas, selon certains mss) : cf. 21.15-17 ; Mt 16.17. –  eh bien…  : litt. toi, tu seras appelé… –  Céphas (d''après l''araméen, 1Co 1.12) / Pierre (d''après le grec) : cf. Mt 16.16-18 ; Mc 3.16 ; Lc 6.14 ; voir aussi Gn 17.5n.'
  - type: text
    content: 'Il le conduisit vers Jésus. Jésus le regarda et dit : Toi, tu es Simon, fils de Jean ; eh bien, tu seras appelé Céphas – ce qui se traduit : Pierre.'
  - type: heading
    content: Jésus appelle Philippe et Nathanaël
  '43':
  - type: text
    content: ' '
  - type: note
    content: se rendre en (litt. sortir vers la ) Galilée 2.1 ; 4.3,43,54 ; 7.1,9. –  Philippe 6.5,7 ; 14.8s ; Mt 10.3+. –  Suis-moi 21.19,22 ; cf. 1R 19.19 ; Mt 8.22/ / ; 9.9.
  - type: text
    content: 'Le lendemain, il voulut se rendre en Galilée, et il trouve Philippe. Jésus lui dit : Suis-moi. '
  '44':
  - type: note
    content: 'Bethsaïda  : village de Galilée, sur la rive nord du lac de Tibériade 12.21 ; Mt 11.21.'
  - type: text
    content: Philippe était de Bethsaïda, la ville d'André et de Pierre.
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'Nathanaël 21.2. –  au sujet duquel ont écrit…  : cf. 5.39,46 ; Dt 18.18 ; Es 9.6 ; Ez 34.23 ; Lc 24.27 ; Ac 26.22. –  Loi / prophètes Mt 5.17n. –  fils de Joseph Lc 3.23+.'
  - type: text
    content: 'Philippe trouve Nathanaël et lui dit : Celui au sujet duquel ont écrit Moïse, dans la Loi, et les prophètes, nous l''avons trouvé : c''est Jésus de Nazareth, fils de Joseph. '
  '46':
  - type: note
    content: 'Cf. 7.41,52. –  Viens voir  : litt. viens et vois  ; v. 39+.'
  - type: text
    content: 'Nathanaël lui dit : Quelque chose de bon peut-il venir de Nazareth ? Philippe lui dit : Viens voir.'
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. So 3.13 ; Ps 32.2 ; 73.1 ; voir aussi Gn 25.27 ; 32.29. –  véritable  : autre traduction voici vraiment (cf. 4.42 ; 6.14 ; 7.26,40 ; 8.31 ; 17.8) un Israélite…'
  - type: text
    content: 'Jésus vit Nathanaël venir à lui, et il dit de lui : Voici un véritable Israélite, en qui il n''y a pas de ruse. '
  '48':
  - type: note
    content: Cf. 2.24s. Dans le judaïsme rabbinique, le figuier est souvent associé à l'étude et à l'enseignement de la loi ; cf. Mc 11.20-26/ / ; 13.28-32/ / ; voir aussi Mi 4.4 ; Za 3.10.
  - type: text
    content: 'Nathanaël lui dit : D''où me connais-tu ? Jésus lui répondit : Avant que Philippe t''appelle, quand tu étais sous le figuier, je t''ai vu. '
  '49':
  - type: note
    content: 'c''est toi…  : cf. 6.69 ; 11.27. –  Fils de Dieu (v. 34) / roi d''Israël (6.15+) : cf. 2S 7.14 ; So 3.15 ; Ps 2.7n  ; Mt 16.16+ ; 27.42/ /.'
  - type: text
    content: 'Nathanaël reprit : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' c''est toi qui es le Fils de Dieu, c''est toi qui es le roi d''Israël. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'lumière / ténèbres 3.19 ; 12.35s ; 1Jn 2.8 ; voir Qumrân. –  la saisir  : le verbe grec, apparenté à ceux qui sont traduits par recevoir aux v. 11s (le même verbe est traduit par surprendre en 12.35 ; cf. 6.17n  ; 8.3s ; Ph 3.12s ; 1Th 5.4), peut être pris soit au sens de comprendre (Ac 4.13 ; 10.34 ; 25.25 ; Ep 3.18 ; cf. Rm 1.19-23 ; 1Co 1.21), soit au sens de se rendre maître de  ; cf. Jn 3.19 ; 7.34 ; 8.21 ; Sagesse 7.30 : « La nuit succède à la lumière, mais le mal ne prévaut pas sur la Sagesse. »'
  - type: text
    content: La lumière brille dans les ténèbres,
  - type: text
    content: et les ténèbres n'ont pas pu la saisir.
  '50':
  - type: note
    content: 'tu crois  : cf. v. 7n  ; 20.29. –  plus grandes encore  : litt. plus grandes que celles-ci 5.20 ; 14.12.'
  - type: text
    content: 'Jésus lui répondit : Parce que je t''ai dit que je t''ai vu sous le figuier, tu crois ? Tu verras des choses plus grandes encore ! '
  '51':
  - type: note
    content: 'Amen, amen  : sur ce terme, transcrit de l''hébreu ou de l''araméen dans le texte grec, voir Dt 27.15n  ; Mt 5.18n  ; 2Co 1.19s. Jn se caractérise par une répétition systématique du mot (3.3,5,11 ; 5.19,24s etc. ; cf. Ps 41.14n). –  vous verrez  : certains mss portent désormais vous verrez  ; cf. Mt 26.64/ /. –  le ciel ouvert Mt 3.16+/ / ; Ac 7.56 ; cf. Es 63.19. –  les anges…  : cf. 12.28s ; 20.12 ; Lc 2.8-14 ; Gn 28.12n. –  le Fils de l''homme 3.13s ; 5.27 ; 6.27,53,62 ; 8.28 ; 9.35 ; 12.23 ; 13.31 ; cf. Dn 7.9+ ; Mt 8.20+.'
  - type: text
    content: 'Et il lui dit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, vous verrez '
  - type: text
    content: le ciel
  - type: text
    content: ' ouvert, '
  - type: text
    content: et les anges de Dieu monter et descendre
  - type: text
    content: ' sur le Fils de l''homme.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Survint v. 3n  ; cf. Mc 1.4. –  envoyé v. 33 ; 3.28. –  Jean le Baptiseur v. 19-35 ; 3.23-30 ; 5.35 ; 10.41 ; cf. Mt 3.1/ / ; Lc 1.13,17,76.
  - type: text
    content: 'Survint un homme, envoyé de Dieu, du nom de Jean. '
  '7':
  - type: note
    content: 'V. 15,19-34 ; 3.26-30 ; 5.33 ; 10.41 ; cf. Ac 19.4. –  pour et afin traduisent la même préposition grecque ; de même, souvent, dans la suite. –  croient  : le même verbe, dans une construction caractéristique, est aussi traduit par l''expression mettre sa foi en (p. ex. v. 12) ; l''Evangile selon Jean n''emploie jamais le substantif correspondant habituellement à foi, toujours le verbe qui signifie croire ou avoir foi, mettre sa foi en (quelqu''un ou quelque chose).'
  - type: text
    content: 'Il vint comme témoin, pour rendre témoignage à la lumière, afin que tous croient par lui. '
  '8':
  - type: note
    content: 'Cf. v. 20 ; 5.35. –  il venait  : sous-entendu dans le texte.'
  - type: text
    content: Ce n'est pas lui qui était la lumière ; il venait rendre témoignage à la lumière.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'La Parole  : sous-entendu dans le texte ; autres traductions  : la vraie (6.32 ; 15.1) lumière (8.12+ ; 1Jn 2.8) , qui éclaire tout être humain, venait dans le monde (v. 10n) ; c''était la vraie lumière, celle qui éclaire tout être humain qui vient au monde ou qui, en venant dans le monde, éclaire tout être humain  ; cf. 3.19 ; 6.14 ; 9.39 ; 11.27 ; 12.46 ; 16.28 ; 18.37 ; Mt 11.3n  ; Evangile selon Thomas 50 : « Jésus a dit : “S''ils vous disent : ‘D''où êtes-vous issus ?’, répondez-leur : ‘Nous sommes venus de la lumière, du lieu où la lumière est issue d''elle-même ; elle s''est dressée et se manifeste dans l''image des hommes.’” »'
  - type: text
    content: La Parole était la vraie lumière, celle qui éclaire tout humain ; elle venait dans le monde.
