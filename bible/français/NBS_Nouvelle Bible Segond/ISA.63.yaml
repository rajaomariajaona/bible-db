document_id: ISA.63,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur venge son peuple
  - type: text
    content: ' '
  - type: note
    content: 'Le début du chapitre se présente comme un dialogue entre le prophète (ou les gardes de 62.6) et Dieu. –  Edom 34.5+. –  Botsra 34.6n. –  qui ai le pouvoir de sauver  : litt. grand pour sauver. Des versions anciennes ont lu qui dispute (ou qui combat ) pour sauver , ce qui représente une différence d''une voyelle en hébreu ; cf. 49.25n.'
  - type: text
    content: Qui est celui-ci qui vient d'Edom,
  - type: text
    content: de Botsra, en vêtements de couleur vive,
  - type: text
    content: en habits éclatants,
  - type: text
    content: et se redressant avec fierté
  - type: text
    content: dans la plénitude de sa force ?
  - type: text
    content: – C'est moi, qui parle avec justice,
  - type: text
    content: qui ai le pouvoir de sauver.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'rebelles Nb 20.10. –  attristé son souffle (ou son Esprit ) sacré (ou saint ). On pourrait aussi comprendre l''Esprit de sa sainteté  ; cf. Ep 4.30. –  il les a lui-même combattus  : autre traduction il leur a lui-même fait la guerre.'
  - type: text
    content: Mais ils ont été rebelles,
  - type: text
    content: ils ont attristé son souffle sacré.
  - type: text
    content: Alors il s'est changé à leur égard en ennemi ;
  - type: text
    content: il les a lui-même combattus.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'les bergers  : LXX a lu le singulier et une tournure un peu différente pour traduire  : celui qui a fait monter… le berger des brebis  ; cf. Hé 13.20 ; voir aussi Nb 27.15-20 ; Ps 77.21. –  en eux  : litt. en son sein . –  son souffle sacré v. 10n  ; cf. 11.2+ ; Nb 11.17.'
  - type: text
    content: 'Alors son peuple se souvint des jours d''autrefois, des jours de Moïse :'
  - type: text
    content: Où est celui qui les a fait monter de la mer,
  - type: text
    content: avec les bergers de son troupeau ?
  - type: text
    content: Où est celui qui mettait en eux son souffle sacré ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'son bras splendide  : litt. le bras de sa splendeur  ; cf. v. 14s ; 40.10+. –  fendait les eaux Ex 14.16. –  un nom  : cf. v. 14 ; 55.13 ; Jr 32.20 ; Dn 9.15 ; Né 9.10.'
  - type: text
    content: Celui qui, à la droite de Moïse,
  - type: text
    content: avançait son bras splendide,
  - type: text
    content: qui fendait les eaux devant eux,
  - type: text
    content: afin de se faire un nom pour toujours ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: abîmes 51.10.
  - type: text
    content: qui les faisait avancer à travers les abîmes,
  - type: text
    content: comme un cheval dans le désert,
  - type: text
    content: sans qu'ils trébuchent.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'vallée  : le mot hébreu est dérivé du verbe traduit par fendre au v. 12. –  tu as conduit… Ps 77.21. –  un nom splendide v. 12n.'
  - type: text
    content: Comme la bête qui descend dans la vallée,
  - type: text
    content: 'le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a menés au repos.'
  - type: text
    content: C'est ainsi que tu as conduit ton peuple
  - type: text
    content: pour te faire un nom splendide.
  - type: heading
    content: 'Prière : Si tu déchirais le ciel'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Regarde du ciel, et vois Ps 80.15. –  ta résidence sacrée et splendide  : litt. la résidence (même terme en 1R 8.13/ / ; Ps 49.15) de ta sainteté et de ta splendeur  ; cf. 64.10. –  passion jalouse 59.17+. –  ta vaillance  : d''après un ms de Qumrân  ; le texte hébreu traditionnel a le pluriel, qu''il faudrait traduire tes hauts faits (Ps 20.7 ; 71.16 ; 145.4,12 ; 150.2). Le mot est de la même famille que puissant en 9.5n. –  le frémissement de tes entrailles… description d''une vive émotion, souvent associée à la notion de compassion  ; cf. v. 7 ; Jr 31.20. –  se refuse à moi  : litt. se contiennent envers moi , même verbe en 42.14 ; 64.11n.'
  - type: text
    content: Regarde du ciel, et vois
  - type: text
    content: 'de ta résidence sacrée et splendide :'
  - type: text
    content: où sont ta passion jalouse et ta vaillance ?
  - type: text
    content: Ta compassion, le frémissement de tes entrailles,
  - type: text
    content: tout cela se refuse à moi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Pourtant  : autre traduction car . –  notre Père v. 8+ ; Dt 32.6 ; Mt 6.9/ / ; 23.9. –  Abraham / Israël (= Jacob) 41.8 ; 51.2. –  distingués  : litt. connus  ; cf. Ex 33.12 ; Jr 1.5+. –  depuis toujours…  : cf. 41.14n.'
  - type: text
    content: 'Pourtant c''est toi qui es notre Père :'
  - type: text
    content: ce n'est pas Abraham qui nous a distingués,
  - type: text
    content: ce n'est pas Israël qui nous a reconnus ;
  - type: text
    content: 'c''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui es notre Père.'
  - type: text
    content: « Notre Rédempteur », tel est ton nom depuis toujours.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi Ha 1.3,13. –  tes voies 64.4. –  nous fais-tu refuser…  : litt. endurcis-tu notre cœur contre la crainte de toi  ; même verbe hébreu en Jb 39.16 ; cf. Ex 4.21+. –  Reviens Ps 80.15 ; 90.13. –  les tribus…  : litt. les tribus de ton patrimoine 47.6+.'
  - type: text
    content: 'Pourquoi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous fais-tu errer loin de tes voies ?'
  - type: text
    content: Pourquoi nous fais-tu refuser obstinément de te craindre ?
  - type: text
    content: Reviens, à cause de nous, tes serviteurs,
  - type: text
    content: pour les tribus qui constituent ton patrimoine !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ton peuple saint ou sacré (cf. v. 10s,15). –  du pays  : sous-entendu dans le texte. –  foulé ton sanctuaire  : 64.10 ; cf. Lc 21.24.'
  - type: text
    content: Ton peuple saint n'a pris possession du pays que pour peu de temps ;
  - type: text
    content: nos ennemis ont foulé ton sanctuaire.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ceux que tu ne gouvernes pas  : autre traduction ceux sur qui tu ne domines pas . –  sur qui ton nom…  : cf. Dt 28.10 ; Jr 14.9. –  Si seulement…  : certaines éditions font commencer ici le chapitre 64, qui comporte de ce fait un verset de plus. –  tu déchirais le ciel  : cf. 40.22 ; voir aussi Mt 3.16/ / ; 27.51/ /. –  montagnes 54.10+. –  crouleraient  : cf. 64.2 ; Jg 5.5n.'
  - type: text
    content: Nous sommes depuis toujours
  - type: text
    content: comme ceux que tu ne gouvernes pas,
  - type: text
    content: sur qui ton nom n'est pas proclamé…
  - type: text
    content: Si seulement tu déchirais le ciel,
  - type: text
    content: si tu descendais,
  - type: text
    content: les montagnes crouleraient devant toi ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'habits… rouges (hébreu ’adom  ; le texte joue sur le nom d''Edom) : cf. Ap 19.13. –  pressoir  : image du jugement divin ; cf. Jr 25.30 ; Jl 4.13 ; Lm 1.15 ; Ap 14.19s ; 19.12-15.'
  - type: text
    content: – Pourquoi tes habits sont-ils rouges
  - type: text
    content: et tes vêtements comme les vêtements de celui qui foule au pressoir ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'cuve  : cf. Ag 2.16n. –  aucun homme 41.28+. –  aspergés  : cf. 52.15n où le même verbe est traduit purifier par l''aspersion. –  leur sang  : litt. leur jus , cf. v. 6n. –  j''ai taché  : la racine de ce verbe est identique à celle d''où vient le mot rédemption au v. 4.'
  - type: text
    content: – J'ai été seul à fouler à la cuve,
  - type: text
    content: et aucun homme d'entre tous les peuples n'était avec moi ;
  - type: text
    content: je les ai foulés aux pieds dans ma colère,
  - type: text
    content: je les ai écrasés dans ma fureur ;
  - type: text
    content: mes vêtements ont été aspergés de leur sang,
  - type: text
    content: j'ai taché tous mes habits.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'je songeais  : litt. (était) dans mon cœur  ; cf. 10.7n. –  jour de vengeance 61.2 ; cf. 34.8. –  de ma rédemption ou de mes rédimés , cf. 62.12 ; compte tenu de la diversité des sens de cette famille de mots (voir 41.14n) on pourrait aussi traduire de mes représailles (autre terme qu''en 34.8).'
  - type: text
    content: Car je songeais à un jour de vengeance,
  - type: text
    content: et l'année de ma rédemption est venue.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'personne v. 3. –  soutenir et appui correspondent à deux formes du même verbe hébreu. –  mon bras (40.10+) m''a assuré la victoire…  : cf. 59.16n.'
  - type: text
    content: Je regardais,
  - type: text
    content: et personne pour m'aider ;
  - type: text
    content: j'étais atterré,
  - type: text
    content: et personne pour me soutenir.
  - type: text
    content: Alors mon bras m'a assuré la victoire,
  - type: text
    content: ma fureur m'a servi d'appui.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'rendus ivres 49.26+. –  sang  : même mot qu''au v. 3n  ; certains lui donnent ici le sens d''un homonyme, habituellement traduit par majesté ou éternité.'
  - type: text
    content: J'ai foulé des peuples dans ma colère,
  - type: text
    content: je les ai rendus ivres dans ma fureur
  - type: text
    content: et j'ai répandu leur sang sur la terre.
  - type: heading
    content: Rappel des bienfaits du Seigneur
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ce que le Seigneur a fait dans sa fidélité  : litt. les fidélités de YHWH  ; cf. Ps 89.2. –  ses actes dignes de louange  : litt. les louanges de YHWH . –  le bien… Ps 13.6. –  sa compassion et sa grande fidélité ou, plus littéralement, ses compassions et ses grandes fidélités (cf. le début du v.).'
  - type: text
    content: 'J''évoquerai ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait dans sa fidélité,'
  - type: text
    content: ses actes dignes de louange,
  - type: text
    content: 'à cause de tout le bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a fait,'
  - type: text
    content: de sa grande bonté envers la maison d'Israël,
  - type: text
    content: du bien qu'il leur a fait
  - type: text
    content: selon sa compassion
  - type: text
    content: et sa grande fidélité.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'peuple / fils  : cf. v. 16 ; 64.7 ; Ex 4.22s ; 5.1 ; Dt 14.1s ; Jr 3.14,19,22 ; 31.9,20 ; Os 1.9 ; 2.1 ; 11.1 ; Sagesse 18.13 : « Ils (les Egyptiens) reconnurent… que ce peuple était fils de Dieu. » –  qui ne mentent pas  : autres traductions qui ne trompent pas ; qui ne déçoivent pas ; qui ne trahissent pas . –  sauveur 43.3+.'
  - type: text
    content: 'Il avait dit : Vraiment ils sont mon peuple,'
  - type: text
    content: ce sont des fils qui ne mentent pas !
  - type: text
    content: Et il a été pour eux un sauveur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Dans toutes leurs détresses 1S 26.24 ; 2S 4.9 ; 1R 1.29 ; Ps 54.9. –  qui étaient pour lui…  : d''après une lecture traditionnelle ; une autre lecture traditionnelle suppose une négation, qu''on pourrait traduire  : ce ne fut pas un ennemi (mot très voisin de celui qui a été traduit par détresse ). LXX semble avoir lu le texte hébreu différemment pour traduire ce n''est pas un émissaire ni un ange (= messager ), mais le Seigneur lui-même qui les a sauvés (cf. Ex 33.2,14ns ; Lm 4.16n). –  son amour Jr 31.3 ; Os 3.1 ; 11.1 ; Ml 1.2. –  sa magnanimité  : autre traduction parce qu''il voulait les épargner  ; le même terme qualifie en Gn 19.16 l''attitude de YHWH envers Loth, qu''il veut épargner  ; cf. Ml 3.17. – Voir rédemption . –  soutenus / portés 46.3s ; Dt 1.31 ; cf. Ml 3.17.'
  - type: text
    content: Dans toutes leurs détresses
  - type: text
    content: – qui étaient pour lui une détresse –
  - type: text
    content: le messager qui est devant lui les a sauvés ;
  - type: text
    content: dans son amour et sa magnanimité,
  - type: text
    content: il a lui-même assuré leur rédemption,
  - type: text
    content: il les a soutenus et portés,
  - type: text
    content: tous les jours d'autrefois.
