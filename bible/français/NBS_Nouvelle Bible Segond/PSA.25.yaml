document_id: PSA.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Fais-moi connaître ton chemin
  - type: text
    content: ' '
  - type: note
    content: 'Ce psaume est alphabétique : les premières lettres de chaque verset correspondent aux 22 lettres de l''alphabet hébreu, avec quelques irrégularités (procédé analogue en 9.1n–10.18 ; 34 ; 37 ; 111–112 ; 119.1n  ; 145 ; Na 1.2-11 ; Pr 31.10-31 ; Lm 1–4). –  Vers toi… 86.4 ; 143.8 ; cf. Jr 22.27n  ; Lm 3.41.'
  - type: text
    content: De David.
  - type: text
    content: 'Vers toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', je m''élève. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fidélité (ou grâce, amour fidèle 17.7n  ; cf. 23.3n) et loyauté (ou vérité v. 5n  ; cf. 19.10 ; 119.43,142,151,160) : mêmes termes hébreux associés en 26.3 ; 40.11s ; 57.4,11 ; 61.8 ; 69.14 ; 85.11 ; 86.15 ; 108.5 ; 115.1 ; 117.2 ; 138.2 ; Gn 24.27,49 ; 32.11 ; 47.29 ; Ex 34.6 ; Jos 2.14 ; 2S 2.6 ; 15.20 ; Os 4.1n  ; Mi 7.20 ; Pr 3.3 ; 14.22 ; 16.6 ; 20.28 ; cf. Jn 1.14n,17. – Voir alliance. –  ses préceptes ou ses témoignages  ; cf. 19.8+.'
  - type: text
    content: 'Tous les sentiers du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont fidélité et loyauté,'
  - type: text
    content: pour ceux qui gardent son alliance et ses préceptes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'à cause de ton nom 23.3+ ; cf. 79.9. –  tu pardonneras  : cf. 103.3 ; 1R 8.50 ; voir aussi Lc 18.13.'
  - type: text
    content: 'C''est à cause de ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: que tu pardonneras ma faute, car elle est grave.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Il lui enseigne  : c.-à-d. le Seigneur lui enseigne  ; c''est du verbe correspondant que vient le mot tora (voir loi).'
  - type: text
    content: 'Quel est l''homme qui craint le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Il lui enseigne la voie à choisir.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'reposera  : litt. passera la nuit ou logera  ; cf. 3.6+ ; Jb 19.4n. –  possédera… ou prendra possession du pays (ou de la terre ) : cf. 37.9 ; 112.2 ; Gn 15.7,18 ; Es 60.21 ; Mt 5.5.'
  - type: text
    content: Il reposera dans le bonheur,
  - type: text
    content: et sa descendance possédera le pays.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les secrets  : autre traduction le conseil secret  ; même terme en 55.15 ; 64.3 ( projets secrets ) ; 83.4 ; 89.8 ; 111.1 ; Am 3.7 ; Pr 3.32 ; cf. Jn 15.15. –  qui le craignent 15.4+.'
  - type: text
    content: 'Les secrets du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont pour ceux qui le craignent,'
  - type: text
    content: pour leur faire connaître son alliance.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux… 123.1s ; 141.8s. –  tournés  : sous-entendu dans le texte. –  du filet  : cf. 9.16+ ; 18.6 ; 31.5.'
  - type: text
    content: 'Mes yeux sont constamment tournés vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car c'est lui qui fait sortir mes pieds du filet.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Tourne-toi vers moi… 86.16 ; 119.132. –  seul  : cf. 22.21n.'
  - type: text
    content: Tourne-toi vers moi et fais-moi grâce,
  - type: text
    content: car je suis seul et pauvre.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'rempli  : litt. élargi  ; certains modifient le découpage traditionnel des mots pour lire mets au large mon cœur en détresse (ou qui est à l''étroit ) ; cf. 4.2n  ; voir aussi 34.20 ; 107.6,28. –  de mon désarroi  : autre traduction de mon angoisse.'
  - type: text
    content: La détresse a rempli mon cœur ;
  - type: text
    content: fais-moi sortir de mon désarroi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Regarde… 119.153 ; Gn 31.42 ; Lm 1.9. –  pardonne…  : autres traductions enlève tous mes péchés ; charge-toi de tous mes péchés  ; cf. 32.5 ; 85.3.'
  - type: text
    content: Regarde mon affliction et ma peine,
  - type: text
    content: pardonne tous mes péchés !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'mes ennemis… 3.2+. –  ils me détestent  : cf. 35.19+ ;'
  - type: text
    content: Regarde combien mes ennemis sont nombreux,
  - type: text
    content: et avec quelle violence ils me détestent.
  '2':
  - type: note
    content: Que mes ennemis… 13.5+.
  - type: text
    content: Mon Dieu,
  - type: text
    content: 'j''ai mis ma confiance en toi : que je n''aie pas honte !'
  - type: text
    content: Que mes ennemis n'exultent pas à mon sujet !
  '20':
  - type: text
    content: ' '
  - type: note
    content: pas honte v. 2s ; 22.6+. –  c'est en toi… 7.2+.
  - type: text
    content: Garde-moi en vie et délivre-moi !
  - type: text
    content: 'Que je n''aie pas honte :'
  - type: text
    content: c'est en toi que je trouve un abri.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 40.12 ; 61.8 ; cf. 1R 9.4 ; Pr 11.3.
  - type: text
    content: Que l'intégrité et la droiture me préservent,
  - type: text
    content: car je t'espère !
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ce verset n'est pas dans l'ordre alphabétique en hébreu (v. 1n) ; cf. 34.23 ; voir aussi 54.9 ; 130.8 ; 143.11.
  - type: text
    content: O Dieu, libère Israël
  - type: text
    content: de toutes ses détresses !
  '3':
  - type: text
    content: ' '
  - type: note
    content: ceux qui t'espèrent 27.14 ; 37.34 ; 52.11 ; 104.27 ; 130.5s ; cf. 31.25+ ; Es 25.9. –  honte 22.6+.
  - type: text
    content: Aucun de ceux qui t'espèrent n'aura honte ;
  - type: text
    content: ils auront honte, ceux qui, sans raison, sont des traîtres.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'apprends-moi tes voies  : le même verbe est traduit par instruire au v. 5 ; cf. v. 9 ; voir aussi 27.11 ; 86.11 ; 119.35 ; 143.8-10.'
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi connaître tes chemins,'
  - type: text
    content: apprends-moi tes voies.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'par (ou dans ) ta loyauté (ou ta vérité ) : même terme au v. 10+ ; cf. 85.11n  ; voir aussi 26.3 ; 86.11 ; Jn 14.4-6 ; 16.13. –  le Dieu de mon salut 24.5+ ; cf. Jb 13.16n. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Fais-moi cheminer par ta loyauté et instruis-moi ;
  - type: text
    content: car tu es le Dieu de mon salut,
  - type: text
    content: je t'espère sans cesse.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ta fidélité  : litt. tes fidélités , ce qui signifie ce que tu as fait dans ta fidélité  ; cf. 17.7n  ; Es 63.7n. –  depuis toujours 103.17.'
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi de ta compassion et de ta fidélité,'
  - type: text
    content: car elles sont depuis toujours.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'des péchés de ma jeunesse  : cf. 79.8. –  révoltes ou transgressions  : cf. 32.1 ; 36.2. –  souviens-toi de moi…  : cf. 106.4.'
  - type: text
    content: Ne te souviens pas des péchés de ma jeunesse ni de mes révoltes ;
  - type: text
    content: 'souviens-toi de moi selon ta propre fidélité, à cause de ta propre bonté, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'bon 34.9 ; 52.11 ; 54.8 ; 100.5 ; 106.1 ; 107.1 ; 118.1,29 ; 119.68 ; 135.3 ; 145.9 ; Na 1.7 ; Lm 3.25. –  pécheurs  : le mot est peut-être aussi à comprendre dans son sens premier  : ceux qui manquent le chemin , c.-à-d. les égarés ; cf. Lc 6.35.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon et droit :'
  - type: text
    content: c'est pourquoi il montre aux pécheurs le chemin.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'pauvres  : cf. v. 16,18 ; voir 9.13n  ; 10.12n. –  il apprend… 1S 12.23 ; Mt 22.16.'
  - type: text
    content: Il fait cheminer les pauvres dans l'équité,
  - type: text
    content: il apprend aux pauvres sa voie.
