document_id: PHP.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Paul et Timothée 2.19ss ; Ac 16.1+. –  esclaves  : autre traduction serviteurs  : cf. 2.7 ; Rm 1.1+ ; Ga 1.10 ; Ep 6.6 ; Col 4.12 ; Jc 1.1. –  Christ  : voir onction. –  Philippes en Macédoine, voir 4.15 ; Ac 16.12n-40 ; 20.1-6 ; 1Th 2.2. –  saints… 4.21s ; Rm 1.7+ ; 15.25 ; 1Co 1.2. –  épiscopes (ou surveillants ) / ministres (ou serviteurs, diacres ) : les deux mots pourraient désigner ici une seule catégorie de responsables ; cf. Ac 11.30+ ; 20.28n  ; 1P 2.25n  ; voir aussi 1Tm 3.1nss,8nss ; Tt 1.5-7 ; 1P 5.1s.'
  - type: text
    content: 'Paul et Timothée, esclaves de Jésus-Christ, à tous ceux qui, à Philippes, sont saints en Jésus-Christ, aux épiscopes et aux ministres : '
  '10':
  - type: note
    content: 'discerner ou examiner, éprouver, voir à l''épreuve  : un terme apparenté est traduit par preuves en 2.22 ; Rm 1.28n  ; 2.18 ; 12.2+ ; 1Th 5.21 ; Hé 5.14. –  ce qui est important Rm 2.18. –  sincères ou transparents, 1Co 5.8n  ; 2Co 1.12n. –  irréprochables Ac 24.16 ; si l''on donnait au terme grec le sens actif qu''il a en 1Co 10.32, on pourrait aussi traduire et que vous ne soyez un sujet d''achoppement pour personne  ; cf. Ep 1.4 ; 1Th 3.13 ; 5.23. –  jour du Christ v. 6+.'
  - type: text
    content: 'qu''ainsi vous sachiez discerner ce qui est important, afin que vous soyez sincères et irréprochables pour le jour du Christ '
  '11':
  - type: note
    content: 'fruit de justice ou fruit de la justice  : cf. 4.17 ; Ep 5.9 ; Hé 12.11 ; Jc 3.18 ; voir aussi Pr 3.9n  ; 11.30n  ; Ga 5.22+. –  à la gloire…  : cf. 2.11 ; Ep 1.6+ ; quelques témoins ont lu et à la gloire de Dieu et à ma louange.'
  - type: text
    content: et que vous soyez remplis du fruit de justice qui vient par Jésus-Christ, à la gloire et à la louange de Dieu.
  - type: heading
    content: La progression de la bonne nouvelle
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je souhaite que vous le sachiez  : cf. Ep 6.21 ; Col 4.7. –  progrès (v. 25 ; 1Tm 4.15) de la bonne nouvelle (v. 5+) : cf. Ac 8.1,4.'
  - type: text
    content: 'Je souhaite que vous le sachiez, mes frères : ce qui m''est arrivé a plutôt contribué aux progrès de la bonne nouvelle. '
  '13':
  - type: note
    content: Litt. de sorte que mes liens sont devenus manifestes en Christ, dans tout le prétoire et partout ailleurs. Le prétoire est, en l'occurrence, ou bien le palais de l'empereur à Rome, ou bien la résidence d'un gouverneur dans une ville de province ; cf. Mt 27.27/ / ; Jn 18.28,33 ; 19.9 ; Ac 23.35.
  - type: text
    content: 'En effet, dans tout le prétoire, comme partout ailleurs, il est devenu manifeste que c''est pour le Christ que je suis prisonnier, '
  '14':
  - type: note
    content: 'ma condition de prisonnier  : litt. mes liens. –  confiance v. 6n  ; Rm 14.14+. –  dire la Parole (certains mss précisent de Dieu) sans crainte Ac 4.29+ ; 28.31 ; 1Th 2.2.'
  - type: text
    content: 'et ma condition de prisonnier a donné confiance à la plupart des frères, dans le Seigneur : ils ont d''autant plus d''audace pour dire la Parole sans crainte. '
  '15':
  - type: note
    content: 'proclament le Christ 1Co 1.23 ; 2Co 1.9 ; 11.4. –  par envie… Ga 5.20ss. –  goût des disputes  : le mot grec est très proche de celui qui est traduit par ambition personnelle au v. 17. –  dans de bonnes intentions  : le même terme est traduit par bon plaisir en 2.13.'
  - type: text
    content: 'Certains, il est vrai, proclament le Christ par envie et par goût des disputes, mais d''autres le font dans de bonnes intentions. '
  '16':
  - type: note
    content: pour la défense de la bonne nouvelle v. 7+.
  - type: text
    content: 'Ceux-ci agissent par amour, sachant que je suis là pour la défense de la bonne nouvelle, '
  '17':
  - type: note
    content: 'par ambition personnelle ou par rivalité, cf. v. 15n  ; Rm 2.8 ; 2Co 12.20 ; Ga 5.20. –  leurs intentions…  : cf. 1Th 2.5. – Voir pur, impur. –  ajouter  : le verbe peut aussi signifier réveiller, susciter, ressusciter, cf. Ac 3.15n. –  détresse Rm 5.3+ ; 2Co 1.4n. –  à ma condition de prisonnier  : litt. à mes liens, v. 7n  ; certains comprennent ici par mes liens.'
  - type: text
    content: 'tandis que ceux-là annoncent le Christ par ambition personnelle ; leurs intentions ne sont pas pures : ils s''imaginent ajouter de la détresse à ma condition de prisonnier.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 9.50. –  prétexte ou vérité  : autre traduction comme prétexte ou en vérité . –  je m''en réjouis v. 4+.'
  - type: text
    content: Qu'importe ! De toute manière, prétexte ou vérité, le Christ est annoncé, et je m'en réjouis.
  - type: text
    content: 'Je m''en réjouirai encore, '
  '19':
  - type: note
    content: 'cela tournera à mon salut  : cf. v. 28 ; 3.20 ; formule identique dans Jb 13.16 (LXX). –  grâce à vos prières… Rm 15.30+ ; 2Co 1.11. –  l''assistance de l''Esprit… Mc 13.11/ / ; Ga 3.5 (verbe apparenté pour accorder).'
  - type: text
    content: 'car je sais que cela tournera à mon salut, grâce à vos prières et à l''assistance de l''Esprit de Jésus-Christ ; '
  '2':
  - type: note
    content: Grâce et paix… Rm 1.7+.
  - type: text
    content: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
  - type: heading
    content: Intercession
  '20':
  - type: note
    content: 'ce que j''attends avec impatience  : cf. Rm 8.19. –  honte de rien 1P 4.16 ; 1Jn 2.28 ; cf. Ps 25.3 ; 69.7 ; 119.80,116. –  Avec une entière assurance  : autre traduction ouvertement  ; cf. Ac 2.29n  ; 28.31 ; 2Co 3.12n. –  magnifié (ou grandi, Ac 5.13n  ; 2Co 10.15) dans mon corps 1Co 6.20 ; 2Co 4.10.'
  - type: text
    content: selon ce que j'attends avec impatience, ce que j'espère, je n'aurai honte de rien. Avec une entière assurance, maintenant comme toujours, le Christ sera magnifié dans mon corps, soit par ma vie, soit par ma mort.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'la vie…  : litt. vivre, c''est Christ, et mourir, un gain  ; cf. Rm 8.10+s ; Ga 2.19s ; Col 3.3s ; voir aussi 1Co 9.19ss.'
  - type: text
    content: 'Car, pour moi, la vie, c''est le Christ, et la mort est un gain. '
  '22':
  - type: note
    content: 's''il est utile…  : litt. si vivre en chair (est) pour moi le fruit d''une œuvre ; vivre dans la chair est à entendre ici au sens de rester en vie ou de demeurer en ce monde (de même demeurer dans la chair au v. 24) ; cf. Ps 104.13 ; Jn 15.1-8,16+ ; Rm 1.13 ; 1Co 9.1. –  je ne sais que préférer  : autre traduction je ne saurais dire (le verbe a habituellement le sens de faire connaître, 4.6 ; Rm 9.22+ ; 1Co 12.3n) ce que je choisis  ; le verbe traduit ici par préférer se retrouve en 2Th 2.13 (choisir) ; Hé 11.25.'
  - type: text
    content: 'Toutefois, s''il est utile pour mon œuvre que je continue à vivre dans la chair, je ne sais que préférer. '
  '23':
  - type: note
    content: 'Je suis enfermé…  : litt. je suis pressé (ou retenu) des deux (côtés). –  désir 1Th 2.17 ; le mot est aussi employé, ailleurs, en mauvaise part (Ga 5.16+). –  m''en aller 2Tm 4.6n. –  être avec le Christ  : cf. Lc 23.43 ; Jn 14.3 ; Rm 14.8 ; 2Co 5.6-9 ; 1Th 4.17+ ; 5.10 ; 2Th 2.1.'
  - type: text
    content: 'Je suis enfermé dans ce dilemme : j''ai le désir de m''en aller et d''être avec le Christ, ce qui serait, de beaucoup, le meilleur ; '
  '24':
  - type: note
    content: 'à cause de vous  : cf. 2Co 4.12-15. –  plus nécessaire  : cf. 1Co 9.16. –  je demeure  : ici et au v. 25, le texte joue sur l''emploi de trois verbes apparentés.'
  - type: text
    content: 'mais, à cause de vous, il est plus nécessaire que je demeure dans la chair. '
  '25':
  - type: note
    content: '2.24 ; cf. Ac 20.1ss ; Phm 22. –  vos progrès… v. 12+ ; cf. 2Th 1.3. –  votre joie…  : litt. la joie de la foi.'
  - type: text
    content: 'J''en suis persuadé, je le sais, je demeurerai auprès de vous tous encore et encore, en vue de vos progrès et de votre joie dans la foi, '
  '26':
  - type: note
    content: Litt. pour que votre fierté abonde en Christ Jésus en moi  ; cf. 2.16 ; 3.3 ; Rm 2.17n  ; voir aussi 2Co 12.9 ; Ga 6.14 ; 1Th 2.19.
  - type: text
    content: pour que vous soyez toujours plus fiers de Jésus-Christ en moi, grâce à mon retour auprès de vous.
  - type: heading
    content: Une vie qui s'accorde à la bonne nouvelle
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'conduisez-vous  : le verbe grec ainsi traduit est dérivé des mots rendus par citoyenneté en 3.20 et citoyen(s) en Ep 2.19 ; il évoque sans doute particulièrement la vie communautaire ; les habitants de Philippes étaient probablement très attachés à leur citoyenneté (voir l''introduction et Ac 16.12n). –  digne… 1Th 2.12+. –  la bonne nouvelle (v. 5+) du Christ Rm 15.19 ; 1Co 9.12 ; 2Co 2.12. –  tenez ferme 4.1 ; 1Co 16.13n. –  même esprit  : cf. Ep 4.3s. –  combattant 1.30 ; 4.3 ; Rm 15.30+. –  même âme  : cf. 2.2,19ns ; Ac 4.32. –  pour la foi (on pourrait aussi comprendre par la foi , cf. v. 29) de la bonne nouvelle  : cf. Col 1.23.'
  - type: text
    content: 'Seulement, conduisez-vous d''une manière digne de la bonne nouvelle du Christ, afin que, soit que je vienne vous voir, soit que je reste absent, j''entende dire que vous tenez ferme dans un même esprit, combattant d''une même âme pour la foi de la bonne nouvelle, '
  '28':
  - type: note
    content: 'adversaires 1Co 16.9. –  Pour eux…  : on pourrait aussi comprendre ce qui est pour eux un présage de perdition est précisément votre salut. Sur le mot traduit par indice (ou présage), voir Rm 3.25n  ; terme apparenté en 2Th 1.5.'
  - type: text
    content: 'sans vous laisser aucunement intimider par les adversaires. Pour eux, c''est un indice de perdition, mais pour vous c''est un indice de salut, de la part de Dieu ; '
  '29':
  - type: note
    content: 'la grâce vous a été accordée 2.9n  ; Rm 8.32n  ; voir aussi Ep 2.8. Autre traduction  : la grâce vous a été accordée de vivre pour le Christ, non seulement en mettant votre foi en lui, mais encore en souffrant pour lui. Cf. 2Co 12.10 ; voir aussi Mt 5.10ss ; Ac 5.41+ ; 1P 1.6s.'
  - type: text
    content: 'en effet, pour ce qui est du Christ, la grâce vous a été accordée non seulement de mettre votre foi en lui, mais encore de souffrir pour lui, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Je rends grâce… 4.6 ; Rm 1.8+ss ; 1Co 1.4+.
  - type: text
    content: 'Je rends grâce à mon Dieu toutes les fois que je me souviens de vous ; '
  '30':
  - type: note
    content: 'Cf. v. 7 ; Ac 16.22ss ; Col 1.29 ; 2.1 ; 4.12 ; 1Th 2.2 ; voir aussi 2Co 11.24ss. –  ce même combat…  : litt. le même combat tel que vous (l’)avez vu en moi et que maintenant vous (l’)entendez en moi.'
  - type: text
    content: en soutenant ce même combat que vous avez vu chez moi et dont, maintenant, vous entendez encore parler en ce qui me concerne.
  '4':
  - type: note
    content: avec joie v. 18,25 ; 2.2,17s,28s ; 3.1 ; 4.1,4,10 ; cf. Rm 14.17 ; 15.13 ; 2Co 2.3 ; 6.10 ; 7.4,13 ; 8.2 ; Ga 5.22 ; 1Th 1.6 ; 2.19s.
  - type: text
    content: 'je ne cesse, dans toutes mes prières pour vous tous, de prier avec joie, '
  '5':
  - type: note
    content: 'la part  : le même mot est traduit ailleurs par communion ou solidarité  ; cf. v. 7,27ss ; 2.1 ; 3.10 ; 4.14ss ; Ac 2.42n  ; Rm 15.26ns ; 1Co 1.9 ; 2Co 13.13 ; Ga 2.9 ; 1Th 4.17 ; 1Jn 1.3. –  la bonne nouvelle ou l''Evangile v. 7,12,16,27ss ; 2.22 ; 4.3 ; 1Co 9.23. –  depuis le premier jour  : cf. 4.15ss ; Ac 16.4ss ; 1Co 1.4-6 ; Ga 1.6-8 ; 1Th 1.5-10. –  maintenant v. 30 ; 2.12.'
  - type: text
    content: 'à cause de la part que vous prenez à la bonne nouvelle, depuis le premier jour jusqu''à maintenant. '
  '6':
  - type: note
    content: 'persuadé ou confiant  ; même terme v. 14,25 ; 2.24 ; 3.3s. –  qui a commencé… en poursuivra l''achèvement  : cf. 2Co 7.1n  ; Ga 3.3 ; voir aussi Gn 2.2 ; 1Th 5.24. –  une œuvre bonne  : cf. v. 11,28 ; 2.1,13,30 ; 3.10 ; 4.13,19 ; voir aussi Jn 4.34 ; 6.28s ; Rm 14.20. –  au jour de Jésus-Christ v. 10 ; cf. 2.16 ; 3.20 ; 4.5 ; 1Co 1.8+ ; 1Th 4.15.'
  - type: text
    content: Je suis persuadé que celui qui a commencé en vous une œuvre bonne en poursuivra l'achèvement jusqu'au jour de Jésus-Christ.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'que j''aie… de telles pensées ou dispositions , litt. que je pense cela au sujet de vous tous  ; même verbe en 2.2n,5 ; 3.15,19 ; 4.2,10 ( intérêt ). –  je vous porte dans mon cœur 2Co 7.3+. –  dans ma condition de prisonnier  : litt. dans mes liens , de même v. 13s,17 ; cf. Ep 3.1 ; 4.1 ; Col 4.18 ; 2Tm 1.8 ; 2.9 ; Phm 1,9-13. –  défense v. 16 ; Ac 22.1n. –  la confirmation  : autres traductions l''affermissement ; la démonstration  ; cf. Rm 4.16n. –  vous avez tous part  : terme dérivé du mot habituellement traduit par communion ou solidarité , v. 5n. –  la même grâce v. 29s ; Rm 1.5+.'
  - type: text
    content: 'Il est juste que j''aie pour vous tous de telles pensées, parce que je vous porte dans mon cœur et que, dans ma condition de prisonnier comme dans la défense et la confirmation de la bonne nouvelle, vous avez tous part à la même grâce que moi. '
  '8':
  - type: note
    content: 'Dieu m''est témoin Rm 1.9+. –  une vive affection  : cf. 2.12 ; 4.1. –  la tendresse même…  : litt. dans (ou par) les entrailles de Christ Jésus  ; des expressions analogues reviennent souvent pour évoquer l''émotion, la compassion, la tendresse ; de même 2.1 ; voir Lc 1.78n  ; 2Co 6.12n  ; Col 3.12n  ; Phm 7n.'
  - type: text
    content: Dieu m'est témoin, en effet, que j'ai une vive affection pour vous tous, la tendresse même de Jésus-Christ.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'que votre amour abonde 1Th 3.12. –  en connaissance Rm 1.28n  ; 15.14 ; Col 1.9n  ; Phm 6. –  sensibilité  : autre traduction perspicacité.'
  - type: text
    content: 'Ce que je demande dans mes prières, c''est que votre amour abonde de plus en plus en connaissance et en vraie sensibilité ; '
