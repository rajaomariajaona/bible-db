  - type: usfm
    marker: s1
    children:
    - type: text
      text: La progression de la bonne nouvelle
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
