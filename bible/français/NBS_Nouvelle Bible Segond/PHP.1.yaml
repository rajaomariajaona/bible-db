      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'discerner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: examiner, éprouver, voir à l'épreuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'preuves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2.22 ; Rm 1.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.18 ; 12.2+ ; 1Th 5.21 ; Hé 5.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce qui est important '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 2.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sincères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: transparents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 1Co 5.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'irréprochables '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 24.16 ; si l''on donnait au terme grec le sens actif qu''il a en 1Co 10.32, on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et que vous ne soyez un sujet d'achoppement pour personne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ep 1.4 ; 1Th 3.13 ; 5.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jour du Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6+.
      marker-yv: yv-n
    - type: text
      text: 'qu''ainsi vous sachiez discerner ce qui est important, afin que vous soyez sincères et irréprochables pour le jour du Christ '
