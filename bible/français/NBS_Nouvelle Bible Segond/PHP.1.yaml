      marker-yv: yv-n
    - type: text
      text: 'Paul et Timothée, esclaves de Jésus-Christ, à tous ceux qui, à Philippes, sont saints en Jésus-Christ, aux épiscopes et aux ministres : '
  '10':
  - type: usfm
    marker: p
