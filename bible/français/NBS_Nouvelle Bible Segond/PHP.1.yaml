      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par ambition personnelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par rivalité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 2.8 ; 2Co 12.20 ; Ga 5.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs intentions…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Th 2.5. – Voir '
      - type: usfm
        marker: bdit
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ajouter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe peut aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: réveiller, susciter, ressusciter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ac 3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 5.3+ ; 2Co 1.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à ma condition de prisonnier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à mes liens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; certains comprennent ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par mes liens.
      marker-yv: yv-n
    - type: text
      text: 'tandis que ceux-là annoncent le Christ par ambition personnelle ; leurs intentions ne sont pas pures : ils s''imaginent ajouter de la détresse à ma condition de prisonnier.'
