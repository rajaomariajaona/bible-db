      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je souhaite que vous le sachiez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ep 6.21 ; Col 4.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'progrès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 25 ; 1Tm 4.15) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la bonne nouvelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 5+) : cf. Ac 8.1,4.'
      marker-yv: yv-n
    - type: text
      text: 'Je souhaite que vous le sachiez, mes frères : ce qui m''est arrivé a plutôt contribué aux progrès de la bonne nouvelle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de sorte que mes liens sont devenus manifestes en Christ, dans tout le prétoire et partout ailleurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prétoire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est, en l'occurrence, ou bien le palais de l'empereur à Rome, ou bien la résidence d'un gouverneur dans une ville de province ; cf. Mt 27.27/ / ; Jn 18.28,33 ; 19.9 ; Ac 23.35.
      marker-yv: yv-n
    - type: text
      text: 'En effet, dans tout le prétoire, comme partout ailleurs, il est devenu manifeste que c''est pour le Christ que je suis prisonnier, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
