    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour la défense de la bonne nouvelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7+.
      marker-yv: yv-n
    - type: text
      text: 'Ceux-ci agissent par amour, sachant que je suis là pour la défense de la bonne nouvelle, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
