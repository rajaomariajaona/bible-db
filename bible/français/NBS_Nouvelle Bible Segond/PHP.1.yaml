          text: v. 4+.
      marker-yv: yv-n
    - type: text
      text: Qu'importe ! De toute manière, prétexte ou vérité, le Christ est annoncé, et je m'en réjouis.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je m''en réjouirai encore, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
