    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma condition de prisonnier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mes liens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'confiance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 14.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dire la Parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(certains mss précisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ac 4.29+ ; 28.31 ; 1Th 2.2.
      marker-yv: yv-n
    - type: text
      text: 'et ma condition de prisonnier a donné confiance à la plupart des frères, dans le Seigneur : ils ont d''autant plus d''audace pour dire la Parole sans crainte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'proclament le Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 1.23 ; 2Co 1.9 ; 11.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par envie… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ga 5.20ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: goût des disputes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec est très proche de celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ambition personnelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans de bonnes intentions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bon plaisir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2.13.
      marker-yv: yv-n
    - type: text
      text: 'Certains, il est vrai, proclament le Christ par envie et par goût des disputes, mais d''autres le font dans de bonnes intentions. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
