document_id: LAM.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ramène-nous à toi
  - type: text
    content: ' '
  - type: note
    content: 'Bien que composé de 22 vers, ce cinquième poème n''est pas alphabétique ; cf. 1.1n. –  Souviens-toi  : cf. Jg 16.28 ; 1S 1.11 ; 2R 20.3 ; Ps 89.51 ; 106.4 ; 137.7 ; Lc 23.42. –  Regarde, vois 1.9+ ; Es 63.15. –  déshonneur  : le même mot a été traduit par outrages en 3.30,61.'
  - type: text
    content: 'Souviens-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', de ce qui nous est arrivé !'
  - type: text
    content: Regarde, vois notre déshonneur !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'calcinée comme au four  : autre traduction brûlante comme un four.'
  - type: text
    content: Notre peau est calcinée comme au four
  - type: text
    content: par la brûlure de la faim.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'abusé  : cf. Gn 34.2n  ; Dt 22.24,29.'
  - type: text
    content: Ils ont abusé des femmes dans Sion,
  - type: text
    content: des jeunes filles dans les villes de Juda.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Par leur main  : soit celle des bourreaux (cause), soit celle des victimes (forme de supplice). –  on n''a pas honoré ou favorisé  ; cf. 4.16 ; Lv 19.32n.'
  - type: text
    content: Par leur main, des princes ont été pendus ;
  - type: text
    content: on n'a pas honoré les vieillards.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Des jeunes gens ont porté la meule  : Vg on a abusé impudiquement des jeunes gens  ; cf. Jg 16.21 ; Jb 31.10.'
  - type: text
    content: Des jeunes gens ont porté la meule,
  - type: text
    content: des garçons ont trébuché sous des fardeaux de bois.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'anciens v. 12. –  délaissé  : ici comme au v. 15 le verbe ainsi traduit signifie cesser, interrompre, se reposer  ; il est apparenté au mot sabbat. –  de la ville  : sous-entendu dans le texte ; pour l''expression porte de la ville , cf. Dt 16.18n  ; 21.19 ; 25.7 ; Jb 29.7ss ; Rt 4.1,11.'
  - type: text
    content: Les anciens ont délaissé la porte de la ville,
  - type: text
    content: les jeunes gens ont délaissé leurs chants.
  '15':
  - type: text
    content: ' '
  - type: note
    content: délaissé v. 14n. –  changées v. 2n.
  - type: text
    content: La gaieté a délaissé notre cœur,
  - type: text
    content: nos danses ont été changées en deuil.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '1.18+. –  couronne  : cf. Jr 13.18.'
  - type: text
    content: La couronne est tombée de notre tête.
  - type: text
    content: Quel malheur pour nous ! Nous avons péché.
  '17':
  - type: text
    content: ' '
  - type: note
    content: souffrant 1.13n. –  obscurcis 4.14.
  - type: text
    content: Voici pourquoi notre cœur est souffrant,
  - type: text
    content: 'voici pourquoi nos yeux sont obscurcis :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'le mont Sion est dévasté 1.4,13,16 ; 3.11 ; 4.5 ; cf. Mi 3.12. –  renards  : cf. Ez 13.4.'
  - type: text
    content: c'est que le mont Sion est dévasté
  - type: text
    content: et que les renards y rôdent.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'tu es installé 1.1n  ; Ps 102.13n  ; 145.13 ; 146.10. –  subsiste  : sous-entendu dans le texte.'
  - type: text
    content: 'Toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es installé pour toujours ;'
  - type: text
    content: ton trône subsiste de génération en génération.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'est passé  : le même verbe est traduit par ont été changées au v. 15 ; cf. Es 60.5 ; Jr 6.12 ; Ab 11.'
  - type: text
    content: Notre patrimoine est passé à des étrangers,
  - type: text
    content: nos maisons à des inconnus.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi nous oublierais-tu  : cf. Es 49.14 ; Ps 42.10 ; 44.25. –  la longueur des jours Ps 21.5n.'
  - type: text
    content: Pourquoi nous oublierais-tu pour toujours,
  - type: text
    content: nous abandonnerais-tu pour la longueur des jours ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Ramène-nous…  : cf. 2.14n  ; 3.40 ; Es 1.27n  ; 44.22 ; Jr 31.18 ; Os 2.9.'
  - type: text
    content: 'Ramène-nous à toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', et nous reviendrons !'
  - type: text
    content: Renouvelle nos jours comme au temps jadis !
  '22':
  - type: text
    content: ' '
  - type: note
    content: Es 64.8 ; Jr 14.19 ; 33.24-26. Dans la lecture traditionnelle de la synagogue, le jour anniversaire de la destruction du temple, on relit le v. 21 après le v. 22, pour ne pas finir sur une note de désespoir. –  Nous as-tu donc rejetés ? autre traduction nous méprises-tu donc ?
  - type: text
    content: Nous as-tu donc rejetés ?
  - type: text
    content: Es-tu irrité contre nous à l'extrême ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'orphelins  : cf. Ps 68.6 ; Jn 14.18. –  sans père  : certains voient dans cette expression une allusion au roi en exil ; cf. 4.20.'
  - type: text
    content: Nous sommes devenus orphelins, sans père ;
  - type: text
    content: nos mères sont comme des veuves.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 55.1-3.
  - type: text
    content: Nous buvons notre eau à prix d'argent,
  - type: text
    content: notre bois nous arrive contre paiement.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Nos poursuivants…  : litt. sur notre cou nous sommes poursuivis (1.3n) ; une ancienne version grecque a lu un joug (sur notre cou…)  ; les termes hébreux pour joug et sur se ressemblent beaucoup. –  pas de repos 1.3+.'
  - type: text
    content: Nos poursuivants nous ont saisis par la nuque ;
  - type: text
    content: nous sommes fatigués, on ne nous laisse pas de repos.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tendu (litt. donné ) la main  : signe des alliances politiques ; cf. 2R 10.15n  ; Ez 17.18n, Esd 10.19n  ; 1Ch 29.24n  ; 2Ch 30.8n. –  Egypte / Assyrie  : appuis politiques alternatifs et incompatibles ; cf. 4.17n  ; 2R 16.7ss ; Jr 2.18 ; Os 12.2.'
  - type: text
    content: Nous avons tendu la main vers l'Egypte,
  - type: text
    content: vers l'Assyrie pour nous rassasier de pain.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 20.5 ; Jr 2.5 ; 7.25s ; 16.10-13 ; 31.29s ; Ez 18.2ss ; voir aussi Es 53.7.
  - type: text
    content: Nos pères ont péché, mais ils ne sont plus,
  - type: text
    content: et c'est nous qui portons le fardeau de leurs fautes.
  '8':
  - type: text
    content: Des esclaves dominent sur nous,
  - type: text
    content: et personne ne nous arrache de leur main.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'au péril de notre vie  : litt. par (ou contre ) notre vie (ou notre être  ; cf. Gn 1.20n) ; cf. 2S 23.17 ; 1Ch 11.19. –  affrontant  : litt. de devant.'
  - type: text
    content: Nous rapportons notre pain au péril de notre vie,
  - type: text
    content: en affrontant l'épée du désert.
