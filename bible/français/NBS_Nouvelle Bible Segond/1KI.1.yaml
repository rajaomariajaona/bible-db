          text: meilleur.
      marker-yv: yv-n
    - type: text
      text: 'et les gens de la cour du roi sont venus pour bénir notre seigneur le roi David, en disant : « Que ton Dieu rende le nom de Salomon plus célèbre que ton nom, et qu''il élève son trône plus que ton trône ! » Et le roi s''est prosterné sur son lit. '
