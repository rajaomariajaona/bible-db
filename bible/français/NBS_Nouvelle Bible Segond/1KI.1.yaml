document_id: 1KI.1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vieillesse de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le roi David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et le roi David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le récit vient à la suite de 2S 20.26 ou d''un passage d''une source disparue. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: était vieux, avancé en âge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était vieux, avancé dans les jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; la même expression hébraïque est employée en Gn 24.1 ; Jos 13.1 ; 23.1. Le pluriel '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne souvent la durée de la vie, comme au v. 6 ; ici, le roi David a 70 ans (cf. 2S 5.4).
      marker-yv: yv-n
    - type: text
      text: 'Le roi David était vieux, avancé en âge ; on le couvrait de vêtements, mais il ne parvenait pas à se réchauffer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les vaillants hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Mais il n'invita pas Nathan, le prophète, ni Benaya, ni les vaillants hommes, ni Salomon, son frère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nathan et Bethsabée prennent parti pour Salomon
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bethsabée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 15s,28,31 ; 2.13,18s ; 2S 11.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.24 ; Ps 51.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Adonias, fils de Hagguith '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Nathan dit à Bethsabée, mère de Salomon : N''as-tu pas appris qu''Adonias, fils de Hagguith, est devenu roi, sans que David, notre seigneur, le sache ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Une prise de pouvoir entraîne souvent l'élimination des autres prétendants au trône. Cf. 15.29 ; 16.11s ; Jg 9.5 ; 2R 9.14ss ; 10.1-17 ; 11.1.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant laisse-moi te donner un conseil, je te prie, afin que tu sauves ta vie et celle de Salomon, ton fils. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne m'as-tu pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'as-tu pas juré à ta servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 17 ; cf. Gn 18.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Le '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: serment
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en question n'est pas mentionné dans les livres de Samuel (voir cependant 2S 12.24s) ; certains pensent que le texte joue sur le nom de Bethsabée, qui peut être rattaché à la notion de serment (cf. 2S 11.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Va, entre chez le roi David ; tu lui diras : « O roi, mon seigneur, ne m''as-tu pas toi-même juré, à moi, ta servante : “C''est Salomon, ton fils, qui deviendra roi après moi, c''est lui qui s''assiéra sur mon trône !” Pourquoi donc est-ce Adonias qui est devenu roi ? » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pendant que tu seras là à parler avec le roi, j'entrerai moi-même après toi et je compléterai tes paroles.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abishag, la Shounamite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: était au service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Bethsabée se rendit dans la chambre du roi. Le roi était très vieux, et Abishag, la Shounamite, était au service du roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'inclina et se prosterna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 31 ; Gn 24.26 ; 43.26,28 ; Ex 4.31 ; 12.27 ; 34.8 ; Nb 22.31 ; 1S 24.9 ; 28.14 ; Ez 8.16 ; Né 8.6 ; 1Ch 29.20 ; 2Ch 29.30.'
      marker-yv: yv-n
    - type: text
      text: 'Bethsabée s''inclina et se prosterna devant le roi ; et le roi dit : Qu''as-tu ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu m'as… juré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu as juré à ta servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle lui répondit : Mon seigneur, tu m''as toi-même juré, par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu : « C''est Salomon, ton fils, qui deviendra roi après moi, c''est lui qui s''assiéra sur mon trône. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après de nombreux mss hébreux et des versions anciennes ; autre texte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au début du v., ce qui pourrait signifier ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et pourtant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. v. 20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Or maintenant Adonias est devenu roi, et toi, ô roi, mon seigneur, tu ne le sais pas ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il a sacrifié des taureaux, des bêtes grasses et du petit bétail en quantité ; il a invité tous les fils du roi, Abiathar, le prêtre, et Joab, le chef de l''armée, mais il n''a pas invité Salomon, ton serviteur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: O roi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que l'on cherche pour mon seigneur, le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une jeune fille vierge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: na‘ara betoula
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression rare en Jg 21.12 ; Est 2.3.'
      marker-yv: yv-n
    - type: text
      text: 'Les gens de sa cour lui dirent : O roi, que l''on cherche pour toi une jeune fille vierge ; qu''elle se tienne devant toi, qu''elle prenne soin de toi et qu''elle couche sur ton sein ; ainsi tu te réchaufferas ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Or c'est sur toi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou, d''après de nombreux mss et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et maintenant… tout Israël a les yeux fixés sur toi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Or c''est sur toi, ô roi, mon seigneur, que tout Israël a les yeux fixés, pour que tu lui dises qui s''assiéra sur ton trône après toi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: couché avec tes pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression désignant la mort en 2.10 ; 11.21,43 ; 14.20,31 ; 15.8,24 ; 16.6,28 ; 22.40,51 ; Gn 47.30 ; Dt 31.16 ; 2S 7.12 ; 2R 8.24 ; 2Ch 26.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pécheurs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des coupables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. v. 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Dès que tu te seras couché avec tes pères, moi et Salomon, mon fils, nous serons traités comme des pécheurs.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tandis qu''elle parlait encore avec le roi, Nathan, le prophète, arriva. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se prosterna… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 16+. Ce geste peut être une marque de respect, mais aussi un signe de détresse (cf. Nb 14.5 ; Jos 7.6-10 ; 1S 25.23).
      marker-yv: yv-n
    - type: text
      text: 'On dit au roi : C''est Nathan, le prophète ! Celui-ci se présenta devant le roi et se prosterna devant le roi, face contre terre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ensuite Nathan dit : O roi, mon seigneur, c''est donc toi qui as dit : « Adonias deviendra roi après moi, c''est lui qui s''assiéra sur mon trône ! » '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vive le roi Adonias ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. v. 31,34,39 ; 1S 10.24 ; 2S 16.16 ; 2R 11.12 ; 2Ch 23.11.
      marker-yv: yv-n
    - type: text
      text: 'Car il est descendu aujourd''hui, il a sacrifié des taureaux, des bêtes grasses et du petit bétail en quantité ; il a invité tous les fils du roi, les chefs de l''armée et Abiathar, le prêtre ; ils mangent et boivent devant lui, et ils disent : « Vive le roi Adonias ! » '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni Tsadoq…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Benaya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais il n''a invité ni moi qui suis ton serviteur, ni Tsadoq, le prêtre, ni Benaya, fils de Joïada, ni Salomon, ton serviteur. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne m'as-tu pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'as-tu pas fait savoir à tes serviteurs…
      marker-yv: yv-n
    - type: text
      text: Est-ce bien toi, ô roi, mon seigneur, qui l'as voulu ainsi ? Pourquoi ne m'as-tu pas fait savoir, à moi qui suis ton serviteur, qui s'assiéra sur ton trône après toi ?
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il semble que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Bethsabée '
      - type: usfm
        marker: ft
        children:
