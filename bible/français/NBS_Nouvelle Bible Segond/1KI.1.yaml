      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
