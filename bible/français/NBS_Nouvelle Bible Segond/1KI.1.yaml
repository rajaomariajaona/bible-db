          text: '  ; la même expression peut aussi désigner des gens riches et influents (cf. 2R 15.20).'
      marker-yv: yv-n
    - type: text
      text: 'Il parlait encore lorsque Jonathan, fils d''Abiathar, le prêtre, arriva. Adonias dit : Viens, car tu es un homme de valeur et tu apportes de bonnes nouvelles. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Jonathan répondit à Adonias : Non ! Notre seigneur, le roi David, a investi Salomon de la royauté. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Le roi a envoyé avec lui Tsadoq, le prêtre, Nathan, le prophète, Benaya, fils de Joïada, les Kérétites et les Pélétites, et ils l''ont fait monter sur la mule du roi. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'émotion…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rt 1.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tsadoq, le prêtre, et Nathan, le prophète, lui ont conféré l''onction royale à Guihôn. De là ils sont remontés tout joyeux, et l''émotion a gagné la ville : c''est là le bruit que vous avez entendu. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Salomon s''est même assis sur le trône royal ; '
