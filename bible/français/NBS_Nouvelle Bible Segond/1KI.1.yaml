      marker-yv: yv-n
    - type: text
      text: 'Voici encore ce qu''a dit le roi : « Béni soit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, qui a placé aujourd''hui quelqu''un sur mon trône et qui a permis que mes yeux le voient ! » '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
