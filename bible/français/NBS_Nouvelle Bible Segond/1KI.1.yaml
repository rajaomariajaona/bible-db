document_id: 1KI.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vieillesse de David
  - type: text
    content: ' '
  - type: note
    content: 'Le roi David  : litt. et le roi David . Le récit vient à la suite de 2S 20.26 ou d''un passage d''une source disparue. –  était vieux, avancé en âge  : litt. était vieux, avancé dans les jours  ; la même expression hébraïque est employée en Gn 24.1 ; Jos 13.1 ; 23.1. Le pluriel jours désigne souvent la durée de la vie, comme au v. 6 ; ici, le roi David a 70 ans (cf. 2S 5.4).'
  - type: text
    content: 'Le roi David était vieux, avancé en âge ; on le couvrait de vêtements, mais il ne parvenait pas à se réchauffer. '
  '10':
  - type: note
    content: les vaillants hommes v. 8n.
  - type: text
    content: Mais il n'invita pas Nathan, le prophète, ni Benaya, ni les vaillants hommes, ni Salomon, son frère.
  - type: heading
    content: Nathan et Bethsabée prennent parti pour Salomon
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Bethsabée  : cf. v. 15s,28,31 ; 2.13,18s ; 2S 11.3n  ; 12.24 ; Ps 51.2. –  Adonias, fils de Hagguith v. 5n.'
  - type: text
    content: 'Alors Nathan dit à Bethsabée, mère de Salomon : N''as-tu pas appris qu''Adonias, fils de Hagguith, est devenu roi, sans que David, notre seigneur, le sache ? '
  '12':
  - type: note
    content: Une prise de pouvoir entraîne souvent l'élimination des autres prétendants au trône. Cf. 15.29 ; 16.11s ; Jg 9.5 ; 2R 9.14ss ; 10.1-17 ; 11.1.
  - type: text
    content: 'Maintenant laisse-moi te donner un conseil, je te prie, afin que tu sauves ta vie et celle de Salomon, ton fils. '
  '13':
  - type: note
    content: 'ne m''as-tu pas…  : litt. n''as-tu pas juré à ta servante, de même au v. 17 ; cf. Gn 18.3n  ; 1S 1.11n. Le serment en question n''est pas mentionné dans les livres de Samuel (voir cependant 2S 12.24s) ; certains pensent que le texte joue sur le nom de Bethsabée, qui peut être rattaché à la notion de serment (cf. 2S 11.3n).'
  - type: text
    content: 'Va, entre chez le roi David ; tu lui diras : « O roi, mon seigneur, ne m''as-tu pas toi-même juré, à moi, ta servante : “C''est Salomon, ton fils, qui deviendra roi après moi, c''est lui qui s''assiéra sur mon trône !” Pourquoi donc est-ce Adonias qui est devenu roi ? » '
  '14':
  - type: text
    content: Pendant que tu seras là à parler avec le roi, j'entrerai moi-même après toi et je compléterai tes paroles.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Abishag, la Shounamite v. 3n. –  était au service  : cf. v. 4n.'
  - type: text
    content: 'Bethsabée se rendit dans la chambre du roi. Le roi était très vieux, et Abishag, la Shounamite, était au service du roi. '
  '16':
  - type: note
    content: 's''inclina et se prosterna  : cf. v. 31 ; Gn 24.26 ; 43.26,28 ; Ex 4.31 ; 12.27 ; 34.8 ; Nb 22.31 ; 1S 24.9 ; 28.14 ; Ez 8.16 ; Né 8.6 ; 1Ch 29.20 ; 2Ch 29.30.'
  - type: text
    content: 'Bethsabée s''inclina et se prosterna devant le roi ; et le roi dit : Qu''as-tu ? '
  '17':
  - type: note
    content: 'tu m''as… juré  : litt. tu as juré à ta servante, v. 13n.'
  - type: text
    content: 'Elle lui répondit : Mon seigneur, tu m''as toi-même juré, par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : « C''est Salomon, ton fils, qui deviendra roi après moi, c''est lui qui s''assiéra sur mon trône. » '
  '18':
  - type: note
    content: 'et toi  : d''après de nombreux mss hébreux et des versions anciennes ; autre texte et maintenant, comme au début du v., ce qui pourrait signifier ici et pourtant. Cf. v. 20n.'
  - type: text
    content: 'Or maintenant Adonias est devenu roi, et toi, ô roi, mon seigneur, tu ne le sais pas ! '
  '19':
  - type: text
    content: 'Il a sacrifié des taureaux, des bêtes grasses et du petit bétail en quantité ; il a invité tous les fils du roi, Abiathar, le prêtre, et Joab, le chef de l''armée, mais il n''a pas invité Salomon, ton serviteur. '
  '2':
  - type: note
    content: 'O roi…  : litt. que l''on cherche pour mon seigneur, le roi. –  une jeune fille vierge  : hébreu na‘ara betoula  ; même expression rare en Jg 21.12 ; Est 2.3.'
  - type: text
    content: 'Les gens de sa cour lui dirent : O roi, que l''on cherche pour toi une jeune fille vierge ; qu''elle se tienne devant toi, qu''elle prenne soin de toi et qu''elle couche sur ton sein ; ainsi tu te réchaufferas ! '
  '20':
  - type: note
    content: 'Or c''est sur toi…  : ou, d''après de nombreux mss et Vg  : et maintenant… tout Israël a les yeux fixés sur toi…, cf. v. 18n.'
  - type: text
    content: 'Or c''est sur toi, ô roi, mon seigneur, que tout Israël a les yeux fixés, pour que tu lui dises qui s''assiéra sur ton trône après toi. '
  '21':
  - type: note
    content: 'couché avec tes pères  : même expression désignant la mort en 2.10 ; 11.21,43 ; 14.20,31 ; 15.8,24 ; 16.6,28 ; 22.40,51 ; Gn 47.30 ; Dt 31.16 ; 2S 7.12 ; 2R 8.24 ; 2Ch 26.2. –  comme des pécheurs ou des coupables. Cf. v. 12n.'
  - type: text
    content: Dès que tu te seras couché avec tes pères, moi et Salomon, mon fils, nous serons traités comme des pécheurs.
  '22':
  - type: text
    content: 'Tandis qu''elle parlait encore avec le roi, Nathan, le prophète, arriva. '
  '23':
  - type: note
    content: se prosterna… v. 16+. Ce geste peut être une marque de respect, mais aussi un signe de détresse (cf. Nb 14.5 ; Jos 7.6-10 ; 1S 25.23).
  - type: text
    content: 'On dit au roi : C''est Nathan, le prophète ! Celui-ci se présenta devant le roi et se prosterna devant le roi, face contre terre. '
  '24':
  - type: text
    content: 'Ensuite Nathan dit : O roi, mon seigneur, c''est donc toi qui as dit : « Adonias deviendra roi après moi, c''est lui qui s''assiéra sur mon trône ! » '
  '25':
  - type: note
    content: Vive le roi Adonias ! cf. v. 31,34,39 ; 1S 10.24 ; 2S 16.16 ; 2R 11.12 ; 2Ch 23.11.
  - type: text
    content: 'Car il est descendu aujourd''hui, il a sacrifié des taureaux, des bêtes grasses et du petit bétail en quantité ; il a invité tous les fils du roi, les chefs de l''armée et Abiathar, le prêtre ; ils mangent et boivent devant lui, et ils disent : « Vive le roi Adonias ! » '
  '26':
  - type: note
    content: 'ni Tsadoq…  : cf. v. 8+. –  Benaya v. 8n.'
  - type: text
    content: 'Mais il n''a invité ni moi qui suis ton serviteur, ni Tsadoq, le prêtre, ni Benaya, fils de Joïada, ni Salomon, ton serviteur. '
  '27':
  - type: note
    content: 'ne m''as-tu pas…  : autre lecture traditionnelle n''as-tu pas fait savoir à tes serviteurs…'
  - type: text
    content: Est-ce bien toi, ô roi, mon seigneur, qui l'as voulu ainsi ? Pourquoi ne m'as-tu pas fait savoir, à moi qui suis ton serviteur, qui s'assiéra sur ton trône après toi ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: Il semble que Bethsabée se soit retirée pendant l'audience accordée à Nathan ; cf. v. 32.
  - type: text
    content: 'Le roi David répondit : Appelez-moi Bethsabée ! Celle-ci se présenta devant le roi et se tint debout devant le roi. '
  '29':
  - type: note
    content: 'Par la vie du Seigneur  : formule solennelle de serment (Dt 6.13 ; Jr 4.2). Cf. 17.12 ; 18.10 ; Jg 8.19 ; 1S 25.34. –  qui m''a libéré… 2S 4.9n.'
  - type: text
    content: 'Alors le roi fit ce serment : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui m''a libéré de toute détresse, '
  '3':
  - type: note
    content: Abishag (Mon père est un voyageur), la Shounamite v. 15 ; 2.17,21s. De Shounem en Issacar (voir Jos 19.18n). LXX porte la Somanite, Syr la Shilomite (cf. Ct 7.1).
  - type: text
    content: 'On chercha dans tout le territoire d''Israël une belle jeune fille, et on trouva Abishag, la Shounamite ; on la fit venir auprès du roi. '
  '30':
  - type: text
    content: 'ce que j''ai juré par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, en disant : « C''est Salomon, ton fils, qui deviendra roi après moi, c''est lui qui s''assiéra sur mon trône à ma place », je le ferai en ce jour. '
  '31':
  - type: note
    content: 's''inclina…  : cf. v. 16+,23n. –  Que mon seigneur  : cf. v. 25+.'
  - type: text
    content: 'Bethsabée s''inclina face contre terre et, prosternée devant le roi, elle dit : Que mon seigneur le roi David vive toujours !'
  - type: heading
    content: Salomon est sacré roi d'Israël
  - type: heading
    content: 1Ch 29.21-25
  '32':
  - type: text
    content: ' '
  - type: note
    content: Benaya… v. 8n.
  - type: text
    content: 'Le roi David dit : Appelez-moi Tsadoq, le prêtre, Nathan, le prophète, et Benaya, fils de Joïada. Ceux-ci se présentèrent devant le roi ; '
  '33':
  - type: note
    content: 'ma mule  : cf. v. 38,44 ; 10.25 ; 2S 13.29 ; 18.9 ; Ez 27.14 ; Est 6.7-9. –  Guihôn (La Jaillissante) : une des deux sources qui alimentent Jérusalem, sur le flanc ouest de la vallée du Cédron, au sud du temple. Cf. Gn 2.13n  ; 2S 5.13 ; 2R 20.20 ; Es 7.3 ; 8.6 ; 22.9-11.'
  - type: text
    content: 'le roi leur dit : Prenez avec vous les gens de ma cour, faites monter Salomon, mon fils, sur ma mule, et faites-le descendre à Guihôn. '
  '34':
  - type: note
    content: 'Tsadoq, le prêtre v. 8+. –  conférera l''onction  : hébreu mashah, d''où vient le mot messie (Jn 1.41n  ; 4.25). Cf. Ex 28.41 ; 40.15 ; Lv 8.10-12 ; Nb 35.25 ; 1S 2.10 ; 9.16 ; 10.1 ; Es 45.1 ; Ha 3.13 ; Ps 2.2 ; Lm 4.20 ; Dn 9.25s ; 1Ch 14.8 ; 2Ch 6.42 et les notes. –  roi sur Israël  : cf. 1Ch 29.20-24. –  Vous sonnerez de la trompe  : cf. v. 39 ; Jos 6.4n  ; Jg 3.27+ ; 1S 13.3 ; 2R 9.13 ; Es 18.3 ; Jr 4.5 ; Ez 33.3 ; Os 5.8 ; Jl 2.1 ; Am 3.6 ; Ps 81.4 ; 150.3. –  Vive le roi Salomon ! cf. v. 25n.'
  - type: text
    content: 'Là, Tsadoq, le prêtre, avec Nathan, le prophète, lui conférera l''onction pour qu''il soit roi sur Israël. Vous sonnerez de la trompe et vous direz : « Vive le roi Salomon ! » '
  '35':
  - type: note
    content: 'chef…  : même expression hébraïque en 14.7 ; 16.2 ; 1S 9.16 ; 10.1 ; 13.14 ; 25.30 ; 2S 5.2 ; 6.21 ; 7.8 ; 1Ch 9.20 ; 11.2 ; 17.7 ; 26.24 ; 27.16 ; 2Ch 6.5 ; 31.12.'
  - type: text
    content: 'Vous monterez derrière lui ; il viendra s''asseoir sur mon trône et c''est lui qui deviendra roi à ma place. J''ai ordonné qu''il soit chef sur Israël et sur Juda. '
  '36':
  - type: note
    content: 'Qu''ainsi parle…  : autre traduction ainsi parle…  ; deux mss hébreux portent qu''ainsi fasse le Seigneur  ; certains mss de LXX portent que le Seigneur affermisse les paroles de mon seigneur le roi.'
  - type: text
    content: 'Benaya, fils de Joïada, répondit au roi : Qu''il en soit ainsi ! Qu''ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de mon seigneur le roi ! '
  '37':
  - type: text
    content: 'Comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a été avec mon seigneur le roi, qu''il soit avec Salomon et qu''il élève son trône plus que le trône de mon seigneur le roi David !'
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Tsadoq / Nathan / Benaya… v. 8n. –  les Kérétites et les Pélétites v. 44 ; 2S 8.18 ; 15.18 ; 20.7,23 ; 1Ch 18.17. –  sur la mule du roi  : geste honorifique ; cf. v. 33+.'
  - type: text
    content: 'Alors Tsadoq, le prêtre, descendit avec Nathan, le prophète, Benaya, fils de Joïada, les Kérétites et les Pélétites ; ils firent monter Salomon sur la mule du roi David et l''amenèrent à Guihôn. '
  '39':
  - type: note
    content: 'corne d''huile  : cf. 1S 16.1,13. –  la tente  : celle qui abrite le coffre de l''alliance, non loin du palais de David (2S 6.17). –  conféra l''onction v. 34n  ; cf. 1S 10.24.'
  - type: text
    content: 'Tsadoq, le prêtre, prit la corne d''huile dans la tente et conféra l''onction à Salomon. On sonna de la trompe, et tout le peuple dit : Vive le roi Salomon ! '
  '4':
  - type: note
    content: 'resta à son service  : sur le verbe correspondant (aussi au v. 15), voir Gn 39.4 ; une autre forme est traduite par auxiliaire en 10.5 ; 19.21. –  n''eut pas de relations avec elle  : litt. ne la connut pas, cf. Gn 4.1n. Ce fait est probablement interprété comme un signe que le temps de la succession est arrivé.'
  - type: text
    content: Cette jeune fille était très belle. Elle soigna le roi et resta à son service. Mais le roi n'eut pas de relations avec elle.
  - type: heading
    content: Adonias veut devenir roi
  '40':
  - type: note
    content: 'la terre ou le pays (même mot hébreu). –  se fendait, comme en Ex 14.21 ; Nb 16.31 ; Ps 141.7. –  au bruit qu''ils faisaient  : autre traduction à leurs cris.'
  - type: text
    content: Tout le peuple monta derrière lui ; le peuple jouait de la flûte et se livrait à une grande joie ; la terre se fendait au bruit qu'ils faisaient.
  - type: heading
    content: Salomon épargne Adonias
  '41':
  - type: text
    content: 'Adonias et tous les invités qui étaient avec lui l''entendirent, au moment où ils finissaient de manger. Quand Joab entendit le son de la trompe, il dit : Pourquoi ce tumulte dans la ville ? '
  '42':
  - type: note
    content: 'Jonathan… 2S 15.27,36. –  homme de valeur  : autre traduction homme vaillant  ; la même expression peut aussi désigner des gens riches et influents (cf. 2R 15.20).'
  - type: text
    content: 'Il parlait encore lorsque Jonathan, fils d''Abiathar, le prêtre, arriva. Adonias dit : Viens, car tu es un homme de valeur et tu apportes de bonnes nouvelles. '
  '43':
  - type: text
    content: 'Jonathan répondit à Adonias : Non ! Notre seigneur, le roi David, a investi Salomon de la royauté. '
  '44':
  - type: text
    content: 'Le roi a envoyé avec lui Tsadoq, le prêtre, Nathan, le prophète, Benaya, fils de Joïada, les Kérétites et les Pélétites, et ils l''ont fait monter sur la mule du roi. '
  '45':
  - type: note
    content: 'l''émotion…  : cf. Rt 1.19n.'
  - type: text
    content: 'Tsadoq, le prêtre, et Nathan, le prophète, lui ont conféré l''onction royale à Guihôn. De là ils sont remontés tout joyeux, et l''émotion a gagné la ville : c''est là le bruit que vous avez entendu. '
  '46':
  - type: text
    content: 'Salomon s''est même assis sur le trône royal ; '
  '47':
  - type: note
    content: 'ton Dieu  : autre lecture traditionnelle Dieu. –  plus célèbre  : litt. meilleur.'
  - type: text
    content: 'et les gens de la cour du roi sont venus pour bénir notre seigneur le roi David, en disant : « Que ton Dieu rende le nom de Salomon plus célèbre que ton nom, et qu''il élève son trône plus que ton trône ! » Et le roi s''est prosterné sur son lit. '
  '48':
  - type: note
    content: 'Béni soit le Seigneur, le Dieu d''Israël 8.15 ; 1S 25.32 ; Ps 41.14 ; 106.48 ; 1Ch 16.36 ; 2Ch 2.11 ; 6.4. –  qui a placé…  : certains témoins anciens portent qui a placé aujourd''hui mon fils sur mon trône ou … quelqu''un de ma descendance sur mon trône. –  et qui a permis…  : autre traduction et mes yeux l''ont vu !'
  - type: text
    content: 'Voici encore ce qu''a dit le roi : « Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui a placé aujourd''hui quelqu''un sur mon trône et qui a permis que mes yeux le voient ! » '
  '49':
  - type: note
    content: 'chacun de son côté  : litt. chacun son chemin  ; expression rare qui n''apparaît qu''ici et en Es 53.6.'
  - type: text
    content: 'Tous les invités d''Adonias se mirent à trembler : ils se levèrent et s''en allèrent chacun de son côté. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Adonias  : hébreu ’Adoniya (v. 7,18 ; 2.28 ; 2S 3.4), litt. Yah (= YHWH) est mon seigneur . On trouve aussi la forme ’Adoniyahou (v. 8s,11,13,24s,41-43,49-51 ; 2.13,19,21-24 ; 2Ch 17.8). Certains mss de LXX portent Ornia (par confusion entre les lettres hébraïques correspondant à d et r , qui se ressemblent beaucoup ?). –  fils de Hagguith  : cf. 2S 3.4. –  se mit à élever des prétentions  : litt. s''élevait . –  cinquante gardes du corps  : litt. cinquante hommes qui couraient devant lui , cf. 1S 22.17n  ; 2S 15.1.'
  - type: text
    content: 'Alors Adonias, fils de Hagguith, se mit à élever des prétentions. Il disait : C''est moi qui serai roi ! Il se procura un char, des attelages et cinquante gardes du corps qui allaient devant lui. '
  '50':
  - type: note
    content: 'saisir les cornes de l''autel  : c''est invoquer le droit d''asile attaché au sanctuaire, cf. 2.5s,28-31 ; Ex 21.14 ; Jr 17.1 ; Ps 5.5 ; 27.2s.'
  - type: text
    content: Adonias eut peur de Salomon ; il alla saisir les cornes de l'autel.
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'd''abord  : cf. Gn 25.31nss.'
  - type: text
    content: 'On dit à Salomon : Adonias, par crainte du roi Salomon, a saisi les cornes de l''autel, en disant : « Que le roi Salomon me jure d''abord qu''il ne me fera pas mettre à mort par l''épée, moi, son serviteur ! » '
  '52':
  - type: note
    content: 'On a rapproché cette sentence des maximes symétriques des Proverbes, qui ont été en partie attribuées à Salomon (Pr 1.1+ ; cf. « La littérature de sagesse »♦) ; voir aussi Gn 4.6. –  homme de valeur  : litt. fils de force (hébreu ben hayil) ; cf. v. 42n. Même expression hébraïque en 1S 14.52n (vaillant) ; 18.17n (vaillance) ; 2Ch 17.7 (sous forme d''un nom propre  : Ben-Haïl).'
  - type: text
    content: 'Salomon dit : S''il se comporte en homme de valeur, il ne tombera pas à terre un seul de ses cheveux ; mais si l''on trouve chez lui quelque chose de mauvais, il mourra ! '
  '53':
  - type: text
    content: 'Le roi Salomon envoya des gens qui le firent descendre de l''autel. Il vint se prosterner devant le roi Salomon, et Salomon lui dit : Rentre chez toi.'
  '6':
  - type: note
    content: 'et il était né  : litt. et elle (Hagguith) l''avait enfanté  ; cf. 2S 3.3s ; voir aussi 1Ch 3.2.'
  - type: text
    content: 'Jamais, sa vie durant, son père ne l''avait peiné en lui disant : Pourquoi agis-tu ainsi ? En outre, il était très beau, et il était né après Absalom. '
  '7':
  - type: note
    content: 'Il eut un entretien avec  : litt. ses paroles furent avec  ; même expression en 2S 3.17. –  Joab, fils de Tserouya 2.5 ; 2S 14.1 ; 23.18,37 ; 1Ch 11.6,39 ; 26.28. Joab est un neveu de David et son chef d''armée. Sur les deux meurtres de Joab, voir aussi 2S 3.27 ; 20.8-10. –  Abiathar (Mon père est grand) est lié à David par la reconnaissance ; voir 1S 22.20ss. –  donnèrent leur appui  : litt. vinrent au secours derrière.'
  - type: text
    content: 'Il eut un entretien avec Joab, fils de Tserouya, et avec Abiathar, le prêtre ; ceux-ci donnèrent leur appui à Adonias. '
  '8':
  - type: note
    content: 'Tsadoq, le prêtre v. 26,32,34,38s,44s ; 2.35 ; 4.2 ; 2S 15.27 (où il apparaît pour la première fois, sans généalogie) ; 1Ch 16.39 ; 24.6. –  Benaya (YHWH a bâti), fils de Joïada v. 26,32,36,38,44 ; 2.25,29,34s,46 ; 4.4 ; 2S 8.18 ; 20.23 ; 23.20-22 ; 1Ch 11.22,24 ; 18.17 ; 27.5. –  Nathan, le prophète v. 10,22s,32,34,38,44s ; 2S 7.2 ; 12.25 ; Ps 51.2 ; 1Ch 17.1 ; 29.29 ; 2Ch 9.29 ; 29.25. –  Shiméi 2.8,36ss ; voir aussi 2S 16.5-13 ; 19.17-24. –  Réi  : certains mss de LXX portent ses compagnons. Les personnages cités apparaissent en 2S 8.17s, dans l''entourage du roi. –  les vaillants hommes (autres traductions les héros ; les guerriers) constituent la garde personnelle de David, issue de la troupe d''aventuriers qu''il avait réunie au temps de la royauté de Saül (2S 23.8) et dont une liste est donnée en 2S 23.24-39. –  ne se rallièrent pas à  : litt. ne furent pas avec. –  Adonias  : hébreu ’Adoniyahou, cf. v. 5n.'
  - type: text
    content: Mais Tsadoq, le prêtre, Benaya, fils de Joïada, Nathan, le prophète, Shiméi, Réi et les vaillants hommes de David ne se rallièrent pas à Adonias.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sacrifia  : le nombre des sacrifices contribue à la solennité de la fête d''intronisation organisée par Adonias. –  pierre de Zohéleth  : l''étymologie de ce nom, qui n''apparaît qu''ici, est douteuse  : pierre du serpent ou pierre qui roule ( ?). C''est peut-être la source du Dragon de Né 2.13. –  Eïn-Roguel ( Source du Foulon ) : aujourd''hui Bir-Ayyoub ( Puits de Job , en arabe), au sud-ouest de Jérusalem, près du point de jonction entre la vallée du Cédron et la vallée du Tyropéon, cf. Jos 15.7 ; 18.16 ; 2S 17.17.'
  - type: text
    content: 'Adonias sacrifia du petit bétail, du gros bétail et des bêtes grasses près de la pierre de Zohéleth, qui est à côté d''Eïn-Roguel ; il invita tous ses frères, les fils du roi, et tous les hommes de Juda qui étaient au service du roi. '
