document_id: MAT.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus est conduit devant Pilate
  - type: heading
    content: Mc 15.1-2  ; Lc 22.66  ; 23.1  ; Jn 18.28
  - type: text
    content: ' '
  - type: note
    content: 21.23+ ; 26.3s,66 ; Lc 22.66. –  grands prêtres / anciens v. 3 ; 2.4n.
  - type: text
    content: 'Le matin venu, tous les grands prêtres et les anciens du peuple tinrent conseil contre Jésus, pour le faire mettre à mort. '
  '10':
  - type: text
    content: 'et ils les ont données pour le champ du potier, '
  - type: text
    content: comme le Seigneur
  - type: text
    content: ' me '
  - type: text
    content: l'avait ordonné
  - type: text
    content: .
  - type: heading
    content: Pilate interroge Jésus
  - type: heading
    content: Mc 15.2-5  ; Lc 23.2-5,9-10  ; Jn 18.29-38
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 37 ; 2.2 ; 1Tm 6.13 ; voir aussi Juifs . –  C''est toi qui le dis  : cf. 26.25n,64.'
  - type: text
    content: 'Jésus comparut devant le gouverneur. Le gouverneur lui demanda : Es-tu le roi des Juifs, toi ? Jésus lui répondit : C''est toi qui le dis. '
  '12':
  - type: note
    content: 26.63+ ; cf. Lc 23.9s ; Ac 24.1s ; voir aussi prêtres, anciens.
  - type: text
    content: 'Mais il ne répondit rien aux accusations des grands prêtres et des anciens. '
  '13':
  - type: note
    content: Cf. Jn 19.9s.
  - type: text
    content: 'Alors Pilate lui dit : Tu n''entends pas tout ce dont ils t''accusent ? '
  '14':
  - type: text
    content: Mais il ne lui répondit sur aucun point, ce qui étonna beaucoup le gouverneur.
  - type: heading
    content: Jésus est condamné à mort
  - type: heading
    content: Mc 15.6-14  ; Lc 23.13-23  ; Jn 18.39-40
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'fête  : voir calendrier. –  qu''elle voulait  : litt. qu''ils voulaient.'
  - type: text
    content: 'A chaque fête, le gouverneur avait coutume de relâcher un prisonnier pour la foule, celui qu''elle voulait. '
  '16':
  - type: note
    content: 'Jésus Barabbas  : la plupart des mss omettent le nom Jésus (de même v. 17). Jésus (1.21n) était un nom très répandu parmi les Juifs au Ier s. Barabbas signifie en araméen fils du père  ; c''était, semble-t-il, un nom parfois donné aux enfants de père inconnu ; mais on peut aussi l''interpréter comme signifiant simplement fils d''Abba, Abba étant également attesté comme nom propre. D''après Jérôme (voir Vg), un évangile « selon les hébreux » (Evangile des nazaréens  ?) aurait interprété le nom de Barabbas au sens de « fils de leur maître ».'
  - type: text
    content: 'Ils avaient alors un prisonnier fameux, appelé Jésus Barabbas. '
  '17':
  - type: note
    content: V. 22 ; 1.16.
  - type: text
    content: 'Comme ils étaient rassemblés, Pilate leur dit : Lequel voulez-vous que je vous relâche, Jésus Barabbas, ou Jésus qu''on appelle le Christ ? '
  '18':
  - type: note
    content: par envie ou par jalousie  ; cf. Jn 11.47s ; 1Jn 3.12.
  - type: text
    content: Car il savait que c'était par envie qu'ils l'avaient livré.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'tribunal  : cf. Jn 19.13 ; Ac 25.6,17. –  juste Lc 23.47 ; Ac 3.14+ ; Jc 5.6. –  en rêve 1.20+.'
  - type: text
    content: 'Pendant qu''il était assis au tribunal, sa femme lui fit dire : Ne te mêle pas de l''affaire de ce juste, car aujourd''hui j''ai beaucoup souffert en rêve à cause de lui.'
  '2':
  - type: note
    content: Ponce Pilate gouvernait alors la Judée pour le compte de Rome, avec le titre de préfet et peut-être celui de procurateur (Lc 3.1). Le sanhédrin (5.22+) ne pouvait peut-être pas faire exécuter une peine capitale sans son autorisation (Jn 18.31n). Pilate, qui résidait habituellement à Césarée, se trouvait sans doute à Jérusalem en raison de la fête de la Pâque. Cf. Ac 3.13 ; 13.28.
  - type: text
    content: Après l'avoir lié, ils l'emmenèrent et le livrèrent à Pilate, le gouverneur.
  - type: heading
    content: Judas se donne la mort
  '20':
  - type: text
    content: ' '
  - type: note
    content: grands prêtres (2.4n) / anciens 21.23+.
  - type: text
    content: 'Les grands prêtres et les anciens persuadèrent les foules de demander Barabbas et de faire disparaître Jésus. '
  '21':
  - type: note
    content: Ac 3.13s.
  - type: text
    content: 'Le gouverneur leur demanda : Lequel des deux voulez-vous que je vous relâche ? Ils répondirent : Barabbas ! '
  '22':
  - type: note
    content: V. 17+ ; Ac 13.27s.
  - type: text
    content: 'Pilate leur dit : Que ferai-je donc de Jésus, celui qu''on appelle le Christ ? Tous répondirent : Qu''il soit crucifié ! '
  '23':
  - type: note
    content: Lc 23.41 ; Jn 8.46 ; 14.30.
  - type: text
    content: 'Il reprit : Quel mal a-t-il donc fait ? Mais ils crièrent de plus belle : Qu''il soit crucifié !'
  - type: heading
    content: Mc 15.15  ; Lc 23.24-25  ; Jn 19.16
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'du sang de cet homme  : autre traduction de ce sang  ; certains mss portent du sang de ce juste  ; cf. v. 4n,19 ; cf. Dt 21.6-8 ; 2S 3.28 ; Ps 26.6 ; 73.13 ; Ac 20.26.'
  - type: text
    content: 'Pilate, voyant que cela ne servait à rien, mais que l''agitation augmentait, prit de l''eau, se lava les mains devant la foule et dit : Je suis innocent du sang de cet homme. C''est votre affaire. '
  '25':
  - type: note
    content: 'Que son sang (c.-à-d. les conséquences de sa mort) soit (ou retombe, le verbe est sous-entendu dans le texte) sur nous 23.35s ; cf. 2S 1.16 ; 14.9 ; Jr 51.35 ; Ac 5.28 ; 18.6. –  enfants Ex 20.5 ; Lm 5.7. – Cf. Testament de Lévi 16.3s (allusion au Maître de justice de Qumrân, ou ajout chrétien dans un texte juif ?) : « L''homme qui aura renouvelé la Loi par la puissance du Très-Haut, vous le saluerez du titre d''imposteur et, finalement, vous vous jetterez sur lui pour le tuer, ne sachant pas qu''il se relèvera et faisant retomber dans votre malice le sang innocent sur votre tête. Mais, je vous le dis, à cause de lui votre sanctuaire sera souillé jusqu''aux fondements. »'
  - type: text
    content: 'Tout le peuple répondit : Que son sang soit sur nous et sur nos enfants ! '
  '26':
  - type: note
    content: 20.19 ; Es 50.6.
  - type: text
    content: Alors Pilate leur relâcha Barabbas ; et après avoir fait flageller Jésus, il le livra pour qu'il soit crucifié.
  - type: heading
    content: Les soldats se moquent de Jésus
  - type: heading
    content: Mc 15.16-20  ; Lc 23.11  ; Jn 19.2-3
  '27':
  - type: text
    content: 'Les soldats du gouverneur conduisirent Jésus dans le prétoire, et ils rassemblèrent autour de lui toute la cohorte. '
  '28':
  - type: note
    content: 'manteau écarlate  : symbole de royauté dont les soldats affublent Jésus par dérision. De même la parodie de la couronne et du sceptre au v. 29.'
  - type: text
    content: 'Ils lui ôtèrent ses vêtements et le couvrirent d''un manteau écarlate. '
  '29':
  - type: note
    content: V. 11 ; cf. Ps 22.8 ; 69.21. –  Bonjour 26.49n. –  roi des Juifs v. 11,37 ; 2.2.
  - type: text
    content: 'Ils tressèrent une couronne d''épines qu''ils lui posèrent sur la tête, et ils lui mirent un roseau dans la main droite ; puis ils se mirent à genoux devant lui pour se moquer de lui, en disant : Bonjour, roi des Juifs ! '
  '3':
  - type: text
    content: ' '
  - type: note
    content: remords 21.29n. –  trente pièces 26.15 ; cf. Jb 20.20-22. –  grands prêtres (2.4n) / anciens 21.23+.
  - type: text
    content: 'Voyant qu''il avait été condamné, Judas, qui l''avait livré, fut pris de remords et rapporta les trente pièces d''argent aux grands prêtres et aux anciens, '
  '30':
  - type: note
    content: 26.67+.
  - type: text
    content: 'Et ils lui crachaient dessus, prenaient le roseau et le frappaient sur la tête. '
  '31':
  - type: text
    content: Après s'être ainsi moqués de lui, ils lui ôtèrent le manteau, lui remirent ses vêtements et l'emmenèrent pour le crucifier.
  - type: heading
    content: Jésus est crucifié
  - type: heading
    content: Mc 15.21-32  ; Lc 23.26-43  ; Jn 19.16-24
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cyrène  : capitale de la Libye supérieure, sur la côte africaine. Comme dans de nombreuses autres contrées, il s''y trouvait une colonie juive dont Simon avait dû faire partie (cf. Ac 2.10 ; 6.9 ; 11.20). –  réquisitionnèrent 5.41n  ; cf. Lv 16.21. –  sa croix (celle de Jésus) : il s''agit sans doute seulement de la poutre transversale où l''on fixait les bras du crucifié, le poteau vertical restant habituellement sur les lieux mêmes de l''exécution.'
  - type: text
    content: En sortant, ils trouvèrent un homme de Cyrène nommé Simon, et ils le réquisitionnèrent pour porter sa croix.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Mc 15.22n.
  - type: text
    content: 'Arrivés au lieu qu''on appelle Golgotha, ce qui signifie « Lieu du Crâne », '
  '34':
  - type: note
    content: 'Le vin était de toute évidence destiné à faire perdre connaissance au condamné ; cf. Pr 31.6s ; Mc 15.23n. Le fiel, par son amertume, rendrait la boisson imbuvable ; on pourrait aussi comprendre du vin empoisonné, cf. Dt 29.17 ; voir Ps 69.22. –  Epître de Barnabé 7.3 : « Mais, de plus, sur la croix on lui donna à boire du vinaigre et du fiel » (l''auteur interprète ce détail à la lumière d''une tradition non biblique sur le jour de l''Expiation, selon laquelle les prêtres auraient mangé avec du vinaigre, pendant le jeûne, les entrailles du bouc offert pour le péché ; cf. les herbes amères accompagnant la Pâque selon Ex 12.8s).'
  - type: text
    content: ils lui donnèrent à boire du vin mêlé de fiel, mais, quand il l'eut goûté, il ne voulut pas boire.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'crucifié Jn 3.14 ; Ga 3.13 ; Ph 2.8. –  Ps 22.19 . Certains mss ajoutent à la fin du v.  : afin que s''accomplisse ce qui avait été dit par l''entremise du prophète : Ils se sont partagé mes vêtements, et ils ont tiré au sort ma robe  ; cf. Jn 19.24.'
  - type: text
    content: 'Après l''avoir crucifié, '
  - type: text
    content: ils se partagèrent
  - type: text
    content: ' ses '
  - type: text
    content: vêtements, en tirant au sort
  - type: text
    content: '. '
  '36':
  - type: text
    content: Puis ils s'assirent pour monter la garde devant lui.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'le motif de sa condamnation  : le terme grec correspondant a été traduit par motif en 19.3 et par condition en 19.7. –  Cet homme  : litt. celui-ci . –  roi des Juifs v. 11,29 ; 2.2.'
  - type: text
    content: 'On plaça au-dessus de sa tête une inscription indiquant le motif de sa condamnation :'
  - type: text
    content: « Cet homme est Jésus, le roi des Juifs. »
  '38':
  - type: text
    content: ' '
  - type: note
    content: 26.55 ; Es 53.12. Cf. Mt 20.23.
  - type: text
    content: Alors deux bandits sont crucifiés avec lui, l'un à droite, l'autre à gauche.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'l''injuriaient ou le calomniaient  ; le même verbe est traduit par blasphémer en 9.3 ; 26.65 ; le substantif correspondant peut signifier blasphème (12.31) ou calomnie (15.19). –  hochant la tête  : geste de dégoût ou de moquerie (v. 40s) ; cf. Jr 18.16n  ; Ps 22.8 ; 109.25 ; Lm 2.15.'
  - type: text
    content: 'Les passants l''injuriaient en hochant la tête. '
  '4':
  - type: note
    content: 'V. 24 ; 23.35 ; Dt 27.25 ; voir aussi péché. –  en livrant le sang innocent  : c.-à-d. en livrant un innocent à la mort. –  C''est ton affaire  : litt. c''est toi qui verras.'
  - type: text
    content: 'en disant : J''ai péché, en livrant le sang innocent. Ils répondirent : Que nous importe ? C''est ton affaire. '
  '40':
  - type: note
    content: 4.3 ; 26.61n.
  - type: text
    content: 'Ils disaient : Toi qui détruis le sanctuaire et qui le reconstruis en trois jours, sauve-toi toi-même ! Si tu es Fils de Dieu, descends de la croix !'
  '41':
  - type: text
    content: ' '
  - type: note
    content: grands prêtres / scribes / anciens 2.4n  ; 16.21 ; 21.15,23+ ; 26.57 ; Mc 11.27.
  - type: text
    content: 'Les grands prêtres, avec les scribes et les anciens, se moquaient aussi de lui et disaient : '
  '42':
  - type: note
    content: Lc 4.23 ; 1Co 1.18. –  roi d'Israël So 3.15.
  - type: text
    content: 'Il en a sauvé d''autres, et il ne peut pas se sauver lui-même ! Il est roi d''Israël : qu''il descende de la croix, et nous croirons en lui ! '
  '43':
  - type: note
    content: 's''il l''aime  : litt. s''il le veut, c.-à-d. si Dieu veut Jésus  ; cf. Es 36.7,20 ; Ps 22.9  ; 42.11. –  Fils de Dieu 16.16+ ; 26.63 ; Jn 5.17s ; 10.30-36. Cf. Sagesse 2.13,18-20 : « Il déclare posséder la connaissance de Dieu et il se nomme enfant du Seigneur. (…) Voyons si ses paroles sont vraies et vérifions comment il finira. Si le juste est fils de Dieu, alors celui-ci viendra à son secours et l''arrachera aux mains de ses adversaires. Mettons-le à l''épreuve par l''outrage et la torture pour juger de sa sérénité et apprécier son endurance. Condamnons-le à une mort honteuse, puisque, selon ses dires, une intervention divine aura lieu en sa faveur. »'
  - type: text
    content: Il s'est confié en Dieu ; que Dieu le délivre maintenant, s'il l'aime
  - type: text
    content: '. Car il a dit : « Je suis Fils de Dieu ! »'
  '44':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 23.39-43.
  - type: text
    content: Les bandits crucifiés avec lui l'insultaient de la même manière.
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: Mc 15.33-39  ; Lc 23.44-48  ; Jn 19.28-30
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'Depuis la sixième heure…  : c.-à-d. de midi à 15 h environ ; cf. Am 8.9 ; voir aussi Jr 15.9.'
  - type: text
    content: 'Depuis la sixième heure jusqu''à la neuvième heure il y eut des ténèbres sur toute la terre. '
  '46':
  - type: note
    content: 'cria  : litt. cria d''une grande voix  ; cf. v. 50n. –  Ps 22.2.'
  - type: text
    content: 'Et vers la neuvième heure, Jésus cria :'
  - type: text
    content: Eli, Eli, lema sabachthani ?
  - type: text
    content: 'c''est-à-dire : '
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ?
  - type: text
    content: ' '
  '47':
  - type: note
    content: 'En voilà un…  : litt. celui-ci appelle Elie.'
  - type: text
    content: 'Quelques-uns de ceux qui étaient là l''entendirent ; ils disaient : En voilà un qui appelle Elie. '
  '48':
  - type: note
    content: 'vin aigre  : il s''agit d''une boisson populaire à l''époque, notamment chez les soldats romains ; le mot signifie aussi vinaigre  ; cf. Ps 69.22 ; Lc 23.36 ; Jn 19.29s ; voir aussi Rt 2.14.'
  - type: text
    content: 'Aussitôt l''un d''eux courut prendre une éponge, qu''il remplit de vin aigre ; il la fixa à un roseau pour lui donner à boire. '
  '49':
  - type: text
    content: 'Mais les autres dirent : Laisse, voyons si Elie va venir le sauver. '
  '5':
  - type: note
    content: Ac 1.18 ; cf. 2S 17.23.
  - type: text
    content: Judas jeta les pièces d'argent dans le sanctuaire et s'éloigna pour aller se pendre.
  '50':
  - type: note
    content: 'poussa…  : litt. ayant de nouveau crié d''une grande voix. –  rendit  : le même verbe est traduit par laisser échapper en Mc 15.37. –  l''esprit ou le souffle.'
  - type: text
    content: Jésus poussa encore un grand cri et rendit l'esprit.
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'voile Ex 26.31-33 ; Hé 6.19. –  trembla 21.10n  ; 24.7 ; 28.2 ; Hé 12.26. –  se fendirent  : litt. se déchirèrent , comme pour le voile du sanctuaire ; cf. Es 63.19 ; Lc 19.40.'
  - type: text
    content: 'Alors le voile du sanctuaire se déchira en deux, d''en haut jusqu''en bas, la terre trembla, les rochers se fendirent, '
  '52':
  - type: note
    content: 'saints endormis, c.-à-d. morts. Es 26.19 ; Ez 37.12s ; Dn 12.2. –  se réveillèrent ou furent éveillés, ou encore se relevèrent (2.13n). Cf. Epître d''Ignace d''Antioche aux Magnésiens 9.2 : « Comment pourrions-nous vivre sans lui (Jésus-Christ), puisque les prophètes aussi, étant ses disciples par l''Esprit, l''attendaient comme leur maître ? Et c''est pourquoi celui qu''ils attendaient dans la justice les a par sa présence ressuscités des morts. »'
  - type: text
    content: 'les tombeaux s''ouvrirent et les corps de beaucoup de saints endormis se réveillèrent. '
  '53':
  - type: note
    content: 1Co 15.20. –  son réveil ou sa résurrection  ; le substantif correspondant n'apparaît qu'ici dans le N.T. (verbe apparenté au v. 52). –  ville sainte 4.5+.
  - type: text
    content: Sortis des tombeaux après son réveil, ils entrèrent dans la ville sainte et se manifestèrent à beaucoup de gens.
  '54':
  - type: text
    content: ' '
  - type: note
    content: V. 43 ; 14.33 ; 16.16+ ; cf. 17.6n. –  crainte 9.8+. –  Fils de Dieu 16.16+.
  - type: text
    content: 'Voyant le tremblement de terre et ce qui venait d''arriver, le centurion et ceux qui étaient avec lui pour garder Jésus furent saisis d''une grande crainte et dirent : Celui-ci était vraiment Fils de Dieu.'
  - type: heading
    content: Le corps de Jésus est mis au sépulcre
  - type: heading
    content: Mc 15.40-47  ; Lc 23.49-56  ; Jn 19.25,38-42
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'beaucoup de femmes  : autre traduction plusieurs femmes  ; v. 61 ; 28.1/ /. –  de loin  : cf. Ps 38.12. –  servir 4.11n  ; Lc 8.3.'
  - type: text
    content: 'Il y avait là beaucoup de femmes qui regardaient de loin, celles-là même qui avaient accompagné Jésus depuis la Galilée, pour le servir. '
  '56':
  - type: note
    content: 'Madeleine  : ce nom signifie sans doute qu''elle était originaire de Magdala, bourg proche du lac de Galilée (cf. Lc 8.2 ; Jn 20.1). –  Marie, mère…  : cf. Mc 15.40. –  mère des fils de Zébédée 4.21 ; 20.20 ; c''est peut-être la Salomé de Mc 15.40.'
  - type: text
    content: Parmi elles, il y avait Marie-Madeleine, Marie, mère de Jacques et de Joseph, et la mère des fils de Zébédée.
  '57':
  - type: text
    content: ' '
  - type: note
    content: 'Arimathée  : on identifie généralement cette ville à Rama (ou Ramataïm), dans la région montagneuse d''Ephraïm (cf. 1S 1.1), à environ 35 km au nord-ouest de Jérusalem.'
  - type: text
    content: 'Le soir venu, un homme riche d''Arimathée nommé Joseph, qui était lui aussi disciple de Jésus, arriva. '
  '58':
  - type: note
    content: Dt 21.22s.
  - type: text
    content: 'Il se rendit chez Pilate et demanda le corps de Jésus. Alors Pilate ordonna qu''on le lui remette. '
  '59':
  - type: note
    content: '1R 13.29-31. –  pur  : autre traduction propre.'
  - type: text
    content: 'Joseph prit le corps, l''enveloppa d''un drap pur '
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'korbanas  : Mt transcrit un terme technique araméen (cf. Mc 7.11n). Celui-ci désigne le trésor sacré qui renfermait les dons et contributions destinés à l''entretien du culte ; cf. Dt 23.19 ; Za 11.13n. –  prix  : le même mot grec est traduit par valeur au v. 9.'
  - type: text
    content: 'Les grands prêtres ramassèrent les pièces et dirent : Il n''est pas permis de les remettre dans le '
  - type: text
    content: korbanas,
  - type: text
    content: ' puisque c''est le prix du sang. '
  '60':
  - type: note
    content: Es 53.9 ; cf. Mc 16.4 ; Jn 11.38.
  - type: text
    content: 'et le mit dans un tombeau neuf, qu''il s''était fait tailler dans le roc. Puis il roula une grande pierre à l''entrée du tombeau et s''en alla. '
  '61':
  - type: note
    content: V. 56n.
  - type: text
    content: Marie-Madeleine et l'autre Marie étaient là, assises en face du sépulcre.
  - type: heading
    content: La garde est placée devant le sépulcre
  '62':
  - type: text
    content: ' '
  - type: note
    content: 'la Préparation  : le vendredi, jour où l''on prépare le sabbat (Mc 15.42) ; le lendemain est donc le sabbat ; cf. Jn 19.14n. –  grands prêtres / pharisiens 21.45.'
  - type: text
    content: 'Le lendemain, c''est-à-dire le jour après la Préparation, les grands prêtres et les pharisiens allèrent ensemble trouver Pilate '
  '63':
  - type: note
    content: 'imposteur ou trompeur  : le terme grec est dérivé du verbe habituellement traduit par égarer 24.4+ ; cf. Jn 7.12,47 ; voir aussi 2Co 6.8 ; 1Tm 4.1 ; 2Jn 7. –  Après trois jours 16.21+ ; cf. Jn 2.19ss. –  réveillerai ou relèverai, 2.13n (de même dans la suite) ; voir résurrection.'
  - type: text
    content: 'et dirent : Seigneur, nous nous souvenons que cet imposteur a dit, quand il vivait encore : « Après trois jours je me réveillerai. » '
  '64':
  - type: note
    content: 'dérober le corps  : litt. le dérober 28.13,15. –  imposture  : le mot correspondant est traduit ailleurs par égarement ou erreur, cf. Rm 1.27 ; Ep 4.14n  ; 1Th 2.3 ; 2Th 2.11 ; Jc 5.20 ; 2P 2.18 ; 3.17 ; 1Jn 4.6 ; Jd 11.'
  - type: text
    content: 'Ordonne donc qu''on mette le sépulcre sous surveillance jusqu''au troisième jour, afin que ses disciples ne viennent pas dérober le corps et dire au peuple : « Il s''est réveillé d''entre les morts. » Cette dernière imposture serait encore pire que la première. '
  '65':
  - type: note
    content: 'Vous avez  : on pourrait aussi traduire  : tenez, voici (une garde) (cf. 28.14). –  eh bien  : litt. allez.'
  - type: text
    content: 'Pilate leur dit : Vous avez une garde ; eh bien, mettez-le sous surveillance comme vous l''entendez. '
  '66':
  - type: note
    content: Dn 6.17s.
  - type: text
    content: Ils s'en allèrent donc et mirent le sépulcre sous surveillance, en scellant la pierre et en postant la garde.
  '7':
  - type: text
    content: 'Après avoir tenu conseil, ils achetèrent avec cet argent le champ du potier, pour y ensevelir les étrangers. '
  '8':
  - type: note
    content: Cf. Ac 1.19.
  - type: text
    content: 'C''est pourquoi ce champ a été appelé champ du sang, jusqu''à ce jour. '
  '9':
  - type: note
    content: 'Za 11.12-13n  ; cf. Jr 18.2s ; 19.1s ; 32.7-9. –  Ils ont pris  : certains mss portent j''ai pris  ; de même au v. 10 je les ai données. –  le prix…  : litt. le prix de celui qui a été apprécié, qu''on a apprécié de la part des fils d''Israël.'
  - type: text
    content: 'Alors s''accomplit ce qui avait été dit par l''entremise du prophète Jérémie : '
  - type: text
    content: Ils ont pris les trente pièces d'argent, le prix attribué
  - type: text
    content: ' par les Israélites '
  - type: text
    content: à celui qu'ils ont apprécié,
  - type: text
    content: ' '
