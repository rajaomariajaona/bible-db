    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est ton affaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est toi qui verras.
    marker-yv: yv-n
  - type: text
    text: 'en disant : J''ai péché, en livrant le sang innocent. Ils répondirent : Que nous importe ? C''est ton affaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
