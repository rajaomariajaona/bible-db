  - type: text
    text: 'Ordonne donc qu''on mette le sépulcre sous surveillance jusqu''au troisième jour, afin que ses disciples ne viennent pas dérober le corps et dire au peuple : « Il s''est réveillé d''entre les morts. » Cette dernière imposture serait encore pire que la première. '
