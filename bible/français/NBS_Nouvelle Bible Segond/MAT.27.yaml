      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.23+ ; 26.3s,66 ; Lc 22.66. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grands '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3 ; 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le matin venu, tous les grands prêtres et les anciens du peuple tinrent conseil contre Jésus, pour le faire mettre à mort. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils les ont données pour le champ du potier, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comme le Seigneur
    - type: text
      text: ' me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: l'avait ordonné
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pilate interroge Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mc 15.2-5  ; Lc 23.2-5,9-10  ; Jn 18.29-38
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 37 ; 2.2 ; 1Tm 6.13 ; voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est toi qui le dis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 26.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',64.'
      marker-yv: yv-n
    - type: text
      text: 'Jésus comparut devant le gouverneur. Le gouverneur lui demanda : Es-tu le roi des Juifs, toi ? Jésus lui répondit : C''est toi qui le dis. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.63+ ; cf. Lc 23.9s ; Ac 24.1s ; voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais il ne répondit rien aux accusations des grands prêtres et des anciens. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jn 19.9s.
      marker-yv: yv-n
    - type: text
      text: 'Alors Pilate lui dit : Tu n''entends pas tout ce dont ils t''accusent ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il ne lui répondit sur aucun point, ce qui étonna beaucoup le gouverneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus est condamné à mort
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mc 15.6-14  ; Lc 23.13-23  ; Jn 18.39-40
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'elle voulait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ils voulaient.
      marker-yv: yv-n
    - type: text
      text: 'A chaque fête, le gouverneur avait coutume de relâcher un prisonnier pour la foule, celui qu''elle voulait. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jésus Barabbas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la plupart des mss omettent le nom '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jésus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même v. 17). '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jésus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) était un nom très répandu parmi les Juifs au I
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' s. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Barabbas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie en araméen '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils du père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; c''était, semble-t-il, un nom parfois donné aux enfants de père inconnu ; mais on peut aussi l''interpréter comme signifiant simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils d'Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Abba étant également attesté comme nom propre. D''après Jérôme (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ), un évangile « selon les hébreux » (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nazaréens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ?) aurait interprété le nom de Barabbas au sens de « fils de leur maître ».'
      marker-yv: yv-n
    - type: text
      text: 'Ils avaient alors un prisonnier fameux, appelé Jésus Barabbas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 22 ; 1.16.
      marker-yv: yv-n
    - type: text
      text: 'Comme ils étaient rassemblés, Pilate leur dit : Lequel voulez-vous que je vous relâche, Jésus Barabbas, ou Jésus qu''on appelle le Christ ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par envie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par jalousie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jn 11.47s ; 1Jn 3.12.'
      marker-yv: yv-n
    - type: text
      text: Car il savait que c'était par envie qu'ils l'avaient livré.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tribunal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jn 19.13 ; Ac 25.6,17. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 23.47 ; Ac 3.14+ ; Jc 5.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en rêve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.20+.
      marker-yv: yv-n
    - type: text
      text: 'Pendant qu''il était assis au tribunal, sa femme lui fit dire : Ne te mêle pas de l''affaire de ce juste, car aujourd''hui j''ai beaucoup souffert en rêve à cause de lui.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ponce '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pilate '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: gouvernait alors la Judée pour le compte de Rome, avec le titre de préfet et peut-être celui de procurateur (Lc 3.1). Le sanhédrin (5.22+) ne pouvait peut-être pas faire exécuter une peine capitale sans son autorisation (Jn 18.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Pilate, qui résidait habituellement à Césarée, se trouvait sans doute à Jérusalem en raison de la fête de la Pâque. Cf. Ac 3.13 ; 13.28.
      marker-yv: yv-n
    - type: text
      text: Après l'avoir lié, ils l'emmenèrent et le livrèrent à Pilate, le gouverneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judas se donne la mort
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grands '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') / '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.23+.
      marker-yv: yv-n
    - type: text
      text: 'Les grands prêtres et les anciens persuadèrent les foules de demander Barabbas et de faire disparaître Jésus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ac 3.13s.
      marker-yv: yv-n
    - type: text
      text: 'Le gouverneur leur demanda : Lequel des deux voulez-vous que je vous relâche ? Ils répondirent : Barabbas ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 17+ ; Ac 13.27s.
      marker-yv: yv-n
    - type: text
      text: 'Pilate leur dit : Que ferai-je donc de Jésus, celui qu''on appelle le Christ ? Tous répondirent : Qu''il soit crucifié ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 23.41 ; Jn 8.46 ; 14.30.
      marker-yv: yv-n
    - type: text
      text: 'Il reprit : Quel mal a-t-il donc fait ? Mais ils crièrent de plus belle : Qu''il soit crucifié !'
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mc 15.15  ; Lc 23.24-25  ; Jn 19.16
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' de cet homme'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ce sang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du sang de ce juste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',19 ; cf. Dt 21.6-8 ; 2S 3.28 ; Ps 26.6 ; 73.13 ; Ac 20.26.'
      marker-yv: yv-n
    - type: text
      text: 'Pilate, voyant que cela ne servait à rien, mais que l''agitation augmentait, prit de l''eau, se lava les mains devant la foule et dit : Je suis innocent du sang de cet homme. C''est votre affaire. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que son sang '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les conséquences de sa mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: retombe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le verbe est sous-entendu dans le texte) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.35s ; cf. 2S 1.16 ; 14.9 ; Jr 51.35 ; Ac 5.28 ; 18.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'enfants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 20.5 ; Lm 5.7. – Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Lévi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.3s (allusion au Maître de justice de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ', ou ajout chrétien dans un texte juif ?) : « L''homme qui aura renouvelé la Loi par la puissance du Très-Haut, vous le saluerez du titre d''imposteur et, finalement, vous vous jetterez sur lui pour le tuer, ne sachant pas qu''il se relèvera et faisant retomber dans votre malice le sang innocent sur votre tête. Mais, je vous le dis, à cause de lui votre sanctuaire sera souillé jusqu''aux fondements. »'
      marker-yv: yv-n
    - type: text
      text: 'Tout le peuple répondit : Que son sang soit sur nous et sur nos enfants ! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.19 ; Es 50.6.
      marker-yv: yv-n
    - type: text
      text: Alors Pilate leur relâcha Barabbas ; et après avoir fait flageller Jésus, il le livra pour qu'il soit crucifié.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les soldats se moquent de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mc 15.16-20  ; Lc 23.11  ; Jn 19.2-3
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats du gouverneur conduisirent Jésus dans le prétoire, et ils rassemblèrent autour de lui toute la cohorte. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: manteau écarlate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : symbole de royauté dont les soldats affublent Jésus par dérision. De même la parodie de la couronne et du sceptre au v. 29.'
      marker-yv: yv-n
    - type: text
      text: 'Ils lui ôtèrent ses vêtements et le couvrirent d''un manteau écarlate. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.29 '
      - type: usfm
        marker: ft
        children:
