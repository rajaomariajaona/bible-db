  - type: text
    text: 'Jésus comparut devant le gouverneur. Le gouverneur lui demanda : Es-tu le roi des Juifs, toi ? Jésus lui répondit : C''est toi qui le dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.63+ ; cf. Lc 23.9s ; Ac 24.1s ; voir aussi '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ', '
      - type: usfm
        marker: w
