    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par jalousie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jn 11.47s ; 1Jn 3.12.'
    marker-yv: yv-n
  - type: text
