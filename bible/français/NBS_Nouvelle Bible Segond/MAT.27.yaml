  - type: text
    text: 'Les grands prêtres ramassèrent les pièces et dirent : Il n''est pas permis de les remettre dans le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: korbanas,
  - type: text
    text: ' puisque c''est le prix du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après avoir tenu conseil, ils achetèrent avec cet argent le champ du potier, pour y ensevelir les étrangers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 1.19.
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi ce champ a été appelé champ du sang, jusqu''à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
