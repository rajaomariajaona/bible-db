  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 12 raconte aussi les efforts pour réparer le temple, mais les Chroniques font apparaître certains points ou thèmes particuliers. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'eut à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.7 ; 29.9 ; 2S 7.3. –  '
    - type: usfm
      marker: fq
