document_id: 2CH.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joas, roi de Juda
  - type: heading
    content: 2R 12.1-4
  - type: text
    content: ' '
  - type: note
    content: quarante ans ≈ 835-796 av. J.-C.
  - type: text
    content: 'Joas avait sept ans lorsqu''il devint roi ; il régna quarante ans à Jérusalem. Le nom de sa mère était Tsibia ; elle était de Bersabée. '
  '10':
  - type: note
    content: 'Tous les chefs et tout le peuple s''en réjouirent  : remarque propre aux Chroniques, cf. v. 5.'
  - type: text
    content: 'Tous les chefs et tout le peuple s''en réjouirent ; ils l''apportaient et la jetaient dans le coffre jusqu''à ce qu''il soit plein : '
  '11':
  - type: note
    content: 'lévites  : cf. v. 5n. – Voir scribe.'
  - type: text
    content: 'quand c''était le moment d''apporter le coffre à l''inspection royale par l''intermédiaire des lévites – c''est-à-dire quand on voyait qu''il y avait beaucoup d''argent – le scribe du roi et l''inspecteur du prêtre en chef venaient vider le coffre ; ils le prenaient et le remettaient à sa place ; ils procédaient ainsi journellement et recueillaient de l''argent en abondance. '
  '12':
  - type: note
    content: 'Joïada  : un ms hébreu et LXX précisent le prêtre Joïada. –  ceux qui faisaient  : le texte porte un singulier (collectif) ; quelques mss hébreux et des versions anciennes ont le pluriel ; certains traduisent par maître d''œuvre ou entrepreneur des travaux. –  ils engageaient comme salariés, selon le sens du verbe hébreu.'
  - type: text
    content: 'Le roi et Joïada le donnaient à ceux qui faisaient les travaux pour le service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils engageaient des tailleurs de pierre et des charpentiers pour restaurer la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ainsi que des ouvriers sur fer et sur bronze, pour réparer la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'les réparations avancèrent  : l''expression en hébreu apparaît en général pour une blessure qui se cicatrise ; cf. Né 4.1n.'
  - type: text
    content: 'Ceux qui faisaient les travaux se mirent à l''ouvrage, et grâce à eux les réparations avancèrent. Ils remirent en état la maison de Dieu et la consolidèrent. '
  '14':
  - type: note
    content: 'On en fit  : litt. il en fit. –  des ustensiles…  : litt. des objets de service et les holocaustes  ; 1.6+. –  d''autres  : sous-entendu dans le texte. –  pendant tous les jours de Joïada  : cf. v. 2 ; 2R 12.3.'
  - type: text
    content: 'Lorsqu''ils eurent achevé, ils apportèrent devant le roi et devant Joïada le reste de l''argent. On en fit des objets pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', des ustensiles pour officier, des ustensiles pour les holocaustes, des coupes, et d''autres objets d''or et d''argent. Et, pendant tous les jours de Joïada, on offrit constamment des holocaustes dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Joas devient infidèle à Dieu
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 15-22 n'ont pas de parallèle dans les Rois ; les Chroniques expliquent les causes religieuses des revers que connaîtra la fin du règne de Joas. Voir l'introduction aux Chroniques♦.
  - type: text
    content: 'Joïada devint vieux et mourut rassasié de jours. Il avait cent trente ans à sa mort. '
  '16':
  - type: note
    content: 'Comparer avec v. 25n. –  dans la Ville de David  : cf. 9.31+ ; 2S 5.7n.'
  - type: text
    content: On l'ensevelit dans la Ville de David avec les rois, parce qu'il avait fait du bien en Israël, ainsi qu'à l'égard de Dieu et de sa maison.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'les chefs de Juda  : peut-être une opposition à l''influence des lévites et des prêtres.'
  - type: text
    content: 'Après la mort de Joïada, les chefs de Juda vinrent se prosterner devant le roi. Alors le roi les écouta. '
  '18':
  - type: note
    content: 'Ils abandonnèrent  : cf. v. 20,24 ; verbe très fréquent dans les Chroniques, avec le thème de la punition divine qui résulte de cet abandon ; cf. 7.19,22 ; 12.5 ; 13.10s ; 15.2 ; 21.10 ; 28.6 ; 29.6 ; 34.25. –  la maison  : quelques mss hébreux portent l''alliance  ; LXX le Seigneur, le Dieu de leurs pères… –  les Ashéras  : autre traduction les poteaux cultuels, cf. Jg 3.7n. –  La Colère  : cf. 19.2+,10 ; 32.25s ; Nb 1.53n  ; voir aussi 2Ch 29.8.'
  - type: text
    content: 'Ils abandonnèrent la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de leurs pères, et ils servirent les Ashéras et les idoles. La Colère s''abattit sur Juda et Jérusalem, parce qu''ils s''étaient ainsi mis en tort. '
  '19':
  - type: note
    content: 'Cf. 36.15s ; voir aussi Mt 21.34. –  les avertirent  : autre traduction témoignèrent contre eux.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya parmi eux des prophètes pour les ramener à lui. Ceux-ci les avertirent, mais ils ne prêtèrent pas l''oreille. '
  '2':
  - type: note
    content: 'ce qui convenait…  : cf. 20.32n. –  tous les jours de Joïada v. 14 ; cf. 2R 12.3n.'
  - type: text
    content: 'Joas fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant tous les jours de Joïada, le prêtre. '
  '20':
  - type: note
    content: 'Zacharie  : ce prophète n''est pas celui du livre de Zacharie. –  fut revêtu du souffle (ou de l''Esprit) de Dieu  : cf. Jg 3.10+ ; 1Ch 12.19. –  Vous ne prospérerez pas  : autres traductions vous ne réussirez pas ; vous ne vaincrez pas, cf. 13.12 ; Jr 32.5.'
  - type: text
    content: 'Zacharie, fils de Joïada, le prêtre, fut revêtu du souffle de Dieu ; il se présenta devant le peuple et lui dit : Ainsi parle Dieu : Pourquoi passez-vous outre aux commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Vous ne prospérerez pas, car vous avez abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il vous abandonnera. '
  '21':
  - type: note
    content: 'et le lapidèrent  : cf. Jos 7.25n  ; 1R 21.8ss ; voir aussi Hé 11.37. –  dans la cour de la maison du Seigneur  : c''est probablement du meurtre de ce Zacharie qu''il est question en Mt 23.35 ; Lc 11.51.'
  - type: text
    content: 'Alors ils conspirèrent contre lui et le lapidèrent par ordre du roi, dans la cour de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: note
    content: 'père de Zacharie  : litt. son père.'
  - type: text
    content: 'Le roi Joas ne se souvint pas de la fidélité que Joïada, père de Zacharie, avait montrée envers lui : il tua son fils. Zacharie dit en mourant : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voie et qu''il demande des comptes !'
  - type: heading
    content: Fin du règne de Joas
  - type: heading
    content: 2R 12.18-22
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'A la fin de l''année  : cf. Ex 34.22 ; 1S 1.20. –  massacrèrent  : litt. détruisirent . –  les chefs du peuple  : cf. v. 17. –  au roi de Damas  : cf. 2R 12.18.'
  - type: text
    content: 'A la fin de l''année, l''armée des Araméens partit à l''attaque de Joas. Ils vinrent en Juda et à Jérusalem. Ils massacrèrent parmi le peuple tous les chefs du peuple et ils envoyèrent au roi de Damas tout leur butin. '
  '24':
  - type: note
    content: 'un petit nombre d''hommes  : voir, par contraste, 20.2,12 ; dans les Chroniques, les rois impies connaissent la défaite au combat ; voir l''introduction aux Chroniques♦. –  ils avaient abandonné  : cf. v. 18n. –  ils exécutèrent des jugements  : cf. Ex 12.12 ; Ez 5.10n,15 ; 11.9.'
  - type: text
    content: 'L''armée des Araméens arriva avec un petit nombre d''hommes ; cependant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur livra une armée très grande, parce qu''ils avaient abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères. Ainsi ils exécutèrent des jugements contre Joas. '
  '25':
  - type: note
    content: 'les gens de sa cour conspirèrent contre lui  : cf. 25.27s. –  à cause du sang…  : cf. 2R 12.21 ; ici, seule mention de la raison de l''assassinat de Joas. –  des fils…  : LXX et Vg portent du fils  ; cf. v. 21s. –  Ville de David  : cf. v. 16+. –  pas dans les tombeaux des rois  : on refuse à Joas l''honneur qui avait été accordé au prêtre Joïada (v. 16).'
  - type: text
    content: 'Lorsqu''ils le laissèrent, l''abandonnant dans de grandes souffrances, les gens de sa cour conspirèrent contre lui à cause du sang des fils de Joïada, le prêtre ; ils le tuèrent sur son lit, et il mourut. On l''ensevelit dans la Ville de David, mais on ne l''ensevelit pas dans les tombeaux des rois. '
  '26':
  - type: note
    content: 'l''Ammonite  : c.-à-d. une femme ammonite, de même que pour la Moabite  ; détails absents de 2R 12 ; cf. 2Ch 20.1ss.'
  - type: text
    content: 'Voici ceux qui conspirèrent contre lui : Zabad, fils de Shiméath l''Ammonite, et Yozabad, fils de Shimrith la Moabite. '
  '27':
  - type: note
    content: 'sentences  : sur le terme correspondant, qui désigne souvent des messages des prophètes, voir Es 13.1n. –  aux réparations faites à  : litt. à la fondation de. –  commentaire (hébreu midrash) du livre des rois  : ouvrage inconnu par ailleurs ; il ne s''agit pas du livre biblique des Rois tel que nous le connaissons, cf. 1Ch 9.1n. –  Amatsia  : hébreu ’Amatsyahou, ce qui signifie YHWH est fort.'
  - type: text
    content: Quant à ses fils, au grand nombre des sentences prononcées contre lui, et aux réparations faites à la maison de Dieu, cela est écrit dans le commentaire du livre des rois. Son fils Amatsia devint roi à sa place.
  '3':
  - type: note
    content: 'Joïada prit…  : litt. Joïada prit pour lui… il engendra…'
  - type: text
    content: Joïada prit pour Joas deux femmes ; Joas engendra des fils et des filles.
  - type: heading
    content: Joas fait réparer le temple de Jérusalem
  - type: heading
    content: 2R 12.5-17
  '4':
  - type: text
    content: ' '
  - type: note
    content: 2R 12 raconte aussi les efforts pour réparer le temple, mais les Chroniques font apparaître certains points ou thèmes particuliers. –  eut à cœur 6.7 ; 29.9 ; 2S 7.3. –  restaurer 15.8n.
  - type: text
    content: 'Après cela, Joas eut à cœur de restaurer la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'les prêtres et les lévites  : 2R 12.5ss ne mentionne que les prêtres. –  Sortez vers les villes de Juda… de l''argent  : cf. v. 9s, insistance propre aux Chroniques. –  mettez de l''empressement et se pressèrent traduisent un même verbe hébreu ; autre traduction hâtez-vous de vous occuper de cette affaire. Mais les lévites ne se hâtèrent pas  ; cf. 2R 12.7.'
  - type: text
    content: 'Il rassembla les prêtres et les lévites et leur dit : Sortez vers les villes de Juda, et recueillez dans tout Israël de l''argent, chaque année, pour réparer la maison de votre Dieu ; quant à vous, mettez de l''empressement à cette affaire. Mais les lévites ne se pressèrent pas. '
  '6':
  - type: note
    content: 'le prêtre en chef  : litt. la tête, le chef. –  Pourquoi n''as-tu pas exigé…  : autre traduction pourquoi n''as-tu pas demandé des comptes aux lévites qui devaient apporter… –  la contribution que Moïse…  : cf. Ex 30.12-16 ; voir aussi 38.21,25-31 ; Lv 27.2ss ; Mt 17.24 ; les Chroniques ne mentionnent que l''impôt venant du dénombrement, alors que 2R 12.5 parle de trois sources de revenus différentes. –  et l''assemblée  : cf. Né 10.33.'
  - type: text
    content: 'Le roi appela Joïada, le prêtre en chef, et lui dit : Pourquoi n''as-tu pas exigé des lévites qu''ils apportent de Juda et de Jérusalem la contribution que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et l''assemblée ont imposée à Israël pour la tente du Témoignage ? '
  '7':
  - type: note
    content: 'Quant à Athalie…, ses fils  : LXX, Vg Athalie… et ses fils  ; le mot fils pourrait désigner des partisans d''Athalie ; voir 21.16s ; 22.8-10. –  ont ouvert des brèches  : on pourrait comprendre, dans un sens faible, ont laissé se détériorer la maison de Dieu ou, au sens fort, ont saccagé la maison de Dieu  ; ou encore, au figuré, ont pénétré illégalement dans la maison de Dieu (pour y prendre les choses sacrées) ; cf. 20.37n. –  les choses sacrées Ex 29.33 ; Lv 21.22 ; Nb 4.20 ; 7.9 ; voir saint.'
  - type: text
    content: 'Quant à Athalie, cette femme méchante, ses fils ont ouvert des brèches dans la maison de Dieu et utilisé pour les Baals toutes les choses sacrées de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '8':
  - type: text
    content: 'Alors le roi dit qu''on fasse un coffre et qu''on le place à la porte de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''extérieur. '
  '9':
  - type: note
    content: 'Les v. 9s n''ont pas de parallèle dans les Rois. –  la contribution…  : cf. v. 6n.'
  - type: text
    content: 'On fit passer une annonce dans Juda et dans Jérusalem, pour que chacun apporte au '
  - type: text
    content: Seigneur
  - type: text
    content: ' la contribution imposée à Israël, dans le désert, par Moïse, serviteur de Dieu. '
