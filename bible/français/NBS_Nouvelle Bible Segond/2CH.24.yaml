      marker: ft
      children:
      - type: text
        text: v. 14 ; cf. 2R 12.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Joas fit ce qui convenait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pendant tous les jours de Joïada, le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joïada prit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joïada prit pour lui… il engendra…
    marker-yv: yv-n
  - type: text
    text: Joïada prit pour Joas deux femmes ; Joas engendra des fils et des filles.
- type: usfm
  marker: s1
  children:
  - type: text
