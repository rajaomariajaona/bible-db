    marker-yv: yv-n
  - type: text
    text: 'Joas avait sept ans lorsqu''il devint roi ; il régna quarante ans à Jérusalem. Le nom de sa mère était Tsibia ; elle était de Bersabée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui convenait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tous les jours de Joïada '
