  - type: text
    text: 'A la fin de l''année, l''armée des Araméens partit à l''attaque de Joas. Ils vinrent en Juda et à Jérusalem. Ils massacrèrent parmi le peuple tous les chefs du peuple et ils envoyèrent au roi de Damas tout leur butin. '
