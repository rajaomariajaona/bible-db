    marker-yv: yv-n
  - type: text
    text: 'Après cela, Joas eut à cœur de restaurer la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 2R 12.5ss ne mentionne que les prêtres. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sortez vers les villes de Juda… de l'argent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9s, insistance propre aux Chroniques. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mettez de l''empressement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se pressèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent un même verbe hébreu ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hâtez-vous de vous occuper de cette affaire. Mais les lévites ne se hâtèrent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2R 12.7.'
    marker-yv: yv-n
  - type: text
    text: 'Il rassembla les prêtres et les lévites et leur dit : Sortez vers les villes de Juda, et recueillez dans tout Israël de l''argent, chaque année, pour réparer la maison de votre Dieu ; quant à vous, mettez de l''empressement à cette affaire. Mais les lévites ne se pressèrent pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le prêtre en chef
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la tête, le chef
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pourquoi n'as-tu pas exigé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pourquoi n''as-tu pas demandé des comptes aux lévites qui devaient apporter… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la contribution que Moïse…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 30.12-16 ; voir aussi 38.21,25-31 ; Lv 27.2ss ; Mt 17.24 ; les Chroniques ne mentionnent que l''impôt venant du dénombrement, alors que 2R 12.5 parle de trois sources de revenus différentes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Né 10.33.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi appela Joïada, le prêtre en chef, et lui dit : Pourquoi n''as-tu pas exigé des lévites qu''ils apportent de Juda et de Jérusalem la contribution que Moïse, serviteur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et l''assemblée ont imposée à Israël pour la tente du Témoignage ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quant à Athalie…, ses '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Athalie… et ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le mot '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pourrait désigner des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'partisans '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd''Athalie ; voir 21.16s ; 22.8-10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ont ouvert des brèches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on pourrait comprendre, dans un sens faible, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ont laissé se détériorer la maison de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, au sens fort, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ont saccagé la maison de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ou encore, au figuré, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ont pénétré illégalement dans la maison de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(pour y prendre les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: choses sacrées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. 20.37
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les choses sacrées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 29.33 ; Lv 21.22 ; Nb 4.20 ; 7.9 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quant à Athalie, cette femme méchante, ses fils ont ouvert des brèches dans la maison de Dieu et utilisé pour les Baals toutes les choses sacrées de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors le roi dit qu''on fasse un coffre et qu''on le place à la porte de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', à l''extérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 9s n''ont pas de parallèle dans les Rois. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la contribution…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On fit passer une annonce dans Juda et dans Jérusalem, pour que chacun apporte au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' la contribution imposée à Israël, dans le désert, par Moïse, serviteur de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tous les chefs et tout le peuple s'en réjouirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : remarque propre aux Chroniques, cf. v. 5.'
    marker-yv: yv-n
  - type: text
    text: 'Tous les chefs et tout le peuple s''en réjouirent ; ils l''apportaient et la jetaient dans le coffre jusqu''à ce qu''il soit plein : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribe
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'quand c''était le moment d''apporter le coffre à l''inspection royale par l''intermédiaire des lévites – c''est-à-dire quand on voyait qu''il y avait beaucoup d''argent – le scribe du roi et l''inspecteur du prêtre en chef venaient vider le coffre ; ils le prenaient et le remettaient à sa place ; ils procédaient ainsi journellement et recueillaient de l''argent en abondance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joïada
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms hébreu et LXX précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le prêtre Joïada
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux qui faisaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte porte un singulier (collectif) ; quelques mss hébreux et des versions anciennes ont le pluriel ; certains traduisent par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'maître d''œuvre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'entrepreneur des travaux. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils engageaient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comme salariés, selon le sens du verbe hébreu.
    marker-yv: yv-n
  - type: text
    text: 'Le roi et Joïada le donnaient à ceux qui faisaient les travaux pour le service de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; ils engageaient des tailleurs de pierre et des charpentiers pour restaurer la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ainsi que des ouvriers sur fer et sur bronze, pour réparer la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les réparations avancèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''expression en hébreu apparaît en général pour une blessure qui se cicatrise ; cf. Né 4.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui faisaient les travaux se mirent à l''ouvrage, et grâce à eux les réparations avancèrent. Ils remirent en état la maison de Dieu et la consolidèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On en fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il en fit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des ustensiles…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des objets de service et les holocaustes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 1.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'autres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pendant tous les jours de Joïada
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2 ; 2R 12.3.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils eurent achevé, ils apportèrent devant le roi et devant Joïada le reste de l''argent. On en fit des objets pour la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', des ustensiles pour officier, des ustensiles pour les holocaustes, des coupes, et d''autres objets d''or et d''argent. Et, pendant tous les jours de Joïada, on offrit constamment des holocaustes dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joas devient infidèle à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 15-22 n'ont pas de parallèle dans les Rois ; les Chroniques expliquent les causes religieuses des revers que connaîtra la fin du règne de Joas. Voir l'introduction aux Chroniques♦.
    marker-yv: yv-n
  - type: text
    text: 'Joïada devint vieux et mourut rassasié de jours. Il avait cent trente ans à sa mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.16 '
