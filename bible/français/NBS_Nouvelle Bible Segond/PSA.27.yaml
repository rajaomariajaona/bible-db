document_id: PSA.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: En sécurité dans la maison du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'De David  : LXX ajoute avant d''être oint. –  ma lumière  : cf. 4.7+ ; 18.29 ; 36.10 ; 43.3 ; 97.11 ; 112.4 ; Mi 7.8s ; Jn 1.4,9 ; 8.12+ ; 1Jn 1.5. –  la forteresse 28.7s ; 31.3s ; 37.39 ; 43.2n  ; 52.9 ; 91.2 ; 94.22 ; cf. 9.10+.'
  - type: text
    content: De David.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est ma lumière et mon salut :'
  - type: text
    content: de qui aurais-je peur ?
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est la forteresse de ma vie :'
  - type: text
    content: qui pourrait m'effrayer ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction possible  : Quand mon père et ma mère m''abandonneraient, alors le Seigneur me recueillerait  ; cf. Es 49.14s ; Jr 12.6 ; 31.20.'
  - type: text
    content: Car mon père et ma mère m'abandonnent,
  - type: text
    content: 'mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me recueillera.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 5.9 ; 25.4,12 ; 86.11 ; 139.24.
  - type: text
    content: Seigneur
  - type: text
    content: ', enseigne-moi ta voie,'
  - type: text
    content: conduis-moi dans le sentier de la droiture,
  - type: text
    content: à cause de mes détracteurs.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'au désir de mes adversaires ou à mes adversaires  ; de même en 41.3 ; sur le terme correspondant à désir , qui peut aussi désigner la personne même des adversaires, cf. 6.4n  ; 17.9n  ; Gn 1.20n. –  faux témoins 35.11 ; cf. 1R 21.10-13 ; Mc 14.56/ / ; Ac 6.13. –  respirant  : autre traduction proférant ou déposant en vue de  ; terme très proche en Pr 6.19n  ; 12.17n  ; 14.5,25 ; 19.5,9.'
  - type: text
    content: Ne me livre pas au désir de mes adversaires,
  - type: text
    content: car de faux témoins se dressent contre moi,
  - type: text
    content: respirant la violence.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Oh ! si je ne croyais pas…  : texte incertain ; plusieurs traducteurs omettent le premier mot du texte pour lire je crois que je verrai… (le verbe traduit par croire est apparenté au mot amen ). –  voir  : tournure analogue, avec un autre verbe, au v. 4 ; cf. 22.18n. –  sur la terre des vivants 52.7 ; 116.9n  ; 142.6 ; cf. 118.17s ; Es 38.11 ; 53.8 ; Jr 11.19 ; Ez 26.20 ; 32.23ss ; Jb 28.13.'
  - type: text
    content: 'Oh ! si je ne croyais pas voir la bonté du '
  - type: text
    content: Seigneur
  - type: text
    content: sur la terre des vivants !
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mets ton espérance ou espère …  ; cf. 25.3+ ; 37.34 ; 130.5s. –  Sois fort… 31.25 ; Dt 31.6 ; Jos 1.9 ; cf. 1Co 16.13.
  - type: text
    content: 'Mets ton espérance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Sois fort, que ton cœur soit courageux !
  - type: text
    content: 'Mets ton espérance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'pour me dévorer  : litt. pour dévorer ma chair  ; cf. 7.3+ ; Jb 19.22 ; Ap 17.16.'
  - type: text
    content: Quand les mauvais s'approchent de moi
  - type: text
    content: pour me dévorer,
  - type: text
    content: mes adversaires et mes ennemis,
  - type: text
    content: ce sont eux qui trébuchent et qui tombent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Si une troupe…  : litt. si un camp contre moi campait  ; cf. 3.7. –  malgré cela  : autres traductions en cela même ; en celle-ci (c.-à-d. au cœur même de la guerre ).'
  - type: text
    content: Si une troupe dressait son camp contre moi,
  - type: text
    content: mon cœur n'aurait aucune crainte ;
  - type: text
    content: si une guerre s'élevait contre moi,
  - type: text
    content: malgré cela j'aurais confiance.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'habiter… 15.1 ; 23.6 ; 26.8 ; 42.5 ; 61.5 ; 65.5 ; cf. Lc 2.49. –  pour voir  : cf. v. 13n  ; 63.3 ; voir aussi 11.7 ; 17.15 ; 42.3 ; Ex 24.11. –  la beauté ou la douceur , même terme en 90.17 ; terme apparenté (aussi traduit par agréable ) en 133.1 ; 135.3n  ; cf. 16.6,11. –  admirer  : cf. 2R 16.15n.'
  - type: text
    content: 'Je demande au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une seule chose, que je recherche ardemment :'
  - type: text
    content: 'habiter tous les jours de ma vie dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'pour voir la beauté du '
  - type: text
    content: Seigneur
  - type: text
    content: et pour admirer son temple.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'sa hutte  : d''après quelques mss (le texte hébreu traditionnel est incertain) ; cf. 18.12 ; 31.21n. Dans d''autres contextes, le mot hébreu qui apparaît ici (ou un homonyme ?) a le sens d’ abri ou de tanière (10.9+ ; de même le mot habituellement traduit par hutte en Jb 38.40) ; ici comme en 76.3 il désigne sans doute le temple  ; cf. 15.1n  ; Lm 2.6n  ; voir aussi 2S 11.11 ; 1R 1.39,50 ; Es 4.6. –  au jour du malheur 37.19 ; 41.2 ; 49.6 ; 94.13. –  au secret ou dans la cachette (le verbe et le complément sont apparentés en hébreu) ; cf. 31.21 ; 61.5 ; 64.3n  ; 91.1n  ; voir aussi 17.8+. –  sa tente 15.1 ; 2S 7.2. –  il m''élèvera…  : cf. 18.34 ; 40.3 ; 61.3.'
  - type: text
    content: Car il me protégera dans sa hutte au jour du malheur,
  - type: text
    content: il me cachera au secret de sa tente ;
  - type: text
    content: il m'élèvera sur un rocher.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ma tête s''élève 3.4+ ; cf. 83.3. –  qui m''entourent  : LXX a rattaché le terme correspondant à la suite pour lire j''ai fait le tour (de l''autel) et j''ai offert des sacrifices… (cf. 26.6). –  d''acclamation  : cf. 33.3 ; 47.2,6 ; 66.1 ; 89.16 ; 95.1s ; 98.4,6 ; 100.1 ; voir Lv 23.24n  ; Nb 10.5n  ; 29.1n  ; Jr 49.2+ ; Esd 3.11-13. –  je chanterai…  : cf. 7.18n  ; 21.14n.'
  - type: text
    content: Maintenant ma tête s'élève au-dessus des ennemis qui m'entourent ;
  - type: text
    content: j'offrirai des sacrifices dans sa tente, des sacrifices d'acclamation ;
  - type: text
    content: 'je chanterai, je jouerai des psaumes pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 28.2 ; 31.23 ; 55.2s.
  - type: text
    content: Seigneur
  - type: text
    content: ', entends-moi, je t''invoque ;'
  - type: text
    content: fais-moi grâce, réponds-moi !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Pour toi mon cœur dit…  : texte difficile, diversement rendu par les versions anciennes ; on pourrait aussi comprendre devant toi mon cœur dit , c.-à-d. se remémore le commandement divin . –  Recherchez-moi  : litt. recherchez ma face  ; autre traduction recherchez ma faveur  ; même expression plus loin et en 24.6+ ; 105.4 ; 2S 21.1 ; 1R 10.24 ; Os 5.15 ; Pr 29.26 ; 1Ch 16.11 ; 2Ch 7.14 ; 9.23 ; cf. Ps 50.15.'
  - type: text
    content: 'Pour toi mon cœur dit : Recherchez-moi !'
  - type: text
    content: 'Je te recherche, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ne te détourne pas de moi  : litt. ne me cache pas ta face  ; cf. 13.2+ ; 51.13. –  mon secours 38.23 ; 71.12.'
  - type: text
    content: Ne te détourne pas de moi,
  - type: text
    content: ne me repousse pas avec colère, moi, ton serviteur !
  - type: text
    content: Tu es mon secours,
  - type: text
    content: ne me délaisse pas, ne m'abandonne pas,
  - type: text
    content: Dieu de mon salut !
