document_id: AMO.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Cinquième vision : la fuite impossible'
  - type: text
    content: ' '
  - type: note
    content: 'près de (autre traduction sur , cf. 7.7n) l''autel  : cf. Jg 13.20 ; Es 6.1,6 ; Ap 8.3. –  Frappe  : cf. 2S 24.16. –  le chapiteau  : hébreu kaphtor , même mot qu''au v. 7n  ; il s''agit sans doute ici des chapiteaux du temple  ; cf. 3.14 ; 7.9. –  que les seuils tremblent  : cf. 1.1+ ; voir aussi Es 6.4. –  un fugitif… 2.14+ss ; 5.19.'
  - type: text
    content: 'Je vis le Seigneur posté près de l''autel. Il dit :'
  - type: text
    content: Frappe le chapiteau, que les seuils tremblent,
  - type: text
    content: brise-les sur leurs têtes à tous !
  - type: text
    content: 'Je tuerai leur progéniture par l''épée :'
  - type: text
    content: parmi eux, pas un fugitif ne parviendra à s'enfuir,
  - type: text
    content: pas un rescapé n'échappera.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Tu ne feras…  : d''après LXX, certains modifient la vocalisation traditionnelle pour lire le malheur ne s''approchera pas de nous et n''arrivera pas jusqu''à nous  ; cf. 6.1-6 ; Es 28.15 ; Jr 5.12 ; Mi 3.11 ; So 1.12 ; 2P 3.9s.'
  - type: text
    content: Tous les pécheurs de mon peuple mourront par l'épée,
  - type: text
    content: 'eux qui disent :'
  - type: text
    content: Tu ne feras pas approcher le malheur,
  - type: text
    content: tu ne le feras pas arriver jusqu'à nous.
  - type: heading
    content: Dieu va restaurer le royaume de David
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 2.16+. –  la hutte  : cf. Dt 16.13ss ; c''est tout ce qui reste de la maison de David , cf. 2S 7.11-16 ; Es 1.8 ; voir aussi 9.1ss ; 11.1ss.'
  - type: text
    content: En ce jour-là, je relèverai la hutte chancelante de David,
  - type: text
    content: j'en réparerai les brèches,
  - type: text
    content: j'en relèverai les ruines
  - type: text
    content: et je la rebâtirai comme elle était autrefois,
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ils prennent possession  : cf. Gn 22.17. –  Edom 1.11n  ; Nb 24.18 ; Ab 19 ; LXX afin que le reste des hommes (= hébreu ’adam ) cherche  ; cf. Ac 15.16s . –  sur lesquelles mon nom…  : cf. Dt 28.10 ; 2S 6.2 ; 1R 8.43 ; Jr 7.10 ; 14.9.'
  - type: text
    content: afin qu'ils prennent possession
  - type: text
    content: du reste d'Edom et de toutes les nations
  - type: text
    content: sur lesquelles mon nom a été invoqué
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui fait tout cela.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Les jours viennent 4.2+ ; sur la suite, cf. Lv 26.5 ; Es 11.6ss ; 30.25 ; Ez 36.34 ; Os 2.20,23ss ; Jl 4.18 ; Ap 22.2. –  jus du raisin  : autre traduction vin nouveau  ; cf. Jl 1.5n. –  s''épancheront  : cf. v. 5n.'
  - type: text
    content: Les jours viennent
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: où le laboureur suivra de près le moissonneur,
  - type: text
    content: où celui qui foule le raisin suivra de près celui qui répand la semence,
  - type: text
    content: où le jus du raisin ruissellera des montagnes
  - type: text
    content: et où toutes les collines s'épancheront.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je rétablirai…  : cf. Dt 30.3n  ; Jr 29.14n  ; 30.3 ; Ez 29.14 ; Os 6.11 ; Jl 4.1 ; Jb 42.10n  ; Lm 2.14. –  ils rebâtiront…  : cf. 5.11+ ; Es 61.4 ; 62.8s ; 65.21s ; Jr 31.5 ; Ez 36.33ss ; Ps 69.36.'
  - type: text
    content: Je rétablirai la situation d'Israël, mon peuple ;
  - type: text
    content: ils rebâtiront les villes dévastées
  - type: text
    content: et ils les habiteront,
  - type: text
    content: ils planteront des vignes
  - type: text
    content: et ils en boiront le vin,
  - type: text
    content: ils feront des jardins
  - type: text
    content: et ils en mangeront le fruit.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 60.21 ; Jr 24.6 ; 31.28 ; 32.41 ; Ps 80.9. –  que je leur ai donnée Dt 1.20,25 ; 2.29.
  - type: text
    content: Je les planterai sur leur terre,
  - type: text
    content: et ils ne seront plus déracinés
  - type: text
    content: de la terre que je leur ai donnée,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 16.17 ; 23.23s ; 32.19 ; Ab 4 ; Ps 139.7ss. –  S''ils pénètrent…  : autre traduction s''ils creusent (même verbe en Ez 8.8 ; Jb 24.16 forcer ) jusqu''au séjour des morts (hébreu she''ol ), le séjour des morts étant conçu comme un lieu souterrain (Gn 37.35 ; 44.29,31 ; Nb 16.31ss ; 1S 28.11ss ; Es 5.14 ; 14.9ss ; Pr 9.18), par opposition au ciel (Es 7.11 ; 14.13ss ; Ps 139.8 ; Jb 11.8 ; Mt 11.23).'
  - type: text
    content: S'ils pénètrent dans le séjour des morts,
  - type: text
    content: ma main les en arrachera ;
  - type: text
    content: s'ils montent au ciel,
  - type: text
    content: je les en ferai redescendre.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Carmel 1.2n. –  serpent (5.19) de mer ou monstre marin ; cf. Es 27.1 ; Ps 74.13s ; 89.11 ; Jb 26.12s ; 40.25–41.26.
  - type: text
    content: S'ils se cachent au sommet du Carmel,
  - type: text
    content: je les y chercherai et je les saisirai ;
  - type: text
    content: s'ils se dérobent à mes regards dans le fond de la mer,
  - type: text
    content: là j'ordonnerai au serpent de les mordre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en captivité… 5.5 ; 6.7 ; 7.17. –  l''épée Jr 47.6 ; Ez 14.17 ; Za 13.7. –  je veillerai…  : cf. Gn 44.21n  ; voir aussi Ex 2.25 ; Nb 6.25s ; Jr 21.10 ; 24.6 ; 44.11n  ; Jb 7.17ss ; 14.16.'
  - type: text
    content: S'ils vont en captivité devant leurs ennemis,
  - type: text
    content: là j'ordonnerai à l'épée de les tuer ;
  - type: text
    content: je veillerai sur eux,
  - type: text
    content: non pas pour leur bonheur, mais pour leur malheur.
  - type: heading
    content: Le Seigneur, maître de l'univers
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.13 ; 5.8s. –  touche la terre, et elle s'effondre (litt. elle fond , même verbe au v. 13 pour s'épancher ) ; cf. 1.1+ ; voir aussi Ez 38.19s ; Mi 1.3s ; Ps 18.15s ; 46.7 ; 75.4 ; 104.32 ; 144.5. – Sur la fin du v., voir 8.8n.
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: touche la terre, et elle s'effondre ;
  - type: text
    content: tous ses habitants prennent le deuil ;
  - type: text
    content: elle monte tout entière comme le Nil
  - type: text
    content: et elle s'affaisse comme le Nil d'Egypte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sa demeure ou ses chambres hautes , litt. ses escaliers  ; cf. Ps 104.2s,13. –  sa voûte  : cf. Gn 1.6nss (autre terme hébreu) ; Jb 22.14 ; Pr 8.27. –  il appelle… 5.8. –  son nom, c''est… 5.8+. –  YHWH 4.13+.'
  - type: text
    content: Il bâtit sa demeure dans le ciel
  - type: text
    content: et fonde sa voûte sur la terre ;
  - type: text
    content: il appelle les eaux de la mer
  - type: text
    content: 'et les répand sur la terre :'
  - type: text
    content: 'son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Le châtiment des coupables
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.9ss ; 3.1s ; 7.8,15+ ; Dt 2.9ss,18ss ; 7.6s ; 9.4ss ; voir aussi Dt 32.8s ; Jg 11.24 ; 1Co 4.7. –  les Koushites  : litt. les fils des Koushites  ; l''un des peuples les plus lointains connus d''Israël ; cf. Gn 2.13n  ; 10.8 ; Es 11.11 ; Ac 8.27. –  Kaphtor (v. 1n), probablement la Crète, lieu d''où seraient venus les Philistins (1.6nss) ; cf. Gn 10.14 ; Dt 2.23 ; Jr 47.4. –  les Araméens  : hébreu Aram (1.6n). –  Qir 1.5n.'
  - type: text
    content: 'N''êtes-vous pas pour moi comme les Koushites, Israélites ? – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: N'ai-je pas fait sortir Israël d'Egypte,
  - type: text
    content: comme les Philistins de Kaphtor
  - type: text
    content: et les Araméens de Qir ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'les yeux v. 4+ ; Pr 15.3. –  pécheur  : autre traduction coupable  ; cf. v. 10. –  je le ferai disparaître  : sous-entendu dans le texte. –  pas… détruire 3.12+ ; 5.15 ; Jr 30.11. –  Jacob 1.1n.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' a les yeux'
  - type: text
    content: sur le royaume pécheur.
  - type: text
    content: Je le détruirai, je le ferai disparaître de la terre ;
  - type: text
    content: toutefois je n'irai pas jusqu'à détruire totalement
  - type: text
    content: la maison de Jacob
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 15.29 ; voir aussi Dt 28.64 ; Ez 5.10. –  crible Es 30.28 ; Lc 22.31 ; cf. Siracide 27.4 : « Quand on secoue le crible, les déchets demeurent. » –  un seul caillou  : autre traduction un grain dur  ; auquel cas, contrairement à l''image habituelle, c''est le bon grain qui resterait dans le crible.'
  - type: text
    content: 'Car je donne mes ordres :'
  - type: text
    content: je secouerai la maison d'Israël parmi toutes les nations
  - type: text
    content: comme on secoue au crible,
  - type: text
    content: sans qu'il en tombe à terre un seul caillou.
