      marker-yv: yv-n
    - type: text
      text: 'Je vis le Seigneur posté près de l''autel. Il dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frappe le chapiteau, que les seuils tremblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brise-les sur leurs têtes à tous !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je tuerai leur progéniture par l''épée :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi eux, pas un fugitif ne parviendra à s'enfuir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas un rescapé n'échappera.
