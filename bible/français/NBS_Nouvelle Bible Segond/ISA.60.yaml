document_id: ISA.60,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire du Seigneur sur Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi 51.17 ; 52.2 ; hébreu qoumi (cf. Mc 5.41), forme féminine, de même dans la suite : le discours s''adresse à Jérusalem personnifiée comme une femme (40.9 ; 49.14-21). –  brille  : verbe apparenté au mot traduit par lumière 2.5+ ; cf. 58.8-10. –  gloire 58.8 ; 59.19 ; Ex 13.21+ ; Ap 21.11. –  se lève  : autre verbe qu''au début du v. C''est celui qui décrit habituellement le lever d''un astre, de même au v. 2 ; Gn 32.32 ; Dt 33.2 ; 2S 23.4 ; Ml 3.20 ; cf. Mt 2.2,9 ; Lc 1.78s.'
  - type: text
    content: 'Lève-toi, brille : ta lumière arrive,'
  - type: text
    content: 'la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se lève sur toi.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Des étrangers  : litt. des fils d''étranger  ; 56.3n,6. –  te serviront  : le verbe peut désigner le service d''un auxiliaire ; dans un contexte cultuel, il est habituellement traduit par officier . –  irritation / faveur 54.7s.'
  - type: text
    content: Des étrangers rebâtiront tes murailles,
  - type: text
    content: leurs rois te serviront ;
  - type: text
    content: car si, dans mon irritation, je t'ai frappée,
  - type: text
    content: dans ma faveur j'ai compassion de toi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ap 21.25s. –  ressources v. 5n.
  - type: text
    content: Tes portes seront constamment ouvertes,
  - type: text
    content: elles ne seront fermées ni le jour ni la nuit,
  - type: text
    content: afin de laisser entrer chez toi
  - type: text
    content: les ressources des nations,
  - type: text
    content: leurs rois avec leur suite.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Za 14.17-19.
  - type: text
    content: – Car la nation et le royaume qui ne te serviront pas disparaîtront ; les nations seront ruinées. –
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'gloire du Liban 35.2 ; cf. 33.9n  ; 1R 5.20,23. –  le cyprès… 41.19. –  le lieu…  : litt. le lieu de mes pieds  ; cf. 66.1 ; Ez 43.7 ; Ps 99.5 ; Lm 2.1 ; 1Ch 28.2 : selon les textes l''expression désigne Jérusalem, le temple ou le coffre sacré.'
  - type: text
    content: La gloire du Liban viendra chez toi,
  - type: text
    content: le cyprès, l'orme et le buis, tous ensemble,
  - type: text
    content: pour donner de la splendeur au lieu de mon sanctuaire ;
  - type: text
    content: je glorifierai le lieu où reposent mes pieds.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '45.14 ; 49.23 ; cf. Ap 3.9. –  Tes oppresseurs  : litt. les fils de tes oppresseurs  ; autre traduction ceux qui abusaient de toi  ; cf. 51.21n  ; Gn 34.2n. –  te méprisaient ou te bafouaient  ; cf. 1.4 ; 52.5. –  Ville du Seigneur  : cf. 1.26 ; Ez 48.35 ; Ps 87.3.'
  - type: text
    content: Tes oppresseurs viendront vers toi, courbés ;
  - type: text
    content: tous ceux qui te méprisaient se prosterneront à tes pieds.
  - type: text
    content: 'Ils t''appelleront « Ville du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) »,'
  - type: text
    content: « Sion du Saint d'Israël ».
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'délaissée 54.1+. –  sans un passant  : même expression hébraïque qu''en 34.10. –  sujet d''orgueil  : cf. 24.14n  ; Am 6.8 ; 8.7 ; Na 2.3. –  gaieté Ps 48.3.'
  - type: text
    content: Alors que tu es délaissée, détestée,
  - type: text
    content: sans un passant,
  - type: text
    content: je ferai de toi un sujet d'orgueil pour toujours,
  - type: text
    content: un sujet de gaieté de génération en génération.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Tu suceras ou tu téteras  ; une autre forme du même verbe est traduite par allaiter en 66.11s ; cf. 49.23 ; Dt 32.13n. –  rédempteur 41.14n. –  Indomptable de Jacob 49.26+.
  - type: text
    content: Tu suceras le lait des nations,
  - type: text
    content: tu suceras la mamelle des rois ;
  - type: text
    content: 'ainsi tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Sauveur,'
  - type: text
    content: ton rédempteur, l'Indomptable de Jacob.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'bronze / or  : cf. 1R 14.26s. –  te presser 60.17+.'
  - type: text
    content: Au lieu du bronze je ferai venir de l'or,
  - type: text
    content: au lieu du fer je ferai venir de l'argent ;
  - type: text
    content: au lieu du bois, du bronze ;
  - type: text
    content: au lieu des pierres, du fer ;
  - type: text
    content: pour te surveiller,
  - type: text
    content: je mettrai la paix,
  - type: text
    content: et pour te presser,
  - type: text
    content: la justice.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ravage / désastre 51.19+. –  murailles / portes  : cf. Ap 21.12,14. –  Salut 59.17. –  Louange 62.7.'
  - type: text
    content: On n'entendra plus parler de violence dans ton pays,
  - type: text
    content: ni de ravage ou de désastre dans ton territoire ;
  - type: text
    content: tu donneras à tes murailles le nom de « Salut »
  - type: text
    content: et à tes portes celui de « Louange ».
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Za 14.6+,7 ; Ap 21.23 ; 22.5. –  sera ta lumière pour toujours  : autres traductions sera toujours ta lumière ; sera pour toi une lumière éternelle.'
  - type: text
    content: Tu n'auras plus le soleil pour lumière pendant le jour,
  - type: text
    content: ce ne sera plus la lune qui t'éclairera de sa clarté ;
  - type: text
    content: 'c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui sera ta lumière pour toujours,'
  - type: text
    content: c'est ton Dieu qui sera ta splendeur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ténèbres…  : cf. 8.22–9.1. –  obscurité épaisse Ex 20.21n. –  se lève v. 1n. –  sur toi sa gloire Ex 24.16.'
  - type: text
    content: Certes, les ténèbres couvrent la terre
  - type: text
    content: et une obscurité épaisse recouvre les peuples ;
  - type: text
    content: 'mais sur toi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se lève,'
  - type: text
    content: sur toi sa gloire apparaît.
  '20':
  - type: text
    content: Ton soleil ne se couchera plus,
  - type: text
    content: et ta lune ne se retirera plus ;
  - type: text
    content: 'car c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui sera ta lumière pour toujours.'
  - type: text
    content: Les jours de ton deuil seront terminés.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''y aura plus…  : litt. ton peuple, eux tous, des justes  ; cf. 54.13s. –  ils prendront possession du pays (ou de la terre ) 57.13+ ; Ps 37.29. –  rejeton  : comme en 11.1n. –  que j''ai planté 61.3. –  œuvre de mes mains  : cf. 43.1,7 ; Ex 15.17 ; 2S 7.10. –  splendeur v. 7,9 ; 61.3.'
  - type: text
    content: Il n'y aura plus que des justes parmi ton peuple,
  - type: text
    content: ils prendront possession du pays pour toujours ;
  - type: text
    content: c'est le rejeton que j'ai planté,
  - type: text
    content: l'œuvre de mes mains,
  - type: text
    content: pour montrer ma splendeur.
  '22':
  - type: text
    content: ' '
  - type: note
    content: une phratrie ou un millier, un contingent  ; cf. Mi 5.1n. –  nation forte 53.12n.
  - type: text
    content: Le plus petit deviendra une phratrie
  - type: text
    content: et le moindre, une nation forte.
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je hâterai cela en son temps.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'nations / lumière 2.2-5 ; 42.6+ ; cf. 66.18 ; Ap 21.24 ; Tobit 13.13 : « Une vive lumière brillera jusqu''aux confins de la terre. Des nations lointaines en grand nombre et des habitants de toutes les extrémités de la terre viendront vers ton saint nom, les mains pleines d''offrandes pour le Roi du ciel. »'
  - type: text
    content: Des nations marcheront à ta lumière
  - type: text
    content: et des rois à la clarté de ton aurore.
  - type: heading
    content: Jérusalem attire tous les peuples du monde
  '4':
  - type: text
    content: ' '
  - type: note
    content: 49.18,22. –  portées ou tenues , autre verbe en 66.12 ; cf. Pr 8.30n. –  sur la hanche ou sur le côté , de même en 66.12.
  - type: text
    content: 'Lève les yeux et regarde tout autour :'
  - type: text
    content: tous, ils se rassemblent,
  - type: text
    content: ils viennent vers toi ;
  - type: text
    content: tes fils arrivent de loin,
  - type: text
    content: tes filles sont portées sur la hanche.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'bondira ou tremblera  ; la racine correspondante évoque habituellement la frayeur (cf. 2.10 etc. ; 44.8,11 ; 51.13). –  quand  : autre traduction car . –  abondance  : le terme peut également signifier tumulte (ou grondement, mugissement ; frémissement en 63.15) ou multitude. –  ressources ou armées  ; même terme en 8.4n ( richesses ) ; cf. v. 11,17 ; Dt 33.19 ; Ag 2.7-9 ; Ap 21.24.'
  - type: text
    content: Lorsque tu le verras, tu seras radieuse,
  - type: text
    content: ton cœur bondira, il sera au large,
  - type: text
    content: quand l'abondance de la mer se tournera vers toi,
  - type: text
    content: quand les ressources des nations viendront vers toi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Madiân 9.3n  ; cf. Gn 25.2n. –  Epha  : clan arabe apparenté à Madiân ; cf. Gn 25.4+. –  Saba (hébreu Sheva’ , à distinguer de Seba en 43.3 et 45.14), en Arabie du sud (Gn 10.7n) ; cf. 1R 10 ; Jr 6.20 ; Ps 72.10,15. –  or / encens (Ex 30.34n) : cf. Mt 2.11. –  bonne nouvelle 40.9n.'
  - type: text
    content: Tu seras couverte d'une foule de chameaux,
  - type: text
    content: de dromadaires de Madiân et d'Epha ;
  - type: text
    content: ils viendront tous de Saba ;
  - type: text
    content: ils porteront de l'or et de l'encens
  - type: text
    content: 'et annonceront, comme une bonne nouvelle, les louanges du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Qédar 21.16+. –  Nebayoth Gn 25.13n. –  seront pour ton office  : autres traductions seront à ton service ; officieront pour toi  ; cf. v. 10 ; 61.6 ; voir aussi Dt 10.8n. –  agréés 56.6s.'
  - type: text
    content: Les troupeaux de Qédar se rassembleront tous chez toi ;
  - type: text
    content: les béliers de Nebayoth seront pour ton office ;
  - type: text
    content: ils seront offerts en holocauste sur mon autel et seront agréés,
  - type: text
    content: et je ferai resplendir la maison de ma splendeur.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Qui sont ceux-là  : cf. 49.21. –  comme des colombes Os 11.11. –  les fenêtres de leur colombier  : litt. leurs fenêtres  ; même terme en 24.18 ; Gn 7.11n.'
  - type: text
    content: Qui sont ceux-là qui volent comme un nuage,
  - type: text
    content: comme des colombes vers les fenêtres de leur colombier ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: îles 11.11+ ; cf. 51.5. –  bateaux de Tarsis 2.16n. –  ramener… tes fils 49.22. – Voir nom. –  ton Dieu 51.15+. –  Saint d'Israël 1.4+. –  te donne de la splendeur v. 21+ ; 55.5.
  - type: text
    content: Car les îles mettent leur espérance en moi,
  - type: text
    content: et les bateaux de Tarsis sont en tête,
  - type: text
    content: pour ramener de loin tes fils,
  - type: text
    content: avec leur argent et leur or,
  - type: text
    content: 'à cause du nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: du Saint d'Israël, qui te donne de la splendeur.
