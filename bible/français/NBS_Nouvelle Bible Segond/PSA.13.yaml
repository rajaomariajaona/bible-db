document_id: PSA.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jusqu'à quand m'oublieras-tu ?
  - type: text
    content: ' '
  - type: note
    content: 3.1n  ; 4.1n.
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Jusqu''à quand (6.4+) … m''oublieras-tu  : cf. 44.24 ; Lm 5.20. –  sans cesse  : autre traduction (est-ce) à jamais ? –  te détourneras-tu de moi  : litt. me cacheras-tu ta face  ; cf. 10.11 ; 22.25 ; 27.9 ; 30.8 ; 44.25 ; 51.11 ; 69.18 ; 88.15 ; 102.3 ; 104.29 ; 143.7 ; Jb 13.24.'
  - type: text
    content: 'Jusqu''à quand, '
  - type: text
    content: Seigneur
  - type: text
    content: ', m''oublieras-tu sans cesse ?'
  - type: text
    content: Jusqu'à quand te détourneras-tu de moi ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'des soucis  : le mot hébreu ainsi traduit signifie habituellement conseil(s), projet(s)  ; cf. 33.10s ; 106.13n  ; Es 5.19+ ; Pr 27.9. L''hébreu dit, litt. des soucis en mon être (terme traditionnellement rendu par âme , cf. Gn 1.20n) / du chagrin dans mon cœur.'
  - type: text
    content: Jusqu'à quand aurai-je des soucis,
  - type: text
    content: et chaque jour le chagrin au cœur ?
  - type: text
    content: Jusqu'à quand mon ennemi s'élèvera-t-il contre moi ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Fais briller (ou éclaire ) mes yeux  : cf. 19.9+ ; 27.1.'
  - type: text
    content: 'Regarde, réponds-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu !'
  - type: text
    content: Fais briller mes yeux,
  - type: text
    content: afin que je ne m'endorme pas dans la mort,
  '5':
  - type: text
    content: ' '
  - type: note
    content: que mon ennemi… 25.2 ; 30.2 ; 38.17 ; cf. 35.15,19.
  - type: text
    content: 'afin que mon ennemi ne dise pas : « Je l''ai emporté sur lui ! »'
  - type: text
    content: et que mes adversaires ne soient pas dans l'allégresse, si je vacille.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'confiance  : cf. 4.6+ ; 52.10. –  allégresse… 9.15+. –  Je chanterai…  : cf. 7.18+. –  il m''a fait du bien  : autres traductions il m''a récompensé ; il m''a traité comme je le méritais  ; cf. 116.7 ; 119.17 ; 131.2n  ; 142.8.'
  - type: text
    content: Moi, j'ai mis ma confiance en ta fidélité ;
  - type: text
    content: mon cœur trouve de l'allégresse en ton salut.
  - type: text
    content: 'Je chanterai pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il m''a fait du bien.'
