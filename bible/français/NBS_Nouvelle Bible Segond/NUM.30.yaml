document_id: NUM.30,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Cf. 28.1s ; Ex 19.7.
  - type: text
    content: 'Moïse dit aux Israélites tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse.'
  - type: heading
    content: Loi sur les vœux
  '10':
  - type: note
    content: Cf. v. 17.
  - type: text
    content: 'Le vœu d''une femme veuve ou répudiée, tout engagement par lequel elle se sera liée, sera valide pour elle. '
  '11':
  - type: note
    content: 'mariée  : litt. dans la maison de son mari ou demeurant chez son mari, cf. v. 4.'
  - type: text
    content: 'Lorsqu''une femme mariée fait un vœu ou se lie par un serment '
  '12':
  - type: note
    content: 'et ne la désapprouve pas  : autre traduction c''est qu''il ne la désapprouve pas.'
  - type: text
    content: 'et que son mari, étant informé, ne lui dit rien et ne la désapprouve pas, tous ses vœux seront valides, tout engagement par lequel elle se sera liée sera valide ; '
  '13':
  - type: text
    content: 'mais si son mari les annule le jour où il en est informé, rien de ce qui est sorti de ses lèvres en matière de vœu et d''engagement personnel ne sera valide ; son mari les a annulés ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui pardonnera. '
  '14':
  - type: note
    content: 'des privations  : cf. 29.7+ (expression légèrement différente pour se priver).'
  - type: text
    content: 'Tout vœu, tout serment par lequel on s''engage à des privations, son mari peut le valider ou l''annuler. '
  '15':
  - type: note
    content: 'jusqu''au lendemain  : la formule pourrait signifier jour après jour, mais le contexte juridique (cf. v. 16) invite à y voir ici un sens plus précis.'
  - type: text
    content: 'Si son mari ne lui dit rien jusqu''au lendemain, il valide ainsi tous les vœux ou tous les engagements qu''elle a pris ; il les valide, par le fait qu''il ne lui a rien dit le jour où il en a été informé. '
  '16':
  - type: note
    content: 'il sera chargé…  : cf. Lv 5.4. –  de la faute de sa femme  : litt. de sa faute (à elle)  ; Smr et LXX ont lu de sa faute à lui  ; voir péché.'
  - type: text
    content: S'il les annule après le jour où il en a été informé, il sera chargé de la faute de sa femme.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'prescriptions  : voir loi.'
  - type: text
    content: 'Telles sont les prescriptions que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna à Moïse, concernant les rapports entre un mari et sa femme ou entre un père et sa fille, lorsque, dans sa jeunesse, celle-ci habite chez son père.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'chefs des tribus  : cf. 2Ch 5.2. –  ce que le Seigneur …  : litt. la parole que YHWH a ordonnée.'
  - type: text
    content: 'Moïse dit aux chefs des tribus des Israélites : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné. '
  '3':
  - type: note
    content: 'un vœu  : cf. 6.1ss ; 21.2 ; 29.39 ; Lv 27.2ss ; Dt 23.22ss ; Jg 11.30ss ; 1S 1.11 ; 2S 15.7 ; Ps 50.14 ; 56.13 ; 66.13s ; 76.12 ; voir aussi Gn 28.20 ; Jr 44.17 ; Mt 5.33 ; Siracide 18.22 : « Que rien ne t''empêche d''accomplir ton vœu en temps voulu, n''attends pas jusqu''à la mort pour t''en acquitter. » Dans sa traduction-commentaire des Nombres le Targum (Tg) du pseudo-Jonathan précise ici qu''il s''agit d''un homme majeur de treize ans et que le tribunal se réserve le droit d''annuler son vœu ou son serment, cf. Lv 22.21ss ; 27.26s ; Ml 1.14 ; Mt 15.5-9/ /. –  se lier par un engagement  : litt. lier un lien (c.-à-d. une obligation) sur sa vie ou sur lui-même (sur le terme hébreu correspondant, voir Gn 1.20n), de même dans la suite ; le terme araméen correspondant est traduit par interdiction en Dn 6.8ss ; le Targum du pseudo-Jonathan explicite  : quand un homme… s''impose à lui-même par serment l''obligation de s''abstenir de quelque chose de permis (cf. v. 14n) ; cf. 1S 14.24 ; Ps 132.2ss ; Ac 23.21.'
  - type: text
    content: 'Lorsqu''un homme fera un vœu au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ou un serment pour se lier par un engagement, il ne profanera pas sa parole ; il fera exactement ce qui est sorti de sa bouche.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ecrit de Damas (Qumrân) 16.10ss : « Que le mari n''annule pas un serment de sa femme sans savoir s''il doit être exécuté ou s''il doit être annulé. Si ce serment est de nature à violer l''Alliance, que le mari l''annule et qu''il ne l''exécute pas. Et pareil est le cas pour le père de la femme. »'
  - type: text
    content: 'Lorsqu''une femme, dans sa jeunesse, habite chez son père, qu''elle fait un vœu au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et se lie par un engagement, '
  '5':
  - type: note
    content: 'étant informé de…  : litt. a entendu…'
  - type: text
    content: 'et que son père, étant informé de son vœu et de l''engagement par lequel elle s''est liée, ne lui dit rien, tous ses vœux seront valides, tout engagement par lequel elle se sera liée sera valide ; '
  '6':
  - type: note
    content: 'la désapprouve  : autres traductions la désavoue ; s''y oppose  ; mêmes possibilités dans la suite ; cf. 32.7n.'
  - type: text
    content: 'mais si son père la désapprouve le jour où il en est informé, aucun de ses vœux et des engagements par lesquels elle s''est liée ne sera valide ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui pardonnera, parce qu''elle a été désapprouvée par son père.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'un engagement inconsidéré  : cf. Lv 5.4 ; Pr 20.25 ; Ec 5.1,3ss.'
  - type: text
    content: 'Si elle se marie après avoir fait des vœux ou s''être liée par un engagement inconsidéré, '
  '8':
  - type: text
    content: 'et que son mari en soit informé, si celui-ci ne lui dit rien le jour où il en est informé, ses vœux seront valides, les engagements par lesquels elle se sera liée seront valides ; '
  '9':
  - type: note
    content: 'Cf. 1Co 7.5. –  lui pardonnera  : à elle, comme au v. 6 ; de même au v. 13.'
  - type: text
    content: 'mais si son mari la désapprouve le jour où il en est informé, il annule le vœu qu''elle a fait et l''engagement inconsidéré par lequel elle s''est liée ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui pardonnera. '
