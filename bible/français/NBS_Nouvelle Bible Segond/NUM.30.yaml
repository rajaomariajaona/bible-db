    marker-yv: yv-n
  - type: text
    text: 'Moïse dit aux chefs des tribus des Israélites : Voici ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un vœu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.1ss ; 21.2 ; 29.39 ; Lv 27.2ss ; Dt 23.22ss ; Jg 11.30ss ; 1S 1.11 ; 2S 15.7 ; Ps 50.14 ; 56.13 ; 66.13s ; 76.12 ; voir aussi Gn 28.20 ; Jr 44.17 ; Mt 5.33 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.22 : « Que rien ne t''empêche d''accomplir ton vœu en temps voulu, n''attends pas jusqu''à la mort pour t''en acquitter. » Dans sa traduction-commentaire des Nombres le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Targum '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du pseudo-Jonathan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'précise ici qu''il s''agit d''un homme majeur '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de treize ans '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et que le tribunal se réserve le droit d''annuler son vœu ou son serment, cf. Lv 22.21ss ; 27.26s ; Ml 1.14 ; Mt 15.5-9/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se lier par un engagement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lier un lien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. une obligation) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur lui-même '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (sur le terme hébreu correspondant, voir Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), de même dans la suite ; le terme araméen correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'interdiction '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Dn 6.8ss ; le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Targum du pseudo-Jonathan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: explicite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quand un homme… s''impose à lui-même par serment l''obligation de s''abstenir de quelque chose de permis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; cf. 1S 14.24 ; Ps 132.2ss ; Ac 23.21.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''un homme fera un vœu au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ou un serment pour se lier par un engagement, il ne profanera pas sa parole ; il fera exactement ce qui est sorti de sa bouche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ecrit de Damas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ') 16.10ss : « Que le mari n''annule pas un serment de sa femme sans savoir s''il doit être exécuté ou s''il doit être annulé. Si ce serment est de nature à violer l''Alliance, que le mari l''annule et qu''il ne l''exécute pas. Et pareil est le cas pour le père de la femme. »'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''une femme, dans sa jeunesse, habite chez son père, qu''elle fait un vœu au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et se lie par un engagement, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: étant informé de…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a entendu…
    marker-yv: yv-n
  - type: text
    text: 'et que son père, étant informé de son vœu et de l''engagement par lequel elle s''est liée, ne lui dit rien, tous ses vœux seront valides, tout engagement par lequel elle se sera liée sera valide ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la désapprouve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la désavoue ; s'y oppose
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mêmes possibilités dans la suite ; cf. 32.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'mais si son père la désapprouve le jour où il en est informé, aucun de ses vœux et des engagements par lesquels elle s''est liée ne sera valide ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui pardonnera, parce qu''elle a été désapprouvée par son père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un engagement inconsidéré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lv 5.4 ; Pr 20.25 ; Ec 5.1,3ss.'
    marker-yv: yv-n
  - type: text
    text: 'Si elle se marie après avoir fait des vœux ou s''être liée par un engagement inconsidéré, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et que son mari en soit informé, si celui-ci ne lui dit rien le jour où il en est informé, ses vœux seront valides, les engagements par lesquels elle se sera liée seront valides ; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1Co 7.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui pardonnera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à elle, comme au v. 6 ; de même au v. 13.'
    marker-yv: yv-n
  - type: text
    text: 'mais si son mari la désapprouve le jour où il en est informé, il annule le vœu qu''elle a fait et l''engagement inconsidéré par lequel elle s''est liée ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui pardonnera. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 17.
    marker-yv: yv-n
  - type: text
    text: 'Le vœu d''une femme veuve ou répudiée, tout engagement par lequel elle se sera liée, sera valide pour elle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mariée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans la maison de son mari '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: demeurant chez son mari
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 4.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''une femme mariée fait un vœu ou se lie par un serment '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et ne la désapprouve pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est qu'il ne la désapprouve pas.
    marker-yv: yv-n
  - type: text
    text: 'et que son mari, étant informé, ne lui dit rien et ne la désapprouve pas, tous ses vœux seront valides, tout engagement par lequel elle se sera liée sera valide ; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais si son mari les annule le jour où il en est informé, rien de ce qui est sorti de ses lèvres en matière de vœu et d''engagement personnel ne sera valide ; son mari les a annulés ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui pardonnera. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des privations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 29.7+ (expression légèrement différente pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se priver
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Tout vœu, tout serment par lequel on s''engage à des privations, son mari peut le valider ou l''annuler. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'au lendemain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la formule pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jour après jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais le contexte juridique (cf. v. 16) invite à y voir ici un sens plus précis.'
    marker-yv: yv-n
  - type: text
    text: 'Si son mari ne lui dit rien jusqu''au lendemain, il valide ainsi tous les vœux ou tous les engagements qu''elle a pris ; il les valide, par le fait qu''il ne lui a rien dit le jour où il en a été informé. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il sera chargé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 5.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la faute de sa femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sa faute (à elle)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Smr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sa faute à lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: S'il les annule après le jour où il en a été informé, il sera chargé de la faute de sa femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prescriptions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Telles sont les prescriptions que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' donna à Moïse, concernant les rapports entre un mari et sa femme ou entre un père et sa fille, lorsque, dans sa jeunesse, celle-ci habite chez son père.'
