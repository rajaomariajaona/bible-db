      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait accueilli
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.38 ; 11.1 ; 17.11 ; 1Th 1.6+ ; 2.13 ; Jc 1.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pierre et Jean '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.1+.
      marker-yv: yv-n
    - type: text
      text: 'Quand les apôtres qui étaient à Jérusalem apprirent que la Samarie avait accueilli la parole de Dieu, ils leur envoyèrent Pierre et Jean. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''ils reçoivent '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17,19 ; 2.38 ; 10.47 ; 19.2-7.
      marker-yv: yv-n
    - type: text
      text: 'Ceux-ci, une fois descendus chez eux, prièrent pour eux afin qu''ils reçoivent l''Esprit saint. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui-ci n'était encore tombé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'celui-ci ne s''était encore emparé d''aucun d''eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.44 ; 11.15 ; cf. 19.17 ; voir aussi Jg 14.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avaient… reçu le baptême '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'étaient… fait baptiser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour le nom… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 19.5 ; voir aussi 2.38+ (formule différente) ; Mt 28.19.'
      marker-yv: yv-n
    - type: text
      text: '– Car celui-ci n''était encore tombé sur aucun d''eux ; ils avaient seulement reçu le baptême pour le nom du Seigneur Jésus. – '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'posèrent les mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.6+ ; 19.6.
      marker-yv: yv-n
    - type: text
      text: Alors Pierre et Jean posèrent les mains sur eux, et ils reçurent l'Esprit saint.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D'où le nom de simonie traditionnellement donné au trafic de privilèges religieux.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Simon vit que l''Esprit était donné par l''imposition des mains des apôtres, il leur apporta de l''argent et dit : '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 17 ; Mt 10.8.
      marker-yv: yv-n
    - type: text
      text: 'Donnez-moi aussi cette autorité ; que celui à qui j''imposerai les mains reçoive l''Esprit saint. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 50.10 ; Mt 14.12/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hommes pieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.5+.
      marker-yv: yv-n
    - type: text
      text: 'Mais des hommes pieux ensevelirent Etienne et firent sur lui de grandes lamentations. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Pierre lui dit : Que ton argent se perde avec toi, puisque tu as pensé acquérir le don de Dieu à prix d''argent ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni part ni lot '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: héritage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 26.18 ; Col 1.12 ; voir aussi Dt 12.12 ; 14.27,29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' n''est pas droit…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 78.37 (même expression dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il n''y a pour toi ni part ni lot dans cette affaire, car ton cœur n''est pas droit devant Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dn 4.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Reviens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: repens-toi ; convertis-toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'changer radicalement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2.38
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ta pensée mauvaise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de ton mal, de ta malignité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de ta malfaisance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme Rm 1.29 ; 1Co 5.8 etc.).
      marker-yv: yv-n
    - type: text
      text: 'Reviens donc de ta pensée mauvaise, et prie le Seigneur pour que l''intention de ton cœur te soit pardonnée, si cela est possible ; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'amertume du fiel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression analogue en Dt 29.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lm 3.15 (LXX). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: liens de l'injustice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 58.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'car je vois que tu es en proie à l''amertume du fiel et aux liens de l''injustice. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 8.4,24 ; 9.28 ; 10.17. Le texte occidental ajoute à la fin du v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Et il ne cessait de pleurer abondamment.
      marker-yv: yv-n
    - type: text
      text: 'Simon répondit : Priez vous-mêmes le Seigneur pour moi, afin qu''il ne m''arrive rien de ce que vous avez dit.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
      - type: usfm
        marker: fq
        children:
