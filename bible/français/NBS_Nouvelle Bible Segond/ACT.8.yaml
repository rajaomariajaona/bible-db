      marker-yv: yv-n
    - type: text
      text: Saul approuvait le meurtre d'Etienne.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: DANS TOUTE LA JUDÉE ET LA SAMARIE
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La première persécution
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour-là, une grande persécution s''abattit sur l''Eglise qui était à Jérusalem. Tous – excepté les apôtres – se dispersèrent en Judée et en Samarie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'attachaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la puissance de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mc 14.62'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tous, depuis le plus petit jusqu''au plus grand, s''attachaient à lui et disaient : Cet homme-là est la puissance de Dieu, celle qui s''appelle la Grande. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa magie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son art magique ; ses tours de magie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; verbe apparenté v. 9, un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 13.6ss.
      marker-yv: yv-n
    - type: text
      text: 'Ils s''attachaient à lui parce qu''il les avait longtemps stupéfiés par sa magie. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cru Philippe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cru en Philippe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devenir croyant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'règne de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de Jésus-Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.16+ ; cf. 8.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reçurent le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: baptême
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se firent baptiser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.41+.
      marker-yv: yv-n
    - type: text
      text: 'Mais quand ils eurent cru Philippe, qui leur annonçait la bonne nouvelle du règne de Dieu et du nom de Jésus-Christ, ils reçurent le baptême, hommes et femmes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simon lui-même devint croyant et reçut le baptême ; il était assidu auprès de Philippe et voyait avec stupéfaction les signes et les grands miracles qui se produisaient.
