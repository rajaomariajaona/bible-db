      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(4.29+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.24 ; 13.44,48 ; 15.35s ; 19.10 ; 1Th 1.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Jérusalem… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1ss.
      marker-yv: yv-n
    - type: text
      text: Après avoir rendu témoignage et dit la parole du Seigneur, ils retournèrent à Jérusalem, en annonçant la bonne nouvelle dans de nombreux villages des Samaritains.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philippe et le haut fonctionnaire éthiopien
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 10.1-48. –  '
      - type: usfm
        marker: fq
