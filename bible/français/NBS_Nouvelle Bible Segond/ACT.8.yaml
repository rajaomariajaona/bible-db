document_id: ACT.8,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Saul approuvait le meurtre d''Etienne (litt. son meurtre ) 7.58+ ; 26.10 ; cf. Lc 11.48 ; Rm 11.32. –  l''Eglise… à Jérusalem  : cf. 11.22 ; 13.1. –  excepté les apôtres  : le texte occidental précise qui restèrent à Jérusalem  ; cf. 4.1-22 ; 5.17-42 ; 6.1ss et les notes. –  se dispersèrent v. 4 ; 11.19. –  Judée 1.8 ; 9.31 ; 11.29 ; 26.20 ; 28.21. –  Samarie v. 5,9,14 ; 1.8 ; 9.31 ; 15.3 ; Lc 9.52s ; 10.33 ; 17.16.'
  - type: text
    content: Saul approuvait le meurtre d'Etienne.
  - type: heading
    content: DANS TOUTE LA JUDÉE ET LA SAMARIE
  - type: heading
    content: La première persécution
  - type: text
    content: 'Ce jour-là, une grande persécution s''abattit sur l''Eglise qui était à Jérusalem. Tous – excepté les apôtres – se dispersèrent en Judée et en Samarie. '
  '10':
  - type: note
    content: 's''attachaient  : cf. v. 6+. –  la puissance de Dieu  : cf. Mc 14.62n.'
  - type: text
    content: 'Tous, depuis le plus petit jusqu''au plus grand, s''attachaient à lui et disaient : Cet homme-là est la puissance de Dieu, celle qui s''appelle la Grande. '
  '11':
  - type: note
    content: 'sa magie  : autres traductions son art magique ; ses tours de magie  ; verbe apparenté v. 9, un terme apparenté est traduit par mage en 13.6ss.'
  - type: text
    content: 'Ils s''attachaient à lui parce qu''il les avait longtemps stupéfiés par sa magie. '
  '12':
  - type: note
    content: 'cru Philippe  : autre traduction cru en Philippe  ; le même verbe est traduit par devenir croyant au v. 13. –  règne de Dieu 1.3+. –  nom de Jésus-Christ 3.16+ ; cf. 8.5+. –  reçurent le baptême ou se firent baptiser 2.41+.'
  - type: text
    content: 'Mais quand ils eurent cru Philippe, qui leur annonçait la bonne nouvelle du règne de Dieu et du nom de Jésus-Christ, ils reçurent le baptême, hommes et femmes. '
  '13':
  - type: text
    content: Simon lui-même devint croyant et reçut le baptême ; il était assidu auprès de Philippe et voyait avec stupéfaction les signes et les grands miracles qui se produisaient.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'les apôtres… v. 1+. –  apprirent… 11.1,22. –  la Samarie  : on pourrait aussi lire Samarie . –  avait accueilli  : cf. 7.38 ; 11.1 ; 17.11 ; 1Th 1.6+ ; 2.13 ; Jc 1.21. –  Pierre et Jean 3.1+.'
  - type: text
    content: 'Quand les apôtres qui étaient à Jérusalem apprirent que la Samarie avait accueilli la parole de Dieu, ils leur envoyèrent Pierre et Jean. '
  '15':
  - type: note
    content: qu'ils reçoivent l'Esprit saint v. 17,19 ; 2.38 ; 10.47 ; 19.2-7.
  - type: text
    content: 'Ceux-ci, une fois descendus chez eux, prièrent pour eux afin qu''ils reçoivent l''Esprit saint. '
  '16':
  - type: note
    content: 'celui-ci n''était encore tombé…  : autre traduction celui-ci ne s''était encore emparé d''aucun d''eux 10.44 ; 11.15 ; cf. 19.17 ; voir aussi Jg 14.6n. –  avaient… reçu le baptême ou s''étaient… fait baptiser, cf. v. 12. –  pour le nom… ou au nom, cf. 19.5 ; voir aussi 2.38+ (formule différente) ; Mt 28.19.'
  - type: text
    content: '– Car celui-ci n''était encore tombé sur aucun d''eux ; ils avaient seulement reçu le baptême pour le nom du Seigneur Jésus. – '
  '17':
  - type: note
    content: posèrent les mains 6.6+ ; 19.6.
  - type: text
    content: Alors Pierre et Jean posèrent les mains sur eux, et ils reçurent l'Esprit saint.
  '18':
  - type: text
    content: ' '
  - type: note
    content: D'où le nom de simonie traditionnellement donné au trafic de privilèges religieux.
  - type: text
    content: 'Lorsque Simon vit que l''Esprit était donné par l''imposition des mains des apôtres, il leur apporta de l''argent et dit : '
  '19':
  - type: note
    content: Cf. v. 17 ; Mt 10.8.
  - type: text
    content: 'Donnez-moi aussi cette autorité ; que celui à qui j''imposerai les mains reçoive l''Esprit saint. '
  '2':
  - type: note
    content: Cf. Gn 50.10 ; Mt 14.12/ /. –  hommes pieux 2.5+.
  - type: text
    content: 'Mais des hommes pieux ensevelirent Etienne et firent sur lui de grandes lamentations. '
  '20':
  - type: text
    content: 'Mais Pierre lui dit : Que ton argent se perde avec toi, puisque tu as pensé acquérir le don de Dieu à prix d''argent ! '
  '21':
  - type: note
    content: 'ni part ni lot (ou héritage) : cf. 26.18 ; Col 1.12 ; voir aussi Dt 12.12 ; 14.27,29. –  ton cœur n''est pas droit…  : cf. Ps 78.37 (même expression dans LXX).'
  - type: text
    content: 'Il n''y a pour toi ni part ni lot dans cette affaire, car ton cœur n''est pas droit devant Dieu. '
  '22':
  - type: note
    content: 'Cf. Dn 4.24. –  Reviens  : autres traductions repens-toi ; convertis-toi  ; le même verbe est traduit par changer radicalement en 2.38n. –  de ta pensée mauvaise  : litt. de ton mal, de ta malignité ou de ta malfaisance (même terme Rm 1.29 ; 1Co 5.8 etc.).'
  - type: text
    content: 'Reviens donc de ta pensée mauvaise, et prie le Seigneur pour que l''intention de ton cœur te soit pardonnée, si cela est possible ; '
  '23':
  - type: note
    content: 'l''amertume du fiel  : expression analogue en Dt 29.17n  ; Lm 3.15 (LXX). –  liens de l''injustice  : cf. Es 58.6n.'
  - type: text
    content: 'car je vois que tu es en proie à l''amertume du fiel et aux liens de l''injustice. '
  '24':
  - type: note
    content: 'Cf. Ex 8.4,24 ; 9.28 ; 10.17. Le texte occidental ajoute à la fin du v.  : Et il ne cessait de pleurer abondamment.'
  - type: text
    content: 'Simon répondit : Priez vous-mêmes le Seigneur pour moi, afin qu''il ne m''arrive rien de ce que vous avez dit.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'la parole (4.29+) du Seigneur  : cf. 12.24 ; 13.44,48 ; 15.35s ; 19.10 ; 1Th 1.8+. –  à Jérusalem… v. 1ss.'
  - type: text
    content: Après avoir rendu témoignage et dit la parole du Seigneur, ils retournèrent à Jérusalem, en annonçant la bonne nouvelle dans de nombreux villages des Samaritains.
  - type: heading
    content: Philippe et le haut fonctionnaire éthiopien
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.1-48. –  L''ange du Seigneur 5.19n  ; cf. 8.29,39. –  Philippe 6.5n. –  Va  : litt. lève-toi et va , cf. 9.11n. –  vers le sud  : on pourrait aussi comprendre à midi , comme en 22.6 ; cf. 10.9n  ; voir aussi Dn 8.4,9 (même terme pour sud dans LXX). –  dans le désert  : litt. celui-ci (le chemin) est désert (ou désertique ).'
  - type: text
    content: 'L''ange du Seigneur dit à Philippe : Va vers le sud, sur le chemin qui descend de Jérusalem à Gaza, dans le désert. '
  '27':
  - type: note
    content: 'un Ethiopien ou un Nubien (voir Gn 2.13n) ; l’Ethiopie était pour les Anciens un royaume aux frontières assez floues, quand il ne désignait pas plus généralement encore l''Afrique noire ; cf. 1R 8.41s ; So 3.10 ; Ps 68.32. –  un eunuque  : le terme, qui peut désigner d''une façon assez générale un haut fonctionnaire, est peut-être à entendre ici au sens propre ; il s''agirait alors d''un homme castré, normalement exclu de la communauté religieuse d''Israël ; cf. Dt 23.1 ; Es 56.3-7 ; Mt 19.12. –  haut fonctionnaire  : le terme grec est dérivé d''un mot qui signifie puissance ou pouvoir  ; en Jr 34.19 (LXX) il traduit le terme hébreu pour eunuque ou haut fonctionnaire (Jr 29.2n). –  Candace n''est normalement pas un nom propre, mais un titre de la reine d''Ethiopie (cf. l''usage biblique des mots « Pharaon » pour l''Egypte ou « César » pour Rome). –  responsable…  : litt. qui était sur tout son trésor. –  adorer  : autre traduction se prosterner, cf. 10.25 ; Mt 2.2n  ; voir aussi Ac 24.11 ; Jn 12.20 ; voir culte.'
  - type: text
    content: 'Il se leva et partit. Or un Ethiopien, un eunuque, haut fonctionnaire de Candace, la reine des Ethiopiens, et responsable de tous ses trésors, était venu à Jérusalem pour adorer, '
  '28':
  - type: note
    content: à haute voix, sous-entendu dans le texte ; c'est presque toujours ainsi qu'on lisait dans l'Antiquité (c'est pourquoi Philippe peut entendre l'Ethiopien, v. 30) ; cf. 13.15+. – Voir Prophète.
  - type: text
    content: 'et il s''en retournait, assis sur son char, en lisant à haute voix le Prophète Esaïe. '
  '29':
  - type: note
    content: 'L''Esprit dit  : cf. v. 26,39 ; 10.19 ; 11.12 ; 13.2 ; 21.11 ; voir aussi 11.28 ; 15.28 ; 20.23 ; 21.4.'
  - type: text
    content: 'L''Esprit dit à Philippe : Avance et rejoins ce char. '
  '3':
  - type: note
    content: 9.1,13,21 ; 22.4,19 ; 26.9-11 ; 1Co 15.9 ; Ga 1.13,23 ; Ph 3.6 ; 1Tm 1.13. – Voir Eglise.
  - type: text
    content: Saul, lui, ravageait l'Eglise ; il pénétrait dans les maisons, en arrachait hommes et femmes et les faisait jeter en prison.
  '30':
  - type: note
    content: 'l''Ethiopien  : sous-entendu dans le texte. –  Comprends-tu ou sais-tu, connais-tu  ; le verbe grec correspondant est apparenté à celui qui est traduit par lire.'
  - type: text
    content: 'Philippe accourut et entendit l''Ethiopien qui lisait le Prophète Esaïe. Il lui dit : Comprends-tu ce que tu lis ? '
  '31':
  - type: note
    content: Cf. Lc 24.27 ; Jn 16.13 ; 1Jn 2.27.
  - type: text
    content: 'Il répondit : Comment le pourrais-je, si personne ne me guide ? Et il invita Philippe à monter s''asseoir avec lui. '
  '32':
  - type: note
    content: Es 53.7s, cité d'après LXX ; cf. 1P 2.24s.
  - type: text
    content: 'Le passage de l''Ecriture qu''il lisait était celui-ci :'
  - type: text
    content: Il a été mené comme un mouton à l'abattoir ;
  - type: text
    content: et, comme un agneau muet devant celui qui le tond,
  - type: text
    content: il n'ouvre pas la bouche
  - type: text
    content: .
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'son abaissement ou son humiliation . –  son droit  : autre traduction son jugement , ou, selon certains mss, le jugement  ; voir justice. –  enlevé(e) ou supprimé(e)  ; le verbe grec a aussi le sens d’ élever (cf. Jn 1.29+). –  sa génération  : autres traductions sa descendance, sa famille, son origine.'
  - type: text
    content: Dans son abaissement, son droit a été enlevé ;
  - type: text
    content: et sa génération, qui la racontera ?
  - type: text
    content: Car sa vie est enlevée de la terre
  - type: text
    content: .
  '34':
  - type: text
    content: 'L''eunuque demanda à Philippe : Je te prie, de qui le prophète dit-il cela ? De lui-même ou de quelqu''un d''autre ? '
  '35':
  - type: note
    content: 'prit la parole  : litt. ouvrit la bouche (cf. v. 32) ; de même en 10.34 ; 18.14 ; cf. Dn 10.16 ; Mt 5.2n. –  commençant…  : cf. Lc 24.27. –  cette Ecriture  : cf. v. 32 ; 17.2,11 ; 18.24,28 ; 1Co 15.3. –  la bonne nouvelle de Jésus 5.42 ; 11.20 ; 17.18.'
  - type: text
    content: 'Alors Philippe prit la parole et, commençant par cette Ecriture, il lui annonça la bonne nouvelle de Jésus. '
  '36':
  - type: note
    content: 'qu''est-ce qui m''empêche  : cf. 10.47n  ; 11.17n  ; Mt 3.14 ; Lc 18.16+/ /. – Voir baptême.'
  - type: text
    content: 'Comme ils continuaient leur chemin, ils arrivèrent à un point d''eau. L''eunuque dit : Voici de l''eau ; qu''est-ce qui m''empêche de recevoir le baptême ? [ '
  '37':
  - type: note
    content: 'Certains mss, dont les témoins du texte occidental, ajoutent ici  : Philippe dit : Si tu crois de tout ton cœur, cela est possible. Et (l''eunuque) répondit : Je crois que Jésus-Christ est le Fils de Dieu.'
  - type: text
    content: '] '
  '38':
  - type: note
    content: 'descendirent dans l''eau  : cf. Mt 3.16/ / ; Rm 6.4.'
  - type: text
    content: 'Il ordonna d''arrêter le char ; tous deux descendirent dans l''eau, Philippe ainsi que l''eunuque, et il le baptisa. '
  '39':
  - type: note
    content: 'l''Esprit du Seigneur enleva Philippe  : même verbe 23.10 ; cf. 1R 18.12 ; 2R 2.16 ; Ez 11.24 ; 2Co 12.2,4 ; 1Th 4.17 ; texte occidental reconstitué  : l''Esprit saint descendit (8.16n) sur l''eunuque, et un ange du Seigneur lui enleva Philippe. –  tout joyeux v. 8+ ; Lc 15.5 ; 19.6,37.'
  - type: text
    content: 'Quand ils furent remontés de l''eau, l''Esprit du Seigneur enleva Philippe. L''eunuque ne le vit plus : il poursuivait son chemin, tout joyeux. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 1+,40 ; 9.32 ; cf. 11.19. –  passaient  : même verbe, caractéristique du ministère apostolique itinérant, v. 40 ; 9.32,38 ; 10.38 ; 11.19,22 ; 12.10 ; 13.6 ( traverser ), 14 ( poursuivre sa route ) ; 14.24 ; 15.3,41 ; 16.6 ; 17.23 ; 18.23,27 ; 19.1,21 ; 20.2,25 ; cf. Lc 9.6. –  annonçaient…  : autre traduction annonçaient la bonne nouvelle de la Parole.'
  - type: text
    content: Là où ils passaient, ceux qui avaient été dispersés annonçaient la Parole, comme une bonne nouvelle.
  - type: heading
    content: Philippe annonce la bonne nouvelle en Samarie
  '40':
  - type: note
    content: 'Cf. v. 4+. –  il se retrouva  : litt. il fut trouvé. –  Azoth  : c''est l''ancienne Ashdod des Philistins (1S 5.1ss). –  Césarée au bord de la Méditerranée, à 36 km au sud de Haïfa, siège du gouvernement romain en Judée (à ne pas confondre avec Césarée de Philippe, au nord) 21.8 ; voir aussi 9.30 ; 10.1-48 ; 11.11 ; 18.22 ; 21.16 ; 23.23.'
  - type: text
    content: Quant à Philippe, il se retrouva à Azoth ; il annonçait la bonne nouvelle dans toutes les villes où il passait, jusqu'à son arrivée à Césarée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Philippe 6.5n. –  dans la ville de Samarie  : probablement la ville hellénistique de Sébaste, la nouvelle Samarie reconstruite par Hérode le Grand ; d''autres pensent qu''il s''agit de Néapolis (= Naplouse), l''antique Sichem ; certains mss portent dans une ville de Samarie  ; v. 1+ ; cf. 1.8 ; Jn 4.5,39-42. –  proclama 9.20 ; 10.37,42 ; 13.24 ; 15.21 ; 19.13 ; 20.25 ; 28.31 ; Mc 1.4n  ; Lc 3.3+. –  le Christ 2.36+ ; cf. 8.12 ; 9.20 ; 10.42 ; 17.3 ; 18.5,28 ; voir aussi Jn 4.25.'
  - type: text
    content: 'Philippe, qui était descendu dans la ville de Samarie, y proclama le Christ. '
  '6':
  - type: note
    content: 'Texte occidental quand elles eurent tout entendu, les foules… –  d''un commun accord 1.14+. –  s''attachaient v. 10s ; 16.14. –  en apprenant  : litt. en entendant. –  signes ou miracles  : cf. 2.19+.'
  - type: text
    content: 'Les foules, d''un commun accord, s''attachaient à ce que disait Philippe, en apprenant et en voyant les signes qu''il produisait. '
  '7':
  - type: note
    content: 'La phrase grecque est confuse, litt.  : Beaucoup de ceux qui avaient (cf. 16.16 ; Mc 3.22n) des esprits impurs poussant de grands cris sortaient. –  esprits impurs 5.16+ ; cf. Lc 4.40s ; voir pur, impur. –  de grands cris Mc 1.26/ / ; 5.7/ / ; 9.26 ; Lc 5.18,24.'
  - type: text
    content: 'Car des esprits impurs sortaient de beaucoup en poussant de grands cris, et beaucoup de paralytiques et d''infirmes furent guéris. '
  '8':
  - type: note
    content: une grande joie v. 39 ; 5.41 ; 11.23 ; 13.48,52 ; 15.3,31 ; 16.34.
  - type: text
    content: Il y eut une grande joie dans cette ville.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Simon le Mage (ou le Magicien) est présenté par la tradition des premiers siècles de l'Eglise comme l'un des pères du gnosticisme (voir « La question gnostique »♦). –  se disait quelqu'un 5.36+.
  - type: text
    content: 'Un nommé Simon, qui se trouvait déjà auparavant dans la ville, y exerçait la magie ; il stupéfiait le peuple de Samarie et se disait quelqu''un de grand. '
