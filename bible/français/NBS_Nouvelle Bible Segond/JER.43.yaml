document_id: JER.43,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie est emmené de force en Egypte
  - type: text
    content: ' '
  - type: note
    content: 'leur Dieu  : omis par LXX. –  l''avait chargé… 42.21n.'
  - type: text
    content: 'Lorsque Jérémie eut achevé de dire à tout le peuple toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, toutes ces paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, l''avait chargé de leur dire, '
  '10':
  - type: note
    content: 'mon serviteur  : cf. 25.9+. –  Je placerai  : LXX il placera  ; cf. 1.15+. –  tapis  : autres traductions baldaquin ; dais.'
  - type: text
    content: 'tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : J''envoie chercher Nabuchodonosor, roi de Babylone, mon serviteur. Je placerai son trône sur ces pierres que j''ai cachées, et il étendra son tapis sur elles. '
  '11':
  - type: note
    content: Il viendra mettre à mal… 44.30n  ; 46.13,25s ; cf. Ez 29.19ns. –  Qui est destiné… 15.2+.
  - type: text
    content: 'Il viendra mettre à mal l''Egypte : Qui est destiné à la mort, à la mort ! Qui est destiné à la captivité, en captivité ! Qui est destiné à l''épée, à l''épée ! '
  '12':
  - type: note
    content: '21.10+ ; Es 46.2 ; Ez 30.13. –  aux maisons  : c.-à-d. aux temples. –  il les brûlera…  : il faut sans doute comprendre : le roi de Babylone brûlera les temples et emmènera captives les images des dieux. –  il s''enveloppera…  : d''après LXX et un autre sens possible du verbe hébreu, d''autres traduisent  : il épouillera l''Egypte comme un berger épouille son vêtement. –  victorieux  : litt. en paix  ; cf. Jos 10.21+.'
  - type: text
    content: 'Je mettrai le feu aux maisons des dieux de l''Egypte ; il les brûlera, il les emmènera captifs, il s''enveloppera de l''Egypte comme le berger s''enveloppe de son vêtement, et il en sortira victorieux. '
  '13':
  - type: note
    content: Il brisera les pierres levées Ex 34.13 ; il s'agit probablement ici des obélisques associées au culte du soleil. –  Beth-Shémesh (= Maison du soleil, cf. Es 19.18n) est ici l'équivalent hébreu d’Héliopolis (= Ville du soleil), également appelée On (Gn 41.45n  ; Ez 30.17), à 8 km du Caire.
  - type: text
    content: Il brisera les pierres levées de Beth-Shémesh en Egypte et il mettra le feu aux maisons des dieux de l'Egypte.
  '2':
  - type: note
    content: Azaria… 42.1n. –  arrogants Es 13.11 ; Ml 3.19. –  N'allez pas en Egypte 42.15+,19+.
  - type: text
    content: 'Azaria, fils de Hoshaya, Yohanân, fils de Qaréah, et tous ces hommes arrogants dirent à Jérémie : Ce que tu dis est faux ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, ne t''a pas envoyé pour dire : « N''allez pas en Egypte pour y séjourner en immigrés. » '
  '3':
  - type: note
    content: 'Baruch 32.12+. –  t''incite à nous faire du tort  : litt. t''excite contre nous. –  ou  : litt. et.'
  - type: text
    content: 'Mais c''est Baruch, fils de Nériya, qui t''incite à nous faire du tort en nous livrant aux Chaldéens, pour qu''ils nous mettent à mort ou qu''ils nous exilent à Babylone. '
  '4':
  - type: note
    content: 'V. 7 ; 42.13 ; 44.23. –  qui leur ordonnait d''habiter  : litt. pour habiter.'
  - type: text
    content: 'Yohanân, fils de Qaréah, tous les officiers et tout le peuple n''écoutèrent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui leur ordonnait d''habiter au pays de Juda. '
  '5':
  - type: note
    content: '41.16s ; 2R 25.26. –  de toutes les nations…  : cf. 40.11. –  séjourner  : le terme s''applique habituellement au séjour de l''immigré (cf. Ex 12.48n).'
  - type: text
    content: 'Et Yohanân, fils de Qaréah, et tous les chefs de l''armée prirent tout le reste de Juda, ceux qui étaient revenus, de toutes les nations où ils avaient été bannis, pour séjourner au pays de Juda, '
  '6':
  - type: note
    content: et leurs familles ou les enfants  ; cf. 40.7+. –  filles du roi 41.10+.
  - type: text
    content: 'les hommes, les femmes et leurs familles, les filles du roi – tous ceux que Nebouzaradân, chef des gardes, avait laissés avec Guedalia, fils d''Ahiqam, fils de Shaphân – ainsi que Jérémie, le prophète, et Baruch, fils de Nériya. '
  '7':
  - type: note
    content: Tahpanhès 2.16n.
  - type: text
    content: 'Ils allèrent en Egypte – car ils n''écoutèrent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et ils arrivèrent à Tahpanhès.'
  - type: heading
    content: Jérémie annonce l'invasion de l'Egypte
  '8':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie, à Tahpanhès :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 10 ; 13.1+,4-7.
  - type: text
    content: 'Prends de grandes pierres et cache-les, sous les yeux des Judéens, dans l''argile de la terrasse en briques qui est à l''entrée de la maison du pharaon, à Tahpanhès ; '
