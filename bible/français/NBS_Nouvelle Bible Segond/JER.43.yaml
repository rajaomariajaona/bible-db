verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie est emmené de force en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : omis par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''avait chargé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Jérémie eut achevé de dire à tout le peuple toutes les paroles du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', leur Dieu, toutes ces paroles que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', leur Dieu, l''avait chargé de leur dire, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je placerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il placera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tapis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: baldaquin ; dais.
      marker-yv: yv-n
    - type: text
      text: 'tu leur diras : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : J''envoie chercher Nabuchodonosor, roi de Babylone, mon serviteur. Je placerai son trône sur ces pierres que j''ai cachées, et il étendra son tapis sur elles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il viendra mettre à mal… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '44.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 46.13,25s ; cf. Ez 29.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui est destiné… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.2+.
      marker-yv: yv-n
    - type: text
      text: 'Il viendra mettre à mal l''Egypte : Qui est destiné à la mort, à la mort ! Qui est destiné à la captivité, en captivité ! Qui est destiné à l''épée, à l''épée ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.10+ ; Es 46.2 ; Ez 30.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux maisons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temples
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il les brûlera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il faut sans doute comprendre : le roi de Babylone brûlera les temples et emmènera captives les images des dieux. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s'enveloppera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après LXX et un autre sens possible du verbe hébreu, d''autres traduisent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il épouillera l'Egypte comme un berger épouille son vêtement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: victorieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jos 10.21+.'
      marker-yv: yv-n
    - type: text
      text: 'Je mettrai le feu aux maisons des dieux de l''Egypte ; il les brûlera, il les emmènera captifs, il s''enveloppera de l''Egypte comme le berger s''enveloppe de son vêtement, et il en sortira victorieux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il brisera les pierres levées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 34.13 ; il s''agit probablement ici des obélisques associées au culte du soleil. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Shémesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (= Maison du soleil, cf. Es 19.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) est ici l'équivalent hébreu d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Héliopolis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= Ville du soleil), également appelée '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Gn 41.45
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 30.17), à 8 km du Caire.'
      marker-yv: yv-n
    - type: text
      text: Il brisera les pierres levées de Beth-Shémesh en Egypte et il mettra le feu aux maisons des dieux de l'Egypte.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Azaria… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'arrogants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 13.11 ; Ml 3.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'N''allez pas en Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.15+,19+.
      marker-yv: yv-n
    - type: text
      text: 'Azaria, fils de Hoshaya, Yohanân, fils de Qaréah, et tous ces hommes arrogants dirent à Jérémie : Ce que tu dis est faux ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, ne t''a pas envoyé pour dire : « N''allez pas en Egypte pour y séjourner en immigrés. » '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Baruch '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'incite à nous faire du tort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: t'excite contre nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et.
      marker-yv: yv-n
    - type: text
      text: 'Mais c''est Baruch, fils de Nériya, qui t''incite à nous faire du tort en nous livrant aux Chaldéens, pour qu''ils nous mettent à mort ou qu''ils nous exilent à Babylone. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 7 ; 42.13 ; 44.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui leur ordonnait d'habiter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour habiter.
      marker-yv: yv-n
    - type: text
      text: 'Yohanân, fils de Qaréah, tous les officiers et tout le peuple n''écoutèrent pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui leur ordonnait d''habiter au pays de Juda. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '41.16s ; 2R 25.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toutes les nations…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 40.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: séjourner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme s''applique habituellement au séjour de l''immigré (cf. Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Et Yohanân, fils de Qaréah, et tous les chefs de l''armée prirent tout le reste de Juda, ceux qui étaient revenus, de toutes les nations où ils avaient été bannis, pour séjourner au pays de Juda, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et leurs familles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 40.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'filles du roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 41.10+.
      marker-yv: yv-n
    - type: text
      text: 'les hommes, les femmes et leurs familles, les filles du roi – tous ceux que Nebouzaradân, chef des gardes, avait laissés avec Guedalia, fils d''Ahiqam, fils de Shaphân – ainsi que Jérémie, le prophète, et Baruch, fils de Nériya. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tahpanhès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils allèrent en Egypte – car ils n''écoutèrent pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – et ils arrivèrent à Tahpanhès.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie annonce l'invasion de l'Egypte
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Jérémie, à Tahpanhès :'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 10 ; 13.1+,4-7.
      marker-yv: yv-n
    - type: text
      text: 'Prends de grandes pierres et cache-les, sous les yeux des Judéens, dans l''argile de la terrasse en briques qui est à l''entrée de la maison du pharaon, à Tahpanhès ; '
