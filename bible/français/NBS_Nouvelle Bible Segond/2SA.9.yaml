document_id: 2SA.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David accueille Mephi-Bosheth chez lui
  - type: text
    content: ' '
  - type: note
    content: 'David , lié à Jonathan par un serment d''amitié, s''était engagé à respecter les descendants de son ami (1S 20.15s,42 ; cf. 2S 21.7). Sa sollicitude envers Mephi-Bosheth n''est peut-être pas totalement désintéressée : accueillir le petit-fils de Saül à sa table (v. 7) permettra à David de le surveiller de près.'
  - type: text
    content: 'David dit : Reste-t-il encore quelqu''un de la maison de Saül, pour que j''agisse avec fidélité envers lui à cause de Jonathan ? '
  '10':
  - type: note
    content: Le texte actuel de ce v. est bizarre, car il est question d'une part de Tsiba qui devra fournir la nourriture pour Mephi-Bosheth, et d'autre part de Mephi-Bosheth qui mangera à la table du roi ; deux légères modifications du texte hébreu traditionnel, d'après un ms de LXX, permettraient de lire … afin que la maison de ton seigneur ait du pain et qu'ils mangent ; quant à Mephi-Bosheth… il mangera…  ; cf. v. 1n.
  - type: text
    content: 'Tu cultiveras pour lui les terres, toi, tes fils et tes serviteurs, et tu rentreras les récoltes, afin que le fils de ton maître ait de quoi manger ; et Mephi-Bosheth, fils de ton maître, mangera constamment à ma table. Or Tsiba avait quinze fils et vingt serviteurs. '
  '11':
  - type: note
    content: 'Je ferai… m''ordonnes  : cf. 15.15 ; 1S 16.16n. –  David avait dit  : les mots correspondants ne figurent pas dans le texte hébreu traditionnel, mais ils y sont peut-être sous-entendus (cf. v. 10). Le texte de ce v., comme celui du v. 10, est peu sûr, et l''interprétation en est difficile ; litt. Mephi-Bosheth mangeant à ma table… On pourrait aussi y voir la suite du discours direct de Tsiba, qui émettrait une timide protestation  : je veux bien faire ce que tu ordonnes (travailler les terres). Toutefois Mephi-Bosheth mange actuellement à ma table (et je ne vois pas de raison de modifier cette façon de faire)  ; Syr a traduit Mephi-Bosheth mange à la table du roi  ; Vg Mephi-Bosheth mangera à ta table  ; LXX reprend la narration  : Mephi-Bosheth mangeait à la table de David…'
  - type: text
    content: 'Tsiba dit au roi : Je ferai exactement ce que tu m''ordonnes, ô roi, mon seigneur. David avait dit : Mephi-Bosheth mangera à ma table, comme l''un des fils du roi. '
  '12':
  - type: note
    content: Le nom de Michée (hébreu Mika’) apparaît sous une forme légèrement différente (Mika) en 1Ch 8.34s ; 9.40s.
  - type: text
    content: 'Mephi-Bosheth avait un jeune fils, nommé Michée, et tous ceux qui habitaient chez Tsiba étaient au service de Mephi-Bosheth. '
  '13':
  - type: note
    content: 'boiteux  : cf. v. 3 ; 4.4n. –  jambes  : autre traduction pieds.'
  - type: text
    content: Mephi-Bosheth habitait à Jérusalem, car il mangeait constamment à la table du roi. Il était boiteux des deux jambes.
  '2':
  - type: note
    content: 'Tsiba  : cf. 16.1-4 ; 19.18,27,30. –  Oui…  : litt. ton serviteur.'
  - type: text
    content: 'Il y avait un homme attaché à la maison de Saül, nommé Tsiba, que l''on introduisit auprès de David. Le roi lui dit : Es-tu Tsiba ? Et il répondit : Oui, pour te servir. '
  '3':
  - type: note
    content: 'la fidélité de Dieu  : cf. 1S 20.14n (la fidélité du Seigneur). –  infirme des pieds  : cf. 4.4n.'
  - type: text
    content: 'Le roi dit : N''y a-t-il plus personne de la maison de Saül, pour que j''agisse envers lui avec la fidélité de Dieu ? Tsiba répondit au roi : Il y a encore un fils de Jonathan, qui est infirme des pieds. '
  '4':
  - type: note
    content: 'Makir  : cf. 17.27. –  Lo-Debar  : localité située à une douzaine de kilomètres au sud du lac de Tibériade, à l''est du Jourdain.'
  - type: text
    content: 'Le roi lui dit : Où est-il ? Tsiba répondit au roi : Il est chez Makir, fils d''Ammiel, à Lo-Debar. '
  '5':
  - type: text
    content: 'Le roi David l''envoya chercher chez Makir, fils d''Ammiel, à Lo-Debar. '
  '6':
  - type: note
    content: 'Mephi-Bosheth  : cf. 4.4n. –  tomba face contre terre, prosterné  : attitude de profonde humilité, cf. 1S 25.23. –  Mephi-Bosheth ! on pourrait aussi y voir une nuance interrogative  : (es-tu bien) Mephi-Bosheth ? –  pour te servir v. 2n.'
  - type: text
    content: 'Mephi-Bosheth, fils de Jonathan, fils de Saül, vint auprès de David et tomba face contre terre, prosterné. David dit : Mephi-Bosheth ! Il répondit : Je suis là, pour te servir. '
  '7':
  - type: note
    content: 'N''aie pas peur  : cf. Jg 6.23+. –  Je te rendrai…  : il est probable que les terres de Saül avaient été intégrées dans le patrimoine de son successeur, David. –  Saül, ton père  : le mot hébreu correspondant à père s''emploie facilement pour désigner un ancêtre (Mephi-Bosheth est un petit-fils de Saül). –  tu mangeras  : litt. tu mangeras du pain. –  constamment à ma table  : cf. v. 1n.'
  - type: text
    content: 'David lui dit : N''aie pas peur ! Je vais agir avec fidélité envers toi à cause de Jonathan, ton père. Je te rendrai toutes les terres de Saül, ton père, et tu mangeras constamment à ma table. '
  '8':
  - type: note
    content: 'Que suis-je  : litt. qu''est ton serviteur. –  un chien mort  : cf. 1S 24.15+.'
  - type: text
    content: 'Il se prosterna et dit : Que suis-je pour que tu regardes un chien mort tel que moi ?'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 16.4 ; 19.30.
  - type: text
    content: 'Le roi appela Tsiba, l''homme de Saül, et lui dit : Je donne au fils de ton maître tout ce qui appartenait à Saül et à toute sa maison. '
