document_id: 2SA.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David accueille Mephi-Bosheth chez lui
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', lié à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jonathan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par un serment d''amitié, s''était engagé à respecter les descendants de son ami (1S 20.15s,42 ; cf. 2S 21.7). Sa sollicitude envers Mephi-Bosheth n''est peut-être pas totalement désintéressée : accueillir le petit-fils de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saül '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à sa table (v. 7) permettra à David de le surveiller de près.
    marker-yv: yv-n
  - type: text
    text: 'David dit : Reste-t-il encore quelqu''un de la maison de Saül, pour que j''agisse avec fidélité envers lui à cause de Jonathan ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsiba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.1-4 ; 19.18,27,30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Oui…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton serviteur.
    marker-yv: yv-n
  - type: text
    text: 'Il y avait un homme attaché à la maison de Saül, nommé Tsiba, que l''on introduisit auprès de David. Le roi lui dit : Es-tu Tsiba ? Et il répondit : Oui, pour te servir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la fidélité de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 20.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la fidélité du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: infirme des pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi dit : N''y a-t-il plus personne de la maison de Saül, pour que j''agisse envers lui avec la fidélité de Dieu ? Tsiba répondit au roi : Il y a encore un fils de Jonathan, qui est infirme des pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Makir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lo-Debar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localité située à une douzaine de kilomètres au sud du lac de Tibériade, à l''est du Jourdain.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi lui dit : Où est-il ? Tsiba répondit au roi : Il est chez Makir, fils d''Ammiel, à Lo-Debar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi David l''envoya chercher chez Makir, fils d''Ammiel, à Lo-Debar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mephi-Bosheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tomba face contre terre, prosterné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : attitude de profonde humilité, cf. 1S 25.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mephi-Bosheth ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: on pourrait aussi y voir une nuance interrogative
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(es-tu bien) Mephi-Bosheth ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour te servir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mephi-Bosheth, fils de Jonathan, fils de Saül, vint auprès de David et tomba face contre terre, prosterné. David dit : Mephi-Bosheth ! Il répondit : Je suis là, pour te servir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: N'aie pas peur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 6.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je te rendrai…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il est probable que '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les terres de Saül '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'avaient été intégrées dans le patrimoine de son successeur, David. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Saül, ton père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 's''emploie facilement pour désigner un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ancêtre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Mephi-Bosheth est un petit-fils de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu mangeras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu mangeras du pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: constamment à ma table
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David lui dit : N''aie pas peur ! Je vais agir avec fidélité envers toi à cause de Jonathan, ton père. Je te rendrai toutes les terres de Saül, ton père, et tu mangeras constamment à ma table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que suis-je
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'est ton serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un chien mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 24.15+.'
    marker-yv: yv-n
  - type: text
    text: 'Il se prosterna et dit : Que suis-je pour que tu regardes un chien mort tel que moi ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 16.4 ; 19.30.
    marker-yv: yv-n
  - type: text
    text: 'Le roi appela Tsiba, l''homme de Saül, et lui dit : Je donne au fils de ton maître tout ce qui appartenait à Saül et à toute sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte actuel de ce v. est bizarre, car il est question d''une part de Tsiba qui devra fournir la nourriture pour Mephi-Bosheth, et d''autre part de Mephi-Bosheth qui mangera à la table du roi ; deux légères modifications du texte hébreu traditionnel, d''après un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', permettraient de lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: … afin que la maison de ton seigneur ait du pain et qu'ils mangent ; quant à Mephi-Bosheth… il mangera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu cultiveras pour lui les terres, toi, tes fils et tes serviteurs, et tu rentreras les récoltes, afin que le fils de ton maître ait de quoi manger ; et Mephi-Bosheth, fils de ton maître, mangera constamment à ma table. Or Tsiba avait quinze fils et vingt serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je ferai… m'ordonnes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.15 ; 1S 16.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David avait dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les mots correspondants ne figurent pas dans le texte hébreu traditionnel, mais ils y sont peut-être sous-entendus (cf. v. 10). Le texte de ce v., comme celui du v. 10, est peu sûr, et l''interprétation en est difficile ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mephi-Bosheth mangeant à ma table… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On pourrait aussi y voir la suite du discours direct de Tsiba, qui émettrait une timide protestation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je veux bien faire ce que tu ordonnes (travailler les terres). Toutefois Mephi-Bosheth mange actuellement à ma table (et je ne vois pas de raison de modifier cette façon de faire)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' a traduit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mephi-Bosheth mange à la table du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mephi-Bosheth mangera à ta table
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX reprend la narration'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mephi-Bosheth mangeait à la table de David…
    marker-yv: yv-n
  - type: text
    text: 'Tsiba dit au roi : Je ferai exactement ce que tu m''ordonnes, ô roi, mon seigneur. David avait dit : Mephi-Bosheth mangera à ma table, comme l''un des fils du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le nom de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Michée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mika’
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) apparaît sous une forme légèrement différente (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mika
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) en 1Ch 8.34s ; 9.40s.
    marker-yv: yv-n
  - type: text
    text: 'Mephi-Bosheth avait un jeune fils, nommé Michée, et tous ceux qui habitaient chez Tsiba étaient au service de Mephi-Bosheth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: boiteux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3 ; 4.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jambes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pieds.
    marker-yv: yv-n
  - type: text
    text: Mephi-Bosheth habitait à Jérusalem, car il mangeait constamment à la table du roi. Il était boiteux des deux jambes.
