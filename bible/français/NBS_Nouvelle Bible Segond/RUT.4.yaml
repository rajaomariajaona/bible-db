  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salmôn engendra Booz ; Booz engendra Obed ; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1S 16.1-13 ; 17.12.
      marker-yv: yv-n
    - type: text
      text: Obed engendra Jessé ; Jessé engendra David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2.1,3.
      marker-yv: yv-n
    - type: text
      text: 'Puis il dit au rédempteur : Noémi, qui est revenue du pays de Moab, a mis en vente la parcelle de terre qui appartenait à Elimélek, notre frère. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai pensé t'en informer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''ai dit : Je découvrirai ton oreille'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Achète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.13 ; Lv 25.25 ; Jr 32.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'devant les habitants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui siègent ici
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 23.18 ; Jr 32.8,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si tu n'assures pas la rédemption
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss hébreux ont la troisième personne '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il n'assure pas la rédemption.
      marker-yv: yv-n
    - type: text
      text: 'Moi, j''ai pensé t''en informer, en te disant : Achète, devant les habitants et les anciens de mon peuple ! Si donc tu veux assurer la rédemption, fais-le ! Si tu n''assures pas la rédemption, dis-le-moi, que je le sache, car il n''y a personne à part toi qui puisse le faire. Je ne viens qu''après toi. Il répondit : C''est moi qui assurerai la rédemption. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de Ruth'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Ruth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais la locution prépositive est différente de celle qui est employée pour '
      - type: usfm
        marker: fq
