    - type: text
      text: 'Booz prit Ruth et elle devint sa femme ; il alla avec elle. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donna à Ruth de concevoir, et elle mit au monde un fils. '
