document_id: RUT.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Booz s'occupe de la succession d'Elimélek
  - type: text
    content: ' '
  - type: note
    content: 'à la porte de la ville (litt. à la porte ) v. 10n  ; Dt 16.18n  ; cf. Gn 19.1 ; 2S 18.24 ; 19.9 ; Jb 5.4n  ; 29.7. –  le rédempteur 2.20n. –  dont Booz avait parlé 3.12. –  Approche  : le même verbe est souvent traduit par faire un détour (p. ex. Ex 3.3s). –  Untel  : la même expression hébraïque apparaît en 1S 21.3 ; 2R 6.8 ( tel et tel endroit ).'
  - type: text
    content: 'Booz était monté à la porte de la ville et s''y était assis. Or le rédempteur dont Booz avait parlé vint à passer. Booz lui dit : Approche, assieds-toi ici, Untel ! Il s''approcha donc et s''assit. '
  '10':
  - type: note
    content: 'ne soit pas retranché  : cf. Es 48.19 ; 56.5. –  de la porte de sa ville (litt. de son lieu), où sont entérinés les actes d''état-civil et notamment les mariages ; cf. v. 1+,11. –  Vous en êtes témoins  : cf. Jos 24.22.'
  - type: text
    content: 'et que j''ai également acheté pour femme Ruth la Moabite, femme de Mahlôn, pour maintenir le nom du défunt sur son patrimoine et pour que le nom du défunt ne soit pas retranché d''entre ses frères et de la porte de sa ville. Vous en êtes témoins aujourd''hui. '
  '11':
  - type: note
    content: 'Nous en sommes témoins  : litt. Témoins ! LXX a lu tout le peuple… dit : Témoins ! et les anciens dirent : Que le Seigneur… –  Rachel / Léa Gn 29–30 ; 35.16-26. –  ont bâti la maison  : en hébreu le verbe et son complément sont apparentés au mot habituellement traduit par fils. –  Déploie ta force  : litt. fais puissance, cf. 2.1n  ; Nb 24.18. –  Ephrata / Beth-Léhem 1.1n-2n. –  fais-toi un nom  : litt. proclame (ou appelle, invoque) un nom à Beth-Léhem.'
  - type: text
    content: 'Tout le peuple qui était à la porte de la ville et les anciens dirent : Nous en sommes témoins ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donne à la femme qui entre chez toi d''être comme Rachel et Léa qui, à elles deux, ont bâti la maison d''Israël ! Déploie ta force à Ephrata, fais-toi un nom à Beth-Léhem ! '
  '12':
  - type: note
    content: Le récit de la naissance de Pérets, ancêtre de Booz (v. 18+ss), est également lié à la coutume du lévirat (1.11n  ; voir Gn 38.1-29 ; 1Ch 2.4).
  - type: text
    content: 'Puisse la descendance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te donnera par cette jeune femme rendre ta maison semblable à la maison de Pérets, que Tamar donna à Juda !'
  - type: heading
    content: Booz épouse Ruth ; naissance d'Obed
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'alla avec Gn 16.2n. –  donna… de concevoir  : cf. Gn 21.1 ; 25.21 ; 29.31 ; 30.2,22 ; 1S 1.19s,27 ; Lc 1.58.'
  - type: text
    content: 'Booz prit Ruth et elle devint sa femme ; il alla avec elle. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna à Ruth de concevoir, et elle mit au monde un fils. '
  '14':
  - type: note
    content: 'Voir bénédiction. –  que son nom soit proclamé…  : cette phrase peut s''appliquer au rédempteur (peut-être ici l''enfant, v. 15 ; cf. 2.20n), mais aussi au Seigneur.'
  - type: text
    content: 'Les femmes dirent à Noémi : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui ne t''a pas laissée aujourd''hui sans rédempteur ; que son nom soit proclamé en Israël ! '
  '15':
  - type: note
    content: 'Le fils de Ruth est probablement considéré, du point de vue juridique, comme le fils de son premier mari et donc comme le petit-fils de Noémi ; c''est lui qui prendra soin de sa vieillesse et lui assurera une descendance. –  il pourvoira à tous tes besoins Gn 45.11 ; 47.12 ; 50.21 ; 2S 19.33s ; 20.3. –  ta vieillesse  : litt. tes cheveux blancs, Gn 15.15n  ; 1Ch 29.28. –  que sept fils  : cf. 1S 1.8 ; 16.10ss.'
  - type: text
    content: 'Il te fait revenir à la vie, il pourvoira à tous tes besoins dans ta vieillesse ; car ta belle-fille qui t''aime l''a mis au monde, elle qui vaut mieux pour toi que sept fils. '
  '16':
  - type: note
    content: 'sur son sein ou sur ses genoux, dans son giron, peut-être en signe d''adoption ; autre expression hébraïque Gn 30.3-8 ; 48.5,12 ; 50.23. –  sa nourrice  : cf. Nb 11.12n.'
  - type: text
    content: 'Noémi prit l''enfant et le mit sur son sein ; c''est elle qui fut sa nourrice. '
  '17':
  - type: note
    content: 'lui donnèrent un nom / l''appelèrent du nom  : les deux formules sont presque identiques en hébreu ; certains comprennent proclamèrent son nom  ; cf. Es 9.5s ; Lc 1.58. –  Obed signifie serviteur (probablement dans le sens de serviteur de Dieu, c.-à-d. d''adorateur ou de fidèle).'
  - type: text
    content: 'Les voisines lui donnèrent un nom en disant : Un fils est né de Noémi ! Elles l''appelèrent du nom d''Obed. C''est le père de Jessé, père de David.'
  - type: heading
    content: Liste des ancêtres de David
  - type: heading
    content: 1Ch 2.9-17
  '18':
  - type: text
    content: ' '
  - type: note
    content: généalogie Gn 2.4n. –  Pérets v. 12n  ; voir aussi 1Ch 2.5-15 ; Mt 1.3-6 ; Lc 3.31-33.
  - type: text
    content: 'Voici la généalogie de Pérets :'
  - type: text
    content: 'Pérets engendra Hetsrôn ; '
  '19':
  - type: text
    content: 'Hetsrôn engendra Ram ; Ram engendra Amminadab ; '
  '2':
  - type: note
    content: Cf. v. 10s ; Dt 21.19 ; 22.15 ; 25.7.
  - type: text
    content: 'Booz prit alors dix hommes parmi les anciens de la ville et dit : Asseyez-vous ici. Ils s''assirent. '
  '20':
  - type: note
    content: 'Nahshôn Nb 1.7 ; 2.3. –  Salma  : plusieurs versions anciennes transcrivent ce nom de la même manière que Salmôn au v. 21.'
  - type: text
    content: 'Amminadab engendra Nahshôn ; Nahshôn engendra Salma ; '
  '21':
  - type: text
    content: 'Salmôn engendra Booz ; Booz engendra Obed ; '
  '22':
  - type: note
    content: Cf. 1S 16.1-13 ; 17.12.
  - type: text
    content: Obed engendra Jessé ; Jessé engendra David.
  '3':
  - type: note
    content: Cf. 2.1,3.
  - type: text
    content: 'Puis il dit au rédempteur : Noémi, qui est revenue du pays de Moab, a mis en vente la parcelle de terre qui appartenait à Elimélek, notre frère. '
  '4':
  - type: note
    content: 'j''ai pensé t''en informer  : litt. j''ai dit : Je découvrirai ton oreille. –  Achète  : cf. 3.13 ; Lv 25.25 ; Jr 32.7. –  devant les habitants ou ceux qui siègent ici  ; cf. Gn 23.18 ; Jr 32.8,10. –  Si tu n''assures pas la rédemption  : certains mss hébreux ont la troisième personne s''il n''assure pas la rédemption.'
  - type: text
    content: 'Moi, j''ai pensé t''en informer, en te disant : Achète, devant les habitants et les anciens de mon peuple ! Si donc tu veux assurer la rédemption, fais-le ! Si tu n''assures pas la rédemption, dis-le-moi, que je le sache, car il n''y a personne à part toi qui puisse le faire. Je ne viens qu''après toi. Il répondit : C''est moi qui assurerai la rédemption. '
  '5':
  - type: note
    content: 'au nom de Ruth  : litt. de Ruth, mais la locution prépositive est différente de celle qui est employée pour Noémi (à Noémi, litt. de la main de Noémi) ; Vg a lu tu acquerras aussi Ruth. Des incertitudes demeurent quant au lien entre la rédemption des terres d''un proche parent et le devoir d''épouser sa veuve. Peut-être Untel (v. 2) était-il disposé à reprendre la terre d''une veuve déjà âgée (Noémi) dont il aurait seulement eu à assurer la subsistance jusqu''à la fin de ses jours. La présence de Ruth, une jeune femme en âge d''avoir des enfants, l''obligerait dans l''avenir à prendre en charge toute une famille. En outre, les descendants de Ruth hériteraient sans doute la terre au nom du défunt, de sorte que les héritiers du rédempteur n''en profiteraient pas ; tout cela peut expliquer son excuse (v. 6) ; cf. 1.11n  ; 2.20n  ; Gn 38.8s ; Dt 25.5-8.'
  - type: text
    content: 'Booz dit : Le jour où tu achèteras le champ à Noémi, tu l''achèteras au nom de Ruth la Moabite, femme du défunt, pour maintenir le nom du défunt sur son patrimoine. '
  '6':
  - type: text
    content: 'Le rédempteur répondit : Je ne peux pas assurer la rédemption, de peur d''anéantir mon propre patrimoine ; assure toi-même la rédemption qui m''incombe, car je ne peux pas le faire.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Autrefois, en Israël  : cf. 1S 9.9. –  on ôtait sa sandale  : cf. Dt 25.9s ; ici le geste semble surtout signifier la renonciation à un droit ; voir par opposition Ps 60.10 ; 108.10.'
  - type: text
    content: 'Autrefois, en Israël, pour conclure toute affaire relative à une rédemption ou à un échange, on ôtait sa sandale et on la donnait à l''autre ; cela servait d''attestation en Israël. '
  '8':
  - type: text
    content: 'Le rédempteur dit donc à Booz : Achète toi-même ! Et il ôta sa sandale.'
  '9':
  - type: text
    content: 'Alors Booz dit aux anciens et à tout le peuple : Vous êtes témoins aujourd''hui que j''ai acheté à Noémi tout ce qui appartenait à Elimélek, à Kiliôn et à Mahlôn, '
