    - type: text
      text: 'Booz était monté à la porte de la ville et s''y était assis. Or le rédempteur dont Booz avait parlé vint à passer. Booz lui dit : Approche, assieds-toi ici, Untel ! Il s''approcha donc et s''assit. '
  '10':
  - type: usfm
