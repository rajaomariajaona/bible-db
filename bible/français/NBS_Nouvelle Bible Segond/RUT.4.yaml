      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lui donnèrent un nom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'appelèrent du nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les deux formules sont presque identiques en hébreu ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: proclamèrent son nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Es 9.5s ; Lc 1.58. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Obed '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'serviteur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(probablement dans le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteur de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''adorateur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Les voisines lui donnèrent un nom en disant : Un fils est né de Noémi ! Elles l''appelèrent du nom d''Obed. C''est le père de Jessé, père de David.'
  - type: usfm
    marker: s1
