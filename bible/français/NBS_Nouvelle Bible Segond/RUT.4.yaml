      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne soit pas retranché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 48.19 ; 56.5. –  '
      - type: usfm
