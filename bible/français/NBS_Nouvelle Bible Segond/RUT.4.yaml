  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hetsrôn engendra Ram ; Ram engendra Amminadab ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 10s ; Dt 21.19 ; 22.15 ; 25.7.
      marker-yv: yv-n
    - type: text
      text: 'Booz prit alors dix hommes parmi les anciens de la ville et dit : Asseyez-vous ici. Ils s''assirent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
