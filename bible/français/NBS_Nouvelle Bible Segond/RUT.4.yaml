        children:
        - type: text
          text: 'de la porte de sa ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), où sont entérinés les actes d''état-civil et notamment les mariages ; cf. v. 1+,11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous en êtes témoins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 24.22.'
      marker-yv: yv-n
    - type: text
      text: 'et que j''ai également acheté pour femme Ruth la Moabite, femme de Mahlôn, pour maintenir le nom du défunt sur son patrimoine et pour que le nom du défunt ne soit pas retranché d''entre ses frères et de la porte de sa ville. Vous en êtes témoins aujourd''hui. '
