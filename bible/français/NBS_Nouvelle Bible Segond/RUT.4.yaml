        - type: text
          text: 'Noémi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Noémi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la main de Noémi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu acquerras aussi Ruth. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Des incertitudes demeurent quant au lien entre la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rédemption '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'des terres d''un proche parent et le devoir d''épouser sa veuve. Peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Untel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2) était-il disposé à reprendre la terre d'une veuve déjà âgée (
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Noémi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') dont il aurait seulement eu à assurer la subsistance jusqu''à la fin de ses jours. La présence de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ruth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', une jeune femme en âge d''avoir des enfants, l''obligerait dans l''avenir à prendre en charge toute une famille. En outre, les descendants de Ruth hériteraient sans doute la terre au '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nom du défunt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de sorte que les héritiers du rédempteur n''en profiteraient pas ; tout cela peut expliquer son excuse (v. 6) ; cf. 1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 38.8s ; Dt 25.5-8.'
      marker-yv: yv-n
    - type: text
      text: 'Booz dit : Le jour où tu achèteras le champ à Noémi, tu l''achèteras au nom de Ruth la Moabite, femme du défunt, pour maintenir le nom du défunt sur son patrimoine. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le rédempteur répondit : Je ne peux pas assurer la rédemption, de peur d''anéantir mon propre patrimoine ; assure toi-même la rédemption qui m''incombe, car je ne peux pas le faire.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Autrefois, en Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 9.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on ôtait sa sandale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 25.9s ; ici le geste semble surtout signifier la renonciation à un droit ; voir par opposition Ps 60.10 ; 108.10.'
      marker-yv: yv-n
    - type: text
      text: 'Autrefois, en Israël, pour conclure toute affaire relative à une rédemption ou à un échange, on ôtait sa sandale et on la donnait à l''autre ; cela servait d''attestation en Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le rédempteur dit donc à Booz : Achète toi-même ! Et il ôta sa sandale.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Booz dit aux anciens et à tout le peuple : Vous êtes témoins aujourd''hui que j''ai acheté à Noémi tout ce qui appartenait à Elimélek, à Kiliôn et à Mahlôn, '
