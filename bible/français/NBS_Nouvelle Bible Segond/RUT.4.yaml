  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le fils de Ruth est probablement considéré, du point de vue juridique, comme le fils de son premier mari et donc comme le petit-fils de Noémi ; c''est lui qui prendra soin de sa vieillesse et lui assurera une descendance. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il pourvoira à tous tes besoins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 45.11 ; 47.12 ; 50.21 ; 2S 19.33s ; 20.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta vieillesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tes cheveux blancs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gn 15.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 29.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que sept fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 1.8 ; 16.10ss.'
      marker-yv: yv-n
    - type: text
      text: 'Il te fait revenir à la vie, il pourvoira à tous tes besoins dans ta vieillesse ; car ta belle-fille qui t''aime l''a mis au monde, elle qui vaut mieux pour toi que sept fils. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur son sein '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur ses genoux, dans son giron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut-être en signe d''adoption ; autre expression hébraïque Gn 30.3-8 ; 48.5,12 ; 50.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa nourrice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 11.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Noémi prit l''enfant et le mit sur son sein ; c''est elle qui fut sa nourrice. '
  '17':
  - type: usfm
