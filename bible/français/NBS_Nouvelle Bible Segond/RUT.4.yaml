    - type: text
      text: 'Tout le peuple qui était à la porte de la ville et les anciens dirent : Nous en sommes témoins ! Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donne à la femme qui entre chez toi d''être comme Rachel et Léa qui, à elles deux, ont bâti la maison d''Israël ! Déploie ta force à Ephrata, fais-toi un nom à Beth-Léhem ! '
