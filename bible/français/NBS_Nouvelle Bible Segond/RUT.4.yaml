    - type: text
      text: ' te donnera par cette jeune femme rendre ta maison semblable à la maison de Pérets, que Tamar donna à Juda !'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Booz épouse Ruth ; naissance d'Obed
