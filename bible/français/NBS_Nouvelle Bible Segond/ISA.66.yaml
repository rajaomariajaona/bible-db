document_id: ISA.66,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Vrais et faux adorateurs
  - type: text
    content: ' '
  - type: note
    content: 'Mt 5.34s ; Ac 7.49s. –  ciel / trône  : cf. 57.15 ; Ps 11.4+. –  marchepied 60.13. –  maison 1R 8.27 ; cf. Ag 1. –  mon repos Ps 132.13s.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Le ciel est mon trône,
  - type: text
    content: la terre mon marchepied.
  - type: text
    content: Quelle maison pourriez-vous me bâtir,
  - type: text
    content: quel serait le lieu de mon repos ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 61.3 ; 65.18s ; voir aussi Mt 5.4 ; Jn 16.20.
  - type: text
    content: Réjouissez-vous avec Jérusalem,
  - type: text
    content: faites d'elle le sujet de votre allégresse,
  - type: text
    content: vous tous qui l'aimez ;
  - type: text
    content: partagez sa gaieté,
  - type: text
    content: vous tous qui menez deuil sur elle,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'allaités 60.16n. –  son sein qui console  : litt. le sein de ses consolations  ; cf. 40.1+. –  savouriez  : verbe rare et traduction incertaine. –  surabondance  : le mot pourrait aussi signifier mamelle.'
  - type: text
    content: afin que vous soyez allaités et rassasiés
  - type: text
    content: par son sein qui console,
  - type: text
    content: afin que vous savouriez avec délices
  - type: text
    content: la surabondance de sa gloire.
  '12':
  - type: text
    content: ' '
  - type: note
    content: la paix comme un fleuve 48.18. –  gloire des nations 60.13 ; 61.6. –  torrent impétueux 30.28n. –  allaités 60.16. –  sur la hanche 60.4n.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je dirige vers elle la paix comme un fleuve,
  - type: text
    content: et la gloire des nations comme un torrent impétueux.
  - type: text
    content: Vous serez allaités ;
  - type: text
    content: vous serez portés sur la hanche
  - type: text
    content: et caressés sur les genoux.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 49.15 ; voir aussi 40.1+. –  à Jérusalem  : autres traductions au sujet de Jérusalem, à cause de Jérusalem.'
  - type: text
    content: Comme un homme que sa mère console,
  - type: text
    content: ainsi, moi, je vous consolerai ;
  - type: text
    content: vous serez consolés à Jérusalem.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'verrez / cœur 60.5. –  vos os  : cf. Ez 37. –  reprendront de la vigueur  : litt. pousseront ou fleuriront. –  main du Seigneur  : cf. 59.1. –  à ses serviteurs  : 65.8,13-15.'
  - type: text
    content: Vous verrez cela, et votre cœur s'égayera,
  - type: text
    content: et vos os reprendront de la vigueur comme l'herbe ;
  - type: text
    content: 'la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se fera connaître à ses serviteurs,'
  - type: text
    content: et sa fureur à ses ennemis.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2Th 1.8-12. –  feu 64.1. –  chars / ouragan 5.28 ; Jr 4.13.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: arrive dans le feu,
  - type: text
    content: et ses chars sont comme un ouragan,
  - type: text
    content: pour satisfaire sa colère avec ardeur
  - type: text
    content: et rabrouer avec un feu flamboyant.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 25.30-33 ; Ez 21.1-22. –  tous  : litt. toute chair  ; cf. v. 23+.'
  - type: text
    content: 'C''est par le feu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entre en jugement,'
  - type: text
    content: C'est par son épée qu'il entre en jugement avec tous ;
  - type: text
    content: 'nombreuses sont les victimes du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'se consacrent 65.5. – Voir pur. –  jardins 1.29+ ; 65.3. –  au milieu desquels ils vont l''un après l''autre  : litt. derrière un au milieu , expression qui désigne peut-être le prêtre du culte idolâtrique ; cf. Ez 8.11. –  porc 65.4+. –  souris Lv 11.29 ; 1S 6.4,11,18.'
  - type: text
    content: Ceux qui se consacrent et se purifient
  - type: text
    content: pour aller dans les jardins,
  - type: text
    content: au milieu desquels ils vont l'un après l'autre,
  - type: text
    content: qui mangent de la viande de porc,
  - type: text
    content: des horreurs, des souris,
  - type: text
    content: ceux-là finiront tous ensemble
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Le grand rassemblement final
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'je connais  : le verbe n''étant pas exprimé en hébreu, certains comprennent, en bonne part, je serai leurs œuvres et leurs pensées  ; d''autres modifient l''ordre du texte et rattachent au v. 17 pour lire leurs œuvres et leurs pensées périront, – déclaration du Seigneur . Moi je suis venu pour rassembler… –  Le temps  : sous-entendu dans le texte. –  toutes les nations 2.2+. –  verront ma gloire 40.5 ; 60.1-3.'
  - type: text
    content: 'Moi, je connais leurs œuvres et leurs pensées. Le temps est venu de rassembler toutes les nations et toutes les langues ; elles viendront et verront ma gloire. '
  '19':
  - type: note
    content: 'signe 7.11+. –  rescapés / nations 45.20. –  Tarsis 2.16n. –  Poul  : des versions anciennes ont lu Pouth (probablement la Libye), comme en Gn 10.6n  ; Ez 27.10+. –  Loud  : probablement la Lydie, Gn 10.22n. –  Toubal (probablement en Anatolie, dans l''actuelle Turquie) et la Grèce ou Ionie (hébreu Yawân) ; cf. Gn 10.2n. –  îles 11.11+. –  ils diront ou ils raconteront, ils feront connaître.'
  - type: text
    content: 'Je mettrai un signe parmi elles ; j''enverrai certains de leurs rescapés vers les nations, à Tarsis, à Poul et à Loud, – les tireurs à l''arc – à Toubal et en Grèce, aux îles lointaines qui jamais n''ont entendu parler de moi et qui n''ont pas vu ma gloire ; et ils diront ma gloire parmi les nations. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Toutes ces choses… Ps 24.1 ; 50.10s. –  elles sont toutes venues à l''existence  : LXX elles sont à moi. –  le pauvre ou l''humilié  ; cf. 57.15. –  qui tremble… v. 5 ; cf. Esd 9.4 ; 10.3 ; même verbe en 2R 4.13n.'
  - type: text
    content: Toutes ces choses, c'est ma main qui les a faites,
  - type: text
    content: c'est ainsi qu'elles sont toutes venues à l'existence
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: 'Voici sur qui je porterai mes regards :'
  - type: text
    content: sur le pauvre qui a l'esprit abattu,
  - type: text
    content: qui tremble à ma parole.
  '20':
  - type: note
    content: '14.2 ; 49.22 ; 60.4,9. –  des dromadaires  : autre traduction possible des palanquins.'
  - type: text
    content: 'Ils amèneront tous vos frères d''entre toutes les nations en offrande au '
  - type: text
    content: Seigneur
  - type: text
    content: ', sur des chevaux, des chars et des chariots couverts, sur des mulets et des dromadaires, à ma montagne sacrée, à Jérusalem, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme les Israélites apportent leur offrande, dans un récipient pur, à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '21':
  - type: note
    content: Cf. 56.3-7 et, par opposition, Esd 2.62 ; Né 7.64.
  - type: text
    content: 'Et je prendrai aussi parmi eux des prêtres, des lévites, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '22':
  - type: text
    content: ' '
  - type: note
    content: 65.17+.
  - type: text
    content: En effet, comme le ciel nouveau
  - type: text
    content: et la terre nouvelle que je fais
  - type: text
    content: subsisteront devant moi,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: ainsi subsisteront votre descendance et votre nom.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'tous  : litt. toute chair  ; cf. v. 16,24 ; 40.5 ; Ps 65.3.'
  - type: text
    content: De nouvelle lune en nouvelle lune
  - type: text
    content: et de sabbat en sabbat,
  - type: text
    content: tous viendront se prosterner
  - type: text
    content: 'devant moi, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'quand ils sortiront  : sous-entendu du temple  ; cette précision désigne peut-être la vallée de Hinnom ou géhenne  ; cf. 22.1n  ; Jr 7.31s ; Mt 5.22n. –  ver / feu  : cf. Mc 9.48  ; Ac 12.23 ; Judith 16.17 : « Malheur aux nations qui se dressent contre ma race. Le Seigneur tout-puissant s''en vengera au jour du jugement, en mettant le feu et les vers dans leurs chairs, et ils pleureront de douleur éternellement. » Siracide 7.17 : « La punition de l''impie, c''est le feu et les vers. » –  tous v. 23n. –  un sujet d''horreur  : même terme en Dn 12.2.'
  - type: text
    content: Et quand ils sortiront, ils pourront voir
  - type: text
    content: les cadavres des hommes qui se sont révoltés contre moi ;
  - type: text
    content: car leur ver ne mourra pas,
  - type: text
    content: et leur feu ne s'éteindra pas ;
  - type: text
    content: ils seront pour tous un sujet d'horreur.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. décrit probablement l''association du meilleur et du pire dans le culte. –  abat un homme  : cf. 57.5. –  brise la nuque  : cf. Ex 13.13 ; 34.20 ; Dt 21.4,6 ; Os 10.2n. –  chien Lv 11.7 ; Dt 14.6. –  offre (du sang…)  : le verbe est ici sous-entendu dans le texte. –  porc 65.4. –  offre de l''encens (Ex 30.34n) en évocation ou en souvenir , terme apparenté à celui qui désigne la partie de l''offrande faite en évocation ; cf. Lv 2.2n  ; 24.7. –  bénit le mal ou une chose nuisible, un néant  ; l''expression pourrait signifier adore une idole (cf. 41.29). –  se complaisent dans  : litt. ont choisi , de même au v. 4  : je choisirai leur infortune et ils ont choisi ce à quoi je ne prends aucun plaisir  ; cf. 56.4. –  leurs voies 55.8.'
  - type: text
    content: Celui qui immole un taureau
  - type: text
    content: abat un homme ;
  - type: text
    content: celui qui sacrifie un mouton ou une chèvre
  - type: text
    content: brise la nuque à un chien ;
  - type: text
    content: celui qui présente une offrande
  - type: text
    content: offre du sang de porc ;
  - type: text
    content: celui qui offre de l'encens en évocation
  - type: text
    content: bénit le mal ;
  - type: text
    content: tous ceux-là se complaisent dans leurs voies,
  - type: text
    content: et ils prennent plaisir à leurs horreurs.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'infortune  : voir 3.4n  ; le mot hébreu semble désigner ici un pouvoir ou un sort cruel et arbitraire. –  j''ai appelé… 50.2+ ; 65.12. –  personne 41.28+. –  ils ont choisi… 56.4+.'
  - type: text
    content: Moi aussi, je me complairai dans leur infortune
  - type: text
    content: et je ferai venir sur eux ce qui causait leur effroi,
  - type: text
    content: parce que j'ai appelé,
  - type: text
    content: et que personne n'a répondu ;
  - type: text
    content: parce que j'ai parlé,
  - type: text
    content: et qu'ils n'ont pas écouté ;
  - type: text
    content: mais ils ont fait ce qui me déplaisait,
  - type: text
    content: et ils ont choisi ce à quoi je ne prends aucun plaisir.
  - type: heading
    content: Le Seigneur apporte réconfort et jugement
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tremblez v. 2+. –  vous repoussent  : ce verbe rare désignera plus tard dans le judaïsme l''exclusion rituelle. –  Que le Seigneur montre…  : cf. 5.19 ; Jr 17.15 ; 2P 3.4. –  honte 65.13.'
  - type: text
    content: 'Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'vous qui tremblez à sa parole :'
  - type: text
    content: Voici ce que disent vos frères,
  - type: text
    content: qui vous détestent et vous repoussent
  - type: text
    content: 'à cause de mon nom :'
  - type: text
    content: '« Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' montre sa gloire,'
  - type: text
    content: et que nous voyions votre joie ! »
  - type: text
    content: Mais ce sont eux qui auront honte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Un vacarme…  : litt. un bruit de vacarme de la ville, un bruit du temple, la voix du Seigneur  ; le terme hébreu correspondant à bruit signifie également voix  ; cf. Gn 2.8n  ; Jr 25.30 ; Ap 16.17-19. –  ce qu''ils méritent 59.18n.'
  - type: text
    content: Un vacarme vient de la ville,
  - type: text
    content: des cris sortent du temple.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: qui rend à ses ennemis ce qu'ils méritent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'elle désigne Sion ou Jérusalem repeuplée v. 8 ; cf. 49.20-22 ; 50.1. –  a donné le jour à un fils  : litt. a libéré un mâle  ; cf. Ap 12.5.'
  - type: text
    content: Avant d'être en travail,
  - type: text
    content: elle a accouché ;
  - type: text
    content: avant que les douleurs ne lui viennent,
  - type: text
    content: elle a donné le jour à un fils.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Qui a jamais entendu… 64.3. –  naître  : en hébreu, même verbe (à la forme passive) que être en travail au v. 7 (forme active).'
  - type: text
    content: Qui a jamais entendu rien de tel ?
  - type: text
    content: Qui a jamais rien vu de semblable ?
  - type: text
    content: Un pays peut-il naître en un seul jour ?
  - type: text
    content: Une nation peut-elle être mise au monde d'un seul coup ?
  - type: text
    content: A peine en travail, Sion a mis au monde ses fils !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le ventre d''une mère  : sous-entendu dans le texte, litt. ferais-je la brèche, et ne ferais-je pas accoucher ? cf. 37.3+. –  de naître  : sous-entendu dans le texte.'
  - type: text
    content: Ferais-je, moi, que le ventre d'une mère s'ouvre,
  - type: text
    content: pour ne pas la faire accoucher ?
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Moi qui fais accoucher,
  - type: text
    content: empêcherais-je de naître ?
  - type: text
    content: dit ton Dieu.
