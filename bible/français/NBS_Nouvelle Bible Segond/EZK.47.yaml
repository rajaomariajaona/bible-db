  - type: text
    text: 'Alors des pêcheurs s''y tiendront. Depuis Eïn-Guédi jusqu''à Eïn-Eglaïm, on étendra les filets. Ces poissons, selon leurs espèces, seront comme les poissons de la grande mer ; ils seront très nombreux. '
