document_id: EZK.47,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La source du temple
  - type: text
    content: ' '
  - type: note
    content: 'Il me ramena 46.19+. –  Maison 40.5n. –  De l''eau  : cf. Jl 4.18 ; Za 13.1 ; 14.8 ; Ps 46.5 ; 87.7 ; Ap 22.1 ; voir aussi Gn 2.10-13n  ; 1R 1.33-40 ; Es 8.6 ; Jn 4.14 ; 7.38 ; 19.34. –  seuil 46.2n. –  sous le côté droit / au sud  : cf. 16.46n.'
  - type: text
    content: 'Il me ramena vers l''entrée de la Maison. De l''eau sortait sous le seuil de la Maison à l''est, car la façade de la Maison était à l''est ; l''eau descendait sous le côté droit de la Maison, au sud de l''autel. '
  '10':
  - type: note
    content: 'Eïn-Guédi (Source du Chevreau), sur la rive occidentale de la mer Morte (Jos 15.62 ; 1S 24.1s ; 2Ch 20.2). –  Eïn-Eglaïm (Source des Deux Veaux), sans doute plus au nord sur la même rive. –  on étendra les filets  : litt. (ce sera) un étendoir à filets (expression apparentée en 26.5,14). –  selon leurs espèces Gn 1.11+. –  la grande mer  : la Méditerranée.'
  - type: text
    content: 'Alors des pêcheurs s''y tiendront. Depuis Eïn-Guédi jusqu''à Eïn-Eglaïm, on étendra les filets. Ces poissons, selon leurs espèces, seront comme les poissons de la grande mer ; ils seront très nombreux. '
  '11':
  - type: note
    content: 'lagunes  : cf. Es 30.14n. –  assainis ou guéris  ; cf. v. 8n. –  abandonnés (litt. donnés) au sel  : on pourrait comprendre, en bonne part  : on les gardera pour avoir du sel  ; cf. 43.24 ; sur l''état de la région de la mer Morte, voir aussi Gn 19.24ss.'
  - type: text
    content: 'Ses marais et ses lagunes ne seront pas assainis, ils seront abandonnés au sel. '
  '12':
  - type: note
    content: 'V. 7-8n  ; Ap 22.2 ; cf. Gn 2.8ss ; Es 44.4 ; Jr 17.8 ; Ps 1.3 ; 4 Esdras 7.123 : « Le paradis, dont les fruits restent incorruptibles, où l''on est rassasié et guéri. »'
  - type: text
    content: Près du torrent, sur ses rives, de chaque côté, pousseront toutes sortes d'arbres fruitiers. Leur feuillage ne se flétrira pas, leur fruit ne s'épuisera pas ; ils donneront des primeurs tous les mois, parce que ses eaux sortiront du sanctuaire. Leur fruit servira de nourriture et leur feuillage de remède.
  - type: heading
    content: Le Seigneur fixe les frontières d'Israël
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 21 ; 45.8 ; 48.29. –  Voici  : traduction obtenue par modification d''une lettre du texte hébreu traditionnel, incompréhensible, en accord avec des versions anciennes et le v. 15. –  deux parts , d''après Tg et Vg  ; la vocalisation traditionnelle de l''hébreu ferait traduire des parts  ; cf. Gn 48.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Voici les frontières du pays que vous distribuerez comme patrimoine aux douze tribus d''Israël. Joseph aura deux parts. '
  '14':
  - type: note
    content: 'sans distinction  : même expression en Lv 7.10n. –  juré… 20.5n. –  échoir  : le même verbe est traduit ailleurs par tomber  ; expression analogue au v. 22 pour partager au sort le patrimoine  ; cf. 45.1n  ; Jos 13.6n.'
  - type: text
    content: 'Vous l''aurez comme patrimoine sans distinction, ainsi que j''ai juré, à main levée, de le donner à vos pères. Ce pays va donc vous échoir comme patrimoine. '
  '15':
  - type: note
    content: 'les frontières du pays  : cf. Gn 15.18 ; Nb 13.21 ; 34.2-12 ; Jos 1.1-14 ; 1R 5.1 ; Es 26.15. –  la grande mer v. 10n. –  Hetlôn (48.1), selon certains entre Tyr et Sidon, selon d''autres beaucoup plus au nord. –  l''entrée de Tsedad  : LXX l''entrée de Hamath (v. 16, cf. v. 20), vers Tsedad  ; cf. Nb 13.21n  ; 34.8n.'
  - type: text
    content: 'Voici les frontières du pays. Du côté nord, depuis la grande mer, le chemin de Hetlôn jusqu''à l''entrée de Tsedad, '
  '16':
  - type: note
    content: 'Hamath v. 15n. –  Bérota  : cf. 2S 8.8. –  territoire et frontière traduisent le même terme hébreu. – Le Haurân  : l''Auranitide, à l''est du lac de Galilée.'
  - type: text
    content: 'Hamath, Bérota, Sibraïm entre le territoire de Damas et le territoire de Hamath, Hatser-Tikôn vers la frontière du Haurân. '
  '17':
  - type: note
    content: 'Hatsar-Eïnôn  : cf. Nb 34.9s. –  Tsaphôn et nord traduisent un même mot hébreu.'
  - type: text
    content: 'Ainsi la frontière sera, depuis la mer, Hatsar-Eïnôn, la frontière de Damas, Tsaphôn au nord, et la frontière de Hamath : ce sera le côté nord. '
  '18':
  - type: note
    content: 'entre le Haurân (v. 16n) et Damas, en Syrie : c''est la limite nord de la frontière est. –  le Galaad, à l’est du Jourdain, ne fait donc pas partie du pays d''Israël pour Ez (cf. Nb 32 ; 34.12-15 ; Jos 22.19,25). –  Vous mesurerez  : LXX et Syr ont lu vers Tamar (cf. v. 19 ; 48.28 ; 1R 9.18), ce qui correspond à une variante graphique mineure en hébreu. – Les mots est et orientale traduisent le même mot hébreu.'
  - type: text
    content: 'Le côté est sera le Jourdain, entre le Haurân et Damas, entre le Galaad et le pays d''Israël. Vous mesurerez depuis la frontière nord jusqu''à la mer orientale : ce sera le côté est. '
  '19':
  - type: note
    content: 'sud  : litt. du Néguev  ; cf. Gn 13.14n. –  vers le midi  : litt. vers Témân  ; cf. 25.13+ ; 48.28. –  Tamar v. 18n. –  Meriba  : forme plurielle dans le texte hébreu (meriboth) ; cf. 48.18 ; Nb 20.1,13 ; 27.14.'
  - type: text
    content: 'Le côté sud, vers le midi, ira depuis Tamar jusqu''aux eaux de Meriba à Qadesh, jusqu''au torrent, vers la grande mer : ce sera le côté du midi, au sud. '
  '2':
  - type: note
    content: 40.35.
  - type: text
    content: Il me fit sortir par le chemin de la porte nord et il me fit faire le tour par dehors jusqu'à l'extérieur de la porte qui donne sur l'est. L'eau coulait sur le côté droit.
  '20':
  - type: note
    content: 'ouest  : litt. de la mer. –  depuis la frontière (sous-entendu : sud) : certains modifient le texte hébreu traditionnel pour traduire à l''ouest la mer constituera la frontière jusqu''en face de l''entrée de Hamath (v. 15n).'
  - type: text
    content: 'Le côté ouest sera la grande mer, depuis la frontière jusqu''en face de l''entrée de Hamath : ce sera le côté ouest.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 13+.
  - type: text
    content: 'Vous partagerez ce pays entre vous, selon les tribus d''Israël. '
  '22':
  - type: note
    content: 'répartirez par le sort…  : cf. 45.1n  ; 48.29 (expression analogue). –  et pour les immigrés  : cf. 14.7 ; Ex 12.48n  ; Lv 16.29+.'
  - type: text
    content: 'Vous le répartirez par le sort, en patrimoines pour vous et pour les immigrés qui séjourneront au milieu de vous, qui engendreront des fils au milieu de vous ; ils seront pour vous comme des autochtones parmi les Israélites. Avec vous, ils répartiront le patrimoine par le sort au milieu des tribus d''Israël. '
  '23':
  - type: text
    content: 'Et ainsi, c''est dans la tribu où l''immigré séjournera que vous lui donnerez son patrimoine – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un cordeau  : cf. 40.3 ; 1R 7.23 ; Jr 31.39. –  mille coudées (≈ 525 m) 40.5n  ; voir aussi mesures, poids et monnaies. –  j''avais de l''eau…  : litt. eau de chevilles , tournure analogue dans les v. suivants. LXX a rendu le mot hébreu pour chevilles ( ’ophsayim ) par le grec aphéséôs, de pardon.'
  - type: text
    content: 'Lorsque l''homme sortit vers l''est, il avait dans la main un cordeau et il mesura mille coudées ; il me fit traverser l''eau, et j''avais de l''eau jusqu''aux chevilles. '
  '4':
  - type: text
    content: 'Il mesura encore mille coudées et me fit traverser l''eau, et j''avais de l''eau jusqu''aux genoux. Il mesura encore mille coudées et me fit traverser, et j''avais de l''eau jusqu''aux reins. '
  '5':
  - type: note
    content: 'l''eau était si profonde…  : litt. l''eau était montée en eau de nage. –  un torrent  : le terme qui apparaît ici et dans la suite est aussi traduit ailleurs par oued (cf. Gn 26.17n  ; Jb 6.15n). Un terme apparenté est également rendu par torrent au v. 19 et en 48.28.'
  - type: text
    content: Il mesura encore mille coudées ; c'était un torrent que je ne pouvais traverser, car l'eau était si profonde qu'il fallait y nager ; c'était un torrent qu'on ne pouvait traverser.
  '6':
  - type: text
    content: ' '
  - type: note
    content: As-tu vu… 8.12,15,17.
  - type: text
    content: 'Il me dit : As-tu vu, humain ? Il me conduisit et me ramena au bord du torrent. '
  '7':
  - type: note
    content: V. 12+.
  - type: text
    content: 'Quand il m''eut ramené, il y avait beaucoup d''arbres au bord du torrent, de chaque côté. '
  '8':
  - type: note
    content: 'plaine aride  : hébreu ‘arava  ; cf. Dt 1.1n  ; 2.8 ; Es 33.9n. –  la mer Morte, si salée qu''elle ne contient aucune forme de vie. –  lorsqu''elle se sera jetée dans la mer  : expression obscure ; autre traduction, d''après Syr  : (dans la mer), dans les eaux infectées (cf. Ex 7.21). –  deviendront saines  : litt. seront guéries (terme apparenté à remède au v. 12), comme en 2R 2.21s ; cf. Ex 15.23-25.'
  - type: text
    content: 'Il me dit : Cette eau sortira vers le district oriental, descendra dans la plaine aride et entrera dans la mer ; lorsqu''elle se sera jetée dans la mer, les eaux de la mer deviendront saines. '
  '9':
  - type: note
    content: 'le torrent  : la première fois qu''il apparaît dans ce v., le mot hébreu correspondant est au duel (on pourrait traduire les deux torrents ou le double torrent) ; des versions anciennes ont lu le singulier. –  tous les êtres vivants qui grouillent  : même expression en Gn 1.20s. –  les eaux  : sous-entendu dans le texte.'
  - type: text
    content: 'Partout où le torrent arrivera, tous les êtres vivants qui grouillent vivront ; il y aura une grande quantité de poissons, car cette eau arrivera là-bas et les eaux deviendront saines, et il y aura de la vie partout où arrivera le torrent. '
