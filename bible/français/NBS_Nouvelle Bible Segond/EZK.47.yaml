  - type: text
    text: 'Il me ramena vers l''entrée de la Maison. De l''eau sortait sous le seuil de la Maison à l''est, car la façade de la Maison était à l''est ; l''eau descendait sous le côté droit de la Maison, au sud de l''autel. '
