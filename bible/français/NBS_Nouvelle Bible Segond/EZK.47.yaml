  - type: text
    text: Près du torrent, sur ses rives, de chaque côté, pousseront toutes sortes d'arbres fruitiers. Leur feuillage ne se flétrira pas, leur fruit ne s'épuisera pas ; ils donneront des primeurs tous les mois, parce que ses eaux sortiront du sanctuaire. Leur fruit servira de nourriture et leur feuillage de remède.
