  - type: text
    text: 'Partout où le torrent arrivera, tous les êtres vivants qui grouillent vivront ; il y aura une grande quantité de poissons, car cette eau arrivera là-bas et les eaux deviendront saines, et il y aura de la vie partout où arrivera le torrent. '
