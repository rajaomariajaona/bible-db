document_id: 1SA.19,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonathan prend la défense de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faire mourir David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 18.25,29 ; 20.32 ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faire mourir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est un des verbes clefs de ce chap. (cf. v. 2,5,11,15,17). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'David plaisait beaucoup à Jonathan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jonathan… se plaisait beaucoup avec David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 18.1+,22+.
      marker-yv: yv-n
    - type: text
      text: 'Saül parla à Jonathan, son fils, et à tous les gens de sa cour, de son intention de faire mourir David. Mais David plaisait beaucoup à Jonathan, fils de Saül. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 18.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'échappa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un autre des verbes clefs de ce chap. (cf. v. 11s,17s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pendant la nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' rattache ces mots au début du v. 11.'
      marker-yv: yv-n
    - type: text
      text: Puis Saül chercha à clouer David au mur avec sa lance. Mais David esquiva le coup de Saül, qui planta la lance dans le mur. Alors David prit la fuite ; il s'échappa pendant la nuit.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: émissaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot hébreu est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: messagers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour le surveiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour la surveiller '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la maison) ; cf. Ps 59.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu es un homme mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu seras mis à mort.
      marker-yv: yv-n
    - type: text
      text: 'Saül envoya des émissaires à la maison de David, pour le surveiller et le mettre à mort au matin. Mais Mikal, femme de David, l''en informa en disant : Si tu ne t''échappes pas cette nuit, demain tu es un homme mort. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par la fenêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 2.15 ; Ac 9.25 ; 2Co 11.32s.'
      marker-yv: yv-n
    - type: text
      text: 'Elle le fit descendre par la fenêtre, et David s''en alla et s''enfuit. C''est ainsi qu''il échappa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'teraphim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'idoles familiales '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pouvaient avoir, semble-t-il, différents formats : petits et faciles à dissimuler en Gn 31.19,34, ou de taille plus importante comme ici. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une peau de chèvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant ne se trouve qu''ici et au v. 16, et son sens précis n''est pas connu ; peut-être le poil noir de la peau de chèvre était-il destiné à imiter la chevelure d''un homme ; on a souvent pensé aussi à un tissu très peu serré (en poil de chèvre), sorte de moustiquaire servant ici à camoufler le visage du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: teraphim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la tête du lit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur sa tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(celle du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: teraphim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un vêtement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une couverture.
      marker-yv: yv-n
    - type: text
      text: 'Ensuite Mikal prit le teraphim et le plaça dans le lit ; elle mit une peau de chèvre à la tête du lit, et elle le couvrit d''un vêtement. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lorsque Saül envoya des émissaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'répète formellement le début du v. 11, mais le v. 14 fait allusion à leur arrivée chez David. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: arrêter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jn 7.32,45. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il est malade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 2.5 ; 2S 17.20.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Saül envoya des émissaires pour prendre David, elle dit : Il est malade. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'ils voient David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les émissaires ne devront pas se contenter des explications de Mikal, mais entrer en contact direct avec le fugitif.'
      marker-yv: yv-n
    - type: text
      text: 'Saül les renvoya pour qu''ils voient David. Il dit : Amenez-le-moi dans son lit, et qu''on le mette à mort. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la tête du lit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur sa tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 13.'
      marker-yv: yv-n
    - type: text
      text: 'Les émissaires revinrent, et le teraphim était dans le lit, avec une peau de chèvre à la tête du lit. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'as-tu trompé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 28.12 ; Gn 29.25 ; Jos 9.22 ; 2S 19.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sinon je te tue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pourquoi te tuerais-je ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2S 2.22).
      marker-yv: yv-n
    - type: text
      text: 'Saül dit à Mikal : Pourquoi m''as-tu trompé ainsi ? Pourquoi as-tu laissé partir mon ennemi, de sorte qu''il s''est échappé ? Mikal répondit à Saül : Il m''a dit : « Laisse-moi partir, sinon je te tue ! »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David et Saül à Rama
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Rama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux Nayoth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 20.1) : un lieu-dit proche de Rama, dont le nom peut également se lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Navith
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après une autre lecture traditionnelle. Le mot pourrait se traduire par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les demeures, les résidences '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et désigner les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ermitages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cellules '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: des prophètes dont il est question dans la suite du chap.
      marker-yv: yv-n
    - type: text
      text: 'C''est ainsi que David prit la fuite et qu''il échappa. Il se rendit auprès de Samuel à Rama et lui dit tout ce que Saül lui avait fait. Puis il alla avec Samuel habiter aux Nayoth. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On le fit savoir à Saül : David est aux Nayoth, à Rama. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan en informa donc David ; il lui dit : Saül, mon père, cherche à te faire mourir. Je t''en prie, sois sur tes gardes demain matin ; reste à l''abri, cache-toi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: arrêter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils virent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après des versions anciennes ; le texte hébreu traditionnel dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il vit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', singulier difficilement explicable. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un groupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant n''apparaît qu''ici et son sens précis n''est pas connu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui se comportaient en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec Samuel à leur tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samuel se tenant debout au-dessus d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. la position analogue d''Elisée en 2R 4.38-41 ; 6.1-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: souffle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'eux aussi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.5s ; cf. Nb 11.25.
      marker-yv: yv-n
    - type: text
      text: 'Saül envoya des émissaires pour prendre David. Ils virent un groupe de prophètes qui se comportaient en prophètes, avec Samuel à leur tête. Le souffle de Dieu fut sur les émissaires de Saül, et eux aussi se mirent à faire les prophètes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Triple envoi : cf. 2R 1.9-14.'
      marker-yv: yv-n
    - type: text
      text: 'On le dit à Saül, qui envoya d''autres émissaires, et eux aussi se mirent à faire les prophètes. Il en envoya encore une troisième fois, et ceux-là aussi se mirent à faire les prophètes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sékou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : lieu non identifié, appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Séfi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Saül alla lui-même à Rama. Arrivé à la grande citerne qui est à Sékou, il demanda : Où sont Samuel et David ? On lui répondit : Ils sont aux Nayoth, à Rama. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en faisant le prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',10.'
      marker-yv: yv-n
    - type: text
      text: 'De là, il se dirigea vers les Nayoth, à Rama. Le souffle de Dieu fut sur lui aussi ; il continua son chemin en faisant le prophète jusqu''à son arrivée aux Nayoth, à Rama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quitta ses vêtements… nu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 6.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saül… prophètes ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 10.11+.
      marker-yv: yv-n
    - type: text
      text: 'Lui aussi quitta ses vêtements, et lui aussi fit le prophète devant Samuel ; il tomba et resta prostré et nu tout ce jour-là et toute la nuit. C''est pourquoi l''on dit : Saül est-il aussi parmi les prophètes ?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la campagne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour toi, en ta faveur
