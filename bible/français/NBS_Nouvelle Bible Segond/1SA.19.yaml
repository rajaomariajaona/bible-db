document_id: 1SA.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonathan prend la défense de David
  - type: text
    content: ' '
  - type: note
    content: 'faire mourir David  : cf. 18.25,29 ; 20.32 ; faire mourir est un des verbes clefs de ce chap. (cf. v. 2,5,11,15,17). –  David plaisait beaucoup à Jonathan ou, plus littéralement, Jonathan… se plaisait beaucoup avec David  ; cf. 18.1+,22+.'
  - type: text
    content: 'Saül parla à Jonathan, son fils, et à tous les gens de sa cour, de son intention de faire mourir David. Mais David plaisait beaucoup à Jonathan, fils de Saül. '
  '10':
  - type: note
    content: 'Voir 18.11n. –  s''échappa  : un autre des verbes clefs de ce chap. (cf. v. 11s,17s). –  pendant la nuit  : LXX rattache ces mots au début du v. 11.'
  - type: text
    content: Puis Saül chercha à clouer David au mur avec sa lance. Mais David esquiva le coup de Saül, qui planta la lance dans le mur. Alors David prit la fuite ; il s'échappa pendant la nuit.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'émissaires  : le même mot hébreu est habituellement traduit par messagers . –  pour le surveiller ou pour la surveiller (la maison) ; cf. Ps 59.1. –  tu es un homme mort  : litt. tu seras mis à mort.'
  - type: text
    content: 'Saül envoya des émissaires à la maison de David, pour le surveiller et le mettre à mort au matin. Mais Mikal, femme de David, l''en informa en disant : Si tu ne t''échappes pas cette nuit, demain tu es un homme mort. '
  '12':
  - type: note
    content: 'par la fenêtre  : cf. Jos 2.15 ; Ac 9.25 ; 2Co 11.32s.'
  - type: text
    content: 'Elle le fit descendre par la fenêtre, et David s''en alla et s''enfuit. C''est ainsi qu''il échappa. '
  '13':
  - type: note
    content: 'Les teraphim ou idoles familiales pouvaient avoir, semble-t-il, différents formats : petits et faciles à dissimuler en Gn 31.19,34, ou de taille plus importante comme ici. –  une peau de chèvre  : le mot hébreu correspondant ne se trouve qu''ici et au v. 16, et son sens précis n''est pas connu ; peut-être le poil noir de la peau de chèvre était-il destiné à imiter la chevelure d''un homme ; on a souvent pensé aussi à un tissu très peu serré (en poil de chèvre), sorte de moustiquaire servant ici à camoufler le visage du teraphim. –  à la tête du lit  : autre traduction sur sa tête (celle du teraphim). –  un vêtement ou simplement une couverture.'
  - type: text
    content: 'Ensuite Mikal prit le teraphim et le plaça dans le lit ; elle mit une peau de chèvre à la tête du lit, et elle le couvrit d''un vêtement. '
  '14':
  - type: note
    content: 'Lorsque Saül envoya des émissaires répète formellement le début du v. 11, mais le v. 14 fait allusion à leur arrivée chez David. –  prendre ou arrêter  ; cf. Jn 7.32,45. –  Il est malade  : cf. Jos 2.5 ; 2S 17.20.'
  - type: text
    content: 'Lorsque Saül envoya des émissaires pour prendre David, elle dit : Il est malade. '
  '15':
  - type: note
    content: 'pour qu''ils voient David  : les émissaires ne devront pas se contenter des explications de Mikal, mais entrer en contact direct avec le fugitif.'
  - type: text
    content: 'Saül les renvoya pour qu''ils voient David. Il dit : Amenez-le-moi dans son lit, et qu''on le mette à mort. '
  '16':
  - type: note
    content: à la tête du lit ou sur sa tête  ; cf. v. 13.
  - type: text
    content: 'Les émissaires revinrent, et le teraphim était dans le lit, avec une peau de chèvre à la tête du lit. '
  '17':
  - type: note
    content: 'm''as-tu trompé  ; cf. 28.12 ; Gn 29.25 ; Jos 9.22 ; 2S 19.27. –  sinon je te tue  : litt. pourquoi te tuerais-je ? (cf. 2S 2.22).'
  - type: text
    content: 'Saül dit à Mikal : Pourquoi m''as-tu trompé ainsi ? Pourquoi as-tu laissé partir mon ennemi, de sorte qu''il s''est échappé ? Mikal répondit à Saül : Il m''a dit : « Laisse-moi partir, sinon je te tue ! »'
  - type: heading
    content: David et Saül à Rama
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'à Rama  : cf. 1.1n  ; 7.17. –  aux Nayoth (cf. 20.1) : un lieu-dit proche de Rama, dont le nom peut également se lire Navith , d''après une autre lecture traditionnelle. Le mot pourrait se traduire par les demeures, les résidences et désigner les ermitages ou les cellules des prophètes dont il est question dans la suite du chap.'
  - type: text
    content: 'C''est ainsi que David prit la fuite et qu''il échappa. Il se rendit auprès de Samuel à Rama et lui dit tout ce que Saül lui avait fait. Puis il alla avec Samuel habiter aux Nayoth. '
  '19':
  - type: text
    content: 'On le fit savoir à Saül : David est aux Nayoth, à Rama. '
  '2':
  - type: text
    content: 'Jonathan en informa donc David ; il lui dit : Saül, mon père, cherche à te faire mourir. Je t''en prie, sois sur tes gardes demain matin ; reste à l''abri, cache-toi. '
  '20':
  - type: note
    content: 'prendre ou arrêter, comme au v. 14. –  Ils virent  : d''après des versions anciennes ; le texte hébreu traditionnel dit il vit, singulier difficilement explicable. –  un groupe  : le mot hébreu correspondant n''apparaît qu''ici et son sens précis n''est pas connu. –  qui se comportaient en prophètes  : cf. 10.5n. –  avec Samuel à leur tête  : litt. Samuel se tenant debout au-dessus d''eux  ; cf. la position analogue d''Elisée en 2R 4.38-41 ; 6.1-7. –  souffle  : voir esprit. –  eux aussi… 10.5s ; cf. Nb 11.25.'
  - type: text
    content: 'Saül envoya des émissaires pour prendre David. Ils virent un groupe de prophètes qui se comportaient en prophètes, avec Samuel à leur tête. Le souffle de Dieu fut sur les émissaires de Saül, et eux aussi se mirent à faire les prophètes. '
  '21':
  - type: note
    content: 'Triple envoi : cf. 2R 1.9-14.'
  - type: text
    content: 'On le dit à Saül, qui envoya d''autres émissaires, et eux aussi se mirent à faire les prophètes. Il en envoya encore une troisième fois, et ceux-là aussi se mirent à faire les prophètes. '
  '22':
  - type: note
    content: 'Sékou  : lieu non identifié, appelé Séfi par LXX.'
  - type: text
    content: 'Alors Saül alla lui-même à Rama. Arrivé à la grande citerne qui est à Sékou, il demanda : Où sont Samuel et David ? On lui répondit : Ils sont aux Nayoth, à Rama. '
  '23':
  - type: note
    content: 'en faisant le prophète  : cf. 10.5n,10.'
  - type: text
    content: 'De là, il se dirigea vers les Nayoth, à Rama. Le souffle de Dieu fut sur lui aussi ; il continua son chemin en faisant le prophète jusqu''à son arrivée aux Nayoth, à Rama. '
  '24':
  - type: note
    content: 'quitta ses vêtements… nu  : cf. 2S 6.20. –  Saül… prophètes ? cf. 10.11+.'
  - type: text
    content: 'Lui aussi quitta ses vêtements, et lui aussi fit le prophète devant Samuel ; il tomba et resta prostré et nu tout ce jour-là et toute la nuit. C''est pourquoi l''on dit : Saül est-il aussi parmi les prophètes ?'
  '3':
  - type: note
    content: 'dans la campagne…  : cf. 20.5. –  de toi ou pour toi, en ta faveur. –  je te le dirai  : cf. v. 7 ; 20.9,13 ; Pr 17.17.'
  - type: text
    content: 'Je sortirai et je me tiendrai à côté de mon père dans la campagne, là où tu seras ; je parlerai de toi à mon père, je verrai ce qu''il en est et je te le dirai. '
  '4':
  - type: note
    content: 'favorablement  : litt. en bien  ; cf. Pr 31.8s. –  ne pèche pas contre  : cf. Gn 42.22. –  il a très bien agi  : litt. ses œuvres ont été très bien.'
  - type: text
    content: 'Jonathan parla favorablement de David à Saül, son père : O roi, dit-il, ne pèche pas contre David, ton serviteur, car il n''a pas péché envers toi. Au contraire, il a très bien agi envers toi ; '
  '5':
  - type: note
    content: 'il a risqué sa vie  : litt. il a mis sa vie dans sa main  ; cf. Jg 12.3+ ; Jb 13.14. –  tué le Philistin  : cf. 17.50s. –  a réalisé une grande victoire  : litt. a fait un grand salut  ; 17.49-53 ; cf. 11.13. –  le sang d''un innocent  : cf. Dt 19.10 ; 2R 24.4 ; Es 59.7 ; Jr 26.15 ; Jon 1.14.'
  - type: text
    content: 'il a risqué sa vie, il a tué le Philistin et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a réalisé une grande victoire pour tout Israël. Tu l''as vu et tu t''en es réjoui. Pourquoi pécherais-tu en versant le sang d''un innocent ? Pourquoi ferais-tu mourir David sans raison ? '
  '6':
  - type: note
    content: 'Par la vie du Seigneur  : cf. 14.39n.'
  - type: text
    content: 'Saül écouta Jonathan ; il fit ce serment : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', David ne sera pas mis à mort ! '
  '7':
  - type: note
    content: 'lui dit tout cela  : cf. v. 3. –  il reprit son service  : litt. il fut devant lui, cf. 16.16n. –  comme d''habitude  : cf. 14.21n.'
  - type: text
    content: Jonathan appela David et lui dit tout cela ; puis Jonathan amena David auprès de Saül, et il reprit son service comme d'habitude.
  - type: heading
    content: David sauvé par Mikal
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'continuait ou reprit . –  pour combattre ou pour faire la guerre , le verbe étant apparenté au substantif traduit par guerre . –  il leur infligea une grande défaite  : litt. il les frappa d''un grand coup , cf. 4.10n. Cf. 18.14,30.'
  - type: text
    content: 'La guerre continuait. David sortit pour combattre les Philistins ; il leur infligea une grande défaite ; ils durent fuir pour lui échapper. '
  '9':
  - type: note
    content: 'Voir 16.14+. –  souffle  : voir esprit. –  fut sur v. 20,23 ; cf. Nb 24.2n.'
  - type: text
    content: 'Un mauvais souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur Saül, alors qu''il était assis chez lui, sa lance à la main. David était en train de jouer de la lyre. '
