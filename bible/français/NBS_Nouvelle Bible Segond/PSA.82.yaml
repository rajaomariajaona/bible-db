document_id: PSA.82,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu garant de la justice pour tous
  - type: text
    content: ' '
  - type: note
    content: 'D''Asaph 73.1+. –  se tient  : autre traduction se tient debout  ; cf. Es 3.13. –  l''assemblée divine  : litt. la communauté d''El , nom qui, avant d''être appliqué au Dieu d''Israël, désignait le dieu suprême du panthéon cananéen, qui présidait l''assemblée des dieux  : cf. 8.6n  ; 29.1 ; 58.2n  ; 86.8 ; 89.6-8 ; 95.3 ; 96.4 ; 97.7ss ; 103.19ss ; 135.5 ; Gn 21.33n  ; Es 24.21 ; 41.21ss ; voir aussi Ex 4.16 ; 15.11 ; 1R 22.19ss ; Es 6.3 ; Jr 23.18 ; Jb 1.6ss ; 5.1 ; 15.15.'
  - type: text
    content: Psaume. D'Asaph.
  - type: text
    content: Dieu se tient dans l'assemblée divine ;
  - type: text
    content: il juge au milieu des dieux.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Jusqu''à quand 6.4+ ; cf. Ex 10.3 ; 16.28 ; Nb 14.11,27. –  favoriserez-vous les méchants  : litt. (re)lèverez-vous la face des méchants  ; cf. Gn 4.7n  ; Ml 1.8n  ; voir aussi Lv 19.15,35 ; Dt 1.17 ; 10.17n  ; Ez 22.27 ; Mi 3.1ss.'
  - type: text
    content: Jusqu'à quand jugerez-vous avec injustice
  - type: text
    content: 'et favoriserez-vous les méchants ? '
  - type: text
    content: Pause.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 22.21 ; 23.6 ; Dt 10.18 ; 24.17 ; 27.19 ; Es 1.17 ; Jr 5.28 ; 22.3 ; Jb 29.12s ; Pr 31.9. –  Faites droit  : c''est le même verbe qui est rendu par juger aux v. 1s ; voir justice.'
  - type: text
    content: Faites droit au faible et à l'orphelin,
  - type: text
    content: rendez justice au pauvre et au déshérité,
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jr 21.12.
  - type: text
    content: faites échapper le faible et le pauvre,
  - type: text
    content: délivrez-les de la main des méchants.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ils marchent dans les ténèbres Pr 2.13 ; 4.19 ; cf. Es 44.9,18. –  les fondations…  : cf. 11.3 ; 75.4 ; 96.10 ; Es 24.18.'
  - type: text
    content: Ils n'ont ni connaissance ni intelligence,
  - type: text
    content: ils marchent dans les ténèbres ;
  - type: text
    content: toutes les fondations de la terre vacillent.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jn 10.34. – Voir fils.
  - type: text
    content: 'J''avais dit : Vous êtes des dieux,'
  - type: text
    content: vous êtes tous des fils du Très-Haut.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 146.3 ; cf. Es 14.15 ; Ez 28.17 ; Dn 4.32.
  - type: text
    content: Cependant vous mourrez comme les humains,
  - type: text
    content: vous tomberez comme n'importe quel prince.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi 3.8+. –  tu as…  : autre traduction tu auras un patrimoine dans toutes les nations  ; cf. Dt 32.8.'
  - type: text
    content: Lève-toi, ô Dieu, juge la terre !
  - type: text
    content: Car tu as toutes les nations pour patrimoine.
