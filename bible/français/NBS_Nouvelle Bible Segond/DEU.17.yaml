      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de cette '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mishné ha-tora…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en grec ('
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deutéronomion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', proprement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deuxième loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''où le titre du livre (cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il prendra auprès
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de devant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prêtres-lévites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand il se sera assis sur son trône royal, il écrira pour lui, dans un livre, un double de cette loi, qu''il prendra auprès des prêtres-lévites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la lire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le lire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le livre), selon les différents témoins du texte ; cf. 2R 23.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: craindre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toutes les paroles de cette loi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.3 ; 28.58 ; 29.28 ; 31.12 ; 32.46 ; cf. 2R 23.24s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en les mettant en pratique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.1+.
      marker-yv: yv-n
    - type: text
      text: 'Il devra l''avoir avec lui et la lire tous les jours de sa vie, afin d''apprendre à craindre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu, et à observer toutes les paroles de cette loi et toutes ces prescriptions en les mettant en pratique ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans l'une des villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même expression hébraïque en 16.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 13.13ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui fait ce qui déplaît au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 22.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en passant outre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 26.13 ; Nb 14.41 ; 22.18 ; 24.13 ; Jos 7.11,15 ; 23.16 ; Jg 2.20 ; 2R 18.12 ; Es 24.5 ; Jr 34.18 ; Os 6.7 ; 8.1 ; Mi 7.18 ; Dn 9.11 ; 2Ch 24.20. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'S''il se trouve en ton sein, dans l''une des villes que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te donne, un homme ou une femme qui fait ce qui déplaît au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, en passant outre à son alliance ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni à droite… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11 ; 5.32+.
      marker-yv: yv-n
    - type: text
      text: afin que son cœur ne s'élève pas au-dessus de ses frères et qu'il ne s'écarte du commandement ni à droite ni à gauche ; afin qu'il prolonge ses jours dans son royaume, lui et ses fils, au sein d'Israël.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'servir… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le soleil… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.19+.
      marker-yv: yv-n
    - type: text
      text: 'qu''il aille servir d''autres dieux et se prosterne devant eux, devant le soleil, la lune ou toute l''armée du ciel, contrairement à ce que j''ai ordonné ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.15.
      marker-yv: yv-n
    - type: text
      text: 'que cela te soit rapporté, que tu en entendes parler, tu procéderas à une recherche sérieuse : la chose est-elle vraie, le fait est-il établi, cette abomination a-t-elle été commise en Israël ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux portes de ta ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
