      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 31.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un double '
      - type: usfm
        marker: ft
        children:
        - type: text
