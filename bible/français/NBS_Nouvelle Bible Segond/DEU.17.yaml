        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1S 8.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: placer un roi à ma tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: placer sur moi un roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu seras entré dans le pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te donne, lorsque tu en prendras possession, que tu y habiteras et que tu diras : « Je veux placer un roi à ma tête, comme toutes les nations qui m''entourent », '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', ton Dieu, choisira'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.32-38 ; 12.5+ ; 1S 10.24 ; 16.1,12.'
      marker-yv: yv-n
    - type: text
      text: 'tu pourras placer un roi à ta tête, celui que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, choisira ; tu placeras à ta tête un roi d''entre tes frères ; tu ne pourras pas avoir à ta tête un étranger qui ne soit pas ton frère. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 10.26-29 ; Es 31.1-3 ; Jr 42.19+ ; Ez 17.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous ne retournerez plus…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 28.68 ; Ex 14.10-13.'
      marker-yv: yv-n
    - type: text
      text: 'Mais qu''il n''ait pas un grand nombre de chevaux ; qu''il ne fasse pas retourner le peuple en Egypte pour avoir beaucoup de chevaux ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vous a dit : « Vous ne retournerez plus par ce chemin-là. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 11.1-13. Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Qu''il n''ait pas un grand nombre de femmes, afin que son cœur ne s''écarte pas, et qu''il n''ait pas une grande quantité d''argent et d''or. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
