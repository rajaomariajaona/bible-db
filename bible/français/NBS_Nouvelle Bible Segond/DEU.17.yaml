    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, ni bovin, ni mouton ou chèvre qui ait un défaut ou une malformation : ce serait une abomination pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
