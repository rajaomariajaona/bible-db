      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu agiras d''après la sentence qu''ils prononceront pour toi au lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' choisira, et tu veilleras à faire exactement ce qu''ils t''enseigneront. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni à droite ni à gauche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.32+.
      marker-yv: yv-n
    - type: text
      text: 'Tu agiras d''après la loi qu''ils t''enseigneront et le jugement qu''ils te diront ; tu ne t''écarteras ni à droite ni à gauche de la sentence qu''ils prononceront pour toi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour officier devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 18.5,7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu élimineras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7 ; 13.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''homme qui agit avec arrogance, n''écoutant ni le prêtre qui se tient là pour officier devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, ni le juge, cet homme-là mourra. Tu élimineras ainsi d''Israël ce qui est mauvais. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tout le peuple l'apprendra, et ils auront peur ; ils ne se comporteront plus avec arrogance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles concernant le roi
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
