document_id: DEU.17,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Voir sacrifices. –  défaut / malformation Lv 22.20+. –  abomination 7.25+.
  - type: text
    content: 'Tu n''offriras en sacrifice au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, ni bovin, ni mouton ou chèvre qui ait un défaut ou une malformation : ce serait une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '10':
  - type: note
    content: 'au lieu 12.5+. –  tu veilleras… 5.1n. –  enseigneront  : verbe apparenté au mot habituellement traduit par loi.'
  - type: text
    content: 'Tu agiras d''après la sentence qu''ils prononceront pour toi au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira, et tu veilleras à faire exactement ce qu''ils t''enseigneront. '
  '11':
  - type: note
    content: ni à droite ni à gauche 5.32+.
  - type: text
    content: 'Tu agiras d''après la loi qu''ils t''enseigneront et le jugement qu''ils te diront ; tu ne t''écarteras ni à droite ni à gauche de la sentence qu''ils prononceront pour toi. '
  '12':
  - type: note
    content: pour officier devant le Seigneur 10.8n  ; cf. 18.5,7. –  Tu élimineras v. 7 ; 13.6n.
  - type: text
    content: 'L''homme qui agit avec arrogance, n''écoutant ni le prêtre qui se tient là pour officier devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, ni le juge, cet homme-là mourra. Tu élimineras ainsi d''Israël ce qui est mauvais. '
  '13':
  - type: note
    content: '13.12. –  peur  : voir crainte.'
  - type: text
    content: Tout le peuple l'apprendra, et ils auront peur ; ils ne se comporteront plus avec arrogance.
  - type: heading
    content: Règles concernant le roi
  '14':
  - type: text
    content: ' '
  - type: note
    content: '1S 8.5. –  placer un roi à ma tête  : litt. placer sur moi un roi , de même dans la suite.'
  - type: text
    content: 'Lorsque tu seras entré dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, lorsque tu en prendras possession, que tu y habiteras et que tu diras : « Je veux placer un roi à ma tête, comme toutes les nations qui m''entourent », '
  '15':
  - type: note
    content: 'que le Seigneur, ton Dieu, choisira  : cf. 4.32-38 ; 12.5+ ; 1S 10.24 ; 16.1,12.'
  - type: text
    content: 'tu pourras placer un roi à ta tête, celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira ; tu placeras à ta tête un roi d''entre tes frères ; tu ne pourras pas avoir à ta tête un étranger qui ne soit pas ton frère. '
  '16':
  - type: note
    content: 'Cf. 1R 10.26-29 ; Es 31.1-3 ; Jr 42.19+ ; Ez 17.15. –  Vous ne retournerez plus…  : cf. 28.68 ; Ex 14.10-13.'
  - type: text
    content: 'Mais qu''il n''ait pas un grand nombre de chevaux ; qu''il ne fasse pas retourner le peuple en Egypte pour avoir beaucoup de chevaux ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a dit : « Vous ne retournerez plus par ce chemin-là. » '
  '17':
  - type: note
    content: Cf. 1R 11.1-13. Voir cœur.
  - type: text
    content: 'Qu''il n''ait pas un grand nombre de femmes, afin que son cœur ne s''écarte pas, et qu''il n''ait pas une grande quantité d''argent et d''or. '
  '18':
  - type: note
    content: 'il écrira… dans un livre  : cf. 31.24. –  un double (ou une copie) de cette loi  : hébreu mishné ha-tora…, en grec (LXX) deutéronomion, proprement deuxième loi, d''où le titre du livre (cf. 1.1n). –  qu''il prendra auprès  : litt. de devant. –  prêtres-lévites v. 9n.'
  - type: text
    content: 'Quand il se sera assis sur son trône royal, il écrira pour lui, dans un livre, un double de cette loi, qu''il prendra auprès des prêtres-lévites. '
  '19':
  - type: note
    content: la lire ou le lire (le livre), selon les différents témoins du texte ; cf. 2R 23.1-3. –  craindre 4.10+. –  toutes les paroles de cette loi 27.3 ; 28.58 ; 29.28 ; 31.12 ; 32.46 ; cf. 2R 23.24s. –  en les mettant en pratique 5.1+.
  - type: text
    content: 'Il devra l''avoir avec lui et la lire tous les jours de sa vie, afin d''apprendre à craindre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, et à observer toutes les paroles de cette loi et toutes ces prescriptions en les mettant en pratique ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dans l''une des villes  : même expression hébraïque en 16.5n  ; cf. 13.13ss. –  qui fait ce qui déplaît au Seigneur  : cf. Nb 22.34n. –  en passant outre  : cf. 26.13 ; Nb 14.41 ; 22.18 ; 24.13 ; Jos 7.11,15 ; 23.16 ; Jg 2.20 ; 2R 18.12 ; Es 24.5 ; Jr 34.18 ; Os 6.7 ; 8.1 ; Mi 7.18 ; Dn 9.11 ; 2Ch 24.20. – Voir alliance.'
  - type: text
    content: 'S''il se trouve en ton sein, dans l''une des villes que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, un homme ou une femme qui fait ce qui déplaît au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en passant outre à son alliance ; '
  '20':
  - type: note
    content: ni à droite… v. 11 ; 5.32+.
  - type: text
    content: afin que son cœur ne s'élève pas au-dessus de ses frères et qu'il ne s'écarte du commandement ni à droite ni à gauche ; afin qu'il prolonge ses jours dans son royaume, lui et ses fils, au sein d'Israël.
  '3':
  - type: note
    content: servir… 13.7+. –  le soleil… 4.19+.
  - type: text
    content: 'qu''il aille servir d''autres dieux et se prosterne devant eux, devant le soleil, la lune ou toute l''armée du ciel, contrairement à ce que j''ai ordonné ; '
  '4':
  - type: note
    content: 13.15.
  - type: text
    content: 'que cela te soit rapporté, que tu en entendes parler, tu procéderas à une recherche sérieuse : la chose est-elle vraie, le fait est-il établi, cette abomination a-t-elle été commise en Israël ? '
  '5':
  - type: note
    content: 'sortir  : cf. 21.19n. –  aux portes de ta ville  : litt. à tes portes, cf. v. 8 ; 16.18n  ; c''est aussi près de la porte, hors de la ville, que l''on exécutait les condamnés ; cf. 22.24 ; Jb 5.4n  ; Ac 7.58. –  vous le lapiderez…  : litt. vous les lapiderez et ils mourront 13.11+.'
  - type: text
    content: 'Tu feras alors sortir aux portes de ta ville l''homme ou la femme qui a commis cette mauvaise action ; homme ou femme, vous le lapiderez ; il mourra. '
  '6':
  - type: note
    content: 'Celui qui mérite la mort  : litt. celui qui meurt. –  sur la déposition  : litt. sur la bouche  ; 19.15 ; Nb 35.30 ; Mt 18.16 ; Mc 14.56 ; Jn 8.17s ; 2Co 13.1 ; 1Tm 5.19 ; Hé 10.28.'
  - type: text
    content: 'Celui qui mérite la mort sera mis à mort sur la déposition de deux ou trois témoins ; il ne sera pas mis à mort sur la déposition d''un seul témoin. '
  '7':
  - type: note
    content: Les témoins… tout le peuple 13.10+. –  Tu élimineras… 13.6n.
  - type: text
    content: Les témoins lèveront les premiers la main sur lui pour le mettre à mort, et tout le peuple ensuite. Tu élimineras ainsi de ton sein ce qui est mauvais.
  - type: heading
    content: Cas difficiles jugés au sanctuaire
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'une affaire…  : litt. une affaire (le même terme peut signifier parole ou chose ) de droit entre sang et sang, entre jugement et jugement, entre coup et coup (ou blessure et blessure ) , affaires de querelles dans tes portes (v. 5n) , est trop extraordinaire pour toi…  ; cf. 21.5n. –  au lieu… 12.5+ ; c''est à ce texte que se rattache l''institution postexilique du sanhédrin ; cf. 2Ch 19.8-11 ; Mt 5.22 ; Mc 14.53-64 ; Ac 22.5.'
  - type: text
    content: 'Si une affaire de meurtre, de différend ou de dommage corporel – tout litige aux portes de tes villes – te paraît trop difficile à juger, tu monteras au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira. '
  '9':
  - type: note
    content: 'les prêtres-lévites v. 18 ; 18.1 ; 24.8 ; 27.9 ; cf. 21.5 ; 31.9 ; Jos 3.3 ; 8.33, ceux du sanctuaire central (v. 8), par opposition aux lévites dispersés dans le reste du pays (12.12 ; 18.6) ; voir aussi Jr 33.18 ; Ez 43.19+ ; 44.15 ; 2Ch 23.18 ; 30.27. –  le juge 1.9+ ; 16.18-20 ; cf. Jos 2.16. –  tu consulteras  : litt. tu chercheras, ce que certains comprennent ainsi  : tu t''enquerras de la volonté de Dieu par leur entremise (cf. Am 5.4) ; Smr et LXX portent ils chercheront, ce qui peut aussi signifier ils délibéreront ou ils feront une enquête.'
  - type: text
    content: 'Tu iras vers les prêtres-lévites et vers le juge qui sera en fonction en ces jours-là ; tu consulteras, et ils prononceront pour toi la sentence de jugement. '
