document_id: PRO.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Collection de maximes diverses
  - type: text
    content: ' '
  - type: note
    content: 'Maximes de Salomon 1.1n  ; 25.1. Ce titre est ici omis par LXX. La collection correspondant à la section 10.1–22.16 (cf. 22.17n) comporte 375 sentences ; ce chiffre correspond, en hébreu, à la valeur numérique du nom de Salomon. –  Un fils sage… un fils stupide (1.22+) : cf. 15.20 ; 17.25 ; 19.13.'
  - type: text
    content: Maximes de Salomon.
  - type: text
    content: Un fils sage fait la joie d'un père ;
  - type: text
    content: un fils stupide, le chagrin de sa mère.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'L''œil qui cligne  : cf. 6.13+. –  les lèvres…  : cf. v. 8 ; LXX mais celui qui réprimande franchement fait (ou procure ) la paix  ; cf. Mt 5.9.'
  - type: text
    content: L'œil qui cligne est une cause de peine ;
  - type: text
    content: les lèvres imbéciles courent à leur perte.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'source de vie  : cf. 13.14 ; 14.27 ; 16.22 ; 25.26 ; Jr 2.13 ; 17.13 ; Ps 36.10. –  la bouche des méchants…  : autre traduction la violence couvre la bouche des méchants (même texte hébreu qu''au v. 6, susceptible des deux interprétations en fonction du contexte). –  couvre ou cache  ; cf. 11.13n.'
  - type: text
    content: La bouche du juste est une source de vie ;
  - type: text
    content: la bouche des méchants couvre la violence.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Jc 5.20 ; 1P 4.8  ; voir aussi 1Co 13.7. –  offenses  : autres traductions transgressions, révoltes  ; cf. 17.9.'
  - type: text
    content: La haine éveille des querelles ;
  - type: text
    content: l'amour couvre toutes les offenses.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'bâton 13.24 ; 22.8,15 ; 23.13,14 ; 26.3 ; 29.15 ; cf. 19.29 ; Siracide 42.8 : « N''aie pas honte de corriger l''imbécile et le sot et le vieillard très âgé accusé de débauche. » Voir aussi 20.30. –  dépourvu de raison 6.32n.'
  - type: text
    content: Sur les lèvres de l'homme intelligent se trouve la sagesse ;
  - type: text
    content: il y a un bâton pour le dos de celui qui est dépourvu de raison.
  '14':
  - type: text
    content: ' '
  - type: note
    content: en réserve ou cachée  ; cf. 13.3 ; 18.7 ; Mt 12.34-37. –  l'imbécile 1.7n.
  - type: text
    content: Les sages tiennent la connaissance en réserve ;
  - type: text
    content: la bouche de l'imbécile, c'est la ruine prochaine.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'riche… petites gens 18.11 ; 22.2n  ; cf. Ps 49.7 ; Siracide 8.2 : « Ne te querelle pas avec un homme riche, de peur qu''il n''ait plus de poids que toi. Car l''or en a perdu beaucoup, il a fait dévier même le cœur des rois. »'
  - type: text
    content: La fortune du riche est une ville forte ;
  - type: text
    content: la ruine des petites gens, c'est leur pauvreté.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 12.28 ; Rm 6.21s. –  Le gain  : litt. le travail ou le produit du travail . –  le revenu 3.9n. –  pour le péché  : d''autres comprennent pour leur ruine.'
  - type: text
    content: Le gain du juste est pour la vie ;
  - type: text
    content: le revenu du méchant est pour le péché.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'l''instruction 1.2n,8+. –  chemin de la vie  : cf. 2.19n. –  oublie  : litt. abandonne  ; cf. 12.1 ; 13.18 ; 15.5,32. –  avertissements 1.23n.'
  - type: text
    content: Celui qui garde l'instruction prend le chemin de la vie ;
  - type: text
    content: celui qui oublie les avertissements s'égare.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Des lèvres menteuses  : LXX des lèvres justes (cf. 16.13) ; autre traduction celui qui couvre la haine a des lèvres menteuses . –  stupide 1.22+.'
  - type: text
    content: Des lèvres menteuses couvrent la haine ;
  - type: text
    content: celui qui répand de mauvais propos est stupide.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'beaucoup de paroles  : cf. 13.3 ; Ec 5.2. –  retient ses lèvres  : cf. 17.27 ; Jc 3.8.'
  - type: text
    content: Avec beaucoup de paroles, les offenses ne manquent pas ;
  - type: text
    content: celui qui retient ses lèvres est un homme de bon sens.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 11.4 ; 12.28 ; Jr 17.11 ; Lc 9.25. –  des méchants  : litt. de la méchanceté ; Siracide 5.8 : « Ne t''appuie pas sur des richesses injustement acquises, elles ne te serviront à rien au jour de la détresse. » –  la justice est probablement ici à comprendre au sens de générosité (de même en 11.4 ; 16.8 ; 21.21).'
  - type: text
    content: Les trésors des méchants ne profitent pas ;
  - type: text
    content: c'est la justice qui délivre de la mort.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'argent  : cf. 3.14n. –  a peu de valeur  : litt. est comme peu.'
  - type: text
    content: La langue du juste est un argent de choix ;
  - type: text
    content: le cœur des méchants a peu de valeur.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'conduisent  : litt. font paître  ; LXX connaissent . –  imbéciles 1.7n. –  de raison  : litt. de cœur.'
  - type: text
    content: Les lèvres du juste conduisent la multitude ;
  - type: text
    content: les imbéciles meurent faute de raison.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'il n''y ajoute aucune peine  : on pourrait aussi comprendre la peine n''y ajoute rien  ; cf. Ps 127.1 ; Ec 2.25.'
  - type: text
    content: 'C''est la bénédiction du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui rend riche ;'
  - type: text
    content: il n'y ajoute aucune peine.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'La pratique de l''infamie…  : cf. 2.14 ; 14.9.'
  - type: text
    content: La pratique de l'infamie est comme un jeu pour l'homme stupide ;
  - type: text
    content: de même la sagesse pour l'homme intelligent.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'redoute  : cf. Jb 3.25+. –  il (c.-à-d. soit Dieu , soit le méchant ) le donne  : autre traduction cela leur sera accordé  ; cf. Ps 37.4+.'
  - type: text
    content: Ce que redoute le méchant, c'est ce qui lui arrive ;
  - type: text
    content: ce que désirent les justes, il le donne.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 7.24-27 ; 1Jn 2.16s. –  méchant / juste  : cf. 12.3.'
  - type: text
    content: Quand passe l'ouragan, il n'y a plus de méchant ;
  - type: text
    content: les fondations du juste sont là pour toujours.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'paresseux  : cf. 6.6+. –  envoient  : cf. 13.17 ; 25.13 ; 26.6.'
  - type: text
    content: Comme le vinaigre pour les dents et la fumée pour les yeux,
  - type: text
    content: tel est le paresseux pour ceux qui l'envoient.
  '27':
  - type: text
    content: ' '
  - type: note
    content: crainte du Seigneur 1.7n. –  prolonge les jours 3.2n.
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' prolonge les jours ;'
  - type: text
    content: les années des méchants sont abrégées.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'l''espoir  : cf. Jb 8.13s ; 11.20. –  méchants  : cf. 11.7 ; Ps 112.10.'
  - type: text
    content: L'attente des justes, c'est la joie ;
  - type: text
    content: l'espoir des méchants disparaît.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'La voie  : cf. 2.13n. –  intégrité  : cf. 13.6. –  c''est la ruine… 21.15n.'
  - type: text
    content: 'La voie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est une forteresse pour l''intégrité ;'
  - type: text
    content: c'est la ruine pour les malfaisants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le juste  : cf. v. 2n  ; autres traductions la vie du juste ; l''être du juste ; le gosier du juste  ; sur le terme correspondant, voir Gn 1.20n. –  il repousse  : même verbe en Dt 6.19 ; 9.4 ; Jos 23.5 ; 2R 4.27 ; Jb 18.18 ; il est traduit par pousser en Nb 35.20,22 ; Ez 34.21, chasser en Es 22.19, renverser en Jr 46.15 ; ici il pourrait aussi signifier il excite . –  avidité ou désir  ; même terme en 11.6 ; Mi 7.3 ; le mot pourrait aussi évoquer la destruction.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne laisse pas le juste souffrir de la faim ;'
  - type: text
    content: il repousse l'avidité des méchants.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'juste / méchants  : cf. v. 25n  ; 2.21s. –  sur la terre  : autre traduction dans le pays  ; cf. 2.21s.'
  - type: text
    content: Le juste ne vacille jamais ;
  - type: text
    content: les méchants ne demeurent pas sur la terre.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'La bouche du juste Ps 37.30. –  retranchée  : autre traduction coupée.'
  - type: text
    content: La bouche du juste produit la sagesse ;
  - type: text
    content: la langue perverse sera retranchée.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Les lèvres du juste Ec 10.12.
  - type: text
    content: Les lèvres du juste connaissent la faveur ;
  - type: text
    content: la bouche des méchants, la perversité.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'main nonchalante  : cf. 12.24 ; 15.19 ; 19.15. –  les rend riches  : autre traduction enrichit.'
  - type: text
    content: Celui qui agit d'une main nonchalante s'appauvrit ;
  - type: text
    content: la main des hommes actifs les rend riches.
  '5':
  - type: text
    content: ' '
  - type: note
    content: un fils (autre traduction un homme , de même dans la suite) avisé ou prudent, qui a du bon sens , cf. v. 19 ; 1.4n. –  celui qui dort… 6.10 ; 20.4 ; 24.33.
  - type: text
    content: Celui qui amasse pendant l'été est un fils avisé ;
  - type: text
    content: celui qui dort pendant la moisson est un fils qui fait honte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: bénédictions (LXX ajoute du Seigneur ) … juste v. 7 ; cf. v. 22 ; 11.11. –  la violence… v. 11n.
  - type: text
    content: Il y a des bénédictions sur la tête du juste ;
  - type: text
    content: la violence couvre la bouche des méchants.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 9.14+ ; Ps 9.6+ ; Siracide 41.11-13 : « Les hommes sont en deuil pour leur corps, mais le nom des pécheurs n''est pas bon, il sera effacé. Préoccupe-toi de ton nom car il te survivra plus que mille monceaux d''or. Une vie heureuse ne dure qu''un nombre limité de jours, mais la bonne renommée demeure à jamais. » –  Le souvenir  : autres traductions l''évocation ; le nom (le terme apparaît souvent comme synonyme de celui qui figure dans la suite du v.) ; cf. Ex 3.15n  ; Ps 6.6n. –  juste  : cf. v. 27 ; 12.7 ; 14.11 ; Ps 112.6. –  une bénédiction  : litt. pour bénédiction , ce qui pourrait signifier que son sort sert de modèle et de référence pour bénir quelqu''un ; cf. Gn 12.2-3n.'
  - type: text
    content: Le souvenir du juste est une bénédiction ;
  - type: text
    content: le nom des méchants tombe en pourriture.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'cœur sage  : cf. v. 10 ; Mt 7.24. –  lèvres imbéciles v. 10 ; cf. v. 14.'
  - type: text
    content: Le cœur sage accueille les préceptes ;
  - type: text
    content: les lèvres imbéciles courent à leur perte.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'voies (cf. 2.13n) tortueuses  : cf. 28.6+. –  sera découvert  : litt. sera connu  ; d''autres comprennent transpirera  ; certains modifient le texte hébreu traditionnel pour lire s''en trouvera mal , comme en 11.15 ; 13.20 ; voir aussi 28.18.'
  - type: text
    content: Celui qui suit la voie de l'intégrité marche en sécurité ;
  - type: text
    content: celui qui prend des voies tortueuses sera découvert.
