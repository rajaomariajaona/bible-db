            text: Qumrân
        - type: text
          text: '), dans un passage fragmentaire (15.1ss), pourrait avoir porté le texte suivant : « Qu''on ne jure pas, ni par “Dieu” ni par “le Seigneur”, mais par les malédictions de l''alliance. Et la Loi de Moïse, qu''on n''en fasse pas mention… Mais si c''est par les malédictions de l''Alliance que l''on jure devant les juges, si l''on viole (son serment), on sera coupable d''un délit et l''on se confessera, et l''on restituera, mais on ne se chargera pas d''un péché, et l''on ne mourra pas. » –  '
      - type: usfm
