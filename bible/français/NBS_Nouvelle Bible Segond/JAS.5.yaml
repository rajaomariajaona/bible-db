document_id: JAS.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Avertissements aux riches
  - type: text
    content: ' '
  - type: note
    content: '1.9+ss ; Lc 6.24 ; cf. Es 5.8ss ; Jr 5.26ss ; Am 2.6s ; 8.4ss ; 1 Hénoch 94.8 : « Malheur à vous, riches, car vous vous êtes fiés à vos biens. Vous en serez dépouillés, parce que vous ne vous êtes pas souvenus du Très-Haut au temps de votre richesse. » 97.8ss : « Malheur à vous qui acquérez de l''or et de l''argent au détriment de la justice et qui dites : “Nous nous sommes enrichis, nous avons acquis et nous possédons des biens, nous possédons tout ce que nous voulons. Maintenant faisons tout ce que nous voulons…” Vous vous égarez, car, à coup sûr, votre richesse ne subsistera pas ; elle vous sera promptement retirée… » –  Pleurez, hurlez…  : cf. 4.9n  ; Es 13.6 ; 14.31 ; 15.2,5 ; 16.7 ; 23.1,6 ; 65.14 ; Jr 48.20 ; Ez 21.17 ; Am 8.3 ; Za 11.2.'
  - type: text
    content: 'A vous maintenant, les riches : Pleurez, hurlez à cause des misères qui viennent sur vous ! '
  '10':
  - type: note
    content: prophètes Mt 5.11s ; Lc 6.23,26 ; cf. 1R 19.10,14 ; Jr 26.20ss ; 38.4ss ; Am 7.10ss ; 2Ch 24.20ss ; Mt 23.29ss ; Mc 12.1ss ; Lc 11.49ss/ / ; 13.32ss ; Ac 7.52 ; Rm 11.3 ; 1Th 2.15 ; Hé 11.32,36ss. –  parlé au nom du Seigneur Jr 20.9 ; 44.16 ; Dn 9.6.
  - type: text
    content: 'En matière de souffrance et de patience, mes frères, prenez pour exemples les prophètes qui ont parlé au nom du Seigneur. '
  '11':
  - type: note
    content: 'bienheureux… 1.2ss,12+. –  l''endurance de Job Ez 14.14,20 ; Jb 1.8,20ss ; 2.9s ; 13.15 ; 16.19 ; 19.25ss. –  la fin que le Seigneur lui a accordée  : litt. la fin du Seigneur, ce que certains interprètent l''objectif que le Seigneur visait (voir Jb 42 ; Hé 13.7) ; on a aussi vu dans l''expression la fin du Seigneur une allusion à la crucifixion et à la résurrection de Jésus (le Seigneur en 1.1 ; 2.1 ; 5.7s) ; cf. Testament de Gad 7.4 : « Si quelqu''un s''enrichit injustement… ne l''enviez pas, mais attendez que le Seigneur y mette un terme (litt. la fin du Seigneur). » –  car le Seigneur…  : autre traduction que le Seigneur (ou qu''il, selon certains mss) est plein de tendresse… Ex 34.6 ; Ps 103.8s ; 111.4 ; 145.8 ; cf. Siracide 2.10s : « Regardez les générations passées et voyez : Qui a mis sa confiance dans le Seigneur et a été déçu ? Qui a persévéré dans la crainte du Seigneur et a été abandonné ? Qui l''a invoqué et en a été méprisé ? Car le Seigneur est compatissant et miséricordieux, il remet les péchés et sauve au moment de la détresse. »'
  - type: text
    content: Nous disons bienheureux ceux qui ont enduré. Vous avez entendu parler de l'endurance de Job, et vous avez vu la fin que le Seigneur lui a accordée, car le Seigneur est plein de tendresse et de magnanimité.
  - type: heading
    content: Que votre oui soit oui
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Avant tout  : cf. 1P 4.8. –  ne jurez…  : cf. 3.1ss ; 4.13ss ; Mt 5.34-37 ; voir aussi Lv 19.12 ; Nb 30.3 ; Dt 23.22ss ; Es 48.1 ; Jr 5.2 ; 12.16 ; Os 4.15 ; Za 5.3s ; Ml 3.5 ; Mt 14.7,9/ / ; 26.72 ; Siracide 23.9ss : « Que ta bouche ne s''accoutume pas au serment et ne te fais pas une habitude de nommer le Saint ! De même, en effet, qu''un domestique sans cesse surveillé de près ne manquera pas de traces de coups, ainsi celui qui jure et prononce le Nom en toute circonstance ne sera jamais exempt de péché. » L’ Ecrit de Damas (Qumrân), dans un passage fragmentaire (15.1ss), pourrait avoir porté le texte suivant : « Qu''on ne jure pas, ni par “Dieu” ni par “le Seigneur”, mais par les malédictions de l''alliance. Et la Loi de Moïse, qu''on n''en fasse pas mention… Mais si c''est par les malédictions de l''Alliance que l''on jure devant les juges, si l''on viole (son serment), on sera coupable d''un délit et l''on se confessera, et l''on restituera, mais on ne se chargera pas d''un péché, et l''on ne mourra pas. » –  oui / non 2Co 1.17s. –  sous le jugement  : certains textes portent dans l''hypocrisie  ; cf. v. 9+.'
  - type: text
    content: Avant tout, mes frères, ne jurez ni par le ciel, ni par la terre, ni par aucune autre forme de serment. Mais que votre oui soit oui, et que votre non soit non, afin que vous ne tombiez pas sous le jugement.
  - type: heading
    content: Bonheur et malheur des autres
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.5ss ; 4.1ss. –  souffrance / prie  : cf. Ps 50.15 ; 91.15. –  est-il dans la joie (le même verbe est traduit par prendre courage en Ac 27.22n) / chante (autre traduction qu''il chante des cantiques ou des psaumes , cf. 1Co 14.15n,26n) : cf. Ps 30.13 ; 50.23 ; Ac 16.25 ; Rm 15.9 ; 1Co 14.15 ; Ep 5.19s ; Col 3.16s.'
  - type: text
    content: 'Quelqu''un parmi vous est-il dans la souffrance ? Qu''il prie. Quelqu''un est-il dans la joie ? Qu''il chante. '
  '14':
  - type: note
    content: 'anciens de l''Eglise Ac 11.30+ ; cf. 1Tm 5.1s,17,19 ; Tt 1.5 ; 1P 5.1,5 ; voir aussi 1Co 12.9,28,30. –  pour lui  : litt. sur lui  ; autre traduction qu''ils prient après lui avoir fait une application d''huile…  ; l’huile est associée à la guérison (Lv 14.10ss ; Es 1.6 ; Jr 8.22 ; 46.11 ; Mc 6.13 ; Lc 10.34), à la joie (Dt 28.40 ; Es 61.3 ; Am 6.6 ; Mi 6.16 ; Ps 23.5 ; 45.8 ; 92.11 ; 133.2 ; Pr 27.9 ; Ec 9.8 ; Mt 6.17 ; 26.6ss) ou à la consécration (Ex 28.41 ; 29.7 ; 40.15 ; 1S 10.1 ; 16.1 ; 1R 1.39 ; 2R 9.6. Voir onction). – Voir nom.'
  - type: text
    content: 'Quelqu''un parmi vous est-il malade ? Qu''il appelle les anciens de l''Eglise, et que ceux-ci prient pour lui en faisant sur lui une application d''huile au nom du Seigneur. '
  '15':
  - type: note
    content: 'Le souhait  : autre traduction la prière  ; le terme grec, apparenté à celui qui est habituellement traduit par prière, a le sens de vœu en Ac 18.18 ; 21.23 ; le verbe correspondant apparaît au v. 16. –  sauvera 1.21+ ; cf. 5.16 ; Mc 5.34,41 ; Lc 17.19 ; voir aussi Mc 16.18 ; Ac 28.8. –  relèvera  : le verbe correspondant a aussi le sens de réveiller ou ressusciter (Ac 3.15n). –  péchés Jn 9.1ss ; 1Co 11.30.'
  - type: text
    content: 'Le souhait de la foi sauvera le malade, et le Seigneur le relèvera ; s''il a commis des péchés, il lui sera pardonné. '
  '16':
  - type: note
    content: 'Cf. 4.11s. –  Reconnaissez…  : cf. Dn 9.4ss ; Mc 1.5n  ; Ac 19.18. –  souhaitez-vous du bien…  : autre traduction priez les uns pour les autres, voir v. 15n  ; le verbe correspondant a habituellement le sens de souhaiter  ; cf. Ac 27.29 ; Rm 9.3 ; 2Co 13.7,9 ; 3Jn 2 ; voir aussi Ac 12.5. –  juste  : cf. v. 6 ; 1.20+ ; voir aussi Gn 18.22ss ; Ex 32.11ss ; Jr 14.11 ; 18.20 ; Am 7.2,5. –  mise en œuvre  : on peut comprendre aussi bien la prière efficace que la prière qui engage l''action.'
  - type: text
    content: Reconnaissez donc vos péchés les uns devant les autres et souhaitez-vous du bien les uns aux autres, pour que vous soyez guéris.
  - type: text
    content: 'La prière du juste, mise en œuvre, a beaucoup de force. '
  '17':
  - type: note
    content: 'Cf. 1R 17.1 ; Ml 3.23 ; Lc 4.25 ; Ap 11.6 ; Siracide 48.1ss : « Le prophète Elie se leva comme un feu et sa parole brûlait comme une torche. Il fit venir sur eux la famine et par son zèle les réduisit à un petit nombre. Par la parole du Seigneur il ferma le ciel. » –  de la même nature que nous Ac 14.15n.'
  - type: text
    content: 'Elie était un être humain, de la même nature que nous : il pria avec instance pour qu''il ne pleuve pas, et il ne tomba pas de pluie sur la terre pendant trois ans et six mois. '
  '18':
  - type: note
    content: Cf. 1R 18.1,41ss.
  - type: text
    content: Puis il pria de nouveau ; alors le ciel donna de la pluie et la terre produisit son fruit.
  - type: heading
    content: Celui qui ramène un égaré
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 18.15ss ; Ga 6.1. –  loin de la vérité  : certains mss portent du chemin de la vérité  ; cf. Es 53.6 ; 2Tm 3.13 ; Hé 5.2 ; 2P 2.15 ; Ap 18.23 ; Sagesse 5.6 : « Nous nous sommes égarés loin du chemin de la vérité. » –  ramène ou convertit  : cf. Ez 34.4 ; Ml 2.6 ; Ps 51.15 ; Dn 12.3 ; Lc 1.16 ; Ac 3.19 ; 14.15 ; 1Th 1.9.'
  - type: text
    content: 'Mes frères, si quelqu''un parmi vous s''est égaré loin de la vérité et qu''un autre l''y ramène, '
  '2':
  - type: note
    content: 'vêtements  : cf. Lc 3.11 ; Ac 20.33. –  mités  : cf. Es 51.8 ; Jb 13.28 ; Mt 6.19.'
  - type: text
    content: 'Votre richesse est pourrie, vos vêtements sont mités, '
  '20':
  - type: note
    content: 'qu''il sache  : certains mss portent sachez. –  de la voie…  : litt. de l''égarement de sa voie. –  sauvera sa vie  : le texte est ambigu ; autres traductions le sauvera ; se sauvera lui-même ; sauvera son âme (1.21n) ; certains mss portent une âme ou une vie, en précisant quelquefois de sa mort  ; cf. Ez 3.18ss ; 33.10ss ; Mt 18.12s,15 ; 1Tm 4.16 ; 1Jn 5.16. –  mort 1.15. –  et couvrira…  : cf. 2.13 ; voir Pr 10.12  ; 1P 4.8 ; voir aussi Ps 32.1ss ; 85.2 ; Né 4.5 ; Rm 4.7.'
  - type: text
    content: 'qu''il sache que celui qui ramène un pécheur de la voie où il s''était égaré sauvera sa vie de la mort et '
  - type: text
    content: couvrira une multitude de péchés
  - type: text
    content: .
  '3':
  - type: note
    content: 'leur rouille  : cf. 3.8n  ; voir aussi Mt 6.19s ; cf. Siracide 29.10 : « Sois prêt à perdre de l''argent pour un frère ou un ami, plutôt que de le perdre en le laissant rouiller sous une pierre. » –  pour vous ou contre vous  : cf. Mc 1.44+/ /. –  dévorera votre chair  : cf. Nb 12.12 ; Judith 16.17 : « Malheur aux nations qui se dressent contre ma race. Le Seigneur tout-puissant s''en vengera au jour du jugement en mettant le feu et les vers dans leurs chairs, et ils pleureront de douleur éternellement. » –  comme un feu Es 10.16s ; 30.27 ; Am 5.6 ; Ps 21.10. –  les derniers jours Es 2.2n  ; Dn 2.28 ; Jn 6.39ss ; Ac 2.17 ; 2Tm 3.1 ; 2P 3.3 ; 1Jn 2.18 ; Jd 18. –  amassé des trésors Lc 12.21.'
  - type: text
    content: 'votre or et votre argent sont rouillés ; leur rouille sera pour vous un témoignage, elle dévorera votre chair comme un feu. Dans les derniers jours, vous avez amassé des trésors ! '
  '4':
  - type: note
    content: 'Il crie  : cf. Gn 4.10 ; 18.20s ; 19.3 ; Ex 2.23 ; 5.8 ; 22.25s ; 1S 9.16. –  salaire 1Co 3.8+. –  dont vous avez frustré…  : litt., selon les mss, que vous avez retenu ou que vous avez volé aux ouvriers…, cf. Lv 19.13 ; Dt 24.14s ; Jr 22.13 ; Ml 3.5 ; Tobit 4.14 : « Ne garde pas jusqu''au lendemain le salaire d''un travailleur, mais paie-le tout de suite. » –  oreilles  : cf. Ps 17.6 ; 18.7 ; 31.3 ; Lm 3.56 ; Né 1.6,11. –  Sabaoth  : transcription, dans le texte grec, de la formule hébraïque traduite, dans l''A.T., des Armées (dans les expressions Seigneur des Armées, Dieu des Armées  ; cf. 1S 17.45 ; Es 1.9n  ; 5.7,9 ; 6.3 etc. ; voir nom) ; de même en Rm 9.29. –  Le Pasteur d''Hermas, Vis. III,9,2ss : « N''accaparez pas pour vous seuls les biens que Dieu a créés, mais donnez-en aussi en abondance aux indigents. Car les uns, à force de ripailles, finissent par affaiblir leur corps et miner leur santé. D''autres, qui n''ont pas à manger, voient leur santé ruinée (…). Faites donc en sorte, vous qui tirez orgueil de vos richesses, que les indigents n''aient pas à se lamenter, que leurs lamentations ne montent pas jusqu''au Seigneur et qu''avec tous vos biens, vous ne trouviez fermée la porte de la tour (c.-à-d. du salut). »'
  - type: text
    content: 'Il crie, le salaire dont vous avez frustré les ouvriers qui ont moissonné vos champs ; et les clameurs des moissonneurs sont parvenues '
  - type: text
    content: jusqu'aux oreilles du Seigneur Sabaoth
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'sur la terre  : cf. Mt 6.19 ; voir aussi Ez 16.49 ; Lc 16.19,25 ; 1Tm 5.6. –  vous vous êtes repus  : litt. vous avez rassasié (ou engraissé) vos cœurs  : cf. v. 8 ; Es 6.10n. –  au jour de la tuerie  : certains mss portent comme au jour de la tuerie, cf. v. 6 ; Ps 44.23 ; voir aussi Es 34.6 ; 63.1ss ; Jr 12.3  ; 25.34 ; Ez 21.15 ; Ap 19.17ss.'
  - type: text
    content: 'Vous avez vécu sur la terre dans le confort et le luxe, vous vous êtes repus '
  - type: text
    content: au jour de la tuerie
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'Cf. 2.6s. –  assassiné  : le même verbe (également en 4.2) a été traduit par commettre un meurtre en 2.11. –  le juste  : cf. Am 2.6 ; 5.12 ; 8.4ss ; Ps 9.19 ; 10.8ss ; 37.14,32 ; Sagesse 2.10,12,19s : « Opprimons le pauvre, qui pourtant est juste… Traquons le juste : il nous gêne, s''oppose à nos actions… Mettons-le à l''épreuve par l''outrage et la torture pour juger de sa sérénité et apprécier son endurance. Condamnons-le à une mort honteuse, puisque, selon ses dires, une intervention divine aura lieu en sa faveur. » 1 Hénoch 96.8 : « Malheur à vous, puissants, qui de votre force écrasez le juste, car il vient sur vous le jour de votre perte. » –  il ne vous résiste pas  : autres traductions possibles ne vous résiste-t-il pas ? ne vous résistera-t-il pas ? (le sujet pouvant être le juste, ou peut-être Dieu) ; voir aussi Ps 37.1,7 ; Mt 5.39 ; Rm 12.19 ; 1P 2.23.'
  - type: text
    content: Vous avez condamné, vous avez assassiné le juste ; il ne vous résiste pas.
  - type: heading
    content: Patience, le Seigneur approche
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Prenez donc patience  : cf. Mt 10.22 ; 24.13/ / ; Col 1.11 ; Hé 10.36ss ; Ap 2.26 ; voir aussi Mt 26.41 ; 1Th 5. –  mes frères  : litt. frères (de même v. 9s ; 4.11) ; cf. 1.2+. –  l''avènement du Seigneur 1Th 2.19+ ; 2Th 2.1,8 ; 2P 1.16 ; 3.4 ; voir aussi Mt 24.3n,27,37,29 ; 1Co 15.23 ; 2P 3.12 ; 1Jn 2.28. –  Le cultivateur  : cf. v. 4 ; 1Co 9.10. –  fruit de la terre  : cf. Mc 4.26ss ; voir aussi Ps 126.5s ; Siracide 6.19 : « Comme le laboureur et le semeur, approche-toi d''elle (la Sagesse), et attends ses fruits excellents. Car, à la cultiver, tu peineras quelque peu, mais tu mangeras bientôt de ses produits. » –  les produits…  : autre traduction, appuyée explicitement par certains mss, jusqu''à ce qu''il ait reçu les pluies d''automne et les pluies de printemps , cf. Dt 11.14 ; Jr 3.3 ; 5.24 ; Os 6.3 ; Jl 2.23 ; Za 10.1.'
  - type: text
    content: 'Prenez donc patience, mes frères, jusqu''à l''avènement du Seigneur. Le cultivateur attend le précieux fruit de la terre, plein de patience à son égard, jusqu''à ce qu''il en ait reçu les produits précoces et tardifs. '
  '8':
  - type: note
    content: 'affermissez votre cœur (litt. vos cœurs) : cf. v. 5n  ; Jg 19.5n  ; Siracide 22.16 : « Comme une armature de bois assemblée dans une construction ne sera point disloquée par un tremblement de terre, ainsi un cœur établi dans un dessein mûrement réfléchi ne perdra pas son assurance au moment voulu. » –  s''est approché  : cf. Mc 1.15n/ / ; voir aussi Rm 13.11s ; Ph 4.5 ; Hé 10.25,37 ; 1P 4.7.'
  - type: text
    content: 'Vous aussi, prenez patience, affermissez votre cœur, car l''avènement du Seigneur s''est approché. '
  '9':
  - type: note
    content: 'Ne soupirez pas  : sur le terme, cf. Mc 7.34 ; 8.12+ ; Rm 8.22nss ; 2Co 5.2,4 ; Hé 13.17 ; voir aussi Mt 5.22. –  jugés  : cf. v. 12 ; 2.12s ; 4.11s. –  juge Hé 12.23+. –  aux portes  : l''image est probablement celle des portes de la ville, où l''on rendait la justice ; cf. Dt 18.16n  ; Mc 13.29/ / ; cf. Ap 3.20.'
  - type: text
    content: 'Ne soupirez pas les uns contre les autres, mes frères, pour que vous ne soyez pas jugés : le juge se tient aux portes. '
