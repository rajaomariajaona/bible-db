          text: '23.9ss : « Que ta bouche ne s''accoutume pas au serment et ne te fais pas une habitude de nommer le Saint ! De même, en effet, qu''un domestique sans cesse surveillé de près ne manquera pas de traces de coups, ainsi celui qui jure et prononce le Nom en toute circonstance ne sera jamais exempt de péché. » L’'
