      marker-yv: yv-n
    - type: text
      text: Avant tout, mes frères, ne jurez ni par le ciel, ni par la terre, ni par aucune autre forme de serment. Mais que votre oui soit oui, et que votre non soit non, afin que vous ne tombiez pas sous le jugement.
