      - type: usfm
        marker: ft
        children:
        - type: text
          text: '94.8 : « Malheur à vous, riches, car vous vous êtes fiés à vos biens. Vous en serez dépouillés, parce que vous ne vous êtes pas souvenus du Très-Haut au temps de votre richesse. » 97.8ss : « Malheur à vous qui acquérez de l''or et de l''argent au détriment de la justice et qui dites : “Nous nous sommes enrichis, nous avons acquis et nous possédons des biens, nous possédons tout ce que nous voulons. Maintenant faisons tout ce que nous voulons…” Vous vous égarez, car, à coup sûr, votre richesse ne subsistera pas ; elle vous sera promptement retirée… » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pleurez, hurlez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 13.6 ; 14.31 ; 15.2,5 ; 16.7 ; 23.1,6 ; 65.14 ; Jr 48.20 ; Ez 21.17 ; Am 8.3 ; Za 11.2.'
      marker-yv: yv-n
    - type: text
      text: 'A vous maintenant, les riches : Pleurez, hurlez à cause des misères qui viennent sur vous ! '
