      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.10s : « Regardez les générations passées et voyez : Qui a mis sa confiance dans le Seigneur et a été déçu ? Qui a persévéré dans la crainte du Seigneur et a été abandonné ? Qui l''a invoqué et en a été méprisé ? Car le Seigneur est compatissant et miséricordieux, il remet les péchés et sauve au moment de la détresse. »'
      marker-yv: yv-n
    - type: text
      text: Nous disons bienheureux ceux qui ont enduré. Vous avez entendu parler de l'endurance de Job, et vous avez vu la fin que le Seigneur lui a accordée, car le Seigneur est plein de tendresse et de magnanimité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Que votre oui soit oui
