document_id: LUK.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La naissance de Jésus
  - type: text
    content: ' '
  - type: note
    content: 'En ces jours-là  : cf. 1.5,24,36,56 ; 3.1,23. –  décret  : cf. Ac 17.7+. –  César Auguste , titre d''Octave, empereur de Rome de 27 av. J.-C. à 14 apr. J.-C. (voir « Rome et les Romains »♦). –  toute la terre habitée  : expression hyperbolique pour tout l''Empire romain  ; même terme 4.5 ; 21.26 ; Ac 11.28 ; 17.6,31 ; 19.27 ; 24.5 ; voir Mt 24.14n.'
  - type: text
    content: 'En ces jours-là parut un décret de César Auguste, en vue du recensement de toute la terre habitée. '
  '10':
  - type: note
    content: N'ayez pas peur 1.13+,30. –  je vous annonce la bonne nouvelle 1.19n. –  grande joie 1.14+ ; 24.52 ; Mt 2.10.
  - type: text
    content: 'Mais l''ange leur dit : N''ayez pas peur, car je vous annonce la bonne nouvelle d''une grande joie qui sera pour tout le peuple : '
  '11':
  - type: note
    content: 'aujourd''hui 3.22n  ; 4.21 ; 5.26 ; 12.28 ; 13.32s ; 19.5,9 ; 22.34,61 ; 23.43 ; cf. Hé 3.7ss. –  ville de David v. 4n. –  sauveur v. 30 ; 1.47n,69 ; Jn 4.42 ; Ac 5.31 ; 13.23 ; Ep 5.23 ; Ph 3.20 ; 2Tm 1.10 ; Tt 1.4 ; 2.13 ; 3.6 ; 2P 1.1,11 ; 2.20 ; 3.18 ; 1Jn 4.14 ; cf. Jg 3.9,15. –  le Christ (ou le Messie, celui qui a reçu l''onction, v. 26 ; 3.15 ; 4.41 ; 9.20 ; 20.41 ; 22.67 ; 23.2,35,39 ; 24.26,46 ; le terme fait allusion au sacre des rois de la dynastie de David par une onction d''huile sainte ; les prêtres étaient consacrés de façon semblable), le Seigneur Ac 2.36 ; quelques témoins anciens ont lu le Christ du Seigneur  ; cf. Lm 4.20 ; Lc 2.26 ; Psaumes de Salomon 17.32 : « Leur roi est le Messie Seigneur » (certains traduisent Messie du Seigneur).'
  - type: text
    content: 'aujourd''hui, dans la ville de David, il vous est né un sauveur, qui est le Christ, le Seigneur. '
  '12':
  - type: note
    content: 'V. 7. –  signe  : cf. v. 34 ; 1.18ss,36 ; 11.29s ; Ex 3.12 ; 2R 19.29 ; Es 37.30 ; 38.7. –  nouveau-né 1.41n. –  couché v. 16 ; le même verbe est traduit par est là au v. 34 ; on le retrouve en 3.9 (est prête à) ; 12.19 (en réserve) ; 23.53 (gisait) ; voir aussi Jn 2.6n.'
  - type: text
    content: 'Et ceci sera pour vous un signe : vous trouverez un nouveau-né emmailloté et couché dans une mangeoire. '
  '13':
  - type: note
    content: 'l''armée céleste  : cf. 1R 22.19 ; Jr 19.13 ; Dn 7.10 ; Mt 26.53. –  louait Dieu  : cf. Ps 148.2.'
  - type: text
    content: 'Et soudain il se joignit à l''ange une multitude de l''armée céleste, qui louait Dieu et disait :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.38. –  Gloire à Dieu  : cf. v. 9 ; Rm 11.36 ; Hé 13.21. –  dans les lieux très hauts  : cf. 1.78n  ; Ps 148.1 ; Jb 16.19 ; Psaumes de Salomon 18.10 : « Grand et glorieux est notre Dieu, il habite dans les lieux très hauts. » –  paix 1.79+ ; 24.36 ; Es 9.5s ; 52.7 ; 57.19 ; Mi 5.4 ; Ep 2.14ss ; 6.15+. –  les humains en qui il prend plaisir ou (tous) les humains, en qui il prend plaisir (cf. v. 10 ; 3.6), litt. les humains du bon plaisir , traduction classique les hommes (ou les gens ) de bonne volonté  ; chez Luc, le terme se réfère généralement à la volonté ou au plaisir de Dieu ; selon certains mss, on pourrait encore comprendre bienveillance pour les hommes  ; même terme 10.21 ; verbe apparenté 3.22 ; 12.32 ; voir aussi Ps 51.20 ; Ph 2.13n  ; Hymnes (Qumrân) 4.32s : « Afin que toutes Ses œuvres connussent la force de Sa puissance et l''immensité de Sa miséricorde envers tous les fils de Sa bienveillance. »'
  - type: text
    content: Gloire à Dieu dans les lieux très hauts,
  - type: text
    content: et, sur la terre, paix parmi les humains en qui il prend plaisir !
  - type: heading
    content: Les bergers à Bethléem
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Voir anges . –  ce  : litt. la parole ou l''événement , cf. 1.65n. –  le Seigneur  : cf. v. 9. –  fait connaître  : même verbe v. 17 ; Jn 15.15+ ; Ac 2.28 (verbe apparenté 7.13, se faire reconnaître ) ; Rm 9.22n  ; Ep 1.9n.'
  - type: text
    content: 'Lorsque les anges se furent éloignés d''eux vers le ciel, les bergers se dirent les uns aux autres : Allons donc jusqu''à Bethléem, et voyons ce qui est arrivé, ce que le Seigneur nous a fait connaître. '
  '16':
  - type: text
    content: 'Ils s''y rendirent en hâte et trouvèrent Marie, Joseph, et le nouveau-né couché dans la mangeoire. '
  '17':
  - type: note
    content: 'Cf. 8.39. –  l''avoir vu  : litt. avoir vu.'
  - type: text
    content: 'Après l''avoir vu, ils firent connaître ce qui leur avait été dit au sujet de cet enfant. '
  '18':
  - type: note
    content: s'étonnèrent v. 33+ ; 1.21,63.
  - type: text
    content: 'Tous ceux qui les entendirent s''étonnèrent de ce que disaient les bergers. '
  '19':
  - type: note
    content: 'retenait ou conservait précieusement  ; un verbe apparenté est traduit de la même manière v. 51 ; cf. Gn 37.11 ; Dn 7.28 ; le même verbe est traduit par se conserver Mt 9.17 et protéger Mc 6.20. –  ces choses ou ces paroles 1.65n. –  y réfléchissait  : litt. y réfléchissait dans son cœur  ; autre traduction possible en cherchait le sens  ; cf. 1.66.'
  - type: text
    content: 'Marie retenait toutes ces choses et y réfléchissait. '
  '2':
  - type: note
    content: 'Ce premier recensement…  : autre traduction ce recensement fut le premier qui eut lieu…  ; cf. Ac 5.37n. D''après les sources dont nous disposons, Quirinius (la transcription grecque de ce nom latin rappelle le mot Cyrène, 23.26), a été gouverneur (exactement  : légat) de Syrie à partir de l''an 6 apr. J.-C., après le rattachement du pays des Juifs à la Syrie, et il a procédé à un recensement au début de son mandat ; différentes hypothèses ont été émises pour harmoniser ces données avec celle de 1.5n (Hérode le Grand est mort en 4 av. J.-C.) : Quirinius aurait eu un premier mandat auparavant, ou il serait intervenu dans le pays à un autre titre…'
  - type: text
    content: 'Ce premier recensement eut lieu pendant que Quirinius était gouverneur de Syrie. '
  '20':
  - type: note
    content: 's''en retournèrent 1.23+. –  en glorifiant…  : cf. v. 13s,28,38 ; 1.64 ; 5.25s/ / ; 7.16 ; 13.13 ; 17.15,18 ; 18.43 ; 19.37 ; 23.47 ; 24.53 ; Mt 15.31 ; Ac 3.8s ; 4.21 ; 11.18 ; 21.20. –  entendu et vu  : cf. Ac 4.20.'
  - type: text
    content: Quant aux bergers, ils s'en retournèrent en glorifiant et louant Dieu pour tout ce qu'ils avaient entendu et vu, conformément à ce qui leur avait été dit.
  - type: heading
    content: Jésus est présenté dans le temple
  '21':
  - type: text
    content: ' '
  - type: note
    content: circoncis 1.59+ss ; cf. Ga 4.4. –  on lui donna le nom de… 1.31+. –  l'ange 1.30ss.
  - type: text
    content: Quand huit jours furent accomplis, il fut circoncis et on lui donna le nom de Jésus, celui que l'ange avait indiqué avant sa conception.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'purification  : cf. 5.14 ; voir Lv 12.2ss. –  la loi de Moïse v. 23s,27,39. –  ils l''amenèrent  : litt. le firent monter (v. 4n) ; même verbe 4.5 ( conduire plus haut ) ; Ac 7.41 ( apporter un sacrifice ) ; 9.39 ; 12.4 ( faire comparaître ) ; 16.34. –  à Jérusalem  : Lc utilise ici le nom grec de la ville, Hiérosoluma , qui rappelle les mots grecs pour saint, sacré, temple etc. (de même 13.22 ; 19.28 ; 23.7 et souvent dans les Actes) ; à partir de 2.25 il emploiera plus souvent Iérousalem , simple transcription de l''hébreu. –  présenter  : même verbe Rm 12.1+ ; voir aussi 1S 1.22ss.'
  - type: text
    content: 'Et, quand les jours de leur purification furent accomplis selon la loi de Moïse, ils l''amenèrent à Jérusalem pour le présenter au Seigneur '
  '23':
  - type: note
    content: 'Cf. v. 7. –  la loi du Seigneur v. 24,39 ; cf. v. 22. –  Tout mâle… Ex 13.2,12,15  ; 22.29s ; Lv 27.26s ; Nb 3.13 ; 8.17s ; cf. Ex 13.13 ; 34.20 ; Nb 18.15s. –  né le premier de sa mère  : litt. qui ouvre la matrice, hébraïsme. –  sera consacré…  : litt. sera appelé saint pour le Seigneur, cf. 1.35.'
  - type: text
    content: '– suivant ce qui est écrit dans la loi du Seigneur : '
  - type: text
    content: Tout mâle né le premier de sa mère sera consacré au Seigneur
  - type: text
    content: '  – '
  '24':
  - type: note
    content: colombes ou pigeons, cf. Lv 5.11 ; 12.8  ; voir aussi sacrifice.
  - type: text
    content: 'et pour offrir en sacrifice '
  - type: text
    content: une paire de tourterelles ou deux jeunes colombes,
  - type: text
    content: ' selon ce qui est dit dans la loi du Seigneur.'
  - type: heading
    content: Syméon et l'enfant Jésus
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Syméon  : cf. Protévangile de Jacques 24.4 : « Les prêtres tinrent conseil pour savoir qui ils mettraient à la place de Zacharie [assassiné par Hérode]. Et le sort tomba sur Syméon : c''était lui, en effet, qui avait été averti par l''Esprit saint qu''il ne verrait pas la mort jusqu''à ce qu''il eût vu le Christ dans la chair. » –  juste…  : cf. 1.6. –  pieux  : même terme Ac 2.5 ; 8.2 ; 22.12. –  il attendait… v. 38 ; 23.50s ; cf. 6.24 ; 24.21 ; Es 40.1 ; 49.13 ; 51.12 ; 52.9 ; 61.2. –  l''Esprit saint…  : cf. 1.15+ ; Nb 11.17,25,29 ; 2R 2.15 ; Es 11.2 ; 42.1 ; 61.1 ; Ez 11.5.'
  - type: text
    content: 'Or il y avait à Jérusalem un homme du nom de Syméon. Cet homme était juste et pieux ; il attendait la consolation d''Israël, et l''Esprit saint était sur lui. '
  '26':
  - type: note
    content: 'divinement averti…  : cf. Ac 10.22+ ; voir aussi 21.11. –  ne verrait pas la mort  : cf. Ps 89.49 ; Jn 8.51 ; Hé 11.5 ; voir aussi Lc 9.27 ; Jn 21.22s. –  le Christ du Seigneur ou l''homme qui a reçu l''onction du Seigneur  ; cf. v. 11n  ; 1S 24.7,11 ; 26.9,11,16,23 ; 2S 1.14,16.'
  - type: text
    content: 'Il avait été divinement averti, par l''Esprit saint, qu''il ne verrait pas la mort avant d''avoir vu le Christ du Seigneur. '
  '27':
  - type: note
    content: 'temple  : cf. v. 46,49 ; 19.45ss ; Ac 3.1,11. –  poussé par l''Esprit  : litt. dans l''Esprit. –  les parents v. 41,43 ; cf. v. 33,48. –  d''après la loi  : cf. v. 22.'
  - type: text
    content: 'Il vint au temple, poussé par l''Esprit. Et, comme les parents apportaient l''enfant Jésus pour accomplir à son égard ce qui était en usage d''après la loi, '
  '28':
  - type: note
    content: 'Cf. 1.67ss. –  il le prit ou l''accueillit  ; cf. 4.24 ; 8.13 ; 9.5,48,53 ; 10.8,10 ; 18.17. –  bénit Dieu  : cf. v. 34 ; 1.64 ; 24.53.'
  - type: text
    content: 'il le prit dans ses bras, bénit Dieu et dit :'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Maître  : même terme Ac 4.24. –  tu laisses…  : c.-à-d. tu peux me laisser, moi, ton esclave (voir 1.38n,48n  ; Ac 4.29n) s''en aller (cf. Gn 15.2) en paix Gn 15.15 ; cf. 46.30. –  selon ta parole v. 26 ; cf. 1.38.'
  - type: text
    content: Maintenant, Maître, tu laisses ton esclave
  - type: text
    content: s'en aller en paix selon ta parole.
  '3':
  - type: note
    content: 'dans sa propre ville  : comparer les v. 4 et 39.'
  - type: text
    content: 'Tous allaient se faire recenser, chacun dans sa propre ville. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.69,71,77 ; 3.6 ; 10.18,23s ; Es 40.5 ; 52.10 ; 56.1 ; Ps 67.3 ; 98.2ss ; Jb 19.27 ; 42.5 ; Tt 2.11.
  - type: text
    content: Car mes yeux ont vu ton salut,
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'préparé  : cf. 1.17,76 ; 1Co 2.9. –  devant tous les peuples Es 52.10 ; cf. Ps 31.20.'
  - type: text
    content: celui que tu as préparé devant tous les peuples,
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'lumière…  : autre traduction lumière des nations (ou des païens, des non-Juifs , cf. Mt 4.15n) pour une révélation Es 42.6 ; 49.6,9 ; cf. 25.7 ; 60.1ss ; Lc 24.47 ; Ac 28.28 ; voir aussi 10.45n. –  et gloire…  : autre traduction et pour la gloire…  ; cf. Es 45.25 ; 46.13 ; voir aussi Ac 13.46.'
  - type: text
    content: lumière pour la révélation aux nations
  - type: text
    content: et gloire de ton peuple, Israël.
  - type: heading
    content: La prophétie de Syméon
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Son père et sa mère  : cf. v. 27+. –  s''étonnaient v. 18 ; 4.22 ; 9.43 ; 20.26 ; Ac 3.12.'
  - type: text
    content: 'Son père et sa mère s''étonnaient de ce qu''on disait de lui. '
  '34':
  - type: note
    content: 'les bénit 6.28 ; 9.16 ; 24.50s ; Ac 3.26 ; cf. Gn 14.18s ; Nb 6.23 ; 1S 2.20. –  est là ou est en réserve, cf. 12.19. –  la chute  : cf. 20.17s ; Es 8.14 ; 28.16 ; Dn 11.41 ; voir aussi 1Co 1.23 ; 1P 2.8. –  le relèvement  : le terme est traduit ailleurs par résurrection, cf. 14.14 ; 20.27-36. –  signe  : cf. v. 12+ ; Es 8.18. –  un signe qui provoquera la contradiction ou l''opposition, litt. un signe contredit  ; cf. 20.27n  ; même verbe en Jn 19.12 (se déclarer contre) ; Ac 13.45 ; 28.19n,22 ; Rm 10.21 (contester) ; Tt 1.9 ; 2.9.'
  - type: text
    content: 'Syméon les bénit et dit à Marie, sa mère : Celui-ci est là pour la chute et le relèvement de beaucoup en Israël, et comme un signe qui provoquera la contradiction '
  '35':
  - type: note
    content: 'Cf. v. 48 ; 8.21 ; 11.27s ; 12.51ss ; Jn 19.25ss,34. –  te transpercera  : litt. traversera ton âme, cf. 1.46n  ; Ez 5.1s,17 ; 6.8s ; 14.17 ; Ps 37.15 ; Oracles sibyllins 3.316 (description d''une invasion de l''Egypte) : « Le glaive, en effet, te traversera par le milieu. » –  raisonnements  : cf. 1.29n  ; même terme 5.22 ; 6.8 ; 9.46s ; 24.38n  ; cf. Ac 28.27s. –  de beaucoup  : litt. de beaucoup de cœurs  ; cf. 16.15 ; Mc 7.6ss ; Ac 1.24 ; 15.8.'
  - type: text
    content: – et, toi-même, une épée te transpercera – de sorte que soient révélés les raisonnements de beaucoup.
  - type: heading
    content: Anne, la prophétesse
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'prophétesse  : cf. Ex 15.20 ; Jg 4.4 ; 2R 22.14 ; Es 8.3 ; Ac 2.17 ; 21.9 ; 1Co 11.5 ; Ap 2.20. –  Anne  : cf. 1S 1–2. –  Aser Gn 30.13 ; 49.20 ; Dt 33.24s. –  très avancée en âge 1.7. –  sept ans  : un témoin ancien du texte a lu sept jours.'
  - type: text
    content: 'Il y avait aussi une prophétesse, Anne, fille de Phanuel, de la tribu d''Aser. Elle était très avancée en âge. Après avoir vécu sept ans avec son mari depuis sa virginité, '
  '37':
  - type: note
    content: 'veuve  : cf. 4.25s ; 7.12 ; 18.3ss ; 20.47 ; 21.2s ; Ac 6.1 ; 9.39ss ; voir aussi 1Tm 5.3ss ; Judith 8.4,6 : « Judith vivait chez elle dans le veuvage depuis trois ans et quatre mois… Elle jeûnait tous les jours de son veuvage, excepté les sabbats et leurs veilles, les nouvelles lunes et leurs veilles, les fêtes et les jours de réjouissances de la maison d''Israël. » –  elle ne s''éloignait pas du temple Ps 23.6 ; 26.8 ; 27.4 ; 84.5,11. –  prenait part au culte le même verbe est traduit par rendre un culte en 1.74 ; 4.8/ / ; cf. Ac 7.7,42 ; 24.14 ; 26.7n  ; 27.23 ; Rm 1.9,25 ; Ph 3.3 ; 2Tm 1.3 ; Hé 8.5n  ; Ap 7.15+. –  nuit et jour 18.7 ; Ac 9.24 ; 20.31 ; 26.7. –  des prières  : cf. 1.10.'
  - type: text
    content: 'elle était restée veuve ; âgée de quatre-vingt-quatre ans, elle ne s''éloignait pas du temple et prenait part au culte, nuit et jour, par des jeûnes et des prières. '
  '38':
  - type: note
    content: 'ce moment  : litt. cette heure. –  louait  : autre traduction remerciait  ; le verbe grec correspondant n''apparaît qu''ici dans le N.T. –  de l''enfant  : litt. de lui. –  qui attendaient…  : cf. v. 25+. –  la rédemption ou la délivrance 1.68n  ; cf. Es 43.3s ; 45.14 ; 49.26 ; 52.9 ; 54.1ss ; Ps 49.8s,16 ; 130.8. –  de Jérusalem  : certains mss portent à Jérusalem  ; d''autres d''Israël.'
  - type: text
    content: Elle aussi survint à ce moment même ; elle louait Dieu et parlait de l'enfant à tous ceux qui attendaient la rédemption de Jérusalem.
  - type: heading
    content: 'Retour à Nazareth : la jeunesse de Jésus'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 2.22s. –  la loi… v. 21,23. –  Nazareth, leur ville  : cf. v. 3 ; 1.26n.'
  - type: text
    content: Lorsqu'ils eurent accompli tout ce que prescrivait la loi du Seigneur, ils retournèrent en Galilée, à Nazareth, leur ville.
  '4':
  - type: note
    content: 'Joseph 1.27. –  monta  : on monte de Galilée en Judée  ; il s''agit en l''occurrence d''un voyage d''au moins 130 km ; cf. 18.31 ; 19.28 ; Ac 11.2 ; voir aussi Esd 1.3. –  Nazareth v. 39 ; 1.26n. –  David / Bethléem 1S 16.1 ; 17.12,58 ; 20.16 ; cf. Mt 2.5s ; Jn 7.42. Dans l''A.T. la ville de David est habituellement Jérusalem (2S 5.7,9 ; 6.10,12 ; Es 22.9).'
  - type: text
    content: 'Joseph aussi monta de Galilée, de la ville de Nazareth, pour se rendre en Judée, dans la ville de David appelée Bethléem, parce qu''il était de la maison et de la famille de David, '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 52 ; 1.80 ; 1S 2.21,26. –  sagesse  : cf. v. 47,52 ; voir aussi 11.31 ; 21.15 ; Mc 6.2. –  la grâce… 1.30 ; Ac 4.33 ; cf. 6.8 ; 7.10. –  sur lui v. 5 ; cf. 1.66.'
  - type: text
    content: Or l'enfant grandissait et devenait fort ; il était rempli de sagesse, et la grâce de Dieu était sur lui.
  - type: heading
    content: Jésus à douze ans dans le temple
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19 ; 1S 1.3,7,21. –  Ses parents v. 27,33,43. –  la fête de la Pâque  : cf. 22.1,7ss ; Jn 13.1 ; cf. Ex 12 ; 23.14ss ; 34.18,23 ; Lv 23.6 ; Dt 16.1-4,16 ; Ez 45.21ss ; Jn 2.13,23 ; voir aussi calendrier.'
  - type: text
    content: Ses parents allaient chaque année à Jérusalem, pour la fête de la Pâque.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'douze ans  : cf. 1R 2.12n  ; la tradition juive qui fixe à l''âge de 13 ans le moment où un garçon devient responsable au regard de la loi ( Bar-Mitsva ) est vraisemblablement postérieure à Lc ; selon Flavius Josèphe, Samuel serait devenu prophète (1S 3.3) à l''âge de douze ans. –  montèrent v. 4n  ; cf. 18.10,31 ; 19.28 ; Ac 3.1 ; 11.2 ; 15.2 ; 21.12,15 ; 24.11 ; 25.1,9.'
  - type: text
    content: 'Lorsqu''il eut douze ans, ils y montèrent selon la coutume de la fête. '
  '43':
  - type: note
    content: 'quand les jours furent achevés  : cf. Ex 12.15,18 ; Lv 23.5s. –  resta  : le verbe correspondant signifie ailleurs endurer, persévérer (un terme apparenté est traduit par persévérance en 8.15 ; 21.19) ; même sens Ac 17.14.'
  - type: text
    content: 'Puis, quand les jours furent achevés et qu''ils s''en retournèrent, l''enfant Jésus resta à Jérusalem, mais ses parents ne s''en aperçurent pas. '
  '44':
  - type: note
    content: 'avec leurs compagnons de voyage  : autre traduction (ailleurs) dans la caravane. –  les gens de leur parenté… 1.58 ; 14.12 ; 21.16 ; Ac 10.24.'
  - type: text
    content: 'Pensant qu''il était avec leurs compagnons de voyage, ils firent une journée de chemin et le cherchèrent parmi les gens de leur parenté et leurs connaissances. '
  '45':
  - type: text
    content: 'Mais ils ne le trouvèrent pas et retournèrent à Jérusalem en le cherchant. '
  '46':
  - type: note
    content: 'Au bout de trois jours Ac 25.1 ; 28.17 ; expression différente en Lc 9.22 ; 18.33 ; 24.7,21,46 ; Ac 10.40. –  dans le temple  : cf. 20.1 ; Jn 7.14,28 ; 8.20 ; 18.20 ; Ac 3.11 ; 5.12,21,25. –  assis au milieu des maîtres  : cf. 5.3.'
  - type: text
    content: 'Au bout de trois jours, ils le trouvèrent dans le temple, assis au milieu des maîtres, les écoutant et les interrogeant. '
  '47':
  - type: note
    content: 'Cf. v. 40. –  stupéfaits 8.56 ; 24.22 ; Mc 2.12n  ; Ac 2.7,12 ; 8.13 ; 9.21 ; 10.45 ; 12.16 ; cf. 4.13. –  de son intelligence et de ses réponses  : autre traduction de l''intelligence manifeste dans ses réponses.'
  - type: text
    content: 'Tous ceux qui l''entendaient étaient stupéfaits de son intelligence et de ses réponses. '
  '48':
  - type: note
    content: 'ébahis 4.32 ; 9.43 ; Ac 13.12 ; voir aussi Jn 7.15. –  Mon enfant  : litt. enfant  ; même expression 15.31 ; 16.25. –  pourquoi…  : cf. Gn 12.8 ; 20.9 ; 26.10 ; 29.25 ; Ex 14.11 ; Nb 23.11 ; Jg 15.11. –  nous te cherchions  : certains mss portent nous te cherchons. –  avec angoisse  : litt. tourmentés  ; cf. v. 35 ; le même verbe est traduit par souffrir en 16.24s, être attristé en Ac 20.38.'
  - type: text
    content: 'Quand ils le virent, ils furent ébahis ; sa mère lui dit : Mon enfant, pourquoi nous as-tu fait cela ? Ton père et moi, nous te cherchions avec angoisse ! '
  '49':
  - type: note
    content: 'j''ai à faire chez mon Père  : la phrase est ambiguë : on pourrait comprendre il faut que je sois chez mon Père comme il faut que je m''occupe des affaires de mon Père, voire il faut que je sois parmi les gens de mon Père  ; cf. 19.46 ; 23.46 ; 24.49 ; Jn 2.16 ; voir aussi 4.34 ; 6.36+.'
  - type: text
    content: 'Il leur répondit : Pourquoi me cherchiez-vous ? Ne saviez-vous pas que j''ai à faire chez mon Père ? '
  '5':
  - type: note
    content: 'sa fiancée  : certains mss portent sa femme  ; cf. 1.27.'
  - type: text
    content: afin de se faire inscrire avec Marie, sa fiancée, qui était enceinte.
  '50':
  - type: note
    content: 'ils ne comprirent pas  : cf. v. 47 ; 9.45 ; 18.34. –  ce  : autre traduction la parole (le même terme, au pluriel, est traduit par choses au v. 51).'
  - type: text
    content: 'Mais ils ne comprirent pas ce qu''il leur disait. '
  '51':
  - type: note
    content: Cf. v. 4 ; 1.23,26. –  retenait toutes ces choses ou ces paroles  ; voir v. 19n.
  - type: text
    content: Puis il descendit avec eux à Nazareth ; il leur était soumis. Sa mère retenait toutes ces choses.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'V. 40+. –  en stature  : autre traduction en âge , même terme 12.25n ( durée de la vie ) ; 19.3 ( taille ). – Voir grâce . –  auprès de Dieu et des humains Pr 3.3s ; Rm 14.18.'
  - type: text
    content: Et Jésus progressait en sagesse, en stature et en grâce auprès de Dieu et des humains.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.57 ; Gn 25.24. –  le temps… arriva  : litt. les jours s''accomplirent.'
  - type: text
    content: 'Pendant qu''ils étaient là, le temps où elle devait accoucher arriva, '
  '7':
  - type: note
    content: 'Cf. Mt 1.25. –  premier-né  : cf. v. 23 ; Ex 13.2ss ; Nb 3.12s ; 18.15s ; Dt 21.15ss ; voir aussi Rm 8.29 ; Col 1.15,18 ; Hé 1.6 ; Ap 1.5. –  l''emmaillota  : cf. Ez 16.4 ; Sagesse 7.4s : « J''ai (Salomon) été élevé dans les langes, au milieu des soucis. Aucun roi n''a débuté autrement dans l''existence. » –  une mangeoire ou une crèche  ; le terme grec correspondant désigne habituellement une mangeoire pour bestiaux ; ici il pourrait aussi désigner l''étable ; cf. 13.15 ; Es 1.3. –  la salle ou le gîte, le relais  ; il s''agit sans doute ici d''un caravansérail ; le même terme revient dans un autre contexte en 22.11/ / ; il apparaît dans le texte grec (LXX) de 1S 1.18.'
  - type: text
    content: et elle mit au monde son fils premier-né. Elle l'emmaillota et l'installa dans une mangeoire, parce qu'il n'y avait pas de place pour eux dans la salle.
  - type: heading
    content: Un ange apparaît à des bergers
  - type: heading
    content: Cf. Mt 2.1-15
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'des bergers  : cf. 1.38,52 ; 1S 16.11 ; 17.15 ; 2S 7.8. –  qui passaient…  : litt. qui gardaient les gardes  ; l''expression pourrait rappeler celle qui est traduite par assurer le service Nb 1.53+ ; dans le monde juif et hellénistique, la nuit était habituellement divisée en trois veilles ou gardes d''environ quatre heures chacune ; chez les Romains, en quatre veilles de trois heures ; cf. Lc 12.38n.'
  - type: text
    content: 'Il y avait, dans cette même région, des bergers qui passaient dans les champs les veilles de la nuit pour garder leurs troupeaux. '
  '9':
  - type: note
    content: 'Cf. Ac 26.13. –  L''ange du Seigneur  : cf. v. 15 ; voir 1.11n,19n  ; voir aussi 24.4 ; Ac 12.7. –  survint  : même verbe v. 38 ; 4.39 (se pencher) ; 10.40 ; 20.1 ; 21.34 (arriver) ; 24.4 ; Ac 4.1 ; 6.12 ; 10.17 ; 11.11 ; 12.7 ; 17.5 (assiéger) ; 22.13,20 (être présent) ; 23.11,27 (intervenir) ; 28.2 (se mettre à tomber) ; 1Th 5.3 ; 2Tm 4.2,6. –  la gloire (9.26,32 ; 21.27 ; 24.26) du Seigneur Ex 16.7,10 ; 24.16ss ; 33.18ss ; 34.29ss ; 40.34 ; Ps 63.3 ; 2Ch 7.1 ; cf. Nb 12.8. –  se mit à briller tout autour d''eux  : même verbe en Ac 26.13. –  Ils furent saisis d''une grande crainte ou ils eurent très peur (v. 10) : cf. 1.65 ; Mc 4.41.'
  - type: text
    content: 'L''ange du Seigneur survint devant eux, et la gloire du Seigneur se mit à briller tout autour d''eux. Ils furent saisis d''une grande crainte. '
