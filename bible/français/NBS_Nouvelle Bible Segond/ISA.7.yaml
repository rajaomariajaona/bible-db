        text: '-9 ; cf. 2Ch 28.5-7. Vers 735 av. J.-C., Aram (= la Syrie) et Israël (le royaume du Nord, nommé aussi Ephraïm dans la suite) entendaient contraindre Achaz, roi de Juda, à s''allier avec eux contre l''Assyrie. –  '
