        text: '  : c.-à-d. près de s''éteindre, cf. 42.3 ; 43.17 ; 2S 14.7 ; Jr 25.10 ; Jb 18.5s ; voir par opposition 2R 8.19.'
    marker-yv: yv-n
  - type: text
    text: 'Tu lui diras :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Sois tranquille, n''aie pas peur, que ton cœur ne mollisse pas devant ces deux bouts de tisons fumants, devant la colère ardente de Retsîn, d''Aram et du fils de Remalia ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puisque Aram – avec Ephraïm et le fils de Remalia – projette de te faire du mal, en disant : '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous épouvanterons la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''hébreu a simplement '
    - type: usfm
