      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ', peut-être pour lui donner par dérision le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bon à rien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il se retrouve dans une lettre adressée à Tiglath-Piléser III (745-726), où il désigne une famille. Les rois d''Aram (= Syrie) et d''Israël semblent avoir comploté de détrôner Achaz pour le remplacer par un personnage de leur choix. La désignation '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: semble avoir été courante pour des hauts fonctionnaires à charge héréditaire ; comparer v. 5 avec 1R 4.8ss ; 2R 15.25.
    marker-yv: yv-n
  - type: text
    text: « Partons à l'attaque de Juda, nous épouvanterons la ville, nous la battrons en brèche jusqu'à ce qu'elle se rende, et nous installerons un roi au milieu d'elle, le fils de Tabéel »,
