    marker-yv: yv-n
  - type: text
    text: 'Aux jours d''Achaz, fils de Jotam, fils d''Ozias, roi de Juda, Retsîn, roi d''Aram, alla faire la guerre à Jérusalem avec Péqah, fils de Remalia, roi d''Israël, mais il ne put engager le combat contre elle. '
