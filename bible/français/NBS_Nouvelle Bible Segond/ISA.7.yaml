    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : quelques années plus tard, le roi Ezéchias fera percer un tunnel qui mettra l''approvisionnement en eau potable à l''abri d''assiégeants éventuels (2R 20.20). A l''époque, il est probable que le roi Achaz surveillait des travaux de protection entrepris en vue du siège. Cf. 36.2 ; 2R 18.17+.'
    marker-yv: yv-n
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Esaïe : Sors, je te prie, à la rencontre d''Achaz, toi et Shéar-Yashoub, ton fils, vers l''extrémité de l''aqueduc du réservoir supérieur, sur la route du Champ du Teinturier. '
