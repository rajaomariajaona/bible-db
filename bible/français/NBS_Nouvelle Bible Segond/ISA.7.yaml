document_id: ISA.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un message du Seigneur pour le roi Achaz
  - type: text
    content: ' '
  - type: note
    content: 'Voir v. 6n  ; 2R 15.37n  ; 16.5n-9 ; cf. 2Ch 28.5-7. Vers 735 av. J.-C., Aram (= la Syrie) et Israël (le royaume du Nord, nommé aussi Ephraïm dans la suite) entendaient contraindre Achaz, roi de Juda, à s''allier avec eux contre l''Assyrie. –  Remalia  : hébreu Remalyahou , de même aux v. 4s,9 ; 8.6 ; 2R 15.25ss ; 16.1,5 ; 2Ch 28.6.'
  - type: text
    content: 'Aux jours d''Achaz, fils de Jotam, fils d''Ozias, roi de Juda, Retsîn, roi d''Aram, alla faire la guerre à Jérusalem avec Péqah, fils de Remalia, roi d''Israël, mais il ne put engager le combat contre elle. '
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit encore à Achaz : '
  '11':
  - type: note
    content: signe v. 14 ; 8.18 ; 20.3 ; 37.30 ; 38.7s,21s ; 66.19 ; cf. Jg 6.36-40 ; 1R 13.3-5 ; Jr 44.29s ; Mt 16.1-4. –  soit dans les profondeurs du séjour des morts, d'après plusieurs versions anciennes (cf. Jb 11.8). Le texte hébreu traditionnel porte, litt., approfondis la demande ou élève-la en haut (cf. Dt 33.13). Le verbe correspondant à demander et le mot sheol, traduit par séjour des morts, sont apparentés en hébreu.
  - type: text
    content: 'Demande un signe au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, soit dans les profondeurs du séjour des morts, soit dans les lieux les plus élevés. '
  '12':
  - type: note
    content: je ne provoquerai pas le Seigneur ou je ne mettrai pas le Seigneur à l'épreuve. Cf. Ex 17.2,7n  ; Dt 6.16 ; Ps 78.18.
  - type: text
    content: 'Achaz répondit : Je ne demanderai rien, je ne provoquerai pas le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'maison de David v. 2n. –  lasser la patience des hommes  : allusion possible aux partisans du fils de Tabéel (cf. v. 6 ; 8.6n).'
  - type: text
    content: 'Esaïe dit alors : Ecoutez, je vous prie, maison de David ! Ne vous suffit-il pas de lasser la patience des hommes, que vous lassiez encore celle de mon Dieu ? '
  '14':
  - type: note
    content: 'la jeune fille  : le texte hébreu n''emploie pas le terme technique pour vierge, mais un autre mot qui dans l''A.T. désigne une jeune fille nubile ou, selon certains, une jeune femme jusqu''à la naissance de son premier enfant ; cf. Gn 24.43 ; Ex 2.8 ; Ps 68.26 ; Pr 30.19 ; Ct 1.3+. Mt 1.23 cite ce texte d''après LXX, qui a employé le mot grec pour vierge. Ici l''expression la jeune fille pourrait viser, en particulier, la princesse appelée à enfanter l''héritier de la couronne, soit au temps du prophète, soit dans un temps de salut à venir. –  est ou va être enceinte. –  et (elle) l''appellera… (cf. Gn 16.11 ; 29.32-35 ; 30.24 ; 35.18 ; 1S 4.21 ; Lc 1.31) ; texte hébreu incertain ; on pourrait aussi lire, avec la plupart des mss de LXX, tu l''appelleras (cf. 8.3). Autres variantes il l''appellera ou on l''appellera (Qumrân), vous l''appellerez (mss de LXX et Vg). –  Immanou-El signifie Dieu (hébreu ’El, voir Gn 21.33n) (est) avec nous  ; c''est de la transcription en grec dans LXX que nous vient la forme Emmanuel  ; cf. 8.8,10 ; 9.5s ; 41.10 ; Nb 23.21 ; Dt 2.7 ; Am 5.14 ; Ps 46.8,12.'
  - type: text
    content: 'C''est pourquoi le Seigneur lui-même vous donnera un signe : la jeune fille est enceinte, elle mettra au monde un fils et l''appellera du nom d''Immanou-El (« Dieu est avec nous »). '
  '15':
  - type: note
    content: 'lait fermenté / miel v. 21-22n  ; cf. Gn 18.8n. –  quand il saura (cf. v. 16) : autres traductions jusqu''à ce qu''il sache ; pour savoir (même verbe que celui qui est rendu par connaître dans l''expression comparable de Gn 2.9n).'
  - type: text
    content: 'Il se nourrira de lait fermenté et de miel quand il saura rejeter ce qui est mauvais et choisir ce qui est bon. '
  '16':
  - type: note
    content: 'avant que l''enfant sache 8.4. –  qui t''épouvantent  : autre traduction que tu as en horreur  ; cf. v. 6+. –  abandonnée v. 23-25 ; 6.12 ; 17.1-3 ; 2R 15.29 ; 16.9.'
  - type: text
    content: 'Mais avant que l''enfant sache rejeter ce qui est mauvais et choisir ce qui est bon, la terre des deux rois qui t''épouvantent sera abandonnée. '
  '17':
  - type: note
    content: 'ta famille  : litt. la maison de ton père. –  Ephraïm s''est éloigné de Juda 1R 12 ; cf. Es 8.23. –  le roi d''Assyrie  : cf. v. 20 ; 8.7s ; 36.1.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera venir sur toi, sur ton peuple et sur ta famille, des jours tels qu''il n''y en a pas eu depuis le jour où Ephraïm s''est éloigné de Juda – le roi d''Assyrie.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sifflera  : cf. 5.26. –  les mouches / les abeilles  : litt. la mouche / l''abeille . –  abeilles Dt 1.44 ; Ps 118.12. –  des bras du Nil ou du delta du Nil (litt. des Nils , cf. Ex 7.19n) , en Egypte  : cf. 19.6. – Certains, prenant en bonne part le vocabulaire des v. 17-19 (cf. Jg 14.8 ; Za 10.8), y voient déjà l''annonce du retour à la vie pastorale paisible et prospère décrite aux v. 21s. Voir cependant le v. 20.'
  - type: text
    content: 'En ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sifflera les mouches'
  - type: text
    content: qui sont aux extrémités des bras du Nil, en Egypte,
  - type: text
    content: et les abeilles qui sont en Assyrie ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'se poseront v. 2n. –  oueds  : cf. 57.5 ; Gn 26.17n.'
  - type: text
    content: elles viendront et se poseront toutes
  - type: text
    content: dans les pentes abruptes des oueds
  - type: text
    content: et dans les fentes des rochers,
  - type: text
    content: sur tous les buissons
  - type: text
    content: et sur tous les pâturages.
  '2':
  - type: note
    content: 'la maison de David  : la famille royale, de même au v. 13 ; cf. 2S 7.8-16 ; Ps 89.20-38 ; 132.11s. –  occupe  : litt. s''est posé sur  ; même verbe au v. 19 (se poseront) ; autre traduction (selon l''interprétation de LXX)  : Aram s''est appuyé sur Ephraïm (voir v. 1n) (alliance militaire). –  Le cœur d''Achaz  : litt. son cœur. –  comme les arbres  : cf. 6.13.'
  - type: text
    content: 'On dit à la maison de David : Aram occupe Ephraïm. Le cœur d''Achaz et le cœur de son peuple se mirent à frémir comme les arbres de la forêt sous le vent. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'rasera  : métaphore évoquant sans doute à la fois l''invasion qui détruit toute culture, le traitement infligé aux prisonniers de guerre et un signe de deuil (cf. 3.24 ; 15.2 ; Jr 48.37 ; Ez 5.1 ; 7.18 ; Am 8.10 ; Mi 1.16 ; Jb 1.20 ; voir aussi 2S 10.4). –  au-delà du Fleuve (l''Euphrate, cf. Gn 10.21n  ; 31.21n), expression courante pour désigner la Mésopotamie. –  des jambes  : cf. 6.2n.'
  - type: text
    content: En ce jour-là, le Seigneur rasera
  - type: text
    content: avec un rasoir loué au-delà du Fleuve
  - type: text
    content: – avec le roi d'Assyrie –
  - type: text
    content: la tête et le poil des jambes ;
  - type: text
    content: il enlèvera aussi la barbe.
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 25 ; 11.6.
  - type: text
    content: En ce jour-là,
  - type: text
    content: chacun aura une génisse pour tout gros bétail et deux têtes de petit bétail.
  '22':
  - type: text
    content: ' '
  - type: note
    content: lait fermenté v. 15. –  miel v. 15,18n  ; cf. Ex 3.8+ ; Dt 32.13. On peut aussi comprendre qu'à la suite des invasions, la culture est abandonnée au profit de l'élevage. –  quiconque sera resté 1.9+.
  - type: text
    content: Il y aura une telle abondance de lait
  - type: text
    content: qu'on se nourrira de lait fermenté ;
  - type: text
    content: oui, c'est de lait fermenté et de miel que se nourrira
  - type: text
    content: quiconque sera resté dans le pays.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'mille sicles  : s''il s''agit de l''unité de poids, environ 10 kg (voir mesures, poids et monnaies) ; cf. Ct 8.11. –  ronces / épines 5.6+.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: tout lieu où il y a mille ceps de vigne valant mille sicles d'argent
  - type: text
    content: sera livré aux ronces et aux épines.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'On n''y entrera…  : autre traduction il n''y entrera . –  flèches / arc 5.28.'
  - type: text
    content: On n'y entrera qu'avec les flèches et l'arc,
  - type: text
    content: car tout le pays ne sera que ronces et épines.
  '25':
  - type: text
    content: ' '
  - type: note
    content: '17.2 ; 27.10 ; 32.14 ; Ez 25.5 ; So 2.6s. –  les coteaux  : litt. les montagnes. – Les termes correspondant à sarclait (cf. 5.6) et à sarcloir sont aussi apparentés en hébreu.'
  - type: text
    content: Quant à tous les coteaux qu'on sarclait au sarcloir,
  - type: text
    content: tu ne t'y risqueras plus,
  - type: text
    content: 'par crainte des ronces et des épines :'
  - type: text
    content: on y lâchera les bœufs,
  - type: text
    content: le mouton et la chèvre y piétineront.
  '3':
  - type: note
    content: 'Shéar-Yashoub signifie un reste reviendra (sur ce verbe, voir 1.27n) ; cf. 10.20-22 ; sur les noms symboliques des enfants, cf. 7.14 ; 8.1-3,18 ; Os 1.4-9. –  ton fils  : cf. 2R 16.3. –  l''aqueduc du réservoir supérieur  : quelques années plus tard, le roi Ezéchias fera percer un tunnel qui mettra l''approvisionnement en eau potable à l''abri d''assiégeants éventuels (2R 20.20). A l''époque, il est probable que le roi Achaz surveillait des travaux de protection entrepris en vue du siège. Cf. 36.2 ; 2R 18.17+.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Esaïe : Sors, je te prie, à la rencontre d''Achaz, toi et Shéar-Yashoub, ton fils, vers l''extrémité de l''aqueduc du réservoir supérieur, sur la route du Champ du Teinturier. '
  '4':
  - type: note
    content: 'Sois tranquille  : litt. garde-toi et sois calme  ; cf. 8.12 ; 30.15. –  que ton cœur…  : cf. Dt 20.3,8. –  bouts  : litt. queues. –  tisons (cf. Am 4.11 ; Za 3.2) fumants  : c.-à-d. près de s''éteindre, cf. 42.3 ; 43.17 ; 2S 14.7 ; Jr 25.10 ; Jb 18.5s ; voir par opposition 2R 8.19.'
  - type: text
    content: 'Tu lui diras :'
  - type: text
    content: 'Sois tranquille, n''aie pas peur, que ton cœur ne mollisse pas devant ces deux bouts de tisons fumants, devant la colère ardente de Retsîn, d''Aram et du fils de Remalia ! '
  '5':
  - type: text
    content: 'Puisque Aram – avec Ephraïm et le fils de Remalia – projette de te faire du mal, en disant : '
  '6':
  - type: note
    content: 'nous épouvanterons la ville  : l''hébreu a simplement nous l''épouvanterons, avec un pronom objet féminin (5.14n) ; sur le verbe hébreu correspondant (aussi v. 16n), voir Nb 22.3n. –  nous la battrons en brèche jusqu''à ce qu''elle se rende  : litt. nous la percerons vers nous. –  le fils de Tabéel  : personnage inconnu. Le nom araméen Tabéel se présente ici sous une forme légèrement différente de celle qui apparaît en Esd 4.7n, peut-être pour lui donner par dérision le sens de bon à rien  ; il se retrouve dans une lettre adressée à Tiglath-Piléser III (745-726), où il désigne une famille. Les rois d''Aram (= Syrie) et d''Israël semblent avoir comploté de détrôner Achaz pour le remplacer par un personnage de leur choix. La désignation fils de semble avoir été courante pour des hauts fonctionnaires à charge héréditaire ; comparer v. 5 avec 1R 4.8ss ; 2R 15.25.'
  - type: text
    content: « Partons à l'attaque de Juda, nous épouvanterons la ville, nous la battrons en brèche jusqu'à ce qu'elle se rende, et nous installerons un roi au milieu d'elle, le fils de Tabéel »,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 8.10 ; 28.18 ; Ps 33.10.
  - type: text
    content: 'ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Cela ne tiendra pas, cela n'aura pas lieu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2Ch 28.23. –  soixante-cinq ans  : ce délai pourrait désigner l''exil évoqué en Esd 4.2n, sous Asarhaddon (680-669 av. J.-C.) ; voir aussi 2R 17.24 ; Esd 4.10. –  brisé  : le verbe hébreu correspondant peut aussi avoir le sens de terrifier (8.9 ; 9.3 ; 20.5 ; 30.31 ; 31.4,9 ; 51.6ns).'
  - type: text
    content: Car la tête d'Aram, c'est Damas,
  - type: text
    content: et la tête de Damas, c'est Retsîn.
  - type: text
    content: – Encore soixante-cinq ans, Ephraïm, brisé, ne sera plus un peuple. –
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Voir Samaritains. –  vous n''avez pas foi et vous ne tiendrez pas traduisent deux formes du même verbe (apparenté au mot amen  ; cf. 2Ch 20.20n). Autre traduction si vous ne tenez pas ferme, vous ne tiendrez pas  ; cf. Ha 2.4n. Des versions anciennes ont lu deux verbes différents  : si vous n''avez pas de foi, vous ne comprendrez pas.'
  - type: text
    content: La tête d'Ephraïm, c'est Samarie,
  - type: text
    content: et la tête de Samarie, c'est le fils de Remalia.
  - type: text
    content: Si vous n'avez pas foi, vous ne tiendrez pas !
  - type: heading
    content: Un enfant va naître qu'on nommera Immanou-El
