document_id: ECC.10,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'mouches mortes  : litt. mouches de mort , ce qui pourrait aussi signifier insectes venimeux. –  rendent puante / font fermenter  : allitération en hébreu ; cf. 1Co 5.6s ; Ga 5.9. –  un peu de folie ou de stupidité , cf. 1.17n  ; 9.18. – Voir gloire.'
  - type: text
    content: Les mouches mortes rendent puante l'huile du parfumeur et la font fermenter ;
  - type: text
    content: un peu de folie l'emporte sur la sagesse et sur la gloire.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'l''avantage (v. 11 ; 1.3n) de la sagesse…  : sens incertain ; autres traductions possibles il y a donc intérêt à mettre en œuvre la sagesse ; le bénéfice d''un travail bien fait provient de la sagesse.'
  - type: text
    content: Si le fer est émoussé et qu'on n'en aiguise pas le tranchant,
  - type: text
    content: on devra redoubler de vigueur ;
  - type: text
    content: l'avantage de la sagesse, c'est qu'elle procure le succès.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le charme  : cf. Jr 8.17 ; Ps 58.6 ; voir aussi Es 3.3n. –  celui qui sait…  : litt. le maître (hébreu ba`al ) de la langue  ; cf. Siracide 12.13 : « Qui aura pitié du charmeur mordu par un serpent et de ceux qui s''approchent des bêtes fauves ? »'
  - type: text
    content: Si le serpent mord quand le charme n'opère pas,
  - type: text
    content: il n'y a pas d'avantage pour celui qui sait se servir de sa langue.
  - type: heading
    content: Les paroles de l'homme stupide
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 10.32 ; 15.2. –  Les paroles…  : litt. les paroles de la bouche du sage (sont) grâce. –  causent sa perte  : litt. l''engloutissent . Cf. Siracide 21.16 : « Le discours du sot est comme un fardeau sur la route ; mais sur les lèvres de l''intelligent on trouve de l''agrément. »'
  - type: text
    content: Les paroles de la bouche du sage sont pleines de grâce ;
  - type: text
    content: les lèvres de l'homme stupide causent sa perte.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Es 32.6 ; Ps 14.1. –  son discours  : litt. sa bouche  ; cf. 8.2n.'
  - type: text
    content: Le début des paroles de sa bouche est une folie,
  - type: text
    content: et la fin de son discours est une démence funeste.
  '14':
  - type: text
    content: ' '
  - type: note
    content: multiplie les paroles 5.2. –  qui lui dira… 3.22+.
  - type: text
    content: Le fou multiplie les paroles.
  - type: text
    content: L'être humain ne sait pas ce qui sera ;
  - type: text
    content: qui lui dira ce qui sera après lui ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 10.
  - type: text
    content: Le travail de l'homme stupide le fatigue,
  - type: text
    content: parce qu'il ne sait pas aller à la ville.
  - type: heading
    content: A propos des rois
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'un jeune homme  : autres traductions un jeune garçon ; un serviteur  ; cf. v. 7 ; 4.13s ; Es 3.4,12. –  dès le matin  : cf. Es 5.11s.'
  - type: text
    content: Malheureux es-tu, pays dont le roi est un jeune homme,
  - type: text
    content: et dont les princes mangent dès le matin !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'notables ou nobles  ; cf. Es 34.12+ ; Né 2.16+. –  pour prendre des forces…  : autre traduction comme des hommes vaillants et non comme des ivrognes  ; cf. Pr 31.4.'
  - type: text
    content: Heureux es-tu, pays dont le roi est un fils de notables,
  - type: text
    content: et dont les princes mangent au temps convenable,
  - type: text
    content: pour prendre des forces, et sans beuveries !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Quand les mains…  : autre traduction avec des bras paresseux  ; le mot correspondant à mains (ou bras ) est sous-entendu au premier vers ; cf. Pr 10.4 ; 19.15 ; 31.27.'
  - type: text
    content: Quand les mains sont paresseuses, la charpente s'affaisse ;
  - type: text
    content: quand les bras retombent, la maison a des gouttières.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'On fait des repas…  : litt. pour le rire on fait du pain  ; cf. Jg 9.13 ; Ps 104.15.'
  - type: text
    content: On fait des repas pour se divertir,
  - type: text
    content: le vin rend la vie joyeuse,
  - type: text
    content: l'argent répond à tout.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'l''incline  : autre traduction est. Dans l''Antiquité, la droite était le côté favorable, tandis que la gauche était chargée d''une connotation funeste (cf. en latin sinister, sinistra ). –  stupide 2.14+.'
  - type: text
    content: Le cœur du sage l'incline à sa droite,
  - type: text
    content: le cœur de l'homme stupide à sa gauche.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.21 ; Ex 22.27 ; Lc 12.2s. –  dans ta pensée  : certains modifient le texte hébreu traditionnel pour lire dans ton lit.'
  - type: text
    content: Ne maudis pas un roi, même dans ta pensée ;
  - type: text
    content: dans ta chambre à coucher ne maudis pas un riche ;
  - type: text
    content: car l'oiseau du ciel en emporterait l'écho,
  - type: text
    content: la gent ailée rapporterait la chose.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la raison  : litt. son cœur. –  il dit à chacun…  : on peut comprendre ce texte de deux façons différentes : soit il montre aux autres qu''il est fou , ou bien il dit aux autres qu''ils sont fous.'
  - type: text
    content: Quand le fou va son chemin, la raison lui manque ;
  - type: text
    content: il dit à chacun qu'il est fou !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.3 ; Pr 16.14. –  le calme Pr 14.30 ; 15.4. –  évite  : le verbe hébreu signifie aussi apaiser, procurer le repos. –  péchés ou maladresses , cf. 9.18n.'
  - type: text
    content: Si l'esprit de celui qui gouverne s'élève contre toi,
  - type: text
    content: ne quitte pas ta place ;
  - type: text
    content: car le calme évite de grands péchés.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'qui est le maître  : cf. 8.8n.'
  - type: text
    content: Il est un malheur que j'ai vu sous le soleil,
  - type: text
    content: 'comme une erreur échappée à celui qui est le maître :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 19.10 ; 30.21s. –  sottise  : le terme correspondant, apparenté à celui qui est traduit par folie au v. 1, n''apparaît qu''ici. –  est souvent haut placée  : autres traductions possibles occupe beaucoup de postes élevés ; est très haut placée ; est haut placée, tandis que des grands et des riches…  ; cf. 7.11.'
  - type: text
    content: la sottise est souvent haut placée,
  - type: text
    content: tandis que des riches croupissent tout en bas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1S 2.4-8 ; Ps 107.40s ; 113.7s.
  - type: text
    content: J'ai vu des esclaves sur des chevaux,
  - type: text
    content: et des princes marcher à pied comme des esclaves.
  - type: heading
    content: Les risques de l'action
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 7.16+ ; Pr 26.27.
  - type: text
    content: Celui qui creuse une fosse y tombe,
  - type: text
    content: celui qui ouvre une brèche dans une clôture est mordu par un serpent.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'court un risque  : autre traduction doit y prendre garde.'
  - type: text
    content: Celui qui remue des pierres se blesse,
  - type: text
    content: celui qui fend du bois court un risque.
