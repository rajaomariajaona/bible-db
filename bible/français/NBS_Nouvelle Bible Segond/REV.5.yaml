document_id: REV.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le livre scellé et l'agneau
  - type: text
    content: ' '
  - type: note
    content: 'celui qui était assis 4.2+. –  un livre écrit… c.-à-d. un rouleau (cf. 6.14) écrit au recto et au verso, comme en Ez 2.9s ; au lieu de au dos certains mss portent au dehors . –  scellé ou cacheté  : cf. 7.2s ; 10.2 ; Es 29.11 ; Jr 32.10s ; Dn 12.4,9.'
  - type: text
    content: 'Alors je vis dans la main droite de celui qui était assis sur le trône un livre écrit au dedans et au dos, scellé de sept sceaux. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: un royaume (certains mss portent des rois ) et des prêtres 1.6+. –  ils régneront 20.6 ; 22.5 ; Rm 5.17.
  - type: text
    content: tu as fait d'eux, pour notre Dieu, un royaume et des prêtres
  - type: text
    content: et ils régneront sur la terre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'beaucoup d''anges 7.11 ; cf. 1R 22.19. –  trône… v. 1,6. –  des dizaines de milliers… ou des myriades de myriades…  : cf. 9.16n  ; Dn 7.10 ; Hé 12.22.'
  - type: text
    content: 'Je regardai et j''entendis la voix de beaucoup d''anges autour du trône avec celle des êtres vivants et des anciens – leur nombre était des dizaines de milliers de fois dix mille, des milliers de milliers. '
  '12':
  - type: note
    content: 'Cf. v. 9 ; Ph 2.9-11. –  honneur / gloire v. 13 ; 4.9,11 ; 7.12 ; 21.26 ; 1P 1.7+. –  bénédiction  : autre traduction louange  ; le terme grec a donné notre mot éloge  ; de même v. 13 ; 7.12 ; cf. Rm 16.18.'
  - type: text
    content: 'Ils disaient d''une voix forte :'
  - type: text
    content: L'agneau qui a été immolé est digne de recevoir
  - type: text
    content: puissance, richesse, sagesse,
  - type: text
    content: force, honneur, gloire et bénédiction.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'toutes les créatures…  : cf. v. 3 ; Ps 146.6 ; Ph 2.10. –  A celui qui est assis… 4.2+. –  à l''agneau v. 12.'
  - type: text
    content: 'Et toutes les créatures dans le ciel, sur la terre, sous la terre et sur la mer, tout ce qui s''y trouve, je les entendis qui disaient :'
  - type: text
    content: A celui qui est assis sur le trône et à l'agneau,
  - type: text
    content: la bénédiction, l'honneur, la gloire et le pouvoir
  - type: text
    content: à tout jamais !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'V. 6 ; cf. 7.12. –  se prosterner  : 3.9+ ; Mt 2.2+ ; voir culte.'
  - type: text
    content: 'Et les quatre êtres vivants disaient : '
  - type: text
    content: Amen !
  - type: text
    content: Et les anciens tombèrent pour se prosterner.
  '2':
  - type: note
    content: un ange puissant 10.1 ; 18.21. –  qui proclamait Mc 1.4n.
  - type: text
    content: 'Je vis aussi un ange puissant qui proclamait d''une voix forte : Qui est digne d''ouvrir le livre et d''en rompre les sceaux ? '
  '3':
  - type: note
    content: ni dans le ciel… v. 13 ; cf. Ex 20.4 ; Ph 2.10.
  - type: text
    content: 'Mais personne, ni dans le ciel, ni sur la terre, ni sous la terre, ne pouvait ouvrir le livre ni le regarder. '
  '4':
  - type: text
    content: 'Je pleurais beaucoup, parce que personne n''avait été trouvé digne d''ouvrir le livre ni de le regarder. '
  '5':
  - type: note
    content: 'anciens 4.4+. –  Ne pleure pas  : cf. Lc 7.13. –  lion… de Juda Gn 49.9 ; Hé 7.14. –  le rejeton (autre traduction la racine) de David  : cf. 22.16 ; Es 11.1,10 ; Rm 15.12n. –  a été vainqueur 3.21.'
  - type: text
    content: 'Mais l''un des anciens me dit : Ne pleure pas ; le lion de la tribu de Juda, le rejeton de David, a été vainqueur : il peut ouvrir le livre et ses sept sceaux !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'êtres vivants 4.6n. –  un agneau v. 12 ; 7.17 ; 13.8 ; 14.1 ; Jn 1.29n  ; 1P 1.19s ; cf. Ex 12.3-6 ; Es 53.7 ; Jr 11.19 ; en 1 Hénoch 89–90 « l''agneau » est en fait un bélier puissant, instrument du jugement divin ; cf. Testament de Joseph 19.8 : « Je vis que de Juda était née une vierge portant une robe de lin ; d''elle surgit un agneau sans tache, et à sa gauche se tenait comme un lion ; toutes les bêtes sauvages s''élancèrent contre lui, et l''agneau les vainquit, les détruisit et les foula aux pieds. » –  immolé  : autre traduction égorgé (comme en 13.3 ; le même verbe est traduit par s''entre-égorger en 6.4) ; même verbe v. 9,12 ; 6.9 ; 13.8 ; 18.24 ; voir 1Jn 3.12n. –  sept cornes  : symbole de puissance ; cf. Dt 33.17 ; Dn 7.7,24. –  sept yeux Za 4.10. –  les sept esprits  : certains mss portent les esprits 1.4+.'
  - type: text
    content: 'Alors je vis, au milieu du trône et des quatre êtres vivants et au milieu des anciens, un agneau debout, qui semblait immolé. Il avait sept cornes et sept yeux, qui sont les sept esprits de Dieu envoyés par toute la terre. '
  '7':
  - type: note
    content: 4.2+.
  - type: text
    content: Il vint recevoir le livre de la main droite de celui qui était assis sur le trône.
  '8':
  - type: text
    content: ' '
  - type: note
    content: êtres vivants / anciens 4.4+,6+. –  lyre 14.2 ; 15.2 ; cf. 1Co 14.7. –  encens / prières des saints 8.3s ; cf. Ps 141.2.
  - type: text
    content: 'Quand il eut reçu le livre, les quatre êtres vivants et les vingt-quatre anciens tombèrent devant l''agneau, tenant chacun une lyre et des coupes d''or pleines d''encens, qui sont les prières des saints. '
  '9':
  - type: note
    content: 'un chant nouveau 14.3 ; cf. 2.17n  ; 15.3 ; Es 42.10 ; Ps 33.3 ; 40.4 ; 96.1 ; 98.1 ; 144.9 ; 149.1. –  Tu es digne 4.11. –  immolé v. 6n. –  acheté (ou racheté) … par ton sang  : cf. 1P 1.19 ; voir rédemption. –  de toute tribu… 7.9 ; 10.11 ; 11.9 ; 13.7 ; 14.6 ; 17.15.'
  - type: text
    content: 'Ils chantent un chant nouveau, en disant :'
  - type: text
    content: Tu es digne de recevoir le livre et d'en ouvrir les sceaux,
  - type: text
    content: car tu as été immolé et tu as acheté pour Dieu, par ton sang,
  - type: text
    content: des gens de toute tribu, de toute langue, de tout peuple et de toute nation ;
