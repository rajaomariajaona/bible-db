document_id: REV.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le livre scellé et l'agneau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'celui qui était assis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un livre écrit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c.-à-d. un rouleau (cf. 6.14) écrit au recto et au verso, comme en Ez 2.9s ; au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au dos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au dehors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'scellé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cacheté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.2s ; 10.2 ; Es 29.11 ; Jr 32.10s ; Dn 12.4,9.'
      marker-yv: yv-n
    - type: text
      text: 'Alors je vis dans la main droite de celui qui était assis sur le trône un livre écrit au dedans et au dos, scellé de sept sceaux. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un royaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des rois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils régneront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.6 ; 22.5 ; Rm 5.17.
      marker-yv: yv-n
    - type: text
      text: tu as fait d'eux, pour notre Dieu, un royaume et des prêtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils régneront sur la terre.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'beaucoup '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'anges
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.11 ; cf. 1R 22.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trône… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 1,6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des dizaines de milliers… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des myriades de myriades…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dn 7.10 ; Hé 12.22.'
      marker-yv: yv-n
    - type: text
      text: 'Je regardai et j''entendis la voix de beaucoup d''anges autour du trône avec celle des êtres vivants et des anciens – leur nombre était des dizaines de milliers de fois dix mille, des milliers de milliers. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 9 ; Ph 2.9-11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'honneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 13 ; 4.9,11 ; 7.12 ; 21.26 ; 1P 1.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: louange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme grec a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éloge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même v. 13 ; 7.12 ; cf. Rm 16.18.'
      marker-yv: yv-n
    - type: text
      text: 'Ils disaient d''une voix forte :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'agneau qui a été immolé est digne de recevoir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puissance, richesse, sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: force, honneur, gloire et bénédiction.
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes les créatures…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3 ; Ps 146.6 ; Ph 2.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'A celui qui est assis… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à l''agneau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12.
      marker-yv: yv-n
    - type: text
      text: 'Et toutes les créatures dans le ciel, sur la terre, sous la terre et sur la mer, tout ce qui s''y trouve, je les entendis qui disaient :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A celui qui est assis sur le trône et à l'agneau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la bénédiction, l'honneur, la gloire et le pouvoir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tout jamais !
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6 ; cf. 7.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se prosterner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 3.9+ ; Mt 2.2+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et les quatre êtres vivants disaient : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et les anciens tombèrent pour se prosterner.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un ange puissant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.1 ; 18.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui proclamait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mc 1.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je vis aussi un ange puissant qui proclamait d''une voix forte : Qui est digne d''ouvrir le livre et d''en rompre les sceaux ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni dans le ciel… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13 ; cf. Ex 20.4 ; Ph 2.10.
      marker-yv: yv-n
    - type: text
      text: 'Mais personne, ni dans le ciel, ni sur la terre, ni sous la terre, ne pouvait ouvrir le livre ni le regarder. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je pleurais beaucoup, parce que personne n''avait été trouvé digne d''ouvrir le livre ni de le regarder. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne pleure pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 7.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lion… de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 49.9 ; Hé 7.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le rejeton '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la racine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.16 ; Es 11.1,10 ; Rm 15.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a été vainqueur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.21.
      marker-yv: yv-n
    - type: text
      text: 'Mais l''un des anciens me dit : Ne pleure pas ; le lion de la tribu de Juda, le rejeton de David, a été vainqueur : il peut ouvrir le livre et ses sept sceaux !'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'êtres vivants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un agneau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12 ; 7.17 ; 13.8 ; 14.1 ; Jn 1.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1P 1.19s ; cf. Ex 12.3-6 ; Es 53.7 ; Jr 11.19 ; en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '89–90 « l''agneau » est en fait un bélier puissant, instrument du jugement divin ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Joseph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '19.8 : « Je vis que de Juda était née une vierge portant une robe de lin ; d''elle surgit un agneau sans tache, et à sa gauche se tenait comme un lion ; toutes les bêtes sauvages s''élancèrent contre lui, et l''agneau les vainquit, les détruisit et les foula aux pieds. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: immolé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'égorgé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(comme en 13.3 ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''entre-égorger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 6.4) ; même verbe v. 9,12 ; 6.9 ; 13.8 ; 18.24 ; voir 1Jn 3.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept cornes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : symbole de puissance ; cf. Dt 33.17 ; Dn 7.7,24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Za 4.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les sept '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les esprits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.4+.
      marker-yv: yv-n
    - type: text
      text: 'Alors je vis, au milieu du trône et des quatre êtres vivants et au milieu des anciens, un agneau debout, qui semblait immolé. Il avait sept cornes et sept yeux, qui sont les sept esprits de Dieu envoyés par toute la terre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.2+.
      marker-yv: yv-n
    - type: text
      text: Il vint recevoir le livre de la main droite de celui qui était assis sur le trône.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'êtres vivants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anciens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.4+,6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lyre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.2 ; 15.2 ; cf. 1Co 14.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prières des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.3s ; cf. Ps 141.2.
      marker-yv: yv-n
    - type: text
      text: 'Quand il eut reçu le livre, les quatre êtres vivants et les vingt-quatre anciens tombèrent devant l''agneau, tenant chacun une lyre et des coupes d''or pleines d''encens, qui sont les prières des saints. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
