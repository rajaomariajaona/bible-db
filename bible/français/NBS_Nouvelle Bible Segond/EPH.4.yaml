document_id: EPH.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Construire le corps du Christ dans l'unité et dans l'amour
  - type: text
    content: ' '
  - type: note
    content: 'encourage ou exhorte Rm 12.1+. –  le prisonnier 3.1+. –  vous comporter (litt. marcher , 2.10n) d''une manière digne 1Th 2.12+. –  l''appel  : cf. v. 4 ; 1.18+.'
  - type: text
    content: 'Je vous encourage donc, moi, le prisonnier dans le Seigneur, à vous comporter d''une manière digne de l''appel que vous avez reçu, '
  '10':
  - type: note
    content: 'Cf. Jn 6.33 ; Ac 2.32s ; 1Tm 3.16. –  au-dessus de tous les cieux  : cf. Hé 4.14 ; 7.26. –  afin de remplir tout 1.9-10n,23 ; cf. Jr 23.24.'
  - type: text
    content: Celui qui est descendu, c'est le même qui est monté au-dessus de tous les cieux, afin de remplir tout.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 12.4-11 ; 1Co 12.4-11,28s. –  donné v. 8 ; 1.22. –  apôtres / prophètes  : cf. 2.20 ; 3.5. –  annonciateurs de la bonne nouvelle Ac 21.8n  ; 2Tm 4.5n. –  bergers ou pasteurs , cf. Jn 21.16 ; Ac 20.28 ; 1P 5.2. –  maîtres ou enseignants, instructeurs  ; cf. Ac 13.1n  ; Rm 12.7 ; 1Co 12.28ns ; 1Tm 2.7 ; 2Tm 1.11 ; Jc 3.1. Selon les uns, les deux derniers termes évoqueraient deux aspects d''un même ministère ; selon d''autres il s''agirait de deux ministères différents.'
  - type: text
    content: 'C''est lui qui a donné les uns comme apôtres, d''autres comme prophètes, d''autres comme annonciateurs de la bonne nouvelle, d''autres comme bergers et maîtres, '
  '12':
  - type: note
    content: 'afin de former…  : autres traductions pour l''épanouissement ou pour le rétablissement des saints  ; termes apparentés en 2Co 13.9n  ; Ga 6.1n  ; Hé 10.5 ; cf. 2Tm 3.17. –  l''œuvre 1Co 15.58 ; Ph 2.30 ; 1Th 1.3. –  ministère ou service, 3.7n. –  construction ou édification, v. 16,29 ; 2.19nss ; 1Co 14.26 ; 1P 2.5 ; Jd 20. –  corps du Christ  : 1.23+.'
  - type: text
    content: 'afin de former les saints pour l''œuvre du ministère, pour la construction du corps du Christ, '
  '13':
  - type: note
    content: 'l''unité de la foi  : cf. v. 3. –  la connaissance… 1.17+ ; Ph 3.8. – Voir Fils. –  l''homme adulte ou accompli, parfait, cf. Col 1.28 ; Hé 5.14 ; voir aussi 1Co 2.6n,14ss ; 14.20n. –  à la mesure…  : litt. à la mesure (v. 7+) de la taille de la plénitude (1.10n,23) du Christ  ; cf. Lc 2.52 ; Ga 4.19.'
  - type: text
    content: 'jusqu''à ce que nous soyons tous parvenus à l''unité de la foi et de la connaissance du Fils de Dieu, à l''état de l''homme adulte, à la mesure de la stature parfaite du Christ. '
  '14':
  - type: note
    content: 'plus des tout-petits 1Co 3.1s ; 13.11 ; 14.20 ; Ga 4.1,3 ; Hé 5.12s ; cf. Rm 16.19. –  ballottés…  : cf. Es 57.20 ; Jc 1.6. –  à tout vent d''enseignement ou de doctrine …  : cf. Col 2.8,22 ; 2Tm 4.3s ; Hé 13.9. –  joués et égarés…  : litt. par la fourberie des gens (ou des humains, cf. v. 8), par la ruse (cf. 2Co 11.3) pour la manœuvre (Ep 6.11) de l''égarement.'
  - type: text
    content: 'Ainsi nous ne serons plus des tout-petits ballottés par les flots et entraînés à tout vent d''enseignement, joués et égarés par la ruse et les manœuvres des gens ; '
  '15':
  - type: note
    content: 'en disant la vérité  : autre traduction en nous comportant selon la vérité  ; cf. v. 21 ; 1.13 ; Ga 4.16 (même verbe). –  dans l''amour ou avec amour, 1.4n  ; 3.17-19. –  nous croîtrons à tous égards  : autre traduction possible nous ferons croître tout. –  en celui ou vers celui, cf. 1.5n. –  la tête ou le chef 1.22 ; 5.23 ; 1Co 11.3 ; Col 1.18 ; 2.10,19.'
  - type: text
    content: 'en disant la vérité, dans l''amour, nous croîtrons à tous égards en celui qui est la tête, le Christ. '
  '16':
  - type: note
    content: 'Cf. 2.21n  ; Col 2.19. –  corps 1.23+. –  mesure v. 7+. –  chaque partie  : certains mss portent ici un terme grec qui désigne en général une partie d''un tout ; quelques-uns ont en revanche le terme qui désigne plus précisément les parties du corps ou les membres, comme au v. 25n et en 5.30n  ; il n''y a qu''une lettre de différence entre ces deux mots. –  se construire (ou s''édifier) / amour 1Co 8.1.'
  - type: text
    content: C'est par lui que le corps tout entier, bien coordonné et uni grâce à toutes les jointures qui le desservent, met en œuvre sa croissance dans la mesure qui convient à chaque partie, pour se construire lui-même dans l'amour.
  - type: heading
    content: L'homme ancien et l'homme nouveau
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.8 ; Ac 14.15 ; Rm 1.18-32 ; 8.20 ; 1Co 3.20 ; Col 3.5-8 ; 1P 1.18 ; 4.3. –  vous comporter  : litt. marcher , cf. v. 1+. –  les gens des nations  : autres traductions les (autres) non-Juifs, les païens  ; ici il s''agit évidemment de ceux qui ne sont ni Juifs ni chrétiens ; cf. 2.11n  ; 1Co 5.1n. –  jugement ou intelligence , comme au v. 23 ; terme apparenté au v. 18.'
  - type: text
    content: 'Voici donc ce que je dis et ce que j''atteste dans le Seigneur : c''est que vous ne devez plus vous comporter comme les gens des nations se comportent, dans la futilité de leur jugement. '
  '18':
  - type: note
    content: 'étrangers… 2.12 ; Col 1.21. –  ignorance ou méconnaissance Ac 3.17n  ; Rm 10.3n  ; 1P 1.14. –  parce que leur cœur…  : litt. à cause de l''endurcissement de leur cœur, cf. Mc 3.5n.'
  - type: text
    content: 'Ils ont l''intelligence obscurcie, ils sont étrangers à la vie de Dieu à cause de l''ignorance qui est en eux, parce que leur cœur est obtus. '
  '19':
  - type: note
    content: Cf. 5.3 ; Col 3.5.
  - type: text
    content: Ayant perdu tout sens moral, ils se sont livrés à la débauche, pour commettre avec avidité toute sorte d'impureté.
  '2':
  - type: note
    content: Cf. v. 32 ; Ac 20.19 ; 1Co 13.4 ; Ga 6.2 ; Ph 2.1-4 ; Col 3.12s.
  - type: text
    content: 'en toute humilité et douceur, avec patience. Supportez-vous les uns les autres, dans l''amour, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 11.29 ; Rm 16.17 ; Ph 4.9 ; Col 2.6s.
  - type: text
    content: 'Mais vous, ce n''est pas ainsi que vous avez appris le Christ, '
  '21':
  - type: note
    content: 'que vous avez entendu  : autre traduction  : dont vous avez entendu parler (cf. 1.13). –  la vérité (v. 15,24) qui est en Jésus  : cf. Jn 14.6.'
  - type: text
    content: 'si du moins c''est bien lui que vous avez entendu et si c''est en lui que vous avez été instruits, conformément à la vérité qui est en Jésus : '
  '22':
  - type: note
    content: 'Cf. Rm 6.6 ; 8.13 ; Col 3.8-10. –  vous défaire  : le même verbe est traduit par rejeter au v. 25 ; cf. Col 3.8n. –  l''homme ancien  : cf. v. 24n. –  périt (ou dépérit, se corrompt, se décompose  ; cf. 6.24n  ; 2Co 4.16+ ; Col 2.22) / désirs 2P 1.4. –  trompeurs ou induits par la tromperie.'
  - type: text
    content: 'il s''agit de vous défaire de l''homme ancien qui correspond à votre conduite passée et qui périt sous l''effet des désirs trompeurs, '
  '23':
  - type: note
    content: 'renouvelés Rm 12.2. –  par l''Esprit dans votre intelligence  : litt. dans l''esprit (qu''on pourrait aussi comprendre au sens plus général d’orientation) de votre intelligence, cf. v. 21.'
  - type: text
    content: 'd''être renouvelés par l''Esprit dans votre intelligence '
  '24':
  - type: note
    content: 'revêtir 6.11. –  l''homme (ou l''humain  ; le terme s''applique, en principe indistinctement, à l''homme et à la femme) nouveau 2.15 ; cf. Rm 6.4 ; 13.14 ; 1Co 15.45 ; 2Co 5.17 ; Ga 3.27 ; Col 3.10. –  créé selon Dieu  : cf. Gn 1.26s. –  sainteté ou piété  : le terme grec ainsi traduit dans ce v. est assez rare dans le N.T. ; les Grecs l''associaient souvent à la justice pour décrire l''homme idéal au regard des dieux et des hommes (cf. Lc 1.75+ ; 1Th 2.10 ; 1Tm 2.8 ; Tt 1.8). –  que produit la vérité  : litt. de la vérité, cf. v. 21.'
  - type: text
    content: et de revêtir l'homme nouveau, qui a été créé selon Dieu dans la justice et la sainteté que produit la vérité.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Za 8.16  ; Col 3.9. –  Rejetez v. 22n. –  parle avec vérité  : autre traduction dise la vérité . –  nous faisons partie… ou nous sommes membres…  ; cf. v. 16n  ; 5.30 ; voir Rm 12.4ns.'
  - type: text
    content: 'Rejetez donc le mensonge, et '
  - type: text
    content: que chacun de vous parle avec vérité à son prochain ;
  - type: text
    content: ' car nous faisons partie les uns des autres. '
  '26':
  - type: note
    content: 'Si…  : litt. mettez-vous en colère et ne péchez pas, Ps 4.5  ; cf. Mt 5.22 ; Col 3.8 ; 1Tm 2.8 ; Jc 1.19s. –  que le soleil…  : cf. Dt 24.15 ; Mt 5.25.'
  - type: text
    content: Si vous vous mettez en colère, ne péchez pas ;
  - type: text
    content: ' que le soleil ne se couche pas sur votre irritation ; '
  '27':
  - type: note
    content: 'ne laissez pas de place  : litt. ne donnez pas de lieu  ; sur l''expression, voir Rm 12.19n  ; cf. Gn 4.7. –  au diable (voir démon, diable, Satan) 6.11 ; 1Tm 3.6s,11 ; 2Tm 2.26 ; 3.3 ; Tt 2.3 ; Jc 4.7 ; 1P 5.8s.'
  - type: text
    content: 'ne laissez pas de place au diable. '
  '28':
  - type: note
    content: 'le voleur…  : cf. 1Co 6.10 ; 1P 4.15. –  à travailler honnêtement  : litt. en œuvrant le bien avec ses [propres] mains, cf. Ac 20.34s ; 1Co 4.12 ; Ga 6.10 ; 1Th 4.11+. –  à celui qui est dans le besoin Tt 3.14 ; 1Jn 3.17.'
  - type: text
    content: 'Que le voleur ne vole plus ; qu''il se donne plutôt de la peine à travailler honnêtement de ses propres mains, pour avoir de quoi donner à celui qui est dans le besoin. '
  '29':
  - type: note
    content: 'Cf. 5.4,12,14,19s ; Col 3.8. –  Qu''il ne sorte…  : cf. Mt 15.11+ ; Jc 3.10-12. –  malsaine  : litt. pourrie, cf. Mt 7.17n. –  bonne parole Col 3.16 ; 4.6+. –  constructive v. 12n.'
  - type: text
    content: 'Qu''il ne sorte de votre bouche aucune parole malsaine mais, s''il en est besoin, une bonne parole qui soit constructive et communique une grâce à ceux qui l''entendent. '
  '3':
  - type: note
    content: 'Esprit / paix Ga 5.22+. –  par le lien  : autre traduction dans le lien  ; cf. 1.10 ; Ph 1.27 ; Col 3.14s.'
  - type: text
    content: en vous efforçant de conserver l'unité de l'Esprit par le lien de la paix.
  '30':
  - type: note
    content: 'N''attristez pas… Es 63.10 ; cf. Ps 78.40 ; 1Th 5.19 ; Sagesse 1.5 : « Le saint Esprit qui éduque fuit la duplicité, il s''écarte des pensées folles, il est mis en échec quand survient l''injustice. » –  scellés… 1.13s. – Voir rédemption.'
  - type: text
    content: 'N''attristez pas l''Esprit saint de Dieu, par lequel vous avez été scellés pour un jour de rédemption. '
  '31':
  - type: note
    content: 'Cf. Rm 1.29+. –  amertume Rm 3.14 ; Hé 12.15 ; Jc 3.14. –  calomnie ou injure  ; le terme correspondant a donné notre mot blasphème. –  toute malfaisance ou tout mal, cf. Rm 1.29 ; 1Co 5.8 ; Col 3.8 ; 1P 2.1. –  enlevées…  : cf. 1Co 5.2.'
  - type: text
    content: 'Que toute amertume, animosité, colère, clameur, calomnie, ainsi que toute malfaisance, soient enlevées du milieu de vous. '
  '32':
  - type: note
    content: 'V. 1+ ; Col 3.12s ; cf. Mt 6.14 ; 18.22-35 ; Lc 6.32-36. –  tendre bienveillance  : un terme apparenté est traduit par tendresse en 2Co 7.15n  ; même mot en 1P 3.8. –  vous a fait grâce  : certains mss portent nous a fait grâce  ; Rm 8.32n.'
  - type: text
    content: Soyez bons les uns envers les autres, pleins d'une tendre bienveillance ; faites-vous grâce, comme Dieu vous a fait grâce dans le Christ.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 23.8-10 ; 1Co 12.4-6. –  un seul corps 1.23 ; 2.14-16 ; Rm 12.5+ ; 1Co 10.17 ; 12.12. –  un seul Esprit 2.18 ; 1Co 12.13. –  appelés / appel v. 1 ; 1.18+ ; Col 3.15.
  - type: text
    content: Il y a un seul corps et un seul Esprit, tout comme vous avez aussi été appelés dans une seule espérance, celle de votre appel ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'un seul Seigneur Jn 10.16 ; 1Co 1.13 ; 8.6. –  une seule foi  : cf. v. 13. – Voir baptême.'
  - type: text
    content: il y a un seul Seigneur, une seule foi, un seul baptême,
  '6':
  - type: text
    content: ' '
  - type: note
    content: Mc 12.29/ / ; 1Co 8.6+ ; 12.6 ; cf. Dt 6.4. –  tous ou tout , les deux sens étant possibles en grec ; cf. 3.14s ; Jn 1.3 ; Ac 17.24 ; Rm 11.36 ; Col 1.15ss ; 3.11 ; Hé 2.10.
  - type: text
    content: un seul Dieu et Père de tous,
  - type: text
    content: qui est au-dessus de tous, par tous et en tous.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 13,16 ; Rm 12.3+,6 ; 1Co 12.11. – Voir grâce.
  - type: text
    content: 'Mais à chacun de nous la grâce a été accordée selon la mesure du don du Christ. '
  '8':
  - type: note
    content: 'il (Dieu ? le Christ ?) dit ou elle (l''Ecriture ?) dit. –  emmené des captifs  : litt. capturé la capture  ; cf. 1.22 ; Col 2.15. –  il a fait  : litt. il a donné, cf. Ps 68.19, texte qu''une tradition de lecture juive (Tg) appliquait à la montée de Moïse au Sinaï pour recevoir la loi puis la donner au peuple.'
  - type: text
    content: 'C''est pourquoi il dit :'
  - type: text
    content: Il est monté dans la hauteur,
  - type: text
    content: il a emmené des captifs,
  - type: text
    content: il a fait des dons aux humains
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 3.12s+ ; Ph 2.6-8. –  les régions (le terme correspondant est absent de certains mss) inférieures…  : c.-à-d. en bas, sur la terre  ; on pourrait aussi comprendre les régions inférieures de la terre  ; cf. Ps 63.10 ; Mt 12.40 ; Rm 10.6s ; 1P 3.19.'
  - type: text
    content: 'Or, que signifie : '
  - type: text
    content: il est monté,
  - type: text
    content: ' sinon qu''il est aussi descendu dans les régions inférieures, sur la terre ? '
