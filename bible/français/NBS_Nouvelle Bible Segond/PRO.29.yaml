document_id: PRO.29,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme… averti  : litt. l''homme d''avertissements (cf. 1.23n). –  brisé tout d''un coup… 6.15.'
  - type: text
    content: L'homme qui, averti, se montre rétif
  - type: text
    content: est brisé tout d'un coup, et sans remède.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Les hommes sanguinaires  : cf. Ps 26.9n. –  protègent sa vie  : litt. cherchent son être ou sa vie , ce qui habituellement signifie en veulent à sa vie . Ici l''expression semble prise dans un sens favorable.'
  - type: text
    content: Les hommes sanguinaires détestent l'homme intègre ;
  - type: text
    content: les gens droits protègent sa vie.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme stupide 1.22+. –  fait étalage…  : litt. fait sortir tout son esprit  ; on pourrait aussi comprendre donne libre cours à sa colère . Cf. 12.16+. –  se retient…  : litt. l''apaise ( son esprit  ; même verbe en Ps 89.10) en arrière (ou peut-être pour plus tard ) ; on pourrait aussi comprendre domine sa colère.'
  - type: text
    content: L'homme stupide fait étalage de tous ses sentiments ;
  - type: text
    content: le sage se retient de montrer les siens.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ses auxiliaires  : autre traduction ceux qui sont à son service  ; sur le terme correspondant, voir Gn 39.4n  ; Ex 24.13n.'
  - type: text
    content: Quand celui qui gouverne prête attention aux paroles mensongères,
  - type: text
    content: tous ses auxiliaires sont des méchants.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.2+.
  - type: text
    content: 'Le pauvre et l''oppresseur se retrouvent :'
  - type: text
    content: 'c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui fait briller les yeux de l''un comme de l''autre.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'avec loyauté  : autre traduction selon la vérité . –  trône… affermi  : cf. 16.12n  ; voir aussi 29.4.'
  - type: text
    content: Le roi qui juge les pauvres avec loyauté,
  - type: text
    content: son trône sera affermi pour toujours.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Le bâton 10.13n  ; 13.24. –  avertissements 1.23n. –  honte à sa mère  : cf. 10.1 ; 17.21,25.'
  - type: text
    content: Le bâton et les avertissements donnent la sagesse ;
  - type: text
    content: le garçon livré à lui-même fait honte à sa mère.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'se multiplient ou deviennent puissants  ; on aurait alors un jeu sur deux sens du même verbe hébreu ; cf. v. 2n. –  les offenses  : autres traductions les transgressions ; les révoltes (cf. v. 6).'
  - type: text
    content: Quand les méchants se multiplient, les offenses se multiplient ;
  - type: text
    content: les justes verront leur chute.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Instruis ou corrige 9.7n  ; 19.18.
  - type: text
    content: Instruis ton fils, et il te donnera du repos,
  - type: text
    content: il te procurera des délices.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'vision  : il s''agit de vision prophétique, apportant une révélation (même mot hébreu en 1S 3.1 ; Es 1.1n  ; Jr 14.14 ; Ez 7.13 ; Os 12.10 ; Ab 1 ; Mi 3.6 ; Na 1.1 ; Ha 2.2 ; Ps 89.20+ ; Lm 2.9 ; Dn 1.17). –  qui garde l''enseignement  : autre traduction qui observe la loi  ; cf. 1.8n  ; 28.4+.'
  - type: text
    content: Quand il n'y a pas de vision, le peuple est incontrôlable ;
  - type: text
    content: heureux celui qui garde l'enseignement !
  '19':
  - type: text
    content: ' '
  - type: note
    content: instruit ou corrige 1.2n  ; 9.7n.
  - type: text
    content: Ce n'est pas par des paroles qu'on instruit un esclave ;
  - type: text
    content: même quand il comprend, il ne répond pas.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Quand les justes… 11.10n. –  se multiplient  : autre traduction deviennent puissants  ; cf. v. 16n. –  gouverne  : autre traduction domine  ; cf. v. 12,26.'
  - type: text
    content: Quand les justes se multiplient, le peuple se réjouit ;
  - type: text
    content: quand le méchant gouverne, le peuple gémit.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'As-tu vu 26.12n. –  irréfléchi dans ses paroles  : litt. qui se hâte (ou qui se précipite , cf. 19.2 ; 21.5 ; 28.20) dans ses paroles . –  homme stupide 1.22+. Cf. 26.12.'
  - type: text
    content: As-tu vu un homme irréfléchi dans ses paroles ?
  - type: text
    content: Il y a plus d'espoir pour un homme stupide que pour lui.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'sera méprisant  : le terme hébreu correspondant n''apparaît qu''ici et son sens est incertain. LXX sera affligé . On a traduit aussi  : se prendra pour un fils ; se comportera comme un petit maître ; se montrera ingrat , etc.'
  - type: text
    content: Le serviteur qu'on a gâté dès l'enfance
  - type: text
    content: sera méprisant par la suite.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 15.18 ; Siracide 1.22 : « Une irritation injuste ne pourra se justifier, car le mouvement de celui qui s''irrite l''entraîne à sa perte. »'
  - type: text
    content: Un homme coléreux provoque les disputes ;
  - type: text
    content: un homme furieux fait beaucoup d'offenses.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'L''orgueil…  : cf. 11.2 ; 15.33 ; 18.12 ; Es 66.2 ; Jb 22.29 ; Mt 23.12 ; Lc 14.11 ; 18.14 ; Jc 4.6,10 ; 1P 5.5. –  l''humilie  : autre traduction l''abaisse . –  se saisit de la gloire 5.5n  ; 11.16.'
  - type: text
    content: L'orgueil d'un homme l'humilie ;
  - type: text
    content: l'esprit humble se saisit de la gloire.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'se fait le complice  : litt. partage avec . –  se déteste lui-même  : autre traduction déteste sa vie  ; cf. Gn 1.20n. –  il entend l''adjuration  : autre traduction la malédiction , celle qui était prononcée contre le voleur inconnu (voir Jg 17.2) ou contre les témoins qui ne dénonceraient pas le coupable (voir Lv 5.1n).'
  - type: text
    content: Celui qui se fait le complice d'un voleur se déteste lui-même,
  - type: text
    content: il entend l'adjuration, mais il ne dit rien.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Trembler  : ou la panique , selon une autre traduction habituelle du même terme. –  met sa confiance…  : cf. 16.20.'
  - type: text
    content: Trembler devant les humains tend un piège ;
  - type: text
    content: 'celui qui met sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est hors d''atteinte.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'recherchent la faveur de  : litt. recherchent la face de  ; cf. 19.6 (autre expression hébraïque) ; Ps 27.8+. –  l''équité pour chacun  : autre traduction le droit d''un homme  ; cf. 1.3n.'
  - type: text
    content: Beaucoup de gens recherchent la faveur de celui qui gouverne ;
  - type: text
    content: 'c''est du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que vient l''équité pour chacun.'
  '27':
  - type: text
    content: L'homme injuste est une abomination pour les justes ;
  - type: text
    content: celui dont la voie est droite est une abomination pour le méchant.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'réjouit son père  : cf. 10.1+ ; 15.20. –  fréquente 13.20+ ; 28.7. –  les prostituées  : cf. 6.26 ; Lc 15.13,30 ; Siracide 9.6 : « Ne te livre pas aux prostituées, de peur de perdre ton patrimoine. »'
  - type: text
    content: L'homme qui aime la sagesse réjouit son père ;
  - type: text
    content: celui qui fréquente les prostituées perd ses biens.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'par l''équité  : autre traduction par le droit  ; cf. 1.3n  ; 14.34 ; Es 11.4s ; Siracide 10.1,4 : « Le juge sage instruit son peuple, l''autorité de l''homme intelligent est bien établie. Dans la main du Seigneur est le gouvernement de la terre, il y suscitera l''homme approprié en temps voulu. » –  un souverain avide de prélèvements  : litt. l''homme de prélèvements , sans doute au sens de  : celui qui multiplie les impôts . –  le rase ou le démolit.'
  - type: text
    content: Un roi affermit son pays par l'équité ;
  - type: text
    content: un souverain avide de prélèvements le rase.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'enjôle  : autre traduction flatte  ; cf. 2.16n  ; voir aussi 11.9.'
  - type: text
    content: L'homme qui enjôle son prochain
  - type: text
    content: tend un filet sous ses pas.
  '6':
  - type: text
    content: Il y a un piège dans la révolte de l'homme mauvais ;
  - type: text
    content: le juste crie sa joie.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'connaît  : autre traduction se soucie de  ; cf. Jb 29.16. –  cette connaissance  : autres traductions la connaissance ; ce souci.'
  - type: text
    content: Le juste connaît la cause des pauvres ;
  - type: text
    content: le méchant ne comprend pas cette connaissance.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les insolents 1.22n. –  soufflent le feu  : litt. soufflent  ; sur les divers sens du verbe correspondant, voir 6.19n  ; 12.17n  ; Ez 21.36 ; Ps 10.5 ; 12.6. –  détournent ou calment  ; cf. v. 11 ; 15.1.'
  - type: text
    content: Les insolents soufflent le feu sur la ville ;
  - type: text
    content: les sages détournent la colère.
  '9':
  - type: text
    content: ' '
  - type: note
    content: un imbécile 1.7n.
  - type: text
    content: Si l'homme sage entre en jugement avec un imbécile,
  - type: text
    content: qu'il s'agite ou qu'il rie, il n'aura plus de repos.
