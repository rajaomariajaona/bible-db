document_id: EXO.40,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions pour la consécration de la Demeure
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'très sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu conféreras l''onction à l''autel des holocaustes et à tous ses ustensiles ; tu consacreras l''autel, et l''autel sera très sacré. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Absent de LXX.
      marker-yv: yv-n
    - type: text
      text: 'Tu conféreras l''onction à la cuve et à sa base ; tu la consacreras. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 29.1+.
      marker-yv: yv-n
    - type: text
      text: 'Tu présenteras Aaron et ses fils à l''entrée de la tente de la Rencontre, et tu les laveras avec de l''eau. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu revêtiras Aaron des vêtements sacrés, tu lui conféreras l''onction, tu le consacreras, et il exercera pour moi le sacerdoce. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu présenteras ses fils, tu les revêtiras de la tunique '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans toutes leurs '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.14+.
      marker-yv: yv-n
    - type: text
      text: 'et tu leur conféreras l''onction comme tu as conféré l''onction à leur père ; ils exerceront pour moi le sacerdoce. Cette onction d''huile leur assurera le sacerdoce pour toujours, dans toutes leurs générations. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse fit exactement ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui avait ordonné. Ainsi fit-il.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse installe la Demeure
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deuxième année '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à compter de la sortie d'Egypte.
      marker-yv: yv-n
    - type: text
      text: 'Le premier jour du premier mois de la deuxième année, la Demeure fut montée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'monta '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dressa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent le même verbe hébreu, qui sera également rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'installer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 33.
      marker-yv: yv-n
    - type: text
      text: 'Moïse monta la Demeure ; il en mit les socles, plaça les planches, mit les traverses et dressa les colonnes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il étendit la tente sur la Demeure et plaça la couverture de la tente par-dessus, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier jour du premier mois, tu monteras la Demeure, la tente de la Rencontre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.20 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiatoire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il prit le Témoignage et le mit dans le Coffre ; il plaça les barres sur le Coffre et mit l''expiatoire au-dessus du Coffre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il amena le Coffre dans la Demeure ; il plaça le voile qui sert de rideau, et il en couvrit le coffre du Témoignage, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mit la table dans la tente de la Rencontre, sur le côté de la Demeure, au nord, à l''extérieur du voile, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il y disposa le pain, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il plaça le porte-lampes dans la tente de la Rencontre, en face de la table, sur le côté de la Demeure, au sud ; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il arrangea ses lampes devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il plaça l''autel d''or dans la tente de la Rencontre, devant le voile, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il y fit fumer l''encens aromatique, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il plaça le rideau à l''entrée de la Demeure. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il plaça l''autel des holocaustes à l''entrée de la Demeure, de la tente de la Rencontre, et il y offrit l''holocauste et l''offrande végétale, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu y placeras le coffre du Témoignage et tu couvriras le Coffre avec le voile. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les v. 30-32 sont absents de LXX.
      marker-yv: yv-n
    - type: text
      text: 'Il plaça la cuve entre la tente de la Rencontre et l''autel et il y mit de l''eau pour les ablutions ; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse, Aaron et ses fils s''y lavèrent les mains et les pieds ; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lorsqu''ils entraient dans la tente et qu''ils se présentaient devant l''autel, ils se lavaient, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il installa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il installa la cour autour de la Demeure et de l'autel et mit le rideau à la porte de la cour. C'est ainsi que Moïse acheva les travaux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' remplit la Demeure'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nuée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gloire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.7+. – Sur cette manifestation, cf. 24.15s ; 1R 8.10-13 ; Es 6.3s ; Ez 43.1-5 ; 2Ch 5.11–6.2 ; Ap 15.8.
      marker-yv: yv-n
    - type: text
      text: 'Alors la nuée couvrit la tente de la Rencontre, et la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' remplit la Demeure. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse ne pouvait pas entrer dans la tente de la Rencontre, parce que la nuée demeurait sur elle et que la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' remplissait la Demeure. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Nb 9.15-23.
      marker-yv: yv-n
    - type: text
      text: 'Quand la nuée s''élevait au-dessus de la Demeure, les Israélites partaient, pour chacune de leurs étapes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la nuée ne s''élevait pas, ils ne partaient pas, jusqu''au jour où elle s''élevait. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour, la nuée du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était sur la Demeure, et la nuit il y avait un feu, sous les yeux de toute la maison d''Israël, à chacune de leurs étapes.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu la disposeras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu y disposeras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exposeras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les pains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 23 ; 25.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 9.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: arrangeras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 25.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.8.'
      marker-yv: yv-n
    - type: text
      text: 'Tu apporteras la table et tu la disposeras. Tu apporteras le porte-lampes et tu arrangeras ses lampes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu mettras l''autel d''or pour l''encens devant le coffre du Témoignage, et tu placeras le rideau à l''entrée de la Demeure. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu mettras l''autel des holocaustes devant l''entrée de la Demeure, de la tente de la Rencontre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu mettras la cuve entre la tente de la Rencontre et l''autel, et tu y mettras de l''eau. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu aménageras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : verbe hébreu aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: placer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3,5 etc.'
      marker-yv: yv-n
    - type: text
      text: 'Tu aménageras la cour, tout autour, et tu mettras le rideau à la porte de la cour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.25+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras l''huile d''onction, et tu conféreras l''onction à la Demeure et à tout ce qui s''y trouve ; tu la consacreras, avec tous ses ustensiles, et elle sera sacrée. '
