document_id: EXO.40,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions pour la consécration de la Demeure
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: très sacré 29.37n  ; voir saint.
  - type: text
    content: 'Tu conféreras l''onction à l''autel des holocaustes et à tous ses ustensiles ; tu consacreras l''autel, et l''autel sera très sacré. '
  '11':
  - type: note
    content: Absent de LXX.
  - type: text
    content: 'Tu conféreras l''onction à la cuve et à sa base ; tu la consacreras. '
  '12':
  - type: note
    content: Cf. 29.1+.
  - type: text
    content: 'Tu présenteras Aaron et ses fils à l''entrée de la tente de la Rencontre, et tu les laveras avec de l''eau. '
  '13':
  - type: text
    content: 'Tu revêtiras Aaron des vêtements sacrés, tu lui conféreras l''onction, tu le consacreras, et il exercera pour moi le sacerdoce. '
  '14':
  - type: text
    content: 'Tu présenteras ses fils, tu les revêtiras de la tunique '
  '15':
  - type: note
    content: dans toutes leurs générations 12.14+.
  - type: text
    content: 'et tu leur conféreras l''onction comme tu as conféré l''onction à leur père ; ils exerceront pour moi le sacerdoce. Cette onction d''huile leur assurera le sacerdoce pour toujours, dans toutes leurs générations. '
  '16':
  - type: text
    content: 'Moïse fit exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné. Ainsi fit-il.'
  - type: heading
    content: Moïse installe la Demeure
  '17':
  - type: text
    content: ' '
  - type: note
    content: deuxième année à compter de la sortie d'Egypte.
  - type: text
    content: 'Le premier jour du premier mois de la deuxième année, la Demeure fut montée. '
  '18':
  - type: note
    content: monta et dressa traduisent le même verbe hébreu, qui sera également rendu par installer au v. 33.
  - type: text
    content: 'Moïse monta la Demeure ; il en mit les socles, plaça les planches, mit les traverses et dressa les colonnes. '
  '19':
  - type: text
    content: 'Il étendit la tente sur la Demeure et plaça la couverture de la tente par-dessus, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '2':
  - type: text
    content: 'Le premier jour du premier mois, tu monteras la Demeure, la tente de la Rencontre. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: expiatoire 25.17n.
  - type: text
    content: 'Il prit le Témoignage et le mit dans le Coffre ; il plaça les barres sur le Coffre et mit l''expiatoire au-dessus du Coffre. '
  '21':
  - type: text
    content: 'Il amena le Coffre dans la Demeure ; il plaça le voile qui sert de rideau, et il en couvrit le coffre du Témoignage, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '22':
  - type: text
    content: 'Il mit la table dans la tente de la Rencontre, sur le côté de la Demeure, au nord, à l''extérieur du voile, '
  '23':
  - type: text
    content: 'et il y disposa le pain, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '24':
  - type: text
    content: 'Il plaça le porte-lampes dans la tente de la Rencontre, en face de la table, sur le côté de la Demeure, au sud ; '
  '25':
  - type: text
    content: 'il arrangea ses lampes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '26':
  - type: text
    content: 'Il plaça l''autel d''or dans la tente de la Rencontre, devant le voile, '
  '27':
  - type: text
    content: 'et il y fit fumer l''encens aromatique, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Absent de LXX.
  - type: text
    content: 'Il plaça le rideau à l''entrée de la Demeure. '
  '29':
  - type: text
    content: 'Il plaça l''autel des holocaustes à l''entrée de la Demeure, de la tente de la Rencontre, et il y offrit l''holocauste et l''offrande végétale, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '3':
  - type: text
    content: 'Tu y placeras le coffre du Témoignage et tu couvriras le Coffre avec le voile. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Les v. 30-32 sont absents de LXX.
  - type: text
    content: 'Il plaça la cuve entre la tente de la Rencontre et l''autel et il y mit de l''eau pour les ablutions ; '
  '31':
  - type: text
    content: 'Moïse, Aaron et ses fils s''y lavèrent les mains et les pieds ; '
  '32':
  - type: text
    content: 'lorsqu''ils entraient dans la tente et qu''ils se présentaient devant l''autel, ils se lavaient, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Il installa v. 18n.
  - type: text
    content: Il installa la cour autour de la Demeure et de l'autel et mit le rideau à la porte de la cour. C'est ainsi que Moïse acheva les travaux.
  - type: heading
    content: La gloire du Seigneur remplit la Demeure
  '34':
  - type: text
    content: ' '
  - type: note
    content: nuée 13.21+. –  gloire 16.7+. – Sur cette manifestation, cf. 24.15s ; 1R 8.10-13 ; Es 6.3s ; Ez 43.1-5 ; 2Ch 5.11–6.2 ; Ap 15.8.
  - type: text
    content: 'Alors la nuée couvrit la tente de la Rencontre, et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplit la Demeure. '
  '35':
  - type: text
    content: 'Moïse ne pouvait pas entrer dans la tente de la Rencontre, parce que la nuée demeurait sur elle et que la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplissait la Demeure. '
  '36':
  - type: note
    content: Cf. Nb 9.15-23.
  - type: text
    content: 'Quand la nuée s''élevait au-dessus de la Demeure, les Israélites partaient, pour chacune de leurs étapes. '
  '37':
  - type: text
    content: 'Si la nuée ne s''élevait pas, ils ne partaient pas, jusqu''au jour où elle s''élevait. '
  '38':
  - type: text
    content: 'Le jour, la nuée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était sur la Demeure, et la nuit il y avait un feu, sous les yeux de toute la maison d''Israël, à chacune de leurs étapes.'
  '4':
  - type: note
    content: 'tu la disposeras  : autre traduction tu y disposeras (ou exposeras) les pains, cf. v. 23 ; 25.30n  ; 1Ch 9.32. –  arrangeras  : voir 25.37n  ; 30.8.'
  - type: text
    content: 'Tu apporteras la table et tu la disposeras. Tu apporteras le porte-lampes et tu arrangeras ses lampes. '
  '5':
  - type: text
    content: 'Tu mettras l''autel d''or pour l''encens devant le coffre du Témoignage, et tu placeras le rideau à l''entrée de la Demeure. '
  '6':
  - type: text
    content: 'Tu mettras l''autel des holocaustes devant l''entrée de la Demeure, de la tente de la Rencontre. '
  '7':
  - type: note
    content: Absent de LXX.
  - type: text
    content: 'Tu mettras la cuve entre la tente de la Rencontre et l''autel, et tu y mettras de l''eau. '
  '8':
  - type: note
    content: 'Tu aménageras  : verbe hébreu aussi traduit par placer, cf. v. 3,5 etc.'
  - type: text
    content: 'Tu aménageras la cour, tout autour, et tu mettras le rideau à la porte de la cour. '
  '9':
  - type: note
    content: 30.25+. – Voir onction.
  - type: text
    content: 'Tu prendras l''huile d''onction, et tu conféreras l''onction à la Demeure et à tout ce qui s''y trouve ; tu la consacreras, avec tous ses ustensiles, et elle sera sacrée. '
