document_id: JER.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'si tu reviens, si tu reviens à moi  : autre traduction si tu reviens, c''est à moi que tu devras revenir (3.12n  ; Jl 2.12). –  horreurs  : il s''agit de toute évidence des faux dieux ; cf. 3.24n  ; 7.30 ; 13.27 ; 16.18 ; 32.34 ; Dt 29.16 ; 2R 23.13,24 ; Ez 5.11 ; Os 9.10. –  de ma présence  : litt. de ma face  ; certains modifient le texte pour lire de ta bouche  ; cf. Ex 20.3n. –  si tu n''es plus vagabond  : autre traduction tu ne seras plus vagabond.'
  - type: text
    content: Israël, si tu reviens, si tu reviens à moi,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: si tu ôtes tes horreurs de ma présence,
  - type: text
    content: si tu n'es plus vagabond,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Tout ira bien pour vous  : autre traduction il y aura la paix pour vous  ; cf. 6.14+ ; 12.12 ; 14.13 ; 16.5 ; 23.17 ; 28.6 ; 29.7 ; 30.5 ; 33.6,9n  ; 38.4n. –  l''épée est déjà sous la gorge  : autre traduction l''épée nous arrache la vie.'
  - type: text
    content: 'Je dis : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ','
  - type: text
    content: tu as donc trompé ce peuple et Jérusalem,
  - type: text
    content: 'en disant : « Tout ira bien pour vous ! »'
  - type: text
    content: alors que l'épée est déjà sous la gorge.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Un vent brûlant  : cf. 51.1 ; Es 21.1 ; Os 13.15. –  pistes (3.2n) du désert 12.12. –  de la belle, de mon peuple  : litt. de la fille de mon peuple  : l''expression désigne le peuple lui-même, personnifié comme une jeune fille ; cf. v. 31n  ; de même 6.26 ; 8.11,19,21-23 ; 9.6 ; 14.17 ; Es 22.4n. –  vanner 15.7n  ; une autre forme du même verbe est traduite par disséminer en 31.10 ; 49.32+.'
  - type: text
    content: 'En ce temps-là, on dira à ce peuple et à Jérusalem :'
  - type: text
    content: Un vent brûlant souffle sur les pistes du désert,
  - type: text
    content: sur le chemin de la belle, de mon peuple ;
  - type: text
    content: ce n'est pas pour vanner ni pour nettoyer.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'impétueux  : litt. plein . –  de là-bas  : litt. de ceux-là ou de celles-là , désignant peut-être les pistes du désert  ; certains modifient la vocalisation traditionnelle du texte hébreu pour lire c''est un vent chargé de malédiction qui vient jusqu''à moi . –  sur mon ordre  : autre traduction jusqu''à moi . –  jugements 1.16 ; 12.1 ; 39.5 ; 52.9 ; Ez 5.8 ; Ps 105.5.'
  - type: text
    content: C'est un vent impétueux
  - type: text
    content: qui vient de là-bas sur mon ordre.
  - type: text
    content: Maintenant, c'est moi qui vais prononcer des jugements contre eux.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'comme les nuages Ez 38.9 ; Na 1.3. –  Ses chars  : cf. Ex 15.4,19 ; Es 5.28 ; 66.15 ; Na 2.5. –  ses chevaux Ha 1.8. –  plus rapides que des aigles Lm 4.19 ; cf. Es 30.16.'
  - type: text
    content: Il monte comme les nuages !
  - type: text
    content: Ses chars sont comme un ouragan,
  - type: text
    content: ses chevaux sont plus rapides que des aigles.
  - type: text
    content: Quel malheur pour nous ! Nous voilà ravagés !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Lave ton cœur  : cf. 2.22 ; 13.27+ ; Es 1.16 ; Ez 18.31 ; Jc 4.8. –  des pensées malfaisantes  : cf. v. 15 ; Es 59.7.'
  - type: text
    content: Lave ton cœur de ce qui est mauvais, Jérusalem,
  - type: text
    content: afin que tu sois sauvée !
  - type: text
    content: Jusqu'à quand feras-tu reposer en ton sein
  - type: text
    content: des pensées malfaisantes ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: Dan , à la frontière nord d'Israël (cf. 1.14n) ; voir 8.16 ; Gn 14.14 ; Jos 19.47 ; Jg 18 ; 20.1. –  une rumeur funeste ou de malheur  ; cf. Nb 23.21n  ; Es 1.13n. –  la région montagneuse d'Ephraïm , au centre du pays, toujours au nord mais plus près de Juda.
  - type: text
    content: Car depuis Dan un bruit l'annonce,
  - type: text
    content: une rumeur funeste depuis la région montagneuse d'Ephraïm.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'des assiégeants  : le mot signifie habituellement gardes (31.6), gardiens ou guetteurs  ; autre traduction possible des éclaireurs  ; certains, d''après LXX, modifient le texte hébreu traditionnel pour lire des ennemis  ; d''autres rattachent le terme à une autre racine pour lui donner le sens de braillards . Il s''agit en tout cas de l''armée d''invasion triomphante. –  d''un pays lointain ou d''une terre lointaine  ; cf. 5.15.'
  - type: text
    content: Rappelez ceci aux nations,
  - type: text
    content: 'faites-le connaître à Jérusalem :'
  - type: text
    content: des assiégeants viennent d'un pays lointain ;
  - type: text
    content: ils font retentir leur voix contre les villes de Juda.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ils entourent Jérusalem  : litt. ils sont sur elle de partout.'
  - type: text
    content: Comme ceux qui gardent un champ,
  - type: text
    content: ils entourent Jérusalem,
  - type: text
    content: car elle s'est rebellée contre moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.17,19 ; Ps 107.17. –  ta voie ou, selon certains mss hébreux et des versions anciennes, tes voies  ; cf. 2.33 ; 3.13,21. –  ton mal  : ou bien les conséquences du mal que tu as fait , ou bien ton malheur . –  oui, c''est amer…  : certains modifient le texte hébreu traditionnel pour lire ta rébellion atteint jusqu''au fond de ton cœur.'
  - type: text
    content: 'Voilà ce que t''ont valu ta voie et tes agissements :'
  - type: text
    content: c'est là ton mal ;
  - type: text
    content: oui, c'est amer,
  - type: text
    content: cela pénètre jusqu'à ton cœur.
  - type: heading
    content: Jérémie malade du désastre qu'il prévoit
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Mes entrailles Ha 3.16 ; Lm 1.20. –  Je souffre  : cf. 13.17 ; 14.17 ; 2R 8.11. –  fibres  : litt. parois . –  j''entends  : le texte hébreu traditionnel pourrait être traduit j''entends, mon âme (ou mon être, ma vie  ; cf. Gn 1.20n). LXX lit mon âme entend (autre façon de dire j''entends ), ce qui correspond aussi à une autre lecture traditionnelle de l''hébreu. –  trompe v. 5+. –  les acclamations de la guerre 49.2+.'
  - type: text
    content: Mes entrailles ! Mes entrailles !
  - type: text
    content: Je souffre de toutes les fibres de mon cœur !
  - type: text
    content: Mon cœur frémit, je ne peux pas garder le silence ;
  - type: text
    content: car j'entends le son de la trompe,
  - type: text
    content: les acclamations de la guerre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Par la vie du Seigneur  ! ou par YHWH qui est vivant ! formule de serment ; cf. 5.2 ; 12.16 ; 16.14s ; 23.7s ; 38.16 ; 44.26 ; 46.18 ; Dt 6.13 ; Jg 8.19 ; Mt 5.33ss. –  loyauté  : terme apparenté à probité en 5.1+ ; cf. 10.10. –  équité 9.23+. – Voir justice. –  se béniront par lui ou se béniront en lui , comme en Gn 22.18 (voir 12.3n) ; cf. Es 65.16. –  tireront de lui leur fierté  : litt. se loueront de lui , de même 9.22s ; 49.4 ; cf. Mt 5.16.'
  - type: text
    content: 'si tu jures : « Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ! »'
  - type: text
    content: dans la loyauté, l'équité et la justice,
  - type: text
    content: alors les nations se béniront par lui
  - type: text
    content: et tireront de lui leur fierté.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'désastre v. 6n  ; cf. Ez 7.26. –  mes tentes 10.20 ; 49.29. –  tout à coup  : le même terme est traduit par à l''improviste en 6.26 ; 18.22 ; cf. 15.8 ; 51.8.'
  - type: text
    content: 'On annonce désastre sur désastre :'
  - type: text
    content: tout le pays est ravagé ;
  - type: text
    content: mes tentes sont ravagées tout à coup,
  - type: text
    content: mes abris de toile en un instant.
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 5s.
  - type: text
    content: Jusqu'à quand verrai-je la bannière,
  - type: text
    content: et entendrai-je le son de la trompe ?
  - type: heading
    content: Ce que Dieu pense de son peuple
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'stupides 5.21 ; 8.7 ; Dt 32.28 ; Es 1.3 ; 27.11 ; Os 4.6 ; Ps 82.5 ; Lc 24.25. –  sages (autre traduction experts ) / mal / bon  : cf. 9.11 ; Os 14.10 ; Am 3.10 ; 5.14s ; Ps 34.13-15 ; 107.43 ; 1Co 14.20.'
  - type: text
    content: Vraiment, mon peuple est un peuple imbécile,
  - type: text
    content: il ne me connaît pas ;
  - type: text
    content: ce sont des fils stupides,
  - type: text
    content: dépourvus d'intelligence ;
  - type: text
    content: ils sont sages pour faire du mal,
  - type: text
    content: mais ils ne savent rien faire de bon.
  - type: heading
    content: Retour au chaos et au vide
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'V. 28 ; 13.16. –  la terre ou le pays  ; cf. v. 16 ; 3.1n. –  chaos / vide  : comme en Gn 1.2n  ; cf. Es 50.3 ; Mt 27.45ss/ /.'
  - type: text
    content: 'Je regarde la terre :'
  - type: text
    content: c'est un chaos, elle est vide ;
  - type: text
    content: quant au ciel,
  - type: text
    content: sa lumière n'est plus.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Jg 5.5 ; Es 5.25 ; 54.10 ; Na 1.5 ; Ha 3.6 ; Ps 46.3s.
  - type: text
    content: 'Je regarde les montagnes :'
  - type: text
    content: elles tremblent ;
  - type: text
    content: toutes les collines chancellent.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 9.9 ; 12.4 ; 50.3 ; Os 4.3 ; So 1.3.
  - type: text
    content: 'Je regarde :'
  - type: text
    content: l'homme n'est plus ;
  - type: text
    content: et tous les oiseaux du ciel ont pris la fuite.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Carmel 2.7n  ; cf. Lv 26.33s ; Ps 107.34. –  devant et à cause de traduisent une même locution en hébreu. –  colère ardente v. 8+.
  - type: text
    content: 'Je regarde :'
  - type: text
    content: le Carmel est un désert ;
  - type: text
    content: 'et toutes ses villes sont démolies devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: à cause de sa colère ardente.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'je n''exterminerai pas  : cf. 5.10,18 ; 30.11 ; Lv 26.44 ; Es 27.7 ; Ez 20.17 ; Am 9.8s ; Ps 118.18 ; 1Co 10.13.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Tout le pays sera dévasté
  - type: text
    content: – mais je n'exterminerai pas.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'la terre ou le pays . –  en deuil 12.4 ; 14.2 ; 23.10 ; Es 24.4 ; 50.3 ; Os 4.3 ; Jl 1.10. –  je ne le regrette pas  : cf. 18.8+ ; Gn 6.6s ; 8.21 ; Nb 23.19 ; Am 1.3,6.'
  - type: text
    content: A cause de cela, la terre est en deuil,
  - type: text
    content: et le ciel, en haut, s'assombrit ;
  - type: text
    content: car je l'ai dit, je l'ai décidé,
  - type: text
    content: je ne le regrette pas,
  - type: text
    content: je ne reviens pas là-dessus.
  - type: heading
    content: Jérusalem face aux meurtriers
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'chars  : litt. attelage(s) ou équipage(s) de char(s) . Autre traduction cavaliers . –  toute la ville  : LXX a lu la première fois tout le pays , la deuxième fois toute ville . –  sur les rochers  : cf. Ap 6.15. –  plus personne n''y habite v. 7.'
  - type: text
    content: Au bruit des chars et des archers,
  - type: text
    content: toute la ville est en fuite ;
  - type: text
    content: on entre dans les taillis,
  - type: text
    content: on monte sur les rochers ;
  - type: text
    content: toute la ville est abandonnée,
  - type: text
    content: plus personne n'y habite.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. 2.2,5 ; 4.27). –  à Jérusalem  : certains mss hébreux et des versions anciennes ont lu aux habitants de Jérusalem , comme au v. 4 ; 11.2. –  Défrichez…  : cf. Os 10.12 ; Mt 13.22/ /.'
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aux hommes de Juda et à Jérusalem :'
  - type: text
    content: Défrichez-vous un champ nouveau,
  - type: text
    content: ne semez pas parmi les épines.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'ravagée  : LXX omet le terme correspondant (cf. v. 13,20). –  élargiras-tu  : litt. déchireras-tu . –  fard  : cf. 2R 9.30 ; Jb 42.14. –  tes amants  : litt. ceux qui se sont pris de passion , comme en Ez 23.5 ; voir aussi Jr 22.20,22 ; Os 2.7,9. –  te rejettent  : autre traduction te méprisent  : cf. 30.14 ; Ez 16.37 ; 23.22 ; Lm 1.2,19.'
  - type: text
    content: Et toi, ravagée, que vas-tu faire ?
  - type: text
    content: Te revêtiras-tu d'écarlate,
  - type: text
    content: te pareras-tu d'ornements d'or,
  - type: text
    content: élargiras-tu tes yeux avec du fard ?
  - type: text
    content: C'est inutilement que tu t'embellirais ;
  - type: text
    content: tes amants te rejettent,
  - type: text
    content: ils en veulent à ta vie.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'femme en travail 6.24 ; 13.21 ; 22.23 ; 30.6 ; 48.41 ; 49.22 ; 50.43 ; Es 26.17 ; 42.14 ; Mi 4.9s. –  Sion la belle  : litt. la fille de Sion (cf. v. 11n), c.-à-d. Jérusalem personnifiée ; de même 6.2,23 ; cf. 46.11n,19n,24n  ; 48.18n  ; 50.42n  ; 51.33n  ; voir Es 1.8n. –  tend les mains  : geste de prière ou de supplication. –  Je succombe  : autres traductions je m''épuise, je suis à bout de souffle.'
  - type: text
    content: Car j'entends des cris comme ceux d'une femme en travail,
  - type: text
    content: des cris de détresse comme ceux d'une femme qui accouche pour la première fois.
  - type: text
    content: 'C''est la voix de Sion la belle :'
  - type: text
    content: elle soupire,
  - type: text
    content: 'elle tend les mains :'
  - type: text
    content: Quel malheur pour moi !
  - type: text
    content: Je succombe sous les coups des tueurs.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.10. – Voir circoncision. –  ôtez le prépuce de votre cœur  : litt. ôtez les prépuces (ou le prépuce , selon les mss) de vos cœurs , c.-à-d. conformez vos décisions (ou conformez-vous intérieurement ) à la volonté de Dieu  ; cf. 6.10 ; 9.24s ; Lv 26.41 ; Dt 10.16 ; 30.6 ; Rm 2.29 ; Ph 3.2. –  de peur que… 7.20+ ; 21.12 ; Am 5.6 ; Na 1.2,6. –  vos agissements mauvais  : litt. le mal (ou la méchanceté ) de vos agissements  ; même terme au v. 18 ; 7.3,5 ; 11.18 ; 17.10 ; 18.11 ; 21.12,14 ; 23.2,22 ; 25.5 ; 26.3,13 ; 32.19 ; 35.15 ; 44.22 ; Dt 28.20 ; Jg 2.19 ; 1S 25.3 ; Ez 36.31 ; Os 4.9+ ; Mi 2.7+ ; Za 1.4,6 ; Ps 28.4+ ; 77.12n  ; Pr 20.11n  ; Né 9.35.'
  - type: text
    content: 'Faites-vous circoncire pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ôtez le prépuce de votre cœur,
  - type: text
    content: hommes de Juda et habitants de Jérusalem,
  - type: text
    content: de peur que ma fureur n'éclate comme un feu
  - type: text
    content: et ne dévore,
  - type: text
    content: sans qu'il y ait personne pour éteindre,
  - type: text
    content: à cause de vos agissements mauvais.
  - type: heading
    content: Cri d'alarme en Juda
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'trompe v. 19,21 ; 6.1,17 ; 42.14 ; 51.27 ; Es 27.13n  ; Jl 2.1. –  Criez à pleine voix  : litt. criez ! remplissez !  ; certains ont compris criez : Rassemblement ! (cf. 12.6n). –  villes fortes 8.14 ; cf. Za 9.12.'
  - type: text
    content: Faites cette annonce en Juda,
  - type: text
    content: faites-la entendre à Jérusalem,
  - type: text
    content: dites-le ! Sonnez de la trompe dans le pays !
  - type: text
    content: 'Criez à pleine voix et dites :'
  - type: text
    content: Rassemblez-vous, et allons dans les villes fortes !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vers Sion  : cf. 6.1ss. –  du nord 1.14n. –  désastre  : litt. brisement  ; le terme peut être aussi traduit par fracas  ; cf. v. 20 ; 6.1 ; 8.21 ; 10.19 ; 14.17 ; 30.12 ; 48.3 ; 50.22 ; il est rendu par blessure en 6.14n  ; Es 30.26n.'
  - type: text
    content: Dressez une bannière vers Sion,
  - type: text
    content: fuyez, ne vous arrêtez pas !
  - type: text
    content: Car je fais venir du nord un malheur
  - type: text
    content: et un grand désastre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'lion 2.15+. –  s''élance  : litt. monte . –  de chez lui  : litt. de son lieu  ; cf. 25.38n  ; Es 26.21. –  lieu dévasté 6.8 ; cf. Es 6.11. –  seront des champs de ruines  : le verbe hébreu correspondant est apparenté au mot traduit par ruines en Es 37.26 ; cf. Ps 9.7. –  plus d''habitants v. 29.'
  - type: text
    content: Le lion s'élance de son taillis,
  - type: text
    content: le destructeur des nations est en marche,
  - type: text
    content: il sort de chez lui
  - type: text
    content: pour réduire ton pays en un lieu dévasté ;
  - type: text
    content: tes villes seront des champs de ruines,
  - type: text
    content: elles n'auront plus d'habitants.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'sac 6.26 ; 48.37 ; 49.3 ; Es 15.3 ; 22.12 ; Ez 7.18. –  lamentez-vous  : cf. 6.26 ; 16.4nss ; 22.18 ; 25.33. –  colère ardente v. 26 ; 12.13 ; 25.37 ; cf. Es 5.25 ; Na 1.6.'
  - type: text
    content: A cause de cela, mettez un sac pour pagne,
  - type: text
    content: lamentez-vous, hurlez !
  - type: text
    content: 'Car la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne se détourne pas de nous.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le roi et les princes…  : litt. défaillira le cœur du roi et le cœur des princes 2.26+. –  seront atterrés  : autre traduction seront dévastés  ; au v. 27, le terme hébreu traduit par sera dévasté est apparenté à celui qui est rendu ici par seront atterrés  ; cf. 1R 9.8n.'
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: le roi et les princes perdront courage,
  - type: text
    content: les prêtres seront atterrés,
  - type: text
    content: et les prophètes stupéfaits.
