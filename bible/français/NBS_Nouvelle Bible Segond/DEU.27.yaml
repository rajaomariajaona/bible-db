document_id: DEU.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: BÉNÉDICTIONS ET MALÉDICTIONS
  - type: heading
    content: Les pierres dressées sur le mont Ebal
  - type: text
    content: ' '
  - type: note
    content: 'Observez 4.6n. –  tout le commandement 5.31n. –  que j''institue pour vous  : autre traduction que je vous donne 4.2n. –  aujourd''hui 1.10+.'
  - type: text
    content: 'Moïse et les anciens d''Israël donnèrent cet ordre au peuple : Observez tout le commandement que j''institue pour vous aujourd''hui.'
  '10':
  - type: note
    content: Tu écouteras 4.30+.
  - type: text
    content: 'Tu écouteras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, tu mettras en pratique ses commandements et ses prescriptions, tels que je les institue pour toi aujourd''hui.'
  '11':
  - type: text
    content: 'Ce même jour, Moïse donna cet ordre au peuple : '
  '12':
  - type: note
    content: Cf. v. 4n  ; 11.26-29n  ; Jos 8.33ss. Le rôle précis des tribus chargées respectivement de bénir et de maudire (v. 13) est incertain. Il n'apparaît pas dans la cérémonie décrite aux v. 14ss, qui évoque seulement des malédictions prononcées par les lévites et l'acquiescement de l'ensemble du peuple, sans distinction.
  - type: text
    content: 'Lorsque vous passerez le Jourdain, Siméon, Lévi, Juda, Issacar, Joseph et Benjamin se tiendront sur le mont Garizim pour bénir le peuple, '
  '13':
  - type: text
    content: tandis que Ruben, Gad, Aser, Zabulon, Dan et Nephtali se tiendront au mont Ebal pour la malédiction.
  - type: heading
    content: Les douze malédictions
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'tous les hommes d''Israël  : litt. tout homme d''Israël  ; de même en 29.9 ; cf. Jos 9.6n  ; Jg 7.8+ ; 1S 13.6+ ; 1R 8.2 ; 1Ch 10.1+. –  lévites  : cf. 33.8.'
  - type: text
    content: 'Devant tous les hommes d''Israël, les lévites diront d''une voix forte :'
  '15':
  - type: text
    content: ' '
  - type: note
    content: '5.8 ; Ex 20.4 ; Lv 19.4+ ; cf. Jg 17–18. –  Maudit  : voir bénédiction, malédiction. –  abomination 7.25+. –  Qu''il en soit ainsi ! Cette expression traduit le mot hébreu traditionnellement transcrit Amen . Celui-ci vient d''une racine qui évoque concrètement l''idée de solidité ou de fermeté (Es 7.9n) et dont certaines formes suggèrent la confiance ou la foi (1.32 ; Gn 15.6n) ; en dérivent également les mots traduits ailleurs par vérité, loyauté ou fidélité, constance, probité (32.4 ; Es 65.16n) ; voir aussi Nb 5.22 ; 1R 1.36 ; Jr 11.5 ; 28.6 ; Os 4.1n  ; Né 5.13 ; Mt 5.18n  ; Jn 1.51n  ; 2Co 1.20 ; Ap 3.14.'
  - type: text
    content: 'Maudit soit l''homme qui fait une statue ou une idole de métal fondu – abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', œuvre des mains d''un artisan – et qui la place dans un lieu secret ! – Et tout le peuple répondra : Qu''il en soit ainsi !'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.16 ; Ex 21.17 ; Lv 19.3 ; 20.9. –  méprise 25.3n  ; cf. Pr 3.35+ (terme apparenté).
  - type: text
    content: 'Maudit soit celui qui méprise son père et sa mère ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 19.14n.
  - type: text
    content: 'Maudit soit celui qui déplace la borne de son prochain ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Lv 19.14+.
  - type: text
    content: 'Maudit soit celui qui fait errer un aveugle sur son chemin ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 16.19+ ; cf. 10.18+.
  - type: text
    content: 'Maudit soit celui qui porte atteinte au droit de l''immigré, de l''orphelin et de la veuve ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'V. 4. –  vous / tu 1.8n. –  tu dresseras  : litt. tu dresseras pour toi.'
  - type: text
    content: 'Le jour où vous passerez le Jourdain pour entrer dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, tu dresseras de grandes pierres et tu les enduiras de chaux. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 23.1n.
  - type: text
    content: 'Maudit soit celui qui couche avec la femme de son père, car il soulève le pan du vêtement de son père ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ex 22.18+.
  - type: text
    content: 'Maudit soit celui qui couche avec une bête, quelle qu''elle soit ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '22':
  - type: text
    content: ' '
  - type: note
    content: sœur ou demi-sœur Lv 18.9,11 ; 20.17.
  - type: text
    content: 'Maudit soit celui qui couche avec sa sœur, fille de son père ou fille de sa mère ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'sa belle-mère  : c.-à-d. la mère de sa femme , cf. Lv 18.17 ; 20.14.'
  - type: text
    content: 'Maudit soit celui qui couche avec sa belle-mère ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.17 ; Ex 21.12 ; Lv 24.17. –  qui frappe  : autre traduction qui abat.'
  - type: text
    content: 'Maudit soit celui qui frappe son prochain en secret ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '25':
  - type: text
    content: ' '
  - type: note
    content: pot-de-vin 10.17 ; 16.19 ; cf. Ex 23.8+. –  pour frapper mortellement (19.6n) un innocent (litt. le sang d'un innocent ) ; cf. Mt 27.4.
  - type: text
    content: 'Maudit soit celui qui accepte un pot-de-vin pour frapper mortellement un innocent ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.19+ ; Ga 3.10  ; voir aussi Jn 7.49 ; 2Co 3.9. –  réalise  : autre traduction confirme (cf. 8.18n).'
  - type: text
    content: 'Maudit soit celui qui ne réalise pas les paroles de cette loi en les mettant en pratique ! – Et tout le peuple dira : Qu''il en soit ainsi !'
  '3':
  - type: note
    content: toutes les paroles de cette loi 17.19+. –  lait / miel 11.9+. –  Dieu de tes pères 1.11+.
  - type: text
    content: 'Tu écriras dessus toutes les paroles de cette loi lorsque tu passeras pour entrer dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, un pays ruisselant de lait et de miel, comme te l''a dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de tes pères. '
  '4':
  - type: note
    content: 'Ebal  : Smr a ici Garizim (la montagne de Jn 4.20ns) ; cf. v. 11s ; 11.29n  ; Jos 8.30-32. –  que je vous ordonne… ou que j''institue pour vous aujourd''hui.'
  - type: text
    content: 'Lorsque vous passerez le Jourdain, vous dresserez au mont Ebal ces pierres que je vous ordonne aujourd''hui de dresser, et tu les enduiras de chaux. '
  '5':
  - type: note
    content: Ex 20.25.
  - type: text
    content: 'Là, tu bâtiras un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, un autel de pierres, sur lesquelles tu n''auras pas passé de fer ; '
  '6':
  - type: text
    content: 'tu bâtiras l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en pierres brutes. Sur lui tu offriras des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; '
  '7':
  - type: note
    content: Cf. 12.7+. – Voir sacrifices.
  - type: text
    content: 'tu offriras aussi des sacrifices de paix, là, tu mangeras et tu te réjouiras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
  '8':
  - type: note
    content: 'en les gravant  : le même verbe est traduit par expliquer en 1.5 ; cf. Ha 2.2n.'
  - type: text
    content: Tu écriras sur ces pierres toutes les paroles de cette loi, en les gravant clairement.
  '9':
  - type: text
    content: ' '
  - type: note
    content: prêtres-lévites 17.9n. –  tout Israël 1.1+. –  écoute 4.1+. –  Aujourd'hui… 1.10+ ; cf. 26.16-19.
  - type: text
    content: 'Moïse et les prêtres-lévites dirent à tout Israël : Israël, fais silence et écoute ! Aujourd''hui, tu es devenu le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
