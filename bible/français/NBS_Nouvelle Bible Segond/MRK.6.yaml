      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le charpentier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec, ici appliqué à Jésus lui-même (cf. Mt 13.55), a un sens plus large que son équivalent traditionnel en français ; il peut s''appliquer à plusieurs sortes d''artisans, constructeurs (maçons) ou entrepreneurs. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils de Marie… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.31-35 ; cf. Jn 6.42. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacques '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 12.17 ; Ga 1.19 ; Jc 1.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: José
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.40,47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Judas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
