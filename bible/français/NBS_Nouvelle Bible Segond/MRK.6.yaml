      - type: text
        text: secouez la poussière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : geste de rupture, par lequel on se déclare quitte de toute dette et de toute responsabilité à l''égard d''autrui ; cf. Lc 10.11 ; Ac 13.51 ; 18.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.44+.
    marker-yv: yv-n
  - type: text
    text: Et si quelque part les gens ne veulent pas vous accueillir ni vous écouter, en partant de là, secouez la poussière de vos pieds ; ce sera pour eux un témoignage.
