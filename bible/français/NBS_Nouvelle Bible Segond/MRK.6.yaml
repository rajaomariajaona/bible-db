      - type: text
        text: '  : litt. (selon certains mss) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le roi envoya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
