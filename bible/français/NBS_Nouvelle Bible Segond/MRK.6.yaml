  - type: text
    text: 'Le roi Hérode l''apprit ; en effet, le nom de Jésus devenait célèbre et l''on disait : Jean, celui qui baptisait, s''est réveillé d''entre les morts ; c''est pour cela qu''il a le pouvoir de faire des miracles. '
