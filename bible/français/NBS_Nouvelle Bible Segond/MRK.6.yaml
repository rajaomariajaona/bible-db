document_id: MRK.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les gens de Nazareth ne croient pas en Jésus
  - type: heading
    content: Mt 13.53-58  ; Lc 4.16-30
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.20-35. –  Parti  : litt. sorti . –  son pays ou sa région d''origine , c.-à-d. Nazareth, selon 1.9 ; cf. Lc 4.16.'
  - type: text
    content: 'Parti de là, il vient dans son pays, et ses disciples le suivent. '
  '10':
  - type: note
    content: 'dans une maison  : c.-à-d. là où on vous offrira l''hospitalité, cf. 7.24 ; Lc 10.7. –  que vous quittiez l''endroit  : litt. que vous sortiez de là.'
  - type: text
    content: 'Il leur disait encore : Lorsque vous serez entrés dans une maison, demeurez-y jusqu''à ce que vous quittiez l''endroit. '
  '11':
  - type: note
    content: 'secouez la poussière  : geste de rupture, par lequel on se déclare quitte de toute dette et de toute responsabilité à l''égard d''autrui ; cf. Lc 10.11 ; Ac 13.51 ; 18.6. –  témoignage 1.44+.'
  - type: text
    content: Et si quelque part les gens ne veulent pas vous accueillir ni vous écouter, en partant de là, secouez la poussière de vos pieds ; ce sera pour eux un témoignage.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'partirent  : litt. sortirent . –  qu''il fallait changer radicalement  : litt. qu''ils changent ou qu''on change  ; autres traductions qu''il fallait se repentir ou se convertir 1.4n.'
  - type: text
    content: 'Ils partirent et proclamèrent qu''il fallait changer radicalement. '
  '13':
  - type: note
    content: 'faisaient des applications  : le verbe correspondant est traduit par embaumer en 16.1 ; parfumer en Mt 6.17 ; répandre en Jn 11.2 ; 12.3 ; cf. Jc 5.14s. – Cf. v. 5n  ; 16.17s ; voir aussi Lc 10.34.'
  - type: text
    content: Ils chassaient beaucoup de démons, faisaient des applications d'huile à beaucoup de malades et les guérissaient.
  - type: heading
    content: La mort de Jean le Baptiseur
  - type: heading
    content: Mt 14.1-2  ; Lc 9.7-9
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Hérode Antipas, en fait tétrarque de Galilée, mais souvent qualifié de roi (cf. Mt 14.1 ; Lc 3.1). –  le nom de Jésus  : litt. son nom . –  célèbre  : même terme dans les expressions traduites par parler de lui 3.12n ou venir en pleine lumière 4.22n. –  l''on disait  : certains mss portent il disait . –  celui qui baptisait 1.4n. –  réveillé ou relevé , cf. 1.31n  ; voir résurrection. –  il a le pouvoir…  : litt. les puissances sont à l''œuvre en lui ou les miracles s''opèrent par lui , cf. v. 2n.'
  - type: text
    content: 'Le roi Hérode l''apprit ; en effet, le nom de Jésus devenait célèbre et l''on disait : Jean, celui qui baptisait, s''est réveillé d''entre les morts ; c''est pour cela qu''il a le pouvoir de faire des miracles. '
  '15':
  - type: note
    content: '8.28/ /. –  Elie 9.4ss,11-13 ; cf. Ml 3.23s ; Jn 1.21. –  un prophète  : cf. Mt 21.11+ ; voir aussi Dt 18.15,18 ; Lc 9.8 ; Jn 6.14 ; Ac 3.22s.'
  - type: text
    content: 'D''autres disaient : C''est Elie ; d''autres encore disaient : C''est un prophète comme l''un des prophètes. '
  '16':
  - type: note
    content: Cf. Ap 11.3ss.
  - type: text
    content: 'Mais Hérode, en apprenant cela, disait : Ce Jean que, moi, j''ai fait décapiter, c''est lui qui s''est réveillé.'
  - type: heading
    content: Mt 14.3-12  ; Lc 3.19-20
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Hérode (Antipas, v. 14n) … avait fait arrêter Jean 1.14. –  Hérodiade , petite-fille d''Hérode le Grand et nièce d''Hérode Antipas ; voir v. 22n. –  Philippe, son frère  : cf. Mt 14.3n  ; Lc 3.1. L''historien Flavius Josèphe nomme Philippe le gendre d''Hérodiade, qui gouvernait à Césarée (Mc 8.27) et non son premier mari, qu''il appelle aussi Hérode.'
  - type: text
    content: 'Car Hérode lui-même avait fait arrêter Jean et l''avait fait enchaîner en prison, à cause d''Hérodiade, femme de Philippe, son frère, qu''il avait épousée ; '
  '18':
  - type: note
    content: Lv 18.16 ; cf. 20.21 ; Mt 14.4.
  - type: text
    content: 'en effet, Jean disait à Hérode : Il ne t''est pas permis d''avoir la femme de ton frère. '
  '19':
  - type: text
    content: 'Hérodiade avait du ressentiment contre lui et voulait le tuer. Mais elle ne le pouvait pas, '
  '2':
  - type: note
    content: 'Une multitude…  : certains mss portent la multitude de ses auditeurs. –  ébahis 1.22+. –  D''où cela lui vient-il ? Jn 7.15. –  miracles  : litt. puissances, c.-à-d. actes de puissance  ; cf. Lc 10.13 ; Ac 19.11.'
  - type: text
    content: 'Quand le sabbat fut venu, il se mit à enseigner dans la synagogue. Une multitude d''auditeurs, ébahis, se demandaient : D''où cela lui vient-il ? Quelle est cette sagesse qui lui a été donnée ? Et comment de tels miracles se font-ils par ses mains ? '
  '20':
  - type: note
    content: 'peur  : voir crainte. –  Quand il l''entendait, il était…  : autres traductions, d''après certains mss  : quand il l''avait entendu, il faisait beaucoup de choses ou peut-être il l''écoutait souvent (entendre et écouter traduisent ici le même verbe grec). –  juste / saint  : Ac 3.13 ; Rm 7.12 ; 1Th 2.10 ; Tt 1.8.'
  - type: text
    content: car Hérode avait peur de Jean, sachant que c'était un homme juste et saint ; il le protégeait. Quand il l'entendait, il était très perplexe ; pourtant il l'écoutait avec plaisir.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'l''occasion  : termes apparentés v. 31 ( le temps de ) ; 14.11. –  un dîner  : cf. Est 1.3n. –  ses dignitaires  : litt. ses grands , cf. Ap 6.15 ; 18.23 ; terme apparenté en Mt 20.25. –  les notables  : litt. les premiers  ; cf. Lc 19.47n.'
  - type: text
    content: 'Cependant l''occasion se présenta le jour où Hérode, pour l''anniversaire de sa naissance, donna un dîner pour ses dignitaires, les chefs militaires et les notables de Galilée. '
  '22':
  - type: note
    content: 'Sa fille (celle d''Hérode, selon le texte le mieux attesté), Hérodiade  : certains mss portent la fille d''Hérodiade  ; cf. v. 17n,24 et Mt 14.6. D''après d''autres sources la fille d''Hérodiade (la femme d''Hérode) portait le nom de Salomé.'
  - type: text
    content: 'Sa fille, Hérodiade, entra et dansa ; elle plut à Hérode et à ses convives. Le roi dit à la jeune fille : Demande-moi ce que tu voudras, et je te le donnerai. '
  '23':
  - type: note
    content: 'Cf. Est 2.9 ; 5.3,6 ; 7.2. –  Il lui fit force serments  : autre traduction il lui jura avec insistance  ; certains mss portent seulement il lui jura.'
  - type: text
    content: 'Il lui fit force serments : Ce que tu me demanderas, je te le donnerai, quand ce serait la moitié de mon royaume. '
  '24':
  - type: text
    content: 'Elle sortit et dit à sa mère : Que demanderai-je ? Celle-ci répondit : La tête de Jean, celui qui baptisait. '
  '25':
  - type: text
    content: 'Elle s''empressa alors de rentrer auprès du roi pour lui demander : Je veux que tu me donnes immédiatement, sur un plat, la tête de Jean le Baptiseur. '
  '26':
  - type: text
    content: 'Fort attristé, à cause de ses serments et des convives, le roi ne voulut pas lui opposer un refus. '
  '27':
  - type: note
    content: 'Il envoya  : litt. (selon certains mss) le roi envoya. –  un garde  : transcription dans le texte grec du mot latin speculator.'
  - type: text
    content: 'Il envoya aussitôt un garde avec ordre d''apporter la tête de Jean. Le garde alla décapiter Jean dans la prison '
  '28':
  - type: text
    content: 'et apporta sa tête sur un plat. Il la donna à la jeune fille, et la jeune fille la donna à sa mère. '
  '29':
  - type: note
    content: Cf. 15.42-47.
  - type: text
    content: A cette nouvelle, les disciples de Jean vinrent prendre son corps et le mirent dans un tombeau.
  - type: heading
    content: Jésus nourrit cinq mille hommes
  - type: heading
    content: Mt 14.13-21  ; Lc 9.10-17  ; Jn 6.1-15  ; cf. Mc 8.1-10/ /
  '3':
  - type: note
    content: 'le charpentier  : le terme grec, ici appliqué à Jésus lui-même (cf. Mt 13.55), a un sens plus large que son équivalent traditionnel en français ; il peut s''appliquer à plusieurs sortes d''artisans, constructeurs (maçons) ou entrepreneurs. –  fils de Marie… 3.31-35 ; cf. Jn 6.42. –  Jacques Ac 12.17 ; Ga 1.19 ; Jc 1.1. –  José  : cf. 15.40,47. –  Judas ou Jude, cf. Jd 1n. –  Ses sœurs 3.32. –  cause de chute 4.17+.'
  - type: text
    content: 'N''est-ce pas le charpentier, le fils de Marie, le frère de Jacques, de José, de Judas et de Simon ? Ses sœurs ne sont-elles pas ici, parmi nous ? Il était pour eux une cause de chute. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: les apôtres , c.-à-d. les envoyés  ; c'est l'appellation que Lc donne le plus volontiers aux Douze ; cf. v. 7ss ; 3.14n  ; Mt 10.2n  ; Lc 9.10 ; 10.17.
  - type: text
    content: 'Rassemblés auprès de Jésus, les apôtres lui racontèrent tout ce qu''ils avaient fait et tout ce qu''ils avaient enseigné. '
  '31':
  - type: note
    content: 2.2+. –  pas même le temps de manger 3.20.
  - type: text
    content: 'Il leur dit : Venez à l''écart, dans un lieu désert, et reposez-vous un peu. Car beaucoup venaient et repartaient, et ils n''avaient pas même le temps de manger.'
  '32':
  - type: text
    content: 'Ils partirent donc dans le bateau pour aller à l''écart, dans un lieu désert. '
  '33':
  - type: note
    content: 'Cf. v. 54s. –  à pied  : c.-à-d. en longeant la rive du lac.'
  - type: text
    content: Beaucoup les virent s'en aller et les reconnurent ; de toutes les villes, à pied, on accourut et on les devança.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 9.36+. –  Quand il descendit du bateau  : litt. quand il sortit (cf. v. 54). –  pas de berger / il se mit à leur enseigner  : cf. Nb 27. 15- 17  ; Ez 34.15,23 ; 37.24 ; Ps 23.1 ; 74.1 ; 77.21 ; 78.52s,70ss ; 80.2.'
  - type: text
    content: 'Quand il descendit du bateau, il vit une grande foule ; il en fut ému, parce qu''ils étaient '
  - type: text
    content: comme des moutons qui n'ont pas de berger ;
  - type: text
    content: ' et il se mit à leur enseigner quantité de choses.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.1-9.
  - type: text
    content: 'Comme l''heure était déjà tardive, ses disciples vinrent lui dire : Ce lieu est désert et l''heure est déjà tardive ; '
  '36':
  - type: text
    content: 'renvoie-les, pour qu''ils aillent s''acheter de quoi manger dans les hameaux et les villages des environs. '
  '37':
  - type: note
    content: 'Donnez-leur vous-mêmes  : cf. v. 7ss,38-41 ; 3.13ss. –  Irons-nous acheter…  : cf. Jn 4.8. –  deux cents deniers, soit près de sept mois de salaire selon le tarif de Mt 20.1ss ; cf. Mc 14.5n  ; voir aussi mesures, poids et monnaies.'
  - type: text
    content: 'Mais il leur répondit : Donnez-leur vous-mêmes à manger. Ils lui disent : Irons-nous acheter deux cents deniers de pains pour leur donner à manger ? '
  '38':
  - type: note
    content: 'pains / poissons  : cf. Jn 21.9.'
  - type: text
    content: 'Il leur demande : Combien de pains avez-vous ? Allez voir. Après s''être informés, ils répondent : Cinq, et deux poissons. '
  '39':
  - type: note
    content: Cf. Ps 23.1,5 ; Jn 6.10.
  - type: text
    content: 'Alors il leur ordonna de les installer tous en groupes sur l''herbe verte, '
  '4':
  - type: note
    content: 'Cf. Lc 4.24n. –  honorer  : cf. Jn 4.44. –  prophète Lc 13.33.'
  - type: text
    content: 'Jésus leur disait : On ne refuse pas d''honorer un prophète, sinon dans son pays, parmi les gens de sa parenté et dans sa maison. '
  '40':
  - type: note
    content: Cf. v. 34,44 ; voir aussi Ex 18.21,25 ; Nb 31.14 ; Dt 1.15 ; on trouve de nombreuses références à une organisation par groupes de cent et de cinquante dans les écrits de Qumrân.
  - type: text
    content: 'et ils s''installèrent par rangées de cent et de cinquante. '
  '41':
  - type: note
    content: 'Cf. 8.19 ; Mt 14.19n. –  leva les yeux 7.34+ ; cf. Jb 22.26. –  prononça la bénédiction  : cf. 8.6-7n  ; même formule en 14.22ss ; Mt 26.26ss ; certains suppléent ici un complément d''objet sous-entendu et traduisent les bénit. –  à ses disciples  : certains mss portent aux disciples. –  pour qu''ils les distribuent  : litt. pour qu''ils les leur distribuent.'
  - type: text
    content: 'Il prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la bénédiction. Puis il rompit les pains et se mit à les donner à ses disciples, pour qu''ils les distribuent. Il partagea aussi les deux poissons entre tous. '
  '42':
  - type: note
    content: 2R 4.42ss ; cf. Ex 16 ; Dt 8.3,16 ; Ps 78.24s,29 ; 105.40 ; 1Co 10.3 ; voir aussi Es 25.6-8 ; 55.1s ; 65.13s ; Mt 8.11 ; 22.1-4.
  - type: text
    content: 'Tous mangèrent et furent rassasiés, '
  '43':
  - type: note
    content: 'douze paniers  : cf. 3.14 ; 8.19. –  morceaux  : le terme grec est dérivé du verbe traduit par rompre en 8.6 etc.'
  - type: text
    content: 'et on emporta douze paniers de morceaux de pain et de poisson. '
  '44':
  - type: note
    content: 'Cf. v. 40n. –  les pains  : cette précision est absente de certains mss. –  hommes  : le terme grec employé ici n''inclut normalement pas les femmes et les enfants, cf. Mt 10.21 (explicitement) ; de même Lc 9.14 ; Jn 6.10.'
  - type: text
    content: Ceux qui avaient mangé les pains étaient cinq mille hommes.
  - type: heading
    content: Jésus marche sur la mer
  - type: heading
    content: Mt 14.22-33  ; Jn 6.16-21
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'sur l''autre rive  : ces mots sont absents de certains mss. –  Bethsaïda  : sur la rive nord du lac, près de l''embouchure du Jourdain, à l''est ; 8.22 ; Mt 11.21 ; Lc 9.10.'
  - type: text
    content: 'Aussitôt après, il obligea ses disciples à monter dans le bateau et à le précéder sur l''autre rive, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  '46':
  - type: note
    content: 1.35 ; 3.13+ ; Lc 3.21+ ; Jn 6.15.
  - type: text
    content: Il prit donc congé et s'en alla sur la montagne pour prier.
  '47':
  - type: text
    content: 'Le soir venu, le bateau était au milieu de la mer, et lui seul était à terre. '
  '48':
  - type: note
    content: 'ils avaient beaucoup de peine  : le même verbe est rendu par tourmenter 5.7. –  la quatrième veille  : entre 3 h et 6 h du matin. –  en marchant sur la mer  : cf. 4.41 ; Jb 9.8 ; voir aussi Ps 65.8 ; 77.17,20 ; 89.10 ; 107.29 ; Siracide 24.5 : « Le cercle du ciel, je (la Sagesse) l''ai parcouru, moi seule, et j''ai marché dans la profondeur des abîmes. Sur les vagues de la mer et sur la terre entière, sur tous les peuples et toutes les nations s''étendait mon pouvoir. » Sur l''expression traduite par sur la mer, voir Jn 21.1n. –  il allait (litt. il voulait, peut-être au sens de il faisait mine de vouloir) les dépasser  : cf. Lc 24.28 ; voir aussi Ex 33.19,22 ; 34.6 ; 1R 19.11.'
  - type: text
    content: 'Voyant qu''ils avaient beaucoup de peine à ramer, car le vent leur était contraire, vers la quatrième veille de la nuit il vient vers eux en marchant sur la mer, et il allait les dépasser. '
  '49':
  - type: note
    content: 'un fantôme  : cf. Lc 24.37 ; Sagesse 17.15 (sur le fléau des ténèbres en Egypte) : « Ils étaient à la fois poursuivis par des fantômes monstrueux et paralysés par la démission de leur âme ; une peur soudaine et inattendue s''était déversée en eux. »'
  - type: text
    content: 'Quand ils le virent marcher sur la mer, ils pensèrent que c''était un fantôme, et ils poussèrent des cris ; '
  '5':
  - type: note
    content: 'malades  : même terme v. 13 ; 16.18 ; Mt 14.14n  ; 1Co 11.30. –  imposant les mains 5.23+.'
  - type: text
    content: 'Il ne pouvait faire là aucun miracle, sinon qu''il guérit quelques malades en leur imposant les mains. '
  '50':
  - type: note
    content: 'ils étaient troublés  : litt. ils furent troublés. –  Courage ! 10.49 ; Mt 9.2+ ; Jn 16.33. –  C''est moi  : c''est la même expression grecque qui est traduite ailleurs par je suis ou c''est moi qui suis  ; cf. 13.6 ; 14.62n  ; Mt 14.27n  ; Jn 4.26n  ; 8.24n. –  n''ayez pas peur  : formule typique des récits de révélation, cf. 5.36 ; 16.6 ; Jos 1.9 ; Es 41.10 ; Jr 1.8 etc. ; voir aussi crainte.'
  - type: text
    content: 'car ils le voyaient tous, et ils étaient troublés. Aussitôt il parla avec eux ; il leur dit : Courage ! C''est moi, n''ayez pas peur ! '
  '51':
  - type: note
    content: le vent tomba 4.39.
  - type: text
    content: 'Puis il monta avec eux dans le bateau, et le vent tomba. En eux-mêmes, ils étaient tout stupéfaits ; '
  '52':
  - type: note
    content: 'l''affaire des pains  : cf. 7.2n,27s ; 8.1ss,14-21. –  ils étaient encore obtus  : litt. leur cœur était (ou avait été) endurci, cf. 3.5n  ; voir aussi 4.13+.'
  - type: text
    content: 'car ils n''avaient rien compris à l''affaire des pains : ils étaient encore obtus.'
  - type: heading
    content: Guérisons à Gennésareth
  - type: heading
    content: Mt 14.34-36  ; cf. Jn 6.22-25
  '53':
  - type: text
    content: ' '
  - type: note
    content: 'à Gennésareth  : on ne voit pas de quel endroit précis il est ici question ; voir Mt 14.34n.'
  - type: text
    content: 'Après avoir achevé leur traversée, ils arrivèrent à Gennésareth et abordèrent. '
  '54':
  - type: note
    content: 'Cf. v. 33 ; Jn 6.22-25. –  descendus  : litt. sortis.'
  - type: text
    content: 'Sitôt qu''ils furent descendus du bateau, on le reconnut ; '
  '55':
  - type: note
    content: '1.32-34 ; 3.7-12. –  les gens…  : litt. ils parcoururent… ou on parcourut… –  grabats 2.4n.'
  - type: text
    content: 'les gens parcoururent toute la région et se mirent à apporter des malades sur des grabats, partout où l''on apprenait qu''il était. '
  '56':
  - type: note
    content: 'toucher 1.41+. –  la frange  : cf. Mt 9.20n. –  la touchaient ou le touchaient (le vêtement, ou Jésus). –  sauvés, c.-à-d. guéris ou délivrés, 5.28n.'
  - type: text
    content: Partout où il entrait, villages, villes ou hameaux, on mettait les malades sur les places publiques et on le suppliait de leur laisser toucher ne serait-ce que la frange de son vêtement. Et tous ceux qui la touchaient étaient sauvés.
  '6':
  - type: note
    content: 'manque de foi  : cf. 2.5 ; 11.22ss.'
  - type: text
    content: Il s'étonnait de leur manque de foi.
  - type: heading
    content: Jésus envoie les Douze en mission
  - type: heading
    content: Mt 9.35  ; 10.1,5-14  ; Lc 9.1-6
  - type: text
    content: Il parcourait les villages d'alentour en enseignant.
  '7':
  - type: text
    content: ' '
  - type: note
    content: les Douze 3.13-19. –  deux à deux Lc 10.1. –  autorité ou pouvoir , 1.22n. –  esprits impurs 1.23n  ; voir aussi démon.
  - type: text
    content: 'Ayant appelé les Douze, il se mit à les envoyer deux à deux, en leur donnant autorité sur les esprits impurs. '
  '8':
  - type: note
    content: 'enjoignit 8.6. –  sinon un bâton  : comparer avec Mt 10.10 ; Lc 9.3 ; 10.4. –  monnaie de bronze ou chalque(s) (pièces de bronze valant 1/48 d''une drachme d''argent) ; voir mesures, poids et monnaies ; cf. Lc 9.3n.'
  - type: text
    content: 'Il leur enjoignit de ne rien prendre pour la route, sinon un bâton seulement ; ni pain, ni sac, ni monnaie de bronze à la ceinture, '
  '9':
  - type: note
    content: 'disait-il  : sous-entendu dans le texte. –  chaussez-vous  : litt. chaussés. –  sandales  : voir aussi Ep 6.15. –  ne mettez pas…  : on peut comprendre ne mettez pas deux tuniques l''une sur l''autre ou bien ne mettez pas alternativement deux tuniques (c.-à-d. n''emportez pas de tunique de rechange).'
  - type: text
    content: 'mais – disait-il – chaussez-vous de sandales et ne mettez pas deux tuniques. '
