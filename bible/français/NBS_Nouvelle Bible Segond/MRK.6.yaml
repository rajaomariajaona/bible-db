        text: '24.5 : « Le cercle du ciel, je (la Sagesse) l''ai parcouru, moi seule, et j''ai marché dans la profondeur des abîmes. Sur les vagues de la mer et sur la terre entière, sur tous les peuples et toutes les nations s''étendait mon pouvoir. » Sur l''expression traduite par '
