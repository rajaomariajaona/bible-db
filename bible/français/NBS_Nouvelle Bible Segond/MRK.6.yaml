    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Est 2.9 ; 5.3,6 ; 7.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il lui fit force serments
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il lui jura avec insistance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains mss portent seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il lui jura.
    marker-yv: yv-n
  - type: text
    text: 'Il lui fit force serments : Ce que tu me demanderas, je te le donnerai, quand ce serait la moitié de mon royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Elle sortit et dit à sa mère : Que demanderai-je ? Celle-ci répondit : La tête de Jean, celui qui baptisait. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elle s''empressa alors de rentrer auprès du roi pour lui demander : Je veux que tu me donnes immédiatement, sur un plat, la tête de Jean le Baptiseur. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fort attristé, à cause de ses serments et des convives, le roi ne voulut pas lui opposer un refus. '
  - type: usfm
    marker: v
    metadata:
