      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 10.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 9.10 ; 10.17.'
    marker-yv: yv-n
  - type: text
    text: 'Rassemblés auprès de Jésus, les apôtres lui racontèrent tout ce qu''ils avaient fait et tout ce qu''ils avaient enseigné. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas même le temps de manger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.20.
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Venez à l''écart, dans un lieu désert, et reposez-vous un peu. Car beaucoup venaient et repartaient, et ils n''avaient pas même le temps de manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils partirent donc dans le bateau pour aller à l''écart, dans un lieu désert. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 54s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à pied
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. en longeant la rive du lac.'
    marker-yv: yv-n
  - type: text
    text: Beaucoup les virent s'en aller et les reconnurent ; de toutes les villes, à pied, on accourut et on les devança.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
