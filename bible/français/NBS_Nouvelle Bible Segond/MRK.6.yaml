    marker-yv: yv-n
  - type: text
    text: 'Il envoya aussitôt un garde avec ordre d''apporter la tête de Jean. Le garde alla décapiter Jean dans la prison '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et apporta sa tête sur un plat. Il la donna à la jeune fille, et la jeune fille la donna à sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 15.42-47.
    marker-yv: yv-n
  - type: text
    text: A cette nouvelle, les disciples de Jean vinrent prendre son corps et le mirent dans un tombeau.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus nourrit cinq mille hommes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 14.13-21  ; Lc 9.10-17  ; Jn 6.1-15  ; cf. Mc 8.1-10/ /
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
