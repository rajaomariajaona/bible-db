      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 9.36+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quand il descendit du bateau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quand il sortit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 54). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas de berger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il se mit à leur enseigner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nb 27.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 15-
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; Ez 34.15,23 ; 37.24 ; Ps 23.1 ; 74.1 ; 77.21 ; 78.52s,70ss ; 80.2.
    marker-yv: yv-n
  - type: text
    text: 'Quand il descendit du bateau, il vit une grande foule ; il en fut ému, parce qu''ils étaient '
  - type: usfm
    marker: it
    children:
    - type: text
      text: comme des moutons qui n'ont pas de berger ;
  - type: text
    text: ' et il se mit à leur enseigner quantité de choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 8.1-9.
    marker-yv: yv-n
  - type: text
    text: 'Comme l''heure était déjà tardive, ses disciples vinrent lui dire : Ce lieu est désert et l''heure est déjà tardive ; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'renvoie-les, pour qu''ils aillent s''acheter de quoi manger dans les hameaux et les villages des environs. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Donnez-leur vous-mêmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 7ss,38-41 ; 3.13ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Irons-nous acheter…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 4.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux cents deniers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit près de sept mois de salaire selon le tarif de Mt 20.1ss ; cf. Mc 14.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Mais il leur répondit : Donnez-leur vous-mêmes à manger. Ils lui disent : Irons-nous acheter deux cents deniers de pains pour leur donner à manger ? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pains '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: poissons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 21.9.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur demande : Combien de pains avez-vous ? Allez voir. Après s''être informés, ils répondent : Cinq, et deux poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ps 23.1,5 ; Jn 6.10.
    marker-yv: yv-n
  - type: text
    text: 'Alors il leur ordonna de les installer tous en groupes sur l''herbe verte, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 34,44 ; voir aussi Ex 18.21,25 ; Nb 31.14 ; Dt 1.15 ; on trouve de nombreuses références à une organisation par groupes de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cinquante '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans les écrits de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et ils s''installèrent par rangées de cent et de cinquante. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 8.19 ; Mt 14.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leva les yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.34+ ; cf. Jb 22.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prononça la bénédiction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.6-7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; même formule en 14.22ss ; Mt 26.26ss ; certains suppléent ici un complément d''objet sous-entendu et traduisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les bénit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à ses disciples
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux disciples
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour qu'ils les distribuent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour qu'ils les leur distribuent.
    marker-yv: yv-n
  - type: text
    text: 'Il prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la bénédiction. Puis il rompit les pains et se mit à les donner à ses disciples, pour qu''ils les distribuent. Il partagea aussi les deux poissons entre tous. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2R 4.42ss ; cf. Ex 16 ; Dt 8.3,16 ; Ps 78.24s,29 ; 105.40 ; 1Co 10.3 ; voir aussi Es 25.6-8 ; 55.1s ; 65.13s ; Mt 8.11 ; 22.1-4.
    marker-yv: yv-n
  - type: text
    text: 'Tous mangèrent et furent rassasiés, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: douze paniers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.14 ; 8.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: morceaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec est dérivé du verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rompre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 8.6 etc.
    marker-yv: yv-n
  - type: text
    text: 'et on emporta douze paniers de morceaux de pain et de poisson. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 40
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les pains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est absente de certains mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec employé ici n''inclut normalement pas les femmes et les enfants, cf. Mt 10.21 (explicitement) ; de même Lc 9.14 ; Jn 6.10.'
    marker-yv: yv-n
  - type: text
    text: Ceux qui avaient mangé les pains étaient cinq mille hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur la mer
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 14.22-33  ; Jn 6.16-21
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur l'autre rive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ces mots sont absents de certains mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bethsaïda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sur la rive nord du lac, près de l''embouchure du Jourdain, à l''est ; 8.22 ; Mt 11.21 ; Lc 9.10.'
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt après, il obligea ses disciples à monter dans le bateau et à le précéder sur l''autre rive, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.35 ; 3.13+ ; Lc 3.21+ ; Jn 6.15.
    marker-yv: yv-n
  - type: text
    text: Il prit donc congé et s'en alla sur la montagne pour prier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Le soir venu, le bateau était au milieu de la mer, et lui seul était à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.48 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils avaient beaucoup de peine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tourmenter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la quatrième veille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : entre 3 h et 6 h du matin. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en marchant sur la mer
    - type: usfm
      marker: ft
