    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ses sœurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cause de chute '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.17+.
    marker-yv: yv-n
  - type: text
    text: 'N''est-ce pas le charpentier, le fils de Marie, le frère de Jacques, de José, de Judas et de Simon ? Ses sœurs ne sont-elles pas ici, parmi nous ? Il était pour eux une cause de chute. '
  - type: usfm
