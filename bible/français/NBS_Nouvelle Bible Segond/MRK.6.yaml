    marker-yv: yv-n
  - type: text
    text: 'Quand le sabbat fut venu, il se mit à enseigner dans la synagogue. Une multitude d''auditeurs, ébahis, se demandaient : D''où cela lui vient-il ? Quelle est cette sagesse qui lui a été donnée ? Et comment de tels miracles se font-ils par ses mains ? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
