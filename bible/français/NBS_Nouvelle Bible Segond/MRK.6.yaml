    marker-yv: yv-n
  - type: text
    text: 'Sa fille, Hérodiade, entra et dansa ; elle plut à Hérode et à ses convives. Le roi dit à la jeune fille : Demande-moi ce que tu voudras, et je te le donnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
