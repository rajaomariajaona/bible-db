      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parvint à Elie, le Tishbite : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Descends à la rencontre d''Achab, le roi d''Israël qui est à Samarie ; il est dans la vigne de Naboth, il y est descendu pour en prendre possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu as assassiné…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'as-tu assassiné et même pris possession ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu lui diras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au lieu de cette répétition, '
