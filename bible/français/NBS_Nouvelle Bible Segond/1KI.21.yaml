      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Achab parla ainsi à Naboth : Donne-moi ta vigne, pour que j''en fasse un jardin potager, car elle est tout près de ma maison. Je te donnerai à la place une vigne meilleure ; ou, si tu préfères, je te paierai la valeur en argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
