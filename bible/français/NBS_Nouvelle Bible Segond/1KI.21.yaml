      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jamais ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1S 2.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que le '
      - type: usfm
        marker: nd
