    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si cela est bon à tes yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', formule traduite le plus souvent '
    - type: usfm
      marker: fqa
