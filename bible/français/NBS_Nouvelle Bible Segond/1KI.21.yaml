    marker-yv: yv-n
  - type: text
    text: 'Jézabel, sa femme, vint le trouver et lui dit : Pourquoi as-tu l''esprit maussade ? Pourquoi ne manges-tu pas ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: J'ai tenté de parler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ai parlé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le texte hébreu emploie une forme du verbe inhabituelle en un tel contexte, qui appellerait plutôt le présent ou le futur ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je parle, je parlerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Elle peut suggérer une action qui a été entreprise sans aboutir.
    marker-yv: yv-n
  - type: text
    text: 'Il lui répondit : J''ai tenté de parler à Naboth le Jizréélite ; je lui ai dit : « Donne-moi ta vigne pour de l''argent ; ou, si tu veux, je te donnerai une autre vigne à la place. » Mais il a dit : « Je ne te donnerai pas ma vigne ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Est-ce bien toi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est-ce toi qui exerces maintenant la royauté…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cette question trahit la conception d''un pouvoir monarchique absolu. Pour le narrateur, le roi d''Israël doit rester soumis à Dieu et à sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' soit content'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 16.25 ; 1S 25.36 ; 2S 13.28 ; Est 1.10.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Jézabel, sa femme, lui dit : Est-ce bien toi qui exerces la royauté sur Israël ? Lève-toi, mange, que ton cœur soit content ! Moi, je te donnerai la vigne de Naboth le Jizréélite !'
