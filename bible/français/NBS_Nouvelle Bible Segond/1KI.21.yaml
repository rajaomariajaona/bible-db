document_id: 1KI.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Achab et Jézabel s'emparent de la vigne de Naboth
  - type: text
    content: ' '
  - type: note
    content: 'Après cela…  : LXX a placé ce chap. à la suite du chap. 19. –  Jizréel 18.45ns. –  Samarie 13.32n  ; 16.24n  ; 20.1n.'
  - type: text
    content: 'Après cela, voici ce qui arriva : Naboth, le Jizréélite, avait une vigne à Jizréel, à côté du palais d''Achab, roi de Samarie. '
  '10':
  - type: note
    content: 'deux hommes sans morale  : cf. Dt 13.14n  ; Jg 19.22 ; 1S 2.12 ; 10.27. –  qui témoigneront  : cf. Dt 17.6 ; 19.15 ; voir aussi Nb 35.30. –  Tu as maudit  : litt. tu as béni, euphémisme. LXX il a béni. Cf. v. 13 ; Ex 22.27 ; Lv 24.15s ; voir aussi Ps 10.3 ; Jb 2.9.'
  - type: text
    content: 'et faites asseoir en face de lui deux hommes sans morale qui témoigneront ainsi contre lui : « Tu as maudit Dieu et le roi ! » Puis menez-le dehors, lapidez-le, et qu''il meure.'
  '11':
  - type: text
    content: 'Les gens de la ville de Naboth, les anciens et les notables qui habitaient dans la ville, agirent selon les instructions de Jézabel, d''après ce qui était écrit dans les lettres qu''elle leur avait envoyées. '
  '12':
  - type: note
    content: Cf. v. 9n.
  - type: text
    content: 'Ils proclamèrent un jeûne et firent asseoir Naboth à la tête du peuple ; '
  '13':
  - type: note
    content: 'hommes sans morale…  : cf. v. 10+. –  maudit…  : cf. v. 10n. –  hors de la ville  : cf. Nb 15.36+.'
  - type: text
    content: 'les deux hommes sans morale vinrent s''asseoir en face de lui ; ces hommes sans morale portèrent ce témoignage devant le peuple contre Naboth : Naboth a maudit Dieu et le roi ! Alors ils le menèrent hors de la ville, ils le lapidèrent, et il mourut. '
  '14':
  - type: text
    content: 'Ils firent dire à Jézabel : Naboth a été lapidé et il est mort.'
  '15':
  - type: text
    content: 'Lorsque Jézabel apprit que Naboth avait été lapidé et qu''il était mort, elle dit à Achab : Prends possession de la vigne de Naboth le Jizréélite, qui avait refusé de te la donner pour de l''argent ; Naboth n''est plus en vie, il est mort. '
  '16':
  - type: note
    content: Par cet acte, Achab cautionne le meurtre organisé par Jézabel.
  - type: text
    content: Quand il eut appris que Naboth était mort, Achab descendit à la vigne de Naboth le Jizréélite, pour en prendre possession.
  - type: heading
    content: Elie annonce le châtiment d'Achab et de Jézabel
  '17':
  - type: text
    content: ' '
  - type: note
    content: Elie, le Tishbite 17.1n.
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Elie, le Tishbite : '
  '18':
  - type: text
    content: 'Descends à la rencontre d''Achab, le roi d''Israël qui est à Samarie ; il est dans la vigne de Naboth, il y est descendu pour en prendre possession. '
  '19':
  - type: note
    content: 'Tu as assassiné…  : litt. as-tu assassiné et même pris possession ? –  Tu lui diras  : au lieu de cette répétition, LXX porte c''est pourquoi. –  Au lieu même  : selon 22.38. –  où les chiens ont léché le sang  : cf. 22.38 ; voir aussi 2R 9.26.'
  - type: text
    content: 'Tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu as assassiné et tu prends possession ! Tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Au lieu même où les chiens ont léché le sang de Naboth, les chiens lécheront aussi ton propre sang. '
  '2':
  - type: note
    content: 'si tu préfères  : litt. si cela est bon à tes yeux, formule traduite le plus souvent si cela te plaît, cf. 2S 15.26n.'
  - type: text
    content: 'Achab parla ainsi à Naboth : Donne-moi ta vigne, pour que j''en fasse un jardin potager, car elle est tout près de ma maison. Je te donnerai à la place une vigne meilleure ; ou, si tu préfères, je te paierai la valeur en argent. '
  '20':
  - type: note
    content: 'Cf. 18.17s. –  tu t''es vendu…  : cf. v. 25 ; 2R 17.17. –  ce qui déplaisait au Seigneur 11.6n  ; Nb 22.34n.'
  - type: text
    content: 'Achab dit à Elie : Tu m''as trouvé, mon ennemi ! Et il répondit : Oui, je t''ai trouvé ! Parce que tu t''es vendu en faisant ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '21':
  - type: note
    content: tout mâle 14.10n.
  - type: text
    content: 'je fais venir un malheur sur toi ; je te balaierai, je retrancherai de chez Achab tout mâle, l''esclave comme l''homme libre en Israël, '
  '22':
  - type: note
    content: 'et je rendrai ta maison…  : cf. 14.10+ ; 16.3+.'
  - type: text
    content: 'et je rendrai ta maison semblable à la maison de Jéroboam, fils de Nebath, et à la maison de Basha, fils d''Ahiya, parce que tu m''as contrarié et que tu as fait pécher Israël. '
  '23':
  - type: note
    content: 'Les chiens…  : cf. 2R 9.36. –  près du rempart  : quelques mss de Syr, Tg et Vg portent dans le champ, comme 2R 9.36.'
  - type: text
    content: 'Quant à Jézabel, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : Les chiens mangeront Jézabel près du rempart de Jizréel. '
  '24':
  - type: note
    content: 'Celui de la famille d''Achab qui mourra…  : cf. 14.11n.'
  - type: text
    content: Celui de la famille d'Achab qui mourra dans la ville sera dévoré par les chiens, et celui qui mourra dans la campagne sera dévoré par les oiseaux du ciel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'V. 20+. –  c''est Jézabel…  : sur la responsabilité imputée aux femmes étrangères dans le péché d''Israël, cf. 11.1ss ; Esd 10.'
  - type: text
    content: 'Il n''y a eu personne qui se soit vendu en faisant ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' comme Achab ; c''est Jézabel, sa femme, qui l''y incitait. '
  '26':
  - type: note
    content: 'en suivant  : cf. 11.10 ; 14.8. –  idoles 15.12n. –  les Amorites (Gn 10.16) sont cités ici pour désigner tous les peuples qui occupaient le pays avant sa conquête par les Israélites (cf. Ex 23.23 ; Dt 1.7,44 ; Jos 3.10 ; Jg 1.34s ; 1S 7.14 ; Am 2.9s).'
  - type: text
    content: 'Il a agi de la manière la plus abominable en suivant les idoles, imitant en tous points les Amorites que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédés devant les Israélites.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'déchira ses vêtements (cf. Gn 37.29,34 ; 44.13 ; Nb 14.6 ; Jg 11.35 ; 2S 1.2,11 ; 3.31 etc.) , il mit un sac sur son corps (litt. sa chair  ; cf. Gn 37.34 ; Es 22.12 ; Jr 48.37 ; Ez 27.31 ; Am 8.10 ; Jon 3.8 etc.) et jeûna (2S 12.16,21-23 ; Jl 1.14 ; Jon 3.5 ; Esd 8.21 ; Né 9.1 ; 2Ch 20.3) : ce sont des rites de douleur et de deuil. –  lentement  : même terme hébreu employé avec des sens légèrement différents en Gn 33.14 ; 2S 18.5 ; Jb 15.11.'
  - type: text
    content: 'Quand il entendit ces paroles, Achab déchira ses vêtements, il mit un sac sur son corps et jeûna ; il couchait avec ce sac et marchait lentement. '
  '28':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Elie, le Tishbite : '
  '29':
  - type: note
    content: 'Parce qu''il s''est humilié…  : cf. 2R 22.19s. –  pendant les jours de son fils  : sur un châtiment différé, cf. 2R 20.16-19.'
  - type: text
    content: As-tu vu comment Achab s'est humilié devant moi ? Parce qu'il s'est humilié devant moi, je ne ferai pas venir le malheur pendant ses jours ; ce sera pendant les jours de son fils que je ferai venir le malheur sur sa maison.
  '3':
  - type: note
    content: 'Jamais ! (1S 2.30n) Que le Seigneur … 1S 24.7+ ; 26.11 ; 1Ch 11.19 ; cf. Gn 18.25 ; 44.7,17 ; Jos 24.16 ; 1S 12.23 ; 2S 23.17. –  le patrimoine de mes pères  : cf. Nb 36.7-9 ; voir aussi Lv 25.13,23.'
  - type: text
    content: 'Mais Naboth répondit à Achab : Jamais ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me garde de te donner le patrimoine de mes pères ! '
  '4':
  - type: note
    content: 'maussade, de mauvaise humeur 20.43n. –  détourna le visage  : LXX et Vg ajoutent  : contre le mur  ; cf. 2R 20.2. –  ne voulut rien manger  : litt. ne mangea pas de pain, de même aux v. 5,7.'
  - type: text
    content: 'Achab rentra chez lui maussade, de mauvaise humeur, à cause de cette parole que lui avait dite Naboth le Jizréélite : « Je ne te donnerai pas le patrimoine de mes pères ! » Il se coucha sur son lit, détourna le visage et ne voulut rien manger. '
  '5':
  - type: note
    content: 'Jézabel 16.31n  ; 18.4+ ; 19.1-2+. – Voir esprit. –  ne manges-tu pas  : cf. v. 4n,7.'
  - type: text
    content: 'Jézabel, sa femme, vint le trouver et lui dit : Pourquoi as-tu l''esprit maussade ? Pourquoi ne manges-tu pas ? '
  '6':
  - type: note
    content: 'J''ai tenté de parler  : autre traduction j''ai parlé  ; le texte hébreu emploie une forme du verbe inhabituelle en un tel contexte, qui appellerait plutôt le présent ou le futur (je parle, je parlerai). Elle peut suggérer une action qui a été entreprise sans aboutir.'
  - type: text
    content: 'Il lui répondit : J''ai tenté de parler à Naboth le Jizréélite ; je lui ai dit : « Donne-moi ta vigne pour de l''argent ; ou, si tu veux, je te donnerai une autre vigne à la place. » Mais il a dit : « Je ne te donnerai pas ma vigne ! » '
  '7':
  - type: note
    content: 'Est-ce bien toi…  : autre traduction est-ce toi qui exerces maintenant la royauté…  ; cette question trahit la conception d''un pouvoir monarchique absolu. Pour le narrateur, le roi d''Israël doit rester soumis à Dieu et à sa loi. –  que ton cœur soit content  : cf. Jg 16.25 ; 1S 25.36 ; 2S 13.28 ; Est 1.10.'
  - type: text
    content: 'Alors Jézabel, sa femme, lui dit : Est-ce bien toi qui exerces la royauté sur Israël ? Lève-toi, mange, que ton cœur soit content ! Moi, je te donnerai la vigne de Naboth le Jizréélite !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'du sceau d''Achab  : litt. de son sceau (à lui) . –  notables  : cf. v. 11 ; Es 34.12+ ; Né 2.16+ ; 4.8,13 ; 5.7 ; 7.5. –  dans sa ville  : absent de LXX.'
  - type: text
    content: 'Elle écrivit alors au nom d''Achab des lettres qu''elle scella du sceau d''Achab. Elle envoya ces lettres aux anciens et aux notables qui habitaient avec Naboth, dans sa ville. '
  '9':
  - type: note
    content: 'Proclamez un jeûne  : cf. v. 12 ; Jl 1.14 ; 2.15 ; Jon 3.5 ; voir aussi Jg 20.26 ; 1S 7.6. –  à la tête du peuple  : c.-à-d. au premier rang de l''assemblée. Cf. v. 12.'
  - type: text
    content: 'Dans ces lettres, elle avait écrit : Proclamez un jeûne ; faites asseoir Naboth à la tête du peuple, '
