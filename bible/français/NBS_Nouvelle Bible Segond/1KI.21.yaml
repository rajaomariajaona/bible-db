    marker-yv: yv-n
  - type: text
    text: 'Elle écrivit alors au nom d''Achab des lettres qu''elle scella du sceau d''Achab. Elle envoya ces lettres aux anciens et aux notables qui habitaient avec Naboth, dans sa ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Proclamez un jeûne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 12 ; Jl 1.14 ; 2.15 ; Jon 3.5 ; voir aussi Jg 20.26 ; 1S 7.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à la tête du peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au premier rang de l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. v. 12.
    marker-yv: yv-n
  - type: text
    text: 'Dans ces lettres, elle avait écrit : Proclamez un jeûne ; faites asseoir Naboth à la tête du peuple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux hommes sans morale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 13.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 19.22 ; 1S 2.12 ; 10.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui témoigneront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 17.6 ; 19.15 ; voir aussi Nb 35.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu as maudit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu as '
      - type: usfm
        marker: w
        children:
        - type: text
          text: béni
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', euphémisme. LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a béni
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. v. 13 ; Ex 22.27 ; Lv 24.15s ; voir aussi Ps 10.3 ; Jb 2.9.
    marker-yv: yv-n
  - type: text
    text: 'et faites asseoir en face de lui deux hommes sans morale qui témoigneront ainsi contre lui : « Tu as maudit Dieu et le roi ! » Puis menez-le dehors, lapidez-le, et qu''il meure.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les gens de la ville de Naboth, les anciens et les notables qui habitaient dans la ville, agirent selon les instructions de Jézabel, d''après ce qui était écrit dans les lettres qu''elle leur avait envoyées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils proclamèrent un jeûne et firent asseoir Naboth à la tête du peuple ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hommes sans morale…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maudit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hors de la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 15.36+.'
    marker-yv: yv-n
  - type: text
    text: 'les deux hommes sans morale vinrent s''asseoir en face de lui ; ces hommes sans morale portèrent ce témoignage devant le peuple contre Naboth : Naboth a maudit Dieu et le roi ! Alors ils le menèrent hors de la ville, ils le lapidèrent, et il mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils firent dire à Jézabel : Naboth a été lapidé et il est mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque Jézabel apprit que Naboth avait été lapidé et qu''il était mort, elle dit à Achab : Prends possession de la vigne de Naboth le Jizréélite, qui avait refusé de te la donner pour de l''argent ; Naboth n''est plus en vie, il est mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Par cet acte, Achab cautionne le meurtre organisé par Jézabel.
    marker-yv: yv-n
  - type: text
    text: Quand il eut appris que Naboth était mort, Achab descendit à la vigne de Naboth le Jizréélite, pour en prendre possession.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elie annonce le châtiment d'Achab et de Jézabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
