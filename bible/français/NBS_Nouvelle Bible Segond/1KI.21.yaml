  - type: text
    text: 'Achab rentra chez lui maussade, de mauvaise humeur, à cause de cette parole que lui avait dite Naboth le Jizréélite : « Je ne te donnerai pas le patrimoine de mes pères ! » Il se coucha sur son lit, détourna le visage et ne voulut rien manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jézabel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 18.4+ ; 19.1-2+. – Voir '
    - type: usfm
      marker: fq
