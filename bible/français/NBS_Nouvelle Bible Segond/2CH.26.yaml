      - type: text
        text: '  : même verbe hébreu en Gn 12.17 ; 2R 15.5 ; Ps 73.5 ; cf. 2Ch 16.12 ; 21.12-15.'
    marker-yv: yv-n
  - type: text
    text: 'Azaria, le prêtre en chef, et tous les autres prêtres se tournèrent vers lui : il avait la « lèpre » au front. Ils le mirent précipitamment dehors, et lui-même se hâta de sortir, parce que le '
  - type: usfm
