  - type: text
    text: 'Le roi Ozias resta « lépreux » jusqu''au jour de sa mort ; comme il était « lépreux », il habitait dans une maison isolée ; il était exclu de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
