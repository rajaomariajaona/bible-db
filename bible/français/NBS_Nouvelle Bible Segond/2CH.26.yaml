segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Ozias
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2R 14.21-22
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ozias
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘Ouzziyahou, YHWH est ma force
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; ce roi porte aussi le nom d’
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Azaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir 2R 14.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple de Juda prit Ozias, qui avait seize ans, et l''investit de la royauté à la place d''Amatsia, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eiloth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Eilath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. 8.17 ; 1R 9.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: couché avec ses pères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 1.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: C'est lui qui bâtit Eiloth et la rendit à Juda, après que le roi se fut couché avec ses pères.
- type: usfm
  marker: r
  children:
  - type: text
    text: 2R 15.2-3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ozias avait seize ans lorsqu''il devint roi ; il régna cinquante-deux ans à Jérusalem. Le nom de sa mère était Yekolia ; elle était de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui convenait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit ce qui convenait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', exactement comme l''avait fait Amatsia, son père.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ozias fidèle, puis infidèle à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 5-20 sont propres aux Chroniques. Comme pour Joas (chap. 24) et Amatsia (chap. 25), le récit est divisé en deux parties, les bonnes années et les mauvaises. Il montre comment le succès est lié à la fidélité, et comment le châtiment – dans le cas d''Ozias, la « lèpre » – résulte de l''orgueil et de la désobéissance. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le fit prospérer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lui accorda la réussite ; lui donna la victoire.
    marker-yv: yv-n
  - type: text
    text: 'Il s''appliqua à chercher Dieu durant les jours de Zacharie, qui avait l''intelligence des visions de Dieu ; et tant qu''il chercha le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu le fit prospérer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ashdod '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'font partie des cinq villes principales des Philistins ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yabné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yabnéel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Jos 15.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent la même préposition, qui a pu être interprétée comme signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agirait alors de villes fortifiées destinées à garantir Juda contre l''hostilité des Philistins. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en Ashdod
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le nom semble ici désigner la région et non seulement la ville.'
    marker-yv: yv-n
  - type: text
    text: 'Il partit en guerre contre les Philistins et ouvrit des brèches dans la muraille de Gath, dans la muraille de Yabné et dans la muraille d''Ashdod. Il bâtit des villes en Ashdod et chez les Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le secourut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'aida
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe aux v. 13,15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Arabes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 13.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gour-Baal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localité inconnue ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a traduit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur le rocher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(la ville de Pétra ?). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Maonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : habitants de Maôn ; cf. 20.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 15.55.'
    marker-yv: yv-n
  - type: text
    text: 'Dieu le secourut contre les Philistins, contre les Arabes qui habitaient à Gour-Baal, et contre les Maonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les Ammonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peuple de Transjordanie ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les Maonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Minéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Jb 2.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: présents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa renommée s'étendit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' alla.'
    marker-yv: yv-n
  - type: text
    text: 'Les Ammonites faisaient des présents à Ozias, et sa renommée s''étendit jusqu''aux abords de l''Egypte, car il devint fort, il s''éleva très haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la porte de l'Angle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au nord (25.23) ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la porte de la Vallée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut-être au sud-ouest (Né 2.13-15 ; 3.13) ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Encoignure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut-être au nord-est (Né 3.19-25).'
    marker-yv: yv-n
  - type: text
    text: 'Ozias bâtit des tours à Jérusalem sur la porte de l''Angle, sur la porte de la Vallée et sur l''Encoignure, et il les fortifia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour servir de guet, cf. 27.4 ; 2R 18.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Carmel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: verger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il ne s''agirait pas du mont Carmel, qui appartenait au royaume du Nord, mais du Carmel de Juda, c.-à-d. la région d''Hébron, propice aux vignobles et aux vergers. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'agriculture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même terme hébreu qu''en Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il bâtit des tours dans le désert et creusa beaucoup de citernes, parce qu''il avait de grands troupeaux dans le Bas-Pays et sur le plateau, ainsi que des laboureurs et des vignerons dans les montagnes et au Carmel, car il aimait l''agriculture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aptes à porter les armes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1Ch 5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comptées d'après le recensement…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au nombre de leur visite par la main de Yéiel le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribe
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'secrétaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: placées sous les ordres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 13.'
    marker-yv: yv-n
  - type: text
    text: 'Ozias avait une armée de combattants aptes à porter les armes, par troupes comptées d''après le recensement qu''en firent Yéiel, le scribe, et Maaséya, le secrétaire, et placées sous les ordres de Hanania, l''un des princes du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des chefs de famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des têtes de pères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''armée semble avoir été répartie en clans ou familles.'
    marker-yv: yv-n
  - type: text
    text: 'Le nombre total des chefs de famille, des vaillants guerriers, était de 2 600. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils avaient sous leurs ordres une armée de 307 500 combattants forts et vaillants qui apportaient leur aide au roi contre l''ennemi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ozias leur procura, pour toute l''armée, des boucliers, des lances, des casques, des cuirasses, des arcs et des pierres de frondes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des machines conçues par un ingénieur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les trois mots hébreux correspondants sont de la même racine ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des inventions inventées par un inventeur. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: afin de lancer des flèches et de grosses pierres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains pensent qu''il s''agit d''un genre de catapulte comme en utilisaient les Assyriens. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sa renommée se répandit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son nom sortit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il fut extraordinairement aidé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. par Dieu, cf. v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Il fit faire à Jérusalem des machines conçues par un ingénieur, pour être placées sur les tours et sur les angles, afin de lancer des flèches et de grosses pierres. Sa renommée se répandit au loin, car il fut extraordinairement aidé jusqu'à ce qu'il soit devenu fort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' s''enhardit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
