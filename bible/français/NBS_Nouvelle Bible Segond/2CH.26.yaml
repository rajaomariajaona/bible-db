document_id: 2CH.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Ozias
  - type: heading
    content: 2R 14.21-22
  - type: text
    content: ' '
  - type: note
    content: 'Ozias  : hébreu ‘Ouzziyahou, YHWH est ma force  ; ce roi porte aussi le nom d’ Azaria , voir 2R 14.21n.'
  - type: text
    content: 'Tout le peuple de Juda prit Ozias, qui avait seize ans, et l''investit de la royauté à la place d''Amatsia, son père. '
  '10':
  - type: note
    content: 'tours  : pour servir de guet, cf. 27.4 ; 2R 18.8. –  Carmel signifie verger  ; il ne s''agirait pas du mont Carmel, qui appartenait au royaume du Nord, mais du Carmel de Juda, c.-à-d. la région d''Hébron, propice aux vignobles et aux vergers. –  l''agriculture  : litt. le sol  ; même terme hébreu qu''en Gn 2.5n.'
  - type: text
    content: 'Il bâtit des tours dans le désert et creusa beaucoup de citernes, parce qu''il avait de grands troupeaux dans le Bas-Pays et sur le plateau, ainsi que des laboureurs et des vignerons dans les montagnes et au Carmel, car il aimait l''agriculture. '
  '11':
  - type: note
    content: 'aptes à porter les armes  : cf. 1Ch 5.18n. –  comptées d''après le recensement…  : litt. au nombre de leur visite par la main de Yéiel le scribe… –  secrétaire 19.11. –  placées sous les ordres  : litt. sur la main, de même au v. 13.'
  - type: text
    content: 'Ozias avait une armée de combattants aptes à porter les armes, par troupes comptées d''après le recensement qu''en firent Yéiel, le scribe, et Maaséya, le secrétaire, et placées sous les ordres de Hanania, l''un des princes du roi. '
  '12':
  - type: note
    content: 'des chefs de famille  : litt. des têtes de pères  ; l''armée semble avoir été répartie en clans ou familles.'
  - type: text
    content: 'Le nombre total des chefs de famille, des vaillants guerriers, était de 2 600. '
  '13':
  - type: text
    content: 'Ils avaient sous leurs ordres une armée de 307 500 combattants forts et vaillants qui apportaient leur aide au roi contre l''ennemi. '
  '14':
  - type: text
    content: 'Ozias leur procura, pour toute l''armée, des boucliers, des lances, des casques, des cuirasses, des arcs et des pierres de frondes. '
  '15':
  - type: note
    content: 'des machines conçues par un ingénieur  : les trois mots hébreux correspondants sont de la même racine ; litt. des inventions inventées par un inventeur. –  afin de lancer des flèches et de grosses pierres  : certains pensent qu''il s''agit d''un genre de catapulte comme en utilisaient les Assyriens. –  Sa renommée se répandit  : litt. son nom sortit. –  il fut extraordinairement aidé  : c.-à-d. par Dieu, cf. v. 7n.'
  - type: text
    content: Il fit faire à Jérusalem des machines conçues par un ingénieur, pour être placées sur les tours et sur les angles, afin de lancer des flèches et de grosses pierres. Sa renommée se répandit au loin, car il fut extraordinairement aidé jusqu'à ce qu'il soit devenu fort.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'son cœur s''enhardit 17.6n. –  Il commit un sacrilège  : autre traduction il devint infidèle  ; cf. 12.2n  ; Lv 5.15n  ; Nb 5.6+. –  temple  : voir ♦. –  pour offrir de l''encens sur l''autel de l''encens  : acte rituel réservé aux prêtres (Nb 17.5 ; 18.7 ; 1Ch 23.13).'
  - type: text
    content: 'Mais lorsqu''il fut devenu fort, son cœur s''enhardit au point d''entraîner sa perte. Il commit un sacrilège envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu : il entra dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour offrir de l''encens sur l''autel de l''encens. '
  '17':
  - type: note
    content: 'Azaria  : ce prêtre porte le même nom que le roi ; cf. v. 1n.'
  - type: text
    content: 'Azaria, le prêtre, entra derrière lui, avec quatre-vingts prêtres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', de vaillants hommes, '
  '18':
  - type: note
    content: 'fils d''Aaron  : Ex 28.1. –  Tu commets un sacrilège  : autre traduction car tu es infidèle, cf. v. 16n. –  et cela ne tournera pas…  : on peut comprendre soit ce ne sera pas pour toi un titre de gloire aux yeux du Seigneur Dieu, soit il ne se révélera pas dans sa gloire pour toi.'
  - type: text
    content: 'qui s''opposèrent au roi Ozias et lui dirent : Ce n''est pas à toi, Ozias, d''offrir de l''encens pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mais aux prêtres, les fils d''Aaron, qui ont été consacrés pour le faire. Sors du sanctuaire ! Tu commets un sacrilège, et cela ne tournera pas à ta gloire devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu. '
  '19':
  - type: note
    content: 'Cf. 2R 15.5. –  un encensoir  : litt. un encensoir pour encenser ou pour offrir de l''encens, v. 18. –  s''irrita 16.10n. –  la « lèpre »  : cf. Lv 13.2n. –  éclata  : le verbe s''utilise habituellement pour la lumière ou le soleil qui se lève, cf. Gn 32.32 ; 2S 23.4 ; Es 58.10.'
  - type: text
    content: 'Ozias, qui tenait un encensoir à la main, s''irrita. Comme il s''irritait contre les prêtres, la « lèpre » éclata sur son front, devant les prêtres, dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', près de l''autel de l''encens. '
  '2':
  - type: note
    content: 'Eiloth (ou Eilath) : cf. 8.17 ; 1R 9.26+. –  couché avec ses pères  : cf. 1R 1.21n.'
  - type: text
    content: C'est lui qui bâtit Eiloth et la rendit à Juda, après que le roi se fut couché avec ses pères.
  - type: heading
    content: 2R 15.2-3
  '20':
  - type: note
    content: 'les autres prêtres  : litt. les prêtres. –  Ils le mirent précipitamment dehors…  : la « lèpre » n''est pas seulement une maladie : c''est une impureté rituelle qui exclut l''homme de la communauté religieuse et sociale ; cf. Lv 13.45s. –  le Seigneur l''avait frappé  : même verbe hébreu en Gn 12.17 ; 2R 15.5 ; Ps 73.5 ; cf. 2Ch 16.12 ; 21.12-15.'
  - type: text
    content: 'Azaria, le prêtre en chef, et tous les autres prêtres se tournèrent vers lui : il avait la « lèpre » au front. Ils le mirent précipitamment dehors, et lui-même se hâta de sortir, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait frappé.'
  - type: heading
    content: Fin du règne d'Ozias
  - type: heading
    content: 2R 15.5-7
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'une maison isolée  : litt. une maison de liberté ou de libération , ce qui désigne soit une maison affranchie de toutes les règles sociales habituelles, soit une maison libre, à part, réservée aux « lépreux ». –  Jotam  : ce nom signifie YHWH est parfait . –  l''intendant de la maison du roi…  : litt. sur la maison du roi jugeant (cf. Rt 1.1n) le peuple du pays.'
  - type: text
    content: 'Le roi Ozias resta « lépreux » jusqu''au jour de sa mort ; comme il était « lépreux », il habitait dans une maison isolée ; il était exclu de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Jotam, son fils, l''intendant de la maison du roi, gouvernait le peuple du pays. '
  '22':
  - type: note
    content: 'Le reste de l''histoire…  : cf. 1R 11.41n. –  le début et la fin  : cf. 9.29+. –  c''est le prophète Esaïe, fils d''Amots…  : il s''agit du prophète dont un livre biblique porte le nom, mais ce dernier ne mentionne Ozias que brièvement (1.1 ; 6.1) ; les écrits d''Esaïe sur le règne d''Ozias n''ont pas été conservés.'
  - type: text
    content: 'Le reste de l''histoire d''Ozias, le début et la fin, c''est le prophète Esaïe, fils d''Amots, qui l''a écrit. '
  '23':
  - type: note
    content: 'Ozias se coucha avec ses pères  : cf. 1R 1.21n. –  on l''ensevelit avec ses pères  : quelques mss hébreux et des versions anciennes omettent les mots correspondant à avec ses pères. –  car on disait : Il est « lépreux »  : il semble qu''Ozias ait été enseveli dans une sépulture appartenant aux rois, mais non pas dans les tombeaux des rois.'
  - type: text
    content: 'Ozias se coucha avec ses pères, et on l''ensevelit avec ses pères dans le champ de la sépulture des rois, car on disait : Il est « lépreux ». Jotam, son fils, devint roi à sa place.'
  '3':
  - type: text
    content: 'Ozias avait seize ans lorsqu''il devint roi ; il régna cinquante-deux ans à Jérusalem. Le nom de sa mère était Yekolia ; elle était de Jérusalem. '
  '4':
  - type: note
    content: 'ce qui convenait…  : cf. 20.32n.'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait Amatsia, son père.'
  - type: heading
    content: Ozias fidèle, puis infidèle à Dieu
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 5-20 sont propres aux Chroniques. Comme pour Joas (chap. 24) et Amatsia (chap. 25), le récit est divisé en deux parties, les bonnes années et les mauvaises. Il montre comment le succès est lié à la fidélité, et comment le châtiment – dans le cas d''Ozias, la « lèpre » – résulte de l''orgueil et de la désobéissance. –  le fit prospérer  : autres traductions lui accorda la réussite ; lui donna la victoire.'
  - type: text
    content: 'Il s''appliqua à chercher Dieu durant les jours de Zacharie, qui avait l''intelligence des visions de Dieu ; et tant qu''il chercha le '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu le fit prospérer. '
  '6':
  - type: note
    content: 'Gath et Ashdod font partie des cinq villes principales des Philistins ; Yabné ou Yabnéel, cf. Jos 15.11n. –  en et chez traduisent la même préposition, qui a pu être interprétée comme signifiant contre  ; il s''agirait alors de villes fortifiées destinées à garantir Juda contre l''hostilité des Philistins. –  en Ashdod  : le nom semble ici désigner la région et non seulement la ville.'
  - type: text
    content: 'Il partit en guerre contre les Philistins et ouvrit des brèches dans la muraille de Gath, dans la muraille de Yabné et dans la muraille d''Ashdod. Il bâtit des villes en Ashdod et chez les Philistins. '
  '7':
  - type: note
    content: 'le secourut  : autre traduction l''aida  ; même verbe aux v. 13,15. –  les Arabes  : cf. 17.11n  ; Es 13.20n  ; Jr 3.2n. –  Gour-Baal  : localité inconnue ; LXX a traduit sur le rocher (la ville de Pétra ?). –  les Maonites  : habitants de Maôn ; cf. 20.1n  ; Jos 15.55.'
  - type: text
    content: 'Dieu le secourut contre les Philistins, contre les Arabes qui habitaient à Gour-Baal, et contre les Maonites. '
  '8':
  - type: note
    content: 'Les Ammonites  : peuple de Transjordanie ; LXX les Maonites (cf. v. 7n) ou Minéens (cf. Jb 2.11n). –  présents  : cf. 9.24+. –  sa renommée s''étendit  : litt. son nom alla.'
  - type: text
    content: 'Les Ammonites faisaient des présents à Ozias, et sa renommée s''étendit jusqu''aux abords de l''Egypte, car il devint fort, il s''éleva très haut. '
  '9':
  - type: note
    content: la porte de l'Angle, au nord (25.23) ; la porte de la Vallée, peut-être au sud-ouest (Né 2.13-15 ; 3.13) ; l'Encoignure, peut-être au nord-est (Né 3.19-25).
  - type: text
    content: 'Ozias bâtit des tours à Jérusalem sur la porte de l''Angle, sur la porte de la Vallée et sur l''Encoignure, et il les fortifia. '
