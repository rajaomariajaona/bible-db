  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un salut qui n'a pas de fin
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 27.60/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poursuivez la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'So 2.3 ; Mt 5.6 ; 6.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rocher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 17.10+ ; Dt 32.18. – Le mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'creux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est apparenté à celui qui désigne la femme en Gn 1.27 ; cf. v. 2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tranchée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: citerne.
      marker-yv: yv-n
    - type: text
      text: Ecoutez-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui poursuivez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui cherchez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Portez les regards sur le rocher
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'où vous avez été taillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le creux de la tranchée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'où vous avez été tirés.
