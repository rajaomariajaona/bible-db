      - type: usfm
        marker: ft
        children:
        - type: text
          text: 35.10.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi ceux que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a libérés reviendront,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils arriveront à Sion avec des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une joie perpétuelle couronnera leur tête ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la gaieté et la joie viendront à leur rencontre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le chagrin et les gémissements s'enfuiront.
