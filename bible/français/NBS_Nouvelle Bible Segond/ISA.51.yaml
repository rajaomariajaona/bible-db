        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 38.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abîme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '63.13 ; Gn 1.2. Ici comme au v. 9 la victoire du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' sur l''Egypte est associée à son œuvre créatrice ; voir également 27.1 ; Ps 89.10s ; 104.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un chemin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.16 ; Ex 14.21s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gens rédimés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'délivrés, bénéficiaires d''une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: rédemption
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 35.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: N'est-ce pas toi qui mis la mer à sec,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les eaux du grand abîme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui frayas dans les profondeurs de la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un chemin pour le passage des gens rédimés ?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
