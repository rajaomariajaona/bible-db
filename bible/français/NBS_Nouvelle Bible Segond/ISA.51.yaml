    - type: text
      text: C'est moi, moi seul, qui vous console.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui es-tu, pour avoir peur de l'homme mortel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'être humain, dont le sort est celui de l'herbe ?
