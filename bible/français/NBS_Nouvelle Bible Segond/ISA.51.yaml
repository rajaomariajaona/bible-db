document_id: ISA.51,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un salut qui n'a pas de fin
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 27.60/ /. –  poursuivez la justice So 2.3 ; Mt 5.6 ; 6.33. –  rocher cf. 17.10+ ; Dt 32.18. – Le mot traduit par creux est apparenté à celui qui désigne la femme en Gn 1.27 ; cf. v. 2. –  tranchée ou citerne.
  - type: text
    content: Ecoutez-moi,
  - type: text
    content: vous qui poursuivez la justice,
  - type: text
    content: 'qui cherchez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Portez les regards sur le rocher
  - type: text
    content: d'où vous avez été taillés,
  - type: text
    content: sur le creux de la tranchée
  - type: text
    content: d'où vous avez été tirés.
  '10':
  - type: text
    content: ' '
  - type: note
    content: mer 50.2+ ; dans ce contexte cf. Jb 7.12n  ; 38.8. –  abîme 63.13 ; Gn 1.2. Ici comme au v. 9 la victoire du Seigneur sur l'Egypte est associée à son œuvre créatrice ; voir également 27.1 ; Ps 89.10s ; 104.7. –  un chemin 43.16 ; Ex 14.21s. –  gens rédimés ou délivrés, bénéficiaires d'une rédemption  ; cf. 35.9n.
  - type: text
    content: N'est-ce pas toi qui mis la mer à sec,
  - type: text
    content: les eaux du grand abîme,
  - type: text
    content: qui frayas dans les profondeurs de la mer
  - type: text
    content: un chemin pour le passage des gens rédimés ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 35.10.
  - type: text
    content: 'Ainsi ceux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a libérés reviendront,'
  - type: text
    content: ils arriveront à Sion avec des cris de joie,
  - type: text
    content: une joie perpétuelle couronnera leur tête ;
  - type: text
    content: la gaieté et la joie viendront à leur rencontre,
  - type: text
    content: le chagrin et les gémissements s'enfuiront.
  '12':
  - type: text
    content: ' '
  - type: note
    content: C'est moi, moi seul (41.4n  ; 43.25) , qui vous console 40.1+. –  de l'être humain ou de l'homme  ; cf. Gn 1.26n. –  herbe 40.6+.
  - type: text
    content: C'est moi, moi seul, qui vous console.
  - type: text
    content: Qui es-tu, pour avoir peur de l'homme mortel,
  - type: text
    content: de l'être humain, dont le sort est celui de l'herbe ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Tu oublierais  : cf. Dt 32.15. –  qui te fait 43.7+. –  qui déploie le ciel… 42.5n  ; cf. Za 12.1. –  constante  : cf. 52.5 ; Jb 15.20.'
  - type: text
    content: 'Tu oublierais le '
  - type: text
    content: Seigneur
  - type: text
    content: ', celui qui te fait,'
  - type: text
    content: qui déploie le ciel et fonde la terre !
  - type: text
    content: Tu serais dans une frayeur continuelle, constante,
  - type: text
    content: devant la fureur de l'oppresseur,
  - type: text
    content: comme lorsqu'il s'apprête à détruire !
  - type: text
    content: Où donc est la fureur de l'oppresseur ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'dans un cachot  : sous-entendu dans le texte. –  fosse Ps 16.10.'
  - type: text
    content: Bientôt celui qui est courbé dans un cachot sera élargi ;
  - type: text
    content: il ne mourra pas dans la fosse,
  - type: text
    content: et il ne manquera pas de pain.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ton Dieu 55.5 ; 60.9. –  qui agite  : autres traductions qui fend ; qui apaise  ; cf. Jr 31.35 ; Jb 26.12. –  le Seigneur (YHWH) des Armées 44.6+.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: qui agite la mer et fais gronder ses flots.
  - type: text
    content: '– Son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées. –'
  '16':
  - type: text
    content: ' '
  - type: note
    content: mes paroles dans ta bouche 59.21 ; Dt 18.18+ ; Jr 1.9. –  je t'ai couvert… 49.2.
  - type: text
    content: J'ai mis mes paroles dans ta bouche
  - type: text
    content: et je t'ai couvert de l'ombre de ma main,
  - type: text
    content: en étendant un ciel et en fondant une terre,
  - type: text
    content: 'en disant à Sion : Tu es mon peuple !'
  - type: heading
    content: Le Seigneur va relever Jérusalem
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Eveille-toi v. 9+. –  la coupe de sa fureur  : cf. 42.25 ; Jr 25.15-29 ; 49.12 ; Ez 23.31-34 ; Ps 75.9 ; Lm 4.21. –  qui as vidé…  : litt. qui as sucé le calice de la coupe (de même au v. 22) d''étourdissement  ; cf. Ps 60.5 ; Ap 14.10.'
  - type: text
    content: Eveille-toi, éveille-toi !
  - type: text
    content: Lève-toi, Jérusalem,
  - type: text
    content: 'toi qui as bu de la main du '
  - type: text
    content: Seigneur
  - type: text
    content: la coupe de sa fureur,
  - type: text
    content: toi qui as bu, qui as vidé jusqu'au fond
  - type: text
    content: la coupe d'étourdissement !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'De tous les fils 49.21s ; 60.4. –  la conduire  : cf. 40.11 ; 49.10.'
  - type: text
    content: De tous les fils qu'elle a mis au monde,
  - type: text
    content: il n'y en a aucun pour la conduire ;
  - type: text
    content: de tous les fils qu'elle a élevés,
  - type: text
    content: il n'y en a aucun pour la prendre par la main.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ces deux choses 47.9. –  qui te plaindra ? Jr 15.5n. –  ravage / désastre 59.7 ; 60.18 ; cf. Jr 4.6n. –  Qui suis-je pour te consoler ? Un ms de Qumrân et des versions anciennes portent qui te consolera ? Lm 1.2,9,16s.
  - type: text
    content: 'Ces deux choses te sont arrivées :'
  - type: text
    content: qui te plaindra ?
  - type: text
    content: Le ravage et le désastre,
  - type: text
    content: la famine et l'épée.
  - type: text
    content: Qui suis-je pour te consoler ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Abraham, votre père  : cf. 63.16 ; Rm 4.11s. –  Sara Gn 17.14ss. –  il était seul Ez 33.24+. –  béni / multiplié Gn 12.2+.'
  - type: text
    content: Portez les regards sur Abraham, votre père,
  - type: text
    content: et sur Sara qui vous a mis au monde ;
  - type: text
    content: car quand il était seul je l'ai appelé,
  - type: text
    content: puis je l'ai béni et multiplié.
  '20':
  - type: text
    content: ' '
  - type: note
    content: à tous les coins de rues Lm 2.19 ; 4.1. –  rabroués 50.2.
  - type: text
    content: Tes fils en défaillance
  - type: text
    content: gisaient à tous les coins de rues,
  - type: text
    content: comme une antilope dans un filet,
  - type: text
    content: 'chargés de la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: rabroués par ton Dieu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'malheureuse  : autres traductions pauvre (fille) ; humiliée 54.11 ; cf. 14.32 ; 32.17 ; 48.10 ; 49.13. –  ivre… 29.9.'
  - type: text
    content: Ecoute, je te prie, malheureuse,
  - type: text
    content: toi qui es ivre – mais ce n'est pas de vin !
  '22':
  - type: text
    content: ' '
  - type: note
    content: V. 17.
  - type: text
    content: 'Ainsi parle ton Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: 'ton Dieu, qui défend la cause de son peuple :'
  - type: text
    content: Je prends de ta main
  - type: text
    content: la coupe d'étourdissement,
  - type: text
    content: le fond de la coupe de ma fureur ;
  - type: text
    content: tu ne le boiras plus !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Courbe-toi…  : allusion à une pratique d''humiliation des vaincus, sans doute semblable à celle que décrit Jos 10.24.'
  - type: text
    content: Je la mettrai dans la main de ceux qui te causaient du chagrin,
  - type: text
    content: 'qui te disaient : Courbe-toi, que nous passions !'
  - type: text
    content: Tu leur offrais ton dos comme le sol,
  - type: text
    content: comme la rue est offerte aux passants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'console 40.1+. –  désert 41.18+. –  Eden Gn 2.8+ ; cf. Ap 2.7 ; 22.2. –  plaine aride 33.9n. –  gaieté / joie  : cf. Jr 33.11 ; Ps 51.10. –  la louange ou l''action de grâces , terme habituellement traduit par reconnaissance (cf. Lv 7.12n  ; Jr 17.26 ; Ps 26.7n). –  le chant des psaumes  : même terme en 12.2+ ; voir Ps 7.18n.'
  - type: text
    content: 'Ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' console Sion,'
  - type: text
    content: il console toutes ses ruines ;
  - type: text
    content: il rendra son désert semblable à l'Eden
  - type: text
    content: 'et sa plaine aride au jardin du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: On trouvera en elle la gaieté et la joie,
  - type: text
    content: la louange et le chant des psaumes.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'attention 42.23. –  peuple / nation  : quelques mss portent peuples… nations. –  de moi sortira la loi  : cf. 2.3n  ; 42.1nss. –  je ferai jaillir…  : traduction incertaine. En rattachant le dernier mot hébreu du v. au v. 5, on pourrait comprendre mon jugement (ou mon équité ; mon droit  ; cf. 42.1,3) sortira (ou s''imposera ) comme lumière des peuples (42.6+) . Soudain je fais approcher ma justice (ou soudain ma justice est proche ).'
  - type: text
    content: Prête attention à moi, mon peuple !
  - type: text
    content: prête l'oreille, ma nation !
  - type: text
    content: Car de moi sortira la loi ;
  - type: text
    content: je ferai jaillir mon jugement
  - type: text
    content: pour qu'il soit la lumière des peuples.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ma justice est proche 46.13+. –  va paraître  : litt. est sorti (cf. v. 4). –  îles 11.11+ ; cf. 42.4. –  bras v. 9+.'
  - type: text
    content: Ma justice est proche,
  - type: text
    content: mon salut va paraître
  - type: text
    content: et mes bras jugeront les peuples ;
  - type: text
    content: les îles mettent leur espérance en moi,
  - type: text
    content: elles attendent mon bras.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.21s ; Ps 102.26s ; Mt 5.18 ; 24.35 ; 2P 3.7-12. –  ses habitants… mouches  : cf. 40.22. –  ne sera pas brisée  : le même verbe hébreu, dans un sens différent, est traduit par être terrifié au v. 7.'
  - type: text
    content: Levez les yeux vers le ciel,
  - type: text
    content: puis regardez sur la terre, en bas.
  - type: text
    content: Car le ciel se dissipera comme une fumée,
  - type: text
    content: la terre tombera en lambeaux comme un vêtement,
  - type: text
    content: et ses habitants mourront comme des mouches ;
  - type: text
    content: mais mon salut durera toujours,
  - type: text
    content: et ma justice ne sera pas brisée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ma loi dans ton cœur Dt 30.14 ; Jr 31.33. –  les outrages  : le même mot est traduit par déshonneur en 4.1n  ; 30.5 ; 47.3 ; cf. So 2.8.'
  - type: text
    content: Ecoutez-moi, vous qui connaissez la justice,
  - type: text
    content: peuple qui as ma loi dans ton cœur !
  - type: text
    content: Ne craignez pas les outrages des hommes
  - type: text
    content: et ne soyez pas terrifiés par leurs injures.
  '8':
  - type: text
    content: ' '
  - type: note
    content: mites 50.9+.
  - type: text
    content: Car les mites les dévoreront comme un vêtement,
  - type: text
    content: la teigne les dévorera comme de la laine ;
  - type: text
    content: mais ma justice durera toujours,
  - type: text
    content: et mon salut, de génération en génération.
  - type: heading
    content: Eveille-toi, bras du Seigneur  !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Eveille-toi… v. 17 ; 52.1 ; cf. Jg 5.12. –  bras du Seigneur v. 5 ; 40.10+. –  Rahav  : cf. 30.7n  ; Ps 89.11n  ; Jb 9.13n  ; 26.12. –  le dragon  : comme en 27.1+ ; une forme légèrement différente du même terme désigne le pharaon en Ez 29.3n.'
  - type: text
    content: Eveille-toi, éveille-toi !
  - type: text
    content: Revêts-toi de force,
  - type: text
    content: 'bras du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Eveille-toi, comme aux jours de jadis,
  - type: text
    content: au temps des générations d'autrefois !
  - type: text
    content: N'est-ce pas toi qui abattis Rahav,
  - type: text
    content: qui transperças le dragon ?
