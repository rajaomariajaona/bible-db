document_id: 1TI.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prier pour tous
  - type: text
    content: ' '
  - type: note
    content: 'J''encourage ou j''exhorte , 1.3+. –  prières… 5.5 ; Rm 12.12+ ; cf. Ep 6.18 ; Ph 4.6. –  supplications ou intercessions 4.5n. –  actions de grâces 2Co 4.15+. –  pour tous les humains  : cf. v. 4,6 ; Tt 2.11 ; voir aussi Ac 7.60 ; Tt 3.4.'
  - type: text
    content: 'J''encourage donc, en tout premier lieu, à faire des requêtes, des prières, des supplications et des actions de grâces pour tous les humains, '
  '10':
  - type: note
    content: 'œuvres bonnes 5.10 ; cf. 2Co 9.8 ; Ep 2.10 ; Col 1.10. –  comme il convient  : cf. 1Co 11.13 ; Ep 5.3 ; Tt 2.1 ; Hé 2.10 ; 7.26. –  qui se prétendent  : le même verbe (aussi en 6.21) est traduit ailleurs par promettre, Tt 1.2. –  pieuses  : terme apparenté à celui du v. 2+.'
  - type: text
    content: mais d'œuvres bonnes, comme il convient à des femmes qui se prétendent pieuses.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 's''instruise  : cf. 2Tm 3.7. –  en silence  : autre traduction dans le calme  ; un terme apparenté est traduit par paisible au v. 2+ ; cf. 5.13 ; voir aussi 1Co 14.34+s.'
  - type: text
    content: 'Que la femme s''instruise en silence, avec une entière soumission. '
  '12':
  - type: note
    content: 'dominer  : cf. Gn 3.16. –  l''homme  : autre traduction, moins probable, son mari.'
  - type: text
    content: 'Je ne permets pas à la femme d''enseigner, ni de dominer l''homme ; qu''elle demeure dans le silence. '
  '13':
  - type: note
    content: façonné ou formé, cf. Gn 1.27n  ; 2.7,18-24 ; 1Co 11.7ss.
  - type: text
    content: 'En effet, Adam a été façonné le premier, Eve ensuite ; '
  '14':
  - type: note
    content: 'Cf. Gn 3.6,13 ; 2Co 11.3 ; Siracide 25.24 : « La femme est à l''origine du péché et c''est à cause d''elle que tous nous mourons. » –  transgression  : voir péché.'
  - type: text
    content: 'et ce n''est pas Adam qui a été trompé, c''est la femme qui, trompée, s''est rendue coupable de transgression. '
  '15':
  - type: note
    content: 'Elle sera… sauvée  : cf. 4.16. –  en devenant mère  : litt. par l''enfantement, cf. 4.3 ; 5.14 ; Tt 2.3ss ; voir Gn 3.15s. –  si (cf. Dt 9.19) elle demeure  : litt. si elles demeurent (le texte passe peut-être d''Eve, le personnage biblique, aux femmes qu''elle représente) ou, moins probablement, s''ils (les enfants ?) demeurent… –  consécration ou sanctification Rm 6.19n,22 ; 1Th 3.12s ; 4.3ss ; Hé 12.14. –  pondération v. 9n.'
  - type: text
    content: Elle sera néanmoins sauvée en devenant mère, si elle demeure dans la foi, l'amour et la consécration, avec pondération.
  '2':
  - type: note
    content: 'pour les rois… Tt 3.1 ; cf. Jr 29.7 ; Esd 6.10 ; voir aussi Mc 13.9 ; Ac 9.15 ; 1Co 2.1 ; 1P 2.13-17 ; Baruch 1.11s : « Priez pour la vie de Nabuchodonosor, roi de Babylone, et celle de son fils Baltasar, afin que leurs jours soient comme les jours du ciel sur la terre. Alors le Seigneur nous donnera la force et illuminera nos yeux ; nous vivrons à l''ombre de Nabuchodonosor, roi de Babylone, et à l''ombre de son fils Baltasar, nous les servirons pendant de nombreux jours et nous trouverons grâce devant eux. » –  une position d''autorité  : le même terme est traduit par supériorité en 1Co 2.1 ; un terme apparenté qualifie les autorités « établies » en Rm 13.1 ; il est rendu par souverain en 1P 2.13. –  une vie paisible… 1Th 4.11+ ; cf. Jr 30.10. –  piété v. 10n  ; 3.16 ; 4.7s ; 5.4 ; 6.3,5s,11 ; 2Tm 3.5,12 ; Tt 1.1 ; 2.12 ; cf. Ac 3.12 ; 10.2n  ; 2P 1.3ss ; 3.11. –  dignité 3.4,8,11 ; Tt 2.2,7 ; voir aussi Ph 4.8.'
  - type: text
    content: 'pour les rois et pour tous ceux qui occupent une position d''autorité, afin que nous menions une vie paisible et tranquille, en toute piété et en toute dignité. '
  '3':
  - type: note
    content: 'Cela est beau 1.8n  ; cf. Tt 3.8. –  agréé de (litt. devant) : même terme 5.4 ; termes apparentés 1.15 (accueillir) ; Ph 4.18 ; cf. Dt 12.25,28. –  Dieu, notre Sauveur 1.1+.'
  - type: text
    content: 'Cela est beau et agréé de Dieu, notre Sauveur, '
  '4':
  - type: note
    content: 'qui veut  : cf. Ez 18.23 ; 33.11 ; 2P 3.9. –  que tous les humains (v. 1+) soient sauvés (1.1+) 4.10 ; Tt 2.11 ; cf. Rm 5.18 ; 11.32 ; 2Co 5.19 ; Tt 3.9. –  connaissance ou vraie connaissance, en grec épignosis  ; dans les Pastorales le terme correspondant (cf. Rm 1.28n  ; Col 1.9n  ; 2P 1.2n  ; 2Jn 1) semble réservé à la connaissance chrétienne ; cf. 2Tm 2.25 ; 3.7 ; Tt 1.1 ; Hé 10.26 ; le terme rendu plus couramment par connaissance (gnosis) n''y apparaît qu''en 1Tm 6.20, avec un sens péjoratif ; sur la vérité voir aussi 3.16 ; 4.3 ; 2Tm 2.15,18 ; 3.8 ; cf. Jn 8.32+ ; 2Co 6.7 ; Ga 2.5,14 ; 2Th 2.10-13.'
  - type: text
    content: qui veut que tous les humains soient sauvés et parviennent à la connaissance de la vérité.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.17+ ; 3.16. –  un seul Dieu  : cf. 1.17 ; Rm 3.29s ; 1Co 8.6+ ; voir aussi Dt 6.4ss ; Jc 2.19. –  médiateur Hé 8.6+ ; cf. Jn 14.6. –  l''humain Jésus-Christ  : litt. un humain (ou un homme ) , Jésus-Christ  ; autre traduction Jésus-Christ, l''être humain (6) qui s''est donné…  ; cf. Rm 5.15 ; 1Co 15.47 ; Ph 2.7s.'
  - type: text
    content: Car il y a un seul Dieu,
  - type: text
    content: et aussi un seul médiateur entre Dieu et les humains,
  - type: text
    content: l'humain Jésus-Christ,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'qui s''est donné  : cf. Ga 1.4 ; 2.20 ; Ep 5.2,25 ; Tt 2.14 ; voir aussi Mc 10.45/ / ; Jn 10.15ss. –  en rançon  : cf. Mc 10.45/ / ; voir aussi Es 53.11s ; Ps 49.8 ; Mt 16.26 ; Mc 14.24/ / ; Ep 1.7 ; Hé 9.15 ; 1P 1.18 ; 1Jn 2.2 ; voir aussi rédemption. –  pour tous 2Co 5.15. –  rendu  : sous-entendu dans le texte ; le témoignage peut être aussi bien celui de Jésus lui-même que celui de l''apôtre ; cf. 6.13 ; 1Co 1.6 ; 2.1 ; 2Tm 1.8 ; Ap 1.5 ; 3.14. –  en son temps  : même expression 6.15 ; Tt 1.3 ; cf. Rm 5.6 ; Ga 4.4 ; 6.9 ; Ep 1.10 ; 2Th 2.6 ; voir aussi Dn 2.21.'
  - type: text
    content: 'qui s''est donné lui-même en rançon pour tous :'
  - type: text
    content: c'est le témoignage rendu en son temps,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.11ss ; Rm 10.14s ; 2Co 5.18ss ; Ep 3.7s. –  institué 1.12+. –  héraut (terme apparenté au verbe traduit par proclamer en 3.16 ; cf. Mc 1.4n  ; 2Tm 4.2,17 ; Tt 1.3 ; 2P 2.5) / apôtre (1.1n) / maître (ou enseignant , traduction traditionnelle docteur , Ac 13.1n  ; 1Co 12.28ns ; Ep 4.11) 2Tm 1.11. –  je dis la vérité… Rm 9.1 ; 2Co 11.31 ; Ga 1.20. –  pour les non-Juifs  : litt. des nations, des païens Ac 9.15+ ; 10.45n  ; Rm 11.13 ; Ga 2.7ss. –  dans (ou selon, par, pour ) la foi et la vérité v. 4+.'
  - type: text
    content: en vue duquel, moi, j'ai été institué héraut, apôtre (je dis la vérité, je ne mens pas) et maître pour les non-Juifs, dans la foi et la vérité.
  - type: heading
    content: Hommes et femmes dans la communauté
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Je souhaite  : autre traduction je décide  ; 5.14 ; même verbe en 6.9n  ; Tt 3.8. –  les hommes , ici par opposition aux femmes (v. 9). –  prient v. 1+. –  en tout lieu 1Co 1.2 ; 2Co 2.14 ; 1Th 1.8 ; cf. Ml 1.11 ; 1Co 4.17 ; 7.17 ; 11.16 ; 14.33 ; voir aussi Jn 4.20s. –  élevant des mains  : cf. Ex 9.29 ; 1R 8.22 ; Ps 141.2 ; Lm 2.19 ; Esd 9.5. –  saintes (Ep 4.24n) ; autres traductions pures, propres  ; cf. Es 1.15s ; Ps 26.6 ; 73.13. –  discussions  : cf. 3.3 ; Ph 2.14s ; Jc 1.19ss ; voir aussi Mt 5.23s ; 6.14s ; 1P 3.7.'
  - type: text
    content: Je souhaite donc que les hommes prient en tout lieu, en élevant des mains saintes, sans colère ni discussions.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les femmes  : cf. 1Co 11.5ss ; Tt 2.3ss ; 1P 3.2ss. –  d''une manière décente  : le terme grec correspondant n''apparaît qu''ici et en 3.2n. –  discrétion  : le même terme, dans un sens plus général, est traduit par pondération au v. 15 et par bon sens en Ac 26.25 ; il est apparenté au substantif traduit par pondération en 2Tm 1.7 et à l''adjectif rendu par pondéré en 1Tm 3.2+ ; cf. Rm 12.3n.'
  - type: text
    content: 'De même aussi, que les femmes, vêtues d''une manière décente, avec pudeur et discrétion, se parent, non pas de tresses, d''or, de perles ou de toilettes somptueuses, '
