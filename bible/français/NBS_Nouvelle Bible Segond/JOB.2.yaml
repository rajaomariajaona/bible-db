  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à l''Adversaire : As-tu remarqué Job, mon serviteur ? Il n''y a personne comme lui sur la terre ; c''est un homme intègre et droit, qui craint Dieu et s''écarte du mal. Il demeure ferme dans son intégrité, alors que tu m''incites à l''engloutir sans raison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Peau pour peau ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sans doute un proverbe populaire qui rappelle la loi du talion (Ex 21.23-25 ; Lv 24.19-21). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 6 ; voir Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'L''Adversaire répondit au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Peau pour peau ! Tout ce que possède un homme, il le donne pour sa vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais étends ta main, je te prie, touche à ses os et à sa chair : à coup sûr, il te maudira en face ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
