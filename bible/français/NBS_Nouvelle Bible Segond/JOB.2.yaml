document_id: JOB.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Seconde épreuve de Job
  - type: text
    content: ' '
  - type: note
    content: 1.6-8n.
  - type: text
    content: 'Un jour, les fils de Dieu vinrent se présenter devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et l''Adversaire aussi vint au milieu d''eux pour se présenter devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '10':
  - type: note
    content: 'folle ou stupide  : sur le sens religieux de ce terme, cf. 1S 25.25 ; Ps 14.1. –  ne pécha pas 1.22.'
  - type: text
    content: 'Mais il lui répondit : Tu parles comme une folle ! Nous recevrions de Dieu le bonheur, et nous ne recevrions pas aussi le malheur ! En tout cela, Job ne pécha pas par ses lèvres.'
  - type: heading
    content: Trois amis de Job viennent le consoler
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'de son pays  : litt. de son lieu . –  Eliphaz le Témanite , c.-à-d. de Témân ; Gn 36.4,10s,15 ; 1Ch 1.36. Sur la réputation de sagesse associée à Témân, voir Jr 49.7 ; Ab 8s ; Shouhite / Naamatite  : habitants (ou descendants ?) de Shouah (cf. Gn 25.2 ; 1Ch 1.32) et de Naama (cf. Gn 4.22 ; Jos 15.42) ; ces autres noms de lieux ne sont pas identifiés avec certitude. Au lieu de Naamatite LXX porte Minéen , qui correspond habituellement au nom Maonite(s) (de même en 11.1 ; 20.1 ; 42.9,17n  ; 1Ch 4.41 ; 2Ch 26.7s). –  Ils se concertèrent  : autre traduction ils se retrouvèrent . –  le plaindre  : litt. hocher (la tête) pour lui , de même en 42.11 ; cf. Jr 15.5n.'
  - type: text
    content: 'Trois amis de Job apprirent tous les malheurs qui lui étaient arrivés ; ils vinrent chacun de son pays : Eliphaz le Témanite, Bildad le Shouhite et Tsophar le Naamatite. Ils se concertèrent pour aller le plaindre et le consoler. '
  '12':
  - type: note
    content: 'ne le reconnurent pas Es 52.14. –  déchirèrent…  : cf. 1.20n. –  vers le ciel, au-dessus de leur tête Ez 27.30+.'
  - type: text
    content: 'Ayant levé les yeux sur lui de loin, ils ne le reconnurent pas et se mirent à sangloter. Ils déchirèrent leurs manteaux et jetèrent de la poussière vers le ciel, au-dessus de leur tête. '
  '13':
  - type: note
    content: 'par terre Es 3.26+. –  personne ne lui dit un mot  : cf. Am 5.13 ; Lm 3.26 ; Mt 27.14/ /.'
  - type: text
    content: Ils s'assirent avec lui par terre, pendant sept jours et sept nuits ; personne ne lui dit un mot, car ils voyaient que sa douleur était très grande.
  '2':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : D''où viens-tu ? L''Adversaire répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : De parcourir la terre, pour m''y promener. '
  '3':
  - type: note
    content: Voir crainte. –  l'engloutir ou le détruire, cf. 10.8. –  sans raison ou pour rien, cf. 1.9n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : As-tu remarqué Job, mon serviteur ? Il n''y a personne comme lui sur la terre ; c''est un homme intègre et droit, qui craint Dieu et s''écarte du mal. Il demeure ferme dans son intégrité, alors que tu m''incites à l''engloutir sans raison. '
  '4':
  - type: note
    content: Peau pour peau ! sans doute un proverbe populaire qui rappelle la loi du talion (Ex 21.23-25 ; Lv 24.19-21). –  sa vie v. 6 ; voir Gn 1.20n.
  - type: text
    content: 'L''Adversaire répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Peau pour peau ! Tout ce que possède un homme, il le donne pour sa vie. '
  '5':
  - type: note
    content: 1.11n.
  - type: text
    content: 'Mais étends ta main, je te prie, touche à ses os et à sa chair : à coup sûr, il te maudira en face ! '
  '6':
  - type: note
    content: 'en ta main 1.12 ; cf. Lc 22.31. –  épargne sa vie  : litt. garde sa vie (v. 4+). Cf. 38.11.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à l''Adversaire : Eh bien, il est en ta main : seulement, épargne sa vie ! '
  '7':
  - type: note
    content: 'de devant  : cf. 1.12 (formule légèrement différente). –  ulcère malin (le mot est généralement traduit par mauvais) Ex 9.9n  ; Dt 28.27,35.'
  - type: text
    content: 'Alors l''Adversaire se retira de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il frappa Job d''un ulcère malin, depuis les pieds jusqu''au crâne. '
  '8':
  - type: note
    content: 'Cf. Lv 13.46. –  s''assit v. 12s ; cf. Ez 26.16. –  cendres  : cf. Es 58.5 ; Jon 3.6 ; Dn 9.3 ; Est 4.3.'
  - type: text
    content: 'Job prit un tesson pour se gratter et s''assit au milieu des cendres. '
  '9':
  - type: note
    content: 'Maudis 1.5n. Cf. Tobit 2.14 : « Alors elle (ma femme) me répliqua : “Où sont-elles tes aumônes ? Où sont-elles tes bonnes œuvres ? Tout ce qui t''arrive est bien clair.” » –  meurs (par un châtiment soudain préférable à une longue agonie) : cf. 24.24 ; Lv 24.11-14 ; 1R 21.13.'
  - type: text
    content: 'Sa femme lui dit : Tu demeures ferme dans ton intégrité ! Maudis donc Dieu et meurs ! '
