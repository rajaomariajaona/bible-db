    marker-yv: yv-n
  - type: text
    text: 'Alors l''Adversaire se retira de devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il frappa Job d''un ulcère malin, depuis les pieds jusqu''au crâne. '
