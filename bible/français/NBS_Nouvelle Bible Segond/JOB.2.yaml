    marker-yv: yv-n
  - type: text
    text: 'Job prit un tesson pour se gratter et s''assit au milieu des cendres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maudis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tobit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.14 : « Alors elle (ma femme) me répliqua : “Où sont-elles tes aumônes ? Où sont-elles tes bonnes œuvres ? Tout ce qui t''arrive est bien clair.” » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'meurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(par un châtiment soudain préférable à une longue agonie) : cf. 24.24 ; Lv 24.11-14 ; 1R 21.13.'
    marker-yv: yv-n
  - type: text
    text: 'Sa femme lui dit : Tu demeures ferme dans ton intégrité ! Maudis donc Dieu et meurs ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'folle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: stupide
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur le sens religieux de ce terme, cf. 1S 25.25 ; Ps 14.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pécha
      - type: text
        text: ' pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.22.
    marker-yv: yv-n
  - type: text
    text: 'Mais il lui répondit : Tu parles comme une folle ! Nous recevrions de Dieu le bonheur, et nous ne recevrions pas aussi le malheur ! En tout cela, Job ne pécha pas par ses lèvres.'
