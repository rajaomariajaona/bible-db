      - type: text
        text: 'en ta main '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.12 ; cf. Lc 22.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: épargne sa vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'garde sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 4+). Cf. 38.11.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à l''Adversaire : Eh bien, il est en ta main : seulement, épargne sa vie ! '
  - type: usfm
