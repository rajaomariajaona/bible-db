  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 3.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: personne ne lui dit un mot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Am 5.13 ; Lm 3.26 ; Mt 27.14/ /.'
    marker-yv: yv-n
  - type: text
    text: Ils s'assirent avec lui par terre, pendant sept jours et sept nuits ; personne ne lui dit un mot, car ils voyaient que sa douleur était très grande.
