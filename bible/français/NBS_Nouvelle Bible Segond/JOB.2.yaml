  - type: text
    text: 'Trois amis de Job apprirent tous les malheurs qui lui étaient arrivés ; ils vinrent chacun de son pays : Eliphaz le Témanite, Bildad le Shouhite et Tsophar le Naamatite. Ils se concertèrent pour aller le plaindre et le consoler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne le reconnurent pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 52.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: déchirèrent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vers le ciel, au-dessus de leur tête '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ez 27.30+.
    marker-yv: yv-n
  - type: text
    text: 'Ayant levé les yeux sur lui de loin, ils ne le reconnurent pas et se mirent à sangloter. Ils déchirèrent leurs manteaux et jetèrent de la poussière vers le ciel, au-dessus de leur tête. '
  - type: usfm
    marker: vlbl
