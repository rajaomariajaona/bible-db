      - type: text
        text: '1.11s : « Priez pour la vie de Nabuchodonosor, roi de Babylone, et celle de son fils Baltasar (= Belshatsar), afin que leurs jours soient comme les jours du ciel sur la terre. Alors le Seigneur nous donnera la force et illuminera nos yeux ; nous vivrons à l''ombre de Nabuchodonosor, roi de Babylone, et à l''ombre de son fils Baltasar, nous les servirons pendant de nombreux jours et nous trouverons grâce devant eux. »'
    marker-yv: yv-n
  - type: text
    text: 'Recherchez la paix de la ville où je vous ai exilés et intercédez pour elle auprès du '
  - type: usfm
