document_id: JER.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Lettre de Jérémie aux premiers exilés
  - type: text
    content: ' '
  - type: note
    content: La Lettre de Jérémie qui accompagne le livre de Baruch se présente d'une manière analogue, mais à l'intention de la dernière vague d'exilés (587/6 av. J.-C.). Il s'agit ici de l'exil précédent (597) ; cf. v. 2 et 24.1+ ; 28.1-4 ; 52.28.
  - type: text
    content: 'Voici les termes de la lettre que Jérémie, le prophète, envoya de Jérusalem au reste des anciens qui avaient été exilés, aux prêtres, aux prophètes et à tout le peuple que Nabuchodonosor avait exilés de Jérusalem à Babylone, '
  '10':
  - type: note
    content: 'écoulés  : litt. remplis ou accomplis 25.11+ ; cf. Dn 9.2. –  j''interviendrai pour vous 6.15n  ; cf. 27.22. –  je réaliserai ou je confirmerai  ; cf. 23.20. –  ma bonne parole ou ma parole de bonheur  ; cf. 33.14.'
  - type: text
    content: 'Mais ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Dès que soixante-dix ans seront écoulés pour Babylone, j''interviendrai pour vous et je réaliserai à votre égard ma bonne parole en vous ramenant en ce lieu. '
  '11':
  - type: note
    content: Cf. 24.5 ; 33.6. –  les plans ou les pensées  ; cf. 18.12n  ; Es 55.7nss. –  paix v. 7n. –  avenir et un espoir 31.17.
  - type: text
    content: 'Je connais, moi, les plans que je prépare à votre intention – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –, non pas des plans de malheur, mais des plans de paix, afin de vous donner un avenir et un espoir. '
  '12':
  - type: note
    content: '33.3 ; Mc 11.24. –  vous pourrez partir  : litt. vous irez, sens incertain (expression omise par LXX et Syr).'
  - type: text
    content: 'Alors, vous m''invoquerez, et vous pourrez partir ; vous me prierez, et je vous entendrai. '
  '13':
  - type: note
    content: 'Dt 4.29 ; Es 55.6 ; Am 5.4 ; 1Ch 28.9 ; 2Ch 15.2-4 ; Mt 7.7s/ / ; cf. Sagesse 6.12-16 : « La Sagesse… se laisse voir aisément par ceux qui l''aiment et trouver par ceux qui la cherchent. Elle devance ceux qui la désirent, en se faisant connaître la première. Quiconque part tôt vers elle ne se fatiguera pas : il la trouvera assise à sa porte… Car, de son côté, elle circule en quête de ceux qui sont dignes d''elle, elle leur apparaît avec bienveillance sur leurs sentiers et, dans chacune de leurs pensées, elle vient à leur rencontre. » –  vous me trouverez  : litt. vous trouverez. – Voir cœur.'
  - type: text
    content: 'Vous me rechercherez et vous me trouverez, car vous me chercherez de tout votre cœur. '
  '14':
  - type: note
    content: 'je rétablirai (le même verbe est traduit ailleurs par revenir, ramener  ; cf. 3.12n  ; 23.3n) votre situation  : l''expression correspondante, où le verbe et le complément font assonance, revient en 30.3,18 ; 31.23 ; 32.44 ; 33.7,11,26 ; 48.47n  ; 49.6,39 ; Dt 30.3n  ; Ez 16.53 ; 29.14 ; 39.25 ; Os 6.11 ; Jl 4.1 ; Am 9.14 ; Ps 14.7 ; 53.7 ; 85.2 ; cf. Jb 42.10 ; Lm 2.14n.'
  - type: text
    content: 'Je me laisserai trouver par vous – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et je rétablirai votre situation ; je vous rassemblerai de toutes les nations et de tous les lieux où je vous ai bannis, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et je vous ramènerai en ce lieu d''où je vous ai exilés.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 21-23.
  - type: text
    content: 'Cependant vous dites : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a suscité des prophètes à Babylone !'
  '16':
  - type: text
    content: 'Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au roi installé sur le trône de David, à tout le peuple installé dans cette ville, à vos frères qui ne sont pas allés avec vous en exil ; '
  '17':
  - type: note
    content: épée / famine / peste 14.12+. –  figues éclatées (autres traductions mauvaises, pourries) cf. 24.1-10.
  - type: text
    content: 'ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : J''envoie parmi eux l''épée, la famine et la peste, et je les rendrai semblables à des figues éclatées qui ne peuvent être mangées tant elles sont mauvaises. '
  '18':
  - type: note
    content: 'un sujet de terreur… 15.4+. –  une formule d''adjuration  : autre traduction un sujet de malédiction  ; même terme en 42.18 ; 44.12 ; il évoque une malédiction (voir bénédiction, malédiction) conditionnelle, censée s''accomplir en cas de transgression, de révolte, de parjure ou de trahison ; cette malédiction conditionnelle fait partie intégrante du serment et de l''alliance. En l''occurrence, le sort des infidèles sera si terrible qu''il servira de référence en matière de malédiction ; cf. v. 22 ; 23.10n  ; 24.9n  ; sur le terme hébreu correspondant, voir Gn 24.41n  ; Lv 5.1n  ; Nb 5.21nss ; Dt 29.11n. –  sifflement 18.16n.'
  - type: text
    content: 'Je les poursuivrai avec l''épée, la famine et la peste, je ferai d''eux un sujet de terreur pour tous les royaumes de la terre, une formule d''adjuration, un sujet d''atterrement, de sifflement d''horreur et d''outrage parmi toutes les nations où je les bannirai, '
  '19':
  - type: note
    content: 7.13n,25+. –  vous n'avez pas écouté ou, d'après certains mss grecs et Syr, ils n'ont pas écouté  ; cf. Dt 18.19.
  - type: text
    content: 'parce qu''ils n''ont pas écouté mes paroles, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – eux à qui j''ai envoyé mes serviteurs, les prophètes, à qui je les ai envoyés, inlassablement ; vous n''avez pas écouté – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: Jékonia 22.24n. –  grande dame 13.18n. –  hauts fonctionnaires ou eunuques, de même en 34.19 ; 38.7 ; 41.16 ; 52.25 ; cf. Gn 37.36n  ; Est 1.10n.
  - type: text
    content: 'après que le roi Jékonia, la grande dame, les hauts fonctionnaires, les princes de Juda et de Jérusalem, les charpentiers et les serruriers furent sortis de Jérusalem. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1,4 ; 31.10.
  - type: text
    content: 'Mais vous tous, exilés, vous que j''ai envoyés de Jérusalem à Babylone, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '21':
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël, au sujet d''Achab, fils de Qolaya, et au sujet de Sédécias, fils de Maaséya, qui vous annoncent en prophètes le mensonge en mon nom : Je les livre à Nabuchodonosor, roi de Babylone, et il les fera abattre sous vos yeux. '
  '22':
  - type: note
    content: 'une malédiction  : cf. v. 18 ; 24.9n  ; Es 65.15.'
  - type: text
    content: 'On tirera d''eux une malédiction pour tous les exilés de Juda qui sont à Babylone, en disant : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te traite comme Sédécias et comme Achab, que le roi de Babylone a fait rôtir au feu ! '
  '23':
  - type: note
    content: 'une folie en Israël Gn 34.7n. –  adultère 9.1+ ; 23.10. –  le mensonge  : le terme correspondant est absent de LXX, qui porte ils ont parlé en mon nom…  ; cf. Es 59.3+. –  pas donné d''ordre  : cf. 14.14+. –  j''en suis témoin  : cf. 15.15.'
  - type: text
    content: 'Car ils ont commis une folie en Israël, en se rendant coupables d''adultère avec la femme de leur prochain, et ils ont proféré le mensonge en mon nom, alors que je ne leur avais pas donné d''ordre. Je le sais et j''en suis témoin – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Contre Shemaya, prophète en exil
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Texte incertain ; les versions anciennes ont d''importantes variantes. –  Shemaya  : hébreu Shemayahou  ; cf. v. 31ss.'
  - type: text
    content: 'Tu diras à Shemaya de Néhélam : '
  '25':
  - type: note
    content: 'Sophonie 21.1+. –  les autres prêtres  : litt. les prêtres.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Tu as envoyé en ton nom à tout le peuple de Jérusalem, à Sophonie, fils de Maaséya, le prêtre, et à tous les autres prêtres, des lettres ainsi conçues : '
  '26':
  - type: note
    content: 'Cf. 20.2,6n. –  que tu exerces une surveillance  : autre forme du terme traduit par inspecteur en 20.1 ; 52.25.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a fait prêtre à la place de Joïada, le prêtre, afin que tu exerces une surveillance dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et que tu fasses mettre aux entraves et au carcan tout homme qui délire et fait le prophète. '
  '27':
  - type: note
    content: 'donc  : autre traduction maintenant. –  rabroué ou sévi contre  ; cf. Gn 37.10 ; Rt 2.16 ; voir aussi Es 17.13+. –  Jérémie l''Anatotite 1.1n.'
  - type: text
    content: 'Pourquoi donc n''as-tu pas rabroué Jérémie l''Anatotite, qui fait le prophète parmi vous, '
  '28':
  - type: note
    content: V. 1-5.
  - type: text
    content: 'qui nous a même envoyé, à Babylone, le message suivant : Ce sera long ! Bâtissez des maisons et habitez-les ; plantez des jardins et mangez-en le fruit !'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'à Jérémie  : litt. aux oreilles de Jérémie  ; autre traduction en présence de Jérémie  ; cf. 36.6n.'
  - type: text
    content: 'Sophonie, le prêtre, lut cette lettre à Jérémie, le prophète. '
  '3':
  - type: note
    content: 'Shaphân 26.24+. –  Hilqiya  : cf. 2R 22.4-20.'
  - type: text
    content: 'Il la remit à Eléasa, fils de Shaphân, et à Guemaria, fils de Hilqiya, que Sédécias, roi de Juda, avait envoyés à Babylone auprès de Nabuchodonosor, roi de Babylone. Elle disait :'
  '30':
  - type: note
    content: 1.2n.
  - type: text
    content: 'Et la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie : '
  '31':
  - type: note
    content: Cf. v. 9 ; 13.25+ ; 14.14+ ; 28.15. –  parle en prophète 2.8n.
  - type: text
    content: 'Fais dire à tous les exilés : Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet de Shemaya de Néhélam : Parce que Shemaya vous parle en prophète sans que je l''aie envoyé, et qu''il vous incite à mettre votre confiance dans un mensonge, '
  '32':
  - type: note
    content: 'il ne verra pas (comme en Ps 22.18n) le bien (ou le bonheur) ; cf. 17.6. –  déclaration…  : la fin du v. est omise par LXX. –  subversion 28.16+ ; Dt 13.6n.'
  - type: text
    content: 'ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je vais faire rendre des comptes à Shemaya de Néhélam et à ses descendants ; aucun des siens n''habitera au milieu de ce peuple, et il ne verra pas le bien que je ferai à mon peuple, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car il a appelé à la subversion contre le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 20. –  Voici ce que dit  : la formule correspondante (aussi v. 16,31) est habituellement traduite par ainsi parle (p. ex. v. 8,10,17).'
  - type: text
    content: 'Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël, à tous les exilés, ceux que j''ai exilés de Jérusalem à Babylone : '
  '5':
  - type: note
    content: V. 28 ; cf. Es 65.21 ; Am 9.14.
  - type: text
    content: 'Bâtissez des maisons et habitez-les ; plantez des jardins et mangez-en le fruit. '
  '6':
  - type: note
    content: 'en mariage  : litt. à des hommes  ; cf. 27.7. –  multipliez-vous / ne diminuez pas cf. 3.16+ ; 30.19 ; Gn 1.28 ; 9.1,7.'
  - type: text
    content: 'Mariez-vous et engendrez des fils et des filles ; mariez vos fils et donnez vos filles en mariage, pour qu''elles mettent au monde des fils et des filles ; multipliez-vous là où vous êtes et ne diminuez pas. '
  '7':
  - type: note
    content: 'Recherchez la paix (ou le bien-être, la prospérité, 4.10n) : cf. Dt 23.7 ; Esd 9.12 ; voir aussi Ps 34.15 (autre verbe). –  de la ville  : LXX du pays. –  votre paix dépendra de la sienne  : litt. dans sa paix il y aura paix pour vous  ; cf. Esd 6.10+ ; 1Tm 2.1s ; Baruch 1.11s : « Priez pour la vie de Nabuchodonosor, roi de Babylone, et celle de son fils Baltasar (= Belshatsar), afin que leurs jours soient comme les jours du ciel sur la terre. Alors le Seigneur nous donnera la force et illuminera nos yeux ; nous vivrons à l''ombre de Nabuchodonosor, roi de Babylone, et à l''ombre de son fils Baltasar, nous les servirons pendant de nombreux jours et nous trouverons grâce devant eux. »'
  - type: text
    content: 'Recherchez la paix de la ville où je vous ai exilés et intercédez pour elle auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ', car votre paix dépendra de la sienne.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ne prêtez pas attention  : litt. n''écoutez pas  ; cf. 23.16+ ; 27.9n  ; Mt 7.15 ; 24.4/ /.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Ne vous laissez pas tromper par vos prophètes, ceux qui sont parmi vous, ni par vos devins ; ne prêtez pas attention aux rêves que vous faites ! '
  '9':
  - type: note
    content: mensongèrement… v. 31 ; 5.31n  ; 13.25+. –  parlent en prophètes 2.8n. –  pas envoyés 14.14+ ; 28.15.
  - type: text
    content: 'Car c''est mensongèrement qu''ils vous parlent en prophètes en mon nom. Je ne les ai pas envoyés – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
