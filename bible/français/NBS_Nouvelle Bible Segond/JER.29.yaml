  - type: text
    text: 'Je les poursuivrai avec l''épée, la famine et la peste, je ferai d''eux un sujet de terreur pour tous les royaumes de la terre, une formule d''adjuration, un sujet d''atterrement, de sifflement d''horreur et d''outrage parmi toutes les nations où je les bannirai, '
