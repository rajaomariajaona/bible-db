  - type: text
    text: 'Voici les termes de la lettre que Jérémie, le prophète, envoya de Jérusalem au reste des anciens qui avaient été exilés, aux prêtres, aux prophètes et à tout le peuple que Nabuchodonosor avait exilés de Jérusalem à Babylone, '
