        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.12-16 : « La Sagesse… se laisse voir aisément par ceux qui l''aiment et trouver par ceux qui la cherchent. Elle devance ceux qui la désirent, en se faisant connaître la première. Quiconque part tôt vers elle ne se fatiguera pas : il la trouvera assise à sa porte… Car, de son côté, elle circule en quête de ceux qui sont dignes d''elle, elle leur apparaît avec bienveillance sur leurs sentiers et, dans chacune de leurs pensées, elle vient à leur rencontre. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous me trouverez
    - type: usfm
      marker: ft
      children:
