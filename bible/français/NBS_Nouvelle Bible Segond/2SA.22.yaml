          text: de sa colère.
      marker-yv: yv-n
    - type: text
      text: Le lit de la mer apparut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fondations du monde furent mises à découvert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'quand le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les rabroua'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par son souffle, par le vent de ses narines.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: D'en haut il tend la main, il me saisit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me retire des grandes eaux ;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: il me délivre de mon ennemi puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ceux qui me détestent et qui sont plus forts que moi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils se tenaient devant moi le jour où la catastrophe s'abattait sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
