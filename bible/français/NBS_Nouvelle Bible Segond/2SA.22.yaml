document_id: 2SA.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Psaume de David
  - type: heading
    content: Ps 18.1-51
  - type: text
    content: ' '
  - type: note
    content: ce chant se retrouve sous une forme très semblable en Ps 18 (voir les notes). L'annotation de 2S 22 relève essentiellement les différences entre les deux textes.
  - type: text
    content: 'David prononça pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les paroles de ce chant, le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''eut délivré de la main de tous ses ennemis et de la main de Saül.'
  '10':
  - type: text
    content: Il inclina le ciel et descendit
  - type: text
    content: avec une épaisse nuée sous ses pieds.
  '11':
  - type: text
    content: ' '
  - type: note
    content: keroub Gn 3.24n. –  il paraissait remplace il planait de Ps 18.11.
  - type: text
    content: Il était monté sur un keroub et il volait,
  - type: text
    content: il paraissait sur les ailes du vent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'une hutte  : litt. des huttes  ; certains mss hébreux et des versions anciennes ont lu sa hutte ou sa cachette, sa hutte  ; cf. Ps 18.12. –  amas  : le sens du mot hébreu est très incertain. On a aussi proposé la traduction filtre , décrivant les nuages comme une sorte de tamis ou de crible qui transforment la masse des eaux d''en haut (Gn 1.6ns) en gouttes de pluie ; certains modifient le texte hébreu traditionnel d''après le parallèle de Ps 18.12 ( eaux ténébreuses ).'
  - type: text
    content: Il faisait des ténèbres une hutte tout autour de lui,
  - type: text
    content: – un amas d'eau, de sombres nuages.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 18.13 de la clarté qui le précédait provenaient des nuages, de la grêle et des braises.
  - type: text
    content: Dans la clarté qui le précédait
  - type: text
    content: s'allumaient des braises.
  '14':
  - type: text
    content: ' '
  - type: note
    content: A la fin du v., Ps 18.14 ajoute avec la grêle et les braises.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tonna depuis le ciel,'
  - type: text
    content: le Très-Haut fit retentir sa voix.
  '15':
  - type: text
    content: ' '
  - type: note
    content: un éclair remplace il multiplia les éclairs (Ps 18.15n).
  - type: text
    content: Il lança des flèches et il les dispersa,
  - type: text
    content: un éclair, et il les frappa de panique.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'de la mer remplace des eaux de Ps 18.16. –  quand le Seigneur … ses narines  : le texte de Ps 18.16 est à la 2e personne quand tu les rabrouas, Seigneur, par ton souffle, par le vent de tes narines . –  de ses narines  : autre traduction de sa colère.'
  - type: text
    content: Le lit de la mer apparut,
  - type: text
    content: les fondations du monde furent mises à découvert,
  - type: text
    content: 'quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les rabroua'
  - type: text
    content: par son souffle, par le vent de ses narines.
  '17':
  - type: text
    content: D'en haut il tend la main, il me saisit,
  - type: text
    content: il me retire des grandes eaux ;
  '18':
  - type: text
    content: il me délivre de mon ennemi puissant,
  - type: text
    content: de ceux qui me détestent et qui sont plus forts que moi.
  '19':
  - type: text
    content: Ils se tenaient devant moi le jour où la catastrophe s'abattait sur moi,
  - type: text
    content: 'mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était mon appui.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Il dit  : Ps 18.2 ajoute je t''aime, Seigneur, ma force ! On pourrait aussi traduire ce verset comme une invocation  : Seigneur, mon roc…  ; cf. Ps 18.3n.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est mon roc, ma forteresse, mon libérateur,'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'il a pris plaisir en moi  : autre traduction je lui ai plu  ; cf. 15.26n  ; Nb 14.8 ; 1R 10.9 ; Mt 3.17n.'
  - type: text
    content: Il m'a fait sortir pour me mettre au large,
  - type: text
    content: il m'a délivré, car il a pris plaisir en moi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: traité selon ma justice 1R 8.32 ; 2Ch 6.23.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a traité selon ma justice,'
  - type: text
    content: il m'a récompensé selon la pureté de mes mains,
  '22':
  - type: text
    content: 'car j''ai gardé les voies du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je ne me suis pas éloigné de mon Dieu comme les méchants.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'je ne m''écarte pas de remplace je n''écarte pas de moi de Ps 18.23. –  prescriptions  : voir loi.'
  - type: text
    content: Toutes ses règles sont devant moi,
  - type: text
    content: et je ne m'écarte pas de ses prescriptions.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'faute  : voir péché.'
  - type: text
    content: J'ai été intègre envers lui,
  - type: text
    content: et je me suis gardé de toute faute.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ma pureté remplace la pureté de mes mains de Ps 18.25. –  en sa présence  : litt. devant ses yeux.'
  - type: text
    content: 'Aussi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a rendu selon ma justice,'
  - type: text
    content: selon ma pureté en sa présence.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme vaillant  : autres traductions le héros ; le guerrier  ; certains mss, LXX et Syr portent simplement l''homme intègre , comme Ps 18.26.'
  - type: text
    content: Avec celui qui est fidèle tu te montres fidèle,
  - type: text
    content: avec l'homme vaillant qui est intègre tu te montres intègre,
  '27':
  - type: text
    content: avec celui qui est pur tu te montres pur,
  - type: text
    content: et avec celui qui est tortueux tu te montres retors.
  '28':
  - type: text
    content: ' '
  - type: note
    content: de ton regard, tu abaisses les hautains remplace (toi qui) abaisses les regards hautains de Ps 18.28.
  - type: text
    content: Tu sauves le peuple affligé ;
  - type: text
    content: de ton regard, tu abaisses les hautains.
  '29':
  - type: text
    content: ' '
  - type: note
    content: qui es ma lampe remplace qui fais briller ma lampe de Ps 18.29. –  Le Seigneur remplace mon Dieu de Ps 18.29.
  - type: text
    content: 'C''est toi qui es ma lampe, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' éclaire mes ténèbres.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'mon Dieu rocher  : litt. le Dieu de mon rocher , cf. v. 47n  ; le texte hébreu de Ps 18.3 est légèrement différent. –  mon refuge  : le mot hébreu correspondant est absent du Ps 18. Cf. Jr 16.19 ; 25.35 ; Ps 59.17 ; Jb 11.20. –  Toi, mon Sauveur, tu me sauves de la violence  : le texte correspondant est absent du Ps 18. Cf. Ps 64.3.'
  - type: text
    content: mon Dieu rocher, en qui je trouve un abri,
  - type: text
    content: mon bouclier, la corne qui me sauve,
  - type: text
    content: ma citadelle, mon refuge.
  - type: text
    content: Toi, mon Sauveur, tu me sauves de la violence.
  '30':
  - type: text
    content: Avec toi je me précipite sur une troupe armée,
  - type: text
    content: avec mon Dieu je saute une muraille.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , voir Gn 21.33n  ; de même aux v. 32s,48.'
  - type: text
    content: La voie de Dieu est parfaite,
  - type: text
    content: 'la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est éprouvée ;'
  - type: text
    content: il est un bouclier pour tous ceux qui trouvent en lui un abri.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Qui donc est Dieu  : cf. v. 31n.'
  - type: text
    content: 'Qui donc est Dieu, si ce n''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ?'
  - type: text
    content: Qui est un rocher, si ce n'est notre Dieu ?
  '33':
  - type: text
    content: ' '
  - type: note
    content: Dieu v. 31n. –  qui est ma puissante forteresse remplace qui me ceint de vaillance de Ps 18.33. Cf. Jr 16.19 ; Ps 28.8 ; 31.5 ; 43.2. –  qui prépare ou qui explore , cf. Nb 10.33n  ; 13.2 etc. ; Ps 18.33 qui rend parfait.
  - type: text
    content: C'est Dieu qui est ma puissante forteresse,
  - type: text
    content: et qui prépare parfaitement mon chemin.
  '34':
  - type: text
    content: Il rend mes pieds semblables à ceux des biches,
  - type: text
    content: et il me fait tenir sur les hauteurs.
  '35':
  - type: text
    content: Il enseigne à mes mains la guerre ;
  - type: text
    content: mes bras tendent un arc de bronze.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'ton salut  : Ps 18.36 insère ici ta main droite me soutient.'
  - type: text
    content: Tu me donnes le bouclier de ton salut,
  - type: text
    content: et ta réponse me grandit.
  '37':
  - type: text
    content: Tu me fais marcher au large,
  - type: text
    content: et je ne chancelle pas sur mes chevilles.
  '38':
  - type: text
    content: ' '
  - type: note
    content: je les détruis remplace je les atteins de Ps 18.38.
  - type: text
    content: Je poursuis mes ennemis et je les détruis ;
  - type: text
    content: je ne reviens pas avant de les avoir exterminés.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Je les extermine  : absent du Ps 18.'
  - type: text
    content: Je les extermine, je les fracasse,
  - type: text
    content: et ils ne se relèvent plus ;
  - type: text
    content: ils tombent sous mes pieds.
  '4':
  - type: text
    content: 'Je m''écrie : Loué soit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Et je suis sauvé de mes ennemis.
  '40':
  - type: text
    content: Tu me ceins de vaillance pour le combat,
  - type: text
    content: tu fais plier sous moi mes adversaires.
  '41':
  - type: text
    content: Tu fais fuir mes ennemis devant moi ;
  - type: text
    content: je réduirai au silence ceux qui me détestent.
  '42':
  - type: text
    content: ' '
  - type: note
    content: Ils regardent remplace ils crient de Ps 18.42.
  - type: text
    content: Ils regardent – et pas de sauveur –
  - type: text
    content: 'vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il ne leur répond pas !'
  '43':
  - type: text
    content: ' '
  - type: note
    content: de la terre remplace qu'emporte le vent de Ps 18.43. –  je les écrase, je les foule remplace je les balaie de Ps 18.43.
  - type: text
    content: Je les pulvérise comme la poussière de la terre,
  - type: text
    content: je les écrase, je les foule, comme la boue des rues.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'm''est soumis  : litt. me sert.'
  - type: text
    content: Tu me fais échapper aux querelles de mon peuple ;
  - type: text
    content: tu me mets à la tête des nations ;
  - type: text
    content: un peuple que je ne connais pas m'est soumis.
  '45':
  - type: text
    content: Les étrangers me flattent,
  - type: text
    content: au premier ordre, ils m'obéissent.
  '46':
  - type: text
    content: Les étrangers sont en défaillance,
  - type: text
    content: ils sortent en tremblant de leurs forteresses.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Vive le Seigneur  : la même expression est souvent traduite par la vie du Seigneur (formule de serment). –  Dieu, le rocher de mon salut (litt. le Dieu du rocher de mon salut , cf. v. 3) remplace le Dieu de mon salut de Ps 18.47.'
  - type: text
    content: 'Vive le '
  - type: text
    content: Seigneur
  - type: text
    content: ', béni soit mon Rocher !'
  - type: text
    content: Que Dieu, le rocher de mon salut, soit exalté,
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'le Dieu v. 31ns. –  qui me soumet…  : litt. qui fait descendre des peuples sous moi  ; autre verbe en Ps 18.48n.'
  - type: text
    content: le Dieu qui m'accorde la vengeance,
  - type: text
    content: qui me soumet des peuples,
  '49':
  - type: text
    content: ' '
  - type: note
    content: qui me soustrait remplace qui me fait échapper de Ps 18.49.
  - type: text
    content: et qui me soustrait à mes ennemis !
  - type: text
    content: Tu m'élèves au-dessus de mes adversaires,
  - type: text
    content: tu me délivres de l'homme violent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: les flots remplace les liens de Ps 18.5 ; cf. Jon 2.4.
  - type: text
    content: Car les flots de la mort m'avaient enserré,
  - type: text
    content: les torrents de la destruction m'avaient rempli d'effroi ;
  '50':
  - type: text
    content: ' '
  - type: note
    content: je chanterai pour ton nom Ps 92.2.
  - type: text
    content: 'C''est pourquoi je te célébrerai parmi les nations, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je chanterai pour ton nom.
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'Il fait de grandes choses pour le salut  : d''après une tradition de lecture du texte hébreu ; une autre tradition propose à cause de la grandeur des triomphes . –  l''homme qui a reçu son onction 1S 2.10n  ; 12.3n.'
  - type: text
    content: Il fait de grandes choses pour le salut de son roi,
  - type: text
    content: il agit avec fidélité envers l'homme qui a reçu son onction,
  - type: text
    content: envers David et envers sa descendance, pour toujours.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Voir séjour des morts.
  - type: text
    content: les liens du séjour des morts m'avaient entouré,
  - type: text
    content: les filets de la mort étaient devant moi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'j''invoque mon Dieu  : Ps 18.7 évite la répétition de j''invoque , remplacé par je crie vers . –  son temple  : autre traduction son palais . –  mes appels au secours  : Ps 18.7 ajoute vers lui.'
  - type: text
    content: 'Dans ma détresse, j''invoque le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'j''invoque mon Dieu :'
  - type: text
    content: de son temple, il m'entend,
  - type: text
    content: mes appels au secours parviennent à ses oreilles.
  '8':
  - type: text
    content: ' '
  - type: note
    content: du ciel remplace des montagnes de Ps 18.8 ; à l'horizon, le ciel semble reposer sur les confins de la terre.
  - type: text
    content: La terre fut ébranlée et trembla ;
  - type: text
    content: les fondations du ciel furent agitées ;
  - type: text
    content: elles s'ébranlèrent, parce qu'il s'était fâché.
  '9':
  - type: text
    content: De la fumée montait de ses narines,
  - type: text
    content: un feu dévorant sortait de sa bouche ;
  - type: text
    content: des braises enflammées en jaillissaient.
