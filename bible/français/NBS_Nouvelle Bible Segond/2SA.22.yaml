      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des huttes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains mss hébreux et des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa hutte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa cachette, sa hutte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Ps 18.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: amas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le sens du mot hébreu est très incertain. On a aussi proposé la traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: filtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', décrivant les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nuages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'comme une sorte de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tamis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'crible '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: qui transforment la masse des eaux d'en haut (Gn 1.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s) en gouttes de pluie ; certains modifient le texte hébreu traditionnel d'après le parallèle de Ps 18.12 (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eaux ténébreuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Il faisait des ténèbres une hutte tout autour de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – un amas d'eau, de sombres nuages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 18.13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la clarté qui le précédait provenaient des nuages, de la grêle et des braises.
      marker-yv: yv-n
    - type: text
      text: Dans la clarté qui le précédait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'allumaient des braises.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A la fin du v., Ps 18.14 ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec la grêle et les braises.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' tonna depuis le ciel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Très-Haut fit retentir sa voix.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un éclair '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'remplace '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il multiplia les éclairs '
      - type: usfm
        marker: ft
        children:
