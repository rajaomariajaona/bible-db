        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il m'a fait sortir pour me mettre au large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a délivré, car il a pris plaisir en moi.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'traité selon ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
