    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce chant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se retrouve sous une forme très semblable en Ps 18 (voir les notes). L'annotation de 2S 22 relève essentiellement les différences entre les deux textes.
      marker-yv: yv-n
    - type: text
      text: 'David prononça pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les paroles de ce chant, le jour où le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''eut délivré de la main de tous ses ennemis et de la main de Saül.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il inclina le ciel et descendit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec une épaisse nuée sous ses pieds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'keroub '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 3.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il paraissait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'remplace '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il planait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Ps 18.11.
      marker-yv: yv-n
    - type: text
      text: Il était monté sur un keroub et il volait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il paraissait sur les ailes du vent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
