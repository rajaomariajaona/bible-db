          text: (Ps 18.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Il lança des flèches et il les dispersa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un éclair, et il les frappa de panique.
