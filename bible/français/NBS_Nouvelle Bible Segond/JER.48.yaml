document_id: JER.48,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur Moab
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 15–16. –  Moab , à l''est de la mer Morte 9.25 ; 25.21 ; 27.3 ; 40.11 ; Gn 19.30-38 ; Nb 22–24 ; Dt 23.4-7 ; Am 2.1 ; Rt 1.1ss. –  Nebo est le nom d''une montagne au nord-est de la mer Morte (Dt 32.49 ; 34.1), mais il s''agit ici d''une ville voisine (le verbe hébreu est au féminin) ; cf. v. 22 ; Nb 32.3,38 ; 33.47 ; Es 15.2 ; 1Ch 5.8. –  Qiriataïm Nb 32.37 ; Jos 13.19. –  est honteuse  : omis par LXX la première fois. –  Misgab  : il s''agit ou bien du nom d''une ville (inconnue) ou d''un nom commun signifiant la citadelle.'
  - type: text
    content: Sur Moab.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël :'
  - type: text
    content: Quel malheur pour Nebo ! Elle a été ravagée !
  - type: text
    content: Qiriataïm est honteuse, elle est prise !
  - type: text
    content: Misgab est honteuse et terrifiée.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 46.10 ; voir aussi 1S 15.3ss ; 1R 20.30ss.
  - type: text
    content: 'Maudit soit celui qui fait avec négligence l''œuvre du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: maudit soit celui qui prive son épée de sang !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. So 1.12n  ; Moab , jusque-là à l'écart des grands bouleversements de l'histoire, était connu pour ses vignobles (v. 32s ; Es 16.6-12), d'où sans doute la comparaison avec le vin qui a eu le temps de vieillir (cf. Es 25.6n).
  - type: text
    content: Moab était tranquille depuis sa jeunesse,
  - type: text
    content: il reposait sur sa lie,
  - type: text
    content: il n'a pas été vidé d'un récipient dans un autre,
  - type: text
    content: il n'est pas allé en exil.
  - type: text
    content: Aussi son goût est resté,
  - type: text
    content: et son odeur n'a pas changé.
  '12':
  - type: text
    content: ' '
  - type: note
    content: feront éclater 22.28n.
  - type: text
    content: 'C''est pourquoi les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où je lui enverrai des gens qui le transvaseront ; ils videront ses récipients et feront éclater ses outres. '
  '13':
  - type: note
    content: 'Cf. 2.36s. –  Kemosh v. 7n. –  Beth-El  : cf. Am 5.4ss.'
  - type: text
    content: Moab aura honte de Kemosh, comme la maison d'Israël a eu honte de Beth-El, à laquelle elle se fiait.
  '14':
  - type: text
    content: 'Comment pouvez-vous dire :'
  - type: text
    content: Nous sommes des guerriers,
  - type: text
    content: une armée d'hommes vaillants !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Texte et traduction incertains : en modifiant le texte hébreu traditionnel on pourrait lire le dévastateur de Moab monte contre ses villes  ; cf. v. 1,9,18. –  l''élite de sa jeunesse  : les deux mots correspondants sont apparentés et font assonance en hébreu. –  à l''abattoir 11.19 ; 12.3 ; 50.27. –  déclaration du roi…  : ce dernier vers est absent de LXX (cf. 46.18+).'
  - type: text
    content: Moab est ravagé,
  - type: text
    content: ses villes montent en fumée,
  - type: text
    content: l'élite de sa jeunesse descend à l'abattoir
  - type: text
    content: '– déclaration du roi, dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '16':
  - type: text
    content: La catastrophe est près d'arriver sur Moab,
  - type: text
    content: son malheur vient très vite.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Plaignez-le  : autre traduction hochez la tête sur lui  ; cf. v. 27 ; 15.5n  ; 18.16n. –  qui l''entourez v. 39. – Voir nom. –  Comment ! Lm 1.1n. –  ce sceptre  : cf. Es 14.5. –  splendide  : litt. de splendeur  ; cf. 13.11,18,20 ; 33.9.'
  - type: text
    content: Plaignez-le,
  - type: text
    content: vous tous qui l'entourez,
  - type: text
    content: vous tous qui connaissez son nom !
  - type: text
    content: 'Dites : Comment !'
  - type: text
    content: Il a été brisé,
  - type: text
    content: ce sceptre puissant,
  - type: text
    content: ce bâton splendide !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Descends Es 47.1. –  de ta gloire  : litt. de la gloire . –  dans la soif  ; cf. Es 44.3 ; Syr semble avoir lu dans l''ordure . –  habitante…  : litt. habitante, fille de Dibôn 46.19n. –  Dibôn , ville du centre de Moab v. 2n  ; Nb 21.30 ; 32.34 ; Jos 13.17 ; Es 15.2. –  t''attaque ou, plus littéralement, monte contre toi.'
  - type: text
    content: Descends de ta gloire,
  - type: text
    content: assieds-toi dans la soif,
  - type: text
    content: habitante de Dibôn la belle !
  - type: text
    content: Car celui qui va ravager Moab t'attaque,
  - type: text
    content: il détruit tes forteresses.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Aroër au nord de l'Arnon (v. 20n), au centre de Moab ; cf. v. 6n  ; Nb 32.34 ; Dt 2.36 ; 3.12 ; Jos 13.9.
  - type: text
    content: Tiens-toi sur le chemin et guette,
  - type: text
    content: habitante d'Aroër !
  - type: text
    content: Interroge le fuyard, le rescapé,
  - type: text
    content: 'demande : Qu''est-il arrivé ?'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'louange  : cf. 51.41. –  son malheur , c.-à-d. celui de Heshbôn , à environ 25 km à l''est de la mer Morte ; son nom fait assonance avec le verbe traduit par on prépare ou on médite  ; cf. Nb 21.26s ; 32.37 ; Dt 1.4 ; 2.24s ; Jos 9.10 ; 13.10,17. –  Madmen  : peut-être un autre nom de Dibôn ou Dimôn (v. 18 ; Es 15.9n  ; 25.10n) ; il y a ici assonance avec le verbe pour tu seras réduite au silence. –  l''épée 47.6.'
  - type: text
    content: Il n'y a plus de louange pour Moab ;
  - type: text
    content: 'à Heshbôn, on prépare son malheur :'
  - type: text
    content: Allons, retranchons-le d'entre les nations !
  - type: text
    content: Toi aussi, Madmen, tu seras réduite au silence ;
  - type: text
    content: l'épée te poursuit.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'V. 39. –  l''Arnon  : rivière qui traverse le plateau de Moab et se jette dans la mer Morte ; Nb 21.13 ; 22.36 ; Dt 2.24,36 ; Jos 13.9 ; Jg 11.13.'
  - type: text
    content: 'Moab est honteux : il est terrifié.'
  - type: text
    content: Hurlez, criez !
  - type: text
    content: Annoncez sur l'Arnon
  - type: text
    content: que Moab est ravagé !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'du plateau v. 8n. –  Yahtsa ou Yahats , probablement à environ 25 km au sud de Heshbôn ; cf. v. 34 ; Nb 21.23 ; Jos 13.18. –  Méphaath  : cf. Jos 13.18n.'
  - type: text
    content: 'Le jugement est venu sur le pays du plateau, sur Holôn, sur Yahtsa, sur Méphaath, '
  '22':
  - type: note
    content: 'Dibôn v. 18n. –  Nebo v. 1n. –  Beth-Diblataïm  : cf. Nb 33.46s.'
  - type: text
    content: 'sur Dibôn, sur Nebo, sur Beth-Diblataïm, '
  '23':
  - type: note
    content: Qiriataïm v. 1+.
  - type: text
    content: 'sur Qiriataïm, sur Beth-Gamoul, sur Beth-Méôn, '
  '24':
  - type: note
    content: 'Qeriyoth  : cf. v. 41 ; Am 2.2. –  Botsra (à ne pas confondre avec la ville d''Edom, 49.13) est sans doute la Bétser de Jos 20.8 ; 21.36.'
  - type: text
    content: sur Qeriyoth, sur Botsra, sur toutes les villes du pays de Moab, lointaines et proches.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'La corne  : l''image évoque habituellement la force ou la fierté (1S 2.1n  ; Ps 75.5n). –  son bras Ez 30.21s ; Ps 37.17.'
  - type: text
    content: La corne de Moab est abattue,
  - type: text
    content: son bras est brisé
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Enivrez 25.15+ ; 51.57 ; cf. Es 19.14. –  il s''est élevé… v. 42 ; cf. 50.29+ ; Es 2.12 ; So 2.8-10 ; Ps 35.26 ; 38.17 ; 55.13 ; Dn 5.23. –  dérision  : cf. v. 39 ; 20.7.'
  - type: text
    content: 'Enivrez-le, car il s''est élevé contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Que Moab se débatte dans son vomissement, et qu''il soit lui aussi en butte à la dérision ! '
  '27':
  - type: note
    content: 'parmi les voleurs  : cf. 2.26. –  en hochant la tête de dégoût  : cf. 18.16n.'
  - type: text
    content: Israël n'a-t-il pas été pour toi en butte à la dérision ? Avait-il donc été trouvé parmi les voleurs, pour que tu ne parles de lui qu'en hochant la tête de dégoût ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: la colombe… Ct 2.14.
  - type: text
    content: Abandonnez les villes
  - type: text
    content: et demeurez dans les rochers,
  - type: text
    content: habitants de Moab !
  - type: text
    content: Soyez comme la colombe
  - type: text
    content: qui fait son nid sur les parois du gouffre béant !
  '29':
  - type: text
    content: ' '
  - type: note
    content: Es 16.6ss ; cf. Jr 13.9 ; So 2.9s.
  - type: text
    content: Nous avons appris l'orgueil de Moab,
  - type: text
    content: – un orgueil extrême –
  - type: text
    content: son arrogance, son orgueil, sa suffisance
  - type: text
    content: et son cœur hautain.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Horonaïm Es 15.5n. –  désastre 4.6n.
  - type: text
    content: 'Des cris se font entendre depuis Horonaïm :'
  - type: text
    content: Ravage et grand désastre !
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Texte et traduction incertains. –  mais elles sont inutiles  : litt. mais elles (ou ils ) ne font pas ainsi (ou ils ne font pas ce qui convient  ; cf. 8.6n) ; LXX a lu le singulier.'
  - type: text
    content: 'Moi, je connais – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – son emportement, mais il est inutile ; ses vantardises, mais elles sont inutiles. '
  '31':
  - type: note
    content: je gémis, d'après un ms et une lecture juive traditionnelle ; autre tradition textuelle il gémit  ; cf. v. 36+ ; Es 16.7. –  Qir-Hérès v. 36 ; cf. Es 15.1n  ; 16.11n  ; il s'agit probablement de la capitale de Moab, qui pourrait être ainsi nommée (Ville des Tessons, cf. 19.2) par déformation ironique de son appellation habituelle (ville nouvelle, d'après LXX).
  - type: text
    content: C'est pourquoi je hurle sur Moab, je crie pour Moab tout entier, je gémis au sujet des gens de Qir-Hérès.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'V. 11n. –  plus que Yazer ne te pleure  : autre traduction plus que je ne pleure Yazer . –  tes sarments…  : cf. Ps 80.12. –  la mer de Yazer  : certains mss portent seulement Yazer  ; sur cette localité et Sibma , cf. Es 16.8ns.'
  - type: text
    content: Vigne de Sibma, je te pleure plus que Yazer ne te pleure ;
  - type: text
    content: tes sarments dépassaient la mer,
  - type: text
    content: ils atteignaient la mer de Yazer ;
  - type: text
    content: celui qui ravage tout s'est jeté sur ta récolte et sur ta vendange.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 16.10n  ; 24.7 ; Jl 1.12,16. La traduction de la fin du v. est conjecturale ; avec plusieurs versions anciennes et Es 16.10 on pourrait comprendre le fouleur (ou le vendangeur ) ne foule plus, le crieur ne crie plus . Sur les cris de la vendange , qui peuvent être aussi compris comme des cris de guerre, cf. 51.14 ; Es 16.9n.
  - type: text
    content: La joie et l'allégresse ont disparu du verger
  - type: text
    content: et du pays de Moab ;
  - type: text
    content: j'ai fait tarir le vin dans les cuves ;
  - type: text
    content: on ne foule plus avec les cris de la vendange ;
  - type: text
    content: les cris de la vendange ne sont plus des cris de vendange.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Heshbôn v. 2n. –  Eléalé Es 15.4n. –  Yahats v. 21n. –  Tsoar v. 4n  ; Gn 14.2,8 ; 19.22s ; Es 15.5+. –  Horonaïm v. 3+. –  Eglath-Shelishiya Es 15.5n. –  Nimrim Es 15.6n. –  sont taries  : le même verbe hébreu a généralement été traduit par être dévasté.'
  - type: text
    content: 'Les cris de Heshbôn retentissent jusqu''à Eléalé, ils se font entendre jusqu''à Yahats, depuis Tsoar jusqu''à Horonaïm, jusqu''à Eglath-Shelishiya ; même les eaux de Nimrim sont taries. '
  '35':
  - type: note
    content: 'hauts lieux 17.3. –  à son dieu  : autre traduction à ses dieux  ; cf. v. 7n.'
  - type: text
    content: 'Je veux en finir avec Moab, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – avec celui qui monte sur les hauts lieux et qui offre de l''encens à son dieu. '
  '36':
  - type: note
    content: Cf. v. 31 ; 4.19 ; Es 15.5 ; 16.11.
  - type: text
    content: 'Aussi mon cœur frémit comme les flûtes sur Moab, mon cœur frémit comme les flûtes sur les gens de Qir-Hérès, parce que le profit qu''ils ont amassé est perdu. '
  '37':
  - type: note
    content: toutes les têtes… 47.5 ; Es 15.2 ; Ez 7.18. –  sac 49.3.
  - type: text
    content: 'Car toutes les têtes sont rasées, toutes les barbes sont coupées ; sur toutes les mains il y a des incisions et, sur les reins, un sac. '
  '38':
  - type: note
    content: 'V. 20 ; Es 15.3 ; 16.7. –  en terrasse  : sous-entendu dans le texte ; cf. Dt 22.8n. –  comme un objet… 19.11 ; 22.28.'
  - type: text
    content: 'Sur tous les toits en terrasse de Moab et sur ses places ce ne sont plus que lamentations, parce que j''ai brisé Moab comme un objet dont personne ne veut plus – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '39':
  - type: note
    content: 'V. 17+,20,26. –  Hurlez  : le terme correspondant est omis par certaines versions anciennes. –  prend la fuite  : litt. tourne la nuque  ; cf. 18.17n.'
  - type: text
    content: 'Comment ! Il est terrifié ! Hurlez : Comment ! Moab, honteusement, prend la fuite ! Moab devient un sujet de dérision et de terreur pour tous ceux qui l''entourent. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Es 15.1. –  Ses petits…  : autre traduction, d''après LXX ses cris s''entendent jusqu''à Tsoar  ; cf. v. 34+.'
  - type: text
    content: Moab est brisée !
  - type: text
    content: Ses petits font entendre leurs cris.
  '40':
  - type: note
    content: 49.22 ; Dt 28.49n.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Il fond comme l''aigle, il déploie ses ailes vers Moab.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: Qeriyoth v. 24+ ; autre traduction les villes sont prises . –  et le cœur… 49.22 ; cf. 4.31+.
  - type: text
    content: Qeriyoth est prise,
  - type: text
    content: les forteresses sont capturées
  - type: text
    content: et le cœur des guerriers de Moab est en ce jour-là
  - type: text
    content: comme le cœur d'une femme en travail.
  '42':
  - type: text
    content: ' '
  - type: note
    content: car il s'est élevé… v. 26+.
  - type: text
    content: Moab sera détruit, il ne sera plus un peuple,
  - type: text
    content: 'car il s''est élevé contre le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'frayeur (49.5 ; le même mot est rendu par Terreur en Gn 31.42,53) / fosse / filet  : sur ces trois mots en assonance dans le texte, voir Es 24.17n  ; Lm 3.47.'
  - type: text
    content: La frayeur, la fosse et le filet
  - type: text
    content: sont sur toi, habitant de Moab !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui fuit… Am 5.19. –  sur lui, sur Moab  : LXX ces choses sur Moab  ; certains modifient la vocalisation traditionnelle de l''hébreu pour lire cette malédiction sur Moab. –  l''année… 6.15n  ; 11.23+ ; 49.8 ; 50.31.'
  - type: text
    content: Celui qui fuit pour échapper à la frayeur
  - type: text
    content: tombe dans la fosse,
  - type: text
    content: et celui qui remonte de la fosse
  - type: text
    content: est pris au filet ;
  - type: text
    content: car je fais venir sur lui, sur Moab,
  - type: text
    content: l'année où ils vont rendre des comptes,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'Es 15.1. –  un feu de Heshbôn Nb 21.28. –  du milieu de…  : certains mss portent de la maison de Sihôn  ; cf. Nb 21. –  les tempes ou les flancs  ; certains voient dans cette expression une désignation métaphorique du versant occidental du plateau de Moab, le crâne évoquant le plateau lui-même ; cf. v. 8n  ; Nb 24.17n. –  des hommes violents  : litt. des fils du vacarme (cf. 46.17) ou peut-être de la destruction (cf. Ps 40.3).'
  - type: text
    content: A l'ombre de Heshbôn
  - type: text
    content: les fuyards s'arrêtent sans force,
  - type: text
    content: car il sort un feu de Heshbôn,
  - type: text
    content: des flammes du milieu de Sihôn ;
  - type: text
    content: elle dévore les tempes de Moab
  - type: text
    content: et le crâne des hommes violents.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'Nb 21.29. –  Le peuple de Kemosh (v. 7+)… ou, d''après un ms hébreu et plusieurs versions anciennes  : Tu es perdu, peuple de Kemosh !'
  - type: text
    content: Quel malheur pour toi, Moab !
  - type: text
    content: Le peuple de Kemosh est perdu !
  - type: text
    content: Car tes fils sont emmenés captifs,
  - type: text
    content: et tes filles captives.
  '47':
  - type: text
    content: ' '
  - type: note
    content: '12.15+ ; 49.6,39. –  dans la suite des temps 23.20n. –  je rétablirai…  : l''expression hébraïque évoque, par assonance, le mot traduit par captifs au v. 46, d''où la traduction traditionnelle je ramènerai les captifs de Moab  ; cf. 29.14n. –  Tel est  : litt. jusqu''ici.'
  - type: text
    content: Mais dans la suite des temps
  - type: text
    content: je rétablirai la situation de Moab
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Tel est le jugement prononcé sur Moab.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Sur ce verset, passablement obscur, cf. Es 15.5n. –  les pleurs montent…  : certains proposent de lire ils montent , comme en Es 15.5. –  les adversaires de  : le terme correspondant est omis par LXX ; en hébreu l''expression traduite par ceux qui crient et sont brisés est presque identique à des cris de désastre en Es 15.5.'
  - type: text
    content: Car les pleurs montent, en pleurant, la montée de Louhith,
  - type: text
    content: et on entend les adversaires de ceux qui crient et sont brisés
  - type: text
    content: à la descente de Horonaïm.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'un genévrier  : le terme hébreu est voisin de celui qui apparaît en 17.6 (vocalisation différente). Il pourrait aussi désigner la ville forte d''Aroër (v. 19+) ; on pourrait alors comprendre ou bien soyez comme Aroër au sens de tenez-vous sur vos gardes , ou bien vous serez comme Aroër , détruite en dépit de ses défenses. LXX soyez comme un âne sauvage.'
  - type: text
    content: Fuyez, sauvez votre vie,
  - type: text
    content: et soyez comme un genévrier du désert !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tu as mis ta confiance…  : cf. 17.5 ; 49.4 ; Es 2.22 ; Ps 52.9 ; Pr 11.28 ; Ph 3.4. –  Kemosh , dieu national de Moab v. 13,35,46 ; cf. 46.15n  ; 49.3 ; 50.2 ; Nb 21.29 ; 1R 11.7,33 ; 2R 23.13 ; voir aussi Es 46.1s.'
  - type: text
    content: En effet, parce que tu as mis ta confiance
  - type: text
    content: dans tes œuvres et dans tes trésors,
  - type: text
    content: toi aussi, tu seras pris,
  - type: text
    content: et Kemosh s'en ira en exil
  - type: text
    content: avec ses prêtres et ses princes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Il s'agit sans doute de la vallée de l'Arnon et du plateau de Moab, au nord (cf. v. 21 ; Dt 3.10 ; 4.43 ; Jos 13.9,15-17,21 ; 20.8).
  - type: text
    content: Celui qui ravage tout entrera dans chaque ville,
  - type: text
    content: et aucune ville n'échappera ;
  - type: text
    content: la vallée périra, et le plateau sera détruit,
  - type: text
    content: 'c''est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Donnez des ailes  : traduction conjecturale ; le texte hébreu pourrait aussi signifier donnez une fleur ou, par rapprochement avec l''ougaritique, faites (de Moab) une terre salée (cf. Jg 9.45). LXX semble avoir compris donnez un tombeau à Moab . –  qu''il s''éloigne en volant  : autre traduction possible, d''après des versions anciennes qu''il tombe en ruine . –  Ses villes… v. 28.'
  - type: text
    content: Donnez des ailes à Moab,
  - type: text
    content: qu'il s'éloigne en volant !
  - type: text
    content: Ses villes seront dévastées,
  - type: text
    content: elles n'auront plus d'habitants.
