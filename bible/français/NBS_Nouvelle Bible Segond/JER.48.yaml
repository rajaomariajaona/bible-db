      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la soif
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Es 44.3 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' semble avoir lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans l'ordure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habitante…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'habitante, fille de Dibôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '46.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dibôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ville du centre de Moab v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 21.30 ; 32.34 ; Jos 13.17 ; Es 15.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 't''attaque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: monte contre toi.
      marker-yv: yv-n
    - type: text
      text: Descends de ta gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: assieds-toi dans la soif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitante de Dibôn la belle !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car celui qui va ravager Moab t'attaque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il détruit tes forteresses.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
