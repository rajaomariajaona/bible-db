      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 47.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de ta '
        - type: usfm
          marker: w
          children:
          - type: text
