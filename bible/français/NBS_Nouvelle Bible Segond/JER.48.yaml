        - type: text
          text: '  ; Nb 32.34 ; Dt 2.36 ; 3.12 ; Jos 13.9.'
      marker-yv: yv-n
    - type: text
      text: Tiens-toi sur le chemin et guette,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitante d'Aroër !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Interroge le fuyard, le rescapé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'demande : Qu''est-il arrivé ?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: louange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 51.41. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. celui de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Heshbôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à environ 25 km à l''est de la mer Morte ; son nom fait assonance avec le verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on prépare '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
