document_id: JER.48,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Moab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 15–16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à l''est de la mer Morte 9.25 ; 25.21 ; 27.3 ; 40.11 ; Gn 19.30-38 ; Nb 22–24 ; Dt 23.4-7 ; Am 2.1 ; Rt 1.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nebo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est le nom d''une montagne au nord-est de la mer Morte (Dt 32.49 ; 34.1), mais il s''agit ici d''une ville voisine (le verbe hébreu est au féminin) ; cf. v. 22 ; Nb 32.3,38 ; 33.47 ; Es 15.2 ; 1Ch 5.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qiriataïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 32.37 ; Jos 13.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est honteuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : omis par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' la première fois. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Misgab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit ou bien du nom d''une ville (inconnue) ou d''un nom commun signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la citadelle.
      marker-yv: yv-n
    - type: text
      text: Sur Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel malheur pour Nebo ! Elle a été ravagée !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qiriataïm est honteuse, elle est prise !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Misgab est honteuse et terrifiée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 46.10 ; voir aussi 1S 15.3ss ; 1R 20.30ss.
      marker-yv: yv-n
    - type: text
      text: 'Maudit soit celui qui fait avec négligence l''œuvre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maudit soit celui qui prive son épée de sang !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. So 1.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', jusque-là à l''écart des grands bouleversements de l''histoire, était connu pour ses vignobles (v. 32s ; Es 16.6-12), d''où sans doute la comparaison avec le vin qui a eu le temps de vieillir (cf. Es 25.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Moab était tranquille depuis sa jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il reposait sur sa lie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'a pas été vidé d'un récipient dans un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'est pas allé en exil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi son goût est resté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son odeur n'a pas changé.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'feront éclater '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi les jours viennent – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – où je lui enverrai des gens qui le transvaseront ; ils videront ses récipients et feront éclater ses outres. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.36s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kemosh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Beth-El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Am 5.4ss.'
      marker-yv: yv-n
    - type: text
      text: Moab aura honte de Kemosh, comme la maison d'Israël a eu honte de Beth-El, à laquelle elle se fiait.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Comment pouvez-vous dire :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes des guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une armée d'hommes vaillants !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte et traduction incertains : en modifiant le texte hébreu traditionnel on pourrait lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le dévastateur de Moab monte contre ses villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. v. 1,9,18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'élite de sa jeunesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : les deux mots correspondants sont apparentés et font assonance en hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à l''abattoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.19 ; 12.3 ; 50.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déclaration du roi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce dernier vers est absent de LXX (cf. 46.18+).'
      marker-yv: yv-n
    - type: text
      text: Moab est ravagé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses villes montent en fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'élite de sa jeunesse descend à l'abattoir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– déclaration du roi, dont le nom est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La catastrophe est près d'arriver sur Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son malheur vient très vite.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Plaignez-le
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hochez la tête sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 27 ; 15.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui l''entourez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 39. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Comment ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lm 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce sceptre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 14.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: splendide
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de splendeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 13.11,18,20 ; 33.9.
      marker-yv: yv-n
    - type: text
      text: Plaignez-le,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous qui l'entourez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tous qui connaissez son nom !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites : Comment !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a été brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sceptre puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce bâton splendide !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
