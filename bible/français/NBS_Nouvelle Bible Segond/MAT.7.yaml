document_id: MAT.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La paille et la poutre
  - type: heading
    content: Lc 6.37-42
  - type: text
    content: ' '
  - type: note
    content: 'Ne jugez pas  : autre traduction cessez de juger , Jn 8.7-11 ; Rm 2.1-3 ; 14.4,10 ; 1Co 4.5 ; 5.12 ; Jc 2.12s ; 4.11s ; 5.9.'
  - type: text
    content: 'Ne jugez pas, afin de ne pas être jugés. '
  '10':
  - type: text
    content: 'Ou bien, s''il demande un poisson, lui donnera-t-il un serpent ? '
  '11':
  - type: note
    content: 'Ps 86.5 ; Jc 1.17. –  qui le lui demandent  : litt. qui lui demandent, cf. Lc 11.13n.'
  - type: text
    content: Si donc vous, tout en étant mauvais, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison votre Père qui est dans les cieux donnera-t-il de bonnes choses à ceux qui le lui demandent !
  - type: heading
    content: Comment traiter les autres
  - type: heading
    content: Lc 6.31
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 15.20n  ; cf. Tobit 4.15 : « Ce que tu n''aimes pas, ne le fais à personne. » Siracide 31.15 (hébreu) : « Regarde ton voisin comme toi-même et réfléchis à tout ce que tu détestes. » –  Loi / Prophètes 5.17n.'
  - type: text
    content: 'Tout ce que vous voulez que les gens fassent pour vous, vous aussi, faites-le de même pour eux : c''est là la Loi et les Prophètes.'
  - type: heading
    content: La porte étroite
  - type: heading
    content: Lc 13.23-24
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 30.15-20 ; voir aussi Jr 21.8 ; Didachè 1.1 : « Il y a deux voies : l''une de la vie et l''autre de la mort ; mais la différence est grande entre les deux voies. » –  porte étroite  : cf. 19.24 ; Lc 13.23-24n  ; 14.33 ; Jn 10.9. –  large…  : certains mss portent large et spacieux est le chemin qui mène à la perdition  ; cf. Pr 14.12 ; 16.25. –  qui mènent ou qui mène (cf. v. 14n). –  beaucoup Ep 2.2s ; 1Jn 5.19.'
  - type: text
    content: 'Entrez par la porte étroite ; car large est la porte et spacieux le chemin qui mènent à la perdition, et il y en a beaucoup qui entrent par là. '
  '14':
  - type: note
    content: 'Es 30.21 ; Jr 6.16 ; Ps 16.11. –  resserré  : le mot grec est apparenté à celui qui est habituellement traduit par détresse (traditionnellement tribulation) et qui évoque l''idée d''oppression ; cf. 24.9n  ; Ac 14.22 ; 1Th 3.3n  ; 4 Esdras 7.6ss : « Suppose encore une ville bien bâtie et située sur un terrain plat, remplie de toutes sortes de bien. Mais son accès est étroit et situé en un lieu escarpé : à droite, il y a du feu et à gauche une eau profonde. Entre le feu et l''eau, il n''y a qu''un sentier, pas plus large que la plante du pied humain. » –  qui mènent ou qui mène. –  peu  : cf. 4 Esdras 7.47 : « Le monde à venir apportera la joie à quelques-uns mais des tourments au plus grand nombre. » 8.1 : « Le Très-Haut a fait le monde présent pour beaucoup (d''hommes), mais le monde futur pour peu (d''entre eux). » 8.3 : « Beaucoup sont créés, mais peu sont sauvés. » 9.15s : « Ceux qui périssent sont en plus grand nombre que ceux qui seront sauvés, comme le flot l''emporte sur une goutte. » –  qui les trouvent  : autres traductions qui la trouvent (la porte), qui le trouvent (le chemin).'
  - type: text
    content: Mais étroite est la porte et resserré le chemin qui mènent à la vie, et il y en a peu qui les trouvent.
  - type: heading
    content: L'arbre et ses fruits
  - type: heading
    content: Lc 6.43-44
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Gardez-vous Rm 16.17 ; 2Tm 3.5. –  prophètes de mensonge ou faux prophètes, pseudo-prophètes 24.11,24 ; cf. Dt 13.2-6 ; Jr 14.14. –  déguisés en moutons  : litt. en habits de moutons . –  loups voraces ou rapaces (termes apparentés pour s''emparer de 11.12 ; 12.29 ; 13.19 ; rapacité 23.25n) ; 10.16 ; Ez 22.27 ; 34.2-10 ; Mi 3.5 ; Ac 20.29.'
  - type: text
    content: 'Gardez-vous des prophètes de mensonge. Ils viennent à vous déguisés en moutons, mais au dedans ce sont des loups voraces. '
  '16':
  - type: note
    content: 12.33nss ; Ga 5.19-23 ; Jc 2.18 ; 3.12 ; cf. Es 3.10 ; 5.2 ; Jr 2.21 ; 17.10 ; 21.14 ; Os 10.13.
  - type: text
    content: 'C''est à leurs fruits que vous les reconnaîtrez. Cueille-t-on des raisins sur des épines, ou des figues sur des chardons ? '
  '17':
  - type: note
    content: 'beaux 3.10n. –  malade  : litt. pourri, de même au v. 18 ; cf. 12.33 ; 13.48n  ; le même adjectif est traduit par malsain en Ep 4.29. –  mauvais  : cf. 6.23n.'
  - type: text
    content: 'Tout bon arbre produit de beaux fruits, tandis que l''arbre malade produit de mauvais fruits. '
  '18':
  - type: note
    content: 'ne peut  : cf. 1Jn 3.9. –  produire  : certains mss ont porter.'
  - type: text
    content: 'Un bon arbre ne peut produire de mauvais fruits, ni un arbre malade produire de beaux fruits. '
  '19':
  - type: note
    content: 3.10/ /.
  - type: text
    content: 'Tout arbre qui ne produit pas de beau fruit est coupé et jeté au feu. '
  '2':
  - type: note
    content: 'on vous jugera  : litt. vous serez jugés, passif qui sous-entend probablement par Dieu  ; cf. Ez 7.27 ; Mc 4.24 ; Lc 6.38 ; Jc 2.13.'
  - type: text
    content: 'Car c''est avec le jugement par lequel vous jugez qu''on vous jugera, et c''est avec la mesure à laquelle vous mesurez qu''on mesurera pour vous. '
  '20':
  - type: text
    content: C'est donc à leurs fruits que vous les reconnaîtrez.
  - type: heading
    content: Dire et faire
  - type: heading
    content: Lc 6.46  ; 13.25-27
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'disent Es 29.13. –  Seigneur 25.11 ; Lc 6.46 ; cf. 1Co 12.3. –  volonté 6.10 ; 12.50 ; 21.28-31 ; Rm 2.13 ; Jc 1.22-25 ; 2.14 ; 1Jn 2.17. – Une note d''un ms attribue à un « évangile juif » (probablement l’ Evangile des nazaréens ) la sentence suivante : « Si vous êtes dans mon sein (cf. Jn 1.18 ; 13.23) et que vous ne faites pas la volonté de mon Père qui est dans les cieux, je vous expulserai de mon sein. » On la retrouve sous une forme assez proche en 2 Clément 4.5.'
  - type: text
    content: 'Ce ne sont pas tous ceux qui me disent : « Seigneur ! Seigneur ! » qui entreront dans le royaume des cieux, mais celui-là seul qui fait la volonté de mon Père qui est dans les cieux. '
  '22':
  - type: note
    content: 'Beaucoup v. 13+. –  par ton nom  : cf. 18.20n. –  parlé (ou agi) en prophètes Jr 2.8n  ; 14.14 ; 27.15 ; 1Co 13.1s. –  chassé des démons Mc 9.38 ; Lc 10.17, 20. –  miracles  : litt. puissances ou actes de puissance, cf. 13.54 ; 14.2n.'
  - type: text
    content: 'Beaucoup me diront en ce jour-là : « Seigneur, Seigneur, n''est-ce pas par ton nom que nous avons parlé en prophètes, par ton nom que nous avons chassé des démons, par ton nom que nous avons fait beaucoup de miracles ? » '
  '23':
  - type: note
    content: 'déclarerai  : cf. 10.32n  ; voir aussi 25.12,41 ; Ps 101.4. –  vous qui faites le mal  : litt. qui produisez la non-loi ou le mépris de la loi, mais le terme peut être compris dans un sens plus général de mal  ; il est souvent employé pour désigner le mal absolu qui, selon certaines vues, doit régner d''une façon toute particulière à la fin des temps ; cf. 13.41 ; 23.28 ; 24.12 ; Ps 6.9  ; Ap 22.15 ; voir aussi 1Jn 3.4n.'
  - type: text
    content: 'Alors je leur déclarerai : « Je ne vous ai jamais connus ; '
  - type: text
    content: éloignez-vous de moi, vous qui faites le mal !
  - type: text
    content: '  »'
  - type: heading
    content: La parabole des deux maisons
  - type: heading
    content: Lc 6.47-49
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'met en pratique  : litt. fait  ; le même verbe a été traduit par produire v. 17ss, cf. v. 12 ; 5.19 ; Lc 8.21. –  avisé ou sensé, réfléchi, prudent  ; même terme 10.16 ; 24.45 ; 25.2ss. –  roc 16.18n.'
  - type: text
    content: 'Ainsi, quiconque entend de moi ces paroles et les met en pratique sera comme un homme avisé qui a construit sa maison sur le roc. '
  '25':
  - type: note
    content: Jb 1.19 ; Pr 10.25.
  - type: text
    content: 'La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont précipités sur cette maison : elle n''est pas tombée, car elle était fondée sur le roc. '
  '26':
  - type: note
    content: 'fou  : cf. 5.22+.'
  - type: text
    content: 'Mais quiconque entend de moi ces paroles et ne les met pas en pratique sera comme un fou qui a construit sa maison sur le sable. '
  '27':
  - type: note
    content: Cf. 13.21 ; Es 28.17 ; Ez 13.10-15.
  - type: text
    content: 'La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont abattus sur cette maison : elle est tombée, et sa chute a été grande.'
  - type: heading
    content: L'autorité de Jésus
  - type: heading
    content: Mc 1.22  ; Lc 4.32
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque Jésus eut achevé ces discours (litt. ces paroles ) : sur le rôle de cette formule dans la structure de l''évangile, cf. 11.1 ; 13.53 ; 19.1 ; 26.1 et l''introduction. –  ébahies…  : cf. 13.54 ; 19.25 ; 22.33 ; Mc 1.22,27 ; Lc 24.19 ; Jn 7.26,46 ; Ac 13.12.'
  - type: text
    content: 'Lorsque Jésus eut achevé ces discours, les foules étaient ébahies de son enseignement, '
  '29':
  - type: note
    content: 'de l''autorité  : autre traduction du pouvoir. Les scribes s''abritaient sous l''autorité de maîtres qu''ils citaient (voir Talmud), tandis que Jésus enseigne de son propre fonds. Cf. 5.21n.'
  - type: text
    content: car il les instruisait comme quelqu'un qui a de l'autorité, et non pas comme leurs scribes.
  '3':
  - type: note
    content: 'regardes-tu ou vois-tu  : cf. v. 5n.'
  - type: text
    content: 'Pourquoi regardes-tu la paille qui est dans l''œil de ton frère, et ne remarques-tu pas la poutre qui est dans ton œil ? '
  '4':
  - type: note
    content: 'peux-tu dire  : litt. dis-tu. –  ôter  : le même verbe est traduit par chasser au v. 22.'
  - type: text
    content: 'Ou bien comment peux-tu dire à ton frère : « Laisse-moi ôter la paille de ton œil », alors que dans ton œil il y a une poutre ? '
  '5':
  - type: note
    content: 'verras  : le verbe employé au v. 3 (Pourquoi regardes-tu…) est ici renforcé par un préfixe (voir Mc 8.24s où les deux mêmes verbes apparaissent). On pourrait traduire  : tu verras assez clair pour ôter… Cf. Ga 6.1. Evangile selon Thomas 26 : « Jésus a dit : “La paille qui est dans l''œil de ton frère, tu la vois, mais la poutre qui est dans le tien, tu ne la vois pas. Quand tu auras enlevé la poutre de ton œil, alors tu verras assez bien pour enlever la paille de celui de ton frère.” »'
  - type: text
    content: Hypocrite, ôte d'abord la poutre de ton œil ! Alors tu verras comment ôter la paille de l'œil de ton frère.
  - type: heading
    content: Les perles aux cochons
  '6':
  - type: text
    content: ' '
  - type: note
    content: '10.11-14,16 ; 15.26 ; Pr 9.7 ; Ac 13.46 ; Ph 3.2 ; Ap 22.15. –  sacré ou saint  : cf. Ex 29.33 ; Lv 22.10. –  chiens / cochons  : animaux impurs (voir pur, impur) dans le judaïsme (cf. Mc 7.27n) ; voir aussi Mt 8.30ss ; 2P 2.22. –  piétinent  : même verbe 5.13n  ; Lc 8.5 ; Hé 10.29. –  Didachè 9.5 : « Que personne ne mange ni ne boive de votre eucharistie (ou : de votre action de grâce, de ce dont vous avez rendu grâce) en dehors de ceux qui sont baptisés au nom du Seigneur. Car le Seigneur a dit à ce sujet : “Ne donnez pas ce qui est saint aux chiens.” » Evangile selon Thomas 93 : « Ne donnez pas aux chiens ce qui est sacré, de peur qu''ils ne le jettent au fumier ; ne jetez pas les perles aux porcs, de peur qu''ils n''en fassent… » (la fin de la sentence a disparu).'
  - type: text
    content: Ne donnez pas ce qui est sacré aux chiens et ne jetez pas vos perles devant les cochons, de peur qu'ils ne les piétinent et ne se retournent contre vous pour vous lacérer.
  - type: heading
    content: Demander, chercher, frapper
  - type: heading
    content: Lc 11.9-13
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 2n  ; 18.19 ; 21.22 ; Jr 29.13s ; Pr 8.17 ; Mc 11.24 ; Jn 14.13 ; Jc 1.5s ; 1Jn 3.22. Evangile selon Thomas 2 : « Jésus a dit : “Que celui qui cherche ne cesse pas de chercher, jusqu''à ce qu''il trouve. Et, quand il aura trouvé, il sera troublé ; quand il sera troublé, il sera émerveillé, et il régnera sur le Tout.” » 92 : « Jésus a dit : “Cherchez, et vous trouverez ; mais ce que vous m''aviez demandé jadis et que je ne vous avais pas dit en ces jours-là, maintenant il me plaît de le dire, mais vous ne le cherchez pas.” » 94 : « Jésus a dit : “Celui qui cherche trouvera, et à celui qui frappe, on ouvrira.” »'
  - type: text
    content: 'Demandez, et l''on vous donnera ; cherchez, et vous trouverez ; frappez, et l''on vous ouvrira. '
  '8':
  - type: text
    content: 'Car quiconque demande reçoit, qui cherche trouve, et à qui frappe on ouvrira. '
  '9':
  - type: text
    content: 'Si son fils lui demande du pain, quel est parmi vous celui qui lui donnera une pierre ? '
