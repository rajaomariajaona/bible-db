            text: grâce
        - type: text
          text: ', de ce dont vous avez rendu grâce) en dehors de ceux qui sont baptisés au nom du Seigneur. Car le Seigneur a dit à ce sujet : “Ne donnez pas ce qui est saint aux chiens.” » '
      - type: usfm
