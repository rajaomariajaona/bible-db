      - type: usfm
        marker: ft
        children:
        - type: text
          text: '93 : « Ne donnez pas aux chiens ce qui est sacré, de peur qu''ils ne le jettent au fumier ; ne jetez pas les perles aux porcs, de peur qu''ils n''en fassent… » (la fin de la sentence a disparu).'
      marker-yv: yv-n
    - type: text
      text: Ne donnez pas ce qui est sacré aux chiens et ne jetez pas vos perles devant les cochons, de peur qu'ils ne les piétinent et ne se retournent contre vous pour vous lacérer.
