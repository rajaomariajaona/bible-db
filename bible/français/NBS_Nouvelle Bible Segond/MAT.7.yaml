        children:
        - type: text
          text: '7.6ss : « Suppose encore une ville bien bâtie et située sur un terrain plat, remplie de toutes sortes de bien. Mais son accès est étroit et situé en un lieu escarpé : à droite, il y a du feu et à gauche une eau profonde. Entre le feu et l''eau, il n''y a qu''un sentier, pas plus large que la plante du pied humain. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui mènent '
      - type: usfm
        marker: ft
