      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2 : « Jésus a dit : “Que celui qui cherche ne cesse pas de chercher, jusqu''à ce qu''il trouve. Et, quand il aura trouvé, il sera troublé ; quand il sera troublé, il sera émerveillé, et il régnera sur le Tout.” » 92 : « Jésus a dit : “Cherchez, et vous trouverez ; mais ce que vous m''aviez demandé jadis et que je ne vous avais pas dit en ces jours-là, maintenant il me plaît de le dire, mais vous ne le cherchez pas.” » 94 : « Jésus a dit : “Celui qui cherche trouvera, et à celui qui frappe, on ouvrira.” »'
      marker-yv: yv-n
    - type: text
      text: 'Demandez, et l''on vous donnera ; cherchez, et vous trouverez ; frappez, et l''on vous ouvrira. '
