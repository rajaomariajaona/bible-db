        - type: text
          text: '4 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.47 : « Le monde à venir apportera la joie à quelques-uns mais des tourments au plus grand nombre. » 8.1 : « Le Très-Haut a fait le monde présent pour beaucoup (d''hommes), mais le monde futur pour peu (d''entre eux). » 8.3 : « Beaucoup sont créés, mais peu sont sauvés. » 9.15s : « Ceux qui périssent sont en plus grand nombre que ceux qui seront sauvés, comme le flot l''emporte sur une goutte. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui les trouvent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui la trouvent '
      - type: usfm
