  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ai-je trouvé des genoux pour me recevoir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des seins pour m'allaiter ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
