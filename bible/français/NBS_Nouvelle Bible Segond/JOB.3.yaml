          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.14 : « Souviens-toi de ton père et de ta mère quand tu sièges au milieu des grands, de peur que tu ne t''oublies en leur présence et que ton habitude ne te pousse à des insanités. Tu voudrais alors n''être jamais né et maudirais le jour de ta naissance. »'
      marker-yv: yv-n
    - type: text
      text: 'Après cela, Job prit la parole et maudit le jour de sa naissance. '
