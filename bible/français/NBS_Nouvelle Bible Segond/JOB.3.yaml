      marker-yv: yv-n
    - type: text
      text: Pourquoi ne suis-je pas mort dans le sein de ma mère ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi n'ai-je pas expiré au sortir de son ventre ?
