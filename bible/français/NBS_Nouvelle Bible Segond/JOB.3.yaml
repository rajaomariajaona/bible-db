document_id: JOB.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'DIALOGUE : JOB ET SES AMIS'
  - type: heading
    content: Job regrette d'être né
  - type: text
    content: ' '
  - type: note
    content: 'prit la parole  : litt. ouvrit la bouche . –  le jour de sa naissance  : litt. son jour  ; cf. 1.4n. – Cf. 10.18 ; Jr 15.10 ; 20.14-18 ; Mt 26.24 ; Siracide 23.14 : « Souviens-toi de ton père et de ta mère quand tu sièges au milieu des grands, de peur que tu ne t''oublies en leur présence et que ton habitude ne te pousse à des insanités. Tu voudrais alors n''être jamais né et maudirais le jour de ta naissance. »'
  - type: text
    content: 'Après cela, Job prit la parole et maudit le jour de sa naissance. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le ventre dont je suis sorti  : litt. les portes de mon ventre  ; cf. 1S 1.5n. –  la peine ou l''oppression, le tourment (cf. 4.8 ; 5.6s ; 7.3 ; 11.16 ; 15.35 ; 16.2). –  à mes regards  : litt. à mes yeux  ; de même en 28.21.'
  - type: text
    content: Parce qu'elle n'a pas fermé le ventre dont je suis sorti,
  - type: text
    content: parce qu'elle n'a pas caché la peine à mes regards.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'dans le sein…  : litt. dès la matrice (terme synonyme dans la suite) v. 1+ ; 10.18 ; Jr 20.17.'
  - type: text
    content: Pourquoi ne suis-je pas mort dans le sein de ma mère ?
  - type: text
    content: Pourquoi n'ai-je pas expiré au sortir de son ventre ?
  '12':
  - type: text
    content: Pourquoi ai-je trouvé des genoux pour me recevoir
  - type: text
    content: et des seins pour m'allaiter ?
  '13':
  - type: text
    content: Maintenant je serais couché, je serais tranquille,
  - type: text
    content: je dormirais ; alors je pourrais me reposer
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'rois / conseillers Es 14.9-11 ; Ez 32.18-30. –  mausolées  : le mot signifie aussi ruines, déserts . Cf. 15.28 (autre terme).'
  - type: text
    content: avec les rois et les conseillers de la terre,
  - type: text
    content: qui se bâtissent des mausolées,
  '15':
  - type: text
    content: avec les princes qui ont de l'or
  - type: text
    content: et qui remplissent d'argent leurs maisons.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '10.18s ; Ps 58.9 ; Ec 4.3. –  le jour  : litt. la lumière (cf. v. 9,20).'
  - type: text
    content: – ou bien, comme un avorton caché, je n'existerais même pas,
  - type: text
    content: comme ces enfants qui n'ont jamais vu le jour.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Là  : c.-à-d. dans la mort ou le séjour des morts. –  ceux qui sont fatigués et sans force  : litt. les fatigués de force . Cf. Es 57.2 ; Ap 14.13.'
  - type: text
    content: Là les méchants cessent leur agitation,
  - type: text
    content: là se reposent ceux qui sont fatigués et sans force ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: oppresseur ou tyran , cf. 39.7n  ; Ex 3.7n  ; le mot désigne en Ex 5.6 les inspecteurs , les surveillants des travaux forcés.
  - type: text
    content: les prisonniers sont tous dans la tranquillité,
  - type: text
    content: ils n'entendent plus la voix de l'oppresseur ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 21.26 ; cf. Ec 9.2s.
  - type: text
    content: le petit et le grand sont là,
  - type: text
    content: l'esclave est affranchi de son maître.
  '2':
  - type: note
    content: 'dit  : litt. répondit et dit  ; cf. 34.1n.'
  - type: text
    content: 'Job dit :'
  '20':
  - type: text
    content: ' '
  - type: note
    content: Pourquoi (Dieu) donne-t-il le jour ou la lumière (v. 16n) ; LXX pourquoi la lumière est-elle donnée…
  - type: text
    content: Pourquoi donne-t-il le jour à celui qui peine,
  - type: text
    content: la vie à ceux qui sont amers,
  '21':
  - type: text
    content: ' '
  - type: note
    content: '6.9 ; 7.15 ; 11.20 ; Jr 8.3 ; Ap 9.6. –  qui la recherchent  : même verbe en 39.29.'
  - type: text
    content: qui attendent la mort, sans qu'elle vienne,
  - type: text
    content: qui la recherchent plus que des trésors,
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'se réjouiraient…  : cf. Os 9.1.'
  - type: text
    content: qui se réjouiraient, transportés d'allégresse et d'exultation,
  - type: text
    content: s'ils trouvaient la tombe
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'à l''homme…  : suite de la phrase commencée au v. 20. –  cerne…  : litt. entoure d''une haie , comme en 1.10n, mais ici dans un sens négatif ; cf. 19.8 ; Nb 22.22-35 ; Os 2.8 ; Lm 3.7.'
  - type: text
    content: – à l'homme dont la voie est cachée,
  - type: text
    content: et que Dieu cerne de toutes parts ?
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'cris  : le mot correspondant, au singulier, est traduit par rugissement (du lion) en 4.10 ; cf. Ps 22.2n  ; 32.3n. – Cf. Ps 42.4 ; 80.6 ; 102.10.'
  - type: text
    content: Car, au lieu de pain, ce sont mes soupirs qui surviennent,
  - type: text
    content: et mes cris se répandent comme de l'eau.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 15.24 ; voir Pr 10.24 ; Ez 11.8.
  - type: text
    content: Ce qui me remplit de frayeur, c'est ce qui m'arrive ;
  - type: text
    content: ce qui fait mon effroi, c'est ce qui m'atteint.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Dt 28.65-67 ; Mt 11.28s ; Ap 14.11.
  - type: text
    content: Je n'ai ni calme, ni tranquillité, ni repos ;
  - type: text
    content: c'est l'agitation qui survient.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Jr 20.14.
  - type: text
    content: Périsse le jour où je suis né,
  - type: text
    content: 'et la nuit qui dit : Un enfant mâle a été conçu !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’Eloah , terme rare sous cette forme en dehors du livre de Job où il revient plus de 40 fois (aussi en Dt 32.15,17 ; Es 44.8 ; Ha 1.11 ; 3.3 ; Ps 18.32 ; 50.22 ; 114.7 ; 139.19 ; Pr 30.5 ; Dn 11.37ss ; Né 9.17 ; 2Ch 32.15). C''est le pluriel ’Elohim qui est employé le plus couramment dans le reste de la Bible (voir aussi 5.8n  ; Gn 1.1n). –  ne le recherche pas  : dans le rituel babylonien du nouvel an, un prêtre appelait les jours du calendrier pour les faire venir à l''existence.'
  - type: text
    content: Ce jour-là, qu'il soit ténèbres,
  - type: text
    content: que Dieu ne le recherche pas de là-haut,
  - type: text
    content: que la lumière ne brille pas sur lui !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'l''ombre de mort  : le terme hébreu correspondant désignait sans doute à l''origine une obscurité profonde , comme le mot plus courant traduit par ténèbres  ; cependant il a été vocalisé dans le texte hébreu traditionnel de manière à évoquer aussi la mort  ; cf. 10.21s ; 12.22 ; 16.16 ; 24.17 ; 28.3 ; 34.22 ; 38.17 ; Es 9.1 ; Jr 2.6 ; 13.16 ; Am 5.8 ; Ps 23.4 ; 44.20 ; 107.10,14. –  le réclament (même racine que rédempteur en 19.25 ou assurer la rédemption en Ex 6.6+) ou (si l''on rattache le verbe à une autre racine) le souillent . –  l''obscurcissement du jour  : litt. comme des amertumes de jour . Une légère modification de la vocalisation traditionnelle permet de lire des obscurcissements de jour (peut-être des brouillards ou des éclipses).'
  - type: text
    content: Que les ténèbres et l'ombre de mort le réclament,
  - type: text
    content: que des nuées demeurent au-dessus de lui,
  - type: text
    content: que l'obscurcissement du jour le remplisse d'effroi !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''elle ne se réjouisse pas  : plusieurs versions anciennes ont lu qu''elle ne soit pas comptée , ce qui correspond à une légère variante de la vocalisation du texte hébreu. –  mois  : litt. lunes ou lunaisons  ; même terme en 7.3 ; 29.2 ; 39.2 ; cf. Dt 33.14.'
  - type: text
    content: Cette nuit-là, que l'obscurité s'en empare !
  - type: text
    content: Qu'elle ne se réjouisse pas avec les jours de l'année,
  - type: text
    content: qu'elle n'entre pas dans le compte des mois !
  '7':
  - type: text
    content: Oui, que cette nuit soit stérile,
  - type: text
    content: qu'il n'y ait pas en elle de cri de joie !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vouée à la malédiction  : cf. 5.3 ; Nb 22.11n  ; Pr 11.26 ; 24.24 ; voir aussi Lv 24.11n. –  ceux qui maudissent le jour et ceux qui savent éveiller (ou exciter , cf. 41.2n) Léviathan (en hébreu ce nom est presque identique à celui de Lotân , un monstre marin à sept têtes dans la littérature d''Ougarit  ; voir 40.25–41.26 ; Es 27.1n  ; Ps 74.14 ; 104.26 ; voir aussi Jb 7.12 ; 9.13 ; 26.13) sont probablement des sorciers auxquels le peuple avait recours pour prononcer des malédictions.'
  - type: text
    content: Qu'elle soit vouée à la malédiction par ceux qui maudissent le jour,
  - type: text
    content: par ceux qui savent éveiller Léviathan !
  '9':
  - type: text
    content: ' '
  - type: note
    content: la lueur (litt. les paupières , cf. 16.16n) de l'aurore 41.10 ; cf. Ps 11.4n  ; Pr 4.25n.
  - type: text
    content: Que les étoiles de son aube s'obscurcissent !
  - type: text
    content: Qu'elle espère la lumière, et que celle-ci ne vienne pas !
  - type: text
    content: Qu'elle ne voie pas la lueur de l'aurore !
