      text: ceux qui quadrillent le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui observent les étoiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui annoncent, d'après les nouvelles lunes,
  - type: usfm
    marker: q1
    children:
