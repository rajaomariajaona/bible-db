      marker-yv: yv-n
    - type: text
      text: 'Tu t''es fatiguée à force de demander conseil :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils se lèvent donc et qu'ils te sauvent,
  - type: usfm
    marker: q1
    children:
