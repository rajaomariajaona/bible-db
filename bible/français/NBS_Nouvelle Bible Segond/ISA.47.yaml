          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout à coup '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 29.5 ; 30.13 ; 48.3). Les chroniques babyloniennes soulignent que Babylone a été prise sans combat (cf. Dn 5.30).
      marker-yv: yv-n
    - type: text
      text: Un malheur viendra sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que tu en connaisses l'aurore ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la calamité tombera sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que tu puisses la conjurer ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la tourmente viendra sur toi à l'improviste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que tu le saches.
