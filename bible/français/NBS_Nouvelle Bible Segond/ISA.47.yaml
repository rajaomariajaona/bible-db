document_id: ISA.47,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La ruine prochaine de Babylone
  - type: text
    content: ' '
  - type: note
    content: 'Babylone jolie (litt. vierge de la fille de Babylone  ; cf. 1.8n) endeuillée et déchue ; cf. 13.1+,19 ; 48.14-20 ; Lm 1.1. –  Chaldéens v. 5 ; 23.13n. –  On ne t''appellera plus v. 5 ; cf. 51.22 ; 52.1. –  Délicate et Choyée (ou Raffinée ) : mêmes termes hébreux en Dt 28.54,56.'
  - type: text
    content: Descends, assieds-toi dans la poussière, Babylone jolie !
  - type: text
    content: Assieds-toi à terre, sans trône,
  - type: text
    content: fille des Chaldéens !
  - type: text
    content: On ne t'appellera plus « Délicate et Choyée ».
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le mal que tu faisais  : litt. ton mal (v. 11n) ; un ms de Qumrân a lu ta connaissance. –  Personne ne me voit Ez 8.12 ; Ps 10.11. –  la tête  : sous-entendu dans le texte. –  Moi… v. 9+.'
  - type: text
    content: Tu mettais ta confiance dans le mal que tu faisais,
  - type: text
    content: 'tu disais : Personne ne me voit !'
  - type: text
    content: Ta sagesse et ta connaissance t'ont tourné la tête,
  - type: text
    content: 'et tu te disais :'
  - type: text
    content: Moi, et rien que moi !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'malheur  : le même mot hébreu est traduit par mal au v. 10. –  sans que tu en connaisses l''aurore (au sens d''origine ou d''issue) : autre traduction sans que tu saches le conjurer (cf. 8.20n), en parallèle avec l''autre verbe rendu par conjurer qui est habituellement traduit par faire l''expiation ( annuler en 28.18). –  à l''improviste  : autre traduction tout à coup (cf. 29.5 ; 30.13 ; 48.3). Les chroniques babyloniennes soulignent que Babylone a été prise sans combat (cf. Dn 5.30).'
  - type: text
    content: Un malheur viendra sur toi,
  - type: text
    content: sans que tu en connaisses l'aurore ;
  - type: text
    content: la calamité tombera sur toi,
  - type: text
    content: sans que tu puisses la conjurer ;
  - type: text
    content: la tourmente viendra sur toi à l'improviste,
  - type: text
    content: sans que tu le saches.
  '12':
  - type: text
    content: ' '
  - type: note
    content: pratiques magiques v. 9n. –  tirer profit 44.9+.
  - type: text
    content: Reste donc au milieu de tes pratiques magiques
  - type: text
    content: et de la multitude de tes sortilèges,
  - type: text
    content: pour lesquels tu t'es fatiguée depuis ta jeunesse !
  - type: text
    content: Peut-être pourras-tu en tirer profit,
  - type: text
    content: peut-être parviendras-tu à inspirer de la terreur !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'de demander conseil  : litt. de conseils 5.19n. –  qu''ils se lèvent… 57.13 ; Dt 32.28 ; Jr 2.28. –  quadrillent  : les astrologues babyloniens divisaient le ciel en zones d''étude pour lire l''avenir d''après la position des astres.'
  - type: text
    content: 'Tu t''es fatiguée à force de demander conseil :'
  - type: text
    content: qu'ils se lèvent donc et qu'ils te sauvent,
  - type: text
    content: ceux qui quadrillent le ciel,
  - type: text
    content: qui observent les étoiles,
  - type: text
    content: qui annoncent, d'après les nouvelles lunes,
  - type: text
    content: ce qui doit t'arriver !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ils n''échapperont pas  : litt. ils ne délivreront pas leur âme  ; cf. Gn 1.20n. –  aux flammes  : litt. à la main de la flamme  ; cf. 44.16ss.'
  - type: text
    content: 'Ils seront comme de la paille :'
  - type: text
    content: un feu les brûlera ;
  - type: text
    content: 'ils n''échapperont pas aux flammes :'
  - type: text
    content: ce n'est pas de la braise pour leur pain,
  - type: text
    content: un brasier devant lequel on s'assied.
  '15':
  - type: text
    content: ' '
  - type: note
    content: pas de sauveur 45.20+.
  - type: text
    content: Voilà ce que deviendront
  - type: text
    content: ceux pour lesquels tu te fatiguais.
  - type: text
    content: Ceux avec qui tu as commercé depuis ta jeunesse
  - type: text
    content: 'erreront chacun de son côté :'
  - type: text
    content: pour toi, pas de sauveur !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'L''ensemble du verset décrit les gestes habituels des esclaves. –  le moulin  : Nb 11.8n. –  retire  : le même verbe est traduit plus loin au v. 2 par découvre , au v. 3 par exposer. Il a aussi, souvent, le sens d’ exiler. –  voile  : même terme en Ct 4.1,3 ; 6.7. –  fleuves  : cf. Ps 137.1.'
  - type: text
    content: Prends le moulin et mouds de la farine ;
  - type: text
    content: retire ton voile,
  - type: text
    content: relève le bas de ta robe,
  - type: text
    content: découvre tes cuisses,
  - type: text
    content: traverse les fleuves !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ta nudité (Lm 1.8) sera exposée (v. 2n) : cf. Ez 16.36s. –  J''aurai  : litt. je prendrai . –  vengeance 34.8+. –  je ne me laisserai arrêter par personne  : texte obscur ; on pourrait comprendre je ne rencontrerai personne (pour me faire obstacle) ou je n''accepterai l''intercession de personne  ; autres traductions possibles  : je n''aurai pas recours à un homme, je n''épargnerai personne  ; ou encore, en modifiant légèrement le texte hébreu traditionnel  : personne n''intercédera ou personne n''interviendra (53.12 ; 59.16).'
  - type: text
    content: Ta nudité sera exposée,
  - type: text
    content: on verra ton déshonneur.
  - type: text
    content: J'aurai ma vengeance,
  - type: text
    content: je ne me laisserai arrêter par personne.
  '4':
  - type: text
    content: ' '
  - type: note
    content: rédempteur 41.14n. –  le Seigneur (YHWH) des Armées 44.6+. –  Saint d'Israël 1.4n.
  - type: text
    content: 'Notre rédempteur a pour nom le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ;'
  - type: text
    content: c'est le Saint d'Israël.
  '5':
  - type: text
    content: ' '
  - type: note
    content: fille des Chaldéens v. 1n. –  On ne t'appellera plus v. 1.
  - type: text
    content: Assieds-toi en silence
  - type: text
    content: et va dans les ténèbres,
  - type: text
    content: fille des Chaldéens !
  - type: text
    content: On ne t'appellera plus
  - type: text
    content: « Souveraine des royaumes ».
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.6s. –  Je m''étais irrité 54.8ns ; 57.16s ; 60.10 ; 64.4,8. –  profané 43.28n. –  mon patrimoine 58.14 ; 63.17 ; Dt 4.20 ; 32.9. –  livrés 42.24+. –  ton joug Jr 27.8,11. –  le vieillard  : cf. Lm 1.19 ; 2.21.'
  - type: text
    content: Je m'étais irrité contre mon peuple,
  - type: text
    content: j'avais profané mon patrimoine
  - type: text
    content: et je te les avais livrés ;
  - type: text
    content: tu n'as pas eu de compassion pour eux,
  - type: text
    content: tu as fait peser lourdement ton joug sur le vieillard.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'toujours souveraine Ap 18.7. –  pas réfléchi 42.25n. –  tu n''as pas songé à  : autre traduction tu ne t''es pas souvenue de . –  la suite  : litt. sa suite (ou la suite de cela ) ; autres traductions l''avenir ; la fin  ; cf. Lm 1.9n.'
  - type: text
    content: 'Tu disais : Je serai toujours souveraine !'
  - type: text
    content: Tu n'as pas réfléchi à tout cela,
  - type: text
    content: tu n'as pas songé à la suite.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'voluptueuse  : autre terme hébreu qu''en v. 1n. –  Moi, et rien que moi v. 10 ; cf. 46.9 ; So 2.15. –  jamais veuve  : cf. 54.1-6 ; Lm 1.1 ; Ap 18.7.'
  - type: text
    content: Ecoute maintenant ceci, voluptueuse,
  - type: text
    content: qui es assise en toute sécurité
  - type: text
    content: 'et qui te dis :'
  - type: text
    content: Moi, et rien que moi !
  - type: text
    content: Je ne serai jamais veuve,
  - type: text
    content: je ne connaîtrai pas la privation d'enfants !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ces deux choses… 51.19. –  le même jour Ap 18.8. –  dans toute leur rigueur  : le terme hébreu évoque l''idée de totalité ou d''intégralité ; cf. 1R 22.34n. –  pratiques magiques  : litt. liens , de même au v. 12 ; même racine que l''expression jeter des sorts en Dt 18.11 ; cf. Dn 2.2 ; Ap 18.23.'
  - type: text
    content: Ces deux choses t'arriveront
  - type: text
    content: 'en un instant, le même jour :'
  - type: text
    content: la privation d'enfants et le veuvage ;
  - type: text
    content: elles fondront sur toi dans toute leur rigueur
  - type: text
    content: malgré la multitude de tes sortilèges,
  - type: text
    content: malgré la puissance de tes pratiques magiques.
