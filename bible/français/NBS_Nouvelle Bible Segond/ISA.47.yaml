    - type: text
      text: Reste donc au milieu de tes pratiques magiques
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la multitude de tes sortilèges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour lesquels tu t'es fatiguée depuis ta jeunesse !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-être pourras-tu en tirer profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: peut-être parviendras-tu à inspirer de la terreur !
