        - type: text
          text: 'Personne ne me voit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 8.12 ; Ps 10.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9+.
      marker-yv: yv-n
    - type: text
      text: Tu mettais ta confiance dans le mal que tu faisais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu disais : Personne ne me voit !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta sagesse et ta connaissance t'ont tourné la tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu te disais :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, et rien que moi !
