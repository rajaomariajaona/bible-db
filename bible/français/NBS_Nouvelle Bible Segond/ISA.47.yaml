        marker: fq
        children:
        - type: text
          text: 'On ne t''appellera plus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 5 ; cf. 51.22 ; 52.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Délicate et Choyée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Raffinée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : mêmes termes hébreux en Dt 28.54,56.'
      marker-yv: yv-n
    - type: text
      text: Descends, assieds-toi dans la poussière, Babylone jolie !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assieds-toi à terre, sans trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fille des Chaldéens !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne t'appellera plus « Délicate et Choyée ».
