        - type: text
          text: '39.3s : « Un tourbillon m''a enlevé de la face de la terre et m''a déposé à la frange des cieux. Et là j''ai vu une seconde vision : les demeures des saints, les lieux de repos des justes. »'
      marker-yv: yv-n
    - type: text
      text: 'Eh bien, moi, je vous dis : Faites-vous des amis avec le Mamon de l''injustice, pour que, quand il fera défaut, ils vous accueillent dans les demeures éternelles.'
