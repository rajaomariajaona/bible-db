document_id: LUK.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole de l'intendant habile
  - type: text
    content: ' '
  - type: note
    content: 'Un homme…  : litt. il y avait un homme (10.30+) riche qui avait un intendant (ou gérant , 12.42+) …  ; cf. v. 19. –  accusé  : autre traduction lui fut dénoncé comme dilapidant… le verbe grec traduit par accuser ou dénoncer signifie aussi calomnier  ; il est apparenté au mot transcrit diable (voir démon, diable, Satan). –  dilapider 15.13n.'
  - type: text
    content: 'Il disait aussi aux disciples : Un homme riche avait un intendant ; celui-ci fut accusé de dilapider ses biens. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: digne de confiance ou fidèle , de même dans la suite ; cf. 19.17.
  - type: text
    content: 'Celui qui est digne de confiance dans une petite affaire est aussi digne de confiance dans une grande, et celui qui est injuste dans une petite affaire est aussi injuste dans une grande. '
  '11':
  - type: note
    content: le Mamon… v. 9n.
  - type: text
    content: 'Si donc vous n''avez pas été dignes de confiance avec le Mamon injuste, qui vous confiera le bien véritable ? '
  '12':
  - type: note
    content: 'quelqu''un d''autre  : autre traduction un étranger  ; même terme Mt 17.25ns ; Jn 10.5n  ; Ac 7.6. –  votre propre bien  : quelques mss portent notre propre bien. – Cf. 2 Clément 8.5 : « Car le Seigneur dit dans l''évangile : “Si vous n''avez pas gardé ce qui était petit, qui vous donnera ce qui est grand ?” »'
  - type: text
    content: Et si vous n'avez pas été dignes de confiance pour ce qui appartenait à quelqu'un d'autre, qui vous donnera votre propre bien ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 6.24n. –  domestique  : même terme Ac 10.7 ; Rm 14.4 ; 1P 2.18 ; terme apparenté Mt 24.45. –  être esclave de  : autre traduction servir . –  maîtres ou seigneurs . –  détestera / aimera 14.26n  ; Ec 3.8.'
  - type: text
    content: Aucun domestique ne peut être esclave de deux maîtres. En effet, ou bien il détestera l'un et aimera l'autre, ou bien il s'attachera à l'un et méprisera l'autre. Vous ne pouvez être esclaves de Dieu et de Mamon.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'pharisiens 5.17+. –  amis de l''argent  : cf. v. 9nss ; 20.47. –  tout cela  : certains témoins lisent seulement cela . –  tournaient Jésus en dérision  : litt. le tournaient en dérision  ; cf. Jr 20.7 ; Ps 2.4 ; Pr 1.30.'
  - type: text
    content: 'Les pharisiens, amis de l''argent, écoutaient tout cela et tournaient Jésus en dérision. '
  '15':
  - type: note
    content: 'vous vous faites passer pour justes  : litt. vous êtes ceux qui se justifient 10.29+. –  connaît votre cœur (litt. vos cœurs) Ac 1.24 ; 15.8 ; cf. 8.21 ; voir aussi 1S 16.7 ; 1R 8.39 ; Ps 7.10 ; Pr 21.2 ; 24.12 ; 1Ch 28.9. –  ce qui est élevé… 11.43 ; 14.11 ; 18.14 ; Pr 16.5. –  abomination  : cf. Mc 13.14/ /.'
  - type: text
    content: 'Il leur dit : Vous, vous vous faites passer pour justes devant les gens, mais Dieu connaît votre cœur ; car ce qui est élevé aux yeux des gens est une abomination devant Dieu.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 11.12s. –  Jean le Baptiseur : cf. 3.1ss ; 7.26 ; Ac 1.22 ; 10.37 ; 13.24. –  Loi (de Moïse) / Prophètes  : cf. v. 29,31 ; 24.44 ; Ac 13.15 ; 24.14 ; 26.22 ; 28.23 ; voir aussi Jn 1.45 ; Rm 3.21. –  royaume ou règne 4.43+ ; 8.1 ; 9.2 ; 10.9 ; Ac 8.12. –  chacun use de violence  : cf. 13.24 ; autre traduction possible chacun est pressé d''y entrer (un verbe apparenté évoque une invitation pressante en 24.29 ; Ac 16.15) ; cf. 14.23.'
  - type: text
    content: 'Jusqu''à Jean, c''étaient la Loi et les Prophètes ; depuis, le royaume de Dieu est annoncé comme une bonne nouvelle, et chacun use de violence pour y entrer. '
  '17':
  - type: note
    content: Cf. v. 31 ; 21.33 ; voir aussi 24.27,44 ; Mt 5.18. –  ciel / terre 10.21 ; 12.56 ; Es 51.6 ; Jb 14.12 ; Ac 4.24 ; 14.15 ; 17.24.
  - type: text
    content: Or il est plus facile pour le ciel et la terre de passer que pour un seul trait de lettre de la Loi de tomber.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mt 5.32n  ; 1Co 7.10s. –  adultère 18.20 ; Jn 7.53–8.11.
  - type: text
    content: Quiconque répudie sa femme et en épouse une autre commet l'adultère, et celui qui épouse une femme répudiée par son mari commet l'adultère.
  - type: heading
    content: La parabole du riche et de Lazare
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cette parabole propre à Luc présente des analogies avec une légende égyptienne attestée par un document du Ier s. apr. J.-C. Il y est question d''un riche qui, après un enterrement solennel, souffre au royaume des morts, et d''un pauvre qui, après avoir été jeté dans la fosse commune, se retrouve auprès d''Osiris, vêtu des habits somptueux du riche. On retrouve des histoires analogues dans le Talmud de Jérusalem , notamment sous une forme où le riche est un collecteur des taxes et le pauvre un spécialiste de la loi. –  un homme riche v. 1+ ; un ms porte nommé Neuès (déformation de Ninive ou de Phinées = Phinéas , évoqués par d''autres témoins ?). –  s''habillait  : même verbe Mc 15.17. –  pourpre / fin lin (le terme grec a donné les mots byssos et byssus , cf. 1Ch 4.21n) Pr 31.22 ; Ap 18.12 ; Apocryphe de la Genèse (Qumrân) 20.31 : « Le roi lui donna (à Sara ?) beaucoup d''argent et d''or et beaucoup de vêtements de byssus et de pourpre. » –  et menait brillante vie  : litt. brillamment ou somptueusement (l''adjectif apparenté est traduit par resplendissant en 23.11) ; sur le verbe traduit par faisait la fête , voir 12.19 ; 15.23s,29,32 ; voir aussi Jc 5.5.'
  - type: text
    content: 'Il y avait un homme riche qui s''habillait de pourpre et de fin lin, et qui chaque jour faisait la fête et menait brillante vie. '
  '2':
  - type: note
    content: 'Qu''est-ce que j''entends dire…  : cf. Gn 12.18 ; 20.9 ; 42.28. –  Rends compte  : litt. rends parole  ; sur cette expression, voir Mt 12.36 ; Ac 19.40 ; Hé 13.17 ; cf. 4.13 ; Rm 14.12 ; 1P 4.5. –  intendance ou gestion, de même dans la suite. –  être mon intendant  : litt. faire l''intendance.'
  - type: text
    content: 'Il l''appela et lui dit : Qu''est-ce que j''entends dire de toi ? Rends compte de ton intendance, car tu ne pourras plus être mon intendant. '
  '20':
  - type: note
    content: 'Lazare  : forme grecque du nom hébreu Eléazar (Dieu aide, Dieu porte secours), cf. Ex 6.23 ; Jn 11. –  couché  : litt. jeté  ; cf. Ap 2.22 ; voir aussi Mt 8.6,14 ; 9.2.'
  - type: text
    content: 'Un pauvre couvert d''ulcères, nommé Lazare, était couché à son porche ; '
  '21':
  - type: note
    content: 'il aurait bien désiré… 15.16. –  de ce qui tombait…  : certains mss portent des miettes qui tombaient, cf. Mt 15.27/ /. –  les chiens, animaux considérés comme impurs (voir pur, impur) dans la société juive ; cf. Ps 22.17,21 ; Pr 26.11 ; Mt 7.6 ; Ph 3.2.'
  - type: text
    content: 'il aurait bien désiré se rassasier de ce qui tombait de la table du riche ; au lieu de cela, les chiens venaient lécher ses ulcères. '
  '22':
  - type: note
    content: 'Cf. 23.43. –  porté par les anges  : cf. Testament d''Aser 6.4ss : « Les derniers instants des hommes révèlent leur justice, lorsqu''ils font la connaissance des anges du Seigneur et de Béliar (= Satan). Car, quand l''âme s''en va troublée, elle est torturée par l''esprit malin dont elle était l''esclave dans ses convoitises et ses œuvres mauvaises. Mais si elle est paisible, dans la joie, elle fait la connaissance de l''ange de la paix qui l''introduit dans la vie éternelle. » Le Pasteur d''Hermas, Vis. II,2,7 : « Persévérez donc, vous qui pratiquez la justice, bannissez toute hésitation afin que vous cheminiez avec les saints anges. » –  sur le sein d''Abraham, c.-à-d. auprès d''Abraham  ; formule légèrement différente v. 23 ; cf. 13.28s ; sur l''expression, voir Jn 1.18n  ; 13.23 ; voir aussi 1R 1.21 ; 2.10 ; 11.21 ; 4 Maccabées 13.16 (paroles des martyrs) : « Si nous souffrons ainsi, Abraham, Isaac et Jacob nous accueilleront, et tous les pères feront notre éloge. » –  mourut et fut enseveli  : cf. 1 Hénoch 103.5s : « Quant à vous, pécheurs défunts, on dira de vous à votre mort : “Ils ont été heureux les pécheurs, tous les jours qu''ils ont vu durant leur vie. Ils sont morts entourés d''honneur, sans avoir connu de jugement durant leur vie.” Or, sachez qu''on fera descendre vos âmes dans le Shéol (= le séjour des morts) et qu''elles y seront dans une grande angoisse, dans des ténèbres, dans des liens, dans une flamme brûlante, et qu''elles subiront une peine rigoureuse pour toutes les générations du monde. »'
  - type: text
    content: 'Le pauvre mourut et fut porté par les anges sur le sein d''Abraham. Le riche aussi mourut et fut enseveli. '
  '23':
  - type: note
    content: 'Cf. v. 9,14s. –  le séjour des morts  : en grec hadès, terme utilisé comme équivalent de l''hébreu she''ol, également traduit par séjour des morts dans l''A.T. –  tourments v. 28 ; Mt 4.24 ; cf. 4 Maccabées 13.15 : « Car grande est l''épreuve de l''âme et le danger de tourment éternel en réserve pour ceux qui transgressent le commandement de Dieu. » –  il vit…  : cf. 4 Esdras 7.85 : « Elles (les âmes des impies) voient les demeures des autres, gardées par les anges dans un profond silence. » 7.93 : « Elles (les âmes des justes) voient le désordre dans lequel errent les âmes des impies et la punition qui leur est réservée. » 2 Baruch 51.5s : « Lors donc qu''ils verront ceux au-dessus de qui ils s''élèvent maintenant, exaltés et glorifiés alors au-dessus d''eux, et transformés ainsi qu''eux-mêmes, mais ceux-là en la splendeur des anges, eux au contraire en apparitions affreuses et en formes étranges, ils se consumeront encore davantage. Car ils verront cela tout d''abord, puis ils s''en iront pour être tourmentés. »'
  - type: text
    content: 'Dans le séjour des morts, il leva les yeux ; et, en proie aux tourments, il vit de loin Abraham et Lazare sur son sein. '
  '24':
  - type: note
    content: 'Abraham, mon père v. 27,30 ; 1.73 ; 3.8+. –  aie compassion 17.13 ; 18.38s ; Mt 9.27+. –  tremper 1 Hénoch 22.9 : « Ces trois (cavernes)-ci ont été créées pour séparer les esprits des morts. Ainsi, il a été réservé aux esprits des justes celle où jaillit la source lumineuse. » 4 Esdras 8.59 : « Eux (les impies) auront en partage la soif et les tourments qui leur sont préparés. » –  je souffre 2.48n. –  ces flammes  : litt. cette flamme  ; cf. Es 66.24 ; Siracide 21.9s : « Une assemblée d''impies est comme de l''étoupe entassée, ils finiront dans la flamme et le feu. La route des pécheurs est unie et sans pierres, mais au bout se trouve le gouffre du séjour des morts. » Hymnes (Qumrân) 17.13 : « Le feu dévorera le Shéol infernal. » 1 Hénoch 10.13 : « Ils seront conduits dans l''abîme de feu, dans le tourment et dans la geôle de réclusion perpétuelle. »'
  - type: text
    content: 'Il s''écria : Abraham, mon père, aie compassion de moi ! Envoie Lazare tremper le bout de son doigt dans l''eau pour me rafraîchir la langue, car je souffre dans ces flammes. '
  '25':
  - type: note
    content: 'Cf. 6.20s,24. –  Mon enfant 15.31. –  ton bien  : autres traductions ton bonheur ; tes biens (même terme 12.18s) ; le terme s''oppose au mal ou aux maux qu''a connus Lazare. –  au lieu de cela  : litt. pareillement. –  ici, il est consolé  : certains témoins ont lu lui, il est consolé  ; cf. Mt 5.4.'
  - type: text
    content: 'Mais Abraham répondit : Mon enfant, souviens-toi que tu as reçu ton bien durant ta vie et qu''au lieu de cela Lazare, lui, a eu le mal ; maintenant, ici, il est consolé, tandis que toi, tu souffres. '
  '26':
  - type: note
    content: 'En plus de tout cela  : certains comprennent dans tout cet endroit. –  un grand gouffre  : même expression 2S 18.17 (LXX, pour une grande fosse) ; cf. 1 Hénoch 18.11s : « J''ai vu un gouffre béant entre des colonnes de feu céleste… Au-delà de ce gouffre, j''ai vu un endroit que ne recouvrait pas le firmament céleste et que la terre ferme ne supportait pas. Il n''y avait là ni eau ni oiseau, mais c''était un lieu désert et effrayant. » –  mis  : litt. fixé, affermi, endurci  ; le choix du verbe correspondant (aussi 9.51n) souligne vraisemblablement le caractère irrévocable du sort de chacun.'
  - type: text
    content: 'En plus de tout cela, un grand gouffre a été mis entre nous et vous, afin que ceux qui voudraient passer d''ici vers vous ne puissent le faire, et qu''on ne traverse pas non plus de là-bas vers nous. '
  '27':
  - type: note
    content: 'père  : certains mss portent Abraham, mon père, comme au v. 24+. –  envoyer…  : cf. 1S 28.7ss.'
  - type: text
    content: 'Le riche dit : Alors, je te demande, père, d''envoyer Lazare dans la maison de mon père ; '
  '28':
  - type: note
    content: 'cinq  : cf. 14.19. –  Qu''il leur apporte son témoignage  : autre traduction qu''il les avertisse solennellement  ; le même verbe est traduit par attester en Ac 18.5 et par adjurer en 1Tm 5.21.'
  - type: text
    content: 'car j''ai cinq frères. Qu''il leur apporte son témoignage, afin qu''ils ne viennent pas, eux aussi, dans ce lieu de tourment ! '
  '29':
  - type: note
    content: 'Moïse (voir loi) et les Prophètes  : cf. v. 16n,31 ; 24.27,44 ; voir aussi 9.30/ / ; Jn 1.45 ; 5.46 ; Ac 26.22 ; 28.23. –  qu''ils les écoutent  : cf. 9.35.'
  - type: text
    content: 'Abraham répondit : Ils ont Moïse et les Prophètes ; qu''ils les écoutent ! '
  '3':
  - type: note
    content: 'se dit 12.17+ ; 18.4. –  mon maître (le mot grec est aussi traduit par Seigneur  ; de même dans la suite) me retire l''intendance  : cf. Es 22.19.'
  - type: text
    content: 'L''intendant se dit : Que vais-je faire, puisque mon maître me retire l''intendance ? Bêcher ? Je n''en aurais pas la force. Mendier ? J''aurais honte. '
  '30':
  - type: note
    content: Abraham, mon père v. 24+. –  ils changeront radicalement ou ils se repentiront, ils se convertiront, de même v. 31 ; cf. 3.3n  ; 17.3n.
  - type: text
    content: 'L''autre reprit : Non, Abraham, mon père, mais si quelqu''un de chez les morts va vers eux, ils changeront radicalement. '
  '31':
  - type: note
    content: 'Cf. 10.13 ; 11.19 ; Jn 5.45ss ; voir aussi 14.11 ; 20.29. –  ils ne se laisseront pas persuader  : certains témoins lisent ils ne croiront pas. –  se relevait d''entre les morts 9.8n,22 ; 18.33 ; cf. Jn 11.45ss ; 12.9ss. Voir résurrection.'
  - type: text
    content: 'Et Abraham lui dit : S''ils n''écoutent pas Moïse et les Prophètes, ils ne se laisseront pas persuader, même si quelqu''un se relevait d''entre les morts.'
  '4':
  - type: note
    content: 'pour qu''il y ait des gens qui…  : litt. pour qu''ils…  ; v. 6n,9. –  chez eux  : litt. dans leurs maisons.'
  - type: text
    content: 'Je sais ce que je vais faire, pour qu''il y ait des gens qui m''accueillent chez eux quand je serai relevé de mon intendance. '
  '5':
  - type: note
    content: débiteurs 7.41.
  - type: text
    content: 'Alors il fit appeler chacun des débiteurs de son maître ; il dit au premier : Combien dois-tu à mon maître ? '
  '6':
  - type: note
    content: 'Cent baths (le grec transcrit ici une mesure hébraïque ; voir mesures) d''huile  : environ 2 100 l ; cf. Esd 7.22. –  Prends  : le même verbe (aussi v. 7) est traduit par accueillir v. 4,9. –  cinquante  : on a parfois supposé que les cinquante mesures déduites correspondaient à la commission perçue par l''intendant (de même dans la suite). Mais l''hypothèse est invérifiable.'
  - type: text
    content: '– Cent '
  - type: text
    content: baths
  - type: text
    content: ' d''huile, répondit-il. Et il lui dit : Prends ton billet, assieds-toi vite, écris : cinquante. '
  '7':
  - type: note
    content: 'Cent kors (transcription d''une mesure hébraïque) de blé  : environ 21 000 l.'
  - type: text
    content: 'Il dit ensuite à un autre : Et toi, combien dois-tu ? – Cent '
  - type: text
    content: kors
  - type: text
    content: ' de blé, répondit-il. Et il lui dit : Prends ton billet et écris : Quatre-vingts. '
  '8':
  - type: note
    content: 'Le maître  : on pourrait aussi comprendre le Seigneur, cf. v. 3n  ; 7.13+. –  félicita  : autre traduction loua (cf. 1Co 11.2n). –  injuste ou malhonnête, trompeur  : litt. de l''injustice  ; cf. v. 9,11 ; 18.6. Voir justice. –  en homme avisé  : cf. 12.42 ; voir aussi Mt 10.16. –  les gens (litt. les fils) de ce monde 18.30 ; 20.34ns ; Mt 12.32n. –  dans leurs rapports…  : litt. pour leur génération  ; on pourrait aussi comprendre dans leur genre, ou dans leur domaine. –  les fils de la lumière  : l''expression correspondante désigne souvent les fidèles dans les écrits de Qumrân  ; cf. 11.34 ; Jn 12.36 ; Ep 5.8 ; 1Th 5.5.'
  - type: text
    content: Le maître félicita l'intendant injuste, parce qu'il avait agi en homme avisé. Car les gens de ce monde sont plus avisés dans leurs rapports à leurs semblables que les fils de la lumière.
  - type: heading
    content: L'argent injuste et le bien véritable
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.3 ; 11.41. –  le Mamon ou l''Argent  ; on trouve ici (jusqu''au v. 13) la transcription, en grec, d''un terme araméen dont on ne connaît pas l''origine avec certitude. Il peut suggérer une certaine personnification de l''argent ; cf. Mt 6.24n. –  de l''injustice v. 8n  ; autre traduction injuste  ; le texte emploiera l''adjectif correspondant au v. 11 ; on pourrait comprendre ici malhonnête (c.-à-d. mal acquis) ou trompeur. Cf. Pr 15.27 ; 1 Hénoch 63.10 : « Notre âme s''est repue de biens mal acquis, mais cela ne nous empêchera pas de descendre du sein de (l''abondance) dans la rigueur du Shéol (le séjour des morts). » –  quand il fera défaut  : certains témoins ont lu quand vous ferez défaut (c.-à-d. quand vous mourrez). –  ils vous accueillent…  : autre traduction on vous accueille  ; cf. v. 4 ; voir aussi v. 19ss. –  les demeures éternelles  : litt. les tentes éternelles , cf. 12.33 ; 18.22 ; l''image s''inspire peut-être de la Demeure ou tabernacle du désert, ou encore de la liturgie de la fête des Huttes ou des Tentes (voir calendrier et fêtes), cf. Ex 25.9n  ; Za 14.16ss ; Jn 1.14n  ; 7.2n  ; Ap 13.6 ; 21.3n  ; 1 Hénoch 39.3s : « Un tourbillon m''a enlevé de la face de la terre et m''a déposé à la frange des cieux. Et là j''ai vu une seconde vision : les demeures des saints, les lieux de repos des justes. »'
  - type: text
    content: 'Eh bien, moi, je vous dis : Faites-vous des amis avec le Mamon de l''injustice, pour que, quand il fera défaut, ils vous accueillent dans les demeures éternelles.'
