    text: 'Vous mangerez aussi dans un lieu pur, toi, tes fils et tes filles avec toi, la poitrine qu''on dédie rituellement et la cuisse qu''on prélève : elles vous sont données et prescrites pour toi et pour tes fils, sur les sacrifices de paix des Israélites. '
