document_id: LEV.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles relatives au deuil
  - type: text
    content: ' '
  - type: note
    content: 'Nadab ( généreux , mot apparenté à celui qui est traduit par volontaire en 7.16+) / Abihou ( il [Dieu, probablement ?] est mon père ) Ex 6.23 ; 24.1,9 ; 28.1 ; Nb 26.61. –  cassolette  : cf. 16.12 ; Ex 25.38n  ; Nb 16.6ss. –  feu / feu profane  : cf. 6.5s ; 9.24+ ; Nb 3.4n  ; 17.2.'
  - type: text
    content: 'Nadab et Abihou, fils d''Aaron, prirent chacun une cassolette, y mirent du feu et placèrent de l''encens dessus ; ils présentèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un feu profane, qu''il ne leur avait pas ordonné. '
  '10':
  - type: note
    content: 'séparer  : autre traduction distinguer  ; même verbe en 1.17+ ; 11.47 ; 20.24ss ; Gn 1.4n. –  sacré (ou saint) / profane / impur / pur chap. 11–15 (11.47) ; Ez 22.26+.'
  - type: text
    content: 'afin de séparer le sacré et le profane, l''impur et le pur, '
  '11':
  - type: note
    content: Cf. Dt 33.10+.
  - type: text
    content: 'et d''enseigner aux Israélites toutes les prescriptions que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur a données par l''intermédiaire de Moïse.'
  - type: heading
    content: Règles relatives aux viandes des sacrifices
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.12-16. –  sans levain  : autre traduction en pains sans levain , cf. 6.9. –  très sacrée 2.3,10.'
  - type: text
    content: 'Moïse dit à Aaron, ainsi qu''à Eléazar et Itamar, les fils qui lui restaient : Prenez l''offrande végétale qui reste des offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et mangez-la sans levain à côté de l''autel : c''est une chose très sacrée. '
  '13':
  - type: note
    content: un lieu sacré 6.9 ; voir saint.
  - type: text
    content: 'Vous la mangerez dans un lieu sacré : c''est ce qui est prescrit pour toi et pour tes fils, sur les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est là ce qui m''a été ordonné. '
  '14':
  - type: note
    content: un lieu pur et non sacré, c.-à-d. non réservé à un usage sacré, 4.12n. –  poitrine / cuisse 7.30-34. – Voir sacrifices.
  - type: text
    content: 'Vous mangerez aussi dans un lieu pur, toi, tes fils et tes filles avec toi, la poitrine qu''on dédie rituellement et la cuisse qu''on prélève : elles vous sont données et prescrites pour toi et pour tes fils, sur les sacrifices de paix des Israélites. '
  '15':
  - type: note
    content: 'Voir fils. –  prescription  : voir loi.'
  - type: text
    content: 'Ils apporteront, en plus des graisses consumées par le feu, la cuisse qu''on prélève et la poitrine qu''on dédie rituellement, pour les dédier rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; elles t''appartiendront, à toi et à tes fils avec toi, par une prescription perpétuelle, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a ordonné.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.3,15.
  - type: text
    content: 'Moïse chercha le bouc du sacrifice pour le péché : il avait été brûlé. Alors il s''irrita contre Eléazar et Itamar, les fils d''Aaron qui restaient, et il dit : '
  '17':
  - type: note
    content: 'Cf. 6.18-20. –  dans le lieu sacré  : autre traduction dans le lieu du sanctuaire (cf. v. 18n  ; voir cependant v. 13) ; même formule en 14.13. –  il vous l''a donnée, c.-à-d. le Seigneur vous l''a donnée. –  pour que vous vous chargiez de la faute  : autre traduction pour que vous enleviez la faute  ; cf. Ex 10.17n. – Voir expiation.'
  - type: text
    content: 'Pourquoi n''avez-vous pas mangé le sacrifice pour le péché dans le lieu sacré ? C''est une chose très sacrée : il vous l''a donnée pour que vous vous chargiez de la faute de la communauté, afin de faire sur elle l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '18':
  - type: note
    content: 'Le sang n''en a pas été apporté  : cf. le rituel pour le péché du prêtre en 4.5s,11s ; 6.23. –  sanctuaire et lieu sacré traduisent ici un même mot hébreu. –  comme je l''avais ordonné  : Syr, un Tg et Vg ont lu un passif (comme cela m''avait été ordonné).'
  - type: text
    content: 'Le sang n''en a pas été apporté à l''intérieur du sanctuaire ; vous deviez donc la manger dans le lieu sacré, comme je l''avais ordonné. '
  '19':
  - type: note
    content: Le sens exact de l'excuse avancée par Aaron pour justifier la conduite incriminée au v. 16 est incertain ; il faut peut-être comprendre qu'Aaron se considère comme solidaire de la faute commise par Nadab et Abihou ; cf. v. 1-3 ; 9.8-14.
  - type: text
    content: 'Aaron dit à Moïse : Aujourd''hui, ils ont présenté leur sacrifice pour le péché et leur holocauste devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Si aujourd''hui, après ce qui m''est arrivé, j''avais mangé le sacrifice pour le péché, cela aurait-il plu au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '2':
  - type: note
    content: Cf. Nb 16.35 ; 2R 1.10-14.
  - type: text
    content: 'Alors un feu sortit de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les dévora : ils moururent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: note
    content: 'cela lui plut  : litt. cela fut bon à ses yeux.'
  - type: text
    content: Moïse entendit, et cela lui plut.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ce que le Seigneur a dit  : cette parole n''est mentionnée nulle part ailleurs dans le Pentateuque. –  Je serai (ou je veux être ) reconnu pour saint (litt. sanctifié ou consacré )… : autre traduction possible je montrerai ma sainteté (litt. je me sanctifierai ou je me consacrerai ) au moyen de (ou aux dépens de , litt. en ) ceux qui s''approchent de moi, je me glorifierai… (cf. Ez 28.22n). –  garda le silence  : certains, en rapportant le verbe hébreu à une autre racine, comprennent se mit à se lamenter.'
  - type: text
    content: 'Moïse dit à Aaron : C''est ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit :'
  - type: text
    content: Je serai reconnu pour saint par ceux qui s'approchent de moi,
  - type: text
    content: je serai glorifié devant tout le peuple.
  - type: text
    content: Aaron garda le silence.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Mishaël / Eltsaphân / Ouzziel  : cf. Ex 6.16-22 ; Ac 5.6,10. –  Présentez-vous  : autre traduction approchez-vous , cf. 1.2n.'
  - type: text
    content: 'Moïse appela Mishaël et Eltsaphân, fils d''Ouzziel, oncle d''Aaron ; il leur dit : Présentez-vous pour enlever vos frères de devant le sanctuaire et les emporter hors du camp. '
  '5':
  - type: note
    content: dans ou avec (leurs tuniques).
  - type: text
    content: Ils se présentèrent et les emportèrent hors du camp dans leurs tuniques, comme Moïse l'avait dit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Sur les signes de deuil (Gn 37.34), cf. 21.10s ; Ez 44.20 ; Mt 26.65. –  vous n''attirerez pas la Colère  : le même verbe est traduit par s''irriter au v. 16 ; cf. Nb 1.53 ; Né 13.18 ; 2Ch 24.18 ; 25.15 ; 28.11-13. –  pleureront…  : cf. Jr 22.18 ; Ez 24.16-23.'
  - type: text
    content: 'Moïse dit à Aaron, ainsi qu''à Eléazar et Itamar, ses fils : Ne vous défaites pas les cheveux ; vous ne déchirerez pas vos vêtements ; ainsi vous ne mourrez pas, et vous n''attirerez pas la Colère sur toute la communauté. Vos frères, toute la maison d''Israël, pleureront sur l''embrasement que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a provoqué. '
  '7':
  - type: note
    content: Cf. 8.30-36 ; 21.12. – Voir onction.
  - type: text
    content: 'Vous ne quitterez pas l''entrée de la tente de la Rencontre, de peur que vous ne mouriez ; car l''huile d''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sur vous. Ils firent ce que Moïse avait dit.'
  - type: heading
    content: Règles relatives aux boissons alcoolisées
  '8':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Aaron : '
  '9':
  - type: note
    content: 'Tu ne boiras…  : cf. Nb 6.3s ; Jg 13.4,7,14 ; Es 28.7 ; Ez 44.21 ; Lc 1.15. –  boisson alcoolisée  : le terme correspondant, dérivé d''une racine qui évoque l''ivresse, peut s''appliquer à plusieurs sortes de boissons plus ou moins fortes (bière, cidre, vin) ; dans d''autres contextes, on le traduit plus simplement par alcool  ; cf. Nb 6.3 ; 28.7 ; Dt 14.26 ; 29.5 ; Jg 13.4,7,14 ; 1S 1.15 ; Es 5.11,22 ; 24.9 ; 28.7 ; 29.9 ; 56.12 ; Mi 2.11 ; Ps 69.13 ; Pr 20.1 ; 31.4,6. – Voir fils. –  prescription  : voir loi.'
  - type: text
    content: 'Tu ne boiras ni vin ni boisson alcoolisée, toi et tes fils avec toi, lorsque vous entrerez dans la tente de la Rencontre ; ainsi vous ne mourrez pas ; c''est une prescription perpétuelle, pour toutes vos générations, '
