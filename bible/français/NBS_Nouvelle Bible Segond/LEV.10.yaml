  - type: text
    text: 'Pourquoi n''avez-vous pas mangé le sacrifice pour le péché dans le lieu sacré ? C''est une chose très sacrée : il vous l''a donnée pour que vous vous chargiez de la faute de la communauté, afin de faire sur elle l''expiation devant le '
