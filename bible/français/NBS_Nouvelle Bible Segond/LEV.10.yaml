  - type: text
    text: 'Moïse dit à Aaron, ainsi qu''à Eléazar et Itamar, ses fils : Ne vous défaites pas les cheveux ; vous ne déchirerez pas vos vêtements ; ainsi vous ne mourrez pas, et vous n''attirerez pas la Colère sur toute la communauté. Vos frères, toute la maison d''Israël, pleureront sur l''embrasement que le '
  - type: usfm
