    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je l''entendrai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je pardonnerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.27,30. – Voir '
    - type: usfm
