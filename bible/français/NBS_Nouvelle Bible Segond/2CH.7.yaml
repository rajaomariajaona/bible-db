  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quand je fermerai le ciel…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quand j'ordonnerai aux criquets…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.28.'
    marker-yv: yv-n
  - type: text
    text: 'Quand je fermerai le ciel et qu''il n''y aura pas de pluie, quand j''ordonnerai aux criquets de dévorer le pays, quand j''enverrai la peste contre mon peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sur qui est invoqué mon '
      - type: usfm
        marker: w
