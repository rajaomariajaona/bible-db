document_id: 2CH.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices offerts au Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 18.38+. –  un feu descendit du ciel  : cf. 2R 1.10ss. –  dévora l''holocauste (voir sacrifices) : cf. Lv 9.24 ; voir aussi Jg 6.21 ; 1Ch 21.26.'
  - type: text
    content: 'Lorsque Salomon eut achevé de prier, un feu descendit du ciel et dévora l''holocauste et les sacrifices, et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplit la Maison. '
  '10':
  - type: note
    content: 'à ses tentes  : litt. à leurs tentes. –  le cœur content 1S 25.36 ; 2S 13.28.'
  - type: text
    content: 'Le vingt-troisième jour du septième mois, Salomon renvoya le peuple à ses tentes. Ils se réjouissaient, le cœur content du bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait fait à David, à Salomon et à Israël, son peuple.'
  - type: heading
    content: Le Seigneur apparaît de nouveau à Salomon
  - type: heading
    content: 1R 9.1-9
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ce qu''il avait eu l''idée de faire  : litt. ce qui était venu sur le cœur de Salomon . –  dans sa propre maison  : litt. dans sa maison.'
  - type: text
    content: 'Salomon acheva donc la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et la maison du roi. Il réussit tout ce qu''il avait eu l''idée de faire dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dans sa propre maison. '
  '12':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à Salomon pendant la nuit et lui dit : J''ai entendu ta prière et je me choisis ce lieu comme maison de sacrifices. '
  '13':
  - type: note
    content: 'Quand je fermerai le ciel…  : cf. 6.26. –  quand j''ordonnerai aux criquets…  : cf. 6.28.'
  - type: text
    content: 'Quand je fermerai le ciel et qu''il n''y aura pas de pluie, quand j''ordonnerai aux criquets de dévorer le pays, quand j''enverrai la peste contre mon peuple, '
  '14':
  - type: note
    content: 'sur qui est invoqué mon nom 6.33 ; Dt 28.10+ ; 2S 6.2 ; 1R 8.43. –  s''humilie 12.6+. –  me recherche  : litt. recherche ma face  ; autre traduction recherche ma faveur  ; cf. Ps 27.8+. –  revient  : le verbe hébreu correspondant est rendu par se détourner au v. 19 ; voir changement radical. –  je l''entendrai / je pardonnerai  : cf. 6.27,30. – Voir péché.'
  - type: text
    content: 'si mon peuple, sur qui est invoqué mon nom, s''humilie, prie et me recherche, s''il revient de ses voies mauvaises, moi, je l''entendrai depuis le ciel, je pardonnerai son péché et je guérirai son pays. '
  '15':
  - type: note
    content: 'mes yeux seront ouverts…  : cf. 6.20,40+.'
  - type: text
    content: 'Maintenant mes yeux seront ouverts, et mes oreilles seront attentives à la prière de ce lieu. '
  '16':
  - type: note
    content: toujours cf. 1R 9.3n.
  - type: text
    content: 'Maintenant, je choisis et je consacre cette maison afin que mon nom y soit pour toujours ; mes yeux et mon cœur seront toujours là. '
  '17':
  - type: text
    content: 'Et toi, si tu marches devant moi comme a marché David, ton père, en faisant exactement ce que je t''ai ordonné, si tu observes mes prescriptions et mes règles, '
  '18':
  - type: note
    content: Tu auras toujours… 1R 2.4n.
  - type: text
    content: 'j''établirai ton trône royal, selon ce que j''ai conclu avec ton père David, en disant : « Tu auras toujours un successeur pour gouverner Israël. » '
  '19':
  - type: note
    content: si vous abandonnez mes prescriptions  ; cf. 24.20 ; 1R 18.18 ; 2R 17.13ss ; Esd 9.10 ; voir loi.
  - type: text
    content: 'Mais si vous vous détournez, si vous abandonnez mes prescriptions et mes commandements, que j''ai placés devant vous, si vous allez servir d''autres dieux et vous prosterner devant eux, '
  '2':
  - type: note
    content: 'car la gloire du Seigneur …  : cf. 5.14.'
  - type: text
    content: 'Les prêtres ne pouvaient entrer dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', car la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplissait la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: note
    content: 'je vous déracinerai  : litt. je les déracinerai de dessus mon sol (cf. Gn 2.5n) que je leur ai donné. –  consacrée  : voir saint.'
  - type: text
    content: 'je vous déracinerai de ma terre, celle que je vous ai donnée ; je rejetterai loin de moi cette maison que j''ai consacrée pour mon nom, et j''en ferai un sujet de fable et de raillerie parmi tous les peuples. '
  '21':
  - type: text
    content: 'Et si haut placée qu''ait été cette maison, quiconque passera près d''elle sera atterré et dira : « Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a-t-il ainsi traité ce pays et cette maison ? » '
  '22':
  - type: text
    content: 'Et l''on répondra : « C''est parce qu''ils ont abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de leurs pères, qui les a fait sortir d''Egypte, parce qu''ils se sont attachés à d''autres dieux, se sont prosternés devant eux et les ont servis ; voilà pourquoi il a fait venir sur eux tout ce malheur. »'
  '3':
  - type: note
    content: 'feu / gloire  : cf. v. 1 ; Ex 24.17 ; Dt 5.24. –  s''agenouillèrent / prosternés  : cf. 29.29 ; Ps 22.30 ; 72.9 ; Est 3.2. –  car il est bon… 5.13n.'
  - type: text
    content: 'Tous les Israélites voyaient descendre le feu et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur la Maison ; ils s''agenouillèrent sur le pavé, face contre terre et, prosternés, ils célébrèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car il est bon, car sa fidélité est pour toujours !'
  - type: heading
    content: 1R 8.62-66
  '4':
  - type: text
    content: 'Le roi et tout le peuple offrirent des sacrifices devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Le roi Salomon offrit un sacrifice de vingt-deux mille têtes de gros bétail et de cent vingt mille têtes de petit bétail. Ainsi le roi et tout le peuple firent la dédicace de la maison de Dieu. '
  '6':
  - type: note
    content: 'prêtres… lévites  : cf. Nb 18.1n. –  avec les instruments…  : cf. 7.6 ; 29.26 ; 30.21 ; 1Ch 6.17 ; 15.16 ; 16.42. –  ceux que le roi David avait faits  : cf. Né 12.36+. –  quand David louait Dieu par leur entremise  : cf. 5.11-13 ; Ps 136.'
  - type: text
    content: 'Les prêtres se tenaient à leur poste, ainsi que les lévites avec les instruments de musique du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ceux que le roi David avait faits pour célébrer le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car sa fidélité est pour toujours ! – quand David louait Dieu par leur entremise. Les prêtres sonnaient des trompettes en face d''eux, et tout Israël se tenait debout.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'la cour  : litt. l''intérieur (ou le milieu ) de la cour . –  l''autel de bronze 4.1.'
  - type: text
    content: 'Salomon consacra la cour qui est devant la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il y offrit les holocaustes et les graisses des sacrifices de paix, parce que l''autel de bronze que Salomon avait fait ne pouvait contenir les holocaustes, les offrandes végétales et les graisses.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pendant sept jours  : cf. 1R 8.65n.'
  - type: text
    content: 'En ce temps-là, Salomon célébra la fête pendant sept jours, et tout Israël avec lui ; une très grande assemblée était venue depuis l''entrée de Hamath jusqu''à l''oued d''Egypte. '
  '9':
  - type: note
    content: assemblée solennelle ou cérémonie de clôture  ; cf. Lv 23.36n.
  - type: text
    content: 'Le huitième jour, ils eurent une assemblée solennelle ; car ils firent la dédicace de l''autel pendant sept jours, et ils célébrèrent la fête pendant sept jours. '
