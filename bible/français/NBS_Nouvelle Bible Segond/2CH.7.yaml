  - type: text
    text: 'En ce temps-là, Salomon célébra la fête pendant sept jours, et tout Israël avec lui ; une très grande assemblée était venue depuis l''entrée de Hamath jusqu''à l''oued d''Egypte. '
  - type: usfm
