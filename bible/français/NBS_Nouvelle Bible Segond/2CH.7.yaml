  - type: text
    text: 'Salomon acheva donc la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et la maison du roi. Il réussit tout ce qu''il avait eu l''idée de faire dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et dans sa propre maison. '
  - type: usfm
