  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' apparut à Salomon pendant la nuit et lui dit : J''ai entendu ta prière et je me choisis ce lieu comme maison de sacrifices. '
  - type: usfm
    marker: v
