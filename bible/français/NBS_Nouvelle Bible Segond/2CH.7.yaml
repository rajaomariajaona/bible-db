    marker-yv: yv-n
  - type: text
    text: 'Les prêtres se tenaient à leur poste, ainsi que les lévites avec les instruments de musique du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ceux que le roi David avait faits pour célébrer le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – car sa fidélité est pour toujours ! – quand David louait Dieu par leur entremise. Les prêtres sonnaient des trompettes en face d''eux, et tout Israël se tenait debout.'
