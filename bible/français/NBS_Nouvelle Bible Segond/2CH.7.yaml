      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, ils eurent une assemblée solennelle ; car ils firent la dédicace de l''autel pendant sept jours, et ils célébrèrent la fête pendant sept jours. '
  - type: usfm
    marker: v
