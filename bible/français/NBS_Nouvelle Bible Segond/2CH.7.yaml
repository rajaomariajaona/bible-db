    marker-yv: yv-n
  - type: text
    text: 'Le vingt-troisième jour du septième mois, Salomon renvoya le peuple à ses tentes. Ils se réjouissaient, le cœur content du bien que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait fait à David, à Salomon et à Israël, son peuple.'
