  - type: text
    text: 'Tous les Israélites voyaient descendre le feu et la gloire du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sur la Maison ; ils s''agenouillèrent sur le pavé, face contre terre et, prosternés, ils célébrèrent le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
