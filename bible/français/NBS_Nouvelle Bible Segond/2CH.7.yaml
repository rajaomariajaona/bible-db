        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.33 ; Dt 28.10+ ; 2S 6.2 ; 1R 8.43. –  '
    - type: usfm
