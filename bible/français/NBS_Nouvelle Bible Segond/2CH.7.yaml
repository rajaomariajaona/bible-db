  - type: text
    text: 'Le roi Salomon offrit un sacrifice de vingt-deux mille têtes de gros bétail et de cent vingt mille têtes de petit bétail. Ainsi le roi et tout le peuple firent la dédicace de la maison de Dieu. '
  - type: usfm
