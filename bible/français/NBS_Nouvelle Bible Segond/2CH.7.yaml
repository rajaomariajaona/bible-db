  - type: text
    text: 'Salomon consacra la cour qui est devant la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : il y offrit les holocaustes et les graisses des sacrifices de paix, parce que l''autel de bronze que Salomon avait fait ne pouvait contenir les holocaustes, les offrandes végétales et les graisses.'
