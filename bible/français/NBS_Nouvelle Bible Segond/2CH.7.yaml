    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes yeux seront ouverts…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.20,40+.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant mes yeux seront ouverts, et mes oreilles seront attentives à la prière de ce lieu. '
  - type: usfm
    marker: v
    metadata:
