      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'si mon peuple, sur qui est invoqué mon nom, s''humilie, prie et me recherche, s''il revient de ses voies mauvaises, moi, je l''entendrai depuis le ciel, je pardonnerai son péché et je guérirai son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
