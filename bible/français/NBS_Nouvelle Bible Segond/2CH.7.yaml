    - type: usfm
      marker: fq
      children:
      - type: text
        text: revient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu correspondant est rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se détourner '
    - type: usfm
