      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sidon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 2) : importantes villes phéniciennes sur la côte méditerranéenne, au nord du royaume d''Israël ; cf. Jos 19.29 ; 2S 5.11 ; 1R 7.13 ; Jr 25.22 ; 27.3 ; Ez 26–28 ; Os 9.13 ; Jl 4.4 ; Am 1.9s ; Za 9.2ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bateaux de Tarsis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ravagée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 14 ; 15.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Plus de maisons ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car leur maison a été ravagée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Plus d''entrée ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: si l'on rattache le mot hébreu correspondant à ce qui suit, on peut comprendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est en arrivant de '
      - type: usfm
        marker: fq
        children:
        - type: text
