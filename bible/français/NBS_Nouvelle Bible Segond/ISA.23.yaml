        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Sentence sur Tyr.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hurlez, bateaux de Tarsis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elle a été ravagée !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus de maisons ! Plus d'entrée !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est depuis Chypre que cela leur fut révélé.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Traverse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms de Qumrân et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'travaille ta terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au lieu de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: traverse ton pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; on a aussi interprété le texte hébreu traditionnel comme suit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'répands-toi dans ton pays comme le Nil… il n''y a plus de digue. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tarsis la belle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fille de Tarsis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l'interpellation s'adresse vraisemblablement à Tarsis elle-même (v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', cf. v. 12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; certains pensent cependant qu''elle est destinée à Tyr en tant que celle-ci dépendait de ses relations avec Tarsis. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: joug
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: digue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ?). Le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceinture '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ps 109.19. Certains y voient une référence aux deux ports qui encadraient Tyr, au nord et au sud. LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bateaux.
      marker-yv: yv-n
    - type: text
      text: Traverse ton pays, pareille au Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tarsis la belle : plus de joug !'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étendu la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 5.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en ce qui concerne Canaan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction, moins probable dans ce contexte, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Canaan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; le terme vise sans doute ici les Phéniciens et leur puissance commerciale (cf. v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; Gn 9.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a étendu la main sur la mer ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a fait trembler les royaumes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a ordonné, en ce qui concerne Canaan, de détruire ses places fortes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sidon jolie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vierge de la fille de Sidon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 37.22 ; 65.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chypre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1+.
      marker-yv: yv-n
    - type: text
      text: 'Il a dit : Tu ne continueras plus à t''amuser,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sidon jolie, toi qui as été violentée !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, passe vers Chypre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même là, il n'y aura pas de repos pour toi.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chaldéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(13.19 ; 43.14) ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Babyloniens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de Basse-Mésopotamie ont été battus par les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Assyriens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de Haute-Mésopotamie en 703 av. J.-C. Ils ont toutefois continué leur lutte contre l''hégémonie assyrienne jusqu''à reprendre le pouvoir à Babylone (625 av. J.-C.) pour fonder l''empire néo-babylonien, qui a dominé toute la région avant de tomber devant les conquérants perses (539 av. J.-C.). Il est donc difficile de savoir à quel événement historique se réfère ce verset, dont le sens est par ailleurs passablement obscur. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habitants du désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir 13.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Il pourrait s''agir ici de nomades (cf. Ps 72.9). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils démantèlent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 51.58 ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils dénudent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Es 32.11). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les palais de Tyr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses palais.
      marker-yv: yv-n
    - type: text
      text: Voici le pays des Chaldéens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui n'étaient pas un peuple ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les Assyriens l'ont destiné aux habitants du désert ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils élèvent des tours de garde ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils démantèlent les palais de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils en font des monceaux de ruines.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 1.
      marker-yv: yv-n
    - type: text
      text: Hurlez, bateaux de Tarsis !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car votre forteresse est ravagée !
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: soixante-dix ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 25.11 ; 29.10 ; Za 1.12 ; 7.5 ; Dn 9.2 ; 2Ch 36.21. Si l''ensemble de l''oracle se rapporte à la soumission de Tyr à Nabuchodonosor en 572 av. J.-C., la fin de cette période pourrait correspondre au rétablissement de la flotte phénicienne sous l''empire perse. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prostituée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.21 ; Ap 17.5 ; 18.3,11-13.'
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là, Tyr tombera dans l''oubli soixante-dix ans, ce que durent les jours d''un roi. Au bout de soixante-dix ans, il en sera de Tyr comme de la prostituée dont parle la chanson :'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on se souvienne de toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'on pense à toi.
      marker-yv: yv-n
    - type: text
      text: Prends une cithare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais le tour de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prostituée qu'on oublie !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joue bien, multiplie tes chants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'on se souvienne de toi !
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'interviendra à '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: visitera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
