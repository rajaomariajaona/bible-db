document_id: ISA.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Tyr
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  Tyr et Sidon (v. 2) : importantes villes phéniciennes sur la côte méditerranéenne, au nord du royaume d''Israël ; cf. Jos 19.29 ; 2S 5.11 ; 1R 7.13 ; Jr 25.22 ; 27.3 ; Ez 26–28 ; Os 9.13 ; Jl 4.4 ; Am 1.9s ; Za 9.2ss. –  bateaux de Tarsis 2.16n  ; voir aussi v. 7n. –  ravagée v. 14 ; 15.1. –  Plus de maisons ! certains modifient le texte hébreu traditionnel pour lire car leur maison a été ravagée . –  Plus d''entrée ! si l''on rattache le mot hébreu correspondant à ce qui suit, on peut comprendre  : c''est en arrivant de Chypre (voir Gn 10.4n) que cela leur fut révélé . – Cf. v. 14-15n.'
  - type: text
    content: Sentence sur Tyr.
  - type: text
    content: Hurlez, bateaux de Tarsis,
  - type: text
    content: car elle a été ravagée !
  - type: text
    content: Plus de maisons ! Plus d'entrée !
  - type: text
    content: C'est depuis Chypre que cela leur fut révélé.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Traverse  : un ms de Qumrân et LXX ont lu sers , ce qui pourrait signifier travaille ta terre au lieu de traverse ton pays  ; on a aussi interprété le texte hébreu traditionnel comme suit  : répands-toi dans ton pays comme le Nil… il n''y a plus de digue. –  Tarsis la belle  : litt. fille de Tarsis l''interpellation s''adresse vraisemblablement à Tarsis elle-même (v. 7n, cf. v. 12n  ; 1.8n) ; certains pensent cependant qu''elle est destinée à Tyr en tant que celle-ci dépendait de ses relations avec Tarsis. –  joug  : traduction incertaine ( digue  ?). Le même mot est traduit par ceinture en Ps 109.19. Certains y voient une référence aux deux ports qui encadraient Tyr, au nord et au sud. LXX bateaux.'
  - type: text
    content: Traverse ton pays, pareille au Nil,
  - type: text
    content: 'Tarsis la belle : plus de joug !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'étendu la main  : 5.25+. –  en ce qui concerne Canaan  : autre traduction, moins probable dans ce contexte, à Canaan  ; le terme vise sans doute ici les Phéniciens et leur puissance commerciale (cf. v. 8n) ; Gn 9.18n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a étendu la main sur la mer ;'
  - type: text
    content: il a fait trembler les royaumes ;
  - type: text
    content: il a ordonné, en ce qui concerne Canaan, de détruire ses places fortes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Sidon jolie  : litt. vierge de la fille de Sidon  ; cf. v. 10n  ; 37.22 ; 65.22. –  Chypre v. 1+.'
  - type: text
    content: 'Il a dit : Tu ne continueras plus à t''amuser,'
  - type: text
    content: Sidon jolie, toi qui as été violentée !
  - type: text
    content: Lève-toi, passe vers Chypre !
  - type: text
    content: Même là, il n'y aura pas de repos pour toi.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Les Chaldéens (13.19 ; 43.14) ou Babyloniens de Basse-Mésopotamie ont été battus par les Assyriens de Haute-Mésopotamie en 703 av. J.-C. Ils ont toutefois continué leur lutte contre l''hégémonie assyrienne jusqu''à reprendre le pouvoir à Babylone (625 av. J.-C.) pour fonder l''empire néo-babylonien, qui a dominé toute la région avant de tomber devant les conquérants perses (539 av. J.-C.). Il est donc difficile de savoir à quel événement historique se réfère ce verset, dont le sens est par ailleurs passablement obscur. –  habitants du désert  : voir 13.21n. Il pourrait s''agir ici de nomades (cf. Ps 72.9). –  ils démantèlent  : cf. Jr 51.58 ; autre traduction ils dénudent (Es 32.11). –  les palais de Tyr  : litt. ses palais.'
  - type: text
    content: Voici le pays des Chaldéens,
  - type: text
    content: qui n'étaient pas un peuple ;
  - type: text
    content: les Assyriens l'ont destiné aux habitants du désert ;
  - type: text
    content: ils élèvent des tours de garde ;
  - type: text
    content: ils démantèlent les palais de Tyr,
  - type: text
    content: ils en font des monceaux de ruines.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1.
  - type: text
    content: Hurlez, bateaux de Tarsis !
  - type: text
    content: Car votre forteresse est ravagée !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'soixante-dix ans  : cf. Jr 25.11 ; 29.10 ; Za 1.12 ; 7.5 ; Dn 9.2 ; 2Ch 36.21. Si l''ensemble de l''oracle se rapporte à la soumission de Tyr à Nabuchodonosor en 572 av. J.-C., la fin de cette période pourrait correspondre au rétablissement de la flotte phénicienne sous l''empire perse. –  prostituée  : cf. 1.21 ; Ap 17.5 ; 18.3,11-13.'
  - type: text
    content: 'En ce jour-là, Tyr tombera dans l''oubli soixante-dix ans, ce que durent les jours d''un roi. Au bout de soixante-dix ans, il en sera de Tyr comme de la prostituée dont parle la chanson :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'qu''on se souvienne de toi  : autre traduction qu''on pense à toi.'
  - type: text
    content: Prends une cithare,
  - type: text
    content: fais le tour de la ville,
  - type: text
    content: prostituée qu'on oublie !
  - type: text
    content: Joue bien, multiplie tes chants,
  - type: text
    content: pour qu'on se souvienne de toi !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'interviendra à ou visitera  ; cf. 24.22n  ; Jr 6.15n. –  impur  : voir pur. –  sur toute la terre  : litt. sur la face du sol  ; cf. Gn 2.5n.'
  - type: text
    content: 'Au bout de soixante-dix ans, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' interviendra à Tyr, et elle retournera à son salaire impur ; elle se prostituera avec tous les royaumes du monde, sur toute la terre. '
  '18':
  - type: note
    content: 'gain / salaire  : voir 45.14 ; 60.4-14 ; Za 14.14 ; cf. Dt 23.19 ; Os 2.14 ; 9.1. –  consacrés  : voir saint.'
  - type: text
    content: 'Mais son gain et son salaire impur seront consacrés au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils ne seront ni entassés ni conservés : son gain sera pour ceux qui habitent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' une nourriture qui rassasie et des vêtements somptueux.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Soyez muets d''effroi Am 5.13 ; Lm 2.10. –  habitants de l''île  : Tyr était bâtie sur une île ; voir cependant 11.11+ ; Gn 10.5n. –  que comblaient les marchands de Sidon, parcourant la mer  : un ms de Qumrân porte marchands de Sidon, tes envoyés qui parcourent la mer.'
  - type: text
    content: Soyez muets d'effroi, habitants de l'île,
  - type: text
    content: que comblaient les marchands de Sidon, parcourant la mer !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'les céréales  : litt. la semence  ; certains comprennent les semailles , d''autres la progéniture , c.-à-d. les poissons. –  Shihor  : ce nom est peut-être à lire ici comme une autre désignation du Nil  ; ailleurs il semble en être distingué ; cf. Jos 13.3n  ; 19.26 ; Jr 2.18n. –  faisaient ses revenus  : autre traduction devenaient ses récoltes . –  le marché des nations  : cf. Ez 27.12-25.'
  - type: text
    content: Sur les grandes eaux, les céréales du Shihor,
  - type: text
    content: la moisson du Nil, faisaient ses revenus ;
  - type: text
    content: elle était le marché des nations.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Peut-être ce verset fait-il allusion au rôle de la divinité de la mer dans la mythologie phénicienne. –  jeunes filles  : litt. vierges.'
  - type: text
    content: Aie honte, Sidon !
  - type: text
    content: Car ainsi parle la mer,
  - type: text
    content: 'la forteresse de la mer :'
  - type: text
    content: Je n'ai pas eu de douleurs,
  - type: text
    content: je n'ai pas accouché,
  - type: text
    content: je n'ai pas fait grandir de jeunes gens,
  - type: text
    content: ni élevé de jeunes filles.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'arrivera  : sous-entendu dans le texte. –  comme pour Tyr  : litt. comme la nouvelle de Tyr  ; on a vu dans ce v. des allusions historiques à la prise de Sidon par Artaxerxès III (343 av. J.-C.) et à la prise de Tyr par Alexandre le Grand, deux événements qui ont été suivis de campagnes victorieuses des conquérants contre l''Egypte. Cf. Jr 4.19 ; 51.29 ; Ez 30.16.'
  - type: text
    content: Quand la nouvelle arrivera en Egypte,
  - type: text
    content: on tremblera – comme pour Tyr.
  '6':
  - type: text
    content: Passez vers Tarsis,
  - type: text
    content: hurlez, habitants de l'île,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'est-ce là…  : litt. est-ce cela pour vous la liesse ? cf. 22.2. – Les termes correspondant à origine et à jadis sont apparentés ; cf. 51.9 ; Mi 7.20 ; Ps 44.2. L''antiquité de Tyr était proverbiale. –  l''emmenaient (autre traduction l''emmènent ) séjourner au loin  : le verbe correpondant à séjourner évoque habituellement le séjour de l''immigré, cf. Ex 12.48n  ; les Phéniciens avaient fondé des colonies en Afrique (Carthage), en Espagne (Tarsis), etc.'
  - type: text
    content: est-ce là votre ville en liesse ?
  - type: text
    content: Son origine remontait aux jours de jadis,
  - type: text
    content: et ses pieds l'emmenaient séjourner au loin.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ap 18.23. –  projet 5.19n  ; 14.26+. –  couronnes  : sans doute celles des princes des colonies phéniciennes. –  commerçants ou Cananéens  ; cf. v. 11 ; Ez 16.29n  ; Os 12.8n  ; So 1.11n  ; Za 14.21 ; Jb 40.30 ; Pr 31.24. Voir aussi Gn 10.15n  ; Ez 28.18 ; Né 13.16.'
  - type: text
    content: Qui a formé ce projet
  - type: text
    content: contre Tyr, la dispensatrice des couronnes,
  - type: text
    content: elle dont les marchands étaient des princes,
  - type: text
    content: dont les commerçants étaient honorés de toute la terre ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'pour profaner (ou pour transpercer , cf. Ez 9.7n) l''orgueil de toute beauté (ou de tout ornement ) : cf. 2.9+ ; Ez 28 ; Jb 22.29 ; Pr 6.17.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui a formé ce projet,'
  - type: text
    content: pour profaner l'orgueil de toute beauté,
  - type: text
    content: pour réduire à peu de chose tout ce qui est honoré sur la terre.
