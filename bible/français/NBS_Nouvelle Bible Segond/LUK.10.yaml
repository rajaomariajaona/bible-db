    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bethsaïda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (9.10+), près du lac de Tibériade Mt 11.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: miracles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : en grec, c''est le pluriel du mot habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'puissance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.14+ ; Mc 6.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Lc 16.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tyr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sidon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 11.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que leurs habitants…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''elles auraient '
      - type: usfm
        marker: w
        children:
        - type: text
          text: changé
      - type: text
        text: ' radicalement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se seraient repenties, se seraient converties
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans le sac et la cendre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . Sur ces signes de deuil, de tristesse ou de pénitence, cf. Jon 3.6 ; Mt 11.21+.
    marker-yv: yv-n
  - type: text
    text: 'Quel malheur pour toi, Chorazin ! Quel malheur pour toi, Bethsaïda ! Si les miracles qui ont été faits chez vous avaient été faits à Tyr et à Sidon, il y a longtemps que leurs habitants auraient changé radicalement, qu''ils se seraient vêtus de sacs et assis dans la cendre ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lors du jugement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ml 3.5s ; Jd 6.
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi, lors du jugement, ce sera moins dur pour Tyr et Sidon que pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Capharnaüm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.23+ ; 7.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: seras-tu élevée…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celle qui est élevée jusqu'au ciel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Es 14.13ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu descendras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu seras abaissée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: séjour
      - type: text
        text: ' des morts'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : en grec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hadès
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 16.22ss ; voir aussi Es 14.9,11,15 ; Ez 26.20 ; 31.16s.'
    marker-yv: yv-n
  - type: text
    text: Et toi, Capharnaüm, seras-tu élevée jusqu'au ciel ? Tu descendras jusqu'au séjour des morts !
