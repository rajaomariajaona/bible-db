      - type: text
        text: ' : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soixante-dix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 17 ; cf. Gn 10.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 1.5 ; 24.1 ; Nb 11.16,24 ; Dt 10.22 ; 32.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.52'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'deux à deux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 6.7 ; cf. Nb 35.30 ; Dt 19.15 ; Ac 8.14 ; 13.2 ; 15.32,40.
    marker-yv: yv-n
  - type: text
    text: 'Après cela, le Seigneur en désigna soixante-douze autres et les envoya devant lui, deux à deux, dans toute ville et en tout lieu où lui-même devait se rendre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 9.37s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: moisson
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.16s ; 8.15 ; Jn 4.36ss ; voir aussi Es 27.11s ; 33.11 ; 41.15s ; Jr 13.24 ; 51.2,33 ; Jl 4.13 ; Am 9.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Priez… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.32 ; Ac 8.22,24 ; 10.2.
    marker-yv: yv-n
  - type: text
    text: 'Il leur disait : La moisson est grande, mais il y a peu d''ouvriers. Priez donc le maître de la moisson d''envoyer des ouvriers dans sa moisson. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je vous envoie… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.2 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Hénoch
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '89.14 (évocation allégorique de la venue des onze frères de Joseph en Egypte) : « Le Maître fit venir les onze moutons pour habiter et paître avec lui parmi les loups. »'
    marker-yv: yv-n
  - type: text
    text: 'Allez ! Je vous envoie comme des agneaux au milieu des loups. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 9.3 ; 22.35s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne saluez personne…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : allusion probable aux longs échanges de la politesse orientale, cf. v. 5 ; 2R 4.29 ; Ps 129.8.'
    marker-yv: yv-n
  - type: text
    text: 'Ne portez ni bourse, ni sac, ni sandales, et ne saluez personne en chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.79+ ; il s'agit de la salutation habituelle en Orient, mais le texte lui donne vraisemblablement un sens plus fort (v. 6) ; cf. 24.36 ; Jg 6.23 ; 19.20 ; 1S 25.5s ; Jn 20.19,21,26 ; voir aussi Ga 6.16.
    marker-yv: yv-n
  - type: text
    text: 'Dans toute maison où vous entrerez, dites d''abord : « Que la paix soit sur cette maison ! » '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un homme de paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de paix'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sémitisme. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: reposera sur lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1P 4.14.'
    marker-yv: yv-n
  - type: text
    text: 'Et s''il se trouve là un homme de paix, votre paix reposera sur lui ; sinon, elle reviendra à vous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 9.4 ; Ph 4.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''ouvrier… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Tm 5.18 ; cf. 1Co 9.14ss ; voir aussi Nb 18.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: salaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'récompense '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 6.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ne passez pas de maison en maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', en quête d''une hospitalité plus avantageuse.'
    marker-yv: yv-n
  - type: text
    text: 'Demeurez dans cette maison-là, mangez et buvez ce qu''on vous donnera, car l''ouvrier mérite son salaire. Ne passez pas de maison en maison. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1Co 10.27. Voir aussi Mc 7.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Dans toute ville où vous entrerez et où l''on vous accueillera, mangez ce qu''on vous offrira, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'est approché de vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.20 ; 17.21 ; 19.11 ; 21.31 ; voir Mt 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'guérissez les malades qui s''y trouveront, et dites-leur : « Le règne de Dieu s''est approché de vous. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 9.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grandes rues '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.21+.
    marker-yv: yv-n
  - type: text
    text: 'Mais dans toute ville où vous entrerez et où l''on ne vous accueillera pas, allez dans les grandes rues et dites : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.5+ ; Mc 6.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 13.51 ; 18.6.'
    marker-yv: yv-n
  - type: text
    text: '« Même la poussière de votre ville qui s''est attachée à nos pieds, nous la secouons pour vous la rendre ; sachez pourtant que le règne de Dieu s''est approché. » '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en ce jour-là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 14 ; cf. 6.23 ; 21.34 ; 2Th 1.10 ; voir aussi Es 10.20 ; Jr 30.8 ; Za 12.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sodome '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 19.24s ; Mt 10.15+ ; 11.24.
    marker-yv: yv-n
  - type: text
    text: Je vous dis qu'en ce jour-là ce sera moins dur pour Sodome que pour cette ville-là.
- type: usfm
  marker: s1
