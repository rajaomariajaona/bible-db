      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quel malheur… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.24+. –  '
