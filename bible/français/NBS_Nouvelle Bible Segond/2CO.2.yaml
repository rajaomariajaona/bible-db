document_id: 2CO.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne pas revenir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.16+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tristesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.10.
      marker-yv: yv-n
    - type: text
      text: 'Quant à moi, j''ai jugé bon de ne pas revenir vous voir dans la tristesse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 7+ ; Mt 10.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en présence du Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la face de Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme représentant du Christ.
      marker-yv: yv-n
    - type: text
      text: 'Mais à qui vous faites grâce, moi aussi je fais grâce ; et, pour ma part, ce dont j''ai fait grâce, – si j''ai fait grâce de quoi que ce soit – c''est à cause de vous, en présence du Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne pas laisser au Satan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ', diable, Satan) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.3,14s ; Lc 22.31 ; Rm 16.20.'
      marker-yv: yv-n
    - type: text
      text: pour ne pas laisser au Satan l'avantage sur nous, car nous n'ignorons pas ses desseins.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inquiétude de Paul à Troas
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir introduction♦ ; 7.5s ; cf. 1Co 16.5ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Troas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la région de Troas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Ac 16.8-11 ; 20.5-12 ; 2Tm 4.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une porte… ouverte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 16.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par le Seigneur.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque je suis arrivé à Troas pour la bonne nouvelle du Christ, bien qu''une porte m''y ait été ouverte, dans le Seigneur, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.5 ; 1Co 16.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.6,13-15 ; 8.6,16,23 ; 12.18 ; Ga 2.1,3 ; 2Tm 4.10 ; Tt 1.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai pris congé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai pris congé d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la Macédoine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.16 ; 7.5 ; Ac 20.1ss.'
      marker-yv: yv-n
    - type: text
      text: mon esprit n'a pas eu de repos, parce que je n'ai pas trouvé Tite, mon frère ; alors j'ai pris congé et je suis parti pour la Macédoine.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le triomphe dans le Christ
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Grâce
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Rm 7.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui nous entraîne toujours dans son triomphe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : allusion probable au cortège triomphal des généraux romains, où captifs et vainqueurs défilaient dans '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''odeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'des encens brûlés en l''honneur du chef victorieux ; cf. Col 2.15 ; voir aussi 1Co 9.16 ; Ga 1.15 ; Ep 3.1+ ; Ph 3.12 ; d''autres traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui nous fait toujours triompher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: répand
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: manifeste.
      marker-yv: yv-n
    - type: text
      text: 'Grâce soit rendue à Dieu, qui nous entraîne toujours dans son triomphe, dans le Christ, et qui, par nous, répand en tout lieu l''odeur de sa connaissance ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parfum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ph 4.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ceux qui sont… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 1.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous sommes en effet, pour Dieu, le parfum du Christ parmi ceux qui sont sur la voie du salut comme parmi ceux qui vont à leur perte : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lc 2.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de mort… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de vie…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de mort en mort / de vie en vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur cette tournure, cf. 3.18 ; Rm 1.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'capable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: compétent, à la hauteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.5s ; voir aussi 1Co 15.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Tm 2.2.'
      marker-yv: yv-n
    - type: text
      text: 'pour les uns, une odeur de mort, qui mène à la mort ; pour les autres, une odeur de vie, qui mène à la vie. Et qui est capable d''une telle mission ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui font… leur petit commerce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec s''appliquait habituellement aux petits détaillants réputés recourir à diverses astuces pour accroître leur gain (p. ex. couper d''eau le vin avant de le revendre) ; cf. 4.2 ; 11.3 ; 1Th 2.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sincérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la part de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'comme (venant) de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1P 4.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'devant Dieu et dans le Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.19 ; cf. Jr 17.16.
      marker-yv: yv-n
    - type: text
      text: C'est que nous ne sommes pas comme tant d'autres qui font de la parole de Dieu leur petit commerce ; c'est avec sincérité, c'est de la part de Dieu, devant Dieu et dans le Christ que nous parlons.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 12.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui me réjouit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me met en fête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe Lc 12.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sinon celui qui est attristé par moi ?
      marker-yv: yv-n
    - type: text
      text: 'Car si moi-même je vous attriste, pour qui vais-je faire la fête, sinon pour celui que j''ai attristé ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ai écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette expression (également au v. 9) semble faire allusion à une épître qui ne nous est pas parvenue ; son principal objet était sans doute la réprimande d''un membre de l''Eglise de Corinthe qui s''était rendu coupable d''une offense grave à l''égard de l''apôtre (voir v. 5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss) ; cf. 7.8 ; 13.10 ; voir aussi 1Co 5.9.
      marker-yv: yv-n
    - type: text
      text: 'J''ai écrit comme je l''ai fait pour ne pas être attristé, à mon arrivée, par ceux qui devraient me réjouir. J''ai en vous tous cette confiance : ma joie est la vôtre, à vous tous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.8s ; Ac 20.31.'
      marker-yv: yv-n
    - type: text
      text: C'est dans une grande détresse, le cœur serré, avec beaucoup de larmes, que je vous ai écrit ; non pas pour vous attrister, mais pour que vous connaissiez l'amour débordant que j'ai pour vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pardonner au coupable
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.11 ; Ga 4.12 ; voir aussi 1Co 5.1s ; Ph 1.15-17. De nombreuses suppositions ont été émises quant à la nature précise de la faute à laquelle ce passage fait allusion : contestation de l''autorité apostolique de Paul, peut-être représenté par un de ses émissaires ? détournement des fonds de la collecte ? On a naturellement cherché des rapprochements avec 1Co 5.1ss, mais les types de faute et de châtiment envisagés ne semblent pas vraiment correspondre.'
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un a été une cause de tristesse, ce n''est pas moi qu''il a attristé, c''est vous tous – du moins en partie, pour ne rien exagérer. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le plus grand nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la communauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 18.15ss ; Rm 16.17ss ; 1Co 5.1ss.'
      marker-yv: yv-n
    - type: text
      text: 'Il suffit pour un tel homme du blâme qui lui a été infligé par le plus grand nombre, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 7.9 ; Col 3.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faire '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe v. 10 ; 12.13 ; Rm 8.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''encourager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le consoler, le réconforter, l'exhorter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
