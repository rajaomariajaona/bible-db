document_id: 2CO.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: ne pas revenir 1.16+. –  tristesse 7.10.
  - type: text
    content: 'Quant à moi, j''ai jugé bon de ne pas revenir vous voir dans la tristesse. '
  '10':
  - type: note
    content: 'Cf. v. 7+ ; Mt 10.40. –  en présence du Christ  : litt. à la face de Christ  ; autre traduction comme représentant du Christ.'
  - type: text
    content: 'Mais à qui vous faites grâce, moi aussi je fais grâce ; et, pour ma part, ce dont j''ai fait grâce, – si j''ai fait grâce de quoi que ce soit – c''est à cause de vous, en présence du Christ, '
  '11':
  - type: note
    content: 'ne pas laisser au Satan (voir démon, diable, Satan) …  : cf. 6.15n  ; 11.3,14s ; Lc 22.31 ; Rm 16.20.'
  - type: text
    content: pour ne pas laisser au Satan l'avantage sur nous, car nous n'ignorons pas ses desseins.
  - type: heading
    content: Inquiétude de Paul à Troas
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Voir introduction♦ ; 7.5s ; cf. 1Co 16.5ss. –  à Troas  : autre traduction dans la région de Troas  ; cf. Ac 16.8-11 ; 20.5-12 ; 2Tm 4.13. –  une porte… ouverte 1Co 16.9+. –  dans le Seigneur  : autre traduction par le Seigneur.'
  - type: text
    content: 'Lorsque je suis arrivé à Troas pour la bonne nouvelle du Christ, bien qu''une porte m''y ait été ouverte, dans le Seigneur, '
  '13':
  - type: note
    content: 'mon esprit… 7.5 ; 1Co 16.18. –  Tite 7.6,13-15 ; 8.6,16,23 ; 12.18 ; Ga 2.1,3 ; 2Tm 4.10 ; Tt 1.4. –  j''ai pris congé  : litt. j''ai pris congé d''eux. –  pour la Macédoine  : cf. 1.16 ; 7.5 ; Ac 20.1ss.'
  - type: text
    content: mon esprit n'a pas eu de repos, parce que je n'ai pas trouvé Tite, mon frère ; alors j'ai pris congé et je suis parti pour la Macédoine.
  - type: heading
    content: Le triomphe dans le Christ
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Grâce…  : cf. Rm 7.25+. –  qui nous entraîne toujours dans son triomphe  : allusion probable au cortège triomphal des généraux romains, où captifs et vainqueurs défilaient dans l''odeur des encens brûlés en l''honneur du chef victorieux ; cf. Col 2.15 ; voir aussi 1Co 9.16 ; Ga 1.15 ; Ep 3.1+ ; Ph 3.12 ; d''autres traduisent qui nous fait toujours triompher . –  répand  : litt. manifeste.'
  - type: text
    content: 'Grâce soit rendue à Dieu, qui nous entraîne toujours dans son triomphe, dans le Christ, et qui, par nous, répand en tout lieu l''odeur de sa connaissance ! '
  '15':
  - type: note
    content: parfum Ph 4.18+. –  ceux qui sont… 1Co 1.18n.
  - type: text
    content: 'Nous sommes en effet, pour Dieu, le parfum du Christ parmi ceux qui sont sur la voie du salut comme parmi ceux qui vont à leur perte : '
  '16':
  - type: note
    content: 'Cf. Lc 2.34. –  de mort… / de vie…  : litt. de mort en mort / de vie en vie  ; sur cette tournure, cf. 3.18 ; Rm 1.17n. –  capable ou compétent, à la hauteur  ; cf. 3.5s ; voir aussi 1Co 15.19n  ; 2Tm 2.2.'
  - type: text
    content: 'pour les uns, une odeur de mort, qui mène à la mort ; pour les autres, une odeur de vie, qui mène à la vie. Et qui est capable d''une telle mission ? '
  '17':
  - type: note
    content: 'qui font… leur petit commerce  : le terme grec s''appliquait habituellement aux petits détaillants réputés recourir à diverses astuces pour accroître leur gain (p. ex. couper d''eau le vin avant de le revendre) ; cf. 4.2 ; 11.3 ; 1Th 2.5. –  sincérité 1.12n. –  de la part de Dieu  : litt. comme (venant) de Dieu 1P 4.11. –  devant Dieu et dans le Christ 12.19 ; cf. Jr 17.16.'
  - type: text
    content: C'est que nous ne sommes pas comme tant d'autres qui font de la parole de Dieu leur petit commerce ; c'est avec sincérité, c'est de la part de Dieu, devant Dieu et dans le Christ que nous parlons.
  '2':
  - type: note
    content: 'Cf. 12.21. –  pour qui…  : litt. qui me réjouit (ou me met en fête  ; même verbe Lc 12.19n) sinon celui qui est attristé par moi ?'
  - type: text
    content: 'Car si moi-même je vous attriste, pour qui vais-je faire la fête, sinon pour celui que j''ai attristé ? '
  '3':
  - type: note
    content: 'J''ai écrit  : cette expression (également au v. 9) semble faire allusion à une épître qui ne nous est pas parvenue ; son principal objet était sans doute la réprimande d''un membre de l''Eglise de Corinthe qui s''était rendu coupable d''une offense grave à l''égard de l''apôtre (voir v. 5nss) ; cf. 7.8 ; 13.10 ; voir aussi 1Co 5.9.'
  - type: text
    content: 'J''ai écrit comme je l''ai fait pour ne pas être attristé, à mon arrivée, par ceux qui devraient me réjouir. J''ai en vous tous cette confiance : ma joie est la vôtre, à vous tous. '
  '4':
  - type: note
    content: détresse 1.4n  ; 7.8s ; Ac 20.31.
  - type: text
    content: C'est dans une grande détresse, le cœur serré, avec beaucoup de larmes, que je vous ai écrit ; non pas pour vous attrister, mais pour que vous connaissiez l'amour débordant que j'ai pour vous.
  - type: heading
    content: Pardonner au coupable
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 3n  ; 7.12n  ; 10.11 ; Ga 4.12 ; voir aussi 1Co 5.1s ; Ph 1.15-17. De nombreuses suppositions ont été émises quant à la nature précise de la faute à laquelle ce passage fait allusion : contestation de l''autorité apostolique de Paul, peut-être représenté par un de ses émissaires ? détournement des fonds de la collecte ? On a naturellement cherché des rapprochements avec 1Co 5.1ss, mais les types de faute et de châtiment envisagés ne semblent pas vraiment correspondre.'
  - type: text
    content: 'Si quelqu''un a été une cause de tristesse, ce n''est pas moi qu''il a attristé, c''est vous tous – du moins en partie, pour ne rien exagérer. '
  '6':
  - type: note
    content: 'le plus grand nombre  : autre traduction la communauté  ; cf. Mt 18.15ss ; Rm 16.17ss ; 1Co 5.1ss.'
  - type: text
    content: 'Il suffit pour un tel homme du blâme qui lui a été infligé par le plus grand nombre, '
  '7':
  - type: note
    content: 'Cf. 7.9 ; Col 3.13+. –  faire grâce  : même verbe v. 10 ; 12.13 ; Rm 8.32n. –  l''encourager ou le consoler, le réconforter, l''exhorter  ; cf. 1.3nss.'
  - type: text
    content: 'de sorte que vous devez bien plutôt lui faire grâce et l''encourager, de peur qu''il ne soit accablé par une tristesse excessive. '
  '8':
  - type: note
    content: faire prévaloir… ou faire prévaloir votre amour pour lui.
  - type: text
    content: 'Je vous encourage donc à faire prévaloir l''amour envers lui ; '
  '9':
  - type: note
    content: 'je vous ai écrit v. 3n. –  pour savoir…  : litt. pour connaître votre épreuve ou votre fidélité éprouvée  ; même terme 8.2n  ; 9.13 (valeur éprouvée) ; 13.3 (preuve) ; termes apparentés en 8.8,22 ; 10.18 (approuvé) ; 13.5ss ; cf. Rm 1.28n  ; 5.4n  ; 1Co 3.13n. –  si vous êtes obéissants 7.12,15 ; 10.6.'
  - type: text
    content: 'car je vous ai écrit aussi pour savoir, à l''épreuve, si vous êtes obéissants en tout. '
