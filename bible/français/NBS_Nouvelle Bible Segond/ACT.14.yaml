document_id: ACT.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul et Barnabé à Iconium
  - type: text
    content: ' '
  - type: note
    content: 'Iconium 13.51n. –  ils (Paul et Barnabé) se rendirent aussi  : autre traduction se rendirent (ou entrèrent ) ensemble  ; cf. 17.2. –  synagogue 13.5+. –  multitude 2.41+. –  Grecs 18.4 ; 19.10,17 ; 20.21 ; cf. 11.20n  ; Rm 1.14n,16+.'
  - type: text
    content: 'A Iconium, ils se rendirent aussi à la synagogue des Juifs et parlèrent de telle sorte qu''une grande multitude de Juifs et de Grecs devinrent croyants. '
  '10':
  - type: note
    content: Cf. 3.6-8 ; 9.34 ; Ez 2.1.
  - type: text
    content: 'il dit d''une voix forte : Lève-toi, droit sur tes pieds ! Il se leva d''un bond et se mit à marcher. '
  '11':
  - type: note
    content: 'Cf. 28.6. –  lycaonien  : cf. v. 6.'
  - type: text
    content: 'A la vue de ce que Paul avait fait, les foules élevèrent la voix et dirent en lycaonien : Les dieux se sont rendus semblables à des humains et sont descendus chez nous ! '
  '12':
  - type: note
    content: 'Selon une célèbre légende qui se situe en Phrygie, dans la région de Lystres, Zeus et Hermès (équivalents grecs des dieux romains Jupiter et Mercure) seraient apparus ensemble sous une forme humaine (v. 11) à Philémon et Baucis, un couple âgé ; en récompense de leur hospitalité, ils auraient exaucé leur vœu de n''être jamais séparés. –  qui était le porte-parole  : litt. qui dirigeait la parole, conformément au rôle d’Hermès, messager des dieux.'
  - type: text
    content: 'Ils appelaient Barnabé Zeus et Paul Hermès, parce que c''est lui qui était le porte-parole. '
  '13':
  - type: note
    content: Voir prêtre. –  portes de la ville ou du temple de Zeus situé devant la ville, à l'extérieur de l'enceinte.
  - type: text
    content: Le prêtre du Zeus qui est devant la ville amena des taureaux et des guirlandes aux portes ; il voulait, avec les foules, offrir un sacrifice.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'les apôtres v. 4n. –  déchirèrent leurs vêtements  : cf. Jos 7.6 ; Esd 9.3 ; Mt 26.65/ /.'
  - type: text
    content: 'Quand les apôtres Barnabé et Paul l''apprirent, ils déchirèrent leurs vêtements et se précipitèrent dans la foule en criant : '
  '15':
  - type: note
    content: 'Mes amis  : litt. hommes, formule très fréquente dans les Actes (cf. 1.16n) ; de même 19.25 ; 27.10,21,25. –  des êtres humains… 3.12 ; 10.26+. –  de la même nature  : litt. ayant les mêmes sentiments  ; même terme en Jc 5.17. –  nous vous annonçons…  : cf. v. 7. –  ces futilités  : cf. Jr 2.5 ; Rm 1.21. –  en vous tournant (cf. 3.19n  ; 9.35n) vers le Dieu vivant 15.19 ; 26.20 ; cf. 1Th 1.9. –  qui a fait… 4.24+ ; Ex 20.11 ; Ps 146.6.'
  - type: text
    content: 'Mes amis, pourquoi faites-vous cela ? Nous aussi, nous sommes des êtres humains, de la même nature que vous ; si nous vous annonçons la bonne nouvelle, c''est pour que vous vous détourniez de ces futilités en vous tournant vers le Dieu vivant '
  - type: text
    content: qui a fait le ciel, la terre et la mer, et tout ce qui s'y trouve
  - type: text
    content: '. '
  '16':
  - type: note
    content: Cf. 17.30 ; Rm 1.20-32. – Voir générations. –  toutes les nations 10.45n  ; voir non-Juifs.
  - type: text
    content: 'Dans les générations passées, il a permis à toutes les nations de suivre leurs propres voies, '
  '17':
  - type: note
    content: 'Cf. 17.22ss. –  il a fait le bien  : même verbe 1Tm 6.18. –  pluies et saisons fécondes  : cf. Lv 26.4 ; Jr 5.24 ; Ps 147.8 ; Mt 5.45. –  en vous comblant  : litt. en comblant vos cœurs Ps 145.16.'
  - type: text
    content: 'quoiqu''il ne se soit pas laissé sans témoignage : il a fait le bien, en vous donnant du ciel pluies et saisons fécondes, en vous comblant de nourriture et de bonheur. '
  '18':
  - type: text
    content: C'est à peine s'ils réussirent, par ces paroles, à dissuader les foules de leur offrir un sacrifice.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 2,5 ; 13.50s ; 17.13 ; 2Tm 3.11. Texte occidental reconstitué  : Mais tandis qu''ils demeuraient là et qu''ils enseignaient, survinrent quelques Juifs d''Iconium [et d''Antioche] qui discutaient ouvertement [la parole de Dieu] ; ils persuadèrent les foules de s''éloigner d''eux (Paul et Barnabé), en disant qu''ils ne disaient rien de vrai, mais qu''ils mentaient en tout. Ayant persuadé les foules… –  lapidèrent Paul v. 5 ; 2Co 11.25.'
  - type: text
    content: 'Sur ces entrefaites arrivèrent d''Antioche et d''Iconium des Juifs, qui persuadèrent les foules ; ils lapidèrent Paul et le traînèrent hors de la ville, pensant qu''il était mort. '
  '2':
  - type: note
    content: 'réfractaires  : autres traductions  : qui ne se laissaient pas persuader, qui refusaient de croire ou d''obéir  ; le verbe correspondant est apparenté à celui qui est traduit par persuader au v. 19 ; cf. 13.43+ ; voir aussi 19.9 ; 26.19. –  suscitèrent…  : litt. excitèrent (cf. 13.50) les âmes (cf. Mt 10.28n) des (gens des) nations (Ac 10.45n) et les disposèrent au mal contre les frères (1.15+) ; texte occidental les chefs de la synagogue des Juifs et les autorités [de la synagogue] fomentèrent à leurs propres fins une persécution contre les justes, et ils excitèrent les non-Juifs contre les frères. Mais le Seigneur accorda vite la paix.'
  - type: text
    content: 'Mais les Juifs réfractaires suscitèrent chez les non-Juifs de la malveillance à l''égard des frères. '
  '20':
  - type: note
    content: 'les disciples 6.1+ ; les témoins du texte occidental présentent ici diverses variantes  : Ses disciples (ou les disciples, ou les frères, cf. 9.25n) l''entourèrent, et la foule partit. Le soir venu (ou quand il se fit tard et que l''obscurité fut venue), il se leva [avec difficulté] et entra dans la ville. –  il se releva  : cf. 2.24n.'
  - type: text
    content: Mais quand les disciples l'entourèrent, il se releva et rentra dans la ville.
  - type: heading
    content: Le retour à Antioche de Syrie
  - type: text
    content: 'Le lendemain, il partit pour Derbé avec Barnabé. '
  '21':
  - type: note
    content: 'bonne nouvelle v. 7. –  fait bon nombre de disciples  : cf. 2.41+ ; Mt 28.19.'
  - type: text
    content: 'Après avoir annoncé la bonne nouvelle dans cette ville et fait bon nombre de disciples, ils retournèrent à Lystres, à Iconium et à Antioche ; '
  '22':
  - type: note
    content: 'ils affermissaient…  : cf. 15.32,41 ; 16.5+ ; 18.23. –  les disciples  : autre traduction l''âme des disciples. –  encourageaient ou exhortaient  ; cf. 11.23+. –  par beaucoup de détresses 11.19+ ; Ep 3.13 ; 1Th 3.3 ; 2Th 1.5s ; cf. Mt 7.14. – Cf. Epître de Barnabé 7.11 : « “Ainsi”, dit-il, “ceux qui veulent me voir et atteindre mon royaume doivent me saisir à travers l''épreuve et la souffrance.” »'
  - type: text
    content: 'ils affermissaient les disciples et les encourageaient à demeurer dans la foi, en disant : Il nous faut passer par beaucoup de détresses pour entrer dans le royaume de Dieu. '
  '23':
  - type: note
    content: 'Ils leur désignèrent  : certains ont compris ils firent nommer pour eux  ; voir l''emploi du même verbe, au passif, en 2Co 8.19, et d''un dérivé en Ac 10.41 ; cf. Ac 6.5s ; 16.2s ; 20.28 ; Tt 1.5. –  des anciens 11.30+. –  Eglise 5.1n. –  prié et jeûné 13.3. –  ils les confièrent… 20.32. –  en qui ils avaient mis leur foi ou en qui ils étaient devenus croyants.'
  - type: text
    content: Ils leur désignèrent des anciens dans chaque Eglise et, après avoir prié et jeûné, ils les confièrent au Seigneur en qui ils avaient mis leur foi.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Pisidie / Pamphylie 13.13n,14n.
  - type: text
    content: 'Ils passèrent ensuite par la Pisidie et arrivèrent en Pamphylie. '
  '25':
  - type: note
    content: 'dit la Parole 4.29+. –  Attalie  : port de Pergé. Le texte occidental ajoute en leur annonçant la bonne nouvelle.'
  - type: text
    content: 'Après avoir dit la Parole à Pergé, ils descendirent à Attalie. '
  '26':
  - type: note
    content: Antioche de Syrie, 11.19n  ; cf. 13.1s. –  recommandés à la grâce 15.40.
  - type: text
    content: 'De là ils embarquèrent pour Antioche, où ils avaient été recommandés à la grâce de Dieu pour l''œuvre qu''ils avaient accomplie. '
  '27':
  - type: note
    content: Cf. 15.4,12 ; 21.19. –  aux non-Juifs 10.45+ ; cf. 13.47s. –  la porte de la foi ou une porte de foi 1Co 16.9 ; 2Co 2.12 ; Col 4.3 ; Ap 3.8.
  - type: text
    content: 'A leur arrivée, ils rassemblèrent l''Eglise et rapportèrent tout ce que Dieu avait fait avec eux, et comment il avait ouvert aux non-Juifs la porte de la foi. '
  '28':
  - type: note
    content: 'longtemps  : litt. pas peu de temps.'
  - type: text
    content: Et ils séjournèrent longtemps avec les disciples.
  '3':
  - type: note
    content: 'assurance 2.29n. –  le Seigneur qui rendait témoignage Hé 2.4. –  la parole de sa grâce 20.32. –  signes / prodiges 2.19+. –  par leurs mains  : cf. 5.12 ; 19.11.'
  - type: text
    content: 'Cependant ils prolongèrent longtemps leur séjour ; ils s''appuyaient avec assurance sur le Seigneur qui rendait témoignage à la parole de sa grâce en donnant des signes et des prodiges par leurs mains. '
  '4':
  - type: note
    content: 'se divisa 23.7. –  les apôtres  : cf. v. 14 ; 1.2+,26 ; le mot est peut-être à prendre ici au sens général d’envoyés  ; cf. 13.1-4 ; 22.21 ; Jn 3.16 ; 2Co 8.23. Le texte occidental précise  : avec les apôtres, soudés par la parole de Dieu.'
  - type: text
    content: 'Dans la ville, la multitude se divisa : les uns étaient avec les Juifs, les autres avec les apôtres. '
  '5':
  - type: note
    content: V. 19+. Certains témoins du texte occidental précisent se préparaient encore à les maltraiter une seconde fois… ou les maltraitèrent une seconde fois et les lapidèrent… (cf. v. 3).
  - type: text
    content: 'Mais comme non-Juifs et Juifs, avec leurs chefs, se préparaient à les maltraiter et à les lapider, '
  '6':
  - type: note
    content: l'ayant compris 12.12. –  se réfugièrent… Mt 10.23. –  Lystres / Derbé v. 21 ; 16.1.
  - type: text
    content: 'eux, l''ayant compris, se réfugièrent dans les villes de la Lycaonie, à Lystres, à Derbé et dans les environs. '
  '7':
  - type: note
    content: 'la bonne nouvelle  : cf. v. 15,21. Le texte occidental ajoute  : et toute la multitude fut touchée par (leur) enseignement. Paul et Barnabé restèrent à Lystres.'
  - type: text
    content: Là, ils annonçaient la bonne nouvelle.
  - type: heading
    content: Guérison d'un infirme à Lystres
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.2n.
  - type: text
    content: 'Il y avait à Lystres un homme impotent des pieds, infirme de naissance, qui n''avait jamais marché. Assis, '
  '9':
  - type: note
    content: 'fixa  : cf. 3.4. –  la foi… 3.16 ; Lc 5.20 ; 8.48/ /.'
  - type: text
    content: 'il écoutait parler Paul. Celui-ci le fixa et, voyant qu''il avait la foi pour être sauvé, '
