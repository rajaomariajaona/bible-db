    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: réfractaires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui ne se laissaient pas persuader, qui refusaient de croire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
