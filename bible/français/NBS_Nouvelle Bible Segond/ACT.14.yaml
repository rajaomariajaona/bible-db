    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.12 ; 19.11.'
    marker-yv: yv-n
  - type: text
    text: 'Cependant ils prolongèrent longtemps leur séjour ; ils s''appuyaient avec assurance sur le Seigneur qui rendait témoignage à la parole de sa grâce en donnant des signes et des prodiges par leurs mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se divisa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: apôtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 14 ; 1.2+,26 ; le mot est peut-être à prendre ici au sens général d’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: envoyés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 13.1-4 ; 22.21 ; Jn 3.16 ; 2Co 8.23. Le texte occidental précise'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec les apôtres, soudés par la parole de Dieu.
    marker-yv: yv-n
  - type: text
    text: 'Dans la ville, la multitude se divisa : les uns étaient avec les Juifs, les autres avec les apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 19+. Certains témoins du texte occidental précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se préparaient encore à les maltraiter une seconde fois… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les maltraitèrent une seconde fois et les lapidèrent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 3).
    marker-yv: yv-n
  - type: text
    text: 'Mais comme non-Juifs et Juifs, avec leurs chefs, se préparaient à les maltraiter et à les lapider, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''ayant compris '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se réfugièrent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 10.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lystres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Derbé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 21 ; 16.1.
    marker-yv: yv-n
  - type: text
    text: 'eux, l''ayant compris, se réfugièrent dans les villes de la Lycaonie, à Lystres, à Derbé et dans les environs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la bonne nouvelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 15,21. Le texte occidental ajoute'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et toute la multitude fut touchée par (leur) enseignement. Paul et Barnabé restèrent à Lystres.
    marker-yv: yv-n
  - type: text
    text: Là, ils annonçaient la bonne nouvelle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un infirme à Lystres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 3.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y avait à Lystres un homme impotent des pieds, infirme de naissance, qui n''avait jamais marché. Assis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fixa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la foi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.16 ; Lc 5.20 ; 8.48/ /.
    marker-yv: yv-n
  - type: text
    text: 'il écoutait parler Paul. Celui-ci le fixa et, voyant qu''il avait la foi pour être sauvé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 3.6-8 ; 9.34 ; Ez 2.1.
    marker-yv: yv-n
  - type: text
    text: 'il dit d''une voix forte : Lève-toi, droit sur tes pieds ! Il se leva d''un bond et se mit à marcher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 28.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lycaonien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6.'
    marker-yv: yv-n
  - type: text
    text: 'A la vue de ce que Paul avait fait, les foules élevèrent la voix et dirent en lycaonien : Les dieux se sont rendus semblables à des humains et sont descendus chez nous ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Selon une célèbre légende qui se situe en Phrygie, dans la région de Lystres, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Zeus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hermès '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(équivalents grecs des dieux romains Jupiter et Mercure) seraient apparus ensemble sous une forme humaine (v. 11) à Philémon et Baucis, un couple âgé ; en récompense de leur hospitalité, ils auraient exaucé leur vœu de n''être jamais séparés. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui était le porte-parole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui dirigeait la parole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', conformément au rôle d’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hermès
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', messager des dieux.'
    marker-yv: yv-n
  - type: text
    text: 'Ils appelaient Barnabé Zeus et Paul Hermès, parce que c''est lui qui était le porte-parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'portes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de la ville ou du temple de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Zeus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'situé '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: devant la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', à l''extérieur de l''enceinte.'
    marker-yv: yv-n
  - type: text
    text: Le prêtre du Zeus qui est devant la ville amena des taureaux et des guirlandes aux portes ; il voulait, avec les foules, offrir un sacrifice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: apôtres
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: déchirèrent leurs vêtements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jos 7.6 ; Esd 9.3 ; Mt 26.65/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Quand les apôtres Barnabé et Paul l''apprirent, ils déchirèrent leurs vêtements et se précipitèrent dans la foule en criant : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mes amis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', formule très fréquente dans les Actes (cf. 1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; de même 19.25 ; 27.10,21,25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des êtres humains… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.12 ; 10.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la même nature
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ayant les mêmes sentiments
    - type: usfm
      marker: ft
      children:
