    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des (gens des) nations '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Ac 10.45
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et les disposèrent au mal contre les frères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(1.15+) ; texte occidental '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les chefs de la synagogue des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' et les autorités [de la synagogue] fomentèrent à leurs propres fins une persécution contre les justes, et ils excitèrent les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
      - type: text
        text: ' contre les frères. Mais le Seigneur accorda vite la paix.'
    marker-yv: yv-n
  - type: text
    text: 'Mais les Juifs réfractaires suscitèrent chez les non-Juifs de la malveillance à l''égard des frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'assurance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Seigneur qui rendait témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hé 2.4. –  '
    - type: usfm
      marker: fq
      children:
