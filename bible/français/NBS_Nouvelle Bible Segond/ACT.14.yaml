    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 13.50) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les âmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Mt 10.28
      - type: usfm
