document_id: PRO.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Maximes diverses
  - type: text
    content: ' '
  - type: note
    content: 'maximes de Salomon 1.1n  ; 10.1n. –  transmises  : autres traductions écrites ; transcrites . –  Ezéchias, roi de Juda 2R 18.1-8 ; Es 38.10-20 etc.'
  - type: text
    content: Voici encore des maximes de Salomon, transmises par les gens d'Ezéchias, roi de Juda.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Texte difficile. LXX de peur que ton ami ne te couvre de honte. La dispute et l''hostilité ne s''éloigneraient pas de toi, elles seraient pour toi comme la mort. La grâce et l''amitié libèrent ; conserve-les pour toi, afin de ne pas devenir blâmable, mais garde tes voies comme il convient. –  il ne t''insulte  : autre traduction il ne te fasse honte . Le substantif correspondant au verbe hébreu utilisé ici a été généralement traduit par fidélité , et à deux reprises par ignominie  ; cf. 14.34 ; Lv 20.17. –  tes mauvais propos  : même terme en 10.18 ; cf. Gn 37.2 ; Jr 20.10 ; Ez 36.3. –  ne puissent être rattrapés  : litt. ne reviennent pas . On pourrait aussi comprendre  : et que le mal qu''on dit de toi ne soit irréversible.'
  - type: text
    content: de peur qu'en l'apprenant il ne t'insulte,
  - type: text
    content: et que tes mauvais propos ne puissent être rattrapés.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ciselures 18.11n. –  à propos  : litt. à son tour.'
  - type: text
    content: Des pommes d'or sur des ciselures d'argent,
  - type: text
    content: telle est une parole dite à propos.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'une oreille qui écoute  : cf. 15.31.'
  - type: text
    content: Un anneau d'or, une parure d'or fin,
  - type: text
    content: tel est, pour une oreille qui écoute, le sage qui avertit.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la fraîcheur  : cf. v. 25. –  émissaire sûr  : cf. 13.17 ; le mot correspondant à émissaire fait assonance avec celui qui est traduit par moisson . –  il réconforte  : autre traduction il rend la vie à . –  son maître ou son seigneur.'
  - type: text
    content: Comme la fraîcheur de la neige au temps de la moisson,
  - type: text
    content: 'tel est un émissaire sûr pour ceux qui l''envoient :'
  - type: text
    content: il réconforte son maître.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'des dons qui n''en sont pas  : litt. un don de mensonge  ; on pourrait comprendre qui se vante de dons trompeurs ou qui se vante à tort de ses dons.'
  - type: text
    content: Des nuages et du vent sans pluie,
  - type: text
    content: tel est l'homme qui fait le fier pour des dons qui n'en sont pas.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'patience  : cf. 14.29+ ; 15.1 ; 16.14. –  fléchit  : autres traductions dupe ; séduit , même verbe en 1.10n.'
  - type: text
    content: Par la patience, on fléchit un chef ;
  - type: text
    content: une langue douce brise des os.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'miel  : cf. v. 27 ; 24.13.'
  - type: text
    content: As-tu trouvé du miel ? N'en mange que ce qui te suffit,
  - type: text
    content: de peur que tu n'en sois rassasié et que tu ne le vomisses.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'les pieds  : litt. ton pied.'
  - type: text
    content: Mets rarement les pieds dans la maison de ton prochain,
  - type: text
    content: de peur qu'il ne soit rassasié de toi et qu'il ne se mette à te détester.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'massue  : le terme correspondant est dérivé d''un verbe qui signifie habituellement disperser  ; il rappelle le mot qui est traduit par masse en Jr 51.20n. Sur l''ensemble, cf. 6.19n  ; 12.18+ ; Ps 11.2 ; 57.5 ; 59.8 ; 120.3s.'
  - type: text
    content: Une massue, une épée et une flèche aiguë,
  - type: text
    content: tel est l'homme qui porte un faux témoignage contre son prochain.
  '19':
  - type: text
    content: Une dent cassée et un pied qui fait chanceler,
  - type: text
    content: telle est la confiance en un traître au jour de la détresse.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'de Dieu  : autre traduction possible des dieux (cf. 2.5n), en parallèle avec le pluriel des rois . –  les choses  : autre traduction les paroles . –  découvrir  : autres traductions examiner, scruter (18.17n) ; cf. Dt 29.28 ; Rm 11.33 ; Tobit 12.7 : « Il est bon de tenir caché le secret du roi, mais les œuvres de Dieu, il faut les célébrer et les révéler. Célébrez-les comme elles le méritent. »'
  - type: text
    content: La gloire de Dieu, c'est de cacher les choses ;
  - type: text
    content: la gloire des rois, c'est de découvrir les choses.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'D''autres comprennent enlever (au sens de confisquer ) un vêtement… c''est répandre… et chanter… Le premier élément est absent de LXX, qui ajoute en revanche comme la mite dans un vêtement et le ver dans le bois  ; certains modifient le texte hébreu traditionnel pour lire comme du vinaigre sur de la soude, comme de la fumée pour les yeux, ainsi est celui qui chante… –  sur de la soude  : LXX sur une plaie . –  chanter…  : cf. Rm 12.15.'
  - type: text
    content: C'est enlever un vêtement par un jour de gel,
  - type: text
    content: répandre du vinaigre sur de la soude,
  - type: text
    content: que de chanter des chansons à un cœur triste.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'ton ennemi  : litt. celui qui te déteste ou qui te hait  ; cf. Ex 23.4s ; Mt 5.44. –  à manger / à boire  : litt. du pain à manger / de l''eau à boire . – Cf. Instruction d''Aménémopé 5.1ss : « Relève-le (le méchant), tends-lui la main ; confie-le aux bras du dieu ; remplis son ventre de ton pain, qu''il soit rassasié et qu''il ait honte. »'
  - type: text
    content: Si ton ennemi a faim, donne-lui à manger ;
  - type: text
    content: s'il a soif, donne-lui à boire.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 12.20n. –  ce sont des braises…  : on a aussi compris ce sont des braises que tu enlèves de sa tête  ; cette expression a été rapprochée d''un rituel de pénitence égyptien qui, selon une description du IIe s. av. J.-C., consistait à marcher sur des cendres en portant sur la tête un plat rempli de braises. –  et le Seigneur te le rendra  : Tg et Dieu te le livrera (ton ennemi).'
  - type: text
    content: Car ce sont des braises que tu amasses sur sa tête,
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te le rendra.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Le vent du nord…  : on a souvent fait remarquer que ce dicton météorologique conviendrait mieux à l''Egypte (au sud de la Méditerranée, d''où viennent les nuages porteurs de pluie ) qu''à Israël (à l''est) ; cf. 22.17n et l''introduction aux Proverbes. –  qui parle  : sous-entendu dans le texte.'
  - type: text
    content: Le vent du nord engendre la pluie ;
  - type: text
    content: la langue qui parle en cachette, un visage furieux.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut… 21.9n. –  en terrasse  : sous-entendu dans le texte ; cf. Dt 22.8n.'
  - type: text
    content: Mieux vaut habiter à l'angle d'un toit en terrasse
  - type: text
    content: que de partager la maison d'une femme querelleuse.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'eau fraîche  : cf. v. 13. –  celui qui est épuisé Jr 31.25.'
  - type: text
    content: De l'eau fraîche pour celui qui est épuisé,
  - type: text
    content: telle est une bonne nouvelle venant d'un pays lointain.
  '26':
  - type: text
    content: Une fontaine troublée et une source putride,
  - type: text
    content: tel est le juste qui vacille devant le méchant.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'miel  : cf. v. 16+. –  ni glorieux…  : litt. et la recherche de leur gloire, gloire  ; LXX mais il convient d''honorer des paroles glorieuses  ; certains modifient le texte hébreu traditionnel pour lire ni de rechercher gloire sur gloire ou ni de rechercher des paroles de gloire  ; ou encore, d''après une tradition juive, c''est une gloire d''étudier les choses difficiles.'
  - type: text
    content: Il n'est pas bon de manger beaucoup de miel,
  - type: text
    content: ni glorieux de rechercher sa propre gloire.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Une ville…  : cf. 16.32. –  qui n''est pas maître de lui-même  : litt. qui n''a pas de retenue pour son esprit.'
  - type: text
    content: Une ville forcée, une ville sans murailles,
  - type: text
    content: tel est l'homme qui n'est pas maître de lui-même.
  '3':
  - type: text
    content: Le ciel dans sa hauteur, la terre dans sa profondeur,
  - type: text
    content: et le cœur des rois, on ne peut les scruter.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'il en sortira…  : LXX il sera complètement purifié.'
  - type: text
    content: Ote de l'argent les scories,
  - type: text
    content: il en sortira un vase pour l'orfèvre ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ôte le méchant  : cf. 16.12. –  son trône s''affermira  : cf. 29.14. Voir aussi 20.8,28.'
  - type: text
    content: ôte le méchant de la présence du roi,
  - type: text
    content: son trône s'affermira par la justice.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ne te tiens pas…  : cf. Siracide 13.9s : « Quand un puissant t''invite, reste à l''écart et son invitation n''en sera que plus pressante. Ne te précipite pas, de peur d''être repoussé, ne te tiens pas trop loin, de peur d''être oublié. »'
  - type: text
    content: Ne te vante pas devant le roi,
  - type: text
    content: ne te tiens pas à la place des grands ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'on te dit  : litt. il te dit . –  une fois que tes yeux l''ont vu  : ces derniers mots forment, dans LXX, une phrase séparée, à rattacher au v. 8 ( dis ce que tes yeux ont vu ). Cf. Lc 14.7-10.'
  - type: text
    content: 'si on te dit : « Monte ici ! », cela vaut mieux'
  - type: text
    content: que si on t'abaisse devant le noble, une fois que tes yeux l'ont vu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.17.
  - type: text
    content: Ne te hâte pas d'accuser ;
  - type: text
    content: que feras-tu par la suite,
  - type: text
    content: lorsque ton prochain t'aura confondu ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: ne dévoile pas les secrets 3.32n  ; 11.13+.
  - type: text
    content: Défends ta cause contre ton prochain,
  - type: text
    content: mais ne dévoile pas les secrets d'un autre,
