        marker: fqa
        children:
        - type: text
          text: il ne te fasse honte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le substantif correspondant au verbe hébreu utilisé ici a été généralement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidélité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et à deux reprises par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ignominie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 14.34 ; Lv 20.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes mauvais propos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même terme en 10.18 ; cf. Gn 37.2 ; Jr 20.10 ; Ez 36.3. –  '
      - type: usfm
        marker: fq
