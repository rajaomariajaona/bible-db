        - type: text
          text: ne reviennent pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . On pourrait aussi comprendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et que le mal qu'on dit de toi ne soit irréversible.
      marker-yv: yv-n
    - type: text
      text: de peur qu'en l'apprenant il ne t'insulte,
  - type: usfm
    marker: q1
