      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte difficile. LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de peur que ton ami ne te couvre de honte. La dispute et l''hostilité ne s''éloigneraient pas de toi, elles seraient pour toi comme la mort. La grâce et l''amitié libèrent ; conserve-les pour toi, afin de ne pas devenir blâmable, mais garde tes voies comme il convient. '
