document_id: 1CO.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Litt. Paul, appelé (v. 2,24 ; Rm 1.1n) apôtre (ou envoyé ) de Christ Jésus par la volonté… 2Co 1.1 ; Ep 1.1 ; Col 1.1 ; 2Tm 1.1. –  Christ  : voir onction. –  Sosthène  : peut-être celui de Ac 18.17.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par appel, par la volonté de Dieu, et le frère Sosthène, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'encourage ou exhorte  ; cf. 4.13n,16 ; 14.31 ; 16.12,15n  ; Rm 12.1+. –  tenir tous le même langage  : litt. dire tous la même chose  ; cf. Rm 12.16+ ; 15.5n  ; Ph 2.2. –  divisions  : le mot grec a donné schisme  ; de même en 11.18. –  dessein  : le même terme est traduit par avis en 7.25,40.'
  - type: text
    content: 'Je vous encourage, mes frères, par le nom de notre Seigneur Jésus-Christ, à tenir tous le même langage : qu''il n''y ait pas de divisions parmi vous ; soyez bien unis, dans la même pensée et dans le même dessein. '
  '11':
  - type: note
    content: Chloé, nom féminin ; sans doute une femme de Corinthe ; les gens de Chloé sont probablement des chrétiens qui font partie de sa « maison » (esclaves, affranchis ; cf. Ac 10.2n). –  disputes 3.3 ; cf. Rm 1.29+ ; Ga 5.19s.
  - type: text
    content: 'En effet, mes frères, les gens de Chloé m''ont appris qu''il y a des disputes parmi vous. '
  '12':
  - type: note
    content: '3.4,22. –  J''entends par là  : litt. je dis ceci. –  j''appartiens à Paul  : c.-à-d. je suis disciple de Paul  ; même formule, inversée, en 3.21nss. –  Apollos 16.12 ; Ac 18.24–19.1. –  Céphas, transcription du nom araméen de Pierre, cf. 9.5 ; 15.5 ; Jn 1.42 ; Ga 1.18 ; 2.9-14. –  Et moi, au Christ  : ces mots peuvent être compris soit comme la mention d''un quatrième parti parmi les chrétiens de Corinthe, soit comme une réponse personnelle de Paul ; cf. 3.23 ; 15.23 ; 2Co 10.7 ; Ga 3.29 ; voir aussi Mc 9.41n.'
  - type: text
    content: 'J''entends par là que chacun de vous dit : « Moi, j''appartiens à Paul ! » – « Et moi, à Apollos ! » – « Et moi, à Céphas ! » – « Et moi, au Christ ! » '
  '13':
  - type: note
    content: 'Le Christ…  : on pourrait aussi lire la phrase comme une affirmation ou une exclamation (le Christ est divisé !). –  pour le nom ou au nom, cf. v. 15 ; 10.2n  ; 12.13n  ; Mt 28.19n  ; Ac 8.16n. –  reçu le baptême 12.13 ; Rm 6.3s.'
  - type: text
    content: 'Le Christ est-il divisé ? Est-ce Paul qui a été crucifié pour vous, ou bien est-ce pour le nom de Paul que vous avez reçu le baptême ? '
  '14':
  - type: note
    content: 'Je rends grâce à Dieu  : certains mss portent seulement je rends grâce, d''autres je rends grâce à mon Dieu. –  Crispos Ac 18.8. –  Gaïos Ac 19.29 ; Rm 16.23.'
  - type: text
    content: 'Je rends grâce à Dieu de ce que je n''ai baptisé aucun de vous, excepté Crispos et Gaïos. '
  '15':
  - type: note
    content: pour mon nom ou en mon nom.
  - type: text
    content: 'Ainsi personne ne peut dire que vous avez reçu le baptême pour mon nom. '
  '16':
  - type: note
    content: la maison (cf. Ac 10.2n  ; 11.14+) de Stéphanas 1Co 16.15n,17.
  - type: text
    content: '– Si, j''ai encore baptisé la maison de Stéphanas ; au reste, je ne sais pas si j''ai baptisé quelqu''un d''autre. – '
  '17':
  - type: note
    content: 'baptiser  : cf. Mt 28.19 ; Jn 4.2. –  la bonne nouvelle  : cf. Rm 1.1,9,16 ; 15.15s ; Ga 1.16. –  la sagesse du langage ou l''habileté de la parole, c.-à-d. l''éloquence, si importante pour les Grecs ; voir 2.1,4,13 ; 2Co 1.12 ; 11.6 ; cf. Ac 18.24. –  vidée de son sens  : litt. vidée  ; cf. Rm 4.14n.'
  - type: text
    content: Car le Christ ne m'a pas envoyé pour baptiser, mais pour annoncer la bonne nouvelle ; non pas dans la sagesse du langage, afin que la croix du Christ ne soit pas vidée de son sens.
  - type: heading
    content: Jésus-Christ, puissance et sagesse de Dieu
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'folie v. 23 ; 2.14. –  qui vont à leur perte ou qui se perdent 2Co 2.15 ; 4.3 ; 2Th 2.10. –  sur la voie du salut  : litt. qui nous sauvons ou qui sommes en train d''être sauvés  ; cf. 15.2 ; même tournure Lc 13.23 ; Ac 2.47 ; 2Co 2.15. –  puissance de Dieu v. 24 ; Rm 1.16+.'
  - type: text
    content: 'En effet, la parole de la croix est folie pour ceux qui vont à leur perte, mais pour nous qui sommes sur la voie du salut, elle est puissance de Dieu. '
  '19':
  - type: note
    content: 'il est écrit, Es 29.14  ; cf. Jr 8.9 ; Ps 33.10. –  Je détruirai  : litt. je perdrai, cf. v. 18n.'
  - type: text
    content: 'Car il est écrit :'
  - type: text
    content: Je détruirai la sagesse des sages,
  - type: text
    content: j'anéantirai l'intelligence des intelligents
  - type: text
    content: .
  '2':
  - type: note
    content: 'Eglise de Dieu 1Th 2.14 ; cf. l''assemblée du Seigneur en Dt 23.2ss. –  Corinthe Ac 18.1-11 ; 19.1 ; 2Tm 4.20. –  consacrés ou sanctifiés, terme dérivé du mot traduit par saints  ; cf. 6.11 ; Rm 1.7n. –  invoquent le nom… Ac 2.21 ; 9.14,21 ; 22.16 ; Rm 10.12s ; 2Tm 2.22 ; cf. Jl 3.5 ; Ps 99.6. –  qui est leur Seigneur comme le nôtre  : autre traduction possible chez eux comme chez nous.'
  - type: text
    content: 'à l''Eglise de Dieu qui est à Corinthe, à ceux qui ont été consacrés en Jésus-Christ et qui sont saints par appel, avec tous ceux qui, en tout lieu, invoquent le nom de notre Seigneur Jésus-Christ, qui est leur Seigneur comme le nôtre : '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Où est…  : cf. Es 19.11s ; 33.18. – Voir scribe . –  le débatteur  : autres traductions le rhéteur, le raisonneur  ; le terme est apparenté au verbe traduit par chercher au v. 22. –  de ce monde ou de cette ère, de ce temps  ; même terme grec en 2.6ss ; 3.18 ; 10.11 ; sur le mot correspondant, voir Mt 12.32n  ; l''autre mot grec ( kosmos ) traduit par monde dans la suite n''a pas cet aspect temporel. –  frappé de folie…  : autre traduction révélé la folie de…  ; cf. 3.19 ; Es 44.25 ; Jb 12.17 ; Rm 1.21.'
  - type: text
    content: 'Où est le sage ? Où est le scribe ? Où est le débatteur de ce monde ? Dieu n''a-t-il pas frappé de folie la sagesse du monde ? '
  '21':
  - type: note
    content: 'Cf. Rm 1.19s ; 11.33+ ; voir aussi Mt 11.25s. –  de la proclamation ou de ce qui est proclamé, cf. v. 23 ; 2.4 ; 15.11ss ; Mc 1.4n. –  ceux qui croient  : autres traductions ceux qui ont foi ; les croyants.'
  - type: text
    content: 'En effet, puisque le monde, par la sagesse, n''a pas connu Dieu dans la sagesse de Dieu, c''est par la folie de la proclamation qu''il a plu à Dieu de sauver ceux qui croient. '
  '22':
  - type: note
    content: 'des signes, au sens de miracles  ; voir Mt 12.38+ ; Jn 2.11+ ; 4.48. –  les Grecs…  : cf. Ac 17.18.'
  - type: text
    content: 'Les Juifs, en effet, demandent des signes, et les Grecs cherchent la sagesse. '
  '23':
  - type: note
    content: 'un Christ crucifié  : cf. v. 24 ; 2.2 ; Ga 3.1. –  cause de chute  : litt. scandale, cf. 8.13 ; Ga 5.11 ; voir Mt 11.6n  ; Rm 9.32. –  folie v. 18+ ; cf. Ac 17.32. – Voir Juifs et non-Juifs.'
  - type: text
    content: 'Or nous, nous proclamons un Christ crucifié, cause de chute pour les Juifs et folie pour les non-Juifs ; '
  '24':
  - type: note
    content: 'puissance de Dieu v. 18+ ; cf. Ha 3.19. –  sagesse de Dieu v. 30 ; Col 2.3. – Cf. Jb 12.13 ; Sagesse 7.24s : « Aussi la Sagesse est-elle plus mobile qu''aucun mouvement, à cause de sa pureté, elle passe et pénètre à travers tout. Elle est un effluve de la puissance de Dieu, une pure irradiation de la gloire du Tout-Puissant. »'
  - type: text
    content: 'mais pour ceux qui sont appelés, Juifs et Grecs, un Christ qui est la puissance de Dieu et la sagesse de Dieu. '
  '25':
  - type: note
    content: 'la folie  : litt. ce qui est fou, comme au v. 27 ; cf. Mt 11.19. –  faiblesse (litt. ce qui est faible) 2Co 12.9 ; 13.4.'
  - type: text
    content: Car la folie de Dieu est plus sage que les humains, et la faiblesse de Dieu est plus forte que les humains.
  - type: heading
    content: Ce que Dieu a choisi
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'comment vous avez été appelés  : litt. votre appel  ; cf. Mt 5.3 ; 11.25 ; 19.23,30/ / ; Lc 14.21-24/ / ; Jn 7.48s ; Jc 2.1-5. –  selon la chair  : cf. Rm 1.3n. –  nobles  : litt. bien-nés , cf. v. 28n.'
  - type: text
    content: 'Regardez, mes frères, comment vous avez été appelés : il n''y a pas parmi vous beaucoup de sages selon la chair, ni beaucoup de puissants, ni beaucoup de nobles. '
  '27':
  - type: text
    content: 'Dieu a choisi ce qui est fou dans le monde pour faire honte aux sages ; Dieu a choisi ce qui est faible dans le monde pour faire honte à ce qui est fort ; '
  '28':
  - type: note
    content: 'vil  : litt. non-né, par opposition aux nobles de 1.26n. –  ce qui n''est pas  : cf. Rm 4.17. –  réduire à rien 2.6 ; 6.13 ; 13.8ss (même verbe pour abolir) ; 15.24ss ; Rm 3.3+.'
  - type: text
    content: 'Dieu a choisi ce qui est vil dans le monde, ce qu''on méprise, ce qui n''est pas, pour réduire à rien ce qui est, '
  '29':
  - type: note
    content: 'Rm 3.27+. –  personne  : litt. aucune chair. –  faire le fier ou être fier, v. 31 ; 3.21 ; 4.7 ; 5.6 ; 9.15s ; 13.3 ; 15.31 ; Rm 2.17n.'
  - type: text
    content: 'de sorte que personne ne puisse faire le fier devant Dieu. '
  '3':
  - type: note
    content: Grâce et paix… Rm 1.7+.
  - type: text
    content: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
  - type: heading
    content: Les bienfaits reçus dans le Christ
  '30':
  - type: note
    content: 'vous êtes (cf. v. 28) en Jésus-Christ 2Co 5.17-21 ; Ph 3.9. –  a été fait…  : autre traduction a été fait pour nous, grâce à Dieu, sagesse, justice… –  sagesse v. 24+. –  justice Rm 10.4 ; cf. Jr 23.5s. –  consécration ou sanctification (voir saint) v. 2n  ; 6.11 ; Jn 17.19. –  rédemption  : autre traduction délivrance, cf. Rm 3.24+.'
  - type: text
    content: 'Or c''est grâce à lui que vous êtes en Jésus-Christ, qui a été fait pour nous sagesse venant de Dieu – mais aussi justice, consécration et rédemption, '
  '31':
  - type: note
    content: Jr 9.22s  ; 2Co 10.17 ; cf. Rm 5.11 ; Ga 6.14 ; Ph 3.3.
  - type: text
    content: 'afin, comme il est écrit, '
  - type: text
    content: que le fier mette sa fierté dans le Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Je rends toujours grâce… Rm 1.8 ; Ep 5.20 ; Ph 1.3s ; 1Th 1.2 ; 2.13 ; 2Th 1.3 ; Phm 4. –  à mon Dieu  : certains mss portent simplement à Dieu . –  la grâce de Dieu… Rm 12.3,6 ; 2Co 8.1.'
  - type: text
    content: 'Je rends toujours grâce à mon Dieu, à votre sujet, pour la grâce de Dieu qui vous a été accordée en Jésus-Christ ; '
  '5':
  - type: note
    content: devenus riches 2Co 8.9 ; 9.11. –  parole / connaissance 2Co 8.9 ; cf. Rm 15.14.
  - type: text
    content: 'car en lui vous êtes devenus riches de tout, de toute parole et de toute connaissance, '
  '6':
  - type: note
    content: 'confirmé  : autre traduction fermement établi  ; le même verbe est traduit par affermir au v. 8 ; cf. Rm 4.16n. –  en vous  : autres traductions parmi vous, chez vous  ; cf. Ac 18.5 ; Col 2.7.'
  - type: text
    content: 'puisque le témoignage du Christ a été confirmé en vous. '
  '7':
  - type: note
    content: 'don de la grâce  : le mot grec correspondant a donné charisme, de même en 7.7 ; 12.4+ ; voir Rm 1.11n. –  en attendant ou tandis que vous attendez Ph 3.20+. –  révélation  : le terme grec a donné notre mot apocalypse  ; cf. 2Th 1.7 ; 1P 1.7,13 ; 4.13 ; Ap 1.1 ; voir aussi Lc 17.30s ; Rm 8.19 ; Col 3.4 ; Tt 2.13 ; 1Jn 3.1s.'
  - type: text
    content: 'Dès lors, il ne vous manque aucun don de la grâce, en attendant la révélation de notre Seigneur Jésus-Christ. '
  '8':
  - type: note
    content: 'affermira v. 6n  ; 2Co 1.21. –  sans reproche 1Tm 3.10+. –  au jour… 3.13n  ; 5.5 ; Rm 2.16 ; 2Co 1.14 ; Ph 1.6,10 ; 2.16 ; cf. Am 5.18 ; Ac 2.20. –  Jésus-Christ  : certains mss portent seulement Jésus.'
  - type: text
    content: 'C''est lui qui vous affermira aussi jusqu''à la fin, pour que vous soyez sans reproche au jour de notre Seigneur Jésus-Christ. '
  '9':
  - type: note
    content: 'Dieu est digne de confiance ou fidèle 10.13 ; 2Co 1.18 ; 1Th 5.24 ; 2Th 3.3 ; 2Tm 2.13 ; Hé 10.23 ; 11.11 ; 1Jn 1.9 ; Ap 1.5+ ; cf. Dt 7.9. –  à la communion…  : autre traduction à la solidarité avec son fils  ; 10.16 ; cf. Rm 8.17 ; 12.13n  ; 15.26n  ; 1Jn 1.3.'
  - type: text
    content: Dieu est digne de confiance, lui par qui vous avez été appelés à la communion de son Fils, Jésus-Christ, notre Seigneur.
  - type: heading
    content: Divisions dans l'Eglise de Corinthe
