document_id: PSA.54,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel d'un persécuté
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.1n  ; 32.1n.
  - type: text
    content: 'Du chef de chœur. Avec instruments à cordes. Poème. De David. '
  '2':
  - type: note
    content: Cf. 1S 23.15-20 ; 26.1.
  - type: text
    content: 'Lorsque les Ziphites vinrent dire à Saül : David est caché parmi nous.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'rends-moi justice  : cf. 7.9n ( juger ) ; voir Gn 30.6 ; Dt 32.36 ; 1S 24.13. –  par ta puissance ou ta vaillance  ; cf. 66.7 ; 71.18 ; 89.13s.'
  - type: text
    content: O Dieu, sauve-moi par ton nom,
  - type: text
    content: rends-moi justice par ta puissance !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 5.2+s.
  - type: text
    content: O Dieu, entends ma prière,
  - type: text
    content: prête l'oreille aux paroles de ma bouche !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'des étrangers  : plusieurs mss portent des gens arrogants , comme en 86.14. –  brutes Jb 6.23 ; 27.13. –  en veulent à ma vie 35.4n  ; cf. 1S 23.15. –  ils n''ont pas placé Dieu devant eux  : cf. 16.8.'
  - type: text
    content: Car des étrangers se sont dressés contre moi,
  - type: text
    content: des brutes en veulent à ma vie,
  - type: text
    content: 'ils n''ont pas placé Dieu devant eux. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 118.7. –  est avec (ou en, parmi ) ceux…  : plusieurs versions anciennes ont lu est mon soutien.'
  - type: text
    content: Mais Dieu est mon secours,
  - type: text
    content: le Seigneur est avec ceux qui me soutiennent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il fera retomber  : litt. il fera revenir  ; autre lecture traditionnelle le mal (ou le malheur ) retombera…  ; cf. 94.23 ; 143.12. –  loyauté ou vérité  ; cf. 25.10+.'
  - type: text
    content: Il fera retomber le mal sur mes détracteurs ;
  - type: text
    content: par ta loyauté réduis-les au silence !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'des sacrifices généreux  : on pourrait aussi comprendre des sacrifices volontaires , comme en Ez 46.12 ; Esd 3.5 ; 2Ch 31.14 ; voir aussi Ps 40.7+. –  parce qu''il est bon  : cf. 25.8+ ; voir aussi 92.2 ; 135.3.'
  - type: text
    content: Je t'offrirai des sacrifices généreux ;
  - type: text
    content: 'je célébrerai ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce qu''il est bon,'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'il (le nom divin, cf. v. 3,8) me délivre de toute détresse 25.22. –  mes ennemis…  : cf. 22.18n  ; 59.11 ; 92.12n  ; 112.8 ; 118.7 ; voir aussi 58.11.'
  - type: text
    content: car il me délivre de toute détresse,
  - type: text
    content: mes ennemis me sont offerts en spectacle.
