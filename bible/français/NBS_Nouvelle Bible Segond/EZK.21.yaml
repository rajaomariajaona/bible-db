      text: 'Alors, quand ils te diront : « Pourquoi gémis-tu ? », tu répondras : Parce qu''il arrive une nouvelle… Tout cœur fondra, toutes les mains tomberont, tout esprit vacillera et tous les genoux dégoutteront… Elle arrive, elle est là ! – déclaration du Seigneur '
