document_id: EZK.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une mauvaise nouvelle pour Israël
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: 'Ainsi tous sauront que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai tiré mon épée de son fourreau. Elle n''y rentrera plus.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: les reins brisés , c.-à-d. sans force ; cf. Es 45.1n. –  sous leurs yeux 4.12+.
  - type: text
    content: 'Toi, humain, gémis ; les reins brisés et dans l''amertume, tu gémiras sous leurs yeux ! '
  '12':
  - type: note
    content: 'Tout cœur fondra  : cf. v. 20n  ; Jos 2.11 ; 5.1 ; 7.5 ; 2S 17.10. –  toutes les mains tomberont  : cf. 7.17n  ; Es 13.7 ; Jr 6.24. – Voir esprit. –  tous les genoux… 7.17n. –  Elle arrive…  : cf. 39.8.'
  - type: text
    content: 'Alors, quand ils te diront : « Pourquoi gémis-tu ? », tu répondras : Parce qu''il arrive une nouvelle… Tout cœur fondra, toutes les mains tomberont, tout esprit vacillera et tous les genoux dégoutteront… Elle arrive, elle est là ! – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: L'épée
  '13':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8,28. –  fourbie  : le même terme est traduit par poli en 1R 7.45 ; par luisant en Es 18.2,7 (voir aussi Ez 29.18n).'
  - type: text
    content: 'Humain, parle en prophète ! Tu diras : Ainsi parle le Seigneur : Dis :'
  - type: text
    content: L'épée ! l'épée !
  - type: text
    content: Elle est aiguisée, elle est fourbie.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Ou bien… arbre  : texte obscur, souvent supprimé dans les éditions modernes ; diverses modifications et interprétations en ont été proposées ; cf. v. 18 ; 17.5s ; 19.10-14.'
  - type: text
    content: C'est bien pour massacrer qu'elle est aiguisée,
  - type: text
    content: c'est pour lancer des éclairs qu'elle est fourbie…
  - type: text
    content: Ou bien alors serions-nous gais ?
  - type: text
    content: Le sceptre de mon fils méprise tout arbre…
  '16':
  - type: text
    content: On l'a donnée à fourbir, pour qu'une main la manie ;
  - type: text
    content: elle est aiguisée, l'épée, elle est fourbie,
  - type: text
    content: pour armer la main du tueur.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'elle est…  : litt. elle (c.-à-d. l''épée ) est contre mon peuple . –  princes d''Israël 19.1. –  ils sont jetés sur l''épée  : autre traduction ils sont livrés à l''épée  ; même verbe en Ps 89.45. –  de dégoût, frappe-toi la cuisse  : cf. v. 19 ; Jr 31.19n.'
  - type: text
    content: Crie, hurle, humain !
  - type: text
    content: Car elle est tirée contre mon peuple,
  - type: text
    content: contre tous les princes d'Israël ;
  - type: text
    content: ils sont jetés sur l'épée avec mon peuple.
  - type: text
    content: Aussi, de dégoût, frappe-toi la cuisse !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Car c''est une épreuve…  : traduction incertaine ; cf. v. 15n.'
  - type: text
    content: 'Car c''est une épreuve ; et qu''arrivera-t-il si le sceptre méprisant ne demeure pas ? – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'frappe des mains  : cf. v. 17 ; 6.11. –  les coups  : sous-entendu dans le texte. –  l''épée du carnage…  : litt. l''épée des transpercés (ou des victimes ) , l''épée du grand transpercé (ou la grande épée de la victime ) ; au lieu de victimes , on pourrait lire profané(s) ou profanateur(s) , comme au v. 30 (homonymie en hébreu, cf. 9.7n). –  qui les cerne  : autre traduction qui pénètre en eux.'
  - type: text
    content: Toi, humain, parle en prophète
  - type: text
    content: et frappe des mains !
  - type: text
    content: Que les coups de l'épée soient doublés, triplés !
  - type: text
    content: C'est l'épée du carnage,
  - type: text
    content: l'épée du grand carnage
  - type: text
    content: qui les cerne.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi  : litt. tourne ta face 6.2 ; cf. 4.3+. –  la droite , c.-à-d. le sud 4.4n  ; 16.46. –  vaticine ou prêche  ; litt. répands, distille, ruisselle (même verbe en Jb 29.22, cf. Dt 32.2 ; certains lui voient dans certains cas un sens péjoratif ; cf. baver, bavarder Am 7.16 ; Mi 2.6,11). –  Parle en prophète 4.7n. –  pays  : autres traductions campagne ; champ . –  midi ou Néguev (Gn 13.14n), de même dans la suite : ou bien la région aujourd''hui semi-désertique qui occupe le sud de la Judée, prise ici pour l''ensemble du royaume, ou bien la direction générale du sud (les envahisseurs mésopotamiens arrivant en Juda par le nord).'
  - type: text
    content: 'Humain, tourne-toi vers la droite, et vaticine sur le sud ! Parle en prophète sur la forêt du pays du midi ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le cœur leur manque ou défaille , litt. fonde , autre verbe qu''au v. 12 ; également en Ex 15.15 ; Jos 2.9,24. –  défaillances  : litt. trébuchements , le mot hébreu correspondant est traduit par obstacle en 3.20n  ; 7.19n  ; cf. Jr 18.23. –  je les menacerai…  : traduction conjecturale ; litt. je donnerai (l''épouvante, le cri, l''éclat ?) de l''épée . –  Hélas ! 6.11 ; beaucoup pensent que le terme correspondant est ici dû à une erreur de copie (cf. 18.10n). –  réservée  : traduction incertaine ; Tg polie (pour le massacre), comme aux v. 14-16.'
  - type: text
    content: Pour que le cœur leur manque,
  - type: text
    content: pour multiplier les défaillances,
  - type: text
    content: à toutes leurs portes je les menacerai de l'épée.
  - type: text
    content: Hélas ! elle est faite pour lancer des éclairs,
  - type: text
    content: elle est réservée au massacre.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  Garde-toi  : litt. sois une ( ?), forme verbale qui ne se retrouve nulle part ailleurs ; une modification permettrait de lire aiguise-toi (c.-à-d. montre-toi tranchante ), comme aux v. 14-16. –  partout où…  : litt. où ta face est-elle convoquée ? Le terme correspondant à convoquée étant apparenté à celui qui est fréquemment traduit par temps fixé, rencontre (Ex 13.10n).'
  - type: text
    content: Garde-toi à droite,
  - type: text
    content: sois prête à gauche,
  - type: text
    content: partout où tu seras appelée !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'je frapperai…  : cf. v. 19 ; 22.13. –  j''assouvirai 5.13n. –  c''est moi… 5.15+.'
  - type: text
    content: Moi aussi, je frapperai des mains,
  - type: text
    content: et j'assouvirai ma fureur
  - type: text
    content: '– c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé.'
  - type: heading
    content: D'abord le siège et la prise de Jérusalem
  '23':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 25. –  un signe  : litt. une main  ; cf. 1S 15.12n  ; Dn 5.5. –  Inscris ou taille  ; sur le verbe correspondant, cf. 23.47n  ; Gn 1.1n ( créer ).'
  - type: text
    content: 'Toi, humain, trace deux chemins pour qu''arrive l''épée du roi de Babylone ; tous les deux sortiront du même pays. Inscris un signe, inscris-le à l''entrée du chemin qui conduit à une ville. '
  '25':
  - type: note
    content: 'Rabba  : cf. Dt 3.11n  ; Jr 49.2 ; Am 1.14.'
  - type: text
    content: 'Tu traceras un chemin pour que l''épée arrive à Rabba-des-Ammonites et en Juda, à Jérusalem, ville fortifiée. '
  '26':
  - type: note
    content: 'au carrefour  : litt. à la mère du chemin. –  il secoue…  : procédés de divination (cf. Nb 14.42 ; 21.34) : flèches secouées dans un carquois, sans doute jusqu''à ce qu''elles tombent de façon à indiquer la direction à prendre ; foie d''animal immolé, dont l''aspect était considéré comme un augure du succès de l''entreprise. –  teraphim Jg 17.5 ; 1S 15.23 ; 19.13,16 ; 2R 23.24 ; Os 3.4 ; Za 10.2.'
  - type: text
    content: 'Car le roi de Babylone s''est placé au carrefour, au croisement des deux chemins, pour pratiquer la divination : il secoue les flèches, il interroge les teraphim, il examine le foie. '
  '27':
  - type: note
    content: 'sa main droite  : probablement celle qui emporte la décision tirée au sort. –  le sort  : le mot correspondant est traduit par divination au v. 26. –  pour y disposer…  : la suite est peut-être à lire comme la teneur de l''oracle divinatoire ; cf. 4.2n. –  commander  : litt. ouvrir la bouche, c.-à-d. crier au carnage (autre mot qu''au v. 19n). –  acclamations  : cf. Jos 6.5 ; Jr 4.19 ; 20.16 ; 49.2 ; Am 1.14 ; 2.2.'
  - type: text
    content: 'Dans sa main droite se trouve le sort qui désigne Jérusalem, pour y disposer des béliers, commander le carnage, faire retentir des acclamations guerrières. On disposera des béliers contre les portes, on élèvera un remblai, on bâtira un terrassement. '
  '28':
  - type: note
    content: 'pour eux  : pour les Judéens qui ne veulent pas croire à la chute de Jérusalem (cf. v. 5+). –  qui ont fait des serments ou à qui on a fait des serments, allusion probable, soit à l''alliance rompue avec Babylone, soit à l''alliance avec l''Egypte censée protéger Juda contre Babylone (cf. chap. 17), à moins qu''il ne s''agisse des promesses des prophètes (13.10,16).'
  - type: text
    content: 'Cela reste pour eux des divinations illusoires – à leurs yeux, du moins – eux qui ont fait des serments. Mais lui, il évoque le souvenir de leur faute, de telle sorte qu''ils seront pris. '
  '29':
  - type: note
    content: 'vous évoquez le souvenir  : cf. 18.22n. –  par sa main (celle du roi de Babylone, v. 26s) ; litt. par une main  ; on pourrait aussi comprendre vous serez saisis brutalement.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que vous évoquez le souvenir de votre faute en mettant à découvert vos transgressions, en montrant vos péchés par tous vos agissements, parce que ce souvenir est évoqué contre vous, vous serez pris par sa main.'
  '3':
  - type: note
    content: 'forêt / feu  : cf. Es 9.17+ ; 10.33s. –  arbre vert / arbre sec  : cf. Lc 23.31.'
  - type: text
    content: 'Tu diras à la forêt du midi : Ecoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je mets au dedans de toi un feu qui dévorera chez toi tout arbre vert et tout arbre sec ; le flamboiement de ses flammes ne s''éteindra pas, et tout visage en sera marqué, du midi jusqu''au nord. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'profanateur  : voir v. 19n  ; l''apostrophe s''adresse à Sédécias (cf. 12.10 ; 17.13-21 ; 2R 25). –  où la faute est à son comble  : litt. de la faute de la fin , de même au v. 34 ; 35.5 ; cf. Dn 8.17. Voir péché.'
  - type: text
    content: 'Toi, profanateur, méchant, prince d''Israël, dont le jour arrive au temps où la faute est à son comble ! '
  '31':
  - type: note
    content: 'le turban  : même terme en Ex 28.4,37,39 etc. –  Tout change  : litt. cela, pas cela ou celle-là (Jérusalem), pas celle-là. –  Ce qui est abaissé… 17.24+.'
  - type: text
    content: 'ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Ote le turban, enlève la couronne. Tout change ! Ce qui est abaissé sera élevé, et ce qui est élevé sera abaissé. '
  '32':
  - type: note
    content: 'Tout a déjà changé  : texte obscur, qui rappelle partiellement la formule du v. 31. –  celui à qui appartient (cf. Gn 49.10n) le jugement, le mot hébreu correspondant est souvent traduit par droit. –  je le remettrai  : litt. je le donnerai, ce qui pourrait aussi signifier je le livrerai (Sédécias, à Nabuchodonosor, l''exécuteur du jugement  ; cf. 23.23s).'
  - type: text
    content: Une ruine, une ruine, une ruine ! Voilà ce que j'en ferai. Tout a déjà changé, en attendant la venue de celui à qui appartient le jugement et à qui je le remettrai.
  - type: heading
    content: Ensuite l'assaut contre les Ammonites
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 3,8,14,29,31). –  Ammonites  : cf. v. 25. –  leurs outrages  : on pourrait aussi comprendre leur déshonneur , mais il s''agit plus probablement des outrages contre Juda (22.4) ou contre Babylone ; cf. 25.1-7 ; Jr 6.10n  ; voir aussi Jr 27.2-6 ; 49.1-6 ; Am 1.13-15 ; So 2.8-11. –  L''épée… v. 14s. –  lancer  : sous-entendu dans le texte.'
  - type: text
    content: 'Toi, humain, parle en prophète ! Tu diras : Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' sur les Ammonites et sur leurs outrages. Tu diras : L''épée, l''épée est tirée, elle est fourbie pour massacrer, pour dévorer, pour lancer des éclairs ! '
  '34':
  - type: note
    content: 'tes (pronom féminin en hébreu, de même dans la suite, sauf dans la première partie du v. 37) visions illusoires… 13.6+. –  elle t''égorgera…  : texte obscur et traduction incertaine, litt. pour te rendre comme le cou des victimes (v. 19n) des méchants. –  au temps… v. 30n.'
  - type: text
    content: 'Au milieu de tes visions illusoires et de ta divination mensongère, elle t''égorgera parmi les méchants, ceux dont le jour arrive au temps où la faute est à son comble. '
  '35':
  - type: note
    content: 'ton épée  : sous-entendu dans le texte.'
  - type: text
    content: 'Remets ton épée dans son fourreau. Je te jugerai dans le lieu même où tu as été créé, au pays de tes origines. '
  '36':
  - type: note
    content: 'Cf. 7.8 ; 22.20s,31 ; cf. 2Th 2.8. –  des brutes  : le même terme est traduit par abruti(s) en Jr 10.14,21 ; 51.17 ; autre traduction des incendiaires.'
  - type: text
    content: 'Je répandrai sur toi ma fureur, je soufflerai sur toi le feu de ma colère et je te livrerai à des brutes, à des artisans de destruction. '
  '37':
  - type: note
    content: ton sang 24.7.
  - type: text
    content: 'Tu seras dévoré par le feu ; ton sang restera au milieu du pays ; on ne se souviendra plus de toi – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé.'
  '4':
  - type: note
    content: 'Tous verront  : litt. toute chair verra  ; cf. Es 40.5. –  qui l''ai allumé Es 30.33.'
  - type: text
    content: 'Tous verront que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui l''ai allumé ; il ne s''éteindra pas.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ah ! Seigneur Dieu  ! 4.14. –  fables  : LXX parabole  ; voir 14.8n  ; cf. 12.22 ; 17.2 ; Ps 78.2 ; Mc 4.11/ /.'
  - type: text
    content: 'Je dis : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', ceux-là disent de moi : « C''est un conteur de fables. »'
  '6':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vaticine  : cf. v. 2n. –  les sanctuaires  : certains mss portent leur sanctuaire , d''autres mon sanctuaire  ; cf. 28.18 ; Ps 68.36 ; 73.17+. –  sur la terre d''Israël  : cf. 1.1-3.'
  - type: text
    content: 'Humain, tourne-toi vers Jérusalem et vaticine sur les sanctuaires ! Parle en prophète sur la terre d''Israël ! '
  '8':
  - type: note
    content: Je m'oppose à toi 5.8+. –  juste et méchant, c.-à-d. tout homme  ; cf. 18.4+ ; Jb 9.22.
  - type: text
    content: 'Tu diras à la terre d''Israël : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je m''oppose à toi ; je tirerai mon épée de son fourreau et je retrancherai de toi juste et méchant. '
  '9':
  - type: note
    content: 'épée 11.8+. –  pour les frapper tous  : litt. vers (ou sur, contre) toute chair.'
  - type: text
    content: 'Parce que je veux retrancher de toi juste et méchant, à cause de cela, mon épée sortira de son fourreau pour les frapper tous, du midi au nord. '
