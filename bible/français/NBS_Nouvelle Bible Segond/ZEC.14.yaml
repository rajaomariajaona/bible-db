document_id: ZEC.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La bataille finale et l'arrivée du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 39.6 ; Ez 38–39 ; Jl 4 ; Mi 4.11-13. –  Un jour Es 2.21 ; Jl 1.15 ; 2.1-11 ; Am 5.18 ; So 1.14-18 ; Ml 3.19. –  ton butin  : cf. v. 14 ; Es 9.2. –  en ton sein , au féminin, pour Jérusalem.'
  - type: text
    content: 'Un jour arrive, pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: où ton butin sera partagé en ton sein.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'se changera en plaine aride  : autre traduction deviendra comme la Araba  ; cf. Es 42.16 ; Dt 1.1n  ; Jos 8.14n. –  Guéba au nord de Jérusalem, à la frontière de Juda et de Benjamin (Jos 18.24 ; Jg 20.33 ; 1R 15.22 ; 2R 23.8). –  Rimmôn dans le Néguev (= sud ), à la frontière sud de Juda Jos 15.32 ; 19.7 ; Né 11.29. –  élevée Es 2.2 ; Mi 4.1. –  à sa place  : cf. 12.6. –  la porte de Benjamin au nord de la ville Jr 20.2 ; 37.13 ; 38.7. –  l''ancienne porte ou la première porte  ; peut-être la même que la vieille porte , au nord-ouest (Né 3.6). –  porte des Angles à l''ouest ; cf. 10.4n  ; 2R 14.13 ; Jr 31.38. –  tour de Hananéel au nord-est, Jr 31.38 ; Né 3.1 ; 12.39. –  pressoirs du roi  : peut-être dans le Jardin du Roi , au sud-est (2R 25.4/ / ; Né 3.15). – Cf. Ps 48.13s ; Né 12.27ss.'
  - type: text
    content: Tout le pays se changera en plaine aride, de Guéba à Rimmôn, au sud de Jérusalem ; Jérusalem sera élevée et restera à sa place, depuis la porte de Benjamin jusqu'au lieu de l'ancienne porte, jusqu'à la porte des Angles, et depuis la tour de Hananéel jusqu'aux pressoirs du roi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'plus d''anathème  : il faut sans doute comprendre ici : plus de mesure de protection du sacré par crainte d''une contamination du profane ; on pourrait cependant prendre l''expression d''une façon plus générale, dans son sens fréquent de destruction ou d''extermination ; cf. v. 20s ; Nb 21.2 ; Dt 2.34+ ; 20.4,18 ; Jos 6.17 ; 1R 20.42 ; Es 43.28 ; Jr 25.9 ; Ml 3.24 ; Ap 22.3. –  habitera en sécurité Lv 25.18 ; Jr 33.16.'
  - type: text
    content: On y habitera,
  - type: text
    content: et il n'y aura plus d'anathème ;
  - type: text
    content: Jérusalem habitera en sécurité.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le fléau… Ex 7.27n  ; 9.14 ; 1S 4.17 ; 6.4 ; 2S 17.9 ; 24.21,25 ; 2Ch 21.14. –  tous les peuples… 12.3+ ; cf. Es 29.5-8. –  pourrira  : cf. Lv 26.39 ; Ez 4.17n. –  debout  : litt. debout sur ses pieds ou sur ses jambes . –  dans sa bouche  : litt. dans leur bouche  ; cf. Lv 26.14ss ; Dt 28.15ss ; Ez 38.22 ; Ha 3.5.'
  - type: text
    content: 'Voici le fléau dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappera tous les peuples qui auront dirigé leurs armées contre Jérusalem : la chair de chacun pourrira tandis qu''il sera encore debout ; ses yeux pourriront dans leurs orbites et sa langue pourrira dans sa bouche.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la grande panique  : même terme en 1S 5.9,11 ; Es 22.5. –  chacun lèvera la main…  : cf. 11.6 ; Jg 7.22 ; Es 49.25s ; Ez 38.21 ; Ag 2.23 ; 2Ch 20.20-25.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: 'ce sera chez eux la grande panique du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: chacun empoignera l'autre,
  - type: text
    content: chacun lèvera la main sur l'autre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'dans Jérusalem  : on pourrait aussi comprendre contre Jérusalem  ; cf. 12.2n. –  on amassera  : le même verbe est traduit par rassembler au v. 2 ; autre traduction on amassera aux alentours les richesses de toutes les nations  ; cf. v. 1 ; Es 61.6 ; Ez 39.10.'
  - type: text
    content: Juda combattra aussi dans Jérusalem,
  - type: text
    content: et l'on amassera les richesses de toutes les nations d'alentour,
  - type: text
    content: de l'or, de l'argent et des vêtements en très grande quantité.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les chevaux…  : cf. Jon 3.5-8 ; 4.11. –  semblable à l''autre v. 12.'
  - type: text
    content: 'Le fléau frappera de même les chevaux, les mulets, les chameaux, les ânes et toutes les bêtes qui seront dans ces camps : ce fléau sera semblable à l''autre.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 2.2 ; 66.18-24. –  ceux qui seront restés…  : cf. v. 2. –  de toutes les nations 12.3+. –  chaque année  : cf. Es 66.23. –  le roi, le Seigneur v. 9+ ; certains comprennent le roi du Seigneur . –  la fête des Huttes  : cf. Ex 23.16 ; Lv 23.39-43 ; Dt 16.13-15 ; 1R 8.2,65 ; Ez 45.25n  ; Esd 3.4 ; Né 8.14-18.'
  - type: text
    content: Alors tous ceux qui seront restés de toutes les nations venues contre Jérusalem
  - type: text
    content: monteront chaque année
  - type: text
    content: 'pour se prosterner devant le roi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: et pour célébrer la fête des Huttes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: clans ou familles , cf. 12.12 ; Gn 12.3n  ; 1Ch 16.28 ; cf. 2Ch 2.10s ; 9.8. –  la pluie 10.1 ; Es 12.3n  ; 55.1ss ; Jn 7.37n.
  - type: text
    content: 'Quant aux clans de la terre qui ne monteront pas à Jérusalem pour se prosterner devant le roi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, la pluie ne tombera pas sur eux. '
  '18':
  - type: note
    content: 'le clan de l''Egypte  : cf. Dt 11.10ss. –  monte Gn 12.10n. –  la pluie ne tombera pas sur lui  : litt. et pas sur eux  ; d''autres, du fait que l''Egypte est moins dépendante de la pluie que beaucoup d''autres pays, comprennent  : Si le clan égyptien ne monte pas – du fait qu''il n''était pas venu (contre Jérusalem) et bien que (la pluie) ne tombe pas sur eux – alors ce sera le fléau…  ; LXX et ce sera pour eux le fléau… (cf. v. 12).'
  - type: text
    content: 'Si le clan de l''Egypte ne monte pas, s''il ne vient pas, la pluie ne tombera pas sur lui ; ce sera le fléau dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappera les nations qui ne monteront pas pour célébrer la fête des Huttes. '
  '19':
  - type: note
    content: 'le châtiment  : le mot hébreu correspondant peut aussi être traduit par péché  ; il peut désigner les conséquences (culpabilité ou châtiment) ou l''expiation (sacrifice pour le péché) d''une faute.'
  - type: text
    content: Ce sera le châtiment de l'Egypte, le châtiment de toutes les nations qui ne monteront pas pour célébrer la fête des Huttes.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'toutes les nations 12.3+. –  violées Es 13.16n. –  la moitié  : cf. 13.8. –  partira  : litt. sortira , même verbe aux v. 3,8 ; 2.7+. –  ce qui subsistera…  : cf. Es 1.9+ ; 4.3.'
  - type: text
    content: Je rassemblerai toutes les nations
  - type: text
    content: à Jérusalem pour le combat ;
  - type: text
    content: la ville sera prise,
  - type: text
    content: les maisons seront mises à sac
  - type: text
    content: et les femmes violées ;
  - type: text
    content: la moitié de la ville partira en exil,
  - type: text
    content: mais ce qui subsistera du peuple
  - type: text
    content: ne sera pas retranché de la ville.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 12.3+. –  Consacré au Seigneur ou sacré (le terme est aussi traduit par saint ) pour le Seigneur  ; l''inscription gravée sur le turban du grand prêtre (cf. 3.9 ; Ex 28.36 ; 39.30) sera même sur les clochettes des chevaux  : cf. Es 66.20 ; voir aussi Nb 14.21. –  les marmites ou les récipients , Ex 27.3n. –  calices 9.15n.'
  - type: text
    content: 'En ce jour-là, on mettra sur les clochettes des chevaux : « Consacré au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » Et les marmites dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' seront comme les calices devant l''autel. '
  '21':
  - type: note
    content: 'Jérusalem / Juda v. 14 ; 12.2. –  de marchand  : litt. de Cananéen  ; cf. 11.7n  ; voir aussi Es 23.8n  ; Os 12.8n  ; on peut comprendre, ou bien qu''il n''y aura plus besoin de marchands de victimes sacrificielles ou d''objets sacrés pour le culte (puisque tout sera consacré, v. 20s ; voir Mt 21.12-13/ / ; Jn 2.13-16), ou bien que plus personne ne sera considéré comme étranger et inapte au culte.'
  - type: text
    content: 'Toute marmite à Jérusalem et dans Juda sera consacrée au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ; tous ceux qui offriront des sacrifices viendront s''en servir pour la cuisson ; et il n''y aura plus de marchand dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, en ce jour-là.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur sortira  : cf. Es 31.4 ; 42.13 ; Mi 1.3.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sortira'
  - type: text
    content: et combattra ces nations,
  - type: text
    content: comme au jour où il combat,
  - type: text
    content: au jour de la bataille.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Jl 3.3s ; Mi 1.4 ; Mt 21.1 ; 24.3,29-31/ /. –  en face de Jérusalem  : cf. 1R 11.7. –  à l''est  : cf. Ez 11.23 ; 43.1-5. –  le sud ou le Néguev.'
  - type: text
    content: Ses pieds se placeront en ce jour-là
  - type: text
    content: sur le mont des Oliviers,
  - type: text
    content: qui est en face de Jérusalem, à l'est ;
  - type: text
    content: le mont des Oliviers se fendra par le milieu, vers l'est et vers l'ouest,
  - type: text
    content: 'en une très grande vallée :'
  - type: text
    content: une moitié de la montagne se retirera vers le nord
  - type: text
    content: et l'autre moitié vers le sud.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Vous fuirez…  : LXX la vallée de mes montagnes sera comblée (mêmes consonnes en hébreu) ; certains modifient le texte hébreu traditionnel pour lire la vallée de Hinnom . –  Atsal  : peut-être une petite localité au sud-est de Jérusalem, dans la vallée du Cédron. –  aux jours d''Ozias  : cf. Am 1.1 ; 8.8 ; 9.1-5 ; une tradition juive a associé le tremblement de terre au sacrilège commis par Ozias (2Ch 26.16). –  tous les saints  : cf. Dt 33.2 ; Ps 68.18 ; 89.6 ; Dn 7.18,27 ; Mt 25.31 ; 1Th 3.13 ; Jd 14. –  avec toi , c.-à-d. avec Dieu  ; plusieurs mss hébreux et des versions anciennes ont lu avec lui.'
  - type: text
    content: Vous fuirez alors dans la vallée de mes montagnes, car la vallée des montagnes s'étendra jusqu'à Atsal ; vous fuirez comme vous avez fui pour échapper au tremblement de terre, aux jours d'Ozias, roi de Juda.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, viendra'
  - type: text
    content: – tous les saints seront avec toi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction conjecturale ; on a aussi compris  : il n''y aura plus d''autre lumière que celle des choses précieuses en condensation  ; ou encore, avec une légère modification du texte hébreu traditionnel  : il n''y aura plus de luminaires (= astres, Gn 1.14n) , ni de froid ni de glace  ; cf. Gn 8.22 ; Es 60.19s ; Ap 21.23-25 ; 22.5 ; 4 Esdras 7.39 : « Tel sera ce jour : sans soleil, sans lune ni étoiles, sans nuage, sans tonnerre ni éclairs, sans vent, sans eau ni air ; sans ténèbres, sans soir ni matin, sans été, sans printemps ni chaleur, sans hiver, sans gelée ni froid, sans grêle, sans pluie ni rosée, sans midi, sans nuit ni aurore, sans éclat, sans clarté ni lumière, si ce n''est la splendeur de la clarté du Très-Haut. »'
  - type: text
    content: En ce jour-là,
  - type: text
    content: il n'y aura pas de lumière ;
  - type: text
    content: il y aura du froid et de la glace.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'un jour unique  : cf. v. 9 ; la même expression est traduite par premier jour en Gn 1.5. –  connu du Seigneur  : cf. Mt 24.36/ /. –  la lumière paraîtra ou il y aura de la lumière.'
  - type: text
    content: Ce sera un jour unique,
  - type: text
    content: 'connu du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: il ne sera ni jour ni nuit ;
  - type: text
    content: mais vers le soir la lumière paraîtra.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 12.3+. –  eaux vives 13.1 ; Ez 47.1+ ; Jn 4.10n  ; 7.38 ; Ap 21.6 ; 22.1. –  la mer orientale  : la mer Morte. –  l''autre mer ou la mer occidentale , c.-à-d. la Méditerranée.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: des eaux vives sortiront de Jérusalem,
  - type: text
    content: moitié vers la mer orientale,
  - type: text
    content: moitié vers l'autre mer ;
  - type: text
    content: il en sera ainsi été comme hiver.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'roi de toute la terre (c''est le même mot qui est traduit par pays au v. 10) : cf. v. 16 ; 4.14 ; 6.5 ; Ps 22.28s ; 97–98 ; Dn 2.44 ; Ap 11.15 ; 19.6. –  un ou unique  ; cf. v. 7 ; Dt 6.4+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera roi de toute la terre ;'
  - type: text
    content: en ce jour-là,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera un,'
  - type: text
    content: et son nom un.
