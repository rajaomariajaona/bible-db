document_id: JER.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les mauvais dirigeants et le roi sauveur
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur pour les bergers 2.8+ ; cf. 10.21+ ; 50.6 ; Ez 34.2ss. –  troupeau  : le mot hébreu ainsi traduit désigne habituellement un troupeau de petit bétail (moutons et chèvres).'
  - type: text
    content: 'Quel malheur pour les bergers qui perdent et dispersent le troupeau que je fais paître ! – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'adultère v. 14 ; 9.1+. –  en deuil 4.28+. –  à cause de la malédiction (ou de l''adjuration , 29.18n) : quelques mss hébreux et des versions anciennes ont lu à cause de ceux-là . –  courage  : litt. puissance . –  pour ce qui ne devrait pas se faire ou pour ce qui ne se doit pas, ce qui ne convient pas  ; cf. 8.6n.'
  - type: text
    content: Car le pays est rempli d'adultère ;
  - type: text
    content: le pays est en deuil à cause de la malédiction,
  - type: text
    content: les pâturages du désert sont desséchés.
  - type: text
    content: – Ils courent au mal,
  - type: text
    content: ils n'ont de courage que pour ce qui ne devrait pas se faire.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Prophètes et prêtres 5.31+. –  profanation ou impiété  ; cf. v. 15 ; 3.1+ss ; Es 9.16 ; 10.6 ; 33.14. –  dans ma maison 7.30.
  - type: text
    content: Prophètes et prêtres se livrent à la profanation ;
  - type: text
    content: même dans ma maison j'ai trouvé le mal qu'ils font
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'leur chemin sera glissant…  : cf. Ps 35.6 ; 73.18. –  ils seront poussés  : autre traduction du verbe rendu au v. 2n par chasser et ailleurs par bannir . –  l''année… 11.23+.'
  - type: text
    content: C'est pourquoi leur chemin sera glissant et obscur,
  - type: text
    content: ils seront poussés et ils tomberont ;
  - type: text
    content: car je ferai venir sur eux le malheur,
  - type: text
    content: l'année où ils vont rendre des comptes,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Des prophètes pires que ceux de Samarie
  '13':
  - type: text
    content: ' '
  - type: note
    content: Samarie , terme de comparaison (v. 14) ; cf. 3.11 ; 18.13. –  par le Baal 2.8+.
  - type: text
    content: Chez les prophètes de Samarie
  - type: text
    content: 'j''ai vu des choses choquantes :'
  - type: text
    content: ils ont fait les prophètes par le Baal,
  - type: text
    content: ils ont égaré Israël, mon peuple.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'choses horribles 5.30+. –  adultères v. 10. –  ils suivent ou ils marchent dans , cf. Ps 1.1n. –  mensonge 13.25+. –  ils encouragent…  : litt. ils fortifient les mains des…  ; autre traduction ils prêtent main-forte aux… Ez 13.22. –  Sodome / Gomorrhe 49.18+ ; Dt 32.32 ; Es 1.9s. –  les habitants de Jérusalem  : litt. ses habitants (à elle).'
  - type: text
    content: Mais chez les prophètes de Jérusalem
  - type: text
    content: 'j''ai vu des choses horribles :'
  - type: text
    content: ils sont adultères,
  - type: text
    content: ils suivent le mensonge ;
  - type: text
    content: ils encouragent les mauvais,
  - type: text
    content: de sorte qu'aucun ne revient de son mal ;
  - type: text
    content: ils sont tous à mes yeux comme Sodome,
  - type: text
    content: et les habitants de Jérusalem comme Gomorrhe.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'absinthe 9.14+. –  eau empoisonnée 8.14+. –  profanation v. 11+. –  dans tout le pays  : cf. 2.7 ; 3.2.'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées contre les prophètes :'
  - type: text
    content: Je vais les nourrir d'absinthe
  - type: text
    content: et leur faire boire de l'eau empoisonnée ;
  - type: text
    content: car c'est par les prophètes de Jérusalem
  - type: text
    content: que la profanation s'est répandue dans tout le pays.
  - type: heading
    content: Des prophètes au service du mensonge
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'N''écoutez pas 27.9 ; 29.8. –  qui parlent en prophètes pour vous 2.8n  ; le verbe hébreu correspondant est traduit par annoncer aux v. 25s,32 ; ici l''expression correspondante est absente de LXX  ; cf. 14.13-14+. –  Ils vous abusent…  : autre traduction ils vous font devenir futiles (cf. 2.5n).'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: N'écoutez pas les paroles des prophètes
  - type: text
    content: qui parlent en prophètes pour vous !
  - type: text
    content: Ils vous abusent par des discours futiles ;
  - type: text
    content: 'ils ne racontent pas ce qui vient de la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mais les visions de leur propre cœur.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'à ceux qui me méprisent  : le verbe correspondant est rendu par bafouer en Es 1.4+ ; LXX à ceux qui méprisent la parole du Seigneur : vous aurez la paix (= Tout ira bien pour vous  ; cf. 4.10n) ; Dt 29.18. –  l''obstination… 3.17n. –  aucun malheur 5.12+.'
  - type: text
    content: 'Ils osent dire à ceux qui me méprisent :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit :'
  - type: text
    content: Tout ira bien pour vous !
  - type: text
    content: 'Et ils disent à quiconque suit l''obstination de son cœur :'
  - type: text
    content: Il ne t'arrivera aucun malheur !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'au conseil secret du Seigneur (v. 22), où il arrête ses projets (cf. 6.11n  ; même terme, dans un sens comparable, en Ez 13.9 ; Am 3.7) ; cf. 15.1,19 ; 18.20 ; voir aussi Gn 11.5-7 ; 18.17,23-32 ; 1R 22.19-22 ; Es 6 ; Am 3.7 ; 7.1-6 ; Jb 1.6 ; 2.1 ; 15.8 ; Jn 15.15 ; Rm 11.34 ; 1Co 2.16. –  sa parole  : d''après une lecture traditionnelle de l''hébreu. Autre lecture traditionnelle sa parole… ma parole.'
  - type: text
    content: '– Qui donc a assisté au conseil secret du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour voir, pour entendre sa parole ? Qui a prêté attention à sa parole, qui l''a entendue ?'
  '19':
  - type: text
    content: ' '
  - type: note
    content: '30.23s. –  la tempête 4.11 ; 22.22 ; 25.32 ; Es 29.6 ; Na 1.3 ; Ps 50.3. –  se déchaîne  : litt. sort.'
  - type: text
    content: 'C''est la tempête du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: la fureur se déchaîne,
  - type: text
    content: la tempête tournoie,
  - type: text
    content: elle tournoie sur la tête des méchants.
  '2':
  - type: note
    content: 'Ez 34.8-10. –  voici ce que dit  : la formule correspondante (aussi au v. 15) est habituellement traduite par ainsi parle (p. ex. v. 16,38). –  chassé  : le même verbe est traduit ailleurs par bannir (v. 3,8,12n  ; 24.9 ; 50.17n). –  vous ne vous en êtes pas occupés / je vais m''occuper de vous  : le texte joue sur les deux sens, positif et négatif, du même verbe hébreu, habituellement traduit par intervenir pour ou faire rendre des comptes à, châtier  ; cf. v. 34 ; 6.15n. –  à cause de vos agissements… v. 22 ; 4.4n  ; 21.12.'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, contre les bergers qui font paître mon peuple : Vous avez dispersé mon troupeau, vous avez chassé les bêtes, vous ne vous en êtes pas occupés. Eh bien, moi, je vais m''occuper de vous à cause de vos agissements mauvais – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '30.24. –  réalisé  : litt. dressé ou suscité . –  Dans la suite (ou à la fin ) des temps 48.47 ; Gn 49.1n  ; Es 2.2n  ; cf. Jn 13.7,36 ; voir aussi Hé 1.2+.'
  - type: text
    content: 'La colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne s''en retournera pas,'
  - type: text
    content: jusqu'à ce qu'il ait accompli et réalisé
  - type: text
    content: les projets de son cœur.
  - type: text
    content: Dans la suite des temps vous en aurez l'intelligence.
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 16+,32.
  - type: text
    content: Je n'ai pas envoyé ces prophètes,
  - type: text
    content: et ils ont couru ;
  - type: text
    content: je ne leur ai pas parlé,
  - type: text
    content: et ils ont parlé en prophètes.
  '22':
  - type: text
    content: ' '
  - type: note
    content: mon conseil secret v. 18n. –  les ramener 18.11+.
  - type: text
    content: S'ils avaient assisté à mon conseil secret,
  - type: text
    content: ils auraient dû faire entendre mes paroles à mon peuple
  - type: text
    content: et les ramener de leur voie mauvaise,
  - type: text
    content: de leurs agissements mauvais.
  - type: heading
    content: Le Seigneur présent dans tout l'univers
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'de près / de loin  : cf. 12.2 ; Dt 30.11-14 ; 2R 5.26 ; Ps 139.2ss ; Ac 17.27 ; certains ont compris l''expression dans un sens temporel ( Dieu du moment / de toujours ) ; cf. Dt 32.17.'
  - type: text
    content: Ne suis-je Dieu que de près ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ne suis-je pas aussi Dieu de loin ?
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Am 9.2s ; Ps 139.7-12. –  je ne remplis…  : cf. Es 6.3 ; Ac 7.49 ; Ep 1.23 ; Sagesse 1.7 : « L''Esprit du Seigneur remplit la terre et, comme il contient l''univers, il a la connaissance de chaque son. Aussi celui qui parle méchamment ne passera-t-il pas inaperçu… »'
  - type: text
    content: Quelqu'un peut-il se cacher dans une cachette
  - type: text
    content: sans que je le voie ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Est-ce que je ne remplis pas le ciel et la terre ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les prophètes qui racontent des rêves mensongers
  '25':
  - type: text
    content: ' '
  - type: note
    content: 14.14+.
  - type: text
    content: 'J''ai entendu ce que disent les prophètes qui annoncent le mensonge en mon nom, en disant : J''ai fait un rêve ! J''ai fait un rêve ! '
  '26':
  - type: note
    content: 'Texte obscur et traduction incertaine. –  ces prophètes songeront-ils…  : litt. y aura-t-il dans le cœur des prophètes…  ; cf. Ez 13.2.'
  - type: text
    content: 'Jusqu''à quand ces prophètes songeront-ils à annoncer le mensonge, à annoncer la tromperie de leur cœur ? '
  '27':
  - type: note
    content: 'oublier mon nom  : cf. 2.13+ ; Ml 3.16. – Voir Baal.'
  - type: text
    content: 'Ils veulent faire oublier mon nom à mon peuple par les rêves qu''ils se racontent l''un à l''autre, comme leurs pères ont oublié mon nom pour le Baal. '
  '28':
  - type: note
    content: 'rêve  : cf. Nb 12.6. –  vraiment  : autre traduction loyalement. –  paille / blé  : cf. Mt 3.12+.'
  - type: text
    content: Que le prophète qui a un rêve raconte ce rêve, et que celui qui a ma parole dise vraiment ma parole !
  - type: text
    content: Qu'est-ce que la paille a à faire avec le blé ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'comme un feu 5.14+ ; cf. Hé 4.12. –  un marteau  : cf. 50.23 ; même terme en Es 41.7.'
  - type: text
    content: 'Ma parole n''est-elle pas comme un feu – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et comme un marteau qui fait éclater le roc ? '
  '3':
  - type: note
    content: 'Je rassemblerai…  : cf. 29.10-14 ; 31.8,10,27s ; 33.7 ; 50.4 ; cf. Dt 30.3s ; Es 11.12+ ; Ez 11.17+ ; 34.11-16. –  je les ramènerai  : cf. 24.6 ; 27.22 ; 30.3 ; 32.37 ; 50.19. –  féconds et se multiplieront 3.16+ ; cf. 30.19.'
  - type: text
    content: 'Je rassemblerai moi-même ce qui reste de mon troupeau, de tous les pays où je les ai bannis ; je les ramènerai dans leur domaine ; ils seront féconds et se multiplieront. '
  '30':
  - type: note
    content: 'je m''oppose  : cf. 21.13n  ; Ez 13.8s ; voir aussi Jr 14.15.'
  - type: text
    content: 'C''est pourquoi je m''oppose – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – aux prophètes qui se volent mes paroles l''un à l''autre ! '
  '31':
  - type: note
    content: 'qui, de leur propre langue…  : litt. qui prennent leur langue pour faire une déclaration (ou un oracle).'
  - type: text
    content: 'Je m''oppose – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – aux prophètes qui, de leur propre langue, fabriquent une déclaration divine ! '
  '32':
  - type: note
    content: 'aux prophètes…  : autre traduction à ceux qui annoncent en prophètes des rêves… (2.8n) ; LXX aux prophètes qui annoncent… –  qui égarent mon peuple Mi 3.5. –  témérité  : cf. So 3.4n. –  pas envoyés v. 21. –  d''aucune utilité 7.8.'
  - type: text
    content: 'Je m''oppose – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – aux prophètes qui annoncent des rêves mensongers, qui les racontent et qui égarent mon peuple par leurs mensonges et leur témérité, alors que, moi, je ne les ai pas envoyés, je ne leur ai pas donné d''ordre, et ils ne sont d''aucune utilité à ce peuple – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: La parole du Seigneur est-elle une « sentence » ?
  '33':
  - type: text
    content: ' '
  - type: note
    content: la sentence, la charge ou l'oracle (Lm 2.14n) ; le mot hébreu peut aussi avoir le sens de fardeau (cf. v. 39n). Sur son emploi dans le langage des prophètes, cf. Es 13.1n.
  - type: text
    content: 'Si ce peuple, un prophète ou un prêtre te demande : « Quelle est la sentence, la charge du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? », tu leur diras : « La charge, c''est vous, et je vais m''en débarrasser ! » – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '34':
  - type: note
    content: 'celui du peuple  : litt. le peuple.'
  - type: text
    content: 'Quant au prophète, au prêtre, ou à celui du peuple qui dira : « Sentence du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! », je lui ferai rendre des comptes, à lui et à sa maison. '
  '35':
  - type: text
    content: 'Vous direz, chacun à son prochain, chacun à son frère : « Qu''a répondu le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Qu''a dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? » '
  '36':
  - type: note
    content: 'vous n''évoquerez plus  : cf. 20.9 ; LXX vous ne nommerez plus. –  tordez  : le même verbe hébreu est rendu ailleurs par bouleverser (20.16n) ou renverser (20.2n) ; cf. Mt 15.6/ /. –  Dieu vivant 10.10+.'
  - type: text
    content: 'Mais vous n''évoquerez plus la « sentence du '
  - type: text
    content: Seigneur
  - type: text
    content: '  » ; la sentence sera pour chacun sa propre parole, puisque vous tordez les paroles du Dieu vivant, du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, notre Dieu ! '
  '37':
  - type: text
    content: 'Tu diras au prophète : « Que t''a répondu le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Qu''a dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? » '
  '38':
  - type: text
    content: 'Et si vous dites encore : « Sentence du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » – alors, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Parce que vous dites cette parole : « Sentence du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! », quoique je vous aie fait dire : Vous ne direz pas : « Sentence du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » '
  '39':
  - type: note
    content: 'je vous oublierai  : autre verbe qu''au v. 40 (synonyme) ; plusieurs mss hébreux et des versions anciennes lisent ici le verbe apparenté au mot rendu par sentence ou charge au v. 33n  ; on peut comprendre je vous soulèverai et je vous rejetterai loin de moi.'
  - type: text
    content: '– à cause de cela, je vous oublierai, je me débarrasserai de vous et de la ville que je vous avais donnée, à vous et à vos pères ; '
  '4':
  - type: note
    content: 'des bergers 3.15. –  plus peur 30.10. –  il n''en manquera plus  : encore un autre sens du verbe hébreu traduit au v. 2n par s''occuper de.'
  - type: text
    content: 'Je nommerai à leur tête des bergers qui les feront paître ; ils n''auront plus peur, ils ne seront plus terrifiés, et il n''en manquera plus – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '40':
  - type: note
    content: 'qu''on n''oubliera jamais  : litt. éternelle, qu''on n''oubliera pas 20.11.'
  - type: text
    content: je vous couvrirai pour toujours de déshonneur, d'une confusion qu'on n'oubliera jamais.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '33.14ss. –  un germe  : cf. Es 4.2 ; Za 3.8n  ; 6.12 ; Lc 1.78n  ; voir aussi 2S 7.12 ; Ez 34.23. –  il régnera…  : cf. Es 32.1 ; Mi 5.3. –  équité / justice  : cf. 9.23+ ; 22.13+ ; 2S 8.15 ; Es 9.6.'
  - type: text
    content: Les jours viennent
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: où je susciterai à David un germe juste ;
  - type: text
    content: il régnera en roi et prospérera,
  - type: text
    content: il agira dans le pays selon l'équité et la justice.
  '6':
  - type: text
    content: ' '
  - type: note
    content: sécurité 32.37 ; Dt 33.28. –  Adonaï (pour YHWH  ; cf. Gn 22.14n) / Tsidqénou signifie YHWH est notre justice  ; on peut y voir une allusion au nom de Sédécias, hébreu Tsidqiyahou , « Ma justice, c'est YHWH » ; cf. 9.23+ ; 33.16n  ; Ml 3.20 ; Rm 1.17 ; 10.4 ; 1Co 1.30 ; 2Co 5.21 ; Ph 3.9.
  - type: text
    content: En ses jours, Juda sera sauvé,
  - type: text
    content: Israël demeurera en sécurité ;
  - type: text
    content: 'et voici le nom dont on l''appellera :'
  - type: text
    content: Adonaï-Tsidqénou (« YHWH est notre justice »).
  '7':
  - type: text
    content: ' '
  - type: note
    content: 16.14s.
  - type: text
    content: 'C''est pourquoi les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où on ne dira plus : « Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a fait monter d''Egypte les Israélites ! » '
  '8':
  - type: note
    content: 'du pays du nord 1.14n  ; 3.18 ; Es 43.6. –  je les avais bannis  : LXX il les avait bannis  ; cf. v. 2n. –  sur leur terre 16.15 ; Gn 2.5n.'
  - type: text
    content: 'mais : « Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a fait monter les descendants de la maison d''Israël du pays du nord et de tous les pays où je les avais bannis, et qui les en a ramenés ! » Et ils habiteront sur leur terre.'
  - type: heading
    content: Des prophètes indignes
  '9':
  - type: text
    content: ' '
  - type: note
    content: Aux prophètes 2.8+. – Voir cœur. –  mes os frémissent ou s'affaiblissent Ps 6.3s ; voir aussi Gn 1.2n. –  comme un homme ivre… Es 29.9. –  à cause de ses paroles sacrées ou saintes  ; cf. 5.14+ ; 20.8s ; Dn 10.8.
  - type: text
    content: 'Aux prophètes :'
  - type: text
    content: Mon cœur est brisé au dedans de moi,
  - type: text
    content: tous mes os frémissent ;
  - type: text
    content: je suis comme un homme ivre,
  - type: text
    content: comme quelqu'un qui est emporté par le vin,
  - type: text
    content: 'à cause du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à cause de ses paroles sacrées.'
