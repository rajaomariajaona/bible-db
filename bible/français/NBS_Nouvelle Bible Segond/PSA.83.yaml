document_id: PSA.83,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du peuple menacé par ses voisins
  - type: text
    content: ' '
  - type: note
    content: 73.1+.
  - type: text
    content: Chant. Psaume. D'Asaph.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Madiân Jg 6–8 ; cf. Es 9.3. –  Sisera… Jg 4–5 ; 1S 12.9.
  - type: text
    content: Traite-les comme Madiân,
  - type: text
    content: comme Sisera, comme Yabîn à l'oued Qishôn !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Eïn-Dor  : cf. Jg 7.1. –  du fumier… Jr 8.2 ; 9.21.'
  - type: text
    content: Ils ont été détruits à Eïn-Dor,
  - type: text
    content: ils sont devenus du fumier pour la terre.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Jg 7.25 ; 8.3,5,21.
  - type: text
    content: Traite leurs nobles comme Oreb et Zéeb,
  - type: text
    content: et tous leurs princes comme Zébah et Tsalmounna,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'eux qui disaient  : autre traduction eux qui disent.'
  - type: text
    content: 'eux qui disaient : Prenons possession'
  - type: text
    content: des domaines de Dieu !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'balles de chardons Es 17.13n. –  qu''emporte le vent  : litt. en face du vent  ; cf. 1.4+ ; Es 40.24 ; 41.2 ; Jr 13.24 ; Jb 13.25.'
  - type: text
    content: Mon Dieu, rends-les semblables aux balles de chardons,
  - type: text
    content: au chaume qu'emporte le vent.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les flammes embrasent  : litt. la flamme embrase.'
  - type: text
    content: Comme le feu brûle la forêt,
  - type: text
    content: comme les flammes embrasent les montagnes,
  '16':
  - type: text
    content: ainsi poursuis-les par ta tempête,
  - type: text
    content: épouvante-les par ton ouragan !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Couvre  : litt. remplis. –  mépris ou ignominie Pr 3.35+. –  qu''ils cherchent  : cf. 9.11+.'
  - type: text
    content: Couvre leur face de mépris
  - type: text
    content: 'pour qu''ils cherchent ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: honte 6.11 ; 35.4 ; 40.15. –  qu'ils… disparaissent 2.10-12.
  - type: text
    content: Qu'ils soient saisis de honte et d'épouvante pour toujours,
  - type: text
    content: qu'ils rougissent et disparaissent !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''on sache…  : cf. 46.11 ; 59.14n  ; 68.5n  ; Ex 7.5 ; 2R 19.19 ; Es 42.8 ; Jr 16.21 ; Ez 7.9 ; 39.22 ; Dn 4.29. –  tu es le Très-Haut… 97.9.'
  - type: text
    content: 'Qu''on sache ainsi que, toi seul, dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: tu es le Très-Haut sur toute la terre !
  '2':
  - type: text
    content: ' '
  - type: note
    content: '28.1 ; 35.22 ; 39.13 ; 44.24 ; 50.3 ; Es 64.11 ; cf. 62.6. –  O Dieu / ô Dieu  : hébreu ’Elohim / ’El  ; cf. Gn 1.1n  ; 21.33n. –  silencieux 49.13n.'
  - type: text
    content: O Dieu, ne sois pas silencieux !
  - type: text
    content: Ne te tais pas, ne reste pas tranquille, ô Dieu !
  '3':
  - type: text
    content: ' '
  - type: note
    content: tes ennemis Jg 5.31. –  s'agitent 2.1+ss ; cf. 46.7ss ; Es 17.12 ; 29.8. –  lèvent la tête 110.7.
  - type: text
    content: Car tes ennemis s'agitent,
  - type: text
    content: ceux qui te détestent lèvent la tête.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '31.14 ; Jr 18.18. –  projets secrets 25.14+ ; 64.3. –  ceux que tu protèges  : litt. ceux que tu caches  ; LXX tes saints  ; autres versions anciennes ton trésor  ; cf. Ez 7.22.'
  - type: text
    content: Avec ruse, ils montent contre ton peuple des projets secrets,
  - type: text
    content: ils tiennent conseil contre ceux que tu protèges.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'd''entre les nations  : autre traduction en tant que nation. – Voir nom.'
  - type: text
    content: Venez, disent-ils, faisons-les disparaître d'entre les nations,
  - type: text
    content: qu'on ne se souvienne plus du nom d'Israël !
  '6':
  - type: text
    content: Ils tiennent conseil, d'un même cœur ;
  - type: text
    content: ils concluent une alliance contre toi ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Edom , au sud de la mer Morte (Gn 25.25n  ; 27.39ns ; Nb 20.14ss). –  Ismaélites / Hagarites  : tribus arabes (cf. Hagar, mère d''Ismaël) Gn 16 ; 21 ; 25.12ss ; 1Ch 5.10,19ss ; 27.31. –  Moab et Ammon (v. 8), à l''est de la mer Morte et du Jourdain, sont les fils de Loth (v. 9 ; cf. Gn 19.30ss ; Dt 2.9,19).'
  - type: text
    content: les tentes d'Edom et les Ismaélites,
  - type: text
    content: Moab et les Hagarites,
  '8':
  - type: text
    content: ' '
  - type: note
    content: Guébal , sans doute au sud de la mer Morte, dans la région de Pétra. –  Amalec , peuple nomade au sud d'Israël Gn 14.7n  ; Ex 17.8s ; Dt 25.17ss ; Jg 6.3,33 ; 10.12 ; 1S 15.2. –  Philistins et habitants de Tyr (= Phéniciens), sur la côte méditerranéenne, au sud et au nord ; cf. Jos 13.2.
  - type: text
    content: Guébal, Ammon, Amalec,
  - type: text
    content: les Philistins avec les habitants de Tyr ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'l''Assyrie (hébreu ’ashour ), en Mésopotamie du Nord, à moins qu''il ne s''agisse ici du nom d''une tribu arabe (cf. Gn 25.3,18 ; 2S 2.9). –  elle prête le bras  : litt. ils ont été le bras des fils de Loth (v. 7n) ; autre traduction elle prête main-forte.'
  - type: text
    content: l'Assyrie aussi se joint à eux,
  - type: text
    content: 'elle prête le bras aux fils de Loth. '
  - type: text
    content: Pause.
