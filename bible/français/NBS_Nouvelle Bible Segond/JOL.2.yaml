document_id: JOL.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour du Seigneur est proche
  - type: text
    content: ' '
  - type: note
    content: 'trompe  : cf. v. 15 ; Nb 10.9 ; Jg 3.27 ; 6.34 ; 1S 13.3 ; 2S 2.28 ; Jr 4.5 ; 6.1 ; Ez 33.3ss ; Os 5.8 ; Am 3.6 ; voir aussi Ex 19.16,19 ; Ap 8.6s. –  acclamations  : cf. Jos 6.5 ; Am 1.14 ; So 1.16 ; Ps 27.6+. –  ma montagne sacrée ou sainte 4.17 ; Es 11.9 ; 27.13 ; 56.7 ; Ps 2.6 ; 3.5. –  le jour du Seigneur … 1.15+.'
  - type: text
    content: Sonnez de la trompe en Sion !
  - type: text
    content: Lancez des acclamations dans ma montagne sacrée !
  - type: text
    content: Que tous les habitants du pays tremblent !
  - type: text
    content: 'Car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' vient,'
  - type: text
    content: il est proche.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Devant lui v. 3n. –  la terre…  : cf. 3.4 ; 4.15s ; voir aussi 1S 14.15 ; Es 13.10ss ; Jr 4.28 ; Ez 32.7s ; Am 8.9 ; 9.5 ; Mi 3.6 ; Ps 18.8 ; Mc 13.24/ / ; Ap 6.12s ; 9.2.'
  - type: text
    content: Devant lui, la terre s'agite,
  - type: text
    content: le ciel tremble,
  - type: text
    content: le soleil et la lune s'assombrissent,
  - type: text
    content: les étoiles perdent leur clarté.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur fait retentir sa voix (ou tonne ) : cf. 4.16 ; 2S 22.14 ; Es 30.30 ; 33.3 ; Jr 25.30 ; Am 1.2 ; Ps 18.14 ; 29.3ss ; 46.7 ; 68.34 ; Jb 37.4s ; Hé 12.26. –  son armée  : cf. v. 5,7,25. –  sa troupe  : autre traduction son camp . –  celui qui exécute sa parole  : cf. Ps 148.8. –  jour 1.15+. –  grand / redoutable 3.4 ; Jr 30.7 ; Ml 3.23. –  qui pourra le supporter ? Jr 10.10 ; Ml 3.2 ; Ap 6.17.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait retentir sa voix devant son armée :'
  - type: text
    content: sa troupe est immense,
  - type: text
    content: celui qui exécute sa parole est fort ;
  - type: text
    content: 'car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand,'
  - type: text
    content: 'il est très redoutable :'
  - type: text
    content: qui pourra le supporter ?
  - type: heading
    content: C'est le moment de revenir au Seigneur
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'revenez à moi  : cf. Es 55.7 ; Os 6.1 ; 11.5 ; 14.2 ; Am 4.6ss. –  de tout votre cœur Dt 4.29+ ; 1S 7.3 ; Jr 29.13. –  jeûnes 1.14+ ; Ps 69.11. –  pleurs Jg 20.26 ; Es 22.12 ; Za 7.3 ; Esd 10.1. –  lamentations ou deuil  ; cf. 1.13 ; Gn 23.2 ; 50.10 ; Jr 34.5.'
  - type: text
    content: Maintenant encore
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: revenez à moi de tout votre cœur,
  - type: text
    content: avec des jeûnes, des pleurs et des lamentations !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pas vos vêtements  : cf. Gn 37.29,34 ; 44.13 ; Jg 11.35 ; 2S 1.2,11 ; 3.31 ; 13.19 ; 2R 22.11,19 ; Jr 4.4 ; Jb 2.12 ; Mt 26.65 ; Ac 14.14. –  car il est clément… Ex 34.6 ; Jon 4.2 ; Ps 86.15 ; 103.8 ; 145.8 ; Né 9.17. –  il regrette…  : autre traduction il renonce au mal qu''il voulait faire  ; cf. Ex 32.14 ; 2S 24.16 ; Jr 26.13.'
  - type: text
    content: Ne déchirez pas vos vêtements, mais votre cœur,
  - type: text
    content: 'et revenez au '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ;'
  - type: text
    content: car il est clément et compatissant,
  - type: text
    content: patient et grand par la fidélité,
  - type: text
    content: et il regrette le mal qu'il fait.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Qui sait s'il ne reviendra pas… Jon 3.9 ; cf. Ex 32.14 ; 2S 12.22 ; Jr 18.8 ; Am 7.3. –  bénédiction v. 19ss ; Dt 7.13ss ; 16.10,17 ; 28.1ss. –  offrandes… 1.9+.
  - type: text
    content: Qui sait s'il ne reviendra pas,
  - type: text
    content: s'il n'aura pas de regret,
  - type: text
    content: et s'il ne laissera pas derrière lui une bénédiction
  - type: text
    content: '– des offrandes et des libations pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ?'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1 ; 1.14+ ; voir aussi Es 27.13.
  - type: text
    content: Sonnez de la trompe en Sion !
  - type: text
    content: Consacrez un jeûne,
  - type: text
    content: proclamez une assemblée solennelle !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'consacrez…  : cf. v. 15. –  au sein de leur mère  : litt. aux mamelles . –  le marié…  : cf. Ps 19.6 ; voir aussi Dt 20.7 ; 24.5.'
  - type: text
    content: Réunissez le peuple,
  - type: text
    content: consacrez une assemblée !
  - type: text
    content: Rassemblez les anciens,
  - type: text
    content: réunissez les enfants,
  - type: text
    content: même les nourrissons au sein de leur mère !
  - type: text
    content: Que le marié sorte de sa chambre,
  - type: text
    content: la mariée de sa tente !
  '17':
  - type: text
    content: ' '
  - type: note
    content: entre le vestibule (1R 6.3 ; 7.19) et l'autel des sacrifices, dans la cour du temple ♦ ; cf. 1R 6.36 ; voir aussi Mt 23.35/ /. –  pleurent v. 12+. –  les prêtres… 1.13+. –  peuple / patrimoine 4.2 ; Dt 9.6,29 ; 32.9 ; 1S 10.1 ; 1R 8.51 ; Es 19.25 ; Jr 12.8 ; Ps 28.9 ; cf. Ex 15.17 ; Jr 2.7 ; Ps 79.1. –  aux outrages ou au déshonneur Ez 22.4 ; 36.30 ; Ps 44.14 ; 79.4. –  fable des nations Jr 24.9 ; Ps 44.15. –  Où est leur Dieu ? Mi 7.10 ; Ps 42.4+ ; 79.10 ; cf. Ex 32.11s ; Jr 14.21.
  - type: text
    content: Qu'entre le vestibule et l'autel
  - type: text
    content: pleurent les prêtres,
  - type: text
    content: 'les officiants du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'et qu''ils disent :'
  - type: text
    content: Seigneur
  - type: text
    content: ', épargne ton peuple !'
  - type: text
    content: Ne livre pas ton patrimoine aux outrages,
  - type: text
    content: pour qu'il soit la fable des nations !
  - type: text
    content: 'Pourquoi dirait-on parmi les peuples :'
  - type: text
    content: « Où est leur Dieu ? »
  - type: heading
    content: Le Seigneur répond à son peuple
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'passion jalouse  : cf. Ez 5.13 ; 16.38,42 ; 23.25 ; voir aussi 36.5s ; Za 1.14 ; 8.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est pris d''une passion jalouse pour son pays ;'
  - type: text
    content: il a épargné son peuple.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.10+ ; Os 2.10. –  vin  : autre traduction vin nouveau , même possibilité au v. 24 ; 1.10n. –  aux outrages…  : autre traduction au déshonneur parmi les nations.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a répondu ;'
  - type: text
    content: 'il a dit à son peuple :'
  - type: text
    content: Je vous envoie le blé,
  - type: text
    content: le vin et l'huile,
  - type: text
    content: et vous en serez rassasiés ;
  - type: text
    content: je ne vous livrerai plus aux outrages des nations.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'So 1.15 ; cf. Ex 19.16ss ; Am 5.18,20 ; Ha 3.7ss ; Ps 18.8ss ; Mc 13.24s/ /. –  obscurité et obscurité épaisse traduisent deux mots différents en hébreu. –  il vient  : sous-entendu dans le texte. –  comme l''aurore  : certains modifient la vocalisation traditionnelle pour lire comme de la suie  ; cf. Ex 10.15 ; Lm 4.8. –  un peuple  : cf. 1.6+. –  tel qu''il n''y en a… 1.2+ ; Ex 10.14 ; Mt 24.21/ / ; Ap 16.18. –  dans toutes les générations à venir ou jusqu''aux générations les plus lointaines , litt. jusqu''aux années de génération et génération.'
  - type: text
    content: Jour de ténèbres et d'obscurité,
  - type: text
    content: jour de nuée et d'obscurité épaisse,
  - type: text
    content: il vient comme l'aurore qui se déploie sur les montagnes.
  - type: text
    content: C'est un peuple nombreux et fort,
  - type: text
    content: tel qu'il n'y en a jamais eu
  - type: text
    content: et qu'il n'y en aura plus
  - type: text
    content: dans toutes les générations à venir.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui vient du nord  : litt. le nordique Jr 1.14n  ; voir aussi Es 14.13 ; Ez 38.6 ; Ps 48.3. –  avant-garde / arrière-garde  : litt. face / fin . –  mer orientale / mer occidentale , respectivement mers Morte et Méditerranée (Za 14.8). –  infection / puanteur Es 34.3 ; Am 4.10. –  il fait ou il a fait  ; il s''agit ou bien de l''envahisseur, ou bien du Seigneur  : cf. v. 21 ; Ps 126.3.'
  - type: text
    content: J'éloignerai de vous celui qui vient du nord,
  - type: text
    content: je le bannirai vers une terre desséchée et dévastée,
  - type: text
    content: son avant-garde vers la mer orientale,
  - type: text
    content: et son arrière-garde vers la mer occidentale ;
  - type: text
    content: sa puanteur s'élèvera,
  - type: text
    content: son infection s'élèvera,
  - type: text
    content: car il fait de grandes choses.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Terre  : le mot hébreu, habituellement traduit par sol , désigne la terre arable (cf. Gn 2.5n). –  n''aie pas peur 1Ch 28.20+.'
  - type: text
    content: Terre, n'aie pas peur,
  - type: text
    content: sois dans l'allégresse et réjouis-toi,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait de grandes choses !'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.7,12,19s.
  - type: text
    content: Bêtes de la campagne, n'ayez pas peur,
  - type: text
    content: car les pâturages du désert reverdissent,
  - type: text
    content: car les arbres portent du fruit,
  - type: text
    content: le figuier et la vigne donnent leur richesse.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Sion Ps 149.2 ; Lm 4.2. –  réjouissez-vous dans le Seigneur Ps 32.11+. –  pluie d''automne (même terme en Ps 84.7 ; cf. Dt 11.14+) salutaire (litt. pour la justice , c.-à-d. comme il convient ) : cf. Os 6.3 ; Jc 5.7 ; certaines versions anciennes ont lu le maître de justice , titre qui sera en honneur dans la communauté de Qumrân (homonymie en hébreu, cf. Es 30.20 ton Maître ). –  comme par le passé  : texte incertain ; la traduction s''appuie sur un ms hébreu et des versions anciennes.'
  - type: text
    content: Et vous, fils de Sion, soyez dans l'allégresse
  - type: text
    content: 'et réjouissez-vous dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu,'
  - type: text
    content: car il vous donne la pluie d'automne salutaire,
  - type: text
    content: 'il fait descendre l''averse pour vous :'
  - type: text
    content: pluie d'automne et pluie de printemps, comme par le passé.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.10 ; 4.13 ; Pr 3.10.
  - type: text
    content: Les aires se rempliront de blé,
  - type: text
    content: et les cuves regorgeront de vin et d'huile.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 1.4n. –  ma grande armée v. 11+.
  - type: text
    content: Je compenserai pour vous les années
  - type: text
    content: qu'ont dévorées la sauterelle,
  - type: text
    content: le grillon, le criquet et la chenille,
  - type: text
    content: ma grande armée que j'avais envoyée contre vous.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Vous mangerez… Dt 8.10 ; Es 23.18. – Voir nom. –  qui a agi… Es 25.1 ; Ps 86.10.
  - type: text
    content: Vous mangerez,
  - type: text
    content: vous serez rassasiés
  - type: text
    content: 'et vous louerez le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu,'
  - type: text
    content: 'qui a agi envers vous de façon étonnante :'
  - type: text
    content: plus jamais mon peuple n'aura honte.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'je suis au sein d''Israël Ex 8.18 ; Nb 11.20 ; 14.14 ; Dt 7.21 ; 31.17 ; Es 12.6 ; Ez 37.28 ; 48.35 ; So 3.15. –  que je suis le Seigneur …  : autre traduction que c''est moi, le Seigneur (YHWH), qui suis votre Dieu  ; cf. 4.17 ; Ex 16.12 ; Ez 6.7,10,13s etc. –  pas d''autre Dt 4.35,39 ; 1R 8.60 ; Es 45.5s,14,18,21ss ; 46.9 ; Os 13.4.'
  - type: text
    content: Ainsi vous saurez que je suis au sein d'Israël,
  - type: text
    content: 'que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu,'
  - type: text
    content: 'et qu''il n''y en a pas d''autre :'
  - type: text
    content: plus jamais mon peuple n'aura honte.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Devant lui v. 6,10 ; il s''agit du jour du Seigneur (v. 1s) ou du fléau qui l''annonce. –  feu 1.19+. –  des flammes  : litt. une flamme . –  Eden Gn 2.8-15 ; 13.10 ; Es 51.3 ; Ez 28.13 ; 31.8s,16,18 ; 36.35. –  désert (1.4,7 ; cf. Ex 10.15) / lieu dévasté 4.19 ; Jr 12.10.'
  - type: text
    content: Devant lui, un feu dévorant ;
  - type: text
    content: derrière lui, des flammes brûlantes ;
  - type: text
    content: le pays est devant lui comme un jardin d'Eden,
  - type: text
    content: et derrière lui c'est un désert, un lieu dévasté ;
  - type: text
    content: rien ne lui échappe !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'On dirait…  : litt. son aspect (est) comme l''aspect des chevaux , formule analogue au v. 5 ( comme le bruit ) ; cf. 1.4nss ; Na 2.5 ; Ap 9.7ss. –  attelages  : autre traduction coursiers Ez 26.7n,10 ; Os 1.7n.'
  - type: text
    content: On dirait des chevaux,
  - type: text
    content: ils courent comme des attelages.
  '5':
  - type: text
    content: ' '
  - type: note
    content: bondissent Na 3.2. –  des flammes (litt. de la flamme du feu ) qui dévorent le chaume 1.19+ ; Es 5.24. –  rangé en ordre de bataille v. 11.
  - type: text
    content: On dirait un bruit de chars
  - type: text
    content: qui bondissent sur le sommet des montagnes.
  - type: text
    content: On dirait le bruit des flammes
  - type: text
    content: qui dévorent le chaume.
  - type: text
    content: On dirait un peuple fort
  - type: text
    content: rangé en ordre de bataille.
  '6':
  - type: text
    content: ' '
  - type: note
    content: pâlissent ou perdent leur éclat , cf. v. 10 (autre expression) ; 4.15 ; Na 2.11 ; certains comprennent au contraire rougissent , cf. Es 13.8.
  - type: text
    content: A sa vue, les peuples tremblent,
  - type: text
    content: tous les visages pâlissent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Pr 30.27. –  des héros  : autres traductions des guerriers ; de vaillants hommes  ; cf. 4.9,11. –  ils ne quittent pas leur route  : autre traduction ils n''emmêlent pas leurs routes.'
  - type: text
    content: Ils courent comme des héros,
  - type: text
    content: ils escaladent une muraille comme des hommes de guerre ;
  - type: text
    content: chacun va son chemin,
  - type: text
    content: ils ne quittent pas leur route.
  '8':
  - type: text
    content: Personne ne bouscule son voisin,
  - type: text
    content: chacun suit sa propre route ;
  - type: text
    content: ils se ruent au travers des projectiles
  - type: text
    content: sans rompre les rangs.
  '9':
  - type: text
    content: Ils fondent sur la ville,
  - type: text
    content: courent sur la muraille,
  - type: text
    content: escaladent les maisons,
  - type: text
    content: entrent par les fenêtres comme un voleur.
