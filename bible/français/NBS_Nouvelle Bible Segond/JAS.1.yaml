        text: '18.15,18 : « Mon fils, fais le bien sans y joindre le blâme, ni mêler à tes dons des paroles chagrines… L''insensé fait un reproche dépourvu de tact, le don de l''envieux brûle les yeux. » 20.15 « (L''insensé) donne peu et fait beaucoup d''affronts, il ouvre grande la bouche comme un crieur public. Il prête aujourd''hui quelque chose et demain le réclame : un tel homme est odieux ! » 41.22 : « Aie honte de faire affront à des amis par des paroles – après avoir donné, ne fais pas affront. »'
    marker-yv: yv-n
  - type: text
    text: 'Si l''un d''entre vous manque de sagesse, qu''il la demande à Dieu qui donne à tous généreusement et sans faire de reproche, et elle lui sera donnée. '
