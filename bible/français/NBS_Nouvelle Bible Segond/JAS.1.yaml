document_id: JAS.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Jacques  : en grec Iakôbos , transcription du nom hébreu Jacob ; cf. Mc 6.3/ / ; Ac 12.17+ ; 15.13ss ; 21.18 ; 1Co 15.7 ; Ga 1.19 ; 2.9,12. –  esclave  : autre traduction serviteur  ; Rm 1.1+ ; Jd 1+ ; Ap 1.1 ; cf. Gn 32.11 ; Es 41.8 ; 48.20. –  de Dieu…  : on pourrait aussi traduire du Dieu et Seigneur Jésus-Christ , cf. v. 27 ; 2.1 ; 3.9n  ; 5.14s ; Jn 20.29. –  Christ  : voir onction. –  aux douze tribus  : l''auteur s''adresse, ou bien à des chrétiens d''origine juive, ou bien à l''ensemble des chrétiens, indépendamment de leur origine, mais considérés comme formant un peuple nouveau comparable aux douze tribus d''Israël (cf. Ga 6.16n) ; voir aussi Mt 19.28 ; Ac 26.7 ; Ap 7.4ss ; 21.12. –  dispersion  : grec diaspora , terme désignant habituellement la communauté juive hors du pays de ses ancêtres ; voir « La diaspora ou les Juifs hors de leur pays »♦ ; Jn 7.35n  ; 1P 1.1n. –  bonjour ! litt. se réjouir , cf. v. 2 ; voir Ac 15.23n.'
  - type: text
    content: Jacques, esclave de Dieu et du Seigneur Jésus-Christ, aux douze tribus dans la dispersion, bonjour !
  - type: heading
    content: Epreuves, endurance, accomplissement
  '10':
  - type: note
    content: 'le riche  : cf. 5.1ss ; voir aussi 2.1ss ; 4.13ss ; 1Tm 6.17. –  abaissement ou humiliation Lc 1.48 ; Ac 8.33 ; Ph 3.21. –  comme la fleur de l''herbe Es 40.6ss ; cf. Es 28.1 ; 37.27 ; 51.12 ; Ps 37.2 ; 90.5s ; 102.5,12 ; 103.15s ; Jb 14.2 ; 15.30ss ; 1P 1.24.'
  - type: text
    content: 'et le riche, au contraire, dans son abaissement, car il passera comme la fleur de l''herbe. '
  '11':
  - type: note
    content: 'Cf. v. 2ss ; Mc 4.6/ /. –  sa chaleur ardente  : autre traduction le vent du sud. –  a disparu  : litt. a péri ou s''est perdue. –  se flétrira  : cf. v. 4n. –  ses entreprises  : litt. ses voies, ses chemins  ; cf. 4.13.'
  - type: text
    content: Le soleil s'est levé avec sa chaleur ardente ; il a desséché l'herbe, sa fleur est tombée et la beauté de son aspect a disparu. Ainsi le riche se flétrira dans ses entreprises.
  - type: heading
    content: Les épreuves
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux v. 25 ; 5.11 ; Ps 1.1+ ; Dn 12.12 ; Mt 5.3ss,10ss ; 1P 3.14 ; 4.14 ; Ap 1.3+ ; 14.13 ; 16.15. –  endure v. 3n. –  l''épreuve v. 2nss. –  éprouvé  : autres traductions éprouvé avec succès ; éprouvé et approuvé  ; le terme correspondant est apparenté à celui qui est traduit par épreuve au v. 3n  ; cf. Rm 5.4. –  couronne de la vie  : cf. 1Co 9.25+ ; voir aussi Ps 21.4s ; 2Tm 4.8 ; 1P 5.4 ; Ap 2.10n. –  qu''il a promise  : certains mss précisent que le Seigneur a promise , d''autres que Dieu a promise . –  à ceux qui l''aiment 2.5 ; Dt 7.9 ; Rm 8.28+ ; 1Co 2.9. – Cf. Evangile selon Thomas 58 : « Heureux l''homme qui a souffert : il a trouvé la vie. »'
  - type: text
    content: Heureux l'homme qui endure l'épreuve ! En effet, après avoir été éprouvé, celui-là recevra la couronne de la vie qu'il a promise à ceux qui l'aiment.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Que personne…  : sur ce procédé rhétorique, cf. 2.3,14,18. –  mis à l''épreuve ou tenté , même possibilité dans la suite ; cf. v. 2n  ; voir aussi 2.20ss ; 5.7ss. –  C''est Dieu…  : cf. Gn 3.12s ; Pr 19.3. –  par le mal  : litt. par les choses mauvaises  ; cf. v. 17 ; voir aussi Ex 17.2,7 ; Nb 14.22 ; Dt 6.16 ; Es 7.12. –  ne met personne à l''épreuve ou ne tente personne  ; comparer avec Gn 22.1 ; Ex 15.25 ; Dt 8.2s ; 13.4 ; 33.8 ; 2S 24.1/ / ; 1Ch 21.1 ; Mt 6.13/ / ; 1Co 7.5 ; 10.13 ; 1Th 3.5 ; Judith 8.25 « Rendons grâces au Seigneur notre Dieu, qui nous éprouve comme nos pères. » Siracide 15.11ss : « Ne dis pas : “C''est à cause du Seigneur que je me suis écarté”, car ce qu''il déteste, il ne le fait pas. Ne dis pas : “Lui-même m''a égaré”, car il n''a que faire du pécheur… Il n''a prescrit à personne d''être impie, il n''a accordé à personne licence de pécher. »'
  - type: text
    content: 'Que personne, lorsqu''il est mis à l''épreuve, ne dise : « C''est Dieu qui me met à l''épreuve. » Car Dieu ne peut être mis à l''épreuve par le mal, et lui-même ne met personne à l''épreuve. '
  '14':
  - type: note
    content: 'Cf. v. 3s. –  son propre désir  : cf. 4.1s,7 ; Rm 7.7ss ; 1Jn 2.16s ; cf. 1 Hénoch 98.4 : « Le péché n''a pas été envoyé (d''en haut) sur la terre, mais ce sont les hommes qui l''ont établi d''eux-mêmes. » –  le séduit  : même verbe 2P 2.14,18.'
  - type: text
    content: 'Mais chacun est mis à l''épreuve par son propre désir, qui l''attire et le séduit. '
  '15':
  - type: note
    content: 'Cf. Rm 7.5,10. –  fait naître  : le verbe grec correspondant n''apparaît qu''ici et au v. 18. Il évoque l''image de l''accouchement, ce qui convient ici pour les termes grecs traduits par désir et péché (2.9 ; 4.17 ; 5.15s,20), qui sont du féminin. –  la mort 5.20 ; cf. Gn 3.20n  ; voir aussi Rm 5.12 ; 6.23 ; 7.13 ; Ga 6.7s.'
  - type: text
    content: Puis le désir, lorsqu'il a conçu, met au monde le péché ; et le péché, parvenu à son terme, fait naître la mort.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ne vous égarez pas ou ne vous laissez pas égarer 5.19 ; 1Co 6.9n.
  - type: text
    content: 'Ne vous égarez pas, mes frères bien-aimés : '
  '17':
  - type: note
    content: 'don excellent  : cf. Mt 7.11/ /. –  présent Rm 5.16n. –  d''en haut 3.15,17 ; Jn 3.3n. –  des lumières  : l''expression désigne probablement les astres ou « luminaires » du ciel, dont le Père (v. 27 ; 3.9) est le créateur ; cf. Gn 1.3ss,14nss ; Ps 136.7 ; voir aussi Jb 38.28,31ss ; Vie grecque d''Adam et Eve 36.3 : « Ils (le soleil et la lune) ne peuvent pas briller devant la lumière de l''univers, le Père des lumières, et c''est pourquoi leur lumière s''est éclipsée. » –  chez qui  : autre traduction devant qui. –  ni changement…  : les mss divergent sur l''ordre des mots et la relation à établir entre eux à la fin du v. –  ni éclipse  : litt. ni ombre de variation, c.-à-d. ni ombre due aux variations (comme celles qui résultent du mouvement des astres et font varier leur lumière) ; cf. v. 13 ; 1Jn 1.5.'
  - type: text
    content: 'tout don excellent, tout présent parfait, vient d''en haut ; il descend du Père des lumières, chez qui il n''y a ni changement ni éclipse. '
  '18':
  - type: note
    content: 'fait naître (v. 15n) par une parole (cf. v. 21ss) de vérité (3.14 ; 5.19 ; Ps 119.43 ; 2Co 6.7 ; Ep 1.13 ; Col 1.5 ; 2Tm 2.15 ; cf. Jn 17.17) : voir Gn 1.3+ ; Jn 1.13 ; 1P 1.23+ss. –  les prémices  : cf. Ex 23.16,19 ; 34.22 ; Lv 27.26 ; Nb 18.12 ; Dt 14.23 ; 15.19ss ; voir aussi Jr 2.3 ; Rm 11.16 ; 16.5 ; 1Co 16.15 ; Ap 14.4. –  ses créatures  : cf. Ap 5.13 ; voir aussi Rm 8.19ss ; 2Co 5.17 ; Ga 6.15 ; Ep 2.10 ; 4.24.'
  - type: text
    content: Parce qu'il en a décidé ainsi, il nous a fait naître par une parole de vérité, pour que nous soyons en quelque sorte les prémices de ses créatures.
  - type: heading
    content: Ecouter ne suffit pas
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Sachez-le  : autre traduction  : vous (le) savez, mes frères (v. 2+) … cependant, que chacun… ou, d''après certains mss  : ainsi donc, mes frères, que chacun… –  prompt…  : cf. v. 26 ; 3.1ss ; Pr 10.19 ; 13.3 ; 16.2 ; 17.28 ; 29.20 ; Ec 5.1 ; 9.17 ; Siracide 5.11 : « Sois prompt à écouter, mais lent à donner ta réponse. » –  lent à la colère , c.-à-d. patient  ; cf. Ex 34.6+ ; voir aussi Pr 15.1 ; Ec 7.9 ; Ep 4.26,31 ; Col 3.8 ; cf. Mt 5.22.'
  - type: text
    content: 'Sachez-le, mes frères bien-aimés : que chacun soit prompt à écouter, lent à parler, lent à la colère, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Mes frères v. 16,19 ; 2.1,5,14 ; 3.1,10,12 ; 4.11n  ; 5.12,19. –  épreuves  : autre traduction tentations , même possibilité v. 12nss ; cf. Gn 22.1 ; Ex 16.4 ; Dt 8.2,16 ; Jg 2.22 ; 3.4 ; Mt 4.1nss/ / ; 6.13/ / ; Lc 8.13 ; 22.28 ; 1Co 7.5 ; 1Tm 6.9 ; Hé 11.37n  ; 1P 1.6 ; 4.12 ; voir aussi Jb 1–2 ; Siracide 2.1 : « Mon fils, si tu aspires à servir le Seigneur, prépare ton cœur à l''épreuve. » –  que vous pouvez rencontrer  : litt. dans lesquelles vous pouvez tomber , cf. Lc 10.30.'
  - type: text
    content: 'Mes frères, considérez comme un sujet de joie complète les diverses épreuves que vous pouvez rencontrer, '
  '20':
  - type: note
    content: 'la justice de Dieu  : cf. 2.21ss ; 3.18 ; Mt 3.15 ; 5.6,10,20 ; 6.1,33 ; 21.32 ; voir aussi Rm 1.16+s ; 3.21ss.'
  - type: text
    content: 'car la colère de l''homme n''accomplit pas la justice de Dieu. '
  '21':
  - type: note
    content: 'rejetant… Col 3.8+ ; 1P 2.1. –  saleté ou souillure  ; un terme apparenté est traduit par sale en 2.2 ; cf. 1P 3.21. –  débordement, le même terme est traduit par abondance en Rm 5.17 ; on a aussi compris tout reste de malfaisance, ou encore la malfaisance qui abonde (autour de vous). –  accueillez… la Parole 1Co 2.14 ; cf. Ac 8.14+ ; 1Th 1.6 ; 2.13 ; Hé 13.22 ; voir aussi Dt 30.1 ; Za 1.6 ; Pr 1.3 ; 2.1 ; 4.10. –  douceur 3.13 ; cf. Mt 5.5n  ; 1P 3.4,16 ; Siracide 3.17 : « Agis avec douceur dans tout ce que tu fais. » –  plantée  : cf. Mc 4.1-20/ / ; 1Co 3.6 ; 1P 1.22ss ; voir aussi Rm 6.5 ; cf. 4 Esdras 8.6 : « Ensemence nos cœurs et cultive notre intelligence, afin qu''ils portent du fruit. » –  vous sauver  : autre traduction sauver vos âmes  ; cf. 2.14 ; 4.12 ; 5.15,20.'
  - type: text
    content: Aussi, rejetant toute saleté et tout débordement de malfaisance, accueillez avec douceur la Parole, qui a été plantée en vous et qui peut vous sauver.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Mettez…  : litt. devenez des faiseurs (de même 4.11 qui met en pratique ) de la parole, et pas seulement des auditeurs , de même dans la suite ; 2.14ss ; cf. Ex 24.3 ; Dt 15.5 ; 30.8ss ; Jos 22.5 ; Ez 33.32 ; Né 9.34 ; Mt 7.21-27 ; Lc 8.21 ; 11.28 ; 12.47 ; Jn 4.34 ; 7.17 ; 9.31 ; 15.14 ; Rm 2.13 ; 1Jn 3.18. –  en vous abusant… v. 26 ; même verbe Col 2.4.'
  - type: text
    content: 'Mettez la Parole en pratique ; ne vous contentez pas de l''écouter, en vous abusant vous-mêmes. '
  '23':
  - type: note
    content: 'miroir 1Co 13.12. –  son visage naturel  : litt. la face de sa naissance (cf. 3.6n).'
  - type: text
    content: 'En effet, si quelqu''un écoute la Parole et ne la met pas en pratique, il est semblable à un homme qui regarde dans un miroir son visage naturel '
  '24':
  - type: text
    content: 'et qui, après s''être regardé, s''en va et oublie aussitôt comment il était. '
  '25':
  - type: note
    content: 'qui a plongé les regards 1P 1.12. –  loi parfaite (ou accomplie) : cf. 2.8 ; 4.11 ; Ps 19.8 ; cf. Rm 12.2. –  la loi de la liberté  : litt. celle de la liberté 2.12 ; cf. Rm 3.27 ; 8.2 ; 13.10 ; 1Co 9.21 ; Ga 5.1,13 ; 6.2 ; 1P 2.16 ; voir aussi Mc 12.28ss. –  non pas…  : litt. en devenant non un auditeur oublieux mais un faiseur d''œuvre, cf. 2.14ss ; voir aussi Lc 10.37. –  heureux… v. 12+ ; cf. Dt 28.47 ; Ps 1.2 ; 40.8 ; 54.6 ; 119.32,45,97 ; Jn 13.17. –  sa pratique  : litt. son faire.'
  - type: text
    content: Mais celui qui a plongé les regards dans la loi parfaite, la loi de la liberté, et qui y demeure, non pas en écoutant pour oublier, mais en mettant en pratique, – en faisant œuvre – celui-là sera heureux dans sa pratique même.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'se considère comme ou pense être  ; formule analogue en Mt 3.9 ; Jn 5.39 ; 1Co 3.18 ; 10.12 ; Ga 6.3. –  homme religieux ou personne religieuse  : un terme apparenté est traduit par religion dans la suite et en Ac 26.5 ; Col 2.18,23 ( culte ). –  ne tient pas sa langue en bride v. 19+ ; 3.2 ; Ps 34.14 ; 39.2 ; 141.3 ; 1P 3.10. –  qu''il se trompe lui-même  : litt. qu''il trompe son cœur  ; cf. v. 22+. –  futile  : cf. 2.14-20 ; Jr 2.5 ; 8.19n  ; Ac 14.15 ; 1P 1.18.'
  - type: text
    content: 'Si quelqu''un se considère comme un homme religieux alors qu''il ne tient pas sa langue en bride, mais qu''il se trompe lui-même, sa religion est futile. '
  '27':
  - type: note
    content: 'Cf. Rm 12.1ss ; 1P 2.4ss ; voir aussi Es 1.10ss ; 58.6s ; Mi 6.6ss ; Za 7.4ss. –  pure et sans souillure 4.8 ; 2P 3.14 ; cf. 1Tm 6.14 ; Hé 7.26 ; 1P 1.4 ; voir aussi Mc 7.1ss ; 12.40. –  Dieu et Père  : cf. v. 1n  ; 3.9n  ; voir aussi Ps 68.6 ; 1Co 15.24 ; Ep 5.20 ; 1Th 3.11,13. –  prendre soin  : le verbe grec signifie aussi visiter, cf. Mt 25.31ss. –  orphelins / veuves Dt 10.18+ ; Es 1.17,23 ; Jr 5.28 ; Ez 22.7 ; Za 7.10 ; Ps 10.14,18 ; 68.5 ; 94.6 ; 146.9 ; Pr 23.10. –  détresse Mt 24.9n  ; 2Co 1.4n. –  se garder  : certains mss portent les garder, cf. Jn 17.15 ; 1Tm 5.22. –  monde 2.5 ; 3.6 ; 4.4 ; cf. Jn 14–17 ; Ep 2.2 ; Tt 2.11 ; 2P 1.4 ; 2.20 ; 1Jn 2.14ss.'
  - type: text
    content: La religion pure et sans souillure devant celui qui est Dieu et Père consiste à prendre soin des orphelins et des veuves dans leur détresse, et à se garder de toute tache du monde.
  '3':
  - type: note
    content: 'Cf. Rm 5.3s ; 1P 1.7 ; 4.13. –  l''épreuve  : le terme n''est pas apparenté à celui du v. 2 (voir aussi v. 12n) ; il est employé en 1P 1.7 au sens de qualité éprouvée  ; un terme apparenté est traduit par fidélité éprouvée en Rm 5.4. –  l''endurance ou la persévérance v. 12 ; 5.11 ; Lc 8.15 ; 21.19 ; Rm 2.7 ; 5.3s ; 15.4s ; 2Co 1.6 ; 6.4 ; Col 1.11 ; 1Th 1.3 ; 2Th 3.5 ; 1Tm 6.11 ; 2Tm 3.10 ; Tt 2.2 ; Hé 10.36 ; 2P 1.6 ; Ap 1.9+ ; 4 Maccabées 1.11 : « (Les juifs suppliciés par Antiochos IV ont gagné l''admiration de tous) par leur courage et leur persévérance… ils ont vaincu le tyran par leur persévérance. » 17.12 : « (La vertu) a approuvé (verbe apparenté au terme traduit ici par épreuve) la victoire de la persévérance. » Testament de Joseph 2.7 : « Par dix tentations, il me mit à l''épreuve, et, dans toutes ces tentations, je montrai ma patience, car la patience est un puissant remède, et l''endurance produit de grands biens. »'
  - type: text
    content: 'sachant que l''épreuve de votre foi produit l''endurance. '
  '4':
  - type: note
    content: 'accomplisse son œuvre  : litt. ait une œuvre accomplie ou parfaite, cf. v. 17,25 ; 2.22 ; 3.2 ; Mt 5.17-20,43-48 ; 19.21 ; Ep 4.13 ; Col 1.28 ; 4.12 ; Hé 5.14 ; 1P 1.19. –  parfaits à tous égards  : le terme grec correspondant n''apparaît qu''ici et en 1Th 5.23 (tout votre être).'
  - type: text
    content: Or il faut que l'endurance accomplisse son œuvre pour que vous soyez accomplis et parfaits à tous égards, et qu'il ne vous manque rien.
  - type: heading
    content: Prier pour la sagesse
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Si l''un… 2.15s ; 5.13. –  sagesse 3.13ss ; Pr 1.2ss ; 2Ch 1.10ss ; Mt 5.3 ; 11.19/ / ; 12.42 ; Lc 11.49 ; 1Co 1.18ss ; Ep 1.8 ; cf. Sagesse 7.7 (paroles de Salomon) : « J''ai imploré et l''esprit de la Sagesse est venu en moi. » –  qu''il la demande…  : autre traduction qu''il demande… et il lui sera donné , même possibilité dans la suite ; cf. 4.2s ; Ps 2.8 ; Pr 2.3ss ; Mt 7.7/ / ; 17.20/ / ; Jn 14.13s ; 15.7 ; 16.23. –  à Dieu qui donne Ps 51.8 ; Jb 28 ; Pr 8.22ss ; cf. Sagesse 8.21 : « Je savais que je n''obtiendrais pas la sagesse autrement que par un don de Dieu. » 9.17 : « Ta volonté (de Dieu), qui donc l''aurait connue, si tu n''avais donné toi-même la Sagesse… ? » Siracide 1.1 : « Toute sagesse vient du Seigneur. » 39.6 : « Si le Seigneur Grand le veut, il (le scribe) sera rempli de l''esprit d''intelligence. Il fera pleuvoir les paroles de sa sagesse… » –  généreusement  : litt. simplement (comparer avec le v. 8n) ; Mt 6.22n  ; Rm 12.8 ; 2Co 8.2 ; 9.11,13 ; 11.3 ; Ep 6.5 ; Col 3.22. –  sans faire de reproche  : cf. Siracide 18.15,18 : « Mon fils, fais le bien sans y joindre le blâme, ni mêler à tes dons des paroles chagrines… L''insensé fait un reproche dépourvu de tact, le don de l''envieux brûle les yeux. » 20.15 « (L''insensé) donne peu et fait beaucoup d''affronts, il ouvre grande la bouche comme un crieur public. Il prête aujourd''hui quelque chose et demain le réclame : un tel homme est odieux ! » 41.22 : « Aie honte de faire affront à des amis par des paroles – après avoir donné, ne fais pas affront. »'
  - type: text
    content: 'Si l''un d''entre vous manque de sagesse, qu''il la demande à Dieu qui donne à tous généreusement et sans faire de reproche, et elle lui sera donnée. '
  '6':
  - type: note
    content: 'sans la moindre hésitation ou sans le moindre doute  ; cf. 2.4n  ; voir aussi Mc 11.23s/ / ; Ac 10.20 ; 11.2,12 ; Rm 4.20 ; 14.23 ; Jd 22. –  semblable au flot  : cf. Es 54.11 ; 57.20 ; Ep 4.14 ; Jd 13 ; cf. Siracide 33.2 : « L''hypocrite… est comme un vaisseau dans la tourmente. »'
  - type: text
    content: 'Mais qu''il la demande avec foi, sans la moindre hésitation ; car celui qui hésite est semblable au flot de la mer que le vent agite et soulève. '
  '7':
  - type: text
    content: 'Qu''un tel homme ne s''imagine pas recevoir quoi que ce soit du Seigneur : '
  '8':
  - type: note
    content: 'à l''âme partagée ou double, de même en 4.8 ; cf. Ps 12.3 ; 1Tm 3.8n  ; Siracide 2.12s : « Malheur aux cœurs lâches et aux mains sans courage, au pécheur qui chemine sur deux routes. Malheur au cœur sans courage, qui n''a pas confiance, pour cela il ne sera pas protégé. » –  inconstant  : cf. 3.8n  ; mot apparenté en 3.16 (désordre) ; cf. Es 54.11. –  dans toutes ses voies Jr 16.17 ; Ps 91.11 ; 145.17 ; Pr 3.6.'
  - type: text
    content: c'est un homme à l'âme partagée, inconstant dans toutes ses voies.
  - type: heading
    content: Le pauvre et le riche
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.5 ; 4.13–5.6 ; 1Co 1.26ss ; 11.21s ; Ga 2.9s. –  basse ou humble  ; un terme apparenté est traduit par abaissement au v. 10 ; cf. 4.6,10 ; Es 11.4 ; 2Co 7.6 ; 10.1 ; 1P 5.5. –  fierté  : cf. 3.14 ; 4.16 ; 1S 2.10 ; Jr 9.22s ; Rm 5.2s,11 ; 1Co 1.31 ; 2Co 10.17s ; 12.9s. –  son élévation  : cf. Lc 1.52.'
  - type: text
    content: 'Que le frère de basse condition mette sa fierté dans son élévation, '
