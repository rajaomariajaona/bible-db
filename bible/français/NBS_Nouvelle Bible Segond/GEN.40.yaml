document_id: GEN.40,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'échanson / panetier  : hauts fonctionnaires de la cour, chargés de l''approvisionnement de la table royale et peut-être aussi de l''économie du royaume (cf. Né 1.11n). –  péchèrent contre  : autre traduction manquèrent à leurs devoirs envers  ; cf. 41.9ns.'
  - type: text
    content: 'Après cela, l''échanson du roi d''Egypte et le panetier péchèrent contre leur maître, le roi d''Egypte. '
  '10':
  - type: text
    content: 'Ce cep avait trois sarments. Il a bourgeonné, ses fleurs ont poussé, et ses grappes ont donné des raisins mûrs. '
  '11':
  - type: note
    content: Cf. Né 2.1.
  - type: text
    content: 'La coupe du pharaon était dans ma main. J''ai pris les raisins, je les ai pressés dans la coupe du pharaon, et j''ai mis la coupe dans la main du pharaon. '
  '12':
  - type: text
    content: 'Joseph lui dit : Voici l''interprétation : les trois sarments sont trois jours. '
  '13':
  - type: note
    content: 'élèvera ta tête  : prise en bonne part, cette expression peut signifier honorer ou gracier (cf. v. 20s ; 4.7n  ; 2R 25.27n/ / ; voir aussi Za 2.4 ; Jb 10.15) ; mais elle peut aussi être prise en mauvaise part, cf. v. 19n.'
  - type: text
    content: 'Encore trois jours, et le pharaon élèvera ta tête et te rétablira dans ta charge ; tu mettras la coupe du pharaon dans sa main, comme tu le faisais d''habitude, lorsque tu étais son échanson. '
  '14':
  - type: note
    content: V. 23 ; 41.9-13. –  souviens-toi et évoque mon cas traduisent le même verbe hébreu, à deux formes différentes ; cf. 41.9.
  - type: text
    content: 'Seulement, quand tout ira bien pour toi, souviens-toi de moi et agis avec fidélité envers moi, je t''en prie ; évoque mon cas auprès du pharaon et fais-moi sortir de cette maison. '
  '15':
  - type: note
    content: 'enlevé  : litt. volé  ; le verbe hébreu est à une forme intensive qui peut suggérer l''idée de violence. Cf. 37.28n  ; Dn 1.3ss. –  cachot  : le même mot hébreu (également en 41.14) a été traduit par citerne en 37.22,29. Cf. 39.20n.'
  - type: text
    content: Car j'ai été enlevé du pays des Hébreux, et je n'ai rien fait ici pour qu'on me mette au cachot.
  '16':
  - type: text
    content: ' '
  - type: note
    content: de pain blanc ou de gâteaux  ; on hésite sur le sens exact du mot hébreu ainsi rendu. Certains traduisent (corbeilles) tressées, (corbeilles) de vannerie.
  - type: text
    content: 'Le grand panetier, voyant que c''était une interprétation favorable, dit à Joseph : Dans mon rêve à moi, il y avait trois corbeilles de pain blanc sur ma tête. '
  '17':
  - type: note
    content: 'toutes sortes de pains…  : litt. de toute la nourriture de Pharaon œuvre de panetier.'
  - type: text
    content: 'Dans la corbeille la plus élevée il y avait toutes sortes de pains et de gâteaux pour le pharaon. Les oiseaux venaient manger dans la corbeille au-dessus de ma tête. '
  '18':
  - type: text
    content: 'Joseph répondit : Voici l''interprétation : les trois corbeilles sont trois jours. '
  '19':
  - type: note
    content: 'élèvera v. 13n. –  à un bois ou à un arbre. On comprend généralement que le grand panetier doit être pendu ou empalé ; certains comprennent qu''il doit être décapité, son corps étant ensuite exposé sur le bois. Cf. v. 22 ; voir aussi Dt 21.22 ; 2S 4.12 ; 21.9-14. –  mangeront ta chair  : litt. mangeront la chair de dessus toi.'
  - type: text
    content: Encore trois jours, et le pharaon élèvera ta tête au-dessus de toi ; il te fera pendre à un bois, et les oiseaux mangeront ta chair.
  '2':
  - type: note
    content: Cf. Pr 16.14 ; 19.12. –  hauts fonctionnaires 37.36n.
  - type: text
    content: 'Le pharaon, en colère contre ses deux hauts fonctionnaires, le grand échanson et le grand panetier, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: La célébration de l'anniversaire de la naissance du pharaon n'est attestée en Egypte qu'à l'époque hellénistique, mais l'expression pourrait aussi désigner l'anniversaire du couronnement. Lors de certaines fêtes à la cour d'Egypte, les hauts fonctionnaires remettaient leurs insignes au pharaon qui les leur rendait s'il les maintenait dans leurs charges. Cf. Mc 6.21ss.
  - type: text
    content: 'Le troisième jour, c''était l''anniversaire de la naissance du pharaon. Il donna un banquet pour tous les gens de sa cour, et il éleva la tête du grand échanson et la tête du grand panetier au milieu des gens de sa cour : '
  '21':
  - type: note
    content: V. 13 ; 41.13.
  - type: text
    content: 'il rétablit le grand échanson dans sa fonction ; celui-ci mit la coupe dans la main du pharaon. '
  '22':
  - type: text
    content: 'Quant au grand panetier, il le fit pendre, selon l''interprétation que Joseph leur avait donnée. '
  '23':
  - type: note
    content: V. 14 ; Ec 9.15s ; Lm 3.25-27 ; Est 6.3.
  - type: text
    content: Mais le grand échanson ne se souvint pas de Joseph. Il l'oublia.
  '3':
  - type: note
    content: chef des gardes v. 7 ; 37.36n. –  prison 39.20n.
  - type: text
    content: 'les fit mettre aux arrêts dans la maison du chef des gardes, dans la prison où Joseph était enfermé. '
  '4':
  - type: note
    content: 'préposa Joseph à leur service  : autres traductions leur adjoignit Joseph comme leur auxiliaire ; les confia à la surveillance de Joseph, qui les servait  ; le verbe hébreu correspondant à préposer, qui signifie aussi visiter, inspecter, a été traduit par nommer intendant en 39.4n  ; voir aussi 41.34.'
  - type: text
    content: Le chef des gardes préposa Joseph à leur service. Ils restèrent quelque temps aux arrêts.
  - type: heading
    content: Joseph interprète les rêves des hauts fonctionnaires
  '5':
  - type: text
    content: ' '
  - type: note
    content: 37.5+ ; 41.11.
  - type: text
    content: 'Au cours d''une même nuit, l''échanson et le panetier du roi d''Egypte enfermés dans la prison firent tous les deux un rêve, chacun le sien, chaque rêve ayant son interprétation propre. '
  '6':
  - type: note
    content: 'qu''ils étaient de mauvaise humeur  : autres traductions qu''ils étaient irrités ; qu''ils étaient contrariés ; qu''ils avaient mauvaise mine (Pr 19.3n  ; Dn 1.10).'
  - type: text
    content: 'Au matin, quand Joseph vint vers eux, il vit qu''ils étaient de mauvaise humeur. '
  '7':
  - type: note
    content: 'Cf. Né 2.2. –  dans la maison de son maître  : cf. 37.36n. –  l''air sombre  : litt. la face mauvaise.'
  - type: text
    content: 'Alors il demanda aux hauts fonctionnaires du pharaon qui étaient avec lui aux arrêts dans la maison de son maître : Pourquoi avez-vous l''air sombre aujourd''hui ? '
  '8':
  - type: note
    content: '41.15s ; Dn 2.11,18,28 ; Mt 10.20 ; 2Co 3.5. –  à Dieu  : autre traduction aux dieux, cf. 1.1n.'
  - type: text
    content: 'Ils lui répondirent : Nous avons fait un rêve, et il n''y a personne pour l''interpréter. Joseph leur dit : N''est-ce pas à Dieu qu''appartiennent les interprétations ? Racontez-moi, je vous prie !'
  '9':
  - type: text
    content: 'Le grand échanson raconta à Joseph le rêve qu''il avait fait ; il lui dit : Dans mon rêve, il y avait un cep de vigne devant moi. '
