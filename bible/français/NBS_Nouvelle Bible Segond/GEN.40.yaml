document_id: GEN.40,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'échanson '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: panetier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hauts fonctionnaires de la cour, chargés de l''approvisionnement de la table royale et peut-être aussi de l''économie du royaume (cf. Né 1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchèrent
        - type: text
          text: ' contre'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: manquèrent à leurs devoirs envers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 41.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'Après cela, l''échanson du roi d''Egypte et le panetier péchèrent contre leur maître, le roi d''Egypte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce cep avait trois sarments. Il a bourgeonné, ses fleurs ont poussé, et ses grappes ont donné des raisins mûrs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Né 2.1.
      marker-yv: yv-n
    - type: text
      text: 'La coupe du pharaon était dans ma main. J''ai pris les raisins, je les ai pressés dans la coupe du pharaon, et j''ai mis la coupe dans la main du pharaon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph lui dit : Voici l''interprétation : les trois sarments sont trois jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: élèvera ta tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : prise en bonne part, cette expression peut signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'honorer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gracier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 20s ; 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 25.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: / / ; voir aussi Za 2.4 ; Jb 10.15) ; mais elle peut aussi être prise en mauvaise part, cf. v. 19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Encore trois jours, et le pharaon élèvera ta tête et te rétablira dans ta charge ; tu mettras la coupe du pharaon dans sa main, comme tu le faisais d''habitude, lorsque tu étais son échanson. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 23 ; 41.9-13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souviens-toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'évoque mon cas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent le même verbe hébreu, à deux formes différentes ; cf. 41.9.
      marker-yv: yv-n
    - type: text
      text: 'Seulement, quand tout ira bien pour toi, souviens-toi de moi et agis avec fidélité envers moi, je t''en prie ; évoque mon cas auprès du pharaon et fais-moi sortir de cette maison. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: enlevé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: volé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe hébreu est à une forme intensive qui peut suggérer l''idée de violence. Cf. 37.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dn 1.3ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cachot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot hébreu (également en 41.14) a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'citerne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 37.22,29. Cf. 39.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Car j'ai été enlevé du pays des Hébreux, et je n'ai rien fait ici pour qu'on me mette au cachot.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de pain blanc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de gâteaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; on hésite sur le sens exact du mot hébreu ainsi rendu. Certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (corbeilles) tressées, (corbeilles) de vannerie.
      marker-yv: yv-n
    - type: text
      text: 'Le grand panetier, voyant que c''était une interprétation favorable, dit à Joseph : Dans mon rêve à moi, il y avait trois corbeilles de pain blanc sur ma tête. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes sortes de pains…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de toute la nourriture de Pharaon œuvre de panetier.
      marker-yv: yv-n
    - type: text
      text: 'Dans la corbeille la plus élevée il y avait toutes sortes de pains et de gâteaux pour le pharaon. Les oiseaux venaient manger dans la corbeille au-dessus de ma tête. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph répondit : Voici l''interprétation : les trois corbeilles sont trois jours. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'élèvera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à un bois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à un arbre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. On comprend généralement que le grand panetier doit être pendu ou empalé ; certains comprennent qu''il doit être décapité, son corps étant ensuite exposé sur le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Cf. v. 22 ; voir aussi Dt 21.22 ; 2S 4.12 ; 21.9-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mangeront ta '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mangeront la chair de dessus toi.
      marker-yv: yv-n
    - type: text
      text: Encore trois jours, et le pharaon élèvera ta tête au-dessus de toi ; il te fera pendre à un bois, et les oiseaux mangeront ta chair.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Pr 16.14 ; 19.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hauts fonctionnaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '37.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon, en colère contre ses deux hauts fonctionnaires, le grand échanson et le grand panetier, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La célébration de l'anniversaire de la naissance du pharaon n'est attestée en Egypte qu'à l'époque hellénistique, mais l'expression pourrait aussi désigner l'anniversaire du couronnement. Lors de certaines fêtes à la cour d'Egypte, les hauts fonctionnaires remettaient leurs insignes au pharaon qui les leur rendait s'il les maintenait dans leurs charges. Cf. Mc 6.21ss.
      marker-yv: yv-n
    - type: text
      text: 'Le troisième jour, c''était l''anniversaire de la naissance du pharaon. Il donna un banquet pour tous les gens de sa cour, et il éleva la tête du grand échanson et la tête du grand panetier au milieu des gens de sa cour : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 13 ; 41.13.
      marker-yv: yv-n
    - type: text
      text: 'il rétablit le grand échanson dans sa fonction ; celui-ci mit la coupe dans la main du pharaon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant au grand panetier, il le fit pendre, selon l''interprétation que Joseph leur avait donnée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 14 ; Ec 9.15s ; Lm 3.25-27 ; Est 6.3.
      marker-yv: yv-n
    - type: text
      text: Mais le grand échanson ne se souvint pas de Joseph. Il l'oublia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chef des gardes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7 ; 37.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '39.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'les fit mettre aux arrêts dans la maison du chef des gardes, dans la prison où Joseph était enfermé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: préposa Joseph à leur service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur adjoignit Joseph comme leur auxiliaire ; les confia à la surveillance de Joseph, qui les servait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe hébreu correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: préposer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: visiter, inspecter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nommer intendant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 39.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 41.34.'
      marker-yv: yv-n
    - type: text
      text: Le chef des gardes préposa Joseph à leur service. Ils restèrent quelque temps aux arrêts.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph interprète les rêves des hauts fonctionnaires
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 37.5+ ; 41.11.
      marker-yv: yv-n
    - type: text
      text: 'Au cours d''une même nuit, l''échanson et le panetier du roi d''Egypte enfermés dans la prison firent tous les deux un rêve, chacun le sien, chaque rêve ayant son interprétation propre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils étaient de mauvaise humeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''ils étaient irrités ; qu''ils étaient contrariés ; qu''ils avaient mauvaise mine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Pr 19.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dn 1.10).'
      marker-yv: yv-n
    - type: text
      text: 'Au matin, quand Joseph vint vers eux, il vit qu''ils étaient de mauvaise humeur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Né 2.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la maison de son maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 37.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'air sombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la face mauvaise.
      marker-yv: yv-n
    - type: text
      text: 'Alors il demanda aux hauts fonctionnaires du pharaon qui étaient avec lui aux arrêts dans la maison de son maître : Pourquoi avez-vous l''air sombre aujourd''hui ? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '41.15s ; Dn 2.11,18,28 ; Mt 10.20 ; 2Co 3.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils lui répondirent : Nous avons fait un rêve, et il n''y a personne pour l''interpréter. Joseph leur dit : N''est-ce pas à Dieu qu''appartiennent les interprétations ? Racontez-moi, je vous prie !'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le grand échanson raconta à Joseph le rêve qu''il avait fait ; il lui dit : Dans mon rêve, il y avait un cep de vigne devant moi. '
