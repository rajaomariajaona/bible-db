      - type: text
        text: '  ; nous sommes ici en terre non juive.'
    marker-yv: yv-n
  - type: text
    text: 'Il y avait, loin d''eux, un grand troupeau de cochons en train de paître. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
