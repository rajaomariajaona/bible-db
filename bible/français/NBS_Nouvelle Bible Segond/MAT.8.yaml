document_id: MAT.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un lépreux
  - type: heading
    content: Mc 1.40-45  ; Lc 5.12-14
  - type: text
    content: ' '
  - type: note
    content: montagne 5.1n.
  - type: text
    content: 'Lorsqu''il fut descendu de la montagne, de grandes foules le suivirent. '
  '10':
  - type: note
    content: 'étonné  : autre traduction plein d''admiration Mc 6.6. –  Amen 5.18n. –  en Israël ou, selon certains mss, même en Israël  ; le centurion était un non-Juif. –  une telle foi  : cf. 15.28 ; 23.23n  ; Lc 18.8.'
  - type: text
    content: 'Après l''avoir entendu, Jésus, étonné, dit à ceux qui le suivaient : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, chez personne en Israël je n''ai trouvé une telle foi. '
  '11':
  - type: note
    content: 'Ps 107.3 ; Lc 13.28-29+ ; Ep 3.6. –  s''installer à table  : cf. 14.19 ; Lc 7.36n (verbe apparenté) ; sur l''image du banquet illustrant le bonheur espéré, cf. Es 25.6ss ; 55.1s ; 65.13s. –  Abraham… 22.32 ; Lc 13.28+ ; cf. 16.22.'
  - type: text
    content: 'Je vous le dis, beaucoup viendront de l''est et de l''ouest pour s''installer à table avec Abraham, Isaac et Jacob dans le royaume des cieux. '
  '12':
  - type: note
    content: 'fils du Royaume  : ceux à qui le Royaume était destiné. La même expression se retrouve avec un sens légèrement différent en 13.38. –  ténèbres du dehors 22.13n  ; 25.30. –  pleurs / grincements de dents 13.42,50 ; 22.13 ; 24.51 ; 25.30 ; cf. Ps 112.10.'
  - type: text
    content: 'Mais les fils du Royaume seront chassés dans les ténèbres du dehors ; c''est là qu''il y aura des pleurs et des grincements de dents. '
  '13':
  - type: note
    content: 'selon ta foi  : litt. comme tu as cru. Cf. 9.22,28s ; 15.28 ; 17.20 ; Mc 10.52 ; Lc 7.50 ; 17.19 ; Jn 4.50-53 ; Ac 16.31 ; Rm 10.9. –  ce moment même  : litt. cette heure-là.'
  - type: text
    content: 'Puis Jésus dit au centurion : Va, qu''il t''advienne selon ta foi. Et à ce moment même le serviteur fut guéri.'
  - type: heading
    content: Guérisons de malades
  - type: heading
    content: Mc 1.29-34  ; Lc 4.38-41
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Co 9.5.
  - type: text
    content: 'Jésus se rendit ensuite chez Pierre, dont il vit la belle-mère couchée ; elle avait de la fièvre. '
  '15':
  - type: note
    content: main Mc 5.41/ / ; 9.27 ; Ac 3.7. –  fièvre Jn 4.52.
  - type: text
    content: Il lui toucha la main, et la fièvre la quitta ; elle se leva et se mit à le servir.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'démoniaques / esprits  : cf. v. 7n  ; 4.24n  ; Ac 10.38.'
  - type: text
    content: 'Le soir venu, on lui amena beaucoup de démoniaques. Il chassa les esprits par sa parole et guérit tous les malades. '
  '17':
  - type: note
    content: du prophète Esaïe Es 53.4  ; cf. 1P 2.21-24.
  - type: text
    content: 'Ainsi s''accomplit ce qui avait été dit par l''entremise du prophète Esaïe :'
  - type: text
    content: Il a pris nos infirmités
  - type: text
    content: et il s'est chargé de nos maladies
  - type: text
    content: .
  - type: heading
    content: Ceux qui désirent suivre Jésus
  - type: heading
    content: Lc 9.57-60
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mc 4.35 ; Lc 8.22.
  - type: text
    content: 'Jésus, voyant une foule autour de lui, donna l''ordre de passer sur l''autre rive. '
  '19':
  - type: note
    content: 'scribe 2.4n  ; Mc 12.28. –  Maître  : au sens d’enseignant.'
  - type: text
    content: 'Un scribe vint lui dire : Maître, je te suivrai partout où tu iras. '
  '2':
  - type: note
    content: 'lépreux  : voir Lv 13.2n. –  se prosternait 2.2n  ; voir culte. –  pur 10.8 ; 11.5/ / ; Lv 13.46 ; cf. Nb 12.10-13 ; 2R 5.7.'
  - type: text
    content: 'Un lépreux survint, qui se prosternait devant lui en disant : Seigneur, si tu le veux, tu peux me rendre pur. '
  '20':
  - type: note
    content: 'Cf. Lc 2.7 ; 1Co 4.11 ; 2Co 8.9 ; Ph 2.7s. –  des nids  : litt. des habitations, cf. 13.32/ / (verbe apparenté) ; voir aussi Ps 84.4. –  Fils de l''homme  : cette désignation mystérieuse du Christ apparaît presque uniquement dans des paroles de Jésus (63 fois dans le N.T.) ; elle pourrait être prise ici dans un sens très général (l''homme, par opposition aux renards et aux oiseaux) ; cf. 9.6 ; 11.19 ; 16.13,27 ; 24.30 ; Dn 7.13 ; Ac 7.56 ; Ap 1.13 ; 14.14. –  Evangile selon Thomas 86 : « Jésus a dit : “Les renards ont leurs tanières, et les oiseaux ont leurs nids, mais le Fils de l''Homme n''a pas de place où poser sa tête et se reposer.” »'
  - type: text
    content: 'Jésus lui dit : Les renards ont des tanières, les oiseaux du ciel ont des nids, mais le Fils de l''homme n''a pas où poser sa tête. '
  '21':
  - type: note
    content: 'parmi ses disciples  : certains mss portent parmi les disciples. –  ensevelir mon père  : c''était l''un des devoirs essentiels de la piété familiale, cf. Tobit 4.3 : « Il appela son fils… et il lui dit : “Enterre-moi comme il convient.” » 6.15 : « Ils n''ont pas d''autre fils pour les enterrer. » Voir aussi 1R 19.20.'
  - type: text
    content: 'Un autre, parmi ses disciples, lui dit : Seigneur, permets-moi d''aller d''abord ensevelir mon père. '
  '22':
  - type: note
    content: 'Suis-moi 4.19n  ; 9.9 ; 19.21 ; Jn 1.43. –  morts  : cf. Lv 21.11 ; Nb 6.6s ; Lc 15.24 ; Jn 5.25 ; Ap 3.1. – Sur l''ensemble, cf. Lc 14.27.'
  - type: text
    content: 'Mais Jésus lui dit : Suis-moi et laisse les morts ensevelir leurs morts.'
  - type: heading
    content: Jésus apaise une tempête
  - type: heading
    content: Mc 4.35-41  ; Lc 8.23-25
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 14.22ss/ /.
  - type: text
    content: 'Il monta dans le bateau, et ses disciples le suivirent. '
  '24':
  - type: note
    content: 'Cf. Jon 1.4s. –  mer 4.13n. –  tempête  : le mot grec ainsi traduit a donné notre mot séisme  ; ailleurs (p. ex. 24.7) il signifie tremblement de terre. –  était recouvert  : autre traduction allait être recouvert.'
  - type: text
    content: 'Alors survint sur la mer une tempête si forte que le bateau était recouvert par les vagues. Et lui, il dormait. '
  '25':
  - type: note
    content: 'Ps 50.15. –  le réveiller  : le même verbe est traduit au v. 26 par se lever, cf. 2.13n. –  nous sommes perdus ! ou nous allons périr !'
  - type: text
    content: 'Les disciples vinrent le réveiller, en disant : Seigneur, sauve-nous, nous sommes perdus ! '
  '26':
  - type: note
    content: 'si peureux (voir crainte) : le même mot est traduit par lâches en Ap 21.8 ; cf. Jn 14.27 ; 2Tm 1.7 ; voir aussi Ps 46.2-4. –  peu de foi 6.30+. –  rabroua  : sur le verbe grec, aussi traduit par reprendre, cf. 12.16 ; 16.20,22 ; 17.18 ; 19.13 ; 20.31 ; Mc 1.25n. Voir aussi Ps 65.8 ; 89.10 ; 107.25-32 ; Jb 38.11.'
  - type: text
    content: 'Il leur dit : Pourquoi êtes-vous si peureux, gens de peu de foi ? Alors il se leva, rabroua les vents et la mer, et un grand calme se fit. '
  '27':
  - type: note
    content: 'Etonnés v. 10n  ; cf. 9.33 ; 15.31 ; 21.20 ; Jn 7.15,21 ; Ac 2.7. –  ils  : litt. les hommes. –  Quelle sorte…  : autre traduction de quelle sorte est-il, celui-ci…'
  - type: text
    content: 'Etonnés, ils se disaient : Quelle sorte d''homme est-il, celui-ci, que même les vents et la mer lui obéissent ?'
  - type: heading
    content: Jésus guérit deux démoniaques
  - type: heading
    content: Mc 5.1-20  ; Lc 8.26-39
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'le pays des Gadaréniens ou, selon certains mss, Géraséniens, Gergéséniens, Gazaréniens , d''après les noms de diverses localités situées plus ou moins près du lac de Tibériade, à l''est ou au sud-est, en tout cas en pays non juif. –  deux  : cf. 20.21,30 ; 26.60+. –  démoniaques v. 16+,33. –  tombeaux  : sans doute des cavernes naturelles ou taillées dans le roc, qui servaient de sépultures. Cf. Es 65.4. –  redoutables  : le mot signifie violents, hostiles, dangereux . –  n''osait  : litt. n''avait la force de.'
  - type: text
    content: 'Quand il eut abordé sur l''autre rive, dans le pays des Gadaréniens, deux démoniaques, sortant des tombeaux, vinrent au-devant de lui. Ils étaient si redoutables que personne n''osait passer par là. '
  '29':
  - type: note
    content: 'Pourquoi te mêles-tu…  : sémitisme (2S 16.10 ; 19.23) qu''on pourrait traduire mot à mot  : Quoi à nous et à toi ? Voir Mc 1.24n. –  Fils de Dieu 4.3. –  tourmenter 18.34n  ; Jc 2.19 ; Jd 6. –  le temps  : même terme en 11.25 ; 12.1 ; 13.30 ; 14.1 ; 16.3 ; 21.34n,41 ; 24.45 ; 26.18 ; voir Mc 1.15n.'
  - type: text
    content: 'Ils lui crièrent : Pourquoi te mêles-tu de nos affaires, Fils de Dieu ? Es-tu venu ici pour nous tourmenter avant le temps ? '
  '3':
  - type: note
    content: 'sois pur  : litt. sois purifié ou rendu pur, comme au v. 2 et dans la suite, litt. sa lèpre fut purifiée (c.-à-d. guérie, d''où le retour du lépreux à l''état de pureté rituelle).'
  - type: text
    content: 'Il tendit la main, le toucha et dit : Je le veux, sois pur. Aussitôt il fut pur de sa lèpre. '
  '30':
  - type: note
    content: cochons 7.6n  ; nous sommes ici en terre non juive.
  - type: text
    content: 'Il y avait, loin d''eux, un grand troupeau de cochons en train de paître. '
  '31':
  - type: note
    content: 'suppliaient Jésus  : litt. le suppliaient.'
  - type: text
    content: 'Les démons suppliaient Jésus : Si tu nous chasses, envoie-nous dans ce troupeau de cochons. '
  '32':
  - type: text
    content: 'Il leur dit : Allez ! Ils sortirent et s''en allèrent dans les cochons. Alors tout le troupeau se précipita dans la mer du haut de l''escarpement, et ils moururent dans les eaux. '
  '33':
  - type: note
    content: 'Lc 2.17 ; Jn 4.28-30. –  tout ce qui était arrivé…  : litt. tout et l''affaire des démoniaques.'
  - type: text
    content: 'Ceux qui les faisaient paître s''enfuirent et allèrent raconter dans la ville tout ce qui était arrivé – l''affaire des démoniaques. '
  '34':
  - type: note
    content: Jb 21.14 ; Jn 3.19.
  - type: text
    content: Alors toute la ville sortit au-devant de Jésus ; dès qu'ils le virent, ils le supplièrent de s'éloigner de leur territoire.
  '4':
  - type: note
    content: personne 9.30 ; 12.16/ / ; Mc 1.34/ / ; 5.43/ / ; 7.36/ / ; 8.30/ / ; 9.9/ / ; cf. Jn 5.41. –  prêtre / offrande (voir sacrifice) Lv 13.49 ; 14.2-32 ; Lc 17.14. –  témoignage 10.18/ / ; 24.14 ; Mc 6.11/ / ; cf. Mt 3.15 ; 5.17.
  - type: text
    content: 'Puis Jésus lui dit : Garde-toi d''en parler à personne, mais va te montrer au prêtre et présente l''offrande que Moïse a prescrite ; ce sera pour eux un témoignage.'
  - type: heading
    content: Jésus et le centurion de Capharnaüm
  - type: heading
    content: Lc 7.1-10  ; cf. Jn 4.46-54
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Capharnaüm 4.13. –  centurion  : cf. Ac 10.1.'
  - type: text
    content: 'Comme il était entré dans Capharnaüm, un centurion l''aborda '
  '6':
  - type: note
    content: 'serviteur  : le mot grec peut aussi signifier garçon (cf. Jn 4.46-54). Lc 7.2 emploie le mot qui désigne l''esclave, mais le terme traduit ici par serviteur revient Lc 7.7. Cf. Col 4.1.'
  - type: text
    content: 'et le supplia : Seigneur, mon serviteur est couché à la maison, paralysé et violemment tourmenté. '
  '7':
  - type: note
    content: 'Moi, je viendrai…  : autre traduction possible est-ce à moi de venir le guérir ? –  guérir  : le verbe employé ici et au v. 16 (44 fois dans le N.T.) est généralement lié à l''idée de soigner ou de servir (cf. Ac 17.25). C''est de lui qu''est dérivé notre mot thérapeutique (aussi Mt 4.23). Le verbe employé aux v. 8,13 (28 fois dans le N.T. dont 4 fois chez Mt), lui, a toujours le sens de guérir d''une maladie, d''une possession démoniaque (15.28 ; Lc 6.19) ou d''un mal moral (12.15 ; 13.15 ; 1P 2.24).'
  - type: text
    content: 'Il lui répondit : Moi, je viendrai le guérir. '
  '8':
  - type: note
    content: 'ce serait trop d''honneur pour moi ou je ne suis pas digne, 3.11n  ; cf. 1Co 15.9. –  que tu entres sous mon toit  : cf. Jn 18.28 ; Ac 10.28 ; 11.3. –  parole Es 55.11 ; Ps 33.8. –  guéri v. 7n.'
  - type: text
    content: 'Le centurion répondit : Seigneur, ce serait trop d''honneur pour moi que tu entres sous mon toit ; dis seulement une parole, et mon serviteur sera guéri ! '
  '9':
  - type: note
    content: 'Car je suis…  : litt. Car moi aussi je suis un homme sous autorité (ou sous pouvoir, même mot 7.29 ; 9.6,8 ; 10.1 ; 21.23 ; 28.18), ayant sous moi des soldats. – Cf. Ps 104.4 ; 119.91 ; Ac 10.7.'
  - type: text
    content: 'Car je suis moi-même sous l''autorité de mes supérieurs et j''ai des soldats sous mes ordres ; je dis à l''un : « Va ! » et il va, à l''autre : « Viens ! » et il vient, et à mon esclave : « Fais ceci ! » et il le fait. '
