  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'montagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il fut descendu de la montagne, de grandes foules le suivirent. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lépreux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Lv 13.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se prosternait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.8 ; 11.5/ / ; Lv 13.46 ; cf. Nb 12.10-13 ; 2R 5.7.
    marker-yv: yv-n
  - type: text
    text: 'Un lépreux survint, qui se prosternait devant lui en disant : Seigneur, si tu le veux, tu peux me rendre pur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sois pur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sois purifié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rendu pur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 2 et dans la suite, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sa lèpre fut purifiée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (c.-à-d. guérie, d'où le retour du lépreux à l'état de pureté rituelle).
    marker-yv: yv-n
  - type: text
    text: 'Il tendit la main, le toucha et dit : Je le veux, sois pur. Aussitôt il fut pur de sa lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'personne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.30 ; 12.16/ / ; Mc 1.34/ / ; 5.43/ / ; 7.36/ / ; 8.30/ / ; 9.9/ / ; cf. Jn 5.41. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'offrande '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ') Lv 13.49 ; 14.2-32 ; Lc 17.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.18/ / ; 24.14 ; Mc 6.11/ / ; cf. Mt 3.15 ; 5.17.
    marker-yv: yv-n
  - type: text
    text: 'Puis Jésus lui dit : Garde-toi d''en parler à personne, mais va te montrer au prêtre et présente l''offrande que Moïse a prescrite ; ce sera pour eux un témoignage.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et le centurion de Capharnaüm
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Lc 7.1-10  ; cf. Jn 4.46-54
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Capharnaüm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: centurion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ac 10.1.'
    marker-yv: yv-n
  - type: text
    text: 'Comme il était entré dans Capharnaüm, un centurion l''aborda '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot grec peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'garçon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Jn 4.46-54). Lc 7.2 emploie le mot qui désigne l''esclave, mais le terme traduit ici par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: revient Lc 7.7. Cf. Col 4.1.
    marker-yv: yv-n
  - type: text
    text: 'et le supplia : Seigneur, mon serviteur est couché à la maison, paralysé et violemment tourmenté. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moi, je viendrai…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'est-ce à moi de venir le guérir ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: guérir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe employé ici et au v. 16 (44 fois dans le N.T.) est généralement lié à l''idée de soigner ou de servir (cf. Ac 17.25). C''est de lui qu''est dérivé notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'thérapeutique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (aussi Mt 4.23). Le verbe employé aux v. 8,13 (28 fois dans le N.T. dont 4 fois chez Mt), lui, a toujours le sens de guérir d'une maladie, d'une possession démoniaque (15.28 ; Lc 6.19) ou d'un mal moral (12.15 ; 13.15 ; 1P 2.24).
    marker-yv: yv-n
  - type: text
    text: 'Il lui répondit : Moi, je viendrai le guérir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce serait trop d''honneur pour moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne suis pas digne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 3.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 1Co 15.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tu entres sous mon toit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 18.28 ; Ac 10.28 ; 11.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 55.11 ; Ps 33.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'guéri '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le centurion répondit : Seigneur, ce serait trop d''honneur pour moi que tu entres sous mon toit ; dis seulement une parole, et mon serviteur sera guéri ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Car je suis…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Car moi aussi je suis un homme sous autorité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sous pouvoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même mot 7.29 ; 9.6,8 ; 10.1 ; 21.23 ; 28.18), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ayant sous moi des soldats
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . – Cf. Ps 104.4 ; 119.91 ; Ac 10.7.
    marker-yv: yv-n
  - type: text
    text: 'Car je suis moi-même sous l''autorité de mes supérieurs et j''ai des soldats sous mes ordres ; je dis à l''un : « Va ! » et il va, à l''autre : « Viens ! » et il vient, et à mon esclave : « Fais ceci ! » et il le fait. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: étonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plein d''admiration '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 6.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: même en Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le centurion était un non-Juif. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une telle foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.28 ; 23.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 18.8.'
    marker-yv: yv-n
  - type: text
    text: 'Après l''avoir entendu, Jésus, étonné, dit à ceux qui le suivaient : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, chez personne en Israël je n''ai trouvé une telle foi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ps 107.3 ; Lc 13.28-29+ ; Ep 3.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'installer à table
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.19 ; Lc 7.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' (verbe apparenté) ; sur l''image du banquet illustrant le bonheur espéré, cf. Es 25.6ss ; 55.1s ; 65.13s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abraham… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.32 ; Lc 13.28+ ; cf. 16.22.
    marker-yv: yv-n
  - type: text
    text: 'Je vous le dis, beaucoup viendront de l''est et de l''ouest pour s''installer à table avec Abraham, Isaac et Jacob dans le royaume des cieux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' du Royaume'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ceux à qui le Royaume était destiné. La même expression se retrouve avec un sens légèrement différent en 13.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ténèbres du dehors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pleurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grincements de dents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.42,50 ; 22.13 ; 24.51 ; 25.30 ; cf. Ps 112.10.
    marker-yv: yv-n
  - type: text
    text: 'Mais les fils du Royaume seront chassés dans les ténèbres du dehors ; c''est là qu''il y aura des pleurs et des grincements de dents. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon ta foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme tu as cru
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Cf. 9.22,28s ; 15.28 ; 17.20 ; Mc 10.52 ; Lc 7.50 ; 17.19 ; Jn 4.50-53 ; Ac 16.31 ; Rm 10.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce moment même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cette heure-là.
    marker-yv: yv-n
  - type: text
    text: 'Puis Jésus dit au centurion : Va, qu''il t''advienne selon ta foi. Et à ce moment même le serviteur fut guéri.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérisons de malades
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mc 1.29-34  ; Lc 4.38-41
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1Co 9.5.
    marker-yv: yv-n
  - type: text
    text: 'Jésus se rendit ensuite chez Pierre, dont il vit la belle-mère couchée ; elle avait de la fièvre. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'main '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 5.41/ / ; 9.27 ; Ac 3.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fièvre '
    - type: usfm
      marker: ft
      children:
      - type: text
