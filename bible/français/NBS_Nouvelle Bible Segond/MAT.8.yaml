      marker: fr
      children:
      - type: text
        text: '8.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lc 2.17 ; Jn 4.28-30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout ce qui était arrivé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout et l'affaire des démoniaques.
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui les faisaient paître s''enfuirent et allèrent raconter dans la ville tout ce qui était arrivé – l''affaire des démoniaques. '
