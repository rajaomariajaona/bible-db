    marker-yv: yv-n
  - type: text
    text: 'Les démons suppliaient Jésus : Si tu nous chasses, envoie-nous dans ce troupeau de cochons. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leur dit : Allez ! Ils sortirent et s''en allèrent dans les cochons. Alors tout le troupeau se précipita dans la mer du haut de l''escarpement, et ils moururent dans les eaux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
