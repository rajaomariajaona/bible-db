document_id: HOS.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: A cause du contexte, certains voient dans les v. 1-3 une parodie du repentir formaliste et superficiel d'Israël ; cf. Jr 3.4s. –  revenons au Seigneur 14.2 ; Lm 3.40+. –  il a déchiré 5.14n. –  il nous guérira 7.1 ; 14.5 ; Dt 32.39 ; Es 30.26 ; 57.18 ; Jr 3.21s ; 30.17 ; Ps 85.
  - type: text
    content: '– Allez, revenons au '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car il a déchiré, mais il nous guérira ;
  - type: text
    content: il a frappé, mais il pansera nos plaies.
  '10':
  - type: text
    content: ' '
  - type: note
    content: se prostitue 1.2n  ; 5.3. –  Israël s'est rendu impur 5.3 ; Ez 14.11 ; 20.30 ; voir pur.
  - type: text
    content: Dans la maison d'Israël
  - type: text
    content: 'j''ai vu des choses horribles :'
  - type: text
    content: c'est là qu'Ephraïm se prostitue,
  - type: text
    content: qu'Israël s'est rendu impur.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Juda 1.7+. –  quand je rétablirai…  : on pourrait aussi rattacher cette phrase au début du chapitre 7 et traduire lorsque je veux rétablir la situation de mon peuple, lorsque je veux guérir Israël…  ; cf. Dt 30.3n  ; Jr 29.14n  ; Am 9.14 ; Jb 42.10n.'
  - type: text
    content: A toi aussi, Juda, une moisson est préparée,
  - type: text
    content: quand je rétablirai la situation de mon peuple.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dans deux jours / le troisième jour  : après un temps très court (cf. les formules de Am 1.3–2.6 ; Pr 30.7-9,15,18,21). Certains voient ici une allusion à un rituel qui fêtait le retour à la vie de Tammouz ou de Baal (annonciateur du retour des pluies après la saison sèche, v. 3) le troisième jour après la célébration de sa mort ; cf. Jg 11.40n  ; Ez 8.14n  ; Za 12.11n  ; voir aussi Mt 16.21/ / ; Lc 24.7,46 ; Ac 10.40 ; 1Co 15.4. –  nous vivrons devant lui  : cf. Ps 116.9 ; Lc 1.75.'
  - type: text
    content: Il nous rendra la vie dans deux jours ;
  - type: text
    content: le troisième jour, il nous relèvera,
  - type: text
    content: et nous vivrons devant lui.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Connaissons 2.22+ ; cf. Ph 3.8. –  comme une ondée…  : cf. Dt 11.14 ; Jl 2.23 ; Ps 72.6 ; 143.6 ; Jc 5.7.'
  - type: text
    content: 'Connaissons, cherchons à connaître le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: sa venue est aussi certaine que celle de l'aurore.
  - type: text
    content: Il viendra pour nous comme une ondée,
  - type: text
    content: comme une pluie printanière qui arrose la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Que te ferai-je  : autre traduction que ferai-je pour toi . –  Ephraïm 4.17n. –  comme la rosée… 13.3 ; voir aussi, en meilleure part, 14.6 ; Mi 5.6 ; Ps 110.3 ; Pr 19.12.'
  - type: text
    content: – Que te ferai-je, Ephraïm ?
  - type: text
    content: Que te ferai-je, Juda ?
  - type: text
    content: Votre fidélité est comme la nuée du matin,
  - type: text
    content: comme la rosée matinale qui disparaît.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'je les frappe…  : litt. je frappe…  ; cf. Es 11.4 ; 49.2 ; Jr 5.14 ; Ep 6.17 ; Hé 4.12s. –  par les prophètes  : cf. 1R 18. –  tes jugements s''imposent (litt. sortent ) en plein jour  : LXX mon jugement sortira comme la lumière.'
  - type: text
    content: C'est pourquoi je les frappe par les prophètes,
  - type: text
    content: je les tue par les paroles de ma bouche,
  - type: text
    content: tes jugements s'imposent en plein jour,
  '6':
  - type: text
    content: ' '
  - type: note
    content: sacrifices Mt 9.13 ; 12.7/  ; 23.23 ; cf. Am 5.22-24 ; voir aussi 1S 15.22 ; Es 1.10-17 ; Mi 6.6-8 ; Ps 40.7 ; 50.8-15 ; 51.18s. –  fidélité 2.21+ ; 4.1n. –  connaissance 4.1+.
  - type: text
    content: car je ne prends pas plaisir aux sacrifices, mais à la fidélité ;
  - type: text
    content: je préfère aux holocaustes la connaissance de Dieu.
  - type: heading
    content: Dieu se déclare trahi par Israël
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Comme à Adam  : sur Adam comme nom de lieu (cf. C''est là… ), voir Jos 3.16n  ; 1R 7.46n/ / ; Adam est peut-être ici le nom d''un autre sanctuaire (cf. Ps 78.60n), en Transjordanie, près du confluent du Jourdain et du Yabboq. Autres traductions depuis Adam ; comme Adam ; comme des humains , cf. Gn 1.26n  ; 3. Certains modifient légèrement le texte hébreu traditionnel pour lire simplement à Adam. –  ils ont passé outre à l''alliance 8.1 ; cf. Dt 17.2+ ; Jr 31.32 ; 34.15-18.'
  - type: text
    content: Comme à Adam, ils ont passé outre à l'alliance.
  - type: text
    content: C'est là qu'ils m'ont trahi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Galaad  : peut-être ici le nom d''une cité de Transjordanie 12.12 ; cf. Gn 31.21n,46-48 ; autre traduction en Galaad se trouve une cité… –  de gens malfaisants  : litt. de faiseurs de mal  ; le mot hébreu correspondant à mal est celui qui est transcrit Aven en 4.15n  ; cf. 10.8 ; 12.12 ; voir aussi Es 31.2n  ; Jb 31.3+. –  à l''affût du sang  : autre traduction tachés de sang  ; cf. 2R 15.25.'
  - type: text
    content: Galaad est une cité de gens malfaisants
  - type: text
    content: à l'affût du sang.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'des troupes armées  : autre traduction des bandits . –  qui guettent  : litt. qui attendent . –  Sichem , très ancien sanctuaire au centre du royaume du Nord, Gn 12.6 ; Dt 11.29n  ; 12.5n  ; Jos 20.1-9 ; 21.21. –  c''est une infamie  : litt. car (ou quand ) ils font une infamie.'
  - type: text
    content: Comme des troupes armées qui guettent un homme,
  - type: text
    content: telle est la confrérie des prêtres ;
  - type: text
    content: ils assassinent sur le chemin de Sichem ;
  - type: text
    content: c'est une infamie !
