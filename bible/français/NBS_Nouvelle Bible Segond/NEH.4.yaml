document_id: NEH.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. désigne les quatre provinces perses de Transeuphratène qui entouraient Juda : Samarie ( Sanballat , 2.10n) au nord, l''Arabie ( les Arabes , cf. 2.19n) au sud, la Transjordanie ( Ammonites ) à l''est et la Philistie ( Ashdodites ) à l''ouest (cf. 13.23s). –  la réparation… avançait  : l''expression hébraïque évoque la cicatrisation d''une plaie ; Jr 8.22n  ; de même en 2Ch 24.13.'
  - type: text
    content: 'Mais Sanballat, Tobiya, les Arabes, les Ammonites et les Ashdodites furent très fâchés d''apprendre que la réparation des murailles de Jérusalem avançait et qu''on commençait à reboucher les brèches. '
  '10':
  - type: note
    content: 'mes serviteurs v. 17 ; 5.10,16 ; 13.19. –  étaient derrière toute la maison…  : on pourrait comprendre, concrètement  : se tenaient derrière les murailles ou, plus abstraitement, soutenaient le peuple  ; ou encore, en rattachant au début du v. 11 (ainsi LXX et Vg)  : soutenaient ceux de la maison de Juda qui bâtissaient la muraille.'
  - type: text
    content: 'A partir de ce jour-là, la moitié de mes serviteurs travaillait à l''ouvrage, et l''autre moitié tenait les lances, les boucliers, les arcs et les cuirasses. Les chefs étaient derrière toute la maison de Juda. '
  '11':
  - type: note
    content: 'ceux qui portaient ou chargeaient…  : ou, d''après LXX, ceux qui portaient les fardeaux tout en étant armés  ; cf. v. 4 ; 1R 5.29n. –  arme v. 17n.'
  - type: text
    content: 'Ceux qui bâtissaient la muraille et ceux qui portaient ou chargeaient les fardeaux travaillaient d''une main et tenaient l''arme de l''autre ; '
  '12':
  - type: note
    content: 'avaient…  : litt. chacun (était) ceint de son épée sur ses reins.'
  - type: text
    content: 'les bâtisseurs avaient chacun son épée à la ceinture, et ils bâtissaient ainsi. Celui qui sonnait de la trompe se tenait près de moi. '
  '13':
  - type: text
    content: 'Je dis aux notables, aux magistrats et au reste du peuple : L''ouvrage est considérable et étendu, et nous sommes dispersés sur la muraille, éloignés les uns des autres. '
  '14':
  - type: note
    content: Cf. Ex 14.14 ; Dt 1.30 ; 3.22 ; 20.4 ; 2Ch 20.15ss.
  - type: text
    content: 'Rassemblez-vous auprès de nous, au lieu où vous entendrez le son de la trompe ; notre Dieu combattra pour nous. '
  '15':
  - type: note
    content: 'la moitié d''entre nous  : litt. la moitié d''entre eux  ; cf. v. 10.'
  - type: text
    content: 'C''est ainsi que nous poursuivions l''ouvrage, la moitié d''entre nous la lance à la main depuis le lever de l''aurore jusqu''à l''apparition des étoiles. '
  '16':
  - type: note
    content: 'avec son serviteur  : certains modifient le texte hébreu traditionnel pour lire comme mes serviteurs. –  la nuit…  : par ces mots, Néhémie semble ordonner aux Judéens qui n''habitent pas Jérusalem d''y demeurer pendant la durée des travaux.'
  - type: text
    content: 'Dans ce même temps, je dis encore au peuple : Que chacun passe la nuit dans Jérusalem avec son serviteur ; ils monteront la garde pour nous la nuit, et le jour ils travailleront. '
  '17':
  - type: note
    content: 'chacun n''avait que ses armes et de l''eau  : texte obscur, que certains interprètent et personne ne les jetait (les vêtements) dans l''eau (pour les laver ?) ou chacun ne les ôtait que pour l''eau (des ablutions rituelles ?). D''autres modifient légèrement le texte hébreu traditionnel pour lire chacun n''avait que son arme dans sa main droite, le mot traduit par arme étant dérivé du verbe jeter et désignant de toute évidence une arme de jet, lance ou javelot (même terme en 2Ch 23.10 ; 32.5). La fin du v. est omise par LXX.'
  - type: text
    content: Et nous ne quittions pas nos vêtements, ni moi, ni mes frères, ni mes serviteurs, ni les hommes de garde qui me suivaient ; chacun n'avait que ses armes et de l'eau.
  '2':
  - type: note
    content: 'lui  : le pronom hébreu est masculin, alors qu''on se réfère habituellement à une ville au féminin ; il pourrait désigner Néhémie. Certains modifient légèrement le texte hébreu pour lire pour me (ou pour nous) causer du dommage.'
  - type: text
    content: Ils conspirèrent tous ensemble pour venir attaquer Jérusalem et lui causer du dommage.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'pour nous défendre  : sous-entendu dans le texte.'
  - type: text
    content: 'Mais nous avons prié notre Dieu, et à cause d''eux nous avons mis en place une garde jour et nuit pour nous défendre contre eux. '
  '4':
  - type: note
    content: 'En hébreu ce verset est rythmé comme une lamentation ; il s''agit sans doute d''un proverbe ou d''un chant. Voir 3.38. –  porteurs  : un terme apparenté est traduit par fardeaux au v. 11. –  vacillent  : litt. trébuchent, cf. Ps 31.11 ; Lm 1.14. –  les décombres  : litt. la poussière.'
  - type: text
    content: 'Cependant Juda disait :'
  - type: text
    content: Les forces des porteurs vacillent,
  - type: text
    content: les décombres sont considérables ;
  - type: text
    content: nous ne parviendrons jamais à bâtir la muraille.
  '5':
  - type: text
    content: 'Et nos adversaires disaient : Ils ne sauront et ne verront rien jusqu''à ce que nous arrivions au milieu d''eux ; nous les tuerons, et nous ferons ainsi cesser l''ouvrage. '
  '6':
  - type: note
    content: 'les Judéens…  : cf. v. 16n. –  dix fois Gn 31.7,41 ; Nb 14.22 ; Jb 19.3 ; Dn 1.20. –  De tous les lieux…  : phrase obscure ; la traduction, conjecturale, suppose un appel au secours des Judéens de Jérusalem à ceux de la campagne ; LXX ils montent contre nous de tous côtés (les ennemis) ; certains modifient le texte hébreu traditionnel pour lire de tous les lieux qu''ils habitent, ils montent contre nous ou, en rattachant à la première partie  : vinrent… nous avertir des mauvais desseins qu''ils nourrissaient contre nous.'
  - type: text
    content: 'Or les Judéens qui habitaient près d''eux vinrent dix fois nous avertir : De tous les lieux d''où vous reviendrez, venez vers nous ! '
  '7':
  - type: note
    content: 'je plaçai, dans les enfoncements  : texte obscur, que certains modifient pour lire je plaçai des lanciers derrière la muraille… –  aux endroits découverts  : traduction incertaine ; le même terme est rendu par nu en Ez 24.7s ; 26.4,14 (mais un mot très proche est traduit par lieux arides en Ps 68.7) ; le texte hébreu répète ensuite et je plaçai ou je postai, comme au début du v. –  épées, lances et arcs  : litt. leurs épées, leurs lances et leurs arcs.'
  - type: text
    content: 'C''est pourquoi je plaçai, dans les enfoncements derrière la muraille et aux endroits découverts, le peuple, clan par clan, avec épées, lances et arcs. '
  '8':
  - type: note
    content: 'Je regardai  : autre traduction je vis (leur peur). –  aux notables… 2.16+. –  Souvenez-vous Ps 42.7n. –  grand et redoutable 1.5+.'
  - type: text
    content: 'Je regardai, je me levai et je dis aux notables, aux magistrats et au reste du peuple : N''ayez pas peur d''eux ! Souvenez-vous du Seigneur, qui est grand et redoutable, et combattez pour vos frères, vos fils et vos filles, vos femmes et vos maisons !'
  - type: heading
    content: Néhémie arme ceux qui travaillent
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu avait fait échouer leur projet  : cf. 2S 15.34 ; 17.14 ; Es 8.10 ; 14.27 ; Ps 33.10 ; Jb 5.12s ; Esd 4.5. Certains supposent qu''ensuite le texte portait, à l''origine ils y ont renoncé, et nous sommes tous retournés…'
  - type: text
    content: 'Lorsque nos ennemis apprirent que nous étions avertis, et que Dieu avait fait échouer leur projet, nous retournâmes tous à la muraille, chacun à son ouvrage. '
