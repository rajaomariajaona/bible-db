document_id: NEH.4,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. désigne les quatre provinces perses de Transeuphratène qui entouraient Juda : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
        - type: text
          text: ' ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sanballat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) au nord, l'Arabie (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Arabes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) au sud, la Transjordanie (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) à l'est et la Philistie (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ashdodites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') à l''ouest (cf. 13.23s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la réparation… avançait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''expression hébraïque évoque la cicatrisation d''une plaie ; Jr 8.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même en 2Ch 24.13.'
      marker-yv: yv-n
    - type: text
      text: 'Mais Sanballat, Tobiya, les Arabes, les Ammonites et les Ashdodites furent très fâchés d''apprendre que la réparation des murailles de Jérusalem avançait et qu''on commençait à reboucher les brèches. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mes serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 17 ; 5.10,16 ; 13.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étaient derrière toute la maison…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait comprendre, concrètement'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se tenaient derrière les murailles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus abstraitement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soutenaient le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ou encore, en rattachant au début du v. 11 (ainsi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: )
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soutenaient ceux de la maison de Juda qui bâtissaient la muraille.
      marker-yv: yv-n
    - type: text
      text: 'A partir de ce jour-là, la moitié de mes serviteurs travaillait à l''ouvrage, et l''autre moitié tenait les lances, les boucliers, les arcs et les cuirasses. Les chefs étaient derrière toute la maison de Juda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui portaient ou chargeaient…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou, d''après LXX, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui portaient les fardeaux tout en étant armés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 4 ; 1R 5.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'arme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ceux qui bâtissaient la muraille et ceux qui portaient ou chargeaient les fardeaux travaillaient d''une main et tenaient l''arme de l''autre ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avaient…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chacun (était) ceint de son épée sur ses reins.
      marker-yv: yv-n
    - type: text
      text: 'les bâtisseurs avaient chacun son épée à la ceinture, et ils bâtissaient ainsi. Celui qui sonnait de la trompe se tenait près de moi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je dis aux notables, aux magistrats et au reste du peuple : L''ouvrage est considérable et étendu, et nous sommes dispersés sur la muraille, éloignés les uns des autres. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 14.14 ; Dt 1.30 ; 3.22 ; 20.4 ; 2Ch 20.15ss.
      marker-yv: yv-n
    - type: text
      text: 'Rassemblez-vous auprès de nous, au lieu où vous entendrez le son de la trompe ; notre Dieu combattra pour nous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la moitié d'entre nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la moitié d'entre eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10.'
      marker-yv: yv-n
    - type: text
      text: 'C''est ainsi que nous poursuivions l''ouvrage, la moitié d''entre nous la lance à la main depuis le lever de l''aurore jusqu''à l''apparition des étoiles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec son serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme mes serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la nuit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : par ces mots, Néhémie semble ordonner aux Judéens qui n''habitent pas Jérusalem d''y demeurer pendant la durée des travaux.'
      marker-yv: yv-n
    - type: text
      text: 'Dans ce même temps, je dis encore au peuple : Que chacun passe la nuit dans Jérusalem avec son serviteur ; ils monteront la garde pour nous la nuit, et le jour ils travailleront. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chacun n'avait que ses armes et de l'eau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte obscur, que certains interprètent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et personne ne les jetait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les vêtements) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans l''eau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(pour les laver ?) ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chacun ne les ôtait que pour l''eau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(des ablutions rituelles ?). D''autres modifient légèrement le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chacun n'avait que son arme dans sa main droite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'arme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étant dérivé du verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jeter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et désignant de toute évidence une arme de jet, lance ou javelot (même terme en 2Ch 23.10 ; 32.5). La fin du v. est omise par LXX.
      marker-yv: yv-n
    - type: text
      text: Et nous ne quittions pas nos vêtements, ni moi, ni mes frères, ni mes serviteurs, ni les hommes de garde qui me suivaient ; chacun n'avait que ses armes et de l'eau.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le pronom hébreu est masculin, alors qu''on se réfère habituellement à une ville au féminin ; il pourrait désigner Néhémie. Certains modifient légèrement le texte hébreu pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour me '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: causer du dommage.
      marker-yv: yv-n
    - type: text
      text: Ils conspirèrent tous ensemble pour venir attaquer Jérusalem et lui causer du dommage.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour nous défendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Mais nous avons prié notre Dieu, et à cause d''eux nous avons mis en place une garde jour et nuit pour nous défendre contre eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu ce verset est rythmé comme une lamentation ; il s''agit sans doute d''un proverbe ou d''un chant. Voir 3.38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fardeaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vacillent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trébuchent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ps 31.11 ; Lm 1.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les décombres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la poussière.
      marker-yv: yv-n
    - type: text
      text: 'Cependant Juda disait :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les forces des porteurs vacillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les décombres sont considérables ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ne parviendrons jamais à bâtir la muraille.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et nos adversaires disaient : Ils ne sauront et ne verront rien jusqu''à ce que nous arrivions au milieu d''eux ; nous les tuerons, et nous ferons ainsi cesser l''ouvrage. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Judéens…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dix fois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 31.7,41 ; Nb 14.22 ; Jb 19.3 ; Dn 1.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: De tous les lieux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : phrase obscure ; la traduction, conjecturale, suppose un appel au secours des Judéens de Jérusalem à ceux de la campagne ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils montent contre nous de tous côtés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les ennemis) ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de tous les lieux qu''ils habitent, ils montent contre nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou, en rattachant à la première partie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vinrent… nous avertir des mauvais desseins qu'ils nourrissaient contre nous.
      marker-yv: yv-n
    - type: text
      text: 'Or les Judéens qui habitaient près d''eux vinrent dix fois nous avertir : De tous les lieux d''où vous reviendrez, venez vers nous ! '
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je plaçai, dans les enfoncements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte obscur, que certains modifient pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je plaçai des lanciers derrière la muraille… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux endroits découverts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; le même terme est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ez 24.7s ; 26.4,14 (mais un mot très proche est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lieux arides '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ps 68.7) ; le texte hébreu répète ensuite '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et je plaçai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je postai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au début du v. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: épées, lances et arcs
      - type: usfm
        marker: ft
        children:
