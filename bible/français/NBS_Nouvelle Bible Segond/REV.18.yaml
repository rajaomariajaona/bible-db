  - type: text
    text: 'Autant elle s''est complu dans la gloire et le luxe, autant donnez-lui de tourment et de deuil ! Parce qu''elle se dit : Je suis assise en reine, je ne suis pas veuve, jamais je ne verrai le deuil, '
