  - type: text
    text: 'J''entendis du ciel une autre voix qui disait :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Sortez du milieu d''elle, mon peuple, afin que vous ne soyez pas associés à ses péchés et que vous ne receviez pas une part de ses fléaux. '
