document_id: REV.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La chute de Babylone
  - type: text
    content: ' '
  - type: note
    content: 'je vis descendre… 10.1+. –  gloire  : cf. Ez 43.2.'
  - type: text
    content: 'Après cela, je vis descendre du ciel un autre ange qui avait un grand pouvoir ; la terre fut illuminée de sa gloire. '
  '10':
  - type: note
    content: à distance par crainte v. 15. –  Quel malheur… v. 16,19 ; 8.13+. –  La grande ville 17.18+. –  une seule heure v. 17,19 ; cf. v. 8.
  - type: text
    content: 'Se tenant à distance par crainte de son tourment, ils diront :'
  - type: text
    content: Quel malheur ! Quel malheur ! La grande ville,
  - type: text
    content: Babylone, la ville forte !
  - type: text
    content: En une seule heure est venu ton jugement !
  '11':
  - type: text
    content: ' '
  - type: note
    content: marchands v. 3+ ; cf. Ez 27.36.
  - type: text
    content: 'De même, les marchands de la terre pleurent et mènent deuil sur elle, parce que personne n''achète plus leur cargaison, '
  '12':
  - type: note
    content: Ez 27.12-24.
  - type: text
    content: 'cargaison d''or, d''argent, de pierres précieuses, de perles, de fin lin, de pourpre, de soie, d''écarlate, de tout bois de senteur, de tout objet d''ivoire, de tout objet de bois précieux, de bronze, de fer et de marbre ; '
  '13':
  - type: note
    content: 'parfums / encens 8.3n. –  corps et âmes (ou vies) d''humains  : il s''agit sans doute des esclaves : cf. Gn 36.6n  ; Ez 27.13n.'
  - type: text
    content: cannelle, aromates, parfums, myrrhe, encens, vin, huile, fleur de farine, blé, bœufs, moutons, chevaux, chars, corps et âmes d'humains.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le fruit mûr  : le terme grec correspondant désigne à l''origine l''automne, saison des fruits. –  que tu désirais  : litt. du désir de ton être ou de ton âme , cf. Mt 10.28n. –  pour toi  : autre traduction loin de toi.'
  - type: text
    content: Le fruit mûr que tu désirais
  - type: text
    content: s'en est allé loin de toi ;
  - type: text
    content: toutes ces choses délicates et splendides
  - type: text
    content: sont perdues pour toi,
  - type: text
    content: et on ne les retrouvera plus jamais.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Les marchands  : litt. les marchands de ces choses  ; v. 3+. –  pleureront… Ez 27.31.'
  - type: text
    content: 'Les marchands qui se sont enrichis grâce à elle se tiendront à distance par crainte de son tourment ; ils pleureront et mèneront deuil, '
  '16':
  - type: note
    content: Quel malheur… v. 10. –  pourpre / écarlate 17.4+. –  parée 17.4n.
  - type: text
    content: 'en disant :'
  - type: text
    content: Quel malheur ! Quel malheur ! La grande ville,
  - type: text
    content: vêtue de fin lin, de pourpre et d'écarlate,
  - type: text
    content: parée d'or, de pierres précieuses et de perles !
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ez 27.27-29. –  ont été détruites ou dévastées, sont devenues un désert , comme au v. 19 ; même verbe 17.16n.
  - type: text
    content: En une seule heure, tant de richesses ont été détruites !
  - type: text
    content: 'Tous les pilotes, tous les caboteurs, les marins et tous les travailleurs de la mer se tinrent à distance ; '
  '18':
  - type: note
    content: 'V. 9 ; cf. Es 34.10 ; Jr 22.8 ; Ez 27.32. –  Qui était semblable…  : cf. 13.4.'
  - type: text
    content: 'ils s''écriaient, en voyant la fumée de son embrasement : Qui était semblable à la grande ville ? '
  '19':
  - type: note
    content: Ez 27.30-34. –  une seule heure v. 10+. –  devenue un désert v. 17n  ; Ez 26.19.
  - type: text
    content: 'Ils se jetaient de la poussière sur la tête, ils pleuraient, ils menaient deuil et criaient :'
  - type: text
    content: Quel malheur ! Quel malheur ! La grande ville,
  - type: text
    content: dont l'opulence a enrichi tous ceux qui ont des bateaux sur la mer !
  - type: text
    content: En une seule heure, elle est devenue un désert !
  '2':
  - type: note
    content: 'Il cria 6.10n  ; 7.2+. –  Elle est tombée… 14.8+. –  une habitation de démons… Es 13.21ns ; 34.11-15 ; Jr 9.10 ; 50.39 ; cf. Baruch 4.35 : « Car l''Eternel fera s''abattre un feu sur elle (Babylone) pour de longs jours, et elle sera habitée par des démons pendant plus longtemps encore. » – Voir esprit. –  un repaire de tout animal impur (voir pur, impur) : les mots correspondants sont absents de certains mss.'
  - type: text
    content: 'Il cria :'
  - type: text
    content: 'Elle est tombée, elle est tombée, Babylone la Grande ! Elle est devenue une habitation de démons, un repaire de tout esprit impur et un repaire de tout oiseau impur, un repaire de tout animal impur et détesté, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Sois en fête 12.12+ ; cf. Jr 51.48. –  saints / apôtres / prophètes Lc 11.49 ; Ep 2.20 ; 3.5 ; 4.11 ; 2P 3.2. – Voir justice.
  - type: text
    content: Sois en fête sur elle, ciel !
  - type: text
    content: Vous aussi, saints, apôtres et prophètes !
  - type: text
    content: Car Dieu vous a fait justice en la jugeant.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'ange puissant 5.2+. –  une pierre…  : cf. Jr 51.63s ; Ez 26.12. –  grande ville 17.18+. –  on ne la trouvera plus jamais Ez 26.21.'
  - type: text
    content: 'Alors un ange puissant prit une pierre semblable à une grande meule et il la jeta à la mer, en disant :'
  - type: text
    content: Avec la même violence Babylone, la grande ville, sera jetée à bas,
  - type: text
    content: et on ne la trouvera plus jamais.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'les joueurs…  : litt. le son (le terme est également traduit par voix ou bruit dans d''autres contextes, cf. 14.2n) des joueurs…  ; cf. Es 24.8 ; Jr 25.10 ; Ez 26.13.'
  - type: text
    content: On n'entendra plus jamais chez toi
  - type: text
    content: les joueurs de lyre, les musiciens,
  - type: text
    content: les joueurs de flûte ou de trompette.
  - type: text
    content: On ne trouvera plus jamais chez toi
  - type: text
    content: aucun artisan d'aucune sorte,
  - type: text
    content: on n'entendra plus jamais chez toi
  - type: text
    content: le bruit de la meule ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: Jr 7.34 ; 16.9 ; 25.10. –  tes marchands (v. 3+) étaient les dignitaires (ou grands , cf. 6.15n) Es 23.8 ; 34.12. –  égarées 12.9+. –  sorcellerie 9.21n  ; Ga 5.20n  ; cf. Es 47.9 ; Na 3.4.
  - type: text
    content: la lumière de la lampe
  - type: text
    content: ne brillera plus jamais chez toi,
  - type: text
    content: et on n'entendra plus jamais chez toi
  - type: text
    content: la voix du marié et de la mariée
  - type: text
    content: – parce que tes marchands étaient les dignitaires de la terre,
  - type: text
    content: parce que toutes les nations ont été égarées par ta sorcellerie
  '24':
  - type: text
    content: ' '
  - type: note
    content: le sang… 6.10+ ; cf. Mt 24.35-37/ / ; voir Jr 51.49 ; Ez 24.7 ; 36.18.
  - type: text
    content: – chez elle on a trouvé le sang des prophètes, des saints et de tous ceux qui ont été immolés sur la terre.
  '3':
  - type: note
    content: 'nations  : voir non-Juifs. –  vin 14.8+. –  rois… 17.2n. –  marchands v. 11,15 ; cf. v. 19 ; Es 23.8 ; Ez 27.12,18,33.'
  - type: text
    content: parce que toutes les nations ont bu du vin de la fureur de sa prostitution ; parce que les rois de la terre se sont prostitués avec elle, et que les marchands de la terre se sont enrichis par la puissance de son luxe.
  '4':
  - type: text
    content: ' '
  - type: note
    content: du ciel… 10.4+. –  Sortez du milieu d'elle… Es 48.20 ; 52.11 ; Jr 50.8 ; 51.6-9,45-49 ; 2Co 6.17. –  associés à ses péchés 1Tm 5.22 ; 2Jn 11.
  - type: text
    content: 'J''entendis du ciel une autre voix qui disait :'
  - type: text
    content: 'Sortez du milieu d''elle, mon peuple, afin que vous ne soyez pas associés à ses péchés et que vous ne receviez pas une part de ses fléaux. '
  '5':
  - type: note
    content: Cf. Gn 18.20s ; Jr 51.9.
  - type: text
    content: 'Car ses péchés se sont accumulés jusqu''au ciel, et Dieu s''est souvenu de ses forfaits. '
  '6':
  - type: note
    content: 'Payez-la comme elle a payé  : litt. rendez-lui comme elle aussi a rendu  ; cf. 2.23+ ; Jr 50.15,29 ; Ps 137.8 ; 2Th 1.6. –  au double Es 40.2 ; Jr 16.18. –  versé(-ez)  : litt. mélangé(-ez).'
  - type: text
    content: 'Payez-la comme elle a payé, et rendez-lui au double de ses œuvres ! Dans la coupe où elle a versé, versez-lui au double. '
  '7':
  - type: note
    content: 'Es 47.8. –  elle se dit  : litt. elle dit en son cœur.'
  - type: text
    content: 'Autant elle s''est complu dans la gloire et le luxe, autant donnez-lui de tourment et de deuil ! Parce qu''elle se dit : Je suis assise en reine, je ne suis pas veuve, jamais je ne verrai le deuil, '
  '8':
  - type: note
    content: 'Cf. 17.16+ ; Es 47.9,14 ; Jr 50.31,34. –  jetée  : litt. brûlée, cf. 8.7.'
  - type: text
    content: à cause de cela, en un seul jour ses fléaux viendront, mort, deuil et famine, et elle sera jetée au feu. Car il est fort, le Seigneur Dieu qui l'a jugée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: rois de la terre… 17.2n  ; cf. Ez 26.16s ; 27.30-35. –  se lamenteront 1.7n. –  la fumée de son embrasement v. 18.
  - type: text
    content: 'Tous les rois de la terre qui se sont prostitués et qui se sont complu dans le luxe avec elle pleureront et se lamenteront à son sujet, quand ils verront la fumée de son embrasement. '
