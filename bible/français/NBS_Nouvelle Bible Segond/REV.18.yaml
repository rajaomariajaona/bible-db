      - type: text
        text: '18.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Gn 18.20s ; Jr 51.9.
    marker-yv: yv-n
  - type: text
    text: 'Car ses péchés se sont accumulés jusqu''au ciel, et Dieu s''est souvenu de ses forfaits. '
