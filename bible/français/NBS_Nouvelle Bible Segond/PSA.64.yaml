document_id: PSA.64,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivré des propos destructeurs
  - type: text
    content: ' '
  - type: note
    content: 4.1n.
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'crainte  : cf. 40.4n. –  disent  : autre traduction racontent. –  l''action de Dieu 77.13 ; 90.16 ; 92.5 ; 95.9 ; 111.3 ; 143.5 ; Es 5.12 ; Ha 3.2.'
  - type: text
    content: Tous les humains sont saisis de crainte,
  - type: text
    content: ils disent l'action de Dieu,
  - type: text
    content: ils comprendront son œuvre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 5.12 ; cf. 32.11 ; 33.1 ; 69.33.
  - type: text
    content: 'Le juste se réjouit dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et trouve en lui un abri ;'
  - type: text
    content: tous ceux qui ont le cœur droit pourront être fiers.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.2 ; 5.2 ; 17.1,6 ; 28.2 ; 55.17 ; Jb 7.11.
  - type: text
    content: O Dieu, entends-moi, quand je gémis !
  - type: text
    content: Préserve ma vie de la frayeur de l'ennemi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Soustrais-moi  : litt. cache-moi  ; cf. 27.5+. –  aux projets secrets  : même terme en 25.14+ ; 83.4 ; autre traduction cache-moi loin des délibérations du conseil secret des mauvais (cf. 1.1 ; 31.14+). –  la troupe bruyante ou agitée  ; cf. 2.1. –  malfaisants 5.6+.'
  - type: text
    content: Soustrais-moi aux projets secrets des mauvais,
  - type: text
    content: à la troupe bruyante des malfaisants !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.10+ ; 7.13 ; 11.2 ; 57.5+ ; Jr 9.2s.
  - type: text
    content: Ils aiguisent leur langue comme une épée,
  - type: text
    content: 'ils lancent leurs flèches : des paroles acerbes,'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'depuis leur repaire  : litt. dans des cachettes  ; cf. 10.8s. –  à l''improviste  : autre traduction soudain (cf. v. 8). –  n''ont aucune crainte  : le verbe hébreu fait assonance avec celui qui est traduit par tirer.'
  - type: text
    content: pour tirer depuis leur repaire sur l'homme intègre ;
  - type: text
    content: ils tirent sur lui à l'improviste et n'ont aucune crainte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ils montent…  : autre traduction ils se rendent forts par de mauvaises paroles. –  ils parlent d''enfouir ou ils racontent qu''ils ont enfoui des pièges, ils calculent d''enfouir des pièges  ; certains modifient le texte hébreu traditionnel pour lire ils creusent pour enfouir des pièges  ; cf. 9.16 ; 140.5s ; 142.4 ; Pr 1.11. –  Qui les verra ? Es 29.15.'
  - type: text
    content: 'Ils montent un projet de malheur :'
  - type: text
    content: ils parlent d'enfouir des pièges
  - type: text
    content: 'et disent : Qui les verra ?'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, très diversement rendu par les versions anciennes. –  Ils inventent ou ils combinent , de même plus loin l''invention ou la combine. –  pour l''injustice  : litt. des injustices. Voir justice. –  sommes prêts  : un adjectif apparenté est traduit par intègre au v. 5. –  La pensée intime  : litt. l''intérieur  ; cf. Jr 17.9+. –  un abîme  : litt. profond.'
  - type: text
    content: 'Ils inventent pour l''injustice : Nous sommes prêts,'
  - type: text
    content: l'invention est au point !
  - type: text
    content: La pensée intime, le cœur de chacun est un abîme.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu tire  : cf. 38.3. –  les voilà frappés  : litt. ce sont leurs coups (ou leurs fléaux ) ; certains comprennent ce sont leurs propres coups qui les atteignent.'
  - type: text
    content: Dieu tire une flèche sur eux à l'improviste,
  - type: text
    content: les voilà frappés.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Leur langue les a fait trébucher  : traduction incertaine et approximative d''un texte hébreu obscur. –  de dégoût… hochent la tête  : cf. 22.8+ ; 44.15 ; autre traduction possible de dégoût… prennent la fuite.'
  - type: text
    content: Leur langue les a fait trébucher ;
  - type: text
    content: de dégoût, tous ceux qui les voient hochent la tête.
