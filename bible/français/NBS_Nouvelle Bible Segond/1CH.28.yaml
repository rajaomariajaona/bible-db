    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se leva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se leva sur ses pieds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur ses jambes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; même expression hébraïque en 2R 13.21. En tant que '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'David '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aurait pu rester assis sur son trône pour s''adresser à ses sujets ; son geste est peut-être destiné à réduire la distance sociale entre lui et eux ; on pourrait interpréter dans le même sens l''appellation '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mes frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bâtir une maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.1-14. –  '
    - type: usfm
