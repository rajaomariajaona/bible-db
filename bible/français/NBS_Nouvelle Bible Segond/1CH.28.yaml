    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la maison de mon père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 16.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 16.12.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, m''a choisi parmi toute ma famille afin que je sois roi d''Israël pour toujours ; car il a choisi Juda comme chef, il a choisi ma famille dans la maison de Juda, et parmi les fils de mon père c''est moi qu''il a voulu investir de la royauté sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: beaucoup de fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.1-9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'De tous mes fils – car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a donné beaucoup de fils – il a choisi mon fils Salomon pour le faire asseoir sur le trône du royaume du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', sur Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 17.12s.
    marker-yv: yv-n
  - type: text
    text: 'Il m''a dit : « C''est ton fils Salomon qui bâtira ma maison et mes cours ; car je l''ai choisi pour fils, et moi, je serai pour lui un père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 22.10,13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commandements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voilà pourquoi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme en ce jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 2.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'J''affermirai pour toujours son règne s''il s''attache à mettre en pratique mes commandements et mes règles » – voilà pourquoi il en est ainsi en ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en présence de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux oreilles de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
