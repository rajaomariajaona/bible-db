      children:
      - type: text
        text: marchepied
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 99.5 ; 132.7.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi David se leva et dit : Mes frères, mon peuple, écoutez-moi ! J''avais à cœur de bâtir une maison, un lieu de repos, pour le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le marchepied de notre Dieu, et je me préparais à bâtir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une maison pour mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu as répandu du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Dieu m''a dit : « Tu ne bâtiras pas une maison pour mon nom, car tu es un homme de guerre et tu as répandu du sang. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il a choisi Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.2+ ; Ps 78.68. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
