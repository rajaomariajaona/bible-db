  - type: text
    text: 'David rassembla à Jérusalem tous les chefs d''Israël, les chefs des tribus, les chefs des classes qui étaient au service du roi, les chefs de mille et les chefs de cent, ceux qui étaient responsables de tous les biens et troupeaux du roi et de ses fils, avec les hauts fonctionnaires et les guerriers, tous les vaillants guerriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
