      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que vous possédiez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon la traduction habituelle du verbe, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que vous preniez possession de.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, sous les yeux de tout Israël, de l''assemblée du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et en présence de notre Dieu, observez scrupuleusement tous les commandements du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, afin que vous possédiez ce bon pays et que vous le laissiez comme patrimoine à vos fils après vous pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: connais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: respecter, prendre au sérieux
    - type: usfm
      marker: ft
      children:
      - type: text
