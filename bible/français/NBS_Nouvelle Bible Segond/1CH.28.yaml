    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui prend plaisir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Nb 14.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' sonde tous les cœurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie qu''il connaît les êtres humains jusqu''au plus profond de leur intimité et non seulement de manière superficielle ; cf. Jr 11.20+ ; 12.3 ; 17.10 ; Ps 7.10 ; 17.3 ; Pr 17.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toute forme de pensée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 6.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2Ch 29.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si tu le cherches…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 29.13+s ; 2Ch 15.2.'
    marker-yv: yv-n
  - type: text
    text: 'Et toi, Salomon, mon fils, connais le Dieu de ton père ; sers-le d''un cœur entier, que ton âme y prenne plaisir, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sonde tous les cœurs et discerne toute forme de pensée. Si tu le cherches, il se laissera trouver par toi ; si tu l''abandonnes, il te rejettera à jamais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sois fort et agis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20 ; 22.13,16.'
    marker-yv: yv-n
  - type: text
    text: 'Regarde : maintenant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t''a choisi, afin que tu bâtisses une maison qui soit un sanctuaire. Sois fort et agis.'
