document_id: 1CH.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David présente Salomon comme son successeur
  - type: text
    content: ' '
  - type: note
    content: 'tous les chefs d''Israël désigne l''ensemble de ceux qui détiennent une autorité dans le pays, et dont les diverses catégories sont énumérées dans la suite du v. –  les chefs des tribus  : cf. 27.16-22. –  les chefs des classes  : cf. chap. 23–26. –  les chefs de mille et les chefs de cent sont les chefs militaires, cf. 27.1-15. –  responsables (c''est le même terme hébreu qui est rendu par chefs dans ce v.) de tous les biens…  : cf. 27.25-31n. –  les hauts fonctionnaires  : autre traduction les eunuques (Gn 37.36n). –  les guerriers  : cf. 11.10-47.'
  - type: text
    content: 'David rassembla à Jérusalem tous les chefs d''Israël, les chefs des tribus, les chefs des classes qui étaient au service du roi, les chefs de mille et les chefs de cent, ceux qui étaient responsables de tous les biens et troupeaux du roi et de ses fils, avec les hauts fonctionnaires et les guerriers, tous les vaillants guerriers. '
  '10':
  - type: note
    content: 'Sois fort et agis  : cf. v. 20 ; 22.13,16.'
  - type: text
    content: 'Regarde : maintenant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a choisi, afin que tu bâtisses une maison qui soit un sanctuaire. Sois fort et agis.'
  - type: heading
    content: David remet à Salomon les plans du temple
  '11':
  - type: text
    content: ' '
  - type: note
    content: Comparer les v. 11-19 avec Ex 25 ; 1R 6–7 ; Ez 40–43. –  un modèle ou un plan , de même dans les v. suivants ; cf. Ex 25.9n. –  la maison (c.-à-d. la salle ) de l'expiatoire est la seconde partie du sanctuaire, aussi appelée Très-Sacré ou Saint des saints , où devait être déposé le coffre sacré avec son couvercle spécial (voir Ex 25.17-22).
  - type: text
    content: 'David donna à Salomon, son fils, un modèle du vestibule et de ses maisons, des salles du trésor, des chambres à l''étage, des salles intérieures et de la maison de l''expiatoire ; '
  '12':
  - type: note
    content: 'il lui donna  : sous-entendu dans le texte. –  tout ce qu''il avait dans l''esprit  : autre traduction tout ce qu''il avait reçu du souffle (de Dieu).'
  - type: text
    content: 'il lui donna un modèle de tout ce qu''il avait dans l''esprit concernant les cours de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', toutes les salles de l''enceinte pour les trésors de la maison de Dieu et les trésors sacrés, '
  '13':
  - type: note
    content: 'les classes des prêtres et des lévites  : voir chap. 23–24.'
  - type: text
    content: 'les classes des prêtres et des lévites, toutes les fonctions du service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et tous les objets pour le service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; '
  '14':
  - type: note
    content: 'or / argent  : cf. 22.14.'
  - type: text
    content: 'pour l''or, le poids de ce qui devait être d''or, c''est-à-dire, de tous les objets destinés à chaque service ; pour tous les objets d''argent, le poids de tous les objets destinés à chaque service ; '
  '15':
  - type: text
    content: 'le poids des porte-lampes d''or et de leurs lampes d''or, avec le poids de chaque porte-lampes et de ses lampes ; ainsi que celui des porte-lampes d''argent, avec le poids de chaque porte-lampes et de ses lampes, selon l''usage de chaque porte-lampes ; '
  '16':
  - type: note
    content: pains exposés 1R 7.48n  ; Né 10.34+.
  - type: text
    content: 'le poids de l''or pour les tables des pains exposés, pour chacune des tables, et de l''argent pour les tables d''argent ; '
  '17':
  - type: text
    content: 'pour les fourchettes, les calices et les aiguières d''or pur, les coupes d''or, avec le poids de chaque coupe, et les coupes d''argent, avec le poids de chaque coupe ; '
  '18':
  - type: note
    content: 'Il lui donna  : sous-entendu dans le texte. – Aucun char n''est mentionné dans les textes d''Ex 25, de 1R 6–7 ou d''Ez 40–43. Ici le char semble être une autre appellation du coffre de l''alliance, qui, de symbole de la présence du Seigneur, se serait progressivement transformé en symbole de moyen de déplacement du Seigneur, sous l''influence des visions d''Es 66.15 ; Ez 1 et 10, et Za 6.1-8. –  keroubim (Gn 3.24n) d''or…  : cf. Ex 25.17-22 (leurs ailes est sous-entendu dans le texte).'
  - type: text
    content: 'pour l''autel de l''encens en or épuré, avec le poids. Il lui donna le modèle du char, des keroubim d''or qui étendent leurs ailes et couvrent le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'dit David  : sous-entendu dans le texte (cf. 23.4n). –  tout ce qui est à faire…  : litt. tous les ouvrages du modèle, cf. v. 20s.'
  - type: text
    content: 'C''est par un écrit de sa main, dit David, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a donné de comprendre tout cela, tout ce qui est à faire selon le modèle.'
  '2':
  - type: note
    content: 'se leva  : litt. se leva sur ses pieds (ou sur ses jambes) ; même expression hébraïque en 2R 13.21. En tant que roi, David aurait pu rester assis sur son trône pour s''adresser à ses sujets ; son geste est peut-être destiné à réduire la distance sociale entre lui et eux ; on pourrait interpréter dans le même sens l''appellation Mes frères. –  bâtir une maison  : cf. 17.1-14. –  marchepied  : cf. Ps 99.5 ; 132.7.'
  - type: text
    content: 'Le roi David se leva et dit : Mes frères, mon peuple, écoutez-moi ! J''avais à cœur de bâtir une maison, un lieu de repos, pour le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le marchepied de notre Dieu, et je me préparais à bâtir. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Sois fort et courageux, et agis  : cf. v. 10+. –  n''aie pas peur…  : cf. 22.13 ; Dt 31.8 ; Jg 6.23+ ; 1S 12.20+. –  il ne t''abandonnera pas  : cf. Gn 28.15 ; Dt 31.6,8 ; Jos 1.5.'
  - type: text
    content: 'David dit à Salomon, son fils : Sois fort et courageux, et agis ; n''aie pas peur, ne sois pas terrifié. Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, mon Dieu, sera avec toi ; il ne te délaissera pas, il ne t''abandonnera pas, jusqu''à ce que soit achevé tout l''ouvrage pour le service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'tous les volontaires habiles  : cf. Ex 35.10. –  prêts à exécuter…  : litt. pour toutes tes paroles.'
  - type: text
    content: Voici les classes des prêtres et des lévites pour tout le service de la maison de Dieu. Auprès de toi, pour tout l'ouvrage, il y a tous les volontaires habiles pour toutes sortes de services, les chefs et tout le peuple, prêts à exécuter tous tes ordres.
  '3':
  - type: note
    content: 'une maison pour mon nom 22.7+. –  tu as répandu du sang  : cf. 22.8n.'
  - type: text
    content: 'Mais Dieu m''a dit : « Tu ne bâtiras pas une maison pour mon nom, car tu es un homme de guerre et tu as répandu du sang. » '
  '4':
  - type: note
    content: 'il a choisi Juda  : cf. 5.2+ ; Ps 78.68. –  il a choisi ma famille  : litt. la maison de mon père  ; cf. 1S 16.1. –  c''est moi  : cf. 1S 16.12.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, m''a choisi parmi toute ma famille afin que je sois roi d''Israël pour toujours ; car il a choisi Juda comme chef, il a choisi ma famille dans la maison de Juda, et parmi les fils de mon père c''est moi qu''il a voulu investir de la royauté sur tout Israël. '
  '5':
  - type: note
    content: 'beaucoup de fils  : cf. 3.1-9. –  Salomon  : cf. 22.9n.'
  - type: text
    content: 'De tous mes fils – car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a donné beaucoup de fils – il a choisi mon fils Salomon pour le faire asseoir sur le trône du royaume du '
  - type: text
    content: Seigneur
  - type: text
    content: ', sur Israël. '
  '6':
  - type: note
    content: Cf. 17.12s.
  - type: text
    content: 'Il m''a dit : « C''est ton fils Salomon qui bâtira ma maison et mes cours ; car je l''ai choisi pour fils, et moi, je serai pour lui un père. '
  '7':
  - type: note
    content: 'Cf. 22.10,13. –  commandements  : voir loi. –  voilà pourquoi…  : autre traduction comme en ce jour  ; cf. Dt 2.30n.'
  - type: text
    content: 'J''affermirai pour toujours son règne s''il s''attache à mettre en pratique mes commandements et mes règles » – voilà pourquoi il en est ainsi en ce jour. '
  '8':
  - type: note
    content: 'en présence de  : litt. aux oreilles de. –  observez scrupuleusement  : litt. gardez et cherchez, ce dernier verbe pouvant aussi signifier étudier, scruter, cf. Esd 7.10n. –  que vous possédiez ou, selon la traduction habituelle du verbe, que vous preniez possession de.'
  - type: text
    content: 'Maintenant, sous les yeux de tout Israël, de l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et en présence de notre Dieu, observez scrupuleusement tous les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, afin que vous possédiez ce bon pays et que vous le laissiez comme patrimoine à vos fils après vous pour toujours. '
  '9':
  - type: note
    content: 'connais  : dans le sens de respecter, prendre au sérieux  ; cf. Jr 22.16+ ; Jn 17.3. –  d''un cœur entier  : cf. 29.9,19 ; voir aussi 12.34. –  que ton âme y prenne plaisir  : litt. et d''une âme (cf. Gn 1.20n) qui prend plaisir  ; Nb 14.8n. –  le Seigneur sonde tous les cœurs signifie qu''il connaît les êtres humains jusqu''au plus profond de leur intimité et non seulement de manière superficielle ; cf. Jr 11.20+ ; 12.3 ; 17.10 ; Ps 7.10 ; 17.3 ; Pr 17.3. –  toute forme de pensée  : cf. Gn 6.5n  ; 2Ch 29.18. –  Si tu le cherches…  : cf. Jr 29.13+s ; 2Ch 15.2.'
  - type: text
    content: 'Et toi, Salomon, mon fils, connais le Dieu de ton père ; sers-le d''un cœur entier, que ton âme y prenne plaisir, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sonde tous les cœurs et discerne toute forme de pensée. Si tu le cherches, il se laissera trouver par toi ; si tu l''abandonnes, il te rejettera à jamais. '
