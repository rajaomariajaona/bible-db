document_id: EPH.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 1.1ns ; Col 1.1s. –  apôtre ou envoyé , cf. Ga 1.1n. –  Christ  : voir onction. –  à Ephèse  : ces mots manquent dans plusieurs mss importants ; Marcion a intitulé l''épître aux Laodicéens , cf. Col 4.16 ; voir l''introduction ; voir aussi Ac 18.19-21,24 ; 19.1-40 ; 1Tm 1.3 ; 2Tm 1.18 ; 4.12 ; Ap 1.11 ; 2.1 et l''introduction. – Voir saints . –  dignes de confiance  : autres traductions fidèles, croyants  ; cf. 6.21n  ; voir aussi Jn 20.27n.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, à ceux qui, à Ephèse, sont saints et dignes de confiance en Jésus-Christ : '
  '10':
  - type: note
    content: 'pour le réaliser…  : litt. en vue d''une réalisation (le mot grec a donné notre terme économie  ; il est souvent traduit par intendance  ; de même 3.2,9 ; voir 1Co 4.1n) de la plénitude (ou de l''accomplissement, en grec plérôma  ; ce mot deviendra par la suite l''un des termes techniques du gnosticisme, cf. 2.2n  ; il réapparaît, dans l''épître, en 1.23n  ; 3.19 ; 4.13 ; cf. Col 1.19+ ; voir « La question gnostique »♦) des temps  ; cf. Mc 1.15 ; Ga 4.4n. –  récapituler… ou, peut-être, rassembler, parachever  ; le même verbe grec est traduit par résumer en Rm 13.9 ; il est apparenté au mot rendu par point capital en Hé 8.1, qui est lui-même dérivé du terme traduit plus loin par tête (Ep 1.22n). –  dans les cieux / sur la terre Col 1.16s.'
  - type: text
    content: 'pour le réaliser quand les temps seraient accomplis : récapituler tout dans le Christ, ce qui est dans les cieux comme ce qui est sur la terre.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'nous avons aussi reçu notre part d''héritage  : le verbe correspondant, qui n''apparaît qu''ici dans le N.T., est apparenté au mot traduit plus loin par héritage (v. 14,18) ; cf. Nb 18.20 ; Dt 3.18 ; Ps 16.5 ; Ac 26.18 ; Rm 8.17 ; Ga 3.29 ; 4.7 ; Col 1.12 ; on pourrait aussi comprendre nous avons été désignés comme la part d''héritage (ou le patrimoine ) de Dieu , cf. Ex 34.9 ; certains mss portent nous avons été appelés . –  le projet  : cf. v. 9 (verbe apparenté) ; 3.11 ; Rm 8.28 ; 9.11 ; 2Tm 1.9 ; même terme en Ac 27.13 ; 2Tm 3.10. –  celui qui opère… v. 19s ; 1Co 12.6+.'
  - type: text
    content: 'En lui, nous avons aussi reçu notre part d''héritage, nous qui avons été destinés d''avance, selon le projet de celui qui opère en tout selon les décisions de sa volonté, '
  '12':
  - type: note
    content: 'célébrer…  : litt. être à la louange de sa gloire, cf. v. 6n,14. –  nous qui, d''avance…  : certains comprennent nous qui avons été les premiers à mettre notre espérance…  ; cf. v. 18 ; 2.12 ; 4.4 ; Rm 8.24s ; Col 1.5.'
  - type: text
    content: à célébrer sa gloire, nous qui, d'avance, avons mis notre espérance dans le Christ.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Col 1.4s. –  la parole de la vérité 2Tm 2.15+. –  la bonne nouvelle (2.17 ; 3.6,8 ; 6.15,19) de votre salut  : cf. Ac 13.26 ; Rm 1.16. –  scellés 4.30 ; Rm 4.11 ; 2Co 1.22. –  de l''Esprit saint  : cf. Ga 3.2+. –  qui avait été promis  : litt. de la promesse , cf. 2.12 ; 3.6 ; 6.2 ; Ac 1.4n  ; 2.33 ; Ga 3.14n.'
  - type: text
    content: 'En lui, vous aussi, après avoir entendu la parole de la vérité, la bonne nouvelle de votre salut, en lui, vous êtes venus à la foi et vous avez été scellés de l''Esprit saint qui avait été promis '
  '14':
  - type: note
    content: 'les arrhes 2Co 1.22+. –  la rédemption v. 7+. –  ce qu''il s''est acquis  : litt. l''acquisition (de Dieu ?) (même terme 1Th 5.9 ; 2Th 2.14n  ; Hé 10.39n  ; verbe apparenté Ac 20.28), expression ambiguë (cf. Ml 3.17 ; 1P 2.9n) ; on pourrait aussi comprendre la rédemption qui consistera en l''acquisition (ou l''entrée en possession) de l''héritage (v. 11n, terme apparenté pour mis à part  ; v. 18 ; Ac 20.32+ ; Col 3.24 ; Hé 9.15 ; 1P 1.4). –  afin de célébrer…, comme au v. 6n.'
  - type: text
    content: et qui constitue les arrhes de notre héritage, pour la rédemption de ce qu'il s'est acquis, afin de célébrer sa gloire.
  - type: heading
    content: Intercession
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Rm 1.8+s ; Col 1.3s,9 ; 1Th 1.2-4 ; Phm 4s.
  - type: text
    content: 'C''est pourquoi moi aussi, ayant entendu parler de votre foi dans le Seigneur Jésus et de votre amour pour tous les saints, '
  '16':
  - type: note
    content: 'Cf. Ph 1.3s. –  rendre grâce  : cf. Mt 26.27n.'
  - type: text
    content: 'je ne cesse de rendre grâce pour vous : je fais mention de vous dans mes prières, '
  '17':
  - type: note
    content: 'Cf. 3.14-19. –  le Dieu…  : cf. v. 3+. –  le Père glorieux  : litt. le Père de la gloire  ; cf. Ac 7.2 ; Rm 6.4 ; voir aussi 2Co 1.3 ; Hé 12.9 ; Jc 1.17. –  un esprit  : autre traduction l''Esprit. –  sagesse / révélation  : cf. v. 8 ; 3.2ss ; Es 11.2 ; 1Co 2.1-10 ; 1Jn 5.20 ; voir aussi Jc 1.5n. –  qui vous le fasse connaître  : litt. dans sa connaissance (ou dans la connaissance de lui) ; sur le terme correspondant à connaissance, qui revient en 4.13 et en Col 1.9s ; 2.2 ; 3.10, voir Rm 1.28n.'
  - type: text
    content: 'afin que le Dieu de notre Seigneur Jésus-Christ, le Père glorieux, vous donne un esprit de sagesse et de révélation qui vous le fasse connaître ; '
  '18':
  - type: note
    content: 'qu''il illumine…  : cf. 3.9 ; 5.8-14 ; Ps 13.4 ; 19.9 ; Mt 6.22/ / ; 2Co 4.4-6 ; Hé 6.4 ; Règle de la Communauté (Qumrân) 2.3 : « Qu''Il illumine ton cœur par l''intelligence de vie, et qu''Il te favorise de la Connaissance éternelle ! » 11.3ss : « De la source de Sa Connaissance Il a fait jaillir la lumière qui m''éclaire, et mon œil a contemplé Ses Merveilles, et la lumière de mon cœur perce le Mystère à venir… La lumière dans mon cœur vient de Ses Mystères merveilleux ; c''est dans l''Etre éternel que mon œil a contemplé la Sagesse : parce que la Connaissance est cachée aux hommes… La source de la justice et le réservoir de la puissance, ainsi que la demeure de gloire, sont refusés à l''assemblée de la chair ; c''est à ceux qu''Il a élus que Dieu les a donnés en possession éternelle. Et Il leur a accordé un partage dans le lot des Saints. » –  l''espérance…  : litt. l''espérance (v. 12+) de son appel, c.-à-d. à laquelle vous avez été appelés  ; cf. 4.1,4 ; Col 1.5. –  la glorieuse richesse…  : litt. la richesse (v. 7+) de la gloire (v. 17+) de son héritage v. 14+ ; Col 1.27. –  au milieu des saints ou parmi les saints  ; cf. v. 1+ ; Dt 33.3s ; Za 14.5 ; Jb 5.1 ; Col 1.12 ; Hé 12.22ss.'
  - type: text
    content: 'qu''il illumine les yeux de votre cœur, pour que vous sachiez quelle est l''espérance qui s''attache à son appel, quelle est la glorieuse richesse de son héritage au milieu des saints, '
  '19':
  - type: note
    content: 'Cf. 3.20 ; Es 40.26 ; 2Co 13.4 ; Col 1.11 ; 2.12. –  l''opération souveraine…  : litt. l''opération (le terme a donné notre mot « énergie » ; il est apparenté à celui qui est traduit par mettre en œuvre au v. 20 ; cf. v. 11 ; 2.2 ; 3.7,20) du pouvoir de sa force  ; cf. 3.16 ; 6.10n.'
  - type: text
    content: et quelle est la grandeur surabondante de sa puissance envers nous qui croyons, selon l'opération souveraine de sa force.
  '2':
  - type: note
    content: Grâce et paix… Rm 1.7+.
  - type: text
    content: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
  - type: heading
    content: Une bénédiction complète dans le Christ
  '20':
  - type: text
    content: ' '
  - type: note
    content: Il l'a mise en œuvre… v. 19n  ; cf. Rm 1.4 ; 4.24+ ; 8.11+ ; 1Co 6.14 ; Ph 3.10. –  réveillant ou relevant Ac 3.15n  ; Rm 4.24n  ; voir résurrection. –  en le faisant asseoir (ou siéger )… Ps 110.1 ; cf. Col 3.1 ; Hé 1.3. –  dans les lieux célestes v. 3+.
  - type: text
    content: 'Il l''a mise en œuvre dans le Christ, en le réveillant d''entre les morts et en le faisant asseoir à sa droite dans les lieux célestes, '
  '21':
  - type: note
    content: 'Cf. 2.2 ; 3.10 ; 6.12 ; Rm 8.38 ; 1Co 15.24s ; Col 1.13,16 ; 2.10,15 ; 1P 3.22 ; voir aussi Mt 28.18 ; 1Tm 3.16 ; Hé 1.3s ; 2.5 ; 2P 2.10. –  de tout nom…  : litt. de tout nom nommé  ; cf. Ph 2.9-11. –  ce monde-ci / le monde à venir Mt 12.32n  ; Hé 6.5.'
  - type: text
    content: 'au-dessus de tout principat, de toute autorité, de toute puissance, de toute seigneurie, de tout nom qui puisse se prononcer, non seulement dans ce monde-ci, mais encore dans le monde à venir. '
  '22':
  - type: note
    content: 'Il a tout mis… Ps 8.7  ; cf. 1Co 15.27 ; Hé 2.6-9. –  donné  : cf. 4.11. –  tête ou chef, au-dessus de tout  : cf. v. 10n  ; 4.15+ ; 1Co 11.3. –  à l''Eglise  : cf. 3.10,21 ; 5.23-25,27,29,32 ; Col 1.18,24.'
  - type: text
    content: Il a tout mis sous ses pieds
  - type: text
    content: ' et l''a donné comme tête, au-dessus de tout, à l''Eglise '
  '23':
  - type: note
    content: 'qui est son corps 2.16 ; 4.4-16 ; 5.23-30 ; Rm 12.5+. –  la plénitude (v. 10n), substantif dérivé du verbe traduit par remplir, peut désigner aussi bien ce qui remplit que ce qui est rempli. –  celui qui remplit tout en tous  : autre traduction  : celui (ou ce) qui est à tous égards (cf. 4.15) rempli de tout (ou de tous) ; cf. 4.10 ; 1Co 15.28 ; Col 2.9 ; 3.11 ; voir aussi Jr 23.24 ; Jn 1.16 ; 17.11,20-26.'
  - type: text
    content: qui est son corps, la plénitude de celui qui remplit tout en tous.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 3-14 forment une seule phrase dans le texte grec ; cf. 2Co 1.3+ ; Col 1.3 ; 1P 1.3. –  bénis… dans le Christ  : cf. Ga 3.14. –  dans les lieux célestes  : l''expression grecque (litt. dans les célestes ) est caractéristique de cette épître (v. 20 ; 2.6 ; 3.10 ; 6.12) ; autres emplois du même adjectif, généralement traduit par céleste , en Jn 3.12 ; 1Co 15.40,48s ; Ph 2.10 ( cieux ) ; 2Tm 4.18 ; Hé 3.1 ; 6.4 ; 8.5 ; 9.23 ; 11.16 ; 12.22.'
  - type: text
    content: 'Béni soit le Dieu et Père de notre Seigneur Jésus-Christ, qui nous a bénis de toute bénédiction spirituelle dans les lieux célestes, dans le Christ. '
  '4':
  - type: note
    content: 'Cf. Rm 8.28-30. –  En lui v. 7,11,13. –  choisis ou élus, Jn 6.70+ ; 15.16 ; 2Th 2.13. –  avant la fondation du monde Jn 17.24 ; 1P 1.20 ; Ap 13.8 ; 17.8. –  Dans son amour  : litt. dans l''amour (ou avec amour), ce qui pourrait également se rattacher à ce qui précède  : saints et sans défaut (5.27 ; Col 1.22,28) devant lui dans l''amour.'
  - type: text
    content: 'En lui, il nous a choisis avant la fondation du monde, pour que nous soyons saints et sans défaut devant lui. Dans son amour, '
  '5':
  - type: note
    content: 'destinés d''avance v. 11 ; Ac 4.28 ; Rm 8.29s ; 1Co 2.7 ; cf. Es 49.1 ; Jr 1.5. –  à l''adoption filiale, pour lui (c.-à-d. pour Dieu lui-même, v. 4, ou pour le Christ, 4.15n) : cf. Jn 1.12+ ; Rm 8.15ns ; Ga 4.4s ; 1Jn 3.1. –  sa volonté bienveillante  : litt. le bon plaisir de sa volonté, cf. v. 9.'
  - type: text
    content: 'il nous a destinés d''avance, par Jésus-Christ, à l''adoption filiale, pour lui, selon sa volonté bienveillante, '
  '6':
  - type: note
    content: 'afin de célébrer…  : litt. à la louange de la gloire de sa grâce  ; cf. v. 12,14 ; Ph 1.11. –  dont il nous a comblés  : le verbe grec correspondant est apparenté au mot traduit par grâce  ; il n''apparaît qu''ici et en Lc 1.28. –  en son bien-aimé  : cf. Dt 32.15n  ; Es 44.2 ; 2Ch 20.7 ; Mt 3.17/ / ; Mc 12.6/ / ; Jn 3.35 ; 10.17 ; 15.9 ; 17.24,26 ; Col 1.13 ; 2P 1.17.'
  - type: text
    content: afin de célébrer la gloire de sa grâce, dont il nous a comblés en son bien-aimé.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Col 1.13s. –  la rédemption v. 14 ; 4.30 ; Rm 3.24+. –  par son sang 2.13 ; Rm 3.25 ; 5.9 ; Col 1.20 ; Hé 9.12,22 ; Ap 1.5 ; 5.9. –  pardon des fautes  : cf. Ac 2.38+ ; voir péché. –  la richesse de sa grâce  : cf. v. 18 ; 2.7 ; 3.8,16 ; Rm 9.23+ ; 11.33.'
  - type: text
    content: 'En lui, nous avons la rédemption par son sang, le pardon des fautes selon la richesse de sa grâce, '
  '8':
  - type: note
    content: 'qu''il nous a octroyée abondamment  : le sujet sous-entendu est vraisemblablement, ici, Dieu plutôt que le Christ. –  sagesse et intelligence v. 17 ; 3.10 ; 5.15 ; Col 1.9 ; 4.5 ; voir aussi Lc 1.17n.'
  - type: text
    content: 'qu''il nous a octroyée abondamment, en toute sagesse et intelligence. '
  '9':
  - type: note
    content: 'fait connaître  : même verbe 3.3,5,10 (porter à la connaissance de) ; 6.19,21 (mettre au courant de) ; Rm 9.22s ; 16.26 ; 1Co 12.3n  ; cf. Col 1.27 ; 4.7,9. –  le mystère de sa volonté 3.3ss ; Rm 16.25+ ; 1Co 2.7-9. –  le projet…  : litt. selon son bon plaisir (v. 5n) qu''il s''est proposé (verbe apparenté au mot traduit par projet au v. 11 et en 3.11) en lui.'
  - type: text
    content: 'Il nous a fait connaître le mystère de sa volonté, le projet bienveillant qu''il s''était proposé en lui, '
