    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la patte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
