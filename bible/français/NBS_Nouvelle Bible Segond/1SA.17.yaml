      marker: fr
      children:
      - type: text
        text: '17.55 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 14.50+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: De qui ce garçon est-il le fils
    - type: usfm
      marker: ft
      children:
