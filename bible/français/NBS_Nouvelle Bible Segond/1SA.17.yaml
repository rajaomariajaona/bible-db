      - type: text
        text: v. 12 ; 16.1+,18.
    marker-yv: yv-n
  - type: text
    text: 'Saül lui dit : Mon garçon, de qui es-tu le fils ? Et David répondit : Je suis le fils de ton serviteur Jessé, le Bethléhémite.'
