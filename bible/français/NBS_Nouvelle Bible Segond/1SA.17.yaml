    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ps 22.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' soit avec toi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.19+ ; 20.13 ; Ex 18.19 ; Jos 1.17 ; 2S 14.17 ; 1Ch 22.11,16 ; Rm 15.33 ; 2Th 3.16.'
    marker-yv: yv-n
  - type: text
    text: 'David dit encore : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui m''a délivré de la griffe du lion et de la griffe de l''ours, me délivrera aussi de la main de ce Philistin. Alors Saül dit à David : Va, et que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit avec toi !'
- type: usfm
  marker: s1
  children:
