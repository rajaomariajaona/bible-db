        text: par son dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Cf. 2R 2.24 ; voir aussi l''expression '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénir
      - type: text
        text: ' au nom (du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: )
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Dt 21.5 ; 2S 6.18/ / ; Ps 129.8.'
    marker-yv: yv-n
  - type: text
    text: 'Le Philistin dit à David : Suis-je un chien, que tu viennes contre moi avec des bâtons ? Puis le Philistin maudit David par ses dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 1R 20.11 ; Pr 16.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je donnerai ta chair…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 46 ; Dt 28.26 ; 1R 14.11 ; 16.4 ; 21.24 ; Jr 7.33 ; 16.4 ; 19.7 ; Ps 79.2 ; Ap 19.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux bêtes des champs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux bêtes sauvages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même possibilité au v. 46.'
    marker-yv: yv-n
  - type: text
    text: 'Enfin le Philistin dit à David : Viens à moi, et je donnerai ta chair aux oiseaux du ciel et aux bêtes des champs. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avec l''épée… au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : en hébreu, c''est la même préposition qui est employée les deux fois, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec l''épée… avec le nom… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au nom du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.10 ; Ps 20.8 ; 124.8 ; 2Ch 14.10 ; 32.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'défié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: outragé, déshonoré.
    marker-yv: yv-n
  - type: text
    text: 'David dit au Philistin : Tu viens à moi avec l''épée, la lance et le javelot ; moi, je viens à toi au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu des troupes d''Israël, que tu as défié. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: te livrera à moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 47 ; 23.11s,20 ; 24.19 ; 26.8 ; 30.15 ; Dt 23.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ps 31.9 ; Lm 2.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je te frapperai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je te tuerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je donnerai les cadavres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX précise '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je donnerai ton cadavre et les cadavres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'toute la terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout le pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. Jos 4.24 ; 1R 18.36s ; 2R 19.19 ; Ps 46.11.
    marker-yv: yv-n
  - type: text
    text: 'En ce jour, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' te livrera à moi, je te frapperai et je te couperai la tête ; en ce jour, je donnerai les cadavres du camp des Philistins aux oiseaux du ciel et aux animaux de la terre, et ainsi toute la terre saura qu''il y a un Dieu pour Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.47 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' sauve'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 33.29 ; 2S 23.10,12 ; Os 1.7 ; Ps 44.7s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le combat appartient au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 14.14 ; 15.3 ; Ps 24.8 ; Pr 21.31 ; Ap 19.11.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi toute cette assemblée saura que ce n''est ni par l''épée ni par la lance que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sauve. Car le combat appartient au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et c''est lui qui vous a livrés à nous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.48 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vers le front
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même expression au v. 22 ; l''idée est peut-être que David vient se placer en face du Philistin.'
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt que le Philistin se remit à s''approcher de David, David se dépêcha de courir vers le front à la rencontre du Philistin. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.49 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la lança avec sa fronde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduit un seul mot hébreu (un verbe de la même famille que le substantif '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fronde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du v. 40). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tomba face contre terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.3s.'
    marker-yv: yv-n
  - type: text
    text: 'David mit la main dans sa gibecière, y prit une pierre et la lança avec sa fronde ; il frappa le Philistin au front ; la pierre pénétra dans le front du Philistin, qui tomba face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.50 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il le mit à mort…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il frappa le Philistin et le mit à mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans avoir d'épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 3.31 ; 15.15 ; 2S 23.21.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi, avec une fronde et une pierre, David fut plus fort que le Philistin ; il le mit à mort, sans avoir d''épée à la main. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.51 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 54 ; 21.9s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lui coupa la tête '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 46 ; cf. 31.9 ; 2S 16.9 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Judith
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.8 (Judith décapite le général ennemi Holopherne) : « Elle frappa deux fois sur son cou de toute sa vigueur et elle lui ôta la tête. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la fuite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Hé 11.34.'
    marker-yv: yv-n
  - type: text
    text: David courut près du Philistin ; il lui prit son épée, la tira du fourreau et le tua ; il lui coupa la tête avec l'épée.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Les Philistins, voyant que leur héros était mort, prirent la fuite. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.52 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'entrée de la vallée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement un endroit où la vallée s''élargit et débouche sur un espace plus dégagé ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'entrée de Gath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', l''une des cinq villes des Philistins, à côté d''Eqrôn (cf. 5.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shaaraïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est une localité dont l'emplacement exact n'est pas connu, elle est mentionnée en Jos 15.36 et 1Ch 4.31.
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt, les hommes d''Israël et de Juda lancèrent des acclamations ; ils poursuivirent les Philistins jusqu''à l''entrée de la vallée et jusqu''aux portes d''Eqrôn. Les Philistins blessés à mort tombèrent sur le chemin de Shaaraïm, jusqu''à Gath et Eqrôn. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.53 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: poursuivi… avec ardeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe Gn 31.36 ; Lm 4.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pillèrent leur camp
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 7.16 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Judith '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.11 : « Tout le peuple pilla le camp pendant trente jours. » Voir Jr 30.16 ; Ez 39.10.'
    marker-yv: yv-n
  - type: text
    text: 'Après avoir poursuivi les Philistins avec ardeur, les Israélites revinrent et pillèrent leur camp. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.54 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La mention de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jérusalem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans ce verset est surprenante, car David ne s''emparera de la ville que plus tard (cf. 2S 5.6-10). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les armes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 51.'
    marker-yv: yv-n
  - type: text
    text: David prit la tête du Philistin et l'apporta à Jérusalem ; il mit dans sa tente les armes du Philistin.
- type: usfm
  marker: s1
