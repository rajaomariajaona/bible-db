      - type: text
        text:  ; le mot hébreu correspondant peut désigner les vêtements de manière générale, mais ici il s'applique plus probablement à l'équipement militaire, dont plusieurs pièces sont énumérées dans la suite.
    marker-yv: yv-n
  - type: text
    text: 'Saül revêtit David de ses propres habits ; il plaça sur sa tête un casque de bronze et le revêtit d''une cuirasse. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'épée de Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' dit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Saül ceignit David de son épée.
    marker-yv: yv-n
  - type: text
    text: 'David mit l''épée de Saül à sa ceinture, par-dessus ses habits, et il essaya vainement de marcher : il n''était pas entraîné. Il dit alors à Saül : Je ne peux pas marcher avec tout cela, car je ne suis pas entraîné. David s''en débarrassa '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son bâton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Za 11.7,10,14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: oued
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 26.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
