      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Philistin toisa David avec mépris, ne voyant en lui qu''un jeune garçon roux, de belle apparence. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Suis-je un chien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 3.8 ; 9.8 ; 16.9 ; 2R 8.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des bâtons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon le v. 40, David avait '
    - type: usfm
      marker: fqa
      children:
