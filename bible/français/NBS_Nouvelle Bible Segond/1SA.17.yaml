        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Saül avait vu David sortir à la rencontre du Philistin, il avait dit à Abner, le chef de l''armée : De qui ce garçon est-il le fils, Abner ? Abner avait répondu : Par ta vie, ô roi, je ne le sais pas ! '
  - type: usfm
    marker: v
