  - type: text
    text: Le Philistin Goliath défie l'armée d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs troupes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs camps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour la guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 4.1 ; 13.5 ; 14.52 ; 19.8 ; 23.1 ; 28.1 ; 31.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Soko et Azéqa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : deux localités situées sur le versant occidental des monts de Juda, à une trentaine de kilomètres de Jérusalem ; cf. Jos 10.10. Le lieu-dit '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ephès-Dammim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Pas-Dammim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1Ch 11.13) n'est pas identifié.
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins rassemblèrent leurs troupes pour la guerre. Ils se rassemblèrent à Soko, qui appartient à Juda ; ils dressèrent leur camp entre Soko et Azéqa, à Ephès-Dammim. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vallée du Térébinthe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dépression située entre Soko et Azéqa, qui porte aujourd''hui le nom de Ouadi es-Sant.'
    marker-yv: yv-n
  - type: text
    text: 'Saül et les hommes d''Israël se rassemblèrent aussi ; ils dressèrent leur camp dans la vallée du Térébinthe et ils se rangèrent en ordre de bataille face aux Philistins. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les Philistins campaient probablement sur le flanc de la montagne au nord-ouest de la vallée, du côté d'Azéqa, les Israélites au sud-est, du côté de Soko ; cf. 23.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins se tenaient dans la montagne, d''un côté, et Israël se tenait dans la montagne, de l''autre côté : la vallée était entre eux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un champion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un homme de l'entre-deux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression que l''on ne trouve qu''ici et au v. 23 ; elle désignait probablement un soldat qui proposait aux ennemis un combat singulier devant se dérouler sous les yeux des deux troupes adverses. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du camp
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des camps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Goliath… de Gath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : un homme du même nom est mentionné en 2S 21.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: six coudées et un empan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : près de trois mètres (voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies).'
    marker-yv: yv-n
  - type: text
    text: 'Un champion sortit alors du camp des Philistins et s''avança. Il se nommait Goliath, il était de Gath et avait une taille de six coudées et un empan. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cinq mille sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : près de 50 kg.'
    marker-yv: yv-n
  - type: text
    text: 'Il avait sur la tête un casque de bronze et portait une cuirasse à écailles, en bronze, qui pesait cinq mille sicles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en bandoulière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entre ses épaules.
    marker-yv: yv-n
  - type: text
    text: 'Il avait aux jambes des jambières de bronze, et un javelot de bronze en bandoulière. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le bois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon une tradition juive ancienne ; texte hébreu traditionnel '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la flèche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(une seule lettre de différence entre les mots hébreux correspondants). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''ensouple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est la pièce de bois cylindrique du métier à tisser, sur laquelle se fixent les fils de chaîne, puis s''enroule le tissu confectionné. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en fer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision indique peut-être une avance technologique des Philistins, par rapport aux Israélites qui en seraient restés au bronze. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: six cents sicles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : près de 6 kg. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le porteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 9.54+.'
    marker-yv: yv-n
  - type: text
    text: 'Le bois de sa lance était comme l''ensouple des tisserands et la pointe de sa lance, en fer, pesait six cents sicles. Le porteur du grand bouclier marchait devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lignes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme hébreu a été traduit soit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lignes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 10,21,23), soit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'front '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 20,22,48 ; 4.2,12,16) ou encore occasionnellement par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'troupes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 26,36,45). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Philistin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on pourrait aussi comprendre le terme comme un collectif et traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les Philistins '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(représentés par Goliath). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les gens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les sujets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'esclaves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 9. Cf. 8.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui descende contre moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui vienne se mesurer à moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (en combat singulier) ; cf. 2S 2.14s.
    marker-yv: yv-n
  - type: text
    text: 'Il s''arrêta et cria aux lignes d''Israël : Pourquoi sortez-vous en ordre de bataille ? Ne suis-je pas, moi, le Philistin, et vous, n''êtes-vous pas les gens de Saül ? Choisissez un homme qui descende contre moi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: S'il réussit à me battre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''il peut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(verbe traduit dans la suite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'emporter sur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me combattre et qu'il me frappe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'S''il réussit à me battre, nous serons vos esclaves ; mais si je l''emporte sur lui, si je le bats, vous serez nos esclaves et vous nous servirez. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je lance… un défi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu ainsi traduit peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: déshonorer, outrager
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 25s,36,45 ; voir aussi 2S 13.13 ; 21.21 ; 23.9 ; 2R 19.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',16,22s ; 1Ch 20.7 ; 2Ch 32.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lignes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: troupes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 45) ; cf. v. 20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Philistin dit encore : Je lance en ce jour un défi aux lignes d''Israël ! Donnez-moi un homme, et nous nous battrons ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils furent terrifiés…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 1.21 ; 31.8 ; Jos 8.1.'
    marker-yv: yv-n
  - type: text
    text: Saül et tout Israël entendirent ces paroles du Philistin ; ils furent terrifiés, ils avaient très peur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David envoyé par son père au camp d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les v. 12-31 sont absents d''un important ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ephratite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mi 5.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jessé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 16.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: huit fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 16.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un vieillard
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un vieillard '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: ancien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'venant parmi les hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au moyen des hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), expression énigmatique ; on a aussi compris que Jessé, trop âgé pour servir personnellement dans l''armée de Saül, est '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'venu par des hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en envoyant trois de ses fils à sa place (v. 13).
    marker-yv: yv-n
  - type: text
    text: 'Or David était fils de cet Ephratite de Beth-Léhem de Juda, nommé Jessé, qui avait huit fils et qui, aux jours de Saül, était un vieillard. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trois fils aînés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.6-9.'
    marker-yv: yv-n
  - type: text
    text: 'Les trois fils aînés de Jessé étaient partis pour la guerre derrière Saül ; voici le nom de ses trois fils qui étaient partis à la guerre : Eliab, le premier-né, Abinadab, le deuxième, et Shamma, le troisième. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le plus jeune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le petit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 16.11.'
    marker-yv: yv-n
  - type: text
    text: 'David était le plus jeune. Comme les trois aînés étaient partis derrière Saül, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David partage son temps entre le service personnel de Saül (cf. 16.18-23) et son activité familiale de berger (16.11).
    marker-yv: yv-n
  - type: text
    text: David allait chez Saül, puis il revenait pour faire paître le troupeau de son père à Beth-Léhem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quarante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : nombre traditionnel dans l''Ecriture ; cf. 4.18 ; Gn 7.4 ; Ex 24.18 ; 34.28 ; Nb 13.25 ; 1R 19.8 ; Mt 4.2.'
    marker-yv: yv-n
  - type: text
    text: 'Le Philistin s''avançait matin et soir. Il se présenta ainsi pendant quarante jours. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: épha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesure
      - type: text
        text: ' de capacité, évaluée à 36 l par certains, 45 l par d''autres. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cours les porter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: porte-les vite.
    marker-yv: yv-n
  - type: text
    text: 'Jessé dit à son fils David : Prends pour tes frères cet épha de grain rôti et ces dix pains, je te prie, et cours les porter à tes frères dans le camp. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au chef de leur phratrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au chef de leur contingent, au chef de mille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu verras comment vont tes frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 37.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un gage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. une preuve que la mission a bien été accomplie ; il est peu probable, comme on a voulu parfois l''interpréter, que Jessé demande à David de rapporter '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les gages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. la solde, de ses frères.'
    marker-yv: yv-n
  - type: text
    text: 'Tu apporteras aussi ces dix fromages au chef de leur phratrie. Tu verras comment vont tes frères et tu prendras un gage de leur part. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vallée du Térébinthe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2.
    marker-yv: yv-n
  - type: text
    text: Ils sont avec Saül et tous les hommes d'Israël dans la vallée du Térébinthe et font la guerre aux Philistins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prit sa charge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: emporta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le complément d''objet (ce que son père avait préparé, v. 17s) est sous-entendu en hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au camp
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu correspondant ne se trouve qu''ici et en 26.5-7 ; il désigne probablement l''endroit, à l''arrière des lignes, où l''on rassemblait les chars et le reste de l''équipement (cf. v. 22 ; 10.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 30.24). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le front
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: acclamations de guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 4.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 7.21 ; Am 1.14 ; 2.2.'
    marker-yv: yv-n
  - type: text
    text: 'David se leva de bon matin. Il laissa le troupeau à un gardien, prit sa charge et partit, comme Jessé le lui avait ordonné. Lorsqu''il arriva au camp, l''armée partait pour le front et lançait des acclamations de guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lignes contre lignes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rang en face de rang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',20.'
    marker-yv: yv-n
  - type: text
    text: 'Israël et les Philistins se rangèrent en ordre de bataille, lignes contre lignes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il demanda… comment ils allaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David se défit de son équipement, le laissa à celui qui gardait le matériel et courut vers le front. Aussitôt arrivé, il demanda à ses frères comment ils allaient. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le champion des Philistins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'homme de l'entre-deux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de leurs lignes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après une ancienne tradition juive ; le texte hébreu traditionnel porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des grottes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(les deux mots ne diffèrent que par une consonne). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le même discours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8-10.'
    marker-yv: yv-n
  - type: text
    text: 'Tandis qu''il parlait avec eux, le champion des Philistins monta de leurs lignes ; il se nommait Goliath ; c''était un Philistin de Gath. Il tint le même discours, et David l''entendit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: reculèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'enfuirent, se mirent à fuir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 4.3 ; Nb 16.34 ; Dt 34.7 ; Ps 114.3,5 ; Ct 2.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(devant un géant) : cf. Nb 13.33 ; Dt 9.2.'
    marker-yv: yv-n
  - type: text
    text: 'A la vue de cet homme, tous les hommes d''Israël reculèrent ; ils avaient très peur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les hommes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un homme d'Israël dit ; en Israël, chacun disait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'défier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: outrager, déshonorer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je lance… un défi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), 26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa fille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.27 ; Jos 15.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exemptera d'impôts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : interprétation, dans la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ', d''une tournure hébraïque peu claire ; on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'affranchira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: anoblira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la maison de son père.
    marker-yv: yv-n
  - type: text
    text: 'Les hommes d''Israël disaient : Avez-vous vu monter cet homme ? C''est pour défier Israël qu''il monte ! A celui qui le tuera, le roi accordera de grandes richesses, il lui donnera sa fille et il exemptera d''impôts sa famille en Israël.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David s'offre pour combattre Goliath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: relèvera le défi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lavera le déshonneur, l'outrage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',25,36,45 ; cf. 25.39 ; 2S 13.13 ; 21.21 ; 23.9 ; 2R 19.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',16,22s ; 1Ch 20.7 ; 2Ch 32.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Ps 69.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cet incirconcis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jg 14.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu vivant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jos 3.10 ; Hé 12.22.'
    marker-yv: yv-n
  - type: text
    text: 'David dit aux hommes qui se tenaient avec lui : Que fera-t-on pour celui qui tuera ce Philistin et relèvera le défi lancé à Israël ? Qui est donc ce Philistin, cet incirconcis qui ose défier les troupes du Dieu vivant ? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le peuple, répétant les mêmes paroles, lui dit : Voilà ce qu''on fera pour celui qui le tuera. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Eliab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: descendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Beth-Léhem se situe à plus de 700 m d''altitude, Azéqa (v. 1) à environ 400 m. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ton arrogance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ta prétention, ton insolence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Eliab reproche à David de n''être qu''un gamin qui veut jouer à l''homme. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' mauvais'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d., sans doute, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes mauvaises intentions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', suscitées par une curiosité malsaine.'
    marker-yv: yv-n
  - type: text
    text: 'Eliab, son frère aîné, qui l''avait entendu parler aux hommes, se mit en colère contre David. Il dit : Pourquoi es-tu descendu, et à qui as-tu laissé ce petit troupeau dans le désert ? Je connais bien, moi, ton arrogance et ton cœur mauvais. C''est pour voir la bataille que tu es descendu ! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''ai-je donc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maintenant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En voilà une affaire ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'n''est-ce pas une parole ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une chose ?
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Tournure assez énigmatique, parfois comprise comme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'j''ai simplement posé une question ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La réponse de David exprime sans doute son agacement face aux insinuations perfides de son aîné. Cf. Pr 15.1.
    marker-yv: yv-n
  - type: text
    text: 'David répondit : Qu''ai-je donc fait ? En voilà une affaire ! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il se détourna de lui pour s'adresser à un autre et lui posa les mêmes questions. On lui répondit comme la première fois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les hommes qui avaient entendu ce que disait David en informèrent Saül, qui le fit chercher. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que personne ne se décourage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que le cœur de personne ne tombe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne défaille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 20.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à cause de lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le pronom hébreu peut se rapporter soit au '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Philistin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit à celui qui perd courage ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en lui-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moi, ton serviteur, j'irai me battre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 14.6 ; Ps 27.1 ; 118.6s.'
    marker-yv: yv-n
  - type: text
    text: 'David dit à Saül : Que personne ne se décourage à cause de lui ! Moi, ton serviteur, j''irai me battre avec ce Philistin. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un jeune garçon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un jeune homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 42 ; le mot hébreu correspondant désigne parfois un soldat au début de sa carrière militaire, cf. 2S 2.14 ; avec ou sans nuance militaire, il évoque l''idée d''inexpérience, par opposition à l’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'homme de guerre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qu''est le Philistin adulte (cf. 16.18, où la même expression hébraïque est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: guerrier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Saül dit à David : Tu ne peux pas aller vers ce Philistin pour te battre avec lui, car tu n''es qu''un jeune garçon ; lui, c''est un homme de guerre depuis sa jeunesse. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le lion ou l'ours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''ordre des mots, selon le principe de la gradation, semble indiquer que l''ours était considéré comme plus dangereux que le lion, cf. v. 36 ; Am 5.19.'
    marker-yv: yv-n
  - type: text
    text: 'David dit à Saül : Je faisais paître le troupeau de mon père. Quand le lion ou l''ours venait enlever une bête du troupeau, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je délivrais la bête de sa gueule
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 31.39 ; Ex 22.12 ; Am 3.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la barbe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot semble désigner ici un emplacement de l''anatomie de l''animal, c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la gorge '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le menton '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: '), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la mâchoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je le frappais et je le tuais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
