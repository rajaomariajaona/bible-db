        text: je le frappais à mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 14.5s ; 2S 23.20.'
    marker-yv: yv-n
  - type: text
    text: 'je lui courais après, je le frappais et je délivrais la bête de sa gueule. S''il se dressait contre moi, je le saisissais par la barbe, je le frappais et je le tuais. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.36 '
