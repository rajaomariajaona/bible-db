      children:
      - type: text
        text: dans le récipient des bergers qu'il avait et dans la besace
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il serait aussi possible de traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
