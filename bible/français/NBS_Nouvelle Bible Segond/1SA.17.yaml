document_id: 1SA.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Philistin Goliath défie l'armée d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'leurs troupes  : litt. leurs camps . –  pour la guerre  : cf. 4.1 ; 13.5 ; 14.52 ; 19.8 ; 23.1 ; 28.1 ; 31.1. –  Soko et Azéqa  : deux localités situées sur le versant occidental des monts de Juda, à une trentaine de kilomètres de Jérusalem ; cf. Jos 10.10. Le lieu-dit Ephès-Dammim ( Pas-Dammim en 1Ch 11.13) n''est pas identifié.'
  - type: text
    content: 'Les Philistins rassemblèrent leurs troupes pour la guerre. Ils se rassemblèrent à Soko, qui appartient à Juda ; ils dressèrent leur camp entre Soko et Azéqa, à Ephès-Dammim. '
  '10':
  - type: note
    content: 'Je lance… un défi  : le verbe hébreu ainsi traduit peut aussi signifier déshonorer, outrager, cf. v. 25s,36,45 ; voir aussi 2S 13.13 ; 21.21 ; 23.9 ; 2R 19.4n,16,22s ; 1Ch 20.7 ; 2Ch 32.17n. –  lignes (ou troupes) d''Israël (v. 45) ; cf. v. 20n.'
  - type: text
    content: 'Le Philistin dit encore : Je lance en ce jour un défi aux lignes d''Israël ! Donnez-moi un homme, et nous nous battrons ensemble. '
  '11':
  - type: note
    content: 'ils furent terrifiés…  : cf. Dt 1.21 ; 31.8 ; Jos 8.1.'
  - type: text
    content: Saül et tout Israël entendirent ces paroles du Philistin ; ils furent terrifiés, ils avaient très peur.
  - type: heading
    content: David envoyé par son père au camp d'Israël
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 12-31 sont absents d''un important ms de LXX. –  Ephratite  : cf. 1.1n  ; Mi 5.1. –  Jessé  : cf. 16.1n. –  huit fils  : cf. 16.10n. –  un vieillard  : litt. un vieillard (ou un ancien ) venant parmi les hommes (ou au moyen des hommes ), expression énigmatique ; on a aussi compris que Jessé, trop âgé pour servir personnellement dans l''armée de Saül, est venu par des hommes en envoyant trois de ses fils à sa place (v. 13).'
  - type: text
    content: 'Or David était fils de cet Ephratite de Beth-Léhem de Juda, nommé Jessé, qui avait huit fils et qui, aux jours de Saül, était un vieillard. '
  '13':
  - type: note
    content: 'trois fils aînés  : cf. 16.6-9.'
  - type: text
    content: 'Les trois fils aînés de Jessé étaient partis pour la guerre derrière Saül ; voici le nom de ses trois fils qui étaient partis à la guerre : Eliab, le premier-né, Abinadab, le deuxième, et Shamma, le troisième. '
  '14':
  - type: note
    content: 'le plus jeune  : litt. le petit, comme en 16.11.'
  - type: text
    content: 'David était le plus jeune. Comme les trois aînés étaient partis derrière Saül, '
  '15':
  - type: note
    content: David partage son temps entre le service personnel de Saül (cf. 16.18-23) et son activité familiale de berger (16.11).
  - type: text
    content: David allait chez Saül, puis il revenait pour faire paître le troupeau de son père à Beth-Léhem.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'quarante  : nombre traditionnel dans l''Ecriture ; cf. 4.18 ; Gn 7.4 ; Ex 24.18 ; 34.28 ; Nb 13.25 ; 1R 19.8 ; Mt 4.2.'
  - type: text
    content: 'Le Philistin s''avançait matin et soir. Il se présenta ainsi pendant quarante jours. '
  '17':
  - type: note
    content: 'épha  : mesure de capacité, évaluée à 36 l par certains, 45 l par d''autres. –  cours les porter ou porte-les vite.'
  - type: text
    content: 'Jessé dit à son fils David : Prends pour tes frères cet épha de grain rôti et ces dix pains, je te prie, et cours les porter à tes frères dans le camp. '
  '18':
  - type: note
    content: 'au chef de leur phratrie  : autres traductions au chef de leur contingent, au chef de mille 10.19n. –  Tu verras comment vont tes frères  : cf. 10.4n  ; Gn 37.14. –  un gage  : c.-à-d. une preuve que la mission a bien été accomplie ; il est peu probable, comme on a voulu parfois l''interpréter, que Jessé demande à David de rapporter les gages, c.-à-d. la solde, de ses frères.'
  - type: text
    content: 'Tu apporteras aussi ces dix fromages au chef de leur phratrie. Tu verras comment vont tes frères et tu prendras un gage de leur part. '
  '19':
  - type: note
    content: vallée du Térébinthe v. 2.
  - type: text
    content: Ils sont avec Saül et tous les hommes d'Israël dans la vallée du Térébinthe et font la guerre aux Philistins.
  '2':
  - type: note
    content: 'vallée du Térébinthe  : dépression située entre Soko et Azéqa, qui porte aujourd''hui le nom de Ouadi es-Sant.'
  - type: text
    content: 'Saül et les hommes d''Israël se rassemblèrent aussi ; ils dressèrent leur camp dans la vallée du Térébinthe et ils se rangèrent en ordre de bataille face aux Philistins. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'prit sa charge  : litt. emporta  ; le complément d''objet (ce que son père avait préparé, v. 17s) est sous-entendu en hébreu. –  au camp  : le mot hébreu correspondant ne se trouve qu''ici et en 26.5-7 ; il désigne probablement l''endroit, à l''arrière des lignes, où l''on rassemblait les chars et le reste de l''équipement (cf. v. 22 ; 10.22n  ; 30.24). –  le front  : cf. v. 8n. –  acclamations de guerre  : cf. 4.5n  ; Jg 7.21 ; Am 1.14 ; 2.2.'
  - type: text
    content: 'David se leva de bon matin. Il laissa le troupeau à un gardien, prit sa charge et partit, comme Jessé le lui avait ordonné. Lorsqu''il arriva au camp, l''armée partait pour le front et lançait des acclamations de guerre. '
  '21':
  - type: note
    content: lignes contre lignes ou rang en face de rang  ; cf. v. 8n,20.
  - type: text
    content: 'Israël et les Philistins se rangèrent en ordre de bataille, lignes contre lignes. '
  '22':
  - type: note
    content: 'il demanda… comment ils allaient  : cf. 10.4n.'
  - type: text
    content: 'David se défit de son équipement, le laissa à celui qui gardait le matériel et courut vers le front. Aussitôt arrivé, il demanda à ses frères comment ils allaient. '
  '23':
  - type: note
    content: 'le champion des Philistins  : litt. l''homme de l''entre-deux, cf. v. 4. –  de leurs lignes  : d''après une ancienne tradition juive ; le texte hébreu traditionnel porte des grottes (les deux mots ne diffèrent que par une consonne). –  le même discours  : cf. v. 8-10.'
  - type: text
    content: 'Tandis qu''il parlait avec eux, le champion des Philistins monta de leurs lignes ; il se nommait Goliath ; c''était un Philistin de Gath. Il tint le même discours, et David l''entendit. '
  '24':
  - type: note
    content: 'reculèrent  : autres traductions s''enfuirent, se mirent à fuir  ; cf. Ex 4.3 ; Nb 16.34 ; Dt 34.7 ; Ps 114.3,5 ; Ct 2.17. –  peur (devant un géant) : cf. Nb 13.33 ; Dt 9.2.'
  - type: text
    content: 'A la vue de cet homme, tous les hommes d''Israël reculèrent ; ils avaient très peur. '
  '25':
  - type: note
    content: 'Les hommes…  : autres traductions un homme d''Israël dit ; en Israël, chacun disait. –  défier ou outrager, déshonorer  ; cf. v. 10n (je lance… un défi), 26. –  sa fille  : cf. 18.27 ; Jos 15.16. –  exemptera d''impôts  : interprétation, dans la Vg, d''une tournure hébraïque peu claire ; on a aussi compris affranchira ou anoblira. –  sa famille  : litt. la maison de son père.'
  - type: text
    content: 'Les hommes d''Israël disaient : Avez-vous vu monter cet homme ? C''est pour défier Israël qu''il monte ! A celui qui le tuera, le roi accordera de grandes richesses, il lui donnera sa fille et il exemptera d''impôts sa famille en Israël.'
  - type: heading
    content: David s'offre pour combattre Goliath
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'relèvera le défi  : autre traduction lavera le déshonneur, l''outrage  ; cf. v. 10n,25,36,45 ; cf. 25.39 ; 2S 13.13 ; 21.21 ; 23.9 ; 2R 19.4n,16,22s ; 1Ch 20.7 ; 2Ch 32.17n  ; voir Ps 69.10. –  cet incirconcis  : cf. Jg 14.3n. –  Dieu vivant  : cf. Jos 3.10 ; Hé 12.22.'
  - type: text
    content: 'David dit aux hommes qui se tenaient avec lui : Que fera-t-on pour celui qui tuera ce Philistin et relèvera le défi lancé à Israël ? Qui est donc ce Philistin, cet incirconcis qui ose défier les troupes du Dieu vivant ? '
  '27':
  - type: text
    content: 'Le peuple, répétant les mêmes paroles, lui dit : Voilà ce qu''on fera pour celui qui le tuera. '
  '28':
  - type: note
    content: 'Eliab  : cf. 16.6. –  descendu  : Beth-Léhem se situe à plus de 700 m d''altitude, Azéqa (v. 1) à environ 400 m. –  ton arrogance ou ta prétention, ton insolence  ; Eliab reproche à David de n''être qu''un gamin qui veut jouer à l''homme. –  ton cœur mauvais  : c.-à-d., sans doute, tes mauvaises intentions, suscitées par une curiosité malsaine.'
  - type: text
    content: 'Eliab, son frère aîné, qui l''avait entendu parler aux hommes, se mit en colère contre David. Il dit : Pourquoi es-tu descendu, et à qui as-tu laissé ce petit troupeau dans le désert ? Je connais bien, moi, ton arrogance et ton cœur mauvais. C''est pour voir la bataille que tu es descendu ! '
  '29':
  - type: note
    content: 'Qu''ai-je donc (litt. maintenant) fait  : sous-entendu de mal. –  En voilà une affaire ! litt. n''est-ce pas une parole ? (ou une chose ?). Tournure assez énigmatique, parfois comprise comme j''ai simplement posé une question ! La réponse de David exprime sans doute son agacement face aux insinuations perfides de son aîné. Cf. Pr 15.1.'
  - type: text
    content: 'David répondit : Qu''ai-je donc fait ? En voilà une affaire ! '
  '3':
  - type: note
    content: Les Philistins campaient probablement sur le flanc de la montagne au nord-ouest de la vallée, du côté d'Azéqa, les Israélites au sud-est, du côté de Soko ; cf. 23.26n.
  - type: text
    content: 'Les Philistins se tenaient dans la montagne, d''un côté, et Israël se tenait dans la montagne, de l''autre côté : la vallée était entre eux.'
  '30':
  - type: text
    content: Il se détourna de lui pour s'adresser à un autre et lui posa les mêmes questions. On lui répondit comme la première fois.
  '31':
  - type: text
    content: 'Les hommes qui avaient entendu ce que disait David en informèrent Saül, qui le fit chercher. '
  '32':
  - type: note
    content: 'Que personne ne se décourage  : litt. que le cœur de personne ne tombe ou ne défaille  ; cf. Dt 20.3s. –  à cause de lui ou en lui  ; le pronom hébreu peut se rapporter soit au Philistin, soit à celui qui perd courage (en lui-même). –  Moi, ton serviteur, j''irai me battre…  : cf. 16.16n  ; voir aussi 14.6 ; Ps 27.1 ; 118.6s.'
  - type: text
    content: 'David dit à Saül : Que personne ne se décourage à cause de lui ! Moi, ton serviteur, j''irai me battre avec ce Philistin. '
  '33':
  - type: note
    content: 'un jeune garçon  : autre traduction un jeune homme, cf. v. 42 ; le mot hébreu correspondant désigne parfois un soldat au début de sa carrière militaire, cf. 2S 2.14 ; avec ou sans nuance militaire, il évoque l''idée d''inexpérience, par opposition à l’homme de guerre qu''est le Philistin adulte (cf. 16.18, où la même expression hébraïque est traduite par guerrier).'
  - type: text
    content: 'Saül dit à David : Tu ne peux pas aller vers ce Philistin pour te battre avec lui, car tu n''es qu''un jeune garçon ; lui, c''est un homme de guerre depuis sa jeunesse. '
  '34':
  - type: note
    content: 'le lion ou l''ours  : l''ordre des mots, selon le principe de la gradation, semble indiquer que l''ours était considéré comme plus dangereux que le lion, cf. v. 36 ; Am 5.19.'
  - type: text
    content: 'David dit à Saül : Je faisais paître le troupeau de mon père. Quand le lion ou l''ours venait enlever une bête du troupeau, '
  '35':
  - type: note
    content: 'je délivrais la bête de sa gueule  : cf. Gn 31.39 ; Ex 22.12 ; Am 3.12. –  la barbe  : le mot semble désigner ici un emplacement de l''anatomie de l''animal, c.-à-d. la gorge (LXX), le menton (Vg), la mâchoire (Tg). –  je le frappais et je le tuais ou je le frappais à mort  ; cf. Jg 14.5s ; 2S 23.20.'
  - type: text
    content: 'je lui courais après, je le frappais et je délivrais la bête de sa gueule. S''il se dressait contre moi, je le saisissais par la barbe, je le frappais et je le tuais. '
  '36':
  - type: note
    content: 'j''ai abattu  : cf. 4.2n. –  défié ou déshonoré, outragé, cf. v. 10n  ; 2R 19.22/ /; Es 37.23. –  les troupes  : cf. v. 8n,20n. –  Dieu vivant  : cf. v. 26+.'
  - type: text
    content: 'C''est ainsi que j''ai abattu le lion et l''ours ; le Philistin, cet incirconcis, sera comme l''un d''eux, car il a défié les troupes du Dieu vivant ! '
  '37':
  - type: note
    content: 'la griffe  : litt. la main  ; autres traductions la patte ou des griffes  ; cf. Ps 22.21. –  que le Seigneur soit avec toi  : cf. 3.19+ ; 20.13 ; Ex 18.19 ; Jos 1.17 ; 2S 14.17 ; 1Ch 22.11,16 ; Rm 15.33 ; 2Th 3.16.'
  - type: text
    content: 'David dit encore : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui m''a délivré de la griffe du lion et de la griffe de l''ours, me délivrera aussi de la main de ce Philistin. Alors Saül dit à David : Va, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec toi !'
  - type: heading
    content: David tue Goliath
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'ses propres habits  : litt. ses habits  ; le mot hébreu correspondant peut désigner les vêtements de manière générale, mais ici il s''applique plus probablement à l''équipement militaire, dont plusieurs pièces sont énumérées dans la suite.'
  - type: text
    content: 'Saül revêtit David de ses propres habits ; il plaça sur sa tête un casque de bronze et le revêtit d''une cuirasse. '
  '39':
  - type: note
    content: 'l''épée de Saül  : litt. son épée  ; un ms de LXX dit Saül ceignit David de son épée.'
  - type: text
    content: 'David mit l''épée de Saül à sa ceinture, par-dessus ses habits, et il essaya vainement de marcher : il n''était pas entraîné. Il dit alors à Saül : Je ne peux pas marcher avec tout cela, car je ne suis pas entraîné. David s''en débarrassa '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Un champion  : litt. un homme de l''entre-deux , expression que l''on ne trouve qu''ici et au v. 23 ; elle désignait probablement un soldat qui proposait aux ennemis un combat singulier devant se dérouler sous les yeux des deux troupes adverses. –  du camp  : litt. des camps , comme au v. 1. –  Goliath… de Gath  : un homme du même nom est mentionné en 2S 21.19. –  six coudées et un empan  : près de trois mètres (voir mesures, poids et monnaies).'
  - type: text
    content: 'Un champion sortit alors du camp des Philistins et s''avança. Il se nommait Goliath, il était de Gath et avait une taille de six coudées et un empan. '
  '40':
  - type: note
    content: 'son bâton  : cf. Za 11.7,10,14. –  oued  : cf. Gn 26.17n. –  dans son sac…  : litt. dans le récipient des bergers qu''il avait et dans la besace  ; il serait aussi possible de traduire dans une poche de son sac de berger. –  sa fronde à la main  : en Jg 15.15, Samson tue mille adversaires avec une arme tout aussi insignifiante, une mâchoire d''âne.'
  - type: text
    content: et prit son bâton, se choisit cinq pierres polies dans l'oued et les mit dans son sac de berger, dans sa besace. Puis, sa fronde à la main, il s'avança vers le Philis tin.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme qui portait…  : cf. 16.21n.'
  - type: text
    content: 'Le Philistin s''approcha peu à peu de David, précédé de l''homme qui portait son grand bouclier. '
  '42':
  - type: note
    content: 'toisa David avec mépris  : litt. regarda et vit David et le méprisa  ; cf. 2S 6.16 ; Ps 123.4 ; 1Co 1.28. –  jeune garçon v. 33n. –  roux, de belle apparence  : cf. 16.12n.'
  - type: text
    content: 'Le Philistin toisa David avec mépris, ne voyant en lui qu''un jeune garçon roux, de belle apparence. '
  '43':
  - type: note
    content: 'Suis-je un chien  : cf. 2S 3.8 ; 9.8 ; 16.9 ; 2R 8.13. –  des bâtons  : selon le v. 40, David avait un bâton  ; ici le pluriel a peut-être une valeur de généralisation ; LXX avec un bâton et des pierres. –  par ses dieux  : autre traduction par son dieu. Cf. 2R 2.24 ; voir aussi l''expression bénir au nom (du Seigneur), Dt 21.5 ; 2S 6.18/ / ; Ps 129.8.'
  - type: text
    content: 'Le Philistin dit à David : Suis-je un chien, que tu viennes contre moi avec des bâtons ? Puis le Philistin maudit David par ses dieux. '
  '44':
  - type: note
    content: 'Voir 1R 20.11 ; Pr 16.18. –  je donnerai ta chair…  : cf. v. 46 ; Dt 28.26 ; 1R 14.11 ; 16.4 ; 21.24 ; Jr 7.33 ; 16.4 ; 19.7 ; Ps 79.2 ; Ap 19.21. –  aux bêtes des champs  : autre traduction aux bêtes sauvages  ; même possibilité au v. 46.'
  - type: text
    content: 'Enfin le Philistin dit à David : Viens à moi, et je donnerai ta chair aux oiseaux du ciel et aux bêtes des champs. '
  '45':
  - type: note
    content: 'avec l''épée… au nom…  : en hébreu, c''est la même préposition qui est employée les deux fois, litt. avec l''épée… avec le nom… –  au nom du Seigneur  : cf. 2.10 ; Ps 20.8 ; 124.8 ; 2Ch 14.10 ; 32.8. –  défié ou outragé, déshonoré.'
  - type: text
    content: 'David dit au Philistin : Tu viens à moi avec l''épée, la lance et le javelot ; moi, je viens à toi au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu des troupes d''Israël, que tu as défié. '
  '46':
  - type: note
    content: 'te livrera à moi  : cf. v. 47 ; 23.11s,20 ; 24.19 ; 26.8 ; 30.15 ; Dt 23.16n  ; Ps 31.9 ; Lm 2.7. –  je te frapperai ou je te tuerai. –  je donnerai les cadavres  : LXX précise je donnerai ton cadavre et les cadavres. –  toute la terre ou tout le pays. –  pour Israël  : des versions anciennes ont lu en Israël. Cf. Jos 4.24 ; 1R 18.36s ; 2R 19.19 ; Ps 46.11.'
  - type: text
    content: 'En ce jour, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te livrera à moi, je te frapperai et je te couperai la tête ; en ce jour, je donnerai les cadavres du camp des Philistins aux oiseaux du ciel et aux animaux de la terre, et ainsi toute la terre saura qu''il y a un Dieu pour Israël. '
  '47':
  - type: note
    content: 'le Seigneur sauve  : cf. Dt 33.29 ; 2S 23.10,12 ; Os 1.7 ; Ps 44.7s. –  le combat appartient au Seigneur  : cf. Ex 14.14 ; 15.3 ; Ps 24.8 ; Pr 21.31 ; Ap 19.11.'
  - type: text
    content: 'Ainsi toute cette assemblée saura que ce n''est ni par l''épée ni par la lance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sauve. Car le combat appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: ', et c''est lui qui vous a livrés à nous.'
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'vers le front  : même expression au v. 22 ; l''idée est peut-être que David vient se placer en face du Philistin.'
  - type: text
    content: 'Aussitôt que le Philistin se remit à s''approcher de David, David se dépêcha de courir vers le front à la rencontre du Philistin. '
  '49':
  - type: note
    content: 'la lança avec sa fronde traduit un seul mot hébreu (un verbe de la même famille que le substantif fronde du v. 40). –  tomba face contre terre  : cf. 5.3s.'
  - type: text
    content: 'David mit la main dans sa gibecière, y prit une pierre et la lança avec sa fronde ; il frappa le Philistin au front ; la pierre pénétra dans le front du Philistin, qui tomba face contre terre. '
  '5':
  - type: note
    content: 'cinq mille sicles  : près de 50 kg.'
  - type: text
    content: 'Il avait sur la tête un casque de bronze et portait une cuirasse à écailles, en bronze, qui pesait cinq mille sicles. '
  '50':
  - type: note
    content: 'il le mit à mort…  : litt. il frappa le Philistin et le mit à mort. –  sans avoir d''épée  : cf. Jg 3.31 ; 15.15 ; 2S 23.21.'
  - type: text
    content: 'Ainsi, avec une fronde et une pierre, David fut plus fort que le Philistin ; il le mit à mort, sans avoir d''épée à la main. '
  '51':
  - type: note
    content: 'son épée  : cf. v. 54 ; 21.9s. –  lui coupa la tête v. 46 ; cf. 31.9 ; 2S 16.9 ; Judith 13.8 (Judith décapite le général ennemi Holopherne) : « Elle frappa deux fois sur son cou de toute sa vigueur et elle lui ôta la tête. » –  la fuite  : cf. Hé 11.34.'
  - type: text
    content: David courut près du Philistin ; il lui prit son épée, la tira du fourreau et le tua ; il lui coupa la tête avec l'épée.
  - type: text
    content: 'Les Philistins, voyant que leur héros était mort, prirent la fuite. '
  '52':
  - type: note
    content: 'l''entrée de la vallée  : probablement un endroit où la vallée s''élargit et débouche sur un espace plus dégagé ; LXX l''entrée de Gath, l''une des cinq villes des Philistins, à côté d''Eqrôn (cf. 5.1n). –  Shaaraïm est une localité dont l''emplacement exact n''est pas connu, elle est mentionnée en Jos 15.36 et 1Ch 4.31.'
  - type: text
    content: 'Aussitôt, les hommes d''Israël et de Juda lancèrent des acclamations ; ils poursuivirent les Philistins jusqu''à l''entrée de la vallée et jusqu''aux portes d''Eqrôn. Les Philistins blessés à mort tombèrent sur le chemin de Shaaraïm, jusqu''à Gath et Eqrôn. '
  '53':
  - type: note
    content: 'poursuivi… avec ardeur  : même verbe Gn 31.36 ; Lm 4.19. –  pillèrent leur camp  : cf. 2R 7.16 ; Judith 15.11 : « Tout le peuple pilla le camp pendant trente jours. » Voir Jr 30.16 ; Ez 39.10.'
  - type: text
    content: 'Après avoir poursuivi les Philistins avec ardeur, les Israélites revinrent et pillèrent leur camp. '
  '54':
  - type: note
    content: 'La mention de Jérusalem dans ce verset est surprenante, car David ne s''emparera de la ville que plus tard (cf. 2S 5.6-10). –  les armes  : cf. v. 51.'
  - type: text
    content: David prit la tête du Philistin et l'apporta à Jérusalem ; il mit dans sa tente les armes du Philistin.
  - type: heading
    content: Jonathan conclut un pacte d'amitié avec David
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'Abner  : cf. 14.50+. –  De qui ce garçon est-il le fils  : dans la culture israélite, l''identité d''un individu se détermine souvent par rapport à quelqu''un d''autre, le père (cf. 1R 4.8-19) ou le maître (cf. 1S 30.13). –  Par ta vie  : cf. 1.26n.'
  - type: text
    content: 'Lorsque Saül avait vu David sortir à la rencontre du Philistin, il avait dit à Abner, le chef de l''armée : De qui ce garçon est-il le fils, Abner ? Abner avait répondu : Par ta vie, ô roi, je ne le sais pas ! '
  '56':
  - type: note
    content: 'Renseigne-toi…  : litt. demande, toi  ; cf. v. 22 ; 1.20n.'
  - type: text
    content: '– Renseigne-toi donc pour savoir de qui ce jeune homme est le fils, dit le roi. '
  '57':
  - type: note
    content: 'la tête du Philistin  : cf. v. 51,54.'
  - type: text
    content: 'Quand David fut de retour après avoir tué le Philistin, Abner le prit et l''amena devant Saül. David avait à la main la tête du Philistin. '
  '58':
  - type: note
    content: Jessé… v. 12 ; 16.1+,18.
  - type: text
    content: 'Saül lui dit : Mon garçon, de qui es-tu le fils ? Et David répondit : Je suis le fils de ton serviteur Jessé, le Bethléhémite.'
  '6':
  - type: note
    content: 'en bandoulière  : litt. entre ses épaules.'
  - type: text
    content: 'Il avait aux jambes des jambières de bronze, et un javelot de bronze en bandoulière. '
  '7':
  - type: note
    content: 'Le bois  : selon une tradition juive ancienne ; texte hébreu traditionnel la flèche (une seule lettre de différence entre les mots hébreux correspondants). –  l''ensouple est la pièce de bois cylindrique du métier à tisser, sur laquelle se fixent les fils de chaîne, puis s''enroule le tissu confectionné. –  en fer  : cette précision indique peut-être une avance technologique des Philistins, par rapport aux Israélites qui en seraient restés au bronze. –  six cents sicles  : près de 6 kg. –  Le porteur  : cf. Jg 9.54+.'
  - type: text
    content: 'Le bois de sa lance était comme l''ensouple des tisserands et la pointe de sa lance, en fer, pesait six cents sicles. Le porteur du grand bouclier marchait devant lui. '
  '8':
  - type: note
    content: 'lignes  : le même terme hébreu a été traduit soit par lignes (v. 10,21,23), soit par front (v. 20,22,48 ; 4.2,12,16) ou encore occasionnellement par troupes (v. 26,36,45). –  le Philistin  : on pourrait aussi comprendre le terme comme un collectif et traduire les Philistins (représentés par Goliath). –  les gens ou les sujets, litt. les serviteurs  ; le même mot est traduit par esclaves au v. 9. Cf. 8.17. –  qui descende contre moi  : c.-à-d. qui vienne se mesurer à moi (en combat singulier) ; cf. 2S 2.14s.'
  - type: text
    content: 'Il s''arrêta et cria aux lignes d''Israël : Pourquoi sortez-vous en ordre de bataille ? Ne suis-je pas, moi, le Philistin, et vous, n''êtes-vous pas les gens de Saül ? Choisissez un homme qui descende contre moi. '
  '9':
  - type: note
    content: 'S''il réussit à me battre  : litt. s''il peut (verbe traduit dans la suite par l''emporter sur) me combattre et qu''il me frappe, cf. 4.2n.'
  - type: text
    content: 'S''il réussit à me battre, nous serons vos esclaves ; mais si je l''emporte sur lui, si je le bats, vous serez nos esclaves et vous nous servirez. '
