        text: ' : dans la culture israélite, l''identité d''un individu se détermine souvent par rapport à quelqu''un d''autre, le père (cf. 1R 4.8-19) ou le maître (cf. 1S 30.13). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Par ta vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.26'
      - type: usfm
