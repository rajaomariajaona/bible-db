        text: les troupes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu vivant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 26+.'
    marker-yv: yv-n
  - type: text
    text: 'C''est ainsi que j''ai abattu le lion et l''ours ; le Philistin, cet incirconcis, sera comme l''un d''eux, car il a défié les troupes du Dieu vivant ! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
