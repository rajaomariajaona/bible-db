    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa fronde à la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : en Jg 15.15, Samson tue mille adversaires avec une arme tout aussi insignifiante, une mâchoire d''âne.'
    marker-yv: yv-n
  - type: text
    text: et prit son bâton, se choisit cinq pierres polies dans l'oued et les mit dans son sac de berger, dans sa besace. Puis, sa fronde à la main, il s'avança vers le Philis tin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.41 '
