document_id: EZK.42,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dépendances du temple
  - type: text
    content: ' '
  - type: note
    content: 'aux salles  : le terme hébreu est au singulier, mais il faut sans doute le prendre dans un sens collectif ; cf. 40.17+. –  secteur 41.12n.'
  - type: text
    content: 'Il me fit sortir vers la cour extérieure, du côté nord, et il me conduisit aux salles qui étaient en face du secteur et en face du bâtiment, au nord. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'est  : LXX sud . Au lieu de la largeur est , certains comprennent la largeur qui va vers l''est , ce qui pourrait suggérer un bâtiment orienté est-ouest, dont les salles donneraient sur le sud. –  en face  : formule différente de celle qui apparaît aux v. 1,3.'
  - type: text
    content: 'Il y avait encore des salles sur la largeur est de la clôture de la cour, en face du secteur et en face du bâtiment. '
  '11':
  - type: note
    content: 'un passage  : litt. un chemin, de même au v. 12. –  leur aspect…  : litt. comme l''aspect des salles.'
  - type: text
    content: 'Devant elles, il y avait un passage ; leur aspect était comme celui des salles qui étaient du côté nord. Leur longueur et leur largeur étaient les mêmes ; leurs issues, leur disposition et leurs entrées étaient semblables. '
  '12':
  - type: note
    content: 'qui se trouvait juste  : traduction conjecturale ; dans l''usage post-biblique le mot hébreu qui apparaît ici signifie convenable  ; il pourrait s''agir ici du nom ou d''un qualificatif du passage ou de la clôture (clôture de protection  ?) ; certains modifient le texte hébreu traditionnel pour lire devant l''estrade des musiciens.'
  - type: text
    content: 'Il en était de même pour les entrées des salles du côté sud. Il y avait une entrée en face du passage, du passage qui se trouvait juste devant la clôture du côté de l''est, par où l''on entrait. '
  '13':
  - type: note
    content: 'les salles sacrées  : autre traduction les salles du sanctuaire. –  qui se présentent  : litt. proches  ; cf. 40.46+ (terme apparenté). –  les choses très sacrées  : cf. Lv 2.3+. –  Ils y déposeront  : autre traduction on y déposera. –  offrandes végétales 44.29 ; 45.15ss,24s ; 46.5ss,20 ; Lv 2.1n. –  péché / réparation 40.39+. –  ce lieu est sacré  : cf. v. 20 ; Mt 24.15 ; voir aussi saint.'
  - type: text
    content: 'Il me dit : Les salles du nord et les salles du sud qui sont devant le secteur, ce sont les salles sacrées, où les prêtres qui se présentent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mangeront les choses très sacrées. Ils y déposeront les choses très sacrées, les offrandes végétales, les sacrifices pour le péché et les sacrifices de réparation : ce lieu est sacré. '
  '14':
  - type: note
    content: 'Cf. 44.19. –  Quand les prêtres…  : LXX nul n''y entrera que les prêtres ; ils ne sortiront pas… –  pour se présenter au peuple  : autre traduction pour s''approcher de l''endroit réservé au peuple (cf. 46.3).'
  - type: text
    content: Quand les prêtres seront entrés, ils ne sortiront pas du sanctuaire vers la cour extérieure, mais ils déposeront là les vêtements avec lesquels ils officient, car ces vêtements sont sacrés ; ils mettront d'autres vêtements pour se présenter au peuple.
  - type: heading
    content: Les dimensions de l'enceinte
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'enceinte  : sous-entendu dans le texte. – 40.3,6+.'
  - type: text
    content: 'Lorsqu''il eut achevé de mesurer la Maison intérieure, il me fit sortir par la porte qui donnait sur l''est, et il mesura l''enceinte tout autour. '
  '16':
  - type: note
    content: 'le côté, litt. le vent, pour indiquer la direction (cf. 37.9), de même dans les v. suivants. –  en tout  : litt. (tout) autour, dernier mot du v. en hébreu ; LXX l''a rattaché au v. 17 et lu  : et il tourna (18) et mesura…, de même dans la suite (cf. v. 19). –  cinq cents cannes  : d''après la lecture traditionnelle de l''hébreu, des versions anciennes et les v. suivants ; l''autre traduction textuelle cinq coudées [ ?] de cannes, est probablement due à une inversion de lettres en hébreu. En additionnant les mesures indiquées précédemment, on aboutirait plutôt à 500 coudées (≈ 250 m) pour le côté de l''ensemble (45.2) ; peut-être les 500 cannes (plus de 1 500 m ; cf. 40.3n,5n) se rapportent-elles à une zone plus vaste s''étendant autour du temple.'
  - type: text
    content: 'Il mesura le côté de l''est avec la canne à mesurer : en tout cinq cents cannes, avec la canne à mesurer. '
  '17':
  - type: text
    content: 'Il mesura le côté du nord : en tout cinq cents cannes, avec la canne à mesurer. '
  '18':
  - type: note
    content: LXX intervertit ce v. et le v. 19.
  - type: text
    content: 'Il mesura le côté du sud avec la canne qui servait de mesure : cinq cents cannes, avec la canne à mesurer. '
  '19':
  - type: text
    content: 'Il se tourna du côté de l''ouest et mesura cinq cents cannes avec la canne à mesurer. '
  '2':
  - type: note
    content: Texte obscur. LXX semble n'avoir lu ni le mot pour façade, ni celui pour entrée. –  cent et cinquante coudées ≈ 52 m et 26 m, respectivement ; voir mesures, poids et monnaies.
  - type: text
    content: 'Sur la façade où se trouvait l''entrée nord, il y avait une longueur de cent coudées, et la largeur était de cinquante coudées. '
  '20':
  - type: note
    content: 'la muraille 40.5+. –  quatre vents  : cf. 37.9 ; 1Ch 9.24. –  cannes  : sous-entendu dans le texte. –  Cette muraille était là  : sous-entendu dans le texte ; cf. 22.26n. –  sacré… profane  : voir saint.'
  - type: text
    content: 'Il mesura le tour de la muraille, dans les directions des quatre vents : la longueur était de cinq cents cannes et la largeur de cinq cents cannes. Cette muraille était là pour séparer le sacré du profane.'
  '3':
  - type: note
    content: 'des vingt coudées (≈ 10,50 m) : cf. 41.10 ; LXX des portes (permutation de lettres). –  galerie 41.15n. –  en trois étages  : traduction incertaine, cf. 41.6ns ; certains voient ici trois lignes parallèles de bâtiments, étagés sur la déclivité entre les deux cours et séparés par une allée (v. 4).'
  - type: text
    content: 'C''était en face des vingt coudées de la cour intérieure, et en face du dallage de la cour extérieure, une galerie faisant face à une autre galerie, en trois étages. '
  '4':
  - type: note
    content: 'Cf. 46.19. –  dix coudées ≈ 5,20 m. –  et un chemin d''une coudée (≈ 52 cm) : LXX, Syr et longue de cent coudées.'
  - type: text
    content: 'Devant les salles, il y avait une allée large de dix coudées vers l''intérieur et un chemin d''une coudée ; leurs entrées donnaient sur le nord. '
  '5':
  - type: note
    content: Traduction incertaine ; cf. 41.7.
  - type: text
    content: 'Les salles supérieures étaient plus étroites que les salles inférieures et que celles du milieu du bâtiment, parce que des galeries empiétaient sur elles. '
  '6':
  - type: note
    content: 'Il y avait trois étages  : litt. elles étaient triples  ; cf. v. 3n,5. –  des cours  : certains modifient le texte hébreu traditionnel pour lire des (salles) extérieures  ; cf. 40.17. –  C''est pourquoi…  : texte obscur et traduction conjecturale.'
  - type: text
    content: 'Il y avait trois étages, mais il n''y avait pas de colonnes comme les colonnes des cours. C''est pourquoi le haut était en retrait par rapport aux salles du bas et du milieu, et ainsi depuis le sol. '
  '7':
  - type: note
    content: 'correspondant aux salles  : autre traduction parallèle aux salles.'
  - type: text
    content: 'La clôture extérieure correspondant aux salles, du côté de la cour extérieure, devant les salles, avait cinquante coudées de longueur. '
  '8':
  - type: note
    content: Mais sur la façade du temple, ou, peut-être, en face du temple  ; texte obscur. Certains, s'appuyant en partie sur LXX, modifient le texte hébreu traditionnel pour lire celles-ci et celles-là, en face d'elles, faisaient cent coudées en tout.
  - type: text
    content: 'En effet, la longueur des salles qui donnaient sur la cour extérieure était de cinquante coudées. Mais sur la façade du temple il y avait cent coudées. '
  '9':
  - type: note
    content: Texte obscur, que certains modifient pour lire par les entrées de ces salles on arrivait de l'est si l'on venait de la cour extérieure.
  - type: text
    content: Au bas de ces salles se trouvait l'entrée de l'est pour ceux qui venaient de la cour extérieure.
