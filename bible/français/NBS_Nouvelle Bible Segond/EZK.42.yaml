document_id: EZK.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dépendances du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux salles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme hébreu est au singulier, mais il faut sans doute le prendre dans un sens collectif ; cf. 40.17+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'secteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '41.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il me fit sortir vers la cour extérieure, du côté nord, et il me conduisit aux salles qui étaient en face du secteur et en face du bâtiment, au nord. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte obscur. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' semble n''avoir lu ni le mot pour '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: façade
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ni celui pour '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'entrée. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cinquante coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '≈ 52 m et 26 m, respectivement ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Sur la façade où se trouvait l''entrée nord, il y avait une longueur de cent coudées, et la largeur était de cinquante coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des vingt coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(≈ 10,50 m) : cf. 41.10 ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des portes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(permutation de lettres). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'galerie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '41.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en trois étages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine, cf. 41.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; certains voient ici trois lignes parallèles de bâtiments, étagés sur la déclivité entre les deux cours et séparés par une allée (v. 4).
    marker-yv: yv-n
  - type: text
    text: 'C''était en face des vingt coudées de la cour intérieure, et en face du dallage de la cour extérieure, une galerie faisant face à une autre galerie, en trois étages. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 46.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dix coudées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '≈ 5,20 m. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et un chemin d''une coudée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(≈ 52 cm) : LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et longue de cent coudées.
    marker-yv: yv-n
  - type: text
    text: 'Devant les salles, il y avait une allée large de dix coudées vers l''intérieur et un chemin d''une coudée ; leurs entrées donnaient sur le nord. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Traduction incertaine ; cf. 41.7.
    marker-yv: yv-n
  - type: text
    text: 'Les salles supérieures étaient plus étroites que les salles inférieures et que celles du milieu du bâtiment, parce que des galeries empiétaient sur elles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il y avait trois étages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elles étaient triples
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des cours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des (salles) extérieures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 40.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est pourquoi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte obscur et traduction conjecturale.'
    marker-yv: yv-n
  - type: text
    text: 'Il y avait trois étages, mais il n''y avait pas de colonnes comme les colonnes des cours. C''est pourquoi le haut était en retrait par rapport aux salles du bas et du milieu, et ainsi depuis le sol. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: correspondant aux salles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parallèle aux salles.
    marker-yv: yv-n
  - type: text
    text: 'La clôture extérieure correspondant aux salles, du côté de la cour extérieure, devant les salles, avait cinquante coudées de longueur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mais sur la façade du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou, peut-être, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en face du temple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; texte obscur. Certains, s''appuyant en partie sur LXX, modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celles-ci et celles-là, en face d'elles, faisaient cent coudées en tout.
    marker-yv: yv-n
  - type: text
    text: 'En effet, la longueur des salles qui donnaient sur la cour extérieure était de cinquante coudées. Mais sur la façade du temple il y avait cent coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte obscur, que certains modifient pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par les entrées de ces salles on arrivait de l'est si l'on venait de la cour extérieure.
    marker-yv: yv-n
  - type: text
    text: Au bas de ces salles se trouvait l'entrée de l'est pour ceux qui venaient de la cour extérieure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sud
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Au lieu de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la largeur est
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la largeur qui va vers l'est
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait suggérer un bâtiment orienté est-ouest, dont les salles donneraient sur le sud. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : formule différente de celle qui apparaît aux v. 1,3.'
    marker-yv: yv-n
  - type: text
    text: 'Il y avait encore des salles sur la largeur est de la clôture de la cour, en face du secteur et en face du bâtiment. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un passage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un chemin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur aspect…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme l'aspect des salles.
    marker-yv: yv-n
  - type: text
    text: 'Devant elles, il y avait un passage ; leur aspect était comme celui des salles qui étaient du côté nord. Leur longueur et leur largeur étaient les mêmes ; leurs issues, leur disposition et leurs entrées étaient semblables. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui se trouvait juste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction conjecturale ; dans l''usage post-biblique le mot hébreu qui apparaît ici signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: convenable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il pourrait s''agir ici du nom ou d''un qualificatif du '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'passage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'clôture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: clôture de protection
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ?) ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant l'estrade des musiciens.
    marker-yv: yv-n
  - type: text
    text: 'Il en était de même pour les entrées des salles du côté sud. Il y avait une entrée en face du passage, du passage qui se trouvait juste devant la clôture du côté de l''est, par où l''on entrait. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les salles sacrées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les salles du sanctuaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui se présentent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: proches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 40.46+ (terme apparenté). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les choses très sacrées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 2.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils y déposeront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on y déposera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'offrandes végétales '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 44.29 ; 45.15ss,24s ; 46.5ss,20 ; Lv 2.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réparation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '40.39+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce lieu est sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20 ; Mt 24.15 ; voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il me dit : Les salles du nord et les salles du sud qui sont devant le secteur, ce sont les salles sacrées, où les prêtres qui se présentent devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' mangeront les choses très sacrées. Ils y déposeront les choses très sacrées, les offrandes végétales, les sacrifices pour le péché et les sacrifices de réparation : ce lieu est sacré. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 44.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quand les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nul n''y entrera que les prêtres ; ils ne sortiront pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour se présenter au peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour s''approcher de l''endroit réservé au peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 46.3).
    marker-yv: yv-n
  - type: text
    text: Quand les prêtres seront entrés, ils ne sortiront pas du sanctuaire vers la cour extérieure, mais ils déposeront là les vêtements avec lesquels ils officient, car ces vêtements sont sacrés ; ils mettront d'autres vêtements pour se présenter au peuple.
- type: usfm
