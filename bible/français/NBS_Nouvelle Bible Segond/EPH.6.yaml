document_id: EPH.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Enfants et parents
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Col 3.20s ; Tt 2.6 ; 1P 5.5. –  dans le Seigneur  : la formule correspondante est absente de certains mss. – Voir juste.'
  - type: text
    content: 'Enfants, obéissez à vos parents dans le Seigneur, car cela est juste : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'soyez ou devenez puissants Ac 9.22 ; Rm 4.20 ; 1Co 16.13 ; Ph 4.13 ; 2Tm 2.1. –  sa force souveraine  : litt. le pouvoir de sa force , cf. 1.19n  ; Es 40.26.'
  - type: text
    content: 'Au reste, soyez puissants dans le Seigneur, par sa force souveraine. '
  '11':
  - type: note
    content: 'Revêtez  : cf. 4.24+. –  toutes les armes  : autre traduction l''armure  ; de même au v. 13 ; cf. Es 59.16-18 ; Ps 35.1-3 ; Rm 6.13 ; 13.12 ; 2Co 6.7 ; 10.4 ; 1Th 5.8 ; Sagesse 5.16ss : « De sa droite, il (Dieu) va les protéger (les justes) et, de son bras, les couvrir. Il prendra comme armure son zèle vengeur et il armera la création pour châtier ses ennemis. Comme cuirasse, il revêtira la justice, comme casque, il mettra le jugement sans appel. Il prendra sa sainteté invincible pour bouclier, en guise d''épée, il affûtera sa colère inflexible. » –  tenir bon  : autre traduction tenir debout, tenir ferme  ; cf. Rm 5.2n. –  manœuvres (4.14n) du diable (voir démon, diable, Satan) 4.27+.'
  - type: text
    content: 'Revêtez toutes les armes de Dieu, afin de pouvoir tenir bon devant les manœuvres du diable. '
  '12':
  - type: note
    content: 'le sang et la chair  : cf. Mt 16.17 ; 1Co 15.50 ; Ga 1.16n  ; Hé 2.14. –  nous luttons ou, selon certains mss, vous luttez. –  principats… 1.21+. –  de ce monde de ténèbres  : cf. 2.2 ; 5.8-14 ; Col 1.13. –  les puissances spirituelles  : litt. les (choses) spirituelles. –  mauvaises  : litt. de la méchanceté. –  dans les lieux célestes 1.3+ ; 3.10.'
  - type: text
    content: 'En effet, ce n''est pas contre le sang et la chair que nous luttons, mais contre les principats, contre les autorités, contre les pouvoirs de ce monde de ténèbres, contre les puissances spirituelles mauvaises qui sont dans les lieux célestes. '
  '13':
  - type: note
    content: les armes de Dieu v. 11n. –  le jour mauvais 5.16+. –  après avoir tout mis en œuvre ou avoir fait tout le nécessaire  ; d'autres comprennent après avoir tout surmonté.
  - type: text
    content: 'Prenez donc toutes les armes de Dieu, afin que vous puissiez résister dans le jour mauvais et, après avoir tout mis en œuvre, tenir bon. '
  '14':
  - type: note
    content: 'ceignez vos reins de vérité ou passez à vos reins la ceinture de la vérité  : cf. Es 11.5 ; Lc 12.35n. –  cuirasse de la justice Es 59.17.'
  - type: text
    content: 'Oui, tenez bon : ceignez vos reins de vérité et revêtez la cuirasse de la justice ; '
  '15':
  - type: note
    content: à vos pieds… Es 52.7 ; Na 2.1 ; Rm 10.15. –  la bonne nouvelle (1.13+) de la paix 2.17 ; Lc 2.14 ; Ac 10.36.
  - type: text
    content: 'mettez pour chaussures à vos pieds les bonnes dispositions que donne la bonne nouvelle de la paix ; '
  '16':
  - type: note
    content: 'bouclier  : cf. Gn 15.1 ; Ps 3.4+. –  du Mauvais ou du mal, cf. Mt 6.13 ; Jn 17.15.'
  - type: text
    content: 'prenez, en toutes circonstances, le bouclier de la foi, avec lequel vous pourrez éteindre tous les traits enflammés du Mauvais ; '
  '17':
  - type: note
    content: casque du salut Es 59.17. –  l'épée de l'Esprit… Es 11.4 ; 27.1 ; 34.5 ; 49.2 ; Os 6.5 ; Hé 4.12 ; Ap 1.16 ; 19.15.
  - type: text
    content: prenez aussi le casque du salut et l'épée de l'Esprit, qui est la Parole de Dieu.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 26.41/ / ; Lc 18.1 ; Col 4.2 ; 1Th 5.17 ; Jd 20. –  restez éveillés  : cf. Mc 13.33 ; Lc 21.36. –  pour tous les saints 1.15 ; Col 1.4 ; Phm 5.'
  - type: text
    content: 'Priez en tout temps par l''Esprit, avec toutes sortes de prières et de supplications. Pour ce faire, restez éveillés et consacrez-vous toujours assidûment à supplier pour tous les saints ; '
  '19':
  - type: note
    content: 'Cf. Rm 15.30+ ; voir aussi Lc 21.15 ; Col 4.3. –  que je fasse connaître  : le même verbe est traduit par mettre au courant au v. 21 ; cf. 1.9n. –  assurance  : terme apparenté au v. 20 ; cf. 3.12 ; voir Ac 2.29n  ; 28.31 ; Ph 1.20. –  le mystère 1.9+ ; 3.3,8s ; les mots de la bonne nouvelle sont omis par plusieurs mss.'
  - type: text
    content: 'pour moi aussi, afin que la parole, quand j''ouvre la bouche, me soit donnée pour que je fasse connaître, avec assurance, le mystère de la bonne nouvelle, '
  '2':
  - type: note
    content: 'Ex 20.12 ; Dt 5.16  ; cf. Mt 15.4/ /. –  commandement  : voir loi. –  promesse 1.13 ; 2.12 ; 3.6.'
  - type: text
    content: Honore ton père et ta mère
  - type: text
    content: '  – c''est le premier commandement accompagné d''une promesse – '
  '20':
  - type: note
    content: 'Col 4.4. –  pour lequel (le mystère) : autre traduction pour laquelle (la bonne nouvelle). –  ambassadeur 2Co 5.20+. –  dans les chaînes  : cf. 3.1+ ; Ac 21.33 ; 28.20 ; Ph 1.13 ; 2Tm 1.16.'
  - type: text
    content: pour lequel je suis ambassadeur dans les chaînes ; que j'en parle avec assurance comme je dois en parler.
  - type: heading
    content: Salutations finales
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ph 1.12+. –  Tychique Ac 20.4 ; Col 4.7 ; 2Tm 4.12 ; Tt 3.12. –  ministre ou serviteur (3.7n) ; cf. Col 1.7. –  digne de confiance  : autre traduction fidèle (cf. 1.1n).'
  - type: text
    content: 'Pour que vous sachiez, vous aussi, quelle est ma situation et ce que je fais, Tychique qui est, dans le Seigneur, le frère bien-aimé et le ministre digne de confiance, vous mettra au courant de tout. '
  '22':
  - type: note
    content: 'Cf. Col 4.8. –  vous encourage  : litt. encourage (ou console, réconforte) vos cœurs.'
  - type: text
    content: Je vous l'envoie tout exprès, pour que vous connaissiez notre situation et qu'il vous encourage.
  '23':
  - type: text
    content: 'Que la paix et l''amour soient accordés aux frères avec la foi, de la part de Dieu, le Père, et du Seigneur Jésus-Christ ! '
  '24':
  - type: note
    content: 'ceux qui aiment Jn 21.15 ; 1P 1.8 ; Psaumes de Salomon 4.25 : « Que ta grâce, Seigneur, soit sur tous ceux qui t''aiment ! » –  dans l''impérissable  : autre traduction d''un amour impérissable  ; cf. 4.22+ ; 1Co 9.25+ ; 15.42,50ss. – Certains mss portent l''indication suivante  : Aux Ephésiens, écrite de Rome, par l''entremise de Tychique.'
  - type: text
    content: Que la grâce soit avec tous ceux qui aiment notre Seigneur Jésus-Christ dans l'impérissable !
  '3':
  - type: note
    content: Cf. Pr 3.1s ; 4.10.
  - type: text
    content: pour que tu sois heureux et que tu vives longtemps sur la terre
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'n''irritez pas  : cf. 4.26 ; Rm 10.19 ; voir aussi Pr 19.18. –  l''éducation  : autre traduction la correction (cf. Pr 3.11s ; Hé 12.5ss). –  les avertissements  : autre traduction la pédagogie (dans LXX, un terme grec apparenté traduit le mot hébreu rendu par raison en Pr 2.2) ; cf. Dt 6.7,20-25.'
  - type: text
    content: Et vous, pères, n'irritez pas vos enfants, mais élevez-les par l'éducation et les avertissements du Seigneur.
  - type: heading
    content: Esclaves et maîtres
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Esclaves  : cf. 1Co 7.21-24 ; Col 3.22–4.1 ; 1Tm 6.1s ; Tt 2.9s ; Phm ; 1P 2.18-25. – Voir chair . –  crainte et tremblement 2Co 7.15+. –  simplicité de votre cœur  : le terme correspondant à simplicité a souvent le sens de générosité , cf. Mt 6.22n  ; Rm 12.8n  ; 2Co 1.12n  ; 8.2n.'
  - type: text
    content: 'Esclaves, obéissez à vos maîtres selon la chair avec crainte et tremblement, dans la simplicité de votre cœur, comme au Christ ; '
  '6':
  - type: note
    content: 'esclaves (v. 5n) du Christ 1Co 7.22. –  de toute leur âme  : litt. de l''âme  ; autre traduction avec empressement  ; même formule en Col 3.23 ; voir aussi Gn 1.20n  ; Mt 10.28n.'
  - type: text
    content: 'non pas seulement sous leurs yeux, comme s''il s''agissait de plaire à des humains, mais comme des esclaves du Christ, qui font de toute leur âme la volonté de Dieu. '
  '7':
  - type: note
    content: Cf. 2Ch 19.6. –  Seigneur ou Maître, cf. v. 9.
  - type: text
    content: 'Servez de bon gré, comme des esclaves du Seigneur et non comme ceux des humains, '
  '8':
  - type: note
    content: esclave ou homme libre 1Co 12.13. –  recueillera… 2Co 5.10.
  - type: text
    content: sachant que chacun, esclave ou homme libre, recueillera du Seigneur le bien qu'il aura lui-même fait.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 25.43. –  agissez  : litt. faites , comme aux v. précédents. –  à l''égard de vos esclaves  : litt. à leur égard . –  leur Maître et le vôtre v. 7n. –  partialité Ac 10.34n  ; Rm 2.11+.'
  - type: text
    content: Quant à vous, maîtres, agissez de même à l'égard de vos esclaves ; abstenez-vous de menaces, sachant que leur Maître et le vôtre est dans les cieux et qu'il n'y a pas de partialité chez lui.
  - type: heading
    content: Les armes de Dieu
