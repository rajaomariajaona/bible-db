      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Humain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maison rebelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui ont des yeux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 6.9s ; 43.8 ; Jr 5.21 ; Mc 8.18 ; Ap 2.7+.
    marker-yv: yv-n
  - type: text
    text: 'Humain, tu habites au milieu de la maison rebelle – de gens qui ont des yeux pour voir et qui ne voient pas, qui ont des oreilles pour entendre et qui n''entendent pas, car c''est une maison rebelle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: peut-être verront-ils…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains traduisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'peut-être verront-ils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 12.2), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: car ils sont une famille de rebelles.
    marker-yv: yv-n
  - type: text
    text: 'Toi, humain, fais ton paquet pour l''exil et pars en exil en plein jour, sous leurs yeux ! Pars en exil du lieu que tu habites pour un autre lieu, sous leurs yeux : peut-être verront-ils qu''ils sont une maison rebelle. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu sortiras ton paquet en plein jour, sous leurs yeux ; et toi, tu sortiras le soir, sous leurs yeux, comme les exilés. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu sortiras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ton paquet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est ici sous-entendu dans le texte hébreu traditionnel ; plusieurs versions anciennes ont lu simplement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu sortiras (toi-même).
    marker-yv: yv-n
  - type: text
    text: 'Sous leurs yeux, perce le mur ; tu sortiras ton paquet par là. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 11-13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: présage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 24.24,27 ; Es 8.18 ; 20.3 ; Za 3.8 ; le mot correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prodige(s) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Dt 4.34+.
    marker-yv: yv-n
  - type: text
    text: Sous leurs yeux, tu le chargeras sur l'épaule, tu le sortiras dans l'obscurité, tu te couvriras le visage et tu ne regarderas pas le pays ; car je veux que tu sois un présage pour la maison d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je fis ce qui m''avait été ordonné : je sortis mon paquet en plein jour, comme un paquet pour l''exil. Le soir je perçai le mur avec la main ; je le sortis dans l''obscurité et je le chargeai sur mon épaule, sous leurs yeux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Au matin, la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que fais-tu ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que signifie ce que tu fais ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 17.12 ; 24.19 ; 37.18.
    marker-yv: yv-n
  - type: text
    text: 'Humain, la maison d''Israël, cette maison rebelle, ne t''a-t-elle pas dit : « Que fais-tu ? » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sentence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Es 13.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui se trouve là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui sont au milieu d'eux.
    marker-yv: yv-n
  - type: text
    text: 'Dis-leur : Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Cette sentence concerne le prince qui est à Jérusalem et toute la maison d''Israël qui se trouve là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je suis un présage pour vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je suis votre présage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; expression semblable en 24.24,27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'accomplira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se fera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même aux v. 20ss.'
    marker-yv: yv-n
  - type: text
    text: 'Dis : Je suis un présage pour vous. Ce que j''ai fait, c''est ce qui s''accomplira pour eux : ils iront en exil. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 25.1-7 ; Jr 39.7 ; 52.7-11.
    marker-yv: yv-n
  - type: text
    text: 'Le prince qui est au milieu d''eux chargera son épaule dans l''obscurité et sortira ; on percera le mur pour le faire sortir par là. Il se couvrira le visage pour que ses yeux ne regardent pas le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mon filet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.20 ; 19.8 ; 32.3 (voir aussi 29.4 ; Jr 16.16+) ; Es 8.14 ; 24.17s ; Os 5.1 ; Ha 1.15-17 ; Ps 91.3 ; 124.7 ; Jb 19.6 ; Lm 1.13.'
    marker-yv: yv-n
  - type: text
    text: 'J''étendrai mon filet sur lui et il sera pris dans mon piège ; je l''emmènerai à Babylone, au pays des Chaldéens ; mais il ne le verra pas et il y mourra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot correspondant signifie habituellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aide, secours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je tirerai l'épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.2,12+.'
    marker-yv: yv-n
  - type: text
    text: 'Tous ceux qui l''entourent, sa garde et toutes ses troupes, je les disséminerai à tout vent et je tirerai l''épée derrière eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 5.10+ ; 6.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 11.10+,16.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi ils sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), quand je les disperserai parmi les nations, quand je les disséminerai dans tous les pays. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'famine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.12+.
    marker-yv: yv-n
  - type: text
    text: 'Mais je laisserai parmi eux quelques hommes qui échapperont à l''épée, à la famine et à la peste, afin qu''ils racontent toutes leurs abominations parmi les nations où ils iront. Ainsi ils sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me parvint :'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu mangeras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu boiras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu mangeras ton pain / tu boiras ton eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 4.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en tremblant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 3.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Humain, tu mangeras en tremblant, tu boiras dans l''agitation et l''appréhension '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voici ce que dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la formule correspondante (aussi v. 27) est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi parle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(p. ex. v. 10,23). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans l''atterrement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la dévastation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; les mots traduits par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'atterrement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dévasté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont apparentés en hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après quelques mss ; autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(référent féminin, sans doute le pays d''Israël) ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le mot ayant les deux sens en hébreu comme en grec. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vidé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'et tu diras au peuple du pays : Voici ce que dit le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ' aux habitants de Jérusalem, sur la terre d''Israël : Ils mangeront dans l''appréhension, ils boiront dans l''atterrement ; car leur pays sera dévasté, vidé de tout ce qui s''y trouve, à cause de la violence de tous ceux qui l''habitent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les villes habitées seront réduites en ruines, le pays sera dévasté. Ainsi vous saurez que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
