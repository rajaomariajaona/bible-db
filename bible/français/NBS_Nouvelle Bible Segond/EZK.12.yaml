document_id: EZK.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu donne un présage de l'exil
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'sentence Es 13.1n. –  qui se trouve là  : litt. qui sont au milieu d''eux.'
  - type: text
    content: 'Dis-leur : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Cette sentence concerne le prince qui est à Jérusalem et toute la maison d''Israël qui se trouve là.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis un présage pour vous  : litt. je suis votre présage  ; cf. v. 6n  ; expression semblable en 24.24,27. –  s''accomplira  : litt. se fera , de même aux v. 20ss.'
  - type: text
    content: 'Dis : Je suis un présage pour vous. Ce que j''ai fait, c''est ce qui s''accomplira pour eux : ils iront en exil. '
  '12':
  - type: note
    content: Cf. 2R 25.1-7 ; Jr 39.7 ; 52.7-11.
  - type: text
    content: 'Le prince qui est au milieu d''eux chargera son épaule dans l''obscurité et sortira ; on percera le mur pour le faire sortir par là. Il se couvrira le visage pour que ses yeux ne regardent pas le pays. '
  '13':
  - type: note
    content: 'mon filet  : cf. 17.20 ; 19.8 ; 32.3 (voir aussi 29.4 ; Jr 16.16+) ; Es 8.14 ; 24.17s ; Os 5.1 ; Ha 1.15-17 ; Ps 91.3 ; 124.7 ; Jb 19.6 ; Lm 1.13.'
  - type: text
    content: 'J''étendrai mon filet sur lui et il sera pris dans mon piège ; je l''emmènerai à Babylone, au pays des Chaldéens ; mais il ne le verra pas et il y mourra. '
  '14':
  - type: note
    content: 'sa garde  : le mot correspondant signifie habituellement aide, secours. –  je tirerai l''épée  : cf. 5.2,12+.'
  - type: text
    content: 'Tous ceux qui l''entourent, sa garde et toutes ses troupes, je les disséminerai à tout vent et je tirerai l''épée derrière eux. '
  '15':
  - type: note
    content: Cf. 5.10+ ; 6.8n  ; 11.10+,16.
  - type: text
    content: 'Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je les disperserai parmi les nations, quand je les disséminerai dans tous les pays. '
  '16':
  - type: note
    content: 5.3+. –  épée / famine / peste 5.12+.
  - type: text
    content: 'Mais je laisserai parmi eux quelques hommes qui échapperont à l''épée, à la famine et à la peste, afin qu''ils racontent toutes leurs abominations parmi les nations où ils iront. Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '17':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'tu mangeras / tu boiras  : litt. tu mangeras ton pain / tu boiras ton eau  ; cf. 4.16n. –  en tremblant  : cf. 3.12n.'
  - type: text
    content: 'Humain, tu mangeras en tremblant, tu boiras dans l''agitation et l''appréhension '
  '19':
  - type: note
    content: 'Voici ce que dit  : la formule correspondante (aussi v. 27) est habituellement traduite par ainsi parle (p. ex. v. 10,23). –  dans l''atterrement ou dans la dévastation  ; les mots traduits par atterrement et dévasté sont apparentés en hébreu. –  leur pays, d''après quelques mss ; autre lecture traditionnelle son pays (référent féminin, sans doute le pays d''Israël) ; LXX le pays ou la terre, le mot ayant les deux sens en hébreu comme en grec. –  vidé  : sous-entendu dans le texte.'
  - type: text
    content: 'et tu diras au peuple du pays : Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' aux habitants de Jérusalem, sur la terre d''Israël : Ils mangeront dans l''appréhension, ils boiront dans l''atterrement ; car leur pays sera dévasté, vidé de tout ce qui s''y trouve, à cause de la violence de tous ceux qui l''habitent. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Humain 2.1n. –  maison rebelle 2.5n. –  qui ont des yeux… Es 6.9s ; 43.8 ; Jr 5.21 ; Mc 8.18 ; Ap 2.7+.
  - type: text
    content: 'Humain, tu habites au milieu de la maison rebelle – de gens qui ont des yeux pour voir et qui ne voient pas, qui ont des oreilles pour entendre et qui n''entendent pas, car c''est une maison rebelle. '
  '20':
  - type: text
    content: 'Les villes habitées seront réduites en ruines, le pays sera dévasté. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: La parole du Seigneur va s'accomplir
  '21':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'maxime  : cf. 14.8n  ; 18.2s. –  aucune vision n''aboutit  : litt. toute vision périt  ; cf. 2P 3.4.'
  - type: text
    content: 'Humain, qu''est-ce donc que cette maxime qui circule parmi vous sur la terre d''Israël : « Les jours se prolongent, et aucune vision n''aboutit ! » '
  '23':
  - type: note
    content: 'où toute vision s''accomplit  : litt. et la parole (ici au sens d’événement, réalisation) de toute vision  ; cf. v. 25.'
  - type: text
    content: 'A cause de cela, dis-leur : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je fais cesser cette maxime ; on ne la répétera plus en Israël. Dis-leur, au contraire : Les jours approchent où toute vision s''accomplit. '
  '24':
  - type: note
    content: Cf. Es 30.10n. –  illusoire ou néfaste.
  - type: text
    content: 'Il n''y aura plus de vision illusoire, ni de divination complaisante au milieu de la maison d''Israël. '
  '25':
  - type: note
    content: ce que je dirai, je le dirai, ou ce que je dis, je le dis (12.23) ; autre traduction je dirai ce que je veux dire  ; la tournure ressemble à celle qui explique le nom divin en Ex 3.14n  ; cf. 33.19. On pourrait cependant analyser différemment le début du v. et traduire car c'est moi, le Seigneur (YHWH), qui parle ; la parole que je dis s'accomplira…
  - type: text
    content: 'Car je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; ce que je dirai, je le dirai : c''est une parole qui s''accomplira sans délai ; oui, de vos jours, maison rebelle, je dirai une parole et je l''accomplirai – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '26':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'qu''il a  : litt. qu''il (Ezéchiel) voit . –  lointains  : litt. nombreux  ; cf. Ha 2.3. –  parle en prophète 4.7n.'
  - type: text
    content: 'Humain, voici ce que dit la maison d''Israël : « La vision qu''il a n''est que pour des jours lointains, il parle en prophète pour des temps éloignés. » '
  '28':
  - type: text
    content: 'A cause de cela, dis-leur : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Toute parole que je dirai s''accomplira sans délai – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '3':
  - type: note
    content: 'peut-être verront-ils…  : certains traduisent peut-être verront-ils (cf. 12.2), car ils sont une famille de rebelles.'
  - type: text
    content: 'Toi, humain, fais ton paquet pour l''exil et pars en exil en plein jour, sous leurs yeux ! Pars en exil du lieu que tu habites pour un autre lieu, sous leurs yeux : peut-être verront-ils qu''ils sont une maison rebelle. '
  '4':
  - type: text
    content: 'Tu sortiras ton paquet en plein jour, sous leurs yeux ; et toi, tu sortiras le soir, sous leurs yeux, comme les exilés. '
  '5':
  - type: note
    content: 'tu sortiras  : le terme correspondant à ton paquet est ici sous-entendu dans le texte hébreu traditionnel ; plusieurs versions anciennes ont lu simplement tu sortiras (toi-même).'
  - type: text
    content: 'Sous leurs yeux, perce le mur ; tu sortiras ton paquet par là. '
  '6':
  - type: note
    content: 'V. 11-13. –  présage  : cf. 24.24,27 ; Es 8.18 ; 20.3 ; Za 3.8 ; le mot correspondant est traduit par prodige(s) en Dt 4.34+.'
  - type: text
    content: Sous leurs yeux, tu le chargeras sur l'épaule, tu le sortiras dans l'obscurité, tu te couvriras le visage et tu ne regarderas pas le pays ; car je veux que tu sois un présage pour la maison d'Israël.
  '7':
  - type: text
    content: 'Je fis ce qui m''avait été ordonné : je sortis mon paquet en plein jour, comme un paquet pour l''exil. Le soir je perçai le mur avec la main ; je le sortis dans l''obscurité et je le chargeai sur mon épaule, sous leurs yeux.'
  '8':
  - type: text
    content: 'Au matin, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Que fais-tu ? autre traduction que signifie ce que tu fais ? Cf. 17.12 ; 24.19 ; 37.18.
  - type: text
    content: 'Humain, la maison d''Israël, cette maison rebelle, ne t''a-t-elle pas dit : « Que fais-tu ? » '
