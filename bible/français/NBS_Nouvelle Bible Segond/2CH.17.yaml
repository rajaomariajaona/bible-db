document_id: 2CH.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Josaphat ; sa fidélité envers Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Josaphat…  : cf. 1R 15.24.'
  - type: text
    content: 'Josaphat, son fils, devint roi à sa place. Il devint fort face à Israël : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: La frayeur du Seigneur 14.13+.
  - type: text
    content: 'La frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur tous les royaumes des pays qui entouraient Juda, et ils ne firent pas la guerre à Josaphat. '
  '11':
  - type: note
    content: 'les Arabes  : autre traduction les Bédouins, de même en 21.16 ; 22.1 ; 26.7+.'
  - type: text
    content: Des Philistins apportèrent à Josaphat des présents et un tribut en argent ; les Arabes lui amenèrent aussi du petit bétail, sept mille sept cents béliers et sept mille sept cents boucs.
  - type: heading
    content: La puissance militaire de Josaphat
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'citadelles  : même terme en 27.4 ; terme apparenté en 1Ch 29.1n,19. –  villes-entrepôts  : cf. 1R 9.19+.'
  - type: text
    content: 'Josaphat continuait à s''élever très haut. Il bâtit en Juda des citadelles et des villes-entrepôts. '
  '13':
  - type: note
    content: 'Il avait de grandes réserves  : traduction incertaine ; on pourrait aussi comprendre de grands travaux s''effectuaient pour lui.'
  - type: text
    content: 'Il avait de grandes réserves dans les villes de Juda, ainsi que des hommes de guerre, de vaillants guerriers, à Jérusalem. '
  '14':
  - type: note
    content: 'chefs de phratries  : autres traductions chefs de mille ; chefs de milliers ; chefs de contingents  ; cf. Nb 1.16n.'
  - type: text
    content: 'Voici leur recensement, famille par famille :'
  - type: text
    content: 'De Juda, chefs de phratries : Adna, le chef, et 300 000 vaillants guerriers avec lui ;'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'hommes  : sous-entendu dans le texte, de même aux v. 17s.'
  - type: text
    content: à ses côtés, Yohanân, le chef, et 280 000 hommes ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 's''était porté volontaire  : même verbe hébreu en Jg 5.2,9 ; Esd 1.6 ; 2.68 ; 3.5 ; Né 3.5 ; 11.2 ; 1Ch 29.5s,9n,14,17.'
  - type: text
    content: 'à ses côtés, Amasia, fils de Zikri, qui s''était porté volontaire pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et 200 000 vaillants guerriers avec lui.'
  '17':
  - type: text
    content: 'De Benjamin : Eliada, vaillant guerrier, et 200 000 hommes avec lui, armés de l''arc et du bouclier ;'
  '18':
  - type: text
    content: à ses côtés, Yehozabad, et 180 000 hommes armés avec lui.
  '19':
  - type: text
    content: ' '
  - type: note
    content: étaient au service du roi 22.8 ; cf. 1R 1.4n.
  - type: text
    content: Voilà ceux qui étaient au service du roi, outre ceux que le roi avait placés dans toutes les villes fortes de Juda.
  '2':
  - type: note
    content: 'garnisons  : autre traduction préfets  ; cf. 8.10n  ; 1S 10.5n. –  villes d''Ephraïm, conquises par Asa ; cf. 16.8.'
  - type: text
    content: 'il mit des troupes dans toutes les villes fortes de Juda et des garnisons dans le pays de Juda et dans les villes d''Ephraïm qu''Asa, son père, avait prises. '
  '3':
  - type: note
    content: 'Le Seigneur fut avec  : cf. Gn 39.2,21 ; Jg 1.19,22 ; 2.18 ; 1S 18.28 ; 1R 1.37 ; voir aussi Gn 21.20 ; 2Ch 20.29. –  David  : omis par quelques mss hébreux et LXX. –  ne chercha pas  : autre traduction ne consulta pas, même possibilité au v. 4. –  les Baals  : toujours au pluriel dans 2 Chroniques, sauf en 23.17 ; cf. 24.7 ; 28.2 ; 33.3 ; 34.4 ; voir aussi Jg 2.11.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut avec Josaphat, parce qu''il suivit les voies qu''avait d''abord suivies David, son père, et qu''il ne chercha pas les Baals. '
  '4':
  - type: note
    content: 'le Dieu de son père  : LXX le Seigneur, le Dieu de son père. –  suivit ses commandements  : litt. marcha dans ses commandements, cf. 20.32. –  ce que faisait Israël  : le nom désigne le royaume du Nord (souvent considéré comme idolâtre).'
  - type: text
    content: 'Mais il chercha le Dieu de son père et suivit ses commandements, contrairement à ce que faisait Israël. '
  '5':
  - type: note
    content: Il eut richesse et gloire… 18.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' affermit la royauté entre ses mains, et tout Juda apportait des présents à Josaphat. Il eut richesse et gloire en abondance. '
  '6':
  - type: note
    content: 'Son cœur s''enhardit (litt. s''éleva) : c''est le seul endroit où cette expression a un caractère positif ; ailleurs (26.16 ; 32.25 ; Ez 28.2,5,17 ; Ps 131.1 ; Pr 18.12), elle décrit l''orgueil de l''homme hautain, qui s''élève au-dessus de sa condition. –  il supprima encore… les hauts lieux…  : cf. 14.2,4 ; 20.33.'
  - type: text
    content: 'Son cœur s''enhardit dans les voies du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il supprima encore de Juda les hauts lieux et les poteaux cultuels (les ashéras).'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'instruire  : cf. 1Ch 25.7.'
  - type: text
    content: 'La troisième année de son règne, il envoya ses princes Ben-Haïl, Abdias, Zacharie, Netanéel et Michée instruire les villes de Juda. '
  '8':
  - type: note
    content: 'Il envoya  : sous-entendu dans le texte. – Voir lévites et prêtres.'
  - type: text
    content: 'Il envoya avec eux les lévites Shemaya, Netania, Zebadia, Asaël, Shemiramoth, Jonathan, Adoniya, Tobiya, Tob-Adoniya, les lévites, et avec eux les prêtres Elishama et Joram. '
  '9':
  - type: note
    content: 'le livre de la loi  : cf. Jos 8.31+ ; 2R 22.8+.'
  - type: text
    content: 'Ils instruisirent Juda, portant avec eux le livre de la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: . Ils parcoururent toutes les villes de Juda en instruisant le peuple.
