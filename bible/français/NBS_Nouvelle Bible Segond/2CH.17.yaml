document_id: 2CH.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Josaphat ; sa fidélité envers Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Josaphat…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 15.24.'
    marker-yv: yv-n
  - type: text
    text: 'Josaphat, son fils, devint roi à sa place. Il devint fort face à Israël : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: garnisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: préfets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 10.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: villes d'Ephraïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', conquises par Asa ; cf. 16.8.'
    marker-yv: yv-n
  - type: text
    text: 'il mit des troupes dans toutes les villes fortes de Juda et des garnisons dans le pays de Juda et dans les villes d''Ephraïm qu''Asa, son père, avait prises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' fut avec'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 39.2,21 ; Jg 1.19,22 ; 2.18 ; 1S 18.28 ; 1R 1.37 ; voir aussi Gn 21.20 ; 2Ch 20.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : omis par quelques mss hébreux et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne chercha pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne consulta pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même possibilité au v. 4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baals
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : toujours au pluriel dans 2 Chroniques, sauf en 23.17 ; cf. 24.7 ; 28.2 ; 33.3 ; 34.4 ; voir aussi Jg 2.11.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fut avec Josaphat, parce qu''il suivit les voies qu''avait d''abord suivies David, son père, et qu''il ne chercha pas les Baals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Dieu de son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Seigneur, le Dieu de son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: suivit ses commandements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marcha dans ses commandements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 20.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce que faisait Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le nom désigne le royaume du Nord (souvent considéré comme idolâtre).'
    marker-yv: yv-n
  - type: text
    text: 'Mais il chercha le Dieu de son père et suivit ses commandements, contrairement à ce que faisait Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il eut richesse et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.1.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' affermit la royauté entre ses mains, et tout Juda apportait des présents à Josaphat. Il eut richesse et gloire en abondance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' s''enhardit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'éleva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : c''est le seul endroit où cette expression a un caractère positif ; ailleurs (26.16 ; 32.25 ; Ez 28.2,5,17 ; Ps 131.1 ; Pr 18.12), elle décrit l''orgueil de l''homme hautain, qui s''élève au-dessus de sa condition. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il supprima encore… les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: hauts
      - type: text
        text: ' lieux…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.2,4 ; 20.33.'
    marker-yv: yv-n
  - type: text
    text: 'Son cœur s''enhardit dans les voies du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et il supprima encore de Juda les hauts lieux et les poteaux cultuels (les ashéras).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: instruire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1Ch 25.7.'
    marker-yv: yv-n
  - type: text
    text: 'La troisième année de son règne, il envoya ses princes Ben-Haïl, Abdias, Zacharie, Netanéel et Michée instruire les villes de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il envoya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il envoya avec eux les lévites Shemaya, Netania, Zebadia, Asaël, Shemiramoth, Jonathan, Adoniya, Tobiya, Tob-Adoniya, les lévites, et avec eux les prêtres Elishama et Joram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le livre de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 8.31+ ; 2R 22.8+.'
    marker-yv: yv-n
  - type: text
    text: 'Ils instruisirent Juda, portant avec eux le livre de la loi du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Ils parcoururent toutes les villes de Juda en instruisant le peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La frayeur du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.13+.
    marker-yv: yv-n
  - type: text
    text: 'La frayeur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fut sur tous les royaumes des pays qui entouraient Juda, et ils ne firent pas la guerre à Josaphat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Arabes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Bédouins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même en 21.16 ; 22.1 ; 26.7+.'
    marker-yv: yv-n
  - type: text
    text: Des Philistins apportèrent à Josaphat des présents et un tribut en argent ; les Arabes lui amenèrent aussi du petit bétail, sept mille sept cents béliers et sept mille sept cents boucs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La puissance militaire de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: citadelles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même terme en 27.4 ; terme apparenté en 1Ch 29.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: villes-entrepôts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 9.19+.'
    marker-yv: yv-n
  - type: text
    text: 'Josaphat continuait à s''élever très haut. Il bâtit en Juda des citadelles et des villes-entrepôts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il avait de grandes réserves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de grands travaux s'effectuaient pour lui.
    marker-yv: yv-n
  - type: text
    text: 'Il avait de grandes réserves dans les villes de Juda, ainsi que des hommes de guerre, de vaillants guerriers, à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chefs de phratries
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chefs de mille ; chefs de milliers ; chefs de contingents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici leur recensement, famille par famille :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'De Juda, chefs de phratries : Adna, le chef, et 300 000 vaillants guerriers avec lui ;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte, de même aux v. 17s.'
    marker-yv: yv-n
  - type: text
    text: à ses côtés, Yohanân, le chef, et 280 000 hommes ;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'était porté volontaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même verbe hébreu en Jg 5.2,9 ; Esd 1.6 ; 2.68 ; 3.5 ; Né 3.5 ; 11.2 ; 1Ch 29.5s,9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',14,17.'
    marker-yv: yv-n
  - type: text
    text: 'à ses côtés, Amasia, fils de Zikri, qui s''était porté volontaire pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et 200 000 vaillants guerriers avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De Benjamin : Eliada, vaillant guerrier, et 200 000 hommes avec lui, armés de l''arc et du bouclier ;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: à ses côtés, Yehozabad, et 180 000 hommes armés avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'étaient au service du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.8 ; cf. 1R 1.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Voilà ceux qui étaient au service du roi, outre ceux que le roi avait placés dans toutes les villes fortes de Juda.
