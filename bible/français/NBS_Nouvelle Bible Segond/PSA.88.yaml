document_id: PSA.88,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ma vie touche au séjour des morts
  - type: text
    content: ' '
  - type: note
    content: '87.1+. –  Pour entonner  : traduction incertaine ; certains comprennent  : pour l''affliction  ; on pourrait aussi traduire pour chanter en chœur (cf. 119.172 ; 147.7), ou en répons (cf. Ex 15.21n). –  sur la flûte 53.1n. –  Poème 32.1n. –  Hémân, l''Ezrahite  : cf. 89.1 ; 1R 5.11 ; 1Ch 6.18,33ss ; 15.17 ; 25.1ss ; 2Ch 2.6 ; 5.12 ; 29.14,35.'
  - type: text
    content: Chant. Psaume. Des fils de Coré. Du chef de chœur. Pour entonner sur la flûte. Poème. De Hémân, l'Ezrahite.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2+. –  sans cesse  : litt. tout le jour . –  je tends… 77.3 ; 143.6 ; Es 1.15.'
  - type: text
    content: Mon œil s'éteint d'affliction ;
  - type: text
    content: 'je t''invoque sans cesse, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je tends les mains vers toi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 6.6 ; Es 38.18. –  Les ombres , hébreu repha'im , désignant les êtres affaiblis censés peupler le séjour des morts ; Es 14.9n  ; 26.14,19 ; Jb 26.5 ; Pr 2.18 ; 9.18 ; 21.16.
  - type: text
    content: Est-ce pour les morts que tu feras des choses étonnantes ?
  - type: text
    content: 'Les ombres se lèveront-elles pour te célébrer ? '
  - type: text
    content: Pause.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '30.10+ ; 115.17. –  le monde des disparus  : hébreu ’avaddôn (ou ’abaddôn ) ; cf. Jb 26.6n  ; Ap 9.11.'
  - type: text
    content: Dira-t-on ta fidélité dans la tombe,
  - type: text
    content: ta constance dans le monde des disparus ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Tes actes étonnants  : le terme hébreu correspondant est au singulier, vraisemblablement collectif. – Voir justice. –  pays de l''oubli ou terre de l''oubli , 31.13 ; Ec 9.5s.'
  - type: text
    content: Tes actes étonnants sont-ils connus dans les ténèbres,
  - type: text
    content: et ta justice au pays de l'oubli ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'va au-devant de toi  : autre traduction est (déjà) devant toi  ; cf. 5.4 ; 30.6+ ; 59.17 ; 119.147.'
  - type: text
    content: 'Quant à moi, c''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que j''ai appelé au secours ;'
  - type: text
    content: au matin ma prière va au-devant de toi.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'te détournes-tu de moi  : litt. me caches-tu ta face  ; cf. 13.2+ ; 22.2 ; 74.1.'
  - type: text
    content: 'Pourquoi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', me repousses-tu,'
  - type: text
    content: te détournes-tu de moi ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: '69.30. –  moribond  : litt. expirant  ; cf. 104.29. –  terreurs 55.5 ; Jb 20.25. –  je suis désemparé  : traduction incertaine d''un terme hébreu qui n''apparaît nulle part ailleurs.'
  - type: text
    content: Je suis pauvre et moribond depuis ma jeunesse,
  - type: text
    content: je suis chargé de tes terreurs, je suis désemparé.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '78.49 ; Jb 6.4n  ; 10.17. –  effrois  : voir crainte.'
  - type: text
    content: Les ardeurs de ta colère passent sur moi,
  - type: text
    content: tes effrois me réduisent au silence.
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 8+,9+ ; 89.8.
  - type: text
    content: Ils m'entourent sans cesse comme des eaux,
  - type: text
    content: tous ensemble ils m'encerclent.
  '19':
  - type: text
    content: Tu as éloigné de moi amis et compagnons ;
  - type: text
    content: ceux que je connais ne sont que ténèbres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: V. 10 ; 3.5+. –  jour / nuit 22.3 ; 42.9 ; 91.5.
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu de mon salut !'
  - type: text
    content: Je crie le jour et pendant la nuit devant toi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 79.11 ; 102.2. –  Tends l'oreille 17.6n.
  - type: text
    content: Que ma prière parvienne jusque devant toi !
  - type: text
    content: Tends l'oreille vers mon cri !
  '4':
  - type: text
    content: ' '
  - type: note
    content: rassasié de maux Lm 3.30. –  ma vie… 94.17 ; 107.18 ; Jb 33.22 ; Pr 2.18 ; 5.5 ; 7.27.
  - type: text
    content: Car je suis rassasié de maux,
  - type: text
    content: et ma vie touche au séjour des morts.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.18s. –  On me compte parmi ou on me considère comme…  ; 22.30+ ; 143.7.
  - type: text
    content: On me compte parmi ceux qui descendent dans le gouffre,
  - type: text
    content: je suis comme un homme qui n'a plus de force.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis étendu  : traduction incertaine ; le mot signifie habituellement libre, affranchi  ; cf. 2R 15.5n. –  parmi les morts  : cf. Mc 5.2. –  transpercés , c.-à-d. morts de mort violente ; cf. Dt 21.1ss ; 1S 31.1,8 ; 2S 1.19. –  séparés de ta main , c.-à-d. séparés de toi  ; autre traduction exclus par toi  ; cf. 22.2 ; 31.23 ; Es 53.8 ; Lm 3.54.'
  - type: text
    content: Je suis étendu parmi les morts,
  - type: text
    content: semblable à ceux qui sont transpercés
  - type: text
    content: et couchés dans une tombe,
  - type: text
    content: à ceux dont tu n'as plus le souvenir
  - type: text
    content: et qui sont séparés de ta main.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 143.3 ; Ex 15.5 ; Es 14.15,19 ; Jb 10.21s ; Lm 3.6,55.
  - type: text
    content: Tu m'as jeté dans un gouffre sans fond,
  - type: text
    content: dans les ténèbres, dans les profondeurs.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'V. 18 ; 42.8 ; cf. 18.5s. –  tu m''affliges  : cf. v. 10.'
  - type: text
    content: Ta fureur s'appesantit sur moi,
  - type: text
    content: 'et tu m''affliges de tous tes flots. '
  - type: text
    content: Pause.
  '9':
  - type: text
    content: ' '
  - type: note
    content: V. 19 ; 31.12+ ; Jb 19.13 ; Lc 23.49. –  enfermé Lm 3.7.
  - type: text
    content: Tu as éloigné de moi ceux que je connais,
  - type: text
    content: tu as fait de moi une abomination pour eux ;
  - type: text
    content: je suis enfermé et je ne peux plus sortir.
