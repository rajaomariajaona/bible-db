document_id: ACT.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vision de Corneille
  - type: text
    content: ' '
  - type: note
    content: Césarée 8.40n. –  centurion 27.1 ; Mt 8.5 ; 27.54/ / ; Lc 7.2ss ; cf. Mc 15.39n. –  la cohorte (21.31n) appelée italique était constituée, en principe, de soldats d'origine italienne.
  - type: text
    content: 'Il y avait à Césarée un nommé Corneille, centurion de la cohorte appelée italique. '
  '10':
  - type: note
    content: 'extase  : le terme grec correspondant (ekstasis) signifie proprement le fait d''être hors de soi-même (11.5 ; 22.17 ; Gn 15.12n) ; le même mot a aussi le sens de stupéfaction (Ac 3.10 ; 10.45 ; cf. 2.7+ ; voir Mc 2.12n  ; Lc 5.26).'
  - type: text
    content: 'Il eut faim et voulut manger. Pendant qu''on lui préparait quelque chose, il lui advint une extase. '
  '11':
  - type: note
    content: 'le ciel ouvert 7.56+ ; cf. Ez 1.1ss. –  un objet  : autre traduction un récipient  ; le même mot a été traduit par instrument en 9.15n. –  une grande toile…  : traduction incertaine ; on y voit habituellement une sorte de nappe suspendue en l''air ; quelques-uns se représentent au contraire un genre de tente rejoignant la terre par ses quatre coins.'
  - type: text
    content: 'Il voit le ciel ouvert et un objet semblable à une grande toile tenue par les quatre coins, qui descend et s''abaisse jusqu''à la terre ; '
  '12':
  - type: note
    content: Cf. Gn 1.21,24 ; 6.7,20 ; 7.14 ; Rm 1.23.
  - type: text
    content: 'il y avait là tous les quadrupèdes et les reptiles de la terre, ainsi que les oiseaux du ciel. '
  '13':
  - type: note
    content: 'abats ou sacrifie, Mc 14.12n. –  mange  : cf. Ez 2.8.'
  - type: text
    content: 'Une voix lui dit : Lève-toi, Pierre, abats et mange. '
  '14':
  - type: note
    content: Cf. Lv 11 ; Ez 4.14.
  - type: text
    content: 'Pierre répondit : En aucun cas, Seigneur ! Je n''ai jamais rien mangé de souillé ni d''impur ! '
  '15':
  - type: note
    content: 'Ce que Dieu a purifié…  : autre traduction ce que Dieu a déclaré pur, toi, ne le considère pas comme souillé (ou comme profane) ; voir saint  ; cf. v. 28 ; 15.9 ; 21.28 ; Gn 9.3 ; Mt 15.11n  ; Mc 7.15,19/ / ; Rm 14.14 ; 1Tm 4.4.'
  - type: text
    content: 'Pour la deuxième fois la voix lui parle : Ce que Dieu a purifié, toi, ne le souille pas ! '
  '16':
  - type: note
    content: 'Cf. Gn 41.32. –  enlevé…  : cf. 1.2+.'
  - type: text
    content: Cela se produisit trois fois ; et aussitôt après l'objet fut enlevé au ciel.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'perplexe 5.24+. –  sur le sens…  : litt. sur ce que pouvait être la vision (9.10+). –  après s''être renseignés pour trouver la maison de Simon  : d''après une reconstitution, cette précision aurait été absente du texte occidental. –  à la porte d''entrée 12.13.'
  - type: text
    content: 'Pierre était perplexe sur le sens de la vision qu''il avait eue. C''est alors que les hommes envoyés par Corneille, après s''être renseignés pour trouver la maison de Simon, survinrent à la porte d''entrée ; '
  '18':
  - type: text
    content: 'ils appelèrent et demandèrent si c''était là que logeait Simon surnommé Pierre. '
  '19':
  - type: note
    content: 'Cf. 9.10,12. –  l''Esprit lui dit 8.29+. –  trois hommes  : certains mss portent des hommes  ; un ms porte deux hommes  ; cf. v. 7+.'
  - type: text
    content: 'Comme Pierre réfléchissait à la vision, l''Esprit lui dit : Il y a là trois hommes qui te cherchent ; '
  '2':
  - type: note
    content: 'sa maison  : dans le monde romain, cette expression peut inclure, outre la famille proprement dite, les serviteurs, esclaves et affranchis, et même d''autres personnes choisissant de se placer dans la dépendance et sous la protection du maître de maison ; cf. 10.7,24 ; 11.14 ; 16.15,31,34 ; 18.8 ; Jn 4.53 ; 1Co 1.11n,16. –  pieux 3.12+ ; 10.7 ; 13.43n  ; 1Tm 3.16 ; 4.7s ; 6.3,5s,11 ; 2Tm 3.5,12 ; Tt 1.1 ; 2.12 ; 2P 1.3,6 ; 2.9 ; 3.11. –  craignait Dieu  : litt. craignant Dieu  ; cette expression désignait spécialement les non-Juifs sympathisants du judaïsme, voire convertis ; elle s''applique en général à ceux qui, contrairement aux prosélytes, n''étaient pas circoncis (2.11n) ; cependant elle ne désigne peut-être pas toujours exactement la même catégorie de personnes dans les Actes ; cf. 9.31 ; 10.22,35 ; 13.16,26,43n,50 ; 16.14 ; 18.7 ; voir aussi Ml 3.16n. –  actes de compassion 3.2n  ; 9.36+ ; cf. 10.4,31 ; Tobit 12.8 : « Mieux vaut la prière avec la vérité et l''aumône avec la justice que la richesse avec l''injustice. Mieux vaut faire l''aumône que d''amasser de l''or. » –  du peuple juif, cf. v. 22. –  constamment  : cf. Ps 34.2 ; Lc 2.37 ; 18.1.'
  - type: text
    content: 'Avec toute sa maison, il était pieux et craignait Dieu ; il faisait beaucoup d''actes de compassion en faveur du peuple et priait Dieu constamment. '
  '20':
  - type: note
    content: 'descends…  : litt. lève-toi, descends… –  sans la moindre hésitation  : on pourrait aussi comprendre sans le moindre doute, sans le moindre scrupule ou sans faire aucune différence (même verbe en 15.9), aucune discrimination (Jc 2.4n).'
  - type: text
    content: 'descends et pars avec eux sans la moindre hésitation, car c''est moi qui les ai envoyés. '
  '21':
  - type: text
    content: 'Pierre descendit donc et dit aux hommes : C''est moi que vous cherchez ; pour quel motif êtes-vous ici ? '
  '22':
  - type: note
    content: 'juste, craignant Dieu v. 2n,35 ; cf. Lc 1.6 ; 2.25 ; 23.50. –  la nation des Juifs  : cf. Lc 7.5. –  a été divinement averti…  : cf. Mt 2.12,22 ; Lc 2.26 ; Hé 8.5 ; 11.7 ; un terme apparenté est traduit par réponse divine en Rm 11.4. –  saint ange v. 3. –  chez lui  : litt. dans sa maison. –  pour t''entendre  : litt. pour entendre de toi des paroles  ; cf. 11.14n.'
  - type: text
    content: 'Ils répondirent : Le centurion Corneille, un homme juste, craignant Dieu et de qui toute la nation des Juifs rend un bon témoignage, a été divinement averti par un saint ange : il doit te faire venir chez lui pour t''entendre. '
  '23':
  - type: note
    content: Quelques frères v. 45 ; 11.12.
  - type: text
    content: Alors il les fit entrer et les logea.
  - type: text
    content: 'Le lendemain, il se leva et partit avec eux. Quelques frères de Joppé l''accompagnèrent. '
  '24':
  - type: text
    content: 'Il arriva à Césarée le jour suivant. Corneille les attendait et avait appelé chez lui les gens de sa parenté et ses amis intimes. '
  '25':
  - type: note
    content: 'A l''arrivée de Pierre  : autre traduction lorsque Pierre entra  ; le même verbe est traduit par arriver au v. 24 et par entrer au v. 27. Texte occidental  : Comme Pierre approchait de Césarée, un des serviteurs (cf. v. 7,23) courut en avant pour annoncer son arrivée. Alors Corneille, se précipitant à sa rencontre, tomba à ses pieds…  ; cf. Hé 7.1,10. –  se prosterna  : le même verbe est traduit par adorer en 8.27 ; 24.11 ; cf. 7.43 ; Mt 2.2n  ; voir culte.'
  - type: text
    content: 'A l''arrivée de Pierre, Corneille, qui était allé à sa rencontre, tomba à ses pieds et se prosterna. '
  '26':
  - type: note
    content: 'Cf. 3.12 ; 12.22 ; 14.13-15 ; 28.6 ; Lc 4.8 ; 5.8 ; Ap 19.10 ; 22.9 ; Sagesse 7.1 : « Je suis moi aussi (Salomon) un homme mortel, égal à tous, descendant du premier qui fut modelé de terre. » –  le releva (3.15n) et Lève-toi (2.24n) correspondent aux deux verbes grecs qui sont aussi traduits, dans d''autres contextes, réveiller ou relever (y compris au sens de résurrection, cf. v. 41). Au lieu de Lève-toi…, le texte occidental portait vraisemblablement Que fais-tu ? Moi aussi, je suis un être humain, tout comme toi.'
  - type: text
    content: 'Mais Pierre le releva en disant : Lève-toi ; moi aussi, je suis un être humain. '
  '27':
  - type: text
    content: 'Tout en conversant avec lui, il entra et trouva beaucoup de gens réunis. '
  '28':
  - type: note
    content: 'V. 14s+ ; 11.3,9 ; cf. Ga 2.12ss. –  un Juif  : litt. un homme juif, 1.16n.'
  - type: text
    content: 'Il leur dit : Vous savez qu''il est interdit à un Juif de se lier avec un étranger ou d''entrer chez lui ; mais Dieu m''a montré qu''il ne fallait dire d''aucun homme qu''il est souillé ou impur. '
  '29':
  - type: note
    content: V. 20.
  - type: text
    content: 'C''est pourquoi, quand vous avez envoyé quelqu''un me chercher, je suis venu sans aucune objection ; je vous demande donc pour quelle raison vous m''avez fait venir. '
  '3':
  - type: note
    content: 'la neuvième heure du jour  : entre 2 h et 3 h de l''après-midi environ ; voir 3.1n. –  vision 9.10+. –  ange de Dieu  : cf. v. 30 ; 5.19n  ; Lc 1.11 ; 24.4,23.'
  - type: text
    content: 'Vers la neuvième heure du jour, il vit clairement, en vision, un ange de Dieu entrer chez lui et lui dire : Corneille ! '
  '30':
  - type: note
    content: 'Il y a maintenant…  : texte obscur, litt. depuis le quatrième jour jusqu''à cette heure…  ; on pourrait aussi comprendre que Corneille prie (et jeûne, selon certains mss, notamment des témoins du texte occidental) depuis quatre jours (variante occidentale trois jours, cf. v. 3,9,23s). –  chez moi  : litt. dans ma maison. –  un homme (cf. v. 3+) en habit resplendissant  : cf. 1.10 ; Lc 24.4.'
  - type: text
    content: 'Corneille dit : Il y a maintenant quatre jours, je priais chez moi, à la neuvième heure ; soudain un homme en habit resplendissant s''est présenté devant moi '
  '31':
  - type: note
    content: 'ta prière a été exaucée Lc 1.13. –  Dieu s''est souvenu…  : litt. tes actes de compassion ont été rappelés devant Dieu  ; autre traduction tes actes de compassion ont attiré son attention  ; cf. v. 4n.'
  - type: text
    content: 'et a dit : Corneille, ta prière a été exaucée, et Dieu s''est souvenu de tes actes de compassion. '
  '32':
  - type: note
    content: 'V. 6+. – Le texte occidental ajoute à la fin du v.  : Quand il sera arrivé, il te parlera.'
  - type: text
    content: 'Envoie donc quelqu''un appeler à Joppé Simon surnommé Pierre ; il loge dans la maison de Simon, le tanneur, au bord de la mer. '
  '33':
  - type: note
    content: 'tu as eu la bonté  : même expression en Ph 4.14 et 3Jn 6 (tu feras bien). –  devant Dieu  : certains mss occidentaux portent devant toi. –  tout ce que le Seigneur…  : litt. tout ce qui t''a été ordonné par le Seigneur.'
  - type: text
    content: Je t'ai immédiatement envoyé quelqu'un, et toi, tu as eu la bonté de venir. Maintenant donc, nous, nous sommes tous ici devant Dieu, pour entendre tout ce que le Seigneur t'a ordonné de dire.
  - type: heading
    content: Le message de Pierre
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'prit la parole 8.35n  ; cf. 2.14+. –  partial  : le terme grec ainsi traduit est formé d''après une expression hébraïque ; pour être partial ou faire du favoritisme on disait relever ou accueillir la face (pour distinguer quelqu''un, lui accorder un traitement de faveur ; voir Gn 4.7n  ; Lc 20.21n) ; cf. Lv 19.15 ; Dt 10.17 ; Ml 2.9 ; Ps 82.2 ; 2Ch 19.7 ; termes apparentés en Rm 2.10s ; Ga 2.16 ; Ep 6.9 ; Col 3.25 ; Jc 2.1,9 ; 1P 1.17 ; voir aussi Mt 22.16n.'
  - type: text
    content: 'Alors Pierre prit la parole : En vérité, dit-il, je comprends que Dieu n''est pas partial, '
  '35':
  - type: note
    content: 'le craint v. 2+. –  pratique la justice Ps 15.2. –  est agréé de lui  : cf. Rm 14.18 ; Ph 4.18 ; 1P 2.5 ; voir aussi Jn 9.31.'
  - type: text
    content: 'mais qu''en toute nation celui qui le craint et pratique la justice est agréé de lui. '
  '36':
  - type: note
    content: 'Il a envoyé la Parole  : litt. (selon la leçon la plus probable) la parole qu''il a envoyée  ; cf. 13.26 ; Ps 107.20 ; 147.18s. –  Israélites Lc 1.16n. –  la bonne nouvelle de la paix Es 52.7 ; Na 2.1 ; Rm 10.15 ; Ep 2.17 ; 6.15. –  le Seigneur de tous 2.36+ ; Rm 10.12 ; cf. Mt 28.18 ; Ap 17.14 ; 19.16.'
  - type: text
    content: 'Il a envoyé la Parole aux Israélites, en leur annonçant la bonne nouvelle de la paix par Jésus-Christ : c''est lui qui est le Seigneur de tous. '
  '37':
  - type: note
    content: 'Texte difficile ; cf. 1.5,22 ; 13.23s ; Mc 1.14+ ; Lc 3.21-23/ / ; 4.14 ; 16.16 ; 23.5. –  ce  : litt. la chose ou la parole. –  après avoir commencé  : on pourrait comprendre après qu''il (Jésus, v. 38) eut commencé. –  baptême / Jean 1.5 ; 13.24 ; 18.25 ; 19.1-7 ; Mc 1.4n.'
  - type: text
    content: 'Vous, vous savez ce qui est arrivé dans toute la Judée, après avoir commencé en Galilée, à la suite du baptême que Jean a proclamé : '
  '38':
  - type: note
    content: 'a conféré une onction… à  : autre traduction fait Christ 4.27n. – Voir Esprit saint. –  faisait du bien  : verbe grec apparenté au nom traduit par bienfaiteur en Lc 22.25n. –  guérissait  : cf. 9.34 ; Mt 4.23+/ / ; Lc 4.35s ; 7.22s ; 9.6 ; 13.16. –  opprimés…  : même terme Jc 2.6+ ; autre traduction au pouvoir du diable  ; voir démon, diable, Satan. –  Dieu était avec lui Jn 3.2 ; 8.29.'
  - type: text
    content: 'comment Dieu a conféré une onction d''Esprit saint et de puissance à Jésus de Nazareth qui, là où il passait, faisait du bien et guérissait tous ceux qui étaient opprimés par le diable ; car Dieu était avec lui. '
  '39':
  - type: note
    content: 'Nous sommes témoins 1.8+. – Voir Juifs. –  qu''ils ont supprimé 2.23+. –  en le pendant  : autre traduction en le faisant pendre. –  au bois 5.30+.'
  - type: text
    content: 'Nous sommes témoins de tout ce qu''il a fait dans le pays des Juifs et à Jérusalem. Celui qu''ils ont supprimé en le pendant au bois, '
  '4':
  - type: note
    content: 'V. 1+,31. –  saisi de crainte 24.25. –  et il s''en est souvenu  : formule comparable au v. 31n  ; autres traductions possibles sont montées devant Dieu en évocation (ou en souvenir, en commémoration  ; allusion au rituel sacrificiel, cf. Lv 2.2n  ?). Voir aussi Ex 12.14 ; 17.14 ; Jos 4.7 ; Mc 14.9 ; Tobit 12.12-14 : « Lorsque tu (Tobias) as prié, ainsi que Sara, c''est moi (l''ange Raphaël) qui ai présenté le mémorial de votre prière en présence de la gloire du Seigneur… Mais dans le même temps Dieu m''a envoyé pour te guérir. » Siracide 35.9 : « Le sacrifice de l''homme juste est agréé et son mémorial ne sera pas oublié. »'
  - type: text
    content: 'Il le fixa et, saisi de crainte, il lui dit : Qu''y a-t-il, Seigneur ? L''ange lui dit : Tes prières et tes actes de compassion sont montés devant Dieu, et il s''en est souvenu. '
  '40':
  - type: note
    content: 'Dieu l''a réveillé ou relevé 3.15n. –  le troisième jour  : cf. Os 6.2 ; Lc 9.22 ; 13.32 ; 18.33 ; 24.7,46 ; 1Co 15.4-7. –  se manifester 1.3 ; cf. Jn 14.19,22.'
  - type: text
    content: 'Dieu l''a réveillé le troisième jour ; il lui a donné de se manifester, '
  '41':
  - type: note
    content: 'aux témoins… 10.39 ; cf. 1.21-22+ ; 22.14s. –  désignés d''avance  : cf. 14.23n. –  mangé et bu avec lui 1.4n  ; Lc 24.30, 41-43 ; Jn 21.12s ; avec plusieurs variantes selon les mss, le texte occidental ajoute  : et qui avons vécu dans son intimité (le verbe revient, dans le texte occidental, en 11.28 ; 16.39 ; 17.5) pendant quarante jours. –  qu''il s''est (ou qu''il a été) relevé d''entre les morts 2.24n.'
  - type: text
    content: 'non à tout le peuple, mais aux témoins désignés d''avance par Dieu, à nous qui avons mangé et bu avec lui après qu''il s''est relevé d''entre les morts. '
  '42':
  - type: note
    content: 'que Dieu a institué  : litt. qui a été institué par Dieu (comme) juge…  ; le même verbe a été traduit par arrêter (une décision) en 2.23n. –  juge des vivants et des morts 17.31 ; cf. 2.36 ; 7.27 ; Mt 25.31-46 ; Jn 5.22,27 ; Rm 2.16 ; 14.9s ; 2Tm 4.1 ; 1P 4.5.'
  - type: text
    content: 'Et il nous a enjoint de proclamer au peuple et d''attester que c''est lui que Dieu a institué juge des vivants et des morts. '
  '43':
  - type: note
    content: 'Tous les prophètes 3.18+,24. –  quiconque met sa foi (ou croit) en lui  : cf. 11.17s ; 13.39 ; 15.9-11 ; Rm 1.16s ; 9.33 ; 10.9-13. –  par son nom 3.16+. –  le pardon des péchés 2.38+ ; Es 33.24 ; Jr 31.34.'
  - type: text
    content: 'Tous les prophètes lui rendent ce témoignage : quiconque met sa foi en lui reçoit par son nom le pardon des péchés.'
  - type: heading
    content: Des non-Juifs reçoivent l'Esprit saint
  '44':
  - type: text
    content: ' '
  - type: note
    content: tomba 8.16n  ; cf. 11.15.
  - type: text
    content: 'Pierre était encore en train de dire cela quand l''Esprit saint tomba sur tous ceux qui écoutaient la Parole. '
  '45':
  - type: note
    content: 'circoncis  : litt. de circoncision, c.-à-d. juifs  ; cf. 11.2 ; Ga 2.12. –  que le don de l''Esprit saint… 2.17+,33. –  sur les non-Juifs  : litt. les nations ou les gens des nations, d''après le terme (traditionnellement traduit par païens) par lequel les Juifs désignaient les non-Juifs ; 11.1,18 ; 13.46 ; 14.27 ; 15.7,12 ; Mt 4.15n.'
  - type: text
    content: 'Tous les croyants circoncis qui étaient venus avec Pierre furent stupéfaits de voir que le don de l''Esprit saint était aussi répandu sur les non-Juifs. '
  '46':
  - type: note
    content: Cf. 2.4n,11 ; 19.6.
  - type: text
    content: 'Car ils les entendaient parler en langues et magnifier Dieu. Alors Pierre reprit : '
  '47':
  - type: note
    content: 'refuser l''eau du baptême  : litt. refuser (le même verbe est traduit par empêcher en 8.36+ ; s''opposer à en 11.17n) l''eau, pour que ne soient pas baptisés… –  qui ont reçu l''Esprit saint (8.15+) tout comme nous 11.17+.'
  - type: text
    content: 'Peut-on refuser l''eau du baptême à ces gens, qui ont reçu l''Esprit saint tout comme nous ? '
  '48':
  - type: note
    content: 'Il ordonna qu''ils reçoivent… 2.38+ ; cf. 8.12,16s,36 ; 19.5 ; cf. Jn 4.2 ; 1Co 1.14,17. –  au nom de Jésus-Christ  : certains mss portent au nom du Seigneur ou au nom du Seigneur Jésus-Christ. –  demeurer là quelques jours 9.19 ; 14.28 ; 16.15 ; 21.4 ; 28.14 ; Jn 4.40.'
  - type: text
    content: Il ordonna qu'ils reçoivent le baptême au nom de Jésus-Christ. Ils lui demandèrent alors de demeurer là quelques jours.
  '5':
  - type: note
    content: 'V. 18,23,32 ; 9.43. –  Simon / Pierre  : cf. 15.14n  ; Lc 6.14/ / ; Jn 1.42.'
  - type: text
    content: 'Envoie maintenant des hommes à Joppé et fais venir un certain Simon surnommé Pierre ; '
  '6':
  - type: note
    content: 'un autre  : litt. un certain, comme au v. 5 et en 9.43n. – Certains mss ajoutent à la fin du v. C''est lui qui te dira ce qu''il faut que tu fasses  ; d''autres ont une variante correspondant à 11.14.'
  - type: text
    content: 'il loge chez un autre Simon, qui est tanneur et dont la maison est au bord de la mer. '
  '7':
  - type: note
    content: V. 19n  ; 11.11 ; cf. Mt 8.9/ /.
  - type: text
    content: 'Dès que l''ange qui lui avait parlé fut parti, Corneille appela deux de ses domestiques et un soldat pieux parmi ceux qui lui étaient attachés ; '
  '8':
  - type: note
    content: Joppé, à une cinquantaine de kilomètres de Césarée ; cf. 9.36.
  - type: text
    content: après leur avoir tout raconté, il les envoya à Joppé.
  - type: heading
    content: La vision de Pierre
  - type: heading
    content: 11.5-17
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le toit en terrasse  : cf. Lc 5.19+. –  la sixième heure , entre 11 h et midi environ (cf. 22.6 ; Jn 4.6-8).'
  - type: text
    content: 'Le lendemain, comme ils étaient en route et qu''ils approchaient de la ville, Pierre monta sur le toit en terrasse, vers la sixième heure, pour prier. '
