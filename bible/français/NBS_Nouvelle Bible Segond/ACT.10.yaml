document_id: ACT.10,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vision de Corneille
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Césarée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'centurion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 27.1 ; Mt 8.5 ; 27.54/ / ; Lc 7.2ss ; cf. Mc 15.39
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la cohorte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (21.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'appelée italique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était constituée, en principe, de soldats d'origine italienne.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait à Césarée un nommé Corneille, centurion de la cohorte appelée italique. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: extase
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec correspondant ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ekstasis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') signifie proprement le fait d''être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hors de soi-même '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (11.5 ; 22.17 ; Gn 15.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; le même mot a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'stupéfaction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Ac 3.10 ; 10.45 ; cf. 2.7+ ; voir Mc 2.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 5.26).'
      marker-yv: yv-n
    - type: text
      text: 'Il eut faim et voulut manger. Pendant qu''on lui préparait quelque chose, il lui advint une extase. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le ciel ouvert '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.56+ ; cf. Ez 1.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un objet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un récipient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même mot a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'instrument '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 9.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une grande toile…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; on y voit habituellement une sorte de nappe suspendue en l''air ; quelques-uns se représentent au contraire un genre de tente rejoignant la terre par ses quatre coins.'
      marker-yv: yv-n
    - type: text
      text: 'Il voit le ciel ouvert et un objet semblable à une grande toile tenue par les quatre coins, qui descend et s''abaisse jusqu''à la terre ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 1.21,24 ; 6.7,20 ; 7.14 ; Rm 1.23.
      marker-yv: yv-n
    - type: text
      text: 'il y avait là tous les quadrupèdes et les reptiles de la terre, ainsi que les oiseaux du ciel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abats '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sacrifie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Mc 14.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 2.8.'
      marker-yv: yv-n
    - type: text
      text: 'Une voix lui dit : Lève-toi, Pierre, abats et mange. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 11 ; Ez 4.14.
      marker-yv: yv-n
    - type: text
      text: 'Pierre répondit : En aucun cas, Seigneur ! Je n''ai jamais rien mangé de souillé ni d''impur ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce que Dieu a '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifié
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce que Dieu a déclaré pur, toi, ne le considère pas comme souillé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme profane
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '  ; cf. v. 28 ; 15.9 ; 21.28 ; Gn 9.3 ; Mt 15.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mc 7.15,19/ / ; Rm 14.14 ; 1Tm 4.4.'
      marker-yv: yv-n
    - type: text
      text: 'Pour la deuxième fois la voix lui parle : Ce que Dieu a purifié, toi, ne le souille pas ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 41.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: enlevé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.2+.'
      marker-yv: yv-n
    - type: text
      text: Cela se produisit trois fois ; et aussitôt après l'objet fut enlevé au ciel.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'perplexe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le sens…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur ce que pouvait être la vision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(9.10+). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: après s'être renseignés pour trouver la maison de Simon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après une reconstitution, cette précision aurait été absente du texte occidental. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la porte d''entrée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.13.
      marker-yv: yv-n
    - type: text
      text: 'Pierre était perplexe sur le sens de la vision qu''il avait eue. C''est alors que les hommes envoyés par Corneille, après s''être renseignés pour trouver la maison de Simon, survinrent à la porte d''entrée ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ils appelèrent et demandèrent si c''était là que logeait Simon surnommé Pierre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.10,12. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' lui dit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; un ms porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deux hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 7+.'
      marker-yv: yv-n
    - type: text
      text: 'Comme Pierre réfléchissait à la vision, l''Esprit lui dit : Il y a là trois hommes qui te cherchent ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans le monde romain, cette expression peut inclure, outre la famille proprement dite, les serviteurs, esclaves et affranchis, et même d''autres personnes choisissant de se placer dans la dépendance et sous la protection du maître de maison ; cf. 10.7,24 ; 11.14 ; 16.15,31,34 ; 18.8 ; Jn 4.53 ; 1Co 1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.12+ ; 10.7 ; 13.43
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Tm 3.16 ; 4.7s ; 6.3,5s,11 ; 2Tm 3.5,12 ; Tt 1.1 ; 2.12 ; 2P 1.3,6 ; 2.9 ; 3.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: craignait Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: craignant
        - type: text
          text: ' Dieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette expression désignait spécialement les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: ' sympathisants du judaïsme, voire convertis ; elle s''applique en général à ceux qui, contrairement aux prosélytes, n''étaient pas circoncis (2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; cependant elle ne désigne peut-être pas toujours exactement la même catégorie de personnes dans les Actes ; cf. 9.31 ; 10.22,35 ; 13.16,26,43
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',50 ; 16.14 ; 18.7 ; voir aussi Ml 3.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'actes de compassion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.36+ ; cf. 10.4,31 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.8 : « Mieux vaut la prière avec la vérité et l''aumône avec la justice que la richesse avec l''injustice. Mieux vaut faire l''aumône que d''amasser de l''or. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'juif, cf. v. 22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: constamment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 34.2 ; Lc 2.37 ; 18.1.'
      marker-yv: yv-n
    - type: text
      text: 'Avec toute sa maison, il était pieux et craignait Dieu ; il faisait beaucoup d''actes de compassion en faveur du peuple et priait Dieu constamment. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: descends…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lève-toi, descends… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans la moindre hésitation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sans le moindre doute, sans le moindre scrupule '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sans faire aucune différence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même verbe en 15.9), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aucune discrimination '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Jc 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'descends et pars avec eux sans la moindre hésitation, car c''est moi qui les ai envoyés. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Pierre descendit donc et dit aux hommes : C''est moi que vous cherchez ; pour quel motif êtes-vous ici ? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: craignant
        - type: text
          text: ' Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',35 ; cf. Lc 1.6 ; 2.25 ; 23.50. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la nation des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 7.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a été divinement averti…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 2.12,22 ; Lc 2.26 ; Hé 8.5 ; 11.7 ; un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'réponse divine '
      - type: usfm
        marker: ft
        children:
