    - type: text
      text: 'Ils répondirent : Le centurion Corneille, un homme juste, craignant Dieu et de qui toute la nation des Juifs rend un bon témoignage, a été divinement averti par un saint ange : il doit te faire venir chez lui pour t''entendre. '
