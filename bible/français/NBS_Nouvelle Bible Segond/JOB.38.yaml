document_id: JOB.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: INTERVENTION DU SEIGNEUR
  - type: text
    content: ' '
  - type: note
    content: 40.6. –  Le Seigneur répondit 11.5. –  tempête 9.17+ ; même terme hébreu en 2R 2.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit à Job du milieu de la tempête :'
  '10':
  - type: text
    content: quand je lui fixai mes prescriptions
  - type: text
    content: et que je lui mis des verrous et des portes ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 5.22 ; Ps 104.9 ; Pr 8.29. –  l''orgueil de tes flots  : cf. Ps 46.4n.'
  - type: text
    content: 'quand je dis : « Tu viendras jusqu''ici, tu n''iras pas au-delà ;'
  - type: text
    content: ici s'arrêtera l'orgueil de tes flots ! »
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 74.16.
  - type: text
    content: As-tu, un seul de tes jours, commandé au matin ?
  - type: text
    content: As-tu fait connaître à l'aurore son lieu,
  '13':
  - type: text
    content: ' '
  - type: note
    content: V. 15+.
  - type: text
    content: pour qu'elle saisisse les bords de la terre
  - type: text
    content: et que les méchants en soient secoués ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'comme l''argile…  : litt. comme argile de sceau  : les comparaisons suggèrent l''apparition des formes, puis l''apparition des couleurs ( vêtement ).'
  - type: text
    content: Tout se transforme alors comme l'argile sous le sceau
  - type: text
    content: et se présente comme paré d'un vêtement.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 24.13-17.
  - type: text
    content: Mais les méchants sont privés de leur lumière,
  - type: text
    content: et le bras qui se lève est brisé.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jon 2.7. –  profondeurs 11.7+. –  abîme Gn 1.2n.
  - type: text
    content: Es-tu parvenu jusqu'aux sources de la mer ?
  - type: text
    content: T'es-tu promené dans les profondeurs de l'abîme ?
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Les portes Es 38.10 ; Ps 9.14 ; 107.18 ; la deuxième fois LXX a lu les portiers . –  mises à découvert  : cf. 12.22 ; 20.27 ; autres traductions dévoilées ; révélées  ; cf. 12.22 ; 20.27. –  l''ombre de mort 3.5n  ; cf. 10.21-22n.'
  - type: text
    content: Les portes de la mort ont-elles été mises à découvert pour toi ?
  - type: text
    content: As-tu vu les portes de l'ombre de mort ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'l''étendue  : litt. les largeurs . –  si tu sais tout cela  : autre traduction si tu la connais toute (la terre).'
  - type: text
    content: As-tu appréhendé l'étendue de la terre ?
  - type: text
    content: Dis-le, si tu sais tout cela.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'où donc résident-elles  : litt. quel (est) leur lieu.'
  - type: text
    content: Où est donc le chemin où demeure la lumière ?
  - type: text
    content: Et les ténèbres, où donc résident-elles,
  '2':
  - type: text
    content: ' '
  - type: note
    content: 42.3. –  sans connaissance 34.35 ; 35.16.
  - type: text
    content: Qui est celui qui obscurcit mes projets
  - type: text
    content: par des propos sans connaissance ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'leur limite ou leur frontière . –  habitation  : litt. maison.'
  - type: text
    content: pour que tu puisses les saisir à leur limite
  - type: text
    content: et comprendre les sentiers de leur habitation ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 4 ; 14.1.
  - type: text
    content: Tu le sais, n'est-ce pas, car alors tu étais né,
  - type: text
    content: et le nombre de tes jours est grand !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'réserves  : le mot signifie aussi trésors  ; cf. 26.8+ ; Jr 10.13n. –  neige 37.6. –  grêle Ex 9.18-26 ; Jos 10.11 ; Es 28.17 ; 30.30 ; Ez 38.22 ; Ps 78.47 ; Ap 16.21.'
  - type: text
    content: Es-tu parvenu jusqu'aux réserves de neige ?
  - type: text
    content: As-tu vu les réserves de grêle,
  '23':
  - type: text
    content: que j'ai mises de côté pour un temps de détresse,
  - type: text
    content: pour un jour de combat et de guerre ?
  '24':
  - type: text
    content: ' '
  - type: note
    content: vent d'est 27.21 ; Ex 14.21 ; Ps 48.8 ; Ac 27.20.
  - type: text
    content: Où est le chemin par lequel la lumière se divise,
  - type: text
    content: celui par lequel le vent d'est se répand sur la terre ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'un passage ou un aqueduc , même terme en 2R 18.17+ ; cf. Ez 31.4n. –  aux flots de l''averse  : ou bien la pluie elle-même, ou plutôt les torrents qui se forment très rapidement sous l''orage dans les gorges du désert.'
  - type: text
    content: Qui a ouvert un passage aux flots de l'averse,
  - type: text
    content: tracé le chemin de l'éclair et des coups de tonnerre,
  '26':
  - type: text
    content: pour faire pleuvoir sur une terre sans hommes,
  - type: text
    content: sur un désert où il n'y a pas d'êtres humains,
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'tourmente / ravage  : cf. 30.3n.'
  - type: text
    content: pour rassasier les lieux de la tourmente et du ravage,
  - type: text
    content: pour y faire germer et sortir de l'herbe ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: 28.25+.
  - type: text
    content: La pluie a-t-elle un père ?
  - type: text
    content: Qui donc fait naître les gouttes de rosée ?
  '29':
  - type: text
    content: ' '
  - type: note
    content: glace 37.10.
  - type: text
    content: De quel sein maternel est sortie la glace ?
  - type: text
    content: Qui a mis au monde le givre du ciel ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: '40.7 ; cf. 36.23+. –  Tiens-toi prêt  : litt. ceins tes reins , geste de celui qui se prépare à l''action, en particulier à un combat. –  tu m''instruiras  : litt. tu me feras connaître.'
  - type: text
    content: Tiens-toi prêt, je te prie, comme un vaillant homme ;
  - type: text
    content: je t'interrogerai, et tu m'instruiras.
  - type: heading
    content: Le Seigneur, maître du monde inanimé
  '30':
  - type: text
    content: ' '
  - type: note
    content: 's''immobilisent  : litt. se cachent , ce qui peut signifier disparaissent (sous la pierre de la glace) ou se déguisent (en pierre).'
  - type: text
    content: Les eaux s'immobilisent comme une pierre,
  - type: text
    content: la surface de l'abîme se prend.
  '31':
  - type: text
    content: ' '
  - type: note
    content: '9.9+. –  qui desserres  : cf. 39.5.'
  - type: text
    content: Est-ce toi qui noues les liens des Pléiades
  - type: text
    content: ou qui desserres les cordages d'Orion ?
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'constellations  : le mot hébreu, qui n''apparaît nulle part ailleurs, a été diversement traduit (signes du zodiaque, planètes, couronne boréale etc.) ; il est très proche de celui qui a été rendu par constellations du zodiaque en 2R 23.5.'
  - type: text
    content: Est-ce toi qui fais paraître en leur temps les constellations,
  - type: text
    content: et qui conduis la Grande Ourse avec ses petits ?
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'son pouvoir  : le terme original comporte l''idée d''un ordre écrit. Cf. Mt 6.10.'
  - type: text
    content: Connais-tu les lois du ciel ?
  - type: text
    content: Est-ce toi qui règles son pouvoir sur la terre ?
  '34':
  - type: text
    content: ' '
  - type: note
    content: 1R 17.1 ; 18.41-45.
  - type: text
    content: Peux-tu élever la voix jusqu'aux nuages,
  - type: text
    content: pour que des torrents d'eaux te recouvrent ?
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'vers leur destination  : litt. et ils partent . –  Nous sommes là  : litt. nous voici  ; cf. v. 7n.'
  - type: text
    content: Est-ce toi qui envoies les éclairs vers leur destination ?
  - type: text
    content: 'Est-ce à toi qu''ils diront : « Nous sommes là ! »'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'La traduction des mots hébreux pour ibis et coq est incertaine. L''ibis et le coq étaient réputés pour leur sagesse : le premier, associé à Thot (nom assez proche du terme hébreu qui apparaît ici), divinité de la sagesse, était censé annoncer la crue du Nil en Egypte et l''autre, le lever du soleil et les pluies d''automne.'
  - type: text
    content: Qui a mis la sagesse en l'ibis,
  - type: text
    content: qui a donné l'intelligence au coq ?
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'incliner  : litt. faire coucher.'
  - type: text
    content: Qui peut avec sagesse compter les nuages
  - type: text
    content: et incliner les outres du ciel,
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'se fige ou se fonde  : cf. 36.16n  ; 37.10n.'
  - type: text
    content: pour que la poussière se fige
  - type: text
    content: et que les mottes de terre se collent ?
  - type: heading
    content: Dieu, maître du monde animal
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.10s ; Ps 104.21 ; 145.15. – Plusieurs éditions commencent ici le chapitre 39, ce qui provoque dans la suite un décalage de trois versets. –  apaises la faim  : litt. remplis la vie (le même mot hébreu est habituellement traduit par être vivant ) des jeunes lions.'
  - type: text
    content: Est-ce toi qui chasses une proie pour la lionne
  - type: text
    content: et qui apaises la faim des jeunes lions,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21 ; 15.7+. –  si tu es intelligent  : litt. si tu connais l''intelligence  ; cf. Es 29.24 ; Pr 1.2 ; 4.1 ; 17.27 ; 2Ch 2.11n.'
  - type: text
    content: Où étais-tu quand je fondais la terre ?
  - type: text
    content: Dis-le, si tu es intelligent.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Cf. 37.8n.
  - type: text
    content: quand ils sont tapis dans leurs tanières,
  - type: text
    content: quand ils habitent dans le taillis comme dans un repaire ?
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 147.9. –  pâture  : le mot peut désigner la chasse ou le gibier.'
  - type: text
    content: Qui prépare au corbeau sa pâture,
  - type: text
    content: quand ses petits appellent Dieu au secours,
  - type: text
    content: errants, sans rien à manger ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 31.38s ; Za 1.16 ; 2.5 ; Ap 11.1s.
  - type: text
    content: Qui en a fixé les mesures, le sais-tu ?
  - type: text
    content: Ou qui a tendu sur elle le cordeau ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: bases 9.6+ ; cf. 26.7. –  pierre angulaire Ps 118.22 ; Mt 21.42/ /.
  - type: text
    content: Dans quoi ses bases sont-elles enfoncées ?
  - type: text
    content: Qui en a posé la pierre angulaire,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'étoiles  : cf. Baruch 3.34s : « Les étoiles ont brillé en leurs veilles et se sont réjouies ; il (Dieu) les a appelées, et elles ont répondu : “Nous voici !” Elles ont brillé avec allégresse pour leur Créateur. » –  fils de Dieu 1.6n. –  lançaient des acclamations  : cf. Za 4.7 ; Ps 27.6+ ; Esd 3.10 ; Lc 19.40.'
  - type: text
    content: alors qu'ensemble les étoiles du matin criaient de joie
  - type: text
    content: et que tous les fils de Dieu lançaient des acclamations ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 7.12+.
  - type: text
    content: Qui a enfermé la mer avec des portes,
  - type: text
    content: quand elle s'élança pour sortir du sein maternel,
  '9':
  - type: text
    content: quand je fis de la nuée son vêtement
  - type: text
    content: et de l'obscurité épaisse ses langes,
