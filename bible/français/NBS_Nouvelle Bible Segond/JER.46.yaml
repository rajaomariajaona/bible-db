document_id: JER.46,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Dans LXX, les oracles sur les nations (1.10+) sont placés après 25.13n et se présentent dans un ordre différent ; voir « Les éditions anciennes du livre de Jérémie »♦ ; cf. Es 13–23 ; Ez 25–32.
  - type: text
    content: 'Voici la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Jérémie, le prophète, au sujet des nations :'
  - type: heading
    content: Défaite des Egyptiens à Karkemish
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'des Armées  : omis par LXX. –  vengeance 50.15+. –  L''épée 12.12+ ; 47.6 ; Dt 32.41s ; Es 34.5s. –  un sacrifice So 1.7. –  au pays du nord 1.14n  ; cf. v. 2,20,24.'
  - type: text
    content: 'Ce jour-là appartient au Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées ;'
  - type: text
    content: c'est un jour de vengeance,
  - type: text
    content: le jour où il se venge de ses ennemis.
  - type: text
    content: L'épée dévore, elle se rassasie,
  - type: text
    content: elle s'abreuve de leur sang.
  - type: text
    content: 'Car c''est un sacrifice pour le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: au pays du nord, près de l'Euphrate.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Galaad / baume 8.22n. –  Egypte jolie  : litt. vierge de la fille de l''Egypte  ; cf. v. 19,24 ; 14.17+ ; sur l''expression fille de l''Egypte  ; cf. 4.11n,31n. –  C''est inutilement…  : cf. 15.18+ ; 30.13 ; Es 1.6.'
  - type: text
    content: Monte au Galaad, prends du baume, Egypte jolie !
  - type: text
    content: C'est inutilement que tu multiplies les remèdes,
  - type: text
    content: il n'y en a pas pour toi qui soit efficace.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ignominie 13.26+. –  trébuche / tombent v. 6+ ; cf. Na 2.6.
  - type: text
    content: Les nations apprennent ton ignominie,
  - type: text
    content: et tes cris remplissent la terre,
  - type: text
    content: car un guerrier trébuche sur un autre guerrier,
  - type: text
    content: ils tombent tous les deux ensemble.
  - type: heading
    content: Invasion de l'Egypte
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 50.1s. –  sur l'arrivée… 43.10-11+.
  - type: text
    content: 'Parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' adressa à Jérémie, le prophète, sur l''arrivée de Nabuchodonosor, roi de Babylone, qui venait mettre à mal l''Egypte :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Migdol… 44.1n. –  Tahpanhès (2.16n) est absent de LXX. –  autour de toi  : LXX tes taillis  ; cf. 21.14.'
  - type: text
    content: Annoncez-le en Egypte,
  - type: text
    content: faites-le entendre à Migdol,
  - type: text
    content: faites-le entendre à Noph et à Tahpanhès !
  - type: text
    content: 'Dites : Poste-toi, prépare-toi,'
  - type: text
    content: car l'épée dévore autour de toi !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi…  : traduction d''après LXX, où il y a manifestement allusion au culte du taureau sacré Apis , associé au culte de Ptah à Memphis (= Noph). Sur le terme pour taureau (qui rappelle la transcription de l''égyptien abrék en Gn 41.43n) ; cf. 47.3 ; Gn 49.24n  ; la lecture traditionnelle du texte hébreu, obscure, pourrait éventuellement se traduire ainsi  : Pourquoi tes taureaux (ou tes guerriers ) sont-ils emportés ? Ils ne tiennent pas, car le Seigneur les repousse (Pr 10.3n).'
  - type: text
    content: Pourquoi Apis s'enfuit-il ?
  - type: text
    content: 'Ton taureau ne tient pas, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le renverse.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'trébucher… v. 6+. –  vers notre peuple v. 9n  ; 50.16. –  pays de nos origines 22.10n. –  l''épée du destructeur  : cf. 25.38n.'
  - type: text
    content: Il en fait trébucher un grand nombre ;
  - type: text
    content: 'ils tombent l''un sur l''autre et disent :'
  - type: text
    content: Levons-nous, revenons vers notre peuple,
  - type: text
    content: au pays de nos origines,
  - type: text
    content: loin de l'épée du destructeur.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Quant au pharaon…  : traduction d''après LXX et Vg  ; la vocalisation traditionnelle du texte hébreu se traduirait ainsi  : là-bas on a crié au pharaon… –  Vacarme à retardement  : plus littéralement Vacarme laisse passer le temps (ou l''occasion ), c.-à-d. arrive trop tard  ; cf. 37.7 ; voir aussi Es 30.7 ; 36.6.'
  - type: text
    content: Quant au pharaon, le roi d'Egypte,
  - type: text
    content: appelez-le « Vacarme à retardement ».
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Par ma vie  : cf. 4.2n  ; 22.5+. –  déclaration du roi… 48.15 ; 51.57 ; cf. 10.16+. –  le Tabor (Os 5.1n) et le Carmel (qui forme un promontoire sur la mer Es 33.9n), montagnes du nord du pays. –  il vient  : il s''agit ou de Nabuchodonosor, ou de Dieu qui l''envoie.'
  - type: text
    content: Par ma vie,
  - type: text
    content: '– déclaration du roi, dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: tel le Tabor parmi les montagnes,
  - type: text
    content: comme le Carmel dans la mer, il vient !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Fais ton paquet ou tes bagages  ; 10.17 ; Ez 12.3ss. –  habitante…  : litt. habitante, fille de l''Egypte v. 11n,24 ; 21.13n  ; 48.18. –  Noph ou Memphis 2.16n.'
  - type: text
    content: Fais ton paquet pour l'exil,
  - type: text
    content: habitante de l'Egypte, la belle !
  - type: text
    content: Car Noph sera dévastée,
  - type: text
    content: elle sera brûlée,
  - type: text
    content: elle n'aura plus d'habitants.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Egypte 25.19+. –  Néko (≈ 610-595 av. J.-C.), qui s'était porté au secours de l'Assyrie gravement menacée par les forces babyloniennes, a été défait en 605 ( quatrième année de Joïaqim 25.1n) par Nabuchodonosor , futur roi de Babylone (21.2n), lors de la bataille décisive de Karkemish , à la frontière actuelle entre la Turquie et la Syrie ; cette bataille devait consacrer l'hégémonie de l'empire néo-babylonien. C'est au cours de sa progression vers le nord que Néko avait battu Josias à Meguiddo (2R 23.29ss ; 24.7 ; 2Ch 35.20ss), et c'est à son retour qu'il déposa Joachaz (2R 23.33).
  - type: text
    content: Sur l'Egypte. Sur l'armée du pharaon Néko, roi d'Egypte, qui se trouvait sur l'Euphrate, à Karkemish, et qui fut battue par Nabuchodonosor, roi de Babylone, la quatrième année de Joïaqim, fils de Josias, roi de Juda.
  '20':
  - type: text
    content: ' '
  - type: note
    content: belle génisse Os 10.11. –  du nord v. 10+.
  - type: text
    content: L'Egypte est une très belle génisse…
  - type: text
    content: Le taon vient du nord, il vient…
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'mercenaires  : le terme est habituellement traduit par salarié (Ex 12.45 ; Dt 15.18), mais il est à comprendre ici en contexte militaire. –  taurillons (ou veaux ) à l''étable (ou engraissés  ; cf. Lc 15.23) : même expression en 1S 28.24 ; Am 6.4 ; Ml 3.20. –  de la catastrophe  : litt. leur catastrophe  ; cf. 18.17n. –  le temps où ils rendront des comptes 6.15n  ; 8.12n  ; 50.27n.'
  - type: text
    content: Ses mercenaires aussi sont en elle
  - type: text
    content: comme des taurillons à l'étable.
  - type: text
    content: Et eux aussi, ils rebroussent chemin,
  - type: text
    content: ils fuient tous ensemble, ils ne tiennent pas.
  - type: text
    content: Car le jour de la catastrophe vient sur eux,
  - type: text
    content: le temps où ils rendront des comptes.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Elle s''enfuit…  : litt. sa voix (ou son bruit [à elle, c.-à-d. l''Egypte, v. 11,20]) est comme un serpent qui va  ; on pourrait aussi comprendre elle s''enfuit avec un sifflement de serpent , ou bien aussi discrètement qu''un serpent qui s''en va sans demander son reste  ; ou encore, avec Vg  : sa voix (c.-à-d. sa plainte ou son bruit , c.-à-d. le fracas de sa destruction) résonne comme un objet de bronze (homonymie possible en hébreu entre serpent et bronze  ; cf. Nb 21). –  avec des haches  : cf. Ps 74.5s.'
  - type: text
    content: Elle s'enfuit avec un bruit de serpent ;
  - type: text
    content: car ils s'avancent avec une armée,
  - type: text
    content: ils viennent contre elle avec des haches,
  - type: text
    content: pareils à des bûcherons.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ils coupent  : autre traduction coupez… ! Es 10.34. –  bien qu''elle soit impénétrable  : autre traduction possible, d''après un ms hébreu oui, ils sont innombrables . –  plus nombreux que les criquets  : cf. 51.27 ; Jg 6.5 ; 7.12 ; Jl 1.4 ; Ap 9.3.'
  - type: text
    content: Ils coupent sa forêt
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: bien qu'elle soit impénétrable ;
  - type: text
    content: car ils sont plus nombreux que les criquets,
  - type: text
    content: ils sont innombrables.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'L''Egypte, la belle  : litt. la fille de l''Egypte  ; cf. v. 11n. –  du nord v. 10+.'
  - type: text
    content: L'Egypte, la belle, est honteuse,
  - type: text
    content: elle est livrée au peuple du nord.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Je vais faire rendre des comptes à ou j''interviens contre  ; cf. v. 21 ; 6.15n. –  Amôn est le dieu de No , c.-à-d. Thèbes en Haute-Egypte (cf. 43.12 ; Ez 30.14nss ; Na 3.8) ; associé au Soleil (Rê) il en était venu à englober tous les autres dieux. –  l''Egypte… pharaon  : cette partie du v. est absente de LXX.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël, dit : Je vais faire rendre des comptes à Amôn de No, au pharaon, à l''Egypte, à ses dieux et à ses rois, au pharaon et à ceux qui mettent leur confiance en lui. '
  '26':
  - type: note
    content: 'Ce v. est absent de LXX. –  qui en veulent… 11.21n  ; cf. Es 19.4. –  Nabuchodonosor 21.2n  ; 43.10s ; Ez 29.19 ; 30.10s. –  on y demeurera…  : cf. 12.15+ ; 48.47 ; 49.6,39 ; Es 19.16-25 ; Ez 29.13-15.'
  - type: text
    content: 'Je les livrerai à ceux qui en veulent à leur vie : à Nabuchodonosor, roi de Babylone, et aux gens de sa cour ; et après cela, on y demeurera comme aux jours de jadis – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Israël délivré
  '27':
  - type: text
    content: ' '
  - type: note
    content: 30.10-11+.
  - type: text
    content: Et toi, Jacob, mon serviteur,
  - type: text
    content: n'aie pas peur !
  - type: text
    content: Ne sois pas terrifié, Israël !
  - type: text
    content: Car je te sauve de la terre lointaine,
  - type: text
    content: et ta descendance du pays où elle est captive ;
  - type: text
    content: Jacob reviendra, il jouira du calme et de la tranquillité,
  - type: text
    content: et il n'y aura personne pour le troubler.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'je ne te tiendrai pas pour innocent  : autre traduction je ne te laisserai pas impuni.'
  - type: text
    content: Toi, Jacob, mon serviteur,
  - type: text
    content: n'aie pas peur
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: car je suis avec toi.
  - type: text
    content: J'exterminerai toutes les nations
  - type: text
    content: parmi lesquelles je t'ai banni,
  - type: text
    content: mais toi, je ne t'exterminerai pas ;
  - type: text
    content: cependant je te corrigerai avec équité,
  - type: text
    content: je ne te tiendrai pas pour innocent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 51.11 ; Ps 35.2.
  - type: text
    content: Alignez le petit bouclier et le grand bouclier
  - type: text
    content: et avancez pour le combat !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Chars  : litt. attelages ou équipages (de chars), ou peut-être cavaliers . –  à l''assaut  : sous-entendu dans le texte. –  fourbissez  : cf. 2Ch 4.16n.'
  - type: text
    content: Attelez les chevaux !
  - type: text
    content: Chars, montez à l'assaut !
  - type: text
    content: Postez-vous avec vos casques,
  - type: text
    content: fourbissez vos lances,
  - type: text
    content: revêtez les cuirasses !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'guerriers  : autre traduction héros . –  ils fuient…  : cf. Na 2.9. –  Effroi de tous côtés 6.25+ ; 49.29.'
  - type: text
    content: Pourquoi les ai-je vus terrifiés ?
  - type: text
    content: Ils reculent ;
  - type: text
    content: leurs guerriers sont taillés en pièces ;
  - type: text
    content: 'ils fuient, fuient sans se retourner :'
  - type: text
    content: Effroi de tous côtés !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Am 2.14s. –  rives  : le mot est habituellement traduit par main . –  ils trébuchent, ils tombent v. 12,16.'
  - type: text
    content: Que le plus rapide ne puisse pas fuir !
  - type: text
    content: Que le guerrier n'échappe pas !
  - type: text
    content: Dans le nord, sur les rives de l'Euphrate,
  - type: text
    content: ils trébuchent, ils tombent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: L'image des crues du Nil évoque les prétentions impérialistes de l'Egypte (v. 8) ; cf. 47.2 ; Es 8.7 ; Ez 32.2 ; Am 8.8 ; Dn 11.10.
  - type: text
    content: Qui est celui qui monte comme le Nil,
  - type: text
    content: et dont les eaux débordent comme les fleuves ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'villes et habitants  : litt. la ville et ses habitants.'
  - type: text
    content: C'est l'Egypte qui monte comme le Nil,
  - type: text
    content: et dont les eaux débordent comme les fleuves.
  - type: text
    content: 'Elle dit : Je monterai,'
  - type: text
    content: je couvrirai la terre,
  - type: text
    content: je ferai disparaître villes et habitants.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 38.4s ; les peuples cités ici sont alliés à l''Egypte, cf. v. 16. –  chars 47.3+. –  Koush ou Nubie  ; cf. 13.23n  ; Gn 2.13n. –  Pouth  : peut-être la Libye ; cf. Gn 10.6n  ; Es 66.19n  ; Ez 27.10+. –  Loud  : peut-être la Lydie ; cf. Gn 10.13,22n  ; Ez 27.10. –  manient  : le verbe correspondant est absent de LXX.'
  - type: text
    content: Montez à l'assaut, chevaux !
  - type: text
    content: Entrez en furie, chars !
  - type: text
    content: Qu'ils sortent, les guerriers,
  - type: text
    content: ceux de Koush et de Pouth
  - type: text
    content: qui manient le petit bouclier,
  - type: text
    content: ceux de Loud
  - type: text
    content: qui manient et tendent l'arc !
