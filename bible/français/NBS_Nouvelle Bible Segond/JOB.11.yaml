document_id: JOB.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention de Tsophar : reviens à Dieu'
  - type: text
    content: 'Tsophar le Naamatite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: '9.12+. –  S''il passe  : autre traduction s''il transperce . –  s''il enferme 12.14. –  s''il convoque…  : litt. il rassemble (terme apparenté en 30.28) , et qui le ramènera ? On pourrait comprendre qui ramènera celui qu''il a convoqué ?'
  - type: text
    content: S'il passe, s'il enferme,
  - type: text
    content: s'il convoque, qui s'y opposera ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'les hommes faux Ps 26.4. –  et il ne saurait pas  : traduction incertaine ; on pourrait aussi traduire  : et il ne comprend pas ; et il ne fait pas attention ; et il (cela ?) n''est pas compris.'
  - type: text
    content: Car il connaît les hommes faux ;
  - type: text
    content: il voit le mal, et il ne saurait pas !
  '12':
  - type: text
    content: ' '
  - type: note
    content: Verset difficile qui donne lieu à des interprétations très diverses (p. ex. la tête creuse aura de l'intelligence quand l'âne sauvage deviendra domestique ). Sur l’ âne sauvage , voir 6.5 ; 39.5-8 ; Gn 16.12.
  - type: text
    content: Mais l'homme a l'intelligence d'une tête creuse,
  - type: text
    content: l'être humain est né comme le petit d'un âne sauvage.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.5. – Voir cœur. –  tends les mains  : cf. Ex 9.29 ; 1R 8.38 ; Es 1.15 ; Ps 28.2 ; 88.10 ; Lm 3.41. –  vers Dieu  : litt. vers lui.'
  - type: text
    content: Quant à toi, si tu affermis ton cœur
  - type: text
    content: et si tu tends les mains vers Dieu,
  '14':
  - type: text
    content: si tu éloignes le mal de ta main
  - type: text
    content: et si tu ne laisses pas l'injustice demeurer sous tes tentes,
  '15':
  - type: text
    content: ' '
  - type: note
    content: lèveras ton front 22.26.
  - type: text
    content: alors tu lèveras ton front sans tache,
  - type: text
    content: tu seras ferme, tu n'auras pas peur ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: eau… écoulée 2S 14.14.
  - type: text
    content: car tu oublieras ta peine,
  - type: text
    content: tu t'en souviendras comme de l'eau qui s'est écoulée.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '17.12 ; Es 9.1 ; 42.16 ; 58.8-10 ; Ps 139.12 ; Jn 1.5. –  Ta vie  : le terme hébreu rare qui apparaît ici est traduit par durée de la vie en Ps 39.6 ; 89.48, et par monde en Ps 17.14 ; 49.2.'
  - type: text
    content: Ta vie se lèvera plus brillante que le midi,
  - type: text
    content: les ténèbres seront comme le matin,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'confiant et sécurité traduisent des termes hébreux apparentés. –  après avoir rougi  : cf. 6.20 ; autres traductions et, bien protégé, tu te coucheras ; tu regarderas et tu te coucheras.'
  - type: text
    content: tu seras confiant, car il y aura de l'espoir ;
  - type: text
    content: après avoir rougi, tu te coucheras en sécurité.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'chercheront ta faveur  : litt. caresseront ta face , cf. Ps 45.13 ; Pr 19.6 ; la même expression a aussi été traduite par chercher à apaiser , cf. Ex 32.11+.'
  - type: text
    content: Tu te coucheras,
  - type: text
    content: et il n'y aura personne pour te troubler ;
  - type: text
    content: beaucoup chercheront ta faveur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cette multitude de paroles…  : des versions anciennes portent cet homme abondant en paroles (ne trouvera-t-il pas…) . –  Suffira-t-il d''être loquace…  : litt. un homme de lèvres sera-t-il juste  ?'
  - type: text
    content: Cette multitude de paroles ne trouvera-t-elle pas de réponse ?
  - type: text
    content: Suffira-t-il d'être loquace pour avoir raison ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'les yeux… 17.5 ; 31.16 ; Jr 14.6 ; Ps 69.4+. –  pour eux, pas de refuge  : litt. le refuge disparaîtra loin d''eux , c.-à-d. leur échappera . –  d''expirer  : cf. 3.21+.'
  - type: text
    content: Mais les yeux des méchants s'épuiseront ;
  - type: text
    content: pour eux, pas de refuge ;
  - type: text
    content: leur espoir, c'est d'expirer !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Tes vantardises  : autre traduction tes bavardages  ; cf. 41.4n. –  feront-elles taire 32.15. –  Te moqueras-tu 34.7. –  ne te confonde  : le verbe hébreu correspondant est traduit par insulter en 19.3 ; 20.3 ; cf. Ez 16.27n.'
  - type: text
    content: Tes vantardises feront-elles taire les gens ?
  - type: text
    content: Te moqueras-tu sans que personne ne te confonde ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'sans reproche 8.6+. –  je suis pur  : cf. 16.17 ; 33.9.'
  - type: text
    content: 'Tu dis : « Mon savoir est sans reproche,'
  - type: text
    content: et je suis pur à tes yeux. »
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 38.1 ; Es 63.19. –  devant toi  : litt. avec toi.'
  - type: text
    content: Ah ! si Dieu voulait parler,
  - type: text
    content: s'il ouvrait les lèvres devant toi,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 's''il te disait… 28.28. –  qui dépassent largement…  : litt. car (ils sont) doubles pour la raison  ; cf. Es 40.2n. –  la raison 5.12n. –  laisse dans l''oubli  : cf. 39.17n  ; même verbe en Gn 41.51 ; Es 44.21 ; Lm 3.17. –  faute  : voir péché. – Sur l''ensemble, cf. chap. 28 ; Rm 11.33 ; 1Co 2.6-16.'
  - type: text
    content: s'il te disait les secrets de sa sagesse,
  - type: text
    content: qui dépassent largement la raison,
  - type: text
    content: tu saurais alors que Dieu, pour toi, laisse dans l'oubli une partie de ta faute.
  '7':
  - type: text
    content: ' '
  - type: note
    content: profondeurs 38.16 ; voir 5.27n. –  Puissant 5.17n.
  - type: text
    content: Peux-tu découvrir les profondeurs de Dieu,
  - type: text
    content: découvrir jusqu'à la perfection du Puissant ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Elle est aussi haute que le ciel  : litt. hauteurs du ciel  ; cf. 22.12+. – Voir séjour des morts.'
  - type: text
    content: 'Elle est aussi haute que le ciel : que feras-tu ?'
  - type: text
    content: 'Elle est plus profonde que le séjour des morts : que sauras-tu ?'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ep 3.18.
  - type: text
    content: La mesure en est plus longue que la terre,
  - type: text
    content: elle est plus large que la mer.
