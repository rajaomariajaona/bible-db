  - type: text
    text: 'Lorsque quelqu''un, sans s''en apercevoir, touche une chose impure quelconque, que ce soit le cadavre d''un animal impur, celui d''une bête domestique impure ou bien celui d''une petite bête impure, il devient lui-même impur ; il se met en tort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
