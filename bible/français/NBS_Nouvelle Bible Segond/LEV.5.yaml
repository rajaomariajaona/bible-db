document_id: LEV.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Quelques exemples
  - type: text
    content: ' '
  - type: note
    content: 'une adjuration  : litt. une voix d''adjuration ou de malédiction (conditionnelle) , cf. Gn 24.41n  ; Nb 5.21nss ; Dt 29.11nss ; voir aussi 1S 3.17 ; Pr 29.24 ; Mt 26.63/ /. Voir bénédiction, malédiction.'
  - type: text
    content: 'Lorsqu''un témoin, après avoir entendu une adjuration, pèche en ne déclarant pas ce qu''il a vu ou ce qu''il sait, il sera chargé de sa faute. '
  '10':
  - type: note
    content: 'règle  : le mot hébreu correspondant est souvent traduit par droit  ; autre traduction coutume  ; cf. 1.14-17 ; Ex 15.25n. – Voir expiation et péché.'
  - type: text
    content: Il fera de l'autre oiseau un holocauste, selon la règle. Le prêtre fera sur lui l'expiation du péché qu'il a commis, et il lui sera pardonné.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Si ses ressources…  : cf. v. 7n  ; formule analogue en 14.21s,30ss ; 25.26,47,49 ; 27.8 ; Ez 46.7n  ; certains comprennent s''il n''a pas sous la main deux tourterelles… –  deux tourterelles… Lc 2.24. –  huile / encens  : cf. 2.1n,15 ; Nb 5.15.'
  - type: text
    content: 'Si ses ressources ne lui permettent pas de se procurer deux tourterelles ou deux colombes, il apportera en présent pour son péché un dixième d''épha de fleur de farine, en sacrifice pour le péché ; il ne mettra pas d''huile et il n''y ajoutera pas d''encens : c''est un sacrifice pour le péché. '
  '12':
  - type: note
    content: en évocation 2.2n. –  fera fumer 1.9n.
  - type: text
    content: 'Il l''apportera au prêtre, et le prêtre en prendra une pleine poignée en évocation et la fera fumer sur l''autel, par-dessus les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est un sacrifice pour le péché. '
  '13':
  - type: note
    content: 'Ce qui restera…  : c''est l''interprétation adoptée par LXX (cf. 2.3,10) ; litt. et ce sera pour le prêtre comme l''offrande végétale (2.1n) ; voir sacrifices.'
  - type: text
    content: Le prêtre fera sur lui l'expiation du péché qu'il a commis sur l'un de ces points, et il lui sera pardonné. Ce qui restera sera pour le prêtre, comme l'offrande végétale.
  - type: heading
    content: Règles pour le sacrifice de réparation
  '14':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '15':
  - type: note
    content: 'un sacrilège  : cf. Nb 5.6 ; 2Ch 26.16-18 (même terme) ; voir saint. –  par erreur 4.2n  ; cf. Jos 7. –  en retenant…  : en négligeant de donner à Dieu ce qui lui est dû ou en utilisant des biens sacrés à un usage profane ; cf. 22.1-16 ; 27.9-33 ; Dt 14.22-29 ; 26.1-15. –  en réparation  : autre traduction en sacrifice de réparation (cf. v. 6n) ; sur le sacrifice de réparation (v. 15-26), voir aussi 7.1-7 ; 19.20-22. –  la valeur fixée  : litt. ton estimation, de même aux v. 18,25 ; 27.2ss ; Nb 18.16 ; l''emploi de cette formule indique qu''il ne s''agit généralement plus d''une estimation à proprement parler (l''évaluation faite par le prêtre est expressément distinguée en 27.8ss), mais d''un tarif officiel, fixé une fois pour toutes. –  le sicle du sanctuaire  : sans doute un poids-étalon ; cf. 27.2s,25 ; Ex 30.13,24 ; 38.24-26 ; Nb 3.47 ; voir mesures.'
  - type: text
    content: 'Lorsque quelqu''un commet un sacrilège et pèche par erreur en retenant des choses consacrées au '
  - type: text
    content: Seigneur
  - type: text
    content: ', il apportera au '
  - type: text
    content: Seigneur
  - type: text
    content: ', en réparation, un bélier sans défaut, pris sur le petit bétail d''après la valeur fixée en sicles d''argent, selon le sicle du sanctuaire. '
  '16':
  - type: note
    content: 'le péché…  : litt. ce en quoi il a péché (en retenant) du sanctuaire (ou sur ce qui est consacré) ; cf. v. 24 ; 22.14 ; 27. –  au prêtre Nb 5.7-10 ; 2R 12.17. – Voir expiation.'
  - type: text
    content: Il compensera, en y ajoutant un cinquième, le péché qu'il a commis aux dépens du sanctuaire ; il donnera cette compensation au prêtre. Le prêtre fera sur lui l'expiation avec le bélier du sacrifice de réparation, et il lui sera pardonné.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'commandements  : voir loi.'
  - type: text
    content: 'Si quelqu''un pèche en commettant, sans le savoir, ce qu''interdit l''un des commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il se met en tort et sera chargé de sa faute.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sans le savoir  : cf. Jos 20.3.'
  - type: text
    content: 'Il apportera au prêtre, en réparation, un bélier sans défaut, pris sur le petit bétail d''après la valeur fixée. Le prêtre fera sur lui l''expiation de l''erreur qu''il a commise sans le savoir, et il lui sera pardonné. '
  '19':
  - type: note
    content: 'réparation / tort  : cf. v. 6n.'
  - type: text
    content: 'C''est un sacrifice de réparation. Cet homme s''est mis en tort devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: 'sans s''en apercevoir  : litt. et cela lui est caché, formule analogue dans la suite ; cf. 4.13n. –  chose impure 11.1-47 ; voir pur. –  d''une bête domestique  : litt. d''une bête  ; mais le terme est probablement à entendre ici par opposition à l’animal sauvage (cf. 25.7n  ; Gn 1.24n  ; 7.21n). –  petite bête  : voir Gn 1.24n  ; 7.21.'
  - type: text
    content: 'Lorsque quelqu''un, sans s''en apercevoir, touche une chose impure quelconque, que ce soit le cadavre d''un animal impur, celui d''une bête domestique impure ou bien celui d''une petite bête impure, il devient lui-même impur ; il se met en tort. '
  '20':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '21':
  - type: note
    content: Cf. Ex 22.6-14. –  compatriote 18.20n.
  - type: text
    content: 'Lorsque quelqu''un pèche et commet un sacrilège envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en mentant à son compatriote au sujet d''un dépôt, d''une valeur remise en main propre ou d''une spoliation, ou bien en commettant une extorsion aux dépens de son compatriote, '
  '22':
  - type: text
    content: 'en mentant au sujet d''un objet perdu qu''il a trouvé, ou en faisant un faux serment au sujet d''un des péchés que l''être humain peut commettre ; '
  '23':
  - type: note
    content: Cf. Ps 69.5.
  - type: text
    content: 'lorsque ainsi il pèche et se met en tort, il restituera l''objet de la spoliation ou de l''extorsion, le dépôt qui lui avait été confié, l''objet perdu qu''il avait trouvé '
  '24':
  - type: note
    content: 'intégralement  : litt. dans sa tête, c.-à-d. le capital. –  le jour même où il offrira son sacrifice de réparation  : autre traduction le jour où il s''apercevra de son tort (v. 6n).'
  - type: text
    content: 'ou la chose au sujet de laquelle il a fait un faux serment. Il le compensera intégralement, en y ajoutant un cinquième, et il donnera cette compensation au propriétaire le jour même où il offrira son sacrifice de réparation. '
  '25':
  - type: text
    content: 'Il apportera au prêtre, en réparation pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', un bélier sans défaut, pris sur le petit bétail d''après la valeur fixée pour la réparation. '
  '26':
  - type: text
    content: 'Le prêtre fera sur lui l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il lui sera pardonné, quelle que soit la chose par laquelle il s''est mis en tort.'
  '3':
  - type: note
    content: 'une impureté… impur  : litt. une impureté d''humain, de toute son impureté par laquelle on se rend impur  ; voir chap. 12–15 ; cf. Ag 2.13. –  quand il s''en aperçoit  : litt. il sait, de même au v. 4.'
  - type: text
    content: 'Lorsque, sans s''en apercevoir, il touche une impureté humaine dont le contact rend impur – quand il s''en aperçoit, il est en tort. '
  '4':
  - type: note
    content: 'de quelque manière que ce soit  : litt. de tout ce qu''un humain prononce à la légère dans un serment  ; cf. Ps 15.4. –  de faire du mal ou du bien  : autre traduction à son détriment ou à son avantage. –  sur un de ces points  : certains pensent que la répétition de cette formule, ici et au v. 5, est due à une erreur de copie.'
  - type: text
    content: Lorsque quelqu'un, en parlant à la légère de quelque manière que ce soit, sans s'en apercevoir, jure de faire du mal ou du bien – quand il s'en aperçoit, il est en tort – sur un de ces points.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Voir péché.
  - type: text
    content: 'Celui donc qui se met en tort sur un de ces points confessera en quoi il a péché, '
  '6':
  - type: note
    content: 'en réparation  : le même terme hébreu désignera plus loin (v. 14-26) le sacrifice de réparation (autre traduction sacrifice de culpabilité) ; il est apparenté au verbe traduit par être en tort ou se mettre en tort dans les v. précédents, mais il évoque plutôt ici la réparation du tort ; de même aux v. 15ss ; cf. 4.3n  ; Nb 5.6ss ; 1S 6.3ss. – Voir expiation.'
  - type: text
    content: 'puis il apportera au '
  - type: text
    content: Seigneur
  - type: text
    content: ', en réparation pour le péché qu''il a commis, une femelle prise sur le petit bétail, une brebis ou une chèvre, en sacrifice pour le péché. Le prêtre fera sur lui l''expiation de son péché.'
  - type: heading
    content: Le sacrifice des pauvres
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'S''il n''a pas…  : formule légèrement différente, en hébreu, de celle du v. 11+ ; cf. 12.8.'
  - type: text
    content: 'S''il n''a pas de quoi se procurer une tête de petit bétail, il apportera au '
  - type: text
    content: Seigneur
  - type: text
    content: ', en réparation pour son péché, deux tourterelles ou deux colombes, l''une en sacrifice pour le péché, et l''autre en holocauste. '
  '8':
  - type: note
    content: 'il présentera  : le prêtre, ou celui qui offre le sacrifice. –  il lui tordra le cou…  : litt. il lui pincera la tête en avant du cou et il ne séparera pas  ; cf. 1.15ss.'
  - type: text
    content: 'Il les apportera au prêtre ; il présentera d''abord celui qui doit servir de sacrifice pour le péché ; il lui tordra le cou, sans séparer la tête. '
  '9':
  - type: note
    content: l'aspersion du sang 4.6n. –  il fera couler 1.15n.
  - type: text
    content: 'Le prêtre fera l''aspersion du sang du sacrifice pour le péché sur la paroi de l''autel ; il fera couler le reste du sang sur le socle de l''autel ; c''est un sacrifice pour le péché. '
