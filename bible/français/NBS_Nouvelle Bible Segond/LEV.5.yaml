    text: 'S''il n''a pas de quoi se procurer une tête de petit bétail, il apportera au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en réparation pour son péché, deux tourterelles ou deux colombes, l''une en sacrifice pour le péché, et l''autre en holocauste. '
