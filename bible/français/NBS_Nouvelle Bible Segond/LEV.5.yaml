    marker-yv: yv-n
  - type: text
    text: 'Il apportera au prêtre, en réparation, un bélier sans défaut, pris sur le petit bétail d''après la valeur fixée. Le prêtre fera sur lui l''expiation de l''erreur qu''il a commise sans le savoir, et il lui sera pardonné. '
