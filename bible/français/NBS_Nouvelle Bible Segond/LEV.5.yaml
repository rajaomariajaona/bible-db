  - type: text
    text: 'Le prêtre fera l''aspersion du sang du sacrifice pour le péché sur la paroi de l''autel ; il fera couler le reste du sang sur le socle de l''autel ; c''est un sacrifice pour le péché. '
  - type: usfm
