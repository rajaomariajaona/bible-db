    text: 'Si ses ressources ne lui permettent pas de se procurer deux tourterelles ou deux colombes, il apportera en présent pour son péché un dixième d''épha de fleur de farine, en sacrifice pour le péché ; il ne mettra pas d''huile et il n''y ajoutera pas d''encens : c''est un sacrifice pour le péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
