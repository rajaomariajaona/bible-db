    text: Il compensera, en y ajoutant un cinquième, le péché qu'il a commis aux dépens du sanctuaire ; il donnera cette compensation au prêtre. Le prêtre fera sur lui l'expiation avec le bélier du sacrifice de réparation, et il lui sera pardonné.
