    text: 'ou la chose au sujet de laquelle il a fait un faux serment. Il le compensera intégralement, en y ajoutant un cinquième, et il donnera cette compensation au propriétaire le jour même où il offrira son sacrifice de réparation. '
  - type: usfm
    marker: vlbl
