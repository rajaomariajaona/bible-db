document_id: SNG.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'plaine côtière (hébreu sharôn ) : région fertile ; cf. Es 33.9n  ; 35.1s. –  lis v. 2,16n  ; 4.5 ; 5.13 ; 6.2s ; cf. 1R 7.19 ; Os 14.6 ; Mt 6.28.'
  - type: text
    content: Je suis le narcisse de la plaine côtière,
  - type: text
    content: le lis des vallées.
  - type: heading
    content: Lui
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'viens  : autre traduction va  ; cf. 7.12s.'
  - type: text
    content: Il prend la parole, mon bien-aimé.
  - type: text
    content: 'Il me dit :'
  - type: text
    content: « Lève-toi, mon amie, ma belle, et viens !
  '11':
  - type: text
    content: Car l'hiver est passé ;
  - type: text
    content: la pluie a cessé, elle s'en est allée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'chanter  : terme apparenté au mot traduit par psaume  ; autre traduction possible (homonymie de l''hébreu) tailler (la vigne).'
  - type: text
    content: Dans le pays, les fleurs paraissent,
  - type: text
    content: le temps de chanter est arrivé,
  - type: text
    content: et la tourterelle se fait entendre dans notre pays.
  '13':
  - type: text
    content: ' '
  - type: note
    content: exhalent 1.12n.
  - type: text
    content: Le figuier forme ses premiers fruits,
  - type: text
    content: les vignes en fleur exhalent leur senteur.
  - type: text
    content: Lève-toi, mon amie, ma belle, et viens !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'colombe  : cf. 1.15+ ; 6.9. –  visage  : cf. 5.15n.'
  - type: text
    content: Ma colombe, dans le creux des rochers,
  - type: text
    content: dans le secret des escarpements,
  - type: text
    content: fais-moi voir ton visage,
  - type: text
    content: fais-moi entendre ta voix ;
  - type: text
    content: car ta voix est douce et ton visage est joli. »
  - type: heading
    content: Autres
  '15':
  - type: text
    content: ' '
  - type: note
    content: Appel (lancé par la famille de la jeune fille ? Cf. 1.6,8 ; 8.8s) à protéger les vignes en fleur (v. 13, voir aussi 1.6n) contre les renards (en hébreu creuseurs de trous  ; voir aussi Ez 13.4 ; Né 3.35 ; Lc 13.32) qui les ravagent (par un jeu d'homonymie, un verbe hébreu voisin est traduit par concevoir en 8.5). Il s'agit en tout cas d'un obstacle pour les amoureux.
  - type: text
    content: Saisissez pour nous les renards,
  - type: text
    content: les petits renards qui ravagent les vignes,
  - type: text
    content: alors que nos vignes sont en fleur.
  - type: heading
    content: Elle
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'est à moi / je suis à lui 6.3 ; 7.11 ; cf. Os 2.4-25. –  il paît  : double sens possible : soit il trouve sa pâture , soit il fait paître (son troupeau) ; cf. 1.7 ; 4.5 ; 6.2s. –  les lis v. 1+.'
  - type: text
    content: Mon bien-aimé est à moi, et je suis à lui ;
  - type: text
    content: il paît parmi les lis.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'la brise du jour  : litt. le jour  ; cf. Gn 3.8n. –  va… et reviens  : cette expression traduit un seul verbe hébreu, sans doute volontairement ambigu ; cf. v. 15 ; 8.14. –  escarpées ou séparées, découpées , hébreu bèthèr  ; c''est le mot traduit par moitié ou morceau dans le rituel d''alliance de Gn 15.10-21 ; Jr 34.18s ; c''est également le nom d''une ville des montagnes de Juda dans un ms grec de Jos 15.59 ; on peut y voir une allusion discrète aux seins de la bien-aimée (cf. 1.13 ; 4.6).'
  - type: text
    content: Avant que souffle la brise du jour
  - type: text
    content: et que les ombres fuient,
  - type: text
    content: va… et reviens, mon bien-aimé, sois semblable
  - type: text
    content: à la gazelle, au faon des biches,
  - type: text
    content: sur les montagnes escarpées.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'jeunes filles  : autre mot qu''en 1.3n  ; il désigne en général les filles de quelqu''un, par opposition aux jeunes gens ou fils de v. 3n.'
  - type: text
    content: Comme un lis entre les ajoncs,
  - type: text
    content: telle est mon amie entre les jeunes filles.
  - type: heading
    content: Elle
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'pommier  : cf. v. 5 ; 7.9 ; 8.5 ; Jl 1.12. –  jeunes gens  : litt. fils  ; cf. v. 2n. –  doux / palais 5.16n  ; 7.10n.'
  - type: text
    content: Comme un pommier parmi les arbres de la forêt,
  - type: text
    content: tel est mon bien-aimé entre les jeunes gens.
  - type: text
    content: A son ombre, j'ai désiré m'asseoir,
  - type: text
    content: et son fruit est doux à mon palais.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'bannière  : cf. Es 5.26+ (autre mot hébreu) ; l''image est peut-être ici celle de l''enseigne au-dessus de la taverne ( maison du vin  ; cf. 1.2+) ; voir 5.10, verbe apparenté ( il se signale ) ; 6.4ss.'
  - type: text
    content: Il m'a amenée à la maison du vin ;
  - type: text
    content: et la bannière qu'il déploie sur moi, c'est l'amour.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'gâteaux de raisins  : cette image rappelle peut-être les cultes de la fertilité ; cf. Es 16.7n  ; Jr 7.18 ; 44.19 ; Os 3.1. –  pommes v. 3n. –  malade d''amour 5.8.'
  - type: text
    content: Soutenez-moi avec des gâteaux de raisins,
  - type: text
    content: rafraîchissez-moi avec des pommes ;
  - type: text
    content: car je suis malade d'amour.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '8.3. –  sa main gauche…  : litt. sa gauche… sa droite . On pourrait aussi traduire à l''indicatif  : sa main gauche est sous ma tête, son bras droit m''enlace.'
  - type: text
    content: Que sa main gauche soit sous ma tête,
  - type: text
    content: que son bras droit m'enlace !
  - type: heading
    content: Autres ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: '3.5 ; 8.4 ; cf. 5.8s. –  (Autres ?)  : locuteur très incertain ; il pourrait tout aussi bien s''agir de Lui ou d’ Elle . –  Je vous en adjure  : litt. je vous fais prêter serment . –  les gazelles (hébreu tseva''oth ) et les biches de la campagne ( ’ayloth hassadé ) occupent dans cette formule de serment la place du nom divin (par exemple Dieu des Armées, ’Elohé tseva''oth ). –  l''amour est peut-être la bien-aimée elle-même ; cf. v. 4 ; 7.7. –  qu''il le désire ou qu''elle le désire  : l''antécédent peut être l''amour (au féminin en hébreu) ou la bien-aimée.'
  - type: text
    content: Je vous en adjure, filles de Jérusalem,
  - type: text
    content: par les gazelles, par les biches de la campagne,
  - type: text
    content: n'éveillez pas, ne réveillez pas l'amour,
  - type: text
    content: avant qu'il le désire.
  - type: heading
    content: Il vient
  - type: heading
    content: Elle
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez…  : litt. la voix (ou le pas ) de mon bien-aimé  ; cf. 5.2.'
  - type: text
    content: Ecoutez ! C'est mon bien-aimé !
  - type: text
    content: Il vient,
  - type: text
    content: sautant sur les montagnes,
  - type: text
    content: bondissant sur les collines.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le treillis  : le moucharabieh des maisons orientales ; cf. Jg 5.28 ; Pr 7.6 (autre terme) ; voir aussi Ps 33.14.'
  - type: text
    content: Mon bien-aimé est semblable à la gazelle,
  - type: text
    content: au faon des biches.
  - type: text
    content: Le voici ; il se tient derrière notre mur,
  - type: text
    content: il regarde par la fenêtre,
  - type: text
    content: il épie par le treillis.
