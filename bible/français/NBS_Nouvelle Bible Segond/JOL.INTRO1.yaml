document_id: JOL.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Qui et quand ?
  - type: text
    content: 'Le verset titre ne nous apprend rien sur la '
  - type: text
    content: personne
  - type: text
    content: ' du prophète ni sur son '
  - type: text
    content: époque
  - type: text
    content: .
  - type: text
    content: 'Le livre de Joël n''évoque pas distinctement Israël, le royaume du Nord. Le nom '
  - type: text
    content: Israël
  - type: text
    content: ' y désigne la communauté en relation avec YHWH, le Seigneur (2.27 ; 4.2,16). Jérusalem (ou Sion), lieu du culte et de la demeure de Dieu, est le lieu central où le peuple prend conscience de son identité. On a tenté de faire correspondre les indications historiques du texte à plusieurs périodes, en prenant en considération les ennemis (2.20 ; 4.4,19) ou les partenaires commerciaux nommés (4.6-8), et aussi le fait que les grands responsables des deux catastrophes nationales, les Assyriens et les Babyloniens, sont absents de la scène. Les hypothèses vont de la fin du IX'
  - type: text
    content: e
  - type: text
    content: ' siècle au IV'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C., après l''exil babylonien et le retour en Juda. D''autres indices potentiels, comme l''invasion d''insectes destructeurs et la sécheresse décrites au chapitre 1, sont plus difficilement exploitables, car nous ignorons s''ils correspondent à des événements contemporains du prophète ou s''ils servent seulement d''illustrations à son message.'
  - type: text
    content: 'On lira le livre comme une prédication qui peut concerner '
  - type: text
    content: tous les temps
  - type: text
    content: . Les v. 2 et 3 du chapitre 1 invitent d'ailleurs à transmettre son contenu de génération en génération.
  - type: text
    content: Des thèmes entrecroisés
  - type: text
    content: 'La '
  - type: text
    content: structure
  - type: text
    content: ' du livre de Joël n''est pas facile à discerner. On distingue cependant des thèmes et des motifs littéraires qui s''entrecroisent. Trois grandes parties apparaissent :'
  - type: text
    content: 'Deux catastrophes : 1.1–2.11'
  - type: text
    content: 'De 1.4 à 1.20 le texte superpose les effets d''une invasion de criquets (v. 4-14) et de la venue du '
  - type: text
    content: jour du Seigneur
  - type: text
    content: ' (v. 15-20), comme si l''un était le signe de l''autre. Le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se caractérise par des catastrophes et des bouleversements cosmiques : c''est un cataclysme auquel nul ne peut échapper (2.1-11).'
  - type: text
    content: 'Appel du peuple et réponse de Dieu : 2.12-27'
  - type: text
    content: Les exhortations à se lamenter et à supplier Dieu, éparses au milieu de la dévastation décrite de 1.4 à 2.11, sont reprises en 2.12-17. Elles culminent sous la forme d'appels au changement, au rassemblement et à la prière. Dieu répond en 2.18-27, en des termes inversés par rapport à la description des catastrophes, avec des promesses de rétablissement et de surabondance.
  - type: text
    content: 'Salut d''Israël, et jugement des nations : 3.1–4.21'
  - type: text
    content: 'Le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est le thème unique des chapitres 3 et 4. Il apparaît comme possibilité de salut pour Israël (3.1-5 et 4.16-21) et exécution du jugement sur les nations (4.1-16).'
  - type: text
    content: Le jour du Seigneur
  - type: text
    content: 'L''expression '
  - type: text
    content: le jour du Seigneur
  - type: text
    content: ' est propre aux livres prophétiques (voir Es 13.6-9 ; Am 5.18-20 ; So 1.7–2.3, etc.). Elle désigne le jour où YHWH intervient, se dévoile et règle ses comptes. Ce jour marque la fin d''une époque. Dans le livre de Joël cette intervention est d''abord tournée '
  - type: text
    content: contre Israël
  - type: text
    content: ' (1.15–2.11). Elle s''accompagne de malheurs et de détresses qui expriment le jugement et de bouleversements cosmiques qui manifestent la présence divine. A ceux qui en sont vivement frappés, la venue du jour offre une chance de salut (3.5) : la prédication de Joël est un pressant appel à saisir cette possibilité.'
  - type: text
    content: 'Le salut, c''est aussi la restauration du peuple et son corollaire, l''anéantissement des '
  - type: text
    content: ennemis
  - type: text
    content: ' (4.14-21). Mais Israël, le peuple de Dieu, a le premier subi le feu du jugement. Jugement et salut ne sont-ils pas deux effets de la même présence divine ?'
  - type: text
    content: Le vide et le plein
  - type: text
    content: 'Le prophète donne le sens des événements. Les catastrophes agricoles et guerrières du livre de Joël suggèrent que toute '
  - type: text
    content: sécurité
  - type: text
    content: ' s''évanouit devant la venue du Dieu saint.'
  - type: text
    content: 'Le service du temple devient difficile (1.13) ; les nations vont se moquer, en disant : '
  - type: text
    content: Où est leur Dieu ?
  - type: text
    content: ' (2.17) Une destruction, véritable dé-création, s''opère (cf. 2.3) ; la re-création située à l''horizon ultime devient possible (cf. 4.18). Pour Joël, cette re-création restaurera la relation entre Israël et son Dieu. On retrouvera là le thème de l'''
  - type: text
    content: alliance
  - type: text
    content: '  : Dieu s''engage à demeurer au milieu d''Israël et le peuple reconnaîtra sa présence, gage de l''accomplissement final (2.27 ; 4.1,17).'
  - type: text
    content: 'Israël et les nations : du livre de Joël au récit de la Pentecôte'
  - type: text
    content: 'Dans le livre de Joël, Israël est jugé en fonction de son attitude à l''égard de son '
  - type: text
    content: Dieu
  - type: text
    content: '  ; les peuples étrangers le sont en fonction de leur attitude à l''égard d'''
  - type: text
    content: Israël
  - type: text
    content: .
  - type: text
    content: 'Mais la prédication du prophète s''adresse à Israël : elle l''invite à se tourner de nouveau vers Dieu. Le grand bouleversement du jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ', parallèlement aux bouleversements cosmiques, c''est l''effusion du '
  - type: text
    content: souffle divin
  - type: text
    content: ' sur chaque membre du peuple (3.1-2). En ces temps de crise et de changement, le salut est lié à une double condition : invoquer le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et être appelé par lui (3.5).'
  - type: text
    content: 'Le récit de la '
  - type: text
    content: Pentecôte
  - type: text
    content: ' saluera dans le temps nouveau de l''Eglise chrétienne, ouvert par la mort et la résurrection de Jésus, une réalisation du jour de jugement et de salut annoncé par Joël (Ac 2.1-21,39 ; voir aussi Rm 10.13).'
