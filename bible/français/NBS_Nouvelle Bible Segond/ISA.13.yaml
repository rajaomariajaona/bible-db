      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: Leurs arcs jetteront les jeunes gens à terre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils seront sans compassion pour le fruit du ventre maternel :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur œil sera sans pitié pour les fils.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
