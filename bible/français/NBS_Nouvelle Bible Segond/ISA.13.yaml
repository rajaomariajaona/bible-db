        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le pays. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur sa base
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jb 9.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: C'est pourquoi j'agiterai le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre tremblera sur sa base,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'par la fureur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par le jour de sa colère ardente.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme le petit bétail… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme un troupeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 1R 22.17 ; Ez 34.5 ; Mt 9.36/ /+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chacun… vers son pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : démembrement de l''empire babylonien, cf. 47.15 ; Jr 51.9,44 ; Na 2.9.'
      marker-yv: yv-n
    - type: text
      text: Alors comme une gazelle effarouchée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le petit bétail qui n'a personne pour le rassembler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun s'en retournera vers son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun fuira vers son pays ;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: tous ceux qu'on trouvera seront transpercés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qu'on saisira tomberont par l'épée.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'enfants… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2R 8.12 ; Ps 137.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'violées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'emmenées captives '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (dans un harem) ; Dt 28.30 ; Za 14.2.
      marker-yv: yv-n
    - type: text
      text: Leurs enfants seront jetés à terre sous leurs yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs maisons seront mises à sac
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs femmes violées.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je suscite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'éveille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 10.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 41.2,25 ; 45.13 ; Jr 6.22+ ; Ez 23.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mèdes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : peuple voisin des Perses, qui s''est associé à ces derniers pour démanteler la puissance babylonienne au VI'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C. après avoir été l''allié de Babylone contre l''Assyrie (VII'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C.) ; cf. 21.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 51.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: Je suscite contre eux les Mèdes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne pensent pas à l'argent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à qui l'or ne plaît pas.
