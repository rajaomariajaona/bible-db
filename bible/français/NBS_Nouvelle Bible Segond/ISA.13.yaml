  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: constellations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fous, stupides. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Au singulier, ce nom désigne probablement la constellation d'Orion en Am 5.8 ; Jb 9.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 38.31. Il faut sans doute voir dans son emploi ici une pointe contre le culte des astres. – Cf. Jr 4.23 ; Am 5.18 ; So 1.15 ; Mt 24.29/ /.'
      marker-yv: yv-n
    - type: text
      text: Car les étoiles du ciel et leurs constellations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne feront plus briller leur lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le soleil s'obscurcira dès son lever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la lune ne fera plus luire sa lumière.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je ferai rendre des comptes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je châtierai le monde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; voir Jr 6.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot correspondant peut aussi désigner '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: méchants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: triomphe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3 ; le mot hébreu, aussi traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'suffisance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(16.6) est un synonyme du mot rendu ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'orgueil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(9.8). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brutes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.4 ; 29.5 ; Ps 54.5.
      marker-yv: yv-n
    - type: text
      text: Je ferai rendre des comptes au monde pour le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aux méchants pour leurs fautes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai cesser l'orgueil des gens arrogants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je rabaisserai le triomphe des brutes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je rendrai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la phrase pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les hommes me seront plus précieux que… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce terme traduit ici deux mots hébreux différents. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ophir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 10.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 9.28 ; Jb 22.24.'
      marker-yv: yv-n
    - type: text
      text: Je rendrai les hommes plus rares que l'or fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je rendrai les humains plus rares que l'or d'Ophir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
