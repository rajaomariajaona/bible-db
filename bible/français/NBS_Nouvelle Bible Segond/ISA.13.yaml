      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.9+, formule identique en Jr 50.40 ; Am 4.11.'
      marker-yv: yv-n
    - type: text
      text: Il en sera pour Babylone, le plus beau des royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la splendeur orgueilleuse des Chaldéens,
  - type: usfm
    marker: q1
