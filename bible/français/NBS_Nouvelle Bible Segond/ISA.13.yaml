document_id: ISA.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Babylone
  - type: text
    content: ' '
  - type: note
    content: 'Sentence (ou oracle ) : le même mot est traduit par fardeau en 22.25n  ; il est apparenté à un verbe qui peut signifier porter (quelque chose), mais aussi élever (la voix) (cf. 3.7) ; de même en 15.1 ; 17.1 ; 30.6 ; Na 1.1 ; Ha 1.1 ; Za 9.1 ; 12.1 ; Ml 1.1 ; Lm 2.14. Cf. Jr 23.33n-40. –  Babylone 21.1-10 ; 39 ; 47 ; 48.14,20 ; Jr 50–51 ; Ap 17–18. –  Esaïe, fils d''Amots 1.1n.'
  - type: text
    content: Sentence sur Babylone ; ce qu'a vu Esaïe, fils d'Amots.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'constellations  : litt. fous, stupides. Au singulier, ce nom désigne probablement la constellation d''Orion en Am 5.8 ; Jb 9.9n  ; 38.31. Il faut sans doute voir dans son emploi ici une pointe contre le culte des astres. – Cf. Jr 4.23 ; Am 5.18 ; So 1.15 ; Mt 24.29/ /.'
  - type: text
    content: Car les étoiles du ciel et leurs constellations
  - type: text
    content: ne feront plus briller leur lumière,
  - type: text
    content: le soleil s'obscurcira dès son lever,
  - type: text
    content: et la lune ne fera plus luire sa lumière.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je ferai rendre des comptes…  : autre traduction je châtierai le monde  ; voir Jr 6.15n. –  le mal  : le mot correspondant peut aussi désigner le malheur . –  méchants  : voir justice. –  triomphe  : cf. v. 3 ; le mot hébreu, aussi traduit ailleurs par suffisance (16.6) est un synonyme du mot rendu ici par orgueil (9.8). –  brutes 25.4 ; 29.5 ; Ps 54.5.'
  - type: text
    content: Je ferai rendre des comptes au monde pour le mal,
  - type: text
    content: et aux méchants pour leurs fautes ;
  - type: text
    content: je ferai cesser l'orgueil des gens arrogants,
  - type: text
    content: je rabaisserai le triomphe des brutes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je rendrai…  : la phrase pourrait aussi signifier les hommes me seront plus précieux que… –  l''or  : ce terme traduit ici deux mots hébreux différents. –  Ophir Gn 10.29n  ; 1R 9.28 ; Jb 22.24.'
  - type: text
    content: Je rendrai les hommes plus rares que l'or fin,
  - type: text
    content: je rendrai les humains plus rares que l'or d'Ophir.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la terre ou le pays. –  sur sa base  : cf. Jb 9.6n.'
  - type: text
    content: C'est pourquoi j'agiterai le ciel,
  - type: text
    content: et la terre tremblera sur sa base,
  - type: text
    content: 'par la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: par le jour de sa colère ardente.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'comme le petit bétail… ou comme un troupeau  ; cf. 1R 22.17 ; Ez 34.5 ; Mt 9.36/ /+. –  chacun… vers son pays  : démembrement de l''empire babylonien, cf. 47.15 ; Jr 51.9,44 ; Na 2.9.'
  - type: text
    content: Alors comme une gazelle effarouchée,
  - type: text
    content: comme le petit bétail qui n'a personne pour le rassembler,
  - type: text
    content: chacun s'en retournera vers son peuple,
  - type: text
    content: chacun fuira vers son pays ;
  '15':
  - type: text
    content: tous ceux qu'on trouvera seront transpercés,
  - type: text
    content: tous ceux qu'on saisira tomberont par l'épée.
  '16':
  - type: text
    content: ' '
  - type: note
    content: enfants… 2R 8.12 ; Ps 137.9. –  violées ou emmenées captives (dans un harem) ; Dt 28.30 ; Za 14.2.
  - type: text
    content: Leurs enfants seront jetés à terre sous leurs yeux,
  - type: text
    content: leurs maisons seront mises à sac
  - type: text
    content: et leurs femmes violées.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Je suscite  : litt. j''éveille  ; cf. 10.26n  ; 41.2,25 ; 45.13 ; Jr 6.22+ ; Ez 23.22. –  Mèdes  : peuple voisin des Perses, qui s''est associé à ces derniers pour démanteler la puissance babylonienne au VIe s. av. J.-C. après avoir été l''allié de Babylone contre l''Assyrie (VIIe s. av. J.-C.) ; cf. 21.2n  ; Jr 51.11n,27ns.'
  - type: text
    content: Je suscite contre eux les Mèdes,
  - type: text
    content: qui ne pensent pas à l'argent
  - type: text
    content: et à qui l'or ne plaît pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Leurs arcs  : litt. des arcs . –  à terre  : sous-entendu dans le texte.'
  - type: text
    content: Leurs arcs jetteront les jeunes gens à terre ;
  - type: text
    content: 'ils seront sans compassion pour le fruit du ventre maternel :'
  - type: text
    content: leur œil sera sans pitié pour les fils.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'le plus beau…  : autre traduction l''ornement des royaumes. –  la splendeur (autres traductions la parure, l''arrogance , cf. 10.12n) orgueilleuse  : cf. 4.2. –  Chaldéens 23.13n. –  comme… de Sodome et de Gomorrhe  : cf. 1.9+, formule identique en Jr 50.40 ; Am 4.11.'
  - type: text
    content: Il en sera pour Babylone, le plus beau des royaumes,
  - type: text
    content: la splendeur orgueilleuse des Chaldéens,
  - type: text
    content: comme lors de la destruction divine de Sodome et de Gomorrhe.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'bannière 5.26+. –  agitez 10.32+. –  les portes des nobles  : allusion possible à l''une des portes de Babylone ou au nom même de la ville, au sens de Porte des dieux (cf. Gn 11.9n). – Sur l''ensemble, cf. Dt 23.10-15 ; 1S 13.9 ; 21.6 ; Jr 22.7 ; 51.28 ; Jl 4.9.'
  - type: text
    content: Sur une montagne nue dressez une bannière,
  - type: text
    content: élevez la voix vers eux,
  - type: text
    content: agitez la main,
  - type: text
    content: et qu'ils franchissent les portes des nobles !
  '20':
  - type: text
    content: ' '
  - type: note
    content: Le Bédouin ou l'Arabe 21.13n  ; même terme en Jr 3.2 ; Né 2.19 ; 4.1 ; 6.1 ; 2Ch 17.11 ; 21.16 ; 22.1 ; 26.7.
  - type: text
    content: Elle ne sera plus jamais habitée,
  - type: text
    content: on n'y demeurera plus,
  - type: text
    content: de génération en génération.
  - type: text
    content: Le Bédouin n'y dressera pas sa tente,
  - type: text
    content: les bergers n'y feront pas coucher leurs bêtes ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'habitants du désert 23.13n  ; 34.14 ; Jr 50.39 ; Ps 72.9 ; 74.14 ; il s''agit peut-être d''animaux (cf. 14.23 ; 27.10 ; 32.14 ; 34.11 ; Jr 10.22 ; So 2.4 ; beaucoup traduisent chats sauvages ) ou de démons. –  les boucs  : litt. les poilus (Lv 16.5,10 ; 17.7n). Le terme désigne probablement ici une espèce de démon censée hanter le désert (cf. les satyres de la mythologie gréco-romaine). Cf. Ap 18.2n.'
  - type: text
    content: ce sont les habitants du désert qui s'y coucheront ;
  - type: text
    content: les hiboux rempliront ses maisons,
  - type: text
    content: les autruches y demeureront
  - type: text
    content: et les boucs y bondiront.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'hyènes  : traduction incertaine (cf. 23.13 ; 34.14 ; Jr 50.39) ; certains préfèrent chacals , d''autres rapprochent le mot correspondant d''un terme apparenté rendu par faucon en Lv 11.14 ; Dt 14.13 ; Jb 28.7, d''autres encore pensent qu''il désigne ici une sorte de démon. –  palais  : on modifie légèrement le texte hébreu traditionnel ( ses veuves  ?) avec plusieurs versions anciennes. –  Son temps Jr 27.7 ; Ez 22.4.'
  - type: text
    content: Les hyènes entonneront leur complainte dans ses palais,
  - type: text
    content: et les chacals dans ses demeures luxueuses.
  - type: text
    content: Son temps est près d'arriver,
  - type: text
    content: et ses jours ne se prolongeront pas.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'consacrés  : voir saint. –  les héros  : autre traduction les guerriers . –  ceux qui exultent…  : cf. So 3.11n.'
  - type: text
    content: J'ai donné des ordres à ceux qui me sont consacrés,
  - type: text
    content: j'ai aussi appelé les héros de ma colère,
  - type: text
    content: ceux qui exultent de mon triomphe.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 2.1. –  Tumulte  : autre traduction bruit d''une multitude. –  comme celui…  : certains modifient le texte hébreu traditionnel pour lire vacarme d''un peuple nombreux.'
  - type: text
    content: Tumulte dans les montagnes,
  - type: text
    content: comme celui d'un peuple nombreux !
  - type: text
    content: Vacarme des royaumes, des nations rassemblées !
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées passe en revue'
  - type: text
    content: l'armée pour la guerre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: les armes de sa fureur Jr 50.25n  ; Rm 9.21n,22.
  - type: text
    content: Ils viennent d'un pays lointain,
  - type: text
    content: des extrémités du ciel ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les armes de sa fureur'
  - type: text
    content: vont causer des douleurs à tout le pays.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Hurlez Jl 1.5-13. –  jour du Seigneur 2.11-12+. –  un ravage  : hébreu shod  ; le terme fait assonance avec le nom divin traduit par Puissant (hébreu Shaddaï , voir Gn 17.1n) ; de même en Jl 1.15.'
  - type: text
    content: 'Hurlez, car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche :'
  - type: text
    content: il vient comme un ravage du Puissant.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'toutes les mains tombent  : autre traduction tous sont découragés  ; cf. Ez 7.17n. – Voir cœur. –  fond  : cf. 14.31n  ; 19.1 ; Jos 2.11n. – Cf. Jr 6.24 ; Ez 7.17.'
  - type: text
    content: C'est pourquoi toutes les mains tombent,
  - type: text
    content: le cœur de tout homme fond.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'comme une femme… 21.3 ; 26.17 ; 42.14 ; Ps 48.7. –  se regardent… stupeur  : Gn 43.33n  ; cf. Ha 1.5 ; Jb 26.11. –  leurs visages sont enflammés  : litt. leurs visages sont des visages de flamme , caractérisant la honte ou la fièvre (cf. Jb 16.16).'
  - type: text
    content: Ils sont saisis d'épouvante ;
  - type: text
    content: douleurs et spasmes s'emparent d'eux ;
  - type: text
    content: ils se tordent comme une femme qui accouche ;
  - type: text
    content: ils se regardent les uns les autres avec stupeur ;
  - type: text
    content: leurs visages sont enflammés.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Jr 4.7 ; 18.16. –  la terre ou le pays. – Voir péché.
  - type: text
    content: 'Le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' arrive,'
  - type: text
    content: jour cruel, jour de fureur et de colère ardente ;
  - type: text
    content: il réduira la terre en un lieu dévasté,
  - type: text
    content: il en fera disparaître les pécheurs.
