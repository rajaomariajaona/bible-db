        - type: text
          text: '13.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sentence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: oracle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fardeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 22.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; il est apparenté à un verbe qui peut signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'porter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(quelque chose), mais aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'élever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (la voix) (cf. 3.7) ; de même en 15.1 ; 17.1 ; 30.6 ; Na 1.1 ; Ha 1.1 ; Za 9.1 ; 12.1 ; Ml 1.1 ; Lm 2.14. Cf. Jr 23.33
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-40. –  '
      - type: usfm
