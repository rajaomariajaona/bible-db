          text: orgueilleuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chaldéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
