        - type: text
          text: 'Babylone '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.1-10 ; 39 ; 47 ; 48.14,20 ; Jr 50–51 ; Ap 17–18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaïe, fils d''Amots '
      - type: usfm
        marker: ft
        children:
