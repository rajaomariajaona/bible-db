document_id: ROM.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Désobéissance de tous les hommes
  - type: text
    content: ' '
  - type: note
    content: utilité de la circoncision 2.25.
  - type: text
    content: 'Quel est donc l''avantage du Juif, ou quelle est l''utilité de la circoncision ? '
  '10':
  - type: note
    content: 'Ec 7.20  ; voir aussi 1R 8.46 ; Hymnes (Qumrân) 9.14s : « Car nul n''est juste en ton jugement, ni innocent en ton procès. L''être humain issu de l''être humain peut-il être juste ? »'
  - type: text
    content: 'ainsi qu''il est écrit :'
  - type: text
    content: Il n'y a pas de juste, pas même un seul ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 14.1-3 ; 53.2-4.
  - type: text
    content: il n'y en a pas un qui soit intelligent,
  - type: text
    content: il n'y en a pas un qui recherche Dieu
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'il n''y en a pas même un seul  : certains mss portent simplement pas même un seul.'
  - type: text
    content: Tous se sont égarés, ensemble ils se sont pervertis,
  - type: text
    content: il n'y en a pas un qui fasse le bien,
  - type: text
    content: il n'y en a pas même un seul
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 5.10  ; cf. Jr 9.3,5. –  un venin d'aspic Ps 140.4  ; cf. Jc 3.8.
  - type: text
    content: Leur gosier est un sépulcre ouvert,
  - type: text
    content: ils rusent avec leur langue,
  - type: text
    content: ils ont sous leurs lèvres un venin d'aspic,
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 10.7  ; cf. Mt 12.34. – Voir bénédiction, malédiction.
  - type: text
    content: leur bouche est pleine de malédiction et d'amertume
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: Es 59.7s ; Pr 1.16  ; 6.18. –  Ils ont les pieds agiles (litt. légers ), c.-à-d. ils sont rapides (cf. 2S 2.18n).
  - type: text
    content: Ils ont les pieds agiles pour répandre le sang,
  '16':
  - type: text
    content: ' '
  - type: text
    content: la destruction et le malheur sont sur leur chemin,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 1.79. –  ils n''ont jamais connu  : autres traductions ils n''ont pas connu ; ils ne connaissent pas.'
  - type: text
    content: ils n'ont jamais connu le chemin de la paix,
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 36.2 . – Voir crainte.
  - type: text
    content: il n'y a pas de crainte de Dieu devant leurs yeux
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ce que dit la loi (v. 10-18) : cf. 1Co 14.21,34. –  sous la loi v. 9,12 ; 2.12. –  que toute bouche soit fermée  : cf. Ga 3.22 ; voir aussi Ez 16.63. –  le monde entier soit coupable ou reconnu pour coupable (cf. v. 4) : cf. Gn 6.11s.'
  - type: text
    content: 'Or nous savons que tout ce que dit la loi, elle le dit à ceux qui sont sous la loi, afin que toute bouche soit fermée et que le monde entier soit coupable devant Dieu. '
  '2':
  - type: note
    content: '9.4s ; Dt 4.6-8 ; 32.7-11 ; Ps 103.7 ; 147.19s ; Jn 4.22. –  Tout d''abord  : cf. 1.16+. –  paroles  : sur le terme grec correspondant voir Ac 7.38n  ; Hé 5.12 ; 1P 4.11. –  confiées  : le verbe grec est apparenté aux termes traduits par fidélité et infidélité au v. 3n  ; cf. 1Th 2.4.'
  - type: text
    content: 'Ils sont considérables, de toute manière. Tout d''abord, c''est à eux que les paroles de Dieu ont été confiées. '
  '20':
  - type: note
    content: 'Personne  : litt. aucune chair. –  ne sera justifié Ps 143.2 ; Ga 2.16. –  des œuvres de la loi  : litt. d''œuvres de loi. –  au moyen de la loi… 4.15+. –  la connaissance 1.28n.'
  - type: text
    content: Personne, en effet, ne sera justifié devant lui en vertu des œuvres de la loi, car ce qui advient au moyen de la loi, c'est la connaissance du péché.
  - type: heading
    content: Justifiés par la foi
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'en dehors de la loi  : autres traductions sans loi, indépendamment de la loi  ; cf. v. 28 ; 4.6 ; 7.8s. –  la justice de Dieu 1.17+. –  attestée par… les prophètes Ac 10.43 ; on pourrait aussi écrire par la Loi et les Prophètes (voir introduction à l''Ancien Testament). –  s''est manifestée  : litt. a été manifestée  ; cf. 1Jn 4.9s.'
  - type: text
    content: 'Mais maintenant, en dehors de la loi, la justice de Dieu attestée par la loi et les prophètes s''est manifestée, '
  '22':
  - type: note
    content: 'la foi de Jésus-Christ  : litt. une foi de Jésus-Christ ou, selon un ms, une foi de Christ. Il faut sans doute comprendre, non la foi qu''avait Jésus-Christ, mais une foi déterminée par Jésus-Christ  ; d''autres traduisent la foi en Jésus-Christ  ; de même v. 26 ; Ga 2.16n  ; Ep 3.12 ; Ph 3.9 ; Jc 2.1 ; Ap 2.13 ; voir aussi Mc 11.22 ; Ac 3.16 ; Col 2.12 ; cf. Rm 5.19. –  pas de distinction  : même formule en 10.12 (pas de différence) ; le même mot désigne des sons distincts en 1Co 14.7.'
  - type: text
    content: 'justice de Dieu, par la foi de Jésus-Christ, pour tous ceux qui croient. Car il n''y a pas de distinction : '
  '23':
  - type: note
    content: 'tous… ont péché v. 9 ; 5.12. –  sont privés de  : litt. manquent  ; cf. 1Co 1.7. –  la gloire de Dieu 8.18,21,30 ; cf. Ex 40.34s ; 1R 8.11 ; Es 60.1,3 ; Ez 10.18s ; 11.22s ; 43.1-9 ; 1Co 2.8 ; 2Co 3.18 ; 4.4ss.'
  - type: text
    content: 'tous, en effet, ont péché et sont privés de la gloire de Dieu ; '
  '24':
  - type: note
    content: 'justifiés 4.2-10 ; 5.1 ; 9.30s ; 10.3s ; Ga 2.16 ; 3.11 ; Ph 3.6-9 ; Tt 3.7. Cf. Hymnes (Qumrân) 13.16s : « C''est seulement par ta bonté que l''homme est justifié, et par l''immensité de ta miséricorde. Car c''est de ton éclat que tu le pareras, et tu le combleras d''une abondance de plaisirs. » –  grâce  : cf. Ac 15.10s ; 2Co 5.19 ; Ep 2.4-10. –  rédemption ou, plus généralement, libération, délivrance  ; cf. 8.23 ; Lc 21.28 ; 1Co 1.30 ; Ep 1.7,14 ; 4.30 ; Col 1.14 ; Hé 9.15 ; 11.35 ; voir aussi Dt 7.8 ; 15.15 ; Es 41.14n  ; Ps 130.7s (même famille de termes dans LXX) ; sur l''idée de libération par rachat, voir 1Co 6.20 ; 7.23 ; Ga 3.13 ; 4.5 ; 1P 1.18s.'
  - type: text
    content: 'et c''est gratuitement qu''ils sont justifiés par sa grâce, au moyen de la rédemption qui est en Jésus-Christ. '
  '25':
  - type: note
    content: 's''est proposé de ou a formé le projet de (1.13 ; terme apparenté en 8.28n) ; autre traduction  : c''est lui que Dieu a exposé comme expiation. –  expiation ou moyen d''expiation, c.-à-d. d’absolution ou d’annulation des péchés  ; autre traduction possible  : propitiation, c.-à-d. moyen d''apaiser la colère de Dieu ; le mot grec correspondant désigne aussi dans LXX l’expiatoire (ou propitiatoire), le couvercle du coffre de l''alliance, qui était aspergé du sang des victimes le jour de l''Expiation (Lv 16.12-16 ; Hé 9.5,15 ; cf. 1Jn 2.2 ; 4.10). –  de la foi  : autre traduction possible, selon certains mss  : d''une foi. –  par son sang  : autre traduction en son sang  ; cf. 5.9 ; 1Co 11.25 ; Ep 1.7+. –  pour montrer  : autre traduction comme preuve de  ; le terme grec correspondant (aussi au v. 26) est traduit par preuve en 2Co 8.24 et par indice en Ph 1.28. –  sa justice 1.17+. –  laissé impunis…  : cf. Ex 34.6s ; Es 48.9 ; Jr 15.15 ; Ps 103.8. –  péchés Mc 3.28n.'
  - type: text
    content: 'C''est lui que Dieu s''est proposé de constituer en expiation, au moyen de la foi, par son sang, pour montrer sa justice ; parce qu''il avait laissé impunis les péchés commis auparavant, '
  '26':
  - type: note
    content: 'dans sa tolérance…  : litt. dans (c.-à-d. au temps de  ?) la tolérance de Dieu, il…  ; cf. 2.4ns ; Ac 17.30. –  dans le temps présent 8.18 ; 11.5 ; 2Co 8.14n  ; même terme pour temps en Rm 5.6n  ; 9.9n  ; 13.11 ; cf. 12.11n  ; 1Co 4.5 ; 7.5,29 ; 2Co 6.2 ; Ep 1.10 ; 2.12 ; 5.16 ; 6.18 ; Col 4.5 ; 1Th 2.17 ; 5.1n  ; 2Th 2.6 ; 1Tm 2.6 ; 4.1 ; 6.15 ; 2Tm 3.1 ; 4.3,6 ; Tt 1.3 ; Hé 9.9s ; 11.11,15n  ; 1P 1.5n  ; voir aussi Mc 1.15n  ; Ga 4.10n  ; 6.9-10n. –  la foi de Jésus  : litt. une foi de Jésus v. 22n.'
  - type: text
    content: dans sa tolérance, Dieu a voulu montrer sa justice dans le temps présent, pour être juste tout en justifiant celui qui relève de la foi de Jésus.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'fierté 2.17n. –  la loi de la foi  : autre traduction une loi de foi  ; cf. 8.2.'
  - type: text
    content: 'Où donc est la fierté ? Elle est exclue. Par quelle loi ? Celle des œuvres ? Non, mais par la loi de la foi. '
  '28':
  - type: note
    content: 'estimons  : le même verbe est traduit par compter en 4.3n. –  en dehors… ou sans œuvres de loi, v. 21n  ; Ga 2.16 ; 3.2.'
  - type: text
    content: 'Car nous estimons que l''être humain est justifié par la foi, en dehors des œuvres de la loi. '
  '29':
  - type: note
    content: Cf. 10.12. – Voir Juifs et non-Juifs.
  - type: text
    content: 'Ou bien Dieu est-il seulement le Dieu des Juifs ? N''est-il pas aussi celui des non-Juifs ? Oui, il est aussi le Dieu des non-Juifs, '
  '3':
  - type: note
    content: 'On pourrait aussi traduire si quelques-uns ont été infidèles, leur infidélité réduira-t-elle à rien la fidélité de Dieu ? Cf. 4.20 ; 9.6 ; 11.20,23,29 ; Os 1–3 ; Ps 89.31-38 ; 100.5 ; 119.89s ; 2Tm 2.13 ; 1Jn 1.9. –  réduira-t-il à rien  : même verbe v. 31 ; 4.14 ; 6.6 ; 7.2,6 (dégager) ; 1Co 1.28+ ; 2Co 3.7n  ; Ga 3.17 ; Ep 2.15 ; 2Th 2.8 ; 2Tm 1.10.'
  - type: text
    content: 'Eh quoi ! si quelques-uns ont manqué de foi, leur manque de foi réduira-t-il à rien la foi de Dieu ? '
  '30':
  - type: note
    content: 'Cf. 4.11. –  s''il est vrai…  : autre traduction puisque Dieu est un, lui qui justifiera… 1Co 8.6+ ; cf. Dt 6.4. – Voir circoncision. –  en vertu de la foi ou en vertu d''une foi  ; autre interprétation par fidélité, cf. v. 3n  ; 1.17n.'
  - type: text
    content: 's''il est vrai qu''il y a un seul Dieu : c''est lui qui justifiera les circoncis en vertu de la foi, et les incirconcis au moyen de la foi. '
  '31':
  - type: note
    content: 8.3s ; cf. Mt 5.17+ss.
  - type: text
    content: Alors, au moyen de la foi, réduisons-nous à rien la loi ? Jamais de la vie ! Au contraire, nous confirmons la loi.
  '4':
  - type: note
    content: 'vrai  : autre traduction reconnu pour vrai  ; sans doute au sens du terme traduit tantôt par vérité, tantôt par loyauté dans l''A.T., c.-à-d. fidèle (cf. v. 3) ou digne de confiance  ; cf. Ps 19.10 ; Dn 4.34 ; voir aussi Jn 3.33 ; 1Jn 1.9s ; Ap 3.7+. –  tout être humain menteur (ou reconnu pour menteur) Ps 116.11. –  dans ton procès  : ou bien quand tu seras jugé, sens habituel de la forme verbale qui apparaît ici, ou bien, selon certains, quand tu jugeras  ; cf. Ps 51.6n  ; voir aussi Dn 9.7.'
  - type: text
    content: 'Jamais de la vie ! Plutôt, que Dieu soit vrai et tout être humain menteur, ainsi qu''il est écrit :'
  - type: text
    content: Afin que tu sois trouvé juste dans tes paroles
  - type: text
    content: et que tu triomphes dans ton procès
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'met en évidence  : même verbe 5.8 ; 16.1 ( recommander ) ; 2Co 3.1n. –  justice / colère 1.17+,18 ; autre traduction quand il donne cours à sa colère  ; cf. 4.15 ; 5.9 ; 12.19 ; 13.4s ; Ep 2.3 ; 1Th 5.9. –  en termes humains  : litt. selon l''humain  ; voir aussi 6.19 ; même expression en 1Co 9.8 ( en humain ) ; 15.32 ( pour des vues humaines ) ; Ga 3.15 ; expression très proche en 1P 4.6n ( humainement ).'
  - type: text
    content: 'Mais si notre injustice met en évidence la justice de Dieu, que dirons-nous ? Dieu est-il injuste quand il donne cours à la colère ? – Je parle en termes humains. – '
  '6':
  - type: note
    content: 'jugerait-il  : autres traductions jugera-t-il ; juge-t-il (cf. 2.16n).'
  - type: text
    content: 'Jamais de la vie ! Autrement, comment Dieu jugerait-il le monde ? '
  '7':
  - type: note
    content: 'si par mon mensonge…  : autre traduction si mon mensonge met en lumière la vérité de Dieu… – Voir gloire. –  jugé comme pécheur  : autre traduction jugé pécheur.'
  - type: text
    content: 'Mais si par mon mensonge la vérité de Dieu abonde, pour sa gloire, pourquoi, moi, serais-je encore jugé comme pécheur ? '
  '8':
  - type: note
    content: 'Cf. 6.1s,15 ; 9.19. –  Ces gens-là…  : litt. le jugement de (c.-à-d. contre) ceux-là est juste.'
  - type: text
    content: 'Et pourquoi ne pas dire, comme certains calomniateurs prétendent que nous le disons : « Faisons le mal, pour qu''il en résulte du bien ! » Ces gens-là méritent d''être condamnés.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Pas en tous points  : cf. v. 1s ; c''est le sens naturel de l''expression grecque ; elle apparaît aussi en 1Co 5.10 ( Ce n''est pas d''une manière absolue… ). Mais on pourrait aussi comprendre  : absolument pas . –  tous, Juifs et Grecs…  : cf. v. 23+ ; 1.14n  ; 1.18–2.24 ; 11.32 ; Ga 3.22 ; 1Jn 1.8ss.'
  - type: text
    content: 'Quoi donc ? Sommes-nous supérieurs ? Pas en tous points. Car nous avons déjà porté cette accusation : tous, Juifs et Grecs, sont sous le péché, '
