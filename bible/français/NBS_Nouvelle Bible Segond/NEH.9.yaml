    marker-yv: yv-n
  - type: text
    text: 'Et les lévites, Josué, Qadmiel, Bani, Hashabnia, Shérébia, Hodiya, Shebania et Petahia dirent :'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière solennelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Levez-vous, bénissez le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, depuis toujours et pour toujours !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'on bénisse ton nom glorieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui est au-delà de toute bénédiction et de toute louange !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'LXX introduit ce v. par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et Esdras dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; sur l''ensemble de la prière, qui retrace l''histoire des relations de Dieu avec son peuple, cf. Es 63.7–64.11 ; Ps 78 ; 105–106 ; Dn 9.4ss ; Esd 9.6ss ; 2Ch 20.6ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est toi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2R 19.15,19 ; Es 37.16,20 ; Jr 32.17 ; Ps 83.19 ; 86.10 ; cf. Dt 6.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le ciel… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 20.11 ; Ps 121.2 ; 134.3 ; '
    - type: usfm
