  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: votre Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
