document_id: NEH.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Cérémonie publique de confession des péchés
  - type: text
    content: ' '
  - type: note
    content: 'Certains pensent que ce chapitre se situait primitivement après Esd 10 (cf. v. 2). –  Le vingt-quatrième jour…  : le lendemain du dernier jour de la fête des Huttes, cf. 8.14+,18 ; Lv 23.33ss. –  jeûne Jl 1.14 ; Jon 3.5 ; Esd 8.21 ; 2Ch 20.3. –  couverts d''un sac  : signe de deuil ou d''humiliation, cf. 8.9 ; Esd 9.3 ; voir aussi Gn 37.34 ; Es 22.12 ; Jr 4.8 ; 6.26 ; 48.37 ; Ez 27.31. –  et de terre  : litt. de sol , cf. Gn 2.5n  ; les mots correspondants sont omis par LXX  ; cf. 1S 4.12 ; 2S 1.2 ; 15.32.'
  - type: text
    content: 'Le vingt-quatrième jour du même mois, les Israélites se rassemblèrent pour un jeûne, couverts d''un sac et de terre. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 7–11. –  des signes et des prodiges Dt 4.34+ ; 6.22 ; Jr 32.20s ; Ps 105.27 ; 135.9 ; cf. Dn 9.15 ; LXX ajoute en Egypte . –  arrogance v. 16,29 ; cf. Ex 18.11n. –  un nom Es 63.12,14 ; Jr 32.20 ; Dn 9.15 ; cf. 2S 7.23. –  voilà pourquoi…  : autre traduction le nom que tu as en ce jour  ; cf. Dt 2.30n.'
  - type: text
    content: Tu as fait paraître des signes et des prodiges
  - type: text
    content: contre le pharaon, contre tous les gens de sa cour
  - type: text
    content: et contre tout le peuple de son pays,
  - type: text
    content: parce que tu savais avec quelle arrogance ils les avaient maltraités
  - type: text
    content: et tu t'es fait un nom
  - type: text
    content: – voilà pourquoi il en est ainsi en ce jour.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ex 14.21s ; 15.4s,10,19 ; Es 63.12 ; Ps 78.13. –  eaux puissantes Es 43.16.
  - type: text
    content: Tu as fendu la mer devant eux,
  - type: text
    content: et ils sont passés au milieu de la mer, sur la terre ferme ;
  - type: text
    content: mais tu as précipité dans les profondeurs,
  - type: text
    content: comme une pierre dans les eaux puissantes,
  - type: text
    content: ceux qui les poursuivaient.
  '12':
  - type: text
    content: ' '
  - type: note
    content: V. 19 ; Ex 13.21s ; 14.19s ; Nb 14.4 ; Dt 1.33 ; Ps 78.14 ; 105.39 ; cf. 2Ch 6.27.
  - type: text
    content: Tu les as conduits
  - type: text
    content: le jour par une colonne de nuée,
  - type: text
    content: et la nuit par une colonne de feu,
  - type: text
    content: éclairant le chemin qu'ils devaient suivre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 19.11,18ss ; 20.22 ; Dt 4.36. –  tu leur as parlé  : litt. tu as parlé avec eux. –  règles… Dt 4.5ss,44s ; 11.1 ; 12.1. –  lois de vérité (ou de loyauté  ; cf. v. 33) : cf. Ml 2.6.'
  - type: text
    content: Tu es descendu sur le mont Sinaï,
  - type: text
    content: du ciel tu leur as parlé
  - type: text
    content: et tu leur as donné des règles droites,
  - type: text
    content: des lois de vérité,
  - type: text
    content: des prescriptions et des commandements excellents.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'sabbat sacré  : cf. 13.22 ; Ex 20.8ss ; Jr 17.22,24 ; voir aussi Es 56.2ss ; 58.13.'
  - type: text
    content: Tu leur as fait connaître ton sabbat sacré
  - type: text
    content: et tu as institué pour eux
  - type: text
    content: des commandements, des prescriptions et une loi
  - type: text
    content: par l'intermédiaire de Moïse, ton serviteur.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Du ciel… Ex 16.4ss ; Ps 78.24 ; 105.40 ; Jn 6.31. –  de l''eau du rocher Ex 17.6 ; Nb 20.8ss ; Ps 78.16 ; 105.41. –  entrer en possession… v. 23 ; Dt 11.31 ; Jos 1.11 ; 18.3 ; Jg 18.9. –  tu avais juré, à main levée  : litt. tu avais levé ta main  ; cf. Ex 6.8 ; Nb 14.30 ; Ez 20.6,15,28,42 ; 47.14 ; voir aussi Dt 1.21.'
  - type: text
    content: Du ciel tu leur as donné du pain
  - type: text
    content: quand ils avaient faim,
  - type: text
    content: tu as fait sortir de l'eau du rocher
  - type: text
    content: quand ils avaient soif
  - type: text
    content: et tu leur as dit d'entrer en possession du pays
  - type: text
    content: que tu avais juré, à main levée, de leur donner.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'arrogants v. 10,29 ; cf. Dt 1.43+. –  rétifs  : litt. ils ont raidi leur nuque , de même au v. 17 ; cf. Ex 32.9n  ; Dt 10.16 ; 2R 17.14 ; Jr 7.26 ; 17.23 ; 19.15 ; 2Ch 36.13. –  écouté ou obéi à  : cf. Dt 11.13,27s ; 28.13.'
  - type: text
    content: Mais eux et nos pères se sont montrés arrogants et rétifs.
  - type: text
    content: Ils n'ont pas écouté tes commandements,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ils ont refusé d''écouter 1S 8.19 ; Jr 11.10 ; cf. Nb 14.1ss ; Dt 1.26ss. –  ne se sont pas souvenus… Ps 105.5 ; 1Ch 16.12. –  dans leur rébellion  : LXX et quelques mss hébreux ont lu en Egypte , ce qui donne la traduction suivante  : ils se sont donné un chef pour (d''autres comprennent, plus simplement, ils ont décidé de ) retourner à leur esclavage en Egypte  ; cf. Nb 14.4. –  Dieu de pardon ou Dieu des pardons Ps 130.4 ; Dn 9.9. –  clément ou qui fait grâce… v. 31 ; Ex 34.6s ; Nb 14.18 ; Jl 2.13 ; Jon 4.2 ; Ps 86.15 ; 103.8 ; 111.4 ; 145.8 ; 2Ch 30.9. –  tu ne les as pas abandonnés v. 19,28,31 ; Esd 9.9.'
  - type: text
    content: ils ont refusé d'écouter
  - type: text
    content: et ils ne se sont pas souvenus des choses étonnantes
  - type: text
    content: que tu avais faites en leur faveur.
  - type: text
    content: Ils se sont montrés rétifs
  - type: text
    content: et, dans leur rébellion,
  - type: text
    content: ils se sont donné un chef pour retourner à leur esclavage.
  - type: text
    content: Mais toi, tu es un Dieu de pardon,
  - type: text
    content: clément et compatissant,
  - type: text
    content: patient et grand par la fidélité ;
  - type: text
    content: tu ne les as pas abandonnés,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 32. –  ton Dieu (autre traduction possible tes dieux , mais ici le verbe qui suit est au singulier) , celui qui…  : LXX les dieux (cf. Gn 1.1n) qui nous ont fait monter… (Gn 12.10n) : cf. Ex 32.4n,8 ; Dt 9.16 ; voir aussi Ps 106.19s. –  outrageusement bafoué (ou méprisé ) : cf. v. 26 ; Ez 35.12.'
  - type: text
    content: même quand ils se sont fait un taurillon de métal fondu,
  - type: text
    content: 'en disant : « Voici ton Dieu,'
  - type: text
    content: celui qui t'a fait monter d'Egypte ! »,
  - type: text
    content: et quand ils t'ont outrageusement bafoué.
  '19':
  - type: text
    content: ' '
  - type: note
    content: V. 12+,31 ; Ex 32.11ss ; Es 54.7 ; Ps 51.3 ; 69.17 ; 119.156 ; Dn 9.18.
  - type: text
    content: Et toi, dans ta grande compassion,
  - type: text
    content: tu ne les as pas abandonnés au désert.
  - type: text
    content: La colonne de nuée
  - type: text
    content: n'a pas cessé de les conduire sur leur chemin, le jour,
  - type: text
    content: ni la colonne de feu pendant la nuit,
  - type: text
    content: éclairant le chemin qu'ils devaient suivre.
  '2':
  - type: note
    content: 'descendance d''Israël  : cf. Esd 9.2 ; voir aussi 2R 17.20 ; Ps 22.24 ; 1Ch 16.13. –  s''étant séparée 10.29 ; 13.3,30 ; Esd 6.21+ ; 9.1. –  se présentèrent  : autre traduction se tinrent debout. –  confesser (ou reconnaître) leurs péchés  : cf. 1.6 ; Esd 10.1+,11n  ; voir aussi Lv 26.40 ; Jr 7.10 ; Ps 32.5 ; Pr 28.13 ; Dn 9.4.'
  - type: text
    content: 'La descendance d''Israël s''étant séparée de tous les étrangers, ils se présentèrent pour confesser leurs péchés et les fautes de leurs pères. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: ton souffle (ou ton Esprit ) bienfaisant (litt. bon ) Ps 143.10 ; cf. Nb 11.25 ; Es 63.11 ; certains modifient le texte hébreu traditionnel pour traduire tu leur as donné ton bon vent (le même mot hébreu que celui ici traduit par souffle ) pour les rassasier , allusion possible à l'histoire des cailles (Nb 11.31). –  ta manne… v. 15+ ; Nb 11.6ss.
  - type: text
    content: Par ton souffle bienfaisant
  - type: text
    content: tu leur as accordé du discernement ;
  - type: text
    content: tu n'as pas refusé ta manne à leur bouche
  - type: text
    content: et tu leur as fourni de l'eau quand ils avaient soif.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ex 16.35 ; Dt 2.7 ; 8.2ss ; 29.4.
  - type: text
    content: Pendant quarante ans,
  - type: text
    content: tu as pourvu à tous leurs besoins dans le désert.
  - type: text
    content: Ils n'ont manqué de rien,
  - type: text
    content: leurs vêtements ne se sont pas usés
  - type: text
    content: et leurs pieds n'ont pas enflé.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'des provinces frontalières  : sens incertain ; le terme hébreu correspondant revient souvent dans les descriptions du territoire d''Israël au sens géographique de côté, direction (Jos 18.12ss ; Ez 47.17ss ; 48.1ss etc.). –  de Sihôn…  : LXX de Sihôn, roi de Heshbôn  ; cf. Nb 21 ; 32.3 ; Dt 1.4 ; 2.26–3.11 ; Ps 135.11s ; 136.19ss.'
  - type: text
    content: Tu leur as livré
  - type: text
    content: des royaumes et des peuples
  - type: text
    content: pour leur donner en partage des provinces frontalières.
  - type: text
    content: Ils ont pris possession
  - type: text
    content: du pays de Sihôn, du pays du roi de Heshbôn
  - type: text
    content: et du pays d'Og, roi du Bashân.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Tu as multiplié… Gn 15.5 ; 22.17 ; 26.4 ; Ex 32.13 ; Dt 1.10 ; 10.22 ; 28.62 ; 1Ch 27.23. –  dans le pays… Dt 10.11 ; 31.7 ; Jos 1.6 ; 3.14ss ; 5.6 ; 21.43s ; Jg 2.1 ; Jr 2.7.
  - type: text
    content: Tu as multiplié leurs fils
  - type: text
    content: comme les étoiles du ciel
  - type: text
    content: et tu les as fait entrer dans le pays
  - type: text
    content: dont tu avais dit à leurs pères qu'ils prendraient possession.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Et les fils… possession  : ce vers est omis par LXX ; cf. Dt 4.1 ; 8.1 ; 10.11 ; 11.8 ; Jos 1–12. –  humilié… Dt 9.3 ; Jg 4.23 ; 1Ch 17.10. –  livrés  : cf. v. 30 ; Gn 9.2n  ; Dt 7.24 ; Jos 11.12,17 ; Jg 1.4.'
  - type: text
    content: Et les fils sont entrés dans le pays et en ont pris possession ;
  - type: text
    content: tu as humilié devant eux les habitants du pays, les Cananéens,
  - type: text
    content: et tu les leur as livrés,
  - type: text
    content: avec leurs rois et les peuples du pays,
  - type: text
    content: pour qu'ils les traitent à leur gré.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'villes fortifiées Dt 3.5 ; 9.1s ; Jos 14.12. –  et une terre (ou un sol , cf. Gn 2.5n) fertile  : omis par LXX ; cf. Nb 13.20 ; Es 5.1. –  maisons… Dt 6.10ss ; 8.7ss. –  engraissé Dt 32.15.'
  - type: text
    content: Ils ont pris des villes fortifiées
  - type: text
    content: et une terre fertile ;
  - type: text
    content: ils ont pris possession de maisons remplies de toutes sortes de biens,
  - type: text
    content: de citernes creusées,
  - type: text
    content: de vignes, d'oliviers
  - type: text
    content: et d'arbres fruitiers en abondance ;
  - type: text
    content: ils ont mangé, ils se sont rassasiés,
  - type: text
    content: ils ont engraissé
  - type: text
    content: et ils ont vécu dans les délices, par ta grande bonté.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ont rejeté…  : cf. 1R 14.9 ; Es 38.17 ; Ez 23.35 ; Ps 50.17. –  tué tes prophètes 1R 18.4,13 ; 19.10,14 ; Jr 2.30 ; 26.20ss ; 2Ch 24.20ss ; Mt 21.36 ; 23.30s,37 ; Ac 7.52 ; 1Th 2.15. –  qui les avertissaient…  : autres traductions qui témoignaient contre eux pour qu''ils reviennent à toi ; qui les adjuraient de revenir à toi  ; cf. v. 29s,34 ; 2R 17.15 ; Am 3.13 ; 2Ch 24.19. –  outrageusement bafoué  : cf. v. 18.'
  - type: text
    content: Mais ils se sont rebellés et révoltés contre toi.
  - type: text
    content: Ils ont rejeté ta loi derrière leur dos,
  - type: text
    content: ils ont tué tes prophètes, qui les avertissaient pour qu'ils reviennent à toi,
  - type: text
    content: ils t'ont outrageusement bafoué.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jg 2.10ss ; 1R 8.37ss ; Jr 10.18. –  livrés Ez 39.23 ; Ps 78.61 ; les mots correspondant à adversaires , opprimèrent et détresse sont dérivés de la même racine hébraïque. –  crié vers toi Ex 14.10s ; Jos 24.7 ; Jg 3.9,15 ; 4.3 ; 6.7 ; Ps 34.18 ; 107.6,28. –  entendus du ciel 2Ch 6.21,23,25,30,33. –  grande compassion v. 19,28,31 ; 2S 24.14 ; Ps 119.156 ; Dn 9.18 ; 1Ch 21.13. –  des sauveurs… Jg 2.18 ; 3.9n  ; 6.14 ; 8.22 ; 10.12 ; 1S 9.16 ; 2R 13.5 ; Za 9.16 ; Ps 34.7 ; 44.8.
  - type: text
    content: Alors tu les as livrés
  - type: text
    content: à leurs adversaires qui les opprimèrent.
  - type: text
    content: Mais, au temps de leur détresse,
  - type: text
    content: ils ont crié vers toi ;
  - type: text
    content: et toi, tu les as entendus du ciel,
  - type: text
    content: et dans ta grande compassion,
  - type: text
    content: tu leur as donné des sauveurs
  - type: text
    content: qui les ont délivrés
  - type: text
    content: de la main de leurs adversaires.
  '28':
  - type: text
    content: ' '
  - type: note
    content: repos… Jg 3.11s,30 ; 4.1 ; 5.31 ; 8.28 ; 10.6 ; 13.1.
  - type: text
    content: Quand ils ont eu du repos,
  - type: text
    content: ils ont recommencé à faire du mal devant toi.
  - type: text
    content: Alors tu les as abandonnés aux mains
  - type: text
    content: de leurs ennemis, qui les dominèrent.
  - type: text
    content: Mais, de nouveau, ils ont crié vers toi ;
  - type: text
    content: et toi, tu les as entendus du ciel,
  - type: text
    content: et, dans ta grande compassion,
  - type: text
    content: tu les as délivrés maintes fois.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'avertis  : cf. v. 26n  ; Jr 11.7 ; 42.19. –  ils se sont montrés arrogants  : LXX n''a pas ce premier verbe, cf. v. 16+. – Voir péché. –  l''homme qui les met en pratique… Lv 18.5 ; Ez 20.11 ; Lc 10.28. –  ils se sont montrés…  : litt. ils ont présenté une épaule rebelle (comme une bête qui refuse le joug, cf. Za 7.11) et ils ont raidi leur cou  ; cf. v. 16n.'
  - type: text
    content: Tu les as avertis pour qu'ils reviennent à ta loi ;
  - type: text
    content: mais ils se sont montrés arrogants
  - type: text
    content: et n'ont pas écouté tes commandements.
  - type: text
    content: Ils ont péché contre tes règles
  - type: text
    content: – alors que l'homme qui les met en pratique vit par elles ;
  - type: text
    content: ils se sont montrés rebelles et rétifs,
  - type: text
    content: ils n'ont pas écouté.
  '3':
  - type: note
    content: 'debout… 8.7s. –  livre de la loi 8.1+. –  pendant un quart de la journée / pendant un autre quart  : précisions absentes de LXX ; cf. 8.3. –  leurs péchés  : sous-entendu dans le texte, cf. v. 2.'
  - type: text
    content: 'Lorsqu''ils furent debout, à leur place, on lut dans le livre de la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, pendant un quart de la journée ; et pendant un autre quart ils confessèrent leurs péchés et se prosternèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Tu les as supportés ou tu as été patient envers eux . –  avertis v. 26n. –  par ton souffle ou ton Esprit Za 7.12. –  n''ont pas prêté l''oreille 2R 17.13ss ; 2Ch 24.19. –  livrés Jg 6.1 ; 13.1 ; 2R 13.3 ; Jr 20.4s ; 21.7 ; 22.25 ; Ez 7.21 ; 21.36 ; Ps 106.41 ; cf. 2R 17 ; 24–25. –  peuples des pays  : cf. Esd 3.3n.'
  - type: text
    content: Tu les as supportés de nombreuses années
  - type: text
    content: et tu les as avertis par ton souffle,
  - type: text
    content: par l'intermédiaire de tes prophètes,
  - type: text
    content: mais ils n'ont pas prêté l'oreille.
  - type: text
    content: Alors tu les as livrés
  - type: text
    content: aux peuples des pays.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'V. 17+,19. –  grande compassion Lm 3.22. –  pas exterminés Jr 4.27 ; 5.18 ; 30.11 ; 46.28. –  tu es un Dieu (hébreu ’El , de même au v. 32 ; voir Gn 21.33n) …  : LXX tu es fort, clément et compatissant.'
  - type: text
    content: Dans ta grande compassion,
  - type: text
    content: tu ne les as pas exterminés
  - type: text
    content: et tu ne les as pas abandonnés,
  - type: text
    content: car tu es un Dieu clément et compatissant.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu (cf. v. 31n) grand, vaillant et redoutable  : cf. 1.5+ ; Dt 10.17 ; Jr 32.18 ; Ps 77.14 ; 106.3 ; Dn 9.4. –  gardes l''alliance 1.5+. –  la peine… Ex 18.8 ; Nb 20.14 ; Dt 28.66n  ; Ml 1.13n  ; Lm 3.5. –  nous atteint  : litt. nous trouve . –  nous, nos rois… Esd 9.7. –  depuis le temps des rois d''Assyrie  : cf. 2R 15.19,29 ; 17.3ss ; Esd 4.2,10.'
  - type: text
    content: Et maintenant, notre Dieu,
  - type: text
    content: Dieu grand, vaillant et redoutable,
  - type: text
    content: toi qui gardes l'alliance et la fidélité,
  - type: text
    content: ne regarde pas comme peu de chose la peine qui nous atteint, nous,
  - type: text
    content: nos rois, nos princes,
  - type: text
    content: nos prêtres, nos prophètes,
  - type: text
    content: nos pères et tout ton peuple,
  - type: text
    content: depuis le temps des rois d'Assyrie jusqu'à ce jour.
  '33':
  - type: text
    content: ' '
  - type: note
    content: juste v. 8+ ; Dn 9.7. –  en méchants Ps 106.6 ; Dn 9.5.
  - type: text
    content: Tu as été juste dans tout ce qui nous est arrivé,
  - type: text
    content: car tu as agi avec loyauté,
  - type: text
    content: et nous, nous avons agi en méchants.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 32 ; 2R 17.15 ; Ps 132.12 ; Dn 9.6. –  n'ont pas mis ta loi en pratique ou n'ont pas agi selon ta loi (même verbe v. 29).
  - type: text
    content: Nos rois, nos princes,
  - type: text
    content: nos prêtres et nos pères
  - type: text
    content: n'ont pas mis ta loi en pratique ;
  - type: text
    content: ils n'ont pas été attentifs à tes commandements
  - type: text
    content: ni aux préceptes que tu leur avais donnés.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'dans leur royaume  : LXX dans ton royaume . –  bienfaits v. 25 ; Ps 145.7. –  ils ne t''ont pas servi  : le verbe hébreu a aussi le sens de être esclave de (cf. v. 36). –  ils ne sont pas revenus  : autre traduction ils ne se sont pas détournés  ; cf. Jr 35.15. –  agissements mauvais Dt 28.20n  ; Jr 4.4+.'
  - type: text
    content: Pendant qu'ils étaient dans leur royaume,
  - type: text
    content: au milieu des bienfaits nombreux que tu leur accordais,
  - type: text
    content: dans le pays vaste et fertile que tu avais mis devant eux,
  - type: text
    content: ils ne t'ont pas servi
  - type: text
    content: et ils ne sont pas revenus de leurs agissements mauvais.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'LXX a compris nous sommes esclaves… (v. 37) des rois…  ; cf. Dt 6.23 ; 19.8 ; 26.9 ; Jos 2.9 ; Es 1.19 ; Jr 2.7 ; 2Ch 6.31. –  jouissent  : sous-entendu dans le texte.'
  - type: text
    content: Et aujourd'hui, nous sommes esclaves !
  - type: text
    content: Le pays que tu as donné à nos pères,
  - type: text
    content: pour qu'ils en mangent le fruit et qu'ils jouissent de ses biens,
  - type: text
    content: nous y sommes esclaves !
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.2ss,15 ; voir aussi Dt 28.33 ; 1S 8.11ss ; Daniel grec 3.32 : « Tu nous as livrés aux mains d''ennemis impies et d''odieux rebelles, et à un roi injuste, le pire de toute la terre. »'
  - type: text
    content: Ses produits abondants
  - type: text
    content: sont pour les rois que tu as placés à notre tête,
  - type: text
    content: à cause de nos péchés ;
  - type: text
    content: ils dominent à leur gré sur nos corps et sur nos bêtes,
  - type: text
    content: et nous sommes dans une grande détresse !
  '4':
  - type: note
    content: 'Les listes de noms divergent dans LXX ; cf. 8.7. –  la tribune  : cf. 8.4 ; le mot correspondant est traduit par montée en 12.37, marche(s) en Ez 40.31ss. –  des lévites  : cf. 8.7s ; 2Ch 20.21.'
  - type: text
    content: 'Josué, Bani, Qadmiel, Shebania, Bounni, Shérébia, Bani et Kenani montèrent à la tribune des lévites et crièrent à pleine voix vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu. '
  '5':
  - type: note
    content: 'votre Dieu  : LXX notre Dieu. –  depuis toujours… Ps 41.14 ; 90.2n  ; 103.17 ; 106.48 ; 1Ch 29.10ss. –  Qu''on bénisse  : litt. qu''ils bénissent  ; certains modifient le texte hébreu traditionnel pour lire que soit béni ton nom glorieux Ps 72.19 ; 1Ch 29.13.'
  - type: text
    content: 'Et les lévites, Josué, Qadmiel, Bani, Hashabnia, Shérébia, Hodiya, Shebania et Petahia dirent :'
  - type: heading
    content: Prière solennelle
  - type: text
    content: 'Levez-vous, bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, depuis toujours et pour toujours !'
  - type: text
    content: Qu'on bénisse ton nom glorieux,
  - type: text
    content: qui est au-delà de toute bénédiction et de toute louange !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'LXX introduit ce v. par et Esdras dit  ; sur l''ensemble de la prière, qui retrace l''histoire des relations de Dieu avec son peuple, cf. Es 63.7–64.11 ; Ps 78 ; 105–106 ; Dn 9.4ss ; Esd 9.6ss ; 2Ch 20.6ss. –  C''est toi… 2R 19.15,19 ; Es 37.16,20 ; Jr 32.17 ; Ps 83.19 ; 86.10 ; cf. Dt 6.4. –  le ciel… Gn 1.1n  ; Ex 20.11 ; Ps 121.2 ; 134.3 ; Ac 4.24  ; 17.24 ; Ap 10.6. –  ciel du ciel Dt 10.14n  ; 1R 8.27 ; Ps 148.4 ; 2Ch 2.5 ; 6.18. –  leur armée Gn 2.1 ; Dt 4.19 ; 17.3 ; Ps 33.6 ; cf. 1R 22.19 ; Ps 103.21 ; 148.2. –  s''y trouve  : litt. est sur elle. –  tu donnes la vie Ps 104.27ss.'
  - type: text
    content: 'C''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', toi seul,'
  - type: text
    content: qui as fait le ciel, le ciel du ciel et toute leur armée,
  - type: text
    content: la terre et tout ce qui s'y trouve,
  - type: text
    content: les mers et tout ce qu'elles renferment.
  - type: text
    content: A tout cela, tu donnes la vie,
  - type: text
    content: et l'armée du ciel se prosterne devant toi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 12.1ss. –  Our-des-Chaldéens  : LXX du pays des Chaldéens  ; cf. Gn 11.28,31 ; 15.7. –  le nom d''Abraham Gn 17.5.'
  - type: text
    content: 'C''est toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu,'
  - type: text
    content: qui as choisi Abram,
  - type: text
    content: qui lui as fait quitter Our-des-Chaldéens
  - type: text
    content: et qui lui as donné le nom d'Abraham.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  digne de ta confiance  : litt. sûr (ou fidèle ) devant toi . –  l''alliance Gn 15.18ss ; Ex 6.4. –  Cananéens… Ex 3.8,17 ; 13.5 ; 23.23. –  tu es juste v. 33 ; Jr 12.1 ; Ps 119.137 ; Lm 1.18 ; Dn 9.14 ; Esd 9.15.'
  - type: text
    content: Tu as trouvé son cœur digne de ta confiance,
  - type: text
    content: tu as conclu l'alliance avec lui,
  - type: text
    content: pour donner à sa descendance le pays
  - type: text
    content: des Cananéens, des Hittites, des Amorites,
  - type: text
    content: des Perizzites, des Jébusites et des Guirgashites.
  - type: text
    content: Et tu as tenu ta parole, car tu es juste.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Tu as vu… Ex 2.23ss ; 3.7 ; 4.31 ; 14.10,15 ; cf. 2R 13.4. –  l''affliction ou l''humiliation, l''oppression (cf. v. 24) ; cf. Dt 8.20n. –  mer des Joncs  : LXX mer Rouge  ; cf. Ex 13.18n.'
  - type: text
    content: Tu as vu l'affliction de nos pères en Egypte
  - type: text
    content: et tu as entendu leurs cris près de la mer des Joncs.
