    marker-yv: yv-n
  - type: text
    text: Tu as trouvé son cœur digne de ta confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as conclu l'alliance avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour donner à sa descendance le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: des Cananéens, des Hittites, des Amorites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des Perizzites, des Jébusites et des Guirgashites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as tenu ta parole, car tu es juste.
- type: usfm
  marker: q1
  children:
