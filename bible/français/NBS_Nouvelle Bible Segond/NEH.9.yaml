        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Lv 26.40 ; Jr 7.10 ; Ps 32.5 ; Pr 28.13 ; Dn 9.4.'
    marker-yv: yv-n
  - type: text
    text: 'La descendance d''Israël s''étant séparée de tous les étrangers, ils se présentèrent pour confesser leurs péchés et les fautes de leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'debout… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.7s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'livre de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pendant un quart de la journée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pendant un autre quart
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : précisions absentes de LXX ; cf. 8.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs péchés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte, cf. v. 2.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils furent debout, à leur place, on lut dans le livre de la loi du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu, pendant un quart de la journée ; et pendant un autre quart ils confessèrent leurs péchés et se prosternèrent devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les listes de noms divergent dans LXX ; cf. 8.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la tribune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.4 ; le mot correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'montée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 12.37, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'marche(s) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Ez 40.31ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.7s ; 2Ch 20.21.'
    marker-yv: yv-n
  - type: text
    text: 'Josué, Bani, Qadmiel, Shebania, Bounni, Shérébia, Bani et Kenani montèrent à la tribune des lévites et crièrent à pleine voix vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu. '
