  - type: text
    text: 'Le vingt-quatrième jour du même mois, les Israélites se rassemblèrent pour un jeûne, couverts d''un sac et de terre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: descendance d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Esd 9.2 ; voir aussi 2R 17.20 ; Ps 22.24 ; 1Ch 16.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''étant séparée '
    - type: usfm
      marker: ft
      children:
      - type: text
