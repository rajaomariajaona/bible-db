      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 103.17 ; 106.48 ; 1Ch 29.10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''on '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils bénissent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que soit béni ton '
      - type: usfm
        marker: w
