      - type: text
        text: '  ; 1R 8.27 ; Ps 148.4 ; 2Ch 2.5 ; 6.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leur armée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 2.1 ; Dt 4.19 ; 17.3 ; Ps 33.6 ; cf. 1R 22.19 ; Ps 103.21 ; 148.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'y trouve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'est sur elle. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu donnes la vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 104.27ss.
    marker-yv: yv-n
  - type: text
    text: 'C''est toi, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', toi seul,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui as fait le ciel, le ciel du ciel et toute leur armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre et tout ce qui s'y trouve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les mers et tout ce qu'elles renferment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A tout cela, tu donnes la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'armée du ciel se prosterne devant toi.
- type: usfm
  marker: q1
  children:
