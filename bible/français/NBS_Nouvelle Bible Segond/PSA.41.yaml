document_id: PSA.41,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme persécuté
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 31.12+ ; 55.14s ; Ab 7 ; Mc 14.18/ / ; Jn 13.18  ; Ac 1.16s. –  mon ami  : litt. l''homme de ma paix  ; cf. Jr 20.10 ; 38.22. –  lève  : litt. grandit.'
  - type: text
    content: Même mon ami,
  - type: text
    content: celui qui avait ma confiance et qui mangeait mon pain,
  - type: text
    content: lève le talon contre moi.
  '11':
  - type: text
    content: 'Mais toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi grâce, relève-moi !'
  - type: text
    content: – Je les paierai de retour.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'tu as pris plaisir en moi 18.20+ ; cf. 66.18s ; Nb 14.8n. –  guerrière  : sous-entendu dans le texte ; pour l''expression, cf. 27.6+.'
  - type: text
    content: 'A ceci je sais que tu as pris plaisir en moi :'
  - type: text
    content: c'est que mon ennemi ne lance pas d'acclamation guerrière contre moi.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'dans mon intégrité  : cf. v. 5.'
  - type: text
    content: Et moi, tu m'as soutenu dans mon intégrité,
  - type: text
    content: et tu m'as placé pour toujours devant toi.
  '14':
  - type: text
    content: ' '
  - type: note
    content: La bénédiction (doxologie) sert de conclusion au premier livre, essentiellement composé de psaumes de David  ; cf. 72.18s ; 89.53 ; 106.48 ; 150.6 ; 1S 25.32 ; Mt 15.31 ; Lc 1.68 ; Rm 9.5. –  Qu'il en soit ainsi ! Qu'il en soit ainsi ! ou Amen ! Amen ! cf. Dt 27.15n  ; Jn 1.51n.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, depuis toujours et pour toujours !'
  - type: text
    content: Qu'il en soit ainsi ! Qu'il en soit ainsi !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux 1.1+ ; cf. 34.9ss. –  qui a des égards pour  : autre traduction qui agit avec discernement envers. –  le faible  : LXX ajoute et le pauvre  ; cf. Mt 5.7 ; 25.31ss.'
  - type: text
    content: Heureux celui qui a des égards pour le faible !
  - type: text
    content: 'Au jour du malheur le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le délivre ;'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tu ne le livreras pas  : litt. ne le livre pas  ; plusieurs versions anciennes ont lu il ne le livrera pas. –  au désir… 27.12n.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le garde et le fait vivre ;'
  - type: text
    content: il est déclaré heureux sur la terre ;
  - type: text
    content: tu ne le livreras pas au désir de ses ennemis.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'tu changes…  : litt. tu as changé tout son lit (autre mot que dans la première partie du v.), ce qui peut signifier tu as pris soin de lui ou bien tu l''as guéri.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le soutient sur son lit de douleur ;'
  - type: text
    content: tu changes son lit pendant sa maladie.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Guéris-moi 6.3+ ; autres traductions guéris mon être ; guéris mon âme (cf. Gn 1.20n). –  j'ai péché contre toi 51.6 ; Lc 15.21.
  - type: text
    content: 'Moi, je dis : '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi grâce !'
  - type: text
    content: 'Guéris-moi : j''ai péché contre toi.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 31.12-14 ; 38.17-20 ; cf. 35.25. – Voir nom.
  - type: text
    content: 'Mes ennemis parlent mal de moi :'
  - type: text
    content: Quand mourra-t-il ? Quand son nom disparaîtra-t-il ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Si quelqu''un vient me voir  : litt. s''il vient (ou entre ) voir  ; Jb 2.11ss. –  parler faussement 12.3+. –  mal  : cf. 5.6+ ; 36.4n  ; autre traduction son cœur trame (litt. dit ) le mal, il amasse…'
  - type: text
    content: Si quelqu'un vient me voir, c'est pour parler faussement ;
  - type: text
    content: son cœur amasse le mal ;
  - type: text
    content: il sort et il parle au dehors.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 36.5 ; 56.6s.
  - type: text
    content: Tous ceux qui me détestent chuchotent ensemble contre moi ;
  - type: text
    content: 'contre moi, ils préparent mon malheur :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'la destruction  : litt. parole (ou une chose ) de Bélial  ; même expression en 101.3 ; cf. 18.5n  ; Dt 13.14n.'
  - type: text
    content: c'est la destruction qui fond sur lui !
  - type: text
    content: Le voilà couché, il ne se relèvera pas !
