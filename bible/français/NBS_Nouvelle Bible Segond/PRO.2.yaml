document_id: PRO.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La sagesse, un trésor caché
  - type: text
    content: ' '
  - type: note
    content: 'bien  : litt. avec toi  ; cf. 7.1. –  préceptes  : hors des Proverbes le même mot est traduit le plus souvent par commandement(s)  ; cf. 3.1 ; 4.4 ; 6.20,23 ; 7.1s ; 10.8 ; 13.13 ; 19.16.'
  - type: text
    content: Mon fils, si tu reçois mes paroles,
  - type: text
    content: si tu retiens bien mes préceptes,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Quand la sagesse…  : autre traduction car la sagesse… et la connaissance… –  les délices de ton âme  : autre traduction tes délices (sur le terme correspondant à âme , cf. Gn 1.20n).'
  - type: text
    content: Quand la sagesse viendra dans ton cœur,
  - type: text
    content: lorsque la connaissance fera les délices de ton âme,
  '11':
  - type: text
    content: la réflexion te gardera,
  - type: text
    content: l'entendement te préservera
  '12':
  - type: text
    content: ' '
  - type: note
    content: voie mauvaise 8.13n.
  - type: text
    content: pour te délivrer de la voie mauvaise,
  - type: text
    content: de l'homme qui tient des discours pervers,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'sentiers de la droiture  : cf. v. 13,15,19 ; 3.17 ; 4.11s,14s,18s,26s ; 5.6,21 ; 8.20 ; 9.6 ; 10.9,29 ; 12.26,28 ; 14.12,14 ; 15.9,19 ; 16.2,17,25 ; 17.23 ; 19.1,3 ; 20.7,24 ; 21.2,8,16 ; 22.5s ; 23.19 ; 28.6,18,26 ; 29.27.'
  - type: text
    content: de ceux qui abandonnent les sentiers de la droiture
  - type: text
    content: pour suivre des chemins ténébreux,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'faire du mal  : cf. 10.23 ; 17.4 ; 24.19.'
  - type: text
    content: qui se réjouissent de faire du mal,
  - type: text
    content: qui mettent leur allégresse dans la perversité,
  '15':
  - type: text
    content: ' '
  - type: note
    content: sentiers… routes v. 13n.
  - type: text
    content: eux dont les sentiers sont tortueux
  - type: text
    content: et les routes sinueuses ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'LXX poursuit dans le fil du v. 15  : pour t''éloigner de la voie de la piété et te rendre étranger aux opinions justes . –  l''autre femme  : autres traductions la femme étrangère ; la femme infidèle ; la femme mauvaise  ; cf. 5.3,20 ; 6.24–7.27 ; cf. Siracide 9.9 : « Auprès d''une femme mariée ne t''assieds jamais, ne festoie pas avec elle en buvant du vin, de crainte que ton âme n''incline vers elle et que dans ta passion tu ne glisses à ta perte. » –  l''inconnue ou l''étrangère , terme hébreu synonyme du précédent. –  enjôleuses  : autres traductions flatteuses, complaisantes , ou au sens concret lisses, glissantes  ; cf. 26.28 ; 28.23 ; 29.5 ; Es 30.10 ; Ez 12.24 ; Dn 11.32n  ; Ps 5.10n.'
  - type: text
    content: pour te délivrer de l'autre femme,
  - type: text
    content: de l'inconnue aux paroles enjôleuses
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'l''intime  : autre traduction le familier, l''ami  ; il s''agit peut-être de Dieu. –  oublie l''alliance  : cf. Ex 20.14. – LXX mon fils, que ne s''empare pas de toi une volonté mauvaise qui te ferait abandonner l''enseignement de (ta) jeunesse et l''alliance divine  ; dans la suite, c''est à cette « volonté mauvaise » que semblent renvoyer tous les féminins.'
  - type: text
    content: qui abandonne l'intime de sa jeunesse
  - type: text
    content: et qui oublie l'alliance de son Dieu ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'les ombres  : hébreu repha''im , nom donné aux êtres affaiblis censés peupler le séjour des morts ; cf. 9.18 ; 21.16 ; Es 14.9+ ; Ps 88.11 ; Jb 26.5.'
  - type: text
    content: car sa maison penche vers la mort,
  - type: text
    content: 'ses routes mènent chez les ombres :'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les sentiers de la vie  : LXX les sentiers de la piété  ; cf. 5.6 ; 10.17+ ; 12.28+ ; 15.24+ ; Ps 16.11+. Voir aussi v. 13n. – LXX ajoute car ils ne sont pas saisis (ou retrouvés , le même verbe ayant déjà été utilisé dans le vers précédent) par les années de vie.'
  - type: text
    content: aucun de ceux qui vont à elle ne revient
  - type: text
    content: et ne retrouve les sentiers de la vie.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 11. –  prêtes une oreille  : cf. v. 11 ; 1.8n. – Voir cœur. –  l''entendement  : le terme hébreu correspondant (de même aux v. 3,6,11) est souvent traduit par intelligence (3.13,19 ; 5.1 ; 8.1 ; 10.23 ; 11.12 ; 14.29 ; 15.21 ; 17.27 ; 18.2 ; 19.8 ; 20.5 ; 21.30 ; 24.3 ; 28.16 ; Ex 31.3 ; Dt 32.28 ; 1R 5.9 ; 7.14 ; Ps 49.4 ; 78.72 ; 136.5 ; 147.5 ; Jb 12.12s ; 26.12 ; 32.11 ; Es 40.14,28 ; 44.19 ; Jr 10.12 ; 51.15 ; Ez 28.4 ; Os 13.2 ; Ab 1.7s) ; il est apparenté au synonyme bina , qui apparaît aussi au v. 3 (voir 1.2n).'
  - type: text
    content: si tu prêtes une oreille attentive à la sagesse,
  - type: text
    content: et si tu inclines ton cœur vers l'entendement ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: LXX car s'ils marchent sur de bons sentiers, ils trouveront aplanis (ou droits ) les sentiers de la justice.
  - type: text
    content: Ainsi tu suivras la voie des gens de bien,
  - type: text
    content: tu garderas les sentiers des justes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les gens droits demeureront…  : cf. 10.30 ; Dt 6.1,23 ; 25.15 ; Ps 37.9+,11,22,29 ; Mt 5.4s. –  sur la terre  : autre traduction possible dans le pays.'
  - type: text
    content: Car les gens droits demeureront sur la terre,
  - type: text
    content: les gens intègres y subsisteront ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: les méchants… 10.30. –  traîtres 11.3+. – LXX les voies des impies seront détruites de la terre, les transgresseurs en seront extirpés.
  - type: text
    content: mais les méchants seront retranchés de la terre,
  - type: text
    content: les traîtres en seront arrachés.
  '3':
  - type: text
    content: oui, si tu appelles l'intelligence,
  - type: text
    content: et si tu élèves ta voix vers l'entendement,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 13.44. –  si tu cherches cela  : cf. 3.14s ; 8.19 ; 16.16. –  l''argent 3.14+.'
  - type: text
    content: si tu cherches cela comme l'argent,
  - type: text
    content: si tu le recherches comme des trésors,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'la crainte du Seigneur 1.7n. –  la connaissance de Dieu  : autres traductions la connaissance des dieux ; la connaissance divine  ; on peut comprendre la connaissance que Dieu / les dieux possède(nt) ou bien la connaissance que tu auras de Dieu / des dieux  ; cf. 9.10 ; 25.2n  ; 30.3 ; voir aussi Gn 2–3.'
  - type: text
    content: 'alors tu comprendras la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: et tu trouveras la connaissance de Dieu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur donne la sagesse  : cf. 1R 3.9-12 ; Jc 1.5 ; Siracide 1.1 : « Toute sagesse vient du Seigneur, avec lui elle demeure à jamais. » 24.3 : « Je suis sortie de la bouche du Très-Haut et comme une vapeur j''ai recouvert la terre. » –  viennent  : sous-entendu dans le texte.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donne la sagesse ;'
  - type: text
    content: de sa bouche viennent la connaissance et l'entendement.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'des ressources  : autre traduction la raison  ; le même terme revient avec ce sens (quasi-synonyme de sagesse , peut-être avec une nuance de prudence ou de prévoyance pratique) en 3.21 ; 8.14 ; 18.1n  ; cf. Jb 5.12n. –  bouclier Gn 15.1 ; Ps 3.4n.'
  - type: text
    content: Il tient en réserve des ressources pour les gens droits,
  - type: text
    content: un bouclier pour ceux qui suivent la voie de l'intégrité ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pour préserver…  : certains modifient la vocalisation traditionnelle du texte hébreu et lisent pour celui qui se tient sur les sentiers de l''équité (1.3n) et garde la voie de ses fidèles (ou de son fidèle , selon une autre lecture traditionnelle).'
  - type: text
    content: pour préserver les sentiers de l'équité
  - type: text
    content: et garder la voie de ses fidèles.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'du bonheur  : autre traduction du bien.'
  - type: text
    content: Alors tu comprendras la justice, l'équité,
  - type: text
    content: la droiture, toutes les routes du bonheur.
  - type: heading
    content: La sagesse préserve du mal
