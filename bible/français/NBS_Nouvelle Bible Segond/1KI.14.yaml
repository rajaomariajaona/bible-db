document_id: 1KI.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin du règne de Jéroboam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce temps-là, Abiya, fils de Jéroboam, tomba malade. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je fais venir un malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.21 ; 2R 21.12 ; 22.16 ; 2Ch 34.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout mâle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui urine contre un mur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression en 16.11 ; 21.21 ; 1S 25.22 ; 2R 9.8. Les avis sont partagés sur le sens de cette expression ; selon certains commentateurs de la tradition juive, elle désignerait un chien ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la maison de Jéroboam, il ne restera même pas un chien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; mais il s''agit plus probablement des mâles de la famille (peut-être plus particulièrement les jeunes garçons, dans la mesure où les hommes s''accroupissaient plutôt pour uriner). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'esclave comme l'homme libre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le retenu et le relâché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Traduction hypothétique d'une expression, sans doute d'origine juridique, dont le sens premier s'est perdu ; même expression en 21.21 ; Dt 32.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 9.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: balaie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la formule ainsi traduite (également 21.21) utilise le verbe rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'éliminer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 22.47 ; voir Dt 13.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à ce qu'elle ait disparu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 2.15 ; Jos 8.24 ; 10.20.'
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi je fais venir un malheur sur la maison de Jéroboam ; je retrancherai de chez Jéroboam tout mâle, l''esclave comme l''homme libre en Israël, et je balaierai la maison de Jéroboam comme on balaie les ordures, jusqu''à ce qu''elle ait disparu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Celui de la famille de Jéroboam qui mourra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui mourra à Jéroboam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression en 16.4 ; 21.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par les chiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.24 ; 2R 9.35s ; Jr 15.3 ; Ps 59.15s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par les oiseaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.4 ; 21.24 ; Dt 28.26 ; 1S 17.46 ; 2S 21.10 ; Ez 39.4. Ne pas avoir de sépulture était souvent considéré comme un châtiment, toujours comme un malheur (16.4 ; 2S 21.7-14). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'c''est le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' qui parle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui a parlé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. Es 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 13.15 ; Jl 4.8 ; Ab 18.'
      marker-yv: yv-n
    - type: text
      text: 'Celui de la famille de Jéroboam qui mourra dans la ville sera dévoré par les chiens, et celui qui mourra dans la campagne sera dévoré par les oiseaux du ciel – c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui parle. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rentre chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lève-toi, va dans ta maison.
      marker-yv: yv-n
    - type: text
      text: 'Et toi, rentre chez toi. Dès que tu mettras les pieds dans la ville, l''enfant mourra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se lamentera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le seul… dans un tombeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout Israël se lamentera sur lui et l''ensevelira : c''est le seul de la famille de Jéroboam qui sera mis dans un tombeau, parce que c''est le seul de la maison de Jéroboam en qui se trouve quelque chose de bon devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se donnera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fera se lever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: suscitera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour lui un roi sur Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voici ce jour…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens incertain.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se donnera un roi d''Israël qui retranchera la maison de Jéroboam. – Voici ce jour ! Et quoi ? déjà maintenant ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme d'un roseau…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on trouve une expression analogue dans les malédictions conditionnelles qui concluent un traité d''Asarhaddon, roi d''Assyrie (680-669) : « Tout comme on coupe les mains et les pieds et on crève les yeux de ceux qui blasphèment contre le dieu ou le seigneur, qu''ils (les dieux) te fassent disparaître, qu''ils te fassent vaciller comme un roseau du marécage… » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hors de Transeuphratène
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de l''autre côté du fleuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Euphrate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; on peut comprendre ou bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hors de la région désignée comme au-delà de l'Euphrate par les grands empires mésopotamiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à l''ouest de l''Euphrate '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Syrie-Israël) ; ou bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la région située au-delà de l'Euphrate par rapport à Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; en tout cas il s''agit d''un exil vers l''est de l''Euphrate (allusion à l''exil en Assyrie en 722/1 av. J.-C., 2R 17, et peut-être de Juda vers la Babylonie en 587/6 av. J.-C., 2R 25). Voir 5.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 10.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des poteaux cultuels (des ashéras) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jg 3.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' frappera Israël, et il en sera de lui comme d''un roseau agité dans les eaux ; il déracinera Israël de cette bonne terre qu''il a donnée à leurs pères, et il les disséminera hors de Transeuphratène, parce qu''ils ont contrarié le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' en se faisant des poteaux cultuels (des ashéras). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchés
        - type: text
          text: ' que Jéroboam a commis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.25-33 ; 13.33,34.
      marker-yv: yv-n
    - type: text
      text: Il livrera Israël à cause des péchés que Jéroboam a commis et qu'il a fait commettre à Israël.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tirtsa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ancienne ville royale cananéenne (15.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',33 ; 16.6,8s,15,17,23 ; Jos 12.24 ; 2R 15.14,16 ; Ct 6.4). Après Sichem, elle fut la capitale du royaume du Nord sous '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jéroboam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Basha (15.21-23 ; 16.6), Ela (16.8ss), Zimri (16.15-18) et Omri, jusqu''à la fondation de Samarie (16.23ss). Le site a été localisé à 11 km au nord de Sichem.'
      marker-yv: yv-n
    - type: text
      text: 'La femme de Jéroboam partit. Elle arriva à Tirtsa ; et, comme elle atteignait le seuil de la maison, le garçon mourut. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On l''ensevelit, et tout Israël se lamenta sur lui, selon la parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dite par l''intermédiaire de son serviteur Ahiya, le prophète.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.31 ; 16.5,14,20,27 ; 22.39 ; 2R 1.18 ; 10.34 ; 13.8,12 ; 14.15,28 ; 15.11,15,21,26,31. Il ne faut pas confondre cet ouvrage, aujourd''hui perdu ainsi que '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le livre des chroniques des rois de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (14.29 ; 15.7,23 ; 22.46 ; 2R 8.23 ; 12.20 ; 14.18 ; 15.6,36 ; 16.19 ; 20.20 ; 21.17,25 ; 23.28 ; 24.5), avec les deux livres bibliques des Chroniques.
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire de Jéroboam, comment il fit la guerre et comment il régna, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Déguise-toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 28.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Silo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ahiya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est lui qui a dit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.29-39 (surtout les v. 31-37).'
      marker-yv: yv-n
    - type: text
      text: 'Jéroboam dit à sa femme : Déguise-toi, je te prie, pour qu''on ne sache pas que tu es la femme de Jéroboam. Tu iras à Silo. Il y a là-bas Ahiya, le prophète ; c''est lui qui a dit de moi que je deviendrais roi de ce peuple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La durée du règne de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les jours que régna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il se coucha avec ses pères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nadab… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.25-31.
      marker-yv: yv-n
    - type: text
      text: La durée du règne de Jéroboam fut de vingt-deux ans. Il se coucha avec ses pères, et Nadab, son fils, devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Suite du règne de Roboam, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 12.13-14
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'régna sur Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de 931 à 913 av. J.-C. environ ; on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devint roi sur Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la ville… choisie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.36+. –  '
      - type: usfm
        marker: fq
