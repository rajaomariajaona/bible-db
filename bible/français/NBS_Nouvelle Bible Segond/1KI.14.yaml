document_id: 1KI.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Fin du règne de Jéroboam
  - type: text
    content: 'En ce temps-là, Abiya, fils de Jéroboam, tomba malade. '
  '10':
  - type: note
    content: 'je fais venir un malheur  : cf. 21.21 ; 2R 21.12 ; 22.16 ; 2Ch 34.24. –  tout mâle  : litt. celui qui urine contre un mur  ; même expression en 16.11 ; 21.21 ; 1S 25.22 ; 2R 9.8. Les avis sont partagés sur le sens de cette expression ; selon certains commentateurs de la tradition juive, elle désignerait un chien (de la maison de Jéroboam, il ne restera même pas un chien) ; mais il s''agit plus probablement des mâles de la famille (peut-être plus particulièrement les jeunes garçons, dans la mesure où les hommes s''accroupissaient plutôt pour uriner). –  l''esclave comme l''homme libre  : litt. le retenu et le relâché. Traduction hypothétique d''une expression, sans doute d''origine juridique, dont le sens premier s''est perdu ; même expression en 21.21 ; Dt 32.36n  ; 2R 9.8. –  balaie  : la formule ainsi traduite (également 21.21) utilise le verbe rendu par éliminer en 22.47 ; voir Dt 13.6n. –  jusqu''à ce qu''elle ait disparu  : cf. Dt 2.15 ; Jos 8.24 ; 10.20.'
  - type: text
    content: 'C''est pourquoi je fais venir un malheur sur la maison de Jéroboam ; je retrancherai de chez Jéroboam tout mâle, l''esclave comme l''homme libre en Israël, et je balaierai la maison de Jéroboam comme on balaie les ordures, jusqu''à ce qu''elle ait disparu. '
  '11':
  - type: note
    content: 'Celui de la famille de Jéroboam qui mourra  : litt. celui qui mourra à Jéroboam  ; même expression en 16.4 ; 21.24. –  par les chiens  : cf. 21.24 ; 2R 9.35s ; Jr 15.3 ; Ps 59.15s. –  par les oiseaux  : cf. 16.4 ; 21.24 ; Dt 28.26 ; 1S 17.46 ; 2S 21.10 ; Ez 39.4. Ne pas avoir de sépulture était souvent considéré comme un châtiment, toujours comme un malheur (16.4 ; 2S 21.7-14). –  c''est le Seigneur qui parle (ou qui a parlé) : cf. Es 1.2n  ; Jr 13.15 ; Jl 4.8 ; Ab 18.'
  - type: text
    content: 'Celui de la famille de Jéroboam qui mourra dans la ville sera dévoré par les chiens, et celui qui mourra dans la campagne sera dévoré par les oiseaux du ciel – c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle. '
  '12':
  - type: note
    content: 'rentre chez toi  : litt. lève-toi, va dans ta maison.'
  - type: text
    content: 'Et toi, rentre chez toi. Dès que tu mettras les pieds dans la ville, l''enfant mourra. '
  '13':
  - type: note
    content: 'se lamentera  : cf. 13.30n. –  le seul… dans un tombeau  : cf. v. 11n.'
  - type: text
    content: 'Tout Israël se lamentera sur lui et l''ensevelira : c''est le seul de la famille de Jéroboam qui sera mis dans un tombeau, parce que c''est le seul de la maison de Jéroboam en qui se trouve quelque chose de bon devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '14':
  - type: note
    content: 'se donnera…  : litt. fera se lever (ou suscitera) pour lui un roi sur Israël. –  Voici ce jour…  : sens incertain.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se donnera un roi d''Israël qui retranchera la maison de Jéroboam. – Voici ce jour ! Et quoi ? déjà maintenant ! '
  '15':
  - type: note
    content: 'comme d''un roseau…  : on trouve une expression analogue dans les malédictions conditionnelles qui concluent un traité d''Asarhaddon, roi d''Assyrie (680-669) : « Tout comme on coupe les mains et les pieds et on crève les yeux de ceux qui blasphèment contre le dieu ou le seigneur, qu''ils (les dieux) te fassent disparaître, qu''ils te fassent vaciller comme un roseau du marécage… » –  hors de Transeuphratène  : litt. de l''autre côté du fleuve (c.-à-d. de l''Euphrate) ; on peut comprendre ou bien hors de la région désignée comme au-delà de l''Euphrate par les grands empires mésopotamiens, c.-à-d. à l''ouest de l''Euphrate (Syrie-Israël) ; ou bien dans la région située au-delà de l''Euphrate par rapport à Israël  ; en tout cas il s''agit d''un exil vers l''est de l''Euphrate (allusion à l''exil en Assyrie en 722/1 av. J.-C., 2R 17, et peut-être de Juda vers la Babylonie en 587/6 av. J.-C., 2R 25). Voir 5.4n  ; 2S 10.16n  ; Esd 4.10n. –  des poteaux cultuels (des ashéras) Jg 3.7n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappera Israël, et il en sera de lui comme d''un roseau agité dans les eaux ; il déracinera Israël de cette bonne terre qu''il a donnée à leurs pères, et il les disséminera hors de Transeuphratène, parce qu''ils ont contrarié le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en se faisant des poteaux cultuels (des ashéras). '
  '16':
  - type: note
    content: péchés que Jéroboam a commis 12.25-33 ; 13.33,34.
  - type: text
    content: Il livrera Israël à cause des péchés que Jéroboam a commis et qu'il a fait commettre à Israël.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Tirtsa  : ancienne ville royale cananéenne (15.21n,33 ; 16.6,8s,15,17,23 ; Jos 12.24 ; 2R 15.14,16 ; Ct 6.4). Après Sichem, elle fut la capitale du royaume du Nord sous Jéroboam , Basha (15.21-23 ; 16.6), Ela (16.8ss), Zimri (16.15-18) et Omri, jusqu''à la fondation de Samarie (16.23ss). Le site a été localisé à 11 km au nord de Sichem.'
  - type: text
    content: 'La femme de Jéroboam partit. Elle arriva à Tirtsa ; et, comme elle atteignait le seuil de la maison, le garçon mourut. '
  '18':
  - type: text
    content: 'On l''ensevelit, et tout Israël se lamenta sur lui, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite par l''intermédiaire de son serviteur Ahiya, le prophète.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 11.41n. –  le livre des chroniques des rois d'Israël 15.31 ; 16.5,14,20,27 ; 22.39 ; 2R 1.18 ; 10.34 ; 13.8,12 ; 14.15,28 ; 15.11,15,21,26,31. Il ne faut pas confondre cet ouvrage, aujourd'hui perdu ainsi que le livre des chroniques des rois de Juda (14.29 ; 15.7,23 ; 22.46 ; 2R 8.23 ; 12.20 ; 14.18 ; 15.6,36 ; 16.19 ; 20.20 ; 21.17,25 ; 23.28 ; 24.5), avec les deux livres bibliques des Chroniques.
  - type: text
    content: 'Le reste de l''histoire de Jéroboam, comment il fit la guerre et comment il régna, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '2':
  - type: note
    content: 'Déguise-toi  : cf. 1S 28.8. –  à Silo 11.29+. –  Ahiya 11.29n. –  c''est lui qui a dit…  : cf. 11.29-39 (surtout les v. 31-37).'
  - type: text
    content: 'Jéroboam dit à sa femme : Déguise-toi, je te prie, pour qu''on ne sache pas que tu es la femme de Jéroboam. Tu iras à Silo. Il y a là-bas Ahiya, le prophète ; c''est lui qui a dit de moi que je deviendrais roi de ce peuple. '
  '20':
  - type: note
    content: 'La durée du règne de  : litt. les jours que régna. –  Il se coucha avec ses pères 1.21n. –  Nadab… 15.25-31.'
  - type: text
    content: La durée du règne de Jéroboam fut de vingt-deux ans. Il se coucha avec ses pères, et Nadab, son fils, devint roi à sa place.
  - type: heading
    content: Suite du règne de Roboam, roi de Juda
  - type: heading
    content: 2Ch 12.13-14
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'régna sur Juda de 931 à 913 av. J.-C. environ ; on pourrait aussi traduire devint roi sur Juda . –  la ville… choisie  : cf. 11.36+. –  pour y placer son nom  : cf. 9.3+. –  Naama  : cf. v. 31.'
  - type: text
    content: 'Roboam, fils de Salomon, régna sur Juda : il avait quarante et un ans lorsqu''il devint roi ; il régna dix-sept ans à Jérusalem, la ville que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait choisie parmi toutes les tribus d''Israël pour y placer son nom. Le nom de sa mère était Naama, l''Ammonite.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Juda…  : LXX Roboam . –  fit ce qui déplaisait au Seigneur  : cf. 11.6n  ; Nb 22.34n  ; Dt 4.25 ; 9.18 ; 17.2 ; 31.29 ; Jg 2.11 ; 3.7,12 etc. –  sa jalousie  : cf. Ex 20.5 ; 34.14 ; Dt 4.24 ; Jos 24.19 ; Ez 39.25 ; Na 1.2 ; voir aussi 1R 16.33 ; Dt 4.25 ; 9.18 ; 2R 17.11 ; Jr 7.18 ; 11.17.'
  - type: text
    content: 'Juda fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils provoquèrent sa jalousie plus que ne l''avaient jamais fait leurs pères par les péchés qu''ils commettaient. '
  '23':
  - type: note
    content: 'pierres levées / poteaux cultuels  : cf. Dt 7.5+. –  sur toute colline élevée et sous tout arbre verdoyant  : cf. Dt 12.2+ ; 2R 16.4 ; Es 57.5 ; Jr 2.20 ; 3.6,13.'
  - type: text
    content: 'Ils se bâtirent, eux aussi, des hauts lieux avec des pierres levées et des poteaux cultuels (des ashéras) sur toute colline élevée et sous tout arbre verdoyant. '
  '24':
  - type: note
    content: 'des prostitués sacrés  : l''hébreu porte ici un nom masculin singulier à sens collectif (litt. du consacré, tournure analogue en 22.47) ; il évoque probablement la prostitution sacrée pratiquée par des hommes et des femmes dans la religion syrienne ou cananéenne au Ier millénaire av. J.-C. ; cf. 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14 ; voir Gn 38.21ns ; Dt 23.18. –  Ils imitèrent…  : cf. 2R 16.3 ; 21.2.'
  - type: text
    content: 'Il y eut même des prostitués sacrés dans le pays. Ils imitèrent toutes les abominations des nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédées devant les Israélites.'
  - type: heading
    content: 2Ch 12.1-12
  '25':
  - type: text
    content: ' '
  - type: note
    content: Shishaq 11.40n.
  - type: text
    content: 'La cinquième année du roi Roboam, Shishaq, roi d''Egypte, attaqua Jérusalem. '
  '26':
  - type: note
    content: 'boucliers d''or  : cf. 10.16s.'
  - type: text
    content: 'Il prit les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les trésors de la maison du roi, il prit tout. Il prit tous les boucliers d''or que Salomon avait faits. '
  '27':
  - type: note
    content: 'des gardes du corps  : litt. des coureurs  ; dans la plupart des textes le terme correspondant semble désigner une sorte d''escorte royale ; cf. v. 28 ; 1.5 ; 1S 8.11 ; 22.17n  ; voir aussi 2Ch 30.6n.'
  - type: text
    content: 'Le roi Roboam fit à leur place des boucliers de bronze et les confia aux chefs des gardes du corps, qui gardaient l''entrée de la maison du roi. '
  '28':
  - type: note
    content: les gardes du corps v. 27n.
  - type: text
    content: 'Toutes les fois que le roi allait à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', les gardes du corps les portaient ; puis ils les rapportaient dans la salle des gardes du corps.'
  - type: heading
    content: 2Ch 12.15-16
  '29':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 11.41n. –  le livre des chroniques des rois de Juda v. 19n.
  - type: text
    content: Le reste de l'histoire de Roboam, tout ce qu'il a fait, cela est écrit dans le livre des chroniques des rois de Juda.
  '3':
  - type: note
    content: 'Prends avec toi  : litt. tu prendras dans ta main. On n''allait pas consulter un prophète sans lui apporter un présent, en général en nature ; cf. Nb 22.7 ; 1S 9.7s ; 2R 5.5,15 ; 8.8 ; Ez 13.19 ; Am 7.12. –  dix pains  : LXX des pains et des pâtisseries ( ?) pour ses enfants. –  gâteaux  : sens incertain ; le mot hébreu (rare) traduit ici par gâteaux est rendu par miettes en Jos 9.5n,12. LXX des raisins secs ( ?).'
  - type: text
    content: 'Prends avec toi dix pains, des gâteaux et un pot de miel, entre chez lui : il t''annoncera ce qui arrivera au garçon. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Il y eut…  : cf. 15.6. –  toujours  : litt. tous les jours.'
  - type: text
    content: Il y eut toujours guerre entre Roboam et Jéroboam.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'se coucha avec ses pères 1.21n. –  Ville de David  : voir 2S 5.7. –  Naama v. 21. –  Abiyam 15.1,7s. Plusieurs mss lisent Abiya ( YHWH est mon père ) qui est l''orthographe habituelle de ce nom dans les Chroniques.'
  - type: text
    content: Roboam se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David. Le nom de sa mère était Naama, l'Ammonite. Abiyam, son fils, devint roi à sa place.
  '4':
  - type: note
    content: 'Ahiya  : la deuxième fois ce nom est orthographié Ahiyahou (cf. 11.29n) ; de même aux v. 5s,18. –  les yeux fixes  : cf. 1S 4.15.'
  - type: text
    content: 'La femme de Jéroboam fit ainsi : elle alla à Silo et entra chez Ahiya. Ahiya ne pouvait plus voir, car il avait les yeux fixes par suite de la vieillesse. '
  '5':
  - type: note
    content: 'pour te consulter  : litt. pour chercher une parole (c.-à-d. un oracle) venant de toi  ; cf. 22.5,7ns ; 1S 9.9 ; 28.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit à Ahiya : La femme de Jéroboam arrive pour te consulter au sujet de son fils, parce qu''il est malade. Tu lui parleras de telle et telle manière. Quand elle arrivera, elle se fera passer pour une autre. '
  '6':
  - type: note
    content: la porte ou l'entrée, cf. 2R 4.15.
  - type: text
    content: 'Lorsque Ahiya entendit le bruit de ses pas, au moment où elle franchissait la porte, il dit : Entre, femme de Jéroboam ! Pourquoi te fais-tu donc passer pour une autre ? C''est avec un message dur que je suis envoyé vers toi. '
  '7':
  - type: note
    content: 'Je t''ai élevé…  : tout le développement des v. 7-9 est introduit par une conjonction qu''on pourrait traduire parce que, puisque, attendu que (cf. v. 10 c''est pourquoi  ; 16.2).'
  - type: text
    content: 'Va dire à Jéroboam : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Je t''ai élevé du milieu du peuple, je t''ai fait chef sur Israël, mon peuple, '
  '8':
  - type: note
    content: 'j''ai arraché  : litt. j''ai déchiré  ; cf. 11.11,31n. –  commandements  : voir loi. –  m''a suivi  : cf. Dt 4.3 ; Jr 2.8 ; Ez 20.16 ; Os 5.11 ; Jb 31.7 etc. –  de tout son cœur 2R 10.31 ; 23.3,25 ; 2Ch 22.9 ; 31.21. –  ce qui me convenait  : litt. ce qui (était) droit à mes yeux  ; cf. Ex 15.26 ; Dt 6.18+ ; 2R 10.30 ; Jr 34.15 ; 2Ch 14.1.'
  - type: text
    content: 'j''ai arraché le royaume à la maison de David et je te l''ai donné. Mais tu n''as pas été comme David, mon serviteur, qui a observé mes commandements et qui m''a suivi de tout son cœur, pour ne faire que ce qui me convenait. '
  '9':
  - type: note
    content: 'tu m''as contrarié  : cf. 16.33 ; Dt 4.25 ; 9.18 ; 2R 17.11 ; Jr 7.18 ; 11.17 ; voir aussi Ex 20.5 ; 34.14 ; Dt 4.24 ; 5.7s ; Jos 24.19 ; Ez 39.25 ; Na 1.2. –  tu m''as rejeté derrière ton dos  : expression similaire en Es 38.17.'
  - type: text
    content: 'Tu as agi plus mal que tous ceux qui ont été avant toi, tu m''as contrarié en allant te faire d''autres dieux et des idoles de métal fondu, et tu m''as rejeté derrière ton dos ! '
