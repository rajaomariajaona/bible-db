document_id: 1SA.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David à Qéila
  - type: text
    content: ' '
  - type: note
    content: 'attaquent  : litt. font la guerre à , c.-à-d. assiègent . –  Qéila  : localité située à quelques kilomètres au sud d''Adoullam, mais qui ne faisait pas partie du territoire de Juda à cette époque, v. 3 ; cf. Jos 15.44 ; Né 3.17s. –  saccagent les aires  : litt. pillent les aires . Les aires étaient les endroits où l''on vannait les céréales après la moisson ; par extension, le mot hébreu a pu désigner les réserves de céréales.'
  - type: text
    content: 'On dit à David : Les Philistins attaquent Qéila et saccagent les aires. '
  '10':
  - type: note
    content: 'j''ai appris  : litt. ton serviteur a appris  ; cf. 1.11n (ta servante). –  détruire la ville  : cf. 22.19.'
  - type: text
    content: 'David dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, moi, ton serviteur, j''ai appris que Saül cherche à venir à Qéila pour détruire la ville à cause de moi. '
  '11':
  - type: note
    content: 'Les autorités (litt. les maîtres ou chefs, en hébreu le pluriel de ba`al) … à lui ? cette question est absente de LXX. –  livreront 17.46+. –  Le Seigneur répondit  : cf. Jr 11.18-20 ; Ps 34.5.'
  - type: text
    content: 'Les autorités de Qéila me livreront-elles à lui ? Saül descendra-t-il, comme je l''ai appris ? '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, je t''en prie, dis-le-moi ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : Il descendra. '
  '12':
  - type: text
    content: 'David dit encore : Les autorités de Qéila me livreront-elles, moi et mes hommes, à Saül ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : Elles te livreront. '
  '13':
  - type: note
    content: 'six cents hommes  : cf. 22.2+. –  s''en allèrent où ils purent  : litt. ils s''en allèrent là où ils s''en allèrent, hébraïsme qui sert à marquer l''indétermination. –  renonça à son expédition  : litt. cessa de sortir  ; sur le sens militaire de sortir = se mettre en campagne, cf. 8.20n  ; 11.7n.'
  - type: text
    content: Alors David et ses hommes, environ six cents hommes, quittèrent Qéila et s'en allèrent où ils purent. On dit à Saül que David s'était échappé de Qéila, et il renonça à son expédition.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'endroits escarpés  : le mot hébreu correspondant (cf. 22.4n  ; Jg 6.2) a donné son nom à la célèbre forteresse de Massada, qui domine la rive ouest de la mer Morte. –  Ziph  : localité située à 35 km environ au sud de Jérusalem (Jos 15.55) ; le désert de Ziph fait partie du désert de Juda  ; cf. Ps 63.1.'
  - type: text
    content: David s'installa au désert, dans les endroits escarpés ; or tandis qu'il était installé dans les monts du désert de Ziph, Saül le cherchait tous les jours, mais Dieu ne le lui livra pas.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Horsha  : nom qui signifie forêt  ; à 3 km environ au sud de Ziph.'
  - type: text
    content: 'David vit que Saül était sorti pour attenter à sa vie. David était au désert de Ziph, à Horsha. '
  '16':
  - type: note
    content: 'se rendit  : litt. se leva et alla, c.-à-d. se mit en route. –  son courage  : litt. sa main, cf. Jg 9.24n (prêter main-forte) ; Es 35.3 ; on pourrait aussi traduire pour fortifier sa confiance en Dieu. Cf. Pr 17.17 ; 27.9.'
  - type: text
    content: 'Alors Jonathan, fils de Saül, se rendit auprès de David, à Horsha, pour affermir en Dieu son courage. '
  '17':
  - type: note
    content: 'N''aie pas peur  : cf. Dt 31.6 ; Jos 8.1 ; Es 10.24 ; Jr 1.8. –  ne pourra pas t''atteindre (litt. te trouver) : cf. Jb 5.15. –  C''est toi qui deviendras roi sur  : autre traduction c''est toi qui régneras sur.'
  - type: text
    content: 'Il lui dit : N''aie pas peur. Saül, mon père, ne pourra pas t''atteindre. C''est toi qui deviendras roi sur Israël, et moi je serai ton second ; Saül, mon père, le sait bien lui-même. '
  '18':
  - type: note
    content: 'une alliance  : cf. 18.3+.'
  - type: text
    content: 'Ils conclurent tous les deux une alliance devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . David resta à Horsha, et Jonathan s'en alla chez lui.
  - type: heading
    content: Saül poursuit David
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Guibéa  : cf. 10.5n. –  David est caché  : litt. David n''est-il pas caché… ? Cette question, dite rhétorique, a de fait la valeur d''une affirmation. Cf. Ps 54.2. – Les Ziphites énumèrent divers endroits de la région, où David peut avoir trouvé refuge ; cf. v. 14 ; 26.1-3. Hakila est un lieu-dit non identifé exactement, mais situé probablement à l''est de Ziph. –  la terre aride  : le mot hébreu yeshimôn a parfois été compris comme le nom d''une localité proche de Ziph.'
  - type: text
    content: 'Des Ziphites montèrent vers Saül à Guibéa et dirent : David est caché parmi nous dans des endroits escarpés, à Horsha, dans les collines de Hakila, au sud de la terre aride. '
  '2':
  - type: note
    content: 'interrogea le Seigneur  : cf. 10.22n  ; 22.10+. –  Irai-je et battrai-je…, c.-à-d. si j''y vais, battrai-je… –  tu sauveras ou tu délivreras  ; de même au v. 5.'
  - type: text
    content: 'David interrogea le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Irai-je et battrai-je ces Philistins ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui répondit : Va, tu battras les Philistins et tu sauveras Qéila. '
  '20':
  - type: note
    content: 'si tel est ton désir…  : litt. selon tout le désir de ton être de descendre, cf. Dt 12.15n,20s ; 18.6 ; sur le mot correspondant à être, cf. Gn 1.20n. –  nous le livrerons  : cf. Mt 26.15/ /.'
  - type: text
    content: 'Maintenant, si tel est ton désir, ô roi, descends ! Quant à nous, nous le livrerons au roi. '
  '21':
  - type: note
    content: 'Soyez bénis du Seigneur  : formule de remerciement ; cf. 15.13 ; Ps 115.15 ; Rt 3.10. –  vous m''avez épargné  : autre traduction vous avez eu pitié de moi  ; cf. Ex 2.6 ; Jl 2.18 ; 2Ch 36.15.'
  - type: text
    content: 'Saül dit : Soyez bénis du '
  - type: text
    content: Seigneur
  - type: text
    content: ', car vous m''avez épargné ! '
  '22':
  - type: note
    content: 'Saül exige des informations plus précises que l''énumération un peu vague (v. 19) des cachettes possibles de David. –  voyez bien  : litt. sachez et voyez  ; cf. 1R 20.7n.'
  - type: text
    content: 'Allez, je vous prie, vérifiez encore, voyez bien le lieu où il est passé, demandez qui l''y a vu – car il est, m''a-t-on dit, fort rusé. '
  '23':
  - type: note
    content: 'Voyez bien  : litt. voyez et sachez  ; cf. v. 22. –  à l''endroit convenu  : autre traduction avec des renseignements vérifiés. –  phratries  : cf. 10.19n.'
  - type: text
    content: 'Voyez bien toutes les cachettes où il a pu se cacher ; puis revenez me voir à l''endroit convenu, et je m''en irai avec vous. S''il est dans le pays, je le chercherai parmi toutes les phratries de Juda. '
  '24':
  - type: note
    content: 'plaine  : le mot hébreu correspondant est habituellement traduit par plaine aride (cf. Jos 8.14n) et désigne la profonde dépression dans laquelle se situe la mer Morte, mais ici il n''a qu''une valeur de nom commun. –  Maôn  : localité située au sud de Ziph, cf. v. 14 ; Jos 15.55 ; le désert de Maôn fait partie, lui aussi, du désert de Juda.'
  - type: text
    content: Ils se rendirent à Ziph avant Saül. David et ses hommes étaient dans la plaine du désert de Maôn, au sud de la terre aride.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'de David  : sous-entendu dans le texte. –  La Roche  : lieu-dit non identifié du désert de Maôn , offrant probablement de nombreuses cachettes.'
  - type: text
    content: 'Saül partit avec ses hommes à la recherche de David. On le dit à David, qui descendit à La Roche et resta dans le désert de Maôn. Saül, l''ayant appris, poursuivit David au désert de Maôn. '
  '26':
  - type: note
    content: 'Saül  : à la première occurrence LXX ajoute et ses hommes. –  d''une vallée  : probablement sous-entendu dans le texte ; on a parfois compris que Saül et David, avec leurs troupes respectives, progressaient de part et d''autre d''une même montagne sans se voir, mais cela est peu vraisemblable ; cf. 17.3n. –  se hâtait…  : cf. 2S 15.14. –  cernaient  : cf. Ps 17.8-11 ; 22.13-17 ; 140.2-9.'
  - type: text
    content: 'Saül marchait à flanc de montagne, tandis que David et ses hommes marchaient sur le flanc opposé, de part et d''autre d''une vallée. David se hâtait pour échapper à Saül. Mais déjà Saül et ses hommes cernaient David et ses hommes pour se saisir d''eux, '
  '27':
  - type: note
    content: ont fait irruption dans ou ont attaqué  ; cf. 2R 19.9 ; Ps 31.20.
  - type: text
    content: 'lorsqu''un messager vint dire à Saül : Viens vite, car les Philistins ont fait irruption dans le pays. '
  '28':
  - type: note
    content: Séla-Mahleqoth ou Roc des Séparations (ou des Hésitations), puisque c'est là que Saül et David furent séparés.
  - type: text
    content: Saül revint sur ses pas, il cessa de poursuivre David, pour aller à la rencontre des Philistins. C'est pourquoi on a appelé ce lieu Séla-Mahleqoth (« Roc des Séparations »).
  '3':
  - type: note
    content: 'nous avons peur  : les menaces que Saül fait peser sur David et ses hommes créent un climat d''insécurité et de tension. –  les lignes  : cf. 17.20n.'
  - type: text
    content: 'Mais les hommes de David lui dirent : Ici même, en Juda, nous avons peur ; qu''est-ce que ce sera si nous allons à Qéila, contre les lignes des Philistins ? '
  '4':
  - type: note
    content: 'je te livre les Philistins  : cf. 14.12+.'
  - type: text
    content: 'David interrogea encore le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui répondit : Descends à Qéila, car je te livre les Philistins. '
  '5':
  - type: note
    content: 'emmena leurs troupeaux  : cf. 30.20 ; Jb 24.3. –  une grande défaite  : cf. 4.10n  ; Jg 15.8.'
  - type: text
    content: 'David alla donc avec ses hommes à Qéila. Il attaqua les Philistins ; il emmena leurs troupeaux et leur infligea une grande défaite. Ainsi David sauva les habitants de Qéila. '
  '6':
  - type: note
    content: 's''était enfui  : cf. 22.20-23. –  l''éphod  : cf. 21.10n.'
  - type: text
    content: Lorsque Abiathar, fils d'Ahimélek, s'était enfui pour rejoindre David à Qéila, il était descendu, l'éphod en main.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'me l''abandonne ou me l''a abandonné  : litt. l''a traité en étranger (c.-à-d. ne lui accorde plus sa protection ) ou le trompe dans ma main . Les versions anciennes n''ont pas traduit littéralement cette tournure inhabituelle ; plusieurs l''ont rendue par le verbe ordinairement traduit par livrer (cf. v. 4) ; LXX l''a vendu dans mes mains (cf. 12.9). –  des portes et des verrous  : cf. Dt 3.5.'
  - type: text
    content: 'On dit à Saül que David était arrivé à Qéila. Alors Saül dit : Dieu me l''abandonne, car il est venu s''enfermer dans une ville qui a des portes et des verrous. '
  '8':
  - type: note
    content: 'battit le rappel  : cf. 15.4n.'
  - type: text
    content: 'Alors Saül battit le rappel de tout le peuple pour la guerre, afin de descendre à Qéila et d''assiéger David et ses hommes. '
  '9':
  - type: note
    content: 'tramait ou méditait  ; cf. Pr 3.29 ; 6.18 ; 12.20 ; 14.22. –  Apporte l''éphod  : pour une nouvelle consultation de Dieu ; cf. 30.7.'
  - type: text
    content: 'David eut connaissance du mal que Saül tramait contre lui ; il dit à Abiathar, le prêtre : Apporte l''éphod ! '
