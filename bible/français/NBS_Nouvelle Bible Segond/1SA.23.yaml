        - type: text
          text: détruire la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.19.'
      marker-yv: yv-n
    - type: text
      text: 'David dit : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Dieu d''Israël, moi, ton serviteur, j''ai appris que Saül cherche à venir à Qéila pour détruire la ville à cause de moi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les autorités '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les maîtres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chefs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en hébreu le pluriel de '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ba`al
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '… à lui ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cette question est absente de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'livreront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.46+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' répondit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 11.18-20 ; Ps 34.5.'
      marker-yv: yv-n
    - type: text
      text: 'Les autorités de Qéila me livreront-elles à lui ? Saül descendra-t-il, comme je l''ai appris ? '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Dieu d''Israël, je t''en prie, dis-le-moi ! Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' répondit : Il descendra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'David dit encore : Les autorités de Qéila me livreront-elles, moi et mes hommes, à Saül ? Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' répondit : Elles te livreront. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: six cents hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'en allèrent où ils purent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s'en allèrent là où ils s'en allèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', hébraïsme qui sert à marquer l''indétermination. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: renonça à son expédition
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cessa de sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le sens militaire de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sortir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se mettre en campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 8.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Alors David et ses hommes, environ six cents hommes, quittèrent Qéila et s'en allèrent où ils purent. On dit à Saül que David s'était échappé de Qéila, et il renonça à son expédition.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: endroits escarpés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu correspondant (cf. 22.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 6.2) a donné son nom à la célèbre forteresse de Massada, qui domine la rive ouest de la mer Morte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ziph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité située à 35 km environ au sud de Jérusalem (Jos 15.55) ; le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'désert de Ziph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait partie du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: désert de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ps 63.1.
      marker-yv: yv-n
    - type: text
      text: David s'installa au désert, dans les endroits escarpés ; or tandis qu'il était installé dans les monts du désert de Ziph, Saül le cherchait tous les jours, mais Dieu ne le lui livra pas.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Horsha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: forêt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; à 3 km environ au sud de Ziph.
      marker-yv: yv-n
    - type: text
      text: 'David vit que Saül était sorti pour attenter à sa vie. David était au désert de Ziph, à Horsha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
