    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se rendit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se leva et alla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se mit en route
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son courage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jg 9.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prêter main-forte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; Es 35.3 ; on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour fortifier sa confiance en Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. Pr 17.17 ; 27.9.
      marker-yv: yv-n
    - type: text
      text: 'Alors Jonathan, fils de Saül, se rendit auprès de David, à Horsha, pour affermir en Dieu son courage. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'aie pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 31.6 ; Jos 8.1 ; Es 10.24 ; Jr 1.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne pourra pas t''atteindre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: te trouver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. Jb 5.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est toi qui deviendras roi sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est toi qui régneras sur.
      marker-yv: yv-n
    - type: text
      text: 'Il lui dit : N''aie pas peur. Saül, mon père, ne pourra pas t''atteindre. C''est toi qui deviendras roi sur Israël, et moi je serai ton second ; Saül, mon père, le sait bien lui-même. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.3+.'
      marker-yv: yv-n
    - type: text
      text: 'Ils conclurent tous les deux une alliance devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . David resta à Horsha, et Jonathan s'en alla chez lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül poursuit David
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guibéa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: David est caché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'David n''est-il pas caché… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette question, dite rhétorique, a de fait la valeur d''une affirmation. Cf. Ps 54.2. – Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ziphites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'énumèrent divers endroits de la région, où David peut avoir trouvé refuge ; cf. v. 14 ; 26.1-3. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hakila '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est un lieu-dit non identifé exactement, mais situé probablement à l''est de Ziph. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la terre aride
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'yeshimôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a parfois été compris comme le nom d'une localité proche de Ziph.
      marker-yv: yv-n
    - type: text
      text: 'Des Ziphites montèrent vers Saül à Guibéa et dirent : David est caché parmi nous dans des endroits escarpés, à Horsha, dans les collines de Hakila, au sud de la terre aride. '
