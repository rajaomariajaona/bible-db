          text: '  ; de même au v. 5.'
      marker-yv: yv-n
    - type: text
      text: 'David interrogea le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Irai-je et battrai-je ces Philistins ? Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui répondit : Va, tu battras les Philistins et tu sauveras Qéila. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si tel est ton désir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon tout le désir de ton être de descendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Dt 12.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',20s ; 18.6 ; sur le mot correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous le livrerons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 26.15/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, si tel est ton désir, ô roi, descends ! Quant à nous, nous le livrerons au roi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Soyez '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénis
        - type: text
          text: ' du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule de remerciement ; cf. 15.13 ; Ps 115.15 ; Rt 3.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous m'avez épargné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous avez eu pitié de moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 2.6 ; Jl 2.18 ; 2Ch 36.15.'
      marker-yv: yv-n
    - type: text
      text: 'Saül dit : Soyez bénis du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', car vous m''avez épargné ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Saül exige des informations plus précises que l''énumération un peu vague (v. 19) des cachettes possibles de David. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voyez bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sachez et voyez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 20.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Allez, je vous prie, vérifiez encore, voyez bien le lieu où il est passé, demandez qui l''y a vu – car il est, m''a-t-on dit, fort rusé. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voyez bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voyez et sachez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'endroit convenu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec des renseignements vérifiés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: phratries
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voyez bien toutes les cachettes où il a pu se cacher ; puis revenez me voir à l''endroit convenu, et je m''en irai avec vous. S''il est dans le pays, je le chercherai parmi toutes les phratries de Juda. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plaine aride '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Jos 8.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et désigne la profonde dépression dans laquelle se situe la mer Morte, mais ici il n''a qu''une valeur de nom commun. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité située au sud de Ziph, cf. v. 14 ; Jos 15.55 ; le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'désert de Maôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'fait partie, lui aussi, du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: désert de Juda.
      marker-yv: yv-n
    - type: text
      text: Ils se rendirent à Ziph avant Saül. David et ses hommes étaient dans la plaine du désert de Maôn, au sud de la terre aride.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La Roche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : lieu-dit non identifié du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: désert de Maôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', offrant probablement de nombreuses cachettes.'
      marker-yv: yv-n
    - type: text
      text: 'Saül partit avec ses hommes à la recherche de David. On le dit à David, qui descendit à La Roche et resta dans le désert de Maôn. Saül, l''ayant appris, poursuivit David au désert de Maôn. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à la première occurrence '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ses hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'une vallée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement sous-entendu dans le texte ; on a parfois compris que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saül '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', avec leurs troupes respectives, progressaient de part et d''autre d''une même montagne sans se voir, mais cela est peu vraisemblable ; cf. 17.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se hâtait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 15.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cernaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 17.8-11 ; 22.13-17 ; 140.2-9.'
      marker-yv: yv-n
    - type: text
      text: 'Saül marchait à flanc de montagne, tandis que David et ses hommes marchaient sur le flanc opposé, de part et d''autre d''une vallée. David se hâtait pour échapper à Saül. Mais déjà Saül et ses hommes cernaient David et ses hommes pour se saisir d''eux, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ont fait irruption dans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ont attaqué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 19.9 ; Ps 31.20.'
      marker-yv: yv-n
    - type: text
      text: 'lorsqu''un messager vint dire à Saül : Viens vite, car les Philistins ont fait irruption dans le pays. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Séla-Mahleqoth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Roc des Séparations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Hésitations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), puisque c'est là que Saül et David furent séparés.
      marker-yv: yv-n
    - type: text
      text: Saül revint sur ses pas, il cessa de poursuivre David, pour aller à la rencontre des Philistins. C'est pourquoi on a appelé ce lieu Séla-Mahleqoth (« Roc des Séparations »).
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous avons peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les menaces que Saül fait peser sur David et ses hommes créent un climat d''insécurité et de tension. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les lignes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais les hommes de David lui dirent : Ici même, en Juda, nous avons peur ; qu''est-ce que ce sera si nous allons à Qéila, contre les lignes des Philistins ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je te livre les Philistins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.12+.'
      marker-yv: yv-n
    - type: text
      text: 'David interrogea encore le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui répondit : Descends à Qéila, car je te livre les Philistins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: emmena leurs troupeaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 30.20 ; Jb 24.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une grande défaite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 15.8.'
      marker-yv: yv-n
    - type: text
      text: 'David alla donc avec ses hommes à Qéila. Il attaqua les Philistins ; il emmena leurs troupeaux et leur infligea une grande défaite. Ainsi David sauva les habitants de Qéila. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'était enfui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.20-23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'éphod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Lorsque Abiathar, fils d'Ahimélek, s'était enfui pour rejoindre David à Qéila, il était descendu, l'éphod en main.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me l''abandonne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me l'a abandonné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''a traité en étranger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne lui accorde plus sa protection
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le trompe dans ma main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Les versions anciennes n''ont pas traduit littéralement cette tournure inhabituelle ; plusieurs l''ont rendue par le verbe ordinairement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'livrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 4) ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''a vendu dans mes mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 12.9). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des portes et des verrous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 3.5.'
      marker-yv: yv-n
    - type: text
      text: 'On dit à Saül que David était arrivé à Qéila. Alors Saül dit : Dieu me l''abandonne, car il est venu s''enfermer dans une ville qui a des portes et des verrous. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: battit le rappel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Saül battit le rappel de tout le peuple pour la guerre, afin de descendre à Qéila et d''assiéger David et ses hommes. '
