        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité située à quelques kilomètres au sud d''Adoullam, mais qui ne faisait pas partie du territoire de Juda à cette époque, v. 3 ; cf. Jos 15.44 ; Né 3.17s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
