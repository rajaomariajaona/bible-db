      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étaient les endroits où l'on vannait les céréales après la moisson ; par extension, le mot hébreu a pu désigner les réserves de céréales.
      marker-yv: yv-n
    - type: text
      text: 'On dit à David : Les Philistins attaquent Qéila et saccagent les aires. '
  '10':
  - type: usfm
    marker: p
    children:
