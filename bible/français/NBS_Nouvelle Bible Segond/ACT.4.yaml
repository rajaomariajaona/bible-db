    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tandis qu''ils disaient au peuple ces paroles, les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sadducéens
      - type: text
        text: ' survinrent'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le commandant… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.24,26 ; le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'magistrats '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 16.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Lc 22.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sadducéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.17 ; Mc 12.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tandis qu''ils parlaient au peuple, les prêtres, le commandant du temple et les sadducéens survinrent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'instruire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.42+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en la personne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans le cas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Jésus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.31s ; 26.23 ; 1Co 15.20-23 ; Col 1.18 ; Ap 1.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: résurrection
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 23.6-8 ; Lc 20.37-39/ /.'
    marker-yv: yv-n
  - type: text
    text: 'excédés de les voir instruire le peuple et annoncer, en la personne de Jésus, la résurrection d''entre les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils mirent la main sur eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils les firent arrêter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.18 ; 12.1 ; 21.27 ; Lc 20.19 ; 21.12.
    marker-yv: yv-n
  - type: text
    text: 'Ils mirent la main sur eux et les placèrent sous bonne garde jusqu''au lendemain – car c''était déjà le soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.41+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : habituellement le terme employé ici exclut normalement les femmes et les enfants ; cf. 1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mc 6.44'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: environ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant est absent de certains mss.'
    marker-yv: yv-n
  - type: text
    text: Cependant, beaucoup de ceux qui avaient entendu la parole devinrent croyants, et le nombre des hommes s'éleva à environ cinq mille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 26 ; 5.21 ; Lc 22.66 ; 23.13 ; 24.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leurs chefs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: anciens
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribes
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mc 8.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Jérusalem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 27.
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, leurs chefs, ainsi que les anciens et les scribes, se rassemblèrent à Jérusalem '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Anne, Caïphe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 26.3/ / ; Lc 3.2 ; Jn 18.13,24,28.
    marker-yv: yv-n
  - type: text
    text: 'avec le grand prêtre Anne, Caïphe, Jean, Alexandre, et tous ceux qui étaient de la lignée des grands prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par quelle puissance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.12 ; cf. Lc 20.2/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.16+.
    marker-yv: yv-n
  - type: text
    text: 'Ils les firent comparaître au milieu d''eux et leur demandèrent : Par quelle puissance ou par quel nom avez-vous fait cela ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rempli '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Esprit
      - type: text
        text: ' '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.4+ ; cf. 13.9 ; Mt 10.19+ ; Lc 12.11s ; 21.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: anciens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'Israël.
    marker-yv: yv-n
  - type: text
    text: 'Alors Pierre, rempli d''Esprit saint, leur dit : Chefs du peuple et anciens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: interrogés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe 12.19 ; 17.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 24.8 ; 28.18 ; terme apparenté en 25.26 ; cf. Lc 23.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un bienfait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sauvé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: guéri
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais le même terme va être employé dans un sens plus large au v. 12 ; Mc 5.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 8.36.'
    marker-yv: yv-n
  - type: text
    text: 'puisque nous sommes interrogés aujourd''hui sur un bienfait accordé à un homme infirme et sur la manière dont il a été sauvé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sachez-le bien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par le nom… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.6,16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Nazoréen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que vous avez crucifié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.23+,36. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que Dieu a réveillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'relevé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 2.23s,36.'
    marker-yv: yv-n
  - type: text
    text: 'sachez-le bien, vous tous, ainsi que tout le peuple d''Israël : c''est par le nom de Jésus-Christ le Nazoréen, que vous avez crucifié et que Dieu a réveillé d''entre les morts, c''est par lui que cet homme se présente en bonne santé devant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la principale…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la tête de l'angle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Ps 118.22 ; cf. Es 28.16 ; Lc 20.17/ / ; Rm 9.33 ; 10.11 ; 1P 2.4,7.'
    marker-yv: yv-n
  - type: text
    text: 'C''est lui, la pierre que vous, les constructeurs, vous avez méprisée, et qui est devenue la principale, celle de l''angle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le salut ne se trouve en aucun autre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette phrase est absente de certains mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par lequel nous devions être sauvés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 2.21 ; 5.31 ; 7.25 ; 11.14 ; 13.23,26,47 ; 15.1,7,11 ; 16.17,30s ; Mt 1.21.'
    marker-yv: yv-n
  - type: text
    text: Le salut ne se trouve en aucun autre, car il n'y a sous le ciel aucun autre nom donné parmi les humains par lequel nous devions être sauvés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte occidental reconstitué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ayant tous entendu l''assurance de Pierre et de Jean, ils s''étonnèrent, persuadés que c''étaient des gens du peuple sans instruction. (14) Mais en voyant l''infirme debout auprès d''eux, guéri, ils ne pouvaient rien faire ni dire contre eux. Cependant, quelques-uns d''entre eux reconnaissaient qu''ils avaient été avec Jésus… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''assurance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pierre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des gens du peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir 1Co 14.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2Co 11.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Lc 10.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans instruction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jn 7.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils reconnaissaient… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 22.56/ /.
    marker-yv: yv-n
  - type: text
    text: 'En voyant l''assurance de Pierre et de Jean, ils étaient étonnés, car ils se rendaient compte que c''étaient des gens du peuple sans instruction. Ils reconnaissaient en eux ceux qui étaient avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rien à répliquer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 21.15 ; cf. Jn 9.24-34.
    marker-yv: yv-n
  - type: text
    text: 'Mais comme ils voyaient debout auprès d''eux l''homme guéri, ils n''avaient rien à répliquer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.34. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sanhédrin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 8.31
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils leur ordonnèrent de sortir du sanhédrin et délibérèrent entre eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
