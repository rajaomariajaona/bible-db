document_id: ACT.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Pierre et Jean devant le sanhédrin
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : Tandis qu''ils disaient au peuple ces paroles, les prêtres et les sadducéens survinrent . –  le commandant… 5.24,26 ; le même terme est traduit par magistrats en 16.20n  ; voir Lc 22.4n. – Voir temple . –  sadducéens 5.17 ; Mc 12.18n.'
  - type: text
    content: 'Tandis qu''ils parlaient au peuple, les prêtres, le commandant du temple et les sadducéens survinrent, '
  '10':
  - type: note
    content: sachez-le bien 2.14+. –  par le nom… 3.6,16+. –  le Nazoréen 2.22+. –  que vous avez crucifié 2.23+,36. –  que Dieu a réveillé ou relevé 3.15n  ; cf. 2.23s,36.
  - type: text
    content: 'sachez-le bien, vous tous, ainsi que tout le peuple d''Israël : c''est par le nom de Jésus-Christ le Nazoréen, que vous avez crucifié et que Dieu a réveillé d''entre les morts, c''est par lui que cet homme se présente en bonne santé devant vous. '
  '11':
  - type: note
    content: 'la principale…  : litt. la tête de l''angle, Ps 118.22 ; cf. Es 28.16 ; Lc 20.17/ / ; Rm 9.33 ; 10.11 ; 1P 2.4,7.'
  - type: text
    content: 'C''est lui, la pierre que vous, les constructeurs, vous avez méprisée, et qui est devenue la principale, celle de l''angle. '
  '12':
  - type: note
    content: 'Le salut ne se trouve en aucun autre  : cette phrase est absente de certains mss. –  par lequel nous devions être sauvés  : cf. v. 9n  ; voir aussi 2.21 ; 5.31 ; 7.25 ; 11.14 ; 13.23,26,47 ; 15.1,7,11 ; 16.17,30s ; Mt 1.21.'
  - type: text
    content: Le salut ne se trouve en aucun autre, car il n'y a sous le ciel aucun autre nom donné parmi les humains par lequel nous devions être sauvés.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental reconstitué  : Ayant tous entendu l''assurance de Pierre et de Jean, ils s''étonnèrent, persuadés que c''étaient des gens du peuple sans instruction. (14) Mais en voyant l''infirme debout auprès d''eux, guéri, ils ne pouvaient rien faire ni dire contre eux. Cependant, quelques-uns d''entre eux reconnaissaient qu''ils avaient été avec Jésus… –  l''assurance 2.29n. –  Pierre / Jean 3.1+. –  des gens du peuple  : voir 1Co 14.16n  ; 2Co 11.6n  ; cf. Lc 10.21. –  sans instruction  : cf. Jn 7.15. –  Ils reconnaissaient… Lc 22.56/ /.'
  - type: text
    content: 'En voyant l''assurance de Pierre et de Jean, ils étaient étonnés, car ils se rendaient compte que c''étaient des gens du peuple sans instruction. Ils reconnaissaient en eux ceux qui étaient avec Jésus. '
  '14':
  - type: note
    content: rien à répliquer Lc 21.15 ; cf. Jn 9.24-34.
  - type: text
    content: 'Mais comme ils voyaient debout auprès d''eux l''homme guéri, ils n''avaient rien à répliquer. '
  '15':
  - type: note
    content: 5.34. –  sanhédrin Mc 8.31n.
  - type: text
    content: 'Ils leur ordonnèrent de sortir du sanhédrin et délibérèrent entre eux, '
  '16':
  - type: note
    content: 'Comment…  : autre traduction qu''allons-nous faire contre ces gens, cf. Lc 6.11 ; Jn 11.47s. –  habitants de Jérusalem 1.19+. –  un signe ou un miracle v. 22n  ; 2.19+.'
  - type: text
    content: 'en disant : Comment allons-nous traiter ces gens ? Il est manifeste, pour tous les habitants de Jérusalem, qu''un signe évident a été accompli par leur entremise ; nous ne pouvons pas le nier. '
  '17':
  - type: note
    content: 'en ce nom-là  : autre traduction de ce nom-là  ; cf. 3.6,16+ ; voir 5.28,40.'
  - type: text
    content: Mais, pour que cela ne se répande pas davantage dans le peuple, défendons-leur, avec des menaces, de parler désormais à qui que ce soit en ce nom-là.
  '18':
  - type: text
    content: ' '
  - type: note
    content: enseigner (2.42+) au nom ou au sujet du nom , cf. 4.17n.
  - type: text
    content: 'Alors ils les appelèrent et leur enjoignirent formellement de ne plus parler ni enseigner au nom de Jésus. '
  '19':
  - type: note
    content: Pierre et Jean 3.1+. – Voir juste. –  vous obéir ou vous écouter, cf. 5.29.
  - type: text
    content: 'Pierre et Jean leur répondirent : Est-il juste au regard de Dieu de vous obéir plutôt qu''à Dieu ? A vous d''en juger, '
  '2':
  - type: note
    content: 'instruire 2.42+. –  en la personne (ou dans le cas) de Jésus  : cf. 17.31s ; 26.23 ; 1Co 15.20-23 ; Col 1.18 ; Ap 1.5. –  la résurrection  : cf. 23.6-8 ; Lc 20.37-39/ /.'
  - type: text
    content: 'excédés de les voir instruire le peuple et annoncer, en la personne de Jésus, la résurrection d''entre les morts. '
  '20':
  - type: note
    content: 'nous ne pouvons pas…  : cf. 2Co 13.8. –  vu et entendu 22.15 ; cf. 1.22 ; Lc 7.22 ; 10.24 ; 1Jn 1.1,3.'
  - type: text
    content: 'car nous, nous ne pouvons pas ne pas parler de ce que nous avons vu et entendu. '
  '21':
  - type: note
    content: 'Cf. 5.40 ; Lc 19.48. –  glorifiaient Dieu  : cf. 2.47+.'
  - type: text
    content: 'Ils leur firent de nouvelles menaces et les relâchèrent, sans trouver moyen de les punir, à cause du peuple ; tous, en effet, glorifiaient Dieu pour ce qui était arrivé, '
  '22':
  - type: note
    content: 'ce signe…  : litt. ce signe de guérison  ; autre traduction cette guérison miraculeuse  ; cf. 2.19+ ; 4.16,30.'
  - type: text
    content: car l'homme qui avait bénéficié de ce signe, de cette guérison, avait plus de quarante ans.
  - type: heading
    content: Prière de la communauté persécutée
  '23':
  - type: text
    content: ' '
  - type: note
    content: les grands prêtres (9.21 ; 22.30) et les anciens 23.14 ; 25.15 ; Mt 2.4n.
  - type: text
    content: 'Après avoir été relâchés, ils vinrent raconter aux leurs tout ce que les grands prêtres et les anciens leur avaient dit. '
  '24':
  - type: note
    content: 'Cf. 1.24s. –  Lorsqu''ils eurent entendu cela  : le texte occidental ajoute (et) reconnu l''opération de Dieu. –  tous  : litt. eux. –  d''un commun accord 1.14+. –  Maître Lc 2.29 ; Jd 4. –  toi qui as fait le ciel…  : cf. 14.15 ; 17.24 ; Ex 20.11 ; 2R 19.15 ; Es 37.16 ; Ps 124.8 ; 146.6 ; Né 9.6  ; Ap 10.6 ; 14.7.'
  - type: text
    content: 'Lorsqu''ils eurent entendu cela, tous, d''un commun accord, élevèrent la voix vers Dieu et dirent : Maître, '
  - type: text
    content: toi qui as fait le ciel, la terre et la mer, ainsi que tout ce qui s'y trouve,
  - type: text
    content: ' '
  '25':
  - type: note
    content: Ps 2.1s  ; autre citation du même psaume en Ac 13.33. –  dit par l'Esprit saint Mc 13.36 ; 2P 1.21. –  nations v. 27n. –  creuses ou vides, vaines.
  - type: text
    content: 'c''est toi qui as dit par l''Esprit saint, de la bouche de notre père, ton serviteur David :'
  - type: text
    content: Pourquoi les nations se sont-elles agitées
  - type: text
    content: et les peuples ont-ils eu des pensées creuses ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'ligués  : litt. rassemblés (v. 5,31 ; c''est ce seul verbe qui est traduit par ligués au v. 27) ensemble ou en un même lieu (sur cette expression, voir 1.15n). –  son Christ ou son messie, son oint, l''homme qui a reçu son onction  ; cf. 3.18 ; c''est un verbe apparenté qui est traduit par faire Christ au v. 27.'
  - type: text
    content: Les rois de la terre se sont présentés
  - type: text
    content: et les chefs se sont ligués
  - type: text
    content: contre le Seigneur et contre son Christ
  - type: text
    content: .
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'saint serviteur (ou fils ) : voir 3.13n-14+,26. –  que tu as fait Christ ou que tu as oint, à qui tu as conféré l''onction , cf. v. 26n  ; 10.38 ; 1S 16.13 ; Es 61.1 ; Lc 4.18 ; 1Jn 2.20n. –  Hérode et Ponce Pilate… Lc 23.6-12. –  ligués ou rassemblés , v. 26n. –  dans cette ville v. 5. –  nations  : le mot peut être aussi compris dans le sens de non-Juifs ou de païens  ; cf. Lc 18.32. –  et les peuples d''Israël  : certains mss portent le peuple  ; cf. Lc 23.13,23.'
  - type: text
    content: 'Car, en vérité, contre ton saint serviteur Jésus, que tu as fait Christ, Hérode et Ponce Pilate se sont ligués, dans cette ville, avec les nations et les peuples d''Israël, '
  '28':
  - type: note
    content: 'Voir 2.23n  ; 3.18 ; 13.27,29 ; cf. Lc 7.30 ; 24.26. –  arrêté d''avance  : le même verbe est traduit par destiner d''avance en Rm 8.29s ; 1Co 2.7 ; Ep 1.5,11.'
  - type: text
    content: 'pour faire tout ce que ta main et tes décisions avaient arrêté d''avance. '
  '29':
  - type: note
    content: donne à tes esclaves (ou à tes serviteurs), c.-à-d. donne-nous (sémitisme) ; cf. Lc 1.38n  ; 2.29n. –  dire ta parole v. 31 ; 8.25 ; 11.19 ; 13.46 ; 14.25 ; 16.6,32 ; Mc 1.45+ ; Ph 1.14 ; Hé 13.7. –  avec une entière assurance 2.29n  ; 28.31 ; cf. Ep 6.19.
  - type: text
    content: 'Et maintenant, Seigneur, sois attentif à leurs menaces, et donne à tes esclaves de dire ta parole avec une entière assurance. '
  '3':
  - type: note
    content: Ils mirent la main sur eux, c.-à-d. ils les firent arrêter 5.18 ; 12.1 ; 21.27 ; Lc 20.19 ; 21.12.
  - type: text
    content: 'Ils mirent la main sur eux et les placèrent sous bonne garde jusqu''au lendemain – car c''était déjà le soir. '
  '30':
  - type: note
    content: signes / prodiges 2.19+. –  par le nom 3.16+. –  ton saint serviteur v. 27+.
  - type: text
    content: 'Etends ta main pour qu''il se produise des guérisons, des signes et des prodiges par le nom de ton saint serviteur Jésus. '
  '31':
  - type: note
    content: Cf. 2.1-4+ ; 10.44-46. –  trembla 16.26. –  ils disaient… v. 29+. Le texte occidental précise ils disaient… à quiconque voulait croire.
  - type: text
    content: 'Quand ils eurent prié, le lieu où ils étaient rassemblés trembla ; ils furent tous remplis de l''Esprit saint : ils disaient la parole de Dieu avec assurance.'
  - type: heading
    content: Les croyants partagent leurs biens
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.42-45n  ; voir aussi Lc 12.33 ; 18.22,28 ; Jn 12.6. – Voir cœur.
  - type: text
    content: 'La multitude de ceux qui étaient devenus croyants était un seul cœur et une seule âme. Personne ne disait que ses biens lui appartenaient en propre, mais tout était commun entre eux. '
  '33':
  - type: note
    content: puissance 3.12+ ; cf. 6.8. –  rendaient témoignage… 1.21+,22+. – Voir résurrection. –  grâce 6.8 ; 11.23 ; 14.26 ; 15.40 ; cf. 2.47n  ; Lc 2.40.
  - type: text
    content: 'Avec une grande puissance, les apôtres rendaient témoignage de la résurrection du Seigneur Jésus, et une grande grâce était sur eux tous. '
  '34':
  - type: note
    content: '2.45+. –  personne n''était dans le dénuement  : cf. Dt 15.4.'
  - type: text
    content: 'Parmi eux, en effet, personne n''était dans le dénuement ; car tous ceux qui possédaient des champs ou des maisons les vendaient, apportaient le prix de ce qu''ils avaient vendu '
  '35':
  - type: note
    content: aux pieds des apôtres v. 37 ; 5.2.
  - type: text
    content: et le déposaient aux pieds des apôtres ; et l'on distribuait à chacun selon ses besoins.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Barnabé ou Barnabas , 9.27 ; 11.22,30 ; 12.25 ; 13–15 ; 1Co 9.6 ; Ga 2.1-13 ; Col 4.10. –  Fils d''encouragement ou d''exhortation, de consolation , cf. 2.40n  ; 11.22s+ ; 13.1n  ; le sens de la formule sémitique ainsi calquée en grec serait  : celui qui encourage (ou exhorte, console ). – Voir lévite . –  Chypre  : cf. 15.39.'
  - type: text
    content: 'Ainsi Joseph, surnommé par les apôtres Barnabé (ce qui se traduit « Fils d''encouragement »), un lévite originaire de Chypre, '
  '37':
  - type: note
    content: une terre ou un champ, cf. Lv 25.34.
  - type: text
    content: vendit une terre qu'il possédait, apporta l'argent et le déposa aux pieds des apôtres.
  '4':
  - type: note
    content: '2.41+. –  des hommes  : habituellement le terme employé ici exclut normalement les femmes et les enfants ; cf. 1.16n  ; Mc 6.44n. –  environ  : le terme correspondant est absent de certains mss.'
  - type: text
    content: Cependant, beaucoup de ceux qui avaient entendu la parole devinrent croyants, et le nombre des hommes s'éleva à environ cinq mille.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'V. 26 ; 5.21 ; Lc 22.66 ; 23.13 ; 24.20. –  leurs chefs / anciens / scribes  : cf. Mc 8.31n. –  à Jérusalem v. 27.'
  - type: text
    content: 'Le lendemain, leurs chefs, ainsi que les anciens et les scribes, se rassemblèrent à Jérusalem '
  '6':
  - type: note
    content: Anne, Caïphe Mt 26.3/ / ; Lc 3.2 ; Jn 18.13,24,28.
  - type: text
    content: 'avec le grand prêtre Anne, Caïphe, Jean, Alexandre, et tous ceux qui étaient de la lignée des grands prêtres. '
  '7':
  - type: note
    content: Par quelle puissance 3.12 ; cf. Lc 20.2/ /. –  nom 3.16+.
  - type: text
    content: 'Ils les firent comparaître au milieu d''eux et leur demandèrent : Par quelle puissance ou par quel nom avez-vous fait cela ?'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'rempli d''Esprit saint 2.4+ ; cf. 13.9 ; Mt 10.19+ ; Lc 12.11s ; 21.14s. –  anciens  : certains mss ajoutent d''Israël.'
  - type: text
    content: 'Alors Pierre, rempli d''Esprit saint, leur dit : Chefs du peuple et anciens, '
  '9':
  - type: note
    content: 'interrogés  : même verbe 12.19 ; 17.11n  ; 24.8 ; 28.18 ; terme apparenté en 25.26 ; cf. Lc 23.14n. –  un bienfait  : cf. 10.38. –  sauvé, c.-à-d. guéri  ; mais le même terme va être employé dans un sens plus large au v. 12 ; Mc 5.28n  ; Lc 8.36.'
  - type: text
    content: 'puisque nous sommes interrogés aujourd''hui sur un bienfait accordé à un homme infirme et sur la manière dont il a été sauvé, '
