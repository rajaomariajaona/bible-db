document_id: GEN.44,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Benjamin est accusé de vol
  - type: text
    content: ' '
  - type: note
    content: '42.25. –  Joseph donna…  : litt. il donna…'
  - type: text
    content: 'Joseph donna cet ordre à l''intendant de sa maison : Remplis de vivres les besaces de ces hommes, autant qu''ils pourront en porter, et mets l''argent de chacun à l''ouverture de sa besace. '
  '10':
  - type: note
    content: Cf. Ex 22.8.
  - type: text
    content: 'Il répondit : Qu''il en soit dès maintenant selon vos paroles ! Si l''on trouve quoi que ce soit sur quelqu''un, il sera mon esclave ; mais vous, vous serez quittes. '
  '11':
  - type: text
    content: 'Chacun se hâta alors de descendre sa besace à terre et de l''ouvrir. '
  '12':
  - type: text
    content: 'Il les fouilla, en commençant par le plus grand et en finissant par le plus petit ; et on trouva la coupe dans la besace de Benjamin. '
  '13':
  - type: note
    content: 37.25n.
  - type: text
    content: Alors ils déchirèrent leurs vêtements ; chacun rechargea son âne, et ils retournèrent à la ville.
  - type: heading
    content: Juda intervient en faveur de Benjamin
  '14':
  - type: text
    content: 'Juda et ses frères arrivèrent à la maison de Joseph, où il était encore, et ils tombèrent devant lui face contre terre. '
  '15':
  - type: note
    content: pratique la divination v. 5n.
  - type: text
    content: 'Joseph leur dit : Qu''avez-vous fait ? Ne saviez-vous pas qu''un homme comme moi pratique la divination ? '
  '16':
  - type: note
    content: 'nous justifier  : autre traduction prouver notre innocence. –  esclaves v. 9n. Cf. Pr 16.1s,9 ; 21.30.'
  - type: text
    content: 'Juda répondit : Que te dire, mon seigneur ? Comment parler ? Comment nous justifier ? Dieu nous a trouvés en faute. Nous sommes tes esclaves, aussi bien nous que celui aux mains de qui on a trouvé la coupe ! '
  '17':
  - type: note
    content: V. 7+. – Voir paix.
  - type: text
    content: 'Alors Joseph dit : Jamais je n''agirais de la sorte ! L''homme aux mains de qui on a trouvé la coupe sera mon esclave ; vous, montez en paix vers votre père.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Pardon 43.20n. –  Permets-moi…  : litt. que ton serviteur dise… une parole aux oreilles de mon seigneur.'
  - type: text
    content: 'Alors Juda s''approcha de lui et dit : Pardon, mon seigneur ! Permets-moi, je te prie, de te dire un mot ; ne te mets pas en colère contre moi, ton serviteur, car tu es comme le pharaon ! '
  '19':
  - type: note
    content: 42.9-16,29-38 ; 43.1-10.
  - type: text
    content: 'Tu nous as demandé, à nous, tes serviteurs : « Avez-vous un père ou un frère ? » '
  '2':
  - type: text
    content: Tu mettras aussi ma coupe, la coupe d'argent, à l'ouverture de la besace du plus petit, avec l'argent de son grain. L'intendant fit ce que Joseph lui avait dit.
  '20':
  - type: text
    content: 'Nous t''avons répondu : « Nous avons un vieux père et un petit frère, l''enfant de sa vieillesse ; son frère est mort ; il est le seul qui soit resté de sa mère, et son père l''aime. » '
  '21':
  - type: note
    content: 'Amenez-le-moi  : litt. faites-le descendre vers moi, cf. 12.10n. –  pour que je veille sur lui  : c''est le sens habituel de l''expression (cf. Jr 24.6 ; 39.12 ; 40.4 ; Am 9.4) ; certains comprennent ici pour que je le voie de mes yeux.'
  - type: text
    content: 'Tu nous as dit : « Amenez-le-moi, pour que je veille sur lui. » '
  '22':
  - type: text
    content: 'Nous t''avons répondu : « Le garçon ne peut pas quitter son père ; s''il le quitte, son père mourra ! » '
  '23':
  - type: note
    content: '43.3,5. –  vous ne paraîtrez plus en ma présence  : autre traduction vous ne verrez pas ma face  ; cf. 32.21 ; 33.10.'
  - type: text
    content: 'Tu nous as dit : « Si votre petit frère ne descend pas avec vous, vous ne paraîtrez plus en ma présence. » '
  '24':
  - type: text
    content: 'Lorsque nous sommes montés auprès de ton serviteur, mon père, nous lui avons rapporté tes paroles. '
  '25':
  - type: text
    content: 'Notre père a dit : « Retournez nous acheter un peu de vivres. » '
  '26':
  - type: text
    content: 'Nous avons répondu : « Nous ne pouvons pas descendre ; si notre petit frère est avec nous, nous descendrons, mais nous ne pouvons pas paraître en la présence de cet homme si notre petit frère n''est pas avec nous. » '
  '27':
  - type: note
    content: 'Mon père, cf. v. 24, de même aux v. 30s. –  ma femme (préférée) : Rachel, cf. 42.38n.'
  - type: text
    content: 'Mon père nous a dit : « Vous savez que ma femme m''avait donné deux fils. '
  '28':
  - type: note
    content: 37.33 ; 42.13.
  - type: text
    content: 'Le premier est parti de chez moi ; j''ai dit : “A coup sûr, il a été déchiqueté !” et je ne l''ai pas revu jusqu''ici. '
  '29':
  - type: note
    content: 42.38. – Voir séjour des morts.
  - type: text
    content: 'Si vous me prenez encore celui-ci, et qu''il lui arrive un accident, c''est dans le malheur que vous ferez descendre mes cheveux blancs au séjour des morts ! » '
  '3':
  - type: text
    content: 'Le matin, dès qu''il fit jour, on les laissa partir, avec leurs ânes. '
  '30':
  - type: note
    content: 'il est tellement attaché…  : autre traduction sa vie est tellement attachée à celle du garçon  ; sur le terme correspondant à il ou à sa vie, voir 1.20n.'
  - type: text
    content: 'Maintenant, si je retourne auprès de mon père, et que le garçon ne soit pas avec nous, il est tellement attaché à lui '
  '31':
  - type: text
    content: 'qu''il mourra dès qu''il verra que le garçon n''est pas là. C''est dans le chagrin que nous aurons fait descendre au séjour des morts les cheveux blancs de notre père ! '
  '32':
  - type: note
    content: 43.9n  ; cf. 42.37+ ; voir péché.
  - type: text
    content: 'Car moi, ton serviteur, je me suis porté garant pour le garçon, en disant à mon père : « Si je ne le ramène pas auprès de toi, je serai toujours coupable d''un péché envers mon père ! » '
  '33':
  - type: note
    content: 'à la place  : cf. Ex 32.32 ; Est 8.6 ; Rm 5.7s ; 9.3. –  esclave v. 9n.'
  - type: text
    content: 'Maintenant, je t''en prie, laisse-moi rester à la place du garçon, comme ton esclave, et laisse le garçon remonter avec ses frères ! '
  '34':
  - type: note
    content: 'atteindrait  : litt. trouverait.'
  - type: text
    content: Comment pourrais-je remonter vers mon père, si le garçon n'est pas avec moi ? Que je ne voie pas le malheur qui atteindrait alors mon père !
  '4':
  - type: note
    content: le mal pour le bien 1S 25.21 ; Jr 18.20 ; Ps 35.12 ; Pr 17.13 ; cf. 1S 24.18 ; Pr 20.22 ; Mt 25.40,44 ; Rm 12.17 ; 1Th 5.15 ; 1P 3.9.
  - type: text
    content: 'Ils étaient sortis de la ville et ne s''en étaient guère éloignés lorsque Joseph dit à son intendant : Poursuis ces hommes et rattrape-les. Tu leur diras : « Pourquoi avez-vous rendu le mal pour le bien ? '
  '5':
  - type: note
    content: 'cette coupe  : litt. ceci. –  pratique la divination  : cf. Dt 18.10. On cherchait à deviner l''avenir en provoquant et en interprétant de nombreux phénomènes ; p. ex., en versant dans un liquide un autre liquide (p. ex. de l''huile dans de l''eau) ou un corps solide en fusion, afin d''étudier la forme qu''il y prenait.'
  - type: text
    content: 'N''est-ce pas dans cette coupe que mon maître boit ? N''est-ce pas avec elle qu''il pratique la divination ? Vous avez mal agi ! » '
  '6':
  - type: text
    content: 'Il les rattrapa et leur dit tout cela. '
  '7':
  - type: note
    content: Jamais… v. 17 ; 18.25+ ; 1S 2.30n.
  - type: text
    content: 'Ils lui répondirent : Pourquoi parles-tu de la sorte, mon seigneur ? Jamais nous ne commettrions une telle action, nous, tes serviteurs ! '
  '8':
  - type: text
    content: 'Nous t''avons rapporté de Canaan l''argent que nous avions trouvé à l''ouverture de nos besaces ; comment aurions-nous pu voler de l''argent ou de l''or chez ton maître ? '
  '9':
  - type: note
    content: 'mis à mort  : cf. 31.32. –  esclaves  : autre traduction serviteurs  ; ici le mot doit être entendu au sens fort et non plus comme formule de politesse (tes serviteurs = nous). De même aux v. 16,33.'
  - type: text
    content: 'Si l''on trouve quoi que ce soit sur l''un d''entre nous, qu''il soit mis à mort, et nous, nous serons tes esclaves ! '
