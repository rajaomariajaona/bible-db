document_id: GEN.44,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Benjamin est accusé de vol
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joseph donna…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il donna…
      marker-yv: yv-n
    - type: text
      text: 'Joseph donna cet ordre à l''intendant de sa maison : Remplis de vivres les besaces de ces hommes, autant qu''ils pourront en porter, et mets l''argent de chacun à l''ouverture de sa besace. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 22.8.
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Qu''il en soit dès maintenant selon vos paroles ! Si l''on trouve quoi que ce soit sur quelqu''un, il sera mon esclave ; mais vous, vous serez quittes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacun se hâta alors de descendre sa besace à terre et de l''ouvrir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les fouilla, en commençant par le plus grand et en finissant par le plus petit ; et on trouva la coupe dans la besace de Benjamin. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '37.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Alors ils déchirèrent leurs vêtements ; chacun rechargea son âne, et ils retournèrent à la ville.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Juda intervient en faveur de Benjamin
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda et ses frères arrivèrent à la maison de Joseph, où il était encore, et ils tombèrent devant lui face contre terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pratique la divination '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joseph leur dit : Qu''avez-vous fait ? Ne saviez-vous pas qu''un homme comme moi pratique la divination ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justifier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prouver notre innocence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esclaves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . Cf. Pr 16.1s,9 ; 21.30.
      marker-yv: yv-n
    - type: text
      text: 'Juda répondit : Que te dire, mon seigneur ? Comment parler ? Comment nous justifier ? Dieu nous a trouvés en faute. Nous sommes tes esclaves, aussi bien nous que celui aux mains de qui on a trouvé la coupe ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 7+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Joseph dit : Jamais je n''agirais de la sorte ! L''homme aux mains de qui on a trouvé la coupe sera mon esclave ; vous, montez en paix vers votre père.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pardon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Permets-moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que ton serviteur dise… une parole aux oreilles de mon seigneur.
      marker-yv: yv-n
    - type: text
      text: 'Alors Juda s''approcha de lui et dit : Pardon, mon seigneur ! Permets-moi, je te prie, de te dire un mot ; ne te mets pas en colère contre moi, ton serviteur, car tu es comme le pharaon ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 42.9-16,29-38 ; 43.1-10.
      marker-yv: yv-n
    - type: text
      text: 'Tu nous as demandé, à nous, tes serviteurs : « Avez-vous un père ou un frère ? » '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu mettras aussi ma coupe, la coupe d'argent, à l'ouverture de la besace du plus petit, avec l'argent de son grain. L'intendant fit ce que Joseph lui avait dit.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous t''avons répondu : « Nous avons un vieux père et un petit frère, l''enfant de sa vieillesse ; son frère est mort ; il est le seul qui soit resté de sa mère, et son père l''aime. » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amenez-le-moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faites-le descendre vers moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour que je veille sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''est le sens habituel de l''expression (cf. Jr 24.6 ; 39.12 ; 40.4 ; Am 9.4) ; certains comprennent ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que je le voie de mes yeux.
      marker-yv: yv-n
    - type: text
      text: 'Tu nous as dit : « Amenez-le-moi, pour que je veille sur lui. » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous t''avons répondu : « Le garçon ne peut pas quitter son père ; s''il le quitte, son père mourra ! » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.3,5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous ne paraîtrez plus en ma présence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous ne verrez pas ma face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 32.21 ; 33.10.'
      marker-yv: yv-n
    - type: text
      text: 'Tu nous as dit : « Si votre petit frère ne descend pas avec vous, vous ne paraîtrez plus en ma présence. » '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque nous sommes montés auprès de ton serviteur, mon père, nous lui avons rapporté tes paroles. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notre père a dit : « Retournez nous acheter un peu de vivres. » '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons répondu : « Nous ne pouvons pas descendre ; si notre petit frère est avec nous, nous descendrons, mais nous ne pouvons pas paraître en la présence de cet homme si notre petit frère n''est pas avec nous. » '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mon père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 24, de même aux v. 30s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ma femme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(préférée) : Rachel, cf. 42.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mon père nous a dit : « Vous savez que ma femme m''avait donné deux fils. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 37.33 ; 42.13.
      marker-yv: yv-n
    - type: text
      text: 'Le premier est parti de chez moi ; j''ai dit : “A coup sûr, il a été déchiqueté !” et je ne l''ai pas revu jusqu''ici. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.38. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts.'
      marker-yv: yv-n
    - type: text
      text: 'Si vous me prenez encore celui-ci, et qu''il lui arrive un accident, c''est dans le malheur que vous ferez descendre mes cheveux blancs au séjour des morts ! » '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le matin, dès qu''il fit jour, on les laissa partir, avec leurs ânes. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il est tellement attaché…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa vie est tellement attachée à celle du garçon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, si je retourne auprès de mon père, et que le garçon ne soit pas avec nous, il est tellement attaché à lui '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu''il mourra dès qu''il verra que le garçon n''est pas là. C''est dans le chagrin que nous aurons fait descendre au séjour des morts les cheveux blancs de notre père ! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 42.37+ ; voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car moi, ton serviteur, je me suis porté garant pour le garçon, en disant à mon père : « Si je ne le ramène pas auprès de toi, je serai toujours coupable d''un péché envers mon père ! » '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 32.32 ; Est 8.6 ; Rm 5.7s ; 9.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esclave '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, je t''en prie, laisse-moi rester à la place du garçon, comme ton esclave, et laisse le garçon remonter avec ses frères ! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: atteindrait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trouverait.
      marker-yv: yv-n
    - type: text
      text: Comment pourrais-je remonter vers mon père, si le garçon n'est pas avec moi ? Que je ne voie pas le malheur qui atteindrait alors mon père !
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le mal pour le bien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 25.21 ; Jr 18.20 ; Ps 35.12 ; Pr 17.13 ; cf. 1S 24.18 ; Pr 20.22 ; Mt 25.40,44 ; Rm 12.17 ; 1Th 5.15 ; 1P 3.9.
      marker-yv: yv-n
    - type: text
      text: 'Ils étaient sortis de la ville et ne s''en étaient guère éloignés lorsque Joseph dit à son intendant : Poursuis ces hommes et rattrape-les. Tu leur diras : « Pourquoi avez-vous rendu le mal pour le bien ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette coupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pratique la divination
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 18.10. On cherchait à deviner l''avenir en provoquant et en interprétant de nombreux phénomènes ; p. ex., en versant dans un liquide un autre liquide (p. ex. de l''huile dans de l''eau) ou un corps solide en fusion, afin d''étudier la forme qu''il y prenait.'
      marker-yv: yv-n
    - type: text
      text: 'N''est-ce pas dans cette coupe que mon maître boit ? N''est-ce pas avec elle qu''il pratique la divination ? Vous avez mal agi ! » '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les rattrapa et leur dit tout cela. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jamais… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17 ; 18.25+ ; 1S 2.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils lui répondirent : Pourquoi parles-tu de la sorte, mon seigneur ? Jamais nous ne commettrions une telle action, nous, tes serviteurs ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous t''avons rapporté de Canaan l''argent que nous avions trouvé à l''ouverture de nos besaces ; comment aurions-nous pu voler de l''argent ou de l''or chez ton maître ? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mis à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 31.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: esclaves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ici le mot doit être entendu au sens fort et non plus comme formule de politesse ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tes serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '= '
