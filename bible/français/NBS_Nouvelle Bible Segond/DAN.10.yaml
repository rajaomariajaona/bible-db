document_id: DAN.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Vision de Daniel : les événements derniers'
  - type: text
    content: ' '
  - type: note
    content: 'Cyrus 1.21 ; cf. 6.1n,29. –  Daniel / Belteshatsar 1.7n. –  combat  : le terme hébreu est habituellement traduit par armée. –  saisit / comprit  : cf. 4.6 ; 9.22.'
  - type: text
    content: 'La troisième année de Cyrus, roi de Perse, une parole se révéla à Daniel, celui qu''on nommait Belteshatsar. Cette parole est vraie : il y aura un grand combat. Il saisit cette parole et comprit la vision.'
  '10':
  - type: text
    content: 'Alors une main me toucha et me mit, tout tremblant, sur mes genoux et sur mes mains. '
  '11':
  - type: note
    content: bien-aimé v. 19 ; cf. 9.23n. –  tiens-toi debout Ez 2.1s. –  frissonnant Esd 10.9n.
  - type: text
    content: 'Puis il me dit : Daniel, bien-aimé, comprends les paroles que je vais te dire, et tiens-toi debout à l''endroit où tu es ; car maintenant je suis envoyé vers toi. Lorsqu''il m''eut dit cette parole, je me tins debout en frissonnant.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'n''aie pas peur  : cf. Lc 1.12 ; voir crainte. –  dès le premier jour  : cf. v. 2s ; 9.23. –  décidé de  : litt. donné ton cœur à.'
  - type: text
    content: 'Il me dit : Daniel, n''aie pas peur ; dès le premier jour où tu as décidé de comprendre et de t''humilier devant ton Dieu, tes paroles ont été entendues, et c''est à cause de tes paroles que je suis venu. '
  '13':
  - type: note
    content: 'Le prince  : dans ce contexte, il s''agit d''une puissance spirituelle correspondant à chaque empire (cf. v. 20s). –  vingt et un jours v. 2s. –  Michel  : hébreu Mika''el (Qui est comme Dieu ?) ; cf. v. 21 ; 8.16n  ; 12.1 ; Jd 9 ; Ap 12.7 ; voir aussi Nb 13.13n. –  je suis resté  : les versions grecques portent je l''ai laissé.'
  - type: text
    content: 'Le prince du royaume de Perse m''a résisté vingt et un jours ; mais Michel, l''un des premiers princes, est venu à mon secours, et je suis resté là, auprès des rois de Perse. '
  '14':
  - type: note
    content: 'pour te faire comprendre 8.16-17+. –  dans la suite (ou à la fin  ; cf. 8.19,23) des temps  : cf. 2.28 (équivalent araméen) ; Gn 49.1+ ; Es 2.2n  ; Ez 38.8,16n.'
  - type: text
    content: Je suis venu maintenant pour te faire comprendre ce qui doit arriver à ton peuple dans la suite des temps ; car il y a encore une vision pour ces jours-là.
  '15':
  - type: text
    content: 'Tandis qu''il me disait cela, je baissais la tête et je gardais le silence. '
  '16':
  - type: note
    content: 'qui ressemblait aux humains  : litt. qui ressemblait aux fils des hommes  ; cf. v. 18 ; 7.13 ; 8.15. –  toucha mes lèvres Es 6.7 ; Jr 1.9. –  J''ouvris la bouche…  : cf. Lc 1.64. –  des douleurs m''ont saisi  : la même expression décrit les douleurs de l''accouchement en 1S 4.19 ; le terme traduit par douleurs apparaît en Es 13.8 ; 21.3 (également en rapport avec une vision). –  plus aucune force v. 8+.'
  - type: text
    content: 'Alors quelqu''un qui ressemblait aux humains toucha mes lèvres. J''ouvris la bouche et je dis à celui qui se tenait debout devant moi : Mon seigneur, à cause de la vision, des douleurs m''ont saisi, et je n''ai plus aucune force. '
  '17':
  - type: text
    content: 'Comment moi, ton serviteur, pourrais-je te parler, à toi, mon seigneur ? Maintenant, aucune force ne subsiste en moi, et le souffle me manque. '
  '18':
  - type: note
    content: l'aspect (terme apparenté à celui qui est traduit par vision au v. 16, cf. 8.16n) d'un homme v. 16. –  me fit reprendre des forces Dt 3.28 ; Ez 30.24 ; 34.4 ; Os 7.15.
  - type: text
    content: 'Alors celui qui avait l''aspect d''un homme me toucha de nouveau et me fit reprendre des forces. '
  '19':
  - type: note
    content: 'bien-aimé v. 11+. –  sois tranquille  : litt. paix pour toi. –  Sois fort Dt 31.7,23 ; Jos 1.6s ; cf. 2Ch 16.9.'
  - type: text
    content: 'Puis il me dit : N''aie pas peur, bien-aimé, sois tranquille ! Sois fort, sois fort ! Et comme il me parlait, je repris des forces et je dis : Parle, mon seigneur, car tu m''as rendu fort.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: deuil 9.3 ; Né 1.4.
  - type: text
    content: 'En ces jours-là, moi, Daniel, je fus trois semaines dans le deuil. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: prince v. 13n. –  Grèce 8.21+.
  - type: text
    content: 'Il me dit : Sais-tu pourquoi je suis venu vers toi ? Maintenant, je retourne combattre le prince de Perse ; quand je partirai, c''est le prince de Grèce qui viendra. '
  '21':
  - type: note
    content: 'l''écrit de vérité v. 1 ; cf. 7.10n  ; 12.1 ; Ps 139.16 ; sur le terme correspondant à écrit, voir Ez 13.9n  ; Est 1.22n  ; 2Ch 35.4n. –  ne me prête main-forte  : litt. ne se fortifie avec moi  ; la même forme verbale est traduite par reprendre des forces au v. 19 ; cf. 1Ch 11.10n.'
  - type: text
    content: Mais je t'annonce ce qui est inscrit dans l'écrit de vérité. Personne ne me prête main-forte contre ceux-là, excepté Michel, votre prince.
  '3':
  - type: note
    content: 'Cf. 1.8 ; Mt 6.17. –  délicat  : litt. désirable, cf. 9.23n.'
  - type: text
    content: Je ne mangeai aucun mets délicat, il n'entra ni viande ni vin dans ma bouche, et je ne me parfumai pas, jusqu'à ce que les trois semaines soient accomplies.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'premier mois  : cf. Ex 12.2ss. –  le Tigre Gn 2.14n.'
  - type: text
    content: 'Le vingt-quatrième jour du premier mois, moi, j''étais au bord du grand fleuve, c''est-à-dire le Tigre. '
  '5':
  - type: note
    content: homme vêtu de lin 12.6 ; Ez 9.2. –  Ouphaz Jr 10.9n, localité inconnue ; quelques mss portent Ophir (1R 10.11 ; Ps 45.10) ; certains modifient le texte hébreu traditionnel pour lire une ceinture d'or fin  ; cf. 1R 10.18n  ; Ct 5.11.
  - type: text
    content: 'Levant les yeux, je vis un homme vêtu de lin avec une ceinture d''or d''Ouphaz autour des reins. '
  '6':
  - type: note
    content: 'Cf. Ez 1.16n,26-28 ; Ap 1.13-15. –  yeux / feu flamboyant Ap 1.14+. –  éclat Ez 1.4n. –  sa voix  : litt. la voix de ses paroles  ; de même au v. 9. –  un tumulte  : autre traduction le bruit (même mot hébreu que voix) d''une multitude (cf. 11.10n) ; cf. Es 13.4 ; 33.3.'
  - type: text
    content: 'Son corps était comme de chrysolithe, son visage comme l''aspect de l''éclair, ses yeux comme un feu flamboyant, ses bras et ses jambes comme l''éclat du bronze poli, et sa voix comme un tumulte. '
  '7':
  - type: note
    content: Cf. Ac 9.7 ; 22.9.
  - type: text
    content: 'Moi, Daniel, je vis seul la vision ; les hommes qui étaient avec moi ne virent pas la vision, mais ils furent saisis d''une grande frayeur et s''enfuirent pour se cacher. '
  '8':
  - type: note
    content: 'mon visage pâlit  : litt. mon éclat fut retourné, cf. 5.6. –  plus aucune force  : cf. v. 16 ; 11.6 ; 1S 28.20 ; 1Ch 29.14n.'
  - type: text
    content: 'Je restai, moi seul, et je vis cette grande vision ; les forces me manquèrent, mon visage pâlit et fut décomposé, et je n''eus plus aucune force. '
  '9':
  - type: note
    content: torpeur ou profond sommeil, 8.18n  ; Gn 2.21n  ; cf. Mt 17.6.
  - type: text
    content: 'J''entendis sa voix ; et comme j''entendais sa voix, je fus frappé de torpeur, face contre terre. '
