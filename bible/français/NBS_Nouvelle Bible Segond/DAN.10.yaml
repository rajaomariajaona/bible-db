document_id: DAN.10,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Vision de Daniel : les événements derniers'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cyrus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.21 ; cf. 6.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Daniel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Belteshatsar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: combat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'armée. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'saisit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.6 ; 9.22.'
      marker-yv: yv-n
    - type: text
      text: 'La troisième année de Cyrus, roi de Perse, une parole se révéla à Daniel, celui qu''on nommait Belteshatsar. Cette parole est vraie : il y aura un grand combat. Il saisit cette parole et comprit la vision.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors une main me toucha et me mit, tout tremblant, sur mes genoux et sur mes mains. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bien-aimé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 19 ; cf. 9.23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tiens-toi debout '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 2.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frissonnant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Esd 10.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Puis il me dit : Daniel, bien-aimé, comprends les paroles que je vais te dire, et tiens-toi debout à l''endroit où tu es ; car maintenant je suis envoyé vers toi. Lorsqu''il m''eut dit cette parole, je me tins debout en frissonnant.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'aie pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lc 1.12 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dès le premier jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 2s ; 9.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: décidé de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donné ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' à.'
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Daniel, n''aie pas peur ; dès le premier jour où tu as décidé de comprendre et de t''humilier devant ton Dieu, tes paroles ont été entendues, et c''est à cause de tes paroles que je suis venu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le prince
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans ce contexte, il s''agit d''une puissance spirituelle correspondant à chaque empire (cf. v. 20s). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vingt et un jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Michel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mika''el '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qui est comme Dieu ?
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. v. 21 ; 8.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.1 ; Jd 9 ; Ap 12.7 ; voir aussi Nb 13.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je suis resté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les versions grecques portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je l'ai laissé.
      marker-yv: yv-n
    - type: text
      text: 'Le prince du royaume de Perse m''a résisté vingt et un jours ; mais Michel, l''un des premiers princes, est venu à mon secours, et je suis resté là, auprès des rois de Perse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour te faire comprendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.16-17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la suite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 8.19,23) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des temps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.28 (équivalent araméen) ; Gn 49.1+ ; Es 2.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 38.8,16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je suis venu maintenant pour te faire comprendre ce qui doit arriver à ton peuple dans la suite des temps ; car il y a encore une vision pour ces jours-là.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tandis qu''il me disait cela, je baissais la tête et je gardais le silence. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui ressemblait aux humains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui ressemblait aux fils des hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 18 ; 7.13 ; 8.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toucha mes lèvres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 6.7 ; Jr 1.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'ouvris la bouche…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 1.64. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des douleurs m'ont saisi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même expression décrit les douleurs de l''accouchement en 1S 4.19 ; le terme traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'douleurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'apparaît en Es 13.8 ; 21.3 (également en rapport avec une vision). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plus aucune force '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8+.
      marker-yv: yv-n
    - type: text
      text: 'Alors quelqu''un qui ressemblait aux humains toucha mes lèvres. J''ouvris la bouche et je dis à celui qui se tenait debout devant moi : Mon seigneur, à cause de la vision, des douleurs m''ont saisi, et je n''ai plus aucune force. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Comment moi, ton serviteur, pourrais-je te parler, à toi, mon seigneur ? Maintenant, aucune force ne subsiste en moi, et le souffle me manque. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''aspect '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(terme apparenté à celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 16, cf. 8.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''un homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me fit reprendre des forces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 3.28 ; Ez 30.24 ; 34.4 ; Os 7.15.
      marker-yv: yv-n
    - type: text
      text: 'Alors celui qui avait l''aspect d''un homme me toucha de nouveau et me fit reprendre des forces. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bien-aimé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sois tranquille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' pour toi'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sois fort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 31.7,23 ; Jos 1.6s ; cf. 2Ch 16.9.
      marker-yv: yv-n
    - type: text
      text: 'Puis il me dit : N''aie pas peur, bien-aimé, sois tranquille ! Sois fort, sois fort ! Et comme il me parlait, je repris des forces et je dis : Parle, mon seigneur, car tu m''as rendu fort.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deuil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.3 ; Né 1.4.
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, moi, Daniel, je fus trois semaines dans le deuil. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prince '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Grèce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.21+.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Sais-tu pourquoi je suis venu vers toi ? Maintenant, je retourne combattre le prince de Perse ; quand je partirai, c''est le prince de Grèce qui viendra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''écrit de vérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1 ; cf. 7.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.1 ; Ps 139.16 ; sur le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Ez 13.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 1.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Ch 35.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne me prête main-forte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne se fortifie avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la même forme verbale est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reprendre des forces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 19 ; cf. 1Ch 11.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Mais je t'annonce ce qui est inscrit dans l'écrit de vérité. Personne ne me prête main-forte contre ceux-là, excepté Michel, votre prince.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.8 ; Mt 6.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: délicat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: désirable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 9.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je ne mangeai aucun mets délicat, il n'entra ni viande ni vin dans ma bouche, et je ne me parfumai pas, jusqu'à ce que les trois semaines soient accomplies.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: premier mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 12.2ss. –  '
      - type: usfm
        marker: fq
