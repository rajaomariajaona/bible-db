document_id: EZK.10,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Nouvelle vision de la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.22+,26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ap 4.2.'
      marker-yv: yv-n
    - type: text
      text: 'Je regardai : sur la voûte céleste qui était au-dessus de la tête des keroubim il y avait comme du lapis-lazuli ; on voyait au-dessus d''eux quelque chose dont l''aspect ressemblait à un trône. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par leur aspect, toutes les quatre se ressemblaient ; chaque roue paraissait être au milieu d''une autre roue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: elles allaient dans la direction de la tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au lieu vers lequel la tête faisait face, elles allaient derrière elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.17.'
      marker-yv: yv-n
    - type: text
      text: 'Quand elles se déplaçaient, elles allaient sur chacun de leurs quatre côtés ; elles ne viraient pas en se déplaçant ; elles allaient dans la direction de la tête, sans virer en se déplaçant. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout le corps des keroubim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toute leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout le corps des keroubim, leur dos, leurs mains et leurs ailes, étaient remplis d''yeux tout autour, de même que les roues, leurs roues à eux quatre. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'entendis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on appela à mes oreilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tourbillon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''entendis qu''on appelait les roues « Tourbillon ». '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. ne figure pas dans LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu est toujours au pluriel, même lorsqu''il désigne une seule '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on pourrait donc aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quatre faces : la face du premier… la face du second, etc. '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' a compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la première '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(des faces de chacun) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: … la deuxième
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', etc. ; cf. 41.19 ; Ap 4.6-8. A noter que la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'face de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'keroub '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: correspond à celle du taureau en 1.10.
      marker-yv: yv-n
    - type: text
      text: 'Chacun avait quatre faces ; les faces du premier étaient des faces de keroub, les faces du deuxième des faces d''homme, pour le troisième des faces de lion, et pour le quatrième des faces d''aigle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'être vivant ; les êtres vivants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mêmes possibilités v. 17,20 ; cf. 1.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kebar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et les keroubim montèrent. C''était le vivant que j''avais vu près du Kebar. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les keroubim se déplaçaient, les roues allaient à côté d''eux ; quand les keroubim déployaient leurs ailes pour s''élever de terre, les roues, à leur côté, ne viraient pas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le souffle du vivant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: Quand ils s'arrêtaient, elles s'arrêtaient ; quand ils s'élevaient, elles s'élevaient avec eux, car le souffle du vivant était en elles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se retire du temple'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 4 ; voir 9.3+.
      marker-yv: yv-n
    - type: text
      text: 'La gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se retira du seuil de la Maison et se plaça sur les keroubim. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils s'arrêtèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', pluriel d''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '  ; le texte hébreu a le singulier, ce qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 18) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'arrêta.
      marker-yv: yv-n
    - type: text
      text: 'Les keroubim déployèrent leurs ailes et montèrent de terre sous mes yeux quand ils partirent avec les roues. Ils s''arrêtèrent à l''entrée de la porte de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', côté est ; et la gloire du Dieu d''Israël était sur eux, en haut. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme vêtu de lin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'intérieur du tourbillon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : expression obscure (cf. v. 13) ; le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'roues '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 23.24 ; 26.10 ; voir aussi Es 5.28 ; Jr 47.3 ; Ps 77.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous les keroubim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous le keroub
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 9.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le creux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de tes mains), de même au v. 7 (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans les mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: braises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 6.6 ; Ap 8.5.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit à l''homme vêtu de lin : Entre à l''intérieur du tourbillon sous les keroubim, remplis tes mains de braises que tu prendras entre les keroubim, et jette-les sur la ville ! Et il y alla sous mes yeux.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 15.
      marker-yv: yv-n
    - type: text
      text: 'C''était le vivant que j''avais vu sous le Dieu d''Israël près du Kebar, et je sus que c''étaient des keroubim. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chacun avait quatre faces et quatre ailes et, sous leurs ailes, ce qui ressemblait à des mains humaines. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'était le même aspect, c'était eux-mêmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte obscur et traduction incertaine.'
      marker-yv: yv-n
    - type: text
      text: Leurs faces ressemblaient à celles que j'avais vues près du Kebar ; c'était le même aspect, c'était eux-mêmes. Chacun allait droit devant lui.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 40.34 ; 1R 8.10 ; 2Ch 5.13.
      marker-yv: yv-n
    - type: text
      text: 'Les keroubim se tenaient à droite de la Maison quand l''homme arriva, et la nuée remplit la cour intérieure. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.3+.
      marker-yv: yv-n
    - type: text
      text: 'La gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''éleva de dessus le keroub sur le seuil de la Maison ; la Maison fut remplie de la nuée, et la cour fut remplie de la clarté de la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu-Puissant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El-Shaddaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; sur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Gn 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le bruit des ailes des keroubim se fit entendre jusque dans la cour extérieure, pareil à la voix du Dieu-Puissant lorsqu'il parle.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quand il ordonna…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la formulation est ambiguë ; il faut sans doute comprendre'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand Dieu ordonna à l'homme vêtu de lin, cet homme alla se placer…
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, quand il ordonna à l''homme vêtu de lin : « Prends du feu à l''intérieur du tourbillon, entre les keroubim ! », il alla se placer près de la roue. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entre les keroubim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'entre les keroubim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : la première occurrence de cette expression est absente de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors le keroub étendit la main entre les keroubim vers le feu qui était entre les keroubim ; il en prit et le mit dans les mains de celui qui était vêtu de lin. Il le prit et sortit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.8 ; 8.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quant aux keroubim, une forme de main humaine apparaissait sous leurs ailes.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pierre de chrysolithe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pierre de Tarsis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1.16
        - type: usfm
          marker: ord
          children:
