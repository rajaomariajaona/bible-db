document_id: EZK.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvelle vision de la gloire du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 1.22+,26n  ; cf. Ap 4.2.
  - type: text
    content: 'Je regardai : sur la voûte céleste qui était au-dessus de la tête des keroubim il y avait comme du lapis-lazuli ; on voyait au-dessus d''eux quelque chose dont l''aspect ressemblait à un trône. '
  '10':
  - type: text
    content: 'Par leur aspect, toutes les quatre se ressemblaient ; chaque roue paraissait être au milieu d''une autre roue. '
  '11':
  - type: note
    content: 'elles allaient dans la direction de la tête  : litt. au lieu vers lequel la tête faisait face, elles allaient derrière elle  ; cf. 1.17.'
  - type: text
    content: 'Quand elles se déplaçaient, elles allaient sur chacun de leurs quatre côtés ; elles ne viraient pas en se déplaçant ; elles allaient dans la direction de la tête, sans virer en se déplaçant. '
  '12':
  - type: note
    content: 'Tout le corps des keroubim  : litt. toute leur chair.'
  - type: text
    content: 'Tout le corps des keroubim, leur dos, leurs mains et leurs ailes, étaient remplis d''yeux tout autour, de même que les roues, leurs roues à eux quatre. '
  '13':
  - type: note
    content: 'J''entendis…  : litt. on appela à mes oreilles. –  Tourbillon v. 2n.'
  - type: text
    content: 'J''entendis qu''on appelait les roues « Tourbillon ». '
  '14':
  - type: note
    content: 'Ce v. ne figure pas dans LXX. –  faces  : le mot hébreu est toujours au pluriel, même lorsqu''il désigne une seule face  ; on pourrait donc aussi traduire quatre faces : la face du premier… la face du second, etc. Syr a compris la première (des faces de chacun) … la deuxième, etc. ; cf. 41.19 ; Ap 4.6-8. A noter que la face de keroub correspond à celle du taureau en 1.10.'
  - type: text
    content: 'Chacun avait quatre faces ; les faces du premier étaient des faces de keroub, les faces du deuxième des faces d''homme, pour le troisième des faces de lion, et pour le quatrième des faces d''aigle. '
  '15':
  - type: note
    content: 'le vivant  : autres traductions l''être vivant ; les êtres vivants  ; mêmes possibilités v. 17,20 ; cf. 1.5n,20n. –  Kebar 1.1n.'
  - type: text
    content: 'Et les keroubim montèrent. C''était le vivant que j''avais vu près du Kebar. '
  '16':
  - type: text
    content: 'Quand les keroubim se déplaçaient, les roues allaient à côté d''eux ; quand les keroubim déployaient leurs ailes pour s''élever de terre, les roues, à leur côté, ne viraient pas. '
  '17':
  - type: note
    content: le souffle du vivant 1.20ns.
  - type: text
    content: Quand ils s'arrêtaient, elles s'arrêtaient ; quand ils s'élevaient, elles s'élevaient avec eux, car le souffle du vivant était en elles.
  - type: heading
    content: La gloire du Seigneur se retire du temple
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 4 ; voir 9.3+.
  - type: text
    content: 'La gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se retira du seuil de la Maison et se plaça sur les keroubim. '
  '19':
  - type: note
    content: Ils s'arrêtèrent, pluriel d'après LXX  ; le texte hébreu a le singulier, ce qui pourrait signifier la gloire (v. 18) s'arrêta.
  - type: text
    content: 'Les keroubim déployèrent leurs ailes et montèrent de terre sous mes yeux quand ils partirent avec les roues. Ils s''arrêtèrent à l''entrée de la porte de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', côté est ; et la gloire du Dieu d''Israël était sur eux, en haut. '
  '2':
  - type: note
    content: 'Il (le Seigneur) dit  : autre traduction on dit. –  l''homme vêtu de lin 9.2n. –  à l''intérieur du tourbillon  : expression obscure (cf. v. 13) ; le même mot est traduit par roues en 23.24 ; 26.10 ; voir aussi Es 5.28 ; Jr 47.3 ; Ps 77.19. –  sous les keroubim  : litt. sous le keroub, comme en 9.3n. –  tes mains  : litt. le creux (de tes mains), de même au v. 7 (dans les mains). –  braises  : cf. Es 6.6 ; Ap 8.5.'
  - type: text
    content: 'Il dit à l''homme vêtu de lin : Entre à l''intérieur du tourbillon sous les keroubim, remplis tes mains de braises que tu prendras entre les keroubim, et jette-les sur la ville ! Et il y alla sous mes yeux.'
  '20':
  - type: note
    content: V. 15.
  - type: text
    content: 'C''était le vivant que j''avais vu sous le Dieu d''Israël près du Kebar, et je sus que c''étaient des keroubim. '
  '21':
  - type: text
    content: 'Chacun avait quatre faces et quatre ailes et, sous leurs ailes, ce qui ressemblait à des mains humaines. '
  '22':
  - type: note
    content: 'c''était le même aspect, c''était eux-mêmes  : texte obscur et traduction incertaine.'
  - type: text
    content: Leurs faces ressemblaient à celles que j'avais vues près du Kebar ; c'était le même aspect, c'était eux-mêmes. Chacun allait droit devant lui.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 40.34 ; 1R 8.10 ; 2Ch 5.13.
  - type: text
    content: 'Les keroubim se tenaient à droite de la Maison quand l''homme arriva, et la nuée remplit la cour intérieure. '
  '4':
  - type: note
    content: 9.3+.
  - type: text
    content: 'La gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''éleva de dessus le keroub sur le seuil de la Maison ; la Maison fut remplie de la nuée, et la cour fut remplie de la clarté de la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'Dieu-Puissant  : hébreu ’El-Shaddaï  ; cf. 1.24n  ; sur ’El, voir Gn 21.33n.'
  - type: text
    content: Le bruit des ailes des keroubim se fit entendre jusque dans la cour extérieure, pareil à la voix du Dieu-Puissant lorsqu'il parle.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'quand il ordonna…  : la formulation est ambiguë ; il faut sans doute comprendre  : quand Dieu ordonna à l''homme vêtu de lin, cet homme alla se placer…'
  - type: text
    content: 'Ainsi, quand il ordonna à l''homme vêtu de lin : « Prends du feu à l''intérieur du tourbillon, entre les keroubim ! », il alla se placer près de la roue. '
  '7':
  - type: note
    content: 'entre les keroubim (ou d''entre les keroubim) : la première occurrence de cette expression est absente de LXX.'
  - type: text
    content: 'Alors le keroub étendit la main entre les keroubim vers le feu qui était entre les keroubim ; il en prit et le mit dans les mains de celui qui était vêtu de lin. Il le prit et sortit. '
  '8':
  - type: note
    content: Cf. 1.8 ; 8.3n.
  - type: text
    content: Quant aux keroubim, une forme de main humaine apparaissait sous leurs ailes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1.5-21. –  pierre de chrysolithe ou pierre de Tarsis  ; cf. 1.16n.
  - type: text
    content: 'Je regardai : il y avait quatre roues près des keroubim, une roue près de chaque keroub ; l''aspect de ces roues avait l''éclat d''une pierre de chrysolithe. '
