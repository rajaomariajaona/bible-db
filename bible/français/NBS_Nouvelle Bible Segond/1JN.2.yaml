document_id: 1JN.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Mes enfants (litt. mes petits enfants  ; ici le possessif correspondant à mes est présent dans le texte grec ; dans la suite de l''épître il est, selon toute vraisemblance, sous-entendu) : même terme grec v. 12,18,28 ; 3.7,18 ; 4.4 ; 5.21 ; Jn 13.33 ; autre mot, synonyme mais plus courant, en Jn 21.5 ; 1Jn 2.14,18. Un maître s''adressait souvent à ses disciples comme à ses enfants ; voir aussi Pr 4.1 ; 5.1 ; 1Co 4.15 ; Ga 4.19. –  un défenseur  : voir Jn 14.16n  ; cf. 16.26s ; Rm 8.34 ; Hé 7.25. –  auprès  : cf. 1.2n  ; Jn 5.45. –  qui est juste  : autres traductions un juste, le juste  ; cf. v. 9+ ; Ac 3.14+.'
  - type: text
    content: 'Mes enfants, je vous écris cela pour que vous ne péchiez pas. Mais si quelqu''un vient à pécher, nous avons un défenseur auprès du Père, Jésus-Christ, qui est juste. '
  '10':
  - type: note
    content: 'en lui…  : on pourrait comprendre pour lui il n''y a pas de cause de chute, ou bien il n''est pas une cause de chute (pour son frère, ou plus généralement pour les autres), ou même en elle (la lumière) il n''y a pas de cause de chute  ; cf. 3.18-20 ; Ps 119.165 ; Pr 4.18s ; Rm 14.13 ; 1Co 8.13 ; voir aussi Mt 11.6n.'
  - type: text
    content: 'Celui qui aime son frère demeure dans la lumière, et en lui il n''y a pas de cause de chute. '
  '11':
  - type: note
    content: V. 9. –  ne sait pas où il va Jn 12.35+.
  - type: text
    content: Mais celui qui déteste son frère est dans les ténèbres ; il marche dans les ténèbres et ne sait pas où il va, parce que les ténèbres ont rendu ses yeux aveugles.
  - type: heading
    content: Face au monde et aux antichrists
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous écris…  : autre traduction je vous l''écris, mes enfants (litt. petits enfants , cf. v. 1n)  : vos péchés… (même possibilité dans les formules analogues v. 13s,21). –  vos péchés vous sont pardonnés  : cf. Mc 2.5/ / ; Lc 24.47 ; Jn 20.23 ; Ac 13.38 ; 1Co 6.11. –  son nom  : cf. 3.23+.'
  - type: text
    content: Je vous écris, mes enfants, parce que vos péchés vous sont pardonnés à cause de son nom.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pères / jeunes gens  : selon certains, l''auteur s''adresserait ainsi à deux catégories différentes de lecteurs (cf. Ac 5.6,10 ; Hé 1.1s) ; les enfants des v. 12 et 14 (qui correspondent à deux termes grecs distincts, v. 1n) constitueraient alors ou bien un troisième groupe, ou bien une appellation générale, commune à tous. Selon d''autres, l''opposition pères / jeunes gens soulignerait simplement que l''ensemble du passage s''adresse à tous les membres de la communauté, sans exception (cf. Jr 31.34 ; Ac 2.17s ; Hé 8.11). –  vous connaissez ou vous avez connu , de même v. 14 ; cf. v. 3n. –  dès le commencement 1.1+. –  vaincu 4.4 ; 5.4s ; Jn 16.33 ; Rm 8.37 ; 1Co 15.57 ; Ap 2.7+ ; 12.11,17 ; 17.14. –  le Mauvais 3.12 ; 5.18s ; 1P 5.8s ; Ap 12.11.'
  - type: text
    content: Je vous écris, pères, parce que vous connaissez celui qui est dès le commencement.
  - type: text
    content: Je vous écris, jeunes gens, parce que vous avez vaincu le Mauvais.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 12-13n. –  mes enfants  : cf. v. 1n,13n. –  vous êtes forts…  : cf. Ep 6.10-17 ; Ap 12.11. –  demeure en vous  : cf. v. 24 ; 3.24 ; Jn 5.38.'
  - type: text
    content: Je vous ai écrit, mes enfants, parce que vous connaissez le Père.
  - type: text
    content: Je vous ai écrit, pères, parce que vous connaissez celui qui est dès le commencement.
  - type: text
    content: Je vous ai écrit, jeunes gens, parce que vous êtes forts, que la parole de Dieu demeure en vous et que vous avez vaincu le Mauvais.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'le monde  : cf. Jn 1.10n  ; 12.31+ ; 17.14 ; Rm 12.2 ; Jc 4.4. –  l''amour du Père…  : cf. Jn 5.42+.'
  - type: text
    content: 'N''aimez pas le monde, ni ce qui est dans le monde. Si quelqu''un aime le monde, l''amour du Père n''est pas en lui ; '
  '16':
  - type: note
    content: 'désir de la chair (Jn 3.6+) Ga 5.16n  ; cf. Rm 13.14 ; Ep 2.3 ; Tt 2.12 ; 1P 2.11 ; 4.2. –  des yeux  : cf. Gn 3.6. –  la confiance…  : litt. la présomption (cf. Jc 4.16 ; un terme apparenté est traduit par fanfarons en Rm 1.30 ; 2Tm 3.2) des ressources  ; le terme grec correspondant à ressources peut avoir le sens général de vie (Lc 8.14n), mais il désigne aussi, plus particulièrement, les moyens d''existence  ; ainsi en 3.17 ; cf. Mc 12.44n  ; Lc 8.43 ; 15.12,30 (bien) ; voir aussi Lc 12.15-21 ; 20.22-25/ /. –  n''est pas du Père  : cf. Jn 8.47+.'
  - type: text
    content: 'car tout ce qui est dans le monde, le désir de la chair, le désir des yeux et la confiance présomptueuse en ses ressources, tout cela n''est pas du Père, mais du monde. '
  '17':
  - type: note
    content: le monde passe 1Co 7.31. –  celui qui fait… 1.6+ ; Mt 7.21+ ; Jn 4.34+.
  - type: text
    content: Or le monde passe, et son désir aussi ; mais celui qui fait la volonté de Dieu demeure pour toujours.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'la dernière heure  : cf. Jn 2.4+ ; 6.39+ ; 12.23+ ; 1Co 10.11+ ; 2Tm 3.1. –  vous avez entendu…  : cf. Mc 13.5ss,21ss/ / ; 2Th 2.3s ; 1Tm 4.1. –  un antichrist , c.-à-d. quelqu''un qui s''oppose au Christ (Mc 1.1n) ou qui se substitue à lui ; cf. v. 22 ; 4.3 ; 2Jn 7 ; voir l''introduction aux épîtres de Jean ; dans la tradition de l''Eglise ce nom a fini par désigner un personnage unique qui doit apparaître juste avant l''avènement du Christ (cf. 2Th 2).'
  - type: text
    content: 'Mes enfants, c''est la dernière heure ; vous avez entendu dire qu''un antichrist vient, et il y a maintenant beaucoup d''antichrists : de là nous savons que c''est la dernière heure. '
  '19':
  - type: note
    content: 'sortis (4.1n) de chez nous Ac 20.30. –  des nôtres  : cf. Jn 6.37-39,65-71. –  manifeste  : cf. Mc 4.22 ; 1Co 11.19. –  qu''aucun d''eux n''est des nôtres  : autre traduction, moins probable  : que tous ne sont pas des nôtres.'
  - type: text
    content: 'Ils sont sortis de chez nous, mais ils n''étaient pas des nôtres ; car, s''ils avaient été des nôtres, ils seraient demeurés avec nous ; mais ainsi, il est manifeste qu''aucun d''eux n''est des nôtres. '
  '2':
  - type: note
    content: 'l''expiation ou l''absolution, ou encore la propitiation  ; on pourrait aussi traduire l''annulation de nos péchés  ; même formule 4.10 ; cf. Lv 16 ; Rm 3.25+ ; Hé 2.17 ; Ap 5.9s ; voir aussi Jn 1.29. –  pas seulement…  : cf. Jn 11.52+. –  du monde entier 4.14 ; Jn 1.10n,29 ; 4.42 ; 2Co 5.19 ; Col 1.20.'
  - type: text
    content: Il est lui-même l'expiation pour nos péchés ; non pas seulement pour les nôtres, mais aussi pour ceux du monde entier.
  - type: heading
    content: Un commandement ancien et nouveau
  '20':
  - type: note
    content: onction ou huile d'onction, en grec khrisma (mot apparenté à Christ, terme signifiant à l'origine oint ou ayant reçu l'onction d'huile, cf. Mc 1.1n) ; cf. v. 27 ; 2Co 1.21 ; voir aussi Ac 4.26-27+. –  de celui qui est saint ou de ce qui est saint, litt. du saint  ; cf. Jn 6.69 ; voir aussi Mc 1.24/ / ; Ac 3.14 ; Ap 3.7. –  tous, vous savez, comme au v. 21 ; cf. 1Co 8.1 ; voir aussi Jr 31.34 ; certains mss portent vous savez tout (cf. v. 27+).
  - type: text
    content: 'Quant à vous, vous avez une onction de celui qui est saint, et tous, vous savez. '
  '21':
  - type: note
    content: 'Je vous ai écrit…  : autre traduction je ne vous ai pas écrit que vous ne savez pas la vérité, mais que vous la savez… cf. v. 12n,14. –  la vérité 1.6+ ; Jn 8.32+ ; 2Jn 1. –  savez v. 20 ; cf. 2P 1.12 ; Jd 5. –  aucun mensonge… Jn 8.44.'
  - type: text
    content: Je vous ai écrit, non parce que vous ne sauriez pas la vérité, mais parce que vous la savez, et parce qu'aucun mensonge n'est de la vérité.
  '22':
  - type: text
    content: ' '
  - type: note
    content: V. 18+ ; cf. 4.3 ; 5.1. –  nie et renie (aussi v. 23) traduisent un même verbe grec ; cf. Jn 1.20n  ; Ap 2.13 ; 3.8. –  le Père et le Fils 1.3+.
  - type: text
    content: 'Qui est le menteur, sinon celui qui nie que Jésus est le Christ ? Le voilà, l''antichrist, celui qui renie le Père et le Fils. '
  '23':
  - type: note
    content: 4.2,15 ; cf. Mt 10.32ns/ / ; 11.27/ / ; Jn 5.23 ; 9.22 ; 15.23 ; 2Jn 9. –  reconnaît ou confesse 1.9n.
  - type: text
    content: Quiconque renie le Fils n'a pas non plus le Père ; celui qui reconnaît le Fils a aussi le Père.
  '24':
  - type: text
    content: ' '
  - type: note
    content: demeure en vous v. 27 ; cf. Jn 15.7-10. –  entendu dès le commencement v. 7+. –  vous demeurerez 3.24.
  - type: text
    content: 'Quant à vous, que demeure en vous ce que vous avez entendu dès le commencement. Si ce que vous avez entendu dès le commencement demeure en vous, vous demeurerez, vous aussi, dans le Fils et dans le Père. '
  '25':
  - type: note
    content: Cf. 1.5+. –  promesse / vie éternelle 2Tm 1.1 ; Tt 1.2 ; cf. Jn 3.15+.
  - type: text
    content: La promesse qu'il nous a faite, lui, c'est la vie éternelle.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.8 ; 3.7 ; 4.6 ; 2Jn 7 ; voir aussi Mc 13.5ss,21s/ / ; Tt 1.10 ; Ap 2.20 ; 12.9.
  - type: text
    content: 'Je vous ai écrit cela au sujet de ceux qui vous égarent. '
  '27':
  - type: note
    content: 'onction v. 20n. –  demeure en vous v. 24. –  pas besoin que quelqu''un vous instruise  : cf. Jr 31.34 ; 1Th 4.9 ; Hé 8.11. –  vous instruit sur tout  : cf. Jn 14.26+. –  demeurez ou vous demeurez. –  comme elle vous y a instruits ou comme il vous l''a enseigné.'
  - type: text
    content: Quant à vous, l'onction que vous avez reçue de lui demeure en vous, et vous n'avez pas besoin que quelqu'un vous instruise ; mais comme son onction vous instruit sur tout, qu'elle est vraie et qu'elle n'est pas mensonge, demeurez en lui comme elle vous y a instruits.
  - type: heading
    content: Les enfants de Dieu
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'quel que soit…  : litt. s''il est (ou s''il vient à être ) manifesté (ou à se manifester , 1.2n) ; 3.2 ; cf. 3.5n  ; Col 3.4. –  de l''assurance 3.21 ; 4.17 ; 5.14 ; Jn 7.4n  ; Ac 2.29n  ; Hé 3.6+. –  qu''aucune honte…  : autre traduction que nous n''ayons pas la honte de nous trouver loin de lui  ; cf. Jn 3.19ss ; Ph 1.20.'
  - type: text
    content: 'Et maintenant, mes enfants, demeurez en lui, pour que, quel que soit le moment de sa manifestation, nous ayons de l''assurance, et qu''aucune honte ne nous fasse nous éloigner de lui à son avènement. '
  '29':
  - type: note
    content: 'juste v. 1 ; 1.9+. –  sachez  : autres traductions reconnaissez, comprenez  ; autre verbe (en grande partie équivalent) que celui qui est traduit par vous savez au début du v. –  fait (1.6+) la justice 3.4,7ss. –  né de lui 3.9 ; 4.7 ; 5.1,4,18 ; cf. Jn 1.13 ; 3.3.'
  - type: text
    content: Si vous savez qu'il est juste, sachez que quiconque fait la justice est né de lui.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'nous savons (ou nous reconnaissons , aussi v. 5,18 ; cf. 3.22-24 ; 5.2s) que nous le connaissons (ou que nous l''avons connu, que nous sommes parvenus à le connaître  ; v. 13s ; 4.8 ; cf. Jr 31.34) : le texte emploie ici le même verbe grec au présent (comme en 4.6ns) puis au parfait, temps qui évoque habituellement un état permanent, un acquis, résultant d''une action passée (de même dans la suite) ; voir aussi 3.1n. –  gardons ou observons , de même dans la suite.'
  - type: text
    content: 'A ceci nous savons que nous le connaissons : si nous gardons ses commandements. '
  '4':
  - type: note
    content: 'Cf. 1.6+. –  Je le connais v. 3n  ; cf. Tt 1.16. –  ne garde pas…  : cf. Jn 15.10. –  menteur 4.20. –  la vérité n''est pas en lui 1.6+,8 ; Jn 8.44.'
  - type: text
    content: 'Celui qui dit : « Je le connais » et qui ne garde pas ses commandements est un menteur, et la vérité n''est pas en lui. '
  '5':
  - type: note
    content: garde sa parole Jn 14.21,23. –  l'amour de Dieu (cf. 5.3) … accompli (ou parfait) 4.12,17s.
  - type: text
    content: 'Mais celui qui garde sa parole, l''amour de Dieu est vraiment accompli en lui. A ceci nous savons que nous sommes en lui : '
  '6':
  - type: note
    content: 'marcher, c.-à-d. se comporter, cf. 1.6+. –  comme lui  : litt. comme celui-là, démonstratif solennel qui reviendra souvent dans l''épître (3.3,5,7,16 ; 4.17 ; 5.16) ; dans la plupart de ses emplois, il semble désigner le Christ ; voir aussi Jn 19.35n  ; cf. 13.15+.'
  - type: text
    content: celui qui dit demeurer en lui doit marcher aussi comme lui a marché.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'commandement nouveau / ancien… dès le commencement  : cf. v. 24 ; 3.11 ; Jn 13.34+ ; 2Jn 5s.'
  - type: text
    content: 'Bien-aimés, ce n''est pas un commandement nouveau que je vous écris, mais un commandement ancien, que vous aviez dès le commencement ; ce commandement ancien, c''est la parole que vous avez entendue. '
  '8':
  - type: note
    content: 'D''autre part  : cf. Jn 16.28n. –  en lui et en vous  : autres traductions pour lui et pour vous ; en lui et parmi vous. –  la vraie lumière 1.5+ ; Jn 1.9 ; cf. Rm 13.12 ; 1Jn 3.14.'
  - type: text
    content: D'autre part, c'est un commandement nouveau que je vous écris ; ce qui est vrai en lui et en vous, car les ténèbres passent, et la vraie lumière brille déjà.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4,11 ; 1.6+ ; 3.15+. –  encore  : litt. jusqu''à maintenant.'
  - type: text
    content: 'Celui qui dit être dans la lumière, tout en détestant son frère, est encore dans les ténèbres. '
