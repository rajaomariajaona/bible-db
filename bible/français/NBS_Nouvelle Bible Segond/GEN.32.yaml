        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'accueillera-t-il favorablement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: relèvera-t-il ma face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 19.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous direz : « Jacob, ton serviteur, vient lui-même derrière nous. » Car il se disait : Je l''apaiserai par ce présent qui me précède, et ensuite je paraîtrai en sa présence ; peut-être m''accueillera-t-il favorablement ! '
