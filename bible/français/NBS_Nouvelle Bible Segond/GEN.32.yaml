        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s., ses eaux ont été capturées en vue de l''irrigation (v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il se leva cette nuit-là, prit ses deux femmes, ses deux servantes et ses onze enfants, et passa le gué du Yabboq. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
