        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob poursuivit son chemin ; des messagers de Dieu le rejoignirent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il donna le même ordre au deuxième, au troisième et à tous ceux qui suivaient les troupeaux : C''est ainsi que vous parlerez à mon seigneur Esaü, quand vous le trouverez. '
  '21':
