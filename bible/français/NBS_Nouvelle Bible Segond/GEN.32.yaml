      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un présent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 33.10 ; 1S 25.18s.
      marker-yv: yv-n
    - type: text
      text: 'C''est là que Jacob passa la nuit. Il prit parmi les biens qu''il avait acquis de quoi faire un présent à Esaü, son frère : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'deux cents chèvres et vingt boucs, deux cents brebis et vingt béliers, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'trente chamelles, avec les petits qu''elles allaitaient, quarante vaches et dix taureaux, vingt ânesses et dix ânes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les confia à ses serviteurs, chaque troupeau séparément, et il dit à ses serviteurs : Passez devant moi et mettez un intervalle entre chaque troupeau. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il donna cet ordre au premier : Quand tu rencontreras Esaü, mon frère, et qu''il te demandera : « A qui appartiens-tu ? Où vas-tu ? A qui appartient tout ce qui est devant toi ? », '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu répondras : « A Jacob, ton serviteur ; c''est un présent qu''il t''envoie, mon seigneur Esaü. Lui-même nous suit. » '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 25ss ; 28.10ss ; Jos 5.13ss ; 2R 6.15-17 ; Ps 91.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: messagers de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
