      marker-yv: yv-n
    - type: text
      text: Le présent passa devant lui, et lui-même resta dans le camp cette nuit-là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob lutte avec Dieu
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
