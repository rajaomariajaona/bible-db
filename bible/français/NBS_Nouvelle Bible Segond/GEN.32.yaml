      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yabboq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : principal affluent oriental du Jourdain (aujourd''hui le Nahr az-Zarqa‘, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la rivière bleue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
