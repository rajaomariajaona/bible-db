        - type: text
          text: 31.3,13.
      marker-yv: yv-n
    - type: text
      text: 'Jacob dit : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Dieu d''Abraham, mon père, Dieu d''Isaac, mon père, toi qui m''as dit : « Retourne dans ton pays, au lieu de tes origines, et je te ferai du bien ! » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai passé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.6,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bâton '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '47.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deux troupes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',8.'
      marker-yv: yv-n
    - type: text
      text: 'Je suis trop petit pour toute la fidélité et la loyauté que tu as montrées envers moi, ton serviteur : j''ai passé ce Jourdain avec mon bâton et maintenant je forme deux troupes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Délivre-moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 31.2s ; 59.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaü '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tuant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la mère sur les fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Os 10.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Délivre-moi, je te prie, de la main de mon frère, de la main d''Esaü ! Car je crains qu''il vienne me frapper, tuant la mère sur les enfants. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: innombrable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'on ne peut compter tant il est nombreux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même expression en 16.10 ; cf. 12.2+ ; 13.16+ ; 26.4 ; 28.14.'
      marker-yv: yv-n
    - type: text
      text: 'Et toi, tu m''as dit : « Je te ferai du bien et je rendrai ta descendance comme le sable de la mer, qui est innombrable ! »'
