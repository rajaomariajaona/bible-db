document_id: GEN.32,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Voir bénédiction . –  chez lui  : litt. à son lieu . – Dans certaines versions anciennes, ce v. est le 55e du chapitre 31, de sorte que la numérotation des v. du chap. 32 est décalée d''une unité.'
  - type: text
    content: Laban se leva de bon matin ; il embrassa ses fils et ses filles, les bénit et partit. Laban retourna chez lui.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 31.3,13.
  - type: text
    content: 'Jacob dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Abraham, mon père, Dieu d''Isaac, mon père, toi qui m''as dit : « Retourne dans ton pays, au lieu de tes origines, et je te ferai du bien ! » '
  '11':
  - type: note
    content: j'ai passé… 28.6,10. –  bâton 47.31n. –  deux troupes v. 3n,8.
  - type: text
    content: 'Je suis trop petit pour toute la fidélité et la loyauté que tu as montrées envers moi, ton serviteur : j''ai passé ce Jourdain avec mon bâton et maintenant je forme deux troupes. '
  '12':
  - type: note
    content: 'Délivre-moi Ps 31.2s ; 59.2. –  Esaü v. 7+. –  tuant…  : litt. la mère sur les fils  ; cf. Os 10.14n.'
  - type: text
    content: 'Délivre-moi, je te prie, de la main de mon frère, de la main d''Esaü ! Car je crains qu''il vienne me frapper, tuant la mère sur les enfants. '
  '13':
  - type: note
    content: 'sable 22.17. –  innombrable  : litt. qu''on ne peut compter tant il est nombreux, même expression en 16.10 ; cf. 12.2+ ; 13.16+ ; 26.4 ; 28.14.'
  - type: text
    content: 'Et toi, tu m''as dit : « Je te ferai du bien et je rendrai ta descendance comme le sable de la mer, qui est innombrable ! »'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'parmi les biens…  : litt. de ce qui venait (ou était venu ) en sa main . –  un présent 33.10 ; 1S 25.18s.'
  - type: text
    content: 'C''est là que Jacob passa la nuit. Il prit parmi les biens qu''il avait acquis de quoi faire un présent à Esaü, son frère : '
  '15':
  - type: text
    content: 'deux cents chèvres et vingt boucs, deux cents brebis et vingt béliers, '
  '16':
  - type: text
    content: 'trente chamelles, avec les petits qu''elles allaitaient, quarante vaches et dix taureaux, vingt ânesses et dix ânes. '
  '17':
  - type: text
    content: 'Il les confia à ses serviteurs, chaque troupeau séparément, et il dit à ses serviteurs : Passez devant moi et mettez un intervalle entre chaque troupeau. '
  '18':
  - type: text
    content: 'Il donna cet ordre au premier : Quand tu rencontreras Esaü, mon frère, et qu''il te demandera : « A qui appartiens-tu ? Où vas-tu ? A qui appartient tout ce qui est devant toi ? », '
  '19':
  - type: text
    content: 'tu répondras : « A Jacob, ton serviteur ; c''est un présent qu''il t''envoie, mon seigneur Esaü. Lui-même nous suit. » '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 25ss ; 28.10ss ; Jos 5.13ss ; 2R 6.15-17 ; Ps 91.11. –  messagers de Dieu  : voir ange.'
  - type: text
    content: 'Jacob poursuivit son chemin ; des messagers de Dieu le rejoignirent. '
  '20':
  - type: text
    content: 'Il donna le même ordre au deuxième, au troisième et à tous ceux qui suivaient les troupeaux : C''est ainsi que vous parlerez à mon seigneur Esaü, quand vous le trouverez. '
  '21':
  - type: note
    content: 'Le texte hébreu semble jouer sur les divers emplois idiomatiques du terme correspondant à face, cf. v. 31n. –  Je l''apaiserai  : litt. je couvrirai ou je frotterai sa face. Le terme correspondant à couvrir ou frotter est associé ailleurs à l''idée d''expiation (cf. 6.14n) ; Pr 16.14. –  qui me précède  : litt. qui va devant moi (ou devant ma face), de même au v. 22. –  je paraîtrai en sa présence  : litt. je verrai sa face, cf. 33.10 ; Ex 33.20n. –  m''accueillera-t-il favorablement  : litt. relèvera-t-il ma face. Cf. 4.7n  ; 19.21n.'
  - type: text
    content: 'Vous direz : « Jacob, ton serviteur, vient lui-même derrière nous. » Car il se disait : Je l''apaiserai par ce présent qui me précède, et ensuite je paraîtrai en sa présence ; peut-être m''accueillera-t-il favorablement ! '
  '22':
  - type: note
    content: Le terme hébreu correspondant à présent (minha, qu'on retrouve ailleurs aussi dans le sens d'offrande à une divinité) fait assonance avec celui qui est rendu par camp (mahané, traduit aussi par troupe au v. 3n).
  - type: text
    content: Le présent passa devant lui, et lui-même resta dans le camp cette nuit-là.
  - type: heading
    content: Jacob lutte avec Dieu
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Yabboq  : principal affluent oriental du Jourdain (aujourd''hui le Nahr az-Zarqa‘, la rivière bleue ) qui le rejoint (v. 11) à environ 40 km au nord de la mer Morte (cf. Dt 3.16) ; il a changé de lit au cours de l''histoire. Au XXe s., ses eaux ont été capturées en vue de l''irrigation (v. 3n).'
  - type: text
    content: 'Il se leva cette nuit-là, prit ses deux femmes, ses deux servantes et ses onze enfants, et passa le gué du Yabboq. '
  '24':
  - type: note
    content: 'l''oued ou la rivière  : voir 26.17n. –  ce qui lui appartenait  : un ms hébreu, Smr et des versions anciennes portent tout ce qui lui appartenait.'
  - type: text
    content: 'Il les prit, leur fit passer l''oued et fit aussi passer ce qui lui appartenait. '
  '25':
  - type: note
    content: 'homme  : cf. v. 29,31 (Dieu) ; Os 12.4s (messager). –  se battit  : le verbe hébreu correspondant n''apparaît qu''ici et au v. 26. Il ressemble à l''un des mots traduits par poussière (Ex 9.9 ; Dt 28.24), et il fait assonance avec le nom Yabboq (v. 23n). Sur l''ensemble, cf. Ex 4.24-26.'
  - type: text
    content: 'Jacob resta donc seul. Alors un homme se battit avec lui jusqu''au lever de l''aurore. '
  '26':
  - type: note
    content: 'intérieur  : litt. creux  ; ailleurs le même terme désigne en particulier la paume de la main ou la plante des pieds ; certains traduisent ici articulation. –  cuisse, cf. 24.2n  ; autre traduction hanche.'
  - type: text
    content: 'Voyant qu''il ne pouvait l''emporter sur lui, il le frappa à l''intérieur de la cuisse ; et l''intérieur de la cuisse de Jacob se démit pendant qu''il se battait avec lui. '
  '27':
  - type: note
    content: Voir bénédiction.
  - type: text
    content: 'Il dit : Laisse-moi partir, car l''aurore se lève. Il répondit : Je ne te laisserai pas partir sans que tu m''aies béni. '
  '28':
  - type: text
    content: 'Il lui demanda : Quel est ton nom ? Il répondit : Jacob. '
  '29':
  - type: note
    content: 'On ne te nommera plus  : litt. ton nom ne sera plus dit. Cf. 17.5,15. – C''est ici et en 35.10 qu''est attribué à Jacob le nom d’Israël, qui désigne habituellement le peuple d''Israël, souvent sous la forme les fils d''Israël (traduction usuelle  : les Israélites, cf. v. 33 ; 36.31 ; voir aussi Esaü-Edom en 25.30). Le nom d’Israël est ici rapproché du verbe traduit par tu as lutté (hébreu saritha) ; on pourrait de ce point de vue interpréter Israël au sens de Dieu lutte ou Dieu se montre fort  ; cf. Os 12.4s. Autre interprétation traditionnelle celui qui voit Dieu. Sur Israël hors du Pentateuque, voir Gn 17.5n. –  tu l''as emporté  : certaines versions anciennes lisent tu l''emporteras.'
  - type: text
    content: 'Il reprit : On ne te nommera plus Jacob, mais Israël ; car tu as lutté avec Dieu et avec des hommes, et tu l''as emporté. '
  '3':
  - type: note
    content: 'Cf. 1Ch 12.23. –  la troupe  : autre traduction le camp, hébreu mahané  ; le terme (aussi v. 8s,11) peut aussi bien s''appliquer à une troupe en mouvement qu''au camp qu''elle forme pour ses étapes ou comme base d''opérations. –  Mahanaïm  : ce nom, qui signifie les deux troupes ou les deux camps, désigne un lieu en Transjordanie près du cours ancien du Yabboq (v. 23n).'
  - type: text
    content: 'En les voyant, Jacob dit : C''est la troupe de Dieu ! Et il appela ce lieu du nom de Mahanaïm (« Les Deux Troupes »).'
  - type: heading
    content: Jacob se prépare à rencontrer Esaü
  '30':
  - type: note
    content: Ex 3.13s ; Jg 13.17s ; cf. Jn 17.6,26.
  - type: text
    content: 'Jacob lui demanda : Je t''en prie, dis-moi ton nom. Il répondit : Pourquoi demandes-tu mon nom ? Et il le bénit là. '
  '31':
  - type: note
    content: 'Peniel (Face de Dieu, ou Face d''El, cf. 21.33n) apparaît dans la suite (v. 32) sous la forme Penouel. En Jg 8.8s ; 1R 12.25, il s''agit d''une localité située sur la rive gauche du Yabboq, à environ 35 km à l''ouest d''Amman. –  dit-il  : sous-entendu dans le texte. –  face à face  : cf. 1Co 13.12. –  j''ai eu la vie sauve  : cf. v. 12 ; 33.10 ; Ex 3.6n  ; 33.20 ; Jg 13.22 ; Es 6.5 ; Jb 19.27+.'
  - type: text
    content: 'Jacob appela ce lieu du nom de Peniel (« Face de Dieu ») ; car, dit-il, j''ai vu Dieu face à face, et j''ai eu la vie sauve. '
  '32':
  - type: note
    content: 'Penouel v. 31n. –  Jacob  : litt. lui. –  à cause de sa cuisse  : autre traduction sur sa cuisse.'
  - type: text
    content: 'Le soleil se levait lorsqu''il passa Penouel. Jacob boitait à cause de sa cuisse. '
  '33':
  - type: note
    content: 'V. 26n. Ce tabou alimentaire ne se retrouve nulle part ailleurs dans l''A.T. Il est cependant repris par les traditions juives postérieures qui soulignent la permanence du soutien de Dieu pour Jacob et ses descendants, quelles que soient leurs faiblesses personnelles. –  les Israélites  : autre traduction les fils d''Israël, v. 29n.'
  - type: text
    content: C'est pourquoi, jusqu'à ce jour, les Israélites ne mangent pas le tendon qui est à l'intérieur de la cuisse ; car il avait atteint Jacob à l'intérieur de la cuisse, au tendon.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Esaü / Séir / Edom 14.6n  ; 25.25n,30n.
  - type: text
    content: 'Jacob envoya, en avant de lui, des messagers à Esaü, son frère, à Séir, au pays d''Edom. '
  '5':
  - type: note
    content: 'séjourné en immigré  : cf. Ex 12.48n.'
  - type: text
    content: 'Il leur donna cet ordre : Voici ce que vous direz à mon seigneur Esaü : Ainsi parle Jacob, ton serviteur : J''ai séjourné en immigré chez Laban et je m''y suis attardé jusqu''à présent ; '
  '6':
  - type: note
    content: '13.2+. –  pour trouver grâce…  : cf. 6.8+.'
  - type: text
    content: j'ai des bœufs, des ânes, du petit bétail, des serviteurs et des servantes, et je te le fais dire, mon seigneur, pour trouver grâce à tes yeux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 27.41-45.
  - type: text
    content: 'Les messagers revinrent dire à Jacob : Nous sommes allés vers Esaü, ton frère ; il marche aussi à ta rencontre, avec quatre cents hommes. '
  '8':
  - type: note
    content: deux troupes v. 3n.
  - type: text
    content: 'Jacob eut très peur ; l''angoisse le saisit. Il partagea en deux troupes les gens qui étaient avec lui, ainsi que le petit et le gros bétail, et les chameaux. '
  '9':
  - type: note
    content: 'la met à mal  : litt. la frappe  ; même verbe au v. 12.'
  - type: text
    content: 'Il dit : Si Esaü attaque l''une des troupes et la met à mal, l''autre troupe échappera.'
