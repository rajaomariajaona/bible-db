  - type: text
    text: 'Achab dit : Par qui ? Et il répondit : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Par les cadets des chefs des provinces. Achab dit : Qui engagera le combat ? Et il répondit : Toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Achab passa en revue les cadets des chefs des provinces : il y en avait deux cent trente-deux ; après eux, il passa en revue tout le peuple, tous les Israélites : ils étaient sept mille.'
