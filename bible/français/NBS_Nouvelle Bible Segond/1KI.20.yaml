    marker-yv: yv-n
  - type: text
    text: 'L''homme de Dieu s''approcha et dit au roi d''Israël : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Parce que les Araméens ont dit : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) est un dieu des montagnes et non un dieu des vallées », je te livrerai toute cette grande multitude, et vous saurez que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
