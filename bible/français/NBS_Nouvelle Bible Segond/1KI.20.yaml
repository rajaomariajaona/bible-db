document_id: 1KI.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ben-Hadad assiège Samarie
  - type: text
    content: ' '
  - type: note
    content: 'LXX intervertit les chap. 20 et 21. –  Aram 19.15n. –  Samarie  : capitale du royaume d''Israël depuis le règne d''Omri (16.24n). Le récit rapporte des événements qui ont eu lieu pendant le règne d''Achab (≈ 874-853 av. J.-C.).'
  - type: text
    content: 'Ben-Hadad, roi d''Aram, rassembla toute son armée ; il avait avec lui trente-deux rois, des chevaux et des chars. Il se mit en campagne, assiégea Samarie et lui fit la guerre. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Que les dieux me fassent… 19.2+. –  si la poussière…  : l''image semble annoncer une destruction inéluctable de Samarie par des forces nettement supérieures : Aram n''en fera qu''une bouchée. –  toutes les troupes  : autre traduction tout le peuple.'
  - type: text
    content: 'Ben-Hadad fit dire à Achab : Que les dieux me fassent ceci et qu''ils y ajoutent cela, si la poussière de Samarie suffit à remplir le creux de la main de toutes les troupes qui sont sur mes pas ! '
  '11':
  - type: note
    content: 'Que celui…  : litt. que celui qui se ceint (ou qui met ses armes à la ceinture) ne se loue pas comme celui qui se défait (ou qui dépose ses armes) ; nous dirions  : il ne faut pas vendre la peau de l''ours avant de l''avoir tué  ; cf. Ec 7.8.'
  - type: text
    content: 'Mais le roi d''Israël répondit : Dites-lui : Que celui qui se prépare au combat ne fasse pas le fier comme s''il en revenait !'
  '12':
  - type: text
    content: 'Lorsque Ben-Hadad entendit cette parole, il était en train de boire avec les rois dans les huttes. Il dit à ses hommes : A vos postes ! Et ils se postèrent face à la ville.'
  - type: heading
    content: Première victoire d'Achab
  '13':
  - type: text
    content: 'Alors un prophète s''approcha d''Achab, roi d''Israël, et dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu vois toute cette grande multitude ? Aujourd''hui, je te la livre, et tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '14':
  - type: note
    content: 'provinces  : hébreu medinoth (pluriel de medina). C''est la première apparition de ce terme dans les livres historiques ; il est probable que les rois d''Israël avaient divisé leur royaume en provinces administratives, à l''intérieur desquelles les jeunes gens étaient astreints à un service militaire. Le terme cadets traduit ici un mot hébreu rendu ailleurs par garçon, jeune homme ou serviteur.'
  - type: text
    content: 'Achab dit : Par qui ? Et il répondit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Par les cadets des chefs des provinces. Achab dit : Qui engagera le combat ? Et il répondit : Toi. '
  '15':
  - type: text
    content: 'Alors Achab passa en revue les cadets des chefs des provinces : il y en avait deux cent trente-deux ; après eux, il passa en revue tout le peuple, tous les Israélites : ils étaient sept mille.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'à midi  : cf. Jr 6.4. –  buvait à s''enivrer  : même expression hébraïque en 16.9.'
  - type: text
    content: 'Ils firent une sortie à midi. Ben-Hadad buvait à s''enivrer dans les huttes avec les trente-deux rois qui étaient venus à son aide. '
  '17':
  - type: note
    content: 'Ben-Hadad s''informa  : litt. Ben-Hadad envoya (aux nouvelles) ; LXX ils envoyèrent (ou on envoya) dire au roi de Syrie.'
  - type: text
    content: 'Les cadets des chefs des provinces sortirent les premiers. Ben-Hadad s''informa et on lui dit : Des hommes sont sortis de Samarie. '
  '18':
  - type: text
    content: 'Il dit : S''ils sortent pour la paix, prenez-les vivants ; s''ils sortent pour le combat, prenez-les vivants ! '
  '19':
  - type: text
    content: 'Les cadets des chefs des provinces et l''armée qui les suivait sortirent de la ville. '
  '2':
  - type: text
    content: 'Il envoya dans la ville des messagers à Achab, roi d''Israël, '
  '20':
  - type: note
    content: 'des chars  : litt. des équipages ou des attelages (de chars).'
  - type: text
    content: 'Ils abattirent chacun son homme, et les Araméens prirent la fuite. Israël les poursuivit. Ben-Hadad, roi d''Aram, s''échappa sur un cheval, avec des chars. '
  '21':
  - type: note
    content: 'abattit  : litt. frappa (LXX et il prit) les chevaux et les chars.'
  - type: text
    content: Le roi d'Israël sortit, abattit les chevaux et mit à mal les chars ; il infligea aux Araméens une grande défaite.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'vois bien  : litt. sache et vois v. 7+. –  à l''année nouvelle  : litt. au retour de l''année , c.-à-d. au printemps (cf. 2S 11.1), de même au v. 26.'
  - type: text
    content: 'Alors le prophète s''approcha du roi d''Israël et lui dit : Va, sois fort, vois bien ce que tu as à faire ; à l''année nouvelle, le roi d''Aram viendra t''attaquer.'
  - type: heading
    content: Seconde victoire et faute d'Achab
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'nous verrons bien  : sous-entendu dans le texte.'
  - type: text
    content: 'Les hommes du roi d''Aram lui dirent : Leur dieu est un dieu des montagnes ; c''est pourquoi ils ont été plus forts que nous. Combattons-les plutôt sur le plateau ; nous verrons bien si nous ne sommes pas plus forts qu''eux ! '
  '24':
  - type: note
    content: gouverneurs 10.15n.
  - type: text
    content: 'Fais encore ceci : ôte tous les rois de leur poste et remplace-les par des gouverneurs. '
  '25':
  - type: note
    content: 'forme-toi  : litt. mesure pour toi. –  que tu as perdue  : litt. qui est tombée de toi. –  Il les écouta  : litt. il écouta leur voix.'
  - type: text
    content: Toi-même, forme-toi une armée pareille à celle que tu as perdue, cheval pour cheval et char pour char. Puis nous les combattrons sur le plateau ; nous verrons bien si nous ne sommes pas plus forts qu'eux ! Il les écouta et fit ainsi.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Apheq  : soit sur le territoire de la tribu d''Aser (Jos 19.30), soit à l''est de la mer de Galilée, en un lieu appelé actuellement Fiq et dont le nom conserverait le souvenir d’ Apheq.'
  - type: text
    content: 'A l''année nouvelle, Ben-Hadad passa les Araméens en revue et monta vers Apheq pour faire la guerre à Israël. '
  '27':
  - type: note
    content: 'deux petits troupeaux de chèvres  : l''expression hébraïque rendue ainsi ne se trouve qu''ici.'
  - type: text
    content: Les Israélites aussi furent passés en revue, ils reçurent des vivres et marchèrent à leur rencontre. Les Israélites dressèrent leur camp en face d'eux, semblables à deux petits troupeaux de chèvres, tandis que les Araméens remplissaient le pays.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme de Dieu  : sans doute le prophète des v. 13,22. –  vous saurez  : LXX tu sauras.'
  - type: text
    content: 'L''homme de Dieu s''approcha et dit au roi d''Israël : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Parce que les Araméens ont dit : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est un dieu des montagnes et non un dieu des vallées », je te livrerai toute cette grande multitude, et vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '29':
  - type: note
    content: 'abattirent  : litt. frappèrent.'
  - type: text
    content: 'Ils campèrent sept jours les uns en face des autres. Le septième jour, le combat s''engagea, et les Israélites abattirent parmi les Araméens cent mille fantassins en un jour. '
  '3':
  - type: note
    content: 'les plus beaux  : litt. bons  ; LXX porte simplement tes fils.'
  - type: text
    content: 'et lui fit dire : Ainsi parle Ben-Hadad : Ton argent et ton or m''appartiennent ; tes femmes et tes fils les plus beaux m''appartiennent. '
  '30':
  - type: note
    content: 'où il se cachait de pièce en pièce  : traduction incertaine (litt. une pièce dans une pièce) ; on pourrait aussi comprendre où il se cacha dans une pièce retirée (cf. 22.25/ / ; 2R 9.2).'
  - type: text
    content: Ceux qui restaient s'enfuirent à Apheq, dans la ville, et la muraille tomba sur vingt-sept mille hommes qui restaient.
  - type: text
    content: 'Ben-Hadad s''était enfui ; il arriva dans la ville où il se cachait de pièce en pièce. '
  '31':
  - type: note
    content: 'loyaux  : litt. des rois fidèles. –  sac  : signe de deuil. –  une corde autour de la tête  : d''après Flavius Josèphe, ce serait une forme antique de supplication chez les Syriens.'
  - type: text
    content: 'Ses hommes lui dirent : Nous avons appris que les rois de la maison d''Israël sont loyaux ; nous allons mettre un sac comme un pagne autour des reins et une corde autour de la tête, et nous sortirons vers le roi d''Israël : peut-être te laissera-t-il la vie sauve. '
  '32':
  - type: text
    content: 'Ils mirent un sac comme un pagne autour des reins et une corde autour de la tête, et ils vinrent trouver le roi d''Israël. Ils dirent : Ben-Hadad, ton serviteur, a dit : « Laisse-moi la vie, je t''en prie ! » Achab répondit : Il est encore en vie ? Il est mon frère. '
  '33':
  - type: note
    content: 'Les hommes…  : le texte présente des variantes d''après les mss et le sens de la fin du v. est incertain. –  sur son char  : litt. sur le char.'
  - type: text
    content: 'Les hommes virent là un bon augure ; ils se hâtèrent de le prendre au mot en disant : Ben-Hadad est ton frère ! Il dit : Allez, amenez-le. Ben-Hadad sortit vers lui, et Achab le fit monter sur son char. '
  '34':
  - type: note
    content: 'tu auras des comptoirs  : litt. tu placeras des rues. On pense qu''il s''agit de rues affectées au commerce. L''emprise de la Syrie sur Israël semble remonter à Basha, voir 15.20. –  dit Achab  : sous-entendu dans le texte. – Voir alliance.'
  - type: text
    content: 'Ben-Hadad lui dit : Je te rendrai les villes que mon père a prises à ton père ; et tu auras des comptoirs à Damas, comme mon père en avait à Samarie. – Alors, dit Achab, moi, je te laisserai repartir, avec une alliance. Il conclut une alliance pour lui et le laissa repartir.'
  - type: heading
    content: Un prophète dénonce la faute d'Achab
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'L''un des prophètes  : litt. un homme des fils des prophètes . Il s''agit d''une communauté de prophètes ; cf. 1S 10.5 ; 2R 2.3,5,7,15 ; 4.38 ; 5.22.'
  - type: text
    content: 'L''un des prophètes dit à son compagnon, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Frappe-moi, je te prie ! Mais l''homme refusa de le frapper. '
  '36':
  - type: note
    content: 'tuera… tua  : litt. frappera… frappa, même verbe qu''aux v. 35,37. –  il rencontra un lion  : litt. le lion le trouva  ; cf. 13.24.'
  - type: text
    content: 'Alors il lui dit : Parce que tu n''as pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', quand tu m''auras quitté, un lion te tuera. Après l''avoir quitté, il rencontra un lion qui le tua.'
  '37':
  - type: text
    content: 'Il trouva un autre homme et lui dit : Frappe-moi, je te prie ! L''homme le frappa ; il le frappa et le blessa. '
  '38':
  - type: note
    content: 'un bandeau  : autres traductions un bandage ; un turban  ; Vg de la cendre.'
  - type: text
    content: Le prophète alla se tenir sur le chemin du roi. Il s'était masqué avec un bandeau sur les yeux.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''étais avancé  : litt. j''étais sorti , verbe souvent employé dans les récits de campagnes militaires. –  s''est écarté  : autre traduction a quitté les rangs . –  un talent  : voir mesures, poids et monnaies.'
  - type: text
    content: 'Lorsque le roi passa, il lui cria : Je m''étais avancé dans le combat, lorsqu''un homme s''est écarté et m''a amené un homme, en disant : « Garde cet homme ; s''il est porté manquant, ta vie répondra de sa vie, ou tu paieras un talent d''argent ! » '
  '4':
  - type: text
    content: 'Le roi d''Israël répondit : O roi, mon seigneur, selon ta parole, je t''appartiens avec tout ce que j''ai. '
  '40':
  - type: text
    content: 'Pendant que j''étais occupé çà et là, l''homme a disparu. Le roi d''Israël lui dit : C''est là ton jugement ; tu l''as prononcé toi-même. '
  '41':
  - type: text
    content: 'Aussitôt le prophète retira le bandeau de ses yeux, et le roi d''Israël le reconnut pour l''un des prophètes. '
  '42':
  - type: note
    content: 'laissé échapper  : litt. renvoyé de la main ou, selon certains témoins, de ma main  ; certaines versions anciennes ont compris  : de ta main. –  l''homme que j''avais frappé d''anathème  : litt. l''homme de mon anathème  ; cf. 9.21 ; Dt 2.34n.'
  - type: text
    content: 'Il dit alors au roi : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Parce que tu as laissé échapper l''homme que j''avais frappé d''anathème, ta vie répondra de sa vie et ton peuple de son peuple. '
  '43':
  - type: note
    content: maussade, de mauvaise humeur 21.4 ; cf. Gn 40.6n  ; Pr 19.3n.
  - type: text
    content: Le roi d'Israël s'en alla chez lui maussade, de mauvaise humeur ; il arriva à Samarie.
  '5':
  - type: text
    content: 'Les messagers revinrent et dirent : Ainsi parle Ben-Hadad : Je t''ai fait dire : Tu me livreras ton argent et ton or, tes femmes et tes fils. '
  '6':
  - type: note
    content: 'hommes et gens de (ta) cour traduisent le même mot hébreu (litt. serviteurs). –  ce qui a de la valeur à tes yeux  : cf. Ez 24.16,21,25. LXX ce qui a de la valeur à leurs yeux.'
  - type: text
    content: Je t'enverrai donc mes hommes demain, à cette heure-ci ; ils fouilleront ta maison et les maisons des gens de ta cour, ils mettront la main sur tout ce qui a de la valeur à tes yeux, et ils le prendront.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Constatez  : litt. sachez et voyez  ; autre traduction vous voyez bien  ; même formule au v. 22 ( vois bien ) ; 1S 12.17 ; 14.38 ; 24.12 ; 2R 5.7 ; voir aussi 1S 23.22s ; Jr 5.1. –  cet homme nous veut du mal  : litt. celui-ci cherche le mal . –  des messagers  : sous-entendu dans le texte. –  mon argent et mon or…  : certaines versions anciennes ont compris  : bien que je ne lui aie pas refusé mon argent et mon or.'
  - type: text
    content: 'Le roi d''Israël appela tous les anciens du pays et leur dit : Constatez, je vous prie, que cet homme nous veut du mal ; il a envoyé des messagers pour me demander mes femmes et mes fils, mon argent et mon or, et je ne lui ai rien refusé ! '
  '8':
  - type: text
    content: 'Tous les anciens et tout le peuple dirent à Achab : Ne l''écoute pas, ne consens pas. '
  '9':
  - type: note
    content: 'ce que tu m''as demandé  : litt. ce pour quoi tu as envoyé.'
  - type: text
    content: 'Il dit alors aux messagers de Ben-Hadad : Dites à mon seigneur le roi : Je ferai tout ce que tu m''as demandé la première fois ; mais cela, je ne peux pas le faire. Les messagers s''en allèrent et lui portèrent la réponse.'
