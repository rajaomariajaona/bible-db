    marker-yv: yv-n
  - type: text
    text: 'Alors le prophète s''approcha du roi d''Israël et lui dit : Va, sois fort, vois bien ce que tu as à faire ; à l''année nouvelle, le roi d''Aram viendra t''attaquer.'
- type: usfm
  marker: s1
