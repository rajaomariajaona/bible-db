      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il écouta leur voix.
    marker-yv: yv-n
  - type: text
    text: Toi-même, forme-toi une armée pareille à celle que tu as perdue, cheval pour cheval et char pour char. Puis nous les combattrons sur le plateau ; nous verrons bien si nous ne sommes pas plus forts qu'eux ! Il les écouta et fit ainsi.
- type: usfm
  marker: p
