    marker-yv: yv-n
  - type: text
    text: 'Ben-Hadad, roi d''Aram, rassembla toute son armée ; il avait avec lui trente-deux rois, des chevaux et des chars. Il se mit en campagne, assiégea Samarie et lui fit la guerre. '
