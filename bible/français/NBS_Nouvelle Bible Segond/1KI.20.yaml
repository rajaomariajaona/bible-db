    marker-yv: yv-n
  - type: text
    text: 'Il dit alors aux messagers de Ben-Hadad : Dites à mon seigneur le roi : Je ferai tout ce que tu m''as demandé la première fois ; mais cela, je ne peux pas le faire. Les messagers s''en allèrent et lui portèrent la réponse.'
