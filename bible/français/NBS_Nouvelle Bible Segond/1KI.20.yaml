    marker-yv: yv-n
  - type: text
    text: 'Alors il lui dit : Parce que tu n''as pas écouté le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', quand tu m''auras quitté, un lion te tuera. Après l''avoir quitté, il rencontra un lion qui le tua.'
