  - type: text
    text: Seconde victoire et faute d'Achab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous verrons bien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Les hommes du roi d''Aram lui dirent : Leur dieu est un dieu des montagnes ; c''est pourquoi ils ont été plus forts que nous. Combattons-les plutôt sur le plateau ; nous verrons bien si nous ne sommes pas plus forts qu''eux ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gouverneurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Fais encore ceci : ôte tous les rois de leur poste et remplace-les par des gouverneurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
