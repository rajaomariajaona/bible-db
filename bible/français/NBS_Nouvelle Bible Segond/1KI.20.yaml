      - type: text
        text: '20.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: abattirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappèrent.
    marker-yv: yv-n
  - type: text
    text: 'Ils campèrent sept jours les uns en face des autres. Le septième jour, le combat s''engagea, et les Israélites abattirent parmi les Araméens cent mille fantassins en un jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où il se cachait de pièce en pièce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une pièce dans une pièce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'où il se cacha dans une pièce retirée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 22.25/ / ; 2R 9.2).
    marker-yv: yv-n
  - type: text
    text: Ceux qui restaient s'enfuirent à Apheq, dans la ville, et la muraille tomba sur vingt-sept mille hommes qui restaient.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Ben-Hadad s''était enfui ; il arriva dans la ville où il se cachait de pièce en pièce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
