    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je m'étais avancé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
