  - type: text
    text: 'Ben-Hadad fit dire à Achab : Que les dieux me fassent ceci et qu''ils y ajoutent cela, si la poussière de Samarie suffit à remplir le creux de la main de toutes les troupes qui sont sur mes pas ! '
