    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après Flavius '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Josèphe
      - type: text
        text: ', ce serait une forme antique de supplication chez les Syriens.'
    marker-yv: yv-n
  - type: text
    text: 'Ses hommes lui dirent : Nous avons appris que les rois de la maison d''Israël sont loyaux ; nous allons mettre un sac comme un pagne autour des reins et une corde autour de la tête, et nous sortirons vers le roi d''Israël : peut-être te laissera-t-il la vie sauve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils mirent un sac comme un pagne autour des reins et une corde autour de la tête, et ils vinrent trouver le roi d''Israël. Ils dirent : Ben-Hadad, ton serviteur, a dit : « Laisse-moi la vie, je t''en prie ! » Achab répondit : Il est encore en vie ? Il est mon frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les hommes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte présente des variantes d''après les mss et le sens de la fin du v. est incertain. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur son char
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur le char.
    marker-yv: yv-n
  - type: text
    text: 'Les hommes virent là un bon augure ; ils se hâtèrent de le prendre au mot en disant : Ben-Hadad est ton frère ! Il dit : Allez, amenez-le. Ben-Hadad sortit vers lui, et Achab le fit monter sur son char. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu auras des comptoirs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu placeras des rues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. On pense qu''il s''agit de rues affectées au commerce. L''emprise de la Syrie sur Israël semble remonter à Basha, voir 15.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dit Achab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ben-Hadad lui dit : Je te rendrai les villes que mon père a prises à ton père ; et tu auras des comptoirs à Damas, comme mon père en avait à Samarie. – Alors, dit Achab, moi, je te laisserai repartir, avec une alliance. Il conclut une alliance pour lui et le laissa repartir.'
