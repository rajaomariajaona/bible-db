  - type: text
    text: 'Le roi d''Israël appela tous les anciens du pays et leur dit : Constatez, je vous prie, que cet homme nous veut du mal ; il a envoyé des messagers pour me demander mes femmes et mes fils, mon argent et mon or, et je ne lui ai rien refusé ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les anciens et tout le peuple dirent à Achab : Ne l''écoute pas, ne consens pas. '
  - type: usfm
