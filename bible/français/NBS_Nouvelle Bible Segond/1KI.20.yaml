    marker-yv: yv-n
  - type: text
    text: 'et lui fit dire : Ainsi parle Ben-Hadad : Ton argent et ton or m''appartiennent ; tes femmes et tes fils les plus beaux m''appartiennent. '
  - type: usfm
    marker: vlbl
