      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le roi passa, il lui cria : Je m''étais avancé dans le combat, lorsqu''un homme s''est écarté et m''a amené un homme, en disant : « Garde cet homme ; s''il est porté manquant, ta vie répondra de sa vie, ou tu paieras un talent d''argent ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Pendant que j''étais occupé çà et là, l''homme a disparu. Le roi d''Israël lui dit : C''est là ton jugement ; tu l''as prononcé toi-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Aussitôt le prophète retira le bandeau de ses yeux, et le roi d''Israël le reconnut pour l''un des prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: laissé échapper
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'renvoyé de la main '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains témoins, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ma main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certaines versions anciennes ont compris'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ta main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'homme que j'avais frappé d'anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'homme de mon anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 9.21 ; Dt 2.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit alors au roi : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Parce que tu as laissé échapper l''homme que j''avais frappé d''anathème, ta vie répondra de sa vie et ton peuple de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maussade, de mauvaise humeur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.4 ; cf. Gn 40.6
      - type: usfm
        marker: ord
        children:
        - type: text
