        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : soit sur le territoire de la tribu d''Aser (Jos 19.30), soit à l''est de la mer de Galilée, en un lieu appelé actuellement Fiq et dont le nom conserverait le souvenir d’'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Apheq.
    marker-yv: yv-n
  - type: text
    text: 'A l''année nouvelle, Ben-Hadad passa les Araméens en revue et monta vers Apheq pour faire la guerre à Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux petits troupeaux de chèvres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''expression hébraïque rendue ainsi ne se trouve qu''ici.'
    marker-yv: yv-n
  - type: text
    text: Les Israélites aussi furent passés en revue, ils reçurent des vivres et marchèrent à leur rencontre. Les Israélites dressèrent leur camp en face d'eux, semblables à deux petits troupeaux de chèvres, tandis que les Araméens remplissaient le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
