    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'faiblesse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cf. 11.30+ ; voir aussi 4.7 ; 13.4 ; Rm 5.3 ; 1Co 1.24s ; le mot traduit par '
    - type: usfm
      marker: fq
