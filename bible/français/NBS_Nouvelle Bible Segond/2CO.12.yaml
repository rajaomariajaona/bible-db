  - type: text
    text: 'Si je voulais faire le fier, je ne serais pas déraisonnable, car je dirais la vérité ; mais je m''en abstiens, de peur que quelqu''un ne m''estime au-dessus de ce qu''il voit ou entend de moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à cause…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on pourrait aussi rattacher les premiers mots à ce qui suit et traduire'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'afin que je ne sois pas trop orgueilleux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: afin que je ne m'élève pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
