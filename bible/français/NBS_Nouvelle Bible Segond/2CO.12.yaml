    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une écharde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 33.55 ; Ez 28.24 ; il pourrait s''agir ici d''une maladie ou d''une infirmité de Paul ; voir aussi Ga 4.13-15 ; 6.17 ; voir aussi '
    - type: usfm
      marker: fq
