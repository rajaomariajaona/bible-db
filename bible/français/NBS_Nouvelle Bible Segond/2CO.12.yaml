document_id: 2CO.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Visions et révélations accordées à Paul
  - type: text
    content: ' '
  - type: note
    content: 'faire le fier 10.8+. –  visions Ac 16.9s ; 18.9 ; 22.17s ; 23.11 ; 26.19 ; cf. Lc 24.23n. –  révélations du Seigneur  : cf. Ac 9.5+ ; 1Co 9.1 ; 15.8 ; Ga 1.12+.'
  - type: text
    content: 'Il faut faire le fier… certes, c''est inutile, mais j''en viendrai aux visions et aux révélations du Seigneur. '
  '10':
  - type: note
    content: 1Co 4.11+. –  désarrois ou privations, cf. 6.4 ; 8.13. –  je suis fort ou je suis puissant Ph 4.13.
  - type: text
    content: Aussi je me plais dans les faiblesses, dans les outrages, dans les désarrois, dans les persécutions et les angoisses, pour le Christ ; en effet, c'est quand je suis faible que je suis fort.
  - type: heading
    content: Soucis de Paul pour les Corinthiens
  '11':
  - type: text
    content: ' '
  - type: note
    content: déraisonnable 11.1n. –  recommandé 3.1+. –  super-apôtres 11.5n.
  - type: text
    content: 'J''ai été déraisonnable : vous m''y avez contraint. En effet, c''est moi qui aurais dû être recommandé par vous. Car je n''ai été en rien inférieur à ces super-apôtres, bien que je ne sois rien. '
  '12':
  - type: note
    content: persévérance 1.6n  ; Col 1.11. –  signes (le même mot est traduit par signes distinctifs au début du v.) / prodiges / miracles (proprement actes de puissance, Mc 6.2n) Ac 2.19+ ; Rm 15.19 ; Hé 2.4 ; voir aussi 1Co 2.4+ ; 12.10n.
  - type: text
    content: 'Les signes distinctifs de l''apôtre ont été produits parmi vous, avec une persévérance à toute épreuve, par des signes, des prodiges et des miracles. '
  '13':
  - type: note
    content: 7.2. –  les autres Eglises 11.7ss. –  Faites-moi grâce 2.7+.
  - type: text
    content: Qu'avez-vous eu de moins que les autres Eglises, sinon que, moi, je ne vous ai pas été à charge ? Faites-moi grâce de cette injustice-là !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la troisième fois  : cf. 13.1s ; voir aussi 1.15s+. –  c''est vous que je cherche…  : cf. Ph 4.17. –  mettre de côté  : litt. amasser des trésors (le mot grec a donné notre verbe thésauriser ).'
  - type: text
    content: 'Me voici prêt à venir vous voir pour la troisième fois, et je ne vous serai pas à charge ; car c''est vous que je cherche, et non pas ce qui est à vous. Ce n''est pas, en effet, aux enfants à mettre de côté pour les parents, mais aux parents pour les enfants. '
  '15':
  - type: note
    content: 'Ph 2.17. –  pour vous  : autres traductions pour vos âmes ou pour votre vie, cf. 1.23 ; Mt 10.28n  ; Hé 13.17n  ; 1P 1.9+. –  Si je vous aime  : autre traduction, appuyée par certains mss  : même si, en vous aimant davantage, je suis moins aimé de vous.'
  - type: text
    content: Quant à moi, je ferai très volontiers des dépenses, et je me dépenserai moi-même pour vous. Si je vous aime davantage, serai-je moins aimé de vous ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'perfide  : terme apparenté à celui qui est traduit par ruse en 4.2 ; 11.3 ; c''est un synonyme qui est rendu ici par ruse . –  pris  : autre traduction grugé , cf. 11.20n.'
  - type: text
    content: 'Soit ! Moi-même, je n''ai pas été un fardeau pour vous ; mais, en homme perfide, je vous aurais pris par ruse ! '
  '17':
  - type: note
    content: V. 13+.
  - type: text
    content: 'Vous ai-je exploité par quelqu''un de ceux que je vous ai envoyés ? '
  '18':
  - type: note
    content: 'Tite 2.13+. –  à aller chez vous  : sous-entendu dans le texte grec 8.6,17. –  le frère  : voir 8.18,22n. – Voir esprit. –  sur les mêmes traces Rm 4.12+.'
  - type: text
    content: 'J''ai encouragé Tite à aller chez vous, et avec lui j''ai envoyé le frère : Tite vous a-t-il exploités ? N''avons-nous pas marché avec le même esprit, sur les mêmes traces ?'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'présenter notre défense  : cf. 3.1+ ; 1Co 9.3. –  devant Dieu, dans le Christ 2.17. –  pour vous construire ou vous édifier 10.8n  ; Rm 14.19n.'
  - type: text
    content: 'Vous vous imaginez depuis longtemps que nous sommes en train de présenter notre défense devant vous. C''est devant Dieu, dans le Christ, que nous parlons ; et tout cela, bien-aimés, nous le faisons pour vous construire. '
  '2':
  - type: note
    content: 'un homme dans le Christ  : par cette formule, Paul, tout en parlant de lui-même, distingue ici l''expérience qu''il décrit, en relation avec le Christ, de son existence ordinaire (v. 5) ; cf. 10.17. –  voici quatorze ans  : cf. Ga 2.1 ; cette indication situe peut-être l''événement au cours de la période que Paul a passée à Tarse (cf. Ac 9.30 ; 11.25) ou à Antioche (cf. Ac 11.26 ; 13.1). –  Dieu le sait 11.11. –  enlevé  : même verbe v. 4 ; cf. 1R 18.12 ; 2R 2.10-16 ; Ez 3.12 ; 24.11 ; Ac 8.39+ ; 1Th 4.17 ; Ap 12.5. –  troisième ciel  : la littérature juive a distingué cinq (3 Baruch), sept (Testament de Lévi) ou dix (1 Hénoch) cieux.'
  - type: text
    content: 'Je connais un homme dans le Christ… voici quatorze ans – était-ce dans son corps ? je ne sais pas ; était-ce hors de son corps ? je ne sais pas, Dieu le sait – un tel homme fut enlevé jusqu''au troisième ciel. '
  '20':
  - type: note
    content: 'Cf. 10.11+ ; 13.2. –  disputes… Rm 1.29+ ; voir aussi 2.8 ; 1Co 1.11. –  ambitions personnelles ou rivalités, cf. Rm 2.8n. –  médisances 1P 2.1. –  de l''orgueil  : le substantif grec est apparenté au verbe traduit par (se) gonfler d''orgueil en 1Co 4.6n.'
  - type: text
    content: 'Car je crains de ne pas vous trouver, à mon arrivée, tels que je voudrais, et que vous ne me trouviez pas non plus tel que vous voudriez. Je crains qu''il n''y ait des disputes, des passions jalouses, des animosités, des ambitions personnelles, des médisances, des racontars, de l''orgueil, des désordres. '
  '21':
  - type: note
    content: 'pleurer  : litt. prendre le deuil. –  ceux qui ont péché précédemment 13.2 ; cf. 1Co 5.1. –  ne sont pas revenus ou n''ont pas changé radicalement, ne se sont pas repentis ou convertis, cf. 7.9n. –  impureté  : voir pur, impur. –  inconduite sexuelle 1Co 5.1n.'
  - type: text
    content: Je crains qu'à mon arrivée, mon Dieu ne m'humilie encore à votre sujet, et que je n'aie à pleurer sur beaucoup de ceux qui ont péché précédemment et qui ne sont pas revenus de tout ce qu'ils ont pratiqué, impureté, inconduite sexuelle et autres débauches.
  '3':
  - type: text
    content: 'Et je sais qu''un tel homme – était-ce dans son corps ou sans son corps ? je ne sais pas, Dieu le sait – '
  '4':
  - type: note
    content: 'au paradis  : cf. Gn 2.8n  ; Lc 23.43n  ; Ap 2.7 ; 3 Baruch situe l''arbre de l''Eden au troisième ciel (voir 12.2n). –  paroles ineffables…  : cf. 1Co 2.9.'
  - type: text
    content: 'fut enlevé au paradis et qu''il entendit des paroles ineffables, qu''il n''est pas permis à un homme d''énoncer. '
  '5':
  - type: note
    content: faiblesses 11.30+.
  - type: text
    content: Je serai fier d'un tel homme, mais de moi-même je ne serai pas fier – sinon de mes faiblesses.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'fier 10.8+. –  déraisonnable 11.1n,16ss. –  je m''en abstiens  : le même verbe est traduit par ménager en 1.23 ; 13.2.'
  - type: text
    content: 'Si je voulais faire le fier, je ne serais pas déraisonnable, car je dirais la vérité ; mais je m''en abstiens, de peur que quelqu''un ne m''estime au-dessus de ce qu''il voit ou entend de moi, '
  '7':
  - type: note
    content: 'à cause…  : on pourrait aussi rattacher les premiers mots à ce qui suit et traduire  : afin que je ne sois pas trop orgueilleux (litt. afin que je ne m''élève pas) à cause de l''excellence de ces révélations, il m''a été mis… –  une écharde  : cf. Nb 33.55 ; Ez 28.24 ; il pourrait s''agir ici d''une maladie ou d''une infirmité de Paul ; voir aussi Ga 4.13-15 ; 6.17 ; voir aussi chair. –  un ange de Satan (voir démon, diable, Satan) Mt 25.41 ; Ap 12.7,9. –  me frapper  : le même verbe est traduit donner des coups de poing en Mt 26.67/ /.'
  - type: text
    content: 'à cause de l''excellence de ces révélations. Aussi, pour que je ne sois pas trop orgueilleux, il m''a été donné une écharde dans la chair, un ange de Satan pour me frapper – pour que je ne sois pas trop orgueilleux. '
  '8':
  - type: note
    content: Cf. Mt 26.39-44/ /.
  - type: text
    content: 'Trois fois j''ai supplié le Seigneur de l''éloigner de moi, '
  '9':
  - type: note
    content: 'Voir grâce. –  puissance / faiblesse cf. 11.30+ ; voir aussi 4.7 ; 13.4 ; Rm 5.3 ; 1Co 1.24s ; le mot traduit par faiblesse a aussi le sens de maladie. –  repose sur moi  : autre traduction me couvre comme une tente, cf. Ap 7.15n (verbe apparenté).'
  - type: text
    content: 'et il m''a dit : « Ma grâce te suffit, car ma puissance s''accomplit dans la faiblesse. »'
  - type: text
    content: 'Je mettrai donc bien plus volontiers ma fierté dans mes faiblesses, pour que la puissance du Christ repose sur moi. '
