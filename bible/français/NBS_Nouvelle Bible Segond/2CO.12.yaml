    marker-yv: yv-n
  - type: text
    text: 'Je connais un homme dans le Christ… voici quatorze ans – était-ce dans son corps ? je ne sais pas ; était-ce hors de son corps ? je ne sais pas, Dieu le sait – un tel homme fut enlevé jusqu''au troisième ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et je sais qu''un tel homme – était-ce dans son corps ou sans son corps ? je ne sais pas, Dieu le sait – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au paradis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 2.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 23.43'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ap 2.7 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '3 Baruch '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: situe l'arbre de l'Eden au troisième ciel (voir 12.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: paroles ineffables…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1Co 2.9.'
    marker-yv: yv-n
  - type: text
    text: 'fut enlevé au paradis et qu''il entendit des paroles ineffables, qu''il n''est pas permis à un homme d''énoncer. '
  - type: usfm
