    marker-yv: yv-n
  - type: text
    text: 'à cause de l''excellence de ces révélations. Aussi, pour que je ne sois pas trop orgueilleux, il m''a été donné une écharde dans la chair, un ange de Satan pour me frapper – pour que je ne sois pas trop orgueilleux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mt 26.39-44/ /.
    marker-yv: yv-n
  - type: text
    text: 'Trois fois j''ai supplié le Seigneur de l''éloigner de moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'puissance '
    - type: usfm
      marker: ft
      children:
      - type: text
