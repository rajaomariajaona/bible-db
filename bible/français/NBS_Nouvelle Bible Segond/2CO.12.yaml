  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un homme dans le Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : par cette formule, Paul, tout en parlant de lui-même, distingue ici l''expérience qu''il décrit, en relation avec le Christ, de son existence ordinaire (v. 5) ; cf. 10.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voici quatorze ans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ga 2.1 ; cette indication situe peut-être l''événement au cours de la période que Paul a passée à Tarse (cf. Ac 9.30 ; 11.25) ou à Antioche (cf. Ac 11.26 ; 13.1). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu le sait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: enlevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe v. 4 ; cf. 1R 18.12 ; 2R 2.10-16 ; Ez 3.12 ; 24.11 ; Ac 8.39+ ; 1Th 4.17 ; Ap 12.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: troisième ciel
    - type: usfm
      marker: ft
      children:
      - type: text
