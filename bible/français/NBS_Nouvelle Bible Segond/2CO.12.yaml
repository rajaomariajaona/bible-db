    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ap 7.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' (verbe apparenté).'
    marker-yv: yv-n
  - type: text
    text: 'et il m''a dit : « Ma grâce te suffit, car ma puissance s''accomplit dans la faiblesse. »'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je mettrai donc bien plus volontiers ma fierté dans mes faiblesses, pour que la puissance du Christ repose sur moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 4.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'désarrois '
    - type: usfm
