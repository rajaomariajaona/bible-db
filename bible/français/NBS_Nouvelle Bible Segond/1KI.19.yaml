document_id: 1KI.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elie s'enfuit
  - type: text
    content: ' '
  - type: note
    content: 'raconta à Jézabel  : cf. 16.29,31. –  comment il avait tué…  : cf. 18.40.'
  - type: text
    content: 'Achab raconta à Jézabel tout ce qu''avait fait Elie, et comment il avait tué par l''épée tous les prophètes. '
  '10':
  - type: note
    content: 'le Seigneur … des Armées  : cf. 1S 1.3n  ; 2S 5.10 ; 7.26+. –  ont abandonné ton alliance  : LXX t''ont abandonné.'
  - type: text
    content: 'Il répondit : J''ai montré une passion jalouse pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées ; car les Israélites ont abandonné ton alliance, ils ont rasé tes autels, ils ont tué tes prophètes par l''épée ; moi, je suis resté, seul, et ils cherchent à me prendre la vie ! '
  '11':
  - type: note
    content: 'Or le Seigneur passait  : autre traduction le Seigneur va passer.'
  - type: text
    content: 'Il reprit : Sors et tiens-toi dans la montagne, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Or le '
  - type: text
    content: Seigneur
  - type: text
    content: ' passait. Un grand vent, violent, arrachait les montagnes et brisait les rochers devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''était pas dans le vent. Après le vent, ce fut un tremblement de terre : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''était pas dans le tremblement de terre. '
  '12':
  - type: note
    content: 'Cf. 18.24n,38. –  un calme, une voix ténue  : autres traductions une voix légère, comme un silence ; une voix, un silence subtil.'
  - type: text
    content: 'Après le tremblement de terre, un feu : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''était pas dans le feu. Enfin, après le feu, un calme, une voix ténue. '
  '13':
  - type: note
    content: 'il s''enveloppa le visage  : on ne doit pas voir Dieu, sous peine de mourir ; cf. Gn 32.31 ; Ex 20.19 ; 33.20 ; Dt 4.33 ; 5.24-26 ; Jg 6.22s ; 13.22 ; Es 6.5. –  son manteau  : le mot désigne un vêtement d''apparat (Jon 3.6) ou le vêtement caractéristique du prophète, comme au v. 19 ; 2R 2.8ss ; Za 13.4.'
  - type: text
    content: 'Quand Elie l''entendit, il s''enveloppa le visage de son manteau, sortit et se tint à l''entrée de la grotte. Soudain une voix lui dit : Que fais-tu ici, Elie ? '
  '14':
  - type: note
    content: 'ont abandonné ton alliance  : des versions anciennes ont lu t''ont abandonné, cf. v. 10n.'
  - type: text
    content: 'Il répondit : J''ai montré une passion jalouse pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées ; car les Israélites ont abandonné ton alliance, ils ont rasé tes autels, ils ont tué tes prophètes par l''épée ; moi, je suis resté, seul, et ils cherchent à me prendre la vie ! '
  '15':
  - type: note
    content: 'Damas en Syrie (ce pays correspondant en partie à ce que la Bible appelle Aram). –  Hazaël… roi sur Aram  : cf. 2R 8.7-15. Par cet ordre YHWH se pose en maître de l''histoire des peuples (et non pas seulement d''Israël).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Va, reprends ton chemin par le désert jusqu''à Damas ; quand tu seras arrivé, tu conféreras l''onction à Hazaël pour qu''il soit roi sur Aram. '
  '16':
  - type: note
    content: 'Jéhu… roi sur Israël  : cf. 2R 9–10. –  Elisée  : cf. v. 19-21 ; 2R 2–8. C''est ici la seule mention de l''onction d''un prophète. –  Abel-Mehola  : citée en 4.12 ; cf. Jg 7.22.'
  - type: text
    content: 'Tu conféreras l''onction à Jéhu, fils de Nimshi, pour qu''il soit roi sur Israël ; et tu conféreras l''onction à Elisée, fils de Shaphath, d''Abel-Mehola, pour qu''il soit prophète à ta place. '
  '17':
  - type: note
    content: 'l''épée d''Hazaël  : cf. 2R 8.12,29 ; 10.32s ; 13.3,22. –  Jéhu le fera mourir ou le mettra à mort  ; cf. 2R 10.18-25.'
  - type: text
    content: 'Celui qui échappera à l''épée d''Hazaël, Jéhu le fera mourir ; et celui qui échappera à l''épée de Jéhu, Elisée le fera mourir. '
  '18':
  - type: note
    content: 'je laisserai  : autre traduction j''ai laissé  ; LXX tu laisseras  ; la notion de « reste » qui affleure ici prendra une importance considérable avec l''exil (voir « Exils successifs à partir du VIIIe siècle av. J.-C. »♦ ; « L''Exil et la Bible »♦). – Voir Baal.'
  - type: text
    content: Mais je laisserai en Israël sept mille hommes, tous les genoux qui n'ont pas fléchi devant le Baal, toutes les bouches qui ne l'ont pas embrassé.
  - type: heading
    content: Elie désigne Elisée pour lui succéder
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Elie partit  : litt. il partit . –  Il y avait devant lui…  : on pourrait aussi comprendre  : il y avait devant lui douze arpents et il en était au douzième . –  jeta son manteau sur lui  : le manteau du prophète est le signe et l''instrument de son pouvoir, cf. 2R 2.7-14 ; voir aussi 1S 24.5+. On a aussi supposé, par analogie avec le pan du vêtement recouvrant la femme épousée (Rt 3.9n), que par ce geste Elie prend possession d''Elisée.'
  - type: text
    content: 'Elie partit de là et trouva Elisée, fils de Shaphath, qui labourait. Il y avait devant lui douze paires de bœufs, et il était avec la douzième. Elie passa près de lui et jeta son manteau sur lui. '
  '2':
  - type: note
    content: 'Que les dieux fassent…  : cf. 2.23 ; 1S 3.17 ; 14.44 ; 20.13 ; 2R 6.31 etc.'
  - type: text
    content: 'Jézabel envoya un messager à Elie, pour lui dire : Que les dieux fassent ceci et qu''ils y ajoutent cela, si demain, à cette heure-ci, je ne fais de ta vie ce que tu as fait de la vie de chacun d''eux ! '
  '20':
  - type: note
    content: 'Va et reviens…  : litt. va, reviens, car (ou mais) que t''ai-je fait ? On pourrait aussi comprendre  : va, retourne (chez toi), car je ne t''ai rien fait.'
  - type: text
    content: 'Elisée abandonna ses bœufs, courut après Elie et dit : Laisse-moi, je te prie, embrasser mon père et ma mère, et je te suis. Elie lui répondit : Va et reviens, à cause de ce que je t''ai fait. '
  '21':
  - type: note
    content: 'sacrifice  : cf. 1S 6.14 ; 2S 24.22. –  devint son auxiliaire 1.4n  ; 10.5 ; cf. Ex 24.13 ; 33.11 ; Nb 11.28 ; Jos 1.1.'
  - type: text
    content: Il s'éloigna d'Elie et prit une paire de bœufs qu'il offrit en sacrifice ; avec l'attelage des bœufs, il fit cuire la viande et la donna à manger au peuple. Puis il suivit Elie et devint son auxiliaire.
  '3':
  - type: note
    content: 'Elie, voyant cela…  : LXX, Syr et Tg ont lu Elie eut peur et s''en alla… –  s''en alla  : litt. se leva et s''en alla. –  pour sauver sa vie  : litt. pour sa vie (ou sa personne) ; sur le terme hébreu correspondant, voir Gn 1.20n.'
  - type: text
    content: 'Elie, voyant cela, s''en alla pour sauver sa vie. Il arriva à Bersabée, qui appartient à Juda, et il laissa là son serviteur. '
  '4':
  - type: note
    content: 'Cf. Jon 4.3+. –  il alla dans le désert…  : cf. Hé 11.38. –  Cela suffit ! Nb 16.3n.'
  - type: text
    content: 'Quant à lui, il alla dans le désert, à une journée de marche ; il s''assit sous un genêt et demanda la mort en disant : Cela suffit ! Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', prends ma vie, car je ne suis pas meilleur que mes pères. '
  '5':
  - type: note
    content: un messager ou un ange  ; LXX quelqu'un.
  - type: text
    content: 'Il se coucha et s''endormit sous un genêt. Soudain, un messager le toucha et lui dit : Lève-toi, mange ! '
  '6':
  - type: text
    content: 'Il regarda : il y avait à côté de lui une galette cuite sur des pierres chaudes et une cruche d''eau. Il mangea et but, puis se recoucha. '
  '7':
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' vint une seconde fois, le toucha et dit : Lève-toi, mange, car le chemin serait trop long pour toi. '
  '8':
  - type: note
    content: 'la force…  : litt. la force de cette nourriture. –  Horeb  : cf. Ex 3.1nss.'
  - type: text
    content: Il se leva, mangea et but ; avec la force que lui donna cette nourriture, il marcha quarante jours et quarante nuits jusqu'à la montagne de Dieu, l'Horeb.
  - type: heading
    content: Elie sur l'Horeb
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'la grotte  : comparer avec Ex 33.18ss.'
  - type: text
    content: 'Là-bas, il entra dans la grotte et y passa la nuit. Soudain la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui parvint, qui lui disait : Que fais-tu ici, Elie ? '
