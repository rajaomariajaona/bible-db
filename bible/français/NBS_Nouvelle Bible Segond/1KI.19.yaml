    marker-yv: yv-n
  - type: text
    text: 'Achab raconta à Jézabel tout ce qu''avait fait Elie, et comment il avait tué par l''épée tous les prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que les dieux fassent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.23 ; 1S 3.17 ; 14.44 ; 20.13 ; 2R 6.31 etc.'
    marker-yv: yv-n
  - type: text
    text: 'Jézabel envoya un messager à Elie, pour lui dire : Que les dieux fassent ceci et qu''ils y ajoutent cela, si demain, à cette heure-ci, je ne fais de ta vie ce que tu as fait de la vie de chacun d''eux ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elie, voyant cela…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Elie eut peur et s''en alla… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'en alla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se leva et s'en alla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour sauver sa vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa personne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; sur le terme hébreu correspondant, voir Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Elie, voyant cela, s''en alla pour sauver sa vie. Il arriva à Bersabée, qui appartient à Juda, et il laissa là son serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jon 4.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il alla dans le désert…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Hé 11.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cela suffit ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 16.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quant à lui, il alla dans le désert, à une journée de marche ; il s''assit sous un genêt et demanda la mort en disant : Cela suffit ! Maintenant, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', prends ma vie, car je ne suis pas meilleur que mes pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un messager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quelqu'un.
    marker-yv: yv-n
  - type: text
    text: 'Il se coucha et s''endormit sous un genêt. Soudain, un messager le toucha et lui dit : Lève-toi, mange ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il regarda : il y avait à côté de lui une galette cuite sur des pierres chaudes et une cruche d''eau. Il mangea et but, puis se recoucha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le messager du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vint une seconde fois, le toucha et dit : Lève-toi, mange, car le chemin serait trop long pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la force…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la force de cette nourriture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Horeb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 3.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss.
    marker-yv: yv-n
  - type: text
    text: Il se leva, mangea et but ; avec la force que lui donna cette nourriture, il marcha quarante jours et quarante nuits jusqu'à la montagne de Dieu, l'Horeb.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elie sur l'Horeb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la grotte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : comparer avec Ex 33.18ss.'
    marker-yv: yv-n
  - type: text
    text: 'Là-bas, il entra dans la grotte et y passa la nuit. Soudain la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui parvint, qui lui disait : Que fais-tu ici, Elie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' … des Armées'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 5.10 ; 7.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ont abandonné ton '
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: t'ont abandonné.
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : J''ai montré une passion jalouse pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu des Armées ; car les Israélites ont abandonné ton alliance, ils ont rasé tes autels, ils ont tué tes prophètes par l''épée ; moi, je suis resté, seul, et ils cherchent à me prendre la vie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Or le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' passait'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' va passer.'
    marker-yv: yv-n
  - type: text
    text: 'Il reprit : Sors et tiens-toi dans la montagne, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Or le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' passait. Un grand vent, violent, arrachait les montagnes et brisait les rochers devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n''était pas dans le vent. Après le vent, ce fut un tremblement de terre : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n''était pas dans le tremblement de terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 18.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un calme, une voix ténue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une voix légère, comme un silence ; une voix, un silence subtil.
    marker-yv: yv-n
  - type: text
    text: 'Après le tremblement de terre, un feu : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n''était pas dans le feu. Enfin, après le feu, un calme, une voix ténue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il s'enveloppa le visage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on ne doit pas voir Dieu, sous peine de mourir ; cf. Gn 32.31 ; Ex 20.19 ; 33.20 ; Dt 4.33 ; 5.24-26 ; Jg 6.22s ; 13.22 ; Es 6.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son manteau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot désigne un vêtement d''apparat (Jon 3.6) ou le vêtement caractéristique du prophète, comme au v. 19 ; 2R 2.8ss ; Za 13.4.'
    marker-yv: yv-n
  - type: text
    text: 'Quand Elie l''entendit, il s''enveloppa le visage de son manteau, sortit et se tint à l''entrée de la grotte. Soudain une voix lui dit : Que fais-tu ici, Elie ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ont abandonné ton alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: t'ont abandonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : J''ai montré une passion jalouse pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu des Armées ; car les Israélites ont abandonné ton alliance, ils ont rasé tes autels, ils ont tué tes prophètes par l''épée ; moi, je suis resté, seul, et ils cherchent à me prendre la vie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Damas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Syrie (ce pays correspondant en partie à ce que la Bible appelle '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hazaël… roi sur Aram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 8.7-15. Par cet ordre YHWH se pose en maître de l''histoire des peuples (et non pas seulement d''Israël).'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui dit : Va, reprends ton chemin par le désert jusqu''à Damas ; quand tu seras arrivé, tu conféreras l''onction à Hazaël pour qu''il soit roi sur Aram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jéhu… roi sur Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 9–10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elisée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 19-21 ; 2R 2–8. C''est ici la seule mention de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
      - type: text
        text: ' d''un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abel-Mehola
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : citée en 4.12 ; cf. Jg 7.22.'
    marker-yv: yv-n
  - type: text
    text: 'Tu conféreras l''onction à Jéhu, fils de Nimshi, pour qu''il soit roi sur Israël ; et tu conféreras l''onction à Elisée, fils de Shaphath, d''Abel-Mehola, pour qu''il soit prophète à ta place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'épée d'Hazaël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 8.12,29 ; 10.32s ; 13.3,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéhu le fera mourir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le mettra à mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2R 10.18-25.'
    marker-yv: yv-n
  - type: text
    text: 'Celui qui échappera à l''épée d''Hazaël, Jéhu le fera mourir ; et celui qui échappera à l''épée de Jéhu, Elisée le fera mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je laisserai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ai laissé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu laisseras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la notion de « reste » qui affleure ici prendra une importance considérable avec l''exil (voir « Exils successifs à partir du VIII'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' siècle av. J.-C. »♦ ; « L''Exil et la Bible »♦). – Voir '
