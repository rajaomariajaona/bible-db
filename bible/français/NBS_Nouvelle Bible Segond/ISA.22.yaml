document_id: ISA.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Avertissement à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  vallée de la vision  : LXX vallée de Sion. L''expression désigne probablement l''une des vallées que domine Jérusalem (celle-ci étant à l''évidence le principal objet de l''oracle) ; peut-être la vallée de Hinnom , nom assez proche par la graphie et qui a donné le mot géhenne (cf. 66.24n  ; Mt 5.22n). –  en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n.'
  - type: text
    content: Sentence sur la vallée de la vision.
  - type: text
    content: Pourquoi donc es-tu montée
  - type: text
    content: avec tout ton peuple sur les toits en terrasse,
  '10':
  - type: text
    content: vous comptez les maisons de Jérusalem
  - type: text
    content: et vous démolissez les maisons pour fortifier la muraille.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'bassin entre les deux murs  : il s''agit peut-être du réservoir de Siloé ; dans ce cas, ce v. ferait allusion aux travaux d''Ezéchias (2Ch 32.4,30 ; voir « L''inscription de Siloé »♦). –  vous ne voyez pas 5.12+. –  qui le façonne (ou qui le prépare  ; cf. 27.11 ; 37.26 ; 43.1+) depuis longtemps (litt. de loin ) : cf. 25.1.'
  - type: text
    content: Vous faites un bassin entre les deux murs,
  - type: text
    content: pour les eaux de l'ancien réservoir.
  - type: text
    content: Mais vous ne tournez pas vos regards vers celui qui fait cela,
  - type: text
    content: vous ne voyez pas celui qui le façonne depuis longtemps.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'raser ( la tête sous-entendu dans le texte) / sac  : signes de deuil ou de grande tristesse.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées a appelé, en ce jour-là,'
  - type: text
    content: à pleurer et à se lamenter,
  - type: text
    content: à se raser la tête et à mettre un sac pour pagne ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Mangeons et buvons…  : cf. 5.11 ; 56.12 ; Ec 2.24 : 3.12 ; 5.17 ; 8.15 ; 9.7-9 ; 11.8 ; 1Co 15.32.'
  - type: text
    content: et voici de la gaieté et de la joie !
  - type: text
    content: On tue du gros bétail, on immole du petit bétail.
  - type: text
    content: 'On mange de la viande, on boit du vin :'
  - type: text
    content: Mangeons et buvons, car demain nous mourrons !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur / le Seigneur  : hébreu YHWH / ’Adonaï , cf. Ex 3.15n et noms divins. –  me l''a révélé  : litt. l''a dévoilé à mes oreilles. –  Cette faute…  : litt. si cette faute est expiée… , formule elliptique de serment (voir 5.9n), comme en 1S 3.14.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées me l''a révélé :'
  - type: text
    content: Cette faute ne sera jamais expiée pour vous jusqu'à votre mort,
  - type: text
    content: 'dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Avertissement à l'intendant Shebna
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'courtisan  : litt. utile, nécessaire  ; le mot ne se trouve qu''ici pour qualifier un homme. –  Shebna et Eliaqim v. 20 ; 36.3,22 ; 37.2 ; 2R 18.18,26,37 ; 19.2. –  intendant de la maison ou gouverneur du palais , litt. qui est sur la maison , comme en 1R 4.6n  ; cf. Gn 39.4+ ; 41.40n.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Va trouver ce courtisan,
  - type: text
    content: 'Shebna, l''intendant de la maison :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: De nombreux personnages importants de Jérusalem se faisaient tailler des tombeaux dans le roc sur les hauteurs avoisinantes.
  - type: text
    content: Qu'est-ce qui t'appartient ici,
  - type: text
    content: et qui as-tu pour toi ici,
  - type: text
    content: que tu creuses ici un tombeau ?
  - type: text
    content: On se creuse un tombeau sur la hauteur,
  - type: text
    content: on se taille une demeure dans le roc !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'te jettera au loin  : litt. te jettera d''un jet (d’)homme (vaillant) . On pourrait aussi comprendre le mot comme une apostrophe à Shebna  : ô homme (vaillant) !'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te jettera au loin,'
  - type: text
    content: il te bâillonnera,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'vaste  : litt. large des deux mains , cf. 33.21 ; Gn 34.21n  ; Ps 104.25n  ; Né 9.4n. –  tu mourras  : cf. Jr 28.16 ; Am 7.17. –  chars  : 2.7+. –  l''ignominie  : le terme hébreu correspondant est également traduit par mépris  ; verbe apparenté en 3.5 ; 16.14 ; cf. Pr 3.35+.'
  - type: text
    content: il te fera rouler comme une balle,
  - type: text
    content: sur une vaste terre ;
  - type: text
    content: là tu mourras, là seront tes chars glorieux,
  - type: text
    content: toi, l'ignominie de la maison de ton maître !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Je te chasserai  : cf. Pr 10.3n. –  Il t''arrachera  : probablement le Seigneur t''arrachera  ; certains comprennent on t''arrachera ou ton maître t''arrachera  ; d''autres modifient le texte hébreu traditionnel pour lire je t''arracherai… –  ta fonction  : même terme en 1R 10.5 ; 1Ch 23.28 ; 2Ch 35.15.'
  - type: text
    content: Je te chasserai de ton poste.
  - type: text
    content: Il t'arrachera de ta fonction.
  '2':
  - type: text
    content: ' '
  - type: note
    content: cité en liesse 23.7 ; 32.13 ; So 2.15.
  - type: text
    content: ville bruyante, pleine de tumulte,
  - type: text
    content: cité en liesse ?
  - type: text
    content: Tes victimes ne sont pas victimes de l'épée,
  - type: text
    content: elles ne mourront pas en combattant.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Eliaqim (cf. v. 15n) signifie Dieu suscite . –  mon serviteur  : cf. Jr 25.9 ; 27.6 ; 43.10.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: j'appellerai Eliaqim, fils de Hilqiya, mon serviteur ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'tunique / écharpe  : cf. Lv 8.7. –  un père 9.5+.'
  - type: text
    content: je le revêtirai de ta tunique,
  - type: text
    content: je le ceindrai de ton écharpe,
  - type: text
    content: et je remettrai ton pouvoir entre ses mains ;
  - type: text
    content: il sera un père pour les habitants de Jérusalem
  - type: text
    content: et pour la maison de Juda.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'sur son épaule 9.5. –  clef  : cf. Mt 16.19 ; Ap 1.18 ; 3.7. –  maison de David  : ici le palais royal ; cf. 7.2.'
  - type: text
    content: 'Je mettrai sur son épaule la clef de la maison de David :'
  - type: text
    content: quand il aura ouvert, personne ne pourra fermer ;
  - type: text
    content: quand il aura fermé, personne ne pourra ouvrir.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'un piquet  : cf. Za 4.10 ; Esd 9.8n. Ici le mot désigne probablement une cheville (même mot en Ez 15.3n) à laquelle on suspendait la vaisselle qui ne devait pas traîner à terre (cf. v. 24). –  sûr ou solide , même racine hébraïque que vérité ou fidélité , racine d''où vient aussi le mot amen (cf. Dt 27.15n).'
  - type: text
    content: Je l'enfoncerai comme un piquet dans un lieu sûr,
  - type: text
    content: et il sera un trône glorieux pour sa famille.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Tout ce qui…  : autre traduction toute sa famille (litt. la maison de son père ) y sera suspendue de tout son poids. En hébreu le même mot signifie poids et gloire . –  branches principales et rameaux secondaires  : traduction incertaine. –  bassines  : Ct 7.3.'
  - type: text
    content: 'Tout ce qui fait la gloire de sa famille y sera suspendu, branches principales et rameaux secondaires, toute la petite vaisselle, depuis les bassines jusqu''aux jarres. '
  '25':
  - type: note
    content: 'le fardeau (ou la charge) : le même mot est rendu par sentence en 13.1n. –  détruit  : litt. coupé ou retranché. –  c''est le Seigneur … 1.2n.'
  - type: text
    content: 'En ce jour-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées – le piquet enfoncé dans un lieu sûr sera retiré, il sera abattu et cédera, et le fardeau qui était sur lui sera détruit – c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'par les archers  : litt. par l''arc  ; on pourrait aussi traduire sans avoir tiré à l''arc. –  Tes habitants  : litt. tous tes trouvés , ce qui peut signifier ceux qui se trouvent en toi , ou bien ceux des tiens qui sont atteints. –  tandis qu''ils s''enfuient…  : autre traduction ils fuient de loin.'
  - type: text
    content: Tes capitaines, tous ensemble, prennent la fuite ;
  - type: text
    content: ils sont faits prisonniers par les archers.
  - type: text
    content: Tes habitants, tous ensemble, sont faits prisonniers,
  - type: text
    content: tandis qu'ils s'enfuient au loin.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'laissez-moi pleurer  : cf. 16.9 ; Jr 8.23 ; 9.17 ; 13.17 ; 14.17 ; 16.5. –  de la belle, de mon peuple  : litt. de la fille de mon peuple , cf. 1.8n  ; Jr 4.11n.'
  - type: text
    content: 'C''est pourquoi je dis : Détournez de moi les regards,'
  - type: text
    content: laissez-moi pleurer amèrement ;
  - type: text
    content: ne me pressez pas de me consoler
  - type: text
    content: du ravage de la belle, de mon peuple.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'panique / écrasement / consternation  : hébreu mehouma / mevousa / mevouka  : cf. 24.17n  ; Za 14.13n. –  pour le Seigneur  : autre traduction de la part du Seigneur . –  vallée de la vision v. 1n.'
  - type: text
    content: Car c'est un jour de panique,
  - type: text
    content: d'écrasement et de consternation,
  - type: text
    content: 'pour le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: 'dans la vallée de la vision :'
  - type: text
    content: murs démantelés,
  - type: text
    content: appels au secours vers la montagne.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Elam (11.11n), ici encore allié de l'Assyrie (cf. 21.2n) ; voir Jr 49.35n. –  Qir ou Qour en Mésopotamie, associée aux Araméens en 2R 16.9 ; Am 1.5n  ; 9.7.
  - type: text
    content: 'Elam porte le carquois :'
  - type: text
    content: des chars de combattants, des attelages s'avancent ;
  - type: text
    content: Qir met à nu le bouclier.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Tes plus belles vallées  : litt. le choix de tes vallées.'
  - type: text
    content: Tes plus belles vallées sont remplies de chars,
  - type: text
    content: et les attelages prennent position à la porte de la ville,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'couverture  : ici au sens tactique (protection), ou déjà au sens de voile (cause d''aveuglement), comme en 25.7 (terme apparenté). –  Maison de la Forêt  : bâtiment royal utilisé comme arsenal (1R 7.2-6 ; 10.16s) ; voir aussi 32.19+.'
  - type: text
    content: il ôte la couverture de Juda.
  - type: text
    content: En ce jour-là, tu tournes tes regards
  - type: text
    content: vers les armes de la Maison de la Forêt.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ville de David  : Jérusalem, plus précisément la vieille ville, c.-à-d. l''ancienne Jébus (2S 5.6s). –  dans le réservoir inférieur  : cf. 7.3n.'
  - type: text
    content: Vous voyez les brèches nombreuses faites à la Ville de David,
  - type: text
    content: vous faites provision d'eau dans le réservoir inférieur,
