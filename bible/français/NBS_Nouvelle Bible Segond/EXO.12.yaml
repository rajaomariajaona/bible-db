  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Pâque
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse et à Aaron, en Egypte : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 23.18 ; Dt 16.4.
      marker-yv: yv-n
    - type: text
      text: 'Vous n''en laisserez rien jusqu''au matin ; s''il en reste quelque chose le matin, vous le jetterez au feu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
