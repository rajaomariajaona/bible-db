          text: 'prescription perpétuelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 17,24 ; 27.21 ; 28.43 ; 29.9,28 ; 30.21 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour toutes vos '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17,42 ; 16.32s ; 27.21 ; 29.42 ; 30.8ss ; 31.13,16 ; Gn 17.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce sera pour vous un jour d''évocation ; vous le célébrerez comme une fête pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', vous le célébrerez comme une prescription perpétuelle, pour toutes vos générations.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fête des Pains sans levain
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des pains sans levain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.3-7 ; 23.15 ; 34.18 ; Lv 23.4ss ; Dt 16.1-8 ; cf. 1Co 5.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quelque chose de levé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même terme en 13.3,7 ; 23.18 ; 34.25 ; Lv 2.11 ; 6.10 ; 7.13 ; 23.17 ; Dt 16.3 ; Am 4.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'retranché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 7.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pendant sept jours, vous mangerez des pains sans levain. Dès le premier jour, vous supprimerez le levain de vos maisons ; quiconque mangera quelque chose de levé, du premier jour au septième jour, sera retranché d''Israël. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 23.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le premier jour, il y aura convocation sacrée ; le septième jour, il y aura pour vous convocation sacrée. On ne fera aucun travail ces jours-là – si ce n''est de préparer la nourriture pour chacun. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la fête des Pains sans levain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les pains sans levain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'armées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prescription perpétuelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 14+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous observerez la fête des Pains sans levain, car c''est en ce jour même que j''ai fait sortir vos armées d''Egypte ; vous observerez ce jour comme une prescription perpétuelle, pour toutes vos générations. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le quatorzième jour du premier mois, au soir, vous mangerez des pains sans levain ; vous en mangerez jusqu''au soir du vingt et unième jour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: retranché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 17.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 7.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pendant sept jours, on ne devra pas trouver de levain chez vous ; quiconque mangera quelque chose de levé sera retranché de la communauté d''Israël, que ce soit un immigré ou un autochtone du pays. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ce mois-ci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mois d''Aviv (ou Abib, voir 13.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), qui porte aussi le nom de Nisân (Est 3.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Né 2.1), commence à la première nouvelle lune du printemps, en mars ou en avril (voir aussi 12.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), et est ici désigné comme le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'premier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(en hébreu, le mot signifie également '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des mois de l'année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. D''après un autre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' juif, observé encore aujourd''hui, l''année commence en automne (Ex 23.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 34.22).'
      marker-yv: yv-n
    - type: text
      text: 'Ce mois-ci sera pour vous le premier des mois ; il sera pour vous le premier des mois de l''année. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous ne mangerez rien de levé ; dans tous vos lieux d'habitation, vous mangerez des pains sans levain.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préparation de la Pâque
    marker-yv: yv-h
