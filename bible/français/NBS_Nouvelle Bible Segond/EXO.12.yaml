        marker: fqa
        children:
        - type: text
          text: 'Pésah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pessah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), qui désigne ici l''animal (cf. v. 21), est rapproché aux v. 13,23,27 d''une racine qui signifie sans doute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'passer (sur) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Jn 13.1 pourrait faire allusion à une telle interprétation), mais aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'boiter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sauter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2S 4.4 ; cf. 1R 18.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',26) ; voir Es 31.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Il a été transcrit en grec (LXX) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: paskha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''où nos mots français '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Pâque(s) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pascal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Sur l''ensemble de la '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: fête
        - type: text
          text: ', cf. Lv 23.5-8 ; Nb 9.1-14 ; 28.16-25 ; Dt 16.1-8 ; Jos 5.10 ; 2R 23.21-23 ; Ez 45.21-24 ; 2Ch 30 ; 35.1-18 ; Mt 26/ / ; Lc 22.15s ; 1Co 5.7 ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes.'
      marker-yv: yv-n
    - type: text
      text: 'Voici comment vous le mangerez : une ceinture à vos reins, vos sandales aux pieds et votre bâton à la main ; vous le mangerez à la hâte. C''est la Pâque du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je parcourrai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je passerai par l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'exécuterai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.6 ; 7.4 ; Nb 33.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre tous les dieux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ceux-ci s''avèrent incapables de protéger leurs adorateurs. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Cette nuit-là, je parcourrai l''Egypte et je frapperai tous les premiers-nés en Egypte, depuis les humains jusqu''aux bêtes ; ainsi j''exécuterai mes jugements contre tous les dieux de l''Egypte. Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je passerai sur vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je sauterai au-dessus de vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe hébreu ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pasahti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) est apparenté au terme qui désigne la Pâque ; cf. v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fléau destructeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 23.
      marker-yv: yv-n
    - type: text
      text: 'Le sang sera pour vous un signe sur les maisons où vous serez : lorsque je verrai le sang, je passerai sur vous, et il n''y aura pas sur vous de fléau destructeur quand je frapperai l''Egypte.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
