        marker: fq
        children:
        - type: text
          text: ceinture…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 12.35 ; 1P 1.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pâque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
