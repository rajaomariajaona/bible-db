document_id: EXO.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La Pâque
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron, en Egypte : '
  '10':
  - type: note
    content: Cf. 23.18 ; Dt 16.4.
  - type: text
    content: 'Vous n''en laisserez rien jusqu''au matin ; s''il en reste quelque chose le matin, vous le jetterez au feu. '
  '11':
  - type: note
    content: 'ceinture…  : cf. Lc 12.35 ; 1P 1.13n. – Le mot Pâque (hébreu Pésah ou Pessah), qui désigne ici l''animal (cf. v. 21), est rapproché aux v. 13,23,27 d''une racine qui signifie sans doute passer (sur) (Jn 13.1 pourrait faire allusion à une telle interprétation), mais aussi boiter ou sauter (2S 4.4 ; cf. 1R 18.21n,26) ; voir Es 31.5n. Il a été transcrit en grec (LXX) paskha, d''où nos mots français Pâque(s) et pascal. Sur l''ensemble de la fête, cf. Lv 23.5-8 ; Nb 9.1-14 ; 28.16-25 ; Dt 16.1-8 ; Jos 5.10 ; 2R 23.21-23 ; Ez 45.21-24 ; 2Ch 30 ; 35.1-18 ; Mt 26/ / ; Lc 22.15s ; 1Co 5.7 ; voir aussi calendrier et fêtes.'
  - type: text
    content: 'Voici comment vous le mangerez : une ceinture à vos reins, vos sandales aux pieds et votre bâton à la main ; vous le mangerez à la hâte. C''est la Pâque du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'V. 29+. –  je parcourrai…  : autre traduction je passerai par l''Egypte. –  j''exécuterai…  : cf. 6.6 ; 7.4 ; Nb 33.4n. –  contre tous les dieux…  : ceux-ci s''avèrent incapables de protéger leurs adorateurs. –  YHWH  : voir noms divins.'
  - type: text
    content: 'Cette nuit-là, je parcourrai l''Egypte et je frapperai tous les premiers-nés en Egypte, depuis les humains jusqu''aux bêtes ; ainsi j''exécuterai mes jugements contre tous les dieux de l''Egypte. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '13':
  - type: note
    content: je passerai sur vous ou je sauterai au-dessus de vous  ; le verbe hébreu (pasahti) est apparenté au terme qui désigne la Pâque ; cf. v. 11n. –  fléau destructeur v. 23.
  - type: text
    content: 'Le sang sera pour vous un signe sur les maisons où vous serez : lorsque je verrai le sang, je passerai sur vous, et il n''y aura pas sur vous de fléau destructeur quand je frapperai l''Egypte.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: un jour d'évocation ou un jour commémoratif, un jour de rappel  ; cf. 3.15n  ; 13.9n. –  prescription perpétuelle v. 17,24 ; 27.21 ; 28.43 ; 29.9,28 ; 30.21 ; voir loi. –  pour toutes vos générations v. 17,42 ; 16.32s ; 27.21 ; 29.42 ; 30.8ss ; 31.13,16 ; Gn 17.7n.
  - type: text
    content: 'Ce sera pour vous un jour d''évocation ; vous le célébrerez comme une fête pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous le célébrerez comme une prescription perpétuelle, pour toutes vos générations.'
  - type: heading
    content: La fête des Pains sans levain
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'des pains sans levain 13.3-7 ; 23.15 ; 34.18 ; Lv 23.4ss ; Dt 16.1-8 ; cf. 1Co 5.8. –  quelque chose de levé  : même terme en 13.3,7 ; 23.18 ; 34.25 ; Lv 2.11 ; 6.10 ; 7.13 ; 23.17 ; Dt 16.3 ; Am 4.5. –  retranché Lv 7.20n.'
  - type: text
    content: 'Pendant sept jours, vous mangerez des pains sans levain. Dès le premier jour, vous supprimerez le levain de vos maisons ; quiconque mangera quelque chose de levé, du premier jour au septième jour, sera retranché d''Israël. '
  '16':
  - type: note
    content: 'Cf. Lv 23.7n. –  sacrée  : voir saint.'
  - type: text
    content: 'Le premier jour, il y aura convocation sacrée ; le septième jour, il y aura pour vous convocation sacrée. On ne fera aucun travail ces jours-là – si ce n''est de préparer la nourriture pour chacun. '
  '17':
  - type: note
    content: 'la fête des Pains sans levain  : litt. les pains sans levain  ; voir calendrier et fêtes. –  armées 6.26. –  prescription perpétuelle v. 14+ ; voir loi.'
  - type: text
    content: 'Vous observerez la fête des Pains sans levain, car c''est en ce jour même que j''ai fait sortir vos armées d''Egypte ; vous observerez ce jour comme une prescription perpétuelle, pour toutes vos générations. '
  '18':
  - type: text
    content: 'Le quatorzième jour du premier mois, au soir, vous mangerez des pains sans levain ; vous en mangerez jusqu''au soir du vingt et unième jour. '
  '19':
  - type: note
    content: 'retranché  : cf. Gn 17.14n  ; Lv 7.20n.'
  - type: text
    content: 'Pendant sept jours, on ne devra pas trouver de levain chez vous ; quiconque mangera quelque chose de levé sera retranché de la communauté d''Israël, que ce soit un immigré ou un autochtone du pays. '
  '2':
  - type: note
    content: 'Ce mois-ci  : le mois d''Aviv (ou Abib, voir 13.4n), qui porte aussi le nom de Nisân (Est 3.7n  ; Né 2.1), commence à la première nouvelle lune du printemps, en mars ou en avril (voir aussi 12.6n), et est ici désigné comme le premier (en hébreu, le mot signifie également tête) des mois de l''année. D''après un autre calendrier juif, observé encore aujourd''hui, l''année commence en automne (Ex 23.16n  ; 34.22).'
  - type: text
    content: 'Ce mois-ci sera pour vous le premier des mois ; il sera pour vous le premier des mois de l''année. '
  '20':
  - type: text
    content: Vous ne mangerez rien de levé ; dans tous vos lieux d'habitation, vous mangerez des pains sans levain.
  - type: heading
    content: Préparation de la Pâque
  '21':
  - type: text
    content: ' '
  - type: note
    content: clans ou familles , cf. Gn 12.3n. –  Pâque v. 11n  ; voir aussi calendrier et fêtes.
  - type: text
    content: 'Moïse appela tous les anciens d''Israël et leur dit : Allez prendre du petit bétail pour vos clans, et immolez la Pâque. '
  '22':
  - type: note
    content: 'hysope (hébreu ’ézov, grec hussôpon) : petite plante buissonneuse, qui pousse parfois sur les murailles (1R 5.13). Elle était utilisée dans diverses cérémonies de purification (Lv 14.4 ; Nb 19.6,18 ; voir aussi Ps 51.9 ; Jn 19.29 ; Hé 9.19). – Voir sang. –  bassin  : autre terme en Ex 24.6 (bassine) ; même terme en 2S 17.28n  ; 1R 7.50 ; 2R 12.14 ; Jr 52.19 ; Za 12.2n. –  vous en mettrez…  : litt. vous toucherez le linteau… avec le sang qui (est) dans le bassin. –  de sa maison  : litt. de la porte de sa maison.'
  - type: text
    content: 'Vous prendrez ensuite un bouquet d''hysope, vous le tremperez dans le sang qui est dans le bassin, et vous en mettrez sur le linteau et les deux montants de la porte. Aucun de vous ne sortira de sa maison jusqu''au matin. '
  '23':
  - type: note
    content: 'passera  : litt. passera sur l''ouverture (ou l''entrée) ou sautera (par-dessus) l''entrée (voir v. 11n). –  le destructeur  : on pourrait aussi traduire la destruction (cf. v. 13), mais des versions anciennes ont employé une forme personnelle (cf. Gn 19.13 ; 2S 24.16). Sur l''ensemble, cf. Hé 11.28. –  entrer chez vous  : litt. entrer dans vos maisons pour frapper (du fléau).'
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parcourra l''Egypte pour la frapper du fléau et qu''il verra le sang sur le linteau et sur les deux montants de la porte, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' passera ; il ne laissera pas le destructeur et son fléau entrer chez vous.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'prescription pour toi et pour tes fils  : cf. v. 14+ ; voir loi.'
  - type: text
    content: 'Vous observerez cela comme une prescription pour toi et pour tes fils, perpétuellement. '
  '25':
  - type: note
    content: 'rite  : litt. service (cf. 3.12n  ; 12.26n), de même au v. 26.'
  - type: text
    content: 'Quand vous serez entrés dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donnera, selon sa parole, vous observerez ce rite. '
  '26':
  - type: note
    content: 10.2+ ; cf. Jos 4.6,21.
  - type: text
    content: 'Lorsque vos fils vous demanderont : « Que signifie pour vous ce rite ? », '
  '27':
  - type: note
    content: 'Voir sacrifice. –  Pâque / a passé  : hébreu Pésah / pasah, cf. v. 11n.'
  - type: text
    content: 'vous répondrez : C''est le sacrifice de la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a passé sur les maisons des Israélites en Egypte ; lorsqu''il a frappé l''Egypte du fléau, il a délivré nos maisons.'
  - type: text
    content: 'Le peuple s''inclina et se prosterna. '
  '28':
  - type: text
    content: 'Les Israélites s''en allèrent ; ils firent exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse et à Aaron. Ainsi firent-ils.'
  - type: heading
    content: 'Dixième fléau : mort des premiers-nés'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'tout premier-né v. 12 ; 4.23 ; 11.5 ; Ps 78.51 ; 105.36 ; 135.8 ; 136.10 ; cf. Jb 34.20. –  dans son cachot  : litt. dans la maison du cachot (ou de la fosse, de la citerne ).'
  - type: text
    content: 'En pleine nuit, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa tout premier-né en Egypte, depuis le premier-né du pharaon qui était assis sur son trône jusqu''au premier-né du captif dans son cachot, ainsi que tous les premiers-nés des bêtes. '
  '3':
  - type: note
    content: 'communauté  : le terme correspondant est très proche, quant au sens, de celui qui est régulièrement traduit par assemblée (v. 6 ; voir Eglise) ; il s''applique à partir d''ici (comme souvent en Ex, Lv et Nb ; voir aussi 1R 8.5 ; 12.20 ; Jr 6.18 ; Pr 5.14) à Israël en tant que communauté nationale, juridique et religieuse, mais il est employé ailleurs dans des sens plus généraux ; il désigne par exemple un essaim d''abeilles en Jg 14.8, une troupe hostile en Ps 22.17n. –  un mouton ou une chèvre  : le mot hébreu correspondant désigne une tête de petit bétail, indifféremment mouton ou chèvre ; il est traduit dans la suite par bête (cf. v. 5n).'
  - type: text
    content: 'Dites à toute la communauté d''Israël : Le dixième jour de ce mois, on prendra un mouton ou une chèvre pour chaque famille, une bête par maison. '
  '30':
  - type: text
    content: Le pharaon se leva de nuit, lui, tous les gens de sa cour et toute l'Egypte ; il y eut de grands cris en Egypte, car il n'y avait pas de maison où il n'y eût un mort.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Sortez  : litt. levez-vous, sortez.'
  - type: text
    content: 'Il appela de nuit Moïse et Aaron, et il leur dit : Sortez du milieu de mon peuple, vous et les Israélites. Allez, servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme vous l''avez dit. '
  '32':
  - type: note
    content: 'bénissez-moi  : cf. Gn 47.7n,10 ; 1R 8.66.'
  - type: text
    content: 'Prenez aussi votre petit bétail et votre gros bétail, comme vous l''avez dit ; allez, et bénissez-moi ! '
  '33':
  - type: note
    content: 'L''Egypte  : autre traduction les Egyptiens. –  les faire partir  : autre traduction les renvoyer  ; dans l''Exode, le même verbe hébreu a été régulièrement traduit par laisser partir  ; cf. 3.20 ; 5.1n.'
  - type: text
    content: 'L''Egypte pressait le peuple ; ils avaient hâte de les faire partir du pays, car ils disaient : Nous allons tous mourir !'
  '34':
  - type: text
    content: 'Le peuple emporta sa pâte avant qu''elle soit levée. Leurs pétrins étaient enveloppés dans leurs vêtements, sur leurs épaules. '
  '35':
  - type: note
    content: 'aux Egyptiens  : autre traduction à l''Egypte.'
  - type: text
    content: 'Les Israélites firent ce que Moïse avait dit : ils demandèrent aux Egyptiens des objets d''argent, des objets d''or et des vêtements. '
  '36':
  - type: note
    content: 3.22+. –  donna… de la grâce… 3.21+. –  Egyptiens et l'Egypte traduisent le même terme hébreu.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna au peuple de la grâce aux yeux des Egyptiens : ceux-ci accédèrent à leur demande. Ainsi ils dépouillèrent l''Egypte.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'partirent  : le verbe signifie au propre arracher (les piquets de tente, cf. Es 33.20). Voir aussi 13.20 ; 16.1 ; 17.1 ; 19.2 ; Nb 33. –  Ramsès 1.11n. –  Soukkoth ( Huttes ) : cf. Gn 33.17n  ; Nb 33.1-5. –  six cent mille ou six cents « milliers » (au sens de phratries ou contingents ) ; cf. Nb 1.16n,21n,46. –  les familles  : autre traduction les enfants  ; cf. 10.10,24 ; voir Gn 34.29n  ; Jg 18.21n.'
  - type: text
    content: 'Les Israélites partirent de Ramsès pour Soukkoth, une infanterie d''environ six cent mille hommes, sans compter les familles. '
  '38':
  - type: note
    content: 'population mêlée  : cf. Nb 11.4 (autre mot hébreu) ; sur le terme qui apparaît ici, voir 1R 10.15n  ; Jr 25.20,24 ; 50.37 ; Ez 30.5 ; Né 13.3.'
  - type: text
    content: 'Une importante population mêlée monta aussi avec eux, avec des troupeaux considérables de petit bétail et de gros bétail. '
  '39':
  - type: note
    content: Cf. v. 8,15,34 ; voir aussi Dt 16.3 ; Es 52.12.
  - type: text
    content: 'Ils firent des galettes cuites sans levain avec la pâte qu''ils avaient emportée d''Egypte et qui n''était pas levée ; car ils avaient été chassés d''Egypte sans pouvoir s''attarder pour se faire des provisions. '
  '4':
  - type: note
    content: 'la famille  : litt. la maison ou la maisonnée. –  selon le nombre… 16.16 ; cf. Gn 47.12n.'
  - type: text
    content: 'Si la famille est trop peu nombreuse pour une bête, elle la prendra avec le voisin le plus proche de la maison, selon le nombre de personnes à nourrir ; vous répartirez cette bête d''après ce que chacun peut manger. '
  '40':
  - type: note
    content: 'quatre cent trente ans Ga 3.17. –  en Egypte  : LXX ajoute et en Canaan, cf. Gn 15.13 ; Ac 7.15s.'
  - type: text
    content: 'Les Israélites avaient habité quatre cent trente ans en Egypte. '
  '41':
  - type: note
    content: ce jour même v. 6,51. –  armées 6.26n.
  - type: text
    content: 'Au bout de quatre cent trente ans, ce jour même, toutes les armées du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sortirent d''Egypte.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi comprendre  : C''est une nuit de veille, une nuit où le Seigneur a veillé pour les faire sortir d''Egypte ; cette nuit appartient au Seigneur , une nuit de veille pour tous les fils d''Israël. –  générations 16.32 ; 27.21.'
  - type: text
    content: 'Ce fut une nuit de veille pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce qu''il les fit sortir d''Egypte ; pour tous les Israélites, dans toutes leurs générations, c''est une nuit de veille pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Règles pour célébrer la Pâque
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Aaron  : voir prêtre. –  prescription  : voir loi.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : Voici la prescription au sujet de la Pâque : Aucun étranger n''en mangera. '
  '44':
  - type: note
    content: Voir circoncision.
  - type: text
    content: 'Tu circonciras tout esclave acheté à prix d''argent ; alors il en mangera. '
  '45':
  - type: note
    content: 'résident temporaire / salarié  : sur ces catégories d''étrangers, voir v. 48n.'
  - type: text
    content: 'Le résident temporaire et le salarié n''en mangeront pas. '
  '46':
  - type: note
    content: 'dans la maison  : cf. Dt 16.2,5s. –  aucun os  : cf. Nb 9.12 ; Ps 34.21 ; Jn 19.36.'
  - type: text
    content: 'On la mangera dans la maison même ; vous n''emporterez pas de viande hors de la maison, et vous n''en briserez aucun os. '
  '47':
  - type: note
    content: 'communauté v. 3n. –  la célébrera  : c.-à-d. célébrera la Pâque  ; voir calendrier et fêtes.'
  - type: text
    content: 'Toute la communauté d''Israël la célébrera. '
  '48':
  - type: note
    content: 'L’immigré est un étranger installé dans le pays de façon relativement permanente (cf. 2.22 ; 6.4 ; 20.10n  ; 22.20+ ; Dt 24.17-20 ; Ez 47.22), à la différence du résident temporaire et du salarié (v. 45) ; cf. Gn 23.4. –  il se présentera  : autre traduction il s''approchera  ; sur le verbe correspondant, voir Lv 1.2n.'
  - type: text
    content: 'Si un immigré qui séjourne chez toi veut célébrer la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', tout mâle chez lui devra être circoncis ; alors il se présentera pour la célébrer et il sera comme l''autochtone ; mais aucun incirconcis n''en mangera. '
  '49':
  - type: text
    content: Il y aura une même loi pour l'autochtone et pour l'immigré qui séjourne au milieu de vous.
  '5':
  - type: note
    content: 'sans défaut  : litt. parfait, intact. Le même mot est traduit par intègre en Gn 6.9 ; 17.1. –  d''un an  : litt. fils d’(une) année, selon la tournure consacrée en hébreu pour indiquer l''âge. Certains comprennent né dans l''année  ; cf. Lv 9.3. –  vous pourrez prendre…  : litt. vous le prendrez des moutons et des chèvres.'
  - type: text
    content: 'Ce sera une bête sans défaut, un mâle d''un an ; vous pourrez prendre un agneau ou un chevreau. '
  '50':
  - type: text
    content: 'Tous les Israélites firent exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse et à Aaron. Ainsi firent-ils. '
  '51':
  - type: note
    content: Ce jour même v. 41+. –  armées 6.26n.
  - type: text
    content: 'Ce jour même, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit sortir d''Egypte les Israélites, rangés en armées.'
  '6':
  - type: note
    content: 'Le quatorzième jour est celui de la pleine lune (cf. v. 2n). –  à la tombée du soir  : litt. entre les (deux) soirs, soit entre le déclin et le coucher du soleil, soit entre le coucher du soleil et l''obscurité complète.'
  - type: text
    content: 'Vous le tiendrez en réserve jusqu''au quatorzième jour de ce mois ; toute l''assemblée de la communauté d''Israël l''immolera à la tombée du soir. '
  '7':
  - type: note
    content: Voir sang.
  - type: text
    content: 'On prendra de son sang et on en mettra sur les deux montants et sur le linteau de la porte des maisons où on le mangera. '
  '8':
  - type: note
    content: 'pains sans levain  : hébreu matsoth, grec (LXX) azuma, qui a donné notre mot azyme  ; cf. v. 39 ; voir Lv 2.4n.'
  - type: text
    content: 'Cette même nuit, on mangera la viande ; on la mangera rôtie au feu, avec des pains sans levain et des herbes amères. '
  '9':
  - type: note
    content: 'à demi-cuit  : le mot hébreu correspondant n''apparaît qu''ici. Certains le traduisent par cru.'
  - type: text
    content: 'Vous n''en mangerez pas à demi-cuit, ni bouilli dans l''eau ; il sera rôti au feu, avec la tête, les pattes et les entrailles. '
