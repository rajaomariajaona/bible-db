document_id: EST.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le grand banquet de Xerxès
  - type: text
    content: ' '
  - type: note
    content: 'LXX fait débuter le v. 1 par un passage relatant le songe de Mardochée. –  C''était aux jours  : en hébreu, même expression en Rt 1.1n  ; voir aussi Gn 14.1 ; Es 7.1. –  Xerxès  : probablement Xerxès Ier (486-465 av. J.-C. ; cf. Esd 4.6 ; voir aussi Dn 9.1n) ; LXX y a vu Artaxerxès, son successeur (465-424) ; voir l''introduction ♦. –  régnait  : cf. v. 2n. –  depuis l''Inde jusqu''à Koush 8.9 ; sur Koush ou la Nubie, au sud de l''Egypte, voir Gn 2.13n. –  cent vingt-sept provinces  : cf. Dn 6.2.'
  - type: text
    content: 'C''était aux jours de Xerxès. Ce Xerxès régnait, depuis l''Inde jusqu''à Koush, sur cent vingt-sept provinces. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le cœur content  : cf. 5.9 ; Ps 104.15 ; Ec 10.19. –  Harbona 7.9. –  sept v. 13s ; 2.9. –  eunuques  : il s''agit probablement ici de hauts fonctionnaires châtrés ; le mot a toutefois aussi un sens plus large ; cf. Gn 37.36n  ; 2R 20.18 ; Es 56.3-5 ; Ac 8.27n.'
  - type: text
    content: 'Le septième jour, comme le roi avait le cœur content à cause du vin, il dit à Mehoumân, Bizta, Harbona, Bigta, Abagta, Zétar et Karkas – les sept eunuques qui étaient au service du roi Xerxès – '
  '11':
  - type: note
    content: 'couronne royale 2.17 ; cf. 6.8 ; 8.15. –  belle  : cf. Gn 12.11 ; 2S 11.2.'
  - type: text
    content: 'de faire venir la reine Vashti devant le roi, avec sa couronne royale, pour montrer sa beauté aux peuples et aux princes, car elle était belle. '
  '12':
  - type: note
    content: fureur 3.5 ; 5.9 ; 7.7,10 ; Pr 16.14 ; Dn 3.19.
  - type: text
    content: 'Mais la reine Vashti refusa de venir quand les eunuques lui transmirent l''ordre du roi. Le roi fut saisi d''une grande colère, d''une fureur dévorante. '
  '13':
  - type: note
    content: 'qui avaient la connaissance des temps  : peut-être des astrologues ; cf. Dn 2.2,21n,27 ; mais l''expression peut avoir un sens plus général ; cf. 1Ch 12.33. Certains modifient le texte hébreu traditionnel pour lire connaissant le protocole ou la loi (même mot au v. 15) ; il s''agirait alors d''une expression consacrée pour désigner des juristes.'
  - type: text
    content: 'Le roi s''entretint avec les sages qui avaient la connaissance des temps. Car les affaires du roi passaient devant tous ceux qui avaient la connaissance du protocole et du droit, '
  '14':
  - type: note
    content: 'sept (v. 10+) princes  : cf. Esd 7.14. –  perses et mèdes v. 3n. –  familiers du roi  : litt. qui voyaient la face du roi  ; cf. v. 10n  ; l''accès à la personne royale était strictement réglementé ; cf. 2.14 ; 4.11 ; 5.2 ; voir aussi 2R 25.19 ; Jr 52.25.'
  - type: text
    content: 'et qui l''approchaient : Karshena, Shétar, Admata, Tarsis, Mérès, Marsena, Memoukân, les sept princes perses et mèdes, familiers du roi, qui occupaient la première place dans le royaume. '
  '15':
  - type: note
    content: 'Selon la loi…  : autre traduction selon quelle loi doit-on agir envers la reine…'
  - type: text
    content: Selon la loi, que doit-on faire à la reine Vashti qui n'a pas exécuté l'ordre du roi Xerxès, transmis par l'intermédiaire des eunuques ?
  '16':
  - type: text
    content: 'Devant le roi et les princes, Memoukân dit : La faute de la reine Vashti n''atteint pas seulement le roi, mais aussi tous les princes et tous les peuples dans toutes les provinces du roi Xerxès. '
  '17':
  - type: note
    content: 'le refus  : litt. la parole ou l''acte, l''affaire. –  regarder… avec mépris  : cf. 3.6n.'
  - type: text
    content: 'Car le refus de la reine viendra à la connaissance de toutes les femmes ; quand on racontera que le roi Xerxès avait dit de faire venir la reine Vashti devant lui et qu''elle n''est pas venue, elles se permettront de regarder leur mari avec mépris. '
  '18':
  - type: note
    content: 'tiendront le même langage  : litt. parleront  ; certains comprennent se permettront de répliquer (au lieu de se contenter d''obéir). –  d''où mépris…  : autre traduction et à ce mépris répondra la colère. –  colère ou irritation  ; cf. v. 12 ; 2.21 ; Nb 1.53n.'
  - type: text
    content: 'Maintenant les princesses perses et mèdes qui auront appris le refus de la reine tiendront le même langage à tous les princes du roi, d''où mépris et colère ! '
  '19':
  - type: note
    content: 'Si cela te semble bon 3.9 ; 5.4,8 ; 7.3 ; 8.5 ; 9.13 ; Né 2.5,7 ; cf. v. 21n. –  irrévocable  : litt. et qu''il ne passe pas ou qu''on ne passe pas outre, qu''on ne transgresse pas, cf. 3.3 ; voir aussi 8.5-8 (autre expression hébraïque) ; Dn 6.9,13,16 ; cf. Jn 19.22. –  sa dignité royale  : celle de Vashti (pronom féminin en hébreu).'
  - type: text
    content: 'Si cela te semble bon, ô roi, qu''on proclame par une déclaration royale, irrévocable, et qu''on écrive dans les lois de Perse et de Médie que Vashti ne paraîtra plus devant le roi Xerxès et que le roi donnera sa dignité royale à une de ses compagnes qui vaudra mieux qu''elle. '
  '2':
  - type: note
    content: 's''assit  : après les campagnes militaires qui ont marqué le début de son règne ; cf. v. 3. –  Suse la citadelle  : autre traduction Suse la capitale, dans la province d''Elam ; Suse était l''une des trois capitales (résidence d''hiver) de l''empire perse avec Ecbatane et Babylone ; il est cependant probable que l''expression hébraïque se réfère plus particulièrement à la partie haute et fortifiée de la ville, qui comprenait le palais royal (cf. v. 5 ; 2.3,5,8 ; 3.15 ; 8.14s ; 9.6,11s ; voir aussi Dn 8.2 ; Esd 6.2n  ; Né 1.1 ; 2.8 ; 7.2 ; 1Ch 29.1n).'
  - type: text
    content: 'En ces jours-là, le roi Xerxès s''assit sur le trône royal de Suse la citadelle. '
  '20':
  - type: note
    content: 'édit  : cf. Ec 8.11n.'
  - type: text
    content: 'Quand on sera informé de cet édit promulgué par le roi dans tout son royaume – et il est vaste ! – toutes les femmes honoreront leur mari, du plus grand au plus petit. '
  '21':
  - type: note
    content: 'Cf. Gn 41.37. –  plut au roi  : litt. fut bonne aux yeux du roi  ; même formule en 2.4,9 etc.'
  - type: text
    content: 'Cette déclaration plut au roi et aux princes, et le roi agit selon ce qu''avait dit Memoukân. '
  '22':
  - type: note
    content: 'écriture  : le même terme (aussi 3.12 ; 8.9) est traduit par écrit en 3.14 ; 4.8 ; 8.8,13 ; ce qui est écrit en 9.27. –  qu''il parle sa langue maternelle (litt. la langue de son peuple) : il faut peut-être sous-entendre : et non celle de sa femme (cf. v. 18n) ; cette précision est omise par LXX  ; Vg a compris et ce sera promulgué dans la langue de chaque peuple  ; cf. 3.12 ; 8.9 ; Dn 3.4 ; 6.26 ; Né 13.24.'
  - type: text
    content: Il envoya des lettres dans toutes les provinces royales, à chaque province dans son écriture, à chaque peuple dans sa langue, pour que tout homme soit maître chez lui et qu'il parle sa langue maternelle.
  '3':
  - type: note
    content: 'un banquet  : le terme est dérivé du verbe habituellement traduit par boire, cf. v. 7s,10 ; 2.18 ; 3.15 ; 5.6n  ; 7.1s,7s ; Jg 14.10n  ; voir aussi Gn 40.20 ; Ez 23.41 ; Dn 5.1-4 ; Mc 6.21. –  princes v. 14 ; 3.12 ; 8.9. –  Perses / Mèdes v. 14,18s ; Dn 5.28 ; 6.9,13,16 ; 8.20 ; la Médie (Gn 10.2n  ; Es 13.17n) avait été intégrée à l''empire perse.'
  - type: text
    content: 'La troisième année de son règne, il donna un banquet pour tous ses princes et pour toute sa cour. L''armée des Perses et des Mèdes, les dignitaires et les gouverneurs des provinces étaient devant lui. '
  '4':
  - type: note
    content: 'somptueuse  : le même terme évoque la notion d''honneur v. 20 ; 6.3,6s,9,11 ; 8.16.'
  - type: text
    content: 'Il montra ainsi la glorieuse richesse de son règne et la somptueuse splendeur de sa grandeur. Cela dura longtemps, cent quatre-vingts jours. '
  '5':
  - type: note
    content: jardin de la maison du roi 7.7s (jardin du palais) ; cf. v. 9 ; 2.8 ; 5.1.
  - type: text
    content: 'Quand ces jours furent achevés, le roi donna pendant sept jours un banquet en plein air, dans le jardin de la maison du roi, pour tout le peuple qui se trouvait à Suse la citadelle, du plus grand au plus petit. '
  '6':
  - type: note
    content: 'L''identification des matériaux et des couleurs est en grande partie conjecturale. –  coton  : le mot hébreu (karpas) semble être la transcription d''un terme sanskrit qu''on retrouve également en vieux perse ; certains l''associent au terme précédent (cf. 8.15) et comprennent l''ensemble comme signifiant de lin blanc. –  byssos  : cf. 8.15 ; 1Ch 4.21n. –  divans  : il s''agit sans doute de couches incrustées de métaux précieux ; on s''étendait pour manger ; cf. Am 6.4.'
  - type: text
    content: 'Des tissus colorés de lin, de coton et de pourpre violette étaient tendus par des cordons de byssos et de pourpre rouge passés dans des anneaux d''argent, sur des colonnes de marbre. Les divans étaient d''or et d''argent, sur un pavé de porphyre, de marbre, de nacre et de marbre noir. '
  '7':
  - type: note
    content: 'royalement  : litt. comme (ou selon) la main du roi, de même en 2.18.'
  - type: text
    content: 'On servait à boire dans une grande variété de coupes d''or, et le vin du royaume abondait royalement. '
  '8':
  - type: note
    content: Cf. Ha 2.15.
  - type: text
    content: 'On buvait selon un protocole sans contrainte ; le roi avait imposé à tous les intendants de sa maison de se conformer au désir de chacun. '
  '9':
  - type: note
    content: Vashti signifie peut-être la plus belle ou la meilleure (d'après le perse) ou la désirée (d'après le sanskrit) ; c'était également le nom d'une déesse élamite.
  - type: text
    content: De son côté, la reine Vashti donna un banquet pour les femmes dans la maison royale du roi Xerxès.
  - type: heading
    content: Disgrâce de la reine Vashti
