  - type: text
    text: 'C''était aux jours de Xerxès. Ce Xerxès régnait, depuis l''Inde jusqu''à Koush, sur cent vingt-sept provinces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'assit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : après les campagnes militaires qui ont marqué le début de son règne ; cf. v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Suse la citadelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Suse la capitale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', dans la province d''Elam ; Suse était l''une des trois capitales (résidence d''hiver) de l''empire perse avec Ecbatane et Babylone ; il est cependant probable que l''expression hébraïque se réfère plus particulièrement à la partie haute et fortifiée de la ville, qui comprenait le palais royal (cf. v. 5 ; 2.3,5,8 ; 3.15 ; 8.14s ; 9.6,11s ; voir aussi Dn 8.2 ; Esd 6.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Né 1.1 ; 2.8 ; 7.2 ; 1Ch 29.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, le roi Xerxès s''assit sur le trône royal de Suse la citadelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un banquet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme est dérivé du verbe habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: boire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 7s,10 ; 2.18 ; 3.15 ; 5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.1s,7s ; Jg 14.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Gn 40.20 ; Ez 23.41 ; Dn 5.1-4 ; Mc 6.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'princes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 14 ; 3.12 ; 8.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Perses '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mèdes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 14,18s ; Dn 5.28 ; 6.9,13,16 ; 8.20 ; la Médie (Gn 10.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 13.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) avait été intégrée à l'empire perse.
    marker-yv: yv-n
  - type: text
    text: 'La troisième année de son règne, il donna un banquet pour tous ses princes et pour toute sa cour. L''armée des Perses et des Mèdes, les dignitaires et les gouverneurs des provinces étaient devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: somptueuse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme évoque la notion d''honneur v. 20 ; 6.3,6s,9,11 ; 8.16.'
    marker-yv: yv-n
  - type: text
    text: 'Il montra ainsi la glorieuse richesse de son règne et la somptueuse splendeur de sa grandeur. Cela dura longtemps, cent quatre-vingts jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jardin de la maison du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.7s (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jardin du palais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. v. 9 ; 2.8 ; 5.1.
    marker-yv: yv-n
  - type: text
    text: 'Quand ces jours furent achevés, le roi donna pendant sept jours un banquet en plein air, dans le jardin de la maison du roi, pour tout le peuple qui se trouvait à Suse la citadelle, du plus grand au plus petit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L''identification des matériaux et des couleurs est en grande partie conjecturale. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: karpas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') semble être la transcription d''un terme sanskrit qu''on retrouve également en vieux perse ; certains l''associent au terme précédent (cf. 8.15) et comprennent l''ensemble comme signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de lin blanc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: byssos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.15 ; 1Ch 4.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: divans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit sans doute de couches incrustées de métaux précieux ; on s''étendait pour manger ; cf. Am 6.4.'
    marker-yv: yv-n
  - type: text
    text: 'Des tissus colorés de lin, de coton et de pourpre violette étaient tendus par des cordons de byssos et de pourpre rouge passés dans des anneaux d''argent, sur des colonnes de marbre. Les divans étaient d''or et d''argent, sur un pavé de porphyre, de marbre, de nacre et de marbre noir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: royalement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la main du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même en 2.18.'
    marker-yv: yv-n
  - type: text
    text: 'On servait à boire dans une grande variété de coupes d''or, et le vin du royaume abondait royalement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ha 2.15.
    marker-yv: yv-n
  - type: text
    text: 'On buvait selon un protocole sans contrainte ; le roi avait imposé à tous les intendants de sa maison de se conformer au désir de chacun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vashti '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie peut-être '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la plus belle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la meilleure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(d''après le perse) ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la désirée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (d'après le sanskrit) ; c'était également le nom d'une déesse élamite.
    marker-yv: yv-n
  - type: text
    text: De son côté, la reine Vashti donna un banquet pour les femmes dans la maison royale du roi Xerxès.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Disgrâce de la reine Vashti
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' content'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 5.9 ; Ps 104.15 ; Ec 10.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Harbona '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sept '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 13s ; 2.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: eunuques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il s''agit probablement ici de hauts fonctionnaires châtrés ; le mot a toutefois aussi un sens plus large ; cf. Gn 37.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 20.18 ; Es 56.3-5 ; Ac 8.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le septième jour, comme le roi avait le cœur content à cause du vin, il dit à Mehoumân, Bizta, Harbona, Bigta, Abagta, Zétar et Karkas – les sept eunuques qui étaient au service du roi Xerxès – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'couronne royale '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.17 ; cf. 6.8 ; 8.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: belle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 12.11 ; 2S 11.2.'
    marker-yv: yv-n
  - type: text
    text: 'de faire venir la reine Vashti devant le roi, avec sa couronne royale, pour montrer sa beauté aux peuples et aux princes, car elle était belle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fureur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.5 ; 5.9 ; 7.7,10 ; Pr 16.14 ; Dn 3.19.
    marker-yv: yv-n
  - type: text
    text: 'Mais la reine Vashti refusa de venir quand les eunuques lui transmirent l''ordre du roi. Le roi fut saisi d''une grande colère, d''une fureur dévorante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui avaient la connaissance des temps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être des astrologues ; cf. Dn 2.2,21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',27 ; mais l''expression peut avoir un sens plus général ; cf. 1Ch 12.33. Certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'connaissant le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'protocole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la loi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même mot au v. 15) ; il s'agirait alors d'une expression consacrée pour désigner des juristes.
    marker-yv: yv-n
  - type: text
    text: 'Le roi s''entretint avec les sages qui avaient la connaissance des temps. Car les affaires du roi passaient devant tous ceux qui avaient la connaissance du protocole et du droit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sept '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 10+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: princes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Esd 7.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'perses et mèdes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: familiers du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui voyaient la face du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; l''accès à la personne royale était strictement réglementé ; cf. 2.14 ; 4.11 ; 5.2 ; voir aussi 2R 25.19 ; Jr 52.25.'
    marker-yv: yv-n
  - type: text
    text: 'et qui l''approchaient : Karshena, Shétar, Admata, Tarsis, Mérès, Marsena, Memoukân, les sept princes perses et mèdes, familiers du roi, qui occupaient la première place dans le royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Selon la loi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon quelle loi doit-on agir envers la reine…
    marker-yv: yv-n
  - type: text
    text: Selon la loi, que doit-on faire à la reine Vashti qui n'a pas exécuté l'ordre du roi Xerxès, transmis par l'intermédiaire des eunuques ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Devant le roi et les princes, Memoukân dit : La faute de la reine Vashti n''atteint pas seulement le roi, mais aussi tous les princes et tous les peuples dans toutes les provinces du roi Xerxès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le refus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'acte, l'affaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: regarder… avec mépris
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car le refus de la reine viendra à la connaissance de toutes les femmes ; quand on racontera que le roi Xerxès avait dit de faire venir la reine Vashti devant lui et qu''elle n''est pas venue, elles se permettront de regarder leur mari avec mépris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tiendront le même langage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parleront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se permettront de répliquer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(au lieu de se contenter d''obéir). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'où mépris…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et à ce mépris répondra la colère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'colère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: irritation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 12 ; 2.21 ; Nb 1.53'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Maintenant les princesses perses et mèdes qui auront appris le refus de la reine tiendront le même langage à tous les princes du roi, d''où mépris et colère ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si cela te semble bon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.9 ; 5.4,8 ; 7.3 ; 8.5 ; 9.13 ; Né 2.5,7 ; cf. v. 21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: irrévocable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et qu''il ne passe pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'on ne passe pas outre, qu'on ne transgresse pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.3 ; voir aussi 8.5-8 (autre expression hébraïque) ; Dn 6.9,13,16 ; cf. Jn 19.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa dignité royale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : celle de Vashti (pronom féminin en hébreu).'
    marker-yv: yv-n
  - type: text
    text: 'Si cela te semble bon, ô roi, qu''on proclame par une déclaration royale, irrévocable, et qu''on écrive dans les lois de Perse et de Médie que Vashti ne paraîtra plus devant le roi Xerxès et que le roi donnera sa dignité royale à une de ses compagnes qui vaudra mieux qu''elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: édit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ec 8.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand on sera informé de cet édit promulgué par le roi dans tout son royaume – et il est vaste ! – toutes les femmes honoreront leur mari, du plus grand au plus petit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Gn 41.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plut au roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fut bonne aux yeux du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même formule en 2.4,9 etc.'
    marker-yv: yv-n
  - type: text
    text: 'Cette déclaration plut au roi et aux princes, et le roi agit selon ce qu''avait dit Memoukân. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: écriture
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme (aussi 3.12 ; 8.9) est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'écrit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 3.14 ; 4.8 ; 8.8,13 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce qui est écrit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 9.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''il parle sa langue maternelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la langue de son peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : il faut peut-être sous-entendre : et non celle de sa femme (cf. v. 18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; cette précision est omise par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' a compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et ce sera promulgué dans la langue de chaque peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.12 ; 8.9 ; Dn 3.4 ; 6.26 ; Né 13.24.'
    marker-yv: yv-n
  - type: text
    text: Il envoya des lettres dans toutes les provinces royales, à chaque province dans son écriture, à chaque peuple dans sa langue, pour que tout homme soit maître chez lui et qu'il parle sa langue maternelle.
