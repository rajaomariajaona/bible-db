document_id: PRO.16,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX  ; cf. 19.21 ; 20.24 ; Jr 10.23. –  L''être humain…  : litt. à l''humain (hébreu ’adam ) l''organisation (ou les dispositions, les arrangements ) du cœur . –  la réponse  : litt. la réponse de la langue  ; les mots hébreux correspondant à s''organise et à réponse font assonance.'
  - type: text
    content: L'être humain s'organise ;
  - type: text
    content: 'c''est du '
  - type: text
    content: Seigneur
  - type: text
    content: ' que vient la réponse.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'de la divination  : autre traduction des oracles . –  est infaillible ou, selon la traduction habituelle du verbe hébreu correspondant, ne commet pas de sacrilège  ; dans ce contexte, il faut sans doute comprendre ne (se) trompe pas ou n''est pas injuste (voir aussi Nb 5.12n  ; Jb 21.34n). On reconnaissait à la parole du roi un caractère sacré (cf. 2S 14.17-20 ; 1R 3.4-28).'
  - type: text
    content: Il y a de la divination sur les lèvres du roi ;
  - type: text
    content: dans le jugement sa bouche est infaillible.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'balance… tous les poids 11.1+ (voir mesures) ; cf. Instruction d''Aménémopé  : « Le singe (l''animal sacré associé à Thoth, le dieu égyptien de l''ordre et des mesures) est assis à côté de la balance, et son cœur est le plomb. Quel dieu est aussi grand que Thoth, lui qui a dévoilé ces choses, pour les faire ? »'
  - type: text
    content: 'La balance et les plateaux justes appartiennent au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: tous les poids du sac sont son œuvre.
  '12':
  - type: text
    content: ' '
  - type: note
    content: le trône s'affermit 20.28 ; 25.5 ; 29.14.
  - type: text
    content: 'Les actes des méchants sont une abomination pour les rois :'
  - type: text
    content: c'est par la justice que le trône s'affermit.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Voir justice. –  faveur des rois 14.35n  ; cf. 22.11.
  - type: text
    content: Les lèvres justes ont la faveur des rois ;
  - type: text
    content: on aime celui qui parle avec droiture.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'La fureur du roi 19.12 ; cf. 20.2 ; Ec 10.4. Dans la première partie du verset, il y a assonance entre les mots hébreux correspondant à fureur et à mort d''une part, à roi et messager d''autre part. –  l''apaise  : le verbe correspondant est souvent traduit par expier, faire l''expiation  ; cf. Gn 32.21n  ; Lv 1.4n  ; Ps 65.4n.'
  - type: text
    content: La fureur du roi est un messager de mort ;
  - type: text
    content: un homme sage l'apaise.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Quand le visage…  : autre traduction quand le roi sourit . –  pluie printanière  : cf. 19.12.'
  - type: text
    content: Quand le visage du roi s'éclaire, c'est la vie ;
  - type: text
    content: sa faveur est comme un nuage de pluie printanière.
  - type: heading
    content: La vie sociale et morale
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'acquérir 4.5+. –  sagesse… or… argent 2.4n  ; 3.14n-15+ ; 8.11 ; cf. Ps 19.10s ; 119.72 ; Jb 28.15ss ; Siracide 51.28 : « Participez à l''instruction au prix de beaucoup d''argent, aussi bien, grâce à elle vous acquerrez beaucoup d''or. »'
  - type: text
    content: Il vaut bien mieux acquérir de la sagesse que de l'or ;
  - type: text
    content: L'intelligence qu'on acquiert est bien préférable à l'argent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'route des gens droits  : cf. 2.13n. –  surveille  : 13.3n.'
  - type: text
    content: La route des gens droits, c'est de s'écarter du mal ;
  - type: text
    content: celui qui surveille sa voie se garde lui-même.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'le désastre 17.19 ; 18.12 ; cf. 11.2 ; 15.33. –  l''esprit hautain  : litt. hauteur de souffle  ; cf. v. 19n.'
  - type: text
    content: L'orgueil précède le désastre ;
  - type: text
    content: l'esprit hautain précède la chute.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 's''abaisser  : litt. l''abaissement de l''esprit (cf. v. 18n) ; voir Es 57.15. –  affligés ou humbles  ; autre lecture traditionnelle pauvres  ; cf. 3.34 ; 14.21 ; Ps 9.13n.'
  - type: text
    content: Mieux vaut s'abaisser avec les affligés
  - type: text
    content: que de partager le butin avec les orgueilleux.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'LXX Toutes les œuvres de l''humble sont manifestes devant Dieu, mais les impies seront détruits au jour mauvais . –  L''homme estime…  : litt. toutes les voies d''un homme sont pures à ses yeux  ; cf. 2.13n  ; 21.2n. –  pèse les esprits  : cf. 21.2n.'
  - type: text
    content: L'homme estime toujours que sa voie est pure ;
  - type: text
    content: 'celui qui pèse les esprits, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui a le sens des choses  : autres traductions celui qui a le sens de la parole ; celui qui a du bon sens ; celui qui a du discernement  ; cf. 13.13. –  confiance… heureux 29.25 ; Jr 17.7 ; Ps 40.5 ; 125.1 ; cf. Pr 13.13 ; Es 30.18 ; Ps 2.12 ; 34.9.'
  - type: text
    content: Celui qui a le sens des choses trouve le bonheur ;
  - type: text
    content: 'celui qui met sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', heureux est-il !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'cœur sage v. 23. –  est appelé  : autre traduction sera appelé . –  la douceur des lèvres  : certains modifient le texte pour lire la retenue (du mot traduit par mors en 26.3) des lèvres . –  le savoir v. 23.'
  - type: text
    content: Le cœur sage est appelé intelligent ;
  - type: text
    content: la douceur des lèvres augmente le savoir.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'source de vie  : cf. 10.11n. –  la correction ou l''instruction 1.2n. –  imbécile / imbécillité  : cf. 1.7n  ; 15.21+.'
  - type: text
    content: Le bon sens est une source de vie pour ceux qui le possèdent ;
  - type: text
    content: la correction des imbéciles, c'est l'imbécillité.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'cœur du sage… savoir v. 21. –  l''accroissement…  : litt. sur ses lèvres, il ajoute le savoir  ; certains modifient le texte pour lire celui qui est maître de ses lèvres ajoute au savoir  ; cf. Ec 10.12.'
  - type: text
    content: Le cœur du sage rend sa bouche habile ;
  - type: text
    content: l'accroissement de son savoir paraît sur ses lèvres.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'douceur…  : on a aussi compris douceur pour l''âme (cf. Gn 1.20n) et remède pour le corps.'
  - type: text
    content: Les paroles belles sont un rayon de miel,
  - type: text
    content: douceur pour la gorge et remède pour les os.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. 14.12n.
  - type: text
    content: Devant l'homme il y a une voie droite ;
  - type: text
    content: par la suite, ce sont les voies de la mort.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'la faim  : litt. sa bouche.'
  - type: text
    content: 'L''appétit du travailleur travaille pour lui :'
  - type: text
    content: la faim le presse.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme sans morale 6.12 ; Dt 13.14n. –  feu  : cf. 12.18 ; Jc 3.6.'
  - type: text
    content: L'homme sans morale prépare le malheur ;
  - type: text
    content: il y a sur ses lèvres comme un feu ardent.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'homme pervers  : cf. Siracide 28.13ss : « Maudit soit le chuchoteur et le fourbe ! Il a perdu bien des gens vivant en bonne entente. Les racontars d''un tiers en ont ébranlé beaucoup… ont fait répudier des femmes courageuses… Celui qui y prête attention ne trouvera plus de repos… » –  le médisant  : autre lecture traditionnelle celui qui s''irrite . –  les intimes ou les amis  ; cf. 15.18 ; 17.9 ; 26.21 ; 29.22.'
  - type: text
    content: L'homme pervers suscite les disputes ;
  - type: text
    content: le médisant divise les intimes.
  '29':
  - type: text
    content: L'homme violent dupe son prochain ;
  - type: text
    content: il lui fait suivre une voie qui n'est pas bonne.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  Recommande… au Seigneur  : litt. roule vers YHWH tes œuvres  ; cf. 3.6 ; Ps 37.5. –  se réaliseront  : autre traduction seront fermes.'
  - type: text
    content: 'Recommande tes œuvres au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et tes plans se réaliseront.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'les yeux  : cf. 6.13s. En s''appuyant partiellement sur LXX, certains modifient le texte hébreu traditionnel pour lire celui qui ferme les yeux se livre à des pensées perverses ; celui qui se mord les lèvres a consommé le mal . –  celui qui se mord les lèvres…  : LXX de ses lèvres il détermine tout ce qui est mauvais, c''est une fournaise de mal.'
  - type: text
    content: Celui qui ferme les yeux pour faire des plans pervers,
  - type: text
    content: celui qui se mord les lèvres, a déjà consommé le mal.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Les cheveux blancs  : cf. 20.29 ; Sagesse 4.9 : « La sagesse tient lieu de cheveux blancs pour l''homme, l''âge de la vieillesse, c''est une vie sans tache. » Siracide 25.4-6 : « Comme le jugement convient aux cheveux blancs et aux anciens de savoir donner un conseil ! Comme la sagesse convient aux vieillards… ! La couronne des vieillards est une grande expérience… » –  couronne de splendeur  : même expression en 4.9 ; Es 62.3+.'
  - type: text
    content: Les cheveux blancs sont une couronne de splendeur ;
  - type: text
    content: c'est sur la voie de la justice qu'on la trouve.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'patient 14.29+. –  celui qui se domine  : litt. celui qui domine sur son souffle ou son esprit  ; cf. 25.28.'
  - type: text
    content: Mieux vaut un homme patient qu'un guerrier ;
  - type: text
    content: mieux vaut celui qui se domine que celui qui prend une ville.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'sort 1.14n. –  la grande poche  : le terme désigne habituellement le pli antérieur du vêtement qui peut servir de poche (traduction traditionnelle le sein ). Cf. 6.27 ; 21.14. Il s''agit peut-être ici d''une allusion à l’ éphod ou au pectoral du grand prêtre (Ex 25.7n  ; 28.30n  ; 1S 2.18n) ; mais il pourrait aussi s''agir d''un autre réceptacle de sorts sacrés (le même terme est traduit par cavité en Ez 43.14). –  décisions ou jugements  ; le terme est aussi traduit par droit ou justice.'
  - type: text
    content: On jette le sort dans la grande poche ;
  - type: text
    content: 'toutes ses décisions viennent du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est à la place du v. 9 dans LXX, sous la forme Toutes les œuvres du Seigneur sont faites avec justice ; l''impie est gardé pour le jour mauvais . –  pour un but  : litt. pour sa réponse , c.-à-d. pour un but qui lui corresponde  ; on a aussi compris avec sa contrepartie ; pour lui-même  ; cf. Rm 9.22. –  le jour du malheur ou de la détresse  ; cf. 24.10 ; 25.19 ; 2R 19.3 ; Es 37.3 ; Jr 16.19 ; Ab 12,14 ; Na 1.7 ; Ha 3.16 ; So 1.15 ; Ps 20.2 ; 50.15 ; 77.3 ; 86.7. Voir aussi Jb 21.30 (autre terme hébreu).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a tout fait pour un but,'
  - type: text
    content: même le méchant pour le jour du malheur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'hautain  : autre traduction hardi , cf. Ps 131.1n  ; 2Ch 17.6n. –  en aucun cas il ne sera tenu pour innocent  : litt. main à main il ne sera pas innocenté  ; cf. 6.7 ; 8.13 ; 11.21n.'
  - type: text
    content: 'Tout cœur hautain est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: en aucun cas il ne sera tenu pour innocent.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX l''équivalent de ce v. fait suite à 15.27. –  fidélité et loyauté 3.3n  ; cf. 10.12 ; 1P 4.8 ; Tobit 12.9 : « L''aumône délivre de la mort et elle purifie de tout péché. Ceux qui font l''aumône seront rassasiés de vie. » –  expiée  : autre traduction compensée . –  crainte du Seigneur 1.7n.'
  - type: text
    content: Par la fidélité et la loyauté la faute est expiée ;
  - type: text
    content: 'par la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' on s''écarte du mal.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX l''équivalent de ce v. fait suite à 15.28 ; ici LXX porte  : Le commencement de la bonne voie, c''est de faire ce qui est juste ; (faire) ce qui est agréé de Dieu vaut mieux que d''offrir des sacrifices . –  se réconcilient  : autres traductions vivent en paix  ; fassent la paix (même verbe en 1R 22.45n) ; cf. Gn 26.26ss ; 31.1ss.'
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agrée les voies d''un homme,'
  - type: text
    content: il fait que ses ennemis eux-mêmes se réconcilient avec lui.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX l''équivalent des v. 8s fait suite à 15.29 ; ici LXX porte  : Celui qui cherche le Seigneur trouvera la connaissance avec la justice  ; ceux qui le cherchent droitement trouveront la paix . –  Mieux vaut peu 15.16n  ; cf. Ps 37.6 ; Dn 4.24n  ; Tobit 12.8 : « Mieux vaut la prière avec la vérité et l''aumône que la richesse avec l''injustice. » –  justice ou générosité  ; cf. 10.2n. –  revenus 3.9n. –  illicites  : autre traduction sans équité (1.3n). – Cf. Instruction d''Aménémopé 16.11ss : « Mieux vaut être loué comme philanthrope que d''avoir des biens dans sa grange ; mieux vaut du pain, quand le cœur est heureux, que des richesses avec du chagrin. »'
  - type: text
    content: Mieux vaut peu avec la justice
  - type: text
    content: que d'abondants revenus illicites.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'LXX porte ici un équivalent de 16.4n. –  Le cœur de l''être humain  : cf. 19.21.'
  - type: text
    content: Le cœur de l'être humain prépare sa voie ;
  - type: text
    content: 'c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui affermit ses pas.'
  - type: heading
    content: A propos des rois
