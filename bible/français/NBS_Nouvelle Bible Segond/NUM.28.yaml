document_id: NUM.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles concernant les sacrifices
  - type: heading
    content: Pour chaque jour
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: holocauste constant v. 3ss,15,24,31 ; 29.6,11,16,19,22,25,28,31,34,38 ; voir sacrifices.
  - type: text
    content: C'est l'holocauste du sabbat, pour chaque sabbat, en plus de l'holocauste constant et de sa libation.
  - type: heading
    content: Pour le premier jour du mois
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Au commencement de vos mois  : autre traduction à vos nouvelles lunes (ou néoménies ), cf. v. 14 ; 10.10 ; Ez 45.18ss ; 46.6s ; voir aussi 1S 20.5,18 ; 2R 4.23 ; Es 1.13s ; Os 2.13 ; Am 8.5 ; Esd 3.5 ; Né 10.34 ; 1Ch 23.31 ; 2Ch 2.3 ; 8.13 ; 31.3 ; Ga 4.10 ; Col 2.16. –  taureaux 7.15+.'
  - type: text
    content: 'Au commencement de vos mois, vous présenterez en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ' deux taureaux, un bélier et sept agneaux d''un an sans défaut '
  '12':
  - type: note
    content: Cf. 15.4-12 et les notes ; Ez 45.24 ; 46.5,7.
  - type: text
    content: 'avec trois dixièmes de fleur de farine pétrie à l''huile en offrande végétale pour chaque taureau, deux dixièmes de fleur de farine pétrie à l''huile en offrande végétale pour chaque bélier, '
  '13':
  - type: note
    content: 'un dixième  : litt. un dixième, un dixième, peut-être au sens de chaque fois un dixième  ; d''autres comprennent un dixième de dixième.'
  - type: text
    content: 'et un dixième de fleur de farine pétrie à l''huile en offrande végétale pour chaque agneau. C''est un holocauste, une odeur agréable, une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: note
    content: 'de vin  : d''après des versions anciennes cette précision intervient au début de l''énumération.'
  - type: text
    content: 'Leurs libations seront d''un demi-hîn pour un taureau, d''un tiers de hîn pour un bélier et d''un quart de hîn de vin pour un agneau. Tel est l''holocauste du mois, mois après mois, pour tous les mois de l''année ; '
  '15':
  - type: note
    content: 'en sacrifice pour le péché  : autre traduction pour le péché, cf. v. 22,30 ; 29.5,11,16,19,22,25,28,31,34,38 ; voir aussi 7.16 ; Ez 45.23.'
  - type: text
    content: 'et un bouc pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en sacrifice pour le péché, offert en plus de l''holocauste constant et de sa libation.'
  - type: heading
    content: Pour la fête de la Pâque
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'premier mois  : ici mars-avril ; cf. Ex 12.2n  ; voir calendrier et fêtes. –  la Pâque 9.1-14 ; Lv 23.5ss ; cf. Ex 12.1ss,11n,24ss,43ss ; voir aussi 13.3ss ; 23.14s ; 34.18 ; Dt 16.1-8 ; Ez 45.21ss.'
  - type: text
    content: 'Le quatorzième jour du premier mois, il y aura la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 12.18. –  il y aura la fête  : cf. Ex 5.1n  ; Lv 23.6 ; Ez 45.21. –  On mangera  : autre traduction on mange.'
  - type: text
    content: 'Le quinzième jour de ce mois il y aura la fête. On mangera des pains sans levain pendant sept jours. '
  '18':
  - type: note
    content: 'convocation sacrée / aucun travail servile  : cf. v. 25s ; 29.1,7,12,35 ; Lv 23.2,7ns,21,24,27s,35 ; voir aussi saint.'
  - type: text
    content: 'Le premier jour, il y aura convocation sacrée : vous ne ferez aucun travail servile. '
  '19':
  - type: note
    content: 'taureaux / bélier / agneaux v. 11ss ; cf. Dt 16.2 ; Ez 45.22s. –  vous prendrez…  : litt. ils seront parfaits pour vous  ; de même au v. 31 ; 29.8.'
  - type: text
    content: 'Vous présenterez, en offrande consumée par le feu, en holocauste pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', deux taureaux, un bélier et sept agneaux d''un an ; vous prendrez des bêtes sans défaut ; '
  '2':
  - type: note
    content: 'Cf. Lv 16 ; 23 ; Ez 45.18–46.15. –  au temps fixé  : litt. en son temps fixé, terme cultuel (9.2n  ; 16.2n) qui est traduit dans d''autres contextes par rencontre festive (= fête, cf. Gn 1.14n  ; Ex 23.14ss ; 34.18ss ; Dt 16.1ss) ou rencontre (dans tente de la Rencontre, 1.1n). –  présent Lv 1.2n. –  mon pain  : on pourrait vocaliser le texte hébreu traditionnel de façon à lire le pain de mes offrandes…, expression similaire au v. 24 (nourriture) ; cf. Ex 25.30 ; Lv 21.6n,8 ; 23.18 ; 1S 21.5 ; 1R 7.48 ; voir aussi Ps 50.13. –  offrandes consumées par le feu v. 3,6,8,13,19,24 ; 29.6,13,36 ; Lv 23.8,25,27,36 ; voir sacrifices. –  l''odeur qui m''est agréable  : cf. Gn 8.21n  ; Lv 1.9.'
  - type: text
    content: 'Donne cet ordre aux Israélites : Vous aurez soin de m''offrir, au temps fixé, mon présent, mon pain, mes offrandes consumées par le feu, l''odeur qui m''est agréable. '
  '20':
  - type: note
    content: 'leur offrande végétale sera  : cf. v. 28s ; 29.3s,9s,14s.'
  - type: text
    content: 'leur offrande végétale sera de la fleur de farine pétrie à l''huile, trois dixièmes pour le taureau, deux dixièmes pour le bélier '
  '21':
  - type: text
    content: 'et un dixième pour chacun des sept agneaux ; '
  '22':
  - type: note
    content: Voir sacrifice.
  - type: text
    content: 'et un bouc en sacrifice pour le péché, pour faire l''expiation sur vous. '
  '23':
  - type: text
    content: 'Vous offrirez cela en plus de l''holocauste du matin, c''est-à-dire l''holocauste constant. '
  '24':
  - type: text
    content: 'Vous les offrirez chaque jour, pendant sept jours, comme une nourriture consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils seront offerts en plus de l''holocauste constant et de sa libation. '
  '25':
  - type: note
    content: Cf. v. 18+ ; Ex 12.16.
  - type: text
    content: 'Le septième jour, il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile.'
  - type: heading
    content: Pour la fête des Semaines
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'jour des premiers fruits  : cf. 13.20n  ; 18.13 ; voir aussi Gn 4.4 ; Ex 13.1s,11ss ; 34.19 ; Dt 26.1-11 ; LXX a traduit jour des choses nouvelles . –  offrande  : voir sacrifices. –  à votre fête des Semaines  : litt. dans vos semaines , nom de la fête connue par la suite sous le nom Pentecôte (du mot grec pour cinquantième , le cinquantième jour étant le lendemain d''une semaine de semaines [7 x 7 = 49 jours] à compter de l''offrande des prémices de la moisson des orges, c.-à-d. à la fin de la période des moissons) : cf. Ex 23.16 ; 34.22 ; Lv 23.11,15ss ; Dt 16.9-12 ; 2Ch 8.13 ; Ac 2.1nss ; voir aussi calendrier et fêtes. –  sacrée  : voir saint.'
  - type: text
    content: 'Le jour des premiers fruits, où vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une offrande végétale nouvelle, à votre fête des Semaines, il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile. '
  '27':
  - type: note
    content: Cf. Lv 23.18.
  - type: text
    content: 'Vous présenterez en holocauste, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', deux taureaux, un bélier et sept agneaux d''un an ; '
  '28':
  - type: text
    content: 'leur offrande végétale sera de la fleur de farine pétrie à l''huile, trois dixièmes pour chaque taureau, deux dixièmes pour chaque bélier '
  '29':
  - type: text
    content: 'et un dixième pour chacun des sept agneaux ; '
  '3':
  - type: note
    content: 'Ex 29.38ss ; 2R 16.15 ; Ez 46.13ss ; cf. Lv 6.2,6 ; Dn 8.11 ; 11.31 ; 12.11 ; Esd 3.3 ; 1Ch 16.40 ; 2Ch 2.3 ; 13.11 ; 31.3. –  sans défaut  : litt. parfaits, de même dans la suite (chap. 28–29).'
  - type: text
    content: 'Tu leur diras : Voici l''offrande consumée par le feu que vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : chaque jour, deux agneaux d''un an sans défaut, en holocauste constant. '
  '30':
  - type: note
    content: expiation 8.19+.
  - type: text
    content: 'et un bouc, pour faire l''expiation sur vous. '
  '31':
  - type: note
    content: Vous prendrez… v. 19n.
  - type: text
    content: Vous offrirez cela en plus de l'holocauste constant et de son offrande végétale. Vous prendrez des bêtes sans défaut, avec leurs libations.
  '4':
  - type: note
    content: 'Ex 29.39 ; cf. 1R 18.29,36 ; 2R 3.20. –  Tu offriras  : litt. tu feras, de même dans la suite (cf. v. 8n). –  à la tombée du soir 9.3 ; Ex 12.6n.'
  - type: text
    content: 'Tu offriras le premier agneau le matin, tu offriras le second agneau à la tombée du soir ; '
  '5':
  - type: note
    content: Cf. v. 7 ; pour les quantités voir 15.4ss et les notes. –  huile vierge Ex 27.20n  ; 29.40.
  - type: text
    content: 'pour l''offrande végétale, un dixième d''épha de fleur de farine pétrie dans un quart de hîn d''huile vierge. '
  '6':
  - type: note
    content: 'offert au mont Sinaï  : allusion à Ex 29.38ss.'
  - type: text
    content: 'C''est l''holocauste constant offert au mont Sinaï ; c''est une odeur agréable, une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'Sa libation  : certains mss de LXX précisent de vin. –  que tu répandras  : cf. 15.4n,10. –  boisson alcoolisée 6.3 ; cf. 15.5 ; Lv 10.9n.'
  - type: text
    content: 'Sa libation sera d''un quart de hîn pour chaque agneau ; c''est dans le sanctuaire que tu répandras la libation de boisson alcoolisée pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: note
    content: Tu offriras et tu feras traduisent le même verbe hébreu, cf. v. 4n.
  - type: text
    content: 'Tu offriras le second agneau à la tombée du soir ; tu feras comme pour l''offrande végétale du matin et sa libation ; c''est une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Pour le jour du sabbat
  '9':
  - type: text
    content: ' '
  - type: note
    content: sabbat Ez 46.1-5 ; Mt 12.5 ; sur la signification cultuelle du sabbat Gn 2.1-3 ; Ex 20.11 ; 23.12 ; 31.12ss ; 34.21 ; 35.2s ; Dt 5.14s ; Jr 17.19ss. –  deux dixièmes d'épha selon toute vraisemblance, de même dans la suite (chap. 28–29) ; cf. 15.4n. Voir mesures, poids et monnaies.
  - type: text
    content: 'Le jour du sabbat : deux agneaux d''un an sans défaut et, pour l''offrande végétale, deux dixièmes de fleur de farine pétrie à l''huile, avec sa libation. '
