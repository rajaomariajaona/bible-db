document_id: ECC.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Ne te presse pas… Pr 20.25. – Voir cœur. –  Dieu est au ciel… Dt 4.39 ; Jos 2.11 ; Ps 115.16 ; Jb 22.12. –  que tes paroles…  : cf. Mt 6.7 ; Siracide 7.14 : « Ne répète pas tes paroles dans ta prière. »'
  - type: text
    content: Ne te presse pas d'ouvrir la bouche,
  - type: text
    content: que ton cœur ne se hâte pas d'exprimer une parole devant Dieu ;
  - type: text
    content: car Dieu est au ciel, et toi sur la terre ;
  - type: text
    content: que tes paroles soient donc peu nombreuses.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Pr 19.6.
  - type: text
    content: Quand les biens se multiplient, ceux qui les mangent se multiplient aussi ;
  - type: text
    content: quel bénéfice en ont les propriétaires, sinon qu'ils le voient de leurs yeux ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 13.8. –  du travailleur  : LXX de l''esclave.'
  - type: text
    content: Le sommeil du travailleur est doux,
  - type: text
    content: qu'il ait peu ou beaucoup à manger ;
  - type: text
    content: la satiété du riche ne le laisse pas dormir.
  '12':
  - type: text
    content: 'Il est un malheur affligeant que j''ai vu sous le soleil :'
  - type: text
    content: la richesse que son propriétaire garde pour son malheur.
  '13':
  - type: text
    content: ' '
  - type: note
    content: occupation 1.13+.
  - type: text
    content: Cette richesse se perd dans une mauvaise occupation.
  - type: text
    content: Le fils qu'il avait engendré n'a plus rien en main.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 49.18 ; Jb 1.21 ; 1Tm 6.7. –  qu''il puisse conserver  : litt. qu''il fasse aller  ; LXX qui aille.'
  - type: text
    content: Comme il est sorti du ventre de sa mère,
  - type: text
    content: il s'en retourne nu, comme il était venu ;
  - type: text
    content: de son travail, il n'emportera rien qu'il puisse conserver dans sa main.
  '15':
  - type: text
    content: ' '
  - type: note
    content: quel avantage… 1.3n.
  - type: text
    content: C'est encore là un malheur affligeant.
  - type: text
    content: Il s'en ira exactement comme il était venu ;
  - type: text
    content: et quel avantage aura-t-il à avoir travaillé pour du vent ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'contrariété 1.18n  ; cf. Jb 14.1. –  affliction  : litt. sa maladie  ; le possessif est absent de plusieurs versions anciennes ; cf. 6.2n.'
  - type: text
    content: Il consume ainsi toutes ses journées dans les ténèbres,
  - type: text
    content: beaucoup de contrariété, d'affliction et d'irritation.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 2.24+. –  travail 1.3n. –  le nombre des jours 2.3+.
  - type: text
    content: 'Voici ce que, moi, j''ai vu : il est beau pour l''homme de manger, de boire et de voir le bonheur dans tout le travail qu''il fait sous le soleil, pendant le nombre des jours de vie que Dieu lui a donnés : c''est là sa part. '
  '18':
  - type: note
    content: don de Dieu 3.13.
  - type: text
    content: 'D''ailleurs, pour tout être humain à qui Dieu a donné richesse et biens et à qui il a accordé le pouvoir de s''en nourrir, d''en prendre sa part et de se réjouir de son travail, c''est là un don de Dieu. '
  '19':
  - type: note
    content: 'il ne songera guère…  : autres traductions il ne se souviendra pas beaucoup des jours de sa vie ; quand il n''aura plus beaucoup il se souviendra des jours de sa vie… –  la joie de son cœur  : cf. Ct 3.11.'
  - type: text
    content: En effet, il ne songera guère à la durée de sa vie, tant que Dieu l'occupe à la joie de son cœur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'le rêve…  : cf. v. 6,11 ; 2.23. –  occupations 1.13+. –  stupide 2.14+. –  multitude des paroles 6.11 ; Pr 10.19 ; 13.3 ; Jc 3.8.'
  - type: text
    content: En effet, comme le rêve vient de la multitude des occupations,
  - type: text
    content: la voix de l'homme stupide vient dans la multitude des paroles.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'vœu Lv 27.2 ; Nb 30.2-17 ; Dt 23.22-24 ; Pr 20.25 ; Mt 5.33. –  on ne trouve aucun plaisir aux gens stupides  : autres traductions il n''y a pas de plaisir chez les gens stupides ; il n''y a pas de faveur pour les gens stupides  ; cf. 12.1,10. Le terme hébreu correspondant à plaisir ou faveur a quelquefois dans Qohéleth le sens de chose dont on s''occupe (v. 7 ; 3.1,17 etc.) ; s''il était à prendre ici dans le même sens, la phrase pourrait signifier  : il n''y a rien de consistant chez les gens stupides (cf. 2.14+).'
  - type: text
    content: Lorsque tu as fait un vœu à Dieu, ne tarde pas à t'en acquitter,
  - type: text
    content: car on ne trouve aucun plaisir aux gens stupides ;
  - type: text
    content: acquitte-toi du vœu que tu as fait.
  '4':
  - type: text
    content: Mieux vaut pour toi ne pas faire de vœu
  - type: text
    content: que d'en faire un sans t'en acquitter.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'te rendre…  : litt. faire pécher ta chair  ; cf. Mt 12.36s ; Jc 3.4-6. –  le messager ou l''ange  ; ce terme désigne le prêtre en Ml 2.7. –  une erreur  : cf. 10.5 ; Lv 4.2n  ; Nb 15.22ss. –  tes paroles  : litt. ta voix.'
  - type: text
    content: Ne permets pas à ta bouche de te rendre tout entier pécheur,
  - type: text
    content: et ne dis pas devant le messager que c'était une erreur.
  - type: text
    content: Pourquoi Dieu devrait-il s'irriter de tes paroles
  - type: text
    content: et ruiner l'œuvre de tes mains ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; litt. dans la multitude des rêves et des futilités et des paroles en multitude (cf. v. 2). On pourrait aussi comprendre dans la multitude des rêves et des futilités il y a beaucoup de paroles , ou encore quand il y a multitude de rêves et de futilités et abondance de paroles, toi, crains Dieu (3.14+) ; cf. Siracide 34.1-3 : « Les espérances vaines trompent l''homme sans intelligence et les songes donnent des ailes aux insensés. C''est saisir une ombre et poursuivre le vent que tenir compte des songes. Un simple reflet, c''est ce qu''on voit en songe : en face d''un visage la reproduction de ce visage. »'
  - type: text
    content: Car dans la multitude des rêves il y a des futilités,
  - type: text
    content: de même quand il y a beaucoup de paroles ;
  - type: text
    content: aussi, crains Dieu.
  - type: heading
    content: Les abus de pouvoir
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'dans une province  : litt. dans la province  ; cf. 2.8 ; Ez 19.8 ; Dn 8.2 ; Est 1.1. –  on dépouille…  : autre traduction on le dépouille du droit (ou de l''équité ) et de la justice  ; 3.16 ; cf. Es 10.2 ; voir aussi Mi 7.3 ; Jb 9.24. –  haut placé  : il faut sans doute voir ici une description de la corruption administrative associée à la tactique du fonctionnaire s''abritant sous l''autorité d''un supérieur hiérarchique ; cf. Jn 19.11 ; Col 4.1.'
  - type: text
    content: Si tu vois que, dans une province, on opprime le pauvre, on dépouille le droit et la justice, ne sois pas stupéfait de la chose ; car
  - type: text
    content: un personnage haut placé protège un autre personnage haut placé,
  - type: text
    content: et il en est encore de plus haut placés qu'eux.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'L''avantage (cf. 1.3n) …  : le texte est obscur ; cf. Pr 12.11 ; 28.19. Autre traduction l''avantage pour le pays à tous égards, c''est un roi (bien) servi par (les sujets de) la campagne.'
  - type: text
    content: L'avantage de la terre est pour tous ;
  - type: text
    content: même un roi est tributaire de la campagne.
  - type: heading
    content: Futilité de la richesse
  '9':
  - type: text
    content: ' '
  - type: note
    content: '1Tm 6.9s ; cf. Siracide 14.3 : « A l''homme chiche ne sied pas la richesse, pour l''homme envieux à quoi bon de grands biens ? » –  n''a pas de revenus  : autre traduction n''est pas rassasié par ses revenus.'
  - type: text
    content: Celui qui aime l'argent n'est pas rassasié par l'argent ;
  - type: text
    content: celui qui aime l'abondance n'a pas de revenus.
  - type: text
    content: C'est encore là une futilité.
