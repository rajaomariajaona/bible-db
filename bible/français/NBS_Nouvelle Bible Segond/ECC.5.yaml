        text: 2.3+.
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que, moi, j''ai vu : il est beau pour l''homme de manger, de boire et de voir le bonheur dans tout le travail qu''il fait sous le soleil, pendant le nombre des jours de vie que Dieu lui a donnés : c''est là sa part. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'don de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.13.
    marker-yv: yv-n
  - type: text
    text: 'D''ailleurs, pour tout être humain à qui Dieu a donné richesse et biens et à qui il a accordé le pouvoir de s''en nourrir, d''en prendre sa part et de se réjouir de son travail, c''est là un don de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
