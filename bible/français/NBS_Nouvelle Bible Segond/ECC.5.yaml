      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne songera guère…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il ne se souviendra pas beaucoup des jours de sa vie ; quand il n''aura plus beaucoup il se souviendra des jours de sa vie… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la joie de son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ct 3.11.'
    marker-yv: yv-n
  - type: text
    text: En effet, il ne songera guère à la durée de sa vie, tant que Dieu l'occupe à la joie de son cœur.
