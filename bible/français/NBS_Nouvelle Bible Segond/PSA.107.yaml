      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 14,16 ; 142.8+ ; Jb 36.8s.'
      marker-yv: yv-n
    - type: text
      text: D'autres habitaient les ténèbres et l'ombre de mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prisonniers dans l'affliction et dans les fers,
  '11':
  - type: usfm
    marker: q1
