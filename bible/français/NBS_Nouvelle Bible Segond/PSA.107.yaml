        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',43 ; 2Ch 36.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
