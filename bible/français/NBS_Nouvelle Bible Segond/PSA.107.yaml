      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 45.2 ; Jr 51.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même terme hébreu est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'battant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de porte) ; cf. Es 45.1s.
      marker-yv: yv-n
    - type: text
      text: Car il a brisé les portes de bronze,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a cassé les verrous de fer.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
