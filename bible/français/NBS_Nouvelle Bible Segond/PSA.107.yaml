        children:
        - type: text
          text: '107.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'personne ne les secourut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22.12 ; Jb 30.13.
      marker-yv: yv-n
    - type: text
      text: Il humilia leur cœur par l'oppression ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils trébuchèrent, et personne ne les secourut.
  '13':
  - type: usfm
