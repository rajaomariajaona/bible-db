      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 68.23 ; 69.3,16 ; 88.7 ; Ex 15.5 ; Jon 2.4 ; Mi 7.19 ; Za 10.11 ; Jb 41.23 ; Né 9.11.'
      marker-yv: yv-n
    - type: text
      text: 'ceux-là virent les œuvres du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses actes étonnants dans les profondeurs.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.25 '
      - type: usfm
        marker: ft
        children:
