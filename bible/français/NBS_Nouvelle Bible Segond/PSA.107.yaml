      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traduction incertaine ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Il leur a porté secours (en les affranchissant) de leur révolte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils étaient malades de leur révolte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de leurs transgressions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. v. 10,41 ; 32.1ss ; 38.2ss ; 39.9,12.
      marker-yv: yv-n
    - type: text
      text: Des imbéciles, par leur révolte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par leurs fautes, s'étaient condamnés à l'affliction.
