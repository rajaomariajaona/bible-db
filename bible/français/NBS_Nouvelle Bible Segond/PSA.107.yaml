        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Qu''ils le disent, ceux que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a rédimés,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qu'il a repris à l'adversaire
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il envoya…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 130 ; 147.15 ; Es 55.11 ; Mt 8.8 ; Ac 10.36 ; 13.26 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.12 : « Ta parole, Seigneur, elle qui guérit tout. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs infections
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; le terme hébreu rappelle l''un de ceux qui sont habituellement traduits par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fosse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Lm 4.20) ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il les fit sortir de la fosse sains et saufs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 103.3s ; Jb 33.18.
      marker-yv: yv-n
    - type: text
      text: Il envoya sa parole et les guérit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les délivra de leurs infections.
  '21':
  - type: usfm
    marker: q1
