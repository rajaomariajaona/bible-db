      marker-yv: yv-n
    - type: text
      text: Qu'ils offrent des sacrifices de reconnaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils racontent ses œuvres avec des cris de joie !
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
