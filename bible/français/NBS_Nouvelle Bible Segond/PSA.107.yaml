        - type: text
          text: ', cf. Gn 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: parce qu'ils s'étaient rebellés contre les paroles de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils avaient méprisé le conseil du Très-Haut.
  '12':
  - type: usfm
