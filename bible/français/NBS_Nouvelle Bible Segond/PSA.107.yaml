document_id: PSA.107,104
type_code: fra
verses:
  '1':
  - type: heading
    content: LIVRE CINQUIÈME
  - type: heading
    content: Célébrez le Seigneur libérateur
  - type: text
    content: ' '
  - type: note
    content: 106.1+.
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il est bon,'
  - type: text
    content: car sa fidélité est pour toujours !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'les ténèbres…  : cf. 23.4n  ; Es 9.1 ; 42.7 ; 49.9 ; Lc 1.79. –  dans les fers  : cf. v. 14,16 ; 142.8+ ; Jb 36.8s.'
  - type: text
    content: D'autres habitaient les ténèbres et l'ombre de mort,
  - type: text
    content: prisonniers dans l'affliction et dans les fers,
  '11':
  - type: text
    content: ' '
  - type: note
    content: '106.13n,43 ; 2Ch 36.16. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: parce qu'ils s'étaient rebellés contre les paroles de Dieu,
  - type: text
    content: parce qu'ils avaient méprisé le conseil du Très-Haut.
  '12':
  - type: text
    content: ' '
  - type: note
    content: personne ne les secourut 22.12 ; Jb 30.13.
  - type: text
    content: Il humilia leur cœur par l'oppression ;
  - type: text
    content: ils trébuchèrent, et personne ne les secourut.
  '13':
  - type: text
    content: ' '
  - type: note
    content: V. 6n.
  - type: text
    content: 'Dans la détresse, ils crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et il les sauva de leur désarroi.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Col 1.13.
  - type: text
    content: Il les fit sortir des ténèbres et de l'ombre de mort,
  - type: text
    content: et il rompit leurs liens.
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 8+.
  - type: text
    content: 'Qu''ils célèbrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour sa fidélité'
  - type: text
    content: et pour ses actes étonnants en faveur des humains !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Es 45.2 ; Jr 51.30. –  portes  : le même terme hébreu est aussi traduit par battant (de porte) ; cf. Es 45.1s.'
  - type: text
    content: Car il a brisé les portes de bronze,
  - type: text
    content: il a cassé les verrous de fer.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Traduction incertaine ; LXX Il leur a porté secours (en les affranchissant) de leur révolte  ; certains modifient le texte hébreu traditionnel pour lire ils étaient malades de leur révolte (ou de leurs transgressions ) ; cf. v. 10,41 ; 32.1ss ; 38.2ss ; 39.9,12.
  - type: text
    content: Des imbéciles, par leur révolte
  - type: text
    content: et par leurs fautes, s'étaient condamnés à l'affliction.
  '18':
  - type: text
    content: ' '
  - type: note
    content: gosier v. 9n. –  toute nourriture 102.5. –  portes de la mort 9.14 ; 88.4 ; Es 38.10.
  - type: text
    content: Leur gosier avait en abomination toute nourriture,
  - type: text
    content: et ils touchaient aux portes de la mort.
  '19':
  - type: text
    content: ' '
  - type: note
    content: V. 6n.
  - type: text
    content: 'Dans la détresse, ils crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et il les sauva de leur désarroi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 106.10 ; 118.2-4 ; Es 62.12. –  rédimés et repris traduisent la même racine hébraïque, qui a donné les mots habituellement traduits par rédemption, rédempteur  ; cf. 19.15+ ; 103.4n.
  - type: text
    content: 'Qu''ils le disent, ceux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a rédimés,'
  - type: text
    content: ceux qu'il a repris à l'adversaire
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Il envoya…  : cf. 130 ; 147.15 ; Es 55.11 ; Mt 8.8 ; Ac 10.36 ; 13.26 ; Sagesse 16.12 : « Ta parole, Seigneur, elle qui guérit tout. » –  leurs infections  : traduction incertaine ; le terme hébreu rappelle l''un de ceux qui sont habituellement traduits par fosse (Lm 4.20) ; certains modifient le texte hébreu traditionnel pour lire il les fit sortir de la fosse sains et saufs  ; cf. 103.3s ; Jb 33.18.'
  - type: text
    content: Il envoya sa parole et les guérit,
  - type: text
    content: il les délivra de leurs infections.
  '21':
  - type: text
    content: ' '
  - type: note
    content: V. 8+.
  - type: text
    content: 'Qu''ils célèbrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour sa fidélité'
  - type: text
    content: et pour ses actes étonnants en faveur des humains !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 50.14 ; Lv 7.12ns ; Hé 13.15.
  - type: text
    content: Qu'ils offrent des sacrifices de reconnaissance
  - type: text
    content: et qu'ils racontent ses œuvres avec des cris de joie !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'qui voyageaient  : litt. qui descendaient . Cf. Siracide 43.23ss : « Selon son dessein il a dompté l''abîme et il y a planté des îles. Ceux qui naviguent sur la mer racontent ses dangers, et nous n''en croyons pas nos oreilles. Il y a là des œuvres étranges et merveilleuses, animaux de toute espèce et la race des monstres marins. »'
  - type: text
    content: Ceux qui voyageaient sur la mer dans des bateaux
  - type: text
    content: et qui faisaient des affaires sur les grandes eaux,
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'dans les profondeurs  : cf. 68.23 ; 69.3,16 ; 88.7 ; Ex 15.5 ; Jon 2.4 ; Mi 7.19 ; Za 10.11 ; Jb 41.23 ; Né 9.11.'
  - type: text
    content: 'ceux-là virent les œuvres du '
  - type: text
    content: Seigneur
  - type: text
    content: et ses actes étonnants dans les profondeurs.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. 104.4 ; Jon 1.4.
  - type: text
    content: Il parla et fit lever un vent de tempête
  - type: text
    content: qui souleva les flots.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 10.7 ; Nb 10.35n. –  défaillaient  : litt. fondaient.'
  - type: text
    content: Ils montaient vers le ciel,
  - type: text
    content: ils descendaient dans les abîmes ;
  - type: text
    content: ils défaillaient dans le malheur ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Pr 23.34. –  saisis de vertige  : autres traductions ils gesticulaient ; ils sautaient ; ils zigzaguaient  ; le verbe hébreu correspondant (ou un homonyme) signifie habituellement célébrer une fête (Ex 5.1n). –  engloutie  : autres traductions dans la confusion ; embrouillée  ; cf. Es 3.12n.'
  - type: text
    content: saisis de vertige, ils titubaient comme l'ivrogne,
  - type: text
    content: et toute leur sagesse était engloutie.
  '28':
  - type: text
    content: ' '
  - type: note
    content: V. 6n.
  - type: text
    content: 'Dans la détresse, ils crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et il les fit sortir de leur désarroi.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 89.10 ; Jon 1.15 ; Mc 4.39/ /.
  - type: text
    content: Il arrêta, calma la tempête,
  - type: text
    content: et les flots se turent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '106.47 ; Es 11.12 ; 43.5 ; 49.10ss ; 51.10s ; Jr 29.14 ; 31.8 ; Ez 20.34 ; 39.27 ; Mt 8.11 ; Lc 13.29. –  de la mer  : Tg de la mer Rouge  ; certains modifient le texte hébreu traditionnel pour lire et du sud.'
  - type: text
    content: et rassemblés de tous les pays,
  - type: text
    content: de l'est et de l'ouest, du nord et de la mer !
  '30':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jn 6.21.
  - type: text
    content: Ils se réjouirent de ce qu'ils s'étaient apaisés,
  - type: text
    content: et il les conduisit au port désiré.
  '31':
  - type: text
    content: ' '
  - type: note
    content: V. 8+.
  - type: text
    content: 'Qu''ils célèbrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour sa fidélité'
  - type: text
    content: et pour ses actes étonnants en faveur des humains !
  '32':
  - type: text
    content: ' '
  - type: note
    content: 22.23ss ; 35.18.
  - type: text
    content: Qu'ils l'exaltent dans l'assemblée du peuple,
  - type: text
    content: qu'ils le louent dans la réunion des anciens !
  '33':
  - type: text
    content: ' '
  - type: note
    content: Es 19.6 ; 42.15 ; 50.2.
  - type: text
    content: Il change les fleuves en désert
  - type: text
    content: et les sources en terre desséchée,
  '34':
  - type: text
    content: ' '
  - type: note
    content: Dt 29.22s ; Jr 17.6.
  - type: text
    content: le pays fertile en pays salé,
  - type: text
    content: à cause du mal que font ses habitants.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 105.41 ; 114.8 ; Es 35.6s ; 41.18 ; 43.19s.
  - type: text
    content: Il change le désert en étang
  - type: text
    content: et la terre desséchée en sources,
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 4,7.
  - type: text
    content: et il y fait habiter les affamés.
  - type: text
    content: Ils fondent une ville pour y habiter ;
  '37':
  - type: text
    content: ' '
  - type: note
    content: Es 65.21 ; Jr 31.5 ; Am 9.13ss.
  - type: text
    content: ils ensemencent des champs et plantent des vignes
  - type: text
    content: qui produisent un fruit abondant.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Gn 1.28 ; 17.20 ; Ex 1.7 ; Dt 7.13 ; Jr 31.27 ; Pr 10.22. – Voir bénédiction.
  - type: text
    content: Il les bénit, ils deviennent très nombreux,
  - type: text
    content: et il ne fait pas diminuer le nombre de leurs bêtes.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'D''autres  : litt. ils . Certains intervertissent les v. 39 et 40, de sorte que ce v. s''applique aux nobles.'
  - type: text
    content: D'autres sont diminués et courbés
  - type: text
    content: par l'étreinte du malheur et de la souffrance ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 2.6 ; Ez 34.6. –  ville…  : même expression aux v. 7,36.'
  - type: text
    content: Ils erraient dans le désert, sur une terre aride,
  - type: text
    content: ils ne trouvaient pas le chemin d'une ville où ils puissent habiter.
  '40':
  - type: text
    content: ' '
  - type: note
    content: 1S 2.4s ; Jb 12.21-24 ; Lc 1.51s.
  - type: text
    content: il répand le mépris sur les nobles,
  - type: text
    content: il les fait errer dans un chaos sans chemin,
  '41':
  - type: text
    content: ' '
  - type: note
    content: 113.7 ; 147.6 ; 1S 2.8 ; Lc 1.52s. –  les clans 22.28n. –  comme des troupeaux Jb 21.11.
  - type: text
    content: il relève le pauvre de l'affliction,
  - type: text
    content: il multiplie les clans comme des troupeaux.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Les gens droits  : litt. les droits. –  voient… se réjouissent 58.11s ; Jb 22.19. –  toute injustice…  : cf. 63.12 ; Jb 5.16 ; Pr 10.6 ; voir justice.'
  - type: text
    content: Les gens droits le voient, et ils se réjouissent ;
  - type: text
    content: mais toute injustice ferme la bouche.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 9.11 ; Os 14.10. –  la fidélité  : litt. les fidélités  ; Lm 3.22n  ; Ps 17.7+.'
  - type: text
    content: Que celui qui est sage prenne garde à tout cela
  - type: text
    content: 'et comprenne la fidélité du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ex 15.22 ; 16.3 ; Es 41.17.
  - type: text
    content: Ils souffraient de la faim et de la soif ;
  - type: text
    content: ils défaillaient.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 13,19,28 ; 18.7 ; 22.6 ; 25.17 ; 34.18 ; 81.8 ; 106.44 ; Jg 3.9+ ; Né 9.27. –  désarroi  : autre traduction angoisse.'
  - type: text
    content: 'Dans la détresse, ils crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et il les délivra de leur désarroi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: un chemin tout droit ou tout plat  ; cf. Gn 24.27 ; Jr 31.9n.
  - type: text
    content: Il les conduisit par un chemin tout droit,
  - type: text
    content: pour qu'ils aillent habiter dans une ville.
  '8':
  - type: text
    content: ' '
  - type: note
    content: V. 15,21,31 ; 1Ch 16.24.
  - type: text
    content: 'Qu''ils célèbrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour sa fidélité'
  - type: text
    content: et pour ses actes étonnants en faveur des humains !
  '9':
  - type: text
    content: ' '
  - type: note
    content: '146.7 ; Jr 31.25 ; Mt 5.6 ; Lc 1.53 ; Jn 4.14 ; 7.37. –  le gosier ou l''être, la vie (6.4n) ; de même à la fin du v. : litt. le gosier (ou l''être ) affamé.'
  - type: text
    content: Car il a rassasié le gosier altéré,
  - type: text
    content: il a comblé de biens l'affamé.
