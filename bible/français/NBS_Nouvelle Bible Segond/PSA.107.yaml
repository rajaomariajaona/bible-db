      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui descendaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.23ss : « Selon son dessein il a dompté l''abîme et il y a planté des îles. Ceux qui naviguent sur la mer racontent ses dangers, et nous n''en croyons pas nos oreilles. Il y a là des œuvres étranges et merveilleuses, animaux de toute espèce et la race des monstres marins. »'
      marker-yv: yv-n
    - type: text
      text: Ceux qui voyageaient sur la mer dans des bateaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui faisaient des affaires sur les grandes eaux,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
