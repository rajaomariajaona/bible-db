      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.13 : « Ne te porte pas caution au-dessus de tes moyens, et si tu le fais, attends-toi à devoir payer. » 29.14-20 : « L''homme de bien se porte caution pour son prochain, mais celui qui a perdu toute vergogne l''abandonne. N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé en personne pour toi. Le pécheur dilapide les biens de son garant et l''ingrat de nature abandonne celui qui l''a sauvé. Une caution a perdu bien des gens prospères et les a désemparés comme les vagues de la mer. Elle a contraint des gens à s''expatrier et les a fait errer parmi des nations étrangères. Quand un pécheur se précipite pour cautionner, s''il escompte un profit, il va au-devant des poursuites. Viens en aide au prochain dans la mesure de tes moyens, mais prends garde à ne pas te laisser prendre. »'
      marker-yv: yv-n
    - type: text
      text: Mon fils, si tu t'es porté garant pour ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu t'es engagé pour un autre,
