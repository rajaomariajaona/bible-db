document_id: PRO.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les engagements inconsidérés
  - type: text
    content: ' '
  - type: note
    content: 'si tu t''es engagé pour un autre  : litt. si tu as tapé ta main pour un étranger  ; 5.23 ; 11.15 ; 17.18 ; 20.16 ; 22.26s ; 27.13 ; cf. Siracide 8.13 : « Ne te porte pas caution au-dessus de tes moyens, et si tu le fais, attends-toi à devoir payer. » 29.14-20 : « L''homme de bien se porte caution pour son prochain, mais celui qui a perdu toute vergogne l''abandonne. N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé en personne pour toi. Le pécheur dilapide les biens de son garant et l''ingrat de nature abandonne celui qui l''a sauvé. Une caution a perdu bien des gens prospères et les a désemparés comme les vagues de la mer. Elle a contraint des gens à s''expatrier et les a fait errer parmi des nations étrangères. Quand un pécheur se précipite pour cautionner, s''il escompte un profit, il va au-devant des poursuites. Viens en aide au prochain dans la mesure de tes moyens, mais prends garde à ne pas te laisser prendre. »'
  - type: text
    content: Mon fils, si tu t'es porté garant pour ton prochain,
  - type: text
    content: si tu t'es engagé pour un autre,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Un peu de sommeil…  : les v. 10s sont identiques à 24.33s, à une lettre près, qui fait lire au v. 11 comme un rôdeur et, en 24.34 qui rôde . –  les bras ou les mains , cf. Ec 4.5.'
  - type: text
    content: Un peu de sommeil, un peu d'assoupissement,
  - type: text
    content: un peu croiser les bras en se couchant…
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'un soudard  : litt. un homme de bouclier  ; certains comprennent un mendiant  ; d''autres, un homme arrogant , ou encore un homme armé.'
  - type: text
    content: et la pauvreté te surprendra, comme un rôdeur ;
  - type: text
    content: la misère, comme un soudard.
  - type: heading
    content: Portrait de l'homme perfide
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'homme sans morale  : cf. Dt 13.14n. –  langage tortueux 4.24n.'
  - type: text
    content: L'homme sans morale est un malfaisant ;
  - type: text
    content: il marche, un langage tortueux à la bouche ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'cligne de l''œil 10.10 ; Ps 35.19n  ; cf. Siracide 27.22 : « Celui qui cligne de l''œil combine de mauvais coups ; mais qui le connaît s''en tient à l''écart. »'
  - type: text
    content: il cligne de l'œil, parle avec le pied,
  - type: text
    content: fait des signes avec les doigts ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  il trame le mal…  : on pourrait aussi ponctuer il trame le mal, en tout temps il déchaîne les querelles.'
  - type: text
    content: la perversité est dans son cœur,
  - type: text
    content: il trame le mal en tout temps,
  - type: text
    content: il déchaîne des querelles.
  '15':
  - type: text
    content: ' '
  - type: note
    content: il est brisé… 29.1.
  - type: text
    content: Aussi la catastrophe arrive soudain sur lui ;
  - type: text
    content: il est brisé tout d'un coup, et sans remède.
  - type: heading
    content: Ce que Dieu déteste
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'six… sept  : cf. 30.15-31.'
  - type: text
    content: 'Il y a six choses que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' déteste,'
  - type: text
    content: 'sept qui sont pour lui une abomination :'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'les regards hautains  : litt. les yeux élevés  ; cf. 30.13 ; Ps 131.1 ; voir aussi Pr 8.13 ; 15.25. –  langue menteuse Ps 109.2 ; Pr 12.19 ; 21.6 ; 26.28.'
  - type: text
    content: les regards hautains, la langue menteuse,
  - type: text
    content: les mains qui répandent du sang innocent,
  '18':
  - type: text
    content: ' '
  - type: note
    content: les pieds… 1.16.
  - type: text
    content: le cœur qui trame des plans malfaisants,
  - type: text
    content: les pieds qui se hâtent de courir au mal,
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'faux témoin 12.17 ; 14.5,25 ; 19.5,9,28 ; 21.28 ; 24.28 ; 25.18 ; Dt 19.16-21. –  profère  : autres traductions souffle ; respire  ; cf. 12.17n  ; 29.8n. –  le mensonge  : litt. des mensonges.'
  - type: text
    content: le faux témoin qui profère le mensonge,
  - type: text
    content: et celui qui déchaîne des querelles entre frères.
  - type: heading
    content: Mise en garde contre l'adultère
  '2':
  - type: text
    content: si tu es enlacé par les discours de ta bouche,
  - type: text
    content: si tu es pris par les discours de ta bouche,
  '20':
  - type: text
    content: ' '
  - type: note
    content: préceptes 2.1n  ; 4.4n. –  l'enseignement 1.8n.
  - type: text
    content: Mon fils, garde les préceptes de ton père
  - type: text
    content: et ne délaisse pas l'enseignement de ta mère.
  '21':
  - type: text
    content: ' '
  - type: note
    content: noue-les à ton cou 3.3n.
  - type: text
    content: Attache-les constamment sur ton cœur,
  - type: text
    content: noue-les à ton cou.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'quand tu te coucheras  : cf. 3.24 ; Dt 6.7.'
  - type: text
    content: Ils te conduiront quand tu marcheras,
  - type: text
    content: ils te garderont quand tu te coucheras,
  - type: text
    content: ils te parleront quand tu te réveilleras.
  '23':
  - type: text
    content: ' '
  - type: note
    content: les préceptes ou le commandement  ; cf. 2.1n. –  lampe 20.27 ; cf. Ps 119.105. –  l'enseignement ou la loi  ; cf. 1.8n. –  avertissements 1.23n. –  instruction ou correction 1.2n. –  chemin de la vie 10.17 ; 20.24.
  - type: text
    content: Car les préceptes sont une lampe,
  - type: text
    content: l'enseignement, une lumière,
  - type: text
    content: 'et les avertissements de l''instruction, le chemin de la vie :'
  '24':
  - type: text
    content: ' '
  - type: note
    content: l'inconnue 2.16n-19 ; 5.2-20.
  - type: text
    content: ils te garderont de la femme mauvaise,
  - type: text
    content: de la langue enjôleuse de l'inconnue.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ses regards  : litt. ses paupières , cf. 4.25n.'
  - type: text
    content: Ne convoite pas sa beauté dans ton cœur,
  - type: text
    content: et ne te laisse pas prendre à ses regards.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'prostituée  : cf. 7.10 ; 29.3 ; autre traduction femme adultère  ; au lieu d''avoir un parallélisme antithétique, nous aurions alors un parallélisme synonymique  : car pour une femme adultère on en est réduit à un morceau de pain, et une femme mariée tend un piège à la vie précieuse. –  un pain rond Ex 29.23n. –  une femme mariée  : cf. 2.16+ ; 30.20.'
  - type: text
    content: Car pour une prostituée ce n'est que le prix d'un pain rond,
  - type: text
    content: mais une femme mariée tend un piège à la vie précieuse.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'sa poche  : litt. son sein , c.-à-d. le pli du vêtement qui peut servir de poche.'
  - type: text
    content: Quelqu'un mettra-t-il du feu dans sa poche
  - type: text
    content: sans que ses vêtements s'enflamment ?
  '28':
  - type: text
    content: Quelqu'un marchera-t-il sur des braises
  - type: text
    content: sans que ses pieds soient brûlés ?
  '29':
  - type: text
    content: 'Il en est de même pour celui qui va vers la femme de son prochain :'
  - type: text
    content: quiconque la touche ne sera pas tenu pour innocent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'aplatis-toi  : autres traductions humilie-toi ; prosterne-toi  ; LXX ne sois pas abattu.'
  - type: text
    content: 'fais donc ceci, mon fils : dégage-toi,'
  - type: text
    content: puisque tu es tombé aux mains de ton prochain ;
  - type: text
    content: va, aplatis-toi, importune ton prochain ;
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'appétit  : sur le terme correspondant, qui peut désigner la vie , l’ être ou le gosier , voir Gn 1.20n  ; cf. Ec 6.7n.'
  - type: text
    content: On ne méprise pas le voleur qui vole
  - type: text
    content: pour satisfaire son appétit, quand il a faim ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'si on le trouve…  : cf. Ex 22.1-8.'
  - type: text
    content: pourtant, si on le trouve, il compense au septuple,
  - type: text
    content: il donne tous les biens qu'il a chez lui.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'dépourvu de raison  : litt. manque de cœur  ; même expression en 7.7 ; 9.4,16 ; 10.13,21 ; 11.12 ; 12.11 ; 15.21 ; 17.18 ; 24.30 ; 28.16.'
  - type: text
    content: Mais celui qui commet l'adultère avec une femme est dépourvu de raison,
  - type: text
    content: c'est celui qui veut se détruire qui agit de la sorte ;
  '33':
  - type: text
    content: ' '
  - type: note
    content: mépris 3.35+.
  - type: text
    content: il ne trouve que plaies et mépris,
  - type: text
    content: et son déshonneur ne s'efface pas.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'fureur  : cf. 27.4.'
  - type: text
    content: Car la passion jalouse met un homme en fureur,
  - type: text
    content: il n'épargnera personne au jour de la vengeance ;
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'indemnisation  : litt. rançon , cf. 13.8 ; 21.18 ; Ex 21.30n  ; 30.12n  ; Nb 35.31ns ; 1S 12.3n  ; Am 5.12n  ; Jb 33.24 ; 36.18n. –  présents  : le terme hébreu a souvent été traduit par pot-de-vin  ; cf. Ex 23.8+.'
  - type: text
    content: il n'accepte aucune indemnisation ;
  - type: text
    content: il ne veut rien entendre, quand même tu multiplies les présents.
  '4':
  - type: text
    content: ne donne ni sommeil à tes yeux,
  - type: text
    content: ni assoupissement à tes paupières ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'du chasseur  : sous-entendu dans le texte.'
  - type: text
    content: dégage-toi comme la gazelle de la main du chasseur,
  - type: text
    content: comme l'oiseau de la main de l'oiseleur.
  - type: heading
    content: Le paresseux et la fourmi
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'fourmi  : cf. 30.24s. –  paresseux 10.26 ; 13.4 ; 15.19 ; 19.24 ; 20.4 ; 21.25 ; 22.13 ; 24.30-34 ; 26.13-16 ; cf. 12.24 ; 18.9 ; 20.13 ; 23.21. –  considère ses voies  : cf. 30.24-31 ; 1R 5.13.'
  - type: text
    content: Va vers la fourmi, paresseux ;
  - type: text
    content: considère ses voies et deviens sage.
  '7':
  - type: text
    content: ' '
  - type: note
    content: secrétaire ou officier  ; cf. Dt 1.15n.
  - type: text
    content: Elle qui n'a ni capitaine,
  - type: text
    content: ni secrétaire, ni maître,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'LXX ajoute ici un développement relatif à l''abeille travailleuse  : Ou bien va vers l''abeille et considère combien elle est laborieuse et combien noble est l''œuvre qu''elle accomplit. De ses produits les rois et les simples usent pour leur santé. Elle est désirée de tous et renommée. Bien que chétive sous le rapport de la vigueur, elle s''est distinguée pour avoir honoré la sagesse.'
  - type: text
    content: elle prépare en été sa nourriture,
  - type: text
    content: elle amasse pendant la moisson de quoi manger.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Paresseux v. 6n.
  - type: text
    content: Paresseux, jusqu'à quand resteras-tu couché ?
  - type: text
    content: Quand te lèveras-tu de ton sommeil ?
