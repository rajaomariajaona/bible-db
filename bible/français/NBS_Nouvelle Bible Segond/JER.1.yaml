document_id: JER.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Paroles  : le mot hébreu a aussi le sens d’ événements  ; il se rapporte aussi bien à l''histoire du prophète qu''à ses oracles proprement dits (cf. 51.64). –  Jérémie  : hébreu Yirmeyahou , qui signifie sans doute YHWH élève ou, selon certains, YHWH ouvre (le sein)  ; cf. v. 5 ; sur la terminaison yahou , correspondant au nom divin YHWH inclus dans le nom de la personne, cf. Jg 17.1n. –  Hilqiya  : hébreu Hilqiyahou  ; cf. 2R 22.4. –  Anatoth (11.21-23 ; 32.7) , au pays de Benjamin (cf. 31.15n  ; Jos 21.17s), à 5 km au nord de Jérusalem, est le lieu de résidence du clan sacerdotal d''Abiathar, qui a été exclu du service au temple (1R 2.26).'
  - type: text
    content: Paroles de Jérémie, fils de Hilqiya, l'un des prêtres d'Anatoth, au pays de Benjamin.
  '10':
  - type: note
    content: 'je te donne… autorité sur  : la même expression hébraïque est aussi traduite par assigner à (15.3), nommer intendant de (cf. Gn 39.4 ; 40.4n). –  les nations (v. 7+), y compris Juda ; cf. 5.9-29 ; 7.28 ; 9.8 etc. ; voir aussi 25.15-38 ; 27.1-11 ; 44.30 ; 46—51 ; Ac 9.15. –  déraciner… 12.14-17 ; 18.7 ; 24.6 ; 31.28 ; 42.10 ; 45.4 ; cf. 52.14. –  bâtir / planter  : cf. 2.21 ; 11.17 ; 12.16n  ; 18.9 ; 31.4 ; 32.41 ; 1Co 3.6,10 ; 2Co 10.8.'
  - type: text
    content: Regarde, je te donne en ce jour autorité sur les nations et sur les royaumes pour déraciner, pour démolir, pour faire disparaître, pour raser, mais aussi pour bâtir et pour planter.
  - type: heading
    content: La branche d'amandier et la marmite bouillonnante
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Que vois-tu v. 13 ; 24.3 ; Am 7.8 ; 8.2. –  arbre-veilleur  : le mot shaqéd , litt. qui veille ou qui s''éveille , est le nom hébreu de l’ amandier , qui est le premier arbre à fleurir au printemps (cf. Nb 17.23) ; il rappelle le verbe traduit par veiller au v. 12.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : Que vois-tu, Jérémie ? Je répondis : Je vois une branche d''amandier – de l’« arbre-veilleur ». '
  '12':
  - type: note
    content: 'je veille (hébreu shoqéd v. 11n  ; 5.6n  ; cf. 31.28 ; Dn 9.14) sur ma parole…  : cf. 31.28 ; 44.27 ; Dn 9.14 ; voir aussi Jr 23.29 ; 44.28s ; 51.62-64 ; Jos 23.14 ; 1S 3.19 ; Es 55.10s ; Ez 12.25 ; Ha 2.3 ; Mt 5.18 ; 2P 3.9.'
  - type: text
    content: 'Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Tu as bien vu ; car je veille sur ma parole pour l''accomplir. '
  '13':
  - type: note
    content: 'Que vois-tu ? v. 11+. –  du côté du nord  : litt. et sa face (est) en face du nord  ; cf. v. 14n.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint une deuxième fois : Que vois-tu ? Je répondis : Je vois une marmite qui bouillonne du côté du nord. '
  '14':
  - type: note
    content: 'du nord  : bien que l''Assyrie et la Babylonie soient plutôt à l''est du royaume d''Israël, les envahisseurs mésopotamiens contournaient toujours le désert et arrivaient par le nord ; cf. 3.12+ ; 4.6 ; 6.1,22 ; 10.22 ; 13.20 ; 15.12 ; 25.9 ; 46.10,20 ; 47.2 ; 50.3,41 ; 51.48 ; voir aussi Es 14.13n,31 ; Ez 38.14-16 ; Jl 2.20. –  déferlera  : litt. s''ouvre  ; LXX semble avoir lu le même verbe que celui qui est traduit par bouillonne au v. 13 ; certains ont compris l''image d''une marmite sur un foyer avec une ouverture au nord pour attiser le feu. –  pays  : le même mot est aussi traduit par terre.'
  - type: text
    content: 'Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit :'
  - type: text
    content: C'est du nord que le malheur déferlera
  - type: text
    content: sur tous les habitants du pays.
  '15':
  - type: text
    content: ' '
  - type: note
    content: les clans ou les familles  ; même mot en 2.4 ; 8.3 ; 10.25 ; 15.3n  ; 25.9 ; 31.1 ; 33.24 ; Gn 10.5ss ; cf. 12.3n  ; Es 5.26. –  son trône ou son siège  ; cf. 39.3 ; 43.10.
  - type: text
    content: Oui, j'appelle tous les clans des royaumes du nord
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ils viendront,
  - type: text
    content: et chacun d'eux placera son trône
  - type: text
    content: à l'entrée des portes de Jérusalem,
  - type: text
    content: devant ses murailles, tout autour,
  - type: text
    content: et devant toutes les villes de Juda.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'jugements 4.12+. –  le mal qu''ils font  : litt. leur mal . –  abandonné 2.13+. –  encens  : cf. 7.9 ; 11.12,17 ; 18.15 ; 19.4,13 ; 32.29 ; 33.18 ; 44.3,5,17s ; cf. 2R 22.17 ; Os 2.15 ; 4.13 ; 11.2. –  d''autres dieux 7.6+. –  l''œuvre de leurs mains 25.6+ ; Es 2.8 ; Ac 7.41.'
  - type: text
    content: Je prononcerai mes jugements contre eux
  - type: text
    content: 'à cause de tout le mal qu''ils font :'
  - type: text
    content: ils m'ont abandonné,
  - type: text
    content: ils offrent de l'encens à d'autres dieux,
  - type: text
    content: ils se prosternent devant l'œuvre de leurs mains.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'tu passeras une ceinture…  : c''est le geste de celui qui se prépare au combat ou à une entreprise difficile ; on pourrait aussi traduire tiens-toi prêt  ; cf. (expressions diverses dans les textes) 1R 18.46 ; 2R 4.29 ; 9.1 ; Es 5.27 ; Jb 38.3 ; 40.7 ; Lc 12.35 ; voir aussi 2R 1.8. –  Ne sois pas terrifié  : cf. 10.2 ; 30.10 ; Mt 10.28. –  de peur que…  : cf. Es 7.9 ; Mt 13.12.'
  - type: text
    content: Quant à toi, tu passeras une ceinture à tes reins,
  - type: text
    content: tu te lèveras et tu leur diras tout ce que, moi, je t'ordonnerai.
  - type: text
    content: Ne sois pas terrifié par eux,
  - type: text
    content: de peur que je ne te terrifie devant eux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '15.20 ; cf. Es 50.7 ; Ez 3.8 ; Mi 3.8. –  rois… 2.26+. –  peuple du pays  : l''expression semble ici désigner, en particulier, les propriétaires terriens de Juda et (peut-être) la bourgeoisie de Jérusalem ; elle s''applique souvent à l''assemblée des hommes libres d''une communauté dans l''exercice de leurs droits civiques ; cf. 34.19 ; 37.2 ; 44.21 ; 52.25 ; Gn 23.7n  ; Lv 20.2,4 ; Nb 14.9 ; 2R 11.14ss ; 21.24 ; 23.30 ; voir aussi 14.21 ; elle a quelquefois un sens manifestement plus large, englobant tous les nationaux (Lv 4.27 ; 2R 24.14 ; Ag 2.4 ; Za 7.5 ; Dn 9.6) ; voir aussi, dans un sens différent, Esd 3.3n.'
  - type: text
    content: Moi, aujourd'hui, j'ai fait de toi une ville forte,
  - type: text
    content: une colonne de fer, une muraille de bronze,
  - type: text
    content: 'face à tout le pays :'
  - type: text
    content: devant les rois de Juda et ses princes,
  - type: text
    content: ses prêtres et le peuple du pays.
  '19':
  - type: text
    content: ' '
  - type: note
    content: je suis avec toi… v. 8+.
  - type: text
    content: Ils te feront la guerre,
  - type: text
    content: mais ils ne l'emporteront pas sur toi,
  - type: text
    content: 'car je suis avec toi – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – pour te délivrer.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'lui parvint  : litt. fut vers lui  ; même formule en 14.1 ; 46.1 ; 47.1 ; 49.34 ; tournure presque identique v. 4,11,13 ; 2.1 etc. ; cf. Lc 3.1s. –  Josias (≈ 640-609 av. J.-C.) ; hébreu Yo''shiyahou  ; cf. 3.6 ; 36.2 ; cf. 22.10n,15ns ; 2R 21.24–23.30 ; So 1.1. –  la treizième année ≈ 628/7 av. J.-C. ; cf. 25.3.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui parvint aux jours de Josias, fils d''Amôn, roi de Juda, la treizième année de son règne ; '
  '3':
  - type: note
    content: Joïaqim, second fils de Josias (609-598, cf. 22.10n-12 ; voir aussi 21.11n  ; 22.13-19 ; 25.1 ; 26.1,21 ; 36.1 ; 2R 23.34–24.6). –  Sédécias ou Mattania, demi-frère de Joïaqim, succède à son neveu Joïakîn ou Konias (13.18n  ; 22.24-30 ; 37.1 ; 52.31-34), fils de Joïaqim, en 597 (2R 24.6-17) ; il sera le dernier roi de Jérusalem de 597 à 587/6 av. J.-C. (sa onzième année). Sur Sédécias  ; cf. 21.1-10 ; 24.8 ; 28.1 ; 37.1–39.2 ; 51.59 ; voir aussi 2R 24.17–25.7. –  cinquième mois 52.12-15 ; 2R 25.8ss.
  - type: text
    content: elle lui parvint encore aux jours de Joïaqim, fils de Josias, roi de Juda, jusqu'à la fin de la onzième année de Sédécias, fils de Josias, roi de Juda – jusqu'à l'exil de Jérusalem, au cinquième mois.
  - type: heading
    content: Dieu appelle Jérémie à devenir son prophète
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 2n.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Avant  : cf. 13.16 ; Es 42.9 ; 48.5 ; 66.7 ; Ps 39.14 ; 90.2 ; Pr 8.22ss. –  que je ne te façonne 10.16 ; 51.19 ; cf. 18.6 ; Gn 2.7n  ; Es 43.1 ; 44.2,21,24 ; 49.1,5 ; Ps 22.10 ; 33.15 ; 104.30 ; 139.13-16 ; Jb 10.8-12 ; dans les mss hébreux traditionnels, l''orthographe du verbe hébreu traduit par former rappelle un mot habituellement traduit par rocher  ; certains en modifient la vocalisation traditionnelle pour lire que je te convoque ou que je te préserve (cf. Es 42.6n) ; cf. Sagesse 7.1 : « Je suis moi aussi (Salomon) un homme mortel, égal à tous, descendant du premier qui fut modelé de terre. Dans le ventre d''une mère, j''ai été sculpté en chair. » –  de ta mère  : sous-entendu dans le texte. –  je t''avais distingué ou choisi , litt. connu  ; cf. Gn 18.19 ; Ex 33.12 ; Os 13.5 ; Am 3.2 ; Jn 10.27 ; Rm 8.29. –  consacré ou sanctifié , c.-à-d. mis à part pour et par le Dieu saint  ; cf. 2.3 ; 12.3 ; 23.9 ; 25.30 ; 31.23 ; 50.29 ; 51.5 ; Lv 20.26 ; voir aussi Jg 13.5 ; Lc 1.15,35,41 ; Jn 10.36 ; 17.17,19 ; Ga 1.15 ; Ep 1.4. –  prophète pour les nations v. 10+ ; Es 42.1 ; Ap 10.11.'
  - type: text
    content: Avant que je ne te façonne dans le ventre de ta mère,
  - type: text
    content: je t'avais distingué ;
  - type: text
    content: avant que tu ne sortes de son sein,
  - type: text
    content: 'je t''avais consacré :'
  - type: text
    content: je t'avais fait prophète pour les nations.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ah ! Seigneur Dieu 14.13 ; Ez 4.14 ; 21.5. –  je ne saurais pas parler  : cf. Ex 4.10-12. –  je suis trop jeune  : litt. je suis un jeune homme  ; le terme hébreu peut s''appliquer à un nourrisson (Ex 2.6) comme à un homme jeune (1S 14.1). Selon certains, Jérémie veut seulement dire qu''il n''a pas encore trente ans, l''âge de participer à la vie publique (cf. Lc 3.23) ; voir aussi Jg 6.14s ; 1S 3.18-20 ; 1R 3.7 ; Jb 32.4-8.'
  - type: text
    content: 'Je répondis : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', je ne saurais pas parler, je suis trop jeune !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Es 6.8ss ; Ez 2.3ss ; cf. Ac 18.9s ; 26.17.
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit :'
  - type: text
    content: 'Ne dis pas : « Je suis trop jeune. »'
  - type: text
    content: Car tu iras vers tous ceux à qui je t'enverrai,
  - type: text
    content: et tu diras tout ce que je t'ordonnerai.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'N''aie pas peur d''eux Jos 1.9. –  je suis avec toi v. 19 ; 15.20 ; 30.11 ; Gn 26.24 ; 28.15 ; Ex 3.12 ; Dt 2.7 ; Jg 6.12 ; Es 7.14n  ; 41.10 ; So 3.14-18 ; Mt 28.20. –  te délivrer  : cf. 39.17s ; voir aussi 11.20 ; 45.5. –  déclaration…  : la formule correspondante est particulièrement fréquente dans le texte hébreu de Jérémie (près de la moitié des occurrences de toute la Bible) ; LXX l''omet souvent.'
  - type: text
    content: N'aie pas peur d'eux,
  - type: text
    content: car je suis avec toi pour te délivrer
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 5.14 ; 15.19 ; cf. Ex 4.12,15 ; Dt 18.18ss ; Es 6.5-8 ; 51.16 ; Ez 2.8–3.3 ; Dn 10.16.
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' étendit la main et toucha ma bouche ; puis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : J''ai mis mes paroles dans ta bouche. '
