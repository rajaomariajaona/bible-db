document_id: EZK.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour du Seigneur et l'Egypte
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'l''abondance v. 4n. –  par l''intermédiaire  : litt. par la main , cf. v. 12n. –  Nabuchodonosor 26.7n  ; 29.18n-19+.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je ferai disparaître l''abondance de l''Egypte, par l''intermédiaire de Nabuchodonosor, roi de Babylone. '
  '11':
  - type: note
    content: les pires brutes 28.7n. –  victimes v. 4n.
  - type: text
    content: 'Lui et son peuple avec lui, les pires brutes des nations, seront amenés pour détruire le pays ; ils tireront leurs épées contre l''Egypte et rempliront le pays de victimes. '
  '12':
  - type: note
    content: 'les bras du Nil ou les fleuves, comme en 29.3n. –  à sec  : terme apparenté à en ruine au v. 7 ; cf. Es 19.5s. –  à des gens mauvais ou par des méchants  ; litt. dans ou par la main de  ; c''est la même formule qui est traduite dans la suite par l''intermédiaire (de). –  d''étrangers 7.21 ; cf. 28.7+ ; voir aussi Es 1.7 ; Jr 51.2 ; Os 7.9 ; 8.7 ; Ab 11 ; Lm 5.2. –  c''est moi, le Seigneur … 21.37n.'
  - type: text
    content: 'Je mettrai les bras du Nil à sec, je vendrai le pays à des gens mauvais ; je dévasterai le pays, avec tout ce qui s''y trouve, par l''intermédiaire d''étrangers – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Je ferai disparaître (litt. je ferai cesser , verbe apparenté au mot sabbat) … les faux dieux Jr 46.25. –  Noph ou Memphis, au sud du delta du Nil ; cf. Es 19.13n.
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je ferai disparaître les idoles et j''éliminerai de Noph les faux dieux ; il n''y aura plus de prince d''Egypte, et je répandrai la crainte en Egypte. '
  '14':
  - type: note
    content: Patros 29.14n. –  Tsoân ou Tanis, dans le delta du Nil, Es 19.11n. –  No ou Thèbes, capitale de la Haute-Egypte ; cf. Jr 46.25 ; Na 3.8.
  - type: text
    content: 'Je dévasterai Patros, je mettrai le feu à Tsoân et j''exécuterai mes jugements contre No. '
  '15':
  - type: note
    content: 'Sîn  : peut-être Péluse, forteresse égyptienne sur le littoral méditerranéen, à l''extrémité nord-est du pays. –  l''abondance  : autres traductions le tumulte ; la multitude  ; cf. 7.11n,12n.'
  - type: text
    content: 'Je répandrai ma fureur sur Sîn, forteresse de l''Egypte, et je retrancherai l''abondance de No. '
  '16':
  - type: note
    content: 'Noph conquise en plein jour…  : texte obscur et traduction incertaine.'
  - type: text
    content: 'Je mettrai le feu à l''Egypte ; Sîn sera saisie de tremblements, No sera ouverte par la brèche et Noph conquise en plein jour par les ennemis. '
  '17':
  - type: note
    content: 'On ou Héliopolis (Gn 41.45n  ; cf. Es 19.18n) ; dans le texte hébreu traditionnel le nom est vocalisé de telle façon qu''on lise ’avèn, c.-à-d. injustice ; malfaisance ou bien néant (cf. Os 4.15n). –  Pi-Béseth ou Bubastis, autre ville du delta du Nil. –  ces villes  : litt. elles.'
  - type: text
    content: 'Les jeunes gens d''On et de Pi-Béseth tomberont par l''épée, et ces villes iront en captivité. '
  '18':
  - type: note
    content: 'Tahpanhès ou Daphné, ville frontière à l''est du delta du Nil, lieu d''accueil pour les réfugiés de Jérusalem (Jr 2.16 ; 43.7-9 ; 44.1 ; 46.14). –  s''obscurcira  : d''après de nombreux mss hébreux et des versions anciennes ; autre lecture traditionnelle retiendra. –  les jougs  : LXX et d''autres versions anciennes ont lu les sceptres, ce qui représenterait une légère modification par rapport à la vocalisation traditionnelle du texte hébreu. –  une nuée (30.3+) couvrira Tahpanhès  : litt. la couvrira. –  ses filles 16.46n.'
  - type: text
    content: 'A Tahpanhès le jour s''obscurcira, quand j''y briserai les jougs de l''Egypte et que sa force orgueilleuse y prendra fin ; une nuée couvrira Tahpanhès, et ses filles iront en captivité. '
  '19':
  - type: text
    content: 'J''exécuterai mes jugements contre l''Egypte, et ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Le roi de Babylone, instrument de Dieu
  '2':
  - type: text
    content: ' '
  - type: note
    content: parle en prophète 4.7n. –  quel jour ! 7.7 ; 39.8 ; Jl 1.15.
  - type: text
    content: 'Humain, parle en prophète ! Tu diras :'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: 'Hurlez : « Ah ! quel jour ! »'
  '20':
  - type: text
    content: ' '
  - type: note
    content: onzième année… 587 av. J.-C. (1.2n  ; cf. 29.1,17).
  - type: text
    content: 'La onzième année, le septième jour du premier mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '21':
  - type: text
    content: ' '
  - type: note
    content: le bras représente la force ; cf. 31.17n  ; Jr 48.25. –  pas de pansement Jr 30.13.
  - type: text
    content: 'Humain, j''ai brisé le bras du pharaon, le roi d''Egypte ; il n''y a pas de pansement pour le guérir ; on ne lui a pas mis de bandage pour le panser et le tenir, afin qu''il puisse manier l''épée. '
  '22':
  - type: note
    content: Je m'oppose… 5.8+. –  celui qui est fort (ou en bon état) et celui qui est brisé v. 21.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose au pharaon, le roi d''Egypte ; je lui briserai les bras, celui qui est fort et celui qui est brisé, et je ferai tomber l''épée de sa main. '
  '23':
  - type: note
    content: Cf. v. 26 ; 6.8n  ; 29.12.
  - type: text
    content: 'Je disperserai les Egyptiens parmi les nations, je les disséminerai dans tous les pays. '
  '24':
  - type: note
    content: 'mon épée dans sa main  : cf. 11.8+ ; voir aussi Jr 25.9 ; 27.6 ; 32.28 ; 43.10. –  des soupirs Ex 2.24n. –  de mourant ou de victime  ; cf. v. 4+.'
  - type: text
    content: 'Je rendrai forts les bras du roi de Babylone et je mettrai mon épée dans sa main ; je briserai les bras du pharaon, et il poussera devant lui des soupirs de mourant. '
  '25':
  - type: note
    content: la pointera ou l'étendra ; la brandira  ; cf. 6.14+ ; Jos 8.18n.
  - type: text
    content: 'Je rendrai forts les bras du roi de Babylone, et les bras du pharaon tomberont. Ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je mettrai mon épée dans la main du roi de Babylone, et qu''il la pointera contre l''Egypte. '
  '26':
  - type: note
    content: V. 23+.
  - type: text
    content: 'Je disperserai les Egyptiens parmi les nations, je les disséminerai dans tous les pays, et ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 13.6 ; Jl 1.15 ; 2.1 ; 4.14 ; Am 5.18 ; So 1.7,14. –  nuée 34.12 ; Ex 13.21+ ; cf. Jr 4.11-13 ; Jl 2.2 ; Na 1.3 ; So 1.15. –  le temps des nations  : c.-à-d. l''heure de leur jugement ; cf. Lc 21.24.'
  - type: text
    content: Car un jour approche ;
  - type: text
    content: 'un jour approche, pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'un jour de nuée : ce sera le temps des nations.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'L''épée… 11.8+ ; 29.8. –  pour (litt. en ) Koush ou pour la Nubie  ; cf. 29.10n  ; Gn 2.13n. –  victimes v. 11,24n  ; 21.19n. –  son abondance  : autre traduction sa multitude  ; même terme v. 10,15 ; 31.2 ; cf. 7.11n.'
  - type: text
    content: L'épée arrive en Egypte ;
  - type: text
    content: il y aura de la souffrance pour Koush,
  - type: text
    content: quand les victimes tomberont en Egypte ;
  - type: text
    content: on prendra son abondance
  - type: text
    content: et ses fondations seront rasées.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Pouth / Loud 27.10n. –  toute la population mêlée  : même terme en Ex 12.38n  ; Jr 25.20n  ; Né 13.3 ; plusieurs versions anciennes ont lu toute l''Arabie , ce qui correspond à une autre vocalisation possible des mêmes lettres hébraïques (cf. 27.21). –  Koub  : peuple identifié par certains aux Trères, une tribu thrace dont le premier chef est appelé Kôbos dans la littérature grecque ; LXX les Libyens (ce qui correspondrait à l''hébreu Loub ). –  les fils du pays de l''alliance  : ou bien des colonies juives en Egypte (LXX de mon alliance  ; cf. Jr 43–44), ou bien, moins probablement, l''ensemble des peuples alliés avec l''Egypte.'
  - type: text
    content: Koush, Pouth, Loud et toute la population mêlée, Koub
  - type: text
    content: et les fils du pays de l'alliance
  - type: text
    content: tomberont avec eux par l'épée.
  '6':
  - type: text
    content: ' '
  - type: note
    content: de Migdol à Syène 29.10n.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Ils tomberont, les soutiens de l'Egypte,
  - type: text
    content: et sa force orgueilleuse s'affaissera ;
  - type: text
    content: de Migdol à Syène ils tomberont par l'épée
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 29.12. –  en ruine v. 12n.
  - type: text
    content: 'Ils seront dévastés parmi les pays dévastés, et ses villes seront parmi les villes en ruine. '
  '8':
  - type: note
    content: feu 28.18+.
  - type: text
    content: 'Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je mettrai le feu à l''Egypte, et que tous ses auxiliaires seront brisés. '
  '9':
  - type: note
    content: 'des messagers…  : cf. Es 18.1s. –  C''est là, cela arrive  : cf. v. 4.'
  - type: text
    content: En ce jour-là, des messagers sortiront de devant moi sur des navires pour faire trembler Koush dans sa sécurité ; et il y aura de la souffrance parmi eux au jour de l'Egypte. C'est là, cela arrive !
