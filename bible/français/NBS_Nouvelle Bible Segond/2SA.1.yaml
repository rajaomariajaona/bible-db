        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'apprendre… l'Arc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''apprendre aux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de Juda arc'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; phrase énigmatique en hébreu. On considère habituellement le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'arc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'comme le titre de la '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: complainte
        - type: text
          text: ', tiré du v. 22 ; dans ce cas on pourrait aussi comprendre '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il dit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme l'introduction du poème commençant au v. 19, et le reste du v. 18 comme une suscription intercalée (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A apprendre aux fils de Juda. L'Arc…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Mais on peut aussi suivre l''interprétation de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ordonna d'apprendre le tir à l'arc aux fils de Juda, comme il est écrit dans le livre du Juste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agirait alors de faire adopter un nouvel art militaire inconnu jusque-là en Israël. – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'livre du Juste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était un recueil de textes, aujourd'hui perdu, qui est mentionné en Jos 10.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et il dit de l''apprendre aux fils de Juda ; c''est le Chant de l''Arc : il est écrit dans le livre du Juste.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
