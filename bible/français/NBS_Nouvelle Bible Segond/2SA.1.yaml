document_id: 2SA.1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David apprend la mort de Saül
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la mort de Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: battu Amalec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsiqlag
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 27.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Après la mort de Saül, David, qui avait battu Amalec, s''en retourna à Tsiqlag où il resta deux jours. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le diadème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : insigne de la dignité royale, cf. 2R 11.12 ; Ps 89.40 ; 132.18, ou du grand prêtre, cf. Ex 29.6 ; 39.30 ; Lv 8.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la chaînette
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre objet, vraisemblablement précieux, mais difficile à identifier ; il n''apparaît qu''ici et en Nb 31.50, et pourrait désigner aussi un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bracelet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je te les apporte ici, mon seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le jeune Amalécite espère tirer avantage de ce qu''il croit être une bonne nouvelle pour David.'
      marker-yv: yv-n
    - type: text
      text: Je me suis arrêté près de lui et je lui ai donné la mort, sachant bien qu'il ne survivrait pas à sa chute. J'ai pris le diadème qui était sur sa tête et la chaînette qu'il avait au bras, et je te les apporte ici, mon seigneur !
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 2 ; cf. 3.31 ; 13.31.
      marker-yv: yv-n
    - type: text
      text: 'David saisit ses vêtements et les déchira, et tous ceux qui étaient avec lui firent de même. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se lamentèrent… jeûnèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : rites de deuil, cf. 1S 25.1 ; 31.13.'
      marker-yv: yv-n
    - type: text
      text: 'Ils se lamentèrent, pleurèrent et jeûnèrent jusqu''au soir à cause de Saül, de Jonathan, son fils, du peuple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et de la maison d''Israël qui étaient tombés par l''épée.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David demanda au jeune homme qui lui avait fait le rapport : D''où es-tu ? Il répondit : Je suis le fils d''un immigré amalécite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme qui a reçu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'oint, le messie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le faire périr
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.10 ; 1S 24.7s ; 26.9 ; voir Ps 105.15.'
      marker-yv: yv-n
    - type: text
      text: 'David lui dit : Comment as-tu pu oser porter la main sur l''homme qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et le faire périr ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jeune homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans les v. précédents. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: exécute-le
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.12 ; Jg 8.20.'
      marker-yv: yv-n
    - type: text
      text: 'David appela l''un des serviteurs et lui dit : Approche, exécute-le ! L''homme frappa l''Amalécite, et celui-ci mourut ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' soit sur ta tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton sang '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut désigner ici soit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le sang que tu as versé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le meurtre que tu as commis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', soit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton propre sang (qui est versé lors de ta mise à mort)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; selon les contextes où elle apparaît, l''expression globale (parfois '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que ton / son sang soit sur toi / lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') signifie donc soit qu''une personne porte la responsabilité de la mort d''une autre et doit en supporter les conséquences morales et juridiques, soit qu''elle est seule responsable de sa propre mise à mort consécutive à une faute commise. Voir Lv 20.9-13 ; 1R 2.32,33,37 ; Mt 27.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ta bouche a témoigné contre toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 19.22 ; 22.71.'
      marker-yv: yv-n
    - type: text
      text: 'et David lui dit : Que ton sang soit sur ta tête ! Ta bouche a témoigné contre toi, puisque tu as dit : « J''ai mis à mort l''homme qui a reçu l''onction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Complainte de David sur Saül et Jonathan
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'complainte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lamentation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chant funèbre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qina
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 3.33 ; Jr 7.29 ; Ez 19.1 ; Am 5.1 ; 2Ch 35.25 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '38.16 : « Mon fils, verse des larmes sur celui qui est mort… entonne une complainte. »'
      marker-yv: yv-n
    - type: text
      text: 'David entonna cette complainte sur Saül et sur son fils Jonathan, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: fq
