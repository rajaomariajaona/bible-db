document_id: 2SA.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David apprend la mort de Saül
  - type: text
    content: ' '
  - type: note
    content: 'la mort de Saül  : cf. 1S 31. –  battu Amalec  : cf. 1S 30. –  Tsiqlag  : cf. 1S 27.6n.'
  - type: text
    content: 'Après la mort de Saül, David, qui avait battu Amalec, s''en retourna à Tsiqlag où il resta deux jours. '
  '10':
  - type: note
    content: 'le diadème  : insigne de la dignité royale, cf. 2R 11.12 ; Ps 89.40 ; 132.18, ou du grand prêtre, cf. Ex 29.6 ; 39.30 ; Lv 8.9. –  la chaînette  : autre objet, vraisemblablement précieux, mais difficile à identifier ; il n''apparaît qu''ici et en Nb 31.50, et pourrait désigner aussi un bracelet. –  je te les apporte ici, mon seigneur  : le jeune Amalécite espère tirer avantage de ce qu''il croit être une bonne nouvelle pour David.'
  - type: text
    content: Je me suis arrêté près de lui et je lui ai donné la mort, sachant bien qu'il ne survivrait pas à sa chute. J'ai pris le diadème qui était sur sa tête et la chaînette qu'il avait au bras, et je te les apporte ici, mon seigneur !
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 2 ; cf. 3.31 ; 13.31.
  - type: text
    content: 'David saisit ses vêtements et les déchira, et tous ceux qui étaient avec lui firent de même. '
  '12':
  - type: note
    content: 'se lamentèrent… jeûnèrent  : rites de deuil, cf. 1S 25.1 ; 31.13.'
  - type: text
    content: 'Ils se lamentèrent, pleurèrent et jeûnèrent jusqu''au soir à cause de Saül, de Jonathan, son fils, du peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de la maison d''Israël qui étaient tombés par l''épée.'
  '13':
  - type: text
    content: 'David demanda au jeune homme qui lui avait fait le rapport : D''où es-tu ? Il répondit : Je suis le fils d''un immigré amalécite. '
  '14':
  - type: note
    content: 'l''homme qui a reçu l''onction (litt. l''oint, le messie) du Seigneur  : cf. 1S 2.10n. –  le faire périr  : cf. 4.10 ; 1S 24.7s ; 26.9 ; voir Ps 105.15.'
  - type: text
    content: 'David lui dit : Comment as-tu pu oser porter la main sur l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le faire périr ? '
  '15':
  - type: note
    content: 'serviteurs  : le même terme est traduit par jeune homme dans les v. précédents. –  exécute-le  : cf. 4.12 ; Jg 8.20.'
  - type: text
    content: 'David appela l''un des serviteurs et lui dit : Approche, exécute-le ! L''homme frappa l''Amalécite, et celui-ci mourut ; '
  '16':
  - type: note
    content: 'Que ton sang soit sur ta tête  ; ton sang peut désigner ici soit le sang que tu as versé, c.-à-d. le meurtre que tu as commis, soit ton propre sang (qui est versé lors de ta mise à mort)  ; selon les contextes où elle apparaît, l''expression globale (parfois que ton / son sang soit sur toi / lui) signifie donc soit qu''une personne porte la responsabilité de la mort d''une autre et doit en supporter les conséquences morales et juridiques, soit qu''elle est seule responsable de sa propre mise à mort consécutive à une faute commise. Voir Lv 20.9-13 ; 1R 2.32,33,37 ; Mt 27.25. –  Ta bouche a témoigné contre toi  : cf. Lc 19.22 ; 22.71.'
  - type: text
    content: 'et David lui dit : Que ton sang soit sur ta tête ! Ta bouche a témoigné contre toi, puisque tu as dit : « J''ai mis à mort l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! »'
  - type: heading
    content: Complainte de David sur Saül et Jonathan
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'complainte ou lamentation , ou encore chant funèbre , hébreu qina  ; cf. 3.33 ; Jr 7.29 ; Ez 19.1 ; Am 5.1 ; 2Ch 35.25 ; Siracide 38.16 : « Mon fils, verse des larmes sur celui qui est mort… entonne une complainte. »'
  - type: text
    content: 'David entonna cette complainte sur Saül et sur son fils Jonathan, '
  '18':
  - type: note
    content: 'il dit  : cf. 2Ch 14.3n. –  de l''apprendre… l''Arc  : litt. d''apprendre aux fils de Juda arc  ; phrase énigmatique en hébreu. On considère habituellement le mot arc comme le titre de la complainte, tiré du v. 22 ; dans ce cas on pourrait aussi comprendre il dit comme l''introduction du poème commençant au v. 19, et le reste du v. 18 comme une suscription intercalée (A apprendre aux fils de Juda. L''Arc…). Mais on peut aussi suivre l''interprétation de Vg et Tg  : il ordonna d''apprendre le tir à l''arc aux fils de Juda, comme il est écrit dans le livre du Juste  ; il s''agirait alors de faire adopter un nouvel art militaire inconnu jusque-là en Israël. – Le livre du Juste était un recueil de textes, aujourd''hui perdu, qui est mentionné en Jos 10.13n.'
  - type: text
    content: 'et il dit de l''apprendre aux fils de Juda ; c''est le Chant de l''Arc : il est écrit dans le livre du Juste.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est une sorte de refrain qui réapparaît partiellement aux v. 25,27. –  Ton élite  : litt. l''ornement ou la beauté  ; la construction du début du v. en hébreu est difficile à comprendre, d''où diverses traductions proposées  : O gloire d''Israël ou la splendeur d''Israël a-t-elle… –  sur tes hauteurs  : cf. 1S 28.4n  ; 31.1-6. Le mot hébreu correspondant désigne parfois des lieux de culte (les hauts lieux ). –  Des héros  : autre traduction des guerriers.'
  - type: text
    content: Ton élite, Israël, a été transpercée sur tes hauteurs !
  - type: text
    content: Comment ! Des héros sont tombés !
  '2':
  - type: note
    content: 'un homme  : cf. 4.10 ; 18.19-32 ; 1S 4.12-17. –  les vêtements déchirés et la tête couverte de terre  : cf. v. 11s ; 1S 4.12n.'
  - type: text
    content: 'Le troisième jour, un homme arriva du camp de Saül, les vêtements déchirés et la tête couverte de terre. Arrivé auprès de David, il tomba à terre, prosterné. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Gath / Ashqelôn  : deux des cinq villes de la confédération philistine, cf. 1S 5.1n. –  n''en portez pas la bonne nouvelle  : cf. 1S 31.9 ; Mi 1.10. –  se réjouissent  : cf. Jg 16.23s. –  incirconcis  : cf. Jg 14.3n.'
  - type: text
    content: Ne l'annoncez pas dans Gath,
  - type: text
    content: n'en portez pas la bonne nouvelle dans les rues d'Ashqelôn,
  - type: text
    content: de peur que les filles des Philistins ne se réjouissent,
  - type: text
    content: de peur que les filles des incirconcis n'exultent.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Montagnes ou monts , cf. v. 6. –  Guilboa  : cf. 1S 28.4n  ; 31.1-6. –  ni rosée ni pluie  : la sécheresse entraînera la baisse de productivité des champs  ; la nature est ainsi invitée à manifester elle aussi sa tristesse. –  ni champs fertiles  : litt. champs d''offrandes ou champs de prélèvements (cf. Ex 25.2n  ; Nb 15.20s), ce qui signifie peut-être des champs dont les récoltes sont si abondantes que la partie consacrée aux offrandes est déjà considérable . Certains mss de LXX portent sur tes hauteurs, sur les montagnes de la mort . –  qui n''a pas été oint d''huile  : autre traduction qui ne sera plus oint d''huile . On entretenait avec un corps gras le cuir épais recouvrant la carcasse de bois du bouclier, et on veillait à ce qu''il soit particulièrement bien graissé pour la bataille, afin de détourner les coups des ennemis (cf. Es 21.5). Vg a compris que cette dernière affirmation se rapportait à Saül lui-même comme s''il n''était pas oint d''huile (voir onction). Certains rattachent cette phrase à ce qui suit et comprennent qui n''était pas oint d''huile, mais du sang des victimes…'
  - type: text
    content: Montagnes de Guilboa,
  - type: text
    content: qu'il n'y ait sur vous ni rosée ni pluie,
  - type: text
    content: ni champs fertiles !
  - type: text
    content: Car c'est là qu'ils ont connu l'abjection, les boucliers des guerriers,
  - type: text
    content: le bouclier de Saül
  - type: text
    content: qui n'a pas été oint d'huile.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'le sang / la graisse  : peut-être ici, respectivement, symboles de vie et de force ; cf. Lv 3.17n. –  des victimes  : litt. des transpercés . –  l''arc de Jonathan  : cf. 1S 18.4 ; 20.35-40. –  ne reculait pas  : autre traduction ne déviait pas  ; cf. Ps 78.57. –  ne sortait…  : litt. ne revenait pas à vide , c.-à-d. sans avoir accompli son rôle  ; cf. 1S 14.47.'
  - type: text
    content: Devant le sang des victimes, devant la graisse des guerriers,
  - type: text
    content: l'arc de Jonathan ne reculait pas
  - type: text
    content: et l'épée de Saül ne sortait jamais en vain.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'pendant leur vie  : ces mots pourraient aussi être rattachés à l''affirmation suivante  : n''ont été séparés ni dans leur vie ni dans leur mort . –  plus rapides que des aigles  : cf. Jr 4.13 ; Lm 4.19. –  plus forts que des lions  : cf. Jg 14.18 ; Pr 30.30.'
  - type: text
    content: Saül et Jonathan, aimés et chéris pendant leur vie,
  - type: text
    content: n'ont pas été séparés dans leur mort ;
  - type: text
    content: ils étaient plus rapides que des aigles,
  - type: text
    content: ils étaient plus forts que des lions.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Aux filles des Philistins du v. 20 s'opposent ici les Filles d'Israël . – Les étoffes teintes en écarlate étaient particulièrement précieuses, cf. Nb 4.8 ; Jr 4.30.
  - type: text
    content: Filles d'Israël, pleurez sur Saül,
  - type: text
    content: qui vous revêtait d'écarlate et de délices,
  - type: text
    content: et qui mettait sur vos habits une parure d'or.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Voir v. 19n.
  - type: text
    content: Comment ! Des héros sont tombés au milieu du combat !
  - type: text
    content: Jonathan a été transpercé sur tes hauteurs !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Tu m''étais si cher  : cf. 1S 18.1n  ; 20.17. –  ton amour  : autre traduction ton amitié.'
  - type: text
    content: A cause de toi, Jonathan, mon frère, je suis dans la détresse !
  - type: text
    content: Tu m'étais si cher ;
  - type: text
    content: ton amour était plus merveilleux pour moi
  - type: text
    content: que l'amour des femmes.
  '27':
  - type: text
    content: Comment ! Des héros sont tombés !
  - type: text
    content: Les armes ont été anéanties !
  '3':
  - type: note
    content: 'échappé du camp d''Israël  : cf. 1S 4.16.'
  - type: text
    content: 'David lui demanda : D''où viens-tu ? Il lui répondit : Je me suis échappé du camp d''Israël. '
  '4':
  - type: note
    content: 'ont fui  : cf. 1S 4.10 ; 31.1. –  et sont morts  : les mots correspondants sont absents de Syr et de certains mss de LXX.'
  - type: text
    content: 'David lui demanda : Que s''est-il passé ? Dis-le-moi, je te prie ! Il répondit : Les soldats ont fui le combat ; beaucoup d''entre eux sont tombés et sont morts. Saül lui-même et Jonathan, son fils, sont morts. '
  '5':
  - type: text
    content: 'David dit au jeune homme qui lui faisait ce rapport : Comment sais-tu que Saül et Jonathan, son fils, sont morts ? '
  '6':
  - type: note
    content: 'Guilboa  : cf. 1S 28.4n  ; 31.1. –  serré de près  : cf. 1S 31.2. –  les conducteurs de chars  : litt. les chars et les maîtres des attelages  ; cf. 10.18.'
  - type: text
    content: 'Le jeune homme qui lui faisait ce rapport répondit : Je me trouvais au mont Guilboa ; Saül s''appuyait sur sa lance, serré de près par les conducteurs de chars. '
  '7':
  - type: text
    content: 'Il s''est retourné, m''a aperçu et m''a appelé. J''ai dit : « Oui ? » '
  '8':
  - type: note
    content: 'Je lui ai répondu  : autre lecture traditionnelle il ( ?) lui a répondu. –  Amalécite  : cf. 1S 15.2n.'
  - type: text
    content: 'Il m''a demandé : « Qui es-tu ? » Je lui ai répondu : « Je suis un Amalécite. » '
  '9':
  - type: note
    content: 'donne-moi la mort  : cf. Jg 9.54 ; 1S 31.4 ; 1Ch 10.4. –  vertige  : le mot hébreu correspondant ne se trouve qu''ici dans l''A.T. et son sens n''est pas assuré ; des versions anciennes parlent aussi de tremblement ou d’angoisse. L''idée est certainement celle d''un malaise, sous une forme ou une autre. –  même si… encore plein de vie  : litt. bien que tout mon être (= ma vie, cf. Gn 1.20n) soit encore en moi.'
  - type: text
    content: 'Il m''a dit : « Arrête-toi près de moi, je te prie, et donne-moi la mort ; car je suis pris de vertige, même si je suis encore plein de vie. » '
