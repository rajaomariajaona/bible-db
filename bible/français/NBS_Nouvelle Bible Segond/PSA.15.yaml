document_id: PSA.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ce que Dieu demande de ses fidèles
  - type: text
    content: ' '
  - type: note
    content: 'qui séjournera  : le verbe ainsi traduit est apparenté au substantif habituellement rendu par immigré  ; cf. 24.3-6 ; Ex 12.48n  ; voir aussi Es 33.14-16. –  dans ta tente  : il s''agit sans doute ici du temple  ; cf. 27.4ns ; 61.5 ; 76.3 ; 78.60 ; Ex 25.9n  ; 33.7 ; 2S 6.17 ; Es 33.20. –  sacrée  : voir saint.'
  - type: text
    content: Psaume. De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', qui séjournera dans ta tente ?'
  - type: text
    content: Qui demeurera dans ta montagne sacrée ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'suit la voie de l''intégrité  : litt. qui marche (avec) intégrité 26.1 ; 101.2. – Voir justice. –  qui parle loyalement  : autre traduction qui dit la vérité. –  de tout cœur  : litt. dans son cœur  ; cf. Jr 7.5-7 ; Ez 18.5-9 ; Mi 6.6-8 ; Pr 6.16-19.'
  - type: text
    content: Celui qui suit la voie de l'intégrité, qui pratique la justice
  - type: text
    content: et qui parle loyalement, de tout cœur.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''utilise pas…  : litt. il ne circule pas sur sa langue (pour répandre de mauvais propos) ; cf. 39.2 ; Jb 31.30 ; Pr 21.23 ; expression analogue en 2S 19.28. –  il n''outrage pas…  : autre traduction il ne jette pas le déshonneur sur ses proches  ; LXX semble avoir compris il n''accepte pas les propos déshonorants contre ses proches.'
  - type: text
    content: Il n'utilise pas sa langue pour calomnier,
  - type: text
    content: il ne fait pas de mal à son prochain
  - type: text
    content: et il n'outrage pas ses proches.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'il honore ou il glorifie. –  ceux qui craignent le Seigneur 22.24 ; 25.14 ; 31.20 ; 33.18 ; 34.8,10 ; 60.6 ; 66.16 ; 85.10 ; 103.11,13,17 ; 111.5 ; 112.1 ; 115.13 ; 118.4 ; 119.38,63 ; 128.1 ; 130.4 ; 135.20 ; 145.19 ; 147.11 ; cf. 19.10+ ; Dt 4.10+ ; Lc 1.50 ; Ac 10.35 ; 13.16 ; 17.17 ; Ap 19.5. –  à son préjudice  : texte obscur ; LXX à son prochain  ; cf. 24.4.'
  - type: text
    content: Il repousse celui qui est méprisable à ses yeux,
  - type: text
    content: 'mais il honore ceux qui craignent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il ne se rétracte pas, s'il fait un serment à son préjudice.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'intérêt Ex 22.24 ; Lv 25.37. –  pot-de-vin aux dépens de l''innocent 26.10 ; Ex 23.8+ ; Es 33.15. –  ne vacillera jamais  : cf. 10.6 ; 13.5 ; 16.8 ; 21.8 ; 30.7 ; 55.23 ; 62.3,7 ; 112.6 ; 125.1 ; Pr 10.25,30.'
  - type: text
    content: Il ne prête pas son argent à intérêt,
  - type: text
    content: il n'accepte pas de pot-de-vin aux dépens de l'innocent.
  - type: text
    content: Celui qui agit ainsi ne vacillera jamais.
