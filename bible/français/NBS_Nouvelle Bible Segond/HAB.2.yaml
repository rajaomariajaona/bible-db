document_id: HAB.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'La réponse de Dieu : le juste et l''oppresseur'
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 23.3 ; Es 21.6ss ; 56.10 ; Jr 6.17 ; Ez 3.16ss ; 33.1ss ; Os 9.8 ; Mi 7.7 ; Ps 5.4. –  sur le rempart ou à mon poste de guet , traduction incertaine ; le mot peut désigner le siège d''une ville ou plus généralement une situation de détresse (Dt 28.53n) ; cf. Es 21.8 ; voir aussi 2S 18.24 ; 2R 9.17 ; Es 62.6s ; Jb 27.18 ; Ct 5.7. –  ce qu''il me dira ou ce qu''il dira contre moi . –  ce que je répondrai…  : certains comprennent ce que je répondrai à ma réprimande , c.-à-d. à la réprimande qui me sera adressée ; d''autres modifient le texte hébreu traditionnel pour lire ce qu''il répondra à mes doléances.'
  - type: text
    content: Je vais me placer à mon poste de garde,
  - type: text
    content: je vais me tenir sur le rempart ;
  - type: text
    content: je vais guetter pour voir ce qu'il me dira,
  - type: text
    content: et ce que je répondrai au sujet de mes doléances.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'en abattant Es 10.7. –  c''est contre toi-même que tu pèches  : autres traductions tu as risqué ta vie ou c''est ta propre vie que tu compromets  ; cf. Pr 8.36 ; 20.2 ; voir aussi Es 14.20.'
  - type: text
    content: C'est la honte de ta maison que tu as décidée ;
  - type: text
    content: en abattant une multitude de peuples,
  - type: text
    content: c'est contre toi-même que tu pèches.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'la pierre crie…  : cf. Gn 4.10 ; Jb 31.38s ; Lc 19.40.'
  - type: text
    content: Car depuis le mur la pierre crie,
  - type: text
    content: et la poutre lui répond de la charpente.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mi 3.10 ; voir aussi Jr 22.13 ; Pr 11.11 ; 14.34 ; 24.3. –  le sang  : litt. les sangs  ; autre traduction les effusions de sang . – Voir justice.'
  - type: text
    content: Quel malheur pour celui qui bâtit une ville par le sang,
  - type: text
    content: qui fonde une cité par l'injustice !
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 51.58,64n  ; voir aussi Es 40.30 ; 49.4 ; Jr 45.3 ; Ps 127.1s. –  Seigneur (YHWH) des Armées 1S 1.3n.
  - type: text
    content: 'N''est-ce pas du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées que vient ceci :'
  - type: text
    content: les peuples se fatiguent pour du feu,
  - type: text
    content: les nations s'épuisent pour rien ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.3 ; Es 11.9 ; voir aussi Nb 14.21 ; Es 6.3 ; 40.5 ; Ps 72.19. –  de la connaissance de  : autre traduction pour connaître . –  la gloire du Seigneur 1R 8.11 ; Es 35.2 ; 40.5 ; 58.8 ; 60.1 ; Ez 1.28 ; 2.1. –  comme les eaux…  : c.-à-d. comme le fond de la mer par les eaux qui le couvrent.'
  - type: text
    content: Car la terre sera remplie
  - type: text
    content: 'de la connaissance de la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: comme les eaux recouvrent la mer.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5. –  toi qui verses (litt. qui mélanges ) ton poison ou celui qui verse son poison (Qumrân), sans doute un vin particulièrement capiteux ; autres traductions possibles ton outre ou ta fureur  ; cf. Dt 32.33 ; Os 7.5. –  nudité Na 3.5 ; cf. Gn 2.25 ; 3.7 ; 9.20ss ; 19.31ss ; voir aussi Est 1.11 ; Dn 5.2s. Qumrân leurs fêtes.
  - type: text
    content: Quel malheur pour celui qui fait boire son prochain,
  - type: text
    content: – toi qui verses ton poison et qui l'enivres –
  - type: text
    content: afin de voir sa nudité !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 8,10. –  rassasié de mépris Jb 10.15. –  mets-toi à nu  : traduction incertaine d''un verbe qui ressemble au mot pour prépuce ou incirconcision (cf. Ex 12.48 ; 1S 17.26 ; Ez 28.10 ; 31.18 ; 32.19ss) ; un texte de Qumrân, en intervertissant deux lettres, a compris titube ou perds connaissance (aussi plusieurs versions anciennes). –  La coupe…  : cf. Es 51.7,17ss ; Jr 25.15ss ; Ez 23.32s ; Ps 75.3ss ; Lm 4.21 ; Ap 14.10+.'
  - type: text
    content: Tu t'es rassasié de mépris plutôt que de gloire ;
  - type: text
    content: bois, toi aussi, et mets-toi à nu !
  - type: text
    content: 'La coupe de la main droite du '
  - type: text
    content: Seigneur
  - type: text
    content: ' reviendra à toi :'
  - type: text
    content: mépris sur ta gloire !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Liban  : cf. Es 14.8 ; 37.24. –  t''étouffera  : litt. te couvrira , peut-être au sens de retombera sur toi . –  ce que tes troupeaux auront ravagé  : on pourrait aussi comprendre le ravage commis parmi les bêtes (cf. Jr 14.3ss ; Pr 12.10) ; plusieurs versions anciennes ont lu ensuite te terrifiera . –  à cause… v. 8n.'
  - type: text
    content: Car la violence faite au Liban t'étouffera,
  - type: text
    content: et ce que tes troupeaux auront ravagé
  - type: text
    content: les terrifiera,
  - type: text
    content: à cause du sang humain,
  - type: text
    content: à cause de la violence faite au pays,
  - type: text
    content: à la ville et à ses habitants.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Certains commentateurs suggèrent d''intervertir les v. 18 et 19. Sur l''ensemble, cf. Ex 20.4 ; Dt 4.15ss ; Jg 17–18 ; Es 10.11 ; 40.18ss ; 41.6s ; 43.10ss ; 44.9ss ; 46.6s ; Jr 2.27s ; 10.3ss,14s ; Ez 21.26 ; Os 8.4ss ; Za 10.2. –  qui enseigne  : terme apparenté au mot pour loi ( tora ) ; certains pensent qu''il s''agit ici des oracles attribués aux idoles (v. 19) ; cf. Es 9.14n  ; 41.26 ; 47.6 ; Jr 10.8. –  faux dieux Es 2.8,18,20 ; 10.10 ; 19.1,3 ; Ps 96.5 ; 97.7. –  muets Ps 115.4ss ; 135.15ss ; 1Co 12.2.'
  - type: text
    content: A quoi sert une statue,
  - type: text
    content: pour que l'artisan la taille ?
  - type: text
    content: – une idole de métal fondu,
  - type: text
    content: qui enseigne le mensonge,
  - type: text
    content: pour que l'artisan qui la façonne mette sa confiance en elle,
  - type: text
    content: faisant ainsi des faux dieux muets ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi / Eveille-toi  : cf. 1R 18.25ss ; Ps 35.23 ; 44.24 ; 59.5s. –  Va-t-elle enseigner ? autres traductions voilà ce qu''on enseigne ! ou encore celui qui dit… et annonce : « Elle va enseigner ! » –  souffle ou esprit  ; cf. Gn 2.7 ; Ps 135.17 ; Jr 10.14.'
  - type: text
    content: 'Quel malheur pour celui qui dit à un morceau de bois : « Lève-toi ! »,'
  - type: text
    content: 'à une pierre silencieuse : « Eveille-toi ! »'
  - type: text
    content: – Va-t-elle enseigner ?
  - type: text
    content: Elle est plaquée d'or et d'argent,
  - type: text
    content: mais, en elle, pas le moindre souffle.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'me répondit  : cf. 2R 3.15 ; Jr 42.7. –  Ecris Es 8.1,16 ; 30.8 ; Jr 30.2 ; 36.2 ; Ez 37.16 ; Ap 1.11,19. –  la vision ou une vision 1.1+ ; cf. Jr 23.16 ; Os 12.11 ; Pr 29.18. –  grave-la  : autre traduction inscris-la distinctement  ; même verbe en Dt 1.5 ; 27.8. –  tablettes  : cf. Ex 24.12 ; Dt 4.13 ; 5.22 ; Es 30.8 ; voir aussi Jr 17.1 ; Pr 3.3 ; 7.3. –  afin qu''on puisse la lire couramment ou afin que celui qui y lit (ou peut-être la lit attentivement ) coure  ; cf. Es 40.31 ; Ps 119.32 ; Pr 4.12 ; voir aussi Ap 1.3.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me répondit :'
  - type: text
    content: Ecris la vision,
  - type: text
    content: grave-la sur les tablettes,
  - type: text
    content: afin qu'on puisse la lire couramment.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'dans son temple (ou palais ) sacré (ou saint ) : cf. Ex 25.40 ; Dt 26.15 ; 1R 8.30 ; Es 40.22 ; Mi 1.2n  ; Ps 11.4n  ; 18.7 ; 29.9. –  Silence  : cf. Jg 3.19 ; Am 6.10 ; 8.3 ; So 1.7 ; Za 2.17 ; voir aussi Es 14.7 ; 41.1 ; Ap 8.1.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est dans son temple sacré.'
  - type: text
    content: Silence devant lui, toute la terre !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'c''est encore une vision…  : autre traduction il y a encore une vision pour le temps fixé ou l''échéance fixée  ; selon certains, ce texte ferait allusion à une vision à venir  ; cf. Dn 8.19,26 ; 10.14 ; 11.27,35. –  elle aspire à son terme  : traduction incertaine (cf. Ps 12.6n), on pourrait aussi comprendre elle parle (même verbe en Pr 14.5 proférer ) de la fin  ; cf. v. 5ss ; Es 55.10s ; 2P 2.3. –  ne mentira pas ou ne décevra pas  ; cf. Nb 23.19 ; 1S 15.29 ; Tt 1.2 ; Hé 6.18. –  Si elle tarde  : cf. Es 8.17 ; 2P 3.9. –  elle se réalisera…  : litt. elle arrivera ; elle viendra  ; LXX celui qui vient (ou qui doit venir ) viendra, il ne sera pas en retard  ; cf. Hé 10.37  ; voir aussi Es 46.13 ; Ps 40.18 ; 70.6 ; Dn 9.19.'
  - type: text
    content: Car c'est encore une vision pour le temps fixé,
  - type: text
    content: elle aspire à son terme,
  - type: text
    content: elle ne mentira pas.
  - type: text
    content: Si elle tarde, attends-la,
  - type: text
    content: car elle se réalisera bel et bien,
  - type: text
    content: elle ne sera pas différée.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte difficile, traduction incertaine ; d''après des versions anciennes, certains modifient le texte hébreu traditionnel pour traduire il défaille, celui dont le cœur n''est pas droit  ; sur le terme correspondant à cœur (traditionnellement âme ) et rendu par gosier au v. 5, voir Gn 1.20n  ; LXX s''il se retire, mon âme ne prend pas plaisir en lui (Hé 10.38). – Voir justice. –  en tenant ferme  : traduction traditionnelle par sa foi . Selon le sens que revêt ailleurs le substantif hébreu, on pourrait traduire par sa probité (1S 26.23 ; 2R 12.16 ; 22.7 ; Es 11.2 ; 26.4 ; 59.4 ; Jr 5.1,3 ; 7.28 ; 9.2 ; Os 2.22 ; Ps 119.30 ; Pr 12.17,22 ; 14.5 ; 2Ch 19.9 ; 31.12,15,18 ; 34.12) ou par sa constance ; par sa fidélité (cf. Dt 32.4 ; Ps 33.4n  ; 89.2nss etc) ; une forme du verbe dont il dérive signifie croire . En grec le mot correspondant peut signifier aussi bien foi que fidélité (désignant alors ce qui est digne de foi ou de confiance ) ; certains mss de LXX ont ici par sa foi / fidélité envers moi , les autres par ma fidélité (= ma constance ) ; cf. Rm 1.17 ; Ga 3.11 ; Hé 10.38.'
  - type: text
    content: Son cœur se gonfle, il n'est pas droit ;
  - type: text
    content: mais le juste vivra en tenant ferme.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'le vin  : LXX l''homme arrogant  ; Qumrân la richesse ( ?) ; certains modifient le texte hébreu traditionnel pour lire le traître (1.13+) ne vivra pas  ; cf. Pr 21.18 ; 22.12. –  hautain  : même terme en Pr 21.24. –  ne reste pas tranquille  : autre traduction, d''après plusieurs versions anciennes ne réussira pas . –  son gosier  : cf. v. 4n  ; Mi 7.1n  ; dans les mythes cananéens, la mort est représentée avec une gueule qui s’ élargit de la terre au ciel et menace de tout engloutir ; cf. Es 5.14 ; Pr 27.20 ; 30.15s ; voir séjour des morts. –  toutes les nations Jr 27.7. –  auprès de lui ou pour lui.'
  - type: text
    content: 'Assurément, le vin est traître :'
  - type: text
    content: l'homme hautain ne reste pas tranquille,
  - type: text
    content: il élargit son gosier comme le séjour des morts.
  - type: text
    content: Comme la mort, il est insatiable.
  - type: text
    content: Il attire à lui toutes les nations,
  - type: text
    content: il rassemble auprès de lui tous les peuples.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'fable… Es 14.4 ; Mi 2.4. –  énigmes Nb 12.8 ; Jg 14.12 ; Ez 17.2 ; Ps 49.5 ; 78.2 ; Pr 1.6 ; Dn 8.23. –  satiriques  : le terme hébreu correspondant n''apparaît qu''en Pr 1.6n ( sentence ) ; apparenté au mot pour interprète (Gn 42.23 ; Es 43.27), il évoque sans doute une sorte de devinette dont l''intention est ici, de toute évidence, ironique. –  On dira  : litt. il dira  ; LXX et Qumrân ils diront . –  Quel malheur pour v. 9,12,15,19 ; cf. 1R 13.30 ; Es 1.4 ; 5.8+ ; Jr 22.18 ; 34.5 ; Ap 8.13+. –  jusqu''à quand (1.2+) : absent de LXX. –  ses dettes  : le terme hébreu est apparenté au verbe traduit par se saisir d''un gage en Dt 24.10. Selon l''interprétation la plus probable, en accumulant ce qui n''est pas à lui (cf. 1.6), le conquérant contracte envers les autres nations de lourdes dettes, qu''il devra finalement payer.'
  - type: text
    content: Tous ceux-là ne vont-ils pas faire de lui une fable,
  - type: text
    content: un sujet d'énigmes satiriques ?
  - type: text
    content: 'On dira :'
  - type: heading
    content: Cinq malheurs
  - type: text
    content: Quel malheur pour celui qui accumule ce qui n'est pas à lui
  - type: text
    content: – jusqu'à quand ? –
  - type: text
    content: et qui alourdit ses dettes !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Tes créanciers  : litt. ceux qui te mordent , peut-être par un jeu d''assonance avec un terme proche qui signifie intérêt (Dt 23.20s ; Ps 109.11).'
  - type: text
    content: Tes créanciers ne vont-ils pas soudain se lever ?
  - type: text
    content: Ceux qui te secoueront ne vont-ils pas s'éveiller ?
  - type: text
    content: Tu deviendras leur butin !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Es 33.1 ; Jr 30.16 ; 50.10,29 ; Ab 15 ; Ap 18.6s. –  à cause… v. 17. –  violence 1.2+. –  au pays ou à la terre  ; cf. Jr 50.23 ; 51.7,25 ; de même on pourrait comprendre la ville comme un collectif  : aux villes et à tous leurs habitants  ; cf. Jr 46.8.'
  - type: text
    content: Parce que tu as pillé une multitude de nations,
  - type: text
    content: tout le reste des peuples te pillera,
  - type: text
    content: à cause du sang humain,
  - type: text
    content: à cause de la violence faite au pays,
  - type: text
    content: à la ville et à tous ses habitants.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur pour… v. 6+. –  profit (ou gain ) malhonnête (litt. mauvais ) Ex 18.21 ; Es 33.15 ; Jr 22.17 ; Ez 22.13 ; Mi 4.13 ; Ps 119.36 ; Pr 28.16. –  placer son nid sur la hauteur Nb 24.21 ; Es 14.13 ; Jr 49.16 ; Ez 28.2,14 ; Ab 4. –  au malheur  : litt. de la main mauvaise.'
  - type: text
    content: Quel malheur pour celui qui se fait un profit malhonnête pour sa maison,
  - type: text
    content: afin de placer son nid sur la hauteur,
  - type: text
    content: pour échapper au malheur !
