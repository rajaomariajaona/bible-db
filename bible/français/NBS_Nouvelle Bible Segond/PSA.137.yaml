      - type: usfm
        marker: fr
        children:
        - type: text
          text: '137.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 42—43 ; 1R 8.46ss ; Lm 2.10s,18ss ; 3.48ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des fleuves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sans doute l''Euphrate et ses nombreux canaux ; cf. Ez 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.15 ; voir aussi 1S 7.6 ; Ac 16.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous étions assis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'installer, habiter.
      marker-yv: yv-n
    - type: text
      text: Près des fleuves de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là-bas, nous étions assis et nous pleurions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en nous souvenant de Sion.
