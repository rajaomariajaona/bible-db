      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sens incertain : oublie l''art de jouer de la lyre ? Versions anciennes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: m'oublie, soit oubliée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains modifient le texte hébreu traditionnel, en intervertissant les lettres pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que ma main droite se dessèche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui ferait assonance avec '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si je t'oublie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
