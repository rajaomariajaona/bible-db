document_id: PSA.137,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Auprès des fleuves de Babylone
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 42—43 ; 1R 8.46ss ; Lm 2.10s,18ss ; 3.48ss. –  des fleuves  : sans doute l''Euphrate et ses nombreux canaux ; cf. Ez 1.1n  ; 3.15 ; voir aussi 1S 7.6 ; Ac 16.13. –  nous étions assis  : le verbe hébreu a aussi le sens de s''installer, habiter.'
  - type: text
    content: Près des fleuves de Babylone,
  - type: text
    content: là-bas, nous étions assis et nous pleurions
  - type: text
    content: en nous souvenant de Sion.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'de la contrée  : litt. au milieu d''elle.'
  - type: text
    content: Aux saules de la contrée
  - type: text
    content: nous avions suspendu nos lyres.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'nos vainqueurs  : litt. ceux qui nous avaient emmenés captifs. –  bourreaux ou tortionnaires , traduction incertaine ; le mot hébreu correspondant n''apparaît qu''ici dans l''A.T. –  chants de Sion  : cf. Ps 76 ; 84 ; 87 ; 122 ; voir aussi Lm 2.15 ; 1Ch 6.16 ; 25.6.'
  - type: text
    content: Là, nos vainqueurs nous demandaient des chants ;
  - type: text
    content: 'nos bourreaux, de la joie :'
  - type: text
    content: Chantez-nous des chants de Sion !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le chant du Seigneur 33.2 ; 2Ch 29.27. –  sur une terre (cf. Gn 2.5n) étrangère  : cf. 1S 26.19 ; 2R 5.17 ; Ez 4.13 ; Os 9.3ss.'
  - type: text
    content: 'Comment chanterions-nous le chant du '
  - type: text
    content: Seigneur
  - type: text
    content: sur une terre étrangère ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 51.50. –  Si…  : cf. 7.4ss ; Jb 31.5ss. –  que ma main droite oublie  : sens incertain : oublie l''art de jouer de la lyre ? Versions anciennes m''oublie, soit oubliée  ; certains modifient le texte hébreu traditionnel, en intervertissant les lettres pour lire que ma main droite se dessèche , qui ferait assonance avec Si je t''oublie  ; cf. Os 9.2 ; Ha 3.17 ; voir aussi Jb 31.22.'
  - type: text
    content: Si je t'oublie, Jérusalem,
  - type: text
    content: que ma main droite oublie !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Que ma langue 22.16 ; Ez 3.26 ; Jb 29.10. –  si je ne mets…  : litt. si je n''élève pas Jérusalem au-dessus du sommet (ou de la tête ) de ma joie.'
  - type: text
    content: Que ma langue s'attache à mon palais
  - type: text
    content: si je ne me souviens pas de toi,
  - type: text
    content: si je ne mets pas Jérusalem
  - type: text
    content: au-dessus de toute autre joie.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 79.10ss ; Lm 1.20ss ; 3.64ss. – Les Edomites avaient témoigné leur hostilité traditionnelle à l''égard d''Israël lors de la prise de Jérusalem par Babylone ; cf. Jr 49.7+ ; Ez 25.12ss ; 35.5ss ; Jl 4.19 ; Ab 8ss,11 ; Lm 4.21. –  au jour de Jérusalem  : c.-à-d. au jour de la destruction de Jérusalem.'
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi des Edomites,'
  - type: text
    content: qui, au jour de Jérusalem,
  - type: text
    content: 'disaient : Rasez, rasez'
  - type: text
    content: jusqu'à ses fondations !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Babylone la belle  : litt. fille de Babylone  ; Es 47.1n  ; cf. 1.8n  ; voir aussi 2R 25. –  toi qui vas être ravagée  : litt. la ravagée  ; certains modifient la vocalisation traditionnelle pour lire toi qui ravages. –  qui te paiera…  : cf. 28.4+ ; Ap 18.6.'
  - type: text
    content: Babylone la belle, toi qui vas être ravagée,
  - type: text
    content: heureux qui te paiera de retour
  - type: text
    content: pour le mal que tu nous as fait !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 8.12 ; Es 13.16 ; Os 10.14 ; 14.1 ; Na 3.10 ; Lc 19.44. –  écrasera  : le même verbe a été traduit par mettre en pièces en 2.9.'
  - type: text
    content: Heureux qui saisira tes enfants
  - type: text
    content: et les écrasera contre le roc !
