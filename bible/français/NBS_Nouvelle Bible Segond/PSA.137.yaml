      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 79.10ss ; Lm 1.20ss ; 3.64ss. – Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Edomites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'avaient témoigné leur hostilité traditionnelle à l''égard d''Israël lors de la prise de Jérusalem par Babylone ; cf. Jr 49.7+ ; Ez 25.12ss ; 35.5ss ; Jl 4.19 ; Ab 8ss,11 ; Lm 4.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au jour de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. au jour de la destruction de Jérusalem.'
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', souviens-toi des Edomites,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui, au jour de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disaient : Rasez, rasez'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ses fondations !
