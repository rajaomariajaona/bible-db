document_id: JER.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: De l'angoisse au salut
  - type: text
    content: ' '
  - type: note
    content: 1.2n  ; 21.1.
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 42.11 ; 46.27s ; Es 43.1,5s,13s ; 44.2. –  Ne sois pas terrifié 1.17. –  de la terre lointaine  : litt. du lointain . –  personne pour le troubler ou pour le faire trembler  ; cf. Lv 26.6 ; Ez 34.28 ; Mi 4.4 ; So 3.13 ; Jb 11.19.'
  - type: text
    content: Et toi, Jacob, mon serviteur,
  - type: text
    content: n'aie pas peur !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ne sois pas terrifié, Israël !
  - type: text
    content: Car je te sauve de la terre lointaine
  - type: text
    content: et ta descendance du pays où elle est captive ;
  - type: text
    content: Jacob reviendra, il jouira du calme et de la tranquillité,
  - type: text
    content: et il n'y aura personne pour le troubler.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'je suis avec toi 1.8+. –  j''exterminerai  : cf. Na 1.9. –  dispersé 9.15+. –  je ne t''exterminerai pas… 4.27+ ; cf. Am 9.8-9+. –  je te corrigerai…  : cf. 10.24n. –  t''innocenterai pas  : cf. Ex 34.7 ; Nb 14.18 ; Na 1.3 ; Ps 99.8.'
  - type: text
    content: Car je suis avec toi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: pour te sauver ;
  - type: text
    content: j'exterminerai toutes les nations
  - type: text
    content: parmi lesquelles je t'ai dispersé,
  - type: text
    content: mais toi, je ne t'exterminerai pas ;
  - type: text
    content: cependant je te corrigerai avec équité,
  - type: text
    content: je ne t'innocenterai pas.
  - type: heading
    content: Plaie et guérison
  '12':
  - type: text
    content: ' '
  - type: note
    content: désastre ou fracture , de même au v. 15 ; voir 4.6n  ; 6.14n. –  incurable 15.18+. –  plaie 10.19+. – Cf. Es 1.6 ; Na 3.19.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Ton désastre est incurable,
  - type: text
    content: ta plaie est douloureuse.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 30.21.
  - type: text
    content: Personne ne défend ta cause, personne ne bande ta plaie ;
  - type: text
    content: de remède efficace, il n'en est pas pour toi.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui t''aimaient  : cf. 22.20n  ; Lm 1.2,19. –  comme frappe un ennemi Jb 19.11. –  une correction cruelle 5.3+. –  à cause de la multitude…  : cf. 5.6 ; 7.12. –  du grand nombre  : autre traduction de la gravité  ; même possibilité au v. 15. – Voir péché.'
  - type: text
    content: Tous ceux qui t'aimaient t'oublient,
  - type: text
    content: ils ne te cherchent plus ;
  - type: text
    content: car je t'ai frappée comme frappe un ennemi,
  - type: text
    content: je t'ai infligé une correction cruelle
  - type: text
    content: à cause de la multitude de tes fautes,
  - type: text
    content: du grand nombre de tes péchés.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi crier  : autres traductions pourquoi te plaindre… ? comme tu cries… ! L''ensemble du v. est absent de LXX  ; cf. v. 12,14.'
  - type: text
    content: Pourquoi crier sur ton désastre,
  - type: text
    content: sur ta douleur incurable ?
  - type: text
    content: C'est à cause de la multitude de tes fautes,
  - type: text
    content: du grand nombre de tes péchés
  - type: text
    content: que je t'ai fait cela.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui te dévorent  : cf. 2.3 ; 10.25+. –  tous tes adversaires, tous  : un ms hébreu et plusieurs versions anciennes omettent la répétition. –  en captivité  : cf. Es 20.4 ; Na 3.10. –  saccagent / pillent  : cf. Es 33.1 ; Na 2.11n.'
  - type: text
    content: C'est pourquoi tous ceux qui te dévorent seront dévorés ;
  - type: text
    content: tous tes adversaires, tous, iront en captivité ;
  - type: text
    content: ceux qui te saccagent seront saccagés,
  - type: text
    content: et je livrerai au pillage tous ceux qui te pillent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'je te rétablirai  : cf. 8.22n  ; 33.6 ; voir aussi Es 30.26. –  Bannie 23.2n  ; cf. Es 54.6. –  c''est Sion  : LXX c''est notre butin.'
  - type: text
    content: Car je te rétablirai,
  - type: text
    content: je te guérirai de tes plaies
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Renouveau du peuple de Dieu
  - type: text
    content: Puisqu'ils t'appellent « Bannie » – c'est Sion –
  - type: text
    content: « Celle que personne ne cherche »,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Je rétablis v. 3 ; 29.14n  ; cf. 31.4 ; Am 9.11. –  sur ses ruines  : litt. sur son tell , terme qui désigne encore, en archéologie, une colline artificielle composée de plusieurs couches de ruines résultant de destructions et de reconstructions successives ; de même en 49.2 ( tertre ). –  sera de nouveau à sa place  : autre traduction sera reconstruit selon son plan.'
  - type: text
    content: 'ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je rétablis la situation des tentes de Jacob,
  - type: text
    content: j'ai compassion de ses demeures ;
  - type: text
    content: la ville sera rebâtie sur ses ruines,
  - type: text
    content: le palais sera de nouveau à sa place.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'louange ou action de grâces , le même terme est rendu par reconnaissance en 17.26+ ; cf. Es 51.3n  ; Ps 26.7n  ; Né 12.31n. –  le rire  : litt. la voix (ou le bruit ) de ceux qui s''amusent , ou de ceux qui jouent de la musique . –  je les multiplierai 3.16+ ; 29.6 ; cf. Lv 26.9 ; Ez 36.11,37 ; 37.26. –  je leur donnerai du poids  : autre traduction je les glorifierai.'
  - type: text
    content: Du milieu d'eux s'élèvera la louange et le rire ;
  - type: text
    content: je les multiplierai,
  - type: text
    content: et ils ne diminueront pas ;
  - type: text
    content: je leur donnerai du poids,
  - type: text
    content: et ils ne seront pas amoindris.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 36.2n  ; 51.60 ; Es 8.1 ; 30.8.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Ecris dans un livre toutes les paroles que je t''ai dites. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'comme au temps jadis  : cf. Es 1.26. –  je ferai rendre des comptes… 6.15n  ; cf. 2.3+ ; 25.12.'
  - type: text
    content: Ses fils seront comme au temps jadis,
  - type: text
    content: sa communauté se maintiendra devant moi,
  - type: text
    content: et je ferai rendre des comptes à tous ses oppresseurs.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'prince 14.3n. –  issu de lui  : cf. Dt 17.15 ; Za 10.4. –  son chef  : autres traductions celui qui le dominera ou qui le gouvernera  ; même terme en 51.46. –  je le ferai approcher  : cf. Ps 65.5 ; Dn 7.13. –  qui…  : litt. quel est celui qui engagerait son propre cœur , ce qui signifie probablement qui risquerait sa vie ? cf. Ex 33.20 ; Jg 6.22s ; 13.22 ; Es 6.5 ; voir aussi Nb 8.19 ; Est 4.11.'
  - type: text
    content: Son prince sera issu de lui,
  - type: text
    content: son chef sortira de son propre sein ;
  - type: text
    content: je le ferai approcher,
  - type: text
    content: et il s'avancera vers moi ;
  - type: text
    content: qui donc prendrait de lui-même le risque
  - type: text
    content: de s'avancer vers moi ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '22':
  - type: text
    content: ' '
  - type: note
    content: 7.23+.
  - type: text
    content: Vous serez mon peuple,
  - type: text
    content: et moi, je serai votre Dieu.
  - type: heading
    content: La tempête du Seigneur
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'la fureur  : absent de LXX  ; cf. 23.19-20n.'
  - type: text
    content: 'C''est la tempête du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: la fureur se déchaîne,
  - type: text
    content: la tempête fait rage,
  - type: text
    content: elle tournoie sur la tête des méchants.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Voir cœur.
  - type: text
    content: 'La colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne s''en retournera pas,'
  - type: text
    content: jusqu'à ce qu'il ait accompli et réalisé
  - type: text
    content: les projets de son cœur.
  - type: text
    content: Dans la suite des temps vous en aurez l'intelligence.
  '3':
  - type: note
    content: je rétablirai… v. 18 ; 29.14n. –  dans le pays… 12.15+ ; 16.15 ; Za 10.10.
  - type: text
    content: 'Les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où je rétablirai la situation de mon peuple, Israël et Juda, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; je les ramènerai dans le pays que j''ai donné à leurs pères, et ils en prendront possession.'
  '4':
  - type: text
    content: 'Et voici les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a prononcées sur Israël et sur Juda :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.15. –  un bruit  : autre traduction des cris . –  déroute  : le verbe apparenté est traduit par troubler au v. 10. –  il n''y a plus de paix ou plus rien ne va (4.10n).'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Nous entendons un bruit de déroute ;
  - type: text
    content: c'est la frayeur, il n'y a plus de paix.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Informez-vous  : litt. demandez  ; 18.13. –  comme une femme en travail 4.31+ ; cf. Es 21.3.'
  - type: text
    content: Informez-vous, je vous prie, voyez si un mâle accouche !
  - type: text
    content: Pourquoi ai-je vu tous les hommes les mains sur les reins,
  - type: text
    content: comme une femme en travail ?
  - type: text
    content: Pourquoi tous les visages sont-ils devenus livides ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Malheur ! l''interjection correspondante (aussi en 47.6) est ici absente de LXX  ; elle est traduite par quel malheur pour en 22.13,18 ; 23.1 ; 34.5 ; 48.1 ; 50.27 ; cf. Es 1.24n. –  Ce jour est grand  : cf. Jl 2.11 ; So 1.14. –  aucun autre  : cf. Dn 121 ; Ap 16.18. –  temps de détresse 14.8. –  Jacob 2.4+.'
  - type: text
    content: Malheur ! Ce jour est grand,
  - type: text
    content: aucun autre n'est comme lui.
  - type: text
    content: C'est un temps de détresse pour Jacob ;
  - type: text
    content: mais il en sortira sauvé.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ton cou…  : LXX leur cou… leurs liens… ne les asserviront plus  ; cf. 2.20 ; 28.11 ; Lv 26.13 ; Es 9.3 ; 10.27 ; 14.25 ; Ez 34.27 ; Na 1.13 ; Ps 107.14. –  ne t''asserviront plus ou ne te soumettront plus (cf. 25.14) ; le même verbe est traduit par servir au v. 9.'
  - type: text
    content: 'En ce jour-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées – je briserai le joug qu''il fait peser sur ton cou, j''arracherai tes liens, et des étrangers ne t''asserviront plus. '
  '9':
  - type: note
    content: 'Ils serviront  : cf. Ex 3.12 ; Lc 1.74. –  et David… 23.5s ; Ez 34.23 ; 37.24 ; Os 3.5.'
  - type: text
    content: 'Ils serviront le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, et David, leur roi, que je leur susciterai.'
