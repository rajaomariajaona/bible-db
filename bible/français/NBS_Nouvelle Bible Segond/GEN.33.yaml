  - type: text
    text: Jacob rencontre Esaü
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 32.7s,23.
    marker-yv: yv-n
  - type: text
    text: 'Jacob leva les yeux et vit arriver Esaü avec quatre cents hommes. Il répartit les enfants entre Léa, Rachel et les deux servantes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rachel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joseph '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 29.30 ; 30.22-24.
    marker-yv: yv-n
  - type: text
    text: 'Il plaça en avant les servantes avec leurs enfants, ensuite Léa avec ses enfants, et ensuite Rachel avec Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lui-même passa devant eux et se prosterna sept fois jusqu''à terre, jusqu''à ce qu''il soit tout près de son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '45.14s ; Lc 15.20. Cf. Pr 16.7. – Dans le texte hébreu traditionnel, chaque lettre du verbe hébreu traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''embrassa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est surmontée d'un point. On ignore si les scribes voulaient ainsi supprimer la lecture de ce mot qui ferait double emploi avec les précédents ou au contraire le mettre en évidence.
    marker-yv: yv-n
  - type: text
    text: 'Esaü courut à sa rencontre ; il l''étreignit, se jeta à son cou et l''embrassa, et ils se mirent à pleurer. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui sont ceux-là ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui sont pour toi ceux-là ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui sont ceux que tu as là ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. v. 8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Esaü, levant les yeux, vit les femmes et les enfants et dit : Qui sont ceux-là ? Il répondit : Ce sont les enfants que Dieu, dans sa grâce, m''a donnés, à moi, ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les servantes s''approchèrent, elles et leurs enfants, et se prosternèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Léa et ses enfants s'approchèrent aussi et se prosternèrent ; ensuite Joseph et Rachel s'approchèrent et se prosternèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '32.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qu'est-ce…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui (est) pour toi toute cette troupe…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Esaü dit : Qu''est-ce que toute cette troupe que j''ai rencontrée ? Il répondit : C''est pour trouver grâce à tes yeux, mon seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Garde…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce qui est à toi est à toi.
    marker-yv: yv-n
  - type: text
    text: 'Esaü dit : Je suis dans l''abondance, mon frère ! Garde ce qui t''appartient. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'présent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '32.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en effet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'car c''est pour cela que '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même expression en 18.5). – L''expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'paraître en la présence de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut aussi être traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: voir la face de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 32.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Jacob répondit : Non, je t''en prie ; si j''ai trouvé grâce à tes yeux, accepte mon présent ; en effet, j''ai paru en ta présence comme on paraît en la présence de Dieu, et tu m''as accueilli favorablement. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mon cadeau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ma '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 27.29-40). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout ce qu'il me faut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il insista
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.3,9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'Esaü accepta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'il prit.
    marker-yv: yv-n
  - type: text
    text: Accepte mon cadeau, je te prie ; il t'a été offert, puisque Dieu m'a fait grâce et que j'ai tout ce qu'il me faut. Il insista tellement qu'Esaü accepta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Esaü dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mettons-nous en route…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marchons, et je marcherai devant toi.
    marker-yv: yv-n
  - type: text
    text: 'Esaü dit : Partons, mettons-nous en route ; j''irai devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jacob répondit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des brebis, des chèvres et des vaches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du petit bétail et du gros bétail '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (31.38).
    marker-yv: yv-n
  - type: text
    text: 'Jacob répondit : Mon seigneur, tu sais que les enfants sont délicats, et que j''ai avec moi des brebis, des chèvres et des vaches qui allaitent ; si l''on forçait leur marche un seul jour, tout le petit bétail mourrait. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au pas du troupeau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'troupeau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est très vague ; il peut signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: possessions, biens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: occupation, affaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de sorte qu''on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: suivant ce que j'aurai à faire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Séir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 32.4.
    marker-yv: yv-n
  - type: text
    text: 'Je t''en prie, mon seigneur, passe devant moi ; moi, ton serviteur, je suivrai lentement, au pas du troupeau qui me précédera, et au pas des enfants, jusqu''à ce que j''arrive chez toi, à Séir. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que je trouve toujours '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : formule de politesse, en forme de souhait, de celui qui est redevable d''un bienfait et ne pourra pas le rendre ; cf. 47.25 ; 1S 1.18 ; 2S 16.4 ; Rt 2.13.'
    marker-yv: yv-n
  - type: text
    text: 'Esaü dit : Je veux au moins laisser avec toi une partie de mes gens. Il répondit : Pourquoi donc ? Je t''en prie, mon seigneur, que je trouve toujours grâce à tes yeux ! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ce même jour, Esaü s'en retourna donc par son propre chemin, vers Séir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob s'installe près de Sichem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Soukkoth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(= '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Huttes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Lv 23.42s), localité de Transjordanie (Jos 13.27 ; Jg 8.5). Le même nom est donné à un autre lieu dans le désert du Sinaï (Ex 12.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Quant à Jacob, il partit pour Soukkoth. Il bâtit une maison pour lui et fit des huttes pour son troupeau. C''est pourquoi on a appelé ce lieu du nom de Soukkoth (« Huttes »). '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sain et sauf
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: shalém
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de la même racine que le mot habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; plusieurs versions anciennes l''ont compris comme un nom propre ; dans cette perspective, on pourrait traduire'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jacob arriva à Salem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 14.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: )
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', une ville qui appartient à Sichem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (12.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Canaan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Paddân-Aram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 28.2,5,7 ; 31.18.
    marker-yv: yv-n
  - type: text
    text: 'Jacob arriva sain et sauf à la ville de Sichem, en Canaan. Il installa son campement devant la ville à son arrivée de Paddân-Aram. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qesitas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : monnaie d''une valeur inconnue (Jos 24.32 ; Jb 42.11). D''après une étymologie possible, mais incertaine, quelques-uns pensent que la '
    - type: usfm
      marker: fq
      children:
      - type: text
