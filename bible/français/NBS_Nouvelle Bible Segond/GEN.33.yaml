document_id: GEN.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob rencontre Esaü
  - type: text
    content: ' '
  - type: note
    content: 32.7s,23.
  - type: text
    content: 'Jacob leva les yeux et vit arriver Esaü avec quatre cents hommes. Il répartit les enfants entre Léa, Rachel et les deux servantes. '
  '10':
  - type: note
    content: 'présent 32.14. –  en effet  : autre traduction car c''est pour cela que (même expression en 18.5). – L''expression paraître en la présence de peut aussi être traduite par voir la face de, cf. 32.21n,31n.'
  - type: text
    content: 'Alors Jacob répondit : Non, je t''en prie ; si j''ai trouvé grâce à tes yeux, accepte mon présent ; en effet, j''ai paru en ta présence comme on paraît en la présence de Dieu, et tu m''as accueilli favorablement. '
  '11':
  - type: note
    content: 'mon cadeau  : litt. ma bénédiction (cf. 27.29-40). –  tout ce qu''il me faut  : litt. tout. –  Il insista  : cf. 19.3,9n. –  qu''Esaü accepta  : litt. qu''il prit.'
  - type: text
    content: Accepte mon cadeau, je te prie ; il t'a été offert, puisque Dieu m'a fait grâce et que j'ai tout ce qu'il me faut. Il insista tellement qu'Esaü accepta.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Esaü dit  : litt. il dit . –  mettons-nous en route…  : litt. marchons, et je marcherai devant toi.'
  - type: text
    content: 'Esaü dit : Partons, mettons-nous en route ; j''irai devant toi. '
  '13':
  - type: note
    content: 'Jacob répondit  : litt. il dit. –  des brebis, des chèvres et des vaches  : autre traduction du petit bétail et du gros bétail (31.38).'
  - type: text
    content: 'Jacob répondit : Mon seigneur, tu sais que les enfants sont délicats, et que j''ai avec moi des brebis, des chèvres et des vaches qui allaitent ; si l''on forçait leur marche un seul jour, tout le petit bétail mourrait. '
  '14':
  - type: note
    content: 'au pas du troupeau  : le mot traduit par troupeau est très vague ; il peut signifier possessions, biens, mais aussi occupation, affaire, de sorte qu''on pourrait aussi comprendre suivant ce que j''aurai à faire. –  Séir 32.4.'
  - type: text
    content: 'Je t''en prie, mon seigneur, passe devant moi ; moi, ton serviteur, je suivrai lentement, au pas du troupeau qui me précédera, et au pas des enfants, jusqu''à ce que j''arrive chez toi, à Séir. '
  '15':
  - type: note
    content: 'que je trouve toujours grâce…  : formule de politesse, en forme de souhait, de celui qui est redevable d''un bienfait et ne pourra pas le rendre ; cf. 47.25 ; 1S 1.18 ; 2S 16.4 ; Rt 2.13.'
  - type: text
    content: 'Esaü dit : Je veux au moins laisser avec toi une partie de mes gens. Il répondit : Pourquoi donc ? Je t''en prie, mon seigneur, que je trouve toujours grâce à tes yeux ! '
  '16':
  - type: text
    content: Ce même jour, Esaü s'en retourna donc par son propre chemin, vers Séir.
  - type: heading
    content: Jacob s'installe près de Sichem
  '17':
  - type: text
    content: ' '
  - type: note
    content: Soukkoth (= Huttes , cf. Lv 23.42s), localité de Transjordanie (Jos 13.27 ; Jg 8.5). Le même nom est donné à un autre lieu dans le désert du Sinaï (Ex 12.37n).
  - type: text
    content: 'Quant à Jacob, il partit pour Soukkoth. Il bâtit une maison pour lui et fit des huttes pour son troupeau. C''est pourquoi on a appelé ce lieu du nom de Soukkoth (« Huttes »). '
  '18':
  - type: note
    content: 'sain et sauf  : hébreu shalém, de la même racine que le mot habituellement traduit par paix  ; plusieurs versions anciennes l''ont compris comme un nom propre ; dans cette perspective, on pourrait traduire  : Jacob arriva à Salem (cf. 14.18n), une ville qui appartient à Sichem (12.6n) en Canaan. –  Paddân-Aram 28.2,5,7 ; 31.18.'
  - type: text
    content: 'Jacob arriva sain et sauf à la ville de Sichem, en Canaan. Il installa son campement devant la ville à son arrivée de Paddân-Aram. '
  '19':
  - type: note
    content: 'qesitas  : monnaie d''une valeur inconnue (Jos 24.32 ; Jb 42.11). D''après une étymologie possible, mais incertaine, quelques-uns pensent que la qesita correspondait au prix d''un agneau. –  fils de Hamor  : cf. 34.2-26. –  parcelle de terre 48.22n  ; Jos 24.32 ; Jn 4.5 ; Ac 7.16 ; cf. Gn 12.6 ; 23.4-20.'
  - type: text
    content: 'Pour cent qesitas il acheta aux fils de Hamor, père de Sichem, la parcelle de terre où il avait dressé sa tente. '
  '2':
  - type: note
    content: Rachel / Joseph 29.30 ; 30.22-24.
  - type: text
    content: 'Il plaça en avant les servantes avec leurs enfants, ensuite Léa avec ses enfants, et ensuite Rachel avec Joseph. '
  '20':
  - type: note
    content: El-Elohé-Israël signifie El (Dieu, cf. 21.33n), Dieu d'Israël ou El est le Dieu d'Israël, cf. 32.29 ; voir aussi noms divins.
  - type: text
    content: Il y plaça un autel, qu'il appela El-Elohé-Israël (« El, Dieu d'Israël »).
  '3':
  - type: text
    content: 'Lui-même passa devant eux et se prosterna sept fois jusqu''à terre, jusqu''à ce qu''il soit tout près de son frère. '
  '4':
  - type: note
    content: 45.14s ; Lc 15.20. Cf. Pr 16.7. – Dans le texte hébreu traditionnel, chaque lettre du verbe hébreu traduit par l'embrassa est surmontée d'un point. On ignore si les scribes voulaient ainsi supprimer la lecture de ce mot qui ferait double emploi avec les précédents ou au contraire le mettre en évidence.
  - type: text
    content: 'Esaü courut à sa rencontre ; il l''étreignit, se jeta à son cou et l''embrassa, et ils se mirent à pleurer. '
  '5':
  - type: note
    content: Qui sont ceux-là ? litt. qui sont pour toi ceux-là ? ou qui sont ceux que tu as là ? cf. v. 8n.
  - type: text
    content: 'Esaü, levant les yeux, vit les femmes et les enfants et dit : Qui sont ceux-là ? Il répondit : Ce sont les enfants que Dieu, dans sa grâce, m''a donnés, à moi, ton serviteur. '
  '6':
  - type: text
    content: 'Les servantes s''approchèrent, elles et leurs enfants, et se prosternèrent. '
  '7':
  - type: text
    content: Léa et ses enfants s'approchèrent aussi et se prosternèrent ; ensuite Joseph et Rachel s'approchèrent et se prosternèrent.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '32.6. –  Qu''est-ce…  : litt. qui (est) pour toi toute cette troupe…  ; cf. v. 5n.'
  - type: text
    content: 'Esaü dit : Qu''est-ce que toute cette troupe que j''ai rencontrée ? Il répondit : C''est pour trouver grâce à tes yeux, mon seigneur. '
  '9':
  - type: note
    content: 'Garde…  : autre traduction ce qui est à toi est à toi.'
  - type: text
    content: 'Esaü dit : Je suis dans l''abondance, mon frère ! Garde ce qui t''appartient. '
