    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; on a aussi compris que Jésus se rendait en Judée en passant par la Transjordanie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
