    marker-yv: yv-n
  - type: text
    text: 'Des gens lui amenaient des enfants pour qu''il les touche de la main. Mais les disciples les rabrouèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne les en empêchez pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.39 ; Mt 19.14+ ; Lc 18.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour ceux qui sont comme eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.37. –  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Le Pasteur '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Hermas
      - type: text
        text: ', Sim. IX,29,3 : « Tous les petits enfants sont glorieux auprès de Dieu et premiers pour lui. Bienheureux donc, vous qui écarterez de vous le mal et vous revêtirez de l''innocence. Les premiers de tous, vous vivrez pour Dieu. »'
    marker-yv: yv-n
  - type: text
    text: 'Voyant cela, Jésus s''indigna ; il leur dit : Laissez les enfants venir à moi ; ne les en empêchez pas, car le royaume de Dieu est pour ceux qui sont comme eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Mt 5.3,20 ; voir aussi 18.3 ; Jn 3.3,6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 5.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme un enfant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre aussi bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme on accueille un enfant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(9.37) que '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme un enfant l''accueille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 14 ; cf. Mt 18.3ss). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'y entrera jamais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'y entrera même pas ; n'y entrera en aucun cas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mt 18.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, quiconque n''accueillera pas le royaume de Dieu comme un enfant n''y entrera jamais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il les prit dans ses bras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.36. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénir
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
