document_id: MRK.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'enseignement de Jésus sur la répudiation
  - type: heading
    content: Mt 19.1-9
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 9.51. –  et de l''autre côté du Jourdain , c.-à-d. en Pérée ou en Transjordanie ; certains mss n''ont pas le et (comme en Mt 19.1), de sorte qu''on peut comprendre dans la partie transjordanienne de la Judée  ; on a aussi compris que Jésus se rendait en Judée en passant par la Transjordanie. –  selon sa coutume  : cf. Lc 4.16+.'
  - type: text
    content: Parti de là, il vient dans le territoire de la Judée et de l'autre côté du Jourdain. Les foules se rassemblent encore auprès de lui ; selon sa coutume, il se remit à les instruire.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.28+.
  - type: text
    content: 'Lorsqu''ils furent à la maison, les disciples, à leur tour, se mirent à l''interroger à ce sujet. '
  '11':
  - type: note
    content: 'Mt 5.32 ; Lc 16.18/ / ; 1Co 7.10ss. –  envers la première  : litt. envers elle.'
  - type: text
    content: 'Il leur dit : Celui qui répudie sa femme et en épouse une autre commet l''adultère envers la première, '
  '12':
  - type: note
    content: Ce cas pouvait se produire dans la société gréco-romaine ; cf. 1Co 7.13.
  - type: text
    content: et si une femme répudie son mari et en épouse un autre, elle commet l'adultère.
  - type: heading
    content: Jésus et les enfants
  - type: heading
    content: Mt 19.13-15  ; Lc 18.15-17
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Des gens lui amenaient  : autre traduction on lui amenait . –  des enfants  : autre traduction possible  : de petits enfants , de même dans la suite (cf. 7.27n). –  qu''il les touche de la main  : litt. qu''il les touche 1.41+. –  les rabrouèrent 1.25n  ; certains mss précisent  : rabrouèrent ceux qui les amenaient  ; cf. 2R 4.27.'
  - type: text
    content: 'Des gens lui amenaient des enfants pour qu''il les touche de la main. Mais les disciples les rabrouèrent. '
  '14':
  - type: note
    content: 'ne les en empêchez pas 9.39 ; Mt 19.14+ ; Lc 18.16+. –  pour ceux qui sont comme eux  : cf. 9.37. –  Le Pasteur d''Hermas, Sim. IX,29,3 : « Tous les petits enfants sont glorieux auprès de Dieu et premiers pour lui. Bienheureux donc, vous qui écarterez de vous le mal et vous revêtirez de l''innocence. Les premiers de tous, vous vivrez pour Dieu. »'
  - type: text
    content: 'Voyant cela, Jésus s''indigna ; il leur dit : Laissez les enfants venir à moi ; ne les en empêchez pas, car le royaume de Dieu est pour ceux qui sont comme eux. '
  '15':
  - type: note
    content: 'Cf. Mt 5.3,20 ; voir aussi 18.3 ; Jn 3.3,6. –  Amen Mt 5.18n. –  comme un enfant  : on peut comprendre aussi bien comme on accueille un enfant (9.37) que comme un enfant l''accueille (v. 14 ; cf. Mt 18.3ss). –  n''y entrera jamais  : autres traductions n''y entrera même pas ; n''y entrera en aucun cas  ; cf. Mt 18.3n.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, quiconque n''accueillera pas le royaume de Dieu comme un enfant n''y entrera jamais. '
  '16':
  - type: note
    content: il les prit dans ses bras 9.36. – Voir bénir.
  - type: text
    content: Puis il les prit dans ses bras et se mit à les bénir en posant les mains sur eux.
  - type: heading
    content: Jésus et l'homme riche
  - type: heading
    content: Mt 19.16-30  ; Lc 18.18-30
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'maître  : au sens d’ enseignant (de même v. 20,35).'
  - type: text
    content: 'Comme il se mettait en chemin, un homme accourut et se mit à genoux devant lui pour lui demander : Bon maître, que dois-je faire pour hériter la vie éternelle ? '
  '18':
  - type: note
    content: 'Cf. 2.7. –  me dis-tu  : autre traduction m''appelles-tu. –  Dieu seul ou un seul, Dieu  ; Na 1.7 ; Ps 34.9 ; 118.1,9 ; 1Ch 16.34 ; 2Ch 5.13.'
  - type: text
    content: 'Jésus lui dit : Pourquoi me dis-tu bon ? Personne n''est bon, sinon Dieu seul. '
  '19':
  - type: note
    content: 'Ex 20.12-16 ; Dt 5.16-20  ; voir aussi loi. –  ne fais de tort à personne  : les mots correspondants sont absents de certains mss ; il se retrouvent en Siracide 4.1, dans une expression plus précise (« ne prive pas le pauvre de sa subsistance ») ; cf. Dt 24.14 ; Rm 13.9s ; voir 1Co 6.7n.'
  - type: text
    content: 'Tu connais les commandements : '
  - type: text
    content: Ne commets pas de meurtre ; ne commets pas d'adultère ; ne commets pas de vol ; ne fais pas de faux témoignage ; ne fais de tort à personne ; honore ton père et ta mère
  - type: text
    content: '. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Des pharisiens  : certains mss portent les pharisiens . –  pour le mettre à l''épreuve 1.13+ ; 8.11. –  s''il est permis 2.24n. –  un mari ou un homme (même terme v. 6).'
  - type: text
    content: 'Des pharisiens vinrent lui demander, pour le mettre à l''épreuve, s''il est permis à un mari de répudier sa femme. '
  '20':
  - type: text
    content: 'Il lui répondit : Maître, j''ai observé tout cela depuis mon plus jeune âge. '
  '21':
  - type: note
    content: 'l''aima  : cf. Jn 11.5. –  un trésor dans le ciel  : cf. Mt 6.20 ; Lc 12.33.'
  - type: text
    content: 'Jésus le regarda et l''aima ; il lui dit : Il te manque une seule chose : va, vends tout ce que tu as, donne-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens et suis-moi. '
  '22':
  - type: note
    content: 's''assombrit…  : autre traduction fut choqué par cette parole. –  beaucoup de biens ou de propriétés (cf. Ac 5.1).'
  - type: text
    content: Mais lui s'assombrit à cette parole et s'en alla tout triste, car il avait beaucoup de biens.
  '23':
  - type: text
    content: ' '
  - type: note
    content: regardant autour de lui 3.5+. –  à ceux qui ont des biens 4.19.
  - type: text
    content: 'Jésus, regardant autour de lui, dit à ses disciples : Qu''il est difficile à ceux qui ont des biens d''entrer dans le royaume de Dieu !'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'effrayés  : autre traduction possible très surpris  ; cf. v. 26,32 ; 1.27n  ; voir aussi crainte. –  Mes enfants 2.5 ; Jn 13.33+. –  qu''il est difficile  : certains mss ajoutent à ceux qui se fient à (leurs) biens.'
  - type: text
    content: 'Les disciples étaient effrayés par ses paroles. Mais Jésus reprit : Mes enfants, qu''il est difficile d''entrer dans le royaume de Dieu ! '
  '25':
  - type: note
    content: 'par le trou d''une aiguille  : litt. (selon certains mss) par le trou de l''aiguille.'
  - type: text
    content: 'Il est plus facile à un chameau de passer par le trou d''une aiguille qu''à un riche d''entrer dans le royaume de Dieu. '
  '26':
  - type: note
    content: 'Les disciples  : litt. eux. –  ébahis 1.22+.'
  - type: text
    content: 'Les disciples, plus ébahis encore, se disaient les uns aux autres : Alors, qui peut être sauvé ? '
  '27':
  - type: note
    content: Cf. 9.23+ ; 14.36 ; Gn 18.14 ; Za 8.6 ; Jb 42.2 ; 2Ch 14.10.
  - type: text
    content: 'Jésus les regarda et dit : C''est impossible pour les humains, mais non pas pour Dieu, car tout est possible pour Dieu.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 1.18+.
  - type: text
    content: 'Pierre se mit à lui dire : Nous, nous avons tout quitté pour te suivre. '
  '29':
  - type: note
    content: Lc 14.26. –  et de la bonne nouvelle 1.1n  ; 8.35n.
  - type: text
    content: 'Jésus répondit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il n''est personne qui ait quitté, à cause de moi et de la bonne nouvelle, maison, frères, sœurs, mère, père, enfants ou terres, '
  '3':
  - type: text
    content: 'Il leur répondit : Que vous a commandé Moïse ? '
  '30':
  - type: note
    content: 'dans le temps présent  : litt. maintenant, dans ce temps-ci, expression analogue en Rm 3.26. On pourrait aussi comprendre dans ce monde-ci, par opposition au monde qui vient Mt 12.32n.'
  - type: text
    content: 'et qui ne reçoive au centuple, dans le temps présent, maisons, frères, sœurs, mères, enfants et terres – avec des persécutions – et, dans le monde qui vient, la vie éternelle. '
  '31':
  - type: note
    content: 'Mt 19.30+. –  les derniers…  : ou, d''après certains mss  : des derniers ou beaucoup de derniers…  ; cf. Evangile selon Thomas 4 : « Jésus a dit : “L''homme vieux dans ses jours n''hésitera pas à interroger un petit enfant de sept jours à propos du lieu de la vie, et il vivra. Car beaucoup de premiers seront derniers, et ils deviendront un seul.” »'
  - type: text
    content: Beaucoup de premiers seront derniers, et les derniers seront premiers.
  - type: heading
    content: Jésus annonce une troisième fois sa mort et sa résurrection
  - type: heading
    content: Mt 20.17-19  ; Lc 18.31-34
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 9.51 ; Jn 11.7-16. –  Les disciples  : litt. ils.'
  - type: text
    content: 'Ils étaient en chemin pour monter à Jérusalem, et Jésus allait devant eux. Les disciples étaient effrayés, et ceux qui suivaient avaient peur. Il prit encore les Douze auprès de lui, et se mit à leur dire ce qui allait lui arriver : '
  '33':
  - type: note
    content: '8.31+ ; cf. 9.31s. –  Fils de l''homme 2.10+ ; Mt 8.20n. –  grands prêtres (Mt 2.4n) / scribes  : cf. 8.31n. –  Ils le condamneront à mort 14.64. –  aux non-Juifs ou aux nations (cf. Mt 24.14n).'
  - type: text
    content: 'Nous montons à Jérusalem ; le Fils de l''homme sera livré aux grands prêtres et aux scribes. Ils le condamneront à mort, le livreront aux non-Juifs, '
  '34':
  - type: note
    content: '14.65 ; 15.19s. –  relèvera  : voir résurrection.'
  - type: text
    content: se moqueront de lui, lui cracheront dessus, le fouetteront et le tueront ; et trois jours après il se relèvera.
  - type: heading
    content: La demande de Jacques et de Jean
  - type: heading
    content: Mt 20.20-28
  '35':
  - type: text
    content: ' '
  - type: note
    content: fils de Zébédée 1.19+.
  - type: text
    content: 'Les deux fils de Zébédée, Jacques et Jean, viennent lui dire : Maître, nous voudrions que tu fasses pour nous ce que nous te demanderons. '
  '36':
  - type: note
    content: Cf. v. 51.
  - type: text
    content: 'Il leur dit : Que voulez-vous que je fasse pour vous ? '
  '37':
  - type: note
    content: Cf. 15.27 ; voir aussi Mt 19.28 ; Lc 22.30 ; gloire.
  - type: text
    content: '– Donne-nous, lui dirent-ils, de nous asseoir l''un à ta droite et l''autre à ta gauche dans ta gloire. '
  '38':
  - type: note
    content: 'la coupe 14.36 ; cf. Es 51.17-22 ; Jr 25.15+ ; Ez 23.31-34 ; Ps 11.6 ; 75.9 ; Mt 26.39+ ; Jn 18.11. –  je bois / je reçois (litt. dont, moi, je suis baptisé) : on peut comprendre que je suis en train de boire / de recevoir, ou bien que je vais boire / recevoir, de même au v. 39. –  baptême 1.4n  ; cf. Lc 12.50 ; Rm 6.3.'
  - type: text
    content: 'Jésus leur dit : Vous ne savez pas ce que vous demandez. Pouvez-vous boire la coupe que, moi, je bois, ou recevoir le baptême que, moi, je reçois ? '
  '39':
  - type: note
    content: Cf. Ac 12.2 ; Hé 11.36s.
  - type: text
    content: 'Ils lui dirent : Nous le pouvons. Jésus leur répondit : La coupe que, moi, je bois, vous la boirez, et vous recevrez le baptême que je reçois ; '
  '4':
  - type: note
    content: Dt 24.1,3 ; cf. Mt 5.31s.
  - type: text
    content: '– Moïse, dirent-ils, a permis d''écrire une attestation de rupture et de répudier. '
  '40':
  - type: note
    content: 'à ma droite ou à ma gauche v. 37+. –  pas à moi 13.32. –  les places sont  : sous-entendu dans le texte ; autre traduction ce n''est pas à moi de le donner, sinon à ceux pour qui cela a été préparé.'
  - type: text
    content: mais pour ce qui est de s'asseoir à ma droite ou à ma gauche, ce n'est pas à moi de le donner ; les places sont à ceux pour qui elles ont été préparées.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Les dix autres  : litt. les dix.'
  - type: text
    content: 'Les dix autres, qui avaient entendu, commencèrent à s''indigner contre Jacques et Jean. '
  '42':
  - type: note
    content: 'Lc 22.25ss. –  gouverner les nations (cf. Mt 4.15n) ou être les chefs des nations  ; voir aussi non-Juifs. –  dominent… en seigneurs  : cf. Ac 19.16n  ; 1P 5.3 ; verbe apparenté en Rm 6.9n  ; 1Tm 6.15. –  les grands  : litt. leurs grands (cf. 6.21n).'
  - type: text
    content: 'Jésus les appela et leur dit : Vous savez que ceux qui paraissent gouverner les nations dominent sur elles en seigneurs, et que les grands leur font sentir leur autorité. '
  '43':
  - type: note
    content: 'devenir grand parmi vous  : cf. 9.34s ; Mt 5.19 ; 23.11. –  serviteur Mt 20.26n.'
  - type: text
    content: 'Il n''en est pas de même parmi vous. Au contraire, quiconque veut devenir grand parmi vous sera votre serviteur ; '
  '44':
  - type: note
    content: 'l''esclave de tous  : cf. 1Co 9.19 ; 2Co 4.5.'
  - type: text
    content: 'et quiconque veut être le premier parmi vous sera l''esclave de tous. '
  '45':
  - type: note
    content: le Fils de l'homme 2.10+ ; 8.31+. –  pour servir Jn 13.1-17. –  donner sa vie ou se donner lui-même 8.35n  ; cf. Jn 10.17s ; 1Jn 3.16. –  rançon ou rédemption  ; autre traduction pour délivrer. –  une multitude ou beaucoup  ; cf. 14.24 ; Es 53.11s ; une expression analogue est souvent employée à Qumrân pour désigner l'ensemble de la communauté.
  - type: text
    content: Car le Fils de l'homme n'est pas venu pour être servi, mais pour servir et donner sa vie en rançon pour une multitude.
  - type: heading
    content: Jésus guérit l'aveugle Bartimée
  - type: heading
    content: Mt 20.29-34  ; Lc 18.35-43
  '46':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 9.27-31. –  un mendiant aveugle ou, selon certains mss, un aveugle… assis au bord du chemin pour mendier . –  Bartimée signifie en araméen fils de Timée (nom grec dont le sens est précieux, honorable , mais qui pourrait rappeler en hébreu ou en araméen la racine évoquant l'impureté).
  - type: text
    content: 'Ils viennent à Jéricho. Et comme il sortait de Jéricho, avec ses disciples et une foule importante, un mendiant aveugle, Bartimée, fils de Timée, était assis au bord du chemin. '
  '47':
  - type: note
    content: Jésus le Nazaréen 1.24n  ; cf. Lc 18.37. –  Fils de David, titre messianique 11.10 ; 12.35+ ; Mt 9.27+ ; 15.22 ; Rm 1.3. –  compassion 5.19+.
  - type: text
    content: 'Il entendit que c''était Jésus le Nazaréen et se mit à crier : Fils de David, Jésus, aie compassion de moi ! '
  '48':
  - type: note
    content: le rabrouaient 1.25n.
  - type: text
    content: 'Beaucoup le rabrouaient pour le faire taire ; mais il criait d''autant plus : Fils de David, aie compassion de moi ! '
  '49':
  - type: text
    content: 'Jésus s''arrêta et dit : Appelez-le. Ils appelèrent l''aveugle en lui disant : Courage ! Lève-toi, il t''appelle ! '
  '5':
  - type: note
    content: 'Cf. 3.5+. –  votre obstination  : litt. votre dureté de cœur  ; cf. 16.14. –  commandement  : voir loi.'
  - type: text
    content: 'Jésus leur dit : C''est à cause de votre obstination qu''il a écrit pour vous ce commandement. '
  '50':
  - type: text
    content: 'Il jeta son vêtement, se leva d''un bond et vint vers Jésus. '
  '51':
  - type: note
    content: 'Que veux-tu… v. 36. –  Rabbouni  : cf. 9.5n  ; Jn 20.16.'
  - type: text
    content: 'Jésus lui demanda : Que veux-tu que je fasse pour toi ? – '
  - type: text
    content: Rabbouni,
  - type: text
    content: ' lui dit l''aveugle, que je retrouve la vue ! '
  '52':
  - type: note
    content: ta foi t'a sauvé 5.34+/ /.
  - type: text
    content: 'Jésus lui dit : Va, ta foi t''a sauvé. Aussitôt il retrouva la vue et se mit à le suivre sur le chemin.'
  '6':
  - type: note
    content: 'Dieu…  : litt. il les fit mâle et femelle, voir Gn 1.27 ; 5.2. Cf. Ecrit de Damas (Qumrân) 4.20–5.2 : « Ils ont été attrapés sur deux points par la luxure : (premièrement), en épousant deux femmes de leur vivant, alors que le principe de la nature, (c''est)  : Mâle et femelle, il les créa. Et ceux qui entrèrent dans l''arche (de Noé), deux par deux ils entrèrent dans l''arche. Et au sujet du prince il est écrit  : Il ne multipliera pas pour lui les femmes. » Rouleau du Temple (Qumrân) 57.17 : « Il (le roi) ne prendra pas d''autre femme en plus, mais celle-là seule sera avec lui tous les jours de sa vie, et si elle meurt, il en prendra une autre dans sa propre famille, dans son propre clan. »'
  - type: text
    content: 'Mais au commencement de la création, Dieu '
  - type: text
    content: les fit homme et femme ;
  - type: text
    content: ' '
  '7':
  - type: note
    content: 'Gn 2.24  ; Ep 5.31. –  et s''attachera à sa femme  : cette proposition est absente de certains mss.'
  - type: text
    content: c'est pourquoi l'homme quittera son père et sa mère et s'attachera à sa femme,
  - type: text
    content: ' '
  '8':
  - type: note
    content: Cf. Mt 18.3n  ; 1Co 6.16 ; 7.10 ; voir chair.
  - type: text
    content: et les deux seront une seule chair
  - type: text
    content: '. Ainsi ils ne sont plus deux, mais une seule chair. '
  '9':
  - type: text
    content: Que l'homme ne sépare donc pas ce que Dieu a uni !
