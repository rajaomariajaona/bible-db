    marker-yv: yv-n
  - type: text
    text: 'Des pharisiens vinrent lui demander, pour le mettre à l''épreuve, s''il est permis à un mari de répudier sa femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit : Que vous a commandé Moïse ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 24.1,3 ; cf. Mt 5.31s.
    marker-yv: yv-n
  - type: text
    text: '– Moïse, dirent-ils, a permis d''écrire une attestation de rupture et de répudier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 3.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: votre obstination
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'votre dureté de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 16.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commandement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit : C''est à cause de votre obstination qu''il a écrit pour vous ce commandement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il les fit mâle et femelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gn 1.27 ; 5.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ecrit de Damas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ') 4.20–5.2 : « Ils ont été attrapés sur deux points par la luxure : (premièrement), en épousant deux femmes de leur vivant, alors que le principe de la nature, (c''est)'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mâle et femelle, il les créa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Et ceux qui entrèrent dans l''arche (de Noé), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: deux par deux ils entrèrent dans l'arche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Et au sujet du prince il est écrit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Il ne multipliera pas pour lui les femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. » '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rouleau du Temple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Qumrân) 57.17 : « Il (le roi) ne prendra pas d''autre femme en plus, mais celle-là seule sera avec lui tous les jours de sa vie, et si elle meurt, il en prendra une autre dans sa propre famille, dans son propre clan. »'
    marker-yv: yv-n
  - type: text
    text: 'Mais au commencement de la création, Dieu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: les fit homme et femme ;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gn 2.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Ep 5.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et s'attachera à sa femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette proposition est absente de certains mss.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: c'est pourquoi l'homme quittera son père et sa mère et s'attachera à sa femme,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mt 18.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Co 6.16 ; 7.10 ; voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: et les deux seront une seule chair
  - type: text
    text: '. Ainsi ils ne sont plus deux, mais une seule chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que l'homme ne sépare donc pas ce que Dieu a uni !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 9.28+.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils furent à la maison, les disciples, à leur tour, se mirent à l''interroger à ce sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 5.32 ; Lc 16.18/ / ; 1Co 7.10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: envers la première
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: envers elle.
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Celui qui répudie sa femme et en épouse une autre commet l''adultère envers la première, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce cas pouvait se produire dans la société gréco-romaine ; cf. 1Co 7.13.
    marker-yv: yv-n
  - type: text
    text: et si une femme répudie son mari et en épouse un autre, elle commet l'adultère.
