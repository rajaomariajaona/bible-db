    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. en Pérée ou en Transjordanie ; certains mss n''ont pas le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(comme en Mt 19.1), de sorte qu''on peut comprendre '
    - type: usfm
