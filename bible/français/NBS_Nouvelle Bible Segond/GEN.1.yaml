document_id: GEN.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu crée l'univers et l'humanité
  - type: text
    content: ' '
  - type: note
    content: 'Ce premier v. comporte sept mots en hébreu. –  Au commencement  : hébreu be-ré''shith  : c''est le titre du livre dans la Bible juive. Pour souligner ce mot et son caractère de commencement absolu, les mss hébreux en ont exceptionnellement écrit la première lettre plus grande que les autres (il y a 31 grandes lettres de cette sorte dans la Bible hébraïque ; voir Dt 6.4n). Dans l''écriture hébraïque telle qu''elle est fixée depuis près de 23 siècles, cette lettre ( beth , la seconde de l''alphabet hébreu) a la forme d''une parenthèse ouverte. Les sages d''Israël y ont vu une barrière interdisant de spéculer sur tout préalable au commencement dont il est ici question. Autre traduction possible acte primordial : Dieu créa…  ; même mot hébreu Gn 49.3 ( prémices , voir aussi Os 9.10n) ; Lv 2.12+ ; cf. Es 46.10 ; Am 6.1n  ; Pr 1.7 ; 4.7 ; 8.22ss ; voir aussi Jn 1.1s ; 1Jn 1.1. –  Dieu  : le mot hébreu ’élohim (qui, lui, commence par ’aleph , première lettre de l''alphabet hébreu) a la forme du pluriel (d''excellence ? d''abstraction ? voir aussi v. 26n  ; 3.5n  ; Ez 28.2n  ; Jb 3.4n). Là où il régit un verbe au singulier, comme ici, il désigne un dieu particulier ou le Dieu unique (cf. 2.4n) ; voir noms divins. –  créa  : le verbe hébreu bara’ , qui revient sept fois dans ce récit, pourrait venir d''une racine signifiant couper, tailler (cf. ses emplois, à une autre forme, en Jos 17.15,18, défricher  ; Ez 21.24, inscrire  ; 23.47, abattre [par l''épée] ), ici peut-être au sens de donner forme aux choses. Dans ce sens, il semble se rapporter toujours à une action de Dieu ; il s''agit parfois d''une intervention qui suscite du nouveau dans l''histoire de son peuple (Es 43.1,7,15). Sur la création du monde, voir l''emploi du même terme en Dt 4.32 ; Es 42.5 ; voir aussi, quant à l''idée, Jr 32.17 ; Ps 8 ; 89.10-13 ; 104 ; 136.5 ; Jb 38–39 ; Mc 13.19 ; Ac 14.15 ; Rm 1.20 ; Ep 3.9 ; Ap 4.11. –  le ciel (ou les cieux  : le terme n''existe qu''au pluriel en hébreu) / la terre  : cf. v. 8,10 ; Es 65.17+. – En modifiant quelquefois la vocalisation traditionnelle de l''hébreu, certains traduisent  : Quand Dieu commença à créer le ciel et la terre, (2) la terre était… ou Au commencement, quand Dieu créa le ciel et la terre, (2) la terre était…'
  - type: text
    content: Au commencement Dieu créa le ciel et la terre.
  '10':
  - type: text
    content: 'Dieu appela la terre ferme « terre », et il appela la masse des eaux « mer ». Dieu vit que cela était bon. '
  '11':
  - type: note
    content: 'Que la terre…  : ici comme aux v. 12 et 24 la terre participe à l''action créatrice ; cf. Es 61.11 ; Mc 4.28. –  verdure…  : cf. Ps 104.14-16. –  selon leurs espèces  : litt. selon son espèce  ; v. 12,21,24s ; même expression en 6.20n  ; 7.14 ; 11.14s,19,22,29 ; Dt 14.13ss,18 ; Ez 47.10.'
  - type: text
    content: 'Dieu dit : Que la terre donne de la verdure, de l''herbe porteuse de semence, des arbres fruitiers qui portent sur la terre du fruit selon leurs espèces et qui ont en eux leur semence ! Il en fut ainsi. '
  '12':
  - type: text
    content: 'La terre produisit de la verdure, de l''herbe porteuse de semence selon ses espèces et des arbres qui portent du fruit et qui ont en eux leur semence selon leurs espèces. Dieu vit que cela était bon. '
  '13':
  - type: text
    content: 'Il y eut un soir et il y eut un matin : troisième jour.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'luminaires  : le terme hébreu est apparenté au mot traduit par lumière au v. 3 ; dérivé du verbe traduit par éclairer au v. 15, il désigne parfois un porte-lampes (Ex 25.6 etc. ; voir aussi ses emplois en Ez 32.8n  ; Ps 74.16n  ; 90.8n  ; Pr 15.30n). Le récit présente les astres comme des lumières créées (Es 40.26 ; Ps 136.7-9) qui ont pour fonctions essentielles d’ éclairer la terre (v. 15,17 ; Jr 31.35) et de marquer les temps (sur le mot traduit par signes , voir 4.15n  ; Jr 10.2), notamment les jours des rencontres festives ou fêtes religieuses (Lv 23.2n  ; voir calendrier et fêtes ; le même mot hébreu est traduit par temps fixé en Ex 13.10n etc. ; voir aussi Jos 8.14n  ; 1S 20.35n). Il s''oppose ainsi aux religions qui les considèrent comme des divinités (Dt 4.19). Voir aussi Ps 74.16n  ; 104.19n  ; 148.3-6 ; Jc 1.17.'
  - type: text
    content: 'Dieu dit : Qu''il y ait des luminaires dans la voûte céleste pour séparer le jour et la nuit ! Qu''ils servent de signes pour marquer les rencontres festives, les jours et les années, '
  '15':
  - type: text
    content: 'qu''ils servent de luminaires dans la voûte céleste pour éclairer la terre ! Il en fut ainsi. '
  '16':
  - type: note
    content: 'pour dominer…  : litt. pour la domination du jour  ; verbe hébreu apparenté au v. 18 (autre verbe v. 26ss) ; 3.16 ; 4.7 ; il est traduit par administrer en 24.2, être le maître de en 37.8, ailleurs par diriger ou gouverner  ; il évoque souvent le gouvernement politique (voir aussi Pr 1.1n).'
  - type: text
    content: 'Dieu fit les deux grands luminaires, le grand luminaire pour dominer le jour et le petit luminaire pour dominer la nuit, ainsi que les étoiles. '
  '17':
  - type: text
    content: 'Dieu les plaça dans la voûte céleste pour éclairer la terre, '
  '18':
  - type: text
    content: 'pour dominer le jour et la nuit, et pour séparer la lumière et les ténèbres. Dieu vit que cela était bon. '
  '19':
  - type: text
    content: 'Il y eut un soir et il y eut un matin : quatrième jour.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'La terre…  : autre traduction or la terre… –  chaos (même terme Dt 32.10 ; 1S 12.21n  ; Es 24.10 ; 29.21 ; 40.17,23 ; 41.29 ; 44.9 ; 45.18s ; 49.4 ; 59.4 ; Ps 107.40 ; Jb 6.18 ; 12.24 ; 26.7) / vide  : hébreu tohou / bohou (aussi Es 34.11 ; Jr 4.23), d''où vient notre expression tohu-bohu . –  ténèbres  : cf. v. 4s. –  au-dessus de ou à la surface de  : la même expression revient ici deux fois ; elle sera rendue face à au v. 20. –  abîme  : le mot hébreu tehom désigne ici l''océan primitif. Contrairement au mythe babylonien ( Enuma Elish ) où la création résulte d''un combat avec la déesse Tiamat (nom probablement apparenté à tehom ), il joue dans ce v. un rôle purement passif : c''est l''état antérieur à la création proprement dite. On retrouve le même terme dans des contextes comparables en Ps 33.7 ; 104.6 ; Jb 38.16 ; Pr 3.20 ; 8.24ss ; il peut être un simple équivalent de « mer » (Ps 135.6 ; Jb 28.14 ; 38.30 ; 41.24), mais il peut également évoquer une inondation (Ez 26.19 ; Jon 2.6 ; Ha 3.10 ; Ps 42.8). L''abîme a un rôle positif en Gn 49.25 ; Dt 8.7n  ; 33.13 ; Ez 31.4 ; Ps 78.15 ; Pr 8.28 : c''est de lui que viennent les eaux souterraines qui alimentent les sources. Mais il apparaît souvent comme une menace, notamment dans l’« anticréation » que représente le déluge Gn 7.11 ; 8.2 ; cf. Ex 15.5,8 ; Es 51.10 ; 63.13 ; Ez 26.19 ; Am 7.4 ; Jon 2.6 ; Ps 36.7 ; 71.20 ; 106.9 ; 107.26. Les textes le personnifient fréquemment (Ps 42.8 ; 77.17 ; 148.7 ; Ha 3.10). –  le souffle ou l''Esprit  : le mot hébreu rouah signifie souffle, vent  ; certains pensent que l''expression traduite par le souffle de Dieu signifie simplement ici un vent violent  ; cf. 30.8n  ; 1S 14.15 ; Ps 36.7 ; 68.16 ; 80.11 ; 104.6 ; Ct 8.6n. Tg un esprit d''amour . –  tournoyait ou planait  : le verbe correspondant se retrouve en Dt 32.11 où il peut comporter une nuance de protection (voir aussi Gn 8.12-16) ; une forme proche, mais pas nécessairement apparentée, est traduite par frémir en Jr 23.9n  ; autre traduction agitait les eaux (cf. v. 6).'
  - type: text
    content: La terre était un chaos, elle était vide ; il y avait des ténèbres au-dessus de l'abîme, et le souffle de Dieu tournoyait au-dessus des eaux.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'grouillent / petites bêtes  : les deux termes sont apparentés en hébreu (comparer l''emploi de bestioles et fourmiller aux v. 24n,26n) ; voir 7.21. –  êtres vivants  : le mot hébreu néphesh , ici rendu par être , est celui que les traductions traditionnelles ont traduit quelquefois, conventionnellement, par âme  : ici il désigne les animaux (de même aux v. 21,24 ; 2.19 ; 9.10ss) comme ailleurs les humains (2.7). Dans ce dernier cas, on peut le traduire par personne ou individu (14.21), ou encore par un simple pronom ( ma néphesh = moi, je , cf. 27.4n). Il peut aussi prendre les sens plus particuliers de souffle (v. 30), vie (9.4s ; 12.5n  ; 19.17ss ; 32.31), désir (23.8n), voire gorge ou gosier (Nb 11.6 ; Es 5.14 ; 29.8 ; Jon 2.6 ; Ps 63.6), qui correspondent peut-être mieux à son étymologie ( respirant / aspirant  ?) ; voir aussi Mt 10.28n  ; Jn 10.11n. –  face à (v. 2n) la voûte céleste v. 6n  ; LXX ajoute et il en fut ainsi.'
  - type: text
    content: 'Dieu dit : Que les eaux grouillent de petites bêtes, d''êtres vivants, et que des oiseaux volent au-dessus de la terre, face à la voûte céleste ! '
  '21':
  - type: note
    content: 'monstres marins Ps 148.7 ; le même terme est traduit par dragon(s) Dt 32.33 ; Es 27.1 ; 51.9 ; Jr 51.34 ; Ps 74.13 ; 91.13 ; Jb 7.12. –  fourmillent  : cf. v. 26n. –  oiseau  : litt. oiseau d''aile  ; l''expression peut englober des insectes ou des mammifères ailés (cf. Lv 11.13ss ; Ps 78.27).'
  - type: text
    content: 'Dieu créa les grands monstres marins et tous les êtres vivants qui fourmillent, dont les eaux se mirent à grouiller, selon leurs espèces, ainsi que tout oiseau selon ses espèces. Dieu vit que cela était bon. '
  '22':
  - type: note
    content: 'bénit v. 28 ; 2.3 ; 5.2 ; 9.1 ; 12.2+ ; cf. Ag 2.19+. –  Soyez féconds…  : cf. v. 28 ; 8.17 ; 9.1,7 ; 17.6,20 ; 26.22n  ; 28.3 ; 35.11 ; 41.52 ; 47.27 ; 48.4 ; 49.22 ; Jr 3.16 ; Ez 36.10s ; Ps 105.24.'
  - type: text
    content: 'Dieu les bénit en disant : Soyez féconds, multipliez-vous et remplissez les eaux des mers ; et que les oiseaux se multiplient sur la terre ! '
  '23':
  - type: text
    content: 'Il y eut un soir et il y eut un matin : cinquième jour.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'bétail ou bêtes , selon la traduction la plus fréquente du terme hébreu correspondant (34.23 ; 36.6 etc.) ; cependant le mot semble ici désigner les animaux domestiques, par opposition aux animaux sauvages  ; cf. 7.21n. –  bestioles  : le terme hébreu désigne tout ce qui se déplace à ras de terre, petits reptiles, petits mammifères (p. ex. souris), batraciens et insectes ; cf. v. 26n  ; voir aussi 8.17. –  animaux sauvages  : litt. animaux de la terre , de même dans la suite ; cf. v. 28-30 ; 9.10 ; expression probablement équivalente en 2.19s ; 3.1,14n  ; cf. Ez 34.28+ ; Jb 5.22 ; voir aussi 1S 17.46 ; Ps 79.2.'
  - type: text
    content: 'Dieu dit : Que la terre produise des êtres vivants selon leurs espèces : bétail, bestioles, animaux sauvages, chacun selon ses espèces ! Il en fut ainsi. '
  '25':
  - type: text
    content: Dieu fit les animaux sauvages selon leurs espèces, le bétail selon son espèce, et toutes les bestioles de la terre selon leur espèce. Dieu vit que cela était bon.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Faisons  : sur le pluriel, cf. v. 1n  ; 3.22n  ; il faut probablement l''entendre ici comme une simple tournure de délibération, cf. 2S 24.14 ; Es 6.8 ; quelques-uns y voient cependant une réminiscence de la représentation de Dieu entouré d''un « conseil » ou d''une « cour », à l''image des souverains (1R 22.19 ; Jb 1.6s ; 2.1s). –  les humains  : ici et en 5.1s, ce terme, au singulier ou au pluriel, traduit le mot hébreu ’adam , qui a donné le nom propre Adam et qui sera souvent rendu par homme ou hommes dans le reste de la Bible (2.5,7 etc.). Ici ce mot hébreu est avant tout un collectif qui désigne le genre humain. Du reste le verbe qui suit ( qu''ils dominent ) est au pluriel dans le texte ; cf. Jb 15.7n. –  image / ressemblance 5.1-3 ; 9.6 ; cf. Es 40.18n  ; Ez 1.5n  ; 1Co 11.7 ; Col 3.10 ; Jc 3.9 ; Sagesse 2.23 : « Dieu a créé l''homme pour qu''il soit incorruptible et l''a fait image de ce qu''il possède en propre. » –  sur toute la terre  : Syr porte ici sur tous les animaux de la terre (v. 24n). –  qui fourmillent  : le verbe hébreu (déjà v. 21) est apparenté au nom traduit par bestioles (v. 24n) ; de même dans la suite. – Cf. Instruction de Mérikaré 130ss : « Bienheureux les hommes, le troupeau du dieu. Il a fait le ciel et la terre selon leurs désirs, et il a repoussé le monstre des eaux. Il a fait le souffle de vie pour leurs narines. Eux, qui sont issus de son corps, sont ses images. Il se lève dans le ciel selon leur désir. Il a fait pour eux des plantes, des animaux, des oiseaux et des poissons pour les nourrir. »'
  - type: text
    content: 'Dieu dit : Faisons les humains à notre image, selon notre ressemblance, pour qu''ils dominent sur les poissons de la mer, sur les oiseaux du ciel, sur le bétail, sur toute la terre et sur toutes les bestioles qui fourmillent sur la terre. '
  '27':
  - type: note
    content: 'il les créa  : la première fois le pronom objet est au singulier dans le texte, renvoyant au singulier collectif ’adam : il le créa, c.-à-d. il créa les humains (v. 26n). –  homme et femme  : litt. mâle et femelle, ou mâle ou femelle. Cf. 2.21s ; 5.1s ; Mt 19.4/ /; 1Co 11.7 ; Ga 3.28n.'
  - type: text
    content: 'Dieu créa les humains à son image : il les créa à l''image de Dieu ; homme et femme il les créa. '
  '28':
  - type: note
    content: 'féconds / multipliez v. 22+. –  soumettez-la  : cf. 9.2 ; Ps 8.5-9.'
  - type: text
    content: 'Dieu les bénit ; Dieu leur dit : Soyez féconds, multipliez-vous, remplissez la terre et soumettez-la. Dominez sur les poissons de la mer, sur les oiseaux du ciel et sur tous les animaux qui fourmillent sur la terre. '
  '29':
  - type: note
    content: 'L''expression herbe porteuse de semence désigne sans doute en particulier les céréales ; cf. 9.3n. –  nourriture  : cf. 2.16 ; 3.18s ; 9.1-3 ; Ps 104.14s.'
  - type: text
    content: 'Dieu dit : Je vous donne toute herbe porteuse de semence sur toute la terre, et tout arbre fruitier porteur de semence ; ce sera votre nourriture. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu dit v. 6,9,11,14,20,24,26,28s (10 fois en tout). Targum (Tg) Neofiti : La Parole de Yahvé dit (de même dans la suite). Sur le thème de la parole créatrice, voir Ps 33.6,9 ; Jn 1.1-3 ; Hé 11.3 ; 2P 3.5 ; cf. Sagesse 9.1 : « Dieu… qui as fait l''univers par ta parole… » –  Qu''il y ait (cf. v. 6,14) de la lumière  : cf. 2Co 4.6.'
  - type: text
    content: 'Dieu dit : Qu''il y ait de la lumière ! Et il y eut de la lumière. '
  '30':
  - type: note
    content: 'animal de la terre ou animal sauvage  : cf. v. 24n. –  souffle de vie  : même expression traduite par être vivant au v. 20n.'
  - type: text
    content: 'A tout animal de la terre, à tout oiseau du ciel, à tout ce qui fourmille sur la terre et qui a souffle de vie, je donne toute herbe verte pour nourriture. Il en fut ainsi. '
  '31':
  - type: note
    content: très bon v. 4+.
  - type: text
    content: 'Dieu vit alors tout ce qu''il avait fait : c''était très bon. Il y eut un soir et il y eut un matin : le sixième jour.'
  '4':
  - type: note
    content: 'Dieu vit… bonne v. 10,12,18,21,25 ; cf. v. 31 (7 fois en tout) ; voir aussi Jb 28.27. –  Dieu sépara v. 6s,14,18 (5 fois en tout) ; cf. Lv 10.10+ ; 20.24n  ; Ez 22.26+ ; ici la séparation des éléments en dualités ouvre le temps et l''espace de la vie, considérée du point de vue de l''homme. –  lumière / ténèbres  : cf. 8.22 ; Ex 10.21ss ; Es 9.1 ; 45.7 ; 60.1-3,19s ; Jb 26.10 ; Jn 1.5,9ss ; 2Co 6.14 ; 1Jn 1.5 ; Ap 22.5.'
  - type: text
    content: 'Dieu vit que la lumière était bonne, et Dieu sépara la lumière et les ténèbres. '
  '5':
  - type: note
    content: 'jour/ nuit v. 14-18 ; Ps 74.16. Les textes bibliques comptent les jours tantôt à partir du soir, comme en Mésopotamie (Dn 8.14), tantôt à partir du matin, comme en Egypte (Nb 11.32). –  premier jour  : litt. jour un  ; cf. Za 14.6-7n  ; Mc 16.2n.'
  - type: text
    content: 'Dieu appela la lumière « jour », et il appela les ténèbres « nuit ». Il y eut un soir et il y eut un matin : premier jour.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'voûte ou étendue (hébreu raqia‘ , Ez 1.22-25 ; 10.1 ; Ps 19.2 ; 150.1 ; Dn 12.3 voûte céleste ) ; Vg a traduit firmamentum , qui suggère un élément solide (ferme) et qui a donné notre mot firmament . Le terme hébreu évoque une plaque ou une feuille de métal aplatie ou courbée à coups de marteau (Ex 39.3 ; Es 42.5n  ; 44.24 ; Ps 136.6n  ; Jb 37.18n) ; ici il faut sans doute se représenter une sorte de plafond voûté qui sépare les eaux d''en haut et les eaux d''en bas pour ménager l''espace de la vie (v. 7 ; cf. 6.17n  ; 7.11ss) ; sur les représentations de l''univers présentes dans la Bible, voir aussi Ex 20.4 ; Es 40.22 ; Ps 104.2s,13 ; 148.4 ; Jb 26.10 ; Ap 4.6. – A la fin du v. LXX ajoute  : Il en fut ainsi et l''omet au v. 7.'
  - type: text
    content: 'Dieu dit : Qu''il y ait une voûte au milieu des eaux pour séparer les eaux des eaux ! '
  '7':
  - type: note
    content: 'Dieu fit  : cf. v. 16,25 ; le verbe hébreu correspondant, comme son équivalent en français, est très fréquent et très général (contrairement à celui qui est traduit par créer au v. 1n). –  il sépara…  : autre traduction la voûte, qui sépara…'
  - type: text
    content: 'Dieu fit la voûte ; il sépara les eaux qui sont au-dessous de la voûte et les eaux qui sont au-dessus de la voûte. Il en fut ainsi. '
  '8':
  - type: note
    content: 'LXX ajoute  : Et Dieu vit que cela était bon (v. 4+).'
  - type: text
    content: 'Dieu appela la voûte « ciel ». Il y eut un soir et il y eut un matin : deuxième jour.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'en un seul lieu  : LXX en une seule masse . –  terre ferme , litt. la sèche  ; le même mot revient en Ex 4.9 ; 14.16n,22,29 ; 15.19 ; Jos 4.22 ; Jon 1.9,13 ; 2.11 ; Ps 66.6 ; il est rendu par terre desséchée en Es 44.3. –  Il en fut ainsi  : LXX ajoute  : les eaux qui sont au-dessous du ciel s''amassèrent en leurs masses, et la terre ferme apparut  ; Ps 24.2 ; 33.7 ; 104.6-9 ; 136.6 ; Jb 26.10 ; 38.8-11.'
  - type: text
    content: 'Dieu dit : Que les eaux qui sont au-dessous du ciel s''amassent en un seul lieu, et que la terre ferme apparaisse ! Il en fut ainsi. '
