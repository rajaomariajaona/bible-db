document_id: PSA.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le roi peut compter sur le Seigneur
  - type: text
    content: ' '
  - type: note
    content: 13.1+.
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fournaise ardente Os 7.7 ; Ml 3.19. –  le jour où tu te montreras  : litt. au temps de ta face. –  le feu les dévorera Es 26.11+.'
  - type: text
    content: Tu les rendras comme une fournaise ardente,
  - type: text
    content: le jour où tu te montreras ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les engloutira dans sa colère,'
  - type: text
    content: et le feu les dévorera.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'leur postérité  : litt. leur fruit  ; cf. 37.28 ; Jb 18.16.'
  - type: text
    content: Tu feras disparaître leur postérité de la terre,
  - type: text
    content: et leur descendance d'entre les êtres humains.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ont tramé  : litt. ils ont tendu  ; cf. 2.2-4 ; Es 7.7. –  une intrigue ou des intrigues , selon certains mss ; cf. 10.2.'
  - type: text
    content: Ils ont tramé du mal contre toi,
  - type: text
    content: ils ont monté une intrigue, mais ils seront impuissants,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le dos  : litt. l''épaule  ; cf. 18.41+.'
  - type: text
    content: car tu leur feras tourner le dos,
  - type: text
    content: et avec ton arc tu tireras sur eux.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Elève-toi  : cf. 57.6-12 ; 59.17 ; 71.8. –  Nous chanterons…  : litt. nous chanterons, nous chanterons (deux verbes synonymes en hébreu, voir 7.18n) ta puissance ou, selon d''autres mss, tes hauts faits  ; cf. 27.6.'
  - type: text
    content: 'Elève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec ta force !'
  - type: text
    content: Nous chanterons ta puissance par des psaumes.
  '2':
  - type: text
    content: ' '
  - type: note
    content: le roi se réjouit 63.12. –  ton salut… 9.15+.
  - type: text
    content: Seigneur
  - type: text
    content: ', le roi se réjouit de ta force.'
  - type: text
    content: Combien ton salut le remplit d'allégresse !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ce que son cœur désirait  : cf. 20.5+.'
  - type: text
    content: Tu lui as donné ce que son cœur désirait,
  - type: text
    content: 'tu n''as pas refusé ce que souhaitaient ses lèvres. '
  - type: text
    content: Pause.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'une couronne d''or 2S 12.30 ; Est 1.11+ ; cf. Sagesse 5.15s : « Mais les justes vivent pour toujours ; leur salaire dépend du Seigneur et le Très-Haut prend soin d''eux. Aussi recevront-ils la royauté splendide et le diadème magnifique de la main du Seigneur. »'
  - type: text
    content: Car tu viens au-devant de lui avec des bénédictions excellentes,
  - type: text
    content: tu mets sur sa tête une couronne d'or fin.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Il te demandait 2.8+. –  la longueur des jours  : même expression 23.6 ; 91.16 ; 93.5 ; Dt 30.20 ; Jb 12.12 ; Pr 3.2,16 ; Lm 5.20 ; cf. Ps 61.7s ; 72.5,7,15 ; Pr 9.11 ; voir aussi 1R 3.13s ; 2R 20.1ss. –  pour toujours… 89.37s.'
  - type: text
    content: Il te demandait la vie, tu la lui as donnée,
  - type: text
    content: la longueur des jours, pour toujours, à jamais.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.6 ; 45.4 ; 96.6. – Voir gloire.
  - type: text
    content: Sa gloire est grande à cause de ton salut ;
  - type: text
    content: tu le couvres d'éclat et de magnificence.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'une bénédiction pour toujours  : cf. 45.3 ; 72.17 ; voir aussi Gn 12.2s. –  joie devant toi  : litt. joie avec ta face , 16.11n.'
  - type: text
    content: Tu fais de lui une bénédiction pour toujours,
  - type: text
    content: tu le combles de joie devant toi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'met sa confiance dans le Seigneur 4.6+. –  par la fidélité…  : cf. 61.8 ; 89.2 ; 2S 7.15 ; Pr 20.28.'
  - type: text
    content: 'Le roi met sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: par la fidélité du Très-Haut, il ne vacille pas.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 9-13 s''adressent vraisemblablement au roi. –  trouvera  : c.-à-d. atteindra, châtiera.'
  - type: text
    content: Ta main trouvera tous tes ennemis,
  - type: text
    content: ta main droite trouvera ceux qui te détestent.
