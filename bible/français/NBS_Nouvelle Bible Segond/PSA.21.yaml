        - type: text
          text: '5.15s : « Mais les justes vivent pour toujours ; leur salaire dépend du Seigneur et le Très-Haut prend soin d''eux. Aussi recevront-ils la royauté splendide et le diadème magnifique de la main du Seigneur. »'
