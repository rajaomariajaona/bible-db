verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Paul, prisonnier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 9,13,22s ; Ph 1.7+ ; Col 4.10,18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de Jésus-Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9 ; cf. v. 13 ; Ps 69.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 2.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ep 3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.1 ; Col 1.24 ; 2Tm 1.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Timothée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 16.1+ ; Col 1.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Philémon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était vraisemblablement de Colosses, comme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Onésime '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Col 4.9,17).
      marker-yv: yv-n
    - type: text
      text: 'Paul, prisonnier de Jésus-Christ, et le frère Timothée, à Philémon, notre collaborateur bien-aimé, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon enfant, celui que j''ai engendré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mis au monde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 1Co 4.14+s,17 ; Ga 4.19 ; voir aussi v. 19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en prison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans les liens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même v. 13 ; cf. Ph 1.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Onésime '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Col 4.9.
      marker-yv: yv-n
    - type: text
      text: 'je te supplie pour mon enfant, celui que j''ai engendré en prison, Onésime : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom Onésime signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'utile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(du verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rendre un service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 20) ; le synonyme traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bien utile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ainsi que son antonyme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inutile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', rappellent le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Mt 11.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: ) ; on retrouve le terme positif en 2Tm 2.21 (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: utile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; 4.11.
      marker-yv: yv-n
    - type: text
      text: 'autrefois il t''a été inutile, mais maintenant il est bien utile, et à toi et à moi ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une partie de moi-même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mes entrailles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: reçois-le comme une partie de moi-même.
      marker-yv: yv-n
    - type: text
      text: je te le renvoie, lui qui est une partie de moi-même.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il me serve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Mt 20.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ac 13.5 ; Ph 2.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la bonne nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la bonne nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 1+.'
      marker-yv: yv-n
    - type: text
      text: 'Moi, j''aurais souhaité le retenir auprès de moi, pour qu''il me serve à ta place, tant que je suis en prison pour la bonne nouvelle. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 9.7 ; 1P 5.2.
      marker-yv: yv-n
    - type: text
      text: Mais je n'ai rien voulu faire sans ton avis, pour que ton bienfait n'ait pas l'air forcé, mais qu'il soit volontaire.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut-être, en effet, a-t-il été séparé de toi pour un temps, afin que tu le retrouves pour toujours, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esclave '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: frère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Tm 6.2 ; voir aussi 1Co 7.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''esclave était considéré comme faisant partie de la famille ; à cette relation vient s''en ajouter une nouvelle, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Philémon et Onésime sont tous deux chrétiens (cf. v. 1,10).'
      marker-yv: yv-n
    - type: text
      text: 'non plus comme un esclave, mais, ce qui est mieux qu''un esclave, comme un frère bien-aimé : il l''est tout particulièrement pour moi, combien plus le sera-t-il pour toi, et dans la chair et dans le Seigneur ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: compagnon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec est apparenté au terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'participation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si tu es en communion avec moi ; si tu es solidaire de moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'accueille-le '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 14.1+.
      marker-yv: yv-n
    - type: text
      text: 'Si donc tu me tiens pour ton compagnon, accueille-le comme si c''était moi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il t''a fait du tort ou s''il te doit quelque chose, mets-le sur mon compte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ma propre main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il semble que, d''ordinaire, Paul n''écrivait lui-même que la salutation finale de ses épîtres, comme une sorte de signature ; ici c''est probablement l''ensemble du billet qui est de sa main, sans doute à cause du caractère relativement privé de sa démarche auprès de Philémon ; cf. 1Co 16.21+ ; Col 4.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu te dois toi-même à moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''est par Paul que Philémon a été converti à la foi chrétienne ; cf. Rm 15.27.'
      marker-yv: yv-n
    - type: text
      text: 'Moi, Paul, je l''écris de ma propre main : je te rembourserai moi-même – pour ne pas te dire que tu te dois toi-même à moi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Appia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait être la femme de Philémon. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Archippe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Col 4.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: compagnon d'armes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme dérivé du mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'soldat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 2Tm 2.3 ; cf. Ph 2.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Eglise
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 16.5+ ; cf. Col 4.15.
      marker-yv: yv-n
    - type: text
      text: 'à Appia, notre sœur, à Archippe, notre compagnon d''armes, et à l''Eglise qui est dans ta maison : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rends-moi ce service, à moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que moi je profite de toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'accorde-moi cette faveur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comme au v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 2Co 7.13-15.'
      marker-yv: yv-n
    - type: text
      text: Oui, mon frère, rends-moi ce service, à moi, dans le Seigneur ; tranquillise mon cœur dans le Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandation et salutations finales
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'obéissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 1.5+ ; 2Co 7.15 ; 10.5s ; Ph 2.12.
      marker-yv: yv-n
    - type: text
      text: 'C''est en me fiant à ton obéissance que je t''écris, sachant que tu feras encore au-delà de ce que je dis. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ph 1.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe grec est apparenté au terme habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir Rm 8.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: En même temps, prépare-moi un logement, car j'espère vous être rendu, grâce à vos prières.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Epaphras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Col 1.7+ ; 4.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'compagnon de captivité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Col 4.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Jésus-Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains commentateurs modifient légèrement le texte traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '… dans le Christ, te salue, ainsi que Jésus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[Col 4.11]'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', (24) Marc…'
      marker-yv: yv-n
    - type: text
      text: 'Epaphras, mon compagnon de captivité en Jésus-Christ, te salue, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Col 4.10,14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Marc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 12.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aristarque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 19.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Démas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Luc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Tm 4.10+s.
      marker-yv: yv-n
    - type: text
      text: ainsi que Marc, Aristarque, Démas et Luc, mes collaborateurs.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ga 6.18 ; Ph 4.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de notre Seigneur
