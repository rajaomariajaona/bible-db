document_id: PHM.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: Paul, prisonnier v. 9,13,22s ; Ph 1.7+ ; Col 4.10,18. –  de Jésus-Christ v. 9 ; cf. v. 13 ; Ps 69.34n  ; 2Co 2.14n  ; Ep 3.1n  ; 4.1 ; Col 1.24 ; 2Tm 1.8. –  Timothée Ac 16.1+ ; Col 1.1. –  Philémon était vraisemblablement de Colosses, comme Onésime (cf. Col 4.9,17).
  - type: text
    content: 'Paul, prisonnier de Jésus-Christ, et le frère Timothée, à Philémon, notre collaborateur bien-aimé, '
  '10':
  - type: note
    content: 'mon enfant, celui que j''ai engendré (ou mis au monde) 1Co 4.14+s,17 ; Ga 4.19 ; voir aussi v. 19n. –  en prison  : litt. dans les liens, de même v. 13 ; cf. Ph 1.7n. –  Onésime Col 4.9.'
  - type: text
    content: 'je te supplie pour mon enfant, celui que j''ai engendré en prison, Onésime : '
  '11':
  - type: note
    content: Le nom Onésime signifie utile (du verbe traduit par rendre un service au v. 20) ; le synonyme traduit ici par bien utile, ainsi que son antonyme inutile, rappellent le mot Christ (cf. Mt 11.30n  ; voir onction) ; on retrouve le terme positif en 2Tm 2.21 (utile) ; 4.11.
  - type: text
    content: 'autrefois il t''a été inutile, mais maintenant il est bien utile, et à toi et à moi ; '
  '12':
  - type: note
    content: 'une partie de moi-même  : litt. mes entrailles, comme au v. 7n  ; certains mss portent reçois-le comme une partie de moi-même.'
  - type: text
    content: je te le renvoie, lui qui est une partie de moi-même.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'qu''il me serve  : cf. Mt 20.26n  ; voir aussi Ac 13.5 ; Ph 2.30. –  pour la bonne nouvelle  : litt. de la bonne nouvelle , cf. v. 1+.'
  - type: text
    content: 'Moi, j''aurais souhaité le retenir auprès de moi, pour qu''il me serve à ta place, tant que je suis en prison pour la bonne nouvelle. '
  '14':
  - type: note
    content: 2Co 9.7 ; 1P 5.2.
  - type: text
    content: Mais je n'ai rien voulu faire sans ton avis, pour que ton bienfait n'ait pas l'air forcé, mais qu'il soit volontaire.
  '15':
  - type: text
    content: 'Peut-être, en effet, a-t-il été séparé de toi pour un temps, afin que tu le retrouves pour toujours, '
  '16':
  - type: note
    content: 'esclave / frère  : cf. 1Tm 6.2 ; voir aussi 1Co 7.22+. –  dans la chair  : l''esclave était considéré comme faisant partie de la famille ; à cette relation vient s''en ajouter une nouvelle, dans le Seigneur  : Philémon et Onésime sont tous deux chrétiens (cf. v. 1,10).'
  - type: text
    content: 'non plus comme un esclave, mais, ce qui est mieux qu''un esclave, comme un frère bien-aimé : il l''est tout particulièrement pour moi, combien plus le sera-t-il pour toi, et dans la chair et dans le Seigneur ! '
  '17':
  - type: note
    content: 'compagnon  : le mot grec est apparenté au terme traduit par participation au v. 6n  ; on pourrait aussi traduire si tu es en communion avec moi ; si tu es solidaire de moi. –  accueille-le Rm 14.1+.'
  - type: text
    content: 'Si donc tu me tiens pour ton compagnon, accueille-le comme si c''était moi. '
  '18':
  - type: text
    content: 'S''il t''a fait du tort ou s''il te doit quelque chose, mets-le sur mon compte. '
  '19':
  - type: note
    content: 'de ma propre main  : il semble que, d''ordinaire, Paul n''écrivait lui-même que la salutation finale de ses épîtres, comme une sorte de signature ; ici c''est probablement l''ensemble du billet qui est de sa main, sans doute à cause du caractère relativement privé de sa démarche auprès de Philémon ; cf. 1Co 16.21+ ; Col 4.18. –  tu te dois toi-même à moi  : c''est par Paul que Philémon a été converti à la foi chrétienne ; cf. Rm 15.27.'
  - type: text
    content: 'Moi, Paul, je l''écris de ma propre main : je te rembourserai moi-même – pour ne pas te dire que tu te dois toi-même à moi. '
  '2':
  - type: note
    content: 'Appia pourrait être la femme de Philémon. –  Archippe Col 4.17. –  compagnon d''armes  : terme dérivé du mot traduit par soldat en 2Tm 2.3 ; cf. Ph 2.25. –  l''Eglise… Rm 16.5+ ; cf. Col 4.15.'
  - type: text
    content: 'à Appia, notre sœur, à Archippe, notre compagnon d''armes, et à l''Eglise qui est dans ta maison : '
  '20':
  - type: note
    content: 'rends-moi ce service, à moi  : litt. que moi je profite de toi  ; autre traduction accorde-moi cette faveur (v. 11n). –  mon cœur  : comme au v. 7n  ; cf. 2Co 7.13-15.'
  - type: text
    content: Oui, mon frère, rends-moi ce service, à moi, dans le Seigneur ; tranquillise mon cœur dans le Christ.
  - type: heading
    content: Recommandation et salutations finales
  '21':
  - type: text
    content: ' '
  - type: note
    content: obéissance Rm 1.5+ ; 2Co 7.15 ; 10.5s ; Ph 2.12.
  - type: text
    content: 'C''est en me fiant à ton obéissance que je t''écris, sachant que tu feras encore au-delà de ce que je dis. '
  '22':
  - type: note
    content: 'Ph 1.25+. –  rendu  : le verbe grec est apparenté au terme habituellement traduit par grâce  ; voir Rm 8.32n.'
  - type: text
    content: En même temps, prépare-moi un logement, car j'espère vous être rendu, grâce à vos prières.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Epaphras Col 1.7+ ; 4.12. –  compagnon de captivité Col 4.10+. –  en Jésus-Christ  : certains commentateurs modifient légèrement le texte traditionnel pour lire … dans le Christ, te salue, ainsi que Jésus [Col 4.11] , (24) Marc…'
  - type: text
    content: 'Epaphras, mon compagnon de captivité en Jésus-Christ, te salue, '
  '24':
  - type: note
    content: Col 4.10,14. –  Marc Ac 12.12+. –  Aristarque Ac 19.29+. –  Démas / Luc 2Tm 4.10+s.
  - type: text
    content: ainsi que Marc, Aristarque, Démas et Luc, mes collaborateurs.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Ga 6.18 ; Ph 4.23. –  du Seigneur  : certains mss portent de notre Seigneur . – Certains mss portent, avec diverses variantes, l''indication suivante  : A Philémon [et Appia, maîtres d''Onésime, et à Archippe, ministre de l''Eglise de Colosses], écrite de Rome, par l''entremise [de Tychique et] d''Onésime, le domestique.'
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ soit avec votre esprit !
  '3':
  - type: note
    content: Grâce et paix… Rm 1.7+.
  - type: text
    content: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
  - type: heading
    content: L'amour et la foi de Philémon
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 1.8s ; 1Co 1.4+ ; Col 1.3. –  Je rends… grâce  : cf. Mt 26.27n. –  mon Dieu Ph 1.3.'
  - type: text
    content: 'Je rends toujours grâce à mon Dieu en faisant mention de toi dans mes prières, '
  '5':
  - type: note
    content: 'Col 1.4,9. –  de l''amour…  : autre traduction … l''amour que tu as pour tous les saints et la foi dont tu fais preuve envers le Seigneur Jésus. –  la foi  : le même mot peut signifier fidélité, confiance. –  les saints Rm 1.7n.'
  - type: text
    content: 'car j''entends parler de l''amour et de la foi dont tu fais preuve envers le Seigneur Jésus et pour tous les saints. '
  '6':
  - type: note
    content: 'ta participation à la foi  : litt. la communion de ta foi ou ta communion à la foi, ou encore la solidarité qui découle de ta foi  ; cf. v. 17n  ; 1Co 1.9. –  agissante ou opérante Ep 1.19n. –  par (ou dans) la connaissance ou la reconnaissance, la pleine connaissance, Rm 1.28n  ; Ph 1.9n  ; Col 1.9n. –  tout ce qui est bon…  : cf. Rm 8.28ss ; 15.2 ; Ga 6.10 ; Ph 1.6 ; 1Th 5.15.'
  - type: text
    content: 'Que ta participation à la foi soit agissante par la connaissance de tout ce qui est bon en nous, pour le Christ ! '
  '7':
  - type: note
    content: 'Cf. 1Co 16.18 ; 2Co 7.4,7,13. –  le cœur  : litt. les entrailles, c.-à-d. l''être intérieur comme lieu d''amour et de compassion ; cf. v. 12n,20 ; 2Co 6.12n  ; 7.15n  ; Ph 1.8n  ; Col 3.12n.'
  - type: text
    content: J'ai eu, en effet, beaucoup de joie et d'encouragement à cause de ton amour, car par toi, mon frère, le cœur des saints a été tranquillisé.
  - type: heading
    content: L'accueil que Philémon doit à Onésime
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'assurance  : autre traduction liberté  ; le terme évoque souvent l''autorité apostolique, cf. Ac 2.29n  ; 2Co 3.12+. –  ce qui convient  : cf. Col 3.18.'
  - type: text
    content: 'C''est pourquoi, bien que j''aie dans le Christ une grande assurance pour te prescrire ce qui convient, '
  '9':
  - type: note
    content: 'te supplier  : autres traductions t''encourager, t''exhorter  ; de même au v. 10 ; cf. v. 7 ; Rm 12.1+. –  au nom de l''amour  : litt. pour l''amour, à cause de l''amour. –  un vieillard  : autre traduction un ancien  ; certains proposent de modifier d''une lettre le texte grec pour lire un ambassadeur (cf. 2Co 5.20). –  prisonnier… v. 1n.'
  - type: text
    content: 'j''aime mieux te supplier au nom de l''amour ; tel que je suis, moi, Paul, un vieillard, et de plus maintenant prisonnier de Jésus-Christ, '
