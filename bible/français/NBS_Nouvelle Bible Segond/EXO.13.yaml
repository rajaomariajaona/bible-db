    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cause
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en vue de cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' a agi en ma faveur'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je suis sorti
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : selon la tradition, tout juif doit se considérer comme étant personnellement sorti d''Egypte.'
    marker-yv: yv-n
  - type: text
    text: 'Ce jour-là tu diras à ton fils : « C''est à cause de ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait pour moi lorsque je suis sorti d''Egypte. » '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'signe… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 16 ; cf. Dt 6.8
      - type: usfm
        marker: ord
        children:
        - type: text
