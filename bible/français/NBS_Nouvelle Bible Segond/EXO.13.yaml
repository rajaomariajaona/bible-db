      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: '… dans ta bouche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 30.14.
    marker-yv: yv-n
  - type: text
    text: 'Ce sera pour toi un signe sur ta main et un rappel entre tes yeux, de sorte que la loi du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit dans ta bouche ; car c''est d''une main forte que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t''a fait sortir d''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: temps fixé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu peut aussi désigner la fête elle-même ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rencontre festive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 1.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lv 23.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chaque année
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de jours en jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 11.40'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 21.19 ; 1S 1.3 ; 2.19.'
    marker-yv: yv-n
  - type: text
    text: Tu observeras cette prescription en son temps fixé, chaque année.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t''aura fait entrer dans le pays des Cananéens, comme il te l''a juré à toi et à tes pères, et qu''il te l''aura donné, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu feras passer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur l''expression correspondante, de sens habituellement '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrificiel
      - type: text
        text: ', cf. Lv 18.21 ; 2R 16.3 ; Jr 32.35 ; Ez 20.25s,31 ; 23.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'né le premier… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',13,15 ; cf. 22.28s ; 34.19 ; Nb 3.11-13 ; 18.15-18 ; Dt 15.19-23 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lc 2.23.
    marker-yv: yv-n
  - type: text
    text: 'tu feras passer pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' tout enfant né le premier de sa mère, ainsi que toute première portée de tes bêtes : les mâles appartiennent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L''âne est un animal impur selon les critères de Lv 11.3 (voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ', impur) : il ne peut être offert en sacrifice avec effusion de sang. Cf. Nb 18.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dégageras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe hébreu a aussi été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: libérer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Dt 7.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un mouton ou une chèvre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: premier-né humain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 22.12s.'
    marker-yv: yv-n
  - type: text
    text: 'Tu dégageras tout ânon né le premier de sa mère en le remplaçant par un mouton ou une chèvre ; et si tu ne le dégages pas, tu lui briseras la nuque. Tu dégageras aussi tout premier-né humain parmi tes fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ton fils… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maison des esclaves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque demain ton fils te demandera : « Que signifie cela ? », tu lui répondras : « A la force de la main, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a fait sortir de l''Egypte, de la maison des esclaves ; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: refusait obstinément
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: endurcit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 7.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'comme le pharaon refusait obstinément de nous laisser partir, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a tué tous les premiers-nés en Egypte, depuis les premiers-nés des humains jusqu''aux premiers-nés des bêtes. Voilà pourquoi j''offre en sacrifice au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' tout mâle né le premier de sa mère, et je dégage tout premier-né parmi mes fils. » '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un fronteau
    - type: usfm
      marker: ft
