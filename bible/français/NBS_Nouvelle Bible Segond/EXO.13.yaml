    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu accompliras ce rite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu serviras ce service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', verbe et complément apparentés en hébreu (cf. 12.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ', autre verbe) ; le texte est écrit en vue d''une célébration religieuse ; cf. Nb 1.53+ ; 3.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' t''aura fait entrer dans le pays des Cananéens, des Hittites, des Amorites, des Hivvites et des Jébusites, ce pays ruisselant de lait et de miel qu''il a juré à tes pères de te donner, tu accompliras ce rite ce même mois. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pains sans levain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.15+ ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'Pendant sept jours, tu mangeras des pains sans levain ; et le septième jour, il y aura une fête pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On mangera des pains sans levain pendant les sept jours ; on ne devra voir chez toi rien de levé, on ne devra pas voir chez toi de levain, dans tout ton territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
