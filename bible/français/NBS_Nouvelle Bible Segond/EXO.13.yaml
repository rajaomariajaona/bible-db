  - type: text
    text: 'Moïse dit au peuple : Souvenez-vous de ce jour où vous êtes sortis de l''Egypte, de la maison des esclaves ; car c''est à la force de la main que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous en a fait sortir. On ne mangera rien de levé. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: épis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ’aviv
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au mois d'Abib
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même terme en 9.31 ; 23.15 ; 34.18 ; cf. 12.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 16.1.'
    marker-yv: yv-n
  - type: text
    text: 'Vous sortez aujourd''hui, au mois des épis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
