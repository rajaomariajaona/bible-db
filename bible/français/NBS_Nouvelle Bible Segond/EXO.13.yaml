document_id: EXO.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordres concernant les premiers-nés d'Israël
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'temps fixé  : le terme hébreu peut aussi désigner la fête elle-même ou rencontre festive  ; cf. Gn 1.14n  ; Lv 23.2n. –  chaque année  : litt. de jours en jours  ; cf. Jg 11.40n  ; 21.19 ; 1S 1.3 ; 2.19.'
  - type: text
    content: Tu observeras cette prescription en son temps fixé, chaque année.
  '11':
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''aura fait entrer dans le pays des Cananéens, comme il te l''a juré à toi et à tes pères, et qu''il te l''aura donné, '
  '12':
  - type: note
    content: 'tu feras passer  : sur l''expression correspondante, de sens habituellement sacrificiel, cf. Lv 18.21 ; 2R 16.3 ; Jr 32.35 ; Ez 20.25s,31 ; 23.37. –  né le premier… v. 2n,13,15 ; cf. 22.28s ; 34.19 ; Nb 3.11-13 ; 18.15-18 ; Dt 15.19-23 ; Lc 2.23.'
  - type: text
    content: 'tu feras passer pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tout enfant né le premier de sa mère, ainsi que toute première portée de tes bêtes : les mâles appartiennent au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'L''âne est un animal impur selon les critères de Lv 11.3 (voir pur, impur) : il ne peut être offert en sacrifice avec effusion de sang. Cf. Nb 18.15. –  dégageras  : le même verbe hébreu a aussi été traduit par libérer, cf. Dt 7.8n. –  un mouton ou une chèvre 12.3n. –  premier-né humain  : cf. Gn 22.12s.'
  - type: text
    content: 'Tu dégageras tout ânon né le premier de sa mère en le remplaçant par un mouton ou une chèvre ; et si tu ne le dégages pas, tu lui briseras la nuque. Tu dégageras aussi tout premier-né humain parmi tes fils. '
  '14':
  - type: note
    content: ton fils… 10.2+. –  maison des esclaves v. 3n.
  - type: text
    content: 'Lorsque demain ton fils te demandera : « Que signifie cela ? », tu lui répondras : « A la force de la main, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a fait sortir de l''Egypte, de la maison des esclaves ; '
  '15':
  - type: note
    content: 'refusait obstinément  : litt. endurcit, cf. 7.3n.'
  - type: text
    content: 'comme le pharaon refusait obstinément de nous laisser partir, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a tué tous les premiers-nés en Egypte, depuis les premiers-nés des humains jusqu''aux premiers-nés des bêtes. Voilà pourquoi j''offre en sacrifice au '
  - type: text
    content: Seigneur
  - type: text
    content: ' tout mâle né le premier de sa mère, et je dégage tout premier-né parmi mes fils. » '
  '16':
  - type: note
    content: 'un fronteau  : traduction incertaine (aussi Dt 6.8 ; 11.18). Bien que la tradition juive rapporte le terme hébreu correspondant (toujours au pluriel dans le texte) aux phylactères que les juifs orthodoxes portent au front ou sur la main (Dt 6.8n  ; Mt 23.5), dans le présent contexte il s''agit de toute évidence d''un emploi figuré (cf. Pr 1.9 ; 3.21s ; 4.4,9 ; 6.21s ; voir aussi Es 49.18) ; celui-ci peut se référer au nom d''un ornement ou d''une amulette porté sur le front, mais ce n''est pas forcément le cas (cf. les équivalents plutôt abstraits signe et rappel au v. 9).'
  - type: text
    content: 'Ce sera un signe sur ta main et un fronteau entre tes yeux ; car c''est à la force de la main que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a fait sortir d''Egypte.'
  - type: heading
    content: Dieu conduit la marche de son peuple
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Philistins Gn 10.14n. –  avoir du regret  : autre traduction changer d''avis  ; le verbe hébreu fait assonance avec celui qui est traduit par conduisit.'
  - type: text
    content: 'Lorsque le pharaon laissa partir le peuple, Dieu ne le conduisit pas par le chemin du pays des Philistins, qui était pourtant le plus proche ; car Dieu disait : Le peuple pourrait avoir du regret en voyant la guerre et retourner en Egypte. '
  '18':
  - type: note
    content: 'mer des Joncs (cf. 2.3n  ; 10.19) : l''expression correspondante, qui en est venue à désigner la partie de la mer Rouge proche du golfe d''Aqaba ou d''Eilath (1R 9.26), a pu s''appliquer à l''origine à plusieurs zones marécageuses ; on a notamment pensé à un bras du lac Menzaleh, près de la frontière nord-est de l''Egypte, et même à l''embouchure du Yarqôn sur la Méditerranée. –  montèrent Gn 12.10n. –  en ordre de bataille  : traduction incertaine ; le terme hébreu semble apparenté à celui qui désigne le chiffre 5 ; certains pensent qu''il signifiait à l''origine en cinq armées (cf. Nb 2.2n  ; 32.17n), d''autres en groupes de cinquante hommes  ; il apparaît aussi en Jos 1.14 ; 4.12 ; Jg 7.11n.'
  - type: text
    content: Mais Dieu fit prendre au peuple le chemin du désert, par la mer des Joncs. Les Israélites montèrent d'Egypte en ordre de bataille.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Gn 50.25n. –  aux fils d'Israël ou aux Israélites , cf. Gn 42.5n.
  - type: text
    content: 'Moïse prit avec lui les ossements de Joseph ; car Joseph avait fait prêter serment aux fils d''Israël, en disant : Quand Dieu interviendra en votre faveur, vous emporterez d''ici mes ossements avec vous.'
  '2':
  - type: note
    content: 'quiconque est né le premier de sa mère  : litt. quiconque a fendu la matrice, de même au v. 12+ ; cf. Gn 22.'
  - type: text
    content: Consacre-moi tout premier-né, tant des humains que des bêtes, quiconque est né le premier de sa mère chez les Israélites ; il m'appartient.
  '20':
  - type: text
    content: ' '
  - type: note
    content: partirent 12.37n. –  Soukkoth 12.37+. Cf. Nb 33.5-7.
  - type: text
    content: 'Ils partirent de Soukkoth et campèrent à Etam, à l''extrémité du désert. '
  '21':
  - type: note
    content: 'Le Seigneur marchait (ou allait) … Es 52.12 ; 60.19 ; cf. Jn 10.4. –  nuée 16.10 ; 19.9 ; 33.9 ; 40.34-38 ; Lv 16.2,13 ; Nb 9.15 ; 1R 8.10 ; Ez 30.3 ; Ps 18.10 ; 97.2 ; Jb 26.8s ; cf. Mt 17.5. – Sur la colonne de nuée et de feu, voir aussi Dt 1.33 ; Es 4.5 ; Ps 78.14 ; 105.39 ; Né 9.12,19 ; Jn 8.12 ; cf. Sagesse 10.17 : « Elle (la Sagesse) les conduisit par une route étonnante et elle devint pour eux un abri durant le jour, un flamboiement d''étoiles pendant la nuit. » 18.3 : « Au lieu des ténèbres (cf. Ex 10.21-23), tu as donné aux tiens une colonne flamboyante, guide pour un itinéraire inconnu et soleil inoffensif pour une glorieuse migration. »'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' marchait devant eux, le jour dans une colonne de nuée pour les conduire sur le chemin et la nuit dans une colonne de feu pour les éclairer, afin qu''ils puissent marcher de jour comme de nuit. '
  '22':
  - type: note
    content: 'se retirait  : le verbe est traduit par bouger en 33.11 ; Nb 14.44.'
  - type: text
    content: La colonne de nuée ne se retirait pas de devant le peuple pendant le jour, ni la colonne de feu pendant la nuit.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'maison des esclaves (ou de l''esclavage ) : de même au v. 14 ; voir aussi 20.2 ; Dt 5.6+ ; Jos 24.17 ; Jg 6.8 ; Jr 34.13 ; Mi 6.4. –  rien de levé v. 7 ; 12.15+.'
  - type: text
    content: 'Moïse dit au peuple : Souvenez-vous de ce jour où vous êtes sortis de l''Egypte, de la maison des esclaves ; car c''est à la force de la main que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous en a fait sortir. On ne mangera rien de levé. '
  '4':
  - type: note
    content: 'épis  : hébreu ’aviv  ; autre traduction au mois d''Abib, même terme en 9.31 ; 23.15 ; 34.18 ; cf. 12.2n  ; Dt 16.1.'
  - type: text
    content: 'Vous sortez aujourd''hui, au mois des épis. '
  '5':
  - type: note
    content: '3.8n. –  tu accompliras ce rite  : litt. tu serviras ce service, verbe et complément apparentés en hébreu (cf. 12.25n, autre verbe) ; le texte est écrit en vue d''une célébration religieuse ; cf. Nb 1.53+ ; 3.7n.'
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''aura fait entrer dans le pays des Cananéens, des Hittites, des Amorites, des Hivvites et des Jébusites, ce pays ruisselant de lait et de miel qu''il a juré à tes pères de te donner, tu accompliras ce rite ce même mois. '
  '6':
  - type: note
    content: pains sans levain 12.15+ ; voir calendrier et fêtes.
  - type: text
    content: 'Pendant sept jours, tu mangeras des pains sans levain ; et le septième jour, il y aura une fête pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: text
    content: On mangera des pains sans levain pendant les sept jours ; on ne devra voir chez toi rien de levé, on ne devra pas voir chez toi de levain, dans tout ton territoire.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'fils 10.2+. –  C''est à cause…  : on pourrait aussi traduire  : c''est pour cela (soit à cause , soit en vue de cela ) que le Seigneur a agi en ma faveur . –  je suis sorti  : selon la tradition, tout juif doit se considérer comme étant personnellement sorti d''Egypte.'
  - type: text
    content: 'Ce jour-là tu diras à ton fils : « C''est à cause de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait pour moi lorsque je suis sorti d''Egypte. » '
  '9':
  - type: note
    content: 'signe… v. 16 ; cf. Dt 6.8ns ; 11.18 ; Mt 23.5 (phylactères). –  un rappel  : autre traduction une évocation, cf. 12.14n. –  la loi… dans ta bouche Dt 30.14.'
  - type: text
    content: 'Ce sera pour toi un signe sur ta main et un rappel entre tes yeux, de sorte que la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit dans ta bouche ; car c''est d''une main forte que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a fait sortir d''Egypte. '
