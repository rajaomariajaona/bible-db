document_id: ISA.41,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vrai Dieu et les idoles
  - type: text
    content: ' '
  - type: note
    content: 'Iles 11.11+ ; 40.15. –  pour m''écouter  : litt. vers moi. –  renouvellent leur force 40.31. –  Comparaissons  : le même verbe est traduit par s''approcher au v. 5 et par présenter au v. 21. –  jugement v. 21-24 ; 3.13 ; 43.9-13,26 ; 44.7s.'
  - type: text
    content: Iles, faites silence pour m'écouter !
  - type: text
    content: Que les peuples renouvellent leur force,
  - type: text
    content: qu'ils s'avancent et qu'ils parlent !
  - type: text
    content: Comparaissons ensemble au jugement.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'N''aie pas peur v. 13 ; 37.6+ ; 43.1 ; 44.2 ; 54.4. –  je suis avec toi 7.14+ ; cf. Ex 3.12. –  ne jette pas des regards inquiets  : le même verbe est traduit par voir au v. 23n. –  ma main droite victorieuse  : litt. la (main) droite de ma justice (cf. v. 2n).'
  - type: text
    content: N'aie pas peur,
  - type: text
    content: car je suis avec toi ;
  - type: text
    content: ne jette pas des regards inquiets,
  - type: text
    content: car je suis ton Dieu ;
  - type: text
    content: je te rends fort,
  - type: text
    content: je viens à ton secours,
  - type: text
    content: je te soutiens de ma main droite victorieuse.
  '11':
  - type: text
    content: ' '
  - type: note
    content: honteux / confus 42.17 ; 45.16s ; 54.4. –  ceux qui te cherchent querelle ou ceux qui t'accusent  ; cf. 49.25n  ; voir aussi Jr 15.10 ; Jb 31.35n.
  - type: text
    content: Ils seront honteux et confus,
  - type: text
    content: tous ceux qui sont fâchés contre toi ;
  - type: text
    content: ils seront réduits à rien, ils disparaîtront,
  - type: text
    content: ceux qui te cherchent querelle.
  '12':
  - type: text
    content: ' '
  - type: note
    content: tes adversaires ou ceux qui t'en veulent.
  - type: text
    content: Tu les chercheras et tu ne les trouveras plus,
  - type: text
    content: tes adversaires ;
  - type: text
    content: ils seront réduits à rien, au néant,
  - type: text
    content: ceux qui te faisaient la guerre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: V. 10.
  - type: text
    content: 'Car je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu,'
  - type: text
    content: celui qui saisit ta main droite,
  - type: text
    content: 'qui te dit : N''aie pas peur,'
  - type: text
    content: je viens à ton secours.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Jacob…  : litt. ver de Jacob  ; on pourrait aussi comprendre Jacob qui n''es plus que vers  ; cf. 14.11 ; 66.24 ; Ex 16.20 ; Dt 28.39 ; Jon 4.7 ; Ps 22.7 ; Jb 25.6. –  Israël…  : on lit, litt. larve d''Israël , avec une légère modification du texte hébreu traditionnel qui porte hommes d''Israël  ; d''autres modifient le texte différemment, de façon à lire morts d''Israël ou vermine d''Israël (c.-à-d. Israël couvert de vermine), comme en 14.11. –  ton rédempteur ou celui qui te rédime, celui qui te reprend , voire celui qui te libère  ; cf. 35.9n  ; de même en 43.14 ; 44.6,24 ; 47.4 ; 48.17 ; 49.7,26 ; 54.5,8 ; 59.20 ; 60.16 ; 63.16 ; sur la signification de la rédemption suggérée par ce terme, cf. Ex 6.6+. –  Saint d''Israël 1.4n.'
  - type: text
    content: N'aie pas peur, Jacob, toi qui n'es plus qu'un ver,
  - type: text
    content: Israël, toi qui es une larve ;
  - type: text
    content: je viens à ton secours,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: moi, ton rédempteur, le Saint d'Israël.
  '15':
  - type: text
    content: ' '
  - type: note
    content: herse 28.27+.
  - type: text
    content: J'ai fait de toi
  - type: text
    content: une herse aiguisée, toute neuve,
  - type: text
    content: garnie de pointes ;
  - type: text
    content: tu écraseras, tu broieras les montagnes
  - type: text
    content: et tu rendras les collines semblables à de la menue paille,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'tu les vanneras  : autre traduction tu les dissémineras (même verbe en 30.22,24n  ; Jr 4.11n) ; cf. Mt 3.12. –  tu mettras ta fierté  : litt. tu te loueras , de même en 45.25 ; cf. Ps 34.3 ; 105.3.'
  - type: text
    content: tu les vanneras,
  - type: text
    content: le vent les emportera,
  - type: text
    content: et une tempête les dispersera.
  - type: text
    content: 'Mais toi, tu te réjouiras dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: tu mettras ta fierté dans le Saint d'Israël.
  '17':
  - type: text
    content: Les pauvres et les déshérités
  - type: text
    content: cherchent de l'eau, et il n'y en a pas ;
  - type: text
    content: leur langue est desséchée par la soif.
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je leur répondrai ;'
  - type: text
    content: moi, le Dieu d'Israël, je ne les abandonnerai pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 35.6-7+ ; Ps 107.35. –  le long des pistes où passent les caravanes, dans le désert  ; autre traduction possible sur les crêtes dénudées  ; cf. 49.9 ; Nb 23.3n  ; Jr 3.2n.
  - type: text
    content: Je ferai jaillir des fleuves le long des pistes,
  - type: text
    content: des sources au milieu des vallées ;
  - type: text
    content: je changerai le désert en étang
  - type: text
    content: et la terre desséchée en sources ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'plaine aride  : hébreu ‘arava  ; cf. 33.9n.'
  - type: text
    content: je mettrai dans le désert le cèdre, l'acacia,
  - type: text
    content: le myrte et l'olivier ;
  - type: text
    content: je placerai dans la plaine aride
  - type: text
    content: le cyprès, l'orme et le buis, tous ensemble ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'suscité  : litt. éveillé  ; cf. v. 25 ; 10.26n  ; 13.17 ; 45.13. –  justice…  : le terme hébreu peut aussi avoir le sens de victoire  ; cf. v. 10,25 ; 44.28 ; 45.1-5,8,13,24s ; 46.13 ; 51.5ss ; 54.17. –  sur ses pas  : cf. Gn 30.30n. –  Son épée…  : certains traduisent  : qui rend son épée (multiple) comme la poussière (cf. Gn 13.16) et son arc (c.-à-d. ses flèches ) comme le chaume… (voir cependant 40.24). Ou encore, d''après LXX  : Il réduit leur épée en poussière, leur arc en un chaume…'
  - type: text
    content: Qui a suscité de l'orient
  - type: text
    content: celui que la justice appelle sur ses pas ?
  - type: text
    content: Qui lui a livré des nations
  - type: text
    content: et abaissé des rois ?
  - type: text
    content: Son épée les réduit en poussière,
  - type: text
    content: son arc fait d'eux du chaume que le vent emporte.
  '20':
  - type: text
    content: ' '
  - type: note
    content: qu'ils voient… sachent… 49.23+. –  Saint d'Israël 1.4+.
  - type: text
    content: afin qu'ils voient et qu'ils sachent,
  - type: text
    content: qu'ils observent et comprennent tous ensemble
  - type: text
    content: 'que c''est la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui a fait tout cela,'
  - type: text
    content: que c'est le Saint d'Israël qui l'a créé.
  - type: heading
    content: Les faux dieux pris en défaut
  '21':
  - type: text
    content: ' '
  - type: note
    content: cause / preuves v. 1. –  roi 43.15 ; 44.6. –  Jacob v. 8,14.
  - type: text
    content: Présentez votre cause,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: produisez vos preuves,
  - type: text
    content: dit le roi de Jacob.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'qu''ils nous annoncent v. 2 ; 42.9 ; 43.9,12 ; 44.7s ; 48.3. –  Le passé  : autre traduction les premiers événements 42.9 ; 43.9,18 ; 46.9 ; 48.3 ; 65.16s. –  nous y réfléchirons  : litt. nous y mettrons nos cœurs  ; cf. 42.25n  ; 57.1,11.'
  - type: text
    content: Qu'ils les produisent.
  - type: text
    content: Et qu'ils nous annoncent
  - type: text
    content: ce qui doit arriver.
  - type: text
    content: Le passé,
  - type: text
    content: dites-nous ce qu'il a été,
  - type: text
    content: et nous y réfléchirons
  - type: text
    content: pour en connaître la suite ;
  - type: text
    content: ou bien, faites-nous entendre l'avenir.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'nous ouvrions les yeux  : même verbe que v. 10n, peut-être avec la même connotation d''inquiétude. Le verbe traduit par voyions pourrait aussi être lu craignions.'
  - type: text
    content: Annoncez ce qui est encore à venir,
  - type: text
    content: et nous saurons que vous êtes des dieux ;
  - type: text
    content: faites seulement quelque chose de bien ou de mal,
  - type: text
    content: pour que nous ouvrions les yeux
  - type: text
    content: et que nous le voyions tous ensemble.
  '24':
  - type: text
    content: ' '
  - type: note
    content: abomination 44.19+.
  - type: text
    content: Vous êtes moins que rien,
  - type: text
    content: et votre action est moins connue que le néant ;
  - type: text
    content: c'est une abomination que de vous choisir.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'suscité… v. 2n. –  il invoque mon nom  : certains, s''appuyant sur LXX d''une part et sur un ms de Qumrân d''autre part, modifient le texte hébreu traditionnel pour lire il s''entend appeler par son nom (cf. 45.3,4). –  il piétine  : sens obtenu par modification du texte hébreu traditionnel, qui porte il vient.'
  - type: text
    content: Je l'ai suscité du nord,
  - type: text
    content: et il est venu. Depuis le levant,
  - type: text
    content: il invoque mon nom ;
  - type: text
    content: il piétine les dirigeants comme de la boue,
  - type: text
    content: comme de l'argile que foule un potier.
  '26':
  - type: text
    content: ' '
  - type: note
    content: annoncé v. 22+. –  dès le commencement 40.21+.
  - type: text
    content: Qui l'a annoncé dès le commencement,
  - type: text
    content: pour que nous le sachions
  - type: text
    content: – longtemps à l'avance,
  - type: text
    content: 'pour que nous disions : C''est juste !'
  - type: text
    content: Personne ne l'annonce,
  - type: text
    content: personne ne le fait entendre,
  - type: text
    content: et personne n'entend vos paroles.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le premier arrivé…  : traduction incertaine ; certains identifient Dieu au premier (cf. v. 4) et modifient le texte hébreu traditionnel pour lire voici à Sion celui qui, le premier, a parlé. –  porteur de bonne nouvelle  : cf. 40.9n.'
  - type: text
    content: 'Le premier arrivé à Sion dit :'
  - type: text
    content: Ils sont là !
  - type: text
    content: A Jérusalem, je donne un porteur de bonne nouvelle.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'personne  : litt. pas d''homme  ; cf. 47.3n  ; 50.2 ; 59.16 ; 63.5 ; 66.4 ; Ec 7.28. –  qui puisse donner un conseil 40.13.'
  - type: text
    content: Je regarde, et il n'y a personne,
  - type: text
    content: 'personne parmi eux qui puisse donner un conseil :'
  - type: text
    content: je les aurais interrogés, et ils m'auraient répondu !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'rien  : c''est clairement le sens d''après un ms de Qumrân et Syr, qui ont ici le même mot qu''au v. 24 ; le texte hébreu traditionnel pourrait aussi se traduire  : ils sont tous malfaisants (d''un terme généralement traduit par mal , cf. 1.13+) ; voir cependant Am 5.5n  ; Za 10.2n. –  souffle (ou vent ) et chaos (24.10n) : cf. Gn 1.2n.'
  - type: text
    content: Eux tous ne sont rien,
  - type: text
    content: leurs œuvres ne sont que néant ;
  - type: text
    content: leurs idoles, souffle et chaos.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'victorieux ou sain et sauf , litt. (en) paix. –  que ses pieds…  : litt. avec ses pieds il n''entre pas  ; d''où autre traduction que ses pieds ne touchent pas (cf. Dn 8.5).'
  - type: text
    content: Il les poursuit, il passe, victorieux,
  - type: text
    content: sur un sentier que ses pieds n'avaient jamais foulé.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'qui convoque  : litt. qui appelle (à la vie), cf. 40.26. –  dès le commencement 40.21+. –  premier… v. 27n  ; 44.6 ; 48.12 ; Ap 1.17 ; 22.13. –  c''est encore moi ( encore étant sous-entendu dans le texte) : litt. moi, lui ou c''est moi qui suis lui , ce qui peut signifier c''est moi, je suis moi ou je suis le même  ; formules analogues 43.10,13,25 ; 46.4 ; 48.12 ; 52.6 (voir aussi 37.16 ; 43.11 ; 48.15 ; 51.12) ; Dt 32.39n  ; Ps 102.28n  ; LXX a traduit moi, je suis , comme en Jn 8.24n  ; cf. Ex 3.14n.'
  - type: text
    content: Qui a agi, qui a fait ?
  - type: text
    content: C'est celui qui convoque
  - type: text
    content: les générations dès le commencement.
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je suis le premier,'
  - type: text
    content: et, avec les derniers, c'est encore moi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'îles v. 1. –  Tous s''approchent  : litt. ils s''approchent ou ils se présentent.'
  - type: text
    content: Les îles le voient, elles ont peur.
  - type: text
    content: Les extrémités de la terre tremblent.
  - type: text
    content: Tous s'approchent, ils viennent.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Sois fort ! une forme du verbe correspondant est traduit par encourager, fixer au v. 7, et une autre forme encore par saisir aux v. 9,13.
  - type: text
    content: Ils s'entraident,
  - type: text
    content: 'et chacun dit à son frère : Sois fort !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: '40.19+,20. –  marteau  : autre terme en 44.12. –  l''idole  : sous-entendu dans le texte.'
  - type: text
    content: L'artisan encourage le fondeur ;
  - type: text
    content: celui qui polit au marteau
  - type: text
    content: encourage celui qui frappe sur l'enclume ;
  - type: text
    content: 'il dit de la soudure : Elle est bonne !'
  - type: text
    content: Et il fixe l'idole avec des clous,
  - type: text
    content: pour qu'elle ne vacille pas.
  - type: heading
    content: N'aie pas peur, je viens à ton secours
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Israël, mon serviteur v. 9 ; 43.10 ; 44.1s,21 ; 45.4 ; 48.20 ; voir aussi 42.1+ ; cf. Jr 30.10 ; Ps 136.22 ; Lc 1.54. –  descendance d''Abraham 51.2 ; Mt 3.9/ / ; Hé 2.16. –  mon ami  : litt. celui qui m''aime. LXX mon bien-aimé. Cf. 2Ch 20.7 ; Jc 2.23.'
  - type: text
    content: Mais toi, Israël, mon serviteur,
  - type: text
    content: Jacob, que j'ai choisi,
  - type: text
    content: descendance d'Abraham, mon ami !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'saisi v. 6n. –  de ses confins  : ou, d''après un autre sens du terme hébreu (qui signifie aussi angles, coins, jointures ), parmi ses nobles.'
  - type: text
    content: Toi, que j'ai saisi des extrémités de la terre
  - type: text
    content: et que j'ai appelé de ses confins,
  - type: text
    content: 'à qui j''ai dit :'
  - type: text
    content: Tu es mon serviteur,
  - type: text
    content: je te choisis
  - type: text
    content: et je ne te rejette pas !
