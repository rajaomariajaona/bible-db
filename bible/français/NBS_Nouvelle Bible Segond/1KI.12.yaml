document_id: 1KI.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'assemblée de Sichem
  - type: heading
    content: 2Ch 10.1-15
  - type: text
    content: ' '
  - type: note
    content: 'Sichem , lieu de rassemblement des tribus, Jos 20.7n  ; Jg 9.6 ; voir aussi Gn 33.18s. –  tout Israël  : aux v. 16,18,20 cette expression désigne plus particulièrement les dix tribus qui constitueront le royaume du Nord. Même sens en 2S 2.9 ; 4.1 ; 5.5 ; voir aussi Dt 1.1+.'
  - type: text
    content: 'Roboam se rendit à Sichem, car tout Israël était venu à Sichem pour l''investir de la royauté. '
  '10':
  - type: note
    content: 'joug pesant v. 4+. –  allège  : cf. v. 4+,9. –  Mon petit doigt…  : on a vu dans cette expression de type proverbial une métaphore sexuelle ; son rôle dans le récit est clair (v. 11) : Roboam sera un roi plus fort et plus dur que Salomon.'
  - type: text
    content: 'Les jeunes gens qui avaient grandi avec lui lui dirent : Tu parleras ainsi à ce peuple qui t''a tenu ce langage :'
  - type: text
    content: « Ton père a rendu notre joug pesant ;
  - type: text
    content: toi, allège-le-nous ! »
  - type: text
    content: 'Tu leur parleras ainsi :'
  - type: text
    content: « Mon petit doigt est plus gros que les reins de mon père.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Mon père…  : cf. v. 14. –  joug pesant v. 4+. –  fouets  : de même au v. 14. Cf. Es 10.26 ; Na 3.2 ; Pr 26.3. –  scorpions  : de même au v. 14 ; probablement des fouets dont les lanières étaient munies de pointes.'
  - type: text
    content: Mon père vous a imposé un joug pesant ?
  - type: text
    content: Moi, j'alourdirai encore votre joug !
  - type: text
    content: Mon père vous a corrigés avec des fouets ?
  - type: text
    content: Moi, je vous corrigerai avec des “scorpions” ! »
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Jéroboam et tout le peuple…  : LXX n''a ici que la mention du peuple. –  le troisième jour et dans trois jours traduisent la même formule en hébreu ; cf. v. 5.'
  - type: text
    content: 'Jéroboam et tout le peuple se présentèrent à Roboam le troisième jour, suivant ce qu''avait dit le roi : « Revenez me voir dans trois jours. » '
  '13':
  - type: text
    content: 'Le roi répondit avec dureté au peuple. Il ne tint pas compte du conseil que lui avaient donné les anciens, '
  '14':
  - type: note
    content: 'Cf. Ex 4.21n  ; 7.13ss. –  Mon père a rendu…  : cf. v. 11+. –  joug pesant v. 4+. –  fouets / « scorpions » v. 11n.'
  - type: text
    content: 'et il leur parla ainsi, d''après le conseil des jeunes gens :'
  - type: text
    content: Mon père a rendu votre joug pesant ?
  - type: text
    content: Moi, j'alourdirai encore votre joug !
  - type: text
    content: Mon père vous a corrigés avec des fouets ?
  - type: text
    content: Moi, je vous corrigerai avec des « scorpions » !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'V. 24. –  par l''intermédiaire d''Ahiya  : cf. 11.29n-39. –  Silo 11.29+.'
  - type: text
    content: 'Le roi n''écouta pas le peuple ; la tournure prise par les événements venait du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour réaliser la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite par l''intermédiaire d''Ahiya de Silo à Jéroboam, fils de Nebath.'
  - type: heading
    content: Division du royaume d'Israël
  - type: heading
    content: 2Ch 10.16-19
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'tout Israël  : cf. v. 1n. –  Quelle part avons-nous  : cf. 2S 20.1n. –  le fils de Jessé  : David , cf. 1S 16. –  A tes tentes  : c.-à-d. rentrez chez vous  ; cf. 8.66n  ; c''est ici un cri de révolte et de sécession (cf. 2S 20.1). –  regarde ta maison  : autres traductions occupe-toi de ta maison ; subviens aux besoins de ta maison.'
  - type: text
    content: 'Lorsque tout Israël vit que le roi ne l''écoutait pas, le peuple fit répondre au roi :'
  - type: text
    content: Quelle part avons-nous avec David ?
  - type: text
    content: Nous n'avons pas de patrimoine avec le fils de Jessé !
  - type: text
    content: A tes tentes, Israël !
  - type: text
    content: Maintenant, regarde ta maison, David !
  - type: text
    content: Et Israël s'en alla à ses tentes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Israélites  : désigne ici les ressortissants des tribus du nord demeurant sur le territoire de Juda. –  régna  : autre traduction devint roi.'
  - type: text
    content: Quant aux Israélites qui habitaient les villes de Juda, Roboam régna sur eux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Adoram 4.6n. –  tout Israël v. 1n  ; 2Ch 10.18 les Israélites . –  lapida  : cf. Lv 20.27 ; Nb 14.10 ; Dt 21.21 ; voir aussi Ex 8.22 ; 17.4 ; 19.13 ; Dt 13.11 ; 17.5 ; 22.21,24 etc. –  réussit à ou fut obligé  : traduction difficile ; on pourrait aussi comprendre  : monta en toute hâte sur un char ou monta à grand-peine sur un char.'
  - type: text
    content: 'Alors le roi Roboam envoya Adoram, qui était intendant des corvées. Mais tout Israël le lapida, et il mourut. Le roi Roboam réussit à monter sur un char pour s''enfuir à Jérusalem. '
  '19':
  - type: note
    content: 'révolté  : c''est le point de vue de la tribu du sud. Cf. v. 20.'
  - type: text
    content: C'est ainsi qu'Israël s'est révolté contre la maison de David, jusqu'à ce jour.
  '2':
  - type: note
    content: 'Jéroboam, fils de Nebath 11.26n. –  Egypte, où il s''était enfui 11.40. –  Jéroboam habitait en Egypte  : certains témoins de LXX et Vg ont lu ici le même texte qu''en 2Ch 10.2 (Jéroboam revint d''Egypte).'
  - type: text
    content: 'Lorsque Jéroboam, fils de Nebath, l''apprit, il était encore en Egypte, où il s''était enfui pour échapper au roi Salomon – Jéroboam habitait en Egypte. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Tout Israël v. 1n. –  était de retour  : cf. v. 2. –  que la tribu de Juda, elle seule  : LXX ajoute et de Benjamin . Cf. v. 21,23 ; 11.32n.'
  - type: text
    content: Tout Israël ayant appris que Jéroboam était de retour, ils le convoquèrent devant la communauté et l'investirent de la royauté sur tout Israël. Il n'y eut que la tribu de Juda, elle seule, pour suivre la maison de David.
  - type: heading
    content: 2Ch 11.1-4
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'cent quatre-vingt mille  : LXX porte ici cent vint mille . –  de ramener le royaume…  : autre traduction de restaurer la royauté de Roboam.'
  - type: text
    content: 'Roboam, arrivé à Jérusalem, rassembla toute la maison de Juda et la tribu de Benjamin, cent quatre-vingt mille guerriers d''élite, pour qu''ils combattent la maison d''Israël, afin de ramener le royaume sous l''autorité de Roboam, fils de Salomon. '
  '22':
  - type: note
    content: 'Shemaya (« Yah [YHWH] a entendu ») 2Ch 12.5ss. –  l''homme de Dieu  : cf. 13.1 ; 17.24 ; 1S 2.27 ; 9.6-8 ; 2R 1.9 ; voir aussi 1Tm 6.11+. Sur le rôle d’intercesseur de l’homme de Dieu, voir aussi Ex 32.11 ; 1S 7.5 ; 12.19 ; Es 53.12 ; Jr 7.16 ; 37.3.'
  - type: text
    content: 'Mais la parole de Dieu parvint à Shemaya, l''homme de Dieu : '
  '23':
  - type: text
    content: 'Dis à Roboam, fils de Salomon, roi de Juda, et à toute la maison de Juda et de Benjamin, ainsi qu''au reste du peuple : '
  '24':
  - type: note
    content: 'Vous ne vous mettrez pas en campagne…  : comparer avec 14.30 ; 15.6. –  c''est de moi que…  : cf. v. 15. –  conformément…  : litt. pour marcher (cf. 2Ch 11.4) selon la parole de YHWH. – A partir d''ici LXX ajoute 24 versets. Voir « Le schisme selon une variante grecque »♦.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Vous ne vous mettrez pas en campagne, vous ne ferez pas la guerre à vos frères, les Israélites ! Que chacun de vous rentre chez lui, car c''est de moi que cela vient. Ils écoutèrent la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils s''en retournèrent, conformément à la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Le péché de Jéroboam
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Jéroboam bâtit Sichem  : on doit sans doute comprendre qu''il entreprend des constructions nouvelles, car la ville existe déjà (v. 1n) ; cf. 15.17n. –  Penouel ou Peniel (Gn 32.31ns).'
  - type: text
    content: Jéroboam bâtit Sichem dans la région montagneuse d'Ephraïm et il y habita ; puis il en sortit et bâtit Penouel.
  '26':
  - type: text
    content: 'Jéroboam se dit : Maintenant le royaume pourrait bien revenir à la maison de David, '
  '27':
  - type: note
    content: 'et reviendront à Roboam…  : la fin du v. est omise par LXX.'
  - type: text
    content: 'si ce peuple monte à Jérusalem pour faire des sacrifices dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Le cœur de ce peuple reviendra à son seigneur, à Roboam, roi de Juda ; ils me tueront et reviendront à Roboam, roi de Juda. '
  '28':
  - type: note
    content: 'et dit au peuple  : litt. et leur dit. –  Voici tes dieux, Israël… ou voici ton Dieu, Israël, celui qui t''a fait monter d''Egypte (Gn 12.10n) : cf. Ex 32.4n,8 ; Né 9.18.'
  - type: text
    content: 'Après avoir pris conseil, le roi fit deux taurillons d''or et dit au peuple : Vous êtes assez montés à Jérusalem ! Voici tes dieux, Israël, ceux qui t''ont fait monter d''Egypte ! '
  '29':
  - type: note
    content: 'à Beth-El / à Dan  : aux extrémités sud et nord du nouveau royaume.'
  - type: text
    content: 'Il en plaça un à Beth-El et il mit l''autre à Dan. '
  '3':
  - type: note
    content: Le début du v. est absent de certains mss grecs qui portent simplement le peuple dit au roi Roboam.
  - type: text
    content: 'On le fit appeler. Alors Jéroboam et toute l''assemblée d''Israël arrivèrent et dirent à Roboam : '
  '30':
  - type: note
    content: Voir péché. Sur la faute de Jéroboam, comparer Dt 5.8 et 12.2ss.
  - type: text
    content: 'Ce fut là un péché. Le peuple alla devant l''un d''eux jusqu''à Dan. '
  '31':
  - type: note
    content: 'de haut lieu  : litt. de hauts lieux  ; certains modifient le texte hébreu traditionnel pour lire des maisons de hauts lieux (cf. v. 32 ; 2R 17.29n,32). –  nomma prêtre n''importe qui  : litt. fit des prêtres des extrémités du peuple, même expression en 13.33 ; cf. Nb 3.5-12 ; Dt 18.5.'
  - type: text
    content: Jéroboam fit une maison de haut lieu et nomma prêtre n'importe qui, même ceux qui n'étaient pas des fils de Lévi.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'comme la fête…  : il s''agit de la fête des Huttes, qui se célèbre un mois plus tôt ; cf. 8.2n.'
  - type: text
    content: 'Jéroboam fit une fête le quinzième jour du huitième mois, comme la fête qu''on célébrait en Juda, et il monta à l''autel. C''est ainsi qu''il agit à Beth-El, en sacrifiant aux taurillons qu''il avait faits. Il installa à Beth-El les prêtres des hauts lieux qu''il avait faits. '
  '33':
  - type: note
    content: 'Beth-El  : absent de LXX. –  qu''il avait choisi  : litt. qu''il avait inventé, cf. Né 6.8n. –  de sa propre initiative  : litt. de son cœur, autre lecture traditionnelle tout seul, à part, séparément  ; cf. Dt 16.'
  - type: text
    content: Il monta à l'autel qu'il avait fait à Beth-El, le quinzième jour du huitième mois, mois qu'il avait choisi de sa propre initiative. Il fit une fête pour les Israélites et monta à l'autel pour offrir de l'encens.
  '4':
  - type: note
    content: 'allège…  : cf. v. 9s. –  dur esclavage  : cf. Ex 1.14 ; 2.23 ; Dt 26.6 ; Es 14.3 ; Lm 1.3. –  joug pesant  : cf. v. 10s,14 ; Es 9.3 ; 10.27 ; 14.25 ; 47.6 ; Jr 27.8,11 ; voir aussi 1S 8.11-18 ; 1R 5.27ss ; 11.28.'
  - type: text
    content: 'Ton père a rendu notre joug bien dur ; toi, maintenant, allège le dur esclavage que ton père nous a imposé et le joug pesant qu''il a mis sur nous, et nous te servirons. '
  '5':
  - type: note
    content: 'dans trois jours  : cf. v. 12n. –  Le peuple  : est absent de LXX (ils s''en allèrent).'
  - type: text
    content: 'Il leur dit : Allez, et revenez me voir dans trois jours. Le peuple s''en alla.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'qui s''étaient tenus au service de  : litt. qui s''étaient tenus devant , cf. v. 8 ; 10.8n.'
  - type: text
    content: 'Le roi Roboam prit conseil des anciens qui s''étaient tenus au service de Salomon, son père, pendant sa vie, et il dit : Que conseillez-vous de répondre à ce peuple ? '
  '7':
  - type: note
    content: 'si tu leur réponds bien  : omis par LXX ; autre traduction si tu leur réponds par de bonnes paroles. –  pour toujours  : litt. tous les jours.'
  - type: text
    content: 'Ils lui dirent : Si aujourd''hui tu te fais le serviteur de ce peuple, si tu te mets à leur service, si tu leur réponds bien, ils seront pour toujours tes serviteurs. '
  '8':
  - type: note
    content: 'jeunes gens  : le terme hébreu correspondant est celui qui est habituellement traduit par enfants, de même dans la suite. –  qui se tenaient à son service  : cf. v. 6.'
  - type: text
    content: 'Mais Roboam ne tint pas compte du conseil que lui donnaient les anciens ; il prit conseil des jeunes gens qui avaient grandi avec lui et qui se tenaient à son service. '
  '9':
  - type: note
    content: 'Allège…  : cf. v. 4+,10.'
  - type: text
    content: 'Il leur dit : Que conseillez-vous de répondre à ce peuple qui me tient ce langage : « Allège le joug que ton père a mis sur nous. » '
