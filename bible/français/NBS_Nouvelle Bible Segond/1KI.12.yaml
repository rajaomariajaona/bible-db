      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : aux v. 16,18,20 cette expression désigne plus particulièrement les dix tribus qui constitueront le royaume du Nord. Même sens en 2S 2.9 ; 4.1 ; 5.5 ; voir aussi Dt 1.1+.'
      marker-yv: yv-n
    - type: text
      text: 'Roboam se rendit à Sichem, car tout Israël était venu à Sichem pour l''investir de la royauté. '
  '10':
