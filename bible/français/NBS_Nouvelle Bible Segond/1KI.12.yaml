        - type: text
          text: pour toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les jours.
      marker-yv: yv-n
    - type: text
      text: 'Ils lui dirent : Si aujourd''hui tu te fais le serviteur de ce peuple, si tu te mets à leur service, si tu leur réponds bien, ils seront pour toujours tes serviteurs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jeunes gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant est celui qui est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui se tenaient à son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6.'
      marker-yv: yv-n
    - type: text
      text: 'Mais Roboam ne tint pas compte du conseil que lui donnaient les anciens ; il prit conseil des jeunes gens qui avaient grandi avec lui et qui se tenaient à son service. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Allège…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4+,10.'
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : Que conseillez-vous de répondre à ce peuple qui me tient ce langage : « Allège le joug que ton père a mis sur nous. » '
