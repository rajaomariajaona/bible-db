      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: allège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4+,9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mon petit doigt…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on a vu dans cette expression de type proverbial une métaphore sexuelle ; son rôle dans le récit est clair (v. 11) : Roboam sera un roi plus fort et plus dur que Salomon.'
      marker-yv: yv-n
    - type: text
      text: 'Les jeunes gens qui avaient grandi avec lui lui dirent : Tu parleras ainsi à ce peuple qui t''a tenu ce langage :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Ton père a rendu notre joug pesant ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, allège-le-nous ! »
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu leur parleras ainsi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: « Mon petit doigt est plus gros que les reins de mon père.
