      marker-yv: yv-n
    - type: text
      text: 'Lorsque tout Israël vit que le roi ne l''écoutait pas, le peuple fit répondre au roi :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle part avons-nous avec David ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous n'avons pas de patrimoine avec le fils de Jessé !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A tes tentes, Israël !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, regarde ta maison, David !
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Israël s'en alla à ses tentes.
