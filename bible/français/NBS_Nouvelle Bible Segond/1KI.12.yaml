      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : de même au v. 14 ; probablement des fouets dont les lanières étaient munies de pointes.'
      marker-yv: yv-n
    - type: text
      text: Mon père vous a imposé un joug pesant ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, j'alourdirai encore votre joug !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon père vous a corrigés avec des fouets ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je vous corrigerai avec des “scorpions” ! »
