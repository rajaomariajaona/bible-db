      marker-yv: yv-n
    - type: text
      text: 'Jéroboam et tout le peuple se présentèrent à Roboam le troisième jour, suivant ce qu''avait dit le roi : « Revenez me voir dans trois jours. » '
  '13':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Le roi répondit avec dureté au peuple. Il ne tint pas compte du conseil que lui avaient donné les anciens, '
