document_id: 1CO.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur, seul juge
  - type: text
    content: ' '
  - type: note
    content: 'serviteurs  : le mot grec (différent de celui qui apparaît en 3.5n) s''applique habituellement à de simples subordonnés (même terme en Lc 1.2 ; Ac 26.16) ; les intendants (le mot grec a donné économe , 9.17 ; Lc 12.42 ; 16.1-8 ; Tt 1.7 ; cf. Ep 3.2n), en revanche, étaient chargés de hautes responsabilités, même s''ils étaient esclaves (cf. 1Co 9.17n). –  mystères 2.1+,10.'
  - type: text
    content: 'Ainsi, qu''on nous considère comme des serviteurs du Christ et des intendants des mystères de Dieu. '
  '10':
  - type: note
    content: 'nous sommes fous  : cf. 3.18+ ; 2Co 5.13. –  avisés ou raisonnables, cf. 10.15 ; Mt 7.24n  ; 2Co 11.19 ; voir aussi Pr 3.7. – Voir gloire.'
  - type: text
    content: 'Nous, nous sommes fous à cause du Christ, mais vous, vous êtes avisés dans le Christ ; nous, nous sommes faibles, mais vous, vous êtes forts. Vous, vous êtes glorieux, mais nous, nous sommes déshonorés ! '
  '11':
  - type: note
    content: 2Co 4.8-12 ; 6.4-10 ; 7.5 ; 11.23-27 ; 12.10 ; cf. Mt 8.20/ /.
  - type: text
    content: 'Jusqu''à l''heure présente, nous sommes exposés à la faim, à la soif, au dénuement, aux coups, à une vie errante ; '
  '12':
  - type: note
    content: 'en travaillant de nos propres mains  : cf. 9.6-18 ; Ac 18.3 ; 20.34 ; Ep 4.28 ; 1Th 2.9 ; 2Th 3.8 ; 3Jn 7. –  nous bénissons  : cf. Mt 5.44+ ; Ac 7.60 ; Rm 12.14 ; voir aussi Ps 109.28.'
  - type: text
    content: 'nous nous donnons de la peine en travaillant de nos propres mains ; insultés, nous bénissons ; persécutés, nous supportons ; '
  '13':
  - type: note
    content: 'nous encourageons  : autres traductions nous exhortons, nous consolons, nous supplions  ; cf. v. 16 ; 1.10+ ; Rm 12.8n. –  déchets  : le mot grec ainsi traduit pouvait s''appliquer, entre autres, aux victimes expiatoires que les cités antiques sacrifiaient pour se purifier (verbe apparenté) en cas de malheur (dans LXX il traduit le mot hébreu rendu par rançon en Pr 21.18) ; le terme correspondant à rebut pourrait avoir un sens analogue ; voir aussi Lm 3.45. –  de tous  : autre traduction de tout.'
  - type: text
    content: diffamés, nous encourageons ; nous sommes devenus les déchets du monde, le rebut de tous, jusqu'à maintenant.
  - type: heading
    content: Le souci paternel de Paul
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'vous faire honte 6.5 ; 15.35. –  je vous avertis  : cf. Sagesse 11.10 : « Les tiens, tu (Dieu) les as mis à l''épreuve en père qui avertit. » –  comme mes enfants 2Co 6.13 ; Ga 4.19 ; 1Th 2.7,11 ; Phm 10.'
  - type: text
    content: 'Ce n''est pas pour vous faire honte que j''écris cela ; mais je vous avertis comme mes enfants bien-aimés. '
  '15':
  - type: note
    content: 'surveillants (le terme grec a donné notre mot pédagogue) : voir Ga 3.24ns. –  plusieurs pères  : autre traduction beaucoup de pères. –  engendrés Phm 10 ; cf. Ga 4.19. –  en Jésus-Christ ou dans le Christ, selon certains mss. –  par la bonne nouvelle, c.-à-d. en annonçant la bonne nouvelle  ; cf. 9.12 ; 2Co 8.18 ; Ga 2.7 ; Ep 3.6 ; Ph 1.5 ; 2.22 ; 4.3,15 ; 1Th 3.2 ; Phm 13.'
  - type: text
    content: 'En effet, quand vous auriez dix mille surveillants dans le Christ, vous n''avez pas plusieurs pères : c''est moi qui vous ai engendrés en Jésus-Christ par la bonne nouvelle.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'encourage  : autre traduction exhorte 1.10+. –  imitez-moi  : 11.1+ ; cf. Ph 3.17 ; 1Th 1.6.'
  - type: text
    content: 'Je vous y encourage donc, imitez-moi. '
  '17':
  - type: note
    content: 'Timothée Ac 16.1+ ; 19.21s ; cf. 2Co 1.1 ; Ph 2.19-22 ; 2Tm 1.2. –  digne de confiance ou fidèle, cf. Ep 6.21+. –  en Jésus-Christ  : certains mss portent seulement dans le Christ, d''autres dans le Seigneur Jésus. –  dans toutes les Eglises 7.17 ; 14.33.'
  - type: text
    content: A cet effet, je vous ai envoyé Timothée, qui, dans le Seigneur, est mon enfant bien-aimé et digne de confiance ; il vous rappellera mes voies en Jésus-Christ, telles que je les enseigne partout, dans toutes les Eglises.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'En pensant…  : autre traduction comme si je n''allais pas venir vous voir . –  gonflés d''orgueil v. 6n.'
  - type: text
    content: 'En pensant que je ne viendrais pas vous voir, quelques-uns se sont gonflés d''orgueil. '
  '19':
  - type: note
    content: je viendrai vous voir bientôt 11.34 ; 16.5-7. –  volonté du Seigneur Ac 18.21 ; Jc 4.15. –  parole ou langage, cf. 1.17n  ; de même v. 20. –  puissance 4.20+.
  - type: text
    content: 'Or je viendrai vous voir bientôt, si telle est la volonté du Seigneur, et je connaîtrai, non pas la parole, mais la puissance de ceux qui se sont gonflés d''orgueil. '
  '2':
  - type: note
    content: Litt. ce qu'on recherche parmi les intendants, c'est que quelqu'un soit trouvé digne de confiance (ou fidèle) ; 7.25 ; Lc 12.42.
  - type: text
    content: 'Du reste, ce qu''on demande d''un intendant, c''est qu''il soit digne de confiance. '
  '20':
  - type: note
    content: Cf. 2.4+ ; 1Th 1.5 ; voir aussi Mt 7.21 ; Mc 9.1. –  le règne ou le royaume, cf. 6.9s ; 15.24n,50 ; voir Mt 3.2n.
  - type: text
    content: 'Car le règne de Dieu ne consiste pas en parole, mais en puissance. '
  '21':
  - type: note
    content: 'avec un bâton  : cf. 2Co 10.2. –  esprit de douceur Ga 6.1 ; cf. 2Co 10.1 ; Ga 5.23 ; Ep 4.2 ; Col 3.12 ; 2Tm 2.25 ; Tt 3.2 ; 1P 3.4,16 ; voir Mt 5.5n.'
  - type: text
    content: Que voulez-vous ? Que je vienne vous voir avec un bâton, ou avec amour et dans un esprit de douceur ?
  '3':
  - type: note
    content: 'Cf. 9.3. –  jugé / juge 2.14ns. –  par une juridiction humaine  : litt. sous un jour (cf. 1.8+ ; 3.13) humain.'
  - type: text
    content: 'Quant à moi, il m''importe fort peu d''être jugé par vous ou par une juridiction humaine. Je ne me juge pas non plus moi-même ; '
  '4':
  - type: note
    content: 'car je n''ai rien…  : autre traduction car si je n''ai rien sur la conscience, je n''en suis pas justifié pour autant…  ; cf. Jb 27.6. –  celui qui me juge Rm 14.10 ; Jc 4.12.'
  - type: text
    content: 'car je n''ai rien sur la conscience, mais je n''en suis pas justifié pour autant : celui qui me juge, c''est le Seigneur. '
  '5':
  - type: note
    content: 'Ne portez donc aucun jugement  : cf. Mt 7.1+. –  avant le temps fixé  : même expression en Mt 8.29. –  qui mettra en lumière… 3.13 ; 14.25 ; Lc 8.17/ / ; Rm 2.16 ; cf. 2Co 5.10. –  les décisions des cœurs  : cf. Rm 8.27 ; 1Th 2.4. –  sa louange  : cf. 3.8+ ; Rm 2.29.'
  - type: text
    content: Ne portez donc aucun jugement avant le temps fixé, avant la venue du Seigneur qui mettra en lumière les secrets des ténèbres et qui rendra manifestes les décisions des cœurs. Alors chacun recevra de Dieu sa louange.
  - type: heading
    content: Ce que les apôtres doivent endurer
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai usé de ces images  : traduction incertaine : litt. j''ai transformé (même verbe en 2Co 11.13ss ; Ph 3.21). –  de moi-même et d''Apollos 3.5+ss. –  à notre exemple  : litt. en nous , cf. 11.1. –  ne pas aller au-delà de ce qui est écrit  : le texte grec traditionnellement reçu est obscur ; certains pensent qu''il résulte de l''insertion intempestive d''une note de copiste ; quelques mss portent ne pas entretenir de prétentions excessives , comme en Rm 12.3. –  se gonfle d''orgueil  : litt. se gonfle , de même v. 18s ; 5.2 ; 8.1 ; 13.4 ; cf. 2Co 12.20n  ; Col 2.18n.'
  - type: text
    content: 'Mes frères, c''est à cause de vous que j''ai usé de ces images à propos de moi-même et d''Apollos. Vous apprendrez ainsi, à notre exemple, à ne pas aller au-delà de ce qui est écrit, afin qu''aucun de vous ne se gonfle d''orgueil en prenant parti pour l''un contre l''autre. '
  '7':
  - type: note
    content: Jn 3.27+ ; cf. Rm 12.6. –  fier 1.29+.
  - type: text
    content: 'En effet, qui est-ce qui te distingue ? Qu''as-tu que tu n''aies reçu ? Et si tu l''as reçu, pourquoi fais-tu le fier, comme si tu ne l''avais pas reçu ? '
  '8':
  - type: note
    content: 'rassasiés…  : cf. Ap 3.17. –  vous avez commencé à régner  : même verbe 15.25 ; Rm 5.14,17,21 ; 6.12 ; cf. 2Tm 2.12 ; Ap 1.6+ ; 3.21. –  Alors…  : litt. pour que nous aussi nous régnions avec vous !'
  - type: text
    content: 'Déjà vous êtes rassasiés, déjà vous êtes riches, vous avez commencé à régner sans nous ! Si seulement vous régniez vraiment ! Alors nous aussi nous régnerions avec vous ! '
  '9':
  - type: note
    content: 'exhibés  : un terme apparenté a été traduit par démonstration 2.4 ; cf. Ac 2.22n  ; 2Th 2.4n. – Voir apôtres. –  en spectacle  : le terme grec, qui a donné notre mot théâtre, évoque probablement les combats de l''arène ; cf. 15.31s ; Rm 8.36 ; 2Co 4.11 ; Hé 10.33. – Voir anges.'
  - type: text
    content: 'Car Dieu, il me semble, nous a exhibés, nous, les apôtres, à la dernière place, comme des condamnés à mort : nous avons été offerts en spectacle au monde, aux anges et aux humains. '
