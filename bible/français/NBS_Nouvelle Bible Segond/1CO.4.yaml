document_id: 1CO.4,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Seigneur, seul juge
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot grec (différent de celui qui apparaît en 3.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') s''applique habituellement à de simples subordonnés (même terme en Lc 1.2 ; Ac 26.16) ; les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'intendants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le mot grec a donné '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: économe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 9.17 ; Lc 12.42 ; 16.1-8 ; Tt 1.7 ; cf. Ep 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), en revanche, étaient chargés de hautes responsabilités, même s'ils étaient esclaves (cf. 1Co 9.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mystères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.1+,10.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, qu''on nous considère comme des serviteurs du Christ et des intendants des mystères de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous sommes fous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.18+ ; 2Co 5.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avisés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: raisonnables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 10.15 ; Mt 7.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 11.19 ; voir aussi Pr 3.7. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous, nous sommes fous à cause du Christ, mais vous, vous êtes avisés dans le Christ ; nous, nous sommes faibles, mais vous, vous êtes forts. Vous, vous êtes glorieux, mais nous, nous sommes déshonorés ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 4.8-12 ; 6.4-10 ; 7.5 ; 11.23-27 ; 12.10 ; cf. Mt 8.20/ /.
      marker-yv: yv-n
    - type: text
      text: 'Jusqu''à l''heure présente, nous sommes exposés à la faim, à la soif, au dénuement, aux coups, à une vie errante ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en travaillant de nos propres mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.6-18 ; Ac 18.3 ; 20.34 ; Ep 4.28 ; 1Th 2.9 ; 2Th 3.8 ; 3Jn 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénissons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 5.44+ ; Ac 7.60 ; Rm 12.14 ; voir aussi Ps 109.28.'
      marker-yv: yv-n
    - type: text
      text: 'nous nous donnons de la peine en travaillant de nos propres mains ; insultés, nous bénissons ; persécutés, nous supportons ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous encourageons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous exhortons, nous consolons, nous supplions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 16 ; 1.10+ ; Rm 12.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déchets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec ainsi traduit pouvait s''appliquer, entre autres, aux victimes expiatoires que les cités antiques '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifiaient
        - type: text
          text: ' pour se '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifier
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(verbe apparenté) en cas de malheur (dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' il traduit le mot hébreu rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rançon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Pr 21.18) ; le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rebut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait avoir un sens analogue ; voir aussi Lm 3.45. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tout.
      marker-yv: yv-n
    - type: text
      text: diffamés, nous encourageons ; nous sommes devenus les déchets du monde, le rebut de tous, jusqu'à maintenant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le souci paternel de Paul
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous faire honte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.5 ; 15.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous avertis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.10 : « Les tiens, tu (Dieu) les as mis à l''épreuve en père qui avertit. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme mes enfants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 6.13 ; Ga 4.19 ; 1Th 2.7,11 ; Phm 10.
      marker-yv: yv-n
    - type: text
      text: 'Ce n''est pas pour vous faire honte que j''écris cela ; mais je vous avertis comme mes enfants bien-aimés. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'surveillants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le terme grec a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pédagogue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : voir Ga 3.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plusieurs pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: beaucoup de pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'engendrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Phm 10 ; cf. Ga 4.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en Jésus-Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon certains mss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par la bonne nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en annonçant la bonne nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 9.12 ; 2Co 8.18 ; Ga 2.7 ; Ep 3.6 ; Ph 1.5 ; 2.22 ; 4.3,15 ; 1Th 3.2 ; Phm 13.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, quand vous auriez dix mille surveillants dans le Christ, vous n''avez pas plusieurs pères : c''est moi qui vous ai engendrés en Jésus-Christ par la bonne nouvelle.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: encourage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'exhorte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: imitez-moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 11.1+ ; cf. Ph 3.17 ; 1Th 1.6.'
      marker-yv: yv-n
    - type: text
      text: 'Je vous y encourage donc, imitez-moi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Timothée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 16.1+ ; 19.21s ; cf. 2Co 1.1 ; Ph 2.19-22 ; 2Tm 1.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'digne de confiance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ep 6.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en Jésus-Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent seulement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''autres '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le Seigneur Jésus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans toutes les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglises
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.17 ; 14.33.
      marker-yv: yv-n
    - type: text
      text: A cet effet, je vous ai envoyé Timothée, qui, dans le Seigneur, est mon enfant bien-aimé et digne de confiance ; il vous rappellera mes voies en Jésus-Christ, telles que je les enseigne partout, dans toutes les Eglises.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En pensant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme si je n'allais pas venir vous voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gonflés d''orgueil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En pensant que je ne viendrais pas vous voir, quelques-uns se sont gonflés d''orgueil. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je viendrai vous voir bientôt '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.34 ; 16.5-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'volonté du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 18.21 ; Jc 4.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: langage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même v. 20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'puissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.20+.
      marker-yv: yv-n
    - type: text
      text: 'Or je viendrai vous voir bientôt, si telle est la volonté du Seigneur, et je connaîtrai, non pas la parole, mais la puissance de ceux qui se sont gonflés d''orgueil. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce qu''on recherche parmi les intendants, c''est que quelqu''un soit trouvé digne de confiance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; 7.25 ; Lc 12.42.
      marker-yv: yv-n
    - type: text
      text: 'Du reste, ce qu''on demande d''un intendant, c''est qu''il soit digne de confiance. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.4+ ; 1Th 1.5 ; voir aussi Mt 7.21 ; Mc 9.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le règne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le royaume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 6.9s ; 15.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',50 ; voir Mt 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car le règne de Dieu ne consiste pas en parole, mais en puissance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec un bâton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Co 10.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' de douceur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ga 6.1 ; cf. 2Co 10.1 ; Ga 5.23 ; Ep 4.2 ; Col 3.12 ; 2Tm 2.25 ; Tt 3.2 ; 1P 3.4,16 ; voir Mt 5.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Que voulez-vous ? Que je vienne vous voir avec un bâton, ou avec amour et dans un esprit de douceur ?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
