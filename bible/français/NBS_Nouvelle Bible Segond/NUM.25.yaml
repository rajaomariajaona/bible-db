document_id: NUM.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Israélites se livrent à l'idolâtrie
  - type: text
    content: ' '
  - type: note
    content: 'habitait  : autre traduction restait . –  Shittim , à la lisière de Moab (22.1), au nord-est de l''embouchure du Jourdain ; cf. 33.49 ; Jos 2.1 ; 3.1. –  commença à…  : LXX se profana en se livrant à l''inconduite (sexuelle)…  ; cf. 31.16 ; 1Co 10.8 ; voir aussi Os 1.2n. –  filles de Moab  : cf. v. 6ss,18 ; 22.4.'
  - type: text
    content: 'Israël habitait à Shittim ; le peuple commença à se livrer à la prostitution avec les filles de Moab. '
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '11':
  - type: note
    content: 'Cf. Ex 32.25ss ; Dt 33.8ss. –  Phinéas v. 7+. –  des Israélites  : litt. de dessus les fils d''Israël, cf. v. 8n. –  il a été animé de ma passion jalouse ou de mon zèle, ou encore il a montré une passion jalouse pour moi (autre formule au v. 13), cf. Ex 20.5 ; 34.14 ; 1R 19.10,14.'
  - type: text
    content: 'Phinéas, fils d''Eléazar, fils d''Aaron, le prêtre, a détourné ma fureur des Israélites, parce qu''il a été animé de ma passion jalouse au milieu d''eux ; ainsi je n''ai pas exterminé les Israélites dans ma passion jalouse. '
  '12':
  - type: note
    content: 'Je lui donne  : autre traduction j''établis pour lui. –  alliance de paix  : cf. Es 54.10 ; Ez 34.25 ; 37.26 ; Ml 2.5 ; d''après la graphie de certains mss hébreux, quelques-uns modifient la vocalisation du texte hébreu traditionnel pour lire alliance de rétribution.'
  - type: text
    content: 'A cause de cela, dis : Je lui donne mon alliance de paix. '
  '13':
  - type: note
    content: 'et pour sa descendance, c.-à-d. la lignée de Tsadoq à partir du temps de David ; cf. Esd 8.2 ; 1Ch 5.30ss ; voir aussi Jg 20.28 ; 1R 1.32ss ; 2.35 ; Ez 40.46 ; 44.15s ; 48.11. –  sacerdoce perpétuel  : cf. Ex 29.9 ; Jr 33.18,21s ; 1 Maccabées 2.54 : « Pinhas, notre Père, par son zèle ardent a reçu l''alliance d''un sacerdoce éternel. » Siracide 45.23ss : « Pinhas fils d''Eléazar est le troisième en gloire (après Moïse et Aaron) pour son zèle dans la crainte du Seigneur et pour sa fermeté lors de la défection du peuple dans le généreux courage de son âme : il obtint ainsi le pardon pour Israël. C''est pourquoi fut établie en sa faveur une alliance de paix : il serait le chef du sanctuaire et de son peuple, pour qu''à lui et à sa descendance appartienne à jamais le souverain sacerdoce. Il y eut aussi une alliance avec David (…) ; l''héritage du roi passe d''un fils à un seul fils, l''héritage d''Aaron passe à toute sa descendance. » –  et qu''il a fait l''expiation  : autre traduction possible aussi fera-t-il l''expiation, c.-à-d. exercera-t-il le sacerdoce.'
  - type: text
    content: Ce sera pour lui et pour sa descendance après lui l'alliance d'un sacerdoce perpétuel, parce qu'il a montré une passion jalouse pour son Dieu et qu'il a fait l'expiation sur les Israélites.
  '14':
  - type: text
    content: 'Le nom de l''Israélite qui fut abattu avec la Madianite était Zimri ; il était fils de Salou, prince d''une famille des Siméonites. '
  '15':
  - type: note
    content: 'Tsour 31.8. –  des peuplades…  : litt. des peuplades d''une famille, cf. 1.2n.'
  - type: text
    content: Le nom de la Madianite qui fut abattue était Kozbi ; elle était fille de Tsour, chef des peuplades (c'est-à-dire d'une famille) en Madiân.
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '17':
  - type: note
    content: Cf. 31.1ss,16.
  - type: text
    content: 'Traite les Madianites en adversaires. Abattez-les, '
  '18':
  - type: note
    content: l'affaire de Péor v. 1-5. –  l'affaire de Kozbi v. 6-15.
  - type: text
    content: car ils se sont comportés en adversaires à votre égard par la perfidie qu'ils ont montrée envers vous dans l'affaire de Péor et dans l'affaire de Kozbi, leur sœur, fille d'un prince de Madiân, qui a été abattue le jour du fléau, dans l'affaire de Péor.
  - type: heading
    content: Second recensement des tribus d'Israël
  '19':
  - type: text
    content: Après le fléau,
  '2':
  - type: note
    content: 'leurs dieux  : autre traduction leur dieu (c.-à-d. Kemosh), cf. 21.29n  ; Ex 34.15s ; Dt 7.3s ; 1R 11.2 ; Ap 2.14.'
  - type: text
    content: 'Elles invitèrent le peuple aux sacrifices de leurs dieux ; le peuple mangea et se prosterna devant leurs dieux. '
  '3':
  - type: note
    content: 's''attacha au…  : même verbe au v. 5 ; Ps 106.28 ; certains traduisent s''accoupla au Baal de Péor, d''autres se mit sous le joug du Baal de Péor  ; il s''agit de Baal (= Seigneur, Maître), dieu de la fertilité commun à de nombreux peuples sédentaires, tel qu''il était adoré à Péor (23.28n) ; LXX, Vg Beelphégor  ; cf. v. 18 ; Dt 3.29 ; 4.3s,46 ; Os 9.10ss.'
  - type: text
    content: 'Israël s''attacha au Baal de Péor, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Israël.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'fais-les pendre  : autre traduction empale-les  ; cf. Dt 21.23 ; Jos 10.26.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Prends tous les chefs du peuple et fais-les pendre devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en face du soleil, afin que la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se détourne d''Israël. '
  '5':
  - type: note
    content: Cf. Ex 32.27. –  juges Ex 18.25s.
  - type: text
    content: 'Moïse dit aux juges d''Israël : Que chacun de vous tue ceux de ses hommes qui se sont attachés à Baal-Péor !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'une Madianite  : litt. la Madianite , cf. v. 15 ; 22.4n  ; 31.15s. –  pleuraient  : cf. 11.10 ; 14.1 ; Jg 21.2 ; 2S 15.23 ; Es 30.19 ; Ez 27.30 ; Mi 1.10.'
  - type: text
    content: 'Un Israélite arriva et présenta à ses frères une Madianite, sous les yeux de Moïse et de toute la communauté des Israélites, tandis que ceux-ci pleuraient à l''entrée de la tente de la Rencontre. '
  '7':
  - type: note
    content: Phinéas (hébreu Pinhas  ; cf. v. 11-13n), fils d'Eléazar 17.2+ ; cf. Ex 6.25 ; Jg 20.28. –  une lance ou un pieu  ; cf. Ex 32.25ss.
  - type: text
    content: 'Quand il vit cela, Phinéas, fils d''Eléazar, fils d''Aaron, le prêtre, se leva au milieu de la communauté et prit une lance. '
  '8':
  - type: note
    content: 'l''Israélite  : litt. l''homme d''Israël, de même au v. 14 ; l''expression a souvent un sens collectif (les hommes d''Israël, cf. Dt 27.14n  ; Jos 9.6n). –  à l''intérieur de la tente  : litt. dans la qoubba, terme qui n''apparaît qu''ici dans la Bible et qui désigne en arabe la tente-sanctuaire d''un camp nomade ; certains comprennent que l’Israélite a introduit une prostituée sacrée dans la tente de la Rencontre (v. 6) ; d''autres, qu''il s''est introduit dans un sanctuaire où se pratiquait la prostitution sacrée ; cf. Dt 23.18ns ; 1R 14.24 ; 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14. En hébreu ce terme fait assonance avec le mot traduit par bas-ventre (qéba  ; litt. à son bas-ventre [à elle]  : d''autres pensent qu''il s''agissait originellement du même mot et traduisent dans sa tente à elle). –  le fléau…  : litt. le fléau s''arrêta de dessus les Israélites 17.13 ; 31.16 ; Ps 106.30s ; cf. Jos 22.17 ; 2S 24.25.'
  - type: text
    content: 'Il suivit l''Israélite à l''intérieur de la tente et il les transperça tous les deux, l''Israélite ainsi que la femme, au bas-ventre. Alors le fléau qui frappait les Israélites s''arrêta. '
  '9':
  - type: note
    content: Cf. 1Co 10.8.
  - type: text
    content: Le fléau avait fait vingt-quatre mille morts.
