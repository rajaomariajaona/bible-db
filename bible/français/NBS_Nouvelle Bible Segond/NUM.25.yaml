          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.54 : « Pinhas, notre Père, par son zèle ardent a reçu l''alliance d''un sacerdoce éternel. » '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '45.23ss : « Pinhas fils d''Eléazar est le troisième en gloire (après Moïse et Aaron) pour son zèle dans la crainte du Seigneur et pour sa fermeté lors de la défection du peuple dans le généreux courage de son âme : il obtint ainsi le pardon pour Israël. C''est pourquoi fut établie en sa faveur une alliance de paix : il serait le chef du sanctuaire et de son peuple, pour qu''à lui et à sa descendance appartienne à jamais le souverain sacerdoce. Il y eut aussi une alliance avec David (…) ; l''héritage du roi passe d''un fils à un seul fils, l''héritage d''Aaron passe à toute sa descendance. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et qu''il a fait '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'expiation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aussi fera-t-il l'expiation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. exercera-t-il le sacerdoce.'
      marker-yv: yv-n
    - type: text
      text: Ce sera pour lui et pour sa descendance après lui l'alliance d'un sacerdoce perpétuel, parce qu'il a montré une passion jalouse pour son Dieu et qu'il a fait l'expiation sur les Israélites.
