      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 54.10 ; Ez 34.25 ; 37.26 ; Ml 2.5 ; d''après la graphie de certains mss hébreux, quelques-uns modifient la vocalisation du texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: alliance de rétribution.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, dis : Je lui donne mon alliance de paix. '
