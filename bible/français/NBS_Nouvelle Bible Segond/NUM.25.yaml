      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a montré une passion jalouse pour moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (autre formule au v. 13), cf. Ex 20.5 ; 34.14 ; 1R 19.10,14.
      marker-yv: yv-n
    - type: text
      text: 'Phinéas, fils d''Eléazar, fils d''Aaron, le prêtre, a détourné ma fureur des Israélites, parce qu''il a été animé de ma passion jalouse au milieu d''eux ; ainsi je n''ai pas exterminé les Israélites dans ma passion jalouse. '
