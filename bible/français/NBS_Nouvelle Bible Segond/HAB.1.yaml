document_id: HAB.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Sentence Es 13.1n  ; Jr 23.33ss ; Na 1.1. –  Habacuc  : sans doute un nom de plante d''origine étrangère ; selon une addition grecque au livre de Daniel (14.33ss), le prophète Habacuc se trouvait en Judée, d''où il aurait été transporté miraculeusement à Babylone pour apporter un repas à Daniel dans la fosse aux lions. –  prophète 3.1. –  vu 2.2 ; Am 1.1+ ; cf. Lm 2.14.'
  - type: text
    content: Sentence. Ce qu'Habacuc, le prophète, a vu.
  - type: heading
    content: Premier appel du prophète à Dieu
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'il amoncelle de la terre (litt. de la poussière ) : sur les travaux de terrassement entrepris pour prendre les forteresses assiégées, cf. 2S 20.15 ; 2R 19.32 ; Es 29.3 ; Jr 6.6 ; 32.24 ; 33.4 ; Ez 4.2 ; 17.17 ; 26.8 ; Lc 19.43.'
  - type: text
    content: Lui, il se moque des rois,
  - type: text
    content: il rit des princes.
  - type: text
    content: 'Il se rit de toute forteresse :'
  - type: text
    content: il amoncelle de la terre,
  - type: text
    content: et il la prend.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  un souffle passe et s''en va  : on pourrait comprendre l''Esprit passa et s''en alla (mêmes termes en Jb 4.15 ; cf. 1R 22.21), ou encore comme le vent il passe et submerge (Es 8.8). –  il se met en tort ou il se rend coupable . Texte incertain ; quelques-uns, s''appuyant en partie sur un ms de Qumrân, modifient le texte hébreu traditionnel pour lire j''exposerai mes doléances (cf. 2.1) à mon Dieu (1.12ss ; au lieu de se met en tort… son dieu ! ) ; cf. v. 7,16 ; Jr 17.5ss ; Jb 12.6 ; Dn 4.27 ; sur la culpabilité des nations instruments de Dieu , cf. Dt 32.27ss,41 ; Es 10.5ss ; Ez 38. –  lui dont la force…  : autre traduction sa force à lui, voilà son dieu  ; certains modifient le texte hébreu traditionnel pour lire et lui, il se fait un dieu de sa force.'
  - type: text
    content: Alors un souffle passe et s'en va ;
  - type: text
    content: il se met en tort,
  - type: text
    content: lui dont la force est pour son dieu !
  - type: heading
    content: Deuxième appel du prophète à Dieu
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'dès le temps jadis ou depuis les origines  ; cf. Dt 33.15,27 ( antique ) ; Es 37.26 ; 45.21 ; 46.10 ; Mi 5.1 ; Ps 68.34 ; 74.12 ; 77.6. voir aussi 90.1s ; 93.2. –  mon Dieu, mon Saint ou, en modifiant la vocalisation traditionnelle, Dieu de ma sainteté ou mon Dieu saint  ; cf. Es 1.4n  ; 10.17 ; 43.15 ; 49.7 ; Ps 22.4. –  Tu ne meurs pas ou tu ne mourras pas , texte probable ; selon la tradition, les scribes auraient ici modifié le texte par respect pour Dieu, de façon à lire plutôt nous ne mourrons pas . –  tu l''as établi  : il s''agit probablement du Chaldéen (v. 5ss). –  jugement  : le mot hébreu correspondant est habituellement rendu par droit (v. 4,7). –  mon Rocher (litt. rocher ) : cf. Dt 32.4,15,18,30s,37 ; on pourrait aussi traduire tu l''as affermi comme un rocher pour châtier . –  institué  : litt. fondé.'
  - type: text
    content: – Mais toi, n'es-tu pas dès le temps jadis,
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, mon Saint ?'
  - type: text
    content: Tu ne meurs pas !
  - type: text
    content: Seigneur
  - type: text
    content: ', tu l''as établi pour le jugement ;'
  - type: text
    content: mon Rocher, tu l'as institué pour châtier.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3+. –  Tes yeux sont trop purs…  : cf. Jr 12.1 ; Ps 5.5s ; Mt 6.22ns. –  traîtres 2.5 ; Es 21.2 ; 24.16 ; Pr 11.6 ; 13.2,15 ; 21.18 ; 22.12. –  silence Es 42.14 ; Ps 35.22 ; 50.21 ; 109.1. –  engloutit Jr 51.34 ; Os 8.7 ; Ps 35.25 ; 106.14 ; 124.3 ; Pr 1.12.'
  - type: text
    content: Tes yeux sont trop purs pour voir ce qui est mauvais,
  - type: text
    content: tu ne peux pas regarder l'oppression.
  - type: text
    content: Pourquoi donc regardes-tu les traîtres ?
  - type: text
    content: Pourquoi gardes-tu le silence quand un méchant engloutit plus juste que lui ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: qui n'ont pas de maître ou sur lesquelles nul ne domine  ; cf. Gn 1.26n,28 ; Pr 6.7 ; 30.27 ; Ec 9.12 ; Mt 13.47.
  - type: text
    content: Tu traites les humains comme les poissons de la mer,
  - type: text
    content: comme les bestioles qui n'ont pas de maître.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'il les enlève  : de nouveau le peuple des Chaldéens (v. 5ss) ; sur l''image de la pêche, cf. Jr 16.16 ; Ez 12.13 ; 17.20 ; 29.4 ; 32.3 ; Am 4.2 ; Ps 31.5 ; 35.7.'
  - type: text
    content: Tous, il les enlève à l'hameçon,
  - type: text
    content: il les tire dans son filet,
  - type: text
    content: il les recueille dans sa nasse.
  - type: text
    content: Alors il se réjouit, il est dans l'allégresse.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 7,11 ; Es 10.5ss.
  - type: text
    content: Alors, il offre un sacrifice à son filet,
  - type: text
    content: de l'encens à sa nasse,
  - type: text
    content: car par eux sa part est grasse,
  - type: text
    content: sa nourriture copieuse.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Autre texte, établi en particulier d''après un ms hébreu de Qumrân  : Aussi tire-t-il constamment l''épée pour massacrer les nations sans épargner personne.'
  - type: text
    content: Alors, va-t-il vider son filet,
  - type: text
    content: et massacrer des nations constamment, sans épargner personne ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.1. –  Jusqu''à quand Ps 6.4+. –  au secours / Violence (v. 3,9 ; 2.8,17) : cf. Jr 20.8 ; Ps 22.3 ; Jb 19.7. –  sans que tu sauves Jr 14.9 ; Ps 18.42.'
  - type: text
    content: '– Jusqu''à quand, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: appellerai-je au secours
  - type: text
    content: sans que tu entendes ?
  - type: text
    content: 'Jusqu''à quand crierai-je vers toi : « Violence ! »'
  - type: text
    content: sans que tu sauves ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi v. 13 ; Jr 12.1+ ; Ps 10.1+ ; 73 ; Jb 3.11s,20 ; 7.20 ; 21.7 ; Lm 5.20. –  et regardes-tu  : d''après des versions anciennes ; certains modifient légèrement le texte hébreu traditionnel pour lire (et me fais-tu) regarder . –  l''oppression ou la peine ; le tourment  : même terme en Es 10.1 ; 53.11 ; 59.4 ; Jr 20.18 ; Ps 7.15n,17 ; 10.7 ; 94.20 ; 140.10 ; Jb 4.8 ; sur le mal , voir aussi Nb 23.21n  ; Es 1.13+ ; 10.1n. –  Ravage et violence Jr 6.7 ; 20.8 ; Ez 45.9 ; Am 3.10 ; cf. Os 12.2 ; Ps 11.5 ; 55.10ss ; 140.5 ; Pr 24.2. –  querelles / dispute Jr 15.10 ; Pr 15.18 ; certains modifient le texte hébreu traditionnel pour lire je dois supporter querelles et disputes.'
  - type: text
    content: Pourquoi me fais-tu voir le mal
  - type: text
    content: et regardes-tu l'oppression ?
  - type: text
    content: Ravage et violence sont devant moi,
  - type: text
    content: il y a des querelles,
  - type: text
    content: et la dispute s'élève.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 59.14 ; Mi 7.2. –  l''équité  : autre traduction le droit (même terme au v. 7). –  ne s''impose jamais  : autre traduction n''est jamais appliquée , litt. ne sort jamais ou, selon certains, ne sort pas complètement  ; cf. v. 7n  ; Es 2.3n  ; 42.1nss ; formules comparables en Ps 17.2n  ; 37.6n. –  assaille  : litt. entoure , soit au sens de cerner , soit peut-être au sens de circonvenir  ; cf. Ps 22.13. – Voir justice.'
  - type: text
    content: C'est pourquoi la loi est paralysée,
  - type: text
    content: et l'équité ne s'impose jamais ;
  - type: text
    content: parce que le méchant assaille le juste,
  - type: text
    content: c'est pour cela que l'équité est pervertie avant de pouvoir s'imposer.
  - type: heading
    content: 'La réponse de Dieu : invasion des Chaldéens'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Es 29.9,14 ; Ac 13.41 . –  regardez…  : autre traduction portez les regards sur les nations (voir non-Juif) , voyez  ; versions anciennes regardez, contempteurs ou méprisants . –  stupeur Es 13.8 ; Jr 4.9 ; Ps 48.6. –  une œuvre est en train de s''accomplir (d''après certaines versions anciennes) : autre traduction quelqu''un est en train d''accomplir en votre temps une œuvre  ; le sujet est sous-entendu dans le texte hébreu traditionnel ; LXX je suis en train d''accomplir… –  ne croiriez pas Es 5.12 ; 53.1.'
  - type: text
    content: – Voyez, regardez parmi les nations,
  - type: text
    content: soyez dans la stupéfaction et la stupeur,
  - type: text
    content: car une œuvre est en train de s'accomplir
  - type: text
    content: que vous ne croiriez pas si on la racontait.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Je suscite  : cf. Dt 28.47ss ; 2R 24.2ss ; Es 10.5ss ; Jr 5.15ss ; 25.9ss ; 27.6ss ; 51.20ss ; Am 3.11 ; 6.14. – Les Chaldéens ou Néo-Babyloniens ont conquis le nord de la Mésopotamie, la Syrie et le territoire d''Israël entre 615 et 580 av. J.-C. (cf. Es 23.13n). –  impitoyable  : litt. amer (cf. Jg 18.25n  ; 2S 17.8n) ; le terme fait assonance avec le mot traduit par impétueux. –  de vastes pays ou les largeurs de la terre  ; cf. Ap 20.9. –  de demeures qui ne lui appartiennent pas  : cf. 2.6 ; Dt 6.10 ; voir aussi 32.8 ; Ac 17.26.'
  - type: text
    content: Je suscite les Chaldéens,
  - type: text
    content: ce peuple impitoyable et impétueux
  - type: text
    content: qui traverse de vastes pays
  - type: text
    content: pour prendre possession de demeures
  - type: text
    content: qui ne lui appartiennent pas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'terrible  : cf. Gn 15.12 ; Ex 15.16 ; 23.27. –  il impose lui-même…  : litt. son droit (le terme est également traduit par équité ) … sort de lui-même  ; cf. v. 4n,11s,16 ; Es 10.13. –  sa suprématie ou son butin , texte et traduction incertains ; cf. Es 47.8ss ; Dn 4.27.'
  - type: text
    content: Il est terrible et redoutable,
  - type: text
    content: il impose lui-même son droit et sa suprématie.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'les loups du soir ou, avec une légère modification du texte hébreu traditionnel, les loups de la plaine aride  ; cf. So 3.3 ; voir aussi Jr 5.6. –  chars  : litt. attelages ou équipages (de chars) , Ez 27.7n,10 ; Os 1.7n. –  se déploient  : autre traduction bondissent  ; Jr 50.11 ; Ml 3.20. –  l''aigle ou le vautour (Mi 1.16n) ; cf. Dt 28.49 ; Jr 4.13 ; Lm 4.19. –  fond sur sa proie  : litt. se précipite pour manger  ; cf. Es 8.1ss ; Mt 24.28.'
  - type: text
    content: Ses chevaux sont plus rapides que des léopards,
  - type: text
    content: plus mordants que les loups du soir.
  - type: text
    content: Ses chars se déploient,
  - type: text
    content: ses chars viennent de loin,
  - type: text
    content: ils volent comme l'aigle
  - type: text
    content: qui fond sur sa proie.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'il arrive  : toujours le peuple des Chaldéens, v. 5ss. –  le visage tendu vers l''avant  : texte et traduction incertains ; avec des modifications on pourrait aussi comprendre leur visage engloutit (tout) comme le vent d''est, l''ardeur de leur face est comme le vent d''est , ou encore tous leurs visages sont tournés vers l''avant  ; cf. Jr 18.17 ; Ez 17.10 ; Os 12.2 ; 13.15. –  comme du sable Gn 22.17 ; 1R 4.20.'
  - type: text
    content: Tout entier, il arrive pour la violence ;
  - type: text
    content: le visage tendu vers l'avant,
  - type: text
    content: il amasse des captifs comme du sable.
