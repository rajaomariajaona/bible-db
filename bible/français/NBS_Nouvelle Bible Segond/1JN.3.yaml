document_id: 1JN.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'enfants de Dieu v. 10 ; Jn 1.12+ ; cf. Lc 20.36+ ; Rm 8.16 ; Ga 4.4s ; Ep 1.5. –  Si le monde…  : autre traduction si le monde ne nous reconnaît pas, c''est qu''il n''est pas parvenu à le connaître (cf. 2.3ns, autre temps du même verbe ; de même en 4.8) ; cf. Jn 16.2-3+ ; 1Co 1.21.'
  - type: text
    content: Voyez quel amour le Père nous a donné, pour que nous soyons appelés enfants de Dieu – et nous le sommes ! Si le monde ne nous connaît pas, c'est qu'il ne l'a jamais connu.
  '10':
  - type: note
    content: 'en cela (désignant ce qui précède) : autre traduction en ceci (désignant ce qui suit). –  enfants de Dieu v. 1+. –  ne fait pas (ou ne pratique pas) la justice 2.29+. –  n''est pas de Dieu Jn 8.47+.'
  - type: text
    content: 'C''est en cela que les enfants de Dieu et les enfants du diable sont manifestes : quiconque ne fait pas la justice n''est pas de Dieu, tout comme celui qui n''aime pas son frère.'
  - type: heading
    content: L'amour fraternel
  '11':
  - type: text
    content: ' '
  - type: note
    content: le message 1.5+. –  dès le commencement 2.7+. –  aimons-nous… v. 23 ; 4.7,11 ; Jn 13.34+.
  - type: text
    content: 'Voici le message que vous avez entendu dès le commencement : aimons-nous les uns les autres ; '
  '12':
  - type: note
    content: 'ne faisons  : sous-entendu dans le texte. –  Caïn Gn 4.1-8. –  Mauvais 2.13+. –  tua  : autre traduction égorgea  ; le même verbe est traduit par immoler en Ap 5.6n  ; cf. 6.9. –  justes  : cf. Hé 11.4+.'
  - type: text
    content: ne faisons pas comme Caïn, qui était du Mauvais et qui tua son frère. Et pourquoi le tua-t-il ? Parce que ses œuvres étaient mauvaises, et que celles de son frère étaient justes.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Jn 15.18+.
  - type: text
    content: 'Ne vous étonnez pas, frères, si le monde vous déteste. '
  '14':
  - type: note
    content: 'passés de la mort à la vie  : cf. Jn 5.24.'
  - type: text
    content: 'Nous, nous savons que nous sommes passés de la mort à la vie, parce que nous aimons les frères. Celui qui n''aime pas demeure dans la mort. '
  '15':
  - type: note
    content: 'déteste son frère 2.9,11 ; 4.20. –  homicide (ou meurtrier) : le même mot grec n''apparaît qu''en Jn 8.44 ; cf. Mt 5.21s. –  la vie éternelle demeurant en lui 2Jn 2 ; cf. Ga 5.20s ; Ap 21.8.'
  - type: text
    content: 'Quiconque déteste son frère est homicide, et vous savez qu''aucun homicide n''a la vie éternelle demeurant en lui. '
  '16':
  - type: note
    content: 'nous connaissons ou nous avons connu 2.3n  ; 4.16. –  lui s''est défait de sa vie  : cf. Jn 10.11n. –  nous devons, comme en 2.6 ; 4.11 ; Jn 13.14. –  nous défaire de notre vie  : cf. Rm 16.4 ; Ph 2.17 ; 1Th 2.8.'
  - type: text
    content: 'A ceci nous connaissons l''amour : c''est que lui s''est défait de sa vie pour nous. Nous aussi, nous devons nous défaire de notre vie pour les frères. '
  '17':
  - type: note
    content: 'les ressources  : cf. 2.16n. –  son frère dans le besoin  : cf. Dt 15.7s ; Lc 10.31s ; Jc 2.15s. –  son cœur  : litt. ses entrailles, considérées comme siège de la compassion (un verbe apparenté est traduit par être ému en Lc 10.33 p. ex.) ; 2Co 6.12n  ; Phm 7n.'
  - type: text
    content: 'Mais si quelqu''un possède les ressources du monde, qu''il voie son frère dans le besoin et qu''il lui ferme son cœur, comment l''amour de Dieu demeure-t-il en lui ? '
  '18':
  - type: note
    content: Cf. Ga 5.6 ; Jc 1.22+ ; 2.14,17. –  en vérité 1.6+ ; cf. Jn 4.23s ; 2Jn 1s.
  - type: text
    content: Mes enfants, n'aimons pas en parole, avec la langue, mais en œuvre et en vérité.
  - type: heading
    content: L'assurance devant Dieu
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'nous sommes de la vérité Jn 18.37+. –  nous apaiserons  : litt. nous persuaderons (le même verbe est traduit par user de persuasion en Mt 28.14n) ; cf. Lc 7.47 ; Jc 2.13 ; 1P 4.8.'
  - type: text
    content: 'A cela nous saurons que nous sommes de la vérité, et nous apaiserons notre cœur devant lui ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Col 3.3s. –  ne s''est pas encore manifesté  : litt. n''a pas encore été manifesté , 1.2n. –  quel que soit…  : litt. s''il est (ou vient à être ) manifesté 2.28n  ; Jn 14.2s ; on pourrait aussi comprendre si cela vient à se manifester . –  nous serons semblables à lui 2Co 3.18 ; Ph 3.21+. –  nous le verrons tel qu''il est Mt 5.8 ; Jn 14.19 ; 17.24 ; 1Co 13.12 ; Hé 12.14 ; Ap 22.4.'
  - type: text
    content: 'Bien-aimés, maintenant nous sommes enfants de Dieu, et ce que nous serons ne s''est pas encore manifesté ; mais nous savons que, quel que soit le moment de sa manifestation, nous serons semblables à lui, parce que nous le verrons tel qu''il est. '
  '20':
  - type: note
    content: 'car si  : autre traduction nous persuaderons notre cœur (v. 19) de ce que, si notre cœur nous condamne…  ; certains modifient légèrement le découpage des mots pour lire de quelque manière que notre cœur nous condamne  ; cf. Lc 18.13 ; Rm 2.15. –  Dieu est plus grand  : cf. 4.4 ; 5.9 ; Jn 14.28 ; voir aussi Lc 1.49s. –  connaît tout  : cf. 2.27+ ; Jn 21.17 ; voir aussi 1R 8.39 ; Ps 7.10 ; Ac 15.8.'
  - type: text
    content: 'car si notre cœur nous condamne, Dieu est plus grand que notre cœur et il connaît tout. '
  '21':
  - type: note
    content: 'si notre cœur…  : certains mss portent si le cœur ne condamne pas. –  assurance 2.28+ ; cf. Rm 5.1s. –  auprès de 1.2n.'
  - type: text
    content: 'Bien-aimés, si notre cœur ne nous condamne pas, nous avons de l''assurance auprès de Dieu. '
  '22':
  - type: note
    content: 'Quoi que nous demandions… 5.14s ; Jn 14.13+ ; voir Mt 7.7+ ; cf. Jr 29.12s ; Rm 8.26s. –  gardons ses commandements 2.3 ; voir loi. –  de lui  : litt. devant lui  ; cf. Jn 8.29 ; Hé 13.21.'
  - type: text
    content: Quoi que nous demandions, nous le recevons de lui, parce que nous gardons ses commandements et que nous faisons ce qui est agréé de lui.
  '23':
  - type: text
    content: ' '
  - type: note
    content: que nous croyions au nom… ou que nous croyions le nom…  ; formule légèrement différente en 5.13+ ; cf. Jn 6.29 ; Rm 10.14. –  son Fils Jésus-Christ 5.20 ; Mt 16.16+ ; Jn 11.27+. –  nous nous aimions… v. 11+ ; cf. 5.1. –  selon le commandement Jn 13.34+.
  - type: text
    content: 'Voici son commandement : que nous croyions au nom de son Fils Jésus-Christ, et que nous nous aimions les uns les autres, selon le commandement qu''il nous a donné. '
  '24':
  - type: note
    content: 'demeure en Dieu…  : litt. demeure en lui, et lui en lui (c.-à-d. et celui-ci en celui-là) ; cf. 2.24,27 ; 4.13-16 ; Jn 6.56+ ; voir aussi Rm 5.5 ; 8.9. –  il demeure en nous : par l''Esprit (Jn 4.17 ; voir aussi Rm 8.11 ; 1Co 6.19) qu''il nous a donné 4.13+.'
  - type: text
    content: 'Celui qui garde ses commandements demeure en Dieu, comme Dieu en lui ; à ceci nous savons qu''il demeure en nous : par l''Esprit qu''il nous a donné.'
  '3':
  - type: note
    content: Cf. 2.6 ; 2Co 7.1. –  comme lui 2.6n. – Voir pur.
  - type: text
    content: Quiconque a cette espérance en lui se purifie, comme lui est pur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'fait ou commet v. 7ss ; 1.6+ ; 2.29. –  le mal  : autres traductions la violation de la loi, le désordre  ; le terme grec est souvent synonyme de celui qui est traduit par injustice en 1.9 ; 5.17 ; il figure en particulier dans des textes qui évoquent une opposition ou une révolte radicales du mal contre Dieu ; cf. Mt 7.23n  ; 2Th 2.3nss. –  c''est le péché…  : autre traduction le péché, c''est le mal.'
  - type: text
    content: 'Quiconque fait le péché fait aussi le mal ; c''est le péché qui est le mal. '
  '5':
  - type: note
    content: 's''est manifesté  : litt. a été manifesté, de même v. 8 ; cf. v. 2 ; 1.2+. –  lui 2.6n. –  enlever les péchés  : cf. Jn 1.29+ ; Es 53.4s,11s. –  pas de péché en lui Es 53.9 ; Jn 8.46+ ; 1P 2.22-24.'
  - type: text
    content: 'Or, vous le savez, il s''est manifesté, lui, pour enlever les péchés ; et il n''y a pas de péché en lui. '
  '6':
  - type: note
    content: 'ne pèche pas  : certains tentent de résoudre l''apparente contradiction avec 1.8ss en interprétant ici ne pratiquent pas le péché ; ne se livre pas au péché  ; le rapprochement de ces deux textes semble surtout mettre en évidence une tension entre la réalité quotidienne expérimentée par le croyant (il pèche, et ce serait mentir que de le nier) et l''identité que lui confère sa foi (celle d''un être né de Dieu qui, en tant que tel, ne peut pécher) ; cf. v. 8s ; 5.18 ; voir aussi Mt 7.18 ; Rm 6.11,14,17s. –  ne le connaît pas…  : litt. ne l''a pas vu (3Jn 11) ni ne l''a connu 2.3ns.'
  - type: text
    content: Quiconque demeure en lui ne pèche pas ; quiconque pèche ne le connaît pas, il ne l'a jamais vu.
  '7':
  - type: text
    content: ' '
  - type: note
    content: égare 2.26+. –  fait (ou pratique , 1.6+) la justice / juste 2.29.
  - type: text
    content: 'Mes enfants, que personne ne vous égare. Celui qui fait la justice est juste, comme lui est juste. '
  '8':
  - type: note
    content: 'Celui qui fait v. 4. –  du diable… dès le commencement Jn 8.34,44 ; cf. 2Th 2.3,9. –  Fils de Dieu Mt 16.16+ ; Jn 1.34+. –  s''est manifesté v. 5n. –  détruire les œuvres du diable  : cf. Gn 3.15 ; Mc 1.24 ; Jn 12.31+ ; Hé 2.14s ; Ap 12.10-12 ; voir démon, diable, Satan.'
  - type: text
    content: 'Celui qui fait le péché est du diable, car le diable pèche dès le commencement. Si le Fils de Dieu s''est manifesté, c''est pour détruire les œuvres du diable. '
  '9':
  - type: note
    content: 'ne fait (v. 4) pas de péché v. 6+. –  la semence… 2.14,24 ; 2Jn 2 ; cf. Mt 13.37s ; Lc 8.12 ; 1P 1.23ss ; voir aussi Ps 37.31 ; 119.11 ; Siracide 24.22 : « Ceux qui travaillent avec moi (la Sagesse, assimilée dans le contexte à la loi) ne pécheront point. »'
  - type: text
    content: 'Quiconque est né de Dieu ne fait pas de péché, parce que la semence de Dieu demeure en lui ; il ne peut pas pécher, puisqu''il est né de Dieu. '
