  - type: text
    text: 'Bien-aimés, maintenant nous sommes enfants de Dieu, et ce que nous serons ne s''est pas encore manifesté ; mais nous savons que, quel que soit le moment de sa manifestation, nous serons semblables à lui, parce que nous le verrons tel qu''il est. '
