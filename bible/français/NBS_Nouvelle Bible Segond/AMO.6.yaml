        children:
        - type: text
          text: 'Les villes de ce v., quoique prospères, tomberont ; il en sera de même pour Samarie. Du coup on peut lire ce texte ou bien comme l''annonce directe de la chute, ou bien comme l''expression d''un sentiment de sécurité (illusoire) de la part de ceux à qui le message s''adresse (v. 1). –  '
