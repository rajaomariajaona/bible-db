  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte obscur et traduction conjecturale ; il s''agit peut-être, comme au v. 9, d''une description des ravages occasionnés par le tremblement de terre (v. 11 ; 1.1+) qui sert d''illustration au malheur à venir. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lorsqu'un parent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son oncle et celui qui brûle porteront… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?) ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne restera que peu de rescapés pour enlever de la maison les ossements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Silence ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.13 ; 8.3 ; Ha 2.20 ; So 1.7 ; Za 2.17 ; Ap 8.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Car il ne faut pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains rattachent cette phrase au v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'évoquer le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2S 18.18 ; Es 26.13 ; 49.1 ; Os 12.6 ; Ps 6.6+.
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''un parent prendra un mort pour le brûler et qu''il enlèvera de la maison les ossements, il dira à celui qui est au fond de la maison : Y a-t-il encore quelqu''un chez toi ? Et l''autre répondra : Personne… Alors il dira : Silence ! Car il ne faut pas évoquer le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) !'
