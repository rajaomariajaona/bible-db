document_id: AMO.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une fausse sécurité
  - type: text
    content: ' '
  - type: note
    content: 'satisfaits ou tranquilles  ; cf. 2R 14.25 ; voir aussi Es 28.1ss ; Lc 6.24s. –  qui vivent en toute confiance  : autre traduction ceux qui mettent leur confiance dans la montagne de Samarie 3.9+ ; 4.1. –  notables  : litt. percés ou marqués (peut-être au sens de remarqués ; distingués ). –  la première  : le mot correspondant est rendu par commencement en Gn 1.1n  ; il peut aussi avoir le sens de prémices.'
  - type: text
    content: Quel malheur pour ceux qui sont satisfaits à Sion,
  - type: text
    content: ceux qui vivent en toute confiance dans la montagne de Samarie,
  - type: text
    content: ces notables de la première des nations,
  - type: text
    content: auprès desquels va la maison d'Israël !
  '10':
  - type: note
    content: 'Texte obscur et traduction conjecturale ; il s''agit peut-être, comme au v. 9, d''une description des ravages occasionnés par le tremblement de terre (v. 11 ; 1.1+) qui sert d''illustration au malheur à venir. –  Lorsqu''un parent…  : litt. son oncle et celui qui brûle porteront… ( ?) ; certains modifient le texte hébreu traditionnel pour lire il ne restera que peu de rescapés pour enlever de la maison les ossements  ; cf. 2.1. –  Silence ! 5.13 ; 8.3 ; Ha 2.20 ; So 1.7 ; Za 2.17 ; Ap 8.1. –  Car il ne faut pas… certains rattachent cette phrase au v. 11. –  évoquer le nom 2S 18.18 ; Es 26.13 ; 49.1 ; Os 12.6 ; Ps 6.6+.'
  - type: text
    content: 'Lorsqu''un parent prendra un mort pour le brûler et qu''il enlèvera de la maison les ossements, il dira à celui qui est au fond de la maison : Y a-t-il encore quelqu''un chez toi ? Et l''autre répondra : Personne… Alors il dira : Silence ! Car il ne faut pas évoquer le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'de démolition  : litt. et il frappera , cf. 3.15n  ; 9.1,5.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donne ses ordres de démolition :'
  - type: text
    content: la grande maison sera réduite en gravats,
  - type: text
    content: la petite en débris.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'y laboure-t-on…  : en séparant différemment les lettres du texte hébreu traditionnel on pourrait traduire laboure-t-on la mer avec des bœufs ? –  changé l''équité (ou le droit ) … la justice… 5.7+.'
  - type: text
    content: Les chevaux courent-ils sur le roc,
  - type: text
    content: y laboure-t-on avec des bœufs,
  - type: text
    content: pour que vous ayez changé l'équité en poison,
  - type: text
    content: et le fruit de la justice en absinthe ?
  - type: heading
    content: Deux victoires pour rien
  '13':
  - type: text
    content: ' '
  - type: note
    content: Lo-Dabar ou Lo-Debar , nom d'une ville (2S 9.4s ; 17.27 ; cf. Jos 13.26, Debir ) ; l'expression signifie aussi rien . De même Qarnaïm (Gn 14.5, également mentionnée en 1 Maccabées 5.26) signifie les deux cornes , la corne étant symbole de force (Jr 48.25 ; Za 2.1ss ; Ps 75.5+). Ces villes de Transjordanie figuraient peut-être parmi celles qu'Israël avait récemment reconquises (2R 13.25 ; 14.25). –  par notre force Dt 8.17 ; 9.4 ; 32.27 ; Jos 24.12 ; Jg 7.2 ; Es 10.13ss ; Os 1.7 ; cf. Lc 12.19 ; Ep 2.8s.
  - type: text
    content: Vous vous réjouissez de Lo-Dabar (« Rien »),
  - type: text
    content: 'vous dites : N''est-ce pas par notre force'
  - type: text
    content: que nous avons pris Qarnaïm (« Les Deux Cornes ») ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'une nation  : cf. 2R 17.5s ; Es 7.18s ; 10.5ss. –  depuis l''entrée de Hamath (v. 2n), au nord, à l''entrée du défilé entre le Liban et l''Anti-Liban Nb 13.21 ; 34.8 ; Jos 13.5 ; Jg 3.3 ; 1R 8.65 ; jusqu''à l''oued de la plaine aride (cf. Jos 8.14n), sans doute au sud de la mer Morte : l''expression désigne toute la région occupée par Israël à l''est du Jourdain (2R 14.25).'
  - type: text
    content: C'est pourquoi je suscite contre vous, maison d'Israël,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées –'
  - type: text
    content: une nation qui vous opprimera depuis l'entrée de Hamath
  - type: text
    content: jusqu'à l'oued de la plaine aride.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les villes de ce v., quoique prospères, tomberont ; il en sera de même pour Samarie. Du coup on peut lire ce texte ou bien comme l''annonce directe de la chute, ou bien comme l''expression d''un sentiment de sécurité (illusoire) de la part de ceux à qui le message s''adresse (v. 1). –  Kalné ou Kalno / Hamath , en Syrie : cf. v. 14 ; 2R 14.28 ; Jr 49.23 ; voir Es 10.8ss. –  Gath 1.6n  ; 1S 17.23 ; 2R 12.18 ; 2Ch 26.6. –  valent-elles mieux…  : beaucoup modifient légèrement le texte hébreu traditionnel pour lire valez-vous mieux que ces royaumes-là, et votre territoire est-il plus grand que le leur ? cf. Lc 18.11.'
  - type: text
    content: Passez à Kalné et regardez,
  - type: text
    content: de là, allez jusqu'à Hamath la grande,
  - type: text
    content: 'et descendez à Gath des Philistins :'
  - type: text
    content: valent-elles mieux que ces royaumes-ci,
  - type: text
    content: et leur territoire est-il plus grand que le vôtre ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Vous croyez éloigner  : litt. ceux qui éloignent  ; cf. 9.10 ; Jr 5.12. –  le règne  : litt. le bâton ou le règne  ; certains modifient le texte hébreu traditionnel pour lire l''année.'
  - type: text
    content: Vous croyez éloigner le jour du malheur,
  - type: text
    content: et vous faites approcher le règne de la violence.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 3.12,15. –  veaux ou taurillons 1S 28.24 ; Jr 46.21 ; Ml 3.20.
  - type: text
    content: Couchés sur des lits d'ivoire,
  - type: text
    content: vautrés sur des divans,
  - type: text
    content: ils mangent les jeunes béliers du troupeau,
  - type: text
    content: les veaux à l'étable.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Es 5.11s ; cf. Siracide 32.5s : « Un sceau d''escarboucle sur une garniture d''or, tel est un concert dans un banquet arrosé de vin. Un sceau d''émeraude sur une monture d''or, tel est un air de musique sur un vin délicieux. » –  Ils égrènent…  : sens incertain ; on a aussi compris ils improvisent (ou encore ils s''agitent ; ils braillent ) au son du luth . –  comme David…  : cf. Né 12.36 ; 1Ch 23.5. –  des instruments de musique (litt. de chant , cf. Ps 30.1, etc. ; voir aussi 1Ch 15.16n) certains modifient légèrement le texte hébreu traditionnel pour traduire toutes sortes de chants.'
  - type: text
    content: Ils égrènent les sons du luth,
  - type: text
    content: comme David, ils se sont inventé des instruments de musique.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '2.8 ; 4.1. –  calices  : le terme hébreu correspondant est dérivé de celui qui désigne l’ aspersion en Lv 1.5n  ; il évoque peut-être des ustensiles du culte ; cf. Ex 27.3 ; 1R 7.40 ; 2R 25.15 ; Za 9.15n  ; 14.20. –  ils se confèrent des onctions (du verbe qui a donné le mot messie = oint ) avec les prémices de l''huile Es 61.3 ; Ps 23.5 ; Ec 9.8 ; voir aussi Dt 26.10. –  ils ne souffrent pas Os 7.9. –  désastre  : autre traduction blessure  ; cf. Jr 4.6n  ; 6.14n. –  Joseph 5.6n.'
  - type: text
    content: Ils boivent du vin dans des calices,
  - type: text
    content: ils se confèrent des onctions avec les prémices de l'huile,
  - type: text
    content: ils ne souffrent pas du désastre de Joseph !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.5,27+ ; 7.11. –  les banquets  : autre traduction la confrérie  ; le même terme est traduit par rite funéraire en Jr 16.5.'
  - type: text
    content: C'est pourquoi maintenant ils vont être exilés en tête des exilés,
  - type: text
    content: et les banquets des vautrés prendront fin.
  - type: heading
    content: La destruction de Samarie
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur Dieu 3.7+. –  juré par lui-même  : litt. par son être ou par sa vie (Gn 1.20n) Am 4.2+. –  l''orgueil de Jacob (1.1n) : cf. 8.7 ; voir aussi Jr 13.9 ; Os 5.5 ; 7.10 ; Na 2.3. –  la ville  : sans doute Samarie ; d''autres comprennent toute ville.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' l''a juré par lui-même'
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées :'
  - type: text
    content: J'ai en horreur l'orgueil de Jacob,
  - type: text
    content: et je déteste ses palais ;
  - type: text
    content: je livrerai la ville, avec tout ce qui s'y trouve.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 5.3.
  - type: text
    content: 'Et s''il reste dix hommes dans une seule maison, ils mourront. '
