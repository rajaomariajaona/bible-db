document_id: ROM.10,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur . –  c''est qu''ils soient sauvés  : litt. pour (le) salut  ; cf. v. 10 ; 9.1-3.'
  - type: text
    content: 'Mes frères, le vœu de mon cœur et ma prière à Dieu pour eux, c''est qu''ils soient sauvés. '
  '10':
  - type: note
    content: '1.16s ; 3.21-28 ; 4.2-5 ; 5.17. –  qu''on a la foi…  : autre traduction qu''on croit pour (ou en vue de) la justice.'
  - type: text
    content: 'Car c''est avec le cœur qu''on a la foi qui mène à la justice, et c''est avec la bouche qu''on fait l''acte de reconnaissance qui mène au salut. '
  '11':
  - type: note
    content: 9.33 ; Es 28.16  ; cf. Ps 25.3.
  - type: text
    content: 'L''Ecriture dit en effet : Quiconque '
  - type: text
    content: croit en lui ne sera pas pris de honte
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'pas de distinction 3.22. –  Juif / Grec 1.14n,16+ ; cf. Ac 10.34 ; 15.9,11 ; Ga 3.28. –  ils ont tous le même Seigneur  : cf. 9.5n  ; Ac 10.36 ; Ph 2.9-11. –  riche 9.23+. –  pour tous ceux qui l''invoquent Ps 86.5.'
  - type: text
    content: 'Il n''y a pas de distinction, en effet, entre Juif et Grec : ils ont tous le même Seigneur, qui est riche pour tous ceux qui l''invoquent. '
  '13':
  - type: note
    content: Jl 3.5  ; Ac 2.21 ; 1Co 1.2+. – Voir nom.
  - type: text
    content: 'Car '
  - type: text
    content: quiconque invoquera le nom du Seigneur sera sauvé
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Comment…  : cf. Ac 8.31 ; Hé 11.6. –  qu''ils n''ont pas entendu proclamer  : autre traduction dont ils n''ont pas entendu parler . –  s''il n''y a personne pour proclamer  : cf. v. 8+.'
  - type: text
    content: 'Comment donc invoqueraient-ils celui en qui ils n''ont pas mis leur foi ? Et comment croiraient-ils en celui qu''ils n''ont pas entendu proclamer ? Et comment entendraient-ils, s''il n''y a personne pour proclamer ? '
  '15':
  - type: note
    content: 'Es 52.7 ; Na 2.1. –  les pas  : litt. les pieds. –  qui annoncent de bonnes nouvelles  : litt. qui annoncent la bonne nouvelle de bonnes choses, le verbe correspondant à annoncer la bonne nouvelle étant celui qui a donné notre verbe évangéliser (cf. 1.1n).'
  - type: text
    content: 'Et comment proclamerait-on, si l''on n''est pas envoyé ? Ainsi qu''il est écrit : '
  - type: text
    content: Qu'ils sont beaux, les pas de ceux qui annoncent de bonnes nouvelles !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'tous n''ont pas obéi  : le verbe grec est dérivé de celui pour entendre ou écouter  ; il fait assonance avec le terme traduit ici par ce qu''il nous a entendus dire et au v. 17 par ce qu''on entend  ; cf. 1.5+ ; Jn 10.26 ; 2Th 1.8 ; Hé 4.2. –  Seigneur, qui a cru… Es 53.1n  ; Jn 12.38n.'
  - type: text
    content: 'Mais tous n''ont pas obéi à la bonne nouvelle. En effet, Esaïe dit : '
  - type: text
    content: Seigneur, qui a cru ce qu'il nous a entendus dire ?
  - type: text
    content: ' '
  '17':
  - type: note
    content: 'Ga 3.2,5 ; cf. Jn 17.8. –  la parole du Christ  : autre traduction une parole du (ou au sujet du) Christ.'
  - type: text
    content: 'Ainsi la foi vient de ce qu''on entend, et ce qu''on entend par la parole du Christ. '
  '18':
  - type: note
    content: 'Ps 19.5. –  a retenti  : litt. est sortie. –  terre habitée Mt 24.14n/ / ; Col 1.6,23.'
  - type: text
    content: 'Mais je demande : N''ont-ils pas entendu ? Au contraire,'
  - type: text
    content: leur voix a retenti par toute la terre,
  - type: text
    content: leurs paroles jusqu'aux extrémités de la terre habitée
  - type: text
    content: .
  '19':
  - type: text
    content: ' '
  - type: note
    content: 11.11-14 ; Dt 32.21.
  - type: text
    content: 'Mais je demande : Israël ne l''a-t-il pas su ? Le premier, Moïse dit :'
  - type: text
    content: Je
  - type: text
    content: ' vous '
  - type: text
    content: rendrai jaloux de ce qui n'est pas une nation ;
  - type: text
    content: par une nation sans intelligence, je provoquerai
  - type: text
    content: ' votre '
  - type: text
    content: irritation
  - type: text
    content: .
  '2':
  - type: note
    content: une passion jalouse ou du zèle, de la jalousie  ; cf. v. 19 ; 11.11,14 ; Ac 5.17n  ; 22.3. –  non pas selon la connaissance (1.28n) ; cf. 2Co 3.14 ; 1Tm 1.13.
  - type: text
    content: 'Car je leur rends témoignage qu''ils ont une passion jalouse pour Dieu, mais non pas selon la connaissance. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'qui ne m''interrogeaient pas  : autre traduction qui ne me sollicitaient pas  ; cf. 9.30 ; Es 65.1.'
  - type: text
    content: 'Et Esaïe pousse l''audace jusqu''à dire :'
  - type: text
    content: J'ai été trouvé par ceux qui ne me cherchaient pas,
  - type: text
    content: je me suis manifesté à ceux qui ne m'interrogeaient pas
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Es 65.2  ; Pr 1.24 ; cf. Ac 13.45 ; 28.22. –  au sujet d''Israël  : autre traduction à Israël . –  Constamment 8.36n. –  conteste  : cf. Lc 2.34n.'
  - type: text
    content: 'Mais au sujet d''Israël il dit :'
  - type: text
    content: Constamment j'ai tendu les mains vers un peuple
  - type: text
    content: qui refuse d'obéir et qui conteste
  - type: text
    content: .
  '3':
  - type: note
    content: 'en méconnaissant  : autre traduction en ignorant  ; même verbe en 1.13 ; 6.3 ; 7.1 ; 11.25 ; Ac 3.17n. –  la justice de Dieu 1.17+ ; cf. 9.31s ; Lc 16.15 ; 18.9 ; Ph 3.9.'
  - type: text
    content: 'En effet, en méconnaissant la justice de Dieu et en cherchant à établir leur propre justice, ils ne se sont pas soumis à la justice de Dieu ; '
  '4':
  - type: note
    content: 'la fin  : le mot peut être entendu au sens de terme ou de finalité ; cf. 3.21s ; 8.2s ; 2Co 3.16 ; Ga 3.24 ; Hé 8.13 ; voir aussi Mt 5.17. –  justice 1Co 1.30s. –  quiconque croit 1.16 ; Jn 3.18 ; Ac 13.39.'
  - type: text
    content: car le Christ est la fin de la loi, pour que la justice soit à quiconque croit.
  - type: heading
    content: Parole, foi et salut
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'D''après certains mss, on pourrait aussi comprendre  : En effet, Moïse écrit que l''homme qui fera (c.-à-d. accomplira ) la justice qui vient de la loi vivra par elle (c.-à-d. par cette justice ) ; cf. 2.13 ; Lv 18.5  ; Ga 3.12.'
  - type: text
    content: 'En effet, Moïse écrit à propos de la justice qui vient de la loi : '
  - type: text
    content: L'homme qui fera ces choses vivra par elles
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'qui relève de la foi  : autre traduction qui est en vertu d''une foi. –  Ne dis pas en ton cœur Dt 9.4. –  Qui montera… Dt 30.12  ; Pr 30.4 ; Jn 3.13+ ; cf. Baruch 3.29 : « Qui est monté au ciel, qui s''est emparé d''elle (la sagesse), pour la faire descendre des nuées ? » –  c''est-à-dire  : la formule grecque qui apparaît ici et dans la suite (au v. 8 elle sera traduite par c''est là…  ; voir aussi 9.8) est caractéristique de l''exégèse typologique, en vogue notamment dans les écrits de Qumrân  ; elle introduit une interprétation actualisante du texte cité. En l''occurrence, la parole de Dieu dont il est question en Dt 30 est identifiée au Christ descendu du ciel et ressuscité d''entre les morts, et au message dont il est l''objet.'
  - type: text
    content: 'Mais voici comment parle la justice qui relève de la foi : '
  - type: text
    content: 'Ne dis pas en ton cœur : Qui montera au ciel ?'
  - type: text
    content: '  – c''est-à-dire : pour en faire descendre le Christ – '
  '7':
  - type: note
    content: 'Qui descendra dans l''abîme Ps 107.26  ; cf. Dt 30.13 ; Ps 71.20. –  faire remonter le Christ  : cf. Hé 13.20n.'
  - type: text
    content: 'ou : '
  - type: text
    content: Qui descendra dans l'abîme ?
  - type: text
    content: '  – c''est-à-dire : pour faire remonter le Christ d''entre les morts. '
  '8':
  - type: note
    content: 'Dt 30.14. –  que nous proclamons  : autre traduction dont nous sommes les hérauts v. 14s ; cf. 2.21 ; 16.25 ; Mc 1.4n.'
  - type: text
    content: 'Que dit-elle donc ? '
  - type: text
    content: La Parole est près de toi, dans ta bouche et dans ton cœur
  - type: text
    content: '  – c''est là la parole de la foi, que nous proclamons. '
  '9':
  - type: note
    content: 'tu reconnais…  : autres traductions tu déclares Jésus Seigneur, tu confesses que Jésus est Seigneur  ; sur le verbe, cf. Mt 10.32n  ; verbe apparenté Ph 2.11n. D''autres comprennent tu reconnais le Seigneur Jésus  ; cf. Ac 2.36 ; 1Co 12.3 ; 2Co 4.5n  ; Ph 2.11 ; Col 2.6. –  si… tu crois  : le même verbe est traduit par avoir (la) foi dans la suite ; cf. v. 16. –  réveillé ou relevé, 4.24n.'
  - type: text
    content: 'En effet, si, avec ta bouche, tu reconnais en Jésus le Seigneur, et si, avec ton cœur, tu crois que Dieu l''a réveillé d''entre les morts, tu seras sauvé. '
