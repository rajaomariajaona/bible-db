      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lc 21.24.'
      marker-yv: yv-n
    - type: text
      text: 'J''entendis l''homme vêtu de lin qui se tenait au-dessus des eaux du fleuve ; il leva vers le ciel sa main droite et sa main gauche, et il jura par celui qui est vivant pour toujours : Ce sera dans un temps, des temps et la moitié d''un temps ; quand la force du peuple saint sera entièrement épuisée, tout cela s''achèvera.'
