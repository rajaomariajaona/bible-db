      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme est également traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Lv 16.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. A la suite de ce chapitre, '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (LXX), suivi par les éditions catholiques, contient deux chapitres supplémentaires racontant l'histoire de Suzanne, condamnée injustement et sauvée par Daniel, et celle de Daniel dévoilant l'idolâtrie du dieu Bel, associé à un dragon, ce qui lui valut d'être jeté dans la fosse aux lions (cf. 6.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) d'où il ressortit indemne.
      marker-yv: yv-n
    - type: text
      text: Et toi, marche jusqu'à la fin ; tu te reposeras et tu te lèveras pour recevoir ton lot à la fin des jours.
