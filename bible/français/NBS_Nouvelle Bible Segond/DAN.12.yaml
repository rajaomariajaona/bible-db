document_id: DAN.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le temps d'affliction et la résurrection
  - type: text
    content: ' '
  - type: note
    content: 'Michel 10.13n. –  qui défend…  : litt. qui se tient (ou se dresse ) sur (ou pour ) les fils de ton peuple. –  un temps de détresse… Mt 24.21/ / ; Ap 7.14 ; 16.18. –  dans le livre 7.10+.'
  - type: text
    content: En ce temps-là se dressera
  - type: text
    content: Michel, le grand prince,
  - type: text
    content: celui qui défend les gens de ton peuple.
  - type: text
    content: Ce sera un temps de détresse
  - type: text
    content: tel qu'il n'y en a pas eu depuis qu'il existe une nation
  - type: text
    content: jusqu'à ce temps-là.
  - type: text
    content: En ce temps-là, ton peuple échappera
  - type: text
    content: – quiconque sera trouvé inscrit dans le livre.
  '10':
  - type: note
    content: purifiée… 11.35+. – Cf. Ap 22.11.
  - type: text
    content: 'Une multitude sera purifiée, blanchie et épurée ; les méchants agiront en méchants, et aucun des méchants ne comprendra, mais ceux qui auront du discernement comprendront. '
  '11':
  - type: note
    content: 'sacrifice constant 8.11n. –  l''horreur dévastatrice 9.27n  ; cf. 11.31 ; Mt 24.15n. –  mille deux cent quatre-vingt-dix jours  : la signification précise de cette période et de celle que mentionne le v. 12 (mille trois cent trente-cinq jours) nous est inconnue. Comme elles excèdent de peu les périodes indiquées en 7.25n et en 8.14n, on y a vu un délai supplémentaire alloué, au-delà de la purification du temple, à l''accomplissement prochain de la prophétie relative au temps de la fin (11.40ss).'
  - type: text
    content: 'Depuis le temps où le sacrifice constant sera supprimé, pour que soit établie l''horreur dévastatrice, il y aura mille deux cent quatre-vingt-dix jours. '
  '12':
  - type: note
    content: Cf. v. 11n  ; Ha 2.3 ; Mt 10.22 ; 24.13/ / ; Jc 1.12.
  - type: text
    content: 'Heureux celui qui attendra et qui arrivera jusqu''à mille trois cent trente-cinq jours ! '
  '13':
  - type: note
    content: 'Cf. v. 1-3. –  ton lot  : le terme est également traduit par sort, cf. Lv 16.8n. A la suite de ce chapitre, Daniel grec (LXX), suivi par les éditions catholiques, contient deux chapitres supplémentaires racontant l''histoire de Suzanne, condamnée injustement et sauvée par Daniel, et celle de Daniel dévoilant l''idolâtrie du dieu Bel, associé à un dragon, ce qui lui valut d''être jeté dans la fosse aux lions (cf. 6.17n) d''où il ressortit indemne.'
  - type: text
    content: Et toi, marche jusqu'à la fin ; tu te reposeras et tu te lèveras pour recevoir ton lot à la fin des jours.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Une multitude…  : autre traduction beaucoup de ceux qui dorment , 9.27n. –  au pays…  : autre traduction dans la terre poussiéreuse. –  se réveillera  : voir résurrection  ; cf. Es 26.19 ; Ez 37.1-14 ; Mt 27.52 ; Jn 5.28s ; Ac 24.15 ; 2 Maccabées 7.9,14 (dernières paroles de suppliciés lors de la persécution d''Antiochos) : « Tu nous exclus de la vie présente, mais le roi du monde, parce que nous serons morts pour ses lois, nous ressuscitera pour une vie éternelle… Mieux vaut mourir de la main des hommes en attendant, selon les promesses de Dieu, d''être ressuscité par lui, car pour toi (Antiochos) il n''y aura pas de résurrection à la vie. » –  les uns pour la vie éternelle (ou perpétuelle ) : l''expression n''apparaît qu''ici dans l''A.T. ; cf. Mt 25.46 ; Jn 3.15+. –  déshonneur / horreur éternelle  : cf. Es 66.24.'
  - type: text
    content: Une multitude,
  - type: text
    content: qui dort au pays de la poussière,
  - type: text
    content: se réveillera – les uns pour la vie éternelle
  - type: text
    content: et les autres pour le déshonneur, pour une horreur éternelle.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'discernement 11.33n. –  brilleront  : cf. Mt 13.43. –  la voûte céleste Gn 1.6n  ; Ez 1.22ss ; 10.1 ; Ps 19.2. –  ceux qui auront amené…  : litt. ceux qui auront justifié beaucoup  ; cf. 9.27n  ; 11.33 ; Es 53.11-12n.'
  - type: text
    content: Ceux qui auront eu du discernement brilleront
  - type: text
    content: comme brille la voûte céleste
  - type: text
    content: – ceux qui auront amené la multitude à la justice,
  - type: text
    content: comme des étoiles, pour toujours, à jamais.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'tiens secrètes / scelle  : cf. v. 9 ; 8.26 ; Ap 5.1 ; 10.4 ; 22.10. –  temps de la fin 11.40. –  cherchera  : litt. errera çà et là  ; cette expression a été prise en bonne part ( rechercher la révélation , notamment dans le livre ) ou en mauvaise part ( s''égarer ) ; le même verbe est traduit par tituber en Am 8.12. –  la connaissance  : LXX l''injustice , ce qui pourrait correspondre à une légère variante graphique du texte hébreu.'
  - type: text
    content: Quant à toi, Daniel, tiens secrètes ces paroles et scelle le livre jusqu'au temps de la fin. Une multitude alors cherchera, et la connaissance augmentera.
  - type: heading
    content: Le moment de la fin reste un secret
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'du fleuve  : en hébreu, ce mot désigne généralement le Nil ; ici, il s''agit sans doute du Tigre (10.4).'
  - type: text
    content: 'Et moi, Daniel, je vis deux autres hommes qui se tenaient debout, l''un sur une rive du fleuve, et l''autre sur l''autre rive du fleuve. '
  '6':
  - type: note
    content: Cf. 8.13s. –  homme vêtu de lin 10.4-7.
  - type: text
    content: 'L''un d''eux dit à l''homme vêtu de lin, qui se tenait au-dessus des eaux du fleuve : Quand viendra la fin de ces choses inouïes ? '
  '7':
  - type: note
    content: 'celui qui est vivant pour toujours 4.31+. –  un temps… 7.25n  ; le terme correspondant ici à temps est celui qui est traduit par temps fixé en 8.19 etc. ; cf. Gn 1.14n. –  quand la force…  : litt. quand sera achevé l''écrasement de la main du peuple saint  ; certains modifient le texte hébreu traditionnel pour lire quand prendra fin la main qui écrase (ou qui met en pièces, cf. Jr 51.20ss) le peuple saint  ; cf. Lc 21.24.'
  - type: text
    content: 'J''entendis l''homme vêtu de lin qui se tenait au-dessus des eaux du fleuve ; il leva vers le ciel sa main droite et sa main gauche, et il jura par celui qui est vivant pour toujours : Ce sera dans un temps, des temps et la moitié d''un temps ; quand la force du peuple saint sera entièrement épuisée, tout cela s''achèvera.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 24.3.
  - type: text
    content: 'J''entendis, mais je ne compris pas ; et je dis : Mon seigneur, quelle sera l''issue de ces choses ?'
  '9':
  - type: text
    content: ' '
  - type: note
    content: V. 4.
  - type: text
    content: 'Il répondit : Va, Daniel, car ces paroles seront tenues secrètes, scellées, jusqu''au temps de la fin. '
