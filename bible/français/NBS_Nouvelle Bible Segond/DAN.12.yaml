    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du fleuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en hébreu, ce mot désigne généralement le Nil ; ici, il s''agit sans doute du Tigre (10.4).'
      marker-yv: yv-n
    - type: text
      text: 'Et moi, Daniel, je vis deux autres hommes qui se tenaient debout, l''un sur une rive du fleuve, et l''autre sur l''autre rive du fleuve. '
