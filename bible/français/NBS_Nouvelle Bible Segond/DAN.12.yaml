        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quand la force…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
