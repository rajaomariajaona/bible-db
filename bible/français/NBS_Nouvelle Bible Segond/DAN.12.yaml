            text: n
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mille deux cent quatre-vingt-dix jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la signification précise de cette période et de celle que mentionne le v. 12 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mille trois cent trente-cinq jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) nous est inconnue. Comme elles excèdent de peu les périodes indiquées en 7.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' et en 8.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', on y a vu un délai supplémentaire alloué, au-delà de la purification du temple, à l''accomplissement prochain de la prophétie relative au temps de la fin (11.40ss).'
      marker-yv: yv-n
    - type: text
      text: 'Depuis le temps où le sacrifice constant sera supprimé, pour que soit établie l''horreur dévastatrice, il y aura mille deux cent quatre-vingt-dix jours. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ha 2.3 ; Mt 10.22 ; 24.13/ / ; Jc 1.12.'
      marker-yv: yv-n
    - type: text
      text: 'Heureux celui qui attendra et qui arrivera jusqu''à mille trois cent trente-cinq jours ! '
  '13':
