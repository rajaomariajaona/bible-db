  - type: usfm
    marker: q1
    children:
    - type: text
      text: Michel, le grand prince,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui défend les gens de ton peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un temps de détresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tel qu'il n'y en a pas eu depuis qu'il existe une nation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce temps-là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce temps-là, ton peuple échappera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – quiconque sera trouvé inscrit dans le livre.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'purifiée… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.35+. – Cf. Ap 22.11.
      marker-yv: yv-n
    - type: text
      text: 'Une multitude sera purifiée, blanchie et épurée ; les méchants agiront en méchants, et aucun des méchants ne comprendra, mais ceux qui auront du discernement comprendront. '
