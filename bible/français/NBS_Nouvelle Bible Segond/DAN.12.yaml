        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.9,14 (dernières paroles de suppliciés lors de la persécution d''Antiochos) : « Tu nous exclus de la vie présente, mais le roi du monde, parce que nous serons morts pour ses lois, nous ressuscitera pour une vie éternelle… Mieux vaut mourir de la main des hommes en attendant, selon les promesses de Dieu, d''être ressuscité par lui, car pour toi (Antiochos) il n''y aura pas de résurrection à la vie. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les uns pour la vie éternelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: perpétuelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : l''expression n''apparaît qu''ici dans l''A.T. ; cf. Mt 25.46 ; Jn 3.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déshonneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
