        text: 23.6ss ; cf. 18.14s+ ; 25.19.
    marker-yv: yv-n
  - type: text
    text: 'à moins que ce ne soit uniquement cette parole que j''ai criée, debout au milieu d''eux : « C''est à cause de la résurrection des morts que, moi, je suis aujourd''hui mis en jugement devant vous ! »'
