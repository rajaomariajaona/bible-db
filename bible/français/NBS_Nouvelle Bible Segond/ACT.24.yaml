        text: et qui demandait à voir Paul et à écouter sa parole. Voulant la satisfaire, il envoya chercher Paul…
    marker-yv: yv-n
  - type: text
    text: 'Quelques jours après, Félix vint avec Drusille, sa femme, qui était juive, et il envoya chercher Paul. Il l''écouta parler de la foi en Jésus-Christ. '
