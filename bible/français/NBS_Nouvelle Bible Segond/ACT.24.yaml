document_id: ACT.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'accusation des Juifs contre Paul
  - type: text
    content: ' '
  - type: note
    content: 'le grand prêtre Ananias 23.2n. –  descendit de Jérusalem à Césarée. –  anciens 11.30+. –  avocat  : le terme grec ainsi traduit a donné notre mot rhéteur (d''où rhétorique ). –  Ils portèrent plainte  : cf. 23.15n,30 ; 25.2,15.'
  - type: text
    content: 'Cinq jours après, le grand prêtre Ananias descendit, avec quelques anciens et un avocat, un certain Tertullus. Ils portèrent plainte auprès du gouverneur contre Paul. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 3s ; 26.2 ; d''après une reconstitution, le texte occidental aurait porté  : après que le gouverneur lui eut fait signe de présenter sa défense, lui, prenant une attitude divine (ou divinement inspirée ) , dit… –  bien des années  : autre traduction plusieurs années  ; cf. v. 27 ; 23.24n. –  juge  : certains mss portent le juge juste . –  ma défense 22.1n.'
  - type: text
    content: 'Après que le gouverneur lui eut fait signe de parler, Paul dit :'
  - type: text
    content: 'Je sais que depuis bien des années tu es juge de cette nation ; c''est donc avec confiance que je présenterai ma défense. '
  '11':
  - type: note
    content: douze jours v. 1 ; 21.27 ; cf. 21.7,18 ; 22.30 ; 23.12,32. –  à Jérusalem pour adorer 8.27n  ; 20.16 ; 21.23-26 ; voir aussi culte.
  - type: text
    content: 'Il n''y a pas plus de douze jours – tu peux t''en assurer – je suis monté à Jérusalem pour adorer. '
  '12':
  - type: note
    content: Voir temple. –  discuter 17.2n.
  - type: text
    content: 'On ne m''a trouvé ni dans le temple, ni dans les synagogues, ni dans la ville en train de discuter avec quelqu''un ou de provoquer un soulèvement de la foule. '
  '13':
  - type: text
    content: 'Ils ne peuvent pas non plus te prouver ce dont ils m''accusent maintenant. '
  '14':
  - type: note
    content: 'Cependant, je le reconnais (7.17n) devant toi  : d''après une reconstitution, cette phrase aurait été absente du texte occidental. –  voie 9.2+. –  parti v. 5+. –  tout ce qui est écrit… 26.22+ ; Lc 24.44s ; Rm 3.21. –  Loi / Prophètes Mt 5.17n.'
  - type: text
    content: 'Cependant, je le reconnais devant toi, c''est selon cette voie, qu''ils appellent un parti, que je rends un culte au Dieu de mes pères ; je crois tout ce qui est écrit dans la Loi et les Prophètes, '
  '15':
  - type: note
    content: 'eux-mêmes 23.6 ; 26.6-8 ; 28.20. –  résurrection des justes et des injustes  : cf. Dn 12.2 ; Lc 14.14 ; Jn 5.28s+.'
  - type: text
    content: 'et j''ai en Dieu l''espérance – eux-mêmes, d''ailleurs, partagent cette attente – qu''il y aura une résurrection des justes et des injustes. '
  '16':
  - type: note
    content: 'une conscience (23.1+) irréprochable  : autre traduction la conscience de ne donner aucun sujet d''achoppement  ; même terme 1Co 10.32 ; Ph 1.10 ; cf. 2Tm 1.3. –  Dieu / humains Pr 3.4.'
  - type: text
    content: 'C''est pourquoi, moi aussi, je m''exerce à avoir constamment une conscience irréprochable devant Dieu et les humains. '
  '17':
  - type: note
    content: 'Cf. 11.29+s ; 21.24-26 ; Mt 17.24. –  actes de compassion ou aumônes 3.2n. –  offrandes  : voir sacrifices.'
  - type: text
    content: 'Après bien des années, je suis venu faire des actes de compassion en faveur de ma nation et présenter des offrandes. '
  '18':
  - type: note
    content: '21.17. – Voir pur, impur. –  attroupement  : le même terme est habituellement traduit par foule  ; cf. Lc 22.6n.'
  - type: text
    content: 'C''est alors qu''ils m''ont trouvé, purifié, dans le temple, sans attroupement ni agitation. '
  '19':
  - type: note
    content: 'quelques Juifs d''Asie…  : la phrase est laissée en suspens ; cf. 21.17.'
  - type: text
    content: 'Seulement, quelques Juifs d''Asie… ce serait plutôt à eux de se présenter devant toi pour m''accuser, s''ils ont quelque chose contre moi. '
  '2':
  - type: note
    content: 'réquisitoire  : cf. Lc 23.2.'
  - type: text
    content: 'Celui-ci fut appelé, et Tertullus commença son réquisitoire par ces mots : La paix profonde dont nous jouissons grâce à toi et les réformes apportées à cette nation par ta prévoyance, '
  '20':
  - type: note
    content: V. 8+. –  quel forfait ils ont trouvé ou constaté  ; certains mss ajoutent en moi (c.-à-d. de quel forfait ils m'ont trouvé coupable).
  - type: text
    content: 'Ou bien, que ceux-ci disent quel forfait ils ont trouvé lorsque j''ai comparu devant le sanhédrin, '
  '21':
  - type: note
    content: 23.6ss ; cf. 18.14s+ ; 25.19.
  - type: text
    content: 'à moins que ce ne soit uniquement cette parole que j''ai criée, debout au milieu d''eux : « C''est à cause de la résurrection des morts que, moi, je suis aujourd''hui mis en jugement devant vous ! »'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'bien informé…  : cf. v. 24. –  la Voie 9.2+. –  Lysias 23.26 ; cf. 24.6n.'
  - type: text
    content: 'Félix, qui était bien informé de tout ce qui concernait la Voie, les renvoya à plus tard en disant : Quand le tribun militaire Lysias viendra, j''examinerai votre affaire. '
  '23':
  - type: note
    content: 'Cf. 23.16 ; 27.3 ; 28.16,20. –  s''occuper de lui  : litt. le servir.'
  - type: text
    content: Il donna l'ordre au centurion de le garder tout en lui laissant une certaine liberté, sans empêcher aucun des siens de s'occuper de lui.
  - type: heading
    content: Paul devant Félix et Drusille
  '24':
  - type: text
    content: ' '
  - type: note
    content: Drusille était la fille cadette d'Hérode Agrippa Ier (12.1) ; Félix l'avait enlevée à son premier mari, le roi d'Emèse (cf. v. 25 ; Mc 6.17-20/ /). Certains mss occidentaux précisent qui était juive et qui demandait à voir Paul et à écouter sa parole. Voulant la satisfaire, il envoya chercher Paul…
  - type: text
    content: 'Quelques jours après, Félix vint avec Drusille, sa femme, qui était juive, et il envoya chercher Paul. Il l''écouta parler de la foi en Jésus-Christ. '
  '25':
  - type: note
    content: 'la discussion 17.2n. –  justice / jugement  : cf. Jn 16.8. –  maîtrise de soi 2P 1.6+. –  saisi de crainte 10.4. –  quand j''en trouverai le temps  : variante occidentale au temps favorable. –  je te rappellerai  : cf. 17.32.'
  - type: text
    content: 'Mais, comme il faisait porter la discussion sur la justice, la maîtrise de soi et le jugement à venir, Félix, saisi de crainte, lui dit : Pour le moment, va-t''en ; quand j''en trouverai le temps, je te rappellerai. '
  '26':
  - type: text
    content: Il espérait, par ailleurs, que Paul lui donnerait de l'argent ; c'est pour cela aussi qu'il l'envoyait chercher assez fréquemment pour s'entretenir avec lui.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Deux années  : cf. 28.30. –  Porcius Festus , procurateur de Judée de 59 ou 60 à 62 apr. J.-C. –  Voulant accorder une faveur aux Juifs  : autre traduction voulant s''assurer la faveur des Juifs  ; le terme correspondant ici à faveur est souvent traduit par grâce (aussi 25.3) ; cf. 12.3 ; 25.9 ; variante occidentale à cause de Drusille . –  en prison  : litt. lié.'
  - type: text
    content: Deux années s'écoulèrent ainsi, puis Félix eut pour successeur Porcius Festus. Voulant accorder une faveur aux Juifs, Félix laissa Paul en prison.
  '3':
  - type: note
    content: 'Cf. v. 10. –  très excellent Félix 23.24+,26+. –  toujours (litt. en tout) et partout  : l''expression correspondante pourrait aussi se rapporter au v. 2 (p. ex.  : les réformes faites en tout point et en tout lieu…).'
  - type: text
    content: 'très excellent Félix, nous les accueillons toujours et partout avec une entière gratitude. '
  '4':
  - type: note
    content: 'un moment  : autre traduction brièvement. –  bienveillance  : cf. Ph 4.5n.'
  - type: text
    content: 'Mais, pour ne pas t''importuner davantage, je te prie de nous écouter un moment dans ta bienveillance. '
  '5':
  - type: note
    content: 'nous avons constaté…  : autre traduction nous avons trouvé cet homme, une peste (ou un danger public) qui provoque…  ; voir Ps 1.1n. –  disputes 15.2n  ; cf. 17.6+ ; Lc 23.2. – Voir Juifs. –  parti ou secte, voir 5.17n  ; cf. 24.14 ; 28.22. –  des nazoréens  : cf. 2.22+.'
  - type: text
    content: 'En effet, nous avons constaté que cet homme est une peste ; il provoque des disputes parmi tous les Juifs, sur toute la terre habitée ; c''est un dirigeant du parti des nazoréens. '
  '6':
  - type: note
    content: 'Cf. 6.13+ ; 21.28-30 ; 25.8. A la fin du v., certains mss, dont plusieurs témoins du texte occidental, ajoutent  : Nous avons voulu le juger selon notre loi, (7) mais le tribun Lysias est survenu et l''a tiré de nos mains avec une grande violence, (8) ordonnant à ses accusateurs de venir devant toi  ; du coup, la suite du v. 8 suggérerait d''interroger Lysias et non Paul (24.22). –  profaner le temple  : voir saint.'
  - type: text
    content: 'Il a même tenté de profaner le temple, et nous l''avons arrêté. [ '
  '7':
  - type: note
    content: V. 6n.
  - type: text
    content: '] '
  '8':
  - type: note
    content: Cf. v. 13,20 ; 4.9+.
  - type: text
    content: Tu pourras toi-même l'interroger pour vérifier tout ce dont nous l'accusons.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'prétendant  : même verbe en 25.19 ; Rm 1.22. –  qu''il en était bien ainsi  : cf. 7.1+.'
  - type: text
    content: Les Juifs l'approuvèrent, prétendant qu'il en était bien ainsi.
  - type: heading
    content: Paul présente sa défense devant le gouverneur Félix
