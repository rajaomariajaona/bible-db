  - type: text
    text: 'Mais, comme il faisait porter la discussion sur la justice, la maîtrise de soi et le jugement à venir, Félix, saisi de crainte, lui dit : Pour le moment, va-t''en ; quand j''en trouverai le temps, je te rappellerai. '
  - type: usfm
