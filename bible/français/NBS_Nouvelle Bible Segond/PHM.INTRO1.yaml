document_id: PHM.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Tout à la fin du recueil des épîtres pauliniennes apparaît ce billet qui, sous la forme d'une correspondance personnelle, traite du sort d'un esclave – c'est-à-dire, indirectement, de l'
  - type: text
    content: esclavage.
  - type: text
    content: ' A ce titre, il est souvent considéré comme un exercice d''application des principes que Paul avait pu énoncer dans les grandes épîtres (Rm 12.10 ; 1Co 7.20-24 ; Ga 3.28 ; cf. Ep 6.5-9 ; Col 3.22–4.1).'
  - type: text
    content: Car nous sommes ici en présence d'un cas concret. Le document s'accompagne d'allusions à une intrigue que le lecteur se sent pressé de démêler.
  - type: text
    content: Un billet privé, ou une autre épître aux Colossiens ?
  - type: text
    content: 'Le caractère privé de cet écrit touchant à un point qui relèverait presque du « secret professionnel » ne doit cependant pas occulter sa très large intention didactique. Le billet est adressé '
  - type: text
    content: à l'Eglise
  - type: text
    content: ' (v. 2), même si Philémon en reste le premier et le principal destinataire. Le ton liturgique de l''exorde et de la péroraison (v. 4 et 25) laisse bien entendre que Paul ne se départit pas de son autorité apostolique et qu''il pose ici, discrètement, un acte officiel susceptible de faire jurisprudence dans les communautés chrétiennes. Enfin, pour rester dans le genre « épître » (et non point lettre privée), expéditeurs, destinataires et mandataires sont plusieurs (v. 1,10,23-24).'
  - type: text
    content: 'Sept noms cités dans ce billet à Philémon apparaissent aussi en Colossiens 4.7-17 : Archippe, Onésime, Epaphras, Aristarque, Marc, Démas et Luc – ce qui en fait une sorte de « seconde (ou première) épître aux Colossiens ».'
  - type: text
    content: Le fond de l'affaire
  - type: text
    content: Onésime,
  - type: text
    content: ' l''antihéros de cette histoire, est peut-être un esclave en fuite. Il appartenait à '
  - type: text
    content: Philémon
  - type: text
    content: ', un notable chrétien, bienfaiteur de la jeune Eglise de Colosses (v. 5-7). Le départ de l''esclave a de toute façon créé un préjudice matériel pour le maître. Il se pourrait que, pour faire bonne mesure, Onésime soit parti avec la caisse (v. 18s). Dans ce cas, la situation d''Onésime n''était pas confortable. Une police spéciale recherchait les esclaves fugitifs ; ils étaient sévèrement punis et marqués au fer rouge afin d''être à jamais écartés d''un éventuel affranchissement. Mais on a aussi pensé à une situation plus banale : il était en effet courant et légal, au premier siècle, qu''un esclave craignant la colère de son maître aille chercher la protection d''un ami de celui-ci. Dans un tel cas, l''esclave n''était pas considéré comme fugitif. On peut donc imaginer qu''Onésime ait tout simplement cherché refuge auprès de l''apôtre après une dispute avec son maître.'
  - type: text
    content: Quoi qu'il en soit, connaissant les liens profonds qui unissent Philémon à Paul, – c'est Paul qui a gagné Philémon à la foi chrétienne – Onésime s'est arrangé pour aller rejoindre l'apôtre dans son lieu de détention (v. 1,9,10,23 ; à Ephèse ? cf. 1Co 15.32 ; dans la villa gardée de Rome ? cf. Ac 28.30), et il l'a sans doute supplié d'
  - type: text
    content: intercéder
  - type: text
    content: ' en sa faveur.'
  - type: text
    content: Paul a attaché provisoirement à son service Onésime, gagné à l'Evangile. Du coup le conflit entre le maître et l'esclave peut être porté devant l'Eglise, puisque les deux parties sont chrétiennes. Que va-t-il arriver ?
  - type: text
    content: 'On estimait sans doute que le converti se devait tout entier à celui qui l''avait converti. En tout cas, Paul est moralement en '
  - type: text
    content: position de force
  - type: text
    content: ' (v. 8,14,18,19,21). Au moins sur le plan matériel, il peut demander à Philémon de passer l''éponge. Le verset 19 est éloquent sur ce point.'
  - type: text
    content: 'Cela étant, Paul va-t-il imposer sa volonté, ou bien user d''une certaine prudence pastorale ? En fait – et cette finesse fait de l''épître un petit chef-d''œuvre – Paul demande le pardon et l''annulation de la dette, voire l''affranchissement du coupable, tout en usant d''un langage où il n''exige rien. C''est le procédé rhétorique de la '
  - type: text
    content: prétérition
  - type: text
    content: '  : le destinataire du billet reçoit une incitation pressante, mais sans pouvoir s''offusquer d''un propos trop net (on observera une démarche comparable dans l''extrait de la lettre de Pline présenté en encadré).'
  - type: text
    content: 'A Philémon donc de prendre une décision responsable. Le message de l''épître est tout entier dans cet appel à entrer dans la '
  - type: text
    content: liberté chrétienne
  - type: text
    content: ', où le bonheur d''appartenir au Christ s''épanouit dans l''obéissance à la vérité. A Philémon, comme à tout lecteur désormais, d''expérimenter la vie '
  - type: text
    content: dans le Christ
  - type: text
    content: ' et d''en mesurer les conséquences.'
  - type: text
    content: 'L''expression '
  - type: text
    content: dans le Christ
  - type: text
    content: ' (v. 8,20,23), fréquente dans les écrits de Paul, mérite quelque attention. Elle évoque, certes, la communion du fidèle avec son Seigneur ; mais elle rappelle surtout l''appartenance au corps de l''Eglise, communauté tangible, avec toutes ses exigences sociales.'
  - type: text
    content: Dans le Christ
  - type: text
    content: ', Philémon ne pourra en rester aux bonnes intentions. Dans cette situation concrète, il lui appartiendra de prendre les dispositions qui feront de l''esclave en mauvaise posture un membre de l''Eglise à part entière. Difficile pour lui de faire autrement quand Onésime est déjà, de fait, un compagnon reconnu de l''apôtre, sinon un émissaire apostolique. Quelques années plus tard, quand Ignace d''Antioche mentionne un certain Onésime, évêque d''Ephèse (I,3), il n''est pas impossible qu''il désigne l''ancien esclave.'
  - type: text
    content: Vers la suppression de l'esclavage
  - type: text
    content: 'On taxerait peut-être aujourd''hui l''apôtre de pusillanimité : pourquoi n''avoir pas saisi l''occasion pour prôner l''abolition de l''esclavage, au moins dans la société chrétienne ? La question n''était sans doute pas aussi simple : l''affranchissement d''un esclave supposait, en général, que quelqu''un en verse le prix. Vers le début du deuxième siècle, certaines Eglises locales ont commencé à le faire ; mais la confusion pouvait exister entre l''adhésion des esclaves à la foi chrétienne et le désir d''être – au sens profane – rachetés (voir en encadré la lettre d''Ignace d''Antioche à Polycarpe de Smyrne). L''époque de Paul en restera à des '
  - type: text
    content: initiatives individuelles
  - type: text
    content: ' et'
  - type: text
    content: exemplaires,
  - type: text
    content: ' comme ce fut sans doute le cas de Philémon à l''égard d''Onésime. Quoi qu''il en soit, l''esprit qui anime cette lettre devait, à la longue, rendre intolérable la notion même d''esclavage au sein d''une communauté chrétienne.'
