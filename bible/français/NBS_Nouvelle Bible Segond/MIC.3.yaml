document_id: MIC.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Avertissement aux chefs indignes
  - type: text
    content: ' '
  - type: note
    content: 'V. 9 ; cf. Jr 5.5 ; Os 5.1. –  Jacob / Israël 1.5n  ; 2.7. –  magistrats  : le mot ainsi traduit est rendu par capitaine en Jg 11.6,11, et par chef en Es 1.10 ; 3.6s. –  savoir ce qu''est l''équité  : cf. v. 8s ; 6.8 ; autre traduction connaître le droit  ; même terme en 7.9.'
  - type: text
    content: 'Je dis : Ecoutez, je vous prie, chefs de Jacob,'
  - type: text
    content: magistrats de la maison d'Israël !
  - type: text
    content: N'est-ce pas à vous de savoir ce qu'est l'équité ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'bâtissez Sion / Jérusalem  : cf. 2R 20.20 ; Es 5.8 ; voir aussi Am 3.13ss ; 5.11. –  dans le sang (litt. les sangs ) 1R 21 ; Es 1.15n,21ss ; cf. Ha 2.12. –  injustice  : voir justice.'
  - type: text
    content: vous qui bâtissez Sion dans le sang,
  - type: text
    content: Jérusalem dans l'injustice.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '7.3 ; Es 1.23 ; Jr 5.31 ; Ez 13.19. –  jugent Jg 2.16n. –  enseignent  : c''est le verbe d''où vient le mot hébreu tora, loi  ; cf. 4.2 ; Os 4.6 ; Ag 2.11nss ; Ml 2.7 ; voir aussi Lv 19.7 ; 22.23ss ; 27.8,12,14 ; Dt 33.8ss ; 1S 14.18s,36s. –  divination  : cf. v. 6n. –  ils s''appuient… Es 48.2 ; cf. 10.20 ; 50.10 ; Pr 3.5 ; 2Ch 13.18 ; 16.7s. –  parmi nous  : cf. 2.7 ; Ex 17.7 ; Dt 20.4 ; Jos 1.9 ; 3.10 ; Jg 6.12ss ; 1S 4 ; 2S 5.10 ; Es 12.6 ; Jr 7.4 ; 14.9 ; Am 5.14 ; Ps 46 ; Rm 2.17. –  Aucun malheur… Jr 5.12 ; Am 9.10.'
  - type: text
    content: Ses chefs jugent pour des pots-de-vin,
  - type: text
    content: ses prêtres enseignent pour un salaire,
  - type: text
    content: ses prophètes pratiquent la divination pour de l'argent ;
  - type: text
    content: 'et ils s''appuient sur le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est-il pas parmi nous ?'
  - type: text
    content: Aucun malheur ne s'abattra sur nous !
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 26.18 ; voir aussi 9.11 ; Mt 23.38 ; Jn 2.19ss. –  monceau de pierres 1.6 ; Ps 79.1. –  une hauteur , d'après des versions anciennes ; le texte hébreu traditionnel porte un pluriel ; le mot désigne ailleurs les hauts lieux.
  - type: text
    content: C'est donc bien à cause de vous
  - type: text
    content: que Sion sera labourée comme un champ,
  - type: text
    content: que Jérusalem deviendra un monceau de pierres,
  - type: text
    content: et que la montagne de la Maison deviendra une hauteur couverte de broussailles.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Vous détestez…  : cf. Am 5.14s ; voir aussi Es 5.20 ; Ml 1.2s. –  arrachez  : le même verbe est traduit par s''emparer de en 2.2. –  de dessus les gens  : litt. de dessus eux.'
  - type: text
    content: Vous détestez ce qui est bon
  - type: text
    content: et vous aimez ce qui est mauvais.
  - type: text
    content: Vous arrachez la peau de dessus les gens
  - type: text
    content: et la chair de dessus leurs os.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 3.15 ; 9.19n  ; Ez 34.1ss ; Za 11.15ss ; Ps 14.4 ; Ap 17.16. –  comme ce qu''on cuit…  : litt. comme ce qui (est) dans une marmite  ; certains modifient le texte pour lire comme la viande dans une marmite.'
  - type: text
    content: Ils dévorent la chair de mon peuple,
  - type: text
    content: ils lui enlèvent la peau
  - type: text
    content: et lui brisent les os.
  - type: text
    content: Ils le mettent en morceaux
  - type: text
    content: comme ce qu'on cuit dans une marmite,
  - type: text
    content: comme de la viande dans un chaudron.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ils crieront… Es 1.14s ; Jr 11.11 ; Ez 8.18 ; Am 8.12. –  il se détournera d''eux  : litt. il leur cachera sa face  ; cf. Es 59.2 ; Ps 13.2+ ; 22.25 ; 104.29.'
  - type: text
    content: 'Alors ils crieront vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mais il ne leur répondra pas ;
  - type: text
    content: il se détournera d'eux en ce temps-là,
  - type: text
    content: parce que leurs agissements sont mauvais.
  - type: heading
    content: Contre les prophètes qui égarent Israël
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 6.13s ; 23.32 ; voir aussi 14.13ss ; Ez 13.2ss. –  Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. 2.3). –  le Seigneur contre les prophètes 3.5 ; Jr 14.15 ; 23.15 ; Ez 13.9. –  Quand leurs dents…  : c.-à-d. si on les nourrit  ; cf. 2.11 ; 1S 9.7s ; 2R 5.15ss ; Lc 10.7 ; voir aussi Ex 23.8 ; Dt 16.19 ; 27.25. –  la paix  : autre traduction que tout ira bien . –  consacrent…  : litt. consacrent une guerre  ; cf. Jr 6.4n  ; Jl 4.9n.'
  - type: text
    content: 'Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre les prophètes'
  - type: text
    content: 'qui égarent mon peuple :'
  - type: text
    content: Quand leurs dents ont quelque chose à mordre,
  - type: text
    content: ils proclament la paix ;
  - type: text
    content: si quelqu'un ne met rien dans leur bouche,
  - type: text
    content: ils consacrent une armée pour lui faire la guerre !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1S 2.9 ; Es 5.30 ; Ez 7.26 ; Am 5.18ss ; 8.9 ; Za 13.4s. –  visions Es 1.1 ; Ab 1 ; Na 1.1. –  divinations v. 11 ; cf. Nb 22.7 ; 23.23 ; Dt 18.9ss ; 1S 6.2 ; 15.23 ; 28.8 ; 2R 17.17 ; Es 3.2 ; 44.25 ; Jr 27.9 ; 29.8 ; Ez 13.6,9,23 ; 21.26ss,34 ; Za 10.2 ; Pr 16.10n.
  - type: text
    content: A cause de cela, vous aurez la nuit… et plus de visions !
  - type: text
    content: Vous aurez les ténèbres… et plus de divinations !
  - type: text
    content: Le soleil se couchera sur ces prophètes,
  - type: text
    content: le jour s'assombrira sur eux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'se couvriront la moustache (ou la barbe ) : cf. 7.16 ; signe d''impureté (Lv 13.45) ou de deuil (Ez 24.17,22).'
  - type: text
    content: Les visionnaires seront confus,
  - type: text
    content: les devins rougiront,
  - type: text
    content: tous se couvriront la moustache ;
  - type: text
    content: car Dieu ne répondra pas.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Am 3.3-8. –  souffle  : voir esprit. –  d''équité  : cf. v. 1+. –  vaillance ou puissance, courage (terme apparenté à un mot qui désigne habituellement des guerriers ou des héros militaires, Jl 2.7 ; 4.9). –  transgression 1.5n  ; cf. Es 58.1.'
  - type: text
    content: Mais moi, je suis rempli de force,
  - type: text
    content: '– avec le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: d'équité et de vaillance,
  - type: text
    content: pour dire à Jacob sa transgression
  - type: text
    content: et à Israël son péché.
  - type: heading
    content: Michée annonce la ruine de Jérusalem
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 1+s ; Es 48.1. –  magistrats v. 1n. –  qui avez l''équité en abomination  : cf. Am 5.7. –  tordez (ou pervertissez ) toute droiture (2.7 ; 7.2) ; cf. Ex 23.1ss,6ss ; Lv 19.13ss ; Dt 16.19.'
  - type: text
    content: Ecoutez, je vous prie,
  - type: text
    content: chefs de la maison de Jacob,
  - type: text
    content: magistrats de la maison d'Israël,
  - type: text
    content: vous qui avez l'équité en abomination
  - type: text
    content: et qui tordez toute droiture,
