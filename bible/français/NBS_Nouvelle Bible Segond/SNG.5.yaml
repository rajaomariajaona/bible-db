  - type: text
    text: J'ai ouvert à mon bien-aimé ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais mon bien-aimé avait tourné le dos, il était passé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'ai défailli à ses paroles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai cherché et ne l'ai pas trouvé ;
- type: usfm
  marker: q1
  children:
  - type: text
