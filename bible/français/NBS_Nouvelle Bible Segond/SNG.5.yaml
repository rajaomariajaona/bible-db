  - type: text
    text: J'étais endormie, mais mon cœur veillait…
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est mon bien-aimé qui frappe :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ouvre-moi, ma sœur, mon amie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma colombe, ma parfaite !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ma tête est couverte de rosée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes boucles, des gouttelettes de la nuit. »
- type: usfm
