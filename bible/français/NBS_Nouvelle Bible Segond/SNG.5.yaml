document_id: SNG.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Lui
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.9-16. –  vin (1.2+) / lait Es 55.1. –  Mangez…  : cf. 1.8n. –  amis est le pluriel du mot traduit par compagne en 1.9. –  de caresses  : autre traduction bien-aimés , pluriel (en apostrophe) du nom habituellement donné à l''amoureux (cf. 1.13n).'
  - type: text
    content: J'entre dans mon jardin, ô mariée, ma sœur ;
  - type: text
    content: je recueille ma myrrhe avec mes essences odoriférantes,
  - type: text
    content: je mange mon rayon de miel avec mon miel,
  - type: text
    content: je bois mon vin avec mon lait…
  - type: heading
    content: Autres
  - type: text
    content: Mangez, amis, buvez, enivrez-vous de caresses !
  - type: heading
    content: Elle lui ouvre sa porte, mais trop tard
  - type: heading
    content: Elle
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'blanc et vermeil (ou roux ) : cf. 2.4 ; Gn 25.25 ; 1S 16.12 ; Lm 4.7. –  il se signale  : cf. 2.4n. –  dix mille  : cf. 2S 18.3 ; Ec 7.28.'
  - type: text
    content: Mon bien-aimé est blanc et vermeil ;
  - type: text
    content: il se signale entre dix mille.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'flottantes  : traduction incertaine ; le terme hébreu pourrait aussi désigner les grappes de fruits noirs de certains palmiers.'
  - type: text
    content: Sa tête est de l'or fin,
  - type: text
    content: ses boucles sont flottantes,
  - type: text
    content: noires comme le corbeau.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'yeux / colombes  : cf. 1.15+. –  près des torrents  : autres traductions sur les cours d''eau ; dans le lit des torrents  ; sur le terme correspondant, voir Ps 18.16n  ; Jb 6.15n.'
  - type: text
    content: Ses yeux sont comme des colombes
  - type: text
    content: près des torrents,
  - type: text
    content: se baignant dans le lait,
  - type: text
    content: reposant au sein de l'abondance.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'joues 1.10. –  parterre d''essences odoriférantes  : cf. 6.2.'
  - type: text
    content: Ses joues sont comme un parterre d'essences odoriférantes,
  - type: text
    content: des tours parfumées ;
  - type: text
    content: ses lèvres sont des lis
  - type: text
    content: d'où ruisselle la myrrhe répandue.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'chrysolithe  : cf. Ez 1.16n. –  son ventre  : litt. ses entrailles , comme au v. 4 ; l''expression désigne peut-être ici le sexe masculin. –  lapis-lazulis Ex 24.10n.'
  - type: text
    content: Ses mains sont des anneaux d'or
  - type: text
    content: garnis de chrysolithe ;
  - type: text
    content: son ventre est de l'ivoire poli
  - type: text
    content: couvert de lapis-lazulis.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'posées  : litt. fondées  ; cf. Ps 144.12. –  Son visage  : autre traduction son aspect  ; cf. 2.14n. –  Liban / cèdres  : cf. 1.17 ; 3.9.'
  - type: text
    content: Ses cuisses sont des colonnes de marbre blanc
  - type: text
    content: posées sur des bases d'or fin.
  - type: text
    content: Son visage est comme le Liban,
  - type: text
    content: il se distingue comme les cèdres.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Sa bouche  : litt. son palais  ; cf. 2.3+.'
  - type: text
    content: Sa bouche n'est que douceur,
  - type: text
    content: et tout son être est désirable.
  - type: text
    content: Tel est mon bien-aimé, tel est mon compagnon,
  - type: text
    content: filles de Jérusalem !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'mon cœur veillait  : évocation d''un rêve, que certains identifient au récit de 3.2–5.1.'
  - type: text
    content: J'étais endormie, mais mon cœur veillait…
  - type: text
    content: 'C''est mon bien-aimé qui frappe :'
  - type: text
    content: « Ouvre-moi, ma sœur, mon amie,
  - type: text
    content: ma colombe, ma parfaite !
  - type: text
    content: Car ma tête est couverte de rosée,
  - type: text
    content: mes boucles, des gouttelettes de la nuit. »
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'comment…  : hésitation pudique ou coquette ; quand elle se décidera (v. 5), il sera trop tard.'
  - type: text
    content: 'J''ai quitté ma tunique : comment la remettrais-je ?'
  - type: text
    content: Je me suis lavé les pieds ; comment les salirais-je ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''ouverture  : sans doute un trou dans la porte, par lequel il espérait actionner le verrou. –  ont frémi  : cf. Es 16.11 ; Pr 7.11n.'
  - type: text
    content: Mon bien-aimé a passé la main par l'ouverture,
  - type: text
    content: mes entrailles ont frémi à cause de lui.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ouvrir  : cf. v. 2 ; 4.12. –  myrrhe 1.13+ ; cf. 4.14s. Peut-être l''huile parfumée à la myrrhe était-elle destinée à graisser le verrou pour qu''il ne fasse pas de bruit.'
  - type: text
    content: Je me suis levée pour ouvrir à mon bien-aimé ;
  - type: text
    content: et de mes mains a ruisselé la myrrhe,
  - type: text
    content: de mes doigts, la myrrhe s'est répandue
  - type: text
    content: sur la poignée du verrou.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai défailli…  : litt. mon âme est sortie à son parler , ou, en interprétant différemment le dernier verbe, à sa fuite . L''ensemble de l''expression peut signifier aussi bien je me suis sentie défaillir que je suis sortie à sa recherche . –  Je l''ai cherché… 3.1.'
  - type: text
    content: J'ai ouvert à mon bien-aimé ;
  - type: text
    content: mais mon bien-aimé avait tourné le dos, il était passé.
  - type: text
    content: J'ai défailli à ses paroles.
  - type: text
    content: Je l'ai cherché et ne l'ai pas trouvé ;
  - type: text
    content: je l'ai appelé, et il ne m'a pas répondu.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.3 ; voir aussi 1.7n.
  - type: text
    content: Les gardes qui font le tour de la ville m'ont trouvée ;
  - type: text
    content: ils m'ont frappée, ils m'ont blessée,
  - type: text
    content: ils m'ont enlevé ma mantille, les gardes des murailles.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.7+. –  malade d'amour 2.5.
  - type: text
    content: Je vous en adjure, filles de Jérusalem,
  - type: text
    content: si vous trouvez mon bien-aimé,
  - type: text
    content: que lui direz-vous ?
  - type: text
    content: Que je suis malade d'amour.
  - type: heading
    content: Autres
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'bien-aimé 1.13n. –  Dis-le-nous  : sous-entendu dans le texte, de même 6.1. –  la plus belle 1.15+.'
  - type: text
    content: Qu'a-t-il de plus qu'un autre, ton bien-aimé ?
  - type: text
    content: Dis-le-nous, toi, la plus belle des femmes !
  - type: text
    content: Qu'a-t-il de plus qu'un autre, ton bien-aimé,
  - type: text
    content: pour que tu nous adjures ainsi ?
  - type: heading
    content: Elle
