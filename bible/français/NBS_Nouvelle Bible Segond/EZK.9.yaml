    marker-yv: yv-n
  - type: text
    text: 'Alors six hommes arrivèrent par la porte Haute qui donne sur le nord, chacun son arme de massacre à la main. Il y avait au milieu d''eux un homme vêtu de lin et portant une écritoire de scribe à la ceinture. Ils vinrent se placer près de l''autel de bronze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.28+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du Dieu d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''éleva… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cf. 10.3,18s ; 11.22s ; 43.2-5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du keroub
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des keroubim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le singulier de l''hébreu pourrait être compris comme un collectif ; cf. 10.1-4,14 ; voir aussi Gn 3.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 25.18-22 ; 1S 4.4 ; 2S 6.2 ; 1R 6.23-28 ; Ps 18.11 ; 80.2 ; 99.1.'
    marker-yv: yv-n
  - type: text
    text: 'La gloire du Dieu d''Israël s''éleva du keroub sur lequel elle était et se dirigea vers le seuil de la Maison ; et il appela l''homme vêtu de lin et portant une écritoire de scribe à la ceinture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une marque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: taw
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', nom de la dernière lettre de l''alphabet hébreu, à l''origine en forme de croix (X) ; cf. Jb 31.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; sur l''idée de marque protectrice, cf. Gn 4.15 ; Ex 12.7,13 ; Ap 7.2s ; 14.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abominations '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.5-17.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui dit : Passe au milieu de la ville, au milieu de Jérusalem, et fais une marque sur le front des hommes qui soupirent et qui gémissent à cause de toutes les abominations qui s''y commettent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 10 ; 5.11+ ; 8.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en ma présence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à mes oreilles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: après lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: derrière lui.
    marker-yv: yv-n
  - type: text
    text: 'Et, en ma présence, il dit aux autres : Passez après lui dans la ville et frappez ; que votre œil soit sans pitié, n''épargnez personne ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jeunes filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vierges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même terme 44.22). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: femmes et familles entières
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: enfants et femmes
    - type: usfm
