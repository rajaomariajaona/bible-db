document_id: EZK.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Châtiment infligé à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'je l''entendis crier  : litt. il cria à mes oreilles . –  châtiments  : le terme hébreu est apparenté au verbe fréquemment traduit par faire rendre des comptes à  ; cf. Jr 6.15n.'
  - type: text
    content: 'Puis je l''entendis crier à pleine voix : Approchez, châtiments de la ville, chacun son arme de destruction à la main !'
  '10':
  - type: note
    content: 'V. 5. –  leur voie  : autre traduction leur conduite  ; cf. 7.3-4n  ; 11.21 ; 16.43 ; 22.31.'
  - type: text
    content: 'Moi aussi, mon œil sera sans pitié, je n''épargnerai personne ; je ferai retomber leur voie sur leur tête. '
  '11':
  - type: note
    content: V. 2-4.
  - type: text
    content: 'L''homme vêtu de lin et portant une écritoire à la ceinture fit son rapport : J''ai fait ce que tu m''as ordonné.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'par la porte Haute  : litt. par le chemin de la porte Haute  ; cf. Jr 20.2n. –  arme de massacre  : litt. arme (ou outil, objet , de même au v. 1) pour fracasser ou pour mettre en pièces  ; cf. Jr 51.20n. –  homme vêtu de lin v. 3s,11 ; 10.2,6s ; le terme hébreu traduit par lin s''applique habituellement aux vêtements des prêtres (1.3) : cf. Ex 28.42 ; 39.28 ; Lv 6.3 ; 16.4,23,32 ; 1S 2.18 ; 22.18 ; 2S 6.14 ; Dn 10.5 ; 12.6s. –  à la ceinture  : litt. aux reins.'
  - type: text
    content: 'Alors six hommes arrivèrent par la porte Haute qui donne sur le nord, chacun son arme de massacre à la main. Il y avait au milieu d''eux un homme vêtu de lin et portant une écritoire de scribe à la ceinture. Ils vinrent se placer près de l''autel de bronze. '
  '3':
  - type: note
    content: 'gloire 1.28+. –  du Dieu d''Israël 8.4. –  s''éleva… cf. 10.3,18s ; 11.22s ; 43.2-5. –  du keroub  : LXX des keroubim  ; le singulier de l''hébreu pourrait être compris comme un collectif ; cf. 10.1-4,14 ; voir aussi Gn 3.24n  ; Ex 25.18-22 ; 1S 4.4 ; 2S 6.2 ; 1R 6.23-28 ; Ps 18.11 ; 80.2 ; 99.1.'
  - type: text
    content: 'La gloire du Dieu d''Israël s''éleva du keroub sur lequel elle était et se dirigea vers le seuil de la Maison ; et il appela l''homme vêtu de lin et portant une écritoire de scribe à la ceinture. '
  '4':
  - type: note
    content: 'une marque  : hébreu taw, nom de la dernière lettre de l''alphabet hébreu, à l''origine en forme de croix (X) ; cf. Jb 31.35n  ; sur l''idée de marque protectrice, cf. Gn 4.15 ; Ex 12.7,13 ; Ap 7.2s ; 14.1. –  abominations 8.5-17.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Passe au milieu de la ville, au milieu de Jérusalem, et fais une marque sur le front des hommes qui soupirent et qui gémissent à cause de toutes les abominations qui s''y commettent. '
  '5':
  - type: note
    content: 'Cf. v. 10 ; 5.11+ ; 8.18. –  en ma présence  : litt. à mes oreilles. –  après lui  : autre traduction derrière lui.'
  - type: text
    content: 'Et, en ma présence, il dit aux autres : Passez après lui dans la ville et frappez ; que votre œil soit sans pitié, n''épargnez personne ! '
  '6':
  - type: note
    content: 'jeunes filles  : litt. vierges (même terme 44.22). –  femmes et familles entières  : autre traduction enfants et femmes  ; cf. Gn 34.29n. –  quiconque aura sur lui la marque  : cf. v. 4+ ; voir aussi Ap 9.4. –  commencez par mon sanctuaire  : cf. Jr 25.29 ; 1P 4.17.'
  - type: text
    content: 'Tuez, détruisez, vieillards, jeunes gens, jeunes filles, femmes et familles entières ; mais laissez hors d''atteinte quiconque aura sur lui la marque, et commencez par mon sanctuaire ! Ils commencèrent par les hommes, ces anciens qui étaient devant la Maison. '
  '7':
  - type: note
    content: 'Cf. 6.5n. –  impure  : voir pur. –  de vos victimes  : litt. de transpercés  ; la racine hébraïque correspondante peut aussi évoquer (par homonymie ?) la profanation (voir saint).'
  - type: text
    content: 'Il leur dit : Rendez la Maison impure et remplissez ses cours de vos victimes ! Sortez ! Ils sortirent et ils frappèrent dans la ville.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'face contre terre 1.28n. –  détruiras-tu tout le reste (5.3+) d''Israël  : cf. 11.13 ; Ex 32.11-13 ; Es 37.4 ; Jr 7.16+ ; 27.18 ; Am 7.2,5.'
  - type: text
    content: 'Comme ils frappaient et que je restais encore, je tombai face contre terre et je m''écriai : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', détruiras-tu tout le reste d''Israël, en répandant ta fureur sur Jérusalem ? '
  '9':
  - type: note
    content: 'faute  : voir péché. –  très grande, immense  : litt. très très grande  ; cf. 37.10n. –  d''effusions de sang, comme en 7.23n. –  le Seigneur ne voit rien 8.12+.'
  - type: text
    content: 'Il me répondit : La faute de la maison d''Israël et de Juda est très grande, immense ; le pays est rempli d''effusions de sang, la ville est pleine de perversion, car ils disent : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a abandonné le pays, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne voit rien. '
