      - type: text
        text: 's''applique habituellement aux vêtements des prêtres (1.3) : cf. Ex 28.42 ; 39.28 ; Lv 6.3 ; 16.4,23,32 ; 1S 2.18 ; 22.18 ; 2S 6.14 ; Dn 10.5 ; 12.6s. –  '
    - type: usfm
