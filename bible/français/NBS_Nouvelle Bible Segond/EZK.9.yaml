        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quiconque aura sur lui la marque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 4+ ; voir aussi Ap 9.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commencez par mon sanctuaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 25.29 ; 1P 4.17.'
    marker-yv: yv-n
  - type: text
    text: 'Tuez, détruisez, vieillards, jeunes gens, jeunes filles, femmes et familles entières ; mais laissez hors d''atteinte quiconque aura sur lui la marque, et commencez par mon sanctuaire ! Ils commencèrent par les hommes, ces anciens qui étaient devant la Maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 6.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de vos victimes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de transpercés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la racine hébraïque correspondante peut aussi évoquer (par homonymie ?) la profanation (voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Rendez la Maison impure et remplissez ses cours de vos victimes ! Sortez ! Ils sortirent et ils frappèrent dans la ville.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'face contre terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'détruiras-tu tout le reste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(5.3+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 11.13 ; Ex 32.11-13 ; Es 37.4 ; Jr 7.16+ ; 27.18 ; Am 7.2,5.'
    marker-yv: yv-n
  - type: text
    text: 'Comme ils frappaient et que je restais encore, je tombai face contre terre et je m''écriai : Ah ! Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: ', détruiras-tu tout le reste d''Israël, en répandant ta fureur sur Jérusalem ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: faute
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: très grande, immense
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: très très grande
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 37.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'effusions de sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 7.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' ne voit rien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.12+.
    marker-yv: yv-n
  - type: text
    text: 'Il me répondit : La faute de la maison d''Israël et de Juda est très grande, immense ; le pays est rempli d''effusions de sang, la ville est pleine de perversion, car ils disent : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a abandonné le pays, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne voit rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur voie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur conduite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 7.3-4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 11.21 ; 16.43 ; 22.31.'
    marker-yv: yv-n
  - type: text
    text: 'Moi aussi, mon œil sera sans pitié, je n''épargnerai personne ; je ferai retomber leur voie sur leur tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 2-4.
    marker-yv: yv-n
  - type: text
    text: 'L''homme vêtu de lin et portant une écritoire à la ceinture fit son rapport : J''ai fait ce que tu m''as ordonné.'
