document_id: GEN.38,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Juda et Tamar
  - type: text
    content: ' '
  - type: note
    content: 's''éloigna  : litt. descendit (de la région montagneuse de Juda vers la plaine). –  Adoullam  : localité située entre Hébron et Gaza, au sud-ouest de Jérusalem (Jos 12.15 ; Mi 1.15). C''est aussi le nom de la caverne où se réfugiera David (1S 22.1).'
  - type: text
    content: 'En ce temps-là, Juda s''éloigna de ses frères et se retira auprès d''un homme d''Adoullam nommé Hira. '
  '10':
  - type: note
    content: Cf. v. 7 ; 49.10.
  - type: text
    content: 'Ce qu''il faisait déplut au '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui le fit aussi mourir. '
  '11':
  - type: note
    content: 'Rt 1.11-13. Cf. Tobit 3.8 : « Elle (Sara, fille de Ragouël) avait été donnée sept fois en mariage, et (…) Asmodée, le démon mauvais, avait tué chaque fois ses maris avant qu''ils ne soient unis à elle, selon le devoir qu''on a envers une épouse. La servante lui dit donc : “C''est toi qui tues tes maris ! En voilà déjà sept à qui tu as été donnée, et tu n''as pas porté le nom d''un seul !” »'
  - type: text
    content: 'Alors Juda dit à Tamar, sa belle-fille : Puisque tu es veuve, reste chez ton père jusqu''à ce que Shéla, mon fils, soit grand. Car il se disait : Celui-là aussi va mourir comme ses frères. Tamar s''en alla et resta chez son père.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Timna  : localité de Juda, non loin d''Adoullam (v. 1) ; Jos 15.10 ; Jg 14.1. – La tonte des moutons était l''occasion d''une grande fête (cf. 1S 25.2-4 ; 2S 13.23).'
  - type: text
    content: 'Bien des jours s''écoulèrent, et la femme de Juda, la fille de Shoua, mourut. Lorsque Juda se fut consolé, il monta à Timna, chez ceux qui tondaient son petit bétail, avec son ami Hira, l''Adoullamite. '
  '13':
  - type: text
    content: 'On en informa Tamar, en disant : Ton beau-père monte à Timna pour tondre son petit bétail. '
  '14':
  - type: note
    content: 'En dehors des occasions spéciales comme le mariage (24.65 ; 29.23-25), le voile ne servait qu''à dissimuler son identité. –  dont elle s''enveloppa  : autres traductions et se déguisa ; et se farda  ; cf. Judith 10.3s : « Elle (Judith) enleva le sac dont elle était revêtue, elle quitta ses habits de veuve, elle lava son corps avec de l''eau et l''oignit d''une épaisse huile parfumée ; elle peigna les cheveux de sa tête, elle y mit un bandeau et revêtit ses habits de fête dont elle se couvrait aux jours où vivait son mari, Manassé ; elle prit des sandales aux pieds, elle mit ses colliers, ses bracelets, ses bagues, ses boucles d''oreilles et toutes ses parures et se fit très élégante pour séduire les yeux des hommes qui la verraient. » –  Eïnaïm (« Les Deux Sources ») est probablement l’Eïnam de Jos 15.34, à l''ouest de Timna.'
  - type: text
    content: Alors elle retira ses habits de veuve, elle se couvrit d'un voile dont elle s'enveloppa et s'assit à l'entrée d'Eïnaïm, sur le chemin de Timna. Car elle avait vu que Shéla était devenu grand et qu'elle ne lui avait pas été donnée pour femme.
  '15':
  - type: text
    content: 'Juda la vit et la prit pour une prostituée, parce qu''elle avait le visage couvert. '
  '16':
  - type: note
    content: donc 11.3n.
  - type: text
    content: 'Il l''aborda sur le chemin et dit : Laisse-moi donc aller avec toi, je te prie ! – il ne savait pas que c''était sa belle-fille. Elle dit : Que vas-tu me donner pour aller avec moi ? '
  '17':
  - type: note
    content: 'un chevreau  : litt. un chevreau de chèvres du petit bétail.'
  - type: text
    content: 'Il répondit : Je t''enverrai un chevreau. Elle dit : Alors donne-moi un gage, jusqu''à ce que tu l''envoies. '
  '18':
  - type: note
    content: 'sceau / cordon / bâton  : ces objets portaient des marques identifiant leur propriétaire : le cordon était sans doute passé dans l''axe d''un sceau cylindrique ou d''un anneau qui servait de cachet (Jr 22.24 ; Ag 2.23 ; Ct 8.6 ; Jn 6.27). Le mot bâton signifie aussi tribu (peut-être en référence au bâton qui symbolise l''autorité du chef de tribu, mais la relation éventuelle entre ces deux sens est incertaine).'
  - type: text
    content: 'Il répondit : Quel gage te donnerai-je ? Elle dit : Ton sceau, ton cordon et le bâton que tu as à la main. Il les lui donna. Puis il alla avec elle, et elle fut enceinte de lui. '
  '19':
  - type: note
    content: 's''en alla  : litt. se leva et s''en alla.'
  - type: text
    content: Elle s'en alla ; elle retira son voile et remit ses habits de veuve.
  '2':
  - type: note
    content: Cananéen 10.15-19.
  - type: text
    content: 'Là, Juda vit la fille d''un Cananéen nommé Shoua ; il la prit pour femme et alla avec elle. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Litt. Juda envoya le chevreau des chèvres par la main de son ami… pour prendre le gage de la main de la femme…
  - type: text
    content: 'Juda envoya son ami l''Adoullamite chez la femme pour lui apporter le chevreau et reprendre le gage. Mais il ne la trouva pas. '
  '21':
  - type: note
    content: 'prostituée sacrée  : litt. consacrée  ; le terme hébreu (de même au v. 22) vient de la même racine que les mots habituellement traduits par saint, sacré, consacrer etc. Outre la prostitution commune, l''Antiquité connaissait la prostitution sacrée, notamment dans le cadre des cultes de la fertilité. Le même terme et son équivalent masculin reviennent en Dt 23.18 ; 1R 14.24 ; 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14 ; Jb 36.14. Selon certains, dans plusieurs de ces passages ils pourraient désigner des serviteurs ou des servantes « consacrés », c.-à-d. attachés à des sanctuaires (cf. les hiérodules de l''Antiquité grecque), sans qu''il s''agisse nécessairement de prostitué(e)s. Ici cependant le contexte évoque clairement la prostitution.'
  - type: text
    content: 'Il demanda aux hommes du lieu : Où est cette prostituée sacrée qui se tenait à Eïnaïm, sur le chemin ? Ils répondirent : Il n''y a jamais eu ici de prostituée sacrée ! '
  '22':
  - type: text
    content: 'Il retourna auprès de Juda et dit : Je ne l''ai pas trouvée ; les hommes du lieu ont même dit : « Il n''y a jamais eu ici de prostituée sacrée ! » '
  '23':
  - type: text
    content: 'Juda dit : Qu''elle garde ce qu''elle a ! Ne nous exposons pas au mépris. J''ai envoyé ce chevreau, mais toi, tu ne l''as pas trouvée.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 21.9.
  - type: text
    content: 'Environ trois mois après, on vint dire à Juda : Tamar, ta belle-fille, s''est prostituée ; elle est même enceinte de sa prostitution ! Alors Juda dit : Faites-la sortir, et qu''elle soit brûlée ! '
  '25':
  - type: note
    content: 'de l''homme  : litt. pour l''homme. –  Regarde-les 31.32n.'
  - type: text
    content: 'Comme on la faisait sortir, elle fit dire à son beau-père : C''est de l''homme à qui ces objets appartiennent que je suis enceinte. Elle dit : Regarde-les, je t''en prie, pour voir à qui sont ce sceau, ces cordons et ce bâton. '
  '26':
  - type: note
    content: Cf. 1S 24.18. – Voir justice. –  n'eut plus de relations… 4.1n  ; Lv 18.15+.
  - type: text
    content: 'Juda les regarda et dit : Elle est plus juste que moi, puisque je ne l''ai pas donnée à Shéla, mon fils ; et il n''eut plus de relations avec elle.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. 25.24.
  - type: text
    content: 'Quand vint pour elle le temps d''accoucher, il y avait des jumeaux dans son ventre. '
  '28':
  - type: note
    content: 'écarlate  : cf. Ex 25.4n.'
  - type: text
    content: 'Pendant l''accouchement il y en eut un qui présenta la main ; la sage-femme la saisit et y attacha un fil écarlate en disant : Celui-ci est sorti le premier. '
  '29':
  - type: note
    content: il l'appela ou, peut-être, on l'appela  ; certains mss hébreux, Smr, Syr et le Targum (Tg) du pseudo-Jonathan portent elle l'appela  ; de même au v. 30 ; cf. v. 3n. –  Pérets signifie brèche ou éclatement, explosion (cf. 28.14n  ; 30.30n,43n). Voir Rt 4.18-22 ; Mt 1.3-6. Ce nom se retrouve dans celui de plusieurs localités proches de Jérusalem (2S 5.20 ; 6.8 ; Es 28.21).
  - type: text
    content: 'Mais il retira la main, et son frère sortit. Alors la sage-femme dit : Quelle brèche tu t''es ouverte ! Et il l''appela du nom de Pérets (« La Brèche »). '
  '3':
  - type: note
    content: 'il (ou elle, selon quelques mss hébreux, Smr et Tg) appela  : cf. v. 29n.'
  - type: text
    content: 'Elle fut enceinte et mit au monde un fils, qu''il appela du nom d''Er. '
  '30':
  - type: note
    content: Zérah signifie éclat (allusion au fil de couleur vive, cf. Jos 2.21). Cf. 36.13 ; 46.12 ; Nb 26.19-21 ; 1Ch 2.3s.
  - type: text
    content: Ensuite sortit son frère, qui avait à la main le fil écarlate ; et il l'appela du nom de Zérah (« Eclat »).
  '4':
  - type: text
    content: 'Elle fut encore enceinte et mit au monde un fils, qu''elle appela du nom d''Onân. '
  '5':
  - type: note
    content: 'Shéla  : cf. 1Ch 4.21-23. –  Juda était  : litt. il était. –  Kezib  : sans doute s''agit-il d''Akzib, dans la même région qu''Adoullam, sur le versant ouest des monts de Juda (Jos 15.44 ; Mi 1.14). Smr a lu Kozéba, comme en 1Ch 4.22.'
  - type: text
    content: Une fois encore, elle mit au monde un fils, qu'elle appela du nom de Shéla ; Juda était à Kezib quand elle accoucha.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Tamar est aussi le nom d'une ville de Juda située au sud-ouest de la mer Morte, près de la frontière d'Edom (cf. v. 30n).
  - type: text
    content: 'Juda prit pour Er, son premier-né, une femme nommée Tamar. '
  '7':
  - type: note
    content: 'déplut au Seigneur  : litt. fut mauvais aux yeux du Seigneur  ; cf. v. 10 ; Jg 2.11n. –  le Seigneur le fit mourir  : cf. Ex 4.24-26 ; Ct 3.8n. Sur l''absence de motivation explicite du jugement divin, cf. 3.22 ; 4.5 ; 11.6s ; voir aussi 1S 2.6.'
  - type: text
    content: 'Er, premier-né de Juda, déplut au '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le fit mourir. '
  '8':
  - type: note
    content: 'Dt 25.5-10. –  remplis… ton devoir de beau-frère  : coutume du lévirat (cf. Dt 25.5n), selon laquelle le frère du défunt doit assumer la charge de la veuve et susciter une descendance à son frère mort sans enfant.'
  - type: text
    content: 'Alors Juda dit à Onân : Va avec la femme de ton frère, remplis envers elle ton devoir de beau-frère et suscite une descendance à ton frère. '
  '9':
  - type: note
    content: 'sa semence  : sous-entendu dans le texte.'
  - type: text
    content: 'Onân savait que cette descendance ne lui appartiendrait pas ; lorsqu''il allait avec la femme de son frère, il laissait sa semence se perdre par terre, afin de ne pas donner de descendance à son frère. '
