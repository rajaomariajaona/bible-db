document_id: GEN.38,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Juda et Tamar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'éloigna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'descendit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de la région montagneuse de Juda vers la plaine). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adoullam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité située entre Hébron et Gaza, au sud-ouest de Jérusalem (Jos 12.15 ; Mi 1.15). C''est aussi le nom de la caverne où se réfugiera David (1S 22.1).'
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, Juda s''éloigna de ses frères et se retira auprès d''un homme d''Adoullam nommé Hira. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 7 ; 49.10.
      marker-yv: yv-n
    - type: text
      text: 'Ce qu''il faisait déplut au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui le fit aussi mourir. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rt 1.11-13. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.8 : « Elle (Sara, fille de Ragouël) avait été donnée sept fois en mariage, et (…) Asmodée, le démon mauvais, avait tué chaque fois ses maris avant qu''ils ne soient unis à elle, selon le devoir qu''on a envers une épouse. La servante lui dit donc : “C''est toi qui tues tes maris ! En voilà déjà sept à qui tu as été donnée, et tu n''as pas porté le nom d''un seul !” »'
      marker-yv: yv-n
    - type: text
      text: 'Alors Juda dit à Tamar, sa belle-fille : Puisque tu es veuve, reste chez ton père jusqu''à ce que Shéla, mon fils, soit grand. Car il se disait : Celui-là aussi va mourir comme ses frères. Tamar s''en alla et resta chez son père.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Timna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité de Juda, non loin d''Adoullam (v. 1) ; Jos 15.10 ; Jg 14.1. – La tonte des moutons était l''occasion d''une grande fête (cf. 1S 25.2-4 ; 2S 13.23).'
      marker-yv: yv-n
    - type: text
      text: 'Bien des jours s''écoulèrent, et la femme de Juda, la fille de Shoua, mourut. Lorsque Juda se fut consolé, il monta à Timna, chez ceux qui tondaient son petit bétail, avec son ami Hira, l''Adoullamite. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On en informa Tamar, en disant : Ton beau-père monte à Timna pour tondre son petit bétail. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En dehors des occasions spéciales comme le mariage (24.65 ; 29.23-25), le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ne servait qu''à dissimuler son identité. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dont elle s'enveloppa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et se déguisa ; et se farda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Judith
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.3s : « Elle (Judith) enleva le sac dont elle était revêtue, elle quitta ses habits de veuve, elle lava son corps avec de l''eau et l''oignit d''une épaisse huile parfumée ; elle peigna les cheveux de sa tête, elle y mit un bandeau et revêtit ses habits de fête dont elle se couvrait aux jours où vivait son mari, Manassé ; elle prit des sandales aux pieds, elle mit ses colliers, ses bracelets, ses bagues, ses boucles d''oreilles et toutes ses parures et se fit très élégante pour séduire les yeux des hommes qui la verraient. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eïnaïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (« Les Deux Sources ») est probablement l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Eïnam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Jos 15.34, à l'ouest de Timna.
      marker-yv: yv-n
    - type: text
      text: Alors elle retira ses habits de veuve, elle se couvrit d'un voile dont elle s'enveloppa et s'assit à l'entrée d'Eïnaïm, sur le chemin de Timna. Car elle avait vu que Shéla était devenu grand et qu'elle ne lui avait pas été donnée pour femme.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda la vit et la prit pour une prostituée, parce qu''elle avait le visage couvert. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il l''aborda sur le chemin et dit : Laisse-moi donc aller avec toi, je te prie ! – il ne savait pas que c''était sa belle-fille. Elle dit : Que vas-tu me donner pour aller avec moi ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un chevreau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un chevreau de chèvres du petit bétail.
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Je t''enverrai un chevreau. Elle dit : Alors donne-moi un gage, jusqu''à ce que tu l''envoies. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sceau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cordon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bâton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ces objets portaient des marques identifiant leur propriétaire : le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cordon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était sans doute passé dans l''axe d''un '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sceau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cylindrique ou d''un anneau qui servait de cachet (Jr 22.24 ; Ag 2.23 ; Ct 8.6 ; Jn 6.27). Le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bâton '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tribu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (peut-être en référence au bâton qui symbolise l'autorité du chef de tribu, mais la relation éventuelle entre ces deux sens est incertaine).
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Quel gage te donnerai-je ? Elle dit : Ton sceau, ton cordon et le bâton que tu as à la main. Il les lui donna. Puis il alla avec elle, et elle fut enceinte de lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'en alla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se leva et s'en alla.
      marker-yv: yv-n
    - type: text
      text: Elle s'en alla ; elle retira son voile et remit ses habits de veuve.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cananéen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.15-19.
      marker-yv: yv-n
    - type: text
      text: 'Là, Juda vit la fille d''un Cananéen nommé Shoua ; il la prit pour femme et alla avec elle. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juda envoya le chevreau des chèvres par la main de son ami… pour prendre le gage de la main de la femme…
      marker-yv: yv-n
    - type: text
      text: 'Juda envoya son ami l''Adoullamite chez la femme pour lui apporter le chevreau et reprendre le gage. Mais il ne la trouva pas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prostituée sacrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consacrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme hébreu (de même au v. 22) vient de la même racine que les mots habituellement traduits par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ', sacré, consacrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: etc. Outre la prostitution commune, l'Antiquité connaissait la prostitution sacrée, notamment dans le cadre des cultes de la fertilité. Le même terme et son équivalent masculin reviennent en Dt 23.18 ; 1R 14.24 ; 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14 ; Jb 36.14. Selon certains, dans plusieurs de ces passages ils pourraient désigner des serviteurs ou des servantes « consacrés », c.-à-d. attachés à des sanctuaires (cf. les hiérodules de l'Antiquité grecque), sans qu'il s'agisse nécessairement de prostitué(e)s. Ici cependant le contexte évoque clairement la prostitution.
      marker-yv: yv-n
    - type: text
      text: 'Il demanda aux hommes du lieu : Où est cette prostituée sacrée qui se tenait à Eïnaïm, sur le chemin ? Ils répondirent : Il n''y a jamais eu ici de prostituée sacrée ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il retourna auprès de Juda et dit : Je ne l''ai pas trouvée ; les hommes du lieu ont même dit : « Il n''y a jamais eu ici de prostituée sacrée ! » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda dit : Qu''elle garde ce qu''elle a ! Ne nous exposons pas au mépris. J''ai envoyé ce chevreau, mais toi, tu ne l''as pas trouvée.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 21.9.
      marker-yv: yv-n
    - type: text
      text: 'Environ trois mois après, on vint dire à Juda : Tamar, ta belle-fille, s''est prostituée ; elle est même enceinte de sa prostitution ! Alors Juda dit : Faites-la sortir, et qu''elle soit brûlée ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Regarde-les '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme on la faisait sortir, elle fit dire à son beau-père : C''est de l''homme à qui ces objets appartiennent que je suis enceinte. Elle dit : Regarde-les, je t''en prie, pour voir à qui sont ce sceau, ces cordons et ce bâton. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1S 24.18. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'n''eut plus de relations… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 18.15+.'
      marker-yv: yv-n
    - type: text
      text: 'Juda les regarda et dit : Elle est plus juste que moi, puisque je ne l''ai pas donnée à Shéla, mon fils ; et il n''eut plus de relations avec elle.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 25.24.
      marker-yv: yv-n
    - type: text
      text: 'Quand vint pour elle le temps d''accoucher, il y avait des jumeaux dans son ventre. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écarlate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 25.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pendant l''accouchement il y en eut un qui présenta la main ; la sage-femme la saisit et y attacha un fil écarlate en disant : Celui-ci est sorti le premier. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il l''appela '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, peut-être, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on l'appela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss hébreux, Smr, Syr et le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Targum '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du pseudo-Jonathan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle l'appela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 30 ; cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pérets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brèche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'éclatement, explosion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 28.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). Voir Rt 4.18-22 ; Mt 1.3-6. Ce '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' se retrouve dans celui de plusieurs localités proches de Jérusalem (2S 5.20 ; 6.8 ; Es 28.21).'
      marker-yv: yv-n
    - type: text
      text: 'Mais il retira la main, et son frère sortit. Alors la sage-femme dit : Quelle brèche tu t''es ouverte ! Et il l''appela du nom de Pérets (« La Brèche »). '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon quelques mss hébreux, Smr et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: appela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle fut enceinte et mit au monde un fils, qu''il appela du nom d''Er. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zérah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'éclat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (allusion au fil de couleur vive, cf. Jos 2.21). Cf. 36.13 ; 46.12 ; Nb 26.19-21 ; 1Ch 2.3s.
      marker-yv: yv-n
    - type: text
      text: Ensuite sortit son frère, qui avait à la main le fil écarlate ; et il l'appela du nom de Zérah (« Eclat »).
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle fut encore enceinte et mit au monde un fils, qu''elle appela du nom d''Onân. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shéla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 4.21-23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Juda était
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il était
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kezib
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute s''agit-il d''Akzib, dans la même région qu''Adoullam, sur le versant ouest des monts de Juda (Jos 15.44 ; Mi 1.14). Smr a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kozéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 1Ch 4.22.'
      marker-yv: yv-n
    - type: text
      text: Une fois encore, elle mit au monde un fils, qu'elle appela du nom de Shéla ; Juda était à Kezib quand elle accoucha.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tamar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est aussi le nom d'une ville de Juda située au sud-ouest de la mer Morte, près de la frontière d'Edom (cf. v. 30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Juda prit pour Er, son premier-né, une femme nommée Tamar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déplut au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fut mauvais aux yeux du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10 ; Jg 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' le fit mourir'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 4.24-26 ; Ct 3.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Sur l''absence de '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: motivation
        - type: text
          text: ' explicite du jugement divin, cf. 3.22 ; 4.5 ; 11.6s ; voir aussi 1S 2.6.'
      marker-yv: yv-n
    - type: text
      text: 'Er, premier-né de Juda, déplut au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le fit mourir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 25.5-10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: remplis… ton devoir de beau-frère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : coutume du lévirat (cf. Dt 25.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), selon laquelle le frère du défunt doit assumer la charge de la veuve et susciter '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une descendance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à son frère mort sans enfant.
      marker-yv: yv-n
    - type: text
      text: 'Alors Juda dit à Onân : Va avec la femme de ton frère, remplis envers elle ton devoir de beau-frère et suscite une descendance à ton frère. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa semence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Onân savait que cette descendance ne lui appartiendrait pas ; lorsqu''il allait avec la femme de son frère, il laissait sa semence se perdre par terre, afin de ne pas donner de descendance à son frère. '
