    marker-yv: yv-n
  - type: text
    text: 'Quand Josué fut vieux, avancé en âge, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui dit : Tu es vieux, tu es avancé en âge, et le pays dont il faut encore prendre possession est très grand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: districts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cercles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même en 22.10s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le territoire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; cf. v. 11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gueshourites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici le pays qui reste : tous les districts des Philistins et tout le territoire des Gueshourites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Shihor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : nom d''origine égyptienne ; il pourrait désigner soit le Nil (Es 23.3 ; Jr 2.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''oued d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (15.4,47 ; Gn 15.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), frontière naturelle entre Canaan et l''Egypte, soit la région marécageuse d''un lac sur la route menant d''Egypte en Canaan. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: contrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui de Gaza…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le Gazatite, l''Ashdodite, l''Ashqelonite, le Gatite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gitti
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ps 8.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: )
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', l''Eqronite'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur les cinq villes philistines, cf. Jos 11.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les Avvites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.23 ; cf. Dt 2.23.
    marker-yv: yv-n
  - type: text
    text: 'depuis le Shihor qui est en face de l''Egypte jusqu''à la frontière d''Eqrôn au nord, contrée qui est considérée comme cananéenne et qui est occupée par les cinq princes de la confédération des Philistins – celui de Gaza, celui d''Ashdod, celui d''Ashqelôn, celui de Gath et celui d''Eqrôn – et par les Avvites ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Méara
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localisation inconnue. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aphéqa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ville identifiée avec Afqa, à 40 km au nord-est de Beyrouth ; une autre localité proche d''Hébron porte le même nom en 15.53 ; voir aussi 12.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la frontière des Amorites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amorites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: habitaient les montagnes sur les deux rives du Jourdain (3.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 10.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 15.16 ; Nb 13.29).'
    marker-yv: yv-n
  - type: text
    text: 'à partir du midi, tout le pays des Cananéens, et Méara, qui appartient aux Sidoniens, jusqu''à Aphéqa, jusqu''à la frontière des Amorites ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guébalites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', en hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gibli
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', habitants de Guébal ou Byblos (au nord de Beyrouth). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baal-Gad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'entrée de Hamath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lebo-Hamath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sans doute l''endroit qui marque l''entrée du territoire de Hamath, cité araméenne sur l''Oronte, en Syrie (Nb 13.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 34.8).'
    marker-yv: yv-n
  - type: text
    text: 'le pays des Guébalites et tout le Liban vers le soleil levant, depuis Baal-Gad, au pied du mont Hermon, jusqu''à l''entrée de Hamath ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Misrephoth-Maïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Attribue… à Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fais tomber pour Israël comme patrimoine.
    marker-yv: yv-n
  - type: text
    text: 'tous les habitants de la montagne, depuis le Liban jusqu''à Misrephoth-Maïm, tous les Sidoniens. Je les déposséderai devant les Israélites. Attribue seulement par le sort le pays comme patrimoine à Israël, ainsi que je te l''ai ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A la fin du v. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: depuis le Jourdain jusqu'à la grande mer vers le soleil couchant, c'est cette partie que tu donneras, la grande mer fera frontière. (8) Quant aux deux tribus – ainsi qu'à la demi-tribu de Manassé…
    marker-yv: yv-n
  - type: text
    text: Maintenant donc, partage ce pays pour le donner comme patrimoine aux neuf tribus et à la demi-tribu de Manassé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le partage de la Transjordanie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Avec l'autre demi-tribu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec elle.
    marker-yv: yv-n
  - type: text
    text: 'Avec l''autre demi-tribu, les Rubénites et les Gadites ont reçu leur patrimoine, celui que Moïse leur a donné en Transjordanie, à l''est, tel que le leur a donné Moïse, serviteur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aroër '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ville qui est au milieu de l''oued '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 2.36
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout le plateau de Medba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(l''actuelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Madaba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Es 15.2) ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout le plateau depuis Medba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dibôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', connue plus tard sous le nom de Dibân ; c''est la ville dont le roi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Mésha
      - type: text
        text: ' (2R 3.4-27) était originaire ; cf. Nb 21.26-31 ; Es 15.2 ; Jr 48.18,22.'
    marker-yv: yv-n
  - type: text
    text: 'depuis Aroër, qui est sur la rive de l''oued Arnon, et la ville qui est au milieu de l''oued, tout le plateau de Medba, jusqu''à Dibôn, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: villes de Sihôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 21.21-32 ; Dt 2.26-37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Heshbôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.10+ ; Nb 32.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'toutes les villes de Sihôn, roi des Amorites, qui régnait à Heshbôn, jusqu''à la frontière des Ammonites ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gueshourites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maakatites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Salka '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'le Galaad, le territoire des Gueshourites et des Maakatites, tout le mont Hermon et tout le Bashân, jusqu''à Salka ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Og '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Nb 21.33-35 ; Dt 3.1-11.'
    marker-yv: yv-n
  - type: text
    text: 'au Bashân, tout le royaume d''Og qui régnait à Ashtaroth et à Edréi et qui avait survécu du reste des Rephaïtes. Ceux-là, c''est Moïse qui les battit et les déposséda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''à ce jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Mais les Israélites ne dépossédèrent pas les Gueshourites et les Maakatites, si bien que Gueshour et Maakath habitent au sein d'Israël jusqu'à ce jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La tribu des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: '… pas de patrimoine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb18.23s ; Dt 14.27,29 ; 18.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: offrandes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon ce qu'il avait dit à son sujet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 33 ; Nb 18.20+ss ; Dt 10.8s.'
    marker-yv: yv-n
  - type: text
    text: 'La tribu des lévites fut la seule à laquelle on ne donna pas de patrimoine ; les offrandes consumées par le feu pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, étaient son patrimoine, selon ce qu''il avait dit à son sujet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse avait donné une part à la tribu des fils de Ruben, clan par clan. '
  - type: usfm
