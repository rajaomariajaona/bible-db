document_id: JOS.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: PARTAGE DU PAYS
  - type: heading
    content: Les territoires restant à conquérir
  - type: text
    content: ' '
  - type: note
    content: 'Quand Josué fut vieux… 23.1s ; cf. Gn 24.1 ; 1R 1.1n  ; voir aussi Gn 18.11. –  dont il faut encore…  : litt. qui reste pour en prendre possession , cf. v. 2.'
  - type: text
    content: 'Quand Josué fut vieux, avancé en âge, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Tu es vieux, tu es avancé en âge, et le pays dont il faut encore prendre possession est très grand. '
  '10':
  - type: note
    content: 'villes de Sihôn  : cf. Nb 21.21-32 ; Dt 2.26-37. –  Heshbôn  : cf. 9.10+ ; Nb 32.3n.'
  - type: text
    content: 'toutes les villes de Sihôn, roi des Amorites, qui régnait à Heshbôn, jusqu''à la frontière des Ammonites ; '
  '11':
  - type: note
    content: Gueshourites / Maakatites 12.5n. –  Salka 12.5n.
  - type: text
    content: 'le Galaad, le territoire des Gueshourites et des Maakatites, tout le mont Hermon et tout le Bashân, jusqu''à Salka ; '
  '12':
  - type: note
    content: Og 2.10n  ; cf. Nb 21.33-35 ; Dt 3.1-11.
  - type: text
    content: 'au Bashân, tout le royaume d''Og qui régnait à Ashtaroth et à Edréi et qui avait survécu du reste des Rephaïtes. Ceux-là, c''est Moïse qui les battit et les déposséda. '
  '13':
  - type: note
    content: jusqu'à ce jour 4.9n.
  - type: text
    content: Mais les Israélites ne dépossédèrent pas les Gueshourites et les Maakatites, si bien que Gueshour et Maakath habitent au sein d'Israël jusqu'à ce jour.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'La tribu des lévites… pas de patrimoine Nb18.23s ; Dt 14.27,29 ; 18.1. –  offrandes  : voir sacrifices. –  selon ce qu''il avait dit à son sujet  : cf. v. 33 ; Nb 18.20+ss ; Dt 10.8s.'
  - type: text
    content: 'La tribu des lévites fut la seule à laquelle on ne donna pas de patrimoine ; les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, étaient son patrimoine, selon ce qu''il avait dit à son sujet.'
  '15':
  - type: text
    content: 'Moïse avait donné une part à la tribu des fils de Ruben, clan par clan. '
  '16':
  - type: note
    content: 'le territoire  : terme plus souvent traduit par frontière dans ces chapitres (v. 3s,10s etc.) de même v. 25,30. –  Medba v. 9.'
  - type: text
    content: 'Ils eurent le territoire qui s''étend depuis Aroër, qui est sur la rive de l''oued Arnon, et la ville qui est au milieu de l''oued, tout le plateau jusqu''à Medba, '
  '17':
  - type: note
    content: 'Bamoth-Baal (Hauts lieux de Baal). Le site ne peut être précisé avec certitude ; il doit se trouver sur une hauteur voisine du mont Nebo (Khirbet el-Qouwejiyeh, à 5 km au nord de Medba ?). Cf. Nb 22.41. –  Beth-Baal-Méôn  : ville de Transjordanie qu''on trouve sous différents noms  : Baal-Méôn Nb 32.38 ; Ez 25.9 ; 1Ch 5.8 ; Beth-Méôn Jr 48.23. Elle est prise et fortifiée par Mésha, roi de Moab, mais reprise et mentionnée dans une inscription retrouvée à Samarie. C''est actuellement Ma''în, à 8 km au sud de Medba.'
  - type: text
    content: 'Heshbôn et toutes ses villes sur le plateau, Dibôn, Bamoth-Baal, Beth-Baal-Méôn, '
  '18':
  - type: note
    content: 'Yahtsa  : ville de Transjordanie, au nord-est de l''Arnon, à environ 20 km au sud de Medba. En Es 15.4 ; Jr 48.34, elle appartient à Moab. Elle est également appelée Yahats, Nb 21.23 ; Dt 2.32. –  Qedémoth  : à 13 km au sud-est de Medba ; cf. 21.37 ; Dt 2.26 ; 1Ch 6.64. –  Méphaath  : peut-être à une dizaine de kilomètres au sud d''Amman ; cf. 21.37 ; Jr 48.21 ; 1Ch 6.64.'
  - type: text
    content: 'Yahtsa, Qedémoth, Méphaath, '
  '19':
  - type: note
    content: 'Qiriataïm (Les Deux villes) : ville moabite en Jr 48.1,23 ; Ez 25.9. Elle est peut-être à situer à une dizaine de kilomètres à l''ouest de Medba ; cf. Gn 14.5 ; Nb 32.37. –  Sibma Nb 32.3,38 ; ville moabite en Es 16.8s ; Jr 48.32, peut-être à 8 km au nord-ouest de Medba. –  Tséreth-Shahar (Splendeur de l''aube) : peut-être à 21 km au sud de Medba ; cf. 1Ch 4.7. –  la vallée  : celle de l''Arnon.'
  - type: text
    content: 'Qiriataïm, Sibma, Tséreth-Shahar dans la montagne de la vallée, '
  '2':
  - type: note
    content: 'districts  : litt. cercles  ; de même en 22.10s. –  le territoire  : sous-entendu dans le texte ; cf. v. 11. –  Gueshourites 12.5n.'
  - type: text
    content: 'Voici le pays qui reste : tous les districts des Philistins et tout le territoire des Gueshourites, '
  '20':
  - type: note
    content: 'Beth-Péor  : identique à Baal-Péor  ; cf. Nb 25 ; Dt 3.29 ; 4.46 ; 34.6 ; Os 9.10 ; Ps 106.28. –  les pentes du Pisga  : cf. Nb 21.20n. –  Beth-Yeshimoth (Maison des ruines) : à 18 km au nord-ouest de Medba, près du nord de la mer Morte.'
  - type: text
    content: 'Beth-Péor, les pentes du Pisga, Beth-Yeshimoth ; '
  '21':
  - type: note
    content: 'le royaume de Sihôn  : cf. Nb 21.21-32. –  les princes de Madiân  : cf. Nb 31.8. –  vassaux  : le même terme est traduit par princes en Ez 32.30 ; Mi 5.4 ; Ps 83.12 ; il est peut-être apparenté au verbe traduit par investir en Ps 2.6n  ; Pr 8.23n.'
  - type: text
    content: 'toutes les villes du plateau et tout le royaume de Sihôn, roi des Amorites, qui régnait à Heshbôn : Moïse l''avait battu, lui et les princes de Madiân, Evi, Réqem, Tsour, Hour et Réba, les vassaux de Sihôn qui habitaient le pays. '
  '22':
  - type: note
    content: Balaam, fils de Béor Nb 31.8n  ; voir aussi Nb 22–24 ; 32.5.
  - type: text
    content: 'Quant à Balaam, fils de Béor, le devin, les Israélites l''avaient tué par l''épée ; il fut parmi leurs victimes. '
  '23':
  - type: note
    content: 'frontière et rive traduisent le même mot hébreu ; cf. Nb 34.6n. –  le patrimoine des fils de Ruben  : cf. Nb 34.14s. –  les villages…  : litt. leurs villages.'
  - type: text
    content: La frontière des fils de Ruben était le Jourdain (sa rive). Voilà le patrimoine des fils de Ruben, clan par clan, les villes et les villages qui en dépendent.
  '24':
  - type: text
    content: 'Moïse avait donné une part à la tribu de Gad, aux fils de Gad, clan par clan. '
  '25':
  - type: note
    content: 'Yazer fait partie du royaume de David (2S 24.5 ; cf. 1Ch 26.31). Elle appartient à Moab en Es 16.8s ; Jr 48.32. On la situe à 14 km au sud-ouest d''Amman. –  Rabba ou Rabbath-Ammon (autre traduction la capitale des Ammonites) : aujourd''hui Amman, capitale de la Jordanie, à 69 km au nord-est de Jérusalem. Cf. Dt 3.11n  ; 2S 11.1 ; 12.27-29 ; 1Ch 20.1.'
  - type: text
    content: 'Ils eurent pour territoire Yazer, toutes les villes du Galaad, la moitié du pays des Ammonites jusqu''à Aroër en face de Rabba, '
  '26':
  - type: note
    content: 'Ramath-Mitspé (Hauteur du Poste de guet) pourrait être un autre nom de Mitspé de Galaad (Jg 11.29) ; certains la situent cependant ailleurs, à 13 km au sud-ouest d''Amman. –  Betonim  : probablement à 22 km à l''ouest d''Amman. –  Mahanaïm  : cf. Gn 32.3ss,23 ; 2S 2.8 ; 17.24–18.17. Localisation incertaine ; peut-être à une quarantaine de kilomètres à l''est de Sichem.'
  - type: text
    content: 'depuis Heshbôn jusqu''à Ramath-Mitspé, et Betonim, depuis Mahanaïm jusqu''à la frontière de Debir, '
  '27':
  - type: note
    content: 'Beth-Haram  : peut-être à 17 km à l''est de la Jéricho moderne ; cf. Nb 32.36. –  Beth-Nimra (Maison du Léopard) : cf. Es 15.6 ; Jr 48.34. Peut-être à une trentaine de kilomètres à l''ouest d''Amman. –  Soukkoth  : cf. Gn 33.17. –  Tsaphôn (Nord) : site non identifié ; cf. Jg 12.1 ; Ez 47.17. –  la mer de Kinnéreth  : cf. 11.2n.'
  - type: text
    content: 'et, dans la vallée, Beth-Haram, Beth-Nimra, Soukkoth et Tsaphôn, le reste du royaume de Sihôn, roi de Heshbôn, avec le Jourdain – sa rive – jusqu''à l''extrémité de la mer de Kinnéreth en Transjordanie, à l''est. '
  '28':
  - type: text
    content: Voilà le patrimoine des fils de Gad, clan par clan, les villes et les villages qui en dépendent.
  '29':
  - type: text
    content: ' '
  - type: note
    content: tribu traduit ici deux termes différents ; cf. Nb 18.2n.
  - type: text
    content: 'Moïse avait donné une part à la demi-tribu de Manassé, à la demi-tribu des fils de Manassé, clan par clan. '
  '3':
  - type: note
    content: 'le Shihor  : nom d''origine égyptienne ; il pourrait désigner soit le Nil (Es 23.3 ; Jr 2.18n), soit l''oued d''Egypte (15.4,47 ; Gn 15.18n), frontière naturelle entre Canaan et l''Egypte, soit la région marécageuse d''un lac sur la route menant d''Egypte en Canaan. –  contrée  : sous-entendu dans le texte. –  celui de Gaza…  : litt. le Gazatite, l''Ashdodite, l''Ashqelonite, le Gatite (hébreu gitti  ; cf. Ps 8.1n), l''Eqronite  ; sur les cinq villes philistines, cf. Jos 11.22n. –  les Avvites 18.23 ; cf. Dt 2.23.'
  - type: text
    content: 'depuis le Shihor qui est en face de l''Egypte jusqu''à la frontière d''Eqrôn au nord, contrée qui est considérée comme cananéenne et qui est occupée par les cinq princes de la confédération des Philistins – celui de Gaza, celui d''Ashdod, celui d''Ashqelôn, celui de Gath et celui d''Eqrôn – et par les Avvites ; '
  '30':
  - type: note
    content: 'Mahanaïm v. 26n. –  Og, roi du Bashân 2.10n. –  les Douars de Yaïr  : cf. Nb 32.41n.'
  - type: text
    content: 'Ils eurent pour territoire, à partir de Mahanaïm, tout le Bashân, tout le royaume d''Og, roi du Bashân, et tous les Douars de Yaïr au Bashân, soixante villes. '
  '31':
  - type: note
    content: 'villes du royaume d''Og  : cf. 12.4n. –  Makir  : cf. Gn 50.23n  ; Nb 26.29+ ; Jg 5.14n.'
  - type: text
    content: La moitié du Galaad, Ashtaroth et Edréi, villes du royaume d'Og au Bashân, furent pour les fils de Makir, fils de Manassé – pour la moitié des fils de Makir, clan par clan.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'dans les plaines arides de Moab  : cf. Nb 22.1n  ; Dt 34.1,8.'
  - type: text
    content: 'C''est là le patrimoine que Moïse partagea dans les plaines arides de Moab, en Transjordanie, en face de Jéricho, à l''est. '
  '33':
  - type: note
    content: 'selon ce qu''il avait dit…  : cf. v. 14+ ; Dt 18.2.'
  - type: text
    content: 'Moïse ne donna pas de patrimoine à la tribu des lévites : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, était leur patrimoine, selon ce qu''il avait dit à leur sujet.'
  '4':
  - type: note
    content: 'Méara  : localisation inconnue. –  Aphéqa  : ville identifiée avec Afqa, à 40 km au nord-est de Beyrouth ; une autre localité proche d''Hébron porte le même nom en 15.53 ; voir aussi 12.18n. –  la frontière des Amorites  : les Amorites habitaient les montagnes sur les deux rives du Jourdain (3.10n  ; Gn 10.16n  ; 15.16 ; Nb 13.29).'
  - type: text
    content: 'à partir du midi, tout le pays des Cananéens, et Méara, qui appartient aux Sidoniens, jusqu''à Aphéqa, jusqu''à la frontière des Amorites ; '
  '5':
  - type: note
    content: 'Guébalites, en hébreu Gibli, habitants de Guébal ou Byblos (au nord de Beyrouth). –  Baal-Gad 11.17n. –  l''entrée de Hamath  : hébreu Lebo-Hamath, sans doute l''endroit qui marque l''entrée du territoire de Hamath, cité araméenne sur l''Oronte, en Syrie (Nb 13.21n  ; 34.8).'
  - type: text
    content: 'le pays des Guébalites et tout le Liban vers le soleil levant, depuis Baal-Gad, au pied du mont Hermon, jusqu''à l''entrée de Hamath ; '
  '6':
  - type: note
    content: 'Misrephoth-Maïm 11.8n. –  Attribue… à Israël  : litt. fais tomber pour Israël comme patrimoine.'
  - type: text
    content: 'tous les habitants de la montagne, depuis le Liban jusqu''à Misrephoth-Maïm, tous les Sidoniens. Je les déposséderai devant les Israélites. Attribue seulement par le sort le pays comme patrimoine à Israël, ainsi que je te l''ai ordonné. '
  '7':
  - type: note
    content: A la fin du v. LXX ajoute depuis le Jourdain jusqu'à la grande mer vers le soleil couchant, c'est cette partie que tu donneras, la grande mer fera frontière. (8) Quant aux deux tribus – ainsi qu'à la demi-tribu de Manassé…
  - type: text
    content: Maintenant donc, partage ce pays pour le donner comme patrimoine aux neuf tribus et à la demi-tribu de Manassé.
  - type: heading
    content: Le partage de la Transjordanie
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Avec l''autre demi-tribu  : litt. avec elle.'
  - type: text
    content: 'Avec l''autre demi-tribu, les Rubénites et les Gadites ont reçu leur patrimoine, celui que Moïse leur a donné en Transjordanie, à l''est, tel que le leur a donné Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '9':
  - type: note
    content: Aroër 12.2n. –  ville qui est au milieu de l'oued Dt 2.36n. –  tout le plateau de Medba (l'actuelle Madaba, cf. Es 15.2) ; LXX tout le plateau depuis Medba  ; cf. v. 16. –  Dibôn, connue plus tard sous le nom de Dibân ; c'est la ville dont le roi Mésha (2R 3.4-27) était originaire ; cf. Nb 21.26-31 ; Es 15.2 ; Jr 48.18,22.
  - type: text
    content: 'depuis Aroër, qui est sur la rive de l''oued Arnon, et la ville qui est au milieu de l''oued, tout le plateau de Medba, jusqu''à Dibôn, '
