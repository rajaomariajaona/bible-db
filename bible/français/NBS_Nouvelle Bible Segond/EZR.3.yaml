document_id: EZR.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josué et Zorobabel rétablissent le culte
  - type: text
    content: ' '
  - type: note
    content: 'Le septième mois de l''année du retour, soit septembre-octobre 538 av. J.-C. ; cf. Né 7.72–8.1 ; voir aussi Lv 23.23ss ; Nb 29.1ss ; 1R 8.2 ; 2Ch 5.3. –  dans leurs villes  : litt. dans les villes. –  comme un seul homme Nb 14.15 ; Jg 6.16 ; 20.1,8,11 ; 1S 11.7.'
  - type: text
    content: Le septième mois arriva, et les Israélites étaient dans leurs villes.
  - type: text
    content: 'Alors le peuple se rassembla à Jérusalem, uni comme un seul homme. '
  '10':
  - type: note
    content: 'bâtisseurs  : cf. Né 4.12. –  fondations  : cf. 6.3+ ; 1R 7.10. –  on mit en place les prêtres ou, selon plusieurs mss hébreux et des versions anciennes, les prêtres se mirent en place  ; cf. 2Ch 7.6. –  trompettes Nb 10.8 ; Jos 6.4 ; Né 12.35 ; 1Ch 15.24 ; 16.6 ; 2Ch 5.12 ; 29.26. –  lévites, fils d''Asaph  : cf. 2.41 ; Né 12.27 ; 1Ch 15.16 ; 16.5 ; 25.1,6 ; 2Ch 5.12 ; 29.25. –  d''après les indications…  : cf. 2Ch 23.18.'
  - type: text
    content: 'Lorsque les bâtisseurs posèrent les fondations du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', on mit en place les prêtres en costume, avec les trompettes, et les lévites, fils d''Asaph, avec les cymbales, afin de louer le '
  - type: text
    content: Seigneur
  - type: text
    content: ' d''après les indications de David, roi d''Israël. '
  '11':
  - type: note
    content: Ps 100.4s ; 106.1 ; 136 ; cf. Jr 33.11 ; 1Ch 16.34,41 ; 2Ch 5.13 ; 7.3,6. –  une grande acclamation Ps 27.6n  ; cf. Lv 23.24n  ; Nb 29.1n.
  - type: text
    content: 'Ils louaient et célébraient le '
  - type: text
    content: Seigneur
  - type: text
    content: ' par le chœur : « Car il est bon, car sa fidélité envers Israël est pour toujours ! » Et tout le peuple lança une grande acclamation, en louant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce qu''on posait les fondations de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'Cf. Ag 2.3 ; Za 4.10. –  les chefs de famille âgés ou, selon d''autres mss, les chefs de famille et les anciens. –  la première maison  : le temple de Salomon (1R 6–7), détruit en 587/6 av. J.-C. (cinquante ans plus tôt, 2R 25).'
  - type: text
    content: 'Beaucoup, parmi les prêtres, les lévites et les chefs de famille âgés qui avaient vu la première maison, pleuraient à grand bruit pendant qu''on posait sous leurs yeux les fondations de cette maison. Beaucoup d''autres, en revanche, faisaient retentir des acclamations de joie. '
  '13':
  - type: text
    content: Le peuple ne pouvait distinguer les acclamations de joie d'avec les pleurs, car le peuple lançait une grande acclamation qui s'entendait de très loin.
  '2':
  - type: note
    content: 'Cf. v. 8 ; 1.8n  ; 2.2+ ; 5.2 ; Ag 1.1,14. –  fils de Shéaltiel 1Ch 3.17 ; Mt 1.12 ; Lc 3.27. –  bâtirent  : litt. se levèrent et bâtirent  ; cf. 5.2 ; Né 3.1. –  des holocaustes, selon ce qui est écrit… 2Ch 23.18 ; 25.4 ; 35.1 ; Lc 24.44 ; voir sacrifices. –  Moïse, l''homme de Dieu Dt 33.1 ; Jos 14.6 ; 1Ch 23.14 ; 2Ch 30.16.'
  - type: text
    content: 'Josué, fils de Yotsadaq, avec ses frères les prêtres, et Zorobabel, fils de Shéaltiel, avec ses frères, bâtirent l''autel du Dieu d''Israël pour y offrir des holocaustes, selon ce qui est écrit dans la loi de Moïse, l''homme de Dieu. '
  '3':
  - type: note
    content: 'Ils rétablirent l''autel…  : cf. Jr 41.5. –  ses assises ou son emplacement (2.68). –  malgré leur terreur des peuples des pays  : traduction incertaine ; on pourrait aussi comprendre car ils étaient terrifiés par les populations locales ou lire d''après 3 Esdras à cause de l''hostilité des peuples du pays. L''expression traduite par peuples des pays (cf. Jr 1.18n) désigne dans Esd et Né tous ceux, israélites ou non, qui étaient restés sur place pendant l''exil, et plus particulièrement leurs dirigeants ; dans le judaïsme postérieur, une expression très proche désignera ceux qui ne sont pas instruits de la loi  ; cf. 9.1,2,11 ; 10.2,11 ; voir aussi 4.4 ; 6.21 ; Né 9.30 ; 10.29,31,32 ; Hymnes (Qumrân) 4.26 : « Tu mettras… la destruction pour tous les peuples des pays. » Règlement de la guerre (Qumrân) 10.9 : « Israël, que tu as choisi pour toi parmi tous les peuples des pays. » –  holocaustes du matin et du soir Ex 29.38ss ; Nb 28.3ss.'
  - type: text
    content: 'Ils rétablirent l''autel sur ses assises, malgré leur terreur des peuples des pays, et ils offrirent là des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: ', des holocaustes du matin et du soir. '
  '4':
  - type: note
    content: 'Lv 23.34 ; Nb 29.12ss. –  Ils célébrèrent… et ils offrirent…  : litt. ils firent la fête des Huttes… (voir calendrier et fêtes) et des holocaustes jour après jour… –  comme il est écrit Né 8.15 ; 2Ch 30.5,18. –  en nombre…  : litt. en nombre selon la règle (ou le droit, la coutume) ; même expression en 1Ch 23.31. –  pour chaque jour  : cf. 1Ch 16.37+.'
  - type: text
    content: 'Ils célébrèrent la fête des Huttes, comme il est écrit, et ils offrirent jour après jour des holocaustes, en nombre adéquat, selon la règle pour chaque jour. '
  '5':
  - type: note
    content: 'holocauste constant Nb 28.6. –  les holocaustes des nouvelles lunes  : certains, d''après 3 Esdras, modifient le texte hébreu traditionnel pour lire des sabbats et des nouvelles lunes  ; cf. Nb 10.10 ; 28.11ss ; Né 10.33 ; 1Ch 23.31 ; 2Ch 2.3s ; 8.13 ; 31.3.'
  - type: text
    content: 'Après cela, ils offrirent l''holocauste constant, les holocaustes des nouvelles lunes et de toutes les rencontres festives sacrées du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ceux de quiconque faisait des offrandes volontaires au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'les fondations…  : cf. 5.16.'
  - type: text
    content: 'Dès le premier jour du septième mois, ils commencèrent à offrir des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Cependant, les fondations du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''étaient pas encore posées. '
  '7':
  - type: note
    content: 'de l''argent  : le terme désigne le métal précieux plutôt qu''une monnaie. –  tailleurs de pierre  : cf. 1Ch 22.2. –  charpentiers  : cf. 1Ch 22.15. –  vivres…  : cf. 1R 5.25 ; 2Ch 2.9. –  Sidoniens / Tyriens  : cf. 1R 5.15ss ; 1Ch 22.4 ; 2Ch 2.2ss. –  par mer jusqu''à Jaffa, port de la côte méditerranéenne (aujourd''hui tout près de Tel-Aviv) 2Ch 2.15. –  l''autorisation… 4.3.'
  - type: text
    content: 'On donna de l''argent aux tailleurs de pierre et aux charpentiers, et des vivres, des boissons et de l''huile aux Sidoniens et aux Tyriens, pour qu''ils fassent venir par mer jusqu''à Jaffa du bois de cèdre du Liban, suivant l''autorisation de Cyrus, roi de Perse. '
  '8':
  - type: note
    content: 'deuxième mois (avril-mai 537 av. J.-C.) : cf. 5.16 ; Ag 1.15 ; 2.18 ; voir aussi 1R 6.1,37 ; 2Ch 3.2. –  Zorobabel / Josué  : cf. v. 2+ ; Ag 1.12,14s ; Za 4.9. –  commencèrent le travail…  : autre traduction possible commencèrent par charger les lévites de vingt ans… 1Ch 23.24,27 ; 2Ch 31.17 ; cf. Nb 4.3,23,30 ; 8.24 ; 1Ch 23.3. –  surveiller ou diriger 1Ch 23.4 ; 2Ch 2.1 ; 34.10ss ; cf. 24.12s.'
  - type: text
    content: 'La deuxième année après leur arrivée à la maison de Dieu à Jérusalem, au deuxième mois, Zorobabel, fils de Shéaltiel, Josué, fils de Yotsadaq, avec le reste de leurs frères, les prêtres et les lévites, et tous ceux qui étaient revenus de la captivité à Jérusalem, commencèrent le travail et chargèrent les lévites depuis l''âge de vingt ans et au-dessus de surveiller les travaux de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'avec ses fils qui étaient judéens  : litt. et ses fils, fils de Juda  ; certains modifient le texte hébreu traditionnel pour lire Qadmiel, Binnouï et Hodavia (voir 2.40n). –  les fils de Hénadad… les lévites  : dans le texte hébreu ces noms sont rajoutés à part, tout à la fin du v. ; cf. Né 3.18,24. –  tous ensemble 2.64n.'
  - type: text
    content: 'Et Josué, avec ses fils et ses frères, Qadmiel, avec ses fils qui étaient judéens, les fils de Hénadad, avec leurs fils et leurs frères les lévites, se chargèrent tous ensemble de surveiller ceux qui travaillaient à la maison de Dieu. '
