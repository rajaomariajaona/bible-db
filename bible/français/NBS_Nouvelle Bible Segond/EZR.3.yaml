document_id: EZR.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué et Zorobabel rétablissent le culte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le septième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de l''année du retour, soit septembre-octobre 538 av. J.-C. ; cf. Né 7.72–8.1 ; voir aussi Lv 23.23ss ; Nb 29.1ss ; 1R 8.2 ; 2Ch 5.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans leurs villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans les villes. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme un seul homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 14.15 ; Jg 6.16 ; 20.1,8,11 ; 1S 11.7.
      marker-yv: yv-n
    - type: text
      text: Le septième mois arriva, et les Israélites étaient dans leurs villes.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le peuple se rassembla à Jérusalem, uni comme un seul homme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bâtisseurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 4.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fondations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.3+ ; 1R 7.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on mit en place les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon plusieurs mss hébreux et des versions anciennes, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les prêtres se mirent en place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2Ch 7.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trompettes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 10.8 ; Jos 6.4 ; Né 12.35 ; 1Ch 15.24 ; 16.6 ; 2Ch 5.12 ; 29.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lévites, fils d'Asaph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.41 ; Né 12.27 ; 1Ch 15.16 ; 16.5 ; 25.1,6 ; 2Ch 5.12 ; 29.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'après les indications…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 23.18.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque les bâtisseurs posèrent les fondations du temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', on mit en place les prêtres en costume, avec les trompettes, et les lévites, fils d''Asaph, avec les cymbales, afin de louer le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' d''après les indications de David, roi d''Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 100.4s ; 106.1 ; 136 ; cf. Jr 33.11 ; 1Ch 16.34,41 ; 2Ch 5.13 ; 7.3,6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une grande acclamation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 27.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Lv 23.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 29.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils louaient et célébraient le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' par le chœur : « Car il est bon, car sa fidélité envers Israël est pour toujours ! » Et tout le peuple lança une grande acclamation, en louant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', parce qu''on posait les fondations de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ag 2.3 ; Za 4.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les chefs de famille âgés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon d''autres mss, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les chefs de famille et les anciens. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la première maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' de Salomon (1R 6–7), détruit en 587/6 av. J.-C. (cinquante ans plus tôt, 2R 25).'
      marker-yv: yv-n
    - type: text
      text: 'Beaucoup, parmi les prêtres, les lévites et les chefs de famille âgés qui avaient vu la première maison, pleuraient à grand bruit pendant qu''on posait sous leurs yeux les fondations de cette maison. Beaucoup d''autres, en revanche, faisaient retentir des acclamations de joie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple ne pouvait distinguer les acclamations de joie d'avec les pleurs, car le peuple lançait une grande acclamation qui s'entendait de très loin.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 8 ; 1.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.2+ ; 5.2 ; Ag 1.1,14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fils de Shéaltiel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Ch 3.17 ; Mt 1.12 ; Lc 3.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bâtirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se levèrent et bâtirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 5.2 ; Né 3.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des holocaustes, selon ce qui est écrit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Ch 23.18 ; 25.4 ; 35.1 ; Lc 24.44 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moïse, l''homme de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 33.1 ; Jos 14.6 ; 1Ch 23.14 ; 2Ch 30.16.
      marker-yv: yv-n
    - type: text
      text: 'Josué, fils de Yotsadaq, avec ses frères les prêtres, et Zorobabel, fils de Shéaltiel, avec ses frères, bâtirent l''autel du Dieu d''Israël pour y offrir des holocaustes, selon ce qui est écrit dans la loi de Moïse, l''homme de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils rétablirent l'autel…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 41.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ses assises '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son emplacement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(2.68). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: malgré leur terreur des peuples des pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car ils étaient terrifiés par les populations locales '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou lire d''après '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esdras
        - type: text
          text: ' à cause de l''hostilité des peuples du pays. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''expression traduite par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuples des pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Jr 1.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') désigne dans Esd et Né tous ceux, israélites ou non, qui étaient restés sur place pendant l''exil, et plus particulièrement leurs dirigeants ; dans le judaïsme postérieur, une expression très proche désignera ceux qui ne sont pas instruits de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '  ; cf. 9.1,2,11 ; 10.2,11 ; voir aussi 4.4 ; 6.21 ; Né 9.30 ; 10.29,31,32 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hymnes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 4.26 : « Tu mettras… la destruction pour tous les peuples des pays. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règlement de la guerre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Qumrân) 10.9 : « Israël, que tu as choisi pour toi parmi tous les peuples des pays. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocaustes du matin et du soir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 29.38ss ; Nb 28.3ss.
      marker-yv: yv-n
    - type: text
      text: 'Ils rétablirent l''autel sur ses assises, malgré leur terreur des peuples des pays, et ils offrirent là des holocaustes au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', des holocaustes du matin et du soir. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 23.34 ; Nb 29.12ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils célébrèrent… et ils offrirent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils firent la fête des Huttes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et des holocaustes jour après jour… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme il est écrit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Né 8.15 ; 2Ch 30.5,18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en nombre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en nombre selon la règle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le droit, la coutume
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; même expression en 1Ch 23.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour chaque jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 16.37+.'
      marker-yv: yv-n
    - type: text
      text: 'Ils célébrèrent la fête des Huttes, comme il est écrit, et ils offrirent jour après jour des holocaustes, en nombre adéquat, selon la règle pour chaque jour. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocauste constant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 28.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les holocaustes des nouvelles lunes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains, d''après '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 3 Esdras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des sabbats et des nouvelles lunes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 10.10 ; 28.11ss ; Né 10.33 ; 1Ch 23.31 ; 2Ch 2.3s ; 8.13 ; 31.3.'
      marker-yv: yv-n
    - type: text
      text: 'Après cela, ils offrirent l''holocauste constant, les holocaustes des nouvelles lunes et de toutes les rencontres festives sacrées du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et ceux de quiconque faisait des offrandes volontaires au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fondations…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.16.'
      marker-yv: yv-n
    - type: text
      text: 'Dès le premier jour du septième mois, ils commencèrent à offrir des holocaustes au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Cependant, les fondations du temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' n''étaient pas encore posées. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme désigne le métal précieux plutôt qu''une monnaie. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tailleurs de pierre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 22.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: charpentiers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 22.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vivres…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 5.25 ; 2Ch 2.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sidoniens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tyriens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 5.15ss ; 1Ch 22.4 ; 2Ch 2.2ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par mer jusqu'à Jaffa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', port de la côte méditerranéenne (aujourd''hui tout près de Tel-Aviv) 2Ch 2.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''autorisation… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.3.
      marker-yv: yv-n
    - type: text
      text: 'On donna de l''argent aux tailleurs de pierre et aux charpentiers, et des vivres, des boissons et de l''huile aux Sidoniens et aux Tyriens, pour qu''ils fassent venir par mer jusqu''à Jaffa du bois de cèdre du Liban, suivant l''autorisation de Cyrus, roi de Perse. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deuxième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(avril-mai 537 av. J.-C.) : cf. 5.16 ; Ag 1.15 ; 2.18 ; voir aussi 1R 6.1,37 ; 2Ch 3.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
