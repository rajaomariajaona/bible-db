document_id: ISA.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire sur Léviathan
  - type: text
    content: ' '
  - type: note
    content: fera rendre des comptes… à ou interviendra… contre  ; le même verbe est traduit par attaquer au v. 3 ; cf. 10.12+ ; 26.21n. –  épée 31.8 ; 34.5+ ; 66.16. –  Léviathan… Jb 3.8n  ; les mêmes qualificatifs ( serpent fuyard… serpent tortueux ) sont donnés dans un texte d'Ougarit à un monstre marin vaincu par Baal dans le récit de la création du monde. –  le dragon (ainsi LXX) ou le monstre marin  ; cf. 51.9ns ; Gn 1.21n  ; Jr 51.34 ; Ps 74.13s ; Jb 7.12 ; voir aussi Ap 12 ; 20–21.
  - type: text
    content: 'En ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera rendre des comptes,'
  - type: text
    content: avec son épée acérée, grande et puissante,
  - type: text
    content: à Léviathan, le serpent fuyard,
  - type: text
    content: à Léviathan, le serpent tortueux,
  - type: text
    content: et il tuera le dragon qui est dans la mer.
  - type: heading
    content: Le Seigneur et sa vigne
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ville forte  : cf. 25.2. Il s''agit probablement ici de Samarie (cf. 7.25 ; Os 3.4s). –  le taurillon (ou le veau ) vient y paître  : cf. 5.17.'
  - type: text
    content: Car la ville forte est solitaire,
  - type: text
    content: c'est un domaine délaissé et abandonné comme le désert ;
  - type: text
    content: le taurillon vient y paître, il s'y couche
  - type: text
    content: et il en achève les branchages.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'feu 1.30s ; 10.17 ; cf. Jn 15.6. –  ce n''est pas un peuple intelligent Dt 32.6 ; Os 4.6. –  fait / façonne 43.1,7+. –  n''a pas compassion  : cf. Os 1.6.'
  - type: text
    content: Quand les rameaux se dessèchent, on les brise ;
  - type: text
    content: des femmes viennent y mettre le feu.
  - type: text
    content: 'Car ce n''est pas un peuple intelligent :'
  - type: text
    content: aussi celui qui le fait n'a pas compassion de lui,
  - type: text
    content: celui qui le façonne ne lui fait pas grâce.
  - type: heading
    content: Le retour des exilés
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'secouera les arbres  : litt. secouera ou fera le battage (du grain)  ; cf. 24.13. –  Fleuve  : l''Euphrate (cf. Gn 31.21n). Sur les frontières ici décrites, cf. Gn 15.18 ; Nb 34.1-12 ; 1R 8.65 ; 2R 24.7. –  ramassés ou glanés , cf. 17.5.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' secouera les arbres,'
  - type: text
    content: depuis le cours du Fleuve jusqu'à l'oued d'Egypte ;
  - type: text
    content: et vous serez ramassés un par un, Israélites !
  '13':
  - type: text
    content: ' '
  - type: note
    content: trompe 18.3n  ; comme signal de rassemblement pour le culte, voir Ex 19.16,19 ; 20.18 ; Lv 25.9 ; Nb 10.2,10 ; 2S 6.15 ; 1R 1.34,39,41 ; Jl 2.15 ; Ps 47.6 ; 98.6 ; 150.3 ; cf. Jl 2.1 ; So 1.16 ; Mt 24.31 ; 1Co 15.52 ; 1Th 4.16 ; Ap 11.15. –  Assyrie / Egypte Os 11.11. –  montagne 2.2+. –  sacrée ou sainte 11.9.
  - type: text
    content: En ce jour-là, on sonnera d'une grande trompe ;
  - type: text
    content: alors viendront ceux qui étaient perdus en Assyrie,
  - type: text
    content: ceux qui étaient dispersés en Egypte ;
  - type: text
    content: 'ils se prosterneront devant le '
  - type: text
    content: Seigneur
  - type: text
    content: à la montagne sacrée, à Jérusalem.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là… 12.1+ ; cf. 26.1-6. –  vigne  : cf. 5.1-7. –  vin capiteux  : cf. Dt 32.14n.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: 'entonnez un chœur pour la vigne au vin capiteux :'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'de peur…  : une légère modification du texte hébreu traditionnel permettrait de lire de peur que son feuillage ne se perde. –  attaque  : cf. v. 1n.'
  - type: text
    content: 'moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), j''en suis le gardien,'
  - type: text
    content: je l'arrose à chaque instant ;
  - type: text
    content: de peur qu'on ne l'attaque,
  - type: text
    content: nuit et jour je la garde.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ronces (hébreu shamir  : certains y ont vu une allusion au nom de Samarie ; cf. v. 10n) / épines  : voir 5.6+.'
  - type: text
    content: Il n'y a pas en moi de colère.
  - type: text
    content: Ah ! si je pouvais combattre des ronces et des épines !
  - type: text
    content: Je marcherais sur elles,
  - type: text
    content: je les brûlerais toutes ensemble,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'refuge  : litt. forteresse  ; cf. 25.4n  ; Ps 46.2. –  la paix  : cf. 9.5s ; 26.3-12. Certains ont vu dans ce mot répété une allusion au nom de Jérusalem, qui peut évoquer l''idée de paix (cf. Gn 14.18n).'
  - type: text
    content: à moins qu'on ne me prenne pour refuge,
  - type: text
    content: qu'on ne fasse la paix avec moi,
  - type: text
    content: qu'on ne fasse avec moi la paix !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 11.1 ; cf. 14.1 ; Os 14.6-8.
  - type: text
    content: 'Dans l''avenir, que Jacob prenne racine :'
  - type: text
    content: Israël poussera des bourgeons et des fleurs
  - type: text
    content: et remplira le monde de ses produits.
  - type: heading
    content: Le pardon pour les descendants de Jacob
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte difficile ; le il désigne peut-être Dieu ; cf. 10.24-26 ; 30.31-33. –  L''a-t-il frappé  : certains, d''après LXX, modifient le texte hébreu traditionnel pour lire a-t-il été frappé. –  ceux qu''il tue  : un ms de Qumrân a lu ceux qui le tuaient , ce qui correspond à une légère modification du texte hébreu traditionnel.'
  - type: text
    content: L'a-t-il frappé comme il a frappé ceux qui le frappaient ?
  - type: text
    content: L'a-t-il tué comme il a tué ceux qu'il tue ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'en la poussant  : LXX en bataillant. Le terme hébreu est mal connu ; parce qu''il rappelle le nom d''une mesure ( séa ), on a souvent traduit avec mesure , dans un sens opposé. Il s''agit plus probablement d''une onomatopée correspondant au cri lancé par des charretiers ou des bergers pour faire avancer les bêtes. Le référent féminin (en hébreu, le possessif correspondant à son procès est au féminin) pourrait être la ville de 24.10n. –  souffle 40.6-8. –  vent d''est Ez 17.10.'
  - type: text
    content: 'C''est en la poussant, en la renvoyant, que tu as mené son procès :'
  - type: text
    content: il les a chassés par son souffle violent,
  - type: text
    content: un jour de vent d'est.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Voir expiation et péché. –  autels Dt 7.5 ; 2R 23.4,15. –  poteaux cultuels… / brasiers à encens 17.8+.
  - type: text
    content: C'est ainsi que la faute de Jacob est expiée,
  - type: text
    content: 'et voici la conséquence du pardon de son péché :'
  - type: text
    content: il rend toutes les pierres des autels
  - type: text
    content: pareilles à des pierres de chaux réduites en poussière ;
  - type: text
    content: les poteaux cultuels (les ashéras) et les brasiers à encens ne se relèveront plus.
