      children:
      - type: text
        text: 'Que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' soit avec vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jg 6.12+ ; cf. Ps 129.8 ; 2Th 3.16. –  '
