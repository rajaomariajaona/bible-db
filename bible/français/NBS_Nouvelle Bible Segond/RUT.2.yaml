      - type: text
        text: v. 18.
    marker-yv: yv-n
  - type: text
    text: 'A l''heure du repas, Booz lui dit : Approche, mange du pain et trempe ton morceau dans le vinaigre. Elle s''assit à côté des moissonneurs. Il lui tendit du grain rôti ; elle mangea, se rassasia et garda le reste. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
