        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Booz lui répondit : On m''a raconté tout ce que tu as fait pour ta belle-mère depuis la mort de ton mari et comment tu as abandonné ton père, ta mère et le pays de tes origines pour aller vers un peuple que tu ne connaissais pas. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le verbe et l''adjectif traduits respectivement par '
