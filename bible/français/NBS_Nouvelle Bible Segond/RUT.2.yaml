    marker-yv: yv-n
  - type: text
    text: 'Or Booz arriva de Beth-Léhem ; il dit aux moissonneurs : Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit avec vous ! Ils lui répondirent : Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' te bénisse ! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
