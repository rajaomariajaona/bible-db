      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A qui appartient…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans l''ancien Orient toute femme appartenait à quelqu''un (mari, père, frères) ; en demandant à qui appartient Ruth, Booz se renseigne sur son identité.'
    marker-yv: yv-n
  - type: text
    text: 'Booz dit au serviteur chargé de surveiller les moissonneurs : A qui appartient cette jeune femme ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le serviteur chargé de surveiller les moissonneurs répondit : C''est la jeune Moabite qui est revenue avec Noémi du pays de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
