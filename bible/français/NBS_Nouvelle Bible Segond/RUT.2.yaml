    marker-yv: yv-n
  - type: text
    text: 'Elle l''emporta, rentra en ville et montra à sa belle-mère ce qu''elle avait glané. Elle sortit aussi le reste de son repas et le lui donna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sa belle-mère lui dit : Où as-tu glané aujourd''hui ? Où as-tu travaillé ? Béni soit celui qui s''est intéressé à toi ! Elle dit à sa belle-mère chez qui elle avait travaillé. Elle dit : Celui chez qui j''ai travaillé aujourd''hui porte le nom de Booz. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fidélité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 3.10 ; 2S 2.5 ; certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''il soit '
      - type: usfm
        marker: w
        children:
        - type: text
          text: béni
      - type: text
        text: ' du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', celui (Booz) qui n''abandonne pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nos '
      - type: usfm
        marker: w
        children:
        - type: text
          text: rédempteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. ceux qui ont le droit et, dans une certaine mesure, le devoir de racheter des biens temporairement aliénés par des proches ; sans doute aussi ceux à qui, à défaut de frères du défunt (1.3-5,11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), incombait la responsabilité de susciter une descendance à la veuve pour perpétuer la famille et sauvegarder son patrimoine ; les mêmes parents avaient le devoir d'exercer la vengeance en cas de meurtre ; cf. 3.2,9 ; 4.1,5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s,14 ; voir aussi Ex 6.6+ ; Lv 25.25,47s ; 2S 14.11 ; Jr 32.7-9 ; Ps 19.14 ; Jb 19.25
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Pr 23.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Noémi dit à sa belle-fille : Qu''il soit béni du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui n''abandonne pas sa fidélité envers les vivants et les morts ! Noémi lui dit encore : Cet homme est notre proche parent, c''est un de nos rédempteurs. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Moabite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce qualificatif est ici omis par plusieurs versions anciennes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Attache-toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8.
    marker-yv: yv-n
  - type: text
    text: 'Ruth la Moabite reprit : Il m''a dit aussi : « Attache-toi à mes serviteurs jusqu''à ce qu''ils aient achevé toute ma moisson. » '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'on ne te malmène pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9 ; 1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Noémi dit à Ruth, sa belle-fille : Il est bon, ma fille, que tu ailles avec ses servantes et qu''on ne te malmène pas dans un autre champ.'
