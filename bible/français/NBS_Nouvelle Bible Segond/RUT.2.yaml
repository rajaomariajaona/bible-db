    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce qui était resté de sa satiété
    - type: usfm
      marker: ft
      children:
      - type: text
