    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 18.2s ; Ex 34.2s ; 1S 25.23 ; 2S 14.4,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trouver grâce '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 2+. – Le texte hébreu joue sur la parenté et l''assonance des mots traduits respectivement par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu t''intéresses à '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 19 ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'reconnaître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 3.14) et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: étrangère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', terme qui désigne habituellement l''étranger privé de tout droit dans le pays, par opposition à l''immigré (1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'inconnue '
    - type: usfm
