document_id: RUT.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruth glane dans le champ de Booz
  - type: text
    content: ' '
  - type: note
    content: 'puissant et riche  : litt. vaillant (cf. Jg 11.1) de puissance (ou de richesse ) ; ce dernier terme est traduit par valeur en 3.11 et par force en 4.11 ; dans un contexte militaire, la même formule est habituellement traduite par vaillant guerrier  ; cf. Jg 6.12+ ; 1S 9.1 ; 1R 11.28 ; 2R 5.1 ; 1Ch 12.29 ; 28.1 ; 2Ch 13.3 ; 17.16s ; 25.6 ; 32.21 ; voir aussi 2R 15.20 ; 24.14. –  Booz  : transcription traditionnelle, d''après LXX (cf. Mt 1.5n), de l''hébreu Bo‘az qui signifie probablement en lui la force (cf. 1R 7.21).'
  - type: text
    content: Noémi avait un parent du côté de son mari, un homme puissant et riche du clan d'Elimélek, qui se nommait Booz.
  '10':
  - type: note
    content: 'face contre terre  : cf. Gn 18.2s ; Ex 34.2s ; 1S 25.23 ; 2S 14.4,22. –  trouver grâce v. 2+. – Le texte hébreu joue sur la parenté et l''assonance des mots traduits respectivement par tu t''intéresses à (cf. v. 19 ; le même verbe est traduit par reconnaître en 3.14) et étrangère, terme qui désigne habituellement l''étranger privé de tout droit dans le pays, par opposition à l''immigré (1.1n) ; autre traduction inconnue (cf. Pr 2.16n) ; cf. 1S 18.18 ; 2S 7.18 ; Lc 1.48.'
  - type: text
    content: 'Alors elle se prosterna, face contre terre. Elle lui dit : Comment ai-je pu trouver grâce à tes yeux pour que tu t''intéresses à moi, alors que je suis une étrangère ? '
  '11':
  - type: note
    content: 'tu as abandonné…  : cf. 1.14nss ; Gn 2.24 ; 24.7 ; Mt 19.29. –  le pays de tes origines Gn 11.28n  ; 12.2. –  que tu ne connaissais pas  : litt. que tu n''as pas connu hier (ni) avant-hier  : cf. Gn 31.2n  ; Ex 4.10 ; 5.7n.'
  - type: text
    content: 'Booz lui répondit : On m''a raconté tout ce que tu as fait pour ta belle-mère depuis la mort de ton mari et comment tu as abandonné ton père, ta mère et le pays de tes origines pour aller vers un peuple que tu ne connaissais pas. '
  '12':
  - type: note
    content: 'Le verbe et l''adjectif traduits respectivement par rende et complète sont issus d''une même racine, apparentée au mot habituellement traduit par paix (shalom) ; cf. 2Jn 8. –  ta récompense  : autre traduction ton salaire  ; cf. 1S 24.20 ; Mt 10.42 ; Mc 10.30/ /. –  sous les ailes  : cf. 3.9n  ; voir aussi Ps 17.8 ; 36.8 ; 57.2 ; 61.5 ; 63.8 ; 91.4 ; Mt 23.37.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te rende ce que tu as fait ! Que ta récompense soit complète de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, sous les ailes de qui tu es venue chercher un abri ! '
  '13':
  - type: note
    content: 'Que je trouve…  : cf. v. 2+ ; Gn 33.15n  ; 1S 1.18 ; Lc 15.17-19. –  tu as parlé à mon cœur  : cf. Gn 34.3n  ; 50.21 ; Jg 19.3 ; Es 40.2 ; Os 2.16. –  comme l''une de tes servantes  : cf. 1S 25.41.'
  - type: text
    content: 'Elle dit : Que je trouve toujours grâce à tes yeux, mon maître ! Tu m''as consolée, moi, ta servante ; tu as parlé à mon cœur, alors que je ne suis pas même comme l''une de tes servantes.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Il lui tendit…  : autre traduction il lui fit un tas de grain rôti  ; sur ce terme, cf. 1S 17.17 ; 25.18 ; 2S 17.28. –  garda le reste v. 18.'
  - type: text
    content: 'A l''heure du repas, Booz lui dit : Approche, mange du pain et trempe ton morceau dans le vinaigre. Elle s''assit à côté des moissonneurs. Il lui tendit du grain rôti ; elle mangea, se rassasia et garda le reste. '
  '15':
  - type: note
    content: 'gerbes v. 7n. –  sans l''inquiéter  : autre traduction sans lui faire d''affront  ; cf. 1S 25.7n.'
  - type: text
    content: 'Puis elle se leva pour glaner. Booz donna cet ordre à ses serviteurs : Laissez-la glaner même entre les gerbes, sans l''inquiéter. '
  '16':
  - type: note
    content: 'javelles  : traduction incertaine ; il s''agit en tout cas d''épis déjà coupés ; cf. Lv 19.10. –  quelques épis  : sous-entendu ( ?) dans le texte. –  rabrouerez Gn 37.10 ; Jr 29.27.'
  - type: text
    content: Vous ôterez même pour elle des javelles quelques épis que vous lui laisserez à glaner ; vous ne la rabrouerez pas.
  - type: heading
    content: Noémi félicite et encourage Ruth
  '17':
  - type: text
    content: ' '
  - type: note
    content: un épha ≈ 40 l (voir mesures).
  - type: text
    content: 'Elle glana dans le champ jusqu''au soir et battit ce qu''elle avait glané. Il y eut environ un épha d''orge. '
  '18':
  - type: note
    content: 'le reste de son repas  : litt. ce qui était resté de sa satiété, cf. v. 14 ; 3.15.'
  - type: text
    content: 'Elle l''emporta, rentra en ville et montra à sa belle-mère ce qu''elle avait glané. Elle sortit aussi le reste de son repas et le lui donna. '
  '19':
  - type: text
    content: 'Sa belle-mère lui dit : Où as-tu glané aujourd''hui ? Où as-tu travaillé ? Béni soit celui qui s''est intéressé à toi ! Elle dit à sa belle-mère chez qui elle avait travaillé. Elle dit : Celui chez qui j''ai travaillé aujourd''hui porte le nom de Booz. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'glaner Lv 19.9s ; 23.22 ; Dt 24.19ss ; cf. Ex 16.4n. –  je trouverai grâce  : cf. v. 10,13 ; Gn 6.8+ ; Nb 32.5 ; 1S 25.8 ; 27.5 ; 2S 14.22 ; Est 7.3 ; Lc 1.30.'
  - type: text
    content: 'Ruth la Moabite dit à Noémi : Laisse-moi, je te prie, aller aux champs pour glaner des épis derrière celui aux yeux duquel je trouverai grâce. Elle lui dit : Va, ma fille !'
  '20':
  - type: note
    content: 'fidélité 1.8n  ; cf. 3.10 ; 2S 2.5 ; certains comprennent qu''il soit béni du Seigneur, celui (Booz) qui n''abandonne pas… –  nos rédempteurs  : c.-à-d. ceux qui ont le droit et, dans une certaine mesure, le devoir de racheter des biens temporairement aliénés par des proches ; sans doute aussi ceux à qui, à défaut de frères du défunt (1.3-5,11n), incombait la responsabilité de susciter une descendance à la veuve pour perpétuer la famille et sauvegarder son patrimoine ; les mêmes parents avaient le devoir d''exercer la vengeance en cas de meurtre ; cf. 3.2,9 ; 4.1,5ns,14 ; voir aussi Ex 6.6+ ; Lv 25.25,47s ; 2S 14.11 ; Jr 32.7-9 ; Ps 19.14 ; Jb 19.25n  ; Pr 23.11n.'
  - type: text
    content: 'Noémi dit à sa belle-fille : Qu''il soit béni du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui n''abandonne pas sa fidélité envers les vivants et les morts ! Noémi lui dit encore : Cet homme est notre proche parent, c''est un de nos rédempteurs. '
  '21':
  - type: note
    content: 'la Moabite  : ce qualificatif est ici omis par plusieurs versions anciennes. –  Attache-toi v. 8.'
  - type: text
    content: 'Ruth la Moabite reprit : Il m''a dit aussi : « Attache-toi à mes serviteurs jusqu''à ce qu''ils aient achevé toute ma moisson. » '
  '22':
  - type: note
    content: 'qu''on ne te malmène pas  : cf. v. 9 ; 1.16n.'
  - type: text
    content: 'Noémi dit à Ruth, sa belle-fille : Il est bon, ma fille, que tu ailles avec ses servantes et qu''on ne te malmène pas dans un autre champ.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: V. 8 ; 3.2. –  la moisson des blés débute deux à trois semaines après celle des orges (1.22n).
  - type: text
    content: Elle s'attacha donc aux servantes de Booz pour glaner, jusqu'à l'achèvement de la moisson des orges et de la moisson des blés ; elle habitait avec sa belle-mère.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Il se trouva…  : le texte hébreu suggère un heureux hasard ; on pourrait aussi traduire  : elle eut la chance de tomber sur la parcelle de terre qui appartenait…  ; cf. v. 19s. –  Booz v. 1n.'
  - type: text
    content: 'Elle partit et s''en vint glaner dans un champ derrière les moissonneurs. Il se trouva que la parcelle de terre appartenait à Booz, qui était du clan d''Elimélek. '
  '4':
  - type: note
    content: Que le Seigneur soit avec vous Jg 6.12+ ; cf. Ps 129.8 ; 2Th 3.16. –  te bénisse v. 19s ; 3.10 ; 4.14 ; Gn 1.22+ ; 12.2+ ; Nb 6.23-27.
  - type: text
    content: 'Or Booz arriva de Beth-Léhem ; il dit aux moissonneurs : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec vous ! Ils lui répondirent : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te bénisse ! '
  '5':
  - type: note
    content: 'A qui appartient…  : dans l''ancien Orient toute femme appartenait à quelqu''un (mari, père, frères) ; en demandant à qui appartient Ruth, Booz se renseigne sur son identité.'
  - type: text
    content: 'Booz dit au serviteur chargé de surveiller les moissonneurs : A qui appartient cette jeune femme ? '
  '6':
  - type: text
    content: 'Le serviteur chargé de surveiller les moissonneurs répondit : C''est la jeune Moabite qui est revenue avec Noémi du pays de Moab. '
  '7':
  - type: note
    content: 'Cf. v. 2s. –  entre les gerbes  : autre traduction entre les javelles. –  elle ne s''est assise…  : expression obscure, que beaucoup renoncent à traduire ; LXX a traduit elle ne s''est pas reposée un instant dans le champ.'
  - type: text
    content: 'Elle a dit : « Laisse-moi, je te prie, glaner et ramasser des épis entre les gerbes derrière les moissonneurs. » Depuis qu''elle est venue, ce matin, et jusqu''à présent elle est restée debout ; elle ne s''est assise que peu de temps dans la maison.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: V. 15,21,23 ; 3.2.
  - type: text
    content: 'Booz dit à Ruth : Ecoute bien, ma fille ; ne va pas glaner dans un autre champ ; ne t''éloigne pas non plus d''ici ; attache-toi à mes servantes. '
  '9':
  - type: note
    content: 'te toucher  : autre traduction t''importuner.'
  - type: text
    content: 'Tu auras les yeux sur le champ que l''on moissonne et tu iras derrière elles. J''ai interdit aux serviteurs de te toucher ; quand tu auras soif, tu iras aux cruches et tu boiras de ce que les serviteurs auront puisé. '
