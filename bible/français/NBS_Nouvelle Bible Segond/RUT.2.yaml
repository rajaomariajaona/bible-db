    marker-yv: yv-n
  - type: text
    text: 'Booz dit à Ruth : Ecoute bien, ma fille ; ne va pas glaner dans un autre champ ; ne t''éloigne pas non plus d''ici ; attache-toi à mes servantes. '
  - type: usfm
    marker: v
