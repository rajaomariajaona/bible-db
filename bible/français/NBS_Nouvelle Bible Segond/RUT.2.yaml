        text: t'importuner.
    marker-yv: yv-n
  - type: text
    text: 'Tu auras les yeux sur le champ que l''on moissonne et tu iras derrière elles. J''ai interdit aux serviteurs de te toucher ; quand tu auras soif, tu iras aux cruches et tu boiras de ce que les serviteurs auront puisé. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
