      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis elle se leva pour glaner. Booz donna cet ordre à ses serviteurs : Laissez-la glaner même entre les gerbes, sans l''inquiéter. '
  - type: usfm
    marker: v
    metadata:
