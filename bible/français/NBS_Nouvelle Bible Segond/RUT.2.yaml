          text: n
      - type: text
        text: '  ; 1S 1.18 ; Lc 15.17-19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu as parlé à mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 34.3'
      - type: usfm
