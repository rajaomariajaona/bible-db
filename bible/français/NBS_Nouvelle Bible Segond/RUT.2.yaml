        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'complète '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont issus d''une même racine, apparentée au mot habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: shalom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; cf. 2Jn 8. –  '
    - type: usfm
