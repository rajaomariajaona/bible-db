    marker-yv: yv-n
  - type: text
    text: 'Alors elle se prosterna, face contre terre. Elle lui dit : Comment ai-je pu trouver grâce à tes yeux pour que tu t''intéresses à moi, alors que je suis une étrangère ? '
  - type: usfm
