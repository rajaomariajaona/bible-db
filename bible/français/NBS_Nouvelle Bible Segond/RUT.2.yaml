    marker-yv: yv-n
  - type: text
    text: 'Elle a dit : « Laisse-moi, je te prie, glaner et ramasser des épis entre les gerbes derrière les moissonneurs. » Depuis qu''elle est venue, ce matin, et jusqu''à présent elle est restée debout ; elle ne s''est assise que peu de temps dans la maison.'
