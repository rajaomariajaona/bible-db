      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: javelles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; il s''agit en tout cas d''épis déjà coupés ; cf. Lv 19.10. –  '
