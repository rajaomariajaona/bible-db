    marker-yv: yv-n
  - type: text
    text: 'Ruth la Moabite dit à Noémi : Laisse-moi, je te prie, aller aux champs pour glaner des épis derrière celui aux yeux duquel je trouverai grâce. Elle lui dit : Va, ma fille !'
