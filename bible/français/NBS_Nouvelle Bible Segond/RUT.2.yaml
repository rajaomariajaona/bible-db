    marker-yv: yv-n
  - type: text
    text: 'Elle glana dans le champ jusqu''au soir et battit ce qu''elle avait glané. Il y eut environ un épha d''orge. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
