    marker-yv: yv-n
  - type: text
    text: 'Elle dit : Que je trouve toujours grâce à tes yeux, mon maître ! Tu m''as consolée, moi, ta servante ; tu as parlé à mon cœur, alors que je ne suis pas même comme l''une de tes servantes.'
