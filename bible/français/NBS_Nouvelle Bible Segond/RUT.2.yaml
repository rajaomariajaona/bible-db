    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entre les gerbes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
