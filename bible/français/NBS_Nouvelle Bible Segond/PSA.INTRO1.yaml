document_id: PSA.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Au cœur de la Bible : les Psaumes'
  - type: text
    content: 'La situation du livre des Psaumes au cœur de la Bible peut revêtir une valeur symbolique. Luther présentait les Psaumes comme une '
  - type: text
    content: petite Bible
  - type: text
    content: ' à l''intérieur de la grande, véritable '
  - type: text
    content: enchiridion
  - type: text
    content: ' ou manuel de la vie du croyant (voir encadré ci-contre).'
  - type: text
    content: 'De tous les livres de l''Ancien Testament, celui des Psaumes est le plus aimé, comme en témoigne l''habitude assez répandue de le joindre aux éditions modernes du Nouveau Testament. Ce penchant pour les Psaumes est déjà le fait des '
  - type: text
    content: premiers chrétiens
  - type: text
    content: '. Ils en font un usage surabondant, avec 126 citations littérales dans tout le Nouveau Testament ; et si l''on tient compte des allusions et réminiscences, le chiffre dépasse les 400. Rien d''étonnant à cette prééminence des Psaumes dans la Bible de l''Eglise primitive quand on se rappelle l''usage que Jésus lui-même, selon les évangiles, en a fait : il les a chantés (Mc 14.26/ /), il s''en est approprié les paroles (Mc 15.34/ /), il les a médités assidûment (Lc 24.44).'
  - type: text
    content: C'est au cours du III
  - type: text
    content: e
  - type: text
    content: ' siècle apr. J.-C. que les hymnes en usage dans les communautés chrétiennes, de plus en plus soupçonnées d''hérésie, sont remplacées dans le '
  - type: text
    content: culte
  - type: text
    content: ' par les Psaumes. On sait que les huguenots français du XVI'
  - type: text
    content: e
  - type: text
    content: ' siècle ont vigoureusement repris cette tradition avec l''élaboration si réussie du psautier Marot-Goudimel, qui tient encore aujourd''hui une place d''honneur dans de nombreux cultes évangéliques et réformés de langue française.'
  - type: text
    content: Qu'est-ce qu'un « psaume » ?
  - type: text
    content: 'Le mot '
  - type: text
    content: psaume
  - type: text
    content: ' vient du grec '
  - type: text
    content: psalmos
  - type: text
    content: ', lui-même dérivé d''un verbe qui signifie à l''origine « chanter en s''accompagnant d''un instrument à cordes ». Le psaume est un poème spirituel chanté. Son existence est indissociable de celle de la '
  - type: text
    content: musique
  - type: text
    content: '. Dans la liturgie du second temple, l''orchestre lévitique disposait d''instruments divers. Malgré les différences évidentes, l''orgue d''église, avec ses registres multiples, a prolongé un tel usage (cf. Ps 150 ; et comparer 2Ch 5.12s avec Ps 136). La tradition rabbinique a choisi d''appeler le livre '
  - type: text
    content: Tehillim
  - type: text
    content: ' (à partir de l''hébreu biblique '
  - type: text
    content: tehilloth
  - type: text
    content: ', '
  - type: text
    content: louanges
  - type: text
    content: ', cf. Ps 9.15 etc.).'
  - type: text
    content: Le recueil des Psaumes
  - type: text
    content: Le psautier est l'aboutissement d'une longue tradition de méditation, de rédaction de prières, de mise en forme liturgique et musicale. Certains psaumes sont sans doute très anciens, d'autres de l'époque perse ou même du III
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C. Leur principal point commun est précisément d''avoir été admis dans le grand '
  - type: text
    content: recueil liturgique
  - type: text
    content: ' de la communauté du second temple, son manuel de louanges et prières.'
  - type: text
    content: 'Dans sa forme finale, le psautier apparaît comme un '
  - type: text
    content: recueil de recueils
  - type: text
    content: '. A l''instar des réalisations modernes dans ce domaine, les compilateurs sont allés chercher des œuvres dans diverses directions dont ils rendent quelquefois compte en citant leurs sources (ainsi les formules '
  - type: text
    content: de David, des fils de Coré, d'Asaph
  - type: text
    content: ' se réfèrent peut-être à des collections préexistantes ; voir le paragraphe « Les suscriptions » ci-après). Le recueil est actuellement divisé, tout comme la Torah, en cinq livres, qu''il est facile de repérer (1–41 ; 42–72 ; 73–89 ; 90–106 ; 107–150). Les quatre premiers s''achèvent sur une '
  - type: text
    content: doxologie
  - type: text
    content: ' (louange solennelle à Dieu) dont la formulation varie d''un cas à l''autre (voir 41.14 ; 72.18s ; 89.53 ; 106.48).'
  - type: text
    content: 'La cinquième doxologie est constituée par le Psaume 150 tout entier, psaume de louange dont le dernier verset enseigne à dire '
  - type: text
    content: alléluia
  - type: text
    content: ' ('
  - type: text
    content: louez le Seigneur
  - type: text
    content: '), avec une assonance qui pourrait être transposée en français :'
  - type: text
    content: Que tout ce qui respire loue Yah !
  - type: text
    content: Halelou-Yah !
  - type: text
    content: (Ps 150.6)
  - type: text
    content: 'Ce psaume sert manifestement de '
  - type: text
    content: conclusion
  - type: text
    content: ' à tout le psautier. Celui-ci avait du reste été commencé avec un autre psaume hors série, le Psaume 1, qui donne un condensé de l''enseignement de sagesse à découvrir dans l''usage du recueil entier.'
  - type: text
    content: Les suscriptions
  - type: text
    content: 'Les '
  - type: text
    content: suscriptions
  - type: text
    content: ', écrites en italiques dans la présente édition, ne font évidemment pas partie du poème qu''elles introduisent. Ce sont d''anciennes annotations, portées sans doute par ceux qui ont rassemblé les psaumes dans leurs premières collections ou dans le livre biblique tel que unous le connaissons.'
  - type: text
    content: 'On y trouve des indications concernant le '
  - type: text
    content: genre
  - type: text
    content: ' du morceau (voir ci-dessous « Les différentes catégories de psaumes selon les suscriptions »), les '
  - type: text
    content: modes d'exécution musicale
  - type: text
    content: ', l'''
  - type: text
    content: utilisation liturgique
  - type: text
    content: ', enfin les '
  - type: text
    content: circonstances
  - type: text
    content: ' supposées de la composition du psaume. A la manière de gloses marginales, elles résument un savoir et des interprétations traditionnels, sur lesquels il est difficile de se prononcer avec beaucoup d''assurance (Ps 3 ; 7 ; 18 ; 34 ; 51 etc.).'
  - type: text
    content: L'orchestre des Psaumes
  - type: text
    content: 'Dans les '
  - type: text
    content: suscriptions
  - type: text
    content: ', il n''y a que très peu d''indications au sujet de l''orchestre des Psaumes. Les instruments à cordes sont seuls mentionnés dans les titres, avec quelques additions diversement interprétées : la '
  - type: text
    content: lyre à huit cordes
  - type: text
    content: ' aux Psaumes 6 et 12, la '
  - type: text
    content: guittith
  - type: text
    content: ' ou « lyre ( ?) de Gath » aux Psaumes 8, 81 et 84 (à moins qu''il s''agisse de noms de mélodies).'
  - type: text
    content: 'Les instruments mentionnés dans le corps des Psaumes se retrouvent presque tous au '
  - type: text
    content: Psaume 150
  - type: text
    content: '. En ce qui concerne le '
  - type: text
    content: luth
  - type: text
    content: ', quelques occurrences semblent le décrire '
  - type: text
    content: à dix cordes
  - type: text
    content: ' (Ps 33.2 ; 92.4, '
  - type: text
    content: nével `asor
  - type: text
    content: '). Le Psaume 98.6 mentionne en outre les '
  - type: text
    content: trompettes
  - type: text
    content: ', tandis que le Psaume 5, dans sa suscription, pourrait bien faire référence à des '
  - type: text
    content: flûtes
  - type: text
    content: '. Au Psaume 46, on comprend '
  - type: text
    content: alamoth
  - type: text
    content: ' comme désignant un instrument de musique ou des voix de jeunes filles.'
  - type: text
    content: L'Ancien Testament évoque ailleurs d'autres instruments encore ; on comparera aux données des Psaumes celles de Daniel 3.15 et de 1 Chroniques 25.6s.
  - type: text
    content: Les mélodies
  - type: text
    content: 'Il y a également, semble-t-il, plusieurs indications du type «  '
  - type: text
    content: sur l'air de
  - type: text
    content: '… ». Ainsi : '
  - type: text
    content: sur « Les lis »
  - type: text
    content: ' (Ps 45), '
  - type: text
    content: « Ne détruis pas ! »
  - type: text
    content: ' (Ps 57), '
  - type: text
    content: sur « Meurs pour le fils »
  - type: text
    content: ' (Ps 9), '
  - type: text
    content: sur « Biche de l'aurore »
  - type: text
    content: ' (Ps 22), '
  - type: text
    content: sur « Colombe des térébinthes lointains »
  - type: text
    content: ' (Ps 56) ; on se reportera aux notes correspondantes.'
  - type: text
    content: 'On pense également que la mention '
  - type: text
    content: du
  - type: text
    content: ' (ou '
  - type: text
    content: au
  - type: text
    content: ') '
  - type: text
    content: chef de chœur
  - type: text
    content: ' (55 fois) est une indication technique (cf. 2S 22 et Ps 18), signifiant par exemple la nécessité d''une interprétation sous direction rythmique.'
  - type: text
    content: Utilisations liturgiques
  - type: text
    content: 'Certaines suscriptions peuvent préciser l''utilisation liturgique d''un psaume. Ainsi, le Psaume 30 semble en rapport avec la '
  - type: text
    content: dédicace du temple
  - type: text
    content: ', alors que le Psaume 92 fait référence au '
  - type: text
    content: sabbat*
  - type: text
    content: .
  - type: text
    content: 'Les Psaumes 120 à 134 sont intitulés «  '
  - type: text
    content: chants des montées
  - type: text
    content: '  » (= '
  - type: text
    content: ma`aloth
  - type: text
    content: ). On pense en général qu'ils le doivent au fait qu'ils étaient chantés par les pèlerins en marche vers Jérusalem et qui « montaient » vers la ville sainte (Jg 1.9
  - type: text
    content: n
  - type: text
    content: ). Quelques-uns ont pensé que ces psaumes étaient chantés sur les marches de l'escalier du temple, ou pas à pas dans certaines processions ; de là la traduction « chant des degrés », introduite par la Vulgate. D'autres encore ont supposé que ce nom est dû à la progression graduelle de ces Psaumes où souvent un mot d'un verset est repris au verset suivant (p. ex. Ps 120.2s,5s).
  - type: text
    content: 'Par-delà les distinctions de genre littéraire, de circonstances, d''usage liturgique, les Psaumes jouent un rôle irremplaçable : ils nous enseignent '
  - type: text
    content: comment prier
  - type: text
    content: .
  - type: text
    content: 'En parcourant ces 150 poèmes, on reste toujours frappé par le lien étroit entre le fidèle et son Seigneur. Le croyant y découvre tout l''éventail des '
  - type: text
    content: situations humaines
  - type: text
    content: ' dans la '
  - type: text
    content: relation avec Dieu
  - type: text
    content: . Il les lit en prière, il les chante, il en reprend des éléments, il se les approprie, il en établit des imitations personnelles qui deviennent ses propres psaumes.
  - type: text
    content: A travers les époques, la communication avec la foi des pères passe par ce chemin que Jésus aussi a suivi.
