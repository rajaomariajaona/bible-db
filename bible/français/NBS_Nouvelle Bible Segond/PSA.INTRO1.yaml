document_id: PSA.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: is2
    children:
    - type: text
      text: 'Au cœur de la Bible : les Psaumes'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La situation du livre des Psaumes au cœur de la Bible peut revêtir une valeur symbolique. Luther présentait les Psaumes comme une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: petite Bible
    - type: text
      text: ' à l''intérieur de la grande, véritable '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enchiridion
    - type: text
      text: ' ou manuel de la vie du croyant (voir encadré ci-contre).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'De tous les livres de l''Ancien Testament, celui des Psaumes est le plus aimé, comme en témoigne l''habitude assez répandue de le joindre aux éditions modernes du Nouveau Testament. Ce penchant pour les Psaumes est déjà le fait des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: premiers chrétiens
    - type: text
      text: '. Ils en font un usage surabondant, avec 126 citations littérales dans tout le Nouveau Testament ; et si l''on tient compte des allusions et réminiscences, le chiffre dépasse les 400. Rien d''étonnant à cette prééminence des Psaumes dans la Bible de l''Eglise primitive quand on se rappelle l''usage que Jésus lui-même, selon les évangiles, en a fait : il les a chantés (Mc 14.26/ /), il s''en est approprié les paroles (Mc 15.34/ /), il les a médités assidûment (Lc 24.44).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: C'est au cours du III
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle apr. J.-C. que les hymnes en usage dans les communautés chrétiennes, de plus en plus soupçonnées d''hérésie, sont remplacées dans le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: culte
    - type: text
      text: ' par les Psaumes. On sait que les huguenots français du XVI'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle ont vigoureusement repris cette tradition avec l''élaboration si réussie du psautier Marot-Goudimel, qui tient encore aujourd''hui une place d''honneur dans de nombreux cultes évangéliques et réformés de langue française.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Qu'est-ce qu'un « psaume » ?
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le mot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: psaume
    - type: text
      text: ' vient du grec '
    - type: usfm
      marker: it
      children:
      - type: text
        text: psalmos
    - type: text
      text: ', lui-même dérivé d''un verbe qui signifie à l''origine « chanter en s''accompagnant d''un instrument à cordes ». Le psaume est un poème spirituel chanté. Son existence est indissociable de celle de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: musique
    - type: text
      text: '. Dans la liturgie du second temple, l''orchestre lévitique disposait d''instruments divers. Malgré les différences évidentes, l''orgue d''église, avec ses registres multiples, a prolongé un tel usage (cf. Ps 150 ; et comparer 2Ch 5.12s avec Ps 136). La tradition rabbinique a choisi d''appeler le livre '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tehillim
    - type: text
      text: ' (à partir de l''hébreu biblique '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tehilloth
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: louanges
    - type: text
      text: ', cf. Ps 9.15 etc.).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le recueil des Psaumes
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le psautier est l'aboutissement d'une longue tradition de méditation, de rédaction de prières, de mise en forme liturgique et musicale. Certains psaumes sont sans doute très anciens, d'autres de l'époque perse ou même du III
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle av. J.-C. Leur principal point commun est précisément d''avoir été admis dans le grand '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: recueil liturgique
    - type: text
      text: ' de la communauté du second temple, son manuel de louanges et prières.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans sa forme finale, le psautier apparaît comme un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: recueil de recueils
    - type: text
      text: '. A l''instar des réalisations modernes dans ce domaine, les compilateurs sont allés chercher des œuvres dans diverses directions dont ils rendent quelquefois compte en citant leurs sources (ainsi les formules '
    - type: usfm
      marker: it
      children:
      - type: text
        text: de David, des fils de Coré, d'Asaph
    - type: text
      text: ' se réfèrent peut-être à des collections préexistantes ; voir le paragraphe « Les suscriptions » ci-après). Le recueil est actuellement divisé, tout comme la Torah, en cinq livres, qu''il est facile de repérer (1–41 ; 42–72 ; 73–89 ; 90–106 ; 107–150). Les quatre premiers s''achèvent sur une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: doxologie
    - type: text
      text: ' (louange solennelle à Dieu) dont la formulation varie d''un cas à l''autre (voir 41.14 ; 72.18s ; 89.53 ; 106.48).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La cinquième doxologie est constituée par le Psaume 150 tout entier, psaume de louange dont le dernier verset enseigne à dire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alléluia
    - type: text
      text: ' ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: louez le Seigneur
    - type: text
      text: '), avec une assonance qui pourrait être transposée en français :'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: Que tout ce qui respire loue Yah !
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: Halelou-Yah !
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: (Ps 150.6)
  - type: usfm
    marker: im
    children:
    - type: text
      text: 'Ce psaume sert manifestement de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: conclusion
    - type: text
      text: ' à tout le psautier. Celui-ci avait du reste été commencé avec un autre psaume hors série, le Psaume 1, qui donne un condensé de l''enseignement de sagesse à découvrir dans l''usage du recueil entier.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Les suscriptions
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: suscriptions
    - type: text
      text: ', écrites en italiques dans la présente édition, ne font évidemment pas partie du poème qu''elles introduisent. Ce sont d''anciennes annotations, portées sans doute par ceux qui ont rassemblé les psaumes dans leurs premières collections ou dans le livre biblique tel que unous le connaissons.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On y trouve des indications concernant le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: genre
    - type: text
      text: ' du morceau (voir ci-dessous « Les différentes catégories de psaumes selon les suscriptions »), les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: modes d'exécution musicale
    - type: text
      text: ', l'''
    - type: usfm
      marker: bd
      children:
      - type: text
        text: utilisation liturgique
    - type: text
      text: ', enfin les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: circonstances
    - type: text
      text: ' supposées de la composition du psaume. A la manière de gloses marginales, elles résument un savoir et des interprétations traditionnels, sur lesquels il est difficile de se prononcer avec beaucoup d''assurance (Ps 3 ; 7 ; 18 ; 34 ; 51 etc.).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: L'orchestre des Psaumes
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: suscriptions
    - type: text
      text: ', il n''y a que très peu d''indications au sujet de l''orchestre des Psaumes. Les instruments à cordes sont seuls mentionnés dans les titres, avec quelques additions diversement interprétées : la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lyre à huit cordes
    - type: text
      text: ' aux Psaumes 6 et 12, la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: guittith
    - type: text
      text: ' ou « lyre ( ?) de Gath » aux Psaumes 8, 81 et 84 (à moins qu''il s''agisse de noms de mélodies).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les instruments mentionnés dans le corps des Psaumes se retrouvent presque tous au '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Psaume 150
    - type: text
      text: '. En ce qui concerne le '
    - type: usfm
      marker: it
      children:
      - type: text
        text: luth
    - type: text
      text: ', quelques occurrences semblent le décrire '
    - type: usfm
      marker: it
      children:
      - type: text
        text: à dix cordes
    - type: text
      text: ' (Ps 33.2 ; 92.4, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nével `asor
    - type: text
      text: '). Le Psaume 98.6 mentionne en outre les '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trompettes
    - type: text
      text: ', tandis que le Psaume 5, dans sa suscription, pourrait bien faire référence à des '
    - type: usfm
      marker: it
      children:
      - type: text
        text: flûtes
    - type: text
      text: '. Au Psaume 46, on comprend '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alamoth
    - type: text
      text: ' comme désignant un instrument de musique ou des voix de jeunes filles.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L'Ancien Testament évoque ailleurs d'autres instruments encore ; on comparera aux données des Psaumes celles de Daniel 3.15 et de 1 Chroniques 25.6s.
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Les mélodies
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Il y a également, semble-t-il, plusieurs indications du type «  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: sur l'air de
    - type: text
      text: '… ». Ainsi : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sur « Les lis »
    - type: text
      text: ' (Ps 45), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: « Ne détruis pas ! »
    - type: text
      text: ' (Ps 57), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sur « Meurs pour le fils »
    - type: text
      text: ' (Ps 9), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sur « Biche de l'aurore »
    - type: text
      text: ' (Ps 22), '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sur « Colombe des térébinthes lointains »
    - type: text
      text: ' (Ps 56) ; on se reportera aux notes correspondantes.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On pense également que la mention '
    - type: usfm
      marker: it
      children:
      - type: text
        text: du
    - type: text
      text: ' (ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: au
    - type: text
      text: ') '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chef de chœur
    - type: text
      text: ' (55 fois) est une indication technique (cf. 2S 22 et Ps 18), signifiant par exemple la nécessité d''une interprétation sous direction rythmique.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Utilisations liturgiques
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Certaines suscriptions peuvent préciser l''utilisation liturgique d''un psaume. Ainsi, le Psaume 30 semble en rapport avec la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dédicace du temple
    - type: text
      text: ', alors que le Psaume 92 fait référence au '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sabbat*
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les Psaumes 120 à 134 sont intitulés «  '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: chants des montées
    - type: text
      text: '  » (= '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ma`aloth
    - type: text
      text: ). On pense en général qu'ils le doivent au fait qu'ils étaient chantés par les pèlerins en marche vers Jérusalem et qui « montaient » vers la ville sainte (Jg 1.9
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ). Quelques-uns ont pensé que ces psaumes étaient chantés sur les marches de l'escalier du temple, ou pas à pas dans certaines processions ; de là la traduction « chant des degrés », introduite par la Vulgate. D'autres encore ont supposé que ce nom est dû à la progression graduelle de ces Psaumes où souvent un mot d'un verset est repris au verset suivant (p. ex. Ps 120.2s,5s).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Par-delà les distinctions de genre littéraire, de circonstances, d''usage liturgique, les Psaumes jouent un rôle irremplaçable : ils nous enseignent '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: comment prier
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En parcourant ces 150 poèmes, on reste toujours frappé par le lien étroit entre le fidèle et son Seigneur. Le croyant y découvre tout l''éventail des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: situations humaines
    - type: text
      text: ' dans la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: relation avec Dieu
    - type: text
      text: . Il les lit en prière, il les chante, il en reprend des éléments, il se les approprie, il en établit des imitations personnelles qui deviennent ses propres psaumes.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: A travers les époques, la communication avec la foi des pères passe par ce chemin que Jésus aussi a suivi.
