      text: 'Après cela, tu arriveras à Guibéa-Elohim, où se trouve une garnison de Philistins. En entrant dans la ville, tu rencontreras une troupe de prophètes descendant du haut lieu, en train de faire les prophètes, précédés du luth, du tambourin, de la flûte et de la lyre. '
