document_id: 1SA.10,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une fiole d''huile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qu''il avait emportée ; cf. 16.1-13 ; 1R 1.39 ; 2R 9.1-6 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la tête de Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur sa tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour que tu sois chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' présente ici un texte plus développé'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '… le chef de son peuple d''Israël. C''est toi qui détiendras le pouvoir sur le peuple du Seigneur et qui le délivreras des ennemis qui l''entourent ; et voici pour toi le signe que le Seigneur t''a oint… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir aussi Ac 13.21.
      marker-yv: yv-n
    - type: text
      text: 'Samuel prit une fiole d''huile qu''il versa sur la tête de Saül. Il l''embrassa et dit : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a conféré l''onction pour que tu sois chef sur son patrimoine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX dit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de là, ils arrivèrent à Guibéa.
      marker-yv: yv-n
    - type: text
      text: 'Comme ils arrivaient là, à Guibéa, une troupe de prophètes vint à sa rencontre. Le souffle de Dieu s''empara de lui, et il se mit à faire le prophète au milieu d''eux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui le connaissaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui le connaissaient d'hier (d’)avant-hier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. d''habitude ; cf. 4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 31.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saül… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.24 ; cf. Mt 13.54-57 ; Ac 9.21.
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui le connaissaient virent qu''il se comportait en prophète avec les prophètes ; les gens se disaient les uns aux autres : Qu''est-il arrivé au fils de Qish ? Saül est-il aussi parmi les prophètes ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui est leur père ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'le sens de cette question est peu clair. Le mot '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'semble désigner le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chef '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du groupe de prophètes (cf. 2R 2.12) ; la question, laissée sans réponse, soulignerait que cette bande d'exaltés ne se rattache à aucune confrérie connue et respectable de prophètes. Le contexte en tout cas suggère que Saül ne se comporte pas d'une manière qui convient à son rang.
      marker-yv: yv-n
    - type: text
      text: 'Quelqu''un de l''endroit répondit : Et qui est leur père ? – De là le proverbe : Saül est-il aussi parmi les prophètes ?'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: haut
        - type: text
          text: ' lieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 5 ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Guibéa.
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''il eut fini de faire le prophète, il se rendit au haut lieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: L'oncle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il pourrait s''agir d''Abner, fils de Ner, d''après 14.50s.'
      marker-yv: yv-n
    - type: text
      text: 'L''oncle de Saül dit à Saül et à son serviteur : Où êtes-vous allés ? Saül répondit : Chercher les ânesses ; mais nous n''avons rien vu et nous sommes allés chez Samuel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''oncle de Saül reprit : Je t''en prie, raconte-moi ce que vous a dit Samuel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne lui raconta rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 14.6 ; Ec 3.7.'
      marker-yv: yv-n
    - type: text
      text: 'Saül répondit à son oncle : Il nous a bien signalé que les ânesses étaient retrouvées. Mais il ne lui raconta rien au sujet de la royauté dont avait parlé Samuel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül désigné comme roi par le tirage au sort
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mitspa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.5 ; Jg 20.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Samuel convoqua le peuple devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' au Mitspa, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ainsi parle le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule d''introduction fréquente chez les prophètes, cf. p. ex. Es 8.11 ; Jr 2.2 ; Ez 11.5 ; Am 1.3 ; Mi 2.3 ; Na 1.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'monter… d''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 1–15 ; 20.2 ; Jg 6.8s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de tous les royaumes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jg 3.8,14 ; 4.2 ; 6.1 ; 10.7 ; 13.1.
      marker-yv: yv-n
    - type: text
      text: 'et il dit aux Israélites : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : C''est moi qui ai fait monter Israël d''Egypte. Je vous ai délivrés de la main des Egyptiens et de la main de tous les royaumes qui vous opprimaient. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rejetez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: méprisez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: votre Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 11.20 ; 1R 14.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en lui disant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs versions anciennes, peut-être influencées par le texte de 8.19, ont lu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en disant : Non ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un roi à notre tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.5,19 ; 12.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'phratrie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contingent, millier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Nb 1.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 5.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mi 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et c''est vous qui, aujourd''hui, rejetez votre Dieu, qui vous a sauvés de tous vos malheurs et de toutes vos détresses, en lui disant : « Place un roi à notre tête ! » Maintenant, tenez-vous debout devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', tribu par tribu et phratrie par phratrie.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tombeau de Rachel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 35.19s. On montre encore aujourd''hui, peu avant l''entrée nord de la localité de Beth-Léhem, un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tombeau de Rachel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traditionnel, lieu de pèlerinage juif. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tseltsah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce nom de lieu n''apparaît qu''ici dans la Bible, et sa localisation est inconnue. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ânesses… retrouvées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.3.'
      marker-yv: yv-n
    - type: text
      text: 'Aujourd''hui, après m''avoir quitté, tu trouveras deux hommes près du tombeau de Rachel, à la frontière de Benjamin, à Tseltsah. Ils te diront : « Les ânesses que tu es allé chercher sont retrouvées ; maintenant ton père a laissé de côté l''affaire des ânesses, mais il s''inquiète de vous et dit : “Que dois-je faire au sujet de mon fils ?” » '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: désignée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit d''une sorte de tirage au sort (cf. 14.40-42 ; Jos 7.14-18 ; Ac 1.23ss), probablement au moyen de l''ourim et du toummim (voir Ex 28.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Samuel présenta toutes les tribus d''Israël, et la tribu de Benjamin fut désignée. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Matri fut désigné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Il fit approcher le clan de Matri, homme par homme, (et Saül…)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on ne le trouva pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte ne dévoile pas la raison de cette absence : retard, dérobade, modestie, ou autre.'
      marker-yv: yv-n
    - type: text
      text: 'Il présenta la tribu de Benjamin clan par clan, et le clan de Matri fut désigné. Puis Saül, fils de Qish, fut désigné. On le chercha, mais on ne le trouva pas. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On interrogea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sha'al
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: demander
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le texte joue peut-être sur le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Voir des interrogations analogues en 23.2,4,9-12 ; Jg 1.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Y a-t-il… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'plusieurs versions anciennes posent la question sous la forme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cet homme est-il venu ici ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du matériel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des objets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme très général qui se rapporte peut-être ici à un équipement militaire (cf. 17.22 ; 25.13 etc.).'
      marker-yv: yv-n
    - type: text
      text: 'On interrogea de nouveau le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Y a-t-il encore un homme qui soit venu ici ? Et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
