document_id: 1SA.10,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'une fiole d''huile qu''il avait emportée ; cf. 16.1-13 ; 1R 1.39 ; 2R 9.1-6 ; voir onction. –  sur la tête de Saül  : litt. sur sa tête . –  pour que tu sois chef  : cf. 9.16n  ; LXX présente ici un texte plus développé  : … le chef de son peuple d''Israël. C''est toi qui détiendras le pouvoir sur le peuple du Seigneur et qui le délivreras des ennemis qui l''entourent ; et voici pour toi le signe que le Seigneur t''a oint… Voir aussi Ac 13.21.'
  - type: text
    content: 'Samuel prit une fiole d''huile qu''il versa sur la tête de Saül. Il l''embrassa et dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a conféré l''onction pour que tu sois chef sur son patrimoine. '
  '10':
  - type: note
    content: 'là  : LXX dit de là, ils arrivèrent à Guibéa.'
  - type: text
    content: 'Comme ils arrivaient là, à Guibéa, une troupe de prophètes vint à sa rencontre. Le souffle de Dieu s''empara de lui, et il se mit à faire le prophète au milieu d''eux. '
  '11':
  - type: note
    content: 'qui le connaissaient  : litt. qui le connaissaient d''hier (d’)avant-hier, c.-à-d. d''habitude ; cf. 4.7n  ; Gn 31.2n. –  Saül… 19.24 ; cf. Mt 13.54-57 ; Ac 9.21.'
  - type: text
    content: 'Tous ceux qui le connaissaient virent qu''il se comportait en prophète avec les prophètes ; les gens se disaient les uns aux autres : Qu''est-il arrivé au fils de Qish ? Saül est-il aussi parmi les prophètes ? '
  '12':
  - type: note
    content: qui est leur père ? le sens de cette question est peu clair. Le mot père semble désigner le maître ou le chef du groupe de prophètes (cf. 2R 2.12) ; la question, laissée sans réponse, soulignerait que cette bande d'exaltés ne se rattache à aucune confrérie connue et respectable de prophètes. Le contexte en tout cas suggère que Saül ne se comporte pas d'une manière qui convient à son rang.
  - type: text
    content: 'Quelqu''un de l''endroit répondit : Et qui est leur père ? – De là le proverbe : Saül est-il aussi parmi les prophètes ?'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'au haut lieu  : cf. v. 5 ; LXX à Guibéa.'
  - type: text
    content: 'Lorsqu''il eut fini de faire le prophète, il se rendit au haut lieu. '
  '14':
  - type: note
    content: 'L''oncle  : il pourrait s''agir d''Abner, fils de Ner, d''après 14.50s.'
  - type: text
    content: 'L''oncle de Saül dit à Saül et à son serviteur : Où êtes-vous allés ? Saül répondit : Chercher les ânesses ; mais nous n''avons rien vu et nous sommes allés chez Samuel. '
  '15':
  - type: text
    content: 'L''oncle de Saül reprit : Je t''en prie, raconte-moi ce que vous a dit Samuel. '
  '16':
  - type: note
    content: 'il ne lui raconta rien  : cf. Jg 14.6 ; Ec 3.7.'
  - type: text
    content: 'Saül répondit à son oncle : Il nous a bien signalé que les ânesses étaient retrouvées. Mais il ne lui raconta rien au sujet de la royauté dont avait parlé Samuel.'
  - type: heading
    content: Saül désigné comme roi par le tirage au sort
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Mitspa  : cf. 7.5 ; Jg 20.1n.'
  - type: text
    content: 'Samuel convoqua le peuple devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au Mitspa, '
  '18':
  - type: note
    content: 'Ainsi parle le Seigneur  : formule d''introduction fréquente chez les prophètes, cf. p. ex. Es 8.11 ; Jr 2.2 ; Ez 11.5 ; Am 1.3 ; Mi 2.3 ; Na 1.12. –  monter… d''Egypte Gn 12.10n. –  des Egyptiens  : autre traduction de l''Egypte  ; cf. Ex 1–15 ; 20.2 ; Jg 6.8s. –  de tous les royaumes Jg 3.8,14 ; 4.2 ; 6.1 ; 10.7 ; 13.1.'
  - type: text
    content: 'et il dit aux Israélites : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : C''est moi qui ai fait monter Israël d''Egypte. Je vous ai délivrés de la main des Egyptiens et de la main de tous les royaumes qui vous opprimaient. '
  '19':
  - type: note
    content: 'rejetez (ou méprisez) votre Dieu  : cf. 8.7n  ; Nb 11.20 ; 1R 14.9. –  en lui disant  : plusieurs versions anciennes, peut-être influencées par le texte de 8.19, ont lu  : en disant : Non ! –  un roi à notre tête  : cf. 8.5,19 ; 12.12. –  phratrie ou contingent, millier, cf. Nb 1.16n  ; Jg 5.8n  ; 6.15n  ; Mi 5.1n.'
  - type: text
    content: 'Et c''est vous qui, aujourd''hui, rejetez votre Dieu, qui vous a sauvés de tous vos malheurs et de toutes vos détresses, en lui disant : « Place un roi à notre tête ! » Maintenant, tenez-vous debout devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', tribu par tribu et phratrie par phratrie.'
  '2':
  - type: note
    content: 'tombeau de Rachel  : cf. Gn 35.19s. On montre encore aujourd''hui, peu avant l''entrée nord de la localité de Beth-Léhem, un tombeau de Rachel traditionnel, lieu de pèlerinage juif. –  Tseltsah  : ce nom de lieu n''apparaît qu''ici dans la Bible, et sa localisation est inconnue. –  ânesses… retrouvées  : cf. 9.3.'
  - type: text
    content: 'Aujourd''hui, après m''avoir quitté, tu trouveras deux hommes près du tombeau de Rachel, à la frontière de Benjamin, à Tseltsah. Ils te diront : « Les ânesses que tu es allé chercher sont retrouvées ; maintenant ton père a laissé de côté l''affaire des ânesses, mais il s''inquiète de vous et dit : “Que dois-je faire au sujet de mon fils ?” » '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'désignée  : il s''agit d''une sorte de tirage au sort (cf. 14.40-42 ; Jos 7.14-18 ; Ac 1.23ss), probablement au moyen de l''ourim et du toummim (voir Ex 28.30n).'
  - type: text
    content: 'Samuel présenta toutes les tribus d''Israël, et la tribu de Benjamin fut désignée. '
  '21':
  - type: note
    content: 'Matri fut désigné  : LXX ajoute  : Il fit approcher le clan de Matri, homme par homme, (et Saül…). –  on ne le trouva pas  : le texte ne dévoile pas la raison de cette absence : retard, dérobade, modestie, ou autre.'
  - type: text
    content: 'Il présenta la tribu de Benjamin clan par clan, et le clan de Matri fut désigné. Puis Saül, fils de Qish, fut désigné. On le chercha, mais on ne le trouva pas. '
  '22':
  - type: note
    content: 'On interrogea  : le verbe hébreu correspondant est sha''al, habituellement traduit par demander  ; cf. 1.20n,28n  ; le texte joue peut-être sur le nom de Saül. Voir des interrogations analogues en 23.2,4,9-12 ; Jg 1.1. –  Y a-t-il… ? plusieurs versions anciennes posent la question sous la forme cet homme est-il venu ici ? –  du matériel  : litt. des objets, terme très général qui se rapporte peut-être ici à un équipement militaire (cf. 17.22 ; 25.13 etc.).'
  - type: text
    content: 'On interrogea de nouveau le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Y a-t-il encore un homme qui soit venu ici ? Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Il est caché au milieu du matériel. '
  '23':
  - type: note
    content: 'Il les dépassait tous d''une tête  : cf. 9.2n.'
  - type: text
    content: 'On courut le tirer de là, et il se tint debout au milieu du peuple. Il les dépassait tous d''une tête. '
  '24':
  - type: note
    content: Vive le roi ! cf. 2S 16.16 ; 1R 1.25,34,39 ; 2R 11.12/ /.
  - type: text
    content: 'Samuel dit à tout le peuple : Voyez-vous celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a choisi ? Il n''y en a pas comme lui dans tout le peuple. Tout le peuple l''acclama en disant : Vive le roi !'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'le droit de la royauté  : cf. 8.9-17 ; Dt 17.14ss. –  devant le Seigneur , c.-à-d. dans un sanctuaire local, ou auprès du coffre sacré, à Qiriath-Yéarim (7.2) ; cf. 2R 22.8 ; 23.2.'
  - type: text
    content: 'Samuel dit au peuple le droit de la royauté et il l''écrivit dans le livre qu''il déposa devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Puis Samuel renvoya tout le peuple, chacun chez soi.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'à Guibéa  : cf. v. 5,10 ; 13.2. – Voir cœur.'
  - type: text
    content: 'Saül aussi s''en alla chez lui, à Guibéa. Des hommes de valeur, dont Dieu avait touché le cœur, l''accompagnèrent. '
  '27':
  - type: note
    content: 'des hommes sans morale  : cf. Dt 13.14n. –  Quoi ! c''est celui-ci qui nous sauvera ! cf. 11.12 ; on trouve une remarque semblablement désobligeante en Mt 13.55-57. –  aucun présent ou aucun tribut  : cf. Jg 3.15n  ; 1R 5.1 ; 10.25n  ; 2R 17.3s ; 20.12 ; 2Ch 17.5 ; le mot hébreu correspondant peut aussi désigner une offrande  ; voir sacrifices. –  mais il garda le silence  : un ms de Qumrân et LXX présentent un texte différent, qu''ils rattachent au début du chap. 11 (voir v. 1n)  : Environ un mois après, Nahash…'
  - type: text
    content: 'Il y eut toutefois des hommes sans morale qui disaient : Quoi ! c''est celui-ci qui nous sauvera ! Ils le méprisèrent et ne lui apportèrent aucun présent, mais il garda le silence.'
  '3':
  - type: note
    content: 'au térébinthe de Tabor  : ce Tabor, situé sur le chemin de Beth-El mais non identifié, ne doit pas être confondu avec le mont Tabor, situé beaucoup plus au nord. –  montent vers Dieu  : c.-à-d., concrètement, se rendent au sanctuaire. –  Beth-El signifie maison d''El ou de Dieu  ; cf. 7.16 ; Gn 28.10-22 ; Jg 20.18. –  chevreaux / pains ronds (2.36+) / vin  : il pourrait s''agir d''offrandes, cf. Dt 12.5s ; voir sacrifices.'
  - type: text
    content: 'De là tu iras plus loin et tu arriveras au térébinthe de Tabor, où tu trouveras trois hommes qui montent vers Dieu, à Beth-El ; l''un portera trois chevreaux, l''autre trois pains ronds, l''autre une outre de vin. '
  '4':
  - type: note
    content: 'Ils te demanderont comment tu vas  : litt. ils demanderont pour toi pour la paix, formule traditionnelle de salutation. Cf. 17.22 ; 25.5 ; 30.21 ; Gn 43.27 ; Ex 18.7 ; Jr 15.5. –  deux pains  : un ms de Qumrân et LXX précisent deux pains de prémices ou d''offrande, ce qui pourrait bien avoir été le texte primitif.'
  - type: text
    content: 'Ils te demanderont comment tu vas et te donneront deux pains que tu prendras. '
  '5':
  - type: note
    content: 'Guibéa-Elohim (Colline de Dieu ou des dieux) : probablement une variante d''appellation de Guibéa, la ville de Saül, d''après 11.4 ; 14.2 ; 15.34 ; cf. Jg 19.14. Ville située à 6 km au nord de Jérusalem. –  une garnison  : litt. des installés ou dressés (par les Philistins) ; cf. 2S 8.6,14 ; 1Ch 11.16 ; 18.13 ; 2Ch 17.2 ; le mot hébreu peut désigner des postes militaires, mais aussi des préfets (cf. 1R 4.19 ; plusieurs versions anciennes ont lu le singulier, qu''on pourrait interpréter comme un préfet des Philistins), ou encore des pierres levées. –  troupe de prophètes  : cf. 19.20 ; 2R 2.3,5,15 ; 6.1. –  faire les prophètes  : le verbe hébreu, traditionnellement rendu par prophétiser, n''évoque pas tant le message des prophètes que les manifestations physiques liées à leur inspiration : chants, cris, danses, transes, etc. ; cf. v. 6,10,13 ; 18.10 ; 19.20-24 ; voir aussi 1R 22.10n. –  luth tambourin…  : la musique est parfois associée à l''inspiration des prophètes, cf. 2R 3.15.'
  - type: text
    content: 'Après cela, tu arriveras à Guibéa-Elohim, où se trouve une garnison de Philistins. En entrant dans la ville, tu rencontreras une troupe de prophètes descendant du haut lieu, en train de faire les prophètes, précédés du luth, du tambourin, de la flûte et de la lyre. '
  '6':
  - type: note
    content: 'Le souffle (ou l''Esprit) du Seigneur cf. Jg 3.10+. –  s''emparera de toi ou fondra sur toi  ; cf. 11.6 ; 16.13 ; Jg 14.6,19 ; 15.14. –  tu feras le prophète avec eux  : cf. 19.20ss ; Nb 11.25 ; Pr 21.1.'
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''emparera de toi, tu feras le prophète avec eux et tu seras changé en un autre homme. '
  '7':
  - type: note
    content: 'Cf. 18.14 ; Gn 39.2,23 ; 1Ch 17.2. –  se seront réalisés  : litt. seront venus, seront arrivés (de même au v. 9).'
  - type: text
    content: 'Lorsque ces signes se seront réalisés pour toi, fais ce que tu as à faire, car Dieu est avec toi. '
  '8':
  - type: note
    content: 'au Guilgal  : cf. 7.16 ; 11.14 ; 13.4,7 ; Jos 4.19ss. –  Tu attendras sept jours  : cf. 13.8-10. –  ce que tu dois faire  : cf. Ac 22.10.'
  - type: text
    content: Puis tu descendras avant moi au Guilgal. Alors, à mon tour, je descendrai vers toi, pour offrir des holocaustes et des sacrifices de paix. Tu attendras sept jours, jusqu'à ce que j'arrive auprès de toi et que je te fasse connaître ce que tu dois faire.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'changea son cœur  : litt. lui renversa le cœur (en un) autre  ; expressions comparables en So 3.9n  ; Ps 105.25 ; voir aussi Ez 36.26.'
  - type: text
    content: 'Dès que Saül eut tourné le dos pour quitter Samuel, Dieu changea son cœur, et tous ces signes se réalisèrent le même jour. '
