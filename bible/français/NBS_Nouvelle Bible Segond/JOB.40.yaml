        - type: text
          text: '40.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Behémoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : pluriel du terme qui désigne habituellement une bête, ou le bétail (Gn 1.24+ ; 3.14 ; Ps 73.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : c''est la bête par excellence. L''identification traditionnelle de Behémoth à l''hippopotame (d''Egypte par exemple) demeure partielle, compte tenu du caractère fabuleux de la description qui suit (voir aussi 40.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. 31.15 ; Gn 2.7,19 ; Ec 3.19-21.
      marker-yv: yv-n
    - type: text
      text: Voici Behémoth, je l'ai fait comme toi !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il mange de l'herbe comme le bœuf.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa force est dans ses reins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa vigueur dans les muscles de son ventre ;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il raidit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu, qui signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: incliner vers, vouloir, prendre plaisir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a ici un sens concret diversement interprété ; l''ensemble du verset est peut-être à comprendre comme une description de puissance sexuelle.'
      marker-yv: yv-n
    - type: text
      text: il raidit sa queue comme un cèdre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les tendons de ses cuisses sont entrelacés ;
