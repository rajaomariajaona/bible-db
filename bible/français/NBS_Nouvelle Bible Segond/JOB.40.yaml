      marker-yv: yv-n
    - type: text
      text: Le donneur de leçons va-t-il chercher querelle au Puissant ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui critique Dieu a-t-il une réponse à tout cela ?
