        marker: fr
        children:
        - type: text
          text: '40.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'flots de ta colère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Na 1.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: regarde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
