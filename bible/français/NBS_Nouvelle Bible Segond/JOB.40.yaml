      marker-yv: yv-n
    - type: text
      text: Répands les flots de ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: regarde tous les orgueilleux et abaisse-les !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde tous les orgueilleux, courbe-les !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecrase sur place les méchants,
