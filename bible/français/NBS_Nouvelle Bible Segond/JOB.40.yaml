      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 93.1 ; 104.1s.
      marker-yv: yv-n
    - type: text
      text: Orne-toi, je te prie, d'orgueil et de clarté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: revêts-toi d'éclat et de magnificence !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
