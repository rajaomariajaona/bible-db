document_id: JOB.40,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Première réponse de Job
  - type: text
    content: ' '
  - type: note
    content: Plusieurs éditions rattachent au chapitre 39 les v. 1-5 du chapitre 40, dont la numérotation se trouve décalée d'autant. –  reprit la parole 34.1n
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' reprit la parole et dit à Job :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 93.1 ; 104.1s.
  - type: text
    content: Orne-toi, je te prie, d'orgueil et de clarté,
  - type: text
    content: revêts-toi d'éclat et de magnificence !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'flots de ta colère Na 1.6. –  regarde  : cf. 14.6 ; Ex 14.24. –  abaisse-les Es 2.11-18 ; Pr 29.23.'
  - type: text
    content: Répands les flots de ta colère,
  - type: text
    content: regarde tous les orgueilleux et abaisse-les !
  '12':
  - type: text
    content: Regarde tous les orgueilleux, courbe-les !
  - type: text
    content: Ecrase sur place les méchants,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'emprisonne-les  : litt. lie leurs faces , ce que certains traduisent bâillonne-les  ; cf. Es 14.15-18.'
  - type: text
    content: cache-les tous dans la poussière,
  - type: text
    content: emprisonne-les dans le cachot !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'je te célébrerai  : cf. Ps 7.18 ; 18.50. –  ta main droite Ps 138.7.'
  - type: text
    content: Alors moi-même je te célébrerai,
  - type: text
    content: car ta main droite aura été ton salut !
  - type: heading
    content: Behémoth
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Behémoth  : pluriel du terme qui désigne habituellement une bête, ou le bétail (Gn 1.24+ ; 3.14 ; Ps 73.22n) : c''est la bête par excellence. L''identification traditionnelle de Behémoth à l''hippopotame (d''Egypte par exemple) demeure partielle, compte tenu du caractère fabuleux de la description qui suit (voir aussi 40.25nss). –  comme toi  : litt. avec toi . Cf. 31.15 ; Gn 2.7,19 ; Ec 3.19-21.'
  - type: text
    content: Voici Behémoth, je l'ai fait comme toi !
  - type: text
    content: Il mange de l'herbe comme le bœuf.
  '16':
  - type: text
    content: Sa force est dans ses reins,
  - type: text
    content: et sa vigueur dans les muscles de son ventre ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'il raidit  : le verbe hébreu, qui signifie habituellement incliner vers, vouloir, prendre plaisir , a ici un sens concret diversement interprété ; l''ensemble du verset est peut-être à comprendre comme une description de puissance sexuelle.'
  - type: text
    content: il raidit sa queue comme un cèdre ;
  - type: text
    content: les tendons de ses cuisses sont entrelacés ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: tubes ou canaux ( ?) ; le même mot, ou un homonyme, désigne le lit d'un oued en 6.15n  ; voir aussi 12.21n  ; 41.7n.
  - type: text
    content: ses os sont des tubes de bronze,
  - type: text
    content: son ossature comme des barres de fer.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'le commencement (Gn 1.1n) des voies de Dieu  : cf. Pr 8.22n. –  le pourvoit d''une épée  : litt. a fait approcher son épée . Il s''agit peut-être d''une allusion à la mâchoire de l''hippopotame ; on pourrait aussi comprendre (seul) celui qui l''a fait le menace de l''épée (cf. Gn 3.24).'
  - type: text
    content: Il est le commencement des voies de Dieu ;
  - type: text
    content: celui qui le fait le pourvoit d'une épée.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'donneur de leçons  : le mot hébreu correspondant n''apparaît qu''ici ; il a été diversement interprété. Certains modifient le texte hébreu traditionnel pour lire celui qui cherche querelle au Puissant cédera-t-il ? –  chercher querelle  : autre traduction faire un procès , cf. 9.3+. –  Puissant 5.17n.'
  - type: text
    content: Le donneur de leçons va-t-il chercher querelle au Puissant ?
  - type: text
    content: Celui qui critique Dieu a-t-il une réponse à tout cela ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Sa pâture  : ce mot rare est aussi le nom du huitième mois de l''année juive (Boul ; voir calendrier), celui des pluies qui assurent la fertilité du sol (1R 6.38). –  s''ébattent  : le même verbe est traduit par jouer au v. 29 et en Ps 104.26.'
  - type: text
    content: Sa pâture lui vient des montagnes,
  - type: text
    content: là où s'ébattent tous les animaux sauvages.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps 68.31.
  - type: text
    content: Il se couche sous les lotus,
  - type: text
    content: dans le secret des roseaux et des marécages ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'saules des oueds (6.15n) : cf. Lv 23.40n  ; Es 15.7.'
  - type: text
    content: les lotus le couvrent de leur ombre,
  - type: text
    content: les saules des oueds l'entourent.
  '23':
  - type: text
    content: Si le fleuve devenait violent, il ne s'alarmerait pas ;
  - type: text
    content: si le Jourdain se précipitait dans sa gueule, il resterait en sécurité.
  '24':
  - type: text
    content: ' '
  - type: note
    content: On pourrait aussi traduire d'une façon affirmative, litt. (pourtant) dans (ou par , ou à ) ses yeux on le saisira ; dans des pièges (certains modifient le texte hébreu traditionnel pour lire avec des harpons ) on lui percera le nez . Ce verset pourrait faire allusion à une méthode égyptienne de chasse à l'hippopotame, qui consistait à aveugler l'animal avec de la boue pour s'en emparer.
  - type: text
    content: Est-ce quand il a les yeux ouverts qu'on pourra le saisir ?
  - type: text
    content: Le prendra-t-on au piège, pour lui percer le museau ?
  - type: heading
    content: Léviathan
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Léviathan  : LXX un dragon  ; cf. 3.8n  ; Es 27.1 ; Ps 74.14 ; 104.26 ; la description qui suit semble s''inspirer en partie du crocodile d''Egypte ; cf. v. 15n  ; voir aussi Ez 29.3n.'
  - type: text
    content: Tireras-tu Léviathan avec un hameçon ?
  - type: text
    content: Lieras-tu sa langue avec une corde ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Es 37.29 ; Ez 19.4,9 ; 29.4. –  un roseau  : autre traduction une corde  ; même terme ou homonyme en 41.12n  ; Es 9.13 ; 19.15 ; 58.5.'
  - type: text
    content: Passeras-tu un roseau à son museau ?
  - type: text
    content: Lui perceras-tu la mâchoire avec un crochet ?
  '27':
  - type: text
    content: Te fera-t-il de longues supplications ?
  - type: text
    content: Te dira-t-il des paroles douces ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: alliance 5.23. –  esclave 39.9s.
  - type: text
    content: Conclura-t-il une alliance avec toi ?
  - type: text
    content: Le prendras-tu comme esclave à perpétuité ?
  '29':
  - type: text
    content: Joueras-tu avec lui comme avec un oiseau ?
  - type: text
    content: L'attacheras-tu pour tes jeunes filles ?
  '3':
  - type: text
    content: 'Job répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 32.4s. –  marchands  : autre traduction Cananéens (cf. Es 23.8n).'
  - type: text
    content: Des associés le mettront-ils en vente ?
  - type: text
    content: Le partageront-ils entre des marchands ?
  '31':
  - type: text
    content: Couvriras-tu sa peau de dards
  - type: text
    content: et sa tête de harpon à poisson ?
  '32':
  - type: text
    content: 'Mets ta main sur lui :'
  - type: text
    content: au souvenir du combat, tu ne recommenceras plus !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis peu de chose  : litt. je suis léger . Cf. Gn 18.27 ; Es 6.5. –  la main sur la bouche 21.5+.'
  - type: text
    content: Je suis peu de chose ; que te répliquerais-je ?
  - type: text
    content: Je mets la main sur ma bouche.
  '5':
  - type: text
    content: J'ai parlé une fois, je ne répondrai plus ;
  - type: text
    content: deux fois, je n'ajouterai rien.
  - type: heading
    content: Job se prendrait-il pour Dieu ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 38.1+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit à Job du milieu de la tempête :'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 38.3n.
  - type: text
    content: Tiens-toi prêt, je te prie, comme un vaillant homme ;
  - type: text
    content: je t'interrogerai, et tu m'instruiras.
  '8':
  - type: text
    content: ' '
  - type: note
    content: mon jugement ou mon droit . Cf. 32.2+ ; Rm 3.4. –  Me condamneras-tu 9.20n.
  - type: text
    content: Veux-tu réellement annuler mon jugement ?
  - type: text
    content: Me condamneras-tu pour te justifier ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'bras Ps 89.10-14 ; Lc 1.51. –  une voix tonnante…  : litt. tonnes-tu d''une voix comme lui ? 37.4s.'
  - type: text
    content: As-tu un bras comme celui de Dieu,
  - type: text
    content: une voix tonnante comme la sienne ?
