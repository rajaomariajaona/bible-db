      marker-yv: yv-n
    - type: text
      text: Il est le commencement des voies de Dieu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui le fait le pourvoit d'une épée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
