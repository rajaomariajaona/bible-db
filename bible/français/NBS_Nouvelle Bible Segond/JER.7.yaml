document_id: JER.7,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Illusoire confiance dans le temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.1+ ; cf. les v. suivants avec le chap. 26. – Ce v. et le début du v. 2 sont absents de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parole qui parvint à Jérémie de la part du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous tenir… devant moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.19+ ; 35.19 ; 1R 17.1 ; Mi 6.6 ; Né 9.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cette maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur laquelle mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' est invoqué '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 11,14,30 ; cf. 14.9 ; 15.16 ; 25.29 ; 32.34 ; 34.15 ; Dt 12.11 ; 14.23 ; 16.2,6,11 ; 26.2 ; 28.10 ; 1R 8.43 ; Am 9.12 ; Né 1.9 ; voir aussi Ps 15 ; 24.3-6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'délivrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.8,19) de la menace des ennemis.
      marker-yv: yv-n
    - type: text
      text: 'puis venir vous tenir debout devant moi dans cette maison sur laquelle mon nom est invoqué, et dire : Nous sommes délivrés ! – pour commettre toutes ces abominations ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 6.20 ; 11.15 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mt 21.13/ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; Jn 2.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je l'ai vu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 8.12 ; Ps 139.12.'
      marker-yv: yv-n
    - type: text
      text: 'Est-elle à vos yeux une caverne de bandits, cette maison sur laquelle mon nom est invoqué ? Cela, je l''ai vu moi-même ! – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le sanctuaire (= '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Silo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''existait plus à l''époque de Jérémie ; la ville semble avoir été détruite plusieurs siècles auparavant par les Philistins ; cf. 1.1 ; voir aussi v. 14 ; 26.6,9 ; 1S 1.24-28 ; 3.21 ; 4.3,10-22 ; Ps 78.56-67. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du mal…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du mal de mon peuple Israël.
      marker-yv: yv-n
    - type: text
      text: 'Allez plutôt, je vous prie, vers mon lieu à Silo, là où j''avais d''abord fait demeurer mon nom. Voyez comment je l''ai traité à cause du mal qu''avait fait Israël, mon peuple. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous ai parlé et reparlé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je vous ai parlé et je me suis (re)levé de bon matin pour vous parler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression qui indique probablement la répétition ou l''empressement ; cf. v. 25+s ; 11.7 ; 25.3 ; 26.5 ; 29.19 ; 32.33 ; 35.14,17 ; 36.31 ; 37.2 ; Es 50.2 ; 65.12 ; 66.4 ; So 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Pr 1.24 ; voir aussi 2S 15.2 ; Jb 1.5 ; Pr 27.14.'
      marker-yv: yv-n
    - type: text
      text: 'Et maintenant, puisque vous avez fait tout cela, – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – puisque je vous ai parlé et reparlé, inlassablement, et que vous n''avez pas écouté, puisque je vous ai appelés et que vous n''avez pas répondu, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 10+,12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Mt 24.2/ /.'
      marker-yv: yv-n
    - type: text
      text: 'je traiterai la maison sur laquelle mon nom est invoqué et en laquelle vous mettez votre confiance, et le lieu que je vous ai donné, à vous et à vos pères, de la même manière que j''ai traité Silo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je vous rejetterai… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.39 ; 1R 9.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou le royaume du Nord, tombé en 722/1 av. J.-C. ; cf. 2R 17 ; voir aussi 31.9+ ; Os 4.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je vous rejetterai loin de moi, comme j'ai rejeté tous vos frères, toute la descendance d'Ephraïm.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' refuse d''écouter'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.14 ; 14.11 ; cf. 15.1,11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.20 ; 27.18 ; 37.3ss ; 42.4 ; Ex 32.11 ; Dt 9.14 ; 1R 13.6 ; 2R 19.4 ; Ez 9.8 ; Am 7.2,5 ; Dn 9.15-19 ; 1Jn 5.16. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.14 (où la vision céleste d''un vieillard priant les mains tendues est assortie de ce commentaire) : « Cet homme est l''ami de ses frères, qui prie beaucoup pour le peuple et pour toute la ville sainte, Jérémie, le Prophète de Dieu. »'
      marker-yv: yv-n
    - type: text
      text: 'Quant à toi, ne prie pas pour ce peuple, n''élève pour eux ni cri ni prière, n''intercède pas auprès de moi, car je ne t''entendrai pas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ne vois-tu pas ce qu''ils font dans les villes de Juda et dans les rues de Jérusalem ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des gâteaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant n''apparaît qu''ici et en 44.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Os 3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la reine du ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(44.17) est sans doute la déesse mésopotamienne Ishtar (= Astarté), identifiée à Vénus (la déesse et la planète qui la représentait) ; certains mss lisent ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'œuvre du ciel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''armée du ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 8.2+). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On veut me contrarier…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on me contrarie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on répand des libations pour d''autres dieux afin de me contrarier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de sorte qu'on me contrarie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 8.19 ; 25.6 ; 32.29 ; 44.3,8 ; Dt 31.29 ; 2Ch 34.25.
      marker-yv: yv-n
    - type: text
      text: 'Les fils ramassent du bois, les pères allument le feu, les femmes pétrissent la pâte pour faire des gâteaux à la reine du ciel. On veut me contrarier en répandant des libations pour d''autres dieux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour leur propre honte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour la honte de leurs visages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2S 19.6 ; Es 29.22 ; Ps 44.16.'
      marker-yv: yv-n
    - type: text
      text: 'Est-ce moi qu''ils contrarient ? – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. N''est-ce pas plutôt eux-mêmes, pour leur propre honte ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. le temple de Jérusalem ; cf. 19.14 ; 26.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte hébreu ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu diras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui entrez par ces portes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.20.
      marker-yv: yv-n
    - type: text
      text: 'Tiens-toi à la porte de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour y proclamer cette parole : Ecoutez la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', vous tous, gens de Juda qui entrez par ces portes pour vous prosterner devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'colère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fureur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.31 ; 33.5 ; 36.7 ; 42.18 ; 44.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce lieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur les humains… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '36.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les arbres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sans plus s''éteindre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.4+ ; 17.27 ; 2R 22.17 ; cf. 22.7 ; Lm 4.11.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Ma colère, ma fureur, se répand sur ce lieu, sur les humains et sur les bêtes, sur les arbres des champs et sur le fruit de la terre ; elle brûlera sans plus s''éteindre.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La nation qui n'écoute pas son Dieu
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.20+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mangez-en la viande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : contrairement à la règle sur les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: holocaustes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui étaient intégralement réservés à Dieu et devaient donc être entièrement consumés (Lv 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; cf. Am 4.4s ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : Ajoutez vos holocaustes à vos sacrifices, et mangez-en la viande ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
