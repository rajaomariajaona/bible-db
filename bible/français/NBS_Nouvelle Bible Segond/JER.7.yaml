document_id: JER.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Illusoire confiance dans le temple
  - type: text
    content: ' '
  - type: note
    content: 11.1+ ; cf. les v. suivants avec le chap. 26. – Ce v. et le début du v. 2 sont absents de LXX.
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '10':
  - type: note
    content: 'vous tenir… devant moi  : cf. 15.19+ ; 35.19 ; 1R 17.1 ; Mi 6.6 ; Né 9.2. –  cette maison (v. 2n) sur laquelle mon nom est invoqué v. 11,14,30 ; cf. 14.9 ; 15.16 ; 25.29 ; 32.34 ; 34.15 ; Dt 12.11 ; 14.23 ; 16.2,6,11 ; 26.2 ; 28.10 ; 1R 8.43 ; Am 9.12 ; Né 1.9 ; voir aussi Ps 15 ; 24.3-6. –  délivrés (1.8,19) de la menace des ennemis.'
  - type: text
    content: 'puis venir vous tenir debout devant moi dans cette maison sur laquelle mon nom est invoqué, et dire : Nous sommes délivrés ! – pour commettre toutes ces abominations ? '
  '11':
  - type: note
    content: 'Cf. 6.20 ; 11.15 ; Mt 21.13/  ; Jn 2.16. –  je l''ai vu  : cf. Ez 8.12 ; Ps 139.12.'
  - type: text
    content: 'Est-elle à vos yeux une caverne de bandits, cette maison sur laquelle mon nom est invoqué ? Cela, je l''ai vu moi-même ! – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'Le sanctuaire (= lieu) de Silo n''existait plus à l''époque de Jérémie ; la ville semble avoir été détruite plusieurs siècles auparavant par les Philistins ; cf. 1.1 ; voir aussi v. 14 ; 26.6,9 ; 1S 1.24-28 ; 3.21 ; 4.3,10-22 ; Ps 78.56-67. –  du mal…  : litt. du mal de mon peuple Israël.'
  - type: text
    content: 'Allez plutôt, je vous prie, vers mon lieu à Silo, là où j''avais d''abord fait demeurer mon nom. Voyez comment je l''ai traité à cause du mal qu''avait fait Israël, mon peuple. '
  '13':
  - type: note
    content: 'je vous ai parlé et reparlé…  : litt. je vous ai parlé et je me suis (re)levé de bon matin pour vous parler, expression qui indique probablement la répétition ou l''empressement ; cf. v. 25+s ; 11.7 ; 25.3 ; 26.5 ; 29.19 ; 32.33 ; 35.14,17 ; 36.31 ; 37.2 ; Es 50.2 ; 65.12 ; 66.4 ; So 3.7n  ; Pr 1.24 ; voir aussi 2S 15.2 ; Jb 1.5 ; Pr 27.14.'
  - type: text
    content: 'Et maintenant, puisque vous avez fait tout cela, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – puisque je vous ai parlé et reparlé, inlassablement, et que vous n''avez pas écouté, puisque je vous ai appelés et que vous n''avez pas répondu, '
  '14':
  - type: note
    content: V. 10+,12n  ; cf. Mt 24.2/ /.
  - type: text
    content: 'je traiterai la maison sur laquelle mon nom est invoqué et en laquelle vous mettez votre confiance, et le lieu que je vous ai donné, à vous et à vos pères, de la même manière que j''ai traité Silo. '
  '15':
  - type: note
    content: Je vous rejetterai… 23.39 ; 1R 9.7. –  Ephraïm ou le royaume du Nord, tombé en 722/1 av. J.-C. ; cf. 2R 17 ; voir aussi 31.9+ ; Os 4.17n.
  - type: text
    content: Je vous rejetterai loin de moi, comme j'ai rejeté tous vos frères, toute la descendance d'Ephraïm.
  - type: heading
    content: Le Seigneur refuse d'écouter
  '16':
  - type: text
    content: ' '
  - type: note
    content: '11.14 ; 14.11 ; cf. 15.1,11n  ; 18.20 ; 27.18 ; 37.3ss ; 42.4 ; Ex 32.11 ; Dt 9.14 ; 1R 13.6 ; 2R 19.4 ; Ez 9.8 ; Am 7.2,5 ; Dn 9.15-19 ; 1Jn 5.16. Cf. 2 Maccabées 15.14 (où la vision céleste d''un vieillard priant les mains tendues est assortie de ce commentaire) : « Cet homme est l''ami de ses frères, qui prie beaucoup pour le peuple et pour toute la ville sainte, Jérémie, le Prophète de Dieu. »'
  - type: text
    content: 'Quant à toi, ne prie pas pour ce peuple, n''élève pour eux ni cri ni prière, n''intercède pas auprès de moi, car je ne t''entendrai pas. '
  '17':
  - type: text
    content: 'Ne vois-tu pas ce qu''ils font dans les villes de Juda et dans les rues de Jérusalem ? '
  '18':
  - type: note
    content: 'des gâteaux  : le mot hébreu correspondant n''apparaît qu''ici et en 44.19n  ; cf. Os 3.1n. –  la reine du ciel (44.17) est sans doute la déesse mésopotamienne Ishtar (= Astarté), identifiée à Vénus (la déesse et la planète qui la représentait) ; certains mss lisent ici l''œuvre du ciel, LXX l''armée du ciel (cf. 8.2+). –  On veut me contrarier…  : autre traduction on me contrarie, litt. on répand des libations pour d''autres dieux afin de me contrarier (ou de sorte qu''on me contrarie) ; cf. 8.19 ; 25.6 ; 32.29 ; 44.3,8 ; Dt 31.29 ; 2Ch 34.25.'
  - type: text
    content: 'Les fils ramassent du bois, les pères allument le feu, les femmes pétrissent la pâte pour faire des gâteaux à la reine du ciel. On veut me contrarier en répandant des libations pour d''autres dieux. '
  '19':
  - type: note
    content: '11.17. –  pour leur propre honte  : litt. pour la honte de leurs visages  ; cf. 2S 19.6 ; Es 29.22 ; Ps 44.16.'
  - type: text
    content: 'Est-ce moi qu''ils contrarient ? – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. N''est-ce pas plutôt eux-mêmes, pour leur propre honte ? '
  '2':
  - type: note
    content: 'la maison du Seigneur, c.-à-d. le temple de Jérusalem ; cf. 19.14 ; 26.2. –  cette parole  : le texte hébreu ajoute tu diras. –  qui entrez par ces portes 17.20.'
  - type: text
    content: 'Tiens-toi à la porte de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour y proclamer cette parole : Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous tous, gens de Juda qui entrez par ces portes pour vous prosterner devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '20':
  - type: note
    content: colère / fureur 32.31 ; 33.5 ; 36.7 ; 42.18 ; 44.6. –  ce lieu v. 3n. –  sur les humains… 36.29. –  les arbres… 21.14. –  sans plus s'éteindre 4.4+ ; 17.27 ; 2R 22.17 ; cf. 22.7 ; Lm 4.11.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Ma colère, ma fureur, se répand sur ce lieu, sur les humains et sur les bêtes, sur les arbres des champs et sur le fruit de la terre ; elle brûlera sans plus s''éteindre.'
  - type: heading
    content: La nation qui n'écoute pas son Dieu
  '21':
  - type: text
    content: ' '
  - type: note
    content: '6.20+. –  mangez-en la viande  : contrairement à la règle sur les holocaustes , qui étaient intégralement réservés à Dieu et devaient donc être entièrement consumés (Lv 1.3n) ; cf. Am 4.4s ; voir aussi sacrifices.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Ajoutez vos holocaustes à vos sacrifices, et mangez-en la viande ! '
  '22':
  - type: note
    content: Cf. 2.2,6 ; Es 1.11 ; Os 6.6 ; Am 5.25 ; Mi 6.6-8 ; Ac 7.42s.
  - type: text
    content: 'Car je n''ai rien dit à vos pères, je ne leur ai donné aucun ordre, le jour où je les ai fait sortir d''Egypte, au sujet des holocaustes et des sacrifices. '
  '23':
  - type: note
    content: 11.4,7 ; 42.3 ; Ex 19.5 ; Lv 26.12 ; Dt 5.33 ; 6.3 ; 26.17. –  je leur ai donné et je vous prescris traduisent un même verbe hébreu. – Sur la formule de l'alliance, votre Dieu / mon peuple, cf. 11.4 ; 24.7 ; 30.22 ; 31.1,33 ; 32.38 ; Ex 6.7 ; Lv 26.12 ; Dt 29.12 ; 2R 11.17 ; Ez 11.20+ ; Os 2.25 ; Za 8.8 ; 13.9 ; 2Co 6.16. –  heureux Dt 4.40n.
  - type: text
    content: 'Voici plutôt l''ordre que je leur ai donné : Ecoutez-moi ! Alors je serai votre Dieu, et vous, vous serez mon peuple. Suivez bien la voie que je vous prescris, afin que vous soyez heureux. '
  '24':
  - type: note
    content: 'pas écouté… v. 26n. –  l''obstination… 3.17n  ; cf. 8.6 ; 9.13s ; 11.7s ; Es 65.2 ; Ps 81.12s. –  Ils ne sont pas allés…  : autre traduction ils ont tourné le dos au lieu de faire face.'
  - type: text
    content: 'Mais ils n''ont pas écouté, ils n''ont pas tendu l''oreille ; ils ont suivi les conseils, l''obstination de leur cœur mauvais. Ils ne sont pas allés en avant, mais en arrière. '
  '25':
  - type: note
    content: Depuis le jour… 2.20 ; 2R 21.15. –  je vous ai envoyé (cf. v. 13+) tous mes serviteurs, les prophètes 25.4 ; 26.5 ; 29.19 ; 35.15 ; 2Ch 24.19 ; 36.15s ; Mt 21.34 ; 23.34/ / ; Ap 10.7. –  inlassablement v. 13n.
  - type: text
    content: 'Depuis le jour où vos pères ont quitté l''Egypte jusqu''à ce jour, je vous ai envoyé tous mes serviteurs, les prophètes ; je les ai envoyés chaque jour, inlassablement. '
  '26':
  - type: note
    content: 'pas écouté (ou pas obéi, le même verbe pouvant avoir les deux sens) ; cf. v. 24 ; 6.10n  ; 9.12 ; 11.8 ; 13.10 ; 16.12 ; 22.21 ; 34.14 ; 35.15 ; 2R 17.14. –  ils se sont montrés rétifs  : litt. ils ont raidi leur nuque, de même 17.23 ; 19.15 ; Ex 32.9n  ; Dt 10.16 ; Es 48.4 ; Ac 7.51. –  plus mauvais que leurs pères 16.12.'
  - type: text
    content: 'Mais eux ne m''ont pas écouté, ils n''ont pas tendu l''oreille ; ils se sont montrés rétifs, ils sont devenus plus mauvais que leurs pères. '
  '27':
  - type: note
    content: 1.17.
  - type: text
    content: 'Si tu leur dis tout cela, ils ne t''écouteront pas ; si tu cries vers eux, ils ne te répondront pas. '
  '28':
  - type: note
    content: 'n''écoute pas le Seigneur (litt. la voix de YHWH  ; cf. 3.25n) 42.13,21. –  ne veut pas recevoir l''instruction 5.3+ ; cf. Mt 21.43-45. –  probité 5.1n. –  elle s''est retirée  : litt. elle a été retranchée.'
  - type: text
    content: 'Alors dis-leur : C''est ici la nation qui n''écoute pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, et qui ne veut pas recevoir l''instruction ; la probité a disparu, elle s''est retirée de leur bouche.'
  - type: heading
    content: La vallée de la Tuerie
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'ta chevelure de nazir  : litt. ton naziréat (l''expression hébraïque, au féminin, s''adresse à Sion ; cf. 1.5n  ; 2.3n) ; sur ce terme, voir Nb 6.5,9 ; Jg 13.5,7 ; 16.17 ; 1S 1.11 ; voir aussi Mi 1.16 ; Jb 1.20. –  Sur les pistes…  : cf. 3.2n,21n  ; autre traduction fais monter une complainte jusque sur les sommets . –  rejette  : autre traduction méprise . – Voir génération. –  qui a provoqué…  : litt. de sa colère (autre terme hébreu que celui qui est traduit par colère au v. 20) ; cf. Es 10.6.'
  - type: text
    content: Coupe ta chevelure de nazir et jette-la !
  - type: text
    content: Sur les pistes du désert entonne une complainte !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rejette et délaisse'
  - type: text
    content: la génération qui a provoqué sa colère.
  '3':
  - type: note
    content: 'Réformez  : litt. rendez bons, de même en 18.11 ; 26.13 ; 35.15. –  je vous laisserai demeurer  : certaines versions anciennes ont lu je demeurerai avec vous, qui correspondrait en hébreu à une autre vocalisation des mêmes consonnes ; de même au v. 7 ; cf. Am 5.14. –  ce lieu  : le temple ; cf. Dt 12.5.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Réformez vos voies et vos agissements, et je vous laisserai demeurer en ce lieu. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Judéens  : litt. fils de Juda , de même 32.30 ; 50.4,33 ; cf. 32.12n. –  leurs horreurs (4.1n) dans la maison… (v. 10+) : cf. 23.11 ; 32.34 ; 2Ch 29.16. –  maison sur laquelle mon nom est invoqué v. 10+. –  impure  : voir pur.'
  - type: text
    content: 'Car les Judéens ont fait ce qui me déplaisait – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils ont placé leurs horreurs dans la maison sur laquelle mon nom est invoqué, la rendant ainsi impure. '
  '31':
  - type: note
    content: '19.5-7. –  Ils ont bâti ou ils bâtissent. –  des hauts lieux  : certaines versions anciennes portent le haut lieu  ; cf. 1R 3.2 ; Ez 6.3+. –  le topheth  : ce nom signifiait sans doute à l''origine foyer ou bûcher (voir Es 30.33n) ; il porte ici les voyelles du mot hébreu qui signifie honte (cf. 3.24n) ; voir 2R 23.10 ; voir aussi Jb 17.6n où le même mot, ou un homonyme, semble avoir le sens de crachat. –  la vallée (2.23n) du Fils de Hinnom (aussi en 32.35), au sud et à l''ouest de la vieille ville de Jérusalem ; l''expression hébraïque pour vallée de Hinnom (Né 11.30) a été transcrite géhenne (Mt 5.22n). –  pour jeter au feu  : cf. 22.3 ; Lv 18.21 ; Dt 12.31 ; 18.10 ; 2R 16.3 ; 17.7 ; 21.6 ; Ez 16.36 ; 20.25s,31. –  venue au cœur  : cf. 3.16n  ; Ez 20.25.'
  - type: text
    content: 'Ils ont bâti des hauts lieux, le topheth qui est dans la vallée du Fils de Hinnom, pour jeter au feu leurs fils et leurs filles, chose que je n''avais pas ordonnée et qui ne m''était pas venue au cœur. '
  '32':
  - type: note
    content: les jours viennent 9.24 ; 16.14 etc. ; cf. Am 4.2+. –  on ensevelira les morts (litt. on ensevelira), acte de profanation ; cf. 8.1-2+ ; 19.11 ; 2R 23.8 ; Ez 6.5.
  - type: text
    content: 'C''est pourquoi les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où l''on ne dira plus « le topheth » et « la vallée du Fils de Hinnom », mais « la vallée de la Tuerie » ; et on ensevelira les morts au topheth, faute de place. '
  '33':
  - type: note
    content: 15.3 ; 16.4 ; 19.7 ; 34.20 ; cf. 12.9 ; Dt 28.26 ; 2S 21.10 ; Ez 29.5 ; Ps 79.2s.
  - type: text
    content: 'Les cadavres de ce peuple seront la pâture des oiseaux du ciel et des bêtes de la terre ; et il n''y aura personne pour les troubler. '
  '34':
  - type: note
    content: '16.9 ; cf. 25.10s ; 33.10s ; Es 24.8 ; Os 2.13 ; Ap 18.23. –  taire  : litt. cesser. –  chants  : litt. voix ou bruit.'
  - type: text
    content: 'Je ferai taire dans les villes de Juda et dans les rues de Jérusalem les chants de gaieté et les chants de joie, les chants du marié et les chants de la mariée : le pays sera une ruine.'
  '4':
  - type: note
    content: 'paroles mensongères v. 8 ; cf. 13.25 ; Ex 5.9 ; Es 59.13. –  C''est ici  : litt. ils (sont)  ; ce pluriel a été parfois interprété, soit des différents bâtiments du temple (cf. Ps 73.17 ; 84.2), soit comme une abréviation de l''expression hébraïque pour ce lieu (v. 3) ; Syr vous (êtes). –  le temple du Seigneur  : l''expression n''apparaît que deux fois dans LXX, trois dans le texte hébreu traditionnel (cf. 22.29n  ; Es 6.1,3).'
  - type: text
    content: 'Ne mettez pas votre confiance dans les paroles mensongères : « C''est ici le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » '
  '5':
  - type: note
    content: '5.1. –  les uns envers les autres  : litt. entre un homme et son compagnon  ; on pourrait aussi comprendre si vous arbitrez équitablement (ou selon le droit) entre les gens.'
  - type: text
    content: 'Si vous réformez vos voies et vos agissements, si vous agissez selon l''équité les uns envers les autres, '
  '6':
  - type: note
    content: 'immigré / orphelin / veuve 5.28 ; 22.3 ; Za 7.10. –  de sang innocent  : c.-à-d. le sang des innocents  ; cf. v. 31 ; 2.34 ; 19.4s ; 22.3,17 ; 26.15 ; Dt 19.10,13 ; 2R 21.16 ; Ps 106.38. –  ne suivez pas d''autres dieux v. 9+ ; 1.16 ; 11.10 ; 13.10 ; 16.11 ; 25.6 ; 35.15 ; 44.3 ; cf. Dt 6.14n.'
  - type: text
    content: 'si vous n''opprimez pas l''immigré, l''orphelin et la veuve, si vous ne répandez pas en ce lieu de sang innocent, si vous ne suivez pas d''autres dieux, pour votre malheur, '
  '7':
  - type: note
    content: 'je vous laisserai demeurer v. 3n. –  dans le pays… 3.18 ; cf. Am 9.15. –  depuis toujours et pour toujours  : cf. 17.25 ; Ps 41.14 ; 106.48 ; 1Ch 16.36.'
  - type: text
    content: 'alors je vous laisserai demeurer en ce lieu, dans le pays que j''ai donné à vos pères depuis toujours et pour toujours. '
  '8':
  - type: note
    content: V. 4 ; cf. 13.25 ; Es 59.13.
  - type: text
    content: 'Mais vous mettez votre confiance dans des paroles mensongères, qui ne servent à rien. '
  '9':
  - type: note
    content: 'Cf. Ex 20 ; Dt 5 ; Os 4.2. –  offrir de l''encens (1.16+) au Baal 11.17. –  d''autres dieux (v. 6+) que vous ne connaissez pas  : cf. 9.15+ ; voir aussi 19.4 ; 44.3 ; Dt 28.64 ; 32.17.'
  - type: text
    content: 'Pourriez-vous donc voler, assassiner, commettre l''adultère, faire de faux serments, offrir de l''encens au Baal, suivre d''autres dieux que vous ne connaissez pas, '
