document_id: SNG.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elle rêve qu'elle part à sa recherche
  - type: text
    content: ' '
  - type: note
    content: j'ai cherché… cœur… 1.7n  ; cf. Es 65.1 ; Jr 29.13 ; Os 2.9 ; 5.6 ; Pr 1.28 ; Mt 7.7.
  - type: text
    content: Sur mon lit, pendant les nuits,
  - type: text
    content: j'ai cherché celui que mon cœur aime ;
  - type: text
    content: je l'ai cherché et je ne l'ai pas trouvé…
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le support  : le mot hébreu n''apparaît qu''ici et il a été diversement interprété. –  pourpre rouge Ex 25.4n.'
  - type: text
    content: Il en a fait les colonnes en argent,
  - type: text
    content: le support en or,
  - type: text
    content: le siège de pourpre rouge ;
  - type: text
    content: l'intérieur a été brodé avec amour
  - type: text
    content: par les filles de Jérusalem.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 61.10 ; 62.3-5.
  - type: text
    content: Sortez, filles de Sion, regardez
  - type: text
    content: le roi Salomon,
  - type: text
    content: avec la couronne dont sa mère l'a couronné
  - type: text
    content: le jour de ses noces,
  - type: text
    content: le jour de la joie de son cœur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la ville  : probablement Jérusalem v. 5,11 ; 1.5 ; 5.7,8,16.'
  - type: text
    content: Je vais me lever, et je ferai le tour de la ville,
  - type: text
    content: dans les rues et sur les places ;
  - type: text
    content: je chercherai celui que mon cœur aime…
  - type: text
    content: Je l'ai cherché et je ne l'ai pas trouvé.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.7.
  - type: text
    content: 'Les gardes qui font le tour de la ville m''ont trouvée :'
  - type: text
    content: Avez-vous vu celui que mon cœur aime ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'dans la maison de ma mère (voir 1.6+) : sans doute une évocation du mariage ; cf. 8.2 ; Gn 2.24 ; 24.67.'
  - type: text
    content: A peine les avais-je dépassés
  - type: text
    content: que j'ai trouvé celui que mon cœur aime ;
  - type: text
    content: je l'ai saisi et ne le lâcherai plus,
  - type: text
    content: jusqu'à ce que je l'aie introduit dans la maison de ma mère,
  - type: text
    content: dans la chambre de celle qui m'a conçue.
  - type: heading
    content: Autres ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: '2.7+. –  (Autres ?)  : locuteur incertain ; il pourrait tout aussi bien s''agir de Lui.'
  - type: text
    content: Je vous en adjure, filles de Jérusalem,
  - type: text
    content: par les gazelles, par les biches de la campagne,
  - type: text
    content: n'éveillez pas, ne réveillez pas l'amour,
  - type: text
    content: avant qu'il le désire.
  - type: heading
    content: Autres
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est-ce  : litt. qui est celle-ci , mais le féminin hébreu peut aussi désigner quelque chose (neutre), d''où l''autre traduction possible qu''est-ce  ; cf. 6.10 ; 8.5 ; voir aussi Ap 12.6. –  brume  : le terme désigne aussi la fumée de l''encens brûlé en offrande. –  myrrhe 1.13+. –  encens 4.6,14 ; Ex 30.34n. –  parfumeur  : litt. marchand , ce qui indique sans doute qu''il s''agit de parfums d''importation ; cf. 1R 10.15 ; Ez 27.13s ; Na 3.16 ; Né 13.20.'
  - type: text
    content: Qui est-ce qui monte du désert,
  - type: text
    content: comme des colonnes de fumée,
  - type: text
    content: dans une brume de myrrhe, d'encens,
  - type: text
    content: de toutes les poudres du parfumeur ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon  : cf. 1.4n  ; voir aussi 8.11-12n.'
  - type: text
    content: C'est la litière de Salomon,
  - type: text
    content: et autour d'elle soixante vaillants hommes,
  - type: text
    content: parmi les plus vaillants d'Israël.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'au côté  : autre traduction sur sa cuisse . –  frayeurs nocturnes  : litt. la frayeur dans la nuit  ; cf. Ps 91.5 ; certains y voient une allusion à un démon réputé qui tue les hommes pendant leur nuit de noces, et dont il est question dans le livre de Tobit (3.7s ; 6.14 ; cf. Gn 38.7ss ; Ex 4.24-26 ; voir aussi 11.4ss ; Es 37.36).'
  - type: text
    content: Tous sont armés de l'épée,
  - type: text
    content: exercés au combat ;
  - type: text
    content: chacun porte l'épée au côté,
  - type: text
    content: en vue des frayeurs nocturnes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'un palanquin  : le mot ’appiryôn , qui n''apparaît qu''ici dans l''A.T., vient peut-être du sanscrit ( paryanka , qui a donné palanquin ) ou du grec ( phoréion , chaise à porter) ; il pourrait aussi désigner un trône (cf. 1R 10.18s) ou une litière pour l''épouse dans le cortège nuptial. –  bois du Liban  : cf. 1.17 ; Es 10.34n.'
  - type: text
    content: Le roi Salomon s'est fait un palanquin
  - type: text
    content: en bois du Liban.
