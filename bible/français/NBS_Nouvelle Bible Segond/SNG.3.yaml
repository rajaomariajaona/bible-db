document_id: SNG.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elle rêve qu'elle part à sa recherche
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''ai cherché… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Es 65.1 ; Jr 29.13 ; Os 2.9 ; 5.6 ; Pr 1.28 ; Mt 7.7.'
    marker-yv: yv-n
  - type: text
    text: Sur mon lit, pendant les nuits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai cherché celui que mon cœur aime ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l'ai cherché et je ne l'ai pas trouvé…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : probablement Jérusalem v. 5,11 ; 1.5 ; 5.7,8,16.'
    marker-yv: yv-n
  - type: text
    text: Je vais me lever, et je ferai le tour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les rues et sur les places ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je chercherai celui que mon cœur aime…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai cherché et je ne l'ai pas trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 5.7.
    marker-yv: yv-n
  - type: text
    text: 'Les gardes qui font le tour de la ville m''ont trouvée :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avez-vous vu celui que mon cœur aime ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la maison de ma mère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir 1.6+) : sans doute une évocation du mariage ; cf. 8.2 ; Gn 2.24 ; 24.67.'
    marker-yv: yv-n
  - type: text
    text: A peine les avais-je dépassés
- type: usfm
  marker: q1
  children:
  - type: text
    text: que j'ai trouvé celui que mon cœur aime ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l'ai saisi et ne le lâcherai plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que je l'aie introduit dans la maison de ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la chambre de celle qui m'a conçue.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Autres ?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.7+. –  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (Autres ?)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : locuteur incertain ; il pourrait tout aussi bien s''agir de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lui.
    marker-yv: yv-n
  - type: text
    text: Je vous en adjure, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par les gazelles, par les biches de la campagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'éveillez pas, ne réveillez pas l'amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu'il le désire.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Autres
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qui est-ce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui est celle-ci
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais le féminin hébreu peut aussi désigner quelque chose (neutre), d''où l''autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'est-ce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 6.10 ; 8.5 ; voir aussi Ap 12.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: brume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme désigne aussi la fumée de l''encens brûlé en offrande. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'myrrhe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'encens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.6,14 ; Ex 30.34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: parfumeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marchand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui indique sans doute qu''il s''agit de parfums d''importation ; cf. 1R 10.15 ; Ez 27.13s ; Na 3.16 ; Né 13.20.'
    marker-yv: yv-n
  - type: text
    text: Qui est-ce qui monte du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des colonnes de fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une brume de myrrhe, d'encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toutes les poudres du parfumeur ?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 8.11-12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: C'est la litière de Salomon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et autour d'elle soixante vaillants hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi les plus vaillants d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au côté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur sa cuisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frayeurs nocturnes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la frayeur dans la nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. Ps 91.5 ; certains y voient une allusion à un démon réputé qui tue les hommes pendant leur nuit de noces, et dont il est question dans le livre de '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tobit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.7s ; 6.14 ; cf. Gn 38.7ss ; Ex 4.24-26 ; voir aussi 11.4ss ; Es 37.36).
    marker-yv: yv-n
  - type: text
    text: Tous sont armés de l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: exercés au combat ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun porte l'épée au côté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en vue des frayeurs nocturnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un palanquin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ’appiryôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui n''apparaît qu''ici dans l''A.T., vient peut-être du sanscrit ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: paryanka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui a donné '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: palanquin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ou du grec (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: phoréion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', chaise à porter) ; il pourrait aussi désigner un trône (cf. 1R 10.18s) ou une litière pour l''épouse dans le cortège nuptial. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bois du Liban
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.17 ; Es 10.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Le roi Salomon s'est fait un palanquin
- type: usfm
  marker: q1
  children:
  - type: text
    text: en bois du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le support
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu n''apparaît qu''ici et il a été diversement interprété. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pourpre rouge '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 25.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Il en a fait les colonnes en argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le support en or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le siège de pourpre rouge ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'intérieur a été brodé avec amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: par les filles de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Es 61.10 ; 62.3-5.
    marker-yv: yv-n
  - type: text
    text: Sortez, filles de Sion, regardez
- type: usfm
  marker: q1
  children:
  - type: text
    text: le roi Salomon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la couronne dont sa mère l'a couronné
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour de ses noces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour de la joie de son cœur.
