      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Dt 32.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bannière '
