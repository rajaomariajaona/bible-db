      marker-yv: yv-n
    - type: text
      text: Détournez-vous du chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écartez-vous du sentier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ôtez de notre présence le Saint d'Israël !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
