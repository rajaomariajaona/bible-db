document_id: ISA.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une politique que Dieu condamne
  - type: text
    content: ' '
  - type: note
    content: 'fils rebelles v. 9 ; 1.2,4 ; Ez 2.5. –  traités  : le mot qui apparaît ici signifie, au sens propre, ce qui est mélangé (allusion aux libations qui accompagnent la conclusion d''une alliance ?) ou fondu (certains y voient une allusion à une stèle érigée en témoignage de l''alliance ; cf. notre mot alliage). Cf. v. 2n  ; 28.15 ; 29.15. –  que je n''ai pas inspirés  : litt. pas (par) mon souffle (ou mon esprit ).'
  - type: text
    content: Quel malheur pour les fils rebelles !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Ils s'engagent dans des projets qui ne viennent pas de moi,
  - type: text
    content: ils concluent des traités que je n'ai pas inspirés,
  - type: text
    content: pour accumuler péché sur péché !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ne voyez pas  : cf. 29.10 ; Jr 11.21 ; Am 2.12. –  parlez-nous  : autres traductions dites-nous des choses enjôleuses ; flattez-nous  ; cf. Ps 5.10n  ; 36.3n  ; Pr 2.16n  ; voir aussi 2Tm 4.3.'
  - type: text
    content: 'qui disent aux voyants : Ne voyez pas !'
  - type: text
    content: '– et aux visionnaires : N''ayez pas pour nous de visions exactes,'
  - type: text
    content: parlez-nous avec complaisance,
  - type: text
    content: ayez des visions chimériques !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Détournez-vous… Jb 21.14. –  ôtez  : litt. faites cesser. –  Saint d''Israël 1.4+.'
  - type: text
    content: Détournez-vous du chemin,
  - type: text
    content: écartez-vous du sentier,
  - type: text
    content: ôtez de notre présence le Saint d'Israël !
  '12':
  - type: text
    content: ' '
  - type: note
    content: '28.15. –  rejetez  : autre traduction méprisez.'
  - type: text
    content: 'A cause de cela, ainsi parle le Saint d''Israël :'
  - type: text
    content: Puisque vous rejetez cette parole,
  - type: text
    content: que vous mettez votre confiance dans la violence et dans les détours,
  - type: text
    content: et que vous les prenez pour appuis,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 13.10-16. –  elle s''écroule  : litt. son brisement ou son désastre , cf. v. 26n.'
  - type: text
    content: cette faute sera pour vous
  - type: text
    content: comme une brèche menaçante
  - type: text
    content: qui fait un renflement dans une muraille élevée
  - type: text
    content: – en un instant, tout à coup, elle s'écroule.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 19.10-11+. –  citerne  : le même terme hébreu est traduit par lagune en Ez 47.11.'
  - type: text
    content: On la brise comme on brise la jarre des potiers ;
  - type: text
    content: on la met en pièces, on ne l'épargne pas,
  - type: text
    content: et ses débris ne laissent pas un morceau
  - type: text
    content: pour prendre du feu au foyer
  - type: text
    content: ou pour puiser de l'eau à la citerne.
  - type: heading
    content: Le salut par la confiance
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'en faisant demi-tour  : autre traduction en revenant , cf. 1.27n  ; ce qui implique l''idée d''un changement  ; l''expression pourrait aussi suggérer le retour de l''ambassade envoyée en Egypte (v. 2). –  en vous reposant  : cf. 28.12+. –  tranquillité 7.4 ; 8.6 ; 32.17. –  pas voulu Mt 23.37.'
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', le Saint d''Israël :'
  - type: text
    content: C'est en faisant demi-tour et en vous reposant que vous seriez sauvés,
  - type: text
    content: c'est dans la tranquillité et la confiance que serait votre force.
  - type: text
    content: Mais vous ne l'avez pas voulu !
  '16':
  - type: text
    content: ' '
  - type: note
    content: vous fuirez 22.3.
  - type: text
    content: 'Vous avez dit : « Non ! nous fuirons à cheval ! »'
  - type: text
    content: C'est pourquoi vous fuirez.
  - type: text
    content: – « Nous monterons des coursiers rapides ! »
  - type: text
    content: C'est pourquoi vos poursuivants seront rapides.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Comme un seul homme, mille  : litt. mille-un  ; on pourrait aussi traduire plus de mille ou un millier  ; cf. Dt 32.30. –  bannière 5.26n  ; cf. 1.8.'
  - type: text
    content: Comme un seul homme, mille fuiront quand un seul les rabrouera ;
  - type: text
    content: quand cinq vous rabroueront, vous fuirez,
  - type: text
    content: jusqu'à ce que vous restiez
  - type: text
    content: comme un mât au sommet de la montagne,
  - type: text
    content: comme une bannière sur la colline.
  - type: heading
    content: Le Seigneur attend l'heure de vous faire grâce
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'C''est pourquoi  : autres traductions ainsi, cependant. –  un Dieu d''équité  : litt. un Dieu de droit  ; cf. 5.16 ; Os 2.21 ; Ps 36.6s ; 48.10-12 ; 88.12s. –  heureux… 32.20 ; 56.2 ; Ps 1.1+. –  ceux qui l''attendent 8.17 ; cf. 12.2 ; 25.9 ; 26.8 ; 33.2 ; 40.31 ; 49.23 ; 51.5 ; 64.3n  ; Ps 25.3 ; 31.25 ; Pr 16.20.'
  - type: text
    content: 'C''est pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' attend pour vous faire grâce,'
  - type: text
    content: c'est pourquoi il s'élèvera pour avoir compassion de vous.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un Dieu d''équité ;'
  - type: text
    content: heureux tous ceux qui l'attendent !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'un peuple habitera…  : des versions araméennes ont lu ces mots comme une interpellation  : peuple de Sion, qui habites à Jérusalem , ce qui pourrait correspondre à une vocalisation différente du même texte hébreu. Cf. 37.35. –  tu ne pleureras plus 12.1 ; 25.8. –  dès qu''il aura entendu 65.24.'
  - type: text
    content: Car un peuple habitera encore à Sion, à Jérusalem,
  - type: text
    content: tu ne pleureras plus !
  - type: text
    content: Il te fera grâce quand tu crieras ;
  - type: text
    content: dès qu'il aura entendu, il te répondra.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ils descendent…  : litt. ceux qui vont pour descendre en Egypte  ; cf. Gn 12.10n  ; sur l''alliance judéo-égyptienne contre l''Assyrie, voir 18.1+ ; Ez 31.6. –  sans m''interroger  : litt. et ils n''interrogent pas ma bouche  ; autre traduction sans me consulter. –  la forteresse ou le refuge , le terme hébreu est apparenté au verbe traduit par se réfugier  ; cf. 25.4n.'
  - type: text
    content: Ils descendent en Egypte sans m'interroger,
  - type: text
    content: pour se réfugier dans la forteresse du pharaon
  - type: text
    content: et chercher un abri à l'ombre de l'Egypte !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'du pain…  : litt. du pain de détresse et de l''eau d''oppression  ; une expression comparable s''applique au régime d''un prisonnier, cf. 1R 22.27n. –  ton Maître ou celui qui te donne l''enseignement (de la racine hébraïque correspondante vient le mot hébreu tora , habituellement traduit par loi , voir aussi Jl 2.23n) : litt. ceux qui te donnent l''enseignement , pluriel qui peut être interprété soit comme signifiant tes maîtres , soit comme un pluriel d''excellence désignant Dieu ; c''est cette dernière option qui semble le mieux convenir au contexte, puisque le verbe principal est au singulier ( ne se tiendra plus à l''écart , cf. Jr 31.34).'
  - type: text
    content: Le Seigneur vous donnera du pain dans la détresse
  - type: text
    content: et de l'eau dans l'oppression ;
  - type: text
    content: 'ton Maître ne se tiendra plus à l''écart :'
  - type: text
    content: tu verras ton Maître de tes propres yeux.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 6.16. –  quand vous irez à droite  : la forme verbale ainsi traduite est identique à celle, dérivée d''une autre racine hébraïque, qui est rendue par ne pas tenir en 7.9n  ; autre traduction que vous alliez à droite ou à gauche.'
  - type: text
    content: 'Tes oreilles entendront derrière toi cette parole :'
  - type: text
    content: Voici le chemin, suivez-le,
  - type: text
    content: quand vous irez à droite
  - type: text
    content: ou quand vous irez à gauche.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'argent / or  : cf. 2.20 ; 27.9. –  souillure  : le terme désigne les règles de la femme en Lv 12.2 ; voir pur, impur. –  Hors d''ici ! ou, en rattachant le mot à une autre racine hébraïque  : ordure !'
  - type: text
    content: Vous tiendrez pour impurs l'argent qui recouvre vos statues,
  - type: text
    content: et l'or dont sont plaquées vos idoles de métal fondu ;
  - type: text
    content: tu en dissémineras les débris comme une souillure.
  - type: text
    content: « Hors d'ici ! », leur diras-tu.
  - type: heading
    content: Il répandra la pluie sur la semence
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'terre  : litt. sol , de même au v. 24 ; cf. Gn 2.5n. –  substantiel et nourrissant  : litt. gras et huileux  ; cf. 25.6 ; Lv 26.3-5.'
  - type: text
    content: Alors il répandra la pluie sur la semence
  - type: text
    content: que tu auras mise en terre,
  - type: text
    content: et le pain que produira la terre
  - type: text
    content: sera substantiel et nourrissant ;
  - type: text
    content: en ce jour-là tes troupeaux iront paître dans de vastes prés.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'fourrage salé ou fermenté. Certains pensent à une préparation spéciale faite à partir d''herbes acides, comme l''oseille. –  vanné (terme apparenté pour van ) : le même verbe est traduit par disséminer au v. 22. –  fourche  : le mot n''apparaît qu''ici ; il est probablement dérivé de celui qui signifie souffle ou vent.'
  - type: text
    content: Les bœufs et les ânes qui labourent la terre
  - type: text
    content: mangeront un fourrage salé,
  - type: text
    content: vanné avec la fourche et le van.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'montagne / colline  : anciens lieux d''idolâtrie (57.7 ; 2R 17.10 ; Jr 3.6). –  chute des tours  : cf. 2.12-15 ; 26.5.'
  - type: text
    content: Sur toute haute montagne
  - type: text
    content: et sur toute colline élevée,
  - type: text
    content: il y aura des canaux, des cours d'eau,
  - type: text
    content: au jour de la grande tuerie,
  - type: text
    content: à la chute des tours.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '9.10. –  lune / soleil 24.23n  ; cf. 13.9s ; Jl 2.10. –  pansera / guérira 1.6 ; 19.22+. –  la blessure  : litt. la brisure ou le brisement , même terme au v. 13n  ; le terme désigne une fracture en Lv 21.19 ; 24.20 ; cf. Jr 4.6n  ; 6.14n.'
  - type: text
    content: La lumière de la lune sera comme la lumière du soleil,
  - type: text
    content: et la lumière du soleil sera sept fois plus grande
  - type: text
    content: – comme la lumière de sept jours –
  - type: text
    content: 'le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pansera la blessure de son peuple'
  - type: text
    content: et guérira la plaie de ses coups.
  - type: heading
    content: L'Assyrie frappée à son tour
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'nom  : cf. 59.19n  ; Dt 12.5 ; 1R 8.29. –  lourde de menaces  : traduction incertaine ; le mot hébreu, qui n''apparaît qu''ici, rappelle celui qui a été traduit par sentence en 13.1n  ; il évoque peut-être l''image d''une nuée d''orage menaçante (cf. 17.13). –  feu dévorant v. 30 ; 10.17 ; 29.6 ; 33.14 ; Dt 9.3.'
  - type: text
    content: 'Le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' vient de loin ;'
  - type: text
    content: sa colère est ardente,
  - type: text
    content: lourde de menaces ;
  - type: text
    content: ses lèvres sont pleines de fureur,
  - type: text
    content: et sa langue est comme un feu dévorant ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'son souffle ou son Esprit. –  torrent (v. 33) ou oued , cf. 15.7 ; 27.12 ; 34.9 ; Gn 26.17n  ; Jb 6.15n. –  impétueux ou qui déferle, qui inonde 8.7s ; 10.22n  ; cf. 59.19n  ; 66.12 ; Jr 47.2. –  crible  : le sens du terme ainsi rendu n''est pas connu avec certitude ; il est dérivé du verbe traduit par agiter ou secouer en 10.32+. On pourrait aussi, dans la ligne de la fin du v., penser aux guides que l''on secoue pour mener un attelage et traduire  : il détournera les nations (de Jérusalem) au moyen des rênes de la destruction. Le mot traduit par destruction est rendu par inutile en 1.13. –  mors 37.29.'
  - type: text
    content: son souffle est comme un torrent impétueux
  - type: text
    content: et qui monte jusqu'au cou ;
  - type: text
    content: il passera les nations
  - type: text
    content: au crible de la destruction ;
  - type: text
    content: c'est un mors trompeur
  - type: text
    content: entre les mâchoires des peuples.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'célèbre  : litt. consacre ou sanctifie (voir saint). –  la fête  : la Pâque (Ex 12.8-11) ou la fête d''automne (1R 8.2,65 ; Ez 45.25) ; voir calendrier. –  le cœur joyeux  : litt. joie du cœur . –  comme celui qui marche…  : allusion au pèlerinage à Jérusalem, au cours duquel on chantait les psaumes des montées (Ps 120–134 ; cf. 81 ; 84 ; 122). –  Rocher 17.10.'
  - type: text
    content: Vous chanterez
  - type: text
    content: comme la nuit où l'on célèbre la fête,
  - type: text
    content: vous aurez le cœur joyeux
  - type: text
    content: comme celui qui marche au son de la flûte,
  - type: text
    content: 'pour vous rendre à la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: vers le Rocher d'Israël.
  '3':
  - type: text
    content: La forteresse du pharaon tournera à votre honte ;
  - type: text
    content: l'abri à l'ombre de l'Egypte, à votre confusion.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'voix  : le tonnerre, Ex 9.23n  ; Ps 29.4 ; Jb 37.2n. –  rage  : cf. Pr 19.3n. –  feu… dévore v. 27 ; 29.6n. –  pluie battante  : terme de sens incertain, dérivé d''un verbe qui signifie briser en éparpillant (cf. 27.9 réduire en poussière  ; 33.3 disperser ). –  pierres de grêle 28.2 ; cf. Jos 10.11.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera retentir sa voix éclatante,'
  - type: text
    content: il montrera son bras
  - type: text
    content: qui s'abat dans la rage de sa colère,
  - type: text
    content: dans un feu flamboyant qui dévore,
  - type: text
    content: dans une pluie battante, une averse violente et des pierres de grêle.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'voix v. 30n. –  Assyrien / bâton (cf. trique v. 32 ; 9.3n) 10.24-26. –  Il frappera…  : sans doute le Seigneur.'
  - type: text
    content: 'Alors, à la voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: l'Assyrien sera terrifié.
  - type: text
    content: Il frappera de son bâton.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'qui lui est destiné  : litt. de sa correction , d''après certains mss ; les autres portent du fondement ( ?), terme dont la graphie est très voisine en hébreu. –  tambourins (Ex 15.20 ; Jg 11.34) / cithares  : cf. 5.12 ; 24.8 ; Gn 31.27 ; 2S 6.5 ; Ps 81.3 ; 149.3 ; Jb 21.12. –  le Seigneur agitera…  : traduction incertaine, litt. dans des combats d''agitation il combattra contre eux (ou contre elle  ?) ; certains modifient le texte hébreu traditionnel pour lire avec des tambourins et des cithares, avec des danses rituelles il combattra contre lui. Sur le verbe traduit par agiter , cf. 10.32+ ; voir aussi 14.24-27 ; Lv 7.30n.'
  - type: text
    content: A chaque coup de trique qui lui est destiné
  - type: text
    content: 'et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera tomber sur lui,'
  - type: text
    content: on entendra les tambourins et les cithares ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agitera sa main pour le combattre.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Déjà  : autre traduction depuis longtemps  ; litt. depuis hier. –  un bûcher  : hébreu tophté , peut-être une variante de topheth , qui désigne le lieu où l''on a perpétré des sacrifices humains, dans la vallée de Hinnom (2R 23.10 ; Jr 7.31 ; 19.6,13). De même, le roi (hébreu mélek ) pourrait être ici un équivalent de Moloch ou Molech (cf. Lv 18.21 ; 20.2-5). –  son bûcher  : autre mot qu''au début du v., rare (ici et en Ez 24.9) et diversement compris par les traducteurs ; il semble évoquer un foyer circulaire. –  soufre Gn 19.24 ; Ez 38.22.'
  - type: text
    content: Déjà un bûcher est préparé,
  - type: text
    content: il est installé pour le roi,
  - type: text
    content: il est profond, il est vaste ;
  - type: text
    content: son bûcher, c'est du feu et du bois en abondance ;
  - type: text
    content: 'le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''enflamme, comme un torrent de soufre.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ses princes  : ceux de Juda. –  Tsoân 19.11n. –  Hanès  : en grec Hérakléopolis , à une centaine de kilomètres au sud du Caire.'
  - type: text
    content: Déjà ses princes sont à Tsoân,
  - type: text
    content: et ses messagers ont atteint Hanès.
  '5':
  - type: text
    content: ' '
  - type: note
    content: V. 3.
  - type: text
    content: Tous seront honteux au sujet d'un peuple
  - type: text
    content: qui ne leur sera pas une aide,
  - type: text
    content: ni pour les secourir, ni pour les aider,
  - type: text
    content: mais qui fera leur honte et leur déshonneur.
  - type: heading
    content: Ceux qui vont acheter l'aide de l'Egypte
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. – Il fallait traverser le Néguev (21.1) pour se rendre en Egypte. –  détresse / désarroi 8.22. –  dragon  : cf. 6.2n  ; 14.29.'
  - type: text
    content: Sentence sur les bêtes du Néguev.
  - type: text
    content: A travers une terre de détresse et de désarroi,
  - type: text
    content: d'où viennent la lionne et le lion,
  - type: text
    content: le cobra et le dragon volant,
  - type: text
    content: ils portent à dos d'ânes leurs richesses,
  - type: text
    content: et sur la bosse des chameaux leurs trésors
  - type: text
    content: à un peuple qui ne leur sera d'aucune aide !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Rahav au repos ou Rahav immobile  : traduction incertaine, qui suppose une légère modification de la lecture traditionnelle ; autre possibilité  : ils ne sont que Rahav qui a cessé d''être , c.-à-d. ils ne sont plus que l''ombre de Rahav. Rahav (cf. 14.4n) est le nom d''un monstre marin fabuleux, ici symbole de l''Egypte ; cf. 51.9ss ; Ps 87.4n  ; 89.11 ; Jb 9.13n  ; 26.12. Il évoque l''idée d''agitation et fait contraste avec celle de repos (ou cessation ).'
  - type: text
    content: Car le secours de l'Egypte n'est que futilité et néant ;
  - type: text
    content: c'est pourquoi je l'ai appelée
  - type: text
    content: « Rahav au repos ».
  - type: heading
    content: Un peuple qui ne veut pas écouter
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'La tablette d''argile ou de pierre était utilisée concurremment avec le livre , rouleau de papyrus ou de cuir. On peut comprendre qu''il s''agit ici d''une rédaction en deux exemplaires, comme en Jr 32.9-14. Voir aussi 8.1s,16 ; Jr 36.2 ; Ha 2.2. –  pour l''avenir  : litt. pour un jour d''après. –  un témoin perpétuel  : avec une légère modification du texte hébreu traditionnel, d''après des versions anciennes et deux mss hébreux ; autre traduction pour toujours, à jamais.'
  - type: text
    content: Viens maintenant, écris cela
  - type: text
    content: devant eux sur une tablette,
  - type: text
    content: et grave-le dans un livre ;
  - type: text
    content: ce sera, pour l'avenir,
  - type: text
    content: un témoin perpétuel.
