        children:
        - type: text
          text: '30.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous fuirez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22.3.
      marker-yv: yv-n
    - type: text
      text: 'Vous avez dit : « Non ! nous fuirons à cheval ! »'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi vous fuirez.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – « Nous monterons des coursiers rapides ! »
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi vos poursuivants seront rapides.
