      marker-yv: yv-n
    - type: text
      text: On la brise comme on brise la jarre des potiers ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on la met en pièces, on ne l'épargne pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses débris ne laissent pas un morceau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour prendre du feu au foyer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou pour puiser de l'eau à la citerne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut par la confiance
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
