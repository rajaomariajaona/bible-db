      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rejetez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: méprisez.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le Saint d''Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque vous rejetez cette parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous mettez votre confiance dans la violence et dans les détours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous les prenez pour appuis,
  '13':
  - type: usfm
    marker: q1
