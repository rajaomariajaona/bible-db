      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fondu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (certains y voient une allusion à une stèle érigée en témoignage de l'alliance ; cf. notre mot alliage). Cf. v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 28.15 ; 29.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que je n'ai pas inspirés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pas (par) mon souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Quel malheur pour les fils rebelles !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s'engagent dans des projets qui ne viennent pas de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils concluent des traités que je n'ai pas inspirés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour accumuler péché sur péché !
  '10':
  - type: usfm
    marker: q1
