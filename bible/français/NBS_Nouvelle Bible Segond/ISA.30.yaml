  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un mât au sommet de la montagne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une bannière sur la colline.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
