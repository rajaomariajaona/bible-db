          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 2Tm 4.3.'
      marker-yv: yv-n
    - type: text
      text: 'qui disent aux voyants : Ne voyez pas !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– et aux visionnaires : N''ayez pas pour nous de visions exactes,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parlez-nous avec complaisance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ayez des visions chimériques !
