      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ez 13.10-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: elle s'écroule
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son brisement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son désastre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: cette faute sera pour vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une brèche menaçante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fait un renflement dans une muraille élevée
  - type: usfm
    marker: q1
    children:
