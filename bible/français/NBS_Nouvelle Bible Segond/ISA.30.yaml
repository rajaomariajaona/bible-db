      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.4 ; 8.6 ; 32.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas voulu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 23.37.
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ', le Saint d''Israël :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est en faisant demi-tour et en vous reposant que vous seriez sauvés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est dans la tranquillité et la confiance que serait votre force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous ne l'avez pas voulu !
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
