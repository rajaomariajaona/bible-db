    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.8-10 : « Pourtant, même ceux-là, tu les as épargnés parce qu''ils restaient des hommes et tu as envoyé comme avant-coureurs de ton armée des guêpes qui ne les extermineraient que peu à peu. Certes, tu aurais pu dans une bataille livrer les impies aux mains des justes, ou encore les détruire en un instant par des bêtes redoutables ou par une parole tranchante. Mais en exerçant progressivement ta justice, tu offrais une occasion de repentir. »'
    marker-yv: yv-n
  - type: text
    text: 'J''enverrai les frelons devant toi, et ils chasseront devant toi les Hivvites, les Cananéens et les Hittites. '
