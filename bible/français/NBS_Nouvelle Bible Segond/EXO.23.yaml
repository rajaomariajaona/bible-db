document_id: EXO.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le respect des faibles
  - type: text
    content: ' '
  - type: note
    content: 'Tu ne colporteras pas  : litt. tu ne lèveras pas ou tu ne porteras pas  ; LXX tu ne recevras pas . Cf. Dt 1.16s ; 16.18-20. –  témoin malveillant (litt. de violence ) Dt 19.16 ; Ps 35.11.'
  - type: text
    content: 'Tu ne colporteras pas de fausse rumeur. Tu n''agiras pas en témoin malveillant pour prêter main-forte au méchant. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Lv 25.1-7.
  - type: text
    content: 'Pendant six années tu ensemenceras ta terre et tu en récolteras le produit. '
  '11':
  - type: note
    content: 'Dt 15.1 ; cf. Dt 24.19 ; 26.12s. –  tu lui donneras du répit et tu la laisseras tranquille  : les verbes hébreux correspondants font assonance. –  les animaux sauvages  : litt. l''animal de la campagne (ou des champs), de même au v. 29 ; cf. Gn 3.14n.'
  - type: text
    content: Mais la septième, tu lui donneras du répit et tu la laisseras tranquille ; les pauvres de ton peuple mangeront, et les animaux sauvages mangeront ce qui restera. Tu feras de même pour ta vigne et pour ton olivier.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '16.29+ ; 31.17n. –  tu feras sabbat  : autre traduction tu cesseras (de travailler)  ; cf. Gn 2.2n.'
  - type: text
    content: Pendant six jours tu feras ton travail. Mais le septième jour tu feras sabbat, afin que ton bœuf et ton âne puissent se reposer, que le fils de ta servante et l'immigré puissent reprendre haleine.
  - type: heading
    content: Les fêtes
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'vous n''évoquerez pas…  : autre traduction vous ne rappellerez pas le nom… (3.15n  ; 12.14n) ; cf. Jos 23.7.'
  - type: text
    content: 'Vous observerez tout ce que je vous ai dit, et vous n''évoquerez pas le nom d''autres dieux : qu''on ne l''entende pas de ta bouche.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 17 ; Lv 23.4-44 ; Nb 28.16-29 ; Dt 16.1-17 ; voir aussi calendrier et fêtes.
  - type: text
    content: 'Trois fois par an, tu me célébreras une fête. '
  '15':
  - type: note
    content: 'Pains sans levain 12.15+. –  temps fixé 13.10n. –  mois des épis 13.4n. –  on ne devra pas paraître devant moi  : litt. ma face ne sera pas vue ou on ne sera pas vu devant ma face  ; expression très proche au v. 17 et en 34.20,23s ; Dt 16.16 ; 31.11 ; 1S 1.22 ; voir aussi 1R 18.1s,15 ; Es 16.12 ; Ps 84.8. –  les mains vides Dt 16.16n.'
  - type: text
    content: Tu observeras la fête des Pains sans levain ; pendant sept jours, au temps fixé, au mois des épis, tu mangeras des pains sans levain, comme je te l'ai ordonné, car c'est en ce mois que tu es sorti d'Egypte ; on ne devra pas paraître devant moi les mains vides.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'la fête de la Moisson (également appelée fête des Semaines ) : cf. 34.22 ; Lv 23.15-21 ; Nb 28.26 ; Dt 16.9-11 ; Ac 2.1 ; Tobit 2.1 : « A notre fête de la Pentecôte, c''est-à-dire la sainte fête des Semaines… » –  fête de la Récolte (ou fête des Huttes ) Lv 23.34-43 ; Nb 29.12-38 ; Dt 16.13-15 ; Jn 7.37. –  à la fin  : litt. au sortir  ; on pourrait aussi comprendre au début (de l''année) . –  le fruit de ton travail  : litt. ton ouvrage.'
  - type: text
    content: 'Observe la fête de la Moisson, celle des premiers fruits de ton travail, de ce que tu auras semé dans les champs ; ainsi que la fête de la Récolte, à la fin de l''année, quand tu récolteras des champs le fruit de ton travail. '
  '17':
  - type: note
    content: 'V. 14,15n  ; 34.23 ; Dt 16.16. –  le Seigneur (hébreu ’Adonaï),le Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Trois fois par an, toute ta population mâle devra paraître devant le Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '18':
  - type: text
    content: ' '
  - type: note
    content: '34.25. –  quelque chose de levé 12.15+. –  le sang de mon sacrifice  : cf. 34.25n  ; Dt 12.27 ; 2R 16.15. –  graisse Lv 3.3n.'
  - type: text
    content: 'Tu n''offriras pas avec quelque chose de levé le sang de mon sacrifice ; la graisse de ma fête ne passera pas la nuit jusqu''au lendemain. '
  '19':
  - type: note
    content: 'prémices  : voir aussi Dt 26.1-11. –  chevreau… 34.26 ; Dt 14.21 ; cf. Lv 22.28 ; il s''agissait probablement d''un rite cananéen ou phénicien, dont le sens nous est inconnu. L''interdiction, qui n''est pas motivée dans le texte, ne semble pas liée à la jeunesse de l''animal qui tète encore (cf. Lv 22.27 ; 1S 7.9) ; selon certains, elle aurait eu pour but d''éviter de tarir le lait de la chèvre. C''est de cet interdit que la tradition juive a tiré toute une réglementation alimentaire séparant strictement les produits laitiers de la viande.'
  - type: text
    content: 'Tu apporteras à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les prémices des premiers fruits de ta terre.'
  - type: text
    content: Tu ne feras pas cuire un chevreau dans le lait de sa mère.
  - type: heading
    content: Promesses et instructions avant le départ
  '2':
  - type: note
    content: 'tu ne déposeras pas…  : on pourrait traduire, plus littéralement, tu ne répondras pas dans un litige en te pliant à la multitude pour faire plier (la justice)  ; mais le verbe correspondant à plier peut avoir des sens très divers ; il est traduit par porter atteinte à au v. 6.'
  - type: text
    content: 'Tu ne suivras pas la multitude pour faire du mal ; tu ne déposeras pas dans un procès en te mettant du côté de la multitude pour faire pencher la justice. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'un messager  : autre traduction un ange  ; cf. 33.2 ; Gn 24.7 ; Nb 20.16 ; Ml 3.1 ; Mt 11.10/ / ; Mc 1.2n.'
  - type: text
    content: 'Quant à moi, j''envoie un messager devant toi, pour te garder sur le chemin et te conduire au lieu que j''ai préparé. '
  '21':
  - type: note
    content: 'ne lui cause pas d''amertume  : avec une légère modification de la lecture traditionnelle, on pourrait comprendre ne sois pas rebelle envers lui. –  il ne pardonnera pas  : autres traductions il n''enlèvera pas vos transgressions ; il ne se chargera pas de vos transgressions ; il ne supportera pas vos transgressions  ; cf. 10.17n. –  mon nom est en lui (LXX sur lui) : cf. Jn 17.11s.'
  - type: text
    content: 'Tiens-toi sur tes gardes devant lui, écoute-le ; ne lui cause pas d''amertume : il ne pardonnera pas vos transgressions, car mon nom est en lui. '
  '22':
  - type: note
    content: 'ce que je te dis  : autre traduction ce que je te dirai.'
  - type: text
    content: 'Si tu l''écoutes, si tu fais tout ce que je te dis, je serai l''ennemi de tes ennemis et l''adversaire de tes adversaires. '
  '23':
  - type: note
    content: Amorites… 3.8n. Cf. 34.10-16 ; Dt 7.
  - type: text
    content: Mon messager marchera devant toi pour te conduire vers les Amorites, les Hittites, les Perizzites, les Cananéens, les Hivvites et les Jébusites, et je les ferai disparaître.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'prosterneras 20.5+. –  renverseras (même verbe en 15.7) ou démoliras  ; le verbe est habituellement traduit par raser (une ville, une muraille, un autel) ; cf. Nb 33.52 ; Dt 7.5 ; 1R 12.25 ; 2R 23. –  leurs ouvrages  : c.-à-d. les idoles  ; cf. Lv 18.3.'
  - type: text
    content: 'Tu ne te prosterneras pas devant leurs dieux, tu ne les serviras pas ; tu ne feras pas ce qu''ils font ; tu renverseras leurs ouvrages et tu briseras leurs pierres levées. '
  '25':
  - type: note
    content: 'Voir bénédiction. –  de toi  : litt. de ton sein ou du milieu de toi.'
  - type: text
    content: 'Vous servirez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu ; il bénira votre pain et votre eau, et j''éloignerai de toi la maladie. '
  '26':
  - type: note
    content: 'Je te ferai parvenir à un âge avancé  : litt. je remplirai le nombre de tes jours.'
  - type: text
    content: Il n'y aura dans ton pays ni fausse couche, ni femme stérile. Je te ferai parvenir à un âge avancé.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ma terreur  : autre traduction la terreur que j''inspire . –  je ferai fuir…  : litt. je ferai que tous tes ennemis te présenteront la nuque , c.-à-d. je leur ferai tourner le dos, je les ferai battre en retraite  ; cf. Ps 18.41+.'
  - type: text
    content: 'J''enverrai ma terreur devant toi, je frapperai de panique tous les peuples parmi lesquels tu iras, et je ferai fuir devant toi tous tes ennemis. '
  '28':
  - type: note
    content: 'les frelons  : litt. le frelon. Au mot correspondant, assez rare (voir aussi Dt 7.20 ; Jos 24.12), certains donnent le sens de découragement  ; d''autres comprennent la peste. Cf. v. 29n  ; Dt 1.44 ; Ps 118.12 ; voir aussi Sagesse 12.8-10 : « Pourtant, même ceux-là, tu les as épargnés parce qu''ils restaient des hommes et tu as envoyé comme avant-coureurs de ton armée des guêpes qui ne les extermineraient que peu à peu. Certes, tu aurais pu dans une bataille livrer les impies aux mains des justes, ou encore les détruire en un instant par des bêtes redoutables ou par une parole tranchante. Mais en exerçant progressivement ta justice, tu offrais une occasion de repentir. »'
  - type: text
    content: 'J''enverrai les frelons devant toi, et ils chasseront devant toi les Hivvites, les Cananéens et les Hittites. '
  '29':
  - type: note
    content: Cf. Jg 2.20–3.6. –  les animaux sauvages v. 11n.
  - type: text
    content: 'Je ne les chasserai pas devant toi en une seule année, de peur que le pays ne reste désert et que les animaux sauvages ne se multiplient contre toi. '
  '3':
  - type: note
    content: 'le pauvre  : autres termes au v. 6 et en 22.24 ; cf. 20.16+ ; Lv 19.15.'
  - type: text
    content: Tu ne favoriseras pas le pauvre dans son procès.
  '30':
  - type: note
    content: 'occuper  : autre traduction recevoir comme patrimoine.'
  - type: text
    content: Je les chasserai devant toi peu à peu, jusqu'à ce que tu aies été assez fécond pour pouvoir occuper le pays.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Je te donnerai…  : litt. je fixerai ton territoire (ou ta frontière ). –  mer des Joncs 13.18n. –  mer des Philistins  : Méditerranée. –  au fleuve  : probablement l''Euphrate, cf. Gn 31.21n  ; Jos 1.4 ; 1R 5.1. –  je vous livrerai Gn 9.2n.'
  - type: text
    content: 'Je te donnerai le territoire qui va de la mer des Joncs à la mer des Philistins et du désert au fleuve ; car je vous livrerai les habitants du pays, et tu les chasseras devant toi. '
  '32':
  - type: note
    content: Voir alliance.
  - type: text
    content: 'Tu ne concluras pas d''alliance pour eux ni pour leurs dieux. '
  '33':
  - type: note
    content: 34.12 ; Dt 7.16 ; Jos 23.13 ; Ps 106.36. – Voir pécher.
  - type: text
    content: Ils n'habiteront pas dans ton pays, de peur qu'ils ne te fassent pécher contre moi ; car tu servirais leurs dieux, et ce serait un piège pour toi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 22.1-4. –  S''il t''arrive de voir  : litt. si tu rencontres.'
  - type: text
    content: 'S''il t''arrive de voir le bœuf de ton ennemi ou son âne égaré, tu le lui ramèneras. '
  '5':
  - type: note
    content: 'Traduction incertaine ; c''est apparemment le même verbe qui est traduit par abandonner et par décharger  ; mais le texte joue peut-être sur des homonymes. Cf. Dt 22.4. –  ton ennemi  : litt. celui qui te déteste ou qui te hait.'
  - type: text
    content: Lorsque tu vois l'âne de ton ennemi se coucher sous sa charge, tu ne l'abandonneras pas ; tu l'aideras à le décharger.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3n. –  Tu ne porteras pas atteinte  : litt. tu ne plieras pas ou tu n''inclineras pas , cf. v. 2n. –  au droit  : autre traduction à la cause.'
  - type: text
    content: 'Tu ne porteras pas atteinte au droit du pauvre dans son procès. '
  '7':
  - type: note
    content: 'celui qui est innocent et juste  : autre traduction l''innocent et le juste. –  je ne justifierai pas le méchant  : autre traduction je ne déclarerai pas juste le méchant, c.-à-d. je n''acquitterai pas le coupable  ; LXX tu n''acquitteras pas le méchant pour des présents. Cf. v. 8 ; 22.8n  ; Es 1.23 ; 5.23 ; Pr 17.15.'
  - type: text
    content: 'Tu t''abstiendras de toute parole mensongère. Tu ne tueras pas celui qui est innocent et juste ; car je ne justifierai pas le méchant. '
  '8':
  - type: note
    content: 'pot-de-vin Dt 10.17 ; 16.19 ; 27.25 ; 1S 8.3 ; Es 1.23 ; 5.23 ; 33.15 ; Ez 22.12 ; Mi 3.11 ; Ps 15.5 ; 26.10 ; Pr 6.35 ; 17.23 ; 2Ch 19.7. –  ruinent la cause…  : autre traduction pervertissent les paroles des justes.'
  - type: text
    content: 'Tu n''accepteras pas de pot-de-vin : les pots-de-vin aveuglent les gens clairvoyants et ruinent la cause des justes.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: vous connaissez… la vie (ou la situation ) de l'immigré 22.20+ ; sur le terme correspondant à vie , cf. Gn 1.20n.
  - type: text
    content: Tu n'opprimeras pas l'immigré ; vous connaissez vous-mêmes la vie de l'immigré, car vous avez été des immigrés en Egypte.
  - type: heading
    content: L'année sabbatique et le sabbat
