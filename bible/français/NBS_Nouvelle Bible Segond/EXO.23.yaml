  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu ne colporteras pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu ne lèveras pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu ne porteras pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu ne recevras pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Cf. Dt 1.16s ; 16.18-20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'témoin malveillant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de violence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) Dt 19.16 ; Ps 35.11.
    marker-yv: yv-n
  - type: text
    text: 'Tu ne colporteras pas de fausse rumeur. Tu n''agiras pas en témoin malveillant pour prêter main-forte au méchant. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu ne déposeras pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on pourrait traduire, plus littéralement, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu ne répondras pas dans un litige en te pliant à la multitude pour faire plier (la justice)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais le verbe correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut avoir des sens très divers ; il est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'porter atteinte à '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 6.
    marker-yv: yv-n
  - type: text
    text: 'Tu ne suivras pas la multitude pour faire du mal ; tu ne déposeras pas dans un procès en te mettant du côté de la multitude pour faire pencher la justice. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le pauvre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres termes au v. 6 et en 22.24 ; cf. 20.16+ ; Lv 19.15.'
    marker-yv: yv-n
  - type: text
    text: Tu ne favoriseras pas le pauvre dans son procès.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 22.1-4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: S'il t'arrive de voir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si tu rencontres.
    marker-yv: yv-n
  - type: text
    text: 'S''il t''arrive de voir le bœuf de ton ennemi ou son âne égaré, tu le lui ramèneras. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Traduction incertaine ; c''est apparemment le même verbe qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'abandonner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: décharger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais le texte joue peut-être sur des homonymes. Cf. Dt 22.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ton ennemi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui qui te déteste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui te hait.
    marker-yv: yv-n
  - type: text
    text: Lorsque tu vois l'âne de ton ennemi se coucher sous sa charge, tu ne l'abandonneras pas ; tu l'aideras à le décharger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu ne porteras pas atteinte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu ne plieras pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu n'inclineras pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la cause.
    marker-yv: yv-n
  - type: text
    text: 'Tu ne porteras pas atteinte au droit du pauvre dans son procès. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'celui qui est innocent et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: juste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'innocent et le juste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ne justifierai pas le méchant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne déclarerai pas juste le méchant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je n'acquitterai pas le coupable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu n'acquitteras pas le méchant pour des présents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. v. 8 ; 22.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 1.23 ; 5.23 ; Pr 17.15.'
    marker-yv: yv-n
  - type: text
    text: 'Tu t''abstiendras de toute parole mensongère. Tu ne tueras pas celui qui est innocent et juste ; car je ne justifierai pas le méchant. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pot-de-vin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 10.17 ; 16.19 ; 27.25 ; 1S 8.3 ; Es 1.23 ; 5.23 ; 33.15 ; Ez 22.12 ; Mi 3.11 ; Ps 15.5 ; 26.10 ; Pr 6.35 ; 17.23 ; 2Ch 19.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ruinent la cause…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pervertissent les paroles des justes.
    marker-yv: yv-n
  - type: text
    text: 'Tu n''accepteras pas de pot-de-vin : les pots-de-vin aveuglent les gens clairvoyants et ruinent la cause des justes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous connaissez… la vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la situation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de l''immigré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.20+ ; sur le terme correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tu n'opprimeras pas l'immigré ; vous connaissez vous-mêmes la vie de l'immigré, car vous avez été des immigrés en Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'année sabbatique et le sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 25.1-7.
    marker-yv: yv-n
  - type: text
    text: 'Pendant six années tu ensemenceras ta terre et tu en récolteras le produit. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 15.1 ; cf. Dt 24.19 ; 26.12s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu lui donneras du répit et tu la laisseras tranquille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les verbes hébreux correspondants font assonance. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les animaux sauvages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''animal de la campagne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des champs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), de même au v. 29 ; cf. Gn 3.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Mais la septième, tu lui donneras du répit et tu la laisseras tranquille ; les pauvres de ton peuple mangeront, et les animaux sauvages mangeront ce qui restera. Tu feras de même pour ta vigne et pour ton olivier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.29+ ; 31.17
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu feras '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu cesseras (de travailler)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Gn 2.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Pendant six jours tu feras ton travail. Mais le septième jour tu feras sabbat, afin que ton bœuf et ton âne puissent se reposer, que le fils de ta servante et l'immigré puissent reprendre haleine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fêtes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous n'évoquerez pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous ne rappellerez pas le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; cf. Jos 23.7.
    marker-yv: yv-n
  - type: text
    text: 'Vous observerez tout ce que je vous ai dit, et vous n''évoquerez pas le nom d''autres dieux : qu''on ne l''entende pas de ta bouche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 17 ; Lv 23.4-44 ; Nb 28.16-29 ; Dt 16.1-17 ; voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'Trois fois par an, tu me célébreras une fête. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pains sans levain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.15+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'temps fixé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
