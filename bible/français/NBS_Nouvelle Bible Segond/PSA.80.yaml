document_id: PSA.80,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prête l'oreille, berger d'Israël !
  - type: text
    content: ' '
  - type: note
    content: 'lis / Témoignage  : cf. 45.1n (ici la préposition traduite par sur est différente ; elle signifie le plus souvent vers ) ; 60.1n. –  D''Asaph 73.1+. –  LXX ajoute au sujet de l''Assyrien  ; cf. 1R 22.29ss ; 2R 15.19,29.'
  - type: text
    content: Du chef de chœur. Sur « Les lis ». Témoignage. D'Asaph. Psaume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'devant elle  : cf. Ex 13.21. –  ses racines 2R 19.30 ; Es 27.6 ; 37.31.'
  - type: text
    content: 'Tu as fait place nette devant elle :'
  - type: text
    content: elle a enfoncé ses racines et rempli le pays ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'sa ramure  : cf. Gn 49.22. –  cèdres de Dieu (hébreu ’El , Gn 21.33n) : cf. 36.7 ; 104.16.'
  - type: text
    content: les montagnes étaient couvertes de son ombre,
  - type: text
    content: et sa ramure était comme des cèdres de Dieu ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: la mer Méditerranée, le Fleuve Euphrate. Sur l'étendue attribuée au royaume de David et de Salomon, voir 72.8n.
  - type: text
    content: elle étendait ses rameaux jusqu'à la mer,
  - type: text
    content: et ses rejetons jusqu'au Fleuve.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 89.41s ; Es 5.5ss ; Jr 12.7-13 ; Pr 24.31.
  - type: text
    content: Pourquoi as-tu ouvert des brèches dans ses clôtures,
  - type: text
    content: de sorte que tous les passants la grappillent ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'forêt  : dans les mss hébreux traditionnels, une lettre du mot correspondant est surélevée ; elle pourrait marquer le milieu exact du psautier, d''après le nombre des lettres (cf. 78.35n). Certains y voient une invitation à lire le sanglier du Nil  ; l''expression désignerait alors l''Egypte.'
  - type: text
    content: Le sanglier de la forêt y fouille,
  - type: text
    content: et ce qui se meut dans les champs en fait sa pâture.
  '15':
  - type: text
    content: Dieu des Armées, reviens, s'il te plaît !
  - type: text
    content: Regarde du ciel et vois !
  - type: text
    content: Interviens en faveur de cette vigne !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Protège  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire le jardin (ou la tige, la souche ) que ta main droite a planté(e). –  le fils…  : litt. sur le fils… , comme au v. 18. –  rendu fort  : autre traduction fait grandir.'
  - type: text
    content: Protège ce que ta main droite a planté,
  - type: text
    content: et le fils que tu as toi-même rendu fort !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Elle est incendiée…  : certains modifient légèrement le texte hébreu traditionnel pour lire Ils l''ont brûlée… ils l''ont coupée, qu''ils périssent… Au lieu de elle est coupée on pourrait comprendre comme des ordures (homonymie). –  rabroués par toi  : litt. par le rabrouement de ta face  ; cf. 9.6+.'
  - type: text
    content: Elle est incendiée, elle est coupée !
  - type: text
    content: Ils disparaissent, rabroués par toi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme qui est à ta droite  : cf. v. 16 ; 110.1. –  l''être humain  : litt. le fils d''homme  ; cf. 8.5 ; Dn 7.13ss.'
  - type: text
    content: Que ta main soit sur l'homme qui est à ta droite,
  - type: text
    content: sur l'être humain que tu as toi-même rendu fort !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jos 24.16-18 ; 2R 23.3. –  Nous ne nous déroberons…  : cf. 53.4n  ; autre traduction nous ne nous détournerons plus de toi . –  revivre ou vivre  ; cf. 71.20 ; 85.7 ; Os 6.2. –  nous invoquerons…  : autre traduction ton nom sera invoqué.'
  - type: text
    content: Nous ne nous déroberons plus à toi.
  - type: text
    content: Fais-nous revivre, et nous invoquerons ton nom.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'berger d''Israël 23.1+ ; 78.52 ; 121.4 ; Gn 48.15 ; 49.24 ; cf. Jn 10.4. –  Joseph  : cf. v. 3n  ; 77.16 ; 81.6+. –  comme un troupeau 77.21+. –  sur les keroubim  : cf. 18.11n  ; 68.5n  ; 99.1 ; 1S 4.4 ; 2S 6.2 ; 2R 19.15 ; Es 37.16 ; Jr 3.16ss. –  parais dans ta splendeur 50.2n.'
  - type: text
    content: Prête l'oreille, berger d'Israël,
  - type: text
    content: toi qui conduis Joseph comme un troupeau !
  - type: text
    content: Toi qui es assis sur les keroubim,
  - type: text
    content: parais dans ta splendeur !
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 4+.
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu des Armées, ramène-nous !'
  - type: text
    content: Fais briller ta face, que nous soyons sauvés !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ephraïm et Manassé sont présentés comme fils de Joseph (v. 2 ; cf. Gn 41.50-52 ; 48.1ss) et Benjamin comme son seul frère à part entière, fils de la même mère, Rachel (Gn 30.22-24 ; 35.16ss ; 49.23ss). Il s'agit donc ici de trois tribus étroitement liées. –  éveille… 35.23+.
  - type: text
    content: Devant Ephraïm, Benjamin et Manassé, éveille ta force,
  - type: text
    content: mets-toi en marche pour notre salut !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8,20. –  ramène-nous ! 85.5n  ; Jr 31.18. –  Fais briller ta face…  : cf. 4.7+ ; 31.17+ ; Nb 6.25.'
  - type: text
    content: O Dieu, ramène-nous !
  - type: text
    content: Fais briller ta face, que nous soyons sauvés !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''à quand 6.4+. –  t''irriteras-tu  : litt. fumeras-tu  ; cf. 74.1. –  contre la prière…  : autre traduction alors que ton peuple prie.'
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu des Armées,'
  - type: text
    content: jusqu'à quand t'irriteras-tu
  - type: text
    content: contre la prière de ton peuple ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'pain de larmes 42.4 ; 102.10. –  à pleine mesure  : litt. à la mesure d''un tiers (même terme, de valeur incertaine, en Es 40.12) ; certains comprennent ici à triple mesure.'
  - type: text
    content: Tu les nourris d'un pain de larmes,
  - type: text
    content: tu leur fais boire des larmes à pleine mesure.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '31.12+ ; 79.4 ; Lc 23.35. –  un objet de discorde  : certains modifient le texte hébreu traditionnel pour lire tu nous livres aux hochements de tête (moqueurs, ou horrifiés) de nos voisins. –  de nous  : d''après deux mss hébreux et plusieurs versions anciennes ; autre texte d''eux.'
  - type: text
    content: Tu fais de nous un objet de discorde pour nos voisins,
  - type: text
    content: et nos ennemis se moquent de nous.
  '8':
  - type: text
    content: ' '
  - type: note
    content: V. 4+.
  - type: text
    content: Dieu des Armées, ramène-nous !
  - type: text
    content: Fais briller ta face, que nous soyons sauvés !
  '9':
  - type: text
    content: ' '
  - type: note
    content: une vigne Es 5.1+ ; Jr 2.21 ; Os 10.1 ; Mc 12.1ss/ / ; Lc 13.6 ; Jn 15.1. –  tu as chassé… 44.3+. –  plantée Ex 15.17.
  - type: text
    content: Tu avais arraché de l'Egypte une vigne ;
  - type: text
    content: tu as chassé des nations et tu l'as plantée.
