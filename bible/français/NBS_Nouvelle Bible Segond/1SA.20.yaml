    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le temps fixé par David
    - type: usfm
