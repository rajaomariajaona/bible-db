      children:
      - type: text
        text: '  : ce geste est surprenant ; on a parfois pensé que c''était pour laisser passer Abner ; mais il est aussi possible qu''il y ait eu une erreur de copie, et que le texte original corresponde plutôt à ce qu''on lit dans '
