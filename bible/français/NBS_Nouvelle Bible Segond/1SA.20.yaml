    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Seigneur est pour toujours témoin entre moi et toi.
    marker-yv: yv-n
  - type: text
    text: 'Quant à la parole que nous nous sommes donnée, moi et toi, le '
  - type: usfm
    marker: nd
