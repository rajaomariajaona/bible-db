document_id: 1SA.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonathan conclut un pacte avec David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des Nayoth de Rama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 19.18. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour qu'il en veuille à ma vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour qu'il cherche ma vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 24.12 ; 26.18 ; Ps 35.7.
    marker-yv: yv-n
  - type: text
    text: 'David s''enfuit des Nayoth de Rama. Il alla trouver Jonathan et dit : Qu''ai-je fait ? Quelle est ma faute, quel est mon péché vis-à-vis de ton père, pour qu''il en veuille à ma vie ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jamais ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 2.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne fait jamais rien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne fait pas une grande chose ni une petite chose
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 22.15 ; Nb 22.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans m'en informer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et il ne découvre pas mon oreille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 9.15+.'
    marker-yv: yv-n
  - type: text
    text: 'Jonathan lui répondit : Jamais ! Tu ne mourras pas. Mon père ne fait jamais rien sans m''en informer ; pourquoi donc mon père me cacherait-il cela ? Il n''en est rien. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David fit encore ce serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''hébreu ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; comme le début du discours direct qui suit n''est pas un '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', on pourrait traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'David dit : Je te jure qu''il en est bien ainsi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: David répondit à Jonathan et dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''ai trouvé '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' à tes yeux'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 18.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la vie du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : formule de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: serment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 14.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par ta propre vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'un pas entre moi et la mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 27.1.'
    marker-yv: yv-n
  - type: text
    text: 'David fit encore ce serment : Ton père sait bien que j''ai trouvé grâce à tes yeux et il aura dit : « Que Jonathan ne le sache pas ; cela lui ferait de la peine. » Mais, par la vie du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et par ta propre vie, il n''y a qu''un pas entre moi et la mort !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Pr 17.17.
    marker-yv: yv-n
  - type: text
    text: 'Jonathan dit à David : Je ferai pour toi ce que tu voudras. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nouvelle lune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: néoménie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', coïncidait avec le début du mois en Israël ; elle était marquée par une célébration religieuse (cf. Nb 10.10 ; 28.11-15 ; Es 1.14) et par un repas de cérémonie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je me cacherai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du troisième jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : omis par LXX.'
    marker-yv: yv-n
  - type: text
    text: 'David lui répondit : Demain, c''est la nouvelle lune ; je devrais m''asseoir avec le roi pour manger ; mais laisse-moi partir, et je me cacherai dans la campagne jusqu''au soir du troisième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: remarque mon absence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: intervient à mon sujet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: m'a demandé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 28 ; Né 13.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aller rapidement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: courir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agit d''une tournure exprimant l''idée de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire un bref séjour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'quelque part. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.1 ; 17.58 ; Lc 2.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout le clan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toute la famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ' annuel'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 9.12 ; 16.5.'
    marker-yv: yv-n
  - type: text
    text: 'Si ton père remarque mon absence, tu diras : David m''a demandé instamment de le laisser aller rapidement à Beth-Léhem, sa ville, parce qu''il y a pour tout le clan un sacrifice annuel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est bon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : David suppose que Saül pourrait admettre l''explication, sans forcément l''approuver. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il a résolu le malheur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le malheur est achevé de sa part
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a décidé, irrévocablement, de me faire du mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 9,33.'
    marker-yv: yv-n
  - type: text
    text: 'S''il dit : « C''est bon ! », c''est que tout va bien pour moi, ton serviteur ; mais s''il se fâche, sache qu''il a résolu le malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu agiras ainsi avec fidélité envers moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même expression en 15.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une '
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : conclue devant YHWH ou garantie par YHWH ; cf. v. 16 ; 18.3 ; 23.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'il y a
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 14.32.'
    marker-yv: yv-n
  - type: text
    text: 'Tu agiras ainsi avec fidélité envers moi, puisque tu m''as fait entrer avec toi dans une alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Et s''il y a une faute en moi, mets-moi toi-même à mort : pourquoi me remettrais-tu à ton père ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jamais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: profanation à toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jonathan lui dit : Jamais ! Ne crois pas que je pourrais avoir connaissance d''un malheur résolu contre toi par mon père sans te le faire savoir ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui me le fera savoir ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David envisage le cas éventuel où Jonathan serait dans l'impossibilité de communiquer directement avec lui (présence inopinée de Saül, ou surveillance de Jonathan par des proches de Saül).
    marker-yv: yv-n
  - type: text
    text: 'David dit à Jonathan : Dans le cas où ton père te répondrait avec dureté, qui me le fera savoir ? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour fixer les modalités du stratagème. Cf. Gn 4.8.'
    marker-yv: yv-n
  - type: text
    text: 'Et Jonathan dit à David : Viens, sortons dans la campagne. Et ils sortirent tous deux dans la campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : formule de serment ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' précise '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que le Seigneur… soit témoin (que…) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Seigneur… sait (que…)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: demain ou après-demain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Syr '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: demain, à la troisième heure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains modifient le texte pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: demain, pour la troisième fois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; selon le texte hébreu traditionnel, que suit la traduction, on peut comprendre que, si Saül pose une question '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le lendemain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au sujet de l''absence de David, Jonathan en profitera pour tâter le terrain ; si Saül ne le fait pas, Jonathan attendra '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le surlendemain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: S'il est bien disposé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si la situation est favorable à David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et que je ne t'envoie… t'informer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'alors je ne t''enverrai personne pour t''informer '
    - type: usfm
      marker: ft
      children:
      - type: text
