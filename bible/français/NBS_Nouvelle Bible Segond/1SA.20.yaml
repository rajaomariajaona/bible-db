document_id: 1SA.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonathan conclut un pacte avec David
  - type: text
    content: ' '
  - type: note
    content: 'des Nayoth de Rama  : cf. 19.18. – Voir péché. –  pour qu''il en veuille à ma vie  : litt. pour qu''il cherche ma vie  ; cf. 24.12 ; 26.18 ; Ps 35.7.'
  - type: text
    content: 'David s''enfuit des Nayoth de Rama. Il alla trouver Jonathan et dit : Qu''ai-je fait ? Quelle est ma faute, quel est mon péché vis-à-vis de ton père, pour qu''il en veuille à ma vie ? '
  '10':
  - type: note
    content: qui me le fera savoir ? David envisage le cas éventuel où Jonathan serait dans l'impossibilité de communiquer directement avec lui (présence inopinée de Saül, ou surveillance de Jonathan par des proches de Saül).
  - type: text
    content: 'David dit à Jonathan : Dans le cas où ton père te répondrait avec dureté, qui me le fera savoir ? '
  '11':
  - type: note
    content: 'dans la campagne  : pour fixer les modalités du stratagème. Cf. Gn 4.8.'
  - type: text
    content: 'Et Jonathan dit à David : Viens, sortons dans la campagne. Et ils sortirent tous deux dans la campagne. '
  '12':
  - type: note
    content: 'Par le Seigneur  : formule de serment ; Syr précise que le Seigneur… soit témoin (que…) et LXX le Seigneur… sait (que…). –  demain ou après-demain  : Syr demain, à la troisième heure  ; certains modifient le texte pour lire demain, pour la troisième fois  ; selon le texte hébreu traditionnel, que suit la traduction, on peut comprendre que, si Saül pose une question le lendemain au sujet de l''absence de David, Jonathan en profitera pour tâter le terrain ; si Saül ne le fait pas, Jonathan attendra le surlendemain. –  S''il est bien disposé…  : autre traduction si la situation est favorable à David. –  et que je ne t''envoie… t''informer  : on peut aussi comprendre alors je ne t''enverrai personne pour t''informer (la phrase s''arrêterait ici).'
  - type: text
    content: 'Jonathan dit à David : Par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, je sonderai mon père demain ou après-demain à cette heure-ci. S''il est bien disposé envers David, et que je ne t''envoie personne pour t''informer, '
  '13':
  - type: note
    content: 'que le Seigneur fasse… cela  : cf. 3.17n. – Voir paix. –  que le Seigneur soit avec toi  : cf. 17.37+. –  avec mon père  : cf. 10.7.'
  - type: text
    content: 'que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse à Jonathan ceci et qu''il y ajoute cela ! S''il plaît à mon père de te faire du mal, je t''informerai aussi et je te laisserai partir, pour que tu t''en ailles en paix, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec toi, comme il a été avec mon père ! '
  '14':
  - type: note
    content: Dans le texte hébreu de ce v., on trouve deux fois une négation qui semble correspondre à l'exclamatif n'est-ce pas, et qui n'est généralement pas traduite en français. –  avec la fidélité du Seigneur, c.-à-d. avec une fidélité digne du Seigneur  ; LXX avec compassion. –  et je ne mourrai pas ou afin que je ne sois pas mis à mort.
  - type: text
    content: 'Tant que je vivrai, tu agiras envers moi avec la fidélité du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et je ne mourrai pas. '
  '15':
  - type: note
    content: 'de ma maison  : Jonathan demande à David d''agir avec bonté non seulement envers lui-même, à cause de l''alliance conclue (18.3), mais également envers ses descendants (cf. 24.22 ; 2S 9.1 ; 21.7) ; d''où la nouvelle formulation de l''alliance au v. 16.'
  - type: text
    content: 'Tu ne retrancheras jamais ta fidélité de ma maison, pas même lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' retranchera de la terre chacun des ennemis de David. '
  '16':
  - type: note
    content: 'avec la maison  : l''alliance de 18.3 concernait David et Jonathan à titre individuel ; le présent renouvellement inclut leurs familles respectives (la maison). –  fasse payer  : litt. recherche, c.-à-d. réclame (complément probablement sous-entendu  : le sang, cf. Ez 3.18) de la main des ennemis de David  ; peut-être le texte portait-il originellement de la main de David  ; il s''agirait alors d''une malédiction contre David et sa dynastie en cas d''élimination de la famille de Jonathan et de Saül ; cf. 25.22n,26,29 ; 2S 12.14n  ; 22.38-43 ; voir aussi 2S 16.3 ; 19.25-31 ; 21.7.'
  - type: text
    content: 'Jonathan conclut donc une alliance avec la maison de David – que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse payer les ennemis de David ! '
  '17':
  - type: note
    content: 'prêter serment  : dans le cadre du renouvellement de l''alliance mentionné au v. 16. –  car il l''aimait comme lui-même peut signifier car David aimait Jonathan… ou car Jonathan aimait David… La nuance est minime, l''accent étant de toute façon sur l''affection mutuelle que se portaient les deux amis.'
  - type: text
    content: Jonathan fit de nouveau prêter serment à David au nom de son affection pour lui, car il l'aimait comme lui-même.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5n.
  - type: text
    content: 'Jonathan lui dit : C''est demain la nouvelle lune ; on s''inquiétera de toi, car ta place sera vide. '
  '19':
  - type: note
    content: 'Le troisième jour  : cf. v. 5 ; on pourrait aussi comprendre pour la troisième fois. –  assez bas  : litt. beaucoup, qui pourrait aussi signifier très rapidement. –  le jour de l''affaire  : cf. 19.1-3. –  pierre d''Ezel  : lieu-dit non identifié.'
  - type: text
    content: 'Le troisième jour, tu descendras assez bas pour arriver au lieu où tu t''étais caché le jour de l''affaire, et tu resteras près de la pierre d''Ezel. '
  '2':
  - type: note
    content: 'Jamais ! cf. 2.30n. –  ne fait jamais rien  : litt. ne fait pas une grande chose ni une petite chose  ; cf. 22.15 ; Nb 22.18n. –  sans m''en informer  : litt. et il ne découvre pas mon oreille  ; cf. 9.15+.'
  - type: text
    content: 'Jonathan lui répondit : Jamais ! Tu ne mourras pas. Mon père ne fait jamais rien sans m''en informer ; pourquoi donc mon père me cacherait-il cela ? Il n''en est rien. '
  '20':
  - type: text
    content: 'Je tirerai trois flèches dans sa direction, comme si je visais une cible. '
  '21':
  - type: note
    content: 'le garçon  : le serviteur qui accompagne Jonathan, cf. v. 35. –  et je lui dirai  : sous-entendu dans le texte. –  prends-les  : d''après des versions anciennes ; le texte hébreu porte un singulier  : prends-la ou prends-le, qui pourrait être aussi interprété comme un ordre adressé à David  : rattrape-le (le garçon). –  par la vie du Seigneur  : cf. 14.39n.'
  - type: text
    content: 'Alors j''enverrai le garçon et je lui dirai : « Va chercher les flèches. » Si je lui dis : « Les flèches sont devant toi, prends-les ! », alors viens, tout va bien pour toi, il n''y a rien à craindre, par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '22':
  - type: text
    content: 'Mais si je dis au jeune homme : « Les flèches sont plus loin ! » alors va-t''en, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te fait partir. '
  '23':
  - type: note
    content: 'le Seigneur …  : litt. le Seigneur est entre moi et toi pour toujours. LXX le Seigneur est pour toujours témoin entre moi et toi.'
  - type: text
    content: 'Quant à la parole que nous nous sommes donnée, moi et toi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en est pour toujours le garant entre moi et toi !'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 5n. –  s''assit pour manger  : litt. s''assit près du pain pour manger  ; cf. v. 27,34.'
  - type: text
    content: David se cacha dans la campagne.
  - type: heading
    content: La haine de Saül contre David
  - type: text
    content: 'C''était la nouvelle lune, et le roi s''assit pour manger. '
  '25':
  - type: note
    content: 'Jonathan se leva  : ce geste est surprenant ; on a parfois pensé que c''était pour laisser passer Abner ; mais il est aussi possible qu''il y ait eu une erreur de copie, et que le texte original corresponde plutôt à ce qu''on lit dans LXX  : Jonathan s''assit en face (de Saül). –  Abner  : cf. 14.50n.'
  - type: text
    content: 'Le roi s''assit comme à l''ordinaire sur son siège, contre le mur ; Jonathan se leva, et Abner s''assit à côté de Saül ; mais la place de David resta vide. '
  '26':
  - type: note
    content: 'C''est par hasard  : cf. 6.9n  ; autre traduction c''est un accident ; il lui est arrivé quelque chose qui fait qu''il n''est pas pur. Le mot hébreu est celui qui désigne l’incident nocturne, c.-à-d. l''épanchement de sperme qui rend l''homme impur en Dt 23.11 (cf. Lv 15.16, autre terme). La formule peut ici faire allusion à cette même cause d''impureté rituelle, ou à une autre (Lv 7.20s ; 11–15) ; la supposition est en tout cas que David ne peut participer à un repas de fête requérant un état de pureté rituelle.'
  - type: text
    content: 'Saül ne dit rien ce jour-là ; il se disait : C''est par hasard, il n''est pas pur ; certainement il n''est pas pur. '
  '27':
  - type: note
    content: 'le fils de Jessé  : il s''agit de David, cf. chap. 16, mais cette façon de le désigner exprime le mépris de Saül à son égard ; cf. v. 30s. –  manger  : litt. du pain.'
  - type: text
    content: 'Le lendemain, deuxième jour de la nouvelle lune, la place de David resta encore vide. Et Saül dit à son fils Jonathan : Pourquoi le fils de Jessé n''est-il venu manger ni hier ni aujourd''hui ? '
  '28':
  - type: note
    content: Cf. v. 6.
  - type: text
    content: 'Jonathan répondit à Saül : David m''a demandé instamment de le laisser aller jusqu''à Beth-Léhem. '
  '29':
  - type: note
    content: 'Voir aussi v. 6. –  mon frère m''y a convoqué  : litt. mon frère me l''a ordonné  ; LXX mes frères… –  j''ai trouvé grâce à tes yeux  : cf. 16.22n.'
  - type: text
    content: 'Il a dit : « Laisse-moi partir, je te prie, car nous avons dans la ville un sacrifice de clan, et mon frère m''y a convoqué ; si donc j''ai trouvé grâce à tes yeux, permets que je m''échappe pour voir mes frères. » C''est pour cela qu''il n''est pas venu à la table du roi. '
  '3':
  - type: note
    content: 'David fit encore ce serment  : l''hébreu ajoute et dit  ; comme le début du discours direct qui suit n''est pas un serment, on pourrait traduire David dit : Je te jure qu''il en est bien ainsi  ; LXX a lu David répondit à Jonathan et dit. –  j''ai trouvé grâce à tes yeux  : cf. 16.22n  ; 18.1. –  par la vie du Seigneur  : formule de serment  ; cf. 14.39n. –  par ta propre vie  : cf. 1.26n. –  qu''un pas entre moi et la mort  : cf. 27.1.'
  - type: text
    content: 'David fit encore ce serment : Ton père sait bien que j''ai trouvé grâce à tes yeux et il aura dit : « Que Jonathan ne le sache pas ; cela lui ferait de la peine. » Mais, par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta propre vie, il n''y a qu''un pas entre moi et la mort !'
  '30':
  - type: note
    content: 'colère 11.6+ ; cf. Pr 19.12. –  Fils de perverse…  : litt. fils d''une perverse de rébellion  ; le propos injurieux de Saül vise en fait Jonathan lui-même.'
  - type: text
    content: 'Alors Saül se mit en colère contre Jonathan. Il lui dit : Fils de perverse, fils de rebelle, est-ce que je ne sais pas que tu as pris le parti du fils de Jessé, à ta honte et à la honte de la nudité de ta mère ? '
  '31':
  - type: note
    content: 'il n''y aura de sécurité ni pour toi ni pour ta royauté  : un ms de Qumrân dit tu n''affermiras pas ta royauté. –  il mérite la mort  : litt. c''est un fils de (la) mort  ; cf. 26.16 ; 2S 12.5.'
  - type: text
    content: 'Car aussi longtemps que le fils de Jessé sera vivant sur la terre, il n''y aura de sécurité ni pour toi ni pour ta royauté ; maintenant, envoie quelqu''un le chercher, amène-le-moi, car il mérite la mort ! '
  '32':
  - type: note
    content: Qu'a-t-il fait ? v. 1 ; 19.5 ; Mt 27.23 ; cf. Pr 31.8s.
  - type: text
    content: 'Jonathan répondit à Saül, son père : Pourquoi serait-il mis à mort ? Qu''a-t-il fait ? '
  '33':
  - type: note
    content: 'brandit sa lance  : cf. 18.11 ; 19.10. –  résolu v. 7n.'
  - type: text
    content: 'Saül brandit sa lance contre lui pour le frapper. Jonathan sut ainsi que son père avait résolu de faire mourir David. '
  '34':
  - type: note
    content: 'colère ardente  : cf. 11.6+. –  il avait de la peine  : cf. v. 3.'
  - type: text
    content: Jonathan se leva de table dans une colère ardente ; il ne mangea rien le deuxième jour de la nouvelle lune ; il avait de la peine à cause de David, parce que son père l'avait insulté.
  - type: heading
    content: Jonathan avertit David
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Le lendemain matin , c.-à-d. le troisième jour , cf. v. 5. –  pour le rendez-vous…  : autre traduction pour le temps fixé par David  ; cf. 9.24n. –  un jeune garçon  : autre traduction un jeune serviteur.'
  - type: text
    content: 'Le lendemain matin, Jonathan alla dans la campagne pour le rendez-vous qu''il avait avec David ; il était accompagné d''un jeune garçon. '
  '36':
  - type: note
    content: Voir v. 21s.
  - type: text
    content: 'Il lui dit : Cours chercher les flèches que je vais tirer, je te prie. Le garçon courut, et Jonathan tira une flèche qui le dépassa. '
  '37':
  - type: text
    content: 'Lorsque le garçon arriva au lieu où était la flèche que Jonathan avait tirée, Jonathan cria derrière lui : La flèche est plus loin ! '
  '38':
  - type: note
    content: Vite, dépêche-toi, ne t'arrête pas ! ce message s'adresse à David autant qu'au serviteur. –  son maître ou son seigneur.
  - type: text
    content: 'Il lui cria encore : Vite, dépêche-toi, ne t''arrête pas ! Le garçon de Jonathan ramassa les flèches et revint vers son maître. '
  '39':
  - type: note
    content: 'ne savait rien  : autres traductions ne comprenait rien ; n''était au courant de rien. –  de quoi il retournait  : litt. la parole ou l''affaire.'
  - type: text
    content: 'Le garçon ne savait rien ; seuls Jonathan et David savaient de quoi il retournait. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 17.17.
  - type: text
    content: 'Jonathan dit à David : Je ferai pour toi ce que tu voudras. '
  '40':
  - type: note
    content: 'qui était avec lui  : litt. qui (était) à lui.'
  - type: text
    content: 'Jonathan remit ses armes au garçon qui était avec lui et lui dit : Va, porte-les à la ville. '
  '41':
  - type: note
    content: 'Plusieurs éléments du texte hébreu de ce verset sont obscurs, et les versions, anciennes et modernes, devinent plus qu''elles ne traduisent. –  du côté du sud  : peut-être par rapport à la pierre d''Ezel, mentionnée au v. 19. –  se prosternant  : cf. Gn 33.3 ; 50.18. –  s''embrassèrent… pleurèrent  : cf. Gn 33.4 ; 45.14s ; Ac 20.37. –  jusqu''à… plus  : litt. jusqu''à ce que David fasse (plus) grand, ce qui a aussi été traduit par jusqu''à ce que David eût pris le dessus ou jusqu''à ce qu''il fût grand temps pour David ou simplement David surtout (cf. Vg).'
  - type: text
    content: 'Après le départ du garçon, David se leva, du côté du sud ; puis il tomba face contre terre, se prosternant par trois fois. David et Jonathan s''embrassèrent ; ils pleurèrent ensemble, jusqu''à ce que David en fît plus. '
  '42':
  - type: note
    content: 'Va en paix  : cf. 1.17. – Voir nom. –  entre moi et toi  : cf. v. 23. –  entre ma descendance et ta descendance  : cf. v. 16n  ; voir aussi Gn 3.15n.'
  - type: text
    content: 'Et Jonathan dit à David : Va en paix, maintenant que nous avons tous deux fait ce serment au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : « Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit entre moi et toi, entre ma descendance et ta descendance pour toujours ! »'
  '5':
  - type: note
    content: 'La nouvelle lune, ou néoménie, coïncidait avec le début du mois en Israël ; elle était marquée par une célébration religieuse (cf. Nb 10.10 ; 28.11-15 ; Es 1.14) et par un repas de cérémonie. –  je me cacherai  : cf. 19.2. –  du troisième jour  : omis par LXX.'
  - type: text
    content: 'David lui répondit : Demain, c''est la nouvelle lune ; je devrais m''asseoir avec le roi pour manger ; mais laisse-moi partir, et je me cacherai dans la campagne jusqu''au soir du troisième jour. '
  '6':
  - type: note
    content: 'remarque mon absence  : litt. intervient à mon sujet. –  m''a demandé…  : cf. v. 28 ; Né 13.6. –  aller rapidement  : litt. courir  ; il s''agit d''une tournure exprimant l''idée de faire un bref séjour quelque part. –  sa ville  : cf. 16.1 ; 17.58 ; Lc 2.4. –  tout le clan ou toute la famille. –  un sacrifice annuel  : cf. 1.21n  ; cf. 9.12 ; 16.5.'
  - type: text
    content: 'Si ton père remarque mon absence, tu diras : David m''a demandé instamment de le laisser aller rapidement à Beth-Léhem, sa ville, parce qu''il y a pour tout le clan un sacrifice annuel. '
  '7':
  - type: note
    content: 'C''est bon  : David suppose que Saül pourrait admettre l''explication, sans forcément l''approuver. –  il a résolu le malheur  : litt. le malheur est achevé de sa part  ; c.-à-d. il a décidé, irrévocablement, de me faire du mal  ; cf. v. 9,33.'
  - type: text
    content: 'S''il dit : « C''est bon ! », c''est que tout va bien pour moi, ton serviteur ; mais s''il se fâche, sache qu''il a résolu le malheur. '
  '8':
  - type: note
    content: 'Tu agiras ainsi avec fidélité envers moi  : même expression en 15.6. –  une alliance du Seigneur  : conclue devant YHWH ou garantie par YHWH ; cf. v. 16 ; 18.3 ; 23.18. –  s''il y a  : cf. 2S 14.32.'
  - type: text
    content: 'Tu agiras ainsi avec fidélité envers moi, puisque tu m''as fait entrer avec toi dans une alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Et s''il y a une faute en moi, mets-moi toi-même à mort : pourquoi me remettrais-tu à ton père ?'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Jamais  : litt. profanation à toi , cf. 2.30n.'
  - type: text
    content: 'Jonathan lui dit : Jamais ! Ne crois pas que je pourrais avoir connaissance d''un malheur résolu contre toi par mon père sans te le faire savoir ! '
