  - type: text
    text: ' fasse à Jonathan ceci et qu''il y ajoute cela ! S''il plaît à mon père de te faire du mal, je t''informerai aussi et je te laisserai partir, pour que tu t''en ailles en paix, et que le '
  - type: usfm
    marker: nd
    children:
    - type: text
