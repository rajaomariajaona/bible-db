      marker: ft
      children:
      - type: text
        text: . Le mot hébreu est celui qui désigne l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: incident nocturne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. l''épanchement de sperme qui rend l''homme impur en Dt 23.11 (cf. Lv 15.16, autre terme). La formule peut ici faire allusion à cette même cause d''impureté rituelle, ou à une autre (Lv 7.20s ; 11–15) ; la supposition est en tout cas que David ne peut participer à un repas de fête requérant un état de pureté rituelle.'
    marker-yv: yv-n
  - type: text
    text: 'Saül ne dit rien ce jour-là ; il se disait : C''est par hasard, il n''est pas pur ; certainement il n''est pas pur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le fils de Jessé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit de David, cf. chap. 16, mais cette façon de le désigner exprime le mépris de Saül à son égard ; cf. v. 30s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: manger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du pain.
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, deuxième jour de la nouvelle lune, la place de David resta encore vide. Et Saül dit à son fils Jonathan : Pourquoi le fils de Jessé n''est-il venu manger ni hier ni aujourd''hui ? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 6.
    marker-yv: yv-n
  - type: text
    text: 'Jonathan répondit à Saül : David m''a demandé instamment de le laisser aller jusqu''à Beth-Léhem. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir aussi v. 6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mon frère m'y a convoqué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon frère me l'a ordonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mes frères… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''ai trouvé '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' à tes yeux'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il a dit : « Laisse-moi partir, je te prie, car nous avons dans la ville un sacrifice de clan, et mon frère m''y a convoqué ; si donc j''ai trouvé grâce à tes yeux, permets que je m''échappe pour voir mes frères. » C''est pour cela qu''il n''est pas venu à la table du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'colère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.6+ ; cf. Pr 19.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de perverse…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fils d'une perverse de rébellion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le propos injurieux de Saül vise en fait Jonathan lui-même.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Saül se mit en colère contre Jonathan. Il lui dit : Fils de perverse, fils de rebelle, est-ce que je ne sais pas que tu as pris le parti du fils de Jessé, à ta honte et à la honte de la nudité de ta mère ? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il n'y aura de sécurité ni pour toi ni pour ta royauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' dit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu n'affermiras pas ta royauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il mérite la mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est un fils de (la) mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 26.16 ; 2S 12.5.'
    marker-yv: yv-n
  - type: text
    text: 'Car aussi longtemps que le fils de Jessé sera vivant sur la terre, il n''y aura de sécurité ni pour toi ni pour ta royauté ; maintenant, envoie quelqu''un le chercher, amène-le-moi, car il mérite la mort ! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''a-t-il fait ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1 ; 19.5 ; Mt 27.23 ; cf. Pr 31.8s.
    marker-yv: yv-n
  - type: text
    text: 'Jonathan répondit à Saül, son père : Pourquoi serait-il mis à mort ? Qu''a-t-il fait ? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: brandit sa lance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.11 ; 19.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'résolu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Saül brandit sa lance contre lui pour le frapper. Jonathan sut ainsi que son père avait résolu de faire mourir David. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: colère ardente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il avait de la peine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3.'
    marker-yv: yv-n
  - type: text
    text: Jonathan se leva de table dans une colère ardente ; il ne mangea rien le deuxième jour de la nouvelle lune ; il avait de la peine à cause de David, parce que son père l'avait insulté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonathan avertit David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le lendemain matin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le troisième jour
    - type: usfm
      marker: ft
      children:
      - type: text
