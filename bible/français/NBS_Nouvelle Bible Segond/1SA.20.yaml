      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un jeune garçon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un jeune serviteur.
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain matin, Jonathan alla dans la campagne pour le rendez-vous qu''il avait avec David ; il était accompagné d''un jeune garçon. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir v. 21s.
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit : Cours chercher les flèches que je vais tirer, je te prie. Le garçon courut, et Jonathan tira une flèche qui le dépassa. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Lorsque le garçon arriva au lieu où était la flèche que Jonathan avait tirée, Jonathan cria derrière lui : La flèche est plus loin ! '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vite, dépêche-toi, ne t''arrête pas ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ce message s''adresse à David autant qu''au serviteur. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'son maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son seigneur.
    marker-yv: yv-n
  - type: text
    text: 'Il lui cria encore : Vite, dépêche-toi, ne t''arrête pas ! Le garçon de Jonathan ramassa les flèches et revint vers son maître. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne savait rien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne comprenait rien ; n'était au courant de rien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de quoi il retournait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'affaire.
    marker-yv: yv-n
  - type: text
    text: 'Le garçon ne savait rien ; seuls Jonathan et David savaient de quoi il retournait. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui était avec lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui (était) à lui.
    marker-yv: yv-n
  - type: text
    text: 'Jonathan remit ses armes au garçon qui était avec lui et lui dit : Va, porte-les à la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs éléments du texte hébreu de ce verset sont obscurs, et les versions, anciennes et modernes, devinent plus qu''elles ne traduisent. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du côté du sud
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être par rapport à la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pierre d'Ezel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mentionnée au v. 19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se prosternant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 33.3 ; 50.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'embrassèrent… pleurèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 33.4 ; 45.14s ; Ac 20.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'à… plus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à ce que David fasse (plus) grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui a aussi été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jusqu''à ce que David eût pris le dessus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jusqu''à ce qu''il fût grand temps pour David '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou simplement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'David surtout '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Après le départ du garçon, David se leva, du côté du sud ; puis il tomba face contre terre, se prosternant par trois fois. David et Jonathan s''embrassèrent ; ils pleurèrent ensemble, jusqu''à ce que David en fît plus. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Va en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.17. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entre moi et toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entre ma descendance et ta descendance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Gn 3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Jonathan dit à David : Va en paix, maintenant que nous avons tous deux fait ce serment au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : « Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' soit entre moi et toi, entre ma descendance et ta descendance pour toujours ! »'
