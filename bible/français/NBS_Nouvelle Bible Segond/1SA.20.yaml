      - type: text
        text: fasse payer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: recherche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'réclame '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (complément probablement sous-entendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ez 3.18) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la main des ennemis de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; peut-être le texte portait-il originellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la main de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agirait alors d''une malédiction contre David et sa dynastie en cas d''élimination de la famille de Jonathan et de Saül ; cf. 25.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',26,29 ; 2S 12.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 22.38-43 ; voir aussi 2S 16.3 ; 19.25-31 ; 21.7.'
    marker-yv: yv-n
  - type: text
    text: 'Jonathan conclut donc une alliance avec la maison de David – que le '
  - type: usfm
    marker: nd
