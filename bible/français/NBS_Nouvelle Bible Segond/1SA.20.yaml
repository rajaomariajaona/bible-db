      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec la maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''alliance de 18.3 concernait David et Jonathan à titre individuel ; le présent renouvellement inclut leurs familles respectives ('
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison
    - type: usfm
      marker: ft
      children:
