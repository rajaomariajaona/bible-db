      - type: text
        text: 'car Jonathan aimait David… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La nuance est minime, l'accent étant de toute façon sur l'affection mutuelle que se portaient les deux amis.
    marker-yv: yv-n
  - type: text
