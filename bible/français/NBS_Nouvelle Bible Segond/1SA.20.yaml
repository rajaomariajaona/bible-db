  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans le texte hébreu de ce v., on trouve deux fois une négation qui semble correspondre à l''exclamatif '
