  - type: text
    text: 'Le troisième jour, tu descendras assez bas pour arriver au lieu où tu t''étais caché le jour de l''affaire, et tu resteras près de la pierre d''Ezel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je tirerai trois flèches dans sa direction, comme si je visais une cible. '
  - type: usfm
    marker: v
    metadata:
