        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors j''enverrai le garçon et je lui dirai : « Va chercher les flèches. » Si je lui dis : « Les flèches sont devant toi, prends-les ! », alors viens, tout va bien pour toi, il n''y a rien à craindre, par la vie du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais si je dis au jeune homme : « Les flèches sont plus loin ! » alors va-t''en, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' te fait partir. '
  - type: usfm
    marker: v
    metadata:
