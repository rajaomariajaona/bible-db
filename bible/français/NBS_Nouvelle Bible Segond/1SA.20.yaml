    marker-yv: yv-n
  - type: text
    text: 'Tant que je vivrai, tu agiras envers moi avec la fidélité du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et je ne mourrai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de ma maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Jonathan demande à David d''agir avec bonté non seulement envers lui-même, à cause de l''alliance conclue (18.3), mais également envers ses descendants (cf. 24.22 ; 2S 9.1 ; 21.7) ; d''où la nouvelle formulation de l''alliance au v. 16.'
    marker-yv: yv-n
  - type: text
    text: 'Tu ne retrancheras jamais ta fidélité de ma maison, pas même lorsque le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' retranchera de la terre chacun des ennemis de David. '
  - type: usfm
    marker: v
