document_id: REV.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux bêtes
  - type: text
    content: ' '
  - type: note
    content: 'de la mer une bête  : cf. 11.7+ ; Es 27.1 ; Dn 7.3 ; la mer est aussi l''Occident, le côté de Rome. –  dix cornes / sept têtes 12.3 ; 17.3,7,9,12,16 ; cf. Dn 7.7s,24. –  des noms  : certains mss portent un nom . –  blasphématoires  : litt. de blasphème , de même 17.3 ; on voit souvent là une allusion à la religion de l''Empire romain, et en particulier au culte de l''empereur.'
  - type: text
    content: 'Alors je vis monter de la mer une bête qui avait dix cornes et sept têtes ; sur ses cornes, dix diadèmes, sur ses têtes des noms blasphématoires. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'doit aller en captivité  : litt. (est) pour la captivité  ; certains mss portent conduit (les autres) en captivité  ; voir cependant Jr 15.2 ; 43.11. –  doit être tué par l''épée  : certains mss portent tue par l''épée , cf. Mt 26.52. –  persévérance… 1.9+ ; 14.12 ; cf. Lc 8.15. –  foi ou fidélité , cf. 2.19n.'
  - type: text
    content: Si quelqu'un doit aller en captivité, il ira en captivité ;
  - type: text
    content: si quelqu'un doit être tué par l'épée, il sera tué par l'épée.
  - type: text
    content: C'est ici la persévérance et la foi des saints.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'de la terre  : il faut peut-être comprendre de l''Orient , par opposition au v. 1n  ; le culte impérial était particulièrement développé en Asie Mineure (v. 15n  ; 2.13n  ; 17.10n). –  une autre bête  : d''après sa description, elle est sans doute à identifier au prophète de mensonge mentionné en 16.13 ; 19.20 ; 20.10. –  deux cornes  : cf. Dn 8.3. –  agneau  : cf. 5.6+ ; Mt 7.15. –  dragon 12.3+.'
  - type: text
    content: 'Alors je vis monter de la terre une autre bête. Elle avait deux cornes semblables à celles d''un agneau, et elle parlait comme un dragon. '
  '12':
  - type: note
    content: V. 1-7.
  - type: text
    content: 'Elle exerce tout le pouvoir de la première bête devant elle, et elle fait que la terre et ses habitants se prosternent devant la première bête, dont la blessure mortelle a été guérie. '
  '13':
  - type: note
    content: 'signes 16.14 ; 19.20 ; Dt 13.2-4 ; Mt 24.24 ; 2Th 2.9. –  feu du ciel  : cf. 1R 18.24-39 ; Lc 9.54.'
  - type: text
    content: 'Elle produit de grands signes, jusqu''à faire descendre le feu du ciel sur la terre, à la vue des humains. '
  '14':
  - type: note
    content: 'égare 12.9+. –  habitants de la terre 3.10+. –  une image v. 15+. –  qui a repris vie  : cf. 2.8n.'
  - type: text
    content: Elle égare les habitants de la terre par les signes qu'il lui a été donné de produire devant la bête, en disant aux habitants de la terre de faire une image de la bête qui a été blessée par l'épée et qui a repris vie.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'animer  : litt. donner le souffle ou l''esprit à  ; sur le culte de l''image de la bête , allusion possible au culte impérial (cf. 2.13n), voir 13.4 ; 14.9,11 ; 15.2 ; 16.2 ; 19.20 ; 20.4 ; cf. Dn 3.5-7,15.'
  - type: text
    content: 'Il lui fut donné d''animer l''image de la bête, pour que l''image de la bête parle et fasse tuer tous ceux qui ne se prosterneraient pas devant l''image de la bête. '
  '16':
  - type: note
    content: 'à tous…  : cf. 6.15+ ; 19.18. –  marque  : voir v. 15+. –  sur la main  : cf. Es 44.5. –  sur le front  : cf. 14.1 ; Ex 28.36.'
  - type: text
    content: 'Elle fait qu''on impose à tous, petits et grands, riches et pauvres, hommes libres et esclaves, une marque sur la main droite ou sur le front, '
  '17':
  - type: note
    content: 'le chiffre de son nom  : les lettres hébraïques et grecques ont une valeur numérique ; voir v. 18n  ; 15.2 ; voir aussi midrash.'
  - type: text
    content: et que personne ne puisse acheter ni vendre sans avoir la marque, le nom de la bête ou le chiffre de son nom.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sagesse 17.9. –  un chiffre humain  : autre traduction le chiffre d''un humain . –  six cent soixante-six (nombre « triangulaire », somme des nombres de 1 à 36 ; voir Jn 21.11n  ; Ac 27.37n) ; certains mss portent 616  ; cf. 1R 10.14 ; Esd 2.13 ; le chiffre 6 (7-1) évoque habituellement l''imperfection ; 666 est la somme des valeurs numériques des lettres de « César Néron » (54-68 apr. J.-C.) en hébreu, 616 de « César Dieu » en grec. Certains, transposant 666 en lettres-chiffres hébraïques, y lisent le nom de l''empereur Trajan (98-117 apr. J.-C.), également persécuteur ; d''autres interprétations encore ont été proposées.'
  - type: text
    content: 'C''est ici qu''intervient la sagesse. Que celui qui a de l''intelligence calcule le chiffre de la bête. Car c''est un chiffre humain : son chiffre est six cent soixante-six.'
  '2':
  - type: note
    content: 'léopard / ours / lion  : cf. Os 13.7s ; Dn 7.4-6. –  sa puissance 2Th 2.8ss. –  son trône 2.13n  ; 16.10.'
  - type: text
    content: 'La bête que je vis était semblable à un léopard, ses pattes étaient comme celles d''un ours et sa bouche comme la bouche d''un lion. Le dragon lui donna sa puissance, son trône et un grand pouvoir. '
  '3':
  - type: note
    content: 'égorgée  : litt. égorgée à mort  ; le même verbe est traduit par immoler en 5.6n  ; cf. Mt 24.24/ /. –  guérie v. 12 ; cf. v. 14 ; 17.8n. –  Etonnée…  : litt. toute la terre s''étonna derrière la bête  ; cf. 15.1,3 ; 17.8.'
  - type: text
    content: L'une de ses têtes était comme égorgée, mais sa blessure mortelle fut guérie.
  - type: text
    content: 'Etonnée, toute la terre suivit la bête. '
  '4':
  - type: note
    content: 'On se prosterna ou ils se prosternèrent v. 15+ ; voir culte. –  Qui est semblable…  : cf. 12.7n  ; 18.18 ; Ex 15.11 ; Ps 89.7.'
  - type: text
    content: 'On se prosterna devant le dragon, parce qu''il avait donné le pouvoir à la bête ; on se prosterna devant la bête, en disant : Qui est semblable à la bête et qui peut lui faire la guerre ?'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'qui proférait des paroles arrogantes  : litt. disant de grandes choses , cf. Dn 7.8,11,20,25 ; 11.27. –  d''agir  : litt. de faire . –  quarante-deux mois 11.2+.'
  - type: text
    content: 'Il lui fut donné une bouche qui proférait des paroles arrogantes et des blasphèmes, et il lui fut donné le pouvoir d''agir pendant quarante-deux mois. '
  '6':
  - type: note
    content: 'Cf. Dn 7.25 ; 11.36. –  pour calomnier ou pour blasphémer, cf. 2.9n  ; Jd 8n. –  demeure / qui ont leur demeure  : voir 7.15n  ; 12.12+ ; 21.3. Autre traduction possible, surtout d''après certains mss qui portent un et de plus  : son nom, sa demeure et ceux qui l''habitent, au ciel.'
  - type: text
    content: 'Elle ouvrit sa bouche pour proférer des blasphèmes contre Dieu, pour calomnier son nom et sa demeure, ceux qui ont leur demeure au ciel. '
  '7':
  - type: note
    content: 'faire la guerre 2.16+ ; cf. Dn 7.21. –  aux saints  : cf. Rm 1.7. –  pouvoir 2.26n  ; Dn 7.6. –  toute tribu… 5.9+.'
  - type: text
    content: 'Il lui fut donné de faire la guerre aux saints et de les vaincre. Il lui fut donné pouvoir sur toute tribu, tout peuple, toute langue et toute nation. '
  '8':
  - type: note
    content: 'les habitants de la terre 3.10+. –  ceux dont le nom… 3.5+. –  agneau immolé 5.6n. –  depuis la fondation du monde  : cette précision se rattache vraisemblablement au verbe traduit par n''a pas été inscrit (17.8 ; Mt 25.34 ; Ep 1.4s) ; certains la rapportent cependant à immolé (cf. 1P 1.19s). –  se prosterneront v. 4,12,15+.'
  - type: text
    content: Tous les habitants de la terre, ceux dont le nom n'a pas été inscrit sur le livre de la vie de l'agneau immolé depuis la fondation du monde, se prosterneront devant elle.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2.7+.
  - type: text
    content: Si quelqu'un a des oreilles, qu'il entende !
