      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est aussi l''Occident, le côté de Rome. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dix cornes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept têtes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.3 ; 17.3,7,9,12,16 ; cf. Dn 7.7s,24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: blasphématoires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de blasphème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même 17.3 ; on voit souvent là une allusion à la religion de l''Empire romain, et en particulier au culte de l''empereur.'
      marker-yv: yv-n
    - type: text
      text: 'Alors je vis monter de la mer une bête qui avait dix cornes et sept têtes ; sur ses cornes, dix diadèmes, sur ses têtes des noms blasphématoires. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
