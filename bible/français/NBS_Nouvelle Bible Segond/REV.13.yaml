      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (est) pour la captivité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: conduit (les autres) en captivité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; voir cependant Jr 15.2 ; 43.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: doit être tué par l'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tue par l'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Mt 26.52. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'persévérance… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.9+ ; 14.12 ; cf. Lc 8.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fidélité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Si quelqu'un doit aller en captivité, il ira en captivité ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si quelqu'un doit être tué par l'épée, il sera tué par l'épée.
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est ici la persévérance et la foi des saints.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il faut peut-être comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Orient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', par opposition au v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le culte impérial était particulièrement développé en Asie Mineure (v. 15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une autre bête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après sa description, elle est sans doute à identifier au '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prophète de mensonge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mentionné en 16.13 ; 19.20 ; 20.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux cornes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dn 8.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agneau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.6+ ; Mt 7.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dragon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.3+.
      marker-yv: yv-n
    - type: text
      text: 'Alors je vis monter de la terre une autre bête. Elle avait deux cornes semblables à celles d''un agneau, et elle parlait comme un dragon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 1-7.
      marker-yv: yv-n
    - type: text
      text: 'Elle exerce tout le pouvoir de la première bête devant elle, et elle fait que la terre et ses habitants se prosternent devant la première bête, dont la blessure mortelle a été guérie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'signes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.14 ; 19.20 ; Dt 13.2-4 ; Mt 24.24 ; 2Th 2.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: feu du ciel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 18.24-39 ; Lc 9.54.'
      marker-yv: yv-n
    - type: text
      text: 'Elle produit de grands signes, jusqu''à faire descendre le feu du ciel sur la terre, à la vue des humains. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'égare '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'habitants de la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une image '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui a repris vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Elle égare les habitants de la terre par les signes qu'il lui a été donné de produire devant la bête, en disant aux habitants de la terre de faire une image de la bête qui a été blessée par l'épée et qui a repris vie.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: animer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donner le souffle ou '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'esprit
        - type: text
          text: ' à'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; sur le culte de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'image de la bête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', allusion possible au culte impérial (cf. 2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), voir 13.4 ; 14.9,11 ; 15.2 ; 16.2 ; 19.20 ; 20.4 ; cf. Dn 3.5-7,15.
      marker-yv: yv-n
    - type: text
      text: 'Il lui fut donné d''animer l''image de la bête, pour que l''image de la bête parle et fasse tuer tous ceux qui ne se prosterneraient pas devant l''image de la bête. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à tous…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.15+ ; 19.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: marque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir v. 15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 44.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le front
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.1 ; Ex 28.36.'
      marker-yv: yv-n
    - type: text
      text: 'Elle fait qu''on impose à tous, petits et grands, riches et pauvres, hommes libres et esclaves, une marque sur la main droite ou sur le front, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le chiffre de son nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les lettres hébraïques et grecques ont une valeur numérique ; voir v. 18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.2 ; voir aussi '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: midrash
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: et que personne ne puisse acheter ni vendre sans avoir la marque, le nom de la bête ou le chiffre de son nom.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un chiffre humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le chiffre d'un humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'six cent soixante-six '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (nombre « triangulaire », somme des nombres de 1 à 36 ; voir Jn 21.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 27.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '616'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1R 10.14 ; Esd 2.13 ; le chiffre 6 (7-1) évoque habituellement l'imperfection ; 666 est la somme des valeurs numériques des lettres de « César Néron » (54-68 apr. J.-C.) en hébreu, 616 de « César Dieu » en grec. Certains, transposant 666 en lettres-chiffres hébraïques, y lisent le nom de l'empereur Trajan (98-117 apr. J.-C.), également persécuteur ; d'autres interprétations encore ont été proposées.
      marker-yv: yv-n
    - type: text
      text: 'C''est ici qu''intervient la sagesse. Que celui qui a de l''intelligence calcule le chiffre de la bête. Car c''est un chiffre humain : son chiffre est six cent soixante-six.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'léopard '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
