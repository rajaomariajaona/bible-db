        - type: text
          text: '  : cf. Os 13.7s ; Dn 7.4-6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa puissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Th 2.8ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son trône '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.10.'
      marker-yv: yv-n
    - type: text
      text: 'La bête que je vis était semblable à un léopard, ses pattes étaient comme celles d''un ours et sa bouche comme la bouche d''un lion. Le dragon lui donna sa puissance, son trône et un grand pouvoir. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: égorgée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: égorgée à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'immoler '
      - type: usfm
