    marker-yv: yv-n
  - type: text
    text: 'Joseph monta ensevelir son père. Avec lui montèrent tous les gens de la cour du pharaon, les anciens de sa maison, tous les anciens de l''Egypte, '
  - type: usfm
    marker: vlbl
