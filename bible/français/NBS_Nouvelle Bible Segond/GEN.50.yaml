  - type: text
    text: 'Quand les jours des pleurs furent passés, Joseph dit aux gens de la maison du pharaon : Si j''ai trouvé grâce à vos yeux, dites ceci au pharaon, je vous prie : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: creusé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tranché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains donnent ici au verbe son sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'conclure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir 15.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') et traduisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que j'ai acquis par contrat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . – Comparer 33.19 avec 47.29ss ; 49.29-32 ; 50.13 ; Ac 7.16.
    marker-yv: yv-n
  - type: text
    text: '« Mon père m''a fait prêter serment, en disant : “Je vais mourir. Tu m''enseveliras dans le tombeau que j''ai creusé en Canaan.” Maintenant, je te prie, laisse-moi monter ensevelir mon père ; après quoi je reviendrai. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le pharaon répondit : Monte ensevelir ton père, comme il te l''a fait jurer.'
- type: usfm
