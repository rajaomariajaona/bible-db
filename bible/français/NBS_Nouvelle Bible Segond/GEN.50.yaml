    marker-yv: yv-n
  - type: text
    text: '« Vous parlerez ainsi à Joseph : “S''il te plaît, pardonne la transgression de tes frères et leur péché, car ils t''ont fait du mal ! Je t''en prie, pardonne maintenant la transgression des serviteurs du Dieu de ton père !” » Joseph se mit à pleurer quand on lui dit cela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 37.10+.
    marker-yv: yv-n
  - type: text
    text: 'Ses frères eux-mêmes vinrent ; ils tombèrent à ses pieds et dirent : Nous sommes tes serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joseph leur dit : N''ayez pas peur : suis-je à la place de Dieu ? '
