  - type: text
    text: 'Arrivés à l''aire d''Atad, qui est au-delà du Jourdain, ils firent une grande lamentation ; Joseph fit pour son père un deuil de sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lourd
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abel-Mitsraïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce nom, qui pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prairie de l''Egypte, pâturage de l''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou peut-être '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cours d''eau de l''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
