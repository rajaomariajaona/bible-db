  - type: text
    text: 'Joseph tomba sur le visage de son père et se mit à pleurer sur lui en l''embrassant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis Joseph ordonna à ses médecins d''embaumer son père ; les médecins embaumèrent donc Israël. '
