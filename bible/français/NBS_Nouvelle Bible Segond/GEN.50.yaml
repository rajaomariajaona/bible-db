      - type: text
        text: ils firent dire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils donnèrent des ordres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même verbe dans la suite).
    marker-yv: yv-n
  - type: text
    text: 'Alors ils firent dire à Joseph : Ton père a donné cet ordre avant de mourir : '
  - type: usfm
    marker: vlbl
