        text: '50.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toute la maison de son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
