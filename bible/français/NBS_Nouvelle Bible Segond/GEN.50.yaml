      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 20.15 ; 2Ch 16.4), est ici interprété au sens de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Deuil de l'Egypte.
    marker-yv: yv-n
  - type: text
    text: 'Les habitants du pays, les Cananéens, virent ce deuil sur l''aire d''Atad et ils dirent : C''est un grand deuil pour l''Egypte ! C''est pourquoi on a appelé du nom d''Abel-Mitsraïm (« Deuil de l''Egypte ») cet endroit qui est au-delà du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses fils firent pour lui ainsi qu'il leur avait ordonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 49.29.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Jacob firent ainsi pour leur père ce qu''il leur avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 5+.
    marker-yv: yv-n
  - type: text
    text: 'Ses fils le transportèrent en Canaan et l''ensevelirent dans la grotte du champ de Makpéla, le champ qu''Abraham avait acheté comme propriété funéraire à Ephrôn, le Hittite, près de Mamré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Joseph, après avoir enseveli son père, retourna en Egypte avec ses frères et tous ceux qui étaient montés avec lui ensevelir son père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fin de la vie de Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
