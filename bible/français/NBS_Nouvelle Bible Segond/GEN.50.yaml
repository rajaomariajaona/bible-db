      children:
      - type: text
        text: '50.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 1.6.
    marker-yv: yv-n
  - type: text
    text: 'Quand les frères de Joseph virent que leur père était mort, ils dirent : Et si Joseph devenait notre adversaire et nous rendait tout le mal que nous lui avons fait ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.16 '
    - type: usfm
      marker: fq
