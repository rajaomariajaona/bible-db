document_id: GEN.50,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Funérailles de Jacob
  - type: text
    content: ' '
  - type: note
    content: 46.4.
  - type: text
    content: 'Joseph tomba sur le visage de son père et se mit à pleurer sur lui en l''embrassant. '
  '10':
  - type: note
    content: 'au-delà du Jourdain  ; sans autre précision, cette expression désigne habituellement la Transjordanie, c.-à-d. la région située à l''est du Jourdain (Nb 22.1n), mais ce n''est pas toujours le cas (Nb 32.19n  ; Dt 3.20,25 ; 11.30 ; Jos 5.1 ; 9.1 ; 12.7 ; 22.7 ; voir aussi Jg 7.25n  ; 1Ch 26.30n  ; Es 8.23n  ; Mt 4.15n  ; Mc 10.1n/ /) ; le terme Cananéens (v. 11) s''applique généralement aux habitants de la région située à l''ouest du Jourdain. –  Joseph…  : litt. il fit… –  sept jours 1S 31.13.'
  - type: text
    content: 'Arrivés à l''aire d''Atad, qui est au-delà du Jourdain, ils firent une grande lamentation ; Joseph fit pour son père un deuil de sept jours. '
  '11':
  - type: note
    content: 'grand  : litt. lourd. –  Abel-Mitsraïm  : ce nom, qui pourrait signifier prairie de l''Egypte, pâturage de l''Egypte ou peut-être cours d''eau de l''Egypte (cf. les noms comparables en Nb 33.49 ; Jg 11.33 ; 1S 6.18n  ; 2S 20.15 ; 2Ch 16.4), est ici interprété au sens de Deuil de l''Egypte.'
  - type: text
    content: 'Les habitants du pays, les Cananéens, virent ce deuil sur l''aire d''Atad et ils dirent : C''est un grand deuil pour l''Egypte ! C''est pourquoi on a appelé du nom d''Abel-Mitsraïm (« Deuil de l''Egypte ») cet endroit qui est au-delà du Jourdain. '
  '12':
  - type: note
    content: Litt. ses fils firent pour lui ainsi qu'il leur avait ordonné  ; cf. 49.29.
  - type: text
    content: 'Les fils de Jacob firent ainsi pour leur père ce qu''il leur avait ordonné. '
  '13':
  - type: note
    content: Cf. v. 5+.
  - type: text
    content: 'Ses fils le transportèrent en Canaan et l''ensevelirent dans la grotte du champ de Makpéla, le champ qu''Abraham avait acheté comme propriété funéraire à Ephrôn, le Hittite, près de Mamré. '
  '14':
  - type: text
    content: Joseph, après avoir enseveli son père, retourna en Egypte avec ses frères et tous ceux qui étaient montés avec lui ensevelir son père.
  - type: heading
    content: Fin de la vie de Joseph
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 1.6.
  - type: text
    content: 'Quand les frères de Joseph virent que leur père était mort, ils dirent : Et si Joseph devenait notre adversaire et nous rendait tout le mal que nous lui avons fait ! '
  '16':
  - type: note
    content: 'ils firent dire  : litt. ils donnèrent des ordres (même verbe dans la suite).'
  - type: text
    content: 'Alors ils firent dire à Joseph : Ton père a donné cet ordre avant de mourir : '
  '17':
  - type: note
    content: 'pardonne  : litt. lève ou enlève, 4.7n. On pourrait aussi traduire charge-toi de la transgression…, comme en Ex 10.17n  ; cf. Lc 17.3. –  transgression / péché 31.36n. –  pleurer 42.24+.'
  - type: text
    content: '« Vous parlerez ainsi à Joseph : “S''il te plaît, pardonne la transgression de tes frères et leur péché, car ils t''ont fait du mal ! Je t''en prie, pardonne maintenant la transgression des serviteurs du Dieu de ton père !” » Joseph se mit à pleurer quand on lui dit cela. '
  '18':
  - type: note
    content: 37.10+.
  - type: text
    content: 'Ses frères eux-mêmes vinrent ; ils tombèrent à ses pieds et dirent : Nous sommes tes serviteurs. '
  '19':
  - type: text
    content: 'Joseph leur dit : N''ayez pas peur : suis-je à la place de Dieu ? '
  '2':
  - type: text
    content: 'Puis Joseph ordonna à ses médecins d''embaumer son père ; les médecins embaumèrent donc Israël. '
  '20':
  - type: note
    content: 'Le mal… bien  : litt. vous avez pensé (ou compté, cf. 15.6n) le mal contre moi, Dieu l''a pensé (ou compté) en bien  ; cf. 44.4 ; 45.5 ; Né 6.2n  ; Rm 12.17-21 ; 1Th 5.15 ; voir aussi Pr 16.1 ; 19.21 ; Rm 8.28.'
  - type: text
    content: 'Le mal que vous comptiez me faire, Dieu comptait en faire du bien, afin de faire ce qui arrive en ce jour, pour sauver la vie d''un peuple nombreux. '
  '21':
  - type: note
    content: familles ou enfants, cf. 34.29n. –  parla à leur cœur 34.3n.
  - type: text
    content: N'ayez donc pas peur maintenant ; je vais pourvoir à tous vos besoins et à ceux de toutes vos familles. Il les consola et parla à leur cœur.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'toute la maison de son père  : litt. la maison de son père  ; autre traduction sa famille . – La littérature égyptienne fournit plusieurs exemples de sages morts à cent dix ans.'
  - type: text
    content: 'Joseph habita en Egypte, lui et toute la maison de son père. Il vécut cent dix ans. '
  '23':
  - type: note
    content: 'Ephraïm / Manassé 41.51s ; 48.13-20. –  Makir  : le nom pourrait signifier vendu ou marchand, cf. 37.28 ; 45.4 ; voir aussi 30.18n  ; Nb 26.29 ; 32.39s ; 36.1 ; Dt 3.15 ; Jos 13.31 ; 17.1 ; Jg 5.14ns ; 1Ch 2.21ss ; 7.14ss. –  sur les genoux de Joseph 30.3n  ; 48.12n-20 ; cf. Jb 3.12 ; Rt 4.16n.'
  - type: text
    content: 'Joseph vit les fils d''Ephraïm jusqu''à la troisième génération ; les fils de Makir, fils de Manassé, naquirent sur les genoux de Joseph. '
  '24':
  - type: note
    content: '12.7+ ; 15.18 ; 26.3 ; 28.13 ; Ex 6.8+ ; Hé 11.22. –  interviendra…  : autre traduction s''occupera de vous, cf. Jr 6.15n.'
  - type: text
    content: 'Joseph dit à ses frères : Je vais mourir. Mais Dieu interviendra en votre faveur ; il vous fera monter de ce pays-ci vers le pays qu''il a promis par serment à Abraham, à Isaac et à Jacob. '
  '25':
  - type: note
    content: 'Cf. 47.29 ; Ex 13.19 ; Jos 24.32. –  vous emporterez  : litt. vous ferez monter.'
  - type: text
    content: 'Joseph fit prêter serment aux fils d''Israël, en disant : Quand Dieu interviendra en votre faveur, vous emporterez d''ici mes ossements.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'cercueil (allusion aux sarcophages égyptiens ?) : le mot hébreu désigne un coffre, et spécialement le coffre sacré ou arche de l''alliance (Ex 25.10n).'
  - type: text
    content: Joseph mourut à l'âge de cent dix ans. On l'embauma et on le mit dans un cercueil en Egypte.
  '3':
  - type: note
    content: 'Les Egyptiens  : autre traduction l''Egypte.'
  - type: text
    content: Cela prit quarante jours pleins, le temps requis pour l'embaumement. Les Egyptiens le pleurèrent pendant soixante-dix jours.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Si j''ai trouvé grâce…  : cf. 18.3+. –  au pharaon  : litt. aux oreilles du pharaon.'
  - type: text
    content: 'Quand les jours des pleurs furent passés, Joseph dit aux gens de la maison du pharaon : Si j''ai trouvé grâce à vos yeux, dites ceci au pharaon, je vous prie : '
  '5':
  - type: note
    content: 'creusé  : litt. tranché  : certains donnent ici au verbe son sens de conclure (une alliance, voir 15.18n) et traduisent que j''ai acquis par contrat. – Comparer 33.19 avec 47.29ss ; 49.29-32 ; 50.13 ; Ac 7.16.'
  - type: text
    content: '« Mon père m''a fait prêter serment, en disant : “Je vais mourir. Tu m''enseveliras dans le tombeau que j''ai creusé en Canaan.” Maintenant, je te prie, laisse-moi monter ensevelir mon père ; après quoi je reviendrai. » '
  '6':
  - type: text
    content: 'Le pharaon répondit : Monte ensevelir ton père, comme il te l''a fait jurer.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'monta / montèrent  : cf. 12.10n.'
  - type: text
    content: 'Joseph monta ensevelir son père. Avec lui montèrent tous les gens de la cour du pharaon, les anciens de sa maison, tous les anciens de l''Egypte, '
  '8':
  - type: note
    content: 'toute la maison de son père  : litt. la maison de son père  ; autre traduction toute sa famille. –  Goshen 45.10+. –  bétail 46.32 ; cf. Ex 10.9.'
  - type: text
    content: 'toute la maison de Joseph, ses frères et toute la maison de son père : ceux-ci ne laissèrent au pays de Goshen que leurs familles, avec leur petit bétail et leur gros bétail. '
  '9':
  - type: note
    content: 'attelages  : autre traduction équipages. –  cortège  : le mot correspondant est habituellement traduit par camp ou troupe.'
  - type: text
    content: 'Avec lui, des chars montèrent aussi avec leurs attelages : le cortège était très important. '
