document_id: REV.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La femme et le dragon
  - type: text
    content: ' '
  - type: note
    content: 'signe / ciel v. 3 ; 15.1. –  une femme  : cf. Gn 3.15 ; Es 54 ; 60 ; Os 2.21ss. –  vêtue du soleil…  : cf. Ps 104.2 ; Ct 6.10 ; voir aussi Gn 37.9.'
  - type: text
    content: 'Un grand signe apparut dans le ciel : une femme vêtue du soleil, qui avait la lune sous ses pieds et une couronne de douze étoiles sur sa tête. '
  '10':
  - type: note
    content: '4.11+ ; cf. 11.15. –  pouvoir / Christ 2.26n  ; Mt 28.18 ; voir onction. –  accusateur  : cf. Za 3.1s ; Jb 1.9ss ; 2.4ss ; Rm 8.31-34.'
  - type: text
    content: 'Alors j''entendis dans le ciel une voix forte qui disait :'
  - type: text
    content: Maintenant sont arrivés le salut, la puissance,
  - type: text
    content: le règne de notre Dieu
  - type: text
    content: et le pouvoir de son Christ.
  - type: text
    content: Car il a été jeté à bas, l'accusateur de nos frères,
  - type: text
    content: celui qui les accusait devant notre Dieu jour et nuit.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ils l''ont vaincu Rm 8.37 ; 1Jn 2.14 ; 5.4s. –  sang de l''agneau 7.14. –  parole / témoignage 1.2+. –  aimé leur vie (le mot est quelquefois traduit par âme , cf. 6.9n  ; Mt 10.28n) Mt 16.25/ / ; Jn 12.25 ; Ac 20.24n. –  même face à la mort  : litt. jusqu''à la mort  ; d''autres comprennent ils n''ont pas aimé leur vie au point de craindre la mort.'
  - type: text
    content: Mais eux, ils l'ont vaincu à cause du sang de l'agneau
  - type: text
    content: et à cause de la parole de leur témoignage ;
  - type: text
    content: ils n'ont pas aimé leur vie, même face à la mort.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'soyez en fête, cieux 18.20 ; Dt 32.43n  ; Es 44.23 ; 49.13 ; Jr 51.48 ; Ps 96.11. –  qui y avez votre demeure  : voir 7.15n  ; 13.6 ; 21.3. –  quel malheur 8.13+. –  terre et mer  : certains mss portent habitants de la terre et de la mer , cf. 3.10+. –  peu de temps  : cf. 20.3.'
  - type: text
    content: Aussi soyez en fête, cieux,
  - type: text
    content: et vous qui y avez votre demeure !
  - type: text
    content: Mais quel malheur pour vous, terre et mer,
  - type: text
    content: car le diable est descendu vers vous
  - type: text
    content: en grande fureur,
  - type: text
    content: sachant qu'il a peu de temps !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'V. 5,9 ; cf. Gn 3.15. –  il poursuivit  : le verbe signifie aussi persécuter (Mt 5.10ss etc.).'
  - type: text
    content: 'Quand le dragon vit qu''il avait été jeté sur la terre, il poursuivit la femme qui avait mis au monde l''enfant mâle. '
  '14':
  - type: note
    content: 'aigle  : cf. 8.13 ; Ex 19.4 ; Dt 32.11 ; Es 40.31 ; Ez 17.3,7. –  au désert… où elle devait être (litt. elle est) nourrie v. 6. –  un temps… 11.2+ ; cf. Dn 7.25n  ; 12.7. –  loin du serpent  : litt. loin de la face du serpent (v. 9).'
  - type: text
    content: 'Alors les deux ailes du grand aigle furent données à la femme pour qu''elle s''envole au désert, vers son lieu, où elle devait être nourrie un temps, des temps et la moitié d''un temps, loin du serpent. '
  '15':
  - type: note
    content: 'vomit  : le même verbe a été traduit précédemment par jeter (v. 4,9s,13 ; de même v. 16).'
  - type: text
    content: 'De sa bouche, le serpent vomit de l''eau comme un fleuve derrière la femme pour que le fleuve l''emporte. '
  '16':
  - type: note
    content: 'ouvrit sa bouche  : cf. Nb 16.30-34 ; Dt 11.6.'
  - type: text
    content: 'Mais la terre secourut la femme, elle ouvrit sa bouche et engloutit le fleuve que le dragon avait vomi de sa bouche. '
  '17':
  - type: note
    content: 'faire la guerre v. 7 ; 2.16n. –  descendance Gn 3.15. –  commandements / témoignage 14.12 ; voir 1.2+ ; voir loi. –  qui portent…  : cf. 6.9n.'
  - type: text
    content: En colère contre la femme, le dragon s'en alla faire la guerre au reste de sa descendance, à ceux qui gardent les commandements de Dieu et qui portent le témoignage de Jésus.
  '18':
  - type: text
    content: ' '
  - type: note
    content: il se posta ou il se tint debout v. 4n  ; quelques mss portent je me tins debout.
  - type: text
    content: Et il se posta sur le sable de la mer.
  '2':
  - type: note
    content: enceinte Es 7.14 ; 26.17 ; 66.7s ; Mi 4.9s. –  les douleurs… de l'accouchement Mt 24.8/ / ; Jn 16.21-23 ; Rm 8.22.
  - type: text
    content: 'Elle était enceinte et elle criait dans les douleurs et les tourments de l''accouchement. '
  '3':
  - type: note
    content: 'signe v. 1+. –  dragon v. 9 ; 13.2 ; 16.13 ; 20.2 ; Es 14.29 ; 27.1n  ; Ez 29.3. –  sept têtes et dix cornes  : cf. 5.6n  ; 13.1+ ; Dn 7.7,24.'
  - type: text
    content: 'Un autre signe apparut dans le ciel : un grand dragon rouge feu qui avait sept têtes et dix cornes, et sur ses têtes sept diadèmes. '
  '4':
  - type: note
    content: 'le tiers (8.7+) des étoiles 8.12. –  il les jeta sur la terre 8.10n  ; voir Dn 8.10. –  se posta  : litt. se tint debout, cf. v. 18n.'
  - type: text
    content: 'Sa queue entraînait le tiers des étoiles du ciel ; il les jeta sur la terre. Le dragon se posta devant la femme qui allait accoucher, pour dévorer son enfant dès qu''elle accoucherait. '
  '5':
  - type: note
    content: 'Elle mit au monde  : le même verbe est traduit par accoucher au v. 4 ; cf. v. 13 ; voir aussi Es 7.14 ; 66.7. –  faire paître… 2.26n,27+ ; Ps 2.9. –  nations  : voir non-Juifs. –  fut enlevé Ac 1.9-11.'
  - type: text
    content: 'Elle mit au monde un fils, un mâle, qui va faire paître toutes les nations avec un sceptre de fer. Son enfant fut enlevé auprès de Dieu et de son trône. '
  '6':
  - type: note
    content: 'elle s''enfuit  : cf. Mt 2.13. –  au désert  : cf. Os 2.16. –  nourrie 1R 17.1-7 ; 19.1-8. –  mille deux cent soixante jours v. 14 ; 11.3+.'
  - type: text
    content: Quant à la femme, elle s'enfuit au désert, où Dieu lui avait préparé un lieu pour qu'elle y soit nourrie pendant mille deux cent soixante jours.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Michel ou Michaël (nom d''origine hébraïque qui signifie qui est comme Dieu [ ?] , cf. 13.4) : voir Dn 10.13n  ; Jd 9. –  combattirent… ou firent la guerre au dragon , 2.16+. –  et ses anges  : cf. Mt 25.31,41.'
  - type: text
    content: 'Il y eut alors une guerre dans le ciel. Michel et ses anges combattirent le dragon. Le dragon combattit, lui et ses anges, '
  '8':
  - type: note
    content: plus de place 20.11 ; cf. Dn 2.35n.
  - type: text
    content: 'mais il ne fut pas le plus fort, et il ne se trouva plus de place pour eux dans le ciel. '
  '9':
  - type: note
    content: 'Cf. 20.2. –  à bas  : sous-entendu dans le texte (de même dans la suite). –  grand dragon v. 3+. –  le serpent d''autrefois  : autre traduction le serpent originel  ; cf. v. 14 ; Gn 3.1-5,14s. –  le diable…  : litt. diable et le Satan  ; v. 12 ; 20.10 ; cf. Za 3.1s ; Jb 1.6-11 ; 2.1-5 ; voir démon, diable, Satan. –  qui égare 2.20 ; 13.14 ; 18.23 ; 19.20 ; 20.3,8,10 ; cf. 2Th 2.9. –  jeté v. 4,13 ; cf. Lc 10.18 ; Jn 12.31.'
  - type: text
    content: 'Il fut jeté à bas, le grand dragon, le serpent d''autrefois, celui qui est appelé le diable et le Satan, celui qui égare toute la terre habitée ; il fut jeté sur la terre, et ses anges y furent jetés avec lui. '
