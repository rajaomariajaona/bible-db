document_id: PSA.113,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur retourne les situations
  - type: text
    content: ' '
  - type: note
    content: Les Psaumes 113–118 constituent le Hallel (cf. la fréquence du refrain Louez le Seigneur , hébreu halelou yah , v. 9 ; 104.35n) qui, dans la liturgie juive, est chanté entre autre le soir de la Pâque (cf. Mt 26.30 ; Mc 14.26). Le Psaume 113 présente de nombreuses ressemblances avec les cantiques d'Anne (1S 2.1ss) et de Marie ( Magnificat , Lc 1.46ss). –  Serviteurs du Seigneur 134.1 ; 135.1 ; cf. 31.17 ; 34.23 ; 35.27 ; 69.18,37 ; 79.2,10 ; 86.4,16 etc.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Serviteurs du '
  - type: text
    content: Seigneur
  - type: text
    content: ', louez,'
  - type: text
    content: 'louez le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: Que le nom… soit béni Jb 1.21 ; Dn 2.20. –  dès maintenant… 115.18 ; 121.8 ; 125.2 ; 131.3.
  - type: text
    content: 'Que le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit béni,'
  - type: text
    content: dès maintenant et pour toujours !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Du soleil levant…  : certains comprennent l''expression (litt. du lever du soleil à son coucher ) dans un sens temporel ; cf. 50.1 ; Es 59.19 ; Ml 1.11. –  nom  : cf. 8.2.'
  - type: text
    content: Du soleil levant jusqu'au couchant,
  - type: text
    content: 'que le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit loué !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: élevé… 99.2 ; cf. 46.11. –  sa gloire (19.2 ; 29.9) est au-dessus du ciel 57.6 ; 97.9.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est élevé au-dessus de toutes les nations,'
  - type: text
    content: sa gloire est au-dessus du ciel.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est semblable 35.10+ ; certains commentateurs réorganisent le texte hébreu traditionnel en replaçant ici la fin du v. 6  : qui est semblable… dans le ciel ou sur la terre ? cf. Hé 1.3. –  Il est assis  : comme juge, ou comme roi ; autres traductions il habite, il est installé  ; cf. v. 8s ; 123.1.'
  - type: text
    content: 'Qui est semblable au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ?'
  - type: text
    content: Il est assis très haut ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: il s'abaisse ou il se penche  ; cf. 11.4s ; 14.2 ; 33.14 ; 102.20 ; 138.6 ; Es 57.15 ; 63.15 ; voir aussi Ep 4.10.
  - type: text
    content: il s'abaisse pour regarder
  - type: text
    content: le ciel et la terre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 1S 2.8 ; Lc 1.52 ; Jc 2.5. –  De la poussière 7.6 ; Jb 2.8 ; Lm 4.5.
  - type: text
    content: De la poussière il relève le faible,
  - type: text
    content: du fumier il élève le pauvre,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'faire asseoir  : autre traduction faire habiter , cf. v. 5,9.'
  - type: text
    content: pour les faire asseoir avec les notables,
  - type: text
    content: avec les nobles de son peuple.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'habiter  : le verbe correspondant est parfois traduit par asseoir  ; cf. v. 5,8. –  stérile 1S 1.6 ; 2.5 ; Es 54.1. –  comme…  : litt. mère des fils joyeuse . –  Louez le Seigneur v. 1n  ; 104.35n.'
  - type: text
    content: Il fait habiter dans une maison celle qui était stérile,
  - type: text
    content: comme une mère joyeuse parmi ses fils.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
