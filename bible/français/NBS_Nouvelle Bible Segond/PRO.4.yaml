document_id: PRO.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Acquérir et garder la sagesse
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez 1.8n. –  mes fils  : litt. fils (au pluriel) ; de même en 5.7. –  instruction 1.2n. –  connaître l''intelligence  : cf. 17.27 ; Es 29.24 ; Jb 38.4 ; 2Ch 2.11n.'
  - type: text
    content: Ecoutez, mes fils, l'instruction d'un père ;
  - type: text
    content: prêtez attention, pour connaître l'intelligence ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoute 1.8n. –  nombreuses 3.1-2n  ; cf. Siracide 1.12 : « La crainte du Seigneur réjouit le cœur, donne joie, gaîté et longue vie. »'
  - type: text
    content: Ecoute, mon fils, reçois mes paroles,
  - type: text
    content: et les années de ta vie seront nombreuses.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'les routes de la droiture  : cf. 2.13n  ; Ps 23.3.'
  - type: text
    content: Je t'ai enseigné la voie de la sagesse,
  - type: text
    content: je t'ai conduit sur les routes de la droiture.
  '12':
  - type: text
    content: ' '
  - type: note
    content: tu marcheras 3.23+.
  - type: text
    content: Quand tu marcheras, ton pas ne sera pas gêné ;
  - type: text
    content: si tu cours, tu ne trébucheras pas.
  '13':
  - type: text
    content: ' '
  - type: note
    content: instruction 1.2n.
  - type: text
    content: Saisis l'instruction, ne la lâche pas ;
  - type: text
    content: garde-la, car elle est ta vie.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ne t'engage pas… 3.25+ ; cf. 1.10,15 ; 2.13n  ; Ps 1.1.
  - type: text
    content: Ne t'engage pas sur le sentier des méchants,
  - type: text
    content: ne t'avance pas dans la voie des mauvais.
  '15':
  - type: text
    content: Evite-la, n'y passe pas ;
  - type: text
    content: détourne-t'en et passe outre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ils perdraient le sommeil  : autre traduction ils seraient dépouillés de leur sommeil (même verbe en 22.22 ; 28.24).'
  - type: text
    content: Car ils ne dormiraient pas, s'ils n'avaient pas fait de mal ;
  - type: text
    content: ils perdraient le sommeil, s'ils n'avaient fait trébucher personne ;
  '17':
  - type: text
    content: car ils se nourrissent du pain de la méchanceté,
  - type: text
    content: et c'est le vin de la violence qu'ils boivent.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Le sentier 2.13n  ; cf. Ps 1.1 ; Jn 8.12.
  - type: text
    content: Le sentier des justes est comme la clarté de la lumière,
  - type: text
    content: qui va croissant jusqu'au plein jour.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'obscurité  : cf. Jb 5.14.'
  - type: text
    content: La voie des méchants est comme l'obscurité ;
  - type: text
    content: ils ne savent pas ce qui les fait trébucher.
  - type: heading
    content: Vertu et fermeté
  '2':
  - type: text
    content: ' '
  - type: note
    content: savoir 1.5n. –  mon enseignement 1.8n.
  - type: text
    content: car je vous ai donné un bon savoir ;
  - type: text
    content: ne rejetez pas mon enseignement.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.8n  ; Baruch 3.9 : « Ecoute, Israël, les préceptes de la vie, prêtez l''oreille pour apprendre à discerner. »'
  - type: text
    content: Mon fils, prête attention à mes paroles,
  - type: text
    content: tends l'oreille vers mes discours.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'garde-les  : cf. 3.21.'
  - type: text
    content: Qu'ils ne s'éloignent pas de tes yeux ;
  - type: text
    content: garde-les au fond de ton cœur ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'tout leur corps  : litt. toute sa chair , cf. 3.8n.'
  - type: text
    content: car ils sont vie pour ceux qui les trouvent,
  - type: text
    content: santé pour tout leur corps.
  '23':
  - type: text
    content: 'Garde ton cœur plus que toute autre chose :'
  - type: text
    content: de lui viennent les sources de la vie.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Litt. éloigne de toi la torsion de la bouche, éloigne de toi la sinuosité des lèvres  ; cf. 6.12 ; 19.1.
  - type: text
    content: Ecarte de ta bouche le langage tortueux,
  - type: text
    content: éloigne de tes lèvres les discours sinueux.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'tes regards  : litt. tes paupières  ; cf. 6.4,25n  ; 30.13n  ; Jb 3.9n.'
  - type: text
    content: Que tes yeux regardent en face,
  - type: text
    content: que tes regards se dirigent droit devant toi.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Aplanis  : le verbe peut également signifier peser  ; autre traduction réfléchis à la route…  ; cf. 5.6,21 ; un terme apparenté est traduit par balance en 16.11 ; cf. Es 40.12. –  la route où tu passes  : litt. la route de ton pied  ; cf. 2.13n  ; Hé 12.13.'
  - type: text
    content: Aplanis la route où tu passes,
  - type: text
    content: et que toutes tes voies soient bien assurées.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Ne dévie… Dt 5.32 ; 28.14. –  tes pieds  : litt. ton pied.'
  - type: text
    content: Ne dévie ni à droite ni à gauche,
  - type: text
    content: écarte tes pieds du mal.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tendre  : le même terme est traduit par doux en 15.1 ; 25.15 ; il est rendu par délicat en 1Ch 22.5 ; 29.1. –  unique… mère  : cf. Ct 6.9.'
  - type: text
    content: J'étais, en effet, un fils pour mon père,
  - type: text
    content: un fils tendre et unique auprès de ma mère.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'préceptes 2.1n  ; 7.2 ; 8.35 ; cf. 1Ch 28.9 ; Siracide 16.24 : « Ecoute-moi, mon fils, et acquiers le savoir, applique ton cœur à mes discours. »'
  - type: text
    content: 'Il me donnait alors cet enseignement :'
  - type: text
    content: Que ton cœur tienne ferme mes paroles !
  - type: text
    content: Garde mes préceptes, et tu vivras.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Acquiers  : autre traduction achète (cf. 20.14) ; même verbe v. 7 ; 1.5 ; 15.32 ; 16.16 ; 17.16 ; 18.15 ; 19.8 ; 23.23 ; voir aussi 8.22n. –  sagesse… intelligence v. 7 ; Mt 13.44-46.'
  - type: text
    content: Acquiers la sagesse, acquiers l'intelligence ;
  - type: text
    content: ne sois pas oublieux et ne dévie pas des paroles de ma bouche.
  '6':
  - type: text
    content: Ne l'abandonne pas, elle te gardera ;
  - type: text
    content: aime-la, elle te préservera.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  acquiers la sagesse v. 5+ ; 23.23. Cf. Siracide 51.25s : « J''ouvre la bouche et je proclame : faites-en pour vous l''acquisition sans argent, soumettez votre nuque à son joug et que votre âme reçoive l''instruction ! C''est tout près qu''on peut la trouver. »'
  - type: text
    content: 'Commencement de la sagesse :'
  - type: text
    content: acquiers la sagesse,
  - type: text
    content: et avec tout ce que tu acquiers, acquiers l'intelligence.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Exalte-la  : sens incertain ; on pourrait aussi comprendre étreins-la  ; LXX entoure-la d''une palissade (pour la protéger). – Voir gloire.'
  - type: text
    content: Exalte-la, elle t'élèvera ;
  - type: text
    content: elle fera ta gloire, si tu l'étreins ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'parure gracieuse 1.9n. –  couronne de splendeur  : même expression en 16.31 ; Es 62.3n  ; le terme traduit par splendeur est rendu par parure en 17.6 ; 20.29 ; par honneur en 19.11 ; 28.12.'
  - type: text
    content: elle mettra sur ta tête une parure gracieuse,
  - type: text
    content: elle t'ornera d'une couronne de splendeur.
  - type: heading
    content: Eviter le sentier des méchants
