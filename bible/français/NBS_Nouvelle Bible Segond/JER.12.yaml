  - type: text
    text: 'Jusqu''à quand le pays sera-t-il en deuil, et l''herbe de toute la campagne desséchée ? A cause du mal que font ses habitants, les bêtes et les oiseaux disparaissent, car ils ont dit : Il ne voit pas notre avenir !'
