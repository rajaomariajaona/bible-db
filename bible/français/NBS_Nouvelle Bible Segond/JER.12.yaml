document_id: JER.12,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Tu es trop juste… pour que je…  : autres traductions tu es juste… même si je… ou tu apparaîtrais juste… si je…  ; cf. Ps 119.137 ; Lm 1.18 ; Esd 9.15. –  d''équité  : autres traductions de droit ; de jugement(s) . –  pourquoi… 15.18 ; 20.18 ; Ha 1.3,13 ; Ml 3.15 ; Ps 10.1+ ; 73.3-12 ; Jb 12.6 ; 21.7. –  réussite  : autres traductions victoire ; prospérité.'
  - type: text
    content: 'Tu es trop juste, '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour que je t''accuse ;'
  - type: text
    content: 'je veux néanmoins te parler d''équité :'
  - type: text
    content: pourquoi la voie des méchants est-elle celle de la réussite ?
  - type: text
    content: Pourquoi vivent-ils tranquillement,
  - type: text
    content: tous ceux qui trahissent ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: bergers 6.3. –  ma vigne 2.21. –  parcelle ou part  ; cf. 10.16+. –  de mes délices 3.19. –  un désert, un lieu dévasté ou un désert dévasté  ; même expression en Jl 2.3 ; 4.19.
  - type: text
    content: Une multitude de bergers ravage ma vigne ;
  - type: text
    content: ils foulent ma parcelle ;
  - type: text
    content: ils font de la parcelle de mes délices
  - type: text
    content: un désert, un lieu dévasté.
  '11':
  - type: text
    content: ' '
  - type: note
    content: On l'a réduit ou il a été réduit  ; plusieurs versions anciennes ont lu le pluriel ( ils l'ont réduit ). –  personne n'a réfléchi Es 42.25n  ; 57.1.
  - type: text
    content: On l'a réduit en un lieu dévasté ;
  - type: text
    content: il est en deuil,
  - type: text
    content: il est dévasté devant moi.
  - type: text
    content: Tout le pays est dévasté,
  - type: text
    content: car personne n'a réfléchi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pistes (3.2n) du désert 4.11. –  ceux qui ravagent 6.26+. –  épée 46.10+ ; cf. 5.12+ ; Es 34.5. –  il n''y a de paix…  : cf. 4.10n. –  personne  : litt. toute (ou aucune ) chair.'
  - type: text
    content: Sur toutes les pistes du désert
  - type: text
    content: arrivent ceux qui ravagent tout,
  - type: text
    content: 'car l''épée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dévore le pays d''une extrémité à l''autre ; il n''y a de paix pour personne.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'semé…  : cf. Gn 3.17-19 ; Dt 28.38 ; Ag 1.6. –  colère ardente 4.8+.'
  - type: text
    content: Ils ont semé du froment
  - type: text
    content: et ils moissonnent des épines,
  - type: text
    content: ils se sont donné du mal sans profit.
  - type: text
    content: Ayez honte de vos récoltes,
  - type: text
    content: 'à cause de la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: heading
    content: Le Seigneur et les voisins d'Israël
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. 11.22 ; 13.9). –  qui touchent… 2.3+. –  Je les déracinerai 1.10+ ; cf. 10.25. –  leur terre  : litt. leur sol  ; cf. Gn 2.5n.'
  - type: text
    content: 'Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre tous mes mauvais voisins, qui touchent au patrimoine que j''ai donné en partage à Israël, mon peuple : Je les déracinerai de leur terre et j''arracherai la maison de Juda du milieu d''eux. '
  '15':
  - type: note
    content: Cf. 3.17 ; 16.15,19-21 ; 23.23 ; 24.6 ; 46.26 ; 48.47 ; 49.6,26 ; 1R 8.41,50 ; Es 19.16-25 ; Ez 29.14 ; Am 9.7 ; Ac 15.16s ; voir aussi Jr 29.14.
  - type: text
    content: 'Mais après que je les aurai déracinés, j''aurai de nouveau compassion d''eux et je les ramènerai chacun dans son patrimoine, chacun dans son pays. '
  '16':
  - type: note
    content: 's''ils apprennent…  : cf. 10.2n. –  s''ils font serment…  : cf. Es 19.18 ; 65.16. –  par la vie du Seigneur (YHWH)  : c''est la formule de serment habituelle (4.2n) ; ici le nom du Dieu d''Israël, YHWH, qui est habituellement rendu par Seigneur, est opposé à Baal  ; cf. Ex 3.15n. –  établis  : litt. bâtis (1.10+), ce qui peut signifier ils prospéreront (Ml 3.15n), ou bien ils auront des fils (voir Gn 16.2n).'
  - type: text
    content: 'Et s''ils apprennent les pratiques de mon peuple, s''ils font serment par mon nom – par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ! – comme ils ont appris à mon peuple à faire serment par le Baal, alors ils seront établis au milieu de mon peuple. '
  '17':
  - type: note
    content: Cf. v. 14+ ; voir aussi Es 60.12 ; Lc 13.3.
  - type: text
    content: 'Mais s''ils n''écoutent rien, je déracinerai une telle nation, je la déracinerai, je la ferai disparaître – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'plantés  : cf. 11.17. –  proche (cf. 23.23) , dans leur bouche…  : cf. 9.7 ; Es 29.13 ; Ps 62.5 ; Mc 7.6. –  des profondeurs de leur être  : litt. de leurs reins  ; cf. 11.20+.'
  - type: text
    content: Tu les as plantés
  - type: text
    content: et ils ont pris racine ;
  - type: text
    content: ils progressent,
  - type: text
    content: ils portent du fruit ;
  - type: text
    content: tu es proche, dans leur bouche,
  - type: text
    content: mais tu es loin des profondeurs de leur être.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sondes mon cœur 11.20+ ; Ps 139. –  Réserve-les… 10.25+. –  des moutons  : litt. du petit bétail  ; cf. 11.19. –  consacre-les ou sanctifie-les, mets-les à part (voir saint) ; cf. 1.5. –  jour de la tuerie  : cf. Jc 5.5.'
  - type: text
    content: 'Toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu me connais, tu me vois ;'
  - type: text
    content: 'tu sondes mon cœur : il est avec toi.'
  - type: text
    content: Réserve-les comme des moutons pour l'abattoir
  - type: text
    content: et consacre-les pour le jour de la tuerie !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en deuil 4.28+. –  du mal…  : litt. du mal de ses habitants  ; cf. 5.25. –  bêtes / oiseaux 4.25+. –  Il ne voit pas…  : LXX Dieu ne verra pas nos chemins.'
  - type: text
    content: 'Jusqu''à quand le pays sera-t-il en deuil, et l''herbe de toute la campagne desséchée ? A cause du mal que font ses habitants, les bêtes et les oiseaux disparaissent, car ils ont dit : Il ne voit pas notre avenir !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'te mesurer à ou rivaliser avec  ; cf. 22.15n. –  un pays paisible  : litt. un pays de paix , ce qui peut aussi signifier un pays prospère  ; cf. 4.10n  ; 25.37. –  dans les fourrés…  : le terme hébreu suggère une élévation, concrète ou morale ( orgueil en 13.9) ; ici comme en 49.19 ; 50.44 il évoque la végétation luxuriante des rives du Jourdain , qui abritait des bêtes sauvages (cf. v. 8 ; voir aussi Za 11.3). D''autres ont compris lors de la crue.'
  - type: text
    content: – Si tu cours avec des hommes à pied
  - type: text
    content: et qu'ils te fatiguent,
  - type: text
    content: comment pourras-tu te mesurer à des chevaux ?
  - type: text
    content: Et si tu n'es en sécurité
  - type: text
    content: que dans un pays paisible,
  - type: text
    content: que feras-tu dans les fourrés du Jourdain ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: '9.3+ ; Lc 21.16 ; cf. Ps 27.10. –  ta propre famille  : litt. la maison de ton père . –  à pleine voix  : traduction incertaine ; le mot hébreu signifie habituellement plein (cf. 4.5n) ; on a aussi compris ils ameutent les gens derrière toi ou ils crient derrière toi : Ivrogne ! (cf. 13.12ss ; 1S 1.12-15 ; Mc 3.21 ; Ac 2.13). –  Ne les crois pas Pr 26.25.'
  - type: text
    content: Car ce sont tes frères eux-mêmes, ta propre famille, qui te trahissent ; ils crient eux-mêmes à pleine voix derrière toi. Ne les crois pas, quand ils auront de bonnes paroles pour toi.
  - type: heading
    content: Dieu abandonne son temple et son peuple
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ma maison  : sur les différents sens possibles de la métaphore, cf. 7.2n  ; Os 8.1n  ; Za 9.8 ; 1Co 3.9 ; voir aussi Lc 13.35. –  mon patrimoine  : le mot est féminin en hébreu ; les v. 9s sont au féminin dans le texte ; cf. 10.16+ ; Ps 78.62 ; voir aussi Os 11.8s. –  livré Gn 9.2n. –  celle que je chéris  : cf. 11.15n.'
  - type: text
    content: J'ai abandonné ma maison,
  - type: text
    content: j'ai délaissé mon patrimoine,
  - type: text
    content: j'ai livré à ses ennemis
  - type: text
    content: celle que je chéris.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5n. –  broussailles 5.6.
  - type: text
    content: Mon patrimoine est devenu pour moi
  - type: text
    content: comme un lion dans les broussailles ;
  - type: text
    content: il a fait retentir sa voix contre moi ;
  - type: text
    content: c'est pourquoi j'en suis venu à le détester.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'taché de sang  : traduction incertaine ; on traduit souvent bigarré  ; en modifiant le texte hébreu traditionnel, on a aussi compris  : Est-ce pour moi que l''hyène lorgne sur mon patrimoine, que les oiseaux de proie… –  rassemblez 7.33+ ; Es 56.9 ; cf. Lc 17.37. –  tous les animaux sauvages  : litt. tout animal de la campagne (ou des champs ), cf. Gn 3.14n.'
  - type: text
    content: Mon patrimoine est-il donc pour moi un oiseau de proie taché de sang,
  - type: text
    content: pour que les oiseaux de proie soient tout autour de lui ?
  - type: text
    content: Allez, rassemblez tous les animaux sauvages,
  - type: text
    content: faites-les venir à la curée !
