document_id: MIC.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le procès du Seigneur et de son peuple
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez 1.2 ; 3.1 ; Dt 32.1 ; Es 1.2. –  Accuse (litt. lève-toi, accuse  ; cf. 2.10n  ; 4.13) v. 2 ; Es 3.13 ; Jr 2.5 ; 25.30s ; Os 2.4ss ; 4.1ss ; 12.2ss ; Ml 3.5 ; Ps 50.6. –  devant les montagnes…  : on pourrait aussi traduire accuse les montagnes  : ou bien l''accusation vise en particulier le culte des hauts lieux , ou bien l''univers (montagnes, collines, fondements de la terre) est pris globalement à témoin de l''accusation portée contre Israël, cf. v. 2 ; 1.2ss ; voir aussi Es 2.14 : Jr 4.24 ; Ps 50.4.'
  - type: text
    content: 'Ecoutez, je vous prie, ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Accuse devant les montagnes,
  - type: text
    content: et que les collines entendent ta voix !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la maison du méchant  : certains modifient la vocalisation traditionnelle pour lire un bath (mesure de capacité, comme l’ épha ) faux . Le mot traduit par méchant est en effet traduit plus loin par mal acquis et au v. 11 par fausses  ; sur la fraude par l''emploi de mesures truquées, cf. Lv 19.35s ; Dt 25.13ss ; Ez 45.10 ; Os 12.8 ; Am 8.5 ; Pr 11.1 ; 20.10,23.'
  - type: text
    content: Y a-t-il encore dans la maison du méchant
  - type: text
    content: des trésors mal acquis,
  - type: text
    content: et un épha trop petit, qui attire la fureur ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Serai-je sans reproche  : Vg justifierai-je . –  des balances fausses  : litt. des balances de méchant.'
  - type: text
    content: Serai-je sans reproche avec des balances fausses,
  - type: text
    content: avec des poids trompeurs dans le sac ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'de violence  : on pourrait comprendre de biens acquis par la violence  ; cf. 2.1s ; Es 30.12 ; 59.6 ; Ez 7.23 ; 8.17 ; 22.29 ; Am 3.10 ; So 1.9 ; Ps 55.10 ; 73.6 ; Lc 3.14. –  mensonge / tromperie Lv 19.11 ; Ml 3.5 ; Pr 6.16ss ; cf. Es 59.3+.'
  - type: text
    content: Ses riches sont pleins de violence,
  - type: text
    content: ses habitants profèrent le mensonge,
  - type: text
    content: et leur langue n'est que tromperie dans leur bouche.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction, d''après des versions anciennes  : c''est pourquoi j''ai commencé à te frapper… à te dévaster…  ; cf. Es 1.5ss.'
  - type: text
    content: Aussi, moi, je te frapperai par la souffrance,
  - type: text
    content: je te dévasterai à cause de tes péchés.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur et traduction conjecturale ; d'après d'autres sens possibles, à la famine pourrait s'ajouter la stérilité ou l'extermination des descendants ; cf. Lv 26.26 ; Dt 28.30ss ; 2R 6.25ss ; Os 4.10 ; Ag 1.6.
  - type: text
    content: Toi, tu mangeras, mais tu ne seras pas rassasié,
  - type: text
    content: et la faim restera dans ton ventre ;
  - type: text
    content: tu mettras en réserve, mais tu ne pourras rien mettre en lieu sûr ;
  - type: text
    content: ce que tu auras mis en lieu sûr,
  - type: text
    content: je le livrerai à l'épée.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 28.38ss ; cf. Am 5.11 ; 6.6 ; So 1.13. –  le raisin  : le terme hébreu désigne habituellement le vin lui-même (dans certains cas, plus précisément, le moût ou le vin nouveau) ; cf. Gn 27.28n.'
  - type: text
    content: Toi, tu sèmeras,
  - type: text
    content: mais tu ne moissonneras pas ;
  - type: text
    content: toi, tu presseras l'olive,
  - type: text
    content: mais tu ne t'enduiras pas d'huile ;
  - type: text
    content: tu presseras le raisin,
  - type: text
    content: mais tu ne boiras pas le vin.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'On s''en tient  : litt. il s''en tient ou, d''après des versions anciennes, tu gardes les prescriptions… –  Omri et Achab , souverains du royaume du Nord (Samarie) célèbres pour la déchéance religieuse, morale et sociale de leur dynastie (1R 16.16ss ; 18.17ss ; 21.25s). –  tes habitants  : litt. ses habitants . –  sifflement d''horreur Jr 18.16n. –  le déshonneur  : autre traduction les outrages.'
  - type: text
    content: On s'en tient aux prescriptions d'Omri,
  - type: text
    content: à toute la manière d'agir de la maison d'Achab,
  - type: text
    content: et vous suivez leurs conseils ;
  - type: text
    content: c'est pourquoi je te livrerai à la dévastation,
  - type: text
    content: je ferai de tes habitants un sujet de sifflement d'horreur,
  - type: text
    content: et vous porterez le déshonneur de mon peuple.
  '2':
  - type: text
    content: ' '
  - type: note
    content: fondations de la terre Dt 32.22 ; 1S 2.8 ; Ps 18.8 ; 46.3s ; 75.4 ; Jb 38.6. –  il est en litige ou il veut argumenter contre Israël  ; cf. Es 1.18.
  - type: text
    content: 'Ecoutez, montagnes, l''accusation du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Ecoutez, immuables fondations de la terre !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' accuse son peuple,'
  - type: text
    content: il est en litige avec Israël.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 't''ai-je fatigué  : en hébreu le verbe fait assonance avec celui qui sera traduit je t''ai fait monter au v. 4 ; cf. Es 5.4 ; 43.22ss ; Jr 2.5,31 ; 12.5 ; Ml 2.17.'
  - type: text
    content: – Mon peuple, que t'ai-je fait ?
  - type: text
    content: En quoi t'ai-je fatigué ?
  - type: text
    content: Réponds-moi !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'je t''ai fait monter…  : cf. v. 3n  ; Gn 12.10n  ; Ex 20.2 ; Lv 11.45 ; Dt 6.20ss ; 26.5ss ; Jos 24.2ss ; 1S 8.8 ; Jr 2.6 ; Os 12.14 ; Am 2.10+ ; Ps 81.11. –  maison des esclaves Ex 13.3+. –  Moïse, Aaron et Miriam  : cf. Ex 15.20 ; Nb 12.1ss ; 20.1 ; Dt 24.9 ; 1S 12.6 ; Es 63.11 ; Jr 15.1 ; Os 12.14 ; Ps 77.21 ; 1Ch 5.29.'
  - type: text
    content: Car je t'ai fait monter d'Egypte,
  - type: text
    content: je t'ai libéré de la maison des esclaves,
  - type: text
    content: et j'ai envoyé en avant de toi Moïse,
  - type: text
    content: Aaron et Miriam.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Balaq / Balaam Nb 22–24 ; Dt 23.6 ; Jos 24.9s ; Né 13.2 ; Ap 2.14. –  Shittim / Guilgal  : cf. Nb 25.1 ; Jos 2.1 ; 3–4. –  que tu saches… 3.1. –  ce que le Seigneur fait pour la justice  : litt. les justices de YHWH  ; il s''agit des exploits que Dieu accomplit pour sauver son peuple, conformément à l''engagement pris dans le cadre de l''alliance ; cf. 7.9 ; Jg 5.11n  ; 1S 12.7 ; Es 33.15n  ; Jr 51.10n  ; Ez 3.20+ ; Dn 9.16,18.'
  - type: text
    content: Mon peuple, souviens-toi, je te prie,
  - type: text
    content: de ce que projetait Balaq, roi de Moab,
  - type: text
    content: et de ce que lui répondit Balaam, fils de Béor,
  - type: text
    content: depuis Shittim jusqu'au Guilgal
  - type: text
    content: – afin que tu saches
  - type: text
    content: 'ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait pour la justice.'
  - type: heading
    content: Ce que le Seigneur demande de l'homme
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Avec quoi…  : cf. Ag 2.10ss ; voir aussi Ex 23.15 ; 34.20 ; 1S 10.3 ; Jr 41.5 ; Ps 95.2. –  m''inclinerai-je ou me courberai-je ; me prosternerai-je  ; cf. Es 58.5 ; Ps 57.7 ; 145.14 ; 146.8. –  Dieu d''en haut  : litt. Dieu du lieu élevé (ce n''est pas le nom divin habituellement traduit par Très-Haut , Gn 14.18ss). –  holocaustes  : voir sacrifices. –  taurillons d''un an  : cf. Lv 9.3.'
  - type: text
    content: '– Avec quoi me présenterai-je devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Avec quoi m'inclinerai-je devant le Dieu d'en haut ?
  - type: text
    content: Me présenterai-je avec des holocaustes,
  - type: text
    content: avec des taurillons d'un an ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'béliers Ex 29.1,19,22 ; Lv 5.15 ; 8.18. –  torrents d''huile Jb 29.6. –  mon premier-né…  : cf. Gn 22.1ss ; Ex 34.20 ; Lv 18.21 ; 20.2ss ; Dt 12.31 ; 18.10 ; Jg 11.34ss ; 1R 16.34 ; 2R 3.27 ; 16.3 ; 21.6 ; Jr 7.31+ ; Ez 16.20s ; 20.25s. –  ma transgression ou ma révolte 1.5n. –  mon propre péché  : litt. le péché de mon âme (Gn 1.20n) ; cf. Ex 20.5 ; Jr 31.29s ; Ez 18.4 ; voir aussi Lv 4.2+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agréera-t-il des milliers de béliers,'
  - type: text
    content: des dizaines de milliers de torrents d'huile ?
  - type: text
    content: Donnerai-je mon premier-né pour ma transgression,
  - type: text
    content: donnerai-je le fruit de mon ventre pour mon propre péché ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1S 15.22 ; Es 1.11ss ; 58.1ss ; Os 6.6 ; 8.1ss ; Jl 2.13 ; Za 7.4ss ; Ps 40.7ss ; 50.8ss ; 51.18s. –  Il (ou on ) t''a fait connaître  : le verbe correspondant apparaît en Dt 4.13 ; 32.7 ; Ps 9.12 ; 22.32 ; 30.10 ; 71.17s ; 75.10 ; 92.3,16 ; 145.4 ; 147.19. –  humain  : hébreu ’adam  ; cf. 5.4n  ; Ps 49.3n. –  bon ou bien  ; cf. 3.2 ; Ps 73.28. –  qu''est-ce que le Seigneur réclame (ou recherche ) : cf. Dt 10.12 ; Jn 4.23. –  équité  : cf. 3.1 ; Es 1.17,26s ; Os 2.21 ; Am 5.24 ; voir aussi Mt 23.23. –  fidélité ou bonté , terme apparenté en 7.2 ; cf. Os 4.1 ; 6.6 ; Ps 25.10+. –  marches…  : cf. 4.2 ; Gn 5.22,24 ; 6.9. –  modestement ou humblement  ; terme hébreu apparenté pour modestes en Pr 11.2 ; autre traduction que tu t''appliques à marcher avec ton Dieu.'
  - type: text
    content: – Il t'a fait connaître, ô humain, ce qui est bon ;
  - type: text
    content: 'et qu''est-ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réclame de toi,'
  - type: text
    content: si ce n'est que tu agisses selon l'équité,
  - type: text
    content: que tu aimes la fidélité,
  - type: text
    content: et que tu marches modestement avec ton Dieu ?
  - type: heading
    content: Le Seigneur punit la tromperie et la violence
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur jusqu''à la fin du chap. –  Le Seigneur …  : litt. la voix de YHWH vers la ville, il crie . –  la ville  : Jérusalem, ou peut-être Samarie, voir v. 16. –  il est raisonnable…  : sens incertain ; autre traduction et ton nom verra le succès (sur le terme correspondant, cf. Jb 5.12n) ; LXX il sauvera ceux qui craignent son nom . –  Ecoutez…  : traduction conjecturale ; certains, d''après LXX, modifient le texte hébreu traditionnel pour lire écoutez, tribu et assemblée (10) de la ville. Puis-je supporter les trésors mal acquis… ? D''autres transforment davantage encore l''ordre et le contenu des v. suivants pour essayer d''y trouver un sens satisfaisant.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' crie vers la ville'
  - type: text
    content: – et il est raisonnable d'y voir ton nom.
  - type: text
    content: Ecoutez l'annonce du châtiment,
  - type: text
    content: et celui qui l'a décrété !
