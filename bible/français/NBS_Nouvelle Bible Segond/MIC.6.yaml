    children:
    - type: text
      text: toi, tu presseras l'olive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tu ne t'enduiras pas d'huile ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu presseras le raisin,
  - type: usfm
    marker: q1
    children:
    - type: text
