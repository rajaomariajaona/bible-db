      - type: usfm
        marker: ft
        children:
        - type: text
          text: Texte obscur et traduction conjecturale ; d'après d'autres sens possibles, à la famine pourrait s'ajouter la stérilité ou l'extermination des descendants ; cf. Lv 26.26 ; Dt 28.30ss ; 2R 6.25ss ; Os 4.10 ; Ag 1.6.
      marker-yv: yv-n
    - type: text
      text: Toi, tu mangeras, mais tu ne seras pas rassasié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la faim restera dans ton ventre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu mettras en réserve, mais tu ne pourras rien mettre en lieu sûr ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que tu auras mis en lieu sûr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le livrerai à l'épée.
