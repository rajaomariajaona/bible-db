document_id: NEH.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Judéens rebâtissent les murs de Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Ce chapitre est l''une des principales sources d''informations sur la topographie ancienne de Jérusalem. Cependant les tours, les portes et les parties de la ville qu''il mentionne n''ont pas toutes été identifiées précisément par les archéologues. –  Eliashib, le grand prêtre v. 20 ; 13.28 ; cf. 8.1ss ; Esd 10.6+. –  bâtirent 2.18n  ; Esd 3.2+. –  porte du Petit bétail (ou porte des Moutons ), au nord, près de l''angle nord-est ; c''est sans doute la porte la plus proche du temple, par laquelle on faisait entrer les animaux destinés aux sacrifices v. 32 ; 12.39 ; cf. Jn 5.2 ; à partir de ce point, le chapitre fait le tour des murailles de Jérusalem dans le sens contraire à celui des aiguilles d''une montre. –  la consacrèrent  : certains modifient le texte hébreu traditionnel pour lire la charpentèrent , comme dans la suite. –  battants  : cf. 6.1. –  tour de Méa (= des Cent ) / tour de Hananéel , sans doute un peu plus à l''ouest sur la muraille nord ; cf. 12.39 ; Jr 31.38 ; Za 14.10.'
  - type: text
    content: Eliashib, le grand prêtre, et ses frères, les prêtres, bâtirent la porte du Petit bétail. Ils la consacrèrent et en posèrent les battants ; ils la consacrèrent, depuis la tour de Méa jusqu'à la tour de Hananéel.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'en face de sa maison v. 23,28,30 ; cf. 7.3n. –  Hattoush  : cf. 10.5 ; 12.2 ; Esd 8.2. –  Hashabnia  : cf. 9.5.'
  - type: text
    content: A côté d'eux travailla, en face de sa maison, Yedaya, fils de Haroumaph ;
  - type: text
    content: à côté de lui travailla Hattoush, fils de Hashabnia.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Un autre secteur  : cf. v. 19ss,24,27,30 ; le premier n''étant pas nommé, cette expression pourrait indiquer que la liste est incomplète. –  et (LXX jusqu''à ) la tour des Fours , peut-être près de la tour de l''Angle 12.38 ; 2Ch 26.9. –  Harim Esd 2.32. –  Pahath-Moab Esd 2.6.'
  - type: text
    content: Un autre secteur et la tour des Fours furent réparés par Malkiya, fils de Harim, et par Hashoub, fils de Pahath-Moab.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Lohesh  : certains traduisent fils du devin ou fils du charmeur (cf. 10.25). –  la moitié  : cf. v. 9.'
  - type: text
    content: A côté d'eux travailla Shalloum, fils de Lohesh, chef de la moitié du district de Jérusalem, avec ses filles.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Zanoah , à une vingtaine de kilomètres à l''ouest de Jérusalem 11.30 ; Jos 15.34. –  porte de la Vallée 2.13n. –  mille coudées  : environ 500 m (voir mesures). –  porte du Fumier , comme au v. 14, d''après quelques mss hébreux et des versions anciennes ; texte hébreu traditionnel porte des Fromages (différence d''une lettre en hébreu) 2.13n.'
  - type: text
    content: 'Hanoun et les habitants de Zanoah réparèrent la porte de la Vallée. Ils la bâtirent et en posèrent les battants, les verrous et les barres. Ils firent, de plus, mille coudées de la muraille jusqu''à la porte du Fumier. '
  '14':
  - type: note
    content: 'Rékab  : cf. 2R 10.15,23. –  Beth-Kérem  : localité non identifiée, peut-être proche de Beth-Léhem Jr 6.1.'
  - type: text
    content: Malkiya, fils de Rékab, chef du district de Beth-Kérem, répara la porte du Fumier. Il la bâtit et en posa les battants, les verrous et les barres.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Shalloun ou Shalloum , selon quelques mss. –  Kol-Hozé  : cf. 11.5. –  chef du district du Mitspa  : cf. v. 7n,19. –  porte de la Source 2.14n. –  barres  : omis par LXX. –  de l''Emissaire ou du canal , deux sens dérivés de la racine qui signifie envoyer et d''où vient aussi le nom de Siloé, qui semble désigner un autre réservoir (cf. Jn 9.7) ; voir aussi « L''inscription de Siloé »♦. –  Jardin du Roi  : peut-être à l''extérieur des murailles, vers la vallée du Cédron, au sud ; cf. Jr 39.4. –  marches… 12.37. –  la Ville de David  : le quartier le plus au sud de l''ancienne ville fortifiée, sur l''antique colline de Sion (non pas la Sion actuelle qui se trouve plus à l''ouest) ; cf. 2S 5.7,9 ; 1R 2.10 ; 3.1 ; 8.1.'
  - type: text
    content: Shalloun, fils de Kol-Hozé, chef du district du Mitspa, répara la porte de la Source. Il la bâtit, la couvrit et en posa les battants, les verrous et les barres. Il fit de plus la muraille du Réservoir de l'Emissaire, près du Jardin du Roi, jusqu'aux marches qui descendent de la Ville de David.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Néhémie  : cf. 1.1n. –  Beth-Tsour , au sud de Jérusalem, à 8 km au nord d''Hébron, cf. Jos 15.58 ; 1Ch 2.45 ; 2Ch 11.7. –  tombeaux de David  : la nécropole royale, au sud de la Ville de David (v. 15n). –  la maison des héros ou la maison des guerriers , peut-être la caserne de l''ancienne garde royale (cf. 2S 16.6 ; voir aussi 23.8 où le même mot est traduit par vaillants hommes ).'
  - type: text
    content: Derrière lui Néhémie, fils d'Azbouq, chef de la moitié du district de Beth-Tsour, travailla jusqu'en face des tombeaux de David, jusqu'au réservoir artificiel et jusqu'à la maison des héros.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Voir lévite. –  Rehoum  : homonymes 10.26 ; Esd 2.2. –  Bani 9.4. –  Qéila Jos 15.44 ; 1S 23.5, à une trentaine de kilomètres au sud-ouest de Jérusalem.'
  - type: text
    content: Derrière lui travaillèrent les lévites, Rehoum, fils de Bani ;
  - type: text
    content: à côté de lui travailla pour son district Hashabia, chef de la moitié du district de Qéila.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Bavvaï ou Binnouï, d'après quelques mss hébreux et des versions anciennes (cf. v. 24). –  Hénadad v. 24 ; 10.10 ; Esd 3.9.
  - type: text
    content: 'Derrière lui travaillèrent leurs frères : Bavvaï, fils de Hénadad, chef de la moitié du district de Qéila ;'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'chef du Mitspa v. 15+. –  autre secteur v. 11n. –  en face de…  : LXX de la tour de la montée de l''Encoignure  ; la traduction des mots hébreux pour arsenal ( armes en 1R 10.25 ; 2R 10.2 ; Ps 140.8n  ; 2Ch 9.24 etc.) est incertaine et l''identification des sites est impossible ; sur l''Encoignure , cf. 2Ch 26.9.'
  - type: text
    content: à côté de lui Ezer, fils de Josué, chef du Mitspa, répara un autre secteur, en face de la montée de l'arsenal, à l'Encoignure.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Jéricho 7.36. –  Zakkour  : cf. 10.13 ; 12.35 ; 13.13 ; cf. Esd 8.14.'
  - type: text
    content: A côté de lui bâtirent les hommes de Jéricho ;
  - type: text
    content: à côté de lui bâtit aussi Zakkour, fils d'Imri.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Baruch  : cf. Jr 32.12n (autre personnage portant le même nom). –  Zabbaï Esd 10.28. –  avec ardeur  : traduction incertaine ; le terme correspondant est absent de plusieurs mss hébreux et de versions anciennes ; il n''apparaît qu''ici dans le chapitre et pourrait être dû à une répétition accidentelle du mot précédent dans la copie du texte hébreu. –  Eliashib v. 1.'
  - type: text
    content: Derrière lui Baruch, fils de Zabbaï, répara avec ardeur une autre partie, depuis l'Encoignure jusqu'à l'entrée de la maison d'Eliashib, le grand prêtre.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 4.
  - type: text
    content: Derrière lui, Merémoth, fils d'Urie, fils de Haqqots, répara un autre secteur, depuis l'entrée de la maison d'Eliashib jusqu'à l'extrémité de la maison d'Eliashib.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'qui habitaient le District  : litt. hommes du District , cf. 12.28 ; hébreu kikkar , terme qui désigne habituellement le bassin de la mer Morte (cf. Gn 13.10nss) ; on pourrait aussi comprendre, plus généralement, les prêtres des environs . LXX a lu ici un nom propre.'
  - type: text
    content: 'Derrière lui travaillèrent les prêtres qui habitaient le District. '
  '23':
  - type: note
    content: Derrière eux, avec une légère modification du texte hébreu traditionnel qui se lit derrière lui (de même au v. 29, cf. v. 30n).
  - type: text
    content: Derrière eux Benjamin et Hashoub travaillèrent en face de leur maison.
  - type: text
    content: Derrière eux Azaria, fils de Maaséya, fils d'Anania, travailla à côté de sa maison.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Binnouï… v. 18n. –  l''Encoignure  : sans doute un autre endroit qu''au v. 19 (saillie ou Angle du mur d''enceinte).'
  - type: text
    content: 'Derrière lui Binnouï, fils de Hénadad, répara un autre secteur, depuis la maison d''Azaria jusqu''à l''Encoignure et jusqu''à l''Angle. '
  '25':
  - type: note
    content: 'Palal  : cf. 11.12. –  tour Haute… v. 26 ; 2Ch 26.9. –  cour de la garde Jr 32.2+. –  Paréosh Esd 2.3.'
  - type: text
    content: Palal, fils d'Ouzaï, travailla en face de l'Encoignure et de la tour Haute qui fait saillie depuis la maison du roi près de la cour de la garde. Derrière lui travailla Pedaya, fils de Paréosh.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Netinim…  : cf. 7.46,72 ; 1Ch 9.2 ; voir Esd 2.43n. –  Ophel , sans doute la partie haute et fortifiée de Jérusalem où se trouvait auparavant le palais royal, juste au sud du temple v. 27 ; 11.21 ; Es 32.14 ; Mi 4.8n  ; 2Ch 27.3 ; 33.14. –  jusqu''en face de…  : LXX jusqu''au jardin de la porte des Eaux , peut-être une porte du palais royal plutôt que du mur d''enceinte 8.1n,3,16 ; 12.37.'
  - type: text
    content: Les Netinim qui habitaient sur l'Ophel travaillèrent jusqu'en face de la porte des Eaux, à l'est, et de la tour en saillie.
  '27':
  - type: text
    content: ' '
  - type: note
    content: V. 5n.
  - type: text
    content: Derrière eux les Teqoïtes réparèrent un autre secteur en face de la grande tour en saillie jusqu'au mur de l'Ophel.
  '28':
  - type: text
    content: ' '
  - type: note
    content: porte des Chevaux , à l'est, porte du mur d'enceinte ou du palais royal Jr 31.40 ; c'est une porte du temple qui porte le même nom en 2R 11.16 ; 2Ch 23.15.
  - type: text
    content: Au-dessus de la porte des Chevaux, les prêtres travaillèrent chacun devant sa maison.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Derrière eux v. 23n. –  fils d''Immer Esd 2.37. –  Shemaya / Shekania  : cf. 6.18 ; 1Ch 3.22. –  porte de l''Orient  : probablement une porte du temple, cf. Ez 40.6.'
  - type: text
    content: Derrière eux Tsadoq, fils d'Immer, travailla devant sa maison. Derrière lui travailla Shemaya, fils de Shekania, gardien de la porte de l'Orient.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Senaa  : cf. 7.38 ; 11.9 ; Esd 2.35n  ; 1Ch 9.7. –  porte des Poissons , sans doute à l''entrée de la vallée du Tyropéon, au nord-ouest 12.39 ; cf. 13.16 ; So 1.10 ; 2Ch 33.14.'
  - type: text
    content: Les fils de Senaa bâtirent la porte des Poissons. Ils la charpentèrent et en posèrent les battants, les verrous et les barres.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Derrière eux (v. 23n,29), d''après une lecture traditionnelle, certains mss hébreux et des versions anciennes ; autre lecture traditionnelle derrière moi , de même au v. 31. –  le sixième  : au lieu de cette précision insolite, certains cherchent à deviner un nom de personne ou de lieu. –  un autre secteur v. 11n. –  Meshoullam v. 4. –  sa salle  : l''une des salles des prêtres dans le temple ; LXX son trésor.'
  - type: text
    content: Derrière eux, Hanania, fils de Shélémia, et Hanoun, le sixième fils de Tsalaph, réparèrent un autre secteur de la muraille.
  - type: text
    content: Derrière eux Meshoullam, fils de Bérékia, travailla en face de sa salle.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Malkiya v. 11. –  marchands  : cf. Mc 11.15ss/ /. –  porte de Miphqad (= de l''Inspection, de la Surveillance ou du Rassemblement ) : sans doute une des portes du temple ; le même terme semble désigner un lieu réservé ou une réserve en Ez 43.21n. –  chambre à l''étage  : peut-être un poste de guet ; cf. Jg 3.20n  ; 2S 19.1.'
  - type: text
    content: 'Derrière lui Malkiya, d''entre les orfèvres, travailla jusqu''aux maisons des Netinim et des marchands, en face de la porte de Miphqad, et jusqu''à la chambre à l''étage qui est à l''angle. '
  '32':
  - type: note
    content: 'entre la chambre…  : LXX jusqu''au milieu de la montée de la porte du Petit bétail, fin du tour de la ville (v. 1n).'
  - type: text
    content: Les orfèvres et les marchands travaillèrent entre la chambre à l'étage qui est à l'angle et la porte du Petit bétail.
  - type: heading
    content: Les adversaires veulent arrêter les travaux
  '33':
  - type: text
    content: ' '
  - type: note
    content: A la suite de LXX, certaines éditions font débuter ici le chap. 4, dont la numérotation est décalée en conséquence. –  Sanballat 2.10n,19.
  - type: text
    content: 'Lorsque Sanballat apprit que nous rebâtissions la muraille, il se fâcha ; il était très contrarié. Il se moqua des Judéens. '
  '34':
  - type: note
    content: 'Jusqu''à la fin du chap. 3 le texte de LXX est très divergent. –  les forces  : certains comprennent les gens importants. –  restaurer leur ville  : litt. restaurer pour eux  ; cf. v. 8n  ; d''autres comprennent les laissera-t-on faire ? –  un jour  : litt. dans le jour  ; on pourrait aussi comprendre en un jour  ; certains modifient le texte hébreu traditionnel pour lire leur construction  ; cette question est omise par LXX. –  incendiées 1.3 ; 2.3.'
  - type: text
    content: 'Il dit devant ses frères et devant les forces de Samarie : Que font ces Judéens minables ? Vont-ils restaurer leur ville pour y offrir des sacrifices ? Croient-ils achever un jour ? Redonneront-ils vie à des pierres ensevelies sous des monceaux de poussière et incendiées ? '
  '35':
  - type: note
    content: 'Tobiya 2.10n. –  Qu''ils bâtissent seulement  : autre traduction qu''ils bâtissent eux-mêmes.'
  - type: text
    content: 'Tobiya, l''Ammonite, était à côté de lui ; il dit : Qu''ils bâtissent seulement ! Si un renard s''élance, il ouvrira une brèche dans leur muraille de pierres.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.19 ; 6.9n,14 ; 13.14,22,31 ; Esd 7.27s. –  Entends ou écoute . –  Fais retomber leurs outrages (le même terme est traduit par déshonneur en 1.3 ; 2.17n) ; Os 12.15 ; Ps 79.12 ; Lm 3.64 ; cf. Jl 4.4. –  pillage Esd 9.7+. –  dans un pays ou sur une terre.
  - type: text
    content: 'Entends, notre Dieu, car nous sommes méprisés ! Fais retomber leurs outrages sur leur tête, et livre-les au pillage dans un pays de captivité ! '
  '37':
  - type: note
    content: 'Cf. Jr 18.23. –  Ne couvre pas  : cf. Ps 32.1n  ; 85.3. –  que leur péché…  : LXX omet cette partie du texte, jusqu''à la fin du chapitre. –  effacé Es 43.25 ; 44.22 ; Ps 51.3,11 ; 109.14. –  ils ont contrarié…  : autre traduction ils ont contrarié (Dieu) devant les bâtisseurs.'
  - type: text
    content: 'Ne couvre pas leur faute, et que leur péché ne soit pas effacé de devant toi, car ils ont contrarié les bâtisseurs. '
  '38':
  - type: note
    content: 'fut achevée…  : litt. fut raccordée jusqu''à la moitié  ; d''autres comprennent jusqu''à la moitié de sa longueur ou de son épaisseur. –  Le peuple…  : cf. 4.4. – Voir cœur.'
  - type: text
    content: Nous avons rebâti la muraille, et toute la muraille fut achevée jusqu'à la moitié de sa hauteur. Le peuple prit ce travail à cœur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'travailla  : le verbe hébreu correspondant, qui signifie aussi fortifier , est traduit dans la suite tantôt par travailler , tantôt par réparer . –  Merémoth v. 21 ; Esd 8.33. –  fils de Haqqots Esd 2.61. –  Meshoullam v. 30 ; 6.18 ; 1Ch 3.19. –  Meshézabéel , nom babylonien, cf. 10.22 ; 11.24. –  Baana  : cf. 10.28.'
  - type: text
    content: A côté d'eux travailla Merémoth, fils d'Urie, fils de Haqqots ;
  - type: text
    content: à côté d'eux travailla Meshoullam, fils de Bérékia, fils de Meshézabéel ;
  - type: text
    content: à côté d'eux travailla Tsadoq, fils de Baana ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Teqoïtes ou habitants de Teqoa (v. 27), à une quinzaine de kilomètres au sud-est de Jérusalem ; cf. Am 1.1n. –  les princes  : le terme hébreu correspondant (aussi 10.30) est habituellement traduit par brave, magnifique (synonyme de noble ) ; LXX a transcrit comme s''il s''agissait d''un nom de personne (Adoréem). –  ne se soumirent pas…  : litt. ne mirent pas leur cou au service de leur maître ou de leur seigneur , ce dernier pouvant être Néhémie plutôt que Dieu ; le terme hébreu pourrait aussi être lu comme un pluriel  : de leurs seigneurs  ; cf. Jr 27.11s.'
  - type: text
    content: à côté d'eux travaillèrent les Teqoïtes, dont les princes ne se soumirent pas au service de leur maître.
  '6':
  - type: text
    content: ' '
  - type: note
    content: la Vieille porte (peut-être celle qui donnait accès à la vieille ville, au nord-ouest) ou la porte de Yeshana , localité située à environ 25 km au nord de Jérusalem 12.39 ; 2Ch 13.19.
  - type: text
    content: Joïada, fils de Paséah, et Meshoullam, fils de Besodia, réparèrent la Vieille porte. Ils la charpentèrent et en posèrent les battants, les verrous et les barres.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est omis par LXX. –  Gabaon (7.25) et le Mitspa (cf. Gn 31.49n  ; Jos 11.3n), respectivement à une dizaine de kilomètres au nord-ouest et 13 kilomètres au nord de Jérusalem. –  pour le siège (ou le trône ) du gouverneur (voir Esd 4.10n) …  : on pourrait comprendre pour le compte du gouverneur… ; qui dépendaient de la juridiction du gouverneur…  ; ou peut-être jusqu''au siège du gouverneur… auquel cas il pourrait s''agir, concrètement, de la résidence que le gouverneur occupait lorsqu''il venait à Jérusalem.'
  - type: text
    content: A côté d'eux travaillèrent Melatia, le Gabaonite, Yadôn, le Méronotite, et les hommes de Gabaon et du Mitspa, pour le siège du gouverneur de Transeuphratène ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'LXX à côté d''eux travailla Hanania, fils de Rokeeim. Et ils abandonnèrent Jérusalem jusqu''à la muraille épaisse , sans doute une zone particulièrement fortifiée parce que plus vulnérable (12.38 ; cf. 2Ch 25.23) ; le verbe hébreu traduit par restaurèrent est probablement un homonyme du verbe plus courant qui signifie abandonner (v. 34n). –  parfumeurs  : cf. v. 31s.'
  - type: text
    content: à côté d'eux travailla Ouzziel, fils de Harhaya, d'entre les orfèvres ;
  - type: text
    content: à côté de lui travailla Hanania, d'entre les parfumeurs. Ils restaurèrent Jérusalem jusqu'à la muraille épaisse.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Rephaya 1Ch 3.21 ; 4.42 ; 7.2 ; 9.43. –  fils de Hour  : omis par LXX. –  la moitié  : cf. v. 12.'
  - type: text
    content: A côté d'eux travailla Rephaya, fils de Hour, chef de la moitié du district de Jérusalem.
