    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce chapitre est l''une des principales sources d''informations sur la topographie ancienne de Jérusalem. Cependant les tours, les portes et les parties de la ville qu''il mentionne n''ont pas toutes été identifiées précisément par les archéologues. –  '
