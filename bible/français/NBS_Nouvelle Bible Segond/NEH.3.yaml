      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ', par laquelle on faisait entrer les animaux destinés aux sacrifices v. 32 ; 12.39 ; cf. Jn 5.2 ; à partir de ce point, le chapitre fait le tour des murailles de Jérusalem dans le sens contraire à celui des aiguilles d''une montre. –  '
