        text: 1.3 ; 2.3.
    marker-yv: yv-n
  - type: text
    text: 'Il dit devant ses frères et devant les forces de Samarie : Que font ces Judéens minables ? Vont-ils restaurer leur ville pour y offrir des sacrifices ? Croient-ils achever un jour ? Redonneront-ils vie à des pierres ensevelies sous des monceaux de poussière et incendiées ? '
