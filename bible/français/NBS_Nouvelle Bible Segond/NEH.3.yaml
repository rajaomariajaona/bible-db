    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sans doute un peu plus à l''ouest sur la muraille nord ; cf. 12.39 ; Jr 31.38 ; Za 14.10.'
    marker-yv: yv-n
  - type: text
    text: Eliashib, le grand prêtre, et ses frères, les prêtres, bâtirent la porte du Petit bétail. Ils la consacrèrent et en posèrent les battants ; ils la consacrèrent, depuis la tour de Méa jusqu'à la tour de Hananéel.
