document_id: PSA.114,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Quand Israël sortit d'Egypte
  - type: text
    content: ' '
  - type: note
    content: 'Ce psaume et le suivant n''en forment qu''un seul (numéroté 113, voir 9.1n  ; 116.1n) dans LXX et Vg. –  Quand Israël… Ex 12ss. –  à la langue incompréhensible  : cf. Dt 28.49 ; Es 28.11 ; 33.19 ; Jr 5.15.'
  - type: text
    content: Quand Israël sortit d'Egypte,
  - type: text
    content: la maison de Jacob du milieu d'un peuple à la langue incompréhensible,
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 78.68s ; Ex 15.17 ; 19.6 ; 25.8 ; Lv 20.26 ; Dt 7.6 ; Jr 2.3 ; 1Co 3.16 ; 6.19s ; 1P 2.4s.
  - type: text
    content: Juda devint son sanctuaire,
  - type: text
    content: Israël fut son domaine.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 48.6 ; 66.6 ; 74.15 ; 77.17 ; 104.7 ; Ex 14.21ss ; Jos 3.14ss ; 4.7,23s ; Es 17.13 ; 19.5ss ; 31.8s ; 33.3 ; Ap 20.11.
  - type: text
    content: La mer le vit et s'enfuit,
  - type: text
    content: le Jourdain recula ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 29.6 ; cf. 68.9 ; Ex 19.18 ; Jg 5.5 ; Ha 3.6.
  - type: text
    content: les montagnes bondirent comme des béliers,
  - type: text
    content: les collines comme du petit bétail.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 68.17.
  - type: text
    content: Qu'as-tu, mer, pour t'enfuir,
  - type: text
    content: Jourdain, pour reculer ?
  '6':
  - type: text
    content: Qu'avez-vous, montagnes, pour bondir comme des béliers,
  - type: text
    content: et vous, collines, comme du petit bétail ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tremble  : sens incertain ; cf. 77.17 ; 96.9 ; 97.4 ; 99.1 ; Es 26.17 ; Hé 12.26 ; autre traduction possible danse (en ronde) , même verbe en Jg 21.21 ; on modifie parfois le texte hébreu traditionnel pour lire devant le Seigneur de toute la terre (cf. 97.5+ ; Jos 3.11,13).'
  - type: text
    content: Terre, tremble devant le Seigneur !
  - type: text
    content: – devant le Dieu de Jacob,
  '8':
  - type: text
    content: ' '
  - type: note
    content: 78.15s ; 105.41 ; 107.35 ; Ex 17.1ss ; Nb 20.11 ; Dt 8.15 ; Es 48.21 ; Né 9.15. –  le granit ou le silex , identification incertaine (Dt 8.15n).
  - type: text
    content: qui change le rocher en étang,
  - type: text
    content: le granit en source.
