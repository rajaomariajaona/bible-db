document_id: NUM.31,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La guerre contre les Madianites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous leurs campements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toutes leurs tentes.
      marker-yv: yv-n
    - type: text
      text: 'Ils mirent le feu à toutes les villes qu''ils habitaient et à tous leurs campements. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils prirent tout le butin, toutes les prises de guerre, les humains et les bêtes ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui campaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans les plaines arides de Moab… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ils amenèrent les captifs, les prises de guerre et le butin à Moïse, à Eléazar, le prêtre, et à la communauté des Israélites, qui campaient dans les plaines arides de Moab, près du Jourdain, en face de Jéricho.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sortirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' et LXX ont lu le singulier, s''appliquant à Moïse.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse, Eléazar, le prêtre, et tous les princes de la communauté sortirent à leur rencontre, hors du camp. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse s'irrita…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 16.20 ; Lv 10.16ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les commandants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les responsables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même terme a été souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceux qui furent recensés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(1.45 ; 2.32 etc.). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chefs de mille…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',48 ; Ex 18.21.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse s''irrita contre les commandants de la troupe, les chefs de mille et les chefs de cent, qui revenaient de l''expédition. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous avez laissé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Smr et plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pourquoi avez-vous… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes les femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute femelle.
      marker-yv: yv-n
    - type: text
      text: 'Moïse leur dit : Vous avez laissé la vie à toutes les femmes ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ce sont elles…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.1ss,6ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par la parole de Balaam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette parole de Balaam, traditionnellement interprétée comme un conseil visant à faire pécher les Israélites pour leur attirer la malédiction de Dieu, n''est pas évoquée dans les chap. 22–24 ; autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans l'affaire de Balaam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tournure presque identique dans la suite pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans l''affaire de Péor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (23.28ss ; 25.3ss,18) ; cf. 24.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2P 2.15 ; Ap 2.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ont entraîné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte hébreu porte un verbe mal connu ; à une autre forme, il est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'recruter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 5 ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ont enseigné le sacrilège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le fléau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.8.
      marker-yv: yv-n
    - type: text
      text: 'Ce sont elles qui, par la parole de Balaam, ont entraîné les Israélites au sacrilège envers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', dans l''affaire de Péor ; c''est alors que le fléau frappa la communauté du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 21.2s ; Dt 20.13ss ; Jg 21.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout mâle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout mâle parmi les familles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parmi les enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 34.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui a couché…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui a connu un homme en couchant avec un mâle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; formule analogue aux v. 18,35 ; cf. Gn 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, tuez tout mâle et tuez toute femme qui a couché avec un homme en ayant des relations avec lui ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes les filles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tous les enfants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'entre les femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 21.10ss ; Jg 21.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gardez-les en vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'mais toutes les filles qui n''ont jamais couché avec un mâle, gardez-les en vie pour vous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 19.11s,18s ; Lv 11.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ôteront leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 12+,20.'
      marker-yv: yv-n
    - type: text
      text: 'Et vous, campez pendant sept jours hors du camp ; tous ceux d''entre vous qui ont tué quelqu''un et tous ceux qui ont touché un cadavre ôteront leur péché le troisième et le septième jour – vous et vos captifs. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Madianites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.16ss ; cf. 10.29ss ; Gn 25.2ss ; Ex 2.15ss ; 18.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réuni… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 27.12ss.'
      marker-yv: yv-n
    - type: text
      text: 'Venge les Israélites des Madianites ; ensuite tu seras réuni aux tiens. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ouvrage de poil de chèvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout ouvrage de chèvre.
      marker-yv: yv-n
    - type: text
      text: Vous ôterez aussi le péché de tout vêtement, de tout objet de peau, de tout ouvrage de poil de chèvre et de tout ustensile de bois.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 19.2ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que prescrit la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une prescription de la loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donnée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe correspondant est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ordonner, instituer.
      marker-yv: yv-n
    - type: text
      text: 'Eléazar, le prêtre, dit aux soldats qui étaient allés au combat : Voici ce que prescrit la loi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a donnée à Moïse. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L''or, l''argent, le bronze, le fer, l''étain et le plomb, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''eau lustrale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '19.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',17s.'
      marker-yv: yv-n
    - type: text
      text: 'tout objet qui peut aller au feu, vous le ferez passer par le feu, et il sera pur. Mais c''est par l''eau lustrale que sera ôté le péché de tout ce qui ne peut pas aller au feu ; vous le ferez passer dans l''eau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous laverez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 14.8.'
      marker-yv: yv-n
    - type: text
      text: Vous laverez vos vêtements le septième jour, et vous serez purs ; ensuite vous pourrez rentrer dans le camp.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le partage du butin
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 53+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eléazar, le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le dénombrement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 49 ; 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Avec Eléazar, le prêtre, et les chefs de famille de la communauté, fais le dénombrement des prises de guerre, de tout ce qu''on a capturé, les humains et les bêtes. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur le '
