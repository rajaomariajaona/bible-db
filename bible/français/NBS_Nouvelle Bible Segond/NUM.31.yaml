document_id: NUM.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La guerre contre les Madianites
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'tous leurs campements  : litt. toutes leurs tentes.'
  - type: text
    content: 'Ils mirent le feu à toutes les villes qu''ils habitaient et à tous leurs campements. '
  '11':
  - type: text
    content: 'Ils prirent tout le butin, toutes les prises de guerre, les humains et les bêtes ; '
  '12':
  - type: note
    content: 'qui campaient  : litt. au camp. –  dans les plaines arides de Moab… 22.1n.'
  - type: text
    content: ils amenèrent les captifs, les prises de guerre et le butin à Moïse, à Eléazar, le prêtre, et à la communauté des Israélites, qui campaient dans les plaines arides de Moab, près du Jourdain, en face de Jéricho.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'sortirent  : Smr et LXX ont lu le singulier, s''appliquant à Moïse.'
  - type: text
    content: 'Moïse, Eléazar, le prêtre, et tous les princes de la communauté sortirent à leur rencontre, hors du camp. '
  '14':
  - type: note
    content: 'Moïse s''irrita…  : cf. Ex 16.20 ; Lv 10.16ss. –  les commandants ou les responsables  ; le même terme a été souvent traduit par ceux qui furent recensés (1.45 ; 2.32 etc.). –  chefs de mille…  : cf. v. 5n,48 ; Ex 18.21.'
  - type: text
    content: 'Moïse s''irrita contre les commandants de la troupe, les chefs de mille et les chefs de cent, qui revenaient de l''expédition. '
  '15':
  - type: note
    content: 'Vous avez laissé…  : Smr et plusieurs versions anciennes ont lu pourquoi avez-vous… –  toutes les femmes  : litt. toute femelle.'
  - type: text
    content: 'Moïse leur dit : Vous avez laissé la vie à toutes les femmes ? '
  '16':
  - type: note
    content: 'Ce sont elles…  : cf. 25.1ss,6ss. –  par la parole de Balaam  : cette parole de Balaam, traditionnellement interprétée comme un conseil visant à faire pécher les Israélites pour leur attirer la malédiction de Dieu, n''est pas évoquée dans les chap. 22–24 ; autre traduction possible dans l''affaire de Balaam, tournure presque identique dans la suite pour dans l''affaire de Péor (23.28ss ; 25.3ss,18) ; cf. 24.14n  ; 2P 2.15 ; Ap 2.14. –  ont entraîné…  : le texte hébreu porte un verbe mal connu ; à une autre forme, il est traduit par recruter au v. 5 ; autre traduction ont enseigné le sacrilège. –  le fléau 25.8.'
  - type: text
    content: 'Ce sont elles qui, par la parole de Balaam, ont entraîné les Israélites au sacrilège envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans l''affaire de Péor ; c''est alors que le fléau frappa la communauté du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'Cf. 21.2s ; Dt 20.13ss ; Jg 21.11. –  tout mâle  : litt. tout mâle parmi les familles (ou parmi les enfants  ; cf. Gn 34.29n). –  qui a couché…  : litt. qui a connu un homme en couchant avec un mâle  ; formule analogue aux v. 18,35 ; cf. Gn 4.1n.'
  - type: text
    content: 'Maintenant, tuez tout mâle et tuez toute femme qui a couché avec un homme en ayant des relations avec lui ; '
  '18':
  - type: note
    content: 'toutes les filles  : litt. tous les enfants (v. 17n) d''entre les femmes  ; cf. Dt 21.10ss ; Jg 21.12. –  gardez-les en vie  : sous-entendu dans le texte.'
  - type: text
    content: 'mais toutes les filles qui n''ont jamais couché avec un mâle, gardez-les en vie pour vous. '
  '19':
  - type: note
    content: 'Cf. 19.11s,18s ; Lv 11.32. –  ôteront leur péché  : cf. v. 12+,20.'
  - type: text
    content: 'Et vous, campez pendant sept jours hors du camp ; tous ceux d''entre vous qui ont tué quelqu''un et tous ceux qui ont touché un cadavre ôteront leur péché le troisième et le septième jour – vous et vos captifs. '
  '2':
  - type: note
    content: Madianites 25.16ss ; cf. 10.29ss ; Gn 25.2ss ; Ex 2.15ss ; 18.1ss. –  réuni… 20.24n  ; cf. 27.12ss.
  - type: text
    content: 'Venge les Israélites des Madianites ; ensuite tu seras réuni aux tiens. '
  '20':
  - type: note
    content: 'tout ouvrage de poil de chèvre  : litt. tout ouvrage de chèvre.'
  - type: text
    content: Vous ôterez aussi le péché de tout vêtement, de tout objet de peau, de tout ouvrage de poil de chèvre et de tout ustensile de bois.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.2ss. –  ce que prescrit la loi  : autre traduction une prescription de la loi . –  donnée  : le verbe correspondant est aussi traduit par ordonner, instituer.'
  - type: text
    content: 'Eléazar, le prêtre, dit aux soldats qui étaient allés au combat : Voici ce que prescrit la loi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a donnée à Moïse. '
  '22':
  - type: text
    content: 'L''or, l''argent, le bronze, le fer, l''étain et le plomb, '
  '23':
  - type: note
    content: l'eau lustrale 19.9n,17s.
  - type: text
    content: 'tout objet qui peut aller au feu, vous le ferez passer par le feu, et il sera pur. Mais c''est par l''eau lustrale que sera ôté le péché de tout ce qui ne peut pas aller au feu ; vous le ferez passer dans l''eau. '
  '24':
  - type: note
    content: 'Vous laverez…  : cf. Lv 14.8.'
  - type: text
    content: Vous laverez vos vêtements le septième jour, et vous serez purs ; ensuite vous pourrez rentrer dans le camp.
  - type: heading
    content: Le partage du butin
  '25':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '26':
  - type: note
    content: Cf. v. 53+. –  Eléazar, le prêtre 17.2+. –  le dénombrement v. 49 ; 1.2n.
  - type: text
    content: 'Avec Eléazar, le prêtre, et les chefs de famille de la communauté, fais le dénombrement des prises de guerre, de tout ce qu''on a capturé, les humains et les bêtes. '
  '27':
  - type: note
    content: Sur le partage des prises de guerre, cf. v. 36ss,42ss ; voir 1S 30.24s ; voir aussi Gn 14.21ss ; Jos 22.8 ; Jg 5.30 ; 8.24s ; 2S 8.7s ; Es 9.2.
  - type: text
    content: 'Partage les prises de guerre entre les combattants qui ont pris les armes d''une part, et toute la communauté d''autre part. '
  '28':
  - type: note
    content: 'cinq cents  : LXX lit cinquante, comme au v. 30, et modifie les chiffres des v. 36-40 en conséquence ; cf. 18.26ss.'
  - type: text
    content: 'Tu prélèveras sur la portion des soldats qui ont combattu, de ceux qui ont pris les armes, un tribut pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : un sur cinq cents parmi les humains, le gros bétail, les ânes et le petit bétail. '
  '29':
  - type: note
    content: 'Vous le prendrez  : Smr et Syr ont lu un singulier. –  prélèvement  : cf. 5.9+ ; 15.18ss ; 18.8ss.'
  - type: text
    content: 'Vous le prendrez sur la moitié qui leur revient, et tu le donneras à Eléazar, le prêtre, comme prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: 'prennent les armes…  : autre traduction s''équipent pour l''armée  ; cf. 32.17,20. –  vengeance du Seigneur  : cf. Jr 50.15,28 ; 51.11 ; Ez 25.14ss ; voir aussi Dt 32.43 ; Jr 5.9,29 ; 9.8 ; 46.10 ; 51.36 ; Na 1.2. –  contre Madiân Jg 6–8 ; Es 9.3 ; 10.26 ; Ps 83.10.'
  - type: text
    content: 'Moïse dit au peuple : Que des hommes parmi vous prennent les armes et forment une armée contre Madiân, afin d''exécuter la vengeance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre Madiân. '
  '30':
  - type: note
    content: 'un sur cinquante  : litt. un saisi (ou choisi  ; le même verbe est rendu par prendre en 1Ch 24.6) sur cinquante  ; cf. v. 28n  ; de même au v. 47. –  lévites 8.6+. –  qui assurent le service v. 47 ; 1.53+ ; 3.7n.'
  - type: text
    content: 'Sur la moitié qui revient aux Israélites tu prendras un sur cinquante parmi les humains, le gros bétail, les ânes, le petit bétail et toutes les bêtes ; tu le donneras aux lévites, qui assurent le service de la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Moïse et Eléazar, le prêtre, firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse. '
  '32':
  - type: text
    content: 'Les prises de guerre, le reste de ce qu''avaient pillé les gens de l''armée, étaient de 675 000 têtes de petit bétail, '
  '33':
  - type: text
    content: '72 000 têtes de gros bétail, '
  '34':
  - type: text
    content: '61 000 ânes '
  '35':
  - type: note
    content: 'femmes  : litt. être (ou vie, cf. Gn 1.20n) d''humain (c.-à-d. personnes, comme aux v. 40,46) d''entre les femmes. –  qui n''avaient jamais… v. 17n.'
  - type: text
    content: et 32 000 femmes qui n'avaient jamais couché avec un homme.
  '36':
  - type: text
    content: ' '
  - type: note
    content: V. 27+.
  - type: text
    content: 'La moitié qui constituait la part de ceux qui avaient pris les armes fut de 337 500 têtes de petit bétail, '
  '37':
  - type: note
    content: Cf. v. 28n.
  - type: text
    content: 'soit 675 de tribut pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; '
  '38':
  - type: text
    content: '36 000 têtes de gros bétail, dont 72 de tribut pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; '
  '39':
  - type: text
    content: '30 500 ânes, dont 61 de tribut pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; '
  '4':
  - type: note
    content: 'mille hommes (litt. un millier, cf. v. 5n) de chaque tribu  : voir 1.16n.'
  - type: text
    content: 'Vous enverrez à l''armée mille hommes de chaque tribu, de toutes les tribus d''Israël. '
  '40':
  - type: note
    content: personnes v. 35n.
  - type: text
    content: 'et 16 000 personnes, dont 32 de tribut pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '41':
  - type: text
    content: 'Moïse donna le tribut, le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: ', à Eléazar, le prêtre, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: V. 27+.
  - type: text
    content: 'La moitié qui revenait aux Israélites et que Moïse mit à part de celle qui revenait aux hommes de l''armée, '
  '43':
  - type: text
    content: 'celle qui constituait la part de la communauté, fut de 337 500 têtes de petit bétail, '
  '44':
  - type: text
    content: '36 000 têtes de gros bétail, '
  '45':
  - type: text
    content: '30 500 ânes '
  '46':
  - type: note
    content: personnes v. 35n.
  - type: text
    content: 'et 16 000 personnes. '
  '47':
  - type: note
    content: un sur cinquante v. 30n.
  - type: text
    content: 'Sur cette moitié qui revenait aux Israélites, Moïse prit un sur cinquante, et il le donna aux lévites, qui assurent le service de la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  - type: heading
    content: L'offrande volontaire pour Dieu
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.2ss ; Jg 8.24ss. –  Les commandants… v. 14. –  des phratries  : le même terme est traduit par mille dans la suite ; autres traductions des milliers ; des contingents v. 5n  ; 1.16n.'
  - type: text
    content: 'Les commandants des phratries de l''armée, les chefs de mille et les chefs de cent, se présentèrent devant Moïse. '
  '49':
  - type: note
    content: 'Nous  : litt. tes serviteurs. –  dénombrement v. 26+. –  sous nos ordres  : litt. dans notre main.'
  - type: text
    content: 'Ils dirent à Moïse : Nous avons fait le dénombrement des soldats qui étaient sous nos ordres : il ne nous manque pas un seul homme. '
  '5':
  - type: note
    content: 'phratries et mille hommes traduisent le même mot hébreu, également rendu par milliers au v. 14 ; voir 1.16n  ; 10.4,36. –  douze mille  : cf. Jg 21.10. –  hommes armés  : litt. ayant pris les armes (ou équipés) pour l''armée, cf. v. 3n.'
  - type: text
    content: 'On recruta d''entre les phratries d''Israël mille hommes de chaque tribu, soit douze mille hommes armés. '
  '50':
  - type: note
    content: 'Il semble que ce présent s''ajoute au prélèvement des v. 25-47 ; cf. 5.10 ; 6.2 ; 15.3 ; 30.3ss ; voir aussi Ex 35.22. –  faire sur nous-mêmes l''expiation…  : cf. Ex 30.12ss ; 2S 24 ; 1Ch 21.'
  - type: text
    content: 'Nous offrons chacun, comme présent pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', les objets d''or que nous avons trouvés : chaînettes, bracelets, bagues à cachet, boucles d''oreille et médaillons, afin de faire sur nous-mêmes l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '51':
  - type: note
    content: 'reçurent  : le même verbe hébreu est traduit par prendre au v. 54.'
  - type: text
    content: 'Moïse et Eléazar, le prêtre, reçurent d''eux l''or de tous ces objets travaillés. '
  '52':
  - type: note
    content: '16 750 sicles  : environ 165 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Tout l''or que les chefs de mille et les chefs de cent avaient prélevé pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pesait 16 750 sicles. '
  '53':
  - type: note
    content: 'avaient pillé  : cf. v. 26ss ; Jos 7.21 ; 1S 30.22 ; 2R 7.8ss.'
  - type: text
    content: 'Les hommes de l''armée avaient pillé chacun pour son compte. '
  '54':
  - type: note
    content: 'Eléazar, le prêtre 17.2+. –  l''or  : cf. Jos 6.19 ; 2S 8.11 ; 2R 12.5s. –  en évocation…  : autre traduction pour rappeler le souvenir des Israélites… 10.10+.'
  - type: text
    content: 'Moïse et Eléazar, le prêtre, prirent l''or des chefs de mille et des chefs de cent et l''apportèrent à la tente de la Rencontre, en évocation pour les Israélites devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: note
    content: 'à l''armée ou à la guerre, précision omise par LXX qui ajoute avec leur puissance, c.-à-d., peut-être, avec leurs armes. –  Phinéas, le fils d''Eléazar, le prêtre 17.2+ ; 25.7+ss ; cf. Dt 20.2ss. –  les ustensiles sacrés  : autre traduction les objets du sanctuaire ; Targum (Tg) du pseudo-Jonathan : les ourim et les toummim (ou l''ourim et le toummim) de sainteté. –  les trompettes de l''acclamation  : cf. 10.2ss,5n,9+ ; Jos 6.5s,20 ; Jg 7.16ss.'
  - type: text
    content: Moïse envoya à l'armée ces mille hommes de chaque tribu, et avec eux Phinéas, le fils d'Eléazar, le prêtre, qui portait les ustensiles sacrés et les trompettes de l'acclamation.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ils prirent les armes…  : autre traduction ils firent la guerre à Madiân . –  tous les mâles  : cf. v. 17 ; Dt 20.13.'
  - type: text
    content: 'Ils prirent les armes contre Madiân, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse : ils tuèrent tous les mâles. '
  '8':
  - type: note
    content: 'Ils tuèrent…  : litt. ils tuèrent les rois de Madiân sur leurs transpercés, c.-à-d. sur les cadavres de leurs sujets ou en plus de leurs sujets. –  les rois de Madiân sont appelés princes en Jos 13.21. –  Tsour  : cf. 25.15. –  Balaam  : cf. v. 16 ; 22.5nss.'
  - type: text
    content: 'Ils tuèrent en outre, lors de ce massacre, les rois de Madiân : Evi, Réqem, Tsour, Hour et Réba, cinq rois de Madiân ; ils tuèrent aussi par l''épée Balaam, fils de Béor. '
  '9':
  - type: note
    content: 'V. 17 ; Dt 20.13ss. –  des Madianites  : litt. de Madiân. –  toutes leurs familles (à eux, c.-à-d. les familles des Madianites) : autre traduction leurs enfants  ; cf. Gn 34.29n.'
  - type: text
    content: 'Les Israélites emmenèrent captives les femmes des Madianites avec toutes leurs familles, et ils pillèrent toutes leurs bêtes, tous leurs troupeaux et toutes leurs richesses. '
