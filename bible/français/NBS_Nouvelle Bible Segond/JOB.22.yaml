document_id: JOB.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention d''Eliphaz : Job est sûrement coupable'
  - type: text
    content: 'Eliphaz le Témanite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pièges 8.8+. –  frayeur  : cf. 6.4+.'
  - type: text
    content: C'est pour cela que tu es entouré de pièges
  - type: text
    content: et que la frayeur t'épouvante soudain.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ténèbres 19.8+. –  eaux abondantes  : même expression en 38.34.'
  - type: text
    content: Ne vois-tu donc pas ces ténèbres,
  - type: text
    content: ces eaux abondantes qui te recouvrent ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la hauteur  : litt. la tête . Cf. 11.8 ; 35.5 ; Es 40.22 ; Ec 5.1.'
  - type: text
    content: Dieu n'est-il pas en haut, dans le ciel ?
  - type: text
    content: Regarde la hauteur des étoiles, comme elles sont élevées !
  '13':
  - type: text
    content: ' '
  - type: note
    content: Es 29.15 ; Ps 73.11 ; 94.7. –  obscurité (ou nuée ) épaisse 38.9 ; Ex 20.21n.
  - type: text
    content: 'Et tu dis : « Qu''est-ce que Dieu connaît ?'
  - type: text
    content: Peut-il juger à travers l'obscurité épaisse ?
  '14':
  - type: text
    content: Les nuages sont un secret pour lui, il ne voit rien ;
  - type: text
    content: il parcourt le cercle du ciel. »
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 6.5,12s.
  - type: text
    content: Eh quoi ! tu voudrais garder la route d'autrefois,
  - type: text
    content: celle qu'ont suivie les hommes malfaisants ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 24.39.
  - type: text
    content: Ils ont été saisis avant le temps,
  - type: text
    content: leurs fondations sont un fleuve qui s'écoule.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '21.14+. –  le Puissant v. 23ss ; 5.17n. –  pour eux  : LXX et Syr ont lu pour nous.'
  - type: text
    content: 'Ils disaient à Dieu : « Ecarte-toi de nous ! »'
  - type: text
    content: Qu'est-ce que le Puissant peut faire pour eux ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'C''est lui…  : cf. Os 2.10. –  loin de moi  : LXX loin de lui . Cf. 21.16n.'
  - type: text
    content: C'est lui pourtant qui avait rempli de biens leurs maisons.
  - type: text
    content: Les projets des méchants sont bien loin de moi !
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 58.11 ; 107.42 ; Ap 18.20.
  - type: text
    content: Les justes le verront et se réjouiront,
  - type: text
    content: 'et l''innocent se moquera d''eux :'
  '2':
  - type: text
    content: Un homme peut-il être utile à Dieu ?
  - type: text
    content: L'homme de bon sens n'est utile qu'à lui-même.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'profit  : litt. reste.'
  - type: text
    content: « Celui qui se dressait contre nous n'a-t-il pas disparu ?
  - type: text
    content: Le feu n'a-t-il pas dévoré leur profit ? »
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.5+ ; Es 27.5 ; Rm 5.10+. –  avec Dieu  : litt. avec lui . –  ce qui te reviendra  : le même terme est traduit par récoltes en 31.12.'
  - type: text
    content: Accorde-toi avec Dieu, je t'en prie, et tu auras la paix ;
  - type: text
    content: par là, ce qui te reviendra sera bon.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'enseignement  : hébreu tora , habituellement traduit par loi  ; cf. 23.12 ; Es 1.10n  ; Pr 1.8n. – Voir cœur.'
  - type: text
    content: Reçois de sa bouche l'enseignement, je t'en prie,
  - type: text
    content: et mets ses paroles dans ton cœur.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 30.2-10 ; 1R 8.46-51 ; Es 44.22. –  Puissant v. 17+. –  rétabli  : litt. (re)construit.'
  - type: text
    content: Si tu reviens au Puissant, tu seras rétabli,
  - type: text
    content: tu éloigneras l'injustice de ta tente.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 31.24 ; Mt 6.19-21 ; 19.21. –  or  : le premier mot hébreu ainsi traduit dans ce verset est rare : il pourrait désigner le minerai d''or extrait de la terre. –  or d''Ophir 28.16 ; 1R 9.28. –  oueds ou torrents, ravins , comparer 20.17 avec 30.6 ; cf. Gn 26.17n.'
  - type: text
    content: Jette l'or dans la poussière,
  - type: text
    content: l'or d'Ophir parmi les cailloux des oueds ;
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps 16.5s ; 73.26 ; Lm 3.24.
  - type: text
    content: le Puissant sera ton or,
  - type: text
    content: il sera pour toi des monceaux d'argent.
  '26':
  - type: text
    content: ' '
  - type: note
    content: délices 27.10 ; cf. Es 58.14. –  tu élèveras vers Dieu ta face 11.15.
  - type: text
    content: Alors tu feras du Puissant tes délices,
  - type: text
    content: tu élèveras vers Dieu ta face ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. 33.26 ; Ex 8.4n  ; voir aussi Na 2.1 ; Ps 66.13 ; 116.18 ; Ec 5.3s.
  - type: text
    content: tu le supplieras, il t'entendra,
  - type: text
    content: et tu t'acquitteras de tes vœux.
  '28':
  - type: text
    content: Si tu prends une décision, elle se réalisera pour toi ;
  - type: text
    content: sur tes sentiers brillera la lumière.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Si certains s''abaissent… l''orgueil ! Cette phrase difficile a donné lieu à plusieurs interprétations. On a aussi compris si certains sont affligés (cf. 10.15n) , tu leur diras : « Debout ! », et Dieu sauvera… Certains modifient le texte hébreu traditionnel pour lire car il abaisse la parole d''orgueil, et il sauvera… Cf. Es 57.15 ; Ps 18.28.'
  - type: text
    content: 'Si certains s''abaissent, tu diras : « C''est l''orgueil !'
  - type: text
    content: Dieu sauve celui qui baisse les yeux. »
  '3':
  - type: text
    content: ' '
  - type: note
    content: 35.7s ; cf. 19.4 ; voir aussi Lc 17.9s. –  Puissant 5.17n. – Voir justice.
  - type: text
    content: Cela fait-il plaisir au Puissant que tu sois juste ?
  - type: text
    content: Si tu es intègre dans tes voies, qu'y gagne-t-il ?
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'même le coupable  : litt. le non-innocent  ; des versions anciennes ont lu l''innocent ou l''homme innocent (ce qui correspondrait à une variante d''une lettre dans le texte hébreu). Cf. 42.8 ; Ez 14.12-20. –  pureté 9.30n. –  de tes mains  : certains modifient le texte hébreu traditionnel pour lire de ses mains  ; cf. v. 23 ; 11.13ss.'
  - type: text
    content: Il délivrera même le coupable,
  - type: text
    content: qui devra sa délivrance à la pureté de tes mains.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ta piété  : litt. ta crainte , voir 4.6n  ; 15.4n  ; on pourrait à la rigueur comprendre ici  : à cause de la crainte que Dieu aurait de toi . –  jugement 9.3+.'
  - type: text
    content: Est-ce à cause de ta piété qu'il te châtie,
  - type: text
    content: qu'il entre en jugement avec toi ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'N''y a-t-il pas…  : autre traduction n''as-tu pas fait beaucoup de mal ?'
  - type: text
    content: N'y a-t-il pas beaucoup de mal en toi ?
  - type: text
    content: Tes fautes ne sont-elles pas sans limite ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'gages 24.3,9 ; Ex 22.25+ ; Dt 24.6,10-13 ; Ez 18.12. –  nus  : cf. 31.19s.'
  - type: text
    content: Tu prenais sans raison des gages à tes frères,
  - type: text
    content: tu leur arrachais leurs vêtements et tu les laissais nus ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 31.17 ; cf. Es 58.7 ; Mt 25.42-45.
  - type: text
    content: tu ne donnais pas d'eau à l'homme épuisé,
  - type: text
    content: tu refusais du pain à l'homme affamé.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme fort  : litt. l''homme de bras , cf. 29.17+ ; 35.9n. –  favori  : litt. élevé de face (cf. Es 3.3n). D''autres comprennent l''orgueilleux.'
  - type: text
    content: Le pays appartenait à l'homme fort,
  - type: text
    content: c'est le favori qui s'y installait.
  '9':
  - type: text
    content: ' '
  - type: note
    content: veuves / orphelins 24.3ss ; 29.12s ; 31.16s ; cf. Ex 22.21 ; Dt 15.7-11 ; Es 1.17. –  étaient brisés (ou écrasés , cf. 5.4 ; 6.9 ; 19.2 ; 34.25) ; des versions anciennes ont lu la 2e personne (LXX tu faisais tort aux orphelins ).
  - type: text
    content: Tu renvoyais les veuves les mains vides ;
  - type: text
    content: les bras des orphelins étaient brisés.
