document_id: HOS.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: En religion comme en politique, Israël oublie Dieu
  - type: text
    content: ' '
  - type: note
    content: 'trompe 5.8+. –  Un aigle fond  : litt. comme un aigle ou un vautour  ; cf. Dt 28.39 ; Jr 48.40 ; 49.22 ; Ha 1.8. –  la maison du Seigneur  : il s''agit peut-être ici d''Israël dans son ensemble ; cf. 9.15 ; Jr 12.7 ; 1Ch 17.14. –  ils ont passé outre à mon alliance 6.7+.'
  - type: text
    content: Embouche la trompe !
  - type: text
    content: Un aigle fond
  - type: text
    content: 'sur la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: parce qu'ils ont passé outre à mon alliance
  - type: text
    content: et se sont révoltés contre ma loi.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'bientôt  : autre traduction un peu . –  ils souffriront… roi des princes (le roi d''Assyrie, cf. 5.13n) : LXX ils cesseront d''oindre roi et princes.'
  - type: text
    content: Quand bien même ils ont payé le prix parmi les nations,
  - type: text
    content: maintenant je vais les rassembler,
  - type: text
    content: et bientôt ils souffriront
  - type: text
    content: sous le fardeau du roi des princes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale. –  autels 10.1 ; 12.12. –  pour pécher  : certains comprennent, à la première occurrence  : pour (ôter) le péché.'
  - type: text
    content: Ephraïm a multiplié les autels pour pécher,
  - type: text
    content: et les autels sont devenus pour lui une occasion pour pécher.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'tous les détails  : litt. les quantités ; l''abondance ou les myriades , terme apparenté à multiplier ( ?) au v. 11 ; texte et traduction incertains.'
  - type: text
    content: Que j'écrive pour lui tous les détails de ma loi,
  - type: text
    content: ils sont considérés comme quelque chose d'étranger.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'qu''ils m''offrent  : le terme hébreu n''apparaît qu''ici ; autres traductions qu''ils brûlent en mon honneur ; pour l''amour de moi . Cf. 6.6 ; Am 5.22. –  se souvient 7.2+. –  en Egypte 9.3 ; 11.5 ; Dt 28.68.'
  - type: text
    content: Ils sacrifient des bêtes qu'ils m'offrent,
  - type: text
    content: 'et ils en mangent la viande :'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne les agrée pas.'
  - type: text
    content: Maintenant il se souvient de leurs fautes,
  - type: text
    content: 'et il leur fait rendre des comptes pour leurs péchés :'
  - type: text
    content: eux, ils retourneront en Egypte.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'oublié 2.15+. –  des demeures luxueuses  : le mot qui apparaît ici est traduit ailleurs par temple(s)  ; cf. Es 39.7n  ; c''est un synonyme qui est traduit à la fin du v. par palais  ; cf. Am 1.4n.'
  - type: text
    content: Israël a oublié celui qui le fait
  - type: text
    content: et il a bâti des demeures luxueuses
  - type: text
    content: – Quant à Juda, il a multiplié les villes fortes.
  - type: text
    content: J'enverrai un feu dans leurs villes,
  - type: text
    content: et il en dévorera les palais.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.22+ ; 4.1+ ; 6.3 ; Jr 14.8s.
  - type: text
    content: 'Ils crieront vers moi :'
  - type: text
    content: Mon Dieu ! Nous te connaissons, nous, Israël !
  '3':
  - type: text
    content: Israël a rejeté le bien ;
  - type: text
    content: un ennemi le poursuivra.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ils se sont donné (ou ils ont fait ) des rois sans mon ordre (litt. pas par moi ) : cf. 7.7n  ; 1S 8.1-8 ; 10.19. –  bon moyen de les perdre ! traduction incertaine, litt. pour qu''il soit perdu (ou retranché ). On a aussi compris pour qu''Israël soit retranché , ou encore pour que les idoles soient retranchées.'
  - type: text
    content: Ils se sont donné des rois sans mon ordre
  - type: text
    content: et des princes à mon insu.
  - type: text
    content: Avec leur argent et leur or
  - type: text
    content: ils se sont fait des idoles
  - type: text
    content: – bon moyen de les perdre !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Il (c.-à-d. le Seigneur ) a rejeté (même verbe au v. 3) …  : d''autres comprennent il a été rejeté . –  ton taurillon ou ton veau  : allusion à l''image vénérée dans le culte national du royaume du Nord, sans doute censée représenter le Seigneur  ; voir « Le “veau d''or” » ; 10.5s ; 13.2 ; 1R 12.26-33 ; 2R 17.16 ; cf. Ex 32.4n,8 ; Dt 19.16 ; Ps 106.19 ; Né 9.18 ; 2Ch 11.15 ; 13.8 ; Ac 7.41. –  Samarie 7.1n. –  seront-ils incapables…  : traduction incertaine ; on a aussi compris jusqu''à quand pourront-ils rester impunis ?'
  - type: text
    content: Il a rejeté ton taurillon, Samarie !
  - type: text
    content: Je suis en colère contre eux.
  - type: text
    content: Jusqu'à quand seront-ils incapables de parvenir à l'innocence ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sera mis en pièces  : traduction incertaine.'
  - type: text
    content: Car il provient d'Israël,
  - type: text
    content: un artisan l'a fait,
  - type: text
    content: ce n'est pas un dieu !
  - type: text
    content: C'est pourquoi le taurillon de Samarie sera mis en pièces.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.13 ; 12.2 ; 13.15 ; Pr 22.8 ; Jb 4.8 ; Ga 6.7.
  - type: text
    content: Puisqu'ils ont semé du vent,
  - type: text
    content: ils moissonneront l'ouragan ;
  - type: text
    content: ils n'auront pas une tige de blé ;
  - type: text
    content: ce qui poussera ne donnera pas de farine,
  - type: text
    content: s'il y en avait,
  - type: text
    content: des étrangers l'engloutiraient.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'comme un objet…  : cf. Jr 22.28 ; 48.38.'
  - type: text
    content: Israël est englouti !
  - type: text
    content: Maintenant ils sont parmi les nations
  - type: text
    content: comme un objet dont personne ne veut plus.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Le mot hébreu traduit par âne sauvage fait assonance avec le nom d’ Ephraïm (4.17n  ; cf. 9.16n). –  le prix des amours  : allusion à l''idolâtrie (1.2n  ; 2.7) ou à l''alliance avec l''Assyrie (5.13+), qui avait coûté cher à Israël (2R 15.19s ; 16.8) ; cf. Ez 16.33s.'
  - type: text
    content: Car eux, ils sont montés en Assyrie.
  - type: text
    content: L'âne sauvage se tient à l'écart,
  - type: text
    content: quant à Ephraïm, il paie le prix des amours.
