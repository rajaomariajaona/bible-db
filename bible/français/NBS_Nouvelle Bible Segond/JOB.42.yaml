        marker: fr
        children:
        - type: text
          text: '42.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans tout le pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur toute la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'part de son patrimoine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 27.1-11 ; 36.1-13 ; cf. Gn 36.12,14,40s ; Pr 31.16.
      marker-yv: yv-n
    - type: text
      text: Il ne se trouvait pas dans tout le pays d'aussi belles femmes que les filles de Job. Leur père leur donna une part de son patrimoine avec leurs frères.
  '16':
  - type: usfm
    marker: p
