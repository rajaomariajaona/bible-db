      marker-yv: yv-n
    - type: text
      text: Job vécut encore cent quarante ans après cela ; il vit ses fils et les fils de ses fils jusqu'à la quatrième génération.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
