          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Nb 14.15 ; Dt 2.25 ; Es 66.19 ; Na 3.19 ; Ha 3.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon œil t''a vu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.27+.
      marker-yv: yv-n
    - type: text
