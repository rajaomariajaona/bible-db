      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 24.22.
      marker-yv: yv-n
    - type: text
      text: 'Tous ses frères, toutes ses sœurs et toutes ses connaissances d''autrefois vinrent vers lui et mangèrent avec lui, dans sa maison. Ils le plaignirent et le consolèrent de tous les malheurs que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait fait venir sur lui, et ils lui donnèrent chacun une qesita et un anneau d''or. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la fin de Job… son commencement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.3 ; 8.6s ; Dt 8.16 ; Jc 5.11.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' bénit la fin de Job plus que son commencement. Il eut aussi 14 000 têtes de petit bétail, 6 000 chameaux, 1 000 paires de bœufs et 1 000 ânesses. '
