      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il est écrit qu''il se relèvera avec ceux que le Seigneur relève. D''après le livre syriaque, il vivait au pays d''Ausis, à la frontière d''Edom et de l''Arabie, et il portait précédemment le nom de Yobab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Gn 36.33) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '. Il avait pris pour femme une Arabe et avait engendré un fils du nom d''Ennon. Lui-même était le fils de Zaré, son père, l''un des fils d''Esaü, et de Bosorra, sa mère ; il était descendant d''Abraham à la cinquième génération. Or voici les rois qui régnèrent en Edom, où lui aussi a dominé : d''abord Balak, fils de Beor, le nom de sa ville étant Dennaba ; après Balak, Yobab qui fut appelé Job ; après lui, Asom, le gouverneur du pays de Témân ; après lui Adad, fils de Barad, qui a détruit Madiân dans les plaines de Moab, le nom de sa ville étant Gethaïm. Quant aux amis qui vinrent le voir, ce sont Eliphaz [fils de Sophân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sophar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '], d''entre les fils d''Esaü, roi des Témanites ; Bildad, fils d''Ammon [fils de Khobar], chef des Sauhites ; Sophar, roi des Minéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Maonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Puis Job mourut, âgé et rassasié de jours.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.2 '
      - type: usfm
        marker: fq
        children:
