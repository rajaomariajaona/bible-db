        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 34.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Autres traductions classiques '
      - type: usfm
