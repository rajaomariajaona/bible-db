  - type: usfm
    marker: q1
    children:
    - type: text
      text: maintenant mon œil t'a vu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je renonce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; le verbe hébreu est traduit le plus souvent par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rejeter, mépriser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
