document_id: JOB.42,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Seconde réponse de Job
  - type: text
    content: 'Job répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'rétablit la situation  : sur la formule hébraïque correspondante, voir Dt 30.3n  ; Jr 29.14n  ; Ez 16.53n  ; Ps 126.1n,4. –  quand celui-ci eut prié  : autres traductions tandis qu''il priait ; parce qu''il priait . –  lui accorda…  : litt. ajouta au double tout ce qui était à Job  ; 5.11+ ; 8.7 ; Dt 30.3-5 ; Ps 90.15.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rétablit la situation de Job, quand celui-ci eut prié pour ses amis ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui accorda le double de tout ce qu''il avait eu. '
  '11':
  - type: note
    content: 'frères… 19.13s ; Pr 14.20. –  mangèrent  : litt. mangèrent du pain. –  le plaignirent  : voir 2.11n. –  consolèrent  : cf. 21.34 ; Gn 37.35 ; Mt 5.4 ; Jn 11.19. –  qesita Gn 33.19n. –  anneau d''or Gn 24.22.'
  - type: text
    content: 'Tous ses frères, toutes ses sœurs et toutes ses connaissances d''autrefois vinrent vers lui et mangèrent avec lui, dans sa maison. Ils le plaignirent et le consolèrent de tous les malheurs que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait fait venir sur lui, et ils lui donnèrent chacun une qesita et un anneau d''or. '
  '12':
  - type: note
    content: 'la fin de Job… son commencement  : cf. 1.3 ; 8.6s ; Dt 8.16 ; Jc 5.11.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' bénit la fin de Job plus que son commencement. Il eut aussi 14 000 têtes de petit bétail, 6 000 chameaux, 1 000 paires de bœufs et 1 000 ânesses. '
  '13':
  - type: note
    content: '1.2. –  sept fils  : le texte hébreu traditionnel emploie une forme inhabituelle que quelques-uns comprennent deux fois sept (cf. Tg quatorze)'
  - type: text
    content: 'Il eut sept fils et trois filles. '
  '14':
  - type: note
    content: 'Yemima  : « Colombe » ( ?). –  Qetsia  : « Cinnamome » (ou « Cannelle »). –  Qéren-Pouk  : « Corne (c.-à-d. flacon, poudrier ; cf. 1S 16.1,13 ; 1R 1.29) de khôl ou de fard ».'
  - type: text
    content: 'Il appela la première du nom de Yemima, la deuxième du nom de Qetsia, et la troisième du nom de Qéren-Pouk. '
  '15':
  - type: note
    content: dans tout le pays ou sur toute la terre. –  part de son patrimoine Nb 27.1-11 ; 36.1-13 ; cf. Gn 36.12,14,40s ; Pr 31.16.
  - type: text
    content: Il ne se trouvait pas dans tout le pays d'aussi belles femmes que les filles de Job. Leur père leur donna une part de son patrimoine avec leurs frères.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''à la quatrième génération  : litt. quatre générations . Cf. Gn 50.23.'
  - type: text
    content: Job vécut encore cent quarante ans après cela ; il vit ses fils et les fils de ses fils jusqu'à la quatrième génération.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '5.26 ; cf. Gn 25.8. LXX ajoute  : il est écrit qu''il se relèvera avec ceux que le Seigneur relève. D''après le livre syriaque, il vivait au pays d''Ausis, à la frontière d''Edom et de l''Arabie, et il portait précédemment le nom de Yobab (cf. Gn 36.33) . Il avait pris pour femme une Arabe et avait engendré un fils du nom d''Ennon. Lui-même était le fils de Zaré, son père, l''un des fils d''Esaü, et de Bosorra, sa mère ; il était descendant d''Abraham à la cinquième génération. Or voici les rois qui régnèrent en Edom, où lui aussi a dominé : d''abord Balak, fils de Beor, le nom de sa ville étant Dennaba ; après Balak, Yobab qui fut appelé Job ; après lui, Asom, le gouverneur du pays de Témân ; après lui Adad, fils de Barad, qui a détruit Madiân dans les plaines de Moab, le nom de sa ville étant Gethaïm. Quant aux amis qui vinrent le voir, ce sont Eliphaz [fils de Sophân (ou Sophar ) ], d''entre les fils d''Esaü, roi des Témanites ; Bildad, fils d''Ammon [fils de Khobar], chef des Sauhites ; Sophar, roi des Minéens (ou Maonites , 2.11n).'
  - type: text
    content: Puis Job mourut, âgé et rassasié de jours.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'aucune pensée ne t''échappe  : autre traduction rien ne t''empêche de réaliser tes projets  ; tournure comparable en Gn 11.6n  ; cf. Mt 19.26 ; Lc 1.37.'
  - type: text
    content: Je sais que tu peux tout,
  - type: text
    content: et qu'aucune pensée ne t'échappe.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Qui est celui… 38.2. C'est vraisemblablement Job qui cite les paroles de Dieu, de même au v. 4. –  assombrit 6.16n  ; 28.21n. –  qui me dépassent 11.5s.
  - type: text
    content: – Qui est celui qui, sans connaissance, assombrit mes projets ? –
  - type: text
    content: Ainsi j'ai parlé, sans comprendre,
  - type: text
    content: de choses étonnantes qui me dépassent et que je ne connais pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 38.3.
  - type: text
    content: – Ecoute, je te prie ; moi, je parlerai ;
  - type: text
    content: je t'interrogerai, et tu m'instruiras. –
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Mon oreille…  : litt. à écoute d''oreille (= par ouï-dire ) je t''ai entendu , expression analogue en Ps 18.45n  ; voir aussi Nb 14.15 ; Dt 2.25 ; Es 66.19 ; Na 3.19 ; Ha 3.2. –  mon œil t''a vu 19.27+.'
  - type: text
    content: Mon oreille avait entendu parler de toi ;
  - type: text
    content: maintenant mon œil t'a vu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'je renonce  : traduction incertaine ; le verbe hébreu est traduit le plus souvent par rejeter, mépriser  ; son emploi ici, sans complément, ressemble à celui de 7.16n  ; 34.33n. Autres traductions classiques je me condamne, je me rétracte ou, selon un autre sens possible de la racine hébraïque correspondante, je me dissous  ; mais on pourrait aussi comprendre je (te) rejette . –  je me repens  : le verbe est habituellement traduit par regretter (Nb 23.19+) ; autre traduction je me console , cf. v. 11. –  poussière / cendre 2.8,12 ; Dn 9.3.'
  - type: text
    content: 'C''est pourquoi je renonce :'
  - type: text
    content: je me repens sur la poussière et la cendre.
  - type: heading
    content: ÉPILOGUE
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vous n''avez pas parlé de moi correctement  : autres traductions vous n''avez rien dit de valable à mon sujet ; vous n''avez rien dit qui puisse tenir devant moi  ; cf. 6.28-30 ; 13.7-10 ; 17.4 ; 27.4+. –  Job, mon serviteur 1.8 ; 2.3.'
  - type: text
    content: 'Après que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' eut dit cela à Job, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Eliphaz le Témanite : Je suis en colère contre toi et tes deux amis, parce que vous n''avez pas parlé de moi correctement, comme l''a fait Job, mon serviteur. '
  '8':
  - type: note
    content: 'Comparer d''une part avec 6.13s ; 9.33 où Job cherche en vain un appui face à Dieu, et d''autre part avec l''appel qui lui était fait, à lui, d''implorer le pardon en 8.5 ; 11.13 ; 22.27. –  sept taureaux / sept béliers Nb 23.1,29. –  priera pour vous  : cf. 1.5 ; Gn 20.7,17 ; Ex 32.11+ ; voir aussi Gn 18.22ss ; Nb 11.2 ; 21.7 ; Dt 9.20,26 ; 1S 7.5 ; 12.23 ; 1R 13.2 ; Jr 37.3 ; Am 7.2ss ; sur le rôle d''intercesseur de Job, voir aussi Ez 14.10s,16,18,20. –  par considération pour lui  : litt. si je relève sa face, formule analogue au v. 9 ; cf. 13.8n. Voir aussi 22.30n  ; Ez 14.20.'
  - type: text
    content: 'Prenez maintenant sept taureaux et sept béliers, allez vers Job, mon serviteur, et offrez un holocauste pour vous-mêmes. Job, mon serviteur, priera pour vous et, par considération pour lui, je ne vous traiterai pas à la mesure de votre folie, car vous n''avez pas parlé de moi correctement, comme l''a fait mon serviteur Job. '
  '9':
  - type: text
    content: 'Eliphaz le Témanite, Bildad le Shouhite et Tsophar le Naamatite s''en allèrent. Ils agirent comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit ; et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' eut de la considération pour Job.'
