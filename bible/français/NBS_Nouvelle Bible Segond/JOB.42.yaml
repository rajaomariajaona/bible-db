      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : « Cinnamome » (ou « Cannelle »). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qéren-Pouk
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : « Corne (c.-à-d. flacon, poudrier ; cf. 1S 16.1,13 ; 1R 1.29) de khôl ou de fard ».'
      marker-yv: yv-n
    - type: text
      text: 'Il appela la première du nom de Yemima, la deuxième du nom de Qetsia, et la troisième du nom de Qéren-Pouk. '
  '15':
  - type: usfm
    marker: p
    children:
