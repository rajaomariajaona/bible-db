    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui est celui… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '38.2. C''est vraisemblablement Job qui cite les paroles de Dieu, de même au v. 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'assombrit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 28.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui me dépassent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.5s.
      marker-yv: yv-n
    - type: text
      text: – Qui est celui qui, sans connaissance, assombrit mes projets ? –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi j'ai parlé, sans comprendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de choses étonnantes qui me dépassent et que je ne connais pas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 38.3.
      marker-yv: yv-n
    - type: text
      text: – Ecoute, je te prie ; moi, je parlerai ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'interrogerai, et tu m'instruiras. –
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mon oreille…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à écoute d''oreille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= '
      - type: usfm
