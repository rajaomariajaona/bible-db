          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Mt 19.26 ; Lc 1.37.'
      marker-yv: yv-n
    - type: text
      text: Je sais que tu peux tout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'aucune pensée ne t'échappe.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
