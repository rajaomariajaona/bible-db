      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple se ralliera à la parole du Messie.
    marker-yv: yv-n
  - type: text
    text: 'Dans les villes de la montagne, dans les villes du Bas-Pays, dans les villes du Néguev, au pays de Benjamin, aux environs de Jérusalem et dans les villes de Juda, on fera encore défiler le petit bétail pour le compter, dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renouveau de la dynastie de David
