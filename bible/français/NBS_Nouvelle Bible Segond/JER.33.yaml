  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées : Dans ce lieu réduit en ruines, où il n''y a plus ni humains ni bêtes, et dans toutes ses villes, il y aura un domaine pour les bergers qui y feront coucher leur petit bétail. '
