      - type: usfm
        marker: w
        children:
        - type: text
          text: Paix-de-Justice
      - type: text
        text: ' et Gloire-de-Piété. »'
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là Juda sera sauvé, Jérusalem demeurera en sécurité ; et voici comment on l''appellera : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est notre justice. » '
