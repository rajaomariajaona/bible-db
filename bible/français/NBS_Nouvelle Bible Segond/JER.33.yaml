  - type: text
    text: alors je pourrais rejeter la descendance de Jacob et de David, mon serviteur, et ne plus prendre dans sa descendance ceux qui gouverneront la descendance d'Abraham, d'Isaac et de Jacob. Je rétablirai leur situation, car j'ai compassion d'eux.
