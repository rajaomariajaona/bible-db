  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je rétablirai leur situation '
    - type: usfm
      marker: ft
      children:
      - type: text
