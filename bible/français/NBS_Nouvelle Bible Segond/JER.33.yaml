document_id: JER.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes reconstruites
  - type: text
    content: ' '
  - type: note
    content: détenu (32.2+ ; 36.5n) dans la cour de la garde 37.21+.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie une deuxième fois, pendant qu''il était encore détenu dans la cour de la garde :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 12 ; 32.43n. –  dévastées ou désertes.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : En ce lieu dont vous dites : Il est réduit en ruines, il n''y a plus là ni humains ni bêtes – dans les villes de Juda et dans les rues de Jérusalem, qui sont dévastées, où il n''y a plus ni humains, ni habitants, ni bêtes, on entendra de nouveau '
  '11':
  - type: note
    content: Cf. 7.34n  ; Es 51.3. –  Célébrez le Seigneur … Ps 106.1 ; 107.1 ; 136 ; 2Ch 5.13. –  sacrifices de reconnaissance 17.26+. –  je rétablirai v. 7+.
  - type: text
    content: 'les chants de gaieté et les chants de joie, les chants du marié et les chants de la mariée, les chants de ceux qui disent : « Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon, car sa fidélité est pour toujours ! », de ceux qui offrent des sacrifices de reconnaissance dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Car je rétablirai la situation du pays, comme par le passé, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: domaine 10.25+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Dans ce lieu réduit en ruines, où il n''y a plus ni humains ni bêtes, et dans toutes ses villes, il y aura un domaine pour les bergers qui y feront coucher leur petit bétail. '
  '13':
  - type: note
    content: '17.26n  ; 32.44. –  on fera encore…  : litt. le petit bétail passera encore aux mains de celui qui le compte  ; Tg  : le peuple se ralliera à la parole du Messie.'
  - type: text
    content: 'Dans les villes de la montagne, dans les villes du Bas-Pays, dans les villes du Néguev, au pays de Benjamin, aux environs de Jérusalem et dans les villes de Juda, on fera encore défiler le petit bétail pour le compter, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Renouveau de la dynastie de David
  '14':
  - type: text
    content: ' '
  - type: note
    content: Les v. 14-26 sont absents de LXX. –  la parole de bonheur ou la bonne parole  ; cf. 29.10.
  - type: text
    content: 'Les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où je réaliserai la parole de bonheur que j''ai dite sur la maison d''Israël et sur la maison de Juda. '
  '15':
  - type: note
    content: 23.5s.
  - type: text
    content: 'En ces jours-là, en ce temps-là, je ferai germer pour David un germe de justice ; il agira dans le pays selon l''équité et la justice. '
  '16':
  - type: note
    content: 'Jérusalem demeurera en sécurité…  : cf. Za 14.11. –  on l''appellera (elle, pronom féminin en hébreu, contre le masculin en 23.6n) : le nom est ici donné à Jérusalem  ; voir aussi Es 1.26+ ; Os 2.1 ; Za 8.3 ; Mt 5.48 ; Baruch 5.4 : « Il te donnera ce nom pour toujours : Paix-de-Justice et Gloire-de-Piété. »'
  - type: text
    content: 'En ces jours-là Juda sera sauvé, Jérusalem demeurera en sécurité ; et voici comment on l''appellera : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est notre justice. » '
  '17':
  - type: note
    content: 'David aura toujours…  : litt. il ne sera pas retranché à David d''homme assis sur le trône…, tournure analogue au v. 18 comme en 1R 2.4n  ; 8.25 ; 9.5 ; 2Ch 6.16 ; cf. 2S 17.16.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : David aura toujours un successeur assis sur le trône de la maison d''Israël ; '
  '18':
  - type: note
    content: Litt. et aux prêtres-lévites il ne sera pas retranché d'homme de devant moi offrant holocauste, faisant fumer offrande et faisant sacrifice tous les jours  ; v. 17n,21 ; cf. Dt 17.9n.
  - type: text
    content: les prêtres-lévites auront toujours devant moi des successeurs pour offrir des holocaustes, faire fumer des offrandes et faire des sacrifices.
  - type: heading
    content: Une alliance irrévocable
  '19':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie : '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'qui fait ces choses  : litt. qui la fait… qui la façonne (Jérusalem ? cf. v. 10s) ; LXX qui fait la terre  ; certains modifient le texte hébreu traditionnel pour lire qui fait ce qui est, qui façonne ce qui vient…  ; cf. Es 41.23 ; 44.7 ; 45.11. –  son nom… 10.16+ ; cf. Am 5.8 ; 9.6.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui fait ces choses, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui les façonne et les met en place – son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) : '
  '20':
  - type: note
    content: 'rompre mon alliance  : cf. v. 25s ; 11.10+ ; 14.21 ; voir aussi 31.35s.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Si vous pouviez rompre mon alliance avec le jour et mon alliance avec la nuit, de telle sorte que le jour et la nuit n''arrivent plus en leur temps, '
  '21':
  - type: note
    content: 'avec David  : cf. 2S 23.5 ; Ps 89.4s,29s,35ss. –  les lévites, les prêtres… cf. v. 18 ; Nb 25.12-13+ ; Dt 17.9n  ; Ml 2.4-6. –  qui officient pour moi Nb 18.7.'
  - type: text
    content: 'alors elle pourrait aussi être rompue, mon alliance avec David, mon serviteur, de telle sorte qu''il n''ait pas de fils régnant sur son trône, et avec les lévites, les prêtres qui officient pour moi. '
  '22':
  - type: note
    content: le sable de la mer 15.8 ; cf. Gn 22.17 ; Es 10.22+. –  je multiplierai… 3.16+ ; 30.19.
  - type: text
    content: De même qu'on ne peut compter l'armée du ciel, ni mesurer le sable de la mer, de même je multiplierai les descendants de David, mon serviteur, et les lévites qui officient pour moi.
  '23':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie : '
  '24':
  - type: note
    content: 'Les deux clans 1.15n  ; il s''agit ou bien des familles de David et de Lévi (cf. v. 17s ; Za 12.12s), ou bien d''Israël et de Juda (50.4 ; Es 8.14 ; Ez 35.10 ; 37.15-19). –  il les a rejetés  : autre traduction il les méprise.'
  - type: text
    content: 'Ne vois-tu pas de quoi parle ce peuple ? Ils disent : Les deux clans que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait choisis, il les a rejetés. Ainsi ils méprisent mon peuple ; pour eux, ce n''est même plus une nation.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Si je n''avais pas fait…  : litt. s''il n''y avait mon alliance du jour et de la nuit  ; certains modifient le texte hébreu traditionnel pour lire si je n''avais pas créé le jour et la nuit  ; cf. v. 20s. –  lois 31.35n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Si je n''avais pas fait mon alliance avec le jour et la nuit, si je n''avais pas établi les lois du ciel et de la terre, '
  '26':
  - type: note
    content: Je rétablirai leur situation v. 7 ; 29.14n. –  compassion 31.20.
  - type: text
    content: alors je pourrais rejeter la descendance de Jacob et de David, mon serviteur, et ne plus prendre dans sa descendance ceux qui gouverneront la descendance d'Abraham, d'Isaac et de Jacob. Je rétablirai leur situation, car j'ai compassion d'eux.
  '3':
  - type: note
    content: Invoque-moi 29.12 ; Es 30.19 ; Ps 50.15. –  des choses cachées ou inaccessibles  ; cf. Es 48.6.
  - type: text
    content: 'Invoque-moi, et je te répondrai ; je t''annoncerai de grandes choses, des choses cachées, que tu ne connais pas. '
  '4':
  - type: note
    content: 'Texte et traduction incertains. –  des rois  : LXX et Vg ont lu le singulier. –  pour faire des remblais…  : litt. pour des remblais et pour l''épée ( ?) ; certains modifient le texte hébreu traditionnel pour lire sur les remblais et sur les ruines, ou bien pour bâtir des merlons et des créneaux (5) afin de combattre les Chaldéens…  ; cf. 32.24 ; Es 22.10.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, sur les maisons de cette ville et sur les maisons des rois de Juda, qui ont été démolies pour faire des remblais militaires, '
  '5':
  - type: note
    content: 'Cf. 7.20+ ; Dt 31.17. –  quand on est allé  : précision absente de LXX (v. 4n). –  pour remplir ces maisons  : litt. pour les remplir, antécédent incertain. –  en me détournant de…  : litt. en cachant ma face à…  ; cf. Ps 13.2+.'
  - type: text
    content: 'quand on est allé combattre les Chaldéens pour remplir ces maisons des cadavres des hommes que j''ai abattus dans ma colère et dans ma fureur, en me détournant de cette ville à cause du mal qu''ils avaient fait : '
  '6':
  - type: note
    content: 'Je la (la ville) rétablirai  : litt. je lui accorderai rétablissement (8.22n) et guérison 3.22+ ; 30.17. –  une source abondante  : le mot hébreu, mal connu, signifie selon certains l''abondance, selon d''autres le parfum. –  de paix et de loyauté ou de paix véritable  ; cf. v. 9 ; 14.13n  ; voir aussi 4.10n.'
  - type: text
    content: 'Je la rétablirai, je les guérirai et je leur ouvrirai une source abondante de paix et de loyauté. '
  '7':
  - type: note
    content: 'Je rétablirai v. 11,26 ; 29.14n. –  Israël  : certains mss grecs portent Jérusalem.'
  - type: text
    content: 'Je rétablirai la situation de Juda et d''Israël, je les rebâtirai comme par le passé. '
  '8':
  - type: note
    content: purifierai Ez 36.25. –  pardonnerai 31.34. – Voir péché.
  - type: text
    content: 'Je les purifierai de toute la faute par laquelle ils ont péché contre moi. Je leur pardonnerai toutes les fautes par lesquelles ils ont péché contre moi, par lesquelles ils se sont révoltés contre moi. '
  '9':
  - type: note
    content: 'Cette ville sera  : autre traduction ce sera (cf. v. 8 ; Ps 79.9). –  un sujet  : litt. un nom  ; on pourrait aussi comprendre un nom joyeux. –  louange / splendeur 13.11n. –  pour eux  : le complément correspondant est absent d''un ms hébreu et de LXX. –  elles seront effrayées…  : certains comprennent, dans un sens positif  : elles s''émerveilleront, elles frémiront  ; cf. Es 60.5n  ; mais le sens des verbes hébreux correspondants est habituellement négatif. –  de toute la paix ou de tout le bien v. 6n. –  que je fais pour elle  : un ms et plusieurs versions anciennes ont lu pour eux.'
  - type: text
    content: Cette ville sera pour moi un sujet de gaieté, une louange et une splendeur parmi toutes les nations de la terre qui apprendront tout le bonheur que je fais pour eux ; elles seront effrayées, elles trembleront de tout le bonheur, de toute la paix que je fais pour elle.
