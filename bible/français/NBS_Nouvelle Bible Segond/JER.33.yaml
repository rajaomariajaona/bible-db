      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.25 ; 9.5 ; 2Ch 6.16 ; cf. 2S 17.16.'
    marker-yv: yv-n
  - type: text
    text: 'Car ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : David aura toujours un successeur assis sur le trône de la maison d''Israël ; '
