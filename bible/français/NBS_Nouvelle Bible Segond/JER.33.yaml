    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'il n'y avait mon alliance du jour et de la nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si je n'avais pas créé le jour et la nuit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
