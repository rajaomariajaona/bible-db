    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 18.7.
    marker-yv: yv-n
  - type: text
    text: 'alors elle pourrait aussi être rompue, mon alliance avec David, mon serviteur, de telle sorte qu''il n''ait pas de fils régnant sur son trône, et avec les lévites, les prêtres qui officient pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.22 '
    - type: usfm
      marker: fq
