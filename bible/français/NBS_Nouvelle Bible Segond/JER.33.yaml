    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.8 ; cf. Gn 22.17 ; Es 10.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je multiplierai… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.16+ ; 30.19.
    marker-yv: yv-n
  - type: text
    text: De même qu'on ne peut compter l'armée du ciel, ni mesurer le sable de la mer, de même je multiplierai les descendants de David, mon serviteur, et les lévites qui officient pour moi.
- type: usfm
  marker: p
