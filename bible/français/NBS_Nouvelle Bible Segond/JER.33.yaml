    marker-yv: yv-n
  - type: text
    text: 'Les jours viennent – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – où je réaliserai la parole de bonheur que j''ai dite sur la maison d''Israël et sur la maison de Juda. '
