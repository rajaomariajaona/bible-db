    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 32.44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on fera encore…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
