  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Si je n''avais pas fait mon alliance avec le jour et la nuit, si je n''avais pas établi les lois du ciel et de la terre, '
