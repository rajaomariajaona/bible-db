      - type: text
        text: '1.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; il s''agit ou bien des familles de David et de Lévi (cf. v. 17s ; Za 12.12s), ou bien d''Israël et de Juda (50.4 ; Es 8.14 ; Ez 35.10 ; 37.15-19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il les a rejetés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il les méprise.
    marker-yv: yv-n
  - type: text
    text: 'Ne vois-tu pas de quoi parle ce peuple ? Ils disent : Les deux clans que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait choisis, il les a rejetés. Ainsi ils méprisent mon peuple ; pour eux, ce n''est même plus une nation.'
