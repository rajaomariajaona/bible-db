    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.5s.
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, en ce temps-là, je ferai germer pour David un germe de justice ; il agira dans le pays selon l''équité et la justice. '
  - type: usfm
    marker: vlbl
    children:
