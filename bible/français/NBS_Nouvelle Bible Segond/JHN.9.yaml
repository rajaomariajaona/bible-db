document_id: JHN.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un aveugle de naissance
  - type: text
    content: ' '
  - type: note
    content: 'En passant Mc 1.16n. –  aveugle  : cf. Mt 9.27+. –  de naissance  : cf. Ac 3.2 ; 14.8.'
  - type: text
    content: 'En passant, il vit un homme aveugle de naissance. '
  '10':
  - type: note
    content: 'V. 15. –  Comment…  : litt. comment donc (terme absent de certains mss) tes yeux ont-ils été ouverts ?'
  - type: text
    content: 'Ils lui disaient donc : Comment tes yeux se sont-ils ouverts ? '
  '11':
  - type: text
    content: 'Il répondit : L''homme qu''on appelle Jésus a fait de la boue, il me l''a appliquée sur les yeux et il m''a dit : Va te laver à Siloam. J''y suis donc allé, je me suis lavé et j''ai retrouvé la vue. '
  '12':
  - type: text
    content: 'Ils lui dirent : Où est-il, celui-là ? Il répondit : Je ne sais pas.'
  - type: heading
    content: Les pharisiens interrogent l'aveugle guéri
  '13':
  - type: text
    content: ' '
  - type: note
    content: pharisiens 1.24.
  - type: text
    content: 'Ils conduisent vers les pharisiens celui qui avait été aveugle. '
  '14':
  - type: note
    content: 'c''était un jour de sabbat…  : cf. 9.14 ; Mt 12.2,10/ / ; Lc 13.14.'
  - type: text
    content: '– Or c''était un jour de sabbat que Jésus avait fait de la boue et lui avait ouvert les yeux. – '
  '15':
  - type: note
    content: V. 10.
  - type: text
    content: 'A leur tour, les pharisiens lui demandèrent comment il avait retrouvé la vue. Il leur dit : Il a mis de la boue sur mes yeux, je me suis lavé et je vois. '
  '16':
  - type: note
    content: 'n''est pas issu de Dieu v. 29-33 ; 6.46+ ; cf. Dt 13.1-6. –  observe  : litt. garde. –  de tels signes 2.11+ ; cf. 3.1s. –  division 7.43+.'
  - type: text
    content: 'Aussi quelques-uns des pharisiens disaient : Cet homme n''est pas issu de Dieu, puisqu''il n''observe pas le sabbat. D''autres disaient : Comment un homme pécheur peut-il produire de tels signes ? Et il y avait division parmi eux. '
  '17':
  - type: note
    content: prophète 1.21+ ; cf. 4.19 ; 7.40 ; Lc 24.19.
  - type: text
    content: 'Ils disent encore à l''aveugle : Toi, que dis-tu de lui, puisqu''il t''a ouvert les yeux ? Il répondit : C''est un prophète.'
  '18':
  - type: text
    content: 'Les Juifs ne crurent pas qu''il avait été aveugle et qu''il avait retrouvé la vue, avant d''avoir appelé ses parents. '
  '19':
  - type: text
    content: 'Ils leur demandèrent : Est-ce là votre fils, dont vous, vous dites qu''il est né aveugle ? Comment se fait-il donc qu''il voie maintenant ? '
  '2':
  - type: note
    content: Cf. v. 34 ; 5.14 ; Ex 20.5 ; Ez 18.20 ; Ps 38.2-6.
  - type: text
    content: 'Ses disciples lui demandèrent : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' qui a péché, lui ou ses parents, pour qu''il soit né aveugle ? '
  '20':
  - type: text
    content: 'Ses parents répondirent : Nous savons que c''est notre fils et qu''il est né aveugle ; '
  '21':
  - type: text
    content: 'mais comment il se fait qu''il voie maintenant, nous ne le savons pas, et qui lui a ouvert les yeux, nous, nous ne le savons pas non plus. Interrogez-le, il est assez grand pour parler lui-même de ce qui le concerne. '
  '22':
  - type: note
    content: peur des Juifs 7.13+. –  reconnaissait en lui (1.20n) ou le déclarait Christ (cf. Mc 1.1n) ; le même verbe est traduit par reconnaître publiquement en 12.42. –  Christ 1.41n. –  exclu de la synagogue v. 34 ; 12.42 ; 16.2 ; Lc 6.22 ; cf. 3Jn 10.
  - type: text
    content: 'Ses parents dirent cela parce qu''ils avaient peur des Juifs ; car déjà les Juifs s''étaient mis d''accord : si quelqu''un reconnaissait en lui le Christ, il serait exclu de la synagogue. '
  '23':
  - type: text
    content: 'C''est pourquoi ses parents dirent : Il est assez grand, interrogez-le.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Donne gloire à Dieu  : formule d''adjuration appelant une confession, Jos 7.19 ; cf. Lc 17.18 ; Ap 11.13 ; 14.7.'
  - type: text
    content: 'Les pharisiens appelèrent une seconde fois l''homme qui avait été aveugle et lui dirent : Donne gloire à Dieu ; nous savons, nous, que cet homme est un pécheur. '
  '25':
  - type: text
    content: 'Il répondit : Si c''est un pécheur, je ne sais pas ; je sais une chose : j''étais aveugle, maintenant je vois. '
  '26':
  - type: note
    content: 'Que t''a-t-il fait  : autre traduction qu''a-t-il fait pour toi, cf. 13.12,15.'
  - type: text
    content: 'Ils lui dirent : Que t''a-t-il fait ? Comment t''a-t-il ouvert les yeux ? '
  '27':
  - type: note
    content: 'entendu  : autre traduction écouté (même verbe dans la suite du v.).'
  - type: text
    content: 'Il leur répondit : Je vous l''ai déjà dit, et vous n''avez pas entendu ; pourquoi voulez-vous l''entendre à nouveau ? Voulez-vous, vous aussi, devenir ses disciples ? '
  '28':
  - type: note
    content: Moïse 5.45+.
  - type: text
    content: 'Ils l''insultèrent et dirent : C''est toi qui es disciple de celui-là ; nous, nous sommes disciples de Moïse. '
  '29':
  - type: note
    content: d'où il est 7.27+.
  - type: text
    content: 'Nous, nous savons que Dieu a parlé à Moïse ; mais celui-ci, nous ne savons d''où il est. '
  '3':
  - type: note
    content: 'Ce n''est pas…  : autre traduction ni lui ni ses parents n''ont péché  ; cf. Lc 13.2ss. –  pour que… 11.4. –  se manifestent  : litt. soient manifestées, cf. 1.31+.'
  - type: text
    content: 'Jésus répondit : Ce n''est pas que lui ou ses parents aient péché ; c''est pour que les œuvres de Dieu se manifestent en lui. '
  '30':
  - type: note
    content: Cf. 3.10.
  - type: text
    content: 'L''homme leur répondit : Voilà bien ce qui est étonnant, que vous, vous ne sachiez pas d''où il est, alors qu''il m''a ouvert les yeux ! '
  '31':
  - type: note
    content: 'n''entend pas  : autres traductions n''écoute pas ; n''exauce pas  ; même verbe au v. 27 ; cf. 16.23 ; Es 1.15 ; Ps 66.18 ; 109.7 ; 145.19 ; Pr 15.8,29 ; Jb 27.9. –  honore Dieu  : autre traduction est pieux.'
  - type: text
    content: 'Nous savons que Dieu n''entend pas les pécheurs ; mais si quelqu''un honore Dieu et fait sa volonté, celui-là, il l''entend. '
  '32':
  - type: text
    content: 'Jamais encore on n''a entendu dire que quelqu''un ait ouvert les yeux d''un aveugle-né. '
  '33':
  - type: note
    content: Cf. v. 16 ; 3.2,27 ; 10.21.
  - type: text
    content: 'Si celui-ci n''était pas issu de Dieu, il ne pourrait rien faire. '
  '34':
  - type: note
    content: 'né… dans le péché  : litt. dans des péchés v. 2 ; Ps 51.7. –  ils le chassèrent dehors v. 22+.'
  - type: text
    content: 'Ils lui répondirent : Toi, tu es né tout entier dans le péché, et c''est toi qui nous instruis ! Et ils le chassèrent dehors.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'le trouva  : cf. 1.41. –  Fils de l''homme 1.51+ ; certains mss portent Fils de Dieu.'
  - type: text
    content: 'Jésus entendit dire qu''ils l''avaient chassé dehors. Il le trouva et lui dit : Toi, mets-tu ta foi dans le Fils de l''homme ? '
  '36':
  - type: text
    content: 'Il répondit : Qui est-il, Seigneur, pour que je mette ma foi en lui ? '
  '37':
  - type: note
    content: 'Tu l''as vu  : cf. v. 7,25 ; voir aussi 20.29. –  celui qui parle avec toi 4.26+.'
  - type: text
    content: 'Jésus lui dit : Tu l''as vu ; celui qui parle avec toi, c''est lui. '
  '38':
  - type: note
    content: 'Je crois ou j''ai foi, 1.7n. –  il se prosterna devant lui  : le même verbe est traduit par adorer en 4.20nss ; 12.20 ; voir culte.'
  - type: text
    content: 'Alors il dit : Je crois, Seigneur. Et il se prosterna devant lui.'
  - type: heading
    content: Qui sont les vrais aveugles ?
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'pour un jugement 3.17+,19-21. –  que ceux qui ne voient pas voient…  : cf. Mt 11.25 ; 13.13-15/ / ; 15.14+/ /.'
  - type: text
    content: 'Et Jésus dit : Moi, je suis venu dans ce monde pour un jugement : afin que ceux qui ne voient pas voient, et que ceux qui voient deviennent aveugles. '
  '4':
  - type: note
    content: 'Tant qu''il fait jour 11.9s ; 12.35s ; Jr 13.16. –  que nous accomplissions  : le verbe, apparenté au mot traduit ici par œuvres, est aussi rendu par œuvrer ou travailler  ; il est traduit par faire (aucune) œuvre à la fin du v. ; certains mss portent que j''accomplisse  ; cf. 14.10-12 ; voir aussi 4.34+ ; 5.17 ; 6.27n.'
  - type: text
    content: 'Tant qu''il fait jour, il faut que nous accomplissions les œuvres de celui qui m''a envoyé ; la nuit vient où personne ne peut faire aucune œuvre. '
  '40':
  - type: note
    content: Mt 23.16,23-29/ /. –  pharisiens 1.24+.
  - type: text
    content: 'Après avoir entendu cela, quelques pharisiens qui étaient avec lui lui dirent : Nous aussi, nous sommes aveugles ? '
  '41':
  - type: note
    content: Cf. 3.36 ; 15.22-24 ; voir aussi Pr 26.12 ; Mt 6.22-23/ /. – Voir péché.
  - type: text
    content: 'Jésus leur répondit : Si vous étiez aveugles, vous n''auriez pas de péché. Mais maintenant vous dites : « Nous voyons » ; aussi votre péché demeure.'
  '5':
  - type: note
    content: 8.12+.
  - type: text
    content: Pendant que je suis dans le monde, je suis la lumière du monde.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Mc 8.23 ; voir aussi 7.33. –  appliqua  : le verbe grec correspondant (aussi v. 11) est apparenté à celui qui est traduit ailleurs par oindre, conférer l''onction à, faire Christ (= oint ) ; cf. Lc 4.18 ; Ac 4.27 ; 10.38 ; Hé 1.9 ; 1Jn 2.20,27.'
  - type: text
    content: 'Après avoir dit cela, il cracha par terre et fit de la boue avec sa salive. Puis il appliqua cette boue sur les yeux de l''aveugle '
  '7':
  - type: note
    content: 'Va te laver  : cf. 2R 5.10. –  bassin de Siloam (ou Siloé) : réservoir d''eau situé à l''intérieur de Jérusalem et alimentée par l''eau de la source de Guihôn, au sud-est de la ville, au moyen d''un canal souterrain ; cf. 5.2n  ; 2R 20.20 ; Es 8.6 ; Né 3.15n  ; Lc 13.4. –  Envoyé 3.17+.'
  - type: text
    content: 'et lui dit : Va te laver au bassin de Siloam – ce qui se traduit « Envoyé ». Il y alla et se lava ; quand il revint, il voyait.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ac 3.10.
  - type: text
    content: 'Ses voisins et ceux qui auparavant l''avaient vu mendiant disaient : N''est-ce pas là celui qui était assis à mendier ? '
  '9':
  - type: note
    content: C'est moi 4.26n.
  - type: text
    content: 'Les uns disaient : C''est lui ! D''autres disaient : Non, il lui ressemble ! Lui-même disait : C''est moi ! '
