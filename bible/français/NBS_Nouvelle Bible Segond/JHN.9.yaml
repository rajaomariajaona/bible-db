- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit un aveugle de naissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En passant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mc 1.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aveugle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mt 9.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de naissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ac 3.2 ; 14.8.'
    marker-yv: yv-n
  - type: text
    text: 'En passant, il vit un homme aveugle de naissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 34 ; 5.14 ; Ex 20.5 ; Ez 18.20 ; Ps 38.2-6.
    marker-yv: yv-n
  - type: text
    text: 'Ses disciples lui demandèrent : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rabbi,
  - type: text
    text: ' qui a péché, lui ou ses parents, pour qu''il soit né aveugle ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ce n'est pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ni lui ni ses parents n''ont '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lc 13.2ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour que… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se manifestent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soient manifestées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1.31+.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus répondit : Ce n''est pas que lui ou ses parents aient péché ; c''est pour que les œuvres de Dieu se manifestent en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tant qu''il fait jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.9s ; 12.35s ; Jr 13.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que nous accomplissions
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe, apparenté au mot traduit ici par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: œuvres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', est aussi rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'œuvrer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: travailler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire (aucune) œuvre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à la fin du v. ; certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que j'accomplisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 14.10-12 ; voir aussi 4.34+ ; 5.17 ; 6.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tant qu''il fait jour, il faut que nous accomplissions les œuvres de celui qui m''a envoyé ; la nuit vient où personne ne peut faire aucune œuvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.12+.
    marker-yv: yv-n
  - type: text
    text: Pendant que je suis dans le monde, je suis la lumière du monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 8.23 ; voir aussi 7.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: appliqua
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe grec correspondant (aussi v. 11) est apparenté à celui qui est traduit ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'oindre, conférer '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
      - type: text
        text: ' à, faire Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(= '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: oint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. Lc 4.18 ; Ac 4.27 ; 10.38 ; Hé 1.9 ; 1Jn 2.20,27.
    marker-yv: yv-n
  - type: text
    text: 'Après avoir dit cela, il cracha par terre et fit de la boue avec sa salive. Puis il appliqua cette boue sur les yeux de l''aveugle '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Va te laver
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 5.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bassin de Siloam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Siloé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : réservoir d''eau situé à l''intérieur de Jérusalem et alimentée par l''eau de la source de Guihôn, au sud-est de la ville, au moyen d''un canal souterrain ; cf. 5.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 20.20 ; Es 8.6 ; Né 3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lc 13.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Envoyé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.17+.
    marker-yv: yv-n
  - type: text
    text: 'et lui dit : Va te laver au bassin de Siloam – ce qui se traduit « Envoyé ». Il y alla et se lava ; quand il revint, il voyait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 3.10.
    marker-yv: yv-n
  - type: text
    text: 'Ses voisins et ceux qui auparavant l''avaient vu mendiant disaient : N''est-ce pas là celui qui était assis à mendier ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les uns disaient : C''est lui ! D''autres disaient : Non, il lui ressemble ! Lui-même disait : C''est moi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Comment…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comment donc '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(terme absent de certains mss) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tes yeux ont-ils été ouverts ?
    marker-yv: yv-n
  - type: text
    text: 'Ils lui disaient donc : Comment tes yeux se sont-ils ouverts ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il répondit : L''homme qu''on appelle Jésus a fait de la boue, il me l''a appliquée sur les yeux et il m''a dit : Va te laver à Siloam. J''y suis donc allé, je me suis lavé et j''ai retrouvé la vue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui dirent : Où est-il, celui-là ? Il répondit : Je ne sais pas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les pharisiens interrogent l'aveugle guéri
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pharisiens
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.24.
    marker-yv: yv-n
  - type: text
    text: 'Ils conduisent vers les pharisiens celui qui avait été aveugle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'c''était un jour de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.14 ; Mt 12.2,10/ / ; Lc 13.14.'
    marker-yv: yv-n
  - type: text
    text: '– Or c''était un jour de sabbat que Jésus avait fait de la boue et lui avait ouvert les yeux. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 10.
    marker-yv: yv-n
  - type: text
    text: 'A leur tour, les pharisiens lui demandèrent comment il avait retrouvé la vue. Il leur dit : Il a mis de la boue sur mes yeux, je me suis lavé et je vois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'n''est pas issu de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 29-33 ; 6.46+ ; cf. Dt 13.1-6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: observe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de tels signes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.11+ ; cf. 3.1s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'division '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.43+.
    marker-yv: yv-n
  - type: text
    text: 'Aussi quelques-uns des pharisiens disaient : Cet homme n''est pas issu de Dieu, puisqu''il n''observe pas le sabbat. D''autres disaient : Comment un homme pécheur peut-il produire de tels signes ? Et il y avait division parmi eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.21+ ; cf. 4.19 ; 7.40 ; Lc 24.19.
    marker-yv: yv-n
  - type: text
    text: 'Ils disent encore à l''aveugle : Toi, que dis-tu de lui, puisqu''il t''a ouvert les yeux ? Il répondit : C''est un prophète.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Juifs ne crurent pas qu''il avait été aveugle et qu''il avait retrouvé la vue, avant d''avoir appelé ses parents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils leur demandèrent : Est-ce là votre fils, dont vous, vous dites qu''il est né aveugle ? Comment se fait-il donc qu''il voie maintenant ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ses parents répondirent : Nous savons que c''est notre fils et qu''il est né aveugle ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mais comment il se fait qu''il voie maintenant, nous ne le savons pas, et qui lui a ouvert les yeux, nous, nous ne le savons pas non plus. Interrogez-le, il est assez grand pour parler lui-même de ce qui le concerne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peur des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'reconnaissait en lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le déclarait Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Mc 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'reconnaître publiquement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 12.42. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.41'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'exclu de la synagogue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 34 ; 12.42 ; 16.2 ; Lc 6.22 ; cf. 3Jn 10.
    marker-yv: yv-n
  - type: text
    text: 'Ses parents dirent cela parce qu''ils avaient peur des Juifs ; car déjà les Juifs s''étaient mis d''accord : si quelqu''un reconnaissait en lui le Christ, il serait exclu de la synagogue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C''est pourquoi ses parents dirent : Il est assez grand, interrogez-le.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Donne '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: ' à Dieu'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : formule d''adjuration appelant une confession, Jos 7.19 ; cf. Lc 17.18 ; Ap 11.13 ; 14.7.'
    marker-yv: yv-n
  - type: text
    text: 'Les pharisiens appelèrent une seconde fois l''homme qui avait été aveugle et lui dirent : Donne gloire à Dieu ; nous savons, nous, que cet homme est un pécheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il répondit : Si c''est un pécheur, je ne sais pas ; je sais une chose : j''étais aveugle, maintenant je vois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que t'a-t-il fait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'a-t-il fait pour toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 13.12,15.'
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Que t''a-t-il fait ? Comment t''a-t-il ouvert les yeux ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'écouté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même verbe dans la suite du v.).
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Je vous l''ai déjà dit, et vous n''avez pas entendu ; pourquoi voulez-vous l''entendre à nouveau ? Voulez-vous, vous aussi, devenir ses disciples ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.45+.
    marker-yv: yv-n
  - type: text
    text: 'Ils l''insultèrent et dirent : C''est toi qui es disciple de celui-là ; nous, nous sommes disciples de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''où il est '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.27+.
    marker-yv: yv-n
  - type: text
    text: 'Nous, nous savons que Dieu a parlé à Moïse ; mais celui-ci, nous ne savons d''où il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 3.10.
    marker-yv: yv-n
  - type: text
    text: 'L''homme leur répondit : Voilà bien ce qui est étonnant, que vous, vous ne sachiez pas d''où il est, alors qu''il m''a ouvert les yeux ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'entend pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'écoute pas ; n'exauce pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe au v. 27 ; cf. 16.23 ; Es 1.15 ; Ps 66.18 ; 109.7 ; 145.19 ; Pr 15.8,29 ; Jb 27.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: honore Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est pieux.
    marker-yv: yv-n
  - type: text
    text: 'Nous savons que Dieu n''entend pas les pécheurs ; mais si quelqu''un honore Dieu et fait sa volonté, celui-là, il l''entend. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jamais encore on n''a entendu dire que quelqu''un ait ouvert les yeux d''un aveugle-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 16 ; 3.2,27 ; 10.21.
    marker-yv: yv-n
  - type: text
    text: 'Si celui-ci n''était pas issu de Dieu, il ne pourrait rien faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'né… dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans des péchés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 2 ; Ps 51.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils le chassèrent dehors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 22+.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui répondirent : Toi, tu es né tout entier dans le péché, et c''est toi qui nous instruis ! Et ils le chassèrent dehors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le trouva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.41. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de l''homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.51+ ; certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Fils de Dieu.
    marker-yv: yv-n
  - type: text
    text: 'Jésus entendit dire qu''ils l''avaient chassé dehors. Il le trouva et lui dit : Toi, mets-tu ta foi dans le Fils de l''homme ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il répondit : Qui est-il, Seigneur, pour que je mette ma foi en lui ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu l'as vu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 7,25 ; voir aussi 20.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'celui qui parle avec toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.26+.
    marker-yv: yv-n
  - type: text
    text: 'Jésus lui dit : Tu l''as vu ; celui qui parle avec toi, c''est lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je crois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ai foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 1.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il se prosterna devant lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'adorer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 4.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 'ss ; 12.20 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors il dit : Je crois, Seigneur. Et il se prosterna devant lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qui sont les vrais aveugles ?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour un jugement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.17+,19-21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que ceux qui ne voient pas voient…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mt 11.25 ; 13.13-15/ / ; 15.14+/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Et Jésus dit : Moi, je suis venu dans ce monde pour un jugement : afin que ceux qui ne voient pas voient, et que ceux qui voient deviennent aveugles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 23.16,23-29/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: pharisiens
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.24+.
    marker-yv: yv-n
  - type: text
    text: 'Après avoir entendu cela, quelques pharisiens qui étaient avec lui lui dirent : Nous aussi, nous sommes aveugles ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 3.36 ; 15.22-24 ; voir aussi Pr 26.12 ; Mt 6.22-23/ /. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur répondit : Si vous étiez aveugles, vous n''auriez pas de péché. Mais maintenant vous dites : « Nous voyons » ; aussi votre péché demeure.'
