document_id: ROM.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Plaire à son prochain, non à soi-même
  - type: text
    content: ' '
  - type: note
    content: 'Si nous sommes forts  : litt. nous, les forts  ; cf. 14.1+ ; le même terme est traduit par puissants en 1Co 1.26. –  porter ou supporter  ; même verbe en Ga 6.2. –  au lieu de faire…  : litt. et non nous plaire à nous-mêmes , de même v. 3 ; 1Co 10.33n  ; cf. Ga 1.10 ; 1Th 2.4.'
  - type: text
    content: 'Si nous sommes forts, nous devons porter les faiblesses de ceux qui ne sont pas forts, au lieu de faire ce qui nous plaît. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Il dit litt. il (Moïse ? Dieu ?) ou elle (l'Ecriture ?) dit , cf. Dt 32.43n.
  - type: text
    content: 'Il dit encore :'
  - type: text
    content: Nations, soyez en fête avec son peuple !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 117.1 . –  Louez / louent  : le texte grec emploie deux verbes synonymes et apparentés. Le second est traduit par féliciter en 1Co 11.2n.'
  - type: text
    content: 'Et encore :'
  - type: text
    content: Louez le Seigneur, vous toutes, nations,
  - type: text
    content: que tous les peuples le louent !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Es 11.1,10  ; cf. Rt 4.17 ; 1S 16.1,11-13. –  le rejeton  : autre traduction la racine (même terme 11.16ss) ; cf. Ap 5.5 ; 22.16. –  se lèvera  : le même verbe grec peut signifier ressusciter  ; terme dérivé pour résurrection en 1.4n  ; cf. Ac 3.22.'
  - type: text
    content: 'Esaïe dit encore :'
  - type: text
    content: Il paraîtra, le rejeton de Jessé,
  - type: text
    content: celui qui se lèvera pour commander aux nations ;
  - type: text
    content: les nations espéreront en lui
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'V. 4 ; 5.3ss ; 14.17. Voir paix . –  dans la foi  : litt. dans le croire . –  par la puissance…  : litt. dans une puissance d''esprit saint.'
  - type: text
    content: Que le Dieu de l'espérance vous remplisse de toute joie et de toute paix dans la foi, pour que vous abondiez en espérance par la puissance de l'Esprit saint !
  - type: heading
    content: Le service de Paul auprès des non-Juifs
  '14':
  - type: text
    content: ' '
  - type: note
    content: 1Co 1.5 ; Ph 1.9.
  - type: text
    content: 'Pour ce qui vous concerne, mes frères, je suis moi-même persuadé que vous êtes pleins de bonté, remplis de toute la connaissance et capables de vous avertir les uns les autres. '
  '15':
  - type: note
    content: 'à certains égards  : litt. en partie (cf. v. 24n) ; on a aussi compris dans une partie de ma lettre (chap. 12–15 ?) ; à certains d''entre vous ; en partie pour réveiller… –  réveiller vos souvenirs 2P 1.12. –  grâce 1.5+.'
  - type: text
    content: 'Cependant, à certains égards, je vous ai écrit avec une certaine audace, comme pour réveiller vos souvenirs, à cause de la grâce que Dieu m''a accordée '
  '16':
  - type: note
    content: 'au service (v. 27 ; 13.6n  ; cf. 1.9n)… pour les non-Juifs v. 9n  ; 11.13. –  je m''acquitte du service sacré  : le verbe grec correspondant, qui n''apparaît qu''ici dans le N.T., évoque l''office du prêtre dans le temple. –  bonne nouvelle de Dieu  : cf. v. 19 ; 1.1+. –  offrande 12.1 ; cf. Es 66.20 ; Ph 2.17 ; voir sacrifices. –  consacrée ou sanctifiée, terme dérivé du mot traduit par saint  ; cf. 6.19n.'
  - type: text
    content: 'd''être au service de Jésus-Christ pour les non-Juifs ; je m''acquitte du service sacré de la bonne nouvelle de Dieu, afin que les non-Juifs soient une offrande agréée, consacrée par l''Esprit saint. '
  '17':
  - type: note
    content: 'fierté 2.17+. –  pour ce qui est…  : litt. pour ce qui concerne Dieu (cf. Hé 2.17n).'
  - type: text
    content: 'J''ai donc ma fierté en Jésus-Christ pour ce qui est du service de Dieu. '
  '18':
  - type: note
    content: 2Co 3.5 ; 13.3. –  accompli ou produit, cf. 2.9n. –  obéissance 1.5+.
  - type: text
    content: 'Car je n''oserais rien mentionner que le Christ n''ait accompli par moi pour amener les non-Juifs à l''obéissance : en parole et en œuvre, '
  '19':
  - type: note
    content: 'signes / prodiges / puissance 2Co 12.12 ; Hé 2.4. –  l''Esprit de Dieu  : certains mss portent seulement l''Esprit  ; cf. 1Co 2.4 ; 1Th 1.5+. –  depuis Jérusalem Ac 1.8. –  Illyrie  : province romaine correspondant grosso modo à l''ex-Yougoslavie. –  j''ai annoncé partout  : litt. j''ai accompli.'
  - type: text
    content: 'par la puissance de signes et de prodiges, par la puissance de l''Esprit de Dieu. Ainsi, depuis Jérusalem et en rayonnant jusqu''en Illyrie, j''ai annoncé partout la bonne nouvelle du Christ. '
  '2':
  - type: note
    content: 'et constructif  : autre traduction pour l''édification  ; un verbe apparenté est traduit par construire au v. 20 ; 14.19+.'
  - type: text
    content: 'Que chacun de nous fasse ce qui plaît à son prochain, en vue de ce qui est bon et constructif. '
  '20':
  - type: note
    content: 'J''ai mis un point d''honneur  : même verbe 2Co 5.9 ; 1Th 4.11. –  construire ou édifier  ; cf. v. 2n  ; 1Co 3.9nss ; 2Co 10.13n-16.'
  - type: text
    content: 'J''ai mis un point d''honneur à annoncer la bonne nouvelle là où le Christ n''avait pas été nommé, pour ne pas construire sur les fondations d''autrui ; '
  '21':
  - type: note
    content: Es 52.15.
  - type: text
    content: mais, ainsi qu'il est écrit,
  - type: text
    content: ceux à qui il n'avait pas été annoncé verront,
  - type: text
    content: et ceux qui n'en avaient pas entendu parler comprendront
  - type: text
    content: .
  - type: heading
    content: Projets de Paul
  '22':
  - type: text
    content: ' '
  - type: note
    content: 1.13+.
  - type: text
    content: 'C''est ce qui m''a souvent empêché de venir vous voir. '
  '23':
  - type: note
    content: 'champ d''action  : litt. lieu, place.'
  - type: text
    content: 'Mais maintenant, je n''ai plus de champ d''action dans ces contrées, et depuis de nombreuses années je souhaite vivement venir vous voir, '
  '24':
  - type: note
    content: '1.10+,11+. –  en Espagne, à l''extrémité occidentale de l''Empire romain (cf. v. 20s). –  recevoir… voyage  : sur le verbe correspondant, voir Ac 15.3n  ; formule analogue en 1Co 16.6,11 ; 2Co 1.16 ; Tt 3.13 ; 3Jn 6. –  non sans m''être…  : litt. si d''abord je me suis en partie rassasié de vous.'
  - type: text
    content: quand j'irai en Espagne ; j'espère vous voir en passant et recevoir de vous ce dont j'aurai besoin pour le voyage, non sans m'être d'abord rassasié, au moins en partie, de votre compagnie.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'à Jérusalem Ac 19.21 ; 20.22. –  le service (12.7n) des saints (1.7+) : 15.26+ ; Ac 11.29+ ; 2Co 8.4+.'
  - type: text
    content: 'Mais maintenant je vais à Jérusalem, pour le service des saints. '
  '26':
  - type: note
    content: '1Co 16.1-4 ; 2Co 8.1-4 ; 9.2,12 ; Ga 2.10. –  Macédoine / Achaïe 2Co 1.1n,16n. –  une collecte de solidarité  : le mot grec est habituellement traduit par communion  ; un verbe apparenté est rendu par avoir part au v. 27n  ; cf. 12.13n. –  de ceux qui sont pauvres…  : litt. des pauvres des saints de Jérusalem.'
  - type: text
    content: 'Car la Macédoine et l''Achaïe ont bien voulu faire une collecte de solidarité en faveur de ceux qui sont pauvres parmi les saints de Jérusalem. '
  '27':
  - type: note
    content: 'elles le leur doivent  : litt. elles sont leurs débiteurs, cf. 1.14+. – Voir non-Juifs. –  ont eu part v. 26n. –  spirituels, c.-à-d. de l''ordre de l''Esprit. –  se mettre à leur service  : voir v. 16 ; 13.6n. –  matériels  : le terme grec est apparenté à celui qui est habituellement traduit par chair  ; terme apparenté en 7.14n  ; le même mot est rendu par charnel en 1Co 3.3 ; 9.11 ; 2Co 1.12 ; 10.4 ; 1P 2.11 ; voir aussi 1Co 16.3 ; 2Co 9.12-14 ; Ga 6.6.'
  - type: text
    content: 'Elles l''ont bien voulu, et elles le leur doivent ; car si les non-Juifs ont eu part à leurs biens spirituels, ils doivent aussi se mettre à leur service en ce qui concerne les biens matériels. '
  '28':
  - type: note
    content: 'que je leur aurai remis…  : litt. après avoir scellé pour eux ce fruit (cf. Ph 4.17), expression qui évoque sans doute l''aboutissement d''une démarche officielle, où il sera constaté que Paul a mené à bien son entreprise ; cf. 2Co 8.6,19-21.'
  - type: text
    content: 'Lorsque j''en aurai terminé et que je leur aurai remis officiellement le produit de la collecte, je partirai pour l''Espagne en passant par chez vous. '
  '29':
  - type: note
    content: 1.11. – Voir bénédiction.
  - type: text
    content: Je sais qu'en venant vous voir, c'est avec une pleine bénédiction du Christ que je viendrai.
  '3':
  - type: note
    content: V. 1n  ; Ps 69.10.
  - type: text
    content: 'Le Christ, en effet, n''a pas fait ce qui lui plaisait ; mais, ainsi qu''il est écrit, '
  - type: text
    content: les insultes de ceux qui t'insultent sont retombées sur moi
  - type: text
    content: '. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'encourage 12.1n. –  mes frères  : le terme correspondant est absent de certains mss. –  l''amour de l''Esprit 5.5 ; Col 1.8. –  combattre Ph 1.27 ; 4.3 ; Col 2.1 ; 4.12. –  prières 2Co 1.11 ; Ep 6.18s ; Col 4.3 ; 1Th 5.25 ; 2Th 3.1 ; Hé 13.18.'
  - type: text
    content: 'Cependant je vous encourage, mes frères, par notre Seigneur Jésus-Christ et par l''amour de l''Esprit, à combattre avec moi en adressant à Dieu des prières en ma faveur, '
  '31':
  - type: note
    content: délivré 2Th 3.2. –  des réfractaires de Judée ou de ceux qui, en Judée, refusent d'obéir (cf. 2.8n) ; voir aussi Ac 14.2 ; 20.3 ; 21.10-36 ; 1Th 2.14-16. –  mon service ou mon ministère (v. 25n) ; certains mss portent les dons que j'apporte à Jérusalem.
  - type: text
    content: 'pour que je sois délivré des réfractaires de Judée et que mon service en faveur de Jérusalem soit bien accueilli par les saints ; '
  '32':
  - type: note
    content: 1.10+.
  - type: text
    content: ainsi je viendrai vous voir avec joie, par la volonté de Dieu, et je jouirai auprès de vous de quelque repos.
  '33':
  - type: text
    content: ' '
  - type: note
    content: '16.20 ; 1Co 14.33 ; 2Co 13.11 ; Ph 4.9 ; 1Th 5.23 ; 2Th 3.16 ; Hé 13.20s ; cf. Testament de Dan 5.2 : « Vous serez en paix, possédant le Dieu de paix. »'
  - type: text
    content: 'Que le Dieu de la paix soit avec vous tous ! '
  - type: text
    content: Amen !
  '4':
  - type: note
    content: 'écrit autrefois  : autre traduction écrit à l''avance  ; même verbe Ga 3.1n (dépeint) ; Ep 3.3 (je viens de l''écrire) ; Jd 4 (écrit il y a longtemps). –  pour notre instruction 4.23+ ; cf. 1Co 9.10 ; 10.11 ; 2Tm 3.16. –  persévérance 2.7n. –  encouragement  : autres traductions exhortation, réconfort, consolation, v. 5 ; 12.1n,8+ ; 1 Maccabées 12.9 : « Les livres saints qui sont entre nos mains sont en effet notre consolation. » –  espérance Hé 3.6 ; 6.19.'
  - type: text
    content: 'Car tout ce qui a été écrit autrefois a été écrit pour notre instruction, afin que, par la persévérance et par l''encouragement des Ecritures, nous ayons l''espérance. '
  '5':
  - type: note
    content: Dieu de… l'encouragement ou du réconfort, de la consolation 2Co 1.3 ; cf. Es 40.1 ; Ph 2.1s. –  être bien d'accord 12.16n.
  - type: text
    content: 'Que le Dieu de la persévérance et de l''encouragement vous donne d''être bien d''accord entre vous, selon Jésus-Christ, '
  '6':
  - type: note
    content: 'd''une seule voix  : litt. d''une seule bouche. – Voir gloire.'
  - type: text
    content: pour que, d'un commun accord, d'une seule voix, vous glorifiiez le Dieu et Père de notre Seigneur Jésus-Christ !
  - type: heading
    content: Le Christ, serviteur de tous
  '7':
  - type: text
    content: ' '
  - type: note
    content: '14.1+. –  vous a accueillis  : certains mss portent nous a accueillis.'
  - type: text
    content: 'Aussi accueillez-vous les uns les autres, comme le Christ lui-même vous a accueillis, pour la gloire de Dieu. '
  '8':
  - type: note
    content: 'serviteur ou ministre  : cf. 12.7n  ; 16.1n. –  des circoncis  : litt. de la circoncision  ; cf. Mt 15.24. –  pour la vérité (autre traduction la loyauté) de Dieu  ; cf. Mi 7.20 ; Ps 89.3. –  confirmant les promesses…  : cf. 4.16n  ; 11.28s ; Ac 3.25.'
  - type: text
    content: 'Car je dis que le Christ est devenu serviteur des circoncis pour la vérité de Dieu, en confirmant les promesses faites aux pères, '
  '9':
  - type: note
    content: non-Juifs et nations traduisent un même terme grec, ici comme dans la suite ; cf. Mt 4.15n  ; Ac 10.45n. –  compassion 11.30. –  C'est pourquoi… ton nom 2S 22.50 ; Ps 18.50. –  reconnaîtrai ou célébrerai 14.11n.
  - type: text
    content: 'tandis que les non-Juifs glorifient Dieu pour sa compassion, ainsi qu''il est écrit :'
  - type: text
    content: C'est pourquoi je te reconnaîtrai parmi les nations
  - type: text
    content: et je chanterai ton nom
  - type: text
    content: .
