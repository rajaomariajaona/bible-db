document_id: EXO.7,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Aaron  : voir prêtre. –  ton prophète  : au sens de porte-parole, voir 4.16n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Regarde, je te fais dieu pour le pharaon ; Aaron, ton frère, sera ton prophète. '
  '10':
  - type: note
    content: 'les gens de sa cour  : litt. ses serviteurs.'
  - type: text
    content: 'Moïse se rendit avec Aaron auprès du pharaon, et ils agirent ainsi, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné. Aaron jeta son bâton devant le pharaon et devant les gens de sa cour, et le bâton devint un reptile. '
  '11':
  - type: note
    content: Cf. 2Tm 3.8.
  - type: text
    content: 'Mais le pharaon appela aussi des sages et des sorciers ; les mages d''Egypte, eux aussi, en firent autant par leurs pratiques occultes. '
  '12':
  - type: text
    content: 'Tous, ils jetèrent leurs bâtons, et ceux-ci devinrent des reptiles. Mais le bâton d''Aaron engloutit leurs bâtons. '
  '13':
  - type: note
    content: 's''entêta 4.21n. –  il ne les écouta pas  : c.-à-d. le pharaon n''écouta pas Moïse et Aaron (cf. 7.3s) ; même formule v. 22 ; 8.11,15 ; 9.12.'
  - type: text
    content: 'Le pharaon s''entêta ; il ne les écouta pas, comme l''avait dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: 'Premier fléau : l''eau changée en sang'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le pharaon est obtus  : litt. le cœur de Pharaon est lourd  ; verbe apparenté en 8.11,28 ; 9.7,34 ; 10.1 ; cf. 4.21n  ; 7.3n  ; voir aussi 1S 6.6 ; Lc 21.34n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Le pharaon est obtus, il refuse de laisser partir le peuple. '
  '15':
  - type: note
    content: 'tu l''attendras  : cf. 5.20.'
  - type: text
    content: 'Au matin, va trouver le pharaon ; lorsqu''il sortira pour aller près de l''eau, tu l''attendras au bord du Nil. Tu prendras le bâton qui a été changé en serpent, '
  '16':
  - type: text
    content: 'et tu diras au pharaon : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Hébreux, m''a envoyé auprès de toi pour te dire : “Laisse partir mon peuple, pour qu''il me serve dans le désert.” Et toi, jusqu''ici, tu n''as pas écouté. '
  '17':
  - type: note
    content: 'tu sauras… 8.18 ; 10.2 ; 14.4. –  YHWH  : voir nom, noms divins. –  eau / sang 4.9 ; 2R 3.22 ; Es 15.9 ; Ps 78.44 ; 105.29 ; Ap 8.8 ; 16.3-7 ; cf. Jn 2.1-12. Sur l''ensemble des fléaux ou plaies d''Egypte, voir Dt 26.6-8 ; Jos 24.5 ; Ps 78.44ss ; 105.27-36 ; 136.10-12 ; Né 9.9s ; cf. Am 4.10.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : A ceci tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) : je frappe l''eau du Nil avec le bâton qui est dans ma main, et elle sera changée en sang. '
  '18':
  - type: note
    content: 'les Egyptiens  : autre traduction l''Egypte (de même aux v. 21,24).'
  - type: text
    content: 'Les poissons du Nil mourront, le Nil deviendra une puanteur, et les Egyptiens devront renoncer à boire l''eau du Nil. » '
  '19':
  - type: note
    content: 'Dis à Aaron 8.1,12. –  les bras de leur Nil  : litt. leurs Nils ou leurs fleuves, de même en 8.1 ; cf. Ez 29.3n. –  dans les récipients de bois et de pierre  : c''est ainsi qu''a compris Vg  ; on pourrait aussi comprendre dans (ou parmi) les arbres et les pierres.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Dis à Aaron : « Prends ton bâton et étends ta main sur les eaux de l''Egypte : sur leurs rivières, sur les bras de leur Nil, sur leurs étangs et sur toutes leurs réserves d''eau. » Elles se changeront en sang et il y aura du sang dans toute l''Egypte, jusque dans les récipients de bois et de pierre.'
  '2':
  - type: text
    content: 'Toi, tu diras tout ce que je t''ordonnerai ; Aaron, ton frère, le dira au pharaon, pour qu''il laisse partir de son pays les Israélites. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Il leva le bâton  : c.-à-d. soit Moïse (cf. v. 15,17), soit Aaron (cf. v. 19).'
  - type: text
    content: 'Moïse et Aaron agirent ainsi, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné. Il leva le bâton et frappa l''eau du Nil, sous les yeux du pharaon et des gens de sa cour ; et toute l''eau du Nil fut changée en sang. '
  '21':
  - type: text
    content: 'Les poissons du Nil moururent et le Nil devint une puanteur ; les Egyptiens ne pouvaient plus boire l''eau du Nil. Dans toute l''Egypte il y eut du sang. '
  '22':
  - type: note
    content: V. 13+.
  - type: text
    content: 'Mais les mages d''Egypte en firent autant par leurs pratiques occultes. Le pharaon s''entêta ; il ne les écouta pas, comme l''avait dit le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'ne se soucia plus  : expression analogue en 9.21.'
  - type: text
    content: Le pharaon s'en retourna chez lui et ne se soucia plus de cette affaire.
  '24':
  - type: text
    content: 'Tous les Egyptiens creusèrent aux environs du Nil, pour trouver de l''eau à boire, car ils ne pouvaient pas boire l''eau du Nil. '
  '25':
  - type: text
    content: 'Il s''écoula sept jours pleins, après que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' eut frappé le Nil.'
  - type: heading
    content: 'Deuxième fléau : les grenouilles'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Certaines éditions traditionnelles commencent ici le chap. 8 qui compte, de ce fait, 4 v. de plus.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Va trouver le pharaon ; tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) : Laisse partir mon peuple, pour qu''il me serve. '
  '27':
  - type: note
    content: 'je frappe… du fléau  : même verbe ou termes apparentés en 9.14 ; 12.13,23,27 ; 21.22 (heurter) ; 30.12 (frapper) ; 32.35 ; Lv 26.17n  ; Nb 8.19 ; 17.11ss etc. –  grenouilles Ps 78.45 ; 105.30 ; Ap 16.13.'
  - type: text
    content: 'Si tu refuses de le laisser partir, je frappe tout ton territoire du fléau des grenouilles. '
  '28':
  - type: note
    content: 'Cf. 8.12n  ; Sagesse 19.10 : « Le Fleuve, se substituant aux animaux aquatiques, vomit une multitude de grenouilles. » –  gens de ta cour v. 10n.'
  - type: text
    content: 'Le Nil grouillera de grenouilles ; elles monteront, elles pénétreront chez toi, jusque dans ta chambre à coucher et sur ton lit, chez les gens de ta cour et parmi tout ton peuple, jusque dans tes fours et dans tes pétrins. '
  '29':
  - type: text
    content: Les grenouilles monteront sur toi, sur ton peuple et sur tous les gens de ta cour.
  '3':
  - type: note
    content: 'je ferai en sorte…  : litt. j''endurcirai le cœur de Pharaon  ; cf. 4.21+ (autre verbe hébreu) ; voir aussi 7.14n. Ici c''est Dieu qui fait s''obstiner le pharaon (comme en 4.21 ; 9.12 ; 10.1,20,27 ; 11.10 ; 14.4,17 ; cf. Dt 2.30 ; Jos 11.20 ; Es 6.10), alors qu''ailleurs c''est le pharaon lui-même qui s''obstine (7.13,14,22 ; 8.11,15,28 ; 9.7,34s). Voir à ce sujet 7.5 ; 14.4 ; Rm 9.18. –  signes / prodiges Jr 32.20 ; Ps 78.43 ; 105.27 ; 135.9 ; Ac 7.36.'
  - type: text
    content: 'Et moi, je ferai en sorte que le pharaon s''obstine et je multiplierai mes signes et mes prodiges en Egypte. '
  '4':
  - type: note
    content: 6.26n.
  - type: text
    content: 'Le pharaon ne vous écoutera pas. Je mettrai ma main sur l''Egypte et je ferai sortir d''Egypte mes armées, mon peuple, les Israélites, par de grands jugements. '
  '5':
  - type: note
    content: 'les Egyptiens  : autre traduction l''Egypte.'
  - type: text
    content: 'Ainsi les Egyptiens sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), lorsque j''étendrai la main sur l''Egypte et que je ferai sortir du milieu d''eux les Israélites. '
  '6':
  - type: text
    content: 'Moïse et Aaron firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur avait ordonné. Ainsi firent-ils. '
  '7':
  - type: text
    content: Moïse avait quatre-vingts ans, et Aaron quatre-vingt-trois ans, lorsqu'ils parlèrent au pharaon.
  - type: heading
    content: Le pharaon refuse d'écouter Moïse et Aaron
  '8':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '9':
  - type: note
    content: 'Cf. v. 15 ; 4.3s. –  Faites  : litt. donnez-vous  ; Syr donnez-moi  ; LXX donnez-nous un signe ou un prodige. –  Le bâton…  : litt. il deviendra, de même au v. 10. – Le mot traduit ici et dans la suite par reptile est rendu ailleurs par monstre (marin) (Gn 1.21 ; Ps 148.7) ou par dragon (Dt 32.33 ; Es 51.9 ; Jr 51.34 ; Ps 74.13s ; 91.13). Dans le livre d''Ezéchiel (29.3 ; 32.2) il désigne vraisemblablement le crocodile et symbolise l''Egypte.'
  - type: text
    content: 'Si le pharaon vous dit : « Faites un prodige ! », tu diras à Aaron : « Prends ton bâton et jette-le devant le pharaon. » Le bâton se changera en reptile. '
