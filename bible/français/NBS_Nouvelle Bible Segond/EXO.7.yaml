    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''entêta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne les écouta pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le pharaon n''écouta pas Moïse et Aaron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 7.3s) ; même formule v. 22 ; 8.11,15 ; 9.12.
    marker-yv: yv-n
  - type: text
    text: 'Le pharaon s''entêta ; il ne les écouta pas, comme l''avait dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
