      - type: text
        text: 'eau / '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.9 ; 2R 3.22 ; Es 15.9 ; Ps 78.44 ; 105.29 ; Ap 8.8 ; 16.3-7 ; cf. Jn 2.1-12. Sur l''ensemble des '
      - type: usfm
        marker: bdit
