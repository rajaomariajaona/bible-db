        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 8.19 ; 17.11ss etc. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grenouilles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 78.45 ; 105.30 ; Ap 16.13.
    marker-yv: yv-n
  - type: text
    text: 'Si tu refuses de le laisser partir, je frappe tout ton territoire du fléau des grenouilles. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 8.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.10 : « Le Fleuve, se substituant aux animaux aquatiques, vomit une multitude de grenouilles. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gens de ta cour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Nil grouillera de grenouilles ; elles monteront, elles pénétreront chez toi, jusque dans ta chambre à coucher et sur ton lit, chez les gens de ta cour et parmi tout ton peuple, jusque dans tes fours et dans tes pétrins. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les grenouilles monteront sur toi, sur ton peuple et sur tous les gens de ta cour.
