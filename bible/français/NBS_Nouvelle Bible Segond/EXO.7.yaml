      - type: text
        text: 'dragon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Dt 32.33 ; Es 51.9 ; Jr 51.34 ; Ps 74.13s ; 91.13). Dans le livre d'Ezéchiel (29.3 ; 32.2) il désigne vraisemblablement le crocodile et symbolise l'Egypte.
    marker-yv: yv-n
  - type: text
    text: 'Si le pharaon vous dit : « Faites un prodige ! », tu diras à Aaron : « Prends ton bâton et jette-le devant le pharaon. » Le bâton se changera en reptile. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens de sa cour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses serviteurs.
    marker-yv: yv-n
  - type: text
    text: 'Moïse se rendit avec Aaron auprès du pharaon, et ils agirent ainsi, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné. Aaron jeta son bâton devant le pharaon et devant les gens de sa cour, et le bâton devint un reptile. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2Tm 3.8.
    marker-yv: yv-n
  - type: text
    text: 'Mais le pharaon appela aussi des sages et des sorciers ; les mages d''Egypte, eux aussi, en firent autant par leurs pratiques occultes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous, ils jetèrent leurs bâtons, et ceux-ci devinrent des reptiles. Mais le bâton d''Aaron engloutit leurs bâtons. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
