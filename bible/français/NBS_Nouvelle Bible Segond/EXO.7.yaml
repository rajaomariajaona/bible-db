  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il leva le bâton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c.-à-d. soit Moïse (cf. v. 15,17), soit Aaron (cf. v. 19).'
    marker-yv: yv-n
  - type: text
    text: 'Moïse et Aaron agirent ainsi, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait ordonné. Il leva le bâton et frappa l''eau du Nil, sous les yeux du pharaon et des gens de sa cour ; et toute l''eau du Nil fut changée en sang. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les poissons du Nil moururent et le Nil devint une puanteur ; les Egyptiens ne pouvaient plus boire l''eau du Nil. Dans toute l''Egypte il y eut du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 13+.
    marker-yv: yv-n
  - type: text
    text: 'Mais les mages d''Egypte en firent autant par leurs pratiques occultes. Le pharaon s''entêta ; il ne les écouta pas, comme l''avait dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne se soucia plus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression analogue en 9.21.'
    marker-yv: yv-n
  - type: text
    text: Le pharaon s'en retourna chez lui et ne se soucia plus de cette affaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous les Egyptiens creusèrent aux environs du Nil, pour trouver de l''eau à boire, car ils ne pouvaient pas boire l''eau du Nil. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il s''écoula sept jours pleins, après que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' eut frappé le Nil.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Deuxième fléau : les grenouilles'
  marker-yv: yv-h
