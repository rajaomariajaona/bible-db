      text: Seigneur
  - type: text
    text: ' dit à Moïse : Dis à Aaron : « Prends ton bâton et étends ta main sur les eaux de l''Egypte : sur leurs rivières, sur les bras de leur Nil, sur leurs étangs et sur toutes leurs réserves d''eau. » Elles se changeront en sang et il y aura du sang dans toute l''Egypte, jusque dans les récipients de bois et de pierre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
