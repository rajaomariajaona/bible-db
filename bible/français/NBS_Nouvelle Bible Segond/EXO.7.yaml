    marker-yv: yv-n
  - type: text
    text: 'Au matin, va trouver le pharaon ; lorsqu''il sortira pour aller près de l''eau, tu l''attendras au bord du Nil. Tu prendras le bâton qui a été changé en serpent, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et tu diras au pharaon : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), le Dieu des Hébreux, m''a envoyé auprès de toi pour te dire : “Laisse partir mon peuple, pour qu''il me serve dans le désert.” Et toi, jusqu''ici, tu n''as pas écouté. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
