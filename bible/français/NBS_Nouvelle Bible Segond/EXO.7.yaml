  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Regarde, je te fais dieu pour le pharaon ; Aaron, ton frère, sera ton prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Toi, tu diras tout ce que je t''ordonnerai ; Aaron, ton frère, le dira au pharaon, pour qu''il laisse partir de son pays les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ferai en sorte…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'j''endurcirai le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' de Pharaon'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 4.21+ (autre verbe hébreu) ; voir aussi 7.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Ici c''est Dieu qui fait s''obstiner le pharaon (comme en 4.21 ; 9.12 ; 10.1,20,27 ; 11.10 ; 14.4,17 ; cf. Dt 2.30 ; Jos 11.20 ; Es 6.10), alors qu''ailleurs c''est le pharaon lui-même qui s''obstine (7.13,14,22 ; 8.11,15,28 ; 9.7,34s). Voir à ce sujet 7.5 ; 14.4 ; Rm 9.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'signes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prodiges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jr 32.20 ; Ps 78.43 ; 105.27 ; 135.9 ; Ac 7.36.
    marker-yv: yv-n
  - type: text
    text: 'Et moi, je ferai en sorte que le pharaon s''obstine et je multiplierai mes signes et mes prodiges en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le pharaon ne vous écoutera pas. Je mettrai ma main sur l''Egypte et je ferai sortir d''Egypte mes armées, mon peuple, les Israélites, par de grands jugements. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'Egypte.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi les Egyptiens sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), lorsque j''étendrai la main sur l''Egypte et que je ferai sortir du milieu d''eux les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse et Aaron firent ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur avait ordonné. Ainsi firent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moïse avait quatre-vingts ans, et Aaron quatre-vingt-trois ans, lorsqu'ils parlèrent au pharaon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pharaon refuse d'écouter Moïse et Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
