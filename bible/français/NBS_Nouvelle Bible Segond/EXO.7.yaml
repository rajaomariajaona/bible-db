        text: '7.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Certaines éditions traditionnelles commencent ici le chap. 8 qui compte, de ce fait, 4 v. de plus.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Va trouver le pharaon ; tu lui diras : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) : Laisse partir mon peuple, pour qu''il me serve. '
  - type: usfm
    marker: v
