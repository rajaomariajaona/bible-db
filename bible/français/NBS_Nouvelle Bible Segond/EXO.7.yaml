      - type: text
        text: ', voir Dt 26.6-8 ; Jos 24.5 ; Ps 78.44ss ; 105.27-36 ; 136.10-12 ; Né 9.9s ; cf. Am 4.10.'
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : A ceci tu sauras que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) : je frappe l''eau du Nil avec le bâton qui est dans ma main, et elle sera changée en sang. '
  - type: usfm
    marker: v
    metadata:
