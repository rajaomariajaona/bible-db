  - type: text
    text: 'Le roi d''Israël rassembla les prophètes, au nombre d''environ quatre cents, et leur dit : Dois-je aller faire la guerre à Ramoth de Galaad, ou bien m''en abstenir ? Ils répondirent : Vas-y ! Le Seigneur la livrera au roi ! '
