document_id: 1KI.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Achab veut reprendre Ramoth de Galaad
  - type: heading
    content: 2Ch 18.1-3
  - type: text
    content: 'On resta trois ans sans guerre entre Aram et Israël. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'revêtus de leurs habits royaux  : litt. habillés de leurs vêtements , de même au v. 30. D''après LXX ( en armes ), on pourrait comprendre revêtus de leur tenue militaire . –  l''aire à l''entrée de la porte  : cf. Jr 15.7n  ; Rt 3.2n. –  Samarie  : la scène se passe donc dans la capitale d''Israël (depuis la dynastie d''Omri : 16.23s). –  faisaient les prophètes  : autre traduction étaient en transe prophétique  ; cf. v. 8n. Même forme verbale en 18.29 ; 1S 10.5n  ; 19.20ss.'
  - type: text
    content: 'Le roi d''Israël et Josaphat, roi de Juda, étaient assis chacun sur son trône, revêtus de leurs habits royaux, sur l''aire à l''entrée de la porte de Samarie, et tous les prophètes faisaient les prophètes devant eux. '
  '11':
  - type: note
    content: 'Sédécias  : hébreu Tsidqiya, ce qui signifie YHWH est ma justice  ; il s''agit de l''un des prophètes mentionnés au v. 6. Un roi de Juda portera plus tard ce même nom, cf. 2R 24.17.'
  - type: text
    content: 'Sédécias, fils de Kenaana, s''était fait des cornes de fer ; il dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Avec cela tu donneras des coups aux Araméens jusqu''à leur extermination. '
  '12':
  - type: note
    content: 'Cf. v. 6. –  parlaient  : cf. v. 8n.'
  - type: text
    content: 'Tous les prophètes parlaient de même, en disant : Va à Ramoth de Galaad ! Tu vaincras ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' la livrera au roi !'
  - type: heading
    content: Le prophète Michée prédit la défaite
  - type: heading
    content: 2Ch 18.12-27
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 28.7-9 ; 2Ch 18.12. –  Les prophètes…  : litt. les paroles des prophètes, (d’)une seule bouche, du bien pour le roi ; que tes paroles, je te prie, soient comme une des leurs.'
  - type: text
    content: 'Le messager qui était allé appeler Michée lui dit : Les prophètes, d''un commun accord, annoncent du bien au roi. Je t''en prie, que ta parole s''accorde avec la leur : tu annonceras du bien ! '
  '14':
  - type: note
    content: Par la vie… 1.29n.
  - type: text
    content: 'Michée répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', je dirai ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dira !'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Il lui répondit…  : reprise ironique des paroles des autres prophètes : le roi ne se méprend pas sur cette ironie.'
  - type: text
    content: 'Lorsqu''il fut arrivé auprès du roi, le roi lui dit : Michée, devons-nous aller faire la guerre à Ramoth de Galaad, ou bien nous en abstenir ? Il lui répondit : Vas-y ! Tu vaincras ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' la livrera au roi ! '
  '16':
  - type: note
    content: jurer… au nom du Seigneur 1S 20.42.
  - type: text
    content: 'Mais le roi lui dit : Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '17':
  - type: note
    content: 'Il répondit  : LXX Michée répondit  ; de même au v. 19n. –  J''ai vu…  : LXX fait précéder le discours d''une exclamation qu''on pourrait traduire par il n''en est pas ainsi  ; elle pourrait correspondre à une autre lecture de la formule traduite au v. 19 par eh bien. –  comme un troupeau…  : le mot hébreu désigne un troupeau de petit bétail, c.-à-d. de moutons et de chèvres ; cf. Nb 27.17 ; Jr 50.6,17 ; Ez 34.5s ; Na 3.18 ; 2Ch 18.16 ; Mt 9.36 ; Mc 6.34. –  seigneurs  : autre traduction maîtres. –  en paix v. 27n.'
  - type: text
    content: 'Il répondit : J''ai vu tout Israël dispersé dans les montagnes, comme un troupeau qui n''a pas de berger. Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : Ces gens n''ont plus de seigneurs ; que chacun rentre chez soi en paix ! '
  '18':
  - type: note
    content: 'annonce  : cf. v. 8n.'
  - type: text
    content: 'Le roi d''Israël dit à Josaphat : Ne te l''ai-je pas dit ? Il n''annonce sur moi rien de bon, mais seulement du mal.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Michée dit  : litt. il dit , cf. v. 17n. –  J''ai vu le Seigneur (LXX ajoute le Dieu d''Israël , ici mais pas en 2Ch 18.18) assis sur son trône  : cf. Es 6.1. –  toute l''armée du ciel  : cf. Dt 4.19n. –  auprès de lui  : absent de 2Ch 18.18.'
  - type: text
    content: 'Alors Michée dit : Eh bien, écoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! J''ai vu le '
  - type: text
    content: Seigneur
  - type: text
    content: ' assis sur son trône, et toute l''armée du ciel se tenant auprès de lui, à sa droite et à sa gauche. '
  '2':
  - type: note
    content: 'Josaphat 15.24. –  descendit  : l''altitude de Samarie est inférieure de plus de 300 m à celle de Jérusalem. –  roi d''Israël  : Achab, voir v. 20ss.'
  - type: text
    content: 'La troisième année, Josaphat, roi de Juda, descendit auprès du roi d''Israël. '
  '20':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : Qui dupera Achab pour qu''il attaque Ramoth de Galaad et qu''il y tombe ? Ils répondirent l''un d''une manière, l''autre d''une autre. '
  '21':
  - type: note
    content: 'un esprit ou un souffle, comme dans la suite ; litt. le souffle. –  se présenta  : litt. se tint devant, cf. 10.8n.'
  - type: text
    content: 'Alors un esprit sortit, se présenta devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit : Moi, je le duperai. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Comment ? '
  '22':
  - type: note
    content: 'Cf. Ap 16.13. –  je serai un souffle  : quelques mss hébreux et Tg portent je deviendrai un souffle.'
  - type: text
    content: '– Je sortirai, dit-il, et je serai un souffle de mensonge dans la bouche de tous ses prophètes. Il répondit : Tu le duperas, tu réussiras ! Sors et fais ainsi ! '
  '23':
  - type: note
    content: 'Et maintenant  : autre traduction en fait. –  décrété  : litt. parlé.'
  - type: text
    content: 'Et maintenant, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a mis un souffle de mensonge dans la bouche de tous tes prophètes que voici ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', lui, a décrété un malheur contre toi !'
  '24':
  - type: text
    content: 'Alors Sédécias, fils de Kenaana, s''approcha, frappa Michée sur la joue et dit : Par où le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est-il sorti de moi pour te parler ? '
  '25':
  - type: note
    content: 'de pièce en pièce  : cf. 20.30n.'
  - type: text
    content: 'Michée répondit : Tu le verras bien, le jour où tu iras de pièce en pièce pour te cacher. '
  '26':
  - type: note
    content: 'Prends / emmène  : impératifs s''adressant peut-être au haut fonctionnaire des v. 9ss ; cf. 2Ch 18.25 prenez / emmenez. –  Joas, fils du roi  : cf. 2R 10.1.'
  - type: text
    content: 'Le roi d''Israël dit : Prends Michée et emmène-le vers Amôn, chef de la ville, et vers Joas, fils du roi. '
  '27':
  - type: note
    content: 'qu''il reste au pain sec et à l''eau  : litt. nourrissez-le de pain d''oppression et d''eau d''oppression  ; cf. Ez 4.9-11,16. Sur une expression proche, cf. Es 30.20n. –  victorieux  : autre traduction sain et sauf, litt. en paix  ; de même au v. 28 ; cf. Jos 10.21+.'
  - type: text
    content: 'Tu diras : Ainsi parle le roi : Mettez cet homme dans la maison de détention ; qu''il reste au pain sec et à l''eau jusqu''à ce que je rentre victorieux ! '
  '28':
  - type: note
    content: 'Il dit encore…  : absent de LXX ; cf. Mi 1.2.'
  - type: text
    content: 'Michée dit : Si vraiment tu reviens victorieux, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas parlé par moi. Il dit encore : Ecoutez, vous tous, peuples !'
  - type: heading
    content: Le roi Achab est tué au combat
  - type: heading
    content: 2Ch 18.28-34
  '29':
  - type: text
    content: 'Le roi d''Israël et Josaphat, roi de Juda, attaquèrent Ramoth de Galaad. '
  '3':
  - type: note
    content: 'ses hommes  : litt. ses serviteurs. –  Ramoth de Galaad 4.13n. –  nous hésitons  : litt. nous nous taisons, ou nous restons inactifs  ; cf. Jg 18.9.'
  - type: text
    content: 'Le roi d''Israël dit à ses hommes : Vous savez que Ramoth de Galaad est à nous ! Et nous, nous hésitons à la reprendre au roi d''Aram ! '
  '30':
  - type: note
    content: 'qu''il se déguiserait pour aller  : texte incertain ; LXX, Syr et Tg ont lu, à la première personne, je me déguiserai… –  dit-il  : sous-entendu dans le texte. –  revêts-toi…  : cf. v. 10n.'
  - type: text
    content: 'Le roi d''Israël dit à Josaphat qu''il se déguiserait pour aller au combat : « Toi, dit-il, revêts-toi de tes habits royaux ! » Ainsi le roi d''Israël se déguisa, et il alla au combat. '
  '31':
  - type: note
    content: 'trente-deux  : cf. 20.1,16. –  Vous n''attaquerez…  : litt. vous n''attaquerez ni petit ni grand (cf. Nb 22.18n), mais uniquement le roi d''Israël  ; cf. 1S 20.2n  ; 25.36.'
  - type: text
    content: 'Le roi d''Aram avait donné cet ordre aux trente-deux chefs de ses chars : Vous n''attaquerez personne d''autre que le roi d''Israël. '
  '32':
  - type: note
    content: 'Cf. 2Ch 18.32. –  appela au secours  : litt. cria.'
  - type: text
    content: 'Quand les chefs des chars aperçurent Josaphat, ils dirent : C''est certainement le roi d''Israël. Ils se dirigèrent vers lui pour l''attaquer. Mais Josaphat appela au secours. '
  '33':
  - type: text
    content: 'Les chefs des chars, voyant que ce n''était pas le roi d''Israël, s''éloignèrent de lui. '
  '34':
  - type: note
    content: 'au hasard  : litt. dans son intégrité (ou sa simplicité, son innocence), c.-à-d. sans savoir sur qui il tirait  ; expressions comparables en 2S 15.11 (en toute bonne foi) ; Es 47.9 (dans toute leur rigueur). –  au défaut de la cuirasse  : litt. entre ce qui est attaché et la cuirasse. –  Tourne bride  : litt. tourne ta main. –  du champ de bataille  : litt. du camp  ; LXX du combat. –  car je suis blessé  : cf. 2Ch 35.23.'
  - type: text
    content: 'Alors un homme tira au hasard avec son arc et frappa le roi d''Israël au défaut de la cuirasse. Le roi dit au conducteur de son char : Tourne bride et fais-moi sortir du champ de bataille, car je suis blessé. '
  '35':
  - type: text
    content: 'Le combat fut si violent ce jour-là que le roi dut être maintenu debout sur son char, en face des Araméens ; il mourut le soir même. Le sang de la blessure coula à l''intérieur du char. '
  '36':
  - type: note
    content: 'Chacun à sa ville…  : cf. Jr 46.16.'
  - type: text
    content: 'Au coucher du soleil, ce cri se répandit dans le camp : Chacun à sa ville, chacun dans son pays ! '
  '37':
  - type: note
    content: 'Ainsi mourut…  : LXX le roi est mort. On rentra à Samarie…'
  - type: text
    content: Ainsi mourut le roi qui fut ramené à Samarie ; et on ensevelit le roi à Samarie.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'le sang d''Achab  : litt. son sang . –  selon la parole  : cf. 21.19+.'
  - type: text
    content: 'Lorsqu''on nettoya à grande eau le char au réservoir de Samarie, les chiens léchèrent le sang d''Achab et les prostituées vinrent s''y laver, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait prononcée.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 11.41n. –  la maison d''ivoire  : cf. Am 3.15 ; Ps 45.9. –  le livre des chroniques des rois d''Israël 14.19n.'
  - type: text
    content: 'Le reste de l''histoire d''Achab, tout ce qu''il a fait, la maison d''ivoire qu''il a bâtie et toutes les villes qu''il a bâties, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '4':
  - type: note
    content: Cf. 2R 3.7.
  - type: text
    content: 'Il dit à Josaphat : Iras-tu avec moi faire la guerre à Ramoth de Galaad ? Josaphat répondit au roi d''Israël : Il en sera pour moi comme pour toi, pour mon peuple comme pour ton peuple, pour mes chevaux comme pour tes chevaux.'
  - type: heading
    content: Les prophètes prédisent la victoire
  - type: heading
    content: 2Ch 18.4-11
  '40':
  - type: note
    content: 'Achab meurt vers 853 av. J.-C. –  se coucha… 1.21+. –  Achazia  : hébreu Ahazyahou, YHWH a saisi  ; un roi de Juda portera le même nom (cf. 2R 8.24).'
  - type: text
    content: Achab se coucha avec ses pères. Achazia, son fils, devint roi à sa place.
  - type: heading
    content: Josaphat, roi de Juda
  - type: heading
    content: 2Ch 20.31–21.1
  '41':
  - type: text
    content: 'Josaphat, fils d''Asa, devint roi sur Juda, la quatrième année d''Achab, roi d''Israël. '
  '42':
  - type: note
    content: vingt-cinq ans ≈ 870-848 av. J.-C. –  Azouba signifie abandonnée.
  - type: text
    content: 'Josaphat avait trente-cinq ans lorsqu''il devint roi ; il régna vingt-cinq ans à Jérusalem. Le nom de sa mère était Azouba, fille de Shilhi. '
  '43':
  - type: note
    content: 'Il suivit en tout la voie  : cf. 15.11-13. –  ce qui convenait… 14.8n.'
  - type: text
    content: 'Il suivit en tout la voie d''Asa, son père, et il ne s''en écarta pas, faisant ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '44':
  - type: note
    content: 'Toutefois les hauts lieux…  : cf. 3.3 ; 15.14 ; 2R 18.4 ; 23.5.'
  - type: text
    content: 'Toutefois les hauts lieux ne disparurent pas : le peuple offrait encore des sacrifices et de l''encens dans les hauts lieux. '
  '45':
  - type: note
    content: 'Josaphat fut en paix (autre traduction fit la paix) …  : sur l''alliance entre Israël et Juda, scellée par un mariage royal, cf. 2R 8.18.'
  - type: text
    content: Josaphat fut en paix avec le roi d'Israël.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 11.41n. –  les combats  : autre traduction les guerres . –  le livre des chroniques des rois de Juda 14.19n.'
  - type: text
    content: 'Le reste de l''histoire de Josaphat, la vaillance qu''il a montrée, les combats qu''il a livrés, cela est écrit dans le livre des chroniques des rois de Juda. '
  '47':
  - type: note
    content: 'Il élimina du pays le reste des prostitués sacrés  : cf. 14.10n,24n  ; 15.12.'
  - type: text
    content: 'Il élimina du pays le reste des prostitués sacrés qui subsistaient depuis le temps de son père Asa. '
  '48':
  - type: note
    content: 'Autres traductions possibles  : il n''y avait pas de roi établi (autre sens du mot traduit par préfet) en Edom  ; ou encore, en rattachant les v. 48 et 49  : il n''y avait pas de roi en Edom. Le préfet du roi Josaphat construisit…  ; la dépendance d''Edom à l''égard de Juda durera jusqu''au temps de Joram (2R 8.20-22).'
  - type: text
    content: 'Il n''y avait pas de roi en Edom, mais un préfet du roi. '
  '49':
  - type: note
    content: 'Josaphat construisit des bateaux…  : cf. 9.26-28 ; 10.22. –  construisit  : le texte hébreu est traditionnellement lu de deux façons différentes : ou bien fit des bateaux, ou bien eut dix bateaux  ; LXX un bateau. –  bateaux de Tarsis 10.22n. –  Ophir 9.28n. –  Etsiôn-Guéber 9.26n.'
  - type: text
    content: 'Josaphat construisit des bateaux de Tarsis pour aller chercher de l''or à Ophir ; mais il n''y alla pas, parce que les bateaux se brisèrent à Etsiôn-Guéber. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Consulte…  : LXX consultez  ; cf. 1S 23.2,4,9-12 ; 2S 5.19,23. –  la parole  : absent de LXX.'
  - type: text
    content: 'Puis Josaphat dit au roi d''Israël : Consulte d''abord, je te prie, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '50':
  - type: text
    content: 'Alors Achazia, fils d''Achab, dit à Josaphat : Que mes hommes aillent avec les tiens sur les bateaux ! Mais Josaphat ne voulut pas. '
  '51':
  - type: note
    content: 'se coucha avec ses pères 1.21n. –  enseveli avec ses pères  : absent de quelques mss de LXX. –  Joram  : nom qui signifie YHWH est élevé.'
  - type: text
    content: Josaphat se coucha avec ses pères et fut enseveli avec ses pères dans la Ville de David, son père. Joram, son fils, devint roi à sa place.
  - type: heading
    content: Achazia, roi d'Israël
  '52':
  - type: text
    content: ' '
  - type: note
    content: deux ans ≈ 853-852 av. J.-C. Cf. v. 40.
  - type: text
    content: 'Achazia, fils d''Achab, devint roi sur Israël à Samarie, la dix-septième année de Josaphat, roi de Juda. Il régna deux ans sur Israël. '
  '53':
  - type: note
    content: 'la voie de Jéroboam… fait pécher Israël  : cf. 12.28-31.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et suivit la voie de son père, la voie de sa mère et la voie de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '54':
  - type: note
    content: 'Voir Baal. –  comme l''avait fait son père  : cf. 2R 24.9 ; voir aussi 2R 15.9 ; 23.32,37.'
  - type: text
    content: 'Il servit le Baal et se prosterna devant lui ; il contraria le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël, tout comme l''avait fait son père.'
  '6':
  - type: note
    content: 'Vas-y ! Autres traductions monte ou attaque  ; cf. v. 12,15. –  Le Seigneur  : Tg et de nombreux mss portent YHWH (le Seigneur) ; cf. 2Ch 18.5 (Dieu).'
  - type: text
    content: 'Le roi d''Israël rassembla les prophètes, au nombre d''environ quatre cents, et leur dit : Dois-je aller faire la guerre à Ramoth de Galaad, ou bien m''en abstenir ? Ils répondirent : Vas-y ! Le Seigneur la livrera au roi ! '
  '7':
  - type: note
    content: 'par qui  : on pourrait aussi comprendre par le signe de qui, de même au v. 8. –  consulter  : litt. chercher, le verbe s''applique souvent à la consultation d''une divinité par l''entremise d''un oracle, ici un prophète.'
  - type: text
    content: 'Mais Josaphat dit : N''y a-t-il plus ici aucun prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: ', par qui nous puissions consulter ? '
  '8':
  - type: note
    content: 'annonce  : le même verbe est traduit par faire le prophète au v. 10n (voir Nb 11.25n) et, à une autre forme, par parler au v. 12 ; de même en 2Ch 18.7,9,11. –  Michée  : hébreu Mikayehou (Qui est comme YHWH ?) ; ce prophète n''est pas celui du livre de Michée (Mi 1.1n).'
  - type: text
    content: 'Le roi d''Israël répondit à Josaphat : Il n''y a plus qu''un seul homme par qui l''on pourrait consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; mais moi, je le déteste, car il n''annonce sur moi rien de bon, seulement du mal : c''est Michée, fils de Yimla. Josaphat dit : Que le roi ne parle pas ainsi ! '
  '9':
  - type: note
    content: 'haut fonctionnaire  : cf. Gn 37.36n. –  Michée v. 8n.'
  - type: text
    content: 'Alors le roi d''Israël appela un haut fonctionnaire et lui dit : Fais venir tout de suite Michée, fils de Yimla.'
