    marker-yv: yv-n
  - type: text
    text: 'Il dit à Josaphat : Iras-tu avec moi faire la guerre à Ramoth de Galaad ? Josaphat répondit au roi d''Israël : Il en sera pour moi comme pour toi, pour mon peuple comme pour ton peuple, pour mes chevaux comme pour tes chevaux.'
