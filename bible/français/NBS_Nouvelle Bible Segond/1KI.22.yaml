  - type: text
    text: 'Le roi d''Israël et Josaphat, roi de Juda, étaient assis chacun sur son trône, revêtus de leurs habits royaux, sur l''aire à l''entrée de la porte de Samarie, et tous les prophètes faisaient les prophètes devant eux. '
