      marker-yv: yv-n
    - type: text
      text: 'Je parle de manière humaine à cause de la faiblesse de votre chair : de même, en effet, que vous avez mis votre corps tout entier, comme un esclave, à la disposition de l''impureté et du mal, pour aboutir au mal, ainsi maintenant mettez votre corps tout entier, comme un esclave, à la disposition de la justice, pour aboutir à une consécration. '
