      marker-yv: yv-n
    - type: text
      text: 'Ne savez-vous pas que si vous vous mettez à la disposition de quelqu''un comme des esclaves, pour lui obéir, vous êtes esclaves de celui à qui vous obéissez, soit du péché qui conduit à la mort, soit de l''obéissance qui conduit à la justice ? '
