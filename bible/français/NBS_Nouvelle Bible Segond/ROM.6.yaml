document_id: ROM.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Morts au péché, mais vivants en Jésus-Christ
  - type: text
    content: ' '
  - type: note
    content: '3.5-8+. – Voir grâce . –  foisonne  : cf. 5.20.'
  - type: text
    content: 'Que dirons-nous donc ? Demeurerions-nous dans le péché, pour que la grâce foisonne ? '
  '10':
  - type: note
    content: pour le péché, comme aux v. 2,11 ; cf. 8.3 ; 2Co 5.21. –  une fois pour toutes Hé 9.26-28 ; 1P 3.18. –  il vit pour Dieu Ga 2.19.
  - type: text
    content: 'S''il est mort, en effet, c''est pour le péché qu''il est mort, une fois pour toutes ; et s''il vit, il vit pour Dieu. '
  '11':
  - type: note
    content: 'estimez-vous  : voir 4.3n. –  morts pour le péché… 1P 2.24 ; cf. 1Co 15.19 ; 2Co 5.15 ; Col 3.3,5.'
  - type: text
    content: Ainsi vous-mêmes, estimez-vous morts pour le péché et vivants pour Dieu, en Jésus-Christ.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le péché…  : cf. Gn 4.7. –  corps mortel  : cf. v. 6+.'
  - type: text
    content: 'Que le péché ne règne donc pas dans votre corps mortel : n''obéissez pas à ses désirs. '
  '13':
  - type: note
    content: 'Ne mettez… à la disposition du ou au service du…  : litt. ne présentez… au péché, mais présentez-vous à Dieu  ; même verbe v. 16,19 ; 12.1 (offrir) ; 14.10 (comparaître) ; 16.2 ; Lc 2.22 (présenter) ; 1Co 8.8n  ; 2Co 4.14 (faire paraître) ; 11.2 ; Ep 5.27 ; Col 1.22,28n  ; 2Tm 2.15 ; 4.17n. –  aucune partie de votre corps / votre corps tout entier  : litt. les parties de votre corps (traduction traditionnelle vos membres, mais le terme grec a un sens plus large) ; de même dans la suite ; cf. v. 19 ; 7.5,23 ; 12.4s ; 1Co 6.15 ; 12.12-27 ; Ep 4.25 ; 5.30 ; Col 3.5 ; voir aussi Mt 5.29s ; Jc 3.5s ; 4.1. –  une arme  : litt. des armes, de même dans la suite ; cf. 13.12+.'
  - type: text
    content: 'Ne mettez aucune partie de votre corps à la disposition du péché comme une arme pour l''injustice ; mais mettez-vous vous-mêmes au service de Dieu, comme des vivants revenus d''entre les morts, et mettez votre corps tout entier au service de Dieu, comme une arme pour la justice. '
  '14':
  - type: note
    content: 'Cf. v. 9n. –  loi / grâce  : cf. 7.6n  ; Ga 5.18.'
  - type: text
    content: Le péché, en effet, n'exercera pas sur vous sa maîtrise, car vous n'êtes pas sous la loi, mais sous la grâce.
  - type: heading
    content: Au service de la justice
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 1s.
  - type: text
    content: 'Quoi donc ? Pécherions-nous, parce que nous ne sommes pas sous la loi, mais sous la grâce ? Jamais de la vie ! '
  '16':
  - type: note
    content: Jn 8.34+ ; 2P 2.19.
  - type: text
    content: 'Ne savez-vous pas que si vous vous mettez à la disposition de quelqu''un comme des esclaves, pour lui obéir, vous êtes esclaves de celui à qui vous obéissez, soit du péché qui conduit à la mort, soit de l''obéissance qui conduit à la justice ? '
  '17':
  - type: note
    content: 'grâce à Dieu 7.25 ; 1Co 15.57 ; 2Co 2.14 ; 8.16 ; 9.15. – Voir cœur. –  modèle (ou type, règle, cf. 5.14n) d''enseignement (16.17) : cf. 2Tm 1.13. –  confiés ou livrés (cf. 1.24,26,28 ; 4.25 ; 8.32), remis  ; le même verbe, quand il a pour objet un enseignement, est aussi traduit par transmettre (1Co 11.2+).'
  - type: text
    content: 'Mais, grâce à Dieu, après avoir été esclaves du péché, vous avez obéi, de cœur, au modèle d''enseignement auquel vous avez été confiés. '
  '18':
  - type: note
    content: Libérés du péché v. 22 ; Ga 5.1,13 ; cf. Jn 8.32,36 ; 1P 2.24. – Voir justice.
  - type: text
    content: Libérés du péché, vous êtes devenus esclaves de la justice.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'de manière humaine  : cf. 3.5n. –  votre chair  : cf. 1.3n. –  mis votre corps tout entier… v. 13n. –  impureté  : voir pur, impur. –  mal  : autre traduction désordre  ; le terme grec est opposé au mot habituellement traduit par loi (un adverbe apparenté est traduit par sans la loi en 2.12), cf. 4.7n  ; 1Co 9.21 ; voir aussi Mt 7.23+ ; 2Th 2.3n. –  consécration ou sanctification  : le terme est dérivé de l''adjectif habituellement traduit par saint ou sacré , de même v. 22 ; cf. 1Th 4.3,7 ; 2Th 2.13 ; Hé 12.14 ; voir aussi Rm 1.7 ; 1Co 6.11 ; Ap 22.11.'
  - type: text
    content: 'Je parle de manière humaine à cause de la faiblesse de votre chair : de même, en effet, que vous avez mis votre corps tout entier, comme un esclave, à la disposition de l''impureté et du mal, pour aboutir au mal, ainsi maintenant mettez votre corps tout entier, comme un esclave, à la disposition de la justice, pour aboutir à une consécration. '
  '2':
  - type: note
    content: 'morts pour le péché  : on peut comprendre quant au péché, en ce qui concerne le péché, mais aussi par le péché  ; cf. v. 10s ; 14.7s ; Ga 2.19 ; Col 3.3 ; 1P 2.24 ; 4.1. –  en lui  : autre traduction par lui.'
  - type: text
    content: 'Jamais de la vie ! Nous qui sommes morts pour le péché, comment vivrions-nous encore en lui ? '
  '20':
  - type: note
    content: esclaves du péché v. 16.
  - type: text
    content: 'Car, lorsque vous étiez esclaves du péché, vous étiez libres à l''égard de la justice. '
  '21':
  - type: note
    content: 'fruit  : cf. 7.5. –  portiez-vous  : litt. aviez-vous. –  fin / mort 8.6,13.'
  - type: text
    content: 'Quel fruit portiez-vous alors ? Des choses dont vous avez honte maintenant, car leur fin, c''est la mort. '
  '22':
  - type: note
    content: 'libérés du péché v. 18. –  fruit Jn 15.8,16 ; Ga 5.22 ; 6.8. –  consécration v. 19n. –  fin  : cf. 1P 1.9. –  la (ou une) vie éternelle 2.7+.'
  - type: text
    content: 'Mais maintenant, libérés du péché et devenus esclaves de Dieu, vous avez pour fruit une consécration et pour fin la vie éternelle. '
  '23':
  - type: note
    content: 'salaire  : cf. 2Co 11.8n. –  péché / mort 5.12,21. –  don de la grâce 1.11n  ; 5.15.'
  - type: text
    content: Car le salaire du péché, c'est la mort ; mais le don de la grâce, le don de Dieu, c'est la vie éternelle en Jésus-Christ, notre Seigneur.
  '3':
  - type: note
    content: 'Ignorez-vous 7.1. –  reçu le baptême…  : litt. été baptisés en (ou pour) Christ Jésus, de même dans la suite (dans ou pour sa mort) ; la préposition grecque peut être comprise dans un sens local (équivalent de l''anglais into, p. ex. dans le Jourdain Mc 1.9), mais aussi dans un sens logique  : pour, en vue de (Mt 3.11), en relation avec  ; c''est elle qui figure dans l''expression correspondant à pour le nom de en Mt 28.19 ; 1Co 1.13,15 ; voir 1Co 10.2n  ; 12.13n  ; Ga 3.27 ; voir aussi Mc 10.38 ; Lc 12.50.'
  - type: text
    content: 'Ignorez-vous que nous tous qui avons reçu le baptême de Jésus-Christ, c''est le baptême de sa mort que nous avons reçu ? '
  '4':
  - type: note
    content: 'de la mort  : litt. dans (ou pour) la mort, voir v. 3n  ; autre traduction, moins probable  : par ce baptême, nous avons donc été ensevelis ensemble avec lui dans la mort. –  ensevelis Col 2.12 ; cf. 2Tm 2.11. –  comme le Christ s''est réveillé ou s''est relevé, voir résurrection  ; 4.24n  ; 1P 1.3. –  gloire 3.23+ ; cf. Jn 11.40. –  nous marchions…  : litt. nous marchions en nouveauté de vie  ; cf. 7.6n  ; autre traduction nous menions une vie nouvelle  ; 12.1 ; 2Co 5.17+ ; Ap 2.17+.'
  - type: text
    content: 'Par ce baptême de la mort, nous avons donc été ensevelis avec lui afin que, tout comme le Christ s''est réveillé d''entre les morts, par la gloire du Père, de même nous aussi nous marchions sous le régime nouveau de la vie. '
  '5':
  - type: note
    content: 'assimilés  : le terme grec vient d''un verbe qui signifie croître, pousser avec (comme une plante) ; il est apparenté au mot souvent traduit par nature  ; autre traduction si nous sommes devenus un même être avec lui… –  à lui…  : autre traduction à sa mort… à sa résurrection  ; cf. Ph 3.10s ; voir aussi Jn 12.24-26 ; 1Co 15.36ss ; Ep 2.6.'
  - type: text
    content: 'En effet, si nous avons été assimilés à lui par une mort semblable à la sienne, nous le serons aussi par une résurrection semblable. '
  '6':
  - type: note
    content: 'en nous l''homme ancien  : litt. notre homme (être humain) ancien  ; la même expression est opposée à l''homme nouveau en Ep 4.22-24 ; Col 3.9s. –  crucifié avec lui  : litt. crucifié ensemble  ; cf. 8.13 ; Ga 2.19s ; 5.24 ; 6.14. –  corps  : cf. v. 12 ; 12.1.'
  - type: text
    content: 'Nous savons qu''en nous l''homme ancien a été crucifié avec lui, pour que le corps du péché soit réduit à rien et que nous ne soyons plus esclaves du péché ; '
  '7':
  - type: note
    content: 'est justifié…  : litt. est justifié du péché (le temps du verbe grec évoque les résultats permanents d''une action passée) ; cf. 7.1 ; Ac 13.39.'
  - type: text
    content: 'car celui qui est mort est justifié, il est quitte du péché. '
  '8':
  - type: note
    content: Cf. Ph 1.23 ; Col 3.3s ; 1Th 4.14,17 ; 5.10 ; 2Tm 2.11.
  - type: text
    content: 'Or si nous sommes morts avec le Christ, nous croyons que nous vivrons aussi avec lui, '
  '9':
  - type: note
    content: 'Ac 13.34. –  n''exerce plus sur lui sa maîtrise  : le verbe grec (de même v. 14 ; 7.1 ; voir aussi 2Co 1.24) est apparenté au mot traduit par Seigneur  ; il est traduit par être Seigneur de en 14.9 ; dominer en Seigneur en Lc 22.25 ; 1Tm 6.15 ; verbe dérivé en 1P 5.3n.'
  - type: text
    content: 'sachant que le Christ réveillé d''entre les morts ne meurt plus ; la mort n''exerce plus sur lui sa maîtrise. '
