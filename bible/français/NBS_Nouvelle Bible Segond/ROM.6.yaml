      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme aux v. 2,11 ; cf. 8.3 ; 2Co 5.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une fois pour toutes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hé 9.26-28 ; 1P 3.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il vit pour Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ga 2.19.
      marker-yv: yv-n
    - type: text
      text: 'S''il est mort, en effet, c''est pour le péché qu''il est mort, une fois pour toutes ; et s''il vit, il vit pour Dieu. '
