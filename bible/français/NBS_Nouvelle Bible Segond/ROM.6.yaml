        children:
        - type: text
          text: une arme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des armes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; cf. 13.12+.'
      marker-yv: yv-n
    - type: text
      text: 'Ne mettez aucune partie de votre corps à la disposition du péché comme une arme pour l''injustice ; mais mettez-vous vous-mêmes au service de Dieu, comme des vivants revenus d''entre les morts, et mettez votre corps tout entier au service de Dieu, comme une arme pour la justice. '
