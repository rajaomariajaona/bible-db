document_id: ISA.40,104
type_code: fra
verses:
  '1':
  - type: heading
    content: DEUXIÈME PARTIE
  - type: heading
    content: Consolez mon peuple
  - type: text
    content: ' '
  - type: note
    content: Consolez 49.13 ; 51.3,12 ; 52.9 ; 61.2 ; cf. Lm 1.2,9,16-21 ; 2.13. Les chapitres qui suivent se rapportent au rétablissement d'Israël après l'exil à Babylone (tombée en 539 av. J.-C.).
  - type: text
    content: Consolez, consolez mon peuple,
  - type: text
    content: dit votre Dieu.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'son bras  : cf. 33.2n  ; 51.5,9 ; 52.10 ; 53.1 ; 59.16 ; 62.8 ; 63.5,12 ; Ex 6.6 ; Ps 77.16 ; 89.11,14. –  son salaire / sa rétribution (autre traduction son œuvre ) : cf. 62.11 ; voir aussi 59.18+ (autre mot) ; Jr 31.16s ; Ap 22.12.'
  - type: text
    content: 'Le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: vient avec force,
  - type: text
    content: son bras lui assure la domination ;
  - type: text
    content: il a avec lui son salaire,
  - type: text
    content: sa rétribution le précède.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Comme un berger  : cf. Gn 33.12-14 ; Jr 31.10 ; Ez 34.11ss ; Ps 23.1 ; 80.2 ; Lc 15.3-7 ; Jn 10. –  sur son sein Nb 11.11s.'
  - type: text
    content: Comme un berger, il fera paître son troupeau,
  - type: text
    content: de son bras il rassemblera des agneaux
  - type: text
    content: et les portera sur son sein ;
  - type: text
    content: il conduira les brebis qui allaitent.
  - type: heading
    content: A qui comparer le Seigneur  ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Qui a mesuré…  : cf. Jb 38.4–39.30 ; Pr 30.4 ; Siracide 1.2s : « Le sable des mers, les gouttes de la pluie, les jours de l''éternité, qui les dénombrera ? La hauteur du ciel, la largeur de la terre, la profondeur de l''abîme, qui les explorera ? » –  les eaux  : un ms de Qumrân ajoute de la mer. –  jaugé dans une mesure ou fait tenir dans un tiers de mesure  ; cf. Ps 80.6n. –  toute  : sous-entendu dans le texte.'
  - type: text
    content: Qui a mesuré les eaux dans le creux de sa main,
  - type: text
    content: fixé les dimensions du ciel avec la paume,
  - type: text
    content: jaugé dans une mesure toute la poussière de la terre ?
  - type: text
    content: Qui a pesé les montagnes au crochet
  - type: text
    content: et les collines à la balance ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'au souffle ou à l''Esprit. –  qui lui donne des conseils  : autre traduction qui lui fait connaître l''homme de ses projets , même formule en 46.11n où il s''agit de Cyrus (44.28n). LXX qui a connu la pensée du Seigneur, qui a été son conseiller pour l''instruire ? Cf. Rm 11.34 ; 1Co 2.16.'
  - type: text
    content: 'Qui a fixé une mesure au souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui lui donne des conseils ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Jb 21.22. –  équité  : le même terme est traduit par droit au v. 27.'
  - type: text
    content: Avec qui a-t-il tenu conseil,
  - type: text
    content: pour mieux comprendre quelque chose ?
  - type: text
    content: Qui lui a appris le sentier de l'équité ?
  - type: text
    content: Qui lui a appris la connaissance ?
  - type: text
    content: Qui lui a fait connaître le chemin de l'intelligence ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'poussière sur une balance  : cf. Ps 62.10 ; Sagesse 11.22s : « Le monde entier est devant toi comme le poids infime qui déséquilibre une balance, comme la goutte de rosée matinale qui descend vers le sol. Mais tu as pitié de tous parce que tu peux tout. » –  îles 11.11+.'
  - type: text
    content: Les nations sont comme une goutte qui tombe d'un seau,
  - type: text
    content: elles comptent comme la poussière sur une balance ;
  - type: text
    content: les îles sont comme une fine poussière qui s'envole.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 50.10ss. –  Le Liban 33.9+. –  holocauste  : voir sacrifices.'
  - type: text
    content: Le Liban ne suffit pas au bûcher,
  - type: text
    content: et ses animaux ne suffisent pas à l'holocauste.
  '17':
  - type: text
    content: Toutes les nations sont comme rien devant lui ;
  - type: text
    content: elles comptent moins pour lui que néant et chaos.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 25 ; 44.7n  ; 46.5 ; Ex 20.4s ; Dt 3.24 ; 4.15s ; Jr 10.6 ; 49.19 ; Ac 17.29. Les termes correspondant à comparer et à ressemble (même mot pour ressemblance en Gn 1.26) sont de la même racine en hébreu. –  Dieu  : hébreu ’El , de même en 42.5 ; 43.10,12 ; 44.10,15,17 ; 45.14s,20ss ; 46.6,9 ; cf. Gn 21.33n.'
  - type: text
    content: A qui voulez-vous comparer Dieu ?
  - type: text
    content: Que présenterez-vous qui lui ressemble ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: '41.6s ; 44.9-20 ; 46.6s ; Jr 2.27s ; 10.1-16 ; 51.17s ; Ps 115.4-8 ; 135.15-18. –  couvre  : cf. 42.5n.'
  - type: text
    content: C'est un artisan qui fond la statue,
  - type: text
    content: et c'est un orfèvre qui la couvre d'or
  - type: text
    content: et y soude des chaînettes d'argent.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Parlez au cœur  : cf. Gn 34.3n  ; 50.21 ; Jg 19.3 ; Os 2.16 ; Rt 2.13. –  Jérusalem 52.8s. –  son combat  : le mot hébreu correspondant est traduit par service (militaire) en Jb 14.14n  : temps d''épreuve. –  qu''elle s''est acquittée de sa faute ou qu''elle a purgé sa peine  ; même expression en Lv 26.41n,43n. –  du Seigneur  : litt. de la main de YHWH . –  le double de  : autre traduction largement  ; cf. 61.7+ ; Ez 21.19 ; voir aussi Ex 22.3,6,8 ; Jr 16.18+.'
  - type: text
    content: Parlez au cœur de Jérusalem, criez-lui
  - type: text
    content: que son combat est terminé,
  - type: text
    content: qu'elle s'est acquittée de sa faute,
  - type: text
    content: 'qu''elle a déjà reçu du '
  - type: text
    content: Seigneur
  - type: text
    content: le double de ce qu'elle méritait pour tous ses péchés.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui est trop pauvre…  : sens incertain, obtenu par rapprochement avec un terme ressemblant (Dt 8.9, rationner  ; Ec 4.13 ; 9.15s). On pourrait aussi comprendre  : l''homme expert en offrande , ou encore on choisit du mûrier d''offrande (bois qui résiste…) ; le terme traduit par offrande est rendu par prélèvement dans les textes de loi (Ex 25.2n), mais il pourrait avoir un autre sens ( œuvre d''art  ?). –  habile  : le mot hébreu est habituellement traduit par sage , cf. 3.3n. –  qui ne vacille pas  : cf. 41.7 ; 54.10.'
  - type: text
    content: Celui qui est trop pauvre pour cette offrande
  - type: text
    content: choisit un bois qui résiste à la vermoulure ;
  - type: text
    content: il cherche un artisan habile
  - type: text
    content: pour dresser une statue qui ne vacille pas.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'dès le commencement 41.4,26 ; 48.16 ; cf. 45.21+ ; 46.10n. –  ce que sont (sous-entendu dans le texte) les fondations  : cf. 44.24.'
  - type: text
    content: Ne le savez-vous pas ?
  - type: text
    content: Ne l'entendez-vous pas ?
  - type: text
    content: Ne vous l'a-t-on pas annoncé dès le commencement ?
  - type: text
    content: N'avez-vous pas compris ce que sont
  - type: text
    content: les fondations de la terre ?
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'habite  : autre traduction est assis . –  cercle de la terre , probablement représentée comme un disque ; cf. Jb 22.14 ; 26.10 ; Pr 8.27. –  criquets Nb 13.33. –  ciel / tente  : cf. 42.5 ; 44.24 ; 45.12 ; Ps 104.2+.'
  - type: text
    content: C'est lui qui habite au-dessus du cercle de la terre,
  - type: text
    content: dont les habitants sont comme des criquets ;
  - type: text
    content: il déploie le ciel comme une étoffe légère,
  - type: text
    content: il l'étend comme une tente pour y habiter.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Jb 34.18-20.
  - type: text
    content: C'est lui qui réduit les princes à rien
  - type: text
    content: et qui ramène au chaos les juges de la terre ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 17.13 ; 41.2s.
  - type: text
    content: ils ne sont pas même plantés,
  - type: text
    content: pas même semés,
  - type: text
    content: leur tronc n'a pas même de racine en terre ;
  - type: text
    content: qu'il souffle sur eux,
  - type: text
    content: et ils se dessèchent,
  - type: text
    content: une tempête les emporte comme le chaume.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'V. 18+. –  le Saint  : cf. 1.4n  ; Ha 3.3 ; Jb 6.10.'
  - type: text
    content: A qui me comparerez-vous,
  - type: text
    content: pour que je lui ressemble ?
  - type: text
    content: dit le Saint.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'ces choses  : litt. ceux-là ou celles-là. –  Il les appelle  : cf. 41.4 ; Ps 147.4 ; cf. Gn 1.14-19 ; Baruch 3.24s : « Les étoiles ont brillé en leurs veilles et se sont réjouies ; il les a appelées, et elles ont répondu : Nous voici ! Elles ont brillé avec allégresse pour leur Créateur. »'
  - type: text
    content: Levez les yeux en haut et regardez !
  - type: text
    content: Qui a créé ces choses ?
  - type: text
    content: C'est celui qui fait sortir leur armée au complet.
  - type: text
    content: Il les appelle toutes par leur nom,
  - type: text
    content: 'par son grand pouvoir et par sa force puissante :'
  - type: text
    content: il n'y en a pas une qui fasse défaut.
  - type: heading
    content: De la force à celui qui est épuisé
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'répètes-tu  : litt. parles-tu . –  Ma destinée  : litt. ma voie, mon chemin. –  mon droit 49.4.'
  - type: text
    content: Pourquoi dis-tu, Jacob,
  - type: text
    content: 'pourquoi répètes-tu, Israël :'
  - type: text
    content: 'Ma destinée est cachée au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mon droit passe inaperçu de mon Dieu ?
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu de pérennité  : cf. Gn 21.33. –  insondable cf. 45.15 ; 55.8 ; Rm 11.33.'
  - type: text
    content: Ne le sais-tu pas ?
  - type: text
    content: Ne l'as-tu pas entendu ?
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de pérennité,'
  - type: text
    content: qui crée les extrémités de la terre ;
  - type: text
    content: il ne s'épuise ni ne se fatigue ;
  - type: text
    content: son intelligence est insondable.
  '29':
  - type: text
    content: ' '
  - type: note
    content: épuisé 50.4.
  - type: text
    content: Il donne de la force à celui qui est épuisé
  - type: text
    content: et il augmente la vigueur de celui qui est à bout de ressources.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Quelqu''un crie  : litt. une voix crie ou voix de celui qui crie (cf. v. 6n). – Les mots désert et plaine aride (cf. Dt 1.1n) décrivent ici le chemin que les exilés prendront pour revenir de Babylone à Jérusalem, Dieu étant à leur tête (réminiscence de l''exode d''Egypte). LXX semble rattacher Dans le désert au début du v. et comprendre quelqu''un crie dans le désert (les mots correspondant à dans la plaine aride en sont absents) ; cf. 11.16+ ; 43.19 ; 49.11 ; 57.14 ; 62.10 ; Ml 3.1 ; Mt 3.3/  ; Lc 1.76 ; Jn 1.23.'
  - type: text
    content: 'Quelqu''un crie :'
  - type: text
    content: Dans le désert,
  - type: text
    content: 'frayez le chemin du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Aplanissez une route pour notre Dieu
  - type: text
    content: dans la plaine aride !
  '30':
  - type: text
    content: Les adolescents s'épuisent, ils se fatiguent,
  - type: text
    content: les jeunes gens finissent par trébucher ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui espèrent 30.18+. –  leur  : sous-entendu dans le texte. –  Ils prennent leur essor  : litt. ils font monter leurs ailerons  ; autres traductions possibles ils étendent les ailes ; ils renouvellent leur plumage  ; même terme en Ez 17.3n  ; Ps 55.7. –  comme les aigles 2S 1.23 ; Ps 103.5.'
  - type: text
    content: 'mais ceux qui espèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' renouvellent leur force.'
  - type: text
    content: Ils prennent leur essor comme les aigles ;
  - type: text
    content: ils courent et ne se fatiguent pas,
  - type: text
    content: ils marchent et ne s'épuisent pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 45.2,13. –  vallons  : le terme hébreu correspondant est habituellement traduit par vallée , c''est un synonyme de celui qui apparaît au début du v.'
  - type: text
    content: Que toute vallée soit élevée,
  - type: text
    content: que toute montagne et toute colline soient abaissées !
  - type: text
    content: Que les reliefs se changent en terrain plat
  - type: text
    content: et les escarpements en vallons !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'gloire 58.8 ; 60.1s. –  se dévoilera ou se révélera ; sera dévoilée. –  tous  : litt. toute chair , cf. v. 6n (expression quasi identique) ; 49.26 ; 66.16,23 ; Jr 32.27. –  ensemble 1.28n  ; cf. 41.19,20,23 ; 52.8s. –  c''est la bouche… 1.20+ ; autre traduction tous verront… que la bouche du Seigneur a parlé.'
  - type: text
    content: 'Alors la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se dévoilera,'
  - type: text
    content: et tous la verront ensemble
  - type: text
    content: '– c''est la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Quelqu''un dit  : cf. v. 3n. –  On répond  : litt. il dit  ; un ms de Qumrân et LXX ont la première personne  : je dis. –  Toute chair (c.-à-d. tout homme, ou tout être vivant ; litt. toute la chair ) est de l''herbe  : cf. v. 23s ; 51.12 ; Ps 90.5s ; 103.15 ; Jc 1.10s ; 1P 1.24. –  éclat  : le même mot est traduit le plus souvent par fidélité  ; il faut peut-être l''entendre ici au sens de permanence ou de constance, d''où dérive son acception habituelle ; cf. 54.8-10 ; 55.3 ; 63.7 ; Ps 143.12 ; voir aussi Jb 10.12n.'
  - type: text
    content: 'Quelqu''un dit : Crie !'
  - type: text
    content: 'On répond : Que crierai-je ?'
  - type: text
    content: – Toute chair est de l'herbe,
  - type: text
    content: tout son éclat est comme la fleur des champs.
  '7':
  - type: text
    content: ' '
  - type: note
    content: souffle ou vent , voir esprit. –  le peuple 42.5s ; 49.8. – Ce v. ne figure pas dans LXX ; en guise de v. 7, elle porte la première partie du v. 8, qui présente donc un texte plus court.
  - type: text
    content: L'herbe se dessèche, la fleur se fane
  - type: text
    content: 'quand le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' passe dessus.'
  - type: text
    content: 'Vraiment, le peuple est de l''herbe :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 119.89 ; 1P 1.25. –  subsistera toujours  : autre traduction se réalise toujours.'
  - type: text
    content: l'herbe se dessèche, la fleur se fane ;
  - type: text
    content: mais la parole de notre Dieu
  - type: text
    content: subsistera toujours.
  - type: heading
    content: La bonne nouvelle
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Sion / Jérusalem, toi qui portes la bonne nouvelle  : autre traduction toi (féminin) qui annonces le bonheur à Sion… à Jérusalem. LXX a utilisé le verbe apparenté au mot qui a donné évangile  ; cf. 41.27 ; 52.7 ; 60.6 ; 61.1 ; Ps 68.12. –  Votre Dieu est là  : litt. voici votre Dieu  ; 35.4 ; 52.6-8 ; 58.9 ; 65.1 ; cf. Za 9.9.'
  - type: text
    content: Monte sur une haute montagne,
  - type: text
    content: Sion, toi qui portes la bonne nouvelle ;
  - type: text
    content: élève ta voix avec force,
  - type: text
    content: Jérusalem, toi qui portes la bonne nouvelle ;
  - type: text
    content: élève ta voix, n'aie pas peur,
  - type: text
    content: 'dis aux villes de Juda :'
  - type: text
    content: Votre Dieu est là !
