          - type: text
            text: baptême
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Maître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enseignant, instructeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 7.40 ; 9.38 ; 10.25 ; 11.45 ; 12.13 ; 18.18 ; 19.39 ; 20.21,28,39 ; 21.7.'
      marker-yv: yv-n
    - type: text
      text: 'Des collecteurs des taxes aussi vinrent pour recevoir le baptême ; ils lui demandèrent : Maître, que devons-nous faire ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 19.8.
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : N''exigez rien au-delà de ce qui vous a été ordonné. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Des soldats
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des combattants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme désigne normalement des hommes enrôlés dans une armée ou des militaires en campagne (1Co 9.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; il s''agit peut-être ici des membres de la garde juive '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hérode
        - type: text
          text: ' Antipas, ou bien de mercenaires juifs à la solde de Rome. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'n''accusez… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne harcelez personne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le verbe grec correspondant, voir aussi 19.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; on le trouve dans la traduction grecque ('
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ') de Lv 19.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: solde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Co 9.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 11.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Des soldats aussi l''interrogeaient : Et nous, que devons-nous faire ? Il leur dit : Ne faites violence à personne, n''accusez personne à tort, et contentez-vous de votre solde.'
  - type: usfm
