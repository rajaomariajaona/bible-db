document_id: LUK.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jean le Baptiseur, prophète de Dieu
  - type: heading
    content: Mt 3.1-6  ; Mc 1.2-6  ; cf. Jn 1.19-23
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.5 ; 2.1s ; Ac 26.26. –  La quinzième année… de Tibère peut commencer en octobre 27, en janvier ou en août-septembre 28 en fonction du moment précis de la carrière de Tibère qu''on interprète comme le début de son gouvernement de César , comme successeur d''Auguste (2.1n). –  Ponce Pilate 13.1 ; 23.1ss ; Ac 3.13 ; 4.27 ; 13.28. –  était gouverneur  : terme apparenté à celui qui a été traduit précédemment par gouvernement  ; cf. 20.20 ; une inscription retrouvée à Césarée lui donne le titre de praefectus ( préfet ) ; il a occupé ce poste de 26 à 36 apr. J.-C. (voir « Ponce Pilate », p.$). –  Hérode Antipas, fils cadet d''Hérode le Grand (1.5), tétrarque (à l''origine titre de celui qui gouvernait le quart d''une région donnée, dans l''évangile au sens plus général de prince de second rang ) de 4 av. J.-C. à 39 apr. J.-C. ; c''est encore de lui qu''il sera question v. 19 ; 8.3 ; 9.7ss ; 13.31s ; 23.7ss ; Mc 6.14 ; Ac 4.27 ; 13.1. –  Philippe , autre fils d''Hérode le Grand, tétrarque de l''Iturée et de la Trachonitide (entre autres), régions situées à l''est du Jourdain, vers la frontière syrienne ; cf. Mc 6.17 ; 8.27. – Le Lysanias le plus connu est un fils de Ptolémée, roi de Chalcis en Cœlésyrie, mort en 39 av. J.-C. Mais ce nom a été porté plus tard par plusieurs autres princes de la région ( l''Abilène est la région d''Abila, au nord-ouest de Damas, dans l''Anti-Liban).'
  - type: text
    content: 'La quinzième année du gouvernement de Tibère César – alors que Ponce Pilate était gouverneur de la Judée, Hérode tétrarque de la Galilée, Philippe, son frère, tétrarque de l''Iturée et du territoire de la Trachonitide, Lysanias tétrarque de l''Abilène, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 7,12,14 ; 10.25 ; 18.18 ; Ac 2.37 ; 16.30 ; 22.10.
  - type: text
    content: 'Les foules l''interrogeaient : Que devons-nous donc faire ? '
  '11':
  - type: note
    content: Cf. 19.8 ; Dt 15.4 ; Es 58.7 ; Ez 18.7 ; Ac 2.44s ; 4.32,35 ; Rm 12.8 ; Ep 4.28 ; Jc 2.15ss.
  - type: text
    content: 'Il leur répondait : Que celui qui a deux tuniques partage avec celui qui n''en a pas, et que celui qui a de quoi manger fasse de même. '
  '12':
  - type: note
    content: collecteurs des taxes 5.27ss ; 7.29,34 ; 15.1s ; 18.10ss ; 19.2,7 ; voir Mt 21.31s ; Mc 2.14n,15n. –  baptême 3.3+. –  Maître ou enseignant, instructeur  ; cf. 7.40 ; 9.38 ; 10.25 ; 11.45 ; 12.13 ; 18.18 ; 19.39 ; 20.21,28,39 ; 21.7.
  - type: text
    content: 'Des collecteurs des taxes aussi vinrent pour recevoir le baptême ; ils lui demandèrent : Maître, que devons-nous faire ? '
  '13':
  - type: note
    content: Cf. 19.8.
  - type: text
    content: 'Il leur dit : N''exigez rien au-delà de ce qui vous a été ordonné. '
  '14':
  - type: note
    content: 'Des soldats  : litt. des combattants  ; le terme désigne normalement des hommes enrôlés dans une armée ou des militaires en campagne (1Co 9.7n) ; il s''agit peut-être ici des membres de la garde juive d''Hérode Antipas, ou bien de mercenaires juifs à la solde de Rome. –  n''accusez… ou ne harcelez personne  ; sur le verbe grec correspondant, voir aussi 19.8n  ; on le trouve dans la traduction grecque (LXX) de Lv 19.11. –  solde  : cf. 1Co 9.7n  ; 2Co 11.8n.'
  - type: text
    content: 'Des soldats aussi l''interrogeaient : Et nous, que devons-nous faire ? Il leur dit : Ne faites violence à personne, n''accusez personne à tort, et contentez-vous de votre solde.'
  - type: heading
    content: Jean le Baptiseur annonce celui qui vient
  - type: heading
    content: Mt 3.11-12  ; Mc 1.7-8  ; cf. Jn 1.24-28
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'se demandaient  : litt. se demandaient en leurs cœurs  ; voir 1.29n. –  si Jean n''était pas le Christ (ou le Messie 2.11n) ; cf. Jn 1.19-20+ ; l''attente d''un (ou de plusieurs) Messie(s) (roi et / ou prêtre idéal) est attestée dans le judaïsme au moins depuis le IIe s. av. J.-C. Elle est particulièrement présente dans les écrits de Qumrân  ; cf. Dn 9.25n  ; voir aussi onction.'
  - type: text
    content: 'Comme le peuple était dans l''attente, et que tous se demandaient si Jean n''était pas le Christ, '
  '16':
  - type: note
    content: 'à tous 7.29. –  baptise 3.3+. –  il vient, celui… ou il en vient un qui est…  ; cf. 7.19+ ; Ac 13.25 ; voir Ml 3.1,23. –  plus puissant  : cf. 11.22 ; Es 1.24 ; 9.5 ; 11.2. –  ce serait… 7.6 ; Mt 3.11n. –  Lui vous baptisera…  : cf. Ac 1.5 ; 11.16. –  Esprit / feu Es 4.4s ; 32.15 ; 44.3 ; Ez 36.25s ; Ml 3.2s ; Ac 2.3s ; comparer avec Mc 1.8n.'
  - type: text
    content: 'il leur répondit à tous : Moi, je vous baptise d''eau, mais il vient, celui qui est plus puissant que moi, et ce serait encore trop d''honneur pour moi que de délier la lanière de ses sandales. Lui vous baptisera dans l''Esprit saint et le feu. '
  '17':
  - type: note
    content: 'fourche ou van, voir Mt 3.12n  ; cf. Es 30.24 ; Jr 15.7 ; 51.2. –  dans sa grange  : certains mss portent dans la grange. –  un feu qui ne s''éteint pas Mc 9.43 ; cf. Es 66.24 ; Jr 7.30ss ; voir aussi Es 5.24 ; 47.14 ; Jl 2.5 ; Na 1.10.'
  - type: text
    content: Il a sa fourche à la main, il va nettoyer son aire ; il recueillera le blé dans sa grange, mais il brûlera la paille dans un feu qui ne s'éteint pas.
  - type: heading
    content: Hérode et Jean le Baptiseur
  - type: heading
    content: Mt 14.3-4  ; Mc 6.17-18
  '18':
  - type: text
    content: ' '
  - type: note
    content: annonçait la bonne nouvelle 1.19n. –  encouragements ou exhortations  ; un terme apparenté est traduit par consolation en 2.25 ; Ac 2.40+.
  - type: text
    content: Jean annonçait la bonne nouvelle au peuple avec beaucoup d'autres encouragements.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Hérode le tétrarque v. 1n. –  son frère Hérode, un autre fils d'Hérode le Grand, d'après Josèphe ; ou bien Hérode Philippe (v. 1n), d'après Mc 6.17n. Cf. Lv 18.16 ; 20.21.
  - type: text
    content: 'Mais Hérode le tétrarque, à qui Jean faisait des reproches au sujet d''Hérodiade, femme de son frère, et au sujet de toutes les mauvaises actions qu''Hérode avait commises, '
  '2':
  - type: note
    content: 'Anne, nommé grand prêtre par Quirinius (cf. 2.2n) en 6 apr. J.-C., avait été déposé en l''an 15 ; Caïphe, son gendre, a été grand prêtre de 18 à 36 ; cf. Mt 26.3+ ; Mc 11.18n  ; Jn 11.49 ; 18.13ss ; Ac 4.6. –  la parole de Dieu parvint…  : cf. 1.76 ; 7.26 ; Jr 1.1 etc. –  fils de Zacharie 1.13,63. –  dans le désert v. 4 ; 1.80 ; 7.24.'
  - type: text
    content: et du temps des grands prêtres Anne et Caïphe – la parole de Dieu parvint à Jean, fils de Zacharie, dans le désert.
  '20':
  - type: note
    content: Cf. 9.7ss ; Ac 12.1ss.
  - type: text
    content: ajouta encore à toutes les autres celle d'enfermer Jean en prison.
  - type: heading
    content: Le baptême de Jésus
  - type: heading
    content: Mt 3.13-17  ; Mc 1.9-11  ; cf. Jn 1.29-34
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction Après que tout le peuple (cf. v. 7 ; 7.29) eut reçu le baptême… –  pendant qu''il priait  : cf. 1.10 ; 5.16 ; 6.12 ; 9.18,28s ; 10.21 ; 11.1s ; 22.32,40ss ; 23.34,46 ; cf. Mt 14.23+ ; Mc 6.46+. –  le ciel s''ouvrit  : cf. Ez 1.1. – Cf. Evangile des ébionites (Epiphane, Panarion , 30,13,7s) : « Le peuple ayant été baptisé, Jésus vint aussi se faire baptiser par Jean. Comme il remontait de l''eau, les cieux s''ouvrirent et il vit l''Esprit saint sous la forme d''une colombe qui descendait et entrait en lui. Une voix venant du ciel dit : “Tu es mon Fils bien-aimé, en toi je me suis complu.” Et à nouveau : “Je t''ai engendré aujourd''hui.” Aussitôt une grande lumière éclaira tout l''endroit. »'
  - type: text
    content: 'Quand tout le peuple reçut le baptême, Jésus aussi reçut le baptême ; et, pendant qu''il priait, le ciel s''ouvrit, '
  '22':
  - type: note
    content: 'Cf. Mc 1.10n  ; Jn 1.32. –  l''Esprit saint…  : cf. 4.18. –  sous une forme corporelle  : autre traduction sous une apparence corporelle  ; cf. 24.37-43. –  une voix du ciel 9.35 ; Ac 10.13,15 ; 11.7,9. –  Tu es mon Fils bien-aimé ou mon Fils, le bien-aimé  : cf. 1.32,35 ; Jr 31.20 ; un ms et plusieurs témoins occidentaux (voir introductions au N.T. et aux Actes des Apôtres) lisent Tu es mon Fils, c''est moi qui t''ai engendré aujourd''hui (cf. Ps 2.7 ; Ac 13.33 ; Rm 1.4 ; Hé 1.5 ; 5.5). –  bien-aimé  : cf. Mc 1.11n. –  c''est en toi… 2.14n  ; cf. Es 42.1 ; 44.21 ; 62.4.'
  - type: text
    content: 'et l''Esprit saint descendit sur lui sous une forme corporelle, comme une colombe. Et il survint une voix du ciel : Tu es mon Fils bien-aimé ; c''est en toi que j''ai pris plaisir.'
  - type: heading
    content: La généalogie de Jésus
  - type: heading
    content: Mt 1.1-17
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'La généalogie de Lc compte, selon le texte le plus probable, 77 (11 x 7) générations d''Adam à Jésus (cf. Mt 1.17n) ; cf. 4 Esdras 14.11 : « La durée du monde est divisée en douze parties. » Un ms (le principal témoin du texte occidental) reproduit ici, dans l''ordre inverse, la généalogie de Mt 1. –  à ses débuts  : litt. quand il commença  ; cf. 1.3 ; 23.5 ; Ac 1.1,22 ; 10.37 ; 11.15. –  environ trente ans  : cf. v. 1 ; 1.5 ; 2.2 ; Gn 41.46 ; Nb 4.3 ; 2S 5.4. –  Il était, à ce qu''on pensait…  : autre traduction il était considéré, en droit, comme fils de Joseph…  ; cf. 2.27,41,48 ; 4.22 ; Jn 1.45 ; 6.42. –  fils de Héli  : comparer avec Mt 1.16.'
  - type: text
    content: 'Jésus, à ses débuts, avait environ trente ans. Il était, à ce qu''on pensait, fils de Joseph, fils de Héli, '
  '24':
  - type: text
    content: 'fils de Matthath, fils de Lévi, fils de Melki, fils de Yannaï, fils de Joseph, '
  '25':
  - type: text
    content: 'fils de Mattathias, fils d''Amos, fils de Nahoum, fils de Hesli, fils de Naggaï, '
  '26':
  - type: text
    content: 'fils de Maath, fils de Mattathias, fils de Séméîn, fils de Yosek, fils de Yoda, '
  '27':
  - type: note
    content: Zorobabel Ag 1.1 ; Esd 3.2 ; 5.2 ; Né 12.1 ; 1Ch 3.17-19. –  Salathiel ou Shéaltiel, voir Mt 1.12n.
  - type: text
    content: 'fils de Yoanân, fils de Rhésa, fils de Zorobabel, fils de Salathiel, fils de Néri, '
  '28':
  - type: text
    content: 'fils de Melki, fils d''Addi, fils de Kosam, fils d''Elmadam, fils d''Er, '
  '29':
  - type: text
    content: 'fils de Jésus, fils d''Eliézer, fils de Yorim, fils de Matthath, fils de Lévi, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la région du Jourdain  : cf. Gn 13.10ss. –  proclamant 4.18s,44 ; 8.1,39 ; 9.2 ; 11.32 ; 12.3 ; 24.47 ; Ac 8.5 ; 9.20 ; 10.42 ; 19.13 ; 20.25 ; 28.31 ; voir Mc 1.4n. –  baptême  : cf. v. 16 ; Mc 1.4n  ; Jn 3.22ss ; Ac 18.25 ; 19.3s. –  changement radical ou repentance, conversion v. 8 ; 5.32 ; 10.13 ; 11.32 ; 13.3,5 ; 15.7,10 ; 16.30 ; 17.3s ; 24.47 ; Mt 3.2n  ; Ac 13.24 ; 19.4. –  pardon des péchés  : cf. 1.77 ; voir aussi Nb 14.19 ; Ps 25.18.'
  - type: text
    content: 'Il se rendit dans toute la région du Jourdain, proclamant un baptême de changement radical, pour le pardon des péchés, '
  '30':
  - type: text
    content: 'fils de Syméon, fils de Juda, fils de Joseph, fils de Yonam, fils d''Eliakim, '
  '31':
  - type: note
    content: 'Natham ou Nathan  : cf. 2S 5.14 ; Za 12.12 ; 1Ch 3.5 ; 14.4 ; en suivant la lignée de Nathan plutôt que celle de Salomon (cf. Mt 1.6s), la généalogie de Lc évite de mentionner tout autre roi que David (1S 16.1,13 ; cf. Lc 1.27 ; 2.4) ; voir aussi Jr 22.28ss ; 36.30s.'
  - type: text
    content: 'fils de Méléa, fils de Menna, fils de Mattata, fils de Natham, fils de David, '
  '32':
  - type: note
    content: Cf. 1Ch 1.34–2.15. –  Jessé / Yobed 1S 16.1 ; 17.12 ; 20.27 ; Rt 4.17-22 ; Ac 13.22 ; Rm 15.12 ; voir Mt 1.5n. –  Sala ou Salmôn, selon certains mss ; Mt 1.4+. –  Naassôn ou Nahshôn Ex 6.23 ; Nb 1.7 ; Rt 4.20 ; 1Ch 2.10.
  - type: text
    content: 'fils de Jessé, fils de Yobed, fils de Boos, fils de Sala, fils de Naassôn, '
  '33':
  - type: note
    content: 'Aminadab / Admîn / Arni  : les mss présentent ici des variantes particulièrement sensibles. –  Hesrom / Pharès Gn 38.29 ; 46.12 ; Nb 26.21 ; Rt 4.12 ; Mt 1.3n. –  Juda Gn 29.35 ; 1Ch 2.1 ; Hé 7.14.'
  - type: text
    content: 'fils d''Aminadab, fils d''Admîn, fils d''Arni, fils de Hesrom, fils de Pharès, fils de Juda, '
  '34':
  - type: note
    content: Gn 11.10ss ; 1Ch 1.17-34. –  Jacob 1.33 ; 13.28 ; 20.37 ; Gn 25.26. –  Isaac Gn 21.2s ; 24.64. –  Abraham 1.55. –  Thara, d'après LXX, pour le nom hébreu Térah Gn 11.26s ; Jos 24.2 ; 1Ch 1.26. –  Nahor Gn 11.22.
  - type: text
    content: 'fils de Jacob, fils d''Isaac, fils d''Abraham, fils de Thara, fils de Nahor, '
  '35':
  - type: note
    content: Serouk ou Serouch (LXX), pour Seroug Gn 11.20ss. –  Ragau (LXX), pour Réou Gn 11.18 ; 1Ch 1.25. –  Phalek (LXX), pour Péleg Gn 11.16. –  Héber ou Eber Gn 10.24 ; 11.14. –  Sala (LXX), pour Shélah Gn 10.24 ; 11.13 ; 1Ch 1.24.
  - type: text
    content: 'fils de Serouk, fils de Ragau, fils de Phalek, fils de Héber, fils de Sala, '
  '36':
  - type: note
    content: Gn 5.1-32 ; 1Ch 1.1-4. –  Kaïnam Gn 10.24n. –  Arphaxad / Sem Gn 9.26s ; 11.10 ; 1Ch 1.24. –  Noé Gn 5.29 ; 6.9. –  Lamek (LXX) pour Lémek Gn 5.25.
  - type: text
    content: 'fils de Kaïnam, fils d''Arphaxad, fils de Sem, fils de Noé, fils de Lamek, '
  '37':
  - type: note
    content: 'Mathusalem  : le grec écrit Mathousala Gn 5.21 ; 1Ch 1.3. –  Hénoch Gn 5.18,24 ; Jd 14. –  Yareth  : LXX transcrit Yared le nom hébreu Yéred, Gn 5.15 ; 1Ch 1.2. –  Maléléel  : cf. Gn 5.12. –  Kaïnam v. 36 ; cf. Caïnân ou Qénân Gn 5.9.'
  - type: text
    content: 'fils de Mathusalem, fils d''Hénoch, fils de Yareth, fils de Maléléel, fils de Kaïnam, '
  '38':
  - type: note
    content: 'Enos ou Enosh Gn 4.26 ; 5.6. –  Seth Gn 4.25s ; 5.3. –  fils d''Adam, fils de Dieu  : cf. v. 22 ; 1.35 ; Gn 5.1 ; Ac 17.26,31 ; Rm 5.12 ; cf. Siracide 49.16 : « Sem et Seth furent glorieux parmi les hommes, mais au-dessus de tout être vivant dans la création est Adam. »'
  - type: text
    content: fils d'Enos, fils de Seth, fils d'Adam, fils de Dieu.
  '4':
  - type: note
    content: 'Cf. 1.76 ; Es 40.3ss  ; Mc 1.2s,5 et les notes ; voir aussi prophète. –  chemin ou voie  : cf. 20.21. –  rendez droits  : autre traduction aplanissez, mais cf. v. 5.'
  - type: text
    content: 'selon ce qui est écrit dans le livre des paroles du prophète Esaïe :'
  - type: text
    content: 'C''est celui qui crie dans le désert :'
  - type: text
    content: préparez le chemin du Seigneur,
  - type: text
    content: rendez droits
  - type: text
    content: ' ses '
  - type: text
    content: sentiers !
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.79 ; voir aussi 1.52 ; 14.11 ; 18.14 ; Es 2.2ss ; Ps 68.16s.
  - type: text
    content: Toute vallée sera comblée,
  - type: text
    content: toute montagne et toute colline seront abaissées,
  - type: text
    content: les passages tortueux deviendront droits,
  - type: text
    content: les chemins raboteux seront nivelés,
  '6':
  - type: text
    content: ' '
  - type: note
    content: '2.30+s ; Ac 28.28 ; Tt 2.11. –  tous  : litt. toute chair.'
  - type: text
    content: et tous verront le salut de Dieu
  - type: text
    content: .
  - type: heading
    content: La proclamation de Jean le Baptiseur
  - type: heading
    content: Mt 3.7-10
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'aux foules…  : cf. 7.29. –  baptême 3.3+. –  Vipères  : voir Mt 3.7n. –  la colère 21.23 ; cf. Es 13.9 ; Ez 7.19 ; So 1.14ss ; 2.2 ; voir aussi Rm 1.18 ; 2.5 ; 3.5 ; 9.22 ; Ep 5.6 ; Col 3.6 ; 1Th 1.10.'
  - type: text
    content: 'Il disait donc aux foules qui venaient pour recevoir de lui le baptême : Vipères, qui vous a montré comment fuir la colère à venir ? '
  '8':
  - type: note
    content: 'Produisez  : litt. faites, cf. v. 10. –  fruits dignes… cf. 6.43s ; Ac 26.20. –  changement radical 3.3+. –  Abraham pour père 13.16 ; 16.24 ; 19.9 ; cf. Gn 12.1ss ; Es 51.1ss ; Jn 8.33ss ; Ac 3.25 ; 7.2 ; Rm 4.1 ; Ga 3.29. –  de ces pierres…  : cf. Ez 36.26 ; voir aussi Ex 32.9s. –  susciter  : voir 1.69n.'
  - type: text
    content: 'Produisez donc des fruits dignes du changement radical, et ne commencez pas à vous dire : « Nous avons Abraham pour père ! » Car je vous dis que de ces pierres Dieu peut susciter des enfants à Abraham. '
  '9':
  - type: note
    content: 'Cf. Mt 7.19 ; Jn 15.6. –  est prête…  : litt. se tient (2.12n) contre la racine des arbres  ; cf. 13.6ss ; Es 10.33s. –  feu  : cf. v. 16s.'
  - type: text
    content: 'Maintenant déjà la hache est prête à attaquer les arbres à la racine : tout arbre donc qui ne produit pas de beau fruit est coupé et jeté au feu.'
  - type: heading
    content: Les fruits du changement radical
