document_id: LUK.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean le Baptiseur, prophète de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Mt 3.1-6  ; Mc 1.2-6  ; cf. Jn 1.19-23
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.5 ; 2.1s ; Ac 26.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La quinzième année… de Tibère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut commencer en octobre 27, en janvier ou en août-septembre 28 en fonction du moment précis de la carrière de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tibère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qu''on interprète comme le début de son '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gouvernement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: César
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme successeur d''Auguste (2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ponce Pilate '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.1 ; 23.1ss ; Ac 3.13 ; 4.27 ; 13.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: était gouverneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : terme apparenté à celui qui a été traduit précédemment par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gouvernement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 20.20 ; une inscription retrouvée à Césarée lui donne le titre de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'praefectus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: préfet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; il a occupé ce poste de 26 à 36 apr. J.-C. (voir « Ponce Pilate », p.$). –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hérode
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Antipas, fils cadet d''Hérode le Grand (1.5), '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tétrarque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(à l''origine titre de celui qui gouvernait le quart d''une région donnée, dans l''évangile au sens plus général de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prince de second rang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') de 4 av. J.-C. à 39 apr. J.-C. ; c''est encore de lui qu''il sera question v. 19 ; 8.3 ; 9.7ss ; 13.31s ; 23.7ss ; Mc 6.14 ; Ac 4.27 ; 13.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Philippe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', autre fils d''Hérode le Grand, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tétrarque de l''Iturée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la Trachonitide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(entre autres), régions situées à l''est du Jourdain, vers la frontière syrienne ; cf. Mc 6.17 ; 8.27. – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lysanias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le plus connu est un fils de Ptolémée, roi de Chalcis en Cœlésyrie, mort en 39 av. J.-C. Mais ce nom a été porté plus tard par plusieurs autres princes de la région (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''Abilène '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est la région d'Abila, au nord-ouest de Damas, dans l'Anti-Liban).
      marker-yv: yv-n
    - type: text
      text: 'La quinzième année du gouvernement de Tibère César – alors que Ponce Pilate était gouverneur de la Judée, Hérode tétrarque de la Galilée, Philippe, son frère, tétrarque de l''Iturée et du territoire de la Trachonitide, Lysanias tétrarque de l''Abilène, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 7,12,14 ; 10.25 ; 18.18 ; Ac 2.37 ; 16.30 ; 22.10.
      marker-yv: yv-n
    - type: text
      text: 'Les foules l''interrogeaient : Que devons-nous donc faire ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 19.8 ; Dt 15.4 ; Es 58.7 ; Ez 18.7 ; Ac 2.44s ; 4.32,35 ; Rm 12.8 ; Ep 4.28 ; Jc 2.15ss.
      marker-yv: yv-n
    - type: text
      text: 'Il leur répondait : Que celui qui a deux tuniques partage avec celui qui n''en a pas, et que celui qui a de quoi manger fasse de même. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
