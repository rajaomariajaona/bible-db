    - type: text
      text: 'il leur répondit à tous : Moi, je vous baptise d''eau, mais il vient, celui qui est plus puissant que moi, et ce serait encore trop d''honneur pour moi que de délier la lanière de ses sandales. Lui vous baptisera dans l''Esprit saint et le feu. '
