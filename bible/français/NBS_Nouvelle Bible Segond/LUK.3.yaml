        - type: text
          text: ) ; cf. Jn 1.19-20+ ; l'attente d'un (ou de plusieurs) Messie(s) (roi et / ou prêtre idéal) est attestée dans le judaïsme au moins depuis le II
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C. Elle est particulièrement présente dans les écrits de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
