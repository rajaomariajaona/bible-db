      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'collecteurs des taxes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.27ss ; 7.29,34 ; 15.1s ; 18.10ss ; 19.2,7 ; voir Mt 21.31s ; Mc 2.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',15'
        - type: usfm
          marker: ord
