document_id: PSA.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur, sauveur des pauvres et des opprimés
  - type: text
    content: ' '
  - type: note
    content: 'Ce psaume et le suivant, qui n''a pas de suscription dans l''hébreu, n''en sont qu''un dans LXX et Vg, d''où un décalage dans la numérotation de certaines Bibles (notre Ps 11 y devient le Ps 10, et ainsi de suite). Réunis, ils présentent en hébreu les caractères d''un psaume alphabétique : le v. 2 commence par la première lettre de l''alphabet, le v. 4 par la deuxième, de même jusqu''à la fin du Ps 10 avec quelques irrégularités (cf. 10.2n  ; 25.1n). –  Meurs  : traduction conjecturale d''un terme probablement technique (cf. 7.1n  ; 8.1n) ; deux mots hébreux très proches apparaissent dans le livre, l''un transcrit alamoth (46.1n), l''autre traduit ( ?) jusqu''à la mort en 48.15n  ; LXX a compris sur les secrets du fils. –  De David 3.1n.'
  - type: text
    content: Du chef de chœur. Sur « Meurs pour le fils ». Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'citadelle 18.3 ; 46.8 ; 48.4 ; 59.10,17s ; 62.3 ; 144.2 ; Es 33.16 ; Jr 48.1n. –  pour celui qui est écrasé  : cf. 10.10,18 ; 34.19 ; 38.9 ; 44.20 ; 51.10,19 ; 72.4 ; 74.21 ; 89.11 ; 90.3n  ; 94.5 ; 143.3 ; voir aussi 1S 2.8. –  temps de détresse 10.1 ; 20.2 ; 37.39 ; 50.15 ; 59.17 ; 86.7 ; 102.3 ; Gn 35.3 ; Es 33.2 ; Jr 14.8 ; Na 1.7 ; Ha 3.16.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit une citadelle pour celui qui est écrasé,'
  - type: text
    content: une citadelle pour les temps de détresse !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Qu'ils mettent (ou ils mettront ) leur confiance en toi 4.6+. –  qui connaissent ton nom 91.14 ; cf. Es 52.6. –  qui te cherchent 14.2 ; 22.27 ; 24.6 ; 34.5 ; 40.17 ; 63.2 ; 69.7,33 ; 70.5 ; 77.3 ; 105.4 ; 119.2,10 ; Dt 4.29 ; Es 26.9 ; 55.6 ; 65.1 ; Jr 29.13 ; Os 10.12 ; Am 5.4 ; So 2.3 ; Za 8.22 ; 2Ch 22.9 ; 30.19.
  - type: text
    content: Qu'ils mettent leur confiance en toi, ceux qui connaissent ton nom,
  - type: text
    content: 'car tu n''abandonnes pas ceux qui te cherchent, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Chantez 7.18n. –  qui habite Sion 65.2 ; 68.17 ; 132.13s ; Es 12.6. –  proclamez… 96.3 ; 105.1 ; 1Ch 16.8. –  ses hauts faits  : cf. 66.5 ; 77.13 ; 78.11 ; 103.7 ; 104.1 ; Es 12.4 ; 1Ch 16.8 ; le même terme, pris en mauvaise part, peut être traduit par agissements (14.1 ; 99.8 ; 141.4 ; cf. Dt 22.14,17 ; Ez 14.22s ; 20.43s ; 21.29 ; 24.14 ; 36.17ss ; So 3.7,11).'
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui habite Sion,'
  - type: text
    content: proclamez parmi les peuples ses hauts faits !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'il réclame (ou il venge , litt. il cherche , cf. 10.4n,13,15n) le sang versé (litt. les sangs , Es 1.15n) : cf. Gn 4.9s ; 9.5 ; Ez 3.18. –  il s''en souvient  : autres traductions il le rappelle ; il l''évoque . –  des affligés ou des pauvres , selon une autre lecture traditionnelle ; les deux termes hébreux sont très proches par la forme comme par le sens (cf. v. 19 ; 10.12,17).'
  - type: text
    content: Car il réclame le sang versé ; il s'en souvient,
  - type: text
    content: il n'oublie pas les cris des affligés.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Fais-moi grâce…  : autre traduction le Seigneur m''a fait grâce , mais le verbe suivant ( regarde ) est traditionnellement vocalisé comme un impératif. –  mes ennemis  : litt. ceux qui me détestent ou me haïssent (autre terme aux v. 4,7). –  portes de la mort 107.18 ; Es 38.10 ; Mt 16.18 ; cf. Sagesse 16.13 : « Tu as pouvoir sur la vie et sur la mort, tu fais descendre aux portes de l''Hadès et en fais remonter. »'
  - type: text
    content: 'Fais-moi grâce, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: regarde mon affliction, causée par mes ennemis,
  - type: text
    content: toi qui me fais remonter des portes de la mort,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'dise  : litt. raconte  ; cf. v. 2. –  Sion la belle  : litt. la fille de Sion  ; cf. Es 1.8n  ; Jr 4.11n,31n. –  allégresse en ton salut 13.6 ; 20.5s ; 21.2s ; 1S 2.1.'
  - type: text
    content: afin que je dise toutes tes louanges
  - type: text
    content: dans les portes de Sion la belle
  - type: text
    content: et que j'aie de l'allégresse en ton salut.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '7.16+,17. –  leurs pieds…  : litt. leur pied se prend.'
  - type: text
    content: Les nations s'enfoncent dans la fosse qu'elles ont faite,
  - type: text
    content: leurs pieds se prennent au filet qu'elles ont caché.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Jeu d''instruments  : traduction conjecturale d''un terme technique qui dérive vraisemblablement du verbe rendu par murmurer ou réciter (1.2n  ; 2.1n) ; il est traduit par son en 92.4, par murmure en 19.15.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se fait connaître, il agit selon l''équité ;'
  - type: text
    content: 'le méchant est pris au piège dans l''œuvre de ses mains. '
  - type: text
    content: Jeu d'instruments. Pause.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Les méchants se tourneront… ou que les méchants retournent au séjour des morts  ; cf. 90.3 ; 104.29 ; Jb 1.21 ; 30.23.
  - type: text
    content: Les méchants se tourneront vers le séjour des morts,
  - type: text
    content: toutes les nations qui oublient Dieu.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'pauvre / affligés (ou humbles ) : cf. v. 13n.'
  - type: text
    content: Car le pauvre n'est pas oublié à jamais,
  - type: text
    content: l'espoir des affligés ne disparaît pas pour toujours.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Je célébrerai… 86.12+ ; cf. Ep 5.19 ; Col 3.16. –  je raconterai… 26.7 ; 75.2 ; cf. 66.16 ; 71.17 ; 106.2 ; 107.22 ; 118.17 ; Ac 2.11.
  - type: text
    content: 'Je célébrerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tout mon cœur ;'
  - type: text
    content: je raconterai tous tes actes étonnants.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi 3.8+ ; 10.12. –  soient jugées  : autre traduction entrent en jugement  ; même forme verbale en 37.33 ; 109.7 ; 2Ch 22.8n.'
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Que l''homme ne triomphe pas !'
  - type: text
    content: Que les nations soient jugées devant toi !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les peuples  : litt. les nations , comme au v. 6. –  des hommes  : cf. 10.18n  ; 56.5,12.'
  - type: text
    content: 'Répands sur eux la crainte, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Que les peuples sachent qu''ils ne sont que des hommes ! '
  - type: text
    content: Pause.
  '3':
  - type: text
    content: ' '
  - type: note
    content: je chanterai… 7.18n. – Voir nom.
  - type: text
    content: Je me réjouirai en toi, j'exulterai,
  - type: text
    content: je chanterai ton nom, ô Très-Haut !
  '4':
  - type: text
    content: ' '
  - type: note
    content: disparaissent devant toi 68.3 ; Jg 5.31.
  - type: text
    content: Lorsque mes ennemis reculent,
  - type: text
    content: ils trébuchent et disparaissent devant toi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Les expressions défendre le droit et rendre justice sont synonymes ; la première se retrouve, en emploi absolu, au v. 17 ( agir selon l'équité ) ; cf. 140.13 ; voir aussi 35.23 ; 43.1 ; 1S 25.39 ; Lm 3.58. –  juge juste 7.12+.
  - type: text
    content: Car tu défends mon droit, tu me rends justice,
  - type: text
    content: tu es assis sur ton trône en juge juste.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'rabroues 18.16 ; 68.31 ; 76.7 ; 80.17 ; 104.7 ; 106.9 ; Es 17.13+. –  les nations  : c.-à-d. les non-Israélites, cf. 2.10-12 ; 10.16. –  tu fais disparaître le méchant 37.28. –  tu effaces leur nom  : cf. 69.29 ; Dt 9.14+ ; Pr 10.7+.'
  - type: text
    content: Tu rabroues les nations, tu fais disparaître le méchant,
  - type: text
    content: tu effaces leur nom pour toujours, à jamais.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Texte difficile et traduction incertaine ; cf. Jr 4.7. –  le souvenir (ou le nom , 6.6n) est perdu Jb 18.17.
  - type: text
    content: Plus d'ennemis ! Des ruines éternelles !
  - type: text
    content: Des villes que tu as déracinées,
  - type: text
    content: le souvenir est perdu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'bouillonnant  : sens obtenu en rattachant au v. 8 le dernier mot hébreu du v. 7 et en modifiant sa vocalisation traditionnelle avec LXX, pour rétablir la structure originelle du psaume (v. 1n). –  installé (ou assis , cf. v. 5) 10.16+ ; 102.13 ; Ex 15.18 ; Lm 5.19. –  son trône 45.7 ; 89.15 ; Es 16.5.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', bouillonnant, est installé pour toujours,'
  - type: text
    content: il établit son trône pour le jugement.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Lui, il juge  : autre traduction c''est lui qui gouverne ou qui juge (les deux verbes du v. sont probablement à considérer comme des synonymes, cf. v. 5n) ; 72.2 ; 75.3 ; 96.10,13 ; 98.9 ; voir aussi Jg 2.16n  ; 1S 2.10 ; Rt 1.1n  ; Ac 17.31 ; Ap 19.11.'
  - type: text
    content: Lui, il juge le monde avec justice,
  - type: text
    content: il juge les peuples avec droiture.
