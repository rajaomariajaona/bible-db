document_id: ISA.55,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Vous tous qui avez soif, venez
  - type: text
    content: ' '
  - type: note
    content: 'Holà ! cf. 18.1n  ; ce v. imite peut-être le cri d''un vendeur ambulant. –  qui avez soif… l''eau  : cf. 41.17 ; Jr 2.13 ; Mt 5.6 ; Jn 4.7-14 ; 7.37 ; Ap 21.6 ; 22.17. –  achetez  : le verbe hébreu s''applique habituellement à l''achat de céréales (Gn 41.56s) ; LXX porte simplement achetez et buvez. –  mangez  : cf. Dt 8.3 ; Mt 4.4/ /. –  vin / lait Jl 4.18 ; cf. Ex 3.7s ; Pr 9.2,5 ; 1P 2.2. –  sans argent… 45.13+.'
  - type: text
    content: Holà ! vous tous qui avez soif !
  - type: text
    content: Venez vers l'eau,
  - type: text
    content: même celui qui n'a pas d'argent !
  - type: text
    content: Venez, achetez et mangez,
  - type: text
    content: venez, achetez du vin et du lait,
  - type: text
    content: sans argent, sans rien payer !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 32.2+ ; Ps 65.10s ; 104.13-15 ; 2Co 9.10. –  à celui qui a faim (litt. qui mange ) : LXX à manger.'
  - type: text
    content: Comme la pluie et la neige descendent du ciel
  - type: text
    content: et n'y reviennent pas
  - type: text
    content: sans avoir abreuvé la terre,
  - type: text
    content: sans l'avoir fécondée et fait germer,
  - type: text
    content: sans avoir donné de la semence au semeur
  - type: text
    content: et du pain à celui qui a faim,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ma parole  : cf. 45.23 ; Jr 29.10 ; Ps 33.6,9 ; Jn 1.1ss. –  sans effet  : litt. à vide , cf. Dt 16.16n ( les mains vides ). –  fait / réalisé (autre traduction réussi ) : cf. 53.10n  ; Jn 19.30.'
  - type: text
    content: 'ainsi en est-il de ma parole qui sort de ma bouche :'
  - type: text
    content: elle ne revient pas à moi sans effet,
  - type: text
    content: sans avoir fait ce que je désire,
  - type: text
    content: sans avoir réalisé
  - type: text
    content: ce pour quoi je l'ai envoyée.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'vous sortirez  : de l''exil à Babylone. –  joie 35.10 ; 51.3,11. –  paix 52.12. –  montagnes… 44.23+. –  battront des mains 47.2.'
  - type: text
    content: Oui, vous sortirez dans la joie
  - type: text
    content: et vous serez conduits dans la paix ;
  - type: text
    content: les montagnes et les collines
  - type: text
    content: éclateront en cris de joie devant vous,
  - type: text
    content: et tous les arbres des champs battront des mains.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '41.19 ; cf. Gn 3.18. –  un nom  : autre traduction une renommée  ; cf. 56.5n  ; 63.12 ; Jr 32.30s.'
  - type: text
    content: Au lieu des buissons poussera le cyprès,
  - type: text
    content: au lieu de l'ortie poussera le myrte ;
  - type: text
    content: 'ce sera pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un nom,'
  - type: text
    content: un signe perpétuel,
  - type: text
    content: qui ne sera pas retranché.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ne rassasie pas  : cf. Jn 6.27,35. –  vous vous délecterez…  : litt. votre gosier (cf. 29.8+ ; Gn 1.20n) se délectera de graisse  ; cf. 25.6 ; Ps 36.9s ; Jb 36.16n  ; Pr 9.3-6.'
  - type: text
    content: Pourquoi pesez-vous de l'argent
  - type: text
    content: pour ce qui n'est pas du pain ?
  - type: text
    content: Pourquoi vous fatiguez-vous
  - type: text
    content: pour ce qui ne rassasie pas ?
  - type: text
    content: Ecoutez-moi donc
  - type: text
    content: et mangez ce qui est bon,
  - type: text
    content: et vous vous délecterez de mets succulents.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'vous vivrez Dt 8.1 ; 30.15-20 ; Ez 20.11,21. –  alliance perpétuelle 24.5n  ; cf. 54.10+. –  celle de la fidélité…  : litt. des fidélités (cf. 54.8n,10 ; Ps 89.2n) de David, qui sont sûres , ce qui pourrait aussi désigner la fidélité de David envers Dieu, comme en 2Ch 6.42 ; voir cependant Ps 89.50 ; Ac 13.34.'
  - type: text
    content: Tendez l'oreille et venez à moi ;
  - type: text
    content: écoutez, et vous vivrez ;
  - type: text
    content: je conclurai pour vous une alliance perpétuelle,
  - type: text
    content: celle de la fidélité envers David, qui est sûre.
  '4':
  - type: text
    content: J'ai fait de lui un témoin pour les peuples,
  - type: text
    content: un chef qui commande aux peuples.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'une nation…  : cf. 2.2-4 ; 49.7 ; 54.3 ; Ps 18.44. –  ton Dieu 51.15+. –  Saint d''Israël 1.4+. –  splendeur 44.23 ; 49.3 ; 60.9.'
  - type: text
    content: Tu appelleras une nation que tu ne connais pas,
  - type: text
    content: et une nation qui ne te connaît pas accourra vers toi,
  - type: text
    content: 'à cause du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: du Saint d'Israël,
  - type: text
    content: qui te donne de la splendeur.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cherchez le Seigneur Am 5.4 ; So 2.3 ; Ps 9.11+. –  pendant qu''il (autre traduction puisqu''il , de même dans la suite) se laisse trouver  : cf. 45.19 ; 65.1 ; Jr 29.12-14. –  pendant qu''il est proche  : cf. 46.13+ ; Dt 4.7 ; Ps 145.18.'
  - type: text
    content: 'Cherchez le '
  - type: text
    content: Seigneur
  - type: text
    content: pendant qu'il se laisse trouver ;
  - type: text
    content: invoquez-le
  - type: text
    content: pendant qu'il est proche.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'méchant  : voir justice. –  ses pensées ou ses plans , de même dans la suite. –  qu''il revienne 1.27n  ; cf. Jr 18.11 ; 31.18 ; Ez 33.11 ; Lm 5.21 ; 2Ch 7.14 ; Lc 15.20.'
  - type: text
    content: Que le méchant abandonne sa voie,
  - type: text
    content: et l'homme malfaisant ses pensées ;
  - type: text
    content: 'qu''il revienne au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui aura compassion de lui,
  - type: text
    content: – à notre Dieu,
  - type: text
    content: qui pardonne abondamment.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 29.11 ; Jb 11.7-9. Autre traduction car vos pensées ne sont pas mes pensées, mes voies ne sont pas vos voies.
  - type: text
    content: Car mes pensées ne sont pas vos pensées,
  - type: text
    content: vos voies ne sont pas mes voies
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: ciel / terre Ps 103.11s. –  mes pensées… Ps 92.6 ; Rm 11.33.
  - type: text
    content: Autant le ciel est élevé au-dessus de la terre,
  - type: text
    content: autant mes voies sont élevées au-dessus de vos voies
  - type: text
    content: et mes pensées au-dessus de vos pensées.
