  - type: text
    text: 'Tu feras un porte-lampes d''or pur : ce porte-lampes sera fait d''or martelé. Son pied et sa tige, ses calices, ses boutons et ses fleurs seront d''une seule pièce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Six branches sortiront de ses côtés, trois branches d''un côté du porte-lampes et trois branches de l''autre côté du porte-lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il y aura sur une branche trois calices en forme d''amande, avec des boutons et des fleurs, et sur l''autre branche trois calices en forme d''amande, avec des boutons et des fleurs – ainsi pour les six branches qui sortent du porte-lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Sur le porte-lampes, il y aura quatre calices en forme d''amande, avec leurs boutons et leurs fleurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il y aura un bouton sous ses deux premières branches, un bouton sous les deux branches suivantes et un bouton sous les deux dernières branches – il en sera ainsi pour les six branches qui sortent du porte-lampes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
