      marker: fr
      children:
      - type: text
        text: '25.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous ferez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'expiatoire vous ferez les keroubim sur ses deux extrémités
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui a parfois été compris'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous représenterez les keroubim sortant de l''expiatoire, aux deux extrémités '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 27.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Fais un keroub à une extrémité et un keroub à l''autre extrémité ; vous ferez les keroubim d''une seule pièce avec l''expiatoire, à ses deux extrémités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les keroubim étendront les ailes vers le haut, couvrant de leurs ailes l''expiatoire et se faisant face l''un à l''autre ; les keroubim auront la face tournée vers l''expiatoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mettras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'donnerai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: traduisent le même verbe hébreu.
    marker-yv: yv-n
  - type: text
    text: 'Tu mettras l''expiatoire par-dessus le Coffre et tu mettras dans le Coffre le témoignage que je te donnerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je te rencontrerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 29.42s ; 30.6,36 ; Nb 17.19 ; sur '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le coffre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'avec les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'keroubim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comme trône de Dieu, voir Lv 16.2 ; 1S 4.4 ; 2R 19.15 ; Ps 80.2 ; 99.1.
    marker-yv: yv-n
  - type: text
    text: C'est là que je te rencontrerai ; je parlerai avec toi d'au-dessus de l'expiatoire, d'entre les deux keroubim placés sur le coffre du Témoignage, afin de te donner tous mes ordres pour les Israélites.
