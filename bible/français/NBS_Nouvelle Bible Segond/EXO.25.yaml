document_id: EXO.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: DIEU ÉTABLIT SA DEMEURE EN ISRAËL
  - type: heading
    content: La contribution des Israélites
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: coffre (37.1-9 ; cf. Gn 50.26n) ou, traditionnellement, arche . Les versions grecque et latine l'ont rendu par le même mot que l’ arche de Noé (Gn 6.14n), alors que l'hébreu emploie deux termes différents. Sur le coffre du Témoignage ou de l'alliance , voir Nb 10.33-36 ; Jos 3.3-6 ; 1S 4–6 ; 2S 6 ; Jr 3.16s ; Ps 132.8 ; 1Ch 28.2 ; voir aussi Gn 50.26n. –  deux coudées et demie font environ 1,10 m, une coudée et demie environ 70 cm ; voir mesures.
  - type: text
    content: 'Ils feront un coffre en bois d''acacia ; sa longueur sera de deux coudées et demie, sa largeur d''une coudée et demie et sa hauteur d''une coudée et demie. '
  '11':
  - type: note
    content: or pur v. 17,24,29,31,36,38 ; 28.14,22,36 ; 30.3 ; 31.8 ; 37.2,6,11,16s ; 39.15,25,30.
  - type: text
    content: 'Tu le couvriras d''or pur à l''intérieur et à l''extérieur, et tu lui feras une bordure d''or tout autour. '
  '12':
  - type: text
    content: 'Tu fondras pour lui quatre anneaux d''or et tu les mettras à ses quatre coins, deux anneaux d''un côté et deux anneaux de l''autre côté. '
  '13':
  - type: text
    content: 'Tu feras des barres en bois d''acacia et tu les couvriras d''or. '
  '14':
  - type: text
    content: 'Tu introduiras les barres dans les anneaux sur les côtés du Coffre, pour porter le Coffre ; '
  '15':
  - type: text
    content: 'les barres resteront dans les anneaux du Coffre, on ne les en retirera pas. '
  '16':
  - type: note
    content: témoignage 16.34n  ; cf. Dt 10.1s.
  - type: text
    content: 'Tu mettras dans le Coffre le témoignage que je te donnerai. '
  '17':
  - type: note
    content: Le mot hébreu correspondant à expiatoire (autre traduction propitiatoire) vient d'une racine qui signifiait peut-être à l'origine couvrir ou effacer (un objet ou une tache) ; cette racine a cependant surtout fourni le vocabulaire de l'expiation ou annulation des péchés (cf. Gn 6.14n). Le terme particulier qui apparaît ici désigne le couvercle du coffre sacré, sur lequel étaient accomplis des rites expiatoires (26.34 ; 37.6 ; Lv 16.11-16 ; Nb 7.89 ; Rm 3.25n).
  - type: text
    content: 'Tu feras un expiatoire d''or pur ; sa longueur sera de deux coudées et demie et sa largeur d''une coudée et demie. '
  '18':
  - type: note
    content: 'keroubim  : êtres fabuleux, représentés sans doute avec des traits à la fois humains et animaux ; le mot hébreu est traditionnellement transcrit chérubin(s)  ; cf. Gn 3.24n  ; 37.7-9 ; 1R 6.23-28 ; 2Ch 3.10-13. –  martelé  : autres traductions massif, repoussé  : v. 31,36 ; 37.7,17,22 ; Nb 8.4n.'
  - type: text
    content: 'Tu feras deux keroubim d''or, aux deux extrémités de l''expiatoire ; tu les feras d''or martelé. '
  '19':
  - type: note
    content: 'vous ferez…  : litt. de l''expiatoire vous ferez les keroubim sur ses deux extrémités, ce qui a parfois été compris  : vous représenterez les keroubim sortant de l''expiatoire, aux deux extrémités (cf. 27.2n).'
  - type: text
    content: 'Fais un keroub à une extrémité et un keroub à l''autre extrémité ; vous ferez les keroubim d''une seule pièce avec l''expiatoire, à ses deux extrémités. '
  '2':
  - type: note
    content: 'prélèvement ou contribution  : cf. 29.27s ; 30.13ss ; 35.5,21,24 ; 36.3,6 ; Lv 7.14+ ; Nb 5.9+ ; Dt 12.6n  ; 2S 1.21n  ; Es 40.20n  ; Ez 20.40+ ; Ml 3.8 ; Pr 29.4n  ; Esd 8.25 ; Né 10.38+ ; 2Ch 31.10ss. –  au cœur généreux  : litt. dont le cœur les (y) incitera ou les rendra volontaires  ; le verbe est apparenté aux mots hébreux qui évoquent, d''une part la noblesse, d''autre part la générosité et les offrandes volontaires. Voir 35.4-29 ; Lv 7.16+ ; 2R 12.5-16 ; Esd 1.6 ; 1Ch 29.1-9.'
  - type: text
    content: 'Parle aux Israélites. Qu''ils prennent un prélèvement pour moi. Vous prendrez mon prélèvement de tous les hommes au cœur généreux. '
  '20':
  - type: text
    content: 'Les keroubim étendront les ailes vers le haut, couvrant de leurs ailes l''expiatoire et se faisant face l''un à l''autre ; les keroubim auront la face tournée vers l''expiatoire. '
  '21':
  - type: note
    content: mettras et donnerai traduisent le même verbe hébreu.
  - type: text
    content: 'Tu mettras l''expiatoire par-dessus le Coffre et tu mettras dans le Coffre le témoignage que je te donnerai. '
  '22':
  - type: note
    content: 'je te rencontrerai  : cf. 29.42s ; 30.6,36 ; Nb 17.19 ; sur le coffre avec les keroubim comme trône de Dieu, voir Lv 16.2 ; 1S 4.4 ; 2R 19.15 ; Ps 80.2 ; 99.1.'
  - type: text
    content: C'est là que je te rencontrerai ; je parlerai avec toi d'au-dessus de l'expiatoire, d'entre les deux keroubim placés sur le coffre du Témoignage, afin de te donner tous mes ordres pour les Israélites.
  - type: heading
    content: La table du pain offert
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'table 37.10-15 ; Nb 4.7 ; 1R 7.48 ; 2Ch 4.8. –  deux coudées  : environ 90 cm ; une coudée et demie  : environ 70 cm ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Tu feras une table en bois d''acacia ; sa longueur sera de deux coudées, sa largeur d''une coudée et sa hauteur d''une coudée et demie. '
  '24':
  - type: note
    content: or pur v. 11+.
  - type: text
    content: 'Tu la couvriras d''or pur et tu lui feras une bordure d''or tout autour. '
  '25':
  - type: note
    content: un palme, c.-à-d. la largeur d'une main environ.
  - type: text
    content: 'Tu lui feras, tout autour, un cadre d''un palme ; tu feras une bordure d''or au cadre, tout autour. '
  '26':
  - type: text
    content: 'Tu lui feras quatre anneaux d''or ; tu mettras les anneaux aux quatre coins correspondant aux quatre pieds. '
  '27':
  - type: text
    content: 'Les anneaux seront près du cadre ; ils recevront les barres pour porter la table. '
  '28':
  - type: text
    content: 'Tu feras les barres en bois d''acacia et tu les couvriras d''or ; elles serviront à porter la table. '
  '29':
  - type: note
    content: 37.16 ; 1R 7.50.
  - type: text
    content: 'Tu feras ses plats, ses coupes, ses aiguières et ses bols pour les libations ; tu les feras d''or pur. '
  '3':
  - type: text
    content: 'Voici le prélèvement que vous prendrez sur ce qui leur appartient : de l''or, de l''argent et du bronze ; '
  '30':
  - type: note
    content: 'offert  : litt. de (la) face, traduction traditionnelle pains de proposition. Il s''agissait de pains disposés devant Dieu sur la table, comme une offrande (cf. Lv 24.5-9 ; 1S 21.5ss ; Né 10.34) ; l''expression se retrouve en 35.13 ; 39.36 ; 1S 21.7 ; 1R 7.48 ; 2Ch 4.19.'
  - type: text
    content: Tu mettras sur la table le pain offert, constamment, devant moi.
  - type: heading
    content: Le porte-lampes à sept branches
  '31':
  - type: text
    content: ' '
  - type: note
    content: '37.17-24. –  porte-lampes v. 6n  ; 27.20 ; 37.17-24 ; Nb 4.9s ; 1R 7.49 ; 2Ch 4.7. –  or pur v. 11+. –  boutons  : le même mot hébreu est rendu par chapiteau en Am 9.1. Il désigne sans doute ici un renflement décoratif comparable au chapiteau d''une colonne ou à une fleur en bouton. –  fleurs  : autre traduction corolles  ; le même terme est traduit par bourgeons en Nb 17.23.'
  - type: text
    content: 'Tu feras un porte-lampes d''or pur : ce porte-lampes sera fait d''or martelé. Son pied et sa tige, ses calices, ses boutons et ses fleurs seront d''une seule pièce. '
  '32':
  - type: text
    content: 'Six branches sortiront de ses côtés, trois branches d''un côté du porte-lampes et trois branches de l''autre côté du porte-lampes. '
  '33':
  - type: text
    content: 'Il y aura sur une branche trois calices en forme d''amande, avec des boutons et des fleurs, et sur l''autre branche trois calices en forme d''amande, avec des boutons et des fleurs – ainsi pour les six branches qui sortent du porte-lampes. '
  '34':
  - type: text
    content: 'Sur le porte-lampes, il y aura quatre calices en forme d''amande, avec leurs boutons et leurs fleurs. '
  '35':
  - type: text
    content: 'Il y aura un bouton sous ses deux premières branches, un bouton sous les deux branches suivantes et un bouton sous les deux dernières branches – il en sera ainsi pour les six branches qui sortent du porte-lampes. '
  '36':
  - type: text
    content: 'Leurs boutons et leurs branches seront d''une seule pièce ; le tout sera d''or martelé, d''or pur. '
  '37':
  - type: note
    content: 'on arrangera  : litt. on fera monter  ; l''expression peut signifier, selon le contexte, on placera, on allumera ou on entretiendra  ; cf. 27.20n  ; 30.8 ; Nb 8.2s.'
  - type: text
    content: 'Tu feras ses sept lampes ; on arrangera ses lampes de manière à ce qu''elles éclairent en face. '
  '38':
  - type: note
    content: 'cendriers, sans doute destinés à recueillir les vieilles mèches que l''on coupait avec les mouchettes pour éteindre le porte-lampes (37.23 ; Nb 4.9) ; le même mot est traduit par cassolettes dans un autre contexte : Ex 27.3 ; 38.3 ; Lv 10.1 ; 16.12 ; Nb 4.14 ; 16.17 ; cf. 1R 7.50/ / ; 2R 25.15/ /.'
  - type: text
    content: 'Ses mouchettes et ses cendriers seront d''or pur. '
  '39':
  - type: note
    content: 'un talent  : environ 34 kg.'
  - type: text
    content: On emploiera un talent d'or pur pour faire le porte-lampes avec tous ses ustensiles.
  '4':
  - type: note
    content: La pourpre est une teinture obtenue à partir d'un coquillage ; les Phéniciens étaient passés maîtres dans sa fabrication et son commerce. L’écarlate (ou carmin) provient d'un insecte, la cochenille (le mot correspond ici à deux termes hébreux différents, dont l'un pourrait être interprété au sens de ver, cf. 16.20 ; Jon 4.7 ; voir aussi Lv 14.4 ; Es 1.18n  ; Ez 27.7n). Les teintures en question pouvaient présenter diverses nuances de couleurs, dont les correspondances exactes sont difficiles à définir sur la base du seul vocabulaire hébreu ; les traductions s'inspirent de versions anciennes. Par ailleurs les mots peuvent désigner la teinture proprement dite, mais aussi des étoffes ou du fil teints.
  - type: text
    content: 'de la pourpre violette et rouge, de l''écarlate, du fin lin et du poil de chèvre ; '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9+ ; Ac 7.44 ; Hé 8.5. –  Regarde et montré traduisent deux formes du même verbe hébreu. –  le modèle  : litt. leur modèle.'
  - type: text
    content: Regarde, puis fais d'après le modèle qui t'est montré dans la montagne.
  '5':
  - type: note
    content: 'teintes en rouge  : autre traduction tannées. –  dauphins  : identification et traduction incertaines (autres propositions vache marine ; narval) ; les versions anciennes ont rendu le mot hébreu correspondant de diverses manières (LXX de peau violette, du terme qui correspond habituellement à la pourpre violette, cf. v. 4n). Il se pourrait d''ailleurs que le mot ne désigne pas un animal, mais un type de cuir de qualité en provenance d''Egypte ; cf. 26.14 ; 35.7 ; 36.19 ; 39.34 ; le mot correspondant à peaux est sous-entendu en Nb 4.25n  ; Ez 16.10.'
  - type: text
    content: 'des peaux de béliers teintes en rouge et des peaux de dauphins ; du bois d''acacia ; '
  '6':
  - type: note
    content: 'Ce v. est absent de LXX. –  luminaire  : cf. v. 31-40 (autre mot hébreu pour porte-lampes) ; 27.20 (cf. Gn 1.14n) ; 35.14n.'
  - type: text
    content: 'de l''huile pour le luminaire, des essences odoriférantes pour l''huile d''onction et pour l''encens aromatique ; '
  '7':
  - type: note
    content: éphod 28.6-14 ; 29.5n  ; 39.2-7 ; Lv 8.7 ; dans d'autres textes le mot désigne le seul vêtement de lin porté par les prêtres, sans doute une sorte de pagne que l'on « ceignait » et qui couvrait peu le corps (1S 2.18 ; 22.18 ; 2S 6.14,20) ; parfois l'éphod est un objet cultuel (Jg 8.27n  ; 17.5 ; cf. 18.14,17,20) associé aux sorts sacrés utilisés pour interroger Dieu (1S 2.28 ; 14.3,18n  ; 21.10 ; 23.6,9ss ; 30.7s ; cf. Ex 28.30n) ; peut-être formait-il une espèce de poche contenant les sorts, comme ici le pectoral (28.15-30) ; selon d'autres il s'agissait d'une sorte de bannière, dont le mouvement indiquait la réponse divine.
  - type: text
    content: 'des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral. '
  '8':
  - type: note
    content: 'Ils me feront  : LXX tu me feras, de même aux v. 9s.'
  - type: text
    content: 'Ils me feront un sanctuaire, et je demeurerai au milieu d''eux. '
  '9':
  - type: note
    content: 'la Demeure  : hébreu mishkân, terme dérivé du verbe (shkn) traduit par demeurer au v. 8 ; dans le contexte du Sinaï et du désert, il était d''usage de le rendre par tabernacle, du latin tabernaculum qui signifie tente et qui traduit plus exactement le grec skènè, phonétiquement proche (tente correspond à un autre mot hébreu). Il s''agit ici d''un ensemble de toiles superposées et soutenues par une charpente de bois transportable 26.1ss ; Lv 15.31+ ; Nb 1.50+ ; voir aussi Ez 37.27 ; Ps 26.8 ; 46.5 ; 74.7 ; 78.60 ; 132.5,7 ; Esd 7.15 ; 2Ch 29.6 ; Jn 1.14n  ; Ap 21.3n. –  modèle ou plan  : même terme au v. 40 ; Dt 4.16ss ; Jos 22.28 ; 2R 16.10 ; Es 44.13 ; 1Ch 28.11s,18s ; il est aussi traduit par forme, image, figure en Ez 8.3n,10 ; 10.8 ; Ps 106.20 ; 144.12. –  je vais te les montrer  : cf. v. 40+ ; Ez 40.4 ; 1Ch 28.19.'
  - type: text
    content: Vous vous conformerez exactement au modèle de la Demeure et au modèle de tous ses ustensiles, tels que je vais te les montrer.
  - type: heading
    content: Le coffre du Témoignage
