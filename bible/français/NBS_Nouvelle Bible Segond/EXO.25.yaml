      - type: text
        text: de (la) face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', traduction traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pains de proposition
    - type: usfm
      marker: ft
      children:
      - type: text
