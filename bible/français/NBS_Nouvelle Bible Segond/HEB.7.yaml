document_id: HEB.7,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un grand prêtre selon l'ordre de Melchisédek
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gn 14.17-21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Dans des écrits fragmentaires de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ', Melchisédek est mentionné à plusieurs reprises ; dans un texte qui lui est consacré, il semble être représenté comme un grand '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' céleste qui sera chargé d''exécuter le jugement de Dieu à la fin des temps ; ailleurs il pourrait aussi être identifié à Michel (Jd 9 ; Ap 12.7) ou au Prince de lumière opposés respectivement à Bélial (Dt 13.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 18.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et au Prince des ténèbres (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ', diable, Satan). On trouve une tradition comparable en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Melchisédek
    - type: text
      text: ' était '
    - type: usfm
      marker: it
      children:
      - type: text
        text: roi de Salem, prêtre du Dieu Très-Haut ;
    - type: text
      text: ' il '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alla à la rencontre d'Abraham qui revenait de la défaite des rois, et il le bénit ;
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans les reins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la rencontre d'Abraham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à sa rencontre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1 ; Gn 14.17.
      marker-yv: yv-n
    - type: text
      text: car il était encore dans les reins de son père quand Melchisédek alla à la rencontre d'Abraham.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'accomplissement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 7.28 ; 8.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se lève
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : terme apparenté au mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: résurrection
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 6.2 ; 11.35 ; voir aussi Ac 2.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: selon l'ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. le rang, le type ; cf. Ps 110.4 (hébreu) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la manière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 5.6+.
      marker-yv: yv-n
    - type: text
      text: 'Si donc l''accomplissement avait été par le sacerdoce lévitique, – car c''est sur lui que repose la loi donnée au peuple – quel besoin y aurait-il eu encore que se lève un autre prêtre selon l''ordre de Melchisédek, et non pas selon l''ordre d''Aaron ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'changé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'changement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En effet, lorsque le sacerdoce est changé, il y a nécessairement aussi un changement de loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car celui à qui s''appliquent ces paroles appartient à une autre tribu, dont personne n''a été attaché au service de l''autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'notre Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est issu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'est levé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 49.10 ; Es 11.1 ; Mt 1.2 ; Lc 3.33 ; Ap 5.5 ; cf. Rm 1.3 ; 2Tm 2.8.
      marker-yv: yv-n
    - type: text
      text: 'En effet, il est notoire que notre Seigneur est issu de Juda, tribu dont Moïse n''a rien dit concernant les prêtres. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela devient plus évident encore quand se lève, à la ressemblance de Melchisédek, un autre prêtre '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.16 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vie indestructible '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3+.
      marker-yv: yv-n
    - type: text
      text: 'qui l''est devenu, non par la loi d''un commandement relatif à la chair, mais par la puissance d''une vie indestructible. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.6+ ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ps 110.4.
      marker-yv: yv-n
    - type: text
      text: 'Car ce témoignage lui est rendu :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu es prêtre pour toujours selon l'ordre de Melchisédek
    - type: text
      text: .
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: suppression
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.9 ; Rm 7.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faiblesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Rm 8.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inutilité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.9.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, il y a, d''une part, suppression d''un commandement antérieur à cause de sa faiblesse et de son inutilité '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rien porté à son accomplissement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (2.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : cf. 9.9 ; 10.1-4,11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'espérance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'supérieure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'meilleure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: – car la loi n'a rien porté à son accomplissement – et, d'autre part, introduction d'une espérance supérieure, par laquelle nous nous approchons de Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'si l''on interprète son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: interprété
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'roi de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : signification du nom Melchisédek ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Malki-Tsédeq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') en hébreu. – Le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Salem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est très proche du mot hébreu habituellement traduit par '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: c'est à lui qu'Abraham
    - type: text
      text: ' donna '
    - type: usfm
      marker: it
      children:
      - type: text
        text: la dîme de tout
    - type: text
      text: '. Or, si l''on interprète son nom, il est tout d''abord « roi de justice » ; puis il est aussi '
    - type: usfm
      marker: it
      children:
      - type: text
        text: roi de Salem,
    - type: text
      text: ' c''est-à-dire « roi de paix ». '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'serment '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.13-18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et cela ne s''est pas fait sans serment. Les autres, en effet, sont devenus prêtres sans serment ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ps 110.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon l'ordre de Melchisédek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 17.'
      marker-yv: yv-n
    - type: text
      text: 'mais lui l''est devenu avec un serment, par celui qui lui a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le Seigneur l''a juré, il ne le regrettera pas :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: tu es prêtre pour toujours
    - type: text
      text: .
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: garant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.15 : « N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé en personne pour toi. » –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' supérieure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'meilleure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) 8.6-10 ; 9.15-20 ; 10.29 ; 12.24 ; cf. 13.20+ ; Lc 22.20+.
      marker-yv: yv-n
    - type: text
      text: Jésus est devenu par cela même le garant d'une alliance supérieure.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 3+ ; 13.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: demeurer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : verbe apparenté à celui qui est employé aux v. 3,24.'
      marker-yv: yv-n
    - type: text
      text: 'De plus, les prêtres se sont succédé en grand nombre, parce que la mort les empêchait de demeurer ; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour toujours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.6+ ; 13.8 ; Lc 1.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inaliénable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exclusif, permanent, intangible, inviolable, intransmissible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot grec n''apparaît qu''ici dans le N.T.'
      marker-yv: yv-n
    - type: text
      text: 'mais lui, parce qu''il demeure pour toujours, il possède un sacerdoce inaliénable. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sauver parfaitement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
