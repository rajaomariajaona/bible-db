        - type: text
          text: '  : cf. 9.24 ; Rm 8.34+ ; 1Jn 2.1.'
      marker-yv: yv-n
    - type: text
      text: C'est pour cela aussi qu'il peut sauver parfaitement ceux qui s'approchent de Dieu par lui, puisqu'il est toujours vivant pour intercéder en leur faveur.
