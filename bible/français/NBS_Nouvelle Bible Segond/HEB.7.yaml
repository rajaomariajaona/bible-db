    - type: text
      text: 'Ceux des fils de Lévi qui reçoivent le sacerdoce ont, d''après la loi, le commandement de prélever la dîme sur le peuple, c''est-à-dire sur leurs frères, qui sont pourtant issus des reins d''Abraham. '
