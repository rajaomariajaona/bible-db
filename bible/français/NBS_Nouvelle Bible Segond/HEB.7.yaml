document_id: HEB.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un grand prêtre selon l'ordre de Melchisédek
  - type: text
    content: ' '
  - type: note
    content: Gn 14.17-21 . Dans des écrits fragmentaires de Qumrân, Melchisédek est mentionné à plusieurs reprises ; dans un texte qui lui est consacré, il semble être représenté comme un grand prêtre céleste qui sera chargé d'exécuter le jugement de Dieu à la fin des temps ; ailleurs il pourrait aussi être identifié à Michel (Jd 9 ; Ap 12.7) ou au Prince de lumière opposés respectivement à Bélial (Dt 13.14n  ; Ps 18.5n  ; 2Co 6.15n) et au Prince des ténèbres (voir démon, diable, Satan). On trouve une tradition comparable en 2 Hénoch.
  - type: text
    content: 'Ce '
  - type: text
    content: Melchisédek
  - type: text
    content: ' était '
  - type: text
    content: roi de Salem, prêtre du Dieu Très-Haut ;
  - type: text
    content: ' il '
  - type: text
    content: alla à la rencontre d'Abraham qui revenait de la défaite des rois, et il le bénit ;
  - type: text
    content: ' '
  '10':
  - type: note
    content: 'dans les reins v. 5n. –  à la rencontre d''Abraham  : litt. à sa rencontre v. 1 ; Gn 14.17.'
  - type: text
    content: car il était encore dans les reins de son père quand Melchisédek alla à la rencontre d'Abraham.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'l''accomplissement  : voir 2.10n  ; cf. 7.28 ; 8.6s. –  se lève  : terme apparenté au mot traduit par résurrection en 6.2 ; 11.35 ; voir aussi Ac 2.24n  ; 3.26n. –  selon l''ordre  : c.-à-d. le rang, le type ; cf. Ps 110.4 (hébreu) à la manière  ; cf. 5.6+.'
  - type: text
    content: 'Si donc l''accomplissement avait été par le sacerdoce lévitique, – car c''est sur lui que repose la loi donnée au peuple – quel besoin y aurait-il eu encore que se lève un autre prêtre selon l''ordre de Melchisédek, et non pas selon l''ordre d''Aaron ? '
  '12':
  - type: note
    content: changé / changement 11.5n  ; 12.27n.
  - type: text
    content: 'En effet, lorsque le sacerdoce est changé, il y a nécessairement aussi un changement de loi. '
  '13':
  - type: text
    content: 'Car celui à qui s''appliquent ces paroles appartient à une autre tribu, dont personne n''a été attaché au service de l''autel. '
  '14':
  - type: note
    content: 'notre Seigneur 2.3+. –  est issu  : litt. s''est levé. –  de Juda Gn 49.10 ; Es 11.1 ; Mt 1.2 ; Lc 3.33 ; Ap 5.5 ; cf. Rm 1.3 ; 2Tm 2.8.'
  - type: text
    content: 'En effet, il est notoire que notre Seigneur est issu de Juda, tribu dont Moïse n''a rien dit concernant les prêtres. '
  '15':
  - type: text
    content: 'Cela devient plus évident encore quand se lève, à la ressemblance de Melchisédek, un autre prêtre '
  '16':
  - type: note
    content: chair 5.7+. –  vie indestructible v. 3+.
  - type: text
    content: 'qui l''est devenu, non par la loi d''un commandement relatif à la chair, mais par la puissance d''une vie indestructible. '
  '17':
  - type: note
    content: 5.6+ ; Ps 110.4.
  - type: text
    content: 'Car ce témoignage lui est rendu :'
  - type: text
    content: Tu es prêtre pour toujours selon l'ordre de Melchisédek
  - type: text
    content: .
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'suppression  : cf. 10.9 ; Rm 7.1-3. –  faiblesse  : cf. Rm 8.3. –  inutilité  : cf. 13.9.'
  - type: text
    content: 'En effet, il y a, d''une part, suppression d''un commandement antérieur à cause de sa faiblesse et de son inutilité '
  '19':
  - type: note
    content: 'rien porté à son accomplissement (2.10n) : cf. 9.9 ; 10.1-4,11. –  espérance 6.18+. –  supérieure ou meilleure 1.4n.'
  - type: text
    content: – car la loi n'a rien porté à son accomplissement – et, d'autre part, introduction d'une espérance supérieure, par laquelle nous nous approchons de Dieu.
  '2':
  - type: note
    content: 'si l''on interprète son nom  : litt. interprété. –  roi de justice  : signification du nom Melchisédek (Malki-Tsédeq) en hébreu. – Le nom de Salem est très proche du mot hébreu habituellement traduit par paix.'
  - type: text
    content: c'est à lui qu'Abraham
  - type: text
    content: ' donna '
  - type: text
    content: la dîme de tout
  - type: text
    content: '. Or, si l''on interprète son nom, il est tout d''abord « roi de justice » ; puis il est aussi '
  - type: text
    content: roi de Salem,
  - type: text
    content: ' c''est-à-dire « roi de paix ». '
  '20':
  - type: text
    content: ' '
  - type: note
    content: serment v. 28n  ; 6.13-18n.
  - type: text
    content: 'Et cela ne s''est pas fait sans serment. Les autres, en effet, sont devenus prêtres sans serment ; '
  '21':
  - type: note
    content: Ps 110.4  ; certains mss ajoutent selon l'ordre de Melchisédek, comme au v. 17.
  - type: text
    content: 'mais lui l''est devenu avec un serment, par celui qui lui a dit :'
  - type: text
    content: 'Le Seigneur l''a juré, il ne le regrettera pas :'
  - type: text
    content: tu es prêtre pour toujours
  - type: text
    content: .
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'garant  : cf. Siracide 29.15 : « N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé en personne pour toi. » –  alliance supérieure ou meilleure (1.4n) 8.6-10 ; 9.15-20 ; 10.29 ; 12.24 ; cf. 13.20+ ; Lc 22.20+.'
  - type: text
    content: Jésus est devenu par cela même le garant d'une alliance supérieure.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3+ ; 13.8. –  demeurer  : verbe apparenté à celui qui est employé aux v. 3,24.'
  - type: text
    content: 'De plus, les prêtres se sont succédé en grand nombre, parce que la mort les empêchait de demeurer ; '
  '24':
  - type: note
    content: 'pour toujours 5.6+ ; 13.8 ; Lc 1.33. –  inaliénable  : autres traductions exclusif, permanent, intangible, inviolable, intransmissible  ; le mot grec n''apparaît qu''ici dans le N.T.'
  - type: text
    content: 'mais lui, parce qu''il demeure pour toujours, il possède un sacerdoce inaliénable. '
  '25':
  - type: note
    content: 'sauver parfaitement (cf. 2.10n) 10.14. –  ceux qui s''approchent 4.16+ ; 11.6. –  vivant Ap 1.18+. –  intercéder  : cf. 9.24 ; Rm 8.34+ ; 1Jn 2.1.'
  - type: text
    content: C'est pour cela aussi qu'il peut sauver parfaitement ceux qui s'approchent de Dieu par lui, puisqu'il est toujours vivant pour intercéder en leur faveur.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'grand prêtre 2.17+ ; cf. 4.14s. –  saint  : autre terme grec qu''en 2.4 ; 3.1 ; 6.4,10 etc. ; sur le terme qui apparaît ici, voir Lc 1.75+ ; Ac 2.27 ; Ep 4.24n. –  sans souillure (voir pur, impur) 13.4.'
  - type: text
    content: 'Pour nous, c''est bien un tel grand prêtre qui convenait : saint, innocent, sans souillure, séparé des pécheurs, et élevé plus haut que les cieux ; '
  '27':
  - type: note
    content: 'comme les grands prêtres  : autre traduction comme les autres grands prêtres. –  chaque jour 10.11 ; cf. Ex 29.38s ; Nb 28.3s. – Voir sacrifices. –  pour ses propres péchés… 5.3+. –  une fois pour toutes 9.12 ; 10.10.'
  - type: text
    content: 'il n''a pas besoin, comme les grands prêtres, d''offrir chaque jour des sacrifices, d''abord pour ses propres péchés, et ensuite pour ceux du peuple – cela, il l''a fait une fois pour toutes, en s''offrant lui-même. '
  '28':
  - type: note
    content: grands prêtres 5.1s. –  du serment postérieur à la loi, celui du Ps 110 (Hé 7.20s) ; cf. 4.7. –  pour toujours v. 24. –  accomplissement 2.10n  ; 5.9.
  - type: text
    content: La loi en effet institue grands prêtres des humains sujets à la faiblesse ; mais la parole du serment postérieur à la loi institue le Fils qui a été porté pour toujours à son accomplissement.
  '3':
  - type: note
    content: 'Melchisédek est sans père, sans mère…, dans le récit de la Genèse, qui est muet sur tous ces points ; cf. Jn 7.27. –  Fils de Dieu 4.14+. –  à perpétuité  : cf. v. 8,15-17,23-25 ; même expression 10.12,14 ; voir aussi Nb 20.24-28.'
  - type: text
    content: Il est sans père, sans mère, sans généalogie ; il n'a ni commencement de jours, ni fin de vie. Rendu semblable au Fils de Dieu, il demeure prêtre à perpétuité.
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 2 ; Gn 14.20  ; voir aussi Jn 8.53n.
  - type: text
    content: 'Voyez combien il est grand, celui '
  - type: text
    content: à qui Abraham,
  - type: text
    content: ' le patriarche, '
  - type: text
    content: donna même la dîme
  - type: text
    content: ' du butin ! '
  '5':
  - type: note
    content: d'après la loi… la dîme Nb 18.21. –  des reins, considérés comme siège du pouvoir procréateur ; cf. v. 10 ; Gn 35.11 ; Ac 2.30n.
  - type: text
    content: 'Ceux des fils de Lévi qui reçoivent le sacerdoce ont, d''après la loi, le commandement de prélever la dîme sur le peuple, c''est-à-dire sur leurs frères, qui sont pourtant issus des reins d''Abraham. '
  '6':
  - type: note
    content: 'Il bénit v. 1 ; Gn 14.19. –  qui avait reçu…  : litt. qui avait les promesses.'
  - type: text
    content: 'Mais lui, qui ne figure pas dans leur généalogie, il préleva la dîme sur Abraham ! Il bénit celui qui avait reçu les promesses ! '
  '7':
  - type: text
    content: 'Or c''est sans contredit l''inférieur qui est béni par le supérieur. '
  '8':
  - type: note
    content: 'ici  : dans le cas des prêtres lévites (v. 5). –  là  : dans le cas de Melchisédek (v. 3s).'
  - type: text
    content: 'Et tandis qu''ici ce sont des humains mortels qui reçoivent les dîmes, là c''est quelqu''un dont on atteste qu''il est vivant. '
  '9':
  - type: text
    content: 'Enfin Lévi, qui reçoit la dîme, l''a pour ainsi dire payée par Abraham : '
