        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', la ville de David (4.22), à une dizaine de kilomètres au sud de Jérusalem ; voir Jg 17.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
