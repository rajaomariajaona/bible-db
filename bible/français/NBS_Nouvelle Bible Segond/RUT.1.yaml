      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon la transcription traditionnelle héritée du grec ; le nom signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maison du pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
