document_id: RUT.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La famille d'Elimélek émigre en Moab
  - type: text
    content: ' '
  - type: note
    content: 'Aux jours (Est 1.1n) où les juges gouvernaient (litt. jugeaient ) : cf. Jg 2.16n  ; 17.6+ ; 1S 8.5n  ; 1R 3.9 ; 2R 15.5 ; 23.22 ; Ps 9.9 ; Dn 9.12 ; 2Ch 1.10s ; 26.21. –  une famine dans le pays (d''Israël) : cf. Gn 12.10 ; 26.1-6 ; 41–50 ; 1R 17.7-9 ; 2R 4.38 ; 8.1 ; voir aussi Dt 11.10-12 ; Jr 21.9. –  Beth-Léhem (ou Bethléem , selon la transcription traditionnelle héritée du grec ; le nom signifie maison du pain , cf. v. 6) de Juda , la ville de David (4.22), à une dizaine de kilomètres au sud de Jérusalem ; voir Jg 17.7+. –  séjourner en immigré  : cf. 2.10n  ; voir aussi Ex 12.48n  ; Jg 17.7n. –  au pays de Moab , région fertile à l''est de la mer Morte ; le terme hébreu ici traduit par pays est aussi rendu, dans d''autres contextes, par champ(s) ou campagne  ; Gn 19.36-37n  ; Jg 3.13.'
  - type: text
    content: 'Aux jours où les juges gouvernaient, il y eut une famine dans le pays. Un homme de Beth-Léhem de Juda partit, avec sa femme et ses deux fils, pour séjourner en immigré au pays de Moab. '
  '10':
  - type: note
    content: nous retournerons ou nous reviendrons, cf. v. 6ns.
  - type: text
    content: 'elles lui dirent : Non, nous retournerons avec toi vers ton peuple ! '
  '11':
  - type: note
    content: 'devenir vos maris  : selon la coutume du « lévirat », cette responsabilité incombait aux frères du défunt avant tout autre parent ; cf. 2.20n  ; 4.5 ; Gn 38.8-11 ; Dt 25.5-10 ; Mt 22.23-28/ /.'
  - type: text
    content: 'Noémi dit : Retournez, mes filles ! Pourquoi viendriez-vous avec moi ? Ai-je encore dans mon ventre des fils qui puissent devenir vos maris ? '
  '12':
  - type: note
    content: 'me remarier  : litt. être à un homme, de même dans la suite.'
  - type: text
    content: 'Retournez, mes filles, allez ! Car je suis trop vieille pour me remarier ; et même si je disais : « Il y a de l''espoir pour moi », si ce soir même j''étais remariée et que je mette des fils au monde, '
  '13':
  - type: note
    content: 'attendriez-vous  : cf. Gn 38.11,14. –  amer  : hébreu mar, v. 20n  ; sur ce terme voir aussi 1S 15.32 ; Jb 3.20 ; 7.11 ; 9.18 ; 10.1 ; 21.25 ; 27.2 ; Ec 7.26 ; on a aussi compris mon sort m''est amer à cause de vous ou mon sort est trop amer pour que vous vous l''imposiez. –  s''est abattue (litt. est sortie) sur moi ou contre moi  ; cf. Ex 9.3 ; Dt 2.15 ; Jg 2.15 ; 1S 12.15 ; 2S 24.17 ; Ez 13.9 ; Jb 13.21 ; 19.21 ; 30.21.'
  - type: text
    content: 'attendriez-vous pour cela qu''ils grandissent ? Refuseriez-vous pour cela de vous remarier ? Non, mes filles ! Mon sort est plus amer que le vôtre : la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est abattue sur moi. '
  '14':
  - type: note
    content: 'embrassa sa belle-mère  : LXX ajoute et retourna vers son peuple. –  s''attacha  : même verbe en 2.8,21 ; Gn 2.24.'
  - type: text
    content: Elles sanglotèrent encore. Puis Orpa embrassa sa belle-mère, mais Ruth s'attacha à elle.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Noémi dit  : litt. elle dit . –  à ses dieux ou à son dieu  ; les divinités étaient habituellement considérées comme liées à leur territoire ; cf. Jos 24.15 ; 1S 26.19 ; 2R 5.17 (sur le dieu principal de Moab, Kemosh, cf. Nb 21.29 ; Jg 11.24 ; 1R 11.7,33 ; 2R 23.13 ; Jr 48.7,46). –  retourne…  : litt. retourne derrière ta belle-sœur.'
  - type: text
    content: 'Noémi dit alors : Ta belle-sœur est retournée à son peuple et à ses dieux ; retourne, toi aussi, comme ta belle-sœur. '
  '16':
  - type: note
    content: 'Ne me pousse pas  : litt. ne me malmène pas, cf. 2.22n. –  me détourner de toi  : litt. me détourner (ou revenir) de derrière toi  ; autre traduction cesser de te suivre  ; cf. v. 7 ; Nb 14.43n. –  Où tu iras, j''irai…  : cf. 2S 15.21 ; 2R 2.2-4 ; 3.7. –  ton peuple sera (ou est, le verbe étant sous-entendu en hébreu) mon peuple  : cf. 2.11s ; Es 14.1 ; Za 8.23 ; Ps 33.12 ; 45.11. –  ton dieu (ou Dieu, cf. Gn 1.1n) sera (ou est) mon dieu  : cf. v. 15+ ; 1Th 1.9.'
  - type: text
    content: 'Ruth dit : Ne me pousse pas à t''abandonner, à me détourner de toi ! Où tu iras, j''irai ; là où tu passeras la nuit, je passerai la nuit ; ton peuple sera mon peuple, et ton dieu sera mon dieu ; '
  '17':
  - type: note
    content: 'Que le Seigneur me fasse…  : formule de serment, appelant sur celui qui prête serment une malédiction conditionnelle en cas de parjure ou de trahison ; cette malédiction était peut-être à l''origine validée et illustrée par un sacrifice sanglant ; cf. 1S 3.17 ; 14.44 ; 20.13 ; 25.22 ; 2S 3.9,35 ; 1R 2.23 ; 19.2 ; 20.10 ; 2R 6.31.'
  - type: text
    content: 'là où tu mourras, je mourrai, et c''est là que je serai ensevelie. Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fasse ceci et qu''il y ajoute cela, si ce n''est pas la mort qui me sépare de toi ! '
  '18':
  - type: note
    content: 'Noémi… n''insista plus  : litt. elle… cessa de lui parler.'
  - type: text
    content: 'Noémi, la voyant résolue à aller avec elle, n''insista plus. '
  '19':
  - type: note
    content: 'l''émotion gagna…  : cf. 1R 1.45 ; voir aussi 1S 4.5n  ; Mt 2.3 ; 21.10. –  Les femmes disaient  : litt. elles disaient.'
  - type: text
    content: 'Elles marchèrent toutes les deux jusqu''à leur arrivée à Beth-Léhem. Lorsqu''elles arrivèrent à Beth-Léhem, l''émotion gagna toute la ville. Les femmes disaient : Est-ce là Noémi ? '
  '2':
  - type: note
    content: 'Elimélek signifie mon Dieu est roi. –  Noémi  : Ma Grâce, cf. v. 20n. –  Mahlôn  : Maladie ( ?). –  Kiliôn  : Consomption ( ?). –  Ephratites  : c.-à-d. originaires d''Ephrata, 4.11, ou d''Ephraïm ; cf. Gn 35.16n  ; voir aussi Jg 12.5n.'
  - type: text
    content: 'Le nom de cet homme était Elimélek, le nom de sa femme Noémi et le nom de ses deux fils Mahlôn et Kiliôn ; ils étaient Ephratites, de Beth-Léhem de Juda. Ils arrivèrent au pays de Moab et ils y vécurent. '
  '20':
  - type: note
    content: Noémi v. 2n. –  Mara signifie amère, cf. v. 13n  ; Ex 15.23 ; Lm 1.4. –  le Puissant Gn 17.1n  ; Jb 5.17n.
  - type: text
    content: 'Elle leur dit : Ne m''appelez pas Noémi ; appelez-moi Mara (« Amère »), car le Puissant m''a rendu la vie bien amère ! '
  '21':
  - type: note
    content: 'comblée v. 1. –  les mains vides  : litt. vide 3.17 ; cf. Jb 1.21. –  témoigné  : cf. 4.7,9,11 ; Nb 35.30. –  m''a fait du mal  : cf. Ex 5.22 ; Nb 11.11 ; Jos 24.20 ; Es 45.7 ; Za 8.14 ; Jb 2.10.'
  - type: text
    content: 'J''étais partie comblée, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me ramène les mains vides. Pourquoi m''appelez-vous Noémi ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a témoigné contre moi, le Puissant m''a fait du mal !'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'la Moabite 2.6,21. –  qui venait  : litt. qui revenait (cf. v. 6n). –  au début de la moisson des orges  : avril-mai, cf. 2.23n  ; 2S 21.9.'
  - type: text
    content: Ainsi Noémi revint, et avec elle sa belle-fille, Ruth la Moabite, qui venait du pays de Moab. Elles arrivèrent à Beth-Léhem au début de la moisson des orges.
  '3':
  - type: note
    content: 'elle resta seule  : litt. elle resta  ; autre traduction elle survécut, de même au v. 5 ; cf. 2.14,18 (autre verbe) ; voir aussi Es 1.9+.'
  - type: text
    content: 'Puis Elimélek, le mari de Noémi, mourut, et elle resta seule avec ses deux fils. '
  '4':
  - type: note
    content: 'des Moabites  : cf. Ex 34.16 ; Dt 7.3s ; 23.4 ; Ml 2.11 ; Esd 9.1s ; Né 13.1,23-27. –  Orpa  : Nuque ( ?). –  Ruth  : Amitié ou Réconfort ( ?).'
  - type: text
    content: 'Ceux-ci épousèrent des Moabites. Le nom de la première était Orpa et le nom de la seconde Ruth. Ils habitèrent là environ dix ans. '
  '5':
  - type: note
    content: 'Mahlôn / Kiliôn v. 2. –  resta seule v. 3n. –  privée…  : cf. Gn 27.45 ; Dt 27.19 ; Es 47.8s ; 54.4s.'
  - type: text
    content: Mahlôn et Kiliôn moururent aussi tous les deux, et la femme resta seule, privée de ses deux enfants et de son mari.
  - type: heading
    content: Ruth décide de rester avec Noémi
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'elle revint…  : litt. elle se leva, elle et ses belles-filles, et revint…  : le verbe correspondant à revenir est aussi traduit par retourner dans la suite. –  était intervenu en faveur de  : autre traduction avait visité , cf. Ex 3.16n  ; Jr 6.6,15n  ; Lc 1.68. –  du pain  : cf. 1.1n  ; voir aussi Ps 132.15 ; Lc 1.53.'
  - type: text
    content: 'Alors elle revint du pays de Moab, avec ses belles-filles. En effet, elle avait appris, au pays de Moab, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était intervenu en faveur de son peuple en lui donnant du pain. '
  '7':
  - type: note
    content: 'retourner ou revenir  : cf. v. 6n,8,10nss,22 ; 2.6 ; 4.3 ; voir aussi Es 1.27n.'
  - type: text
    content: Elle quitta le lieu où elle vivait, ses deux belles-filles avec elle ; elles se mirent en route pour retourner en Juda.
  '8':
  - type: text
    content: ' '
  - type: note
    content: agisse avec fidélité 2.20 ; 3.10 ; cf. Gn 24.27 ; Ps 25.10 ; 100.5 ; Mt 23.23.
  - type: text
    content: 'Noémi dit alors à ses deux belles-filles : Allez, que chacune de vous retourne chez sa mère ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agisse avec fidélité envers vous, comme vous avez agi envers ceux qui sont morts et envers moi ! '
  '9':
  - type: note
    content: 'un lieu de repos  : autres traductions du bonheur ; une situation stable. –  chez un mari  : c.-à-d. en vous remariant, cf. 3.1. –  sangloter  : cf. Gn 29.11.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donne à chacune de trouver un lieu de repos chez un mari ! Puis elle les embrassa. Elles se mirent alors à sangloter, '
