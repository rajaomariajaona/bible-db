        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 17.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au pays de Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', région fertile à l''est de la mer Morte ; le terme hébreu ici traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est aussi rendu, dans d''autres contextes, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'champ(s) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; Gn 19.36-37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 3.13.'
      marker-yv: yv-n
    - type: text
      text: 'Aux jours où les juges gouvernaient, il y eut une famine dans le pays. Un homme de Beth-Léhem de Juda partit, avec sa femme et ses deux fils, pour séjourner en immigré au pays de Moab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous retournerons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous reviendrons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'elles lui dirent : Non, nous retournerons avec toi vers ton peuple ! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devenir vos maris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : selon la coutume du « lévirat », cette responsabilité incombait aux frères du défunt avant tout autre parent ; cf. 2.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.5 ; Gn 38.8-11 ; Dt 25.5-10 ; Mt 22.23-28/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Noémi dit : Retournez, mes filles ! Pourquoi viendriez-vous avec moi ? Ai-je encore dans mon ventre des fils qui puissent devenir vos maris ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: me remarier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être à un homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Retournez, mes filles, allez ! Car je suis trop vieille pour me remarier ; et même si je disais : « Il y a de l''espoir pour moi », si ce soir même j''étais remariée et que je mette des fils au monde, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attendriez-vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 38.11,14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: amer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; sur ce terme voir aussi 1S 15.32 ; Jb 3.20 ; 7.11 ; 9.18 ; 10.1 ; 21.25 ; 27.2 ; Ec 7.26 ; on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mon sort m''est amer à cause de vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon sort est trop amer pour que vous vous l'imposiez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''est abattue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est sortie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 9.3 ; Dt 2.15 ; Jg 2.15 ; 1S 12.15 ; 2S 24.17 ; Ez 13.9 ; Jb 13.21 ; 19.21 ; 30.21.'
      marker-yv: yv-n
    - type: text
      text: 'attendriez-vous pour cela qu''ils grandissent ? Refuseriez-vous pour cela de vous remarier ? Non, mes filles ! Mon sort est plus amer que le vôtre : la main du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''est abattue sur moi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: embrassa sa belle-mère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et retourna vers son peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'attacha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe en 2.8,21 ; Gn 2.24.'
      marker-yv: yv-n
    - type: text
      text: Elles sanglotèrent encore. Puis Orpa embrassa sa belle-mère, mais Ruth s'attacha à elle.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Noémi dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à ses dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à son dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; les divinités étaient habituellement considérées comme liées à leur territoire ; cf. Jos 24.15 ; 1S 26.19 ; 2R 5.17 (sur le dieu principal de Moab, '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Kemosh
        - type: text
          text: ', cf. Nb 21.29 ; Jg 11.24 ; 1R 11.7,33 ; 2R 23.13 ; Jr 48.7,46). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: retourne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: retourne derrière ta belle-sœur.
      marker-yv: yv-n
    - type: text
      text: 'Noémi dit alors : Ta belle-sœur est retournée à son peuple et à ses dieux ; retourne, toi aussi, comme ta belle-sœur. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne me pousse pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne me malmène pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: me détourner de toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'me détourner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: revenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de derrière toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cesser de te suivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 7 ; Nb 14.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Où tu iras, j'irai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 15.21 ; 2R 2.2-4 ; 3.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton peuple sera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le verbe étant sous-entendu en hébreu) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.11s ; Es 14.1 ; Za 8.23 ; Ps 33.12 ; 45.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 15+ ; 1Th 1.9.'
      marker-yv: yv-n
    - type: text
      text: 'Ruth dit : Ne me pousse pas à t''abandonner, à me détourner de toi ! Où tu iras, j''irai ; là où tu passeras la nuit, je passerai la nuit ; ton peuple sera mon peuple, et ton dieu sera mon dieu ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' me fasse…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule de serment, appelant sur celui qui prête serment une malédiction conditionnelle en cas de parjure ou de trahison ; cette malédiction était peut-être à l''origine validée et illustrée par un sacrifice sanglant ; cf. 1S 3.17 ; 14.44 ; 20.13 ; 25.22 ; 2S 3.9,35 ; 1R 2.23 ; 19.2 ; 20.10 ; 2R 6.31.'
      marker-yv: yv-n
    - type: text
      text: 'là où tu mourras, je mourrai, et c''est là que je serai ensevelie. Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me fasse ceci et qu''il y ajoute cela, si ce n''est pas la mort qui me sépare de toi ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Noémi… n'insista plus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle… cessa de lui parler.
      marker-yv: yv-n
    - type: text
      text: 'Noémi, la voyant résolue à aller avec elle, n''insista plus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'émotion gagna…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 1.45 ; voir aussi 1S 4.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 2.3 ; 21.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les femmes disaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elles disaient.
      marker-yv: yv-n
    - type: text
      text: 'Elles marchèrent toutes les deux jusqu''à leur arrivée à Beth-Léhem. Lorsqu''elles arrivèrent à Beth-Léhem, l''émotion gagna toute la ville. Les femmes disaient : Est-ce là Noémi ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
