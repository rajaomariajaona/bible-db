        - type: text
          text: '(d''Israël) : cf. Gn 12.10 ; 26.1-6 ; 41–50 ; 1R 17.7-9 ; 2R 4.38 ; 8.1 ; voir aussi Dt 11.10-12 ; Jr 21.9. –  '
      - type: usfm
