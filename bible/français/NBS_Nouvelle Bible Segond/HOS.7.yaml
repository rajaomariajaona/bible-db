document_id: HOS.7,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'guérir 6.1+. –  Ephraïm 4.17n. –  Samarie  : capitale du royaume du Nord ; voir 8.6 ; 10.5,7 ; 14.1. –  dans la maison  : sous-entendu dans le texte.'
  - type: text
    content: Lorsque je veux guérir Israël,
  - type: text
    content: la faute d'Ephraïm et les méfaits de Samarie se mettent à découvert,
  - type: text
    content: car ils pratiquent le mensonge ;
  - type: text
    content: le voleur pénètre dans la maison,
  - type: text
    content: la troupe armée se répand au dehors.
  '10':
  - type: text
    content: ' '
  - type: note
    content: L'orgueil… 5.5n. –  ils ne reviennent pas 11.5 ; Es 9.12. –  malgré tout cela ou en tout cela  ; cf. Es 5.25n  ; 9.12 ; Am 4.6-11.
  - type: text
    content: L'orgueil d'Israël témoigne contre lui ;
  - type: text
    content: 'ils ne reviennent pas au '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu,'
  - type: text
    content: et malgré tout cela, ils ne le cherchent pas.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'colombe  : cf. 11.11 ; Mt 10.16. –  naïve  : litt. qui se laisse duper ou séduire (terme apparenté à celui de 2.16). –  sans intelligence  : litt. sans cœur  ; cf. 4.11n. –  Egypte / Assyrie  : cf. 5.13+ ; 12.2 ; 2R 15.19s ; 17.3s ; Jr 2.18 ; Lm 5.6.'
  - type: text
    content: Ephraïm est devenu comme une colombe naïve, sans intelligence ;
  - type: text
    content: ils ont fait appel à l'Egypte,
  - type: text
    content: ils sont allés en Assyrie.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'mon filet Ez 12.13 ; 32.3 ; Ec 9.12 ; Mt 13.47. –  je les corrige  : cf. v. 15n. –  comme ils en ont été avertis…  : traduction incertaine ; autre possibilité dès que j''entends leur rassemblement  ; LXX par l''annonce de leur affliction  ; cf. Dt 28.16-69.'
  - type: text
    content: Tandis qu'ils y vont,
  - type: text
    content: j'étends sur eux mon filet,
  - type: text
    content: je les y fais tomber, comme les oiseaux du ciel ;
  - type: text
    content: je les corrige, comme ils en ont été avertis dans leur communauté.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Alors que…  : cf. v. 1 ; autre traduction et moi, je les libérerais ? ! cf. 4.16n  ; 13.14n.'
  - type: text
    content: Quel malheur pour eux ! Ils ont fui loin de moi !
  - type: text
    content: Quel ravage pour eux ! Ils se sont révoltés contre moi !
  - type: text
    content: Alors que, moi, je les libérais,
  - type: text
    content: ils ont proféré des mensonges contre moi.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'sur leur lit  : certains pensent qu''il s''agit des emplacements réservés aux dévotions dans les sanctuaires (voir les prie-Dieu) ; cf. Ps 4.5 ; 149.5. –  ils s''attroupent  : plusieurs mss hébreux et des versions anciennes portent ils se font des incisions , comme en 1R 18.28 ; Jr 16.6 ; 41.5 ; 47.5 ; Mi 4.14n. –  vin  : autre traduction vin nouveau , cf. 2.10n. –  ils s''éloignent de moi  : d''après des versions anciennes, certains modifient légèrement le texte hébreu traditionnel pour lire ils se révoltent contre moi.'
  - type: text
    content: Ils ne crient pas vers moi dans leur cœur ;
  - type: text
    content: mais ils hurlent sur leur lit,
  - type: text
    content: ils s'attroupent pour avoir du blé et du vin,
  - type: text
    content: et ils s'éloignent de moi.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'instruits  : autre traduction corrigés  ; cf. v. 12 ; 10.10 ; le verbe correspondant est omis par LXX. –  j''ai rendu leurs bras forts Gn 49.24. –  et ils se préparent au mal  : cf. Es 5.7.'
  - type: text
    content: C'est moi qui les ai instruits,
  - type: text
    content: j'ai rendu leurs bras forts ;
  - type: text
    content: et ils se préparent au mal contre moi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: en haut 11.7. –  arc faussé Ps 78.57. –  à cause de leur langue Ps 12.4-6. –  Egypte 9.6 ; Jr 42.18.
  - type: text
    content: Ils reviennent, mais non pas en haut ;
  - type: text
    content: ils sont comme un arc faussé,
  - type: text
    content: leurs princes tomberont par l'épée,
  - type: text
    content: à cause de leur langue furieuse.
  - type: text
    content: Voilà qui leur vaudra des moqueries en Egypte.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dans leur cœur Ps 10.6,11 ; 14.1. –  je me souviens 8.13 ; 9.9 ; 1R 17.18 ; Am 8.7 ; Ml 3.16 ; cf. Ez 8.12. –  devant moi  : litt. devant ma face  ; cf. 5.3 ; Ps 90.8 ; Pr 5.21s.'
  - type: text
    content: Ils ne se disent pas, dans leur cœur,
  - type: text
    content: que je me souviens de tout le mal qu'ils font ;
  - type: text
    content: maintenant leurs agissements les entourent,
  - type: text
    content: ils sont devant moi.
  - type: heading
    content: Des complots contre les rois
  '3':
  - type: text
    content: ' '
  - type: note
    content: Les v. 3-7 sont passablement obscurs, et leur traduction est incertaine ; certains y voient une description imagée du mal qu'ils font (ou de leur méchanceté  ; cf. 10.15n) ; d'autres y devinent une allusion à un événement historique, peut-être un attentat contre le roi et les princes à l'occasion d'un banquet, avec la complicité d'un mystérieux boulanger (v. 7n). –  dissimulations 4.2 ; 9.2 ; 10.13 ; 12.1.
  - type: text
    content: Ils réjouissent le roi par le mal qu'ils font,
  - type: text
    content: et les princes par leurs dissimulations.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Les termes hébreux pour adultères et boulanger font assonance.
  - type: text
    content: Ils sont tous adultères,
  - type: text
    content: semblables à un four chauffé par le boulanger.
  - type: text
    content: Il cesse d'attiser le feu
  - type: text
    content: depuis qu'il a pétri la pâte
  - type: text
    content: jusqu'à ce qu'elle soit levée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Au jour…  : traduction incertaine ; d''autres comprennent au jour de notre roi (peut-être son anniversaire, cf. Jb 1.4n) , les princes se sont rendus malades…'
  - type: text
    content: Au jour où les princes
  - type: text
    content: ont rendu notre roi malade
  - type: text
    content: par le poison du vin,
  - type: text
    content: il tend la main aux insolents.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ils appliquent…  : litt. ils font approcher comme le four leur cœur dans leur embuscade ( ?). –  leur boulanger  : des versions anciennes ont lu leur colère , ce qui pourrait correspondre à une autre vocalisation des mêmes consonnes en hébreu. –  le four  : litt. il ou elle , qui pourrait aussi se rapporter au cœur ou éventuellement à la colère (voir note précédente). –  un feu flamboyant Es 4.5 ; Lm 2.3.'
  - type: text
    content: Ils appliquent à leur embuscade leur cœur pareil à un four ;
  - type: text
    content: toute la nuit leur boulanger dort,
  - type: text
    content: et au matin le four brûle comme un feu flamboyant.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'échauffés  : cf. Jr 51.39. –  leurs rois tombent  : sept rois d''Israël ont été assassinés 1R 15.28 ; 16.9s ; 2R 9.24 ; 15.10,14,25,30.'
  - type: text
    content: Ils sont tous échauffés comme un four,
  - type: text
    content: ils dévorent leurs juges ;
  - type: text
    content: 'tous leurs rois tombent :'
  - type: text
    content: aucun d'eux ne m'invoque.
  - type: heading
    content: L'ingratitude d'Israël envers Dieu
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'avec les peuples 9.1. –  une galette…  : brûlée d''un côté et pas cuite de l''autre, ou encore d''apparence trompeuse.'
  - type: text
    content: Ephraïm se confond avec les peuples,
  - type: text
    content: Ephraïm est devenu une galette qui n'a pas été retournée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 5.3 ; Pr 23.35 ; Ap 3.17. –  La vieillesse  : litt. les cheveux blancs  ; cf. Gn 15.15n.'
  - type: text
    content: Des étrangers dévorent sa force,
  - type: text
    content: et il ne le sait pas.
  - type: text
    content: La vieillesse s'empare de lui,
  - type: text
    content: et il ne le sait pas.
