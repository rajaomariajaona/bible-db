document_id: LUK.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les épis arrachés
  - type: heading
    content: Mt 12.1-8  ; Mc 2.23-28
  - type: text
    content: ' '
  - type: note
    content: 'un jour de sabbat  : certains mss ajoutent un adjectif mystérieux, deuxième-premier , que quelques-uns ont tenté d''expliquer à partir d''un calendrier sacerdotal en vigueur à Qumrân (il s''agirait du premier sabbat après la fête des Pains sans levain, qui est le deuxième sabbat après la Pâque ; cf. Lv 23.15). D''autres comprennent le deuxième sabbat du premier mois (où il était interdit de manger du grain de la nouvelle récolte, Lv 23.14). D''autres enfin y voient un ajout de certains copistes, cherchant à exprimer un rapport au sabbat mentionné en 4.31 ; voir aussi 6.6. –  arrachaient des épis…  : cf. Dt 23.26.'
  - type: text
    content: 'Comme il traversait des champs un jour de sabbat, ses disciples arrachaient des épis et les mangeaient, après les avoir frottés dans leurs mains. '
  '10':
  - type: text
    content: 'Alors, promenant ses regards sur eux tous, il dit à l''homme : Tends ta main. Il le fit, et sa main fut rétablie. '
  '11':
  - type: note
    content: 'de fureur  : le mot peut aussi signifier folie, stupidité (ainsi en 2Tm 3.9), voire ignorance. –  discutaient 1.65n. –  ce qu''ils pourraient faire…  : autre traduction la façon dont ils pourraient traiter Jésus, cf. Ac 4.16.'
  - type: text
    content: Remplis de fureur, ils discutaient entre eux sur ce qu'ils pourraient faire contre Jésus.
  - type: heading
    content: Jésus choisit les douze apôtres
  - type: heading
    content: Mt 10.1-4  ; Mc 3.13-19  ; Ac 1.13
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ac 1.2. –  montagne / à prier Dieu (litt. dans la prière de Dieu , 3.21+) 9.28 ; cf. 19.29 ; 21.37 ; 22.39 ; Mc 6.46 ; Jn 6.15 ; voir aussi Ex 32.30 ; 34.2.
  - type: text
    content: 'En ces jours-là, Jésus s''en alla prier dans la montagne ; il passa toute la nuit à prier Dieu. '
  '13':
  - type: note
    content: 'il appela  : autre traduction il s''adressa à (Lc emploie un autre verbe que Mc 3.13). –  ses disciples  : cf. v. 1. –  choisit  : cf. 9.35 ; Jn 6.70 ; Ac 1.2,22-24 ; 6.5 ; 15.7,22,25. –  douze… apôtres (ou envoyés, cf. 9.10 ; 11.49 ; 17.5 ; 22.14 ; 24.10 ; voir aussi 24.47s ; Ac 1.8) Mt 10.1+,2n.'
  - type: text
    content: 'Quand le jour parut, il appela ses disciples et en choisit douze, à qui il donna aussi le nom d''apôtres : '
  '14':
  - type: note
    content: 'Cf. Ac 1.13. –  Simon / Pierre 5.8+ ; le principal témoin du texte occidental précise le premier, comme en Mt 10.2 ; voir aussi Mt 16.18 ; Jn 1.42 ; cf. Gn 17.5,15 ; 32.29 ; 2R 23.34 ; 24.17 ; voir aussi nom. –  André  : cf. Mc 1.16,29 ; 13.3 ; Jn 1.40s,44 (aussi Philippe) ; 6.5-8 ; 12.22. –  Jacques / Jean 5.10+.'
  - type: text
    content: 'Simon, à qui il donna aussi le nom de Pierre, André, son frère, Jacques, Jean, Philippe, Barthélemy, '
  '15':
  - type: note
    content: 'Matthieu  : cf. Mt 9.9n. –  Thomas Jn 11.16 ; 20.24. –  Jacques, fils ou frère d''Alphée  : cf. Mc 3.18n. –  le Zélote  : Lc emploie la traduction grecque et non une transcription du terme araméen comme Mt 10.4n  ; Mc 3.18.'
  - type: text
    content: 'Matthieu, Thomas, Jacques, fils d''Alphée, Simon, celui qu''on appelle le Zélote, '
  '16':
  - type: note
    content: 'Judas  : cf. Jn 14.22n. –  fils ou frère de Jacques. –  Iscarioth  : forme grecque en 22.3 ; cf. Mt 10.4n  ; Jn 6.71 ; 13.26.'
  - type: text
    content: Judas, fils de Jacques, et Judas Iscarioth, qui devint traître.
  - type: heading
    content: Jésus instruit la foule et guérit les malades
  - type: heading
    content: Mt 4.24-25  ; Mc 3.7-13
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'descendit  : cf. v. 12 ; Ex 32.7ss ; 34.29. –  s''arrêta  : autre traduction se tint debout (cf. 4.20). –  grande foule…  : cf. 19.37 ; Jn 6.60,66. –  Judée…  : cf. 4.44n  ; 5.17. –  Tyr / Sidon , en territoire non juif (4.26) 10.13s ; Ac 21.3,7 ; 27.3 ; cf. Mc 3.8n.'
  - type: text
    content: 'Il descendit avec eux et s''arrêta sur un endroit tout plat, où se trouvait une grande foule de ses disciples et une grande multitude du peuple de toute la Judée, de Jérusalem et du littoral de Tyr et de Sidon. '
  '18':
  - type: note
    content: 'guéris  : le même verbe traduit ici deux verbes grecs synonymes (sur le premier, qui revient au v. 19, voir 5.17+). –  perturbés  : le verbe est dérivé du mot traduit par foule au v. 17 ; verbe apparenté en Ac 5.16. –  esprits impurs (voir pur, impur) : cf. 4.33,36+.'
  - type: text
    content: 'Ils étaient venus pour l''entendre et pour être guéris de leurs maladies. Ceux qui étaient perturbés par des esprits impurs étaient guéris. '
  '19':
  - type: note
    content: 'le toucher  : cf. 5.13+. –  une force ou une puissance  : cf. 5.17+ ; 8.44,46/ / ; Mc 6.56 ; voir aussi Ex 34.29ss.'
  - type: text
    content: Et toute la foule cherchait à le toucher, parce qu'une force sortait de lui et les guérissait tous.
  - type: heading
    content: Bonheurs et malheurs
  - type: heading
    content: Mt 5.2-12
  '2':
  - type: note
    content: 'Voir Mt 12.2n  ; Mc 2.24n  ; cf. Jn 5.10 ; voir aussi pharisiens. –  ce qui n''est pas permis  : certains mss portent ce qu''il n''est pas permis de faire  ; le principal ms témoin du texte occidental porte pourquoi tes disciples font-ils, le sabbat, ce qui n''est pas permis ?'
  - type: text
    content: 'Quelques pharisiens dirent : Pourquoi faites-vous ce qui n''est pas permis un jour de sabbat ? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Testament de Juda 25.4s : « Ceux qui seront morts dans la tristesse, se relèveront dans la joie ; ceux qui auront été pauvres à cause du Seigneur seront enrichis, et ceux qui auront péri à cause du Seigneur se réveilleront pour vivre… mais les impies se lamenteront, et les pécheurs pleureront. » –  Heureux (le verbe correspondant à êtes-vous est sous-entendu dans le texte ; de même v. 21s) 7.23 ; 10.23 ; 11.27s ; 12.37,38,43 ; 14.14s. Cf. Es 30.18 ; 32.20 ; Ps 1.1 ; 2.12 ; 32.1s ; 33.12 ; 34.9 ; 84.5s,13 ; Pr 3.13 ; 8.32,34 ; Dn 12.12 ; Mt 13.16 ; 16.17 ; Jn 13.17 ; 20.29. –  les pauvres 1.52 ; 4.18 ; 7.22 ; 14.13,21 ; 16.19ss ; 19.8 (voir aussi 10.21 ; 14.11 ; 18.14) ; Es 61.1 ; Ps 34.19 ; 40.18 ; 69.30ss ; 140.13 ; cf. Mc 10.29s ; Ac 2.44s ; 4.32ss ; Jc 1.9 ; 2.5 ; Psaumes de Salomon 10.6 : « Les saints le loueront dans l''assemblée du peuple, et Dieu aura pitié des pauvres pour la joie d''Israël. » Evangile selon Thomas 54 : « Heureux, vous, les pauvres, car le Royaume des cieux est à vous. »'
  - type: text
    content: 'Alors, levant les yeux sur ses disciples, il disait :'
  - type: text
    content: Heureux êtes-vous, vous les pauvres,
  - type: text
    content: car le royaume de Dieu est à vous !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'rassasiés  : cf. 9.17 ; 15.16 ; 16.21 ; voir aussi 12.37 ; 13.29 ; 14.14ss ; Es 35.10 ; 49.10,13 ; 65.19 ; Jr 31.12,25 ; Ez 34.29 ; 36.29 ; Ps 37.19 ; 81.17 ; 107.9 ; 132.15 ; Ap 7.16s. –  pleurez / rirez  : cf. 2.25 ; Es 25.6ss ; 40.1,29,31 ; 41.17 ; 61.2s ; 65.18s ; 66.10 ; Jr 31.7ss ; 33.6 ; Za 2.10ss ; Ps 126.1s,5s ; Ap 21.4.'
  - type: text
    content: Heureux êtes-vous, vous qui avez faim maintenant,
  - type: text
    content: car vous serez rassasiés !
  - type: text
    content: Heureux êtes-vous, vous qui pleurez maintenant,
  - type: text
    content: car vous rirez !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.9-19. –  détestent  : cf. Ps 69.5 ; Mt 10.22 ; Mc 13.13 ; Jn 15.19. –  excluent  : cf. Jn 9.22+. –  insultent  : un terme apparenté est traduit par honte en 1.25 ; Rm 15.3 ; Hé 11.26n  ; 1P 4.14. –  votre nom  : cf. Ac 11.26 ; 26.28 ; Jc 2.7 ; 1P 4.16. –  infâme  : litt. mauvais, méchant , de même v. 35,45. –  à cause du Fils de l''homme (5.24+) : cf. 9.24.'
  - type: text
    content: Heureux êtes-vous lorsque les gens vous détestent, lorsqu'ils vous excluent, vous insultent et rejettent votre nom comme infâme, à cause du Fils de l'homme.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 5.41 ; 14.22 ; Jc 1.2 ; 1P 4.13. –  tressaillez ou bondissez , cf. 1.41n. –  récompense v. 35 ; 10.7n  ; Mt 5.12+. –  dans le ciel  : cf. Ap 20.12. –  leurs pères (c.-à-d. les ancêtres des Juifs qui se sont opposés à Jésus et à ses disciples) … 11.47-51 ; 13.33s ; Ac 7.52 ; cf. 1R 19.10 ; Jr 26.20ss ; 38.6ss ; 2Ch 36.16 ; 1Th 2.15.'
  - type: text
    content: Réjouissez-vous en ce jour-là et tressaillez de joie, parce que votre récompense est grande dans le ciel ; car c'est ainsi que leurs pères traitaient les prophètes.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'quel malheur… 10.13 ; 11.42ss ; 17.1 ; 21.23 ; 22.22 ; cf. 1.51ss ; 16.19ss ; voir aussi Es 3.10s ; Jr 17.4ss ; Pr 28.14 ; Ec 10.16s. –  riches 8.14 ; 18.24 ; Mt 19.23s/ / ; Jc 5.1n. –  consolation  : le terme est aussi traduit par encouragement  ; cf. 2.25+ ; 16.25 ; Ac 4.36 ; 9.31 ; 13.15 ; 15.31.'
  - type: text
    content: Mais quel malheur pour vous, les riches !
  - type: text
    content: Vous tenez votre consolation !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'rassasiés / faim  : cf. 1.53 ; Es 5.22 ; 65.13s. –  qui riez Jc 4.9 ; cf. Ec 7.6. –  deuil / larmes  : cf. Mc 16.10 ; Jc 4.9 ; Ap 18.11,15,19.'
  - type: text
    content: Quel malheur pour vous qui êtes rassasiés maintenant !
  - type: text
    content: Vous aurez faim !
  - type: text
    content: Quel malheur pour vous qui riez maintenant !
  - type: text
    content: Vous serez dans le deuil et dans les larmes !
  '26':
  - type: text
    content: ' '
  - type: note
    content: tout le monde ou, selon certains mss, les gens v. 22 ; Jc 4.4. –  prophètes de mensonge ou faux prophètes, pseudo-prophètes Es 30.10s ; Jr 5.31 ; 6.14 ; 23.16s ; Mi 2.11 ; 2Tm 3.1-9.
  - type: text
    content: Quel malheur pour vous, lorsque tout le monde parle en bien de vous !
  - type: text
    content: C'est ainsi que leurs pères traitaient les prophètes de mensonge !
  - type: heading
    content: L'amour pour les ennemis
  - type: heading
    content: Mt 5.38-48
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 22,35 ; voir Mt 5.43-44n  ; Rm 12.14ss,21. –  qui écoutez  : autre traduction qui entendez . –  faites du bien 1P 2.15,20 ; 3.6,17. –  ceux qui vous détestent  : cf. 1.71.'
  - type: text
    content: 'Mais je vous dis, à vous qui écoutez : aimez vos ennemis, faites du bien à ceux qui vous détestent, '
  '28':
  - type: note
    content: 'bénissez…  : cf. Gn 12.3 ; 27.29 ; Jg 17.2 ; Ps 109.6ss,28 ; voir aussi Rm 12.14,21 ; 1Co 4.12 ; 1P 2.23 ; 3.9. –  priez  : cf. 23.34 ; Ac 7.60. –  qui vous injurient  : autre traduction possible qui vous maltraitent  ; même verbe en 1P 3.16.'
  - type: text
    content: 'bénissez ceux qui vous maudissent, priez pour ceux qui vous injurient. '
  '29':
  - type: note
    content: 'Si quelqu''un te frappe… Mt 5.39 ; Jn 18.22s ; Ac 23.3 ; cf. Ex 21.24 ; Lv 24.20 ; Dt 19.21 ; voir aussi 1Co 6.7. –  ton vêtement (de dessus, par opposition à la tunique) : cf. 10.30 ; Ex 22.25s ; Dt 24.10-17 ; Am 2.8 ; Ct 5.7 ; comparer avec Mt 5.40n.'
  - type: text
    content: Si quelqu'un te frappe sur une joue, présente-lui aussi l'autre. Si quelqu'un te prend ton vêtement, ne l'empêche pas de prendre aussi ta tunique.
  '3':
  - type: note
    content: Cf. 1S 21.2-7.
  - type: text
    content: 'Jésus leur répondit : N''avez-vous même pas lu ce que fit David, lorsqu''il eut faim, lui et ceux qui étaient avec lui ? '
  '30':
  - type: text
    content: Donne à quiconque te demande, et ne réclame pas tes biens à celui qui les prend.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 7.12 ; Rm 13.8ss.
  - type: text
    content: 'Ce que vous voulez que les gens fassent pour vous, faites-le pareillement pour eux. '
  '32':
  - type: note
    content: 'quel gré…  : le même mot est traduit ailleurs par grâce (1.30+ ; de même dans la suite), cf. 17.9 ; voir aussi 2.52 ; Ac 7.46 ; comparer avec 1P 2.19s ; Siracide 12.1 : « Si tu fais le bien, sache à qui tu le fais, et on te saura gré de tes bienfaits. » – Voir péché.'
  - type: text
    content: 'Si vous aimez ceux qui vous aiment, quel gré vous en saura-t-on ? Les pécheurs aussi aiment ceux qui les aiment. '
  '33':
  - type: text
    content: 'Si vous faites du bien à ceux qui vous font du bien, quel gré vous en saura-t-on ? Les pécheurs eux-mêmes en font autant. '
  '34':
  - type: note
    content: 'prêtez  : cf. Ex 22.24 ; Lv 25.35ss ; Dt 23.21. Evangile selon Thomas 95 : « Jésus a dit : “Si vous avez de l''argent, ne prêtez pas à usure, mais donnez… à celui de qui vous ne le recevrez plus.” »'
  - type: text
    content: 'Et si vous prêtez à ceux de qui vous espérez recevoir, quel gré vous en saura-t-on ? Même des pécheurs prêtent à des pécheurs afin de recevoir l''équivalent. '
  '35':
  - type: note
    content: 'aimez… v. 27+. –  sans rien espérer  : d''autres comprennent sans désespérer de rien  ; certains mss portent sans désespérer personne (ou de personne  ?). –  récompense Mt 5.12+. –  fils du Très-Haut  : cf. 1.32,76 ; Ps 82.6 ; voir aussi Mt 5.45 ; Rm 8.14s ; Ga 4.5s ; Siracide 4.10 : « Sois pour les orphelins comme un père, et un mari pour leur mère : tu seras comme un fils du Très-Haut, il t''aimera plus que ta mère. » –  bon Mt 11.30n  ; Rm 2.4n  ; cf. Ps 25.8 ; 86.5 ; Sagesse 15.1 : « Mais toi, notre Dieu, tu es bon et fidèle, tu es patient et gouvernes tous les êtres avec miséricorde. »'
  - type: text
    content: Mais aimez vos ennemis, faites du bien et prêtez sans rien espérer. Votre récompense sera grande et vous serez fils du Très-Haut, car il est bon pour les ingrats et pour les mauvais.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 5.48. –  magnanimes ou cléments, généreux, compatissants, miséricordieux  ; même terme Jc 5.11 ; termes apparentés Rm 9.15 ; 12.1 ; 2Co 1.3 ; Ph 2.1 ; Col 3.12 ; Hé 10.28 ; cf. Ex 34.6 ; Dt 4.31 ; Jl 2.13 ; Jon 4.2 ; Ps 78.38 ; 86.15 ; voir aussi Lv 19.2 ; Targum (Tg) du pseudo-Jonathan sur Lv 22.28 : « Mon peuple, enfants d''Israël ! Comme je suis miséricordieux dans les cieux, ainsi vous serez miséricordieux sur la terre. » –  votre Père 2.49+ ; 12.30 ; cf. 9.26 ; 11.2,13.'
  - type: text
    content: Soyez magnanimes, comme votre Père est magnanime.
  - type: heading
    content: La paille et la poutre
  - type: heading
    content: Mt 7.1-5
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'jugez  : même verbe 7.43 ; 12.57 ; 19.22 ; cf. Rm 14.10. –  jamais  : autre traduction en aucun cas . –  absolvez  : litt. déliez, relâchez (23.25) ; le même verbe est traduit par renvoyer en 8.38, délivrer en 13.12 (verbe apparenté en Mt 18.18) ; cf. Mt 6.14.'
  - type: text
    content: 'Ne jugez pas, et vous ne serez jamais jugés ; ne condamnez pas, et vous ne serez jamais condamnés ; absolvez, et vous serez absous. '
  '38':
  - type: note
    content: 'Cf. 8.18 ; 19.25s ; Mt 7.2n  ; Mc 4.24. –  on versera  : autre traduction ils verseront  ; mais le pluriel a souvent valeur d''indéfini (on), désignant en l''occurrence l''action de Dieu ; cf. 12.20 ; 16.9. –  la grande poche de votre vêtement  : traduction traditionnelle votre sein, même terme 16.22s ; Jn 1.18 ; 13.23 (il a aussi le sens de golfe en Ac 27.39) ; il s''agit du pli du vêtement, qui pouvait éventuellement servir de poche, cf. Rt 3.15. On trouve des expressions comparables pour exprimer la rétribution (au sens de punition) en Es 65.6ns ; Jr 32.18n  ; Ps 79.12n. –  car  : le terme correspondant est absent de certains mss. –  c''est avec la mesure… Mt 7.2 ; Mc 4.24.'
  - type: text
    content: Donnez, et l'on vous donnera ; on versera dans la grande poche de votre vêtement une bonne mesure, serrée, secouée et débordante ; car c'est avec la mesure à laquelle vous mesurez qu'on mesurera pour vous en retour.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 15.14 ; 23.16 ; Rm 2.19 ; voir aussi Es 24.17s ; 2Tm 3.13. –  parabole 4.23n  ; 5.36+. –  guider  : cf. Ac 8.31.'
  - type: text
    content: 'Il leur dit aussi une parabole : Un aveugle peut-il guider un aveugle ? Ne tomberont-ils pas tous deux dans une fosse ? '
  '4':
  - type: note
    content: pains offerts Mt 12.4+. – Voir prêtres.
  - type: text
    content: '– comment il entra dans la maison de Dieu, prit les pains offerts, en mangea et en donna à ceux qui étaient avec lui, alors qu''il est permis aux prêtres seuls d''en manger ? '
  '40':
  - type: note
    content: 'Cf. Mt 10.24s ; Jn 13.16 ; 15.20. –  tout disciple…  : autre traduction le disciple sera formé exactement comme son maître  ; sur le verbe traduit par former, voir 2Co 13.11n. –  maître  : au sens d’enseignant.'
  - type: text
    content: Le disciple n'est pas au-dessus du maître ; mais tout disciple bien formé sera comme son maître.
  '41':
  - type: text
    content: 'Pourquoi regardes-tu la paille qui est dans l''œil de ton frère, et ne remarques-tu pas la poutre qui est dans ton œil à toi ? '
  '42':
  - type: note
    content: 'Comment…  : certains mss portent ou bien comment… –  Hypocrite 12.1,56 ; 13.15 ; Mt 6.2n. –  tu verras… Mt 7.5n  ; cf. Lc 24.31 ; Ac 26.17s.'
  - type: text
    content: 'Comment peux-tu dire à ton frère : « Mon frère, laisse-moi ôter la paille qui est dans ton œil », toi qui ne vois pas la poutre qui est dans ton œil ? Hypocrite, ôte d''abord la poutre de ton œil ! Alors tu verras comment ôter la paille qui est dans l''œil de ton frère.'
  - type: heading
    content: L'arbre et son fruit
  - type: heading
    content: Mt 7.16-20  ; 12.33-35
  '43':
  - type: text
    content: ' '
  - type: note
    content: Mt 7.16+ss ; cf. Jc 3.11s.
  - type: text
    content: 'Il n''y a pas de bon arbre qui produise un fruit pourri, ni d''arbre malade qui produise un beau fruit. '
  '44':
  - type: note
    content: 'épines / ronces  : cf. Gn 3.18 ; Os 10.8 ; Hé 6.8.'
  - type: text
    content: 'Car chaque arbre se connaît à son propre fruit. On ne cueille pas des figues sur des épines, et l''on ne vendange pas des raisins sur des ronces. '
  '45':
  - type: note
    content: 'Mt 12.34. –  bon trésor de son cœur  : cf. 11.39ss.'
  - type: text
    content: L'homme bon, du bon trésor de son cœur, fait sortir du bon, et le mauvais, de son mauvais trésor, fait sortir du mauvais ; car c'est de l'abondance de son cœur que sa bouche parle.
  - type: heading
    content: Les deux maisons
  - type: heading
    content: Mt 7.24-27
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.25 ; Mt 7.21 ; voir aussi Es 29.13 ; Ml 1.6. Sur la répétition Seigneur ! Seigneur ! cf. Lc 10.41 ; 22.31 ; Jn 13.13. –  faites…  : cf. 8.21 ; 10.28,37 ; 11.28 ; Mt 21.30 ; Rm 2.13 ; Jc 1.22,25 ; 1Jn 2.17.'
  - type: text
    content: Pourquoi m'appelez-vous « Seigneur ! Seigneur ! » et ne faites-vous pas ce que je dis ?
  '47':
  - type: text
    content: 'Quiconque vient à moi, entend mes paroles et les met en pratique, je vais vous montrer à qui il est semblable : '
  '48':
  - type: note
    content: 'le torrent ou le fleuve. –  sans être capable  : cf. 13.24 ; 14.6,29s ; 20.26. –  ébranler  : le même verbe a été traduit par secouer v. 38 ; cf. Hé 12.27.'
  - type: text
    content: 'il est semblable à un homme qui construit une maison. Il a creusé profondément et posé les fondations sur le roc. Une inondation est venue, et le torrent s''est rué contre cette maison, sans être capable de l''ébranler, parce qu''elle avait été bien construite. '
  '49':
  - type: note
    content: 'ruine  : terme apparenté au verbe traduit par se ruer.'
  - type: text
    content: 'Mais celui qui entend et ne met pas en pratique est semblable à un homme qui a construit une maison sur la terre, sans fondations. Le torrent s''est rué contre elle : aussitôt elle s''est écroulée, et la ruine de cette maison a été grande.'
  '5':
  - type: note
    content: 'Dans le principal témoin du texte occidental (voir introductions au N.T. et aux Actes des Apôtres), ce v. est reporté après le v. 10, et on lit à sa place  : Ce même jour il vit un homme qui travaillait pendant le sabbat ; il lui dit : Si tu sais ce que tu fais, heureux es-tu ; mais si tu ne le sais pas, tu es maudit, transgresseur de la loi. –  il leur disait  : autre traduction il leur dit. –  Fils de l''homme 5.24+. –  maître ou Seigneur.'
  - type: text
    content: 'Et il leur disait : Le Fils de l''homme est maître du sabbat.'
  - type: heading
    content: L'homme à la main paralysée
  - type: heading
    content: Mt 12.9-14  ; Mc 3.1-6
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sabbat / synagogue / enseigner 4.15+,16n. –  paralysée  : litt. sèche , de même v. 8 ; cf. 8.6 ; 23.31 ; voir Mt 12.10n.'
  - type: text
    content: 'Un autre jour de sabbat, il se rendit à la synagogue pour enseigner. Il se trouvait là un homme dont la main droite était paralysée. '
  '7':
  - type: note
    content: 'scribes / pharisiens 5.21+. –  observaient Jésus  : litt. l''observaient  ; cf. 13.14 ; 14.1s ; 20.20 ; voir aussi Ps 37.12.'
  - type: text
    content: 'Les scribes et les pharisiens observaient Jésus, pour voir s''il ferait une guérison le jour du sabbat : c''était afin de trouver un motif de l''accuser. '
  '8':
  - type: note
    content: 'il connaissait…  : cf. 2.35+ ; 5.22+. –  Lève-toi / Il se leva  : le verbe correspondant traduit ici les deux verbes grecs traditionnellement rendus par ressusciter  ; le premier d''entre eux peut également signifier se réveiller (1.69n). Voir résurrection.'
  - type: text
    content: 'Mais il connaissait leurs raisonnements ; il dit à l''homme qui avait la main paralysée : Lève-toi et tiens-toi là au milieu. Il se leva et se tint debout. '
  '9':
  - type: note
    content: Cf. 13.16 ; 14.3ss ; Mc 3.4n.
  - type: text
    content: 'Et Jésus leur dit : Je vous le demande, qu''est-ce qui est permis le jour du sabbat ? Est-ce de faire du bien ou de faire du mal, de sauver une vie ou d''en causer la perte ? '
