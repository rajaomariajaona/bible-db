        - type: text
          text: 'le deuxième sabbat du premier mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(où il était interdit de manger du grain de la nouvelle récolte, Lv 23.14). D''autres enfin y voient un ajout de certains copistes, cherchant à exprimer un rapport au sabbat mentionné en 4.31 ; voir aussi 6.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: arrachaient des épis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Dt 23.26.'
      marker-yv: yv-n
    - type: text
      text: 'Comme il traversait des champs un jour de sabbat, ses disciples arrachaient des épis et les mangeaient, après les avoir frottés dans leurs mains. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, promenant ses regards sur eux tous, il dit à l''homme : Tends ta main. Il le fit, et sa main fut rétablie. '
