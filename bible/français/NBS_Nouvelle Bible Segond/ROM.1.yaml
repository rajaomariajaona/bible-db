        text: '11.15 : « A cause des pensées stupides inspirées par leur injustice, qui les égarèrent (les Egyptiens) jusqu''à leur faire rendre un culte à des reptiles sans raison et à des bêtes viles, tu leur envoyas en châtiment une multitude d''animaux sans raison. » 12.24 : « Ils avaient erré au-delà des chemins de l''égarement : ils considéraient comme des dieux les plus vils et les plus méprisables des animaux. »'
    marker-yv: yv-n
