    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.5-9 : « La grandeur et la beauté des créatures conduisent par analogie à contempler leur Créateur. Cependant ces hommes méritent un moindre blâme : peut-être ne s''égarent-ils que dans leur façon de chercher Dieu et de vouloir le trouver. Plongés dans ses œuvres, ils scrutent et ils cèdent alors à l''apparence, car il est beau le spectacle du monde ! Toutefois même eux ne sont pas excusables pour autant. S''ils sont devenus assez savants pour pouvoir conjecturer le cours éternel des choses, comment n''ont-ils pas découvert auparavant le Maître de celles-ci ? »'
    marker-yv: yv-n
  - type: text
    text: 'En effet, ce qui chez lui est invisible – sa puissance éternelle et sa divinité – se voit fort bien depuis la création du monde, quand l''intelligence le discerne par ses ouvrages. Ils sont donc inexcusables, '
