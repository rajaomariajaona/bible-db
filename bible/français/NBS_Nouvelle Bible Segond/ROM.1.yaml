document_id: ROM.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La bonne nouvelle que Paul annonce
  - type: text
    content: ' '
  - type: note
    content: 'Paul 2P 3.15s. –  esclave  : autre traduction serviteur , cf. 6.16ss ; Ga 1.10 ; Ph 1.1 ; Jc 1.1 ; voir aussi Ps 78.70 ; 105.26. –  Christ  : voir onction. –  apôtre (ou envoyé ) par appel  : litt. appelé apôtre ou apôtre appelé , même formule au v. 7n (cf. v. 6) ; Ac 26.16-18 ; 1Co 1.1 ; Ga 1.1n,15. –  bonne nouvelle (le terme grec a donné notre mot évangile ) de Dieu  : cf. v. 9 ; Mc 1.14 ; 1Th 2.2+.'
  - type: text
    content: 'Paul, esclave de Jésus-Christ, apôtre par appel, mis à part pour la bonne nouvelle de Dieu '
  '10':
  - type: note
    content: 'par la volonté de Dieu  : cf. 15.32 ; Ac 18.21 ; 1Co 4.19 ; 16.7 ; Hé 6.3 ; Jc 4.15. –  venir vous voir 15.23 ; cf. Ac 19.21.'
  - type: text
    content: 'je demande toujours, dans mes prières, d''avoir enfin, par la volonté de Dieu, une occasion favorable pour venir vous voir. '
  '11':
  - type: note
    content: 'je souhaite vivement vous voir 1Th 2.17 ; 3.6 ; 2Tm 1.4. –  don de la grâce  : grec kharisma (de kharis, grâce), qui a donné charisme  ; même terme en 5.15 ; 6.23 ; 12.6 ; 1Co 7.7 ; 12.4n  ; 1Tm 4.14 ; 1P 4.10. –  spirituel  : autre traduction de l''Esprit. –  affermis 1Th 3.2,13 ; 2Th 2.17 ; 3.3.'
  - type: text
    content: 'Car je souhaite vivement vous voir, pour vous communiquer quelque don de la grâce, quelque don spirituel, afin que vous soyez affermis ; '
  '12':
  - type: note
    content: 'chacun par la foi de l''autre  : autre traduction par une foi qui nous est commune  ; cf. 2P 1.1 ; Jd 3.'
  - type: text
    content: 'ou plutôt pour que, chez vous, nous soyons tous encouragés, chacun par la foi de l''autre, par la vôtre comme par la mienne. '
  '13':
  - type: note
    content: Je ne veux pas que vous ignoriez 11.25 ; 1Co 10.1 ; 12.1 ; 2Co 1.8 ; 1Th 4.13. –  je me suis souvent proposé ou j'ai souvent formé le projet, cf. 3.25n. –  fruit Jn 15.16+. –  nations ou non-Juifs. –  empêché 15.22 ; cf. Ac 16.6 ; 1Th 2.18.
  - type: text
    content: 'Je ne veux pas que vous ignoriez, mes frères, que je me suis souvent proposé de venir vous voir, pour avoir quelque fruit parmi vous, comme parmi les autres nations ; mais j''en ai été empêché jusqu''ici. '
  '14':
  - type: note
    content: 'débiteur  : cf. 8.12 ; 15.27n  ; voir aussi 1Co 9.16 ; Ga 5.3n. –  Grecs  : le terme désigne ici les peuples dits civilisés, par opposition aux barbares (cf. 1Co 14.11n) ; au v. 16 il s''agira des non-Juifs en général ; voir aussi 2.9s ; 3.9 ; 10.12 ; cf. 11.11-14. –  sages  : cf. 1Co 1.26-31. –  gens stupides  : autre traduction ignorants  ; même terme Ga 3.1,3 ; 1Tm 6.9 ; Tt 3.3.'
  - type: text
    content: 'Je suis débiteur envers les Grecs comme envers les barbares, envers les sages comme envers les gens stupides : '
  '15':
  - type: note
    content: V. 7.
  - type: text
    content: de là mon ardent désir de vous annoncer la bonne nouvelle, à vous aussi qui êtes à Rome.
  - type: heading
    content: La puissance de la bonne nouvelle
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'je n''ai pas honte Ps 119.46 ; Lc 9.26. –  bonne nouvelle v. 1,9. –  puissance de Dieu 1Co 1.18,24 ; 2Co 12.9. –  salut 5.9s ; 10.9 ; 1Th 5.9s. –  de quiconque croit (ou a foi ) 10.14-16. –  du Juif d''abord…  : cf. 2.9s ; 3.2n  ; 9–11 ; voir aussi Ac 3.26+ ; 13.46 ; 18.6+. –  Grec v. 14n.'
  - type: text
    content: 'Car je n''ai pas honte de la bonne nouvelle ; elle est en effet puissance de Dieu pour le salut de quiconque croit, du Juif d''abord, mais aussi du Grec. '
  '17':
  - type: note
    content: 'justice de Dieu 3.5,21-26 ; 4.3n,25 ; 10.3 ; Ps 71.2,15-19,24 ; Dn 9.16 ; 2Co 5.21 ; Ga 3.11 ; Ph 3.9 ; cf. Mt 3.15n. –  se révèle  : cf. v. 18 ; 8.18s ; 16.25+ ; Es 51.5-8 ; 56.1 ; Ps 98.2 ; Ap 1.1n  ; Hymnes (Qumrân) 14.15s : « Car toi, tu es juste… et ta justice sera révélée aux yeux de toutes tes œuvres. » –  en vertu de la foi et pour la foi  : litt. de (la) foi à (la) foi ou de foi en foi  ; tournures comparables en 2Co 2.16 ; 3.18 ; 4.17 ; il s''agit probablement ici d''une simple formule d''insistance, qu''on pourrait aussi traduire par la foi et seulement par la foi  ; mais le mot rendu par foi a quelquefois le sens de fidélité, ce qui a ouvert la porte à d''autres interprétations. –  Celui qui est juste… Ha 2.4n  ; cf. Ga 3.11n  ; Hé 10.38n  ; on peut aussi comprendre le juste vivra par la foi.'
  - type: text
    content: 'Car en elle la justice de Dieu se révèle, en vertu de la foi et pour la foi, ainsi qu''il est écrit : '
  - type: text
    content: Celui qui est juste en vertu de la foi vivra
  - type: text
    content: .
  - type: heading
    content: La vérité captive
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'colère 4.15 ; 5.9 ; Mt 3.7+ ; 1Th 1.10 ; 2.16 ; cf. Mi 7.9 ; So 3.1-10. –  se révèle  : cf. v. 17. –  impiété / injustice  : cf. Ps 73 ; Pr 11.6. –  tiennent… captive  : même verbe 7.6 ; 2Th 2.6s ( retenir  ; voir aussi l''opposition vérité / injustice au v. 12) ; autre traduction qui essaient d''étouffer la vérité par leur injustice.'
  - type: text
    content: 'La colère de Dieu, en effet, se révèle depuis le ciel contre toute l''impiété et l''injustice des gens qui tiennent la vérité captive dans l''injustice ; '
  '19':
  - type: note
    content: 'Cf. Ac 14.15-17 ; 17.24-28 ; Sagesse 13.1 : « Vains sont tous ceux-là, des hommes par nature, chez qui l''ignorance de Dieu s''est installée : à partir des biens visibles, ils n''ont pas été capables de connaître Celui qui est. » 2 Baruch 54.18 : « Ses œuvres, en effet, ne vous ont pas instruits et l''éternel ouvrage de sa création ne vous a pas convaincus. » –  parmi eux  : autre traduction en eux.'
  - type: text
    content: 'car ce qu''on peut connaître de Dieu est manifeste parmi eux : c''est Dieu qui, pour eux, l''a rendu manifeste. '
  '2':
  - type: note
    content: 'Cf. 16.25s ; Lc 1.70 ; Tt 1.2 ; voir aussi Es 52.7 ; 61.1. –  cette bonne nouvelle  : sous-entendu dans le texte. –  l''avait promise  : le verbe grec (litt. promettre à l''avance, même verbe 2Co 9.5) est apparenté à celui qui est traduit par bonne nouvelle au v. 1. – Voir prophètes. –  les Ecritures saintes  : autre traduction des Ecritures sacrées  ; cf. 1Co 15.3s ; voir aussi Ac 8.32+.'
  - type: text
    content: '– cette bonne nouvelle, Dieu l''avait promise par ses prophètes dans les Ecritures saintes ; '
  '20':
  - type: note
    content: 'ce qui chez lui est invisible  : cf. Col 1.15 ; 1Tm 1.17. –  par (ou dans) ses ouvrages  : cf. Es 40.26ss ; Ps 8.4 ; 19.2 ; Jb 12.7-9 ; Mt 6.26-30/ /. –  inexcusables  : cf. Jn 15.22 ; Sagesse 13.5-9 : « La grandeur et la beauté des créatures conduisent par analogie à contempler leur Créateur. Cependant ces hommes méritent un moindre blâme : peut-être ne s''égarent-ils que dans leur façon de chercher Dieu et de vouloir le trouver. Plongés dans ses œuvres, ils scrutent et ils cèdent alors à l''apparence, car il est beau le spectacle du monde ! Toutefois même eux ne sont pas excusables pour autant. S''ils sont devenus assez savants pour pouvoir conjecturer le cours éternel des choses, comment n''ont-ils pas découvert auparavant le Maître de celles-ci ? »'
  - type: text
    content: 'En effet, ce qui chez lui est invisible – sa puissance éternelle et sa divinité – se voit fort bien depuis la création du monde, quand l''intelligence le discerne par ses ouvrages. Ils sont donc inexcusables, '
  '21':
  - type: note
    content: 'ayant connu Dieu…  : cf. 4 Esdras 8.60 : « Mais eux, ses créatures, ont souillé le nom de leur créateur et se sont montrés ingrats envers celui qui leur avait pourtant préparé la vie. » –  rendu grâce  : cf. Mt 26.27n. –  ils se sont égarés…  : litt. ils sont devenus futiles (un terme apparenté est traduit par futilité en 8.20) dans leurs raisonnements  ; 14.1n  ; cf. 2R 17.15 ; Jr 2.5 ; Ps 94.11 ; Ep 4.17ss ; 1 Hénoch 99.8 (texte éthiopien) : « Ils (les idolâtres) erreront dans la stupidité de leur cœur. Leurs yeux seront aveuglés par la crainte de leur cœur. »'
  - type: text
    content: 'puisque, tout en ayant connu Dieu, ils ne l''ont pas glorifié comme Dieu et ne lui ont pas rendu grâce ; mais ils se sont égarés dans des raisonnements futiles, et leur cœur sans intelligence a été plongé dans les ténèbres. '
  '22':
  - type: note
    content: Cf. Jr 10.14 ; 1Co 1.20.
  - type: text
    content: 'Se prétendant sages, ils sont devenus fous '
  '23':
  - type: note
    content: 'ils ont changé la gloire  : cf. v. 25n  ; Ex 32 ; Jr 2.11 ; Ps 106.20. –  Dieu impérissable  : cf. 2.7 ; 8.21 ; 1Co 9.25+ ; 1Tm 1.17+. –  en (ou pour, contre) des images…  : c.-à-d. des idoles ; cf. Dt 4.15-19. –  oiseaux… reptiles  : cf. Lv 11 ; Dt 14 ; Ac 10.11ss ; Sagesse 11.15 : « A cause des pensées stupides inspirées par leur injustice, qui les égarèrent (les Egyptiens) jusqu''à leur faire rendre un culte à des reptiles sans raison et à des bêtes viles, tu leur envoyas en châtiment une multitude d''animaux sans raison. » 12.24 : « Ils avaient erré au-delà des chemins de l''égarement : ils considéraient comme des dieux les plus vils et les plus méprisables des animaux. »'
  - type: text
    content: et ils ont changé la gloire du Dieu impérissable en des images représentant l'être humain périssable, des oiseaux, des quadrupèdes et des reptiles.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu les a livrés  : cf. v. 26,28 ; Ac 7.41s ; voir aussi Jg 2.14 ; 3.28 ; Ps 106.41. –  impureté 6.19 ; Ga 5.19 ; voir pur, impur. –  par (ou dans ) les désirs , cf. 6.12 ; 7.7s ; 13.14 ; Ga 5.16,24 ; Ep 2.3 ; 4.22 ; Col 3.5 ; 1Th 4.5 ; 1Tm 6.9 ; 2Tm 2.22 ; 3.6 ; 4.3 ; Tt 2.12 ; 3.3 ; Jc 1.14s ; 1P 1.14 ; 2.11 ; 4.2s ; 2P 1.4 ; 2.18 ; 3.3 ; 1Jn 2.16s ; Jd 16,18. –  qu''entre eux ils déshonorent…  : autre traduction qu''ils déshonorent eux-mêmes leur propre corps.'
  - type: text
    content: 'C''est pourquoi Dieu les a livrés à l''impureté, par les désirs de leur cœur, de sorte qu''entre eux ils déshonorent leur propre corps, '
  '25':
  - type: note
    content: 'changé…  : autres traductions changé… en mensonge ; échangé… contre le mensonge  ; le verbe grec correspondant (aussi v. 26) est dérivé de celui qui a été traduit par changer au v. 23. –  la vérité de Dieu  : l''expression peut signifier la vérité qu''est Dieu lui-même  ; cf. Jr 10.10ss ; 16.19ss ; 51.15-19 ; 1Th 1.9. –  rendant un culte v. 9+. –  béni pour toujours 9.5 ; Ps 41.14 ; 2Co 11.31.'
  - type: text
    content: 'eux qui ont changé la vérité de Dieu pour le mensonge et qui ont adoré la création, en lui rendant un culte, au lieu du Créateur, qui est béni pour toujours ! '
  - type: text
    content: Amen !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'livrés (v. 24+) à des passions  : cf. Testament de Joseph 7.8 : « Si quelqu''un succombe à la passion du désir et lui est asservi (…), quoi qu''il puisse entendre de sensé sur cette passion, il l''interprète en fonction de son malin désir. » –  femmes  : litt. femelles , de même au v. 27.'
  - type: text
    content: 'C''est pour cela que Dieu les a livrés à des passions déshonorantes. Ainsi, en effet, leurs femmes ont changé les relations naturelles pour des actes contre nature ; '
  '27':
  - type: note
    content: 'hommes  : litt. mâles  ; cf. Lv 18.22 ; 20.13 ; 1Co 6.9n. –  se livrent  : voir 2.9n. –  à des actes honteux  : litt. à la honte (même terme Ap 16.15) ; autre traduction à ce qui est inconvenant (terme apparenté Rm 13.13n).'
  - type: text
    content: de même les hommes, abandonnant les relations naturelles avec la femme, se sont enflammés dans leur appétit les uns pour les autres ; ils se livrent, entre hommes, à des actes honteux et reçoivent en eux-mêmes le salaire que mérite leur égarement.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte joue sur les termes apparentés traduits par jugé bon (le même verbe est rendu par discerner en 2.18 ; 12.2 ; voir aussi 14.22n) et leur manque de jugement (litt. une intelligence [ou une pensée  ; même terme 7.23,25 ; 11.34 ; 12.2 ; 14.5] inadéquate ou désapprouvée , voire réprouvée ) ; termes apparentés en 5.4 ( fidélité éprouvée ) ; 14.18 ( apprécié ) ; 16.10 ( qui a fait ses preuves ) ; l''adjectif correspondant ici à inadéquate est traduit par disqualifié en 1Co 9.27 ; inaptes à l''épreuve en 2Tm 3.8 ; s''avérer sans valeur en Hé 6.8 ; sur cette famille de termes, qui peut évoquer avec diverses nuances un processus d''épreuve, de test ou d''examen, ou bien ses résultats, voir aussi Lc 14.19n  ; 1Co 3.13n  ; 2Co 2.9n  ; 13.5nss ; Ga 6.4 ; Ep 5.10 ; Ph 1.10n  ; 1Th 2.4n  ; 2Tm 2.15n  ; Tt 1.16 ; Hé 3.9n  ; Jc 1.3n  ; 1P 1.7 ; 1Jn 4.1. –  de reconnaître Dieu  : litt. d''avoir (ou de garder ) Dieu en connaissance  ; cf. v. 21 ; le terme grec correspondant ici à connaissance ( épignosis ) est un dérivé du mot le plus courant ( gnosis ) ; parfois employé sans nuance particulière, il peut évoquer une reconnaissance, ou bien une vraie connaissance, une pleine connaissance, c.-à-d. une connaissance exacte, précise ou intime ; on le retrouve en 3.20 ; 10.2 ; Ep 1.17n  ; Ph 1.9 ; Col 1.9n  ; 1Tm 2.4n  ; Phm 6 ; Hé 10.26 ; 2P 1.2n. –  livrés… v. 24+ ; cf. 3 Maccabées 4.16 (à propos d''un roi persécuteur) : « Son esprit était loin de la vérité et sa bouche, profanatrice, louait des dieux muets et inutiles, tout en disant des choses indignes contre le Dieu Très-Haut. »'
  - type: text
    content: 'Comme ils n''ont pas jugé bon de reconnaître Dieu, Dieu les a livrés à leur manque de jugement, de sorte qu''ils font des choses indignes ; '
  '29':
  - type: note
    content: Pour d'autres « catalogues de vices » cf. 13.13 ; Mt 15.19/ / ; Lc 18.11 ; 1Co 5.10s ; 6.9s ; 2Co 12.20 ; Ga 5.19-21 ; Ep 4.31 ; 5.3-5 ; Col 3.5,8 ; 1Tm 1.9s ; 6.4s ; 2Tm 3.2-4 ; Tt 3.3 ; 1P 4.3 ; Ap 9.21 ; 21.8 ; 22.15.
  - type: text
    content: 'ils sont remplis de toute espèce d''injustice, de méchanceté, d''avidité, de malfaisance ; pleins d''envie, de meurtre, de disputes, de ruses, de vices ; diffamateurs, '
  '3':
  - type: note
    content: 'issu  : litt. devenu, survenu, cf. Ga 4.4n. –  David Mt 1.1 ; Mc 10.47n  ; Jn 7.42 ; 2Tm 2.8 ; Ap 22.16. –  chair  : le mot grec correspondant revient plus de vingt fois dans l''épître, avec diverses nuances ; selon la chair souligne ici qu''il s''agit de l''ascendance naturelle (par opposition à selon l''Esprit, v. 4) ; cf. 2.28 ; 4.1 ; 7.5,18,25 ; chap. 8 ; 9.3,5 ; 2Co 5.16 ; Col 1.22. Epître d''Ignace d''Antioche aux Ephésiens 18.2 : « Car notre Dieu, Jésus-Christ, a été porté dans le sein de Marie, selon l''économie divine, né de la race de David et de l''Esprit-Saint. Il est né, et a été baptisé pour purifier l''eau par sa passion. » Aux Tralliens 9.1s : « Soyez donc sourds quand on vous parle d''autre chose que de Jésus-Christ, de la race de David, né de Marie, qui est véritablement né, qui a mangé et qui a bu, qui a été véritablement persécuté sous Ponce Pilate, qui a été véritablement crucifié, et est mort, aux regards du ciel, de la terre et des enfers, et qui est aussi véritablement ressuscité d''entre les morts. »'
  - type: text
    content: 'elle concerne son Fils, issu de la descendance de David selon la chair, '
  '30':
  - type: note
    content: 'ennemis de Dieu  : litt. haïssant Dieu, cf. Tt 3.3n. –  insolents ou violents, 1Tm 1.13n.'
  - type: text
    content: 'médisants, ennemis de Dieu, insolents, orgueilleux, fanfarons, ingénieux pour le mal, rebelles envers leurs parents, '
  '31':
  - type: note
    content: Après insensibles certains mss ajoutent implacables, comme en 2Tm 3.3.
  - type: text
    content: 'sans intelligence, sans loyauté, insensibles, sans compassion. '
  '32':
  - type: note
    content: 'ils connaissent le juste décret (voir 5.18n) : cf. 2.14ss ; 13.4. –  ils approuvent  : cf. Lc 11.48 ; Ac 8.1 ; 22.20 ; 2Th 2.12.'
  - type: text
    content: Et bien qu'ils connaissent le juste décret de Dieu selon lequel ceux qui pratiquent de telles choses méritent la mort, non seulement ils les font eux-mêmes, mais encore ils approuvent ceux qui les pratiquent.
  '4':
  - type: note
    content: 'institué  : un verbe apparenté est traduit par destiner d''avance en 8.29s ; cf. Ac 2.23n. –  Fils de Dieu Ps 2.7 ; Mt 14.33+. –  Esprit de sainteté  : sémitisme équivalent à Esprit saint  ; c''est une formule légèrement différente qui est habituellement traduite par Esprit saint dans le N.T. ; cf. Es 63.10n  ; Ps 51.13n. –  du fait de  : autre traduction depuis. –  sa résurrection ou son relèvement  ; cf. 6.5 ; 15.12n  ; Ac 2.24n  ; 13.33 ; Ph 3.10 ; autre terme grec en 4.24ns ; cf. 1Co 15.12n  ; Ep 1.20-23 ; 1P 1.21 ; voir aussi Ph 2.9 ; 1Tm 3.16.'
  - type: text
    content: 'institué Fils de Dieu avec puissance, selon l''Esprit de sainteté, du fait de sa résurrection d''entre les morts, Jésus-Christ, notre Seigneur ; '
  '5':
  - type: note
    content: 'la grâce et l''apostolat  : autre traduction la grâce de l''apostolat, c.-à-d. la grâce d''être apôtre (ou envoyé)  ; cf. 12.3,6 ; 15.15 ; 1Co 3.10 ; Ga 2.8s ; Ep 3.2,7s ; Col 1.25. –  afin de susciter  : litt. pour, en vue de. – Voir nom. –  l''obéissance (le terme grec est apparenté au verbe traduit par entendre ou écouter) de la foi… ou une obéissance de foi  : cf. 6.15-20 ; 10.9-18 ; 15.18 ; 16.26 ; Ac 6.7 ; 2Co 10.5s ; Ga 3.2 ; 2Th 1.8 ; Hé 5.8s ; 11.8 ; 1P 1.22. –  dans toutes les nations ou chez tous les non-Juifs  ; cf. v. 13 ; 4.18 ; 11.25 ; 15.9nss ; 16.26 ; voir Mt 4.15n  ; Ac 10.45n.'
  - type: text
    content: 'c''est par lui que nous avons reçu la grâce et l''apostolat afin de susciter, pour son nom, l''obéissance de la foi dans toutes les nations, '
  '6':
  - type: note
    content: 'appel  : cf. v. 1n  ; 8.28 ; 9.24 ; 1Co 1.9.'
  - type: text
    content: 'nations dont vous aussi vous faites partie, vous qui avez reçu l''appel de Jésus-Christ '
  '7':
  - type: note
    content: 'Rome Ac 19.21 ; 23.11 ; 28.14-16 ; 2Tm 1.17. –  et saints…  : litt. appelés saints ou saints appelés  ; le terme saints (on pourrait aussi traduire consacrés) s''applique souvent, dans le N.T., à tous les membres des communautés chrétiennes ; cf. v. 1n  ; 6.19,22 ; 12.13 ; 15.25 ; 16.2 ; Ex 19.5s ; Dn 7.18 ; Ac 9.13 ; 1Co 1.2 ; Col 1.12,26 ; Hé 6.10 ; 1P 1.16 ; 2.9s. –  Grâce et paix…  : cf. 1Co 1.3 ; 2Co 1.2 ; Ga 1.3 ; Ep 1.2 ; Ph 1.2 ; Col 1.2 ; 1Th 1.1 ; 2Th 1.2 ; Tt 1.4 ; Phm 3 ; 1P 1.2 ; Jd 2 ; voir aussi Dn 6.26.'
  - type: text
    content: '– à tous ceux qui, à Rome, sont bien-aimés de Dieu et saints par appel : Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !'
  - type: heading
    content: Paul désire aller voir les chrétiens de Rome
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 1.4+. –  on parle…  : litt. votre foi est annoncée  ; autre traduction votre foi est renommée 16.19 ; 1Th 1.8.'
  - type: text
    content: 'Je rends d''abord grâce à mon Dieu pour vous tous, par Jésus-Christ, parce qu''on parle de votre foi dans le monde entier. '
  '9':
  - type: note
    content: 'à qui je rends un culte  : cf. v. 25 ; 9.4 ; 12.1 ; Lc 2.37n  ; voir aussi 15.16 ; Dt 11.13 ; Ph 3.3 ; 2Tm 1.3 ; Hé 9.14 ; 12.28. –  en mon esprit  : autre traduction par l''Esprit qui est en moi  ; cf. 8.16 ; 12.11 ; Jn 4.23s ; Ph 3.3. –  par (ou dans) la bonne nouvelle de son Fils  ; cf. v. 1n,4. –  m''est témoin 2Co 1.23 ; Ph 1.8 ; 1Th 2.5 ; cf. 1S 12.5s. –  je fais continuellement mention de vous Ep 1.16 ; 1Th 1.2 ; 2Tm 1.3.'
  - type: text
    content: 'Dieu, à qui je rends un culte en mon esprit, par la bonne nouvelle de son Fils, m''est témoin que je fais continuellement mention de vous ; '
