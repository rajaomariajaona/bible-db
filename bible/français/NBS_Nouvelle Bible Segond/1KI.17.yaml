document_id: 1KI.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elie au bord du Kerith
  - type: text
    content: ' '
  - type: note
    content: 'Elie  : hébreu ’Eliyahou, YHWH est mon Dieu  ; LXX ajoute le prophète . –  le Tishbite 21.17,28 ; 2R 1.3,8 ; 9.36 ; Elie était peut-être originaire de Tishbé, au nord du Galaad (à l''est du Jourdain) ; Tobit 1.2 mentionne une autre Tishbé dans la région de Nephtali, en Galilée. –  l''un des habitants de Galaad  : le terme traduit par habitants désigne habituellement des résidents temporaires étrangers (Gn 23.4 ; Ex 12.45 ; Lv 22.10+) ; certains le comprennent au sens de colons  ; d''autres modifient le texte hébreu traditionnel, d''après LXX, pour lire de Tishbé, au Galaad . –  Par la vie du Seigneur 1.29n  ; 1S 14.39n. –  au service duquel je me tiens  : litt. devant qui je me tiens  ; cf. 10.8n. –  ces années-ci  : cf. 18.1. –  ni rosée ni pluie  : cf. 2S 1.21 ; Lc 4.25 ; Jc 5.17 ; voir aussi Dt 28.22 ; 1R 8.35 ; Jr 14.1-7 ; Am 4.7 ; Ag 1.11 ; Za 14.17 ; Daniel grec 3.64,68 : « Toute pluie et rosée, bénissez le Seigneur… Rosées et giboulées, bénissez le Seigneur ; célébrez-le et exaltez-le à jamais ! »'
  - type: text
    content: 'Elie, le Tishbite, l''un des habitants de Galaad, dit à Achab : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, au service duquel je me tiens, il n''y aura ces années-ci ni rosée ni pluie, sinon à ma parole ! '
  '10':
  - type: text
    content: 'Il s''en alla à Sarepta. Comme il arrivait à l''entrée de la ville, il y avait là une veuve qui ramassait du bois. Il l''appela et lui dit : Va me chercher un peu d''eau dans un récipient, je te prie, pour que je boive. '
  '11':
  - type: text
    content: 'Elle alla en chercher. Il l''appela de nouveau et lui dit : Va me chercher, je te prie, un morceau de pain dans ta main. '
  '12':
  - type: note
    content: 'Par la vie… 1.29n  ; voir aussi 10.9n. –  je n''ai rien de cuit  : traduction incertaine ; autre possibilité je n''ai pas de galette. –  préparer  : litt. faire, de même au v. 13.'
  - type: text
    content: 'Elle répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, je n''ai rien de cuit, je n''ai qu''une poignée de farine dans un pot et un peu d''huile dans une cruche. Je ramasse deux morceaux de bois, puis je vais rentrer préparer cela pour moi et pour mon fils ; nous mangerons, après quoi nous mourrons. '
  '13':
  - type: note
    content: 'N''aie pas peur  : cf. Gn 15.1 ; 26.24 ; 46.3 ; Jos 8.1 ; Jg 6.23 ; Es 7.4 ; Jr 1.8 ; Lc 1.30 ; 2.10 etc. –  prépare-moi v. 12n.'
  - type: text
    content: 'Elie lui dit : N''aie pas peur, rentre, fais comme tu l''as dit. Seulement, prépare-moi d''abord avec cela une petite galette et tu me l''apporteras ; tu en feras ensuite pour toi et pour ton fils. '
  '14':
  - type: note
    content: 'sur la terre  : litt. sur la face du sol  ; cf. Gn 2.5n.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Le pot de farine ne s''épuisera pas, et la cruche d''huile ne se videra pas, jusqu''au jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' enverra la pluie sur la terre. '
  '15':
  - type: note
    content: 'Cf. 2R 4.1-7. –  pendant des jours  : absent de LXX. –  sa maison  : LXX ses enfants.'
  - type: text
    content: 'Elle alla faire selon la parole d''Elie et pendant des jours elle eut de quoi manger, elle et sa maison, ainsi que lui. '
  '16':
  - type: note
    content: 'Le pot de farine… selon la parole…  : cf. v. 14.'
  - type: text
    content: 'Le pot de farine ne s''épuisa pas, et la cruche d''huile ne se vida pas, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite par l''intermédiaire d''Elie.'
  - type: heading
    content: Elie rend la vie au fils de la veuve
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le fils de la femme… tomba malade…  : cf. 2R 4.18-37.'
  - type: text
    content: 'Après cela, le fils de la femme, maîtresse de la maison, tomba malade, et sa maladie fut si violente qu''il ne resta plus en lui de respiration. '
  '18':
  - type: note
    content: 'Pourquoi te mêles-tu de mes affaires  : litt. quoi à moi et à toi  ; même expression hébraïque en Jg 11.12 ; 2R 3.13 ; 2Ch 35.21 ; voir aussi 2S 16.10 ; 19.23 (à moi et à vous) ; Jn 2.4. –  homme de Dieu ou homme des dieux v. 24 ; cf. 12.22 ; 2R 1.9ss ; 4.7,9,16,21s,25,27 ; 6.9,15 ; 7.2 ; voir aussi Dt 33.1n  ; Jos 14.6 ; Jg 13.6,8 ; 1S 9.7+s ; Jr 35.4 ; Ps 90.1 ; Esd 3.2 ; Né 12.24,36 etc. –  faute  : voir péché.'
  - type: text
    content: 'Elle dit alors à Elie : Pourquoi te mêles-tu de mes affaires, homme de Dieu ? Es-tu venu chez moi pour évoquer ma faute et pour faire mourir mon fils ? '
  '19':
  - type: note
    content: 'de ses bras  : litt. de son sein  ; cf. 3.20 ; Gn 16.5n. –  la chambre à l''étage  : le même terme est simplement traduit par chambre au v. 23 ; voir Jg 3.20n.'
  - type: text
    content: 'Il lui répondit : Donne-moi ton fils. Il le prit de ses bras, le monta dans la chambre à l''étage, où il habitait, et le coucha sur son lit. '
  '2':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui parvint : '
  '20':
  - type: note
    content: 'dont je suis l''hôte  : le terme hébreu utilisé fait allusion au séjour de l''immigré dans un lieu étranger.'
  - type: text
    content: 'Puis il invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, causerais-tu du mal à cette veuve dont je suis l''hôte, en faisant mourir son fils ? '
  '21':
  - type: note
    content: 'Il s''étendit trois fois de tout son long  : litt. il se mesura trois fois. –  le souffle  : hébreu néphesh, de même au v. 22 ; cf. Gn 2.7n. Cf. aussi Mt 6.25 ; Lc 12.22s.'
  - type: text
    content: 'Il s''étendit trois fois de tout son long sur l''enfant, invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en disant : '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, je t''en prie, que le souffle de cet enfant revienne en lui ! '
  '22':
  - type: note
    content: le souffle v. 21n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entendit Elie : le souffle de l''enfant revint en lui, et il reprit vie. '
  '23':
  - type: text
    content: 'Elie prit l''enfant, le descendit de la chambre dans la maison et le donna à sa mère. Elie dit : Regarde, ton fils est vivant. '
  '24':
  - type: note
    content: 'Cf. 10.9n. –  la parole du Seigneur …  : autre traduction la parole que le Seigneur a prononcée par ton entremise était digne de foi  ; le terme traduit par vérité est souvent rendu par loyauté.'
  - type: text
    content: 'La femme dit à Elie : Maintenant je sais que tu es un homme de Dieu, et que la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dans ta bouche est vérité.'
  '3':
  - type: note
    content: 'vers l''est  : absent de LXX. –  cache-toi  : cf. 18.13 ; 19.10. –  l''oued Kerith  : on pense généralement que cet oued, dont le nom ne s''est pas conservé, est un affluent de la rive gauche du Jourdain.'
  - type: text
    content: 'Repars d''ici vers l''est et cache-toi près de l''oued Kerith, qui est en face du Jourdain. '
  '4':
  - type: note
    content: 'aux corbeaux  : certains modifient le texte hébreu traditionnel pour lire aux Arabes (cf. 17.8s ; Gn 42–47 ; 1S 27.1 ; Rt 1.1). –  de pourvoir à tous tes besoins 4.7+.'
  - type: text
    content: 'Tu boiras de l''eau de l''oued ; j''ai ordonné aux corbeaux de pourvoir à tous tes besoins là-bas. '
  '5':
  - type: text
    content: 'Il partit et agit selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il alla s''installer près de l''oued Kerith, qui est en face du Jourdain. '
  '6':
  - type: note
    content: 'du pain et de la viande le matin, du pain et de la viande le soir  : LXX du pain le matin et de la viande le soir. Cf. Ex 16.8,12. –  il buvait à l''oued  : LXX il buvait l''eau de l''oued.'
  - type: text
    content: 'Les corbeaux lui apportaient du pain et de la viande le matin, du pain et de la viande le soir, et il buvait à l''oued. '
  '7':
  - type: note
    content: 'après quelque temps  : litt. à la fin de jours, même expression hébraïque en Gn 4.3 ; cf. 2S 14.26n  ; Jr 13.6n.'
  - type: text
    content: Mais après quelque temps, l'oued fut à sec, car il n'y avait pas eu de pluie dans le pays.
  - type: heading
    content: Elie chez la veuve de Sarepta
  '8':
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui parvint : '
  '9':
  - type: note
    content: 'Va  : litt. lève-toi, va  ; de même au v. 10. –  Sarepta  : hébreu Tsarphata, citée en Ab 20 ; actuellement Sarafand, sur la côte méditerranéenne, à 15 km au sud de Sidon. YHWH nourrira Elie dans la patrie même de Baal, la divinité climatique, qui ne pourvoit plus aux besoins des siens ; cf. Lc 4.25s. –  de pourvoir à tous tes besoins 4.7+.'
  - type: text
    content: 'Va à Sarepta qui appartient à Sidon et restes-y. Là-bas, j''ai ordonné à une veuve de pourvoir à tous tes besoins. '
