        - type: text
          text: le prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Tishbite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.17,28 ; 2R 1.3,8 ; 9.36 ; Elie était peut-être originaire de Tishbé, au nord du Galaad (à l''est du Jourdain) ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2 mentionne une autre Tishbé dans la région de Nephtali, en Galilée. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'un des habitants de Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'habitants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne habituellement des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'résidents temporaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étrangers (Gn 23.4 ; Ex 12.45 ; Lv 22.10+) ; certains le comprennent au sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: colons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; d''autres modifient le texte hébreu traditionnel, d''après LXX, pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Tishbé, au Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 14.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au service duquel je me tiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant qui je me tiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 10.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces années-ci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 18.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni rosée ni pluie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 1.21 ; Lc 4.25 ; Jc 5.17 ; voir aussi Dt 28.22 ; 1R 8.35 ; Jr 14.1-7 ; Am 4.7 ; Ag 1.11 ; Za 14.17 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.64,68 : « Toute pluie et rosée, bénissez le Seigneur… Rosées et giboulées, bénissez le Seigneur ; célébrez-le et exaltez-le à jamais ! »'
      marker-yv: yv-n
    - type: text
      text: 'Elie, le Tishbite, l''un des habitants de Galaad, dit à Achab : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, au service duquel je me tiens, il n''y aura ces années-ci ni rosée ni pluie, sinon à ma parole ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il s''en alla à Sarepta. Comme il arrivait à l''entrée de la ville, il y avait là une veuve qui ramassait du bois. Il l''appela et lui dit : Va me chercher un peu d''eau dans un récipient, je te prie, pour que je boive. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Elle alla en chercher. Il l''appela de nouveau et lui dit : Va me chercher, je te prie, un morceau de pain dans ta main. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 10.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je n'ai rien de cuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; autre possibilité '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je n'ai pas de galette
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: préparer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 13.'
      marker-yv: yv-n
    - type: text
      text: 'Elle répondit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, je n''ai rien de cuit, je n''ai qu''une poignée de farine dans un pot et un peu d''huile dans une cruche. Je ramasse deux morceaux de bois, puis je vais rentrer préparer cela pour moi et pour mon fils ; nous mangerons, après quoi nous mourrons. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'aie pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 15.1 ; 26.24 ; 46.3 ; Jos 8.1 ; Jg 6.23 ; Es 7.4 ; Jr 1.8 ; Lc 1.30 ; 2.10 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prépare-moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elie lui dit : N''aie pas peur, rentre, fais comme tu l''as dit. Seulement, prépare-moi d''abord avec cela une petite galette et tu me l''apporteras ; tu en feras ensuite pour toi et pour ton fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la face du sol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : Le pot de farine ne s''épuisera pas, et la cruche d''huile ne se videra pas, jusqu''au jour où le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' enverra la pluie sur la terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 4.1-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pendant des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses enfants.
      marker-yv: yv-n
    - type: text
      text: 'Elle alla faire selon la parole d''Elie et pendant des jours elle eut de quoi manger, elle et sa maison, ainsi que lui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le pot de farine… selon la parole…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 14.'
      marker-yv: yv-n
    - type: text
      text: 'Le pot de farine ne s''épuisa pas, et la cruche d''huile ne se vida pas, selon la parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dite par l''intermédiaire d''Elie.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elie rend la vie au fils de la veuve
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le fils de la femme… tomba malade…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2R 4.18-37.'
      marker-yv: yv-n
    - type: text
      text: 'Après cela, le fils de la femme, maîtresse de la maison, tomba malade, et sa maladie fut si violente qu''il ne resta plus en lui de respiration. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pourquoi te mêles-tu de mes affaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quoi à moi et à toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression hébraïque en Jg 11.12 ; 2R 3.13 ; 2Ch 35.21 ; voir aussi 2S 16.10 ; 19.23 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à moi et à vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; Jn 2.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'homme de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'homme des dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 24 ; cf. 12.22 ; 2R 1.9ss ; 4.7,9,16,21s,25,27 ; 6.9,15 ; 7.2 ; voir aussi Dt 33.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 14.6 ; Jg 13.6,8 ; 1S 9.7+s ; Jr 35.4 ; Ps 90.1 ; Esd 3.2 ; Né 12.24,36 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle dit alors à Elie : Pourquoi te mêles-tu de mes affaires, homme de Dieu ? Es-tu venu chez moi pour évoquer ma faute et pour faire mourir mon fils ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ses bras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de son sein
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.20 ; Gn 16.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la chambre à l'étage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est simplement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chambre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 23 ; voir Jg 3.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il lui répondit : Donne-moi ton fils. Il le prit de ses bras, le monta dans la chambre à l''étage, où il habitait, et le coucha sur son lit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui parvint : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dont je suis l'hôte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu utilisé fait allusion au séjour de l''immigré dans un lieu étranger.'
      marker-yv: yv-n
    - type: text
      text: 'Puis il invoqua le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', en disant : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mon Dieu, causerais-tu du mal à cette veuve dont je suis l''hôte, en faisant mourir son fils ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il s'étendit trois fois de tout son long
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se mesura trois fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le souffle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: néphesh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 22 ; cf. Gn 2.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . Cf. aussi Mt 6.25 ; Lc 12.22s.
