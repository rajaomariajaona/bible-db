document_id: ACT.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Départ pour l'Italie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Texte occidental reconstitué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ainsi le gouverneur décida qu''on l''enverrait à César. Le lendemain, ayant appelé un centurion nommé Julius…, il lui a remis Paul avec d''autres prisonniers. (2) Comme nous devions naviguer vers l''Italie, nous sommes montés… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour l''Italie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.21 ; 23.11 ; 25.11s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: centurion…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 10.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la cohorte Auguste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut-être attachée spécialement au service de l''empereur, cf. 25.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il a été décidé que nous embarquerions pour l''Italie, on a remis Paul et quelques autres prisonniers à un centurion nommé Julius, de la cohorte Auguste. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Adramytte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ville de la côte d''Asie Mineure, en face de l''île de Lesbos. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aristarque '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.29+ ; certains mss ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et Secundus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 20.4.'
    marker-yv: yv-n
  - type: text
    text: 'Montés sur un bateau d''Adramytte en partance pour les côtes de l''Asie, nous avons gagné le large ; avec nous se trouvait Aristarque, un Macédonien de Thessalonique. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sidon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', port de Phénicie, cf. 11.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: humanité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'philanthropie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Tt 3.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; cf. 28.2,7,16,23,30 ; voir aussi 23.17,23ss ; 27.43 ; Lc 7.5 ; 23.47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses amis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 24.23 ; Lc 12.4+.'
    marker-yv: yv-n
  - type: text
    text: 'Le jour suivant, nous avons abordé à Sidon ; Julius, qui traitait Paul avec humanité, lui a permis d''aller chez ses amis pour bénéficier de leurs soins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'longé la côte de Chypre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par l''est, pour s''abriter des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du nord-ouest.
    marker-yv: yv-n
  - type: text
    text: 'Partis de là, nous avons longé la côte de Chypre, parce que les vents étaient contraires. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous avons débarqué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss occidentaux précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le quinzième jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Myra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (21.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), escale habituelle pour les bateaux égyptiens (v. 6).
    marker-yv: yv-n
  - type: text
    text: 'Après avoir traversé la mer qui baigne la Cilicie et la Pamphylie, nous avons débarqué à Myra, en Lycie. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'Alexandrie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', en Egypte, qui envoyait régulièrement du blé (v. 38) en tribut à Rome (cf. 28.11).'
    marker-yv: yv-n
  - type: text
    text: 'Là, le centurion a trouvé un bateau d''Alexandrie à destination de l''Italie, et il nous y a fait monter. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cnide
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cap au sud-ouest de l''Asie Mineure. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Salmoné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cap oriental de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Crète
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', laissé à tribord pour contourner l''île par le sud.'
    marker-yv: yv-n
  - type: text
    text: 'Pendant bien des jours, nous avons navigué lentement. Nous avons atteint à grand-peine les parages de Cnide, et comme le vent ne nous permettait pas d''aborder, nous avons longé la Crète, en doublant Salmoné. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beaux-Ports '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lasée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sur la côte sud de la Crète.'
    marker-yv: yv-n
  - type: text
    text: En la bordant à grand-peine, nous sommes arrivés à un lieu appelé Beaux-Ports, près de la ville de Lasée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jon 1 ; Ps 107 ; 2Co 11.25s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le jeûne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. le jour de l''Expiation ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yom Kippour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Lv 16.29), qui avait lieu en septembre ou octobre et marquait le début de la mauvaise saison, où la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'navigation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était interrompue ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'Comme beaucoup de temps s''était écoulé et que la navigation devenait dangereuse – le jeûne était déjà passé – Paul les avertissait : '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mes amis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 21,25 ; 14.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour nous-mêmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour nos vies
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 22 et par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'personnes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 27.
    marker-yv: yv-n
  - type: text
    text: 'Mes amis, je vois que la navigation ne se fera pas sans péril et sans beaucoup de dommage, non seulement pour la cargaison et pour le bateau, mais encore pour nous-mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se fiait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au timonier et au capitaine…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au capitaine et au représentant de l'armateur.
    marker-yv: yv-n
  - type: text
    text: 'Mais le centurion se fiait au timonier et au capitaine du navire plutôt qu''aux paroles de Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tourné vers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui regarde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le sud-ouest et le nord-ouest
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; les uns comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ouvert sur le sud-ouest et le nord-ouest
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', les autres '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: protégé au sud-ouest et au nord-ouest
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. La localisation précise du port de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Phénix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'varie en conséquence. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'passer l''hiver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 28.11.'
    marker-yv: yv-n
  - type: text
    text: Comme le port se prêtait mal à l'hivernage, la majorité décida de remettre la voile pour tâcher d'atteindre Phénix, un port de Crète tourné vers le sud-ouest et le nord-ouest, afin d'y passer l'hiver.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tempête
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un léger vent du sud s''était levé ; pensant être en mesure d''exécuter leur projet, ils ont levé l''ancre et se sont mis à longer de près la Crète. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 8.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: euraquilon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit, d''après l''étymologie, d''un vent de nord-est éloignant le bateau de la Crète vers le large, en direction de l''Afrique.'
    marker-yv: yv-n
  - type: text
    text: 'Mais peu après, venant de l''île, un vent de tempête appelé euraquilon s''est déchaîné. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tenir contre le vent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: remonter au vent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . A la fin du v. le texte occidental précise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en ramenant les voiles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 1Co 7.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Le bateau a été entraîné, sans pouvoir tenir contre le vent, et nous nous sommes laissé porter à la dérive. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cauda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Clauda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon les mss), aujourd''hui Gozzo ou Guzzo, à une quarantaine de kilomètres au sud de la Crète. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la chaloupe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 30ss.
    marker-yv: yv-n
  - type: text
    text: 'Tandis que nous passions au-dessous d''une petite île appelée Cauda, nous avons réussi, à grand-peine, à nous rendre maîtres de la chaloupe ; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils se sont servis
    - type: usfm
      marker: ft
