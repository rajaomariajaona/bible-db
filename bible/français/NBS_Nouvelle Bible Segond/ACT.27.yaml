document_id: ACT.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Départ pour l'Italie
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental reconstitué  : Ainsi le gouverneur décida qu''on l''enverrait à César. Le lendemain, ayant appelé un centurion nommé Julius…, il lui a remis Paul avec d''autres prisonniers. (2) Comme nous devions naviguer vers l''Italie, nous sommes montés… –  nous 16.10n. –  pour l''Italie 19.21 ; 23.11 ; 25.11s. –  centurion…  : cf. 10.1n. –  la cohorte Auguste , peut-être attachée spécialement au service de l''empereur, cf. 25.21n.'
  - type: text
    content: 'Lorsqu''il a été décidé que nous embarquerions pour l''Italie, on a remis Paul et quelques autres prisonniers à un centurion nommé Julius, de la cohorte Auguste. '
  '10':
  - type: note
    content: Mes amis v. 21,25 ; 14.15n. –  pour nous-mêmes ou pour nos vies  ; le même mot est traduit par vie au v. 22 et par personnes au v. 27.
  - type: text
    content: 'Mes amis, je vois que la navigation ne se fera pas sans péril et sans beaucoup de dommage, non seulement pour la cargaison et pour le bateau, mais encore pour nous-mêmes. '
  '11':
  - type: note
    content: 'se fiait 23.21n. –  au timonier et au capitaine…  : autre traduction au capitaine et au représentant de l''armateur.'
  - type: text
    content: 'Mais le centurion se fiait au timonier et au capitaine du navire plutôt qu''aux paroles de Paul. '
  '12':
  - type: note
    content: 'tourné vers (litt. qui regarde) le sud-ouest et le nord-ouest  : traduction incertaine ; les uns comprennent ouvert sur le sud-ouest et le nord-ouest, les autres protégé au sud-ouest et au nord-ouest. La localisation précise du port de Phénix varie en conséquence. –  passer l''hiver v. 9n  ; 28.11.'
  - type: text
    content: Comme le port se prêtait mal à l'hivernage, la majorité décida de remettre la voile pour tâcher d'atteindre Phénix, un port de Crète tourné vers le sud-ouest et le nord-ouest, afin d'y passer l'hiver.
  - type: heading
    content: La tempête
  '13':
  - type: text
    content: 'Un léger vent du sud s''était levé ; pensant être en mesure d''exécuter leur projet, ils ont levé l''ancre et se sont mis à longer de près la Crète. '
  '14':
  - type: note
    content: 'Cf. Lc 8.23. –  euraquilon  : il s''agit, d''après l''étymologie, d''un vent de nord-est éloignant le bateau de la Crète vers le large, en direction de l''Afrique.'
  - type: text
    content: 'Mais peu après, venant de l''île, un vent de tempête appelé euraquilon s''est déchaîné. '
  '15':
  - type: note
    content: 'tenir contre le vent ou remonter au vent. A la fin du v. le texte occidental précise  : en ramenant les voiles (cf. 1Co 7.29n).'
  - type: text
    content: 'Le bateau a été entraîné, sans pouvoir tenir contre le vent, et nous nous sommes laissé porter à la dérive. '
  '16':
  - type: note
    content: Cauda (ou Clauda, selon les mss), aujourd'hui Gozzo ou Guzzo, à une quarantaine de kilomètres au sud de la Crète. –  la chaloupe v. 30ss.
  - type: text
    content: 'Tandis que nous passions au-dessous d''une petite île appelée Cauda, nous avons réussi, à grand-peine, à nous rendre maîtres de la chaloupe ; '
  '17':
  - type: note
    content: 'ils se sont servis  : autre traduction on s''est servi (même possibilité dans la suite, voir cependant v. 19). –  ceinturer le bateau avec des câbles, pour l''empêcher de se disloquer. –  la Syrte  : golfe de la côte africaine, à l''ouest de la Cyrénaïque (actuellement en Libye), dont les hauts-fonds rendent la navigation particulièrement dangereuse. –  l''ancre flottante  : pièce de bois destinée à ralentir la course du navire ; mais la traduction est conjecturale (litt. ils ont descendu l''objet) et d''autres comprennent ils ont ramené les voiles (cf. v. 15n).'
  - type: text
    content: 'après l''avoir hissée, ils se sont servis des moyens de secours pour ceinturer le bateau et, de crainte d''échouer sur la Syrte, ils ont descendu l''ancre flottante, continuant à la dérive. '
  '18':
  - type: note
    content: 'ils se sont…  : litt. ils ont (ou on a) jeté du lest ou jeté du fret, cf. v. 38 ; Jon 1.5 ; 1 Hénoch 101.4s : « Voyez les pilotes qui naviguent sur la mer : leurs vaisseaux sont agités par les vagues et la tempête ; s''ils sont en détresse, tous ils ont peur, jettent par-dessus bord toutes leurs marchandises et leurs biens et appréhendent en eux-mêmes de voir la mer les engloutir et de périr en son sein. »'
  - type: text
    content: 'Comme nous étions fortement secoués par la tempête, ils se sont débarrassés le lendemain d''une partie de la cargaison. '
  '19':
  - type: text
    content: 'Le troisième jour, ils ont jeté de leurs propres mains les agrès du bateau. '
  '2':
  - type: note
    content: 'Adramytte  : ville de la côte d''Asie Mineure, en face de l''île de Lesbos. –  Aristarque 19.29+ ; certains mss ajoutent et Secundus, cf. 20.4.'
  - type: text
    content: 'Montés sur un bateau d''Adramytte en partance pour les côtes de l''Asie, nous avons gagné le large ; avec nous se trouvait Aristarque, un Macédonien de Thessalonique. '
  '20':
  - type: note
    content: 'plusieurs jours  : autre traduction bien des jours.'
  - type: text
    content: Ni le soleil, ni les étoiles n'avaient paru pendant plusieurs jours, et la tempête restait si forte que nous avions finalement perdu toute espérance d'être sauvés.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mes amis v. 10+ ; cf. v. 33.
  - type: text
    content: 'Ils n''avaient pas mangé depuis longtemps. Alors Paul, debout au milieu d''eux, leur a dit : Mes amis, vous auriez dû m''écouter et ne pas repartir de Crète ; vous auriez évité ce péril et ce dommage. '
  '22':
  - type: note
    content: 'prendre courage  : autre traduction vous réjouir  ; cf. v. 25,34ss ; autre terme en 23.11 ; 28.15 ; voir Jc 5.13n. –  périra  : cf. v. 10n,31.'
  - type: text
    content: 'Mais maintenant, je vous exhorte à prendre courage ; car aucun de vous ne périra, mais seulement le bateau. '
  '23':
  - type: note
    content: 'Cf. 9.10+ ; 12.7 ; 23.9. –  un ange…  : autre traduction l''ange (5.19n). –  rends un culte  : cf. Mt 15.9n. –  s''est présenté  : le même verbe est traduit par comparaître au v. 24 (cf. Rm 14.10).'
  - type: text
    content: 'En effet, un ange du Dieu auquel j''appartiens et à qui je rends un culte s''est présenté à moi cette nuit '
  '24':
  - type: note
    content: 9.15+ ; 18.9 ; 23.11 ; Mt 10.18/ /. –  César 25.8n. – Voir grâce.
  - type: text
    content: 'et m''a dit : N''aie pas peur, Paul ; il faut que tu comparaisses devant César, et Dieu t''accorde la grâce de tous ceux qui naviguent avec toi. '
  '25':
  - type: text
    content: 'Prenez donc courage, mes amis, car j''ai cette foi en Dieu qu''il en sera comme il m''a été dit. '
  '26':
  - type: note
    content: une certaine île 28.1.
  - type: text
    content: Nous devons échouer sur une certaine île.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'la quatorzième nuit v. 33. –  l''Adriatique  : le nom désignait alors toute la partie de la Méditerranée comprise entre la Grèce et l''Italie, jusqu''à la Sicile.'
  - type: text
    content: 'C''était la quatorzième nuit que nous étions ainsi ballottés sur l''Adriatique, quand les matelots, vers le milieu de la nuit, ont soupçonné l''approche d''une terre. '
  '28':
  - type: note
    content: vingt brasses, soit environ 35 m de profondeur, puis quinze brasses ou 25 m ; voir mesures, poids et monnaies.
  - type: text
    content: 'Ils ont jeté la sonde et trouvé vingt brasses ; après avoir couvert une courte distance, ils l''ont jetée à nouveau et trouvé quinze brasses. '
  '29':
  - type: text
    content: 'Craignant d''échouer sur des récifs, ils ont jeté quatre ancres de la poupe, en souhaitant que le jour se lève. '
  '3':
  - type: note
    content: 'Sidon, port de Phénicie, cf. 11.19+. –  humanité  : le terme grec a donné notre mot philanthropie (Tt 3.4n) ; cf. 28.2,7,16,23,30 ; voir aussi 23.17,23ss ; 27.43 ; Lc 7.5 ; 23.47. –  ses amis  : cf. 24.23 ; Lc 12.4+.'
  - type: text
    content: 'Le jour suivant, nous avons abordé à Sidon ; Julius, qui traitait Paul avec humanité, lui a permis d''aller chez ses amis pour bénéficier de leurs soins. '
  '30':
  - type: note
    content: la chaloupe v. 16.
  - type: text
    content: 'Mais, comme les matelots cherchaient à s''enfuir du bateau et faisaient descendre la chaloupe à la mer sous prétexte d''aller, depuis la proue, fixer plus loin des ancres, '
  '31':
  - type: note
    content: Cf. v. 22.
  - type: text
    content: 'Paul a dit au centurion et aux soldats : Si ces hommes ne demeurent pas dans le bateau, vous ne pouvez pas être sauvés ! '
  '32':
  - type: text
    content: Alors les soldats ont coupé les cordes de la chaloupe et l'ont laissée tomber.
  '33':
  - type: text
    content: ' '
  - type: note
    content: V. 21,27. –  prendre de la nourriture 2.46n.
  - type: text
    content: 'En attendant que le jour se lève, Paul a invité tout le monde à prendre de la nourriture, en disant : C''est aujourd''hui le quatorzième jour que vous êtes dans l''attente et que vous restez à jeun, sans rien prendre. '
  '34':
  - type: note
    content: Mt 10.30+ ; Lc 21.18.
  - type: text
    content: 'Je vous invite donc à prendre de la nourriture, car il y va de votre salut : aucun d''entre vous ne perdra un seul cheveu de sa tête ! '
  '35':
  - type: note
    content: Cf. 2.42+ ; 20.7 ; Lc 22.19/ / ; Jn 6.11/ / ; 1Co 11.23s ; certains mss occidentaux ajoutent nous en ayant donné à nous aussi.
  - type: text
    content: 'Après avoir dit cela, il a pris du pain, il a rendu grâce à Dieu devant tous, puis il l''a rompu et s''est mis à manger. '
  '36':
  - type: note
    content: reprenant courage v. 22+ ; cf. 9.19.
  - type: text
    content: 'Alors, reprenant courage, tous ont pris de la nourriture. '
  '37':
  - type: note
    content: 'deux cent soixante-seize  : chiffre triangulaire (somme des chiffres de 1 à 23) ; cf. Jn 21.11n  ; Ap 13.18n. Mais le chiffre varie selon les mss grecs et les autres témoins du texte  : 70 (texte occidental ?), 76, 176, 216, 270, 275, 876… 276 reste le mieux attesté. –  personnes  : v. 10n  ; 2.41n.'
  - type: text
    content: 'Nous étions, dans le bateau, deux cent soixante-seize personnes en tout. '
  '38':
  - type: note
    content: Cf. v. 18+.
  - type: text
    content: Quand tous ont eu assez mangé, ils ont allégé le bateau en jetant le blé à la mer.
  - type: heading
    content: Le naufrage
  '39':
  - type: text
    content: 'Lorsque le jour s''est levé, ils n''ont pas reconnu la terre, mais ils ont aperçu un golfe et ils ont décidé de pousser le bateau, si possible, jusqu''au rivage. '
  '4':
  - type: note
    content: longé la côte de Chypre par l'est, pour s'abriter des vents du nord-ouest.
  - type: text
    content: 'Partis de là, nous avons longé la côte de Chypre, parce que les vents étaient contraires. '
  '40':
  - type: text
    content: 'Ils ont détaché les ancres pour les laisser aller à la mer et ils ont relâché en même temps les attaches des gouvernails ; puis ils ont mis au vent la voile d''artimon et se sont dirigés vers le rivage. '
  '41':
  - type: note
    content: 'Cf. v. 22. –  des vagues  : cette précision est absente de certains mss.'
  - type: text
    content: 'Mais ils sont tombés sur un banc de sable entre deux courants, et ils y ont échoué le navire. La proue, bien engagée, demeurait immobile, tandis que la poupe se disloquait sous la violence des vagues. '
  '42':
  - type: note
    content: Cf. 12.19 ; 16.27.
  - type: text
    content: 'Les soldats avaient décidé de tuer les prisonniers, de peur que l''un d''eux ne s''échappe à la nage. '
  '43':
  - type: note
    content: 'V. 3+. –  sauver  : une autre forme du même verbe est traduite par sains et saufs au v. 44 ; on le retrouve en 23.24 ; 28.1,4 ; voir Mt 14.36n  ; Ac 7.3.'
  - type: text
    content: 'Mais le centurion, qui était décidé à sauver Paul, les a empêchés de mettre leur décision à exécution. Il a donné l''ordre à ceux qui savaient nager de se jeter les premiers à l''eau pour gagner la terre. '
  '44':
  - type: note
    content: 'Cf. v. 22-25 ; 28.1 ; 2Co 11.26. –  sur des débris…  : autre traduction, moins probable, soutenus par des membres de l''équipage.'
  - type: text
    content: Les autres les rejoindraient sur des planches ou sur des débris du bateau. Ainsi tous sont parvenus à terre sains et saufs.
  '5':
  - type: note
    content: 'nous avons débarqué  : certains mss occidentaux précisent le quinzième jour. –  Myra (21.1n), escale habituelle pour les bateaux égyptiens (v. 6).'
  - type: text
    content: 'Après avoir traversé la mer qui baigne la Cilicie et la Pamphylie, nous avons débarqué à Myra, en Lycie. '
  '6':
  - type: note
    content: d'Alexandrie, en Egypte, qui envoyait régulièrement du blé (v. 38) en tribut à Rome (cf. 28.11).
  - type: text
    content: 'Là, le centurion a trouvé un bateau d''Alexandrie à destination de l''Italie, et il nous y a fait monter. '
  '7':
  - type: note
    content: 'Cnide  : cap au sud-ouest de l''Asie Mineure. –  Salmoné  : cap oriental de la Crète, laissé à tribord pour contourner l''île par le sud.'
  - type: text
    content: 'Pendant bien des jours, nous avons navigué lentement. Nous avons atteint à grand-peine les parages de Cnide, et comme le vent ne nous permettait pas d''aborder, nous avons longé la Crète, en doublant Salmoné. '
  '8':
  - type: note
    content: Beaux-Ports et Lasée, sur la côte sud de la Crète.
  - type: text
    content: En la bordant à grand-peine, nous sommes arrivés à un lieu appelé Beaux-Ports, près de la ville de Lasée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jon 1 ; Ps 107 ; 2Co 11.25s. –  le jeûne , c.-à-d. le jour de l'Expiation ( Yom Kippour , cf. Lv 16.29), qui avait lieu en septembre ou octobre et marquait le début de la mauvaise saison, où la navigation était interrompue ; voir calendrier et fêtes.
  - type: text
    content: 'Comme beaucoup de temps s''était écoulé et que la navigation devenait dangereuse – le jeûne était déjà passé – Paul les avertissait : '
