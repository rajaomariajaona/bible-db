    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on s''est servi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même possibilité dans la suite, voir cependant v. 19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceinturer le bateau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'avec des câbles, pour l''empêcher de se disloquer. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Syrte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : golfe de la côte africaine, à l''ouest de la Cyrénaïque (actuellement en Libye), dont les hauts-fonds rendent la navigation particulièrement dangereuse. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'ancre flottante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pièce de bois destinée à ralentir la course du navire ; mais la traduction est conjecturale (litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils ont descendu l'objet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') et d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils ont ramené les voiles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'après l''avoir hissée, ils se sont servis des moyens de secours pour ceinturer le bateau et, de crainte d''échouer sur la Syrte, ils ont descendu l''ancre flottante, continuant à la dérive. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils se sont…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils ont '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on a
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jeté du lest '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jeté du fret
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 38 ; Jon 1.5 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Hénoch
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '101.4s : « Voyez les pilotes qui naviguent sur la mer : leurs vaisseaux sont agités par les vagues et la tempête ; s''ils sont en détresse, tous ils ont peur, jettent par-dessus bord toutes leurs marchandises et leurs biens et appréhendent en eux-mêmes de voir la mer les engloutir et de périr en son sein. »'
    marker-yv: yv-n
  - type: text
    text: 'Comme nous étions fortement secoués par la tempête, ils se sont débarrassés le lendemain d''une partie de la cargaison. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le troisième jour, ils ont jeté de leurs propres mains les agrès du bateau. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plusieurs jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bien des jours.
    marker-yv: yv-n
  - type: text
    text: Ni le soleil, ni les étoiles n'avaient paru pendant plusieurs jours, et la tempête restait si forte que nous avions finalement perdu toute espérance d'être sauvés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mes amis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10+ ; cf. v. 33.
    marker-yv: yv-n
  - type: text
    text: 'Ils n''avaient pas mangé depuis longtemps. Alors Paul, debout au milieu d''eux, leur a dit : Mes amis, vous auriez dû m''écouter et ne pas repartir de Crète ; vous auriez évité ce péril et ce dommage. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prendre courage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous réjouir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 25,34ss ; autre terme en 23.11 ; 28.15 ; voir Jc 5.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: périra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',31.'
    marker-yv: yv-n
  - type: text
    text: 'Mais maintenant, je vous exhorte à prendre courage ; car aucun de vous ne périra, mais seulement le bateau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 9.10+ ; 12.7 ; 23.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''ange '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (5.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rends un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 15.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'est présenté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comparaître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 24 (cf. Rm 14.10).
    marker-yv: yv-n
  - type: text
    text: 'En effet, un ange du Dieu auquel j''appartiens et à qui je rends un culte s''est présenté à moi cette nuit '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.15+ ; 18.9 ; 23.11 ; Mt 10.18/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'César '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et m''a dit : N''aie pas peur, Paul ; il faut que tu comparaisses devant César, et Dieu t''accorde la grâce de tous ceux qui naviguent avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Prenez donc courage, mes amis, car j''ai cette foi en Dieu qu''il en sera comme il m''a été dit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une certaine île '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 28.1.
    marker-yv: yv-n
  - type: text
    text: Nous devons échouer sur une certaine île.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la quatorzième nuit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Adriatique
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le nom désignait alors toute la partie de la Méditerranée comprise entre la Grèce et l''Italie, jusqu''à la Sicile.'
    marker-yv: yv-n
  - type: text
    text: 'C''était la quatorzième nuit que nous étions ainsi ballottés sur l''Adriatique, quand les matelots, vers le milieu de la nuit, ont soupçonné l''approche d''une terre. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt brasses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit environ 35 m de profondeur, puis '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quinze brasses '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou 25 m ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'Ils ont jeté la sonde et trouvé vingt brasses ; après avoir couvert une courte distance, ils l''ont jetée à nouveau et trouvé quinze brasses. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Craignant d''échouer sur des récifs, ils ont jeté quatre ancres de la poupe, en souhaitant que le jour se lève. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la chaloupe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 16.
    marker-yv: yv-n
  - type: text
    text: 'Mais, comme les matelots cherchaient à s''enfuir du bateau et faisaient descendre la chaloupe à la mer sous prétexte d''aller, depuis la proue, fixer plus loin des ancres, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 22.
    marker-yv: yv-n
  - type: text
    text: 'Paul a dit au centurion et aux soldats : Si ces hommes ne demeurent pas dans le bateau, vous ne pouvez pas être sauvés ! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Alors les soldats ont coupé les cordes de la chaloupe et l'ont laissée tomber.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 21,27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prendre de la nourriture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.46'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En attendant que le jour se lève, Paul a invité tout le monde à prendre de la nourriture, en disant : C''est aujourd''hui le quatorzième jour que vous êtes dans l''attente et que vous restez à jeun, sans rien prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 10.30+ ; Lc 21.18.
    marker-yv: yv-n
  - type: text
    text: 'Je vous invite donc à prendre de la nourriture, car il y va de votre salut : aucun d''entre vous ne perdra un seul cheveu de sa tête ! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2.42+ ; 20.7 ; Lc 22.19/ / ; Jn 6.11/ / ; 1Co 11.23s ; certains mss occidentaux ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous en ayant donné à nous aussi.
    marker-yv: yv-n
  - type: text
    text: 'Après avoir dit cela, il a pris du pain, il a rendu grâce à Dieu devant tous, puis il l''a rompu et s''est mis à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'reprenant courage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 22+ ; cf. 9.19.
    marker-yv: yv-n
  - type: text
    text: 'Alors, reprenant courage, tous ont pris de la nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux cent soixante-seize
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : chiffre triangulaire (somme des chiffres de 1 à 23) ; cf. Jn 21.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ap 13.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . Mais le chiffre varie selon les mss grecs et les autres témoins du texte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '70 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (texte occidental ?)
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', 76, 176, 216, 270, 275, 876'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '… 276 reste le mieux attesté. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: personnes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.41'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous étions, dans le bateau, deux cent soixante-seize personnes en tout. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 18+.
    marker-yv: yv-n
  - type: text
    text: Quand tous ont eu assez mangé, ils ont allégé le bateau en jetant le blé à la mer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le naufrage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lorsque le jour s''est levé, ils n''ont pas reconnu la terre, mais ils ont aperçu un golfe et ils ont décidé de pousser le bateau, si possible, jusqu''au rivage. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils ont détaché les ancres pour les laisser aller à la mer et ils ont relâché en même temps les attaches des gouvernails ; puis ils ont mis au vent la voile d''artimon et se sont dirigés vers le rivage. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des vagues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est absente de certains mss.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils sont tombés sur un banc de sable entre deux courants, et ils y ont échoué le navire. La proue, bien engagée, demeurait immobile, tandis que la poupe se disloquait sous la violence des vagues. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 12.19 ; 16.27.
    marker-yv: yv-n
  - type: text
    text: 'Les soldats avaient décidé de tuer les prisonniers, de peur que l''un d''eux ne s''échappe à la nage. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sauver
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : une autre forme du même verbe est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sains et saufs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 44 ; on le retrouve en 23.24 ; 28.1,4 ; voir Mt 14.36
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 7.3.'
    marker-yv: yv-n
  - type: text
    text: 'Mais le centurion, qui était décidé à sauver Paul, les a empêchés de mettre leur décision à exécution. Il a donné l''ordre à ceux qui savaient nager de se jeter les premiers à l''eau pour gagner la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 22-25 ; 28.1 ; 2Co 11.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur des débris…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction, moins probable, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soutenus par des membres de l'équipage.
    marker-yv: yv-n
  - type: text
    text: Les autres les rejoindraient sur des planches ou sur des débris du bateau. Ainsi tous sont parvenus à terre sains et saufs.
