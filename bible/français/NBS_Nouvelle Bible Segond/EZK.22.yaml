      text: 'Tu t''es mise en tort par le sang que tu as répandu et tu t''es rendue impure avec les idoles que tu as faites. Tu as ainsi abrégé tes jours et tu es parvenue au terme de tes années. C''est pourquoi je t''ai livrée aux outrages des nations et aux railleries de tous les pays. '
