        - type: text
          text: Cf. 13.5 ; Ps 106.23 ; cf. Jr 5.1.
      marker-yv: yv-n
    - type: text
      text: 'J''ai cherché parmi eux un homme qui construise une clôture, qui se tienne sur la brèche devant moi pour le pays, afin que celui-ci ne soit pas détruit, mais je n''en ai pas trouvé. '
