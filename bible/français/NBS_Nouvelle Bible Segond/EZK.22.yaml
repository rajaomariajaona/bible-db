document_id: EZK.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem commet des abominations
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'on expose la nudité (cf. 16.36ns) du père  : l''expression pourrait signifier on couche avec son père (cf. Lv 18.6nss), mais aussi on couche avec la femme de son père (cf. Lv 20.11). Voir aussi Gn 9.20ss ; Lv 18.8+. –  on abuse…  : litt. on abuse de l''impureté de sa souillure (menstruelle) ; cf. 18.6+ ; Gn 34.2n  ; Lv 12.2n.'
  - type: text
    content: 'Chez toi, on expose la nudité du père. Chez toi, on abuse de la femme rendue impure par sa souillure menstruelle. '
  '11':
  - type: note
    content: de manière infâme v. 9 ; cf. Lv 18.9,11,15,20.
  - type: text
    content: 'Chez toi, chacun se livre à des abominations avec la femme de son prochain, chacun souille sa belle-fille de manière infâme, chacun abuse de sa sœur, fille de son père. '
  '12':
  - type: note
    content: '18.8+,13 ; Ex 23.8 ; Dt 16.19 ; 27.25 ; Jr 22.17. –  tu spolies  : cf. v. 27n.'
  - type: text
    content: 'Chez toi, on accepte des pots-de-vin pour répandre du sang. Tu exiges des intérêts et des rentes, tu spolies ton prochain par l''oppression, et moi, tu m''oublies – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Je frappe des mains 21.22. –  du sang  : litt. de ton sang.'
  - type: text
    content: 'Je frappe des mains à cause de la spoliation que tu as commise et du sang qui est au milieu de toi. '
  '14':
  - type: note
    content: Voir cœur. –  qui ai parlé et qui agirai 17.24+.
  - type: text
    content: 'Ton cœur sera-t-il ferme, tes mains auront-elles de la force aux jours où j''agirai contre toi ? – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé et qui agirai. '
  '15':
  - type: note
    content: '5.10+. –  dans tous les pays  : litt. dans les pays.'
  - type: text
    content: 'Je te disperserai parmi les nations, je te disséminerai dans tous les pays et je te débarrasserai complètement de ton impureté. '
  '16':
  - type: note
    content: 'Tu seras profanée par toi-même (ou chez toi) : des versions anciennes ont lu j''hériterai de toi (les deux locutions peuvent être facilement confondues en hébreu).'
  - type: text
    content: 'Tu seras profanée par toi-même sous les yeux des nations, et ainsi tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '17':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'scories  : cf. Es 1.22 ; Jr 6.28s. –  de l''argent  : cf. v. 20.'
  - type: text
    content: 'Humain, la maison d''Israël est devenue pour moi comme des scories ; ils sont tous du bronze, de l''étain, du fer, du plomb dans le creuset ; ce sont des scories de l''argent. '
  '19':
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que vous êtes tous devenus comme des scories, je vous rassemble au milieu de Jérusalem. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: '20.4+. –  sanguinaire  : litt. des sangs , de même en 24.6,9 ; cf. 7.23n  ; Es 1.15n  ; Na 3.1.'
  - type: text
    content: Toi, humain, jugeras-tu, jugeras-tu la ville sanguinaire ? Fais-lui connaître toutes ses abominations !
  '20':
  - type: note
    content: Cf. 21.36 ; Ml 3.2s.
  - type: text
    content: 'Comme un amas d''argent, de bronze, de fer, de plomb et d''étain que l''on fond dans un creuset sur lequel on attise le feu, ainsi je vous rassemblerai dans ma colère et dans ma fureur, je vous déposerai et je vous fondrai. '
  '21':
  - type: note
    content: 'ma colère  : autre terme qu''au v. 20 et dans la suite (synonymes) ; de même au v. 31 ; 21.36 ; 38.19. –  au milieu de la ville  : litt. au milieu d''elle.'
  - type: text
    content: 'Je vous mettrai en tas et j''attiserai contre vous le feu de ma colère ; et vous serez fondus au milieu de la ville. '
  '22':
  - type: note
    content: Es 1.25 ; Za 13.9+.
  - type: text
    content: 'Comme l''argent fond au milieu du creuset, ainsi vous serez fondus au milieu d''elle. Ainsi vous saurez que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai répandu ma fureur sur vous.'
  '23':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'dis à Jérusalem  : litt. dis-lui (pronom féminin). –  qui n''est pas purifiée  : LXX sur laquelle il n''a pas plu.'
  - type: text
    content: 'Humain, dis à Jérusalem : Tu es une terre qui n''est pas purifiée, qui n''est pas arrosée de pluie au jour de la fureur. '
  '25':
  - type: note
    content: 'Ses prophètes conspirent  : litt. conspiration de ses prophètes  ; LXX ceux qui la dirigent. –  lion  : cf. 19.3 ; So 3.3-5 ; 1P 5.8.'
  - type: text
    content: 'Ses prophètes conspirent au milieu d''elle ; comme un lion rugissant qui déchiquette sa proie, ils dévorent des vies, ils s''emparent des richesses et des choses précieuses, ils multiplient les veuves au milieu d''elle. '
  '26':
  - type: note
    content: 'Voir loi. –  ce qui m''est consacré  : cf. v. 8n. –  ils ne séparent pas…  : cf. 42.20 ; 44.23 ; Gn 1.4+ ; Lv 10.10+ ; Ecrit de Damas (Qumrân) : « Ils prendront soin d''agir selon la teneur exacte de la Loi au temps de l''impiété, et de se séparer des fils de la Fosse… et de distinguer entre l''impur et le pur, et de faire connaître (les distinctions) entre le sacré et le profane. » –  ils ferment les yeux…  : litt. ils cachent leurs yeux…  ; cf. Lv 20.4+.'
  - type: text
    content: 'Ses prêtres violent ma loi et profanent ce qui m''est consacré ; ils ne séparent pas le sacré du profane, ils ne font pas connaître la différence entre l''impur et le pur, ils ferment les yeux sur mes sabbats, et je suis profané au milieu d''eux. '
  '27':
  - type: note
    content: V. 6 ; cf. Gn 49.27 ; So 3.3 ; Pr 28.15. –  leurs spoliations v. 12s ; 33.31n.
  - type: text
    content: 'Ses princes sont en son sein comme des loups qui déchiquettent leur proie ; ils répandent du sang, ils font disparaître des gens, pour accomplir leurs spoliations. '
  '28':
  - type: note
    content: badigeon 13.10-16. –  visions illusoires 13.6+.
  - type: text
    content: 'Ses prophètes ont pour eux des enduits de badigeon, des visions illusoires, des divinations mensongères ; ils disent : « Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! » Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas parlé. '
  '29':
  - type: note
    content: 18.7+,12,17.
  - type: text
    content: 'Le peuple du pays se livre à l''oppression, commet des spoliations, exploite le pauvre et le déshérité, opprime l''immigré contre toute justice. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'son jour  : litt. son temps.'
  - type: text
    content: 'Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Voici une ville qui répand du sang au milieu d''elle, pour que son jour arrive, et qui se fait des idoles, se rendant ainsi impure ! '
  '30':
  - type: note
    content: Cf. 13.5 ; Ps 106.23 ; cf. Jr 5.1.
  - type: text
    content: 'J''ai cherché parmi eux un homme qui construise une clôture, qui se tienne sur la brèche devant moi pour le pays, afin que celui-ci ne soit pas détruit, mais je n''en ai pas trouvé. '
  '31':
  - type: note
    content: Je répands… 21.36 ; So 3.8. –  leur voie sur leur tête 9.10n.
  - type: text
    content: 'Je répands sur eux ma fureur, je les extermine par le feu de ma colère, je fais retomber leur voie sur leur tête – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '4':
  - type: note
    content: 'Tu t''es mise en tort ou tu t''es rendue coupable. –  sang… répandu 16.36 ; 36.18. –  abrégé  : litt. fait approcher  ; on pourrait aussi comprendre que les jours sont ceux du jugement (cf. 21.30n). –  au terme de  : litt. jusqu''à  ; certains mss hébreux et des versions anciennes ont lu au temps de. –  outrages 21.33n.'
  - type: text
    content: 'Tu t''es mise en tort par le sang que tu as répandu et tu t''es rendue impure avec les idoles que tu as faites. Tu as ainsi abrégé tes jours et tu es parvenue au terme de tes années. C''est pourquoi je t''ai livrée aux outrages des nations et aux railleries de tous les pays. '
  '5':
  - type: note
    content: 'près ou proches, cf. 6.12. –  ton nom impur ou ton nom souillé  ; cf. 14.11n  ; 43.7s. –  désordres  : le même terme est traduit par panique en 7.7 ; cf. Pr 15.16n  ; Am 3.9.'
  - type: text
    content: Ceux qui sont près de toi comme ceux qui sont loin te railleront, toi, ton nom impur et la grandeur de tes désordres.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 27 ; Es 1.23 ; Jr 22.17 ; Mi 3.1-3. –  sa force  : litt. son bras.'
  - type: text
    content: 'Tels sont les princes d''Israël : chacun use de sa force chez toi, pour répandre du sang. '
  '7':
  - type: note
    content: père / mère Ex 20.12 ; Lv 19.3 ; Dt 5.16 ; 27.16. –  immigré 14.7+ ; cf. Ex 22.20 ; Lv 19.10,33s. –  orphelin / veuve Ex 22.21 ; Dt 10.18 ; 24.17 ; 27.19 ; Ps 146.9.
  - type: text
    content: 'Chez toi, on fait peu de cas d''un père et d''une mère. Au milieu de toi, on commet des actes d''oppression contre l''immigré. Chez toi, on exploite l''orphelin et la veuve. '
  '8':
  - type: note
    content: '23.38. –  ce qui m''est consacré  : litt. mes choses sacrées (ou saintes) ; autre traduction mes sanctuaires  ; même expression au v. 26 ; cf. 20.40. –  mes sabbats 20.12-13+.'
  - type: text
    content: 'Tu méprises ce qui m''est consacré, tu profanes mes sabbats. '
  '9':
  - type: note
    content: pour répandre du sang 18.10 ; cf. Lv 19.16. –  mange sur les montagnes 18.6n.
  - type: text
    content: 'Il y a chez toi des gens qui calomnient pour répandre du sang. Chez toi, on mange sur les montagnes. On commet des infamies au milieu de toi. '
