        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Chez toi, on expose la nudité du père. Chez toi, on abuse de la femme rendue impure par sa souillure menstruelle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de manière infâme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9 ; cf. Lv 18.9,11,15,20.
      marker-yv: yv-n
    - type: text
      text: 'Chez toi, chacun se livre à des abominations avec la femme de son prochain, chacun souille sa belle-fille de manière infâme, chacun abuse de sa sœur, fille de son père. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.8+,13 ; Ex 23.8 ; Dt 16.19 ; 27.25 ; Jr 22.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu spolies
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Chez toi, on accepte des pots-de-vin pour répandre du sang. Tu exiges des intérêts et des rentes, tu spolies ton prochain par l''oppression, et moi, tu m''oublies – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je frappe des mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du sang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ton sang.
      marker-yv: yv-n
    - type: text
      text: 'Je frappe des mains à cause de la spoliation que tu as commise et du sang qui est au milieu de toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui ai parlé et qui agirai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.24+.
      marker-yv: yv-n
    - type: text
      text: 'Ton cœur sera-t-il ferme, tes mains auront-elles de la force aux jours où j''agirai contre toi ? – c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai parlé et qui agirai. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tous les pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans les pays.
      marker-yv: yv-n
    - type: text
      text: 'Je te disperserai parmi les nations, je te disséminerai dans tous les pays et je te débarrasserai complètement de ton impureté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu seras profanée par toi-même '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''hériterai de toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (les deux locutions peuvent être facilement confondues en hébreu).
      marker-yv: yv-n
    - type: text
      text: 'Tu seras profanée par toi-même sous les yeux des nations, et ainsi tu sauras que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: scories
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 1.22 ; Jr 6.28s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 20.'
      marker-yv: yv-n
    - type: text
      text: 'Humain, la maison d''Israël est devenue pour moi comme des scories ; ils sont tous du bronze, de l''étain, du fer, du plomb dans le creuset ; ce sont des scories de l''argent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Parce que vous êtes tous devenus comme des scories, je vous rassemble au milieu de Jérusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sanguinaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sangs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 24.6,9 ; cf. 7.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 1.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Na 3.1.'
      marker-yv: yv-n
    - type: text
      text: Toi, humain, jugeras-tu, jugeras-tu la ville sanguinaire ? Fais-lui connaître toutes ses abominations !
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 21.36 ; Ml 3.2s.
      marker-yv: yv-n
    - type: text
      text: 'Comme un amas d''argent, de bronze, de fer, de plomb et d''étain que l''on fond dans un creuset sur lequel on attise le feu, ainsi je vous rassemblerai dans ma colère et dans ma fureur, je vous déposerai et je vous fondrai. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma colère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre terme qu''au v. 20 et dans la suite (synonymes) ; de même au v. 31 ; 21.36 ; 38.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au milieu de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au milieu d'elle.
      marker-yv: yv-n
    - type: text
      text: 'Je vous mettrai en tas et j''attiserai contre vous le feu de ma colère ; et vous serez fondus au milieu de la ville. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 1.25 ; Za 13.9+.
      marker-yv: yv-n
    - type: text
      text: 'Comme l''argent fond au milieu du creuset, ainsi vous serez fondus au milieu d''elle. Ainsi vous saurez que c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai répandu ma fureur sur vous.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dis à Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dis-lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(pronom féminin). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui n'est pas purifiée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur laquelle il n'a pas plu.
      marker-yv: yv-n
    - type: text
      text: 'Humain, dis à Jérusalem : Tu es une terre qui n''est pas purifiée, qui n''est pas arrosée de pluie au jour de la fureur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ses '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
        - type: text
          text: ' conspirent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: conspiration de ses prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui la dirigent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 19.3 ; So 3.3-5 ; 1P 5.8.'
      marker-yv: yv-n
    - type: text
      text: 'Ses prophètes conspirent au milieu d''elle ; comme un lion rugissant qui déchiquette sa proie, ils dévorent des vies, ils s''emparent des richesses et des choses précieuses, ils multiplient les veuves au milieu d''elle. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui m'est consacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils ne séparent pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 42.20 ; 44.23 ; Gn 1.4+ ; Lv 10.10+ ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ecrit de Damas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') : « Ils prendront soin d''agir selon la teneur exacte de la Loi au temps de l''impiété, et de se séparer des fils de la Fosse… et de distinguer entre l''impur et le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', et de faire connaître (les distinctions) entre le sacré et le profane. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils ferment les yeux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils cachent leurs yeux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lv 20.4+.'
      marker-yv: yv-n
    - type: text
      text: 'Ses prêtres violent ma loi et profanent ce qui m''est consacré ; ils ne séparent pas le sacré du profane, ils ne font pas connaître la différence entre l''impur et le pur, ils ferment les yeux sur mes sabbats, et je suis profané au milieu d''eux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6 ; cf. Gn 49.27 ; So 3.3 ; Pr 28.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leurs spoliations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12s ; 33.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ses princes sont en son sein comme des loups qui déchiquettent leur proie ; ils répandent du sang, ils font disparaître des gens, pour accomplir leurs spoliations. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'badigeon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.10-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'visions illusoires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.6+.
      marker-yv: yv-n
    - type: text
      text: 'Ses prophètes ont pour eux des enduits de badigeon, des visions illusoires, des divinations mensongères ; ils disent : « Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  ! » Et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' n''a pas parlé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
