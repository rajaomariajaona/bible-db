        marker: fr
        children:
        - type: text
          text: '22.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 18.7+,12,17.
      marker-yv: yv-n
    - type: text
      text: 'Le peuple du pays se livre à l''oppression, commet des spoliations, exploite le pauvre et le déshérité, opprime l''immigré contre toute justice. '
