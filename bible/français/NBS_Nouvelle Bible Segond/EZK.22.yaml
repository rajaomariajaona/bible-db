    - type: text
      text: 'Tu diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Voici une ville qui répand du sang au milieu d''elle, pour que son jour arrive, et qui se fait des idoles, se rendant ainsi impure ! '
