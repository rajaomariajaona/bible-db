        - type: text
          text: '22.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je répands… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.36 ; So 3.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur voie sur leur tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je répands sur eux ma fureur, je les extermine par le feu de ma colère, je fais retomber leur voie sur leur tête – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
