document_id: EPH.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Imitez (1Co 11.1+ ; 1Th 1.6s) … Dieu Mt 5.45,48 ; cf. Gn 1.26s ; Lv 19.2. –  enfants bien-aimés  : cf. Col 3.12.'
  - type: text
    content: 'Imitez donc Dieu, comme des enfants bien-aimés, '
  '10':
  - type: note
    content: 'Sachez discerner  : autre traduction voyez à l''épreuve, examinez  ; sur le verbe correspondant, voir Rm 1.28n  ; 12.2 ; Ga 6.4n  ; Ph 1.10 ; 1Th 5.21 ; 1Jn 4.1. –  ce qui est agréé… 2Co 5.9+ ; Col 3.20.'
  - type: text
    content: 'Sachez discerner ce qui est agréé du Seigneur ; '
  '11':
  - type: note
    content: 'aux œuvres…  : cf. Rm 13.12 ; Ga 5.19ss. –  stériles  : litt. sans fruit, cf. v. 9 ; Mc 4.19 ; 1Co 14.14 ; Tt 3.14 ; Jd 12. –  dévoilez-les, ou dénoncez-les, démasquez-les  ; le verbe grec a aussi le sens de confondre (Jn 16.8), reprendre (1Tm 5.20+) ; cf. 2Co 4.2.'
  - type: text
    content: 'et ne vous associez pas aux œuvres stériles des ténèbres, mais plutôt dévoilez-les. '
  '12':
  - type: note
    content: 'en secret  : cf. Mc 4.22/ / ; Rm 2.16 ; 1Co 4.5 ; 14.25.'
  - type: text
    content: 'En effet, ce qu''ils font en secret, il est choquant même d''en parler. '
  '13':
  - type: note
    content: Cf. Jn 1.5 ; 3.19-21 ; 1Jn 1.5-10 ; voir aussi 1Co 14.24s.
  - type: text
    content: 'Mais tout cela, une fois dévoilé, est rendu manifeste par la lumière, '
  '14':
  - type: note
    content: 'il dit 4.8n  ; il s''agit probablement d''une hymne chrétienne primitive, ou peut-être d''une citation d''un ouvrage qui ne nous est pas parvenu ; cf. 1Tm 3.16. –  Réveille-toi / relève-toi  : les deux verbes correspondants ont souvent le sens de ressusciter  ; cf. 1.20n  ; Ac 2.24n  ; 3.15n  ; Rm 1.4n. –  le Christ t''illuminera (comme le soleil levant, cf. Mt 28.1/ /) : certains mss portent tu toucheras le Christ  ; d''après Jérôme (voir Vg), on aurait aussi lu  : le Christ te touchera. – Cf. 1.18 ; Nb 24.17 ; Es 26.19 ; 51.17 ; 52.1 ; 60.1 ; Lc 1.78 ; Jn 5.25 ; Rm 13.11 ; 2Co 3.18 ; Hé 10.32 ; 2P 1.19 ; Ap 22.16. Clément d''Alexandrie cite en ces termes un apocryphe nommé Traditions de Matthias  : « Si le voisin d''un élu pèche, l''élu a péché ; car s''il s''était conduit comme le Verbe le prescrit, le voisin aussi aurait eu honte de sa façon de vivre et n''aurait pas péché. »'
  - type: text
    content: 'car tout ce qui devient manifeste est lumière. C''est pourquoi il dit :'
  - type: text
    content: Réveille-toi, toi qui dors,
  - type: text
    content: relève-toi d'entre les morts,
  - type: text
    content: et le Christ t'illuminera.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Col 4.5. –  vous comportez  : litt. marchez , cf. v. 2+. –  sages 1.8+.'
  - type: text
    content: 'Veillez donc avec soin à la façon dont vous vous comportez : que ce ne soit pas comme des fous, mais comme des sages. '
  '16':
  - type: note
    content: 'Rachetez le temps Col 4.5n  ; cf. Ec 3.1-8 ; 9.7-10. –  les jours sont mauvais  : cf. 6.13 ; Am 5.13 ; Rm 13.11ss ; 1Co 7.26-31 ; Ga 1.4 ; 2Tm 3.1.'
  - type: text
    content: 'Rachetez le temps, car les jours sont mauvais. '
  '17':
  - type: note
    content: Cf. Rm 12.2+.
  - type: text
    content: 'Ne soyez donc pas sans intelligence, mais comprenez quelle est la volonté du Seigneur. '
  '18':
  - type: note
    content: 'Ne vous enivrez pas…  : cf. Pr 23.31 ; Lc 21.34 ; 1Co 15.32-34 ; 1Th 5.6s. –  remplis par (ou dans) l''Esprit  : autre traduction remplis d''Esprit  ; cf. Ac 2.4+ ; 1Co 12.13 ; voir aussi Col 2.10.'
  - type: text
    content: 'Ne vous enivrez pas de vin : il mène à la débauche. Au contraire, soyez remplis par l''Esprit ; '
  '19':
  - type: note
    content: 'Col 3.16 ; cf. Ps 33.2s ; 1Co 14.15. –  chantez et célébrez  : les deux verbes ainsi traduits sont en fait synonymes ; le premier est apparenté au nom rendu par chants, le second à celui qui est traduit par cantiques et qui a donné le mot psaumes (cf. Lc 20.42 ; Ac 1.20 ; 1Co 14.26n). – Voir cœur.'
  - type: text
    content: 'parlez-vous par des cantiques, des hymnes et des chants spirituels ; chantez et célébrez le Seigneur de tout votre cœur ; '
  '2':
  - type: note
    content: 'vivez (litt. marchez) dans (ou par) l''amour ou comportez-vous avec amour, cf. v. 8,15 ; 2.10n. –  tout comme le Christ… v. 25 ; cf. 2Co 5.14 ; Ga 1.4 ; 2.20 ; voir aussi Jn 13.34s ; 15.9-13 ; 1Jn 3.16. –  nous a aimés ou, selon certains mss, vous a aimés. –  en offrande et en sacrifice  : cf. Gn 8.21n  ; Ex 29.18 ; Lv 1.9 ; Ez 20.41 ; Ps 40.7 ; voir aussi Rm 4.25 ; 12.1 ; Ph 2.17 ; 4.18 ; 1Tm 2.6+ ; Hé 10.10 ; 1P 2.5.'
  - type: text
    content: et vivez dans l'amour, tout comme le Christ aussi nous a aimés et s'est livré lui-même à Dieu pour nous en offrande et en sacrifice, comme un parfum de bonne odeur.
  '20':
  - type: note
    content: 'Cf. v. 4 ; Col 1.3 ; 3.17 ; 1Th 5.18. –  rendez toujours grâce  : cf. Mt 26.27n. –  au nom de notre Seigneur Jésus-Christ Ac 15.26 ; 1Co 1.2,10 ; 5.4 ; 2Th 1.12 ; 3.6.'
  - type: text
    content: rendez toujours grâce pour tout, au nom de notre Seigneur Jésus-Christ, à celui qui est Dieu et Père.
  - type: heading
    content: Maris et femmes
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 22.26s ; Jn 13.14-17 ; Ga 5.13 ; Ph 2.1-11 ; 1P 5.5. Voir aussi crainte . Cf. Col 3.22.
  - type: text
    content: 'Soumettez-vous les uns aux autres dans la crainte du Christ ; '
  '22':
  - type: note
    content: Cf. Col 3.18 ; Tt 2.5 ; 1P 3.1-7.
  - type: text
    content: 'ainsi les femmes à leur mari, comme au Seigneur ; '
  '23':
  - type: note
    content: 'l''homme ou le mari, comme aux v. 22,24s. –  la tête ou le chef, cf. 1.22ns ; 4.15+ ; 1Co 11.3+ ; 14.34+. –  qui est son corps…  : litt. lui le sauveur du corps  ; cf. v. 28s ; Lc 1.47 ; 2.11 ; Jn 4.42 ; Ac 5.31 ; 13.23 ; Ph 3.20 ; 1Jn 4.14.'
  - type: text
    content: 'car l''homme est la tête de la femme, comme le Christ est la tête de l''Eglise, qui est son corps et dont il est le Sauveur ; '
  '24':
  - type: note
    content: 'en tout cas  : litt. mais  ; cette introduction peut suggérer que l''analogie qui précède n''est pas à prendre comme un parallèle rigoureux (cf. v. 33).'
  - type: text
    content: en tout cas, comme l'Eglise se soumet au Christ, qu'ainsi les femmes se soumettent en tout à leur mari.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'votre femme  : litt. vos femmes Col 3.19. –  comme le Christ… v. 2+ ; cf. 2Co 11.2.'
  - type: text
    content: 'Maris, aimez votre femme comme le Christ a aimé l''Eglise : il s''est livré lui-même pour elle, '
  '26':
  - type: note
    content: 'la consacrer  : autre traduction, moins probable  : afin de la sanctifier après l''avoir purifiée  ; un terme apparenté est traduit par sainte au v. 27 ; cf. Jn 17.19 ; 1Co 1.2n  ; 6.11 ; 7.14 ; Hé 10.10,14 ; 13.12. –  par le bain…  : litt. par le bain d''eau dans (ou avec) la Parole (6.17 ; 1P 1.22ss) ; cf. Ez 16.8-14 ; 36.25 ; Jn 13.6,11 ; 15.3 ; 1Co 6.11 ; Tt 3.5 ; Hé 10.22.'
  - type: text
    content: 'afin de la consacrer en la purifiant par le bain d''eau et la Parole, '
  '27':
  - type: note
    content: 'pour faire paraître…  : cf. Ps 45.14-16 ; 2Co 4.14n  ; 11.2 (même verbe pour présenter) ; Col 1.22 ; Ap 19.8 ; 21.2. –  sainte et sans défaut 1.4+ ; cf. Ct 4.7 ; voir aussi Es 60.9 ; 2Th 1.10 ; 1P 1.19.'
  - type: text
    content: 'pour faire paraître devant lui cette Eglise glorieuse, sans tache, ni ride, ni rien de semblable, mais sainte et sans défaut. '
  '28':
  - type: note
    content: Cf. v. 23,33.
  - type: text
    content: De même, les maris doivent aimer leur femme comme leur propre corps. Celui qui aime sa femme s'aime lui-même.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Voir chair . –  il la nourrit et en prend soin 1Th 2.7.
  - type: text
    content: 'Jamais personne, en effet, n''a détesté sa propre chair ; au contraire, il la nourrit et en prend soin, comme le Christ le fait pour l''Eglise, '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.19+,29+ ; Mt 5.27ss.
  - type: text
    content: 'Que l''inconduite sexuelle, l''impureté sous toutes ses formes ou l''avidité ne soient pas même mentionnées parmi vous, comme il convient à des saints ; '
  '30':
  - type: note
    content: 'Cf. Rm 12.5+ ; 1Co 6.15 ; 12.27. –  nous faisons partie…  : litt. nous sommes des parties (ou des membres) de son corps  ; certains mss ajoutent à la fin du v.  : (tirées) de sa chair et de ses os (cf. Gn 2.23).'
  - type: text
    content: 'parce que nous faisons partie de son corps. '
  '31':
  - type: note
    content: Gn 2.24  ; Mc 10.7/ / ; 1Co 6.16.
  - type: text
    content: C'est pourquoi l'homme quittera son père et sa mère pour s'attacher à sa femme, et les deux seront une seule chair
  - type: text
    content: '. '
  '32':
  - type: note
    content: 'Il y a là un grand mystère 1.9+ ; cf. 3.3 ; 1Tm 3.16. –  qu''il se rapporte  : le mystère, ou bien le texte cité au v. 31 ; litt. je (le) dis pour Christ et pour l''Eglise  ; la même expression est traduite par dire de en Ac 2.25 ; cf. Ap 19.7.'
  - type: text
    content: 'Il y a là un grand mystère ; je dis, moi, qu''il se rapporte au Christ et à l''Eglise. '
  '33':
  - type: note
    content: 'V. 28 ; Ga 5.14. –  Quoi qu''il en soit  : litt. cependant (cf. v. 24n). –  respecte  : litt. craigne, cf. v. 21s ; 6.5.'
  - type: text
    content: Quoi qu'il en soit, que chacun de vous aime sa femme comme lui-même, et que la femme respecte son mari.
  '4':
  - type: note
    content: 'choses choquantes  : terme apparenté v. 12. –  propos extravagants ou inutiles, litt. fous  ; cf. 2Tm 2.23 ; Tt 3.9. –  actions de grâces v. 20 ; Col 1.3 ; 3.15.'
  - type: text
    content: 'pas de choses choquantes, pas de propos extravagants, pas de bouffonneries, cela est malséant ; mais plutôt des actions de grâces. '
  '5':
  - type: note
    content: 'ceux qui se livrent…  : cf. v. 3 ; 1Co 5.9nss ; 6.9ss ; Hé 13.4. –  à l''impureté (voir pur) …  : litt. ou (un) impur, ou (un) avide, qui est (un) idolâtre  ; cf. Col 3.5. –  n''a d''héritage…  : cf. 1Co 6.9s ; 15.50 ; Ga 5.21 ; Ap 21.8 ; 22.15 ; voir aussi Mt 5.20 ; 7.21 ; 18.3. –  royaume du Christ et de Dieu  : certains comprennent le royaume de celui qui est le Christ et Dieu  ; cf. 1Co 15.24-28.'
  - type: text
    content: Car, sachez-le bien, aucun de ceux qui se livrent à l'inconduite sexuelle, à l'impureté ou à l'avidité – c'est-à-dire à l'idolâtrie – n'a d'héritage dans le royaume du Christ et de Dieu.
  - type: heading
    content: Autrefois ténèbres, maintenant lumière
  '6':
  - type: text
    content: ' '
  - type: note
    content: Que personne ne vous trompe… 4.14,22s ; cf. Rm 16.18 ; Col 2.4,8. –  c'est pour cela… Col 3.6. –  rebelles 2.2n.
  - type: text
    content: 'Que personne ne vous trompe par des discours vides ; car c''est pour cela que la colère de Dieu vient sur les rebelles. '
  '7':
  - type: note
    content: Cf. 1Co 10.17,21 ; 2Co 6.14.
  - type: text
    content: 'N''ayez donc aucune part avec eux. '
  '8':
  - type: note
    content: 'Autrefois / maintenant 2.11,13. –  ténèbres / lumière Jn 8.12+ ; Ac 26.18+ ; Rm 13.12 ; Ph 2.15 ; 1Th 5.4ss ; 1P 2.9 ; cf. Mt 5.14. –  Vivez ou comportez-vous, litt. marchez, cf. v. 2+. –  des enfants de lumière  : autres traductions des enfants de la lumière, des êtres de lumière  ; cf. v. 1 ; Lc 16.8 ; Jn 12.35s+.'
  - type: text
    content: 'Autrefois, en effet, vous étiez ténèbres, mais maintenant vous êtes lumière dans le Seigneur. Vivez comme des enfants de lumière ; '
  '9':
  - type: note
    content: 'fruit de la lumière  : cf. Rm 6.21s ; 7.4 ; Ga 5.22+. –  justice / vérité 4.24 ; 6.14 ; 2Co 6.7 ; 2Th 2.10,12 ; voir aussi Rm 1.8 ; 2.8 ; 1Co 13.6.'
  - type: text
    content: 'car le fruit de la lumière consiste en toute sorte de bonté, de justice et de vérité. '
