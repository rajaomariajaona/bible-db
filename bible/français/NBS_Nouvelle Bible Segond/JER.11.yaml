document_id: JER.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'alliance trahie
  - type: text
    content: ' '
  - type: note
    content: 7.1 ; 44.1.
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '10':
  - type: note
    content: 'fautes  : voir péché. –  ils ont suivi… 7.6+ ; cf. 13.10. –  rompu mon alliance… 14.21 ; 31.32 ; 33.20 ; Dt 31.16,20.'
  - type: text
    content: Ils sont retournés aux fautes de leurs premiers pères, qui ont refusé d'écouter mes paroles, et ils ont suivi d'autres dieux pour les servir. La maison d'Israël et la maison de Juda ont rompu mon alliance, celle que j'avais conclue avec leurs pères.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je fais venir… v. 23 ; 6.19 ; 19.3 ; 23.12 ; 1R 14.10. –  je ne les entendrai pas  : autre traduction je ne les écouterai pas.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je fais venir sur eux un malheur dont ils ne pourront se sortir. Ils crieront vers moi, mais je ne les entendrai pas. '
  '12':
  - type: note
    content: 1.16+. –  ne pourront pas les sauver 2.28+.
  - type: text
    content: 'Les villes de Juda et les habitants de Jérusalem iront crier vers les dieux auxquels ils offrent de l''encens, mais ceux-ci ne pourront pas les sauver au temps de leur malheur. '
  '13':
  - type: note
    content: 'autant de dieux… 2.28. –  la Honte  : cf. 3.24n. –  Baal  : cf. 19.5.'
  - type: text
    content: 'Car tu as autant de dieux que de villes, Juda ! Tu as disposé autant d''autels de la Honte que tu as de rues, Jérusalem – des autels pour offrir de l''encens au Baal ! '
  '14':
  - type: note
    content: 'ne prie pas 7.16+. –  je ne les entends pas  : autre traduction je ne les écoute pas. –  à cause de  : la même préposition a été traduite par pour dans le début du v. ; de nombreux mss hébreux et des versions anciennes portent au temps de leur malheur.'
  - type: text
    content: 'Quant à toi, ne prie pas pour ce peuple, n''élève pour eux ni cri, ni prière : je ne les entends pas au temps où ils m''invoquent à cause de leur malheur.'
  - type: heading
    content: Le Seigneur fait abattre son olivier
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale. –  ma bien-aimée  : d''après LXX (comme en 12.7 ; Ap 20.9) ; le texte hébreu traditionnel a ici un masculin ( mon bien-aimé ), mais la suite ( Elle travaille… ) suppose un antécédent féminin, cf. v. 17 ; certains modifient le texte hébreu traditionnel pour lire tes chaudrons (comme en 1S 2.14 ; 2Ch 35.13), en rapport avec la viande sacrée (ou viande du sanctuaire ) offerte dans la maison du Seigneur (7.21n  ; cf. Es 1.11ss). –  Elle travaille à ses nombreuses intrigues ou bien nombreux sont ceux qui travaillent à leurs intrigues  ; d''après LXX, certains modifient le texte hébreu traditionnel pour traduire, par exemple, la fin du v. comme suit  : ses intrigues. Sont-ce les vœux (ou les bêtes grasses ) et la viande sacrée qui éloigneront de toi ton malheur (autre sens possible du mot traduit par mal )  ? Alors tu pourrais exulter ! cf. 7.11 ; Pr 2.14. –  sacrée  : voir saint.'
  - type: text
    content: Qu'est-ce que ma bien-aimée a encore à faire dans ma maison ?
  - type: text
    content: Elle travaille à ses nombreuses intrigues !
  - type: text
    content: Qu'on enlève de chez toi la viande sacrée,
  - type: text
    content: car c'est quand tu fais du mal que tu exultes !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Olivier verdoyant Os 14.7 ; Ps 52.10. –  Dans un grand fracas  : autre traduction au bruit d''une grande foule , expression que certains rattachent au v. 15 ( tu exultes ).'
  - type: text
    content: Olivier verdoyant, remarquable par la beauté de son fruit,
  - type: text
    content: 'tel est le nom que t''avait donné le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Dans un grand fracas, il y met le feu,
  - type: text
    content: et ses rameaux ne vaudront plus rien.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'qui t''a plantée  : sur le féminin, cf. v. 15n  ; 2.21 ; 12.2. –  en me contrariant ou afin de me contrarier  ; cf. 25.7. –  en offrant de l''encens (1.16+) au Baal 7.9.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, qui t''a plantée, appelle sur toi le malheur, à cause du mal que la maison d''Israël et la maison de Juda se sont fait à elles-mêmes en me contrariant, en offrant de l''encens au Baal.'
  - type: heading
    content: Jérémie menacé par sa propre famille
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Confessions de Jérémie : 11.18–12.6 ; 15.10,15-21 ; 17.14-18 ; 18.18-23 ; 20.7-18. –  Le Seigneur me l''a fait savoir  : cf. 1R 14.5ss.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me l''a fait savoir, et je l''ai su. Alors tu m''as fait voir leurs agissements. '
  '19':
  - type: note
    content: 'comme un mouton  : cf. 51.40 ; Es 53.7 ; Jn 1.29 ; Ap 5.6. –  confiant  : le mot hébreu correspondant est souvent rendu par intime (cf. 3.4) ; il pourrait désigner ici un animal familier. –  des plans…  : cf. 18.18 ; voir aussi 29.11 ; Ps 56.6ss. –  l''arbre (cf. 12.2 ; 17.8) avec son fruit (litt. dans son pain) : sens incertain (LXX et Vg ont compris mettons du bois dans son pain) ; certains modifient le texte hébreu traditionnel pour lire dans sa vigueur (cf. Dt 34.7) ou par son adversaire  ; cf. Dt 20.19. –  Retranchons-le… Ps 52.7 ; 109.13 ; Es 53.8.'
  - type: text
    content: 'J''étais comme un mouton confiant qu''on mène à l''abattoir : je ne savais pas qu''ils préparaient des plans contre moi : « Détruisons l''arbre avec son fruit ! Retranchons-le de la terre des vivants, et qu''on ne se souvienne plus de son nom ! »'
  '2':
  - type: note
    content: 'V. 6. –  alliance  : cf. Ex 19.5 ; 2R 23.3. –  dites-les  : plusieurs versions anciennes ont lu  : tu les diras. –  … habitants de Jérusalem 17.20.'
  - type: text
    content: 'Ecoutez les paroles de cette alliance, et dites-les aux hommes de Juda et aux habitants de Jérusalem ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '20.12. –  juge juste 2Tm 4.8 ; 1P 2.23. –  sonde les reins (cf. 12.2n) et le cœur 16.17+ ; 17.10 ; 20.12 ; Ps 7.10 ; 26.2 ; 1Ch 28.9 ; Ap 2.23 ; cf. 1S 16.7 ; 1R 8.39 ; Ps 139.23 ; Rm 8.27 ; 1Th 2.4. –  vengeance  : même terme en 20.10,12 ; 46.10 ; 50.15+ ; cf. 9.8 ; 10.25. –  j''ai confié (litt. dévoilé, révélé ) ma cause  : cf. 15.11 ; 17.16 ; Dt 32.35 ; Ps 37.5 ; 55.23 ; Rm 12.19 ; 1P 2.23 ; 4.19.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées est un juge juste,'
  - type: text
    content: il sonde les reins et le cœur.
  - type: text
    content: Que je voie ta vengeance contre eux,
  - type: text
    content: car c'est à toi que j'ai confié ma cause !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 22). –  Anatoth 1.1n. –  qui en veulent à ta vie  : litt. qui cherchent ta vie (LXX ma vie ), de même en 19.7,9 ; 21.7,9 etc. –  Ne parle pas en prophète au nom… 2.8n  ; cf. Es 30.10 ; Am 2.12 ; 7.13. –  sinon…  : litt. et tu ne mourras pas de notre main.'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre les gens d''Anatoth qui en veulent à ta vie et qui disent : Ne parle pas en prophète au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', sinon nous te mettrons à mort ! '
  '22':
  - type: note
    content: 'A cause de cela…  : cette phrase est omise par LXX. –  Je leur ferai rendre des comptes 6.15n. –  épée / famine 5.12+.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Je leur ferai rendre des comptes : les jeunes gens mourront par l''épée, leurs fils et leurs filles mourront par la famine. '
  '23':
  - type: note
    content: 'aucun reste  : cf. 4.25+ ; 42.17 ; 44.14 ; voir aussi 6.9 ; 23.3 ; 31.7 ; 40.11 ; 50.20 ; Es 1.9+. –  je ferai venir… v. 11+ ; cf. 23.12. –  l''année où…  : cf. 6.15n  ; 23.12 ; 48.44.'
  - type: text
    content: 'Il n''y aura d''eux aucun reste : je ferai venir le malheur sur les gens d''Anatoth, l''année où ils vont rendre des comptes.'
  '3':
  - type: note
    content: Maudit soit… Dt 27.15ss,26 ; Ga 3.10 ; voir bénédiction.
  - type: text
    content: 'Tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Maudit soit l''homme qui n''écoute pas les paroles de cette alliance '
  '4':
  - type: note
    content: 'j''ai instituée et je vous ordonnerai traduisent un même verbe hébreu ; cf. Jos 7.11+. –  du creuset à fondre le fer (cf. 6.27-30) : même expression hébraïque qu''en Dt 4.20+. –  Ecoutez-moi  : litt. écoutez ma voix  ; 7.23+ ; cf. Mt 7.24 ; Jn 10.27. –  faites tout… ou faites exactement comme je vous l''ordonnerai  ; cf. Nb 1.54+.'
  - type: text
    content: 'que j''ai instituée pour vos pères, le jour où je les ai fait sortir de l''Egypte, du creuset à fondre le fer, en disant : Ecoutez-moi et faites tout ce que je vous ordonnerai ; alors vous, vous serez mon peuple, et moi, je serai votre Dieu. '
  '5':
  - type: note
    content: 'le serment Dt 1.8+ ; cf. Lc 1.73. –  lait / miel 32.22 ; Ex 3.8n  ; Dt 11.9+ ; 26.15 ; Ez 20.6,15 ; Ps 105.8-11. –  voilà pourquoi…  : cf. 25.18+ ; Dt 2.30n. –  Qu''il en soit ainsi ou Amen  ; cf. Dt 27.15n.'
  - type: text
    content: 'Alors je réaliserai le serment que j''ai fait à vos pères, en leur jurant de leur donner un pays ruissellant de lait et de miel – voilà pourquoi il en est ainsi en ce jour. Et je répondis : Qu''il en soit ainsi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '6':
  - type: note
    content: 'V. 2s. –  Crie 2.2. –  toutes  : le mot correspondant est absent de LXX et de plusieurs mss hébreux.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Crie toutes ces paroles dans les villes de Juda et dans les rues de Jérusalem, dis : Ecoutez les paroles de cette alliance et mettez-les en pratique ! '
  '7':
  - type: note
    content: 'Cf. 7.13n,23-26 ; 35.15 ; 1S 8.8. –  j''ai averti  : autres traductions j''ai pris à témoin, j''ai adjuré  ; cf. 6.10n  ; 42.19. –  monter d''Egypte 2.6+ ; Gn 12.10n. – LXX omet ce v. et présente un v. 8 court  : Mais ils ne l''ont pas mis en pratique.'
  - type: text
    content: 'Car j''ai averti vos pères depuis le jour où je les ai fait monter d''Egypte jusqu''à ce jour ; inlassablement, je les ai avertis en disant : Ecoutez-moi ! '
  '8':
  - type: note
    content: 'pas écouté 7.26n  ; cf. 2R 22.16. –  obstination… 3.17n. –  j''ai réalisé contre eux  : litt. j''ai fait venir sur eux.'
  - type: text
    content: 'Mais ils n''ont pas écouté, ils n''ont pas tendu l''oreille. Chacun d''eux a suivi l''obstination de son cœur mauvais. Alors j''ai réalisé contre eux toutes les paroles de cette alliance, que je leur avais ordonné de mettre en pratique et qu''ils n''ont pas mises en pratique. '
  '9':
  - type: note
    content: Il y a ou, plus littéralement, on a trouvé, expression analogue en 2R 17.4 (découvrir).
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Il y a une conspiration chez les hommes de Juda et les habitants de Jérusalem. '
