    marker-yv: yv-n
  - type: text
    text: 'que j''ai instituée pour vos pères, le jour où je les ai fait sortir de l''Egypte, du creuset à fondre le fer, en disant : Ecoutez-moi et faites tout ce que je vous ordonnerai ; alors vous, vous serez mon peuple, et moi, je serai votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le serment '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 1.8+ ; cf. Lc 1.73. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'miel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 32.22 ; Ex 3.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 11.9+ ; 26.15 ; Ez 20.6,15 ; Ps 105.8-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voilà pourquoi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 25.18+ ; Dt 2.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''il en soit ainsi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Amen
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 27.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors je réaliserai le serment que j''ai fait à vos pères, en leur jurant de leur donner un pays ruissellant de lait et de miel – voilà pourquoi il en est ainsi en ce jour. Et je répondis : Qu''il en soit ainsi, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Crie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toutes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot correspondant est absent de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et de plusieurs mss hébreux.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me dit : Crie toutes ces paroles dans les villes de Juda et dans les rues de Jérusalem, dis : Ecoutez les paroles de cette alliance et mettez-les en pratique ! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 7.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',23-26 ; 35.15 ; 1S 8.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'ai averti
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ai pris à témoin, j'ai adjuré
    - type: usfm
      marker: ft
      children:
