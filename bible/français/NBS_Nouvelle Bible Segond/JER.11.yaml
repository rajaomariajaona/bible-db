          text: n
      - type: text
        text: '  ; 42.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monter d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.6+ ; Gn 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – LXX omet ce v. et présente un v. 8 court
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mais ils ne l'ont pas mis en pratique.
    marker-yv: yv-n
  - type: text
    text: 'Car j''ai averti vos pères depuis le jour où je les ai fait monter d''Egypte jusqu''à ce jour ; inlassablement, je les ai avertis en disant : Ecoutez-moi ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas écouté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 2R 22.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'obstination… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'ai réalisé contre eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ai fait venir sur eux.
    marker-yv: yv-n
  - type: text
    text: 'Mais ils n''ont pas écouté, ils n''ont pas tendu l''oreille. Chacun d''eux a suivi l''obstination de son cœur mauvais. Alors j''ai réalisé contre eux toutes les paroles de cette alliance, que je leur avais ordonné de mettre en pratique et qu''ils n''ont pas mises en pratique. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il y a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, plus littéralement, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on a trouvé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression analogue en 2R 17.4 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: découvrir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' me dit : Il y a une conspiration chez les hommes de Juda et les habitants de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fautes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils ont suivi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.6+ ; cf. 13.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rompu mon alliance… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.21 ; 31.32 ; 33.20 ; Dt 31.16,20.
    marker-yv: yv-n
  - type: text
    text: Ils sont retournés aux fautes de leurs premiers pères, qui ont refusé d'écouter mes paroles, et ils ont suivi d'autres dieux pour les servir. La maison d'Israël et la maison de Juda ont rompu mon alliance, celle que j'avais conclue avec leurs pères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je fais venir… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 23 ; 6.19 ; 19.3 ; 23.12 ; 1R 14.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ne les entendrai pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne les écouterai pas.
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je fais venir sur eux un malheur dont ils ne pourront se sortir. Ils crieront vers moi, mais je ne les entendrai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne pourront pas les sauver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.28+.
    marker-yv: yv-n
  - type: text
    text: 'Les villes de Juda et les habitants de Jérusalem iront crier vers les dieux auxquels ils offrent de l''encens, mais ceux-ci ne pourront pas les sauver au temps de leur malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autant de dieux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.5.'
    marker-yv: yv-n
  - type: text
    text: 'Car tu as autant de dieux que de villes, Juda ! Tu as disposé autant d''autels de la Honte que tu as de rues, Jérusalem – des autels pour offrir de l''encens au Baal ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne prie pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ne les entends pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne les écoute pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à cause de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même préposition a été traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans le début du v. ; de nombreux mss hébreux et des versions anciennes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au temps de leur malheur.
    marker-yv: yv-n
  - type: text
    text: 'Quant à toi, ne prie pas pour ce peuple, n''élève pour eux ni cri, ni prière : je ne les entends pas au temps où ils m''invoquent à cause de leur malheur.'
